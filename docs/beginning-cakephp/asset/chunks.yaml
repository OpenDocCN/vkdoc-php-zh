    \ $this->set(compact('posts'));\n    }\n\n    function delete($id = null) {\n\
    \        if (!$id) {\n            $this->Session->setFlash(__('Invalid id for\
    \ Tag', true));\n            $this->redirect(array('action'=>'index'));\n    \
    \    }\n        if ($this->Tag->del($id)) {\n            $this->Session->setFlash(__('Tag\
    \ deleted', true));\n            $this->redirect(array('action'=>'index'));\n\
    \        }\n    }\n}\n?>\n```\n\n接下来，使用 Bake 为 Tags 控制器创建 Action 视图。最终应该会得到 `app/views/tags`\
    \ 文件夹，其中包含 `add.ctp`、`edit.ctp`、`index.ctp` 和 `view.ctp` 文件。Tags 控制器和视图正常工作后，博客就拥有了添加、编辑和删除标签的基本界面。Tag\
    \ 模型已经内置了“多对多”关系，因此标签也可以与特定的博客文章关联。这就是 Tree 行为将要发挥作用的地方——与其在应用程序中构建一个让用户点击标签并获取相关文章列表的机制，不如使用\
    \ Tree 行为。这样，当用户点击一个标签时，不仅会获得关联文章的列表，还会获得关联标签的文章列表。\n\n## 在模型中使用 Tree 行为\n\n数据库已准备好处理\
    \ Tree 行为，并且使用烘焙的控制器和视图后，现在可以在模型中调用该行为了。这是通过模型中的 `$actsAs` 属性完成的。\n\n打开 `app/models/tag.php`，在\
    \ `$hasAndBelongsToMany` 属性附近插入 `$actsAs` 属性。`$actsAs` 中设置的值对应所使用的行为；在本例中，`$actsAs`\
    \ 设置为 `Tree`。输入 `$actsAs` 属性后，您的 Tag 模型应如清单 14-12 所示。\n\n**清单 14-12.** *包含 Tree\
    \ 行为的 Tag 模型*\n\n```php\n<?\nclass Tag extends AppModel {\n    var $name = 'Tag';\n\
    \    var $actsAs = array('Tree'=>array(\n        'left'=>'left',\n        'right'=>'right'\n\
    \    ));\n    var $hasAndBelongsToMany = array('Post');\n}\n?>\n```\n\n清单 14-12\
    \ 中的第 5 行和第 6 行展示了我如何指定 `left` 和 `right` 字段名称。由于我没有使用默认名称 `lft` 和 `rght`，因此必须在第\
    \ 4 行为 `Tree` 分配一个数组，并包含第 5-6 行所示的 `left` 和 `right` 参数。分配给这些参数的值对应 `tags` 表中 `left`\
    \ 和 `right` 字段的字段名称，在本例中分别为 `left` 和 `right`。\n\n要将多个行为附加到模型，只需扩展 `$actsAs` 数组。例如，如果我想将一个自定义行为以及\
    \ Tree 行为附加到 Tag 模型，我会输入如下内容：\n\n```php\nvar $actsAs = array('Tree','MyBehavior');\n\
    ```\n\n数组中的每个行为名称还可以包含一组参数，如清单 14-12 所示；只需为每个行为名称分配一个数组作为值：\n\n```php\nvar $actsAs\
    \ = array(\n    'Tree'=>array(\n        'left'=>'left',\n        'right'=>'right'\n\
    \    ),\n    'MyBehavior'=>array(\n        'recursive'=>1\n    )\n);\n```\n\n\
    现在 `$actsAs` 属性已设置为 `Tree`，并且参数数组中已设置好 `left` 和 `right` 字段的适当字段名称后，模型中无需再做其他操作。所有\
    \ Tree 行为的函数都可以在控制器或模型中访问，这是下一步组织标签层次结构的任务。\n\n## 调整视图\n\n当 Bake 生成 Tags 视图时，它们包含了行为字段（`parent_id`、`left`\
    \ 和 `right`）。如果这些字段保留在表单提交中，可能会与 Tree 行为冲突，因此务必将它们从视图中移除。在每个烘焙视图中找到调用行为字段之一的 Form\
    \ 帮助器函数，并将其从文件中删除。最终应该只保留 `name` 字段，在某些情况下保留 `id` 字段。\n\n接下来，为了让标签具有父节点，Add 和\
    \ Edit 视图必须提供选择父 ID 的方式。为此，在 Add 和 Edit 视图中放置一个包含标签列表的选择菜单。要使此菜单正常工作，首先必须在控制器中生成标签列表，然后在视图中使用\
    \ Form 帮助器渲染选择菜单。打开 `app/controllers/tags_controller.php`，并在 Add 和 Edit 操作中添加以下代码行：\n\
    \n```php\n$tags = $this->Tag->find('list');\n```\n\n现在标签列表作为 `$tags` 数组可用，通过重写\
    \ `set()` 函数将变量传递给视图，以同时包含 `$posts` 和 `$tags`：\n\n```php\n$this->set(compact('posts','tags'));\n\
    ```\n\n在 Add 和 Edit 视图中，使用 Form 帮助器提供选择菜单。请记住，它需要一些额外的参数才能与控制器正确配合。清单 14-13 包含了渲染选择菜单的\
    \ `$form->input()` 函数。将清单 14-13 添加到 `app/views/tags/add.ctp` 和 `app/views/tags/edit.ctp`\
    \ 中，替换原先 Bake 生成的 `parent_id` 表单输入字段。\n\n**清单 14-13.** *Add 和 Edit 视图中的 parent_id\
    \ 选择菜单*\n\n```php\necho $form->input('parent_id',array(\n    'label'=>'Parent\
    \ Tag',\n    'type'=>'select',\n    'options'=>$tags,\n    'empty'=>'- No Parent\
    \ Tag -'\n));\n```\n\n请注意，在清单 14-13 的第 1 行，传递给 Form 帮助器的字段名称是 `parent_id`，对应于\
    \ `tags` 表中的父 ID 字段。清单 14-13 的其余部分包含参数，告诉 Form 帮助器渲染选择菜单（第 3 行）。\n"
- fmt: "使用类型参数（`type parameter`），通过控制器传递的`$tags`数组作为菜单选项（第4行的`options`参数），设置第一个且为`NULL`的菜单选项为“-\
    \ No Parent Tag -”（第5行的`empty`参数），并为菜单指定标签“Parent Tag”以替代默认标签（第2行的`label`参数）。\n\
    \n为了测试标签添加和编辑视图，我们先向`tags`表添加一些类别。为方便起见，我在表14-3中列出了以下名称及其对应的ID；当然，你也可以输入任何你希望的值。\n\
    \n**表14-3.** *用于测试控制器、视图以及最终树形行为的一些示例标签*\n\n| **ID** | **Name** |\n| --- | ---\
    \ |\n| 1 | CakePHP |\n| 2 | PHP |\n| 3 | Programming |\n| 4 | Web |\n| 5 | Frameworks\
    \ |\n\n表14-3展示的标签可以轻松地组织成一个数据树。例如，“CakePHP”作为子节点关联到“PHP”；“PHP”是“Programming”的子节点，“Web”和“Frameworks”也是如此。树形行为（Tree\
    \ behavior）将允许你相应地给每个标签分配父标签。\n\n然而，在此之前，你必须确保`$this->data`数组包含了正确的父级ID名称和值，以便模型能正确地传递选择菜单的结果。如果`$this->data['parent_id']`一开始没有设置，那么所有标签都将没有父级，树形行为也就无法按你的期望管理数据。因此，在编辑（Edit）动作中，使用`debug()`函数来显示`$this->data`的内容，如下所示：\n\
    \n```php\n<? debug($this->data);?>\n```\n\n接下来，通过输入一个与某个标签匹配的URL（例如 `http://localhost/blog/tags/edit/1`）在编辑视图中打开一个标签记录。你应该能看到`debug()`函数显示的`$this->data`，如清单14-14所示。\n\
    \n**清单14-14.** *添加了* `parent_id` *字段和选择菜单后的* `$this->data` *内容*\n\n```php\nArray\n\
    (\n    [Tag] => Array\n        (\n            [id] => 1\n            [parent_id]\
    \ => 2\n            [left] =>\n            [right] =>\n            [name] => CakePHP\n\
    \        )\n\n    [Post] => Array\n        (\n            [0] => Array\n     \
    \           (\n                    [id] => 1\n                    [name] => New\
    \ Cake 1.2 Functions\n                    [date] => 2008-01-01 01:01:01\n    \
    \                 => Some snazzy new functions are now available in 1.2 that you\
    \ should check out!\n                    [user_id] => 1\n                    [PostsTag]\
    \ => Array\n                        (\n                            [id] =>\n \
    \                           [post_id] => 1\n                            [tag_id]\
    \ => 1\n                        )\n                )\n        )\n)\n```\n\n注意，由于`Post`和`Tag`模型中已经设置了`hasAndBelongsToMany`关联，关联的文章会出现在`$this->data['Post']`数组中（清单14-14的第11-27行）。如果当前标签关联了更多文章，这个数组会更大，但清单14-14至少展示了`$this->data`将如何包含这些关联记录。\n\
    \n然而，我在此数组中寻找的不是关联的文章，而是`parent_id`字段。既然我已经从“Parent Tag”选择菜单中选了一个父节点并保存了标签，`$this->data`显示该值已正确保存；清单14-14的第6行显示，当前记录的`parent_id`字段已保存ID值为`2`。\n\
    \n现在“Parent Tag”选择菜单在编辑视图中已正常工作，并能将选中的值保存到`parent_id`字段中。将同样的表单辅助器（`Form` helper）代码粘贴到添加（Add）视图文件中：\n\
    \n```php\necho $form->input('parent_id', array('label'=>'Parent Tag', 'type'=>'select',\
    \ 'options'=>$tags, 'empty'=>'- No Parent Tag -'));\n```\n\n### 当查看标签时获取所有关联文章\n\
    \n添加和编辑视图现在支持分配父标签，模型将其保存在`parent_id`字段中。由于模型表现得像一个数据树（参见清单14-12），树形行为会自动分析`tags`表以及每个标签的父节点ID值，然后分配`left`值和`right`值。在创建和编辑标签时，你现在可以从现有标签列表中选择每个标签的父级，剩下的工作都由树形行为完成。剩下的唯一任务是在用户请求某个标签时，使用树形辅助器（`Tree`\
    \ helper）来检索关联的文章。\n\n使用`children()`函数来执行查找请求，获取提供的标签ID及其所有关联标签。根据我们提供的参数不同，`children()`不仅可以返回这些标签的列表，还可以返回它们所有关联的文章。将`app/controllers/tags_controller.php`中的当前查看（View）动作替换为清单14-15。\n\
    \n**清单14-15.** *包含* `children()` *函数的查看动作*\n\n```php\nfunction view($id = null)\
    \ {\n    if (!$id) {\n        $this->Session->setFlash(__('Invalid Tag.', true));\n\
    \        $this->redirect(array('action'=>'index'));\n    }\n    $children = $this->Tag->children($id,\
    \ null, null, null, null, null, 1);\n    $tag = $this->Tag->read(null, $id);\n\
    \    $this->set(compact('children', 'tag', 'list'));\n}\n```\n\n注意清单14-15的第6行，树形行为的函数`children()`是如何像其他模型函数一样被使用的。如果`Tag`模型中没有将`$actsAs`属性设置为`Tree`，那么这一行将会出错；或者至少模型会在`app/models/tag.php`中寻找一个名为`children()`的自定义函数。但是，由于树形行为已被应用到当前的`Tag`模型上，它的所有函数都可以通过引用模型在控制器中访问，如清单14-15的第6行所示。\n\
    \n让我解释一下`children()`函数。这个函数是树形行为执行之前描述的查找请求，返回给定记录的子节点的方式。\n\n`children( &$model,\
    \ id[mixed], direct[bool], fields[mixed], order[string], limit[int], page[int],\
    \ recursive[int] )`\n\n*   `id`: 父节点记录的ID。\n*   `direct = false`: 是否仅返回直接子节点，还是返回所有子节点。设置为`true`时，仅返回直接的子节点，不返回子节点的子节点；设置为`false`时，将返回当前父节点的任何及所有子节点。\n\
    *   `fields = null`: 可以是单个字段名字符串或字段名数组；用于限制查找查询返回的字段。\n*   `order = null`: SQL排序条件，例如\
    \ `name DESC`；默认为树中的顺序。\n*   `limit = null`: 用于计算每页数据项的数量；以SQL `LIMIT`子句形式输入。\n\
    *   `page = 1`: 页码；用于访问分页数据。\n*   `recursive = -1`: 当获取关联记录时，用于指定返回的深度层级；对应于在模型函数（如`find()`和`read()`）中使用的`recursive`参数。\n\
    \n在清单14-15的第6行，`children()`函数使用了`id`和`recursive`参数调用。通过为中间的其他参数输入`null`值，我指示树形行为在其他方面使用默认值。如果不改变`recursive`参数，该函数只会向控制器提供一个子标签的数组，而不是这些标签及其关联文章的数组。所以，你可以看到第6行将`recursive`值设置为`1`，而不是默认的`-1`。\n\
    \n标签控制器现在向视图提供了一个包含相关标签及其关联文章的数组。让我们在`app/views/tags/view.ctp`文件中遍历这个数组，以显示文章。在此文件的某处（大约在第16行），插入清单14-16，其中包含了这个循环并为每个关联文章显示一个HTML链接。"
