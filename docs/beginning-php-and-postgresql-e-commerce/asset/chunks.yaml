    **Adding Product Recommendations**


    Make sure you understand the data tier logic explained earlier because you’ll
    implement it in the catalog_get_recommendations database function. The only significant
    difference from the queries shown earlier is that you’ll also ask for the product
    description, which will be truncated at a specified number of characters.


    The catalog_get_recommendations database function is called when displaying what
    products were ordered together with the selected product. Follow the steps in
    the next exercise to add the catalog_get_recommendations function to the hatshop
    database.


    **Exercise: Adding the catalog_get_recommendations Function** **1.** Load pgAdmin
    III, and connect to the hatshop database.


    **2.** Click Tools ➤ Query tool (or click the SQL button on the toolbar). A new
    query window should appear.


    **3.** Use the query tool to execute this code, which creates the product_recommendation
    type and the catalog_get_recommendations function in your hatshop database:


    -- Create product_recommendation type


    CREATE TYPE product_recommendation AS


    (


    product_id INTEGER,


    name VARCHAR(50),


    description VARCHAR(1000)


    );


    -- Create catalog_get_recommend+ations function


    CREATE FUNCTION catalog_get_recommendations(INTEGER, INTEGER) RETURNS SETOF product_recommendation
    LANGUAGE plpgsql AS $$


    DECLARE


    inProductId ALIAS FOR $1;


    inShortProductDescriptionLength ALIAS FOR $2;


    outProductRecommendationRow product_recommendation;


