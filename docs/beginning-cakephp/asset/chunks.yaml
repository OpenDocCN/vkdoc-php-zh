  trans: '

    使用 `options` 数组通常比直接使用原始 HTML 更有效。通常，这些辅助函数能提供统一的链接系统或显示机制，从而减少维护应用程序一致性带来的麻烦。此外，习惯辅助函数字符串的视觉和流程后，观感上会更美观，尤其是当你更偏爱
    PHP 语法而非 HTML 标记时。坚持使用辅助函数（即使是自定义的 JavaScript 和 Ajax 调用）最重要的原因，可能是为了防止你的应用程序变成“胶带拼凑体”。换句话说，你在
    Cake 框架中工作，而该框架足够强大，可以减少你的代码量。开发者们常常为了正确处理复杂流程，而满足于使用权宜之计或已被弃用的方法。不要忽视 Cake 辅助函数对你开发流程的贡献。你会发现，它们提供的功能远超你的预期，能帮你攻克难关。


    ## Prototype 还是 jQuery


    近几个月来，jQuery 框架在流行度和功能性上都有了显著提升。


    许多 Cake 开发者一直呼吁 Cake 围绕这个框架而非 Prototype 进行重写。在撰写本文时，有传言称 jQuery 最终将取代 `Ajax` 辅助函数中的
    Prototype。无论情况如何，`Ajax` 辅助函数注定会以相同的方式继续工作；你可能只需要在 `app/webroot/js` 文件夹中安装一个不同的库即可。


    无论 Cake 未来方向如何，这两个框架都提供了一些每个认真的 Ajax 开发者都需要考虑的重要特性。再次强调，你可以通过在各种辅助函数中使用 `options`
    数组来调用它们的功能。例如，使用 jQuery 的表单插件，我可以使用 `Form` 辅助函数上传文件：


    ```

    <?=$form->button(''Upload'',array(''onClick''=>''$(\''#storyEditForm\'').ajaxSubmit({

    target: \''#storyTextUpload\'',url: " .$html->url(''/stories/text'').''\''});
    return

    false;''));?>

    ```


    这个函数显然比这里展示的要复杂得多，但此示例确实说明了如何将 jQuery 函数分配给 `$form->button()` 函数中的 `onClick` 事件。只要我的控制器在
    Ajax 模式下使用 `render()` 函数，Cake 就能像往常一样通过 MVC 结构运行其逻辑，同时还能使用 `Ajax` 辅助函数之外的 Ajax
    库。


    ## 使用 jQuery 上传文件


    我们不可能探索 Cake 中所有可用的 Ajax 方法。然而，Web 应用程序最常见的需求之一是某种文件上传。这个任务可能相当繁琐，尤其是当你想要使用 Ajax
    管理文件上传时。由于序列化 HTML 表单的方式，许多 Ajax 框架不支持文件输入元素。JavaScript 无法将文件内容放入字符串中，而这正是许多框架提交表单数据的方式。幸运的是，jQuery
    的 Form 插件可以处理文件上传，使得将上传功能与 Ajax 集成成为可能。


    由于 jQuery 目前不是默认 `Ajax` 辅助函数的一部分，为你的博客添加文件上传功能将演示如何将非 Prototype 框架集成到 Cake 中。


    ### 安装 jQuery 和 Form 插件


    请记住，你必须手动安装需要调用的 JavaScript 库。下载最新版本的 jQuery 以及 Form 插件。以下链接应能帮助你找到这些文件：


    *   jQuery：[`docs.jquery.com/Downloading_jQuery`](http://docs.jquery.com/Downloading_jQuery)

    *   Form 插件：[`jqueryjs.googlecode.com/svn/trunk/plugins/form/`](http://jqueryjs.googlecode.com/svn/trunk/plugins/form)
    `jquery.form.js`


    接下来，你必须将必要的文件放入 `app/webroot/js` 目录，并让它们在默认布局中可用。麻烦在于，jQuery 可能会与你用来提供评论投票和提交功能的
    Prototype 发生冲突，所以让我们在默认布局中添加一些逻辑，以检测当前正在运行的是 `Posts Add` 操作还是其他操作。

    '
- fmt: "打开默认布局文件（`app/views/layouts/default.ctp`），并将引用 Prototype 的 JavaScript 辅助函数行替换为以下代码：\n\
    \n```php\n<?=($this->params['controller'] == 'posts' && $this->params['action']\
    \ == 'add' ? $javascript->link(array('jquery.js','jquery.form.js')) : $javascript->link('prototype'));?>\n\
    ```\n\n现在，当执行“Posts Add”操作时，jQuery 将被初始化，而不是 Prototype。但 Prototype 仍将是所有其他操作的默认脚本，从而避免与评论区冲突。\n\
    \n## 创建 Posts Add 操作\n\n假设博客作者已在纯文本文件中写好了一篇文章，并希望将其上传到博客。让我们创建一个文件上传机制，该机制可以分析纯文本文件，并将其内容插入到“Posts\
    \ Add”操作的“Content”字段中，从而简化新文章的创建过程。\n\n打开`app/views/posts/add.ctp`文件（该文件应该已经通过烘焙生成），并将其内容替换为列表\
    \ 8-16。\n\n**列表 8-16.** *添加操作中的文件上传功能*\n\n```php\n<div class=\"posts form\">\n\
    <?=$form->create('Post',array('name'=>'postAddForm','id'=>'postAddForm','type'=>'file'));?>\n\
    <fieldset>\n<legend>Add Post</legend>\n<?=$form->input('name');?>\n<?=$form->input('date');?>\n\
    <?=$form->input('content');?>\n<div id=\"postTextUpload\">\n<?=$form->input('content',\
    \ array('label'=>'Content ','rows'=>'15','cols'=>'75'));?>\n<?=$form->input('upload_text',array('label'=>'Upload\
    \ Text File ','type'=>'file'));?>\n<?=$form->button('Upload Text',array('onClick'=>'$(\\\
    '#postAddForm\\').ajaxSubmit({target: \\'#postTextUpload\\', url: \\\"'.$html->url('/posts/text').'\\\
    '});return false;'));?>\n</div>\n<?=$form->input('User');?>\n<?=$form->input('Tag',array('type'=>'select','multiple'=>'checkbox'));?>\n\
    </fieldset>\n<?=$form->end('Submit');?>\n</div>\n```\n\n列表 8-15 的第 2 行将表单的 ID\
    \ 设置为`postAddForm`，jQuery 将需要此 ID 来收集表单数据。此行还将`type`属性设置为`file`，以便表单包含`enctype=\"\
    multipart/form-data\"`属性，确保表单提交正常工作。\n\n请注意，我从第 8 行开始，用一个`<div>`元素包裹了“Content”字段，这样在文件上传后，我可以用已填充内容的字段替换当前字段。\n\
    \n第 10 行包含了实际的文件输入字段。使用 Form 辅助函数时，只需指定`input`的`type`等于`file`，即可渲染一个文件输入字段。\n\n\
    第 11 行是所有 Ajax 发生的地方。通过将`onClick`属性设置为一个包含所有必要代码的 jQuery 格式字符串，Form 辅助函数将能够渲染一个按钮，该按钮包含通过\
    \ jQuery 执行 Ajax 方法所需的 JavaScript。此语法遵循 jQuery Form 插件中使用的表单提交方法。\n\n## 创建 Posts\
    \ Controller Text 操作\n\n当用户选择了文件并点击“Upload Text”按钮时，jQuery 会将整个表单提交到 Posts 控制器中的`text`操作，这得益于你在`onClick`事件中编写的\
    \ URL 参数。\n\n因此，在`app/controllers/posts_controller.php`文件中，你需要包含列表 8-17 中所示的函数。\n\
    \n**列表 8-17.** *Posts 控制器中的 Text 操作*\n\n```php\nfunction text() {\n    if (!$this->data['Post']['upload_text'])\
    \ {\n        $this->set('error','You must select a text (.txt) file before you\
    \ can upload.');\n        $this->render('text','ajax');\n    } else {\n      \
    \  App::import('Core','File');\n        $file =& new File($this->data['Post']['upload_text']['tmp_name']);\n\
    \        if ($this->data['Post']['upload_text']['type'] != 'text/plain') {\n \
    \           $this->set('error','You may only upload text (.txt) files.');\n  \
    \          $this->render('text','ajax');\n        } else {\n            $data\
    \ = h($file->read());\n            $file->close();\n            $this->set('text',$data);\n\
    \            $this->render('text','ajax');\n        }\n    }\n}\n```\n\n列表 8-17\
    \ 的第 2 行检查`upload_file`字段中是否有任何内容。文件上传仍然会被 Cake 自动解析，这比使用 PHP 的`$_FILES`数组更安全。\n\
    \n为了简化文件处理，Cake 核心包含了一系列`File`类函数。但是，要在控制器中使用这些函数，由于它们不是组件类、辅助函数或其他 Cake 元素，你必须实例化一个新的`File`类；这在第\
    \ 6 行通过`App::import()`函数完成。在第 7 行，`File`实用程序被赋值给`$file`作为一个类对象；现在，在整个操作中，`$file`对象将为你提供\
    \ Cake 的核心`File`函数。此外，`$file`对象将代表上传的文件本身，因此当你需要操作上传时，将数据保存到服务器会容易得多。\n\n第 8 行检查文件是否为正确的\
    \ MIME 类型（纯文本文件为“text/plain”）。第 12-15 行处理文件本身。现在，在此操作中，你只需要检索文件的内容，并将其在“Contents”字段中提供。因此，第\
    \ 12 行读取文件并将内容放入`$data`变量。第 13 行关闭文件，第 14-15 行使`$data`变量在`app/views/posts/text.ctp`视图文件中可用。第\
    \ 15 行负责以 Ajax 模式渲染视图，从而避免触发 Cake 的同步渲染引擎。\n\n剩下的工作就是用一个新的、已填充内容的字段替换“Content”字段；这在“Text”视图文件中完成，你尚未创建该文件。\n\
    \n## 编写 Text 视图\n\n创建`app/views/posts/text.ctp`文件，并将列表 8-18 粘贴到其中。\n\n**列表 8-18.**\
    \ *Text 视图文件*\n\n```php\n<? if (!empty($error)): ?>\n<p><?=$error;?></p>\n<?=$form->input('Post.content',\
    \ array('label'=>'Content','rows'=>'15','cols'=>'75'));?>\n<? else: ?>\n<p>Upload\
    \ successful</p>\n<?=$form->input('Post.content',array('label'=>'Current Text\
    \ ','value'=>$text,'rows'=>'15','cols'=>'75'));?>\n<? endif;?>\n<?=$form->input('Post.upload_text',array('label'=>'Upload\
    \ Text File ', 'type'=>'file'));?>\n<?=$form->button('Upload Text',array('onClick'=>'$(\\\
    '#postAddForm\\').ajaxSubmit({target: \\'#postTextUpload\\',url: \\\"'.$html->url('/posts/text').'\\\
    \"}); return false;'));?>\n```\n\n列表 8-16 模仿了“Posts Add”视图，只是它添加了一个错误检查（并显示错误消息），并将文件上传内容（从控制器中的`$text`数组获得）提供给“Content”字段。\n\
    \n现在，你应该能够上传纯文本文件的内容，并使其在“Add”操作中立即可用，而无需重新加载页面。得益于 jQuery 及其 Form 插件，你可以通过 Ajax\
    \ 实现这一点。不幸的是，Ajax 辅助函数尚不支持 jQuery 函数或文件上传，因此你必须在`onClick`属性中提供 JavaScript 函数来实现此功能。\n\
    \n## 更多 Ajax 功能\n\nAjax 的世界在不断扩展。一些开源项目已经将以前昂贵或复杂的库提供给了大众。随着 Ajax 方法的不断改进，你可以放心，Cake\
    \ 的架构将始终对 Ajax 保持开放，并允许将这些方法引入你的 Cake 应用程序中。将`onClick`和其他 DOM 事件硬编码到代码中，无疑扩展了\
    \ Cake 应用程序的能力，但通过练习使用其他 Ajax 辅助函数，你可以用 Cake 处理大多数常见的 Ajax 流程。\n\n## 总结\n\n在本章中，我们讨论了\
    \ Cake 如何通过其内置的 Ajax 辅助函数简化 Ajax 方法。"
  raw: 'Open the default layout (app/views/layouts/default.ctp), and replace the JavaScript
    helper line referencing Prototype with the following line:


    <?=($this->params[''controller''] == ''posts'' && $this->params[''action''] ==
    ➥


    ''add'' ? $javascript->link(array(''jquery.js'',''jquery.form.js'')) : $javascript->➥


    link(''prototype''));?>


    Now when the Posts Add action is fired, jQuery will be initialized, not Prototype.
    But Prototype will remain the default script for all other actions, thus not conflicting
    with the comments section.


    **Creating the Posts Add Action**


    Perhaps an author of the blog has already typed a post in a plain-text file and
    wants to upload it to the blog. Let’s create a file upload mechanism that can
    analyze a plain-text file and insert it into the Content field in the Posts Add
    action to facilitate creating new posts.


    Open the app/views/posts/add.ctp file (which should have already been baked) and
    replace its contents with Listing 8-16.


    09775ch08final 7/1/08 9:47 PM Page 132


    **132**


    C H A P T E R 8 ■ I M P L E M E N T I N G A J A X F E AT U R E S


    **Listing 8-16.** *The File Upload Feature in the Add Action*


    <div class="posts form">


    <?=$form->create(''Post'',array(''name''=>''postAddForm'',''id''=>''postAddForm'',➥


    ''type''=>''file''));?>


    <fieldset>


    <legend>Add Post</legend>


    <?=$form->input(''name'');?>


    <?=$form->input(''date'');?>


    <?=$form->input(''content'');?>


    <div id="postTextUpload">


    <?=$form->input(''content'', array(''label''=>''Content '',''rows''=>''15'',➥


    ''cols''=>''75''));?>


    10 <?=$form->input(''upload_text'',array(''label''=>''Upload Text File '',➥


    ''type''=>''file''));?>


    <?=$form->button(''Upload Text'',array(''onClick''=>➥


    ''$(\''#postAddForm\'').ajaxSubmit({target: \''#postTextUpload\'',➥


    url: \"''.$html->url(''/posts/text'').''\''});return false;''));?> 12


    </div>


    13 <?=$form->input(''User'');?>


    <?=$form->input(''Tag'',array(''type''=>''select'',''multiple''=>''checkbox''));?>
    15


    </fieldset>


    <?=$form->end(''Submit'');?>


    </div>


    Line 2 of Listing 8-15 assigns the form the ID of postAddForm, which will be needed
    for jQuery to collect the form data. This line also sets the type attribute to
    file so that the form includes the enctype="multipart/form-data" attribute for
    the form submission to work correctly.


    Notice that I’ve wrapped a <div> element around the Content field starting on
    line 8 so that I can replace the current field with a filled one after the file
    is uploaded.


    Line 10 contains the actual file input field. With the Form helper, you need specify
    only that the input type is equal to file to render a file input field.


    Line 11 is where all the Ajax happens. By setting the onClick attribute to a jQuery-formatted
    string containing all the necessary code, the Form helper will be able to render
    a button containing the necessary JavaScript to execute an Ajax method through
    jQuery. This syntax follows the form submission method used in the jQuery Form
    plugin.


    **Creating the Posts Controller Text Action**


    When the file is chosen and the user clicks the Upload Text button, jQuery will
    submit the whole form to the text action in the Posts controller because of the
    URL parameter you wrote in the onClick event.


    So, in the app/controllers/posts_controller.php file, you’ll need to include the
    function shown in Listing 8-17.


    09775ch08final 7/1/08 9:47 PM Page 133


    C H A P T E R 8 ■ I M P L E M E N T I N G A J A X F E AT U R E S


    **133**


    **Listing 8-17.** *The Text Action in the Posts Controller*


    function text() {


    if (!$this->data[''Post''][''upload_text'']) {


    $this->set(''error'',''You must select a text (.txt) file before you ➥


    can upload.'');


    $this->render(''text'',''ajax'');


    } else {


    App::import(''Core'',''File'');


    $file =& new File($this->data[''Post''][''upload_text''][''tmp_name'']); 8


    if ($this->data[''Post''][''upload_text''][''type''] != ''text/plain'') {


    $this->set(''error'',''You may only upload text (.txt) files.'');


    $this->render(''text'',''ajax'');


    } else {


    $data = h($file->read());


    $file->close();


    $this->set(''text'',$data);


    $this->render(''text'',''ajax'');


    }


    }


    18 }


    Line 2 of Listing 8-17 checks for any contents in the upload_file field. File
    uploads will still be automatically parsed by Cake, which is more secure than
    using the PHP $_FILES array.


    To facilitate file handling, Cake’s core includes a series of File class functions.
    But to use these functions in the controller, since they’re not component classes,
    helpers, or other Cake elements, you must instantiate a new File class; this is
    done in line 6 with the App::import() function. On line 7, the File utility is
    assigned to $file as a class object; now, throughout the action, the $file object
    will provide you with Cake’s core File functions. Also, the $file object will
    represent the uploaded file itself, so when you have to maneuver through the upload,
    it will be much easier to save the data to the server.


    Line 8 checks to see whether the file is the right MIME type (“text/plain” for
    plain-text files). Lines 12–15 handle the file itself. Now, in this action, you
    need only to retrieve the contents of the file and make them available in the
    Contents field. So line 12 just reads the file and places the contents in the
    $data variable. Line 13 closes out the file, and lines 14–15 make the $data variable
    available in the app/views/posts/text.ctp view file. Line 15 takes care to render
    the view in Ajax mode so as to not trigger Cake’s synchronous rendering engine.


    All that’s left is to swap out the Content field with a new propagated one; this
    is done in the Text view file, which you haven’t created yet.


    **Writing the Text View**


    Create the app/views/posts/text.ctp file, and paste Listing 8-18 into it.


    09775ch08final 7/1/08 9:47 PM Page 134


    **134**


    C H A P T E R 8 ■ I M P L E M E N T I N G A J A X F E AT U R E S


    **Listing 8-18.** *The Text View File*


    <? if (!empty($error)): ?>


    <p><?=$error;?></p>


    <?=$form->input(''Post.content'', array(''label''=>''Content'',''rows''=>''15'',➥


    ''cols''=>''75''));?>


    <? else: ?>


    <p>Upload successful</p>


    <?=$form->input(''Post.content'',array(''label''=>''Current Text '',➥


    ''value''=>$text,''rows''=>''15'',''cols''=>''75''));?>


    <? endif;?>


    <?=$form->input(''Post.upload_text'',array(''label''=>''Upload Text File '', ➥


    ''type''=>''file''));?>


    <?=$form->button(''Upload Text'',array(''onClick''=>''$(\''#postAddForm\'')➥


    .ajaxSubmit({target: \''#postTextUpload\'',url: \"''.$html->url(''/posts/text'')➥


    .''\''}); return false;''));?>


    Listing 8-16 mimics the Posts Add view, except that it adds an error check (and
    displays the error message) and supplies the Content field with the file upload
    contents (available in the $text array from the controller).


    Now you should be able to upload the contents of a plain-text file and make them
    available instantly in the Add action without reloading the page. Thanks to jQuery
    and its Form plugin, you can do this in Ajax. Unfortunately, the Ajax helper doesn’t
    allow for jQuery functions or file uploads yet, so you had to provide the JavaScript
    functions to make it happen in the onClick attribute.


    **More Ajax Features**


    The world of Ajax is continually expanding. Several open source projects have
    made previously expensive or complex libraries available to the masses. As Ajax
    methods continue to improve, you can rest assured that Cake’s structure will remain
    open to Ajax and allow those methods to be brought into your Cake applications.
    Hard-coding the onClick and other DOM


    events certainly extends the capabilities of the Cake application, but by practicing
    with other Ajax helper functions, you can take care of most common Ajax processes
    with Cake.


    **Summary**


    In this chapter, we discussed how Cake simplifies Ajax methods with its built-in
    Ajax helper.'
