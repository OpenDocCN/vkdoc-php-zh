- fmt: "It’s not essential to put the opening and closing brackets on separate lines,\
    \ nor to align the `=>` operators as I have done, but it makes code easier to\
    \ read and maintain.\n\n**Tip**  \nBoth the shorthand syntax and `array()` permit\
    \ a single trailing comma after the last array element. This applies equally to\
    \ indexed and associative arrays.\n\n## Creating an Empty Array\n\nThere are two\
    \ reasons you might want to create an empty array, as follows:\n\n- To create\
    \ (or **initialize**) an array so that it’s ready to have elements added to it\
    \ inside a loop\n- To clear all elements from an existing array\n\nTo create an\
    \ empty array, just use an empty pair of square brackets:\n\n```\n$shoppingList\
    \ = [];\n```\n\nAlternatively, use `array()` with nothing between the parentheses,\
    \ like this:\n\n```\n$shoppingList = array();\n```\n\nThe `$shoppingList` array\
    \ now contains no elements. If you add a new one using `$shoppingList[]`, it will\
    \ automatically start numbering again at 0.\n\n## Multidimensional Arrays\n\n\
    Array elements can store any data type, including other arrays. You could create\
    \ an array of arrays—in other words, a multidimensional array—with details of\
    \ several books, like this (using shorthand syntax):\n\n```\n$books = [\n[\n'title'\
    \     => 'PHP 7 Solutions: Dynamic Web Design Made Easy, Fourth Edition',\n'author'\
    \    => 'David Powers'\n],\n[\n'title'     => 'Learn PHP 7',\n'author'    => 'Steve\
    \ Prettyman'\n]\n];\n```\n\nThis example shows associative arrays nested inside\
    \ an indexed array, but multidimensional arrays can nest either type. To refer\
    \ to a specific element, use the key of both arrays, for example:\n\n```\n$books[1]['author']\
    \  // value is 'Steve Prettyman'\n```\n\nWorking with multidimensional arrays\
    \ isn’t as difficult as it first looks. The secret is to use a loop to get to\
    \ the nested array. Then you can work with it in the same way as an ordinary array.\
    \ This is how you handle the results of a database search, which is normally contained\
    \ in a multidimensional array.\n\n## Using `print_r()` to inspect an array\n\n\
    Pass the array to `print_r()` like this to inspect its contents during testing\
    \ (see `inspect_array.php`):\n\n```\nprint_r($books);\n```\n\nOften, it helps\
    \ to switch to source view to inspect the details, as browsers ignore indenting\
    \ in the underlying output.\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figd_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Figd_HTML.jpg)\n\
    \n**Tip**  \nAlways use `print_r()` to inspect arrays. `echo` and `print` don’t\
    \ work. To display the contents of an array in a web page, use a `foreach` loop,\
    \ as described later in this chapter.\n\n## The truth according to PHP\n\nDecision-making\
    \ in PHP conditional statements is based on the mutually exclusive Boolean values\
    \ of `true` and `false`. If the condition equates to `true`, the code within the\
    \ conditional block is executed. If `false`, it’s ignored. Whether a condition\
    \ is `true` or `false` is determined in one of these ways:\n\n- A variable set\
    \ explicitly to one of the Boolean values\n- A value PHP interprets implicitly\
    \ as `true` or `false`\n- The comparison of two non-Boolean values\n\n### Explicit\
    \ Boolean values\n\nIf a variable is assigned the value `true` or `false` and\
    \ is used in a conditional statement, the decision is based on that value. The\
    \ keywords `true` and `false` are case-insensitive and must not be enclosed in\
    \ quotes, for example:\n\n```\n$ok = false;\nif ($ok) {\n// do something\n}\n\
    ```\n\nThe code inside the conditional statement won’t be executed, because `$ok`\
    \ is `false`.\n\n### Implicit Boolean (“truthy” and “falsy”) values\n\nUsing implicit\
    \ Boolean values provides a convenient shorthand, although it has the disadvantage—at\
    \ least to beginners—of being less clear. Implicit Boolean values—or “truthy”\
    \ and “falsy” values, as they’re sometimes called—rely on PHP’s relatively narrow\
    \ definition of what it regards as `false`, namely:\n\n- The case-insensitive\
    \ keywords `false` and `null`\n- Zero as an integer (`0`), a floating-point number\
    \ (`0.0`), or a string (`'0'` or `\"0\"`)\n- An empty string (single or double\
    \ quotes with no space between them)\n- An empty array\n- SimpleXML objects created\
    \ from empty tags\n\nEverything else is `true`.\n\n**Tip**  \nThis explains why\
    \ PHP interprets `\"false\"` (in quotes) as `true`. It’s a string, and all strings—except\
    \ an empty one—are `true`. Also note that `–1` is considered `true` like any other\
    \ non-zero number.\n\n## Making decisions by Comparing Two Values\n\nMany `true/false`\
    \ decisions are based on a comparison of two values using **comparison operators**.\
    \ Table 4-6 lists the comparison operators used in PHP.\n\n**Table 4-6. PHP comparison\
    \ operators used for decision-making**\n\n| Symbol | Name | Example | Result |\n\
    | --- | --- | --- | --- |\n| `==` | Equality | `$a == $b` | Returns `true` if\
    \ `$a` and `$b` are equal; otherwise, returns `false` |\n| `!=` | Inequality |\
    \ `$a != $b` | Returns `true` if `$a` and `$b` are different; otherwise, returns\
    \ `false` |\n| `===` | Identical | `$a === $b` | Determines whether `$a` and `$b`\
    \ are identical. They must not only have the same value but also must be of the\
    \ same data type (e.g., both integers) |\n| `!==` | Not identical | `$a !== $b`\
    \ | Determines whether `$a` and `$b` are not identical (according to the same\
    \ criteria as the previous operator) |\n| `>` | Greater than | `$a > $b` | Returns\
    \ `true` if `$a` is greater than `$b` |\n| `>=` | Greater than or equal to | `$a\
    \ >= $b` | Returns `true` if `$a` is greater than or equal to `$b` |\n| `<` |\
    \ Less than | `$a < $b` | Returns `true` if `$a` is less than `$b` |\n| `<=` |\
    \ Less than or equal to | `$a <= $b` | Returns `true` if `$a` is less than or\
    \ equal to `$b` |\n| `<=>` | Spaceship | `$a <=> $b` | Returns an integer less\
    \ than zero if `$a` is less than `$b`, an integer greater than zero if `$a` is\
    \ greater than `$b`, or zero if `$a` and `$b` are equal |\n\nAs you’ll see in\
    \ Chapter 9, the spaceship operator is useful for custom sorting. It gets its\
    \ name from the author of books on Perl, where the operator originated. He decided\
    \ it was easier than constantly referring to the “less-than-equal-to-or-greater-than\
    \ operator.”\n\n**Caution**  \nA single equal sign doesn’t perform comparisons;\
    \ it assigns a value. When comparing two values, always use the equality operator\
    \ (`==`), the identical operator (`===`), or their negative equivalents (`!=`\
    \ and `!==`).\n\n## Testing more than one condition\n\nFrequently, comparing two\
    \ values is not enough. PHP allows you to set a series of conditions using **logical\
    \ operators** to specify whether all or just some need to be fulfilled.\n\nThe\
    \ most important logical operators in PHP are listed in Table 4-7. The logical\
    \ Not operator applies to individual conditions rather than to a series.\n\n**Table\
    \ 4-7. The main logical operators used for decision-making in PHP**\n\n| Symbol\
    \ | Name | Example | Result |\n| --- | --- | --- | --- |\n| `&&` | And | `$a &&\
    \ $b` | Equates to `true` if both `$a` and `$b` are `true` |\n| `||` | Or | `$a\
    \ || $b` | Equates to `true` if either `$a` or `$b` is `true`; otherwise, `false`\
    \ |\n| `!` | Not | `!$a` | Equates to `true` if `$a` is *not* `true` |\n\nTechnically\
    \ speaking, there is no limit to the number of conditions that can be tested.\
    \ Each condition is considered in turn from left to right, and as soon as a defining\
    \ point is reached, no further testing is carried out. When using `&&`, every\
    \ condition must be fulfilled, so testing stops as soon as one turns out to be\
    \ `false`. Similarly, when using `||`, only one condition needs to be fulfilled,\
    \ so testing stops as soon as one turns out to be `true`.\n\n```\n$a = 10;\n$b\
    \ = 25;\nif ($a > 5 && $b > 20) // returns true\nif ($a > 5 || $b > 30) // returns\
    \ true, $b never tested\n```"
