  raw: '### Name


    Names matter. They enrich the language of programmers; a few short words can stand
    in for quite complex problems and solutions. They must balance brevity and description.
    The Gang of Four claims, “Finding good names has been one of the hardest parts
    of developing our catalog.”


    Martin Fowler agrees: “Pattern names are crucial, because part of the purpose
    of patterns is to create a vocabulary that allows developers to communicate more
    effectively” (Patterns of Enterprise Application Architecture, Addison-Wesley
    Professional, 2002).


    In Patterns of Enterprise Application Architecture, Martin Fowler refines a database
    access pattern I first encountered in Core J2EE Patterns by Deepak Alur, Dan Malks,
    and John Crupi (Prentice Hall, 2001). Fowler defines two patterns that describe
    specializations of the older pattern. The logic of his approach is clearly correct
    (one of the new patterns models domain objects, while the other models database
    tables, a distinction that was vague in the earlier work). Nonetheless, it was
    hard to train myself to think in terms of the new patterns. I had been using the
    name of the original in design sessions and documents for so long that it had
    become part of my language.


    ### The Problem


    No matter how elegant the solution (and some are very elegant indeed), the problem
    and its context are the grounds of a pattern. Recognizing a problem is harder
    than applying any one of the solutions in a pattern catalog. This is one reason
    that some pattern solutions can be misapplied or overused.


    Patterns describe a problem space with great care. The problem is described in
    brief and then contextualized, often with a typical example and one or more diagrams.
    It is broken down into its specifics, its various manifestations. Any warning
    signs that might help in identifying the problem are described.


    ### The Solution


    The solution is summarized initially in conjunction with the problem. It is also
    described in detail, often using UML class and interaction diagrams. The pattern
    usually includes a code example.


    Although code may be presented, the solution is never cut-and-paste. The pattern
    describes an approach to a problem. There may be hundreds of nuances in its implementation.
    Think about instructions for sowing a food crop. If you simply follow a set of
    steps blindly, you are likely to go hungry come harvest time. More useful would
    be a pattern-based approach that covers the various conditions that may apply.
    The basic solution to the problem (making your crop grow) will always be the same
    (prepare soil, plant seeds, irrigate, harvest crop), but the actual steps you
    take will depend on all sorts of factors, such as your soil type, your location,
    the orientation of your land, local pests, and so on.


    Martin Fowler refers to solutions in patterns as “half-baked.” That is, the coder
    must take away the concept and finish it for himself.


    ### Consequences


    Every design decision you make will have wider consequences . This should include
    the satisfactory resolution of the problem in question, of course. A solution,
    once deployed, may be ideally suited to work with other patterns. There may also
    be dangers to watch for.


    ## The Gang of Four Format


    As I write, I have five pattern catalogs on the desk in front of me. A quick look
    at the patterns in each confirms that none of them use the same structure. Some
    are formal; some are fine-grained, with many subsections; and others are discursive.


    There are a number of well-defined pattern structures, including the original
    form developed by Christopher Alexander (the Alexandrian form), and the narrative
    approach favored by the Portland Pattern Repository (the Portland form). Because
    the Gang of Four book is so influential, and because we will cover many of the
    patterns they describe, let’s examine a few of the sections they include in their
    patterns:


    *   Intent: A brief statement of the pattern’s purpose. You should be able to
    see the point of the pattern at a glance.

    *   Motivation: The problem described, often in terms of a typical situation.
    The anecdotal approach can help make the pattern easy to grasp.

    *   Applicability: An examination of the different situations in which you might
    apply the pattern. While the motivation describes a typical problem, this section
    defines specific situations and weighs the merits of the solution in the context
    of each.

    *   Structure/Interaction: These sections may contain UML class and interaction
    diagrams describing the relationships among classes and objects in the solution.

    *   Implementation: This section looks at the details of the solution. It examines
    any issues that may come up when applying the technique and provides tips for
    deployment.

    *   Sample Code: I always skip ahead to this section. I find that a simple code
    example often provides a way into a pattern. The example is often chopped down
    to the basics in order to lay the solution bare. It could be in any object-oriented
    language. Of course, in this book, it will always be PHP.

    *   Known Uses: These describe real systems in which the pattern (problem, context,
    and solution) occurs. Some people say that for a pattern to be genuine, it must
    be found in at least three publicly available contexts. This is sometimes called
    the “rule of three.”

    *   Related Patterns: Some patterns imply others. In applying one solution, you
    can create the context in which another becomes useful. This section examines
    these synergies. It may also discuss patterns that have similarities to the problem
    or the solution, as well as any antecedents (i.e., patterns defined elsewhere
    on which the current pattern builds).


    ## Why Use Design Patterns?


    So what benefits can patterns bring? Given that a pattern is a problem defined
    and a solution described, the answer should be obvious. Patterns can help you
    to solve common problems. There is more to patterns, of course.


    ### A Design Pattern Defines a Problem


    How many times have you reached a stage in a project and found that there is no
    going forward? Chances are you must backtrack some way before starting out again.


    By defining common problems, patterns can help you to improve your design. Sometimes,
    the first step to a solution is recognizing that you have a problem.


    ### A Design Pattern Defines a Solution


    Having defined and recognized the problem (and made certain that it is the right
    problem), a pattern gives you access to a solution, together with an analysis
    of the consequences of its use. Although a pattern does not absolve you of the
    responsibility to consider the implications of a design decision, you can at least
    be certain that you are using a tried-and-tested technique .


    ### Design Patterns Are Language Independent


    Patterns define objects and solutions in object-oriented terms. This means that
    many patterns apply equally in more than one language. When I first started using
    patterns, I read code examples in C++ and Smalltalk, and then deployed my solutions
    in Java. Others transfer with modifications to the pattern’s applicability or
    consequences, but remain valid. Either way, patterns can help you as you move
    between languages. Equally, an application that is built on good object-oriented
    design principles can be relatively easy to port between languages (although there
    are always issues that must be addressed).'
  trans: '

    ### 命名


    命名至关重要。它们丰富了程序员的语言；短短几个词就能代表相当复杂的问题和解决方案。


    命名必须在简洁与描述性之间取得平衡。四人帮（Gang of Four）声称：“找出好名字一直是开发我们目录时最困难的部分之一。”马丁·福勒（Martin Fowler）对此表示赞同：“模式名称至关重要，因为模式的其中一个目的是创造一种词汇表，让开发者能够更有效地沟通”（*《企业应用架构模式》*，Addison-Wesley
    Professional，2002 年）。

    在*《企业应用架构模式》*中，马丁·福勒完善了一种我最初在迪帕克·阿卢尔（Deepak Alur）、丹·马尔克斯（Dan Malks）和约翰·克鲁皮（John
    Crupi）合著的*《Core J2EE Patterns》*（Prentice Hall，2001 年）中遇到的数据库访问模式。福勒定义了两种模式来描述对旧有模式的专门化。他方法的逻辑显然正确（一种新模式对领域对象建模，而另一种对数据库表建模，这是早期作品中模糊不清的区别）。尽管如此，我很难训练自己用新模式的术语进行思考。在设计会议和文档中，我使用原模式名称如此之久，以至于它已经成为了我语言的一部分。


    ### 问题


    无论解决方案多么优雅（有些确实非常优雅），问题及其上下文都是模式的根基。识别问题比应用模式目录中的任何一个解决方案都要困难。这也是某些模式解决方案可能被误用或滥用的原因之一。

    模式会极其细致地描述问题空间。问题会先被简要描述，然后结合上下文，通常附带一个典型示例和一张或多张图表。问题被分解为其具体细节和多种表现形式。任何有助于识别问题的警示信号都会被描述出来。


    ### 解决方案


    解决方案起初会与问题一同被概述。它也会被详细描述，通常使用 UML 类图和交互图。模式通常会包含一个代码示例。

    尽管可能会呈现代码，但解决方案绝非可复制粘贴之物。模式描述的是解决问题的一种方法。其实现可能有数百种细微差别。想想播种粮食作物的说明。如果你盲目地遵循一系列步骤，到了收获季节很可能就会挨饿。更有用的是一种基于模式的方法，它涵盖了可能适用的各种条件。解决问题的基本方案（让作物生长）总是相同的（准备土壤、播种、灌溉、收获作物），但你实际采取的步骤将取决于各种因素，例如你的土壤类型、地理位置、土地朝向、当地害虫等等。

    马丁·福勒将模式中的解决方案称为“半成品”。也就是说，程序员必须理解概念并自行完成它。


    ### 后果


    你所做的每一个设计决策都会产生更广泛的影响。当然，这应包括令人满意地解决所讨论的问题。一个解决方案一旦被部署，可能非常适合与其他模式协同工作。也可能存在需要注意的风险。


    ## 四人帮（Gang of Four）格式


    在我写作时，面前的书桌上放着五本模式目录。快速浏览每本目录中的模式，确认它们没有使用相同的结构。有些是正式的；有些是细粒度的，包含许多子章节；另一些则是散漫的讨论式。

    有几种定义良好的模式结构，包括克里斯托弗·亚历山大（Christopher Alexander）开发的原始形式（亚历山大形式），以及波特兰模式知识库（Portland
    Pattern Repository）偏爱的叙述式方法（波特兰形式）。由于四人帮的书极具影响力，并且我们将涵盖他们描述的许多模式，让我们检视一下他们在模式中包含的几个部分：


    - **意图（Intent）**：对模式目的的简要陈述。你应该能够一眼看出模式的要点。

    - **动机（Motivation）**：描述的问题，通常以一个典型场景的形式呈现。这种铁事式的方法有助于使模式易于理解。

    - **适用性（Applicability）**：审视你可能应用该模式的不同情景。虽然动机描述了一个典型问题，但本节定义了特定情景，并权衡了解决方案在每个情景中的优点。

    - **结构/交互（Structure/Interaction）**：这些部分可能包含描述解决方案中类与对象间关系的 UML 类图和交互图。

    - **实现（Implementation）**：本节着眼于解决方案的细节。它审视了应用该技术时可能出现的任何问题，并提供了部署技巧。

    - **示例代码（Sample Code）**：我总是直接跳到这一部分。我发现一个简单的代码示例往往能提供进入一个模式的途径。示例通常被精简至最基本部分，以揭示解决方案的本质。它可以是任何面向对象语言。当然，在本书中，它将始终是
    PHP。

    - **已知应用（Known Uses）**：这些描述出现该模式（问题、上下文和解决方案）的真实系统。有人说，要使一个模式真正有效，它必须至少在三个公开可用的环境中被发现。这有时被称为“三条原则”。

    - **相关模式（Related Patterns）**：一些模式隐含着其他模式。在应用一个解决方案时，你可以创建另一个解决方案变得有用的上下文。本节审视这些协同效应。它还可能讨论与问题或解决方案有相似之处的模式，以及任何先例（即，在其他地方定义的、当前模式所依赖的模式）。


    ## 为什么使用设计模式？


    那么模式能带来什么好处呢？既然模式是定义好的问题和描述好的解决方案，答案应该是显而易见的。模式可以帮助你解决常见问题。当然，模式的意义不止于此。


    ### 设计模式定义一个问题


    有多少次你到达项目的一个阶段，却发现无路可进？在重新开始之前，你很可能需要先退后几步。

    通过定义常见问题，模式可以帮助你改进设计。有时，解决问题第一步就是认识到你遇到了问题。


    ### 设计模式定义一个解决方案


    在定义并识别出问题（并确保它是正确的问题）之后，模式能为你提供一个解决方案，并附带对其使用后果的分析。尽管模式并不能免除你考虑设计决策影响的责任，但至少你可以确信你正在使用一种经过检验的技术。


    ### 设计模式与语言无关


    模式用面向对象的术语定义对象和解决方案。这意味着许多模式同等适用于多种语言。当我刚开始使用模式时，我阅读的是 C++和 Smalltalk 的代码示例，然后在我的
    Java 解决方案中进行部署。其他人则会根据对模式的适用性或后果进行调整，但依然保持有效。无论哪种情况，模式都可以在你切换语言时提供帮助。同样，一个基于良好面向对象设计原则构建的应用程序，在不同语言之间移植也相对容易（尽管总是存在一些需要解决的问题）。

