    \n```html\n<figure>\n<img src=\"<?= $image; ?>\" alt=\"<?= $row['caption']; ?>\"\
    >\n</figure>\n```\n\n10. 最后，你需要显示文章。删除占位文本的段落，并在上一步最后一个代码块的结束花括号和结束 PHP 标签之间添加以下代码：\n\
    \n```php\necho convertToParas($row['article']);\n```\n\n这使用了`utility_funcs.php`中的`convertToParas()`函数，将博客条目包裹在`<p>`标签中，并将换行符序列替换为闭合和开放标签（参见第\
    \ 16 章的“显示段落”一节）。\n\n11. 保存页面，并在浏览器中加载`blog.php`。点击某个通过外键分配了图像的文章的`更多`链接。你应该会看到`details.php`显示完整的文章和图像，布局如图\
    \ 17-7 所示。\n\n如有必要，请对照`ch17`文件夹中的`details_mysqli_01.php`或`details_pdo_01.php`检查你的代码。\n\
    \n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig7_HTML.jpg](img/332054_4_En_17_Fig7_HTML.jpg)\n\
    \n**图 17-7.** 详情页从一张表中提取文章，从另一张表中提取图像。\n\n12. 点击返回`blog.php`的链接，测试其他项目。每个关联了图像的文章都应正确显示。点击没有图像的文章的`更多`链接。这次你应该会看到如图\
    \ 17-8 所示的结果。\n\n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig8_HTML.jpg](img/332054_4_En_17_Fig8_HTML.jpg)\n\
    \n**图 17-8.** 缺少关联图像导致 SELECT 查询失败。\n\n你知道文章在数据库中，否则`blog.php`中就不会显示前两句。要理解这种突然“消失”的原因，请参考图\
    \ 17-6。对于没有关联图像的记录，`image_id`的值为`NULL`。由于`images`表中的所有记录都有主键，`USING`子句无法找到匹配项。下一节将解释如何处理这种情况。\n\
    \n### 查找没有匹配外键的记录\n\n从 PHP Solution 17-4 中取出`SELECT`查询，并移除搜索特定文章的条件，剩下如下：\n\n\
    ```sql\nSELECT title, article, DATE_FORMAT(updated, '%W, %M %D, %Y') AS updated,\
    \ filename, caption\nFROM blog INNER JOIN images USING (image_id)\n```\n\n如果在\
    \ phpMyAdmin 的 SQL 选项卡中运行此查询，将产生如图 17-9 所示的结果。\n\n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig9_HTML.jpg](img/332054_4_En_17_Fig9_HTML.jpg)\n\
    \n**图 17-9.** INNER JOIN 仅能找到在两个表中都匹配的记录。\n\n使用`INNER JOIN`时，`SELECT`查询只能成功找到完全匹配的记录。其中一篇文章没有关联图像，因此`articles`表中`image_id`的值为`NULL`，这与`images`表中的任何内容都不匹配。\n\
    \n在这种情况下，你需要使用`LEFT JOIN`而不是`INNER JOIN`。使用`LEFT JOIN`，结果包括在左表中有匹配但在右表中没有匹配的记录。左和右指的是执行连接时的顺序。像这样重写`SELECT`查询：\n\
    \n```sql\nSELECT title, article, DATE_FORMAT(updated, '%W, %M %D, %Y') AS updated,\
    \ filename, caption\nFROM blog LEFT JOIN images USING (image_id)\n```\n\n在 phpMyAdmin\
    \ 中运行时，你将获得全部四篇文章，如图 17-10 所示。\n\n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig10_HTML.jpg](img/332054_4_En_17_Fig10_HTML.jpg)\n\
    \n**图 17-10.** LEFT JOIN 包含在右表中没有匹配的记录。\n\n如你所见，右表（`images`）中的空字段显示为`NULL`。\n"
- fmt: "If the column names are not the same in both tables, use `ON` like this:\n\
    \n```\nFROM table_1 LEFT JOIN table_2 ON table_1.col_name = table_2.col_name\n\
    ```\n\nSo, now you can rewrite the SQL query in `details.php` like this:\n\n```\n\
    $sql = \"SELECT title, article, DATE_FORMAT(updated, '%W, %M %D, %Y') AS updated,\n\
    filename, caption\nFROM blog LEFT JOIN images USING (image_id)\nWHERE blog.article_id\
    \ = $article_id\";\n```\n\nIf you click the `More` link to view the article that\
    \ doesn’t have an associated image, you should now see the article correctly displayed\
    \ as shown in Figure [17-11](#332054_4_En_17_Chapter.xhtml#Fig11). The other articles\
    \ should still display correctly, too. The finished code can be found in `details_mysqli_02.php`\
    \ and `details_pdo_02.php`.\n\n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig11_HTML.jpg](images/332054_4_En_17_Chapter/332054_4_En_17_Fig11_HTML.jpg)\n\
    \nFigure 17-11. `LEFT JOIN` also retrieves articles that don’t have a matching\
    \ foreign key\n\n## Creating an intelligent link\n\nThe link at the bottom of\
    \ `details.php` goes straight back to `blog.php`. That’s fine with only four items\
    \ in the `blog` table, but once you start getting more records in a database,\
    \ you need to build a navigation system, as I showed you in Chapter [14](#332054_4_En_14_Chapter.xhtml).\
    \ The problem with a navigation system is that you need a way to return visitors\
    \ to the same point in the result set that they came from.\n\n### PHP Solution\
    \ 17-5: Returning to the Same Point in a navigation system\n\nThis PHP solution\
    \ checks whether the visitor arrived from an internal or an external link. If\
    \ the referring page was within the same site, the link returns the visitor to\
    \ the same place. If the referring page was an external site, or if the server\
    \ doesn’t support the necessary superglobal variables, the script substitutes\
    \ a standard link. It is shown here in the context of `details.php`, but it can\
    \ be used on any page.\n\nThe code is not database-dependent, so it’s identical\
    \ for both MySQLi and PDO.\n\n1.  Locate the back link in the main body of `details.php`.\
    \ It looks like this:\n\n    ```\n    <a href=\"blog.php\">Back to the blog</a>\n\
    \    ```\n\n2.  Place your cursor immediately to the right of the first quotation\
    \ mark, and insert the following code highlighted in bold:\n\n    ```\n    <a\
    \ href=\"<?php\n    if (isset($_SERVER['HTTP_REFERER']) && isset($_SERVER['HTTP_HOST']))\
    \ {\n        $url = parse_url($_SERVER['HTTP_REFERER']);\n        if ($url['host']\
    \ == $_SERVER['HTTP_HOST']) {\n            echo $_SERVER['HTTP_REFERER'];\n  \
    \      } else {\n            echo 'blog.php';\n        }\n    } else {\n     \
    \   echo 'blog.php';\n    }\n    ?>\">Back to the blog</a>\n    ```\n\n`$_SERVER['HTTP_REFERER']`\
    \ and `$_SERVER['HTTP_HOST']` are superglobal variables that contain the URL of\
    \ the referring page and the current hostname. You need to check their existence\
    \ with `isset()` because not all servers support them. Also, the browser might\
    \ block the URL of the referring page.\n\nThe `parse_url()` function creates an\
    \ array containing each part of a URL, so `$url['host']` contains the hostname.\
    \ If it matches `$_SERVER['HTTP_HOST']`, you know that the visitor was referred\
    \ by an internal link, so the full URL of the internal link is inserted in the\
    \ `href` attribute. This includes any query string, so the link sends the visitor\
    \ back to the same position in a navigation system. Otherwise, an ordinary link\
    \ is created to the target page.\n\nThe finished code is in `details_mysqli_03.php`\
    \ and `details_pdo_3.php` in the `ch17` folder.\n\n## Chapter Review\n\nRetrieving\
    \ information stored in multiple tables is relatively simple with `INNER JOIN`\
    \ and `LEFT JOIN`. The key to working successfully with multiple tables lies in\
    \ structuring the relationship between them so that complex relationships can\
    \ always be resolved as `1:1`, if necessary through a cross-reference (or linking)\
    \ table. The next chapter continues the exploration of working with multiple tables,\
    \ showing you how to deal with foreign-key relationships when inserting, updating,\
    \ and deleting records.\n\n## 18. Managing Multiple Database Tables\n\nThe previous\
    \ chapter showed you how to use `INNER JOIN` and `LEFT JOIN` to retrieve information\
    \ stored in multiple tables. You also learned how to link existing tables by adding\
    \ an extra column to the child table and updating each record individually to\
    \ insert a foreign key. However, most of the time you’ll want to insert data simultaneously\
    \ in both tables. That presents a challenge, because `INSERT` commands can operate\
    \ on only one table at a time. You need to handle the insert operations in the\
    \ correct sequence, starting with the parent table, so that you can get the new\
    \ record’s primary key and insert it in the child table at the same time as other\
    \ details. Similar considerations also need to be taken into account when updating\
    \ and deleting records. The code involved isn’t difficult, but you need to keep\
    \ the sequence of events clearly in mind as you build the scripts.\n\nThis chapter\
    \ guides you through the process of inserting new articles in the `blog` table,\
    \ optionally selecting a related image or uploading a new one, and assigning the\
    \ article to one or more categories, all in a single operation. Then you’ll build\
    \ the scripts to update and delete articles without destroying the referential\
    \ integrity of related tables.\n\nYou’ll also learn about processing multiple\
    \ queries as a batch using a transaction, rolling the database back to its original\
    \ state if any part of the batch fails, as well as about foreign-key constraints,\
    \ which control what happens if you try to delete records that still have a foreign-key\
    \ relationship in another table. Not all databases support transactions and foreign-key\
    \ constraints, so it’s important to check whether your remote server does. This\
    \ chapter also explains what measures you can take to preserve the integrity of\
    \ your data if your server doesn’t support foreign-key constraints.\n\nIn particular,\
    \ you’ll learn about the following:\n\n-   Inserting, updating, and deleting records\
    \ in related tables\n-   Finding the primary key of a record immediately after\
    \ it has been created\n-   Processing multiple queries as a single batch and rolling\
    \ back if any part fails\n-   Converting a table’s storage engine\n-   Establishing\
    \ foreign-key constraints between InnoDB tables\n\n### Maintaining Referential\
    \ Integrity\n\nWith single tables, it doesn’t matter how often you update a record\
    \ or how many records you delete, the impact on other records is zero. Once you\
    \ store the primary key of a record as a foreign key in a different table, you\
    \ create a dependency that needs to be managed. For example, Figure [18-1](#332054_4_En_18_Chapter.xhtml#Fig1)\
    \ shows the second article from the `blog` table (“Trainee Geishas Go Shopping”)\
    \ linked to the `Kyoto` and `People` categories through the `article2cat` cross-reference\
    \ table.\n\n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig1_HTML.jpg](images/332054_4_En_18_Chapter/332054_4_En_18_Fig1_HTML.jpg)\n\
    \nFigure 18-1. You need to manage foreign-key relations to avoid orphaned records\n\
    \nIf you delete the article, but fail to delete the entries for `article_id 2`\
    \ in the cross-reference table, a query that looks for all articles in the `Kyoto`\
    \ or `People` categories tries to match a nonexistent record in the `blog` table.\
    \ Similarly, if you decide to delete one of the categories without also deleting\
    \ matching records in the cross-reference table, a query that looks for the categories\
    \ associated with an article tries to match a nonexistent category.\n\nBefore\
    \ long, your database is littered with orphaned records. Fortunately, maintaining\
    \ referential integrity is not difficult. SQL does it through the establishment\
    \ of rules known as foreign-key constraints that tell the database what to do\
    \ when you update or delete a record that has dependent records in another table."
