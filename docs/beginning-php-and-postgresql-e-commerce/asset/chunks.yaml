    **269**


    In all the other pages except the shopping cart page, the visitor will be able
    to see a shopping cart summary in the left part of the screen as shown in Figure
    8-3.


    At the end of this chapter, you’ll have a functional shopping cart, but the visitor
    will not yet be able to order the products contained in it. You’ll add this functionality
    in the next chapter, when you implement a custom checkout—the Proceed to Checkout
    button. When the visitor clicks this button, the products in the shopping cart
    are saved as a separate order in the database, and the visitor is redirected to
    a page to pay. If you integrated the PayPal shopping cart for the first development
    stage, starting with the next chapter, PayPal will only be used to handle payments,
    and you won’t rely on its shopping cart anymore.


    Specifically, in this chapter, you’ll learn how to


    • Design a shopping cart


    • Add a new database table to store shopping cart records


    • Create the data tier functions that work with the new table


    • Implement the business layer methods


    • Implement the Add to Cart and View Cart buttons (or make them work with the
    new shopping cart if you already implemented them in the PayPal chapter)


    • Implement the presentation layer part of the custom shopping cart **Figure 8-3.**
