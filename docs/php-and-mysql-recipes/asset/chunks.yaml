    \ `&`（取地址符），则该参数将以引用方式传递，而非传递原始值的副本。\n\n通过引用传递变量意味着所有引用同一内存对象的变量都可以对该对象进行读写操作。更新其中一个变量会影响所有引用该内存对象的变量。这在跨作用域的情况下也同样适用，因此，如果一个变量从全局作用域或另一个函数通过引用传递给某个函数，两者仍将引用同一个内存对象。\n\
