    \ We will start by looking at phpMyAdmin\nbecause it is included in the XAMPP\
    \ stack. But first, we must activate\nboth Apache and MySQL from the XAMPP control\
    \ panel.\n\n![](images/323857_3_En_6_Chapter/323857_3_En_6_Fig1_HTML.jpg)\n\n\
    A window shows the modules of X A M P P control panel version 3.3.0,\ncompiled\
    \ on April 6th 2021\\. The modules are service, module, P I D(s),\nPort(s) and\
    \ Actions.\n\nFigure 6-1\nThe XAMPP control panel\n\nTo start both Apache and\
    \ MySQL, simply click the start button to the\nright of each. Once they have properly\
    \ started, each will be highlighted\nin green, and the start button will change\
    \ to a stop button. If there\nare problems, the program will be highlighted in\
    \ red, with error\nmessages displayed in the view box. If this occurs, copy the\
    \ error\nmessage into a browser to discover what others have done to fix the\n\
    problem.\n\nWith MySQL and Apache running, open a browser and navigate to `http://localhost/`.\n\
    The XAMPP Dashboard will display. On the menu of the dashboard, select\nphpMyAdmin\
    \ to open the phpMyAdmin control panel.\n\n![](images/323857_3_En_6_Chapter/323857_3_En_6_Fig2_HTML.jpg)\n\
    \nAn image of the P h p my admin application shows the server's general\nsettings,\
    \ appearance settings and database server.\n\nFigure 6-2\nThe phpMyAdmin control\n\
    panel\n\nWe are now ready to create our first MySQL/MariaDB database!"
  trans: "\n# 使用模型-视图-控制器方法组织 PHP 脚本\n\n# 创建和使用 PHP 数据对象\n\n现代网站功能极其强大，而这种强大很大程度上源于它们存储信息的能力。信息存储能够实现软件与用户之间高度定制化的交互。这些交互涵盖从基于条目的博客和评论系统，到安全处理敏感交易的高性能银行应用程序。本章将介绍\
    \ MySQL/MariaDB 的基础知识——这是一个功能强大的开源数据库平台。我们还将探索在 PHP 项目中访问数据的面向对象方法。\n\n> **注意**\n\
    > \n> 2009 年，Sun 微系统公司收购了 MySQL。不久之后，甲骨文公司又收购了 Sun 微系统公司。当时人们担忧 MySQL 将不再保持开源。部分\
    \ MySQL 开发者联合起来，创建了一个与 MySQL 高度兼容的免费开源数据库系统 MariaDB。多年来，虽然两个产品各自增加了一些对方未复制的功能，但用于访问和操作数据库的基本命令和例程始终保持一致。许多\
    \ WAMP、MAMP 和 LAMP 集成软件包实际上包含的是 MariaDB 而非 MySQL（尽管仍有免费版 MySQL 可用）。有些产品甚至使用命令和引用时标明所用数据库为\
    \ MySQL，而实际上却是 MariaDB。不过，由于两者访问和操作数据库的命令几乎相同，本书及其他许多书籍中的代码在两种数据库系统上均可运行。\n\n\
    # MySQL/MariaDB 数据存储基础\n\nMySQL/MariaDB 是一种关系型数据库管理系统，允许我们将数据存储在多个表中。每个表包含一组命名的列，每一行则是表中的一个数据条目。表之间常常包含关于其他表条目的信息，这使得表可以通过存储在两者中的共同值相互关联。\n\
    \n比较表 6-1 和表 6-2 时，一个表中的值（艺术家表中的`artist_id`）可以与另一个表中的相同值（专辑表中的`artist_id`）关联。艺术家表中的`artist_id`是该表的*主键*，因为它能唯一标识每一行。专辑表中的`artist_id`是*外键*，因为它不用于唯一标识专辑表中的行（`album_id`唯一标识行，是主键），而是用于关联另一个表。\n\
    \n**表 6-2 专辑表**\n\n| album_id | artist_id | album_name |\n|----------|-----------|------------|\n\
    | 1        | 1         | For Emma, Forever Ago |\n| 2        | 1         | Blood\
    \ Bank - EP3 |\n| 3        | 2         | Let It Die |\n| 4        | 2        \
    \ | The Reminder |\n\n**表 6-1 艺术家表**\n\n| artist_id | artist_name |\n|-----------|-------------|\n\
    | 1         | Bon Iver    |\n| 2         | Feist       |\n\n艺术家表包含两列。第一列`artist_id`存储每位艺术家的唯一数字标识符。第二列`artist_name`存储艺术家的名字。\n\
    \n专辑表在`album_id`列中存储每张专辑的唯一标识符，在——你猜对了——`album_name`列中存储专辑名称。专辑表还包含第三列`artist_id`，用于关联艺术家表和专辑表。该列存储了录制该专辑的艺术家的唯一标识符。\n\
    \n乍一看，这似乎是一种愚蠢的数据存储方式。为什么要用抽象的、难以理解的数字，而不是简单地在每张专辑中直接写上艺术家的名字呢？表 6-3 说明了为何这不是个好主意。\n\
    \n**表 6-3 设计糟糕的专辑表**\n\n| album_id | artist | album_name |\n|----------|--------|------------|\n\
    | 1        | Bon Iver | For Emma, Forever Ago |\n| 2        | Bon Iver | Blood\
    \ Bank - EP3 |\n| 3        | Feist   | Let It Die |\n| 4        | fiest   | The\
    \ Reminder |\n\n你注意到`album_id`的拼写错误了吗？由于每张专辑都独立拼写艺术家的名字，就可能导致同一艺术家存储不同的名字。在像上面这样只有四个条目的小表中，很容易发现并纠正错误。但在现实世界中，表很少有如此小的。想象一下为音像店建立数据库时，我们需要管理成千上万张专辑。\n\
    \n这个问题也说明了以*第三范式*设计数据库的必要性。简而言之，如果数据库减少了数据冗余，并且记录能够轻松被唯一标识，那么它就符合第三范式。通过创建艺术家表，我们消除了在专辑表中重复艺术家名字的需要，也避免了两个艺术家可能同名的问题。使用艺术家\
    \ ID 可以确保每个艺术家名字的唯一性，即使名字拼写相同。如果不使用 ID，要唯一标识一行专辑记录，我们就需要同时包含专辑 ID 和艺术家名字（希望拼写正确）。\
    \  \n通过设计只存储一条数据一次且仅一次的表，你就能构建一个具有数据完整性的健壮数据库。SQL 社区知名人物 Joe Celko 恰当地提出了一个口号：“一个简单事实，在一个地方，一次存储。”记住这句口号，让你的数据库表遵循这一规则。\n\
    \n# 使用 SQL 操作数据\n\n我们可以通过*结构化查询语言（SQL）* 操作 MySQL/MariaDB 表中的数据。SQL 是一种在*关系型数据库系统*中管理数据的语言。关系型数据库系统（如\
    \ MySQL/MariaDB）将数据格式化为表，并使用主键和外键建立表之间的关系。在本节中，我们将了解 SQL 的基础知识，包括创建数据库、创建表、插入数据、更新数据和显示数据的功能。\n\
    \n许多 WAMP、LAMP 和 MAMP 集成环境都提供了*phpMyAdmin*，以便轻松创建和维护数据库。此外，其他工具如*MySQL Workbench*（`www.mysql.com/products/workbench/`）提供了更多设计、开发和保护\
    \ MySQL/MariaDB 数据库的方法。我们将从 phpMyAdmin 开始，因为它包含在 XAMPP 集成环境中。但首先，我们必须从 XAMPP 控制面板启动\
    \ Apache 和 MySQL。\n\n![](img/323857_3_En_6_Fig1_HTML.jpg)\n\n一个窗口显示了 XAMPP 控制面板\
    \ 3.3.0 版本的模块，编译于 2021 年 4 月 6 日。这些模块包括服务、模块、PID、端口和操作。\n\n**图 6-1** XAMPP 控制面板\n\
    \n要启动 Apache 和 MySQL，只需点击各自右侧的启动按钮。一旦它们正常启动，每个都会高亮显示为绿色，启动按钮会变为停止按钮。如果出现问题，程序会高亮显示为红色，并在查看框中显示错误信息。如果出现这种情况，请将错误信息复制到浏览器中，看看其他人是如何解决该问题的。\n\
    \n在 MySQL 和 Apache 运行后，打开浏览器并导航至`http://localhost/`。将显示 XAMPP 仪表盘。在仪表盘菜单中，选择 phpMyAdmin\
    \ 以打开 phpMyAdmin 控制面板。\n\n![](img/323857_3_En_6_Fig2_HTML.jpg)\n\nphpMyAdmin 应用程序的界面显示了服务器的一般设置、外观设置和数据库服务器。\n\
    \n**图 6-2** phpMyAdmin 控制面板\n\n现在，我们已经准备好创建第一个 MySQL/MariaDB 数据库了！\n"
- fmt: "# Developing a Database for the Poll\n\nThe best way to get a feel for database-driven\
    \ web pages is to create one for testing. Over the next pages, we will create\
    \ a database-driven site poll. It is a simple example of database-driven development,\
    \ but it is quite sufficient to demonstrate the essential principles. The simplest\
    \ possible site poll will present one question to which site visitors can reply\
    \ *yes* or *no*. All replies from users will be displayed, so every site user\
    \ can see how others replied.\n\nAs simple as the example is, it will use many\
    \ of the skills we have gained so far, and it will teach us how to integrate database-driven\
    \ data in PHP projects.\n\nThe site poll relies on a database table to store the\
    \ poll question and the poll replies. PHP will connect to `MySQL`/`MariaDB` and\
    \ retrieve the relevant data, so it can be displayed in a browser. Using PHP,\
    \ we will output an HTML form allowing site visitors to interact with the site\
    \ poll. Whenever a visitor submits the form, PHP will then submit the answer and\
    \ update the `MySQL`/`MariaDB` database table accordingly. Let’s begin by creating\
    \ a database with a table and some poll data.\n\n## Building a Database Using\
    \ `CREATE`\n\nSQL uses the keyword `CREATE` to build a database or a database\
    \ table. The `CREATE` statement must include the `CREATE` keyword and a keyword\
    \ to indicate if we want to build a database or table. Logically, we must first\
    \ create the database before we place any tables within it. Thus, we will use\
    \ the keyword `DATABASE` along with the `CREATE` keyword to build a database.\
    \ Of course, we also need to provide a name for our database.\n\n```sql\nCREATE\
    \ DATABASE playground\n```\n\nTo execute an SQL statement, we can select the **SQL**\
    \ tab in the phpMyAdmin control panel (Figure [6-3](#323857_3_En_6_Chapter.xhtml#Fig3)).\
    \ Once selected, a text field will be displayed to enter in any valid SQL commands.\
    \ To execute the SQL, click the **Go** button beneath the text field.\n\n![](images/323857_3_En_6_Chapter/323857_3_En_6_Fig3_HTML.jpg)\n\
    \n*An image of the phpMyAdmin application shows the server SQL query to create\
    \ a database.*\n\n**Figure 6-3** The SQL tab in phpMyAdmin\n\nWe can also create\
    \ a database by selecting the **Databases** tab.\n\n![](images/323857_3_En_6_Chapter/323857_3_En_6_Fig4_HTML.jpg)\n\
    \n*An image of the phpMyAdmin application shows the server databases table to\
    \ create a database.*\n\n**Figure 6-4** The Databases tab in phpMyAdmin\n\nJust\
    \ enter the database name and click **CREATE**. We could also select the type\
    \ of collation to use with the database. However, the default is acceptable.\n\
    \n> **Note**  \n> A collation is a set of rules that specify which characters\
    \ in the character set come first. We know that *a* comes before *b*, but how\
    \ about the character *7*? Should that come before or after alphabetical characters?\
    \ What about special characters such as *#”#€%*&*? A collation explicitly states\
    \ how characters should be ordered.\n\n## The `CREATE TABLE` Statement\n\nAs mentioned\
    \ earlier, since `MySQL`/`MariaDB` is a relational database, it stores data in\
    \ tables. Naturally, after creating the database, we need to create a table. We\
    \ need a little more SQL knowledge to accomplish this. The general syntax for\
    \ creating a table is as follows:\n\n```sql\nCREATE TABLE table_name (\n    column_name\
    \ datatype [any constraints or default values],\n    column_name datatype [any\
    \ constraints or default values]\n)\n```\n\nAgain, we use the `CREATE` statement\
    \ to build a table, in a similar format to building the database. We will declare\
    \ names for our attributes (columns) and the data type for each column or attribute.\
    \ We can always add or delete columns or attributes at any time. The `CREATE`\
    \ statement can also declare constraints or default values.\n\n### Secure Programming\n\
    \nWhen creating columns within databases, special care and consideration should\
    \ be given to the data types, constraints, and default values. A secure database\
    \ will restrict values entered that do not meet these parameters. If the program\
    \ using the database is dependent on a value existing within a field, default\
    \ values should be provided. Remember, the program might reject an invalid value\
    \ before attempting to update the table. It might be acceptable to use the default\
    \ value when this occurs. However, there may be cases in which the value is required\
    \ in order for enough information to exist within the record created. In this\
    \ case, the database column should be set to require the information. If it is\
    \ not provided, the database management system will reject the attempt to enter\
    \ the data.\n\nLet’s access the `playground` database by clicking its name in\
    \ the left column of the phpMyAdmin control panel. Click the **SQL** tab at the\
    \ top of the screen, and we’re ready to create our first table.\n\n```sql\nCREATE\
    \ TABLE poll (\n    poll_id INT NOT NULL AUTO_INCREMENT,\n    poll_question TEXT,\n\
    \    yes INT DEFAULT 0,\n    no INT DEFAULT 0,\n    PRIMARY KEY (poll_id)\n)\n\
    ```\n\nNotice the format of the `CREATE` statement. It is very vital that the\
    \ proper parentheses and commas are included between each statement. The last\
    \ line does not require a comma. Once we have entered the SQL into the text field,\
    \ we can click **Go** to execute it. This will create the new table.\n\n![](images/323857_3_En_6_Chapter/323857_3_En_6_Fig5_HTML.jpg)\n\
    \n*An image of the phpMyAdmin application showing the database SQL to create a\
    \ table Poll.*\n\n**Figure 6-5** Create a new table in the `playground` database\n\
    \nWe can also create a table using the default window after selecting the database\
    \ from the left-hand column. Once the table name is entered, we must also select\
    \ the number of columns to create. After clicking the button, the next screen\
    \ will display boxes to enter in the attributes for each column. The information\
    \ entered is the same as what was shown in the preceding program code.\n\nLet’s\
    \ explore the new table we created by selecting the `poll` table from the panel\
    \ at the left side of phpMyAdmin. Next, we will select the **Structure** tab from\
    \ the menu.\n\n![](images/323857_3_En_6_Chapter/323857_3_En_6_Fig6_HTML.jpg)\n\
    \n*An image of the phpMyAdmin application showing the Structure head comes under\
    \ the poll table.*\n\n**Figure 6-6** Poll table structure\n\nThe `poll` table\
    \ has four attributes or columns: `poll_id`, `poll_question`, `yes`, and `no`.\
    \ Each attribute has a *type* (data type). The fields of a table can only hold\
    \ data of the correct type. For example, we can only store integers in `poll_id`,\
    \ `yes`, and `no` as indicated by the `int` type. The number 11 is the default\
    \ size of the integer. This can be adjusted with SQL code or by making changes\
    \ when clicking the **Change** keyword to the right of the column. We will use\
    \ the default settings. The type setting for `poll_question` restricts entries\
    \ to text only. Finally, the `yes` and `no` attributes are created with a default\
    \ value of 0. None of the other attributes has default values."
