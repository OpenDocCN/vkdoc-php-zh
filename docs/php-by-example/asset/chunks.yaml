    ```

    <?php

    $K=["X","Y","Z"];

    $A=[100,200,300];

    $A=["X"=>100,"Y"=>200,"Z"=>300];

    print("数组 \$A：\n");

    print_r($A);

    // 第三个数组：

    $B=array_keys($A);

    print("数组 \$B：\n");

    print_r($B);

    // 第四个数组：

    $C=array_combine($K,$B);

    print("数组 \$C：\n");

    print_r($C);

    array_pop($C);

    print("数组 \$C：\n");

    print_r($C);

    array_push($C,"A","B");

    print("数组 \$C：\n");

    print_r($C);

    // 第五个数组：

    $D=array_slice($C,0,3);

    print("数组 \$D：\n");

    print_r($D);

    // 第六个数组：

    $E=array_slice($C,-3,2);

    print("数组 \$E：\n");

    print_r($E);

    ?>

