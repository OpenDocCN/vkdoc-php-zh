  \ 访问第四个元素。\n\n现在可以利用这些信息动态显示缩略图、主图和标题。主图和缩略图名称相同，但最终需要通过循环遍历整个结果集来显示所有缩略图。因此，表格单元格中的动态代码应引用当前记录——即\
  \ `$row['filename']` 和 `$row['caption']`，而非 `$mainImage` 和 `$caption`。稍后您将明白为何我将首条记录的值赋给了独立变量。请按如下方式修改表格中的代码：\n\
  \n```\n<td><a href=\"gallery.php\">\n    <img src=\"images/thumbs/<?= $row['filename'];\
  \ ?>\"\n         alt=\"<?= $row['caption']; ?>\" width=\"80\" height=\"54\"></a></td>\n\
  ```\n\n为防止查询出错，需要检查 `$error` 是否已设置，并阻止画廊显示。请在 `<h2>Images of Japan</h2>` 标题后立即添加包含以下条件语句的\
