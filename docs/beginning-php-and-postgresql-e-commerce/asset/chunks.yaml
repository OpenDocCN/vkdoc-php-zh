    The encryption key is commonly known as the **public key**, and anyone can use
    it to encrypt information. The decryption key is known as the **private key**
    because it can only be used to decrypt data that has been encrypted using the
    public key. The encryption key (public key) and the decryption key (private key)
    are mathematically related and are always generated in pairs. The public key and
    private key can’t be obtained one from another. If you have a public key/private
    key pair, you can send the public key to parties that need to encrypt information
    for you. You will be the only one who knows the private key associated with that
    public key, thus the only one able to decrypt the information.


    Although asymmetric encryption is more secure, it also requires much more processing
    power. Symmetric encryption is faster but can be less secure because both the
    encryptor and decryptor have knowledge of a single key. With symmetric encryption,
    the encryptor needs to send the key to the decryptor. With Internet communications,
    there is often no way of ensuring that this key remains a secret from third parties
    when it is sent to the encryptor.


    Asymmetric encryption gets around this by using key pairs. There is never a need
    for the decryption key to be divulged, so it’s much more difficult for a third
    party to break the encryption. Because it requires a lot more processing power,
    however, the practical method of operation is to use asymmetric encryption to
    exchange a symmetric key over the Internet, which is then used for symmetric encryption
    safe in the knowledge that this key has not been exposed to third parties.


