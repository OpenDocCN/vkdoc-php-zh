    <td>\n\n<input name=\"customerName\" type=\"text\" size=\"50\"\n\nvalue=\"{$admin_order_details->mOrderInfo.customer_name}\"\
    \n\n{if ! $admin_order_details->mEditEnabled}\n\ndisabled=\"disabled\"\n\n{/if}\
    \ />\n\n</td>\n\n</tr>\n\n<tr>\n\n<td class=\"admin_page_text\">收货地址：</td>\n\n\
    <td>\n\n<input name=\"shippingAddress\" type=\"text\" size=\"50\"\n\nvalue=\"\
    {$admin_order_details->mOrderInfo.shipping_address}\"\n\n{if ! $admin_order_details->mEditEnabled}\n\
    \ndisabled=\"disabled\"\n\n{/if} />\n\n</td>\n\n</tr>\n\n<tr>\n\n<td class=\"\
    admin_page_text\">客户邮箱：</td>\n\n<td>\n\n<input name=\"customerEmail\" type=\"\
    text\" size=\"50\"\n\nvalue=\"{$admin_order_details->mOrderInfo.customer_email}\"\
    \n\n{if ! $admin_order_details->mEditEnabled}\n\ndisabled=\"disabled\"\n\n{/if}\
    \ />\n\n</td>\n\n</tr>\n\n</table>\n\n---\n\n**2.** 在 `presentation/smarty_plugins`\
    \ 文件夹中创建一个新文件，命名为 `function.load_admin_order_details.php`，并在其中编写以下代码：\n\n```php\n\
    <?php\n// 插件文件中的插件函数必须命名为：smarty_type_name\nfunction smarty_function_load_admin_order_details($params,\
    \ $smarty)\n{\n  // 创建 AdminOrderDetils 对象\n  $admin_order_details = new AdminOrderDetails();\n\
    \  $admin_order_details->init();\n\n  // 分配模板变量\n  $smarty->assign($params['assign'],\
    \ $admin_order_details);\n}\n\n// 处理订单详情管理的表示层类\nclass AdminOrderDetails\n{\n\
    \  // 在 Smarty 模板中可用的公共变量\n  public $mOrderId;\n  public $mOrderInfo;\n  public\
    \ $mOrderDetails;\n  public $mEditEnabled;\n  public $mOrderStatusOptions;\n \
    \ public $mAdminOrdersPageLink;\n\n  // 类构造函数\n  public function __construct()\n\
    \  {\n    // 从会话中获取返回链接\n    $this->mAdminOrdersPageLink = $_SESSION['admin_orders_page_link'];\n\
    \n    // 从查询字符串中接收订单 ID\n    if (isset ($_GET['OrderId']))\n      $this->mOrderId\
    \ = (int) $_GET['OrderId'];\n    else\n      trigger_error('必须提供 OrderId 参数');\n\
    \n    $this->mOrderStatusOptions = Orders::$mOrderStatusOptions;\n  }\n\n  //\
    \ 初始化类成员\n  public function init()\n  {\n    if (isset ($_GET['submitUpdate']))\n\
    \    {\n      Orders::UpdateOrder($this->mOrderId, $_GET['status'], $_GET['comments'],\
    \ $_GET['customerName'], $_GET['shippingAddress'], $_GET['customerEmail']);\n\
    \    }\n\n    $this->mOrderInfo = Orders::GetOrderInfo($this->mOrderId);\n   \
    \ $this->mOrderDetails = Orders::GetOrderDetails($this->mOrderId);\n\n    // 指定启用或禁用编辑模式的值\n\
    \    if (isset ($_GET['submitEdit']))\n      $this->mEditEnabled = true;\n   \
    \ else\n      $this->mEditEnabled = false;\n  }\n}\n?>\n```\n\n**3.** 打开 `hatshop.css`，并添加以下样式：\n\
    \n```css\n.edit tr td\n{\n  background: #ffffff;\n  border: none;\n}\n```\n\n\
    **4.** 向数据库中添加一些模拟订单，然后在浏览器中加载 `admin.php` 文件。点击“订单管理”菜单链接，点击某个“Go！”按钮显示订单，然后点击其中一个订单的“查看详情”按钮。订单详情管理页面将会显示，允许你编辑订单详情，正如本章前面所述。\n\
    \n## 工作原理：`admin_order_details` 组件化模板\n\n你刚刚编写的三个文件 `admin_order_details.tpl`、`function.load_admin_order_details.php`\
    \ 和 `admin_order_details.php` 允许你查看和更新特定订单的详细信息。\n\n函数插件通过常规机制从模板文件中加载。`AdminOrderDetails`\
    \ 类的构造函数（`__construct` 方法）确保查询字符串中存在 `OrderId` 参数，因为如果没有这个参数，该组件化模板就没有意义：\n\n\
    ```php\n// 类构造函数\npublic function __construct()\n{\n  // 从会话中获取返回链接\n  $this->mAdminOrdersPageLink\
    \ = $_SESSION['admin_orders_page_link'];\n\n  // 从查询字符串中接收订单 ID\n  if (isset ($_GET['OrderId']))\n\
    \    $this->mOrderId = (int) $_GET['OrderId'];\n  else\n    trigger_error('必须提供\
    \ OrderId 参数');\n\n  $this->mOrderStatusOptions = Orders::$mOrderStatusOptions;\n\
    }\n```\n\n`init()` 方法响应用户操作，并调用各种业务层方法来完成用户请求。它通过调用业务层方法 `Orders::GetOrderInfo`\
    \ 和 `Orders::GetOrderDetails` 获取数据来填充表单。\n\n`mEditEnabled` 类成员根据查询字符串中 `submitEdit`\
    \ 参数是否设置来决定进入或退出编辑模式。当进入编辑模式时，所有文本框以及“更新”和“取消”按钮变为可用，但“编辑”按钮被禁用。当退出编辑模式时（点击“取消”或“更新”按钮时发生），情况则相反。\n\
    \n## 总结\n\n本章我们涉及了广泛的内容。通过两个独立的阶段，你实现了一个用于接收订单和手动管理订单的系统。你在购物车控件中添加了一个“下订单”按钮，以便访客能够下单购物车中的商品。你还实现了一个简单的订单管理页面，网站管理员可以在其中查看和处理待处理订单。\n\
    \n由于订单数据现在存储在数据库中，你可以根据已售商品进行各种统计和计算。在下一章中，你将学习如何实现“购买了此商品的顾客也购买了……”功能，如果没有数据库中存储的订单数据，这个功能是不可能实现的。\n\
    \n---\n\n## 第 10 章：商品推荐\n\n与实体店相比，互联网商店最重要的优势之一就是能够根据每位访客的偏好，或根据从具有相似偏好的其他访客那里收集的数据，来自定义网站。如果你的网站能够以巧妙的方式向访客推荐更多商品，那么他们最终可能会购买超出最初计划的商品。\n"
- fmt: '# Product Recommendations System


    In this chapter, you’ll implement a simple, but efficient, product recommendations
    system in your `HatShop` web store. You can implement a product recommendations
    system in several ways, depending on your kind of store. Here are a few popular
    ones:


    **Up-Selling**: Up-selling is defined as the strategy of offering consumers the
    opportunity to purchase an “upgrade” or a little extra based on their requested
    purchase. Perhaps the most famous example of up-selling—“Would you like to super-size
    that?”—is mentioned to customers when they order a value meal at McDonalds. This
    seemingly innocent request greatly increases the profit margin.


    **Cross-Selling**: Cross-selling is defined as the practice of offering customers
    complementary products. Continuing with the McDonalds analogy, you’ll always hear
    the phrase “Would you like fries with that?” when someone orders a hamburger.
    Because it’s widely acknowledged that fries go with burgers, and the consumer
    is ordering a burger, then its likely that the consumer also likes french fries—the
    mere mention of french fries is likely to generate a new sale.


    **Featured products on the home page**: `HatShop` already permits the site administrator
    to choose the products featured on the main page and on the department pages.


    In this chapter, you’ll implement a dynamic recommendations system with both up-selling
    and cross-selling strategies. This system has the advantage of not needing manual
    maintenance. Because at this point `HatShop` retains what products were sold,
    you will implement a “customers who bought this product also bought…” feature
    in this chapter.


    ## Increasing Sales with Dynamic Recommendations


    In `HatShop`, you’ll implement the dynamic recommendations system in the visitor’s
    shopping cart and in the product details page. After adding the new bits to your
    shop, the product details page will contain the product recommendations list at
    the bottom of the page, as shown in Figure 10-1.


    **335**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00137.png)


    648XCH10.qxd 11/19/06 1:59 PM Page 336


    **336**


    C H A P T E R 1 0 ■ P R O D U C T R E C O M M E N D AT I O N S


    **Figure 10-1.** *The product details page with the dynamic recommendations system
    implemented*


    The shopping cart page gets a similar addition, as shown in Figure 10-2.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00091.png)


    648XCH10.qxd 11/19/06 1:59 PM Page 337


    C H A P T E R 1 0 ■ P R O D U C T R E C O M M E N D AT I O N S


    **337**


    **Figure 10-2.** *The shopping cart details page with the dynamic recommendations
    system implemented*


    ## Implementing the Data Tier


    Before writing any code, you first need to understand the logic you’ll implement
    for making product recommendations. We’ll focus here on the logic of recommending
    products that were ordered together with another specific product. Afterward,
    the recommendations for the shopping cart page will function in a similar way
    but will take more products into consideration.


    So, you need to find out what other products were bought by customers who also
    bought the product for which you’re calculating the recommendations (in other
    words, determine the “customer who bought this product also bought…” information).
    Let’s develop the SQL logic to achieve the list of product recommendations step
    by step.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH10.qxd 11/19/06 1:59 PM Page 338


    **338**


    C H A P T E R 1 0 ■ P R O D U C T R E C O M M E N D AT I O N S


    **Tip** Because SQL is very powerful, you can actually implement the same functionality
    in several ways. Here, we’ll cover just one of the options, but when implementing
    the actual database functions, you’ll be shown other options as well.


    To determine what other products were ordered together with a specific product,
    you need to join two instances of the `order_detail` table on their `order_id`
    fields. Feel free to review the “Joining Data Tables” section in Chapter 4 for
    a quick refresher about table joins.'
