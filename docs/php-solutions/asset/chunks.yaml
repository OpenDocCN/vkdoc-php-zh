    ### 使用 DateInterval 类添加和减去时间段


    `DateInterval` 类用于指定要通过 `add()` 和 `sub()` 方法对 `DateTime` 对象进行添加或减去的时间段。它也用于 `diff()`
    方法，该方法会返回一个 `DateInterval` 对象。刚开始使用 `DateInterval` 类可能会感觉有点奇怪，但它其实相对容易理解。


    要创建一个 `DateInterval` 对象，你需要向构造函数传递一个指定时间间隔长度的字符串；该字符串必须按照 ISO 8601 标准格式化。该字符串始终以字母
    `P`（代表 period）开头，后跟一个或多个整数与被称为周期指示符的字母组成的键值对。如果时间间隔包含小时、分钟或秒，则时间部分前需加上字母 `T`。表
    14-7 列出了有效的周期指示符。


    **表 14-7.** `DateInterval` 类使用的 ISO 8601 周期指示符


    | 周期指示符 | 含义 |

    | --- | --- |

    | `Y` | 年 |

    | `M` | 月 |

    | `W` | 周——不能与天组合使用 |

    | `D` | 天——不能与周组合使用 |

    | `H` | 小时 |

    | `M` | 分钟 |

    | `S` | 秒 |


    以下示例应能说明如何指定一个时间间隔：


    ```

    $interval1 = new DateInterval(''P2Y'');           // 2 年

    $interval2 = new DateInterval(''P5W'');           // 5 周

    $interval3 = new DateInterval(''P37D'');          // 5 周 2 天

    $interval4 = new DateInterval(''PT6H20M'');       // 6 小时 20 分钟

    $interval5 = new DateInterval(''P1Y2DT3H5M50S''); // 1 年 2 天 3 小时 5 分 50 秒

    ```


    请注意，`$interval3` 需要指定总天数，因为周会自动转换为天，所以 `W` 和 `D` 不能在同一个时间间隔定义中组合使用。


    要将 `DateInterval` 对象与 `DateTime` 类的 `add()` 或 `sub()` 方法一起使用，请将对象作为参数传递。例如，以下代码为
    2014 年圣诞节日期增加了 12 天：


    ```

    $xmas2014 = new DateTime(''12/25/2014'');

    $interval = new DateInterval(''P12D'');

    $xmas2014->add($interval);

    ```


    如果你不需要重用该时间间隔，可以直接将 `DateInterval` 构造函数作为参数传递给 `add()`，如下所示：


    ```

    $xmas2014 = new DateTime(''12/25/2014'');

    $xmas2014->add(new DateInterval(''P12D''));

    ```


    此计算的结果在 `date_interval_01.php` 中进行了演示，该文件产生以下输出：


    ![A978-1-4842-0635-5_14_Fige_HTML.jpg](img/A978-1-4842-0635-5_14_Fige_HTML.jpg)


    除了使用表 14-7 列出的周期指示符之外，另一种方法是使用静态方法 `createFromDateString()`，该方法接受一个英文相对日期字符串作为参数，其工作方式与
    `strtotime()` 相同。使用 `createFromDateString()`，前述示例可以重写如下（代码位于 `date_interval_02.php`）：


    ```

    $xmas2014 = new DateTime(''12/25/2014'');

    $xmas2014->add(DateInterval::createFromDateString(''+12 days''));

    ```


    这会得到完全相同的结果。


    > **注意：** 使用 `DateInterval` 增加和减去月份的效果与前面描述的一致。如果结果日期超出范围，则会增加额外的天数。例如，将一月三十一日增加一个月，结果可能是三月三日或二日，具体取决于是否为闰年。要获取当月的最后一天，请使用前面“使用相对日期处理溢出”中描述的技术。


    ### 使用 `diff()` 方法查找两个日期之间的差异


    要查找两个日期之间的差异，请为两个日期分别创建一个 `DateTime` 对象，并将第二个对象作为参数传递给第一个对象的 `diff()` 方法。结果会作为一个
    `DateInterval` 对象返回。要从 `DateInterval` 对象中提取结果，你需要使用该对象的 `format()` 方法，该方法使用表 14-8
    中列出的格式字符。这些字符与 `DateTime` 类使用的格式字符不同。幸运的是，其中大部分都很容易记住。


    **表 14-8.** `DateInterval::format()` 方法使用的格式字符


    | 格式字符 | 描述 | 示例 |

    | --- | --- | --- |

    | `%Y` | 年。至少两位数字，必要时前导补零 | 12, 01 |

    | `%y` | 年，无前导零 | 12, 1 |

    | `%M` | 月，带前导零 | 02, 11 |

    | `%m` | 月，无前导零 | 2, 11 |

    | `%D` | 日，带前导零 | 03, 24 |

    | `%d` | 日，无前导零 | 3, 24 |

    | `%a` * | 总天数 | 15, 231 |

    | `%H` | 小时，带前导零 | 03, 23 |

    | `%h` | 小时，无前导零 | 3, 23 |

    | `%I` | 分钟，带前导零 | 05, 59 |

    | `%i` | 分钟，无前导零 | 5, 59 |

    | `%S` | 秒，带前导零 | 05, 59 |

    | `%s` | 秒，无前导零 | 5, 59 |

    | `%R` | 负号显示减号，正号显示加号 | -, + |

    | `%r` | 负号显示减号，正号无符号 | - |

    | `%%` | 百分号 | % |


    * 在某些 Windows 版本的 PHP 5.3 中存在一个错误，总天数始终返回 6015。


    `date_interval_03.php` 中的以下示例展示了如何使用 `diff()` 获取当前日期与美国独立宣言日期之间的差异，并使用 `format()`
    方法显示结果：


    ```

    <p><?php

    $independence = new DateTime(''7/4/1776'');

    $now = new DateTime();

    $interval = $now->diff($independence);

    echo $interval->format(''%Y years %m months %d days''); ?>

    since American independence.</p>

    ```


    如果你在浏览器中加载 `date_interval_03.php`，应该会看到类似于以下截图的内容（当然，实际的时间段会有所不同）。


    ![A978-1-4842-0635-5_14_Figf_HTML.jpg](img/A978-1-4842-0635-5_14_Figf_HTML.jpg)


    格式字符遵循一种逻辑模式。大写字母始终生成至少两位数字，必要时前导补零。小写字母没有前导零。


    > **注意：** 除了代表总天数的 `%a`，格式字符仅表示整个时间间隔的特定部分。例如，如果你将格式字符串改为 `$interval->format(''%m
    months'')`，它仅显示自上次七月四日以来经过的完整月数。它不会显示自 1776 年七月四日以来的总月数。

