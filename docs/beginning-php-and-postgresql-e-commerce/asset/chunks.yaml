    \ AM Page 45\n\n**C H A P T E R 2 ■ L AY I N G O U T T H E F O U N D AT I O N\
    \ S**\n\nThe error-handling method, `Handler`, will behave like this:\n\n- It\
    \ creates a detailed error message.\n- If configured to do so, the error is emailed\
    \ to the site administrator.\n- If configured to do so, the error is logged to\
    \ an errors log file.\n- If configured to do so, the error is shown in the response\
    \ web page.\n- Serious errors will halt the execution of the page. The other ones\
    \ will allow the page to continue processing normally.\n\nLet’s implement the\
    \ `ErrorHandler` class in the next exercise.\n\n**Exercise: Implementing the ErrorHandler\
    \ Class**\n\n1. Add the following error-handling related configuration variables\
    \ to `include/config.php`:\n\n```php\n<?php\n\n// SITE_ROOT contains the full\
    \ path to the hatshop folder define('SITE_ROOT', dirname(dirname(__FILE__)));\n\
    \n// Application directories\n\ndefine('PRESENTATION_DIR', SITE_ROOT . '/presentation/');\
    \ define('BUSINESS_DIR', SITE_ROOT . '/business/');\n\n// Settings needed to configure\
    \ the Smarty template engine define('SMARTY_DIR', SITE_ROOT . '/libs/smarty/');\n\
    \ndefine('TEMPLATE_DIR', PRESENTATION_DIR . '/templates'); define('COMPILE_DIR',\
    \ PRESENTATION_DIR . '/templates_c'); define('CONFIG_DIR', SITE_ROOT . '/include/configs');\n\
    \n// These should be true while developing the web site define('IS_WARNING_FATAL',\
    \ true);\n\ndefine('DEBUGGING', true);\n\n// The error types to be reported\n\n\
    define('ERROR_TYPES', E_ALL);\n\n// Settings about mailing the error messages\
    \ to admin define('SEND_ERROR_MAIL', false);\n\ndefine('ADMIN_ERROR_MAIL', 'admin@example.com');\n\
    \ndefine('SENDMAIL_FROM', 'errors@example.com');\n\nini_set('sendmail_from', SENDMAIL_FROM);\n\
    \n// By default we don't log errors to a file\n\ndefine('LOG_ERRORS', false);\n\
    \ndefine('LOG_ERRORS_FILE', 'c:\\\\hatshop\\\\errors_log.txt'); // Windows\n\n\
    // define('LOG_ERRORS_FILE', '/var/tmp/hatshop_errors.log'); // Unix\n```\n\n\
    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH02.qxd 11/8/06 9:33\
    \ AM Page 46\n\n```php\n/* Generic error message to be displayed instead of debug\
    \ info (when DEBUGGING is false) */\ndefine('SITE_GENERIC_ERROR_MESSAGE', '<h2>HatShop\
    \ Error!</h2>');\n\n?>\n```\n\n2. In the `hatshop` folder, create a subfolder\
    \ named `business`.\n\n3. In the `business` folder, create a file named `error_handler.php`\
    \ file, and write the following code:\n\n```php\n<?php\n\nclass ErrorHandler\n\
    {\n    // Private constructor to prevent direct creation of object\n    private\
    \ function __construct()\n    {\n    }\n\n    /* Set user error handler method\
    \ to ErrorHandler::Handler method */\n    public static function SetHandler($errTypes\
    \ = ERROR_TYPES)\n    {\n        return set_error_handler(array ('ErrorHandler',\
    \ 'Handler'), $errTypes);\n    }\n\n    // Error handler method\n    public static\
    \ function Handler($errNo, $errStr, $errFile, $errLine)\n    {\n        /* The\
    \ first two elements of the backtrace array are irrelevant:\n        - ErrorHandler.GetBacktrace\n\
    \        - ErrorHandler.Handler */\n        $backtrace = ErrorHandler::GetBacktrace(2);\n\
    \n        // Error message to be displayed, logged, or mailed\n        $error_message\
    \ = \"\\nERRNO: $errNo\\nTEXT: $errStr\" .\n        \"\\nLOCATION: $errFile, line\
    \ \" .\n        \"$errLine, at \" . date('F j, Y, g:i a') .\n        \"\\nShowing\
    \ backtrace:\\n$backtrace\\n\\n\";\n\n        // Email the error details, in case\
    \ SEND_ERROR_MAIL is true\n        if (SEND_ERROR_MAIL == true)\n            error_log($error_message,\
    \ 1, ADMIN_ERROR_MAIL, \"From: \" .\n            SENDMAIL_FROM . \"\\r\\nTo: \"\
    \ . ADMIN_ERROR_MAIL);\n\n        // Log the error, in case LOG_ERRORS is true\n\
    \        if (LOG_ERRORS == true)\n            error_log($error_message, 3, LOG_ERRORS_FILE);\n\
    ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH02.qxd 11/8/06\
    \ 9:33 AM Page 47\n\n```php\n        /* Warnings don't abort execution if IS_WARNING_FATAL\
    \ is false\n        E_NOTICE and E_USER_NOTICE errors don't abort execution */\n\
    \        if (($errNo == E_WARNING && IS_WARNING_FATAL == false) ||\n         \
    \   ($errNo == E_NOTICE || $errNo == E_USER_NOTICE))\n        // If the error\
    \ is nonfatal ...\n        {\n            // Show message only if DEBUGGING is\
    \ true\n        }\n    }\n}\n?>\n```"
