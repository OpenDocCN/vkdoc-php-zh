    如果你是从预编译的发行版安装，可能会看到默认标准，并且 `php.ini` 文件可能被拆分为多个文件以便管理。


    除了 `display_errors` 和 `error_reporting`，还有一个名为 `log_errors` 的选项。当它启用时，根据 `error_reporting`
    标志遇到的所有错误都会被写入日志文件。这在开发或生产服务器上发生错误后尝试追踪错误时非常有用。作为开发者，你可能无法访问出现错误的浏览器，因此事后能够翻阅错误日志是一种有用的调试工具。与
    `log_errors` 选项一起，还有一个选项（`error_log`）用于指定错误日志文件的名称。如果未指定，错误将被写入 Apache 的错误日志。


    `error_log` 选项可以设置为文件名或完整路径。当只配置为文件名时，文件将被放置在请求的主 PHP 脚本所在的同一目录中。如果使用完整路径，错误文件将写入特定位置，甚至可以由同一服务器上的多个主机共享。


    如果启用了 `E_NOTICE` 选项，错误日志文件可能会增长得非常快。建议定期清除这些文件。


    `register_argc_argv` 选项用于定义是否定义 `$argc` 和 `$argv` 变量。这些值通常与 CLI 版本的 PHP 一起使用，以访问传递的参数数量（`$argc`）和这些参数的值（`$argv`）。CLI
    版本实际上会覆盖 `php.ini` 中的这个值，并始终启用这些值。在 Web 环境中，该值的意义不大，因为脚本的参数存储在 `$_POST`、`$_GET`
    和其他超全局变量中。


    默认的 `php.ini` 文件大小约为 68kb。它们包含大量描述性文本，在解析文件时这些文本会被忽略。`php.ini` 文件的大小对大版本或小版本并无明显影响，因为该文件仅在服务器启动时读取一次。


    除了这里描述的值之外，查看内存使用、执行时间、POST 大小和上传数据的配置值也很重要。如果最大内存限制设置得太高，在高流量情况下可能会耗尽资源。另一方面，内存限制必须足够高以处理数据。重要的是以合理限制内可行的方式编写网站代码。如果你遇到内存问题，可以直接增加配置值，但这可能表明你需要重构脚本以更有效地利用资源。


    内存分配只能在 `php.ini`（或 Apache 配置）中进行配置。而 `max_execution_time` 则不是这样。它默认设置为 30 秒，对于大多数网站上的请求来说应该足够了。实际上，任何耗时超过
    4 秒的请求都应尽可能优化，以给用户提供最佳体验。然而，在某些请求上可能需要增加执行时间。如果你有一个分析大型数据集的查询，并且需要额外的时间，可以通过 `ini_set()`
    函数指定所需时间。将最大执行时间延长到 90 秒的语法如下：


    ```

    ini_set(''max_execution_time'', 90);

    ```


    Web 服务器可能有自己的超时值，如果超过该值，则会中断 PHP 脚本的执行。`max_execution_time` 仅影响 PHP 实际运行时间。如果
    PHP 脚本包含系统调用，则在这些调用运行期间“时钟”会停止。


    一个重要的配置选项是默认时区。如果没有此配置，每次使用日期函数时系统都会生成警告。该设置称为 `date.timezone`，可以设置为任何受支持的时区值。将其设置为
    `UTC` 会导致所有日期/时间函数与以 `gm` 为前缀的函数行为相同。函数 `date()` 和 `gmdate()` 将返回相同的值。将其设置为任何其他值，如
    `''America/Los_Angeles''`，将导致这两个函数返回偏移 8 小时的值。


    脚本在需要时可以更改默认时区。如果用户的时区存储在数据库中，脚本可以使用该值来设置时区。这样，所有日期/时间值的表示都可以根据每个用户的时区进行。动态设置时区的函数称为
    `date_default_timezone_set()`，它接受一个字符串作为唯一参数。


    大多数配置选项同时适用于 Windows 和 Linux，但其中一些是 Windows 特定的。主要区别在于扩展的命名。在 Linux 上，名称以 `.so`
    结尾；在 Windows 上，它们以 `php_` 开头并以 `.dll` 结尾（`mysqli.so` 对比 `php_mysqli.dll`）。


    扩展可以通过以下配置加载：


    ```

    extension=mysqli.so

    ```


    或在 Windows 上：


    ```

    extension=php_mysqli.dll

    ```


    扩展也可以编译进去，因此无需在 `php.ini` 中加载它们。标准扩展（`Core`、`ctype`、`date` 等）就是这种情况。


    ## 配方 1-3：编译 PHP


    ### 问题


    对于大多数 PHP 开发者来说，使用预编译版本的 PHP 很可能已经足够，但如果操作系统未提供最新版本，或者你想创建自己的扩展，甚至想为 PHP 项目做出贡献，你就需要从源码编译
    PHP。这该如何实现？


    ### 解决方案


    获取 PHP 源码有两种基本方式。第一种是下载预配置且官方发布的 PHP 版本，另一种是从 git 仓库获取源码。第一个选项提供匹配特定版本的所有文件，当发布新版本时，开发者必须下载该软件包并重新编译所有内容。使用
    git 仓库可以非常轻松地在版本之间切换，并且也很容易始终拥有最新版本。不建议在当前开发分支上运行生产服务器。它可能包含未经测试的功能。生产服务器应运行在官方发布的版本上，因为这些版本已经过严格的
    QA 测试。


    要从源码编译 PHP，需要安装一些工具。在 Linux 环境下，这些工具包括 `automake`、`autoconf`、`libtool` 和编译器（`gcc`）。在
    Windows 上，你需要安装 Microsoft Visual Studio 的一个版本。除此之外，PHP 还依赖许多开源库。在 Linux 上，这些库大多可以在安装过程中被检测到，并通过包管理器快速安装。在
    Windows 上没有使这变得简单的包管理器，但仍然可以下载这些库的源码包并根据需要编译它们。


    ### 工作原理


    使用 PHP 官方发布版和从 git 仓库编译的主要区别在于 `buildconf` 工具的使用。在官方发布版中，这是在打包源文件时完成的，如果你尝试运行该命令，它会生成一个警告。`buildconf`
    脚本的基本功能是扫描源码树中的所有目录并生成 `configure` 文件。然后使用 `configure` 文件生成 `Makefile`，它是编译器的输入，描述了编译配置选项所需的所有文件和依赖关系。本节将演示从克隆的
    git 仓库构建 PHP 7。


    在全新安装的 CentOS 7 上，第一步是安装一个 git 版本。使用包管理器来执行此操作：


    ```

    $ yum install git

    ```


    确保以 root 身份运行此命令，或者记得在前面加上 `sudo`。根据系统上已安装的软件包，此操作可能会安装 git 依赖的其他一些软件包。


    在主目录中创建一个名为 `Source` 的文件夹，切换到该文件夹，然后使用 git 命令克隆 git 仓库：


    ```

    $ mkdir Source

    $ cd Source

    $ git clone http://git.php.net/repository/php-src

    ```


    这将创建一个名为 `php-src` 的目录，其中包含所有源文件的副本。如果你需要特定版本的 PHP，请使用 `git checkout` 命令切换到特定分支。命令
    `git branch -a` 将列出所有可用分支。该列表相当长，因为仓库包含可追溯到 PHP 4.0 的版本。


    默认情况下，会检出 `master` 分支。该分支包含最新、最好的代码。截至目前，这对应于未发布的 PHP 7.1 版本。要获取最新发布的版本（PHP 7.0），请使用以下命令：


    ```

    $ git checkout PHP-7.0

    Branch PHP-7.0 set up to track remote branch PHP-7.0 from origin.

    Switched to a new branch ''PHP-7.0''

    ```


    在执行 `buildconf` 命令之前，必须确保工具链完整：


    ```

    $ yum install gcc autoconf automake libtool

    ```


    这将安装足够的工具来运行 `buildconf` 命令：


    ```

    $ ./buildconf

    buildconf: checking installation...

    buildconf: autoconf version 2.69 (ok)

    rebuilding aclocal.m4

    rebuilding configure

    rebuilding main/php_config.h.in

    ```


    这将生成用于指定编译 PHP 时使用的操作的 `configure` 脚本。此时运行此命令会产生一个长输出，并以错误结尾：


    ```

    $ ./configure

    checking for grep that handles long lines and -e... /usr/bin/grep

    checking for egrep... /usr/bin/grep –E

    ...

    configure: WARNING: This bison version is not supported for regeneration of the
    Zend/PHP

    parsers (found: none, min: 204, excluded: ).

    checking for re2c... no

    configure: WARNING: You will need re2c 0.13.4 or later if you want to regenerate
    PHP parsers.

    configure: error: bison is required to build PHP/Zend when building a GIT checkout!

    ```


    此错误表明系统缺少编译 PHP 所需的一些功能。在这种情况下，是缺少 `bison` 库。可以通过以下命令安装：


    ```

    $ yum install bison

    ```


    之后，我们可以再次运行 configure 脚本并查找更多错误。接下来会缺少 `libxml2` 库。默认情况下，PHP 包含对 SimpleXML 和其他
    XML 扩展的支持。仅安装库是不够的。系统需要库以及链接所需的头文件和其他文件，因此安装命令如下：


    ```

    $ yum install libxml2-devel

    ```


    在本示例中，configure 脚本是在没有任何选项的情况下运行的。如果使用了包含各种扩展的选项，可能会出现其他依赖项，你必须安装这些依赖项并重复 configure
    步骤，直到所有依赖项都安装完成。


    当 configure 脚本成功完成时，输出将以以下行结尾：


    ```

    Generating files

    configure: creating ./config.status

    creating main/internal_functions.c

    creating main/internal_functions_cli.c

    +--------------------------------------------------------------------+

    | License:                                                            |

    | This software is subject to the PHP License, available in this      |

    | distribution in the file LICENSE. By continuing this installation   |

    | process, you are bound by the terms of this license agreement.      |

    | If you do not agree with the terms of this license, you must abort  |

    | the installation process at this point.                             |

    +--------------------------------------------------------------------+

    Thank you for using PHP.


    config.status: creating php7.spec

    config.status: creating main/build-defs.h

    config.status: creating scripts/phpize

    config.status: creating scripts/man1/phpize.1

    config.status: creating scripts/php-config

    config.status: creating scripts/man1/php-config.1

    config.status: creating sapi/cli/php.1

    config.status: creating sapi/cgi/php-cgi.1

    config.status: creating ext/phar/phar.1

    config.status: creating ext/phar/phar.phar.1

    config.status: creating main/php_config.h

    config.status: executing default commands

    ```


    现在，通过运行 `make` 命令即可开始构建。根据启用的扩展数量，这需要几分钟时间。`make` 命令会产生许多输出行，并以这些行结尾：


    ```

    Build complete.

    Don''t forget to run ''make test''.

    ```


    在安装之前运行测试套件总是一个好主意。通过发送失败的测试列表，它为 QA 团队提供了有价值的反馈。


    新版本的 PHP 现在已准备好安装。默认安装位置是 `/usr/local`，因为没有向 configure 脚本提供其他位置。这实际上允许将此新编译版本与通过
    CentOS 包管理器安装的版本一起安装。要安装此版本，请运行以下命令：


    ```

    $ sudo make install

    ```


    安装后，检查 PHP 的版本：


    ```

    $ php -v

    PHP 7.0.6-dev (cli) (built: Apr 2 2016 20:05:26) ( NTS )

    Copyright (c) 1997-2016 The PHP Group

    Zend Engine v3.0.0, Copyright (c) 1998-2016 Zend Technologies

    ```


    到目前为止，只编译了 CLI 和 CGI 版本的 PHP。为了编译 Apache 模块版本，需要向 configure 命令添加至少一个选项：


    ```

    $ ./configure --with-apxs2

    ```


    此命令很可能会失败，因为 `apxs` 脚本默认未随 CentOS 的 Apache 软件包安装。`apxs` 脚本随 `httpd-devel` 软件包一起安装：


    ```

    $ sudo yum install httpd-apxs2

    $ ./configure --with-apxs2

    $ make

    $ sudo make install

    ```


    ![Image 12](img/index-59_1.jpg)


    这将把 PHP 模块安装到位于 `/etc/httpd` 的 `httpd.conf` 文件中。由于之前安装了 PHP 5.4 版本，现在两者之间存在冲突，并且在不出现错误的情况下无法再启动
    Apache 服务器。要解决这些错误，必须编辑文件以禁用 PHP 5 版本的模块。安装脚本将新模块安装在 `/etc/httpd/conf/httpd.conf`
    中，而 CentOS 安装创建了一个模块配置文件 `/etc/httpd/conf.modules.d/10-php.conf`。首先编辑文件 `/etc/httpd/conf/httpd.conf`
    并找到以下行：


    ```

    LoadModule php7_module /usr/lib64/httpd/modules/libphp7.so

    ```


    应移除这一行，并将其添加到文件 `/etc/httpd/conf.modules.d/10-php.conf` 中。现在该文件将如下所示：


    ```

    #

    '
- fmt: "# PHP is an HTML-embedded scripting language which attempts to make it easy\
    \ for developers to write dynamically generated webpages.\n\n```\n<IfModule prefork.c>\n\
    # LoadModule php5_module modules/libphp5.so\nLoadModule php7_module /usr/lib64/httpd/modules/libphp7.so\n\
    </IfModule>\n```\n\nThe Apache server can now be started and pointing a browser\
    \ to the `phpinfo.php` script will show the following information:\n\n## Chapter\
    \ 1 ■ Installation and Configuration\n\nThe list of modules installed can be shown\
    \ by running the CLI version of `php` with the parameter `–m`.\n\n```\n$ php -m\n\
    [PHP Modules]\nCore\nctype\ndate\ndom\nfileinfo\nfilter\nhash\niconv\njson\nlibxml\n\
    mysqli\nmysqlnd\npcre\nPDO\npdo_sqlite\nPhar\nposix\nReflection\nsession\nSimpleXML\n\
    SPL\nsqlite3\nstandard\ntokenizer\nxml\nxmlreader\nxmlwriter\n[Zend Modules]\n\
    ```\n\n### Recipe 1-4. Installing MySQL\n\n#### Problem\n\nWe now have a system\
    \ with a web server that supports executing PHP scripts and returning the output\
    \ of the script instead of the raw source file. In order to complete the installation\
    \ of a fully functional development stack we need to install the MySQL database\
    \ server.\n\n#### Solution\n\nThe basic installation of a MySQL compatible database\
    \ on CentOS 7 is called MariaDB. The official MySQL database is owned by Oracle.\
    \ It is still kept as an open source and they have a few community-based versions.\
    \ When Oracle purchased Sun Microsystems and thereby acquired the MySQL source\
    \ code the original development team created a new version. They have been developing\
    \ new features and improved performance. So far the two products provide a feature\
    \ set that is compatible but as time goes by we might see the two products develop\
    \ features that are not compatible.\n\nTo install the MariaDb Server and all its\
    \ dependencies, run these commands as the root user:\n\n```\n$ yum install mariadb-server\n\
    $ systemctl enable mariadb\n$ systemctl start mariadb\n```\n\nAfter that it is\
    \ recommended to run the command `mysql_secure_installation`. This is a script\
    \ that will set a root password, disable remote root login, and perform other\
    \ changes that will enhance security. With the exception of setting a root password\
    \ it is safe to answer yes to all questions. The name of the script is the same\
    \ for both MySQL and MariaDb installations.\n\n#### How it Works\n\nThis completes\
    \ the installation of the database sever but there is no support in PHP for this\
    \ database. In order to get the MySQLi extension installed it is necessary to\
    \ reconfigure PHP to add the extension, recompile, and reinstall:\n\n```\n$ ./configure\
    \ --with-apxs2 --with-mysqli\n$ make\n$ sudo make install\n```\n\nIn this environment\
    \ it is necessary to re-edit the `/etc/httpd/conf/httpd.conf` file and remove\
    \ the entry added for the `php7_module`.\n\nThe PHP installation is now complete.\
    \ If other extensions are needed the steps above can be repeated.\n\nTo install\
    \ MariaDB on Windows is equally easy. The latest installation packages can be\
    \ found at [https://mariadb.org/download/](https://mariadb.org/download/), or\
    \ if you prefer the MySQL version you can download the installation files from\
    \ [http://www.mysql.com/downloads/](http://www.mysql.com/downloads/).\n\n### Recipe\
    \ 1-5. Virtual Machines\n\n#### Problem\n\nWhen development is done on a Windows\
    \ or Mac OSX computer and deployment is done on a Linux environment it is easy\
    \ to run into issues that are related to differences in the operating systems,\
    \ or there could be issues with lack of support for specific extensions on one\
    \ of the platforms. Is there a way to minimize these problems?\n\n#### Solution\n\
    \nThere are a number of cloud-based services that offer relatively cheap virtual\
    \ Linux environments. Many of these can be configured and launched in a few minutes\
    \ and the user only pays for the time the configuration is active. The cost is\
    \ as low as $10 per month.\n\nHaving a virtual server in the cloud requires an\
    \ Internet connection to use with the server. If work is done offline it is more\
    \ convenient to install a Virtual Machine on the development environment. A Virtual\
    \ Machine is a system that allows the primary operating system on a computer to\
    \ be the host for one or more client systems. This is supported on Windows, Mac\
    \ OSX, and Linus systems, either with native software, third-party freeware (VirtualBox),\
    \ or commercial products (VM-Ware or Parallels).\n\n#### How it Works\n\nVirtualBox\
    \ is supported by Oracle and can be downloaded for free at [https://www.virtualbox.org/](https://www.virtualbox.org/).\
    \ After installation of the software you can create as many virtual machines as\
    \ you have space on the hard drive.\n\nEach virtual machine requires 10-100Gb\
    \ of disk space. It is possible to install both Windows and Linux guests. The\
    \ guests can be installed from an ISO image that can be downloaded from the preferred\
    \ Linux distributions web site. Windows even provides distributions of prebuilt\
    \ systems that can be downloaded and launched. Most of these can be used for up\
    \ to 90 days for testing purposes. If you have a valid Windows license you can\
    \ also create an installation that doesn’t expire.\n\n## Chapter 2 ■ Classes and\
    \ Objects\n\nObject-oriented programming provides many advantages over procedural\
    \ programming. It helps with encapsulation when code is shared within a team or\
    \ between teams and it can help protect elements of the code from being abused.\
    \ This is especially the case when code is shared in compiled form but the same\
    \ mechanisms can be applied to a scripting language like PHP. This chapter describes\
    \ how object-oriented programming works in PHP.\n\n### Recipe 2-1. Writing a Simple\
    \ Class\n\n#### Problem\n\nPHP can be used as a procedural programming language,\
    \ but you want to make use of the many features of object-oriented programming\
    \ with classes and objects to create advanced libraries and applications that\
    \ make collaboration and encapsulation easy.\n\n#### Solution\n\nA class is the\
    \ foundation of object-oriented programming. A class is a collection of properties\
    \ and methods that goes together and so this is where to start when writing an\
    \ object-oriented PHP application.\n\nLike most other object-oriented programming\
    \ languages the keyword `class` is used to define classes that consist of class\
    \ variables, class constants, and methods. The class is used to define all the\
    \ data and all the functionality associated with the object that can be instantiated\
    \ from the class. In other words, the class is the definition and the object is\
    \ the live instance and multiple instances can be created from the same class\
    \ where each instance exists as a value in a variable.\n\n#### How it Works\n\n\
    The first example is a simple class definition where the class `foo` has a single\
    \ method called `a()`. Methods are defined as any regular function but because\
    \ it’s defined within a class it becomes a method that belongs to that class.\n\
    \n```php\n<?php\n// 2_1.php\nclass foo {\n    function a() {\n        echo \"\
    Method foo::a()\\n\";\n    }\n}\n```\n\n© Frank M. Kromann 2016\nF.M. Kromann,\
    \ *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_2\n\n### Recipe 2-2.\
    \ Writing a Base Class\n\n#### Problem\n\nPHP supports different types of classes\
    \ that serve various purposes. These are called base, abstract, and interface\
    \ classes. You want to use a base class to include functionality that is shared\
    \ by multiple subclasses that all share the same base functionality.\n\n#### Solution\n\
    \nA base class is usually a simple class that can be used to instantiate objects\
    \ that store member data and can perform actions on the data. A base class can\
    \ also be extended to add additional or changed functionality. This principle\
    \ can be repeated so extended classes can be extended further and so on.\n\n####\
    \ How it Works\n\nIn the following example we have a class with one member function\
    \ and a second class that extends the first one and adds a second member.\n\n\
    ```php\n<?php\n// 2_2.php\nclass foo {\n    function a() {\n        echo \"Method\
    \ foo::a()\\n\";\n    }\n}\n```"
