  \ ?>\"\n<?php\nif (isset($_POST['image_id']) && $row['image_id'] ==\n$_POST['image_id'])\
  \ {\necho 'selected';\n}\n?>\n><?php echo $row['filename']; ?></option>\n<?php }\
  \ ?>\n</select>\n</p>\n```\n\n这会创建另一个`SELECT`查询，用于获取`images`表中每张图像的主键和文件名。目前你应该已经非常熟悉这段代码，因此无需额外解释。\n\
  \n复选框、文件输入字段以及用于图片说明的文本输入字段应放置在上一段代码与提交按钮之间。代码如下所示：\n\n```\n<p id=\"allowUpload\"\
  >\n<input type=\"checkbox\" name=\"upload_new\" id=\"upload_new\">\n<label for=\"\
  upload_new\">上传新图像</label>\n</p>\n<p class=\"optional\">\n<label for=\"image\">选择图像：</label>\n\
  <input type=\"file\" name=\"image\" id=\"image\">\n</p>\n<p class=\"optional\">\n\
  <label for=\"caption\">图片说明：</label>\n<input name=\"caption\" type=\"text\" id=\"\
  caption\">\n</p>\n```\n\n包含复选框的段落已被赋予 ID `allowUpload`，另外两个段落则被赋予类名`optional`。`admin.css`中的样式规则将这三个段落的`display`属性设置为`none`。\n\
  \n保存`blog_insert_mysqli.php`并在浏览器中加载该页面。`images <select>`下拉菜单显示在`categories`列表下方，但你在步骤\
  \ 9 中插入的三个表单元素是隐藏的。如果浏览器中禁用了 JavaScript，页面将显示为此状态。用户将可以选择类别和现有图像，但无法上传新图像。\n\n如有需要，可将你的代码与`ch16`文件夹中的`blog_insert_mysqli_03.php`进行比对。\n\
  \n将`ch16`文件夹中的`toggle_fields.js`复制到`admin`文件夹。该文件包含以下 JavaScript 代码：\n\n```\nvar\
  \ cbox = document.getElementById('allowUpload');\ncbox.style.display = 'block';\n\
  var uploadImage = document.getElementById('upload_new');\nuploadImage.onclick =\
  \ function () {\nvar image_id = document.getElementById('image_id');\nvar image\
  \ = document.getElementById('image');\nvar caption = document.getElementById('caption');\n\
  var sel = uploadImage.checked;\nimage_id.disabled = sel;\nimage.parentNode.style.display\
  \ = sel ? 'block' : 'none';\ncaption.parentNode.style.display = sel ? 'block' :\
  \ 'none';\nimage.disabled = !sel;\ncaption.disabled = !sel;\n}\n```\n\n这段代码利用步骤\
  \ 8 中插入元素的 ID 来控制它们的显示状态。如果启用了 JavaScript，页面加载时会自动显示复选框，但文件输入字段和图片说明的文本输入字段仍保持隐藏。如果复选框被选中，现有图像的下拉菜单将被禁用，隐藏的元素则会显示出来。如果随后取消选中复选框，下拉菜单将重新启用，文件输入字段和图片说明字段会再次隐藏。\n\
  \n使用`<script>`标签将`toggle_fields.js`链接到`blog_insert_mysqli.php`，并放置在闭合的`</body>`标签之前，如下所示：\n\
  \n```\n</form>\n<script src=\"toggle_fields.js\"></script>\n</body>\n```\n\n将 JavaScript\
  \ 代码添加到页面底部可以加快下载和显示速度。如果将其添加到`<head>`中，`toggle_fields.js`中的代码将无法正常工作。\n\n保存`blog_insert_mysqli.php`并在浏览器中加载该页面。在支持\
  \ JavaScript 的浏览器中，复选框应显示在`<select>`下拉菜单和提交按钮之间。选中复选框可禁用下拉菜单并显示隐藏字段，如图 16-9 所示。\n\
  \n![A978-1-4842-0635-5_16_Fig9_HTML.jpg](img/A978-1-4842-0635-5_16_Fig9_HTML.jpg)\n\
  \n**图 16-9.** 复选框控制文件和图片说明输入字段的显示。\n\n取消选中复选框。文件和图片说明输入字段将隐藏，下拉菜单重新启用。如有需要，你可以与`ch16`文件夹中的`blog_insert_mysqli_04.php`和`toggle_fields.js`核对代码。\n\
  \n如果你好奇我为什么使用 JavaScript 而不是 PHP 来控制文件和图片说明输入字段的显示，那是因为 PHP 是一种服务器端语言。在 PHP 引擎将输出发送到浏览器后，除非你向\
  \ Web 服务器发送另一个请求，否则它不会与页面进一步交互。而 JavaScript 则在浏览器中运行，因此它能够在本地操控页面内容。JavaScript 还可以与\
  \ PHP 结合使用，在后台向 Web 服务器发送请求，并利用返回结果在不重新加载页面的情况下刷新部分页面——这种技术称为 Ajax，但不在本书的讨论范围之内。\n\
  \n更新后的插入表单现在包含了类别和图像的输入字段，但处理脚本仍然只处理标题的文本输入字段和博客条目的文本区域。\n```\n\n\n"
- "# PHP 解决方案 16-4：向多张表插入数据\n\n本 PHP 解决方案修改了 `blog_insert_mysqli.php` 中的现有脚本，根据图 16-6\
  \ 所示的决策链，上传新图片（如有必要），然后将数据插入到 `images`、`blog` 和 `article2cat` 表中。此解决方案假设您已经设置了 `article2cat`\
  \ 交叉引用表，并完成了 PHP 解决方案 16-2 和 16-3。\n\n不要急于完成本部分内容。代码虽然较长，但它汇集了您之前学到的许多技术。\n\n**注意：**\
  \ 如果您使用 PDO，本 PHP 解决方案之后会有一个独立部分介绍代码的主要区别。\n\n您在 PHP 解决方案 16-2 中更新的 `Upload` 类使用了命名空间，因此您需要在脚本顶层导入它。在\
  \ `blog_insert_mysqli.php` 顶部的 PHP 起始标签之后立即添加以下代码行：\n\n`use PhpSolutions\\File\\\
  Upload;`\n\n在准备好的语句初始化之后，立即插入以下条件语句，用于处理已上传或已选择的图片。\n\n```\n// 初始化准备好的语句\n$stmt\
  \ = $conn->stmt_init();\n\n// 如果已上传文件，则进行处理\nif(isset($_POST['upload_new']) && $_FILES['image']['error']\
  \ == 0) {\n    $imageOK = false;\n    require_once '../PhpSolutions/File/Upload.php';\n\
  \    $loader = new Upload('../images/');\n    $loader->upload();\n    $names = $loader->getFilenames();\n\
  \    // 如果上传失败，$names 将是一个空数组\n    if ($names) {\n        $sql = 'INSERT INTO images\
  \ (filename, caption) VALUES (?, ?)';\n        if ($stmt->prepare($sql)) {\n   \
  \         $stmt->bind_param('ss', $names[0], $_POST['caption']);\n            $stmt->execute();\n\
  \            $imageOK = $stmt->affected_rows;\n        }\n    }\n    // 获取图片的主键或找出问题所在\n\
  \    if ($imageOK) {\n        $image_id = $stmt->insert_id;\n    } else {\n    \
  \    $imageError = implode(' ', $loader->getMessages());\n    }\n} elseif (isset($_POST['image_id'])\
  \ && !empty($_POST['image_id'])) {\n    // 获取之前上传图片的主键\n    $image_id = $_POST['image_id'];\n\
  }\n\n// 创建 SQL\n$sql = 'INSERT INTO blog (title, article, created) VALUES(?, ?,\
  \ NOW())';\n```\n\n这首先检查 `$_POST['upload_new']` 是否已设置。如第 5 章所述，复选框仅在被选中时才会包含在 `$_POST`\
  \ 数组中。因此，如果复选框未被选中，条件不成立，则转而测试底部的 `elseif` 子句。`elseif` 子句检查 `$_POST['image_id']`\
  \ 是否存在。如果存在且不为空，则表示已从下拉菜单中选择了一张现有图片，该值存储在 `$image_id` 中。\n\n如果两个测试都失败，则既没有上传图片，也没有从下拉菜单中选择图片。脚本稍后在为\
  \ `blog` 表准备 `INSERT` 查询时会考虑这一点，允许您创建不带图片的博客条目。\n\n但是，如果 `$_POST['upload_new']`\
  \ 存在，则表示复选框已被选中，并且可能已上传了图片。为了确保这一点，条件语句还会检查 `$_FILES['image']['error']` 的值。如您在第\
  \ 6 章中所学，错误代码 `0` 表示上传成功。任何其他错误代码都表示上传失败或未选择文件。\n\n假设表单已成功上传文件，条件语句会包含 `Upload`\
  \ 类定义，并创建一个名为 `$loader` 的对象，将目标文件夹设置为 `images`。然后调用 `upload()` 方法来处理文件并将其存储在 `images`\
  \ 文件夹中。为了避免代码复杂化，我使用了默认的最大尺寸和 MIME 类型。\n\n您在 PHP 解决方案 16-2 中对 `Upload` 类所做的修改，仅当文件成功移动到目标文件夹时，才会将上传文件的名称添加到\
  \ `$filenames` 属性中。`getFilenames()` 方法检索 `$filenames` 属性的内容，并将结果赋给 `$names`。\n\n\
  如果文件移动成功，其文件名将作为第一个元素存储在 `$names` 数组中。因此，如果 `$names` 包含一个值，您可以安全地继续执行 `INSERT` 查询，该查询将\
  \ `$names[0]` 和 `$_POST['caption']` 的值作为字符串绑定到准备好的语句中。\n\n语句执行后，`affected_rows`\
  \ 属性会重置 `$imageOK` 的值。如果 `INSERT` 查询成功，`$imageOK` 为 `1`，将被视为 `true`。\n\n如果图片详情已插入到\
  \ `images` 表中，则准备好的语句的 `insert_id` 属性会检索新记录的主键，并将其存储在 `$image_id` 中。必须在运行任何其他 SQL\
  \ 查询之前访问 `insert_id` 属性，因为它包含最新查询的主键。\n\n但是，如果 `$imageOK` 仍然为 false，则 `else` 块会调用上传对象的\
  \ `getMessages()` 方法，并将结果赋给 `$imageError`。`getMessages()` 方法返回一个数组，因此使用 `implode()`\
  \ 函数将数组元素连接成一个字符串。失败最可能的原因是文件太大或 MIME 类型错误。\n\n只要图片上传没有失败，下一步就是将博客条目插入到 `blog` 表中。`INSERT`\
  \ 查询的形式取决于博客条目是否关联了图片。如果有关联，则 `$image_id` 存在，需要作为外键插入到 `blog` 表中。否则，可以使用原始查询。\n\n\
  像这样修改原始查询：\n\n```\n// 如果图片上传失败，则不插入博客详情\nif (!isset($imageError)) {\n    // 如果已设置\
  \ $image_id，则将其作为外键插入\n    if (isset($image_id)) {\n        $sql = 'INSERT INTO\
  \ blog (image_id, title, article) VALUES(?, ?, ?)';\n        if ($stmt->prepare($sql))\
  \ {\n            $stmt->bind_param('iss', $image_id, $_POST['title'], $_POST['article']);\n\
  \            $stmt->execute();\n        }\n    } else {\n        // 创建 SQL\n   \
  \     $sql = 'INSERT INTO blog (title, article)\n                VALUES(?, ?)';\n\
  \        if ($stmt->prepare($sql)) {\n            // 绑定参数并执行语句\n            $stmt->bind_param('ss',\
  \ $_POST['title'], $_POST['article']);\n            $stmt->execute();\n        }\n\
  \    }\n\n    if ($stmt->affected_rows > 0) {\n        $OK = true;\n    }\n}\n```\n\
  \n整个代码块都包裹在一个条件语句中，检查 `$imageError` 是否存在。如果存在，则无需插入新博客条目，因此会忽略整个代码块。\n\n但是，如果 `$imageError`\
  \ 不存在，则嵌套的条件语句会根据 `$image_id` 是否存在准备不同的 `INSERT` 查询，然后执行已准备好的那一个。\n\n检查 `affected_rows`\
  \ 属性的条件语句被移到了 `else` 块之外，以便它适用于任何一种 `INSERT` 查询。\n\n流程的下一步是向 `article2cat` 交叉引用表中插入值。代码紧跟在之前步骤的代码之后，如下所示：\n\
  \n```\n// 如果博客条目插入成功，检查分类\nif ($OK && isset($_POST['category'])) {\n    // 获取文章的主键\n\
  \    $article_id = $stmt->insert_id;\n\n    foreach ($_POST['category'] as $cat_id)\
  \ {\n        if (is_numeric($cat_id)) {\n            $values[] = \"($article_id,\
  \ \" . (int) $cat_id . ')';\n        }\n    }\n\n    if ($values) {\n        $sql\
  \ = 'INSERT INTO article2cat (article_id, cat_id)\n                VALUES ' . implode(',',\
  \ $values);\n        // 执行查询，如果失败则获取错误消息\n        if (!$conn->query($sql)) {\n \
  \           $catError = $conn->error;\n        }\n    }\n}\n```\n\n\n\n`$OK`的值由插入`blog`表数据的查询中的`affected_rows`属性决定，且多选的`<select>`列表仅在选中任何分类时才包含在`$_POST`数组中。因此，仅当数据成功插入`blog`表且表单中至少选中一个分类时，才会执行此代码块。它首先从预处理语句的`insert_id`属性获取插入操作的主键，并将其赋值给`$article_id`。\n\
  \n表单将分类值作为数组提交。`foreach`循环检查`$_POST['category']`中的每个值。如果值为数字，则执行以下行：\n\n```\n$values[]\
  \ = \"($article_id, \" . (int) $cat_id . ')';\n```\n\n这将创建一个包含两个主键`$article_id`和`$cat_id`的字符串，用逗号分隔并包裹在括号内。`(int)`类型转换运算符确保`$cat_id`为整数。结果赋值给名为`$values`的数组。例如，如果`$article_id`为`10`且`$cat_id`为`4`，则赋值给数组的结果字符串为`(10,\
  \ 4)`。\n\n如果`$values`包含任何元素，`implode()`会将其转换为逗号分隔的字符串并附加到 SQL 查询中。例如，如果选中了分类`2`、`4`和`5`，则生成的查询如下所示：\n\
  \n```\nINSERT INTO article2cat (article_id, cat_id)\nVALUES (10, 2),(10, 4),(10,5)\n\
  ```\n\n正如“回顾四个基本的 SQL 命令”中第 13 章所述，这是如何使用单个`INSERT`查询插入多行数据的方法。\n\n由于`$article_id`来自可靠源且`$cat_id`的数据类型已检查，因此直接在\
  \ SQL 查询中使用这些变量而无需使用预处理语句是安全的。该查询通过`query()`方法执行。如果失败，连接对象的`error`属性将存储在`$catError`中。\n\
  \n代码的最后部分处理成功时的重定向和错误消息。修改后的代码如下所示：\n\n```\n// redirect if successful or display\
  \ error\nif ($OK && !isset($imageError) && !isset($catError)) {\n    header('Location:\
  \ http://localhost/phpsols/admin/blog_list_mysqli.php');\n    exit;\n} else {\n\
  \    $error = $stmt->error;\n    if (isset($imageError)) {\n        $error .= '\
  \ ' . $imageError;\n    }\n    if (isset($catError)) {\n        $error .= ' ' .\
  \ $catError;\n    }\n}\n```\n\n控制重定向的条件现在确保`$imageError`和`$catError`不存在。如果存在其中一个，该值将拼接到原始`$error`中，其中包含来自预处理语句对象的任何错误消息。\n\
  \n保存`blog_insert_mysqli.php`并在浏览器中测试。尝试上传过大的图像或类型错误的文件。表单应重新显示，并附带错误消息，同时保留博客详细信息。同时尝试插入带有或不带有图像和/或分类的博客条目。你现在拥有一个通用的插入表单。\n\
  \n如果没有合适的图像上传，请使用`phpsols images`文件夹中的图像。`Upload`类会重命名它们以避免覆盖现有文件。\n\n你可以对照`ch16`文件夹中的`blog_insert_mysqli_05.php`检查你的代码。\n\
  \n#### PDO 版本的主要区别\n\n最终的 PDO 版本可以在`ch16`文件夹的`blog_insert_pdo_05.php`中找到。它遵循与 MySQLi\
  \ 版本相同的基本结构和逻辑，但在将值插入数据库的方式上存在一些重要区别。\n\n步骤 2 中的代码紧密遵循 MySQLi 版本，但使用命名占位符代替匿名占位符。要获取受影响的行数，PDO\
  \ 在语句对象上使用`rowCount()`方法。最近一次插入操作的主键通过连接对象的`lastInsertId()`方法获取。与 MySQLi 的`insert_id`属性一样，你需要在`INSERT`查询执行后立即访问它。\n\
  \n最大的变化在步骤 3 中将详细信息插入`blog`表的代码中。由于 PDO 可以使用`bindValue()`将`null`值插入列，因此只需要一个预处理语句。步骤\
  \ 3 的 PDO 代码如下所示：\n\n```\n// don't insert blog details if the image failed to upload\n\
  if (!isset($imageError)) {\n    // create SQL\n    $sql = 'INSERT INTO blog (image_id,\
  \ title, article)\n            VALUES(:image_id, :title, :article)';\n    // prepare\
  \ the statement\n    $stmt = $conn->prepare($sql);\n    // bind the parameters\n\
  \    // if $image_id exists, use it\n    if (isset($image_id)) {\n        $stmt->bindParam(':image_id',\
  \ $image_id, PDO::PARAM_INT);\n    } else {\n        // set image_id to NULL\n \
  \       $stmt->bindValue(':image_id', NULL, PDO::PARAM_NULL);\n    }\n    $stmt->bindParam(':title',\
  \ $_POST['title'], PDO::PARAM_STR);\n    $stmt->bindParam(':article', $_POST['article'],\
  \ PDO::PARAM_STR);\n    // execute and get number of affected rows\n    $stmt->execute();\n\
  \    $OK = $stmt->rowCount();\n}\n```\n\n如果已上传图像，高亮显示的条件语句将`$image_id`的值绑定到命名的`:image_id`占位符。但如果没有上传图像，`bindValue()`将值设置为`NULL`。\n\
  \n在步骤 4 中，PDO 版本使用`exec()`而不是`query()`将值插入`article2cat`表。`exec()`方法执行 SQL 查询并返回受影响的行数，因此当不需要预处理语句时，应将其与`INSERT`、`UPDATE`和`DELETE`查询一起使用。\n\
  \n另一个重要区别在于构建错误消息的代码（如果出现问题）。由于在 PDO 中创建和准备语句是一个步骤，因此语句对象可能不存在（如果出现问题）。因此，在尝试调用`errorInfo()`方法之前，需要检查其是否存在。如果没有语句，则从数据库连接对象获取错误消息。还需要将`$error`初始化为空字符串，以便将各种消息拼接到其中，如下所示：\n\
  \n```\n// redirect if successful or display error\nif ($OK && !isset($imageError)\
  \ && !isset($catError)) {\n    header('Location: http://localhost/phpsols/admin/blog_list_pdo.php');\n\
  \    exit;\n} else {\n    $error = '';\n    if (isset($stmt)) {\n        $errorInfo\
  \ = $stmt->errorInfo();\n    } else {\n        $errorInfo = $conn->errorInfo();\n\
  \    }\n    if (isset($errorInfo[2])) {\n        $error .= $errorInfo[2];\n    }\n\
  \    if (isset($imageError)) {\n        $error .= ' ' . $imageError;\n    }\n  \
  \  if (isset($catError)) {\n        $error .= ' ' . $catError;\n    }\n}\n```\n\n\
  ## 更新和删除多表中的记录\n\n`categories`和`article2cat`表的添加意味着上一章中 PHP Solutions 15-2 和 15-3\
  \ 中的`blog_update_mysqli.php`和`blog_update_pdo.php`的更改不再充分覆盖`phpsols`数据库中的外键关系。除了修改更新表单外，你还需要创建脚本来删除记录而不破坏数据库的引用完整性。\n\
  \n### 更新交叉引用表中的记录\n\n交叉引用表中的每条记录仅包含一个复合主键。通常，主键绝不应更改。此外，它们必须是唯一的。这对更新`article2cat`表带来了问题。如果在更新博客条目时不对选中的分类进行任何更改，则无需更新交叉引用表。但是，如果更改了分类，则需要确定要删除哪些交叉引用以及要插入哪些新引用。\n\
  \n与其纠结于是否进行了任何更改，一个简单的解决方案是删除所有现有的交叉引用，然后重新插入选中的分类。如果没有进行任何更改，只需重新插入相同的分类即可。\n\n\
  \n\n#### PHP 解决方案 16-5：为更新表单添加分类功能\n\n本 PHP 解决方案对上一章 PHP 解决方案 15-2 中的 `blog_update_mysqli.php`\
  \ 进行了修改，使其能够更新与博客文章关联的分类。为简化结构，对文章关联图片的唯一修改是选择另一张现有图片或不选择任何图片。\n\n请继续使用 PHP 解决方案\
  \ 15-2 中的 `blog_update_mysqli.php`。或者，从 `ch16` 文件夹中复制 `blog_update_mysqli_04.php`，并将其保存到\
  \ `admin` 文件夹中，命名为 `blog_update_mysqli.php`。当页面首次加载时，需要执行第二个查询来获取与博客文章关联的分类。在获取所选记录详细信息的条件语句中，添加以下高亮显示的代码：\n\
  \n```\n$stmt->free_result();\n\n// 获取与文章关联的分类\n$sql = 'SELECT cat_id FROM article2cat\n\
  WHERE article_id = ?';\n\nif ($stmt->prepare($sql)) {\n    $stmt->bind_param('i',\
  \ $_GET['article_id']);\n    $OK = $stmt->execute();\n    $stmt->bind_result($cat_id);\n\
  \n    // 循环遍历结果并将其存储到数组中\n    $selected_categories = [];\n    while ($stmt->fetch())\
  \ {\n        $selected_categories[] = $cat_id;\n    }\n}\n```\n\n该查询从交叉引用表中选择所有与所选博客文章主键匹配的记录的\
  \ `cat_id`。结果绑定到 `$cat_id`，然后通过 `while` 循环将值提取到名为 `$selected_categories` 的数组中。\n\
  \n在 HTML 页面的主体中，在文本区域和显示图片列表的 `<select>` 下拉菜单之间添加一个多选的 `<select>` 列表。使用另一个 SQL 查询来填充该列表，操作如下：\n\
  \n```\n<p>\n<label for=\"category\">分类：</label>\n<select name=\"category[]\" size=\"\
  5\" multiple id=\"category\">\n<?php\n// 获取分类\n$getCats = 'SELECT cat_id, category\
  \ FROM categories\nORDER BY category';\n$categories = $conn->query($getCats);\n\
  while ($row = $categories->fetch_assoc()) {\n?>\n<option value=\"<?= $row['cat_id'];\
  \ ?>\" <?php\nif (isset($selected_categories) &&\nin_array($row['cat_id'], $selected_categories))\
  \ {\necho 'selected';\n} ?>><?= $row['category']; ?></option>\n<?php } ?>\n</select>\n\
  </p>\n```\n\n`while` 循环通过将 `cat_id` 插入 `value` 属性，并在开闭标签之间显示分类名称来构建每个 `<option>`\
  \ 标签。如果 `cat_id` 存在于 `$selected_categories` 数组中，则在 `<option>` 标签中插入 `selected`。这会选中已与博客文章关联的分类。\n\
  \n保存 `blog_update_mysqli.php`，然后在 `blog_list_mysqli.php` 中选择一个“编辑”链接，确保多选列表已填充分类。如果你在\
  \ PHP 解决方案 16-4 中插入了新文章，则与该文章关联的分类应处于选中状态，如下方截图所示。\n\n如有必要，你可以对照 `ch16` 文件夹中的 `blog_update_mysqli_05.php`\
  \ 检查代码。对应的 PDO 版本位于 `blog_update_pdo_05.php`。\n\n接下来，你需要编辑提交表单时更新记录的代码部分。新代码首先删除交叉引用表中与\
  \ `article_id` 匹配的所有条目，然后插入在更新表单中选择的值。内联注释表示为了节省空间而省略了现有代码。\n\n```\n// 如果表单已提交，则更新记录\n\
  if (isset($_POST ['update'])) {\n    // 准备更新查询\n    if (!empty($_POST['image_id']))\
  \ {\n        // 现有代码已省略\n    } else {\n        // 现有代码已省略\n        $stmt->execute();\n\
  \    }\n\n    // 删除交叉引用表中的现有值\n    $sql = 'DELETE FROM article2cat WHERE article_id\
  \ = ?';\n    if ($stmt->prepare($sql)) {\n        $stmt->bind_param('i', $_POST['article_id']);\n\
  \        $stmt->execute();\n    }\n\n    // 将新值插入 articles2cat\n    if (isset($_POST['category'])\
  \ && is_numeric($_POST['article_id'])) {\n        $article_id = (int) $_POST['article_id'];\n\
  \        foreach ($_POST['category'] as $cat_id) {\n            $values[] = \"($article_id,\
  \ \" . (int) $cat_id . ')';\n        }\n        if ($values) {\n            $sql\
  \ = 'INSERT INTO article2cat (article_id, cat_id)\n            VALUES ' . implode(',',\
  \ $values);\n            if (!$conn->query($sql)) {\n                $catError =\
  \ $conn->error;\n            }\n        }\n    }\n}\n```\n\n插入更新表单中所选值的代码与 PHP 解决方案\
  \ 16-4 第 4 步中的代码相同。关键点在于它使用的是 `INSERT` 查询，而不是 `UPDATE`。原始值已被删除，因此你是在重新添加它们。\n\n\
  保存 `blog_update_mysqli.php`，并通过更新 `blog` 表中的现有记录进行测试。如有必要，你可以对照 `ch16` 文件夹中的 `blog_update_mysqli_06.php`\
  \ 检查代码。对应的 PDO 版本位于 `blog_update_pdo_06.php`。\n\n### 在删除时维护参照完整性\n\n在 PHP 解决方案 16-5\
  \ 中，删除交叉引用表中的记录时无需担心参照完整性，因为每条记录中存储的值都是外键。每条记录仅仅引用存储在 `blog` 和 `categories` 表中的主键。参考本章开头图\
  \ 16-1，从交叉引用表中删除将 `article_id 2` 与 `cat_id 1` 组合的记录，仅仅是断开了标题为“见习艺伎去购物”的文章与`京都`分类之间的链接。文章和分类本身都不会受到影响。它们都保留在各自的表中。\n\
  \n如果决定删除文章或分类，情况则完全不同。如果从 `blog` 表中删除“见习艺伎去购物”这篇文章，则必须同时从交叉引用表中删除所有对 `article_id\
  \ 2` 的引用。同样，如果删除`京都`分类，则必须从交叉引用表中删除所有对 `cat_id 1` 的引用。或者，如果某个项目的主键作为外键存储在其他地方，则必须阻止删除操作。\n\
  \n最好的方法是通过建立外键约束来实现。为此，相关表必须使用 InnoDB 存储引擎。如果你使用的是 MySQL 或 MariaDB 5.5 或更高版本，InnoDB\
  \ 是默认引擎。此外，随书附带的所有 `.sql` 文件都选择 InnoDB 引擎。但是，如果你有使用 MyISAM 存储引擎创建的现有表，则需要先转换它们才能建立外键约束。\n\
  \n#### PHP 解决方案 16-6：将表转换为 InnoDB 存储引擎\n\n本 PHP 解决方案演示了如何将表从 MyISAM 转换为 InnoDB。如果你计划将表上传到远程服务器，该服务器也必须支持\
  \ InnoDB（请参阅 PHP 解决方案 16-1）。\n\n在 phpMyAdmin 中选择 `phpsols` 数据库，然后选择 `article2cat`\
  \ 表。点击屏幕右上角的“操作”选项卡。在“表选项”部分，“存储引擎”字段会显示该表当前使用的引擎。如果显示为 MyISAM，请从下拉菜单中选择 InnoDB，如图\
  \ 16-10 所示。\n\n在 phpMyAdmin 中更改表的存储引擎非常容易。点击“执行”。更改存储引擎就是这么简单！\n\n每个表都需要单独转换。你无法一次性更改数据库中的所有表。\n\
  \n\n\n"
- "# PHP 方案 16-7：设置外键约束\n\n本 PHP 方案介绍如何在 phpMyAdmin 中为 `article2cat`、`blog` 和 `categories`\
  \ 表设置外键约束。外键约束必须始终在子表中定义。在此例中，子表是 `article2cat`，因为它将其他表中的主键 `article_id` 和 `cat_id`\
  \ 作为外键存储。\n\n在 phpMyAdmin 中选择 `article2cat` 表，点击“结构”选项卡。然后点击结构表底部的“关系视图”（如图 16-11\
  \ 中圈出部分）。\n\n![A978-1-4842-0635-5_16_Fig11_HTML.jpg](img/A978-1-4842-0635-5_16_Fig11_HTML.jpg)\n\
  \n图 16-11. 外键约束在 phpMyAdmin 的关系视图中定义\n\n外键约束只能设置在已建立索引的列上。`article2cat` 表中的 `article_id`\
  \ 和 `cat_id` 列是该表的复合主键，因此它们都会出现在打开的页面中。如果你的 phpMyAdmin 版本有“内部关系”选项，可以忽略它。\n\n在 `article_id`\
  \ 行中，打开“外键约束（INNODB）”下的下拉菜单，会显示数据库中已建立索引的列列表，然后选择 `phpsols.blog.article_id`，如图 16-12\
  \ 所示。这将用于在 `article2cat` 表的 `article_id` 和 `blog` 表的 `article_id` 之间建立正式的外键关系。\n\
  \n![A978-1-4842-0635-5_16_Fig12_HTML.jpg](img/A978-1-4842-0635-5_16_Fig12_HTML.jpg)\n\
  \n图 16-12. 选择父表的主键\n\n这会显示更多选项（在较旧版本的 phpMyAdmin 中，这些选项始终可见）。将“约束名称”留空。phpMyAdmin\
  \ 会自动生成约束名称。\n\n`ON DELETE` 下拉菜单包含以下选项：\n\n- `CASCADE`：当你删除父表中的记录时，子表中所有从属记录也会被删除。例如，如果你删除\
  \ `blog` 表中主键为 `article_id 2` 的记录，则 `article2cat` 表中所有 `article_id` 为 2 的记录也会被自动删除。\n\
  - `SET NULL`：当你删除父表中的记录时，子表中所有从属记录的外键会被设置为 `NULL`。外键列必须允许 `NULL` 值。\n- `NO ACTION`：在某些数据库系统中，此选项允许延迟外键约束检查。MySQL\
  \ 会立即执行检查，因此其效果与 `RESTRICT` 相同。\n- `RESTRICT`：如果子表中仍存在从属记录，此选项会阻止删除父表中的记录。\n\n注意\n\
  \n`ON UPDATE` 也有相同的选项。除了 `RESTRICT` 之外，其他选项通常使用价值有限，因为除非特殊情况，你不应更改记录的主键。`ON UPDATE\
  \ RESTRICT` 不仅会阻止修改父表中的主键，还会拒绝子表中任何会导致外键值在父表中找不到匹配项的插入或更新操作。\n\n对于交叉引用表，`CASCADE`\
  \ 是合乎逻辑的选择。如果决定删除父表中的一条记录，你希望所有对该记录的交叉引用也同时被移除。然而，为了演示外键约束的默认行为，请将 `ON DELETE` 和\
  \ `ON UPDATE` 都设置为 `RESTRICT`。\n\n在 `cat_id` 行中，从“外键约束（INNODB）”下拉菜单中选择 `phpsols.categories.cat_id`，并将\
  \ `ON DELETE` 和 `ON UPDATE` 设置为 `RESTRICT`。点击“保存”。\n\n注意\n\n如果下拉菜单中没有 `RESTRICT`\
  \ 选项，请将该选项留空。\n\n如果尚未完成，请至少更新一条博客记录，使其与某个分类关联。在 phpMyAdmin 中，选择 `categories` 表，然后点击某个已知与博客记录关联的分类旁边的“删除”按钮，如图\
  \ 16-13 所示。\n\n![A978-1-4842-0635-5_16_Fig13_HTML.jpg](img/A978-1-4842-0635-5_16_Fig13_HTML.jpg)\n\
  \n图 16-13. 尝试删除 `categories` 表中的一条记录\n\n注意\n\n在较旧版本的 phpMyAdmin 中，删除图标是一个大的红色 X\
  \ 号。\n\n当 phpMyAdmin 要求确认删除时，点击“确定”。如果你已正确设置外键约束，将会看到类似图 16-14 的错误消息。\n\n![A978-1-4842-0635-5_16_Fig14_HTML.jpg](img/A978-1-4842-0635-5_16_Fig14_HTML.jpg)\n\
  \n图 16-14. 若存在从属记录，外键约束会阻止删除操作\n\n如果错误消息出现在模态对话框中，点击对话框将其关闭。选择 `article2cat` 表，点击“结构”选项卡，然后点击“关系视图”。\n\
  \n注意\n\n在较旧版本的 phpMyAdmin 中，`ON DELETE` 和 `ON UPDATE` 可能为空。将这些选项留空与选择 `RESTRICT`\
  \ 效果相同，这也是两者的默认值。\n\n将两个 `ON DELETE` 设置都改为 `CASCADE`，然后点击“保存”。在 `blog` 表中选择一条你知道已与某个分类关联的记录。记下它的\
  \ `article_id`，然后删除该记录。检查 `article2cat` 表，与你刚刚删除的记录相关的记录也被删除了。\n\n为继续探索外键约束，请选择\
  \ `blog` 表，并与 `images` 表中的 `image_id` 建立外键关系。如果从 `images` 表中删除一条记录，`blog` 表中的 `image_id`\
  \ 外键需要设置为 `NULL`。如果将 `ON DELETE` 的值设置为 `SET NULL`，这将自动完成。通过从 `images` 表中删除一条记录并检查\
  \ `blog` 表中的关联记录来测试此功能。\n\n注意\n\n如果需要将 InnoDB 表转换回 MyISAM，必须先移除所有外键约束。选择“关系视图”，将“外键（INNODB）”字段留空，然后点击“保存”。移除外键约束后，即可按照\
  \ PHP 方案 16-6 所述更改存储引擎。此时需选择 `MyISAM` 而非 `InnoDB`。\n\n\n\n### 创建带有外键约束的删除脚本\n\n\
  在 InnoDB 表中为 `ON DELETE` 选择值取决于表之间关系的性质。以 `phpsols` 数据库为例，在 `article2cat` 交叉引用表中将两列都设置为\
  \ `CASCADE` 不仅是安全的，而且是可取的。如果在 `blog` 或 `categories` 父表中删除了某条记录，则需要在交叉引用表中删除相关联的值。\n\
  \n`images` 表和 `blog` 表之间的关系则不同。如果你从 `images` 表中删除一条记录，可能不希望删除 `blog` 表中相关的文章。在这种情况下，`SET\
  \ NULL` 是一个合适的选择。当从 `images` 表中删除一条记录时，相关文章中的外键将被设置为 `NULL`，但文章本身保持不变。\n\n另一方面，如果图像对于理解文章至关重要，请选择\
  \ `RESTRICT`。任何尝试删除仍有相关文章的图像的操作都会自动被阻止。\n\n这些考量会影响你如何处理删除脚本。当外键约束设置为 `CASCADE` 或\
  \ `SET NULL` 时，你不需要做任何特殊处理。你可以使用简单的 `DELETE` 查询，其余工作交给数据库处理。\n\n然而，如果外键约束设置为 `RESTRICT`，`DELETE`\
  \ 查询将会失败。为了显示适当的错误信息，请使用 MySQLi 语句对象的 `errno` 属性。由于外键约束而失败的查询的 MySQL 错误代码是 `1451`。在调用\
  \ `execute()` 方法后，你可以按如下方式检查 MySQLi 中的错误：\n\n```\n$stmt->execute();\nif ($stmt->affected_rows\
  \ > 0) {\n    $deleted = true;\n} else {\n    $deleted = false;\n    if ($stmt->errno\
  \ == 1451) {\n        $error = '该记录在子表中有依赖文件，无法删除。';\n    } else {\n        $error\
  \ = '删除该记录时出现问题。';\n    }\n}\n```\n\n如果你使用 PDO，请使用 `errorCode()` 方法。由于外键约束而失败的查询代码是\
  \ `HY000`。在检查受影响的行数之后，你可以使用 PDO 预处理语句检查错误代码，示例如下：\n\n```\n$deleted = $stmt->rowCount();\n\
  if (!$deleted) {\n    if ($stmt->errorCode() == 'HY000') {\n        $error = '该记录在子表中有依赖文件，无法删除。';\n\
  \    } else {\n        $error = '删除该记录时出现问题。';\n    }\n}\n```\n\n如果你使用 PDO 的 `exec()`\
  \ 方法，技术是相同的，该方法对于非 `SELECT` 查询会返回受影响的行数。使用 `exec()` 时，需要在数据库连接上调用 `errorCode()`\
  \ 方法。\n\n```\n$deleted = $conn->exec($sql);\nif (!$deleted) {\n    if ($conn->errorCode()\
  \ == 'HY000') {\n        $error = '该记录在子表中有依赖文件，无法删除。';\n    } else {\n        $error\
  \ = '删除该记录时出现问题。';\n    }\n}\n```\n\n### 创建不带外键约束的删除脚本\n\n如果你无法使用 InnoDB 表，则需要将相同的逻辑构建到你自己的删除脚本中。要达到与\
  \ `ON DELETE CASCADE` 相同的效果，请连续运行两个 `DELETE` 查询，示例如下：\n\n```\n$sql = 'DELETE FROM\
  \ article2cat WHERE article_id = ?';\n$stmt->prepare($sql);\n$stmt->bind_param('i',\
  \ $_POST['article_id']);\n$stmt->execute();\n\n$sql = 'DELETE FROM blog WHERE article_id\
  \ = ?';\n$stmt->prepare($sql);\n$stmt->bind_param('i', $_POST['article_id']);\n\
  $stmt->execute();\n```\n\n要达到与 `ON DELETE SET NULL` 相同的效果，请将 `UPDATE` 查询与 `DELETE`\
  \ 查询结合使用，示例如下：\n\n```\n$sql = 'UPDATE blog SET image_id = NULL WHERE image_id =\
  \ ?';\n$stmt->prepare($sql);\n$stmt->bind_param('i', $_POST['image_id']);\n$stmt->execute();\n\
  \n$sql = 'DELETE FROM images WHERE image_id = ?';\n$stmt->prepare($sql);\n$stmt->bind_param('i',\
  \ $_POST['image_id']);\n$stmt->execute();\n```\n\n要达到与 `ON DELETE RESTRICT` 相同的效果，你需要在继续执行\
  \ `DELETE` 查询之前，先运行一个 `SELECT` 查询来查找是否存在依赖记录，示例如下：\n\n```\n$sql = 'SELECT image_id\
  \ FROM blog WHERE image_id = ?';\n$stmt->prepare($sql);\n$stmt->bind_param('i',\
  \ $_POST['image_id']);\n$stmt->execute();\n// 存储结果以找出它包含的行数\n$stmt->store_result();\n\
  // 如果 num_rows 不为 0，则存在依赖记录\nif ($stmt->num_rows) {\n    $error = '该记录在子表中有依赖文件，无法删除。';\n\
  } else {\n    $sql = 'DELETE FROM images WHERE image_id = ?';\n    $stmt->prepare($sql);\n\
  \    $stmt->bind_param('i', $_POST['image_id']);\n    $stmt->execute();\n}\n```\n\
  \n## 章节回顾\n\n一旦你掌握了与数据库通信所需的基本 SQL 和 PHP 命令，操作单表就变得非常容易。然而，通过外键链接表可能会相当具有挑战性。关系型数据库的强大之处在于其极高的灵活性。问题在于，这种无限的灵活性意味着没有单一的“正确”做事方式。\n\
  \n不过，不要让这阻碍你。你的本能可能是坚持使用单表，但那条路会带来更大的复杂性。让数据库工作变得简单的关键在于早期阶段限制你的野心。构建像本章中这样的简单结构，进行实验，并熟悉它们的工作原理。逐步添加表和外键链接。经验丰富的数据库工作者常说，他们经常花费超过一半的开发时间仅仅用于思考表结构。在那之后，编码就是轻松的部分了！\n\
  \n在最后一章中，我们将回到单表操作，讨论使用数据库进行用户认证以及如何处理加密密码的重要主题。\n\n"
- '# 17. 使用数据库进行用户认证


  第 9 章向你展示了用户认证和使用会话保护网站部分区域的原则，但所有登录脚本都依赖于存储在 CSV 文件中的用户名和密码。将用户详细信息保存在数据库中的方式既更安全也更高效。数据库不仅可以存储用户名和密码列表，还可以存储其他详细信息，例如名字、姓氏、电子邮件地址等。数据库还为你提供了使用单向或双向加密的选项。在本章的第一节中，我们将探讨两者的区别。然后，你将针对这两种加密类型创建注册和登录脚本。


  本章内容涵盖：


  *   决定如何加密密码

  *   使用单向加密进行用户注册和登录

  *   使用双向加密进行用户注册和登录

  *   解密密码




  '
- '# 选择加密方法


  第 9 章中的 PHP 解决方案采用**单向加密**方式——密码一旦加密，就无法逆转该过程。这既是优点也是缺点。它为用户提供了更高的安全性，因为以这种方式加密的密码会保持隐秘。然而，丢失的密码无法重新发放，因为即使是网站管理员也无法解密。唯一的解决方法是重置密码。


  另一种方案是使用**双向加密**，它依赖于一对函数：一个用于加密密码，另一个用于将密码还原为明文，从而可以轻松地向健忘的用户重新发放密码。双向加密使用一个密钥，该密钥被传递给这两个函数以执行转换。密钥只是你自己定义的一个字符串。显然，为了确保数据安全，密钥必须足够难以猜测，并且绝不应存储在数据库中。但是，你需要将密钥嵌入到注册和登录脚本中——无论是直接嵌入还是通过包含文件——因此一旦脚本暴露，安全性就会彻底崩溃。


  MySQL 和 MariaDB 提供了多种双向加密函数，但 `AES_ENCRYPT()` 被认为是最安全的。它采用美国标准与技术研究院（NIST）批准的**高级加密标准**，密钥长度为
  128 位（AES-128），可用于保护机密级（SECRET）机密材料（最高机密（TOP SECRET）材料需要 AES-192 或 AES-256）。


  单向加密和双向加密各有优缺点。许多安全专家建议密码应频繁更换。因此，由于密码无法解密而强制用户更改遗忘的密码，可被视为一项良好的安全措施。另一方面，用户每次忘记现有密码时都需要处理新密码，这可能会让他们感到沮丧。我将由你决定哪种方法最适合你的情况，我仅专注于技术实现。


  '
- "# 使用单向加密\n\n为了保持简洁，我将使用与第 9 章相同的基本表单，因此数据库中仅存储用户名和加密后的密码。\n\n**注意**\n\n以下 PHP 解决方案使用了\
  \ `password_hash()` 和 `password_verify()`，这需要 PHP 5.5 或更高版本。你可以在旧版 PHP（最低版本 5.3.7）上使用来自\
  \ [`https://github.com/ircmaxell/password_compat`](https://github.com/ircmaxell/password_compat)\
  \ 的 `password_compat` 库模拟这些函数。\n\n### 创建存储用户详细信息的表\n\n在 phpMyAdmin 中，在 `phpsols`\
  \ 数据库中创建一个名为 `users` 的新表。该表需要包含表 17-1 中列出的三列设置。\n\n**表 17-1.** `users` 表的设置\n\n\
  | 名称 | 类型 | 长度/值 | 属性 | 空值 | 索引 | A_I |\n| --- | --- | --- | --- | --- | --- | ---\
  \ |\n| `user_id` | `INT` | | `UNSIGNED` | 未选中 | `PRIMARY` | 已选中 |\n| `username`\
  \ | `VARCHAR` | `15` | | 未选中 | `UNIQUE` | |\n| `pwd` | `VARCHAR` | `255` | | 未选中\
  \ | | |\n\n为了确保无人能注册与现有用户名相同的名称，`username` 列被赋予了 `UNIQUE` 索引。\n\n用于存储密码的 `pwd` 列允许存储最多\
  \ 255 个字符的字符串。这远大于 PHP 5.5 和 5.6 中 `password_hash()` 默认加密方法所需的 60 个字符。但 `PASSWORD_DEFAULT`\
  \ 常量会随着 PHP 中添加新的、更强的算法而随时间变化。因此，建议的大小为 255 个字符。\n\n## 在数据库中注册新用户\n\n要在数据库中注册用户，你需要创建一个要求输入用户名和密码的注册表单。`username`\
  \ 列已定义了 `UNIQUE` 索引，因此如果有人尝试注册与现有用户名相同的名称，数据库将返回错误。除了验证用户输入外，处理脚本还需要检测该错误，并建议用户选择不同的用户名。\n\
  \n\n  \n### PHP 解决方案 17-1：创建用户注册表单\n\n本 PHP 解决方案展示了如何改编第 9 章中的注册脚本，使其能与 MySQL 或\
  \ MariaDB 协同工作。它使用了 PHP 解决方案 9-6 中的 `CheckPassword` 类和 PHP 解决方案 9-7 中的 `register_user_csv.php`。\n\
  \n如有必要，将 `ch17/PhpSolutions/Authenticate` 文件夹中的 `CheckPassword.php` 复制到 `phpsols`\
  \ 站点根目录下的 `PhpSolutions/Authenticate` 文件夹中，并将 `ch17` 文件夹中的 `register_user_csv.php`\
  \ 复制到 `includes` 文件夹中。你还应阅读 PHP 解决方案 9-6 和 9-7 中的说明，以了解原始脚本的工作原理。\n\n![A978-1-4842-0635-5_17_Figa_HTML.jpg](img/A978-1-4842-0635-5_17_Figa_HTML.jpg)\n\
  \n将 `ch17` 文件夹中的 `register_db.php` 复制到 `phpsols` 站点根目录下名为 `authenticate` 的新文件夹中。该页面包含与第\
  \ 9 章相同的基本用户注册表单，含用户名文本输入字段、密码字段、确认密码字段以及提交数据的按钮，如下方截图所示：\n\n在 `DOCTYPE` 声明上方的 PHP\
  \ 代码块中添加以下代码：\n\n```\nif (isset($_POST['register'])) {\n$username = trim($_POST['username']);\n\
  $password = trim($_POST['pwd']);\n$retyped = trim($_POST['conf_pwd']);\nrequire_once\
  \ '../includes/register_user_mysqli.php';\n}\n```\n\n这与 PHP 解决方案 9-7 中的代码非常相似。如果表单已提交，用户输入将去除首尾空白字符并赋值给简单变量。然后包含一个名为\
  \ `register_user_mysqli.php` 的外部文件。如果计划使用 PDO，请将包含文件命名为 `register_user_pdo.php`。\n\
  \n处理用户输入的文件基于你在第 9 章中创建的 `register_user_csv.php`。复制你的原始文件，并将其保存到 `includes` 文件夹中，命名为\
  \ `register_user_mysqli.php` 或 `register_user_pdo.php`。\n\n在你刚刚复制并重命名的文件中，找到如下开头的条件语句（大约在第\
  \ 24 行）：\n\n```\nif (!$errors) {\n// 使用默认加密方式加密密码\n$password = password_hash($password,\
  \ PASSWORD_DEFAULT);\n```\n\n删除条件语句中剩余的部分。现在条件语句应如下所示：\n\n```\nif (!$errors) {\n\
  // 使用默认加密方式加密密码\n$password = password_hash($password, PASSWORD_DEFAULT);\n}\n```\n\
  \n将用户详细信息插入数据库的代码写在条件语句内部。首先包含数据库连接文件，并建立具有读写权限的连接。\n\n```\nif (!$errors) {\n//\
  \ 使用默认加密方式加密密码\n$password = password_hash($password, PASSWORD_DEFAULT);\n// 包含连接文件\n\
  require_once 'connection.php';\n$conn = dbConnect('write');\n}\n```\n\n连接文件同样位于\
  \ `includes` 文件夹中，因此只需文件名即可。对于 PDO，向 `dbConnect()` 添加 `'pdo'` 作为第二个参数。\n\n代码的最后部分准备并执行预处理语句，以将用户详细信息插入数据库。由于\
  \ `username` 列具有 `UNIQUE` 索引，如果用户名已存在，查询将失败。如果发生这种情况，代码需要生成错误消息。MySQLi 和 PDO 的代码有所不同。\n\
  \n对于 MySQLi，添加以下加粗显示的代码：\n\n```\nif (!$errors) {\n// 使用默认加密方式加密密码\n$password = password_hash($password,\
  \ PASSWORD_DEFAULT);\n// 包含连接文件\nrequire_once 'connection.php';\n$conn = dbConnect('write');\n\
  // 准备 SQL 语句\n$sql = 'INSERT INTO users (username, pwd) VALUES (?, ?)';\n$stmt =\
  \ $conn->stmt_init();\nif ($stmt = $conn->prepare($sql)) {\n// 绑定参数并将详细信息插入数据库\n\
  $stmt->bind_param('ss', $username, $password);\n$stmt->execute();\n}\nif ($stmt->affected_rows\
  \ == 1) {\n```\n\n\n`$success = \"$username 已注册成功，您现在可以登录。\";`\n\n`} elseif ($stmt->errno\
  \ == 1062) {`\n\n`$errors[] = \"$username 已被使用，请选择其他用户名。\";`\n\n`} else {`\n\n`$errors[]\
  \ = $stmt->error;`\n\n`}`\n\n`}`\n\n新代码首先将参数绑定到预处理语句。用户名和密码是字符串，因此 `bind_param()`\
  \ 的第一个参数是 `'ss'`（参见第 11 章中的“在 MySQLi 预处理语句中嵌入变量”）。语句执行后，条件语句检查 `affected_rows` 属性的值。如果值为\
  \ `1`，则表示详细信息已成功插入。\n\n> **提示**  \n> 你需要显式检查 `affected_rows` 的值，因为如果发生错误，它的值是 –1。与某些编程语言不同，PHP\
  \ 将 –1 视为 `true`。\n\n另一个条件检查预处理语句的 `errno` 属性的值，该属性包含 MySQL 错误代码。对于具有 `UNIQUE` 索引的列，重复值的错误代码是\
  \ `1062`。如果检测到该错误代码，则会向 `$errors` 数组添加一条错误消息，要求用户选择其他用户名。如果生成了不同的错误代码，语句的 `error`\
  \ 属性中存储的消息将被添加到 `$errors` 数组中。\n\nPDO 版本如下：\n\n```\nif (!$errors) {\n\n// 使用默认加密方式加密密码\n\
  \n$password = password_hash($password, PASSWORD_DEFAULT);\n\n// 包含连接文件\n\nrequire_once\
  \ 'connection.php';\n\n$conn = dbConnect('write', 'pdo');\n\n// 准备 SQL 语句\n\n$sql\
  \ = 'INSERT INTO users (username, pwd) VALUES (:username, :pwd)';\n\n$stmt = $conn->prepare($sql);\n\
  \n// 绑定参数并将详细信息插入数据库\n\n$stmt->bindParam(':username', $username, PDO::PARAM_STR);\n\
  \n$stmt->bindParam(':pwd', $password, PDO::PARAM_STR);\n\n$stmt->execute();\n\n\
  if ($stmt->rowCount() == 1) {\n\n$success = \"$username 已注册成功，您现在可以登录。\";\n\n} elseif\
  \ ($stmt->errorCode() == 23000) {\n\n$errors[] = \"$username 已被使用，请选择其他用户名。\";\n\
  \n} else {\n\n$errorInfo = $stmt->errorInfo();\n\nif (isset($errorInfo[2])) {\n\n\
  $errors[] = $errorInfo[2];\n\n}\n\n}\n\n}\n```\n\n预处理语句对 `username` 和 `pwd` 列使用命名参数。通过\
  \ `bindParam()` 方法将提交的值绑定到该语句，并使用 `PDO::PARAM_STR` 常量将数据类型指定为字符串。语句执行后，条件语句使用 `rowCount()`\
  \ 方法检查记录是否已创建。\n\n如果预处理语句因用户名已存在而失败，则 `errorCode()` 方法生成的值为 `23000`。PDO 使用的是 ANSI\
  \ SQL 标准定义的错误代码，而非 MySQL 生成的错误代码。如果错误代码匹配，则会向 `$errors` 数组添加一条消息，要求用户选择其他用户名。否则，将使用\
  \ `errorInfo()` 方法中的错误消息。\n\n> **注意**  \n> 在 MySQLI 和 PDO 脚本中，将注册脚本部署到线上网站时，请将 `else`\
  \ 块中的代码替换为通用错误消息。显示语句的 `error` 属性（MySQLi）或 `$errorInfo[2]`（PDO）的值仅用于测试目的。\n\n剩下的就是在注册页面上添加显示结果的代码。在\
  \ `register_db.php` 中的 `<form>` 标签之前添加以下代码：\n\n```\n<h1>注册用户</h1>\n\n<?php\n\nif\
  \ (isset($success)) {\n\necho \"<p>$success</p>\";\n\n} elseif (isset($errors) &&\
  \ !empty($errors)) {\n\necho '<ul>';\n\nforeach ($errors as $error) {\n\necho \"\
  <li>$error</li>\";\n\n}\n\necho '</ul>';\n\n}\n\n?>\n```\n\n`<form method=\"post\"\
  \ action=\"\">`\n\n如有必要，请对照 `register_db_mysqli.php` 和 `register_user_mysqli.php`，或\
  \ `register_db_pdo.php` 和 `register_user_pdo.php` 检查你的代码，所有这些文件均位于 `ch17` 文件夹中。\n\
  \n![A978-1-4842-0635-5_17_Figc_HTML.jpg](img/A978-1-4842-0635-5_17_Figc_HTML.jpg)\n\
  \n现在正确填写注册表单。你应该会看到一条消息，告诉你已为你选择的用户名创建了帐户。尝试再次注册相同的用户名。这次你应该会得到与以下截图类似的消息：\n\n![A978-1-4842-0635-5_17_Figb_HTML.jpg](img/A978-1-4842-0635-5_17_Figb_HTML.jpg)\n\
  \n保存 `register_db.php`，并在浏览器中加载它。通过输入你知道违反密码强度规则的输入来测试它。如果在同一次尝试中犯了多个错误，表单顶部应该会出现一个错误消息的要点列表，如下一个截图所示。\n\
  \n现在你已在数据库中注册了用户名和密码，接下来需要创建一个登录脚本。`ch17` 文件夹包含一组文件，这些文件复制了 PHP 解决方案 9-9 的设置：一个登录页面和两个受密码保护的页面。\n\
  \n\n\n"
- "# PHP 解决方案 17-2：通过数据库验证用户凭证\n\n本 PHP 解决方案演示了如何通过查询数据库来验证用户存储的凭证，即先查找用户名的加密密码，然后将其与用户提交的密码一起作为参数传递给\
  \ `password_verify()`。如果 `password_verify()` 返回 `true`，则将用户重定向到受限页面。\n\n将 `ch17`\
  \ 文件夹中的 `login_db.php`、`menu_db.php` 和 `secretpage_db.php` 复制到 `authenticate` 文件夹。同时将\
  \ `ch17` 文件夹中的 `logout_db.php` 和 `session_timeout_db.php` 复制到 `includes` 文件夹。\n\n\
  这样就搭建了与第 9 章相同的基础测试平台。唯一的区别是链接已修改为重定向到 `authenticate` 文件夹。\n\n在 `login_db.php` 的\
  \ `DOCTYPE` 声明上方的 PHP 代码块中添加以下代码：\n\n```\n$error = '';\n\nif (isset($_POST['login']))\
  \ {\n\nsession_start();\n\n$username = trim($_POST['username']);\n\n$password =\
  \ trim($_POST['pwd']);\n\n// 成功登录后重定向的位置\n\n$redirect = 'http://localhost/phpsols/authenticate/menu_db.php';\n\
  \nrequire_once '../includes/authenticate_mysqli.php';\n\n}\n```\n\n这段代码遵循了与第 9 章登录表单中相似的模式。首先将\
  \ `$error` 初始化为空字符串。条件语句在表单提交后启动会话。从用户输入字段中去除空白字符，并将成功登录后用户重定向的页面位置存储在变量中。最后引入身份验证脚本，该脚本将在下一步中构建。\n\
  \n如果使用 PDO，请使用 `authenticate_pdo.php` 作为处理脚本。\n\n创建一个名为 `authenticate_mysqli.php`\
  \ 或 `authenticate_pdo.php` 的新文件，并将其保存在 `includes` 文件夹中。该文件仅包含 PHP 脚本，因此请去除任何 HTML\
  \ 标记。引入数据库连接文件，使用只读账户创建数据库连接，并使用预处理语句获取用户详细信息。\n\n对于 MySQLi，请使用以下代码：\n\n```\n<?php\n\
  \nrequire_once 'connection.php';\n\n$conn = dbConnect('read');\n\n// 从数据库中获取用户名的加密密码\n\
  \n$sql = 'SELECT pwd FROM users WHERE username = ?';\n\n// 初始化并准备语句\n\n$stmt = $conn->stmt_init();\n\
  \n$stmt->prepare($sql);\n\n// 绑定输入参数\n\n$stmt->bind_param('s', $username);\n\n$stmt->execute();\n\
  \n// 绑定结果，使用新变量存储密码\n\n$stmt->bind_result($storedPwd);\n\n$stmt->fetch();\n```\n\
  \n这是一个非常直接的 `SELECT` 查询，因此在将其传递给 MySQLi 的 `prepare()` 方法时，我没有使用条件语句。用户名是一个字符串，因此\
  \ `bind_param()` 的第一个参数是 `'s'`。如果找到匹配项，结果将绑定到 `$storedPwd`。你需要使用一个新变量来存储密码，以避免覆盖用户提交的密码。\n\
  \n语句执行后，`fetch()` 方法获取结果。\n\n对于 PDO，请改用以下代码：\n\n```\n<?php\n\nrequire_once 'connection.php';\n\
  \n$conn = dbConnect('read', 'pdo');\n\n// 从数据库中获取用户名的加密密码\n\n$sql = 'SELECT pwd\
  \ FROM users WHERE username = ?';\n\n// 准备语句\n\n$stmt = $conn->prepare($sql);\n\n\
  // 将输入参数作为单元素数组传递\n\n$stmt->execute([$username]);\n\n$storedPwd = $stmt->fetchColumn();\n\
  ```\n\n这段代码与 MySQLi 版本的功能相同，但使用了 PDO 语法。用户名作为单元素数组传递给 `execute()` 方法。由于结果中只有一列，`fetchColumn()`\
  \ 返回值并将其赋值给 `$storedPwd`。\n\n获取用户名的密码后，只需将提交的密码和存储的密码传递给 `password_verify()`。如果\
  \ `password_verify()` 返回 `true`，则创建会话变量以指示成功登录和会话开始时间，重新生成会话 ID，并重定向到受限页面。否则，在 `$error`\
  \ 中存储错误消息。\n\n在上一步输入的代码之后插入以下代码。该代码对于 MySQLi 和 PDO 相同。\n\n```\n// 检查提交的密码是否与存储的密码匹配\n\
  \nif (password_verify($password, $storedPwd)) {\n\n$_SESSION['authenticated'] =\
  \ 'Jethro Tull';\n\n// 获取会话开始时间\n\n$_SESSION['start'] = time();\n\nsession_regenerate_id();\n\
  \nheader(\"Location: $redirect\");\n\nexit;\n\n} else {\n\n// 如果未验证，准备错误消息\n\n$error\
  \ = 'Invalid username or password';\n\n}\n```\n\n与第 9 章一样，`$_SESSION['authenticated']`\
  \ 的值实际上并不重要。\n\n保存 `authenticate_mysqli.php` 或 `authenticate_pdo.php`，然后使用在 PHP\
  \ 解决方案 17-1 末尾注册的用户名和密码登录，测试 `login_db.php`。登录过程应与第 9 章完全相同。区别在于所有详细信息都更安全地存储在数据库中。\n\
  \n如有必要，你可以对照 `login_mysqli.php` 和 `authenticate_mysqli.php`，或 `login_pdo.php` 和\
  \ `authenticate_pdo.php` 检查代码，这些文件均位于 `ch17` 文件夹中。如果遇到问题，最常见的错误是在数据库中为加密密码创建的列太窄。它必须至少\
  \ 60 个字符宽，建议使其能够存储多达 255 个字符，以备将来加密方法生成更长的字符串。\n\n尽管将加密密码存储在数据库中比使用文本文件更安全，但密码是从用户浏览器以纯文本（未加密）形式发送到服务器的。这对于大多数网站来说是足够的，但如果需要更高的安全级别，则登录和后续页面的访问应通过安全套接层（SSL）连接进行。\n\
  \n## 使用双向加密\n\n设置用户注册和双向加密身份验证的主要区别在于，密码需要以 `BLOB` 数据类型（有关更多信息，请参见第 10 章中的“存储二进制数据”）作为二进制对象存储在数据库中，并且密码验证在\
  \ SQL 查询中执行，而不是在 PHP 脚本中。\n\n### 创建存储用户详细信息的表\n\n在 phpMyAdmin 中，在 `phpsols` 数据库中创建一个名为\
  \ `users_2way` 的新表。它需要三列，设置如表 17-2 所示。\n\n**表 17-2. `users_2way` 表的设置**\n\n| 名称\
  \ | 类型 | 长度/值 | 属性 | 空值 | 索引 | A_I |\n| --- | --- | --- | --- | --- | --- | ---\
  \ |\n| `user_id` | `INT` | | `UNSIGNED` | 取消选择 | `PRIMARY` | 选择 |\n| `username`\
  \ | `VARCHAR` | `15` | | 取消选择 | `UNIQUE` | |\n| `pwd` | `BLOB` | | | 取消选择 | | |\n\
  \n\n\n### 注册新用户\n\n`AES_ENCRYPT()`函数接受两个参数：要加密的值和加密密钥。加密密钥可以是您选择的任意字符串。在本示例中，我选择了`takeThisWith@PinchOfSalt`，但使用随机字母数字字符和符号组合会更安全。\n\
  \n单向加密和双向加密的基本注册脚本是相同的。唯一区别在于将用户数据插入数据库的部分。\n\n> **提示**  \n> 以下脚本直接将加密密钥嵌入页面中。如果您在服务器根目录之外有一个私有文件夹，建议在包含文件中定义密钥并将其存储在私有文件夹中。\n\
  \nMySQLi 的代码如下（完整代码见 `ch17` 文件夹中的 `register_2way_mysqli.php`）：\n\n```\nif (!$errors)\
  \ {\n\n// 包含连接文件\nrequire_once 'connection.php';\n$conn = dbConnect('write');\n\n\
  // 创建密钥\n$key = 'takeThisWith@PinchOfSalt';\n\n// 准备 SQL 语句\n$sql = 'INSERT INTO\
  \ users_2way (username, pwd)\nVALUES (?, AES_ENCRYPT(?, ?))';\n$stmt = $conn->stmt_init();\n\
  if ($stmt = $conn->prepare($sql)) {\n\n// 绑定参数并将详细信息插入数据库\n$stmt->bind_param('sss',\
  \ $username, $password, $key);\n$stmt->execute();\n}\n\nif ($stmt->affected_rows\
  \ == 1) {\n$success = \"$username 已注册。您现在可以登录。\";\n} elseif ($stmt->errno == 1062)\
  \ {\n$errors[] = \"$username 已被使用。请选择其他用户名。\";\n} else {\n$errors[] = $stmt->error;\n\
  }\n\n}\n```\n\nPDO 的代码如下（完整代码见 `ch17` 文件夹中的 `register_2way_pdo.php`）：\n\n```\nif\
  \ (!$errors) {\n\n// 包含连接文件\nrequire_once 'connection.php';\n$conn = dbConnect('write',\
  \ 'pdo');\n\n// 创建密钥\n$key = 'takeThisWith@PinchOfSalt';\n\n// 准备 SQL 语句\n$sql =\
  \ 'INSERT INTO users_2way (username, pwd)\nVALUES (:username, AES_ENCRYPT(:pwd,\
  \ :key))';\n$stmt = $conn->prepare($sql);\n\n// 绑定参数并将详细信息插入数据库\n$stmt->bindParam(':username',\
  \ $username, PDO::PARAM_STR);\n$stmt->bindParam(':pwd', $password, PDO::PARAM_STR);\n\
  $stmt->bindParam(':key', $key, PDO::PARAM_STR);\n$stmt->execute();\n\nif ($stmt->rowCount()\
  \ == 1) {\n$success = \"$username 已注册。您现在可以登录。\";\n} elseif ($stmt->errorCode()\
  \ == 23000) {\n$errors[] = \"$username 已被使用。请选择其他用户名。\";\n} else {\n$errors[] =\
  \ '抱歉，数据库出现问题。';\n}\n\n}\n```\n\n严格来说，没必要为 `$key` 使用绑定参数，因为它并非来自用户输入。但如果直接将其嵌入查询中，整个查询需要用双引号包裹，而\
  \ `$key` 则需要用单引号包裹。\n\n要测试上述脚本，只需将它们包含在 `register_db.php` 中，而不是 `register_db_mysqli.php`\
  \ 或 `register_db_pdo.php`。\n\n### 使用双向加密进行用户认证\n\n创建带有双向加密的登录页面非常简单。连接数据库后，将用户名、密钥和未加密的密码整合在\
  \ `SELECT` 查询的 `WHERE` 子句中。如果查询找到匹配项，则允许用户进入网站的受限部分；如果没有匹配项，则拒绝登录。代码与 PHP 解决方案 17-2\
  \ 基本相同，唯一下面部分不同。\n\n对于 MySQLi，代码如下（见 `authenticate_2way_mysqli.php`）：\n\n```\n<?php\n\
  require_once 'connection.php';\n$conn = dbConnect('read');\n\n// 创建密钥\n$key = 'takeThisWith@PinchOfSalt';\n\
  \n$sql = 'SELECT username FROM users_2way\nWHERE username = ? AND pwd = AES_ENCRYPT(?,\
  \ ?)';\n\n// 初始化并准备语句\n$stmt = $conn->stmt_init();\n$stmt->prepare($sql);\n\n//\
  \ 绑定输入参数\n$stmt->bind_param('sss', $username, $password, $key);\n$stmt->execute();\n\
  \n// 要获取匹配数量，必须存储结果\n$stmt->store_result();\n\n// 如果找到匹配项，num_rows 为 1，视为 true\n\
  if ($stmt->num_rows) {\n$_SESSION['authenticated'] = 'Jethro Tull';\n// 获取会话开始时间\n\
  $_SESSION['start'] = time();\nsession_regenerate_id();\nheader(\"Location: $redirect\"\
  ); exit;\n} else {\n// 如果未验证，准备错误消息\n$error = '用户名或密码无效';\n}\n```\n\n请注意，在访问 `num_rows`\
  \ 属性之前，必须先存储预处理语句的结果。如果未能执行此操作，`num_rows` 将始终为 `0`，即使用户名和密码正确，登录也会失败。\n\nPDO 的修订代码如下（见\
  \ `authenticate_2way_pdo.inc.php`）：\n\n```\n<?php\nrequire_once 'connection.php';\n\
  $conn = dbConnect('read', 'pdo');\n\n// 创建密钥\n$key = 'takeThisWith@PinchOfSalt';\n\
  \n$sql = 'SELECT username FROM users_2way\nWHERE username = ? AND pwd = AES_ENCRYPT(?,\
  \ ?)';\n\n// 准备语句\n$stmt = $conn->prepare($sql);\n\n// 通过在执行语句时以数组形式传递来绑定变量\n$stmt->execute([$username,\
  \ $password, $key]);\n\n// 如果找到匹配项，rowCount() 返回 1，视为 true\nif ($stmt->rowCount())\
  \ {\n$_SESSION['authenticated'] = 'Jethro Tull';\n// 获取会话开始时间\n$_SESSION['start']\
  \ = time();\nsession_regenerate_id();\nheader(\"Location: $redirect\"); exit;\n\
  } else {\n// 如果未验证，准备错误消息\n$error = '用户名或密码无效';\n}\n```\n\n要测试这些脚本，请用它们替换 `authenticate_mysqli.php`\
  \ 和 `authenticate_pdo.php`。\n\n### 解密密码\n\n解密使用双向加密的密码，只需在预处理语句中将密钥作为第二个参数传递给 `AES_DECRYPT()`，如下所示：\n\
  \n```\n$key = 'takeThisWith@PinchOfSalt';\n$sql = \"SELECT AES_DECRYPT(pwd, '$key')\
  \ AS pwd FROM users_2way\nWHERE username = ?\";\n```\n\n密钥必须与最初用于加密密码的密钥完全相同。如果丢失密钥，密码将像使用单向加密存储的一样无法访问。\n\
  \n通常，只有在用户请求密码提醒时才需要解密密码。为此类提醒制定适当的安全策略在很大程度上取决于您运营的网站类型。然而，不言而喻，您不应该在屏幕上显示解密后的密码。您需要设置一系列安全检查，例如询问用户的出生日期或母亲的婚前姓名，或者提出一个只有用户本人可能知道答案的问题。即使用户回答正确，您也应该通过电子邮件将密码发送到用户的注册地址。\n\
  \n如果您已成功阅读本书至此，那么您应该能够轻松掌握所有必要知识。\n\n## 更新用户详细信息\n\n我没有为用户注册页面包含任何更新表单。这是一个现阶段您应该能够自行完成的任务。更新用户注册详细信息最重要的一点是，不应在更新表单中显示用户现有的密码。如果使用单向加密，您无论如何也无法显示它。\n\
  \n\n\n"
- "# 下一步怎么走？\n\n本书涵盖了海量的知识点。如果你已经掌握了这里介绍的所有技巧，那么你正在迈向中级 PHP 开发者的道路上，再稍加努力，就能进入高级阶段。如果你觉得学起来有些吃力，别担心。重新翻阅前面的章节吧。你练习得越多，它就会变得越简单。\n\
  \n你可能会想：“我怎么可能记住所有这些内容？”其实不必如此。查资料没什么好丢脸的。请把 PHP 在线手册（[`http://php.net/manual/en/`](http://php.net/manual/en/)）加入书签并经常使用。它会持续更新，并且包含大量有用的示例。在每个页面右上角的搜索框中输入函数名称，就能直接跳转到该函数的完整说明。即使你记不住准确的函数名，手册也会带你到一个页面，推荐最可能的候选函数。大多数页面都提供了实际示例，展示该函数或类是如何使用的。\n\
  \n让动态网页设计变得简单的，并非是对 PHP 函数和类百科全书式的记忆，而是扎实掌握条件语句、循环以及其他结构如何控制脚本流程。一旦你能以“如果发生这种情况，接下来应该发生什么？”的思维来构思你的项目，你就成了自己游戏的主宰。我经常查阅\
  \ PHP 在线手册。对我来说，它就像一本字典。大多数时候，我只是想确认参数的顺序是否正确，但经常会有某个内容吸引我的注意，为我打开新的视野。我可能不会立刻使用那个知识，但会把它记在脑海深处以备将来之用，并在需要核实细节时再次查阅。\n\
  \nMySQL 在线手册（[`http://dev.mysql.com/doc/refman/5.6/en/index.html`](http://dev.mysql.com/doc/refman/5.6/en/index.html)）同样实用。MariaDB\
  \ 的文档在 [`https://mariadb.com/kb/en/`](https://mariadb.com/kb/en/)。让 PHP 和数据库在线手册成为你的朋友，你的知识就会突飞猛进。\n\
  \n\n\n### 索引\n\n#### A\n\n- `AES_DECRYPT()` 函数\n- `AES_ENCRYPT()` 函数\n- Apache 网页服务器\n\
  - `authenticate_mysqli.php`\n- `authenticate_pdo.php`\n\n#### B\n\n- `basename()`\
  \ 函数\n- `bindParam()` 方法\n- 布尔值\n\n#### C\n\n- 层叠样式表 (CSS)\n- 类\n    - `allowAllTypes()`\
