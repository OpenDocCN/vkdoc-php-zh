    Next, use Bake to create the Action views for the Tags controller. You should
    end up with the app/views/tags folder with add.ctp, edit.ctp, index.ctp, and view.ctp
    files inside. With the Tags controller and views working properly, the blog now
    has a basic interface for adding, editing, and deleting tags. The Tag model already
    has the “has and belongs to many” relationship built into it, so tags can also
    be associated with specific blog posts. Here is where the Tree behavior will come
    in—rather than build into the application a mechanism whereby the user can click
    a tag and retrieve a list of related posts, the Tree behavior will be used as
    well. Thus, when clicking a tag, the user will not only get a list of associated
    posts but also a list of associated tags’ posts.


    Using the Tree Behavior in the Model


    With the database ready to handle the Tree behavior and a baked controller with
    views, the model is ready to call out the behavior. This is done using the $actsAs
    property in the model.


    09775ch14final 7/1/08 9:57 PM Page 258


    **258**


    C H A P T E R 1 4 ■ D ATA S O U R C E S A N D B E H AV I O R S


    Open app/models/tag.php, and insert the $actsAs property near the $hasAndBelongsToMany
    property. The value set in $actsAs corresponds to the behavior being used; in
    this case, $actsAs is set to Tree. Once you have entered the $actsAs property,
    your Tag model should appear like Listing 14-12.


    **Listing 14-12.** *The* Tag *Model with the Tree Behavior Included* 1


    <?


    class Tag extends AppModel {


    var $name = ''Tag'';


    var $actsAs = array(''Tree''=>array(


    ''left''=>''left'',


    ''right''=>''right''


    ));


    var $hasAndBelongsToMany = array(''Post'');


    }


    ?>


    Lines 5 and 6 in Listing 14-12 show how I’ve specified the left and right field
    names.


    Since I didn’t use the default names lft and rght, I’ve had to assign an array
    to Tree on line 4


    and include the left and right parameters shown in lines 5–6\. The values assigned
    to these parameters correspond to the field names of the left and right fields
    in the tags table, which in this case is left and right, respectively.


    To attach multiple behaviors to the model, simply continue the $actsAs array.
    For example, if I wanted to attach a custom behavior as well as the Tree behavior
    to the Tag model, I would enter something like this:


    var $actsAs = array(''Tree'',''MyBehavior'');


    Each behavior name in the array can also include a set of parameters like those
    shown in Listing 14-12; just assign an array as a value to each behavior name:
    var $actsAs = array(


    ''Tree''=>array(


    ''left''=>''left'',


    ''right''=>''right''


    ),


    ''MyBehavior''=>array(


    ''recursive''=>1


    )


    );


    Now that the $actsAs property is set to Tree, and the appropriate field names
    for the left and right fields are set in the parameters array, nothing else needs
    to be done in the model.


    All the Tree behavior’s functions are accessible in the controller or model, which
    is the next task for getting the tags organized hierarchically.


