  trans: '

    ### 创建构造方法


    构造方法会在对象被创建时自动调用。你可以用它进行初始化设置，确保关键属性被赋值，并完成必要的准备工作。


    **注意**


    在 PHP 5 之前的版本中，构造方法以它所属的类名来命名。因此 `ShopProduct` 类会使用 `ShopProduct()` 方法作为其构造方法。但这种方式并非在所有情况下都适用，并已在
    PHP 7 中被弃用。请将你的构造方法命名为 `__construct()`。


    请注意方法名以两个下划线字符开头。在 PHP 类中，其他许多特殊方法也沿用这种命名约定。下面我为 `ShopProduct` 类定义一个构造方法：


    ```

    // listing 03.12

    class ShopProduct

    {

    public $title;

    public $producerMainName;

    public $producerFirstName;

    public $price = 0;

    public function __construct(

    $title,

    $firstName,

    $mainName,

    $price

    ) {

    $this->title = $title;

    $this->producerFirstName = $firstName;

    $this->producerMainName = $mainName;

    $this->price = $price;

    }

    public function getProducer()

    {

    return $this->producerFirstName . " "

    . $this->producerMainName;

    }

    }

    ```


    我再次将功能整合到类中，从而减少使用该类的代码中的重复劳动。当使用 `new` 运算符创建对象时，`__construct()` 方法会被自动调用：


    ```

    // listing 03.13

    $product1 = new ShopProduct(

    "My Antonia",

    "Willa",

    "Cather",

    5.99

    );

    print "author: {$product1->getProducer()}\n";

    ```


    输出结果如下：


    ```

    author: Willa Cather

    ```


    传入的所有参数都会被传递给构造方法。因此在示例中，我将标题、名、姓和产品价格传递给了构造方法。构造方法使用伪变量 `$this` 为对象的每个属性赋值。


    **注意**


    现在 `ShopProduct` 对象的实例化变得更简单、更安全。实例化和初始化只需一条语句即可完成。任何使用 `ShopProduct` 对象的代码都可以合理确信其所有属性都已初始化完毕。


    这种可预测性是面向对象编程的重要方面。你应该设计类，让对象的使用者能够确信其特性。确保对象安全的一种方法是让对象属性中保存的数据类型可预测。例如，可以确保
    `$name` 属性始终由字符数据组成。但如果属性数据是从类外部传入的，如何实现这一点呢？在下一节中，我将探讨一种在方法声明中强制对象类型的机制。


    ## 参数与类型


    类型决定了数据在脚本中的管理方式。例如，使用 `string` 类型显示字符数据，并使用字符串函数操作这些数据。整型用于数学表达式，布尔型用于测试表达式，以此类推。这些类别被称为原始类型。但从更高层面来说，类定义了一种类型。因此，`ShopProduct`
    对象既属于原始类型 `object`，也属于 `ShopProduct` 类类型。在本节中，我将探讨这两种类型与类方法的关系。


    方法和函数定义并不强制要求参数必须是特定类型。这既是优点也是缺点。参数可以是任何类型这一事实带来了灵活性。你可以构建能够智能响应不同数据类型的方法，根据变化的情况定制功能。但当方法体期望参数是某种类型却接收到另一种类型时，这种灵活性也会导致代码中出现歧义。


    ### 原始类型


    PHP 是一种弱类型语言。这意味着变量不需要声明为持有特定的数据类型。变量 `$number` 在同一作用域内既可以存储值 `2`，也可以存储字符串 `"two"`。在
    C 或 Java 等强类型语言中，必须在赋值前声明变量的类型，并且值必须是指定的类型。


    但这并不意味着 PHP 没有类型概念。可以赋给变量的每个值都有类型。你可以使用 PHP 的类型检查函数之一来确定变量值的类型。表 3-1 列出了 PHP 中识别的原始类型及其对应的检测函数。每个函数接受一个变量或值，如果该参数属于相关类型，则返回
    `true`。


    **表 3-1. PHP 中的原始类型及检测函数**


    | 类型检测函数 | 类型 | 描述 |

    | --- | --- | --- |

    | `is_bool()` | 布尔型 | 两个特殊值之一：`true` 或 `false` |

    | `is_integer()` | 整型 | 整数。`is_int()` 和 `is_long()` 的别名 |

    | `is_double()` | 浮点型 | 浮点数（带小数点的数字）。`is_float()` 的别名 |

    | `is_string()` | 字符串型 | 字符数据 |

    | `is_object()` | 对象型 | 对象 |

    | `is_array()` | 数组型 | 数组 |

    | `is_resource()` | 资源型 | 用于标识和处理外部资源（如数据库或文件）的句柄 |

    | `is_null()` | NULL 型 | 未赋值的值 |


    在处理方法和函数参数时，检查变量的类型可能尤为重要。

    '
- fmt: '#### Primitive Types Matter: An Example


    You need to keep a close eye on type in your code. Here’s an example of one of
    the many type-related problems that you could encounter.


    Imagine that you are extracting configuration settings from an XML file. The `<resolvedomains>`
    XML element tells your application whether it should attempt to resolve IP addresses
    to domain names, a useful but relatively expensive process. Here is some sample
    XML:


    ```

    <resolvedomains>false</resolvedomains>

    ```


    The string `"false"` is extracted by your application and passed as a flag to
    a method called `outputAddresses()`, which displays IP address data. Here is `outputAddresses()`:


    ```

    // listing 03.15

    class AddressManager

    {

    private $addresses = ["209.131.36.159", "216.58.213.174"];

    public function outputAddresses($resolve)

    {

    foreach ($this->addresses as $address) {

    print $address;

    if ($resolve) {

    print " (".gethostbyaddr($address).")";

    }

    print "\n";

    }

    }

    }

    ```


    Of course, the `AddressManager` class could do with some improvement. It’s not
    very useful to hardcode IP addresses into a class, for example. Nevertheless,
    the `outputAddresses()` method loops through the `$addresses` array property,
    printing each element. If the `$resolve` argument variable itself resolves to
    `true`, the method outputs the domain name, as well as the IP address.


    Here’s one approach that uses the `settings` XML configuration element in conjunction
    with the `AddressManager` class. See if you can spot how it is flawed:


    ```

    // listing 03.16

    $settings = simplexml:load_file(__DIR__."/resolve.xml");

    $manager = new AddressManager();

    $manager->outputAddresses((string)$settings->resolvedomains);

    ```


    The code fragment uses the `SimpleXML` API to acquire a value for the `resolvedomains`
    element. In this example, I know that this value is the text element `"false"`,
    and I cast it to a string as the `SimpleXML` documentation suggests I should.


    This code will not behave as you might expect. In passing the string `"false"`
    to the `outputAddresses()` method, I misunderstand the implicit assumption the
    method makes about the argument. The method is expecting a Boolean value (that
    is `true` or `false`). The string `"false"` will, in fact, resolve to `true` in
    a test. This is because PHP will helpfully cast a nonempty string value to the
    Boolean `true` for you in a test context. Consider this code:


    ```

    if ( "false" ) {

    // ...

    }

    ```


    It is actually equivalent to this:


    ```

    if ( true ) {

    // ...

    }

    ```


    There are a number of approaches you might take to fix this.


    You could make the `outputAddresses()` method more forgiving, so that it recognizes
    a string and applies some basic rules to convert it to a Boolean equivalent:


    ```

    // listing 03.17

    public function outputAddresses($resolve)

    {

    if (is_string($resolve)) {

    $resolve =

    (preg_match("/^(false|no|off)$/i", $resolve) ) ? false : true;

    }

    // ...

    }

    ```


    There are good design reasons for avoiding an approach like this, however. Generally
    speaking, it is better to provide a clear and strict interface for a method or
    function than it is to offer a fuzzily forgiving one. Fuzzy and forgiving functions
    and methods can promote confusion and thereby breed bugs.


    You could take another approach: Leave the `outputAddresses()` method as it is
    and include a comment containing clear instructions that the `$resolve` argument
    should contain a Boolean value. This approach essentially tells the coder to read
    the small print or reap the consequences:


    ```

    /**

    * Outputs the list of addresses.

    * If $resolve is true then each address will be resolved

    * @param    $resolve    boolean    Resolve the address?

    */

    function outputAddresses($resolve)

    {

    // ...

    }

    ```


    This is a reasonable approach, assuming your client coders are diligent readers
    of documentation.


    Finally, you could make `outputAddresses()` strict about the type of data it is
    prepared to find in the `$resolve` argument. For primitive types like boolean,
    there was really only one way to do this prior to the release of PHP 7. You would
    have to write code to examine incoming data and take some kind of action if it
    does not match the required type:


    ```

    function outputAddresses($resolve)

    {

    if (! is_bool($resolve)) {

    // do something drastic

    }

    //...

    }

    ```


    This approach can be used to force client code to provide the correct data type
    in the `$resolve` argument or to issue a warning.


    Note


    In the next section, “Taking the Hint: Object Types,” I will describe a much better
    way of constraining the type of arguments passed to methods and functions.


    Converting a string argument on the client’s behalf would be friendly but would
    probably present other problems. In providing a conversion mechanism, you second-guess
    the context and intent of the client. By enforcing the Boolean data type, on the
    other hand, you leave the client to decide whether to map strings to Boolean values
    and determine which word should map to `true` or `false`. The `outputAddresses()`
    method, meanwhile, concentrates on the task it is designed to perform. This emphasis
    on performing a specific task in deliberate ignorance of the wider context is
    an important principle in object-oriented programming, and I will return to it
    frequently throughout the book.


    In fact, your strategies for dealing with argument types will depend on the seriousness
    of any potential bugs on the one hand, and the benefits of flexibility on the
    other. PHP casts most primitive values for you, depending on context. Numbers
    in strings are converted to their integer or floating point equivalents when used
    in a mathematical expression, for example. So your code might be naturally forgiving
    of type errors. If you expect one of your method arguments to be an array, however,
    you may need to be more careful. Passing a nonarray value to one of PHP’s array
    functions will not produce a useful result and could cause a cascade of errors
    in your method.


    It is likely, therefore, that you will strike a balance among testing for type,
    converting from one type to another, and relying on good, clear documentation
    (you should provide the documentation, whatever else you decide to do).


    However you address problems of this kind, you can be sure of one thing—type matters.
    The fact that PHP is loosely typed makes it all the more important. You cannot
    rely on a compiler to prevent type-related bugs; you must consider the potential
    impact of unexpected types when they find their way into your arguments. You cannot
    afford to trust client coders to read your thoughts, and you should always consider
    how your methods will deal with incoming garbage.'
