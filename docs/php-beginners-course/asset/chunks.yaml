    **Case analysis (switch / case)**


    Let us suppose we have a variable and want to check for many different contents.
    We already know the function of if, elseif and else. However, it may quickly become
    confusing; moreover, it is easier to write a redundant code to check only a single
    variable. There is the practical function switch case which is programmed as follows:


    <?php


    $username = $_GET["username"];


    switch ($username) {


    case "Klaus":


    echo "Hello administrator!";


    break;


    case "Dagmar":


    echo "Hello sister!";


    break;


    case "Bill Gates":


    echo "Hello richest man in the world!"; break;


    default:


    echo "Hello visitor!";


    break;


    }


    ?>


    As we see, the head of the switch function is pretty similar to the ‘if’ function;
    it just has no parameters defined. Thereafter, each multiple case block must be
    completed with a break; that breaks the review on to other cases.


    If, in neither case, the condition is met, the default block is executed. If you
    do not use breaks, you could run the same for two or more case code blocks:


    <?php


    $username = $_GET["username"];


    switch ($username) {


    case "Klaus":


    case "Dagmar":


    echo "Hello administrator!";


    break;


    case "Bill Gates":


    echo "Hello richest man in the world!"; break;


    default:


    echo "Hello visitor!";


    break;


    }


    ?>


