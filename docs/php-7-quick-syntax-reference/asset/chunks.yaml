    \ shows the output for `var_export($a)`. Note\nthe trailing comma after the last\
    \ element, which is allowed.\n\n```\narray ( 0 => 'one', 1 => 'two', 2 => 'three',\
    \ )\n```\n\nThe `var_export`\nfunction , along with `print_r`, accepts an\noptional\
    \ Boolean second argument. When set to `true`, the function\nreturns the output\
    \ instead of printing it. This gives `var_export` further\nuses, such as being\
    \ combined with the `eval` language\nconstruct. This construct takes a string\
    \ argument and evaluates it as\nPHP code."
  trans: "```php\nfunction myUnset()\n{\n    // Make $o a reference to $GLOBALS['o']\n\
    \    global $o;\n    // Remove the reference variable\n    unset($o);\n    //\
    \ Remove the global variable\n    unset($GLOBALS['o']);\n}\n```\n\n取消设置变量（`unset`）与将变量设置为\
    \ `null` 略有不同。当变量被设置为 `null` 时，变量仍然存在，但其持有的变量内容立即被释放。相反，取消设置变量会删除变量，但内存仍被视为正在使用，直到垃圾回收器将其清除。抛开性能问题不谈，建议使用\
    \ `unset`，因为它能使代码的意图更清晰。\n\n```php\n$var = null; // 释放内存\nunset($var); // 删除变量\n\
    ```\n\n请记住，大多数情况下无需手动取消设置变量，因为 PHP 垃圾回收器会在变量超出作用域时自动删除它们。然而，如果服务器执行内存密集型任务，手动取消设置这些变量可以让服务器在耗尽内存之前处理更多的并发请求。\n\
    \n## Null 合并运算符\n\nNull 合并运算符（`??`）是在 PHP 7 中新增的，作为常见使用 `isset` 的三元运算的快捷方式。如果第一个操作数存在且不为\
    \ `null`，则返回该操作数；否则返回第二个操作数。\n\n```php\n$x = null;\n$name = $x ?? 'unknown'; //\
    \ \"unknown\"\n```\n\n该语句等价于以下使用 `isset` 结构的三元运算：\n\n```php\n$name = isset($x)\
    \ ? $x : 'unknown';\n```\n\n## 确定类型\n\nPHP 有几个用于确定变量类型的有用函数。这些函数可以在表 20-1 中查看。\n\
    \n**表 20-1. 用于确定变量类型的函数**\n\n| 名称                                 | 描述       \
    \                    |\n| ------------------------------------ | ------------------------------\
    \ |\n| `is_array()`                         | 如果变量是数组，则为 `true`。    |\n| `is_bool()`\
    \                          | 如果变量是布尔值，则为 `true`。   |\n| `is_callable()`      \
    \                | 如果变量可以作为函数调用，则为 `true`。 |\n| `is_float()`, `is_double()`, `is_real()`\
    \ | 如果变量是浮点数，则为 `true`。  |\n| `is_int()`, `is_integer()`, `is_long()` | 如果变量是整数，则为\
    \ `true`。    |\n| `is_null()`                          | 如果变量被设置为 `null`，则为 `true`。\
    \ |\n| `is_numeric()`                       | 如果变量是数字或数字字符串，则为 `true`。 |\n| `is_scalar()`\
    \                        | 如果变量是整数、浮点数、字符串或布尔值，则为 `true`。 |\n| `is_object()` \
    \                       | 如果变量是对象，则为 `true`。     |\n| `is_resource()`        \
    \              | 如果变量是资源，则为 `true`。     |\n| `is_string()`                   \
    \     | 如果变量是字符串，则为 `true`。   |\n\n举例来说，`is_numeric` 函数如果参数包含数字或可以计算为数字的字符串，则返回\
    \ `true`。\n\n```php\nis_numeric(10.5);   // true  (float)\nis_numeric('33'); \
    \  // true  (numeric string)\nis_numeric('text'); // false (non-numeric string)\n\
    ```\n\n## 变量信息\n\nPHP 有三个内置函数用于检索变量信息：`print_r`、`var_dump` 和 `var_export`。`print_r`\
    \ 函数以人类可读的方式显示变量的值，对调试非常有用。\n\n```php\n$a = array('one', 'two', 'three');\nprint_r($a);\n\
    ```\n\n上述代码将产生以下输出：\n\n```\nArray ( [0] => one [1] => two [2] => three )\n```\n\
    \n与 `print_r` 类似的是 `var_dump`，它除了显示值之外，还显示数据类型和大小。调用 `var_dump($a)` 会显示以下输出：\n\
    \n```\narray(3) {\n  [0]=> string(3) \"one\"\n  [1]=> string(3) \"two\"\n  [2]=>\
    \ string(5) \"three\"\n}\n```\n\n最后，还有 `var_export` 函数，它以可以作为 PHP 代码使用的样式打印变量信息。以下显示了\
    \ `var_export($a)` 的输出。注意最后一个元素后面的尾部逗号，这是允许的。\n\n```\narray (\n  0 => 'one',\n\
    \  1 => 'two',\n  2 => 'three',\n)\n```\n\n`var_export` 函数与 `print_r` 一样，接受一个可选的布尔类型第二个参数。当设置为\
    \ `true` 时，该函数返回输出而不是打印它。这使得 `var_export` 有更多用途，例如与 `eval` 语言结构结合使用。该结构接受一个字符串参数并将其作为\
    \ PHP 代码进行求值。"
- fmt: "```php\neval('$b = ' . var_export($a, true) . ';');\n```\n\nThe ability to\
    \ execute arbitrary code with `eval` is a powerful feature that should be used\
    \ with care. It should not be used to execute any user-provided data, at least\
    \ not without proper validation, as this represents a security risk. Another reason\
    \ why the use of `eval` is discouraged is because similar to `goto`, it makes\
    \ the execution of code more difficult to follow, which complicates debugging.\n\
    \n## Overloading\n\nOverloading in PHP provides the ability to add object members\
    \ at run-time. This is done by having the class implement the overloading methods\
    \ `__get`, `__set`, `__call`, and `__callStatic`. Bear in mind that the meaning\
    \ of overloading in PHP is different from many other languages.\n\n### Property\
    \ Overloading\n\nThe `__get` and `__set` methods provide a convenient way to implement\
    \ getter and setter methods, which are methods that are often used to safely read\
    \ and write to properties. These overloading methods are invoked when using properties\
    \ that are inaccessible, either because they are not defined in the class or because\
    \ they are unavailable from the current scope. In the following example, the `__set`\
    \ method adds any inaccessible properties to the `$data` array, and `__get` safely\
    \ retrieves the elements.\n\n```php\nclass MyProperties\n{\n    private $data\
    \ = array();\n    public function __set($name, $value)\n    {\n        $this->data[$name]\
    \ = $value;\n    }\n    public function __get($name)\n    {\n        if (array_key_exists($name,\
    \ $this->data))\n            return $this->data[$name];\n    }\n}\n```\n\nWhen\
    \ setting the value of an inaccessible property, `__set` is called with the name\
    \ of the property and the value as its arguments. Similarly, when accessing an\
    \ inaccessible property, `__get` is called with the property name as its argument.\n\
    \n```php\n$obj = new MyProperties();\n$obj->a = 1;  // __set called\necho $obj->a;\
    \ // __get called\n```\n\n### Method Overloading\n\nThere are two methods for\
    \ handling calls to inaccessible methods of a class: `__call` and `__callStatic`.\
    \ The `__call` method is invoked for instance method calls.\n\n```php\nclass MyClass\n\
    {\n    public function __call($name, $args)\n    {\n        echo \"Calling $name\
    \ $args[0]\";\n    }\n}\n// \"Calling myTest in object context\"\n(new MyClass())->myTest('in\
    \ object context');\n```\n\nThe first argument to `__call` is the name of the\
    \ method being called and the second is a numeric array containing the parameters\
    \ passed to the method. These arguments are the same for the `__callStatic` method,\
    \ which handles calls to inaccessible static methods.\n\n```php\nclass MyClass\n\
    {\n    public static function __callStatic($name, $args)\n    {\n        echo\
    \ \"Calling $name $args[0]\";\n    }\n}\n// \"Calling myTest in static context\"\
    \nMyClass::myTest('in static context');\n```\n\n### Isset and unset Overloading\n\
    \nThe built-in constructs `isset`, `empty`, and `unset` only work on explicitly\
    \ defined properties, not overloaded ones. This functionality is added to a class\
    \ by overloading the `__isset` and `__unset` methods.\n\n```php\nclass MyClass\n\
    {\n    private $data = array();\n    public function __set($name, $value) {\n\
    \        $this->data[$name] = $value;\n    }\n    public function __get($name)\
    \ {\n        if (array_key_exists($name, $this->data))\n            return $this->data[$name];\n\
    \    }\n    public function __isset($name) {\n        return isset($this->data[$name]);\n\
    \    }\n    public function __unset($name) {\n        unset( $this->data[$name]\
    \ );\n    }\n}\n```\n\nThe `__isset` method is invoked when `isset` is called\
    \ on an inaccessible property.\n\n```php\n$obj = new MyClass();\n$obj->name =\
    \ \"Joe\";\nisset($obj->name); // true\nisset($obj->age);  // false\n```\n\nWhen\
    \ `unset` is called on an inaccessible property, the `__unset` method handles\
    \ that call.\n\n```php\nunset($obj->name); // delete property\nisset($obj->name);\
    \ // false\n```\n\nThe `empty` construct only works on overloaded properties if\
    \ both `__isset` and `__get` are implemented. If the result from `__isset` is\
    \ false, the `empty` construct returns `true`. If, on the other hand, `__isset`\
    \ returns `true`, then `empty` retrieves the property with `__get` and evaluates\
    \ if it has a value considered to be empty.\n\n```php\nempty($obj->name); // false\n\
    empty($obj->age);  // true\n```"
