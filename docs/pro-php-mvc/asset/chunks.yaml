    \ 18-4.\n\n## Listing 18-4. The `_upload()` Method\n\n```php\nuse Shared\\Controller\
    \ as Controller;\n\nclass Users extends Controller\n{\n    protected function\
    \ _upload($name, $user)\n    {\n        if (isset($_FILES[$name]))\n        {\n\
    \            $file = $_FILES[$name];\n            $path = APP_PATH.\"/public/uploads/\"\
    ;\n            $time = time();\n            $extension = pathinfo($file[\"name\"\
    ], PATHINFO_EXTENSION);\n            $filename = \"{$user}-{$time}.{$extension}\"\
    ;\n\n            if (move_uploaded_file($file[\"tmp_name\"], $path.$filename))\n\
    \            {\n                $meta = getimagesize($path.$filename);\n     \
    \           if ($meta)\n                {\n                    $width = $meta[0];\n\
    \                    $height = $meta[1];\n\n                    $file = new File(array(\n\
    \                        \"name\" => $filename,\n                        \"mime\"\
    \ => $file[\"type\"],\n                        \"size\" => $file[\"size\"],\n\
    \                        \"width\" => $width,\n                        \"height\"\
    \ => $height,\n                        \"user\" => $user\n                   \
    \ ));\n\n                    $file->save();\n                }\n            }\n\
    \        }\n    }\n}\n```\n\nThere are a few important things to note about this\
    \ method. The first thing is that file uploads may only differ in two areas, specifically\
    \ the name of the form input and the ID of the user who is uploading files. The\
    \ second thing to note is the method defines a path for the new file within the\
    \ `public/uploads` folder. This will allow the files to be directly accessible\
    \ via URL.\n\nAs with our example code, the method checks whether a file has been\
    \ uploaded. If it has, the method attempts to move the file to a permanent location.\n\
    \n**Note:** When a file cannot be moved to permanent storage, it might be a sign\
    \ that the upload is insecure and/or invalid. This would be a good time to raise\
    \ an exception, making the developer aware that something has gone wrong.\n\n\
    After the file is moved to the permanent storage, a new `File` instance is created\
    \ and a row is saved to the database. We also determine the width/height of the\
    \ uploaded file. Now that we have a reusable method for uploading, it is a good\
    \ time to integrate it into the `register()` and `settings()` actions of our `Users`\
    \ controller.\n\nThe methods should resemble those shown in Listings 18-5 and\
    \ 18-6.\n\n## Listing 18-5. The `register()` Action\n\n```php\nuse Framework\\\
    RequestMethods as RequestMethods;\nuse Shared\\Controller as Controller;\n\nclass\
    \ Users extends Controller\n{\n    public function register()\n    {\n       \
    \ if (RequestMethods::post(\"save\"))\n        {\n            $user = new User(array(\n\
    \                \"first\" => RequestMethods::post(\"first\"),\n             \
    \   \"last\" => RequestMethods::post(\"last\"),\n                \"email\" =>\
    \ RequestMethods::post(\"email\"),\n                \"password\" => RequestMethods::post(\"\
    password\")\n            ));\n\n            if ($user->validate())\n         \
    \   {\n                $user->save();\n                $this->_upload(\"photo\"\
    , $user->id);\n                $this->actionView->set(\"success\", true);\n  \
    \          }\n\n            $this->actionView->set(\"errors\", $user->errors);\n\
    \        }\n    }\n}\n```\n\n## Listing 18-6. The `settings()` Action\n\n```php\n\
    use Framework\\RequestMethods as RequestMethods;\nuse Shared\\Controller as Controller;\n\
    \nclass Users extends Controller\n{\n    /**\n     * @before _secure\n     */\n\
    \    public function settings()\n    {\n        $errors = array();\n\n       \
    \ if (RequestMethods::post(\"save\"))\n        {\n            $this->user->first\
    \ = RequestMethods::post(\"first\");\n            $this->user->last = RequestMethods::post(\"\
    last\");\n            $this->user->email = RequestMethods::post(\"email\");\n\n\
    \            if (RequestMethods::post(\"password\"))\n            {\n        \
    \        $this->user->password = RequestMethods::post(\"password\");\n       \
    \     }\n\n            if ($this->user->validate())\n            {\n         \
    \       $this->user->save();\n                $this->_upload(\"photo\", $this->user->id);\n\
    \                $this->actionView->set(\"success\", true);\n            }\n\n\
    \            $errors = $this->user->errors;\n        }\n\n        $this->actionView->set(\"\
