  trans: "\n你需要修改产品列表（`products_list.php`）的 `templates-logic` 文件，使其能够识别何时被调用以显示搜索结果，从而调用业务层的正确方法来获取产品列表。\n\
    \n在接下来的练习中，我们来创建 `search_result` 模板，并更新 `products_list` 组件化模板的 `templates-logic`\
    \ 文件。\n\n## 练习：创建 `search_results` 组件化模板\n\n**1.** 在 `presentation/templates`\
    \ 目录中创建一个名为 `search_results.tpl` 的新模板文件，并向其中添加以下内容：\n\n```\n{* search_results.tpl\
    \ *}\n\n<p class=\"title\">搜索结果</p>\n\n<br />\n\n{include file=\"products_list.tpl\"\
    }\n```\n\n**2.** 修改 `presentation/smarty_plugins/function.load_products_list.php`\
    \ 文件，在 `ProductList` 类的构造方法（`__construct`）末尾添加以下代码行：\n\n```\n// 从查询字符串中获取搜索详细信息\n\
    if (isset ($_GET['Search']))\n    $this->mSearchString = $_GET['Search'];\n\n\
    // 从查询字符串中获取 AllWords 参数\nif (isset ($_GET['AllWords']))\n    $this->mAllWords\
    \ = $_GET['AllWords'];\n```\n\n**3.** 在位于同一文件中的 `ProductsList` 类中，添加 `$mSearchResultsTitle`、`$mSearch`、`$mAllWords`\
    \ 和 `$mSearchString` 成员：\n\n```\nclass ProductsList\n{\n    // 可供 Smarty 模板读取的公共变量\n\
    \    public $mProducts;\n    public $mPageNo;\n    public $mrHowManyPages;\n \
    \   public $mNextLink;\n    public $mPreviousLink;\n    public $mSearchResultsTitle;\n\
    \    public $mSearch = '';\n    public $mAllWords = 'off';\n    public $mSearchString;\n\
    \n    // 私有成员\n    private $_mDepartmentId;\n    private $_mCategoryId;\n```\n\
    \n**4.** 将 `ProductsList` 类中的 `init` 方法修改如下：\n\n```\npublic function init()\n\
    {\n    /* 如果正在搜索目录，则通过调用业务层的 Search 方法获取产品列表 */\n    if (isset ($this->mSearchString))\n\
    \    {\n        // 获取搜索结果\n        $search_results = Catalog::Search($this->mSearchString,\n\
    \                                          $this->mAllWords,\n               \
    \                           $this->mPageNo,\n                                \
    \          $this->mrHowManyPages);\n\n        // 获取产品列表\n        $this->mProducts\
    \ = $search_results['products'];\n\n        // 构建产品列表的标题\n        if (count($search_results['accepted_words'])\
    \ > 0)\n            $this->mSearchResultsTitle =\n                '包含<font class=\"\
    words\">'\n                . ($this->mAllWords == 'on' ? '所有' : '任意') . '</font>'\n\
    \                . '这些词语的产品：<font class=\"words\">'\n                . implode(',\
    \ ', $search_results['accepted_words']) .\n                '</font><br />';\n\n\
    \        if (count($search_results['ignored_words']) > 0)\n            $this->mSearchResultsTitle\
    \ .=\n                '被忽略的词语：<font class=\"words\">'\n                . implode(',\
    \ ', $search_results['ignored_words']) .\n                '</font><br />';\n\n\
    \        if (!(count($search_results['products']) > 0))\n            $this->mSearchResultsTitle\
    \ .=\n                '您的搜索未产生任何结果。<br />';\n    }\n\n    /* 如果正在浏览分类，则通过调用业务层的\
    \ GetProductsInCategory 方法获取产品列表 */\n    elseif (isset ($this->_mCategoryId))\n\
    \        $this->mProducts = Catalog::GetProductsInCategory(\n            $this->mCategoryId,\
    \ $this->mPageNo, $this->mrHowManyPages);\n    ...\n```\n\n**5.** 在 `presentation/templates/products_list.tpl`\
    \ 文件的开头、`load_products_list` 代码行下方，添加以下代码行：\n\n```\n{* products_list.tpl *}\n\
    {load_products_list assign=\"products_list\"}\n{if $products_list->mSearchResultsTitle\
    \ != \"\"}\n    <p class=\"description\">{$products_list->mSearchResultsTitle}</p>\n\
    {/if}\n```\n\n**6.** 修改 `index.php` 文件，当执行搜索时加载 `search_results` 组件化模板，添加以下代码行：\n\
    \n```\n...\n// 如果正在浏览部门，则加载部门详细信息\nif (isset ($_GET['DepartmentID']))\n{\n   \
    \ $pageContentsCell = 'department.tpl';\n    $categoriesCell = 'categories_list.tpl';\n\
    }\n// 如果正在搜索目录，则加载搜索结果页面\nif (isset ($_GET['Search']))\n```\n"
