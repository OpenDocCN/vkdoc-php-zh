    \ it. Nor should you feel that the implementations presented here are the only\
    \ way you might go about deploying these patterns. Rather, you should use the\
    \ examples here to help you understand the thrust of the patterns described, feeling\
    \ free to extract what you need for your projects.\n\nBecause of the amount of\
    \ material to cover, this is one this book’s longest and most involved chapters,\
