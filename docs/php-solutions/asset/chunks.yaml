    \ with an ISO 8601 recurring interval. It looks like this:\n\n```\n$period = new\
    \ DatePeriod('R5/2015-02-10T00:00:00Z/P10D');\nforeach ($period as $date) {\n\
    \    echo $date->format('l, F j, Y') . '<br>';\n}\n```\n\nThe ISO recurring interval\
    \ sets five recurrences from midnight UTC on February 10, 2015 at an interval\
    \ of 10 days. The recurrences are subsequent to the original date, so the preceding\
    \ example produces six dates, as shown in the following output.\n\n![A978-1-4842-0635-5_14_Figg_HTML.jpg](A978-1-4842-0635-5_14_Figg_HTML.jpg)\n\
    \n### Chapter Review\n\nA large part of this chapter has been devoted to the powerful\
    \ date and time features introduced in PHP 5.2 and 5.3. I haven’t covered the\
    \ `DateTimeImmutable` class that was introduced in PHP 5.5 because it’s identical\
    \ to `DateTime` in every respect except one. A `DateTimeImmutable` object never\
    \ modifies itself. Instead, it always returns a new object with the modified values.\
    \ This can be useful if you have a date, such as a person’s date of birth, which\
    \ never changes. Using the `setDate()` or `add()` methods with this type of object\
    \ returns a new object, preserving the original details and providing a new object\
    \ for the updated ones, such as start of employment, marriage, pensionable age,\
    \ and so on.\n\nYou probably don’t need the date- and time-related classes every\
