    ## Signing In and Out


    Obviously, it’s beneficial to store information about your regular customers.
    Doing so will relieve them from having to enter their addresses, contact information,
    and so on every time they buy a product from your site. To store information about
    your frequent customers, you need to enable them to register at your site. The
    registered customers can sign in any time by entering their e-mail addresses and
    passwords. When users have completed a purchase, they can then log out from your
    site. In this section, you’ll learn how visitors to your site can be allowed to
    sign in and sign out.


    Note


    The session usually sets a user key on the user’s computer, which looks like a
    long string of chars like `234hjg5hg34g5hj23g532hjg34hjg5k4`. When a session is
    opened on another page for instance, it will scan the computer for a user key.
    If there is a match, it will access that session; if not, it will start a new
    session.


    The `signin.php` script shown in Listing [3-11](#A978-1-4842-1672-9_3_Chapter.html#FPar14)
    prompts the users to enter credential information so that they can sign in to
    your site.


