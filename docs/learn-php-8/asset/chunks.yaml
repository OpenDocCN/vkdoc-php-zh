    \ the* *<?php* *tag and*\n    *session_start. The* *session_start* *method produces\n\
    \    an HTML header that would not be formed correctly if any code exists\n  \
    \  before the method call.*\n\n```\n\";\necho \"Login | Create an account\";\n\
    echo \"\";\n}\nelse {\necho \"Welcome back, \" . $_SESSION['username'] . \"\"\
    ;\n}\n?>\n```\n\nEach program in the interface tier (that the user can access)\
    \ would\ninclude code similar to the previous example. The `session_start`\nmethod\
    \ , in this\nexample, lets the operating system know that this program is part\
    \ of an\nexisting session (which is declared in the authentication tier). Each\n\
    session is identified by the system using a uniquely generated ID. As\nlong as\
    \ the user (or system) has not closed the session, the session ID\nwill be attached\
    \ to any program, called by the user, which includes the\n`session_start`\nmethod.\
    \ This allows the program to access all properties related to the\ncurrent session.\n\
    \nThe PHP `isset`\nmethod  (in an\n`if` statement)\ncan determine if values exist\
    \ in the `username` and `password` properties.\nIf values do not exist, it indicates\
    \ that the user has not been\nauthenticated. Session properties are retrieved\
    \ (and set) using `$_SESSION`. In the\nprevious example, if either of the properties\
    \ is not set, the user is\nprovided links to the login page (`login.php`) or the\n\
    register page (`register.php`). If\nboth properties are set, the user is welcomed\
    \ to the system. The user\nhas no choice but to log in to access the program.\n\
    \n```\n\";\necho \"Login | Create an account\";\necho \"\";\n}\nelse\n{\necho\
    \ \"Welcome back, \" . $_SESSION['username'] . \"\";\n?>\n\nDog Object\n\nDog\
    \ Object Creator\n\nPlease complete ALL fields. Please note the required format\
    \ of information.\nEnter Your Dog's Name (max 20 characters, alphabetic) \nSelect\
    \ Your Dog's Color:\nBrown\nBlack\nYellow\nWhite\nMixed\nEnter Your Dog's Weight\
    \ (numeric only)\n\nAjaxRequest('e5dog_interface.php');\n\nSelect Your Dog's Breed\n\
    \nExample 8-1\nThe lab.php file with user ID/password verification\n```\n\nIn\
    \ Example [8-1](#394210_2_En_8_Chapter.xhtml#PC2), the verification\ncode is placed\
    \ at the top of the program. The `else` statement must\ninclude all the code to\
    \ execute if the user is signed into the system.\nSince the code for this program\
    \ is HTML (and CSS) code, the\n`if` statement\nmust be wrapped around the existing\
    \ code. The closing bracket(`s`) of the `else` statement is\nshifted to the bottom\
    \ of the code (after all HTML tags).\nPHP allows you to close your PHP code (via\
    \ `?>`) and reopen\nyour PHP code (via `<?php`) as many\ntimes as required. In\
    \ this example, the PHP code is closed at the top of\nthe program (in the `else`\
    \ statement) just\nbefore the closing bracket. The PHP code is then reopened at\
    \ the bottom\nof the code to include a single closing bracket, which closes the\
    \ PHP\n`else` statement.\nThis wraps the `else` statement around\nall the existing\
    \ code. The users can now only access this section of the\ncode if they are logged\
    \ in.\nSince PHP code\nis now included in the lab program, the file ending must\
    \ be changed from\n`.html` to `.php`. Otherwise, the\nserver would not execute\
    \ the PHP code.\n\nNow let us look at how you can populate the session properties\
    \ by\ncreating a login program. First, let us look at the HTML to request\ninformation\
    \ from the users.\n\n```\nUsername: \nPassword:\n\n```\n\nHTML5 does not include\
    \ a minimum length parameter. However, the pattern\nparameter can be used (with\
    \ regular expressions) to establish a minimum\nsize. In the `username` tag in\
    \ the\nprevious example, the pattern `\".{8,}\"` requires at\nleast eight characters\
    \ be entered by the users. For password security, a\nmore complicated pattern\
    \ is needed. In the password example, in addition\nto the minimum requirement\
    \ of eight characters, at least one number\n**(**`?=.*\\d`**)**,\none uppercase\
    \ letter **(**`?=.*[A-Z]`**),**\nand one lowercase\nletter **(**`?=.*[a-z]`**)**\n\
    are required.\n\n*   *Security and performance—The HTML filtering provided is\
    \ used\n    to inform the users of any typos that may have occurred. In the login\n\
    \    process, you are not storing information; you are comparing information\n\
    \    to what has already been stored. You do not have to be concerned with\n \
    \   any possible harmful information being passed into the text boxes. Any\n \
    \   harmful information would not match the valid information that is\n    stored.\
    \ The user would receive an invalid user ID/password\n    message.*\n\n```\n//\
    \ validate process not shown\n$_SESSION['username'] = $_POST['username'];\n$_SESSION['password']\
    \ = $_POST['password'];\n// Redirect the user to the home page\nheader(\"Location:\
    \ http://www.asite.com/lab.php\");\n```"
  trans: '

    # 验证与会话


    任何关于安全性的讨论都离不开用户 ID/密码认证。当前版本的 PHP 包含许多帮助开发者验证用户的技术。本章将研究其中一种较为简单的方法。


    由于登录凭证需要即时验证的特性，认证过程直接访问数据源进行验证（不经过业务逻辑层）。因此，认证过程被视为一个独立的层级，置于应用程序之上以提供访问权限。如您所见，界面层程序只需稍作修改即可限制访问，大部分编码工作都集中在认证层。


    除了认证之外，登录过程中还可以确定访问级别。并非所有用户都需要对应用程序拥有完全访问权限。有些用户可能只需要读取权限，有些可能只需要对自己相关的信息具有写入权限，而有些用户（管理员）则需要对整个应用程序拥有完全访问权限。应用程序的每个部分都需要能够确定正确的访问级别，而无需向用户索取额外信息（超出最初登录应用程序时的信息）。


    一个登录流程必须允许用户验证应用程序的所有部分。应用程序的每个部分都需要访问由认证层设置的通用属性（如用户 ID 和密码），以验证有效访问和有效访问级别。PHP
    提供了一种能力，通过声明*会话*，将应用程序的信息存储在服务器内存中。会话被认为包含用户与应用程序的完整交互过程（例如，将资金从储蓄账户转移到支票账户的完整流程）。会话可以在用户登录应用程序时立即建立，在用户注销系统（或应用程序超时或关闭）后关闭。会话关闭时，服务器内存中存储的所有属性都会被垃圾回收器清除。


    会话处于活动状态时，属性可以在整个应用程序中存储和共享。通过这种方式，用户 ID 和密码可以存储在会话属性中。应用程序的每个部分都可以通过检查`userid`和`password`属性中是否有值来验证用户是否已登录。


    在查看登录认证流程之前，我们先来了解如何判断用户是否已登录系统。本章的示例不包括安全访问级别的验证，但确定这些级别的过程会使用与示例中类似的代码。


    *   *编程提示—`session_start`方法调用必须是代码顶部的第一条语句。`<?php`标签和`session_start`之间不能有任何空格或代码。`session_start`方法会生成一个
    HTML 头，如果在方法调用之前存在任何代码，该头将无法正确形成。*


    ```

    <?php

    session_start();

    if (!isset($_SESSION[''username'']) || !isset($_SESSION[''password''])) {

    echo "<a href=''login.php''>Login</a> | <a href=''register.php''>Create an account</a>";

    }

    else {

    echo "Welcome back, " . $_SESSION[''username''] . "";

    }

    ?>

    ```


    界面层（用户可访问）中的每个程序都应包含类似上述示例的代码。在此示例中，`session_start`方法告知操作系统该程序是现有会话的一部分（该会话在认证层中声明）。系统使用唯一生成的
    ID 来标识每个会话。只要用户（或系统）未关闭会话，会话 ID 就会附加到用户调用的任何包含`session_start`方法的程序上。这使得程序能够访问与当前会话相关的所有属性。


    PHP 的`isset`方法（在`if`语句中）可以判断`username`和`password`属性中是否存在值。如果值不存在，则表明用户尚未通过身份认证。会话属性通过`$_SESSION`来获取（和设置）。在上一个示例中，如果任何一个属性未设置，系统会向用户提供登录页面（`login.php`）或注册页面（`register.php`）的链接。如果两个属性都已设置，则会欢迎用户进入系统。用户别无选择，只能登录后才能访问该程序。


    ```

    <?php

    session_start();

    if (!isset($_SESSION[''username'']) || !isset($_SESSION[''password''])) {

    echo "<a href=''login.php''>Login</a> | <a href=''register.php''>Create an account</a>";

    echo "</nav>";

    }

    else

    {

    echo "Welcome back, " . $_SESSION[''username''] . "";

    ?>


    <h1>Dog Object</h1>

    <h2>Dog Object Creator</h2>

    <p>Please complete ALL fields. Please note the required format of information.</p>

    <form>

    <p>Enter Your Dog''s Name (max 20 characters, alphabetic) <input type=''text''
    name=''dog_name''></p>

    <p>Select Your Dog''s Color:

    <select name=''dog_color''>

    <option value=''Brown''>Brown</option>

    <option value=''Black''>Black</option>

    <option value=''Yellow''>Yellow</option>

    <option value=''White''>White</option>

    <option value=''Mixed''>Mixed</option>

    </select>

    </p>

    <p>Enter Your Dog''s Weight (numeric only) <input type=''text'' name=''dog_weight''></p>

    <p><input type=''button'' value=''Create Your Dog'' onclick=''AjaxRequest("e5dog_interface.php");''></p>

    <p>Select Your Dog''s Breed</p>

    </form>


    <?php

    }

    ?>

    ```


    **示例 8-1** — 包含用户 ID/密码验证的`lab.php`文件


    在示例 8-1 中，验证代码放在程序的顶部。`else`语句必须包含用户登录系统后需要执行的所有代码。由于该程序的代码是 HTML（和 CSS）代码，因此`if`语句必须包裹在现有代码周围。`else`语句的右花括号移动到了代码的底部（在所有
    HTML 标签之后）。PHP 允许您根据需要多次关闭 PHP 代码（通过`?>`）并重新打开 PHP 代码（通过`<?php`）。在此示例中，PHP 代码在程序顶部（在`else`语句中）右花括号之前关闭。然后，在代码底部重新打开
    PHP 代码，以包含一个单独的右花括号，用于闭合`else`语句。这样，`else`语句就包裹了所有现有代码。用户现在只有在登录的情况下才能访问此部分代码。


    由于`lab`程序中现在包含 PHP 代码，文件后缀必须从`.html`更改为`.php`。否则服务器将不会执行 PHP 代码。


    现在，我们来看看如何通过创建登录程序来填充会话属性。首先，我们来看一下用于向用户请求信息的 HTML 代码。


    ```

    <form action="login.php" method="post">

    Username: <input type="text" name="username" pattern=".{8,}" title="Eight or more
    characters">

    Password: <input type="password" name="password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
    title="Must contain at least one number and one uppercase and lowercase letter,
    and at least 8 or more characters">

    <input type="submit" value="Login">

    </form>

    ```


    HTML5 没有包含最小长度参数。但是，可以使用`pattern`参数（配合正则表达式）来设定最小长度。在上一个示例的`username`标签中，模式`".{8,}"`要求用户至少输入八个字符。为了密码安全，需要更复杂的模式。在密码示例中，除了最少八个字符的要求外，还要求至少包含一个数字（`?=.*\d`）、一个大写字母（`?=.*[A-Z]`）和一个小写字母（`?=.*[a-z]`）。


    *   *安全与性能—提供的 HTML 过滤用于告知用户可能存在的输入错误。在登录过程中，您不是在存储信息，而是在将信息与已存储的信息进行比较。您无需担心任何潜在有害信息被传递到文本框中。任何有害信息都不会与已存储的有效信息匹配。用户将收到无效的用户
    ID/密码消息。*


    ```

    // validate process not shown

    $_SESSION[''username''] = $_POST[''username''];

    $_SESSION[''password''] = $_POST[''password''];

    // Redirect the user to the home page

    header("Location: http://www.asite.com/lab.php");

    ```

    '
- fmt: "Assuming we have validated the information against a list of valid user IDs\
    \ and passwords (we will look at that process soon), we can pass the valid user\
    \ ID and password information into session variables. Then the PHP `header` method\
    \ can be used to redirect the application to the next program to execute (`lab.php`).\
    \ As long as `lab.php` includes the `session_start` method (as shown previously),\
    \ it will have access to the session variables.\n\n```\nUsername: \nPassword:\n\
    ```\n\nPutting the pieces together requires an `if` statement to determine if\
    \ the user has entered the user ID and password. If the user has not done so,\
    \ the HTML code to request them is displayed. If the information has been entered\
    \ (and is valid using the HTML5 pattern expressions shown), the `else` portion\
    \ of the statement will execute (storing the values in the session variables and\
    \ calling the `lab.php` program). This provides us with the basic shell of accepting\
    \ the user ID and password, verifying they exist, and calling the program in the\
    \ interface tier if they do exist. Of course, we need to authenticate the user\
    \ ID and password before calling the program.\n\n*Unauthorized header messages\
    \ can be created if the user has not entered a user ID/password or a valid user\
    \ ID/password. This will automatically cause the system to request the user enter\
    \ a user ID/password. This technique is pretty straightforward. However, there\
    \ have been some reports, in the past, of browsers not functioning properly with\
    \ this technique. Besides, creating your own technique allows you to design the\
    \ login screen with the same style as the rest of your web site.*\n\n```\nheader('WWW-Authenticate:\
    \ Basic realm=\"ABC Canine\"');\nheader('HTTP/1.0 401 Unauthorized');\n```\n\n\
    *For more information on other ways to validate user IDs and passwords, visit*\
    \ [www.php.net/manual/en/features.http-auth.php](http://www.php.net/manual/en/features.http-auth.php)*.*\n\
    \n```\n$valid_useridpasswords = array(\"sjohnson\" => \" working\");\n$valid_userids\
    \ = array_keys($valid_useridpasswords);\n$userid = $_SESSION['username'];\n$password\
    \ = $_SESSION['password'];\n$valid = (in_array($userid, $valid_userids)) && ($password\
    \ == $valid_useridpasswords[$userid]);\nIf($valid) { header(\"Location: http://www.asite.com/lab.php\"\
    );}\n```\n\nThere are several ways you can authenticate user IDs and passwords.\
    \ If you are creating a system that does not require user IDs and passwords to\
    \ change, you could use arrays. In the previous example, the `$valid_useridpasswords`\
    \ associate array contains the combination of valid user IDs and passwords. The\
    \ PHP method `array_keys` places all keys (in this example the user IDs) into\
    \ a separate array (`$valid_userids`). After the session variables have been placed\
    \ in `$userid` and `$password`, the PHP `in_array` method is used to determine\
    \ if the correct combination of user ID and password exists. `in_array` determines\
    \ if the user ID exists in the array. Then the user ID is used as the subscript\
    \ to pull the password from the `valid_useridpasswords` array and compare it to\
    \ the value in `$password`. If the user ID exists and the passwords are the same,\
    \ then everything is valid. `$valid` will contain `TRUE`. If either (or both)\
    \ are not valid, `$valid` will contain `FALSE`. If `$valid` is `TRUE`, the application\
    \ redirects to the `lab.php` program.\n\nTechnically properties in a session are\
    \ secured from any access outside the session. However, there have been reported\
    \ instances, in the past, of hacker programs breaking this security and accessing\
    \ session information. If the user ID and password, in this example, are stored\
    \ in session variables and passed across the Internet to another program, hackers\
    \ might gain access to the information.\n\nIf the user ID and password are externally\
    \ stored in a file or database, the information will also travel outside the program.\
    \ The program will no longer have control over the security of these items once\
    \ they reside in the file or database. This could allow hackers access to the\
    \ information. Security, as mentioned, has to be a team effort among the programmer,\
    \ data administrator, and network administrator.\n\nIt is common practice to hash\
    \ the password to reduce the chance that hackers will discover the authentication\
    \ information (or any other secure information). Since PHP 5.5, the method `password_hash`\
    \ can be used to secure passwords.\n\n*Programming note—Caution should be used\
    \ when storing the hashed version of the password. The size of the resulting hash\
    \ will increase with new hash versions. A size of 255 characters is likely to\
    \ be large enough for the many years. The number of milliseconds needed for this\
    \ hash increases with the size and type of the encryption. Advanced programmers\
    \ may want to do some testing on their servers for time costs.*\n\n*For more information\
    \ on hashing visit* [www.php.net/manual/en/function.password-hash.php](http://www.php.net/manual/en/function.password-hash.php)*.*\n\
    \n*Programming note—You cannot do a simple comparison with the hashed password\
    \ created by PHP's `password_hash` method. The hash produced includes the encryption\
    \ type and the hashed password. Since PHP 7.0.0, this method uses a default salt\
    \ setting and does not allow other salt options.*\n\nYou only need to replace\
    \ one line of code in the example to verify the password. You can replace\n\n\
    ```\n$valid = ((in_array($userid, $valid_userids)) && ($password == $valid_useridpasswords[$userid]));\n\
    ```\n\nwith\n\n```\n$valid =( (in_array($userid, $valid_userids)) && (password_verify($password,\n\
    $valid_useridpasswords[$userid]));\n```\n\nIf you placed the hashed password in\
    \ the `$valid_useridpasswords` array, the validation technique would not require\
    \ any other changes. The PHP `password_verify` method will hash the password provided\
    \ by the user and compare it to the existing password. If they match, it will\
    \ return `TRUE`."
