    **Summary**


    In this chapter we implemented a user registration system, which allows users
    to create a new account by filling out a web form. This form requires users to
    enter a CAPTCHA phrase to prove that they are people (and not computer programs).
    Once the user’s registration is complete, their details are saved to the database
    using DatabaseObject_User and Profile_User, and the users are then sent an e-mail
    containing their account details.


    We then added code to the application to allow users to log in to their accounts.
    We saved their identity to the current session using Zend_Auth so it would be
    accessible on all pages they visit.


    Additionally, we added logging capabilities to the login system, so both successful
    and unsuccessful login attempts would be recorded.


    Finally, we created a basic account home page, to which users will be redirected
    after logging in. We also added code to let them update their account details.


