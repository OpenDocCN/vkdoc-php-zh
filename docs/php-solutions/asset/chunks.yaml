    is used as the method’s return value, and is initialized to `true`. Three conditional
    statements conduct a series of tests, which are carried out by protected methods
    that will be defined shortly. If the file fails any of the tests, `$accept` is
    set to `false`. The method returns `true` only if all three tests are passed.


    Using `$accept` as the return value makes it possible to generate error messages
    detailing all problems with a file. This avoids the annoying situation in which
    an upload is rejected for one reason only for it to be rejected for a different
    reason once the first problem is resolved.


    The argument passed to the `checkFile()` method is the top-level element in the
    `$_FILES` array. The upload field in the form we’re using is called `image`, so
    `$file` is the equivalent of `$_FILES [''image'']`. That means you can access
    `$_FILES [''image''] [''error'']` as `$file [''error'']`.


    Note


    As explained in PHP Solution 6-2, the name of the upload field is unimportant,
    because the `upload()` method automatically gets the current element from the
    `$_FILES` array.


    The first conditional statement checks the error level. If it’s not zero, there’s
    a problem with the upload; `$file` is passed as an argument to the `getErrorMessage()`
    method, which you’ll define next.


    If the error level is 4, no file was selected. There’s no point in checking any
    further, so the method immediately returns `false`. Otherwise, `$accept` is set
    to `false`, and the next two conditional statements carry out checks on the file’s
    size and MIME type.


    The `getErrorMessage()` method is a `switch` statement (see “Using the switch
    statement for decision chains” in [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html))
    that uses the error levels listed in Table 6-2 to add a suitable message to the
    `$messages` array. The code looks like this:


    `protected function getErrorMessage($file) {`


    `switch($file[''error'']) {`


    `case 1:`


    `case 2:`


    `$this->messages[] = $file[''name''] . '' is too big: (max: '' .`


    `$this->getMaxSize() . '').'';`


    `break;`


    `case 3:`


    `$this->messages[] = $file[''name''] . '' was only partially`


    `uploaded.'';`


    `break;`


    `case 4:`


    `$this->messages[] = ''No file submitted.'';`


    `break;`


    `default:`


    `$this->messages[] = ''Sorry, there was a problem uploading '' .`


    `$file[''name''];`


    `break;`


    `}`


    `}`


    Part of the message for error levels 1 and 2 is created by a method called `getMaxSize()`,
    which converts the value of `$max` from bytes to kilobytes. You’ll define `getMaxSize()`
    shortly.


    Only the first four error levels have descriptive messages. The `default` keyword
    catches other error levels, including any that might be added in future, and adds
    a generic reason.


    Before defining `getMaxSize()`, let’s deal with the other tests. The `checkSize()`
    method looks like this:


    `protected function checkSize($file) {`


    `if ($file[''error''] == 1 || $file[''error''] == 2 ) {`


    `return false;`


    `} elseif ($file[''size''] == 0) {`


    `$this->messages[] = $file[''name''] . '' is an empty file.'';`


    `return false;`


    `} elseif ($file[''size''] > $this->max) {`


    `$this->messages[] = $file[''name''] . '' exceeds the maximum size`


    `for a file ('' . $this->getMaxSize() . '').'';`


    `return false;`


    `} else {`


    `return true;`


    `}`


    `}`


    The conditional statement starts by checking the error level. If it’s 1 or 2,
    the file is too big, so the method simply returns `false`. The appropriate error
    message has already been set by the `getErrorMessage()` method.


    The next condition checks if the reported size is zero. Although this happens
    if the file is too big or no file was selected, those scenarios have already been
    covered by the `getErrorMessage()` method. So, the assumption is that the file
    is empty.


    Next, the reported size is compared with the value stored in the `$max` property.
    Although files that are too big should trigger error level 2, you still need to
    make this comparison in case the user has managed to sidestep `MAX_FILE_SIZE`.
    The error message also uses `getMaxSize()` to display the maximum size.


