  trans: '

    ### 创建博客数据库表


    如果你只想直接开始学习内容管理页面，可以从 `ch13` 文件夹中导入 `blog.sql` 文件中的表结构和数据。打开 phpMyAdmin，选择 `phpsols`
    数据库，按照第 10 章的相同方式导入该表。该 SQL 文件会创建表并填充四篇简短文章。


    如果你想从头开始自行创建所有内容，请打开 phpMyAdmin，选择 `phpsols` 数据库，然后点击`结构`选项卡（如果未选中）。在`创建表`部分，在`名称`字段中输入
    `blog`，在`列数`字段中输入 `5`。然后点击`执行`。使用以下截图和表 13-1 中显示的设置。


    ![A978-1-4842-0635-5_13_Figa_HTML.jpg](img/A978-1-4842-0635-5_13_Figa_HTML.jpg)


    **表 13-1.** `blog` 表的列定义


    | 字段 | 类型 | 长度/值 | 默认值 | 属性 | 空值 | 索引 | A_I |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | `article_id` | `INT` | | | `UNSIGNED` | 未选中 | `PRIMARY` | 选中 |

    | `title` | `VARCHAR` | `255` | | | 未选中 | | |

    | `article` | `TEXT` | | | | 未选中 | | |

    | `created` | `TIMESTAMP` | | `CURRENT_TIMESTAMP` | | 未选中 | | |

    | `updated` | `TIMESTAMP` | | `CURRENT_TIMESTAMP` | `on update CURRENT_TIMESTAMP`
    | 未选中 | | |


    `created` 和 `updated` 列的默认值设置为 `CURRENT_TIMESTAMP`。因此，首次录入记录时，两列会获得相同的值。`updated`
    列的`属性`设置为 `on update CURRENT_TIMESTAMP`。这意味着每当对记录进行更改时，该列都会被更新。为了追踪记录的原始创建时间，`created`
    列的值永远不会被更新。


    ### 创建基本的插入和更新表单


    SQL 通过提供不同的命令来区分插入和更新记录的操作。`INSERT` 仅用于创建全新的记录。一旦记录被插入，任何更改都必须使用 `UPDATE` 来完成。由于这涉及相同的字段，因此可以使用同一页面进行两种操作。但这会使
    PHP 代码更复杂，因此我更喜欢先创建插入页面的 HTML，将其另存为更新页面，然后分别编写代码。


    插入页面的表单只需要两个输入字段：标题和文章内容。其余三列（主键和两个时间戳）的内容会自动处理。插入表单的代码如下所示：


    ```

    <form method="post" action="">

    <p>

    <label for="title">标题：</label>

    <input name="title" type="text" id="title">

    </p>

    <p>

    <label for="article">文章：</label>

    <textarea name="article" id="article"></textarea>

    </p>

    <p>

    <input type="submit" name="insert" value="插入新条目" id="insert">

    </p>

    </form>

    ```


    该表单使用 `post` 方法。你可以在 `ch13` 文件夹中的 `blog_insert_01.php` 找到完整代码。这些内容管理表单使用了 `styles`
    文件夹中的 `admin.css` 进行了一些基本样式设置。在浏览器中查看时，表单如下所示：


    ![A978-1-4842-0635-5_13_Figb_HTML.jpg](img/A978-1-4842-0635-5_13_Figb_HTML.jpg)


    更新表单除了标题和提交按钮外完全相同。按钮代码如下所示（完整代码在 `blog_update_mysqli_01.php` 和 `blog_update_pdo_01.php`
    中）：


    ```

    <input type="submit" name="update" value="更新条目" id="update">

    ```


    我给了标题和文章输入字段与 `blog` 表中列相同的名称。这有助于在后续编写 PHP 和 SQL 代码时更容易地跟踪变量。


    **提示**


    作为一项安全措施，一些开发者建议使用与数据库列不同的名称，因为任何人都可以通过查看表单的源代码看到输入字段的名称。使用不同的名称会使入侵数据库更加困难。在网站的密码保护区域，这不必担心。但是，对于公开可访问的表单（例如用户注册或登录表单），你可能需要考虑这一做法。


    ### 插入新记录


    将新记录插入表的基本 SQL 如下所示：


    ```

    INSERT [INTO] table_name (column_names)

    VALUES (values)

    ```


    `INTO` 放在方括号中，表示它是可选的。它纯粹是为了让 SQL 读起来更接近人类语言。列名可以按任意顺序排列，但第二组括号中的值必须与其引用的列顺序一致。


    虽然 MySQLi 和 PDO 的代码非常相似，但为了避免混淆，我将分别处理它们。


    **注意**


    本章中的许多脚本使用了一种称为“设置标志”的技术。`flag` 是一个布尔变量，初始化为 `true` 或 `false`，用于检查是否发生了某事。例如，如果
    `$OK` 最初设置为 `false`，并且仅在数据库查询成功执行时才重置为 `true`，则它可以作为控制另一个代码块的条件使用。

    '
- fmt: "### PHP Solution 13-1: Inserting a New Record with MySQLi\n\nThis PHP solution\
    \ shows how to insert a new record into the `blog` table using a MySQLi prepared\
    \ statement. Using a prepared statement avoids problems with escaping quotes and\
    \ control characters. It also protects your database against SQL injection (see\
    \ [Chapter 11](#A978-1-4842-0635-5_11_Chapter.html)).\n\nCreate a folder called\
    \ `admin` in the `phpsols` site root. Copy `blog_insert_01.php` from the `ch13`\
    \ folder, and save it as `blog_insert_mysqli.php` in the new folder. The code\
    \ that inserts a new record should be run only if the form has been submitted,\
    \ so it's enclosed in a conditional statement that checks for the `name` attribute\
    \ of the submit button (`insert`) in the `$_POST` array. Put the following above\
    \ the `DOCTYPE` declaration:\n\n```php\n<?php\n\nif (isset($_POST['insert']))\
    \ {\n\nrequire_once '../includes/connection.php';\n\n// initialize flag\n$OK =\
    \ false;\n\n// create database connection\n// initialize prepared statement\n\
    // create SQL\n// bind parameters and execute statement\n// redirect if successful\
    \ or display error\n\n}\n\n?>\n```\n\nAfter including the connection function,\
    \ the code sets `$OK` to `false`. This is reset to `true` only if there are no\
    \ errors. The five comments at the end map out the remaining steps that we'll\
    \ fill in below.\n\nCreate a connection to the database as the user with read\
    \ and write privileges, initialize a prepared statement, and create the SQL with\
    \ placeholders for data that will be derived from the user input like this:\n\n\
    ```php\n// create database connection\n$conn = dbConnect('write');\n\n// initialize\
    \ prepared statement\n$stmt = $conn->stmt_init();\n\n// create SQL\n$sql = 'INSERT\
    \ INTO blog (title, article)\nVALUES(?, ?)';\n```\n\nThe values that will be derived\
    \ from `$_POST['title']` and `$_POST['article']` are represented by question mark\
    \ placeholders. The other columns will be populated automatically. The `article_id`\
    \ column is the primary key, which uses `AUTO_INCREMENT`, and the default for\
    \ the `created` and `updated` columns is `CURRENT_TIMESTAMP`.\n\n> **Note:** The\
    \ code is in a slightly different order from [Chapter 11](#A978-1-4842-0635-5_11_Chapter.html).\
    \ The script will be developed further in [Chapter 15](#A978-1-4842-0635-5_15_Chapter.html)\
    \ to run a series of SQL queries, so the prepared statement is initialized first.\n\
    \nThe next stage is to replace the question marks with the values held in the\
    \ variables—a process called binding the parameters. Insert the following code:\n\
    \n```php\nif ($stmt->prepare($sql)) {\n\n// bind parameters and execute statement\n\
    $stmt->bind_param('ss', $_POST['title'], $_POST['article']);\n$stmt->execute();\n\
    \nif ($stmt->affected_rows > 0) {\n    $OK = true;\n}\n\n}\n```\n\nThis is the\
    \ section that protects your database from SQL injection. Pass the variables to\
    \ the `bind_param()` method in the same order as you want them inserted into the\
    \ SQL query, together with a first argument that specifies the data type of each\
    \ variable, once again in the same order as the variables. Both are strings, so\
    \ this argument is `'ss'`.\n\nOnce the values have been bound to the placeholders,\
    \ call the `execute()` method.\n\nThe `affected_rows` property records how many\
    \ rows were affected by an `INSERT`, `UPDATE`, or `DELETE` query.\n\n> **Caution:**\
    \ If the query triggers a MySQL error, `affected_rows` returns –1. Unlike some\
    \ computing languages, PHP treats –1 as `true`. So, you need to check that `affected_rows`\
    \ is greater than zero to be sure that the query succeeded. If it is greater than\
    \ zero, `$OK` is reset to `true`.\n\nFinally, redirect the page to a list of existing\
    \ records or display any error message. Add this code after the previous step:\n\
    \n```php\n// redirect if successful or display error\nif ($OK) {\nheader('Location:\n\
    http://localhost/phpsols/admin/blog_list_mysqli.php ');\nexit;\n} else {\n$error\
    \ = $stmt->error;\n}\n\n}\n\n?>\n```\n\nAdd the following code block in the body\
    \ of the page to display the error message if the insert operation fails:\n\n\
    ```php\n<h1>Insert New Blog Entry</h1>\n\n<?php if (isset($error)) {\necho \"\
    <p>Error: $error</p>\";\n} ?>\n\n<form method=\"post\" action=\"\">\n```\n\nThe\
    \ completed code is in `blog_insert_mysqli.php` in the `ch13` folder.\n\nThat\
    \ completes the insert page, but before testing it, create `blog_list_mysqli.php`,\
    \ which is described in the PHP Solution 13-3.\n\n> **Note:** To focus on the\
    \ code that interacts with the database, the scripts in this chapter don't validate\
    \ the user input. In a real-world application, you should use the techniques described\
    \ in [Chapter 5](#A978-1-4842-0635-5_5_Chapter.html) to check the data submitted\
    \ from the form and redisplay it if errors are detected."
