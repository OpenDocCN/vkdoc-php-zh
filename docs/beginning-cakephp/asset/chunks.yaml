- fmt: "# 排版后的文本\n\n## `$html->nestedList()`\n\n`$html->nestedList()` 将一个数组显示为嵌套列表，这在调试时非常有用。\n\
    \n### 参数说明\n\n**`nestedList( list[array], attributes[array], itemAttributes[array],\
    \ tag[string] )`**\n\n- `list`: 要列表化的元素\n- `attributes`: 传递给列表标签的 HTML 属性\n- `itemAttributes\
    \ = null`: 传递给单个项（`<li>`）标签的 HTML 属性\n- `tag = 'ul'`: 要使用的列表标签类型，有序或无序列表（通过输入`ol`或`ul`对应`<ol>`或`<ul>`标签）\n\
    \n### 行为描述\n\n对于传入`list`参数中的每个数组和嵌套数组，都会调用一个新的列表标签（例如，对于无序列表，会返回一个新的`<ul>`标签，其内容为用`<li>`标签解析的嵌套数组）。数组可以包含任意多的层级。\n\
    \n例如，假设`$posts`变量包含以下数组内容：\n\n```php\n$posts = array(\n    'Post 1'=>array(\n\
    \        'Jan 1, 2008',\n        'No Author'),\n    'Post 2'=>array(\n       \
    \ 'Jan 2, 2008',\n        'Administrator')\n);\n```\n\n### 示例输出\n\n将上述数组放入`$html->nestedList()`函数的`list`参数中，将返回以下\
    \ HTML：\n\n```html\n<ul>\n<li>Post 1\n    <ul>\n    <li>Jan 1, 2008</li>\n   \
    \ <li>No Author</li>\n    </ul>\n</li>\n<li>Post 2\n    <ul>\n    <li>Jan 2, 2008</li>\n\
    \    <li>Administrator</li>\n    </ul>\n</li>\n</ul>\n```\n\n### 适用场景\n\n该函数与通过`find('list')`或`generateList()`模型函数从数据库拉取的列表配合使用效果良好。\n\
    \n---\n\n## `$html->para()`\n\n简单来说，这是一个用于在文本块外包裹段落标签（`<p>`）的便捷函数。它有助于简化可能包含非字母数字字符的内容的\
    \ HTML 转义。\n\n### 参数说明\n\n**`para( class[string], text[string], attributes[array],\
    \ escape[bool] )`**\n\n- `class`: `<p>`标签的 CSS 类名\n- `text`: 出现在`<p>`元素内部的内容\n\
    - `attributes`: 要传递并在标签中显示的 HTML 属性\n- `escape = false`: 设置为`true`时，内容将被 HTML\
    \ 转义\n\n### 示例\n\n以下测试字符串：\n\n```php\n<?=$html->para(null,'This is a test for\
    \ the $html->para() function',null,true);?>\n```\n\n通过`$html->para()`函数运行后将返回：\n\
    \n```html\n<p>This is a test for the $html-&gt;para() function</p>\n```\n\n---\n\
    \n## `$html->style()`\n\n`$html->style()`函数是一个便捷封装器，用于将样式插入到 HTML 元素中。例如，某个特定元素可能需要使用`style`属性为其分配一些内联样式。此函数允许您在\
    \ PHP 中指定这些样式，而不是在 CSS 中。\n\n### 参数说明\n\n**`style( data[array], inline[bool] )`**\n\
    \n- `data`: 以数组形式组织的 CSS 设置\n- `inline = true`: 如果设置为`false`，每个 CSS 元素将由硬回车分隔；如果为`true`，CSS\
    \ 将作为一个字符串返回。\n\n### 应用示例\n\nCake 应用可能使用数据库来管理 CSS 样式。CSS 表的模型可以获取样式并将其作为数组提供给视图使用。为了简化对这个数组的解析，`$html->style()`函数可以节省一些时间。假设我有一些\
    \ CSS 存储为如下数组：\n\n```php\n$styles = array(\n    'p_bold'=>array(\n        'font-size'=>'1.0\
    \ em',\n        'font-weight'=>'bold'\n    ),\n    'p_italic'=>array(\n      \
    \  'font-style'=>'italic'\n    )\n);\n```"
  raw: 'url = null: If an array, this will cause the link to point to controllers
    and actions; as a path relative to Cake, it will be parsed as an internal link;
    as an absolute URL, it will be passed as is.


    attributes: Parameter for passing along HTML attributes and their values.


    inline = true: If set to false, the tag will appear within the <head> tags of
    the layout.


    If the type parameter is set to either rss, atom, or icon, then the corresponding
    MIME type will be returned. For instance, the following:


    <?=$html->meta(''icon'');?>


    returns these strings:


    <link href="/blog/favicon.ico" type="image/x-icon" rel="icon"/>


    <link href="/blog/favicon.ico" type="image/x-icon" rel="shortcut icon"/>


    09775ch09final 7/1/08 9:49 PM Page 145


    C H A P T E R 9 ■ H E L P E R S


    **145**


    nestedList


    $html->nestedList() displays an array as a nested list. This can be very helpful
    when debugging.


    **nestedList( list[array], attributes[array], itemAttributes[array], tag[string]
    )** list: The elements to list


    attributes: The HTML attributes to be passed to the list tag


    itemAttributes = null: The HTML attributes to be passed to the individual item
    (<li>) tags


    tag = ''ul'': The type of list tag to be used, either ordered or unordered lists
    (<ol> or <ul> tags by entering ol or ul)


    For each array and nested array passed in the list parameter, a new list tag will
    be called (that is, for unordered lists, a new <ul> tag will be returned with
    the contents of the nested array parsed with <li> tags). The array can contain
    as many levels as desired. For instance, say the $posts variable has the following
    array contents:


    $posts = array(


    ''Post 1''=>array(


    ''Jan 1, 2008'',


    ''No Author''),


    ''Post 2''=>array(


    ''Jan 2, 2008'',


    ''Administrator'')


    );


    By placing this array in the list parameter of the $html->nestedList() function,
    the following HTML would be returned:


    <ul>


    <li>Post 1


    <ul>


    <li>Jan 1, 2008</li>


    <li>No Author</li>


    </ul>


    </li>


    <li>Post 2


    <ul>


    <li>Jan 2, 2008</li>


    <li>Administrator</li>


    </ul>


    </li>


    </ul>


    This function works well with lists pulled from the database using the find(''list'')
    or generateList() model function.


    09775ch09final 7/1/08 9:49 PM Page 146


    **146**


    C H A P T E R 9 ■ H E L P E R S


    para


    Simply put, this is a convenience function for wrapping the paragraph tag around
    a chunk of text. It can be useful in simplifying HTML escaping for content that
    may contain nonalphanumeric characters.


    **para( class[string], text[string], attributes[array], escape[bool] )** class:
    The CSS class name of the <p> tag


    text: The content to appear inside the <p> element


    attributes: HTML attributes to be passed and displayed in the tag


    escape = false: When set to true, the content will be HTML-escaped


    The following test string:


    <?=$html->para(null,''This is a test for the $html->para() function'',null,true);?>
    will return the following when run through the $html->para() function:


    <p>This is a test for the $html-&gt;para() function</p> style


    The $html->style() function is a convenience wrapper for inserting styles into
    HTML elements. For instance, a particular element may need to have some inline
    styles assigned to it with the style attribute. This function allows you to specify
    those styles in PHP instead of CSS.


    **style( data[array], inline[bool] )**


    data: CSS settings arranged as an array


    inline = true: If set to false, each CSS element will be separated by a hard return;
    if true, the CSS will be returned as a single string.


    A Cake application may use the database to manage CSS styles. A model for a CSS
    table could fetch the styles and provide them as an array to be used in the view.
    To simplify parsing through this array, the $html->style() function could save
    some time. Say I’ve got some CSS


    stored like the following array:


    $styles = array(


    ''p_bold''=>array(


    ''font-size''=>''1.0 em'',


    ''font-weight''=>''bold''


    )


    ''p_italic''=>array(


    ''font-style''=>''italic''


    )


    );


