    ## Superglobals


    As seen in this chapter, there are a number of built-in associative arrays that
    make external data available to PHP scripts. These arrays are known as superglobals,
    because they are automatically available in every scope. There are nine superglobals
    in PHP, each of which is described briefly in Table 23-2.


    **Table 23-2.** Superglobals


    | Name | Description |

    | --- | --- |

    | `$GLOBALS` | Contains all global variables, including other superglobals. |

    | `$_GET` | Contains variables sent via an HTTP GET request. |

    | `$_POST` | Contains variables sent via an HTTP POST request. |

    | `$_FILES` | Contains variables sent via an HTTP POST file upload. |

    | `$_COOKIE` | Contains variables sent via HTTP cookies. |

    | `$_SESSION` | Contains variables stored in a user’s session. |

    | `$_REQUEST` | Contains `$_GET`, `$_POST`, and possibly `$_COOKIE` variables.
    |

    | `$_SERVER` | Contains information about the web server and the request made
    to it. |

    | `$_ENV` | Contains all environment variables set by the web server. |


    The content of the variables `$_GET`, `$_POST`, `$_COOKIE`, `$_SERVER`, and `$_ENV`
    is included in the output generated by the `phpinfo` function. This function also
    displays the general settings of the PHP configuration file, `php.ini`, along
    with other information regarding PHP.


    ```php

    phpinfo(); // display PHP information

    ```


