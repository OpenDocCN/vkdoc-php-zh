    **Chapter 20**


    **Administration**


    The word *administration* strikes fear in the hearts of many developers. The problem
    is that most large (or user content–driven) applications require some form of
    content review. Fortunately, this is a topic that has been explored at great length.
    There are entire applications developed to help with the review of content, from
    all of the prebuild CMS (Content Management System) systems, such as WordPress
    and PHP-Nuke, to frameworks that automatically generate these CMS areas, such
    as Django.


    Goals


    • We need to understand the fundamental components in any administration interface.


    • We need to build the different models, views, and controllers to manage the
    submission of content by users.


    What Is a CMS?


    A CMS is a secondary, secure web site through which the contents of the primary
    web site can be reviewed and/or changed. It is not intended for a user base of
    equivalent size to that of the primary web site, and usually requires training
    of some description in order for administrative users to use efficiently.


    A CMS usually provides an interface through which to add other administrative
    users, and sometimes it can even provide some statistics about how the primary
    web site is used. The CMS we will build in this chapter will only concern itself
    with the basics of content review and user creation, leaving the addition of statistics
    as an exercise.


    Administrators


    Only administrators should have access to a CMS. Administrators are defined as
    users with above-average permissions, allowing them access and control over the
    secondary, secured web site. Structurally, they do not have to be quite distinct
    from normal users, and (in our case) will be separated by a simple flag field
    in the User model. Let’s look at how this will be defined in Listing 20-1.


