  \ 请求。它使用 `Set::extract()` 函数为辅助函数清理数组。我选择用此来演示一种清理数组的方法。回顾一下，Cake 会自动将模型结果格式化成遵循特定结构的数组。为了简化\
  \ `$calendar->events()` 函数中的代码，你可以使用 `Set::extract` 从 `find()` 函数的结果中移除 `CalendarEvent`\
  \ 键。例如，如果 `find` 返回了两个事件，默认情况下结果数组的格式化方式如下：\n\n```\n$events = Array(\n    [0] =>\
