    ## The Right Logic for the Right Tier


    Because each layer contains its own logic, sometimes it can be tricky to decide
    where exactly to draw the line between the tiers. In the previous scenario, instead
    of reading the product’s quantity in the business tier and deciding whether the
    product is available based on that number (resulting in two data tier, and implicitly,
    database, calls), you could have a single data tier method named `add_product_if_available`
    that adds the product to the shopping cart only if it’s available in stock.'
  raw: 'being called (except events that can be handled locally by the presentation
    tier, such as simple input data validation, and so on). For example, if the visitor
    is doing a product search, the presentation tier calls the business tier and says,
    “Please send me back the products that match this search criterion.” Almost always,
    the business tier needs to call the data tier for information to be able to respond
    to the presentation tier’s request.


    The **data tier** (sometimes referred to as the *database tier*) is responsible
    for managing the application’s data and sending it to the business tier when requested.
    For the HatShop e-commerce site, you’ll need to store data about products (including
    their categories and their departments), users, shopping carts, and so on. Almost
    every client request finally results in the data tier being interrogated for information
    (except when previously retrieved data has been cached at the business tier or
    presentation tier levels), so it’s important to have a fast database system. In
    Chapters 3 and 4, you’ll learn how to design the database for optimum performance.


    These tiers are purely logical—there is no constraint on the physical location
    of each tier.


    In theory, you are free to place all of the application, and implicitly all of
    its tiers, on a single server machine, or you can place each tier on a separate
    machine if the application permits this. Chapter 17 explains how to integrate
    functionality from other web sites using XML Web Services. XML Web Services permit
    easy integration of functionality across multiple servers.


    An important constraint in the three-layered architecture model is that information
    must flow in sequential order between tiers. The presentation tier is only allowed
    to access the business tier, and it can never directly access the data tier. The
    business tier is the “brain” in the middle that communicates with the other tiers
    and processes and coordinates all the information flow. If the presentation tier
    directly accessed the data tier, the rules of three-tier architecture programming
    would be broken. When you implement a three-tier architecture, you must be consistent
    and obey its rules to reap the benefits.


