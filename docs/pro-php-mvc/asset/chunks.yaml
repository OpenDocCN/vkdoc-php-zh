    As Listing 25-1 shows, you may use the unit-testing library supplied by CodeIgniter
    to compare only two values (one of them presumably the result of the call to an
    action or function). This is a little limiting in terms of testing how actions
    perform when supplied posted form data.


    Another limitation that we need to be aware of is that the unit testing that CodeIgniter
    allows has to occur within the MVC architecture. This couples the tests closely
    with the framework they should be testing, which is never a good thing.


    The Alternative


    You are far better off using a third-party library to test the functionality of
    your CodeIgniter applications.


    A unit-testing library, such as PHPUnit, includes a multitude of different assertion
    functions to test not only the equality of two values but also the size of arrays,
    the type of exceptions thrown, whether files exist in a directory, and more.


