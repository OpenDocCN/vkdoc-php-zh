  trans: "\n# 确保用户控制器正常工作\n\n在`Users`控制器成功集成`Auth`组件并提供了`Login`操作和视图后，`Auth`现在可以为`Posts`控制器管理认证了。尝试编辑一篇文章，你会注意到`Auth`组件要求你先登录。\n\
    \n# 退出登录\n\n让用户退出登录比登录更加简单。只需在`Users`控制器中添加`Auth->logout()`函数即可，如清单 11-6 所示。\n\
    \n**清单 11-6.** *用户控制器中的退出操作*\n\n```\nfunction logout() {\n    $this->redirect($this->Auth->logout());\n\
    }\n```\n\n现在，每当用户请求`http://localhost/blog/users/logout`时，`Auth`组件就会将其退出登录，并删除会话。用户需要重新登录才能访问被限制的操作。\n\
    \n# 检查用户角色\n\n`Auth`组件可以检查用户的角色，以判断其是否为管理员。为此，你需要在`users`表中再添加一个字段：`role`。请参见清单\
    \ 11-7。\n\n**清单 11-7.** *在`users`表中添加`role`字段的 SQL 查询语句*\n\n```\nALTER TABLE users\
    \ ADD `role` varchar(50) DEFAULT 'user'\n```\n\n由于`Auth`组件默认不检查用户角色，你需要运行自己的登录流程。首先，在`Posts`控制器中，你必须告诉`Auth`组件不要执行其默认逻辑：\n\
    \n```\n$this->Auth->authorize = 'controller';\n```\n\n这行代码本质上告诉`Auth`在当前控制器中查找名为`isAuthorized()`的操作。在这个函数中，你将运行自己的授权逻辑；如果它返回`true`，则用户被授权，以此类推。现在让我们创建`isAuthorized()`函数来检查用户角色。请参见清单\
    \ 11-8。\n\n**清单 11-8.** *`Posts`控制器中的`isAuthorized()`函数*\n\n```\nfunction isAuthorized()\
    \ {\n    if ($this->Auth->user('role') == 'admin') {\n        return true;\n \
    \   } else {\n        return false;\n    }\n}\n```\n\n第 2 行执行检查。通过使用`Auth->user()`函数并传入值`role`，你告诉`Auth`查找名为`role`的字段，并检查它是否包含`admin`。如果用户在`users`表中没有被赋予`admin`角色，那么他将无权访问除`Index`和`View`操作之外的任何内容。\n\
    \n同样的检查也可以在模型中而不是控制器中完成。不要将`Auth->authorize`设置为`controller`，而是将其设置为`model`。然后在模型中而不是控制器中运行`isAuthorized()`函数。该函数需要包含`$user`、`$controller`和`$action`参数才能在模型中工作（参见清单\
    \ 11-9）。\n\n**清单 11-9.** *`Post`模型中的`isAuthorized()`函数*\n\n```\nfunction isAuthorized($user,\
    \ $controller, $action) {\n    if ($user['User']['role'] == 'admin') {\n     \
    \   return true;\n    } else {\n        return false;\n    }\n}\n```\n\n`$user`数组将包含`Auth`组件检索到的用户名和密码匹配的用户记录，因此第\
    \ 2 行使用此数组而不是`Auth->user()`函数。检查用户角色的两种方法都有效；遵循模型大于控制器的约定意味着大多数情况下你会在模型中检查用户角色。\n\
    \n# 使用其他 Auth 参数和函数\n\n以下是可以与`Auth`组件一起使用的其他参数列表。它们用于定制`Auth`管理用户登录、会话和认证的方式。\n\
    \n- **`deny( actions )`**  \n  `actions`：用逗号分隔的操作列表，访问这些操作需要认证，否则将被拒绝\n\n- **`hashPasswords(\
    \ data[array] )`**  \n  `data`：接收数组中名为`password`的键所赋的值，并返回其哈希后的等价形式\n\n- **`$userModel\
    \ = 'User';`**  \n  用于自定义存储用户的表名。默认设置为`User`。  \n  请确保使用模型名称，而不是表名（例如，`bloggers`表在此应设置为`Blogger`）。\n\
    \n- **`$fields = array('username'=>'username','password'=>'password');`**  \n\
    \  此数组可以更改，以反映用户名字段和密码字段的自定义名称。\n\n- **`$loginAction = array('admin'=>false,'controller'=>'users','action'=>'login');`**\
    \  \n  将此数组中的键设置为其他控制器或操作，可以告诉`Auth`在哪里运行`Login`操作。可以通过将`admin`设置为`true`来使用管理员路由（参见第\
    \ 10 章）及其后续操作。\n\n- **`$loginRedirect = array('controller'=>'users','action'=>'index');`**\
    \  \n  此参数告诉`Auth`在成功登录后将用户重定向到哪里。\n\n- **`$loginError = 'Login failed. Invalid\
    \ username or password.';`**  \n  登录出错时显示的错误消息可以在此处自定义。\n\n- **`$autoRedirect\
    \ = true;`**  \n  如果你将此参数设置为`false`，`Auth`组件在用户认证后将不会自动重定向。在成功认证后，可以在`Login`操作中运行其他检查，例如写入信息、检查\
    \ Cookie 内容或检查其他会话变量。\n\n- **`$ajaxLogin = null;`**  \n  在进行基于 Ajax 的登录时，将此首选项设置为登录失败时应显示的视图文件。\n\
    \n# 会话\n\n`Session`组件处理读取、写入、启动和销毁会话的各种方法。\n\n一些设置可以被操作，以更改 Cake 在核心配置中保存会话的方式。核心配置文件中的`Session.save`参数包含三种可选值：`php`、`cake`和`database`。默认情况下，此值设置为`php`，这意味着会话将根据主机当前的\
    \ PHP 设置进行保存。将其设置为`cake`将告诉 Cake 将会话信息写入`app/tmp`文件夹中的临时文件。第三种选项`database`要求数据库中有一个表，该表具有相应的字段，Cake\
    \ 可以在其中保存会话信息。生成此表所需的 SQL 语句可以在`app/config/sql/session.sql`文件中找到。只需在你的数据库中运行此文件，就会创建一个名为`cake_sessions`的默认表，其中包含存储会话数据所需的所有字段。`Session`组件将使用的其他会话设置遵循`Session.save`的首选项，并且相当直观。\n\
    \n# 读取和写入会话变量\n\n使用`Session`组件在会话中读取和写入变量非常简单。在控制器中，当然在实例化`Session`组件之后，你可以通过使用`create()`函数指定一个会话名称来创建一个新会话：\n\
    \n```\n$this->Session->create('User');\n```\n\n现在，在应用程序的任何地方，都可以通过使用`read()`函数读取此会话：\n\
    \n```\n$user = $this->Session->read('User');\n```\n\n此函数将生成一个遵循典型 Cake 数组结构的数组，允许你通过调用键来提取任何你想存储在会话中的内容：\n\
    \n```\n$password = $user['password'];\n```\n\n写入会话同样简单。使用`write()`函数，提供会话名称和值即可：\n\
    \n```\n$this->Session->write('User', $locale);\n```\n\n# 删除和销毁会话\n\n`delete()`和`destroy()`函数允许你停止存储会话信息或完全终止一个会话。使用`delete()`时，提供你想要移除的会话键的名称。这不会完全销毁整个会话，而只会删除与提供的键关联的数据。\n\
    \n另一方面，`destroy()`函数会移除当前用户的所有会话；它等同于 PHP 的`session_destroy()`函数。\n\n# Cookie\n"
- fmt: "# Cookie 组件\n\n编写 `Cookie` 时，`Cookie` 组件简化了这一过程。与 `Session` 组件非常相似，`Cookie`\
    \ 组件在用户的系统上创建新的 cookie，检查 cookie，并对其进行读写操作。为了确保 `Cookie` 组件正常工作，请在设置该组件时提供必要的参数。\n\
    \n## 设置 Cookie 组件\n\n运行此组件需要三个变量：`cookieName`、`cookieKey` 和 `cookieDomain`。它们分别告诉\
    \ `Cookie` 组件：\n\n-   cookie 的名称\n-   用于加密写入 cookie 信息的字符串\n-   有权访问该 cookie 的域名\n\
    \n其他 `Cookie` 组件首选项包括：\n\n-   `cookiePath`：服务器上存储 cookie 的路径；默认设置为整个域名\n-   `cookieSecure`：一个布尔值，默认为\
    \ `false`；告诉组件是否通过安全连接保存 cookie\n-   `cookieTime`：cookie 过期前的秒数；默认值为 `0`，这意味着关闭浏览器时\
    \ cookie 将过期\n\n这些设置在控制器中作为类属性被调用，如下所示：\n\n```\nvar $cookieName = 'super_duper_cookie';\n\
    var $cookieKey = '$%sdkj29KA9Ne@@uxlqW';\nvar $cookieDomain = 'www.domain_name.com';\n\
    var $cookieTime = 5400;\n```\n\n## 写入 Cookie\n\n使用 `write()` 函数将信息存储在 cookie 中非常简单，并且与\
    \ `Session->write()` 函数类似。函数中的第一个值是 cookie 的键，第二个值包含要写入的值。请记住，该值将使用 `cookieKey`\
    \ 首选项进行加密。\n\n```\n$this->Cookie->write('User',$user_agent);\n```\n\n## 读取 Cookie\n\
    \n就像 `Session` 组件一样，使用 `read()` 函数读取 cookie：`$user = $this->Cookie->read('User');`。只要\
    \ cookie 尚未过期，该信息就应该可用。\n\n## 删除 Cookie\n\n使用 `del()` 函数删除 cookie。提供要删除的 cookie\
    \ 的名称，组件将为您删除该 cookie：\n\n```\n$this->Cookie->del('User');\n```\n\n# 电子邮件组件\n\n\
    网站最常见的任务之一是向用户发送自动电子邮件。无论是电子商务网站还是用于传播信息的营销工具，自动电子邮件在网络上都有广泛的应用。但它们实现起来可能很繁琐，尤其是在使用\
    \ PHP 的 `mail()` 函数处理 HTTP 标头时。`Email` 组件提供了一种在您的 Cake 应用程序中使用布局和视图发送电子邮件的方法，而不是在脚本或控制器中编写长长的电子邮件文本字符串。\n\
    \n## 设置电子邮件布局\n\n`Email` 组件区分 HTML 和纯文本电子邮件。要为每种类型创建布局，您必须在 `app/views/layouts/email`\
    \ 目录中创建文件夹。HTML 布局存储在名为 `html` 的文件夹中，纯文本布局存储在 `text` 文件夹中。\n\n在每个文件夹中，创建一个 `default.ctp`\
    \ 文件，其中包含围绕 `$content_for_layout` 变量的必要布局标记。例如，HTML 布局可能包含以下内容：\n\n```\n<!DOCTYPE\
    \ XHTML PUBLIC \"-//W3C//DTD XHTML 1.0 strict//EN\">\n<html>\n<body>\n<?=$content_for_layout;\
    \ ?>\n</body>\n</html>\n```\n\n纯文本布局可能只需要 `$content_for_layout` 变量本身。\n\n## 发送电子邮件\n\
    \n在发送电子邮件的控制器操作中，为 `Email` 组件提供一些设置，然后运行 `send()` 函数来发送电子邮件。可用的设置包括：\n\n-   `$to`\n\
    -   `$cc`\n-   `$bcc`\n-   `$replyTo`\n-   `$from`\n-   `$sendAs`\n-   `$subject`\n\
    \n您会注意到，这些参数不言自明，对应于典型的电子邮件设置。`$sendAs` 设置告诉 `Email` 组件如何发送电子邮件，可以是 `html` 或 `text`。\n\
    \n假设您想在某个控制器的 `email()` 操作中发送一条基本消息。它可能如下所示：\n\n```\nfunction email() {\n    $this->Email->to\
    \ = 'foo@bar.com';\n    $this->Email->cc = 'another@email.com';\n    $this->Email->replyTo\
    \ = 'me@sender.com';\n    $this->Email->from = 'do-not-reply@domain.com';\n  \
    \  $this->Email->subject = 'Basic Email Greeting';\n    $this->Email->send('Glad\
    \ to see you');\n}\n```\n\n在 `send()` 函数中传递的文本是要发送的电子邮件的正文。\n\n## 使用电子邮件消息模板\n\
    \n创建电子邮件模板并通过它发送内容，而不是在控制器中提供内容，这很简单。制作存储在带键文件夹中的元素以创建电子邮件模板。\n\n例如，一个基本的纯文本模板将存储在\
    \ `app/views/elements/email/text/hello.ctp` 文件中，并且可能包含以下内容：\n\n```\nHello! This\
    \ message is from <?=$sender;?>.\n```\n\n然后，在 `email()` 函数中，如果需要，您可以设置 `$sender`\
    \ 变量：\n\n```\nfunction email() {\n    $this->Email->to = 'foo@bar.com';\n    $this->Email->cc\
    \ = 'another@email.com';\n    $this->Email->replyTo = 'me@sender.com';\n    $this->Email->from\
    \ = 'do-not-reply@domain.com';\n    $this->Email->subject = 'Basic Email Greeting';\n\
    \    $this->set('sender','Me, Myself, and I');\n    $this->Email->template = 'hello';\n\
    \    $this->Email->send();\n}\n```\n\n请注意，通过使用 `set()` 函数，您可以向模板文件中的 `$sender`\
    \ 变量传递一个值。您还告诉了 `Email` 组件在发送消息时要使用哪个模板；在这种情况下，您需要将模板文件命名为 `hello.ctp`。\n\nHTML\
    \ 模板可以像 Cake 中的其他视图一样工作，并且可以引用网站上存储的图像；请记住对任何图形使用绝对 URL，因为用户的电子邮件客户端在打开电子邮件时将无法获取相对路径。\n\
    \n# 其他组件\n\nCake 的内置组件无疑减少了运行常见 Web 应用程序方法所需的代码量。它不仅包括前面讨论的组件，还包括其他更高级的组件：ACL（代表“访问控制列表”）、`RequestHandler`\
    \ 和 `Security` 组件。\n\n## ACL 组件\n\n构建 Web 应用程序最复杂的方法之一是对多用户进行访问控制。`Auth` 组件负责处理简单的身份验证，但如果您想为用户及其访问级别设置多个层级呢？或者，更好的是，动态更改用户在整个站点中的权限呢？这种更复杂的为分配用户区域系统需要访问控制列表，该列表概述了谁有权访问站点中哪些区域的树或矩阵。`ACL`\
    \ 组件通过一系列函数和方法简化了这种类型的用户管理。\n\n## RequestHandler 组件\n\n该组件有助于管理 HTTP 请求和获取更多客户端信息。诸如\
    \ SSL 检测、读取 HTTP 请求的类型以及使用唯一的 MIME 类型进行响应等功能，使 `RequestHandler` 拥有强大的能力，能让您的 Web\
    \ 应用程序对多种类型的用户可访问。例如，可以使用 `RequestHandler` 管理 Web 服务，这允许其他 Web 站点访问信息并与您的应用程序通信。`RequestHandler`\
    \ 还可以将信息输出为 `text/html` 之外的 MIME 类型，这使您的应用程序甚至可以在非浏览器的客户端应用程序中工作。\n\n## Security\
    \ 组件"
  raw: 'When writing cookies, the Cookie component simplifies the process. Much like
    the Session component, the Cookie component creates new cookies on the user’s
    system, checks for cookies, and reads and writes to those cookies as well. For
    the Cookie component to work correctly, be sure to provide the necessary parameters
    when setting up the component.


    Setting Up the Cookie Component


    Three variables are required for this component to run: cookieName, cookieKey,
    and cookieDomain. These tell the Cookie component, respectively:


    • The name of the cookie


    • The string used to encrypt information written to the cookie


    • The domain with access to the cookie


    Other Cookie component preferences include the following:


    • cookiePath: The path where the cookie is stored on the server; the default is
    set to the entire domain


    • cookieSecure: A boolean value set to false by default; tells the component whether
    to save cookies over a secure connection


    • cookieTime: The number of seconds before the cookie will expire; the default
    value is 0, meaning that when the browser is closed, the cookie will expire


    These settings are called in the controller as class properties, like so: var
    $cookieName = ''super_duper_cookie'';


    var $cookieKey = ''$%sdkj29KA9Ne@@uxlqW'';


    var [$cookieDomain = ''www.domain_name.com'';](http://www.domain_name.com)


    var $cookieTime = 5400;


    Writing to a Cookie


    Storing information in the cookie is simple with the write() function and is similar
    to the Session->write() function. The first value in the function is the cookie’s
    key, and the second contains the value to be written. Remember that this value
    will be encrypted using the cookieKey preference.


    $this->Cookie->write(''User'',$user_agent);


    09775ch11final 7/1/08 9:51 PM Page 196


    **196**


    C H A P T E R 1 1 ■ C O M P O N E N T S A N D U T I L I T I E S


    Reading a Cookie


    Just like the Session component, reading a cookie is done with the read() function:
    $user = $this->Cookie->read(''User'');


    As long as the cookie hasn’t expired, the information should be available.


    Deleting Cookies


    Delete cookies using the del() function. Supply the name of the cookie to be deleted,
    and the component will eliminate the cookie for you:


    $this->Cookie->del(''User'');


    **Email**


    One of the most common tasks of web sites is to send automated e-mails to users.
    Whether it is an e-commerce web site or a marketing tool for spreading the word,
    automated e-mail find wide use on the Web. But they can be frustrating to implement,
    especially when using HTTP headers in the PHP mail() function. The Email component
    provides a method for sending e-mails in your Cake application using layouts and
    views rather than coding long strings of e-mail text in the script or controller.


    Setting Up the E-mail Layouts


    The Email component distinguishes between HTML and plain-text e-mail. To create
    a layout for each, you must create the folders in the app/views/layouts/email
    directory. The HTML layouts are stored in a folder named html, and the plain-text
    layouts are stored in the text folder.


    In each folder, create a default.ctp file with the necessary layout markup surrounding
    the $content_for_layout variable. For example, the HTML layout might include the
    following:


    <!DOCTYPE XHTML PUBLIC "-//W3C//DTD XHTML 1.0 strict//EN">


    <html>


    <body>


    <?=$content_for_layout; ?>


    </body>


    </html>


    The plain-text layout will probably not need much more than the $content_for_layout
    variable itself.


    Sending an E-mail


    In the controller action that sends the e-mail, provide some settings for the
    Email component and then run the send() function to send the e-mail. Available
    settings include the following:


    • $to


    • $cc


    • $bcc


    09775ch11final 7/1/08 9:51 PM Page 197


    C H A P T E R 1 1 ■ C O M P O N E N T S A N D U T I L I T I E S


    **197**


    • $replyTo


    • $from


    • $sendAs


    • $subject


    As you will notice, these parameters are self-explanatory and correspond to typical
    e-mail settings. The sendAs setting tells the Email component how to send the
    e-mail, either as html or text.


    Say you have a basic message you would like to send in the email() action in one
    of your controllers. It may go something like this:


    function email() {


    [$this->Email->to = ''foo@bar.com'';](mailto:foo@bar.com)


    [$this->Email->cc = ''another@email.com'';](mailto:another@email.com)


    [$this->Email->replyTo = ''me@sender.com'';](mailto:me@sender.com)


    [$this->Email->from = ''do-not-reply@domain.com'';](mailto:reply@domain.com)


    $this->Email->subject = ''Basic Email Greeting'';


    $this->Email->send(''Glad to see you'');


    }


    The text passed in the send() function is the body of the e-mail to be sent.


    Using a Template for E-mail Messages


    Creating e-mail templates and sending those rather than providing the content
    in the controller is simple. Make elements that are stored in keyed folders to
    create e-mail templates.


    For example, a basic plain-text template would be stored in the app/views/elements/email/


    text/hello.ctp file and could contain the following:


    Hello! This message is from <?=$sender;?>.


    Then, in the email() function, you could set the $sender variable if you want:
    function email() {


    [$this->Email->to = ''foo@bar.com'';](mailto:foo@bar.com)


    [$this->Email->cc = ''another@email.com'';](mailto:another@email.com)


    [$this->Email->replyTo = ''me@sender.com'';](mailto:me@sender.com)


    [$this->Email->from = ''do-not-reply@domain.com'';](mailto:reply@domain.com)


    $this->Email->subject = ''Basic Email Greeting'';


    $this->set(''sender'',''Me, Myself, and I'');


    $this->Email->template = ''hello'';


    $this->Email->send();


    }


    Notice that by using the set() function, you were able to pass a value to the
    $sender variable in the template file. You also told the Email component which
    template to use when sending the message; in this case, you’ll need to name the
    template file hello.ctp.


