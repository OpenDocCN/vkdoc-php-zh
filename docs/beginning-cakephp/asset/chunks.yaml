  trans: "\n其他所有字段也可以沿用这种方法，根据其字段类型设置对应的验证规则，如下所示：\n\n```\nvar $validate = array(\n\
    \    'name'=>'alphaNumeric',\n    'date'=>'date',\n    'content'=>null\n);\n```\n\
    \n## 使用多重验证\n\n还存在更多验证可能性。你可能需要检查所提供字符串的长度，或者所使用的符号，甚至可能需要对单个字段应用多条规则。模型只需为每个字段扩展一个自己的数组，就能容纳更多选项。该数组中的每一项都将包含一个键，该键对应一个可用选项及其验证值。\n\
    \n## 必填字段\n\n要设置某个字段为必填，请使用`required`布尔选项：\n\n```\nvar $validate = array('name'=>array('required'=>true));\n\
    ```\n\n在这个例子中，如果用户为`name`提交了一个空值，那么模型在验证阶段就会失败。因此，控制器中的`save()`函数将返回`false`，告知控制器没有任何内容保存到数据库中。\n\
    \n关于这个参数，还有一点很重要：如果在数据数组中找不到该字段的索引，它也会持续判断验证失败。例如，`$this->data`是一个包含键和值的数组，这些键和值将被保存，如果待验证的字段名没有对应的键存在，`required`也会导致验证失败。\n\
    \n你可能以这样一种方式构建了数据库：某个字段可能需要保持为空，但如果数据数组中缺少该键，又不想触发验证失败响应。要实现这一点，请使用`allowEmpty`参数。通过将此参数设置为`false`，你基本上是在说“不允许此字段包含空字符，例如空格、制表符等”。需要注意的是，只有在数据数组中存在该字段对应的键时，`allowEmpty`参数才会在验证时被调用。\n\
    \n## 在验证时设置错误消息\n\n你可以自定义验证失败时的错误消息，供控制器使用和/或在视图中显示。通过`message`键来实现：\n\n```\n\
    var $validate = array(\n    'name'=>array(\n        'rule'=>'alphaNumeric',\n\
    \        'message'=>'帖子标题只能包含字母数字字符'\n    )\n);\n```\n\n要在视图中显示此错误消息，请确保包含表单辅助器的`error()`函数：\n\
    \n```\n<?=$form->input('name');\n<?=$form->error('name');\n```\n\n## 创建还是更新？\n\
    \n保存数据有两种可能：创建新记录或更新现有记录。有时你可能只需要在更新过程中进行验证，而在创建新记录时不需要，反之亦然。要区分需要验证的保存类型，请使用`on`参数：\n\
    \n```\nvar $validate = array(\n    'name'=>array(\n        'rule'=>'alphaNumeric',\n\
    \        'message'=>'帖子标题只能包含字母数字字符',\n        'on'=>'create'\n    )\n);\n```\n\
    \n`on`键的可用选项是`create`和`update`。\n\n## 使用内置验证规则\n\n有几个内置的验证规则，可以将某些数据检查过程简化为单个参数。表\
    \ 7-7 列出了可用的规则。\n\n**表 7-7.** *内置规则*\n\n| **值** | **规则** | **示例** |\n| ---------\
    \ | -------- | ----------- |\n| `alphaNumeric` | 字段必须仅包含字母和数字 | `'rule'=>'alphaNumeric'`\
    \ |\n| `between` | 字段长度必须在提供的值之间 | `'rule'=>array('between',10,20)` |\n| `blank`\
    \ | 字段必须为空或仅包含空白字符 | `'rule'=>'blank'` |\n| `cc` | 字段必须是有效的信用卡号 | `'rule'=>array('cc','fast')`\
    \ |\n| `comparison` | 字段的数值与提供的值进行比较 | `'rule'=>array('comparison','>=',21)` |\n\
    | `date` | 字段必须包含有效的日期字符串 | `'rule'=>'date'` |\n| `decimal` | 字段必须是有效的十进制数 | `'rule'=>'decimal'`\
    \ |\n| `email` | 字段必须是有效的电子邮件地址 | `'rule'=>'email'` |\n| `equalTo` | 字段必须等于提供的值\
    \ | `'rule'=>array('equalTo','www')` |\n| `extension` | 字段必须包含所提供的文件扩展名后缀 | `'rule'=>array('extension','jpg')`\
    \ |\n| `ip` | 字段必须是有效的 IPv4 地址 | `'rule'=>'ip'` |\n| `minLength` | | |\n"
- fmt: "# Validation Rules\n\n`Field` must have length at least as long as\n\n`'rule'=>array('minLength',12)`\n\
    \nsupplied value\n\n`maxLength`\n\n`Field` must be shorter in length than\n\n\
    `'rule'=>array('maxLength',30)`\n\nsupplied value\n\n`money`\n\n`Field` must contain\
    \ a valid monetary\n\n`'rule'=>array('money','left')`\n\namount\n\n`numeric`\n\
    \n`Field` must be a valid number\n\n`'rule'=>'numeric'`\n\n`phone`\n\n`Field`\
    \ must be a valid phone number\n\n`'rule'=>array('phone',null,'us')`\n\n`postal`\n\
    \n`Field` must be valid ZIP code\n\n`'rule'=>array('postal',null,'uk')`\n\n`range`\n\
    \n`Field` must be between supplied values\n\n`'rule'=>array('range',0,100)`\n\n\
    `ssn`\n\n`Field` must be a valid Social Security\n\n`'rule'=>array('ssn',null,'us')`\n\
    \nnumber\n\n`url`\n\n`Field` must be a valid web address\n\n`'rule'=>'url'`\n\n\
    With all these validation rules, you also have the option of specifying your own\
    \ regular expressions to fine-tune the validation. If, for instance, your site\
    \ must validate ZIP codes for a country other than the United States, Canada,\
    \ and the United Kingdom, you can supply your own regular expression based on\
    \ the postal code criteria of that country. Some of these expressions can be entered\
    \ in the parameter's array (like `postal`), but all custom validations can be\
    \ specified with the `custom` parameter:\n\n`'rule'=>array('custom','/[a-z0-9]{12,}$/i')`\n\
    \n# Using Multiple Rules\n\nEach field can have multiple validation rules. Simply\
    \ follow the array syntax to extend the field's rules to include more than one.\
    \ For each rule, you can use the validation parameters discussed earlier. Listing\
    \ 7-8 shows your `Post` model with a variety of validation settings.\n\n**Listing\
    \ 7-8.** *Various Validation Rules for the* `Post` *Model*\n\n```\nvar $validate\
    \ = array(\n'name'=>array(\n'alphaNumeric'=>array(\n'rule'=>'alphaNumeric',\n\
    'required'=>true,\n'message'=>'The Title may not contain any symbols'\n),\n'maxLength'=>array(\n\
    'rule'=>array('maxLength',80),\n'message'=>'The Title must not exceed 80 characters'\n\
    )\n),\n'date'=>array(\n'rule'=>'date',\n'required'=>true,\n'message'=>'You must\
    \ supply a valid date'\n),\n'content'=>array(\n'required'=>true\n)\n);\n```\n\n\
    Notice that, on lines 3 and 8 of Listing 7-8, a separate rule was assigned to\
    \ the `name` field. The benefit of having more than one rule in this array rather\
    \ than creating one custom regular expression to cover both rules is that the\
    \ error messages you forward to the browser can be specific to the cause of the\
    \ invalidation. Using multiple rules also allows you to take advantage of Cake's\
    \ built-in rules and save time.\n\nGo ahead and add Listing 7-8 to the `Post`\
    \ model just below the model associations. Now the form submission process has\
    \ validation handling included in the model. You could have run some cumbersome\
    \ validation logic in the controller, but this would have gone beyond Cake's MVC\
    \ architecture. By running data validation through the model, more streamlined\
    \ functions and methods are available to you.\n\n# Error Messages in the View\n\
    \nFor the error messages used in lines 6, 10, and 16 of Listing 7-8 to be visible\
    \ to the user, you will need to prepare the views with the `Form` helper. By using\
    \ the `error()` function, create error message placeholders in the `app/views/posts/add.ctp`\
    \ and `edit.ctp` views. Make sure the supplied parameter matches the given field,\
    \ such as `$form->error('name')` for the `name` field.\n\n# Writing Custom Model\
    \ Functions\n\nSuppose you wanted to enter a URL that would fetch not only a post\
    \ by its ID but all posts for a given year. This type of process would likely\
    \ require a few lines of logic to run the query, depending on the URL supplied\
    \ by the user. All too often, beginners to Cake try to perform this logic in the\
    \ controller, resulting in large controllers throughout the application. Because\
    \ this is a process that deals specifically with data, you should run this function\
    \ in the model.\n\nOpen the `Post` model, and insert Listing 7-9 after the recently\
    \ added data validation attribute.\n\n**Listing 7-9.** *The Custom* `findByYear()`\
    \ *Function in the* `Post` *Model*\n\n```\nfunction findByYear($year=null) {\n\
    $date = $year.'-01-01 00:00:00';\n$end_date = $year.'-12-31 23:59:59';\nreturn\
    \ $this->find('all',array('conditions'=>array('DATE(Post.date)'=>' >'.$date,'DATE(Post.date)'=>'<'.$end_date)));\n\
    }\n```\n\nIn the controller, you'll use this function so it will pass the `$year`\
    \ variable supplied by the user. Lines 2–3 of Listing 7-9 initialize variables\
    \ for the start and end dates of the year that will match the datetime field in\
    \ the database. Line 4 performs the query and searches all records whose date\
    \ fields match the range between `$date` and `$end_date`. It also uses `return`\
    \ to pass the results back to the controller.\n\nThis function is held by the\
    \ model, but the model itself won't execute the function. The controller will\
    \ do that. So in the `Posts` controller, insert a new action called `read()`.\
    \ Use Listing 7-10 to include the model function you just created.\n\n**Listing\
    \ 7-10.** *The Read Action in the Posts Controller*\n\n```\nfunction read($year=null)\
