    \  \n\n## 设置 Cookie 组件  \n\n运行此组件需要三个变量：`cookieName`、`cookieKey` 和 `cookieDomain`。它们分别告诉\
    \ `Cookie` 组件：  \n\n-   cookie 的名称  \n-   用于加密写入 cookie 信息的字符串  \n-   有权访问该 cookie\
    \ 的域名  \n\n其他 `Cookie` 组件首选项包括：  \n\n-   `cookiePath`：服务器上存储 cookie 的路径；默认设置为整个域名\
    \  \n-   `cookieSecure`：一个布尔值，默认为 `false`；告诉组件是否通过安全连接保存 cookie  \n-   `cookieTime`：cookie\
    \ 过期前的秒数；默认值为 `0`，这意味着关闭浏览器时 cookie 将过期  \n\n这些设置在控制器中作为类属性被调用，如下所示：  \n\n```\n\
    var $cookieName = 'super_duper_cookie';\nvar $cookieKey = '$%sdkj29KA9Ne@@uxlqW';\n\
    var $cookieDomain = 'www.domain_name.com';\nvar $cookieTime = 5400;\n```\n\n##\
    \ 写入 Cookie  \n\n使用 `write()` 函数将信息存储在 cookie 中非常简单，并且与 `Session->write()` 函数类似。函数中的第一个值是\
    \ cookie 的键，第二个值包含要写入的值。请记住，该值将使用 `cookieKey` 首选项进行加密。  \n\n```\n$this->Cookie->write('User',$user_agent);\n\
    ```\n\n## 读取 Cookie  \n\n就像 `Session` 组件一样，使用 `read()` 函数读取 cookie：`$user = $this->Cookie->read('User');`。只要\
