    \ for 16 elements = 353728\n```\n\n## Chapter 10: Variables\n\nThe first loop\
    \ adds the same string to the array 100 times and each time the memory usage is\
    \ printed out. The second loop runs as many times as the array has elements and\
    \ each time the current memory usage is printed and the last element of the array\
    \ is removed.\n\n### Recipe 10-4: Taking Advantage of Variable Scope\n\n#### Problem\n\
    \nThe same variable can be used in different places of the code and hold different\
    \ values. Thus the same name can be used to designate different variables. This\
    \ is often the case with temporary variables or variables used in loops (`$i`,\
    \ `$j`, `$k`).\n\n#### Solution\n\nVariables are valid within the scope they are\
    \ defined. The most basic scope in PHP is the global scope. In addition to the\
    \ global scope PHP has a class scope and a function/method scope. Variables defined\
    \ in the global scope are only valid and available in the global scope. If the\
    \ same variable name is used for variables in different scopes they are considered\
    \ to be two different variables unless special measures are used to reference\
    \ the same variable.\n\nIt is always recommended to use unique variable names\
    \ to avoid confusion.\n\n#### How it Works\n\nIn the following example the variable\
    \ `$a` is defined in the global scope and assigned the value of 5. `$a` is also\
    \ defined as a variable in the `MyTest()` function and here it is assigned the\
    \ value of 7. At runtime the function is called and the local version of `$a`\
    \ is assigned but the function ends before it does anything else and the local\
    \ version of `$a` is discarded. The global variable `$a` is not affected by the\
    \ function.\n\n```php\n<?php\n// 10_6.php\n$a = 5;\n\nfunction MyTest() {\n  \
    \  $a = 7;\n}\n\nMyTest();\necho $a;\n```\n\nIt is possible to access variables\
    \ from the global scope from within a function or class method. By using the keyword\
    \ `global` in front of the variable before the first usage of the variable will\
    \ make the local variable a reference to the global variable and any updates to\
    \ the local variable will also affect the global variable. If the variable is\
    \ undefined in the global scope it will be defined in the global scope and any\
    \ value assigned to it will be preserved after the function ends.\n\nIn the following\
    \ example the internal variable `$a` is assigned a value of 7. Later in the same\
    \ function `$a` is changed to be a reference to the global version of `$a` and\
    \ then assigned a new value. So after executing this script the value of the global\
    \ version of `$a` becomes 6. When the variable is changed from a local variable\
    \ to a reference to the global variable, the local value is lost.\n\n```php\n\
    <?php\n// 10_7.php\n$a = 5;\n\nfunction MyTest() {\n    $a = 7;\n    global $a;\n\
    \    $a = 6;\n}\n\nMyTest();\necho $a;\n```\n\n### Recipe 10-5: Avoiding Global\
    \ Variable Problems with Super Globals\n\n#### Problem\n\nAccessing global variables\
    \ with the use of the `global` keyword can cause issues if you forget to use it.\
    \ In that case the variable becomes a local variable and the code will behave\
    \ differently than expected.\n\n#### Solution\n\nAn alternative to using the `global`\
    \ keyword is to use what's called a super global to reference variables from the\
    \ global scope. Super globals are predefined variables that are accessible in\
    \ the global scope as well as any function or method scope without the use of\
    \ the `global` keyword. These are populated with get (`$_GET`), post (`$_POST`),\
    \ cookie (`$_COOKIE`), environment (`$_ENV`), server (`$_SERVER`), and a special\
    \ version for global variables (`$GLOBALS`).\n\nThe availability of the super\
    \ globals is controlled by a configuration option in `php.ini` called `variables_order`.\
    \ This configuration is a string of any of the letters `E`, `G`, `P`, `C`, and\
    \ `S`, which is short for Environment, Get, Post, Cookie, and Server. If the configuration\
    \ is set to the empty string, none of these super globals will be populated.\n\
    \n#### How it Works\n\nThe super globals are all associated arrays (key value\
    \ pairs) and the variable names all start with `$_` with the exception of `$GLOBALS`.\
    \ That's for historical reasons as it was named like this before any of the other\
    \ super globals were introduced to the language. The next example shows how to\
    \ use the `$GLOBALS` variable to change the value of a global variable.\n\n```php\n\
    <?php\n// 10_8.php\n$a = 5;\n\nfunction MyTest() {\n    $GLOBALS['a'] += 7;\n\
    }\n\nMyTest();\necho $a;\n```\n\nWhen a script uses a combination of GET (query\
    \ string) and POST (request body) requests it is possible to access the contents\
    \ in a single super global called `$_REQUEST`. This can simplify the code so only\
    \ one variable is checked for the existence of specific values instead of checking\
    \ both `$_GET` and `$_POST`. The elements of this array are populated in the order\
    \ specified by the configuration option `request_order` and if that's not defined\
    \ the system will use the same order as used in configuration `variables_order`.\n\
    \nIf the `request_order` is set to \"GP\" the system will take all variables corresponding\
    \ to the `$_GET` array first and then apply all values from `$_POST`. If the same\
    \ index exists in both arrays the `$_REQUEST` variable will only contain the value\
    \ from `$_POST`. Changing the configuration to \"PG\" will change the order and\
    \ if it's set to \"P\" or \"G\" the `$_REQUEST` variable will only contain get\
    \ or post values.\n\n### Recipe 10-6: Determining Variable Type\n\n#### Problem\n\
    \nVariables in PHP can change type based on assignments and results of calculations,\
    \ etc. How can we know the actual type of a given variable?\n\n> **Note:** Recipe\
    \ 10-1 covers how to change the type of a PHP variable.\n\n#### Solution\n\nThe\
    \ basic variable types in PHP are integer, float, string, array, object, and resource\
    \ and each of these have a corresponding function that will check the data type\
    \ and return `true` or `false` depending on the actual type of the variable: `is_integer()`,\
    \ `is_float()`, `is_string()`, `is_array()`, `is_object()`, and `is_resource()`.\n\
    \nIn addition to these there are a couple of other `is_*` functions that can be\
    \ used to check the content of a variable; `is_numeric()`, `is_nan()` (not a number),\
    \ `is_finite()`, `is_infinite()`, `is_null()`, `empty()` and `isset()`. The names\
    \ `empty()` and `isset()` are kept this way for historical reasons to preserve\
    \ compatibility with older versions of PHP.\n\n#### How it Works\n\nWhen integers\
    \ are assigned values greater than `PHP_INT_MAX` constant the variable will automatically\
    \ change to a float. The actual value of `PHP_INT_MAX` depends on the platform\
    \ and version of PHP. For 32-bit versions the value is 2 to the power of 31 and\
    \ for 64-bit values the value is 2 to the power of 63. The last bit is used for\
    \ the sign as all integer values in PHP are signed.\n\nInstead of checking a variable\
    \ for a specific type the `gettype()` function can be used to get a string representation\
    \ of the type. The possible return values for `gettype()` are one of the strings\
    \ \"Boolean\", \"integer\", \"double\", \"string\", \"array\", \"object\", \"\
    resource\", \"NULL\", and \"unknown type\". This is demonstrated in the next example\
    \ where a variable is assigned the value of `PHP_INT_MAX` and then incremented.\n\
    \n```php\n<?php\n// 10_9.php\n$i = PHP_INT_MAX;\necho $i . \"\\n\";\necho gettype($i)\
    \ . \"\\n\";\n$i++;\necho $i . \"\\n\";\necho gettype($i) . \"\\n\";\n```\n\n\
    The first call to `gettype()` will return 'integer' and the second will return\
    \ 'double'. The string double is used instead of float for historical reasons.\n\
    \nOn a 64-bit system the output will look like this:\n\n```\ninteger\n9.2233720368548E+18\n\
    double\n```"
