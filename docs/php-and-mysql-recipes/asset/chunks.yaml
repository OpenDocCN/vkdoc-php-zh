    \ clouds\n        )\n)\n[visibility] => SimpleXMLElement Object\n(\n)\n[precipitation]\
    \ => SimpleXMLElement Object\n(\n    [@attributes] => Array\n        (\n     \
    \       [mode] => no\n        )\n)\n[weather] => SimpleXMLElement Object\n(\n\
    \    [@attributes] => Array\n        (\n            [number] => 804\n        \
    \    [value] => overcast clouds\n            [icon] => 04d\n        )\n)\n[lastupdate]\
    \ => SimpleXMLElement Object\n(\n    [@attributes] => Array\n        (\n     \
    \       [value] => 2016-04-10T20:27:02\n        )\n)\n```\n\nUsing the `var_dump()`\
    \ function is a quick way to get information about the XML object, but it's not\
    \ very useful when it comes to generating content for a web site.\n\nTo make the\
    \ example a bit more useful we can extract a few values from the XML and show\
    \ them in a table. The values of interest are temperature, wind, and clouds. By\
    \ passing the object to a `foreach` loop it's possible to list all the attributes\
    \ that are available in the XML object.\n\n```php\n<?php\n// 14_3.php\n$xml =\
    \ simplexml:load_file('http://api.openweathermap.org/data/2.5/weather?q=Los%20Angeles,us&mode=xml&appid=<API\
    \ KEY>');\nforeach($xml as $attrib => $value) {\n    echo $attrib . \"\\n\";\n\
    }\n```\n\nThis will generate the following output.\n\n```\ncity\ntemperature\n\
    humidity\npressure\nwind\nclouds\nvisibility\nprecipitation\nweather\nlastupdate\n\
    ```\n\nEach of these attributes is also an object that is an instance of the `SimpleXMLElement`\
    \ class. The temperature object has parameters for value, min, max, and unit.\
    \ In this case the temperature unit is Kelvin so a bit of math is needed to show\
    \ the current temperature in Celsius or Fahrenheit.\n\n```php\n<?php\n// 14_4.php\n\
    $xml = simplexml:load_file('http://api.openweathermap.org/data/2.5/weather?q=Los%20Angeles,us&mode=xml&appid=<API\
    \ KEY>');\necho \"City: {$xml->city['name']}\\n\";\nif ($xml->temperature['unit']\
    \ == 'kelvin') {\n    $k = $xml->temperature['value'];\n    $c = $k - 273.15;\n\
    \    $f = $c * 9 / 5 + 32;\n}\nprintf(\"Temperature: %3.1f K / %3.1f C / %3.1f\
    \ F\\n\", $k, $c, $f);\n```\n\nThis will show the name of the city for the request\
    \ as well as the temperature in Kelvin, Celsius, and Fahrenheit according to Open\
    \ Weather Map on a 'cold' March evening.\n\n```\nCity: Los Angeles\nTemperature:\
    \ 282.2 K / 8.9 C / 47.9 F\n```\n\nNote that the attributes on the top level (city,\
    \ temperature, etc.) are accessed as member variables on the object and the members\
    \ on the inner elements are accessed as array keys on the attribute. The difference\
    \ can be seen in the raw dump of the `$xml` variable, where the `@attributes`\
    \ element on each of the inner objects is marked as an array and not an instance\
    \ of the `SimpleXMLElement` class. This can also be seen in the raw XML content\
    \ where the name of the city and the temperature elements are attributes on the\
    \ XML tags.\n\n```xml\n<current>\n    <city id=\"5368361\" name=\"Los Angeles\"\
    >\n        <coord lon=\"-118.24\" lat=\"34.05\"/>\n        <country>US</country>\n\
    \        <sun rise=\"2016-03-13T14:05:11\" set=\"2016-03-14T01:59:41\"/>\n   \
    \ </city>\n    <temperature value=\"282.202\" min=\"282.202\" max=\"282.202\"\
    \ unit=\"kelvin\"/>\n    <humidity value=\"85\" unit=\"%\"/>\n    <pressure value=\"\
    966.32\" unit=\"hPa\"/>\n    <wind>\n        <speed value=\"0.84\" name=\"Calm\"\
    />\n        <gusts/>\n        <direction value=\"202.504\" code=\"SSW\" name=\"\
    South-southwest\"/>\n    </wind>\n    <clouds value=\"0\" name=\"clear sky\"/>\n\
    \    <visibility/>\n    <precipitation mode=\"no\"/>\n    <weather number=\"800\"\
    \ value=\"clear sky\" icon=\"01n\"/>\n    <lastupdate value=\"2016-03-13T01:42:16\"\
    />\n</current>\n```"
