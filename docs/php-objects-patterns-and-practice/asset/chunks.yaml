- fmt: '在调用`Controller::process()`之前，通过设置控制器构造函数中实例化的`CommandContext`对象上的参数来模拟一个Web请求。`process()`方法获取`"action"`参数（如果没有action参数，则回退到字符串`"default"`）。该方法然后将对象实例化委托给`CommandFactory`对象。它在返回的命令上调用`execute()`。请注意控制器如何对命令的内部细节一无所知。正是这种独立于命令执行细节的特性，使得你能够在对此框架影响相对较小的情况下添加新的`Command`类。


    这是另一个`Command`类：


    ```

    // listing 11.52

    class FeedbackCommand extends Command

    {

    public function execute(CommandContext $context): bool

    {

    $msgSystem = Registry::getMessageSystem();

    $email = $context->get(''email'');

    $msg   = $context->get(''msg'');

    $topic = $context->get(''topic'');

    $result = $msgSystem->send($email, $msg, $topic);

    if (! $result) {

    $context->setError($msgSystem->getError());

