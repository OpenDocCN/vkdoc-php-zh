    **458**


    C H A P T E R 1 3 ■ I M P L E M E N T I N G T H E O R D E R P I P E L I N E :
    PA RT I **3.** PsShipOk enters the shipment date in the database, advances the
    order status, and tells OrderProcessor to continue.


    **4.** OrderProcessor detects the new order status and calls PsFinalNotification.


    **5.** PsFinalNotification sends an email to the customer confirming that the
    order has been shipped and advances the order stage.


    **6.** OrderProcessor terminates.


    If anything goes wrong at any point in the pipeline processing, such as a credit
    card being declined, an email is sent to an administrator. The administrator then
    has all the information necessary to check what has happened, get in contact with
    the customer involved, and cancel or replace the order if necessary.


    No point in this process is particularly complicated; it’s just that a lot of
    code is required to put this into action!


    **Laying the Groundwork**


    Before you start building the components just described, you need to make a few
    modifications to the HatShop database and web application.


    During order processing, one of the most important functions of the pipeline is
    to maintain an up-to-date audit trail. The implementation of this audit trail
    involves adding records to a new database table called audit. We’ll add the audit
    table in the following exercise.


    To implement the functionality just described, you’ll also need to add a new function
    named orders_create_audit to the hatshop database. The orders_create_audit function
    adds an entry to the audit table.


    We’ll also create the OrderProcessor class (the class responsible for moving an
    order through the pipeline), which contains a lot of code. However, you can start
    simply, and build up additional functionality as needed. To start with, you’ll
    create a version of the OrderProcessor class with the following functionality:


    • Dynamically selects a pipeline section supporting the IPipelineSection interface


    • Adds basic auditing data


    • Gives access to the current order details


    • Gives access to the customer for the current order


    • Gives access to administrator mailing


    • Mails the administrator in case of error'
