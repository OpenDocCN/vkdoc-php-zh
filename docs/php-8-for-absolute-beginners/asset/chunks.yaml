    ### 什么是变量？


    在第 1 章中，我们介绍了*变量*的概念。我们发现变量是系统内存中存储值的标识符。这很有用，因为它允许我们编写对变量值执行一系列操作的程序，而无需关心变量在内存中的存储方式和位置。程序只需改变变量中存储的内容，即可更改输出，而无需修改程序代码本身。变量帮助我们开始创建动态编程！


    #### 在变量中存储值


    在变量中存储值相当简单。在 PHP 中，我们只需一行代码即可声明一个新变量并为其赋值。


    ```

    I am $myName and I have a friend called $friendsName.";

    ?>

    清单 2-3

    test3.php

    ```


    在浏览器中执行清单 2-3 中代码的结果如图 2-3 所示。


    ![](img/323857_3_En_2_Fig3_HTML.jpg)


    该窗口表示执行 test3 中代码的结果，输出为“I am Thomas and I have a friend called Brennan”。


    **图 2-3**


    test3.php 的输出


    正如第 1 章所述，等号是一个*赋值运算符*。它告诉解释器将右侧的内容（此处示例中为字符串）放入左侧的变量中。在许多语言中，我们还需要告诉系统将存储何种类型的信息，例如字符串、数字或单个字符。PHP
    允许我们选择性地声明*数据类型*。


    操作系统需要数据类型来确定使用哪些位来表示内存中的数据。如果未声明数据类型，PHP 将首先查看存储在变量中的信息（此处示例中为字符串），以告知操作系统正在存储的数据类型。


    #### 变量是一个占位符


    变量在编程中被广泛使用。它们为程序提供了灵活性，可以在程序运行时临时存储数据，并在必要时更改所使用的数据。让我们更详细地看一下之前的清单。


    ```

    echo "I am $myName and I have a friend called $friendsName.";

    ```


    当程序执行时，变量 `$friendsName` 显示为“Brennan”，变量 `$myName` 显示为“Thomas”。显示的信息替换了原始字符串中对应的
    PHP 变量。


    你是否注意到字符串中包含了一些 HTML 代码？请记住，PHP 代码的执行结果会被发送到浏览器。包含 `<p>` 标签的完整字符串被发送到浏览器进行解释。如果我们在浏览器中查看源代码，会看到
    `<p>` 标签存在并已被解释。我们可以通过在 echo 字符串中包含任何 HTML、CSS 甚至 JavaScript 代码，将其传递给浏览器进行解释。我们很快就会看到使用这种技术带来的巨大好处。


    在其他一些编程语言中，变量不能包含在字符串中。字符串必须被拆分，如下所示。


    ```

    echo "I am $myName and I have a friend called " . $friendsName" . ".";

    ```


    句点是一个*字符串连接符*，它允许我们将多个字符串连接在一起。我们可以用这个示例替换之前的代码行，它会输出相同的结果。然而，希望你能明白，处理所有的句点和引号会变成一个大问题。调试会变得更加困难。感谢
    PHP 开发者，让我们的工作变得更轻松！


    #### 有效的 PHP 变量名


    在 PHP 中，所有变量必须以美元符号（`$`）开头。变量名区分大小写。变量名还可以包含下划线（`_`）。通常，当我们创建变量时，会以字母字符开头。然而，一些特殊变量以下划线开头。


    ### 程序设计与逻辑


    在创建变量名时，要保持一致性。每个程序员都有自己设计名称的风格；关键是在整个程序中坚持使用同一种风格。你可以偏好驼峰式（`$myName`）、下划线式（`$my_name`）、组合式（`$my_Name`）或不同的技巧。所有这些方式都是可接受的。一些程序员还会在名称中包含所存储数据的类型（`$stringMyName`），以便于调试。为了提高可读性，我们建议使用有意义的名称。正如你在我们简单的示例中注意到的，到目前为止，我们没有将变量命名为
    `$name1` 或 `$name2`。我们通过使用 `$myName` 和 `$friendsName` 赋予了变量一些意义。这使得任何审查我们代码的人都能对将要存储的数据类型有所了解。请记住，在创建更大程序时，这有助于确定哪个变量与程序的哪些区域相关。


    **注意**


    实际上可以在变量名中使用数字，但不能放在开头位置。因此，`$1a` 是无效的变量名，而 `$a1` 则完全有效。


    ### 显示 PHP 错误


    在学习 PHP 的旅程中，你会遇到代码错误。当你编写了一些错误的 PHP 代码时，很容易认为自己做了坏事。从某种意义上说，这当然是不好的。你可能更希望从一开始就写出完美的
    PHP 代码，但即使是专家有时也会犯编码错误。


    从另一种意义上说，错误是件非常好的事情。许多此类错误提供了学习机会。如果你理解了错误的原因，就不太可能重复它，即使重复了，如果你能识别出它，也能很容易地纠正错误。


    PHP 错误消息并不总是会显示出来；这取决于你的环境。为什么错误不总是显示？简单的答案是，在线上环境中，我们不想向用户显示错误。这既表明我们编程水平不高，甚至可能导致安全漏洞。

