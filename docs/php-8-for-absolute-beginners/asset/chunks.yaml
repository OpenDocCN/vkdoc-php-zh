    \            }\n        }\n    }\n    return $errorStatus;\n}\n// Code below used\
    \ for testing only\n$variableName = 'image-data';\n$tmp = $_FILES['image-data']['tmp_name'];\n\
    if (!checkFile($tmp, $variableName)) {\n    echo \"文件有效\";\n} else {\n    echo\
    \ \"文件无效\";\n}\n?>\n```\n\n**清单 4-12：`checkFile.php`**\n\n哇，很多新代码。但让我们一步一步地分解它，看看发生了什么。\n\
    \n```\n$valid_File_Types = array('image/jpeg' => 'jpg');\n$max_Size = 40 * 1024\
    \ * 1024;\n// 40MB must be the same size or less than the setting in php.ini\n\
    $errorStatus = false;\n```\n\n`$valid_File_Types`是包含我们可接受文件类型的数组。目前，只有一个条目，但我们可以轻松添加其他文件类型。`$max_Size`是我们允许的单个文件的最大大小。这必须等于或小于`php.ini`文件中存储的值。`$errorStatus`被设置为`false`，默认情况下表示我们正在上传的文件没有问题。\n\
    \n```\nif (!isset($_FILES[$variableName])) {\n    // error $_FILE does not exist\n\
    \    $errorStatus = true;\n```\n\n如果从 HTML 表单传递的变量名（`image_data`）在`$_FILES`数组中不存在，我们将错误状态设置为`true`。这可能表明数组被篡改了。\n\
    \n```\n$info = finfo_open(FILEINFO_MIME_TYPE);\nif (!$info) {\n    // error Can't\
    \ open finfo using mime type\n    $errorStatus = true;\n```\n\n如果`$info`未设置，则当我们尝试使用`finfo`查看\
    \ MIME 类型时发生了问题。这并不表示我们上传的文件有问题，而是表明我们遇到了其他问题。\n\n```\n$mime_type = finfo_file($info,\
    \ $tmpName);\nif (!in_array($mime_type, array_keys($valid_File_Types))) {\n  \
    \  // error invalid file type\n    $errorStatus = true;\n```\n\n如果*MIME 类型*（文件后缀）与`$valid_File_Types`数组中的任何一个不匹配，则将错误状态设置为`true`。\n\
    \n```\nif (filesize($_FILES[$variableName]['tmp_name']) > $max_Size) {\n    //\
    \ error file size too big\n    $errorStatus = true;\n```\n\n如果上传的临时文件的大小大于我们允许的最大值，则错误状态设置为`true`。\n\
    \n```\nreturn $errorStatus;\n}\n$variableName = 'image-data';\n$tmp = $_FILES['image-data']['tmp_name'];\n\
    if (!checkFile($tmp, $variableName)) {\n    echo \"文件有效\";\n} else {\n    echo\
    \ \"文件无效\";\n}\n```\n\n> **注意：**您可以使用`ch4`文件夹下`views`文件夹中的`testUploadForm.php`运行此程序。\n\
    \n错误状态会返回给调用它的程序。在这个测试中，我们在函数下方直接调用了它，并设置了变量名，从当文件通过 HTML 表单上传时创建的`$_FILES`数组中获取了文件的临时名称。然后将此信息传递到函数中。如果函数返回`false`，则表示一切正常。如果返回`true`，则说明有问题。\n\
    \n现在我们有了验证上传文件的能力，我们可以通过将文件从临时位置移动来完成上传过程。\n\n### 使用 PHP 上传文件\n当文件最初被上传时，它会被放置在服务器上的一个临时目录中，并使用一个临时名称，如数组中的`tmp_name`值所示。请记住，这个位置是在`php.ini`文件中确定的，并且可以通过更新`php.ini`并重启\
    \ Apache 来更改。要永久存储文件，我们必须将其从临时位置移动到一个永久位置。\n"
- fmt: "```php\nmove_uploaded_file( $fileName, $destination );\n```\n\n函数 `move_uploaded_files()`\
    \ 将完成此任务。它接受两个参数：第一个参数 `$fileName` 应包含有效的临时文件名（位于 `$_FILES` 关联数组的 `tmp_name` 中），第二个参数\
    \ `$destination` 是永久存储文件的文件夹。该位置必须存在且可写。如果文件保存成功，函数 `move_uploaded_file()` 将返回\
    \ `TRUE`，否则返回 `FALSE`。\n\n## 规划上传器类\n\n在作为 PHP 或全栈开发者的职业生涯中，您将多次编写文件上传代码。编写可重用的上传代码是一个明智的主意。对象易于重用，因此让我们规划一个可随时重用的上传类。\n\
    \n### UML\n\n统一建模语言（UML）提供了规划类组织方式的简单图表。基本设计如下所示：\n\n![](images/323857_3_En_4_Chapter/323857_3_En_4_Fig8_HTML.jpg)\n\
    \n该图反映了基本的统一建模语言，包含类名、属性和方法。\n\n**图 4-8** 基本 UML 图\n\n请记住，类名的首字母始终大写。如果类名是复合词，每个附加单词的首字母也应大写。我们也可以选择用下划线分隔每个单词。如果类与主程序分开存放，则包含类的文件名应与类名相同。\n\
    \n> **注意：** UML 是 \"Unified Modeling Language\"（统一建模语言）的首字母缩写。该语言为记录代码提供了标准语法。UML\
    \ 不仅仅包含类图。有关 UML 的更多信息，请访问 [`www.uml.org`](http://www.uml.org)。\n\n### 上传器类需求\n\
    \n如前所述，我们需要将表单接收的文件数据从临时目录移动到永久位置。因此，该类需要一个属性来存储文件元数据，以及一个用于保存文件的方法。该方法需要一个文件名，因此我们创建一个\
    \ `$filename` 属性。我们还需要将文件保存到某处，因此创建一个存储位置的属性 `$destination` 和一个保存方法。现在可以开始规划新类的定义。\n\
    \n![](images/323857_3_En_4_Chapter/323857_3_En_4_Fig9_HTML.jpg)\n\n该图展示了统一建模语言的上传器类图。\n\
    \n**图 4-9** `Uploader` 类的 UML 图\n\n有了规划和 UML 类图，编写类定义就变得容易了。让我们创建一个新文件 `classes/Uploader.class.php`，内容如下：\n\
    \n```php\n<?php\nclass Uploader {\n    public $filename;\n    public $fileData;\n\
    \    public $destination;\n\n    public function saveIn( $folder ) {\n       \
    \ $this->destination = $folder;\n    }\n\n    public function save() {\n     \
    \   // 此处尚无代码\n    }\n}\n?>\n```\n\n**清单 4-13** `Uploader.class.php`\n\n上述代码声明了一个类，包含类名和用花括号分隔的类代码块。类内部声明了三个属性和两个方法。当我们已经创建了\
    \ UML 类图时，创建类会容易得多。属性 `destination` 将在调用 `saveIn` 方法时获取其值。属性 `filename` 和 `fileData`\
    \ 当前没有任何值。我们可以从超全局数组 `$_FILES` 中检索 `filename` 和 `fileData` 的值。如果在创建新的 `Uploader`\
    \ 对象时它们能自动获取值，那么它们的值就能反映当时要上传的文件。\n\n### 魔术方法 `__construct()`\n\n正好可以使用 `__construct()`\
    \ 构造方法来完成此任务。它仅在每次使用 `new` 关键字创建新的 `Uploader` 对象时运行一次。请记住，方法名前有两个下划线字符。让我们为 `Uploader`\
    \ 声明一个构造方法，以便在创建新的 `Uploader` 对象时，`filename` 和 `fileData` 属性能从 `$_FILES` 获取值。\n\
    \n```php\n<?php\nclass Uploader {\n    public $filename;\n    public $fileData;\n\
    \    public $destination;\n\n    public function __construct( $key ) {\n     \
    \   $this->filename = $_FILES[$key]['name'];\n        $this->fileData = $_FILES[$key]['tmp_name'];\n\
    \    }\n\n    public function saveIn( $folder ) {\n        $this->destination\
    \ = $folder;\n    }\n\n    public function save() {\n        // 此处尚无代码\n    }\n\
    }\n?>\n```\n\n**清单 4-14** `ImageUploader.class.php`\n\n请记住，我们必须知道用于上传文件的 `<input\
    \ type=\"file\">` 元素的 `name` 属性。正如我们之前发现的，我们需要 `name` 属性来访问 `$_FILES` 中的所有文件数据。在上述代码中，构造方法使用\
    \ `$key` 作为参数。`$key` 值将用于将 `name` 属性值传递给构造方法。这样，构造方法就能访问上传文件的所有元数据。\n\n### 保存上传的文件\n\
    \n`Uploader` 类已接近完成。我们需要完成保存新文件的方法，并验证要上传的文件是否有效。请记住，始终要为意外情况做好准备。在执行文件上传时，我们可能会遇到一个常见问题：目标文件夹可能不可写。我们可以在代码中为此做好准备。\n\
    \n```php\n<?php\nclass ImagesUploader {\n    public $filename;\n    public $fileData;\n\
    \    public $destination;\n    public $keyValue;\n\n    public function __construct(\
    \ $key ) {\n        $this->keyValue = $key;\n        $this->filename = $_FILES[$key]['name'];\n\
    \        $this->fileData = $_FILES[$key]['tmp_name'];\n    }\n\n    public function\
    \ saveIn( $folder ) {\n        $this->destination = $folder;\n    }\n\n    public\
    \ function save() {\n        $variableName = $this->keyValue;\n        $tmp =\
    \ $_FILES[$this->keyValue]['tmp_name'];\n        $folderIsWriteAble = is_writable(\
    \ $this->destination );\n        $notValid = checkImageFile($tmp, $variableName);\n\
    \        if( !$notValid and $folderIsWriteAble) {\n            $name = \"$this->destination/$this->filename\"\
    ;\n            $success = move_uploaded_file( $this->fileData, $name );\n    \
    \    } else {\n            $success = false;\n        }\n        return $success;\n\
    \    }\n}\n?>\n```\n\n**清单 4-15** `ImagesUploader.class.php`\n\n让我们看一下这些更改：\n\n\
    ```php\nrequire_once \"views/checkImageFile.php\";\n```\n\n先前用于检查图像有效性的函数已稍作修改，删除了函数调用，现在该调用将在\
    \ `ImagesUploader` 类的 `save` 方法中执行。包含验证方法的新文件名是 `checkImageFile.php`。\n\n```php\n\
    $variableName = $this->keyValue;\n$tmp = $_FILES[$this->keyValue]['tmp_name'];\n\
    $folderIsWriteAble = is_writable( $this->destination );\n$notValid = checkImageFile($tmp,\
    \ $variableName);\nif( !$notValid and $folderIsWriteAble) {\n    $name = \"$this->destination/$this->filename\"\
    ;\n    $success = move_uploaded_file( $this->fileData, $name );\n```\n\n变量 `$variableName`\
    \ 和 `$tmp` 在 `save` 方法中设置，其值与原始检查文件方法中设置的值相同。同时，使用 PHP 的 `is_writable` 函数来确定文件将要移动到的目录是否可写。如果文件通过验证且目录可写，则\
    \ `if` 语句产生 `true` 结果，文件被移动到永久位置。\n\n```php\n} else {\n    $success = false;\n\
    }\nreturn $success;\n```\n\n如果出现问题，则执行 `if` 语句的 `else` 部分。我们将 `$success` 设置为 `false`，表示出现问题，并将\
    \ `$success` 的值（`true` 或 `false`）返回给调用程序。\n\n### 使用上传器类\n\n现在我们可以有效使用 `Uploader`\
    \ 类来上传文件了。代码量不大，因为大部分代码都写在 `Uploader` 类内部。\n\n```php\n<?php\nfunction upload()\
    \ {\n    $uploader = new ImagesUploader( \"image-data\" );\n    $uploader->saveIn(\"\
    imgs\");\n    $fileUploaded = $uploader->save();\n    if ( $fileUploaded ) {\n\
    \        $out = \"新文件已上传到图片库\";\n    } else {\n        $out = \"出现错误\";\n    }\n\
    \    return $out;\n}\n$info = upload();\n?>\n```\n\n**清单 4-16** `imagesUpload.php`\n\
    \n> **注意：** 以下文件已进行了微小调整以访问当前版本：`ImagesUploader.class.php`、`imageslistnavigation.php`、`imageslistindex.php`、`imagesUploadForm.php`。请花些时间查看发布商提供的这些文件的更改。"
  raw: "```\nmove_uploaded_file( $fileName, $destination );\n```\n\nThe function *move_uploaded_files*\
    \ will accomplish this task.\nIt takes two arguments. The first, `$fileName`,\
    \ should\nhold the valid temporary file name (located in tmp_name in the $_File\n\
    associate array). The second, `$destination`, is the\nfolder to store the file\
    \ permanently. This location must be writable and\nalready exist. The function\
    \ `move_uploaded_file()`\nwill return `TRUE`, if the file was\nsaved successfully,\
    \ and `FALSE`, if something\nwent wrong.\n\nPlanning an Uploader Class\nYou will\
    \ write code to upload files many times in your life as a PHP\nor full stack developer.\
    \ It would be a clever idea to write some code\nfor uploading in such a way that\
    \ you can easily reuse it in later\nprojects. Objects are easily reused, so let\
    \ us plan a class we can reuse\nanytime we want to upload files.\n\nUML\n\n*UML*\
    \  \nprovides a simple diagram for planning how to organize a class. The\nbasic\
    \ design is shown in the following.\n\n![](images/323857_3_En_4_Chapter/323857_3_En_4_Fig8_HTML.jpg)\n\
    \nThe image reflects basic unified modeling language, it contains class\nname,\
    \ property and methods.\n\nFigure 4-8\nBasic UML diagram\n\nRemember, class names\
    \ always begin the first name with an uppercase\nletter. If the class name is\
    \ a compound word, we can uppercase the first\nletter for each additional word.\
    \ We can also choose to separate each\nwith an underscore. If the class is in\
    \ a separate file from the main\nprogram, the file name which contains the class\
    \ should be the same name\nas the class itself.\n\nNote\n\nUML is an acronym for\
    \ “Unified Modeling Language.” The language\nprovides a standard syntax for documenting\
    \ code. There is more to UML\nthan just class diagrams. For more information on\
    \ UML, visit [`www.uml.org`](http://www.uml.org) .\n\nUploader Class Requirements\n\
    \nAs we discovered, we will need to save file data received from a form by\nmoving\
    \ it from the temporary directory to a permanent location. Thus,\nthe class needs\
    \ a property for storing the file metadata and a method\nfor saving the file.\
    \ The method will need a file name, so let us create\na `$filename`\nproperty.\
    \ We also need to save it someplace, so let us create a property\nto remember\
    \ the location called `$destination` and a\nmethod to save it. We can now begin\
    \ to plan our new class definition .\n\n![](images/323857_3_En_4_Chapter/323857_3_En_4_Fig9_HTML.jpg)\n\
    \nThe image represents the unified modeling language uploader class\ndiagram.\n\
    \nFigure 4-9\nUML diagram of the `Uploader` class\n\nWith a plan and a UML class\
    \ diagram, it is easy to get started writing\nthe class definition. Let us create\
    \ a new file, `classes/Uploader.class.php`,\nas follows:\n\n```\ndestination =\
    \ $folder;\n}\npublic function save(){\n//no code here yet\n}\n}\n?>\nListing\
    \ 4-13\nUploader.class.php\n```\n\nThe preceding code declares a class with a\
    \ class name and class code\nblock delimited with curly braces. Inside the class,\
    \ there are three\nproperties and two methods declared. It makes it much easier\
    \ to create a\nclass when we have already created a UML class diagram.\nThe property\
    \ `destination` will get\nits value whenever the method `saveIn` is called. The\n\
    properties `filename` and `fileData` do not\ncurrently have any values. We can\
    \ retrieve both `filename` and `fileData` values from\nthe superglobal array `$_FILES`.\
    \ It would be\nnice if they got values whenever a new `Uploader` object was\n\
    created, so their values reflect whatever file we wanted to upload at\nthat point.\n\
    \nThe Magic Method `__`construct()\n\nIt just so happens that we can use the *__construct()*\
    \  *constructor method*\n to accomplish our task. It will run only once, whenever\
    \ a new\n`Uploader` object\nis created, using the new keyword. Remember there\
    \ are *two underscore\ncharacters* before the method name. Let us declare a constructor\n\
    method for the `Uploader`, so `filename` and `fileData` properties\ncan get their\
    \ values from `$_FILES` whenever a\nnew `Uploader`\nobject is created.\n\n```\n\
    filename = $_FILES[$key]['name'];\n$this->fileData = $_FILES[$key]['tmp_name'];\n\
    }\npublic function saveIn( $folder ) {\n$this->destination = $folder;\n}\npublic\
    \ function save(){\n//no code here yet\n}\n}\n?>\nListing 4-14\nImageUploader.class.php\n\
    ```\n\nRemember, we must know the name attribute of the <input\ntype=\"file\"\
    > element used to upload a file. As we discovered earlier,\nwe need the name attribute\
    \ to access all file data in $_FILES. In the\npreceding code, the constructor\
    \ method uses $key as an argument. The\n$key value will be used to pass the name\
    \ attribute value into the\nconstructor. With that in place, the constructor method\
    \ can access all\nthe metadata for the uploaded file.\n\nSaving the Uploaded File\n\
    \nThe `Uploader`\nclass is getting close to completion. We need to complete the\
    \ method for\nsaving  the new\nfile and verify that the file we are attempting\
    \ to upload is valid.\nRemember to always prepare for the unexpected. There is\
    \ one frequent\nproblem we are likely to come across while performing file uploads:\
    \ the\ndestination folder might not be writable. We can prepare for it in our\n\
    code.\n\n```\nkeyValue = $key;\n$this->filename = $_FILES[$key]['name'];\n$this->fileData\
    \ = $_FILES[$key]['tmp_name'];\n}\npublic function saveIn( $folder ) {\n$this->destination\
    \ = $folder;\n}\npublic function save(){\n$variableName = $this->keyValue;\n$tmp\
    \ = $_FILES[$this->keyValue]['tmp_name'];\n$folderIsWriteAble = is_writable( $this->destination\
    \ );\n$notValid = checkImageFile($tmp, $variableName);\nif( !$notValid and $folderIsWriteAble)\
    \ {\n$name = \"$this->destination/$this->filename\";\n$success = move_uploaded_file(\
    \ $this->fileData, $name );\n} else {\n$success = false;\n}\nreturn $success;\n\
    }\n}\n?>\nListing 4-15\nImagesUploader.class.php\n```\n\nLet’s look at the changes.\n\
    \n```\nrequire_once \"views/checkImageFile.php\";\n```\n\nThe previous function\
    \ to check the validity of the image has been\nslightly modified by removing the\
    \ call to the function, which will now\noccur in the save method in the ImagesUploader\
    \ class. The new name of\nthe file containing the verify method is checkImageFile.php\
    \ .\n\n```\n$variableName = $this->keyValue;\n$tmp = $_FILES[$this->keyValue]['tmp_name'];\n\
    $folderIsWriteAble = is_writable( $this->destination );\n$notValid = checkImageFile($tmp,\
    \ $variableName);\nif( !$notValid and $folderIsWriteAble) {\n$name = \"$this->destination/$this->filename\"\
    ;\n$success = move_uploaded_file( $this->fileData, $name );\n```\n\nThe $variableName\
    \ and $tmp variables are set within the save method,\nwith the same values as\
    \ they were previously set in the original check\nfile method. Also, the PHP is_writable\
    \ function is used to determine if\nthe directory in which the file will be moved\
    \ is writable. If the file\npasses verification and the directory is writable,\
    \ the if statement\nproduces a true result and the file is moved to the permanent\
    \ location.\n\n```\n} else {\n$success = false;\n}\nreturn $success;\n}\n```\n\
    \nIf there is a problem, the else part of the if statement is executed.\nWe have\
    \ set $success to false, which indicates there is a problem, and\nhave passed\
    \ the value in $success (true or false) back to the calling\nprogram.\n\nUsing\
    \ the Uploader Class\n\nWe can now put the `Uploader` class  to effective use\n\
    and upload a file. It does not take a lot of code because most code is\nwritten\
    \ inside the `Uploader` class.\n\n```\n$uploader = new ImagesUploader( \"image-data\"\
    \ );\n$uploader->saveIn(\"imgs\");\n$fileUploaded = $uploader->save();\nif ( $fileUploaded\
    \ ) {\n$out = \"New file uploaded to Images Gallery\";\n} else {\n$out = \"Something\
    \ went wrong\";\n}\nreturn $out;\n}\n$info = upload();\n?>\nListing 4-16\nimagesUpload.php\n\
    ```\n\nNote\n\nMinor adjustments have occurred in the following files to access\
    \ the\ncurrent versions: ImagesUploader.class.php, imageslistnavigation.php,\n\
    imageslistindex.php, imagesUploadForm.php. Take the time to view these\nchanges\
    \ from the files provided by the publisher."
