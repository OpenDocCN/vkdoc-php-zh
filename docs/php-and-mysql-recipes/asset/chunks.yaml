    \ = $b;\n\n$c->a++;\n\necho $b->a . \"\\n\";\n\n$d = clone $b;\n\n$d->a++;\n\n\
    echo $b->a . \"\\n\";\n\necho $d->a . \"\\n\";\n```\n\n现在，在复制所有成员变量后，代码会调用`__clone()`方法。因此，在克隆后，`$d`的成员`a`会被设置为\
    \ 0，然后递增为 1，并且仍然不会影响原始对象。\n\n# 配方 2-14：将对象用作函数\n\n## 问题\n\nPHP 支持可变函数名。这使得可以将函数名存储在字符串`$a\
    \ = \"MyFunction\";`中，并通过`$a();`语法执行该函数。如果该变量包含一个对象，PHP 将生成运行时错误。\n\n## 解决方案\n\
    \n在类上定义魔术方法`__invoke()`将导致该对象在作为函数使用时执行该方法。\n\n## 工作原理\n\n在下面的示例中，当对象作为函数被调用时，它将对其自身使用`var_dump()`函数。\n\
    \n```php\n<?php\n\n// 2_21.php\n\nclass foo {\n\n    private $a = 5;\n\n    function\
    \ __invoke() {\n\n        var_dump($this);\n\n    }\n\n}\n\n$a = new foo();\n\n\
    $a();\n```\n\n该脚本的输出如下：\n\n```\nobject(foo)#1 (1) {\n  [\"a\":\"foo\":private]=>\n\
    \  int(5)\n}\n```\n\n# 配方 2-15：方法重载\n\n## 问题\n\nPHP 不支持像其他语言那样的方法重载——即同一个方法名在同一个类中可以使用多次，但参数列表不同。\n\
    \n## 解决方案\n\n与变量或属性可以通过`__get()`和`__set()`魔术方法进行重载的方式相同，方法也可以被重载。这通过`__call()`和`__callStatic()`来实现。\n\
    \n如果定义了这些函数，并且使用对象来调用一个不存在的成员函数，则会调用这些函数之一。如果该成员在对象上下文中被调用，将使用`__call()`；当该方法在静态上下文中被调用时，将使用`__callStatic()`。以下示例展示了如何实现方法重载。它还演示了重载方法的方法名将按原样处理（区分大小写），而不是像普通函数和方法那样通常作为不区分大小写的名称处理。\n\
    \n## 工作原理\n\n在下一个示例中，我们创建了一个名为`MethodOverload`的类，并定义了处理方法重载的函数。\n\n```php\n<?php\n\
    \n// 2_22.php\n\nclass MethodOverload {\n\n    private function call($name, $param,\
    \ $context) {\n\n        switch ($name) {\n\n            case 'f1' :\n\n     \
    \       case 'f2' :\n\n                echo \"You called $name in $context context\\\
    n\";\n\n                break;\n\n            default :\n\n                trigger_error(\"\
    Undefined method '$name'\", E_USER_NOTICE);\n\n                break;\n\n    \
    \    }\n\n    }\n\n    function __call($name, $param) {\n\n        $this->call($name,\
    \ $param, 'object');\n\n    }\n\n    static function __callStatic($name, $params)\
    \ {\n\n        self::call($name, $param, 'static');\n\n    }\n\n    static function\
    \ abc() {\n\n        echo \"abc() called\\n\";\n\n    }\n\n}\n\n$a = new MethodOverload();\n\
    \n$a->f1();\n\nMethodOverload::f2();\n\nMethodOverload::F2();\n\nMethodOverload::ABC();\n\
