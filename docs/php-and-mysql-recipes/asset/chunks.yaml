    \    sin($lat1)*cos($lat2)*cos($lon2 - $lon1)));\n    return $b < 0 ? 360 + $b\
    \ : $b;\n}\n\n$p1 = array('lon' => -74.0059, 'lat' => 40.7128);\n$p2 = array('lon'\
