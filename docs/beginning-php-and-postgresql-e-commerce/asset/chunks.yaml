    weblog/2005/04/php_single_and_double_quotes.php.


    **Starting the HatShop Project**


    So far, we have dealt with theory regarding the application you’re going to create.
    It was fun, but it’s going to be even more interesting to put into practice what
    you’ve learned up until now.


    Start your engines!


    **Installing the Required Software**


    The code in this book has been tested with


    • PHP 5.1


    • Apache 2.2


    • PostgreSQL 8.1


    ■**Caution** The code is most likely to be compatible with newer versions of the
    mentioned software, but it won’t work with versions of PHP older than PHP 5.


    The project should work with other web servers as well, as long as they’re compatible
    with PHP 5.1 (see http://www.php.net/manual/en/installation.php). However, Apache
    is the web server of choice for the vast majority of PHP projects.


    See Appendix A for detailed installation instructions for PHP, Apache, and PostgreSQL.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


