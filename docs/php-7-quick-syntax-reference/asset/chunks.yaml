- fmt: '```php

    echo $myBool;      // ""

    echo (int)$myBool; // "0"

    ```


    允许的强制类型转换参见表 [19-1](#A317139_2_En_19_Chapter.html#Tab1)。


    表 19-1. 允许的类型转换


    | 名称 | 描述 |

    | --- | --- |

    | `(int)`, `(integer)` | 强制转换为 `int` |

    | `(bool)`, `(boolean)` | 强制转换为 `bool` |

    | `(float)`, `(double)`, `(real)` | 强制转换为 `float` |

    | `(string)` | 强制转换为 `string` |

    | `(array)` | 强制转换为 `array` |

    | `(object)` | 强制转换为 `object` |

    | `(unset)` | 强制转换为 `null` |


    举例来说，数组类型转换会将标量类型转换为包含单个元素的数组。其功能与使用数组构造函数相同。


    ```php

    $myInt = 10;

