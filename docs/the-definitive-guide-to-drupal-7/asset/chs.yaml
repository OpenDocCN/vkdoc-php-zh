  \ 'favicon',\n        2 => 'name',\n        3 => 'slogan',\n        4 => 'node_user_picture',\n\
  \        5 => 'comment_user_picture',\n        6 => 'comment_user_verification',\n\
  \        7 => 'main_menu',\n        8 => 'secondary_menu',\n      ),\n      'screenshot'\
  \ => 'themes/bartik/screenshot.png',\n      'php' => '5.2.5',\n      'scripts' =>\n\
  \      array (\n      ),\n      'overlay_regions' =>\n      array (\n        0 =>\
  \ 'dashboard_main',\n        1 => 'dashboard_sidebar',\n      ),\n      'regions_hidden'\
  \ =>\n      array (\n        0 => 'page_top',\n        1 => 'page_bottom',\n   \
  \   ),\n      'overlay_supplemental_regions' =>\n      array (\n        0 => 'page_top',\n\
  \      ),\n    ),\n     'stylesheets' =>\n    array (\n      'all' =>\n      array\
  \ (\n        'css/layout.css' => 'themes/bartik/css/layout.css',\n        'css/style.css'\
  \ => 'themes/bartik/css/style.css',\n        'css/colors.css' => 'themes/bartik/css/colors.css',\n\
  \      ),\n      'print' =>\n      array (\n        'css/print.css' => 'themes/bartik/css/print.css',\n\
  \      ),\n    ),\n     'engine' => 'phptemplate',\n  )),\n// ...\n)\n```\n\n以上代码位于\
  \ `xray_help_admin_appearance()` 中（文件路径：`/home/ben/code/dgd7/web/sites/default/modules/xray/xray.module`，第\
  \ 109 行）。\n\nGarland、Seven、Stark 和 Test 主题，以及 Update 测试基础主题都已从此输出中移除。你可能从未听说过测试主题；它们在这个数组中有一个额外的属性：`hidden`，其值为\
  \ `TRUE`。你需要考虑到这一点，不要将它们与常规主题一起列出（参见清单 19-7）。\n\n**清单 19-7.** 用于统计和显示隐藏主题数量的初始代码\n\
  \n\n\n`/**`\n` * 获取主题相关信息。`\n` */`\n`function xray_stats_enabled_themes() {`\n`\
  \  $themes = list_themes();`\n`  // 初始化用于收集数据的变量。`\n`  $num_hidden = 0; // 隐藏主题的数量。`\n\
  `  // 遍历每个主题，收集所需的数据。`\n`  foreach ($themes as $themename => $theme) {`\n`    //\
  \ 统计每个隐藏主题。`\n`    if (isset($theme->info['hidden']) && $theme->info['hidden'])\
  \ {`\n`      $num_hidden++;`\n`    }`\n`  }`\n`  return compact('num_hidden');`\n\
  `}`\n\n`/**`\n` * 管理/外观页面的帮助文本。`\n` */`\n`function _xray_help_admin_appearance()\
  \ {`\n`  $output = '';`\n`  $data = xray_stats_enabled_themes();`\n`  $output .=\
  \ format_plural(`\n`    $data['num_hidden'],`\n`    '有 1 个隐藏主题。',`\n`    '有@count\
  \ 个隐藏主题。'`\n`  );`\n`  return theme('xray_help', array('text' => $output));`\n`}`\n\
  \n`$num_hidden` 变量初始设置为零。`foreach` 函数遍历主题数组，在 `if` 语句内部，每处理一个隐藏主题就对 `$num_hidden`\
  \ 变量加一。`$num_hidden++` 是 `$num_hidden = $num_hidden + 1` 的简写形式。`if` 语句通过检查主题信息数组中是否存在\
  \ `'hidden'` 项*并且*其值等于 TRUE 来识别隐藏主题。必须使用第一个 `isset()` 函数，否则 PHP 会在你要求它查找不存在的信息时报错；非隐藏主题的信息数组中不一定包含\
  \ `'hidden'` 项。如果该项不存在，`if` 语句会立即退出并执行下一段代码。（在此例中，即继续执行 `foreach` 循环，循环结束后返回你正在收集的信息。）如果\
  \ `'hidden'` 项*确实*存在，`isset()` 函数返回 TRUE，那么 `if` 语句继续执行第二个表达式（在 `&&` 之后），并读取 `$theme->info['hidden']`\
  \ 的值。如果此值也计算为 TRUE（数字 `1` 也是如此），则运行 `if` 语句内的代码。\n\n![images](img/square.jpg) **提示**\
  \ 如果第一个表达式返回 TRUE，则 `&&` 连接的两个表达式都必须被求值；但如果第一个表达式返回 FALSE，则可以立即停止求值（因为无论第二个表达式是什么，组合结果都是\
  \ FALSE，而 `&&` 是在问“这个表达式 AND 那个表达式都为 TRUE 吗？”）。这与 `||` 连接的两个表达式相反。这里，如果第一个表达式为 TRUE，则无需对下一个表达式求值；如果第一个表达式为\
  \ FALSE，则需要对下一个表达式求值，因为只要第一个*或*第二个为 TRUE，整个条件就成立。\n\n`compact()` 函数会从已命名的变量（如果存在）中创建一个数组，这就是你要返回的值。这里只返回了\
  \ `'num_hidden'`（它使用 `$num_hidden` 变量），但它也可以是一个包含多个变量名的列表，你将在下一个代码清单中看到。\n\n你只想要隐藏主题的计数，但你会向管理员展示其他主题的更多信息。为此，你需要继续查看主题对象中的信息。查看清单\
  \ 19–7 中 Bartik 的数据输出，一个明显重要的属性是状态，它表示主题是否已启用（1）或未启用（0）。其余大部分有趣信息都嵌套在 info 数组的更深处。区域、功能和样式表至少都是你可以轻松计算的东西。它们都在数组中，这意味着你可以使用\
  \ `count()` 函数，如清单 19–8 所示。（有关该函数的定义，请参阅 `php.net/count`。）\n\n***清单 19–8.** 从主题数据数组中提取和汇总信息*\n\
  \n`/**`\n` * 获取主题相关信息。`\n` */`\n`function xray_stats_enabled_themes() {`\n`  $themes\
  \ = list_themes();`\n`  $num_themes = count($themes);`\n`  // 初始化用于收集数据的变量。`\n`\
  \  $num_hidden = 0; // 隐藏主题的数量。`\n`  $num_enabled = 0;`\n`  $summaries = array();`\n\
  `  // 遍历每个主题，收集所需的数据。`\n`  foreach ($themes as $themename => $theme) {`\n`    //\
  \ 不为隐藏主题收集统计数据，但保留其计数。`\n`    if (isset($theme->info['hidden']) && $theme->info['hidden'])\
  \ {`\n`      $num_hidden++;`\n`    }`\n`    else {  // 这是一个可见主题。`\n`      if ($theme->status)\
  \ {`\n`        $num_enabled++;`\n`        // 这是一个已启用主题，提供更多统计信息。`\n`        $summaries[$theme->info['name']]\
  \ = array(`\n`          'regions' => count($theme->info['regions']),`\n`       \
  \   'overlay_regions' => count($theme->info['overlay_regions']),`\n`          'regions_hidden'\
  \ => count($theme->info['regions_hidden']),`\n`          'features' => count($theme->info['features']),`\n\
  `          'kindsofstylesheets' => count($theme->info['stylesheets']),`\n`     \
  \     'allstylesheets' => isset($theme->info['stylesheets']['all']) ? count($theme->info['stylesheets']['all'])\
  \ : 0,`\n`        );`\n`      }`\n`    }`\n`  }`\n`  return compact('num_themes',\
  \ 'num_hidden', 'num_enabled', 'summaries');`\n`}`\n\n这个更大的函数中使用的所有内容刚刚都讨论过了；它发生在同一个\
  \ `foreach` 循环中，使用了 `++` 简写（注意变量先定义），以及 `count()` 来返回数组中的元素数量。最后使用了三元运算符和 `isset()`，仅在存在\
  \ `'all'` 子数组时才对 `'stylesheets'` 的 `'all'` 子数组进行计数，否则返回零。用于显示所有这些主题信息的代码，请参见 `dgd7.org/262`！\n\
  \n![images](img/square.jpg) **提示** 在开源自由软件社区工作的一个巨大好处是，你可以期待其他人看到并评论你的代码，并提出改进建议。不过，你不必被动等待这种情况发生。如果某些地方看起来不太对劲，可以在\
  \ IRC 上提问。如果你已经做了足够的研究并找到了一个或多个可能的答案，但不确定哪个是最好的答案，在开发讨论频道或论坛中，没人会介意你提出这样的问题：“我想显示一个主题列表，最简单的方法是什么？到目前为止我只找到了\
  \ `system_rebuild_theme_data()`。” 当然，能否得到答案取决于是否有人知道答案，但一个有趣的问题可以激发人们去探究答案，即使他们原本不知道！如果你的问题可以用“是”或“否”来回答（例如“有没有更好的方法来做\
  \ X？”），这表明你可以更好地措辞。试着这样问：“我想做 X，并且已经尝试了 Y 和 Z。最好的方法是什么？”\n\n\n\n### 使用 `hook_menu()`\
  \ 创建页面\n\n定义一个完整的页面是让你感受创建自定义模块威力的方式之一。你可以将页面放在任何你想要的路径上，并在那里显示任何内容，同时仍然保留 Drupal\
  \ 提供的所有周边设计、区块、登录功能以及其他一切。\n\n![images](img/square.jpg) **提示** 请查阅示例项目（`drupal.org/project/examples`）中的\
  \ `menu_example` 模块以及 `api.drupal.org/hook_menu`，以获取关于 `hook_menu()` 的纯事实实现，并参阅第\
  \ 29 章以了解更多关于菜单（路由）系统在 Drupal 中的作用。\n\n当然，你可以创建一个节点并使用 Path 模块将其放置在几乎任何你想要的路径上。但用户可编辑的节点并不适合存储模块提供的信息。而且，Drupal\
  \ 是如何理解底层的 `node/1883` 路径，从而在你访问时向你显示 ID 为 1883 的节点的呢？没错：就是 `hook_menu`。如果你想建立自己的、更好的系统来处理数据片段，你可以定义路径\
  \ `megabetternodes/`，它接收 *字母* 而非数字形式的参数，比如 `megabetternode/rg`。这是个糟糕的主意；节点系统非常出色，并且可以通过\
  \ Node API 钩子（`api.drupal.org/api/group/node_api_hooks/7`）、字段以及许多其他优秀特性轻松扩展，试图复制它是不明智的。但事实仍然是，Drupal\
  \ 所有主要的子系统，但凡拥有专门用于显示实体的路径（例如 `node/`、`user/`、`taxonomy/term/`），都是由 `hook_menu()`\
  \ 提供的，并且它赋予了你同样的能力。\n\n让我们从一个更适度的目标开始。X-ray 模块需要一个属于自己的页面。这个页面将显示你之前通过 `hook_help()`\
  \ 在某些管理页面上显示的所有信息，甚至更多。\n\n### 为管理页面选择路径\n\n你该给这个页面什么路径呢？在一个像 Drupal 这样可扩展且流行的系统中，你总是必须尽量避免命名空间冲突——两个页面不能拥有相同的路径。因此，最佳实践是将你的模块名称合并到由模块创建的路径中，因为托管在\
  \ `drupal.org` 上的每个项目都有一个唯一的系统名称。\n\n![images](img/square.jpg) **注意** 在模块提供的路径中使用模块系统名称的惯例，在\
  \ Drupal 核心中由 Node 模块和 Contact 模块等遵循。无论是面向用户的路径（如 `node/99` 或 `contact`）还是管理路径（如\
  \ `admin/content/node` 和 `admin/structure/contact`）都是如此。（User 模块有面向用户的路径如 `user/3/edit`\
  \ 和 `user/register`，但自 Drupal 7 起，其管理页面位于 `admin/people` 和 `admin/config/people`。这个故事给我们的启示：有时，核心可以做那些你不应该自己去做的事情。）\n\
  \n按照目前的构想，X-ray 模块是为管理员设计的。因此，它应该显示在站点的管理区域中，也就是路径下所有以 `admin/` 开头的页面。但你还没做完——像\
  \ `admin/xray` 这样的路径借助 `hook_menu()` 的力量完全可以实现，但这样做相当冒失。这就像是在说你的模块与整个配置部分（`admin/config`）或模块列表（`admin/modules`）一样重要！你必须更仔细地观察，并与其他模块和谐共处。\n\
  \nDrupal 核心中的每个模块都将其管理页面归入以下类别，即管理菜单项的顶级：仪表盘、内容、结构、外观、人员、模块、配置、报告和帮助。实际上，对于大多数模块管理页面来说，最佳选择是在“结构”和“配置”部分之间，大多数情况下是在“配置”下。然而，X-ray\
  \ 有点不同。它提供关于站点的信息，因此自然归属于“报告”菜单。这将使你的页面路径为 `admin/reports/xray`。\n\n### 通过常规菜单项定义页面\n\
  \n现在你知道你想把页面放在哪里了；你只需要把它放在那里。在 Drupal 中显示的每个页面（无论是节点、管理页面还是其他任何内容）的根源都是 `hook_menu()`。\n\
  \n![images](img/square.jpg) **注意** Drupal 的菜单系统命名并不准确，因为它所做的远不止菜单。除了使 Drupal 中的每个页面成为可能（无论它们是否在任何菜单中有链接），`hook_menu()`\
  \ 最终负责每一个路径，无论它是否返回一个页面。某些用于 AJAX 请求的路径仅返回少量数据。\n\n与每个 Drupal 钩子或 Drupal 函数一样，你可以通过在\
  \ Drupal API 网站地址后添加它来获得关于 `hook_menu()` 的极佳文档。例如：`api.drupal.org/hook_menu`，它会重定向到\
  \ `api.drupal.org/api/function/hook_menu/7`。\n\n你也可以在大多数模块的 `.module` 文件中寻找 `hook_menu()`\
  \ 的示例，包括前面提到的关于其管理路径的核心模块，如 Node 模块和 Contact 模块。\n\n让我们看看 `node.module` 文件，它位于 Drupal\
  \ 代码下载包中的 `modules/node` 文件夹内。`hook_menu()` 的实现必须返回一个包含一个或多个菜单项的数组。菜单项本身也是数组。Drupal\
  \ 喜欢数组。（以及数组的数组的数组的数组的数组。如果你每 5 到 10 行不写一个数组，你很可能做错了什么。）我将在列表 19-9 之后讨论它们的结构。\n\n\
  **列表 19–9.** Node 模块 `hook_menu()` 实现的摘录\n\n```\n/**\n * 实现 hook_menu()。\n */\n\
  function node_menu() {\n  $items['admin/content'] = array(\n    'title' => '内容',\n\
  \    'description' => '查找和管理内容。',\n    'page callback' => 'drupal_get_form',\n \
  \   'page arguments' => array('node_admin_content'),\n    'access arguments' =>\
  \ array('access content overview'),\n    'weight' => -10,\n    'file' => 'node.admin.inc',\n\
  \  );\n// ...\n  return $items;\n}\n```\n\n![images](img/square.jpg) **警告** 查看核心或其他\
  \ Drupal 代码中的示例是学习的好方法，但你永远不能期望你所查看的任何特定代码段能够与你的需求一一对应。\n\n菜单项数组以至关重要的路径作为键；上面代码片段中菜单项的路径是\
  \ `admin/content`。\n\n菜单项数组中的第一个元素是标题。（PHP 和 Drupal 不关心键控数组中元素的顺序，但 Drupal 开发者通过将标题放在第一位来表明其重要性。）如果存在，`description`\
  \ 元素通常列在第二位。对于页面，即默认类型为 `MENU_NORMAL_ITEM` 的菜单项，描述用于指向该页面的菜单链接上的标题文本（悬停工具提示）。它也会显示在管理列表中。然而，在标准的\
  \ Drupal 安装中，你通常不会在路径 `admin` 处或悬停在工具栏的“内容”链接上看到文本“查找和管理内容。”，因为 Comment 模块在其 `hook_menu_alter()`\
  \ 实现中将 `admin/content` 的描述更改为“管理内容和评论。”。\n\n![images](img/square.jpg) **注意** 自 Drupal\
  \ 7 起，菜单项的标题和描述默认会通过 `t()` 函数处理，因此你无需像处理模块中所有其他面向用户的文本那样，自己将它们包裹在 `t()` 函数中。通过将标题回调设置为其他函数或\
  \ `FALSE`，可以将标题交由不同函数处理或不处理。在这种情况下，你应该自行处理通过翻译函数提供的运行文本。描述则始终会通过 `t()` 处理。\n\n\n\
  \n#### 排版后的内容\n\n菜单项不一定需要标题，但某些元素必须存在才能使菜单项发挥实际作用；所需元素取决于菜单项的目的。显示页面时最重要的元素是页面回调（`page\
  \ callback`）。当访问菜单项的路径时，Drupal 会调用页面回调中指定的函数。该页面回调函数必须提供页面的主要内容。\n\n![images](img/square.jpg)\
  \ **提示** Node 模块在 `file` 属性上展示了一个巧妙的技巧。在菜单项中加入 `'file' => filename.extension` 会告诉\
  \ Drupal 包含该命名文件。这使得 `pagecallback` 中的函数可以位于该外部文件中，而不必放在 `.module` 文件中。这有助于你以合理的方式组织复杂模块的代码，将与某个页面功能相关的函数分组到同一个文件中。同时，它还能通过排除不需要加载和解析的代码来提升\
  \ Drupal 的性能（在没有 APC 等操作码缓存的站点上）。这就是为什么 Drupal 经常将与管理相关的代码放在单独的文件中，正如这里对 `admin/content`\
  \ 路径和 `node.admin.inc` 文件所做的那样。与显示节点（内容）、分类术语或区块的代码不同，管理节点的代码仅当具有足够权限的用户访问此页面时才需要加载。\n\
  \n清单 19–9 中的代码摘录是 Node 模块在其长而复杂的 `hook_menu()` 实现中定义的第一个菜单项，它为你想要实现的目标提供了一个很好的模型。它定义了一个完整的管理部分（虽然你可能不想这么做），但你只需在路径中添加内容即可将其降低一个层级；正如前面讨论的，不再使用\
  \ `admin/content`，而是使用 `admin/reports/xray`。\n\n### 使用本地任务菜单项定义选项卡\n\n你可以就此打住，但\
  \ Node 模块通过第二个菜单项做了一些很酷的事情。它仅用五行代码定义，如清单 19–10 所示。\n\n***清单 19–10.** Node 模块 hook_menu()\
  \ 实现摘录：定义的第二个菜单项*\n\n```\n$items['admin/content/node'] = array(\n    'title' =>\
  \ 'Content',\n    'type' => MENU_DEFAULT_LOCAL_TASK,\n    'weight' => -10,\n  );\n\
  ```\n\n这第二个菜单项提供了一个默认选中的选项卡。这就是 `MENU_DEFAULT_LOCAL_TASK` 类型的解释方式。第一个菜单项未指定 `type`\
  \ 属性，因此它默认为 `MENU_NORMAL_ITEM`（即一个页面），这样第一个菜单项定义的页面就可以通过多个选项卡进行扩展（参见图 19–1）。\n\n\
  ![images](img/1901.jpg)\n\n***图 19–1.** Content 本地任务（选项卡）由 Node 模块的 `admin/content/node`\
  \ 菜单项提供。*\n\n本地任务的工作原理是，它们会作为选项卡显示在你扩展的页面上。由于它是默认的本地任务，无论你访问 `admin/content` 还是\
  \ `admin/content/node`，页面都是一样的。\n\n你将利用这一点，使你的页面不仅是一个页面，而且还是 X-ray 报表的“概述”选项卡。这样，你就可以轻松地添加更多、更深入的报表页面作为额外的选项卡。\n\
  \n![images](img/square.jpg) **注意** Drupal 不会为本地任务显示任何描述（Drupal 将它们主题化为选项卡时，甚至不会显示链接标题的工具提示文本）。这在\
  \ Drupal 8 中可能会有所改变（`drupal.org/node/948416`），但对于 Drupal 7，建议避免混淆，为类型为 `MENU_LOCAL_TASK`\
  \ 或 `MENU_DEFAULT_LOCAL_TASK` 的菜单项省略 `description` 元素。\n\n### 为 X-ray 模块声明菜单项\n\n\
  在大量铺垫之后，清单 19–11 展示了你自己的菜单声明。\n\n***清单 19–11.** X-ray 模块的 hook_menu() 实现*\n\n```\n\
  /**\n * Implements hook_menu().\n */\nfunction xray_menu() {\n  $items['admin/reports/xray']\
  \ = array(\n    'title' => 'X-ray technical site overview',\n    'description' =>\
  \ 'See the internal structure of this site.',\n    'page callback' => 'xray_overview_page',\n\
  \    'access callback' => TRUE,\n  );\n  $items['admin/reports/xray/overview'] =\
  \ array(\n    'title' => 'Overview',\n    'description' => \"Technical overview\
  \ of the site's internals.\",\n    'type' => MENU_DEFAULT_LOCAL_TASK,\n    'weight'\
  \ => -10,\n  );\n  return $items;\n}\n```\n\n![images](img/square.jpg) **陷阱** 要使你的菜单项（以及页面）出现，必须清空\
  \ `menu_router` 表。**保存模块页面（不启用或禁用任何模块）已不再能完成此操作（就像在 Drupal 6 中那样）。** 你可以直接将 `menu_rebuild()`\
  \ 函数放入你的代码中——但注意要放在 `hook_menu()` 实现之外，因为该钩子仅在菜单重建时才会被调用！（参见 `data.agaric.com/node/3376`\
  \ 了解如何在模块页面无变化时跳过刷新所有缓存的代码。）可靠的 `drush cc all`（或更精确的 `drush cc menu`）也能重建菜单。\n\n\
  我还没有解释菜单声明中的所有细节。每个新路径的一个非常重要的部分是访问控制。换句话说，用户能否查看页面（或访问其他回调）？`access callback` 通常是一个函数，如果允许访问则返回\
  \ `TRUE`，如果拒绝访问则返回 `FALSE`。（默认情况下，它是 `user_access()` 函数，因此 Drupal 可以直接在 `access\
  \ arguments` 中传入一个权限名称，以评估给定用户的角色是否有权访问该菜单项。）通过将 `access callback` 的值设置为 `TRUE`，你可以绕过所有这些检查，使页面始终对任何人可见。这并不推荐，但在你选择或定义一个权限之前，它可以作为权宜之计。\n\
  \n![images](img/square.jpg) **警告** 菜单项默认拒绝访问。如果你不为 `access callback` 或 `access arguments`\
  \ 属性提供任何值，那么你的菜单项（包括尝试访问其定义的页面）将被所有人拒绝——甚至包括用户 1（通常用户 1 可以绕过访问检查）。\n\n作为一个定义管理页面的菜单项，X-ray\
  \ 模块的 `admin/reports/xray` 应该限制对授权用户的访问。要设置此访问权限，你可以使用 `hook_permission()` 创建一个新权限，或者复用一个现有权限。\n\
  \n\n\n### 在模块中使用现有权限\n\n权限管理页面（`admin/people/permissions`）是 Drupal——乃至任何内容管理系统中——最令人生畏的配置页面之一。Drupal\
  \ 精细的权限系统是一大优势，但这也意味着需要面对一个庞大的复选框网格，才能为每个角色配置所有权限。对于基于 Drupal 核心默认安装配置文件的新站点，这仅仅涉及三个角色（横向排列）和大约\
  \ 60 个权限（纵向排列），如图 19-2 所示。\n\n![images](img/1902.jpg)\n\n**图 19-2.** 全新 Drupal 核心默认安装配置文件的权限配置页面顶部\n\
  \n随着站点角色数量的增加，以及功能与权限数量的同步增长，这个页面在视觉上会变得更加令人眼花缭乱。每个新增的内容类型都会增加独立的创建、编辑和删除权限，此外，每个内容类型还有针对内容作者的额外编辑和删除权限。\n\
  \nDrupal 的常规准则是*有疑问时，使其可配置或可扩展*。换句话说，不要试图猜测别人需要的用例；相反，要努力让一切成为可能。如果有选项，就提供它。然而，当涉及到管理选项，特别是权限时，我倾向于避免增加“复选框之墙”的规模，除非存在明确的用例。需要特定权限的人可以提交一个\
  \ issue 来申请；对于不寻常的用例，需要更细粒度权限的站点开发者可以创建自己的权限，并通过 `hook_menu_alter()` 修改现有菜单项来使页面要求该权限。\n\
  \n![images](img/square.jpg) **注意** 当你确实想创建自己的一个或多个权限时，`hook_permission()` 是一个非常直观的钩子，正如\
  \ `system.module` 中的示例所示，该示例文档位于 `api.drupal.org/hook_permission`。\n\n因此，你想要重用现有权限，而不是创建自己的权限。但这有一个问题。你在管理\
  \ ![images](img/U001.jpg) 人员的权限标签页（`admin/people/permissions`）中看到的权限，其名称与你的模块必须使用的系统名称或内部名称并不完全相同。首先，所有内部名称（几乎总是）只包含小写字母，但单词也可能不同。这不是你可以猜测的事情；访问将被拒绝，因为没有用户能拥有一个不存在的权限（除了用户\
  \ 1，它无视用户访问检查）。\n\n![images](img/square.jpg) **注意** 从 7 版本开始，权限具有人类可读的名称和描述。这对人类来说很棒，但你们这些试图编写与机器对话代码的开发者，却有点被冷落了。\n\
  \n毫无疑问，会有一个模块用于匹配权限的人类可读名称与内部系统名称——实际上，你会将这个功能整合到 X-ray 中——但作为开发者，即使你总是使用便捷工具，也应该知道如何在没有辅助模块的情况下获取这些信息。\n\
  \n#### 在数据库中查找权限的系统名称\n\n资深 Drupal 开发者 Moshe Weitzman 提倡将探索数据库作为理解 Drupal（无论是整体上还是在特定站点情况下）的一种方式。要列出所有权限的内部名称，你可以从查看\
  \ Drupal 站点的数据库开始。查看其中的所有表（通过命令行，如代码清单 19-12 所示，或使用 phpMyAdmin 等更图形化的应用程序），你会发现\
  \ `role_permission` 表是唯一名称中提及权限的表。然后，你可以查看 `role_permission` 表内部，以了解它所持有的权限。\n\n\
  **代码清单 19-12.** 用于列出 Drupal 数据库表和权限系统名称的 SQL 命令\n\n```\nmysql\nmysql> SHOW DATABASES;\n\
  mysql> USE d7scratch;\nmysql> SHOW TABLES;\nmysql> SELECT * FROM role_permission\
  \ WHERE rid=3;\n```\n\n![images](img/square.jpg) **提示** 代码清单 19-12 中的命令行步骤对 SQL\
  \ 命令使用了所有大写字母，以帮助区分命令和数据库、表、字段名称等信息；但是，你不需要全部大写输入 SQL 命令，而且不按 Shift 或 CapsLk 键会容易得多。\n\
