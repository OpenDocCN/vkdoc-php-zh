    >\n            Name: <input type=\"text\" name=\"name\" /><br/><br/>\n       \
    \     Email address: <input type=\"text\" name=\"email_add\" /><br/><br/>\n  \
    \          <input type=\"submit\" value=\"Submit\" />\n        </form>\n    </body>\n\
    </html>\n```\n\n该表单有两个输入框，分别名为 `name` 和 `email_add`。表单的 `action` 指向一个 PHP 文件 `display.php`。用于传递数据（`name`\
    \ 和 `email_add`）的 HTTP 方法是 GET。\n\n要在脚本之间传递信息，有三个作为数据载体的数组：`$_GET`、`$_POST` 和\
    \ `$_REQUEST`。接下来你将逐一了解这些数组是如何用于传输数据的。\n\n## 使用 `$_GET` 数组\n\n`$_GET` 数组用于存储先前表单通过\
    \ HTTP GET 方法发送的数据。先前表单发送的数据以键值对的形式呈现：变量名和对应的值。\n\n请参考代码清单 2-2 中所示的表单。当用户点击其中的“提交”按钮时，浏览器地址栏中的\
    \ URL 将显示如下：\n\n`http://localhost/display.php?name=john&email_add=john@yahoo.com`\n\
    \n你可以看到，该 URL 显示了所有正在传递的信息。目标 PHP 脚本 `display.php` 现在可以通过代码从 `$_GET` 数组中提取数据，如代码清单\
    \ 2-6 所示。\n\n代码清单 2-6. 从 `$_GET` 数组访问信息的表单 (`display.php`)\n\n```\n<html>\n  \
    \  <head>\n    </head>\n    <body>\n        Welcome <?php echo $_GET[\"name\"\
    ]; ?>.<br>\n        Your email address is <?php echo $_GET[\"email_add\"]; ?>\n\
    \    </body>\n</html>\n```\n\n这段代码通过 `$_GET` 数组访问由 `userinfo.php` 传递的姓名和电子邮件地址，并将它们显示在屏幕上，如图\
    \ 2-4 所示。\n\n![A978-1-4842-1672-9_2_Fig4_HTML.jpg](img/A978-1-4842-1672-9_2_Fig4_HTML.jpg)\n\
    \n图 2-4. 在另一个表单上显示的用户姓名和电子邮件地址\n\n## 使用 `$_POST` 数组\n\n`$_POST` 数组用于收集通过 HTTP\
    \ POST 方法从表单发送的值。要使用 POST 方法传递数据，你只需将在代码清单 2-2 所示的 `userinfo.php` 脚本中，表单的 `method`\
    \ 属性中的 GET 替换为 POST 即可。\n\n如前所述，在 POST 方法中，`$_POST` 数组收集表单中的值。这也意味着当用户点击“提交”按钮时，`$_POST[\"\
    name\"]` 和 `$_POST[\"email_add\"]` 变量将自动填充他们在两个输入框中输入的数据。\n\n要在目标 PHP 脚本 `display.php`\
    \ 中显示姓名和电子邮件地址，你需要将 `$_GET` 数组替换为 `$_POST` 数组，如代码清单 2-7 所示。\n\n代码清单 2-7. 从 `$_POST`\
    \ 数组访问信息的表单 (`display.php`)\n\n```\n<html>\n    <head>\n    </head>\n    <body>\n\
    \        Welcome <?php echo $_POST[\"name\"]; ?>.<br>\n        Your email address\
    \ is <?php echo $_POST[\"email_add\"]; ?>\n    </body>\n</html>\n```\n\n除了 `$_GET`\
    \ 和 `$_POST` 之外，还有一个用于存储当前表单信息的数组，它叫做 `$_REQUEST`。\n\n## 使用 `$_REQUEST` 数组\n\n\
    `$_REQUEST` 数组包含 `$_GET` 和 `$_POST` 的内容。也就是说，它用于收集通过 GET 或 POST 方法发送数据的表单中的信息。\n\
    \n因此，如果你不确定源 PHP 脚本使用了哪种 HTTP 方法，明智的做法是使用 `$_REQUEST` 数组来访问信息。要在 `display.php`\
    \ 脚本中通过 `$_REQUEST` 数组显示姓名和电子邮件地址，只需将（代码清单 2-7 中的）`$_POST` 替换为 `$_REQUEST`，如代码清单\
    \ 2-8 所示。\n\n代码清单 2-8. 从 `$_REQUEST` 数组访问信息的表单 (`display.php`)\n\n```\n<html>\n\
    \    <head>\n    </head>\n    <body>\n        Welcome <?php echo $_REQUEST[\"\
    name\"]; ?>.<br />\n        Your email address is <?php echo $_REQUEST[\"email_add\"\
    ]; ?>\n    </body>\n</html>\n```\n\n现在你已经了解了表单的创建方式以及可用的 HTTP 方法。一个表单的信息也可以传递到另一个表单。接下来，你将利用目前已掌握的知识，创建一个允许用户在网站上注册的注册表单。\n"
- fmt: "# Creating the Sign-Up Form\n\nA sign-up form enables users to register on\
    \ your site. A sign-up form usually prompts users to enter an e-mail address,\
    \ password, complete name, address, cell phone number, etc. This information is\
    \ then stored in a database for future use.\n\nOnce their data is stored in a\
    \ database, users don’t have to re-enter it. It will be automatically fetched\
    \ upon a successful login. The PHP script, `signup.php`, is shown in Listing [2-9](#A978-1-4842-1672-9_2_Chapter.html#FPar10).\n\
    \nListing 2-9. Sign-Up Form for Creating a New Account (`signup.php`)\n\n```html\n\
    <html>\n<head>\n</head>\n<body>\n    <form action=\"addcustomer.php\" method=\"\
    post\">\n        <table border=\"0\" cellspacing=\"1\" cellpadding=\"3\">\n  \
    \          <tr><td colspan=\"2\" align=\"center\">Enter your information</td></tr>\n\
    \            <tr><td>Email Address: </td><td><input size=\"20\" type=\"text\"\
    \ name=\"emailaddress\"></td></tr>\n            <tr><td>Password: </td><td><input\
    \ size=\"20\" type=\"password\" name=\"password\"></td></tr>\n            <tr><td>ReType\
    \ Password:  </td><td><input size=\"20\" type=\"password\" name=\"repassword\"\
    ></td></tr>\n            <tr><td>Complete Name  </td><td><input size=\"50\" type=\"\
    text\" name=\"complete_name\"></td></tr>\n            <tr><td>Address:  </td><td><input\
    \ size=\"80\" type=\"text\" name=\"address1\"></td></tr>\n            <tr><td></td><td><input\
    \ size=\"80\" type=\"text\" name=\"address2\"></td></tr>\n            <tr><td>City:\
    \  </td><td><input size=\"30\" type=\"text\" name=\"city\"></td></tr>\n      \
    \      <tr><td>State:  </td><td><input size=\"30\" type=\"text\" name=\"state\"\
    ></td></tr>\n            <tr><td>Country:  </td><td><input size=\"30\" type=\"\
    text\" name=\"country\"></td></tr>\n            <tr><td>Zip Code:  </td><td><input\
    \ size=\"20\" type=\"text\" name=\"zipcode\"></td></tr>\n            <tr><td>Phone\
    \ No:  </td><td><input size=\"30\" type=\"text\" name=\"phone_no\"></td></tr>\n\
    \            <tr><td><input type=\"submit\" name=\"submit\" value=\"Submit\"></td><td>\n\
    \            <input type=\"reset\" value=\"Cancel\"></td></tr>\n        </table>\n\
    \    </form>\n</body>\n</html>\n```\n\nThe output of this PHP script is shown\
    \ in Figure [2-5](#A978-1-4842-1672-9_2_Chapter.html#Fig5). You can see that several\
    \ text boxes are displayed so the users can enter their e-mail addresses, passwords,\
    \ complete names, address, city, state, country, Zip code, and phone number. The\
    \ data entered in the respective text boxes is passed to the `addcustomer.php`\
    \ script for storing the information in the table. The form is submitted by using\
    \ the HTTP POST request method. Recall that `$_POST` is an array that stores the\
    \ variable names and values sent by the HTTP POST method. It also means that in\
    \ the `addcustomer.php` script, the information about the new user will be retrieved\
    \ via `$_POST` array.\n\n![A978-1-4842-1672-9_2_Fig5_HTML.jpg](A978-1-4842-1672-9_2_Fig5_HTML.jpg)\n\
    \nFigure 2-5. Sign-up form for creating new account\n\nThis PHP script seems perfectly\
    \ okay if the user supplies essential information like an e-mail address, password,\
    \ etc. correctly. What if the user leaves some of the essential boxes blank?\n\
    \nThe previous PHP script does not apply validation checks. Next, let’s learn\
    \ how to apply validation checks to the sign-up form.\n\n## Applying Validation\
    \ Checks\n\nFor providing correct input to your application, data validation is\
    \ a must. Data validation is the process of ensuring that data entered into a\
    \ web form is correct and in the desired format. Data validation includes checking\
    \ whether:\n\n*   Data is entered in the required fields. No essential field is\
    \ left blank.\n*   No mistake is made when entering data. For example, no text\
    \ is entered into a numerical field and vice versa.\n*   Data is entered in the\
    \ desired format. For example, a date is entered in the required format.\n\nYou\
    \ will be using JavaScript to apply validation checks to the sign-up form. The\
    \ PHP script, `validatesignup.php`, is shown in Listing [2-10](#A978-1-4842-1672-9_2_Chapter.html#FPar11).\n\
    \nListing 2-10. Sign-Up Form for Creating a New Account (`validatesignup.php`)\n\
    \n```html\n<html>\n<head>\n<script language=\"JavaScript\" type=\"text/JavaScript\"\
    \ src=\"checkform.js\"></script>\n</head>\n<body>\n<form action=\"addcustomer.php\"\
    \ method=\"post\" onsubmit=\"return validate(this);\">\n<table border=\"0\" cellspacing=\"\
    1\" cellpadding=\"3\">\n<tr><td colspan=\"2\" align=\"center\">Enter your information</td></tr>\n\
    <tr><td>Email Address: </td><td><input size=\"20\" type=\"text\" name=\"emailaddress\"\
    \ ><span id=\"emailmsg\"></span></td></tr>\n<tr><td>Password: </td><td><input\
    \ size=\"20\" type=\"password\" name=\"password\" ><span id=\"passwdmsg\"></span></td></tr>\n\
    <tr><td>ReType Password:  </td><td><input size=\"20\" type=\"password\" name=\"\
    repassword\"><span id=\"repasswdmsg\"></span></td></tr>\n<tr><td>Complete Name\
    \  </td><td><input size=\"50\" type=\"text\" name=\"complete_name\" ><span id=\"\
    usrmsg\"></span></td></tr>\n<tr><td>Address:  </td><td><input size=\"80\" type=\"\
    text\" name=\"address1\"></td></tr>\n<tr><td></td><td><input size=\"80\" type=\"\
    text\" name=\"address2\"></td></tr>\n<tr><td>City:  </td><td><input size=\"30\"\
    \ type=\"text\" name=\"city\"></td></tr>\n<tr><td>State:  </td><td><input size=\"\
    30\" type=\"text\" name=\"state\"></td></tr>\n<tr><td>Country:  </td><td><input\
    \ size=\"30\" type=\"text\" name=\"country\"></td></tr>\n<tr><td>Zip Code:  </td><td><input\
    \ size=\"20\" type=\"text\" name=\"zipcode\"></td></tr>\n<tr><td>Phone No:  </td><td><input\
    \ size=\"30\" type=\"text\" name=\"phone_no\"></td></tr>\n<tr><td><input type=\"\
    submit\" name=\"submit\" value=\"Submit\"></td><td>\n<input type=\"reset\" value=\"\
    Cancel\"></td></tr>\n</table>\n</form>\n</body>\n</html>\n```\n\nThe first statement\
    \ to mention imports the JavaScript file, `checkform.js`, into the current web\
    \ page:\n\n```html\n<script language=\"JavaScript\" type=\"text/JavaScript\" src=\"\
    checkform.js\"></script>\n```\n\nBecause JavaScript is used in this chapter, you\
    \ need a quick introduction to it.\n\nJavaScript is a programming language that\
    \ is used for extending a web site’s functionality by allowing for dynamic pages\
    \ and implementing validation checks. A few of JavaScript’s features are:\n\n\
    *   It’s a lightweight, interpreted programming language.\n*   It usually executes\
    \ on the client machine, hence it consumes less server resources and avoids excessive\
    \ server traffic.\n*   It’s quite fast in delivering responses. Because it processes\
    \ and executes on the client’s machine, it delivers the response faster than other\
    \ server-side scripting languages.\n*   It is relatively easy to learn because\
    \ its syntax is close to English.\n\nThe JavaScript file, `checkform.js`, contains\
    \ the code to validate different fields in the `validatesignup.php` file.\n\n\
    There are two ways to include JavaScript in a web page:\n\n*   Place the JavaScript\
    \ in the `<head>` element.\n*   Place the JavaScript in a separate file, save\
    \ it with the extension `.js`, and then use the `<script>` element to include\
    \ the code file. (By including the JavaScript file, its code will be merged in\
    \ the HTML at that location.) This approach is preferred, as it keeps HTML code\
    \ clean and all the JavaScript code in one place."
