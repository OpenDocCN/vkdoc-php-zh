    当我们开始使用 `use` 语句时，就抵消了这一好处，反而向全局命名空间中添加了更多内容。如果是在命名空间块内使用（例如 `namespace ACME\TNT
    { use ACME\Glue as Glue; }`），这倒不是问题；但如果 `use` 语句位于全局命名空间中，情况就不那么乐观了。我们取消设置这些变量，也是不希望它们污染全局命名空间。


    3. 为框架内的类添加自动配置功能，可以让其他开发人员在不修改代码的情况下自定义这些类的行为。


    4. 布局提供了一种为视图赋予一致框架的方法，无需重复任何标记。一个很好的例子就是使用布局来创建导航。


