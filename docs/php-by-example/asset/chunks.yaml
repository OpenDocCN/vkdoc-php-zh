    ```


    在程序执行期间，系统会提示用户输入一个数字。该数字保存到 `$number` 变量中。以下代码包含在 `try` 块中，并使用两个简化形式的条件语句。第一个条件检查
    `$number>0` 条件。如果为真，则 `throw new Exception("一个正数")` 命令会抛出 `Exception` 类的异常。`new
    Exception("一个正数")` 语句创建了一个 `Exception` 类的匿名对象。传递给类构造函数的字符串描述了抛出的异常。


    > **注意**

    >

    > 匿名对象是其引用不存储在任何变量中的对象。


    第二个条件语句测试 `$number<0` 条件。如果条件为真，则 `throw new Exception("一个负数")` 命令会抛出 `Exception`
    类的异常。与上一种情况不同，这里为异常使用了另一种描述。`try` 块中的最后一个命令是 `echo "零值"` 语句。


    如果在执行代码时抛出了异常，则 `try` 块中的代码会终止，并开始执行 `catch` 块中的代码。该块中有一条单独的 `echo $e->getMessage()`
    命令，它会显示与抛出的异常相关联的消息（创建异常对象时传递给构造函数的文本）。`getMessage()` 方法从 `$e` 异常对象中获取消息字符串。


    如果在执行 `try` 块中的代码时没有抛出异常，则最终执行 `echo "零值"` 命令，并且 `catch` 块被忽略。


    根据用户输入的数字，程序执行时会产生三种可能的结果。如果用户输入一个正数，结果如下所示（用户输入的值以粗体显示）。


