- fmt: "### The Problem\n\nIn the example that has dominated this chapter, I have\
    \ set up a relationship between `Venue`, `Space`, and `Event` objects. When a\
    \ `Venue` object is created, it is automatically given a `SpaceCollection` object.\
    \ If I were to list every `Space` object in a `Venue`, this would automatically\
    \ kick off a database request to acquire all the `Events` associated with each\
    \ `Space`. These are stored in an `EventCollection` object. If I don’t wish to\
    \ view any events, I have nonetheless made several journeys to the database for\
    \ no reason. With many venues, each with two or three spaces, and with each space\
    \ managing tens, perhaps hundreds, of events, this is a costly process.\n\nClearly,\
    \ we need to throttle back this automatic inclusion of collections in some instances.\n\
    \nHere is the code in `SpaceMapper` that acquires `Event` data:\n\n```\n// listing\
    \ 13.27\n// SpaceMapper\nprotected function doCreateObject(array $raw): DomainObject\n\
    {\n    $obj = new Space((int)$raw['id'], $raw['name']);\n    $venmapper = new\
    \ VenueMapper();\n    $venue = $venmapper->find((int)$raw['venue']);\n    $obj->setVenue($venue);\n\
    \    $eventmapper = new EventMapper();\n    $eventcollection = $eventmapper->findBySpaceId((int)$raw['id']);\n\
    \    $obj->setEvents($eventcollection);\n    return $obj;\n}\n```\n\nThe `doCreateObject()`\
    \ method first acquires the `Venue` object with which the space is associated.\
    \ This is not costly because it is almost certainly already stored in the `ObjectWatcher`\
    \ object. Then the method calls the `EventMapper::findBySpaceId()` method. This\
    \ is where the system could run into problems.\n\n### Implementation\n\nAs you\
    \ may know, a Lazy Load means to defer acquisition of a property until it is actually\
    \ requested by a client.\n\nThe easiest way of doing this is to make the deferral\
    \ explicit in the containing object. Here’s how I might do this in the `Space`\
    \ object:\n\n```\n// listing 13.28\n// Space\npublic function getEvents2()\n{\n\
    \    if (is_null($this->events)) {\n        $this->events = $this->getFinder()->findByScaceId($this->getId());\n\
    \    }\n    return $this->events;\n}\n```\n\nThis method checks to see whether\
    \ or not the `$events` property is set. If it isn’t set, then the method acquires\
    \ a finder (that is, a `Mapper`) and uses its own `$id` property to get the `EventCollection`\
    \ with which it is associated. Clearly, for this method to save us a potentially\
    \ unnecessary database query, I would also need to amend the `SpaceMapper` code,\
    \ so that it does not automatically preload an `EventCollection` object, as it\
    \ did in the preceding example!\n\nThis approach will work just fine, although\
    \ it is a little messy. Wouldn’t it be nice to tidy the mess away?\n\nThis brings\
    \ us back to the `Iterator` implementation that goes to make the `Collection`\
    \ object. I am already hiding one secret behind that interface (the fact that\
    \ raw data may not yet have been used to instantiate a domain object at the time\
    \ a client accesses it). Perhaps I can hide still more.\n\nThe idea here is to\
    \ create an `EventCollection` object that defers its database access until a request\
    \ is made of it. This means that a client object (such as `Space`, for example)\
    \ need never know that it is holding an empty `Collection` in the first instance.\
    \ As far as a client is concerned, it is holding a perfectly normal `EventCollection`.\n\
    \nHere is the `DeferredEventCollection` object:\n\n```\n// listing 13.29\nclass\
    \ DeferredEventCollection extends EventCollection\n{\n    private $stmt;\n   \
    \ private $valueArray;\n    private $run = false;\n\n    public function __construct(\n\
    \        Mapper $mapper,\n        \\PDOStatement $stmt_handle,\n        array\
    \ $valueArray\n    ) {\n        parent::__construct([], $mapper);\n        $this->stmt\
    \ = $stmt_handle;\n        $this->valueArray = $valueArray;\n    }\n\n    public\
    \ function notifyAccess()\n    {\n        if (! $this->run) {\n            $this->stmt->execute($this->valueArray);\n\
    \            $this->raw = $this->stmt->fetchAll();\n            $this->total =\
    \ count($this->raw);\n        }\n        $this->run = true;\n    }\n}\n```\n\n\
    As you can see, this class extends a standard `EventCollection`. Its constructor\
    \ requires `Mapper` and `PDOStatement` objects and an array of terms that should\
    \ match the prepared statement. In the first instance, the class does nothing\
    \ but store its properties and wait. No query has been made of the database.\n\
    \nYou may remember that the `Collection` base class defines the empty method called\
    \ `notifyAccess()` that I mentioned in the “Data Mapper” section. This is called\
    \ from any method whose invocation is the result of a call from the outside world.\n\
    \n`DeferredEventCollection` overrides this method. Now if someone attempts to\
    \ access the `Collection`, the class knows it is time to end the pretense and\
    \ acquire some real data. It does this by calling the `PDOStatement::execute()`\
    \ method. Together with `PDOStatement::fetch()`, this yields an array of fields\
    \ suitable for passing along to `Mapper::createObject()`.\n\nHere is the method\
    \ in `EventMapper` that instantiates a `DeferredEventCollection`:\n\n```\n// listing\
    \ 13.30\n// EventMapper\npublic function findBySpaceId(int $sid)\n{\n    return\
    \ new DeferredEventCollection(\n        $this,\n        $this->selectBySpaceStmt,\n\
    \        [$sid]\n    );\n}\n```\n\n### Consequences\n\nLazy loading is a good\
    \ habit to get into, whether or not you explicitly add deferred loading logic\
    \ to your domain classes.\n\nOver and above type safety, the particular benefit\
    \ of using a collection rather than an array for your properties is the opportunity\
    \ this gives you to retrofit lazy loading should you need it.\n\n## Domain Object\
    \ Factory\n\nThe Data Mapper pattern is neat, but it does have some drawbacks.\
    \ In particular a `Mapper` class takes a lot on board. It composes SQL statements;\
    \ it converts arrays to objects; and, of course, it converts objects back to arrays,\
    \ ready to add data to the database. This versatility makes a `Mapper` class convenient\
    \ and powerful. It can reduce flexibility to some extent, however. This is especially\
    \ true when a mapper must handle many different kinds of queries or when other\
    \ classes need to share a `Mapper`’s functionality. For the remainder of this\
    \ chapter, I will decompose Data Mapper, breaking it down into a set of more focused\
    \ patterns. These finer-grained patterns combine to duplicate the overall responsibilities\
    \ managed in Data Mapper, and some or all can be used in conjunction with that\
    \ pattern. They are well defined by Clifton Nock in *Data Access Patterns* (Addison\
    \ Wesley, 2003), and I have used his names where overlaps occur.\n\nLet’s start\
    \ with a core function: the generation of domain objects.\n\n### The Problem\n\
    \nYou have already encountered a situation in which the `Mapper` class displays\
    \ a natural fault line. The `createObject()` method is used internally by `Mapper`,\
    \ of course, but `Collection` objects also need it to create domain objects on\
    \ demand. This requires us to pass along a `Mapper` reference when creating a\
    \ `Collection` object. Although there’s nothing wrong with allowing callbacks\
    \ (as you have seen in the Visitor and Observer patterns), it’s neater to move\
    \ responsibility for domain object creation into its own type. This can then be\
    \ shared by `Mapper` and `Collection` classes alike.\n\nThe Domain Object Factory\
    \ is described in *Data Access Patterns*."
  raw: '### The Problem


    In the example that has dominated this chapter, I have set up a relationship between
    `Venue`, `Space`, and `Event` objects. When a `Venue` object is created, it is
    automatically given a `SpaceCollection` object . If I were to list every `Space`
    object in a `Venue`, this would automatically kick off a database request to acquire
    all the `Events` associated with each `Space`. These are stored in an `EventCollection`
    object. If I don’t wish to view any events, I have nonetheless made several journeys
    to the database for no reason. With many venues, each with two or three spaces,
    and with each space managing tens, perhaps hundreds, of events, this is a costly
    process.


    Clearly, we need to throttle back this automatic inclusion of collections in some
    instances.


    Here is the code in `SpaceMapper` that acquires `Event` data:


    ```

    // listing 13.27

    // SpaceMapper

    protected function doCreateObject(array $raw): DomainObject

    {

    $obj = new Space((int)$raw[''id''], $raw[''name'']);

    $venmapper = new VenueMapper();

    $venue = $venmapper->find((int)$raw[''venue'']);

    $obj->setVenue($venue);

    $eventmapper = new EventMapper();

    $eventcollection = $eventmapper->findBySpaceId((int)$raw[''id'']);

    $obj->setEvents($eventcollection);

    return $obj;

    }

    ```


    The `doCreateObject()` method first acquires the `Venue` object with which the
    space is associated. This is not costly because it is almost certainly already
    stored in the `ObjectWatcher` object. Then the method calls the `EventMapper::`
    `findBySpaceId()` method . This is where the system could run into problems.


    ### Implementation


    As you may know, a Lazy Load means to defer acquisition of a property until it
    is actually requested by a client.


    The easiest way of doing this is to make the deferral explicit in the containing
    object. Here’s how I might do this in the `Space` object :


    ```

    // listing 13.28

    // Space

    public function getEvents2()

    {

    if (is_null($this->events)) {

    $this->events = $this->getFinder()->findByScaceId($this->getId());

    }

    return $this->events;

    }

    ```


    This method checks to see whether or not the `$events` property is set. If it
    isn’t set, then the method acquires a finder (that is, a `Mapper`) and uses its
    own `$id` property to get the `EventCollection` with which it is associated. Clearly,
    for this method to save us a potentially unnecessary database query, I would also
    need to amend the `SpaceMapper` code, so that it does not automatically preload
    an `EventCollection` object , as it did in the preceding example!


    This approach will work just fine, although it is a little messy. Wouldn’t it
    be nice to tidy the mess away?


    This brings us back to the `Iterator` implementation that goes to make the `Collection`
    object. I am already hiding one secret behind that interface (the fact that raw
    data may not yet have been used to instantiate a domain object at the time a client
    accesses it). Perhaps I can hide still more.


    The idea here is to create an `EventCollection` object that defers its database
    access until a request is made of it. This means that a client object (such as
    `Space`, for example) need never know that it is holding an empty `Collection`
    in the first instance. As far as a client is concerned, it is holding a perfectly
    normal `EventCollection`.


    Here is the `DeferredEventCollection` object:


    ```

    // listing 13.29

    class DeferredEventCollection extends EventCollection

    {

    private $stmt;

    private $valueArray;

    private $run = false;

    public function __construct(

    Mapper $mapper,

    \PDOStatement $stmt_handle,

    array $valueArray

    ) {

    parent::__construct([], $mapper);

    $this->stmt = $stmt_handle;

    $this->valueArray = $valueArray;

    }

    public function notifyAccess()

    {

    if (! $this->run) {

    $this->stmt->execute($this->valueArray);

    $this->raw = $this->stmt->fetchAll();

    $this->total = count($this->raw);

    }

    $this->run = true;

    }

    }

    ```


    As you can see, this class extends a standard `EventCollection`. Its constructor
    requires `Mapper` and `PDOStatement` objects and an array of terms that should
    match the prepared statement. In the first instance, the class does nothing but
    store its properties and wait. No query has been made of the database.


    You may remember that the `Collection` base class defines the empty method called
    `notifyAccess()` that I mentioned in the “Data Mapper” section. This is called
    from any method whose invocation is the result of a call from the outside world.


    `DeferredEventCollection` overrides this method. Now if someone attempts to access
    the `Collection`, the class knows it is time to end the pretense and acquire some
    real data. It does this by calling the `PDOStatement::execute()` method. Together
    with `PDOStatement::fetch()`, this yields an array of fields suitable for passing
    along to `Mapper::createObject()`.


    Here is the method in `EventMapper` that instantiates a `DeferredEventCollection`
    :


    ```

    // listing 13.30

    // EventMapper

    public function findBySpaceId(int $sid)

    {

    return new DeferredEventCollection(

    $this,

    $this->selectBySpaceStmt,

    [$sid]

    );

    }

    ```


    ### Consequences


    Lazy loading is a good habit to get into, whether or not you explicitly add deferred
    loading logic to your domain classes.


    Over and above type safety, the particular benefit of using a collection rather
    than an array for your properties is the opportunity this gives you to retrofit
    lazy loading should you need it.


    ## Domain Object Factory


    The Data Mapper pattern is neat, but it does have some drawbacks. In particular
    a `Mapper` class takes a lot on board. It composes SQL statements; it converts
    arrays to objects; and, of course, it converts objects back to arrays, ready to
    add data to the database. This versatility makes a `Mapper` class convenient and
    powerful. It can reduce flexibility to some extent, however. This is especially
    true when a mapper must handle many different kinds of queries or when other classes
    need to share a `Mapper`’s functionality. For the remainder of this chapter, I
    will decompose Data Mapper, breaking it down into a set of more focused patterns.
    These finer-grained patterns combine to duplicate the overall responsibilities
    managed in Data Mapper, and some or all can be used in conjunction with that pattern.
    They are well defined by Clifton Nock in Data Access Patterns (Addison Wesley,
    2003), and I have used his names where overlaps occur.


    Let’s start with a core function: the generation of domain objects.


    ### The Problem


    You have already encountered a situation in which the `Mapper` class displays
    a natural fault line. The `createObject()` method is used internally by `Mapper`,
    of course, but `Collection` objects also need it to create domain objects on demand.
    This requires us to pass along a `Mapper` reference when creating a `Collection`
    object. Although there’s nothing wrong with allowing callbacks (as you have seen
    in the Visitor and Observer patterns), it’s neater to move responsibility for
    domain object creation into its own type. This can then be shared by `Mapper`
    and `Collection` classes alike.


    The Domain Object Factory is described in Data Access Patterns.'
  trans: "\n### 问题\n\n在本章主导的示例中，我建立了 `Venue`、`Space` 和 `Event` 对象之间的关系。当创建一个 `Venue`\
    \ 对象时，它会自动获得一个 `SpaceCollection` 对象。如果我要列出某个 `Venue` 中的每一个 `Space` 对象，这将自动触发一次数据库请求，以获取与该\
    \ `Space` 关联的所有 `Events`。这些事件存储在一个 `EventCollection` 对象中。即使我不想查看任何事件，我也已经毫无理由地多次访问了数据库。面对众多场所，每个场所有两三个空间，每个空间管理着数十甚至上百个事件，这是一个代价高昂的过程。\n\
    \n显然，在某些情况下，我们需要限制这种自动包含集合的行为。\n\n以下是 `SpaceMapper` 中获取 `Event` 数据的代码：\n\n```\n\
    // listing 13.27\n// SpaceMapper\nprotected function doCreateObject(array $raw):\
    \ DomainObject\n{\n    $obj = new Space((int)$raw['id'], $raw['name']);\n    $venmapper\
    \ = new VenueMapper();\n    $venue = $venmapper->find((int)$raw['venue']);\n \
    \   $obj->setVenue($venue);\n    $eventmapper = new EventMapper();\n    $eventcollection\
    \ = $eventmapper->findBySpaceId((int)$raw['id']);\n    $obj->setEvents($eventcollection);\n\
    \    return $obj;\n}\n```\n\n`doCreateObject()` 方法首先获取与该空间关联的 `Venue` 对象。这通常代价不高，因为它几乎肯定已经存储在\
    \ `ObjectWatcher` 对象中了。然后，该方法调用 `EventMapper::findBySpaceId()` 方法。这正是系统可能遇到问题的环节。\n\
    \n### 实现\n\n你可能知道，延迟加载是指在客户端实际请求某个属性之前，推迟对该属性的获取。\n\n实现这一点最简单的方法是在包含对象中显式地进行延迟处理。以下是我在\
    \ `Space` 对象中可能采用的做法：\n\n```\n// listing 13.28\n// Space\npublic function getEvents2()\n\
    {\n    if (is_null($this->events)) {\n        $this->events = $this->getFinder()->findBySpaceId($this->getId());\n\
    \    }\n    return $this->events;\n}\n```\n\n这个方法会检查 `$events` 属性是否已设置。如果没有，该方法会获取一个查找器（即\
    \ `Mapper`）并使用自身的 `$id` 属性来获取与之关联的 `EventCollection`。显然，为了让这个方法能节省一次可能不必要的数据库查询，我还需要修改\
    \ `SpaceMapper` 的代码，使其不再像上一个例子中那样自动预加载 `EventCollection` 对象！\n\n这种方法虽然有点杂乱，但能正常工作。能把这种杂乱清理干净岂不更好？\n\
    \n这就让我们回到了构成 `Collection` 对象的 `Iterator` 实现上。我已经在那个接口背后隐藏了一个秘密（即当客户端访问时，原始数据可能尚未用于实例化领域对象）。也许我可以隐藏更多。\n\
    \n这里的想法是创建一个`EventCollection` 对象，它将数据库访问推迟到收到请求时进行。这意味着，客户端对象（例如 `Space`）最初完全不需要知道它持有一个空的\
    \ `Collection`。对于客户端而言，它持有的是一个完全正常的 `EventCollection`。\n\n以下是 `DeferredEventCollection`\
    \ 对象：\n\n```\n// listing 13.29\nclass DeferredEventCollection extends EventCollection\n\
    {\n    private $stmt;\n    private $valueArray;\n    private $run = false;\n\n\
    \    public function __construct(\n        Mapper $mapper,\n        \\PDOStatement\
    \ $stmt_handle,\n        array $valueArray\n    ) {\n        parent::__construct([],\
    \ $mapper);\n        $this->stmt = $stmt_handle;\n        $this->valueArray =\
    \ $valueArray;\n    }\n\n    public function notifyAccess()\n    {\n        if\
    \ (! $this->run) {\n            $this->stmt->execute($this->valueArray);\n   \
    \         $this->raw = $this->stmt->fetchAll();\n            $this->total = count($this->raw);\n\
    \        }\n        $this->run = true;\n    }\n}\n```\n\n如你所见，这个类继承自标准的 `EventCollection`。它的构造函数需要\
    \ `Mapper` 和 `PDOStatement` 对象，以及一个与预处理语句参数匹配的术语数组。最初，这个类除了存储其属性并等待之外，什么也不做。没有对数据库发起任何查询。\n\
    \n你可能还记得，`Collection` 基类定义了一个空的 `notifyAccess()` 方法，我在“数据映射器”一节中提到过。这个方法会在任何由外部世界调用而触发的方法中被调用。\n\
    \n`DeferredEventCollection` 重写了这个方法。现在，如果有人试图访问这个 `Collection`，该类就知道是时候结束伪装并获取一些真实数据了。它通过调用\
    \ `PDOStatement::execute()` 方法来实现这一点。结合 `PDOStatement::fetch()`，这会生成一个适合传递给 `Mapper::createObject()`\
    \ 的字段数组。\n\n以下是在 `EventMapper` 中实例化 `DeferredEventCollection` 的方法：\n\n```\n//\
    \ listing 13.30\n// EventMapper\npublic function findBySpaceId(int $sid)\n{\n\
    \    return new DeferredEventCollection(\n        $this,\n        $this->selectBySpaceStmt,\n\
    \        [$sid]\n    );\n}\n```\n\n### 影响\n\n无论你是否显式地向领域类中添加延迟加载逻辑，养成延迟加载的习惯都是好的。\n\
    \n除了类型安全之外，为你的属性使用集合而非数组的一个特别好处是，这为你提供了在需要时重构以支持延迟加载的机会。\n\n## 领域对象工厂\n\n数据映射器模式非常简洁，但它也有一些缺点。特别是，`Mapper`\
    \ 类承担了过多的职责。它构建 SQL 语句；将数组转换为对象；当然，还将对象转换回数组，准备将数据添加到数据库。这种多功能性使得 `Mapper` 类既方便又强大。然而，这在一定程度上会降低灵活性。当映射器必须处理多种不同类型的查询，或者其他类需要共享\
    \ `Mapper` 的功能时，这一点尤为明显。在本章的剩余部分，我将分解数据映射器模式，将其拆解为一组更具针对性的模式。这些粒度更细的模式组合起来，可以共同承担数据映射器所管理的总体职责，并且它们中的部分或全部可以与数据映射器模式结合使用。这些模式由\
    \ Clifton Nock 在 *《数据访问模式》*（Addison Wesley，2003 年）中明确定义，我在重叠之处沿用了他的命名。\n\n让我们从一个核心功能开始：领域对象的生成。\n\
    \n### 问题\n\n你已经遇到过一种情况，其中 `Mapper` 类暴露出一个天然的薄弱点。`createObject()` 方法当然由 `Mapper`\
    \ 内部使用，但 `Collection` 对象也需要它来按需创建领域对象。这要求我们在创建 `Collection` 对象时传递一个 `Mapper` 引用。虽然允许回调（如你在访问者和观察者模式中所见）本身并无不妥，但将创建领域对象的职责迁移到其自己的类型中会更简洁。这样，`Mapper`\
    \ 和 `Collection` 类就可以共同享用它。\n\n领域对象工厂在 *《数据访问模式》* 中有所描述。\n"
- fmt: "### Implementation\n\nImagine a set of `Mapper` classes, broadly organized\
    \ so that each faces its own domain object. The Domain Object Factory pattern\
    \ simply requires that you extract the `createObject()` method from each `Mapper`\
    \ and place it in its own class in a parallel hierarchy. Figure [13-6](#A314621_5_En_13_Chapter.html#Fig6)\
    \ shows these new classes.\n\n![A314621_5_En_13_Fig6_HTML.gif](A314621_5_En_13_Fig6_HTML.gif)\n\
    \nFigure 13-6. Domain Object Factory classes\n\nDomain Object Factory classes\
    \ have a single core responsibility, and as such, they tend to be simple:\n\n\
    ```php\n// listing 13.31\nabstract class DomainObjectFactory\n{\n    abstract\
    \ public function createObject(array $row): DomainObject;\n}\n```\n\nHere’s a\
    \ concrete implementation:\n\n```php\n// listing 13.32\nclass VenueObjectFactory\
    \ extends DomainObjectFactory\n{\n    public function createObject(array $row):\
    \ DomainObject\n    {\n        $obj = new Venue((int)$row['id'], $row['name']);\n\
    \        return $obj;\n    }\n}\n```\n\nOf course, you might also want to cache\
    \ objects to prevent duplication and prevent unnecessary trips to the database,\
    \ as I did within the `Mapper` class. You could move the `addToMap()` and `getFromMap()`\
    \ methods here, or you could build an observer relationship between the `ObjectWatcher`\
    \ and your `createObject()` methods. I’ll leave the details up to you. Just remember,\
    \ it’s up to you to prevent clones of your domain objects running amok in your\
    \ system!\n\n### Consequences\n\nThe Domain Object Factory decouples database\
    \ row data from object field data. You can perform any number of adjustments within\
    \ the `createObject()` method. This process is transparent to the client, whose\
    \ responsibility it is to provide the raw data.\n\nBy snapping this functionality\
    \ away from the `Mapper` class, it becomes available to other components. Here’s\
    \ an altered `Collection` implementation, for example:\n\n```php\n// listing 13.33\n\
    abstract class Collection implements \\Iterator\n{\n    protected $dofact = null;\n\
    \    protected $total = 0;\n    protected $raw = [];\n    private $result;\n \
    \   private $pointer = 0;\n    private $objects = [];\n\n    // Collection\n \
    \   public function __construct(array $raw = [], DomainObjectFactory $dofact =\
    \ null)\n    {\n        if (count($raw) && ! is_null($dofact)) {\n           \
    \ $this->raw = $raw;\n            $this->total = count($raw);\n        }\n   \
    \     $this->dofact = $dofact;\n    }\n\n    // ...\n```\n\nThe `DomainObjectFactory`\
    \ can be used to generate objects on demand:\n\n```php\n// listing 13.34\nprivate\
    \ function getRow(int $num)\n{\n    // ...\n    if (isset($this->raw[$num])) {\n\
    \        $this->objects[$num] = $this->dofact->createObject($this->raw[$num]);\n\
    \        return $this->objects[$num];\n    }\n}\n```\n\nBecause Domain Object\
    \ Factories are decoupled from the database, they can be used for testing more\
    \ effectively. I might, for example, create a mock `DomainObjectFactory` to test\
    \ the `Collection` code. It’s much easier to do this than it would be to emulate\
    \ an entire `Mapper` object (you can read more about mock and stub objects in\
    \ Chapter [18](#A314621_5_En_18_Chapter.html)).\n\nOne general effect of breaking\
    \ down a monolithic component into composable parts is an unavoidable proliferation\
    \ of classes. The potential for confusion should not be underestimated. Even when\
    \ every component and its relationship with its peers is logical and clearly defined,\
    \ I often find it challenging to chart packages containing tens of similarly named\
    \ components.\n\nThis is going to get worse before it gets better. Already, I\
    \ can see another fault line appearing in Data Mapper. The `Mapper::getCollection()`\
    \ method was convenient; but once again, other classes might want to acquire a\
    \ `Collection` object for a domain type, without having to go to a database facing\
    \ class. So I have two related abstract components: `Collection` and `DomainObjectFactory`.\
    \ According to the domain object I am working with, I will require a different\
    \ set of concrete implementations: `VenueCollection` and `VenueObjectFactory`,\
    \ for example, or `SpaceCollection` and `SpaceObjectFactory`. This problem leads\
    \ us directly to the Abstract Factory pattern, of course. Figure [13-7](#A314621_5_En_13_Chapter.html#Fig7)\
    \ shows the `PersistenceFactory` class. I’ll be using this to organize the various\
    \ components that make up the next few patterns.\n\n![A314621_5_En_13_Fig7_HTML.gif](A314621_5_En_13_Fig7_HTML.gif)\n\
    \nFigure 13-7. Using the Abstract Factory pattern to organize related components\n\
    \n## The Identity Object\n\nThe mapper implementation I have presented here suffers\
    \ from a certain inflexibility when it comes to locating domain objects. Finding\
    \ an individual object is no problem. Finding all relevant domain objects is just\
    \ as easy. Anything in between, though, requires you to add a special method to\
    \ craft the query (`EventMapper::findBySpaceId()` is a case in point).\n\nAn identity\
    \ object (also called a Data Transfer Object by Alur et al.) encapsulates query\
    \ criteria, thereby decoupling the system from database syntax.\n\n### The Problem\n\
    \nIt’s hard to know ahead of time what you or other client coders are going to\
    \ need to search for in a database. The more complex a domain object, the greater\
    \ the number of filters you might need in your query. You can address this problem\
    \ to some extent by adding more methods to your `Mapper` classes on a case-by-case\
    \ basis. This is not very flexible, of course, and can involve duplication as\
    \ you are required to craft many similar but differing queries both within a single\
    \ `Mapper` class and across the mappers in your system.\n\nAn identity object\
    \ encapsulates the conditional aspect of a database query in such a way that different\
    \ combinations can be combined at runtime. Given a domain object called `Person`,\
    \ for example, a client might be able to call methods on an identity object in\
    \ order to specify a male, aged above 30 and below 40, who is less than 6 feet\
    \ tall. The class should be designed so that conditions can be combined flexibly\
    \ (perhaps you’re not interested in your target’s height, or maybe you want to\
    \ remove the lower age limit). An identity object limits a client coder’s options\
    \ to some extent. If you haven’t written code to accommodate an `income` field,\
    \ then this cannot be factored into a query without adjustment. The ability to\
    \ apply different combinations of conditions does provide a step forward in flexibility,\
    \ however. Let’s see how this might work."
  raw: '### Implementation


    Imagine a set of `Mapper` classes, broadly organized so that each faces its own
    domain object. The Domain Object Factory pattern simply requires that you extract
    the `createObject()` method from each `Mapper` and place it in its own class in
    a parallel hierarchy. Figure [13-6](#A314621_5_En_13_Chapter.html#Fig6) shows
    these new classes.


    ![A314621_5_En_13_Fig6_HTML.gif](A314621_5_En_13_Fig6_HTML.gif)


    Figure 13-6.


    Domain Object Factory classes


    Domain Object Factory classes have a single core responsibility, and as such,
    they tend to be simple:


    ```

    // listing 13.31

    abstract class DomainObjectFactory

    {

    abstract public function createObject(array $row): DomainObject;

    }

    ```


    Here’s a concrete implementation:


    ```

    // listing 13.32

    class VenueObjectFactory extends DomainObjectFactory

    {

    public function createObject(array $row): DomainObject

    {

    $obj = new Venue((int)$row[''id''], $row[''name'']);

    return $obj;

    }

    }

    ```


    Of course, you might also want to cache objects to prevent duplication and prevent
    unnecessary trips to the database, as I did within the `Mapper` class. You could
    move the `addToMap()` and `getFromMap()` methods here, or you could build an observer
    relationship between the `ObjectWatcher` and your `createObject()` methods. I’ll
    leave the details up to you. Just remember, it’s up to you to prevent clones of
    your domain objects running amok in your system!


    ### Consequences


    The Domain Object Factory decouples database row data from object field data.
    You can perform any number of adjustments within the `createObject()` method.
    This process is transparent to the client, whose responsibility it is to provide
    the raw data.


    By snapping this functionality away from the `Mapper` class, it becomes available
    to other components. Here’s an altered `Collection` implementation , for example:


    ```

    // listing 13.33

    abstract class Collection implements \Iterator

    {

    protected $dofact = null;

    protected $total = 0;

    protected $raw = [];

    private $result;

    private $pointer = 0;

    private $objects = [];

    // Collection

    public function __construct(array $raw = [], DomainObjectFactory $dofact = null)

    {

    if (count($raw) && ! is_null($dofact)) {

    $this->raw = $raw;

    $this->total = count($raw);

    }

    $this->dofact = $dofact;

    }

    // ...

    ```


    The `DomainObjectFactory` can be used to generate objects on demand :


    ```

    // listing 13.34

    private function getRow(int $num)

    {

    // ...

    if (isset($this->raw[$num])) {

    $this->objects[$num] = $this->dofact->createObject($this->raw[$num]);

    return $this->objects[$num];

    }

    }

    ```


    Because Domain Object Factories are decoupled from the database, they can be used
    for testing more effectively. I might, for example, create a mock `DomainObjectFactory`
    to test the `Collection` code. It’s much easier to do this than it would be to
    emulate an entire `Mapper` object (you can read more about mock and stub objects
    in Chapter [18](#A314621_5_En_18_Chapter.html)).


    One general effect of breaking down a monolithic component into composable parts
    is an unavoidable proliferation of classes. The potential for confusion should
    not be underestimated. Even when every component and its relationship with its
    peers is logical and clearly defined, I often find it challenging to chart packages
    containing tens of similarly named components.


    This is going to get worse before it gets better. Already, I can see another fault
    line appearing in Data Mapper. The `Mapper::getCollection()` method was convenient;
    but once again, other classes might want to acquire a `Collection` object for
    a domain type, without having to go to a database facing class. So I have two
    related abstract components: `Collection` and `DomainObjectFactory`. According
    to the domain object I am working with, I will require a different set of concrete
    implementations: `VenueCollection` and `VenueObjectFactory`, for example, or `SpaceCollection`
    and `SpaceObjectFactory`. This problem leads us directly to the Abstract Factory
    pattern, of course. Figure [13-7](#A314621_5_En_13_Chapter.html#Fig7) shows the
    `PersistenceFactory` class . I’ll be using this to organize the various components
    that make up the next few patterns.


    ![A314621_5_En_13_Fig7_HTML.gif](A314621_5_En_13_Fig7_HTML.gif)


    Figure 13-7.


    Using the Abstract Factory pattern to organize related components


    ## The Identity Object


    The mapper implementation I have presented here suffers from a certain inflexibility
    when it comes to locating domain objects. Finding an individual object is no problem.
    Finding all relevant domain objects is just as easy. Anything in between, though,
    requires you to add a special method to craft the query (`EventMapper::findBySpaceId()`
    is a case in point).


    An identity object (also called a Data Transfer Object by Alur et al.) encapsulates
    query criteria, thereby decoupling the system from database syntax.


    ### The Problem


    It’s hard to know ahead of time what you or other client coders are going to need
    to search for in a database. The more complex a domain object, the greater the
    number of filters you might need in your query. You can address this problem to
    some extent by adding more methods to your `Mapper` classes on a case-by-case
    basis. This is not very flexible, of course, and can involve duplication as you
    are required to craft many similar but differing queries both within a single
    `Mapper` class and across the mappers in your system.


    An identity object encapsulates the conditional aspect of a database query in
    such a way that different combinations can be combined at runtime. Given a domain
    object called `Person`, for example, a client might be able to call methods on
    an identity object in order to specify a male, aged above 30 and below 40, who
    is less than 6 feet tall. The class should be designed so that conditions can
    be combined flexibly (perhaps you’re not interested in your target’s height, or
    maybe you want to remove the lower age limit). An identity object limits a client
    coder’s options to some extent. If you haven’t written code to accommodate an
    `income` field, then this cannot be factored into a query without adjustment.
    The ability to apply different combinations of conditions does provide a step
    forward in flexibility, however. Let’s see how this might work.'
