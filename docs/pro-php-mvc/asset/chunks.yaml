    2.  你能想到使用 Memcached 相比其他形式的缓存提供的任何其他好处吗？\n\n### 答案\n\n1.  文件 I/O（从服务器上的文件存储/检索数据）是出了名的慢。相比之下，通过快速网络向高效服务器发出网络请求要快得多。\n\
    2.  使用集中式缓存服务器（例如 Memcached）的一个巨大好处是，我们的应用程序可能运行在多个负载均衡的 Web 服务器上。如果它们各自管理自己的缓存文件，我们可能需要做大量工作来确保它们不会不必要地重新创建缓存数据。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 5 章 ■ 缓存\n\n### 练习\n\
    \n1.  我们的缓存驱动成功连接并使用 Memcached 存储。可能出现的问题是，其他服务需要使用相同的 Memcached 存储空间，并且可能拥有与我们缓存数据相同的键名。尝试为所有存储和请求的键添加前缀。\n\
    2.  尝试不同的缓存机制。这可能意味着编写新的缓存驱动类以实现新的缓存机制，从而扩展我们框架的缓存库。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第 6 章\n\n## 注册表\n\n面向对象编程的一大优点是能够通过创建类的多个实例来重用代码。当我们对类进行更改时，所有实例都将继承这些更改，因此我们只需更改一次。\n\
    \n### 目标\n\n*   我们需要理解注册表设计模式以及它帮助我们克服的问题。\n*   然后，我们需要构建一个注册表类来存储对象实例。这是高效框架的重要组成部分，因此它将成为本章的唯一焦点。\n\
    \n### 单例\n\n然而，有时我们期望只使用一个给定类的实例。我们可以通过几种方式实现这一点。我们在第 1 章中学习了一种这样的方式，即单例模式。例如，假设我们有清单\
    \ 6-1 中所示的类。\n\n**清单 6-1.** 受限实例示例\n\n```\nclass Ford\n{\n    public $founder\
    \ = \"Henry Ford\";\n    public $headquarters = \"Detroit\";\n    public $employees\
    \ = 164000;\n    public function produces($car)\n    {\n        return $car->producer\
    \ == $this;\n    }\n}\n\nclass Car\n{\n    public $color;\n    public $producer;\n\
    }\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 6 章 ■ 注册表\n\
    \n```\n$ford = new Ford();\n$car = new Car();\n$car->color = \"Blue\";\n$car->producer\
    \ = $ford;\necho $ford->produces($car);\necho $ford->founder;\n```\n"
- fmt: "# Singleton and Registry Patterns\n\nThere’s nothing tricky about these classes.\
    \ They do serve to illustrate a point, though. Sometimes the classes we create\
    \ will need only one instance at a time. Consider the `Ford` class. There is only\
    \ one `Ford` company, but it will differ greatly from other car manufacturers.\
    \ The logic required for the `Ford` class might differ much from a `Toyota` class.\
    \ Because of this difference, and because of the uniqueness of the instance of\
    \ the `Ford` class, we need to ensure only one instance is around at a time.\n\
    \nSo what if we make the `Ford` class a Singleton, as in Listing 6-2?\n\n***Listing\
    \ 6-2.*** Ford Singleton\n```\nclass Ford\n{\n    public $founder = \"Henry Ford\"\
    ;\n    public $headquarters = \"Detroit\";\n    public $employees = 164000;\n\n\
    \    public function produces($car)\n    {\n        return $car->producer == $this;\n\
    \    }\n\n    private static $_instance;\n\n    private function __construct()\n\
    \    {\n        // do nothing\n    }\n\n    private function __clone()\n    {\n\
    \        // do nothing\n    }\n\n    public function instance()\n    {\n     \
    \   if (!isset(self::$_instance))\n        {\n            self::$_instance = new\
    \ self();\n        }\n        return self::$_instance;\n    }\n}\n```\n\nTo make\
    \ the `Ford` class a Singleton, we need to do a few things. First, we need to\
    \ hide both the `__construct()` and `__clone()` magic methods. The `__construct()`\
    \ method is automatically called by PHP whenever the `new` keyword is used. If\
    \ we make it private, any use of the `new` keyword will raise an exception.\n\n\
    The `__clone()` method is called whenever the `clone()` (global) method is called,\
    \ in order to duplicate a class instance. With a private `__clone()` method, calling\
    \ `clone($ford)` would raise an exception.\n\nNow that there is no external means\
    \ of creating a `Ford` instance, we can gain access to the properties and methods\
    \ of an instance only by calling the `instance()` method. It checks a private,\
    \ static (class) property for an instance of the class. If none is set, it creates\
    \ a new instance, stores it, and returns the instance. This means on first invocation,\
    \ the `Ford` class will create and return an instance, and on every subsequent\
    \ invocation, will return that instance.\n\nLet’s see how our `$car` instance\
    \ interacts with the `Ford` class in Listing 6-3.\n\n***Listing 6-3.*** Using\
    \ a Singleton\n```\n$ford = Ford::instance();\n$car = new Car();\n$car->color\
    \ = \"Blue\";\n$car->producer = $ford;\necho $ford->produces($car);\necho $ford->founder;\n\
    ```\n\nAs you might have noticed, we do not create a new instance of the `Ford`\
    \ class. We only get an instance from the `instance()` method. The name of the\
    \ method (in this case, `instance`) is also not very important. You can name it\
    \ `getInstance()` or `returnTheeAnInstanceAnew()`, but it needs to adhere to the\
    \ same principles behind the scenes.\n\nYou might also have noticed that it’s\
    \ easy to make a Singleton. For the majority of limited-instance classes you create,\
    \ the Singleton pattern will suffice. It does, however, have its drawbacks. For\
    \ a start, there is a certain amount of code required to create a proper Singleton.\
    \ In the previous examples, it amounts to 18 lines of code, but that can be squashed\
    \ down to eight lines. If you are creating a lot of Singletons, even eight lines\
    \ can be bothersome.\n\nAnother disadvantage to the Singleton pattern is that\
    \ references to the Singleton class need to happen by name. You can no longer\
    \ refer just to variables, but have to reference the class by its full name (and\
    \ namespace) in order to get an instance of the class.\n\n## Registry\n\nWhat\
    \ if we could treat ordinary classes as limited-instance classes, without having\
    \ to make them Singletons? The Registry is a Singleton, used to store instance\
    \ of other “normal” classes. Another way to think of it is as a global key/instance\
    \ storeroom. Instances of non-Singleton classes are given a key (identifier) and\
    \ are “kept” inside the Registry’s private storage. When requests are made for\
    \ specific keys, the Registry checks whether there are any instances for those\
    \ keys, and returns them. If no instance is found at a key, the Registry’s methods\
    \ will return a default value.\n\nYou might be wondering what practical use this\
    \ is to our framework. There are many times when we will need to limit the amount\
    \ of class instances, as they relate to shared connections to third-party services\
    \ or shared resources. Consider our cache system. For most applications, one cache\
    \ provider will be sufficient. You will, for instance, connect to one Memcached\
    \ server. We certainly don’t want to be making multiple connections to the same\
    \ service when one connection will suffice.\n\nWe could build our cache system\
    \ as a set of Singleton classes, or we could declare multiple instances of the\
    \ Cache classes. Using Registry, we can find a neat, efficient middle ground that\
    \ allows us strict control over the number of class instances, while not limiting\
    \ us to single-instance use only.\n\nConsider an application that uses a database,\
    \ or one that connects to Facebook. Both of these cases would benefit from strict\
    \ control and resource sharing. Registry accommodates those needs, without requiring\
    \ us to write a multitude of singletons.\n\nLet’s look at some code in Listing\
    \ 6-4.\n\n***Listing 6-4.*** The Registry Class\n```\nnamespace Framework\n{\n\
    \    class Registry\n    {\n        private static $_instances = array();\n\n\
    \        private function __construct()\n        {\n            // do nothing\n\
    \        }\n\n        private function __clone()\n        {\n            // do\
    \ nothing\n        }\n\n        public static function get($key, $default = null)\n\
    \        {\n            if (isset(self::$_instances[$key]))\n            {\n \
    \               return self::$_instances[$key];\n            }\n            return\
    \ $default;\n        }\n\n        public static function set($key, $instance =\
    \ null)\n        {\n            self::$_instances[$key] = $instance;\n       \
    \ }\n\n        public static function erase($key)\n        {\n            unset(self::$_instances[$key]);\n\
    \        }\n    }\n}\n```\n\nI referred to the registry as a singleton, but it\
    \ is actually a static class. Static classes are singletons that have no instance\
    \ properties/methods or instance accessors/mutators. In fact, the only difference\
    \ between a static class and our Registry is that no instance of our registry\
    \ can ever be created. This is fine because we will only need our Registry class\
    \ in a single context.\n\nThe `set()` method is used to “store” an instance with\
    \ a specified key in the registry’s private storage. The `get()` method searches\
    \ the private storage for an instance with a matching key. If it finds an instance,\
    \ it will return it, or default to the value supplied with the `$default` parameter.\
    \ The `erase()` method is useful for removing an instance at a certain key.\n\n\
    The Registry class is easy to use with our `Ford`/`Car` classes, as demonstrated\
    \ in Listing 6-5.\n\n***Listing 6-5.*** Using Registry\n```\nFramework\\Registry::set(\"\
    ford\", new Ford());\n\n$car = new Car();\n$car->setColor(\"Blue\")->setProducer(Framework\\\
    Registry::get(\"ford\"));\necho Framework\\Registry::get(\"ford\")->produces($car);\n\
    echo Framework\\Registry::get(\"ford\")->founder;\n```\n\n> **Note** Zend Framework\
    \ and CakePHP both have classes dedicated to the organization of object instances—classes\
    \ comparable to Registry. Codeigniter has no such class, and depends solely on\
    \ the use of the singleton pattern.\n\n## Questions\n\n1. The registry is an ideal\
    \ place to store class instances, which helps to minimize the reinitialization\
    \ of commonly used classes. Are there other uses for it?\n\n2. Does the use of\
    \ the Registry pattern preclude us from using singletons effectively in our framework?\n\
    \n## Answers\n\n1. Aside from storing class instances, the registry can also be\
    \ used to store other data that should be globally accessible. There is nothing\
    \ stopping us from storing shared data structures within the Registry.\n\n2. The\
    \ Registry pattern does not deny us the use of the singleton. It actually depends\
    \ on a Singleton (or static class) to work properly. It is simply useful for managing\
    \ resources, while not restricting us to the limitations of Singleton classes\
    \ for everything."
  raw: 'There’s nothing tricky about these classes. They do serve to illustrate a
    point, though. Sometimes the classes we create will need only one instance at
    a time. Consider the Ford class. There is only one Ford company, but it will differ
    greatly from other car manufacturers. The logic required for the Ford class might
    differ much from a Toyota class. Because of this difference, and because of the
    uniqueness of the instance of the Ford class, we need to ensure only one instance
    is around at a time.


    So what if we make the Ford class a Singleton, as in Listing 6-2?


    ***Listing 6-2.*** Ford Singleton


    class Ford


    {


    public $founder = "Henry Ford";


    public $headquarters = "Detroit";


    public $employees = 164000;


    public function produces($car)


    {


    return $car- > producer == $this;


    }


    private static $_instance;


    private function __construct()


    {


    // do nothing


    }


    private function __clone()


    {


    // do nothing


    }


    public function instance()


    {


    if (!isset(self::$_instance))


    {


    self::$_instance = new self();


    }


    return self::$_instance;


    }


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 6 ■ REgisTRy


    To make the Ford class a Singleton, we need to do a few things. First, we need
    to hide both the __construct() and __clone() magic methods. The __construct()
    method is automatically called by PHP


    whenever the new keyword is used. If we make it private, any use of the new keyword
    will raise an exception.


    The __clone() method is called whenever the clone() (global) method is called,
    in order to duplicate a class instance. With a private __clone() method, calling
    clone($ford) would raise an exception.


    Now that there is no external means of creating a Ford instance, we can gain access
    to the properties and methods of an instance only by calling the instance() method.
    It checks a private, static (class) property for an instance of the class. If
    none is set, it creates a new instance, stores it, and returns the instance. This
    means on first invocation, the Ford class will create and return an instance,
    and on every subsequent invocation, will return that instance.


    Let’s see how our $car instance interacts with the Ford class in Listing 6-3.


    ***Listing 6-3.*** Using a Singleton


    $ford = Ford::instance();


    $car = new Car();


    $car-> color = "Blue";


    $car-> producer = $ford;


    echo $ford-> produces($car);


    echo $ford-> founder;


    As you might have noticed, we no not create a new instance of the Ford class.
    We only get an instance from the instance() method. The name of the method (in
    this case, instance) is also not very important. You can name it getInstance()
    or returnTheeAnInstanceAnew(), but it needs to adhere to the same principles behind
    the scenes.


    You might also have noticed that it’s easy to make a Singleton. For the majority
    of limited-instance classes you create, the Singleton pattern will suffice. It
    does, however, have its drawbacks. For a start, there is a certain amount of code
    required to create a proper Singleton. In the previous examples, it amounts to
    18 lines of code, but that can be squashed down to eight lines. If you are creating
    a lot of Singletons, even eight lines can be bothersome.


    Another disadvantage to the Singleton pattern is that references to the Singleton
    class need to happen by name. You can no longer refer just to variables, but have
    to reference the class by its full name (and namespace) in order to get an instance
    of the class.


    Registry


    What if we could treat ordinary classes as limited-instance classes, without having
    to make them Singletons? The Registry is a Singleton, used to store instance of
    other “normal” classes. Another way to think of it is as a global key/instance
    storeroom. Instances of non-Singleton classes are given a key (identifier) and
    are “kept” inside the Registry’s private storage. When requests are made for specific
    keys, the Registry checks whether there are any instances for those keys, and
    returns them. If no instance is found at a key, the Registry’s methods will return
    a default value.


    You might be wondering what practical use this is to our framework. There are
    many times when we will need to limit the amount of class instances, as they relate
    to shared connections to third-party services or shared resources. Consider our
    cache system. For most applications, one cache provider will be sufficient. You
    will, for instance, connect to one Memcached server. We certainly don’t want to
    be making multiple connections to the same service when one connection will suffice.


    We could build our cache system as a set of Singleton classes, or we could declare
    multiple instances of the Cache classes. Using Registry, we can find a neat, efficient
    middle ground that allows us strict control over the number of class instances,
    while not limiting us to single-instance use only.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 6 ■ REgisTRy


    Consider an application that uses a database, or one that connects to Facebook.
    Both of these cases would benefit from strict control and resource sharing. Registry
    accommodates those needs, without requiring us to write a multitude of singletons.


    Let’s look at some code in Listing 6-4.


    ***Listing 6-4.*** The Registry Class


    namespace Framework


    {


    class Registry


    {


    private static $_instances = array();


    private function __construct()


    {


    // do nothing


    }


    private function __clone()


    {


    // do nothing


    }


    public static function get($key, $default = null)


    {


    if (isset(self::$_instances[$key]))


    {


    return self::$_instances[$key];


    }


    return $default;


    }


    public static function set($key, $instance = null)


    {


    self::$_instances[$key] = $instance;


    }


    public static function erase($key)


    {


    unset(self::$_instances[$key]);


    }


    }


    }


    I referred to the registry as a singleton, but it is actually a static class.
    Static classes are singletons that have no instance properties/methods or instance
    accessors/mutators. In fact, the only difference between a static class and our
    Registry is that no instance of our registry can ever be created. This is fine
    because we will only need our Registry class in a single context.


    The set() method is used to “store” an instance with a specified key in the registry’s
    private storage.


    The get() method searches the private storage for an instance with a matching
    key. If it finds an instance, it will return it, or default to the value supplied
    with the $default parameter. The erase() method is useful for removing an instance
    at a certain key.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 6 ■ REgisTRy


    The Registry class is easy to use with our Ford/Car classes, as demonstrated in
    Listing 6-5.


    ***Listing 6-5.*** Using Registry


    Framework\Registry::set("ford", new Ford());


    $car = new Car();


    $car-> setColor("Blue")-> setProducer(Framework\Registry::get("ford")); echo Framework\Registry::get("ford")->
    produces($car);


    echo Framework\Registry::get("ford")-> founder;


    ■ **Note** Zend Framework and CakePHP both have classes dedicated to the organization
    of object instances—classes comparable to Registry. Codeigniter has no such class,
    and depends solely on the use of the singleton pattern.


    Questions


    1\. The registry is an ideal place to store class instances, which helps to minimize
    the reinitialization of commonly used classes. Are there other uses for it?


    2\. Does the use of the Registry pattern preclude us from using singletons effectively
    in our framework?


    Answers


    1\. Aside from storing class instances, the registry can also be used to store
    other data that should be globally accessible. There is nothing stopping us from
    storing shared data structures within the Registry.


    2\. The Registry pattern does not deny us the use of the singleton. It actually
    depends on a Singleton (or static class) to work properly. It is simply useful
    for managing resources, while not restricting us to the limitations of Singleton
    classes for


    everything.


