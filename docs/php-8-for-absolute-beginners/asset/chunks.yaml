- fmt: "# Deleting Entries in Related Tables\n\nThe commenting system is a great improvement.\
    \ Unfortunately, the comments have also introduced unwanted system behavior in\
    \ the administration module. It has become impossible to delete an entry with\
    \ comments. We can test this by attempting to delete a blog that has comments.\
    \ The system will ignore the request. This is an *integrity violation*.\n\nYou\
    \ may even see the following error displayed, indicating the problem.\n\n```\n\
    Exception: exception 'PDOException' with message 'SQLSTATE[23000]: Integrity constraint\
    \ violation: 1451 Cannot delete or update a parent row: a foreign key constraint\
    \ fails'\n```\n\n## Understanding Foreign Key Constraints\n\nIt is always a bit\
    \ annoying to come across errors, but this one is a friendly error. It is really\
    \ preventing us from undermining the integrity of the database. Table [9-1](#323857_3_En_9_Chapter.xhtml#Tab1)\
    \ takes a look inside the `blog_entry` table.\n\n**Table 9-1** One Row from the\
    \ `blog_entry` Table\n\n| `entry_id` | Title | `entry_text` | Created |\n|------------|-------|--------------|---------|\n\
    | 17         | delete me | Testing      | 2022-07-23 10:26:18 |\n\nA comment might\
    \ be related to that particular blog entry. Table [9-2](#323857_3_En_9_Chapter.xhtml#Tab2)\
    \ shows the corresponding row from the comment table.\n\n**Table 9-2** One Row\
    \ from the Comment Table\n\n| `comment_id` | `entry_id` | Author | Text | Date\
    \ |\n|--------------|------------|--------|------|------|\n| 4            | 17\
    \         | Thomas | test comment | 2022-07-23 10:26:40 |\n\nImagine that the\
    \ `blog_entry` with `entry_id = 17` is deleted. There would be a comment related\
    \ to a blog entry that no longer exists. Comments are only meaningful in the right\
    \ context. The comment with `comment_id = 4` would have lost its context; it would\
    \ have lost its integrity. Imagine what would happen if we inserted a new blog\
    \ entry with `entry_id = 17`. That blog entry would be born with a completely\
    \ irrelevant comment! The purpose of a foreign key is to maintain data integrity.\
    \ So, when we try to delete a `blog_entry` that has a comment, MySQL/MariaDB will\
    \ stop us, because the delete action would leave a renegade comment floating around\
    \ in the database, without a meaningful context. Remember, only blog entries without\
    \ comments can be deleted without losing data integrity.\n\n## Deleting Comments\
    \ Before Blog Entry\n\nWhen deleting a blog entry, we will first delete any comments\
    \ related to the entry. We already have a class that provides a single point of\
    \ access to the comment table. We can add a new method to delete all comments\
    \ related to a particular `entry_id`.\n\n```\n//partial code for models/Comment_Table.class.php\n\
    public function deleteByEntryId( $id ) {\n    $sql = \"DELETE FROM comment WHERE\
    \ entry_id = ?\";\n    $data = array( $id );\n    $statement = $this->executeSQL(\
    \ $sql, $data );\n}\n```\n\n**Listing 9-1** Partial Listing from `Comments_Table.class.php`\n\
    \nThis method will be called before a blog entry is deleted. Blog entries are\
    \ deleted from the `Blog_Entry_Table` class.\n\n```\n//partial code for models/Blog_Entry_Table.class.php\n\
    //edit existing method\npublic function deleteEntry ( $id ) {\n    //new code:\
    \ delete any comments before deleting entry\n    $this->deleteCommentsByID( $id\
    \ );\n    $sql = \"DELETE FROM blog_entry WHERE entry_id = ?\";\n    $data = array(\
    \ $id );\n    $statement = $this->executeSQL( $sql, $data );\n}\n\n//new code:\
    \ declare a new private method inside Blog_Entry_Table.class.php\nprivate function\
    \ deleteCommentsByID( $id ) {\n    include_once \"models/Comment_Table.class.php\"\
    ;\n    //create a Comment_Table object\n    $comments = new Comment_Table( $this->db\
    \ );\n    //delete any comments before deleting entry\n    $comments->deleteByEntryId(\
    \ $id );\n}\n```\n\n**Listing 9-2** Partial Listing from `Blog_Entry_Table.class.php`\n\
    \nNow, if there are any comments related to the `blog_entry`, those comments will\
    \ be deleted first, to avoid violating foreign key constraints!\n\n## Creating\
    \ an Image Manager\n\nThe `admin` module has two different page views at this\
    \ point: the list of entries and the entry editor. We will now add a third page\
    \ for uploading and deleting the images that we will be using in our blog entries.\
    \ We can start by creating the menu item for the image manager.\n\n```\nAll entries\n\
    Editor\nImage manager\n\";\n?>\n```\n\n**Listing 9-3** `admin-navigation.php`\n\
    \nClicking the Image manager link will encode a URL variable named `page` and\
    \ set its value to `images`. The front controller `admin.php` will require a new\
    \ controller script called `images.php`. As always, we will start with a tiny\
    \ step to catch errors while they are still easy to correct.\n\n```\nImage manager\
    \ coming soon!\";\n?>\n```\n\n**Listing 9-4** `images.php`\n\nIf we load `http://localhost/ch9/blog/admin.php?page=images`\
    \ in our browser, we should see a new menu and the message display.\n\n![](images/323857_3_En_9_Chapter/323857_3_En_9_Fig1_HTML.jpg)\n\
    \nA snapshot of a webpage (`admin.php?page=images`) displays the text, \"Image\
    \ manager coming soon!\".\n\n**Figure 9-1** Output from `http://localhost/ch9/blog/admin.php?page=images`\n\
    \n### Showing a Form for Uploading Images\n\nNow that we have the image manager\
    \ controller script, we can create an image manager view. Let us start with a\
    \ basic HTML form, which we can eventually use to upload images.\n\n```\nImage\
    \ Upload\n\n$uploadMessage\n\n\";\n?>\n```\n\n**Listing 9-5** `images-html.php`\n\
    \nWe can see that the `views` code is prepared with a placeholder for displaying\
    \ upload messages to users. The default upload message is *Upload a new image*.\
    \ Soon, the system will let our users know if an upload was successful or not.\
    \ Remember, to allow users to upload files such as images, we need an HTML form.\
    \ We must use the HTTP method `POST`, and the form's encoding type must explicitly\
    \ be declared, to allow for file upload. We must set the `enctype` of the form\
    \ to `multipart/form-data`, which will accept files *and* ordinary URL encoded\
    \ form data. As mentioned before, an `<input>` element with `type=file` will retrieve\
    \ the file window from the operating system; this allows users to browse their\
    \ local computers for a file to upload. The `accept` attribute has been set to\
    \ allow only JPEG images.\n\nKeep in mind that client-side validation can improve\
    \ usability but not security. The file type can be changed to \"All Files\" within\
    \ the file window. We should also expect that a malicious user will work around\
    \ any client-side validation. To protect our system from attacks, we will also\
    \ implement server-side validation. We will add this soon. But first, let us update\
    \ the image manager controller, so the upload form is displayed.\n\n```\nListing\
    \ 9-6\nnewimages.com\n```\n\nWe can now point our browser to `http://localhost/ch9/blog/newadmin.php?page=newimages`,\
    \ to confirm that the form is, in fact, displayed in the browser.\n\n> **Note**\
    \  \n> The following files have been updated to access the new images controller:\
    \ `newadmin.php`, `new-admin-navigation.php`.\n\n### A Quick Refresher on the\
    \ `$_FILES` Superglobal Array\n\nWe learned about the `$_FILES` superglobal in\
    \ Chapter [4](#323857_3_En_4_Chapter.xhtml), but it might be helpful to review\
    \ what it does, before moving on. Whenever a file is uploaded via an HTML form,\
    \ that file is stored in temporary memory, and information about the file is passed\
    \ in the `$_FILES` superglobal array. The array contains several important aspects\
    \ about the file uploaded.\n\n```\nArray (\n    [image-data] => Array (\n    \
    \    [name] => alberte-lea.jpg\n        [type] => image/jpeg\n        [tmp_name]\
    \ => /Applications/XAMPP/xamppfiles/temp/phpYPcBjK\n        [error] => 0\n   \
    \     [size] => 119090\n    )\n)\n```\n\nThe name and type are self-explanatory.\
    \ The `tmp_name` is the temporary name of the file after it has been uploaded.\
    \ If the file size is too big (according to the settings in `php.ini`), then this\
    \ will be set to `\"none.\"` An error code of 0 or `UPLOAD_ERR_OK` indicates that\
    \ the file was uploaded successfully. The file size is the number of bytes.\n\n\
    Where did the name `image-data` come from?\n\n```\n//one line of code from views/admin/images-html.php\n\
    \n```"
