    | 字段类型                    | 返回                                |

    | --------------------------- | ----------------------------------- |

    | Boolean                     | 复选框输入元素                      |

    | Date                        | 日、月、年选择菜单                  |

    | Datetime                    | 日、月、年、小时、分钟和子午线选择菜单 |

    | String (例如 `varchar`)     | 文本框输入元素                      |

    | Text                        | 文本域元素                          |

    | Time                        | 小时、分钟和子午线选择菜单          |

    | Timestamp                   | 日、月、年、小时、分钟和子午线选择菜单 |

    | Tinyint(1)                  | 复选框                              |

    | 名为 `password`, `passwd`, 或 `psword` 的字符串或文本字段 | 密码框                              |


    通过遵循表9-2，您可以构建能被Form辅助器自动识别的数据库结构。将字段类型设为`tinyint`并赋予其长度为1，将免去您告诉`$form->input()`函数该字段是布尔值且应渲染为复选框的麻烦。当然，如果应用程序的特殊需求要求其他行为，您也可以指定具体细节。例如，假设您希望在不更改数据库结构的情况下强制用户提交字符串而不是段落文本。您需要添加一些选项来覆盖`$form->input()`函数的自动魔法行为。


