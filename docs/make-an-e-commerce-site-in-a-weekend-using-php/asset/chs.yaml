  \ 已启动，但并非所有服务都在运行。当其为绿色时，表示 WampServer 已启动且所有服务均正常运行。要启动服务器，请单击其图标，并从弹出的菜单中选择**启动所有服务**选项（见图\
  \ 1-22）。\n\n![A978-1-4842-1672-9_1_Fig22_HTML.jpg](img/A978-1-4842-1672-9_1_Fig22_HTML.jpg)\n\
  \n*图 1-22. WampServer 弹出菜单*\n\n随着服务器启动，它会从红色变为橙色再变为绿色。WampServer 可能与 Skype 的默认设置、IIS\
  \ 服务器以及其他服务器发生冲突。如果您发现并非所有 WampServer 服务都在运行（即图标在启动后仍保持橙色），则需要停止您的 IIS 服务器，退出 Skype，然后重新启动您的\
