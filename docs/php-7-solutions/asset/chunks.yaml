    \    'image/webp'\n    ];\n    }\n    ```\n\n这些属性可以在类中使用`$this->`访问，它指的是当前对象。例如，在类定义内部，你访问`$destination`为`$this->destination`。\n\
    \n**注意**\n当你首次在类内部声明属性时，它像任何其他变量一样以美元符号开头。但是，你需要省略`->`运算符之后的属性名称中的美元符号。\n\n除`$destination`外，每个受保护属性都赋予了默认值：\n\
    \n*   `$max`将最大文件大小设置为 50 KB（51200 字节）。\n*   `$messages`是一个空数组。\n*   `$permitted`包含一个图像\
    \ MIME 类型数组。\n\n`$destination`的值将在创建类的实例时设置。其他值将由类内部控制，但你也会创建函数（或在类中称为**方法**）来更改`$max`和`$permitted`的值。\n\
    \n1.  当你创建对象时，类定义文件会自动调用类的构造函数方法，该方法初始化对象。所有类的构造函数方法都称为`__construct()`（双下划线）。与你在上一步中定义的属性不同，构造函数需要在类外部可访问，因此你在其定义前加上`public`关键字。\n\
    \n**注意**\n`public`和`protected`关键字控制属性和方法的**可见性**。公共属性和方法可以在任何地方访问。尝试直接在类定义或子类外部访问受保护的属性或方法会触发致命错误。\n\
    \n`Upload`类的构造函数接受一个参数：你想要上传文件的文件夹路径，并将其赋值给`$destination`。在受保护属性列表之后，添加以下代码，确保它位于类定义的闭合花括号之前：\n\
    \n```\npublic function __construct($path) {\nif (is_dir($path) && is_writable($path))\
    \ {\n$this->destination = rtrim($path, '/\\\\') . DIRECTORY_SEPARATOR;\n} else\
    \ {\nthrow new \\Exception(\"$path must be a valid,writable directory.\");\n}\n\
    }\n```\n\n构造函数内部的`if`语句将`$path`传递给`is_dir()`和`is_writable()`函数，这些函数检查提交的值是一个有效的、可写的目录（文件夹）。如果是，`rtrim()`函数会删除`$path`末尾的任何空格和斜杠，然后连接适用于操作系统的目录分隔符。这确保了路径以斜杠结尾，无论用户在创建`Upload`对象时是否添加了斜杠。当只向`rtrim()`传递一个参数时，它只删除空格。第二个可选参数是一个字符串，包含所有其他要删除的字符。需要两个反斜杠来转义闭合引号。如果传递给构造函数的值不是有效的、可写的目录，构造函数会抛出异常。\n\
    \n**注意**\n类可以定义自己的异常，并且由于`Upload`类是在命名空间内定义的，因此构造函数应该使用自定义异常还是 PHP 核心部分的`Exception`类是不明确的。要访问命名空间内的核心命令，你需要在它们前面加上反斜杠。这就是`Exception`前面有反斜杠的原因。我们使用的是核心的`Exception`类，而不是自定义的。\n\
    \n1.  接下来，创建一个名为`upload()`的公共方法。这将在上传文件之前启动一系列对文件的测试。在你上一步定义的构造函数方法之后立即插入此代码：\n\
    \n    ```\n    public function upload($fieldname) {\n    $uploaded = $_FILES[$fieldname];\n\
    \    if ($this->checkFile($uploaded)) {\n    $this->moveFile($uploaded);\n   \
    \ }\n    }\n    ```\n\n`upload()`方法接受单个参数：文件输入字段的名称，并使用它来为`$uploaded`分配`$_FILES`的适当子数组，然后将其传递给我们将接下来定义的两个方法。\n\
    \n**提示**\n`$_FILES`是 PHP 的超级全局数组之一，因此它在脚本的所有部分都可用。这就是为什么无需将其作为参数传递给类构造函数方法。\n\n\
    1.  `upload()`方法中的`if`语句使用`$this`关键字调用`checkFile()`。`$this`关键字也用于调用类内定义的函数（方法）。目前，我们假设文件没有问题，因此`checkFile()`只会返回`true`。将以下代码添加到类定义中：\n\
    \n    ```\n    protected function checkFile($file) {\n    return true;\n    }\n\
    \    ```\n\n    在定义前加上`protected`关键字意味着此方法只能在类内部访问。我们将在 PHP 解决方案 9-3 中返回到`checkFile()`，以在上传文件之前添加一系列测试。\n\
    ```\n"
- fmt: "# Tip\n\nThe order of function (method) definitions inside a class doesn't\
    \ matter, as long as they're within the curly braces that enclose the class. However,\
    \ it's my preference to keep all `public` methods together at the top, with `protected`\
    \ methods at the bottom.\n\n1.  If the file passes the series of tests, the conditional\
    \ statement in the `upload()` method passes the file to another internal method\
    \ called `moveFile()`, which is basically a wrapper for the `move_uploaded_file()`\
    \ function that we used in PHP Solution 9-1\\. The code looks like this:\n\n```\n\
    protected function moveFile($file) {\n    $success = move_uploaded_file($file['tmp_name'],\n\
    \    $this->destination . $file['name']);\n    if ($success) {\n        $result\
    \ = $file['name'] . ' was uploaded successfully';\n        $this->messages[] =\
    \ $result;\n    } else {\n        $this->messages[] = 'Could not upload ' . $file['name'];\n\
    \    }\n}\n```\n\nIf the upload succeeds, `move_uploaded_file()` returns `true`.\
    \ Otherwise, it returns `false`. By storing the return value in `$success`, an\
    \ appropriate message is stored in the `$messages` array. If `$success` is `true`,\
    \ the message is initially assigned to `$result`, whereas on failure, it's assigned\
    \ directly to the `$messages` array. That's because more information will be added\
    \ later to the successful message if the file needs to be renamed.\n\n2.  Since\
    \ `$messages` is a protected property, you need to create a public method to retrieve\
    \ the contents of the array.\n\n```\npublic function getMessages() {\n    return\
    \ $this->messages;\n}\n```\n\nThis simply returns the contents of the `$messages`\
    \ array. Since that's all it does, why not make the array public in the first\
    \ place? Public properties can be accessed—and changed—outside the class definition.\
    \ Protecting `$messages` ensures that the contents of the array cannot be altered,\
    \ so you know the message has been generated by the class. This might not seem\
    \ like such a big deal with a message like this, but it becomes very important\
    \ when you start working with more complex scripts or in a team.\n\n3.  Save `Upload.php`\
    \ and switch to `file_upload.php`.\n\n4.  At the top of `file_upload.php`, import\
    \ the `Upload` class by adding the following line immediately after the opening\
    \ PHP tag:\n\n```\nuse PhpSolutions\\File\\Upload;\n```\n\n# Caution\n\nYou must\
    \ import namespaced classes in the top level of a script, even if the class definition\
    \ is loaded later. Putting `use` inside a conditional statement generates a parse\
    \ error.\n\n1.  Inside the conditional statement, delete the code that calls the\
    \ `move_uploaded_file()` function, then use `require_once` to include the `Upload`\
    \ class definition:\n\n```\nif (isset($_POST['upload'])) {\n    // define the\
    \ path to the upload folder\n    $destination = 'C:/upload_test/';\n    require_once\
    \ '../PhpSolutions/File/Upload.php';\n}\n```\n\n2.  We can now create an instance\
    \ of the `Upload` class, but because it might throw an exception, it's best to\
    \ create a `try/catch` block (see \"Handling errors and exceptions\" in Chapter\
    \ [4](#332054_4_En_4_Chapter.xhtml)). Add the following code immediately after\
    \ the code you inserted in the previous step:\n\n```\ntry {\n    $loader = new\
    \ Upload($destination);\n    $loader->upload('image');\n    $result = $loader->getMessages();\n\
    } catch (Throwable $t) {\n    echo $t->getMessage();\n}\n```\n\nThis creates an\
    \ instance of the `Upload` class, called `$loader`, by passing it the path to\
    \ the `upload_test` folder. It then calls the `$loader` object's `upload()`, passing\
    \ it the name of the file input field. Then, it calls the `getMessages()` method,\
    \ storing the result in `$result`.\n\nThe `catch` block will catch both internal\
    \ errors and exceptions, so the type declaration is `Throwable` rather than `Exception`.\
    \ There's no need to prefix `Throwable` with a backslash because the script in\
    \ `file_upload.php` is not in a namespace. Only the class definition is in a namespace.\n\
    \n# Caution\n\nThe `Upload` class has a `getMessages()` method, while the exception\
    \ uses `getMessage()`. That extra \"s\" makes a difference.\n\n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig4_HTML.jpg](images/332054_4_En_9_Chapter/332054_4_En_9_Fig4_HTML.jpg)\n\
    \n**Figure 9-4.** The `Upload` class reports a successful upload\n\n1.  Add the\
    \ following PHP code block above the form to display any messages returned by\
    \ the `$loader` object:\n\n```\n<?php\nif (isset($result)) {\n    echo '<ul>';\n\
    \    foreach ($result as $message) {\n        echo \"<li>$message</li>\";\n  \
    \  }\n    echo '</ul>';\n}\n?>\n```\n\nThis is a simple `foreach` loop that displays\
    \ the contents of `$result` as an unordered list. When the page first loads, `$result`\
    \ isn't set, so this code runs only after the form has been submitted.\n\n2. \
    \ Save `file_upload.php` and test it in a browser. As long as you choose an image\
    \ that's less than 50 KB, you should see confirmation that the file was uploaded\
    \ successfully, as shown in Figure [9-4](#332054_4_En_9_Chapter.xhtml#Fig4).\n\
    \nYou can compare your code with `file_upload_05.php` and `PhpSolutions/File/Upload_01.php`\
    \ in the `ch09` folder. The class does exactly the same as PHP Solution 9-1: it\
    \ uploads a file, but it requires a lot more code to do so. However, you have\
    \ laid the foundation for a class that's going to perform a series of security\
    \ checks on uploaded files. This is code that you'll write once. When you use\
    \ the class, you won't need to write this code again.\n\nIf you haven't worked\
    \ with objects and classes before, some of the concepts might seem strange. Think\
    \ of the `$loader` object simply as a way of accessing the functions (methods)\
    \ you have defined in the `Upload` class. You often create separate objects to\
    \ store different values, for example, when working with `DateTime` objects. In\
    \ this case, a single object is sufficient to handle the file upload.\n\n## Checking\
    \ Upload Errors\n\nAs it stands, the `Upload` class uploads any type of file indiscriminately.\
    \ Even the 50 KB limit can be circumvented, because the only check is made in\
    \ the browser. Before handing the file to the `moveFile()` method, the `checkFile()`\
    \ method needs to run a series of tests. One of the most important is to inspect\
    \ the error level reported by the `$_FILES` array. Table [9-2](#332054_4_En_9_Chapter.xhtml#Tab2)\
    \ shows a full list of error levels.\n\n**Table 9-2.** Meaning of the different\
    \ error levels in the `$_FILES` array\n\n| Error level | Meaning |\n|---|---|\n\
    | 0 | Upload successful |\n| 1 | File exceeds maximum upload size specified in\
    \ `php.ini` (default 2 MB) |\n| 2 | File exceeds size specified by `MAX_FILE_SIZE`\
    \ (see PHP Solution 9-1) |\n| 3 | File only partially uploaded |\n| 4 | Form submitted\
    \ with no file specified |\n| 6 | No temporary folder |\n| 7 | Cannot write file\
    \ to disk |\n| 8 | Upload stopped by an unspecified PHP extension |\n\n*Error\
    \ level 5 is currently not defined.*\n\n## PHP Solution 9-3: Testing the Error\
    \ Level, File Size, and MIME Type\n\nThis PHP solution updates the `checkFile()`\
    \ method to call a series of internal (protected) methods to verify that the file\
    \ is okay to accept. If a file fails for any reason, an error message reports\
    \ why. Continue working with `Upload.php`. Alternatively, use `Upload_01.php`\
    \ in the `ch09/PhpSolutions/File` folder, move it to `PhpSolutions/File` at the\
    \ top level of the `phpsols-4e` site, and rename it `Upload.php`. (Always remove\
    \ the underscore and number from partially completed files.)\n\n1.  The `checkFile()`\
    \ method needs to run three tests: on the error level, the size of the file, and\
    \ the file's MIME type. Update the method definition like this:"
