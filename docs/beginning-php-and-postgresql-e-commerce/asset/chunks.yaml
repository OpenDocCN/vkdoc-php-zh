    ?>


    **2.** Add two new constants to include/config.php:


    // Server HTTP port (can omit if the default 80 is used) define(''HTTP_SERVER_PORT'',
    ''80'');


    /* Name of the virtual directory the site runs in, for example:


    ''/hatshop/'' if the site runs at http://www.example.com/hatshop/


    ''/'' if the site runs at http://www.example.com/ */


    define(''VIRTUAL_LOCATION'', ''/hatshop/'');


    // We enable and enforce SSL when this is set to anything else than ''no''


    define(''USE_SSL'', ''yes'');


    **3.** Modify presentation/templates/header.tpl like this:


    <div id="header">


    <a href="{"index.php"|prepare_link:"http"}">


    <img src="images/title.png" alt="Site title" />


    </a>


    </div>


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH03.qxd 11/8/06 9:45 AM Page 105


    C H A P T E R 3 ■ C R E AT I N G T H E P R O D U C T C ATA L O G : PA RT I **105**


    **4.** Modify presentation/templates/departments_list.tpl like this:


    <li>


    <a {$selected_d}


    **href="{$departments_list->mDepartments[i].link|prepare_link:"http"}">**


    » {$departments_list->mDepartments[i].name}


    </a>


    </li>


    **How It Works: Preparing Links**


    First of all, make sure the new entry you added to config.php is configured correctly.
    If you’re running your web site on a different port than the default of 80 (say,
    if you’re using port 8080), make sure you specify the correct port in the HTTP_SERVER_PORT
    constant.


    We also defined a constant named USE_SSL, which specifies whether the site is
    supposed to generate HTTPS


    URLs. If the constant is set to no, your site won’t generate any HTTPS links even
    for the places that should normally be secured. Let’s see how this works.'
  trans: "\n如果一切顺利，你会看到一个整洁的页面，其中包含使用 Smarty 模板生成的部门列表。列表中的每个部门名称都是指向该部门页面的链接，实际上，这是一个指向\
    \ `index.php` 页面的链接，其查询字符串中包含一个 `DepartmentID` 参数，用于指定所选部门。以下是此类链接的一个示例：\n\n`http://localhost/hatshop/index.php?DepartmentID=3`\n\
    \n点击某个部门的链接后，所选部门在列表中将以不同的 CSS 样式显示（参见图 3-16）。\n\n**图 3-16.** *选择部门*\n\n理解 Smarty\
    \ 模板文件（`presentation/templates/departments_list.tpl`）及其关联插件文件（`function.load_departments_list.php`）如何协同工作以生成部门列表，并为当前选中的部门使用正确的样式，这至关重要。\n\
    \n处理过程始于 `function.load_departments_list.php`，该文件被包含在 `index.tpl` 文件中。\n\n`departments_list.tpl`\
    \ 中的第一行用于加载插件：\n\n```\n{load_departments_list assign=\"departments_list\"}\n```\n\
    \n`load_departments_list` 插件函数创建并初始化一个 `DepartmentsList` 对象（该类包含在 `function.load_departments_list.php`\
    \ 中），然后该对象被赋值给一个可从 Smarty 设计模板文件访问的变量：\n\n```\nfunction smarty_function_load_departments_list($params,\
    \ $smarty)\n{\n  // 创建 DepartmentsList 对象\n  $departments_list = new DepartmentsList();\n\
    \  $departments_list->init();\n\n  // 分配模板变量\n  $smarty->assign($params['assign'],\
    \ $departments_list);\n}\n```\n\n`DepartmentsList` 中的 `init()` 方法将一个包含部门列表的数组填充到类的公共成员（`$mDepartments`）中，并将当前选中部门的索引填充到另一个公共成员（`$mSelectedDepartment`）中。\n\
    \n现在回到 Smarty 代码。在构成 Smarty 模板布局的 HTML 代码（`presentation/templates/departments_list.tpl`）中，你可以看到实现神奇功能的\
    \ Smarty 标签：\n\n```\n{section name=i loop=$departments_list->mDepartments}\n{assign\
    \ var=selected_d value=\"\"}\n{* 验证是否选中该部门，以决定使用何种 CSS 样式 *}\n{if ($departments_list->mSelectedDepartment\
    \ ==\n$departments_list->mDepartments[i].department_id)}\n{assign var=selected_d\
    \ value=\"class=\\\"selected\\\"\"}\n{/if}\n{* 为列表中的新部门生成链接 *}\n<li>\n<a {$selected_d}\n\
    href=\"{$departments_list->mDepartments[i].link|escape:\"html\"}\">\n» {$departments_list->mDepartments[i].name}\n\
    </a>\n</li>\n{/section}\n```\n\nSmarty 模板的 section 用于遍历数据数组。在此例中，你要遍历存储在 `$departmentsList->mDepartments`\
    \ 中的部门数组：\n\n```\n{section name=i loop=$departments_list->mDepartments}\n...\n\
    {/section}\n```\n\n在循环内部，你验证当前遍历到的部门（`$departments_list->mDepartments[i].department_id`）的\
    \ ID 是否与查询字符串中提到的 ID（`$departments_list->mSelectedDepartment`）一致。根据此结果，你将样式名称（选中样式或默认样式）保存到名为\
    \ `selected_d` 的变量中，从而决定对该名称应用何种样式。\n\n然后使用此变量生成链接：\n\n```\n<a {$selected_d}\n\
    href=\"{$departments_list->mDepartments[i].link|escape:\"html\"}\">\n» {$departments_list->mDepartments[i].name}\n\
    </a>\n```\n\n**为安全连接提前规划**\n\n在开发过程中的某个阶段，你会希望网站的某些页面只能通过安全的 HTTPS 连接访问，以确保客户端与服务器之间传输数据的机密性。此类敏感页面包括用户登录表单、用户输入信用卡数据的页面等。\n\
    \n此处不深入讨论，因为后续章节会详细介绍。但你需要知道的是，通过 HTTPS 访问的页面会占用大量服务器资源，因此我们只希望在访问安全页面时使用安全连接。\n\
    \n实现这一点比看起来要棘手一些。大多数情况下，在网站内部使用相对链接更为方便。例如，网站的标题图片通常包含一个指向 `index.php` 的链接，而不是\
    \ `http://www.example.com/index.php`。这种情况下，如果从安全页面点击标题图片，用户会被重定向到 `https://www.example.com/index.php`，从而导致访问者通过安全连接访问了一个本不该以此方式访问的页面（实际上会消耗比必要更多的服务器资源）。\n\
    \n为了避免这个问题及其他类似问题，我们将编写一段代码，确保网站中的所有链接都是绝对链接。\n\n**练习：准备链接**\n\n**1.** 创建一个新文件\
    \ `presentation/smarty_plugins/modifier.prepare_link.php`，并向其中添加以下代码：\n\n```\n\
    <?php\n// 插件文件内的插件函数必须命名为：smarty_type_name\nfunction smarty_modifier_prepare_link($string,\
    \ $link_type = 'http')\n{\n  // 使用 SSL？\n  if ($link_type == 'https' && USE_SSL\
    \ == 'no')\n    $link_type = 'http';\n\n  switch ($link_type)\n  {\n    case 'http':\n\
    \      $link = 'http://' . getenv('SERVER_NAME');\n      // 如果定义了 HTTP_SERVER_PORT\
    \ 且不是默认值\n      if (defined('HTTP_SERVER_PORT') && HTTP_SERVER_PORT != '80')\n\
    \      {\n        // 追加服务器端口\n        $link .= ':' . HTTP_SERVER_PORT;\n     \
    \ }\n      $link .= VIRTUAL_LOCATION . $string;\n      // 转义 HTML\n      return\
    \ htmlspecialchars($link, ENT_QUOTES);\n\n    case 'https':\n      $link = 'https://'\
    \ . getenv('SERVER_NAME') .\n              VIRTUAL_LOCATION . $string;\n     \
    \ // 转义 HTML\n      return htmlspecialchars($link, ENT_QUOTES);\n\n    default:\n\
    \      return htmlspecialchars($string, ENT_QUOTES);\n  }\n}\n?>\n```\n\n**2.**\
    \ 向 `include/config.php` 中添加两个新常量：\n\n```\n// 服务器 HTTP 端口（如果使用默认的 80 端口，可省略）\n\
    define('HTTP_SERVER_PORT', '80');\n\n/* 网站运行的虚拟目录名称，例如：\n如果网站运行在 http://www.example.com/hatshop/，则为\
    \ '/hatshop/'\n如果网站运行在 http://www.example.com/，则为 '/' */\ndefine('VIRTUAL_LOCATION',\
    \ '/hatshop/');\n\n// 当此常量设置为 'no' 以外的值时，我们启用并强制使用 SSL\ndefine('USE_SSL', 'yes');\n\
    ```\n\n**3.** 按如下方式修改 `presentation/templates/header.tpl`：\n\n```\n<div id=\"\
    header\">\n  <a href=\"{\"index.php\"|prepare_link:\"http\"}\">\n    <img src=\"\
    images/title.png\" alt=\"网站标题\" />\n  </a>\n</div>\n```\n\n**4.** 按如下方式修改 `presentation/templates/departments_list.tpl`：\n\
    \n```\n<li>\n<a {$selected_d}\n**href=\"{$departments_list->mDepartments[i].link|prepare_link:\"\
    http\"}\">**\n» {$departments_list->mDepartments[i].name}\n</a>\n</li>\n```\n\n\
    **工作原理：准备链接**\n\n首先，请确保你添加到 `config.php` 中的新条目配置正确。如果你的网站运行在不同于默认 80 端口的端口上（例如，如果你使用\
    \ 8080 端口），请确保在 `HTTP_SERVER_PORT` 常量中指定了正确的端口。\n\n我们还定义了一个名为 `USE_SSL` 的常量，它指定网站是否应该生成\
    \ HTTPS URL。如果该常量设置为 `no`，那么即使对于本应安全的页面，你的网站也不会生成任何 HTTPS 链接。让我们看看这是如何实现的。"
- fmt: "# 排版后的文档\n\nThe code you’ve just added to the presentation tier is a `Smarty`\
    \ modifier. The `Smarty` modifier is used as shown by the modifications you’ve\
    \ implemented in `header.tpl` and `departments_list.tpl`, and it transforms the\
    \ relative links received as parameters to absolute links. The `prepare_link`\
    \ `Smarty` modifier takes as parameter the name of the protocol that should be\
    \ used to generate the links; if `http` is passed, an HTTP URL will be generated;\
    \ if `https` is passed, an HTTPS URL will be generated.\n\nTake the example of\
    \ the link in the header:\n\n```\n<a href=\"{\"index.php\"|prepare_link:\"http\"\
    }\">\n```\n\nThis link will be transformed to an absolute link by our `Smarty`\
    \ modifier, which will arrive to the client like this:\n\n```\n<a href=\"http://www.example.com/index.php\"\
    >\n```\n\nIf you wanted that particular link to be accessed only through HTTPS,\
    \ then you could use the `Smarty` modifier like this:\n\n```\n<a href=\"{\"index.php\"\
    |prepare_link:\"https\"}\">\n```\n\nThis modifier would transform the link to:\n\
    \n```\n<a href=\"https://www.example.com/index.php\">\n```\n\nNote that if the\
    \ `USE_SSL` constant is set to `no`, then HTTP will be used even if the parameter\
    \ is `https`.\n\nYou can reload the web site to ensure that nothing’s broken.\n\
    \n> **Note**: In case you aren’t using the `hatshop` alias as explained in Chapter\
    \ 2, you’ll need to modify the `VIRTUAL_LOCATION` constant in `config.php` to\
    \ reflect the real location of your web application.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n---\n\nNote that the `Smarty` modifier doesn’t add the port if the `HTTP_SERVER_PORT`\
    \ constant isn’t defined or if it contains the default port 80:\n\n```\n// If\
    \ HTTP_SERVER_PORT is defined and different than default\nif (defined('HTTP_SERVER_PORT')\
    \ && HTTP_SERVER_PORT != '80')\n{\n    // Append server port\n    $link .= ':'\
    \ . HTTP_SERVER_PORT;\n}\n```\n\nHowever, you should add the `HTTP_SERVER_PORT`\
    \ to `config.php` anyway to make it easier to modify in case you move the application\
    \ to a server that runs on another port. If `HTTP_SERVER_PORT` would be, for example,\
    \ `8080`, the links to `index.php` specified earlier would be transformed to:\n\
    \n```\n<a href=\"http//www.example.com:8080/index.php\">\n```\n\n## Summary\n\n\
    This long chapter was well worth the effort when you consider how much theory\
    \ you’ve learned and applied to the HatShop project! In this chapter, you accomplished\
    \ the following:\n\n- You created the department table and populated it with data.\n\
    - You learned how to access this data from the data tier using PDO, and then how\
    \ to access the data tier method from the business tier.\n- You learned how to\
    \ use PHP 5 exceptions.\n- You implemented the user interface using a Smarty template.\n\
    \nIn the next chapter, you will finish creating the product catalog by displaying\
    \ the site’s categories and products!\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n---\n\n## Creating the Product Catalog: Part II\n\nIn the previous chapter,\
    \ you implemented a selectable list of departments for the HatShop web site. However,\
    \ a product catalog means much more than that list of departments. In this chapter,\
    \ you’ll add many new product catalog features. This chapter has a similar structure\
    \ to the last chapter, but there’s a lot of new functionality to add, which involves\
    \ quite a bit of code.\n\nReview Figures 3-1, 3-2, and 3-3 from Chapter 3 to get\
    \ a visual feeling of the new functionality you’ll implement in this chapter.\n\
    \nIn this chapter, you will:\n\n- Learn about relational data and the types of\
    \ relationships that occur between data tables, and then create the new data structures\
    \ in your database.\n- Understand how to join related data tables, how to use\
    \ subqueries, how to implement paging at the data tier level, and even more theory\
    \ about PL/pgSQL functions and techniques.\n- Complete the business tier to work\
    \ with the new PL/pgSQL functions, send parameters, and pass requested data to\
    \ the presentation tier."
