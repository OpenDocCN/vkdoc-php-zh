  \ `Model` 类相似。我们是否有可能让 `CI_Model` 变得类似于我们的 `Model` 类？\n2.  CodeIgniter 中是否存在与（我们框架中的）`Events`\
  \ 类类似的功能？\n3.  本章创建的视图包含大量 PHP 代码。CodeIgniter 是否提供某种模板引擎供我们替代使用？\n\n### 答案\n\n1.\
  \  CodeIgniter 的 `CI_Model` 类与我们框架的 `Model` 类相比，功能相当精简。不过，CodeIgniter 允许我们以类似添加第三方库的方式来扩展它。（我们将在第\
  \ 24 章中讨论这一点。）\n\n\n\n2. CodeIgniter 拥有所谓的“钩子”，它与`Events`类类似，但钩子不是在运行时定义的。钩子通过在一个关联数组配置文件中添加对类/方法的引用来进行定义。\n\
  \n3. CodeIgniter 确实有一个模板解析器，但你最好避免使用它。\n\n**练习**\n\n1. CodeIgniter 的数据库类提供了修改数据库结构的方法，但我们在本章中使用了一个简单的\
