    Displaying Form Errors


    To complement the hiding of form errors, we also need the ability to show errors.
    We will implement the showError() method, which takes the name of the error’s
    form field as the first argument and the error message as the second argument.


    The biggest challenge in this method is to locate the error container that corresponds
    to the given form field. To find this element, we use the Prototype DOM traversal
    functions (up() and down()) to locate the element. We make the assumption that
    the error container is within the same parent element as the form input. Therefore,
    we can find the parent element of the form element and look within that parent
    for an element with the class name .error.


    Listing 6-21 shows the code for the showError() method, which also goes in UserRegistrationForm.class.js.


    **Listing 6-21.** *Writing the Error Message to a Form Element’s Error Container*
    *(UserRegistrationForm.class.js)*


    showError : function(key, val)


    {


    var formElement = this.form[key];


    var container = formElement.up().down(''.error'');


    if (container) {


    container.update(val);


    container.show();


    }


    },


    Handling the Form Submission


    In Listing 6-19 we observed the onsubmit event on the user registration form.
    This means that when the form is submitted, the onSubmit() method in the UserRegistrationForm
    class is called.


    The goal of onSubmit() is to initiate an Ajax request that submits the form data
    to the registerAction() method of the AccountController class. Since this request
    will be initiated using Ajax, the changes we made in Listing 6-18 will come into
    play (that is, processing the form but not creating the user if there are no errors).


    The onSubmit() method begins by calling Event.stop(). This means that the browser
    won’t submit the form as usual once this method has been called. This allows us
    to control the submission of the form (we will submit it once we ensure no errors
    have occurred in the form). Additionally, we make a call to resetErrors() so that
    any errors from a previous submission attempt are removed.


