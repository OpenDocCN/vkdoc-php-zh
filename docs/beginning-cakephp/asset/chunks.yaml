    and other public resources. In a production setup,


    ![Image 27](index-79_1.png)


    09775ch05final 7/1/08 9:42 PM Page 57


    C H A P T E R 5 ■ C R E AT I N G S I M P L E V I E W S A N D B A K I N G I N T
    H E C O N S O L E


    **57**


    app/webroot will typically serve as the document root. In any case, Cake will
    internally reference this directory when linking to style sheets, images, JavaScript
    files, or other public resource files.


    Line 4 of Listing 5-1 is Cake helper code that assembles some HTML for you, in
    this case, a link to a CSS file. This line is pulling the css() function from
    the HTML helper, which is part of Cake’s core libraries and is passing the parameter
    styles to the function. The HTML helper’s css() function knows to look for a styles.css
    file in the app/webroot/css folder and generate the <link rel="stylesheet" type="text/css"
    href="/css/styles.css" /> tag for the layout.


    By using the HTML helper to build this link, not only is the amount of code entered
    by hand reduced, but you also ensure that wherever you may run the Cake application,
    the link will not be broken from inconsistent server setups. Cake comes with many
    more helpers.


    Using them can dramatically reduce the amount of code in the application, especially
    in views and layouts.


    As of yet, there is no styles.css file in the app/webroot/css directory. Create
    that file, but leave it blank. You should get a rather simple view for the blog
    application (see Figure 5-1).


    **Figure 5-1.** *A blank style sheet and simple default layout replaces the scaffolding
    layout and* *styles.*


    ![Image 28](index-80_1.png)


