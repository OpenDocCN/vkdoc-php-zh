    `MVC` 结构下工作；下一步是将此结构转换为数据库模式，使其能与 `Cake` 正确配合。


    **注意：** 如果你尚未完成，请确保已创建一个用于此应用程序的数据库，并将配置参数填入 `app/config/database.php` 文件中。


