  trans: "\n# 配方 10-13：特殊语言结构\n\nPHP 内置了大量函数，以及一些看似函数但行为略有不同的语言结构。\n\n## 问题\n\n数组是变量的索引列表，其索引可以是数字键或字符串值。如果未定义键，PHP\
    \ 会在每次添加新元素时自动分配值。为了处理数组，必须使用特殊的语言结构来创建数组或提取值等。\n\n## 解决方案\n\nPHP 中有一些特殊的语言结构可以简化数组操作。第一个是\
    \ `array()`。虽然它看起来像一个函数，但实际上它是一种用于定义数组变量的语言结构。如果在括号之间不写入任何内容，该变量将变成一个空数组。\n\n\
    ## 工作原理\n\n下面是初始化数组变量的常见方式。\n\n```php\n// 10_25.php\n$a = array();\n```\n\n其他语言将数组视为对象，并且必须使用\
    \ `new` 运算符来实例化它们。在 PHP 中则不需要，因为数组是其自身的原生类型。如果值以逗号分隔列表的形式列出，这些值将成为数组的元素。数组元素可以是任何受支持的类型，包括数组本身，甚至可以混合使用。\n\
    \n```php\n// 10_26.php\n$a = array(1, 2, \"3\", array(4, 5, 6));\n```\n\n由于 PHP\
    \ 和 JavaScript 经常一起使用，PHP 5.4 版本引入了一种更简短的新语法来创建数组。这种新语法看起来更像 JSON 编码的字符串：\n\n\
    ```php\n// 10_27.php\n$a = [1, 2, \"3\", [4, 5, 6]];\n```\n\n在上述示例中，所有值均在未提供键的情况下添加。这会导致\
    \ PHP 为每个元素生成索引值，从 0 开始。索引并非必须从 0 开始，并且允许在索引中存在“空洞”。\n\n```php\n// 10_28.php\n\
    $a = [7 => 1, 2, \"3\", 100 => [4, 5, 6]];\n```\n\n这将使得第一个值设置在键 7 上，所有后续值将拥有索引\
    \ 8、9，而最后一个值拥有索引 100。\n\n除了数字值，字符串也允许作为键。这是处理键值对的一种非常常见的方式。\n\n```php\n// 10_29.php\n\
    $a = [\n    'host' => 'localhost',\n    'user' => 'root'\n];\n```\n\n检查数组中是否存在特定键可以使用\
    \ `isset()` 函数或 `array_key_exists()`。它接受两个参数，第一个参数代表键，第二个参数代表数组。\n\n根据数组元素的值，这两个函数可能产生不同的结果，如下例所示：\n\
    \n```php\n// 10_30.php\n$a = [\n    0 => '123',\n    1 => null,\n    'a' => 'abc',\n\
    \    'b' => null\n];\n\nvar_dump(isset($a[0]));\nvar_dump(isset($a[1]));\nvar_dump(isset($a['a']));\n\
    var_dump(isset($a['b']));\n\nvar_dump(array_key_exists(0, $a));\nvar_dump(array_key_exists(1,\
    \ $a));\nvar_dump(array_key_exists('a', $a));\nvar_dump(array_key_exists('b',\
    \ $a));\n```\n\n此脚本将产生以下输出：\n\n```\nbool(true)\nbool(false)\nbool(true)\nbool(false)\n\
