    Adding Sortable to BlogImageManager


    It is fairly straightforward to add Sortable to our unordered list; however, we
    must also add some Ajax functionality to the code. When a user finishes dragging
    an image, we need to initiate an Ajax request that sends the updated image order
    to the server so the setImageOrder() function (in Listing 11-44) can be called.


    Sortable allows us to define a parameter called onUpdate, which specifies a callback
    function that is called after the image order has been changed. The callback function
    we create will initiate the Ajax request. Before we get to that, though, let’s
    look at creating the Sortable list.


    By default, Sortable operates an unordered list. It is possible to allow other
    types of elements to be dragged (although there may be some incompatibility with
    dragging table cells), but since we are using an unordered list we don’t need
    to specify the type of list.


    Another default that Sortable sets is for the list to be vertical. This means
    the dragging direction for items is up and down. Since our list is horizontal,
    we need to change this setting by specifying the constraint parameter. We could
    set this value to horizontal, but since the list of images for a single post may
    span multiple rows (such as on a low-resolution monitor) it would not be possible
    to drag images on the second row to the first (and vice versa). To deal with this,
    we simply set constraint to be false.


    Since our list is horizontal, we must change the overlap value to be horizontal
    instead of its default of vertical. Sortable uses this value to determine how
    to calculate when an item has been dragged to a new location.


    Listing 11-46 shows the code we must add to the constructor of the BlogImageManager
    JavaScript class in ./htdocs/js/BlogImageManager.class.js. Note that this code
    uses the onSortUpdate() function, which we have not yet defined.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


