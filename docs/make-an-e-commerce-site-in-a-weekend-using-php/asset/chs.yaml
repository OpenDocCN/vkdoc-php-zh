  max-width:350px;max-height:350px;width:auto;height: auto;\" />\n    </a>\n</span>\n\
  </body>\n</html>\n```\n\n在这段代码中，您可以看到最初显示的是 Apple iPhone 4s 智能手机、Micromax Knight\
  \ 2E471 智能手机和 Microsoft Lumia 笔记本电脑的图片。几秒钟后，当这些产品图片淡出时，Xperia T3 白色智能手机、Dell Vostro1\
  \ 和 HP Probook 6570 笔记本电脑的图片会出现。\n\n清单 3-15 中所示的代码实现了主页上显示的交叉淡入淡出效果。\n\n**清单 3-15.**\
  \ 实现交叉淡入淡出效果的代码\n\n```css\n#crossfade {\n    position:relative;\n    height:350px;\n\
  \    width:350px;\n    margin-right:250px;\n}\n#crossfade img {\n    position:absolute;\n\
  \    left:0;\n    -webkit-transition: opacity 1s ease-in-out;\n    -moz-transition:\
  \ opacity 1s ease-in-out;\n    -o-transition: opacity 1s ease-in-out;\n    transition:\
