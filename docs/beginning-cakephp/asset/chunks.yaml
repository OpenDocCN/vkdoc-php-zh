    **Working Ajax into the View**


    Using the Ajax helper requires that the Prototype framework be included in the
    web page.


    You’ve done this by installing the Prototype script in the app/webroot/js folder
    and also providing a link to that file in the app/views/layouts/default.ctp file.
    You’ve also made the helper available in the App controller. Working Ajax into
