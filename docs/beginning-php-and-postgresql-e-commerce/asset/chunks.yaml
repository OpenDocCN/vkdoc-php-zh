    # 第 12 章 ■ 存储客户订单


    ## 实现税费和运费


    正如预期的那样，你需要对 `HatShop` 进行几项修改，以实现前面概述的税费和运费方案。你需要新增两个数据库表：`tax`（税费表）和 `shipping`（运费表），同时还需要对
    `orders`（订单表）进行修改。你还需添加新的数据库函数，并对现有函数做一些调整。部分业务层类也需要修改以适应这些变化，而表示层则必须包含一种让用户选择配送方式的方法（税费方案将自动选择）。


    那么，让我们开始吧。


    ## 数据库修改


    在本节中，你将添加新表，并修改 `orders` 表和数据库函数。


    ### 练习：添加数据库结构


    1. 加载 `pgAdmin III`，并连接到 `hatshop` 数据库。


    2. 点击工具 ➤ 查询工具（或点击工具栏上的 SQL 按钮）。此时应出现一个新的查询窗口。


    3. 使用查询工具执行以下代码，该代码将在你的 `hatshop` 数据库中添加 `shipping` 表：


    ```sql

    -- 创建 shipping 表

    CREATE TABLE shipping

    (

    shipping_id SERIAL NOT NULL,

    shipping_type VARCHAR(100) NOT NULL,

    shipping_cost NUMERIC(10, 2) NOT NULL,

    shipping_region_id INTEGER NOT NULL,

    CONSTRAINT pk_shipping_id PRIMARY KEY (shipping_id), CONSTRAINT fk_shipping_region_id
    FOREIGN KEY (shipping_region_id) REFERENCES shipping_region (shipping_region_id)

    ON UPDATE RESTRICT ON DELETE RESTRICT

    );

    ```


