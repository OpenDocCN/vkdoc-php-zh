    \ any problems.\n\n**Tip:** This code assumes that there will always be some records\
    \ in the table. As an exercise, use the technique in PHP Solution 11-2 (MySQLi)\
    \ or 11-4 (PDO) to count the number of results, and use a conditional statement\
