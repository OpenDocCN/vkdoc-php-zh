    Unit $newUnit,

    Unit $occupyingUnit

    ): CompositeUnit {

    $comp = $occupyingUnit->getComposite();

    if (! is_null($comp)) {

    $comp->addUnit($newUnit);

    } else {

    $comp = new Army();

    $comp->addUnit($occupyingUnit);

    $comp->addUnit($newUnit);

    }

    return $comp;

    }

    }

    ```


