- "# 排版后的内容\n\n你可能不同意我的决定：当作为参数传递的值无效时，静默失败。不过，现在你对条件语句应该有足够的经验，可以根据自己的需求调整代码。例如，如果你希望缩略图最大尺寸的设置方法返回错误消息而不是静默失败，请检查该值是否大于零，并添加一个`else`块来生成错误消息。`else`块还应该将`$canProcess`属性设置为`false`，以防止该类尝试创建缩略图图像。以下是调整`setMaxSize()`方法的方式：\n\
  \n```\npublic function setMaxSize($size) {\n    if (is_numeric($size) && $size >\
  \ 0) {\n        $this->maxSize = $size;\n    } else {\n        $this->messages[]\
  \ = 'The value for setMaxSize() must be a positive number.';\n        $this->canProcess\
  \ = false;\n    }\n}\n```\n\n## PHP 解决方法 8-3：计算缩略图的尺寸\n\n这个 PHP 解决方法向`Thumbnail`类添加了一个受保护方法，用于计算缩略图的尺寸。`$maxSize`属性中设置的值决定了宽度或高度，具体取决于哪个更大。为了避免扭曲缩略图，你需要计算较短尺寸的缩放比例。该比例通过将最大缩略图尺寸除以原始图像的较大尺寸来计算。\n\
  \n例如，金阁寺（`kinkakuji.jpg`）的原始图像为 270 × 346 像素。如果最大尺寸设置为 120，将 120 除以 346 得到缩放比例 0.3468。将原始图像的宽度乘以这个比例，可将缩略图的宽度固定为\
  \ 94 像素（向上取整到最接近的整数），从而保持正确的比例。下图 8-3 展示了缩放比例的工作方式。\n\n![A978-1-4842-0635-5_8_Fig3_HTML.jpg](img/A978-1-4842-0635-5_8_Fig3_HTML.jpg)\n\
  \n**图 8-3.** 计算缩略图图像的缩放比例\n\n继续使用你现有的类定义。或者，使用`ch08/PhpSolutions/Image`文件夹中的`Thumbnail_02.php`。\n\
  \n计算缩略图尺寸不需要任何额外的用户输入，因此可以通过一个受保护方法来处理。将以下代码添加到类定义中。将其放在文件末尾，就在闭合花括号内部。\n\n```\n\
  protected function calculateSize($width, $height) {\n    if ($width <= $this->maxSize\
  \ && $height <= $this->maxSize) {\n        $ratio = 1;\n    } elseif ($width > $height)\
  \ {\n        $ratio = $this->maxSize/$width;\n    } else {\n        $ratio = $this->maxSize/$height;\n\
  \    }\n    $this->thumbwidth = round($width * $ratio);\n    $this->thumbheight\
  \ = round($height * $ratio);\n}\n```\n\n原始图像的尺寸作为`Thumbnail`对象的属性存储，因此你可以直接引用它们为`$this->originalWidth`和`$this->originalHeight`。然而，该方法需要经常引用这些值，所以我决定将它们作为参数传递，以使代码更易于阅读和输入。\n\
  \n条件语句首先检查原始图像的宽度和高度是否小于或等于最大尺寸。如果是，则图像无需调整大小，因此缩放比例设置为 1。\n\n`elseif`块检查宽度是否大于高度。如果是，则使用宽度来计算缩放比例。如果高度更大或两边相等，则调用`else`块。在这两种情况下，都使用高度来计算缩放比例。\n\
  \n最后两行将原始宽度和高度乘以缩放比例，并将结果赋值给`$thumbwidth`和`$thumbheight`属性。计算过程被包裹在`round()`函数中，该函数将结果四舍五入到最接近的整数。\n\
  \n此方法需要由创建缩略图图像的方法调用。将以下公共方法添加到受保护方法上方的类定义中：\n\n```\npublic function create() {\n\
  \    if ($this->canProcess && $this->originalwidth != 0) {\n        $this->calculateSize($this->originalwidth,\
  \ $this->originalheight);\n    } elseif ($this->originalwidth == 0) {\n        $this->messages[]\
  \ = 'Cannot determine size of ' . $this->original;\n    }\n}\n```\n\n这会检查`$canProcess`是否为`true`，并且原始图像的宽度是否为\
  \ 0。第二个测试是必要的，因为如果`getimagesize()`无法确定尺寸，它会将宽度和高度设置为 0。这通常发生在图像格式包含多个图像时。如果`$originalwidth`属性为\
  \ 0，会向`$messages`数组中添加一条错误消息。\n\n要测试新方法，请像这样修改`test()`方法：\n\n```\npublic function\
  \ test() {\n    echo 'File: ' . $this->original . '<br>';\n    echo 'Original width:\
  \ ' . $this->originalwidth . '<br>';\n    echo 'Original height: ' . $this->originalheight\
  \ . '<br>';\n    echo 'Base name: ' . $this->basename . '<br>';\n    echo 'Image\
  \ type: ' . $this->imageType . '<br>';\n    echo 'Destination: ' . $this->destination\
  \ . '<br>';\n    echo 'Max size: ' . $this->maxSize .  '<br>';\n    echo 'Suffix:\
  \ ' . $this->suffix .  '<br>';\n    echo 'Thumb width: ' . $this->thumbwidth . '<br>';\n\
  \    echo 'Thumb height: ' . $this->thumbheight . '<br>';\n    if ($this->messages)\
  \ {\n        print_r($this->messages);\n    }\n}\n```\n\n更新`create_thumb.php`中的代码以调用`create()`方法。它必须在`test()`方法之前调用。否则，缩略图的宽度和高度将不会被计算。修改后的代码如下所示：\n\
  \n```\n$thumb = new Thumbnail($_POST['pix']);\n$thumb->setDestination('C:/upload_test/thumbs/');\n\
  $thumb->setMaxSize(100);\n$thumb->setSuffix('small');\n$thumb->create();\n$thumb->test();\n\
  ```\n\n![A978-1-4842-0635-5_8_Fig4_HTML.jpg](img/A978-1-4842-0635-5_8_Fig4_HTML.jpg)\n\
  \n**图 8-4.** 该类现在正在生成创建缩略图图像所需的所有值\n\n通过在`create_thumb.php`中选择一张图像并点击“Create Thumbnail”来测试更新后的类。你应该会看到屏幕上显示这些值，如图\
  \ 8-4 所示。\n\n如有必要，请将你的代码与`ch08`文件夹中的`Thumbnail_03.php`进行对照检查。\n\n\n\n### 使用 GD 函数创建图像的缩放副本\n\
  \n收集完所有必要信息后，您就可以从较大的图像中生成缩略图。这需要为原始图像和缩略图分别创建图像资源。对于原始图像，您需要使用与图像 MIME 类型匹配的函数。以下每个函数都接受一个参数：文件的路径。\n\
  \n- `imagecreatefromjpeg()`\n- `imagecreatefrompng()`\n- `imagecreatefromgif()`\n\
  \n由于缩略图尚不存在，您需要使用另一个函数 `imagecreatetruecolor()`，它接受两个参数——宽度和高度（以像素为单位）。\n\n还有一个函数用于创建图像的缩放副本：`imagecopyresampled()`。它至少需要十个参数——且均为必填参数。这些参数分为五对，如下所示：\n\
  \n-   两个图像资源的引用——先副本，后原始\n-   要放置复制图像左上角的 `x` 和 `y` 坐标\n-   原始图像左上角的 `x` 和 `y` 坐标\n\
  -   副本的宽度和高度\n-   要从原始图像复制区域的宽度和高度\n\n图 8-5 展示了如何使用最后四对参数来提取特定区域，以下是对 `imagecopyresampled()`\
  \ 的参数设置：\n\n```\nimagecopyresampled($thumb, $source, 0, 0, 170, 20, $thbwidth,$thbheight,\
  \ 170, 102);\n```\n\n![A978-1-4842-0635-5_8_Fig5_HTML.jpg](img/A978-1-4842-0635-5_8_Fig5_HTML.jpg)\n\
  \n**图 8-5.** `imagecopyresampled()` 函数允许您复制图像的一部分\n\n要复制区域的 `x` 和 `y` 坐标是从图像左上角以像素为单位测量的。x\
  \ 轴和 y 轴从左上角的 0 开始，向右和向下递增。通过将要复制区域的宽度和高度分别设置为 170 和 102，PHP 提取出白色轮廓标出的区域。\n\n现在您明白了网站是如何裁剪上传的图像的。它们使用\
  \ JavaScript 或其他技术动态计算坐标。对于 `Thumbnail` 类，您将使用原始图像的全部内容来生成缩略图。\n\n使用 `imagecopyresampled()`\
  \ 创建副本后，您需要保存它，再次使用特定于 MIME 类型的函数，即：\n\n- `imagejpeg()`\n- `imagepng()`\n- `imagegif()`\n\
  \n每个函数都将图像资源和要保存的路径作为其前两个参数。\n\n`imagejpeg()` 和 `imagepng()` 函数接受一个可选的第三个参数来设置图像质量。对于\
  \ `imagejpeg()`，您可以通过指定一个 0（最差）到 100（最佳）范围内的数字来设置质量。如果省略该参数，默认值为 75。对于 `imagepng()`，范围是\
  \ 0 到 9。令人困惑的是，0 产生最佳质量（无压缩）。\n\n最后，保存缩略图后，您需要通过将图像资源传递给 `imagedestroy()` 来销毁它们。尽管名称带有破坏性，但此函数对原始图像或缩略图没有影响。它仅通过销毁处理过程中所需的图像资源来释放服务器内存。\n\
  \n### PHP 解决方案 8-4：生成缩略图\n\n此 PHP 解决方案通过创建图像资源、复制缩略图并将其保存到目标文件夹来完成 `Thumbnail` 类的编写。\n\
  \n继续处理您现有的类定义。或者，使用 `ch08/PhpSolutions/Image` 文件夹中的 `Thumbnail_03.php`。\n\n原始图像的图像资源必须与其\
  \ MIME 类型对应，因此首先创建一个内部方法来选择正确的类型。将以下代码添加到类定义中。这是一个受保护的方法，因此将其放在页面底部（但在类的右花括号内）。\n\
  \n```\nprotected function createImageResource() {\n    if ($this->imageType == 'jpeg')\
  \ {\n        return imagecreatefromjpeg($this->original);\n    } elseif ($this->imageType\
  \ == 'png') {\n        return imagecreatefrompng($this->original);\n    } elseif\
  \ ($this->imageType == 'gif') {\n        return imagecreatefromgif($this->original);\n\
  \    }\n}\n```\n\n您在 PHP 解决方案 8-1 中创建的 `checkType()` 方法将 MIME 类型存储为 `jpeg`、`png`\
  \ 或 `gif`。因此，条件语句检查 MIME 类型，将其与相应的函数匹配，并传递原始图像作为参数。然后该方法返回生成的图像资源。\n\n现在该定义执行所有实际工作的内部方法了。它包含大量代码，因此我将分部分进行说明。首先像这样定义\
  \ `createThumbnail()` 方法：\n\n```\nprotected function createThumbnail() {\n    $resource\
  \ = $this->createImageResource();\n    $thumb = imagecreatetruecolor($this->thumbwidth,\
  \ $this->thumbheight);\n}\n```\n\n这会调用您在步骤 1 中创建的 `createImageResource()` 方法，然后为缩略图创建一个图像资源，将缩略图的宽度和高度传递给\
  \ `imagecreatetruecolor()`。\n\n创建缩略图的下一步涉及将两个图像资源传递给 `imagecopyresampled()` 并设置坐标和尺寸。像这样修改\
  \ `createThumbnail()` 方法：\n\n```\nprotected function createThumbnail() {\n    $resource\
  \ = $this->createImageResource();\n    $thumb = imagecreatetruecolor($this->thumbwidth,\
  \ $this->thumbheight);\n    imagecopyresampled($thumb, $resource, 0, 0, 0, 0, $this->thumbwidth,\n\
  \        $this->thumbheight, $this->originalwidth, $this->originalheight);\n}\n\
  ```\n\n前两个参数是您刚刚为缩略图和原始图像创建的图像资源。接下来的四个参数将副本和原始图像的 `x` 和 `y` 坐标都设置为左上角。接着是为缩略图计算出的宽度和高度，然后是原始图像的宽度和高度。将参数\
  \ 3 到 6 设置为左上角，并将两组尺寸均设置为完整大小，这样会将整个原始图像复制到整个缩略图中。换句话说，它创建了一个原始图像的缩小版副本。\n\n您不需要将\
  \ `imagecopyresampled()` 的结果赋给一个变量。缩放后的图像现在存储在 `$thumb` 中，但您仍需保存它。\n\n像这样完成 `createThumbnail()`\
  \ 的定义：\n\n```\nprotected function createThumbnail() {\n    $resource = $this->createImageResource();\n\
  \    $thumb = imagecreatetruecolor($this->thumbwidth, $this->thumbheight);\n   \
  \ imagecopyresampled($thumb, $resource, 0, 0, 0, 0, $this->thumbwidth,\n       \
  \ $this->thumbheight, $this->originalwidth, $this->originalheight);\n    $newname\
  \ = $this->basename . $this->suffix;\n    if ($this->imageType == 'jpeg') {\n  \
  \      $newname .= '.jpg';\n        $success = imagejpeg($thumb, $this->destination\
  \ . $newname, 100);\n    } elseif ($this->imageType == 'png') {\n        $newname\
  \ .= '.png';\n        $success = imagepng($thumb, $this->destination . $newname,\
  \ 0);\n    } elseif ($this->imageType == 'gif') {\n        $newname .= '.gif';\n\
  \        $success = imagegif($thumb, $this->destination . $newname);\n    }\n  \
  \  if ($success) {\n        $this->messages[] = \"$newname 创建成功。\";\n    } else\
  \ {\n        $this->messages[] = \"无法为 \" .\n            basename($this->original)\
  \ . \" 创建缩略图。\";\n    }\n    imagedestroy($resource);\n    imagedestroy($thumb);\n\
  }\n```\n\n\n\n\n新代码的第一行将后缀连接到已去除扩展名的文件名上。因此，如果原始文件名为 `menu.jpg` 且使用了默认的 `_thb` 后缀，那么\
  \ `$newname` 就变成了 `menu_thb`。\n\n条件语句会检查图片的 MIME 类型，并追加对应的文件扩展名。对于 `menu.jpg` 这个例子，`$newname`\
  \ 最终变成 `menu_thb.jpg`。然后，缩放后的图片被传递给相应的保存函数，并使用目标文件夹和 `$newname` 作为保存路径。对于 JPEG 和\
  \ PNG 图片，可选的质量参数被设置为最高级别：JPEG 为 100，PNG 为 0。\n\n保存操作的结果存储在 `$success` 中。根据结果，`$success`\
  \ 的值要么是 `true`，要么是 `false`，并且相应的消息会被添加到 `$messages` 属性中。这里使用 `basename()` 函数而不是\
  \ `$basename` 属性来创建消息，因为文件扩展名已从 `$basename` 属性中被剥离，而 `basename()` 函数会保留扩展名。\n\n\
  最后，`imagedestroy()` 通过销毁用于创建缩略图占用的资源来释放服务器内存。\n\n更新 `create()` 方法的定义，使其调用 `createThumbnail()`\
  \ 方法：\n\n```\npublic function create() {\n    if ($this->canProcess && $this->originalwidth\
  \ != 0) {\n        $this->calculateSize($this->originalwidth, $this->originalheight);\n\
  \        $this->createThumbnail();\n    } elseif ($this->originalwidth == 0) {\n\
  \        $this->messages[] = 'Cannot determine size of ' . $this->original;\n  \
  \  }\n}\n```\n\n你不再需要 `test()` 方法了。你可以将其从类定义中删除，或者将其注释掉。如果你打算进一步试验或增强这个类，将其注释掉可以省去从头开始重新创建的麻烦。到目前为止，你一直使用\
  \ `test()` 方法来显示错误消息。现在创建一个公共方法来获取这些消息：\n\n```\npublic function getMessages() {\n\
  \    return $this->messages;\n}\n```\n\n保存 `Thumbnail.php`。在 `create_thumb.php`\
  \ 中，将对 `test()` 方法的调用替换为对 `getMessages()` 的调用，并将结果赋值给一个变量，如下所示：\n\n```\n$thumb->create();\n\
  $messages = $thumb->getMessages();\n```\n\n在 `<body>` 开始标签之后立即添加一个 PHP 代码块，用于显示所有消息：\n\
  \n```\n<?php\nif (isset($messages) && !empty($messages)) {\n    echo '<ul>';\n \
  \   foreach ($messages as $message) {\n        echo \"<li>$message</li>\";\n   \
  \ }\n    echo '</ul>';\n}\n?>\n```\n\n你在之前的章节中见过这段代码，因此无需解释。\n\n如果缩略图没有创建成功，由 `Thumbnail`\
  \ 类生成的错误消息应该能帮助你定位问题来源。此外，请仔细将你的代码与 `ch08/PhpSolutions/Image` 文件夹中的 `Thumbnail_04.php`\
  \ 进行核对。如果之前 PHP 解决方案中的测试都通过了，那么错误很可能出在 `create()`、`createImageResource()` 或 `createThumbnail()`\
  \ 方法定义中。另一个需要检查的地方当然就是你的 PHP 配置。这个类依赖于 GD 扩展是否已启用。尽管 GD 得到广泛支持，但它并不总是默认开启的。\n\n\
  ![A978-1-4842-0635-5_8_Fig6_HTML.jpg](img/A978-1-4842-0635-5_8_Fig6_HTML.jpg)\n\n\
  图 8-6.\n\n缩略图已成功创建在目标文件夹中。保存 `create_thumb.php`，在浏览器中加载它，并从列表中选择一个图片，点击“Create Thumbnail”进行测试。如果一切顺利，你应该会看到一条报告缩略图创建成功的消息，并且你可以确认它在\
  \ `upload_test` 的 `thumbs` 子文件夹中存在，如图 8-6 所示。\n\n## 上传时自动调整图片大小\n\n既然你已经有了一个能从大图创建缩略图的类，那么相对简单地修改第\
  \ 6 章 中的 `Upload` 类，使其能从上传的图片生成缩略图——实际上，不仅能从单个图片，还能从多个图片生成。\n\n与其修改 `Upload` 类中的代码，更高效的方法是扩展该类并创建一个子类。这样，你可以选择使用原始类来执行任何类型文件的上传，或者使用子类在上传时创建缩略图。子类还需要提供在创建缩略图后保存或丢弃较大图片的选项。\n\
  \n在深入研究代码之前，让我们快速了解一下如何创建子类。\n\n### 扩展类\n\n使用类的一大优点是其可扩展性。要扩展一个类，你只需包含原始类的定义，并使用\
  \ `extends` 关键字定义子类，如下所示：\n\n```\nrequire_once 'OriginalClass.php';\n\nclass MyNewClass\
  \ extends OriginalClass {\n    // 子类定义\n}\n```\n\n这会从原始父类 `OriginalClass` 创建一个名为\
  \ `MyNewClass` 的新子类。父子类比非常贴切，因为子类继承了父类的所有特性，但可以调整其中一些特性，并拥有自己的新特性。这意味着 `MyNewClass`\
  \ 与 `OriginalClass` 共享相同的属性和方法，但你可以添加新的属性和方法。你还可以重新定义（或覆盖）父类的某些方法和属性。这简化了创建用于执行更专门化任务的类的过程。你在第\
  \ 6 章 中创建的 `Upload` 类执行基本的文件上传。在本章中，你将对其进行扩展，创建一个名为 `ThumbnailUpload` 的子类，它使用其父类的基本上传功能，但增加了创建缩略图的专门功能。该子类将创建在\
  \ `PhpSolutions/Image` 文件夹中，因此它将使用 `PhpSolutions\\Image` 作为其命名空间。\n\n像所有孩子一样，子类经常需要向父类借用东西。当你重写子类中的方法但又需要使用原始版本时，这种情况经常发生。要引用父类版本，你需要在它前面加上\
  \ `parent` 关键字后跟两个冒号，如下所示：\n\n```\nparent::originalMethod();\n```\n\n你将在 PHP 解法\
  \ 8-5 中看到这是如何工作的，因为子类定义了自己的构造函数以添加一个额外的参数，但同时还需要使用父类的构造函数。\n\n> **注意**  \n> 这里对继承的描述仅涵盖了理解\
  \ PHP 解法 8-5 所需的最低限度内容。要更深入地了解 PHP 类，请参阅我的 *PHP Object-Oriented Solutions*（friends\
  \ of ED, 2008，ISBN: 978-1-4302-1011-5）。\n\n让我们创建一个能够同时上传图片并生成缩略图的类。\n\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n### PHP 方案 8-5：创建 `ThumbnailUpload` 类\n\n该 PHP 方案扩展了 第 6 章 中的 `Upload` 类，并与\
  \ `Thumbnail` 类结合使用，以完成图片的上传和调整大小。它演示了如何创建子类并重写父类方法。要创建子类，你需要来自第 6 章的 `Upload.php`\
  \ 和本章的 `Thumbnail.php`。这些文件的副本分别位于 `ch06/PhpSolutions/File` 和 `ch08/PhpSolutions/Image`\
  \ 文件夹中。\n\n在 `PhpSolutions/Image` 文件夹中创建一个名为 `ThumbnailUpload.php` 的新文件。它只包含 PHP\
  \ 代码，因此请删除脚本编辑器插入的任何 HTML，并添加以下代码：\n\n```\n<?php\n\nnamespace PhpSolutions\\Image;\n\
  \nuse PhpSolutions\\File\\Upload;\n\nrequire_once __DIR__ . '/../File/Upload.php';\n\
  require_once 'Thumbnail.php';\n\nclass ThumbnailUpload extends Upload {\n\n}\n```\n\
  \n这声明了 `PhpSolutions\\Image` 命名空间，并在包含 `Upload` 和 `Thumbnail` 类的定义之前，导入了来自 `PhpSolutions\\\
  File` 命名空间的 `Upload` 类。\n\n> **注意**  \n> 在包含文件中使用时，`__DIR__` 返回被包含文件的目录，不包含尾部斜杠。在\
  \ `Upload.php` 相对路径的开头添加斜杠，允许 PHP 构建完整路径，向上返回一级以在 `PhpSolutions/File` 文件夹中找到它。`Thumbnail.php`\
  \ 与 `ThumbnailUpload.php` 位于同一文件夹，因此仅使用文件名即可包含。请参阅第 4 章中的“嵌套包含文件”。\n\n然后，`ThumbnailUpload`\
  \ 类声明它扩展了 `Upload`。尽管 `Upload` 位于不同的命名空间，但因为它已被导入，你可以直接将其称为 `Upload`。所有后续代码都需要插入到类定义的花括号之间。\n\
  \n子类需要三个属性：保存缩略图的文件夹、决定是否删除原始图片的布尔值，以及要添加到缩略图的后缀。如果不想使用 `Thumbnail` 中定义的默认后缀，则需要最后一个属性。在花括号内添加以下属性定义：\n\
  \n```\nprotected $thumbDestination;\nprotected $deleteOriginal;\nprotected $suffix\
  \ = '_thb';\n```\n\n当你扩展一个类时，唯一需要定义构造函数方法的情况是，当你想改变其工作方式时。`ThumbnailUpload` 类接受一个额外的参数，该参数决定是否删除原始图片，让你可以选择只保留缩略图，或保留两个版本的图片。在本地测试时，`Thumbnail`\
  \ 对象可以访问你本地硬盘上的原始图片。但是，生成缩略图是服务器端操作，因此，如果不先将原始图片上传到服务器，它就无法在网站上工作。\n\n构造函数还需要调用父构造函数来定义上传文件夹的路径。将以下定义添加到类中：\n\
  \n```\npublic function __construct($path, $deleteOriginal = false) {\n    parent::__construct($path);\n\
  \    $this->thumbDestination = $path;\n    $this->deleteOriginal = $deleteOriginal;\n\
  }\n```\n\n构造函数接受两个参数：上传文件夹的路径和一个决定是否删除原始图片的布尔变量。第二个参数在构造函数签名中设置为 `false`，使其成为可选参数。\n\
  \n> **注意**  \n> 定义函数或类方法时，传递给该函数（方法）的参数（严格来说是形参）被称为其签名。\n\n构造函数内部的第一行代码将 `$path`\
  \ 传递给父构造函数，以设置文件上传的目标文件夹。第二行代码也将 `$path` 赋值给 `$thumbDestination` 属性，使得同一文件夹成为两个图片的默认文件夹。\n\
  \n最后一行代码将第二个参数的值赋给 `$deleteOriginal` 属性。由于第二个参数是可选的，它会被自动设置为 `false`，除非你明确将其设置为\
  \ `true`，否则两个图片都会被保留。\n\n像这样创建缩略图目标文件夹的设置方法：\n\n```\npublic function setThumbDestination($path)\
  \ {\n    if (!is_dir($path) || !is_writable($path)) {\n        throw new \\Exception(\"\
  $path 必须是有效且可写的目录。\");\n    }\n    $this->thumbDestination = $path;\n}\n```\n\n\
  此方法将路径作为其唯一参数，检查它是否是一个文件夹（目录）且可写，并将该值赋给 `$thumbDestination` 属性。如果作为参数传递的值无效，该类将抛出异常。`Exception`\
  \ 前面有一个反斜杠，表示你正在使用核心的 `Exception` 类，而不是此命名空间特定的类。\n\n> **技巧**  \n> 除了为缩略图目标文件夹创建设置方法，我本可以向构造函数添加一个额外的参数。但是，当你想将缩略图和原始图片保存在同一文件夹时，我的选择简化了构造函数。另外，如果缩略图目标有问题，我本可以静默地使用原始上传文件夹，而不是抛出异常。我认为目标文件夹的问题过于严重，不容忽视。此类决策是编写任何脚本（不仅仅是设计类）不可或缺的一部分。\n\
  \n除了名称之外，缩略图后缀的设置方法与 `Thumbnail.php` 中的设置方法相同。它看起来像这样：\n\n```\npublic function setThumbSuffix($suffix)\
  \ {\n    if (preg_match('/\\w+/', $suffix)) {\n        if (strpos($suffix, '_')\
  \ !== 0) {\n            $this->suffix = '_' . $suffix;\n        } else {\n     \
  \       $this->suffix = $suffix;\n        }\n    } else {\n        $this->suffix\
  \ = '';\n    }\n}\n```\n\n你需要在此处定义该方法，因为该类继承自 `Upload`，而不是 `Thumbnail`。一个 PHP 类只能有一个父类。\n\
  \n> **注意**  \n> 为了解决单继承的问题，PHP 5.4 引入了一个名为 trait 的特性。Trait 定义了旨在被多个类使用的方法。Trait\
  \ 的结构与类相同，只是它使用关键字 `trait` 而不是 `class` 来声明。你可以使用 `use` 关键字将 trait 导入到类定义中。我决定不将\
  \ `setThumbSuffix()` 移到 trait 中，因为它非常简短，并且仅被两个类使用。要了解更多关于 trait 的信息，请参阅 [`php.net/manual/en/language.oop5.traits.php`](http://php.net/manual/en/language.oop5.traits.php)。\n\
  \n父类 `Upload` 有一个 `allowAllTypes()` 方法，该方法移除了对可上传文件 MIME 类型的限制。`ThumbnailUpload`\
  \ 类仅用于图片类型。为了防止这个继承的方法允许上传其他类型的文件，添加以下代码来覆盖它：\n\n```\npublic function allowAllTypes()\
  \ {\n    $this->typeCheckingOn = true;\n}\n```\n\n与父方法不同，此方法将 `$typeCheckingOn`\
  \ 属性设置为 `true`，强制执行 MIME 类型检查。换句话说，在 `ThumbnailUpload` 对象上调用 `allowAllTypes()` 将不会产生任何效果。\n\
  \n接下来，使用以下代码创建一个受保护的方法来生成缩略图：\n\n```\nprotected function createThumbnail($image)\
  \ {\n    $thumb = new Thumbnail($image);\n    $thumb->setDestination($this->thumbDestination);\n\
  \    $thumb->setSuffix($this->suffix);\n    $thumb->create();\n    $messages = $thumb->getMessages();\n\
  \    $this->messages = array_merge($this->messages, $messages);\n}\n```\n\n此方法接受一个参数，即图片的路径，并创建一个\
  \ `Thumbnail` 对象。该代码与 `create_thumb.php` 类似，因此无需解释。\n\n最后一行使用 `array_merge()` 将\
  \ `Thumbnail` 对象生成的任何消息与 `ThumbnailUpload` 类的 `$messages` 属性合并。尽管你在步骤 2 中定义的属性不包含\
  \ `$messages` 属性，但子类会自动从其父类继承它。\n\n\n\n## 使用 `ThumbnailUpload` 类\n\n在父类中，`moveFile()`\
  \ 方法会将上传的文件保存到目标位置。缩略图需要从原始图像生成，因此你需要重写父类的 `moveFile()` 方法，并用它来调用你刚刚定义的 `createThumbnail()`\
  \ 方法。从 `Upload.php` 复制 `moveFile()` 方法，并通过添加以下加粗显示的代码进行修改。\n\n```\nprotected function\
  \ moveFile($file) {\n\n    $filename = isset($this->newName) ? $this->newName :\
  \ $file['name'];\n\n    $success = move_uploaded_file($file['tmp_name'],\n\n   \
  \ $this->destination . $filename);\n\n    if ($success) {\n\n        // 仅在原始图像未被删除时添加消息\n\
  \n        if (!$this->deleteOriginal) {\n\n            $result = $file['name'] .\
  \ ' 上传成功';\n\n            if (!is_null($this->newName)) {\n\n                $result\
  \ .= '，并已重命名为 ' . $this->newName;\n\n            }\n\n            $this->messages[]\
  \ = $result;\n\n        }\n\n        // 从上传的图像创建缩略图\n\n        $this->createThumbnail($this->destination\
  \ . $filename);\n\n        // 如果需要，删除上传的原始图像\n\n        if ($this->deleteOriginal)\
  \ {\n\n            unlink($this->destination . $filename);\n\n        }\n\n    }\
  \ else {\n\n        $this->messages[] = '无法上传 ' . $file['name'];\n\n    }\n\n}\n\
  ```\n\n如果原始图像上传成功，新添加的代码会包含一个条件语句，使得仅在 `$deleteOriginal` 为 `false` 时生成消息。接着，它调用\
  \ `createThumbnail()` 方法，并将上传的图像作为参数传入。最后，如果 `$deleteOriginal` 已被设置为 `true`，它会使用\
  \ `unlink()` 删除上传的原始图像，只保留缩略图。\n\n保存 `ThumbnailUpload.php`。为了测试它，将 `ch08` 文件夹中的\
  \ `create_thumb_upload_01.php` 复制到 `gd` 文件夹，并另存为 `create_thumb_upload.php`。该文件包含一个简单的表单，其中有一个文件字段和一个用于显示消息的\
  \ PHP 代码块。在 `DOCTYPE` 声明之前添加以下 PHP 代码块：\n\n```\n<?php\n\nuse PhpSolutions\\Image\\\
  ThumbnailUpload;\n\nif (isset($_POST['upload'])) {\n\n    require_once('../PhpSolutions/Image/ThumbnailUpload.php');\n\
  \n    try {\n\n        $loader = new ThumbnailUpload('C:/upload_test/');\n\n   \
  \     $loader->setThumbDestination('C:/upload_test/thumbs/');\n\n        $loader->upload();\n\
  \n        $messages = $loader->getMessages();\n\n    } catch (Exception $e) {\n\n\
  \        echo $e->getMessage();\n\n    }\n\n}\n\n?>\n```\n\n如有必要，调整构造函数和 `setThumbDestination()`\
  \ 方法中的路径。\n\n通过再次上传相同的图像来测试 `ThumbnailUpload` 类。这次，原始图像和缩略图应当像第 6 章中那样，通过在文件扩展名前添加数字的方式进行重命名。尝试不同的测试：更改插入到缩略图名称中的后缀，或者在创建缩略图后删除原始图像。如果遇到问题，请将你的代码与\
  \ `ch08/PhpSolutions/Image` 文件夹中的 `ThumbnailUpload.php` 进行核对。\n\n![A978-1-4842-0635-5_8_Fig7_HTML.jpg](img/A978-1-4842-0635-5_8_Fig7_HTML.jpg)\n\
  \n图 8-7. 缩略图在上传图像的同时被创建\n\n保存 `create_thumb_upload.php` 并在浏览器中加载它。单击“浏览”或“选择文件”按钮，然后选择多张图像。当你单击“上传”按钮时，应该会看到提示上传成功并创建缩略图的消息。如图\
  \ 8-7 所示，检查目标文件夹。\n\n**提示**：在不支持表单字段 `multiple` 属性的旧版浏览器中，该类会上传单张图像并为其创建缩略图。为了支持旧版浏览器的多文件上传，请在表单中创建多个文件字段，并为它们设置相同的\
  \ `name` 属性，后跟一对空的方括号，如下所示：`name=\"image[]\"`。\n\n## 使用 `ThumbnailUpload` 类\n\n\
  `ThumbnailUpload` 类很容易使用。由于它使用了命名空间，你需要在文件的顶层导入该类，如下所示：\n\n`use PhpSolutions\\Image\\\
  ThumbnailUpload;`\n\n然后包含类定义，并将上传文件夹的路径传递给类的构造函数方法：\n\n`$loader = new ThumbnailUpload('C:/upload_test/');`\n\
  \n如果你想在创建缩略图后删除原始图像，请将 `true` 作为第二个参数传递给构造函数，如下所示：\n\n`$loader = new ThumbnailUpload('C:/upload_test/',\
  \ true);`\n\n该类具有以下公有方法：\n\n- `setThumbDestination()`：设置用于保存缩略图的目标文件夹路径。如果不调用此方法，缩略图将存储在原始图像所在的同一文件夹中。\n\
  - `setThumbSuffix()`：使用此方法更改插入到缩略图名称中的后缀。默认值为 `_thb`。\n- `upload()`：上传原始图像并生成缩略图。默认情况下，与现有图像同名的图像会被重命名。若要覆盖现有图像，请将\
  \ `false` 作为参数传递给此方法。\n- 该类还继承自父类 `Upload` 的以下方法：\n- `getMessages()`：检索上传和缩略图生成过程中产生的消息。\n\
  - `getMaxSize()`：获取单张图像的最大上传大小。默认值为 50 KB。\n- `setMaxSize()`：更改最大上传大小。参数应以允许的字节数表示。\n\
  \n因为 `ThumbnailUpload` 类依赖于 `Upload` 和 `Thumbnail` 类，所以在实际网站上使用此类时，你需要将这三个类定义文件上传到你的远程\
  \ Web 服务器。\n\n### 本章回顾\n\n这又是一个内容密集的章节，不仅展示了如何从较大的图像生成缩略图，还向你介绍了如何扩展现有类以及重写继承的方法。设计和扩展类起初可能会让人感到困惑，但如果你专注于每个方法的作用，事情就会变得不那么令人望而生畏。类设计的一个关键原则是将大型任务分解为小的、可管理的单元。理想情况下，一个方法应执行单一任务，例如为原始图像创建图像资源。\n\
  \n使用类的真正优势在于，一旦你定义了它们，就能节省大量时间和精力。每次你想向网站添加文件或缩略图上传功能时，无需输入数十行代码，调用该类只需几行简单的代码。此外，不要认为本章的代码仅限于创建和上传缩略图。类文件中的许多子程序都可以经过调整用于其他场景。\n\
  \n在下一章中，你将全面了解 PHP 会话。它能保留与特定用户相关的信息，并在密码保护网页方面起着至关重要的作用。\n\n\n\n"
- "# 9. 具备记忆功能的页面：简易登录与多页表单\n\n网络世界是一场精妙的幻象。当你访问一个设计精良的网站时，会体验到一种强烈的连贯性，仿佛在翻阅一本书或一本杂志。所有元素都完美融合，成为一个协调的整体。而现实情况则大相径庭。网页的每个部分都由网络服务器分别存储和处理。除了需要知道将相关文件发送到哪里之外，服务器对你的身份毫无兴趣。每次\
  \ PHP 脚本运行时，变量只存在于服务器的内存中，并且通常在脚本执行完毕后就被丢弃。即便是 `$_POST` 和 `$_GET` 数组中的变量，其寿命也极其短暂。它们的值只被传递给下一个脚本一次，之后便从内存中移除——除非你对其进行某些操作，比如将信息存储在一个隐藏的表单字段中。即便如此，也只有在表单被提交时，这些信息才会持续存在。\n\
  \n为了解决这些问题，PHP 采用了会话（Sessions）机制。在简要介绍会话的工作原理之后，我将向你展示如何使用会话变量来创建一个简单的基于文件的登录系统，并在无需使用隐藏表单字段的情况下，将信息从一个页面传递到另一个页面。\n\
  \n在本章中，你将学习以下内容：\n\n-   理解什么是会话以及如何创建它们\n-   创建一个基于文件的登录系统\n-   使用自定义类检查密码强度\n-\
  \   为会话设置时间限制\n-   使用会话在多页面间追踪信息\n\n## 什么是会话及其工作原理\n\n会话通过在 Web 服务器上以及访问者计算机的 Cookie\
  \ 中存储一个随机标识符（即会话 ID）来确保连续性。Web 服务器利用这个 Cookie 来识别正在与同一个人（更准确地说，是同一台计算机）通信。图 9-1\
  \ 至 9-3 展示了在我的本地测试环境中创建的一个简单会话的详细信息。\n\n![A978-1-4842-0635-5_9_Fig1_HTML.jpg](img/A978-1-4842-0635-5_9_Fig1_HTML.jpg)\n\
  \n*图 9-1. PHP 会话将唯一标识符作为 Cookie 存储在浏览器中*\n\n如图 9-1 所示，存储在浏览器中的 Cookie 被称为 `PHPSESSID`，其内容是一串杂乱的字母和数字。这个随机字符串就是会话的\
  \ ID。\n\n在 Web 服务器上，会创建一个匹配的文件，文件名中包含同样杂乱的字母和数字，如图 9-2 所示。\n\n![A978-1-4842-0635-5_9_Fig2_HTML.jpg](img/A978-1-4842-0635-5_9_Fig2_HTML.jpg)\n\
  \n*图 9-2. Cookie 的内容标识了存储在 Web 服务器上的会话数据*\n\n当一个会话被启动时，服务器会将信息存储在会话变量中。只要会话保持活动状态（通常直到浏览器关闭），这些变量就可以被其他页面访问。由于每个访问者的会话\
  \ ID 都是唯一的，因此存储在会话变量中的信息不会被其他人看到。这意味着会话非常适合用于用户身份验证，尽管它们也可以用于任何你希望在从一页转到下一页时为同一用户保留信息的场景，例如多页表单或购物车。\n\
  \n存储在用户计算机上的唯一信息是包含会话 ID 的 Cookie，而这个 ID 本身毫无意义。这意味着，仅通过检查此 Cookie 的内容，私有信息是不会暴露的。\n\
  \n会话变量及其值存储在 Web 服务器上。图 9-3 显示了一个简单会话文件的内容。如你所见，它是纯文本格式，内容也不难解读。图中所示的会话只有一个变量：`name`。变量名后面跟着一个竖线，然后是字母“s”、冒号、一个数字、另一个冒号，以及用引号括起来的变量值。“s”代表字符串，数字表示该字符串包含的字符数。因此，这个会话变量包含我的名字，作为一个长度为\
  \ 5 个字符的字符串。\n\n![A978-1-4842-0635-5_9_Fig3_HTML.jpg](img/A978-1-4842-0635-5_9_Fig3_HTML.jpg)\n\
  \n*图 9-3. 会话的详细信息以纯文本形式存储在服务器上*\n\n这种设置有几个影响。包含会话 ID 的 Cookie 通常保持活动状态直到浏览器关闭。因此，如果多人共用同一台计算机，除非他们在交接给下一个人之前总是关闭浏览器（这是你无法控制的），否则他们都能访问彼此的会话。因此，提供一个注销机制来删除\
  \ Cookie 和会话变量，以保持你的网站安全，这一点非常重要。你还可以创建一个超时机制，在特定不活动时间后自动阻止任何人重新获得访问权限。\n\n将会话变量以纯文本形式存储在\
  \ Web 服务器上，这本身并不值得担忧。只要服务器配置正确，会话文件就不能通过浏览器访问。不活动的文件也会被 PHP 定期删除（理论上的生存时间是 1,440\
  \ 秒——24 分钟，但这并不能保证）。然而，显而易见的是，如果攻击者成功入侵了服务器或劫持了一个会话，这些信息就可能暴露。因此，尽管会话对于保护网站部分区域的密码或处理多页表单来说通常足够安全，但你绝不应将会话变量用于存储敏感信息，例如密码或信用卡详细信息。正如你将在本章后面的“使用会话限制访问”中看到的，虽然密码用于访问受保护站点，但密码本身是存储在单独的位置（最好是加密的），而不是作为会话变量。\n\
  \n会话默认是受支持的，因此你不需要任何特殊配置。但是，如果用户浏览器中禁用了 Cookie，会话将无法工作。可以配置 PHP 通过查询字符串发送会话 ID，但这被认为是一种安全风险。\n\
  \n### 创建 PHP 会话\n\n只需将以下命令放在你希望用于会话的每个 PHP 页面中：\n\n```\nsession_start();\n```\n\n\
  这个命令在每个页面中只应调用一次，并且必须在 PHP 脚本生成任何输出之前调用，因此理想位置是紧跟在 PHP 开始标签之后。如果在调用 `session_start()`\
  \ 之前生成了任何输出，该命令将失败，并且该页面的会话将不会被激活（稍后请参阅“‘Headers already sent’ 错误”一节以了解原因）。\n\n\
  ### 创建和销毁会话变量\n\n你可以通过将变量添加到 `$_SESSION` 超全局数组来创建会话变量，其方式与赋值普通变量相同。假设你想存储访问者的名字并显示问候语。如果名字在登录表单中作为\
  \ `$_POST['name']` 提交，你可以这样赋值：\n\n```\n$_SESSION['name'] = $_POST['name'];\n```\n\
  \n现在，`$_SESSION['name']` 可以在任何以 `session_start()` 开头的页面中使用。由于会话变量存储在服务器上，一旦你的脚本或应用程序不再需要它们，就应该将其清除。像这样释放一个会话变量：\n\
  \n```\nunset($_SESSION['name']);\n```\n\n要释放所有会话变量——例如，当你要注销某人时——将 `$_SESSION` 超全局数组设置为空数组，像这样：\n\
  \n```\n$_SESSION = [];\n```\n\n> **警告**  \n> 不要试图使用 `unset($_SESSION)`。它虽然能正常工作，但效果过强。它不仅会清除当前会话，还会阻止存储任何后续的会话变量。\n\
  \n\n\n### 销毁会话\n\n仅仅取消设置所有会话变量能有效防止任何信息被重复使用，但你也应像这样使会话 Cookie 失效：\n\n```\nif (isset($_COOKIE[session_name()]))\
  \ {\n    setcookie(session_name(), '', time()-86400, '/');\n}\n```\n\n这里使用函数 `session_name()`\
  \ 动态获取会话名称，并将会话 Cookie 重置为空字符串，且将其过期时间设为 24 小时之前（86,400 是一天的秒数）。最后一个参数（`'/'`）将 Cookie\
  \ 应用于整个域名。\n\n最后，使用以下命令销毁会话：\n\n```\nsession_destroy();\n```\n\n像这样销毁会话后，未经授权的人员便无法访问网站的限制区域或会话期间交换的任何信息。然而，访问者可能会忘记注销，因此无法始终保证\
  \ `session_destroy()` 命令会被触发，这就是为什么不在会话变量中存储敏感信息如此重要的原因。\n\n**注意**\n\n你可能会在旧脚本中见到\
  \ `session_register()` 和 `session_unregister()` 函数。这些函数已在 PHP 5.4 中被移除，不再可用。请改用\
  \ `$_SESSION['variable_name']` 和 `unset($_SESSION['variable_name'])`。\n\n### 重新生成会话\
  \ ID\n\n当用户状态发生改变时（例如登录后），建议作为安全措施重新生成会话 ID。这会更改标识会话的随机字母数字字符串，但会保留存储在会话变量中的所有信息。在《PHP\
  \ Pro Security》第二版（Apress, 2010，ISBN 978-1-4302-3318-3）中，Chris Snyder 和 Michael\
  \ Southwell 解释道：“生成新会话 ID 的目的是消除攻击者利用低级安全会话知识执行高级安全任务的可能性，无论这种可能性多么微小。”\n\n要重新生成会话\
  \ ID，只需调用 `session_regenerate_id()`，然后将用户重定向到另一个页面或重新加载当前页面。\n\n### “标头已发送”错误\n\n\
  虽然使用 PHP 会话非常简单，但有一个问题常让初学者头疼不已。你看到的不是一切按预期工作，而是以下消息：\n\n```\nWarning: Cannot add\
  \ header information - headers already sent\n```\n\n我之前在讨论 `header()` 函数时已多次提及此问题。它同样会影响\
  \ `session_start()` 和 `setcookie()`。对于 `session_start()`，解决方案很简单：确保将其紧跟在 PHP 开始标签之后（或尽早放置），并检查开始标签前没有空白字符。\n\
  \n有时即使 PHP 标签前没有空白字符，问题仍会发生。这通常是由于编辑软件在脚本开头插入了字节顺序标记（BOM）。如果遇到这种情况，请打开脚本编辑器的偏好设置，禁用\
  \ PHP 页面中的 BOM 使用。\n\n然而，当使用 `setcookie()` 销毁会话 Cookie 时，很可能需要在调用该函数之前向浏览器发送输出。在这种情况下，PHP\
  \ 允许你使用 `ob_start()` 将输出保存在缓冲区中。然后在 `setcookie()` 完成其工作后，使用 `ob_end_flush()` 刷新缓冲区。你将在\
  \ PHP 解决方案 9-2 中了解如何实现。\n\n## 使用会话限制访问\n\n当考虑限制网站访问时，最先想到的词可能是“用户名”和“密码”。尽管这些通常是解锁网站入口的关键，但它们对会话来说并非必需。你可以将任何值存储为会话变量，并用它来决定是否允许访问某个页面。例如，你可以创建一个名为\
  \ `$_SESSION['status']` 的变量，根据其值赋予访问者网站不同区域的权限，如果未设置则该变量不赋予任何访问权限。\n\n一个小演示应该能让一切清晰明了，并向你展示会话在实际中是如何运作的。\n\
  \n\n  \n### PHP 解决方案 9-1：一个简单的会话示例\n\n此示例只需几分钟即可构建完成，但你也可以在 `ch09` 文件夹中的 `session_01.php`、`session_02.php`\
  \ 和 `session_03.php` 文件中找到完整代码。\n\n在 `phpsols` 站点根目录下创建一个名为 `sessions` 的新文件夹，并在其中创建一个名为\
  \ `session_01.php` 的页面。插入一个包含名为 `name` 的文本字段和一个 `Submit` 按钮的表单。将 `method` 设置为 `post`，`action`\
  \ 设置为 `session_02.php`。表单应如下所示：\n\n```\n<form method=\"post\" action=\"session_02.php\"\
  >\n\n<p>\n\n<label for=\"name\">Name:</label>\n\n<input type=\"text\" name=\"name\"\
  \ id=\"name\">\n\n</p>\n\n<p>\n\n<input type=\"submit\" name=\"Submit\" value=\"\
  Submit\">\n\n</p>\n\n</form>\n```\n\n在另一个名为 `session_02.php` 的页面中，在 `DOCTYPE` 声明上方插入以下代码：\n\
  \n```\n<?php\n\n// 启动会话\n\nsession_start();\n\n// 检查表单是否已提交且 name 不为空\n\nif ($_POST\
  \ && !empty($_POST['name'])) {\n\n// 设置会话变量\n\n$_SESSION['name'] = $_POST['name'];\n\
  \n}\n\n?>\n```\n\n在 `session_02.php` 的 `<body>` 标签之间插入以下代码：\n\n- 内联注释解释了代码的功能。会话启动后，只要\
  \ `$_POST['name']` 不为空，其值就会被赋给 `$_SESSION['name']`。\n\n```\n<?php\n\n// 检查会话变量是否已设置\n\
  \nif (isset($_SESSION['name'])) {\n\n// 如果已设置，则按名称问候\n\necho 'Hi, ' . $_SESSION['name']\
  \ . '. <a href=\"session_03.php\">Next</a>';\n\n} else {\n\n// 如果未设置，则返回登录页面\n\n\
  echo 'Who are you? <a href=\"session_01.php\">Login</a>';\n\n}\n\n?>\n```\n\n- 如果\
  \ `$_SESSION['name']` 已设置，则会显示一条欢迎消息以及一个指向 `session_03.php` 的链接。否则，页面会提示访客无法识别其身份，并提供返回第一个页面的链接。\n\
  \n**注意**\n\n输入以下行时请务必小心：\n\n`echo 'Hi, ' . $_SESSION['name'] . '. <a href=\"session03.php\"\
  >Next</a>';`\n\n前两个句点（围绕 `$_SESSION['name']` 的）是 PHP 的连接运算符。第三个句点（紧跟在单引号之后）是一个普通的句点，将作为字符串的一部分显示。\n\
  \n创建 `session_03.php`。在 `DOCTYPE` 上方输入以下代码以启动会话：\n\n`<?php session_start(); ?>`\n\
  \n在 `session_03.php` 的 `<body>` 标签之间插入以下代码：\n\n```\n<?php\n\n// 检查会话变量是否已设置\n\n\
  if (isset($_SESSION['name'])) {\n\n// 如果已设置，则按名称问候\n\necho 'Hi, ' . $_SESSION['name']\
  \ . '. See, I remembered your name!<br>';\n\n// 取消设置会话变量\n\nunset($_SESSION['name']);\n\
  \n// 使会话 cookie 失效\n\nif (isset($_COOKIE[session_name()])) {\n\nsetcookie(session_name(),\
  \ '', time()-86400, '/');\n\n}\n\n// 结束会话\n\nsession_destroy();\n\necho '<a href=\"\
  session_02.php\">Page 2</a>';\n\n} else {\n\n// 如果无法识别，则显示相应信息\n\necho \"Sorry,\
  \ I don't know you.<br>\";\n\necho '<a href=\"session_01.php\">Login</a>';\n\n}\n\
  \n?>\n```\n\n在浏览器中加载 `session_01.php`，在文本字段中输入你的姓名，然后点击 Submit。你应该会看到类似以下截图的内容。在此阶段，这里发生的情况与普通表单相比没有明显区别。\n\
  \n- 如果 `$_SESSION['name']` 已设置，页面会显示它，然后将其取消设置并使当前会话 cookie 失效。通过在第一个代码块末尾放置 `session_destroy()`，会话及其关联的变量将不再可用。\n\
  \n![A978-1-4842-0635-5_9_Figa_HTML.jpg](img/A978-1-4842-0635-5_9_Figa_HTML.jpg)\n\
  \n当你点击 Next 时，会话的强大功能开始显现。即使 `$_POST` 数组不再可用，页面仍能记住你的姓名。如果你使用 XAMPP 作为测试环境，你可能会看到类似以下截图的画面。\n\
  \n![A978-1-4842-0635-5_9_Figb_HTML.jpg](img/A978-1-4842-0635-5_9_Figb_HTML.jpg)\n\
  \n- 但是，在其他环境（例如 MAMP）中，你可能会收到类似这样的\"headers already sent\"警告消息：\n\n![A978-1-4842-0635-5_9_Figc_HTML.jpg](img/A978-1-4842-0635-5_9_Figc_HTML.jpg)\n\
  \n**注意**\n\n正如第 4 章中所解释的，XAMPP 不会产生关于标头的警告，因为它被配置为缓冲前 4 KB 的输出。然而，并非所有服务器都会缓冲输出，因此修复此问题非常重要。\n\
  \n点击 Page 2 的链接（如果你收到了错误消息，它就在消息下方）。会话已被销毁，因此这次 `session_02.php` 不知道你是谁。\n\n![A978-1-4842-0635-5_9_Figd_HTML.jpg](img/A978-1-4842-0635-5_9_Figd_HTML.jpg)\n\
  \n在浏览器地址栏中输入 `session_03.php` 的地址并加载它。它同样不记得该会话，并显示一条适当的消息。\n\n![A978-1-4842-0635-5_9_Fige_HTML.jpg](img/A978-1-4842-0635-5_9_Fige_HTML.jpg)\n\
  \n即使你在第 8 步中没有收到警告消息，当你将依赖会话的页面部署到其他服务器时，也需要防止它发生。错误消息不仅看起来不好，而且还意味着 `setcookie()`\
  \ 无法使会话 cookie 失效。尽管 `session_start()` 紧跟在 `session_03.php` 中开头 PHP 标签之后，但警告消息是由在\
  \ `setcookie()` 之前输出的 `DOCTYPE` 声明、`<head>` 和其他 HTML 内容触发的。\n\n### PHP 解决方案 9-2：使用\
  \ ob_start() 缓冲输出\n\n虽然你可以将 `setcookie()` 放在 `DOCTYPE` 声明上方的 PHP 代码块中，但你还需要将 `$_SESSION['name']`\
  \ 的值赋给一个普通变量，因为它在会话销毁后就不复存在了。与其完全拆解整个脚本，不如使用 `ob_start()` 来缓冲输出。\n\n继续使用上一节中的 `session_03.php`\
  \ 文件。\n\n像这样修改 `DOCTYPE` 声明上方的 PHP 代码块：\n\n```\n<?php\n\nsession_start();\n\nob_start();\n\
  \n?>\n```\n\n在使会话 cookie 失效后立即刷新输出，如下所示：\n\n- 这会开启输出缓冲，并阻止将输出发送到浏览器，直到脚本结束或你使用 `ob_end_flush()`\
  \ 专门刷新输出。\n\n```\n// 使会话 cookie 失效\n\nif (isset($_COOKIE[session_name()])) {\n\n\
  setcookie(session_name(), '', time()-86400, '/');\n\n}\n\nob_end_flush();\n```\n\
  \n保存 `session_03.php` 并再次测试整个流程。这次应该不会出现警告。更重要的是，会话 cookie 将不再有效。\n\n### 使用基于文件的身份验证\n\
  \n正如你刚才所见，会话变量和条件语句的结合使用，让你能够根据会话变量是否已设置，向访问者呈现完全不同的页面。你只需要添加一个密码检查系统，就拥有了一个基本的用户身份验证系统。\n\
  \n在 PHP 解决方案 7-2 中，我向你展示了如何使用 `fopen()` 和 `fgetcsv()` 函数从 CSV 文件生成一个多维关联数组。现在，你可以改编该脚本，利用会话创建一个简单的登录系统。每个人的用户名和密码作为逗号分隔的值存储在\
  \ `users.csv` 文件中。文件的第一行包含用作每个子数组键的字段标题。文件内容如下所示：\n\n```\nname,password\n\ndavid,codeslave\n\
  \nben,bigboss\n```\n\n**注意**\n\n以下 PHP 解决方案假设在 `private` 文件夹中有一个 `users.csv` 的副本，该文件夹是在第\
  \ 7 章中设置的。如果你尚未设置供 PHP 读写文件的文件夹，请参阅第 7 章。如果你创建自己的 `users.csv` 版本，请注意用户名和密码之间的逗号后不应有空格。\n\
  \n\n\n"
- "# PHP 方案 9-3：构建登录页面\n\n该 PHP 方案展示了如何通过 `post` 方法提交用户名和密码，然后将提交的值与外部文本文件中存储的值进行核对。如果找到匹配项，脚本将设置一个会话变量，然后将用户重定向到另一个页面。\n\
  \n在 `sessions` 文件夹中创建一个名为 `login.php` 的文件，然后插入一个包含用户名和密码文本输入字段的表单，以及一个名为 `login`\
  \ 的提交按钮，如下所示（或者，使用 `ch09` 文件夹中的 `login_01.php`）：\n\n```html\n<form method=\"post\"\
  \ action=\"\">\n  <p>\n    <label for=\"username\">用户名:</label>\n    <input type=\"\
  text\" name=\"username\" id=\"username\">\n  </p>\n  <p>\n    <label for=\"pwd\"\
  >密码:</label>\n    <input type=\"password\" name=\"pwd\" id=\"pwd\">\n  </p>\n  <p>\n\
  \    <input name=\"login\" type=\"submit\" value=\"登录\">\n  </p>\n</form>\n```\n\
  \n这是一个简单的表单，没什么特别的：\n\n![A978-1-4842-0635-5_9_Figf_HTML.jpg](img/A978-1-4842-0635-5_9_Figf_HTML.jpg)\n\
  \n在 `DOCTYPE` 声明上方的 PHP 代码块中添加以下代码：\n\n```php\n$error = '';\n\nif (isset($_POST['login']))\
  \ {\n  session_start();\n  $username = $_POST['username'];\n  $password = $_POST['pwd'];\n\
  \n  // 存储用户名和密码的位置\n  $userlist = 'C:/private/users.csv';\n\n  // 登录成功后的重定向地址\n\
  \  $redirect = 'http://localhost/phpsols/sessions/menu.php';\n\n  require_once '../includes/authenticate.php';\n\
  }\n```\n\n-   这段代码将一个名为 `$error` 的变量初始化为空字符串。如果登录失败，将用它来显示错误消息，告知用户失败原因。\n-   条件语句随后检查\
  \ `$_POST` 数组中是否包含名为 `login` 的元素。如果包含，表示表单已提交，花括号内的代码会启动一个 PHP 会话，并将通过 `$_POST`\
  \ 数组传递的值存储在 `$username` 和 `$password` 中。然后创建 `$userlist`，用于定义包含注册用户名和密码的文件路径，以及\
  \ `$redirect`，即用户成功登录后将跳转到的页面 URL。\n-   最后，条件语句内的代码引入了 `authenticate.php`，你接下来将创建这个文件。\n\
  \n> **注意：** 请调整 `$userlist` 的值，使其与你自己系统中的实际路径一致。\n\n在 `includes` 文件夹中创建一个名为 `authenticate.php`\
  \ 的文件。该文件只包含 PHP 代码，因此删除脚本编辑器插入的任何 HTML 内容，并插入以下代码：\n\n```php\n<?php\nif (!file_exists($userlist)\
  \ || !is_readable($userlist)) {\n  $error = '登录功能不可用，请稍后再试。';\n} else {\n  $file\
  \ = fopen($userlist, 'r');\n  // 忽略 CSV 文件第一行中的标题\n  $titles = fgetcsv($file);\n\
  \  // 循环处理剩余行\n  while (($data = fgetcsv($file)) !== false) {\n    // 如果第一个元素为空则跳过\n\
  \    if (is_null($data[0])) {\n      continue;\n    }\n    // 如果用户名和密码匹配，则创建会话变量，\n\
  \    // 重新生成会话 ID，并跳出循环\n    if ($data[0] == $username && $data[1] == $password)\
  \ {\n      $_SESSION['authenticated'] = 'Jethro Tull';\n      session_regenerate_id();\n\
  \      break;\n    }\n  }\n  fclose($file);\n}\n```\n\n如果登录成功，`header()` 函数需要将用户重定向到\
  \ `$redirect` 中存储的 URL，然后退出脚本。否则，需要生成一条错误消息，告知用户登录失败。完整的脚本如下所示：\n\n-   这段代码改编自 PHP\
  \ 方案 7-2 中 `getcsv.php` 使用的代码。条件语句首先检查文件是否存在或是否可读。如果 `$userlist` 有问题，则立即生成错误消息。\n\
  -   否则，`else` 块中的主代码通过以只读模式打开文件，并使用 `fgetcsv()` 函数返回每一行数据的数组，来提取 CSV 文件的内容。在 PHP\
  \ 方案 7-2 中，这些值被存储在一个包含每位注册用户名称和密码的多维数组中。这次则无需存储它们。我们只关心找到与 `$username` 和 `$password`\
  \ 值匹配的用户名/密码对。\n-   CSV 文件的第一行包含字段标题。脚本将其提取到一个名为 `$titles` 的变量中，但从未使用过。`while` 循环随后检查剩余行。每次循环运行时，它都会将当前行提取到一个名为\
  \ `$data` 的数组中。第一个元素包含用户名，第二个元素包含对应的密码。如果 `$data[0]` 为 `null`，则可能意味着当前行是空行，因此会跳过。\n\
  -   如果 `$data` 数组中的两个元素都与 `$username` 和 `$password` 匹配，脚本会创建一个名为 `$_SESSION['authenticated']`\
  \ 的变量，并赋予它一个 1970 年代伟大民谣摇滚乐队的名字。这两者（除了杰思罗·塔尔的音乐）并无特殊含义；变量名和值是我随意选择的。关键的是创建了一个会话变量。一旦找到匹配项，会话\
  \ ID 会被重新生成，然后 `break` 退出循环。\n\n```php\n<?php\nif (!file_exists($userlist) || !is_readable($userlist))\
  \ {\n  $error = '登录功能不可用，请稍后再试。';\n} else {\n  $file = fopen($userlist, 'r');\n\
  \  // 忽略 CSV 文件第一行中的标题\n  $titles = fgetcsv($file);\n  // 循环处理剩余行\n  while (($data\
  \ = fgetcsv($file)) !== false) {\n    // 如果第一个元素为空则跳过\n    if (is_null($data[0]))\
  \ {\n      continue;\n    }\n    // 如果用户名和密码匹配，则创建会话变量，\n    // 重新生成会话 ID，并跳出循环\n\
  \    if ($data[0] == $username && $data[1] == $password) {\n      $_SESSION['authenticated']\
  \ = 'Jethro Tull';\n      session_regenerate_id();\n      break;\n    }\n  }\n \
  \ fclose($file);\n\n  // 如果会话变量已设置，则进行重定向\n  if (isset($_SESSION['authenticated']))\
  \ {\n    header(\"Location: $redirect\");\n    exit;\n  } else {\n    $error = '用户名或密码无效。';\n\
  \  }\n}\n```\n\n在 `login.php` 文件中，在 `<body>` 开始标签之后添加以下简短代码块，用于显示任何错误消息：\n\n```php\n\
  <body>\n<?php\nif ($error) {\n  echo \"<p>$error</p>\";\n}\n?>\n<form method=\"\
