  raw: 'To simplify things in this section, you’ll supply a single page for both administrators
    and suppliers. This might not be ideal in all situations because you might not
    want to expose all order details and audit information to external suppliers.
    However, for demonstration purposes, this reduces the amount of code you have
    to get through. You’ll also tie in the security for this page with the administrator
    forms-based security used earlier in the book, assuming that people with permission
    to edit the site data will also have permission to administer orders. In a more
    advanced setup, you could modify this slightly, providing roles for different
    types of users and restricting the functionality available to users in different
    roles.


    **Implementing the Data Tier**


    We need to add a new data tier function to the hatshop database, orders_get_audit_trail,
    and update an existing function, orders_update_order, to take into account the
    new status codes.


    Using pgAdmin III, connect to the hatshop database, and use the query tool to
    execute this code, which creates the orders_update_order function in your hatshop
    database:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH14.qxd 11/17/06 3:47 PM Page 499


    C H A P T E R 1 4 ■ I I M P L E M E N T I N G T H E O R D E R P I P E L I N E
    : PA RT I I **499**


    -- Update orders_update_order function


    CREATE OR REPLACE FUNCTION orders_update_order(INTEGER, INTEGER, VARCHAR(255),
    VARCHAR(50), VARCHAR(50))


    RETURNS VOID LANGUAGE plpgsql AS $$


    DECLARE


    inOrderId ALIAS FOR $1;


    inStatus ALIAS FOR $2;


    inComments ALIAS FOR $3;


    inAuthCode ALIAS FOR $4;


    inReference ALIAS FOR $5;


    currentDateShipped TIMESTAMP;


    BEGIN


    SELECT INTO currentDateShipped


    shipped_on


    FROM orders


    WHERE order_id = inOrderId;


    UPDATE orders


    SET status = inStatus, comments = inComments,


    auth_code = inAuthCode, reference = inReference


    WHERE order_id = inOrderId;


    IF inStatus < 7 AND currentDateShipped IS NOT NULL THEN


    UPDATE orders SET shipped_on = NULL WHERE order_id = inOrderId; ELSEIF inStatus
    > 6 AND currentDateShipped IS NULL THEN


    UPDATE orders SET shipped_on = NOW() WHERE order_id = inOrderId; END IF;


    END;


    $$;


    Then, use the query tool to execute this code, which creates the orders_get_audit_trail
    function in your hatshop database:


    -- Create orders_get_audit_trail function


    CREATE FUNCTION orders_get_audit_trail(INTEGER)


    RETURNS SETOF audit LANGUAGE plpgsql AS $$


    DECLARE


    inOrderId ALIAS FOR $1;


    outAuditRow audit;


    BEGIN


    FOR outAuditRow IN


    SELECT audit_id, order_id, created_on, message, message_number FROM audit


    WHERE order_id = inOrderId


    LOOP


    RETURN NEXT outAuditRow;


    END LOOP;


    END;


    $$;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH14.qxd 11/17/06 3:47 PM Page 500


    **500**


    C H A P T E R 1 4 ■ I I M P L E M E N T I N G T H E O R D E R P I P E L I N E
    : PA RT I I **Implementing the Business Tier**


    You also have to add a new method to the Orders class from business/orders.php
    to cater to the new data tier function added in the previous section.


    Add the GetAuditTrail method to the Orders class in business/orders.php, as follows:


    // Gets the audit table entries associated with a specific order public static
    function GetAuditTrail($orderId)


    {


    // Build the SQL query


    $sql = ''SELECT * FROM orders_get_audit_trail(:order_id);'';


    // Build the parameters array


    $params = array ('':order_id'' => $orderId);


    // Prepare the statement with PDO-specific functionality $result = DatabaseHandler::Prepare($sql);


    // Execute the query and return the results


    return DatabaseHandler::GetAll($result, $params);


    }


    **Implementing the Presentation Tier**


    You need to update the admin_order_details componentized template, which shows
    the details of an order. Earlier in the book, this componentized template also
    included the capability to test the order process, but we’re removing this here.
    Instead, you’ll provide the capability for orders to be pushed along the pipeline
    when they are stuck at the Awaiting confirmation of stock and Awaiting confirmation
    of shipment stages.


    Now, you can also display all the audit information for the order in another new
    table.


    Let’s look at what you’re going to achieve, as shown in Figure 14-7.


    You can split the orders admin page into three sections:


    • In the first section, we’ll change the Process button to a confirmation button
    for suppliers.


    • In the second section, a table is filled with the items data from the order.


    • In the third section, a table shows the audit trail for the order.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00181.png)


    648XCH14.qxd 11/17/06 3:47 PM Page 501


    C H A P T E R 1 4 ■ I I M P L E M E N T I N G T H E O R D E R P I P E L I N E
    : PA RT I I **501**


    **Figure 14-7.** *The new Order Details Admin page* You implement the new functionality
    in the next exercise.


