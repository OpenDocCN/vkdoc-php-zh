  trans: '

    ### 准备 `tmp` 文件夹以供 Cake 读取和写入临时文件


    `tmp` 文件夹位于应用程序文件夹中。默认情况下，其权限设置为 `0777`，但可能会更改为服务器权限默认值。Cake 的欢迎界面会告知您 `tmp` 文件夹是否可写。如果此条亮起绿色，则无需调整
    `tmp` 文件夹。如果没有，请在命令行中运行以下命令来更改 `tmp` 及其包含文件的权限：


    ```

    chmod -R 0777 tmp

    ```


    然后刷新启动界面。它应会变为“您的 `tmp` 目录可写”（参见图 2-3）。


    **图 2-3.** *Cake 会告知您 `tmp` 文件夹是否可写。*


    ### 更改 `Security.salt` 值


    当会话初始化时，服务器会使用会话 ID、数据库或 cookie 将一组请求组合在一起。无论采用何种方法，会话背后的理念是服务器可以与用户维护一个伪连接，即使通信可能会在此过程中中断。当您登录基于网页的电子邮件帐户或类似的网络服务时，就会遇到这种情况。站点应用程序知道您已登录，并保持该状态，直到您注销或经过一段不活动的时间。


    幸运的是，Cake 使会话处理变得简单。但您需要确保其会话字符串是安全的。您不希望任何用户为了闯入您的应用程序而摆弄会话处理。


    要为会话变量增加一些安全性，请打开 `app/config/core.php` 文件，找到第 153 行左右。您会看到一行类似这样的代码：`Configure::write(''Security.salt'',
    ''DYhG93b0qyJfIxfs2guVoUubWwvniR2G0FgaC9mi'');` 这行代码是 Cake 写入定义的方式。Cake 的核心配置不使用
    PHP 的 `define()` 函数，而是使用 `Configure::write()` 函数来更好地管理全局变量。在这里，Cake 核心使用 `Security.salt`
    定义来创建哈希值和其他会话变量。


    因为那串奇特的字符随 Cake 一起提供，所以每个使用 Cake 的人都有相同的会话字符串。让我们更改第二部分，即字符串，改为一些独特的内容。您可以继续填写任何大约
    40 个字符的字母数字字符串，并将其粘贴在此处。我最终得到了这个：


    ```

    Configure::write(''Security.salt'', ''mEayuDrXBhZkdiEJgFzPXvbcBrmKo9CdVGtKyPBr'');

    ```


    现在，当 Cake 需要运行任何非默认值的安全配置和哈希运算时，它就有了一个盐值。


    ### 输入 MySQL 连接设置


    Cake 需要知道您的数据库位于何处才能保存和检索数据。您可以通过编辑 `app/config/database.php.default` 文件来完成此操作。您需要将文件重命名为
    `database.php`（从末尾删除 `.default`），并在您选择的纯文本编辑器中编辑它。无论您的 `localhost` 如何设置，您都需要知道
    Cake 连接数据库所需的 MySQL 登录名和密码。这通常设置为默认值，除非您配置了管理员帐户（例如，登录名和密码的默认值为 `root` 等）。在数据库配置中，会有一个位置供您输入登录名和密码值。清单
    2-1 显示了数据库配置文件中的默认 `DATABASE_CONFIG` 类。


    **清单 2-1.** *数据库配置文件*


    ```

    1 class DATABASE_CONFIG {

    3   var $default = array(

    4    ''driver'' => ''mysql'',

    5    ''persistent'' => false,

    6    ''host'' => ''localhost'',

    7    ''port''=>'''',

    8    ''login'' => ''user'',

    9    ''password'' => ''password'',

    10   ''database'' => ''project_name'',

    11   ''schema''=>'''',

    12   ''prefix'' => '''',

    13   ''encoding''=>''''

    14   );

    16   var $test = array(

    17    ''driver'' => ''mysql'',

    18    ''persistent'' => false,

    19    ''host'' => ''localhost'',

    20    ''port''=>'''',

    21    ''login'' => ''user'',

    22    ''password'' => ''password'',

    23    ''database'' => ''project_name-test'',

    24    ''schema''=>'''',

    25    ''prefix'' => ''''

    26    ''encoding''=>''''

    27   );

    28 }

    ```


    在这个类 `DATABASE_CONFIG` 中，它将连接两个数据库：`default` 和 `test`。如果您不打算创建单独的测试数据库，可以删除第 13-21
    行。


    将您的数据库设置放入必要的行中，如清单 2-2 所示。


    **清单 2-2.** *将 Localhost 设置添加到数据库配置中*


    ```

    3   var $default = array(

    4    ''driver'' => ''mysql'',

    5    ''persistent'' => false,

    6    ''host'' => ''localhost'',

    7    ''port''=>'''',

    8    ''login'' => ''root'',

    9    ''password'' => ''root'',

    10   ''database'' => ''cake'',

    11   ''schema''=>'''',

    12   ''prefix'' => '''',

    13   ''encoding''=>''''

    14   );

    ```


    在本教程中，您正在创建一个通用的 Cake 应用程序。在本书的后面部分，您将根据正在构建的应用程序来命名数据库，但就目前而言，您只需创建一个名为 `cake`
    的数据库。清单 2-2 中显示的设置将告诉 Cake 如何连接此数据库，但您还没完成……您需要创建数据库！


    ### 设计您的数据库架构


    最好从一开始就知道数据库设计将如何工作。因此，花些时间至少对您首先构建的程序有一个大致的了解，然后构建一些表和字段来匹配该设计。第 4 章将引导您完成一个关于如何设计适合
    Cake 应用程序的架构的详细教程。现在，只需记住，在安装新的 Cake 应用程序时，构建数据库结构是自然发生的。


    这个应用程序非常简单，数据库中实际上没有任何内容。您只想将 Cake 连接到数据库。启动您选择的 MySQL 应用程序（我使用的是 CocoaMySQL），然后连接到
    MySQL。创建一个名为 `cake` 的数据库。


    现在，Cake 有了一个可以连接的实际数据库，您可以在浏览器中访问 `http://localhost/first_app`，它将显示一个新界面，如图 2-4
    所示。


    ![图片 16](img/index-38_1.jpg)


    **图 2-4.** *一切准备就绪时的欢迎界面* Cake 现已安装并正常运行。是时候深入并开始构建 Web 应用程序了！


    ### 总结


    安装一个新的 Cake 应用程序很简单，并且几乎不需要任何配置即可快速启动并运行。只需记住解压主要的 Cake 安装文件，并将生成的文件夹重命名为您想要为应用程序命名的任何名称。通过检查欢迎界面，您可以确定
    Cake 是否正常运行，或者是否存在 `localhost` 错误。


    纠正错误并不太难。只需正确设置权限或调整 Apache 服务器配置以处理 Cake，这些错误在大多数情况下就会消失。您的 Cake 应用程序将需要一些设置例程，例如准备
    `tmp` 文件夹、更改核心配置中的 `Security.salt` 值以及将 Cake 连接到可用的数据库。完成这些例程后，您的应用程序就可以通过创建模型、视图和控制器来进行扩展。下一章将解释如何通过一个使用
    Cake 内置脚手架功能的简单待办事项列表应用程序来向您的新应用程序添加功能。


    ## 第 3 章


    # 创建待办事项列表应用程序


    **现**在您已在自己的计算机上设置好 Cake，是时候开始构建应用程序了。


    在本章中，您将使用内置的脚手架功能在 Cake 中创建一个待办事项列表应用程序。


    这是在 Cake 中构建应用程序的最简单方法。它只需要创建几个纯文本文件以及一个包含几张表的数据库。您不会过多地处理设计，而是让 Cake 生成所有 HTML
    输出。


    ### 探索 MVC 结构

