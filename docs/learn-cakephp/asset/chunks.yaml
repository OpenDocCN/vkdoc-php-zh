    ## Summary


    This chapter provided an overview of a controller generated by `bake`. I discussed
    how `bake` works and what its limitations are. We then created a controller test
    and introduced integration testing and controller-specific assertion methods.


    # 10. Mocks


    ![A337704_2_En_10_Figa_HTML.jpg](A337704_2_En_10_Figa_HTML.jpg)


    Little pig, little pig, let me in


    We often require mocked components, models, objects, or even core PHP functions.
    You can create mocks in any of the test functions or, if you require mock objects
    in all of the test functions, in the `setUp()` method.


    Mocks ensure that your tests run faster, without actually having all the required
    objects.


    ## Mocking Sessions


    The `IntegrationTestCase` class provides a few helper methods to mock request
    objects, including sessions, cookies, headers, etc.


    Let’s see an example for session variables. The others work similarly.


    Create the test method first. Change your `testIndex()` method in the `/tests/TestCase/Controller/CategoriesControllerTest.php`
    file.


    ```

    1  public function testIndex()

    2  {

    3      $this->get(''/categories'');

    4      $this->assertResponseNotContains(''Category 2'');


    6      $this->session([''isAdmin'' => true]);

    7      $this->get(''/categories'');

    8      $this->assertResponseContains(''Category 2'');

    9  }

    ```


    We defined two assertions. Both call `/categories`, the first one without defining
    the session variable, the second with the session variable. So, the first should
    not contain `Category 2`, but the second should. The value `Category 2` comes
    from the fixture that we created in Chapter [9](#A337704_2_En_9_Chapter.html).


    Update your `index()` method in your `/src/Controller/CategoriesController.php`
    file.


    ```

    1  public function index()

    2  {

    3      if (!$this->request->session()->read(''isAdmin'')) {

    4          $this->paginate[''limit''] = 1;

    5      }

    6      $categories = $this->paginate($this->Categories);

    7      $this->set(compact(''categories''));

    8      $this->set(''_serialize'', [''categories'']);

    9  }


    ```


    If you do not have the `isAdmin` session variable, limit the categories'' list
    to 1\. This example is a little silly, but it shows you how to mock session variables.


    ## Mocking Model Methods


    Sometimes, you want to mock model methods, to save time or just make things easier.
    In test-driven development (TDD), mocking can help you to test even when a method
    is not yet written. A mock can give you the required return values, so that you
    can work on tests while another team member is working on the method that is mocked.
    Let’s see a few examples of how to use mocks.


    Create a new test in the `CategoriesTableTest.php` file.


    ```

    1  public function testDoSomething()

    2  {

    3      $this->assertTrue($this->Categories->doSomething());

    4  }

    ```


    Let’s create the tested method itself, in the `/src/Model/Table/CategoriesTable.php`
    file.


    ```

    1  public function doSomething()

    2  {

    3      if ($this->slowFunction()) {

    4          return true;

    5      } else {

    6          return false;

    7      }

    8  }


    10  public function slowFunction ()

    11  {

    12      sleep(30);

    13      return true;

    14  }

    ```


    Again, a silly example, but it shows what we want. The `doSomething()` method
    calls another function that is really slow. If we run the test, it will be successful,
    but it needs more than 30 seconds to run. Definitely, we do not want to run it
    many times. At `testDoSomething()`, we want to test `doSomething()`, not s`lowFunction()`.
    Let’s mock it.


    Perhaps we should test `slowFunction()` also, but that is another story.


    ```

    1  public function testDoSomething ()

    2  {

    3      $model = $this->getMockForModel(''Categories'', [''slowFunction'']);

    4      $model->expects($this->once())

    5          ->method(''slowFunction'')

    6          ->will($this->returnValue(true));

    7      $this->assertTrue($model->doSomething());

    8  }

    ```


    Let me explain what happens here.


    We put the mock directly into the `test` method, because we need it here only;
    otherwise, we can put it into the `setUp()` method, to make it available to all
    tests.


    Then we generate the mock object with the `getMockForModel()` method call. The
    first parameter of this method is an alias for the mocked table class. The second
    parameter is the array of mocked methods, in our case, only for the `slowFunction()`
    method.


    Then, with the `expects()` call, we make sure that when the model invokes `$this->slowFunction()`
    the first time, it should return `true`. After this, we call `$model->doSomething()`
    for assertion. It will call the mocked `slowFunction()` method.


    ## Expects Method


    The `expects` method accepts the following parameter values:


    *   `once()` will pass if the method is called exactly once.

    *   `never()` will fail if the method is ever called.

    *   `any()` will pass if the method is called zero or more times.

    *   `at($index)` will match at call `$index`. The index value will be incremented
    each time a mock method is called, not just when the indicated method is called.

    *   `exactly($times`) will only pass if the method is called `$times` times.

    *   `atLeastOnce()` will pass if the method is called more than once.'
