    *This book is dedicated to my parents and sister.*


    Introduction


    Today, we are seeing a major shift in how web applications are being built and
    particularly the importance of the “shift left” paradigm. With the shift left
    focus on security, there is increased responsibility on developers to build security
    in their design and code from the start. The stakes are too high to ignore, given
    the variety of compliance-specific industries we work across.


    With this in mind, the book starts to give web application developers insight
    into the context of security in web applications, particularly in PHP.


    There are a variety of applications a developer works in starting from green field
    projects, existing projects, hybrid ones (Kubernetes and OpenShift), and cloud
    native. To understand this and gain practical insights, the book focuses on security
    aspects which need to be understood and implemented while building core applications
    which do not use any frameworks, then proceeds to the security protocols behind
    various processes which help us build web applications, and finally security practices
    prevalent in enterprise frameworks like Laravel.


    Software development lifecycle has many phases and security needs to be built
    into each phase from the very start. The book gives practical insights into discussing
    security with stakeholders, understanding the context of security in different
    phases like development, testing, deployment, infrastructure as cloud, cloud security,
    and maintenance.


    The book finally details the future of security and some of the helpful tools
    which will be part of the developer lifecycle. There are concepts and code recipes
    shared throughout the book which are helpful not only for learning but also while
    working on real-world projects.


    Acknowledgments


    I would like to dedicate this book to my parents for always believing in and having
    patience with me while I pursued my interest in technology and for giving me the
    freedom to explore and try different things. Also, thanks to my sister Lipsa for
    always being beside me whenever I needed her. I would like to thank all my teachers
    for being with me during my journey, Runish for the foundational mentoring support
    at the start of my career, Mindfire Solutions for my first career opportunity,
    and to all with whom I have had an opportunity to interact and learn from. Last
    but not least, I would like to thank Melissa for the awesome opportunity to write
    my second book and the wonderful team at Apress for all their support without
    whom this book would not have been possible.


    About the Author About the Technical Reviewer


    # 1. Introduction to PHP Application Security


    In this chapter, we will be discussing the general nature of application security
    and its importance in the context of PHP. In the security ecosystem, software
    engineers play a crucial role, and we will learn about their responsibilities
    in this evolving space of security-based development. Then we will touch base
    on the impact of security vulnerabilities while building PHP applications, learn
    about common attack vectors and threats. Finally, we will learn how to employ
    the principles of secure application development in PHP.


    ## What Is Application Security?


    Application security, often abbreviated as AppSec, is a crucial aspect of information
    security that focuses on protecting software applications from security threats
    and vulnerabilities. It encompasses a wide range of practices, tools, and methodologies
    designed to ensure the confidentiality, integrity, and availability (the CIA triad)
    of an application and its data.


    How do we correlate this from a developer’s perspective? As a developer, we are
    involved in the development of applications. While this is the simplest approach,
    there are other layers which come into effect when thinking about the practical
    world. Since this application would not just be present in our laptops and would
    eventually be deployed and used throughout the world, security of the application
    becomes very important.


    To give a simpler example, consider a castle. We can compare a castle to the application
    which we have built with its richness, beauty, and features. It’s a delight to
    the world for people to visit.


    But there’s more to it than meets the eye. When viewed from the top, we see the
    different layers of sections and perimeters built while building the castle. I
    lay much stress on the word *while* and not after the castle was built. This adds
    the security aspect to it.


    Let us discuss some additional context around application security.


    ### Protection of Software Applications


    Application security primarily deals with safeguarding software applications,
    including web applications, mobile apps, desktop software, and server-side applications,
    from various security risks and potential attacks. These applications hold many
    of the important assets for us like the intellectual property for our business,
    valuable user data of our customers which can be used or rather misused for a
    variety of purposes, and access to important resources like a nuclear plant which
    has tremendous potential but a liability when in the hands of the wrong person.


    ### Identification of Vulnerabilities


    A vulnerability is a weakness or flaw in a system, process, software, or network
    that can be exploited by a threat actor (such as a hacker) to gain unauthorized
    access, cause harm, or perform malicious activities. Vulnerabilities can result
    from various issues including design flaws, errors in code, misconfigurations,
    etc. Identifying and addressing vulnerabilities is crucial for maintaining the
    security and integrity of systems and data. It involves identifying and addressing
    vulnerabilities within the application’s code, configuration, and design that
    could be exploited by malicious actors. Common vulnerabilities include SQL injection,
    cross-site scripting (XSS), cross-site request forgery (CSRF), and insecure authentication
    mechanisms. We will discuss these more in the coming chapters.'
