    | 你也可以引用普通变量。变量引用是访问该变量的另一种方式。要创建对变量的引用，你必须在程序中创建一个新变量（引用），并将原始变量赋值给它，并在前面加上`&`符号。例如，`$x=100`命令创建了值为`100`的`$x`变量。然后，`$y=&$x`命令创建了指向`$x`变量的`$y`引用。这意味着更改`$x`变量会自动更改`$y`变量，反之亦然。原因很简单：`$x`和`$y`变量指向同一块内存区域。
    |


