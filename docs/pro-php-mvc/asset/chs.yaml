  points\", \"points.id = users.id\", array(\n\"points\" => \"rewards\"\n))\n->where(\"\
  first_name = ?\", \"chris\")\n->order(\"last_name\", \"desc\")\n->limit(100)\n->all();\n\
  \n$print = print_r($all, true);\necho \"all => {$print}\";\n\n$id = $database->query()\n\
  ->from(\"users\")\n->save(array(\n\"first_name\" => \"Liz\",\n\"last_name\" => \"\
