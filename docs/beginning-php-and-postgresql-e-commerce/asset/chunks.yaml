    **Figure 13-5.** *Audit table entries from PsDummy*\n\n**How It Works: The Skeleton\
    \ of the Order-Processing Functionality**\n\nEntries will be added by `OrderProcessor`\
    \ and by individual pipeline stages to indicate successes and failures. These\
    \ entries can then be examined to see what has happened to an order, which is\
    \ an important function when it comes to error checking.\n\nThe message number\
    \ column is interesting because it allows you to associate specific messages with\
    \ an identifying number. You can have another database table that matches these\
    \ message numbers with descriptions, although this isn't really necessary because\
    \ the scheme used for numbering (as you'll see later in the chapter) is quite\
    \ descriptive.\n\nIn addition, you have the message column, which already provides\
    \ human-readable information.\n\nFor demonstration purposes, we set the administrator\
    \ and supplier email addresses to fictive email address, which should also be\
    \ the address of the customer used to generate test orders. You should do this\
    \ to ensure everything is working properly before sending mail to the outside\
    \ world.\n\nLet's now look at the `OrderProcessor` class. The main body of the\
    \ `OrderProcessor` class is the `Process()` method, which is now called from `function.load_admin_order_details.php`\
    \ to process an order.\n\n```\npublic function Process()\n{\n    // Configure\
    \ processor\n    $this->mContinueNow = true;\n```\n\nNext you used the `CreateAudit()`\
    \ method to add an audit entry indicating that `OrderProcessor` has started:\n\
    \n```\n// Log start of execution\n$this->CreateAudit('Order Processor started.',\
    \ 10000);\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n`648XCH13.qxd\
    \ 11/17/06 3:46 PM Page 466`\n\n**466**\n\nC H A P T E R 1 3 ■ I M P L E M E N\
    \ T I N G T H E O R D E R P I P E L I N E : PA RT I\n\n■**Note** 10000 is the\
    \ message number to store for the audit entry. We'll look at these codes in more\
    \ detail shortly.\n\nNext you come to the order processing itself. The model used\
