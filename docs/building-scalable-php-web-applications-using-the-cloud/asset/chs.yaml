  ## 7.5 跨数据中心复制


  对于非常大的应用程序，有时你需要比单个数据中心所能提供的更好的地理覆盖范围。此外，超关键的应用程序可能需要多个数据中心带来的可靠性，这样即使一个数据中心发生故障，应用程序也能至少部分继续运行。


  创建此类设置较为复杂，因此本书不会像介绍其他架构那样提供逐步方法。然而，以下是实现此功能所需执行的基本步骤：


  1.  更改 `dbmaster`，将其 `listen_address` 设置为 `*`。由于它将接收来自其他数据中心的请求，因此它也必须监听公共 IP 地址。


  2.  为 `dbmaster` 设置防火墙，以防止未经授权的第三方访问。


  3.  使用 SSL 加密你的 PostgreSQL 连接（请参阅后面如何启用此功能）。


  4.  在新数据中心部署一个“主副本”，该副本将是 `dbmaster` 的副本，但如果你需要，它也可以作为该网络上其他副本的主节点。这仍然是只读的，但它是一个可以流式传输到其他副本的副本。


  5.  在新数据中心部署一份你的 Web 应用程序副本，该副本使用 `dbmaster` 的公共 IP 地址进行读写连接，并使用本地副本的私有 IP 地址列表进行只读连接。


  流程结束时，你的集群架构应该类似于图 7-4。


  随着你的部署变得越来越复杂，对自动化部署处理的需求也会增加。有关自动部署的更多信息，请参见第 12 章。


  ![../images/487291_1_En_7_Chapter/487291_1_En_7_Fig4_HTML.jpg](img/487291_1_En_7_Fig4_HTML.jpg)


  图 7-4


  多站点架构示意图


  如果你需要在本地设置中对数据库进行读写访问，配置将变得更加困难，因为你现在必须管理系统之间的同步方式以及它们之间的网络连接中断时的应对策略。在这种情况下，你通常会将本地（非共享）数据和全局（共享）数据分离到*独立的*数据库实例中。对于非共享数据，你需要在每个位置设置一个主数据库。对于共享数据，你需要按照类似图
  7-4 的方式进行设置。


  ### 在 PostgreSQL 上启用加密


  要在 PostgreSQL 上启用加密，你需要以 root 用户身份进入 `/var/lib/pgsql/data` 目录。然后，你需要编辑 `postgresql.conf`
  并添加以下行：


  ```

  ssl = on

  ```


  接下来，你需要生成一个 SSL 密钥和自签名证书。在同一目录下，执行以下命令（全部在一行内）：


  ```

  openssl req -nodes -new -x509 -keyout server.key -out server.crt

  ```


  这将要求你填写一份简短的表格，该表格将被编码到你的证书中。然后，你需要设置生成文件的权限：


  ```

  chown postgres:postgres server.key server.crt

  chmod 600 server.key

  ```


  此时如果你重启数据库，服务器将*允许* SSL 连接，但不会*要求*使用 SSL。要强制使用 SSL 连接，你可以将 `pg_hba.conf` 中的任意或所有
  `host` 行改为 `hostssl`。


  完成所有更改后，你可以使用以下命令重启数据库：


  ```

  systemctl restart postgresql

  ```




  ## 7.6 数据分片


  数据库可扩展性的另一个选择是数据*分片*。数据库分片的概念相对简单——它意味着你以某种方式对数据进行分区，使得并非所有数据都依赖于同一个数据库系统。


  例如，你可以这样分片：所有姓名以“A”和“B”开头的客户放在一个数据库中，所有姓名以“C”和“D”开头的客户放在另一个数据库中，以此类推。你可以根据自己偏好的任何方法对数据进行分区，只要系统能够轻松判断需要查询哪个数据库即可。其核心在于，数据本身被拆分到不同的数据库系统中，而不是由同一个数据库系统管理所有内容。


  在这种系统中，通常要么由应用程序负责分片，要么存在一个中间层来处理将连接引导至相应数据库的工作。一些较新的工具已经开发出来，例如`pg_shard`，它旨在作为一个数据库插件无缝运行。


  无论如何，分片会带来一整套数据管理和数据完整性问题。数据库的要点之一便是确保数据的一致性。而分片本质上为了达到扩展性，移除了数据库所提供的许多保护机制。因此，务必清楚自己为何要分片以及如何分片，以**将风险降至最低**。


  例如，如果你将客户数据分片到不同的数据库，你也应该将相关的记录一起分片，这样客户及其记录都由同一个数据库服务和管理。想象一下，如果你需要从备份中恢复记录，但某些相关记录却存在于另一个不同的数据库系统中！


  分片工作量很大，需要大量规划，并且高度依赖于你的使用和工作负载的具体情况，因此很难泛泛而谈。尽管如此，如果你在寻找更多扩展数据库的方法，分片绝对是一个选项。分片还可以与其他方法协同工作，例如主-从复制或多主复制，但同样，这需要大量的额外关注、维护和管理才能使其良好运行。


  如果你的登录组不共享任何数据，分片会更容易。例如，假设你构建了一个电子邮件营销系统。在此类系统中，不同客户很少共享数据。因此，将他们的记录完全分开存储毫无问题。


  你甚至可以运行几个完全独立的云，每个云服务于一组不同的客户。来自客户 A、B、C、D 的登录请求会被分发到云 1，来自客户 E、F、G、H 的登录请求会被分发到云
  2，以此类推。如果这些云都是完全独立管理的，这种设置还能在一定程度上缓解灾难，因为不太可能所有数据中心同时完全瘫痪。


  '
- '# 8. 使用内容分发网络


  到目前为止，我们为云应用所做的扩展努力主要集中在动态内容的服务上（即从数据库查询中获取的内容）。然而，对于许多网站来说，动态内容实际上只是其系统中很小的一部分。事实上，在任何网站上，绝大多数的请求甚至都不是针对你的动态内容的，而是针对你的静态内容——你的图片、样式表和
  JavaScript。因此，在寻找扩展云应用的方法时，切记不要忘了同时扩展你的静态资源。


  你可以通过创建更多的前端 Web 服务器来扩展静态资源，因为通常这些服务器也负责提供静态资源。然而，这样做成本会更高（你需要保持更多服务器在线），也更难管理（节点更多意味着管理更复杂）。


  扩展静态资源实际上比扩展动态资源要容易得多，因为你无需过多担心资源变更时会发生什么。因此，有专门为扩展静态资源而构建的服务。这种扩展静态资源交付的服务被称为“内容分发网络”（CDN）。


  ## 8.1 CDN 如何工作？


  大多数 CDN 的工作方式是它们拥有一个*全球*分布的内容服务器网络。假设你有一个 10MB 的图片想要通过 CDN 来提供。通常，如果用户直接向你的服务器请求这张图片，那么你的服务器会将处理时间和带宽耗费在发送这
  10MB 图片上。如果用户位于大洋彼岸，那还会带来额外的问题，因为你的服务器将浪费大量资源来管理一条缓慢且嘈杂的连接。


  CDN 允许你将用户重定向到 CDN 上该图片的 URL。CDN 在第一次看到该 URL 时，通常对图片一无所知，但它有规则告诉它如何在你自己的服务上找到原始图片。从那时起，在
  CDN 第一次抓取到图片之后，每次有其他用户请求该图片，CDN 都会负责将图片传递给用户，而完全不必经过你的服务器。


  此外，大多数 CDN 的服务器分布在许多不同的物理位置。这些位置被称为“存在点”（Points of Presence，PoPs），那里的服务器通常被称为“边缘服务器”（因此
  CDN 也常被称为“边缘缓存”）。通过在多个 PoP 使用边缘服务器，CDN 不仅可以通过大量服务器提供扩展能力，边缘服务器还能让 CDN 提供*在地理位置上更靠近*用户的服务器。如果用户可以从附近的服务器获取大量数据，而无需跨越大洋去检索，这将大大提升用户体验。


  对于任何知名的 CDN 来说，它们实际上可以为提供静态资源提供无限的扩展能力——你无需担心会超出其网络负载。只要资源不发生变化，CDN 就能完美处理对该资源的任意数量的请求。


  通常，CDN 的主要成本在于带宽。然而，许多 CDN 的带宽成本比云服务器要低。现在，使用 Linode，你得拥有一个流量极大的网站才能用尽你套餐内包含的带宽。不过，如果真的超出了，通过
  CDN 提供的带宽费用会稍低一些。无论如何，即使你的服务器套餐包含了足够的带宽，CDN 带来的扩展性提升所带来的好处通常也值得付出那点微小的代价，因为你无需持续运行服务器来应对可能到来也可能不来的流量。你只需为实际使用的带宽付费。



  ## 8.2 搭建一个简单的 CDN


  值得庆幸的是，大多数 CDN 都非常容易设置。本书中，我们将使用亚马逊的 CloudFront 作为 CDN，尽管还有许多其他选项（仅举几例，如 CloudFlare、StackPath、CDN77
  和 Fastly）。CDN 的好处在于，由于它们提供的服务相当透明，因此可以轻松地为 CDN 混合搭配不同的服务提供商。


  CloudFront 的工作方式非常简单：


  1.  你将所有静态内容托管在你的主站点上。这是你内容的“官方”存储库。

  2.  你在 CloudFront 上创建一个主机来提供你的内容（通常，该主机会有一个类似 `xyzabc.cloudfront.net` 的名称）。

  3.  你告诉 CloudFront 服务器你的主站点的 URL。

  4.  每次你从站点链接到静态内容时，你都使用 CloudFront URL 链接到它，而不是链接到你自己的服务器上的内容。例如，如果你的图片位于 `http://mysite.example.com/mydirectory/myimage.png`，那么当你链接到它时，你将使用
  URL `http://xyzabc.cloudfront.net/mydirectory/myimage.png`。CloudFront 会根据你的配置知道如何找到
  `myimage.png`，并将其缓存并提供给你的用户。


  CloudFront 第一次收到图片请求时，它会前往你的站点获取它。然后，后续的任何请求将直接由靠近请求用户的 CloudFront 服务器提供服务。


  让我们来看看如何使用 Amazon AWS 和 CloudFront 实际操作。你需要做的第一件事是在 `http://aws.amazon.com` 注册 AWS。我假设你可以独立完成注册过程，无需我指导。


  AWS 提供了数量惊人的可用服务，因此其仪表板并非列出所有服务，而是让你进行搜索。在搜索栏中输入“CloudFront”，然后它就会允许你进入 CloudFront
  仪表板。


  由于你是第一次使用 CloudFront，它会显示一个写着“创建分配”的按钮。用 CloudFront 的术语来说，一个*分配*就是一个 CDN 复制器服务。


  点击“创建分配”后，CloudFront 会询问你的交付方式，并提供“Web”或“RTMP”选项。RTMP 是用于流式传输大量视频内容的协议。但由于我们只是分发像图片和样式表这样的基本资源，我们将选择从基本的
  Web 交付开始。


  接着，Amazon 会要求你提供关于分配的详细信息，如图 8-1 所示。在下方实际上还有大量其他选项，但唯一必填字段是“源域名”，即你想要 CloudFront
  从中获取资源的站点的 DNS 主机名。这*不能*是 IP 地址，必须是某种 DNS 主机名。如果你尚未为应用程序设置 DNS 主机名，你可以直接使用 Linode
  自动生成的主机名之一。如果你进入 Linode 的 Node Balancer 界面并点击你的负载均衡器，它会为你提供一个（非常长，可能会分开两行显示的）内部生成的负载均衡器主机名（类似
  `nb-BALANCER-PUBLIC-IP-ADDRESS.dallas.nodebalancer.linode.com`）。填写完“源域名”后，向下滚动到页面底部。


  ![../images/487291_1_En_8_Chapter/487291_1_En_8_Fig2_HTML.jpg](img/487291_1_En_8_Fig2_HTML.jpg)


  图 8-2：CloudFront 分配列表


  ![../images/487291_1_En_8_Chapter/487291_1_En_8_Fig1_HTML.jpg](img/487291_1_En_8_Fig1_HTML.jpg)


  图 8-1：创建 CloudFront 分配


  在页面底部，有一个“创建分配”按钮。点击此按钮后，你将进入一个分配列表，其中会显示你新创建的分配，类似于图 8-2。此屏幕最重要的部分是“域名”，它显示了你如何访问新创建的分配（你可能需要调整字段大小才能看到完整的名称）。它还会提供一个状态，该状态从“进行中”变为“已部署”可能需要
  5 分钟到 1 小时不等。一旦部署完成，你就拥有一个正在运行的 CDN 了！


  ## 8.3 使用你的 CDN


  一旦状态变为“已部署”，此域名将完整镜像你的原始站点。但是，它只是你站点的静态版本。如果你的站点发生了变化，除非你告知 CloudFront，否则它*不会*更新其资源。


  假设 CloudFront 给你的域名是 `xyzabc.cloudfront.net`。这意味着如果你访问 `http://xyzabc.cloudfront.net/list.php`，它会显示你的留言板列表。但是，如果你随后修改了留言板列表，这些更改将不会反映在你的
  CDN 上——它把所有内容都视为静态资源。这就是为什么在大多数情况下，CDN 只提供静态资源——图片、样式表、JavaScript 等。


  因此，我们不要通过 CDN 访问整个站点，而是修改应用程序，仅通过 CDN 提供我们的样式表。我们只需修改 `common.php` 中的一行代码。在 `getHeader()`
  函数中，我们只需将 `<link>` 标签改为：


  ```

  <link rel="stylesheet" type="text/css" href="http://xyzabc.cloudfront.net/style.css"
  />

  ```


  请务必将 `xyzabc.cloudfront.net` 替换为你自己分配的域名！一旦在所有服务器上部署，你的样式表就将由 CDN 提供。


  ![../images/487291_1_En_8_Chapter/487291_1_En_8_Fig3_HTML.jpg](img/487291_1_En_8_Fig3_HTML.jpg)


  图 8-3：从 CDN 移除内容


  这意味着你的服务器几乎再也不用提供样式表了。偶尔，CDN 可能会过期其某些缓存内容，但这由 CDN 自行决定。CDN 会自行优化存储多少数据、存储多长时间以及多久重新请求一次你的原始文件。对于更高级的应用程序，你可以配置
  Apache 提供 `Expires:` HTTP 头或 `Cache-Control:` HTTP 头，以指定 CDN 应保留数据的最长时间。


  然而，假设你部署了一个实际带有更新样式表的新版本应用程序。这意味着 CDN 正在为你提供的版本现在已经过时——它的缓存中可能仍然存有旧版本。这完全不是问题，这只意味着你需要手动告诉
  CDN “作废”你的内容，以便它重新请求。


  要在 CloudFront CDN 上作废内容，首先点击你的 CloudFront 分配的 ID。这将带你进入一个信息页面，描述分配上设置的所有选项。在靠右的位置，有一个名为“作废”的标签。点击此标签，然后点击“创建作废”。这将带你进入一个类似于图
  8-3 的界面。在“对象路径”字段中，清空其中的任何内容，然后只输入 `/*` 来作废所有内容。虽然 CloudFront 允许你进行细粒度访问，以作废和移除
  CDN 上的特定项目，但我发现，在大多数情况下，简单地作废所有内容更加简单和清晰。点击“作废”按钮即可生效。


  作废操作可能需要几分钟才能传播到所有 CloudFront 的服务器，但不久后所有服务器都将提供你的新内容。当作废的“状态”变为“已完成”时，你就知道操作完成了。




  ## 8.4 使用 CDN 缓存整个网站


  除了缓存 CSS、JavaScript 和图片等独立内容外，现代 CDN 实际上可以让你缓存整个网站，从而在互联网上实现即时扩展。虽然这对我们这样的网页 *应用*
  不适用，但如果你拥有一个基础网站，这几乎可以零成本、无需额外配置，让你的网站能即时扩展以服务无限数量的用户。


  我们来看看如何使用 CloudFront 实现这一点。为了让 CDN 直接提供你的网站服务，你需要将主站点的 DNS 指向 CDN 的服务器。


  你可能会想，只需将网站的 A 记录设置为 CDN 即可。然而，CDN 通常不会提供其主机的 IP 地址。原因在于 CDN 拥有*多个* IP 地址（每个 PoP
  一个），它们通常依赖 DNS 查询来决定将哪个 IP 地址分配给哪个客户端（即，它会提供一个地理位置上离客户端最近的 IP 地址）。这意味着我们不能简单地在 DNS
  中指定 CDN 的 IP 地址来将网站指向它。


  相反，CDN 通常通过 DNS CNAME 记录来处理这类事情。CNAME 即“规范名称”——它告诉浏览器在 DNS 查询中使用另一个名称，并将该名称的查询结果用于我们自己的
  DNS 查找。如果你将 `www` 设置为指向你的 CloudFront 主机的 CNAME，那么 CloudFront 仍然可以使用自己的 DNS 机制为每个客户端分配正确的
  IP 地址。


  然而，这又带来了另一个问题。CDN 需要知道你可能是通过哪个主机名来访问它的。也就是说，如果你将 `www.example.com` 的 CNAME 指向 `abcxyz.cloudfront.com`，当
  CloudFront 的某台机器收到对 `www.example.com` 的请求时，它需要知道应该提供与 `abcxyz.cloudfront.com` 相关联的缓存内容。


  这可以通过 AWS 中的分配设置来完成。这些设置位于分配的“常规”选项卡下。点击“编辑”，找到名为“备用域名 (CNAMEs)”的字段。在这里，你可以输入任何已设置
  CNAME 指向此分配的主机名（每行一个，或以逗号分隔）。


  然而，这会产生一个问题，因为 CDN 需要从某个地方检索你的数据，而你已经将 DNS 指向了 CDN，而不是你自己的服务器！要解决这个问题，你只需设置一个供 CDN
  拉取数据的内部 DNS 名称（可以命名为 `www2.example.com` 或 `www-internal.example.com`），然后将 `www`
  的 DNS 设置为指向 CDN（注意，这里“内部”并不意味着只有我们自己可见，因为它和主站点一样完全暴露在公共互联网上，而是指它并非我们引导最终用户访问的目标地址）。


  通过这样做，CDN 就可以让你的网站实现无限的访客增长。


  ![../images/487291_1_En_8_Chapter/487291_1_En_8_Figa_HTML.jpg](img/487291_1_En_8_Figa_HTML.jpg)


  ### 处理裸域名


  从技术上讲，你不能为根级域名创建 CNAME。你可以为 `www.example.com` 创建 CNAME，但不能为 `example.com`。虽然你的 DNS
  服务器可能允许这样做，但这违反了规范，并且可能给不期望这种情况的客户端带来各种奇怪的问题。因此，你需要确保有一种机制，将你的裸域名（即 `example.com`）重定向到你的
  CNAME 主机（即 `www.example.com`）。


  为了解决这个问题，许多 DNS 提供商提供重定向服务，可以自动将所有对裸域名的请求重定向到 `www` 主机。如果你的 DNS 提供商不提供此服务，`wwwizer.com`
  的热心人士提供了一个免费服务可以为你做到这一点。基本上，如果你将裸域名的 A 记录指向 `174.129.25.170`，它就会被自动重定向到带有 `www`
  前缀的同一域名。


  有关此服务的更多信息，请访问 `http://wwwizer.com/naked-domain-redirect`。


  还要记住，与任何过于廉价的服务一样，你应该采取适当的预防措施。让他们重定向你的流量可以简化事情，但让一个与你没有合同关系的第三方来为你重定向流量也可能带来问题。




  '
- '# 8.5 在整個應用程式前加上 `CloudFront`


  我們的應用程式內容是動態的。這使得在其前方放置一個 CDN（例如 `CloudFront`）變得困難（但並非不可能，我們將看到）。使用 `CloudFront`
  會帶來一個問題——我們如何防止用戶看到過時的內容？


  事實上，大多數 CDN 的處理方式與我們處理本地快取的方式非常相似。我們可以單純地為內容設定一個最大到期日期。


  在 `CloudFront` 中，如果你查看你的分發行為，你會看到一個「行為」頁籤。點擊它，你會看到一個單一的預設行為。這些行為允許你為伺服器上不同的內容路徑設定不同的設定。以這個例子來說，我們只需要編輯已經存在的那個行為。選取目前的行為，然後點擊「編輯」。


  如果你向下捲動，你會看到一組 TTL（存留時間）值，單位是秒。要更改這些值，首先將「物件快取」設定從「使用來源快取標頭」改為「自訂」。如果你不希望內容超過 5
  秒鐘，請將「最大 TTL」設定為 5。這意味著快取只會在重新查詢內容前，將內容保留 5 秒鐘。因此，內容可能會有一點點過時，但不會太嚴重。


  這引出了另一個問題——CDN 將如何處理向伺服器發送表單？這也可以透過行為設定來處理。在「允許的 HTTP 方法」下，選擇包含所有 HTTP 方法的選項。CDN
  只會快取 `GET` 和 `HEAD` 請求，但會將所有其他請求直接轉發到你的伺服器。


  此外，預設情況下，`CloudFront` 不會將 Cookie、HTTP 標頭或查詢字串轉發到伺服器。這是為了減少它必須發出的原始請求數量，以及它必須快取的物件數量。然而，在我們的應用程式中，你看到的內容是基於查詢字串的。因此，你需要將「查詢字串轉發和快取」設定為「轉發所有，基於全部進行快取」，才能使應用程式正常運作。


  設定完成後，點擊「是，編輯」以儲存行為中的變更。


  你現在可以前往你的 `CloudFront` 分發行為的 URL，並像使用一般網站一樣使用它。你也可以按照第 8.4 節的說明，讓用戶透過你網站的專屬主機名稱來存取它。


  在你對這種應用程式設定過於熱衷之前，請記住，所有快取設定都是一種平衡。如果你為快取使用了太多鍵（例如，路徑、標頭、查詢字串、Cookie），那麼你的大部分內容都將被傳遞到伺服器（即不被快取），而你將無法獲得效能提升。事實上，這只會增加開銷和成本，因為你必須同時支付快取的頻寬和伺服器的頻寬。然而，如果快取設定過於寬鬆，用戶將看到過時的數據，或者更糟，看到其他人的數據！例如，如果你的內容是根據
  Cookie 進行個人化的，但你沒有將 Cookie 作為快取鍵的一部分，那麼如果 Jim Bob 請求一個頁面並被放入快取，當 Jane Doe 請求同一個頁面時，她將看到
  Jim Bob 的頁面！


  那麼，擁有高度個人化網路應用程式的人如何更好地利用 CDN 呢？答案是將你的應用程式由內而外翻轉。


  '
- '# 8.6 將你的應用程式由內而外翻轉


  我們在上一節遇到的問題是，如何向用戶提供高度客製化的頁面，同時仍能充分利用快取。擁有客製化頁面通常意味著它們不可被快取。這個困境可以透過為你的網站採用「由內而外」的頁面架構來解決。


  從歷史上看，網路應用程式是透過讓伺服器產生頁面來建立的。當用戶導覽到一個 URL 時，伺服器會擷取一個範本，將其與用戶數據結合，並加入頁面內容以產生最終的 HTML
  頁面。然後，這個 HTML 頁面作為一個整體被送回給用戶。


  這種架構之所以運作良好，有以下幾個原因：


  - 大多數網路應用程式框架都是圍繞這個範例建立的。

  - 這種架構與 HTML 的結構方式密切匹配。

  - 這種架構易於構想和建置。

  - 這種架構所需的實作規劃少得多。

  - 這種架構需要的初始開發工作非常少。

  - 網路歷史的很大一部分根源於這種架構。

  - 這種架構的優化是最後才進行的（即，過早優化是萬惡之源）。


  然而，這種架構的問題在於，對於大多數使用案例來說，它在高流量情況下的效率非常低。


  另一種組織應用程式的方式是將你的頁面由內而外翻轉，這得益於多年來 Ajax 技術的發展。也就是說，在典型的架構中，伺服器會產生一個包含動態內容的頁面。在新的方式中，伺服器產生的頁面基本上是靜態的，但會回呼伺服器以獲取任何動態內容。


  舉例來說，想像一個列出你產品的頁面。在典型的網路框架中，你的伺服器會執行以下任務：


  1.  用戶的瀏覽器向伺服器請求一個特定頁面。

  2.  伺服器啟動網路應用程式處理引擎（PHP、Ruby on Rails 等）。

  3.  應用程式存取資料庫以獲取產品清單。

  4.  應用程式為產品清單產生 HTML。

  5.  應用程式存取資料庫以獲取用戶的狀態資訊（即，登入資訊、購物車資訊、其他狀態資訊等）。

  6.  應用程式產生包含用戶狀態資訊及其在頁面導覽中位置的 HTML 頁首和頁尾。

  7.  應用程式從產生的片段拼接出整個 HTML 頁面。

  8.  伺服器將最終的 HTML 頁面送回給用戶。

  9.  用戶的瀏覽器渲染頁面。


  如你所見，這是一個相當複雜的過程，而且在整個頁面在伺服器上渲染完成之前，用戶得不到任何回饋。這導致用戶花費大量時間等待伺服器完成。


  然而，如果我們將其由內而外翻轉，我們可以實現更好的優化策略。我們要做的是將頁面作為靜態頁面提供，然後讓用戶自己的瀏覽器負責獲取基於用戶的內容並拼接頁面。


  新的順序如下所示：


  1.  用戶的瀏覽器向 CDN 請求頁面。

  2.  假設它已經被快取，靠近用戶的 CDN 伺服器會立即以頁面內容（即，產品清單）回應。

  3.  用戶的瀏覽器載入內容並立即顯示，在任何用戶專屬數據旁顯示一個載入中的旋轉圖示。

  4.  頁面執行 JavaScript，向伺服器發送一個請求，以獲取用戶的狀態資訊。

  5.  伺服器發回用戶的 JSON 編碼狀態資訊。

  6.  頁面渲染網頁的其餘元件。




  ### CDN 与服务器负载


  在此序列中，服务器的负担大大减轻。它不再需要查询产品列表、生成页眉和页脚，或拼接页面。所有这些都发生在用户和 CDN 之间非常快速的事务中。服务器仅负责用户的会话状态（甚至这通常也可以本地化到用户自己的浏览器中！）。这使得大量动态、交互式内容能够在服务器负担很小的情况下实现。


  这个概念可以进一步扩展，甚至产品列表也可以在事后生成。API 请求本身也可以被缓存，使用与主网页相同或不同的设置。


  如您所见，如果应用程序经过精心设计，CDN 为提升网站速度提供了非常灵活和强大的工具。


  这种方法的主要缺点在于实施所需的大量规划和远见。这种方法需要决定一个`Ajax`和动态 HTML 框架，规划一个良好的应用程序架构，开发 API 和 API 身份验证，并规划将要整合所有部分的页面布局。在旧的架构中，您通常可以相当随意地快速拼凑出页面，它们仍然可以工作。当使用“由内而外”的架构时，您必须从一个计划开始，并且需要相当多的前期努力。本书不打算展示“由内而外”页面架构的代码，正是因为它需要大量代码来实现。


  无论如何，无论您的应用程序架构如何，大多数应用程序都可以从某种 CDN 解决方案中受益。


  '
- "# 9. 使用 S3 实现无限磁盘空间\n\n对于一个真正可扩展的网站，另一个经常需要的方面是无限制的磁盘存储。管理服务器的大规模存储确实是一项艰巨的任务。决定多少冗余、多少可访问性、每台服务器多少磁盘，以及如何管理磁盘以确保提前知道磁盘是否故障，都是一项艰巨的任务。即使是对于小规模网站，管理文件也可能很困难。\n\
  \n值得庆幸的是，使用文件存储服务可以让您将这些任务外包给第三方，其成本可能远低于您自己尝试去做。文件存储服务的黄金标准是亚马逊的`S3`服务。`S3`代表简单存储服务。这个缩写词在很大程度上是真实的——对于简单的情况，`S3`相当容易设置，但它也包含相当大的灵活性，可用于更复杂的任务。\n\
  \n`S3`以每 GB 非常低的成本为您提供无限的空间。它将随您扩展，并让您免于本地存储文件带来的所有文件管理麻烦。\n\n还存在其他云存储服务，其中许多具有更好的定价结构。一些更常见的包括`Backblaze\
  \ B2`、`DigitalOcean`的`Spaces`和`Rackspace`的`Cloud Files`。这里我们使用`S3`，因为它拥有最广泛的采用和集成。\n\
  \n## 9.1 开始使用 S3\n\n`S3`是亚马逊`AWS`工具套件的一部分。因此，您可以使用在第[8]章中创建的相同登录名来访问`AWS`。\n\n登录`AWS`后（URL\
  \ 是[`http://aws.amazon.com`](http://aws.amazon.com)），您可以在“存储”标题下访问`S3`。当您点击`S3`时，您将看到一个类似于图\
  \ 9-1 的屏幕。\n\n![../images/487291_1_En_9_Chapter/487291_1_En_9_Fig1_HTML.jpg](img/487291_1_En_9_Fig1_HTML.jpg)\n\
  \n**图 9-1 `S3`初始屏幕**\n\n此屏幕的主按钮是“创建存储桶”按钮。`S3`将其所有文件组织到所谓的“存储桶”中。存储桶有点像命名的硬盘驱动器。这是您存储所有文件的地方。存储桶名称必须是唯一的，不仅对您的帐户，而且实际上跨所有亚马逊。因此，您不应该依赖任何特定的亚马逊存储桶命名约定，这些约定假设您可以预测将来哪些名称可用。相反，最好让存储桶名称在您的应用程序中可配置，以便于管理。\n\
  \n当您点击“创建存储桶”时，它会要求您提供存储桶名称和区域。`AWS`除了`CloudFront`之外，几乎所有服务都按区域组织。就我们的目的而言，区域本身没有太大区别。但是，如果您有特定原因需要在特定的物理位置拥有存储桶，`AWS`允许您选择它的位置。点击“创建”按钮来创建您的存储桶。\n\
  \n成功创建存储桶后，您应该会看到您的存储桶列表（只有您的一个存储桶）。如果您点击您的存储桶，您可以浏览您空的存储桶。为了熟悉`S3`，只需从您的硬盘驱动器上传一个文件到存储桶。点击“上传”按钮，然后您可以将文件从您的计算机拖放到您的存储桶。点击“上传”开始上传。\n\
  \n## 9.2 S3 中的文件夹\n\n如果您在`S3`控制台中查看，您会注意到您可以在存储桶中创建文件夹/目录。然而，在`S3`中，文件夹实际上并不是真实的。实际上，`S3`存储桶具有完全扁平的结构，只有文件名和文件（技术上，文件名被称为“键”，文件本身被称为“对象”）。但是，文件名可以包含斜杠字符。然后，`AWS`用户界面使用斜杠字符向您显示文件，就好像它们在文件夹中一样。当您在`S3`中“创建文件夹”时，它实际上是在创建文件夹名称的空文件，名称以斜杠结尾。简而言之，`S3`控制台让您看起来有文件夹和子文件夹，但实际上它只是一大堆文件，其中一些文件名中包含斜杠，`S3`控制台利用这些斜杠分隔成假文件夹，以便于浏览。\n\
  \n## 9.3 获取凭证\n\n在我们连接`S3`帐户到服务器之前，我们需要创建一组安全凭证。为此，`AWS`使用一个称为`IAM`的系统，即“身份和访问管理”。`IAM`允许您创建具有受限权限的用户，这样如果您的安全密钥被泄露，它不会让攻击者完全控制您的环境。与其他服务一样，`IAM`可以在其服务列表下搜索`IAM`找到。当您第一次加载`IAM`屏幕时，它将类似于图\
  \ 9-2。\n\n![../images/487291_1_En_9_Chapter/487291_1_En_9_Fig2_HTML.jpg](img/487291_1_En_9_Fig2_HTML.jpg)\n\
  \n**图 9-2 `IAM`初始仪表板**\n\n`IAM`主要使用“组”来管理权限，这些组本质上是权限的容器。因此，我们将从创建一个组开始。首先点击左侧面板上的“组”，这将显示一个空的组列表。然后点击“创建新组”。这将弹出一个屏幕，要求输入组的名称。我们将使用名称`guestbook-access`（名称不重要，我们稍后只需要引用该名称）。点击“下一步”继续。\n\
  \n接下来，您将向组附加策略。策略是复杂的权限组。值得庆幸的是，`AWS`有非常有用的预定义策略。对于我们的目的，我们只需要名为`AmazonS3FullAccess`的策略。您可以在筛选框中搜索它，找到后选择它。图\
  \ 9-3 显示了这看起来的样子。\n\n![../images/487291_1_En_9_Chapter/487291_1_En_9_Fig3_HTML.jpg](img/487291_1_En_9_Fig3_HTML.jpg)\n\
  \n**图 9-3 附加策略**\n\n\n\n### 图 9-3  \n将策略附加到组  \n\n最后，系统会要求你审核并确定组设置。点击“创建组”即可完成。\
  \  \n现在你可以向组中添加用户。在屏幕左侧，点击“用户”链接。这将跳转到一个空的 IAM 用户列表。要开始操作，请点击“添加用户”按钮。  \n\n在下一个屏幕中，系统会要求输入用户名和访问类型，如图\
  \ 9-4 所示。我们将用户命名为 `application-user`，不过实际名称并不重要。在“访问类型”下，选择“编程访问”。这意味着创建的用户将无法登录，但只能使用\
  \ API。  \n\n![../images/487291_1_En_9_Chapter/487291_1_En_9_Fig4_HTML.jpg](img/487291_1_En_9_Fig4_HTML.jpg)\
  \  \n\n### 图 9-4  \n创建 IAM 用户  \n\n在下一个屏幕中，系统会要求你将用户添加到组中。只需选择之前创建的组（我们将其命名为 `guestbook-access`）。\
  \  \n接下来的屏幕允许你为此用户设置标签。我们不需要任何标签，因此可以继续跳过此屏幕。最后，系统会要求你审核信息。此时，你可以点击“创建用户”，系统将为你创建该用户。\
  \  \n\n创建用户后，你现在可以下载其凭证。屏幕如图 9-5 所示。它列出了用户，然后是两个特殊字段：“访问密钥 ID”和“秘密访问密钥”。这两个字段本质上相当于该用户\
  \ API 的可重置用户名（“访问密钥 ID”）和密码（“秘密访问密钥”）。你可以下载凭证，也可以从屏幕上的字段中复制它们。  \n\n![../images/487291_1_En_9_Chapter/487291_1_En_9_Fig5_HTML.jpg](img/487291_1_En_9_Fig5_HTML.jpg)\
  \  \n\n### 图 9-5  \n检索 IAM 凭证  \n\n接下来，我们将实际的访问密钥 ID 称为 `MYACCESSKEYID`，将实际的秘密访问密钥称为\
  \ `MYSECRETACCESSKEY`。  \n如果之后你丢失了这些凭证，将无法再次获取它们。但是，你可以返回用户记录并创建一套*新的*凭证。如果日后你的服务器安全受到威胁，你可以停用旧凭证并为同一用户颁发新凭证。\
  \  \n\n## 9.4 通过命令行访问 S3  \n\nAWS 提供了一个命令行工具，不仅可以访问 S3，还可以访问其广泛的弹性 API。要安装此工具，请在模板节点上以\
  \ root 身份执行以下命令：  \n\n```\nyum install -y awscli\n```\n\nAWS 命令行有两种主要方式指定你的访问密钥\
  \ ID 和秘密访问密钥。你可以通过环境变量或配置文件来实现。环境变量更灵活，因此我们将采用这种方式。  \n如果你不熟悉命令行，环境变量是在命令行会话中设置的变量。不仅如此，你调用的命令也可以访问你的所有环境变量。此外，你设置的任何环境变量在退出登录后都会消失，因此每次登录时都需要重新设置（如果你希望它们在登录时自动设置，可以将设置这些变量的命令放入一个名为\
  \ `.bash_profile` 的文件中）。  \n\n`aws` 命令用于凭证的环境变量是 `AWS_ACCESS_KEY_ID` 和 `AWS_SECRET_ACCESS_KEY`。\
  \  \n要设置这些变量，请在终端中输入以下命令（将 `MYACCESSKEYID` 和 `MYSECRETACCESSKEY` 替换为你的实际密钥）：  \n\
  \n```\nexport AWS_ACCESS_KEY_ID=MYACCESSKEYID\nexport AWS_SECRET_ACCESS_KEY=MYSECRETACCESSKEY\n\
  ```\n\n现在你可以使用 `aws` 命令来操作你的 S3 存储桶。要获取存储桶列表，请执行以下命令：  \n\n```\naws s3 ls s3://\n\
  ```\n\n它应该会列出你在 9.1 节中创建的存储桶。  \n\n要列出该存储桶的内容，请执行以下命令（将 `BUCKET` 替换为你的存储桶的实际名称）：\
  \  \n\n```\naws s3 ls s3://BUCKET/\n```\n\n要理解命令的工作方式：`aws` 是我们使用的主命令，`s3` 指定了要操作的子命令组，`ls`\
  \ 就像 Linux 上的 `ls` 命令（用于列出内容），`s3://BUCKET/` 是我们要查看的位置。  \n\n`aws` 命令还提供了其他用于操作文件的常用命令。除了\
  \ `ls`，我们可以使用 `cp` 将文件复制到存储桶中或从存储桶中复制出来。如果你有一个名为 `test.txt` 的文件，可以使用以下命令将其复制到你的存储桶中：\
  \  \n\n```\naws s3 cp test.txt s3://BUCKET/\n```\n\n要将文件*从*存储桶*复制到*节点，只需交换 `s3://BUCKET/`\
  \ 和 `test.txt` 的位置即可。  \n此外，你还可以为文件创建临时访问 URL。这些 URL 是带签名的 URL。这意味着 AWS 知道该 URL\
  \ 是由授权人士生成的，并且 AWS 将在指定时间内信任该 URL 作为访问该文件的有效方式。  \n这允许你直接将用户引向 AWS 站点，以便他们检索所需数据，而无需先将数据传输到你的服务器，再由你发送。这节省了处理能力、带宽和响应时间。\
  \  \n\n但是，要做到这一点，我们需要知道存储桶所在的区域。你在创建存储桶时指定了一个区域，但 AWS 并不总是显示该区域的“计算机化”版本，而你需要该版本用于命令行。执行以下命令来查找你的存储桶的区域（将\
  \ `BUCKET` 替换为你的存储桶名称）：  \n\n```\naws s3api get-bucket-location --bucket BUCKET\n\
  ```\n\n这将返回一个 JSON 编码的值。键名为 `LocationConstraint`，值是存储桶所在的区域名称。区域的一些常见值包括 `us-east-1`、`us-east-2`、`ca-central-1`、`eu-west-2`\
  \ 等。我们将用 `REGION` 来表示你的区域。  \n\n要获取访问文件的 URL，请使用以下命令：  \n\n```\naws s3 presign s3://BUCKET/FILE\
  \ --region REGION\n```\n\n这将生成一个 URL，你可以复制并粘贴到浏览器中。瞧——文件就会显示出来！但是，这个 URL 仅在 3600\
  \ 秒（1 小时）内有效。如果你希望 URL 的有效时间不同，可以使用 `--expires-in` 标志来指定。因此，如果你希望 URL 在 20 秒后过期，只需在命令中添加\
  \ `--expires-in 20` 即可。  \n\n![../images/487291_1_En_9_Chapter/487291_1_En_9_Figa_HTML.jpg](img/487291_1_En_9_Figa_HTML.jpg)\
  \  \n\n内联指定环境变量  \n在开始编码之前，我想顺便介绍一下设置环境变量的另一种方法。  \n你可以通过在与给定命令相同的行上，在命令之前指定要设置的环境变量，使其仅对一个应用程序有效。\
  \  \n\n例如，如果我运行命令 `example-command`，并且想将环境变量 `MYVAR` 设置为 `myval`，我可以这样运行命令：  \n\n\
  ```\nMYVAR=myval example-command\n```\n\n这将设置环境变量，但仅适用于运行该命令。实际上，你可以在运行命令时设置任意多个环境变量，它们只需用空格分隔即可。例如，要设置两个值，我们可以这样做：\
  \  \n\n```\nMYVAR1=val1 MYVAR2=val2 example-command\n```\n\n这就是我们将在要创建的应用程序中设置凭证的方式。出于配置目的，最好将凭证（和其他配置信息）排除在代码之外，并通过服务器上的环境变量来设置它们。然而，这需要更深入、特定于服务器的配置细节，超出了本书的讨论范围。\
  \  \n\n## 9.5 将应用程序连接到 S3  \n\n现在我们已经知道如何从服务器与 S3 通信，接下来我们将连接留言板应用程序到 S3，以便用户上传带有消息的图片。这实际上相当简单。我们只需要...\n\
  \n\n\n1.  创建一些通用函数来获取 AWS 配置信息。\n2.  允许表单包含图像字段。\n3.  在创建留言条目时检查图像上传。\n4.  将图像传输到\
  \ S3。\n5.  在查看留言条目时为图像创建签名的 S3 URL。\n\n第一步是在`common.php`中创建一些用于处理 AWS 凭据和配置的辅助函数。图\
  \ 9-6 展示了这些函数。记得将`BUCKET`、`ACCESSKEY`和`SECRETKEY`替换为你自己的值。\n\n![../images/487291_1_En_9_Chapter/487291_1_En_9_Fig6_HTML.png](img/487291_1_En_9_Fig6_HTML.png)\n\
  \n**图 9-6** 为 AWS 配置对`common.php`的补充\n\n函数`getAWSCredentials()`将返回一个凭据字符串，该字符串可在命令字符串前设置环境变量。\n\
  \n下一步是在`new.php`的表单中添加图像字段。这分为两个部分。首先，我们必须修改`<form>`标签以允许文件上传。为此，请将属性`enctype=\"\
  multipart/form-data\"`添加到`<form>`标签中。没有它，文件输入标签将无法真正上传文件。\n\n接下来，我们需要添加一个文件上传字段。在提交按钮之前，添加以下代码行：\n\
  \n```\nImage (JPEG)\n```\n\n现在你的表单已配置为支持文件上传。接下来，我们将配置`create.php`以接受文件上传。\n\n![../images/487291_1_En_9_Chapter/487291_1_En_9_Fig7_HTML.png](img/487291_1_En_9_Fig7_HTML.png)\n\
  \n**图 9-7** 对`create.php`的修改以检测文件上传\n\n我们需要修改两个部分。首先，将`$has_img = false;`这一行替换为图\
  \ 9-7 中的代码。这段代码检测文件是否已上传，如果已上传，则确保数据库更新以反映这一点。其次，在`$stmt->execute();`这一行之后立即添加图\
  \ 9-8 中的代码。这是实际将文件传输到 S3 的代码。\n\n![../images/487291_1_En_9_Chapter/487291_1_En_9_Fig8_HTML.png](img/487291_1_En_9_Fig8_HTML.png)\n\
  \n**图 9-8** 对`create.php`的修改以将文件传输到 S3\n\n现在，我们只需要提供一种方法来查看图像，当你点击留言条目时。为此，我们需要修改`single.php`。只需在`getFooter()`这一行之前添加图\
  \ 9-9 中的代码。\n\n![../images/487291_1_En_9_Chapter/487291_1_En_9_Fig9_HTML.png](img/487291_1_En_9_Fig9_HTML.png)\n\
  \n**图 9-9** 对`single.php`的修改以显示图像\n\n这段代码将为上传请求一个签名的 URL，然后将其放入图像标签中以便查看。\n\n请注意，对于实际应用，我们需要验证上传的文件确实是\
  \ JPEG 文件。否则，任何人都可以上传任意内容，黑客可以轻易地将系统滥用为免费文件共享站点，或用于其他恶意目的。此外，你可能还需要一个管理功能来验证上传的图像是否合适。否则，有人可能会轻易地将你的留言板变成色情共享站点。这些超出了我们简单示例应用的范围，但它们是值得记住的好点。\n\
  \n还要记住，你不仅要为存储空间付费，还要为进出 S3 的所有流量使用带宽付费。疏于警惕可能会导致高昂的成本。\n\n现在，你需要在`template_node`上测试你的新代码，当它正常运行时，按照第\
  \ 6.3 节所述，通过重新映像服务器将其部署到你的云集群中。\n\n现在试试你的应用程序——它通过 Amazon S3 拥有了无限的文件存储空间！\n\n请注意，还有一个用于\
  \ PHP 的 AWS 库，其中包含 S3 功能。在这里，我们使用了命令行，因为我们在前一节已经学习了该工具。AWS PHP 库的信息可在[`https://docs.aws.amazon.com/sdk-for-php/`](https://docs.aws.amazon.com/sdk-for-php/)中获取。\n\
  \n![../images/487291_1_En_9_Chapter/487291_1_En_9_Figb_HTML.jpg](img/487291_1_En_9_Figb_HTML.jpg)\
  \ **关于 S3 签名过期的说明**\n\n在处理签名 URL 时，需要注意它们如何与缓存交互。在本例中，`single.php`没有被缓存，因此无需担心。然而，如果它被缓存了，重要的是要确保\
  \ URL 的过期时间远大于渲染后的代码可能在缓存中停留的时间。\n\n例如，如果 URL 仅有效 30 秒，但缓存能持续一小时，那么，在最初的 30 秒结束后，在接下来的一小时里，用户将获得他们无法使用的\
  \ URL。在问题开始出现时（或者，最好是之前）请牢记这一点。\n\n![../images/487291_1_En_9_Chapter/487291_1_En_9_Figc_HTML.jpg](img/487291_1_En_9_Figc_HTML.jpg)\
  \ **S3 文件权限**\n\n除了签名 URL，还可以通过授予文件公共访问权限来允许访问 S3 文件。这可行，但这并不是共享文件的最佳方法。问题是，如果你只提供一个公开共享的\
  \ URL 供人们访问，那么这个 URL 可能会被四处传播，人们可以直接使用你的 S3 资源用于自己的目的，完全绕过你的 Web 应用程序。这意味着你最终可能会为别人的文件服务器买单。\n\
  \n即使你没有立即在应用程序中实施对文件访问的严格控制，强制所有人使用由你的应用程序控制的签名 URL 来访问 S3 对象（正如我们这里所示），意味着当你准备好实施访问控制时，一切都已就绪。至少，这可以防止在互联网上公开共享\
  \ S3 URL，而使用你的 AWS 账户资源进行大量文件下载。\n\n如果你真的更喜欢使用此方法而非签名 URL，你可以通过首先在存储桶本身上启用公共访问，然后设置单个文件为所有人可读来管理。这也意味着你需要为新上传的文件设置权限。你可以在`aws\
  \ s3 cp`命令中通过将以下标志添加到命令末尾来完成（URL 应与命令行的其余部分在同一行，等号后无空格）：\n\n```\n--grants read=uri=http://acs.amazonaws.com/groups/global/AllUsers\n\
  ```\n\n然而，这仅在存储桶本身已配置为允许公共访问时才有效。\n\n10. 使用 AWS 托管\n\n\n\n## 10.1 使用 Amazon Lightsail\n\
  \n虽然本书大部分内容都聚焦于在 Linode 上托管你的应用，但由于许多云托管服务都基于 AWS，我认为研究一下 AWS 上的一些托管选项是值得的。\n\n\
  AWS 的一个问题就在于其选项数量庞大。可用的选项数量之多，实际上使得管理变得相当困难。\n\n举个例子，有一次我在一个团队里工作，需要访问日志。经过大量搜索，我们终于找到了授予日志文件访问权限的选项。然而，结果证明，*查看*日志文件的权限，与*检索*日志文件所需的权限竟然是*不同*的。因此，虽然我有*查看*日志文件的权限，但我实际上并没有获取它们的权限。最终，他们放弃了这种细粒度控制，直接让我成为了管理员。这并不是说\
  \ AWS 没有这种能力，只是尝试管理它所花费的时间和精力，可能和你通过其他不那么“自动化”的方式节省下来的差不多。拥有过多的选择并试图满足所有人的需求，很容易让你淹没在没人有时间也没机会去掌握的选项和设置中。\n\
  \n有太多细粒度的控制，每个都有各自的问题、特性和缺陷。AWS“支持”的不同平台和系统数量非常庞大。然而，我发现这些支持通常存在很大的漏洞。虽然这些问题可以解决，但那些变通方法有时让我希望一开始就全部手动完成。\n\
  \n亚马逊首次涉足云托管领域的服务称为 EC2——弹性计算云。与 AWS 的大部分服务一样，这是一个非常灵活的云托管选项。然而，它也存在许多 AWS 服务固有的问题：要成功设置和使用它确实非常复杂。不仅设置复杂，其*定价*也复杂得离谱。他们不仅按计算时间收费，还按硬件\
  \ I/O 请求收费。没错，他们会跟踪硬盘访问次数*并据此向你收费*。\n\n为了更好地与 Linode 和 DigitalOcean 等更易于使用的服务竞争，AWS\
  \ 推出了 Amazon Lightsail。Lightsail 的功能集和定价结构与我们在 Linode 上看到的非常相似。你可以从同一个包含 CloudFront\
  \ 和 S3 的 AWS 管理控制台访问 Lightsail。只需搜索 Lightsail，其仪表盘界面应类似图 10-1。\n\n就我们的目的而言，需要注意\
  \ Lightsail 和 Linode 之间有几个细微差别：\n\n1.  Lightsail 实例默认通过公钥连接，而不是密码，并且会连接到一个普通用户，而不是以\
  \ `root` 身份连接。\n2.  Lightsail 的 CentOS 发行版预装软件包与 Linode 的略有不同。\n\n![../images/487291_1_En_10_Chapter/487291_1_En_10_Fig1_HTML.jpg](img/487291_1_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1 Amazon Lightsail 的初始仪表盘\n\n3.  所有 Lightsail 实例都会自动添加到亚马逊的私有网络中。实际上，当你在实例上时，你看到的*唯一*\
  \ IP 地址就是私有网络地址。你获得的外部 IP 会被路由到那个内部 IP 地址。\n4.  Lightsail 实例的备份需要手动创建。\n5.  Lightsail\
  \ 有一个独立的数据库服务，如果你不想自己管理数据库服务器，可以使用该服务。\n\n要启动并设置一个新实例，请单击“创建实例”按钮。这将带你进入一个类似图 10-2\
  \ 的界面。\n\n在这里，你需要选择托管节点的数据中心（实例位置）。这与 Linode 略有不同，因为 AWS 既有数据中心，又有*可用区*。在 AWS 中，数据中心被组织成多个可用区。这些区可以轻松地共享资源以实现负载均衡，但每个可用区都有独立的电力和外部互联网连接线路。本质上，它们表现得像是在同一个数据中心，但不同可用区中的服务器不太可能受到同一事件（例如断电或断网）的影响。因此，例如，你可以将主数据库放在一个可用区，副本数据库放在另一个可用区。这样，如果你的主数据库所在的可用区宕机了，副本（因为它位于不同的可用区）就可以被提升并充当主数据库。\n\
  \n![../images/487291_1_En_10_Chapter/487291_1_En_10_Fig2_HTML.jpg](img/487291_1_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2 创建 Lightsail 实例\n\n我们要选择的平台是“Linux/Unix”。然后，选择“仅操作系统”（其他选项允许使用针对特定任务的预配置服务器）。之后，选择“CentOS”。向下滚动，你可以忽略大多数其他问题，然后选择你想要的节点规格。然后，为了标识你的实例，像我们之前做的那样，将其命名为\
  \ `template-node`。单击“创建实例”来创建机器。\n\nAWS 创建你的机器可能需要一些时间。创建完成后，你可以单击该机器，然后会看到一个类似图\
  \ 10-3 的仪表盘。要登录，只需单击标有“使用 SSH 连接”的按钮。这将打开一个终端窗口，你将作为 `centos` 用户连接到该节点。\n\n你可以使用这个\
  \ `centos` 用户来代替本书示例中的 `fred` 用户。或者，你也可以在需要时创建 `fred` 用户。不过，你仍然需要以 `root` 身份使用该实例来进行配置。要以\
  \ `root` 身份登录，只需执行以下命令：\n\n```\nsudo su -\n```\n\n![../images/487291_1_En_10_Chapter/487291_1_En_10_Fig3_HTML.jpg](img/487291_1_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3 Lightsail 节点仪表盘\n\n现在，你的会话将以 `root` 用户身份运行。\n\nLightsail 节点预装的软件包与 Linode\
  \ 节点略有不同。要使你的 Lightsail 节点与 Linode 系统的起始点相似，请执行以下命令：\n\n```\nyum install -y nano\n\
  yum install -y firewalld\nsystemctl start firewalld\nsystemctl enable firewalld\n\
  ```\n\n从这一点开始，你可以基本按照第 3 章和第 4 章中的节点设置说明操作，步骤基本相同。\n\n在第 5 章中，从备份创建新实例的机制略有不同。在\
  \ Lightsail 中，备份是使用“快照”功能创建的。你只需转到节点的“快照”选项卡，为你的快照命名，然后创建它。一旦创建完成，你就可以从该快照创建一个新节点，如图\
  \ 10-4 所示。负载均衡器可以在主界面中的“网络”选项卡下从 Lightsail 创建。\n\n![../images/487291_1_En_10_Chapter/487291_1_En_10_Fig4_HTML.jpg](img/487291_1_En_10_Fig4_HTML.jpg)\n\
  \n图 10-4 从快照创建节点\n\n此后，关于如何创建云服务的其余信息没有变化，因为后续内容都围绕节点本身的操作展开。\n\n\n\n## 10.2 在 Elastic\
  \ Beanstalk 上托管\n\n虽然本书大部分内容聚焦于基础设施即服务云，但我还是想花点时间介绍一种平台即服务云。AWS 有一种名为“Elastic Beanstalk”的\
  \ PaaS 云服务，它支持多种不同类型的应用程序，其中一种就是 PHP。\n\nPaaS 云将云计算中的所有系统管理工作都剥离掉了。但问题是，大多数高级云系统最终仍然需要一定程度的系统管理。这并不是说当你有特殊配置需求时，PaaS\
  \ 系统就无法使用，而是说，要正确、可维护地配置你的 PaaS 系统，并使其与平台提供商的操作保持同步，所花费的精力往往比你在 IaaS 云中完全掌控还要多。无论如何，在本节中，我们将介绍如何让我们的应用程序在\
  \ Elastic Beanstalk 上运行起来。\n\n在 PaaS 系统中，我们无法控制机器。因此，我们不能指定某台机器作为数据库服务器、作业服务器等。相反，每个应用程序可以根据\
  \ PaaS 系统的意愿在任意数量的机器上进行伸缩。这通常意味着 PaaS 系统将管理数据库。\n\n对于 AWS 来说，这意味着要使用他们的关系型数据库服务——RDS。将应用程序连接到\
  \ RDS 非常简单。Elastic Beanstalk 会为所有连接信息设置环境变量，我们只需编程让应用程序读取它们即可。\n\n为此，我们只需修改 `common.php`\
  \ 文件，替换 `getReadOnlyConnection()` 和 `getReadWriteConnection()` 函数。这两个函数应该如图 10-5\
  \ 所示。\n\n![../images/487291_1_En_10_Chapter/487291_1_En_10_Fig5_HTML.png](img/487291_1_En_10_Fig5_HTML.png)\n\
  \n**图 10-5** 使用 RDS 访问数据库\n\n这将根据 RDS 传入的环境变量构建一个连接字符串。\n\n其次，由于你无法直接访问数据库，我们需要一个\
  \ PHP 脚本来为我们创建数据库表。创建一个名为 `createdb.php` 的文件，并在其中放入以下代码。\n\n![../images/487291_1_En_10_Chapter/487291_1_En_10_Fig6_HTML.png](img/487291_1_En_10_Fig6_HTML.png)\n\
  \n**图 10-6** 使用 RDS 创建数据库\n\n请注意，由于我们没有特定的服务器，这些修改是在个人电脑硬盘上的本地应用程序副本中进行的。一旦修改完成，你就可以开始操作了。\n\
  \n要开始使用 Elastic Beanstalk，请返回 AWS 管理控制台并搜索“Elastic Beanstalk”。在仪表板上，点击标题为“Create\
  \ New Application”的按钮。为其命名，然后点击“Create”。\n\n在 EB 中，应用程序可以划分为“环境”。环境可用于各种用途，包括区分预发环境与生产环境、为不同任务划分不同的服务器组，以及在应用程序的不同版本之间快速切换。就我们而言，我们只需要一个环境。因此，点击按钮创建一个新环境。它会询问你要创建哪种类型的环境。我们需要一个“Web\
  \ Server Environment”。\n\n下一个屏幕是配置屏幕，如图 10-7 所示。你可以根据需要为环境命名，但该屏幕上唯一重要的设置是选择“Preconfigured\
  \ Platform”。显然，我们选择“PHP”。默认情况下，它会加载一个示例应用程序。这正是我们目前需要的。点击“Create Environment”完成该过程。\n\
