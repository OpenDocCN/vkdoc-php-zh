- fmt: '# If It Hasn’t Already, Version Control Will Change Your Life


    If it hasn’t already, version control will change your life (if only your life
    as a developer). How many times have you reached a stable moment in a project,
    drawn a breath, and plunged onward into development chaos once again? How easy
    was it to revert to the stable version when it came time to demonstrate your work
    in progress? Of course, you may have saved a snapshot of your project when it
    reached a stable moment, probably by duplicating your development directory. Now
    imagine that your colleague is working on the same codebase. Perhaps he has saved
    a stable copy of the code as you have. The difference is that his copy is a snapshot
    of his work, not yours. Of course, he has a messy development directory, too.
    So you have four versions of your project to coordinate. Now imagine a project
    with four programmers and a web UI developer. You’re looking pale. Perhaps you
    would like to lie down?


    `Git` exists exclusively to address this problem. Using `Git`, all of your developers
    can clone their own copies of the codebase from a central repository. Whenever
    they reach a stable point in their code, they can pull the latest code from the
    server and merge it with their own recent work. When they are ready, and after
    they have fixed any conflicts, they can push their new stable synthesis back into
    the shared repository.


    `Git` is a distributed version-control system. This means that, once they have
    acquired a branch, users commit to their own local repository without the need
    for a network connection. There are a number of benefits to this. It means that
    day-to-day operations are faster, and that you can work easily on planes and trains
    and in automobiles. Ultimately, however, you can share an authoritative repository
    with your teammates.


    The fact that each developer can merge her work into a central repository means
    that reconciling multiple strands of development is made vastly easier. Even better,
    you can check out versions of your codebase based on a date or a label. So when
    your code reaches a stable point, suitable for showing to a client as work in
    progress, for example, you can tag that with an arbitrary label. You can then
    use that tag to check out the correct codebase when your client swoops into your
    office looking to impress an investor.


    Wait! There’s more! You can also manage multiple strands of development at the
    same time. If this sounds needlessly complicated, imagine a mature project. You
    have already shipped the first version, and you’re well into development of version
    2. Does version 1.n go away in the meantime? Of course not. Your users are spotting
    bugs and requesting enhancements all the time. You may be months away from shipping
    version 2, so where do you make and test the changes? `Git` lets you maintain
    distinct branches of the codebase. So you might create a bug-fix branch of your
    version 1.n for development on the current production code. At key points, this
    branch can be merged back into the version 2 code (the trunk), so that your new
    release can benefit from improvements to version 1.n.


    **Note**: `Git` is not the only version-control system available. You might also
    like to look into `Subversion` ( [http://subversion.apache.org/](http://subversion.apache.org/)
    ) or `Mercurial` ( [http://mercurial.selenic.com/](http://mercurial.selenic.com/)
    ). This chapter is necessarily a brief introduction to a large topic. Luckily,
    however, *Pro Git* by Scott Chacon (Apress, 2014) covers the topic with depth
    and clarity. Not only that, but a web version is available online at [https://git-scm.com/book/en/v2](https://git-scm.com/book/en/v2).


    Let’s get on and look at some of these features in practice.


    ## Getting Git


    If you are working with a Unix-like operating system (such as Linux or FreeBSD),
    you may already have `Git` installed and ready to use.


    **Note**: I show commands that are input at the command line in bold to distinguish
    them from any output they may produce.


    Try typing this from the command line:


    ```

    $ git help

    ```


    You should see some usage information that will confirm that you are ready to
    get started. If you do not already have `Git`, you should consult your distribution’s
    documentation. You will almost certainly have access to a simple installation
    mechanism such as `Yum` or `Apt`, or you can acquire `Git` directly from [http://git-scm.com/downloads](http://git-scm.com/downloads).


    **Note**: Throughout this chapter, I denote command line input by displaying it
    in bold text. A dollar sign (`$`) represents the command prompt.


    ## Using an Online Git Repository


    You may have noticed by now that this book often goes it alone. I almost never
    argue that you should reinvent the wheel; rather, you should at least get a sense
    of what goes into wheel construction before buying one ready-made. For this reason,
    I’ll be covering the mechanics of setting up and maintaining your own central
    git repository in the next section. Let’s get real, though. You’ll almost certainly
    use a specialized host to manage your repositories. There are a number of these
    to choose from, though the biggest players are probably `Bitbucket` ( [https://bitbucket.org](https://bitbucket.org)
    ) and `GitHub` ( [https://github.org](https://github.org) ).


    So, which should you choose? As a rule of thumb, `GitHub` is probably the standard
    for open source products. Startups often opt for `Bitbucket` because it offers
    free private repositories and only charges as your team grows. That seems like
    a good deal; after all, if your team is growing, then you’ve probably either secured
    funding or you’re seeing some revenue. If that’s true, then well done, you!


    More or less on the basis of a coin toss, I’ll sign up with `GitHub` for my project.
    Figure 17-1 shows my next decision, which is between a public or private repository.
    I’ll opt for a public project (because I’m a cheapskate).


    ![A314621_5_En_17_Fig1_HTML.jpg](A314621_5_En_17_Fig1_HTML.jpg)


    **Figure 17-1.** Getting started with a GitHub project


    At this point, `GitHub` offers some helpful instructions for importing my project.
    You can see those in Figure 17-2.


    ![A314621_5_En_17_Fig2_HTML.jpg](A314621_5_En_17_Fig2_HTML.jpg)


    **Figure 17-2.** GitHub’s import instructions


    I’m not ready to run those commands yet, though. `GitHub` needs to be able to
    validate me when I push files to the server. In order to do that, it requires
    my public key. I describe one way of generating such a key in the next section,
    “Configuring a Git Server.” Once I have a public key, I can add it from the `SSH
    and GPG keys` link in `GitHub`’s User Settings screen.


    You can see `GitHub`’s settings screen for SSH and GPG keys in Figure 17-3.


    ![A314621_5_En_17_Fig3_HTML.jpg](A314621_5_En_17_Fig3_HTML.jpg)


    **Figure 17-3.** Adding an SSH key


    Now I’m ready to start adding files to my repository. Before we get into that,
    though, we should step back and spend some time following the do-it-yourself route.


    ## Configuring a Git Server


    `Git` is different from traditional version-control systems in two key ways. First,
    under the hood, it stores snapshots of files, rather than the changes made to
    files between commits. Second, and more obviously to the user, it operates locally
    to your system until you choose to push to or pull from a remote repository. This
    means that you are not dependent on an Internet connection to get on with your
    work.


    You do not need a single remote repository in order to work with `Git`; but in
    practice, it almost always makes sense to have a shared source of authority if
    you are working with a team.


    In this section, I look at the steps needed to get a remote `Git` server up and
    running. I assume root access to a Linux machine.


    ### Creating the Remote Repository'
