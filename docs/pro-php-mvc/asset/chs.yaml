  \\'bar\\\\\\\"\");\n\n},\n\n\"Database\\Connector\\Mysql 转义值\",\n\n\"Database\\\
  Connector\\Mysql\"\n\n);\n```\n\n\n  \n这些测试与我们为缓存驱动创建的测试类似，但它们的测试目标是 `MySQL` 驱动的一个实例。`connect()`\
  \ / `disconnect()` 方法很简单，我们之前已经见过类似的。然而，`escape()` 方法是新的。在处理数据库时，我们需要保护其中存储的信息，使其免受\
  \ SQL 注入攻击。SQL 注入（通常还有错误数据）是导致应用程序不稳定和安全漏洞的首要原因。\n\n这些问题最常发生在数据不符合正确的数据类型，或试图在另一个查询的正文中执行数据库查询时。我们可以通过在查询中对传递给数据库的参数进行转义来避免这种情况。这就是\
  \ `escape()` 方法的目的。\n\n接下来，我们需要测试驱动（连接器）是否能够执行 SQL 查询，以及在执行这些查询后是否能返回正确的元数据。清单 11-9\
