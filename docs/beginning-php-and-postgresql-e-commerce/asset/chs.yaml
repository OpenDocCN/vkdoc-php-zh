- '# 管理客户详细信息


  到目前为止，你已经在这本书中构建了一个基础但功能完整的网站，并将其与 `PayPal` 集成，用于接收付款和确认订单。在本书的这一部分，你将更进一步。通过从订单处理流程中移除
  `PayPal`，你可以获得更好的控制权，同时降低间接成本。这并不像你想象的那么复杂，但我们确实需要谨慎行事以确保一切正确。


  在本章中，我们将通过实现一个客户账户系统为此奠定基础。


  为了使电子商务网站更加用户友好，你通常会将信用卡号等详细信息存储在数据库中，这样用户就不必在每次下单时重新输入这些信息。你将实现的客户账户系统将存储这些信息，并包含输入此类详细信息所需的所有网页。


  除了实现这些网页，我们还需要考虑其他几个因素。首先，简单地将信用卡号、有效期和其他重要信息以明文形式存储在数据库中并不理想，因为一旦服务器被攻破，这些数据就有可能被盗。这种情况可能远程发生，也可能由组织内部的个人实施。除了对此类数据实施严格限制的访问策略外，更简单的方法是对敏感信息进行加密，并在需要时通过编程方式检索。我们将创建一个安全库来简化此功能。


  其次，安全通信非常重要，因为你将通过网络捕获信用卡详细信息等敏感信息。我们不能仅仅创建一个表单让人们通过 `HTTP` 访问并允许他们将其发送给我们，因为信息可能会被截获。相反，我们将使用基于
  `HTTPS` 连接的 `SSL`。你将把 `HatShop` 应用程序推进到可以继续前进并在下一章实现自己的后端订单处理管道的阶段。


  在本章中，你将学习如何：


  - 存储客户账户

  - 实现安全类

  - 向 `HatShop` 添加客户账户功能

  - 创建结账页面


  ## 存储客户账户


  你可以通过多种方式处理网站中的客户账户功能。不过，一般来说，这些方法都具备以下共同特征：


  - 客户登录以访问网站的安全区域。

  - 一旦登录，Web 应用程序会记住该客户，直到客户注销（通过“退出”链接手动注销，或者在会话超时或发生服务器错误时自动注销）。

  - Web 应用程序中的所有安全页面在允许访问之前都需要检查客户是否已登录。


  首先，让我们看看 `HatShop` 电子商务网站的通用实现细节。


  ### HatShop 客户账户方案


  判断客户是否登录的一种简单方法是将客户 ID 存储在会话状态中。然后你可以在安全页面的开头验证是否存在该值，如果不存在则警告用户。登录表单本身可以对用户进行身份验证，如果成功，则在会话状态中存储一个值，以备后续检索。要注销用户，只需从会话状态中移除该
  ID 即可。


  客户登录需要提供用户名（这里我们将使用客户的电子邮件地址，因为它保证是唯一的）和密码。通过互联网发送这些信息是一个敏感问题，因为第三方可能会窃听并捕获它们。在本章后面，我们将探讨如何启用通过互联网的安全通信。不过现在，我们将专注于身份验证方面，这一点不受用于传输客户电子邮件地址和密码的连接类型的影响。




  '
- '# 另一个与安全相关的问题涉及存储用户密码


  在数据库中明文存储用户密码不是一个好主意，因为这类信息是潜在的攻击目标。相反，你应该存储所谓的密码**哈希**（`hash`）。哈希是一个表示密码的唯一字符串，但无法被转换回原始密码。要验证用户输入的密码，你只需为输入的密码生成一个哈希，并将其与存储在数据库中的哈希进行比较。如果哈希匹配，则输入的密码也匹配，因此你可以确信客户是真实的。


  这引出了另一个重要任务——你需要为新用户提供注册方式。


  注册的结果是在数据库中添加一个新客户，包括用户名和密码哈希信息。


  要在你的应用程序中实现此方案，你需要完成以下任务：


  - 创建两个新的数据库表：第一个名为`customer`，用于保存客户详情；第二个名为`shipping_region`，用于存储客户可以居住的可能配送区域。

  - 在数据层和业务层中实现相关方法，用于添加、修改和检索`customer`和`shipping_region`中的信息。


  - 修改`cart_details`组件化模板，该模板现在会将用户重定向到一个结账页面，该页面将在名为`checkout_info`的新组件化模板中实现。

  - 创建一个名为`customer_login`的客户登录组件化模板。

  - 创建一个名为`customer_details`的组件化模板，用于客户注册或编辑基本账户详情。

  - 创建一个名为`customer_credit_card`的组件化模板，允许客户输入信用卡详细信息。

  - 创建一个名为`customer_address`的组件化模板，供客户输入配送地址。


  '
- "# 创建`customer`和`shipping_region`表\n\n现在，你可以按照下一步练习中的步骤来构建`customer`和`shipping_region`表。\n\
  \n## 练习：创建数据库表\n\n1. 加载`pgAdmin III`，并连接到`hatshop`数据库。\n2. 点击“工具”→“查询工具”（或点击工具栏上的“SQL”按钮）。一个新的查询窗口将出现。\n\
  3. 使用查询工具执行以下代码，该代码在`hatshop`数据库中创建`shipping_region`表：\n\n```sql\n-- Create shipping_region\
  \ table\nCREATE TABLE shipping_region\n(\nshipping_region_id SERIAL NOT NULL,\n\
  shipping_region VARCHAR(100) NOT NULL,\nCONSTRAINT pk_shipping_region_id PRIMARY\
  \ KEY (shipping_region_id)\n);\n```\n\n4. 现在将值`'Please Select'`、`'US / Canada'`、`'Europe'`和`'Rest\
  \ of the World'`添加到`shipping_region`表中。`'Please Select'`的`shipping_region_id`值必须始终为\
  \ 1——这很重要！使用查询工具执行以下 SQL 代码，将上述值添加到`shipping_region`表中：\n\n```sql\n-- Populate shipping_region\
  \ table\nINSERT INTO shipping_region (shipping_region_id, shipping_region) VALUES\
  \ (1, 'Please Select');\nINSERT INTO shipping_region (shipping_region_id, shipping_region)\
  \ VALUES (2, 'US / Canada');\nINSERT INTO shipping_region (shipping_region_id, shipping_region)\
  \ VALUES (3, 'Europe');\nINSERT INTO shipping_region (shipping_region_id, shipping_region)\
  \ VALUES (4, 'Rest of World');\n\n-- Update the sequence\nALTER SEQUENCE shipping_region_shipping_region_id_seq\
  \ RESTART WITH 5;\n```\n\n5. 使用查询工具执行以下代码，该代码在`hatshop`数据库中创建`customer`表：\n\n```sql\n\
  -- Create customer table\nCREATE TABLE customer\n(\ncustomer_id SERIAL NOT NULL,\n\
  name VARCHAR(50) NOT NULL,\nemail VARCHAR(100) NOT NULL,\npassword VARCHAR(50) NOT\
  \ NULL,\ncredit_card TEXT,\naddress_1 VARCHAR(100),\naddress_2 VARCHAR(100),\n);\n\
  ```\n\n\n\n`city` `VARCHAR(100)`,,\n\n`region` `VARCHAR(100)`,,\n\n`postal_code`\
  \ `VARCHAR(100)`,,\n\n`country` `VARCHAR(100)`,,\n\n`shipping_region_id` `INTEGER`\
  \ `NOT NULL` `DEFAULT 1`,,\n\n`day_phone` `VARCHAR(100)`,,\n\n`eve_phone` `VARCHAR(100)`,,\n\
  \n`mob_phone` `VARCHAR(100)`,,\n\n`CONSTRAINT pk_customer_id PRIMARY KEY (customer_id)`,\
  \ `CONSTRAINT fk_shipping_region_id FOREIGN KEY (shipping_region_id) REFERENCES\
  \ shipping_region (shipping_region_id)`\n\n`ON UPDATE RESTRICT ON DELETE RESTRICT`,\n\
  \n`CONSTRAINT uk_email UNIQUE (email)`\n\n);\n\n客户的信用卡信息将以加密格式存储，确保无人能够访问这些信息。但与密码不同，当订单处理流程需要时，你必须能够检索到信用卡信息，因此不能简单地使用哈希算法（哈希算法是单向的）。你将通过多个业务层类来实现信用卡数据加密功能，接下来将会看到这些类。\n\
  \n## 实现安全类\n\n到目前为止，以下两个领域需要安全功能：\n\n- 密码哈希\n- 信用卡加密\n\n这两项任务均由业务层类完成，这些类将保存在 `business`\
  \ 目录下的以下文件中：\n\n- `password_hasher.php`：包含 `PasswordHasher` 类，其中包含静态方法 `Hash()`，用于返回所提供密码的哈希值。\n\
  - `secure_card.php`：包含 `SecureCard` 类，代表一张信用卡。该类可以接收信用卡信息，并以加密格式提供访问。该类也可以接收加密的信用卡数据，并提供解密后的信息访问。\n\
  - `symmetric_crypt.php`：此文件中的 `SymmetricCrypt` 类被 `SecureCard` 用于加密和解密数据。这意味着，如果你需要更改加密方法，只需修改此处的代码，而无需改动\
  \ `SecureCard` 类。\n\n我们先来看哈希的代码，然后再看加密。\n\n## 在业务层中实现哈希功能\n\n哈希是一种获取表示对象的唯一值的方法。用于将源字节数组转换为哈希字节数组的算法各不相同。最常用的哈希算法是\
  \ MD5（消息摘要，所生成哈希代码的另一种称呼），它生成 128 位的哈希值。遗憾的是，许多攻击都是基于针对 MD5 哈希构建的词典。另一种流行的哈希算法是\
  \ SHA1（安全哈希算法），它生成 160 位的哈希值。普遍认为 SHA1 比 MD5 更安全（尽管速度较慢）。\n\n在 HatShop 的实现中，你将使用\
  \ SHA1，不过如果需要其他安全类型，也很容易更改。现在，你将在以下练习中实现 `PasswordHasher` 类。\n\n> **注意：** PHP 默认不支持\
  \ `mhash` 和 `mcrypt`，这是本章用于哈希和加密的库。请参阅附录 A 了解如何启用对 `mhash` 和 `mcrypt` 的支持。\n\n###\
  \ 练习：实现 `PasswordHasher` 类\n\n要实现 `PasswordHasher` 类，请遵循以下步骤：\n\n**1.** 在 `include/config.php`\
  \ 文件末尾添加以下行。这定义了一个随机值（你可以随意更改），用于在哈希之前添加到密码中。\n\n```php\n// 用于哈希的随机值\ndefine('HASH_PREFIX',\
  \ 'K1-');\n```\n\n**2.** 在 `business` 目录中创建一个名为 `password_hasher.php` 的新文件，并编写 `PasswordHasher`\
  \ 类：\n\n```php\n<?php\nclass PasswordHasher\n{\n    public static function Hash($password,\
  \ $withPrefix = true)\n    {\n        if ($withPrefix)\n            $hashed_password\
  \ = sha1(HASH_PREFIX . $password);\n        else\n            $hashed_password =\
  \ sha1($password);\n        return $hashed_password;\n    }\n}\n?>\n```\n\n**3.**\
  \ 接下来，编写一个简单的测试页面来测试 `PasswordHasher` 类。在 `hatshop` 文件夹中创建一个名为 `test_hasher.php`\
  \ 的新文件，并在其中包含以下代码：\n\n```php\n<?php\nif (isset ($_GET['to_be_hashed']))\n{\n   \
  \ require_once 'include/config.php';\n    require_once BUSINESS_DIR . 'password_hasher.php';\n\
  \    $original_string = $_GET['to_be_hashed'];\n    echo '\"' . $original_string\
  \ . '\" 的哈希值是 ' .\n        PasswordHasher::Hash($original_string, false);\n    echo\
  \ '<br />';\n    echo '... 而 \"' . HASH_PREFIX . $original_string .\n        '\"\
  （秘密前缀与密码连接）的哈希值是 ' .\n        PasswordHasher::Hash($original_string, true);\n}\n\
  ?>\n<br /><br />\n<form action=\"test_hasher.php\">\n请输入您的密码：\n<input type=\"text\"\
  \ name=\"to_be_hashed\" /><br />\n<input type=\"submit\" value=\"计算哈希\" />\n</form>\n\
  ```\n\n**4.** 在你喜欢的浏览器中加载 `test_hasher.php` 文件，输入要哈希的密码，并查看如图 11-1 所示的结果。\n\n**图\
  \ 11-1.** *测试密码哈希功能*\n\n### 工作原理：哈希功能\n\n`PasswordHasher` 类中的代码非常简单。默认情况下，静态 `Hash()`\
  \ 方法返回一个字符串的哈希值，该字符串由秘密前缀与密码连接而成。\n\n你可能会好奇秘密前缀的作用。正如你可能已经猜到的，这与安全性有关。如果你的数据库被盗，攻击者可能会尝试将哈希后的密码值与一个大型哈希值字典进行匹配，该字典看起来像这样：\n\
  \n```\nword1 .... sha1(word1)\nword2 .... sha1(word2)\n...\nword10000 .... sha1(word10000)\n\
  ```\n\n如果两个哈希值匹配，则意味着原始字符串（在本例中为客户密码）也匹配。\n\n在哈希之前将秘密前缀附加到密码中，可以降低对哈希密码数据库进行字典攻击的风险，因为被哈希的字符串（秘密前缀\
  \ + 密码）不太可能出现在大型的“密码-哈希值”对字典中。\n\n`test_hasher.php` 页面测试了你新创建的 `PasswordHasher`\
  \ 类。\n\n> **注意：** 你也可以通过使用 PostgreSQL 加密函数在数据库级别处理哈希。\n> 首先，你需要将加密函数添加到 PostgreSQL。Unix\
  \ 用户应查看 PostgreSQL 源码中的 `contrib/pgcrypto` 目录并按照说明操作（详细说明请参阅附录 A）。然后，例如，你可以执行以下\
  \ PostgreSQL 语句来查看 PostgreSQL SHA1 的实际效果：\n> ```sql\n> SELECT ENCODE(DIGEST('freedom',\
  \ 'sha1'), 'hex');\n> ```\n> 当然，当依赖 PostgreSQL 的哈希功能时，密码会以“明文格式”传输到你的 PostgreSQL\
  \ 服务器，因此如果 PostgreSQL 服务器位于另一个网络（尽管这种情况不太常见），你必须通过使用 SSL 连接来保护 Web 服务器和 PostgreSQL\
  \ 服务器之间的连接。\n> 这可以通过在 PHP 代码中处理哈希来避免，这也提供了更好的可移植性，因为它不依赖于 PostgreSQL 特有的函数。请记住，出于同样的可移植性原因，我们选择使用\
  \ PDO 而不是 PHP 的 PostgreSQL 特有函数。\n\n## 在业务层中实现加密功能\n\n加密以多种形式和样式存在，并且一直是一个热门话题。尽管关于这个主题有大量建议，但并没有一种确定的数据加密解决方案。一般来说，加密有两种形式：\n\
  \n**对称加密：** 使用单个密钥来加密和解密数据。\n\n\n"
- "# 非对称加密\n\n**非对称加密：**使用不同的密钥来加密和解密数据。加密密钥通常被称为**公钥**，任何人都可以用它来加密信息。解密密钥被称为**私钥**，因为它只能用于解密使用公钥加密的数据。加密密钥（公钥）和解密密钥（私钥）在数学上是关联的，并且总是成对生成。公钥和私钥无法相互推导。如果你拥有一对公钥/私钥，你可以将公钥发送给需要为你加密信息的各方。只有你知道与该公钥关联的私钥，因此也只有你能解密信息。\n\
  \n尽管非对称加密更安全，但它也需要更多的处理能力。对称加密速度更快，但安全性可能较低，因为加密者和解密者都知道同一个密钥。使用对称加密时，加密者需要将密钥发送给解密者。在互联网通信中，当密钥发送给加密者时，往往无法确保该密钥对第三方保密。\n\
  \n非对称加密通过使用密钥对解决了这个问题。解密密钥永远无需公开，因此第三方破解加密要困难得多。然而，由于它需要更多的处理能力，实际的操作方法是使用非对称加密在互联网上交换一个对称密钥，然后使用该密钥进行对称加密，因为知道这个密钥没有暴露给第三方。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH11.qxd 11/17/06 3:37\
  \ PM 第 361 页\n\n## 第 11 章 ■ 管理客户详细信息\n\n**361**\n\n在 HatShop 应用程序中，事情比互联网通信要简单得多。你只需要加密数据以存储在数据库中，并在需要时解密，因此你可以使用对称加密算法。\n\
  \n> **注意：** 然而，在幕后，也有一些非对称加密在进行，因为这是 HTTPS 通信实现的方法。\n\n与哈希一样，对称和非对称加密都可以使用多种算法。PHP\
  \ 的`mcrypt`库包含了最重要的对称算法的实现。PHP 中没有处理非对称加密的库，但如果你需要执行非对称加密，可以使用 PGP（Pretty Good Privacy，良好隐私密码法）系列软件（更多信息，请参见\
  \ http://www.pgp.com）和 GnuPG（http://www.gnupg.org）。\n\n两种更常用的非对称算法是 DSA（数字签名算法）和\
  \ RSA（Rivest-Shamir-Adleman，以其发明者 Ronald Rivest、Adi Shamir 和 Leonard Adleman 的名字命名）。其中，DSA\
  \ 只能用于“签名”数据以验证其真实性，而 RSA 则用途更广（尽管在生成数字签名时比 DSA 慢）。DSA 是美国政府当前用于数字认证的标准。DSA 和 RSA\
  \ 这两种非对称算法都在 PGP 系列软件（PGP 和 GnuPG）中实现。\n\n在`mcrypt`库中找到的一些流行的对称算法包括 DES（数据加密标准）、三重\
  \ DES（3DES）、RC2（Ron's Code 或 Rivest's Cipher，取决于你问谁，同样由 Ronald Rivest 发明）和 Rijndael（以其发明者\
  \ Joan Daemen 和 Vincent Rijmen 的名字命名）。\n\n## DES 和 RIJNDAEL\n\nDES 作为标准已有一段时间，尽管这种情况正在逐渐改变。它使用\
  \ 64 位密钥，但实际上只使用了其中的 56 位（8 位是“奇偶校验”位），这在当今的计算机面前不足以防止被破解。\n\n三重 DES 和 RC2 都是 DES\
  \ 的变体。三重 DES 实际上使用三个密钥对数据执行三次独立的 DES 加密，减去校验位后总长度为 168 位。RC2 变体的密钥长度可达 128 位（使用\
  \ RC3、RC4 等也可以实现更长的密钥），因此根据密钥大小，它可以比 DES 更弱或更强。\n\nRijndael 是一种完全独立的加密方法，现已被接受为新的\
  \ AES（高级加密标准）标准（在选择 Rijndael 之前考虑了几种竞争的算法）。该标准旨在取代 DES，并逐渐成为最常用（和最安全）的对称加密算法。\n\n\
  与加密和解密数据相关的任务比哈希稍微复杂一些。`mcrypt`函数针对原始数据处理进行了优化，因此你需要进行一些数据转换工作。你还需要定义一个密钥和一个初始化向量（IV）来执行加密和解密。由于加密的特性，需要\
  \ IV：数据块通常是按顺序加密的，计算一个位序列的加密值会用到前一个位序列的一些数据。由于加密开始时没有这样的值，因此使用 IV 代替。对于 AES 加密（`Rijndael_128`），IV\
  \ 和密钥必须为 32 字节长。\n\n> **注意：** 在 http://en.wikipedia.org/wiki/Block_cipher_modes_of_operation，你可以了解更多关于各种加密模式的信息。\n\
  \n加密字符串的一般步骤如下：\n\n1. 创建一个 32 字节的随机 IV。\n2. 将 IV（你将其保存为十六进制字符串）转换为字节数组。\n3. 通过提供字节数组格式的\
  \ IV，使用 AES 加密对字符串进行加密。\n4. 将生成的加密数据从字节数组转换为十六进制字符串。\n\n解密遵循类似的方案：\n\n1. 将 IV（你将其保存为十六进制字符串）转换为字节数组（与加密的第一步相同）。\n\
  2. 将要解密的字符串转换为字节数组。\n3. 通过提供字节数组格式的 IV，对上一步的二进制字符串进行解密。\n\n在你的代码中，你将使用 AES，但`SymmetricCrypt`类中的代码可以修改以使用任何支持的加密算法。\n\
  \n## 练习：实现 SymmetricCrypt 类\n\n在`business`目录中新建一个名为`symmetric_crypt.php`的文件，并在其中写入以下代码：\n\
  \n```php\n<?php\n\nclass SymmetricCrypt\n{\n    // 加密/解密密钥\n    private static $_msSecretKey\
  \ = 'From Dusk Till Dawn';\n\n    // 初始化向量\n    private static $_msHexaIv = 'c7098adc8d6128b5d4b4f7b2fe7f7f05';\n\
  \n    // 使用 Rijndael 加密算法\n    private static $_msCipherAlgorithm = MCRYPT_RIJNDAEL_128;\n\
  \n    /* 函数对接收到的纯文本字符串进行加密，并以十六进制格式返回结果 */\n    public static function Encrypt($plainString)\n\
  \    {\n        // 将 SymmetricCrypt::_msHexaIv 打包成二进制字符串\n        $binary_iv = pack('H*',\
  \ self::$_msHexaIv);\n\n        // 加密 $plainString\n        $binary_encrypted_string\
  \ = mcrypt_encrypt(\n            self::$_msCipherAlgorithm,\n            self::$_msSecretKey,\n\
  \            $plainString,\n            MCRYPT_MODE_CBC,\n            $binary_iv);\n\
  \n        // 将 $binary_encrypted_string 转换为十六进制格式\n        $hexa_encrypted_string\
  \ = bin2hex($binary_encrypted_string);\n\n        return $hexa_encrypted_string;\n\
  \    }\n\n    /* 函数对接收到的十六进制字符串进行解密，并以十六进制格式返回结果 */\n    public static function\
  \ Decrypt($encryptedString)\n    {\n        // 将 Symmetric::_msHexaIv 打包成二进制字符串\n\
  \        $binary_iv = pack('H*', self::$_msHexaIv);\n\n        // 将十六进制字符串转换为字节数组\n\
  \        $binary_encrypted_string = pack('H*', $encryptedString);\n    }\n}\n```\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH11.qxd 11/17/06 3:37\
  \ PM 第 362 页\n\n## 第 11 章 ■ 管理客户详细信息\n\n**362**\n\n\n\n```php\n// 解密 $binary_encrypted_string\n\
  $decrypted_string = mcrypt_decrypt(\n    self::$_msCipherAlgorithm,\n    self::$_msSecretKey,\n\
  \    $binary_encrypted_string,\n    MCRYPT_MODE_CBC,\n    $binary_iv\n);\nreturn\
  \ $decrypted_string;\n}\n}\n?>\n```\n\n**2.** 在 `hatshop` 文件夹中添加一个名为 `test_encryption.php`\
  \ 的测试文件，代码如下：\n\n```php\n<?php\nif (isset ($_GET['my_string']))\n{\n    require_once\
  \ 'include/config.php';\n\n    require_once BUSINESS_DIR . 'symmetric_crypt.php';\n\
  \n    $string = $_GET['my_string'];\n    echo '字符串是：<br />' . $string . '<br /><br\
  \ />';\n    $encrypted_string = SymmetricCrypt::Encrypt($string);\n    echo '加密后的字符串：<br\
  \ />' . $encrypted_string . '<br /><br />';\n    $decrypted_string = SymmetricCrypt::Decrypt($encrypted_string);\n\
  \    echo '解密后的字符串：<br />' . $decrypted_string;\n}\n?>\n\n<br /><br />\n\n<form\
  \ action=\"test_encryption.php\">\n输入要加密的字符串：\n<input type=\"text\" name=\"my_string\"\
  \ /><br />\n<input type=\"submit\" value=\"加密\" />\n</form>\n```\n\n**3.** 在您常用的浏览器中加载新创建的\
  \ `test_encryption.php` 文件，并输入一个字符串进行加密/解密（参见图 11-2）。\n\n> **注意** 如果 `mcrypt` 库未正确安装或配置，您将会收到关于调用\
  \ `mcrypt_encrypt()` 的致命错误。如果发生这种情况，请查看附录 A 中的安装说明。\n\n**图 11-2.** *测试加密*\n\n> **警告**\
  \ 运行测试页面后您可能会注意到，解密后的字符串长度始终是 32 字节的倍数。如果原始字符串少于 32 字节，则会追加空字符，直到字符串长度变为 32 字节的倍数。需要注意这个细节，因为它意味着解密后的字符串值可能与加密前的值不完全一致。对于我们的\
  \ HatShop 项目，由于我们将加密 XML 数据且关注的值位于 XML 标签之间，因此无需担心字符串末尾有多余的空字符。\n\n## 工作原理：业务层中的加密功能\n\
  \n`SymmetricCrypt` 类包含两个静态方法：`Encrypt()` 和 `Decrypt()`，用于加密和解密数据，以及一组以静态成员形式存储的加密配置参数：\n\
  \n```php\n// 加密/解密密钥\nprivate static $_msSecretKey = 'From Dusk Till Dawn';\n\n\
  // 初始化向量\nprivate static $_msHexaIv = 'c7098adc8d6128b5d4b4f7b2fe7f7f05';\n\n//\
  \ 使用 Rijndael 加密算法\nprivate static $_msCipherAlgorithm = MCRYPT_RIJNDAEL_128;\n\
  ```\n\n对于 AES 算法，密钥长度为 16 个字符（字节）。`mcrypt` 库允许使用更短的密钥，但这会降低加密安全性。对于 AES，IV 必须恰好为\
  \ 16 字节，并以十六进制字符串形式保存（2x16=32 个字符）。这里的 `$_msSecretKey` 和 `$_msHexaIv` 变量均设置为临时值。根据您想要使用的密钥，它们可以轻松地设置为任何其他值。\n\
  \n`Encrypt()` 首先将 IV 从十六进制值转换为字节数组，因为这是 `mcrypt_encrypt()` 函数（执行实际加密的函数）所期望的格式：\n\
  \n```php\n// 将 SymmetricCrypt::_msHexaIv 打包为二进制字符串\n$binary_iv = pack('H*', self::$_msHexaIv);\n\
  ```\n\n该转换使用 PHP 的 `pack()` 函数完成（了解更多信息，请访问 `http://www.php.net/pack`）。\n\n接着调用\
  \ `mcrypt_encrypt()`：\n\n```php\n// 加密 $plainString\n$binary_encrypted_string =\
  \ mcrypt_encrypt(\n    self::$_msCipherAlgorithm,\n    self::$_msSecretKey,\n  \
  \  $plainString,\n    MCRYPT_MODE_CBC,\n    $binary_iv\n);\n```\n\n这是执行实际加密的调用。其参数含义明确，您可以在\
  \ `http://www.php.net/mcrypt` 找到关于 `mcrypt_encrypt()` 函数的更多详细信息。`MCRYPT_MODE_CBC`\
  \ 指定了\n\n\n\n“密码分组链接（cipher block chaining）”加密方法；该方法使用了一种链接机制，其中每个数据块的加密都依赖于前几个块的加密结果，但第一个块除外，它使用\
  \ `IV` 代替。\n\n最后，加密后的字符串会被转换为十六进制格式，这种格式更易于处理（例如，保存到数据库或配置文件中）：\n\n```\n// 将 $binary_encrypted_string\
  \ 转换为十六进制格式\n$hexa_encrypted_string = bin2hex($binary_encrypted_string);\n```\n\n\
  `Decrypt()` 方法与 `Encrypt()` 方法非常相似。首先，你需要将 `IV` 转换为二进制形式（这与你在 `Encrypt()` 方法中的第一步相同）。\n\
  \n由于 `Encrypt()` 方法将加密后的字符串返回为十六进制字符串，因此 `Decrypt()` 的输入参数也是一个十六进制字符串。你必须将此字符串转换为字节数组，这是\
  \ `mcrypt_decrypt` 所需的格式：\n\n```\n// 将十六进制字符串转换为字节数组\n$binary_encrypted_string =\
  \ pack('H*', $encryptedString);\n\n// 解密 $binary_encrypted_string\n$decrypted_string\
  \ = mcrypt_decrypt(\n    self::$_msCipherAlgorithm,\n    self::$_msSecretKey,\n\
  \    $binary_encrypted_string,\n    MCRYPT_MODE_CBC,\n    $binary_iv);\n\nreturn\
  \ $decrypted_string;\n```\n\n此类的测试文件 `test_encryption.php` 只是简单地加密和解密数据，以验证一切正常工作。这个代码非常简单，因此我们在此不再赘述。\n\
  \n现在你已经有了 `SymmetricCrypt` 类的代码，创建安全相关类的最后一步是添加 `SecureCard` 类。\n\n## 使用 SecureCard\
