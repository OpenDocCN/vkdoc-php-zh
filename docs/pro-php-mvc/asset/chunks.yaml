- fmt: "# One of our goals is sensible configuration\n\nOne of our goals is sensible\
    \ configuration. Another goal is building an abstract platform that can cater\
    \ to many different kinds of services/implementations within the same underlying\
    \ structure. Some implementations will naturally need a means of specifying configuration\
    \ data. The easiest way to provide this configuration is through a configuration\
    \ file parser.\n\nWe will build such a parser in the chapters to come, but how\
    \ do we configure all the code leading up to the parser itself, and what about\
    \ configuration details that can’t sensibly be stored in a separate file? To illustrate\
    \ this, let us look at the example shown in Listing 2-8.\n\n## Listing 2-8. In\
    \ the Doghouse\n\n```\nclass Dog\n{\n    public $doghouse;\n\n    public function\
    \ goSleep()\n    {\n        $location = $this->doghouse->location;\n        $smell\
    \ = $this->doghouse->smell;\n        echo \"The doghouse is at {$location} and\
    \ smells {$smell}.\";\n    }\n}\n\nclass Doghouse\n{\n    public $location;\n\
    \    public $smell;\n}\n\n$doghouse = new Doghouse();\n$doghouse->location = \"\
    back yard\";\n$doghouse->smell = \"bad\";\n$dog = new Dog();\n$dog->doghouse =\
    \ $doghouse;\n$dog->goSleep();\n```\n\nIf the `$location` and `$smell` properties\
    \ are only ever used in the same context, then our classes need none of this configuration\
    \ we’ve been speaking about. If, on the other hand, these properties can have\
    \ different meaning based on the implementation, we would need a means of defining\
    \ this alternative context.\n\nSay, for instance, we wanted to create a `Doghouse`\
    \ subclass in which `$location` could be defined as the location inside the `Doghouse`\
    \ in which the `Dog` sleeps; or say we wanted to define `$smell` as a percentage\
    \ of scents the `Dog` can smell from inside the `Doghouse`.\n\nIn these cases,\
    \ we could always add additional properties to the `Doghouse` class to provide\
    \ the context for the initial properties. More often, though, developers will\
    \ leave it to the next guy to figure out the context, sometimes based on the variable\
    \ names or comments. On the one hand, variables should be named in such a way\
    \ that their context and meaning are evident. On the other hand, this seldom happens.\n\
    \nThere could also be times when we just want the extra flexibility, or when our\
    \ framework code needs to act on this kind of data, without the added benefit\
    \ of being able to understand human thinking. At such times, it would be great\
    \ to have some way to allow us to describe aspects of a class, from within the\
    \ class.\n\nIf you have used any programming language, you are undoubtedly familiar\
    \ with the concept of comments. They are there to help developers make notes that\
    \ will only be visible to other developers with access to the source code. One\
    \ of the standard formats in which comments can be written is the Doc Comments\
    \ format. The Doc Comments variant specific to PHP is called `PHPDocs`. Doc Comments\
    \ look similar to normal multiline comments, but start with `/**` (as opposed\
    \ to `/*`). PHP also has built-in classes that allow us to inspect these kinds\
    \ of comments, which will allow us to provide the configuration metadata we are\
    \ after. Consider the examples shown in Listing 2-9.\n\n## Listing 2-9. Examples\
    \ of Doc Comments\n\n```\nclass Controller\n{\n    /**\n     * @readwrite\n  \
    \   */\n    protected $_view;\n\n    /**\n     * @once\n     */\n    public function\
    \ authenticate()\n    {\n        // …authenticate the current user\n    }\n}\n\
    ```\n\nPerhaps we could want to enforce read-only/write-only/read-write behavior\
    \ on class properties. The `$_view` property is protected, so it is not accessible\
    \ outside the class, but imagine we have getters/setters for our class’s protected\
    \ properties. We could, in those getters/setters, read the Doc Comments of our\
    \ protected properties and enforce behavior based on them.\n\nPerhaps we could\
    \ want to make sure a method is executed only once. Other methods in our class\
    \ could read the Doc Comments and ensure they do not call the `authenticate()`\
    \ method if it has already been called."
  raw: 'One of our goals is sensible configuration. Another goal is building an abstract
    platform that can cater to many different kinds of services/implementations within
    the same underlying structure. Some implementations will naturally need a means
    of specifying configuration data. The easiest way to provide this configuration
    is through a configuration file parser.


    We will build such a parser in the chapters to come, but how do we configure all
    the code leading up to the parser itself, and what about configuration details
    that can’t sensibly be stored in a separate file? To illustrate this, let us look
    at the example shown in Listing 2-8.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ FOUNDATION


    ***Listing 2-8.*** In the Doghouse


    class Dog


    {


    public $doghouse;


    public function goSleep()


    {


    $location = $this->doghouse->location;


    $smell = $this->doghouse->smell;


    echo "The doghouse is at {$location} and smells {$smell}.";


    }


    }


    class Doghouse


    {


    public $location;


    public $smell;


    }


    $doghouse = new Doghouse();


    $doghouse->location = "back yard";


    $doghouse->smell = "bad";


    $dog = new Dog();


    $dog->doghouse = $doghouse;


    $dog->goSleep();


    If the $location and $smell properties are only ever used in the same context,
    then our classes need none of this configuration we’ve been speaking about. If,
    on the other hand, these properties can have different meaning based on the implementation,
    we would need a means of defining this alternative context.


    Say, for instance, we wanted to create a Doghouse subclass in which $location
    could be defined as the location inside the Doghouse in which the Dog sleeps;
    or say we wanted to define $smell as a percentage of scents the Dog can smell
    from inside the Doghouse .


    In these cases, we could always add additional properties to the Doghouse class
    to provide the context for the initial properties. More often, though, developers
    will leave it to the next guy to figure out the context, sometimes based on the
    variable names or comments. On the one hand, variables should be named in such
    a way that their context and meaning are evident. On the other hand, this seldom
    happens.


    There could also be times when we just want the extra flexibility, or when our
    framework code needs to act on this kind of data, without the added benefit of
    being able to understand human thinking. At such times, it would be great to have
    some way to allow us to describe aspects of a class, from within the class.


    If you have used any programming language, you are undoubtedly familiar with the
    concept of comments.


    They are there to help developers make notes that will only be visible to other
    developers with access to the source code. One of the standard formats in which
    comments can be written is the Doc Comments format. The Doc Comments variant specific
    to PHP is called PHPDocs. Doc Comments look similar to normal multiline comments,
    but start with /** (as opposed to /*). PHP also has built-in classes that allow
    us to inspect these kinds of comments, which will allow us to provide the configuration
    metadata we are after. Consider the examples shown in Listing 2-9.


    ***Listing 2-9.*** Examples of Doc Comments


    class Controller


    {


    /**


    * @readwrite


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ FOUNDATION


    */


    protected $_view;


    /**


    * @once


    */


    public function authenticate()


    {


    // …authenticate the current user


    }


    }


    Perhaps we could want to enforce read-only/write-only/read-write behavior on class
    properties. The $_view property is protected, so it is not accessible outside
    the class, but imagine we have getters/setters for our class’s protected properties.
    We could, in those getters/setters, read the Doc Comments of our protected properties
    and enforce behavior based on them.


    Perhaps we could want to make sure a method is executed only once. Other methods
    in our class could read the Doc Comments and ensure they do not call the authenticate()
    method if it has already been called.'
  trans: "\n# 我们的目标之一是合理的配置\n\n我们的目标之一是合理的配置。另一个目标是构建一个抽象的底层平台，使其能够服务于多种不同类型的服务/实现。某些实现自然需要一种指定配置数据的方式。提供这种配置最简单的方法是通过一个配置文件解析器。\n\
    \n我们将在后续章节中构建这样一个解析器，但在此之前，如何配置所有代码？对于那些无法合理存储在单独文件中的配置细节，又该如何处理？为了说明这一点，让我们看看清单\
    \ 2-8 中的示例。\n\n## 清单 2-8. 狗窝\n\n```\nclass Dog\n{\n    public $doghouse;\n\n \
    \   public function goSleep()\n    {\n        $location = $this->doghouse->location;\n\
    \        $smell = $this->doghouse->smell;\n        echo \"狗窝位于{$location}，气味{$smell}。\"\
    ;\n    }\n}\n\nclass Doghouse\n{\n    public $location;\n    public $smell;\n\
    }\n\n$doghouse = new Doghouse();\n$doghouse->location = \"后院\";\n$doghouse->smell\
    \ = \"难闻\";\n$dog = new Dog();\n$dog->doghouse = $doghouse;\n$dog->goSleep();\n\
    ```\n\n如果`$location`和`$smell`属性只在同一上下文中使用，那么我们的类就不需要我们所讨论的这些配置。反之，如果这些属性可以根据实现的不同而有不同含义，我们就需要一种方法来定义这种备选上下文。\n\
    \n例如，假设我们想创建一个`Doghouse`子类，其中`$location`可以被定义为`Dog`睡觉的`Doghouse`内部位置；或者假设我们想将`$smell`定义为`Dog`在`Doghouse`内能闻到的气味百分比。\n\
    \n在这些情况下，我们总是可以向`Doghouse`类添加额外的属性，为初始属性提供上下文。但更多时候，开发者会让接手的同事根据变量名或注释来理解上下文。一方面，变量命名应当使其上下文和含义一目了然；另一方面，这种情况很少发生。\n\
    \n有时，我们可能仅仅需要额外的灵活性，或者我们的框架代码需要处理这类数据，却无法受益于对人类思维方式的理解。这时，如果能有一种方式允许我们在类内部描述类的某些方面，那就太好了。\n\
    \n如果你使用过任何编程语言，无疑会对注释的概念很熟悉。它们是为了帮助开发者做笔记，这些笔记只对有源代码访问权限的其他开发者可见。一种标准的注释书写格式是\
    \ Doc Comments 格式。PHP 特有的 Doc Comments 变体称为`PHPDocs`。Doc Comments 看起来类似于普通的多行注释，但以`/**`开头（而非`/*`）。PHP\
    \ 还内置了允许我们检查这类注释的类，这让我们能够提供所需的配置元数据。请参考清单 2-9 中的示例。\n\n## 清单 2-9. Doc Comments\
    \ 示例\n\n```\nclass Controller\n{\n    /**\n     * @readwrite\n     */\n    protected\
    \ $_view;\n\n    /**\n     * @once\n     */\n    public function authenticate()\n\
    \    {\n        // …认证当前用户\n    }\n}\n```\n\n也许我们想在类属性上强制实现只读/只写/读写行为。`$_view`属性是受保护的，因此无法在类外部访问，但假设我们为类的受保护属性提供了\
    \ getter/setter 方法。那么在这些 getter/setter 方法中，我们可以读取受保护属性的 Doc Comments，并据此强制执行行为。\n\
    \n也许我们想确保一个方法只执行一次。类中的其他方法可以读取 Doc Comments，并确保如果`authenticate()`方法已经被调用过，就不再调用它。\n"
- fmt: "# 排版后的文档\n\nThese are two small, but effective examples of situations that\
    \ we would require metadata for, and could provide it using Doc Comments. We will\
    \ need to write a class that allows us to inspect these Doc Comments, and return\
    \ the relevant key/value pairs for us to use elsewhere.\n\nLet us create this\
    \ class now in Listing 2-10.\n\n**Listing 2-10.** Internal Properties/Methods\
    \ of `Inspector` Class\n\n```php\nnamespace Framework\n{\n    use Framework\\\
    ArrayMethods as ArrayMethods;\n    use Framework\\StringMethods as StringMethods;\n\
    \n    class Inspector\n    {\n        protected $_class;\n\n        protected\
    \ $_meta = array(\n            \"class\" => array(),\n            \"properties\"\
    \ => array(),\n            \"methods\" => array()\n        );\n\n        protected\
    \ $_properties = array();\n        protected $_methods = array();\n\n        public\
    \ function __construct($class)\n        {\n            $this->_class = $class;\n\
    \        }\n\n        protected function _getClassComment()\n        {\n     \
    \       $reflection = new \\ReflectionClass($this->_class);\n            return\
    \ $reflection->getDocComment();\n        }\n\n        protected function _getClassProperties()\n\
    \        {\n            $reflection = new \\ReflectionClass($this->_class);\n\
    \            return $reflection->getProperties();\n        }\n\n        protected\
    \ function _getClassMethods()\n        {\n            $reflection = new \\ReflectionClass($this->_class);\n\
    \            return $reflection->getMethods();\n        }\n\n        protected\
    \ function _getPropertyComment($property)\n        {\n            $reflection\
    \ = new \\ReflectionProperty($this->_class, $property);\n            return $reflection->getDocComment();\n\
    \        }\n\n        protected function _getMethodComment($method)\n        {\n\
    \            $reflection = new \\ReflectionMethod($this->_class, $method);\n \
    \           return $reflection->getDocComment();\n        }\n    }\n}\n```\n\n\
    The first few methods of our `Inspector` class use built-in PHP reflection classes\
    \ to get the string values of Doc Comments, and to get a list of the properties\
    \ and methods of a class. If we only wanted the string values, we could make the\
    \ `_getClassComment()`, `_getPropertyComment()`, and `_getMethodComment()` methods\
    \ public.\n\nHowever, we have a much better use for these methods, as demonstrated\
    \ in Listing 2-11.\n\n**Listing 2-11.** Internal `_parse()` Method\n\n```php\n\
    namespace Framework\n{\n    use Framework\\ArrayMethods as ArrayMethods;\n   \
    \ use Framework\\StringMethods as StringMethods;\n\n    class Inspector\n    {\n\
    \        protected function _parse($comment)\n        {\n            $meta = array();\n\
    \            $pattern = \"(@[a-zA-Z]+\\s*[a-zA-Z0-9, ()_]*)\";\n            $matches\
    \ = StringMethods::match($comment, $pattern);\n\n            if ($matches != null)\n\
    \            {\n                foreach ($matches as $match)\n               \
    \ {\n                    $parts = ArrayMethods::clean(\n                     \
    \   ArrayMethods::trim(\n                            StringMethods::split($match,\
    \ \"[\\s]\", 2)\n                        )\n                    );\n\n       \
    \             $meta[$parts[0]] = true;\n\n                    if (sizeof($parts)\
    \ > 1)\n                    {\n                        $meta[$parts[0]] = ArrayMethods::clean(\n\
    \                            ArrayMethods::trim(\n                           \
    \     StringMethods::split($parts[1], \",\")\n                            )\n\
    \                        );\n                    }\n                }\n      \
    \      }\n\n            return $meta;\n        }\n    }\n}\n```\n\nThe internal\
    \ `_parse()` method uses a fairly simple regular expression to match key/value\
    \ pairs within the Doc Comment string returned by any of our `_get…Meta()` methods.\
    \ It does this using the `StringMethods::match()` method. It loops through all\
    \ the matches, splitting them by key/value. If it finds no value component, it\
    \ sets the key to a value of `true`. This is useful for flag keys such as `@readwrite`\
    \ or `@once`. If it finds a value component, it splits the value by `,` and assigns\
    \ an array of value parts to the key. Finally, it returns the key/value(s) associative\
    \ array. These internal methods are used by the public methods shown in Listing\
    \ 2-12, which will be used to return the parsed Doc Comment string data.\n\n**Listing\
    \ 2-12.** Public Methods\n\n```php\nnamespace Framework\n{\n    use Framework\\\
    ArrayMethods as ArrayMethods;\n    use Framework\\StringMethods as StringMethods;\n\
    \n    class Inspector\n    {\n        public function getClassMeta()\n       \
    \ {\n            if (!isset($_meta[\"class\"]))\n            {\n             \
    \   $comment = $this->_getClassComment();\n\n                if (!empty($comment))\n\
    \                {\n                    $_meta[\"class\"] = $this->_parse($comment);\n\
    \                }\n                else\n                {\n                \
    \    $_meta[\"class\"] = null;\n                }\n            }\n\n         \
    \   return $_meta[\"class\"];\n        }\n\n        public function getClassProperties()\n\
    \        {\n            if (!isset($_properties))\n            {\n           \
    \     $properties = $this->_getClassProperties();\n\n                foreach ($properties\
    \ as $property)\n                {\n                    $_properties[] = $property->getName();\n\
    \                }\n            }\n\n            return $_properties;\n      \
    \  }\n\n        public function getClassMethods()\n        {\n            if (!isset($_methods))\n\
    \            {\n                // Method body continues...\n            }\n \
    \       }\n    }\n}\n```"
