    # 特质


    特质是一组可以插入到类中的方法。它于 PHP 5.4 引入，旨在实现更高的代码复用性，同时避免多重继承带来的复杂性。特质使用 `trait` 关键字定义，后跟名称和代码块。其命名规范与类相同，每个单词首字母大写。代码块只能包含静态方法和实例方法。


    ```

    trait PrintFunctionality

    {

    public function myPrint() { echo ''Hello''; }

    }

    ```


    需要特质功能的类可以通过 `use` 关键字引入该特质，后跟特质名称。特质中的方法随后会像直接定义在该类中一样工作。


    ```

    class MyClass

    {

    // 插入特质方法

    use PrintFunctionality;

    }

    $o = new MyClass();

    $o->myPrint(); // 输出 "Hello"

    ```


    一个类可以使用多个特质，只需将它们放在逗号分隔的列表中。同样地，一个特质也可以由一个或多个其他特质组合而成。


    ## 继承与特质


    特质方法会覆盖继承的方法。同样，类中定义的方法会覆盖由特质插入的方法。


    ```

    class MyParent

    {

    public function myPrint() { echo ''Base''; }

    }

    class MyChild extends MyParent

    {

    // 覆盖继承的方法

    use PrintFunctionality;

    // 覆盖特质插入的方法

    public function myPrint() { echo ''Child''; }

    }

    $o = new MyChild();

    $o->myPrint(); // 输出 "Child"

    ```


    ## 特质使用指南


    单继承有时会迫使开发者在代码复用和概念清晰的类层次结构之间做出选择。为了获得更高的代码复用性，方法可以移动到类层次结构的根部，但这会导致类开始包含它们不需要的方法，从而降低代码的可理解性和可维护性。另一方面，强制保持类层次结构的清晰性往往会导致代码重复，这可能引发不一致性。特质提供了一种避免单继承这一缺陷的方法，它能实现独立于类层次结构的代码复用。


    # 导入文件


    相同的代码通常需要在多个页面中调用。这可以通过将代码放在一个单独的文件中，然后使用 `include` 语句包含该文件来实现。该语句会获取指定文件中的所有文本，并将其包含到脚本中，就像代码被复制到该位置一样。与
    `echo` 类似，`include` 是一种特殊的语言结构，而非函数，因此不应使用括号。


    当包含一个文件时，解析模式会在目标文件的起始处切换到 HTML 模式，并在文件末尾恢复为 PHP 模式。因此，被包含文件中需要作为 PHP 代码执行的任何代码都必须包含在
    PHP 标签内。


    ## 包含路径


    `include` 文件可以通过相对路径、绝对路径或不带路径的方式指定。相对文件路径是相对于导入文件所在的目录。绝对文件路径则包含完整的文件路径。


    ```

    // 相对路径

    include ''myfolder\myfile.php'';

    // 绝对路径

    include ''C:\xampp\htdocs\myfile.php'';

    ```


    当指定了相对路径或未指定路径时，`include` 会首先在当前工作目录中搜索文件，当前工作目录默认为导入脚本所在的目录。如果文件未找到，`include`
    会在失败前检查 `php.ini` 中 `include_path` 指令 ¹ 指定的文件夹。


    ```

    // 无路径

    include ''myfile.php'';

    ```


    除了 `include`，还有三种其他语言结构可用于将一个文件的内容导入另一个文件：`require`、`include_once` 和 `require_once`。


    ## Require


    `require` 结构包含并评估指定文件。它与 `include` 相同，区别在于处理失败的方式。当文件导入失败时，`require` 会以错误方式终止脚本；而
    `include` 仅发出警告。导入失败可能是因为文件未找到，或者运行 Web 服务器的用户没有该文件的读取权限。


    ```

    require ''myfile.php''; // 出错时终止

    ```


    通常，对于任何复杂的 PHP 应用或 CMS 站点，最好使用 `require`。这样，当关键文件缺失时，应用程序不会尝试运行。对于不太关键的代码段和简单的
    PHP 网站，`include` 可能就足够了，在这种情况下，即使包含的文件缺失，PHP 仍会显示输出。


    ## Include_once


    `include_once` 语句的行为类似于 `include`，但如果指定文件已经被包含过，则不会再次包含。


    ```

    include_once ''myfile.php''; // 仅包含一次

    ```


    ## Require_once


    `require_once` 语句与 `require` 类似，但如果文件已经被导入，则不会再次导入。


    ```

    require_once ''myfile.php''; // 仅要求一次

    ```


    在脚本的特定执行过程中，如果同一文件可能被导入多次，可以使用 `include_once` 和 `require_once` 语句替代 `include`
    和 `require`。例如，这可以避免由函数和类重复定义引起的错误。


    ## Return


    可以在已导入的文件中执行 `return` 语句。这会停止执行并返回到调用文件导入的脚本。


    如果指定了返回值，导入语句会像普通函数一样，计算得出该值。


    ## 自动加载


    对于大型 Web 应用，每个脚本中所需的包含文件数量可能相当可观。可以通过定义 `__autoload` 函数来避免这种情况。当使用未定义的类或接口时，该函数会自动被调用，以尝试加载该定义。它接受一个参数，即
    PHP 正在查找的类或接口的名称。


    ```

    function __autoload($class_name)

    {

    include $class_name . ''.php'';

    }

    // 尝试自动包含 MyClass.php

    $obj = new MyClass();

    ```


    编写面向对象应用时，一个好的编码实践是每个类定义对应一个源文件，并根据类名命名文件。遵循此约定，只要文件与需要它的脚本文件位于同一文件夹，`__autoload`
    函数就能加载该类。


    如果文件位于子文件夹中，类名可以包含下划线字符来表示。然后需要在 `__autoload` 函数中将下划线字符转换为目录分隔符。


    ## 脚注


    [`http://www.php.net/manual/en/ini.core.php#ini.include-path`](http://www.php.net/manual/en/ini.core.php#ini.include-path)


    # 类型声明


    类型声明允许函数声明其参数和返回值的预期类型。这使得 PHP 引擎能够强制使用指定的类型。


    ## 参数类型声明


    早期的 PHP 版本完全依赖函数的正确文档，让开发者了解函数接受哪些参数。为了实现更健壮的函数，PHP 5 开始引入参数类型声明，允许指定函数参数的类型。类型声明的有效类型如表
    18-1 所示，同时列出了这些类型被添加的 PHP 版本。


    **表 18-1.** 类型声明


    | 名称 | 描述 | 版本 |

    | --- | --- | --- |

    | 类名 | 参数必须是该类的对象或其子类。 | PHP 5.0 |

    | 接口名 | 参数必须是实现该接口的对象。 | PHP 5.0 |

    | `array` | 参数必须是数组。 | PHP 5.1 |

    | `callable` | 参数必须可作为函数调用。 | PHP 5.4 |

    | `bool` | 参数必须是布尔值。 | PHP 7.0 |

    '
- fmt: "# 类型声明\n\n- `float`  \n  参数必须是浮点数。  \n  *PHP 7.0*\n\n- `int`  \n  参数必须是整数。\
    \  \n  *PHP 7.0*\n\n- `string`  \n  参数必须是字符串。  \n  *PHP 7.0*\n\n类型声明通过在函数签名中为参数添加类型前缀来设置。以下是使用\
    \ PHP 5.1 引入的`array`伪类型的示例：\n\n```php\nfunction myPrint(array $a)\n{\n    foreach\
    \ ($a as $v) { echo $v; }\n}\nmyPrint( array(1,2,3) ); // \"123\"\n```\n\n不满足类型提示会导致致命错误。这为开发者提供了一种快速检测使用无效参数的方法。\n\
    \n```php\nmyPrint('Test'); // error\n```\n\n`callable`伪类型是在 PHP 5.4 中添加的。使用此类型提示时，参数必须是可调用的函数、方法或对象。诸如`echo`之类的语言结构是不允许的，但可以使用匿名函数，如下例所示：\n\
    \n```php\nfunction myCall(callable $callback, $data)\n{\n    $callback($data);\n\
    }\n$say = function($s) { echo $s; };\nmyCall( $say, 'Hi' ); // \"Hi\";\n```\n\n\
    要将方法作为`callback`函数传递，对象和方法名称需要作为一个数组组合在一起。\n\n```php\nclass MyClass {\n    function\
    \ myCallback($s) {\n        echo $s;\n    }\n}\n$o = new MyClass();\nmyCall( array($o,\
    \ 'myCallback'), 'Hi' ); // \"Hi\"\n```\n\n包括`bool`、`int`、`float`和`string`在内的标量类型的类型声明是在\
    \ PHP 7 中添加的。以下是使用`bool`类型的简单示例：\n\n```php\nfunction isTrue(bool $b)\n{\n    return\
    \ ($b === true);\n}\necho isTrue(true);  // \"1\"\necho isTrue(false); // \"\"\
    \n```\n\n对于依赖特定类型参数的函数来说，使用类型声明是一个好主意。这样，如果此函数被错误地传递了不正确类型的参数，它会立即触发错误。如果没有类型声明，函数可能会静默失败，从而使得错误更难被发现。\n\
    \n# 返回类型声明\n\nPHP 7 中添加了对返回类型声明的支持，作为防止意外返回值的一种方式。返回类型在参数列表之后声明。允许的类型与参数类型声明相同。\n\
    \n```php\nfunction f(): array {\n    return [];\n}\n```\n\n当与接口一起使用时，类型声明强制实现类匹配相同的类型声明。\n\
    \n```php\ninterface I {\n    static function myArray(array $a): array;\n}\nclass\
    \ C implements I {\n    static function myArray(array $a): array {\n        return\
    \ $a;\n    }\n}\n```\n\n# 严格类型\n\nPHP 的默认行为是尝试将不正确的标量值转换为预期的类型。例如，期望字符串的函数仍然可以使用整数参数调用，因为整数可以转换为字符串。\n\
    \n```php\nfunction showString(string $s) {\n    echo $s;\n}\nshowString(5); //\
    \ \"5\"\n```\n\n通过在特定源文件中将以下声明作为该文件的第一条语句，可以启用强类型检查。\n\n```php\ndeclare(strict_types=1);\n\
    ```\n\n这会影响标量类型的参数和返回类型声明，这些声明必须与函数中声明的确切类型一致。\n\n```php\nshowString(5); // Fatal\
    \ error: Uncaught TypeError\n```\n\n# 19. 类型转换\n\nPHP 会根据使用上下文自动转换变量的数据类型。因此，通常不需要显式类型转换。尽管如此，可以通过执行显式类型转换来更改变量或表达式的类型。\n\
    \n## 显式转换\n\n显式转换通过在要计算的变量或值之前将所需的数据类型放在括号中来执行。在以下示例中，显式转换强制将`bool`变量作为`int`进行评估。\n\
    \n```php\n$myBool = false;\n$myInt = (int)$myBool; // 0\n```\n\n当`bool`变量作为输出发送到页面时，可以看到显式转换的一种用途。由于自动类型转换，`false`值会变成空字符串；因此它不会被显示。通过首先将其转换为整数，`false`值会显示为`0`。"
  raw: "`float`\n |\n  Argument must be a floating-point number.\n |\n  PHP 7.0\n\
    \ |\n\n`int`\n |\n  Argument must be an integer.\n |\n  PHP 7.0\n |\n\n`string`\n\
    \ |\n  Argument must be a string.\n |\n  PHP 7.0\n |\n\nA type declaration is\
    \ set by prefixing the parameter with the type in\nthe function signature. The\
    \ following is an example using the `array` pseudo type\nintroduced in PHP 5.1.\n\
    \n```\nfunction myPrint(array $a)\n{\nforeach ($a as $v) { echo $v; }\n}\nmyPrint(\
    \ array(1,2,3) ); // \"123\"\n```\n\nFailing to satisfy the type hint results\
    \ in a fatal error. This gives a\nquick way for the developer to detect when an\
    \ invalid argument is used.\n\n```\nmyPrint('Test'); // error\n```\n\nThe `callable`\n\
    pseudo type was added in PHP 5.4\\. With this type hint in place, the\nargument\
    \ must be a callable function, method, or object. Language\nconstructs such as\
    \ `echo` are not allowed,\nbut anonymous functions may be used, as in the following\
    \ example.\n\n```\nfunction myCall(callable $callback, $data)\n{\n$callback($data);\n\
    }\n$say = function($s) { echo $s; };\nmyCall( $say, 'Hi' ); // \"Hi\";\n```\n\n\
    To pass a method as a `callback` function,\nboth the object and the method name\
    \ need to be grouped together as an\narray.\n\n```\nclass MyClass {\nfunction\
    \ myCallback($s) {\necho $s;\n}\n}\n$o = new MyClass();\nmyCall( array($o, 'myCallback'),\
    \ 'Hi' ); // \"Hi\"\n```\n\nType declarations for scalar types—including bool,\
    \ int, float, and\nstring—were added in PHP 7\\. The following is a simple example\
    \ using the\nbool type.\n\n```\nfunction isTrue(bool $b)\n{\nreturn ($b === true);\n\
    }\necho isTrue(true);  // \"1\"\necho isTrue(false); // \"\"\n```\n\nIt is a good\
    \ idea to use type declarations for functions that rely on an\nargument being\
    \ of a specific type. That way, if this function is\nmistakenly passed an argument\
    \ of the incorrect type, it immediately\ntriggers an error. Without a type declaration,\
    \ the function may fail\nsilently, making the error that much more difficult to\
    \ detect.\n\nReturn Type Declarations\n\nSupport for return type declarations\
    \ was added in PHP 7 as a way to\nprevent unintended return values. The return\
    \ type is declared after the\nparameter list. The same types are allowed as for\
    \ argument type\ndeclarations.\n\n```\nfunction f(): array {\nreturn [];\n}\n\
    ```\n\nWhen used with an interface, type declarations force implementing\nclasses\
    \ to match the same type declarations.\n\n```\ninterface I {\nstatic function\
    \ myArray(array $a): array;\n}\nclass C implements I {\nstatic function myArray(array\
    \ $a): array {\nreturn $a;\n}\n}\n```\n\nStrict Typing\n\nThe default behavior\
    \ in PHP is to attempt to convert scalar values of\nincorrect type into the expected\
    \ type. For instance, a function\nexpecting a string can still be called with\
    \ an integer argument, because\nan integer can be converted into a string.\n\n\
    ```\nfunction showString(string $s) {\necho $s;\n}\nshowString(5); // \"5\"\n\
    ```\n\nStrong type checking can be enabled in a specific source file by placing\n\
    the following declaration as the first statement in that file.\n\n```\ndeclare(strict_types=1);\n\
    ```\n\nThis affects both argument and return type declarations of scalar type,\n\
    which must then be of the exact type declared in the function.\n\n```\nshowString(5);\
    \ // Fatal error: Uncaught TypeError\n```\n\n19. Type Conversions\n\nPHP automatically\
    \ converts a variable’s data type as necessary, given\nthe context in which it\
    \ is used. For this reason, explicit type\nconversions are seldom required. Nonetheless,\
    \ the type of a variable or\nexpression may be changed by performing an explicit\
    \ type cast.\n\nExplicit Casts\n\nAn explicit cast is performed by placing the\
    \ desired data type in\nparentheses before the variable or value that is to be\
    \ evaluated. In the\nfollowing example, the explicit cast forces the bool variable\
    \ to be\nevaluated as an int.\n\n```\n$myBool = false;\n$myInt = (int)$myBool;\
    \ // 0\n```\n\nOne use for explicit casts can be seen when the bool variable is\
    \ sent as\noutput to the page. Due to automatic type conversions, the `false`\
    \ value becomes\nan empty string; therefore, it is not displayed. By first converting\
    \ it\nto an integer, the `false` value shows up\nas `0` instead."
