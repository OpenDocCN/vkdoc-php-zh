    set the valid headers, assuming the response is a HTML document, but in other
    cases it might be necessary to overwrite these headers or add additional information.
    For the request it might be necessary to validate a header in order to proceed.


    Solution


    The default header (for Content-Type) that is sent with a PHP response is configured
    in php.ini, with the setting called default_mimetype, and is set to text/html.
    In addition there is also a setting called default_


    characterset and it defaults to UTF-8\. Older versions of PHP used ISO-8889-1
    as the default character set. If you want to add or overwrite any of the headers
    you use the header() function. Each header is a key value pair with a name of
    the header followed by a colon (:) and then the value. Setting the Content-Type
    header looks like this:


    header("Content-Type: text/html");


    © Frank M. Kromann 2016


    F.M. Kromann, *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_12


    CHAPTER 12 ■ WEB FUNDAMENTALS


    There are a couple of ways to get the request headers. With a standard configuration
    the headers end up in the super global called $_SERVER and the keys are prefixed
    with HTTP_. In addition to the request headers the $_SERVER variable also contains
