    \  3.  423\n    4.  .002\n\n17. Protecting an object's data from code outside\
    \ the class is called what?\n    1.  Inheritance\n    2.  Encapsulation\n    3.\
    \  Classification\n    4.  Blocking\n\n18. Which kind of methods are easier to\
    \ code than `set` methods and are known as read-only methods since they do not\
    \ change any property values?\n    1.  `explode` methods\n    2.  `get` methods\n\
    \    3.  `constructor` methods\n    4.  `match` methods\n\n19. Why would you include\
    \ objects in your program?\n    1.  To make notes in your code\n    2.  To make\
    \ mini mobile programs\n    3.  To make your code more complex\n    4.  To protect\
    \ your code from direct access\n\n20. How do you call a function named `myFunction`?\n\
