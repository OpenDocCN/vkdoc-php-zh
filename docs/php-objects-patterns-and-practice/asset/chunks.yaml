    // listing 13.44

    abstract class SelectionFactory

    {

    abstract public function newSelection(IdentityObject $obj): array;

    public function buildWhere(IdentityObject $obj): array

    {

    if ($obj->isVoid()) {

    return ["", []];

    }

    $compstrings = [];

    $values = [];

    foreach ($obj->getComps() as $comp) {

    $compstrings[] = "{$comp[''name'']} {$comp[''operator'']} ?";

    $values[] = $comp[''value''];

    }

    $where = "WHERE " . implode(" AND ", $compstrings);

    return [$where, $values];

    }

    }

    ```


    Once again, this class defines the public interface in the form of an abstract
    class. `newSelection()` expects an `IdentityObject`. Also requiring an `IdentityObject`,
    but local to the type, is the utility method, `buildWhere()`. This uses the `IdentityObject::getComps()`
    method to acquire the information necessary to build a `WHERE` clause, as well
    as to construct a list of values, both of which it returns in a two element array.


    Here is a concrete `SelectionFactory` class:


    ```

    // listing 13.45

    class VenueSelectionFactory extends SelectionFactory

    {

    public function newSelection(IdentityObject $obj): array

    {

    $fields = implode('','', $obj->getObjectFields());

    $core = "SELECT $fields FROM venue";

    list($where, $values) = $this->buildWhere($obj);

    return [$core . " " . $where, $values];

    }

    }

    ```


    This builds the core of the SQL statement and then calls `buildWhere()` to add
    the conditional clause. In fact, the only thing that differs from one concrete
    `SelectionFactory` to another in my test code is the name of the table. If I don’t
    find that I require unique specializations soon, I will refactor these subclasses
    out of existence and use a single concrete `SelectionFactory`. This would query
    the table name from the `PersistenceFactory`.


    Again, here is some client code:


    ```

    // listing 13.46

    $vio = new VenueIdentityObject();

    $vio->field("name")->eq("The Happy Hairband");

    $vsf = new VenueSelectionFactory();

    print_r($vsf->newSelection($vio));

    Array

    (

    [0] => SELECT name,id FROM venue WHERE name = ?

    [1] => Array

    (

    [0] => The Happy Hairband

    )

    )

    ```


    ### Consequences


    The use of a generic identity object implementation makes it easier to use a single
    parameterized `SelectionFactory` class. If you opt for hard-coded identity objects—that
    is, identity objects which consist of a list of getter and setter methods—you
    are more likely to have to build an individual `SelectionFactory` per domain object.


    One of the great benefits of query factories combined with identity objects is
    the range of queries you can generate. This can also cause caching headaches.
    These methods generate queries on the fly, and it’s difficult to know when you’re
    duplicating effort. It may be worth building a means of comparing identity objects,
    so that you can return a cached string without all that work. A similar kind of
    database statement pooling might be considered at a higher level, too.


    Another issue with the combination of patterns I have presented in the latter
    part of this chapter is the fact that they’re flexible, but they’re not that flexible.
    By this, I mean they are designed to be extremely adaptable within limits. There
    is not much room for exceptional cases here, though. `Mapper` classes, while more
    cumbersome to create and maintain, are very accommodating of any kind of performance
    kludge or data juggling you might need to perform behind their clean APIs. These
    more elegant patterns suffer from the problem that, with their focused responsibilities
    and emphasis on composition, it can be hard to cut across the cleverness and do
    something dumb but powerful.


    Luckily, I have not lost my higher level interface—there’s still a controller
    level where I can head cleverness off at the pass if necessary.


    ## What’s Left of Data Mapper Now?


    So, I have stripped object, query, and collection generation from `Data Mapper`,
    to say nothing of the management of conditionals. What could possibly be left
    of it? Well, something that is very much like a mapper is needed in vestigial
    form. I still need an object that sits above the others I have created and coordinates
    their activities. It can help with caching duties and handle database connectivity
    (although the database-facing work could be delegated still further). Clifton
    Nock calls these data layer controllers domain object assemblers.


    Here is an example:


    ```

    // listing 13.47

    class DomainObjectAssembler

    {

    protected $pdo = null;

    public function __construct(PersistenceFactory $factory)

    {

    $this->factory = $factory;

    $reg = Registry::instance();

    $this->pdo = $reg->getPdo();

    }

    public function getStatement(string $str): \PDOStatement

    {

    if (! isset($this->statements[$str])) {

    $this->statements[$str] = $this->pdo->prepare($str);

    }

    return $this->statements[$str];

    }

    public function findOne(IdentityObject $idobj): DomainObject

    {

    $collection = $this->find($idobj);

    return $collection->next();

    }

    public function find(IdentityObject $idobj): Collection

    {

    $selfact = $this->factory->getSelectionFactory();

    list ($selection, $values) = $selfact->newSelection($idobj);

    $stmt = $this->getStatement($selection);

    $stmt->execute($values);

    $raw = $stmt->fetchAll();

    return $this->factory->getCollection($raw);

    }

    public function insert(DomainObject $obj)

    {

    $upfact = $this->factory->getUpdateFactory();

    list($update, $values) = $upfact->newUpdate($obj);

    $stmt = $this->getStatement($update);

    $stmt->execute($values);

    if ($obj->getId() setId((int)$this->pdo->lastInsertId());

    }

    $obj->markClean();

    }

    }

    ```


    As you can see, this is not an abstract class. Instead of itself breaking down
    into specializations, it uses the `PersistenceFactory` to ensure that it gets
    the correct components for the current domain object.


    Figure 13-10 shows the high-level participants I built up as I factored out `Mapper`.


    ![A314621_5_En_13_Fig10_HTML.gif](A314621_5_En_13_Fig10_HTML.gif)


    Figure 13-10. Some of the persistence classes developed in this chapter


    Aside from making the database connection and performing queries, the class manages
    `SelectionFactory` and `UpdateFactory` objects. In the case of selections, it
    also works either with a `Collection` class to generate return values.


    From a client’s point of view, creating a `DomainObjectAssembler` is easy. It’s
    simply a matter of getting the correct concrete `PersistenceFactory` object and
    passing it to the constructor:


    ```

    // listing 13.48

    $factory = PersistenceFactory::getFactory(Venue::class);

    $finder = new DomainObjectAssembler($factory);

    ```


    Of course, “client” here is unlikely to mean the end client. We can insulate higher
    level classes from even this complexity by adding a `getFinder()` method to the
    `PersistenceFactory` itself and transforming the previous example into a one-liner,
    like this:


    ```

    $finder = PersistenceFactory::getFinder(Venue::class);

    ```


    I’ll leave that to you, however.


    A client coder might then go on to acquire a collection of `Venue` objects:


    ```

    // listing 13.49

    $idobj = $factory->getIdentityObject()

    ->field(''name'')

    ->eq(''The Eyeball Inn'');

    $collection = $finder->find($idobj);

    foreach ($collection as $venue) {

    print $venue->getName()."\n";

    }

    ```'
