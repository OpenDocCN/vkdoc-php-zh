  trans: '

    # 第 12 章


    第 12 章包含了在实际应用中使用 PHP 程序的示例。本章讨论了几个主题，让读者了解 PHP 代码在创建 Web 文档中所扮演的角色。


    为方便阅读，每章末尾都附有摘要，列出该章讨论的所有要点。


    **注意**


    本书主要面向编程经验有限的读者，因此内容力求简明易懂。


    **致谢**


    致我亲爱的孩子 Anastasia 和 Bohdan，以及我的所有家人。感谢你们的支持和爱。你们赋予我生命的意义，并激励我不断前行。


    我衷心感谢出色且专业的 Apress 团队，在整个成书过程中，他们提供了卓越的支持和奉献。他们的共同努力无疑在提升本书质量方面发挥了关键作用。


    **关于作者** **关于技术审稿人**


    # 1. 第一个程序


    > *——我要求恢复地球的臭氧层。*

    >

    > *——阿尔夫，我们周六之前完不成。*

    >

    > ——*《天才老爹》*（电视剧）


    在本章中，你将创建第一个 PHP 程序。具体来说，你将分析一些简单的代码，并确定如何执行这些代码。本章涉及的编程内容不多，但许多信息对使用 PHP 至关重要。


    ## 程序代码


    PHP 程序是一组由解释器执行的指令。这些指令必须经过适当格式化，并传递给解释器执行。相关计划主要围绕解决以下两个任务展开。


    - 编写程序代码

    - 启动程序执行


    第二个任务比第一个任务复杂得多。


    那么，让我们创建你的第一个 PHP 程序。具体来说，我们先明确程序要做什么。按照惯例，第一个程序通常显示一条消息。我们也这样做。你的程序将在输出窗口（终端）中显示一条欢迎消息。程序如清单
    1-1 所示。


    ```

    清单 1-1

    第一个程序

    ```


    程序以`<?php`语句开始，以`?>`语句结束。这是所有 PHP 程序的标准格式。要执行的命令放在这两个指令之间。在本例中，只有一个命令。它调用了内置函数`print()`，并将`"Hello,
    PHP!"`作为参数传递。


    | 详细信息 |

    | --- |

    | 函数是一个命名的代码块（命令块），可以通过调用函数（必要时指定函数名及其参数）来执行。函数可以在程序中创建，也可以使用内置函数。在众多内置函数中，有一个`print()`函数。文本值用双引号括起来。此外，文本值也可以用单引号括起来。这两种风格几乎等价，但存在一些重要区别，稍后会讨论。另外值得注意的是，PHP
    中的每条命令都以分号结尾。 |


    ![](img/613529_1_En_1_Figa_HTML.jpg)信息图标。


    **注意**


    坦率地说，`print()`并非严格意义上的函数，而是 PHP 语言的一种特殊语法结构。但由于其属性与函数相似，我们将其视为函数。在所有类似情况下，我们都采用同样的处理方式。


    正如你可能猜到的，该命令在终端中显示一条消息。消息文本作为参数传递给`print()`函数。以下是运行程序的结果。


    ```

    程序输出（来自清单 1-1）

    Hello, PHP!

    ```


    这个程序并不复杂。剩下的问题只是弄清楚如何运行这个程序。


    | 详细信息 |

    | --- |

    | 调用`print()`函数时，可以不带括号指定参数。也就是说，可以使用`print "Hello, PHP!"`语句来代替`print("Hello,
    PHP!")`命令。`print()`函数的另一个替代方案是`echo`语句。具体来说，可以使用`echo "Hello, PHP!"`命令来显示消息。 |

