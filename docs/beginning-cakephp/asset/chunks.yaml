    \ 的名称，组件将为您删除该 cookie：  \n\n```\n$this->Cookie->del('User');\n```\n\n# 电子邮件组件\
    \  \n\n网站最常见的任务之一是向用户发送自动电子邮件。无论是电子商务网站还是用于传播信息的营销工具，自动电子邮件在网络上都有广泛的应用。但它们实现起来可能很繁琐，尤其是在使用\
    \ PHP 的 `mail()` 函数处理 HTTP 标头时。`Email` 组件提供了一种在您的 Cake 应用程序中使用布局和视图发送电子邮件的方法，而不是在脚本或控制器中编写长长的电子邮件文本字符串。\
    \  \n\n## 设置电子邮件布局  \n\n`Email` 组件区分 HTML 和纯文本电子邮件。要为每种类型创建布局，您必须在 `app/views/layouts/email`\
    \ 目录中创建文件夹。HTML 布局存储在名为 `html` 的文件夹中，纯文本布局存储在 `text` 文件夹中。  \n\n在每个文件夹中，创建一个 `default.ctp`\
    \ 文件，其中包含围绕 `$content_for_layout` 变量的必要布局标记。例如，HTML 布局可能包含以下内容：  \n\n```\n<!DOCTYPE\
    \ XHTML PUBLIC \"-//W3C//DTD XHTML 1.0 strict//EN\">\n<html>\n<body>\n<?=$content_for_layout;\
    \ ?>\n</body>\n</html>\n```\n\n纯文本布局可能只需要 `$content_for_layout` 变量本身。  \n\n##\
    \ 发送电子邮件  \n\n在发送电子邮件的控制器操作中，为 `Email` 组件提供一些设置，然后运行 `send()` 函数来发送电子邮件。可用的设置包括：\
    \  \n\n-   `$to`  \n-   `$cc`  \n-   `$bcc`  \n-   `$replyTo`  \n-   `$from` \
    \ \n-   `$sendAs`  \n-   `$subject`  \n\n您会注意到，这些参数不言自明，对应于典型的电子邮件设置。`$sendAs`\
    \ 设置告诉 `Email` 组件如何发送电子邮件，可以是 `html` 或 `text`。  \n\n假设您想在某个控制器的 `email()` 操作中发送一条基本消息。它可能如下所示：\
    \  \n\n```\nfunction email() {\n    $this->Email->to = 'foo@bar.com';\n    $this->Email->cc\
    \ = 'another@email.com';\n    $this->Email->replyTo = 'me@sender.com';\n    $this->Email->from\
    \ = 'do-not-reply@domain.com';\n    $this->Email->subject = 'Basic Email Greeting';\n\
    \    $this->Email->send('Glad to see you');\n}\n```\n\n在 `send()` 函数中传递的文本是要发送的电子邮件的正文。\
    \  \n\n## 使用电子邮件消息模板  \n\n创建电子邮件模板并通过它发送内容，而不是在控制器中提供内容，这很简单。制作存储在带键文件夹中的元素以创建电子邮件模板。\
    \  \n\n例如，一个基本的纯文本模板将存储在 `app/views/elements/email/text/hello.ctp` 文件中，并且可能包含以下内容：\
    \  \n\n```\nHello! This message is from <?=$sender;?>.\n```\n\n然后，在 `email()`\
    \ 函数中，如果需要，您可以设置 `$sender` 变量：  \n\n```\nfunction email() {\n    $this->Email->to\
    \ = 'foo@bar.com';\n    $this->Email->cc = 'another@email.com';\n    $this->Email->replyTo\
    \ = 'me@sender.com';\n    $this->Email->from = 'do-not-reply@domain.com';\n  \
    \  $this->Email->subject = 'Basic Email Greeting';\n    $this->set('sender','Me,\
    \ Myself, and I');\n    $this->Email->template = 'hello';\n    $this->Email->send();\n\
    }\n```\n\n请注意，通过使用 `set()` 函数，您可以向模板文件中的 `$sender` 变量传递一个值。您还告诉了 `Email` 组件在发送消息时要使用哪个模板；在这种情况下，您需要将模板文件命名为\
    \ `hello.ctp`。  \n\nHTML 模板可以像 Cake 中的其他视图一样工作，并且可以引用网站上存储的图像；请记住对任何图形使用绝对 URL，因为用户的电子邮件客户端在打开电子邮件时将无法获取相对路径。\
    \  \n\n# 其他组件  \n\nCake 的内置组件无疑减少了运行常见 Web 应用程序方法所需的代码量。它不仅包括前面讨论的组件，还包括其他更高级的组件：ACL（代表“访问控制列表”）、`RequestHandler`\
    \ 和 `Security` 组件。  \n\n## ACL 组件  \n\n构建 Web 应用程序最复杂的方法之一是对多用户进行访问控制。`Auth` 组件负责处理简单的身份验证，但如果您想为用户及其访问级别设置多个层级呢？或者，更好的是，动态更改用户在整个站点中的权限呢？这种更复杂的为分配用户区域系统需要访问控制列表，该列表概述了谁有权访问站点中哪些区域的树或矩阵。`ACL`\
    \ 组件通过一系列函数和方法简化了这种类型的用户管理。  \n\n## RequestHandler 组件  \n\n该组件有助于管理 HTTP 请求和获取更多客户端信息。诸如\
    \ SSL 检测、读取 HTTP 请求的类型以及使用唯一的 MIME 类型进行响应等功能，使 `RequestHandler` 拥有强大的能力，能让您的 Web\
    \ 应用程序对多种类型的用户可访问。例如，可以使用 `RequestHandler` 管理 Web 服务，这允许其他 Web 站点访问信息并与您的应用程序通信。`RequestHandler`\
    \ 还可以将信息输出为 `text/html` 之外的 MIME 类型，这使您的应用程序甚至可以在非浏览器的客户端应用程序中工作。  \n\n## Security\
    \ 组件  \n"
- fmt: "# Security Component\n\nThe `Security` component provides ways for tightening\
    \ up the security of the web application and avoiding vulnerabilities. Together\
    \ with the `Auth` component, `Security` can provide extra mechanisms for checking\
    \ user authentications and also display more complex error messages depending\
    \ on how the user interacts with the application. You can require that certain\
    \ actions run only under an SSL-secured request or hash strings with this component.\
    \ By sticking to secure methods for building your applications and by running\
    \ the `Security` component to protect the site, you more effectively prohibit\
    \ unwanted intrusions or other attacks.\n\n## Utility Classes\n\nAs noted earlier,\
    \ components serve a specific purpose or function that the controller may need\
    \ depending on its own actions and processes. Other class functions that are used\
    \ by the components themselves, or that are used throughout Cake’s core libraries,\
    \ perform more functions that can be used in a controller or a custom component.\
    \ These functions are housed in utility classes and are accessible anywhere in\
    \ the application through the `App::import()` function. Several built-in utility\
    \ classes are available in Cake, but it is assumed that no third-party utilities\
    \ will be distributed because these classes are contained deep inside the core\
    \ libraries and as a rule should not be manipulated for applications. To create\
    \ your own utilities, you would need to create third-party vendor files and bring\
    \ them into your application using `App::import()` as well (see Chapter 12 for\
    \ more information on what Cake’s vendors are and how to install them in your\
    \ Cake application). You would usually want to program your own utility class\
    \ only if you’re trying to incorporate third-party software into your application;\
    \ otherwise, the solution will generally be found in building one of Cake’s resource\
    \ files like a helper or component.\n\n### Configure\n\nThe `Configure` utility\
    \ is responsible for storing global variables. Such variables are generally stored\
    \ in the core configuration file and are accessible throughout the whole Cake\
    \ application.\n\n#### Reading and Writing Global Variables\n\nJust as you see\
    \ in the core configuration file, constants or global variables are set using\
    \ the `Configure::write()` function. The first parameter is the name of the variable,\
    \ and the second is the assigned value.\n\n```\nConfigure::write('Site.title','My\
    \ Favorite Web Site');\n```\n\nTo read these globals, simply use the `Configure::read()`\
    \ function like so: `$title = Configure::read('Site.title');`\n\nThe `Configure::read()`\
    \ function can be called in the controller, model, or view.\n\n### File and Folder\n\
    \nThe `File` and `Folder` utilities are especially helpful when writing and reading\
    \ files on the server or listing the file names of a folder’s contents. They can\
    \ also be used to set folder and file permissions or delete files and folders.\
    \ Unlike the `Configure` utility, the `File` and `Folder` utilities must be imported\
    \ into the controller or model where they are used with the `App::import()` function\
    \ by instantiating a new class object.\n\nFor the `File` and `Folder` utilities\
    \ to work correctly, the path to the file or folder on the server must be supplied.\
    \ As in Listing 11-10, you can perform several operations on this object, which\
    \ represents the file. Some of these operations are listed in the following sections.\n\
    \n**Listing 11-10.** *Importing a Utility and Instantiating the Class Object*\
    \ \n\n```\nApp::import('Core','File');\n$file =& new File('path/to/file');\n```\n\
    \n#### Reading Files\n\nThe `read()` function extracts the contents of the file:\n\
    \n```\n$contents = $file->read();\n```\n\n#### Creating New Files\n\nIf you instantiate\
    \ a `File` object for a file that doesn’t actually exist, you can use the `create()`\
    \ function to create a new, blank file on the server:\n\n```\n$file->create();\n\
    ```\n\n#### Writing to Files\n\nThe `write()` function writes content to a file."
