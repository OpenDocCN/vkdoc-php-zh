  raw: '### Making Decisions


    Decisions, decisions, decisions. . . Life is full of decisions. So is PHP. They
    give it the ability to display different output according to circumstances. Decision-making
    in PHP uses conditional statements. The most common of these uses `if` and closely
    follows the structure of normal language. In real life, you may be faced with
    the following decision (admittedly not very often if you live in Britain): If
    the weather’s hot, I’ll go to the beach.


    In PHP pseudo-code, the same decision looks like this:


    `if (` `the weather''s hot` `) {`


    `I''ll go to the beach` `;`


    `}`


    The condition being tested goes inside parentheses, and the resulting action goes
    between curly braces. This is the basic decision-making pattern:


    `if (` `condition is true` `) {`


    `// code to be executed if condition is true`


    `}`


    Tip


    Conditional statements are control structures and are not followed by a semicolon.
    The curly braces keep together one or more individual statements that are intended
    to be executed as a group.


    The code inside the curly braces is executed only if the condition is `true`.
    If it’s `false`, PHP ignores everything between the braces and moves on to the
    next section of code. How PHP determines whether a condition is `true` or `false`
    is described in the following section.


    Sometimes, the `if` statement is all you need, but you often want a default action
    to be invoked if the condition isn’t met. To do this, use `else`, like this:


    `if (` `condition is true` `) {`


    `// code to be executed if condition is true`


    `} else {`


    `// default code to run if condition is false`


    `}`


    If you want more alternatives, you can add more conditional statements like this:


    `if (` `condition is true` `) {`


    `// code to be executed if condition is true`


    `} else {`


    `// default code to run if condition is false`


    `}`


    `if (` `second condition is true` `) {`


    `// code to be executed if second condition is true`


    `} else {`


    `// default code to run if second condition is false`


    `}`


    In this case both conditional statements will be run. If you want only one code
    block to be executed, use `elseif` like this:


    `if (` `condition is true` `) {`


    `// code to be executed if first condition is true`


    `} elseif (` `second condition is true` `) {`


    `// code to be executed if first condition fails`


    `// but second condition is true`


    `} else {`


    `// default code if both conditions are false`


    `}`


    You can use as many `elseif` clauses in a conditional statement as you like. Only
    the first condition that equates to true will be executed; all others will be
    ignored, even if they’re also true. This means you need to build conditional statements
    in the order of priority that you want them to be evaluated. It’s strictly a first-come,
    first-served hierarchy.


    Note


    Although `elseif` is normally written as one word, you can use `else if` as separate
    words.


    An alternative decision-making structure, the `switch` statement, is described
    in the second half of this chapter.


    ### Making Comparisons


    Conditional statements are interested in only one thing: whether the condition
    being tested equates to `true`. If it’s not `true`, it must be `false`. There’s
    no room for half-measures or maybes. Conditions often depend on the comparison
    of two values. Is this bigger than that? Are they both the same? And so on.


    To test for equality, PHP uses two equal signs (`==`), like this:


    `if ($status == ''administrator'') {`


    `// send to admin page`


    `} else {`


    `// refuse entry to admin area`


    `}`


    Caution


    Don’t use a single equal sign in the first line (`$status = ''administrator''`).
    Doing so opens the admin area of your website to everyone. Why? Because this automatically
    sets the value of `$status` to `administrator`; it doesn’t compare the two values.
    To compare values, you must use two equal signs. It’s a common mistake, but one
    with potentially disastrous consequences.


    Size comparisons are performed using the mathematical symbols for less than (`<`)
    and greater than (`>`). Let’s say you’re checking the size of a file before allowing
    it to be uploaded to your server. You could set a maximum size of 50 KB like this
    (1 kilobyte = 1024 bytes):


    `if ($bytes > 51200) {`


    `// display error message and abandon upload`


    `} else {`


    `// continue upload`


    `}`


    Note


    The second half of this chapter describes how to test for multiple conditions
    simultaneously.


    ### Using Indenting and Whitespace for Clarity


    Indenting code helps to keep statements in logical groups, making it easier to
    understand the flow of the script. There are no fixed rules; PHP ignores any whitespace
    inside code, so you can adopt any style you like. The important thing is to be
    consistent so that you can spot anything that looks out of place.


    Most people find that indenting four or five spaces makes for the most readable
    code. Perhaps the biggest difference in styles lies in the way individual developers
    arrange curly braces. I put the opening curly brace of a code block on the same
    line as the preceding code, and put the closing brace on a new line after the
    code block, like this:


    `if ($bytes > 51200) {`


    `// display error message and abandon upload`


    `} else {`


    `// continue upload`


    `}`


    However, others prefer this style:


    `if ($bytes > 51200)`


    `{`


    `// display error message and abandon` `upload`


    `}`


    `else`


    `{`


    `// continue upload`


    `}`


    The style isn’t important. What matters is that your code is consistent and easy
    to read.


    ### Using Loops for Repetitive Tasks


    Loops are huge timesavers because they perform the same task over and over again,
    yet involve very little code. They’re frequently used with arrays and database
    results. You can step through each item one at a time looking for matches or performing
    a specific task. Loops are particularly powerful in combination with conditional
    statements, allowing you to perform operations selectively on a large amount of
    data in a single sweep. Loops are best understood by working with them in a real
    situation. Details of all looping structures, together with examples, are in the
    second half of this chapter.'
  trans: "\n### 做出决策\n\n决策、决策、决策……生活中充满了决策。PHP 也是如此。它们让 PHP 能够根据不同的情况显示不同的输出。PHP 中的决策使用了条件语句。其中最常见的条件语句使用\
    \ `if`，并且其结构与日常语言非常相似。在现实生活中，你可能会遇到以下决策（诚然，如果你住在英国，这种情况并不常见）：如果天气热，我就去海滩。\n\n\
    用 PHP 伪代码表示，同样的决策是这样的：\n\n```\nif (天气热) {\n    我去海滩;\n}\n```\n\n被测试的条件放在圆括号内，执行的动作放在花括号之间。这是基本的决策模式：\n\
    \n```\nif (条件为真) {\n    // 如果条件为真，则执行此处的代码\n}\n```\n\n> **提示**  \n> 条件语句是控制结构，后面不需要跟分号。花括号将一组打算作为一个整体执行的语句聚合在一起。\n\
    \n只有当条件为 `true` 时，花括号内的代码才会被执行。如果条件为 `false`，PHP 会忽略花括号内的所有内容，并继续执行下一段代码。PHP 如何判断一个条件是\
    \ `true` 还是 `false` 将在下一节中描述。\n\n有时，`if` 语句就足够了，但你通常希望在条件不满足时执行一个默认动作。为此，可以使用\
    \ `else`，如下所示：\n\n```\nif (条件为真) {\n    // 如果条件为真，则执行此处的代码\n} else {\n    // 如果条件为假，则执行的默认代码\n\
    }\n```\n\n如果你想要更多的备选方案，可以像这样添加更多的条件语句：\n\n```\nif (条件为真) {\n    // 如果条件为真，则执行此处的代码\n\
    } else {\n    // 如果条件为假，则执行的默认代码\n}\n\nif (第二个条件为真) {\n    // 如果第二个条件为真，则执行此处的代码\n\
    } else {\n    // 如果第二个条件为假，则执行的默认代码\n}\n```\n\n在这种情况下，两个条件语句都会被执行。如果你希望只执行一个代码块，可以使用\
    \ `elseif`，如下所示：\n\n```\nif (条件为真) {\n    // 如果第一个条件为真，则执行此处的代码\n} elseif (第二个条件为真)\
    \ {\n    // 如果第一个条件为假，但第二个条件为真，则执行此处的代码\n} else {\n    // 如果两个条件都为假，则执行的默认代码\n\
    }\n```\n\n你可以在一个条件语句中使用任意多的 `elseif` 子句。只有第一个计算结果为 `true` 的条件才会被执行；其他所有条件，即使也为真，也会被忽略。这意味着你需要按照你想要评估的优先级顺序来构建条件语句。这是一个严格的“先到先得”的层次结构。\n\
    \n> **注意**  \n> 尽管 `elseif` 通常写作一个单词，你也可以将 `else if` 作为两个独立的单词使用。\n\n另一种决策结构——`switch`\
    \ 语句——将在本章的后半部分介绍。\n\n### 进行比较\n\n条件语句只关心一件事：被测试的条件是否为 `true`。如果不是 `true`，那就必须是\
    \ `false`。没有折中或“可能”的余地。条件通常依赖于两个值的比较。这个比那个大吗？它们相等吗？等等。\n\n为了测试相等性，PHP 使用两个等号（`==`），如下所示：\n\
    \n```\nif ($status == 'administrator') {\n    // 发送到管理员页面\n} else {\n    // 拒绝进入管理区域\n\
    }\n```\n\n> **警告**  \n> 不要在第一行使用单个等号（`$status = 'administrator'`）。这样做会将你网站的管理区域开放给所有人。为什么？因为这会自动将\
    \ `$status` 的值设置为 `administrator`；它不是在比较两个值。要比较值，你必须使用两个等号。这是一个常见错误，但其后果可能具有灾难性。\n\
    \n大小比较使用数学符号小于（`<`）和大于（`>`）来进行。假设你在允许文件上传到服务器之前检查文件的大小。你可以像这样设置一个 50 KB 的最大大小（1\
    \ 千字节 = 1024 字节）：\n\n```\nif ($bytes > 51200) {\n    // 显示错误消息并放弃上传\n} else {\n\
    \    // 继续上传\n}\n```\n\n> **注意**  \n> 本章后半部分将介绍如何同时测试多个条件。\n\n### 使用缩进和空白提高清晰度\n\
    \n缩进代码有助于将语句组织成逻辑组，使理解脚本的流程变得更加容易。没有固定的规则；PHP 会忽略代码内的任何空白，因此你可以采用任何你喜欢的风格。重要的是要保持一致，这样你就能发现任何看起来不对劲的地方。\n\
    \n大多数人发现缩进四到五个空格能使代码最易读。风格上最大的差异可能在于各个开发者安排花括号的方式。我将代码块的开始花括号放在与前一行代码相同的行上，并将结束花括号放在代码块之后的新行上，如下所示：\n\
    \n```\nif ($bytes > 51200) {\n    // 显示错误消息并放弃上传\n} else {\n    // 继续上传\n}\n```\n\
    \n然而，其他人更喜欢这种风格：\n\n```\nif ($bytes > 51200)\n{\n    // 显示错误消息并放弃上传\n}\nelse\n\
    {\n    // 继续上传\n}\n```\n\n风格并不重要。重要的是你的代码保持一致且易于阅读。\n\n### 使用循环处理重复性任务\n\n循环是巨大的时间节省器，因为它们一遍又一遍地执行相同的任务，但涉及的代码却非常少。它们经常与数组和数据库结果一起使用。你可以逐个遍历每个项目，寻找匹配项或执行特定任务。循环与条件语句结合使用时尤其强大，允许你一次遍历就对大量数据有选择地执行操作。最好通过在实际场景中运用循环来理解它们。所有循环结构的详细信息以及示例，请参阅本章的后半部分。\n"
- fmt: '### Using Functions for Preset Tasks


    As I mentioned earlier, functions do things...lots of things, mind-bogglingly
    so in PHP. A typical PHP setup gives you access to several thousand built-in functions.
    Don’t worry: you’ll only ever need to use a handful, but it’s reassuring to know
    that PHP is a full-featured language.


    The functions you’ll be using in this book do truly useful things, such as get
    the height and width of an image, create thumbnails from existing images, query
    a database, send email, and much, much more. You can identify functions in PHP
    code because they’re always followed by a pair of parentheses. Sometimes, the
    parentheses are empty, as in the case of `phpversion()`, which you used in `phpversion.php`
    in the previous chapter. Often, though, the parentheses contain variables, numbers,
    or strings, like this line of code from the script in Figure 3-1:


    `$thisYear = date(''Y'');`


    This code calculates the current year and stores it in the variable `$thisYear`.
    It works by feeding the string `''Y''` to the built-in PHP function `date()`.
    Placing a value between the parentheses like this is known as passing an argument
    to a function. The function takes the value in the argument and processes it to
    produce (or return) the result. For instance, if you pass the string `''M''` as
    an argument to `date()` instead of `''Y''`, it will return the current month as
    a three-letter abbreviation (e.g., Mar, Apr, May). As the following example shows,
    you capture the result of a function by assigning it to a suitably named variable:


    `$thisMonth = date(''M'');`


    **Note:** Chapter 14 covers in depth how PHP handles dates and time.


    Some functions take more than one argument. When this happens, separate the arguments
    with commas inside the parentheses, like this:


    `$mailSent = mail($to, $subject, $message);`


    It doesn’t take a genius to work out that this sends an email to the address stored
    in the first argument, with the subject line stored in the second argument, and
    the message stored in the third one. You’ll see how this function works in Chapter
    5.


    **Tip:** You’ll often come across the term “parameter” in place of “argument.”
    Technically speaking, parameter refers to a variable used in the function definition,
    while argument refers to an actual value passed to the function. In practice,
    both terms tend to be used interchangeably.


    As if all the built-in functions weren’t enough, PHP lets you build your own custom
    functions. Even if you don’t relish the idea of creating your own, throughout
    this book you’ll use some that I have made. You use them in exactly the same way.


    ### Understanding PHP Classes and Objects


    Functions and variables give PHP tremendous power and flexibility, but classes
    and objects take the language to an even higher level. Classes are the fundamental
    building blocks of object-oriented programming (OOP), an approach to programming
    that’s designed to make code reusable and easier to maintain. PHP has extensive
    support for OOP, and new features are frequently implemented in an object-oriented
    manner.


    An object is a sophisticated data type that can store and manipulate values. A
    class is the code that defines an object’s features and can be regarded as a blueprint
    for making objects. Among PHP’s many built-in classes, two of particular interest
    are the `DateTime` and `DateTimeZone` classes, which deal with dates and time
    zones. Two other built-in classes that you’ll use in this book are `MySQLi` and
    `PDO`, which are used for communicating with databases.


    To create an object, you use the `new` keyword with the class name like this:


    `$now = new DateTime();`


    This creates an instance of the `DateTime` class and stores it in a `DateTime`
    object called `$now`. What distinguishes this from the `date()` function in the
    preceding section is that a `DateTime` object is aware not only of the date and
    time it was created but also of the time zone used by the web server. The `date()`
    function, on the other hand, simply generates a number or string containing the
    date formatted according to the arguments passed to it.


    In the preceding example, no arguments were passed to the class, but classes can
    take arguments in the same way that functions do, as you’ll see in the next example.


    Most classes also have properties and methods, which are similar to variables
    and functions, except that they’re related to a particular instance of a class.
    For example, you can use the `DateTime` class’s methods to change certain values,
    such as the month, year, or time zone. A `DateTime` object is also capable of
    performing date calculations, which are much more complicated using ordinary functions.


    You access an object’s properties and methods using the `->` operator (a hyphen
    followed by a greater-than symbol). To reset the time zone of a `DateTime` object,
    pass a `DateTimeZone` object as an argument to the `setTimezone()` method like
    this:


    `$westcoast = new DateTimeZone(''America/Los_Angeles'');`


    `$now->setTimezone($westcoast);`


    This resets the date and time stored in `$now` to the current date and time in
    Los Angeles, regardless of where the web server is located, automatically making
    any adjustments for daylight saving time.


    The `DateTime` and `DateTimeZone` classes don’t have properties, but you access
    an object’s properties using the `->` operator in the same way:


    `$someObject->propertyName`


    Don’t worry if you find the concepts of objects, properties, and methods difficult
    to grasp. All you need to know is how to instantiate objects with the `new` keyword
    and how to access properties and methods with the `->` operator.


    **Tip:** For an in-depth discussion of OOP in PHP with extensive hands-on examples,
    see my book *PHP Object-Oriented Solutions* (friends of ED, 2008, ISBN: 978-1-4302-1011-5).


    ### Displaying PHP Output


    There’s not much point in all this wizardry going on behind the scenes unless
    you can display the results in your webpage. There are two ways of doing this
    in PHP: using `echo` or `print`. There are some subtle differences between the
    two, but they are so subtle you can regard `echo` and `print` as identical. I
    prefer `echo` for the simple reason that it’s one fewer letter to type.


    You can use `echo` with variables, numbers, and strings; simply put it in front
    of whatever you want to display, like this:


    `$name = ''David'';`


    `echo $name;   // displays David`


    `echo 5;       // displays 5`


    `echo ''David''; // displays David`


    When using `echo` and `print` with a variable, they work only with variables that
    contain a single value. You cannot use them to display the contents of an array
    or of a database result. This is where loops are so useful: you use `echo` or
    `print` inside the loop to display each element individually. You’ll see plenty
    of examples of this in action throughout the rest of the book.


    You may see scripts that use parentheses with `echo` and `print`, like this:


    `echo(''David''); // displays David`


    The parentheses make no difference. Unless you enjoy typing for the sake of it,
    leave them out.


    #### Using Echo Shortcut Syntax


    When you want to display the value of a single variable or expression (and nothing
    else), you can use a shortcut opening PHP tag, which consists of an opening angle
    bracket, a question mark, and the equal sign, like this:


    `<p>My name is <?= $name; ?>.</p>`


    This produces exactly the same output as this:


    `<p>My name is <?php echo $name; ?>.</p>`


    Because it’s shorthand for `echo`, no other code can be in the same PHP block,
    but it’s particularly useful when embedding database results in a webpage. It
    goes without saying that the value of the variable must be set in a previous PHP
    block before you can use this shortcut.


    **Caution:** Prior to PHP 5.4, the `echo` shortcut syntax worked only if the `short_open_tag`
    configuration setting was enabled in `php.ini`. Since PHP 5.4, `<?=` is always
    available.'
