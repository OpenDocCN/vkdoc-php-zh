    strategies for structuring classes and objects. I will focus in particular on
    the principle that composition provides greater flexibility than inheritance.
    The patterns I examine in this chapter are once again drawn from the Gang of Four
    catalog.


    This chapter will cover a trio of patterns:


    *   The Composite pattern : Composing structures in which groups of objects can
    be used as if they were individual objects

    *   The Decorator pattern : A flexible mechanism for combining objects at runtime
    to extend functionality

    *   The Facade pattern : Creating a simple interface to complex or variable systems


    ## Structuring Classes to Allow Flexible Objects


    Way back in Chapter [4](#A314621_5_En_4_Chapter.html), I said that beginners often
    confuse objects and classes. This was only half true. In fact, most of the rest
    of us occasionally scratch our heads over UML class diagrams, attempting to reconcile
    the static inheritance structures they show with the dynamic object relationships
    their objects will enter into off the page.


    Remember the pattern principle, “Favor composition over inheritance”? This principle
    distills this tension between the organization of classes and objects. In order
    to build flexibility into our projects, we structure our classes so that their
    objects can be composed into useful structures at runtime.


    This is a common theme running through the first two patterns of this chapter.
    Inheritance is an important feature in both, but part of its importance lies in
    providing the mechanism by which composition can be used to represent structures
    and extend functionality.


    ## The Composite Pattern


    The Composite pattern is perhaps the most extreme example of inheritance deployed
    in the service of composition. It is a simple and yet breathtakingly elegant design.
    It is also fantastically useful. Be warned, though; it is so neat, you might be
    tempted to overuse this strategy.


    The Composite pattern is a simple way of aggregating and then managing groups
    of similar objects so that an individual object is indistinguishable to a client
    from a collection of objects. The pattern is, in fact, very simple, but it is
    also often confusing. One reason for this is the similarity in structure of the
    classes in the pattern to the organization of its objects. Inheritance hierarchies
    are trees, beginning with the super class at the root, and branching out into
    specialized subclasses. The inheritance tree of classes laid down by the Composite
    pattern is designed to allow the easy generation and traversal of a tree of objects.


    If you are not already familiar with this pattern, you have every right to feel
    confused at this point. Let’s try an analogy to illustrate the way that single
    entities can be treated in the same way as collections of things. Given broadly
    irreducible ingredients such as cereals and meat (or soya if you prefer), we can
    make a food product—a sausage, for example. We then act on the result as a single
    entity. Just as we eat, cook, buy, or sell meat, we can eat, cook, buy, or sell
    the sausage that the meat in part composes. We might take the sausage and combine
    it with the other composite ingredients to make a pie, thereby rolling a composite
    into a larger composite. We behave in the same way to the collection as we do
    to the parts. The Composite pattern helps us to model this relationship between
    collections and components in our code.'
  trans: '

    ### 后果


    至此，我们已经看到了两种创建对象的方式。`AppConfig` 类是服务定位器的一个实例（即，一个能够代表其客户端查找组件或服务的类）。使用依赖注入无疑能使客户端代码更加优雅。`AppointmentMaker2`
    类完全无需关心对象创建的策略，它只专注于完成自己的本职工作。这当然是类的理想状态。我们希望设计的类能专注于自身职责，尽可能与更广泛的系统隔离。然而，这种纯粹性是有代价的。对象装配器组件隐藏了大量“魔法”。我们必须把它视为一个黑盒，并相信它能为我们凭空创建出对象。只要魔法有效，这倒也无妨。但一旦出现意外行为，调试起来就会非常困难。


    相比之下，服务定位器模式更简单，尽管它会把你的组件嵌入到一个更广泛的系统中。如果使用得当，服务定位器并不会让测试变得更困难，也不会使系统变得僵化。可以配置一个服务定位器，使其提供任意组件用于测试或根据配置运行。但是，对服务定位器的硬编码调用会使组件依赖于它。由于调用发生在方法体内部，客户端与目标组件（由服务定位器提供）之间的关系也变得有些模糊。这种关系在依赖注入的例子中是显式的，因为它声明在构造方法的签名中。


    那么，我们应该选择哪种方式呢？在某种程度上，这取决于个人偏好。就我个人而言，我倾向于从最简单的解决方案开始，然后根据需要重构为更复杂的方案。因此，我通常选择服务定位器。我可以用几行代码创建一个注册表类，然后根据需求提高它的灵活性。我的组件会比我希望的知道得更多一些，但由于我很少将类从一个系统移至另一个系统，所以并没有因这种“嵌入效应”而遭受太多困扰。当我确实需要将一个基于系统的类移入独立的库时，我发现移除对服务定位器的依赖进行重构也并非特别困难。


    依赖注入提供了纯粹性，但它需要另一种形式的“嵌入”。你必须接受装配器的“魔法”。如果你已经在一个提供此功能的框架内工作，那么没有理由不利用它。例如，Symfony
    的 `DependencyInjection` 组件就提供了服务定位器（称为“服务容器”）和依赖注入的混合解决方案。服务容器根据配置（或代码，如果你愿意）管理对象的实例化，并为客户端提供一个简单的接口来获取这些对象。服务容器甚至允许使用工厂来创建对象。另一方面，如果你是自己搭建框架，或者使用来自不同框架的组件，你可能会希望保持简单，牺牲一些优雅性。


    ## 总结


    本章涵盖了可用于生成对象的一些技巧。我首先研究了单例模式，它提供对单个实例的全局访问。接着，我探讨了工厂方法模式，该模式将多态性原则应用于对象生成。我将工厂方法与抽象工厂模式结合，以创建能够实例化一组相关对象的创建者类。我还研究了原型模式，并了解了对象克隆如何允许在对象生成中使用组合。最后，我探讨了两种对象创建策略：服务定位器和依赖注入。


    # 10. 灵活对象编程的模式


    在介绍了生成对象的策略之后，我们现在可以自由地探讨一些用于组织类和对象的策略。我将特别关注一个原则：组合比继承能提供更大的灵活性。本章讨论的模式同样源自“四人组”的经典目录。


    本章将涵盖三个模式：


    *   组合模式：组合结构，使得一组对象可以像单个对象一样被使用。

    *   装饰器模式：一种灵活的机制，可以在运行时组合对象以扩展功能。

    *   外观模式：为复杂或多变的系统创建简单的接口。


    ## 组织类以实现灵活的对象


    早在第 4 章，我曾说过初学者经常混淆对象和类。这其实只说对了一半。事实上，我们中大多数人也偶尔会在 UML 类图前挠头，试图调和图中展示的静态继承结构与对象之间在“图表之外”将要形成的动态关系。


    还记得模式原则“优先使用组合而非继承”吗？这个原则提炼了类与对象组织方式之间的张力。为了在我们的项目中构建灵活性，我们如此组织类，使得它们的对象可以在运行时通过组合形成有用的结构。


    这是贯穿本章前两个模式的一个共同主题。继承在这两个模式中都很重要，但其重要性部分在于它提供了一种机制，通过这种机制，组合可以用来表示结构和扩展功能。


    ## 组合模式


    组合模式也许是利用继承来服务于组合的最极端的例子。它既简单又令人惊叹地优雅，而且极其有用。但需要提醒的是：它太完美了，你可能会忍不住过度使用这个策略。


    组合模式是一种聚合并管理一组相似对象的简单方法，使得单个对象和对象集合对客户端来说是无法区分的。实际上，这个模式非常简单，但也常常让人感到困惑。原因之一在于模式中类的结构与其对象的组织结构之间的相似性。继承层次结构是树状的，从根节点的超类开始，分支成专门化的子类。组合模式所奠定的类继承树，旨在方便地生成和遍历对象树。


    如果你还不熟悉这个模式，现在感到困惑是完全正常的。让我们用一个类比来说明，单个实体如何能与事物集合以相同的方式被对待。给定大致上不可再分的原料，比如谷物和肉类（或者大豆，如果你喜欢），我们可以制作一种食品——例如，香肠。然后我们将结果作为一个单一实体来对待。就像我们吃、烹饪、购买或出售肉类一样，我们也可以吃、烹饪、购买或出售由肉类部分组成的香肠。我们可以把香肠和其他复合配料组合成一个馅饼，从而将一个复合体融入一个更大的复合体中。我们对集合的行为方式与对其组成部分的行为方式相同。组合模式帮助我们代码中模拟这种集合与组件之间的关系。

    '
- fmt: '### The Problem


    Managing groups of objects can be quite a complex task, especially if the objects
    in question might also contain objects of their own. This kind of problem is very
    common in coding. Think of invoices, with line items that summarize additional
    products or services, or things-to-do lists with items that themselves contain
    multiple subtasks. In content management, we can’t move for trees of sections,
    pages, articles, or media components. Managing these structures from the outside
    can quickly become daunting.


    Let’s return to a previous scenario. I am designing a system based on a game called
    Civilization. A player can move units around hundreds of tiles that make up a
    map. Individual counters can be grouped together to move, fight, and defend themselves
    as a unit. Here I define a couple of unit types:


    ```

    // listing 10.01

    abstract class Unit

    {

    abstract public function bombardStrength(): int;

    }

    class Archer extends Unit

    {

    public function bombardStrength(): int

    {

    return 4;

    }

    }

    class LaserCannonUnit extends Unit

    {

    public function bombardStrength(): int

    {

    return 44;

    }

    }

    ```


    The `Unit` class defines an abstract `bombardStrength()` method, which sets the
    attack strength of a unit bombarding an adjacent tile. I implement this in both
    the `Archer` and `LaserCannonUnit` classes. These classes would also contain information
    about movement and defensive capabilities, but I’ll keep things simple. I could
    define a separate class to group units together, like this:


    ```

    // listing 10.02

    class Army

    {

    private $units = [];

    public function addUnit(Unit $unit)

    {

    array_push($this->units, $unit);

    }

    public function bombardStrength(): int

    {

    $ret = 0;

    foreach ($this->units as $unit) {

    $ret += $unit->bombardStrength();

    }

    return $ret;

    }

    }

    // listing 10.03

    $unit1 = new Archer();

    $unit2 = new LaserCannonUnit();

    $army = new Army();

    $army->addUnit($unit1);

    $army->addUnit($unit2);

    print $army->bombardStrength();

    ```


    The `Army` class has an `addUnit()` method that accepts a `Unit` object. `Unit`
    objects are stored in an array property called `$units`. I calculate the combined
    strength of my army in the `bombardStrength()` method. This simply iterates through
    the aggregated `Unit` objects, calling the `bombardStrength()` method of each
    one.


    This model is perfectly acceptable, as long as the problem remains as simple as
    this. What happens, though, if I were to add some new requirements? Let’s say
    that an army should be able to combine with other armies. Each army should retain
    its own identity so that it can disentangle itself from the whole at a later date.
    The Arch Duke’s brave forces might share common cause today with General Soames’s
    assault upon the exposed flank of the enemy, but a domestic rebellion may send
    his army scurrying home at any time. For this reason, I can’t just decant the
    units from each army into a new force.


    I could amend the `Army` class to accept `Army` objects as well as `Unit` objects:


    ```

    // listing 10.04

    public function addArmy(Army $army)

    {

    array_push($this->armies, $army);

    }

    ```


    Then I’d need to amend the `bombardStrength()` method to iterate through all armies
    as well as units:


    ```

    // listing 10.05

    public function bombardStrength(): int

    {

    $ret = 0;

    foreach ($this->units as $unit) {

    $ret += $unit->bombardStrength();

    }

    foreach ($this->armies as $army) {

    $ret += $army->bombardStrength();

    }

    return $ret;

    }

    ```


    This additional complexity is not too problematic at the moment. Remember, though,
    I would need to do something similar in methods like `defensiveStrength()`, `movementRange()`,
    and so on. My game is going to be richly featured. Already the business group
    is calling for troop carriers that can hold up to ten units to improve their movement
    range on certain terrains. Clearly, a troop carrier is similar to an army in that
    it groups units. It also has its own characteristics. I could further amend the
    `Army` class to handle `TroopCarrier` objects, but I know that there will be a
    need for still more unit groupings. It is clear that I need a more flexible model.


    Let’s look again at the model I have been building. All the classes I created
    shared the need for a `bombardStrength()` method. In effect, a client does not
    need to distinguish between an army, a unit, or a troop carrier. They are functionally
    identical. They need to move, attack, and defend. Those objects that contain others
    need to provide methods for adding and removing them. These similarities lead
    us to an inevitable conclusion. Because container objects share an interface with
    the objects that they contain, they are naturally suited to share a type family.'
