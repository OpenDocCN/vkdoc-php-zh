    Now when the `$calendar->events()` function is used by the `$calendar->render()`
    function, it will propagate the `$Details` array with each event’s contents of
    the `details` field. The last step for the Calendar helper is to build the `$calendar->events()`
    function.


    ## Building the Events Function


    As the `$calendar->render()` function loops through the various weeks for a given
    month, it uses another function to fetch any matching events from the `$events`
    array. Listing 13-19 shows this function; paste it into the Calendar helper after
    the `$calendar->render()` function.


    **Listing 13-19.** *The* `$calendar->events()` *Function*


    ```

    116 function events($month=null, $day=null, $year=null, $events=array()) {


    $stamp = mktime(0,0,0,$month,$day,$year);

    $out = ''<ul>'';

    119 foreach($events as $event) {

    120 $event_stamp = strtotime($event[''date'']);

    121 $event_stamp = mktime(0,0,0,date(''m'',$event_stamp),date(''d'',➥

    $event_stamp),date(''Y'',$event_stamp));

    if ($event_stamp == $stamp) {

    123 $out .= ''<a href="#" onClick="$(\''event_details_''.$event➥

    [''id''].''\'').style.display = \''inline\'';">'';

    $out .= ''<li>''.$event[''name''].''</li></a>'';

    $this->Details[$event[''id'']] = $event;

    }

    }

    128 $out .= ''</ul>'';

    129 return $this->output($out);

    }

    ```


    This function takes a preformatted `$events` array and detects any of its values
    that match the provided `$month`, `$day`, and `$year`. When the function finds
    a matching event, it copies the contents of the event’s `details` field to the
    class array `$Details`, thus making the details available for any function in
    the Calendar helper. These details are displayed in the view in lines 104–112
    of Listing 13-17. The function also generates an HTML list element and returns
    the list to its parent function (which so far is only the `$calendar->render()`
    function). Because it is currently used by the `$calendar->render()` function,
    this list of events will appear within the day cell in the month’s table as the
    View and Index views render the month.


    Notice that two timestamps are created to detect matching events: `$stamp` and
    `$event_stamp`. The `$event_stamp` represents each event’s `date` value; if this
    value matches the timestamp of the given `$month`, `$day`, and `$year` values,
    then the function will add the event to the list and its details to the `$Details`
    array. The actual loop through the `$events` array happens on lines 119–127. Remember
    how the `$calendar->render()` function generated the hidden `<div>` elements for
    displaying event details? Well, line 123 contains the necessary JavaScript for
    the event’s link to display the corresponding hidden `<div>` element. You could
    change this to include an animation effect such as scrolling down, depending on
    your own taste, but at least line 123 shows how the helper provides the user with
    the requested details. All that is left now is to complete the Index action and
    view.


