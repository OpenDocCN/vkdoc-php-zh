- fmt: '# More Rules and an Example


    Classes, namespaces, and files should be declared in accordance with the PSR-4
    autoloading standard. We will come to that later in the chapter, however. PHP
    documents should be saved as UTF-8 encoded files.


    Finally, for PSR-1, let’s get it all wrong—and then put it right. Here is a class
    file that breaks all the rules:


    ```

    <?php


    class read_conf

    {

    const mode = 1;

    const mode_db = 2;

    public $conf_file;

    public $confValues;

    function read_conf()

    {

    // implementation

    }

    }

    ```


    Can you spot all the issues? First of all, I used a short opening tag. I also
    failed to declare a `namespace` (though we haven’t yet covered this requirement
    in detail). In naming my class, I used underscores and no capitals, rather than
    studly caps. And I used two formats for my constant names, neither of which are
    the required one—all capitals with words should be separated by underscores. Although
    both my property names were legal, I failed to make them consistent; specifically,
    I used underscores for `$conf_file` and camel case for `$confValues`. In naming
    my method, `read_conf()`, I used an underscore rather than camel case.


    Let’s fix the problems:


    ```php

    <?php

    // listing 15.04

    namespace popp\ch15\batch01;

    class ConfReader {

    const MODE_FILE = 1;

    const MODE_DB = 2;

    private $confFile;

    private $confValues = [];

    function readConf() {

    // implementation

    }

    }

    ```


    ## PSR-2 Coding Style Guide


    The Coding Style Guide (PSR-2) builds upon PSR-1. Let’s jump in and look at some
    of the rules.


    ### Starting and Ending a PHP Document


    We have already seen that PSR-1 requires that PHP blocks open with `<?php`. PSR-2
    stipulates that pure PHP files should not have an ending `?>` tag, but should
    end with a single blank line. It’s all too easy to end a file with a closing tag,
    and then let an extra newline creep in. This can result in formatting bugs, as
    well as errors when you set HTTP headers (you cannot do this after content has
    already been sent to the browser).


    `namespace` declarations should be followed by a blank line, and a block of `use`
    declarations should be followed by a blank line. Do not put more than one `use`
    declaration on the same line:


    ```php

    // listing 15.05

    namespace popp\ch15\batch01;

    use popp\ch10\batch06\DiamondDecorator;

    use popp\ch10\batch06\DiamondPlains;

    // begin class

    ```


    ### Starting and Ending a Class


    The `class` keyword, the class name, and `extends` and `implements` must all be
    placed on the same line. Where a class implements multiple interfaces, each interface
    name can be included on the same line as the class declaration, or it can be placed
    indented on its own line. If you choose to place your interface names on multiple
    lines, the first item must be placed on its own line rather than directly after
    the `implements` keyword. Class braces should begin on the line after the class
    declaration and end on their own line (directly after the class contents). So,
    a class declaration might look something like this:


    ```php

    // listing 15.06

    class EarthGame extends Game implements

    Playable,

    Savable

    {

    // class body

    }

    ```


    However, you could equally place the interface names on a single line:


    ```php

    class EarthGame extends Game implements Playable, Savable

    {

    // class body

    }

    ```


    ### Declaring Properties


    Properties must have a declared visibility (`public`, `private`, or `protected`).
    The `var` keyword is not acceptable. We have already covered the format for property
    names as part of PSR-1. You can use underscores, camel case, or studly case—but
    you should be consistent.


    ### Starting and Ending a Method


    All methods must have a declared visibility (`public`, `private`, or `protected`).
    The visibility keyword must follow `abstract` or `final`, but precede `static`.
    Method arguments with default values should be placed at the end of the argument
    list.


    #### Single Line Declarations


    Method braces should begin on the line after the method name and end on their
    own line (directly after the method code). A list of method arguments should not
    begin or end with a space (i.e., they should snuggle in close to the wrapping
    parentheses). For each argument, the comma should be flush with the preceding
    argument name (or the default value), but it should then be followed by a space.
    Let’s clarify things with an example:


    ```php

    // listing 15.07

    final public static function generateTile(int $diamondCount, bool $polluted =
    false)

    {

    // implementation

    }

    ```


    #### Multi-line Declarations


    A single line method declaration is not practical in cases where there are many
    arguments. In this situation, you can break the argument list so that each argument
    (including type, argument variable, default value, and comma) is placed indented
    on its own line. In this case, the closing parenthesis should be placed on the
    line after the argument list, flush with the start of the method declaration.
    The opening brace should follow the closing parenthesis on the same line, separated
    by a space. The method body should begin on a new line. Once again, that sounds
    much more complicated that it is. An example should make it clearer:


    ```php

    // listing 15.08

    public function __construct(

    int $size,

    string $name,

    bool $wraparound = false,

    bool $aliens = false

    ) {

    // implementation

    }

    ```


    ### Lines and Indentation


    You should use four spaces rather than tabs for indentation. It’s worth checking
    your editor settings—you can configure good editors to use spaces rather than
    a tab when you press the `Tab` key. You should also wrap your text before your
    line reaches 120 characters.


    ### Calling Methods and Functions


    Do not place a space between the method name and the opening parenthesis. You
    can apply the same rules to the argument list in a method call as you do to the
    argument list in a method declaration. In other words, for a single line call
    leave no space after the opening parenthesis or before the closing parenthesis.
    A comma should follow directly after each argument, with a single space falling
    before the next one. If you need to use multiple lines for a method call, each
    argument should sit indented on its own line, and the closing parenthesis should
    fall on a new line:


    ```php

    // listing 15.09

    $earthgame = new EarthGame(

    5,

    "earth",

    true,

    true

    );

    $earthgame::generateTile(5, true);

    ```


    ### Flow of Control


    Flow control keywords (`if`, `for`, `while`, etc.) must be followed by a single
    space. However, the opening parenthesis must not be followed by a space. Similarly,
    the closing parenthesis must not be preceded by a space. So, the contents should
    be snug in their brackets. In contrast to class and (single line) function declarations,
    the opening brace for the flow control block should begin on the same line as
    the closing parenthesis. The closing brace should sit on its own line. Here’s
    a quick example:


    ```php

    // listing 15.10

    $tile = [];

    for ($x = 0; $x < $diamondcount; $x++) {

    if ($polluted) {

    $tile[] = new PollutionDecorator(new DiamondDecorator(new Plains()));

    } else {

    $tile[] = new DiamondDecorator(new Plains());

    }

    }

    ```


    Notice the space after both `for` and `if`. The `for` and `if` statements are
    flush to their parentheses. In both cases, the closing parenthesis is followed
    by a space and then the opening brace for the flow control body.


    ### Checking and Fixing your Code


    Even if this chapter covered every single directive in PSR-2, it would be hard
    to keep it all in your mind. After all, we have other things to think about—like
    the design and implementation of our systems. So, given that we have bought into
    the value of coding standards, how do we comply without using too much of our
    time or focus? We use a tool, of course.'
  raw: '#### More Rules and an Example


    Classes, namespaces, and files should be declared in accordance with the PSR-4
    autoloading standard. We will come to that later in the chapter, however. PHP
    documents should be saved as UTF-8 encoded files.


    Finally, for PSR-1, let’s get it all wrong—and then put it right. Here is a class
    file that breaks all the rules:


    ```


    Can you spot all the issues? First of all, I used a short opening tag. I

    also failed to declare a `namespace` (though we

    haven’t yet covered this requirement in detail). In naming my class, I

    used underscores and no capitals, rather than studly caps. And I used

    two formats for my constant names, neither of which are the required

    one—all capitals with words should be separated by underscores. Although

    both my property names were legal, I failed to make them consistent;

    specifically, I used underscores for `$conf_file` and camel

    case for `$confValues`. In

    naming my method, `read_conf()` , I used

    an underscore rather than camel case.


    Let’s fix the problems:


    ```

    <?php

    // listing 15.04

    namespace popp\ch15\batch01;

    class ConfReader {

    const MODE_FILE = 1;

    const MODE_DB = 2;

    private $confFile;

    private $confValues = [];

    function readConf() {

    // implementation

    }

    }

    ```


    PSR-2 Coding Style Guide


    The Coding Style Guide (PSR-2) builds upon PSR-1\. Let’s jump in and look

    at some of the rules.


    Starting and Ending a PHP Document


    We have already seen that PSR-1 requires that PHP blocks open with `<?php`. PSR-2

    stipulates that pure PHP files should not have an ending `?>` tag, but should

    end with a single blank line. It’s all too easy to end a file with a

    closing tag, and then let an extra newline creep in. This can result in

    formatting bugs, as well as errors when you set HTTP headers (you cannot

    do this after content has already been sent to the browser).


    `namespace`

    declarations should be followed by a blank line, and a block of `use` declarations

    should be followed by a blank line. Do not put more than one `use` declaration
    on

    the same line:


    ```

    // listing 15.05

    namespace popp\ch15\batch01;

    use popp\ch10\batch06\DiamondDecorator;

    use popp\ch10\batch06\DiamondPlains;

    // begin class

    ```


    Starting and Ending a Class


    The `class`

    keyword, the class name, and `extends` and `implements` must all

    be placed on the same line. Where a class implements multiple

    interfaces, each interface name can be included on the same line as the

    class declaration, or it can be placed indented on its own line. If you

    choose to place your interface names on multiple lines, the first item

    must be placed on its own line rather than directly after the `implements` keyword.

    Class braces should begin on the line after the class declaration and end on

    their own line (directly after the class contents). So, a class

    declaration might look something like this:


    ```

    // listing 15.06

    class EarthGame extends Game implements

    Playable,

    Savable

    {

    // class body

    }

    ```


    However, you could equally place the interface names on a single line:


    ```

    class EarthGame extends Game implements Playable, Savable

    {

    // class body

    }

    ```


    Declaring Properties


    Properties must have a declared visibility (`public`, `private`, or `protected`).
    The `var` keyword is not

    acceptable. We have already covered the format for property names as

    part of PSR-1\. You can use underscores, camel case, or studly case—but

    you should be consistent.


    Starting and Ending a Method


    All methods must have a declared visibility (`public`, `private`, or `protected`).
    The

    visibility keyword must follow

    `abstract` or

    `final`, but

    precede `static`. Method

    arguments with default values should be placed at the end of the

    argument list.


    Single Line Declarations


    Method braces should begin on the line after the method name and end on their

    own line (directly after the method code). A list of method arguments

    should not begin or end with a space (i.e., they should snuggle in close

    to the wrapping parentheses). For each argument, the comma should be

    flush with the preceding argument name (or the default value), but it

    should then be followed by a space. Let’s clarify things with an

    example:


    ```

    // listing 15.07

    final public static function generateTile(int $diamondCount, bool $polluted =
    false)

    {

    // implementation

    }

    ```


    Multi-line Declarations


    A single line method declaration is not practical in cases where there

    are many arguments. In this situation, you can break the argument list

    so that each argument (including type, argument variable, default value,

    and comma) is placed indented on its own line. In this case, the closing

    parenthesis should be placed on the line after the argument list, flush

    with the start of the method declaration. The opening brace should

    follow the closing parenthesis on the same line, separated by a space.

    The method body should begin on a new line. Once again, that sounds much

    more complicated that it is. An example should make it clearer:


    ```

    // listing 15.08

    public function __construct(

    int $size,

    string $name,

    bool $wraparound = false,

    bool $aliens = false

    ) {

    // implementation

    }

    ```


    Lines and Indentation


    You should use four spaces rather than tabs for indentation . It’s worth

    checking your editor settings—you can configure good editors to use

    spaces rather than a tab when you press the `Tab` key. You should

    also wrap your text before your line reaches 120 characters.


    Calling Methods and Functions


    Do not place a space between the method name and the opening

    parenthesis. You can apply the same rules to the argument list in a

    method call as you do to the argument list in a method declaration. In

    other words, for a single line call leave no space after the opening

    parenthesis or before the closing parenthesis. A comma should follow

    directly after each argument, with a single space falling before the

    next one. If you need to use multiple lines for a method call, each

    argument should sit indented on its own line, and the closing

    parenthesis should fall on a new line:


    ```

    // listing 15.09

    $earthgame = new EarthGame(

    5,

    "earth",

    true,

    true

    );

    $earthgame::generateTile(5, true);

    ```


    Flow of Control


    Flow control keywords (`if`, `for`, `while`, etc.) must be

    followed by a single space. However, the opening parenthesis must not be

    followed by a space. Similarly, the closing parenthesis must not be

    preceded by a space. So, the contents should be snug in their brackets.

    In contrast to class and (single line) function declarations, the

    opening brace for the flow control block should begin on the same line

    as the closing parenthesis. The closing brace should sit on its own

    line. Here’s a quick example:


    ```

    // listing 15.10

    $tile = [];

    for ($x = 0; $x < $diamondcount; $x++) {

    if ($polluted) {

    $tile[] = new PollutionDecorator(new DiamondDecorator(new Plains()));

    } else {

    $tile[] = new DiamondDecorator(new Plains());

    }

    }

    ```


    Notice the space after both `for` and `if`. The `for` and `if` statements are

    flush to their parentheses. In both cases, the closing parenthesis is

    followed by a space and then the opening brace for the flow control

    body.


    Checking and Fixing your Code


    Even if this chapter covered every single directive in PSR-2, it would

    be hard to keep it all in your mind. After all, we have other things to

    think about—like the design and implementation of our systems. So, given

    that we have bought into the value of coding standards, how do we comply

    without using too much of our time or focus? We use a tool, of course.'
  trans: '

    # 更多规则与示例


    类、命名空间和文件应遵循 PSR-4 自动加载标准进行声明。不过我们会在本章稍后部分再讨论这一标准。PHP 文档应保存为 UTF-8 编码的文件。


    最后，对于 PSR-1，我们先来展示一个完全错误的例子——然后再纠正它。下面是一个违反了所有规则的类文件：


    ```php

    <?php


    class read_conf

    {

    const mode = 1;

    const mode_db = 2;

    public $conf_file;

    public $confValues;

    function read_conf()

    {

    // 实现代码

    }

    }

    ```


    你能找出所有问题吗？首先，我使用了短开标签。同时我还未能声明`namespace`（尽管我们尚未详细讨论这一要求）。在命名类时，我使用了下划线和小写字母，而非驼峰式大小写。对于常量名，我使用了两种格式，而这两种格式都不是标准要求——即所有字母大写，单词之间用下划线分隔。虽然我的两个属性名都是合法的，但我未能保持命名一致；具体来说，我对`$conf_file`使用了蛇形命名法，而对`$confValues`使用了驼峰命名法。在命名方法`read_conf()`时，我使用了下划线而非驼峰命名法。


    现在我们来修正这些问题：


    ```php

    <?php

    // 代码清单 15.04

    namespace popp\ch15\batch01;

    class ConfReader {

    const MODE_FILE = 1;

    const MODE_DB = 2;

    private $confFile;

    private $confValues = [];

    function readConf() {

    // 实现代码

    }

    }

    ```


    ## PSR-2 编码风格指南


    编码风格指南（PSR-2）建立在 PSR-1 基础之上。让我们直接开始，了解其中的一些规则。


    ### PHP 文档的开头与结尾


    我们已经看到 PSR-1 要求 PHP 代码块以`<?php`开头。PSR-2 规定纯 PHP 文件不应包含结束标签`?>`，而应以一个空行结尾。很容易就会在文件末尾加上结束标签，然后意外多出一个换行符。这可能导致格式错误，以及在设置
    HTTP 头部时出错（在内容已发送至浏览器后，无法再设置头部）。


    `namespace`声明后应紧跟一个空行，`use`声明块后也应跟一个空行。同一行内不得出现多个`use`声明：


    ```php

    // 代码清单 15.05

    namespace popp\ch15\batch01;

    use popp\ch10\batch06\DiamondDecorator;

    use popp\ch10\batch06\DiamondPlains;

    // 开始类定义

    ```


    ### 类的开始与结束


    `class`关键字、类名以及`extends`和`implements`必须放在同一行。如果一个类实现了多个接口，每个接口名可以包含在类声明的同一行，也可以缩进后单独成行。如果选择将接口名放在多行，第一个接口名必须单独成行，而不是紧跟在`implements`关键字之后。类的大括号应在类声明之后另起一行开始，并在其单独一行结束（紧随类内容之后）。因此，一个类声明可能如下所示：


    ```php

    // 代码清单 15.06

    class EarthGame extends Game implements

    Playable,

    Savable

    {

    // 类主体

    }

    ```


    不过，你也可以将接口名放在同一行：


    ```php

    class EarthGame extends Game implements Playable, Savable

    {

    // 类主体

    }

    ```


    ### 属性声明


    属性必须声明可见性（`public`、`private`或`protected`）。不允许使用`var`关键字。我们已经在 PSR-1 部分涵盖了属性名的格式。你可以使用蛇形命名法、驼峰命名法或大驼峰命名法——但必须保持一致。


    ### 方法的开始与结束


    所有方法必须声明可见性（`public`、`private`或`protected`）。可见性关键字必须放在`abstract`或`final`之后，`static`之前。带有默认值的方法参数应放在参数列表的末尾。


    #### 单行声明


    方法大括号应在方法名后另起一行开始，并在其单独一行结束（紧随方法代码之后）。方法参数列表的开头和结尾不应有空格（即应紧贴括号）。对于每个参数，逗号应紧跟前一个参数名（或默认值），然后后面跟一个空格。让我们通过一个示例来澄清：


    ```php

    // 代码清单 15.07

    final public static function generateTile(int $diamondCount, bool $polluted =
    false)

    {

    // 实现代码

    }

    ```


    #### 多行声明


    当参数较多时，单行方法声明就不太实用了。在这种情况下，你可以拆开参数列表，使每个参数（包括类型、参数变量、默认值和逗号）缩进后单独成行。此时，关闭括号应放在参数列表之后的行，并与方法声明的开头对齐。左大括号应跟随在关闭括号的同一行，之间用空格分隔。方法体应从新行开始。再次说明，这听起来比实际复杂。一个例子应该能让它更清晰：


    ```php

    // 代码清单 15.08

    public function __construct(

    int $size,

    string $name,

    bool $wraparound = false,

    bool $aliens = false

    ) {

    // 实现代码

    }

    ```


    ### 行与缩进


    缩进应使用四个空格，而不是制表符。值得检查一下编辑器设置——你可以配置好的编辑器，在按下`Tab`键时使用空格而非制表符。此外，应在每行字符数达到 120
    之前换行。


    ### 方法调用与函数调用


    方法名与左括号之间不要留空格。在方法调用中，你可以对参数列表应用与方法声明中相同的规则。换句话说，对于单行调用，左括号后和右括号前不留空格。每个参数后紧跟逗号，然后是一个空格，再是下一个参数。如果需要在多行中调用方法，每个参数应缩进单独成行，右括号放在新的一行：


    ```php

    // 代码清单 15.09

    $earthgame = new EarthGame(

    5,

    "earth",

    true,

    true

    );

    $earthgame::generateTile(5, true);

    ```


    ### 控制流


    控制流关键字（`if`、`for`、`while`等）后必须跟一个空格。但是，左括号后不能有空格。同样，右括号前也不能有空格。因此，括号内的内容应紧贴括号。与类声明和（单行）函数声明不同，控制流块的左大括号应放在右括号的同一行。右大括号应单独成行。这里有一个简单示例：


    ```php

    // 代码清单 15.10

    $tile = [];

    for ($x = 0; $x < $diamondcount; $x++) {

    if ($polluted) {

    $tile[] = new PollutionDecorator(new DiamondDecorator(new Plains()));

    } else {

    $tile[] = new DiamondDecorator(new Plains());

    }

    }

    ```


    注意`for`和`if`后的空格。`for`和`if`语句紧贴其括号。在两种情况下，右括号后都跟一个空格，然后是控制流主体的左大括号。


    ### 检查与修复你的代码


    即使本章涵盖了 PSR-2 中的每一条指令，也很难全部记住。毕竟，我们还有其他事情要考虑——比如我们系统的设计和实现。因此，既然我们已经认同编码标准的重要性，如何在不过多占用时间或精力的情况下遵守它们呢？当然是使用工具。

    '
- fmt: "`PHP_CodeSniffer` 允许你检测甚至修复编码规范违规行为——并不仅仅是 PSR 规范。你可以按照 [`https://github.com/squizlabs/PHP_CodeSniffer`](https://github.com/squizlabs/PHP_CodeSniffer)\
    \ 上的说明获取它。这里有 Composer 和 PEAR 选项，但以下是下载 PHP 归档文件的方法：\n\n```\ncurl -OL https://squizlabs.github.io/PHP_CodeSniffer/phpcs.phar\n\
    curl -OL https://squizlabs.github.io/PHP_CodeSniffer/phpcbf.phar\n```\n\n为什么需要两个下载？第一个是用于`phpcs`，它诊断和报告违规行为。第二个是用于`phpcbf`，它可以修复很多违规行为。让我们来测试一下这两个工具。首先，这里有一段格式混乱的代码：\n\
    \n```\n// listing 15.11\nnamespace popp\\ch15\\batch01;\nclass ebookParser {\n\
    function __construct(string $path , $format=0 ) {\nif ($format>1)\n$this->setFormat(\
    \ 1 );\n}\nfunction setformat(int $format) {\n// do something with $format\n}\n\
    }\n```\n\n与其在这里逐一介绍问题，不如让`PHP_CodeSniffer`为我们完成这项工作：\n\n```\n$ php phpcs.phar\
    \ --standard=PSR2 src/ch15/batch01/phpcsBroken.php\n\nFOUND 14 ERRORS AFFECTING\
    \ 6 LINES\n\n 3 | ERROR | [x] There must be one blank line after the namespace\n\
    \   |       |     declaration\n 4 | ERROR | [ ] Class name \"ebookParser\" is\
    \ not in camel caps\n   |       |     format\n 4 | ERROR | [x] Opening brace of\
    \ a class must be on the line after\n   |       |     the definition\n 6 | ERROR\
    \ | [ ] Visibility must be declared on method \"__construct\"\n 6 | ERROR | [x]\
    \ Expected 0 spaces between argument \"$path\" and\n   |       |     comma; 1\
    \ found\n 6 | ERROR | [x] Incorrect spacing between argument \"$format\" and\n\
    \   |       |     equals sign; expected 1 but found 0\n 6 | ERROR | [x] Incorrect\
    \ spacing between default value and equals\n   |       |     sign for argument\
    \ \"$format\"; expected 1 but found 0\n 6 | ERROR | [x] Expected 0 spaces between\
    \ argument \"$format\" and\n   |       |     closing bracket; 1 found\n 6 | ERROR\
    \ | [x] Opening brace should be on a new line\n 7 | ERROR | [x] Inline control\
    \ structures are not allowed\n 8 | ERROR | [x] Space after opening parenthesis\
    \ of function call\n   |       |     prohibited\n 8 | ERROR | [x] Expected 0 spaces\
    \ before closing bracket; 1 found\n11 | ERROR | [ ] Visibility must be declared\
    \ on method \"setformat\"\n11 | ERROR | [x] Opening brace should be on a new line\n\
    \nPHPCBF CAN FIX THE 11 MARKED SNIFF VIOLATIONS AUTOMATICALLY\n```\n\n对于只有几行代码来说，问题数量多得吓人。幸运的是，正如输出所示，我们可以不费吹灰之力就解决其中的许多问题：\n\
    \n```\n$ php phpcbf.phar --standard=PSR2 src/ch15/batch01/EbookParser.php\n```\n\
    \n```\nProcessing EbookParser.php [PHP => 83 tokens in 15 lines]... DONE in 11ms\
    \ (11 fixable violations)\n=> Fixing file: 0/11 violations remaining [made 4 passes]...\
    \ DONE in 17ms\nPatched 1 file\n```\n\n现在，如果我们再次运行`phpcs`，会发现情况已经大为改善：\n\n```\n\
    $ php phpcs.phar --standard=PSR2 src/ch15/batch01/EbookParser.php\n\nFOUND 3 ERRORS\
    \ AFFECTING 3 LINES\n\n 5 | ERROR | Class name \"ebookParser\" is not in camel\
    \ caps format\n 8 | ERROR | Visibility must be declared on method \"__construct\"\
    \n15 | ERROR | Visibility must be declared on method \"setformat\"\n```\n\n我会继续添加可见性声明，然后修改类的名称——这项工作很快就能完成！现在，我拥有了一份风格合规的代码文件：\n\
    \n```\n// listing 15.12\nnamespace popp\\ch15\\batch01;\nclass EbookParser\n{\n\
    \    public function __construct(string $path, $format = 0)\n    {\n        if\
    \ ($format > 1) {\n            $this->setFormat(1);\n        }\n    }\n    private\
    \ function setformat(int $format)\n    {\n        // do something with $format\n\
    \    }\n}\n```\n\n## PSR-4 自动加载\n\n我们在第 [5](#A314621_5_En_5_Chapter.html) 章中了解了\
    \ PHP 对自动加载的支持。在该章中，我们看到了如何使用 `spl_autoload_register()` 函数，根据尚未加载的类的名称来自动引入文件。虽然这很强大，但它也是一种幕后魔法。这在单个项目中是可以的，但如果多个组件融合在一起，并且都使用不同的约定来加载类文件，就会导致极大的混乱。\n\
    \n自动加载标准（PSR-4）要求框架遵循一套共同的规则，从而为这种魔法增添了一些纪律性。\n\n这对开发者来说是个好消息。这意味着我们或多或少可以忽略引入文件的机制，而专注于类依赖关系。\n\
    \n### 对我们来说重要的规则\n\nPSR-4 的主要目的是为自动加载器开发者定义规则。然而，这些规则不可避免地决定了我们必须声明命名空间和类的方式。以下是一些基础知识。\n\
    \n一个完全限定类名（即类的名称，包括其命名空间）必须包含一个初始的“供应商”命名空间。因此，一个类必须至少有一个命名空间。\n\n假设我们的供应商命名空间是`popp`。我们可以这样声明一个类：\n\
    \n```\n// listing 15.13\nnamespace popp;\nclass Services\n{\n}\n```\n\n这个类的完全限定类名是`popp\\\
    Services`。\n\n路径中的初始命名空间必须对应一个或多个基目录。我们可以利用这一点，将一组子命名空间映射到一个起始目录。例如，如果我们只想使用`popp\\\
    library`命名空间（而不使用`popp`命名空间下的其他任何东西），那么我们可以将其映射到一个顶层目录，这样就不用维护一个空的`popp/`目录了。\n\
    \n让我们创建一个`composer.json`文件来执行这个映射：\n\n```\n{\n    \"autoload\": {\n        \"\
    psr-4\": {\n            \"popp\\\\library\\\\\": \"mylib\"\n        }\n    }\n\
    }\n```\n\n注意，我甚至不需要将基目录命名为`\"library\"`。这是将`popp\\library`映射到`mylib`目录的一个任意映射。现在，我可以在`mylib`目录下创建一个类文件：\n\
    \n```\n// listing 15.14\n// mylib/LibraryCatalogue.php\nnamespace popp\\library;\n\
    use popp\\library\\inventory\\Book;\nclass LibraryCatalogue\n{\n    private $books\
    \ = [];\n    public function addBook(Book $book)\n    {\n        $this->books[]\
    \ = $book;\n    }\n}\n```\n\n为了能够被找到，`LibraryCatalogue`类必须放在一个名称完全相同的文件中（显然还需要添加`.php`扩展名）。\n\
    \n在将基目录（`mylib`）与初始命名空间（`popp\\library`）关联之后，后续的目录和子命名空间之间必须存在直接关系。碰巧，我在`LibraryCatalogue`类中已经引用了一个名为`popp\\\
    library\\inventory\\Book`的类。因此，该类文件应放置在`mylib/inventory`目录下：\n\n```\n// listing\
    \ 15.15\n// mylib/library/inventory/Book.php\nnamespace popp\\library\\inventory;\n\
    class Book\n{\n    // implementation\n}\n```\n\n还记得那条规则吗？路径中的初始命名空间必须对应一个或多个基目录。到目前为止，我们在`popp\\\
    library`和`mylib`之间建立了一对一的关系。实际上，我们完全可以将`popp\\library`命名空间映射到多个基目录。让我们在映射中添加一个名为`additional`的目录；以下是`composer.json`的修改：\n\
    \n```\n{\n    \"autoload\": {\n        \"psr-4\": {\n            \"popp\\\\library\\\
    \\\": [\"mylib\", \"additional\"]\n        }\n    }\n}\n```\n\n现在，我可以创建`additional/inventory`目录和一个位于其中的类：\n\
    \n```\n// listing 15.16\n// additional/inventory/Ebook.php\nnamespace popp\\library\\\
    inventory;\nclass Ebook extends Book\n{\n    // implementation\n}\n```\n\n接下来，让我们创建一个顶级的运行脚本`index.php`来实例化这些类。"
  raw: '`PHP_CodeSniffer`

    allows you to detect and even repair standards violations—and not just

    for PSR. You can get it by following the instructions at [`https://github.com/squizlabs/PHP_CodeSniffer`](https://github.com/squizlabs/PHP_CodeSniffer)
    . There are Composer and PEAR options, but here’s how

    you can download the PHP archive files:


    curl -OL [`https://squizlabs.github.io/PHP_CodeSniffer/phpcs.phar`](https://squizlabs.github.io/PHP_CodeSniffer/phpcs.phar)


    ```

    curl -OL https://squizlabs.github.io/PHP_CodeSniffer/phpcbf.phar

    ```


    Why two downloads? The first is for `phpcs`, which

    diagnoses and reports on violations. The second is for `phpcbf`, which can fix

    a lot of them. Let’s put the tools through their paces. First, here is a

    scrappily formatted piece of code:


    ```

    // listing 15.11

    namespace popp\ch15\batch01;

    class ebookParser {

    function __construct(string $path , $format=0 ) {

    if ($format>1)

    $this->setFormat( 1 );

    }

    function setformat(int $format) {

    // do something with $format

    }

    }

    ```


    Rather than run through the problems here, let’s have `PHP_CodeSniffer` do it

    for us:


    ```

    $ php phpcs.phar --standard=PSR2 src/ch15/batch01/phpcsBroken.php


    FOUND 14 ERRORS AFFECTING 6 LINES


    3 | ERROR | [x] There must be one blank line after the namespace

    |       |     declaration

    4 | ERROR | [ ] Class name "ebookParser" is not in camel caps

    |       |     format

    4 | ERROR | [x] Opening brace of a class must be on the line after

    |       |     the definition

    6 | ERROR | [ ] Visibility must be declared on method "__construct"

    6 | ERROR | [x] Expected 0 spaces between argument "$path" and

    |       |     comma; 1 found

    6 | ERROR | [x] Incorrect spacing between argument "$format" and

    |       |     equals sign; expected 1 but found 0

    6 | ERROR | [x] Incorrect spacing between default value and equals

    |       |     sign for argument "$format"; expected 1 but found 0

    6 | ERROR | [x] Expected 0 spaces between argument "$format" and

    |       |     closing bracket; 1 found

    6 | ERROR | [x] Opening brace should be on a new line

    7 | ERROR | [x] Inline control structures are not allowed

    8 | ERROR | [x] Space after opening parenthesis of function call

    |       |     prohibited

    8 | ERROR | [x] Expected 0 spaces before closing bracket; 1 found

    11 | ERROR | [ ] Visibility must be declared on method "setformat"

    11 | ERROR | [x] Opening brace should be on a new line


    PHPCBF CAN FIX THE 11 MARKED SNIFF VIOLATIONS AUTOMATICALLY


    ```


    That’s an exhausting number of problems for just a few lines of code.

    Luckily, as the output indicates, we can fix a lot of these with very

    little effort:


    ```

    $ php phpcbf.phar --standard=PSR2 src/ch15/batch01/EbookParser.php

    ```


    ```

    Processing EbookParser.php [PHP => 83 tokens in 15 lines]... DONE in 11ms (11
    fixable violations)

    => Fixing file: 0/11 violations remaining [made 4 passes]... DONE in 17ms

    Patched 1 file

    ```


    Now, if we run `phpcs` again, we’ll

    see that the situation is much improved:


    ```

    $ php phpcs.phar --standard=PSR2 src/ch15/batch01/EbookParser.php


    FOUND 3 ERRORS AFFECTING 3 LINES


    5 | ERROR | Class name "ebookParser" is not in camel caps format

    8 | ERROR | Visibility must be declared on method "__construct"

    15 | ERROR | Visibility must be declared on method "setformat"


    ```


    I’ll go ahead and add the visibility declarations, and then change the

    name of the class—a quick job! And now I have a stylishly compliant code

    file:


    ```

    // listing 15.12

    namespace popp\ch15\batch01;

    class EbookParser

    {

    public function __construct(string $path, $format = 0)

    {

    if ($format > 1) {

    $this->setFormat(1);

    }

    }

    private function setformat(int $format)

    {

    // do something with $format

    }

    }

    ```


    PSR-4 Autoloading


    We looked at PHP’s support for autoloading in Chapter [5](#A314621_5_En_5_Chapter.html).
    In that chapter, we saw how we

    could use the `spl_autoload_register()`

    function to automatically require files based on the name of an as yet

    unloaded class. Although this is powerful, it is also a kind of behind

    the scenes magic. This is fine in a single project, but a recipe for

    great confusion if multiple components come together and all use

    different conventions for loading class files.


    The Autoloading Standard (PSR-4) requires frameworks to conform to a

    common set of rules, thereby adding some discipline to the magic.


    This is great news for developers. It means that we can more or less

    ignore the mechanics of requiring files, and focus instead on class

    dependencies.


    The Rules that Matter to Us


    The main purpose of PSR-4 is to define rules for autoloader developers.

    However, those rules inevitably determine the way we must declare

    namespaces and classes. Here are some of the basics.


    A fully-qualified classname (that is, the name of a class, including its

    namespaces) must include an initial “vendor” namespace. So, a class must

    have at least one namespace.


    Let’s say that our vendor namespace is `popp`. We can declare

    a class in this way:


    ```

    // listing 15.13

    namespace popp;

    class Services

    {

    }

    ```


    The fully-qualified class name for this class is `popp\` `Services` .


    The initial namespaces in a path must correspond to one or more base

    directories. We can use this to map a set of sub-namespaces to a

    starting directory. If, for example, we want to work with the namespace

    `popp\library`

    (and nothing else under the `popp` namespace), then

    we might map that to a top-level directory to spare us from having to

    maintain an empty `popp/` directory.


    Let’s set up a `composer.` `json` file to perform

    that mapping:


    ```

    {

    "autoload": {

    "psr-4": {

    "popp\\library\\": "mylib"

    }

    }

    }

    ```


    Notice that I don’t even need to call the base directory, `"library"`. This is
    an

    arbitrary mapping of `popp\` `library` to the `mylib` directory. Now

    I can create a class file under the `mylib` directory:


    ```

    // listing 15.14

    // mylib/LibraryCatalogue.php

    namespace popp\library;

    use popp\library\inventory\Book;

    class LibraryCatalogue

    {

    private $books = [];

    public function addBook(Book $book)

    {

    $this->books[] = $book;

    }

    }

    ```


    In order to be found, the `LibraryCatalogue`

    class must be placed in a file with exactly the same name (with the

    obvious addition of the `.php` extension).


    After a base directory (`mylib`) has been

    associated with initial namespaces (`popp\library`), there

    must then be a direct relation between subsequent directories and

    sub-namespaces. It happens that I have already referenced a class named

    `popp\library\inventory\`

    `Book` in my

    `LibraryCatalogue`

    class. That class file should therefore be placed in the `mylib/inventory`

    directory:


    ```

    // listing 15.15

    // mylib/library/inventory/Book.php

    namespace popp\library\inventory;

    class Book

    {

    // implementation

    }

    ```


    Remember the rule that the initial namespaces in a path must correspond

    to one or more base directories?

    So far we have made a one-to-one relationship between `popp\library` and

    `mylib`. There’s

    actually no reason why we can’t map the `popp\library`

    namespace to more than one base directory. Let’s add a directory named

    `additional` to

    the mapping; here’s the amendment to `composer.json`:


    ```

    {

    "autoload": {

    "psr-4": {

    "popp\\library\\": ["mylib", "additional"]

    }

    }

    }

    ```


    Now I can create the additional/inventory directories and a class to go

    in them:


    ```

    // listing 15.16

    // additional/inventory/Ebook.php

    namespace popp\library\inventory;

    class Ebook extends Book

    {

    // implementation

    }

    ```


    Next, let’s create a top-level runner script, `index.php` , to

    instantiate these classes:'
  trans: "\n`PHP_CodeSniffer` 允许你检测甚至修复编码规范违规行为——并不仅仅是 PSR 规范。你可以按照 [`https://github.com/squizlabs/PHP_CodeSniffer`](https://github.com/squizlabs/PHP_CodeSniffer)\
    \ 上的说明获取它。这里有 Composer 和 PEAR 选项，但以下是下载 PHP 归档文件的方法：\n\n```\ncurl -OL https://squizlabs.github.io/PHP_CodeSniffer/phpcs.phar\n\
    curl -OL https://squizlabs.github.io/PHP_CodeSniffer/phpcbf.phar\n```\n\n为什么需要两个下载？第一个是用于`phpcs`，它诊断和报告违规行为。第二个是用于`phpcbf`，它可以修复很多违规行为。让我们来测试一下这两个工具。首先，这里有一段格式混乱的代码：\n\
    \n```\n// listing 15.11\nnamespace popp\\ch15\\batch01;\nclass ebookParser {\n\
    function __construct(string $path , $format=0 ) {\nif ($format>1)\n$this->setFormat(\
    \ 1 );\n}\nfunction setformat(int $format) {\n// do something with $format\n}\n\
    }\n```\n\n与其在这里逐一介绍问题，不如让`PHP_CodeSniffer`为我们完成这项工作：\n\n```\n$ php phpcs.phar\
    \ --standard=PSR2 src/ch15/batch01/phpcsBroken.php\n\nFOUND 14 ERRORS AFFECTING\
    \ 6 LINES\n\n 3 | ERROR | [x] There must be one blank line after the namespace\n\
    \   |       |     declaration\n 4 | ERROR | [ ] Class name \"ebookParser\" is\
    \ not in camel caps\n   |       |     format\n 4 | ERROR | [x] Opening brace of\
    \ a class must be on the line after\n   |       |     the definition\n 6 | ERROR\
    \ | [ ] Visibility must be declared on method \"__construct\"\n 6 | ERROR | [x]\
    \ Expected 0 spaces between argument \"$path\" and\n   |       |     comma; 1\
    \ found\n 6 | ERROR | [x] Incorrect spacing between argument \"$format\" and\n\
    \   |       |     equals sign; expected 1 but found 0\n 6 | ERROR | [x] Incorrect\
    \ spacing between default value and equals\n   |       |     sign for argument\
    \ \"$format\"; expected 1 but found 0\n 6 | ERROR | [x] Expected 0 spaces between\
    \ argument \"$format\" and\n   |       |     closing bracket; 1 found\n 6 | ERROR\
    \ | [x] Opening brace should be on a new line\n 7 | ERROR | [x] Inline control\
    \ structures are not allowed\n 8 | ERROR | [x] Space after opening parenthesis\
    \ of function call\n   |       |     prohibited\n 8 | ERROR | [x] Expected 0 spaces\
    \ before closing bracket; 1 found\n11 | ERROR | [ ] Visibility must be declared\
    \ on method \"setformat\"\n11 | ERROR | [x] Opening brace should be on a new line\n\
    \nPHPCBF CAN FIX THE 11 MARKED SNIFF VIOLATIONS AUTOMATICALLY\n```\n\n对于只有几行代码来说，问题数量多得吓人。幸运的是，正如输出所示，我们可以不费吹灰之力就解决其中的许多问题：\n\
    \n```\n$ php phpcbf.phar --standard=PSR2 src/ch15/batch01/EbookParser.php\n```\n\
    \n```\nProcessing EbookParser.php [PHP => 83 tokens in 15 lines]... DONE in 11ms\
    \ (11 fixable violations)\n=> Fixing file: 0/11 violations remaining [made 4 passes]...\
    \ DONE in 17ms\nPatched 1 file\n```\n\n现在，如果我们再次运行`phpcs`，会发现情况已经大为改善：\n\n```\n\
    $ php phpcs.phar --standard=PSR2 src/ch15/batch01/EbookParser.php\n\nFOUND 3 ERRORS\
    \ AFFECTING 3 LINES\n\n 5 | ERROR | Class name \"ebookParser\" is not in camel\
    \ caps format\n 8 | ERROR | Visibility must be declared on method \"__construct\"\
    \n15 | ERROR | Visibility must be declared on method \"setformat\"\n```\n\n我会继续添加可见性声明，然后修改类的名称——这项工作很快就能完成！现在，我拥有了一份风格合规的代码文件：\n\
    \n```\n// listing 15.12\nnamespace popp\\ch15\\batch01;\nclass EbookParser\n{\n\
    \    public function __construct(string $path, $format = 0)\n    {\n        if\
    \ ($format > 1) {\n            $this->setFormat(1);\n        }\n    }\n    private\
    \ function setformat(int $format)\n    {\n        // do something with $format\n\
    \    }\n}\n```\n\n## PSR-4 自动加载\n\n我们在第 5 章中了解了 PHP 对自动加载的支持。在该章中，我们看到了如何使用 `spl_autoload_register()`\
    \ 函数，根据尚未加载的类的名称来自动引入文件。虽然这很强大，但它也是一种幕后魔法。这在单个项目中是可以的，但如果多个组件融合在一起，并且都使用不同的约定来加载类文件，就会导致极大的混乱。\n\
    \n自动加载标准（PSR-4）要求框架遵循一套共同的规则，从而为这种魔法增添了一些纪律性。\n\n这对开发者来说是个好消息。这意味着我们或多或少可以忽略引入文件的机制，而专注于类依赖关系。\n\
    \n### 对我们来说重要的规则\n\nPSR-4 的主要目的是为自动加载器开发者定义规则。然而，这些规则不可避免地决定了我们必须声明命名空间和类的方式。以下是一些基础知识。\n\
    \n一个完全限定类名（即类的名称，包括其命名空间）必须包含一个初始的“供应商”命名空间。因此，一个类必须至少有一个命名空间。\n\n假设我们的供应商命名空间是`popp`。我们可以这样声明一个类：\n\
    \n```\n// listing 15.13\nnamespace popp;\nclass Services\n{\n}\n```\n\n这个类的完全限定类名是`popp\\\
    Services`。\n\n路径中的初始命名空间必须对应一个或多个基目录。我们可以利用这一点，将一组子命名空间映射到一个起始目录。例如，如果我们只想使用`popp\\\
    library`命名空间（而不使用`popp`命名空间下的其他任何东西），那么我们可以将其映射到一个顶层目录，这样就不用维护一个空的`popp/`目录了。\n\
    \n让我们创建一个`composer.json`文件来执行这个映射：\n\n```\n{\n    \"autoload\": {\n        \"\
    psr-4\": {\n            \"popp\\\\library\\\\\": \"mylib\"\n        }\n    }\n\
    }\n```\n\n注意，我甚至不需要将基目录命名为`\"library\"`。这是将`popp\\library`映射到`mylib`目录的一个任意映射。现在，我可以在`mylib`目录下创建一个类文件：\n\
    \n```\n// listing 15.14\n// mylib/LibraryCatalogue.php\nnamespace popp\\library;\n\
    use popp\\library\\inventory\\Book;\nclass LibraryCatalogue\n{\n    private $books\
    \ = [];\n    public function addBook(Book $book)\n    {\n        $this->books[]\
    \ = $book;\n    }\n}\n```\n\n为了能够被找到，`LibraryCatalogue`类必须放在一个名称完全相同的文件中（显然还需要添加`.php`扩展名）。\n\
    \n在将基目录（`mylib`）与初始命名空间（`popp\\library`）关联之后，后续的目录和子命名空间之间必须存在直接关系。碰巧，我在`LibraryCatalogue`类中已经引用了一个名为`popp\\\
    library\\inventory\\Book`的类。因此，该类文件应放置在`mylib/inventory`目录下：\n\n```\n// listing\
    \ 15.15\n// mylib/library/inventory/Book.php\nnamespace popp\\library\\inventory;\n\
    class Book\n{\n    // implementation\n}\n```\n\n还记得那条规则吗？路径中的初始命名空间必须对应一个或多个基目录。到目前为止，我们在`popp\\\
    library`和`mylib`之间建立了一对一的关系。实际上，我们完全可以将`popp\\library`命名空间映射到多个基目录。让我们在映射中添加一个名为`additional`的目录；以下是`composer.json`的修改：\n\
    \n```\n{\n    \"autoload\": {\n        \"psr-4\": {\n            \"popp\\\\library\\\
    \\\": [\"mylib\", \"additional\"]\n        }\n    }\n}\n```\n\n现在，我可以创建`additional/inventory`目录和一个位于其中的类：\n\
    \n```\n// listing 15.16\n// additional/inventory/Ebook.php\nnamespace popp\\library\\\
    inventory;\nclass Ebook extends Book\n{\n    // implementation\n}\n```\n\n接下来，让我们创建一个顶级的运行脚本`index.php`来实例化这些类。\n"
- fmt: "```php\n// listing 15.17\n// index.php\nrequire_once(\"vendor/autoload.php\"\
    );\nuse popp\\library\\LibraryCatalogue;\n// will be found under mylib/\nuse popp\\\
    library\\inventory\\Book;\n// will be found under additional/\nuse popp\\library\\\
    inventory\\Ebook;\n$catalogue = new LibraryCatalogue();\n$catalogue->addBook(new\
    \ Book());\n$catalogue->addBook(new Ebook());\n```\n\n**Note**  \n你必须使用 Composer\
    \ 生成自动加载文件 `vendor/autoload.php`，并且在访问你在 `composer.json` 中声明的逻辑之前，必须以某种方式包含该文件。你可以通过运行命令\
    \ `composer install` 来实现。你可以在第 [15](#A314621_5_En_15_Chapter.html) 章了解更多关于 Composer\
    \ 的信息。\n\n还记得关于副作用的规则吗？一个 PHP 文件应该声明类、接口、函数等；或者执行一个动作。但是，它不应该同时做这两件事。此脚本属于执行动作的类别。关键在于，它调用了\
    \ `require_once()` 来包含使用 `composer.json` 文件中的配置生成的自动加载代码。正因为如此，所有的类都被定位到了，尽管 `Ebook`\
    \ 被放置在了一个与其余代码完全不同的独立基础目录中。\n\n为什么要为同一个核心命名空间维护两个独立的目录？一个可能的原因是，你想将单元测试与生产代码分开管理。你也可以管理不会随系统每个版本一起发布的插件和扩展。\n\
    \n**Note**  \n请务必关注 [`http://www.php-fig.org/psr/`](http://www.php-fig.org/psr/)\
    \ 上的所有 PSR 标准。这是一个快速发展的领域，你很可能会发现与你相关的标准正在制定中。\n\n# 总结\n\n在本章中，我稍微纠结了一下标准可能不那么激动人心的可能性——然后论证了它们的力量。标准帮助我们解决了集成问题，这样我们就可以继续做更了不起的事情。我介绍了\
    \ PSR-1 和 PSR-2，即基本编码规范和更广泛的编码风格标准。接着，我讨论了 PSR-4，即自动加载器的标准。最后，我通过一个基于 Composer\
    \ 的示例，展示了在实际操作中符合 PSR-4 的自动加载。\n\n## 16. PHP 使用和创建组件\n### 使用 Composer\n\n程序员渴望生成可重用的代码。这是面向对象编程的伟大目标之一。我们喜欢将有用的功能从特定上下文的混乱中抽象出来，将一个特定的解决方案变成一个可以反复使用的工具。从另一个角度来看，如果程序员热爱可重用，他们就讨厌重复。通过创建可以复用的库，程序员避免在多个项目中实现类似的解决方案。\n\
    \n然而，即使我们在自己的代码中避免了重复，还有一个更广泛的问题。对于你创建的每一个工具，有多少其他程序员也实现了相同的解决方案？这造成了史诗般的浪费：程序员之间进行协作，集中精力将一个单一的工具做得更好，而不是产生大量同一主题的变体，难道不是更明智吗？\n\
    \n为了做到这一点，我们需要获取现有的库。但随后我们需要的包很可能还需要其他库才能工作。因此，我们需要一个能够处理下载和安装包，以及管理它们依赖关系的工具。这就是\
    \ Composer 的用武之地；它做了所有这些，甚至更多。\n\n本章将涵盖几个关键问题：\n\n*   **安装**：下载和设置 Composer\n\
    *   **需求**：使用 `composer.json` 获取包\n*   **版本**：指定版本，以便在不破坏系统的情况下获取最新代码\n*   **Packagist**：配置代码以供公共访问\n\
    *   **私有仓库**：利用私有仓库使用 Composer\n\n# 什么是 Composer？\n\n严格来说，Composer 是一个依赖管理器，而不是包管理器。这似乎是因为它在本地处理组件关系，而不是像\
    \ Yum 和 Apt 那样集中处理。如果你认为这是一个过于细微的区别，你可能是对的。无论我们如何定义它，Composer 允许你指定包。它将包下载到本地目录（`vendor`），查找并下载所有依赖项，然后通过一个自动加载器使所有这些代码对你的项目可用。\n\
    \n和往常一样，我们需要从获取工具开始。\n\n# 安装 Composer\n\n你可以从 [`https://getcomposer.org/download/`](https://getcomposer.org/download/)\
    \ 下载 Composer。你会在那里找到一个安装程序机制，但 `phar` 文件应该能满足大多数用途：\n\n```\n$ wget https://getcomposer.org/download/1.2.0/composer.phar\
    \ .\n$ chmod 755 composer.phar\n$ sudo mv composer.phar /usr/bin/composer\n```\n\
    \n我下载了归档文件并运行 `chmod` 来确保它是可执行的。然后我把它复制到一个中心位置，这样我就可以从系统的任何地方轻松运行它。现在我可以测试这个命令了：\n\
    \n```\n$ composer --version\nComposer version 1.2.0 2016-07-19 01:28:52\n```\n\
