    \ the execution of the program jumps to the function. After all code has been\
    \ executed, the program flow jumps to the instruction after the call to the function.\n\
    \nLet us look at some examples.\n\n### F-1\n\n```\nOutput: Hello\nWhy: No values\
    \ are passed into the function. However, the print\nstatement is executed.\nThe\
    \ function can also be placed at the bottom of the code. However,\nbe consistent.\
    \ Either place your functions at the top of the code or the\nbottom of the code.\
    \ Functions can also be included in a separate file\nthat can then be imported\
    \ into the main PHP program. We will look at\nthat example soon.\n```\n\n### F-2\n\
    \n```\nOutput: Hello\nWhy: This example accomplishes the same task. However, it\
    \ allows some\nflexibility by allowing the user to pass the value to be displayed.\n\
    Notice that the string was passed within the parentheses when the\nfunction was\
