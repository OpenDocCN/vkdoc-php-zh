    \ 模型中，放在其他属性和关联之后。\n\n**清单 8-14.** *Comment 模型中的 `vote()` 模型函数*\n\n```\n1\nfunction\
    \ vote($type=null,$id=null) {\n  if (!$id) {\n    return \"-\";\n  } else {\n\
    \    $votes = $this->read(null,$id);\n    $votes = ($type == 'up' ? $votes['Comment']['votes']+1\
    \ : $votes➥\n['Comment']['votes']-1);\n    $this->id = $id;\n    $this->saveField('votes',$votes);\n\
    \    return $votes;\n  }\n11 }\n```\n\n清单 8-14 的第 5 行从数据库中提取指定评论 ID 的票数。第 6 行根据投票类型对总数进行加\
    \ 1 或减 1。第 7-8 行使用 `saveField()` 函数将结果保存到数据库。此函数允许你仅更新行中的一个字段（或列），而无需为更常见的 `save()`\
    \ 函数格式化整个 `$this->data` 数组。当然，你需要告诉模型要更新哪条记录，这在第 7 行通过设置 `id` 属性完成。最后，在第 9 行，新的总数被返回给控制器以在视图中显示。\n\
    \n## 创建 Votes 视图\n\n最后一步是创建视图，供控制器动作在清单 8-13 的第 5 行渲染。这非常简单：它只需要在 Posts 视图中使用的同一个\
    \ `<div>` 元素内显示传递的值。清单 8-15 包含了 `app/views/comments/votes.ctp` 文件的代码。\n\n**清单\
    \ 8-15.** *使用 Votes 视图显示新的总数*\n\n```\n<div class=\"vote\"><?=$votes;?></div>\n\
    ```\n\n继续刷新 Posts 视图，并点击 Ajax 链接对评论进行投票。总票数应在后台自动更改，无需重新加载页面，而且这一切都没有通过提交表单实现，如图\
    \ 8-4 所示。使用 `$ajax->link()` 函数可以轻松地执行类似的异步任务，这种方式通常对用户来说更简单、更有趣。而且它肯定比手动编写所有实现此功能的\
    \ JavaScript 要好。\n\n![Image 40](img/index-151_1.png)\n\n**图 8-4.** *评论部分的 Ajax\
    \ 投票现在可以工作了。*\n\n## 使用 Ajax 助手做更多事情\n\n你还只是触及了 Ajax 助手所开启可能性的表面。如表 8-1 所示，Ajax\
