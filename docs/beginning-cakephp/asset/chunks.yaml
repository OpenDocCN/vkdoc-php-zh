    \ 函数实例化控制器对象。这样，控制器中的所有函数都可以使用 `$this->controller` 来访问父控制器中的任何内容。\n\n```\nfunction\
    \ startup(&$controller) {\n    $this->controller = $controller;\n}\n```\n\n现在，在一个占位函数中，你可以从父控制器中拉取参数并在组件中使用它们：\n\
    \n```\nfunction test() {\n    $params = $this->controller->params;\n    $data\
    \ = $params['data'];\n    return $data;\n}\n```\n\n### 编写供应商文件而非组件\n\n请记住，组件背后的理念是共享跨控制器的可移植函数代码。理论上，你应该能够分发任何组件，并且它应该适用于任何\
    \ Cake 应用，无论该应用是如何设计的。如果代码不符合 CakePHP 框架或 MVC 模型，那么你应该创建供应商文件，而不是组件。通过遵守这一标准，你可以确保其他\
    \ Cake 开发者能够从你的工作中受益，反之亦然。\n\n与助手一样，组件旨在减少控制器中多余的代码。\n\n当控制器开始看起来比模型更臃肿时，你通常需要寻找方法将更多代码迁移到模型中。当代码在多个控制器之间共享时，你可能需要考虑将该逻辑放入组件中，并使代码比在特定控制器或\
    \ Cake 应用中更具可移植性。从长远来看，你的网站将组织得更好、更整洁、更轻量——这些总是值得多花一步功夫的好理由。\n\n## 总结\n"
- fmt: '# Components


    Components extend the controller like helpers extend the view. They provide a
    set of functions and methods that are specific to a certain overall scheme to
    the controller and are designed with portability in mind. In other words, if you’ve
    built your components right, you should be able to distribute them for use in
    any Cake application. In this chapter, I discussed how to include a component
    class in the controller and how to put its functions to work. You wrote some user
    authentication methods into your blog application using the `Auth` component to
    better secure areas of the site and limit access to the general user. This chapter
    also explained how to work Cake’s utility classes into your application. Many
    of these classes condense the time and code involved to perform some typical web-related
    tasks such as reading and writing files and folders. I outlined some other utility
    classes, and I discussed some important differences between vendor files, utilities,
    and components. In Chapter 12, I’ll go into more detail about vendors and how
    to use them in your Cake project.


    # Vendors


    One of the benefits of using Cake is that it is built on PHP, one of the most
    popular languages in web development. Thousands of developers from across the
    globe actively contribute to the available body of PHP classes and scripts, which
    makes using PHP advantageous. However, a major concern of PHP developers choosing
    a framework is how to port over existing projects or use those long hours of developing
    their own classes in the framework.


    PHP uses the `include()` and `require()` functions to reference external scripts
    or multiple files. Why not just run one of these to implement an outside script?
    Again, Cake’s “convention over configuration” mantra applies. Cake is concerned
    not just with providing shortcuts and automating typical web functions but also
    with ways of naming and arranging the various application resources. Rather than
    arbitrary includes, Cake suggests that any third-party script or non-Cake objects
    be organized as vendors.


    ## Using Vendors


    Simply put, a *vendor* is a non-Cake script of some kind. For example, let’s say
    you want to include a snazzy PHP class script you found on the Internet that simplifies
    generating CAPTCHA images. You can assume that the developer was not thinking
    of CakePHP specifically when building the script, so its functions and classes
    won’t be structured to work in Cake. No problem—you just have to bring the script
    into the application as a vendor.


    The first step is to place the PHP script into the `app/vendors` folder. By doing
    so, you make the script available to the Cake application while keeping all the
    vendors in one place.


    You won’t need to rename the file to fit Cake’s conventions.


    Next, you include the file’s contents in the controller, model, or view where
    you’d like to use the script. You do this by using the `App::import()` function
    (see Listing 12-1).


    **Listing 12-1.** *Including a Vendor*


    ```php

    <?php


    App::import(''Vendor'',''some_captcha_script.php'');

    ```


    Notice that in Listing 12-1 the first parameter is `Vendor`; this tells Cake to
    import a vendor file. Also, I’ve included the standard PHP opening line, `<?php`,
    to emphasize where this function is called: before any class declarations. So
    if Listing 12-1 occurred in the `Posts` controller, the `App::import()` function
    would appear before the class declarations:


    ```php

    <?php


    App::import(''Vendor'',''some_captcha_script.php'');


    class PostsController extends AppController { …

    ```


    Finally, you can use the vendor’s contents in the controller or view by simply
    calling its functions or classes as if it were brought in with the `include()`
    function (see Listing 12-2).


    **Listing 12-2.** *An Example Vendor Function Being Used in the Controller*


    ```php

    <?php


    App::import(''Vendor'',''some_captcha_script.php'');


    class PostsController extends AppController {


    function index() {


    $captcha = new someCaptchaClass();


    $captcha_image = $captcha->generateImage();


    $this->set(compact(''captcha'',''captcha_image''));


    }


    }

    ?>

    ```


    Remember that Listing 12-2 is a basic example that would require more work to
    be done in the view to work properly. But you can see how the vendor is imported
    on line 2 and how its class object is brought into the controller on lines 5–6.


    Using vendor functions without class objects is just as simple. Let’s assume the
    contents of `some_captcha_script.php` include just one function:


    ```php

    function cleanAmpersands($text=null) {


    return str_replace(''&'',''&amp;'',$text);


    }

    ```


    Then, in the action, simply use the function as in a normal PHP script:


    ```php

    function view($id=null) {


    $post = $this->Post->read(null,$id);


    $text = cleanAmpersands($post[''Post''][''contents'']);


    $this->set(compact(''post'',''text''));


    }

    ```


    Referencing outside scripts through the vendor system can be extremely useful,
    especially when you want to use available scripts that are not constructed as
    Cake functions. Using the `App::import()` function makes this a simple task, keeps
    vendors organized, and manages the paths to the vendor files.


    ## Dealing with File Names


    The `App::import()` function is used for more than just including vendors. Other
    Cake core class objects can be brought into a controller or view with this function
    as well. Because of this, `App::import()` performs some default methods that affect
    how you specify a vendor file for inclusion in the application. Cake will automatically
    include vendor files based on the name as long as the specified name is all lowercase
    and matches the file name exactly. This means you must specify the vendor by using
    all lowercase letters. If a file name is uppercased, title-cased, camel-cased,
    or anything other than all lowercase, the vendor will not be automatically included,
    and more parameters will need to be provided.


    `App::import(''Vendor'',''Title'');` //will not bring in the file `Title.php`


    If the vendor file is in a folder or has any uppercase letters, then you must
    manually specify the file name using a parameters array. To bring `Title.php`
    into the controller, you would have to pass along the file name in the parameters
    array or rename the file itself:


    `App::import(''Vendor'',''title'',array(''file''=>''Title.php''));`


    ## Dealing with Nested Folders


    Suppose the vendor you’re importing into the application has an internal folder
    structure that needs to be preserved if it is to work properly. The `App::import()`
    function can also take care of vendors in these folders so long as the path supplied
    is correctly formatted. Remember that all paths will be relative to the `app/vendors`
    directory.


    `App::import(''Vendor'',''title'',array(''file''=>''my_vendors/title.php''));`


    The previous line will include the `app/vendors/my_vendors/title.php` file for
    use in the application.


    ## Making No Assumptions for Third-Party Scripts


    An important point about vendors must be made: Cake makes *no assumptions* about
    vendors. Doing so would contradict the whole purpose of having a vendor in a Cake
    application in the first place. In other words, the main reason you might use
    a vendor in a Cake application is to take advantage of a feature, method, or task
    that Cake cannot already handle by itself. So if you pull a third-party script
    into Cake that performs methods Cake doesn’t understand, then you must accept
    that Cake cannot help if anything goes wrong.'
  raw: 'Components extend the controller like helpers extend the view. They provide
    a set of functions and methods that are specific to a certain overall scheme to
    the controller and are designed with portability in mind. In other words, if you’ve
    built your components right, you should be able to distribute them for use in
    any Cake application. In this chapter, I discussed how to include a component
    class in the controller and how to put its functions to work. You wrote some user
    authentication methods into your blog application using the Auth component to
    better secure areas of the site and limit access to the general user. This chapter
    also explained how to work Cake’s utility classes into your application. Many
    of these classes condense the time and code involved to perform some typical web-related
    tasks such as reading and writing files and folders. I outlined some other utility
    classes, and I discussed some important differences between vendor files, utilities,
    and components. In Chapter 12, I’ll go into more detail about vendors and how
    to use them in your Cake project.


    09775ch12final 7/1/08 9:52 PM Page 207


    C H A P T E R 1 2


    Vendors


    **O**ne of the benefits of using Cake is that it is built on PHP, one of the most
    popular languages in web development. Thousands of developers from across the
    globe actively contribute to the available body of PHP classes and scripts, which
    makes using PHP advantageous. However, a major concern of PHP developers choosing
    a framework is how to port over existing projects or use those long hours of developing
    their own classes in the framework.


    PHP uses the include() and require() functions to reference external scripts or
    multiple files. Why not just run one of these to implement an outside script?
    Again, Cake’s “convention over configuration” mantra applies. Cake is concerned
    not just with providing shortcuts and automating typical web functions but also
    with ways of naming and arranging the various application resources. Rather than
    arbitrary includes, Cake suggests that any third-party script or non-Cake objects
    be organized as vendors.


    **Using Vendors**


    Simply put, a *vendor* is a non-Cake script of some kind. For example, let’s say
    you want to include a snazzy PHP class script you found on the Internet that simplifies
    generating CAPTCHA1 images. You can assume that the developer was not thinking
    of CakePHP specifically when building the script, so its functions and classes
    won’t be structured to work in Cake. No problem—you just have to bring the script
    into the application as a vendor.


    The first step is to place the PHP script into the app/vendors folder. By doing
    so, you make the script available to the Cake application while keeping all the
    vendors in one place.


    You won’t need to rename the file to fit Cake’s conventions.


    Next, you include the file’s contents in the controller, model, or view where
    you’d like to use the script. You do this by using the App::import() function
    (see Listing 12-1).


    **Listing 12-1.** *Including a Vendor*


    <?php


    App::import(''Vendor'',''some_captcha_script.php'');


    1\. “Completely Automated Public Turing test to tell Computers and Humans Apart”;
    in other words, by supplying images that are difficult for a computer to decipher
    but easy for a human to read, the web site can differentiate between automated
    requests and legitimate user form submissions.


    **207**


    09775ch12final 7/1/08 9:52 PM Page 208


    **208**


    C H A P T E R 1 2 ■ V E N D O R S


    Notice that in Listing 12-1 the first parameter is Vendor; this tells Cake to
    import a vendor file. Also, I’ve included the standard PHP opening line, <?php,
    to emphasize where this function is called: before any class declarations. So
    if Listing 12-1 occurred in the Posts controller, the App::import() function would
    appear before the class declarations:


    <?php


    App::import(''Vendor'',''some_captcha_script.php'');


    class PostsController extends AppController { …


    Finally, you can use the vendor’s contents in the controller or view by simply
    calling its functions or classes as if it were brought in with the include() function
    (see Listing 12-2).


    **Listing 12-2.** *An Example Vendor Function Being Used in the Controller* 1


    <?php


    App::import(''Vendor'',''some_captcha_script.php'');


    class PostsController extends AppController {


    function index() {


    $captcha = new someCaptchaClass();


    $captcha_image = $captcha->generateImage();


    $this->set(compact(''captcha'',''captcha_image''));


    }


    }


    ?>


    Remember that Listing 12-2 is a basic example that would require more work to
    be done in the view to work properly. But you can see how the vendor is imported
    on line 2 and how its class object is brought into the controller on lines 5–6.


    Using vendor functions without class objects is just as simple. Let’s assume the
    contents of some_captcha_script.php include just one function:


    function cleanAmpersands($text=null) {


    return str_replace(''&'',''&amp;'',$text);


    }


    Then, in the action, simply use the function as in a normal PHP script: function
    view($id=null) {


    $post = $this->Post->read(null,$id);


    $text = cleanAmpersands($post[''Post''][''contents'']);


    $this->set(compact(''post'',''text''));


    }


    Referencing outside scripts through the vendor system can be extremely useful,
    especially when you want to use available scripts that are not constructed as
    Cake functions. Using the App::import() function makes this a simple task, keeps
    vendors organized, and manages the paths to the vendor files.


    09775ch12final 7/1/08 9:52 PM Page 209


    C H A P T E R 1 2 ■ V E N D O R S


    **209**


    **Dealing with File Names**


    The App::import() function is used for more than just including vendors. Other
    Cake core class objects can be brought into a controller or view with this function
    as well. Because of this, App::import() performs some default methods that affect
    how you specify a vendor file for inclusion in the application. Cake will automatically
    include vendor files based on the name as long as the specified name is all lowercase
    and matches the file name exactly. This means you must specify the vendor by using
    all lowercase letters. If a file name is uppercased, title-cased, camel-cased,
    or anything other than all lowercase, the vendor will not be automatically included,
    and more parameters will need to be provided.


    App::import(''Vendor'',''Title''); //will not bring in the file Title.php If the
    vendor file is in a folder or has any uppercase letters, then you must manually
    specify the file name using a parameters array. To bring Title.php into the controller,
    you would have to pass along the file name in the parameters array or rename the
    file itself: App::import(''Vendor'',''title'',array(''file''=>''Title.php''));


    **Dealing with Nested Folders**


    Suppose the vendor you’re importing into the application has an internal folder
    structure that needs to be preserved if it is to work properly. The App::import()
    function can also take care of vendors in these folders so long as the path supplied
    is correctly formatted. Remember that all paths will be relative to the app/vendors
    directory.


    App::import(''Vendor'',''title'',array(''file''=>''my_vendors/title.php'')); The
    previous line will include the app/vendors/my_vendors/title.php file for use in
    the application.


    **Making No Assumptions for Third-Party Scripts**


    An important point about vendors must be made: Cake makes *no assumptions* about
    vendors.


    Doing so would contradict the whole purpose of having a vendor in a Cake application
    in the first place. In other words, the main reason you might use a vendor in
    a Cake application is to take advantage of a feature, method, or task that Cake
    cannot already handle by itself. So if you pull a third-party script into Cake
    that performs methods Cake doesn’t understand, then you must accept that Cake
    cannot help if anything goes wrong.'
  trans: '

    # 组件


    组件对控制器的扩展，就像辅助器对视图的扩展一样。它们为控制器提供了一组特定于某种整体方案的功能和方法，并且其设计考虑了可移植性。换句话说，如果你正确地构建了组件，就应该能够分发它们，供任何
    Cake 应用程序使用。在本章中，我讨论了如何在控制器中包含一个组件类，以及如何使用它的功能。你使用 `Auth` 组件在你的博客应用程序中编写了一些用户身份验证方法，以更好地保护网站的区域，并限制普通用户的访问。本章还解释了如何将
    Cake 的实用工具类集成到你的应用程序中。其中许多类压缩了执行某些典型 Web 任务（如读写文件和文件夹）所需的时间和代码。我概述了一些其他的实用工具类，并讨论了供应商文件、实用工具和组件之间的一些重要区别。在第
    12 章中，我将更详细地介绍供应商以及如何在你的 Cake 项目中使用它们。


    # 供应商


    使用 Cake 的好处之一是它构建于 PHP 之上，而 PHP 是 Web 开发中最流行的语言之一。来自全球各地的数千名开发者积极地为可用的 PHP 类和脚本库做出贡献，这使得使用
    PHP 具有优势。然而，选择框架的 PHP 开发者面临的一个主要问题是，如何移植现有项目，或者如何在框架中使用他们花费大量时间开发的自己的类。


    PHP 使用 `include()` 和 `require()` 函数来引用外部脚本或多个文件。为什么不直接运行其中一个来实现外部脚本呢？再次强调，Cake
    的“约定优于配置”原则适用。Cake 不仅关心提供快捷方式和自动化典型的 Web 函数，还关心命名和排列各种应用程序资源的方式。Cake 建议，与其随意包含文件，不如将任何第三方脚本或非
    Cake 对象组织为供应商。


    ## 使用供应商


    简单来说，*供应商* 是某种类型的非 Cake 脚本。例如，假设你想包含一个你在互联网上找到的、能简化生成 CAPTCHA 图片的、炫酷的 PHP 类脚本。你可以假设该开发者在构建该脚本时并没有特别考虑
    CakePHP，因此它的函数和类的结构不适合在 Cake 中工作。没问题——你只需将该脚本作为供应商引入应用程序。


    第一步是将 PHP 脚本放入 `app/vendors` 文件夹。通过这样做，你可以让 Cake 应用程序使用该脚本，同时将所有供应商文件集中在一个地方。


    你不需要重命名文件以符合 Cake 的约定。


    接下来，在你想要使用该脚本的控制器、模型或视图中包含该文件的内容。你可以使用 `App::import()` 函数来实现这一点（参见列表 12-1）。


    **列表 12-1.** *包含一个供应商*


    ```php

    <?php


    App::import(''Vendor'',''some_captcha_script.php'');

    ```


    请注意，在列表 12-1 中，第一个参数是 `Vendor`；这告诉 Cake 导入一个供应商文件。此外，我包含了标准的 PHP 起始行 `<?php`，以强调此函数被调用的位置：在任何类声明之前。因此，如果列表
    12-1 出现在 `Posts` 控制器中，那么 `App::import()` 函数将出现在类声明之前：


    ```php

    <?php


    App::import(''Vendor'',''some_captcha_script.php'');


    class PostsController extends AppController { …

    ```


    最后，你可以像使用 `include()` 函数引入的脚本一样，通过简单地调用其函数或类，在控制器或视图中使用供应商的内容（参见列表 12-2）。


    **列表 12-2.** *在控制器中使用供应商函数的示例*


    ```php

    <?php


    App::import(''Vendor'',''some_captcha_script.php'');


    class PostsController extends AppController {


    function index() {


    $captcha = new someCaptchaClass();


    $captcha_image = $captcha->generateImage();


    $this->set(compact(''captcha'',''captcha_image''));


    }


    }

    ?>

    ```


    请记住，列表 12-2 是一个基础示例，需要在视图中做更多工作才能正常运行。但你可以看到供应商在第 2 行被导入，其类对象在第 5-6 行被引入到控制器中。


    在没有类对象的情况下使用供应商函数也同样简单。假设 `some_captcha_script.php` 的内容只包含一个函数：


    ```php

    function cleanAmpersands($text=null) {


    return str_replace(''&'',''&amp;'',$text);


    }

    ```


    然后，在操作方法中，像在普通的 PHP 脚本中一样使用该函数：


    ```php

    function view($id=null) {


    $post = $this->Post->read(null,$id);


    $text = cleanAmpersands($post[''Post''][''contents'']);


    $this->set(compact(''post'',''text''));


    }

    ```


    通过供应商系统引用外部脚本非常有用，尤其是当你想要使用那些并非构造成 Cake 函数的现有脚本时。使用 `App::import()` 函数可以使这项任务变得简单，保持供应商的组织性，并管理到供应商文件的路径。


    ## 处理文件名


    `App::import()` 函数不仅仅用于包含供应商。其他 Cake 核心类对象也可以使用此函数引入到控制器或视图中。正因为如此，`App::import()`
    会执行一些默认方法，这些方法会影响你指定要包含在应用程序中的供应商文件的方式。只要指定的名称全部小写并且与文件名完全匹配，Cake 就会根据名称自动包含供应商文件。这意味着你必须使用全小写字母来指定供应商。如果文件名是大写、首字母大写、驼峰式大小写或任何非全小写的形式，则供应商不会被自动包含，并且需要提供更多参数。


    `App::import(''Vendor'',''Title'');` //不会引入文件 `Title.php`


    如果供应商文件在某个文件夹中或包含任何大写字母，则你必须使用参数数组手动指定文件名。要将 `Title.php` 引入控制器，你必须在参数数组中传递文件名，或者重命名文件本身：


    `App::import(''Vendor'',''title'',array(''file''=>''Title.php''));`


    ## 处理嵌套文件夹


    假设你要导入到应用程序中的供应商有一个内部文件夹结构，为了使其正常工作，需要保留该结构。只要提供的路径格式正确，`App::import()` 函数也可以处理这些文件夹中的供应商。请记住，所有路径都相对于
    `app/vendors` 目录。


    `App::import(''Vendor'',''title'',array(''file''=>''my_vendors/title.php''));`


    上面这行代码将包含 `app/vendors/my_vendors/title.php` 文件，供应用程序使用。


    ## 不对第三方脚本做任何假设


    关于供应商，有一点很重要：Cake 对供应商*不做任何假设*。这样做首先会与在 Cake 应用程序中使用供应商的初衷相矛盾。换句话说，你在 Cake 应用程序中使用供应商的主要原因，可能是利用
    Cake 本身无法处理的某个特性、方法或任务。因此，如果你将一个执行 Cake 无法理解方法的第三方脚本引入 Cake，那么你必须接受，如果出现问题，Cake
    无法提供帮助。

