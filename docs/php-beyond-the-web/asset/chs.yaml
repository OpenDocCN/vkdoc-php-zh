  \ |\n\n## 3. 理解 CLI SAPI 及其必要性\n\n正如我们在第 2 章中提到的，你进行的大部分系统编程都将涉及使用 PHP CLI SAPI。因此，深入了解如何使用它、配置和运行它的选项，以及它与你所熟悉的基于\
  \ Web 的 SAPI 有何不同，就显得十分重要。幸运的是，差异很小，而且许多是直观的，不过仍然值得完整阅读本章，因为 CLI SAPI 是大多数代码运行的基础。\n\
  \n\n### 3.1 CLI SAPI 有何不同？\n\n以下是 CLI SAPI 与标准 Web 实现之间的主要差异列表：\n\n- 默认情况下，输出中不会写入任何\
  \ HTTP 头。这很好理解，因为在命令行中它们毫无意义，只会成为打印在真实输出上方多余的文本。如果你的输出之后要被传输到网络浏览器，你需要手动添加必要的头信息（例如通过使用\
  \ `header()` PHP 函数）。\n- PHP 不会将工作目录更改为正在执行的 PHP 脚本所在目录。要手动执行此操作，请使用 `getcwd()`\
  \ 和 `chdir()` 来获取和设置当前目录。否则，当前工作目录将是你调用脚本时所在的目录。例如，如果你当前在 `/home/rob` 目录下，并且键入了\
  \ `php /home/peter/some_script.php`，那么 PHP 中使用的工作目录将是 `/home/rob`，而不是 `/home/peter`。\n\
  - 任何错误或警告消息都以纯文本形式输出，而不是 HTML 格式化文本。如果你希望得到 HTML 格式的错误提示，例如当你正在生成静态 HTML 文件时，可以通过在你的脚本中使用\
  \ `ini_set('html_errors', 1);` 将 `html_errors` 运行时配置指令设置为 true 来覆盖此行为。\n- PHP 会隐式地立即“刷新”所有输出，并且默认不进行缓冲。将输出直接发送到浏览器通常会损害在线性能，因此输出会被缓冲，并在缓冲区满时以最佳大小的块发送出去。离线时这不太可能成为问题，因此像\
  \ `print` 和 `echo` 这类结构产生的 HTML 块和输出会直接发送到 shell。当你等待后续输出时，无需使用 `flush()` 来清除缓冲区。如果你愿意，仍然可以使用\
  \ PHP 的输出缓冲函数来捕获和控制输出，更多信息请参考 PHP 手册中的“输出控制函数”部分。\n- 没有设置执行时间限制。你的脚本将持续运行，直到它自行退出，即使它挂起，PHP\
  \ 也不会终止它。如果你想为行为异常的脚本设置时间限制，可以在脚本中使用 `set_time_limit()` 函数来实现。\n- `$argc` 和 `$argv`\
  \ 这两个描述传递给脚本的命令行参数的变量会自动设置。这些变量将在本章后面部分详细讨论。\n- PHP 定义了与同名的标准流相关的常量 `STDIN`、`STDOUT`\
  \ 和 `STDERR`，并自动为它们打开 I/O 流。这些常量让你的应用程序能够即时访问“标准输入”（STDIN）、“标准输出”（STDOUT）和“标准错误”（STDERR）流。\n\
  \n| ![信息](img/image00248.jpeg) | **延伸阅读** PHP 手册中的输出控制函数 [`www.php.net/manual/en/ref.outcontrol.php`](http://www.php.net/manual/en/ref.outcontrol.php)\
  \ 维基百科上的标准流（`STDIN`、`STDOUT`、`STDERR`）[`en.wikipedia.org/wiki/Standard_streams`](http://en.wikipedia.org/wiki/Standard_streams)\
  \ |\n\n### 3.2 CLI SAPI 安装\n\n要使用 PHP CLI SAPI，你可能需要先安装它。附录 A 提供了安装（以及必要时编译）PHP\
  \ 的详细信息。然而，你可能会发现，如果你已经安装了 PHP，它可能已经安装好了（通常位于 PHP 程序文件夹中一个名为 `sapi/cli` 的文件夹内），如果没有，它通常可以在现代操作系统软件仓库中找到（例如，在\
  \ Ubuntu 中有一个名为 `php5-cli` 的包，可以通过任何包管理器或通过命令 `sudo apt-get install php5-cli` 在命令行中安装）。如果它安装在命令行搜索路径中，在命令行中键入\
  \ `php -v` 将打印版本详细信息，确认它确实已安装。\n\n### 3.3 PHP 命令行选项\n\nPHP 二进程序会接受许多影响其操作方式的命令行选项/开关/参数。可以通过键入\
  \ `php -h` 查看完整列表。虽然有些仅适用于 CGI SAPI，但以下是在与 CLI SAPI 交互时使用的一些更有趣且常见的选项：\n\n- `-f`\
  \ *或* `--file`\n\n此选项允许你指定要运行的脚本的文件名，并且是可选的。`-f` 选项的存在是为了与某些软件和脚本（例如自动化软件）兼容，这些软件可以编程方式调用命令行程序，但要求文件名参数以此种方式形成。它还允许在\
  \ Windows 上为 PHP 脚本轻松设置默认文件类型处理程序。上述命令两种形式在使用上的唯一真正区别在于解释传递给脚本的命令行参数时，我们将在下面的“你的脚本的命令行参数”部分中讨论这一点。大多数情况下，下面两行基本等效：\n\
  \n```\n1 ~$ php -f myscript.php\n2 ~$ php myscript.php\n```\n\n- `-a` *或* `--interactive`\n\
  \n交互式运行 PHP。这允许你逐行输入 PHP 代码，而不是执行已保存的 PHP 脚本。这种操作模式通常被称为“REPL”（Read-Eval-Print-Loop，读取-求值-打印-循环）。它不仅为测试和开发代码提供了交互式界面，还可以充当增强的\
  \ PHP 功能的 shell 或命令行，在下一章关于开发工具的内容中，我们将更深入地研究它和其他第三方 PHP REPL。\n\n- `-c` *或* `--php-ini`\n\
  \n指定 PHP 将用于此应用程序的 PHP `ini` 文件。如果你在同一台机器上还使用 PHP 运行 Web 服务，这将特别有用，因为如果未指定，PHP 将查找各种默认位置以寻找\
  \ `php.ini`，并可能最终使用与你的 Web 服务相同的文件。通过为你的 CLI 应用程序专门提供一个 `php.ini` 文件，你可以“开放”各种更适合离线应用程序的限制。请注意，通过使用\
  \ CLI SAPI，无论你是否使用此选项指定自定义 `ini` 文件，PHP 都会自动覆盖多个 `php.ini` 设置。这些被覆盖的设置正是影响上述“CLI\
  \ SAPI 有何不同？”中所述行为的那部分设置，虽然在这些情况下 `php.ini` 文件被忽略，但你可以在代码中直接使用 `ini_set()` 函数或类似方法恢复或更改这些设置。你也可以使用\
  \ `-d` 或 `--define` 选项来设置选项（例如 `php -d max_execution_time=2000 myscript.php`）。如果你要将软件部署到你无法控制的机器上（例如，如果你在销售软件供用户在其自己的机器上安装），那么使用这些机制之一来确保\
  \ PHP 将使用你期望的设置运行，而不是用户可能碰巧设置的设置，这样做是合理的。另请参阅下面的 `-n`。\n\n- `-n` *或* `--no-php-ini`\n\
  \n这个选项告诉 PHP 根本不加载任何 `php.ini` 文件。如果你不希望随应用程序附带 `php.ini` 文件，而是希望直接在代码中使用 `ini_set()`\
  \ 或类似方法设置所有设置，这会很有用。如果没有提供 `ini` 文件，PHP 将使用其默认设置，并且值得记住的是，这些默认设置可能会随 PHP 版本的不同而变化（并且过去确实如此）。你不应该依赖当前的默认设置适合你的应用程序。你可以使用\
  \ `php --ini` 来显示当未使用 `-n` 选项且未使用 `-c` 指定文件时，PHP 将查找 `ini` 文件的默认路径。\n\n- `-e` *或*\
  \ `--profile-info`\n\n这将 PHP 置于“扩展信息模式”。EIM 会生成供性能分析器和调试器使用的额外信息。如果你没有使用需要此模式的性能分析器或调试器，则不应启用它，因为它会降低性能。有关性能分析器和调试器的更多信息，请参阅下一章。\n\
  \n- `-i` *或* `--info`\n\n\n\n调用`phpinfo()`函数并打印其输出。该函数以纯文本格式（而非通常的 HTML 格式）输出关于\
  \ PHP 安装的*大量*信息（它会检测到我们正通过 CLI SAPI 调用它）。这对于排查安装本身的问题非常有用，同时也能提供版本信息、已安装扩展列表、相关文件路径等。与任何其他\
  \ shell 命令一样，其输出可以通过管道传递给其他命令，例如`grep`。因此，如果你想检查 PHP 二进制文件中是否启用了 IPv6，可以尝试：\n\n\
  ```\n1 ~$ php -i | grep -i \"ipv6\"\n```\n\n* `-l` *或* `--syntax-check`\n\n解析文件，检查语法错误。这是一个基本的“lint”类型检查器，更高级的静态代码分析工具将在下一章讨论。请注意，此选项仅检查会导致\
  \ PHP 引擎失败的基本语法错误。更微妙的错误、程序逻辑问题以及运行时产生的错误不会被检测到。你的代码不会被执行，因此它有助于在运行可能更改数据并在失败时导致问题的代码之前，提前发现基本错误。即使在测试环境中运行此类代码，重置数据并为下一次测试做准备也需要时间，因此首先快速检查基本语法错误可以节省时间。某些集成开发环境和文本编辑器会在后台运行`php\
  \ -l`，以便在你输入时高亮显示语法错误。例如，Github 的 Atom 编辑器中的 linter-php1 包就使用此方法对 PHP 代码进行实时 lint\
  \ 检查。\n\n* `-m` *或* `--modules`\n\n列出所有已加载的 PHP 和 Zend 模块/扩展。这些是 PHP 编译时包含的模块，可能包括“core”、“mysql”、“PDO”、“json”等。这对于检查\
  \ PHP 安装是否具有应用程序所需的功能非常有用。你也可以在脚本中使用`extension_loaded()`函数或调用`phpinfo()`函数进行检查。`-m`提供的信息是上面`-i`标志所提供信息的一个子集，而`-i`（或`phpinfo()`函数）将返回有关模块配置、版本等的更多信息。\n\
  \n* `-r` *或* `--run`\n\n运行作为参数提供的单行 PHP 代码，而不是从文件执行它。该行代码应包含在单引号内，因为像 bash 这样的 shell\
  \ 如果使用双引号，会尝试将 PHP 变量当作 shell 变量进行插值。其作用类似于`-a`交互模式，不同之处在于每行代码执行后，PHP 的“状态”会被清除。这意味着提供的代码行被视为要执行的整个脚本，执行完毕后即终止。示例如下：\n\
  \n```\n1 ~$ php -r 'echo (2+2).\"\\n\";'\n```\n\n这将打印出`4`并换行。请注意，该行必须是语法正确的 PHP，所以不要漏掉结尾的分号！我们将在本章后面的“调用\
  \ PHP 脚本的多种方法”一节中再次讨论`-r`。\n\n* `-B` *或* `--process-begin`\n  `-R` *或* `--process-code`\n\
  \  `-F` *或* `--process-file`\n  `-E` *或* `--process-end`\n\n这四个参数允许你指定在 PHP 处理来自`STDIN`的输入之前、期间和之后执行的\
  \ PHP 代码。`-B`指定在处理输入之前要执行的一行代码，`-R`指定对每一行输入要执行的一行代码，而`-F`指定对每一行要执行的一个 PHP 文件。最后，`-E`在处理过程结束时执行一行代码。在`-R`和`-F`中，有两个特殊变量可用：`$argn`（正在处理的行的文本）和`$argi`（正在处理的行的编号）。这在直接在\
  \ shell 脚本中使用 PHP 时非常有用。例如，要打印带有行号的文本文件，你可以执行如下操作：\n\n```\n1 ~$ cat my_text_file.txt\
  \ | php -B 'echo \"Lets add line numbers...\\n\";'\n2       -R 'echo \"$argi: $argn\\\
  n\";' -E 'echo \"That''s the end folks\\n\";'\n```\n\n这将输出类似以下内容：\n\n```\n1 Lets\
  \ add line numbers...\n2 1: Lorem ipsum dolor sit amet, consectetur adipisicing\
  \ elit, sed do \n3 2: eiusmod tempor incididunt ut labore et dolore magna aliqua.\
  \ Ut enim ad\n4 3: minim veniam, quis nostrud exercitation ullamco laboris nisi\
  \ ut aliquip\n5 4: ex ea commodo consequat. Duis aute irure dolor in reprehenderit\
  \ in \n6 That's the end folks\n```\n\n* `-S` *或* `--server`\n\n这将启动内置的开发 Web 服务器，它类似于\
  \ Apache 或 Nginx 的精简版本，可用于在本地测试或运行单个网站实例。我们将在第 5 章中深入探讨这一点，届时将研究如何使用它来创建基于 HTML\
  \ 的本地应用。\n\n* `-s` *或* `--syntax-highlight`\n\n这将输出 PHP 脚本的 HTML 版本，并带有彩色语法高亮。PHP\
  \ 脚本不会被执行或验证，只是被“美化”。美化后的 HTML 会打印到`STDOUT`，在仔细检查代码以查找错误、问题和优化时非常有用。此选项仅适用于文件中的\
  \ PHP 代码，不适用于通过`-r`选项提供的代码。大多数现代集成开发环境和代码编辑器默认提供语法高亮，但如果你只能通过命令行访问机器，并且使用的编辑器不支持语法高亮，那么此选项会很有用。在这种情况下，使用`-s`创建脚本的彩色版本，然后下载它，或者如果机器安装了\
  \ Web 服务器，则通过 Web 浏览器查看。\n\n* `-v` *或* `--version`\n\n这将输出 PHP 版本信息。这些信息也可以在以上`-i`选项的输出中找到。在假定特定格式时要小心，某些软件包仓库（例如\
  \ Ubuntu）会在版本字符串中包含其名称和自身的构建编号，因此不要仅仅为了查找任何数字而进行过滤。\n\n* `-w` *或* `--strip`\n\n\
  这会输出源代码的内容，并去除所有不必要的空白和注释。此选项只能用于代码文件（不能用于`-r`提供的代码行），并且不能与上面的语法高亮选项同时使用。它用于“压缩”文件，即减小文件大小。与普遍看法相反，这不会加速大多数脚本的执行，解析注释和空白的开销是极其微不足道的。即使保留了“完整”代码的副本，你也应警惕支持与调试问题，因为错误报告中的行号在原始版本和剥离版本之间将不再匹配。它也不会压缩像变量名这样的标识符，因此不能用于混淆代码。如今，使用此选项的理由已经非常少。为了分发而减小文件大小，使用适当的压缩（例如添加到\
  \ zip 文件）通常是更好的方法。\n\n* `-z` *或* `--zend-extension`\n\n此选项指定在脚本运行前要加载的 Zend 扩展的文件名/路径。这允许动态加载扩展，如果扩展总是需要加载，也可以在`php.ini`文件中指定。\n\
  \n* `--rf` *或* `--rfunction`\n  `--rc` *或* `--rclass`\n  `--re` *或* `--rextension`\n\
  \  `--rz` *或* `--rzendextension`\n  `--ri` *或* `--rextinfo`\n\n\n  \n"
- "# PHP 命令行选项与脚本执行指南  \n\n## 使用反射探索 PHP 结构  \n\n这些选项允许你通过反射探索 PHP 结构。反射是 PHP 在运行时执行“内省”的过程，它可以让你在运行时检查代码中的元素和结构。上述前三个选项打印关于指定函数、类或扩展的反射信息。最后两个选项打印\
  \ Zend 扩展或标准扩展的基本信息，这些信息由 `phpinfo()` 函数返回。只有 PHP 编译时启用了反射支持，才能获取这些非常详细的反射信息。这些选项可以作为上述实体的快速但精确的参考指南，特别适用于检查他人编写的未知代码。\
  \  \n\n| ![信息](img/image00248.jpeg) | **延伸阅读** PHP 手册中的反射信息 [`www.php.net/manual/en/book.reflection.php`](http://www.php.net/manual/en/book.reflection.php)\
  \ Octavia Anghel 撰写的“PHP 中的内省与反射” [`www.sitepoint.com/introspection-and-reflection-in-php/`](http://www.sitepoint.com/introspection-and-reflection-in-php/)\
  \ |  \n|---|---|  \n\n### 3.4 脚本的命令行参数  \n\n如上所述，向 PHP 本身传递参数是直接且常规的。然而，为你的 PHP\
  \ 脚本传递参数则稍微复杂一些，因为 PHP 需要知道其自身参数的结束位置以及脚本参数的开始位置。通过一些示例来检查 PHP 如何处理这个问题是最好的方式。考虑以下\
  \ PHP 脚本：  \n\n```\n1 <?  \n\n3 echo \"Number of arguments given :\".$argc.\"\\\
  n\";  \n\n5 echo \"List of arguments given :\\n\";  \n\n7 print_r($argv);  \n```\
  \  \n\n上述脚本中有两个特殊变量：  \n\n- `$argc`：记录传递给脚本的命令行参数数量  \n- `$argv`：存储实际传递参数的数组  \n\
  \n将此脚本保存为 `arguments.php`。现在按如下方式调用它：  \n\n```\n1 ~$ php -e arguments.php -i -b=big\
  \ -l red white \"and blue\"  \n```  \n\n你将获得以下输出：  \n\n```\n 1 Number of arguments\
  \ given :7  \n 2 List of arguments given :  \n 3 Array  \n 4 (  \n 5     [0] =>\
  \ arguments.php  \n 6     [1] => -i  \n 7     [2] => -b=big  \n 8     [3] => -l\
  \  \n 9     [4] => red  \n10     [5] => white  \n11     [6] => and blue  \n12 )\
  \  \n```  \n\n如你所见，从命令行中的文件名开始的所有参数都被传递给了脚本。第一个参数 `-e` 由 PHP 自身使用，不会传递过去。因此，一般规则是：文件名之后的所有内容被视为脚本的参数，文件名之前的所有内容被视为\
  \ PHP 本身的参数，而文件名由二者共享。  \n\n当然，有一个例外。如上所述，除了单独指定脚本文件名外，我们还可以将其作为 `-f` 标志的一部分传递。因此，如果执行以下命令：\
  \  \n\n```\n1 ~$ php -e -f arguments.php -i -b=big -l red white \"and blue\"  \n\
  ```  \n\n我们会得到以下意外输出：  \n\n```\n 1 phpinfo()  \n 2 PHP Version => 5.4.6-1ubuntu1.3\
  \  \n\n 4 System => Linux dev-system 3.5.0-37-generic #58-Ubuntu SMP Mon Jul 8 22:10:2\\\
  \  \n 5 8 U  \n 6 TC 2013 i686  \n 7 Build Date => Jul 15 2013 18:23:34  \n 8 Server\
  \ API => Command Line Interface  \n 9 Virtual Directory Support => disabled  \n\
  10 Configuration File (php.ini) Path => /etc/php5/cli  \n11 <rest of output removed\
  \ for brevity>  \n```  \n\n你可能认出这是调用 `php -i` 的输出。PHP 没有将文件名之后的参数视为属于脚本，而是将 `-f`\
  \ 参数视为自己的参数，并继续“占有”后面所有参数。由于 `-i` 是有效的 PHP 参数，它认为这就是你想要的内容，并调用其“信息”模式。如果需要将文件名作为\
  \ `-f` 标志的一部分传递（而不是作为单独参数），则必须使用 `--` 分隔脚本的参数。因此，要使上述命令按预期工作，需要将其修改为：  \n\n```\n\
  1 ~$ php -e -f arguments.php -- -i -b=big -l red white \"and blue\"  \n```  \n\n\
  `--` 之后的所有内容以及脚本文件名都会被传递给脚本，这样就能获得我们期望的输出。  \n\n这可能会使脚本变得有些混乱，特别是当你传递大量参数时。因此，你可能需要查看下一节中关于自执行脚本的小节，它将展示如何将\
  \ PHP 参数嵌入到脚本本身，从而使脚本能够声明所有传递的参数归其所有。  \n\n### 3.5 调用 PHP 脚本的多种方式  \n\n从上一节的命令行选项中可以看出，使用\
  \ CLI SAPI 时有几种不同的执行 PHP 代码的方式。虽然我们已经介绍过其中一些，但为了完整性，这里再次进行讨论。  \n\n#### 3.5.1 从文件执行\
  \  \n\n你可以告诉 PHP 执行特定的 PHP 源代码文件。例如：  \n\n```\n1 php myscript.php  \n2 php -f myscript.php\
  \  \n```  \n\n注意 `-f` 是可选的，上述两行在功能上是等效的。上面详细描述的 PHP 命令行选项在适当时也适用于此方法。例如：  \n\n```\n\
  1 ~$ php -e myscript.php  \n```  \n\n将在扩展信息模式下执行文件 `myscript.php`。  \n\n与 Web 版本的\
  \ PHP 一样，源文件可以嵌入（混合）HTML（在命令行中更常用的是纯文本）。因此，你仍然需要 `<?` 或 `<?php` 标签，否则源代码将直接输出而不会被执行。\
  \  \n\n#### 3.5.2 从字符串执行  \n\n你可以使用 `-r` 标志执行单行代码：  \n\n```\n1 ~$ php -r 'echo(\"\
  Hello World!\\n\");'  \n```  \n\n许多其他命令行选项不适用于 `-r` 方法，例如语法高亮。注意 shell 变量替换（在代码周围使用单引号而非双引号）以及\
  \ shell 可能对代码进行的其他修改。除非确实是一次性快速操作，否则将相关代码行放入文件并执行该文件可能更安全、更简单。`-r` 选项的一个常见用途是执行由其他（可能非\
  \ PHP）shell 命令生成的 PHP 代码，这些代码需要在内存中执行而不触及磁盘（例如权限禁止磁盘访问时）。  \n\n\n\n\n#### 3.5.3\
  \ 从标准输入（STDIN）读取\n\n如果你没有指定文件，也未使用 `-r` 选项，PHP 会将 `STDIN` 的内容当作要执行的 PHP 代码，如下所示：\n\
  \n```\n1 ~$ echo '<? echo \"hello\\n\";?>' | php\n```\n\n你还可以将此方法与 `-B`、`-R`、`-F`\
  \ 和 `-E` 结合使用，从而使 PHP 成为 Shell 脚本中的“一等公民”，让你能够将数据通过管道传入和传出 PHP。例如，要反转文件中的每一行（或任何通过管道传入的数据源），可以使用：\n\
  \n```\n1 ~$ cat file.txt | php -R 'echo strrev($argn).\"\\n\";' | grep olleh\n```\n\
  \n在这行代码中，我们将一个文本文件的内容通过管道传入 PHP。`-R` 选项告诉 PHP 对输入的每一行执行后面的 PHP 代码，其中当前行存储在特殊变量 `$argn`\
  \ 中。在这个例子里，我们使用字符串反转函数 `strrev()` 反转 `$argn`，然后将反转后的字符串再次输出。任何 `echo` 的输出都会进入 `STDOUT`，这些输出要么直接打印到\
  \ Shell，要么（如本例所示）可以通过管道传给另一个 Shell 命令。在我们的例子中，之后使用 `grep` 只显示包含字符串 'olleh'（即 'hello'\
  \ 的反转）的行。关于 `-R` 及其相关选项的更多细节，请参见上一节。\n\n如果你想使用 `-R` 等选项，但 PHP 代码太多，不适合在命令行中编写，你可以将代码放入一个普通的\
  \ PHP 源文件中，然后使用 `include()` 包含它，例如：\n\n```\n1 ~$ cat something.txt > php -R 'include(\"\
  complicated.php\");'\n```\n\n如果是一个非简单的 PHP 脚本，更高效的做法是将其打包成函数，并使用 `-B` 选项（`-B` 表示在主代码之前执行）一次性包含该文件，然后在每次迭代中通过\
  \ `-R` 执行该函数。以下示例在开始时加载 `my_functions.php` 的内容一次，然后对数据文件 (`data.txt`) 中的每一行（即每个\
  \ `$argn`）调用该文件中的函数 `complicated()`。\n\n```\n1 php -B 'include(\"my_functions.php\"\
  );' -R 'complicated($argn);'\n2 \t-f 'data.txt'\n```\n\n尽管这些命令看起来相对简单，但你能放置在后面的\
  \ PHP 代码实际上没有任意限制。你可以使用类和对象、多个文件，以及本书中探讨的大部分代码和技术，只在 Shell 层面暴露函数或方法作为用户的接口。你还可以在\
  \ PHP 内部将标准流作为 PHP 流打开，并访问它们的文件指针来读取数据，从而无需使用 `-R`，这一点将在下一章中讨论。\n\n#### 3.5.4 作为自执行脚本：Unix/Linux\n\
  \n在 Unix/Linux 类型的系统上，你可以将 PHP 脚本文件制作成一个可直接执行的 Shell 命令。只需将脚本文件的第一行设置为 `#!` 行（通常读作“shebang\
  \ 行”或“hashbang 行”），并包含 PHP 二进制文件的路径，例如：\n\n```\n1 #!/usr/bin/php\n2 <?\n\n4 echo('Hello\
  \ World!');\n```\n\n然后使用 `chmod` 或类似命令设置可执行位，例如：\n\n```\n1 ~$ chmod a+x myscript.php\n\
  ```\n\n之后，只需在命令行输入 `./myscript.php` 即可执行它。你也可以重命名文件，去掉 `.php` 扩展名（假设你最初有这个扩展名），这样你只需输入：\n\
  \n```\n1 ~$ ./myscript\n```\n\n在 Shell 提示符下运行它。你还可以通过将其移动到 Shell 搜索路径中的某个目录，进一步简化，去掉前面的\
  \ `./`。请注意，以这种方式运行脚本时，任何命令行选项都会直接传递给脚本，而不是 PHP。实际上，你无法使用此方法在运行时向 PHP 传递额外的命令行参数，你必须在构建脚本时将它们包含在“shebang”行中。例如，在上面的示例中，如果你想使用“扩展信息模式（EIM）”，你需要将脚本的第一行改为：\n\
  \n```\n1 #!/usr/bin/php -e\n```\n\n如果你改成这样调用脚本：\n\n```\n1 ~$ myscript -e\n```\n\n\
  那么 `-e` 标志将作为参数传递给脚本，而不是直接传递给 PHP，因此 PHP 不会进入 EIM 模式。这对于包含大量用户提供参数的脚本很有用，但这也使得上面讨论的\
  \ `-B` 和 `-R` 等选项在处理 `STDIN` 数据时变得笨重，因为你必须将所有 PHP 代码放在更难以修改的 shebang 行上。不过，你可以简单地使用\
  \ `include()` 包含必要的文件，并使用标准文件流逐行处理 `STDIN` 流（由 CLI SAPI 自动为你创建并打开），而无需使用这些选项。\n\n\
  | ![信息](img/image00248.jpeg) | **延伸阅读** PHP 手册中的标准 IO 流信息 [`php.net/manual/en/features.commandline.io-streams.php`](http://php.net/manual/en/features.commandline.io-streams.php)\
  \ |\n\n如果你的脚本可能在其它系统上使用，请记住 PHP 二进制文件的位置通常与你系统上的位置不同。在这种情况下，如果你在 shebang 行中硬编码了路径，则需要在每个系统上更改它。幸运的是，如果正确安装，PHP\
  \ 会设置一个包含其位置的环境变量，可通过 `/usr/bin/env` Shell 命令访问。因此，如果你按如下方式更改 shebang 行，你的脚本应该可以在\
  \ PHP 所在的任何位置执行：\n\n```\n1 #!/usr/bin/env php\n```\n\n在 Windows 上，“shebang”行可以保留，因为\
  \ PHP 会识别并忽略它。但它不会像在 *nix 系统上那样执行文件。\n\n#### 3.5.5 作为自执行脚本：Windows\n\n类似地，在 Windows\
  \ 下也可以通过直接调用来执行脚本。但是，设置 Windows 以支持此功能的过程稍微复杂一些，需要修改注册表和文件关联。因此，我建议阅读官方 PHP 文档，其中对此有详细介绍。\n\
  \n| ![信息](img/image00248.jpeg) | **延伸阅读** 在 Windows 上设置 PHP 命令行环境 [`php.net/manual/en/install.windows.commandline.php`](http://php.net/manual/en/install.windows.commandline.php)\
  \ |\n\n#### 3.5.6 Windows php-win.exe\n\nWindows 版 PHP 还附带 `php-win.exe`，它与 CLI\
  \ 构建的 PHP 类似，区别在于它不会打开命令行窗口。这对于运行带有图形界面的应用程序（将在本书后面介绍）或守护程序类型的软件非常有用。\n\n| ![信息](img/image00248.jpeg)\
  \ | **延伸阅读** 关于在 Windows 上生成 `php-win.exe` 进程的有益评论 [`www.php.net/manual/en/features.commandline.php#62162`](http://www.php.net/manual/en/features.commandline.php#62162)\
  \ |\n\n### 3.6 “点击运行”你的 PHP\n\n在上一节中，我们探讨了 PHP 命令可以格式化的不同方式，并在命令行的上下文中展示了它们，即通过键入来运行。但让我们让事情变得更简单，为它们创建可点击的图标，这样我们就可以直接从桌面运行它们。如何实现这一点取决于具体的操作系统。\n\
  \n\n\n#### 3.6.1 可点击图标：Linux\n\n在大多数 Linux 系统上，特别是那些支持 freedesktop.org“桌面条目规范”标准的系统，你可以通过创建一个文本文件来生成一个可点击的“启动器”图标。大多数主流\
  \ Linux 发行版及其窗口管理器至少遵循该标准的基本要求。\n\n要为你的应用创建启动器，请在希望图标出现的文件夹（例如 `/home/rob/Desktop`）中创建一个文本文件，并将其命名为\
  \ `myscript.desktop`。**重要的是**，文件扩展名必须是 `.desktop`。在该文件中，添加以下内容：\n\n```  \n[Desktop\
  \ Entry]\nType=Application\nName=My Funky App\nTerminal=true\nExec=/usr/bin/php\
  \ /home/rob/scripts/myscript.php\nIcon=/usr/share/icons/gnome/32x32/actions/up.png\n\
  ```\n\n前两行告诉系统我们正在创建什么。`Name=` 行为你的启动器指定一个名称，该名称将显示在图标下方。`Terminal=` 行决定是否为此程序打开一个终端窗口。如果你创建的脚本需要从终端接收输入或向终端发送输出，则应将其设置为\
  \ `true`。如果你的脚本通过 GUI 元素与用户交互，则可能希望将其设置为 `false`。`Exec=` 指定用户点击图标时要执行的命令。正如我们在前几节中讨论的，这是调用\
  \ PHP 脚本的命令。最后，`Icon=` 行指向你的应用的一个漂亮图标的存放位置。你可以提供自己的图标文件，或使用系统提供的图标之一。这里我们使用了 Gnome\
  \ 的“向上”箭头图标，以暗示我们的脚本将使你公司的利润持续上涨。“向下”箭头图标也可用。你通常还需要使用 `chmod u+x myscript.desktop`\
  \ 或类似命令，为 `.desktop` 文件赋予执行权限。\n\n你还可以在此文件中设置许多其他选项，更多信息请参见以下标准站点。某些发行版对这些选项的支持程度有所不同。\n\
  \n> | ![信息](img/image00248.jpeg) | **延伸阅读** Freedesktop.org 桌面条目规范标准 [`standards.freedesktop.org/desktop-entry-spec/latest/`](http://standards.freedesktop.org/desktop-entry-spec/latest/)\
  \ |\n\n---\n\n#### 3.6.2 可点击图标：Windows\n\n如前所述，Windows 有两个可执行文件：标准的 `php.exe` 和较新的\
  \ `php-win.exe`（后者允许脚本无窗口运行）。同样，有两种方法可以制作“可点击”脚本。\n\n第一种是简单的 Windows 批处理文件。这是一个包含一系列待执行命令的文本文件。批处理文件的名称以\
  \ `.bat` 为扩展名，且默认可执行。因此，如果我们有一个名为 `display_stats.php` 的 PHP 脚本，它显示一组数字后退出，并且我们希望以扩展信息模式运行它，那么我们可以通过创建一个名为\
  \ `our_stats.bat` 的文件（包含以下内容）来使其成为一个可点击脚本：\n\n```\n\"C:\\Program Files (x86)\\PHP\\\
  php.exe\" -e \"C:\\users\\Rob\\PHP Scripts\\display_stats.php\"\npause\n```\n\n\
  如果你点击 `our_stats.bat`，它将打开一个命令提示符窗口，执行我们的 PHP 脚本并显示统计信息，最后等待用户按下任意键后再关闭命令提示符窗口。最后一步（这里通过\
  \ `pause` 命令实现）非常重要，因为批处理文件执行完毕后命令提示符窗口会立即关闭，如果你有需要用户查看的输出，则需要保持窗口打开。这当然可以直接在你的\
  \ PHP 脚本中通过暂停执行或等待用户输入来实现，但上面的脚本展示了如何在同一个批处理文件中混合使用 PHP 和其他命令。不要忘记根据实际情况更改 `php.exe`\
  \ 和脚本的路径。你可以使用相对文件名或依赖默认搜索路径，但通常最好使用完整路径名，以确保使用正确的 `php.exe` 实例，并避免脚本相对于批处理文件移动时出现问题。\n\
  \n制作可点击 PHP 脚本的第二种方法是从 Windows VBScript 中调用它。上面的批处理文件示例总会打开一个命令提示符窗口，即使你使用 `php-win.exe`\
  \ 而非 `php.exe` 也是如此，因为默认情况下需要执行文件中的命令。而 VBScript 默认情况下则不需要命令提示符或其他可视化形式。因此，如果我们想使用\
  \ `php-win.exe` 运行一个提供自身 GUI 界面或在后台隐藏运行的脚本，我们应该创建一个扩展名为 `.vbs` 的脚本。假设我们有一个名为 `text_editor.php`\
  \ 的 PHP-GTK 脚本（更多内容见第 5 章），它提供了一个类似于记事本的文本编辑器。我们可以通过创建一个名为 `our_text_ed.vbs` 的文件（包含以下内容）来使其可点击：\n\
  \n```\nSet WinScriptHost = CreateObject(\"WScript.Shell\")\n\nWinScriptHost.Run\
  \ Chr(34) & \"c:\\Program Files (x86)\\PHP\\php-win.exe\" & Chr(34) & \" -e c:\\\
  Users\\me\\text_editor.php\", 0\n\nSet WinScriptHost = Nothing\n```\n\n点击 `.vbs`\
  \ 文件，你的 PHP 脚本将立即启动，且无需命令行提示符。`WinScriptHost.Run` 这一行负责执行我们提供的命令。我们以与在命令提示符下手动输入相同的方式格式化该命令，并将其作为字符串传递。请注意，在\
  \ VBScript 中，`&` 是字符串连接运算符（与 PHP 中的 `.` 相同），而 `Chr(34)` 是双引号字符 `\"`（因为 `php-win.exe`\
  \ 的目录路径包含空格）。不要忘记根据实际情况更改 `php-win.exe` 和脚本的路径。\n\n无论你使用哪种方法，最后一个难题是给你的可点击文件换上一个更好的图标。这些文件将拥有批处理文件或\
  \ VBScript 的默认图标，并且在不更改所有同类型文件图标的情况下，无法直接更改它。不过有两种变通方法。Windows 允许你更改快捷方式的图标（通过`右键\
  \ -> 属性`），因此第一种变通方法是将脚本文件隐藏到视线之外，并在你想要点击的地方创建一个快捷方式图标。然后更改该快捷方式的图标。另一种变通方法是将文件扩展名改为\
  \ Windows 无法识别的名称，例如 `.phpsc`，并创建一个新的文件扩展名，使其具有与 `.vbs` 或 `.bat` 相同的操作，但使用不同的图标。\n\
  \n\n\n#### 3.6.3 可点击图标：Ubuntu Unity\n\n为了在 Ubuntu 的 Unity 启动器中添加一个图标，我们需要创建一个 `.desktop`\
  \ 文件，方式与我们之前创建的 Linux 启动器类似，但多了几个选项。现在我们来创建一个新的 `myscript.desktop`：\n\n```\n 1 [Desktop\
  \ Entry]\n 2 Name=我的超级脚本\n 3 Exec=/usr/bin/php /home/rob/scripts/myscript.php\n\
  \ 4 Icon=/usr/share/icons/gnome/32x32/actions/up.png\n 5 Terminal=true\n 6 Type=Application\n\
  \ 7 StartupNotify=true\n 8 Actions=Window;\n\n10 [Desktop Action Window]\n11 Name=请为我打开一个新窗口\n\
  12 Exec=/usr/bin/php /home/me/scripts/myscript.php -n\n13 OnlyShowIn=Unity;\n```\n\
  \n别忘了使用 `chmod` 使其可执行。与之前的 Linux 示例一样，它在当前位置应该可以正常工作。但是，如果你将其拖到 Unity 启动器上（或者在脚本运行时将其“固定”到启动器），它会保留在那里，并添加一个新功能：“动作”菜单。请注意上面代码中的\
  \ `Actions=Window` 行和 `[Desktop Action Window]` 部分。这些定义了一个新动作（在此例中为打开一个新窗口，前提是我们的脚本通过\
  \ `-n` 参数具备此功能），你可以通过右键点击图标来访问该动作。通过这种方式，你可以添加任何你想要的动 作，例如，用不同的参数调用你的脚本，甚至在 `Exec`\
  \ 行中调用一个完全不同的脚本。如果你想自动添加 Unity 条目，或让所有用户都能使用它们，我建议阅读以下文章。\n\n| ![信息](img/image00248.jpeg)\
  \ | **延伸阅读**<br>Daan van Berkel 的“Unity：向 dock 添加项目” [`themagicofscience.blogspot.co.uk/2011/05/unity-adding-items-to-dock.html`](http://themagicofscience.blogspot.co.uk/2011/05/unity-adding-items-to-dock.html)<br>Ubuntu.com\
  \ 上的 Unity 启动器文档与指南<br>[`help.ubuntu.com/community/UnityLaunchersAndDesktopFiles`](https://help.ubuntu.com/community/UnityLaunchersAndDesktopFiles)\
  \ |\n\n上述所有方法都可以在任意数量的场景中执行。你可以直接从命令行使用它们，作为 shell 脚本的一部分，作为 cron 任务，调用自其他 PHP（和非\
  \ PHP）脚本的系统调用，以及作为默认文件类型处理程序等。在采取适当预防措施并拥有权限的前提下，你甚至可以从基于 Web 的 PHP 页面中使用这些方法来调用脚本（通常有比通过网页调用更好、更安全的方法，因此，如果你真的必须这样做，如何实现并确保安全的具体细节将作为练习留给读者）。\n\
  \n### 3.7 退出脚本\n\n我们已经讨论了如何启动脚本，但当我们想要结束运行时会发生什么呢？\n\n与基于 Web 的 PHP 脚本一样，当到达脚本文件末尾时，CLI\
  \ 脚本会愉快地终止，并以相同方式清理所有已使用的资源。同样，如果我们想要提前结束，可以调用 `exit`（或等同的 `die`）语言结构。\n\n然而，在 CLI\
  \ 脚本的世界里，这被认为是不够礼貌的。因为 CLI 命令被设计为协同工作，通常位于命令链中，大多数 shell 程序和脚本在终止时会提供一个“退出码”，以告知其周围的其他程序它们*为什么*完成。它们是正常结束了吗？是否遇到了错误？调用方式不正确？这此信息都是大家想知道的。\n\
  \n当你的脚本可能是 shell 脚本中的最后一个项目时，提供退出码尤其重要，因为整个脚本的退出码就是其中返回的最后一个退出码。我们可以让 PHP 脚本提供一个退出码，只需将其作为参数包含在\
  \ `exit` 或 `die` 中即可。退出码是一个整数，常见的退出码有：\n\n*   **0**：成功——我们正常退出。\n*   **1**：一般错误——通常用于应用程序/语言特定的错误和语法错误\n\
  *   **2**：用法不正确\n*   **126**：命令不可执行——通常与权限有关\n*   **127**：未找到命令\n*   **128+N**（最高\
  \ **165**）：命令被 POSIX 信号编号 N 终止——例如，如果执行 `kill -9 myscript.php`，则返回码应为 137 (128+9)\n\
  *   **130**：命令被 Ctrl-C 终止（Ctrl-C 的 POSIX 编码是 2，因此如上所述 128+2 = 130）\n\n| ![信息](img/image00248.jpeg)\
  \ | **延伸阅读**<br>维基百科上的 POSIX 信号<br>[`en.wikipedia.org/wiki/Unix_signal#POSIX_signals`](http://en.wikipedia.org/wiki/Unix_signal#POSIX_signals)\
  \ |\n\n任何其他正整数通常被解读为由于未指明的错误而退出。例如，如果你认为用户提供的命令行参数格式不正确，则应使用 `exit(2)` 终止脚本。相反，如果一切顺利，脚本一直运行到其脚本文件末尾，你可以让它自行退出（或者调用不带参数的\
  \ `exit`），因为默认情况下它会返回状态码 0。\n\n与 Web 脚本一样，你可以使用 `register_shutdown_function()` 函数注册要在\
  \ PHP 脚本退出时执行的函数。其用途之一可能是检查一切是否正常，并评估应返回哪个退出码。在已注册的关闭函数内作为 `exit` 或 `die` 参数使用的退出码，会覆盖最初触发关闭的\
  \ `exit` 调用中使用的退出码。这意味着你可以愉快地在各处使用 `exit(0)`，然后，如果你在你的元空间对象中检测到 foo 冲突与 bar 初始化未对齐（或类似情况），则从关闭函数中\
  \ `exit(76)`。\n\n\n\n### 4\\. 开发工具\n\n到目前为止，我们已经概述了在不使用 Web 服务器的情况下使用 PHP 的一些基础知识，但在我们真正深入开发实用的非\
  \ Web 软件的细枝末节之前，我们打算稍微绕道进入 PHP 开发工具的世界。这有两个原因。首先，在决定要使用哪种技术和方法（交互式 CLI 脚本或 GUI 界面）之前，了解有哪些工具可用于支持你所选择的编程方法至关重要。其次，在开发你可能不熟悉的新型软件时，你通常需要采用不同的工作流程，因此你可能需要寻找新的工具来适应你的新工作方式。\n\
  \n总的来说，你可以使用与 Web 开发相同的开发工具来进行通用编程，毕竟 PHP 语法无论在何处执行都是一样的。主要的区别在于你的工作流程，你可能会发现使用不同的工具时效率更高。\n\
  \n当然，PHP 的一个不为人知的秘密是，许多 PHP 程序员不使用调试器、单元测试、构建系统或代码分析器，而且在很多情况下，他们甚至不知道这些东西是什么。这通常是因为许多\
  \ PHP 脚本是由单个开发人员作为小型、简单、低风险项目开发的，而学习和部署额外工具的开销是一个不必要的负担（尤其是对于那些没有接受过正规计算机科学或编程教育的人）。如果你属于这一类，请不要担心，我们都经历过这个阶段（并且时不时地喜欢回顾一下！）。\n\
  \n然而，当你开始涉足通用编程时，你会发现项目的复杂性通常会增加。你将不再处理那些共享状态有限、执行时间不超过一秒的短命脚本，而是会进入更大的代码库，其中包含运行时间更长的进程和更复杂的依赖关系。在这种情况下，错误的影响可能会被放大，并且追踪它们也变得越来越困难。代码重构的频率降低，可能会被组织长期依赖并部署更长时间，从而增加了未来维护代码的负担。如果你不是本章所述这类工具的常用用户，你可能会发现这是深入探索更广阔的\
  \ PHP 开发工具世界，并为开始构建真正的软件打下良好基础的绝佳机会。\n\n我们将依次介绍不同类别的工具，并给出一些流行工具的示例和链接。\n\n### 4.1\
  \ PHP REPL\n\n当你想测试几行 PHP 代码时，你的默认本能可能是创建一个新的 PHP 文件，保存它，然后用 PHP 执行它。然而，有一种更好、更快、更具交互性的方式。PHP\
  \ 的“交互式 Shell”，也称为 PHP REPL（读取-求值-输出-循环），是一种快速简便地输入代码并立即执行的方法。与使用 `php -r` 执行单行代码不同，REPL（通过调用\
  \ `php -a` 启动）会保持脚本的状态（例如，变量和对象的内容），在你输入的每一行之间持续存在，直到你退出。你可以使用 PHP 的所有函数，尽管默认情况下不会加载任何库，并且你可以\
  \ `include()` 或 `require()` 现有的 PHP 代码文件。后一种能力对于调试有问题的脚本的最终输出非常有用；只需 `include()`\
  \ 你的脚本，该脚本将被执行，只要脚本没有提前终止，你就可以使用 `echo()` 或 `print_r()` 或其他方法来探索运行结束时变量和其他资源的状态。以下示例是使用标准\
  \ PHP REPL 进行的实际交互式 REPL 会话的截取。还有其他品牌的 REPL 可用，本节的后面部分会列出它们。\n\n```\n 1 ~$ php -a\n\
  \ 2 Interactive shell\n\n4 php > # 因为我们可以输入任何有效的 PHP，我已经添加了注释\n 5 php > # 直接到 REPL\
  \ 中，而不是之后在编辑时才添加！\n 6 php > \n 7 php > # 让我们从一些简单的赋值开始：\n 8 php > \n 9 php > $a\
  \ = 5;\n10 php > $b = 6;\n11 php > \n12 php > # REPL 会适时地抛出 Notice、Warning 和 Error，\n\
  13 php > # 而且是实时的：\n14 php > \n15 php > $c = nothingdefined;\n16 PHP Notice:  Use\
  \ of undefined constant nothingdefined - assumed \n17 'nothingdefined' in php shell\
  \ code on line 1\n18 php > \n19 php > # 就像普通的 PHP 源文件一样，我们可以将命令跨行拆分。\n20 php > #\
  \ 解释器只有在遇到终止的分号时才会启动：\n21 php > \n22 php > $d \n23 php > =\n24 php > 7\n25 php >\
  \ ;\n26 php > \n27 php > # 下面显示上面变量中的状态已经被\n28 php > # 保留下来了：\n29 php >\n30 php\
  \ > echo $a + $b + $c + $d .\"\\n\";\n31 18\n32 php > \n33 php > # 接下来，一个更有趣的例子。使用\
  \ REPL 而不是 shell\n34 php > # 从文件中获取一行：\n35 php > \n36 php > echo file ('/proc/version')[0];\n\
  37 Linux version 3.5.0-21-generic (buildd@roseapple) (gcc version 4.7.2 \n38 (Ubuntu/Linaro\
  \ 4.7.2-2ubuntu1) ) #32-Ubuntu SMP Tue Dec 11 18:52:46 UTC \n39 2012\n40 php >\n\
  41 php > # 当然，所有常用的协议封装器都是可用的，所以我们\n42 php > # 可以看看世界上正在发生什么...\n43 php > \n44 php\
  \ > $page = file ('http://news.bbc.co.uk');\n45 php > \n46 php > echo $page[0];\n\
  47 <!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML+RDFa 1.0//EN\" \"http://www.w3.org/\n\
  48 MarkUp/DTD/xhtml-rdfa-1.dtd\">\n49 php > \n50 php > # 也许得到它的哈希值...\n51 php >\
  \ \n52 php > echo md5 ( implode ( $page, \"\\n\" ) ) . \"\\n\";\n53 0319bf4e62db39fb2c89210e48783d70\n\
  54 php > \n55 php > # 当我们完成时 ...\n56 php > \n57 php > exit;\n58 php > \n59 php >\
  \ # 不起作用，因为它只是作为 PHP 被求值（而 REPL 会忽略\n60 php > # exit/die 调用。要退出 REPL，在新的一行单独输入\n\
  61 php > # 'exit' 这个词\n62 php > \n63 php > exit\n64 ~$\n```\n\n\n\n有时候，你希望在其他脚本的“环境”中执行命令。例如，你可能有一个脚本用于声明常量、建立数据库连接，并执行其他你在主\
  \ PHP 脚本中通常通过 `include()` 调用的例行任务。如上所述，你也可以在 REPL 中 `include()` 这些文件，但你可能会忘记这样做，然后想知道为什么事情没有按预期工作。PHP\
  \ 提供的一种机制，不仅适用于 REPL，也适用于所有形式的 PHP 执行，那就是 `auto_prepend_file` 配置指令。这告诉 PHP 在每次运行时，在执行任何其他操作（例如执行你要求它运行的脚本）之前，先执行一个指定的文件。这可以在\
  \ `php.ini` 中设置，也可以通过命令行的 `-d` 标志来设置。\n\n以下是一个预先设置一些常量/变量的示例。首先，我们创建一个名为 `initialise.php`\
  \ 的脚本，内容如下：\n\n```\n1 <?\n\n3 const FOUR = 4; # 声明一个常量值\n\n5 $five = 5; # 用另一个值实例化一个变量\n\
  ```\n\n然后，在命令行中，使用 `-d` 来首先执行 `initialise.php` 脚本，启动并运行一个 REPL 会话，如下所示：\n\n```\n\
  1 $> php -d auto_prepend_file=initialise.php -a\n2 Interactive shell\n\n4 php >\
  \ echo (FOUR + $five).\"\\n\";\n5 9\n6 php > exit\n7 $>\n```\n\n如你所见，我们在 `initialise.php`\
  \ 文件中设置的常量和变量在 REPL 中可直接使用，无需手动声明。这里使用了 `-d` 标志，但如果你希望始终使用同一个文件，也可以在 `php.ini` 中设置该选项。如果你经常使用几个不同的初始化文件，你可以创建使用\
  \ `-d` 标志的命令的 shell 别名。例如，你可以将类似于以下的行添加到你的 `~/.bash_profile` 中：\n\n```\n1 alias\
  \ php-cl=\"php -d auto_prepend_file=clientSetup.php -a\"\n2 alias php-in=\"php -d\
  \ auto_prepend_file=ourSiteSetup.php -a\"\n```\n\n除了上面探索的内置 PHP REPL 之外，还有许多第三方\
  \ REPL 可用，其中一些功能包括键入命令的历史记录、命令的 Tab 补全、防止致命错误，甚至提供简略的函数文档。\n\n| `![](img/image00249.gif)`\
