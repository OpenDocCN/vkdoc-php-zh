    The idea behind the program is very simple. There is the `Alpha` parent class,
    and it has the public `hello()` method, which, when called, displays a message
    with the name of the `Alpha` class. The `Alpha` class also has the public `show()`
    method, in the body of which the `hello()` method is called. The class also has
    the constructor that calls the `hello()` method. The `Bravo` child class, which
    is derived from the `Alpha` class, overrides the `hello()` method. The method
    now displays a message with the name of the `Bravo` class. What does happen? It
    turns out that the `Bravo` class inherits the `show()` method and the constructor
    from the `Alpha` class. Both the `show()` method and the constructor call the
    `hello()` method. And that method, in turn, is overridden in the `Bravo` class.
    The intrigue is which version of the `hello()` method is called when the `show()`
    method is called from an object of the `Bravo` class. The result of the program
    execution demonstrates that the constructor and the `show()` method, despite being
    described in the `Alpha` class, call the version of the `hello()` method described
    in the `Bravo` class. Such a feature of methods is called *virtuality*. The version
    of the called method is determined by the class of the object from which the method
    is called.


    # A Function as a Field Value


    In the earlier examples, you assigned numeric or string values to fields. That
    does not mean that the possible values of an object field are limited to only
    those data types. In fact, the value of an object field can be almost anything.
    For example, let’s investigate a situation when an anonymous function is assigned
    as a value to a field.


    A circular icon reads a letter i at the center. Note


    Note that an anonymous function is described similarly to an ordinary function
    but without specifying a name. That construction can be assigned as a value to
    a variable or, as in this case, to a field of an object.


    Consider the program shown in Listing 8-8.


    ```php

    calc=function($n){

    return $n*$n;

    };

    // Checks the result:

    echo "Argument $number: ",($obj->calc)($number),"\n";

    // A function is assigned to the field:

    $obj->calc=function($n){

    return sqrt($n);

    };

    // Checks the result:

    echo "Argument $number: ",($obj->calc)($number),"\n";

    ?>

    ```


    Listing 8-8

    A Function as a Field Value


    The following is the result of the program execution.


    ```

    The output of the program (from Listing 8-8)

    Argument 9: 81

    Argument 9: 3

    ```


    Let’s analyze the code using the `MyClass` class, which has the public `$calc`
    field. Based on the `MyClass` class, create the `$obj` object. The following command
    assigns a value to the `$calc` field of that object.


    ```php

    $obj->calc=function($n){

    return $n*$n;

    };

    ```


    The anonymous function assigned to the field returns the square of the `$n` argument.
    To calculate the result of the function to which the `$calc` field of the `$obj`
    object refers, use the `($obj->calc)($number)` instruction. There, you engage
    parentheses to “calculate” at first the `$obj->calc` expression (it is a reference
    to the function). Then specify the `$number` argument (in parentheses) for that
    function.


    A circular icon reads a letter i at the center. Note


    If the `$number` argument is set to `9`, the result of the function is `81` (the
    number `9` squared).


    After checking the result of the function, the `$calc` field is assigned a new
    value.


    ```php

    $obj->calc=function($n){

    return sqrt($n);

    };

    ```


    Now, the `$calc` field refers to the function that returns the square root of
    its argument.


    A circular icon reads a letter i at the center. Note


    The `sqrt()` built-in function is used to calculate the square root. If the `$number`
    argument is set to `9`, the result of the function is `3` (the square root of
    `9`).


    # Multilevel Inheritance


    As noted earlier, PHP allows multilevel inheritance when a child class is created
    based on a parent class, a new child class is created based on that child class,
    and so on. In such a case, the child class is a parent one for another child class.
    At the same time, inheritance allows you to “pass” the contents of the original
    parent class along the chain, and the overriding of methods makes that process
    quite flexible. The situation is illustrated in Listing 8-9.


    ```php

    number=$number;

    $this->show();

    }

    // The method for displaying the field:

    function show(){

    echo "Alpha: ",$this->number,"\n";

    $this->drawLine();

    }

    // The method for displaying a "line":

    function drawLine(){

    echo "----------------\n";

    }

    }

    // The second class:

    class Bravo extends Alpha{

    // The private field:

    protected $symbol;

    // The constructor:

    function __construct($number,$symbol){

    $this->symbol=$symbol;

    parent::__construct($number);

    }

    // Overrides the method:

    function show(){

    echo "Bravo: ",$this->number,"\n";

    echo "Bravo: ",$this->symbol,"\n";

    $this->drawLine();

    }

    }

    // The third class:

    class Charlie extends Bravo{

    // The private field:

    protected $text;

    // The constructor:

    function __construct($name,$symbol,$text){

    $this->text=$text;

    parent::__construct($name,$symbol);

    }

    // Overrides the method:

    function show(){

    echo "Charlie: ",$this->number,"\n";

    echo "Charlie: ",$this->symbol,"\n";

    echo "Charlie: ",$this->text,"\n";

    $this->drawLine();

    }

    }

    // Creates objects:

    $A=new Alpha(100);

    $B=new Bravo(200,''B'');

    $C=new Charlie(300,''C'',"Charlie");

    ?>

    ```


    Listing 8-9

    Multilevel Inheritance


    The result of the program execution is as follows.


    ```

    The output of the program (from Listing 8-9)

    Alpha: 100


    Bravo: 200

    Bravo: B


    Charlie: 300

    Charlie: C

    Charlie: Charlie


    ```


    The scheme is as follows: based on the `Alpha` class, the `Bravo` class is created
    by inheritance, and based on the `Bravo` class, the `Charlie` class is created.
    The `Alpha` class has the protected `$number` field, the one-argument constructor,
    the `show()` method, and the `drawLine()` method. In the constructor, the field
    is assigned a value, and then the `show()` method is called, which displays the
    value of the object’s field and the name of the `Alpha` class.


    A circular icon reads a letter i at the center. Note


    For convenience, the `drawLine()` method in the `Alpha` class is described. When
    called, it displays a decorative “line.” That element separates the results of
    calling the `show()` method in all three classes. That is possible since the `drawLine()`
    method is inherited in all child classes.'
