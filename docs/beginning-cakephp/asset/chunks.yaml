    $out .= ''<tr>'';


    47 for ($i=15; $i<=21; $i++) {


    $out .= ''<td>''.$day.''<br/>'';


    $out .= $this->events($month,$day,$year,$events);


    $out .= ''</td>'';


    $day++;


    }


    $out .= ''</tr>'';


    Because each cell of weeks two and three must contain a date (in other words,
    there are no months where these weeks have a starting date or an ending date for
    the month), checking for the current value of $day is not necessary. The value
    of $i was last set by week one’s loop, so week two begins its loop with values
    between 8 and 14\. The rest of weeks two and three closely resemble what is happening
    in the loop for week one.


    **Rendering Week Four**


    Depending on the year, some months may end on their fourth week. So, for week
    four, checking for an ending date is necessary. See Listing 13-15 for week four’s
    loop, and paste it into the helper.


    **Listing 13-15.** *Week Four*


    /*** WEEK FOUR ***/


    $out .= ''<tr>'';


    57 for ($i=22; $i<=28; $i++) {


    if (strftime("%d",$lastdate) < $day) {


    $out .= ''<td>&nbsp;</td>'';


    } else {


    $out .= ''<td>''.$day.''<br/>'';


    $out .= $this->events($month,$day,$year,$events);


    $out .= ''</td>'';


    $day++;


    }


    }


    $out .= ''</tr>'';


    09775ch13final 7/1/08 9:58 PM Page 233


    C H A P T E R 1 3 ■ P L U G I N S


    **233**


    Week four is similar to the other weeks except for lines 58–59 of Listing 13-15\.
    Line 58


    checks to see whether the timestamp saved in $lastdate is less than the value
    for $day. If so, it will output a blank cell (line 59).


