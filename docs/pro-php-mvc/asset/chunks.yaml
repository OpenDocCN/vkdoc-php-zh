    在部分路由中，我们使用了类似`(:num)`、`(:any)`和`$1`这样的占位符。这些用于将路由转换为正则表达式。CodeIgniter使用正则表达式匹配来确定要执行的正确控制器和操作，这与我们的框架非常相似。由`(:num)`和`(:any)`匹配的值将作为参数发送给操作。


    如果你尝试访问这些新路由中的任何一个，都会看到错误。这是因为我们尚未创建相应的控制器、操作等。在第23章中，我们将创建使这些路由中的大部分能够正常工作所需的控制器、模型和视图。


    ■ **注意** 你可以在[http://codeigniter.com/user_guide/general/routing.html](http://codeigniter.com/user_guide/general/routing.html)找到关于此配置文件的更多详细信息。


    问题


    1. 在第21章中，我们学习了CodeIgniter如何通过在每一个文件中添加一行代码来保护应用程序和系统类文件。我们的框架通过将所有Web请求限制在一个公共文件夹中来处理这个问题。这是否意味着CodeIgniter的做法是错误的？


    2. 在第4章中，我们讨论了关联数组配置和INI配置之间的区别。我们如何在INI配置格式中表示相同的路由？


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第22章 ■ CodeIgniter：引导


    答案


    1. 负责CodeIgniter开发的核心团队在其安全技术的应用上非常彻底。问题不在于他们的系统不安全，而在于保护它需要结合Apache安全性和向每个类文件添加安全代码。这并不意味着如果我们决定将其添加到我们的框架中，这个安全检查就是件坏事，但忘记将其添加到任何CodeIgniter应用程序类文件中可能会造成安全漏洞。


    2. 处理这个问题有多种方法，但最简单的方法是使用类似于清单22-3中所示的格式。


    ***清单22-3.*** INI路由配置


    ```

    route[register] = users/register

    route[login] = users/login

    route[logout] = users/logout

    ...

    route[thumbnails/:id] = files/thumbnails/:id

    route[files/delete/:id] = files/delete/:id

    route[files/undelete/:id] = files/undelete/:id

    ```


