    (

    )

    popp\ch09\batch11\EarthPlains Object

    (

    )

    popp\ch09\batch11\EarthForest Object

    (

    )

    ```


    As you can see, I load up a concrete `TerrainFactory` with instances of product
    objects. When a client calls `getSea()`, I return a clone of the `Sea` object
    that I cached during initialization. This structure buys me additional flexibility.
    Want to play a game on a new planet with Earth-like seas and forests, but Mars-like
    plains? No need to write a new creator class—you can simply change the mix of
    classes you add to `TerrainFactory` :


    ```

    $factory = new TerrainFactory(

    new EarthSea(),

    new MarsPlains(),

    new EarthForest()

    );

    ```


    So the Prototype pattern allows you to take advantage of the flexibility afforded
    by composition. We get more than that, though. Because you are storing and cloning
    objects at runtime, you reproduce object state when you generate new products.
    Imagine that `Sea` objects have a `$navigability` property . The property influences
    the amount of movement energy a sea tile saps from a vessel and can be set to
    adjust the difficulty level of a game:


    ```

    // listing 09.33

    class Sea

    {

    private $navigability = 0;

    public function __construct(int $navigability)

    {

    $this->navigability = $navigability;

    }

    }

    ```


    Now when I initialize the `TerrainFactory` object , I can add a `Sea` object with
    a navigability modifier. This will then hold true for all `Sea` objects served
    by `TerrainFactory`:


    ```

    // listing 09.34

    $factory = new TerrainFactory(

    new EarthSea(-1),

    new EarthPlains(),

    new EarthForest()

    );

    ```


    This flexibility is also apparent when the object you wish to generate is composed
    of other objects.


    Note


    I covered object cloning in Chapter [4](#A314621_5_En_4_Chapter.html). The `clone`
    keyword generates a shallow copy of any object to which it is applied. This means
    that the product object will have the same properties as the source. If any of
    the source’s properties are objects, then these will not be copied into the product.
    Instead, the product will reference the same object properties. It is up to you
    to change this default and to customize object copying in any other way, by implementing
    a `__` `clone()` method . This is called automatically when the `clone` keyword
    is used.


    Perhaps all `Sea` objects can contain `Resource` objects (`FishResource`, `OilResource`,
    etc.). According to a preference flag, we might give all `Sea` objects a `FishResource`
    by default. Remember that if your products reference other objects, you should
    implement a `__clone()` method to ensure that you make a deep copy:


    ```

    class Contained

    {

    }

    class Container

    {

    public $contained;

    function __construct()

    {

    $this->contained = new Contained();

    }

    function __clone()

    {

    // Ensure that cloned object holds a

    // clone of self::$contained and not

    // a reference to it

    $this->contained = clone $this->contained;

    }

    }

    ```'
  trans: "\n### 问题\n\n想象一下，一款类似《文明》风格的网页游戏，其中的单位在由方块组成的网格上行动。每个方块可以代表海洋、平原或森林。地形类型会限制占据该方块单位的移动和战斗能力。你可能会有一个\
    \ `TerrainFactory` 对象，用于提供 `Sea`、`Forest` 和 `Plains` 对象。你决定允许用户在不同环境间进行选择，因此 `Sea`\
    \ 对象是一个抽象超类，由 `MarsSea` 和 `EarthSea` 实现。`Forest` 和 `Plains` 对象也以类似方式实现。这里的逻辑关系很自然地导向了抽象工厂模式。你拥有不同的产品层级结构（`Sea`、`Plains`、`Forests`），并且存在跨越继承关系的强大家族关联（`Earth`、`Mars`）。图\
    \ 9-10 展示了一个类图，说明了如何应用抽象工厂模式和工厂方法模式来操作这些产品。\n\n![A314621_5_En_9_Fig10_HTML.gif](img/A314621_5_En_9_Fig10_HTML.gif)\n\
    \n图 9-10. 使用抽象工厂方法处理地形\n\n如你所见，我依靠继承来对工厂将要生成的产品进行地形族群分组。这是一个可行的方案，但它需要庞大的继承层级结构，并且相对缺乏灵活性。当你不想使用平行的继承层级，且需要最大化运行时灵活性时，可以在抽象工厂模式的基础上使用原型模式进行强大的变体应用。\n\
    \n### 实现\n\n当你使用抽象工厂/工厂方法模式时，必须在某个时间点决定使用哪个具体创建者，可能需要通过检查某种偏好标志来实现。既然无论如何都必须这么做，为什么不直接创建一个存储具体产品的工厂类，并在初始化时填充这些产品呢？这样你可以减少几个类，并且正如你将看到的，还能获得其他好处。以下是一些在工厂中使用原型模式的简单代码：\n\
    \n```\nclass Sea\n{\n}\nclass EarthSea extends Sea\n{\n}\nclass MarsSea extends\
    \ Sea\n{\n}\nclass Plains\n{\n}\nclass EarthPlains extends Plains\n{\n}\nclass\
    \ MarsPlains extends Plains\n{\n}\nclass Forest\n{\n}\nclass EarthForest extends\
    \ Forest\n{\n}\nclass MarsForest extends Forest\n{\n}\n```\n\n```\nclass TerrainFactory\n\
    {\n    private $sea;\n    private $forest;\n    private $plains;\n    public function\
    \ __construct(Sea $sea, Plains $plains, Forest $forest)\n    {\n        $this->sea\
    \ = $sea;\n        $this->plains = $plains;\n        $this->forest = $forest;\n\
    \    }\n    public function getSea(): Sea\n    {\n        return clone $this->sea;\n\
    \    }\n    public function getPlains(): Plains\n    {\n        return clone $this->plains;\n\
    \    }\n    public function getForest(): Forest\n    {\n        return clone $this->forest;\n\
    \    }\n}\n```\n\n```\n$factory = new TerrainFactory(\n    new EarthSea(),\n \
    \   new EarthPlains(),\n    new EarthForest()\n);\nprint_r($factory->getSea());\n\
    print_r($factory->getPlains());\nprint_r($factory->getForest());\n```\n\n```\n\
    popp\\ch09\\batch11\\EarthSea Object\n(\n)\npopp\\ch09\\batch11\\EarthPlains Object\n\
    (\n)\npopp\\ch09\\batch11\\EarthForest Object\n(\n)\n```\n\n如你所见，我向一个具体的 `TerrainFactory`\
    \ 对象中加载了产品对象的实例。当客户端调用 `getSea()` 时，我返回的是初始化时缓存的那个 `Sea` 对象的克隆。这种结构带来了额外的灵活性。想在一个新星球上玩游戏，这个星球有类似地球的海洋和森林，但平原像火星？无需编写新的创建者类——只需更改添加到\
    \ `TerrainFactory` 的类组合即可：\n\n```\n$factory = new TerrainFactory(\n    new EarthSea(),\n\
    \    new MarsPlains(),\n    new EarthForest()\n);\n```\n\n因此，原型模式让你能够利用组合带来的灵活性。但我们得到的还不止这些。因为你在运行时存储和克隆对象，所以在生成新产品时，你会复制对象的状态。想象一下，`Sea`\
    \ 对象有一个 `$navigability` 属性。该属性影响海洋方块从船只中消耗的移动能量，并且可以调整以改变游戏的难度级别：\n\n```\nclass\
    \ Sea\n{\n    private $navigability = 0;\n    public function __construct(int\
    \ $navigability)\n    {\n        $this->navigability = $navigability;\n    }\n\
    }\n```\n\n现在，当我初始化 `TerrainFactory` 对象时，我可以添加一个带有可航行性修饰符的 `Sea` 对象。随后，这个修饰符将对\
    \ `TerrainFactory` 提供的所有 `Sea` 对象生效：\n\n```\n$factory = new TerrainFactory(\n\
    \    new EarthSea(-1),\n    new EarthPlains(),\n    new EarthForest()\n);\n```\n\
    \n当你想要生成的对象由其他对象组成时，这种灵活性也显而易见。\n\n注意\n\n我在第 4 章中介绍了对象克隆。`clone` 关键字会生成它所应用对象的浅拷贝。这意味着产品对象将拥有与源对象相同的属性。如果源对象的任何属性是对象，那么这些属性将不会被复制到产品中。相反，产品将引用相同的对象属性。你需要通过实现一个\
    \ `__clone()` 方法来更改此默认行为，并以任何其他方式自定义对象复制。当使用 `clone` 关键字时，该方法会被自动调用。\n\n也许所有 `Sea`\
    \ 对象都可以包含 `Resource` 对象（`FishResource`, `OilResource` 等）。根据某个偏好标志，我们可能默认给所有 `Sea`\
    \ 对象一个 `FishResource`。请记住，如果你的产品引用了其他对象，你应该实现一个 `__clone()` 方法来确保进行深拷贝：\n\n```\n\
    class Contained\n{\n}\nclass Container\n{\n    public $contained;\n    function\
    \ __construct()\n    {\n        $this->contained = new Contained();\n    }\n \
    \   function __clone()\n    {\n        // 确保克隆后的对象持有的是\n        // self::$contained\
    \ 的克隆，而不是\n        // 对它的引用\n        $this->contained = clone $this->contained;\n\
    \    }\n}\n```\n"
- fmt: '## Pushing to the Edge: Service Locator


    I promised that this chapter would deal with the logic of object creation, doing
    away with the sneaky buck-passing of many object-oriented examples. Yet some patterns
    here have slyly dodged the decision-making part of object creation, if not the
    creation itself.


    The `Singleton` pattern is not guilty. The logic for object creation is built-in
    and unambiguous. The `Abstract Factory` pattern groups the creation of product
    families into distinct concrete creators. How do we decide which concrete creator
    to use, though? The `Prototype` pattern presents us with a similar problem. Both
    these patterns handle the creation of objects, but they defer the decision as
    to which object or group of objects should be created.


    The particular concrete creator that a system chooses is often decided according
    to the value of a configuration switch of some kind. This could be located in
    a database, a configuration file, or a server file (such as Apache’s directory-level
    configuration file, usually called `.htaccess`), or it could even be hard-coded
    as a PHP variable or property. Because PHP applications must be reconfigured for
    every request, you need script initialization to be as painless as possible. For
    this reason, I often opt to hard-code configuration flags in PHP code. This can
    be done by hand or by writing a script that autogenerates a class file. Here’s
    a crude class that includes a flag for calendar protocol types:


    ```

    // listing 09.35

    class Settings

    {

    static $COMMSTYPE = ''Bloggs'';

    }

    ```


    Now that I have a flag (however inelegant), I can create a class that uses it
    to decide which `CommsManager` to serve on request. It is quite common to see
    a `Singleton` used in conjunction with the `Abstract Factory` pattern, so let’s
    do that:


    ```

    // listing 09.36

    class AppConfig

    {

    private static $instance;

    private $commsManager;

    private function __construct()

    {

    // will run once only

    $this->init();

    }

    private function init()

    {

    switch (Settings::$COMMSTYPE) {

    case ''Mega'':

    $this->commsManager = new MegaCommsManager();

    break;

    default:

    $this->commsManager = new BloggsCommsManager();

    }

    }

    public static function getInstance(): AppConfig

    {

    if (empty(self::$instance)) {

    self::$instance = new self();

    }

    return self::$instance;

    }

    public function getCommsManager(): CommsManager

    {

    return $this->commsManager;

    }

    }

    ```


    The `AppConfig` class is a standard `Singleton`. For that reason, I can get an
    `AppConfig` instance anywhere in the system, and I will always get the same one.
    The `init()` method is invoked by the class’s constructor and is therefore only
    run once in a process. It tests the `Settings::$COMMSTYPE` property, instantiating
    a concrete `CommsManager` object according to its value. Now my script can get
    a `CommsManager` object and work with it without ever knowing about its concrete
    implementations or the concrete classes it generates:


    ```

    $commsMgr = AppConfig::getInstance()->getCommsManager();

    $commsMgr->getApptEncoder()->encode();

    ```


    Because `AppConfig` manages the work of finding and creating components for us,
    it is an instance of what’s known as the Service Locator pattern. It’s neat (and
    we’ll see it again in more detail in Chapter [12](#A314621_5_En_12_Chapter.html)),
    but it does introduce a more benign dependency than direct instantiation. Any
    classes using its service must explicitly invoke this monolith, binding them to
    the wider system. For this reason, some prefer another approach.


    ## Splendid Isolation: Dependency Injection


    In the previous section, I used a flag and a conditional statement within a factory
    to determine which of two `CommsManager` classes to serve up. The solution was
    not as flexible as it might have been. The classes on offer were hard-coded within
    a single locator, with a choice of two components built-in to a conditional. That
    inflexibility was a facet of my demonstration code, though, rather than a problem
    with Service Locator, per se. I could have used any number of strategies to locate,
    instantiate, and return objects on behalf of client code. The real reason Service
    Locator is often treated with suspicion, however, is the fact that a component
    must explicitly invoke the locator. This feels a little, well, global. And object-oriented
    developers are rightly suspicious of all things global.


    ### The Problem


    Whenever you use the `new` operator, you close down the possibility of polymorphism
    within that scope. Imagine a method that deploys a hard-coded `BloggsApptEncoder`
    object, for example:


    ```

    // listing 09.37

    class AppointmentMaker

    {

    public function makeAppointment()

    {

    $encoder = new BloggsApptEncoder();

    return $encoder->encode();

    }

    }

    ```


    This might work for our initial needs, but it will not allow any other `ApptEncoder`
    implementation to be switched in at runtime. That limits the ways in which the
    class can be used, and it makes the class harder to test. Much of this chapter
    addresses precisely this kind of inflexibility. But, as I pointed out in the previous
    section, I have skated over the fact that, even if we use the `Prototype` or `Abstract
    Factory` patterns, instantiation has to happen somewhere. Here again is a fragment
    of code that creates a `Prototype` object:


    ```

    // listing 09.32

    $factory = new TerrainFactory(

    new EarthSea(),

    new EarthPlains(),

    new EarthForest()

    );

    ```


    The `Prototype` `TerrainFactory` class called here is a step in the right direction—it
    demands generic types: `Sea`, `Plains`, and `Forest`. The class leaves it up to
    the client code to determine which implementations should be provided. But how
    is this done?'
