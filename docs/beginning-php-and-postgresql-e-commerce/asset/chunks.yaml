- fmt: '# What the Access Key ID Can’t Do


    What the Access Key ID can’t do is give you a commission from the Amazon.com products
    that you sell through your web site. To obtain your money, you need to apply for
    an `Associate ID`. The `Associate ID` is used in the Buy From Amazon links you’ll
    display in your special Amazon department, and it’s the key that Amazon uses to
    identify you as the origin of that sale.


    The `Associate ID` can even be used in the static web pages that contain links
    to Amazon.com products, and it doesn’t require you to also have an ECS Access
    Key ID, which has different purposes.


    So before moving further, if you want to make any money out of your Amazon Super
    Hats department, go get your `Associate ID` from `http://associates.amazon.com/gp/associates/apply/main.html`.
    Otherwise, if at the moment you’re just interested in learning about the ECS,
    feel free to skip this step now.


    ## Accessing Amazon E-Commerce Service Using REST


    REST Web Services are accessed by requesting a properly formed URL. Try the following
    link in your browser (don’t forget to replace the string `[Your Access Key ID]`
    with your real Access Key ID that you obtained earlier):


    ```

    http://webservices.amazon.com/onca/xml?Service=AWSECommerceService

    &AWSAccessKeyId=[Your Access Key ID]

    &Operation=ItemLookup

    &IdType=ASIN

    &ItemId=159059648X

    ```


    **Tip:** Make sure you type the entire URL on a single line; we’ve broken it down
    to individual elements to make them easier to read.


    Your browser will display an XML structure with information about the book you
    are reading now. Figure 17-3 shows this XML structure in Firefox, which nicely
    displays the XML document tree.


    ---


    **Figure 17-3.** *The XML response of a Web Service request*


    Pretty cool, huh? You have just seen REST in action. Every product in the Amazon
    database has a unique identifier called an ASIN (Amazon.com Standard Item Number).
    For books, the ASIN is the book’s ISBN (this book has the ASIN `159059648X`).


    The Web Service request you just made tells ECS the following: I have an Access
    Key ID (`AWSAccessKeyId=[Your Access Key ID]`), and I want to make an item lookup
    operation (`&Operation=ItemLookup`) to learn more about the product with the `159059648X`
    ASIN (`&IdType=ASIN&ItemId=159059648X`).


    You didn’t get much information about this book in this example—no price or availability
    information and no links to the cover picture or customer reviews. ECS 4.0 introduced
    a finer control of the data you want to receive using response groups (a response
    group is a set of information about the product).


    **Note:** At the time of writing, ECS offers a list of more than 35 possible response
    groups. In this book, we’ll only explain the purpose of the response groups we’re
    using for HatShop; for the complete list, visit the ECS documentation.


    ---


    So let’s ask for some more data by using response groups. At the end of the link
    you’ve composed earlier, add the following string to get more specific information
    about the book:


    `&ResponseGroup=Request,SalesRank,Small,Images,OfferSummary`


    The complete link should look like this:


    ```

    http://webservices.amazon.com/onca/xml?Service=AWSECommerceService

    &AWSAccessKeyId=[Your Access Key ID]

    &Operation=ItemLookup

    &IdType=ASIN

    &ItemId=159059648X

    ```'
