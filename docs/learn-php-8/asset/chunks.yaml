    \ is usually\n    unnecessary and is a breach of security.*\n\n```\ntry {\nif\
    \ ($secondNumber == 0)\n{ throw new Exception(\"Zero Exception\"); }\nelse { $result\
    \ = $firstnumber / $secondnumber; }\n// other code with exceptions\n}\ncatch(Exception\
    \ $e) {\nswitch ($e->getMessage()) {\ncase \"Zero Exception\":\necho \"The value\
