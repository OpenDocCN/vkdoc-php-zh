    \n**8.** Use the query tool to execute this code, which creates the `shopping_cart_get_total_amount`\
    \ function in your hatshop database:\n\n```sql\n-- Create shopping_cart_get_total_amount\
    \ function\nCREATE FUNCTION shopping_cart_get_total_amount(CHAR(32)) RETURNS NUMERIC(10,\
