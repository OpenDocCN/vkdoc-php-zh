    \ the browser and introduce the username/password combination if you logged out.\
    \ Click on the ORDERS ADMIN menu link, then click one of the Go! buttons, and\
    \ see the results that should be similar to those found earlier in Figure 9-4.\n\
    \n**How It Works: The admin_orders Componentized Template**\n\nEach of the Go!\
    \ buttons calls one of the business tier methods (in the `Orders` class) and populates\
    \ the table with the returned orders information.\n\nWhen processing the request,\
    \ we test the data the visitor entered to make sure it’s valid. When the first\
    \ Go! button is clicked, we verify that the entered value is a number (how many\
    \ records to show). We also verify whether the dates entered in the Start Date\
    \ and End Date text boxes are valid. We process them first with `strtotime` that\
    \ parses a string and transforms it into a Unix timestamp. This function is useful\
    \ because it also accepts entries such as “now,” “tomorrow,” “last week,” and\
    \ so on as input values. The resulting timestamp is then processed with the `strftime`\
    \ function, which transforms it into the `YYYY/MM/DD HH:MM:SS` format. Have a\
    \ look at how these date/time values are parsed:\n\n```php\n// Check if the start\
    \ date is in accepted format\nif (($this->mStartDate == '') ||\n    ($timestamp\
    \ = strtotime($this->mStartDate)) == -1)\n    $this->mErrorMessage = 'The start\
    \ date is invalid. ';\nelse\n    // Transform date to YYYY/MM/DD HH:MM:SS format\n\
    \    $this->mStartDate =\n        strftime('%Y/%m/%d %H:%M:%S', strtotime($this->mStartDate));\n\
    ```\n\n> **Note** Check [http://www.php.net/strtotime](http://www.php.net/strtotime)\
    \ to see what input formats are supported by the `strtotime` function and [http://www.php.net/strftime](http://www.php.net/strftime)\
    \ for more details about `strftime`.\n\nApart from this detail, the `admin_orders.tpl`\
    \ template file is pretty simple and doesn’t introduce any new theoretical elements\
    \ for you.\n\n### Displaying Order Details\n\nIn this section, you’ll create the\
    \ `admin_order_details` componentized template, which allows the administrator\
    \ to edit the details of a particular order. The most common tasks are to mark\
    \ a placed order as either verified or canceled, and to mark a verified order\
    \ as completed when the shipment is dispatched. Take a look at Figure 9-5 (shown\
    \ earlier) to see the `admin_order_details` template in action.\n\nThe site administrator\
    \ marks an order as verified when the payment for that order is confirmed by PayPal\
    \ and marks the order as completed when the order is assembled, addressed, and\
    \ mailed to the purchaser. The administrator can mark an order as canceled if,\
    \ for example, PayPal does not confirm the payment in a reasonable amount of time\
    \ (the exact meaning of “reasonable” is up to the administrator).\n\nThe other\
    \ buttons—Edit, Update, and Cancel—allow the administrator to manually edit any\
    \ of the details of an order. When the Edit button is clicked, the select box\
    \ and the text boxes become editable."
