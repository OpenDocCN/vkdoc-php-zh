- fmt: "# Chapter 11: Functions\n\n## Recipe 11-4: Optional Parameters\n\n### Problem\n\
    \nIn the previous examples the parameter for the ids to delete could be an empty\
    \ array causing the function to delete all rows in the table. In the example where\
    \ the parameters was passed as an array it would be possible to leave out the\
    \ `ids` key and the function would still work, but in the example where `table`\
    \ and `ids` were passed as two separate variables the `ids` would have to be passed,\
    \ even if it was an empty array. It would be nice to be able to only pass the\
    \ parameters that make sense in the context of calling the function.\n\n### Solution\n\
    \nOptional parameters are a way to tell the function to use a specific value for\
    \ a parameter if the caller provides none. Optional parameters are defined from\
    \ right to left in the parameter list. The first optional parameter that can be\
    \ defined is the last parameter in the list and when that is optional the one\
    \ before that can be defined optional. This can continue until all parameters\
    \ are defined as optional.\n\nOptional parameters are defined by assigning a value\
    \ to the variable in the parameter list. If the `$ids` parameter should have a\
    \ default value of an empty array it’s written as `$ids = []` or `$ids = array()`\
    \ if you prefer the classic syntax.\n\n### How It Works\n\nBy changing the last\
    \ parameter to have a default value of an empty array it’s possible to call the\
    \ `DeleteRows()` function with a single parameter. In that case the function will\
    \ delete all rows from the specified table.\n\n```php\n<?php\n// 11_6.php\n\n\
    $con = mysqli_connect('host', 'user', 'secret');\n\nif ($con) {\n    mysqli_select_db($con,\
    \ 'mydb');\n}\n\nfunction DeleteRows($table, $ids = []) {\n    global $con;\n\n\
    \    if ($con) {\n        $where = \"\";\n\n        if (is_array($ids) && sizeof($ids))\
    \ {\n            $strids = implode(\", \", $ids);\n            $where = \" where\
    \ id in ({$strids})\";\n        }\n\n        mysqli_query($con, \"delete from\
    \ {$table}{$where};\");\n    } else {\n        echo \"No database connection\"\
    ;\n    }\n}\n\n// Call the function\nDeleteRows(\"mytable\");\n\nmysqli_close($con);\n\
    ?>\n```\n\nVariables with an optional value will either be assigned the optional\
    \ value, when nothing is passed to the parameter, or the value passed by the caller.\
    \ In the case where the options are passed as an array, that might cause an unwanted\
    \ overwrite effects. Consider the function declaration: `function DeleteRows($options\
    \ = ['table' => 'mytable']) {}`. If this function is called with `DeleteRows(['ids'\
    \ => [1, 3, 5]]);` the table name is lost and the function will not delete anything.\
    \ To get around this we can define the default values inside the function and\
    \ merge the options that are passed in onto the internal variable. This can be\
    \ done with the `array_merge()` function.\n\n```php\n<?php\n// 11_7.php\n\n$con\
    \ = mysqli_connect('host', 'user', 'secret');\n\nif ($con) {\n    mysqli_select_db($con,\
    \ 'mydb');\n}\n\nfunction DeleteRows($opt = []) {\n    global $con;\n\n    $options\
    \ = array_merge(['table' => 'mytable'], $opt);\n\n    if ($con) {\n        if\
    \ (is_array($options) && $options['table']) {\n            $where = \"\";\n\n\
    \            if (is_array($options['ids']) && sizeof($options['ids'])) {\n   \
    \             $strids = implode(\", \", $options['ids']);\n                $where\
    \ = \" where id in ({$strids})\";\n            }\n\n            mysqli_query($con,\
    \ \"delete from {$options['table']}{$where};\");\n        } else {\n         \
    \   echo '$options must be an array';\n        }\n    } else {\n        echo \"\
    No database connection\";\n    }\n}\n\n// Call the function\n$params = [\n   \
    \ 'ids' => [1, 3, 5]\n];\n\nDeleteRows($params);\n\nmysqli_close($con);\n?>\n\
    ```\n\nThe `$opt` parameter is not optional and the internal variable `$options`\
    \ is defined as the merge between a static array defining the table parameter\
    \ and the values from `$opt`, if any. The `array_merge()` function will overwrite\
    \ keys from the first array with values from the second array or add keys that\
    \ are missing in the first array and exist in the second array.\n\nCalling the\
    \ `DeleteRows()` function without any parameters will delete all the rows in the\
    \ `mytable` table. Adding only a parameter for ids will delete the matching rows\
    \ in `mytable`. If deletion is required for a different table the caller can simply\
    \ provide an option for table with an optional list of ids.\n\nIn addition the\
    \ function will allow the user to delete records from any table in the database.\
    \ It could be a good idea to validate that the table exists and the user is allowed\
    \ to perform the delete operation.\n\nThe same example could be implemented with\
    \ a single array parameter where the parameters are named.\n\n```php\n<?php\n\
    // 11_5.php\n\n$con = mysqli_connect('host', 'user', 'secret');\n\nif ($con) {\n\
    \    mysqli_select_db($con, 'mydb');\n}\n\nfunction DeleteRows($options) {\n \
    \   global $con;\n\n    if ($con) {\n        if (is_array($options) && $options['table'])\
    \ {\n            $where = \"\";\n\n            if (is_array($options['ids']) &&\
    \ sizeof($options['ids'])) {\n                $strids = implode(\", \", $options['ids']);\n\
    \                $where = \" where id in ({$strids})\";\n            }\n\n   \
    \         mysqli_query($con, \"delete from {$options['table']}{$where};\");\n\
    \        } else {\n            echo '$options must be an array';\n        }\n\
    \    } else {\n        echo \"No database connection\";\n    }\n}\n\n// Call the\
    \ function\n$params = [\n    'ids' => [1, 3, 5],\n    'table' => 'mytable'\n];\n\
    \nDeleteRows($params);\n\nmysqli_close($con);\n?>\n```\n\nNow the function takes\
    \ a single parameter called `$options`. It must be an array and the key called\
    \ `'table'` must be defined, otherwise the function will print an error message.\
    \ The order the parameters are created in the array does not matter.\n\nUsing\
    \ arrays as parameters makes it possible to change how a function works without\
    \ breaking existing code that uses the function. That is only the case if new\
    \ parameters are added. Renaming or removing parameters might still require changes\
    \ to existing code that is calling the function.\n\nAgain this function does not\
    \ provide any checks if the table exists or if the user is allowed to delete the\
    \ data (access control).\n\n## Recipe 11-5: Type Declarations\n\n### Problem\n\
    \nIn a strict typed language like C the compiler will check that all parameters\
    \ passed to functions are the correct type and the compilation will fail before\
    \ the code can be executed. In a loosely typed language like PHP (see chapter\
    \ 10) it’s possible for variables to accept any type of data and they can change\
    \ type during runtime. Is it possible to enable features that can help the developer\
    \ passing the correct types of data to functions and class methods?\n\n### Solution\n\
    \nType Declarations was introduced in PHP version 5.0. Back then the concept was\
    \ called type hinting. In this version it was only possible to use class/interface\
    \ or self as a type declaration. PHP version 5.1 added support for array, PHP\
    \ version 5.4 added support for callable, and PHP 7.0 added support for scalar\
    \ types (`bool`, `int`, `float`, and `string`).\n\nType declaration works by adding\
    \ a type string in front of the variable. The type string can be a name of a class\
    \ or interface, the word `'self'` to indicate an object of the same class as the\
    \ method is defined on or one of the keywords `array`, `callable`, `bool`, `int`,\
    \ `float`, or `string`.\n\nWhen a type declaration is used the parameter will\
    \ not accept a null value. A null value does not have any type. It is however\
    \ possible to allow the parameter to accept null values by making the parameter\
    \ optional and defining the default value as null.\n\n### How It Works\n\nIn the\
    \ next example the function definition is changed to have a string and array as\
    \ the parameters.\n\n```php\n<?php\n// 11_8.php\n\n$con = mysqli_connect('host',\
    \ 'user', 'secret');\n\nif ($con) {\n    mysqli_select_db($con, 'mydb');\n}\n\n\
    function DeleteRows(string $table, array $ids = []) {\n    global $con;\n\n  \
    \  if ($con) {\n        $where = \"\";\n\n        if (is_array($ids) && sizeof($ids))\
    \ {\n            $strids = implode(\", \", $ids);\n            $where = \" where\
    \ id in ({$strids})\";\n        }\n\n        mysqli_query($con, \"delete from\
    \ {$table}{$where};\");\n    } else {\n        echo \"No database connection\"\
    ;\n    }\n}\n\n// Call the function\nDeleteRows(\"mytable\");\n\nmysqli_close($con);\n\
    ?>\n```\n\nIf this function is called with other types of parameters than a string\
    \ and an array, PHP will cause a catchable fatal error (PHP 5) or throw an exception\
    \ of `TypeError` (PHP 7)."
