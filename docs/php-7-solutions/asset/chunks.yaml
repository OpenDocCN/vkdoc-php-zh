- fmt: "| Casting operator | Alternatives | Operation |\n| --- | --- | --- |\n| `(array)`\
    \ |   | Casts to an array |\n| `(bool)` | `(boolean)` | Casts to a Boolean |\n\
    | `(float)` | `(double)`, `(real)` | Casts to a floating-point number |\n| `(int)`\
    \ | `(integer)` | Casts to an integer |\n| `(string)` |   | Casts to a string\
    \ |\n\nTo convert the data type of a variable, precede it with the appropriate\
    \ casting operator like this:\n\n```\n$input = 'coffee';\n$drinks = (array) $input;\n\
    ```\n\nThis assigns an array to `$drinks` containing the string `'coffee'` as\
    \ its only element. Casting a string to an array like this can be useful when\
    \ a function expects an array rather than a string as an argument. In this example,\
    \ the data type of `$input` remains a string. To make a cast permanent, reassign\
    \ the casted value to the original variable like this:\n\n```\n$input = (array)\
    \ $input;\n```\n\n## Checking whether a variable has been Defined\n\nOne of the\
    \ most common tests used in conditional statements is to check whether a variable\
    \ has been defined. Simply pass the variable to the `isset()` function like this:\n\
    \n```\nif (isset($name)) {\n//do something if $name has been defined\n} else {\n\
    //do something else, such as give $name a default value\n}\n```\n\n## Doing calculations\
    \ with PHP\n\nPHP can perform a wide variety of calculations, from simple arithmetic\
    \ to complex math. This chapter covers only the standard arithmetic operators.\
    \ See [`www.php.net/manual/en/book.math.php`](http://www.php.net/manual/en/book.math.php)\
    \ for details of the mathematical functions and constants supported by PHP.\n\n\
    > **Note**  \n> A constant represents a fixed value that cannot be changed. All\
    \ PHP predefined constants are in uppercase. Unlike variables, they do not begin\
    \ with a dollar sign. For example, the constant for π (pi) is `M_PI`. You can\
    \ find a full list at [`www.php.net/manual/en/reserved.constants.php`](http://www.php.net/manual/en/reserved.constants.php).\n\
    \n### Arithmetic operators\n\nThe standard arithmetic operators all work the way\
    \ you would expect, although some of them look slightly different from those you\
    \ learned at school. For instance, an asterisk (`*`) is used as the multiplication\
    \ sign, and a forward slash (`/`) is used to indicate division. Table 4-2 shows\
    \ examples of how the standard arithmetic operators work. To demonstrate their\
    \ effect, `$x` has been set to 20.\n\n**Table 4-2. Arithmetic operators in PHP**\n\
    \n| Operation | Operator | Example | Result |\n| --- | --- | --- | --- |\n| Addition\
    \ | `+` | `$x + 10` | `30` |\n| Subtraction | `-` | `$x - 10` | `10` |\n| Multiplication\
    \ | `*` | `$x * 10` | `200` |\n| Division | `/` | `$x / 10` | `2` |\n| Modulo\
    \ | `%` | `$x % 3` | `2` |\n| Increment (add 1) | `++` | `$x++` | `21` |\n| Decrement\
    \ (subtract 1) | `--` | `$x--` | `19` |\n| Exponentiation | `**` | `$x**3` | `8000`\
    \ |\n\nThe modulo operator converts both numbers to integers by stripping the\
    \ decimal portion before processing and returns the remainder of a division, as\
    \ follows:\n\n```\n5 % 2.5    // result is 1, not 0 (the decimal fraction is stripped\
    \ from 2.5)\n10 % 2     // result is 0\n```\n\nModulo is useful for working out\
    \ whether a number is odd or even. `$number % 2` always produces 0 or 1. If the\
    \ result is 0, there is no remainder, so the number is even.\n\n### Using the\
    \ increment and Decrement Operators\n\nThe increment (`++`) and decrement (`--`)\
    \ operators can come either before or after the variable. Their position has an\
    \ important effect on the calculation.\n\nWhen the operators come before the variable,\
    \ 1 is added or subtracted before any further calculation is carried out, as shown\
    \ in the following example:\n\n```\n$x = 5;\n$y = 6;\n--$x * ++$y // result is\
    \ 28 (4 * 7)\n```\n\nWhen they come after, the main calculation is carried out\
    \ first, and then 1 is either added or subtracted, like this:\n\n```\n$x = 5;\n\
    $y = 6;\n$x-- * $y++ // result is 30 (5 * 6), but $x is now 4, and $y is 7\n```\n\
    \n### Determining the order of calculations"
  raw: "Casting operator |\n Alternatives |\n Operation |\n\n| --- | --- | --- | ---\
    \ | --- | --- | --- |\n\n`(array)` |\n   |\n Casts to an array |\n\n`(bool)` |\n\
    \ `(boolean)` |\n Casts to a Boolean |\n\n`(float)` |\n `(double), (real)` |\n\
    \ Casts to a floating-point number |\n\n`(int)` |\n `(integer)` |\n Casts to an\
    \ integer |\n\n`(string)` |\n   |\n Casts to a string |\n\nTo convert the data\
    \ type of a variable, precede it with the appropriate\ncasting operator like this:\n\
    \n```\n$input = 'coffee';\n$drinks = (array) $input;\n```\n\nThis assigns an array\
    \ to `$drinks` containing\nthe string `'coffee'` as its only\nelement. Casting\
    \ a string to an array like this can be useful when a\nfunction expects an array\
    \ rather than a string as an argument. In this\nexample, the data type of `$input`\
    \ remains a\nstring. To make a cast permanent, reassign the casted value to the\n\
    original variable like this:\n\n```\n$input = (array) $input;\n```\n\nChecking\
    \ whether a variable has been Defined\n\nOne of the most common tests used in\
    \ conditional statements is to check\nwhether a variable has been defined. Simply\
    \ pass the variable to the\n`isset()`\nfunction  like\nthis:\n\n```\nif (isset($name))\
    \ {\n//do something if $name has been defined\n} else {\n//do something else,\
    \ such as give $name a default value\n}\n```\n\nDoing calculations with PHP\n\
    PHP can perform a wide variety of calculations, from simple\narithmetic to complex\
    \ math. This chapter covers only the standard\narithmetic operators. See [ `www.php.net/manual/en/book.math.php`\n\
    ](http://www.php.net/manual/en/book.math.php) for details of the mathematical\
    \ functions and\nconstants supported by PHP.\n\nNote\nA **constant** represents\
    \ a fixed value that cannot be\nchanged. All PHP predefined constants are in uppercase.\
    \ Unlike\nvariables, they do not begin with a dollar sign. For example, the\n\
    constant for π (pi) is `M_PI`. You can find a\nfull list at [`www.php.net/manual/en/reserved.constants.php`](http://www.php.net/manual/en/reserved.constants.php)\
    \ .\n\nArithmetic operators\n\nThe standard arithmetic operators all work the\
    \ way you would expect,\nalthough some of them look slightly different from those\
    \ you learned at\nschool. For instance, an asterisk (`*`) is used as the\nmultiplication\
    \ sign, and a forward slash (`/`) is used to\nindicate division. Table [4-2](#332054_4_En_4_Chapter.xhtml#Tab2)\
    \ shows examples\nof how the standard arithmetic operators work. To demonstrate\
    \ their\neffect, `$x` has\nbeen set to 20.\n\nTable 4-2.\nArithmetic operators\
    \ in PHP\n\nOperation |\n Operator |\n Example |\n Result |\n\n| --- | --- | ---\
    \ | --- | --- | --- | --- | --- | --- |\n\nAddition |\n `+` |\n `$x + 10` |\n\
    \ `30` |\n\nSubtraction |\n `-` |\n `$x - 10` |\n `10` |\n\nMultiplication |\n\
    \ `*` |\n `$x * 10` |\n `200` |\n\nDivision |\n `/` |\n `$x / 10` |\n `2` |\n\n\
    Modulo |\n `%` |\n `$x % 3` |\n `2` |\n\nIncrement (add 1) |\n `++` |\n `$x++`\
    \ |\n `21` |\n\nDecrement (subtract 1) |\n `--` |\n `$x--` |\n `19` |\n\nExponentiation\
    \ |\n `**` |\n `$x**3` |\n `8000` |\n\nThe modulo operator converts both numbers\
    \ to integers by stripping the\ndecimal portion before processing and returns\
    \ the remainder of a\ndivision, as follows:\n\n```\n5 % 2.5    // result is 1,\
    \ not 0 (the decimal fraction is stripped from 2.5)\n10 % 2     // result is 0\n\
    ```\n\nModulo is useful for working out whether a number is odd or even.\n`$number\
    \ % 2`\nalways produces 0 or 1\\. If the result is 0, there is no remainder, so\n\
    the number is even.\n\nUsing the increment and Decrement Operators\nThe increment\
    \ (`++`) and decrement\n(`--`) operators can come\neither before or after the\
    \ variable. Their position has an important\neffect on the calculation.\n\nWhen\
    \ the operators come before the variable, 1 is added or subtracted\nbefore any\
    \ further calculation is carried out, as shown in the following\nexample:\n\n\
    ```\n$x = 5;\n$y = 6;\n--$x * ++$y // result is 28 (4 * 7)\n```\n\nWhen they come\
    \ after, the main calculation is carried out first, and\nthen 1 is either added\
    \ or subtracted, like this:\n\n```\n$x = 5;\n$y = 6;\n$x-- * $y++ // result is\
    \ 30 (5 * 6), but $x is now 4, and $y is 7\n```\n\nDetermining the order of calculations"
  trans: "\n| 类型转换运算符 | 替代写法 | 操作说明 |\n| --- | --- | --- |\n| `(array)` |   | 转换为数组\
    \ |\n| `(bool)` | `(boolean)` | 转换为布尔型 |\n| `(float)` | `(double)`, `(real)` |\
    \ 转换为浮点数 |\n| `(int)` | `(integer)` | 转换为整型 |\n| `(string)` |   | 转换为字符串 |\n\n\
    要转换变量的数据类型，请在变量前方加上相应的类型转换运算符，示例如下：\n\n```\n$input = 'coffee';\n$drinks = (array)\
    \ $input;\n```\n\n此操作将为 `$drinks` 分配一个包含字符串 `'coffee'` 作为唯一元素的数组。当某个函数期望接收数组而非字符串作为参数时，像这样将字符串强制转换为数组会非常有用。在此示例中，`$input`\
    \ 的数据类型仍然是字符串。若要使转换永久生效，请将转换后的值重新赋值给原变量，示例如下：\n\n```\n$input = (array) $input;\n\
    ```\n\n## 检查变量是否已被定义\n\n在条件语句中，最常见的测试之一就是检查某个变量是否已被定义。只需将变量传递给 `isset()` 函数，示例如下：\n\
    \n```\nif (isset($name)) {\n// 如果 $name 已被定义，则执行相应操作\n} else {\n// 执行其他操作，例如为\
    \ $name 赋予一个默认值\n}\n```\n\n## 使用 PHP 进行计算\n\nPHP 可以执行各种计算，从简单的算术运算到复杂的数学计算。本章仅介绍标准算术运算符。关于\
    \ PHP 支持的数学函数和常量的详细信息，请参阅 [`www.php.net/manual/en/book.math.php`](http://www.php.net/manual/en/book.math.php)。\n\
    \n> **注意**  \n> 常量代表一个不可更改的固定值。所有 PHP 预定义常量均为大写。与变量不同，常量前面没有美元符号。例如，π（圆周率）的常量是\
    \ `M_PI`。你可以在 [`www.php.net/manual/en/reserved.constants.php`](http://www.php.net/manual/en/reserved.constants.php)\
    \ 找到完整的常量列表。\n\n### 算术运算符\n\n所有标准算术运算符的工作方式都符合你的预期，尽管其中一些符号与你上学时所学的略有不同。例如，星号（`*`）用作乘号，正斜杠（`/`）用于表示除法。表\
    \ 4-2 展示了标准算术运算符的工作原理示例。为了演示其效果，`$x` 被设置为 20。\n\n**表 4-2. PHP 中的算术运算符**\n\n| 操作\
    \ | 运算符 | 示例 | 结果 |\n| --- | --- | --- | --- |\n| 加法 | `+` | `$x + 10` | `30`\
    \ |\n| 减法 | `-` | `$x - 10` | `10` |\n| 乘法 | `*` | `$x * 10` | `200` |\n| 除法 |\
    \ `/` | `$x / 10` | `2` |\n| 取模 | `%` | `$x % 3` | `2` |\n| 递增（加 1） | `++` | `$x++`\
    \ | `21` |\n| 递减（减 1） | `--` | `$x--` | `19` |\n| 指数运算 | `**` | `$x**3` | `8000`\
    \ |\n\n取模运算符在处理前会移除两数的小数部分，将其转换为整数，然后返回除法的余数，具体如下：\n\n```\n5 % 2.5    // 结果是 1，而不是\
    \ 0（2.5 的小数部分被移除）\n10 % 2     // 结果是 0\n```\n\n取模运算对于判断一个数字是奇数还是偶数非常有用。`$number\
    \ % 2` 总是产生 0 或 1。如果结果为 0，表示没有余数，因此该数字是偶数。\n\n### 使用递增和递减运算符\n\n递增（`++`）和递减（`--`）运算符既可以放在变量之前，也可以放在变量之后。它们的位置对计算结果有重要影响。\n\
    \n当运算符放在变量之前时，在进行任何进一步计算之前，先执行加 1 或减 1 操作，如下例所示：\n\n```\n$x = 5;\n$y = 6;\n--$x\
    \ * ++$y // 结果是 28 (4 * 7)\n```\n\n当运算符放在变量之后时，先执行主计算，然后再进行加 1 或减 1 操作，如下所示：\n\
    \n```\n$x = 5;\n$y = 6;\n$x-- * $y++ // 结果是 30 (5 * 6)，但 $x 现在是 4，$y 现在是 7\n```\n\
    \n### 确定计算顺序\n"
- fmt: "Calculations in PHP follow the same rules of precedence as standard arithmetic.\
    \ [Table 4-3](#332054_4_En_4_Chapter.xhtml#Tab3) lists arithmetic operators in\
    \ order of precedence, with the highest precedence at the top.\n\n| Group | Operators\
    \ | Rule |\n| --- | --- | --- |\n| Parentheses | `()` | Operations contained within\
    \ parentheses are evaluated first. If these expressions are nested, the innermost\
    \ is evaluated foremost. |\n| Exponentiation | `**` |  |\n| Increment/decrement\
    \ | `++ --` |  |\n| Multiplication and division | `* / %` | If an expression contains\
    \ two or more of these operators, they are evaluated from left to right. |\n|\
    \ Addition and subtraction | `+ -` | If an expression contains two or more of\
    \ these operators, they are evaluated from left to right. |\n\nTable 4-3. Precedence\
    \ of arithmetic operators\n\n## Combining calculations and assignment\n\nPHP offers\
    \ a shorthand way of performing a calculation on a variable and reassigning the\
    \ result to the variable through **combined assignment operators**. The main ones\
    \ are listed in [Table 4-4](#332054_4_En_4_Chapter.xhtml#Tab4).\n\n| Operator\
    \ | Example | Equivalent to |\n| --- | --- | --- |\n| `+=` | `$a += $b` | `$a\
    \ = $a + $b` |\n| `-=` | `$a -= $b` | `$a = $a - $b` |\n| `*=` | `$a *= $b` |\
    \ `$a = $a * $b` |\n| `/=` | `$a /= $b` | `$a = $a / $b` |\n| `%=` | `$a %= $b`\
    \ | `$a = $a % $b` |\n| `**=` | `$a **= $b` | `$a = $a ** $b` |\n\nTable 4-4.\
    \ Combined arithmetic assignment operators used in PHP\n\n## Adding to an existing\
    \ string\n\nThe same convenient shorthand allows you to add new material to the\
    \ end of an existing string by combining a period and an equal sign, like this:\n\
    \n```\n$hamlet = 'To be';\n$hamlet .= ' or not to be';\n```\n\nNote that you need\
    \ to create a space at the beginning of the additional text unless you want both\
    \ strings to run on without a break. This shorthand, known as the **combined concatenation\
    \ operator**, is extremely useful when combining many strings, such as is required\
    \ when building the content of an email message or looping through the results\
    \ of a database search.\n\n> **Tip**  \n> The period in front of the equal sign\
    \ is easily overlooked when copying code. When you see the same variable repeated\
    \ at the beginning of a series of statements, it’s often a sure sign that you\
    \ need to use `.=` instead of `=` on its own.\n\n## All You Ever Wanted to Know\
    \ about Quotes—and More\n\nHandling quotes within any computer language—not just\
    \ PHP—can be fraught with difficulties because computers always take the first\
    \ matching quote as marking the end of a string. Since your strings may include\
    \ apostrophes, the combination of single and double quotes isn’t enough. Moreover,\
    \ PHP gives variables and escape sequences (certain characters preceded by a backslash)\
    \ special treatment inside double quotes. Over the next few pages, I’ll unravel\
    \ this tangle and make sense of it all for you.\n\n### How PHP treats Variables\
    \ Inside Strings\n\nChoosing whether to use double quotes or single quotes might\
    \ just seem like a question of personal preference, but there’s an important difference\
    \ in the way that PHP handles them:\n\n- Anything between single quotes is treated\
    \ literally as text.\n- Double quotes act as a signal to process variables and\
    \ special characters known as **escape sequences**.\n\nIn the following example,\
    \ `$name` is assigned a value and then used in a single-quoted string. So `$name`\
    \ is treated like normal text (the code is in `quotes_01.php`):\n\n```\n$name\
    \ = 'Dolly';\necho 'Hello, $name';  // Hello, $name\n```\n\nIf you replace the\
    \ single quotes in the second line with double ones (see `quotes_02.php`), `$name`\
    \ is processed and its value is displayed onscreen:\n\n```\n$name = 'Dolly';\n\
    echo \"Hello, $name\";  // Hello, Dolly\n```\n\n> **Note**  \n> In both examples,\
    \ the string in the first line is in single quotes. What causes the variable to\
    \ be processed is the fact that it’s in a double-quoted string, not how it originally\
    \ got its value.\n\n### Using escape Sequences Inside Double Quotes"
