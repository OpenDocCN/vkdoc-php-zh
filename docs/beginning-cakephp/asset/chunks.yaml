- fmt: "假设你是一个高级文档工程师，请参考下面的注意事项了解 Markdown 文档的格式，然后参考示例，将给定英文或中文文本排版。\n\n请执行以下操作：\n\
    \n1. 重新划分标题层级（保留合理的`#` `##` `###`结构）\n2. 优化段落格式，删除多余空行\n3. 保留正文核心内容\n4. 所有单独出现的变量名（`varName`），函数名（`funcName()`），类名（`ClassName`），路径名（`/path.to.xxx`），命令名（`cmdname`）以及它们的语句或表达式（`ClassName.funcName(var1\
    \ + var2, \"cmd arg0 arg1\"`）都需要添加反引号。如果上述东西被粗体（`**`）或者斜体（`*`）包围，去掉星号再加反引号。\n\
    5. 代码块前后加上三个反引号（```）\n\n## 重要规则\n\n- 不要修改正文内容的语义\n- 不要删减有价值的信息\n- 确保输出是标准Markdown格式\n\
    - 只返回处理后的内容，不要重复输出原文，也不要添加额外说明\n\n## 示例\n\n原文：\n\n\n进入 /path/to/xxx 目录，找到 xxx.json。\n\
    \n在表达式 cvar = avar + bvar 中，加法运算符（+）将 avar 与 bvar 相加，得到它们的和 cvar\n\n在 List.of(arg0,\
    \ arg1, arg2) 中，List 接口的工厂方法 of() 接受一系列的元素，返回包含它们的只读列表。\n\n之后我们这样调用 cmd 命令：cmd\
    \ arg0 arg1 arg2。\n\nif (condVar > someVal) {console.log(\"xxx\")}\n\n\n排版后：\n\
    \n\n进入`/path/to/xxx`目录，找到`xxx.json`。\n\n在表达式`cvar = avar + bvar`中，加法运算符（`+`）将`avar`与`bvar`相加，得到它们的和`cvar`\n\
    \n在`List.of(arg0, arg1, arg2)`中，`List`接口的工厂方法`of()`接受一系列的元素，返回包含它们的只读列表。\n\n之后我们这样调用`cmd`命令：`cmd\
    \ arg0 arg1 arg2`。\n\n```\nif (condVar > someVal) {console.log(\"xxx\")}\n```\n\
    \n\n## 以下是需要排版的文本\n\n\nImagine that you ran the same query used in the previous\
    \ section but for a large database with thousands of stored records. All the associated\
    \ models would get pulled into the array and make for a substantially large process.\
    \ Early on you won’t notice the load your customized code could impose on the\
    \ server, because you’re usually dealing only with test data and in low quantities.\
    \ But what if you were to launch the application on an extremely busy web site?\
    \ Quite possibly the application could overload the server when searching for\
    \ all the associations. For this reason, Cake has provided some functions that\
    \ can help trim results by killing associations on the fly.\n\n**The unbindModel()\
    \ Function**\n\nIn Listing 7-11, several lines of code were returned to describe\
    \ the associated models in the array. Remember, this is just one record. All these\
    \ lines would be multiplied not only by the number of records returned but also\
    \ by how many associated tags are assigned to each record.\n\nThere’s a possibility\
    \ of loading redundant data, especially when you run queries on “has and belongs\
    \ to many” associations.\n\nThe unbindModel() model function allows you to temporarily\
    \ kill the “has and belongs to many” relationship the Post model shares with the\
    \ Tag model. In the findByYear() function in the Post model, you can run this\
    \ function before the database query, and the results will change dramatically.\
    \ Listing 7-12 shows how to insert this function in the findByYear() function.\n\
    \n**Listing 7-12.** *Using the* unbindModel() *Function to Trim Results and Server\
    \ Load* 1\n\nfunction findByYear($year=null) {\n\n$date = $year.'-01-01 00:00:00';\n\
    \n$end_date = $year.'-12-31 23:59:59';\n\n$this->unbindModel(array('hasAndBelongsToMany'=>array('Tag')));\
    \ 5\n\nreturn $this->find('all',array('conditions'=>array('DATE(Post.date)'=>➥\n\
    \n'>'.$date,'DATE(Post.date)'=>'<'.$end_date)));\n\n}\n\nLine 4 in Listing 7-12\
    \ shows how to use the unbindModel() function to kill the hasAndBelongsToMany\
