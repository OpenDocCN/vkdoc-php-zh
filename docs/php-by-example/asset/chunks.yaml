    稍后你将看到，`~$A` 表达式的值是数字 `-($A+1)`。例如，`~5` 表达式的值是数字 `-6`。


    *按位移位运算*（将数字的二进制表示向右或向左移动若干位）通过 `<<`（*左移*）和 `>>`（*右移*）运算符执行。`$A<<$n` 形式表达式的值是一个数字，其二进制码是将数字
    `$A` 的二进制码向左移动 `$n` 位得到的。左侧的位丢失，右侧的位用 0 填充。`$A>>$n` 形式表达式的值是一个数字，其二进制码是将数字 `$A`
    的二进制码向右移动 `$n` 位得到的。右侧的位丢失，左侧的位用符号位的值填充（第一位，正数为 `0`，负数为 `1`）。


    | 详情 |

    | --- |

    | 负数的编码有其特殊性。为了理解编码原理，假设数字用 8 位存储。假设你有一个代码。例如，令代码为 `00010011`（数字 `19`）。对该代码执行按位取反（将
    `1` 替换为 `0`，将 `0` 替换为 `1`）。你会得到代码 `11101100`。现在，将这两个代码相加。二进制系统中的加法规则很简单：`0+0=0`，`1+0=1`，`0+1=1`，`1+1=10`。最后一项相当于
    `2+2=4`，但只是用二进制代码书写。因此，如果将代码 `00010011` 和 `11101100` 相加，你会得到由 1 组成的代码 `11111111`。接下来，向该代码加一（代码
    `00000001`）。你会得到 `100000000`。但这里，你必须记住你是在处理一台计算机，假设它使用 8 位存储数字。然而，代码 `100000000`
    中有九位数字。因此，数字的开头根本没有位来记住这个 `1`，它就丢失了。你会得到由 0 组成的代码 `00000000`。这个数字是 `0`。如果采用不同的源代码和不同的位数来存储数字，结果将是相同的。你得到了什么？如果你取某个正数
    `$X`，对其代码取反（`~$X` 表达式），将这些代码相加，然后再加 `1`，你最终会得到 `0`。换句话说，无论 `$X` 的值是多少，都存在关系 `$X+(~$X)+1=0`。很容易看出，表达式
    `(~$X)+1` 可以等同于数字 `-$X` 的代码（与 `$X` 相反的数字）。因此，如果你需要得到一个负数的二进制代码，你应该取相反正数的代码，对该代码取反，然后加
    `1`。数字二进制代码的第一位用于确定符号：对于正数，该位为 `0`；对于负数，该位为 `1`。对于正数，二进制表示根据标准数学规则转换为十进制值。如果你需要将负数的二进制代码转换为十进制表示，则应遵循以下步骤。首先，对代码取反。然后加
    `1`。得到的值根据正数的转换规则转换为十进制表示。最后一步，在计算出的数字前加上负号。 |


    假设使用 8 位来书写数字。那么，`41<<1` 表达式的结果是数字 `82`。解释如下。数字 `41` 的代码是 `00101001`。向左移动一位后，得到代码
    `01010010`，对应 `82`。如果将代码 `00101001` 向左移动两位（`41<<2` 语句），得到代码 `10100100`。这里，第一个符号位是
    `1`。因此，这个数字是负数。为了确定该数字，你执行按位取反，得到代码 `01011011`。然后加 `1`，得到代码 `01011100`。这是数字 `92`
    的代码。所以，`41<<2` 表达式的结果是数字 `-92`，其代码为 `10100100`。`41<<3` 表达式的结果是数字 `72`，其代码为 `01001000`。


    ![](img/613529_1_En_2_Figk_HTML.jpg)信息图标。


    注意


    重要的是要理解，只有在使用恰好 8 位存储数字时才会得到这样的结果。如果位数不同（例如 32 位），那么 `41<<1` 表达式的结果是 `82`，`41<<2`
    表达式的值是 `164`，而在计算 `41<<3` 表达式的值时，你会得到 `328`。


    当计算 `41>>1` 表达式时，数字 `41` 的代码 `00101001` 向右移动一位，得到代码 `00010100`。它对应数字 `20`。`41>>2`
    表达式的值是 `10`，二进制代码为 `00001010`。`-69>>2` 表达式的结果是数字 `-18`。这里，你应该考虑到数字 `-69` 的代码（使用
    8 位编码时）是 `10111011`。将其向右移动两位，得到代码 `11101110`。这是数字 `-18` 的代码。


    ![](img/613529_1_En_2_Figl_HTML.jpg)信息图标。


    注意


    再次说明，所有这些计算都是在数字使用 8 位存储的情况下给出的。不同的位数意味着不同（一般来说）的结果。

