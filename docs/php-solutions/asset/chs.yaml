  \n**图 9-4.** 使用盐值可以对相同的密码产生完全不同的加密结果\n\n保存`register_user_csv.php`和`register.php`，并测试注册系统。尝试多次注册相同的用户名。你应该会看到一条信息，提示该用户名已被占用，并要求你选择另一个用户名。打开`encrypted.csv`。你应该会看到用户名是明文，但密码已被加密。即使你为两个不同的用户选择相同的密码，加密后的版本也会不同，因为`password_hash()`在加密密码之前会添加一个称为盐值的随机值。图\
  \ 9-4 展示了两个都使用密码`Codeslave&Ch09`注册的用户。\n\n- 如果`$errors`数组不为空，则循环遍历它。否则，将`$result`（一个字符串）的值作为单个列表项显示。\n\
  \n> **提示**：`register_user_csv.php`中的大部分代码都是通用的。要将其用于任何注册表单，你只需在包含它之前定义`$username`、`$password`、`$retyped`和`$userfile`，并使用`$errors`和`$result`捕获结果。你可能需要对外部文件做的唯一更改是设置用户名的最小字符数以及设置密码强度的参数。这些设置定义在文件顶部，因此易于访问和调整。但是，请不要忘记，代码依赖于`password_hash()`，该函数至少需要\
