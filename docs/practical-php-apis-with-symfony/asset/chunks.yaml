    \ operations based on the request payload content\n- How to secure our endpoint\
    \ and operations\n- How to execute operations in the background\n\nIn this chapter,\
    \ we will delve into the process of encapsulating an endpoint within a specific\
    \ context, ensuring that it can only execute the operations defined for that context.\
    \ This approach not only enhances the security and clarity of our API but also\
    \ facilitates the management of multiple controllers by promoting a clear separation\
    \ of concerns. By doing so, we can streamline our codebase, making it easier to\
    \ maintain and extend as our application evolves.\n\nIt is essential to clarify\
    \ that we should not conflate the protection of operations, which ensures that\
    \ only specific roles can execute them, as discussed in Chapter [2](#663561_1_En_2_Chapter.xhtml),\
    \ with the concept of contextualizing endpoints. Role-based access control is\
    \ primarily concerned with user permissions, while contextualization limits the\
    \ operations available to an endpoint based on its designated context. This distinction\
    \ promotes a more organized and maintainable code structure. Both strategies can\
    \ be effectively combined to enhance security. For example, a “Payment” context\
    \ could permit only payment-related operations, with certain operations restricted\
    \ to specific roles, thereby ensuring that sensitive actions are performed only\
