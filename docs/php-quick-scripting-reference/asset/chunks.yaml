    ![image](images/frontdot.jpg)


    Magic Methods


    There are a number of methods that can be implemented in a class for the purpose
    of being called internally by the PHP engine. These are known as magic methods
    and they are easy to recognize as they all start with two underscores. Listed
    in the table below are the magic methods that have been discussed so far.


    | Name | Description |

    | --- | --- |

    | __construct(. . .) | Called when creating a new instance. |

    | __destruct() | Called when object has no references left. |

    | __call($name, $array) | Called when invoking inaccessible methods in an object
    context. |

    | __callStatic($name, $array) | Called when invoking inaccessible methods in a
    static context. |

    | __get($name) | Called when reading data from inaccessible properties. |

    | __set($name, $value) | Called when writing data to inaccessible properties.
    |

    | __isset($string) | Called when `isset` or `empty` is used on inaccessible properties.
    |

    | __unset($string) | Called when `unset` is used on inaccessible properties. |


    In addition to these, there are six more magic methods that like the others can
    be implemented in classes to provide certain functionalities.


    | Name | Description |

    | --- | --- |

    | __toString() | Called for object to string conversions. |

    | __invoke(. . .) | Called for object to function conversions. |

    | __sleep() | Called by `serialize`. Performs cleanup tasks and returns an array
    of variables to be serialized. |

    | __wakeup() | Called by `unserialize` to reconstruct the object. |

    | __set_state($array) | Called by `var_export`. The method must be static and
    its argument contains the exported properties. |

    | __clone() | Called after object has been cloned. |


    Tostring


    When an object is used in a context where a string is expected, the PHP engine
    will search for a method named `__toString` to retrieve a string representation
    of the object.


    ```

    class MyClass

    {

      public function __toString()

      {

        return ''Instance of '' . __CLASS__;

      }

    }


    $obj = new MyClass();

    echo $obj; // "Instance of MyClass"

    ```


    It is not possible to define how an object will behave when evaluated as types
    other than string.


    Invoke


    The `__invoke` method allows an object to be treated as a function. Any arguments
    provided when the object is called will be used as the `__invoke` function’s arguments.


    ```

    class MyClass

    {

      public function __invoke($arg)

      {

        echo $arg;

      }

    }


    $obj = new MyClass();

    $obj(''Test''); // "Test"

    ```


    Object serialization


    Serialization is the process of converting data into a string format. This is
    useful for storing objects in databases or files. In PHP, the built-in `serialize`
    function performs this object-to-string conversion and `unserialize` converts
    the string back into the original object. The `serialize` function handles all
    types, except for the resource type, which for example is used to hold database
    connections and file handlers. Consider the following simple database class.


    ```

    class MyConnection

    {

      public $link, $server, $user, $pass;


    public function connect()

      {

        $this->link = mysql_connect($this->server,

                                    $this->user,

                                    $this->pass);

      }

    }

    ```


    When this class is serialized the database connection will be lost and the resource
    type variable `$link` holding the connection will be stored as null.


    ```

    $obj = new MyConnection();

    // ...


    $bin = serialize($obj);   // serialize object

    $obj = unserialize($bin); // restore object

    ```


    To get greater control over how object data is serialized and unserialized the
    `__sleep` and `__wakeup` methods may be implemented by this class.


    Sleep


    The `__sleep` method is called by `serialize` and needs to return an array containing
    the properties that will be serialized. This array must not include private or
    protected properties, as serialize will not be able to access them. The method
    may also perform cleanup tasks before the serialization occurs, such as committing
    any pending data to storage mediums.


    ```

    public function __sleep()

    {

      return array(''server'', ''user'', ''pass'');

    }

    ```


    Note that the properties are returned to `serialize` in string form. The resource
    type pointer `$link` is not included in the array as it cannot be serialized.
    To reestablish the database connection the `__wakeup` method can be used.


