    \n### 解决方案\n\nMySQL 数据库中有一个特殊用途的数据库或模式，名为 `INFORMATION_SCHEMA`，它包含了服务器上任何数据库中所有表和列的信息。`INFORMATION_SCHEMA`\
    \ 在许多 SQL92 数据库引擎中都是通用的。\n\n在命令行中使用的 `show databases;` 和 `show tables;` 命令也可以从\
    \ `mysqli` 类的 `Query()` 方法中使用。这些命令利用 `INFORMATION_SCHEMA` 中的信息来提取有关系统的数据。\n\n\
    `show databases;` 命令等价于以下语句：\n\n```\nselect schema_name as `Database` from information_schema.schemata;\n\
    ```\n\n别名 `Database` 两边的反引号是因为 `database` 是一个保留字，在查询中用作列名时必须进行转义。\n\n类似地，我们可以编写一条语句来获取名为\
    \ `music` 的数据库中的所有表，这等价于以下命令：\n\n```\nuse music;\nShow tables;\n```\n\n使用信息模式可以让我们从任何位置执行此操作，无需在查询此模式之前选择特定的数据库。\n\
    \n```\nselect table_name from information_schema.tables where table_schema='music';\n\
    ```\n\n最后，我们可以使用以下 SQL 语句获取每张表中的列列表：\n\n```\nselect column_name, column_type from\
    \ information_schema.columns where table_name='album';\n```\n\n### 工作原理\n\n有了这些信息，我们现在可以修改\
    \ `music` 类的构造函数，使其向数据库查询模式信息。\n\n```php\n<?php\n// 16_10.php\n\nclass music extends\
    \ mysqli {\n    private $schema = [];\n\n    function __construct() {\n      \
    \  parent::__construct('127.0.0.1', 'php', 'secret', 'music');\n        if ($this->connect_error)\
    \ {\n            die(\"无法连接到音乐数据库\\n\");\n        }\n\n        $sql = \"select\
    \ table_name from information_schema.tables where table_schema='music';\";\n \
    \       $rs = $this->Query($sql);\n        while ($table = $rs->fetch_assoc())\
    \ {\n            $sql = \"select column_name, column_type from information_schema.columns\
    \ where table_name='{$table['table_name']}';\";\n            $rs1 = $this->query($sql);\n\
    \            while($col = $rs1->fetch_assoc()) {\n                $this->schema[$table['table_name']][$col['column_name']]\
    \ = $col['column_type'];\n            }\n            $rs1->close();\n        }\n\
    \        $rs->close();\n        print_r($this->schema);\n    }\n}\n\n$music =\
    \ new music();\n```\n\n`addArtist()` 和 `addAlbum()` 方法也被重构，以使用通用的模式定义。\n\n```php\n\
    if (sizeof($columns)) {\n    $sql = \"update $table set \" . implode(\", \", $columns)\
