    }\n\na.product_name:hover\n{\n  color: #ff0000;\n  font-family: arial, tahoma,\
    \ verdana;\n  font-size: 14px;\n}\n\n.price\n{\n  font-weight: bold;\n}\n\n.old_price\n\
