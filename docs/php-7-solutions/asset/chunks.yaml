    SELECT * FROM images\n    ORDER BY $col $dir\";\n    // submit the query and capture\
    \ the result\n    $result = $conn->query($sql);\n    $error = $conn->errorInfo()[2];\n\
    \    ```\n\n新代码定义了两个变量`$col`和`$dir`，它们直接嵌入到`SELECT`查询中。由于它们已分配了默认值，当页面首次加载时，查询会按`image_id`列升序显示结果。\n\
    \n然后，两个数组`$columns`和`$direction`定义了允许的值：列名以及`ASC`和`DESC`关键字。条件语句使用这些数组来检查`$_GET`数组中的`column`和`direction`。提交的值仅在与`$columns`和`$direction`数组中的值匹配时，才会重新赋值给`$col`和`$dir`。这可以防止任何尝试向\
    \ SQL 查询注入非法值的行为。\n\n2. 编辑下拉菜单中的`<option>`标签，使其显示`$col`和`$dir`的选中值，如下所示：\n\n```\n\
    \n>image_id\n\n>filename\n\n>caption\n\n>Ascending\n\n>Descending\n\n```\n\n3.\
    \ 保存页面并在浏览器中测试。你可以通过选择下拉菜单中的值并点击`Change`来更改显示的排序顺序。但是，如果你尝试通过查询字符串注入非法值，页面将使用`$col`和`$dir`的默认值，以按`image_id`升序显示结果。\n\
    \n你可以对照`ch13`文件夹中的`mysqli_order_02.php`和`pdo_order_02.php`来检查你的代码。\n\n## 章节回顾\n\
    \nPHP 7 提供了两种与 MySQL 通信的方法：\n\n*   **MySQL 改进版 (MySQLi) 扩展**：建议所有新的 MySQL 项目使用它。它比从\
    \ PHP 7 中移除的原始 MySQL 扩展效率更高。它具有预处理语句的附加安全性，并且与 MariaDB 完全兼容。\n*   **PHP 数据对象 (PDO)\
    \ 抽象层，它是数据库中立的**：这是我首选的与数据库通信的方法。它不仅数据库中立，而且具有为预处理语句使用命名参数的优势，使代码更易于阅读和理解。此外，在\
    \ PHP 7.2 及更高版本中调试预处理语句非常简单。尽管代码是数据库中立的，但 PDO 需要为所选数据库安装正确的驱动程序。MySQL 的驱动程序与 MariaDB\
    \ 完全兼容，并且通常已安装。其他驱动程序不太常见。但是，如果安装了正确的驱动程序，只需更改连接字符串中的数据源名称 (DSN)，即可从一个数据库切换到另一个数据库。\n"
- fmt: '# 14. Creating a Dynamic Photo Gallery


    Although PHP communicates with the database and stores the results, queries need
    to be written in SQL, the standard language used to query a relational database.
    This chapter showed how to retrieve information stored in a database table using
    a `SELECT` statement, refining the search with a `WHERE` clause, and changing
    the sort order with `ORDER BY`. You also learned several techniques to protect
    queries from SQL injection, including prepared statements, which use placeholders
    instead of embedding variables directly in a query.


    In the next chapter, you’ll put this knowledge to practical use by creating an
    online photo gallery.


    The previous chapter concentrated mainly on extracting the contents of the `images`
    table as text. This chapter builds on those techniques to develop the mini photo
    gallery shown in Figure [14-1](#332054_4_En_14_Chapter.xhtml#Fig1).


    ![../images/332054_4_En_14_Chapter/332054_4_En_14_Fig1_HTML.jpg](images/332054_4_En_14_Chapter/332054_4_En_14_Fig1_HTML.jpg)


    Figure 14-1. This mini photo gallery is driven by pulling information from a database


    The gallery also demonstrates some cool features that you’ll want to incorporate
    into text-driven pages, too. For instance, the grid of thumbnail images on the
    left displays two images per row. Just by changing two numbers, you can make the
    grid as many columns wide and as many rows deep as you like. Clicking one of the
    thumbnails replaces the main image and caption. It’s the same page that reloads,
    but exactly the same technique is used to create online catalogs that take you
    to another page with more details about a product. The Next link at the foot of
    the thumbnail grid shows you the next set of photographs, using exactly the same
    technique as you use to page through a long set of search results. This gallery
    isn’t just a pretty face or two… This chapter covers:


    - Understanding why storing images in a database is a bad idea and what you should
    do instead

    - Planning the layout of a dynamic gallery

    - Displaying a fixed number of results in a table row

    - Limiting the number of records retrieved at a time

    - Paging through a long set of results


    ## Why Not Store Images in a Database?


    The `images` table contains filenames and captions, but not the images themselves.
    Even though you can store binary objects, such as images, in a database, I don’t
    intend to do so for the simple reason that it’s usually more trouble than it’s
    worth. The main problems are as follows:


    - Images can’t be indexed or searched without storing textual information separately.

    - Images are usually large, bloating the size of tables. If there’s a limit on
    the amount of storage in your database, you risk running out of space.

    - Table fragmentation affects performance if images are deleted frequently.

    - Retrieving images from a database involves passing the image to a separate script,
    slowing down display on a web page.


    It’s more efficient to store images in an ordinary folder on your web site and
    use the database for information about the images. You need just two pieces of
    information—the filename and a caption that can also be used as `alt` text. Some
    developers store the full path to the image in the database, but I think storing
    only the filename gives you greater flexibility. The path to the `images` folder
    will be embedded in the HTML. There’s no need to store the image’s height and
    width. As you saw in Chapters [5](#332054_4_En_5_Chapter.xhtml) and [10](#332054_4_En_10_Chapter.xhtml),
    you can generate that information dynamically using PHP’s `getimagesize()` function.


    ## Planning the Gallery


    I find that the best way to design a database-driven site is to start with a static
    page and fill it with placeholder text and images. I then create my CSS style
    rules to get the page looking the way I want, and finally I replace each placeholder
    element with PHP code. Each time I replace something, I check the page in a browser
    to make sure everything is still holding together.


    Figure [14-2](#332054_4_En_14_Chapter.xhtml#Fig2) shows the static mockup I made
    of the gallery and points out the elements that need to be converted to dynamic
    code. The images are the same as those used for the random image generator in
    Chapter [5](#332054_4_En_5_Chapter.xhtml) and are all different sizes. I experimented
    by scaling the images to create the thumbnails, but decided that the result looked
    too untidy, so I made the thumbnails a standard size (80 × 54 pixels). Also, to
    make life easy, I gave each thumbnail the same name as the larger version and
    stored them in a separate subfolder of the `images` folder called `thumbs`.


    ![../images/332054_4_En_14_Chapter/332054_4_En_14_Fig2_HTML.jpg](images/332054_4_En_14_Chapter/332054_4_En_14_Fig2_HTML.jpg)


    Figure 14-2. Working out what needs to be done to convert a static gallery to
    a dynamic one


    In the previous chapter, displaying the contents of the `images` table was easy.
    You created a single table row, with the contents of each field in a separate
    table cell. By looping through the result set, each record was displayed on a
    row of its own, simulating the column structure of the database table. This time,
    the two-column structure of the thumbnail grid no longer matches the database
    structure. You need to count how many thumbnails have been inserted in a row before
    creating the next row.


    Once I had worked out what needed to be done, I stripped out the code for thumbnails
    2 to 6 and for the navigation link. The following listing shows what was left
    in the `<main>` element of `gallery.php`, with the elements that need to be converted
    to PHP code highlighted in bold (you can find the code in `gallery_01.php` in
    the `ch14` folder):


    ```

    Images of Japan

    Displaying 1 to 6 of 8


    Water basin at Ryoanji temple, Kyoto

    ```


    ## Converting the Gallery Elements to PHP


    Before you can display the contents of the gallery, you need to connect to the
    `phpsols` database and retrieve all the records stored in the `images` table.
    The procedure for doing so is the same as that in the previous chapter, using
    the following simple SQL query:


    ```

    SELECT filename, caption FROM images

    ```


    You can then use the first record to display the first image and its associated
    caption and thumbnail. You don’t need `image_id`.


    ### PHP Solution 14-1: Displaying the First Image


    If you set up the Japan Journey web site in Chapter [5](#332054_4_En_5_Chapter.xhtml),
    you can work directly with the original `gallery.php`. Alternatively, copy `gallery_01.php`
    from the `ch14` folder and save it in the `phpsols-4e` site root as `gallery.php`.
    You also need to copy `title.php`, `menu.php`, and `footer.php` to the `includes`
    folder of the `phpsols-4e` site. If your editing program asks if you want to update
    the links in the files, choose the option not to update.


    1. Load `gallery.php` into a browser to make sure that it displays correctly.
    The main part of the page should look like Figure [14-3](#332054_4_En_14_Chapter.xhtml#Fig3),
    with one thumbnail image and a larger version of the same image.


    ![../images/332054_4_En_14_Chapter/332054_4_En_14_Fig3_HTML.jpg](images/332054_4_En_14_Chapter/332054_4_En_14_Fig3_HTML.jpg)


    Figure 14-3. The stripped-down version of the static gallery ready for conversion


    2. The gallery depends on a connection to the database, so include `connection.php`,
    create a read-only connection to the `phpsols` database, and define the SQL query.
    Add the following code just before the closing PHP tag above the `DOCTYPE` declaration
    in `gallery.php` (new code is highlighted in bold):'
