    There are two main differences in this new register() action. The first is that
    we have removed the validation code from each of the form fields. This is now
    handled by the new Model validation logic. Furthermore, we can do all sorts of
    validation, instead of the simple (required) validation conditions we had before.


    The second big change is that we first check the results of the validate() method
    before we save the $user row. Where before, we only created the new User instance
    after all our data was correct, we now do it before checking the data. As long
    as we don’t save incorrect data, this difference doesn’t matter much.


    Our register() action is significantly shorter than the previous iteration. Future
    actions (which concern saving data to a database) should also be significantly
    shorter with this new validation code.


    Validate As Required


    You might be wondering why we didn’t change our login() action. The login() action
    actually remains completely unmodified for two reasons:


    • It gives more information than the user needs at login. They don’t need to know
    what constitutes good first/last name data, or how many characters a password
    should be; they just need to know if their credentials allowed them to log in
    (or not).


    • The new validation requires us to create a User instance before validating.
    This is the opposite of how the login should work. We want to return a user row
    if the credentials were valid, not the other way around.


    It is important that we use this new validation at the right time. Adding it to
    the login() action is not ideal (for these reasons), and working around them will
    only further complicate our login() action.


