  trans: "\n### 主题设置指南\n\n为主题编写优秀设置的关键在于深入思考最终用户的需求。当然，你需要运用自己的判断力，但我建议遵循以下通用指南：\n\
    \n- 如果主题中包含这些元素，请务必将其设为主题设置项：\n  - JavaScript 库使用的任何 API 密钥（例如 Instagram 客户端密钥）\n\
    \  - 所有关键图像，包括背景图、网站徽标和网站图标\n  - 用于“附加”主题功能（如新闻通讯弹窗或倒计时器）的开启/关闭开关\n- 避免“上帝设置”——即那些影响网站诸多方面的主题设置（Colonna\
    \ Coffee 商店使用的零售/批发主题设置可能就属于此类——这是我的过错！）。一个设置引发网站的重大变更，会使主题状态难以推理，或难以隔离功能变化。如果可能，请将这些设置拆分为更聚焦、控制单个行为的设置项。\n\
    - 避免直接在主题设置中指定列表，而应利用 Shopify 内置的概念，如导航菜单、商品系列和博客。使用一个指向灵活尺寸商品系列（例如“精选商品”）的设置，远比使用多个分别指向特定商品的设置简单得多。\n\
    - 几乎毫无例外，所有向客户展示的可配置文本内容，都应通过商店的语言文件（我们稍后会讨论）而非主题设置来配置。这能让店主在一个地方控制所有主题文本内容，避免遗漏翻译或文本更改。\n\
    \n### 在主题中使用设置\n\n在主题的 Liquid 代码中，设置可以像其他任何变量一样使用，如清单 8-2 所示。\n\n```liquid\n{%\
    \ if settings.display_site_banner %}\n{% include 'site-banner' %}\n{% endif %}\n\
    ```\n\n#### 迭代模式\n\n经常会有需要重复多次使用的一组设置。例如，如果你的主题在主页上有一个图片轮播，你可能希望用户能够为每张幻灯片配置图片、标题和链接。最直接的方法（如清单\
    \ 8-3 所示）是为每个重复元素重复一次 HTML 逻辑。更好的方法（如清单 8-4 所示）是动态迭代设置值。\n\n```liquid\n{% if settings.show_slide_1\
    \ %}\n  {{ settings.caption_slide_1 | escape }}\n{% endif %}\n{% if settings.show_slide_2\
    \ %}\n  {{ settings.caption_slide_2 | escape }}\n{% endif %}\n{% if settings.show_slide_3\
    \ %}\n  {{ settings.caption_slide_3 | escape }}\n{% endif %}\n```\n\n```liquid\n\
    {% for i in (1..3) %}\n{% capture setting_slide_show %}show_slide_{{i}}{% endcapture\
    \ %}\n{% capture setting_slide_image %}image_slide_{{i}}.png{% endcapture %}\n\
    {% capture setting_slide_title %}caption_slide_{{i}}{% endcapture %}\n{% if settings[setting_slide_show]\
    \ %}\n  {{ settings[setting_slide_title] | escape }}\n{% endif %}\n{% endfor %}\n\
    ```\n\n这段代码不仅编写起来更简短，而且当你想要添加超过三张幻灯片时，扩展也非常容易。同时，这意味着你只需在一个地方更新每张幻灯片渲染的 HTML。\n\
    \n#### 在预处理文件中使用设置\n\n如果你的 `assets` 目录中有 JavaScript 或样式表文件，并且文件名末尾带有 `.liquid`\
    \ 扩展名，Shopify 会在提供这些文件之前通过 Liquid 解析器运行它们，如清单 8-5 所示。\n\n```css\n/* assets/styles.css.liquid\
    \ */\nbody {\n  background-color: {{ settings.body_background_color }};\n}\n```\n\
    \n当直接在 `assets` 目录中处理简单资源时，这没问题，但通常你希望在将最终文件添加到 `assets` 之前进行一些预处理（例如 LESS/SCSS\
    \ 编译，或 JavaScript 连接和压缩）。在这些情况下，你需要考虑预处理器将如何与资源文件中的 Liquid 语法交互。\n\n为了解决这些限制，你需要将可控的样式或\
    \ JavaScript 设置提取到主 Liquid 模板中，或者以一种能通过任何预处理工具和 Liquid 检查的方式编写 SCSS 和 JavaScript。Lucid\
    \ Design 的 Stewart Knapman 在他的文章“Escaping Liquid in SCSS”² 中剖析了 SCSS 文件的问题，并提供了一些示例变通方法，如清单\
    \ 8-6 所示。\n\n```scss\n/* assets/styles.scss.liquid */\nbody {\n  /* {% if settings.background-image\
    \ %} */\n  background: url(#{'{{ settings.background-image | asset_url }}'}) center\
    \ no-repeat;\n  /* {% else %} */\n  background: whitesmoke;\n  /* {% endif %}\
    \ */\n}\n```\n\nStewart 在此概述的方法——将 Liquid 包裹在注释中——通常也适用于其他形式的预处理，如 Less 和 JavaScript。\n\
    \n> **注意**\n> `assets` 目录中带有 `.liquid` 扩展名的 SVG 文件也会被 Liquid 处理，因此可以使用主题设置。\n\n\
    #### 默认值过滤器\n\n当你的主题首次安装时，某些设置可能没有初始值。为了处理这些情况，建议在 Liquid 模板中使用默认值，以防止生成无效的 HTML\
    \ 或 CSS。例如，如果你将页面背景色设为主题设置，你可能需要像清单 8-7 那样操作。\n\n请注意，你也可以在 `settings_schema.json`\
    \ 中为设置指定默认值——例如，使用 `default: 'white'`。一般来说，我建议在两个地方都设置默认值，以避免未设置值的边缘情况。\n\n```css\n\
    /* assets/styles.css.liquid */\nbody {\n  background-color: {{ settings.body_background_color\
    \ | default: 'white' }};\n}\n```\n\n## 走向全球化\n\n说电子商务是全球性事务是显而易见的，但为了达到字数要求，我还是得提一下。对于主题开发者来说，这意味着我们的工作需要开箱即用，支持不同的地区、语言和货币。\n\
    \n### i18n 与 l16n 的区别\n\n你知道我花了多久才意识到 “i18n” 是国际化（internationalization）的缩写（严格来说是数字缩写词）吗？好吧，我不告诉你确切时间，因为太尴尬了。简而言之，在我开始深入研究如何让非英语母语者也能使用我正在构建的软件和网站之前，我已经从事专业软件开发工作一段时间了。\n\
    \n那么，快速回顾一下：\n\n- `i18n` 是国际化（internationalization）的简写（中间有 18 个被省略的字母，因此得名），指的是使软件（包括网站）能够支持多种区域设置的过程。\n\
    - `l16n` 是本地化（localization）的简写，指的是在软件产品中为支持 `i18n` 而实际实现某个区域设置的过程。\n\n为了清晰起见，在\
    \ Shopify 主题的上下文中：\n\n- `i18n` 是使用 `| t` 翻译过滤器使主题支持多种区域设置的过程。\n- `l16n` 是为主题创建特定语言翻译（例如瑞典语）的过程。\n"
- fmt: '### Locales, Not Languages


    You might have noticed that I’ve used the term “locale” instead of “language”
    in this section. This is because while language is probably the most important
    part of localization, it’s not the whole story. While two locales may share a
    language, they may use different date/time formats, currencies, number formats,
    systems of measurement and temperature, and phone/address formats.


    Most of the focus in this lesson is on language and currencies, but it’s good
    to be aware of these other potential differences between the locales you’re dealing
    with.


    ### Why Localization Matters


    At the end of the day, there’s no point talking about `i18n` if it doesn’t deliver
    any real value to clients or customers. This section contains a list of some reasons
    storeowners may be looking to expand into new regions, demanding a new localized
    version of their theme.


    #### Acquisition


    Have a localized site can open a store up to traffic from new places. Not only
    will Google find and add a site’s content and product pages to a localized search
    index, but customers are much more likely to share content from a site if it’s
    in a language their network understands and uses.


    #### Conversion


    Making customers have to think when completing tasks is a sure-fire way to kill
    conversions—and figuring out how to get to the checkout in your second or third
    language counts as thinking. This is true even when there’s a high degree of second-language
    fluency (for example, Scandinavians navigating English-language stores).


    #### Required by Higher Authority


    In some situations, clients may just need to offer their store in multiple languages.
    This could be a legal obligation (e.g., government bodies needing to offer services
    and products in both English and French), or simply be a hard requirement from
    another branch of their organization.


    #### Empirical Demand


    If you’re still not convinced on this, I refer you to an eight-year-old thread
    on the Shopify forums, in which storeowners and theme designers have been arguing
    the case for `i18n` support in Shopify since time immemorial.[³](#A437216_1_En_8_Chapter.html#Fn3)


    People are keen for `i18n` support!


    If you’re looking to sell your theme, rather than develop one on behalf of a client,
    having a solid `i18n` approach can also be a great selling point. (If you’re planning
    on selling your theme in Shopify’s official theme store, it’s mandatory.)


    Showing that your theme can be adapted to multiple languages will give potential
    purchasers a lot of confidence that you’ve thought these things through, even
    if you don’t have a translation for the specific language(s) they’re planning
    on working in. Going the extra mile and getting the base of your theme translated
    into some common languages in your target market (Spanish in the United States
    or French in Canada, for example) can also make your theme stand out from the
    rest.


    ### Go Hard or Go Home


    When it comes to `i18n`, a half-assed attempt is much worse than no attempt. Plugging
    your theme content into Google Translate and copying and pasting the output is
    not going to lead to good results.


    Think about any sites you’ve seen around the web with poor translations in to
    your native language—how much did you trust them? Would you buy something from
    them?


    It’s much better to have a theme with a single language done well than three languages
    that obviously had Google Translate as the author. Get a native speaker to provide
    your translations, whether it’s someone you know and trust or by using a trustworthy
    translation service, or leave `i18n` until you have the resources to do it properly.


    This is good advice to give to clients you’re working with that are thinking about
    multi-lingual support as well.


    ### Limitations of Shopify Themes


    Now that you’re on board with this whole `i18n` thing and raring to get started
    building it in to your theme, let me deflate you a little.


    There are, unfortunately, some significant limitations when dealing with internationalization
    on Shopify. In more recent times, Shopify has started to address these issues
    (the newer `i18n` theme features we’ll be using shortly being a great example),
    but it’s important to know there are still some hard restrictions.


    These are:


    - Storeowners can only set one locale at a time for any one store.

    - Storeowners can only set one checkout currency at a time for any one Shopify
    store.


    What this means is that even if you put in the work to support multiple locales
    in your theme, storeowners can only choose one locale to present to customers
    at any one time. There’s no built-in way to give your customers a choice of language,
    or automatically present a translation based on a visitor’s browser locale.


    There is also no way to allow customers to pay in any currency other than the
    one selected by the storeowner in the store admin.


    While these limitations can be irritating, in the remainder of this lesson, we’re
    going to see what we can do within these constraints. I’ve consciously left any
    discussion of Shopify applications that provide translation features out of this
    discussion. It’s good to be aware of them, but ultimately installed custom applications
    go beyond the remit of a theme designer in most cases.


    ### Making Themes Translatable


    The process of ensuring your themes are translatable is very straightforward—it’s
    just a matter of ensuring that all user-facing text content in your Liquid files
    is mapped to a “translation key” and then passed through the translation filter
    `| t`.


    As a practical example, we can see how a link to the checkout would look in Liquid
    before internationalization (see Listing [8-8](#A437216_1_En_8_Chapter.html#Par83))
    and afterwards (see Listing [8-9](#A437216_1_En_8_Chapter.html#Par84)).


    ```

    ...


    Checkout Now


    ...

    Listing 8-8

    A Checkout Link Pre-Internationalization

    ```


    ```

    ...


    {{ ''cart.links.checkout_now_text'' | t }}


    ...

    Listing 8-9

    The Checkout Link from Listing 8-8, Internationalized

    ```


    The `cart.links.checkout_now_text` string is a translation key that identifies
    a particular section of the current locale file. Locale files are stored as JSON-formatted
    files in the `locales` directory in your theme, with one file present for each
    language your theme supports.


    For a full account of the structure of translation keys, naming conventions for
    locale files, and some of the more advanced translation features like interpolation
    and pluralization, refer to the detailed Shopify translation docs at [`https://help.shopify.com/themes/development/internationalizing`](https://help.shopify.com/themes/development/internationalizing).


    #### Don’t Forget JavaScript!


    If your JavaScript files generate user-facing text like error or flash messages,
    you’ll need to make sure they’re translatable as well.


    Translation keys inside your JavaScript files should end with `_html` (this tells
    Shopify not to escape their contents) and be passed through the `json` filter,
    as shown in Listing [8-10](#A437216_1_En_8_Chapter.html#Par89).


    ```

    // assets/alerts.js.liquid

    function outOfStockError() {

    alert({{ ''cart.messages.out_of_stock_message_html'' | t | json }});

    }

    Listing 8-10

    Translation Filters in JavaScript

    ```'
