  trans: '

    # MVC 提升代码组织性


    MVC 改进了典型的 PHP 流程，是一种让类对象在整个应用中都可用的高效技术。MVC 背后的主要目标是确保应用程序的每个功能只编写一次，从而通过减少冗余来精简代码。`Cake`
    通过提供实现 MVC 所需的资源，并采用一致的方法来定义操作在应用中的存储位置，从而实现了这一目标。只需以特定方式命名文件，`Cake` 就能在不使用任何代码规范的情况下，将各种资源拼凑在一起。


    MVC 可能因你使用的框架而异，但通常其工作流程如下（参见图 1-2）：


    **1.** 客户端通过输入 URL 或点击某种链接，向应用程序发送页面请求。按照惯例，典型的 URL 通常结构如下：`http://{Domain}.com/{Application}/{Controller}/{Action}/{Parameter
    1, etc.}`


    **2.** 调度脚本解析 URL 结构，并确定要执行哪个控制器。同时，它还会将任何动作和参数传递给该控制器。


    **3.** 控制器中的函数可能需要处理比调度器转发的参数更多的数据。它会向模型脚本发送数据库请求。


    **4.** 模型脚本根据控制器提交的请求，决定如何与数据库进行交互。它可能会对数据库执行查询，并执行各种便捷的数据排序指令。


    **5.** 一旦模型从数据库获取了数据或将数据发送到数据库，它会将输出返回给控制器。


    **6.** 控制器处理数据，并输出到视图文件。


    **7.** 视图将任何设计或展示数据添加到控制器的输出中，并将其输出发送到客户端的浏览器。


    ![Image 8](img/index-27_1.jpg)


    ![Image 9](img/index-27_2.jpg)


    ![Image 10](img/index-27_3.jpg)


    ![Image 11](img/index-27_4.jpg)


    ![Image 12](img/index-27_5.jpg)


    **图 1-2.** *Cake 如何使用 MVC 结构*


    使用 MVC 开发网站的好处在于，可以将重复的功能或任务分离，从而实现更快速的编辑。它甚至有助于调试。例如，在与数据库交互时反复出现错误，问题通常出在模型的某个地方。知道所有数据库交互只发生在一个地方，使得解决问题更加容易。


    ## CRUD 操作与 Bake 脚本


    几乎所有网站都使用 CRUD 操作：创建、读取、更新和删除。例如，一个博客需要创建文章；用户需要能够阅读每篇文章；作者可能希望将来能够编辑或更新文章；作者也需要能够删除文章。


    `Cake` 通过其自动化的 CRUD 函数使这些操作变得轻而易举。它并非让你手动编写每个 CRUD 操作，而是提供了预构建的类来为你完成这些工作。`Cake`
    包含 `Bake` 脚本，这是一个便捷的命令行工具，能根据你的数据库模式和自定义参数生成可编辑的 CRUD 代码。


    ## 脚手架


    借助 Cake 的脚手架功能，让网站快速起步变得容易得多。只需一行简单的代码，你就可以调用 Cake 的预构建脚手架，基于数据库渲染视图。换句话说，它能自动判断一些标准界面视图应如何与你的数据库协同工作，并输出
    HTML 表单，而你无需编写任何 HTML 代码。


    尽管脚手架功能并非用于完整的产品级视图，但它能让你开始测试逻辑和功能，而无需浪费时间构建视图或 HTML 输出。


    ## 助手


    `Cake` 提供了标准的 HTML、Ajax 和 JavaScript 助手，它们极大地简化了视图的创建。直观的助手代码字符串能为你渲染标记，极大地便利了你的
    HTML 输出。而让 Ajax 工作起来，虽然初学时有点棘手，但与你需要担心 DOM 特性相比，使用助手要容易得多，也高效得多。此外，你还可以下载其他 Cake
    开发者编写的助手来增强框架的能力，甚至可以自己编写助手，以减少重复或笨拙的标记。


    ## 可定制的元素


    你可以定制 Cake 的每个功能来适应你的应用程序。例如，你可以将流行的浏览器所见即所得编辑器 `FCKeditor` 作为插件引入到 `Cake` 中。通过使用定制的助手，你可以将
    `FCKeditor` 的所有功能集成到你的 `Cake` 应用程序中，并且实际上可以砍掉额外行的 PHP 代码来使其工作。稍后，我将讨论其他 Cake 元素，如组件、助手和插件，所有这些你都可以根据特定需求进行定制，或作为其他开发者提供的第三方资源引入到你的应用程序中。


    ## 庞大的社区


    如果你在开发过程中需要帮助，有一个庞大的在线社区可以提供支持。实际上，PHP 社区是网络上最大的开源编程群体，因此如果你需要一个 `Cake` 问题的快速解决方案，总有人能在几分钟内提供帮助。Cake
    专家还建立了在线论坛、聊天室和博客，以帮助其他人改进和学习这个框架。与其他 PHP 框架相比，这个社区是网络上最大的社区之一。


    对于任何参与 Web 开发的人来说，代码示例都是必不可少的。PHP 主导着这个领域，而 `Cake` 拥有一个不断增长的代码示例库。如果你正在考虑另一个框架，并且希望站在别人的成果之上，那么这个事实可能会让你倾向于选择
    `Cake`。


    ## 更多特性


    `Cake` 旨在通过提供一种组织数据库和其他资源文件的整体方法来简化构建 Web 应用程序的开发过程，从而减少代码。尽管这种 Web 编程的通用方法本身是
    `Cake` 提供的一个主要特性，但它所拥有的其他强大资源库，如内置验证、访问控制列表 (ACL)、数据净化、安全和会话处理组件以及视图缓存，使得 `Cake`
    值得任何认真的开发人员投入时间研究。


    ## 总结


    作为一个框架，`Cake` 反转了控制流程，并为你（开发者）提供了一种在更短时间内扩展 Web 应用程序的有效方法。`Cake` 是用 PHP 构建的，因此你可以利用一个基于
    Web 的框架，而无需学习或使用另一种编程语言。使用 `Cake` 的其他好处包括：其 MVC 结构，它分离了应用程序的资源和功能；`Bake` 脚本，它自动化了
    CRUD 脚本编写；脚手架功能，它将基本的视图渲染简化为一行代码；内置的助手，它们将 HTML 输出操作缩减为单行调用；以及庞大且仍在增长的 Cake 社区。


    ---


    # 第一部分


    入门指南


    ---


    ## 安装与运行 CakePHP


    Cake 的卖点之一是其安装的简便性。在此，我可以添加一个冗长的教程来解释如何为每种可能的服务器配置安装 `Cake`，但我不会这样做。`Cake` 应该足够简单易装，如果你在起步阶段遇到问题，问题很可能出在过于复杂的服务器配置上。附录
    A 讨论了一些初学者在设置本地主机环境时可能做出的选择，以备你在本章中遇到安装问题。总的来说，任何让 `Cake` 工作起来的困难通常都是由于本地主机问题引起的，而非企业服务器或网络服务提供商的设置。

    '
- fmt: '# 安装与运行 CakePHP


    Throughout this book, you will develop some Cake applications that I expect you
    to build on your PC and not on a web server. All my instructions, therefore, will
    be for a `localhost` environment, not a remote one, though the setup routines
    I discuss in this chapter apply to a remote installation as well.


    ## 简单入门：在 `localhost` 环境运行 Cake


    在开始运行 Cake 之前，您需要先在 `localhost` 上准备好以下组件（关于安装这些组件的更多细节，请参见附录 A）：


    - Apache 服务器（需启用 `mod_rewrite`）

    - PHP 4.3.2 或更高版本

    - MySQL（Cake 也支持 PostgreSQL、Microsoft SQL Server 2000、Firebird、IBM DB2、Oracle、SQLite、ODBC
    和 ADOdb，但在本书中我将使用 MySQL，因为它是 Cake 的默认数据库引擎）


    以上三者都可以通过例如 Apache Friends 的 XAMPP（[www.apachefriends.org](http://www.apachefriends.org)）或
    Living-e 的 MAMP（[www.mamp.info](http://www.mamp.info)）等程序轻松安装。或者，您也可以选择手动在 Windows、Linux
    和 Mac 操作系统上为每个组件配置自定义的 HTTP 服务器。在您的 Web 浏览器中，您应该能够通过在地址栏输入 `http://localhost`
    来访问 `localhost` 上的根目录。


    ---


    ## 获取 Cake


    第一步是从 [www.cakephp.org](http://www.cakephp.org) 下载 Cake 1.2 的最新稳定版本。


    下载并解压 Cake 发布文件后，您会得到一个名为 `cake_1.2.x.xxxx` 之类的文件夹，其中包含几个子文件夹（见图 2-1）。


    **图 2-1.** *Cake 主安装文件夹的内容*


    `app` 文件夹是您应用程序中几乎所有操作发生的地方。它包含了所有的控制器、模型、视图、布局，以及所有其他 JavaScript、CSS、Flash、图像等文件。


    当然，如果您查看 `app` 文件夹内部，您会注意到所有这些应用程序区域都被组织到了几个子文件夹中。


    `cake` 文件夹包含了 Cake 的所有库和脚本。您可以用 Cake 的新版本替换此文件夹，它应该仍然能与应用程序一起工作。在其中，您会发现数十个包含
    Cake 运行所需的所有类和脚本的独立 PHP 文件。


    `docs` 文件夹保存了更改日志信息和其他自述文件。


    您打算集成到应用程序中的任何其他非 Cake PHP 脚本都存储在最后一个文件夹 `vendors` 中。在本书的后面部分，您还将使用 `vendors`
    来存储一些独立于 Cake 工作的精美 PHP 脚本。


    ---


    ## 启动 Cake


    运行 Cake 实际上非常简单：将主 Cake 文件夹重命名为您希望在浏览器中调用的应用程序名称，然后将其放入您的 `localhost` 根目录。我将我的文件夹命名为
    `first_app`，并已将其放在我的 `localhost` 根目录中。这个根目录的具体名称取决于您的 `localhost` 是如何配置的。它可能被命名为
    `webroot`、`www` 或 `public_html`（这些是一些最常见的服务器根目录文件夹名称）。请务必确认您的 `localhost` 根目录位置，并将重命名后的
    Cake 文件夹放入其中。通过在 Web 浏览器中输入 `http://localhost/first_app`，我看到了 Cake 的欢迎画面（见图 2-2）。


    **图 2-2.** *Cake 欢迎画面*


    如果您也看到了类似的画面，那么恭喜——Cake 现在正在运行。如果由于某种原因您看到了这个画面，但它没有显示任何图形或颜色，或者（更糟的是）画面完全是空白的，那么您可能遇到了以下错误之一。


    **注意** 本章中讨论的许多内容将取决于您如何配置 Web 服务器。'
