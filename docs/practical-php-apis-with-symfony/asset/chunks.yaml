  raw: '### Using the Limiter


    We will use the apiLimiter service within the subscriber we created in Chapter
    [1](#663561_1_En_1_Chapter.xhtml). Concretely, we are going to listen to the Symfony
    [KernelRequest](https://symfony.com/doc/6.4/reference/events.html%2523kernel-request)
    event to check whether we can continue with the request, that is, there are tokens
    available. This way, we can check the limit before the call arrives at the controller.


    ```

    use App\Exception\InvalidPayloadException;

    use App\Exception\NotFoundOperationException;

    use App\Validation\ValidationHandler;

    use Symfony\Component\EventDispatcher\EventSubscriberInterface;

    use Symfony\Component\HttpFoundation\JsonResponse;

    use Symfony\Component\HttpKernel\Event\ExceptionEvent;

    use Symfony\Component\HttpKernel\Event\RequestEvent;

    use Symfony\Component\HttpKernel\KernelEvents;

    use Symfony\Component\RateLimiter\RateLimiterFactory;

    use Symfony\Component\Validator\Exception\ValidationFailedException;

    use  Symfony\Component\RateLimiter\Exception\RateLimitExceededException;

    class KernelSubscriber implements EventSubscriberInterface

    {

    public function __construct(

    private readonly ValidationHandler $validationHandler,

    private readonly RateLimiterFactory $apiLimiter

    ){}

    public static function getSubscribedEvents(): array

    {

    return [

    KernelEvents::EXCEPTION => ''onException'',

    KernelEvents::REQUEST => ''onKernelRequest''

    ];

    }

    public function onKernelRequest(RequestEvent $event): void

    {

    $limiter = $this->apiLimiter->create($event->getRequest()->getClientIp());

    $limiter->consume()->ensureAccepted();

    }

    public function onException(ExceptionEvent $event): void

    {

    $exception = $event->getThrowable();

    if($exception instanceof ValidationFailedException){

    $errors = [];

    foreach ($exception->getViolations() as $violation) {

    $errors[$violation->getPropertyPath()] = $violation->getMessage();

    }

    $event->setResponse(new JsonResponse([

    ''errors'' => $errors

    ], 400));

    return;

    }

    if($exception instanceof RateLimitExceededException) {

    $event->setResponse(new JsonResponse([

    ''error'' => ''Api Rate limit exceeded''

    ], 429));

    return;

    }

    if($exception instanceof InvalidPayloadException) {

    $event->setResponse(new JsonResponse([

    ''error'' => $exception->getMessage()

    ], 400));

    return;

    }

    if($exception instanceof NotFoundOperationException){

    $event->setResponse(new JsonResponse([

    ''errors'' => [

    ''operation'' => $exception->getMessage()

    ]

    ], 400));

    return;

    }

    }

    }

    ```


    The **onKernelRequest** method gets the limiter by using the *apiLimiter* service
    and checks whether the request is accepted. If not, it throws a [RateLimitExceede​dException](https://github.com/symfony/rate-limiter/blob/current/Exception/RateLimitExceededException.php).
    We also check for this exception on the **onException** method and return a *429
    Too Many Requests* HTTP code to the client.


    ### Conclusion


    As a plus to finish this chapter, we have added an extra security layer that helps
    us to prevent DoS attacks by setting a limit to the requests that the API can
    handle by using a token-bucket strategy. In the next chapter, we will delve into
    the utilization of Symfony messenger, a robust tool within the Symfony framework,
    to enable asynchronous execution of large operations, that is, operations that
    can take some time to be processed.


    # 3. Background Execution of API Operations


    So far, we have learned how to manage operations through a single endpoint, how
    to secure our endpoint using a Symfony firewall, and how to grant or deny access
    to our operations using Symfony voters. In this chapter, we will learn how to
    execute operations in the background so that the client does not have to wait
    until the operation is performed. This is useful for operations that can take
    some time to be executed. Our *SendPayment* operation would be a good example
    since it would probably connect to a payment provider to send the money. As we
    do not know how much time this kind of connection can take, it is preferable to
    execute it in the background and send a notification to the client (can be an
    email, SMS, or push notification, among others) after the operation finishes.


    ## Section 1\. Marking Operations As Background


    We created the OperationMetadata attribute in Chapter [1](#663561_1_En_1_Chapter.xhtml)
    to store the following data related to the operation:


    *   The operation name


    *   The class-name, which holds the parameters the operation requires to be performed


    *   Whether we have to pass roles as groups to the validation process or not


    Let’s add a new parameter to the attribute class which will indicate whether the
    operation must be executed in the background or not.


    ```

    readonly class Background

    {

    /**

    * Delay in seconds before the background operation is executed

    */

    public function __construct(

    public ?int $delay = null

    ){ }

    }

    #[\Attribute(\Attribute::TARGET_CLASS)]

    class OperationMetadata

    {

    public function __construct(

    public readonly string $name,

    public readonly ?string $input = null,

    public readonly ?bool $useValidationGroups = null,

    public readonly ?Background $background = null

    ){ }

    }

    ```


    As the background execution could be delayed, we create first a **Background**
    class which contains a delay parameter that can be null. If provided, the operation
    will be executed in the background adding an extra delay. The **OperationMetadata**
    holds now a new Background type parameter. If provided, the operation must be
    sent to the background instead of being executed in real-time.


    Now, if we would want to mark the SendPayment operation as background, we simply
    would have to add the background parameter to the attribute.


    ```

    #[OperationMetadata(

    name: OperationNames::SendPayment->name,

    input: SendPaymentInput::class,

    useValidationGroups: false,

    background: new Background(300)

    )]

    class SendPaymentOperation implements OperationInterface

    {

    // Rest of the methods

    }

    ```


    In the above example, we indicate that the **SendPayment** operation will be executed
    in the background and its execution will be delayed 300 seconds (5 minutes).


    ### Conclusion


    We have extended the existing [OperationMetadata](#663561_1_En_3_Chapter.xhtml#Sec1)
    attribute by adding a new parameter that allows us to indicate whether a specific
    operation should be executed in the background. By setting this flag, we signal
    that the operation’s execution can be asynchronous and decoupled from the user’s
    immediate request. In the next section, we will explore how to create the operation
    message, its corresponding handler, and the magic behind connecting them using
    the Symfony [AsMessageHandler​](https://symfony.com/doc/6.4/messenger.html%2523creating-a-message-handler)
    attribute.


    ## Section 2\. The Operation Message and Handler


    We are going to use the [Symfony messenger component](https://symfony.com/doc/current/messenger.html)
    to execute operations in the background. First of all, we have to create a message
    class and a handler for the message.


    ### Creating the Operation Message


    ```

    use Symfony\Component\Security\Core\User\UserInterface;

    class OperationMessage

    {

    public function __construct(

    public readonly string $operation,

    public readonly mixed $operationInput,

    public readonly ?string $userIdentifier

    ){ }

    }

    ```


    The message class holds in the constructor the necessary parameters to execute
    an operation: the operation name, the operation data, and the user identifier
    (if required by the operation). Let’s code now the message handler.


    *   As we will see in the next section, we will use the **getUserIdentifier**
    method from our User entity to set the value of the **OperationMessage** user
    parameter. This method returns the user email.'
  trans: "\n# 使用限流器\n\n我们将在第 1 章创建的订阅者中使用 `apiLimiter` 服务。具体来说，我们将监听 Symfony 的 `KernelRequest`\
