    The ability to execute arbitrary code with `eval` is a powerful

    feature that should be used with care. It should not be used to execute

    any user-provided data, at least not without proper validation, as this

    represents a security risk. Another reason why the use of `eval` is discouraged

    is because similar to `goto`, it makes the

    execution of code more difficult to follow, which complicates debugging.


    21. Overloading


    Overloading in PHP provides the ability to add object members at

    run-time. This is done by having the class implement the overloading

    methods `__get`,

    `__set`, `__call`, and `__callStatic`. Bear in

    mind that the meaning of overloading in PHP is different from many other

    languages.


    Property Overloading


    The `__get` and

    `__` `set` methods provide a

    convenient way to implement getter and setter methods, which are methods

    that are often used to safely read and write to properties. These

    overloading methods are invoked when using properties that are

    inaccessible, either because they are not defined in the class or

    because they are unavailable from the current scope. In the following

    example, the `__set` method adds any

    inaccessible properties to the `$data` array, and

    `__get` safely

    retrieves the elements.


    ```

    class MyProperties

    {

    private $data = array();

    public function __set($name, $value)

    {

    $this->data[$name] = $value;

    }

    public function __get($name)

    {

    if (array_key_exists($name, $this->data))

    return $this->data[$name];

    }

    }

    ```


    When setting the value of an inaccessible property, `__set` is called with

    the name of the property and the value as its arguments. Similarly, when

    accessing an inaccessible property, `__get` is called with

    the property name as its argument.


    ```

    $obj = new MyProperties();

    $obj->a = 1;  // __set called

    echo $obj->a; // __get called

    ```


    Method Overloading


    There are two methods for handling calls to inaccessible methods of a

    class: `__call`

    and `__callStatic`. The

    `__call` method

    is invoked for instance method calls.


    ```

    class MyClass

    {

    public function __call($name, $args)

    {

    echo "Calling $name $args[0]";

    }

    }

    // "Calling myTest in object context"

    (new MyClass())->myTest(''in object context'');

    ```


    The first argument to `__` `call` is the name of

    the method being called and the second is a numeric array containing the

    parameters passed to the method. These arguments are the same for the

    `__callStatic`

    method, which handles calls to inaccessible static methods.


    ```

    class MyClass

    {

    public static function __callStatic($name, $args)

    {

    echo "Calling $name $args[0]";

    }

    }

    // "Calling myTest in static context"

    MyClass::myTest(''in static context'');

    ```


    Isset and unset Overloading


    The built-in constructs `isset`, `empty`, and `unset` only work on

    explicitly defined properties, not overloaded ones. This functionality

    is added to a class by overloading the `__isset` and `__unset` methods.


    ```

    class MyClass

    {

    private $data = array();

    public function __set($name, $value) {

    $this->data[$name] = $value;

    }

    public function __get($name) {

    if (array_key_exists($name, $this->data))

    return $this->data[$name];

    }

    public function __isset($name) {

    return isset($this->data[$name]);

    }

    public function __unset($name) {

    unset( $this->data[$name] );

    }

    }

    ```


    The `__isset`

    method is invoked when `isset` is called on an

    inaccessible property.


    ```

    $obj = new MyClass();

    $obj->name = "Joe";

    isset($obj->name); // true

    isset($obj->age);  // false

    ```


    When `unset` is

    called on an inaccessible property, the `__unset` method

    handles that call.


    ```

    unset($obj->name); // delete property

    isset($obj->name); // false

    ```


    The `empty`

    construct only works on overloaded properties if both `__isset` and `__get` are

    implemented. If the result from `__isset` is false, the

    `empty` construct

    returns `true`.

    If, on the other hand, `__isset` returns `true`, then `empty` retrieves the

    property with `__get` and evaluates

    if it has a value considered to be empty.


    ```

    empty($obj->name); // false

    empty($obj->age);  // true

    ```'
  trans: "\n```php\neval('$b = ' . var_export($a, true) . ';');\n```\n\n使用`eval`执行任意代码是一项强大的功能，应当谨慎使用。若未经适当验证，不应将其用于执行任何用户提供的数据，因为这会带来安全风险。不鼓励使用`eval`的另一个原因是，与`goto`类似，它会使代码执行流程难以追踪，从而增加调试难度。\n\
    \n## 重载\n\nPHP 中的重载提供了在运行时添加对象成员的能力。这是通过让类实现重载方法`__get`、`__set`、`__call`和`__callStatic`来实现的。请记住，PHP\
    \ 中重载的含义与其他许多语言不同。\n\n### 属性重载\n\n`__get`和`__set`方法为实现 getter 和 setter 方法提供了一种便捷方式，这些方法通常用于安全地读写属性。当使用的属性不可访问时（无论是在类中未定义，还是因当前作用域限制导致不可用），这些重载方法就会被调用。在以下示例中，`__set`方法将所有不可访问的属性添加到`$data`数组中，而`__get`则安全地检索这些元素。\n\
    \n```php\nclass MyProperties\n{\n    private $data = array();\n    public function\
    \ __set($name, $value)\n    {\n        $this->data[$name] = $value;\n    }\n \
    \   public function __get($name)\n    {\n        if (array_key_exists($name, $this->data))\n\
    \            return $this->data[$name];\n    }\n}\n```\n\n当为不可访问的属性赋值时，会调用`__set`方法，其参数为属性名称和值。同样，当访问不可访问的属性时，会调用`__get`方法，参数为属性名称。\n\
    \n```php\n$obj = new MyProperties();\n$obj->a = 1;  // 调用 __set\necho $obj->a;\
    \ // 调用 __get\n```\n\n### 方法重载\n\n有两种方法用于处理对类中不可访问方法的调用：`__call`和`__callStatic`。`__call`方法用于实例方法的调用。\n\
    \n```php\nclass MyClass\n{\n    public function __call($name, $args)\n    {\n\
    \        echo \"Calling $name $args[0]\";\n    }\n}\n// 输出: \"Calling myTest in\
    \ object context\"\n(new MyClass())->myTest('in object context');\n```\n\n`__call`的第一个参数是被调用方法的名称，第二个参数是一个包含传递给该方法参数的数值数组。这些参数对于`__callStatic`方法也是相同的，后者用于处理对不可访问静态方法的调用。\n\
    \n```php\nclass MyClass\n{\n    public static function __callStatic($name, $args)\n\
    \    {\n        echo \"Calling $name $args[0]\";\n    }\n}\n// 输出: \"Calling myTest\
    \ in static context\"\nMyClass::myTest('in static context');\n```\n\n### Isset\
    \ 和 Unset 重载\n\n内置的结构`isset`、`empty`和`unset`仅适用于显式定义的属性，而非重载属性。通过重载`__isset`和`__unset`方法，可以为类添加此功能。\n\
    \n```php\nclass MyClass\n{\n    private $data = array();\n    public function\
    \ __set($name, $value) {\n        $this->data[$name] = $value;\n    }\n    public\
    \ function __get($name) {\n        if (array_key_exists($name, $this->data))\n\
    \            return $this->data[$name];\n    }\n    public function __isset($name)\
    \ {\n        return isset($this->data[$name]);\n    }\n    public function __unset($name)\
    \ {\n        unset( $this->data[$name] );\n    }\n}\n```\n\n当对不可访问的属性调用`isset`时，会调用`__isset`方法。\n\
    \n```php\n$obj = new MyClass();\n$obj->name = \"Joe\";\nisset($obj->name); //\
    \ true\nisset($obj->age);  // false\n```\n\n当对不可访问的属性调用`unset`时，`__unset`方法会处理该调用。\n\
    \n```php\nunset($obj->name); // 删除属性\nisset($obj->name); // false\n```\n\n`empty`结构仅当同时实现了`__isset`和`__get`时才适用于重载属性。如果`__isset`返回\
    \ false，则`empty`结构返回`true`。反之，如果`__isset`返回 true，则`empty`会通过`__get`检索该属性，并判断其是否具有被视为空的值。\n\
    \n```php\nempty($obj->name); // false\nempty($obj->age);  // true\n```\n"
- fmt: '# 22. Magic Methods


    There are a number of methods that can be implemented in a class for the purpose
    of being called internally by the PHP engine. These are known as magic methods
    and they are easy to recognize because they all start with two underscores. Table
    [22-1](#A317139_2_En_22_Chapter.html#Tab1) lists the magic methods that have been
    discussed so far.


    Table 22-1. Magic Methods


    | Name | Description |

    | --- | --- |

    | `__construct(...)` | Called when creating a new instance. |

    | `__destruct()` | Called when object has no references left. |

    | `__call($name, $array)` | Called when invoking inaccessible methods in an object
    context. |

    | `__callStatic($name, $array)` | Called when invoking inaccessible methods in
    a static context. |

    | `__get($name)` | Called when reading data from inaccessible properties. |

    | `__set($name, $value)` | Called when writing data to inaccessible properties.
    |

    | `__isset($string)` | Called when `isset` or `empty` is used on inaccessible
    properties. |

    | `__unset($string)` | Called when `unset` is used on inaccessible properties.
    |


    In addition to these, there are six more magic methods that, like the others,
    can be implemented in classes to provide certain functionalities.


    Table 22-2. More Magic Methods


    | Name | Description |

    | --- | --- |

    | `__toString()` | Called for object to string conversions. |

    | `__invoke(...)` | Called for object to function conversions. |

    | `__sleep()` | Called by `serialize`. Performs cleanup tasks and returns an array
    of variables to be serialized. |

    | `__wakeup()` | Called by `unserialize` to reconstruct the object. |

    | `__set_state($array)` | Called by `var_export`. The method must be static and
    its argument contains the exported properties. |

    | `__clone()` | Called after object has been cloned. |


    ## `__toString`


    When an object is used in a context where a string is expected, the PHP engine
    searches for a method named `__toString` to retrieve a string representation of
    the object.


    ```

    class MyClass

    {

    public function __toString()

    {

    return ''Instance of '' . __CLASS__;

    }

    }

    $obj = new MyClass();

    echo $obj; // "Instance of MyClass"

    ```


    It is not possible to define how an object will behave when evaluated as types
    other than string.


    ## `__invoke`


    The `__invoke` method allows an object to be treated as a function. Arguments
    provided when the object is called are used as the `__invoke` function’s arguments.


    ```

    class MyClass

    {

    public function __invoke($arg)

    {

    echo $arg;

    }

    }

    $obj = new MyClass();

    $obj(''Test''); // "Test"

    ```


    ## Object Serialization


    Serialization is the process of converting data into a string format. This is
    useful for storing objects in databases or files. In PHP, the built-in `serialize`
    function performs this object-to-string conversion and `unserialize` converts
    the string back into the original object. The `serialize` function handles all
    types, except for the resource type, which is used to hold database connections
    and file handlers, for example. Consider the following simple database class.


    ```

    class MyConnection

    {

    public $link, $server, $user, $pass;

    public function connect()

    {

    $this->link = mysql_connect($this->server,

    $this->user,

    $this->pass);

    }

    }

    ```


    When this class is serialized, the database connection is lost and the `$link`
    resource type variable holding the connection is stored as null.


    ```

    $obj = new MyConnection();

    // ...

    $bin = serialize($obj);   // serialize object

    $obj = unserialize($bin); // restore object

    ```


    To get greater control over how object data is serialized and unserialized, the
    `__sleep` and `__wakeup` methods may be implemented by this class.


    ### `__sleep`


    The `__sleep` method is called by `serialize` and needs to return an array containing
    the properties that will be serialized. This array must not include private or
    protected properties because `serialize` is not able to access them. The method
    may also perform cleanup tasks before the serialization occurs, such as committing
    any pending data to storage mediums.'
