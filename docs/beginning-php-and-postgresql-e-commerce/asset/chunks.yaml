    `pgAdmin III` 不像 Windows 版本那样随 Linux 版本的 PostgreSQL 一起提供。请记住，如果你使用较新版本，请将文件名替换为实际名称。以下是在
    Linux 机器上安装 `pgAdmin III` 应遵循的步骤。

