    applies to functions, classes, and constants. Everything else will appear in the
    global space.


    The namespace called PHP is reserved for internal functions, other than that the
    names follow the same rules as variable names. They must start with a letter or
    underscore and the following characters can be letters, numbers, and underscores.


    The backslash character is also allowed but it does not really become part of
    the name. It acts as a separator for sub-namespaces. These are useful on larger
    projects where multiple parts of the project can have functions or classes with
    the same names.


    How it Works


    The following example shows a simple declaration of a namespace.


    <?php


    // 2_35.php


    namespace Test;


    function t1() {


    }


