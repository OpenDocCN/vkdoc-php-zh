- fmt: "# Chapter 9: Dealing with Customer Orders\n\n## The `orders` and `order_detail`\
    \ Tables\n\n**Tip:** So far we have been consistent about naming our tables in\
    \ singular form (`shopping_cart`, `department`, and so on). However, here we make\
    \ an exception for the `orders` table because `ORDER` is also an SQL keyword.\
    \ For the purposes of this book, we prefer to break the naming convention to avoid\
    \ any confusion while writing the SQL code, and generally speaking, it isn’t good\
    \ practice to use SQL keywords as object names.\n\nThese tables have a one-to-many\
    \ relationship, enforced through a `FOREIGN KEY` constraint on their `order_id`\
    \ fields. One-to-many is the usual relationship implemented between an `orders`\
    \ table and an `order_detail` table. The `order_detail` table contains many records\
    \ that belong to one order. You might want to revisit Chapter 4 where the table\
    \ relationships are explained in more detail.\n\nYou’ll implement the tables in\
    \ the following exercise.\n\n### Exercise: Adding the `orders` and `order_detail`\
    \ Tables to the Database\n\n1. Load pgAdmin III, and connect to the `hatshop`\
    \ database.\n\n2. Click **Tools** ➤ **Query tool** (or click the **SQL** button\
    \ on the toolbar). A new query window should appear.\n\n3. Use the query tool\
    \ to execute this code, which creates the `orders` table in your `hatshop` database:\n\
    \n   ```sql\n   -- Create orders table\n   CREATE TABLE orders\n   (\n       order_id\
    \ SERIAL NOT NULL,\n       total_amount NUMERIC(10,2) NOT NULL DEFAULT 0.00,\n\
    \       created_on TIMESTAMP NOT NULL,\n       shipped_on TIMESTAMP,\n       status\
    \ INTEGER NOT NULL DEFAULT 0,\n       comments VARCHAR(255),\n       customer_name\
    \ VARCHAR(50),\n       shipping_address VARCHAR(255),\n       customer_email VARCHAR(50),\n\
    \       CONSTRAINT pk_order_id PRIMARY KEY (order_id)\n   );\n   ```\n\n4. Use\
    \ the query tool to execute this code, which creates the `order_detail` table\
    \ in your `hatshop` database:\n\n   ```sql\n   -- Create order_detail table\n\
    \   CREATE TABLE order_detail\n   (\n       order_id INTEGER NOT NULL,\n     \
    \  product_id INTEGER NOT NULL,\n       product_name VARCHAR(50) NOT NULL,\n \
    \      quantity INTEGER NOT NULL,\n       unit_cost NUMERIC(10, 2) NOT NULL,\n\
    \       CONSTRAINT pk_order_id_product_id PRIMARY KEY (order_id, product_id),\n\
    \       CONSTRAINT fk_order_id FOREIGN KEY (order_id) REFERENCES orders (order_id)\n\
    \       ON UPDATE RESTRICT ON DELETE RESTRICT\n   );\n   ```\n\n## How It Works:\
    \ The Data Tables\n\nNow that you’ve created the tables, let’s take a closer look\
    \ at their structure and relationships.\n\n### The `orders` Table\n\nThe `orders`\
    \ table contains two categories of information: data about the order itself (the\
    \ first six fields) and data about the customer that made the order (last three\
    \ fields).\n\nAn alternative would be to store the customer information in a separate\
    \ table named `customer` and store only the `customer_id` value in the `orders`\
    \ table. However, storing customer data is not one of the goals of this development\
    \ stage. At this stage, we prefer to keep things simple because it doesn’t matter\
    \ who made the order, just what products have been sold. You’ll deal with creating\
    \ a separate `customer` table in Chapter 11.\n\nThird-party payment processors\
    \ such as PayPal store and manage the complete customer information, so it doesn’t\
    \ need to be stored in your database as well. We have added the `customer_name`,\
    \ `shipping_address`, and `customer_email` fields as optional fields that can\
    \ be filled by the administrator if it’s easier to have this information at hand\
    \ for certain (or all) orders.\n\nThe field names are self-explanatory. `order_id`\
    \ is the primary key of the table. `total_amount` stores the total value of the\
    \ order. `created_on` and `shipped_on` specify when the order was created and\
    \ shipped (the latter supports NULLs if the order hasn’t been shipped yet).\n\n\
    The `status` field contains an integer that can have these values:\n\n- **0:**\
    \ The order has been placed. This is the initial status of an order after the\
    \ **Place Order** button is clicked in the shopping cart."
