    ```\n\n令人惊奇的是，这个示例不仅输出了预期的 `foo`，还输出了 getter/setter 重写中定义的额外字符串。我们不必像本例中那样显式定义\
    \ getter/setter，因为我们的 `__call()` 方法会自动处理它们。这简直是两全其美！\n\n### 问题\n\n1.  当 PHP 本身并不支持这些特性时，在类中使用\
    \ getter 和 setter 有什么好处？\n2.  当我们向 `Base` 类添加 `Inspector` 实例时，将其存储在一个私有变量中。为什么这一点很重要？\n\
    3.  我们在 `Base` 类中定义了几个受保护的方法，其唯一目的是返回一个 Exception 子类的实例。为什么我们不能直接在 `__call()`\
    \ 方法中处理 Exception 子类？\n\n### 答案\n\n1.  使用 getter/setter 的主要好处是，存储在 `Base` 子类中的受保护值不会被随意篡改。当然，开发者仍然可以调用\
    \ `getProperty()` 和 `setProperty()`，并且我们已定义的代码也不会阻止这种行为，但我们所做的是提供一个良好的构建基础。需要限制对其受保护属性访问的类可以实现这一点，而简单的\
    \ getter/setter 将继续像以前一样正常工作。\n2.  这个 `Inspector` 实例仅用于确定哪些属性应该拥有模拟的 getter/setter。如果它被随意放置且可供子类访问，实际上可能会带来更多麻烦，因此我们将其赋值给一个私有属性，从而对子类隐藏它。\n\
    3.  如果我们直接处理异常，而不引用这些受保护的方法，那么子类在不自行重写 `__call()` 方法的情况下，就无法定义自己的异常类型。这样做是为了让子类能够轻松定义自己的\
    \ Exception 子类。\n\n### 练习\n\n1.  我们的 `Base` 类仅为带有 `@read`/`@write`/`@readwrite`\
    \ 元标记的属性模拟 getter 和 setter。它不提供任何属性验证，这意味着开发者可以将属性设置为 `null` 而不会收到任何警告。尝试添加另一个元标记来防止（或警告）这种情况。\n\
    2.  尝试用另一种方式来指定 Exception 子类，而不是定义返回子类实例的方法。例如，你可以使用一个字符串数组，或者一个 `switch` 语句，这样也能实现同样的灵活性。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 4 章\n\n## 配置\n\n我们的目标之一是创建一个易于配置的框架，同时假定一些基本设置，以便快速开发并灵活修改。因此，我们需要一种标准格式来存储配置变量，以及一种方法来检索它们。关于这个话题有多种不同的方法，在本章中，我们将探讨两种流行的方案。\n\
    \n### 目标\n\n-   我们需要审查不同的配置方法，并决定哪一种最适合我们的框架/应用程序。\n-   我们需要构建一组类，用于解析配置文件，并提供一套清晰的配置选项。\n\
    \n### 关联数组\n\n关联数组提供了最简单的配置方式。任何 PHP 开发者都能轻松理解，而且我们的框架解析起来也非常简单。清单 4-1 展示了一个数据库设置文件的示例，清单\
    \ 4-2 则演示了如何解析它。\n\n**清单 4-1.** 关联数组配置文件示例\n\n```php\n$settings[\"database_default_provider\"\
    ] = \"mysql\";\n$settings[\"database_default_host\"] = \"localhost\";\n$settings[\"\
    database_default_username\"] = \"username\";\n$settings[\"database_default_password\"\
    ] = \"password\";\n$settings[\"database_default_port\"] = \"3306\";\n$settings[\"\
    database_default_schema\"] = \"prophpmvc\";\n```\n\n**清单 4-2.** 加载我们的关联数组配置文件\n\
    \n```php\nfunction parsePhp($path)\n{\n    $settings = array();\n    include(\"\
    {$path}.php\");\n    return $settings;\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 第 4 章 ■ 配置\n\n解析关联数组真的再简单不过了。我们只需要预先定义 `$settings = array()`，然后包含设置文件即可。如果需要，我们可以通过\
    \ `parsePhp()` 函数返回的数组使用 `sizeof()` 方法来检查是否加载了任何设置。输出结果正如你所料，如清单 4-3 所示。\n\n**清单\
    \ 4-3.** `parsePhp()` 的结果\n\n```\nArray\n(\n    [database_default_provider] =>\
    \ mysql\n    [database_default_host] => localhost\n    [database_default_username]\
    \ => username\n    [database_default_password] => password\n    [database_default_port]\
    \ => 3306\n    [database_default_schema] => prophpmvc\n)\n```\n\n正如我们所见，这种配置方法易于解析和更改。如果它听起来好得令人难以置信，那是因为确实如此。我们有几个理由应该寻找其他解决方案。"
