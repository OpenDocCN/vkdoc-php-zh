    Essentially, what you have done here is re-create the scaffolding view (assuming
    you’re still using the `cake.generic.css` file instead of your own). But now that
    the code is right in front of you, you can toy with any aspect of it and customize
    it to meet your own needs. Notice on line 1 of Listing 5-4 that I’ve changed the
    `<h2>` tag to read “Blog Posts.” In Listing 5-3, the `Index` action runs a model
    function that pulls all post records and assigns them to a variable to be used
    in the view. In line 7 of Listing 5-3, the `set()` function is a Cake function
    that assigns a value to a view variable. In this case, the variable will be named
    `posts` and will contain the results from the `find()` function in the `Post`
    model.


    In line 11 of Listing 5-4, the view file uses the `set()` function in the controller.
    Here in the view, `posts` is now a typical PHP variable named `$posts`. Line 11
    starts a loop through that array variable, which is the equivalent of looping
    through each record from the database that was fetched in the query. The view
    simply takes each record’s content and displays it in table cells. Each iteration
    generates a new table row until it reaches the last record in the `$posts` variable.


    Launch the `Index` action in the `Posts` controller, and you should see nearly
    the same screen as the scaffolding view (see Figure 5-3).


    ![Image 29](index-83_1.png)


    **C H A P T E R 5 ■ C R E AT I N G S I M P L E V I E W S A N D B A K I N G I N
    T H E C O N S O L E**


    **Figure 5-3.** *The Index action view rendered by manual, not scaffolded, code.*


    The main difference in this example is that you have access to the display code
    and the action’s logic because you have manually supplied the code in the controller
    and the view file. Creating this code is not challenging, mainly because the `Index`
    action required only one line to run the database query and make the results available
    to the view. More elaborate operations are necessary for the other CRUD operations
    and will require many more lines of code, both in the controller and in the view.
    Fortunately, Cake can help generate this code in the console.


    ## Using Bake to Create Views


    I’ve walked you through how to manually create the index view. Actually, though,
    you should be able to avoid having to type these basic CRUD functions by hand.
    Included with Cake is a handy console script called the Bake script (the `bake.php`
    script, found in the `cake/console/libs` folder). Not only will it save you tons
    of time generating the needed code to build these views, but it will also show
    you some basic Cake code that will help you understand how Cake uses models, views,
    and controllers.


    ### Configuring the Console’s Profile to Run Bake


    However your localhost is set up, you will need a way of running the console to
    execute Bake. Most Linux setups have a console built into the operating system,
    and Mac OS X comes bundled with the Terminal application, so if you are running
    in one of these environments, you shouldn’t have to install anything to run shell
    scripts. For PC users, you may have to install extra software that supports running
    PHP in the console, such as Cygwin [(www.cygwin.com)](http://www.cygwin.com) or
    MinGW ([www.mingw.org](http://www.mingw.org)). The main requirements for getting
    Bake to work in your console is that the shell can run PHP and the same database
    engine you’re using for your Cake application.


    Many users use helpful programs such as XAMPP, LAMP, or MAMP—personal web server
    applications that reduce web server setup to a minimum. Although these programs
    make it possible to essentially click a button to turn on a localhost, they do
    make things a little bit trickier to get Bake running correctly. Often, the operating
    system and the web server environments both have shell applications that can conflict
    with one another when running the console. Whatever your setup looks like, you
    will likely need to adjust the shell’s profile to get Bake working right.


    In Mac OS X and some versions of Linux, the command-line console will use a file
    named `.profile`, usually invisible in your operating system, when it executes
    commands. Fortunately, you can add some of your own customized environment settings
    to tell the console where to go when executing Bake commands.


    You can open the `.profile` file in a number of ways. You can use the following
    command to edit `.profile` in the console:


    ```

    vi .profile

    ```


    However, if you’re like me, you’d probably rather edit this file in a simple plain-text
    editor. You will need to locate the profile to open it in your editor, but when
    saved, Bake should run properly regardless of your localhost settings.


    The profile will need the line in Listing 5-5 added to get Bake working properly.


    **Listing 5-5.** *By Entering an Alias into the Profile, You Can Access Bake in
    the Command Line*


    ```

    alias cake="php ~/Sites/blog/cake/console/cake.php"

    ```


