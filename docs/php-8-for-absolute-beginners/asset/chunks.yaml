  trans: "\n在调用 `myFunction` 函数时，上述两种语句都可能有效。若未传递任何值，变量 `$value` 将被设为*默认值*，即 `null`。`Null`\
    \ 表示该变量为空。然而，我们也可以传递一个布尔值（`true`），并将用它替代 `null`。\n\n算术运算的运作方式与数学类似，但区别在于计算发生在赋值运算符的右侧（即\
    \ `=` 号的右边），结果则放入表达式左侧的变量、函数或其他对象中。PHP 已内置许多函数，可产生计算器上所见的结果。\n\n> **注意**  \n>\
    \ 有关可用数学函数的更多信息，请访问 [`www.php.net/manual/en/ref.math.php`](http://www.php.net/manual/en/ref.math.php)。\n\
    \nPHP 允许使用圆括号 `()` 来改变值的计算顺序。否则，对于数值而言，该语言通常会遵循数学上的*运算顺序*。这一顺序与常规数学相似，但存在一些细微差异。随着本书后续内容的展开，我们将看到其中部分差异。\n\
    \n> **注意**  \n> 有关运算顺序的更多信息，请访问 [`www.php.net/manual/en/language.operators.precedence.php`](http://www.php.net/manual/en/language.operators.precedence.php)。\n\
    \n让我们看一些示例。  \n赋值运算符（`=`）会获取表达式右侧的值（`1`），并将其放入表达式左侧的变量（`$my_num`）中。如果该变量不存在，则会在内存中创建它。\n\
    \n```\n$my_num = 1;\n```\n\n以下两条语句都将表达式右侧的值（`$my_num`）加到表达式左侧变量（`$value`）中已有的内容上。如果该变量此前不存在，则会将右侧的值加上零，并将结果放入变量（`$value`）。如果变量中包含字符串，则会在相加之前尝试将其转换为数字。\n\
    \n```\n$value += $my_num;\n$value = $value + $my_num;\n```\n\n以下示例与前一个类似，区别在于从变量所含的值中减去右侧的值。如果变量此前不存在，则从\
    \ `0` 中减去右侧的值（`$my_num`）。如果变量中包含字符串，则会在相减之前尝试将其转换为数字。\n\n```\n$value -= $my_num;\n\
    $value = $value - $my_num;\n```\n\n以下示例与前一个类似，区别在于进行乘法而非减法。如果变量此前不存在，则将右侧的值（`$my_num`）乘以\
    \ `0`。如果变量中包含字符串，则会在相乘之前尝试将其转换为数字。\n\n```\n$value *= $my_num;\n$value = $value\
    \ * $my_num;\n```\n\n以下示例与前一个类似，区别在于将右侧的值（`$my_num`）除以变量中所含的值。除法将返回一个浮点数，除非两个值都是整数且能整除（无小数部分）。如果变量中包含字符串，则会在相除之前尝试将其转换为数字。\n\
    \n> **注意**  \n> 如果变量 `$my_num` 不存在，它将被设为 `0`。这会导致抛出异常，因为不能除以零！在除以零时，函数 `fdiv()`\
    \ 会返回 `INF`（无穷大）、`-INF`（负无穷大）或 `NAN`（非数字），而不会抛出异常。\n\n```\n$value /= $my_num;\n\
    $value = $value / $my_num;\n```\n\n以下示例与前一个类似，区别在于将除法的余数放入变量中。如果变量中包含字符串，则会在取余之前尝试将其转换为数字。\n\
    \n```\n$value %= $my_num;\n$value = $value % $my_num;\n```\n\n以下语句将计算 `$value`\
    \ 的 `$my_num` 次幂，并将结果放回 `$value`。\n\n```\n$value = $value ** $my_num;\n```\n"
- fmt: "Variables can be incremented/decremented before they are used (`++$num`, `--$num`)\
    \ or after they are used (`$num++`, `$num--`).\n\n(Assume `$num = 1` before each\
    \ statement is executed.)\n\n```\n$value = $num++ - 5; // $value is -4, $num is\
    \ 2\n$value = $num-- + 5; // $value is 6, $num is 0\n$value = ++$num – 5; // $value\
    \ is -3, $num is 2\n$value = --$num + 5; // $value is 5, $num is 0\n```\n\n**Exercise**:\
    \ Create a program that sets two numerical values to two different variables.\
    \ Then calculate the values when adding, subtracting, dividing, and multiplying\
    \ the numbers. After each calculation, display the results in a sentence, such\
    \ as \"The sum of 1 and 2 is 3.\"\n\n**Hint**\n\nIn most cases, PHP allows you\
    \ to place variable names inside of strings. For example, `\"The sum of $firstNumber\
    \ and $secondNumber is $sum\"` could produce the requested results.\n\n## Conditional\
    \ Statements\n\n*Conditional statements* determine if a comparison is \"true\"\
    \ or \"false.\" If the statement is true, then the code right after the `if` statement\
    \ is executed. If the statement is false, the code after the `else` statement\
    \ (if there is one) is executed. Unlike the assignment operator (`=`), shown in\
    \ the previous section, comparing two values to determine if they are equal requires\
    \ two (`==`) or three (`===`) equal signs. Two signs ignore the case or data type.\
    \ An \"A\" and \"a\" would be equal. Also, a 5 and a 5.0 would be equal. Three\
    \ signs require an exact match. Both of the examples would not be considered equal\
    \ with three signs.\n\n**Note**\n\nIf the programmer mistakenly only uses one\
    \ equal sign, the program will not produce an error. It will assume a \"true\"\
    \ state and the conditional statement might produce invalid results.\n\n```\n\
    if(statement to compare) {\n// Executed if the comparison is true\n}\n// Code\
    \ after the if statement is executed whether the result is true or false\nif(statement\
    \ to compare) {\n// Executed if the comparison is true\n}\nelse {\n// Executed\
    \ if the comparison is false\n}\n// Code after the if/else statement executed\
    \ whether the result is true or false\n```\n\nThe basic structure of a conditional\
    \ statement is shown in the preceding. In the first example, the code inside the\
    \ `if` statement is only executed if the statement is true. No additional code\
    \ is executed if the statement is false. In the second example, code is provided\
    \ after the `else` statement to be executed if the statement is false. Embedded\
    \ `if`/`else` statements can also be used.\n\nLet us look at some examples using\
    \ conditional statements with comparison operators.\n\nI-1:\n\n```\n```\n\nOutput:\
    \ 36 and 25 are not equal.\n\nWhy: The value in `$a` (25) and `$b` (36) are not\
    \ the same. Thus, the code in the `else` section will be executed.\n\nI-2:\n\n\
    ```\n```\n\nOutput: A and a are not equal.\nWhy: Using three equal signs (`===`)\
    \ also compares cases. In this example, the comparison is false due to the case.\
    \ If you remove one of the equal signs, the result will become true.\n\n**Note**\n\
    \nIn this example, double quotes are used which creates a string. Since each of\
    \ these is only one character, single quotes could also have been used.\n\nI-3:\n\
    \n```\n```\n\nOutput: 36 and 25 are not equal.\n\nWhy: The not operator (`!`)\
    \ works in reverse of the results of the equals operator (see #1). The condition\
    \ is reversed from a false state to a true state. The code right after the `if`\
    \ expression is executed.\n\nI-4:\n\n```\n```\n\nOutput: a and A are not equal.\n\
    \nWhy: The *not case operator* (`!==`) works in reverse of the case operator (see\
    \ #2). The comparison becomes true. The code right after the `if` statement is\
    \ executed.\n\nI-5:\n\n```\n```\n\nOutput: 25.1 is less than 36.\n\nWhy: Less\
    \ than returns true if the value on the left is less than the value on the right.\
    \ We can mix floating-point (decimal) and whole number (integer) comparisons.\
    \ In this example, 36 will be converted to 36.0 before they are compared.\n\n\
    I-6:\n\n```\n```\n\nOutput: 36 is less than or equal to 36.\n\nWhy: The less than\
    \ or equal to comparison works similar to #5. However, if the values are equal,\
    \ then it returns true.\n\nI-7:\n\n```\n $b) {\necho \"$a is greater than $b\"\
    ;\n}\nelse {\necho \"$b is greater than $a\";\n}\n?>\n```"
