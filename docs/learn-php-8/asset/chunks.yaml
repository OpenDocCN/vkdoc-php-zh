    现在你已经具备了提供备份和恢复的能力，让我们对`readerrorlog`文件（如示例 6-8 所示）进行一些调整。新的应用程序将需要允许支持人员选择（和修改）任何有效的更改日志文件，选择最有效的数据文件，并应用更改日志文件中的更改来生成一个新的有效数据
