  \ 上了解更多相关信息。\n\n### 问题\n\n1. 在本章中，我们构建了一个由三部分组成的数据库引擎：工厂、连接器和驱动程序。为什么这比使用单一类或仅使用工厂-驱动组合更可取？\n\
  \n2. `Connector` 类比 `Connector\\Mysql` 类简单得多，然而 `Query\\Mysql` 类比 `Query` 类简单得多。这是为什么？\n\
  \n3. 为什么 `Query` 类需要用查询值替换 `?` 字符？\n\n### 答案\n\n1. 如果我们计划拥有多个连接器或查询类，那么工厂模式是一个好主意。\n\
  \n\n"
- "# 将连接器与查询类组合是个好主意，因为它们处理不同的事务。`Connector`类是 PHP 与 MySQL 服务器之间的中介，而`Query`类负责构建\
  \ SQL 查询。将它们合并为一个类会严重限制库的功能。\n\n通过 PHP 访问的每个数据库引擎都需要独特的方法和类名。这意味着几乎无法抽象出适用于所有数据库引擎的通用逻辑。而关系型\
  \ SQL 则并非特定数据库引擎的专属，因此可以将其抽象化，以便在多种关系型 SQL 数据库引擎中使用。\n\n这是我们设置的一项安全措施，用于验证提供给 MySQL\
  \ 的查询参数。我们也可以使用基本的字符串替换，但这样做安全性较低。\n\n### 练习题\n\n1. 本章主要讲解 MySQL。但我们构建的架构也可用于其他关系型\
  \ SQL 数据库引擎，因此请尝试为另一关系型 SQL 数据库引擎创建相应的连接器-驱动组合。\n\n2. 使用`Driver\\Mysql`类生成的`WHERE`子句不支持`OR`、`WHERE`或`LIKE`子句。请尝试为这些条件创建相应的方法。\n\
  \n---\n\n## 第 10 章：模型\n\n到目前为止，我们创建了构成框架基础的类和库，但并未特别关注应用程序将如何使用它们。这一切即将改变。\n\n正如我之前提到的，如果没有可供计算的数据，计算本身就毫无意义。你将要参与的多数项目都有一个共同点：它们需要存储、操作、返回和显示数据。通过使用数据库，你可以实现这些功能。\n\
  \n在第 9 章中，我们学习了如何创建可扩展的数据库库，并编写了一对 MySQL 连接器/查询类。直接与数据库对话是完成任务的一种方式，但在控制器中直接这样做并不理想。这只是使用模型的原因之一。\n\
  \n### 目标\n\n- 我们需要理解什么是模型。\n- 我们需要构建模型类，以便轻松处理通用且重复的任务。\n\n### 理念\n\n模型使我们能够隔离所有直接的数据库通信，以及大多数与第三方\
  \ Web 服务的通信。本章中我们将构建的模型，将提供一个简单的接口，用于对数据库执行变更操作。\n\n> **注意** 本章定义模型的方式有时被称为对象关系映射（ORM）。ORM\
  \ 库在两个与数据相关的系统之间创建了一个不透明的通信层。你可以在[`en.wikipedia.org/wiki/Object-relational_mapping`](http://en.wikipedia.org/wiki/Object-relational_mapping)了解更多关于\
  \ ORM 的信息。\n\n理解模型不限于数据库工作很重要。模型可以连接到任意数量的第三方数据服务，并为我们的控制器提供简单的接口。我们只是恰好将模型聚焦到 ORM\
  \ 范式上。\n\n同样，我们也可能需要构建一个连接到 Flickr 下载照片的模型，或者一个允许我们从 Amazon S3 等云计算网络上传/下载文件的模型。模型旨在包含所有未直接呈现在视图中、或未被控制器用于连接视图和模型的资源。\n\
  \n### 实现\n\n数据库引擎可以存储多种不同类型的数据。对于我们的模型，我们只需要以下几种。\n\n- **自动编号**  \n自动编号字段会生成自动递增的数值，通常用于标识字段。\n\
  \n- **文本**  \n文本字段对应`varchar`或`text`数据类型，具体取决于所需的字段长度。\n\n- **整数**  \n整数类型的默认字段长度为\
  \ 11。\n\n- **小数**  \n小数字段包含浮点数值。\n\n- **布尔值**  \n布尔字段实际上是`tinyint`字段。当为其赋予`true`/`false`时，布尔值会被转换为整数值。\n\
  \n- **日期时间**\n\n\n\n我们之所以选择在 ORM 中支持如此小的数据类型子集，是因为这可以保持简单。我们也可以确信绝大多数数据库引擎都支持这些数据类型。我们如何在模型中使用这些数据类型？清单\
  \ 10-1 中的示例展示了一种为我们模型所需的不同数据类型进行定义的方式。\n\n***清单 10-1.*** User 模型\n\n```\nclass User\
  \ extends Framework\\Model\n{\n\n    /**\n     * @column\n     * @readwrite\n  \
  \   * @primary\n     * @type autonumber\n     */\n    protected $_id;\n\n    /**\n\
  \     * @column\n     * @readwrite\n     * @type text\n     * @length 100\n    \
  \ */\n    protected $_first;\n\n    /**\n     * @column\n     * @readwrite\n   \
  \  * @type text\n     * @length 100\n     */\n    protected $_last;\n\n    /**\n\
  \     * @column\n     * @readwrite\n     * @type text\n     * @length 100\n    \
  \ * @index\n     */\n    protected $_email;\n\n    /**\n     * @column\n     * @readwrite\n\
  \     * @type text\n     * @length 100\n     * @index\n     */\n    protected $_password;\n\
  \n    /**\n     * @column\n     * @readwrite\n     * @type text\n     */\n    protected\
  \ $_notes;\n\n    /**\n     * @column\n     * @readwrite\n     * @type boolean\n\
  \     * @index\n     */\n    protected $_live;\n\n    /**\n     * @column\n    \
  \ * @readwrite\n     * @type boolean\n     * @index\n     */\n    protected $_deleted;\n\
  \n    /**\n     * @column\n     * @readwrite\n     * @type datetime\n     */\n \
  \   protected $_created;\n\n    /**\n     * @column\n     * @readwrite\n     * @type\
  \ datetime\n     */\n    protected $_modified;\n\n}\n```\n\n关于此示例模型，我们首先注意到它只包含少数几个属性，并且非常容易理解。每个受保护的属性都包含了我们之前见过的`@readwrite`标记。这意味着我们将能够调用诸如`setFirst()`和`getCreated()`这样的\
  \ getter/setter 方法，而无需在我们的`Model`类中定义它们。\n\n新属性才是我们真正感兴趣的。每个类属性（它对应数据库中的一个列）都通过`@column`标记来标识。我们的模型初始化代码将忽略所有没有这个标记的类属性。`$_id`类属性有一个`@primary`标记，用于将其标识为主键列。`$_email`、`$_password`、`$_live`和`$_deleted`属性都有`@index`标记，表明它们应该在数据库表中被索引。\n\
  \n其余的标记是`@type`和`@length`。这些标记指明了类属性应该具有的数据类型，以及字段长度（我们只会在文本字段的情况下使用它，以决定它们应该是`varchar`还是`text`）。\n\
  \n如果这个结构要对我们有用，它需要转换为实际的数据库表。我们的数据库/模型层需要将我们创建的列转换为底层的 SQL，以便将其提交到数据库。当我们完成时，它应该类似于清单\
  \ 10-2 中所示的 SQL。\n\n***清单 10-2.*** User 模型的 MySQL 表表示\n\n```\nCREATE TABLE 'user'\
  \ (\n    'id' int(11) NOT NULL AUTO_INCREMENT,\n    'first' varchar(100) DEFAULT\
  \ NULL,\n    'last' varchar(100) DEFAULT NULL,\n    'email' varchar(100) DEFAULT\
  \ NULL,\n    'password' varchar(100) DEFAULT NULL,\n    'notes' text,\n    'live'\
  \ tinyint(4) DEFAULT NULL,\n    'deleted' tinyint(4) DEFAULT NULL,\n    'created'\
  \ datetime DEFAULT NULL,\n    'modified' datetime DEFAULT NULL,\n    PRIMARY KEY\
  \ ('id'),\n    KEY 'email' ('email'),\n    KEY 'password' ('password'),\n    KEY\
  \ 'live' ('live'),\n    KEY 'deleted' ('deleted')\n) ENGINE=InnoDB DEFAULT CHARSET=utf8;\n\
  ```\n\n> **注意**：密码绝不应以纯文本形式存储。为了保持简单和专注，我们在此忽略了这个最佳实践。你应该花时间学习如何加密或哈希密码，以确保它们不会被窃取并用于恶意目的。\n\
