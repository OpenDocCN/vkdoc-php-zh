- "# 第 15 章 ■ 搜索\n\n`request()`方法（以及`Request`类）使用`Curl`来发起 HTTP 请求。\n\n该方法首先创建一个新的\
  \ curl 资源实例，然后为该实例设置一些参数。接着发起请求，如果请求成功，将以`Request\\Response`类实例的形式返回。如果请求失败，则会抛出异常。\n\
  \n最后，销毁 curl 资源并返回响应。在深入了解`Request\\Response`类之前，我们需要先看一下清单 15-6 中的那些设置方法。\n\n***清单\
  \ 15-6.*** 请求设置方法\n\n```\nprotected function _setOption($key, $value)\n{\n    curl_setopt($this->_request,\
  \ $key, $value);\n    return $this;\n}\n\nprotected function _normalize($key)\n\
  {\n    return \"CURLOPT_\".str_replace(\"CURLOPT_\", \"\", strtoupper($key));\n\
  }\n\nprotected function _setRequestMethod($method)\n{\n    switch (strtoupper($method))\n\
  \    {\n        case \"HEAD\":\n            $this->_setOption(CURLOPT_NOBODY, true);\n\
  \            break;\n        case \"GET\":\n            $this->_setOption(CURLOPT_HTTPGET,\
  \ true);\n            break;\n        case \"POST\":\n            $this->_setOption(CURLOPT_POST,\
  \ true);\n            break;\n        default:\n            $this->_setOption(CURLOPT_CUSTOMREQUEST,\
  \ $method);\n            break;\n    }\n    return $this;\n}\n\nprotected function\
  \ _setRequestOptions($url, $parameters)\n{\n    $this\n        ->_setOption(CURLOPT_URL,\
  \ $url)\n        ->_setOption(CURLOPT_HEADER, true)\n        ->_setOption(CURLOPT_RETURNTRANSFER,\
  \ true)\n        ->_setOption(CURLOPT_USERAGENT, $this->getAgent());\n\n    if (!empty($parameters))\n\
  \    {\n        $this->_setOption(CURLOPT_POSTFIELDS, $parameters);\n    }\n\n \
  \   if ($this->getWillFollow())\n    {\n        $this->_setOption(CURLOPT_FOLLOWLOCATION,\
  \ true);\n    }\n\n    if ($this->getReferer())\n    {\n        $this->_setOption(CURLOPT_REFERER,\
  \ $this->getReferer());\n    }\n\n    foreach ($this->_options as $key => $value)\n\
  \    {\n        $this->_setOption(constant($this->_normalize($key)), $value);\n\
  \    }\n\n    return $this;\n}\n\nprotected function _setRequestHeaders()\n{\n \
  \   $headers = array();\n    foreach ($this->getHeaders() as $key => $value)\n \
  \   {\n        $headers[] = $key.': '.$value;\n    }\n    $this->_setOption(CURLOPT_HTTPHEADER,\
  \ $headers);\n    return $this;\n}\n```\n\n`_setOption()`和`_normalize()`方法是便捷方法，用于在三个重要的`Request`设置方法中执行的任务。如果你熟悉\
  \ PHP 的`Curl`类，它们对你来说应该不陌生。\n\n**注意** 你可以通过[`http://www.php.net/manual/en/book.curl.php`](http://www.php.net/manual/en/book.curl.php)了解更多关于\
  \ PHP `Curl`类的信息。\n\n`_setRequestMethod()`方法设置与不同请求方法相关的`Curl`参数。某些请求方法需要设置额外的参数（如`GET`和`POST`），而其他请求方法则需要从响应中排除某些内容（如`HEAD`）。\n\
  \n`_setRequestOptions()`方法遍历所有需要设置的请求特定参数。这包括 URL、用户代理、请求是否应该跟随重定向等。它甚至会添加通过`setOptions()`设置方法（或构造选项）指定的任何选项。\n\
  \n最后，`_setRequestHeaders()`方法遍历通过`setHeaders()`设置方法（或构造选项）指定的标头，为请求添加任何自定义标头。\n\n\
