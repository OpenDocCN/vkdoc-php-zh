    \    1.  用户日志文件\n    2.  错误日志文件\n    3.  信息性日志文件\n    4.  以上皆是\n10. 因程序异常而生成的电子邮件应执行哪些操作？\n\
    \    1.  包含所有错误信息，包括错误描述\n    2.  包含导致错误的代码行\n    3.  包含错误发生的日期和时间\n    4.  以上皆是\n\
    \n**True/False**\n\n1.  所有异常都应显示给用户。\n2.  当确切知道循环次数时，应使用`for`循环。\n3.  `while`循环将持续循环，直到条件语句变为真。\n\
    4.  可以使用`unset`释放数组中的一个位置。\n5.  所有 PHP 数组在使用前必须声明。\n6.  指针指向对象在内存中所在的位置。\n7. \
    \ `!`运算符将`TRUE`结果反转成`FALSE`结果。\n8.  可以使用`print_f`来显示数组的内容。\n9.  `Try/Catch`块应位于业务规则层和数据层，但不应位于界面层。\n\
    10. 只有程序代码有意抛出的`Exceptions`才应该被捕获。\n\n**Short Answer/Essay**\n\n1.  解释异常处理层次结构如何与三层应用程序协同工作。\n\
    2.  错误和异常之间的区别是什么？\n3.  如果 PHP 提供了错误的时间戳，如何修正时区？\n4.  PHP 程序员如何尝试捕获错误，以便将它们视为异常来处理？\n\
    5.  为什么应用程序生成多个日志文件很重要？\n\n**Projects**\n\n1.  调整第 4 章项目 #1（或 #2）中的代码，以包含异常处理和日志记录。\n\
    2.  创建一个应用程序，为你最喜欢的游戏节目注册参赛者。包括使用 HTML5 和 JavaScript 对输入数据进行验证。同时，在数据传递给应用程序时也要进行验证。该应用程序应包含一个接口\
    \ PHP 程序（界面层）和一个注册类（业务规则层）。注册类应包括异常处理（包括用户异常和程序异常）。接口程序应使用本章所示的`try/catch`块来处理异常。\n\
    \n**Term Project**\n\n1.  更新 ABC 电脑零件仓库库存应用程序以包含异常处理。该应用程序应尽可能尝试处理所有异常和错误。\n\n\
    用户异常应记录到用户日志中。所有其他异常应记录到系统日志中。如果异常被认为是严重的（将导致程序崩溃），则应向系统管理员发送电子邮件。提示：`Try/Catch`块应仅存在于界面层。\n\
    \n# 7. 数据类\n\n*我是一个理想主义者。我不知道我要去哪里，但我已在路上。——*卡尔·桑德堡*，《偶发事件》(1904)*\n\n## 章节目标\
    \ / 学生学习成果\n\n完成本章后，学生将能够：\n\n*   创建一个用于插入、更新和删除 XML 或 JSON 数据的数据类\n*   解释如何使用\
    \ SQL 脚本创建一个用于更新 MySQL 数据的数据类\n*   创建一个用于生成变更备份日志的 PHP 程序\n*   创建一个能够从先前备份中恢复数据的\
    \ PHP 程序\n*   应用更改以创建最新的有效信息\n*   使用依赖注入将数据类附加到业务规则层的另一个类\n*   创建一个三层 PHP 应用程序\n\
    \n## 数据类\n\n界面层和业务规则层不应存储应用程序信息。这些层甚至不应知道信息的存储方式（文本文件、XML 或数据库）或存储位置。任何需要存储的信息都必须从业务规则层传递到数据层。数据层还负责响应来自业务规则层的信息请求。\n\
    \n这使得界面层和业务规则层无需了解存储方法类型（文本文件、XML 或数据库）或存储项目位置的任何更改。数据层接受的签名（参数）和返回的项目在应用程序的生命周期内应保持不变。只要这些不变，当数据层发生更改时，其他层也应无需更改。\n\
    \n*   *安全与性能——在使用数据库时，在业务规则层构建 SQL 字符串并将该字符串传递给数据层似乎是合理的。但这会在应用程序中造成一个主要的安全漏洞。黑客可以传递任何\
    \ SQL 字符串（包括* *delete* *字符串）。将 SQL 更新命令（DELETE、* *UPDATE 和* *INSERT）传递给数据层似乎也很合理。同样，这也提供了一个主要漏洞。为\
    \ SQL 的* *WHERE* *命令传递数据也是一个坏主意，因为它可能允许黑客删除或更改数据库中任意组合的数据。*\n\n数据类应提供操作信息的完整功能。这包括读取、插入、更新和删除信息的能力。即使当前应用程序不需要所有这些命令，从逻辑上讲，它们也应存在于数据类中以便将来使用。\n\
    \n在性能和存储信息的需求之间应取得平衡。虽然高度重要的信息可能需要立即存储，但其他信息可以保存在应用程序的数据结构（列表、数组、数据集）中，直到用户完成所有更新。在服务器的内存中保存和对信息进行更改，而不是在存储位置进行，效率要高得多。仅在所有更改完成后才存储信息，可以将对存储位置的多次调用减少到两次（初始检索信息和保存更新后的信息）。在内存中对信息进行更改总是比在存储设备（如硬盘驱动器）上进行更改更高效。\n\
    \n然而，当数据发生变化时，可能会发生冲突。应用程序正在对数据进行更改的同时，数据结构中驻留的实时数据可能也正在被更新。有多种方法可以减少或消除冲突的可能性。所需的方法取决于数据的使用频率和更改频率。可以设计锁定机制来限制对当前正在使用的数据的访问。这些技术通常是在数据结构本身内部处理的。对于频繁更改的数据，这些技术是保留有效数据所必需的。本书示例中使用的数据不经常更改。因此，冲突的可能性大大降低。\n"
- fmt: 'Using a data class provides a logical ability to populate a data structure
    and to save information in a storage location automatically. Assuming that an
    instance of the data class will only be created when it is necessary to update
    information, the constructor of the class can be used to retrieve the information
    from storage and place it in the memory of the server. When the data object is
    no longer needed, logically, no more changes are required to the information.
    The destructor of the class can be used to return the information from memory
    to storage.


    ```php

    class dog_data

    {

    function __construct()

    {

    $xmlfile = file_get_contents(get_dog_application("datastorage"));

    $xmlstring = simplexml_load_string($xmlfile);

    $array = (array)$xmlstring;

    print_r($array);

    }

    }

    ```


    This example constructor comes very close to providing useful information from
    an XML file. The PHP `file_get_contents` method opens a text XML file, drops the
    contents into a string, and closes the file. The constructor calls this method
    along with the `get_dog_application` method (same method that was used in `dog_container`
    in Example [6-5](#394210_2_En_6_Chapter.xhtml#PC12)) to determine the file name
    and location of the XML data file. The contents of the file are then placed in
    `$xmlfile`. The PHP `simplexml:load_string` method then formats the data to allow
    the SimpleXML data model to traverse the information. At this point, the SimpleXML
    methods could be used to display and manipulate the data. However, the next line
    attempts to convert the XML data into an array. The `(array)` statement tries
    to use type casting. The `print_r` statement displays the results.


    ```

    Woof


    Yellow

    Lab


    Sam


    Brown

    Lab

    ```


    Assuming that the XML file is formatted as shown here, the output includes


    ```

    Array ( [dog] => Array (

    [0] => SimpleXMLElement Object (

    [dog_name] => Woff [dog_weight] => 12

    [dog_color] => Yellow [dog_breed] => Lab )

    [1] => SimpleXMLElement Object (

    [dog_name] => Sam [dog_weight] => 10

    [dog_color] => Brown [dog_breed] => Lab )

    ) )

    ```


    A combination of multidimensional arrays and SimpleXML objects have been created.
    This does not provide useful data that can easily be manipulated. However, you
    can use JSON methods to trick PHP into creating a multidimensional *associate
    array*.


    ```php

    class dog_data

    {

    function __construct()

    {

    $xmlfile = file_get_contents(get_dog_application("datastorage"));

    $xmlstring = simplexml:load_string($xmlfile);

    $json = json_encode($xmlstring);

    print_r($json);

    }

    }

    {"dog":[{"dog_name":"Woff","dog_weight":"12","dog_color":"Yellow",

    "dog_breed":"Lab"},{"dog_name":"Sam","dog_weight":"10",

    "dog_color":"Brown","dog_breed":"Lab"}]

    }

    ```


    Using the PHP `json_encode` method changes the data into well-structured JSON
    data. You could use one of the several PHP techniques to manipulate JSON data,
    or with one additional statement (`json_decode`), you can create a well-structured
    multidimensional associate array.


    ```php

    class dog_data

    {

    function __construct()

    {

    $xmlfile = file_get_contents(get_dog_application("datastorage"));

    $xmlstring = simplexml:load_string($xmlfile);

    $json = json_encode($xmlstring);

    $dogs_array = json_decode($json,TRUE);

    print_r($dogs_array);

    }

    }

    Array ( [dog] =>

    Array (

    [0] => Array ( [dog_name] => Woff [dog_weight] => 12

    [dog_color] => Yellow [dog_breed] => Lab )

    [1] => Array ( [dog_name] => Sam [dog_weight] => 10

    [dog_color] => Brown [dog_breed] => Lab )

    ) )

    ```


    As you can see, there is no longer a mixture of arrays and SimpleXML objects.
    An associate array has been created that uses keywords instead of numerical values
    for subscripts (indexes). In the previous example, an array called `"dog"` has
    been created with two rows (each row is represented by an array). In each row,
    the columns (cells) are referenced by a column name (`dog_name`, `dog_weight`,
    `dog_color`, and `dog_breed`) instead of indexes (0, 1, 2, 3). These rows and
    columns can be manipulated using some of the techniques we have seen in previous
    chapters.


    Once we have completed all changes to the array (as requested by the business
    rules tier), we will return the information to the storage location in the destructor.


    ```php

    private $dogs_array = array(); // defined as an empty array initially

    function __construct()

    {

    $xmlfile = file_get_contents(get_dog_application("datastorage"));

    $xmlstring = simplexml:load_string($xmlfile);

    $json = json_encode($xmlstring);

    $this->dogs_array = json_decode($json,TRUE);

    }

    function __destruct()

    {

    $xmlstring = '''';

    $xmlstring .= "\n\n";

    foreach ($this->dogs_array as $dogs=>$dogs_value) {

    foreach ($dogs_value as $dog => $dog_value)

    {

    $xmlstring .="\n";

    foreach ($dog_value as $column => $column_value)

    {

    $xmlstring .= "" . $dog_value[$column] . "\n";

    }

    $xmlstring .= "\n";

    }

    }

    $xmlstring .= "\n";  file_put_contents(get_dog_application("datastorage"),$xmlstring);

    }

    ```


    There are many ways that you can create XML data in PHP. The previous example
    takes a simplistic approach by supplying the XML tags from the array. As seen
    in the structure, there are three sets of arrays in this multidimensional array.
    The first `foreach` loop is used to flow through the first array (dogs). The second
    `foreach` loop handles the dog arrays (rows). Once inside this loop, the third
    `foreach` loop controls the columns in each dog array (each row). The third loop
    retrieves the column names (from `$column`) and places them in XML tags. `$column`
    is also used to pull the value in the column (`$dog_value[$column]`). The `$xmlstring`
    supplies the same tags and structure as in the original XML file. Note that each
    line includes a newline character (`\n`) to display different lines in the file.
    The structure would work without this addition. However, it makes the file more
    readable in a text editor. Once the `$xmlstring` has been created, the code uses
    a combination of the PHP `file_put_contents` method and the `get_dog_application`
    method (from Chapter [4](#394210_2_En_4_Chapter.xhtml)) to open the XML file,
    replace the contents with the string contained in `$xmlstring`, and close the
    file.


    We need to make one more final adjustment to the constructor to allow it to handle
    XML parsing errors. A parsing error occurs when something is wrong with the XML
    structure. The previous `dog_breed` and `dog_application` XML files are not updated
    by the application and are fairly stable. However, the XML file for the dog''s
    information will be updated frequently. We need to handle any problems that may
    occur. We will raise a general error, which will be treated by `dog_interface`
    as an important error that is logged and emailed to support personnel. It will
    also display a `"System currently not available please try again later"` message
    to the users.


    ```php

    $dogs_array = array(); //defined as an empty array initially

    Libxml_use_internal_errors(true);

    function __construct() {

    $xmlfile = file_get_contents(get_dog_application("datastorage"));

    $xmlstring = simplexml_load_string($xmlfile);

    if ($xmlstring === false) {

    $errorString = "Failed loading XML: ";

    foreach(libxml_get_errors() as $error) {

    $errorString .= $error->message . " ";  }

    throw new Exception($errorString); }

    $json = json_encode($xmlstring);

    $this->dogs_array = json_decode($json,TRUE);

    }

    ```'
