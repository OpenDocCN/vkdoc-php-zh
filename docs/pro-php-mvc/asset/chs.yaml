  \ `Query` 子类为相应的引擎实现类似的逻辑。\n\n**注意** 您选择应用于数据库表的排序规则将决定 SQL 查询在字符串值与表列数据比较时是否区分大小写。这可以在单个查询的基础上进行覆盖，但这种高级\
