  trans: "\n### 技巧一：简化页面\n\n有句老话说得好，“少即是多”。在网页性能方面，这句话同样适用。你的主题中“少”的东西越多——越少的图片、请求和页面元素——你的页面加载和显示的速度就越快。\n\
    \n听起来合情合理且直截了当，对吧？我同意，但这一点似乎从未被纳入互联网上那些“加速网站并改善你生活的五种方法”之类的列表中。\n\n它缺席的原因，或许在于它并不总是一个容易的、“立竿见影”的办法。与我们稍后要探讨的一些技巧不同，花时间审视自己的心血之作并从中剔除冗余，既耗时又需要情感上的勇气。但是，就像写出好文章一样，制作高性能的\
    \ Shopify 主题需要*无情的编辑*。\n\n这个技巧的妙处在于，除了性能提升之外，你还能获得一些附带好处。就像编辑文字能让读者更易理解一样，编辑你的\
    \ Shopify 主题也能让你的客户看得更清晰、用得更顺手，同时还能因减轻维护负担而改善你作为开发者的生活。这真是三赢！\n\n如果你想找一些关于如何“精简”你的\
    \ Shopify 主题的灵感，这里有一些思路：\n\n*   重构 CSS：在一个网站的开发过程中，很容易在 CSS 文件中积累技术债务。重构并简化你的\
    \ CSS 不仅能减少样式表的大小，还能让网站更易于维护，并为访客提供一致的用户体验。\n*   干掉轮播图：轮播图不仅用户体验糟糕，而且通常会加载大量高分辨率图片。为了你的用户和网站性能着想，请用一个（经过优化的）单张图片来替换轮播图。\n\
    *   用 CSS 替换背景图片：如今的 CSS 功能已经非常强大。如果你还在使用平铺图片作为背景，不妨考虑用 CSS 背景来替代。你会惊讶于 CSS 能做到的事情。\n\
    \n### 技巧二：图片优化\n\n这几乎是每一篇关于页面加载优化的文章都会首先提到的内容。这并非巧合——图片占用了大多数网站体量中的最大比例，而你只需付出很少的努力就能获得巨大的收益。\n\
    \n#### 图片优化基础\n\n这里有一个在不到 50 秒内精简主题的超级简单方法：\n\n1.  从 [`imageoptim.com`](https://imageoptim.com)\
    \ 下载 `ImageOptim` 并打开它。\n2.  将你主题的 `assets` 文件夹拖拽到该应用程序中。\n3.  等待看看你节省了多少空间（见图\
    \ 10-4）。\n\n   ![A437216_1_En_10_Fig4_HTML.jpg](img/A437216_1_En_10_Fig4_HTML.jpg)\n\
    \n   **图 10-4** ImageOptim 正在工作\n\n就这么简单！\n\n当我撰写本书时，为了截图，我把自己正在开发的一个主题的 `assets`\
    \ 文件夹通过 `ImageOptim` 跑了一遍。我之前已经用 `ImageOptim` 处理过这个主题了，但仅仅五秒钟的工作，我仍然节省了 200KB\
    \ 的页面体积。还不错！\n\n另一个值得一试的工具是 `JPEGMini` ([`www.jpegmini.com`](http://www.jpegmini.com))。与\
    \ `ImageOptim` 不同，它只处理 JPEG 图片（可能你也猜到了），但它应用了一些更高级的算法，可以进一步压缩这些文件。对于那些不是 Mac 用户的读者（抱歉，我很少走出自己的“舒适圈”），`Kraken`\
    \ ([`kraken.io`](https://kraken.io)) 是一个很棒的替代方案。\n\n#### 自动化图片优化\n\n一旦你亲眼见证了图片优化的好处，你很可能就希望一直使用它。这时，像第\
    \ 2 章中描述的那样使用基于 Grunt 的工作流就派上用场了。\n\n使用像 `grunt-contrib-imagemin`（它使用了与 `ImageOptim`\
    \ 程序相同的库构建）这样的 Grunt 插件，我们可以让 Grunt 在我们部署主题时自动优化所有图片。你可以回顾第 2 章中的示例，了解如何实现这一点。\n\
    \n#### 有损图片优化——突破极限\n\n上述这些优化方法都是“无损”的——也就是说，它们在不降低图像质量的前提下减小文件大小。这听起来很合理，但通常我们可以通过牺牲一些微小的画质，来实现相当惊人的文件大小缩减——而这些画质损失中的一部分，最终用户根本看不出来。\n\
    \n我们先以 JPEG 图片为例。\n\n如果你熟悉 Photoshop 的“存储为 Web 所用格式”功能，你就会知道可以选择最终图片的质量。默认情况下，这个值为\
    \ 60——但事实上，你通常可以将这个质量设置降低到低至 25，而最终效果也不至于变得“一团糟”。如果你处理的是用于高分辨率显示器的 `@2x` 或 `@3x`\
    \ 图片，情况尤其如此。\n\n如果你不相信我，可以看看 [`retinafy.me/examples/jpeg-scaling.html`](https://retinafy.me/examples/jpeg-scaling.html)\
    \ 上来自 Thomas Fuchs 的精彩著作 *Retinafy Me* 中的缩放示例，该书以大量有用的细节详细介绍了创建高分辨率图像的过程。\n\n\
    我们也可以对 PNG 图片进行有损优化，这要归功于一个名为 `ImageAlpha` 的工具（由与 `ImageOptim` 同一个出色的团队开发，可在 [`pngmini.com`](https://pngmini.com)\
    \ 获取）。\n\n与 `ImageOptim` 类似，`ImageAlpha` 允许你将特定 PNG 文件拖入此应用程序，选择一个质量级别（对于 PNG\
    \ 来说，由可用的颜色数量决定），预览结果，并保存一个优化后的版本，如图 10-5 所示。\n\n![A437216_1_En_10_Fig5_HTML.jpg](img/A437216_1_En_10_Fig5_HTML.jpg)\n\
    \n**图 10-5** 使用 ImageAlpha 很有趣\n\n结果令人印象深刻，就像你在图 10-6 中的优化前后对比图里看到的那样。\n\n![A437216_1_En_10_Fig6_HTML.jpg](img/A437216_1_En_10_Fig6_HTML.jpg)\n\
    \n**图 10-6** 优化前（上，224KB）与优化后（下，34KB）的对比（图片由 [`pngmini.com`](http://pngmini.com)\
    \ 提供）\n\n与无损优化不同，我不建议将有损优化自动化，因为你往往需要亲自检查结果，以确保优化没有做得太过分，并确认一切看起来“没问题”。\n"
- fmt: '### Technique 3: Asset Concatenation


    For every JavaScript, stylesheet, or image your page references, a client’s browser
    needs to make an HTTP request to fetch and parse that asset. Asset concatenation
    is the process of combining multiple asset files into a single file to reduce
    the number of requests the browser must make, cutting down on this overhead and
    making for faster load times.


    As an example, if the top of your `theme.liquid` contains something like Listing 10-1,
    your browser is going to be making lots of requests that it needs to wait on before
    it continues to render the page. A better strategy is to selectively combine these
    files to reduce their number, so that you end up with something more like Listing
    10-2.


    ```

    {{ ''bootstrap.css'' | asset_url | stylesheet_tag }}

    {{ ''index.css'' | asset_url | stylesheet_tag }}

    {{ ''products.css'' | asset_url | stylesheet_tag }}

    {{ ''articles.css'' | asset_url | stylesheet_tag }}


    {{ ''jquery.js'' | shopify_asset_url | script_tag }}

    {{ ''bootstrap-core.js'' | shopify_asset_url | script_tag }}

    {{ ''bootstrap-tooltips.js'' | shopify_asset_url | script_tag }}

    {{ ''bootstrap-modals.js'' | shopify_asset_url | script_tag }}

    {{ ''products.js'' | shopify_asset_url | script_tag }}

    {{ ''cart.js'' | shopify_asset_url | script_tag }}

    ...

    Listing 10-1

    Example theme.liquid layout File with Assets from a Variety of Sources

    ```


    ```

    {{ ''main.css'' | asset_url | stylesheet_tag }}


    {{ ''jquery.js'' | shopify_asset_url | script_tag }}

    {{ ''bootstrap.js'' | shopify_asset_url | script_tag }}

    {{ ''main.js'' | shopify_asset_url | script_tag }}

    ...

    Listing 10-2

    Optimized Version of Listing 10-1 Utilizing Concatenated Assets

    ```


    For stylesheets and JavaScript files, the concatenation is very simple—it’s just
    a matter of copying and pasting the text contents of each file, one after another.
    As long as you concatenate the files in the same order that they originally appeared
    in your HTML, you won’t notice any functional difference, but the number of requests
    the browser has to make is dramatically reduced.


    **Note**: You should never include your JavaScript `<script>` tags in the `<head>`
    element, like in this example. Browsers will block page rendering when reading
    them. Put all of your tags at the bottom of your page, just before the closing
    `</body>` tag.


    As with any technique, you can take this technique too far, and concatenating
    everything into one file can be counter-productive. In the next few sections,
    I’ve listed some things you may reasonably choose to keep separated in your themes.


    #### Large JavaScript Libraries


    Bundling large libraries like jQuery together with your site-specific JavaScript
    is considered bad practice, as any changes to your site’s scripts will force browsers
    to download everything again.


    In fact, a much better strategy for large and common JavaScript libraries like
    jQuery is to use a common external CDN (Google’s Hosted Libraries is a good start).
    Not only does this mean that you don’t have to worry about managing the asset
    within your theme, there’s a decent chance that site visitors will already have
    the library in their browser cache.


    #### Assets Using Theme Settings


    As you saw in Chapter 8, appending a suffix to asset files (for example, `main.js.liquid`)
    will cause Shopify to preprocess those assets using Liquid, allowing us to use
    theme settings and asset filters within those files.


    If your theme takes advantage of this, I recommend separating the parts of code
    that use the theme settings out into their own asset file as much as possible.
    Otherwise, you’ll run in to a similar problem as that with large JavaScript libraries,
    forcing a large download on your users every time a theme setting changes.


    If you’re only using theme settings for a few minor tweaks, you could even just
    keep a single static asset file and add the dynamic stuff to your theme’s `<head>`,
    as in Listing 10-3.


    ```

    {{ ''main.css'' | asset_url | stylesheet_tag }}


    body {

    bgcolor: {{ settings.bgcolor | default: ''#ffffff'' }};

    }


    {{ ''https://ajax.googleapis.com/ajax/libs/jquery/2.1.3/jquery.min. | script_tag
    }}

    Listing 10-3

    Simple Example of Using Theme Settings Inside a  Block

    ```


    #### Assets Used Only on a Specific Page


    When you’re bundling your assets with concatenation, the stylesheets and scripts
    within those files will be available across all pages on your site. This is usually
    a reasonable assumption to make, and even if a script isn’t used on a single page,
    the benefits of having a single asset file usually exceed the downside of having
    a slightly larger file to download on some pages. However, if you have large assets
    that are used only on specific, rarely-used pages, it might be more efficient
    to keep those assets separate and load them only when needed.


    A good example of this is a Shopify store that offers logged-in customers a page
    to view their order history and manage their account. As most visits to your site
    won’t be from logged-in users and won’t be used for account management, it makes
    sense to avoid bundling the scripts and styles for the account management feature
    together with everything else.


    #### Automatic Concatenation


    An obvious downside to concatenation is that it makes management and development
    of your assets more difficult, by virtue of the fact that all of your scripts
    and stylesheets are now lumped together in one giant file.


    Setting up a way to automatically concatenate your files means you can get the
    benefits of concatenation without sacrificing developer convenience. As you might
    have guessed, I recommend using a workflow tool to automate this process—see Chapter
    2 for more.


    #### Image Concatenation


    This section has been focused on the concatenation of scripts and stylesheets,
    but concatenation can be used for images as well! In fact, you’ve probably seen
    this before with CSS sprites, where sites use a single PNG image to hold all their
    icons, as shown in Figure 10-7.


    ![A437216_1_En_10_Fig7_HTML.jpg](A437216_1_En_10_Fig7_HTML.jpg)


    Figure 10-7: Google’s CSS sprite


    The rationale behind this is the same as with stylesheets and scripts: reducing
    the number of requests that need to be made improves the performance of your site.


    The easiest way to do your own image concatenation is through the very excellent
    Grumpicon web app ( `http://www.grumpicon.com` ). It’s a drag-and-drop solution
    that comes with the added benefit of having a unicorn involved (see Figure 10-8).


    ![A437216_1_En_10_Fig8_HTML.jpg](A437216_1_En_10_Fig8_HTML.jpg)


    Figure 10-8: Any tool with an ASCII unicorn must be good


    Like all good asset-management tasks, the magic behind Grumpicon is available
    as a Grunt plugin (`grunticon`) for adding to your automated development workflow.


    #### Future Developments


    If you’ve been following recent developments in web technology, you may have heard
    of the SPDY or HTTP2 protocols. Without getting too technical (not the least because
    I’m not clear on all the details myself), these are next generation technologies
    that aim to drastically improve the speed of the web.


    One of the features of these protocols is “request multiplexing,” which aims to
    pretty much do the equivalent of asset concatenation at a much lower level. This
    would mean that developers like us can just use individual assets (easier) without
    forcing the browser to make more requests than Madonna’s rider.


    However, widespread deployment and support for these protocols on servers and
    clients is still some time away, so for the moment you’ll have to stick to the
    techniques as described. Sorry!'
