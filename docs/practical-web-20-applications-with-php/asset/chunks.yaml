- fmt: "`pear install Text_Password`\n\n`Text_CAPTCHA` also needs a TrueType font\
    \ available in order to write letters to the `CAPTCHA` image. Any font will do\
    \ for this, as long as its characters are easy to read. The font file I use in\
    \ this book is the bold version of Vera (`VeraBD.ttf`), available from the Gnome\
    \ web site ([http://www.gnome.org/fonts/](http://www.gnome.org/fonts/)). I chose\
    \ this font because its license terms allow it to be freely distributed. The font\
    \ should be stored in the application data directory (`/var/www/phpweb20/data/VeraBD.ttf`).\n\
    \n## Generating a CAPTCHA Image\n\nIn order to add CAPTCHA capabilities to our\
    \ application, we need to create a new controller action that will be responsible\
    \ for outputting the image. The CAPTCHA is not specific to user registration,\
    \ so we will call this controller `utility`, as there may be other utility actions\
    \ we want to add later.\n\nListing 4-13 shows the contents of `UtilityController.php`,\
    \ which we will store in `./include/Controllers`. Presently there is just one\
    \ action, which is responsible for generating and outputting the image.\n\n**Listing\
    \ 4-13.** *Generating a CAPTCHA Image Using `Text_CAPTCHA` (`UtilityController.php`)*\n\
    \n```php\n<?php\n\nclass UtilityController extends CustomControllerAction\n\n\
    {\n\n    public function captchaAction()\n\n    {\n\n        $captcha = Text_CAPTCHA::factory('Image');\n\
    \n        $opts = array('font_size' => 20,\n\n            'font_path' => Zend_Registry::get('config')->paths->data,\n\
    \n            'font_file' => 'VeraBd.ttf');\n\n        $captcha->init(120, 60,\
    \ null, $opts);\n\n        // disable auto-rendering since we're outputting an\
    \ image\n\n        $this->_helper->viewRenderer->setNoRender();\n\n        header('Content-type:\
    \ image/png');\n\n        echo $captcha->getCAPTCHAAsPng();\n\n    }\n\n}\n\n\
    ?>\n```\n\n> **Important** In Listing 4-13, we must disable the auto-rendering\
    \ of templates that `Zend_Controller_Front` will do. If we don't include the call\
    \ to `setNoRender()`, `captchaAction()` will try to render a template belonging\
    \ in `./templates/utility/captcha.tpl`. Since the `captchaAction()` method outputs\
    \ the generated CAPTCHA image, there is no such template.\n\nIn order to use `Text_CAPTCHA`,\
    \ we first call the `factory()` method to use the Image driver. We then create\
    \ an array of options to specify properties of the font that will be used. As\
    \ mentioned previously, the TrueType font is stored in the application data directory,\
    \ so we use the application config to tell `Text_CAPTCHA` about this directory.\n\
    \nNext we call the `init()` method, which specifies the height, width, and CAPTCHA\
    \ phrase, as well as the font options. In this code we pass `null` as the third\
    \ parameter, which means the phrase will be randomly generated by `Text_Password`.\n\
    \n> **Tip** You may prefer to store some of the \"magic values\" in Listing 4-13\
    \ (such as font name and size) in the application settings (`./settings.ini`).\n\
    \nFinally, we send the image to the browser using the `getCAPTCHAAsPng()` method.\
    \ We must also send the correct `Content-type` header to the browser, so it knows\
    \ to interpret the data as an image.\n\nAs it stands, we cannot yet use this code\
    \ in our registration form because `FormProcessor_UserRegistration` needs to know\
    \ the CAPTCHA phrase in order to determine whether or not the user entered it\
    \ correctly. We must modify `captchaAction()` so that it generates a new phrase\
    \ and writes it to the session. On subsequent requests to `captchaAction()`, we\
    \ then check for the existence of the phrase in the session. If the value exists,\
    \ we use that for the image rather than generating a new one.\n\n> **Note** The\
    \ way we are implementing CAPTCHA images is so that if a user enters the phrase\
    \ incorrectly, they are shown the same CAPTCHA image again. An alternative is\
    \ to generate a new phrase every time they get it wrong. The important thing to\
    \ remember in this implementation is to clear the phrase once it has been successfully\
    \ entered. We will cover this shortly.\n\nListing 4-14 shows a modified version\
    \ of `captchaAction()`, which now checks for an existing phrase, and then writes\
    \ the phrase that was used in the image back to the session.\n\n**Listing 4-14.**\
    \ *Storing CAPTCHA Phrases in the Session for Reuse (`UtilityController.php`)*\n\
    \n```php\n<?php\n\nclass UtilityController extends CustomControllerAction\n\n\
    {\n\n    public function captchaAction()\n\n    {\n\n        **$session = new\
    \ Zend_Session_Namespace('captcha');**\n\n        **// check for existing phrase\
    \ in session**\n\n        **$phrase = null;**\n\n        **if (isset($session->phrase)\
    \ && strlen($session->phrase) > 0)** \n\n            **$phrase = $session->phrase;**\n\
    \n        // generate CAPTCHA\n\n        $captcha = Text_CAPTCHA::factory('Image');\n\
    \n        $opts = array('font_size' => 20,\n\n            'font_path' => Zend_Registry::get('config')->paths->data,\n\
    \n            'font_file' => 'VeraBd.ttf');\n\n        **$captcha->init(120, 60,\
    \ $phrase, $opts);**\n\n        **// write the phrase to session**\n\n       \
    \ **$session->phrase = $captcha->getPhrase();**\n\n        // disable auto-rendering\
    \ since we're outputting an image\n\n        $this->_helper->viewRenderer->setNoRender();\n\
    \n        header('Content-type: image/png');\n\n        echo $captcha->getCAPTCHAAsPng();\n\
    \n    }\n\n}\n\n?>\n```\n\nYou can now view the generated CAPTCHA image directly\
    \ in your browser by visiting `http://phpweb20/utility/captcha` (This is how I\
    \ generated Figure 4-2). Unlike all of the previous controller actions we have\
    \ implemented so far, which returned HTML code, this action returns image data\
    \ (along with the corresponding headers so browsers knows how to display the data).\n\
    \n## Adding the CAPTCHA Image to the Registration Form\n\nThe next step in integrating\
    \ the CAPTCHA test is to display the image on the registration form. To do this,\
    \ we simply use an HTML `<img>` tag to show the image, and we add a text input\
    \ so the user can enter the phrase.\n\nListing 4-15 shows the relevant HTML code\
    \ we need to add to the `register.tpl` form created earlier in this chapter (located\
    \ in `./templates/account`). The convention with CAPTCHA images is to add them\
    \ at the end of the form, above the submit button.\n\n**Listing 4-15.** *Displaying\
    \ the CAPTCHA Image on the Registration Form (`register.tpl`)*\n\n```smarty\n\
    {include file='header.tpl'}\n\n<form method=\"post\" action=\"/account/register\"\
    >\n\n<fieldset>\n\n<legend>Create an Account</legend>\n\n<!--\n\n// other form\
    \ fields\n\n-->\n\n**<div class=\"captcha\">**\n\n**<img src=\"/utility/captcha\"\
    \ alt=\"CAPTCHA image\" />**\n\n**</div>**\n\n**<div class=\"row\" id=\"form_captcha_container\"\
    >**\n\n**<label for=\"form_captcha\">Enter Above Phrase:</label>**\n\n**<input\
    \ type=\"text\" id=\"form_captcha\"**\n\n**name=\"captcha\" value=\"{$fp->captcha|escape}\"\
    \ />**\n\n**{include file='lib/error.tpl' error=$fp->getError('captcha')}**\n\n\
    **</div>**\n\n<div class=\"submit\">\n\n<input type=\"submit\" value=\"Register\"\
    \ />\n\n</div>\n\n</fieldset>\n\n</form>\n\n{include file='footer.tpl'}\n```\n\
    \nOne thing to notice in this code is that we still prepopulate the `captcha`\
    \ field in this form. This is so the user only has to enter it successfully once.\
    \ For example, if they enter an invalid e-mail address but a valid CAPTCHA phrase,\
    \ they shouldn't have to enter the CAPTCHA phrase again after fixing their e-mail\
    \ address. Figure 4-3 shows the registration form with the CAPTCHA image and the\
    \ corresponding text input field.\n\n## Validating the CAPTCHA Phrase\n\nFinally,\
    \ we must check that the submitted CAPTCHA phrase matches the one stored in the\
    \ session data. To do this, we need to add a new check to the `process()` method\
    \ in `FormProcessor_UserRegistration`. We also need to clear the saved phrase\
    \ once the form is completed. This is so a new phrase is generated the next time\
    \ the user tries to do anything that requires CAPTCHA authentication.\n\nListing\
    \ 4-16 shows the additions to `FormProcessor_UserRegistration` that check for\
    \ a valid phrase and clear out the phrase upon completion.\n\n**Listing 4-16.**\
    \ *Validating the Submitted CAPTCHA Phrase (`UserRegistration.php`)*\n\n```php\n\
    <?php\n\nclass FormProcessor_UserRegistration extends FormProcessor\n\n{\n\n \
    \   // ... other code\n\n    public function process(Zend_Controller_Request_Abstract\
    \ $request)\n\n    {\n\n        **// validate CAPTCHA phrase**\n\n        **$session\
    \ = new Zend_Session_Namespace('captcha');**\n\n        **$this->captcha = $this->sanitize($request->getPost('captcha'));**\n\
    \n        **if ($this->captcha != $session->phrase)**\n\n            **$this->addError('captcha',\
    \ 'Please enter the correct phrase');**\n\n        // if no errors have occurred,\
    \ save the user\n\n        if (!$this->hasError()) {\n\n            $this->user->save();\n\
    \n            **unset($session->phrase);**\n\n        }\n\n        // return true\
    \ if no errors have occurred\n\n        return !$this->hasError();\n\n    }\n\n\
    }\n\n?>\n```\n\n# Adding E-mail Functionality\n\nThe final function we must add\
    \ to the user registration system is one that sends the newly registered user\
    \ a confirmation of their account, as well as their randomly generated password\
    \ so they can log in. Sending them their password by e-mail is an easy way to\
    \ validate their e-mail address.\n\nTo send e-mail from our application, we will\
    \ use the `Zend_Mail` component of the Zend Framework. We could instead use the\
    \ PHP `mail()` function, but by using a class such as this (or even PEAR's `Mail_Mime`),\
    \ we can do a whole lot more, such as attaching files (including images) and sending\
    \ HTML e-mail. We won't be doing either in this book, but if you ever wanted to\
    \ add such functionality, the key code would already be in place.\n\nListing 4-17\
    \ shows a basic example of using `Zend_Mail`. This script sends a single e-mail\
    \ to the address specified with the call to `addTo()`. You can use this script\
    \ to ensure that your e-mail server is correctly sending e-mail (remember to update\
    \ the recipient address to your own).\n\n**Listing 4-17.** *Example Usage of `Zend_Mail`\
    \ to Send an E-mail (`listing-4-17.php`)*\n\n```php\n<?php\n\nrequire_once('Zend/Loader.php');\n\
    \nZend_Loader::registerAutoload();\n\n$mail = new Zend_Mail();\n\n$mail->setBodyText('E-mail\
    \ body');\n\n[$mail->setFrom('from@example.com');](mailto:from@example.com)\n\n\
    [$mail->addTo('to@example.com');](mailto:to@example.com)\n\n$mail->setSubject('E-mail\
    \ Subject');\n\n$mail->send();\n\n?>\n```\n\nBefore we can make our user registration\
    \ system send out an e-mail, we must first add functionality to `DatabaseObject_User`\
    \ for sending e-mail to users—this will allow us to easily send other e-mail messages\
    \ to users as well (such as instructions for resetting a forgotten password).\n\
    \nWe will use Smarty for e-mail templates, just as we do for outputting the web\
    \ site HTML. Our e-mail templates will be structured so the first line of the\
    \ template is the e-mail subject, while the rest of the file constitutes the e-mail\
    \ body.\n\nListing 4-18 shows the `sendEmail()` function, which we will add to\
    \ the `DatabaseObject_User` class. It takes the filename of a template as the\
    \ argument, and feeds it through Smarty before using `Zend_Mail` to send the resulting\
    \ e-mail body to the user.\n\n**Listing 4-18.** *A Helper Function Used to Send\
    \ E-mail to Users (`User.php`)*\n\n```php\n<?php\n\nclass DatabaseObject_User\
    \ extends DatabaseObject\n\n{\n\n    // ... other code\n\n    **public function\
    \ sendEmail($tpl)**\n\n    **{**\n\n        **$templater = new Templater();**\n\
    \n        **$templater->user = $this;**\n\n        **// fetch the e-mail body**\n\
    \n        **$body = $templater->render('email/' . $tpl);**\n\n        **// extract\
    \ the subject from the first line**\n\n        **list($subject, $body) = preg_split('/\\\
    r|\\n/', $body, 2);**\n\n        **// now set up and send the e-mail**\n\n   \
    \     **$mail = new Zend_Mail();**\n\n        **// set the to address and the\
    \ user's full name in the 'to' line**\n\n        **$mail->addTo($this->profile->email,**\n\
    \n            **trim($this->profile->first_name . ' ' .**\n\n                **$this->profile->last_name));**\n\
    \n        **// get the admin 'from' details from the config**\n\n        **$mail->setFrom(Zend_Registry::get('config')->email->from->email,**\
    \ \n\n            **Zend_Registry::get('config')->email->from->name);**\n\n  \
    \      **// set the subject and body and send the mail**\n\n        **$mail->setSubject(trim($subject));**\n\
    \n        **$mail->setBodyText(trim($body));**\n\n        **$mail->send();**\n\
    \n    **}**\n\n    // ... other code\n\n}\n\n?>\n```\n\nIn this code, we first\
    \ instantiate the `Templater` class and assign to it `$this`, so we can access\
    \ all user details (including the profile) from within the e-mail template passed\
    \ in via the `$tpl` argument.\n\nNext, we use the `render()` method to retrieve\
    \ the template output. In this function, we want the string returned, so we can\
    \ extract the subject and then send it via e-mail. Additionally, this code forces\
    \ all e-mail templates to be within the `email` directory inside the template\
    \ directory (`./templates/email`).\n\nThe call to `preg_split()` is what we use\
    \ to extract the subject. The regular expression used simply finds a newline (`\\\
    n`) or a carriage return (`\\r`) to split on. The third argument (the number `2`)\
    \ splits the string into a maximum of two items.\n\nThe other important thing\
    \ to notice in this code is how we set the from e-mail address and name: we add\
    \ two new values in the application settings file (`settings.ini`). Listing 4-19\
    \ shows the updated version of `settings.ini`. The values here are somewhat generic;\
    \ you can set them to reflect your own needs.\n\n**Listing 4-19.** *The Updated\
    \ Application Settings with System Administrator Contact Details (`settings.ini`)*\n\
    \n```ini\n[development]\n\ndatabase.type = pdo_mysql\n\ndatabase.hostname = localhost\n\
    \ndatabase.username = phpweb20\n\ndatabase.password = myPassword\n\ndatabase.database\
    \ = phpweb20\n\npaths.base = /var/www/phpweb20\n\npaths.data = /var/www/phpweb20/data\n\
    \npaths.templates = /var/www/phpweb20/templates\n\nlogging.file = /var/www/phpweb20/data/logs/debug.log\n\
    \n**email.from.name = \"System Administrator\"**\n\n**email.from.email = \"noreply@localhost\"\
    **\n```\n\nNow we can update the `postInsert()` method in `DatabaseObject_User`\
    \ to send the user a welcome e-mail. As you may recall from Chapter 3, this callback\
    \ method is executed after a new record has successfully been inserted into the\
    \ database using `DatabaseObject`'s `save()` method.\n\nListing 4-20 shows the\
    \ updated version of `postInsert()`, which will send an e-mail using `user-register.tpl`\
    \ once the user's profile has been saved.\n\n**Listing 4-20.** *Adding an Automated\
    \ Call to `sendEmail()` when a New User is Added (`User.php`)*\n\n```php\n<?php\n\
    \nclass DatabaseObject_User extends DatabaseObject\n\n{\n\n    // ... other code\n\
    \n    protected function postInsert()\n\n    {\n\n        $this->profile->setUserId($this->getId());\n\
    \n        $this->profile->save(false);\n\n        **$this->sendEmail('user-register.tpl');**\n\
    \n        return true;\n\n    }\n\n    // ... other code\n\n}\n\n?>\n```\n\nAll\
    \ that remains now is to create the e-mail template and make the new password\
    \ available from within that template. When we initially created `DatabaseObject_User`,\
    \ we used the `uniqid()` function generate a random password. We will now update\
    \ this to use the PEAR `Text_Password` class we installed for our CAPTCHA implementation\
    \ to generate a better password. Additionally, since passwords are stored in the\
    \ database using MD5, we must record the password before it is encrypted so we\
    \ can include it in the e-mail template.\n\nWe will do this by storing the generated\
    \ password as a property in the current `DatabaseObject_User` object so it is\
    \ available from the template. We will also need to initialize this property at\
    \ the top of the class. Listing 4-21 shows the changes to the `preInsert()` callback\
    \ of `DatabaseObject_User`, and the new initialization of the `$_newPassword`\
    \ property. This property must be public so the template can access its value.\n\
    \n**Listing 4-21.** *Creating a Pronounceable Password with `Text_Password` (`User.php`)*\n\
    \n```php\n<?php\n\nclass DatabaseObject_User extends DatabaseObject\n\n{\n\n \
    \   // ... other code\n\n    **public $_newPassword = null;**\n\n    // ... other\
    \ code\n\n    protected function preInsert()\n\n    {\n\n        **$this->_newPassword\
    \ = Text_Password::create(8);**\n\n        **$this->password = $this->_newPassword;**\n\
    \n        return true;\n\n    }\n\n    // ... other code\n\n}\n\n?>\n```\n\nFinally,\
    \ we can create the `user-register.tpl` template. As mentioned previously, the\
    \ first line of this file will be used as the e-mail subject. This is useful,\
    \ as it allows us to include template logic in the e-mail subject as well as in\
    \ the body. We will include the user's first name in the e-mail subject.\n\nListing\
    \ 4-22 shows the contents of `user-register.tpl`, which is stored in `./templates/email`.\
    \ You may want to customize this template to suit your own requirements.\n\n**Listing\
    \ 4-22.** *The E-mail Template Used when New Users Register (`user-register.tpl`)*\n\
    \n```smarty\n{$user->profile->first_name}, Thank You For Your Registration\n\n\
    Dear {$user->profile->first_name},\n\nThank you for your registration. Your login\
    \ details are as follows:\n\n[Login URL: http://phpweb20/account/login](http://phpweb20/account/login)\n\
    \nUsername: {$user->username}\n\nPassword: {$user->_newPassword}\n\nSincerely,\n\
    \nWeb Site Administrator\n```\n\nFigure 4-4 shows how the e-mail will look when\
    \ received by the user. Hopefully the user's e-mail client will make the login\
    \ URL clickable. You could choose to use an HTML e-mail instead, but if the e-mail\
    \ client can't automatically highlight links in a text e-mail, it probably can't\
    \ render HTML e-mails either.\n\n# Implementing Account Login and Logout\n\nNow\
    \ that users have a way of registering on the system, we must allow them to log\
    \ in to their account. We do that by adding a new action to the account controller,\
    \ which we will call `login`.\n\nIn Chapter 3 we looked at how to authenticate\
    \ using `Zend_Auth` (see Listing 3-5). We will now implement this functionality.\n\
    \nThe basic algorithm for the login action is as follows:\n\n**1.** Display the\
    \ login form.\n**2.** If the user submits the form, try to authenticate them with\
    \ `Zend_Auth`.\n**3.** If they successfully authenticate, write their identity\
    \ to the session and redirect them to their account home page (or to the protected\
    \ page they originally requested).\n**4.** If their authentication attempt was\
    \ unsuccessful, display the login form again, indicating that an error occurred.\n\
    \nIn addition to this, we also want to make use of our logging capabilities. We\
    \ will make a log entry for both successful and unsuccessful login attempts.\n\
    \n## Creating the Login Template\n\nBefore we implement the login action in our\
    \ account controller, we'll quickly take a look at the login form. Listing 4-23\
    \ shows the `login.tpl` template, which we will store in `./templates/account`.\n\
    \n**Listing 4-23.** *The Account Login Form (`login.tpl`)*\n\n```smarty\n{include\
    \ file='header.tpl'}\n\n<form method=\"post\" action=\"/account/login\">\n\n<fieldset>\n\
    \n<input type=\"hidden\" name=\"redirect\" value=\"{$redirect|escape}\" />\n\n\
    <legend>Log In to Your Account</legend>\n\n<div class=\"row\" id=\"form_username_container\"\
    >\n\n<label for=\"form_username\">Username:</label>\n\n<input type=\"text\" id=\"\
    form_username\"\n\nname=\"username\" value=\"{$username|escape}\" />\n\n{include\
    \ file='lib/error.tpl' error=$errors.username}\n\n</div>\n\n<div class=\"row\"\
    \ id=\"form_password_container\">\n\n<label for=\"form_password\">Password:</label>\n\
    \n<input type=\"password\" id=\"form_password\"\n\nname=\"password\" value=\"\"\
    \ />\n\n{include file='lib/error.tpl' error=$errors.password}\n\n</div>\n\n<div\
    \ class=\"submit\">\n\n<input type=\"submit\" value=\"Login\" />\n\n</div>\n\n\
    </fieldset>\n\n</form>\n\n{include file='footer.tpl'}\n```\n\nThis form is very\
    \ similar in structure to the registration form, except it only contains input\
    \ fields for username and password. Additionally, we use the `password` type for\
    \ the password field, instead of the `text` type. This template also relies on\
    \ the presence of an array called `$errors`, which is generated by the login action.\n\
    \nThis form also includes a hidden form variable called `redirect`. The value\
    \ of this field indicates the relative page URL where the user will end up once\
    \ they successfully log in. This is necessary because sometimes a user will go\
    \ directly to a page that requires authentication, but they will not yet be authenticated.\
    \ If users were automatically redirected to their account home, they would then\
    \ have to navigate back to the page they originally wanted, which they would find\
    \ annoying. We will set the value for `$redirect` in the login action.\n\nFigure\
    \ 4-5 shows the login form. Again, it is bland, but we will improve on it in Chapter\
    \ 6.\n\n## Adding the Account Controller Login Action\n\nNow we need to add the\
    \ `loginAction()` method to the account controller. This is the most complex action\
    \ handler we've created so far, although all it does is perform the four points\
    \ listed at the start of the \"Implementing Account Login and Logout\" section.\n\
    \nListing 4-24 shows the code for `loginAction()`, which belongs in the `AccountController.php`\
    \ file.\n\n**Listing 4-24.** *Processing User Login Attempts (`AccountController.php`)*\n\
    \n```php\n<?php\n\nclass AccountController extends CustomControllerAction\n\n\
    {\n\n    // ... other code\n\n    **public function loginAction()**\n\n    **{**\n\
    \n        **// if a user's already logged in, send them to their account home\
    \ page**\n\n        **$auth = Zend_Auth::getInstance();**\n\n        **if ($auth->hasIdentity())**\n\
    \n            **$this->_redirect('/account');**\n\n        **$request = $this->getRequest();**\n\
    \n        **// determine the page the user was originally trying to request**\n\
    \n        **$redirect = $request->getPost('redirect');**\n\n        **if (strlen($redirect)\
    \ == 0)**\n\n            **$redirect = $request->getServer('REQUEST_URI');**\n\
    \n        **if (strlen($redirect) == 0)**\n\n            **$redirect = '/account';**\n\
    \n        **// initialize errors**\n\n        **$errors = array();**\n\n     \
    \   **// process login if request method is post**\n\n        **if ($request->isPost())\
    \ {**\n\n            **// fetch login details from form and validate them**\n\n\
    \            **$username = $request->getPost('username');**\n\n            **$password\
    \ = $request->getPost('password');**\n\n            **if (strlen($username) ==\
    \ 0)**\n\n                **$errors['username'] = 'Required field must not be\
    \ blank';**\n\n            **if (strlen($password) == 0)**\n\n               \
    \ **$errors['password'] = 'Required field must not be blank';**\n\n          \
    \  **if (count($errors) == 0) {**\n\n                **// setup the authentication\
    \ adapter**\n\n                **$adapter = new Zend_Auth_Adapter_DbTable($this->db,**\n\
    \n                    **'users',**\n\n                    **'username',**\n\n\
    \                    **'password',**\n\n                    **'md5(?)');**\n\n\
    \                **$adapter->setIdentity($username);**\n\n                **$adapter->setCredential($password);**\n\
    \n                **// try and authenticate the user**\n\n                **$result\
    \ = $auth->authenticate($adapter);**\n\n                **if ($result->isValid())\
    \ {**\n\n                    **$user = new DatabaseObject_User($this->db);**\n\
    \n                    **$user->load($adapter->getResultRowObject()->user_id);**\n\
    \n                    **// record login attempt**\n\n                    **$user->loginSuccess();**\n\
    \n                    **// create identity data and write it to session**\n\n\
    \                    **$identity = $user->createAuthIdentity();**\n\n        \
    \            **$auth->getStorage()->write($identity);**\n\n                  \
    \  **// send user to page they originally request**\n\n                    **$this->_redirect($redirect);**\n\
    \n                **}**\n\n                **// record failed login attempt**\n\
    \n                **DatabaseObject_User::LoginFailure($username,**\n\n       \
    \             **$result->getCode());**\n\n                **$errors['username']\
    \ = 'Your login details were invalid';**\n\n            **}**\n\n        **}**\n\
    \n        **$this->view->errors = $errors;**\n\n        **$this->view->redirect\
    \ = $redirect;**\n\n    **}**\n\n}\n\n?>\n```\n\nThe first thing this function\
    \ does is check whether or not the user has already been authenticated. If they\
    \ have, they are redirected back to their account home page.\n\nNext we try to\
    \ determine the page they were originally trying to access. If they have submitted\
    \ the login form, this value will be in the `redirect` form value. If not, we\
    \ simply use the `$_SERVER['REQUEST_URI']` value to determine where they came\
    \ from. If we still can't determine where they came from, we just use their account\
    \ home page as the default destination. We haven't yet created the action to display\
    \ their account home page; we will do that in the \"Implementing Account Management\"\
    \ section later in this chapter.\n\n> **Note** Because the ACL manager forwarded\
    \ the request to the login handler (as opposed to using an HTTP redirect), the\
    \ server variable `REQUEST_URI` will contain the location originally requested.\
    \ If a redirect was used to display the login form, you could use the `HTTP_REFERER`\
    \ value instead.\n\nWe then define an empty array to hold error messages. This\
    \ is done here so it can be assigned to the template whether a login attempt has\
    \ occurred or not.\n\nNext we check whether or not the login form has been submitted\
    \ by checking the `$request` object's `isPost()` method (we also did this earlier\
    \ when processing user registrations). If it has been submitted, we retrieve the\
    \ submitted username and password values from the request data. If either of these\
    \ is empty, we set corresponding error messages and proceed to display the login\
    \ template again.\n\nOnce we have determined that both a username and password\
    \ have been submitted, we try to authenticate the user. This code is very similar\
    \ to that of Listing 3-4.\n\nIf we determine that the login attempt was successful,\
    \ we perform three actions:\n\n**1. Record the successful login attempt.** When\
    \ a user successfully logs in, we want to make a note of this in the application\
    \ log file. To do so, we will add a utility function to `DatabaseObject_User`\
    \ called `loginSuccess()`. This function will also update the `ts_last_login`\
    \ field in the user table to record the timestamp of the user's most recent login.\
    \ We will look at the `loginSuccess()` function shortly. This function must be\
    \ called after a user record has been loaded in `DatabaseObject_User`.\n\n**2.\
    \ Update the identity data stored in session to include all of the values in the\
    \ corresponding database row for this user.** By default, only the supplied username\
    \ will be stored as the identity; however, since we want to display other user\
    \ details (such as their name or e-mail address) we need to update the stored\
    \ identity to include those other details:\n    * We can retrieve the data we\
    \ want to save as the identity by using the `createAuthIdentity()` method in `DatabaseObject_User`.\
    \ This function returns a generic PHP object holding the user's details.\n   \
    \ * The storage object returned from `Zend_Auth`'s `getStorage()` method has a\
    \ method called `write()`, which we can use to overwrite the existing identity\
    \ with the data returned from `createAuthIdentity()`.\n\n**3. Redirect the user\
    \ to their previously requested page.** This is achieved simply by calling the\
    \ `_redirect()` method with the `$redirect` variable as its only argument.\n\n\
    Alternatively, if the login attempt failed, the code will continue on. At this\
    \ point, we call the `LoginFailure()` method from the `DatabaseObject_User` class\
    \ to write this failed attempt to the log file. We will look at this method shortly.\n\
    \nWe then write a message to the `$errors` array and continue on to display the\
    \ template. As mentioned in Chapter 3, we can determine the exact reason why the\
    \ login attempt failed, and we will record this reason in the log file. However,\
    \ this isn't information that should be provided to the user.\n\n> **Note** Until\
    \ you add the functions in the next section, a PHP error will occur if you try\
    \ to log in.\n\n## Logging Successful and Failed Login Attempts\n\nTo log both\
    \ successful and unsuccessful login attempts, we will implement two utility functions\
    \ in `DatabaseObject_User`: `loginSuccess()` and `LoginFailure()`.\n\nListing\
    \ 4-25 shows these functions as they appear within the `DatabaseObject_User` class\
    \ (`User.php`). Note that `LoginFailure()` is a static method, while `loginSuccess()`\
    \ must be called after a user record has been loaded. I've also included the `createAuthIdentity()`\
    \ method as described in the previous section.\n\n**Listing 4-25.** *Auditing\
    \ Login Attempts by Writing Them to the Application Log (`User.php`)*\n\n```php\n\
    <?php\n\nclass DatabaseObject_User extends DatabaseObject\n\n{\n\n    // ... other\
    \ code\n\n    public function createAuthIdentity()\n\n    {\n\n        $identity\
    \ = new stdClass;\n\n        $identity->user_id = $this->getId();\n\n        $identity->username\
    \ = $this->username;\n\n        $identity->user_type = $this->user_type;\n\n \
    \       $identity->first_name = $this->profile->first_name;\n\n        $identity->last_name\
    \ = $this->profile->last_name;\n\n        $identity->email = $this->profile->email;\n\
    \n        return $identity;\n\n    }\n\n    public function loginSuccess()\n\n\
    \    {\n\n        $this->ts_last_login = time();\n\n        $this->save();\n\n\
    \        $message = sprintf('Successful login attempt from %s user %s',\n\n  \
    \          $_SERVER['REMOTE_ADDR'],\n\n            $this->username);\n\n     \
    \   $logger = Zend_Registry::get('logger');\n\n        $logger->notice($message);\n\
    \n    }\n\n    static public function LoginFailure($username, $code = '')\n\n\
    \    {\n\n        switch ($code) {\n\n            case Zend_Auth_Result::FAILURE_IDENTITY_NOT_FOUND:\n\
    \n                $reason = 'Unknown username';\n\n                break;\n\n\
    \            case Zend_Auth_Result::FAILURE_IDENTITY_AMBIGUOUS:\n\n          \
    \      $reason = 'Multiple users found with this username';\n\n              \
    \  break;\n\n            case Zend_Auth_Result::FAILURE_CREDENTIAL_INVALID:\n\n\
    \                $reason = 'Invalid password';\n\n                break;\n\n \
    \           default:\n\n                $reason = '';\n\n        }\n\n       \
    \ $message = sprintf('Failed login attempt from %s user %s',\n\n            $_SERVER['REMOTE_ADDR'],\n\
    \n            $username);\n\n        if (strlen($reason) > 0)\n\n            $message\
    \ .= sprintf(' (%s)', $reason);\n\n        $logger = Zend_Registry::get('logger');\n\
    \n        $logger->warn($message);\n\n    }\n\n    // ... other code\n\n}\n\n\
    ?>\n```\n\nThe first thing we do in `LoginSuccess()` is update the `users` table\
    \ to set the `ts_last_login` field to the current date and time for the user that\
    \ has just logged in. It is for this reason (updating the database) that we pass\
    \ in the database connection as the first argument.\n\nWe then fetch the `$logger`\
    \ object from the application registry so we can write a message indicating that\
    \ the given user just logged in. We also include the IP address of the user.\n\
    \n`LoginFailure()` is essentially the same as `loginSuccess()`, except we do not\
    \ make any database updates. Also, the function accepts the error code generated\
    \ during the login attempt (retrieved with the `getCode()` method on the authentication\
    \ result object in Listing 4-24), which we use to generate extra information to\
    \ write to the log. We log this message as a warning, since it's of greater importance\
    \ than a successful login.\n\nPlease be aware that if you try to log in now you\
    \ will be redirected to the account home page (`http://phpweb20/account`) which\
    \ we will be creating shortly.\n\n> **Tip** The reason you want to track failed\
    \ logins separately from successful logins (using different priority levels) is\
    \ that a successful login typically indicates \"normal operation,\" while a failed\
    \ login may indicate that somebody is trying to gain unauthorized access to an\
    \ account. Being able to filter the log easily by the message type helps you easily\
    \ identify potential problems that have occurred or are occurring. In Chapter\
    \ 14 we will look at how to make use of this log file.\n\n## Logging Users Out\
    \ of Their Accounts\n\nIt is important to give users the option of logging out\
    \ of their accounts, as they may want to ensure that nobody can use their account\
    \ (maliciously or otherwise) after they are finished with their session.\n\nIt\
    \ is very straightforward to log a user out when using `Zend_Auth`. Because the\
    \ presence of an identity in the session is what determines whether or not a user\
    \ is logged in, all we need to do is clear that identity to log them out.\n\n\
    To do this, we simply use the `clearIdentity()` method of the instance of `Zend_Auth`.\
    \ We can then redirect the user somewhere else, so they can continue to use the\
    \ site if they please. I simply chose to redirect them back to the login page.\n\
    \nListing 4-26 shows the `logoutAction()` method which is used to clear user identity\
    \ data. Users can log out by visiting `http://phpweb20/account/logout`.\n\n**Listing\
    \ 4-26.** *Logging Out a User and Redirecting Them Back to the Login Page (`AccountController.php`)*\n\
    \n```php\n<?php\n\nclass AccountController extends CustomControllerAction\n\n\
    {\n\n    // ... other code\n\n    **public function logoutAction()**\n\n    **{**\n\
    \n        **Zend_Auth::getInstance()->clearIdentity();**\n\n        **$this->_redirect('/account/login');**\n\
    \n    **}**\n\n}\n\n?>\n```\n\n> **Note** You could use `_forward('login')` in\
    \ Listing 4-26 instead of `_redirect('/account/login')` if you wanted to. However,\
    \ if you forwarded the request to the login page, the `$redirect` variable in\
    \ `loginAction()` would be set to load the logout page (`/account/logout`) as\
    \ soon as a user logged in—they would never be able to log in to their account\
    \ unless they manually typed in a different URL first!\n\n## Dealing with Forgotten\
    \ Passwords\n\nNow that we have added login functionality, we must also allow\
    \ users who have forgotten their passwords to access their accounts. Because we\
    \ store the user password as an MD5 hash of the actual password, we cannot send\
    \ them the old password. Instead, when they complete the fetch-password form,\
    \ we will generate a new password and send that to them.\n\nWe can't automatically\
    \ assume that the person who filled out the fetch-password form is the account\
    \ holder, so we won't update the actual account password until their identity\
    \ has been verified. We do this by providing a link in the sent e-mail that will\
    \ confirm the password change. This has the added advantage of allowing them to\
    \ remember their old password after filling out the form and before clicking the\
    \ confirmation link.\n\nThe basic algorithm for implementing fetch-password functionality\
    \ is as follows:\n\n**1.** Display a form to the user asking for their username.\n\
    **2.** If the supplied username is found, generate a new password and write it\
    \ to their profile, and then send an e-mail to the address associated with the\
    \ account informing them of their new password.\n**3.** If the supplied username\
    \ is not found, display an error message to the user.\n\nSo that we don't have\
    \ to mess around with application permissions, we will handle three different\
    \ actions in the new fetch-password controller action:\n\n**1.** Display and process\
    \ the user form.\n**2.** Display the confirmation message.\n**3.** Update the\
    \ user account when the password-update confirmation link is clicked and indicate\
    \ to the user that this has occurred.\n\n### Resetting a User's Password\n\nBefore\
    \ we implement the required application logic for fetch password, let's create\
    \ the web page template we will use. Listing 4-27 shows the contents of `fetchpassword.tpl`,\
    \ which we will store in the account template directory. This template handles\
    \ each of the three cases outlined previously.\n\n**Listing 4-27"
