- fmt: '# Breaking Down Information into Small Chunks


    You may have noticed that the table on the right in Figure [12-3](#332054_4_En_12_Chapter.xhtml#Fig3)
    has separate columns for each author’s first name and family name. This is an
    important principle of a relational database: *break down complex information
    into its component parts, and store each part separately.*


    It’s not always easy to decide how far to go with this process. In addition to
    first and last names, you might want separate columns for titles (Mr., Mrs., Ms.,
    Dr., etc.) and for middle names or initials. Addresses are best broken down into
    street, town, county, state, zip code, and so on. Although it may be a nuisance
    to break down information into small chunks, you can always use SQL and/or PHP
    to join them together again. However, once you have more than a handful of records,
    it’s a major undertaking to try to separate complex information that is stored
    in a single field.


    # Checkpoints for Good Database Design


    There is no *right* way to design a database—each one is different. However, the
    following guidelines should point you in the right direction:


    - Give each record in a table a unique identifier (primary key).

    - Put each group of associated data in a table of its own.

    - Cross-reference related information by using the primary key from one table
    as the foreign key in other tables.

    - Store only one item of information in each field.

    - Stay DRY (don’t repeat yourself).


    In the early stages you are likely to make design mistakes that you later come
    to regret. Try to anticipate future needs, and make your table structure flexible.
    You can add new tables at any time to respond to new requirements.


    That’s enough theory for the moment. Let’s move on to something more practical
    by building a database for the Japan Journey web site from Chapters [5](#332054_4_En_5_Chapter.xhtml)
    and [6](#332054_4_En_6_Chapter.xhtml).


    # Using a Graphical Interface


    The traditional way to interact with MySQL databases is through a Command Prompt
    window or Terminal. But it’s a lot easier to use a third-party graphic interface,
    such as phpMyAdmin, a browser-based front end to MySQL (see Figure [12-4](#332054_4_En_12_Chapter.xhtml#Fig4)).


    ![../images/332054_4_En_12_Chapter/332054_4_En_12_Fig4_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Fig4_HTML.jpg)


    *Figure 12-4. phpMyAdmin is a free graphical interface to MySQL that runs in your
    browser*


    Because phpMyAdmin (<http://www.phpmyadmin.net>) is installed automatically with
    XAMPP, MAMP, and most other free all-in-one packages, it’s the UI chosen for this
    book. It’s easy to use and has all the basic functionality required for setting
    up and administering MySQL databases. It works on Windows, Mac OS X, and Linux.
    Many hosting companies provide it as the standard interface to MySQL.


    If you work with databases on a regular basis, you may want to eventually explore
    the other graphical interfaces. One that’s worthy of note is Navicat (<http://www.navicat.com/en/>),
    a paid-for product available for Windows, macOS, and Linux. The Navicat Cloud
    service also lets you administer databases from an iPhone or iPad. Navicat is
    particularly popular among web developers because it’s capable of performing scheduled
    backups of databases from a remote server to your local computer. Navicat for
    MySQL supports both MySQL and MariaDB.


    ## Launching phpMyAdmin


    If you’re running XAMPP on Windows, there are three ways to launch phpMyAdmin:


    - Enter `http://localhost/phpMyAdmin/` in the browser address bar.

    - Click the MySQL `Admin` button in the XAMPP Control Panel.

    - Click the `phpMyAdmin` link under `Tools` in the XAMPP administration page (`http://localhost/xampp/`).


    If you installed MAMP on macOS, click `Tools` ➤ `phpMyAdmin` in the menu at the
    top of the MAMP start page (click `Open start page` in the MAMP control widget).


    If you installed phpMyAdmin manually or are using a different all-in-one package,
    follow the package’s instructions or enter the appropriate address in your browser
    address bar (normally `http://localhost/phpmyadmin/`).


    ### Tip

    If you get a message saying that the server is not responding or that the socket
    is not correctly configured, make sure that the MySQL server is running.


    If you installed XAMPP, you might be presented with a screen asking for a username
    and password. If so, log in to phpMyAdmin as the root superuser. Enter `root`
    as the username and use the password you created for root when setting up XAMPP.


    ### Caution

    When accessing phpMyAdmin on a remote server, always use a secure connection (https).
    Anyone eavesdropping on an unsecure connection would be able to gain control over
    your precious data, stealing it, corrupting it, or even deleting it completely.


    # Setting Up the phpsols Database


    In a local testing environment, there’s no limit to the number of databases that
    you can create in MySQL, and you can call them whatever you like. I am going to
    assume that you are working in a local testing environment and so will show you
    how to set up a database called `phpsols`, together with two user accounts called
    `psread` and `pswrite`.


    ### Note

    On shared hosting, you may be limited to just one database set up by the hosting
    company. If you’re testing on a remote server and don’t have the freedom to set
    up a new database and user accounts, substitute the name and username allocated
    by your hosting company for `phpsols` and `pswrite`, respectively.


    ## MySQL Naming Rules


    The basic MySQL naming rules for databases, tables, and columns are as follows:


    - Names can be up to 64 characters long.

    - Legal characters are numbers, letters, the underscore, and `$`.

    - Names can begin with a number but cannot consist exclusively of numbers.


    Some hosting companies seem blissfully ignorant of these rules and assign clients
    databases that contain one or more hyphens (an illegal character) in their name.
    If a database, table, or column name contains spaces or illegal characters, you
    must always surround it by backticks (`` ` ``) in SQL queries. Note that this
    is not a single quote (`''`), but rather is a separate character. On my Windows
    keyboard, it’s directly above the Tab key. On my Mac keyboard, it’s next to the
    left Shift key on the same key as the tilde (`~`).


    When choosing names, you might accidentally choose one of MySQL’s many reserved
    words (<https://dev.mysql.com/doc/refman/8.0/en/keywords.html>), such as `date`
    or `time`. One technique to avoid this is to use compound words, such as `arrival_date`,
    `arrival_time`, and so on. Alternatively, surround all names with backticks. phpMyAdmin
    does this automatically, but you need to do this manually when writing your own
    SQL in a PHP script.


    ### Note

    Because so many people have used `date`, `text`, `time`, and `timestamp` as column
    names, MySQL permits their use without backticks. However, you should avoid using
    them. It’s bad practice and is unlikely to work if you migrate your data to a
    different database system.


    ### Case sensitivity of names

    Windows and macOS treat MySQL names as case-insensitive. However, Linux and Unix
    servers respect case sensitivity. To avoid problems when transferring databases
    and PHP code from your local computer to a remote server, I strongly recommend
    that you use lowercase exclusively in database, table, and column names. When
    building names from more than one word, join them with an underscore.


    # Using phpMyAdmin to Create a New Database


    Creating a new database in phpMyAdmin is easy.'
