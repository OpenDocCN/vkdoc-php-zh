    \n```\nif(true)\n{\n  $x = 10; // 全局 $x\n}\n\necho $x;   // \"10\"\n```\n\n除了全局变量和局部变量之外，PHP\
    \ 还有属性变量，这将在下一章中介绍。\n\n## 匿名函数\n\nPHP 5.3 引入了匿名函数，允许将函数作为参数传递并赋值给变量。匿名函数的定义方式与常规函数类似，只是没有指定名称。该函数可以使用普通的赋值语法（包括分号）赋值给变量。\n\
    \n```\n$say = function($name)\n{\n  echo \"Hello \" . $name;\n};\n\n$say(\"World\"\
