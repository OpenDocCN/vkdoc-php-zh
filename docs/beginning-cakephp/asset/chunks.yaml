    **155**


    Table 9-3 lists the options available to use with the type parameter. When these
    options alias another Form helper function, the same options for that function
    can be used in the options array in the $form->input() function and will produce
    the same effect.


    **Table 9-3.** *Options Available for Use in the* type *Parameter in the* options
    *Array* **Option**


    **Description**


    checkbox


    Alias for the $form->checkbox() function


    date


    Renders select menus ordered as month, day, and year


    datetime


    Alias for the $form->dateTime() function


    file


    Alias for the $form->file() function


    hidden


    Alias for the $form->hidden() function


    password


    Alias for the $form->password() function


    radio


    Alias for the $form->radio() function


    select


    Alias for the $form->select() function


    text


    Alias for the $form->text() function


    textarea


    Alias for the $form->textarea() function


