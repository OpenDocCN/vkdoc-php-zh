    \n# CHAPTER 15 ■ DATA EXCHANGE WITH JSON\n\nNote how the dollar signs in javascript\
    \ section are escaped. The dollar sign is used as a shorthand for the `jQuery()`\
    \ function as `$()` and also in some of the variable names, but as PHP performs\
    \ variable replacement in the `HEREDOC` block these will be replaced by empty\
    \ strings as these variables are not defined in the PHP scope.\n\nThe form has\
    \ input fields for the URL, the method, how the response should be displayed,\
    \ and a key/value for a single parameter. If more parameters are needed the user\
    \ can click the `Add Parameter` button and the form will be expanded.\n\nWhen\
    \ the form is submitted the PHP side will create a HTTP request based on the data\
    \ submitted and shows the response from the API call in the preformatted section\
    \ of the HTML document.\n\n## Recipe 15-6. API Authentication\n\n### Problem\n\
    \nWhat is the best way to authenticate a user of an API?\n\n### Solution\n\nFirst\
    \ of all you should never send user names and passwords in clear text when you\
    \ are calling an API, and you should never include any of the authentication parameters\
    \ as part of the URI as that gets logged by the server. These should always be\
    \ sent as headers or as part of the body.\n\nProviders of API’s will often issue\
    \ an app key or other id that’s unique for each user. This is typically some sort\
    \ of hash value that can’t be linked to a specific user account. Some sites also\
    \ provide a secret code that should be used when generating a hash of the request,\
    \ but the code should not be included with the request. The server will know the\
    \ secret and it can generate the hash on the server side and compare it to the\
    \ hash that was included with the request. If they match, the server can assume\
