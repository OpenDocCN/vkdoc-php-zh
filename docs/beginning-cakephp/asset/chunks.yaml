- fmt: '# Customizing Views


    For a simple page request, not much more is needed other than to display the contents
    of passed arrays. Form submission processes, however, will require more detail.
    As already mentioned, Cake has supplied helpers that help with this.


    ## Customizing an HTML Form


    Listing 6-4 describes a basic Cake form that uses the `Form` helper to render
    form elements.


    How you customize these features will require consistency and understanding of
    how the `Form` helper works.


    Open the `app/views/posts/add.ctp` file. Its contents should match the baked code
    in Listing 6-9.


    **Listing 6-9.** *The Baked Contents of the Posts Add View File*


    ```

    <div class="posts form">

    <?php echo $form->create(''Post'');?>

    <fieldset>

    <legend><?php __(''Add Post'');?></legend>

    <?php

    echo $form->input(''name'');

    echo $form->input(''date'');

    echo $form->input(''content'');

    echo $form->input(''user_id'');

    echo $form->input(''Tag'');

    ?>

    </fieldset>

    <?php echo $form->end(''Submit'');?>

    </div>

    <div class="actions">

    <ul>

    <li><?php echo $html->link(__(''List Posts'', true), array(''action''=>''index''));?></li>

    <li><?php echo $html->link(__(''List Users'', true), array(''controller''=> ''users'',
    ''action''=>''index'')); ?></li>

    <li><?php echo $html->link(__(''New User'', true), array(''controller''=> ''users'',
    ''action''=>''add'')); ?></li>

    <li><?php echo $html->link(__(''List Tags'', true), array(''controller''=> ''tags'',
    ''action''=>''index'')); ?></li>

    <li><?php echo $html->link(__(''New Tag'', true), array(''controller''=>''tags'',
    ''action''=>''add'')); ?></li>

    </ul>

    </div>

    ```


    Lines 15–23 contain links to various actions that all use the `HTML` helper''s
    `link()` function. Lines 2–13 contain the form and its fields that make the action
    possible. As the application talks back and forth between the view and the controller,
    the `Form` helper intercepts all the data being tossed around and analyzes each
    piece of data to determine how it ought to be displayed in the form. As long as
    `$this->data` remains consistent with Cake''s default construction, the `Form`
    helper will be able to keep up. Sometimes the application''s design will require
    some added settings to make the `Form` helper work properly, but for the most
    part, it works wonderfully with `$this->data` and saves you a lot of headaches.
    Say goodbye to that old PHP `$_POST` array!


    As done with the `View` view, let''s rebuild the `Add` view from scratch. Replace
    the contents of the `app/views/posts/add.ctp` file with Listing 6-10.


    **Listing 6-10.** *Some Minimal Code for the Add Action*


    ```

    <div class="posts form">

    <?=$form->create(''Post'');?>

    <fieldset>

    <legend>Add Post</legend>

    <?

    e($form->input(''name''));

    e($form->input(''date''));

    e($form->input(''content''));

    e($form->input(''User''));

    e($form->input(''Tag''));

    ?>

    </fieldset>

    <?=$form->end(''Submit'');?>

    </div>

    ```


    This code resembles what was already supplied by Bake but uses the `e()` convenience
    function (which is identical to `echo()`) and trims out the action links. Notice
    that the `input()` function is at work for each of the fields and the `Form` helper
    automatically recognizes what type of data will be contained in each field. For
    the associated models, the model''s name (for example, `User` and `Tag`) was provided,
    and the `Form` helper assumes that the field is an association and builds off
    the relationship. Automatically, you''re given a select menu for the user and
    a multiple-select for the tag.


    To customize the form elements, the available options in the `Form` helper functions
    must be used. An example is adding some parameters to the `input()` function.
    Currently the `Tag` input element is a multiple-select menu that contains a list
    of tags found in the `$this->data` array. Changing this to multiple check boxes
    would normally take several lines of HTML tags to render each individual check
    box. With the `Form` helper, you can customize the form to handle multiple check
    boxes with one string of code (see Listing 6-11).


    **Listing 6-11.** *The Form Helper''s `input()` Function Rendering Multiple Check
    Boxes Instead of a Multiple Select Menu*


    ```

    echo $form->input(''Tag'',array(''type''=>''select'',''multiple''=>''checkbox''));

    ```


    The first parameter for the `input()` function is the name of the model or current
    model''s field. The second parameter is an array containing several options as
    keys and their specific settings as values. Notice that you''ve told the `Form`
    helper to render an input element using the data housed in the `Tag` key in the
    `$this->data` array and that this element must be a select type but use checkbox
    for the multiple options instead of the default. Refresh the `Add` action, and
    you should see the simplified form with the customized check boxes. Cake formats
    the data the same, regardless of the type of HTML elements, and since the controller
    is already set to save the data it receives from the view, the `Add` action continues
    to work properly.


    ## Using Other Helpers


    Cake comes preinstalled with several helpers:


    - Ajax

    - Cache

    - Form

    - HTML

    - JavaScript

    - Number

    - Paginator

    - RSS

    - Session

    - Text

    - Time

    - XML


    Each of these helpers contains several functions that simplify handling data and
    displaying content. Each helper will operate under the same basic syntax—an object
    available in the view as a variable plus its function with its parameters supplied
    in the parentheses. Third-party helpers are also available on the Internet, many
    of them through Cake''s official Bakery (http://bakery.cakephp.org). To make the
    helper available, besides the `HTML` and `Form` helpers, you must specify in the
    controller that the helper is being used. You do this by populating the helper
    settings array with the corresponding helper''s class name: `var $helpers = array(''Ajax'',''Session'',''Time'');`


    By placing this string up by where the `var $name` and `var $scaffold` attributes
    are called, Cake is able to begin a new instance of the helper class object and
    make it available in the view. Using more helpers adds to the customization possibilities
    in your arsenal. The more familiar you are with Cake''s helpers, the more options
    you will have when customizing your views.


    ## Readable Dates and Times


    Practice using helpers in your views by trying the `Time` helper. Remember to
    set the `$helpers` attribute in the controller to include the `Time` helper first.
    Then in the Posts `View` view, use the `nice()` function to make the `$post[''Post''][''date'']`
    value more readable. Hint: you''ll need to pass the variable to the function for
    it to work properly.


    ## Summary


    Users will most often interact with your Cake application in one of three ways:
    by making a simple page request, by submitting a form of some kind, or by sending
    page or form requests asynchronously (also described as Ajax processes). Controllers
    and views work together in Cake to handle these types of sequences. When customizing
    the view with which the user will interact, you will also work in the controller
    to provide the necessary logic to process the user''s requests. The controller
    will use functions such as `set()` and `render()` to call out the view and provide
    it with the necessary parameters and variables. Standardized arrays such as `$this->data`
    make handling user form data much easier as the controller parses data rendered
    in the view and runs it through the model. This chapter explained how `$this->data`
    is formatted by Cake as well as its interaction with the `Form` helper. Expanding
    the capabilities of controllers and models comes next—Chapter 7 will describe
    how to customize controllers and models to perform more complex operations.


