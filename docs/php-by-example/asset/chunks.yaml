    To do that, select the **PHP File** item in the **New** submenu of the context
    menu, as shown in Figure [1-8](#613529_1_En_1_Chapter.xhtml#Fig8).


    ![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig8_HTML.jpg)


