    6th Floor, New York, NY 10013。电话：1-800-SPRINGER，传真：(201) 348-4505，电子邮件：orders-ny@springer-sbm.com，或访问
    www.springer.com。Apress Media, LLC 是一家加利福尼亚有限责任公司，其唯一成员（所有者）是 Springer Science
    + Business Media Finance Inc (SSBM Finance Inc)。SSBM Finance Inc 是一家特拉华州公司。献给路易丝，她是我全部的意义。


    # 引言


    当我最初构思这本书时，PHP 中的面向对象设计还是一个深奥的话题。过去的这些年不仅见证了 PHP 作为面向对象语言的不可阻挡的崛起，也见证了框架的蓬勃发展。当然，框架非常有用。它们管理着众多（或许在当今，是大多数）Web
    应用程序的核心与粘合剂。更重要的是，它们通常恰好体现了本书所探讨的设计原则。


    然而，对于开发者而言，这里存在一个危险，就像所有有用的 API 一样。这种危险在于，人们可能发现自己被降级到用户层，不得不等待远方的专家凭个人喜好修复 bug
    或添加功能。从这个立场出发，很容易陷入一种流放状态：人们将框架的内部机制视为高级魔法，而将自己的工作视为不过是架设在强大而未知的底层基础设施之上的小小装饰。


    尽管我是一个积习难改的重复造轮子者，但我的论点主旨并非我们都应该抛弃框架，从头构建 MVC 应用程序（至少不总是如此）。相反，我认为作为开发者，我们应当理解框架所解决的问题，以及它们用来解决问题的策略。我们不仅应该从功能上评估框架，还应该从创建者所做的设计决策角度去评估，并判断其实现质量。当然，当条件合适时，我们也应该继续前进，构建我们自己精简而专注的应用程序，并随着时间的推移，编写我们自己的可重用代码库。


    我希望本书能在帮助 PHP 开发者将面向设计的见解应用到他们的平台和库方面起到一些作用，并为他们在需要独立前行时提供一些概念性工具。


    # 致谢


    一如既往，我在编写本版的过程中得到了许多人的支持。但同样一如既往地，我也必须回顾本书的起源。早在我们都惊叹于 PHP 5 的崭新可能性之时，我在布莱顿的一次演讲中尝试了本书的一些基本概念。感谢主持那次演讲的
    Andy Budd，也感谢充满活力的布莱顿开发者社区。还要感谢 Jessey White-Cinis，他当时也在那次会议上，并让我联系上了 Apress 的
    Martin Streicher。


    这一次，Apress 团队再次提供了巨大的支持、反馈和鼓励。我很幸运能受益于如此专业的团队。


    当我提出本版计划时，我轻率地承诺将更新所有代码以符合最新的风格指南。我非常幸运地邀请到我的朋友兼同事 Paul Tregoing 担任本版的技术审校。他不仅确保我履行了承诺，还深入代码本身，修正了许多许多标准违规之处，展现了超出职责范围的奉献精神！此外，本版还极大地受益于
    Paul 的知识、见解和对细节的关注——非常感谢 Paul，Paul！


    感谢并挚爱我的妻子 Louise，以及我们的孩子 Holly 和 Jake，感谢他们带来的许多宝贵分心时刻。感谢 Steven Metsker 的善意许可，让我在
    PHP 中重新实现他在其著作《*Building Parsers in Java*》（Addison-Wesley Professional, 2001）中提出的解析器
    API 的简化版本。


    我写作时习惯听着音乐。在本书之前的版本中，我怀念了伟大的 DJ John Peel，这位地下音乐和折衷主义的捍卫者。本版的配乐主要由 BBC 广播 3 台的当代音乐节目《*Late
    Junction*》循环播放提供。感谢他们让一切保持古怪。

