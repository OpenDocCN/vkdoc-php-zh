    added.


    To insert data into a table, there is the `INSERT INTO` SQL statement, followed
    by the table name and the fields to be filled, which is followed by the `VALUES`
    statement, and the values in the same order as the fields specified. If you would
    like to insert more than one line into the table, you only need to write `VALUES`
    once and separate the individual line values with the words:


    ```php

    $mysqli=new mysqli(''localhost'',''root'', '''',''test''); $result = $mysqli->query("INSERT
    INTO persons (firstname, lastname) VALUES


    (''Max'', ''Meier''),(''Maria'', ''Mauser'');");


    var_dump($result);


    ?>

    ```


    ## Retrieve data from the database


    After we have written some lines in the table, we would like to query them again
    in our script. This is done with the SQL statement, `SELECT`:


    ```php

    $mysqli=new mysqli(''localhost'',''root'', '''',''test''); $result = $mysqli->query("SELECT
    firstname, lastname FROM persons;"); while ($row = $result->fetch_array()) {


    echo $row["firstname"]. " " . $row["lastname"] . "<br />";


    }


    ?>

    ```


    The `SELECT` statement will still be your faithful companion when you write PHP
    / SQL scripts. A data query using `SELECT` is followed by the table columns; alternatively
    you could also write a `*`, if you want to query all table columns. This is followed
    by the `FROM` statement and the name of the table from which the data is to be
    queried.


    After we have submitted the query, we use the function, `$result->fetch_array()`
    to run the result until we can no longer get any more rows. From each line, we
    access the entries, first name, and last name.


    At this point, it is important to know how to access a particular entry in the
    table by optionally extending the `SELECT` statement with a condition clause,
    `WHERE`:


    ```php

    $mysqli=new mysqli(''localhost'',''root'', '''',''test''); $result = $mysqli->query(''SELECT
    firstname, lastname FROM persons WHERE


    firstname = "Hans";'');


    while ($row = $result->fetch_array()) {


    echo $row["firstname "]. " " . $row["lastname"]. "<br />";


    }


    ?>

    ```


    Now, we get only rows returned, where in the column, first name, the value is
    `Hans`.


    Likewise, we could now query a specific ID. With this knowledge, you already have
    the ability to permanently store data and process it with another PHP script in
    the future.


    There are hundreds of books to understand the many other SQL statements and how
    to create efficient databases or resource-conserving queries. This is very important
    especially for projects with hundreds of thousands of table rows and dozens of
    queries per minute. At the end of the book, you will find some good tips and links
    to free knowledge sources about SQL.


    ## Delete data from the database


    The deletion of data f a database is nearly the same SQL statement like the `SELECT`.
