    `onsubmit="return validate(this);"` 调用了 JavaScript 文件中的 `validate()` 函数，并将 `this`（即当前表单作为参数）传入，以便在
    `validate` 函数中验证其所有字段。此外，只有当 `validate` 函数返回 `true` 时，表单才会提交并跳转到 `addcustomer.php`
    脚本。如果该函数返回 `false`（即任何字段验证失败），则不会提交表单。相反，会显示错误信息，并提示用户修正该字段。


    `<span id="emailmsg"></span>` 定义了一个带有 ID 的位置，该 ID 为 `emailmsg`，当用户在邮箱地址框中输入错误的邮箱地址时，将使用此位置显示错误信息。类似地，后续的输入框也定义了带有
    ID 的位置：`passwdmsg`、`repasswdmsg` 和 `usrmsg`，以便在密码、确认密码和完整姓名字段验证失败时显示错误信息。


    JavaScript 文件 `checkform.js` 对注册表单 `validatesignup.php` 应用验证检查。该文件如清单 2-11 所示。


    ## 清单 2-11. JavaScript 文件 (checkform.js)


    ```

    function validate(userForm) {


    div=document.getElementById("emailmsg"); // #1


    div.style.color="red";                   // #2


    if(div.hasChildNodes())                  // #3


    {


    div.removeChild(div.firstChild);     // #4


    }


    regex=/(^\w+\@\w+\.\w+)/;                // #5


    match=regex.exec(userForm.emailaddress.value);


    if(!match)


    {


    div.appendChild(document.createTextNode("Invalid Email"));   // #6


    userForm.emailaddress.focus();       // #7


    return false;                        // #8


    }


    div=document.getElementById("passwdmsg");


    div.style.color="red";


    if(div.hasChildNodes())


    {


    div.removeChild(div.firstChild);


    }


    if(userForm.password.value.length <=5)  // #9


    {


    div.appendChild(document.createTextNode("The password should be of at least size
    6"));


    userForm.password.focus();


    return false;


    }


    div=document.getElementById("repasswdmsg");


    div.style.color="red";


    if(div.hasChildNodes())


    {


    div.removeChild(div.firstChild);


    }


    if(userForm.password.value != userForm.repassword.value) // #10


    {


    div.appendChild(document.createTextNode("The two passwords don’t match"));


    userForm.password.focus();


    return false;


    }


    var div=document.getElementById("usrmsg");


    div.style.color="red";


    if(div.hasChildNodes())


    {


    div.removeChild(div.firstChild);


    }


    if(userForm.complete_name.value.length ==0) // #11


    {


    div.appendChild(document.createTextNode("Name cannot be blank"));


    userForm.complete_name.focus();


    return false;


    }


    return true;


    }

    ```


    当点击“提交”按钮时，会调用 `validate()` 方法。该方法检查各个文本框中输入的数据是否正确。`document.getElementById()`
    方法用于在网页表单中查找具有指定 ID 的对象。表单中任何位置放置的给定 ID 的对象都会通过此方法被搜索到。语句 #1 在网页表单上搜索 ID 为 `emailmsg`
    的元素，并将其赋值给名为 `div` 的对象（名称可以是任意值）。语句 #2 将显示在 `emailmsg` ID 指定位置的内容设置为红色。


    语句 #3 中的 `hasChildNodes()` 方法检查 `emailmsg` ID 位置是否已显示了一条消息。如果已经显示了一条错误消息，则通过语句
    #4 中的 `removeChild()` 方法将其移除。语句 #5 中的正则表达式用于检查有效的邮箱地址。如果用户输入了无效的邮箱地址，语句 #6 会使用
    `appendChild()` 方法在 `emailmsg` ID 位置显示错误消息 `"Invalid Email"`，如图 2-6 所示。`appendChild()`
    方法用于将给定的节点附加到文档中。请记住，除非使用 `appendChild()` 方法将节点附加到文档中，否则节点永远不会在浏览器窗口中显示。子节点可以附加到任何元素上。


    ![A978-1-4842-1672-9_2_Fig6_HTML.jpg](img/A978-1-4842-1672-9_2_Fig6_HTML.jpg)


    **图 2-6.** 输入无效邮箱地址后出现无效邮箱错误信息


    因为输入了无效的邮箱地址，所以通过语句 #7 应用于邮箱地址框的 `focus()` 方法，将光标置于该框中，从而要求用户重新输入。语句 #8 返回 `false`，以便表单无法提交。只有当
    `validate()` 方法返回 `true` 时，表单才能成功提交，而这只有在所有必填字段的数据均正确输入后才有可能实现。


    语句 #9 确保输入的密码长度不小于 5。语句 #10 确保在“密码”和“确认密码”文本框中输入的密码完全相同。如果这两个密码不匹配，则会在 `repasswdmsg`
    ID 代表的位置显示 `"The two passwords don’t match"`（两次输入的密码不匹配）错误消息（参见图 2-7）。


    ![A978-1-4842-1672-9_2_Fig7_HTML.jpg](img/A978-1-4842-1672-9_2_Fig7_HTML.jpg)


    **图 2-7.** 如果两次输入的密码不匹配，则显示两次密码不匹配错误信息


    语句 #11 确保用户没有将完整姓名字段留空。如果有任何验证检查失败，`validate()` 方法会返回 `false`。如果所需的文本框成功通过各项验证检查，验证方法则返回
    `true`，从而表单被提交，输入的数据被传输到 `addcustomer.php` 脚本以保存到数据库表中。


    为了通过 PHP 将数据保存到 MySQL 服务器的数据库表中，你需要了解 PHP 和 MySQL 之间是如何建立连接的。你将在下一节学习如何实现。


    ## 连接 PHP 与 MySQL 的代码


    要连接到 MySQL 服务器，你需要使用有效的用户名和密码执行 `mysqli_connect()` 方法。建立连接的语法如下：


    ```

    $variable = mysqli_connect("localhost", $user, $password, $database) or die ("Error
    Message.");

    ```


    **注意：** PHP 和 MySQL 版本 5 的支持不再捆绑在标准 PHP 发行版中，因此你需要显式配置 PHP 以利用此扩展。


    在上述语法中，`localhost` 表示 MySQL 服务器安装在本地机器上，但如果你要连接到远程服务器，此字符串将被替换为服务器的 IP 地址或服务器名称。`$user`
    和 `$password` 包含管理员提供的有效用户 ID 和密码。变量 `$database` 代表你要连接并对其执行 SQL 语句以插入或获取所需信息的数据库。关键词
    `die` 用于在信息有误时打印错误消息。以下示例将 root 用户连接到 `shopping` 数据库：


    ```

    $connect = mysqli_connect("localhost", "root", "gold", "shopping") or die ("Please,
    check the server connection.");

    ```


    此语句如果执行成功，将返回一个代表与 MySQL 服务器和指定数据库连接的对象。

