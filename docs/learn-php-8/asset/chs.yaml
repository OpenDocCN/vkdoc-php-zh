  \ | |\n\n## 章节问题与项目\n\n### 选择题\n\n1.  身份验证具有以下哪项功能？\n    1.  为应用程序提供安全性\n    2.\
  \  验证用户 ID 和密码\n    3.  应使用加密密码\n    4.  以上所有选项\n\n2.  会话具有以下哪项功能？\n    1.  通过`session_create`方法创建\n\
  \    2.  允许在程序间共享信息\n    3.  不提供任何安全优势\n    4.  以上所有选项\n\n3.  注册页面具有以下哪项功能？\n  \
  \  1.  允许用户创建自己的用户 ID 和密码\n    2.  可用于收集用户信息\n    3.  应在存储密码前对其进行加密\n    4.  以上所有选项\n\
  \n4.  验证码具有以下哪项功能？\n    1.  使用`session_start`将程序附加到当前会话\n    2.  验证用户是否已登录\n   \
  \ 3.  必须仅附加到界面层的程序\n    4.  以上所有选项\n\n5.  以下哪项描述了 SQL 注入？\n    1.  使用 SQL 语句更新数据库的过程\n\
  \    2.  在 SQL 语句中插入变量以提高灵活性的过程\n    3.  导致数据损坏\n    4.  以上所有选项\n\n### 判断题\n\n1.\
  \  MD5 是最新且最安全的加密技术。\n\n2.  应使用`password_hash`来创建加密密码。\n\n3.  当用户输入正确用户 ID 和密码的尝试次数超过最大限制时，应通知用户。\n\
  \n4.  身份验证系统无需设置密码超时，也无需在密码过期时强制用户更改密码。\n\n5.  可以将`preg_replace`与加密密码结合使用，以确保 PHP\
  \ 不会将特殊字符解释为 PHP 命令。\n\n### 简答题/论述题\n\n1.  解释可用于降低密码嗅探程序发现正确用户 ID 和密码组合可能性的技术。\n\
  \n2.  解释会话的工作原理。包括解释会话如何通过用户 ID 和密码身份验证帮助保护应用程序安全。\n\n3.  什么是 SQL 注入？如何避免？\n\n4.\
  \  为什么密码需要加密？在互联网上探索并找出最新的加密版本。当前最新版本的 PHP 是否使用了最新版本的加密技术？\n\n### 项目\n\n1.  从第 6\
