    **S u m m a ry**


    In this chapter, you learned how to access Amazon E-Commerce Service using REST
    and SOAP. You will be able to use the same techniques when accessing any kind
    of external functionality exposed through these protocols.


    Congratulations, you have just finished your journey into learning about building
