    \ `.phtml` 扩展名。清单 2-12 展示了添加这些代码后 `index.php` 中控制器部分的样子。\n\n**清单 2-12.** *告知 Zend_Controller\
    \ 使用 Smarty 替代其默认视图渲染器（`index.php`）*\n\n```php\n<?php\n// ... 其他代码\n\n// 处理用户请求\n\
    $controller = Zend_Controller_Front::getInstance();\n$controller->setControllerDirectory($config->paths->base\
    \ . '/include/Controllers');\n\n// 设置视图渲染器\n$vr = new Zend_Controller_Action_Helper_ViewRenderer();\n\
    $vr->setView(new Templater());\n$vr->setViewSuffix('tpl');\nZend_Controller_Action_HelperBroker::addHelper($vr);\n\
    \n$controller->dispatch();\n?>\n```\n\n**注意：** 现在访问网站仍会显示“网站主页”消息。然而，将会出现一个 Smarty\
    \ 错误，因为我们尚未为索引控制器的索引动作创建相应的模板文件。\n\n现在，每当执行一个控制器动作时，`Zend_Controller` 将自动根据控制器和动作名称查找模板。让我们以索引控制器的索引动作为例，如清单\
    \ 2-13 所示。\n\n**清单 2-13.** *我们的新索引控制器，现在输出 `index.tpl` 文件（`IndexController.php`）*\n\
    \n```php\n<?php\n\nclass IndexController extends CustomControllerAction\n{\n \
    \   public function indexAction()\n    {\n    }\n}\n\n?>\n```\n\n当你在浏览器中打开 `http://phpweb20`\
    \ 时，清单 2-13 中的动作将被执行，我们刚创建的 `Templater` 类将自动渲染 `./templates/index/index.tpl` 中的模板。\n\
    \n然而，由于 `index.tpl` 模板尚不存在，我们现在必须创建它。同样，我们将简单地输出“网站主页”消息，但同时我们也会创建页头（`header.tpl`）和页脚（`footer.tpl`）模板，这些模板将被包含在所有网站模板中。这样我们就可以在一处修改网站，并使修改应用到网站的所有页面。\n\
    \n为了在 `index.tpl` 中包含 `header.tpl` 和 `footer.tpl` 模板，我们使用 Smarty 的 `{include}`\
    \ 标签。清单 2-14 显示了 `index.tpl` 的内容，该文件位于 `./templates/index/index.tpl`。\n\n**清单\
    \ 2-14.** *索引控制器索引动作的模板（`index.tpl`）*\n\n```smarty\n{include file='header.tpl'}\n\
    网站主页\n{include file='footer.tpl'}\n```\n\n如果你在不创建 `header.tpl` 和 `footer.tpl`\
    \ 文件的情况下尝试在浏览器中查看此页面，将会出现错误，所以现在让我们来创建这些模板。清单 2-15 显示了 `header.tpl` 的内容，而清单 2-16\
    \ 显示了 `footer.tpl`。这两个文件都存储在 `./templates` 目录中（不在子目录中，因为它们不属于特定的控制器）。\n\n**清单\
    \ 2-15.** *HTML 页头文件，指定文档类型为 XHTML 1.0 Strict（`header.tpl`）*\n\n```html\n<!DOCTYPE\
    \ html\nPUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\"\n\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
    >\n<html lang=\"en\" xml:lang=\"en\" xmlns=\"http://www.w3.org/1999/xhtml\">\n\
    <head>\n<title>标题</title>\n<meta http-equiv=\"Content-Type\" content=\"text/html;\
    \ charset=iso-8859-1\" />\n</head>\n<body>\n<div>\n```\n\n**清单 2-16.** *HTML 页脚文件，仅用于关闭页头中开启的标签（`footer.tpl`）*\n\
    \n```html\n</div>\n</body>\n</html>\n```\n\n如你所见，目前页头和页脚很简单。随着我们的进展，我们会进一步开发它们，例如添加样式表、JavaScript\
    \ 代码以及相关的页面标题。这里包含了 `Content-Type` 的 `<meta>` 标签，因为如果没有它（使用 `http://validator.w3.org`\
    \ 的 W3C 验证器）文档将无法正确验证。你可能需要根据你的区域设置指定一个与 `iso-8859-1` 不同的字符集。\n\n请注意，我指定了文档类型为\
    \ XHTML 1.0 Strict。本书中开发的所有 HTML 都将符合该标准。我们可以通过正确使用层叠样式表、包含 JavaScript 以及在 HTML\
    \ 中正确转义用户提交的数据（本章前面介绍的 Smarty 转义修饰符就是一个例子）来实现这一点。\n\n如果你现在在 Web 浏览器中加载 `http://phpweb20`\
    \ 地址，你将看到简单的“网站主页”消息。如果你查看此文档的源代码，你会看到该消息嵌套在 `header.tpl` 中的 `<div>` 开始标签和 `footer.tpl`\
    \ 中的 `</div>` 结束标签之间。请注意，之所以包含 `<div>`，是因为将文本直接放在 `<body>` 标签内是违反标准的。\n\n## 添加日志记录功能\n\
    \n本章我们要讨论的最后一件事是为我们的应用程序添加日志记录功能。为此，我们将使用 Zend Framework 的 `Zend_Log` 组件，我们将在应用程序的多个地方使用它。例如，每次会员区发生登录失败时，我们都会在日志中记录一条条目。\n\
    \n虽然可以使用日志记录实现一些高级功能（例如将条目写入数据库，或向站点管理员发送电子邮件），但我们目前所做的只是创建一个单一的日志文件来保存日志条目。这个文件随后可用于调试在\
    \ Web 应用程序开发期间以及日常运行中可能出现的任何问题。我们将把日志文件存储在我们之前创建的 `/var/www/phpweb20/data/logs`\
    \ 目录中。该目录必须可由 Web 服务器写入。\n"
- fmt: "# `cd /var/www/phpweb20/data/`\n\n# `chmod 777 logs`\n\nThe procedure for\
    \ using `Zend_Log` is to firstly instantiate the `Zend_Log` class, and then add\
    \ a *writer* to it. A writer is a class that does something with the log messages,\
    \ such as writing them to a database or sending them straight to the browser.\
    \ We will be using the `Zend_Log_Writer_Stream` writer to write log messages to\
    \ the file specified in our `settings.ini` file (the `logging.file` value).\n\n\
    The following code shows this procedure. First, a filesystem writer is created,\
    \ which is then passed as the only argument to the constructor of the `Zend_Log`\
    \ class:\n\n```\n<?php\n$writer = new Zend_Log_Writer_Stream('/path/to/log');\n\
    $logger = new Zend_Log($writer);\n?>\n```\n\nWe can now add this code to our `index.php`\
    \ bootstrap file. We want to create the `Zend_Log` object as soon as possible\
    \ in the application, so we can record any problems that occur in the application.\
    \ Since we rely on the `logging.file` value from `settings.ini`, we can create\
    \ our logger as soon as this configuration file has been loaded.\n\n> **Note:**\
    \ It is possible to have multiple writers for a single logger. For example, you\
    \ might use `Zend_Log_Writer_Stream` to write all log messages to the filesystem\
    \ and use a custom e-mail writer to send log messages of a critical nature to\
    \ the system administrator. In Chapter 14 we will implement this specific functionality.\n\
    \nListing 2-17 shows the new version of `index.php`, which now creates `$logger`,\
    \ an instance of `Zend_Log`. The path of the log file is found in the `$config->logging->file`\
    \ variable. Additionally, it is written to the registry so it can be accessed\
    \ elsewhere in the application.\n\n**Listing 2-17.** *The Updated Version of the\
    \ Application Bootstrap File, Now with Logging* (`index.php`)\n\n```\n<?php\n\
    require_once('Zend/Loader.php');\nZend_Loader::registerAutoload();\n\n// load\
    \ the application configuration\n$config = new Zend_Config_Ini('../settings.ini',\
    \ 'development');\nZend_Registry::set('config', $config);\n\n// create the application\
    \ logger\n$logger = new Zend_Log(new Zend_Log_Writer_Stream($config->logging->file));\n\
    Zend_Registry::set('logger', $logger);\n\n// connect to the database\n$params\
    \ = array('host' => $config->database->hostname,\n                'username' =>\
    \ $config->database->username,\n                'password' => $config->database->password,\n\
    \                'dbname' => $config->database->database);\n$db = Zend_Db::factory($config->database->type,\
    \ $params);\nZend_Registry::set('db', $db);\n\n// handle the user request\n$controller\
    \ = Zend_Controller_Front::getInstance();\n$controller->setControllerDirectory($config->paths->base\
    \ .\n    '/include/Controllers');\n\n// setup the view renderer\n$vr = new Zend_Controller_Action_Helper_ViewRenderer();\n\
    $vr->setView(new Templater());\n$vr->setViewSuffix('tpl');\nZend_Controller_Action_HelperBroker::addHelper($vr);\n\
    $controller->dispatch();\n?>\n```\n\n## Writing to the Log File\n\nTo write to\
    \ the log file, we call the `log()` method on the `$logger` object. The first\
    \ argument is the message we want to log, and the second argument is the priority\
    \ level of the message.\n\nThe following is a list of the built-in log priorities\
    \ (from the Zend Framework manual):\n\n- `Zend_Log::EMERG` (Emergency: system\
    \ is unusable)\n- `Zend_Log::ALERT` (Alert: action must be taken immediately)\n\
    - `Zend_Log::CRIT` (Critical: critical conditions)\n- `Zend_Log::ERR` (Error:\
    \ error conditions)\n- `Zend_Log::WARN` (Warning: warning conditions)\n- `Zend_Log::NOTICE`\
    \ (Notice: normal but significant condition)\n- `Zend_Log::INFO` (Informational:\
    \ informational messages)\n- `Zend_Log::DEBUG` (Debug: debug messages)\n\n> **Note:**\
    \ It is also possible to create your own logging priorities, but for development\
    \ in this book we will only use these built-in priorities.\n\nSo, if you wanted\
    \ to write a debug message, you might use `$logger->log('Test', Zend_Log::DEBUG)`.\
    \ Alternatively, you could use the priority name as the method on `$logger`, which\
    \ is essentially just a simple shortcut. Using this method, you could use `$logger->debug('Test')`\
    \ instead.\n\nAs a test, you can add that line to your `index.php` file after\
    \ you instantiate `Zend_Log`, as follows:\n\n```\n<?php\n// ... other bootstrap\
