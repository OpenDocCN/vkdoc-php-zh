    the data you might expect:


    ```

    Tax levied for popp\ch11\batch08\Army: 1

    Tax levied for popp\ch11\batch08\Archer: 2

    Tax levied for popp\ch11\batch08\LaserCanonUnit: 1

    Tax levied for popp\ch11\batch08\Cavalry: 3

    TOTAL: 7

    ```


    Figure [11-7](#A314621_5_En_11_Chapter.html#Fig7) shows the participants in this
    example.


    ![A314621_5_En_11_Fig7_HTML.gif](A314621_5_En_11_Fig7_HTML.gif)


    Figure 11-7.


    The Visitor pattern


    ### Visitor Issues


    The Visitor pattern, then, is another pattern that combines simplicity and power.
    There are a few things to bear in mind when deploying this pattern, however.


    First, although it is perfectly suited to the Composite pattern, Visitor can,
    in fact, be used with any collection of objects. So, you might use it with a list
    of objects where each object stores a reference to its siblings, for example.


    By externalizing operations, you may risk compromising encapsulation. That is,
    you may need to expose the guts of your visited objects in order to let visitors
    do anything useful with them. You saw, for example, that for the first Visitor
    example, I was forced to provide an additional method in the `Unit` interface
    in order to provide information for `TextDumpArmyVisitor` objects. You also saw
    this dilemma previously in the Observer pattern.


    Because iteration is separated from the operations that visitor objects perform,
    you must relinquish a degree of control. For example, you cannot easily create
    a `visit()` method that does something both before and after child nodes are iterated.
    One way around this would be to move responsibility for iteration into the visitor
    objects. The trouble with this is that you may end up duplicating the traversal
    code from visitor to visitor.


    By default, I prefer to keep traversal internal to the visited classes, but externalizing
    it provides you with one distinct advantage. You can vary the way that you work
    through the visited classes on a visitor-by-visitor basis.


    ## The Command Pattern


    In recent years, I have rarely completed a web project without deploying this
    pattern. Originally conceived in the context of graphical user interface design,
    command objects make for good enterprise application design, encouraging a separation
    between the controller (request and dispatch handling) and domain model (application
    logic) tiers. Put more simply, the Command pattern makes for systems that are
    well organized and easy to extend.


    ### The Problem


    All systems must make decisions about what to do in response to a user’s request.
    In PHP, that decision-making process is often handled by a spread of point-of-contact
    pages . In selecting a page (`feedback.php`), the user clearly signals the functionality
    and interface she requires. Increasingly, PHP developers are opting for a single-point-of-contact
    approach (as I will discuss in the next chapter). In either case, however, the
    receiver of a request must delegate to a tier more concerned with application
    logic. This delegation is particularly important in cases where the user can make
    requests to different pages. Without it, duplication inevitably creeps into the
    project.


    So, imagine you have a project with a range of tasks that need performing. In
    particular, the system must allow some users to log in and others to submit feedback.
    You could create `login.php` and `feedback.php` pages that handle these tasks,
    instantiating specialist classes to get the job done. Unfortunately, user interface
    in a system rarely maps neatly to the tasks that the system is designed to complete.
    You may require login and feedback capabilities on every page, for example. If
    pages must handle many different tasks, then perhaps you should think of tasks
    as things that can be encapsulated. In doing this, you make it easy to add new
    tasks to your system, and you build a boundary between your system’s tiers. This
    brings us to the Command pattern.'
