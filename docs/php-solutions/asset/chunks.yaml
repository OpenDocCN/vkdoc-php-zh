    By default, MAMP uses nonstandard ports for Apache and MySQL. Unless you’re using
    multiple installations of Apache and MySQL, you should change the port settings.


    Double-click the MAMP icon in Applications/MAMP. Your default browser should launch
    and present you with the MAMP welcome page. Note that the URL in the browser address
    bar begins with `localhost:8888`. The `:8888` indicates that Apache is listening
