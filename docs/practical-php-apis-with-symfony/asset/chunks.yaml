    \ and there are plenty of pre-built images available in the docker hub.\n\nLet’s\
    \ create the *docker-compose.yaml* file in our project root folder and add the\
    \ SQLite service:\n\n```\nversion: '3'\nservices:\nsqlite3:\nimage: keinos/sqlite3:latest\n\
    volumes:\n- './db:/var/db'\n```\n\nAs you can see, we are going to use the latest\
    \ SQlite3 image version (you can use any other image of your choice) and we are\
    \ creating a new volume that links the container *db* folder with our *var/db*\
    \ folder. To start the container, use the following command:\n\n```\ndocker compose\
    \ up -d\n```\n\nThen, we only have to add the **DATABASE_URL** environment variable\
    \ to the *.env* file, which is located in the project root folder.\n\n```\nDATABASE_URL=\"\
    sqlite:///%kernel.project_dir%/var/db/data.db\"\n```\n\nThis variable contains\
    \ the path to the SQLite database file. This path matches with the volume path\
    \ defined in the compose file. Ensure you have created the directory var/db.\n\
    \n## Installing Redis\n\n[Redis](https://redis.io/) is an open source, in-memory\
    \ database that can be used as a cache or message broker among other uses. It\
    \ supports various data structures such as strings, hashes, lists, sets, and streams.\
    \ It is known for its high performance and versatility in handling data. We are\
    \ going to use Redis as a messenger transport in Chapter [3](#663561_1_En_3_Chapter.xhtml).\
    \ As we did with SQLite, we are going to install it using docker.\n\nAs I said\
    \ before, feel free to install redis following a procedure of your choice.\n\n\
    Let’s add the Redis service to our compose file.\n\n```\nversion: '3'\nservices:\n\
    sqlite3:\nimage: sqlite:latest\nvolumes:\n- './db:/var/db'\nredis:\nimage: redis\n\
    ports:\n- '6401:6379'\n```\n\nAs you can see, we are using the Redis image and\
    \ linking the container Redis port 6379 to our computer port 6401\\. Let’s start\
    \ the Redis container by executing the compose up command again:\n\n```\ndocker\
    \ compose up -d\n```\n\nThis will create the container for the recently added\
    \ Redis service. Now, as we did before with the **DATABASE_URL** environment variable,\
    \ let’s add the **MESSENGER_TRANSPORT_DSN** variable which will contain the redis\
    \ dsn where the messages will be routed.\n\n```\nMESSENGER_TRANSPORT_DSN=redis://localhost:6401/operations\n\
    ```\n\nThe operations path indicates the Redis stream name where the messages\
    \ will be queued.\n\nThe redis-messenger component uses [redis streams](https://redis.io/docs/latest/develop/data-types/streams/)\
    \ to queue messages. You can learn more about them by following the last link,\
    \ but you must not worry about how they work since the symfony messenger does\
    \ all the routing work internally.\n\n## Conclusion\n\nThis section has helped\
    \ us to know and install all the necessary components and backend services that\
    \ we will need throughout the entire book. Now, we can start to write some code\
    \ in the first chapter, where we will build the basic skeleton of an operation-oriented\
    \ API.\n\nAny source code or other supplementary material referenced by the author\
    \ in this book is available to readers on GitHub. For more detailed information,\
    \ please visit https://www.apress.com/gp/services/source-code.\n\n# About the\
    \ Author\n\n# About the Technical Reviewer\n\n# 1. Crafting Inputs, Outputs, and\
    \ Operations\n\nIn this chapter, we are going to build the basic core functionalities\
    \ of an operation-oriented API. Specifically, we will write the necessary code\
    \ to\n\n*   Create models to represent inputs and outputs\n\n*   Create services\
    \ to represent operations\n\n*   Create an accessible collection to store and\
    \ retrieve those operations\n\n*   Perform operations based on the request payload\n\
    \n*   Validate payloads\n\n*   Create the endpoint to receive and perform the\
    \ operation requests\n\n## Section 1\\. Request Inputs and Outputs\n\nIn the context\
    \ of an API request, the following is a quick breakdown of inputs and outputs:\n\
    \n*   **Inputs**: This refers to the data or instructions you provide to the API.\
    \ These typically come in the request payload or headers, depending on the API\
    \ design. For instance, in a “send payment” operation, the inputs might include\
    \ the recipient’s information, the amount, and potentially a reference code.\n\
    \n*   **Outputs**: This is the data or response you receive back from the API\
    \ after it processes your request. The output format can vary depending on the\
    \ API, but it often comes in JSON or XML format. For example, the output for a\
    \ “send payment” operation might be a confirmation message with a success status\
    \ and a transaction ID.\n\nIn the next sections, we are going to create a class\
    \ for both the request input and output so that we can deserialize and validate\
    \ them later.\n\n*   You will notice in this section that some models’ properties\
    \ are wrapped with some Symfony validation constraints. In “Section 5. Validating\
    \ Operations,” we will learn how to validate those models according to the constraints\
    \ that their properties hold.\n\n### The Input Model\n\nBelow we can find a class\
    \ that represents an API input request model.\n\n```\nnamespace App\\Api\\Input;\n\
    use Symfony\\Component\\Validator\\Constraints\\NotBlank;\nreadonly class ApiInput\n\
    {\npublic function __construct(\n#[NotBlank(message: 'Operation name cannot be\
    \ empty')]\npublic string $operation,\npublic array $data = []\n){}\n}\n```\n\n\
    The input model contains the following properties:\n\n*   **Operation**: Holds\
    \ the name of the operation we want to execute.\n\n*   **Data**: Holds the data\
    \ that the operation requires to be performed. If the operation requires no data,\
    \ then this property can be empty.\n\nThe previous **ApiInput** model uses the\
    \ [NotBlank](https://symfony.com/doc/current/reference/constraints/NotBlank.html)\
    \ Symfony validation constraint, which means that the operation name cannot be\
    \ empty.\n\n### The Output Model\n\n```\nnamespace App\\Api\\Output;\nreadonly\
    \ class ApiOutput\n{\npublic function __construct(\npublic mixed $data,\npublic\
    \ int $code\n){ }\n}\n```\n\nThe output model contains the following properties:\n\
    \n*   **Data**: The operation execution result. It could be an object array, a\
    \ simple object, or even be empty if the operation returns no result.\n\n*   **Code**:\
    \ The HTTP code returned within the response. We should take into account the\
    \ following tips to choose the output HTTP code:\n    *   If we return the final\
    \ operation result, we should opt for a 200 OK HTTP code.\n\n    *   If we return\
    \ an operation process tracking key (the endpoint accepts the execution, but it’s\
    \ been delayed), we should opt for a 202 ACCEPTED HTTP code.\n\n    *   If we\
    \ do not return any operation result, we should opt for a 204 NO CONTENT HTTP\
    \ code. 204 should only be used when no content is returned at all, not even an\
    \ empty JSON object."
  trans: "\n# 安装数据库\n\n由于我们将在第 2 章创建用户实体，因此需要一个随时可用的数据库。我们将使用 [SQLite](https://www.sqlite.org/index.html)\
    \ 来管理数据库。为了安装它，我们将使用 [docker](https://www.docker.com/) 和 [docker-compose](https://docs.docker.com/compose/)。\n\
    \n您可以自由选择您想要的数据库（MySQL、Postgres、MariaDB……），并使用您认为合适的方式安装。就我个人而言，我喜欢使用 docker，因为它可以轻松创建新容器，而无需在计算机上安装服务，并且\
    \ docker hub 中有大量预构建的镜像可供使用。\n\n让我们在项目根目录下创建 `docker-compose.yaml` 文件，并添加 SQLite\
    \ 服务：\n\n```\nversion: '3'\nservices:\n  sqlite3:\n    image: keinos/sqlite3:latest\n\
    \    volumes:\n      - './db:/var/db'\n```\n\n如您所见，我们将使用最新的 SQLite3 镜像版本（您可以选择任何其他镜像），并且我们正在创建一个新的卷，将容器\
    \ `db` 文件夹链接到我们的 `var/db` 文件夹。要启动容器，请使用以下命令：\n\n```\ndocker compose up -d\n```\n\
    \n然后，我们只需将 `DATABASE_URL` 环境变量添加到位于项目根目录的 `.env` 文件中。\n\n```\nDATABASE_URL=\"\
    sqlite:///%kernel.project_dir%/var/db/data.db\"\n```\n\n此变量包含 SQLite 数据库文件的路径。该路径与\
    \ compose 文件中定义的卷路径相匹配。请确保您已创建 `var/db` 目录。\n\n# 安装 Redis\n\n[Redis](https://redis.io/)\
    \ 是一个开源的内存数据库，可用作缓存或消息代理等。它支持多种数据结构，例如字符串、哈希、列表、集合和流。它以其高性能和处理数据的通用性而闻名。我们将在第\
    \ 3 章中使用 Redis 作为信使传输。就像我们对 SQLite 所做的那样，我们将使用 docker 来安装它。\n\n正如我之前所说，您可以自由选择您的方式安装\
    \ Redis。\n\n让我们将 Redis 服务添加到我们的 compose 文件中：\n\n```\nversion: '3'\nservices:\n\
    \  sqlite3:\n    image: sqlite:latest\n    volumes:\n      - './db:/var/db'\n\
    \  redis:\n    image: redis\n    ports:\n      - '6401:6379'\n```\n\n如您所见，我们正在使用\
    \ Redis 镜像，并将容器 Redis 端口 6379 映射到我们计算机的端口 6401。让我们再次执行 compose up 命令来启动 Redis\
    \ 容器：\n\n```\ndocker compose up -d\n```\n\n这将为刚刚添加的 Redis 服务创建容器。现在，就像我们之前对 `DATABASE_URL`\
    \ 环境变量所做的那样，让我们添加 `MESSENGER_TRANSPORT_DSN` 变量，该变量将包含消息将路由到的 Redis DSN。\n\n```\n\
    MESSENGER_TRANSPORT_DSN=redis://localhost:6401/operations\n```\n\n`operations`\
    \ 路径指明了消息将排队等候的 Redis 流名称。\n\nredis-messenger 组件使用 [Redis 流](https://redis.io/docs/latest/develop/data-types/streams/)\
    \ 来排队消息。您可以通过最后一个链接了解更多信息，但您不必担心它们是如何工作的，因为 Symfony 信使会在内部完成所有路由工作。\n\n# 结论\n\n\
    本节帮助我们了解并安装了整本书中所需的所有必要组件和后端服务。现在，我们可以在第一章开始编写一些代码，在那里我们将构建一个面向操作的 API 的基本骨架。\n\
    \n作者在本书中引用的任何源代码或其他补充材料均可供读者在 GitHub 上查阅。如需更多详细信息，请访问 [`www.apress.com/gp/services/source-code`](https://www.apress.com/gp/services/source-code)。\n\
    \n# 关于作者\n\n# 关于技术审稿人\n\n# 1. 设计输入、输出和操作\n\n在本章中，我们将构建面向操作 API 的基本核心功能。具体来说，我们将编写必要的代码来：\n\
    \n*   创建用于表示输入和输出的模型\n*   创建用于表示操作的服务\n*   创建一个可访问的集合来存储和检索这些操作\n*   根据请求负载执行操作\n\
    *   验证负载\n*   创建接收并执行操作请求的端点\n\n## 第 1 节 请求输入和输出\n\n在 API 请求的上下文中，以下是对输入和输出的快速分解：\n\
    \n*   **输入**：指您提供给 API 的数据或指令。根据 API 的设计，这些数据通常出现在请求负载或请求头中。例如，在“发送付款”操作中，输入可能包括收款人信息、金额以及可能的参考代码。\n\
    \n*   **输出**：指 API 处理完您的请求后，您从 API 收到的数据或响应。输出格式可能因 API 而异，但通常以 JSON 或 XML 格式提供。例如，“发送付款”操作的输出可能是一个包含成功状态和交易\
    \ ID 的确认消息。\n\n在接下来的章节中，我们将为请求输入和输出创建一个类，以便稍后对其进行反序列化和验证。\n\n*   您会注意到在本节中，一些模型的属性被包裹了\
    \ Symfony 验证约束。在“第 5 节 验证操作”中，我们将学习如何根据这些属性所持有的约束条件来验证这些模型。\n\n### 输入模型\n\n下面是一个表示\
    \ API 输入请求模型的类：\n\n```\nnamespace App\\Api\\Input;\n\nuse Symfony\\Component\\\
    Validator\\Constraints\\NotBlank;\n\nreadonly class ApiInput\n{\n    public function\
    \ __construct(\n        #[NotBlank(message: '操作名称不能为空')]\n        public string\
    \ $operation,\n        public array $data = []\n    ) {}\n}\n```\n\n输入模型包含以下属性：\n\
    \n*   **操作**：保存我们要执行的操作的名称。\n*   **数据**：保存执行操作所需的数据。如果操作不需要数据，则此属性可以为空。\n\n前面的\
    \ `ApiInput` 模型使用了 `NotBlank` Symfony 验证约束，这意味着操作名称不能为空。\n\n### 输出模型\n\n```\n\
    namespace App\\Api\\Output;\n\nreadonly class ApiOutput\n{\n    public function\
    \ __construct(\n        public mixed $data,\n        public int $code\n    ) {}\n\
    }\n```\n\n输出模型包含以下属性：\n\n*   **数据**：操作执行结果。它可以是一个对象数组、一个简单对象，如果操作不返回任何结果，甚至可以为空。\n\
    *   **代码**：响应中返回的 HTTP 状态码。在选择输出 HTTP 状态码时，我们应该考虑以下提示：\n    *   如果我们返回最终的操作结果，我们应该选择\
    \ `200 OK` HTTP 状态码。\n    *   如果我们返回一个操作进程跟踪键（端点接受执行，但执行被延迟），我们应该选择 `202 ACCEPTED`\
    \ HTTP 状态码。\n    *   如果我们不返回任何操作结果，我们应该选择 `204 NO CONTENT` HTTP 状态码。`204` 只能在不返回任何内容时使用，即使是一个空的\
    \ JSON 对象也不应该返回。\n"
- fmt: '### Operation Input Models


    Each operation might require some data for execution. For instance, a payment
    operation should require the amount to pay and the payment receiver. Each operation
    input model will be different from each other since each operation performs a
    different task.


    The following example shows a hypothetical model for a payment operation:


    ```

    use Symfony\Component\Validator\Constraints as Assert;

    readonly class SendPaymentInput

    {

    public function __construct(

    #[Assert\NotBlank(message: ''Receiver cannot be empty'')]

    public string $receiver,

    #[Assert\NotBlank(message: ''Amount cannot be empty'')]

    #[Assert\GreaterThan(0, message: ''Amount must be greater than 0'')]

    public float|int $amount,

    ){}

    }

    ```


    As the previous `ApiInput` model, the `SendPaymentInput` model also uses the [NotBlank](https://symfony.com/doc/current/reference/constraints/NotBlank.html)
    Symfony constraint to specify that both sender and amount properties values are
    required. It means that a `SendPayment` operation cannot be performed if any of
    these values are missing. Furthermore, it uses the [GreaterThan](https://symfony.com/doc/current/reference/constraints/GreaterThan.html)
    constraint to specify that the amount must be greater than 0.


    The last input specifies that both `receiver` and `amount` properties are required.
    However, there may be input models where certain parameters can be optional. For
    instance, the `SendPaymentInput` model could include an optional payment label.
    We can utilize PHP type hinting to designate the `label` as optional:


    ```

    use Symfony\Component\Validator\Constraints as Assert;

    readonly class SendPaymentInput

    {

    public function __construct(

    #[Assert\NotBlank(message: ''Receiver cannot be empty'')]

    public string $receiver,

    #[Assert\NotBlank(message: ''Amount cannot be empty'')]

    #[Assert\GreaterThan(0, message: ''Amount must be greater than 0'')]

    public float|int $amount,

    public ?string $label = null

    ){}

    }

    ```


    As you can see, the model declares the `label` as an optional string (using the
    `?` modifier) and assigns `null` as a default value.


    ### Operation Output Models


    In the same way that we create models for the input data, we can create models
    to represent the output data. Continuing with the example of the `SendPaymentInput`
    operation, let’s create an output model that would hold two properties: `id` and
    `status`.


    ```

    readonly class SendPaymentOutput

    {

    public function __construct(

    public string $id,

    public string $status

    ){}

    }

    ```


    This output model would be used after performing an operation to represent the
    result.


    ```

    $id = ''......'';

    $status = ''ACCEPTED'';

    return new ApiOutput(

    new SendPaymentOutput($id, $status),


    );

    ```


    This way is better than using raw arrays because it provides a clear structure
    for the data being returned. This makes it easier for developers to understand
    the expected response format.


    For operations which return result data from the database (for instance, an operation
    that returns a list of elements for a `Client` entity), we should create concrete
    output data objects instead of directly serializing the entities. By creating
    specific output objects (also known as DTOs – Data Transfer Objects), you maintain
    a clear separation between business logic and data representation. This helps
    prevent persistence logic and infrastructure concerns from leaking into the presentation
    layer.


    In the next section, we will analyze a complete example.


    ### Conclusion


    In this section, we’ve created the basic models we will need to start building
    operations. In the next section, we will learn how to create operations and how
    to create the necessary services to hold them.


    ## Section 2. Building Operations


    This section outlines the key principles for creating well-defined API operations:


    - **Interface Enforcement**: Every operation must implement a specific interface.
    This interface defines a standard method that all operations must use to encapsulate
    their execution logic. This promotes consistency and simplifies operation management.

    - **Metadata for Clarity**: Each operation will be marked with a metadata attribute.
    This attribute serves as a central location to store essential information about
    the operation, such as its name and the class representing its input model. This
    metadata enhances code readability and simplifies operation discovery.


    In summary, these principles ensure well-structured and maintainable API operations
    with clear execution logic and readily accessible metadata.


    ### The Operation Interface


    The `OperationInterface` acts as a contract that all operations must implement.
    The `perform` method will be the one that the operations will use to encapsulate
    its logic.


    ```

    namespace App\Api\Operation;

    use App\Api\Output\ApiOutput;

    use Symfony\Component\DependencyInjection\Attribute\Autoconfigure;

    #[Autoconfigure(tags: [''api.operation''])]

    interface OperationInterface

    {

    public function perform(mixed $data): ApiOutput;

    }

    ```


    The [AutoConfigure](https://symfony.com/doc/current/service_container/tags.html%2523autoconfiguring-tags)
    attribute tells the Symfony kernel to tag as `api.operation` those services which
    implement this interface. This means that each operation will be tagged as such
    after implementing the `OperationInterface`.


    The `perform` method must return an instance of the `ApiOutput` class. If you
    remember from the last section, this class holds the operation request result.


    ### The Operation Metadata


    The operation metadata attribute holds two properties. The first one specifies
    the operation name, and the second one specifies the operation input model class.


    ```

    namespace App\Api\Attribute;

    #[\Attribute(\Attribute::TARGET_CLASS)]

    readonly class OperationMetadata

    {

    public function __construct(

    public string $name,

    public ?string $input = null

    ){ }

    }

    ```


    A request operation payload will be deserialized to the input class, specified
    with the `$input` parameter, before executing the operation. If the input class
    properties are annotated with Symfony validation constraints, the deserialized
    model will also be validated to ensure that the received data is valid.


    We will see this entire process during the rest of the chapter.


    ### An Operation Class


    So far, we know that an operation must implement the `OperationInterface` and
    has to be flagged with the `OperationMetadata` attribute. In this section, we
    are showing an example of an operation class.


    ```

    namespace App\Api\Operation;

    use App\Api\Attribute\OperationMetadata;

    use App\Api\Input\Operation\SendPaymentInput;

    use App\Api\Output\ApiOutput;

    #[OperationMetadata(

    name: ''SendPayment'',

    input: SendPaymentInput::class

    )]

    class SendPaymentOperation implements OperationInterface

    {

    /**

    * @param SendPaymentInput $data

    */

    public function perform(mixed $data): ApiOutput

    {

    // This method would hold the code in charge of sending the payment

    $id = ''......'';

    $status = ''ACCEPTED'';

    return new ApiOutput(new SendPaymentOutput($id, $status), 202);

    }

    }

    ```


    The operation metadata attribute specifies the operation name (`SendPayment`)
    and the input data class name (`SendPaymentInput`). The `perform` method would
    execute the operation and return the `ApiOutput` containing the result as an output
    model and the HTTP response code.


    To prevent hardcoding the operation name in the metadata name parameter, we can
    create a PHP enumeration where to centralize all the operation names:


    ```

    enum OperationNames

    {

    case SendPayment;

    }

    ```


    Now, we can change the `OperationMetadata` name parameter with this:


    ```

    #[OperationMetadata(

    name: OperationNames::SendPayment->name,

    input: SendPaymentInput::class

    )]

    ```'
