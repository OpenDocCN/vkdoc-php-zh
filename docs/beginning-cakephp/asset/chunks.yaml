    ### 使用脚手架测试数据库关联


    测试数据库中关联关系的一种简单方法是使用脚手架功能。你已经创建了 `Post` 和 `User` 模型；现在让我们看看这些关联是否成立。你需要创建控制器来运行脚手架。


    在 `app/controllers` 目录中创建 `posts_controller.php` 文件，并插入如代码清单 4-8 所示的代码。


    **代码清单 4-8.** *文章控制器文件*


    ```

    1 <?

    2 class PostsController extends AppController {

    3     var $name = ''Posts'';

    4     var $scaffold;

    5 }

    6 ?>

    ```


    要测试 `User` 模型，你还需要围绕 `users` 表构建一个脚手架。


    为此，请创建 `app/controllers/users_controller.php` 文件，并插入如代码清单 4-9 所示的代码。


    **代码清单 4-9.** *用户控制器文件*


    ```

    1 <?

    2 class UsersController extends AppController {

    3     var $name = ''Users'';

    4     var $scaffold;

    5 }

    6 ?>

    ```


    让我们启动用户控制器并点击“添加”链接，向 `users` 表中添加几个测试用户。我的操作界面如图 4-1 所示；你的界面应该类似。


    ![Image 23](img/index-68_1.jpg)


    **图 4-1.** *使用 Cake 的脚手架向数据库添加测试用户*


    现在数据库中有几个用户后，你就可以测试这些用户是否与 `posts` 表关联。启动文章控制器，点击“添加”以插入一篇新文章。如果关联正常工作，你应该看到一个下拉菜单，其中填充了
    `users` 表中的关联记录；图 4-2 展示了这个菜单在“新建文章”界面中的显示效果。


    如果关联未能正常工作，你看到的将是一个空白的输入文本框，而不是用户的下拉菜单。这表明 Cake 要求你用自定义变量数据填充 `user_id` 字段。请注意，当你保存文章时，文章控制器的列表界面会显示用户名而非
    ID 号码。这进一步表明 Cake 正确地识别了关联关系。


    ![Image 24](img/index-69_1.jpg)


    **图 4-2.** *用户菜单中填充了来自* users *表的实际记录。*


    ### 建立表关联的约定


    如前所述，你可以手动设置关系的外键。换句话说，你可以随意命名存储关联 ID 的字段。然而，Cake 在处理表关联时确实有一些命名约定，这些约定允许你省略 `foreignKey`
    参数和其他设置，从而减少构建关联所需的代码量。


    我之前已经提到，数据库中的表名应采用复数形式。对于“一对一”或“一对多”关系，你需要添加一个字段来存储关联记录的 ID 值。该字段名称遵循一个命名约定：具体来说，它必须根据
    ID 来源的模型名称来命名。你还必须在字段名称后附加下划线和 `id`，以便 Cake 将其识别为关联外键。请注意，当你创建 `posts` 表时，你遵循了这一约定来添加
    `user_id` 字段。通过这样做，你可以在设置 `$belongsTo` 和 `$hasMany` 属性时省略 `foreignKey` 参数。由于表名和外键命名正确，Cake
    自动找到了这些关联关系，并在脚手架中使其可用。无需编写任何特定代码。


    ### “多对多”关联


    Cake 能够识别的数据库表关系的最后一种关联是“多对多”关系。这种关系功能强大，但掌握起来也稍具难度。

