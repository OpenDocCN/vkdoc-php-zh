  \ 函数，它是 `fetch` 的包装类，如下所示。此函数用于获取 `SELECT` 查询返回的单个值。\n\n```php\n// 从一行中返回第一列的值\n\
  public static function GetOne($statementHandler, $params = null)\n\n{\n\n// 将返回值初始化为\
  \ null\n$result = null;\n\n// 尝试执行作为参数接收的预处理语句 try\n\n{\n\n/* 执行查询，并将结果集中的第一个值（第一行第一列）保存到\
  \ $result 中 */\nself::Execute($statementHandler, $params);\n\n$result = $statementHandler->fetch(PDO::FETCH_NUM);\n\
  \n$result = $result[0];\n\n}\n\ncatch(PDOException $e)\n\n{\n\n// 关闭数据库处理器并触发错误\n\
  self::Close();\n\ntrigger_error($e->getMessage(), E_USER_ERROR);\n\n}\n\n// 返回查询结果\n\
  return $result;\n\n}\n```\n\n9.  在 `business` 文件夹中创建一个名为 `catalog.php` 的文件。将以下代码添加到该文件中：\n\
  \n```php\n<?php\n\n// 用于读取产品目录信息的业务层类 class Catalog\n\n{\n\n// 检索所有部门\npublic static\
  \ function GetDepartments()\n\n{\n\n// 构建 SQL 查询\n$sql = 'SELECT * FROM catalog_get_departments_list();';\n\
  \n// 使用 PDO 特定功能准备语句 $result = DatabaseHandler::Prepare($sql);\n\n// 执行查询并返回结果\n\
  return DatabaseHandler::GetAll($result);\n\n}\n\n}\n\n?>\n```\n\n\n\n**10.** 你需要在\
  \ `app_top.php` 中包含新创建的 `database_handler.php`，以便应用程序能够使用该类。为此，请将高亮显示的代码添加到 `include/app_top.php`\
  \ 文件中：\n\n```php\n<?php\n\n// 引入实用工具文件\n\nrequire_once 'include/config.php';\n\n\
  require_once BUSINESS_DIR . 'error_handler.php';\n\n// 设置错误处理器\n\nErrorHandler::SetHandler();\n\
  \n// 加载页面模板\n\nrequire_once PRESENTATION_DIR . 'page.php';\n\n// 加载数据库处理器\n\nrequire_once\
  \ BUSINESS_DIR . 'database_handler.php';\n\n?>\n```\n\n**11.** 创建一个名为 `hatshop/include/app_bottom.php`\
  \ 的新文件，并在其中添加以下内容：\n\n```php\n<?php\n\nDatabaseHandler::Close();\n\n?>\n```\n\n\
  **12.** 该文件必须包含在主页面 `index.php` 的末尾，以关闭连接。请按如下方式修改你的 `index.php` 文件：\n\n```php\n\
  <?php\n\n// 加载 Smarty 库和配置文件\n\nrequire_once 'include/app_top.php';\n\n// 加载 Smarty\
  \ 模板文件\n\n$page = new Page();\n\n// 显示页面\n\n$page->display('index.tpl');\n\n// 加载\
  \ app_bottom，它用于关闭数据库连接 require_once 'include/app_bottom.php';\n\n?>\n```\n\n##\
  \ 工作原理：业务层代码\n\n在将数据库连接数据添加到 `config.php` 之后，你创建了 `DatabaseHandler` 类。该类包含多个包装方法，这些方法访问\
  \ PDO 函数并为业务层的其他方法提供所需的功能。\n\n`DatabaseHandler` 类有一个**私有构造函数**，这意味着它不能被实例化；你不能创建\
  \ `DatabaseHandler` 对象，但可以执行该类的**静态方法**。与实例成员和方法不同，静态类成员和方法直接使用类名调用，而不是通过类的对象。例如，以下是你调用一个假设名为\
  \ `MyClass` 的类的实例方法 `myMethod` 的方式：\n\n```php\n$myObject = new MyClass;\n\n$myObject->myMethod();\n\
  ```\n\n如果 `myMethod` 是一个静态方法，你可以这样调用它：`MyClass::MyMethod();`\n\n> **注意：** 静态成员是面向对象编程特有的特性，PHP\
  \ 4 及更早版本不支持。\n\n你可以在 `http://php.net/manual/en/language.oop5.php` 找到关于 PHP 5 面向对象编程特性的非常好的介绍。\n\
  \n数据库函数本身具有标准结构，利用了 PDO 已配置为抛出异常这一特性。让我们仔细看看 `GetRow` 方法。\n\n```php\n// PDOStatement::fetch\
  \ 的包装方法\n\npublic static function GetRow($statementHandler, $params = null, $fetchStyle\
  \ = PDO::FETCH_ASSOC)\n\n{\n\n    // 将返回值初始化为 null\n\n    $result = null;\n\n  \
  \  // 尝试执行接收到的预处理语句 try\n\n    {\n\n        self::Execute($statementHandler, $params);\n\
  \n        $result = $statementHandler->fetch($fetchStyle);\n\n    }\n\n    catch(PDOException\
  \ $e)\n\n    {\n\n        // 关闭数据库处理器并触发错误\n\n        self::Close();\n\n       \
  \ trigger_error($e->getMessage(), E_USER_ERROR);\n\n    }\n\n    // 返回查询结果\n\n \
  \   return $result;\n\n}\n```\n\n如果数据库命令未成功执行，该方法会生成一个错误（使用 `trigger_error` 函数）。该错误会被你在第二章中实现的错误处理机制捕获。\n\
  \n由于你在第二章中实现错误处理代码的方式，生成 `E_USER_ERROR` 错误会冻结请求的执行，最终记录和/或通过电子邮件发送错误数据，并向访问者显示一条友好的“请稍后再试”消息（如果存在所谓友好的“请稍后再试”消息的话）。\n\
  \n请注意，在生成错误之前，我们还会关闭数据库连接，以确保脚本不会占用任何数据库资源。\n\n\n默认情况下，如果你没有向 `trigger_error` 指定要生成的错误类型，会生成一条\
  \ `E_USER_NOTICE` 消息，这不会干扰请求的正常执行（错误最终会被记录，但后续执行会正常继续）。\n\n`DatabaseHandler` 类中的功能旨在供其他业务层类（例如\
  \ `Catalog`）使用。目前，`Catalog` 只包含一个方法：`GetDepartments`。\n\n```\n// 用于读取产品目录信息的业务层类\n\
  class Catalog\n{\n    // 检索所有部门\n    public static function GetDepartments()\n \
  \   {\n        // 构建 SQL 查询\n        $sql = 'SELECT * FROM catalog_get_departments_list();';\n\
  \n        // 使用 PDO 特定功能预处理语句\n        $result = DatabaseHandler::Prepare($sql);\n\
  \n        // 执行查询并返回结果\n        return DatabaseHandler::GetAll($result);\n    }\n\
  }\n```\n\n由于它依赖于你已经包含在 `DatabaseHandler` 类和已有数据库函数中的功能，`Catalog` 中的代码非常简单明了。`GetDepartments`\
  \ 方法将从表示层调用，表示层会向访问者显示返回的数据。它首先准备 SQL 查询（你之前已经了解了准备 SQL 语句的优势），然后调用相应的 `DatabaseHandler`\
  \ 方法来执行查询。在这个例子中，我们调用 `GetAll` 来检索部门列表。\n\n目前，数据库连接在 `index.php` 开始处理时打开，并在结束时关闭。在此文件的一次迭代中发生的所有数据库操作都将通过此连接完成。\n\
  \n## 显示部门列表\n\n既然其他层已经就绪，你所要做的就是创建表示层部分——这是我们从一开始就瞄准的最终目标。如本章开头所示，当站点在浏览器中加载时，部门列表需要看起来像图\
  \ 3-14。\n\n**图 3-14.** *带有动态生成部门列表的 HatShop*\n\n你将其实现为一个名为 `departments_list` 的独立组件化模板，由两个文件组成：Smarty\
  \ 设计模板（`templates/departments_list.tpl`）和 Smarty 插件文件（`smarty_plugins/function.load_departments_list.php`）。还将使用一个名为\
  \ `DepartmentsList` 的附加辅助类。然后，你只需将此组件化模板包含到主 Smarty 模板（`templates/index.tpl`）中即可。\n\
  \n### 使用 Smarty 插件\n\nSmarty 插件是我们用来实现 Smarty 设计模板文件（扩展名为 `.tpl`）背后逻辑的 Smarty 技术。这不是存储\
  \ Smarty 设计模板背后逻辑的唯一方法，但这是 Smarty 文档在 <http://smarty.php.net/manual/en/tips.componentized.templates.php>\
  \ 推荐的方式。\n\n对于部门列表，Smarty 插件文件是 `function.load_departments_list.php`，其中包含 `smarty_function_load_departments_list`\
  \ 函数，该函数从数据库加载部门列表。该列表被加载到 Smarty 变量中，这些变量由生成 HTML 输出的 Smarty 设计模板文件（`departments_list.tpl`）读取。\n\
  \nSmarty 插件文件和函数必须遵循严格的命名约定，以便 Smarty 能够定位它们。Smarty 插件文件必须命名为 `type.name.php`（在我们的例子中是\
  \ `function.load_departments_list.php`），并且其中的函数必须命名为 `smarty_type_name`（在我们的例子中是\
  \ `smarty_function_load_departments_list`）。Smarty 插件命名约定的官方页面是 <http://smarty.php.net/manual/en/plugins.naming>。\n\
  \n\n\n`conventions.php`。您可以在 http://smarty.php.net/manual/en/plugins.php 了解更多关于\
  \ Smarty 插件的信息。\n\n将 Smarty 插件文件放置到位后，您可以在 Smarty 设计模板文件（`departments_list.tpl`）中通过如下一行代码引用它：\n\
  \n```\n{load_departments_list assign=\"departments_list\"}\n```\n\n在遵守正确命名约定的前提下，这一行代码足以让\
  \ Smarty 加载插件文件并执行加载部门列表的函数。之后，Smarty 设计模板文件可以像这样访问由插件函数填充的变量：\n\n```\n{$departments_list->mDepartments[i].name}\n\
  ```\n\n在实际编写组件化模板之前，您还需要了解一个小细节。\n\n**练习：创建 departments_list 组件化模板**\n\n1. 打开 `hatshop`\
  \ 文件夹中的 `hatshop.css` 文件，并添加以下代码清单所示的样式。\n\n这些样式定义了部门名称在部门列表中不同状态下的外观：未选中、鼠标悬停（未选中）以及选中时。\n\
  \n```css\n.left_box p\n{\n    color: #ffffff;\n    font-family: arial, tahoma, verdana;\n\
  \    font-size: 12px;\n    font-weight: bold;\n    margin: 0px 0px 5px 0px;\n  \
  \  padding: 2px 0px 2px 12px;\n}\n\n#departments_box\n{\n    position: relative;\n\
  \    border: 1px solid #30b86e;\n}\n\n#departments_box p\n{\n    background: #30b86e;\n\
  }\n\na\n{\n    color: #a6a6a6;\n    font-family: verdana, arial, tahoma;\n    font-size:\
  \ 10px;\n    font-weight: bold;\n    line-height: 20px;\n    text-decoration: none;\n\
  }\n\na:hover\n{\n    color: #000000;\n}\n\na.selected\n{\n    color: #000000;\n\
  \    text-decoration: underline;\n}\n\nol\n{\n    list-style-type: none;\n    margin:\
  \ 0px 5px;\n    padding: 0px;\n}\n```\n\n2. 编辑 `presentation/page.php` 文件，并向 `page`\
  \ 类的构造函数中添加以下两行代码。这两行代码配置了 Smarty 使用的插件文件夹。第一个用于内部 Smarty 插件，第二个指定了您将创建的、用于存放为 HatShop\
  \ 编写的插件的 `smarty_plugins` 文件夹。\n\n```php\n/* Class that extends Smarty, used to\
  \ process and display Smarty files */\nclass Page extends Smarty\n{\n    // Class\
  \ constructor\n    public function __construct()\n    {\n        // Call Smarty's\
  \ constructor\n        parent::Smarty();\n\n        // Change the default template\
  \ directories\n        $this->template_dir = TEMPLATE_DIR;\n        $this->compile_dir\
  \ = COMPILE_DIR;\n        $this->config_dir = CONFIG_DIR;\n\n        $this->plugins_dir[0]\
  \ = SMARTY_DIR . 'plugins';\n        $this->plugins_dir[1] = PRESENTATION_DIR .\
  \ 'smarty_plugins';\n    }\n}\n```\n\n3. 现在，为 `departments_list` 组件化模板创建 Smarty\
  \ 模板文件。在 `presentation/templates/departments_list.tpl` 中写入以下代码：\n\n```smarty\n{*\
  \ departments_list.tpl *}\n{load_departments_list assign=\"departments_list\"}\n\
  \n{* Start departments list *}\n<div class=\"left_box\" id=\"departments_box\">\n\
  <p>Choose a Department</p>\n<ol>\n\n{* Loop through the list of departments *}\n\
  {section name=i loop=$departments_list->mDepartments}\n{assign var=selected_d value=\"\
  \"}\n\n{* Verify if the department is selected to decide what CSS style to use *}\n\
  {if ($departments_list->mSelectedDepartment ==\n$departments_list->mDepartments[i].department_id)}\n\
  {assign var=selected_d value=\"class=\\\"selected\\\"\"}\n{/if}\n\n<li>\n{* Generate\
  \ a link for a new department in the list *}\n<a {$selected_d}\nhref=\"{$departments_list->mDepartments[i].link|escape:\"\
  html\"}\">\n» {$departments_list->mDepartments[i].name}\n</a>\n</li>\n{/section}\n\
  \n</ol>\n</div>\n{* End departments list *}\n```\n\n4. 在 `presentation` 文件夹中创建一个名为\
  \ `smarty_plugins` 的文件夹。这将存放 Smarty 插件文件。\n\n5. 在 `smarty_plugins` 文件夹中，创建一个名为 `function.load_departments_list.php`\
  \ 的文件，并添加以下代码：\n\n```php\n<?php\n// Plugin functions inside plugin files must be\
  \ named: smarty_type_name\nfunction smarty_function_load_departments_list($params,\
  \ $smarty)\n{\n    // Create DepartmentsList object\n    $departments_list = new\
  \ DepartmentsList();\n    $departments_list->init();\n\n    // Assign template variable\n\
  \    $smarty->assign($params['assign'], $departments_list);\n}\n\n// Manages the\
  \ departments list\nclass DepartmentsList\n{\n    /* Public variables available\
  \ in departments_list.tpl Smarty template */\n    public $mDepartments;\n    public\
  \ $mSelectedDepartment;\n\n    // Constructor reads query string parameter\n   \
  \ public function __construct()\n    {\n        /* If DepartmentID exists in the\
  \ query string, we're visiting a department */\n        if (isset ($_GET['DepartmentID']))\n\
  \            $this->mSelectedDepartment = (int)$_GET['DepartmentID'];\n        else\n\
  \            $this->mSelectedDepartment = -1;\n    }\n\n    /* Calls business tier\
  \ method to read departments list and create their links */\n    public function\
  \ init()\n    {\n        // Get the list of departments from the business tier\n\
  \        $this->mDepartments = Catalog::GetDepartments();\n\n        // Create the\
  \ department links\n        for ($i = 0; $i < count($this->mDepartments); $i++)\n\
  \            $this->mDepartments[$i]['link'] =\n                'index.php?DepartmentID='\
  \ .\n                $this->mDepartments[$i]['department_id'];\n    }\n}\n?>\n```\n\
  \n6. 修改 `include/app_top.php` 文件，包含对 `Catalog` 业务层类的引用：\n\n```php\n<?php\n// Include\
  \ utility files\nrequire_once 'include/config.php';\nrequire_once BUSINESS_DIR .\
  \ 'error_handler.php';\n\n// Sets the error handler\nErrorHandler::SetHandler();\n\
  \n// Load the page template\nrequire_once PRESENTATION_DIR . 'page.php';\n\n// Load\
  \ the database handler\nrequire_once BUSINESS_DIR . 'database_handler.php';\n\n\
  // Load Business Tier\nrequire_once BUSINESS_DIR . 'catalog.php';\n?>\n```\n\n7.\
  \ 在 `presentation/templates/index.tpl` 中进行以下修改，以加载新创建的 `departments_list` 组件化模板。查找以下代码：\n\
  \n```html\n<div class=\"left_box\">\nPlace list of departments here\n</div>\n```\n\
  \n并将其替换为：\n\n```smarty\n{include file=\"departments_list.tpl\"}\n```\n\n8. 通过访问\
  \ `http://localhost/hatshop/index.php`（参见图 3-14），在您喜欢的浏览器中检查工作结果。点击部门或将鼠标悬停在链接上，看看会发生什么。\n\
  \n> **注意** 如果没有获得预期的输出，请确保机器配置正确，并且所有必需的 PHP 模块（如 PDO）均已成功加载。许多错误会记录在 Apache 错误日志文件中（默认路径为\
  \ `Apache2/logs/error.log`）。\n\n**工作原理：departments_list Smarty 模板**\n\n如果页面从一开始就按预期工作，那么您无疑是一位幸运的程序员！大多数情况下，错误是由于拼写错误引起的，因此请注意检查！数据库访问问题也很常见，请确保像第\
  \ 2 章所示那样正确配置了 `hatshop` 数据库和 `hatshopadmin` 用户。无论如何，我们很幸运拥有良好的错误报告机制，如果出现问题，它会显示详细的错误报告。\n\
  \n图 3-15 显示了我错误地输入 `config.php` 中的数据库密码时收到的错误消息。\n\n**图 3-15.** *第 2 章中编写的错误处理代码有助于调试。*\n\
  \n\n\n如果一切顺利，你会看到一个整洁的页面，其中包含使用 Smarty 模板生成的部门列表。列表中的每个部门名称都是指向该部门页面的链接，实际上，这是一个指向\
  \ `index.php` 页面的链接，其查询字符串中包含一个 `DepartmentID` 参数，用于指定所选部门。以下是此类链接的一个示例：\n\n`http://localhost/hatshop/index.php?DepartmentID=3`\n\
  \n点击某个部门的链接后，所选部门在列表中将以不同的 CSS 样式显示（参见图 3-16）。\n\n**图 3-16.** *选择部门*\n\n理解 Smarty\
  \ 模板文件（`presentation/templates/departments_list.tpl`）及其关联插件文件（`function.load_departments_list.php`）如何协同工作以生成部门列表，并为当前选中的部门使用正确的样式，这至关重要。\n\
  \n处理过程始于 `function.load_departments_list.php`，该文件被包含在 `index.tpl` 文件中。\n\n`departments_list.tpl`\
  \ 中的第一行用于加载插件：\n\n```\n{load_departments_list assign=\"departments_list\"}\n```\n\
  \n`load_departments_list` 插件函数创建并初始化一个 `DepartmentsList` 对象（该类包含在 `function.load_departments_list.php`\
  \ 中），然后该对象被赋值给一个可从 Smarty 设计模板文件访问的变量：\n\n```\nfunction smarty_function_load_departments_list($params,\
  \ $smarty)\n{\n  // 创建 DepartmentsList 对象\n  $departments_list = new DepartmentsList();\n\
  \  $departments_list->init();\n\n  // 分配模板变量\n  $smarty->assign($params['assign'],\
  \ $departments_list);\n}\n```\n\n`DepartmentsList` 中的 `init()` 方法将一个包含部门列表的数组填充到类的公共成员（`$mDepartments`）中，并将当前选中部门的索引填充到另一个公共成员（`$mSelectedDepartment`）中。\n\
  \n现在回到 Smarty 代码。在构成 Smarty 模板布局的 HTML 代码（`presentation/templates/departments_list.tpl`）中，你可以看到实现神奇功能的\
  \ Smarty 标签：\n\n```\n{section name=i loop=$departments_list->mDepartments}\n{assign\
  \ var=selected_d value=\"\"}\n{* 验证是否选中该部门，以决定使用何种 CSS 样式 *}\n{if ($departments_list->mSelectedDepartment\
  \ ==\n$departments_list->mDepartments[i].department_id)}\n{assign var=selected_d\
  \ value=\"class=\\\"selected\\\"\"}\n{/if}\n{* 为列表中的新部门生成链接 *}\n<li>\n<a {$selected_d}\n\
  href=\"{$departments_list->mDepartments[i].link|escape:\"html\"}\">\n» {$departments_list->mDepartments[i].name}\n\
  </a>\n</li>\n{/section}\n```\n\nSmarty 模板的 section 用于遍历数据数组。在此例中，你要遍历存储在 `$departmentsList->mDepartments`\
  \ 中的部门数组：\n\n```\n{section name=i loop=$departments_list->mDepartments}\n...\n{/section}\n\
  ```\n\n在循环内部，你验证当前遍历到的部门（`$departments_list->mDepartments[i].department_id`）的 ID\
  \ 是否与查询字符串中提到的 ID（`$departments_list->mSelectedDepartment`）一致。根据此结果，你将样式名称（选中样式或默认样式）保存到名为\
  \ `selected_d` 的变量中，从而决定对该名称应用何种样式。\n\n然后使用此变量生成链接：\n\n```\n<a {$selected_d}\nhref=\"\
  {$departments_list->mDepartments[i].link|escape:\"html\"}\">\n» {$departments_list->mDepartments[i].name}\n\
  </a>\n```\n\n**为安全连接提前规划**\n\n在开发过程中的某个阶段，你会希望网站的某些页面只能通过安全的 HTTPS 连接访问，以确保客户端与服务器之间传输数据的机密性。此类敏感页面包括用户登录表单、用户输入信用卡数据的页面等。\n\
  \n此处不深入讨论，因为后续章节会详细介绍。但你需要知道的是，通过 HTTPS 访问的页面会占用大量服务器资源，因此我们只希望在访问安全页面时使用安全连接。\n\
  \n实现这一点比看起来要棘手一些。大多数情况下，在网站内部使用相对链接更为方便。例如，网站的标题图片通常包含一个指向 `index.php` 的链接，而不是 `http://www.example.com/index.php`。这种情况下，如果从安全页面点击标题图片，用户会被重定向到\
  \ `https://www.example.com/index.php`，从而导致访问者通过安全连接访问了一个本不该以此方式访问的页面（实际上会消耗比必要更多的服务器资源）。\n\
  \n为了避免这个问题及其他类似问题，我们将编写一段代码，确保网站中的所有链接都是绝对链接。\n\n**练习：准备链接**\n\n**1.** 创建一个新文件 `presentation/smarty_plugins/modifier.prepare_link.php`，并向其中添加以下代码：\n\
  \n```\n<?php\n// 插件文件内的插件函数必须命名为：smarty_type_name\nfunction smarty_modifier_prepare_link($string,\
  \ $link_type = 'http')\n{\n  // 使用 SSL？\n  if ($link_type == 'https' && USE_SSL\
  \ == 'no')\n    $link_type = 'http';\n\n  switch ($link_type)\n  {\n    case 'http':\n\
  \      $link = 'http://' . getenv('SERVER_NAME');\n      // 如果定义了 HTTP_SERVER_PORT\
  \ 且不是默认值\n      if (defined('HTTP_SERVER_PORT') && HTTP_SERVER_PORT != '80')\n \
  \     {\n        // 追加服务器端口\n        $link .= ':' . HTTP_SERVER_PORT;\n      }\n\
  \      $link .= VIRTUAL_LOCATION . $string;\n      // 转义 HTML\n      return htmlspecialchars($link,\
  \ ENT_QUOTES);\n\n    case 'https':\n      $link = 'https://' . getenv('SERVER_NAME')\
  \ .\n              VIRTUAL_LOCATION . $string;\n      // 转义 HTML\n      return htmlspecialchars($link,\
  \ ENT_QUOTES);\n\n    default:\n      return htmlspecialchars($string, ENT_QUOTES);\n\
  \  }\n}\n?>\n```\n\n**2.** 向 `include/config.php` 中添加两个新常量：\n\n```\n// 服务器 HTTP\
  \ 端口（如果使用默认的 80 端口，可省略）\ndefine('HTTP_SERVER_PORT', '80');\n\n/* 网站运行的虚拟目录名称，例如：\n\
  如果网站运行在 http://www.example.com/hatshop/，则为 '/hatshop/'\n如果网站运行在 http://www.example.com/，则为\
  \ '/' */\ndefine('VIRTUAL_LOCATION', '/hatshop/');\n\n// 当此常量设置为 'no' 以外的值时，我们启用并强制使用\
  \ SSL\ndefine('USE_SSL', 'yes');\n```\n\n**3.** 按如下方式修改 `presentation/templates/header.tpl`：\n\
  \n```\n<div id=\"header\">\n  <a href=\"{\"index.php\"|prepare_link:\"http\"}\"\
  >\n    <img src=\"images/title.png\" alt=\"网站标题\" />\n  </a>\n</div>\n```\n\n**4.**\
  \ 按如下方式修改 `presentation/templates/departments_list.tpl`：\n\n```\n<li>\n<a {$selected_d}\n\
  **href=\"{$departments_list->mDepartments[i].link|prepare_link:\"http\"}\">**\n\
  » {$departments_list->mDepartments[i].name}\n</a>\n</li>\n```\n\n**工作原理：准备链接**\n\
  \n首先，请确保你添加到 `config.php` 中的新条目配置正确。如果你的网站运行在不同于默认 80 端口的端口上（例如，如果你使用 8080 端口），请确保在\
  \ `HTTP_SERVER_PORT` 常量中指定了正确的端口。\n\n我们还定义了一个名为 `USE_SSL` 的常量，它指定网站是否应该生成 HTTPS\
  \ URL。如果该常量设置为 `no`，那么即使对于本应安全的页面，你的网站也不会生成任何 HTTPS 链接。让我们看看这是如何实现的。\n\n\n"
