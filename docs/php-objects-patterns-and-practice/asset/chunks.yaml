- fmt: '# Decoupling


    To decouple is to remove interdependence between components, so that making a
    change to one component does not necessitate changes to others. Well-designed
    objects are self-enclosed. That is, they do not need to refer outside of themselves
    to recall a detail they learned in a previous invocation.


    By maintaining an internal representation of state, objects reduce the need for
    global variables—a notorious cause of tight coupling. In using a global variable,
    you bind one part of a system to another. If a component (whether a function,
    a class, or a block of code) refers to a global variable, there is a risk that
    another component will accidentally use the same variable name and substitute
    its value for the first. There is a chance that a third component will come to
    rely on the value in the variable as set by the first. Change the way that the
    first component works, and you may cause the third to stop working. The aim of
    object-oriented design is to reduce such interdependence, making each component
    as self-sufficient as possible.


    Another cause of tight coupling is code duplication. When you must repeat an algorithm
    in different parts of your project, you will find tight coupling. What happens
    when you come to change the algorithm? Clearly you must remember to change it
    everywhere it occurs. Forget to do this, and your system is in trouble.


    A common cause of code duplication is the parallel conditional. If your project
    needs to do things in one way according to a particular circumstance (e.g., running
    on Linux), and another according to an alternative circumstance (e.g., running
    on Windows), you will often find the same `if`/`else` clauses popping up in different
    parts of your system. If you add a new circumstance together with strategies for
    handling it (MacOS), you must ensure that all conditionals are updated.


    Object-oriented programming provides a technique for handling this problem. You
    can replace conditionals with polymorphism. Polymorphism, also known as class
    switching, is the transparent use of different subclasses according to circumstance.
    Because each subclass supports the same interface as the common superclass, the
    client code neither knows nor cares which particular implementation it is using.


    Conditional code is not banished from object-oriented systems; it is merely minimized
    and centralized. Conditional code of some kind must be used to determine which
    particular subtypes are to be served up to clients. This test, though, generally
    takes place once, and in one place, thus reducing coupling.


    # Reusability


    Encapsulation promotes decoupling, which promotes reuse. Components that are self-sufficient
    and communicate with wider systems only through their public interface can often
    be moved from one system and used in another without change.


    In fact, this is rarer than you might think. Even nicely orthogonal code can be
    project-specific. When creating a set of classes for managing the content of a
    particular web site, for example, it is worth taking some time in the planning
    stage to look at those features that are specific to your client, and those that
    might form the foundation for future projects with content management at their
    heart.


    Another tip for reuse: centralize those classes that might be used in multiple
    projects. Do not, in other words, copy a nicely reusable class into a new project.
    This will cause tight coupling on a macro level, as you will inevitably end up
    changing the class in one project and forgetting to do so in another. You would
    do better to manage common classes in a central repository that can be shared
    by your projects.


    # Aesthetics


    This is not going to convince anyone who is not already convinced, but to me,
    object-oriented code is aesthetically pleasing. The messiness of implementation
    is hidden away behind clean interfaces, making an object a thing of apparent simplicity
    to its client.


    I love the neatness and elegance of polymorphism, so that an API allows you to
    manipulate vastly different objects that nonetheless perform interchangeably and
    transparently—the way that objects can be stacked up neatly or slotted into one
    another like children’s blocks.


    Of course, there are those who argue that the converse is true. Object-oriented
    code can manifest itself as an explosion of classes all so decoupled from one
    another that piecing together their relationships can be a headache. This is a
    code smell in its own right. It is often tempting to build factories that produce
    factories that produce factories, until your code resembles a hall of mirrors.
    Sometimes it makes sense to do the simplest thing that works, and then refactor
    in just enough elegance for testing and flexibility. Let the problem space determine
    your solution, rather than a list of best practices.


    > **Note**

    >

    > The rigid application of so-called best practice is also often an issue in project
    management, too. Whenever the use of a technique or a process begins to resemble
    ritual, applied automatically and inflexibly, it’s worth taking a moment to investigate
    the reasoning behind your current approach. It could be you’re drifting from the
    realm of tools to that of the cargo cult.

    >

    > It is also worth mentioning that a beautiful solution is not always the best,
    or most efficient. It is tempting to use a full-blown object-oriented solution
    where a quick script or a few system calls might have gotten the job done.


    # Patterns


    Recently, a Java programmer applied for a job in a company with which I have some
    involvement. In his cover letter, he apologized for only having used patterns
    for a couple of years. This assumption that design patterns are a recent discovery—a
    transformative advance—is testament to the excitement they have generated. In
    fact, it is likely that this experienced coder has been using patterns for a lot
    longer than he thinks.


    Patterns describe common problems and tested solutions. Patterns name, codify,
    and organize real-world best practice. They are not components of an invention
    or clauses in a doctrine. A pattern would not be valid if it did not describe
    practices that are already common at the time of hatching.


    Remember that the concept of a pattern language originated in the field of architecture.
    People were building courtyards and arches for thousands of years before patterns
    were proposed as a means of describing solutions to problems of space and function.


    Having said that, it is true that design patterns often provoke the kind of emotions
    associated with religious or political disputes. Devotees roam the corridors with
    an evangelistic gleam in their eye and a copy of the Gang of Four book under their
    arm. They accost the uninitiated and reel off pattern names like articles of faith.
    It is little wonder that some critics see design patterns as hype.


    In languages such as Perl and PHP, patterns are also controversial because of
    their firm association with object-oriented programming. In a context in which
    objects are a design decision and not a given, associating oneself with design
    patterns amounts to a declaration of preference, not least because patterns beget
    more patterns, and objects beget more objects.


    ## What Patterns Buy Us


    I introduced patterns in [Chapter 7](#A314621_5_En_7_Chapter.html). Let’s reiterate
    some of the benefits that patterns can buy us.


    ### Tried and Tested


    First of all, as I’ve noted, patterns are proven solutions to particular problems.
    Drawing an analogy between patterns and recipes is dangerous: recipes can be followed
    blindly, whereas patterns are “half-baked” (Martin Fowler) by nature and need
    more thoughtful handling. Nevertheless, both recipes and patterns share one important
    characteristic: they have been tried out and tested thoroughly before inscription.


    ### Patterns Suggest Other Patterns'
