- fmt: "# The Goal of This Construct\n\nThe goal of this construct is to fetch a subtemplate\
    \ and place it within the main template. The subtemplate should be processed at\
    \ the same time as the main template, so that any logic can happen at the same\
    \ time. This is one way that the templates can communicate with each other to\
    \ share data.\n\nWe begin by creating a new `Template` instance, using this implementation.\
    \ That means the subtemplates can have subtemplates of their own, and also have\
    \ access to the other new template constructs.\n\nWe fetch the contents of the\
    \ file (the name of which is provided in the `include` tag). We then parse the\
    \ template instance, providing the template file contents. The trick is to create\
    \ a new method for each included template, so that the processing can all happen\
    \ at the same time. The functions generated by each `Template` instance return\
    \ a string, so all we need to do is wrap this functionality within a new function\
    \ and call it immediately (adding its return value to the `$_text` array). This\
    \ means the main template will call the results of the subtemplate, when the main\
    \ template is processed. This is perhaps the trickiest of all the new template\
    \ constructs we are adding.\n\n## URL Requests\n\nThe next construct requires\
    \ a new set of classes that will allow us to make HTTP requests to remote URLs.\
    \ You can see the first of these `Request` classes in Listing 15-4.\n\n**Listing\
    \ 15-4.** The Request Class\n\n```\nnamespace Framework\n{\n\nuse Framework\\\
    Base as Base;\nuse Framework\\StringMethods as StringMethods;\nuse Framework\\\
    RequestMethods as RequestMethods;\nuse Framework\\Request\\Exception as Exception;\n\
    \nclass Request extends Base\n{\n\n    protected $_request;\n\n    /**\n     *\
    \ @readwrite\n     */\n    public $_willFollow = true;\n\n    /**\n     * @readwrite\n\
    \     */\n    protected $_headers = array();\n\n    /**\n     * @readwrite\n \
    \    */\n    protected $_options = array();\n\n    /**\n     * @readwrite\n  \
    \   */\n    protected $_referer;\n\n    /**\n     * @readwrite\n     */\n    protected\
    \ $_agent;\n\n    protected function _getExceptionForImplementation($method)\n\
    \    {\n        return new Exception\\Implementation(\"{$method} not implemented\"\
    );\n    }\n\n    protected function _getExceptionForArgument()\n    {\n      \
    \  return new Exception\\Argument(\"Invalid argument\");\n    }\n\n    public\
    \ function __construct($options = array())\n    {\n        parent::__construct($options);\n\
    \        $this->setAgent(RequestMethods::server(\"HTTP_USER_AGENT\",\n       \
    \ \"Curl/PHP \".PHP_VERSION));\n    }\n\n    public function delete($url, $parameters\
    \ = array())\n    {\n        return $this->request(\"DELETE\", $url, $parameters);\n\
    \    }\n\n    function get($url, $parameters = array())\n    {\n        if (!empty($parameters))\n\
    \        {\n            $url .= StringMethods::indexOf($url, \"?\") ? \"&\" :\
    \ \"?\";\n            $url .= is_string($parameters) ? $parameters :\n       \
    \     http_build_query($parameters, \"\", \"&\");\n        }\n        return $this->request(\"\
    GET\", $url);\n    }\n\n    function head($url, $parameters = array())\n    {\n\
    \        return $this->request(\"HEAD\", $url, $parameters);\n    }\n\n    function\
    \ post($url, $parameters = array())\n    {\n        return $this->request(\"POST\"\
    , $url, $parameters);\n    }\n\n    function put($url, $parameters = array())\n\
    \    {\n        return $this->request(\"PUT\", $url, $parameters);\n    }\n\n\
    }\n}\n```\n\nThe `Request` class has all of the usual `Base` subclass goodies,\
    \ as well as some request methods (`get`, `post`, `put`, `delete`, and `head`).\
    \ These represent the different types of request methods, but ultimately they\
    \ all call the same `request()` method. Other things to note are that the constructor\
    \ sets the user agent, and the `get` method turns a provided parameter array into\
    \ a valid querystring.\n\nThe `request()` method, shown in Listing 15-5, is responsible\
    \ for doing (or delegating) the real work.\n\n**Listing 15-5.** The `request()`\
    \ Method\n\n```\nfunction request($method, $url, $parameters = array())\n{\n \
    \   $request = $this->_request = curl_init();\n\n    if (is_array($parameters))\n\
    \    {\n        $parameters = http_build_query($parameters, \"\", \"&\");\n  \
    \  }\n\n    $this\n    ->_setRequestMethod($method)\n    ->_setRequestOptions($url,\
    \ $parameters)\n    ->_setRequestHeaders();\n\n    $response = curl_exec($request);\n\
    \n    if ($response)\n    {\n        $response = new Request\\Response(array(\n\
    \            \"response\" => $response\n        ));\n    }\n    else\n    {\n\
    \        throw new Exception\\Response(curl_errno($request).' - '.curl_error($request));\n\
    \    }\n}\n```"
