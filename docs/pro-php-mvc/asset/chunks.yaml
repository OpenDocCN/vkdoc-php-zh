    The _tag() method calls the implementation’s match() method. The match() method
    will tell our parser if the chunk of template we are parsing, is a tag or a plain
    string. The match() method will return false for a nonmatch. It then extracts
    all the bits between the opener and closer strings we specified in the implementation—for
    {if $check}, the _match() method will extract the tag (if), the rest of the tag
    data ($check), and whether or not it is a closing tag.


    Finally, the _tag() method will generate a $node array, which contains a bit of
    metadata about the tag.


