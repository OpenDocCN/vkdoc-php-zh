    ```

    程序输出（来自代码清单 7-3）

    对象已创建：123

    对象已创建：321

    对象已删除：321

    对象已删除：123

    ```


    该程序定义了 `MyClass` 类。该类包含 `$code` 字段、构造函数和析构函数。构造函数有一个参数（写作 `$code`），默认值为 `123`。在构造函数中，执行了
    `$this->code=$code` 命令，该命令将方法参数的值赋给所创建对象的 `$code` 字段。


    > 一个带字母 i 的圆形图标。**注意：** 因此，如果向构造函数传递了参数，该参数的值将成为所创建对象 `$code` 字段的值。如果没有向构造函数传递参数，则该字段将获得默认值
    `123`。


    `echo “对象已创建：”,$this->code,”\n”` 命令会显示一条对象已创建的消息，并告知其字段的值。


    > 一个带字母 i 的圆形图标。**注意：** 因此，当创建对象时，会自动显示一条关于该对象的消息，并且该消息还包含对象字段的值。


    析构函数仅包含一条命令 `echo “对象已删除：”,$this->code,”\n”`，该命令通知你对象已被删除。


    除了类的定义，程序中还包含两条命令 `$A=new MyClass()` 和 `$B=new MyClass(321)`，它们用于创建 `MyClass`
    类的对象。创建 `$A` 对象时，没有向构造函数传递参数，因此该对象的 `$code` 字段被设置为 `123`。


    | 详情 |

    | --- |

    | 如果没有向构造函数传递参数，你可以在创建对象的命令中，在类名后放置空括号，也可以不放置。换句话说，除了使用 `$A=new MyClass()` 命令，你也可以使用
    `$A=new MyClass` 命令。 |


    创建 `$B` 对象时，向构造函数传递了 `321` 作为参数。这便是 `$B` 对象的 `$code` 字段的值。每次创建对象时，都会调用构造函数。该命令会在构造函数中显示一条消息，表明对象已创建。你创建了两个对象，因此会显示两条消息。当对象从内存中删除时，还会自动显示另外两条消息。你看到程序以创建对象的命令结束。程序中没有其他命令。因此，创建对象后，程序终止。但在程序终止之前，所有已创建的对象都会自动从内存中删除。如你所知，析构函数会在对象被删除之前调用。在析构函数中执行的命令会显示一条消息，表明对象已被删除。创建了两个对象，因此也删除了两个对象。


    > 一个带字母 i 的圆形图标。**注意：** 对象按照与创建时相反的顺序被删除：最后创建的对象最先被删除。


    | 详情 |

    | --- |

    | 在旧版 PHP 中，还有另一种创建构造函数的方法。它与描述的方法不同之处在于，构造函数的名称不是 `__construct()`，而是与类名相同。在这种情况下，即
    `MyClass()` 方法。 |


    > 一个铃铛图标。**PHP 8 标准：** 在 PHP 8 中，名称与其类名相同的方法不再被视为构造函数。


    ## 静态字段和方法


    先前示例中类所描述的字段和方法都是普通的，即非静态的。但是，如前所述，一个类也可以包含静态成员——*静态*字段和静态方法。


    从形式上看，创建静态字段或方法很容易。你可以使用 `static` 关键字来描述它。但是，静态字段或方法与静态字段或方法有何区别？如果普通的（非静态）字段和方法“依附”于对象，那么静态类成员不属于任何对象。它们独立存在（但在所描述的类的上下文中）。


    要引用静态字段或类方法，请指定类名，后跟双冒号（`::`），然后再跟字段或方法的名称（方法名称后跟带参数的括号）。如果在类代码中调用静态方法或引用静态字段，则使用
    `self` 关键字代替类名。


    代码清单 7-4 描述了一个包含一个静态字段和两个静态方法的类。


    ```

    代码清单 7-4

    静态字段和方法

    ```


    程序输出如下：


    ```

    程序输出（来自代码清单 7-4）

    名称：Alpha

    名称：Bravo

    ```


    `MyClass` 类有一个静态字段 `$name`。`rename()` 静态方法用于更改 `$name` 字段的值（方法参数同名）。通过方法中的 `self::$name=$name`
    命令将值赋给该字段。其中，`$name` 指令表示方法的参数，而静态字段通过 `self::$name` 指令访问。


    静态 `hello()` 方法没有参数。调用该方法时，执行 `echo “名称：”,self::$name,”\n”` 命令，该命令显示静态字段的值。


    声明类之后，`MyClass::$name=”Alpha”` 命令将字符串 `“Alpha”` 赋给 `MyClass` 类的 `$name` 静态字段。这里，你应该注意如何访问
    `MyClass` 类的静态字段 `$name`：由于你是在类外部访问该字段，因此需要使用包含类名的 `MyClass::$name` 指令。同样值得注意的是，你尚未为
    `MyClass` 类创建对象，并且也不打算创建它们。


    `MyClass::hello()` 和 `MyClass::rename(“Bravo”)` 命令用于调用静态方法。在第一种情况下，会显示 `MyClass`
    类的静态字段 `$name` 的值，而第二个命令将该字段设置为 `“Bravo”`（之后在程序中再次调用 `hello()` 方法）。


