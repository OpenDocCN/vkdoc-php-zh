- fmt: "# Navigation Menu Design\n\nPicking the right menu design option for your\
    \ site requires a deep understanding of the information hierarchy of the site,\
    \ especially the product hierarchy. You need to consider things like the following:\n\
    \n- How the client/storeowner categorizes their products\n- How competitors categorize\
    \ the same or similar products\n- How customers categorize products\n- Whether\
    \ the categories are “deep” (fewer top-level categories, with lots of subcategories\
    \ and sub-subcategories) or “broad” (more top-level categories with fewer or no\
    \ subcategories)\n- The level to which categories overlap\n- The facets of the\
    \ products that need to be filtered or searched on\n- Whether the site is “content-heavy”\
    \ (e.g., contains a large number of blog posts and articles)\n\nThis list can\
    \ be a bit daunting, but it’s an important thing to consider when working out\
    \ what sort of scale your navigation menus need. If the store only sells 2-3 products,\
    \ you can skip categorization altogether; if it sells 50, you’ll probably be fine\
    \ with just categories; and if it sells 500+, you’re going to need at least two\
    \ levels of categorization.\n\nIt’s important here to be aware of the (oft-lamented)\
    \ limitations of the Shopify backend when it comes to categorization. Strictly\
    \ speaking, we’re only allowed one “real” level of categorization (“Collections”\
    \ in Shopify parlance). There’s no inherent notion of a subcategory. What we do\
    \ get instead are a couple of different fields on products that allow us to group\
    \ them: Tags, Product Types, and Product Vendors. Tags are most often used to\
    \ approximate subcategory functionality.\n\nMy general advice in almost every\
    \ area of Shopify development is to avoid being too clever and that pushing the\
    \ boundaries too far leads to trouble. As a corollary to that, I don’t recommend\
    \ trying to implement sub-subcategories with Shopify unless you have a very clear\
    \ need and a maintainable approach (perhaps with application support).\n\nFor\
    \ the example store, I’m using the “Apparel” sample product data provided by Shopify.\
    \ This gives us an inventory of 25 products, covering some clothing (men’s and\
    \ women’s), bags, and some accessories. Given the spread of products and how the\
    \ customers are likely to think about them, I’m going to work with four primary\
    \ product categories for this store: Mens, Womens, Bags, and Accessories. As each\
    \ of these categories will only have 4-5 products in them, I’m not going to subcategorize\
    \ them just yet.\n\nIn addition to this product hierarchy, I’m going to work on\
    \ the assumption that there are several content pages considered important by\
    \ the storeowner—About, Reviews, and Press. I’d also like to provide customers\
    \ a shortcut to get to the most popular products, which we could do through a\
    \ link to a Best Sellers collection. Based on this information, the final example\
    \ information hierarchy for the main navigation menu looks like this:\n\n- Shop\n\
    \  - Womens\n  - Mens\n  - Bags\n  - Accessories\n- Best Sellers\n- About\n- Reviews\n\
    - Press\n\nOnce we have a hierarchy together, we need to decide how to best implement\
    \ that on the storefront. Given that Shopify doesn’t natively support hierarchical\
    \ navigation menus (yet—at the time of writing, this feature is in beta), the\
    \ standard way to implement these is to:\n\n1. Create a new Navigation menu in\
    \ the Shopify Admin for each submenu, with a name matching its top-level name\
    \ (in this example, this would mean creating a new navigation menu called Shop\
    \ that contained links to the Womens, Mens, Bags, and Accessories collections).\n\
    2. While iterating through the top-level menu items, update the Liquid code to\
    \ check to see if a submenu exists for the current item. If so, render that submenu\
    \ by iterating over its items in turn.\n\nYou can see how I’ve implemented this\
    \ for the example store in the Shopify Admin (see Figure [4-5](#A437216_1_En_4_Chapter.html#Fig5))\
    \ and in the `header.liquid` section (see Listing [4-5](#A437216_1_En_4_Chapter.html#Par76)),\
    \ with the result on the frontend (see Figure [4-6](#A437216_1_En_4_Chapter.html#Fig6)).\n\
    \n![A437216_1_En_4_Fig6_HTML.jpg](A437216_1_En_4_Fig6_HTML.jpg)\n\nFigure 4-6:\
    \ The resulting simple dropdown menu on the Example Theme storefront\n\n![A437216_1_En_4_Fig5_HTML.jpg](A437216_1_En_4_Fig5_HTML.jpg)\n\
    \nFigure 4-5: Configuration of a sub-navigation menu in the Shopify Admin\n\n\
    ```\n{%- for link in primary_link_list.links -%}\n{%- assign child_link_list_handle\
    \ = link.title | handle -%}\n{%- assign child_link_list = linklists[child_link_list_handle]\
    \ -%}\n{%- if child_link_list and child_link_list.links.size > 0 -%}\n{%- assign\
    \ has_child_link_list = true %}\n{%- else- %}\n{%- assign has_child_link_list\
    \ = false %}\n{%- endif -%}\n\n{{ link.title | escape }}\n\n{%- if has_child_link_list\
    \ -%}\n\n{%- for child_link in child_link_list.links -%}\n{{ child_link.title\
    \ | escape }}\n{%- endfor -%}\n\n{%- endif -%}\n\n{%- endfor -%}\n```\nListing\
    \ 4-5: The Navigation Menu Link Loop Updated to Handle Submenu Navigation Items\n\
    \n## Design Guidelines for Dropdown Menus\n\n- **Limit menu options:** Try to\
    \ avoid any menus with more than seven options, as this begins to create too much\
    \ mental overhead for users. If you feel you need more than this, consider adding\
    \ another level of hierarchy or just relying on a smooth filtering experience\
    \ on collection pages to let users narrow down their results. Remember that this\
    \ is a limit, not a goal—ASOS has only three top-level menu items on their store\
    \ (Home, Men, and Women).\n- **Keep dropdowns to a single level:** Although it’s\
    \ tempting to add submenus on the side of a dropdown, research shows they’re fiddly\
    \ and tricky for users. This is especially true when dropdowns are hover-activated—users\
    \ “lose” the menu unless they are very careful with the mouse. If you need to\
    \ be able to display a larger category range, consider a mega-menu, discussed\
    \ in the next section.\n- **Activate dropdowns via a click, not a hover:** This\
    \ means you don’t have to worry about a difference experience for touch devices\
    \ like mobile and tablet (where you don’t get a hover event). It also allows you\
    \ to keep an opened menu in place even if the cursor leaves the menu, avoiding\
    \ a major source of frustration for users and potential accessibility issues.\n\
    \nThe dropdown menu in Figure [4-7](#A437216_1_En_4_Chapter.html#Fig7) is an example\
    \ of a menu with a number of problems. First, it’s far too long, meaning customers\
    \ have to scroll just to see all the options. Second, it’s hover-activated and\
    \ closes instantly when the mouse leaves it (very common when scrolling to see\
    \ the bottom). Finally, it has submenus that suffer from the same hover problems\
    \ and that aren’t hinted at by the main menu (by a right-angled chevron, for example).\n\
    \n![A437216_1_En_4_Fig7_HTML.jpg](A437216_1_En_4_Fig7_HTML.jpg)\n\nFigure 4-7:\
    \ A dropdown menu with a number of usability problems"
