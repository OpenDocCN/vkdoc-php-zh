- fmt: "```xml\n<soap:body use=\"encoded\"\nnamespace=http://localhost/math.wsdl\n\
    encodingStyle=\"http://schemas.xmlsoap.org/soap/encoding/\"/>\n</output>\n</operation>\n\
    </binding>\n<service name=\"MathService\">\n<port name=\"MathPort\" binding=\"\
    MathBinding\">\n<soap:address location=\"http://localhost/14_15.php\"/>\n</port>\n\
    </service>\n</definitions>\n\nWith this new definition of the data structure the\
    \ examples `14_13.php` and `14_15.php` can be simplified to the code shown in\
    \ example `14_15.php` and `14_16.php`.\n\n```php\n// 14_15.php\ninclude \"./14_12.php\"\
    ;\n$server = new SOAPServer('math.wsdl', ['encoding'=>'UTF-8']);\n$server->setClass('Math');\n\
    $server->handle();\n```\n\nThe code in `14_15.php` is designed to work as the\
    \ server side. In this case the `math.wsdl` file is located in the same folder\
    \ as the PHP script and is loaded from the server.\n\n```php\n// 14_16.php\n$client\
    \ = new SoapClient('https://localhost/math.wsdl');\necho $return = $client->Add(5,\
    \ 2) . \"\\n\";\necho $return = $client->Subtract(5, 2) . \"\\n\";\necho $return\
    \ = $client->Multiply(5, 2) . \"\\n\";\n```\n\nIn the client example the wsdl\
    \ file is loaded from the server. It could also be loaded locally to save a web\
    \ request but the soap client supports caching of the wsdl file preventing it\
    \ from being loaded on every request. The cache is usually stored in the `/tmp`\
    \ directory and it must be cleared manually if the wsdl file is updated on the\
    \ server.\n\n## Chapter 14: XML, RSS, WDDX, and SOAP\n\nWith the use of a wsdl\
    \ file the client becomes more like 'normal' PHP code. When the wsdl file is loaded\
    \ the `SoapClient` will create magic functions for each of the methods defined\
    \ and these can now be called directly.\n\nIf the server defines additional methods\
    \ that are not included in the wsdl file it is still possible to call these, but\
    \ only with the use of the `__soapCall()` method.\n\nThe soap functions can be\
    \ used over HTTPS to make the requests more secure. It is also recommended that\
    \ if sensitive data is being transferred the server the client should make use\
    \ of additional parameters to pass credentials. This can be done in the same way\
    \ as other parameters and the values can be exchanged by some other means before\
    \ the client can make calls and the server will validate the credentials before\
    \ returning any values to the client. This makes it possible to revoke the access\
    \ to a client from the server side by invalidating the credentials.\n\n## Chapter\
    \ 15: Data Exchange with JSON\n\nChapter [14 co](http://dx.doi.org/10.1007/978-1-4842-0605-8_14)vered\
    \ the use of XML to exchange date between a client and a server. When the client\
    \ is created with JavaScript in a browser it's much easier to exchange data with\
    \ something called JSON. JSON is an acronym for JavaScript Object Notation. It\
    \ is a sting-like notation that makes it easy to declare complex structures like\
    \ arrays and object.\n\n### Recipe 15-1\\. Fetching Data with AJAX\n\n#### Problem\n\
    \nTraditionally a browser is used to fetch HTML pages from a server. Navigation\
    \ to a different page on the same or different server is done with links in the\
    \ HTML document. When a user clicks on a link the browser will fetch and render\
    \ the content of the new page.\n\nAs the web technology evolves and in order to\
    \ reduce load time it's becoming more common to load part of a page and when the\
    \ user clicks on a read more link or scrolls to the bottom of the page, the browser\
    \ will fetch additional content and render it inline without reloading the existing\
    \ document.\n\n#### Solution\n\nThe technology to use is an AJAX request. This\
    \ is a section of JavaScript code that will perform an HTTP request to a server\
    \ (usually the same server where the page was loaded from) and the response will\
    \ be used to insert additional content into the HTML document.\n\nThe simple approach\
    \ is to have the server generate the HTML that needs to be added and simply append\
