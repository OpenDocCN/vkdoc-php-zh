- fmt: '## Comparing Arrays


    Another important procedure is comparing arrays for equality or inequality. Two
    arrays are considered equal if they have the same set of elements, including the
    keys of those elements and their values. But here, you should consider the automatic
    type casting involved when comparing arrays. Namely, if the `==` and `!=` operators
    are used to compare arrays, then the comparison is performed considering the automatic
    type conversion. If you want to compare arrays without involving the automatic
    type casting, you should use the `===` and `!==` operators. Here, only the values
    of the elements are considered. The keys are compared for a match involving the
    automatic type casting in any case. An example of how arrays are compared is shown
    in Listing [4-10](#613529_1_En_4_Chapter.xhtml#PC22).


    ```

    $A=["0"=>123,1=>true,2=>""];

    $B=["123",10,0];

    $C=[0=>123,"1"=>true,"2"=>""];

    $D=[0=>123,1=>true,3=>""];

    // Compares the arrays:

    if($A==$B){

    echo ''$A==$B'',"\n";

    }

    if($A!==$B){

    echo ''$A!==$B'',"\n";

    }

    if($A===$C){

    echo ''$A===$C'',"\n";

    }

    if($A!=$D){

    echo ''$A!=$D'',"\n";

    }

    ?>

    Listing 4-10

    Comparing Arrays

    ```


    The result of the program’s execution is as follows.


    ```

    The output of the program (from Listing 4-10)

    $A==$B

    $A!==$B

    $A===$C

    $A!=$D

    ```


    There is the `$A=["0"=>123,1=>true,2=>""]` array, which is compared to the `$B=["123",10,0]`,
    `$C=[0=>123,"1"=>true,"2"=>""]` arrays and `$D=[0=>123,1=>true,3=>""]`. It appears
    that the `$A==$B` condition is true. The reason is like that. The elements of
    the `$A` array have the `"0"`, `1`, and `2` keys, and the values `123`, `true`,
    and `""` respectively. The elements of the `$B` array have the `0`, `1`, and `2`
    keys (auto-calculated), and the values of the corresponding elements are `"123"`,
    `10`, and `0`. The keys match because `"0"` is automatically converted to `0`.
    The value `"123"` is converted to `123`, the non-zero number `10` is equivalent
    to `true`, and the empty string `""` is converted to the zero value `0`.


    ![](images/613529_1_En_4_Chapter/613529_1_En_4_Figg_HTML.gif)An illustration of
    a bell symbol. **The PHP 8 Standard**


    In PHP 8, the empty string `""` is not equal to the number `0`. Therefore, in
    PHP 8, `$A==$B` is not true.


    If the automatic type conversion is not involved, then the values of the elements
    of the arrays `$A` and `$B` are different, so the `$A!==$B` expression is true.


    In the `$C` array, the values of the elements are the same as in the `$A` array.
    Although the elements’ keys in the `$C` array are different from those in the
    `$A` array, the keys are interpreted as the same due to the automatic type casting.
    Therefore, the `$A===$C` condition is true. Finally, the `$D` array is compared
    to the `$A` array, and only one of the keys differs. That is enough for the `$A!=$D`
    condition to be true.


    ## Functions for Handling Arrays


    Many interesting operations with arrays can be performed using special functions.
    One is the `list()` function (frankly, it is not a function but a special syntax
    construction). The format for using the function is as follows.


    ```

    list(variables)=array

    ```


    You pass variables as arguments to the function (and these variables may have
    no values at all) and assign an array to that expression. The consequences are
    as follows: the variable specified as the first argument of the `list()` function
    is assigned the first element of the array, the second variable in the argument
    list of the `list()` function is assigned the second element of the array, and
    so on. Some arguments can be skipped, and the count may not match the count of
    array elements. Examples of using the `list()` function are shown in Listing [4-11](#613529_1_En_4_Chapter.xhtml#PC25).


    ```

    Listing 4-11

    Extracting Values from an Array

    ```


    The following is the program’s output.


    ```

    The output of the program (from Listing 4-11)

    $x = 1

    $y = 3

    $z = 4

    ```


    The `$A=[1,2,3,4,5]` array is assigned as the value in the `list($x,,$y,$z)=$A`
    statement. The command is executed as follows. The value `1` of the first element
    of the `$A` array is stored in the `$x` variable. The next argument of `list()`
    is omitted, so the element with the value `2` is not written anywhere. The value
    `3` is written to the `$y` variable, the value `4` is written to the `$z` variable,
    and the value `5` is not written anywhere because the corresponding variable is
    not specified in the `list()` argument list.


    There are also some other functions and utilities that can be useful when handling
    arrays. For example, the `array_keys()` function returns an array with the keys
    of the array passed as an argument to the function. The `array_combine()` function
    allows you to create an array based on two arrays: one defines the keys, and the
    second defines the values of the elements. Another useful function is `range()`,
    which creates an array with the values of the elements in the specified range
    (function arguments). The `array_pop()` function removes the last element from
    the array, and the `array_push()` function adds an element (or elements) to the
    end of the array. The `array_slice()` function allows you to get a slice of an
    array (that is, extract a subarray from the array). The first argument of the
    function is the array to be sliced. The second argument is the index of the element
    from which the slice is to be performed. If that argument is negative, then the
    index is counted from the last element of the array (`-1` means the last element,
    `-2` means the last but one element, and so on). The third argument specifies
    the number of elements in the slice.


    ![](images/613529_1_En_4_Chapter/613529_1_En_4_Figf_HTML.jpg)An i symbol.Note


    In general, there are a lot of functions for manipulating arrays. A separate book
    could be devoted to their description.


    Listing [4-12](#613529_1_En_4_Chapter.xhtml#PC27) is a program in which the functions
    described are used.


    ```

    <?php

    $K=["X","Y","Z"];

    $A=[100,200,300];

    $A=["X"=>100,"Y"=>200,"Z"=>300];

    print("Array \$A:\n");

    print_r($A);

    // The third array:

    $B=array_keys($A);

    print("Array \$B:\n");

    print_r($B);

    // The fourth array:

    $C=array_combine($K,$B);

    print("Array \$C:\n");

    print_r($C);

    array_pop($C);

    print("Array \$C:\n");

    print_r($C);

    array_push($C,"A","B");

    print("Array \$C:\n");

    print_r($C);

    // The fifth array:

    $D=array_slice($C,0,3);

    print("Array \$D:\n");

    print_r($D);

    // The sixth array:

    $E=array_slice($C,-3,2);

    print("Array \$E:\n");

    print_r($E);

    ?>

    Listing 4-12

    Functions for Handling Arrays

    ```


    The following is the program’s output.'
