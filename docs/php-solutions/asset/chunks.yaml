    Next, create the `<select>` drop-down menu to display the images already registered
    in the database. Add this code immediately after the code you inserted in step
    5:


    ```

    <p>

    <label for="image_id">Uploaded image:</label>

    <select name="image_id" id="image_id">

    <option value="">Select image</option>

    <?php

    // get the list of images

    $getImages = ''SELECT image_id, filename

    FROM images ORDER BY filename'';

    $images = $conn->query($getImages);

    while ($row = $images->fetch_assoc()) {

    ?>

    <option value="<?= $row[''image_id'']; ?>"

    <?php

    if (isset($_POST[''image_id'']) && $row[''image_id''] ==

    $_POST[''image_id'']) {

    echo ''selected'';

    }

    ?>

    ><?php echo $row[''filename'']; ?></option>

    <?php } ?>

    </select>

    </p>

    ```


    This creates another `SELECT` query to get the primary key and filename of each
    image stored in the `images` table. The code should be very familiar by now, so
    it needs no explanation.


    The check box, file input field, and text input field for the caption go between
    the code in the previous step and the Submit button. The code looks like this:


    ```

    <p id="allowUpload">

    <input type="checkbox" name="upload_new" id="upload_new">

    <label for="upload_new">Upload new image</label>

    </p>

    <p class="optional">

    <label for="image">Select image:</label>

    <input type="file" name="image" id="image">

    </p>

    <p class="optional">

    <label for="caption">Caption:</label>

    <input name="caption" type="text" id="caption">

    </p>

    ```


    The paragraph that contains the check box has been given the ID `allowUpload`,
    and the two other paragraphs have been assigned a class called `optional`. The
    style rules in `admin.css` set the display property of these three paragraphs
    to `none`.


    Save `blog_insert_mysqli.php` and load the page in a browser. The `images <select>`
    drop-down menu is displayed below the `categories` list, but the three form elements
    you inserted in step 9 are hidden. This is what will be displayed if JavaScript
    is disabled in the browser. Users will have the option to select categories and
    an existing image but not to upload a new image.


    If necessary, check your code against `blog_insert_mysqli_03.php` in the `ch16`
    folder.


    Copy `toggle_fields.js` from the `ch16` folder to the `admin` folder. The file
    contains the following JavaScript:


    ```

    var cbox = document.getElementById(''allowUpload'');

    cbox.style.display = ''block'';

    var uploadImage = document.getElementById(''upload_new'');

    uploadImage.onclick = function () {

    var image_id = document.getElementById(''image_id'');

    var image = document.getElementById(''image'');

    var caption = document.getElementById(''caption'');

    var sel = uploadImage.checked;

    image_id.disabled = sel;

    image.parentNode.style.display = sel ? ''block'' : ''none'';

    caption.parentNode.style.display = sel ? ''block'' : ''none'';

    image.disabled = !sel;

    caption.disabled = !sel;

    }

    ```


    This uses the IDs of the elements inserted in step 8 to control their display.
    If JavaScript is enabled, the check box is automatically displayed when the page
    loads, but the file input field and text input field for the caption remain hidden.
    If the check box is checked, the drop-down menu of existing images is disabled,
    and the hidden elements are displayed. If the check box is subsequently unchecked,
    the drop-down menu is re-enabled, and the file input field and caption field are
    hidden again.


    Link `toggle_fields.js` to `blog_insert_mysqli.php` with a `<script>` tag just
    before the closing `</body>` tag, like this:


    ```

    </form>

    <script src="toggle_fields.js"></script>

    </body>

    ```


    Adding the JavaScript at the bottom of the page speeds up downloading and display.
    The code in `toggle_fields.js` won’t work correctly if you add it to the `<head>`.


    Save `blog_insert_mysqli.php` and load the page in a browser. In a JavaScript-enabled
    browser, the check box should be displayed between the `<select>` drop-down menu
    and the Submit button. Select the check box to disable the drop-down menu and
    display the hidden fields, as shown in Figure 16-9.


    ![A978-1-4842-0635-5_16_Fig9_HTML.jpg](A978-1-4842-0635-5_16_Fig9_HTML.jpg)


    **Figure 16-9.** The check box controls the display of the file and caption input
    fields.


    Deselect the check box. The file and caption input fields are hidden, and the
    drop-down menu is re-enabled. You can check your code, if necessary, with `blog_insert_mysqli_04.php`
    and `toggle_fields.js` in the `ch16` folder.


    If you’re wondering why I used JavaScript rather than PHP to control the display
    of the file and caption input fields, it’s because PHP is a server-side language.
    After the PHP engine has sent the output to the browser, it has no further interaction
    with the page unless you send another request to the web server. JavaScript, on
    the other hand, works in the browser, so it’s able to manipulate the content of
    the page locally. JavaScript can also be used in conjunction with PHP to send
    requests to the web server in the background, and it can use the result to refresh
    part of the page without reloading it—a technique known as Ajax, which is beyond
    the scope of this book.


    The updated insert form now has input fields for categories and images, but the
    processing script still handles only the text input field for the title and the
    text area for the blog entry.

