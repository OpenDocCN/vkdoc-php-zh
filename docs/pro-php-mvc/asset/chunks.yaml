    Caching is an important part of any large-scale application. It’s also not particularly
    hard to create a caching solution; the hard part is using it correctly. Whenever
    you need to make repeated requests for data or to any third-party service, consider
    using caching. Whenever you need to make repeated requests to the database or
    file system, consider using caching. You will almost always benefit from the use
    of caching, provided you only cache that which would take longer to retrieve if
    you weren’t using cache in the first place.


    Questions


    1\. We created a cache driver that connects to a Memcached server to store, retrieve,
    and erase cached data. Isn’t this slower than caching to files on the server?


    2\. Can you think of any other benefits of using Memcached over other forms of
    caching offered to us?


    Answers


    1\. File I/O (storing/retrieving data from files on the server) is notoriously
    slow. Network requests over a fast network to an efficient server are, by comparison,
    much faster.


    2\. huge benefit of using a centralized cache server (such as Memcached) is that
    our application might be running over a number of load-balanced web servers. If
    they were to manage their own cache files, we might have a lot of work to do so
    that they don’t needlessly re-create the cached data.


