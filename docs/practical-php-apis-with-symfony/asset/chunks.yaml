    the **createToken** method, which must fit most use cases. Below you can see the
    authenticator code:


    ```

    namespace App\Security;

    use Symfony\Component\HttpFoundation\JsonResponse;

    use Symfony\Component\HttpFoundation\Request;

    use Symfony\Component\HttpFoundation\Response;

    use Symfony\Component\Security\Core\Authentication\Token\TokenInterface;

    use Symfony\Component\Security\Core\Exception\AuthenticationException;

    use Symfony\Component\Security\Core\Exception\CustomUserMessageAuthenticationException;

    use Symfony\Component\Security\Http\Authenticator\AbstractAuthenticator;

    use Symfony\Component\Security\Http\Authenticator\Passport\Badge\UserBadge;

    use Symfony\Component\Security\Http\Authenticator\Passport\Passport;

    use Symfony\Component\Security\Http\Authenticator\Passport\SelfValidatingPassport;

    class ApiTokenAuthenticator extends AbstractAuthenticator

    {

    public function supports(Request $request): ?bool

    {

    return $request->headers->has(''X-AUTH-TOKEN'') || preg_match(''#\/api\/v1#'',
    $request->getUri());

    }

    public function authenticate(Request $request): Passport

    {

    $apiToken = $request->headers->get(''X-AUTH-TOKEN'');

    if (empty($apiToken)) {

    throw new CustomUserMessageAuthenticationException(''No API token provided'');

    }

    return new SelfValidatingPassport(new UserBadge($apiToken));

    }

    public function onAuthenticationSuccess(Request $request, TokenInterface $token,
    string $firewallName): ?Response

    {

    return null;

    }

    public function onAuthenticationFailure(Request $request, AuthenticationException
    $exception): JsonResponse

    {

    $data = [

    ''message'' => strtr($exception->getMessageKey(), $exception->getMessageData())

    ];

    return new JsonResponse($data, Response::HTTP_UNAUTHORIZED);

    }

    }

    ```


    Let’s go through the authenticator methods step by step:


    *   **supports**: It decides whether the authenticator will be processed or not.
    The authenticator will be executed if the X-AUTH-TOKEN header has been sent or
    the request URI matches the */api/v1* pattern. By implementing this approach,
    we can effectively handle requests that do not include a token without compromising
    security.


    *   **authenticate**: First, it checks whether the token is empty. If so, it throws
    an exception. Otherwise, it returns a [SelfValidatingPa​ssport](https://symfony.com/doc/current/security/custom_authenticator.html%2523self-validating-passport)
    with the API token as a badge. After returning, the security bundle will check
    whether the token is registered or not.


    When configuring the User Provider, we will understand how the security layer
    validates the token.


    *   **onAuthenticationSuccess**: It is only executed when the authentication succeeds.
    It would be used, for instance, to update a user’s valid login counter. In this
    case, we will leave it empty so that the process can continue.


    *   **onAuthenticationFailure**: It is only executed when the authentication fails.
    In this case, it returns a JSON response with an authentication error message
    and a *401 Unauthorized* code.


    ### The Firewall and the User Provider


    Both the firewall and the user provider must be defined in the Symfony *config/packages/security.yaml*
    file. Let’s show it:


    #### The User Provider


    We are using the [entity-user-provider](https://symfony.com/doc/current/security/user_providers.html%2523security-entity-user-provider)
    as a user provider.


    ```

    security:

    # .......

    providers:

    users_provider:

    entity:

    class: App\Entity\User

    property: token

    ```


    This provider uses the doctrine bundle to search on the User entity for a user
    whose token matches the token sent within the request headers. After the **authenticate**
    method returns the **SelfValidatingPassport**, the security layer will use this
    provider to check whether the token is valid or not.


    #### The Firewall


    The Firewall will protect all requests whose URI matches the *^/api/v1* pattern.
    It will authenticate users using the [ApiTokenAuthenticator](#663561_1_En_2_Chapter.xhtml#Sec6)
    and the users to compare with will be loaded using the provider configured in
    the previous section.


    ```

    firewalls:

    # Other firewalls

    api:

    pattern: ''^/api/v1''

    provider: users_provider

    stateless: true

    custom_authenticators:

    - App\Security\ApiTokenAuthenticator

    ```


    The *stateless* parameter indicates whether the firewall should be stateless or
    stateful. When set to *true*, it indicates that Symfony will not store the user’s
    authentication information in the session. This is useful when authenticating
    an API within a token since the token is sent within the headers on every request.


    ### Conclusion


    We have achieved that only authorized users with valid credentials will be granted
    access to the API by using a Symfony authenticator. In the next section, we will
    extend our security measures beyond the endpoint to encompass individual operations.
    We’ll explore the utilization of Symfony voters, a flexible authorization system
    within Symfony.'
  trans: '

    ### 向数据库填充用户数据


    借助 Symfony Fixtures Bundle，我们可以创建充当数据库加载服务的类。这些服务必须位于 `src/DataFixtures` 文件夹下，并且必须继承
    `Doctrine\Bundle\FixturesBundle\Fixture` 类。让我们创建一个 Fixture 类，用于向 `User` 实体填充用户数据：


    ```

    namespace App\DataFixtures;

    use App\Entity\User;

    use Doctrine\Bundle\FixturesBundle\Fixture;

    use Doctrine\Persistence\ObjectManager;

    class UserFixtures extends Fixture

    {

    public function load(ObjectManager $manager): void

    {

    $user = new User();

    $user->setToken(''vWvn1GOu2Lx5foFgQrRp'');

    $user->setRoles([''ROLE_USER'']);

    $user->setEmail(''spiderman@avengers.com'');

    $user2 = new User();

    $user2->setToken(''zPLhK8iQqg9fg7u5jnp'');

    $user2->setRoles([''ROLE_SENDER'']);

    $user2->setEmail(''captain-america@avengers.com'');

    $manager->persist($user);

    $manager->persist($user2);

    $manager->flush();

    }

    }

    ```


    `load` 方法接收 Doctrine 的 `ObjectManager` 服务作为参数。在该方法内部，我们创建了两个用户，一个具有 `ROLE_USER`
    角色，另一个具有 `ROLE_SENDER` 角色。然后，我们使用 `ObjectManager` 的 `persist` 和 `flush` 方法将它们保存到数据库中。


    要执行 fixture 并将用户数据加载到数据库，我们必须执行以下命令：


    *   第一个命令只需要执行一次。它创建数据库模式，以便下一个命令能够成功加载数据行。如果你之前已创建数据库，则必须在再次创建之前使用 `doctrine:schema:drop`
    命令删除它。在真实环境中，请考虑使用 Doctrine 迁移。


    ```

    bin/console doctrine:schema:create

    bin/console doctrine:fixtures:load

    ```


    命令执行完毕后，我们的用户表就已经加载好了，可以开始下一节的内容了。


    ### 结论


    在本节中，我们创建了 `User` 实体，它代表了存储在数据库中的、可以访问我们 API 的用户。在下一节中，我们将创建一个 Symfony 防火墙，它能够保护我们的
    API 端点，并只允许经过身份验证的用户访问。


    ## 第 2 节：保护端点


    为了确保只有经过身份验证的用户才能访问我们的 API 端点，我们将使用自定义的 [Symfony 身份验证器](https://symfony.com/doc/current/security/custom_authenticator.html)来实现基于令牌的身份验证。它将从请求头中提取令牌，进行验证，如果令牌有效，则用户身份验证成功；否则，将向客户端返回身份验证失败的信息。


    ### 操作身份验证器


    该身份验证器服务继承了 [AbstractAuthenti​cator](https://github.com/symfony/symfony/blob/current/src/Symfony/Component/Security/Http/Authenticator/AbstractAuthenticator.php)
    类，该类实现了 [AuthenticatorInt​erface](https://github.com/symfony/symfony/blob/current/src/Symfony/Component/Security/Http/Authenticator/AuthenticatorInterface.php)
    接口。所有身份验证器都必须实现此接口。`AbstractAuthenticator` 定义了 `createToken` 方法，该方法应能满足大多数用例。下面你可以看到身份验证器的代码：


    ```

    namespace App\Security;

    use Symfony\Component\HttpFoundation\JsonResponse;

    use Symfony\Component\HttpFoundation\Request;

    use Symfony\Component\HttpFoundation\Response;

    use Symfony\Component\Security\Core\Authentication\Token\TokenInterface;

    use Symfony\Component\Security\Core\Exception\AuthenticationException;

    use Symfony\Component\Security\Core\Exception\CustomUserMessageAuthenticationException;

    use Symfony\Component\Security\Http\Authenticator\AbstractAuthenticator;

    use Symfony\Component\Security\Http\Authenticator\Passport\Badge\UserBadge;

    use Symfony\Component\Security\Http\Authenticator\Passport\Passport;

    use Symfony\Component\Security\Http\Authenticator\Passport\SelfValidatingPassport;

    class ApiTokenAuthenticator extends AbstractAuthenticator

    {

    public function supports(Request $request): ?bool

    {

    return $request->headers->has(''X-AUTH-TOKEN'') || preg_match(''#\/api\/v1#'',
    $request->getUri());

    }

    public function authenticate(Request $request): Passport

    {

    $apiToken = $request->headers->get(''X-AUTH-TOKEN'');

    if (empty($apiToken)) {

    throw new CustomUserMessageAuthenticationException(''未提供 API 令牌'');

    }

    return new SelfValidatingPassport(new UserBadge($apiToken));

    }

    public function onAuthenticationSuccess(Request $request, TokenInterface $token,
    string $firewallName): ?Response

    {

    return null;

    }

    public function onAuthenticationFailure(Request $request, AuthenticationException
    $exception): JsonResponse

    {

    $data = [

    ''message'' => strtr($exception->getMessageKey(), $exception->getMessageData())

    ];

    return new JsonResponse($data, Response::HTTP_UNAUTHORIZED);

    }

    }

    ```


    让我们逐步分析身份验证器的方法：


    *   **supports**：它决定是否处理该身份验证器。如果请求头中包含 `X-AUTH-TOKEN`，或者请求 URI 匹配 `/api/v1` 模式，则执行此身份验证器。通过实现这种方法，我们可以有效处理不包含令牌的请求，同时又不会损害安全性。


    *   **authenticate**：首先，它检查令牌是否为空。如果为空，则抛出异常。否则，它将返回一个 [SelfValidatingPa​ssport](https://symfony.com/doc/current/security/custom_authenticator.html%2523self-validating-passport)，并将
    API 令牌作为徽章传递。返回后，安全组件将检查该令牌是否已注册。


    在配置 User Provider 时，我们将了解安全层如何验证令牌。


    *   **onAuthenticationSuccess**：仅在身份验证成功时执行。例如，可用于更新用户的有效登录计数器。在本例中，我们将其留空，以便流程继续执行。


    *   **onAuthenticationFailure**：仅在身份验证失败时执行。在这种情况下，它会返回一个包含身份验证错误消息和 `401 Unauthorized`
    状态码的 JSON 响应。


    ### 防火墙与用户提供器


    防火墙和用户提供器都必须在 Symfony 的 `config/packages/security.yaml` 文件中定义。下面我们来展示一下：


    #### 用户提供器


    我们使用 [entity-user-provider](https://symfony.com/doc/current/security/user_providers.html%2523security-entity-user-provider)
    作为用户提供器。


    ```

    security:

    # .......

    providers:

    users_provider:

    entity:

    class: App\Entity\User

    property: token

    ```


    此提供器使用 Doctrine 包在 `User` 实体中查找令牌与请求头中发送的令牌匹配的用户。在 `authenticate` 方法返回 `SelfValidatingPassport`
    后，安全层将使用此提供器检查令牌是否有效。


    #### 防火墙


    防火墙将保护所有 URI 匹配 `^/api/v1` 模式的请求。它将使用 ApiTokenAuthenticator 对用户进行身份验证，并使用上一节配置的提供器加载用于比较的用户。


    ```

    firewalls:

    # 其他防火墙

    api:

    pattern: ''^/api/v1''

    provider: users_provider

    stateless: true

    custom_authenticators:

    - App\Security\ApiTokenAuthenticator

    ```


    `stateless` 参数指示防火墙应该是无状态的还是有状态的。当设置为 `true` 时，表示 Symfony 不会将会话中的用户身份验证信息存储起来。这在基于令牌进行
    API 身份验证时非常有用，因为每次请求都会在请求头中发送令牌。


    ### 结论


    通过使用 Symfony 身份验证器，我们实现了只有持有有效凭据的授权用户才能访问 API。在下一节中，我们将把安全措施从端点扩展到单个操作。我们将探索 Symfony
    Voter 的使用，这是 Symfony 中一个灵活的授权系统。

    '
- fmt: '## Section 3. Protecting the Operations


    Our endpoint is now protected and only authenticated users can execute operations,
    so the next security goal is to enable the protection of those operations that
    require it. For example, some operations might only be executed by users with
    a specific role. To achieve this goal, we are going to use [Symfony voters](https://symfony.com/doc/current/security/voters.html).


    ### The Abstract Operation Voter


    Let’s start by writing an abstract operation voter that the rest of the operation
    voters will have to extend.


    ```php

    use App\Api\ApiOperation;

    use Symfony\Component\Security\Core\Authorization\Voter\Voter;

    abstract class OperationVoter extends Voter {

    protected function supports(string $attribute, mixed $subject): bool

    {

    return ($attribute === ''PERFORM'' && $subject instanceof ApiOperation);

    }

    }

    ```


    The `supports` method adds common logic for all voters which extends it. It checks
    that the attribute parameter holds the value `"PERFORM"` and that the subject
    parameter is an instance of the `ApiOperation` class. These couple of checks make
    sense, taking into account the current operation-oriented context:


    - We always check that the attribute holds the value `"PERFORM"` since we always
    want to perform an operation.

    - We always check that the subject is an `ApiOperation` instance so that we can
    check the operation name in the child class.


    ### The Operation Voter


    As we said in the previous section, an operation voter will have to extend from
    the abstract operation voter and implement the authorization logic. Let’s create
    a voter for the `SendPayment` operation which ensures that the authenticated user
    holds the `"ROLE_SENDER"` role.


    ```php

    use App\Security\Miscelanea\OperationNames;

    use Symfony\Component\Security\Core\Authentication\Token\TokenInterface;

    class SendPaymentVoter extends OperationVoter

    {

    protected function supports(string $attribute, mixed $subject): bool

    {

    if(parent::supports($attribute, $subject) && $subject->metadata->name === OperationNames::SendPayment->name){

    return true;

    }

    return false;

    }

    protected function voteOnAttribute(string $attribute, mixed $subject, TokenInterface
    $token): bool

    {

    if(!in_array(''ROLE_SENDER'', $token->getUser()->getRoles())) {

    return false;

    }

    return true;

    }

    }

    ```


    The `supports` method checks the attribute and the subject instance using the
    parent logic and also checks that the operation name is `"SendPayment"`. If the
    `supports` method returns `"true"`, Symfony will execute the `voteOnAttribute`
    method and check if the user holds the `ROLE_SENDER` role. If the user roles do
    not match the required ones, a 403 Forbidden response will be returned, and the
    operation execution will be halted.


    There could be situations where a set of operations share the same authorization
    rules. In this case, the same voter could authorize that set of operations. To
    achieve this, the voter `supports` method should check that the requested operation
    is part of that set. As an example, let’s imagine we have an operation named `"ApprovePayment"`
    and both `"SendPayment"` and `"ApprovePayment"` operations can only be performed
    by the `ROLE_SENDER`. We could create a new static method called `getPaymentOperations`
    in the `OperationNames` enum from Chapter [1](#663561_1_En_1_Chapter.xhtml). This
    method should return an array containing the `ROLE_SENDER` allowed operations,
    and the voter should check whether the requested operation is contained in that
    array.


    ```php

    enum OperationNames

    {

    case SendPayment;

    case ApprovePayment;

    public static function getPaymentOperations(): array

    {

    return [

    self::ApprovePayment->name,

    self::SendPayment->name

    ];

    }

    }

    ```


    As we can see, the `getPaymentOperations` method returns the allowed operations.
    Now in the voter, we should use it in the `supports` method:


    ```php

    use App\Security\Miscelanea\OperationNames;

    use Symfony\Component\Security\Core\Authentication\Token\TokenInterface;

    class SenderVoter extends OperationVoter

    {

    protected function supports(string $attribute, mixed $subject): bool

    {

    if(parent::supports($attribute, $subject) && in_array($subject->metadata->name,
    OperationNames::getPaymentOperations())){

    return true;

    }

    return false;

    }

    protected function voteOnAttribute(string $attribute, mixed $subject, TokenInterface
    $token): bool

    {

    if(!in_array(''ROLE_SENDER'', $token->getUser()->getRoles())) {

    return false;

    }

    return true;

    }

    }

    ```


    The above voter would grant access to all the operations contained in the array
    returned by the `getPaymentOperations` as long as the user’s role is `"ROLE_SENDER"`.


    There is an extra configuration we have to set up before checking the voter. Since
    we do not know if any voter is going to be executed or not, in the event that
    none have been executed, it would be considered that all voters have abstained.
    When this situation occurs, Symfony consults the security configuration parameter
    `"allow_if_all_abstain"`, which by default is `"false"`. We must change the value
    of this parameter to `"true"` since we want Symfony to allow us to execute the
    operation when no voter has been executed. If you want to query more information
    about the access decision strategy, you can read more in [the security symfony
    docs](https://symfony.com/doc/current/security/voters.html%2523changing-the-access-decision-strategy).


    We can change this configuration by setting the new value in the `config/packages/security.yaml`
    file:


    ```yaml

    security:

    access_decision_manager:

    strategy: unanimous

    allow_if_all_abstain: true

    ```


    ### Handling Access Denied Errors


    Symfony’s Security HTTP component monitors security errors through an exception
    listener. To tailor the “operation denied” response, we need to create a custom
    subscriber. This subscriber must be executed before the default security listener.
    We can achieve this by assigning a higher priority to our custom `AccessDeniedSubscriber`.


    ```php

    use Symfony\Component\EventDispatcher\EventSubscriberInterface;

    use Symfony\Component\HttpFoundation\JsonResponse;

    use Symfony\Component\HttpKernel\Event\ExceptionEvent;

    use Symfony\Component\HttpKernel\KernelEvents;

    use Symfony\Component\Security\Core\Exception\AccessDeniedException;

    class AccessDeniedSubscriber implements EventSubscriberInterface

    {

    public static function getSubscribedEvents(): array

    {

    return [

    KernelEvents::EXCEPTION => [''onException'', 2]

    ];

    }

    public function onException(ExceptionEvent $event): void

    {

    $exception = $event->getThrowable();

    if (!$exception instanceof AccessDeniedException) {

    return;

    }

    $event->setResponse(new JsonResponse(

    [ ''authorization'' => $exception->getMessage()],


    ));

    }

    }

    ```


    There are two important aspects in the above subscriber that we must pay attention
    to:


    - The subscriber’s priority is set to 2. This allows it to intercept “access denied”
    exceptions first and customize the response.

    - The subscriber ignores exceptions that are not instances of the `AccessDeniedException`.
    This is because these other errors will be handled by the `KernelSubscriber` as
    detailed in Chapter [1](#663561_1_En_1_Chapter.xhtml).'
