    \   }\n    }\n    if ($error) {\n    echo 'Image not found';\n    }\n    } ?>\n\
    \    ```\n\nFor PDO, use `$result->rowCount()`\n    in place of `$result->num_rows`.\n\
    \nIf no rows are returned by the query, 0 is treated by PHP as\n    implicitly\
    \ `false`, so the\n    condition fails, and the `else` clause is\n    executed\
    \ instead, setting `$error` to `true`.\n\nThe conditional statement that displays\
    \ “Image not found” could be\n    moved into an `else` block, but this\n    script\
    \ has several nested conditions. Keeping it separate makes it\n    easier to read\
    \ the script and follow the conditional logic.\n\n8.  Test the page again. When\
    \ you select an image from the drop-down\n    menu, it displays normally as before.\
    \ But if you try entering an\n    out-of-range value in the query string, you\
    \ see the following message\n    instead:\n\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Fign_HTML.jpg](images/332054_4_En_13_Chapter/332054_4_En_13_Fign_HTML.jpg)\n\
    \nThe amended code is in `mysqli_integer_03.php`\n    and `pdo_integer_03.php`\
    \ in\n    the `ch13`\n    folder.\n\nUsing Prepared Statements for User Input\n\
    Both MySQLi and PDO support prepared statements, which offer\nimportant security\
    \ features. A prepared statement is a template for an\nSQL query that contains\
    \ a placeholder for each value that is changeable.\nThis not only makes it easier\
    \ to embed variables in your PHP code but\nalso prevents SQL injection attacks\
    \ as quotes and other characters are\nautomatically escaped before the query is\
    \ executed.\nOther advantages of using prepared statements are that they’re more\n\
    efficient when the same query is used more than once. Also, you can bind\nthe\
    \ results from each column of a `SELECT` query to named\nvariables, making it\
    \ easier to display the output.\n\nBoth MySQLi and PDO use question marks as anonymous\
    \ placeholders, like\nthis:\n\n```\n$sql = 'SELECT image_id, filename, caption\
    \ FROM images WHERE caption LIKE ?';\n```\n\nPDO also supports the use of named\
    \ placeholders. A named placeholder\nbegins with a colon followed by an identifier,\
    \ like this:\n\n```\n$sql = 'SELECT image_id, filename, caption FROM images WHERE\
    \ caption LIKE :search';\n```\n\nNote\nPlaceholders are not wrapped in quotes,\
    \ even when the value they\nrepresent is a string. This makes it a lot easier\
    \ to build an SQL query\nbecause there’s no need to worry about getting the correct\
    \ combination\nof single and double quotes.\n\nPlaceholders can be used only for\
    \ column values. They can’t be used\nfor other parts of an SQL query, such as\
    \ column names or operators. This\nis because values that contain non-numeric\
    \ characters are automatically\nescaped and wrapped in quotes when the SQL is\
    \ executed. Column names and\noperators cannot be in quotes.\nPrepared statements\
    \ involve slightly more code than just submitting\nthe query directly, but placeholders\
    \ make the SQL easier to read and\nwrite, and the process is more secure.\nThe\
    \ syntax for MySQLi and PDO is different, so the following sections\ndeal with\
    \ them separately.\n\nEmbedding variables in MySQLi Prepared\nStatements\nUsing\
    \ a MySQLi prepared statement involves several stages.\n\nInitialize the statement\n\
    \nTo initialize the prepared statement, call the `stmt_init()` method on\nthe\
    \ database connection and store it in a variable, as follows:\n\n```\n$stmt =\
    \ $conn->stmt_init();\n```\n\nPrepare the statement\nYou then pass the SQL query\
    \ to the statement’s `prepare()` method.\nThis checks that you haven’t used question\
    \ mark placeholders in the\nwrong place, and that when everything is put together,\
    \ the query is\nvalid SQL.\nIf there are any mistakes, the `prepare()` method\
    \  returns `false`, so it’s common\nto enclose the next steps in a conditional\
    \ statement to ensure they run\nonly if everything is still okay.\nError messages\
    \ can be accessed through the statement’s `error` property.\n\nBind values to\
    \ the placeholders\nReplacing the question marks with the actual values held in\
    \ the\nvariables is technically known as **binding the\nparameters**. It’s this\
    \ step that protects your database from SQL\ninjection.\n\nPass the variables\
    \ to the statement’s `bind_param()`\nmethod  in the\nsame order as you want them\
    \ inserted into the SQL query, together with a\nfirst argument specifying the\
    \ data type of each variable, again in the\nsame order as the variables. The data\
    \ type must be specified by one of\nthe following four characters:\n\n*   `b`:\n\
    \    Binary (such as an image, Word document, or PDF file)\n\n*   `d`:\n    Double\
    \ (floating-point number)\n\n*   `i:`\n    Integer (whole number)\n\n*   `s:`\n\
    \    String (text)\n\nThe number of variables passed to `bind_param()` must be\n\
    exactly the same as the number of question mark placeholders. For\nexample, to\
    \ pass a single value as a string, use this:\n\n```\n$stmt->bind_param('s', $_GET['words'])\
    \ ;\n```\n\nTo pass two values, the `SELECT` query needs\ntwo question marks as\
    \ placeholders, and both variables need to be bound\nwith `bind_param()`, like\n\
    this:\n\n```\n$sql = 'SELECT * FROM products WHERE price stmt_init();\n$stmt->prepare($sql);\n\
    $stmt->bind_param('ds', $_GET['price'], $_GET['type']);\n```\n\nThe first argument\
    \ to `bind_param()`, `'ds'`, specifies `$_GET['price']` as a\nfloating-point number\
    \ and `$_GET['type']` as a\nstring.\n\nExecute the statement\nOnce the statement\
    \ has been prepared and the values have been bound\nto the placeholders, call\
    \ the statement’s `execute()` method . The result of a\n`SELECT` query\ncan then\
    \ be fetched from the statement object. With other types of\nqueries, this is\
    \ the end of the process.\n\nBinding the results (optional)\nOptionally, you can\
    \ bind the results of a `SELECT` query to\nvariables with the `bind_result()`\
    \ method.\nThis avoids the need to extract each row and then access the results\
    \ as\n`$row['column_name']` ."
  trans: "\n# 文档排版结果\n\n新查询通过 `query()` 方法提交给 MySQL，并将结果存储在 `$row` 中。最后，使用 `$row['filename']`\
    \ 和 `$row['caption']` 在页面中显示图像及其说明文字。\n\n然而，如果 `$error` 为 `true`，则最后的条件语句会显示“未找到图像”。\n\
    \n**提示** 我选择使用单独的条件语句来显示“未找到图像”，是因为计划稍后检查另一个错误，并希望两个错误共享同一条错误信息。\n\n2. 如果你使用的是\
    \ PDO 版本，请找到这一行：\n\n```\n$row = $result->fetch_assoc();\n```\n\n将其修改为：\n\n```\n\
    $row = $result->fetch();\n```\n\n3. 保存页面并加载到浏览器中。页面首次加载时，仅显示下拉菜单。\n\n4. 从下拉菜单中选择一个文件名，然后点击`Display`。你选择的图像应该会显示出来，如下面的截图所示：\n\
    \n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figm_HTML.jpg](img/332054_4_En_13_Figm_HTML.jpg)\n\
    \n如果遇到问题，请对照 `ch13` 文件夹中的 `mysqli_integer_02.php` 或 `pdo_integer_02.php` 检查你的代码。\n\
    \n5. 在浏览器中编辑查询字符串，将 `image_id` 的值改为一个字符串。你应该会看到“未找到图像”。但是，如果该字符串以 1 到 8 之间的数字开头，你将看到与该数字对应的图像和说明文字。\n\
    \n6. 尝试输入一个介于 1.0 到 8.9 之间的浮点数。对应的图像会正常显示。\n\n7. 尝试输入一个超出 1 到 8 范围的值。不会显示任何错误信息，因为查询本身没有问题。它只是查找一个不存在的值。在这个例子中，这无关紧要。你只会看到一个破损的图像图标。但通常情况下，你应该使用\
    \ MySQLi 的 `num_rows` 属性或 PDO 的 `rowCount()` 方法来检查查询返回的行数。\n\nMySQLi 的代码修改如下：\n\
    \n```\n$result = $conn->query($sql);\nif ($result->num_rows) {\n    $row = $result->fetch_assoc();\n\
    \    ?>\n    \">\n\n$error = true;\n    }\n}\nif ($error) {\n    echo 'Image not\
    \ found';\n}\n} ?>\n```\n\n对于 PDO，使用 `$result->rowCount()` 代替 `$result->num_rows`。\n\
    \n如果查询未返回任何行，PHP 会将 0 隐式视为 `false`，因此条件失败，转而执行 `else` 子句，将 `$error` 设为 `true`。\n\
    \n显示“未找到图像”的条件语句本可以移入 `else` 块中，但此脚本包含多个嵌套条件。将其分开处理能让脚本更容易阅读，并便于理解条件逻辑。\n\n8.\
    \ 再次测试页面。当你从下拉菜单中选择一张图像时，它会像之前一样正常显示。但如果你尝试在查询字符串中输入一个超出范围的值，则会看到以下信息：\n\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Fign_HTML.jpg](img/332054_4_En_13_Fign_HTML.jpg)\n\
    \n修改后的代码位于 `ch13` 文件夹中的 `mysqli_integer_03.php` 和 `pdo_integer_03.php` 文件。\n\n\
    ## 使用预处理语句处理用户输入\n\nMySQLi 和 PDO 都支持预处理语句，这提供了重要的安全特性。预处理语句是一种 SQL 查询模板，它为每个可变的值包含一个占位符。这不仅使在\
    \ PHP 代码中嵌入变量更加容易，而且还能防止 SQL 注入攻击，因为在执行查询之前，引号和其他字符会自动被转义。\n\n使用预处理语句的其他优势在于，当同一查询被多次使用时，效率更高。此外，你还可以将\
    \ `SELECT` 查询中每个列的结果绑定到命名变量，从而更容易显示输出。\n\nMySQLi 和 PDO 都使用问号作为匿名占位符，如下所示：\n\n\
    ```\n$sql = 'SELECT image_id, filename, caption FROM images WHERE caption LIKE\
    \ ?';\n```\n\nPDO 还支持使用命名占位符。命名占位符以冒号开头，后跟标识符，如下所示：\n\n```\n$sql = 'SELECT image_id,\
    \ filename, caption FROM images WHERE caption LIKE :search';\n```\n\n**注意** 占位符不需要用引号包裹，即使它们代表的值是字符串也是如此。这使得构建\
    \ SQL 查询变得容易得多，因为无需担心单引号和双引号的正确组合。\n\n占位符仅能用于列值。它们不能用于 SQL 查询的其他部分，例如列名或运算符。这是因为包含非数字字符的值在执行\
    \ SQL 时会自动转义并用引号包裹。列名和运算符不能用引号包裹。\n\n与直接提交查询相比，预处理语句需要稍多的代码，但占位符使 SQL 的读写更容易，且过程更安全。\n\
    \nMySQLi 和 PDO 的语法不同，因此以下部分将分别介绍它们。\n\n## 在 MySQLi 预处理语句中嵌入变量\n\n使用 MySQLi 预处理语句涉及多个阶段。\n\
    \n### 初始化语句\n\n要初始化预处理语句，请在数据库连接上调用 `stmt_init()` 方法并将其存储在一个变量中，如下所示：\n\n```\n\
    $stmt = $conn->stmt_init();\n```\n\n### 准备语句\n\n然后，将 SQL 查询传递给语句的 `prepare()`\
    \ 方法。这会检查你是否在错误的位置使用了问号占位符，并确保所有内容整合后，该查询是有效的 SQL。\n\n如果存在任何错误，`prepare()` 方法会返回\
    \ `false`，因此通常会将后续步骤包含在条件语句中，以确保仅在所有内容正常时才运行。\n\n可以通过语句的 `error` 属性访问错误信息。\n\n\
    ### 将值绑定到占位符\n\n将问号替换为变量中实际值的过程在技术上称为**绑定参数**。正是这一步保护你的数据库免受 SQL 注入攻击。\n\n按照变量插入\
    \ SQL 查询的相同顺序，将变量传递给语句的 `bind_param()` 方法，同时传递第一个参数来指定每个变量的数据类型，顺序同样与变量一致。数据类型必须由以下四个字符之一指定：\n\
    \n- `b`：二进制（如图像、Word 文档或 PDF 文件）\n- `d`：双精度（浮点数）\n- `i`：整数（整数）\n- `s`：字符串（文本）\n\
    \n传递给 `bind_param()` 的变量数量必须与问号占位符的数量完全一致。例如，要传递单个字符串值，可以使用：\n\n```\n$stmt->bind_param('s',\
    \ $_GET['words']);\n```\n\n要传递两个值，`SELECT` 查询需要两个问号作为占位符，并且两个变量都需要通过 `bind_param()`\
    \ 绑定，如下所示：\n\n```\n$sql = 'SELECT * FROM products WHERE price < ? AND type = ?';\n\
    $stmt = $conn->stmt_init();\n$stmt->prepare($sql);\n$stmt->bind_param('ds', $_GET['price'],\
    \ $_GET['type']);\n```\n\n`bind_param()` 的第一个参数 `'ds'` 指定 `$_GET['price']` 为浮点数，`$_GET['type']`\
    \ 为字符串。\n\n### 执行语句\n\n一旦语句被准备并且值被绑定到占位符，就调用语句的 `execute()` 方法。然后可以从语句对象中获取 `SELECT`\
    \ 查询的结果。对于其他类型的查询，此步骤即为过程的终点。\n\n### 绑定结果（可选）\n\n或者，你可以使用 `bind_result()` 方法将\
    \ `SELECT` 查询的结果绑定到变量。这避免了提取每一行后，再以 `$row['column_name']` 的形式访问结果的麻烦。\n"
- fmt: "为了绑定结果，你必须在`SELECT`查询中具体地命名每一列。按相同顺序列出你想使用的变量，并将它们作为参数传递给`bind_result()`。例如，假设你的SQL看起来像这样：\n\
    \n```php\n$sql = 'SELECT image_id, filename, caption FROM images WHERE caption\
    \ LIKE ?';\n```\n\n要绑定查询的结果，请使用以下代码：\n\n```php\n$stmt->bind_result($image_id,\
    \ $filename, $caption);\n```\n\n这允许你直接以`$image_id`、`$filename`和`$caption`的形式访问结果。\n\
    \n**存储结果（可选）**\n\n当你对`SELECT`查询使用预处理语句时，结果是无缓冲的。这意味着它们会保留在数据库服务器上，直到你获取它们。这样做的优点是需要更少的内存，特别是在结果集包含大量行的情况下。然而，无缓冲结果施加了以下限制：\n\
    \n*   一旦结果被获取，它们就不再存储在内存中。因此，你不能重复使用同一个结果集。\n*   在所有结果被获取或清除之前，你不能在同一数据库连接上运行另一个查询。\n\
    *   你不能使用`num_rows`属性来找出结果集中有多少行。\n*   你不能使用`data_seek()`来移动到结果集中的特定行。\n\n为了避免这些限制，你可以选择使用语句的`store_result()`方法来存储结果集。但是，如果你只是想立即显示结果而不在以后重用，则无需先存储它。\n\
    \n> **注意**\n> 要清除无缓冲结果，请调用语句的`free_result()`方法。\n\n**获取结果**\n\n要循环遍历已经通过预处理语句执行的`SELECT`查询的结果，请使用`fetch()`方法。如果你已将结果绑定到变量，请像这样操作：\n\
    \n```php\nwhile ($stmt->fetch()) {\n    // 显示每一行的绑定变量\n}\n```\n\n如果你没有将结果绑定到变量，请使用`$row\
    \ = $stmt->fetch()`并将每个变量作为`$row['column_name']`访问。\n\n**关闭语句**\n\n当你完成预处理语句的使用后，`close()`方法会释放使用的内存。\n\
    \n**PHP 解决方案 13-7：在搜索中使用 MySQLi 预处理语句**\n\n此 PHP 解决方案展示了如何将 MySQLi 准备好的语句与`SELECT`查询一起使用；它还演示了将结果绑定到命名变量。\n\
    \n1.  从`ch13`文件夹复制`mysqli_prepared_01.php`，并将其保存到`mysqli`文件夹中，名称为`mysqli_prepared.php`。该文件包含一个搜索表单和一个用于显示结果的表格。\n\
    \n2.  在`DOCTYPE`声明上方的 PHP 代码块中，创建一个条件语句以包含`connection.php`和`utility_funcs.php`，并在提交搜索表单时创建一个只读连接。代码如下所示：\n\
    \n```php\nif (isset($_GET['go'])) {\n    require_once '../includes/connection.php';\n\
    \    require_once '../includes/utility_funcs.php';\n    $conn = dbConnect('read');\n\
    }\n```\n\n3.  接下来，在条件语句内部添加 SQL 查询。该查询需要命名你要从`images`表中检索的三列。使用问号作为搜索词的占位符，如下所示：\n\
    \n```php\n$sql = 'SELECT image_id, filename, caption FROM images\nWHERE caption\
    \ LIKE ?';\n```\n\n4.  在将用户提交的搜索词传递给`bind_param()`方法之前，你需要向其中添加通配符并将其分配给一个新变量，如下所示：\n\
    \n```php\n$searchterm = '%'. $_GET['search'] .'%';\n```\n\n5.  你现在可以创建预处理语句。`DOCTYPE`声明上方的\
    \ PHP 块中的完成代码如下所示：\n\n```php\nif (isset($_GET['go'])) {\n    require_once '../includes/connection.inc.php';\n\
    \    $conn = dbConnect('read');\n    $sql = 'SELECT image_id, filename, caption\
    \ FROM images\n    WHERE caption LIKE ?';\n    $searchterm = '%'. $_GET['search']\
    \ .'%';\n    $stmt = $conn->stmt_init();\n    if ($stmt->prepare($sql)) {\n  \
    \      $stmt->bind_param('s', $searchterm);\n        $stmt->execute();\n     \
    \   $stmt->bind_result($image_id, $filename, $caption);\n        $stmt->store_result();\n\
    \        $numRows = $stmt->num_rows;\n    } else {\n        $error = $stmt->error;\n\
    \    }\n}\n```\n\n这将初始化预处理语句并将其分配给`$stmt`。然后， SQL 查询被传递给`prepare()`方法，该方法检查查询语法的有效性。如果语法有问题，`else`块会将错误消息分配给`$error`。如果语法没有错误，则执行条件语句内的其余脚本。\n\
    \n条件语句内的第一行将`$searchterm`绑定到`SELECT`查询，替换问号占位符。第一个参数告诉预处理语句将其视为字符串。\n\n执行预处理语句后，下一行将`SELECT`查询的结果绑定到`$image_id`、`$filename`和`$caption`。这些变量需要与查询中的顺序相同。我已将变量命名为它们所代表的列，但你可以使用任何你想要的变量。\n\
