- fmt: '# 1. What Is PHP—And Why Should I Care?


    Officially, PHP stands for PHP: Hypertext Preprocessor. It’s an ugly name that
    gives the impression that it’s strictly for nerds or propellerheads. Nothing could
    be further from the truth. A lighthearted debate on the PHP general mailing list
    ([`http://news.php.net/php.general`](http://news.php.net/php.general)) several
    years ago suggested changing what PHP stands for to Positively Happy People or
    Pretty Happy Programmers. This book aims to help you put PHP to practical use—and
    in the process help you understand what makes PHP programmers so happy.


    PHP is a scripting language that brings websites to life in the following ways:


    - Sends feedback from your website directly to your mailbox

    - Uploads files through a webpage

    - Generates thumbnails from larger images

    - Reads and writes to files

    - Displays and updates information dynamically

    - Uses a database to display and store information

    - Makes websites searchable

    - And much more . . .


    By reading this book, you’ll be able to do all that. PHP is easy to learn; it’s
    platform-neutral, so the same code runs on Windows, Mac OS X, and Linux, and all
    the software you need to develop with PHP is open source and therefore free.


    In this chapter, you’ll learn about the following:


    - How PHP has grown into the most widely used technology for dynamic websites

    - How PHP makes webpages dynamic

    - How difficult—or easy—PHP is to learn

    - Whether PHP is safe

    - What software you need in order to write PHP


    ## How PHP Has Grown


    PHP is now the most widely used technology for creating dynamic websites, but
    it started out in 1995 with rather modest ambitions—and a different name. It was
    originally called Personal Home Page Tools (PHP Tools). One of its main goals
    was to create a guestbook by gathering information from an online form and displaying
    it on a webpage. Within three years, it was decided to drop Personal Home Page
    from the name, because it sounded like something for hobbyists and didn’t do justice
    to the range of sophisticated features that had since been added.


    PHP has continued to develop over the years, adding new features all the time.
    According to W3Techs ([`http://w3techs.com/technologies/details/pl-php/all/all`](http://w3techs.com/technologies/details/pl-php/all/all)),
    PHP is used to create dynamic content by more than 80 percent of the 10 million
    websites it regularly surveys. It’s the language that drives highly popular content
    management systems (CMSs) such as Drupal ([`http://drupal.org/`](http://drupal.org/)),
    Joomla! ([`www.joomla.org`](http://www.joomla.org/)), and WordPress ([`http://wordpress.org/`](http://wordpress.org/)).
    It also runs some of the most heavily used websites, including Facebook ([`www.facebook.com`](http://www.facebook.com/))
    and Wikipedia ([`www.wikipedia.org`](http://www.wikipedia.org/)).


    One of the language’s great attractions, though, is that it remains true to its
    roots. PHP’s original creator, Rasmus Lerdorf, once described it as “a very programmer-friendly
    scripting language suitable for people with little or no programming experience
    as well as the seasoned web developer who needs to get things done quickly.” You
    can start writing useful scripts without needing to learn lots of theory, yet
    be confident in knowing that you’re using a technology with the capability to
    develop industrial-strength applications.


    Note


    At the time of this writing, the current version is PHP 5.6. The code assumes
    you’re using a minimum of PHP 5.4, which removed several outdated features, such
    as “magic quotes.” If you have a hosting plan, make sure the server is running
    at least PHP 5.4.


    The next major version of PHP will be called PHP 7. It’s been decided to skip
    PHP 6 to avoid confusion with a version that was abandoned in 2010 for being too
    ambitious. The emphasis in this book is on code that works now, not on what might
    work at some unspecified time in the future. However, I fully expect that most
    if not all of the code and techniques will continue to work in PHP 7.


    ## How PHP Makes Pages Dynamic


    PHP was originally designed to be embedded in the HTML of a webpage, and that’s
    the way it’s often still used. For example, if you want to display the current
    year in a copyright notice, you could put this in your footer:


    ```

    <p>&copy; <?php echo date(''Y''); ?> PHP Solutions</p>

    ```


    On a PHP–enabled web server, the code between the `<?php` and `?>` tags is automatically
    processed and displays the year like this:


    ![A978-1-4842-0635-5_1_Figa_HTML.jpg](A978-1-4842-0635-5_1_Figa_HTML.jpg)


    This is only a trivial example, but it illustrates some of the advantages of using
    PHP:


    - Anyone accessing your site after the stroke of midnight on New Year’s Day sees
    the correct year.

    - The date is calculated by the web server so it’s not affected if the clock in
    the user’s computer is set incorrectly.


    Although it’s convenient to embed PHP code in HTML like this, it’s repetitive
    and can lead to mistakes. It can also make your webpages difficult to maintain,
    particularly once you start using more complex PHP code. Consequently, it’s common
    practice to store a lot of dynamic code in separate files and then use PHP to
    build your pages from the different components. The separate files—or include
    files, as they’re usually called—can contain only PHP, only HTML, or a mixture
    of both.


    As a simple example, you can put your website’s navigation menu in an include
    file and use PHP to include it in each page. Whenever you need to make any changes
    to the menu, you edit just one file, the include file, and the changes are automatically
    reflected in every page that includes the menu. Just imagine how much time that
    saves on a website with dozens of pages!


    With an ordinary HTML page, the content is fixed by the web developer at design
    time and uploaded to the web server. When somebody visits the page, the web server
    simply sends the HTML and other assets, such as images and the style sheet. It’s
    a simple transaction—the request comes from the browser, and the fixed content
    is sent back by the server. When you build webpages with PHP, much more goes on.
    Figure 1-1 shows what happens.


    ![A978-1-4842-0635-5_1_Fig1_HTML.jpg](A978-1-4842-0635-5_1_Fig1_HTML.jpg)


    Figure 1-1. The web server builds each PHP page dynamically in response to a request


    When a PHP–driven website is visited, it sets in motion the following sequence
    of events:


    1. The browser sends a request to the web server.

    2. The web server hands the request to the PHP engine, which is embedded in the
    server.

    3. The PHP engine processes the code. In many cases, it might also query a database
    before building the page.

    4. The server sends the completed page back to the browser.


    This process usually takes only a fraction of a second, so the visitor to a PHP
    website is unlikely to notice any delay. Because each page is built individually,
    PHP sites can respond to user input, displaying different content when a user
    logs in or showing the results of a database search.


    ### Creating Pages That Think for Themselves


    PHP is a server-side language. The PHP code remains on the web server. After it
    has been processed, the server sends only the output of the script. Normally,
    this is HTML, but PHP can also be used to generate other web languages, such as
    JSON (JavaScript Object Notation).


    PHP enables you to introduce logic into your webpages that is based on alternatives.
    Some decisions are made using information that PHP gleans from the server: the
    date, the time, the day of the week, information in the page’s URL, and so on.
    If it’s Wednesday, it will show Wednesday’s TV schedules. At other times, decisions
    are based on user input, which PHP extracts from online forms. If you have registered
    with a site, it will display personalized information—that sort of thing.'
  raw: '# 1. What Is PHP—And Why Should I Care?


    Officially, PHP stands for PHP: Hypertext Preprocessor. It’s an ugly name that
    gives the impression that it’s strictly for nerds or propellerheads. Nothing could
    be further from the truth. A lighthearted debate on the PHP general mailing list
    ( [`http://news.php.net/php.general`](http://news.php.net/php.general) ) several
    years ago suggested changing what PHP stands for to Positively Happy People or
    Pretty Happy Programmers. This book aims to help you put PHP to practical use—and
    in the process help you understand what makes PHP programmers so happy.


    PHP is a scripting language that brings websites to life in the following ways:


    *   Sends feedback from your website directly to your mailbox

    *   Uploads files through a webpage

    *   Generates thumbnails from larger images

    *   Reads and writes to files

    *   Displays and updates information dynamically

    *   Uses a database to display and store information

    *   Makes websites searchable

    *   And much more . . .


    By reading this book, you’ll be able to do all that. PHP is easy to learn; it’s
    platform-neutral, so the same code runs on Windows, Mac OS X, and Linux, and all
    the software you need to develop with PHP is open source and therefore free.


    In this chapter, you’ll learn about the following:


    *   How PHP has grown into the most widely used technology for dynamic websites

    *   How PHP makes webpages dynamic

    *   How difficult—or easy—PHP is to learn

    *   Whether PHP is safe

    *   What software you need in order to write PHP


    ## How PHP Has Grown


    PHP is now the most widely used technology for creating dynamic websites, but
    it started out in 1995 with rather modest ambitions—and a different name. It was
    originally called Personal Home Page Tools (PHP Tools). One of its main goals
    was to create a guestbook by gathering information from an online form and displaying
    it on a webpage. Within three years, it was decided to drop Personal Home Page
    from the name, because it sounded like something for hobbyists and didn’t do justice
    to the range of sophisticated features that had since been added.


    PHP has continued to develop over the years, adding new features all the time.
    According to W3Techs ( [`http://w3techs.com/technologies/details/pl-php/all/all`](http://w3techs.com/technologies/details/pl-php/all/all)
    ), PHP is used to create dynamic content by more than 80 percent of the 10 million
    websites it regularly surveys. It’s the language that drives highly popular content
    management systems (CMSs) such as Drupal ( [`http://drupal.org/`](http://drupal.org/)
    ), Joomla! ( [`www.joomla.org`](http://www.joomla.org/) ), and WordPress ( [`http://wordpress.org/`](http://wordpress.org/)
    ). It also runs some of the most heavily used websites, including Facebook ( [`www.facebook.com`](http://www.facebook.com/)
    ) and Wikipedia ( [`www.wikipedia.org`](http://www.wikipedia.org/) ).


    One of the language’s great attractions, though, is that it remains true to its
    roots. PHP’s original creator, Rasmus Lerdorf, once described it as “a very programmer-friendly
    scripting language suitable for people with little or no programming experience
    as well as the seasoned web developer who needs to get things done quickly.” You
    can start writing useful scripts without needing to learn lots of theory, yet
    be confident in knowing that you’re using a technology with the capability to
    develop industrial-strength applications.


    Note


    At the time of this writing, the current version is PHP 5.6\. The code assumes
    you’re using a minimum of PHP 5.4, which removed several outdated features, such
    as “magic quotes.” If you have a hosting plan, make sure the server is running
    at least PHP 5.4.


    The next major version of PHP will be called PHP 7\. It’s been decided to skip
    PHP 6 to avoid confusion with a version that was abandoned in 2010 for being too
    ambitious. The emphasis in this book is on code that works now, not on what might
    work at some unspecified time in the future. However, I fully expect that most
    if not all of the code and techniques will continue to work in PHP 7.


    ## How PHP Makes Pages Dynamic


    PHP was originally designed to be embedded in the HTML of a webpage, and that’s
    the way it’s often still used. For example, if you want to display the current
    year in a copyright notice, you could put this in your footer:


    `<p>&copy;` `<?php echo date(''Y''); ?>` `PHP Solutions</p>`


    On a PHP–enabled web server, the code between the `<?php` and `?>` tags is automatically
    processed and displays the year like this:


    ![A978-1-4842-0635-5_1_Figa_HTML.jpg](A978-1-4842-0635-5_1_Figa_HTML.jpg)


    This is only a trivial example, but it illustrates some of the advantages of using
    PHP:


    *   Anyone accessing your site after the stroke of midnight on New Year’s Day
    sees the correct year.

    *   The date is calculated by the web server so it’s not affected if the clock
    in the user’s computer is set incorrectly.


    Although it’s convenient to embed PHP code in HTML like this, it’s repetitive
    and can lead to mistakes. It can also make your webpages difficult to maintain,
    particularly once you start using more complex PHP code. Consequently, it’s common
    practice to store a lot of dynamic code in separate files and then use PHP to
    build your pages from the different components. The separate files—or include
    files, as they’re usually called—can contain only PHP, only HTML, or a mixture
    of both.


    As a simple example, you can put your website’s navigation menu in an include
    file and use PHP to include it in each page. Whenever you need to make any changes
    to the menu, you edit just one file, the include file, and the changes are automatically
    reflected in every page that includes the menu. Just imagine how much time that
    saves on a website with dozens of pages!


    With an ordinary HTML page, the content is fixed by the web developer at design
    time and uploaded to the web server. When somebody visits the page, the web server
    simply sends the HTML and other assets, such as images and the style sheet. It’s
    a simple transaction—the request comes from the browser, and the fixed content
    is sent back by the server. When you build webpages with PHP, much more goes on.
    Figure [1-1](#A978-1-4842-0635-5_1_Chapter.html#Fig1) shows what happens.


    ![A978-1-4842-0635-5_1_Fig1_HTML.jpg](A978-1-4842-0635-5_1_Fig1_HTML.jpg)


    Figure 1-1.


    The web server builds each PHP page dynamically in response to a request


    When a PHP–driven website is visited, it sets in motion the following sequence
    of events:


    The browser sends a request to the web server.   The web server hands the request
    to the PHP engine, which is embedded in the server.   The PHP engine processes
    the code. In many cases, it might also query a database before building the page.
      The server sends the completed page back to the browser.  


    This process usually takes only a fraction of a second, so the visitor to a PHP
    website is unlikely to notice any delay. Because each page is built individually,
    PHP sites can respond to user input, displaying different content when a user
    logs in or showing the results of a database search.


    ### Creating Pages That Think for Themselves


    PHP is a server-side language. The PHP code remains on the web server. After it
    has been processed, the server sends only the output of the script. Normally,
    this is HTML, but PHP can also be used to generate other web languages, such as
    JSON (JavaScript Object Notation).


    PHP enables you to introduce logic into your webpages that is based on alternatives.
    Some decisions are made using information that PHP gleans from the server: the
    date, the time, the day of the week, information in the page’s URL, and so on.
    If it’s Wednesday, it will show Wednesday’s TV schedules. At other times, decisions
    are based on user input, which PHP extracts from online forms. If you have registered
    with a site, it will display personalized information—that sort of thing.'
  trans: '

    # 1. 什么是 PHP——以及我为何要关心它？


    PHP 的官方全称是 PHP：超文本预处理器。这个拗口的名称给人一种印象，仿佛它只是极客或书呆子的专属。这完全是大错特错。几年前，在 PHP 通用邮件列表（[`http://news.php.net/php.general`](http://news.php.net/php.general)）上曾有过一场轻松有趣的讨论，建议将
    PHP 的全称改为"积极快乐的人们"或"相当快乐的程序员"。本书旨在帮助你实际运用 PHP——并在此过程中，让你理解究竟是什么让 PHP 程序员如此快乐。


    PHP 是一种脚本语言，它能通过以下方式让网站"活"起来：


    - 将网站上的反馈直接发送到你的邮箱

    - 通过网页上传文件

    - 从大图片生成缩略图

    - 读写文件

    - 动态显示和更新信息

    - 使用数据库来显示和存储信息

    - 使网站具备可搜索性

    - 还有更多……


    通过阅读本书，你将能够实现所有这些功能。PHP 易于学习；它不依赖特定平台，因此相同的代码可以在 Windows、Mac OS X 和 Linux 上运行，而且你开发
    PHP 所需的所有软件都是开源的，因此完全免费。


    在本章中，你将了解以下内容：


    - PHP 如何成长为动态网站最广泛使用的技术

    - PHP 如何让网页变得动态

    - PHP 学习起来有多难——或者多容易

    - PHP 是否安全

    - 编写 PHP 需要哪些软件


    ## PHP 的发展历程


    PHP 现在是创建动态网站最广泛使用的技术，但它始于 1995 年，当时的目标相当谦逊——而且名字也不同。它最初被称为个人主页工具（PHP Tools）。其主要目标之一是通过收集在线表单的信息并在网页上显示来创建一个留言簿。三年内，开发团队决定从名称中去掉"个人主页"，因为它听起来像是爱好者的玩物，无法体现此后添加的一系列复杂功能。


    PHP 多年来持续发展，不断添加新功能。根据 W3Techs（[`http://w3techs.com/technologies/details/pl-php/all/all`](http://w3techs.com/technologies/details/pl-php/all/all)）的数据，在其定期调查的
    1000 万个网站中，超过 80% 使用 PHP 来创建动态内容。它是驱动诸如 Drupal（[`http://drupal.org/`](http://drupal.org/)）、Joomla!（[`www.joomla.org`](http://www.joomla.org/)）和
    WordPress（[`http://wordpress.org/`](http://wordpress.org/)）等广受欢迎的内容管理系统（CMS）的语言。它同时驱动着一些访问量最高的网站，包括
    Facebook（[`www.facebook.com`](http://www.facebook.com/)）和 Wikipedia（[`www.wikipedia.org`](http://www.wikipedia.org/)）。


    不过，该语言的一大魅力在于，它始终不忘初心。PHP 的原始创建者拉斯马斯·勒德尔夫曾将其描述为"一种非常对程序员友好的脚本语言，既适合编程经验很少或完全没有经验的人，也适合需要快速完成工作的资深
    Web 开发人员"。你无需学习大量理论知识就能开始编写有用的脚本，同时又能确信自己正在使用一种有能力开发工业级应用的技术。


    注意


    在撰写本书时，当前版本是 PHP 5.6。本书中的代码假设你至少使用 PHP 5.4，该版本移除了几个过时的功能，例如"魔术引号"。如果你有虚拟主机方案，请确保服务器至少运行
    PHP 5.4。


    PHP 的下一个主要版本将被称为 PHP 7。决定跳过 PHP 6 是为了避免与一个因过于雄心勃勃而在 2010 年被放弃的版本混淆。本书的重点在于现在就能工作的代码，而不是那些可能在未来的某个不确定时间才能工作的东西。不过，我完全预期本书中的大部分（如果不是全部）代码和技术在
    PHP 7 中仍能继续工作。


    ## PHP 如何让页面变得动态


    PHP 最初被设计为嵌入在网页的 HTML 中，这也仍然是它通常的使用方式。例如，如果你想在版权声明中显示当前年份，可以在页脚中放入以下代码：


    ```

    <p>&copy; <?php echo date(''Y''); ?> PHP Solutions</p>

    ```


    在启用了 PHP 的 Web 服务器上，`<?php` 和 `?>` 标签之间的代码会被自动处理，并显示如下年份：


    ![A978-1-4842-0635-5_1_Figa_HTML.jpg](img/A978-1-4842-0635-5_1_Figa_HTML.jpg)


    这只是一个简单的例子，但它说明了使用 PHP 的一些优势：


    - 任何在元旦午夜钟声敲响后访问你网站的用户，都会看到正确的年份。

    - 日期由 Web 服务器计算，因此不受用户计算机时钟设置错误的影响。


    虽然像这样将 PHP 代码嵌入 HTML 很方便，但这样做很重复且容易导致错误。这也可能使你的网页难以维护，特别是当你开始使用更复杂的 PHP 代码时。因此，通常的做法是将大量动态代码存储在单独的文件中，然后使用
    PHP 从不同的组件来构建你的页面。这些单独的文件——通常称为包含文件——可以只包含 PHP、只包含 HTML，或者两者混合。


    举个简单的例子，你可以将网站导航菜单放在一个包含文件中，然后使用 PHP 将其包含在每个页面中。每当你需要对菜单进行任何更改时，只需编辑一个文件，即包含文件，这些更改就会自动反映在每个包含该菜单的页面中。想象一下，对于一个有几十个页面的网站来说，这能节省多少时间！


    对于普通的 HTML 页面，内容由 Web 开发人员在设计时确定并上传到 Web 服务器。当有人访问该页面时，Web 服务器只是简单地发送 HTML 和其他资源，如图片和样式表。这是一个简单的事务——浏览器发出请求，服务器发回固定内容。当你使用
    PHP 构建网页时，发生的事情要多得多。图 1-1 展示了这一过程。


    ![A978-1-4842-0635-5_1_Fig1_HTML.jpg](img/A978-1-4842-0635-5_1_Fig1_HTML.jpg)


    图 1-1. Web 服务器根据请求动态构建每个 PHP 页面


    当访问一个由 PHP 驱动的网站时，会触发以下一系列事件：


    1. 浏览器向 Web 服务器发送请求。

    2. Web 服务器将请求交给嵌入在服务器中的 PHP 引擎。

    3. PHP 引擎处理代码。在许多情况下，它可能还会在构建页面之前查询数据库。

    4. 服务器将完成后的页面发送回浏览器。


    这个过程通常只需要几分之一秒，因此访问 PHP 网站的访客几乎感觉不到任何延迟。因为每个页面都是单独构建的，PHP 网站可以对用户输入做出响应，在用户登录时显示不同的内容，或者显示数据库搜索的结果。


    ### 创建能够自主思考的页面


    PHP 是一种服务器端语言。PHP 代码保留在 Web 服务器上。处理完毕后，服务器只发送脚本的输出。通常这个输出是 HTML，但 PHP 也可以用来生成其他
    Web 语言，例如 JSON（JavaScript 对象表示法）。


    PHP 使你能够基于条件选择，将逻辑引入到网页中。一些决策是基于 PHP 从服务器收集的信息做出的：日期、时间、星期几、页面 URL 中的信息等等。如果是星期三，它会显示星期三的电视节目表。在其他时候，决策则基于用户输入，PHP
    会从在线表单中提取这些输入。如果你注册了某个网站，它会显示个性化信息——诸如此类。

    '
- fmt: '# How Hard Is PHP to Use and Learn?


    PHP isn’t rocket science, but don’t expect to become an expert in five minutes.
    Perhaps the biggest shock to newcomers is that `PHP` is far less tolerant of mistakes
    than browsers are with `HTML`. If you omit a closing tag in `HTML`, most browsers
    will still render the page. If you omit a closing quote, semicolon, or brace in
    `PHP`, you’ll get an uncompromising error message like the one shown in Figure
    [1-2](#A978-1-4842-0635-5_1_Chapter.html#Fig2). This affects all programming languages,
    such as `JavaScript` and `C#`, not just `PHP`.


    ![A978-1-4842-0635-5_1_Fig2_HTML.jpg](A978-1-4842-0635-5_1_Fig2_HTML.jpg)


    Figure 1-2. Server-side languages like `PHP` are intolerant of most coding errors


    If you’re the sort of web designer or developer who uses a visual design tool
    like Adobe Dreamweaver and never looks at the underlying code, it’s time to rethink
    your approach. Mixing `PHP` with poorly structured `HTML` is likely to lead to
    problems. `PHP` uses loops to perform repetitive tasks, such as displaying the
    results of a database search. A loop repeats the same section of code—usually
    a mixture of `PHP` and `HTML`—until all results have been displayed. If you put
    the loop in the wrong place or if your `HTML` is badly structured, your page is
    likely to collapse like a house of cards.


    If you’re not already in the habit of doing so, it’s a good idea to check your
    pages using the World Wide Web Consortium’s (W3C) Markup Validation Service ([`http://validator.w3.org/unicorn`](http://validator.w3.org/unicorn)).


    Note: The W3C is the international body that develops standards such as `HTML`
    and `CSS` to ensure the long-term growth of the web. It’s led by the inventor
    of the World Wide Web, Tim Berners-Lee. To learn about the W3C’s mission, see
    [`www.w3.org/Consortium/mission`](http://www.w3.org/Consortium/mission).


    ## Can I Just Copy and Paste the Code?


    There’s nothing wrong with copying the code in this book. That’s what it’s there
    for. I’ve structured this book as a series of practical projects. I explain what
    the code is for and why it’s there. Even if you don’t understand exactly how it
    all works, this should give you sufficient confidence to know which parts of the
    code to adapt to your own needs and which parts are best left alone. But to get
    the most out of this book, you need to start experimenting with the tools found
    in these pages and then come up with your own solutions.


    `PHP` is a toolbox full of powerful features. It has thousands of built-in functions
    that perform all sorts of tasks, such as converting text to uppercase, generating
    thumbnail images from full-sized ones, or connecting to a database. The real power
    comes from combining these functions in different ways and adding your own conditional
    logic.


    ## How Safe Is PHP?


    `PHP` is like the electricity or kitchen knives in your home: handled properly,
    it’s very safe; handled irresponsibly, it can do a lot of damage. One of the inspirations
    for the first edition of this book was a spate of attacks that exploited a vulnerability
    in email scripts, turning websites into spam relays. The solution is quite simple,
    as you’ll learn in [Chapter 5](#A978-1-4842-0635-5_5_Chapter.html), but even a
    decade later, I still see people using the same insecure techniques, exposing
    their sites to attack.


    `PHP` is not unsafe, nor does everyone need to become a security expert to use
    it. What is important is to understand the basic principle of `PHP` safety: always
    check user input before processing it. You’ll find that to be a constant theme
    throughout this book. Most security risks can be eliminated with very little effort.


    The best way to protect yourself is to understand the code you’re using.


    ## What Software Do I Need to Write PHP?


    Strictly speaking, you don’t need any special software to write `PHP` scripts.
    `PHP` code is plain text and can be created in any text editor, such as `Notepad`
    on Windows or `TextEdit` on Mac OS X. Having said that, your life will be a lot
    easier if you use a program that has features designed to speed up the development
    process. There are many available—both free and on a paid-for basis.


    ### What to Look for When Choosing a PHP Editor


    If there’s a mistake in your code, your page will probably never make it as far
    as the browser, and all you’ll see is an error message. You should choose a script
    editor that has the following features:


    - `PHP` syntax checking: This used to be found only in expensive, dedicated programs,
    but it’s now a feature in several free programs. Syntax checkers monitor the code
    as you type and highlight errors, saving a great deal of time and frustration.

    - `PHP` syntax coloring: Code is highlighted in different colors according to
    the role it plays. If your code is in an unexpected color, it’s a sure sign you’ve
    made a mistake.

    - `PHP` code hints: `PHP` has so many built-in functions that it can be difficult
    to remember how to use them, even for an experienced user. Many script editors
    automatically display tooltips with reminders of how a particular piece of code
    works.

    - Line numbering: Finding a specific line quickly makes troubleshooting a lot
    simpler.

    - A “balance braces” feature: Parentheses (`()`), square brackets (`[]`), and
    curly braces (`{}`) must always be in matching pairs. It’s easy to forget to close
    a pair. All good script editors help find the matching parenthesis, bracket, or
    brace.


    The program you’re already using to build webpages might already have these features.
    For example, Adobe Dreamweaver CS5 and later does ([`www.adobe.com/products/dreamweaver/`](http://www.adobe.com/products/dreamweaver/)).
    It also has embedded `PHP` documentation.


    Even if you don’t plan to do a lot of `PHP` development, you should consider using
    a dedicated script editor if your web development program doesn’t support syntax
    checking. The following dedicated script editors have all the essential features,
    such as syntax checking and code hints. It’s not an exhaustive list, but rather
    one based on personal experience.


    - PhpStorm ([`www.jetbrains.com/phpstorm/`](http://www.jetbrains.com/phpstorm/)):
    Although this is a dedicated `PHP` editing program, it also has excellent support
    for `HTML`, `CSS`, and `JavaScript`. It’s currently my favorite program for developing
    with `PHP`.

    - Sublime Text ([`www.sublimetext.com/`](http://www.sublimetext.com/)): If you’re
    a Sublime Text fan, there are plug-ins for `PHP` syntax coloring, syntax checking,
    and documentation.

    - Zend Studio ([`www.zend.com/en/products/studio/`](http://www.zend.com/en/products/studio/)):
    If you’re really serious about `PHP` development, Zend Studio is the most fully
    featured integrated development environment (IDE) for `PHP`. It’s created by Zend,
    the company run by leading contributors to the development of `PHP`. Zend Studio
    runs on Windows, Mac OS X, and Linux. It used to be expensive, but the price for
    individual developers is now more affordable, and it includes 12 months of free
    upgrades and support.

    - PHP Development Tools ([`www.eclipse.org/pdt/`](http://www.eclipse.org/pdt/)):
    `PDT` is actually a cut-down version of Zend Studio and has the advantage of being
    free. It runs on Eclipse, the open-source IDE that supports multiple computer
    languages. If you have used Eclipse for other languages, you should find it relatively
    easy to use. `PDT` runs on Windows, Mac OS X, and Linux and is available either
    as an Eclipse plug-in or as an all-in-one package that automatically installs
    Eclipse and the `PDT` plug-in.

    - Komodo Edit ([`http://komodoide.com/komodo-edit/`](http://komodoide.com/komodo-edit/)):
    This is a free, open-source IDE for `PHP` and a number of other popular computer
    languages. It’s available for Windows, Mac OS X, and Linux. It’s a cut-down version
    of Komodo IDE, which is a paid-for program with more advanced features.'
  raw: '## How Hard Is PHP to Use and Learn?


    PHP isn’t rocket science, but don’t expect to become an expert in five minutes.
    Perhaps the biggest shock to newcomers is that PHP is far less tolerant of mistakes
    than browsers are with HTML. If you omit a closing tag in HTML, most browsers
    will still render the page. If you omit a closing quote, semicolon, or brace in
    PHP, you’ll get an uncompromising error message like the one shown in Figure [1-2](#A978-1-4842-0635-5_1_Chapter.html#Fig2).
    This affects all programming languages, such as JavaScript and C#, not just PHP.


    ![A978-1-4842-0635-5_1_Fig2_HTML.jpg](A978-1-4842-0635-5_1_Fig2_HTML.jpg)


    Figure 1-2.


    Server-side languages like PHP are intolerant of most coding errors


    If you’re the sort of web designer or developer who uses a visual design tool
    like Adobe Dreamweaver and never looks at the underlying code, it’s time to rethink
    your approach. Mixing PHP with poorly structured HTML is likely to lead to problems.
    PHP uses loops to perform repetitive tasks, such as displaying the results of
    a database search. A loop repeats the same section of code—usually a mixture of
    PHP and HTML—until all results have been displayed. If you put the loop in the
    wrong place or if your HTML is badly structured, your page is likely to collapse
    like a house of cards.


    If you’re not already in the habit of doing so, it’s a good idea to check your
    pages using the World Wide Web Consortium’s (W3C) Markup Validation Service (
    [`http://validator.w3.org/unicorn`](http://validator.w3.org/unicorn) ).


    Note


    The W3C is the international body that develops standardssuch as HTML and CSS
    to ensure the long-term growth of the web. It’s led by the inventor of the World
    Wide Web, Tim Berners-Lee. To learn about the W3C’s mission, see [`www.w3.org/Consortium/mission`](http://www.w3.org/Consortium/mission)
    .


    ### Can I Just Copy and Paste the Code?


    There’s nothing wrong with copying the code in this book. That’s what it’s there
    for. I’ve structured this book as a series of practical projects. I explain what
    the code is for and why it’s there. Even if you don’t understand exactly how it
    all works, this should give you sufficient confidence to know which parts of the
    code to adapt to your own needs and which parts are best left alone. But to get
    the most out of this book, you need to start experimenting with the tools found
    in these pages and then come up with your own solutions.


    PHP is a toolbox full of powerful features. It has thousands of built-in functions
    that perform all sorts of tasks, such as converting text to uppercase, generating
    thumbnail images from full-sized ones, or connecting to a database. The real power
    comes from combining these functions in different ways and adding your own conditional
    logic.


    ### How Safe Is PHP?


    PHP is like the electricity or kitchen knives in your home: handled properly,
    it’s very safe; handled irresponsibly, it can do a lot of damage. One of the inspirations
    for the first edition of this book was a spate of attacks that exploited a vulnerability
    in email scripts, turning websites into spam relays. The solution is quite simple,
    as you’ll learn in [Chapter 5](#A978-1-4842-0635-5_5_Chapter.html), but even a
    decade later, I still see people using the same insecure techniques, exposing
    their sites to attack.


    PHP is not unsafe, nor does everyone need to become a security expert to use it.
    What is important is to understand the basic principle of PHP safety: always check
    user input before processing it. You’ll find that to be a constant theme throughout
    this book. Most security risks can be eliminated with very little effort.


    The best way to protect yourself is to understand the code you’re using.


    ## What Software Do I Need to Write PHP?


    Strictly speaking, you don’t need any special software to write PHP scripts. PHP
    code is plain text and can be created in any text editor, such as Notepad on Windows
    or TextEdit on Mac OS X. Having said that, your life will be a lot easier if you
    use a program that has features designed to speed up the development process.
    There are many available—both free and on a paid-for basis.


    ### What to Look for When Choosing a PHP Editor


    If there’s a mistake in your code, your page will probably never make it as far
    as the browser, and all you’ll see is an error message. You should choose a script
    editor that has the following features:


    *   PHP syntax checking: This used to be found only in expensive, dedicated programs,
    but it’s now a feature in several free programs. Syntax checkers monitor the code
    as you type and highlight errors, saving a great deal of time and frustration.

    *   PHP syntax coloring: Code is highlighted in different colors according to
    the role it plays. If your code is in an unexpected color, it’s a sure sign you’ve
    made a mistake.

    *   PHP code hints: PHP has so many built-in functions that it can be difficult
    to remember how to use them, even for an experienced user. Many script editors
    automatically display tooltips with reminders of how a particular piece of code
    works.

    *   Line numbering: Finding a specific line quickly makes troubleshooting a lot
    simpler.

    *   A “balance braces” feature: Parentheses (`()`), square brackets (`[]`), and
    curly braces (`{}`) must always be in matching pairs. It’s easy to forget to close
    a pair. All good script editors help find the matching parenthesis, bracket, or
    brace.


    The program you’re already using to build webpages might already have these features.
    For example, Adobe Dreamweaver CS5 and later does ( [`www.adobe.com/products/dreamweaver/`](http://www.adobe.com/products/dreamweaver/)
    ). It also has embedded PHP documentation.


    Even if you don’t plan to do a lot of PHP development, you should consider using
    a dedicated script editor if your web development program doesn’t support syntax
    checking. The following dedicated script editors have all the essential features,
    such as syntax checking and code hints. It’s not an exhaustive list, but rather
    one based on personal experience.


    *   PhpStorm ( [`www.jetbrains.com/phpstorm/`](http://www.jetbrains.com/phpstorm/)
    ): Although this is a dedicated PHP editing program, it also has excellent support
    for HTML, CSS, and JavaScript. It’s currently my favorite program for developing
    with PHP.

    *   Sublime Text ( [`www.sublimetext.com/`](http://www.sublimetext.com/) ): If
    you’re a Sublime Text fan, there are plug-ins for PHP syntax coloring, syntax
    checking, and documentation.

    *   Zend Studio ( [`www.zend.com/en/products/studio/`](http://www.zend.com/en/products/studio/)
    ): If you’re really serious about PHP development, Zend Studio is the most fully
    featured integrated development environment (IDE) for PHP. It’s created by Zend,
    the company run by leading contributors to the development of PHP. Zend Studio
    runs on Windows, Mac OS X, and Linux. It used to be expensive, but the price for
    individual developers is now more affordable, and it includes 12 months of free
    upgrades and support.

    *   PHP Development Tools ( [`www.eclipse.org/pdt/`](http://www.eclipse.org/pdt/)
    ): PDT is actually a cut-down version of Zend Studio and has the advantage of
    being free. It runs on Eclipse, the open-source IDE that supports multiple computer
    languages. If you have used Eclipse for other languages, you should find it relatively
    easy to use. PDT runs on Windows, Mac OS X, and Linux and is available either
    as an Eclipse plug-in or as an all-in-one package that automatically installs
    Eclipse and the PDT plug-in.

    *   Komodo Edit ( [`http://komodoide.com/komodo-edit/`](http://komodoide.com/komodo-edit/)
    ): This is a free, open-source IDE for PHP and a number of other popular computer
    languages. It’s available for Windows, Mac OS X, and Linux. It’s a cut-down version
    of Komodo IDE, which is a paid-for program with more advanced features.'
