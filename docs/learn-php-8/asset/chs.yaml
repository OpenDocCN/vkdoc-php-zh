  \ JSON 数据的备份与恢复改为处理 XML 数据，需要做哪些修改？实际上完全不需要修改。只要实现了本章第一部分中的变更，`displaychangelog`程序以及对`dog_data`类的修改，就能像处理\
  \ XML 数据一样处理 JSON。\n\n### MySQL 备份与恢复\n\n正如你可能猜测到的，只要实现了本章第二部分中的变更，对 MySQL 数据的备份与恢复就不需要额外修改。不过我们可以花点时间，看看另一种处理\
  \ MySQL 数据的方式。\n\n常见的做法是创建一个 SQL 脚本文件，然后在数据库上执行。脚本文件包含所有更新数据库所需的 SQL 代码。使用这种文件，你可以执行相应的`INSERT`、`UPDATE`和`DELETE`\
  \ SQL 命令，而不仅仅是像之前示例中那样只能执行`INSERT`。之前的示例需要为关联数组中的每条记录都创建`INSERT`命令，包括那些没有变更的记录。对于中型到大型数据库来说，这会非常低效。你只需要更新发生变更的记录。\n\
  \n你可以根据关联数组中发生变更的记录来生成脚本文件。你也可以将变更日志用作脚本文件，因为 SQL 脚本会列出所有已请求的变更，并且可以重新运行以修复任何损坏的数据。\n\
  \n例如，在`updateRecords()`方法中，你可以创建任何所需的`UPDATE`命令。\n\n```\nprivate function updateRecords($records_array)\n\
  {\n$chge_log_file = date('mdYhis') . $this->change_log_file;\nstring $chge_string\
  \ = \"\";\nforeach ($records_array as $records=>$records_value)\n{\n$this->dogs_array[\"\
  dog\"][$records] = $records_array[$records];\n$chge_string .=  \"UPDATE Dogs \"\
  ;\n$chge_string .= \"SET dog_name='\" . $records_array[$records]['dog_name'] .\"\
  ', \";\n$chge_string .= \"dog_weight='\" . $records_array[$records]['dog_weight']\
  \ .\"',”;\n$chge_string .= \"dog_color='\" . $records_array[$records]['dog_color']\
  \ .\"', \";\n$chge_string .= \"dog_breed='\" . $records_array[$records]['dog_breed']\
  \ .\"' \";\n$chge_string .= \"WHERE dog_id='\" . $records_array[$records]['dog_id']\
  \ . \"';\\n\";\n}\n$chge_log_file = date('mdYhis') . $this->change_log_file;\nerror_log($chge_string,3,$chge_log_file);\
  \ // might exceed 120 chars\n}\n```\n\n这些修改将从关联数组中构建所有更新需求。类似的修改也可以应用于插入和删除方法。\n\
  \n```\nprivate function deleteRecord($recordNumber)\n{\nforeach ($this->dogs_array\
  \ as $dogs=>&$dogs_value) {\nfor($J=$recordNumber; $J  $column_value)\n{\n$dogs_value[$J][$column]\
