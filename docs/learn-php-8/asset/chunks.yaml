  trans: "\n# Notepad++\n\nNotepad++ 可在 [`www.notepad-plus-plus.org`](http://www.notepad-plus-plus.org)\
    \ 下载。该编辑器基础且易于使用，支持创建超过 20 种不同格式的文件（包括 PHP）。本书提供的大部分编码示例均使用 Notepad++ 创建。当你在 Notepad++\
    \ 中创建新的 PHP 程序时，必须告知应用程序文件类型。你可以通过选择“Language”菜单项，然后选择 PHP 来完成此操作。这将使应用程序能够为你提供代码颜色高亮及其他功能。\n\
    \n## 其他编辑器\n\n市面上还有数百种其他编辑器可供选择。我建议你选择一款自己最顺手的工具。挑选一个用户众多且评价较高的编辑器。\n\n## 动手实践\n\
    \n1.  确定一个文本编辑器，用于完成本书中的编码练习。将编辑器下载到你的电脑上。在编辑器中重新输入你的`hello world`程序并保存。通过浏览器运行该程序。你为什么选择下载的这款编辑器？你喜欢它的哪些功能？又不喜欢哪些功能？\n\
    \n## 章节术语\n\n`PHP` | `过程式语言` | 面向对象语言 | [`www.php.net`](http://www.php.net) |\
    \ `WAMP` | `LAMP` | `MAMP` | `脚本语言` | `编程语言` | `JavaScript` | `Web 浏览器` | `源代码`\
    \ | `HTML` | `CSS` | `脚本标签` | `Web 服务器` | `print` 函数 | `Apache` | Apache 软件基金会\
    \ | `SQL` | 数据库管理系统 | `静态页面` | `动态页面` | `GET HTTP 请求` | `MySQL` | `easyPHP (开发者版)`\
    \ | `端口 80` | `httpd.conf` | `php.ini` | `XAMPP` | XAMPP 控制面板 | `别名目录` | `开源`\
    \ | `Notepad++` | `服务器栈`\n\n## 章节问题与项目\n\n### 选择题\n\n1.  MAMP 代表什么？\n    1.  移动应用电机处理器\n\
    \    2.  我的超赞移动程序\n    3.  Apache-MySQL-PHP\n    4.  现代应用模块化编程\n    5.  以上都不是\n\
    \n2.  Apache 软件基金会 (ASP) 的目标包括：\n    1.  协调对 Apache Web 服务器的所有更改\n    2.  监督所有\
    \ Apache 软件的销售\n    3.  授权所有 Web 服务器\n    4.  通过 Apache Web 服务器维护开源编程的成员资格\n\n\
    3.  哪些脚本语言可以在 Web 浏览器中查看？\n    1.  Java\n    2.  XML\n    3.  JavaScript\n   \
    \ 4.  PHP\n\n4.  选出关于静态网页的正确陈述：\n    1.  它们有时被称为平面页面/静止页面。\n    2.  它们由 Web 应用程序生成。\n\
    \    3.  静态网页对所有用户显示相同的信息。\n    4.  以上所有选项。\n    5.  A 和 C。\n\n5.  ___________\
    \ 是一种面向对象的计算机编程语言，常用于在 Web 浏览器中创建交互效果。\n    1.  HTML\n    2.  XML\n    3.  JavaScript\n\
    \    4.  PHP\n\n6.  结束一条 PHP 语句的正确方式是什么？\n    1.  `;`\n    2.  换行\n    3.  `<!php>`\n\
    \    4.  `.`\n\n7.  XAMPP 控制面板上的“配置”按钮允许用户做什么？\n    1.  安装 XAMPP\n    2.  选择自动启动的应用程序\n\
    \    3.  管理附加组件\n    4.  配置 MYSQL\n\n8.  `php.net` 提供以下所有内容，除了：\n    1.  每个最新版本的信息\n\
    \    2.  PHP 语言文档\n    3.  LAMP、MAMP 和 WAMP 的下载\n    4.  对 PHP 文档的贡献\n\n9.  以下哪项最能描述脚本语言？\n\
    \    1.  该语言是编译型的。\n    2.  程序必须与操作系统和硬件兼容。\n    3.  代码首次被访问时就是程序首次执行时。\n    4.\
    \  代码比编译代码运行速度慢。\n\n### 判断题\n\n1.  别名目录允许你将网页文件保存在你选择的目录（文件夹）中，而不是`www`目录中。它允许\
    \ URL 地址直接指向该文件夹。\n\n2.  静态页面（Static page）是指在烘干衣物时放入烘干机以防止静电吸附的纸片。\n\n3.  客户端浏览器向服务器提交一个`GET\
    \ HTTP`请求，然后服务器向客户端浏览器返回一个响应。\n\n4.  easyPHP 的（开发者版）每次只能购买一年。\n\n5.  动态网页从不改变，而静态网页则一直在变化。\n\
    \n6.  WAMP 代表 Windows、Apache、MySQL/MariaDB 和 PHP。\n\n7.  Apache 是 Web 服务器的一个例子。\n\
    \n8.  HTML 代表超文本标记语言。\n\n9.  PHP 最初代表个人主页。\n\n10. 过程式语言是一种使用类和对象的编程语言。\n\n11.\
    \ 在浏览器中查看网站时，你可以查看源代码，其中会显示 HTML、JavaScript 和 CSS。但是，PHP 代码是不可见的。\n\n12. Java\
    \ 是一种过程式编程语言。\n\n### 简答题/论述题\n\n1.  解释浏览器请求静态网页时发生的过程。\n\n2.  解释浏览器请求动态网页时发生的过程。\n\
    \n3.  解释过程式语言和脚本语言之间的区别。\n\n4.  你如何将 PHP 库代码的访问权限添加到你的程序中？\n\n5.  为什么初级程序员应该使用\
    \ WAMP、MAMP 或 LAMP，而不是单独安装每个应用程序？\n\n### 项目\n\n1.  创建一个 PHP 程序，显示你的工作经历和教育经历摘要。\n\
    \n2.  创建一个 PHP 程序，显示你的专业以及完成专业所需的课程。\n\n3.  创建一个 PHP 程序，显示你所在学院/大学的目标和/或宗旨。\n\n\
    ### 期末项目\n\n1.  你的主管要求你设计一个安全的应用程序，用于跟踪 ABC 电脑零件公司仓库的库存。该应用程序将在仓库内部和外部（通过互联网和/或智能手机）均可访问。跟踪这些信息需要哪些数据字段？这些字段应定义为什么大小和数据类型（字符串、整数、浮点数）？还应为这些字段定义哪些输入限制（例如，项目编号不能为负值）？\n\
    \n例如，如果要求提供社会安全号码 (SSN) 字段：\n\n*   SSN：大小：最小：9 个字符（字符串）最大：9 个字符（字符串）限制：有效的 SSN\
    \ 格式\n\n请注意，它使用字符而不是整数，因为无需对 SSN 号码进行任何计算。\n\n# 接口、平台与三层架构编程\n\n*截至 2013 年 1 月，PHP\
    \ 已安装在超过 2.4 亿个网站上（占抽样网站的 39%），以及 210 万个 Web 服务器上。*\n\n—Ide, Andy (2013-01-31)。《PHP\
    \ 持续增长》\n\n## 章节目标/学生学习成果\n\n完成本章学习后，学生将能够\n\n*   列举能够托管 PHP 程序的平台或容器的示例\n*  \
    \ 使用 PHP 创建一个简单的动态 Web 应用程序\n*   解释三层架构设计并确定每层包含的内容\n*   设计一个三层架构应用程序\n*   解释程序开发生命周期\
    \ (PDLC) 的每个步骤\n*   定义并解释 MVC 和依赖注入\n\n## PHP 平台\n\nPHP 是一种强大的语言，因为它几乎可以适用于任何硬件或软件平台。它与\
    \ HTML、CSS 和 JavaScript 轻松交互的能力，使得 PHP 应用程序能够在任何可以托管浏览器的系统上运行。越来越多的应用程序现在使用浏览器作为应用程序的主要接口工具进行创建。这使得应用程序可以在个人电脑、互联网乃至智能手机上运行，而无需在设备上安装实际应用程序（或其他软件）。它还允许用户在切换设备时体验到相同的应用程序“感觉”。随着基于云技术的引入，用户不再被束缚于认为他们使用的软件必须驻留在自己的设备上。\n"
- fmt: '# PHP, AJAX, and CSS—Web Applications


    `PHP` and `AJAX` (Asynchronous JavaScript and XML) work well together. `AJAX`
    provides the ability to dynamically change portions of a web page without reloading
    the complete page. Most web pages have static areas (menus, headers, and footers)
    that do not change relative to user interaction. It is not necessary for these
    areas of the web page to change when the user interacts (clicks a button) with
    the page. `AJAX` can enable you to develop a container (in the following example,
    the container is located between the `div` tags) to display output from a program
    hosted on a web server, without disturbing the complete web page. Users can then
    view content on a web page (menu, header, and footer) when the results of the
    user’s interaction (clicking a button) are still being processed. If for some
    reason the program is slow, hung, or missing, the rest of the page still functions.
    You may have experienced this when you have displayed a page that hangs because
    a lot of information (a lot of ads) is trying to load at once and the page will
    not function because it must be completely loaded before it is usable.


    `AJAX` also allows you to change the content of your `PHP` application on the
    web server without disturbing the web page. You can then update the code in your
    application without the user’s knowledge.


    Let us look at an example.


    ```

    function getXMLHttp(){

    var xmlHttp;

    try

    {

    xmlHttp = new XMLHttpRequest();

    }

    catch(e)

    {

    // for old Internet Explorer users it is different than the others

    try

    {

    xmlHttp = new ActiveXObject("Msxml2.XMLHTTP");

    }

    catch(e)

    {

    try

    {

    xmlHttp = new ActiveXObject("Microsoft.XMLHTTP");

    }

    catch(e)

    {

    alert("Old browser? Upgrade today so you can use AJAX!")

    return false;

    }

    }

    }

    return xmlHttp;

    }

    function AjaxRequest()

    {

    var xmlHttp = getXMLHttp();

    xmlHttp.onreadystatechange = function()

    {

    if(xmlHttp.readyState == 4)

    {

    HandleResponse(xmlHttp.responseText);

    }

    }

    xmlHttp.open("GET", "myfirstprogram.php", true);

    // replace name with any PHP program

    xmlHttp.send(null);

    }

    function HandleResponse(response)

    {

    document.getElementById(''AjaxResponse'').innerHTML = response;

    }

    Example 2-1

    AJAX_Example_JavaScript.js

    ```


    > **Note:** Code example files are included on the Apress web site. You can copy
    and use these examples without any changes. Every attempt has been made to ensure
    that code shown in this book is correct. Printing errors might affect the code
    shown (such as uppercase and lowercase being adjusted, and parentheses being replaced
    with angled parentheses). All code available on the web site is functional.


    - **JavaScript** —A scripting language that provides the ability for a web page
    to be interactive. With JavaScript, a web page can react to the user entering
    information into a text box and/or clicking a button. If you need to brush up
    on JavaScript or need additional examples, review the many free JavaScript AJAX
    videos available on YouTube.


    If you do not know JavaScript, do not get too hung up on the details of this program.
    Let us just look at a few key points. `AJAX` uses HTTP GET to request a program,
    similar to a browser requesting a page. In this example, an instance of the class
    `XMLHttpRequest` (which exists in the JavaScript libraries) is named `XmlHttp`.
    This object is then used to open the request for the `myfirstprogram.php` (like
    opening a pipe). Then the `send` method of the object sends the request (pushes
    the water down the pipe). If the contents of the file are returned back properly,
    the output of the file is placed on the HTML web page between `div` tags with
    an ID of `AjaxResponse`. If the browser cannot handle AJAX communication, an alert
    box will display suggesting the user upgrade the browser. Although it is unlikely
    that anyone is using a browser that cannot interpret AJAX code, you still should
    handle all possibilities.


    ```

    PHP Ajax Demo


    PHP Ajax Demo


    "Watch it!!"

    The words below will be replaced by "Hello World" which is pulled from the ''myfirstprogram.php''
    file via AJAX.

    AJAX DEMO


    Pay attention... Notice when you click the button that only this section changes.


    Copyright & copy; 2020 Little Ocean Waves – Steve Prettyman


    Example 2-2

    ajaxdemo.html

    ```


    For you to use this script, change the `xmlHttp.open` statement to select the
    file you wish to execute (instead of `myfirstprogram.php`). Change the `document.getElementById`
    line to include the ID of the `div` tag you want to use to host the output (instead
    of `AjaxResponse`) in your HTML file (see the HTML code in the next example).


    - **HTML** —Hypertext markup language is a markup language used to format the
    layout of a web page. HTML is interpreted by a browser, which then displays the
    results to the user.

    - For a more in-depth review of HTML, visit the w3schools at [www.w3schools.com/html/default.asp](http://www.w3schools.com/html/default.asp).


    If you do not know a lot about HTML, do not worry. You only need to look at a
    few lines in this example. First, near the top of the code, a link tag pulls in
    the `ajaxdemo.css` file. This CSS file allows you to see a page with some graphic
    details. It allows you to demo that the page updates without the graphics from
    the CSS file repasting or blinking. Right below this line the script type tag
    loads in the JavaScript file from Example 2-1. If you named your file something
    else, this is the line you need to adjust with the new file name. If your files
    are not all in the same folder, you should include the folder name along with
    the file name.


    In the middle of the HTML body section, the input type tag creates a button that
    will call the `AjaxRequest` function (contained in the JavaScript file) when clicked.
    This causes all the JavaScript code in Example 2-1 to execute. The last line we
    need to pay attention to is the `<div id="AjaxResponse">` tag. The value in `id`
    (`AjaxResponse`) must match the object name used in the JavaScript `getElementById`
    code exactly. Assuming that they match correctly, once the button is clicked,
    the JavaScript code will request the `myfirstprogram.php` file and display the
    results between the `div` tags with the `AjaxResponse` ID.


    ```

    body { background-color: #000000;

    font-family: Arial, Verdana, sans-serif; }

