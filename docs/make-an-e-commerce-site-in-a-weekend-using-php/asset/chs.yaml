  </ul>\n</nav>\n</div>\n<p>\n\n语句 #1 创建了一个 `XMLHttpRequest` 对象。`XMLHttpRequest` 对象使\
  \ JavaScript 代码能够执行异步的 HTTP 服务器请求。正是通过使用这个对象，你可以在完全后台的情况下发出 HTTP 请求、接收响应并更新页面上的某个区域。\n\
  \n为了使用 JavaScript 向服务器发出 HTTP 请求，需要一个最初在 Internet Explorer 中以 ActiveX 对象形式引入的类，它被称为\
  \ `XMLHTTP`。JavaScript 内置了一个 `XMLHttpRequest()` 函数，可用于在其他浏览器（如 Firefox、Safari 和\
  \ Opera）中发出 HTTP 请求。\n\n语句 #1 尝试使用 `ActiveXObject(\"Msxml2.XMLHTTP\")` 创建 `XMLHttpRequest`\
  \ 对象，并假设浏览器为 IE6+。如果失败，则语句 #2 执行 `ActiveXObject(\"Microsoft.XMLHTTP\")`，假设浏览器为 IE5.0。如果所有这些都失败，则使用语句\
  \ #3 中的内置函数 `XMLHttpRequest()` 来创建 `XMLHttpRequest` 对象。\n\n语句 #4 中显示的 `updateCart`\
  \ 函数定义了一个 JavaScript 函数，用于显示购物车中商品的数量。每当用户对购物车进行更改时，即每当向购物车添加、修改或删除任何商品时，都会调用此函数。\n\
  \n要实现 AJAX，在创建好 `XMLHttpRequest` 对象之后，下一步是发送 Web 请求以从服务器获取数据。该请求通过 `open` 方法发出。语句\
  \ #5 使用 `GET` 方法向服务器发出请求，并传递要在服务器上执行的文件名 `countcart.php`。`countcart.php` 脚本如代码清单\
  \ 4-4 所示，它简单地统计 `cart` 表中的行数并返回结果。\n\n注意\n```\n\n\n所有现代浏览器——Chrome、IE7+、Firefox、Safari\
  \ 和 Opera——都有一个内置的`XMLHttpRequest`对象。\n\n向服务器发出异步请求时，您需要监视请求的状态以及请求的响应。为此，语句#6 中使用了一个名为`xmlhttp.onreadystatechange`的函数，它会持续检查请求的状态。\n\
  \n语句#7 中所示的`readyState`属性保存了服务器响应的状态。每次`readyState`发生变化时，都会执行`onreadystatechange`函数。以下是`readyState`属性的可能取值：\n\
  \n- 状态 0：请求未初始化\n- 状态 1：请求已建立\n- 状态 2：请求已发送\n- 状态 3：请求正在处理\n- 状态 4：请求已完成\n\n语句#7\
  \ 中的`status`属性表示 HTTP 请求的状态。如果`status`值为`500`，则表示服务器内部错误；`400`值表示错误请求；`401`表示未授权；`403`表示禁止访问；`404`表示未找到，依此类推。状态值`200`表示没有错误。`onreadystatechange`函数会检查请求的状态。如果`state`的值为`4`，则表示已收到完整的服务器响应。如果`status`的值为`200`，则表示响应没有错误，您可以继续处理它。\n\
  \n语句#8 访问具有`cartcountinfo`ID 的元素。`cartcountinfo`是添加到购物车图标后页眉中的`span`元素的 ID。通过此元素，将显示由`countcart.php`文件返回的购物车数量。\n\
  \n语句#9 显示欢迎消息以及用户的电子邮件地址（如果用户已登录且会话变量存在）。此外，如果用户已登录，语句#10 会显示“注销”链接，点击该链接将调用`logout.php`文件。\n\
  \n为了显示购物车中的商品数量，清单 4-4 中所示的`countcart.php`脚本会访问`cart`表中与站点访问者的会话 ID 匹配的商品，并返回获取的行数。\n\
