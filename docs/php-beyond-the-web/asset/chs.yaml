  ### PEAR 和 PECL\n\nPEAR（PHP 扩展与应用仓库）是一个用 PHP 编写的代码和扩展库，并附带一个易于使用的打包和分发系统。PECL（PHP\
  \ 扩展社区库）本质上与之类似，但针对的是用 C 编写的扩展。\n\nPECL 和 PEAR 的工作方式与 Debian 的 `apt-get` 等包管理器类似。例如，要从\
  \ PECL 安装 Cairo 图形扩展，只需在命令行中执行 `sudo pecl install cairo`。这将为你下载、编译并安装 Cairo，然后你就可以在\
  \ PHP 脚本中使用它了。同样，要从 PEAR 安装 RDF 扩展，请使用 `pear install rdf`。\n\n`pear` 和 `pecl` 命令是\
  \ PHP 的标准组成部分，但有些包管理器将它们放在可选的 `php-dev` 或 `php-pear` 包中。例如，在 Ubuntu 上，使用 `sudo apt-get\
  \ install php-pear` 来安装它。\n\n关于这两者以及数以百计的可用扩展和库的更多信息，可以分别访问 [`pear.php.net`](http://pear.php.net)\
  \ 和 [`pecl.php.net`](http://pecl.php.net) 查找。\n\n\n\n### Composer\n\n`Composer`\
  \ 是一个依赖管理器。虽然它处理的是包，但它并不是像 `PEAR` 那样的包管理器。它不是集中安装包，而是基于每个项目来处理，确保相关包的适当版本及其依赖项自动为该项目安装。\n\
  \n基本的 `Composer` 工作流程如下：\n\n-   安装 `Composer`。\n-   在项目根目录中，创建一个名为 `composer.json`\
  \ 的 JSON 格式文件，该文件指定项目需要哪些包（及其版本）。\n-   在该目录中，运行 `Composer`。它将获取并安装指定的包，并且还会自动安装您指定的那些包所依赖的任何其他包（依此类推，直到满足所有依赖关系）。\n\
  -   在您的 PHP 代码中，只需添加函数 `require 'vendor/autoload.php';`，当您使用这些库时，它们将自动可用。\n\n在 `composer`\
  \ 网站上提供了面向初学者和高级用户的全面文档。`Composer` 本身不托管任何包，这是包仓库的工作。`Packagist` 是主要的，也是目前唯一的综合性公共仓库，并且是\
  \ `Composer` 默认使用的仓库。您可以在 `Packagist` 网站上浏览成千上万个可用的包。当然，您可以指定不同的仓库，如果确实需要，甚至可以私下创建和使用自己的包。\n\
  \n| | **Composer 依赖管理器** |\n| | 以项目为基础，保持库的一致性和最新状态的简便方法。 |\n| | **主站** : [`getcomposer.org/`](http://getcomposer.org/)\
  \ |\n| | **包仓库** : [`packagist.org/`](https://packagist.org/) |\n| | **安装信息** :\
  \ [`getcomposer.org/doc/00-intro.md#installation-nix`](http://getcomposer.org/doc/00-intro.md#installation-nix)\
  \ |\n| | **主要文档** : [`getcomposer.org/doc/`](http://getcomposer.org/doc/) |\n| |\
  \ **教程** : [`code.tutsplus.com/tutorials/easy-package-management-with-composer--net-25530`](http://code.tutsplus.com/tutorials/easy-package-management-with-composer--net-25530)\
  \ |\n\n### Symfony2 bundles\n\n如果您使用 `Symfony2` 框架，您可以从 `knpbundles` 中选择并下载超过一千个有用的代码包。这些包可以手动安装，或者通常使用\
  \ `Composer` 依赖系统安装（请参见上文）。访问 [`knpbundles.com/`](http://knpbundles.com/) 获取更多信息并浏览可用的代码。\n\
