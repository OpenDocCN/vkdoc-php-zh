    \    <span class=\"admin_page_text\">编辑 HatShop 的部门：</span>\n    \n    <br /><br\
    \ />\n    \n    {if $admin_departments->mErrorMessage neq \"\"}\n    <span class=\"\
    admin_error_text\">\n    ```\n    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\
