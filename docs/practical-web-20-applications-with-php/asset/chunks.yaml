    **Building the Entire Index**


    Before we integrate the automatic maintenance of indexed documents, we will now
    write a function to build the entire index from scratch. This is useful the very
    first time we try to index a new document because the index will not yet exist.


    Typically you won’t need to build an index from scratch, but in addition to building
    the index when you first integrate this functionality, you may need to rebuild
    the indexes if the data goes missing or is corrupted. For example, if you needed
    to move the web application to a new server, you would copy the database, application
    files (such as PHP scripts and templates), and images uploaded (assuming you used
    the method described in Chapter 11). You wouldn’t, however, move the data that
    is automatically generated by the application, such as compiled templates or search
    indexes. In this case you would rebuild the indexes on the new server.


    To build the index from scratch, all we need to do is call the GetPosts() function
    to retrieve all live posts and then loop over each document and call the getIndexableDocument()
    method on the blog post object accordingly.


