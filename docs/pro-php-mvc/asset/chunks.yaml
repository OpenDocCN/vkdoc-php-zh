- fmt: "# PHP 模板解析器实现\n\n## 类的引入与基础结构\n\n```php\nuse Framework\\ArrayMethods as ArrayMethods;\n\
    use Framework\\StringMethods as StringMethods;\nuse Framework\\Template\\Exception\
    \ as Exception;\n\nclass Template extends Base\n{\n    protected function _script($tree)\n\
    \    {\n        $content = array();\n        \n        if (is_string($tree))\n\
    \        {\n            $tree = addslashes($tree);\n            return \"\\$_text[]\
    \ = \\\"{$tree}\\\";\";\n        }\n        \n        if (sizeof($tree[\"children\"\
    ]) > 0)\n        {\n            foreach ($tree[\"children\"] as $child)\n    \
    \        {\n                $content[] = $this->_script($child);\n           \
    \ }\n        }\n        \n        if (isset($tree[\"parent\"]))\n        {\n \
    \           return $this->_implementation->handle($tree, implode($content));\n\
    \        }\n        \n        return implode($content);\n    }\n}\n```\n\n## `_script()`\
    \ 方法说明\n\nThe final protected parser method is the `_script()` method. It walks\
    \ the hierarchy (generated by the `_tree()` method), parses plain text nodes,\
    \ and indirectly invokes the handler for each valid tag. The `_script()` method\
    \ should generate a syntactically correct function body.\n\n## 解析器的完整性与简化需求\n\n\
    Our parser is technically complete. If these protected methods were public, we\
    \ could string a bunch of statements together for a variety of purposes: to convert\
    \ our template to an array, to convert that array to a tree, and to convert that\
    \ tree with a script. We want something easier though. We need to bear in mind\
    \ that our templates are precompiled, in the sense that we need to compile them\
    \ to functions before we can use them.\n\nWe can, therefore, simplify our template\
    \ parsing by have two public methods: one to turn the template into a function,\
    \ and one to process the template in terms of an array of input data. Let's look\
    \ at these two methods in Listing 8-11.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 主公共解析器方法\n\n**Listing 8-11.** Main Public Parser Methods\n\n```php\nnamespace\
    \ Framework\n{\n    use Framework\\Base as Base;\n    use Framework\\ArrayMethods\
    \ as ArrayMethods;\n    use Framework\\StringMethods as StringMethods;\n    use\
    \ Framework\\Template\\Exception as Exception;\n    \n    class Template extends\
    \ Base\n    {\n        public function parse($template)\n        {\n         \
    \   if (!is_a($this->_implementation, \"Framework\\Template\\Implementation\"\
    ))\n            {\n                throw new Exception\\Implementation();\n  \
    \          }\n            \n            $array = $this->_array($template);\n \
    \           $tree = $this->_tree($array[\"all\"]);\n            $this->_code =\
    \ $this->header . $this->_script($tree) . $this->footer;\n            $this->_function\
    \ = create_function(\"\\$_data\", $this->code);\n            \n            return\
    \ $this;\n        }\n        \n        public function process($data = array())\n\
    \        {\n            if ($this->_function == null)\n            {\n       \
    \         throw new Exception\\Parser();\n            }\n            \n      \
    \      try\n            {\n                $function = $this->_function;\n   \
    \             return $function($data);\n            }\n            catch (\\Exception\
    \ $e)\n            {\n                throw new Exception\\Parser($e);\n     \
    \       }\n        }\n    }\n}\n```\n\n## `parse()` 与 `process()` 方法说明\n\nAside\
    \ from assigning a template implementation to the template parser, the only public\
    \ methods you will use when evaluating and populating a template will be the `parse()`\
    \ and `process()` methods. The `parse()` method utilizes all of the code we have\
    \ written so far (for our template parser) to create a working function. It wraps\
    \ the processed template within the `$_header` and `$_footer` variables we saw\
    \ earlier. This is then evaluated with a call to PHP's `create_function` method\
    \ and assigned to the protected `$_function` property.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nThe `process()` method check for the existence of the protected `$_function`\
    \ property and throws a `Template\\Exception\\Parser` exception if it is not present.\
    \ It then tries to execute the generated function with the `$data` passed to it.\
    \ If the function errors, another `Template\\Exception\\Parser` exception is thrown.\n\
    \n## 示例模板展示\n\nLet's take a look at what our parser does, behind the scenes, with\
    \ the template shown in Listing 8-12.\n\n**Listing 8-12.** Example Template\n\n\
    ```php\n{if $name && $address}\n    name: {echo $name} <br />\n    address: {echo\
    \ $address} <br />\n{/if}\n{elseif $name}\n    name: {echo $name} <br />\n{/elseif}\n\
    {foreach $value in $stack}\n    {foreach $item in $value}\n        item ({echo\
    \ $item_i}): {echo $item} <br />\n    {/foreach}\n{/foreach}\n{foreach $value\
    \ in $empty}\n    <!--never printed-->\n{/foreach}\n{else}\n    nothing in that\
    \ stack! <br />\n{/else}\n{macro test($args)}\n    this item's value is: {echo\
    \ $args} <br />\n{/macro}\n{foreach $value in $stack[\"one\"]}\n    {echo test($value)}\n\
    {/foreach}\n{if true}\n    in first <br />\n    {if true}\n        in second <br\
    \ />\n        {if true}\n            in third <br />\n        {/if}\n    {/if}\n\
    {/if}\n```"
