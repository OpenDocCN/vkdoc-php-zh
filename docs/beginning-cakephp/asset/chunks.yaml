    **Route Parameters**


    You may need to specify which sections of the URL correspond to parameters in
    the controller. With route parameters, you can tell the router how to parse the
    URL. Consider the Posts controller. You may want a particular route to be called
    only when this controller is entered in the URL. But what about routes that are
    called for certain actions without using the controller name? In this scenario,
    you would need to specify a route parameter for the controller; in other words,
    the router will need to know that the first parameter in the path represents the
    controller and the other parameters represent other elements. For example, if
    you wanted to affect the View action for all controllers, you could enter a route
    along these lines:


    Router::connect(''/:controller/view'',array(''action''=>''read''));


    Here, whenever a View action is called, it will point to the Read action instead.
    You’ve used the route parameter :controller to tell the router that the first
    part of the path represents the controller to map.


    Route parameters may be anything as long as they are one word, are preceded by
    a colon, and are defined in the parameters array. They can be checked by magic
    variables or regular expressions for the route to be activated. Route parameters
    do not need to be separated by slashes. Symbols such as slashes, dashes, colons,
    and ampersands can be used to separate parameters since the router can detect
    the route parameter.


    **Magic Variables**


    What about passing variables through the routing engine? You can accomplish this
    in part with magic variables. These include common action names, date elements,
    and ID numbers.


    In other words, the router will automatically detect months and years in the URL
    if you want and will determine where to map those types of requests.


    For instance, most blog applications manage their posts by date. To do this, you’d
    need to use magic variables in the Router::connect() function:


    Router::connect(''/:controller/:month-:day-:year'', array(''action''=>''view'',array(➥


    ''month''=>$Month,''day''=>$Day,''year''=>$Year)));


    You can see that in the path you’ve entered some placeholders—specifically a controller,
    month, day, and year placeholder between each set of slashes. These are “magic
    variables,”


    and they always begin with a colon. In other words, you’ve defined the slots in
    the URL and have given them a name. The first one will contain the controller
    name, the second will contain a month value, and so forth. The router will check
    these slots against the magic variables used in the parameters array, and if they
    return true, it will pass them along to the specified controller’s View action.


    Values entered in the place of magic variable slots in the URL are passed to the
    action through the $this->params array. In the previous example, the given month
    would be available in the array as this:


    $this->params[''month'']


    and so forth. The $this->params array may be checked or called in the controller
    and the view.


