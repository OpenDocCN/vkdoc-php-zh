    \n## Insisting on a Title\n\nWe have a usability flaw in our logic; it is possible\
    \ to create a new blog entry without specifying a title for it!\n\n![](images/323857_3_En_8_Chapter/323857_3_En_8_Fig3_HTML.jpg)\n\
    \nThis window reflects when the host tries to enter a new blog without a title.\n\
    \n**Figure 8-3** Entering a blog without a title\n\nThe problem is that a blog\
    \ entry without a title cannot be clicked, and consequently, such an entry is\
    \ not loaded into the entry editor form. If we really wanted to edit the blog\
    \ entry, we could change the entry in the database table. We might say that this\
    \ is a usability problem rather than a functional problem. Functionally speaking,\
    \ it *is* possible to edit the entry, but it would be much more convenient, and\
    \ much easier for users, if all blog entries could be edited through the entry\
    \ editor.\n\n**Secure Programming**  \nThis might be considered a security flaw\
    \ in our program or, at least, a validation flaw. Remember, we must make sure\
    \ all data is valid before it is entered into the database. We certainly have\
    \ not done so here. For secure validation, it must occur in two locations: the\
    \ client side and the server side. We must remember that hackers can bypass our\
    \ forms and attempt to send information directly to our program on the server.\
    \ If we only validate on the client machine, we leave a hole for this to occur.\n\
    \nSo why not validate everything on the server, and just skip validation on the\
    \ client? The answer is efficiency. Every time we use PHP code, we are interacting\
    \ with the server. Thus, if we only validate using PHP, we must pass the information\
    \ to the server, validate, pass back the information and error messages to the\
    \ form on the client machine, and do it again if the user still does not enter\
    \ correct information. If we validate on the client machine first, we can make\
    \ sure that valid information (when sent from the form) is only sent to the server\
    \ – thus reducing the server calls and making the program more user-friendly and\
    \ more efficient. Of course, we still will validate using PHP to make sure that\
    \ the data was not corrupted on the way to the server or that a hacker is not\
    \ attempting to send invalid data to the server.\n\nLet us start by making a small\
    \ change to our editor HTML code for client-side validation. Although we already\
    \ cleaned our data on the server side, let us update the user side to not allow\
    \ special characters, which may indicate an attempt to enter HTML code. We also\
    \ will require that a title be entered. This will eliminate the problem shown\
    \ in Figure [8-3](#323857_3_En_8_Chapter.xhtml#Fig3).\n\n```\n//partial code for\
    \ views/admin/another-editor-html.php\ntitle !=\"\") {\n$info .= \"value='$entryData->title'\
    \ \";\n}\n$info .= \"pattern='[A-Za-z]{,150}'\"\ntitle='Title can contain only\
    \ alphabetic letters, no special characters. Title is required.'\nrequired />\n\
    ```\n\nThe pattern `pattern='[a-z][A-Z]{,150}'` will allow only alphabetic characters,\
    \ and requires at least one character, with a maximum of 150 characters. The HTML\
    \ `required` attribute also checks that the user has entered information. The\
    \ `title` attribute defines the error message to be displayed if the user does\
    \ not enter the correct required information. The title text box will only be\
    \ set with a value if it is not the default value. Otherwise, the pattern test\
    \ will fail.\n\n![](images/323857_3_En_8_Chapter/323857_3_En_8_Fig4_HTML.jpg)\n\
    \nThis dialer reflects when the host tries to create new entries with invalid\
    \ titles.\n\n**Figure 8-4** Output from `another-editor-html.php` with invalid\
    \ input\n\n**Note**  \nThe following files have been updated with minor changes\
    \ to use the modified form: `another-admin-navigation.php`, `anothereditor.php`,\
    \ `anotheradmin.php`, `another-entries-html.php`, `anotherentries.php`. For more\
    \ information on input patterns, visit [`www.w3schools.com/tags/att_input_pattern.asp`](http://www.w3schools.com/tags/att_input_pattern.asp).\n\
    \nThis solution will work beautifully in most modern browsers. However, any older\
    \ browsers will ignore HTML that it cannot execute and simply pass the values\
    \ entered to the PHP program on the server.\n\nTo verify that the title has a\
    \ value, we only need to change one code line in the `anothereditor.php` program.\n\
    \n```\nif (( $editorSubmitted ) && (isset( $_POST['title']))) {\n```\n\n**Exercise**:\
    \ Adjust the HTML code for the text field in the `another-editor-html.php` form\
