- fmt: "以下是对给定文本的排版处理结果：\n\nThe following files have been updated to access the new\
    \ versions: `valideditor.php`, `validimages.php`, `validentries.php`, `valid-editor-html.php`,\
    \ `valid-entries-html.php`, `valid-images-html.php`.\n\nLet us take some time\
    \ to test it by running `http://localhost/ch9/blog/validadmin.php?page=validusers`\
    \ in the browser. Try to create an admin user. You should get a confirmation message\
    \ displayed in the form. Check in `http://localhost/phpmyadmin` to see whether\
    \ the admin user was in fact inserted into the admin database table. You should\
    \ create at least one user, because you will need it to be able to create other\
    \ users. Remember to write down the userid and password!\n\nOnce you have created\
    \ a new admin user, try to create one more admin user using the same email address.\
    \ It should not be allowed, and you should receive an error message in the form.\
    \  \n**Exercise**: Try to create a password with special characters. The current\
    \ HTML will not catch this attempt. However, the PHP code will catch it and raise\
    \ an exception. Adjust the HTML code to catch the attempt before it is passed\
    \ to the server.\n\n## Planning Login\n\nLet us now use our userid and password\
    \ for *authentication* to restrict access to the administration blog modules.\
    \ We will need two *views*: a login form and a logout form. We will need a *controller*\
    \ to handle user interactions received from these two views and a *model* to actually\
    \ perform login and logout. The model should also remember a state: it should\
    \ remember if the user is logged in or not.\n\n## Creating a Login Form\n\nWe\
    \ will begin with the login form. Our goal is to create a system in which a user\
    \ must provide a valid userid and a matching password to be allowed access to\
    \ the blog administration module. Thus, we need a userid and password field.\n\
    \n```\nLogin to access restricted area\nuserid\npassword\n\n\";\n?>\nListing 9-20\n\
    login-form-html.php\n```\n\nA very simple, straightforward form is all that is\
    \ required. We can also create a simple controller to test our logic.\n\n```\n\
    Listing 9-21\nlogin.php\n```\n\nThe admin navigation does not provide a menu item\
    \ for the login, and it shouldn’t. We want the login form to be displayed as the\
    \ default view of the front controller for the administration module. Only when\
    \ a user is authenticated and logged in should the user be allowed to see the\
    \ blog administration module.\n\n## Hiding Controls from Unauthorized Users\n\n\
    It is very important that a login actually hides parts of a system from unauthorized\
    \ users. So far, the administration module has been readily available to anybody\
    \ visiting the front administration controller. We will fix this by making a few\
    \ changes here:\n\n- We will create an `Admin_User` object to remember login state.\n\
    - If a visitor is not logged in, we will show only the login form.\n- If a user\
    \ is logged in, we will show the admin navigation and the administration module.\n\
    \nTo do that, we need to make some changes to the front controller for the administration\
    \ module.\n\n```\nsetTitle(\"PHP/MySQL blog demo\");\n$pageData->setCss(\"\");\n\
    include_once \"models/updateddatabase.php\";\ninclude_once \"models/Admin_User.class.php\"\
    ;\n$admin = new Admin_User();\n//load the login controller, which will show the\
    \ login form\ninclude_once \"controllers/admin/login.php\";\n$pageData->setContent($info);\n\
    //add a new if statement\n//show admin module only if user is logged in\nif( $admin->isLoggedIn()\
    \ ) {\ninclude \"views/admin/login-admin-navigation.php\";\n$pageData->setContent($nav);\n\
    $navigationIsClicked = isset( $_GET['page'] );\nif ($navigationIsClicked ) {\n\
    $controller = $_GET['page'];\n} else {\n$controller = \"loginentries\";\n}\ninclude_once\
    \ \"controllers/admin/$controller.php\";\n$pageData->appendContent($info);\n}\
    \ //end if-statement\ninclude_once \"views/page.php\";\necho $page;\n?>\nListing\
    \ 9-22\nloginadmin.php\n```\n\n```\ninclude_once \"models/Admin_User.class.php\"\
    ;\n$admin = new Admin_User();\n```\n\nA new `Admin_User` class is included, and\
    \ an instance is declared, `$admin`. This class will determine if the user is\
    \ logged in or not. We will look at the code in a moment.\n\n```\ninclude_once\
    \ \"controllers/admin/login.php\";\n$pageData->setContent($info);\n```\n\nThe\
    \ login page is displayed.\n\n```\nif( $admin->isLoggedIn() ) {\ninclude \"views/admin/login-navigation.php\"\
    ;\n$pageData->setContent($nav);\n$navigationIsClicked = isset( $_GET['page'] );\n\
    if ($navigationIsClicked ) {\n$controller = $_GET['page'];\n} else {\n$controller\
    \ = \"loginentries\";\n}\n```\n\nIf the user is logged in, the default `entries`\
    \ page or the page selected by the user is displayed. This is the same code as\
    \ before but is now controlled by the if statement.\n\n## HTTP Is Stateless\n\n\
    Hypertext transfer protocol (HTTP) is the foundation of much data communication\
    \ on the Internet. It is *stateless*, which means it treats each new request as\
    \ a separate transaction. In practical terms, it means that all PHP variables\
    \ and objects are created from scratch with every new request.\n\nThat has some\
    \ consequences for us. When we submit the login form, we are making an HTTP request.\
    \ PHP will run, and the `$admin` object will remember that we are logged in. If\
    \ we try to click an entry, this will make a new HTTP request, and thus, a new\
    \ `$admin` object will be created. PHP will not remember that we just logged in,\
    \ because the new HTTP request is treated as an independent, separate transaction.\
    \ The previous HTTP request is completely forgotten.\n\n## Superglobal: $_SESSION\n\
    \nThis stateless HTTP is bad news for our login. No matter how many times we log\
    \ in, PHP will forget about it with every new request. It is very impractical,\
    \ and of course, there is a solution: forming a persistent state across requests.\
    \ We need a way to force PHP to remember that a given user is logged in. The PHP\
    \ `session` will accomplish this task.\n\nWhen a PHP session is started, the visiting\
    \ user’s browser will be assigned a unique identification number: a *session id*.\
    \ The server will create a small, temporary file on the server side (by default).\
    \ Any information we require for our application to remember across requests can\
    \ be stored in this file. A PHP session duration can be configured in the `php.ini`\
    \ file.\n\n> **Note**: Read more at [`www.php.net/manual/en/intro.session.php`](http://www.php.net/manual/en/intro.session.php).\n\
    \nPHP provides a superglobal to make a session. Now, it is time for us to meet\
    \ `$_SESSION`.\n\n## Persisting State with a Session\n\nTo use a session, we must\
    \ start a session. With that in place, we can create a *session variable*, which\
    \ is a variable whose value is *stateful*, meaning a variable whose value can\
    \ persist across HTTP requests.\n\nLet us use a session variable to remember our\
    \ login status.\n\n```\n<?php\n//complete code for models/Admin_User.class.php\n\
    class Admin_User {\n//declare a new method, a constructor\npublic function __construct(){\n\
    //start a session\nsession_start();\n}\npublic function isLoggedIn(){\n$sessionIsSet\
    \ = isset( $_SESSION['logged_in'] );\nif ( $sessionIsSet ) {\n$out = $_SESSION['logged_in'];\n\
    } else {\n$out = false;\n}\nreturn $out;\n}\npublic function login () {\n//set\
    \ session variable ['logged_in'] to true\n$_SESSION['logged_in'] = true;\n}\n\
    public function logout () {\n//set session variable ['logged_in'] to false\n$_SESSION['logged_in']\
    \ = false;\n}\n}\npublic function __construct(){\n//start a session\nsession_start();\n\
    }\nListing 9-23\nAdmin_User.class.php\n```\n\nThe constructor starts a session\
    \ when an instance of `Admin_User` is created.\n\n```\npublic function isLoggedIn(){\n\
    $sessionIsSet = isset( $_SESSION['logged_in'] );\nif ( $sessionIsSet ) {\n$out\
    \ = $_SESSION['logged_in'];\n} else {\n$out = false;\n}\nreturn $out;\n}\n```\n\
    \nThe `isLoggedIn()` function determines if the session variable has been created.\
    \ If it has, the content is placed into `$out`. If it has not (not logged in),\
    \ then `false` is stored into `$out`. Then `$out` is returned."
