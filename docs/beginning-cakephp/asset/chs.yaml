  \ 13-3）。\n\n![图片 44](img/index-262_1.jpg)\n\n**图 13-3.** *Calendar 插件使用 View 操作为\
  \ 2025 年 1 月渲染的日历*\n\n### 总结\n\n插件就像是微型的 Cake 应用程序，你可以将其引入任何其他 Cake 应用程序中。它们作为第三方资源（如\
  \ Pseudocoder 的 Ajax Chat 插件）非常有用，但也适用于可能需要在多个 Cake 项目中使用相同流程的内部应用程序。我解释了如何通过编写\
  \ Calendar 插件来构建自定义插件，该插件基于事件数据库表为任何 Cake 应用程序渲染日历。此插件使用控制器、模型、视图和辅助函数来创建一个简单的日历视图，并且可以扩展其他\
  \ Cake 应用程序以处理日历流程。下一章将讨论如何扩展 Web 应用程序开发中最具挑战性但也最高效的方面之一：数据处理。通过使用行为和 DataSource，你将能够将你的\
  \ Cake 应用程序连接到新的数据源，并更高效地处理数据。\n\n## 第 14 章\n\n# DataSource 与行为\n\n\n\n### CakePHP\
  \ 的 MVC 扩展资源\n\n**Cake** 的核心资源严格遵循 MVC 范式，这意味着所有输出由视图（view）配置，所有数据处理由模型（model）管理，所有业务逻辑由控制器（controller）处理。然而，你已经了解到模型、视图和控制器是如何相互协作来作为一个应用程序运行的。视图不能在没有控制器提供所需变量的情况下单独运行，控制器也不能在没有模型帮助的情况下处理其逻辑，依此类推。这些资源相互协作的程度取决于应用程序所采用的独特流程。由于\
  \ MVC 元素几乎同时协同工作，你可能操纵某个元素去执行另一个元素的工作。例如，模型可以创建输出字符串（如 HTML 标签和表单字段）并传递给视图。这在短期内可能有效，但如果你后来分发这个应用程序，其他\
  \ Cake 开发者将很难与之协作。要保持 Cake 应用程序的可移植性，需要尽可能严格遵循 MVC 结构。\n\n但是，仅有模型、视图和控制器文件会带来一个潜在问题：这些文件可能会变得臃肿，这意味着应用程序越复杂，这些资源的组织就可能越混乱。诚然，所有数据处理都限制在模型中，但如果你想处理多个数据源（例如一个\
  \ XML 文件和两个不同的数据库系统）呢？在这种情况下，模型需要包含大量的连接函数，更不用说查找、读取、删除以及其他必要的数据处理方法了。不久之后，MVC 结构就会开始失去其关键优势之一：轻量级组织，尤其是在应用程序较为复杂的情况下。\n\
  \n为了解决模型、视图和控制器文件过于庞大的问题，Cake 开发者们在框架中内置了*扩展* MVC 结构的资源。我在之前的章节中已经讨论过其中一些扩展，例如助手（helper）和组件（component）。通过扩展\
  \ MVC 结构，模型操作被保留在模型中，视图和控制器操作也各归其位——但模型、视图和控制器文件不会因重复出现在整个程序中的函数和数据而变得过重。\n\n正如基本应用程序流程（如处理数据和向用户提供输出）通过使用模型、视图和控制器进行分离一样，更复杂的流程（如生成动态视图）也与其各自的资源进行了分离。换句话说，助手和组件分别为处理视图和控制器提供了*第二层*支持。表\
  \ 14-1 展示了 Cake 中扩展 MVC 布局的资源。\n\n**表 14-1.** *Cake 扩展 MVC 布局的资源*\n\n| **主层资源**\
  \ | **后台层资源** |\n| --- | --- |\n| 模型（`Model`） | 行为（`Behavior`）；数据源（`DataSource`）\
  \ |\n| 视图（`View`） | 助手（`Helper`） |\n| 控制器（`Controller`） | 组件（`Component`） |\n\n\
  通过使用助手，你可以避免单个视图变得过于臃肿，并使详细的输出流程可供应用程序中的其他视图使用。助手函数在后台层处理，或者在视图渲染时处理。组件通过分离出执行详细操作的一系列函数，为控制器提供类似的服务。图\
  \ 14-1 展示了助手如何扩展视图。\n\n**图 14-1.** *助手通过容纳更复杂的函数来扩展视图，这些函数否则会使视图变得混乱。*\n\n这是具体流程：\n\
  \n1.  视图调用`$html->link()`函数来渲染一个链接，并为助手提供变量参数。\n2.  `link()`函数处理传递的参数并组合成最终输出，供视图使用。\n\
  3.  HTML 助手将最终的`<a>`元素及其所有文本和属性发送回视图。\n\n图 14-1 中的示例展示了如何通过将生成链接的重复性任务放入助手中来精简视图。换句话说，Cake\
  \ 不是将`$html->link()`函数的流程放入视图，而是将其保存在一个位置，从而使其可被整个应用程序访问，同时最小化视图文件中的代码量。本章将解释如何使用两种资源来扩展后台层的模型，就像助手和组件扩展视图和控制器一样。\n\
  \n### 使用数据源和行为扩展模型\n\n第一种资源是*数据源（`DataSource`）*。¹ 这些资源在后台连接额外的数据源并向模型提供数据。通过使用数据源，你可以让模型正常工作，而不必用连接、查找、读取和其他数据处理操作来填充它。模型可以引用数据源函数，而不是自己执行额外的连接。\n\
  \n第二种扩展模型的资源是*行为（`Behavior`）*。这些是允许模型使用的数据以不同方式“表现”的类。简而言之，一些数据处理方法超越了表关联和简单回调；例如，它们可能在数据保存时对数据执行多个任务。当需要在数据库中同时执行多次更新时，就会调用行为。稍后，我将描述如何使用一些\
  \ Cake 内建的行为为博客应用程序的标签应用树结构。\n\n由于扩展模型通常是资源中最复杂的部分，本章可能会包含一些学习 Cake 时最难掌握的概念。\n\n\
  只需记住该资源的总体目标以及它最初出现在 Cake 中的原因。你的应用程序可能不需要为模型添加自定义行为，或者使用除典型 MySQL 设置之外的其他数据源，但了解这些资源能做什么以及它们在\
  \ Cake 中如何工作，几乎肯定会在某些时候派上用场。\n\n### 使用数据源\n\n到目前为止，本书只使用了 MySQL 来处理数据，但肯定还有其他方式为应用程序存储数据。例如\
  \ PostgreSQL、Sybase、Oracle 和 Microsoft SQL Server 都是一些最流行的数据库系统，如果项目需要，让 Cake 与它们协作可能很重要。幸运的是，Cake\
  \ 提供了一些内建的数据源，允许应用程序连接到这些其他系统。\n\n数据源不仅有助于处理其他数据库引擎，还可以进行自定义以处理其他数据格式。可以通过数据源实现读取\
  \ XML、CSV 或其他格式。应用程序也可以通过数据源使用其他服务器系统，如 LDAP 或 IMAP。许多 Web 应用程序使用某种 Web 服务 API 来与不使用\
  \ HTML 的客户端程序协作。结合 Cake 应用程序和客户端软件的能力也可以通过数据源实现。\n\n数据源的主要目标是处理模型的所有连接方法，并为模型提供便捷函数，以尽可能减少模型中的代码量。不过，这些便捷函数与数据源的通信有关，而不仅仅是任何模型类型的流程。换句话说，你希望模型能够坚持使用数据源进行通信，而不是自行处理所有连接细节。\n\
  \n¹ 在 Cake 中定义数据源可能比较棘手。通常，*datasource*（小写）是任何提供或保存数据的来源。因此，MySQL 是一个数据源，XML 文件或从\
  \ LDAP 获取数据也是数据源。\n\n\n\n服务器。Cake 连接这些数据源（datasource）的方式是通过一个名为 `DataSource` 的资源文件，这与数据源本身并非同一概念。为了在本章中保持一致性，我将使用驼峰式拼写的\
  \ `DataSource` 来指代 Cake 的资源文件，而使用小写单词 `datasource` 来指代实际的数据源。简而言之，在 Cake 中，你使用 `DataSources`\
  \ 来连接诸如 MySQL、XML 文件和 LDAP 服务器等数据源。\n\n![图片 47](img/index-266_1.jpg)\n\n![图片 48](img/index-266_2.jpg)\n\
  \n![图片 49](img/index-266_3.jpg)\n\n将其传递给 `read()` 函数，而不是必须按照当前数据源可能要求的某种独特方式，逐步执行读取记录的操作。模型应尽可能避免为适应特定数据源而更改其现有方法。\n\
  \n例如，图 14-2 展示了 MySQL `DataSource` 如何扩展模型，以使模型无需自行构造必要的 SQL 查询字符串并执行数据库连接方法。\n\n\
  **图 14-2.** *MySQL DataSource 为模型拼接连接字符串和数据库查询。*\n\n过程如下：\n\n1. 模型运行其某个函数，该函数被发送至\
  \ `DataSource`；在此例中，调用了 `find()`，并发送了 `$value` 的内容。\n2. `DataSource` 根据数据源的语言拼接查询字符串，连接至数据源并执行查询；在此例中，MySQL\
  \ `DataSource` 执行类似 `\"SELECT * FROM table WHERE field=$value\"` 的查询。\n3. 数据源返回结果集；此处，MySQL\
  \ `DataSource` 执行一些 `mysql_fetch_array()` 函数，并遍历来自数据库的结果集以获取最终结果。\n4. 获得最终结果后，`DataSource`\
  \ 格式化该结果集以供模型使用。这通常会是某种类型的数组。\n5. 格式化后的数组或结果集被发送回模型。模型随后将其数据用于自身用途。\n\n### 使用内置\
  \ DataSources\n\nCake 的内置 `DataSources` 仅支持关系型数据库系统。由于它们充当模型与数据库之间的层，模型内不会调用额外的\
  \ `DataSource` 函数。要从一个 `DataSource` 切换到另一个，只需调整数据库配置文件即可。\n\n更改应用程序主 `DataSource`\
  \ 的第一步是设置 `app/config/database.php` 中的 `driver` 参数。打开此文件，你将找到 `DATABASE_CONFIG`\
  \ 类；它应包含最初搭建博客应用时使用的原始设置（见清单 14-1）。\n\n**清单 14-1.** *`app/config/database.php` 中的\
  \ `DATABASE_CONFIG` 类*\n\n```\n1 class DATABASE_CONFIG {\n2   var $default = array(\n\
  3     'driver' => 'mysql',\n4     'persistent' => false,\n5     'host' => 'localhost',\n\
  6     'port' => '',\n7     'login' => 'root',\n8     'password' => 'root',\n9  \
  \   'database' => 'blog',\n10    'schema' => '',\n11    'prefix' => '',\n12    'encoding'\
  \ => ''\n13   );\n14 }\n```\n\n清单 14-1 的第 2 至 13 行包含 `$default` 变量，它告知 Cake 连接到默认数据源的位置。博客应用当前通过内置的\
  \ MySQL `DataSource` 连接到 MySQL。这在第 3 行通过 `driver` 参数设置。通过将其更改为其他驱动，Cake 将使用新的对应\
  \ `DataSource` 来替代 MySQL。表 14-2 列出了可用的驱动选项，你可以根据想要连接的 `DataSource` 使用。\n\n**表 14-2.**\
  \ *`DATABASE_CONFIG` 类可用的驱动选项*\n\n| 驱动参数 | 数据源 | 最低 PHP 版本要求 |\n|-----------|--------|---------------------|\n\
  | `db2` | IBM DB2、Cloudscape 和 Apache Derby | PHP 4 |\n| `mssql` | Microsoft SQL\
  \ Server 2000 及更高版本 | PHP 4 |\n| `mysql` | MySQL 4 和 5 | PHP 4 |\n| `mysqli` | MySQL\
  \ 4 和 5 改进接口 | PHP 5 |\n| `oracle` | Oracle 8 及更高版本 | PHP 4 |\n| `postgres` | PostgreSQL\
  \ 7 及更高版本 | PHP 4 |\n| `sqlite` | SQLite | PHP 5 |\n\n\n\n#### `adodb-[驱动名称]`\n\n\
  `ADOdb` 接口封装\n\nPHP 4\n\n#### `pear-[驱动名称]`\n\n`PEAR::DB` 封装\n\nPHP 4\n\n要了解这些数据源如何与其各自的系统协作，可以打开文件本身进行查看。`cake/libs/model/datasources/dbo`\
  \ 文件夹存储了当你将 `driver` 参数更改为表 14-2 中列出的某个值时 Cake 所使用的数据源文件。\n\n如果你将 `driver` 设置为该目录中未存储的其他值，则需要手动提供数据源代码才能使\
  \ Cake 正常工作。在构建自定义数据源时（我将在本章中介绍），参考这些内置数据源有时会很有帮助。它们提供了很好的示例，展示了如何保留模型层；无论使用何种数据源，所有模型的行为都是一致的。\n\
  \n### 构建自定义数据源\n\n编写自定义数据源比在 Cake 中编写其他资源需要多费一些功夫。你可能已经习惯了创建 Cake 文件的常规流程：首先，在适当的位置创建一个具有适当文件名的文件；其次，在文件中输入正确的类名；最后，在文件中添加自定义方法和函数。然而，对于数据源来说，还需要额外完成一些任务才能让它们在应用程序中正常工作。\n\
  \n你需要在应用程序的数据库配置文件中定义数据源：`app/config/database.php`。然后，你需要在调用数据源的模型中定义它。\n\n为了引导你编写自定义数据源，让我们为博客应用程序构建一个\
  \ XML 数据源。该数据源将打开一个格式化的 XML 文件，其中包含博客故事，并将文件内容准备好以便导入数据库。在一个更具雄心（理论层面）的项目中，这个过程可以扩展为保存博客的所有信息；你可以完全绕过数据库，将所有内容写入\
  \ XML 文件。不过在这里，数据源将保持简单，仅支持简单的更新。例如，你可能希望使用外部编辑器撰写博客文章，而不是通过 Web 浏览器直接写入数据库。你可以在文字处理器中将文章导出为\
  \ XML 文件，然后使用本章中的 XML 数据源将其导入博客。无论如何，构建 XML 数据源至少可以演示如何扩展模型的能力以及如何首次自定义数据源。\n\n\
  #### 创建数据源文件\n\n数据源存储在 `app/models/datasources` 文件夹中，文件名使用小写字母，并以 `_source.php`\
  \ 结尾。如果要为数据源指定包含多个单词的名称，请务必在文件名中使用下划线作为分隔符。\n\n创建 XML 数据源文件，并打开进行编辑：`app/models/datasources/xml_source.php`。该数据源必须设置为一个类对象，继承自\
  \ `DataSource` 对象。将清单 14-2 的内容复制到新的 `app/models/datasources/xml_source.php` 文件中。\n\
  \n**清单 14-2.** *XML 数据源类*\n\n```\n<?\nclass XmlSource extends DataSource {\n   \
  \ var $description = 'XML DataSource';\n}\n?>\n```\n\n清单 14-2 的第 3 行包含了 `$description`\
  \ 变量。使用此变量为数据源提供一行描述。\n\n#### 从最小骨架开始\n\n数据源与其他资源的不同之处在于，它们需要包含几个函数，即使这些函数不包含任何逻辑。缺少这个基本函数的“骨架”，模型类将会遇到错误。在\
  \ `xml_source.php` 文件的第 3 行之后，粘贴清单 14-3，其中包含必要的数据源函数。\n\n**清单 14-3.** *数据源文件的主骨架*\n\
  \n```\nfunction __construct($config=null) {\n    parent::__construct($config);\n\
  \    $this->connected = $this->connect();\n    return $config;\n}\n```\n\n\n```php\n\
  function __destruct() {\n    $this->connected = $this->close();\n    parent::__destruct();\n\
  }\n```\n\n```php\nfunction connect() { }\nfunction close() { }\nfunction read()\
  \ { }\nfunction query() { }\nfunction describe() { }\nfunction column() { }\nfunction\
  \ isConnected() { }\nfunction showLog() { }\n```\n\n由于 `DataSource` 与模型协同工作，模型可能会调用这些函数中的每一个。尽管清单\
  \ 14-3 第 16–30 行列出的函数尚未包含任何逻辑或参数，但将它们录入 `DataSource` 可防止模型调用不存在的函数。诚然，当模型调用 `read()`\
  \ 或 `query()` 时，它会收到一个 `null` 响应，但这至少不会潜在地导致 `Warning: Function does not exist`\
  \ 错误。稍后，您将根据需要扩展这些骨架函数。\n\n然而，有两个函数不仅作为骨架的一部分存在，而且对于 `DataSource` 的正常工作至关重要：`__construct()`\
  \ 和 `__destruct()`。这两个函数在清单 14-3 中写为第 5–14 行。它们可以包含更多代码，但目前仅包含让 `DataSource` 工作的最基本内容。当\
  \ `DataSource` 对象被实例化时，Cake 需要将来自 `app/config/database.php` 的参数传递给该对象。从某种意义上说，Cake\
  \ 通过 `__construct()` 函数和 `$config` 变量“绑定”了 `DataSource`。如果 `__construct()` 没有与 `$config`\
  \ 配合工作，Cake 将无法正确建立绑定，从而模型将无法与 `DataSource` “通信”。稍后您将在 `database.php` 中配置 `$config`\
  \ 变量，但此刻 `__construct()` 函数必须包含基本代码来处理 `DataSource` 配置，Cake 稍后将使用该配置。\n\n清单 14-3\
  \ 的第 6 行和第 13 行调用了父对象，将其作为绑定过程的一部分。请注意，父对象的构造函数和析构函数传递了 `$config` 变量。通过以这种方式使用这些函数，您可以确保\
  \ Cake 核心配置中的设置不会与任何现有的 `DataSource` 参数冲突。换句话说，Cake 会将正确的设置与正确的 `DataSource` 关联起来。\n\
  \n`__construct()` 和 `__destruct()` 都使用了其他函数——分别是 `connect()` 和 `close()`——这些函数目前还没有执行任何连接或断开操作。这里之所以如此，是因为连接到数据源的实际方法特定于数据源本身。在此示例中，`connect()`\
  \ 稍后将打开 XML 文件，并根据查找和打开文件的效果返回 `true` 或 `false` 结果。如果，例如，此 `DataSource` 连接到数据库，则情况可能会改变——连接方法将完全不同，因此需要为\
  \ `connect()` 提供一组不同的指令，以便它能够建立连接并返回响应。\n\n第 7 行的对象变量 `$connected` 被模型引用，以确定 `DataSource`\
  \ 的状态。当为 `true` 时，`$connected` 告诉模型 `DataSource` 工作正常。稍后，析构函数会将 `$connected` 设置为\
  \ `false`，这将是针对 `DataSource` 调用的最后一个方法。`__construct()`、`__destruct()` 和 `$connect`\
  \ 对象变量共同建立与数据源的连接、指示连接状态并终止连接。\n\n### 设置包含数据源的数据库配置\n\n如前所述，仅仅创建 `DataSource` 文件并包含最小的骨架函数并不会自动将\
  \ `DataSource` 包含到应用程序中。与助手类似，`DataSource` 必须通过在应用程序其他位置添加代码来包含才能正常工作。\n\n尽管在控制器中包含助手，但\
  \ `DataSource` 不同，它们被包含在 `app/config/database.php` 的 `DATABASE_CONFIG` 类中。\n\n将清单\
  \ 14-4 中的数组粘贴到 `app/config/database.php` 中 `$default` 数组之后，以提供必要的 `DataSource` 配置。\n\
  \n**清单 14-4.** *`$xml` 配置数组*\n\n```php\nvar $xml = array(\n    'datasource' => 'Xml',\n\
  \    'file' => 'data.xml'\n);\n```\n\n清单 14-4 的第 1 行实例化了一个名为 `$xml` 的新对象变量。您可以根据需要随意命名，但请记住将第\
  \ 2 行的数据源参数链接到 `DataSource` 的名称。我已将 XML `DataSource` 类命名为 `XmlSource`（见清单 14-2 的第\
  \ 2 行），因此 `Xml` 是需要设置在 `datasource` 参数中的值。`$xml` 数组的其余部分包含您想要传递给 `DataSource` 的任何键和值。清单\
  \ 14-3 中的第 5 行和第 6 行使用了 `$config` 变量；这将与来自 `database.php` 的匹配数组相同，在本例中即 `$xml` 数组。此\
  \ `DataSource` 需要连接到 XML 文件 `data.xml`。稍后，您将提供此文件为 `app/webroot/files/data.xml`。通过在数据库配置文件中指定此参数，我遵循了\
  \ Cake 应用程序中的一致性；所有数据源连接都在一个地方定义，即 `database.php` 文件。现在 `database.php` 文件包含了 XML\
  \ `DataSource` 的配置设置，模型便能够与 `DataSource` 协同工作了。\n\n### 在模型中使用数据源\n\n在 `DataSource`\
  \ 和模型开始协同工作之前，需要完成几个关键的设置流程：\n\n1.  `DataSource` 文件必须被正确命名并放置在 `app/models/datasources`\
  \ 文件夹中。\n2.  `DataSource` 类必须被正确命名并设置为继承 `DataSource` 对象。\n3.  `DataSource` 文件必须至少包含清单\
  \ 14-3 中概述的最小函数集。\n4.  数据库配置文件必须在一个对象数组中定义 `DataSource`。\n5.  在模型中，`setDataSource()`\
  \ 函数必须引用同一个对象数组。\n6.  在模型中，`DataSource` 对象必须通过 `getDataSource()` 函数实例化。\n\n至此，您已完成设置\
  \ `DataSource` 的第 1–4 步。请注意，第 5 步和第 6 步在模型中完成。让我们打开 `app/models/post.php` 文件，让 XML\
  \ `DataSource` 在那里工作。\n\n清单 14-5 包含了要放置在 `post.php` 文件中的 `xmlFindAll()` 函数。此函数使用\
  \ XML `DataSource` 返回 `data.xml` 文件中的一个值数组。\n\n**清单 14-5.** *`Post` 模型中的 `xmlFindAll()`\
  \ 函数*\n\n```php\nfunction xmlFindAll() {\n    $this->setDataSource('xml');\n   \
  \ $xml = $this->getDataSource();\n    return $xml->findAll();\n}\n```\n\n请注意，清单\
  \ 14-5 的第 2–3 行完成了 `DataSource` 设置流程的最后几个步骤。第 2 行使用 `setDataSource()` 函数将 `app/config/database.php`\
  \ 中的 `$xml` 数组链接到模型。调用此行时，XML `DataSource` 的 `__construct()` 函数会自动运行，并且 `$xml` 数组作为\
  \ `$config` 数组传递给此函数。`setDataSource()` 函数不仅将模型链接到 `DataSource`，还使其成为模型的主要驱动程序。换句话说，在使用\
  \ XML `DataSource` 时，MySQL 驱动程序/`DataSource` 不再在模型中运行。每当控制器调用模型连接到默认的 `DataSource`\
  \ 时，此 XML `DataSource` 对象的实例会被销毁，并且 `__destruct()` 方法会被自动调用。\n\n第 3 行将 XML `DataSource`\
  \ 对象赋值给变量 `$xml`。从此以后，在模型中，任何 `DataSource` 文件中的函数都可以通过引用新的 `$xml` 对象来运行，第 4 行正是这样做的；`$xml->findAll()`\
  \ 函数将与您稍后将插入到 `DataSource` 中的 `findAll()` 函数相同。\n\n\n# 当控制器调用 `xmlFindAll()` 函数时，模型会返回一组值供控制器和视图使用。请注意，此模型函数并不包含稍后将在\
  \ `DataSource` 中出现的全部连接代码。这能使模型保持精简，专注于处理数据，而非管理所有与数据源的连接。\n\n### 读取 XML 文件\n\n\
  现在设置例程已完成，模型已准备好开始使用 `DataSource` 函数，你可以让 `DataSource` 开始工作了。目前，`findAll()` 函数尚未执行任何操作。在其能够读取数据之前，清单\
  \ 14-3 中第 16 行的 `connect()` 函数必须连接到 XML 文件并获取其内容以供 `DataSource` 使用。将 `connect()`\
  \ 替换为清单 14-6 的内容，以便为 `DataSource` 提供必要的连接方法。\n\n**清单 14-6.** *改进后的 XML DataSource\
  \ 中的* `connect()` *函数* 16\n\n```\nfunction connect() {\n17 App::import('Core','File');\n\
  18 $this->FileUtil =& new File(WWW_ROOT.'files/'.$this->config['file']); 19 $this->File\
  \ = $file->read();\n\nif (!$this->File) {\n21 return false;\n22 } else {\nreturn\
  \ true;\n}\n25 }\n```\n\n在整个 `DataSource` 文件中，定义在 `app/config/database.php` 中的配置数组将通过对象变量\
  \ `$config` 可用。不要将此变量与清单 14-3 中 `__construct()` 函数使用的 `$config` 变量混淆。实际上，构造方法的结果——或者说，`__construct()`\
  \ 函数的返回值——会被赋值给 `DataSource` 的标准对象变量 `$config`。这意味着在 `DataSource` 的其余任何地方（`__construct()`\
  \ 函数除外），构造函数返回的配置值都可以通过 `$this->config` 访问。恰好 `__construct()` 会执行必要的方法，从 `app/config/database.php`\
  \ 获取 `$xml` 数组，并将其作为 `$this->config` 返回供 `DataSource` 使用。清单 14-6 中的 `connect()`\
  \ 函数使用 `$this->config` 来检索数据源的文件名。请注意，第 18 行在 `File` 工具中调用此文件名。利用 `WWW_ROOT` 全局变量，第\
  \ 18 行还包含了相对于 Cake 的文件路径。在这种情况下，该文件需要以 `app/webroot/files/data.xml` 的形式存储在 Cake\
  \ 文件系统中。当然，`$this->config['file']` 对应于清单 14-4 第 3 行定义的 `$xml['file']`。\n\n得益于 `File`\
  \ 工具类，读取 `app/webroot/files/data.xml` 的内容变得轻而易举。第 18 行获取文件本身，并将其作为 `File` 工具类对象的一部分进行赋值。然后，在第\
  \ 19 行，使用 `File` 工具类的 `read()` 函数来读取文件内容，并将其赋值给一个名为 `$File` 的类变量。你可能已经注意到这个变量尚未定义；通过在清单\
  \ 14-2 第 3 行（或当前 XML `DataSource` 文件的第 3 行）所示的 `$description` 类变量下方插入以下字符串来定义：`var\
  \ $File = null;`\n\n将文件内容赋值给对象变量而非标准变量，对于确保 `DataSource` 中的所有其他函数都能访问此文件至关重要。基于同样的原因，生成的\
  \ `File` 工具对象也应可供 `DataSource` 的其余部分使用。这一点通过第 18 行将新的 `File` 对象赋值给实例变量 `$FileUtil`\
  \ 来实现。同样，这个变量也需要在类中正确定义。请在 `$File` 定义附近插入此定义：`var $FileUtil = null;`\n\n稍后，`__destruct()`\
  \ 和 `close()` 函数会关闭 `data.xml` 文件，以尽量降低应用程序对服务器的负载。这些函数需要 `File` 工具对象，由于我已将其赋值给\
  \ `$FileUtil` 实例变量，因此该对象在 `connect()` 函数外部是可访问的。\n\n`connect()` 函数通过向 `DataSource`\
  \ 的其余部分提供 `data.xml` 的文件内容，基本上执行了连接方法。该函数剩下的工作就是向构造函数返回 `true` 或 `false` 结果。第 20–24\
  \ 行检查 `$File` 变量中是否有任何内容并返回结果。现在 `data.xml` 文件已打开，其内容可供 `DataSource` 的其余部分使用，你可以着手处理模型调用的\
  \ `findAll()` 函数了。\n\n### 断开与 XML 文件的连接\n\n为了确保万无一失，`DataSource` 应包含一个用于断开与数据源连接的方法。清单\
  \ 14-3 中定义的 `__destruct()` 函数已经执行了此操作，只是它调用的 `close()` 函数目前尚为空。将 `close()` 函数（现在应位于\
  \ `app/models/datasources/xml_source.php` 文件的第 29 行）替换为清单 14-7 的内容。\n\n**清单 14-7.**\
  \ *改进后的* `close()` *函数*\n\n```\nfunction close() {\nif ($this->FileUtil->close())\
  \ {\n31 return false;\n32 } else {\nreturn true;\n}\n35 }\n```\n\n此函数的结果可能看起来有些反常，仅仅是因为\
  \ `false` 结果通常意味着方法执行失败。在这种情况下，返回 `false` 会将 `$connected` 类变量设置为适当的值；它告诉模型连接状态已断开，即零。\n\
  \n清单 14-7 的第 30 行使用 `File` 工具类的 `close()` 函数来关闭 `data.xml` 文件。简而言之，如果关闭成功，那么 `close()`\
  \ 函数剩下的工作就是向析构函数报告 `false`，这在第 31 行完成。\n\n### 解析 XML 文件\n\n在 `DataSource` 解析 XML\
  \ 文件之前，我们先给它一些数据来操作。将类似清单 14-8 的内容粘贴到 `app/webroot/files/data.xml` 文件中。请注意，清单 14-8\
  \ 的格式为 XML 1.0 标准标签，这些标签以数据库中当前 posts 表中的字段命名。\n\n**清单 14-8.** *需添加到* `data.xml`\
  \ *文件中的内容*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<blog>\n<post>\n\
  <id></id>\n<name>用 XML 编写文章轻而易举</name>\n<date>2008-11-08 12:00:01</date>\n<content>在\
  \ Cake 中使用 XML 工具类配合 Set::reverse() 函数使得解析 XML 变得简单。</content>\n<user_id>1</user_id>\n\
  </post>\n<post>\n<id></id>\n<name>更多 XML 文章，也不难</name>\n<date>2008-11-08 12:00:02</date>\n\
  <content>在 Cake 中使用 XML 工具类配合 Set::extract() 函数使得解析 XML 变得简单。</content>\n<user_id>1</user_id>\n\
  </post>\n</blog>\n```\n\n除了清单 14-8 第 1 行的 XML 规范字符串外，此处使用的标签按层级结构组织，类似于 posts 表：`<blog>`\
  \ 标签以数据库名称命名；`<post>` 用于 posts 表中的每一行；`<id>` 对应 ID 字段，依此类推，一直到 `<user_id>`。一旦这些标签被\
  \ `findAll()` 函数解析，就会像默认的 MySQL `DataSource` 传递来自数据库的结果集一样，将一个数组传递给模型。\n\n当前，在连接到\
  \ `data.xml` 文件时，清单 14-8 中的相同内容被赋值给了 `$File`。`read()` 函数需要做的就是解析这些 XML 标签，并相应地为模型格式化数组。清单\
  \ 14-9 包含了解析 XML 的 `findAll()` 函数。将其粘贴到 XML `DataSource` 文件中。\n\n**清单 14-9.** *`findAll()`\
  \ *函数*\n\n```\nfunction findAll() {\n38 App::import('Core','Xml');\n$xml = Set::reverse(new\
  \ Xml($this->File));\nreturn Set::extract($xml,'Post');\n41 }\n```\n\n\n\n### XML\
  \ 数据源与行为\n\n得益于 `XML` 工具类（该工具类在第 14-9 清单第 38 行被导入到函数中），解析所有 XML 标签变得容易得多。例如，第 39\
  \ 行根据 `$File` 的内容创建了一个新的 `XML` 工具类对象，而 `$File` 当前包含 `data.xml` 文件的内容。通过这个对象，`DataSource`\
  \ 可以使用 `XML` 工具函数，例如计算特定标签的子节点数量、从 XML 数据中提取名称和值等。减少遍历所有标签和节点循环次数的一个便捷方法是使用 `Set`\
  \ 工具类，第 39 行和第 40 行就使用了它。\n\n`Set` 工具包含几个用于处理数据结果集的函数。Cake 的核心库在构建构成 `$this->data`\
  \ 和 `$this->params` 的数组时使用了这个工具，这在前面章节中我们探讨 `Form` 助手和管理表单提交时已被证明非常有用。使用 `Set` 不仅减少了构建\
  \ Cake 友好数据数组所需的操作次数，还可以与 `XML` 工具一起使用，从 XML 文件中拼接出一个与模型中使用的标准数组相匹配的数据数组。\n\n在第\
  \ 39 行，`Set::reverse()` 与一个新的 `XML` 工具类对象实例一起使用，从 XML 标签创建出一个 Cake 友好的数组。这里使用 `Set::reverse()`\
  \ 函数是因为它可以将对象转换为数组。\n\n该数组的结构会因 XML 文件中的层级关系而变化，甚至可能因为 `$this->File` 中出现 `<post>`\
  \ 标签的数量不同而不一致。为了确保数组应用相同的结构，第 40 行使用了 `Set::extract()` 函数。简而言之，`Set::extract()`\
  \ 获取由第 39 行 `Set::reverse()` 格式化的 `$xml` 数组，并查找名为 `Post` 的数组键。然后，它提取每个嵌套数组，并根据结果构建一个新数组。最后，这个数组通过\
  \ `return` 命令转发给模型。\n\n如果你想对这个 XML 文件进行更复杂的操作，可以更深入地探索 `XML` 工具并使用更多它的函数。例如，为标签分配属性可以扩展\
  \ XML 文件以包含更多类型的数据，更不用说通过使用其他标签（如 `<user>` 或 `<tag>` 来匹配当前数据库中的 `users` 和 `tags`\
  \ 表）在文件内建立更多关联了。目前，`XML DataSource` 解析 `data.xml` 文件以供控制器和视图使用。剩下的工作就是显示数据并使其可供用户访问。\n\
  \n### 查看数据\n\n`XML DataSource` 和模型现在工作正常。在控制器和视图中查看 `data.xml` 中的 XML 数据，就像从数据库中获取数据一样简单。\n\
  \n在 `app/controllers/posts_controller.php` 的 `Posts` 控制器的 `Index` 操作中，使用 `Post`\
  \ 模型中的 `xmlFindAll()` 函数对新数据源执行“查找所有”查询，插入以下代码行：\n\n```\n$this->set('xml',$this->Post->xmlFindAll());\n\
  ```\n\n解析后的 XML 现在可以在 `Index` 视图中作为 `$xml` 使用。使用 `debug()` 函数查看其内容。你应该会得到以下结果：\n\
  \n```\nArray\n(\n    [0] => Array\n        (\n            [Post] => Array\n    \
  \            (\n                    [name] => Writing Posts in XML is a Snap\n \
  \                   [date] => 2008-11-08 12:00:01\n                     => Using\
  \ the XML utility class in Cake with the\nSet::reverse() function makes parsing\
  \ XML easy.\n                    [user_id] => 1\n                )\n        )\n\
  \    [1] => Array\n        (\n            [Post] => Array\n                (\n \
  \                   [name] => More XML Posts, Not so Bad\n                    [date]\
  \ => 2008-11-08 12:00:02\n                     => Using the XML utility class in\
  \ Cake with the\nSet::extract() function makes parsing XML easy.\n             \
  \       [user_id] => 1\n                )\n        )\n)\n```\n\n这个数组看起来就像你在 Cake\
  \ 中习惯使用的数组一样。在 `Index` 视图中，你可以通过运行一个类似于当前 `$posts` 变量循环的循环，将这些结果添加到列表中。当然，在 `app/webroot/files/data.xml`\
  \ 文件中，我将 `<id>` 标签留空了；你必须手动设置它们，或者在 `DataSource` 中构建一个 `auto_increment` 方法，为 XML\
  \ 文件中的每个帖子提供唯一的 ID。\n\n数据源不仅可以连接外部文件，还可以用于从任何地方提取数据，例如网络服务、电子邮件或某些遗留系统。\n\n本教程探讨了将\
  \ XML 作为外部数据源的使用，并演示了以这种方式扩展模型实际上如何改进代码并在整个框架中保持更好的秩序。其他开发者开发的第三方数据源已经可以在线获取；你可能想尝试安装一个，以此作为在\
  \ Cake 应用程序中使用数据源的练习。\n\n### 使用行为\n\n扩展模型的另一种方式是使用行为。行为为模型提供“规则”，就像你可以在邮件程序中为收件邮件设置规则一样。例如，你可能希望模型在更新数据库中的记录时，能即时对数据执行多种计算，不仅更新一条记录或几个关联记录，而是跨数据库执行一系列更新。使用行为，而不是在模型中构建所有必要的函数来管理这种更新，可以将重复性任务保留在单独的资源文件中，并通过允许多个模型访问更复杂的过程而不使其负担过重，从而使模型更加通用。Cake\
  \ 内置了四种行为：`ACL`、`Containable`、`Translate` 和 `Tree`。在本章中，我将解释如何使用 `Tree` 行为来改进博客对帖子的分类方式。创建自定义行为实际上比创建你自己的数据源更简单；理解内置行为的工作原理将使创建你自己的行为变得更加容易。\n\
  \n#### 使用 Tree 行为对博客文章进行分类\n\n博客应用程序使用 `tags` 表来管理可应用于帖子的多个标签。\n\n如果你想创建标签的层级结构，或者某种“树状”数据结构呢？一个标签可以成为另一个标签的“父级”，一系列标签可以被指定为某个标签的“子级”。然后，一旦标签被分配给帖子，通过点击父级标签，该父标签及其子标签的所有相关帖子都将被列出给用户。这种处理层级数据的方法比构建多个关系数据库来管理层级关系更有效。幸运的是，Cake\
  \ 提供了 `Tree` 行为，它可以动态维护一棵数据树。\n\n##### 向 Tags 表插入所需字段\n\n使用 `Tree` 行为要求与该行为关联的数据库表按特定方式组织。在这种情况下，`tags`\
  \ 表需要包含一些额外的字段，以便 `Tree` 行为保存其自身参数。无论你在哪里使用 `Tree` 行为，请记住提供以下三个字段：\n\n- `parent_id`\n\
  - `lft`\n- `rght`\n\n左字段和右字段，即 `lft` 和 `rght`，由 `Tree` 行为用于组织节点在树中的位置。`parent_id`\
  \ 字段链接到表中作为当前记录父节点的记录的 ID。目前，`tags` 表不包含这些字段。为了准备让博客使用 `Tree` 行为，请按照清单 14-10 中的规范替换\
  \ `tags` 表。\n\n**清单 14-10.** *包含 Tree 行为所需字段的 Tags 表*\n\n```\nCREATE TABLE `tags`\
  \ (\n  `id` int(11) unsigned NOT NULL auto_increment,\n  `parent_id` int(11) unsigned\
  \ default NULL,\n  `lft` int(11) unsigned default NULL,\n  `rght` int(11) unsigned\
  \ default NULL,\n  `name` varchar(255) default NULL,\n  PRIMARY KEY (`id`)\n);\n\
  ```\n\n\n\n# 第 14 章 数据源与行为\n\n请注意，清单 14-10 没有使用 `lft` 和 `rght` 作为 `left` 和 `right`\
  \ 字段的默认值；这些字段可以设置为你选择的任何名称，这里我选择了 `left` 和 `right`。稍后，在模型中调用 Tree 行为时，我将指定这些字段名称。\n\
  \n### 烘焙新的标签控制器和视图\n\n现在 `tags` 表已经包含了 Tree 行为正常运行所需的字段，接下来需要重新生成 Tags 控制器和视图。使用\
  \ Bake 创建一个新的控制器——确保*不要*使用管理路由、脚手架、附加组件或附加帮助器；*务必*确保使用会话并创建基本视图方法（`index`、`edit`、`add`、`view`）。新的\
  \ Tags 控制器应包含如清单 14-11 所示的代码，或非常相似的代码。\n\n**清单 14-11.** *烘焙的 Tags 控制器*\n\n```php\n\
  <?php\n\nclass TagsController extends AppController {\n\n    var $name = 'Tags';\n\
  \n    var $helpers = array('Html', 'Form');\n\n    function index() {\n        $this->Tag->recursive\
  \ = 0;\n        $this->set('tags', $this->paginate());\n    }\n\n    function view($id\
  \ = null) {\n        if (!$id) {\n            $this->Session->setFlash(__('Invalid\
  \ Tag.', true));\n            $this->redirect(array('action'=>'index'));\n     \
  \   }\n        $this->set('tag',$this->Tag->read(null,$id));\n    }\n\n    function\
  \ add() {\n        if (!empty($this->data)) {\n            $this->Tag->create();\n\
  \            if ($this->Tag->save($this->data)) {\n                $this->Session->setFlash(__('The\
  \ Tag has been saved', true));\n                $this->redirect(array('action'=>'index'));\n\
  \            } else {\n                $this->Session->setFlash(__('The Tag could\
  \ not be saved. Please, try again.', true));\n            }\n        }\n       \
  \ $posts = $this->Tag->Post->find('list');\n        $this->set(compact('posts'));\n\
  \    }\n\n    function edit($id = null) {\n        if (!$id && empty($this->data))\
  \ {\n            $this->Session->setFlash(__('Invalid Tag', true));\n          \
  \  $this->redirect(array('action'=>'index'));\n        }\n        if (!empty($this->data))\
  \ {\n            if ($this->Tag->save($this->data)) {\n                $this->Session->setFlash(__('The\
  \ Tag has been saved', true));\n                $this->redirect(array('action'=>'index'));\n\
  \            } else {\n                $this->Session->setFlash(__('The Tag could\
  \ not be saved. Please, try again.', true));\n            }\n        }\n       \
  \ if (empty($this->data)) {\n            $this->data = $this->Tag->read(null, $id);\n\
  \        }\n        $posts = $this->Tag->Post->find('list');\n        $this->set(compact('posts'));\n\
  \    }\n\n    function delete($id = null) {\n        if (!$id) {\n            $this->Session->setFlash(__('Invalid\
  \ id for Tag', true));\n            $this->redirect(array('action'=>'index'));\n\
  \        }\n        if ($this->Tag->del($id)) {\n            $this->Session->setFlash(__('Tag\
  \ deleted', true));\n            $this->redirect(array('action'=>'index'));\n  \
