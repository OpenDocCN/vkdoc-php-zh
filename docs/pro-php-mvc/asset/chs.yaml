  ■ **注意** 并非对应用程序的每个请求都需要模型或视图。加载哪些元素取决于请求的类型以及完成请求所需的资源。请求的 URL 通过一个称为*路由*的过程来定义这一点，我们将在第
  7 章中介绍。例如，控制器可能仅用于切换应用程序的状态，或直接返回来自第三方服务的未解析数据。在这种情况下，就不需要模型或视图！


  让我们看一个示例应用程序，它说明了这些类的使用。社交网络通常使用起来很简单，但在幕后可能相当复杂。如果我们要构建一个简单的社交网络，我们不仅需要考虑用户界面元素，还需要考虑用户数据的存储方式以及用户界面如何响应用户输入。我们需要考虑以下几个方面：


  - 我们的社交网络很可能会在数据库中维护用户数据。它还需要从第三方服务（如 Flickr）访问用户照片。这两个操作的代码都应保存在模型中，因为这些操作直接与我们的业务需求相关。

  - 我们的社交网络应该易于使用，并对其用户有吸引力。因为我们是为 Web 构建它，所以我们将使用标准网站技术，例如用于标记的 HTML、外部链接的 CSS 样式表和用于行为的外部链接的
  JavaScript 文件。所有这些元素都将出现在视图中。

  - 我们应用程序的模型和视图必须在不相互干扰的情况下连接在一起。此外，应用程序需要一种方式来响应用户在视图中的交互，并将相关数据持久化到模型中。控制器用于此目的。


  希望这能以一种合理的方式说明这个概念。在本书中，我们将更详细地研究每个部分。当我们解构使框架运行所需的代码时，这个简单的社交网络也将作为一个一致的例子。


  ### MVC 的优势


  在不了解为什么要使用 MVC 的情况下，解释 MVC 是什么是没有意义的。还记得我之前提到的 Christopher Alexander 的模式吗？MVC 是本书中将解释的众多模式之一，但要理解这种设计模式的用处，我们必须着眼于它有助于缓解的问题。


  如果你想到一支运动队，你可能会意识到它本质上是一大群球员，他们各自扮演好自己的角色以推动球队前进。优秀的运动队需要每位球员尽最大努力发挥自己的作用，从而推动整个团队前进。


  Web 是一个开放的竞技场。它允许大大小小的企业相互竞争，而规模并不代表工作质量。这意味着许多拥有小型开发者团队的小公司有机会构建大型 Web 应用程序。这也意味着许多大公司可以同时让许多人参与大型
  Web 应用程序的开发。在所有这种多任务处理和/或团队协作中，应用程序的各个方面（本应分离）常常会相互干扰，并且需要比严格必要更多的时间和精力来推进。


  任何复杂的 Web 应用程序都有许多方面。有设计，它激发用户对产品的兴趣。有执行业务操作（例如处理销售商品和给购物者开具发票）所需的业务逻辑。然后是应用程序的持续改进、更新、修复错误和总体优化过程。


  在任何非结构化的应用程序中，这些领域往往会在一种不连贯的混乱中融合在一起。当需要更改数据库以适应新产品线，或者公司决定重塑品牌时，这不仅会影响它应该影响的代码。更多的开发者必须介入，以确保应用程序一部分的更改不会立即破坏应用程序的其他部分。本应只影响一小段代码的更改最终会蔓延到各种奇怪且有问题的领域。


  这就是 MVC 试图解决的问题。它为应用程序的所有代码和功能定义了严格的容器。当对数据库代码的更改被隔离在模型中时，视图和控制器不会中断。当应用程序的设计发生巨大变化时，其控制器和模型将免受破坏性更改的影响。


  ■ **注意** 一个基于 MVC 的优秀应用程序要成功，需要的不仅仅是一个好的 MVC 框架。它需要开发者愿意遵守规则，仔细思考他们的代码应该放在哪里，而不是仅仅将其扔进代码库。我们只能设计结构，就像建筑师设计一座漂亮的房子一样。最终要靠使用我们框架的开发者来保持秩序。


  既然我们更多地了解了为什么要使用 MVC，那么让我们看看编写自己框架的一些流行替代方案。


  ### 流行的 MVC 框架


  有许多优秀的 PHP 框架可用，但如果我们将视角限制在三个框架上，我认为我们可以很好地了解它们的共同之处以及各自的独特之处。这些并不是最好或唯一的 PHP MVC
  框架，而仅仅是 PHP MVC 开发不同方法的一个良好横截面。


  #### CodeIgniter


  CodeIgniter 是我们将研究的第一个也是最简单的框架。它由 EllisLab 开发和维护，可以描述为一个开源（尽管受到严格控制）框架，构成了 EllisLab
  高级 CMS（内容管理系统）ExpressionEngine 的基础。


  它已经存在了很长时间，但自从我第一次使用它以来，其理念多年来几乎没有改变。它力求保持小巧的体积、出色的开发者文档和高质量的代码。它不像我们将要讨论的其他一些框架那样受欢迎，部分原因是
  EllisLab 管理 CodeIgniter 社区的方式。他们最近开始通过举办新的会议和增加员工来解决这个问题，这个框架的前景正在好转。


  它还启发了其他框架，孕育了诸如 KohanaPHP 之类的项目。


  ■ **注意** 你可以从 [`codeigniter.com`](http://codeigniter.com) 下载 CodeIgniter。你还可以在 [`ellislab.com`](http://ellislab.com)
  了解更多关于 EllisLab 和 ExpressionEngine 的信息。最后，你可以在 [`kohanaframework.org`](http://kohanaframework.org)
  了解更多关于 KohanaPHP 的信息。


  #### Zend Framework


  Zend Framework 是一个由松散耦合的代码库组成的广泛集合，可以构成 MVC 架构的基础。相对于其他流行的 MVC 框架，理解和掌握 Zend Framework
  需要付出相当大的努力。它由 Zend Technologies 开发，并享有庞大、稳定的社区和广泛采用的所有优势。





  像`CodeIgniter`这类框架力求轻量，仅保留核心功能，而`Zend Framework`则包含了帮助开发者使用多种第三方服务和 API 的库。


  > **注意** 你可以在[`framework.zend.com`](http://framework.zend.com)下载`Zend Framework`。你也可以在[`zend.com`](http://zend.com)了解`Zend`的更多信息。


  ## `CakePHP`


  `CakePHP`可以说是这三个框架中最受欢迎的。与前两个框架不同，它不受任何单一企业实体的管辖。它拥有庞大的社区，并被广泛采用。


  它更倾向于约定优于配置，这意味着许多细节会被预设并自动化。


  这一点在框架的各个方面都显而易见，你常常会惊讶于`CakePHP`自动执行了你并未要求的事情，这其中既有好处也有坏处。这意味着你可以快速开发应用程序，但当你需要进行非常具体的修改时，也可能会遇到困难。


  这一点甚至体现在其代码生成命令行工具`Bake`上。只需遵循命令行提示，并使用默认参数和行为填空，它就能在几分钟内生成一个可运行的应用程序。


  > **注意** 你可以在[`cakephp.org`](http://cakephp.org)下载`CakePHP`。


  ## `设计模式`


  我们将重点探讨 MVC 设计模式。为了实现它，我们需要在构建框架的库中使用其他更简单的设计模式。我们即将回顾的设计模式通常可以应用于过程式开发，但我们将从面向对象编程的角度来审视它们。


  这意味着我们将处理类（包含属性和执行功能的蓝图）以及它们之间的相互交互。如果你对后续某些概念不熟悉，可能需要查阅语言入门指南或参考网站。


  > **注意** 如果你想了解更多关于面向对象编程或后续的其他关键词/概念，可以在[`en.wikipedia.org/wiki/Object-oriented_programming`](http://en.wikipedia.org/wiki/Object-oriented_programming)上阅读更多信息。


  ### `单例模式`


  在构建面向对象软件时，我们会处理许多类。虽然理想情况下，设计这些类时应允许多个实例同时激活，但有时，出于特定目的或上下文，我们实际上只需要一个类的实例。


  `单例模式`是一种确保一个类在同一时间只能有一个实例的设计模式。传统的`单例`类在内部静态属性中维护自身的唯一实例，并且不能像非单例类那样以常规方式进行实例化（或克隆）。`单例`类有一个特殊的实例访问方法，该方法返回内部实例属性，或者创建一个新实例来返回和存储。参见图
  1-2。


  **`图 1-2.`** *`单例模式流程`*


  > **注意** 你可以在[`en.wikipedia.org/wiki/Singleton_pattern`](http://en.wikipedia.org/wiki/Singleton_pattern)上阅读更多关于`单例模式`的信息。


  ### `注册表模式`


  `注册表`是一个可以存储并返回标准类实例的类。可以把它想象成一个团队经理，他可以将球员从场上替换下来，并根据需要派上新球员。我们使用`注册表`类来管理有限数量的类实例，这样我们就不需要重复实例化`注册表`中已包含实例的类。


  `注册表`类的另一种理解方式是，它帮助我们将普通类当作`单例`来对待，而无需将这些普通类变成`单例`。我们可能会遇到需要两个类实例的情况。例如，我们需要连接两个独立的数据库，但又不想重复建立连接，这时就可以使用`注册表`。参见图
  1-3。


  **`图 1-3.`** *`注册表模式流程`*


  > **注意** 你可以在[`blog.fedecarg.com/2007/10/26/registry-pattern-or-dependency-injection-container`](http://blog.fedecarg.com/2007/10/26/registry-pattern-or-dependency-injection-container)上阅读更多关于`注册表`模式的信息。


  ### `工厂模式`


  `工厂`是一个提供单一接口用于创建任意数量实例的类，而无需实际指定实例应属于哪个类。`工厂`会根据输入或内部逻辑来选择要实例化的类。


  当我们需要执行数据库操作，但又可能要处理多个不同的数据库驱动时，`工厂`模式非常有用。我们使用`工厂`类来获取正确的驱动类，从而确保所有驱动都符合标准接口。参见图
  1-4。


  **`图 1-4.`** *`工厂模式流程`*


  > **注意** 你可以在[`en.wikipedia.org/wiki/Factory_method_pattern`](http://en.wikipedia.org/wiki/Factory_method_pattern)上阅读更多关于`工厂`模式的信息。


  ### `观察者模式`


  `观察者`模式描述了一种由发送者和接收者组成的结构。当发送者的状态发生变化时，它会向与之关联的接收者发送消息，通常通过调用接收者某个函数来实现。


  此模式最实用的用途是实现基于事件（异步）的软件，并促进仅通过应用程序状态变化相关联的类之间的松散耦合。参见图 1-5。


  **`图 1-5.`** *`观察者模式流程`*


  > **注意** 你可以在[`en.wikipedia.org/wiki/Observer_pattern`](http://en.wikipedia.org/wiki/Observer_pattern)上阅读更多关于`观察者`模式的信息。


  ## `创建我们自己的框架`


  你可能会想，既然市面上已经有这么多优秀的选择，我们为什么还需要创建自己的框架。其原因在于，这样我们才能理解 MVC 的基本原理。


  随着我们对这些原理的深入了解，我们就能更好地理解现有的优秀 MVC 框架为何采用当前的做法。我们学习的目标不是在`Zend Framework`或`CakePHP`中创建应用程序，而是学习
  MVC 的工作原理，并由此理解这些框架是如何在我们期望的 MVC 框架构建方式基础上进行构建（或偏离）的。


  我们的目标不是为可投入生产使用的框架列表再添一员。我们的目标是学习这些框架“做了什么”以及“为什么这么做”，以便在为我们下一个大项目选择框架时，能够做出明智的决策。


  > **注意** 欢迎你将我们构建的框架用于生产环境，但我建议你谨慎行事，除非你准备投入大量时间来满足框架的安全性和稳定性要求，因为那些流行的框架也是花费了多年时间才达到的。


  ### `目标`



  '
- "# 排版后的内容\n\n我已经提到过我们的第一个目标，即学习。最重要的是，我们的框架应该教会我们那些任何`MVC`框架都不可或缺的核心概念。我们将先通过研究一些基础组件来实现这一点，然后在这些组件的基础上创建一个实际的应用。关键是，无论我们用这个框架构建何种应用，其核心概念都应保持不变。\n\
  \n这自然会引出第二个目标：创建一个易于配置的框架，并且对我们用它构建的应用做出尽可能少的假设。这一点将在后续的应用配置以及底层系统代码中体现出来。我们应只在有意义的地方启用配置选项。\n\
  \n我们的最后一个目标是创建一个抽象平台，它有能力在多种不同环境中运行，但只专注于我们在测试环境中可预期的那部分。换句话说，我希望我们允许任何可能性，但从最基础开始。这意味着我们应该创建一种基础设施，使其能够与多种不同类型的数据库交互，但一开始，我们只编写一个数据库驱动。这也意味着我们应该创建一种基础设施，使其能够在多种地方存储缓存，但只关注我们将要处理的第一种类型。\n\
  \n我希望我们能建立一种思维模式：直面问题的根源，并思考所有可能的解决方案。我希望我们能了解一个真正的`MVC`框架应该是什么样子。我希望我们努力寻求在最具意义时允许灵活性，在最需要时可预测性的方法。我希望我们在处理尽可能少的具体案例时，能顾及所有这些方面。当我们对一切有了良好的把握后，就可以开始扩展到多种环境和服务中去；但在此之前，我们有这三个目标。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 2 章\n\n## 基础\n\n我们将从研究一些基础性的（以`OOP`为核心的）代码来开始构建我们的框架，核心组件将基于这些代码。我们要研究的第一件事是如何执行分布在多个文件中的代码。\n\
  \n我们还将研究遇到错误时该如何处理。最后，我们将创建一种便捷的方法来排序和检索类的元数据。\n\n### 目标\n\n* 我们需要开发一种自动加载类的方法。类应基于其名称进行定位，并且这些名称应能映射到文件夹层级结构中。\n\
  * 我们需要理解并定义自定义的`Exception`子类，以便能够处理可能发生的最常见类型的错误。\n* 我们还应该定义一个包含多种数据类型实用方法的静态类系统。\n\
  * 我们还应该开发一种方法，用于识别框架类的结构（及预期用途），这种方法依赖于使用特殊的代码注释。\n\n### 自动加载\n\n由于我们将要编写大量代码，可以合理假设我们希望清晰地组织代码结构，以免随着代码量的增加而产生混乱。有几种方法可以实现这一点，其中之一是将不同的代码块保存在不同的文件中。这种代码结构方法带来的一个问题是，我们需要从单一的入口点引用这些外部的代码块。\n\
  \n对 Web 服务器的请求通常会路由到服务器 Web 根目录下的一个单一文件。例如，`Apache` Web 服务器通常被配置为将默认请求路由到 `index.php`。我们可以将所有框架代码保存在这一个文件中，也可以将其拆分成多个文件，然后从\
  \ `index.php` 中引用它们。`PHP` 提供了四种基本的语句，让我们可以在程序流程中包含外部脚本。如清单 2-1 所示。\n\n***清单 2-1.***\
  \ 四种基本的 `require/include` 函数\n\n```\ninclude(\"events.php\");\ninclude_once(\"inflection.php\"\
  );\nrequire(\"flash.php\");\n```\n\n\n\n`require_once(\"twitter.php\");`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 2 章 ■ 基础\n\n第一条语句会在 PHP 的包含路径中查找`events.php`，如果文件存在，PHP 将加载该文件。如果找不到该文件，则会发出一个警告。第二条语句与第一条相同，区别在于它只会尝试加载`inflection.php`文件一次。你可以多次运行第二条语句，但该文件仅在第一次加载。\n\
  \n第三条语句与第一条基本相同，不同之处在于 PHP 会抛出一个致命错误（如果未被捕获，将停止脚本执行）。第四条语句与第二条相同，区别在于如果找不到文件，它也会抛出一个致命错误。\n\
  \n这意味着在小规模范围内，类的加载是足够的，但它确实存在以下几个缺点：\n\n-   在使用脚本之前，你总是需要`require/include`包含这些脚本的文件。起初这听起来很简单，但在大型系统中，这其实是一个非常痛苦的过程。你需要记住每个脚本的路径以及加载它们的正确时机。\n\
  -   如果你选择同时包含所有脚本（通常放在每个文件的顶部），那么在整个脚本执行期间，它们都将处于作用域内。它们会在需要它们的脚本之前被加载，并在其他任何操作发生之前被完全解析。这在小型系统中没问题，但可能会迅速拖慢你的页面加载时间。\n\
  \n### 命名空间\n\nPHP 5.3.0 中一个特别有用的新增特性是命名空间。命名空间允许开发者将代码置于全局命名空间之外进行沙盒隔离，以避免类名冲突，并帮助更好地组织代码。\n\
  \n在我们编写的几乎所有类中，都会使用到命名空间，并且它们使用起来并不特别复杂。请参考清单 2-2 中给出的示例。\n\n**清单 2-2.** 命名空间\n\n\
  ```\nnamespace Framework\n\n{\n\nclass Hello\n\n{\n\npublic function world()\n\n\
  {\n\necho \"Hello world!\";\n\n}\n\n}\n\n}\n\nnamespace Foo\n\n{\n\n// 允许我们引用 Hello\
  \ 类\n// 而无需每次都指定其命名空间\nuse Framework\\Hello as Hello;\n\nclass Bar\n\n{\n\nfunction\
  \ __construct()\n\n{\n\n// 这里我们可以将 Framework\\Hello 简称为 Hello\n// 得益于前面的 \"use\"\
  \ 语句\n$hello = new Hello();\n\n$hello->world();\n\n}\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n```\n\n## 第 2 章 ■ 基础\n\n```\n}\n\nnamespace\n\n{\n\n$hello = new Framework\\Hello();\n\
  \n$hello->world(); //… 输出 \"Hello world!\"\n\n$foo = new Foo\\Bar();\n\n$foo->bar();\
  \ //… 输出 \"Hello world!\"\n\n}\n```\n\n正如我之前提到的，命名空间有助于将类从全局命名空间中移除。命名空间本身仍然处于全局命名空间内，因此它必须保持唯一；然而，它可以包含任意数量的类，这些类可以重用全局命名空间或其他命名空间中的类名。\n\
  \n**注意** 命名空间并非 MVC 设计模式的要求，但它们确实有助于避免类和函数名冲突。一些流行的 MVC 框架（例如 Symfony）已经将其类组织在命名空间中。\n\
  \n### 惰性加载\n\n我们可以使用`require/include`方法来加载类，或者使用 PHP 提供给我们的另一种方法：`spl_autoload_register()`函数。这个内置函数允许我们提供自己的代码，作为一种根据所请求的类名来加载类的方式。\n\
  \n我们将用于查找类文件的模式是：首字母大写的类名，单词之间用目录分隔符分隔，并以`.php`结尾。因此，如果我们需要加载`Framework\\Database\\\
  Driver\\Mysql`类，我们将查找文件`framework/database/driver/mysql.php`（假设我们的框架文件夹在 PHP 的包含路径中）。\n\
  \n请参见清单 2-3 中的示例。\n\n**清单 2-3.** 使用 `spl_autoload_register`\n\n```\nfunction autoload($class)\n\
  \n{\n\n$paths = explode(PATH_SEPARATOR, get_include_path());\n\n$flags = PREG_SPLIT_NO_EMPTY\
  \ | PREG_SPLIT_DELIM_CAPTURE;\n\n$file = strtolower(str_replace(\"\\\\\", DIRECTORY_SEPARATOR,\
  \ trim($class, \"\\\\\"))).\".php\"; foreach ($paths as $path)\n\n{\n\n```\n\n\n\
  \n`$combined = $path.DIRECTORY_SEPARATOR.$file;`\n\n```\nif (file_exists($combined))\n\
  {\n    include($combined);\n    return;\n}\n```\n\n```\nthrow new Exception(\"{$class}\
  \ 未找到\");\n```\n\n```\nclass Autoloader\n{\n    public static function autoload($class)\n\
  \    {\n        autoload($class);\n    }\n}\n```\n\n`[www.it-ebooks.info](http://www.it-ebooks.info/)`\n\
  \n## 第 2 章 ■ 基础\n\n```\nspl_autoload_register('autoload');\nspl_autoload_register(array('autoloader',\
  \ 'autoload'));\n// 这些只能在类上下文中调用……\n// spl_autoload_register(array($this, 'autoload'));\n\
  // spl_autoload_register(__CLASS__.'::load');\n```\n\n第一次调用 `spl_autoload_register()`\
  \ 告诉 PHP 使用 `autoload()` 方法按名称加载类文件。第二次调用 `spl_autoload_register()` 告诉 PHP 使用 `Autoloader::autoload()`\
  \ 方法按名称加载类文件。第三次和第四次调用 `spl_autoload_register()` 告诉 PHP 使用 `autoload()` 方法（该方法属于这些\
  \ `spl_autoload_register()` 调用所在的类）按名称加载类文件。\n\n`autoload()` 函数首先将 PHP 的 `get_include_path()`\
  \ 函数返回的字符串拆分为单独的目录。然后，它通过从请求的类名的第二个、第三个、第四个（依此类推）大写字母处拆分，并使用 `PATH_SEPARATOR` 常量将单词连接起来，来构造目标文件名。\n\
  \n如果在任意 `$paths` 目录中找到了目标文件，它将包含该文件并通过 `return` 语句结束函数执行。如果循环遍历完 `$paths` 仍未找到文件，将抛出一个\
  \ `Exception`。如果没有抛出异常，则可以认为找到了与类名匹配的文件（位于包含路径的某个目录中），并且已成功包含。\n\n> **注意** 如果您想了解更多关于\
  \ PHP 命名空间的信息，可以查看完整的文档（以及一些示例），网址为 [`php.net/manual/en/language.namespaces.php`](http://php.net/manual/en/language.namespaces.php)。\n\
  \n### 异常\n\nPHP 处理改变程序正常流程的特殊情况（例如运行时错误）的方式之一是抛出异常。除了内置的 `Exception` 类，PHP 还具备检测\
  \ `Exception` 发生并在发生时执行有用操作的机制。清单 2-4 展示了一个示例。\n\n***清单 2-4.*** Try/Catch 控制流语句\n\
  \n```\ntry\n{\n    throw new Exception();\n}\ncatch (Exception $e)\n{\n    echo\
  \ \"已抛出一个异常。\";\n}\n```\n\n在本书中，我们将看到处理各种 `Exception` 子类的代码。其中大部分子类将由我们自己创建，尽管它们会是\
  \ SPL 中发现的异常类的子类。您可能想知道，如果我们能直接使用 `try`/`catch` `Exception` 来处理框架中的错误（如清单 2-5 所示），为什么还需要继承\
  \ `Exception`（或任何 SPL Exception 子类）。\n\n`[www.it-ebooks.info](http://www.it-ebooks.info/)`\n\
  \n## 第 2 章 ■ 基础\n\n***清单 2-5.*** 捕获多种异常类型\n\n```\ntry\n{\n    throw new LogicException();\n\
  }\ncatch (ClassDidNotLoadException $e)\n{\n    // 仅当抛出的 Exception\n    // 类型为 \"\
  LogicException\" 时执行\n    echo \"LogicException 已抛出！\";\n}\ncatch (Exception $e)\n\
  {\n    // 仅当抛出的 Exception\n    // 未被之前任何 catch 块捕获时执行\n    echo \"出错了，但我们不知道具体是什么问题……\"\
  ;\n}\n```\n\n如您所见，PHP 的 `try`/`catch` 语句允许我们捕获多种类型的 `Exception`。当我们只能预期发生一种类型的 `Exception`\
  \ 时，这并没有太大价值；但在一个包含许多类和上下文的复杂框架中，它在维护系统稳定性方面变得非常有价值。\n\n设想一个我们与数据库交互的场景。一次简单的记录更新可能会因上下文不同而失败。可能无法连接数据库、缺少数据导致验证失败，甚至是我们发送给数据库的底层\
  \ SQL 中存在语法错误。所有这些上下文都可能对应不同的 `Exception` 子类，并且可以通过同一个 `try`/`catch` 语句轻松捕获。\n\n\
  \n\n创建许多异常子类的一个好处是，我们可以根据抛出的异常子类来响应用户界面。我们可能希望根据抛出的`Exception`是由数据库问题还是缓存类问题等引起的，来显示不同的视图。\n\
  \n重要的是要记住，任何时候看到抛出的类实例包含单词`Exception`，这很可能是我们创建来表示特定错误的`Exception`子类。我们不会总是涵盖每个`Exception`子类的代码，但至少我们知道创建它们的原因，并且它们与原始的`Exception`类相似。\n\
  \n### 类型方法\n\n在本章及后续章节中，我们将使用许多实用方法来处理我们在 PHP 中找到的基本数据类型。为了保持代码的组织性，我们会将这些实用方法作为静态类型类上的静态方法包含进来；例如，`StringMethods`类上的字符串方法（见列表\
  \ 2-6），`ArrayMethods`类上的数组方法（见列表 2-7），等等。随着时间的推移，我们将向这些类添加内容，但现在它们将包含列表 2-6 和 2-7\
  \ 中给出的方法。\n\n**列表 2-6.** `StringMethods`类\n\n```php\nnamespace Framework\n{\n  \
  \  class StringMethods\n    {\n        private static $_delimiter = \"#\";\n   \
  \     private function __construct()\n        {\n            // do nothing\n   \
  \     }\n        private function __clone()\n        {\n            // do nothing\n\
  \        }\n        private static function _normalize($pattern)\n        {\n  \
  \          return self::$_delimiter.trim($pattern, self::$_delimiter).self::$_delimiter;\n\
  \        }\n        public static function getDelimiter()\n        {\n         \
  \   return self::$_delimiter;\n        }\n        public static function setDelimiter($delimiter)\n\
  \        {\n            self::$_delimiter = $delimiter;\n        }\n        public\
  \ static function match($string, $pattern)\n        {\n            preg_match_all(self::_normalize($pattern),\
  \ $string, $matches, PREG_PATTERN_ORDER);\n            if (!empty($matches[1]))\n\
  \            {\n                return $matches[1];\n            }\n           \
  \ if (!empty($matches[0]))\n            {\n                return $matches[0];\n\
  \            }\n            return null;\n        }\n        public static function\
  \ split($string, $pattern, $limit = null)\n        {\n            $flags = PREG_SPLIT_NO_EMPTY\
  \ | PREG_SPLIT_DELIM_CAPTURE;\n            return preg_split(self::_normalize($pattern),\
  \ $string, $limit, $flags);\n        }\n    }\n}\n```\n\n`$_delimiter`和`_normalize()`成员都是用于正则表达式字符串的规范化，以便其余方法无需先检查或规范化就能对它们进行操作。`match()`和`split()`方法执行类似于`preg_match_all()`和`preg_split()`函数的功能，但对正则表达式所需的正式结构要求更低，并返回更可预测的结果集。`match()`方法将返回第一个捕获的子字符串、整个子字符串匹配或`null`。`split()`方法将在设置一些标志并规范化正则表达式后，返回对`preg_split()`函数的调用结果。\n\
  \n**列表 2-7.** `ArrayMethods`类\n\n```php\nnamespace Framework\n{\n    class ArrayMethods\n\
  \    {\n        private function __construct()\n        {\n            // do nothing\n\
  \        }\n        private function __clone()\n        {\n            // do nothing\n\
  \        }\n        public static function clean($array)\n        {\n          \
  \  return array_filter($array, function($item) {\n                return !empty($item);\n\
  \            });\n        }\n        public static function trim($array)\n     \
  \   {\n            return array_map(function($item) {\n                return trim($item);\n\
  \            }, $array);\n        }\n    }\n}\n```\n\n`clean()`方法移除所有被视为空值（`empty()`）的元素，并返回结果数组。`trim()`方法返回一个数组，该数组包含初始数组经过去除所有空白字符处理后的所有元素。\n\
  \n> **注意** 我们并不是要重新创建每一个内置的 PHP 函数。只要你的代码可以轻松地使用内置函数实现，就一定要确保你创建方法的原因值得由此带来的混淆和重复。什么时候是重新发明轮子的好时机？只有当你有一个更好的轮子的时候！\n\
  \n\n\n"
- "# 我们的目标之一是合理的配置\n\n我们的目标之一是合理的配置。另一个目标是构建一个抽象的底层平台，使其能够服务于多种不同类型的服务/实现。某些实现自然需要一种指定配置数据的方式。提供这种配置最简单的方法是通过一个配置文件解析器。\n\
  \n我们将在后续章节中构建这样一个解析器，但在此之前，如何配置所有代码？对于那些无法合理存储在单独文件中的配置细节，又该如何处理？为了说明这一点，让我们看看清单\
  \ 2-8 中的示例。\n\n## 清单 2-8. 狗窝\n\n```\nclass Dog\n{\n    public $doghouse;\n\n   \
  \ public function goSleep()\n    {\n        $location = $this->doghouse->location;\n\
  \        $smell = $this->doghouse->smell;\n        echo \"狗窝位于{$location}，气味{$smell}。\"\
  ;\n    }\n}\n\nclass Doghouse\n{\n    public $location;\n    public $smell;\n}\n\
  \n$doghouse = new Doghouse();\n$doghouse->location = \"后院\";\n$doghouse->smell =\
  \ \"难闻\";\n$dog = new Dog();\n$dog->doghouse = $doghouse;\n$dog->goSleep();\n```\n\
  \n如果`$location`和`$smell`属性只在同一上下文中使用，那么我们的类就不需要我们所讨论的这些配置。反之，如果这些属性可以根据实现的不同而有不同含义，我们就需要一种方法来定义这种备选上下文。\n\
  \n例如，假设我们想创建一个`Doghouse`子类，其中`$location`可以被定义为`Dog`睡觉的`Doghouse`内部位置；或者假设我们想将`$smell`定义为`Dog`在`Doghouse`内能闻到的气味百分比。\n\
  \n在这些情况下，我们总是可以向`Doghouse`类添加额外的属性，为初始属性提供上下文。但更多时候，开发者会让接手的同事根据变量名或注释来理解上下文。一方面，变量命名应当使其上下文和含义一目了然；另一方面，这种情况很少发生。\n\
  \n有时，我们可能仅仅需要额外的灵活性，或者我们的框架代码需要处理这类数据，却无法受益于对人类思维方式的理解。这时，如果能有一种方式允许我们在类内部描述类的某些方面，那就太好了。\n\
  \n如果你使用过任何编程语言，无疑会对注释的概念很熟悉。它们是为了帮助开发者做笔记，这些笔记只对有源代码访问权限的其他开发者可见。一种标准的注释书写格式是 Doc\
  \ Comments 格式。PHP 特有的 Doc Comments 变体称为`PHPDocs`。Doc Comments 看起来类似于普通的多行注释，但以`/**`开头（而非`/*`）。PHP\
  \ 还内置了允许我们检查这类注释的类，这让我们能够提供所需的配置元数据。请参考清单 2-9 中的示例。\n\n## 清单 2-9. Doc Comments 示例\n\
  \n```\nclass Controller\n{\n    /**\n     * @readwrite\n     */\n    protected $_view;\n\
  \n    /**\n     * @once\n     */\n    public function authenticate()\n    {\n  \
  \      // …认证当前用户\n    }\n}\n```\n\n也许我们想在类属性上强制实现只读/只写/读写行为。`$_view`属性是受保护的，因此无法在类外部访问，但假设我们为类的受保护属性提供了\
  \ getter/setter 方法。那么在这些 getter/setter 方法中，我们可以读取受保护属性的 Doc Comments，并据此强制执行行为。\n\
  \n也许我们想确保一个方法只执行一次。类中的其他方法可以读取 Doc Comments，并确保如果`authenticate()`方法已经被调用过，就不再调用它。\n\
  \n\n\n"
