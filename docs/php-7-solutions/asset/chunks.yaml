    ```\n\nThe danger with `while` and `do . . . while` loops\nis forgetting to set\
    \ a condition that brings the loop to an end or\nsetting an impossible condition.\
    \ This is known as an **infinite\nloop** that either freezes your computer or\
    \ causes the browser to\ncrash.\n\nThe versatile for loop\n\nThe `for` loop is\n\
    less prone to generating an infinite loop because all the conditions of\nthe loop\
    \ are declared in the first line. The `for` loop  uses the following\nbasic pattern:\n\
    \n```\nfor (initialize loop; condition; code to run after each iteration) {\n\
    code to be executed\n}\n```"
  trans: "\n# 排版后内容\n\n始终设计测试以提供最快的结果。如果必须满足所有条件，请先评估最可能失败的那个。如果只需要满足一个条件，请先评估最可能成功的那一个。如果需要将一组条件视为一个整体，请将它们括在圆括号中，如下所示：\n\
    \n```\nif (($a > 5 && $a < 10) || ($a > 20 && $b < 40))\n```\n\n## 注意\n\nPHP 也可以使用\
    \ `AND` 代替 `&&`，以及 `OR` 代替 `||`。但是，`AND` 和 `OR` 的优先级要低得多，这可能导致意外结果。为了避免问题，建议坚持使用\
    \ `&&` 和 `||`。\n\n## 使用 switch 语句进行决策链\n\n`switch` 语句为决策提供了一种替代 `if ... else`\
    \ 的方法。其基本结构如下所示：\n\n```\nswitch(被测试的变量) {\ncase 值 1:\n    要执行的语句\n    break;\n\
    case 值 2:\n    要执行的语句\n    break;\ndefault:\n    要执行的语句\n}\n```\n\n`case` 关键字表示传递给\
    \ `switch()` 的变量可能匹配的值。每个备选值前面必须有 `case`，后面跟一个冒号。当匹配成功时，后续的每一行代码都会被执行，直到遇到 `break`\
    \ 或 `return` 关键字，此时 `switch` 语句结束。一个简单的示例如下：\n\n```\nswitch($myVar) {\ncase 1:\n\
    \    echo '$myVar 是 1';\n    break;\ncase 'apple':\ncase 'orange':\n    echo '$myVar\
    \ 是一种水果';\n    break;\ndefault:\n    echo '$myVar 既不是 1 也不是水果';\n}\n```\n\n关于\
    \ `switch` 的主要注意事项如下：\n\n*   `case` 关键字后面的表达式通常是一个数字或一个字符串。你不能使用像数组或对象这样的复杂数据类型。\n\
    *   要在 `case` 中使用比较运算符，你必须重复被测试的表达式。例如，`case > 100:` 不会工作，但 `case $myVar > 100:`\
    \ 可以。在第 [8]（#332054_4_En_8_Chapter.xhtml）章的 PHP 解决方案 8-4 “用逗号连接数组”中有一个这种情况的实际示例。\n\
    *   除非你用 `break` 或 `return` 结束一个 case，否则每个后续的 case 也会被执行。\n*   你可以将几个 `case` 关键字实例组合在一起，以对它们全部应用相同的代码块。因此，在前面的示例中，如果\
    \ `$myVar` 是 “apple” 或 “orange”，将执行下面那一行。\n*   如果没有匹配项，则执行 `default` 关键字后面的任何语句。如果没有设置默认值，`switch`\
    \ 语句会静默退出并继续执行下一段代码。\n\n## 使用三元运算符\n\n三元运算符（`?:`）是一种表示条件语句的简写方法。它的名字来源于它通常使用三个操作数。基本语法如下所示：\n\
    \n```\n条件 ? 值为真时的结果 : 值为假时的结果;\n```\n\n以下是一个使用示例：\n\n```\n$age = 17;\n$fareType\
    \ = $age >= 16 ? 'adult' : 'child';\n```\n\n第二行测试 `$age` 的值。如果它大于或等于 16，则将 `$fareType`\
    \ 设置为 `adult`，否则将 `$fareType` 设置为 `child`。使用 `if ... else` 的等效代码如下所示：\n\n```\n\
    if ($age >= 16) {\n    $fareType = 'adult';\n} else {\n    $fareType = 'child';\n\
    }\n```\n\n`if ... else` 版本更易读，但三元运算符更紧凑。大多数初学者讨厌这种简写形式，但一旦你熟悉它，你就会意识到它有多么方便。\n\
    \n你可以省略问号和冒号之间的值。这会产生这样的效果：如果条件为真，则将条件的值赋给变量。前面的示例可以重写如下：\n\n```\n$age = 17;\n\
    $adult = $age >= 16 ?: false; // $adult 为 true\n```\n\n在这种情况下，问号前面的表达式是一个比较，所以它只能等于\
    \ `true` 或 `false`。但是，如果问号前面的表达式是“真值”（隐式为真），则返回值本身。例如：\n\n```\n$age = 17;\n$years\
    \ = $age ?: 'unknown';  // $years 是 17\n```\n\n前面示例的问题是，如果用做条件的变量尚未定义，则会产生错误。更好的解决方案是使用下一节中描述的\
    \ null 合并运算符。\n\n## 使用 null 合并运算符设置默认值\n\nnull 合并运算符是在 PHP 7.0 中引入的，作为一种方便的方法，当另一个变量（例如包含来自在线表单的用户输入的变量）尚未定义时，为变量分配一个默认值。该运算符由两个问号（`??`）组成，用法如下：\n\
    \n```\n$greeting = $_GET['name'] ?? 'guest';\n```\n\n这会尝试将 `$greeting` 的值设置为 `$_GET['name']`\
    \ 中存储的任何值。但是，如果 `$_GET['name']` 尚未定义——换句话说，它是 null——则使用 `??` 后面的值（`'guest'`）代替。null\
    \ 合并运算符可以像这样链式使用：\n\n```\n$greeting = $_GET['name'] ?? $nonexistent ?? $undefined\
    \ ?? 'guest';\n```\n\nPHP 依次测试每个值，并将第一个非 null 的值赋给该变量。\n\n### 注意\nnull 合并运算符仅拒绝\
    \ **null** 值——换句话说，即不存在的变量或已明确设置为 `null` 的变量。在前面的示例中，如果提交表单时未在名为 `name` 的字段中输入值，则\
    \ `$_GET['name']` 会被设置为空字符串。虽然 PHP 将其视为 `false`，但它不是 `null`。因此，`$greeting` 将被设置为空字符串。\n\
    \n## 使用循环重复执行代码\n\n**循环** 是一段重复执行的代码，直到满足某个条件为止。循环通常通过设置一个变量来计数迭代次数进行控制。通过每次递增变量，当变量达到预设数字时循环停止。循环也可以通过遍历数组中的每个项来控制。当没有更多项需要处理时，循环停止。循环中经常包含条件语句，因此尽管它们在结构上非常简单，但可用于创建以通常复杂方式处理数据的代码。\n\
    \n### 使用 While 和 Do...While 的循环\n\n最简单的循环类型称为 `while` 循环。其基本结构如下所示：\n\n```\nwhile\
    \ (条件为真) {\n    执行某些操作\n}\n```\n\n以下代码在浏览器中显示从 1 到 100 的每个数字（你可以在本章的文件中的 `while.php`\
    \ 中测试它）。它首先将变量（`$i`）设置为 1，然后将该变量用做计数器来控制循环，并在屏幕上显示当前数字。\n\n```\n$i = 1;  // 设置计数器\n\
    while ($i <= 100) {\n    echo \"$i<br>\";\n    $i++; // 计数器加 1\n}\n```\n\n####\
    \ 提示\n在前一章中，我警告过不要使用名称晦涩的变量。但是，使用 `$i` 作为计数器是一种常见的约定。如果 `$i` 已被使用，通常的做法是使用 `$j`\
    \ 或 `$k` 作为计数器。\n\n`while` 循环的一种变体使用关键字 `do`，并遵循以下基本模式：\n\n```\ndo {\n    要执行的代码\n\
    } while (要测试的条件);\n```\n\n`do...while` 循环与 `while` 循环之间的区别在于，`do` 块中的代码至少执行一次，即使条件永不为真。以下代码（在\
    \ `dowhile.php` 中）会显示一次 `$i` 的值，即使它大于预期的最大值。\n\n```\n$i = 1000;\ndo {\n    echo\
    \ \"$i\";\n    $i++; // 计数器加 1\n} while ($i <= 100);\n```\n\n`while` 和 `do...while`\
    \ 循环的危险之处在于忘记设置一个使循环结束的条件，或设置了一个不可能的条件。这被称为 **无限循环**，它要么冻结你的计算机，要么导致浏览器崩溃。\n\n\
    ### 多功能的 for 循环\n\n`for` 循环不太容易产生无限循环，因为循环的所有条件都在第一行中声明。`for` 循环使用以下基本模式：\n\n\
    ```\nfor (初始化循环; 条件; 每次迭代后要执行的代码) {\n    要执行的代码\n}\n```\n"
- fmt: "以下代码的输出与之前的`while`循环相同，显示从1到100的每个数字（参见`forloop.php`）：\n\n```\nfor ($i = 1;\
    \ $i <= 100; $i++) {\n    echo \"$i <br>\";\n}\n```\n\n括号内的三个表达式控制循环的动作（注意它们用分号分隔，而不是逗号）：\n\
    \n- 第一个表达式在循环开始前执行。在此例中，它将计数器变量`$i`的初始值设为1。\n- 第二个表达式设置决定循环应持续运行的条件。它可以是一个固定数字、一个变量或一个计算值的表达式。\n\
    - 第三个表达式在循环的每次迭代结束时执行。在此例中，它将`$i`增加1，但也可以使用更大的增量。例如，将`$i++`替换为`$i+=10`，则此示例将显示1、11、21、31等。\n\
    \n注意\n`for`循环开头括号内的第一个和第三个表达式可以包含多个用逗号分隔的语句。例如，循环可能使用两个独立递增或递减的计数器。\n\n## 使用`foreach`遍历数组和对象\n\
    \nPHP中的最后一种循环类型用于数组、对象和生成器（参见本章后面的“生成器——一种持续给予的特殊函数”）。它有两种形式，两者都使用临时变量来处理每个元素。如果只需要对元素的值进行操作，`foreach`循环采用以下形式：\n\
    \n```\nforeach (variable_name as element) {\n    do something with element\n}\n\
    ```\n\n以下示例遍历`$shoppingList`数组并显示每个项目的名称（代码在`foreach_01.php`中）：\n\n```\n$shoppingList\
    \ = ['wine', 'fish', 'bread', 'grapes', 'cheese'];\nforeach ($shoppingList as\
    \ $item) {\n    echo $item . '<br>';\n}\n```\n\n警告\n`foreach`关键字是一个单词。在`for`和`each`之间插入空格是无效的。\n\
    \n尽管前面的示例使用了索引数组，但也可以将`foreach`循环的基本形式用于关联数组。\n\n`foreach`循环的另一种形式允许访问每个元素的键和值。它采用这种略有不同的形式：\n\
    \n```\nforeach (variable_name as key => value) {\n    do something with key and\
    \ value\n}\n```\n\n下一个示例使用本章前面“创建数组”部分中的`$book`关联数组，并将每个元素的键和值合并到一个简单的字符串中，如以下屏幕截图所示（参见`foreach_02.php`）：\n\
    \n```\nforeach ($book as $key => $value) {\n    echo \"$key: $value<br>\";\n}\n\
    ```\n\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Fige_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Fige_HTML.jpg)\n\
    \n注意\n除了数组之外，`foreach`循环的主要用途是处理**迭代器**和**生成器**。你将在第8章和第9章中学习如何使用迭代器和生成器。\n\n\
    ## 中断循环\n\n要在满足特定条件时提前结束循环，请在条件语句中插入`break`关键字。一旦脚本遇到`break`，就会退出循环。\n\n要在满足特定条件时跳过循环中的代码，请使用`continue`关键字。它不是退出循环，而是立即返回到循环的顶部（忽略循环体中`continue`之后的代码）并处理下一个元素。例如，以下循环以一个条件开始，如果`$photo`没有值（`empty()`函数在变量不存在或为`false`时返回`true`），则跳过当前元素：\n\
    \n```\nforeach ($photos as $photo) {\n    if (empty($photo)) continue;\n    //\
    \ 显示照片的代码\n}\n```\n\n## 使用函数模块化代码\n\n函数提供了一种运行频繁执行操作的便捷方式。除了大量内置函数外，PHP还允许你创建自己的函数。其优点是你只需编写一次代码，而不必在每次需要的地方重新键入。这不仅加快了开发速度，而且使代码更易于阅读和维护。如果函数中的代码有问题，你只需在一个地方进行更新，而无需在整个站点中搜索。\n\
    \n在PHP中构建自己的函数很容易。只需将一段代码包裹在一对花括号中，并使用`function`关键字命名新函数。函数名称后面始终跟着一对括号。以下示例（尽管很简单）演示了自定义函数的基本结构（参见本章文件中的`functions_01.php`）：\n\
    \n```\nfunction sayHi() {\n    echo 'Hi!';\n}\n```\n\n只需在PHP代码块中放入`sayHi();`，屏幕上就会显示Hi!。这类函数就像无人机一样：它总是执行相同的操作。要使函数能够根据情况做出响应，需要将值作为参数传递给它。\n\
    \n### 向函数传递值\n\n假设你想调整`sayHi()`函数以显示某人的姓名。你可以通过在函数声明的括号中插入一个变量来实现（从技术上讲，这称为在**函数签名**中插入参数）。然后，在函数内部使用相同的变量来存储传递给函数的任何值。`functions_02.php`中的修订版本如下所示：\n\
    \n```\nfunction sayHi($name) {\n    echo \"Hi, $name!\";\n}\n```\n\n现在，你可以在页面中使用此函数来显示传递给`sayHi()`的任何变量或字面字符串的值。例如，如果你有一个在线表单，将某人的姓名保存在名为`$visitor`的变量中，并且Mark访问了你的网站，你可以通过在页面中放入`sayHi($visitor);`来给他个性化的问候，如下面的屏幕截图所示。\n\
    ![../images/332054_4_En_4_Chapter/332054_4_En_4_Figf_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Figf_HTML.jpg)\n\
    \nPHP弱类型的一个缺点是，如果Mark不配合，他可能会在表单中输入5而不是他的名字，给你带来的可能不是你期望的那种击掌。\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figg_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Figg_HTML.jpg)\n\
    \n提示\n在任何关键情况下使用用户输入之前，务必检查用户输入。你将在后续学习中掌握如何做到这一点。\n\n要向函数传递多个参数，请在函数签名中用逗号分隔变量（参数）。\n\
    \n### 设置参数的默认值\n\n要为传递给函数的参数设置默认值，请在函数签名中为变量赋值，如下所示（参见`functions_04.php`）：\n\n\
    ```\nfunction sayHi($name = 'bashful') {\n    echo \"Hi, $name!\";\n}\n```\n\n\
    这使得参数是可选的，允许像这样调用函数：\n\n```\nsayHi();\n```\n\n下面的屏幕截图显示了结果：\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figh_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Figh_HTML.jpg)\n\
    \n但是，你仍然可以向函数传递不同的值以替代默认值。\n\n提示\n可选参数必须始终放在函数签名的末尾，位于必需参数之后。\n\n### 变量作用域——函数作为黑盒\n\
    \n函数创建了一个独立的、类似于黑盒的环境。通常情况下，函数内部发生的事情对脚本的其余部分没有影响，除非它返回一个值，如下一节所述。函数内部的变量保持函数独有。以下示例应该能说明这一点（参见`functions_05.php`）："
  raw: "The output of the following code is identical to the previous `while` loop,\n\
    displaying every number from 1 to 100 (see `forloop.php`):\n\n```\nfor ($i = 1;\
    \ $i \";\n}\n```\n\nThe three expressions inside the parentheses control the action\
    \ of the\nloop (note that they are separated by semicolons, not commas):\n\n*\
    \   The first expression is executed before the loop starts. In this\n    case,\
    \ it sets the initial value of the counter variable `$i` to 1.\n\n*   The second\
    \ expression sets the condition that determines how long\n    the loop should\
    \ continue to run. This can be a fixed number, a variable,\n    or an expression\
    \ that calculates a value.\n\n*   The third expression is executed at the end\
    \ of each iteration of\n    the loop. In this case, it increases `$i` by 1, but\
    \ there is\n    nothing stopping you from using bigger increments. For instance,\n\
    \    replacing `$i++`\n    with `$i+=10` in\n    this example would display 1,\
    \ 11, 21, 31, and so on.\n\nNote\nThe first and third expressions inside the parentheses\
    \ at the start\nof a for loop can contain multiple statements separated by commas.\
    \ For\nexample, the loop might use two counters that are incremented or\ndecremented\
    \ independently.\n\nLooping through arrays and objects with Foreach\n\nThe final\
    \ type of loop in PHP is used with arrays, objects, and\ngenerators (see “Generators—a\
    \ special type of function that keeps on\ngiving” later in this chapter). It takes\
    \ two forms, both of which use\ntemporary variables\nto handle each element. If\
    \ you only need to do something with the\nelement’s value, the `foreach` loop\
    \  takes the following\nform:\n\n```\nforeach (variable_name as element) {\ndo\
    \ something with element\n}\n```\n\nThe following example loops through the `$shoppingList`\
    \ array\nand displays the name of each item (the code is in `foreach_01.php`):\n\
    \n```\n$shoppingList = ['wine', 'fish', 'bread', 'grapes', 'cheese'];\nforeach\
    \ ($shoppingList as $item) {\necho $item.'';\n}\n```\n\nCaution\nThe `foreach`\n\
    keyword is one word. Inserting a space between `for` and `each` doesn’t\nwork.\n\
    \nAlthough the preceding example uses an indexed array, you can also\nuse the\
    \ basic form\nof the `foreach`\nloop with an associative array.\n\nThe alternative\
    \ form of the `foreach` loop gives\naccess to both the key and the value of each\
    \ element. It takes this\nslightly different form:\n\n```\nforeach (variable_name\
    \ as key => value) {\ndo something with key and value\n}\n```\n\nThis next example\
    \ uses the `$book` associative array from\nthe “Creating arrays” section earlier\
    \ in this chapter and incorporates\nthe key and value of each element into a simple\
    \ string, as shown in the\nfollowing screenshot (see `foreach_02.php`):\n\n```\n\
    foreach ($book as $key => $value) {\necho \"$key: $value\";\n}\n```\n\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Fige_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Fige_HTML.jpg)\n\
    \nNote\nApart from arrays, the main use of a `foreach` loop is with\n**iterators**\
    \ and **generators**. You’ll see\nhow to use iterators and generators in Chapters\
    \ [8](#332054_4_En_8_Chapter.xhtml) and [9](#332054_4_En_9_Chapter.xhtml).\n\n\
    Breaking out of a loop\nTo bring a loop prematurely to an end when a certain condition\
    \ is\nmet, insert the `break` keyword  inside a conditional statement.\nAs soon\
    \ as the script encounters `break`, it exits the\nloop.\n\nTo skip the code in\
    \ a loop when a certain condition is met, use the\n`continue`\nkeyword. Instead\
    \ of exiting, it immediately returns to the top of the\nloop (ignoring the code\
    \ in the loop body that follows `continue`) and deals\nwith the next element.\
    \ For example, the following loop begins with a\ncondition that skips the current\
    \ element if `$photo` has no value\n(the `empty()`\nfunction returns `true` if\
    \ a variable\ndoesn’t exist or is `false`):\n\n```\nforeach ($photos as $photo)\
    \ {\nif (empty($photo)) continue;\n// code to display a photo\n}\n```\n\nModularizing\
    \ code with functions\nFunctions offer a convenient way of running frequently\
    \ performed\noperations. In addition to the large number of built-in functions,\
    \ PHP\nlets you create your own. The advantages are that you write the code\n\
    only once, rather than needing to retype it everywhere you need it. This\nnot\
    \ only speeds up development but also makes your code easier to read\nand maintain.\
    \ If there’s a problem with the code in your function, you\ncan update it in just\
    \ one place rather than hunting through your entire\nsite.\n\nBuilding your own\
    \ functions in PHP is easy. You simply wrap a block of\ncode in a pair of curly\
    \ braces and use the `function` keyword  to name the new\nfunction. The function\
    \ name is always followed by a pair of parentheses.\nThe following—admittedly\
    \ trivial—example demonstrates the basic\nstructure of a custom-built function\
    \ (see `functions_01.php` in\nthe files for this chapter):\n\n```\nfunction sayHi()\
    \ {\necho 'Hi!';\n}\n```\n\nSimply putting `sayHi()` `;` in a PHP code block\n\
    results in Hi! being displayed onscreen. This type of function is like a\ndrone:\
    \ it always performs the same operation. For functions to be\nresponsive to circumstances,\
    \ you need to pass values to them as\narguments.\n\nPassing values to functions\n\
    \nLet’s say you want to adapt the `sayHi()` function to\ndisplay someone’s name.\
    \ You do this by inserting a variable between the\nparentheses in the function\
    \ declaration (technically, this is known as\ninserting a parameter in the **function\
    \ signature**). The\nsame variable is then used inside the function to store whatever\
    \ value\nis passed to the function. The revised version in `functions_02.php`\n\
    looks like this:\n\n```\nfunction sayHi($name) {\necho \"Hi, $name!\";\n}\n```\n\
    \nYou can now use this function inside a page to display the value of\nany variable\
    \ or literal string passed to `sayHi()`. For\ninstance, if you have an online\
    \ form that saves someone’s name in a\nvariable called `$visitor`, and Mark\n\
    visits your site, you can give him the sort of personal greeting shown\nin the\
    \ following screenshot by putting `sayHi($visitor);` in\nyour page.\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figf_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Figf_HTML.jpg)\n\
    A downside of PHP’s weak typing is that if Mark is being\nuncooperative, he might\
    \ type 5 into the form instead of his name, giving\nyou not quite the type of\
    \ high five you might have been expecting.\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figg_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Figg_HTML.jpg)\n\
    \nTip\nAlways check user input before using it in any critical situation.\nYou’ll\
    \ learn how to do this as you progress through this book.\n\nTo pass more than\
    \ one argument to a function, separate the variables\n(parameters) with commas\
    \ in the function signature.\n\nSetting default values for arguments\n\nTo set\
    \ a default value for an argument passed to a function, assign a\nvalue to the\
    \ variable in the function signature like this (see `functions_04.php`):\n\n```\n\
    function sayHi($name = 'bashful') {\necho \"Hi, $name!\";\n}\n```\n\nThis makes\
    \ the argument optional, allowing you to invoke the function\nlike this:\n\n```\n\
    sayHi();\n```\n\nThe following screenshot shows the result:\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figh_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Figh_HTML.jpg)\n\
    However, you can still pass the function a different value to use\ninstead of\
    \ the default.\n\nTip\nOptional arguments must always come at the end of the function\n\
    signature after required ones.\n\nVariable scope—Functions as black boxes\n\n\
    Functions create a separate environment that is rather like a black box. Normally\
    \ what\ngoes on inside the function has no impact on the rest of the script,\n\
    unless it returns a value, as described in the next section. Variables\ninside\
    \ a function remain exclusive to the function. This example should\nillustrate\
    \ the point (see `functions_05.php`):"
  trans: "\n以下代码的输出与之前的`while`循环相同，显示从 1 到 100 的每个数字（参见`forloop.php`）：\n\n```\nfor\
    \ ($i = 1; $i <= 100; $i++) {\n    echo \"$i <br>\";\n}\n```\n\n括号内的三个表达式控制循环的动作（注意它们用分号分隔，而不是逗号）：\n\
    \n- 第一个表达式在循环开始前执行。在此例中，它将计数器变量`$i`的初始值设为 1。\n- 第二个表达式设置决定循环应持续运行的条件。它可以是一个固定数字、一个变量或一个计算值的表达式。\n\
    - 第三个表达式在循环的每次迭代结束时执行。在此例中，它将`$i`增加 1，但也可以使用更大的增量。例如，将`$i++`替换为`$i+=10`，则此示例将显示\
    \ 1、11、21、31 等。\n\n注意\n`for`循环开头括号内的第一个和第三个表达式可以包含多个用逗号分隔的语句。例如，循环可能使用两个独立递增或递减的计数器。\n\
    \n## 使用`foreach`遍历数组和对象\n\nPHP 中的最后一种循环类型用于数组、对象和生成器（参见本章后面的“生成器——一种持续给予的特殊函数”）。它有两种形式，两者都使用临时变量来处理每个元素。如果只需要对元素的值进行操作，`foreach`循环采用以下形式：\n\
    \n```\nforeach (variable_name as element) {\n    do something with element\n}\n\
    ```\n\n以下示例遍历`$shoppingList`数组并显示每个项目的名称（代码在`foreach_01.php`中）：\n\n```\n$shoppingList\
    \ = ['wine', 'fish', 'bread', 'grapes', 'cheese'];\nforeach ($shoppingList as\
    \ $item) {\n    echo $item . '<br>';\n}\n```\n\n警告\n`foreach`关键字是一个单词。在`for`和`each`之间插入空格是无效的。\n\
    \n尽管前面的示例使用了索引数组，但也可以将`foreach`循环的基本形式用于关联数组。\n\n`foreach`循环的另一种形式允许访问每个元素的键和值。它采用这种略有不同的形式：\n\
    \n```\nforeach (variable_name as key => value) {\n    do something with key and\
    \ value\n}\n```\n\n下一个示例使用本章前面“创建数组”部分中的`$book`关联数组，并将每个元素的键和值合并到一个简单的字符串中，如以下屏幕截图所示（参见`foreach_02.php`）：\n\
    \n```\nforeach ($book as $key => $value) {\n    echo \"$key: $value<br>\";\n}\n\
    ```\n\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Fige_HTML.jpg](img/332054_4_En_4_Fige_HTML.jpg)\n\
    \n注意\n除了数组之外，`foreach`循环的主要用途是处理**迭代器**和**生成器**。你将在第 8 章和第 9 章中学习如何使用迭代器和生成器。\n\
    \n## 中断循环\n\n要在满足特定条件时提前结束循环，请在条件语句中插入`break`关键字。一旦脚本遇到`break`，就会退出循环。\n\n要在满足特定条件时跳过循环中的代码，请使用`continue`关键字。它不是退出循环，而是立即返回到循环的顶部（忽略循环体中`continue`之后的代码）并处理下一个元素。例如，以下循环以一个条件开始，如果`$photo`没有值（`empty()`函数在变量不存在或为`false`时返回`true`），则跳过当前元素：\n\
    \n```\nforeach ($photos as $photo) {\n    if (empty($photo)) continue;\n    //\
    \ 显示照片的代码\n}\n```\n\n## 使用函数模块化代码\n\n函数提供了一种运行频繁执行操作的便捷方式。除了大量内置函数外，PHP 还允许你创建自己的函数。其优点是你只需编写一次代码，而不必在每次需要的地方重新键入。这不仅加快了开发速度，而且使代码更易于阅读和维护。如果函数中的代码有问题，你只需在一个地方进行更新，而无需在整个站点中搜索。\n\
    \n在 PHP 中构建自己的函数很容易。只需将一段代码包裹在一对花括号中，并使用`function`关键字命名新函数。函数名称后面始终跟着一对括号。以下示例（尽管很简单）演示了自定义函数的基本结构（参见本章文件中的`functions_01.php`）：\n\
    \n```\nfunction sayHi() {\n    echo 'Hi!';\n}\n```\n\n只需在 PHP 代码块中放入`sayHi();`，屏幕上就会显示\
    \ Hi!。这类函数就像无人机一样：它总是执行相同的操作。要使函数能够根据情况做出响应，需要将值作为参数传递给它。\n\n### 向函数传递值\n\n假设你想调整`sayHi()`函数以显示某人的姓名。你可以通过在函数声明的括号中插入一个变量来实现（从技术上讲，这称为在**函数签名**中插入参数）。然后，在函数内部使用相同的变量来存储传递给函数的任何值。`functions_02.php`中的修订版本如下所示：\n\
    \n```\nfunction sayHi($name) {\n    echo \"Hi, $name!\";\n}\n```\n\n现在，你可以在页面中使用此函数来显示传递给`sayHi()`的任何变量或字面字符串的值。例如，如果你有一个在线表单，将某人的姓名保存在名为`$visitor`的变量中，并且\
    \ Mark 访问了你的网站，你可以通过在页面中放入`sayHi($visitor);`来给他个性化的问候，如下面的屏幕截图所示。\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figf_HTML.jpg](img/332054_4_En_4_Figf_HTML.jpg)\n\
    \nPHP 弱类型的一个缺点是，如果 Mark 不配合，他可能会在表单中输入 5 而不是他的名字，给你带来的可能不是你期望的那种击掌。\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figg_HTML.jpg](img/332054_4_En_4_Figg_HTML.jpg)\n\
    \n提示\n在任何关键情况下使用用户输入之前，务必检查用户输入。你将在后续学习中掌握如何做到这一点。\n\n要向函数传递多个参数，请在函数签名中用逗号分隔变量（参数）。\n\
    \n### 设置参数的默认值\n\n要为传递给函数的参数设置默认值，请在函数签名中为变量赋值，如下所示（参见`functions_04.php`）：\n\n\
    ```\nfunction sayHi($name = 'bashful') {\n    echo \"Hi, $name!\";\n}\n```\n\n\
    这使得参数是可选的，允许像这样调用函数：\n\n```\nsayHi();\n```\n\n下面的屏幕截图显示了结果：\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figh_HTML.jpg](img/332054_4_En_4_Figh_HTML.jpg)\n\
    \n但是，你仍然可以向函数传递不同的值以替代默认值。\n\n提示\n可选参数必须始终放在函数签名的末尾，位于必需参数之后。\n\n### 变量作用域——函数作为黑盒\n\
    \n函数创建了一个独立的、类似于黑盒的环境。通常情况下，函数内部发生的事情对脚本的其余部分没有影响，除非它返回一个值，如下一节所述。函数内部的变量保持函数独有。以下示例应该能说明这一点（参见`functions_05.php`）：\n"
- fmt: "```php\nfunction doubleIt($number) {\n$number *= 2;\necho 'Inside the function,\
    \ $number is ' . $number . '';  // number is doubled\n}\n$number = 4;\ndoubleIt($number);\n\
    echo 'Outside the function $number is still ' . $number;   // not doubled\n```\n\
    \nThe first four lines define a function called `doubleIt()`, which takes a number,\
    \ doubles it, and displays it onscreen. The rest of the script assigns the value\
    \ 4 to `$number`. Then it passes `$number` as an argument to `doubleIt()`. The\
    \ function processes `$number` and displays 8. After the function comes to an\
    \ end, `$number` is displayed onscreen by `echo`. This time, it’s 4 and not 8,\
    \ as the following screenshot shows:\n\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figi_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Figi_HTML.jpg)\n\
    \nThis demonstrates that `$number` in the main script is totally unrelated to\
    \ the variable with the same name inside the function. This is known as the **scope**\
    \ of the variable. Even if the value of the variable changes inside a function,\
    \ variables with the same name outside are not affected unless the value is passed\
    \ to the function by reference, as described later in this chapter.\n\n> **Tip**\
    \  \n> Although it’s not always practicable, avoid using the same variable names\
    \ in the rest of your script as those inside functions. It makes your code easier\
    \ to understand and to debug.\n\nPHP superglobal variables ([`www.php.net/manual/en/language.variables.superglobals.php`](http://www.php.net/manual/en/language.variables.superglobals.php)),\
    \ such as `$_POST` and `$_GET`, are not affected by variable scope. They’re always\
    \ available, which is why they’re called superglobal.\n\n## Returning values from\
    \ functions\n\nThere’s more than one way to get a function to change the value\
    \ of a variable passed to it as an argument, but the most important method is\
    \ to use the `return` keyword and to assign the result either to the same variable\
    \ or to another one. This can be demonstrated by amending the `doubleIt()` function\
    \ like this (the code is in `functions_06.php`):\n\n```php\nfunction doubleIt($number)\
    \ {\nreturn $number *= 2;\n}\n$num = 4;\n$doubled = doubleIt($num);\necho '$num\
    \ is: ' . $num . '';  // remains unchanged\necho '$doubled is: ' . $doubled; \
    \  // original number doubled\n```\n\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figj_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Figj_HTML.jpg)\n\
    \nThis time, I have used different names for the variables to avoid confusing\
    \ them. I have also assigned the result of `doubleIt($num)` to a new variable.\
    \ The benefit of doing this is that both the original value and the result of\
    \ the calculation are now available. You won’t always want to keep the original\
    \ value, but it can be very useful at times. Functions don’t always need to return\
    \ a value. The `return` keyword can be used on its own to halt any further processing.\n\
    \n## Generators—a special type of function that keeps on giving\n\nWhen a function\
    \ encounters `return`, it immediately terminates and returns a value or nothing.\
    \ Generators are special functions introduced in PHP 5.5 that create simple iterators\
    \ that can be used inside a loop to produce a series of values. Instead of using\
    \ the `return` keyword, they use `yield`. This enables a generator to yield values\
    \ one at a time, keeping track of the next one in the series until it’s called\
    \ again or runs out of values.\n\nA generator can use an internal loop to generate\
    \ the values it yields, or it can have a series of `yield` statements. The simple\
    \ example in `generator.php` uses both techniques like this:\n\n```php\nfunction\
    \ counter($num) {\n$i = 1;\nwhile ($i < $num) {\nyield $i++;\n}\nyield $i;\nyield\
    \ $i + 10;\nyield $i + 20;\n}\n```\n\nThe `counter()` generator takes a single\
    \ argument, `$num`. It initializes a counter `$i` to 1, and then uses a loop that\
    \ continues running while `$i` is less than `$num`. The loop yields `$i` and increments\
    \ it by 1. After the loop comes to an end, a series of `yield` statements yields\
    \ three further values.\n\nAfter initializing the generator by assigning it to\
    \ a variable, you can then use it in a `foreach` loop like this:\n\n```php\n$numbers\
    \ = counter(5);\nforeach ($numbers as $number) {\necho $number . ' ';\n}\n```\n\
    \nThis produces the series of numbers shown in the following screenshot:\n\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figk_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Figk_HTML.jpg)\n\
    \nFor this trivial example, it would be simpler to create an array of the values\
    \ and use that directly in a loop. The major advantage of generators is that they\
    \ use considerably less memory than arrays for a large number of values. In Chapter\
    \ 9, you’ll see a practical example of a generator to process the contents of\
    \ a file.\n\n## Passing by reference—Changing the value of an argument\n\nAlthough\
    \ functions don’t normally change the value of variables passed to them as arguments,\
    \ there are occasions when you do want to change the original value rather than\
    \ capture a return value. To do so, when defining the function, you prefix the\
    \ parameter you want to change with an ampersand, like this:\n\n```php\nfunction\
    \ doubleIt(&$number) {\n$number *= 2;\n}\n```\n\nNotice that this version of the\
    \ `doubleIt()` function doesn’t `echo` the value of `$number`, nor does it return\
    \ the value of the calculation. Because the parameter between the parentheses\
    \ is prefixed by an ampersand, the original value of a variable passed as an argument\
    \ to the function will be changed. This is known as **passing by reference**.\n\
    \nThe following code (found in `functions_07.php`) demonstrates the effect:\n\n\
    ```php\n$num = 4;\necho '$num is: ' . $num . '';\ndoubleIt($num);\necho '$num\
    \ is now: ' . $num;\n```\n\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figl_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Figl_HTML.jpg)\n\
    \nThe ampersand is used only in the function definition, not when the function\
    \ is invoked. Generally speaking, it’s not a good idea to use functions to change\
    \ the original values of variables passed to them as arguments because there can\
    \ be unexpected consequences if the variable is used elsewhere in a script. However,\
    \ there are situations in which it makes a lot of sense to do this. For example,\
    \ the built-in array-sorting functions use pass by reference to affect the original\
    \ array.\n\n> **Note**  \n> Objects are always passed by reference, even if the\
    \ function definition doesn’t prefix the parameter with an ampersand. This also\
    \ applies to iterators and generators, which implement built-in PHP classes.\n\
    \n## Functions that accept a variable number of arguments\n\nPHP 5.6 introduced\
    \ the rather inelegantly named **splat operator** that allows you to define a\
    \ function that accepts an arbitrary number of arguments. It consists of three\
    \ dots or periods preceding the last (or only) parameter in the function signature.\
    \ The splat operator converts the values passed to the function into an array,\
    \ which can then be used inside the function. The code in `functions_08.php` contains\
    \ the following trivial example:\n\n```php\nfunction addEm(...$nums) {\nreturn\
    \ array_sum($nums);\n}\n$total = addEm(1, 2, 3, 4, 5);\necho '$total is ' . $total;\n\
    ```\n\nThe comma-separated numbers passed to the function are converted to an\
    \ array, and then passed to the built-in `array_sum()` function that adds up all\
    \ the values in an array. The following screenshot shows the output:\n\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figm_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Figm_HTML.jpg)"
