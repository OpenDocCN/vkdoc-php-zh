  \ PM Page 380\n\n**380**\n\n## 练习：创建数据库函数\n\n1. 加载 `pgAdmin III`，并连接到 `hatshop`\
  \ 数据库。\n\n2. 点击 `Tools` ➤ `Query tool`（或点击工具栏中的 `SQL` 按钮）。此时应出现一个新的查询窗口。\n\n3. 使用查询工具执行以下代码，以在\
  \ `hatshop` 数据库中创建 `customer_login` 类型和 `customer_get_login_info` 函数：\n\n```sql\n\
  -- 创建 customer_login_info 类型\n\nCREATE TYPE customer_login_info AS\n(\ncustomer_id\
  \ INTEGER,\npassword VARCHAR(50)\n);\n\n-- 创建 customer_get_login_info 函数\n\nCREATE\
  \ FUNCTION customer_get_login_info(VARCHAR(100))\nRETURNS customer_login_info LANGUAGE\
  \ plpgsql AS $$\nDECLARE\ninEmail ALIAS FOR $1;\noutCustomerLoginInfoRow customer_login_info;\n\
  BEGIN\nSELECT INTO outCustomerLoginInfoRow\ncustomer_id, password\nFROM customer\n\
  WHERE email = inEmail;\nRETURN outCustomerLoginInfoRow;\nEND;\n$$;\n```\n\n当用户登录网站时，必须验证其密码。`customer_get_login_info`\
  \ 函数会返回特定电子邮件地址对应的客户 ID 和密码哈希值。\n\n4. 使用查询工具执行以下代码，以在 `hatshop` 数据库中创建 `customer_add`\
  \ 函数：\n\n```sql\n-- 创建 customer_add 函数\n\nCREATE FUNCTION customer_add(\nVARCHAR(50),\
  \ VARCHAR(100), VARCHAR(50))\nRETURNS INTEGER LANGUAGE plpgsql AS $$\nDECLARE\n\
  inName ALIAS FOR $1;\ninEmail ALIAS FOR $2;\ninPassword ALIAS FOR $3;\noutCustomerId\
  \ INTEGER;\nBEGIN\nINSERT INTO customer (name, email, password)\nVALUES (inName,\
  \ inEmail, inPassword);\nSELECT INTO outCustomerId\ncurrval('customer_customer_id_seq');\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH11.qxd 11/17/06\
  \ 3:37 PM Page 381\n\n**381**\n\n```sql\nRETURN outCustomerId;\nEND;\n$$;\n```\n\
  \n当用户在网站上注册时，会调用 `customer_add` 函数。该方法会返回该用户的客户 ID，以便保存在会话中。\n\n5. 使用查询工具执行以下代码，以在\
  \ `hatshop` 数据库中创建 `customer_get_customer` 函数：\n\n```sql\n-- 创建 customer_get_customer\
  \ 函数\n\nCREATE FUNCTION customer_get_customer(INTEGER)\nRETURNS customer LANGUAGE\
  \ plpgsql AS $$\nDECLARE\ninCustomerId ALIAS FOR $1;\noutCustomerRow customer;\n\
  BEGIN\nSELECT INTO outCustomerRow\ncustomer_id, name, email, password, credit_card,\n\
  address_1, address_2, city, region, postal_code, country, shipping_region_id, day_phone,\
  \ eve_phone, mob_phone\nFROM customer\nWHERE customer_id = inCustomerId;\nRETURN\
  \ outCustomerRow;\nEND;\n$$;\n```\n\n`customer_get_customer` 函数会返回特定客户 ID 的完整客户详细信息。\n\
  \n6. 使用查询工具执行以下代码，以在 `hatshop` 数据库中创建 `customer_update_account` 函数：\n\n```sql\n\
  -- 创建 customer_update_account 函数\n```\n\n\n\nCREATE FUNCTION customer_update_account(INTEGER,\
  \ VARCHAR(50), VARCHAR(100), VARCHAR(50), VARCHAR(100), VARCHAR(100), VARCHAR(100))\n\
  RETURNS VOID LANGUAGE plpgsql AS $$\nDECLARE\ninCustomerId ALIAS FOR $1;\ninName\
  \ ALIAS FOR $2;\ninEmail ALIAS FOR $3;\ninPassword ALIAS FOR $4;\ninDayPhone ALIAS\
  \ FOR $5;\ninEvePhone ALIAS FOR $6;\ninMobPhone ALIAS FOR $7;\nBEGIN\nUPDATE customer\n\
  SET name = inName, email = inEmail,\npassword = inPassword, day_phone = inDayPhone,\n\
  eve_phone = inEvePhone, mob_phone = inMobPhone\nWHERE customer_id = inCustomerId;\n\
  END;\n$$;\n\n`customer_update_account`函数在数据库中更新客户的账户详情。\n\n## 7. 使用查询工具执行以下代码，在`hatshop`数据库中创建`customer_update_credit_card`函数：\n\
  \n```sql\n-- Create customer_update_credit_card function\nCREATE FUNCTION customer_update_credit_card(INTEGER,\
  \ TEXT) RETURNS VOID LANGUAGE plpgsql AS $$\nDECLARE\ninCustomerId ALIAS FOR $1;\n\
  inCreditCard ALIAS FOR $2;\nBEGIN\nUPDATE customer\nSET credit_card = inCreditCard\n\
  WHERE customer_id = inCustomerId;\nEND;\n$$;\n```\n\n`customer_update_credit_card`函数在数据库中更新客户的信用卡信息。它只更新客户的`credit_card`列，该列包含客户完整信用卡详情\
  \ XML 文档的加密版本。\n\n## 8. 使用查询工具执行以下代码，在`hatshop`数据库中创建`customer_get_shipping_regions`函数：\n\
  \n```sql\n-- Create customer_get_shipping_regions function\nCREATE FUNCTION customer_get_shipping_regions()\n\
  RETURNS SETOF shipping_region LANGUAGE plpgsql AS $$\nDECLARE\noutShippingRegion\
  \ shipping_region;\nBEGIN\nFOR outShippingRegion IN\nSELECT shipping_region_id,\
  \ shipping_region\nFROM shipping_region\nLOOP\nRETURN NEXT outShippingRegion;\n\
  END LOOP;\nRETURN;\nEND;\n$$;\n```\n\n`customer_get_shipping_regions`函数返回数据库中的配送区域，用于客户地址详情页面。\n\
  \n## 9. 使用查询工具执行以下代码，在`hatshop`数据库中创建`customer_update_address`函数：\n\n```sql\n--\
  \ Create customer_update_address function\nCREATE FUNCTION customer_update_address(INTEGER,\
  \ VARCHAR(100), VARCHAR(100), VARCHAR(100),\nVARCHAR(100), VARCHAR(100), VARCHAR(100),\
  \ INTEGER)\nRETURNS VOID LANGUAGE plpgsql AS $$\nDECLARE\ninCustomerId ALIAS FOR\
  \ $1;\ninAddress1 ALIAS FOR $2;\ninAddress2 ALIAS FOR $3;\ninCity ALIAS FOR $4;\n\
  inRegion ALIAS FOR $5;\ninPostalCode ALIAS FOR $6;\ninCountry ALIAS FOR $7;\ninShippingRegionId\
  \ ALIAS FOR $8;\nBEGIN\nUPDATE customer\nSET address_1 = inAddress1, address_2 =\
  \ inAddress2, city = inCity, region = inRegion, postal_code = inPostalCode,\ncountry\
  \ = inCountry, shipping_region_id = inShippingRegionId WHERE customer_id = inCustomerId;\n\
  END;\n$$;\n```\n\n`customer_update_address`函数在数据库中更新客户的地址。\n\n## 实现业务层\n\n在`business`文件夹中，创建一个名为`customer.php`的新文件，该文件将包含`Customer`类。`Customer`类稍长一些，它主要访问数据层功能以响应来自表示层的请求。在`business/customer.php`文件中编写以下代码：\n\
