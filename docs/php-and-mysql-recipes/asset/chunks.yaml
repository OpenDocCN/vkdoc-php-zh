    Recipe 10-11\. Working with Strings


    Problem


    The most common use of PHP is to generate HTML documents (or other dynamic documents).
    The documents are often created by concatenating strings or inserting variable
    content into other strings in the form of templates.


    Solution


    PHP supports both single ( '' ) and double ( " ) quotes when defining strings.
    There is no difference in the resulting string but the way PHP handles the content
    of the string is slightly different. When single quotes are used the dollar sign
    ( $ ) will be accepted as a character without the need to escape it with a backslash
    ( \ ) and there is no variable substitution. Variable substitution makes it possible
    to embed variables into a string without using concatenation. Simple variables
    can be embedded directly into a string (the double quoted version). More complex
    variables like arrays and objects will have to be wrapped in curly brackets {}
    to be embedded in a string.


    How it Works


    <?php


    // 10_21.php


    $a = 5;


    $s1 = ''$a = 5'';


    $s2 = "$a = 5";


    Strings can also be generated by concatenating multiple variables using the .
    (period) operator. It is possible to mix strings with single and double quotes
    and any variable. Variables will be converted to strings before the concatenation.


    CHAPTER 10 ■ VARIABLES


    <?php


    // 10_22.php


    $a = 5;


    $s = ''This string is ''.


    ''created by concatination of ''.


    ''strings and the variable $a ''.


    "with the value $a\n";


    Comparing strings can be done with the normal compare operators but that might
    not always give the desired results.


    Recipe 10-12\. Handling Floating Point Numbers


    Problem


    Working with floating point numbers can cause some confusion. Numbers that have
    an exact representation in base 10 do not always translate to an exact representation
    in the binary base 2\. This is causing rounding errors when math operations are
    performed on these values. Even simple math and comparison options that look obvious
    can yield results that seem wrong.


    Solution


    You should never rely on comparing two floating point values and expect to make
    exact comparisons.


    A better way is to look at the difference between the two values and determine
    if the difference is greater or less than a certain threshold.


    How it Works


    The operation 8 – 7.7 should give the result 0.3 but performing the math and then
    comparing to the value 0.3


    will show a different result.


    <?php


    // 10_23.php


    $v = 8 - 7.7;


    $u = 0.3;


    echo "$v\n";


    if ($v == $u) {


    echo "\$v == \$u\n";


    }


    else {


    echo "\$v != $u\n";


    }


    Instead of comparing if the two variables are identical it would be better to
    look at the difference between the two and compare that to a number representing
    the precision required. This number is often referred to as epsilon.


    CHAPTER 10 ■ VARIABLES


    <?php


    // 10_24.php


    $epsilon = 0.00001;


    $v = 8 - 7.7;


    $u = 0.3;


    echo "$v\n";


    if (abs($v - $u) < $epsilon) {


    echo "\$v == \$u\n";


    }


    else {


    echo "\$v != $u\n";


    }


    The output of this script looks like this:


    0.3


    $v == $u'
  trans: "\n# PHP 中的对象比较与字符串处理\n\n## 对象比较\n\n不同类实例化的对象永远不相等，但同一类实例化的对象在使用松散运算符（`==`）进行比较时，如果具有相同的属性和属性值，则可能相等。若使用严格运算符（`===`）进行比较，则必须指向同一个实例才视为相等。\n\
    \n完整的规则列表可在 PHP 手册[此处](http://php.net/manual/en/language.operators.comparison.php)查看。\n\
    \n以下示例展示了比较不同类型或相同类型的值时，比较运算符的几种工作方式。\n\n```php\n// 10_20.php\n\n$i = 100;\n$f\
    \ = 12.2;\n$s = \"abc\";\n$s2 = \"100\";\n\nvar_dump($i == $s2);\nvar_dump($i\
    \ === $s2);\nvar_dump($i != $s2);\nvar_dump($i !== $s2);\n```\n\n第 10 章 ■ 变量\n\
    \n```php\nvar_dump($i >= $f);\nvar_dump($s <=> $s2);\nvar_dump($s2 <=> $s);\n\
    var_dump($s <=> $s);\n```\n\n输出结果将是一系列 `true` 和 `false` 值，最后三行除外。\n\n```\nbool(true)\n\
    bool(false)\nbool(false)\nbool(true)\nbool(true)\nint(1)\nint(-1)\nint(0)\n```\n\
    \n## 方法 10-11：处理字符串\n\n### 问题\n\nPHP 最常见的用途是生成 HTML 文档（或其他动态文档）。这些文档通常通过拼接字符串或将以模板形式将变量内容插入其他字符串中来创建。\n\
    \n### 解决方案\n\nPHP 在定义字符串时同时支持单引号（`'`）和双引号（`\"`）。生成的字符串本身没有区别，但 PHP 处理字符串内容的方式略有不同。使用单引号时，美元符号（`$`）会作为普通字符被接受，无需用反斜杠（`\\\
    `）转义，且不支持变量替换。变量替换使得无需使用拼接即可将变量嵌入字符串中。简单变量可以直接嵌入字符串（双引号版本）。更复杂的变量（如数组和对象）则需要用花括号（`{}`）包裹才能嵌入字符串。\n\
    \n### 工作原理\n\n```php\n// 10_21.php\n\n$a = 5;\n$s1 = '$a = 5';\n$s2 = \"$a = 5\"\
    ;\n```\n\n字符串也可以通过使用 `.`（句点）运算符拼接多个变量来生成。可以混合使用单引号、双引号字符串以及任意变量。变量在拼接前会被转换为字符串。\n\
    \n第 10 章 ■ 变量\n\n```php\n// 10_22.php\n\n$a = 5;\n$s = '该字符串由 ' .\n     '字符串拼接\
    \ ' .\n     '以及变量 $a ' .\n     \"（值为 $a）共同创建\\n\";\n```\n\n字符串比较可以使用常规比较运算符，但这可能并不总是能给出理想的结果。\n\
    \n## 方法 10-12：处理浮点数\n\n### 问题\n\n使用浮点数可能会引起一些困惑。在十进制中有精确表示的数，并不总能转换为二进制中的精确表示。这会导致对这些值进行数学运算时出现舍入误差。即使是看似简单的数学运算和比较操作，也可能产生看似错误的结果。\n\
    \n### 解决方案\n\n永远不要依赖精确比较两个浮点数值。\n\n更好的方法是检查两个值之间的差值，并判断该差值是否大于或小于某个阈值。\n\n###\
    \ 工作原理\n\n运算 `8 - 7.7` 结果应为 `0.3`，但执行运算后再与值 `0.3` 进行比较会显示不同的结果。\n\n```php\n//\
    \ 10_23.php\n\n$v = 8 - 7.7;\n$u = 0.3;\necho \"$v\\n\";\n\nif ($v == $u) {\n\
    \    echo \"\\$v == \\$u\\n\";\n} else {\n    echo \"\\$v != $u\\n\";\n}\n```\n\
    \n与其比较两个变量是否完全相同，不如检查两者的差值，并将其与代表所需精度的数值进行比较。该数值通常称为 epsilon。\n\n第 10 章 ■ 变量\n\
    \n```php\n// 10_24.php\n\n$epsilon = 0.00001;\n$v = 8 - 7.7;\n$u = 0.3;\necho\
    \ \"$v\\n\";\n\nif (abs($v - $u) < $epsilon) {\n    echo \"\\$v == \\$u\\n\";\n\
    } else {\n    echo \"\\$v != $u\\n\";\n}\n```\n\n该脚本的输出如下：\n\n```\n0.3\n$v ==\
    \ $u\n```\n"
- fmt: "# Recipe 10-13: Special Language Constructs\n\nPHP has a large number of functions\
    \ built in and a few language constructs that look like functions but act slightly\
    \ different.\n\n## Problem\n\nArrays are indexed lists of variables where the\
    \ index can be a numerical key or a string value. If no keys are defined PHP will\
    \ auto-assign values each time a new element is added. In order to work with arrays\
    \ it is necessary to use special language constructs to create arrays or to extract\
    \ values, etc.\n\n## Solution\n\nThere are a few special language constructs in\
    \ PHP that makes working with arrays simple. The first is `array()`. Although\
    \ it looks like a function it is actually a language construct used to define\
    \ array variables. If nothing is written between the parentheses the variable\
    \ will become an empty array.\n\n## How it Works\n\nBelow is a common way to initialize\
    \ an array variable.\n\n```php\n// 10_25.php\n$a = array();\n```\n\nOther languages\
    \ treat arrays as objects and they must be instantiated with the `new` operator.\
    \ That's not needed in PHP as an array is its own native type. If values are listed\
    \ as a comma separated list these will become elements of the array. Array elements\
    \ can be of any supported type, including arrays, and they can even be mixed.\n\
    \n```php\n// 10_26.php\n$a = array(1, 2, \"3\", array(4, 5, 6));\n```\n\nBecause\
    \ PHP and JavaScript are often used together a new shorter syntax for creating\
    \ arrays was introduced in PHP version 5.4. This new syntax looks more like a\
    \ JSON encoded string:\n\n```php\n// 10_27.php\n$a = [1, 2, \"3\", [4, 5, 6]];\n\
    ```\n\nIn the examples above all the values are added without providing a key.\
    \ This will cause PHP to generate index values for each element starting at the\
    \ value 0. It is not necessary to start at 0 and it is allowed to have \"holes\"\
    \ in the index.\n\n```php\n// 10_28.php\n$a = [7 => 1, 2, \"3\", 100 => [4, 5,\
    \ 6]];\n```\n\nThis will cause the first values to be set at key 7 and all subsequent\
    \ values will have the indexes 8, 9, and the last one 100.\n\nIn addition to numeric\
    \ values, strings are also allowed as keys. This is a very common way of working\
    \ with key value pairs.\n\n```php\n// 10_29.php\n$a = [\n    'host' => 'localhost',\n\
    \    'user' => 'root'\n];\n```\n\nChecking of a specific key exists in an array\
    \ can be done with the `isset()` function or by use of `array_key_exists()`. It\
    \ takes two parameters where the first represents the key and the second the array.\n\
    \nDepending on the values of the array elements the two functions might yield\
    \ different results as seen in this next example:\n\n```php\n// 10_30.php\n$a\
    \ = [\n    0 => '123',\n    1 => null,\n    'a' => 'abc',\n    'b' => null\n];\n\
    \nvar_dump(isset($a[0]));\nvar_dump(isset($a[1]));\nvar_dump(isset($a['a']));\n\
    var_dump(isset($a['b']));\n\nvar_dump(array_key_exists(0, $a));\nvar_dump(array_key_exists(1,\
    \ $a));\nvar_dump(array_key_exists('a', $a));\nvar_dump(array_key_exists('b',\
    \ $a));\n```\n\nThis script will produce the following output:\n\n```\nbool(true)\n\
    bool(false)\nbool(true)\nbool(false)\nbool(true)\nbool(true)\nbool(true)\nbool(true)\n\
    ```\n\nThe same way arrays can be created with the `array()` construct it's also\
    \ possible to use the `list()` construct to decompose arrays. The `list()` construct\
    \ belongs on the left side of the assignment and it is used to take the elements\
    \ of an array and assign them to individual variables as shown in this next example.\n\
    \n```php\n// 10_31.php\n$a = [1, 2, 3];\n\nlist($v1) = $a;\necho \"$v1\\n\";\n\
    \nlist($v1, $v2) = $a;\necho \"$v1, $v2\\n\";\n\nlist($v1, $v2, $v3) = $a;\necho\
    \ \"$v1, $v2, $v3\\n\";\n\nlist($v1, $v2, $v3, $v4) = $a;\necho \"$v1, $v2, $v3,\
    \ $v4\\n\";\n\n$b = ['a' => 7, 'b' => 8];\nlist($x1, $x2) = $b;\necho \"$x1, $x2\\\
    n\";\n```\n\nThis example will not assign any values to `$x1` and `$x2` because\
    \ the `list()` construct only works on numerical indexes starting with 0. The\
    \ output from this script looks like this:\n\n```\n1\n1, 2\n1, 2, 3\n1, 2, 3,\n\
    ,\n```\n\nWith the use of `extract()` it is possible to work on associative arrays\
    \ and convert them to variables in the scope of where the construct is used.\n\
    \n```php\n// 10_32.php\n$a = [\n    'host' => 'localhost',\n    'database' =>\
    \ 'mydb',\n    'user' => 'user'\n];\n\nforeach($a as $key => $value) {\n    if\
    \ (isset($$key)) {\n```"
