  trans: "\n## 2.  此数据源包含由旧金山电影委员会编制的市内电影取景地信息。处理 JSON 的挑战之一在于定位所需信息，因为缺乏通用的命名规范。尽管此数据源已按行缩进格式化，但\
    \ JSON 通常为保持紧凑而省略空白。将其转换为多维关联数组可简化识别过程。请在 `ch08` 文件夹中创建一个名为 `json.php` 的 PHP 文件，并添加以下代码（该代码位于\
    \ `json_01.php` 中）：\n\n```\n$json = file_get_contents('./data/film_locations.json');\n\
    $data = json_decode($json, true);\necho '';\nprint_r($data);\necho '';\n```\n\n\
    此代码使用 `file_get_contents()` 从数据文件中获取原始 JSON，将其转换为多维关联数组，然后显示出来。向 `json_decode()`\
    \ 传入 `true` 作为第二个参数，会将 JSON 对象转换为 PHP 关联数组。\n\n## 3.  保存文件并在浏览器中运行该脚本。`$data`\
    \ 数组非常庞大，包含超过 1,600 部电影的详细信息。用 `<pre>` 标签包裹 `print_r()` 可以轻松检查其结构，从而定位重要数据所在位置。如图\
    \ 8-8 所示，顶层数组名为 `meta`，其内嵌套了一个名为 `view` 的子数组，而 `view` 中又包含了一个名为 `columns` 的子数组。\n\
    \n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig8_HTML.jpg](img/332054_4_En_8_Fig8_HTML.jpg)\n\
    \n图 8-8. 将 JSON 数据源转换为关联数组可简化数据定位过程\n\n`columns` 子数组包含一个索引数组；其第一个元素内部又是一个包含名为\
    \ `name` 键的数组。当您继续向下滚动，找到名为 `data` 的数组时（见图 8-9），其意义便会清晰明了。\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig9_HTML.jpg](img/332054_4_En_8_Fig9_HTML.jpg)\n\
    \n图 8-9. 电影数据为了紧凑而存储在索引数组中\n\n这里存储了所有关键信息。它包含一个拥有超过 1,600 个元素的索引子数组，其中每个元素又包含另一个具有\
    \ 19 个元素的索引数组。数据并非重复列名数千次，而是映射到图 8-8 中标识的名称数组。要提取所需信息，需要为 `data` 数组中的每部电影构建一个关联数组。\n\
    \n## 1.  我们可以使用 PHP 解决方案 8-6“使用 `array_multisort()` 对多维数组排序”中遇到的 `array_column()`\
    \ 函数来获取列名。然而，`name` 元素深藏在步骤 2 中存储为 `$data` 的顶层数组中。图 8-8 中的缩进有助于找到正确的子数组作为第一个参数传入。请向脚本中添加以下代码（该代码位于\
    \ `json_02.php` 中）：\n\n```\n$col_names = array_column($data['meta']['view']['columns'],\
    \ 'name');\n```\n\n## 2.  使用 `print_r()` 检查是否已提取正确的值，如图 8-10 所示。\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig10_HTML.jpg](img/332054_4_En_8_Fig10_HTML.jpg)\n\
    \n图 8-10. 列名标识了每个电影取景地存储的信息\n\n## 3.  现在已获得列名，我们可以遍历 data 子数组，使用 `array_combine()`\
    \ 将每个元素转换为关联数组。请向脚本中添加以下代码：\n\n```\n$locations = [];\nforeach ($data['data'] as\
    \ $datum) {\n    $locations[] = array_combine($col_names, $datum);\n}\n```\n\n\
    这段代码将 `$locations` 初始化为空数组，然后遍历 data 子数组，将 `$col_names` 和当前值数组传递给 `array_combine()`。这使得相应的列名被分配为每个值的键。data\
    \ 的缩进级别（见图 8-9）表明 data 子数组与 `meta` 处于同一层级（见图 8-8）。\n\n## 4.  `$locations` 现在包含一个关联数组的数组，每个关联数组都包含\
    \ JSON 数据源中列出的超过 1,600 个电影取景地的详细信息。要定位特定信息，我们可以使用 `array_filter()` 函数，该函数接受一个数组和一个回调函数作为参数，并返回过滤后的新数组。\n\
    \n回调函数接受一个参数，即当前被过滤器检查的元素。这意味着过滤条件需要在回调函数中硬编码。为了使回调函数更具适应性，我将使用一个能够从全局作用域继承变量的匿名函数。按如下方式定义搜索词和回调函数：\n\
    \n```\n$search = 'Alcatraz';\n$getLocation = function ($location) use ($search)\
    \ {\n    return (stripos($location['Locations'], $search) !== false);\n};\n```\n\
    \n匿名函数被赋值给一个变量。它接受一个参数，但通过 `use` 关键字访问 `$search` 变量。在函数内部，`stripos()` 函数对当前数组的\
    \ `Locations` 元素执行不区分大小写的搜索。由于 `stripos()` 返回搜索词被发现的位置，如果搜索词位于开头（位置 `0`），结果会是假阴性，因此我们需要确保返回值不是布尔值\
    \ `false`。\n\n## 5.  现在我们可以过滤 `$locations` 数组并显示结果，如下所示（完整代码位于 `json_03.php` 中）：\n\
    \n```\n$filtered = array_filter($locations, $getLocation);\necho '';\nforeach\
    \ ($filtered as $item) {\n    echo \"{$item['Title']} ({$item['Release Year']})\
    \ filmed at {$item['Locations']}\";\n}\necho '';\n```\n\n## 6.  保存脚本并在浏览器中测试。您应该会看到如图\
    \ 8-11 所示的结果。\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig11_HTML.jpg](img/332054_4_En_8_Fig11_HTML.jpg)\n\
    \n图 8-11. 信息已从 JSON 数据源中超过 1,600 条记录中筛选出来\n\n## 7.  将 `$search` 的值更改为旧金山的其他地点名称，例如\
    \ Presidio 或 Embarcadero，以查看在那里拍摄的电影名称。\n\n# 自动将数组元素赋值给变量\n\n毫无疑问，关联数组非常有用，但它们的缺点是在输入和嵌入双引号字符串时比较繁琐。因此，通常会将关联数组元素赋值给简单变量，如下所示：\n\
    \n```\n$name = $_POST['name'];\n$email = $_POST['email'];\n$message = $_POST['message'];\n\
    ```\n\n然而，有一些方法可以简化此过程，如下所述。\n\n## 使用 `extract()` 函数\n\n`extract()` 函数最基本的形式是根据关联数组的键名，自动将数组的值赋给变量。换句话说，您*可以*通过简单地执行以下操作，达到与上述三行代码相同的结果：\n\
    \n```\nextract($_POST);\n```\n\n### 注意\n使用 `extract()` 处理来自用户输入（例如 `$_POST` 或\
    \ `$_GET` 数组）的未过滤数据，被认为是一项重大的安全风险。恶意攻击者可能会尝试注入变量，覆盖您已经定义的值。\n"
- fmt: "Used in its simplest form, the `extract()` function is a blunt tool. Unless\
    \ you know exactly which keys are in the associative array, you run the risk of\
    \ overwriting existing variables. To overcome this problem, the function can take\
    \ two optional arguments: one of eight PHP constants that determine what to do\
    \ in case of naming conflicts and a string that can be used to prefix the variable\
    \ names. You can find details of these options in the online documentation at\
    \ [`www.php.net/manual/en/function.extract.php`](http://www.php.net/manual/en/function.extract.php).\n\
    \nAlthough the optional arguments refine the behavior of `extract()`, the need\
    \ to use them reduces the convenience the function offers. There’s also another\
    \ drawback to `extract()`: it can’t cope with keys that contain characters that\
    \ are invalid in variable names. For example, the following is a perfectly valid\
    \ associative array:\n\n```\n$author = ['first name' => 'David', 'last name' =>\
    \ 'Powers'];\n```\n\nEven though the keys contain spaces, `$author['first name']`\
    \ and `$author['last name']` are valid. However, passing the `$author` array to\
    \ `extract()` results in no variables being created. These limitations greatly\
    \ reduce the value of `extract()`.\n\n## Using `list()`\n\nAlthough the parentheses\
    \ make `list()` look like a function, technically speaking, it isn’t; it’s a PHP\
    \ language construct that assigns a list of variables to an array of values in\
    \ a single operation. It has been available since PHP 4, but it has been considerably\
    \ enhanced in PHP 7.1 and later.\n\nPrior to PHP 7.1, `list()` works only with\
    \ indexed arrays. You list the variable names that you want to assign the array\
    \ values to in the same order as they appear in the array. The following example\
    \ in `list_01.php` shows how it works:\n\n```\n$person = ['David', 'Powers', 'London'];\n\
    list($first_name, $last_name, $city) = $person;\n// Displays \"David Powers lives\
    \ in London.\"\necho \"$first_name $last_name lives in $city.\";\n```\n\nIn PHP\
    \ 7.1 and later, `list()` can also be used with associative arrays. The syntax\
    \ is similar to that for creating a literal associative array. The associative\
    \ array key is assigned to a variable using the double arrow operator. Because\
    \ each array key identifies its associated value, they don’t need to be listed\
    \ in the same order as in the array, nor do all keys have to be used, as the following\
    \ example in `list_02.php` shows:\n\n```\n$person = [\n'first name' => 'David',\n\
    'last name' => 'Powers',\n'city' => 'London',\n'country' => 'the UK'];\nlist('country'\
    \ => $country,\n'last name' => $surname,\n'first name' => $name) = $person;\n\
    // Displays \"David Powers lives in the UK.\"\necho \"$name $surname lives in\
    \ $country.\";\n```\n\n### Using Array Shorthand Syntax for `list()`\n\nAnother\
    \ enhancement in PHP 7.1 is the use of array shorthand syntax for `list()`. The\
    \ assignment of variables in the previous two examples can be simplified like\
    \ this (the full code is in `list_03.php` and `list_04.php`):\n\n```\n[$first_name,\
    \ $last_name, $city] = $person;\n['country' => $country, 'last name' => $surname,\
    \ 'first name' => $name] = $person;\n```\n\n## PHP Solution 8-10: Using a Generator\
    \ to Process a CSV File\n\nThis PHP solution adapts the script in PHP Solution\
    \ 7-2 “Extracting Data from a CSV File” to use a generator to process a CSV file\
    \ and assign the values from the array yielded by each line to variables with\
    \ `list()` array shorthand.\n\n1.  Open `csv_processor.php` in the `ch08` folder.\
    \ It contains the following definition of a generator called `csv_processor()`:\n\
    \n```\n    // generator that yields each line of a CSV file as an array\n    function\
    \ csv_processor($csv_file) {\n    if (@!$file = fopen($csv_file, 'r')) {\n   \
    \ echo \"Can't open $csv_file.\";\n    return;\n    }\n    while (($data = fgetcsv($file))\
    \ !== false) {\n    yield $data;\n    }\n    fclose($file);\n    }\n    ```\n\n\
    \    The generator takes a single argument, the name of a CSV file. It uses the\
    \ file manipulation functions described in Chapter 7 to open the file in read\
    \ mode. The error control operator (`@`) suppresses any PHP error messages if\
    \ the file can’t be opened, displays a custom message, and returns, preventing\
    \ any further attempt to process the file.\n\n    Assuming the file is opened\
    \ successfully, the `while` loop passes one line at a time to the `fgetcsv()`\
    \ function, which returns the data as an array that’s yielded by the generator.\
    \ When the loop comes to an end, the file is closed.\n\n    This is a handy utility\
    \ function that can be used to process any CSV file.\n\n2.  Create a file called\
    \ `csv_list.php` in the `ch08` folder and include `csv_processor.php`:\n\n```\n\
    \    require_once './csv_processor.php';\n    ```\n\n3.  In the `ch08/data` folder,\
    \ `scores.csv` contains the following data stored as comma-separated values:\n\
    \n```\n    Home team,Home score,Away team,Away score\n    Arsenal,2,Newcastle\
    \ United,0\n    Tottenham Hotspur,2,Crystal Palace,0\n    Watford,4,Fulham,1\n\
    \    Manchester City,2,Cardiff City,0\n    Southampton,1,Liverpool,3\n    Wolverhampton\
    \ Wanderers,2,Manchester United,1\n    ```\n\n4.  Load the data in the CSV file\
    \ by creating an instance of the `csv_processor()` generator like this:\n\n```\n\
    \    $scores = csv_processor('./data/scores.csv');\n    ```\n\n5.  The easiest\
    \ way to use a generator is with a `foreach` loop. Each time the loop runs, the\
    \ generator yields the current line of the CSV file as an indexed array. Use `list()`\
    \ array shorthand to assign the array values to variables, and then display them\
    \ with `echo` like this:\n\n```\n    foreach ($scores as $score) {\n    [$home,\
    \ $hscore, $away, $ascore] = $score;\n    echo \"$home $hscore:$ascore $away\"\
    ;\n    }\n    ```\n\n6.  Save the file and run the script by loading it into a\
    \ browser. Alternatively, use `csv_list_01.php` in the `ch08` folder. As Figure\
    \ 8-12 shows, the output includes the row of column titles from the CSV file.\n\
    \n    ![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig12_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Fig12_HTML.jpg)\n\
    \n    **Figure 8-12.** The generator processes every line of the CSV file, including\
    \ the column titles.\n\n7.  The problem with using a `foreach` loop is that it\
    \ processes every line in the CSV file. We could increment a counter each time\
    \ the loop runs, and use it to skip the first line with the `continue` keyword.\
    \ However, generators have built-in methods that allow us to move through the\
    \ values to be yielded and to retrieve the current value. Edit the code in step\
    \ 5 like this (the changes are highlighted in bold):\n\n```\n    $scores->next();\n\
    \    while ($scores->valid()) {\n    [$home, $hscore, $away, $ascore] = $scores->current();\n\
    \    echo \"$home $hscore:$ascore $away\";\n    $scores->next();\n    }\n    ```\n\
    \n    Instead of a `foreach` loop, the revised code uses a `while` loop that invokes\
    \ the generator’s `valid()` method. This returns `true` as long as there is at\
    \ least one more value for the generator to yield. So, this has the effect of\
    \ looping over every line in the CSV file that’s being processed.\n\n    To skip\
    \ the first line, the `next()` method is called before the loop begins. As the\
    \ name suggests, this moves the generator to the next available value. Inside\
    \ the loop, the `current()` method returns the current value, and the `next()`\
    \ method moves to the next value ready for the loop to run again.\n\n8.  Save\
    \ the file and run the script again (the code is in `csv_list_02.php`). This time\
    \ only the scores are displayed, as shown in Figure 8-13.\n\n    ![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig13_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Fig13_HTML.jpg)\n\
    \n    **Figure 8-13.** The first line has been skipped before iterating through\
    \ the remaining values."
