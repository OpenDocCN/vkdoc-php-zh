  \ `Model` 类中覆写了 `$_table` 和 `$_connector` 属性的 getter 方法。对于 `getTable()` 方法，我们希望返回用户定义的表名，否则默认使用当前模型类名的单数形式（使用\
  \ PHP 的 `get_class()` 方法，以及我们添加到 `StringMethods` 类中的一个新词形变化方法）。\n\n我们覆写 `getConnector()`\
  \ 方法，以便返回 `$_connector` 属性的内容、存储在 `Registry` 类中的连接器实例，或者抛出 `Model\\Exception\\Connector`\
  \ 异常。这是我们第一次从 `Registry` 类中检索内容，我们在这里这样做，是因为此时数据库连接很可能已经被初始化。\n\n我们还需要创建一个方法，该方法返回按顺序排列的列及其所有元数据数组，以便我们构建\
  \ SQL。请看清单 10-6，了解我们如何实现这一点。\n\n**清单 10-6.** `getColumns()` 方法\n\n```php\nnamespace\
  \ Framework\n{\n    use Framework\\Base as Base;\n    use Framework\\Registry as\
  \ Registry;\n    use Framework\\Inspector as Inspector;\n    use Framework\\StringMethods\
  \ as StringMethods;\n    use Framework\\Model\\Exception as Exception;\n\n    class\
  \ Model extends Base\n    {\n        public function getColumns()\n        {\n \
  \           if (empty($_columns))\n            {\n                $primaries = 0;\n\
  \                $columns = array();\n                $class = get_class($this);\n\
  \                $types = $this->types;\n                $inspector = new Inspector($this);\n\
  \                $properties = $inspector->getClassProperties();\n             \
  \   $first = function($array, $key)\n                {\n                    if (!empty($array[$key])\
  \ && sizeof($array[$key]) == 1)\n                    {\n                       \
  \ // [www.it-ebooks.info](http://www.it-ebooks.info/)\n                        //\
  \ 第 10 章 ■ 模型\n                        return $array[$key][0];\n               \
  \     }\n                    return null;\n                };\n\n              \
  \  foreach ($properties as $property)\n                {\n                    $propertyMeta\
  \ = $inspector->getPropertyMeta($property);\n                    if (!empty($propertyMeta[\"\
  @column\"]))\n                    {\n                        $name = preg_replace(\"\
  #^_#\", \"\", $property);\n                        $primary = !empty($propertyMeta[\"\
  @primary\"]);\n                        $type = $first($propertyMeta, \"@type\");\n\
  \                        $length = $first($propertyMeta, \"@length\");\n       \
  \                 $index = !empty($propertyMeta[\"@index\"]);\n                \
  \        $readwrite = !empty($propertyMeta[\"@readwrite\"]);\n                 \
  \       $read = !empty($propertyMeta[\"@read\"]) || $readwrite;\n              \
  \          $write = !empty($propertyMeta[\"@write\"]) || $readwrite;\n         \
  \               $validate = !empty($propertyMeta[\"@validate\"]) \n            \
  \                ? $propertyMeta[\"@validate\"] : false;\n                     \
  \   $label = $first($propertyMeta, \"@label\");\n\n                        if (!in_array($type,\
  \ $types))\n                        {\n                            throw new Exception\\\
  Type(\"{$type} 不是有效的类型\");\n                        }\n\n                      \
  \  if ($primary)\n                        {\n                            $primaries++;\n\
  \                        }\n\n                        $columns[$name] = array(\n\
  \                            \"raw\" => $property,\n                           \
  \ \"name\" => $name,\n                            \"primary\" => $primary,\n   \
  \                         \"type\" => $type,\n                            \"length\"\
  \ => $length,\n                            \"index\" => $index,\n              \
  \              \"read\" => $read,\n                            \"write\" => $write,\n\
  \                            \"validate\" => $validate,\n                      \
  \      \"label\" => $label\n                        );\n                    }\n\
  \                }\n\n                if ($primaries !== 1)\n                {\n\
  \                    throw new Exception\\Primary(\"{$class} 必须且只能有一个 @primary 列\"\
  );\n                }\n\n                // [www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \                // 第 10 章 ■ 模型\n                $this->_columns = $columns;\n \
  \           }\n            return $this->_columns;\n        }\n    }\n}\n```\n\n\
  `getColumns()` 方法可能看起来像是上一章构建的模板库中的东西，但实际上它相当简单。它创建了一个 `Inspector` 实例和一个工具函数（`$first`），用于返回元数据数组中的第一个元素。接着，它遍历模型中的所有属性，并筛选出所有带有\
  \ `@column` 标记的属性。此时，任何其他属性都会被忽略。\n\n\n\n检查`column`的`@type`标志是否有效，若无效则抛出`Model\\\
  Exception\\Type`异常。如果列类型有效，则将其添加到`$_columns`属性中。每个有效的`$primary`列都会使`$primaries`变量递增，该方法最后会检查该变量，确保只定义了一个主键列。本质上，该方法接收`User`模型定义，并返回一个关联数组形式的列数据。我们还可以创建两个便捷方法，从该关联数组中返回单独的列，如清单\
  \ 10-7 所示。\n\n***清单 10-7.*** 列获取器\n\n```php\nnamespace Framework\n{\n    use Framework\\\
  Base as Base;\n    use Framework\\Registry as Registry;\n    use Framework\\Inspector\
  \ as Inspector;\n    use Framework\\StringMethods as StringMethods;\n    use Framework\\\
  Model\\Exception as Exception;\n\n    class Model extends Base\n    {\n        public\
  \ function getColumn($name)\n        {\n            if (!empty($this->_columns[$name]))\n\
  \            {\n                return $this->_columns[$name];\n            }\n\
  \            return null;\n        }\n\n        public function getPrimaryColumn()\n\
  \        {\n            if (!isset($this->_primary))\n            {\n          \
  \      $primary;\n                foreach ($this->columns as $column)\n        \
  \        {\n                    if ($column[\"primary\"])\n                    {\n\
  \                        $primary = $column;\n                        break;\n \
  \                   }\n                }\n                $this->_primary = $primary;\n\
  \            }\n            return $this->_primary;\n        }\n    }\n}\n```\n\n\
  `getColumn()`方法按名称返回列。你可能注意到，列类属性假定以下划线（`_`）字符开头。`getColumn()`方法延续了这一假定，它检查不带`_`字符的列名。当声明为列属性时，列名类似`_firstName`，但在任何公开的获取器/设置器/方法中引用时，则类似`setFirstName`/`firstName`。\n\
  \n`getPrimaryColumn()`方法遍历所有列，返回标记为主键的列。\n\n现在我们有办法描述和迭代模型属性（进而描述数据库表），可以开始构建最终生成物理表的\
  \ SQL 语句。由于表使用 SQL 语法创建，且该语法通常与具体数据库相关，我们将在连接器类上创建一个方法，用于将结构同步到数据库。此方法会将列数组转换为所需的\
  \ SQL 语句，如清单 10-8 所示。\n\n***清单 10-8.*** `Database\\Connector\\Mysql`的`sync()`方法\n\
  \n```php\nnamespace Framework\\Database\\Connector\n{\n    use Framework\\Database\
  \ as Database;\n    use Framework\\Database\\Exception as Exception;\n\n    class\
  \ Mysql extends Database\\Connector\n    {\n        public function sync($model)\n\
  \        {\n            $lines = array();\n            $indices = array();\n   \
  \         $columns = $model->columns;\n            $template = \"CREATE TABLE '%s'\
  \ (\\n%s,\\n%s\\n) ENGINE=%s DEFAULT CHARSET=%s;\";\n            foreach ($columns\
  \ as $column)\n            {\n                $raw = $column[\"raw\"];\n       \
  \         $name = $column[\"name\"];\n                $type = $column[\"type\"];\n\
  \                $length = $column[\"length\"];\n\n                if ($column[\"\
  primary\"])\n                {\n                    $indices[] = \"PRIMARY KEY ('{$name}')\"\
  ;\n                }\n\n                if ($column[\"index\"])\n              \
  \  {\n                    $indices[] = \"KEY '{$name}' ('{$name}')\";\n        \
  \        }\n\n                switch ($type)\n                {\n              \
  \      case \"autonumber\":\n                    {\n                        $lines[]\
  \ = \"'{$name}' int(11) NOT NULL AUTO_INCREMENT\";\n                        break;\n\
  \                    }\n                    case \"text\":\n                   \
  \ {\n                        if ($length !== null && $length <= 255)\n         \
  \               {\n                            $lines[] = \"'{$name}' varchar({$length})\
  \ DEFAULT NULL\";\n                        }\n                        else\n   \
  \                     {\n                            $lines[] = \"'{$name}' text\"\
  ;\n                        }\n                        break;\n                 \
  \   }\n                    case \"integer\":\n                    {\n          \
  \              $lines[] = \"'{$name}' int(11) DEFAULT NULL\";\n                \
  \        break;\n                    }\n                    case \"decimal\":\n\
  \                    {\n                        $lines[] = \"'{$name}' float DEFAULT\
  \ NULL\";\n                        break;\n                    }\n             \
  \       case \"boolean\":\n                    {\n                        $lines[]\
  \ = \"'{$name}' tinyint(4) DEFAULT NULL\";\n                        break;\n   \
  \                 }\n                    case \"datetime\":\n                  \
  \  {\n                        $lines[] = \"'{$name}' datetime DEFAULT NULL\";\n\
  \                        break;\n                    }\n                }\n    \
  \        }\n\n            $table = $model->table;\n            $sql = sprintf(\n\
  \                $template,\n                $table,\n                join(\",\\\
  n\", $lines),\n                join(\",\\n\", $indices),\n                $this->_engine,\n\
  \                $this->_charset\n            );\n\n            $result = $this->execute(\"\
  DROP TABLE IF EXISTS {$table};\");\n            if ($result === false)\n       \
  \     {\n                $error = $this->lastError;\n                throw new Exception\\\
  Sql(\"There was an error in the query: {$error}\");\n            }\n\n         \
  \   $result = $this->execute($sql);\n            if ($result === false)\n      \
  \      {\n                $error = $this->lastError;\n            }\n        }\n\
  \    }\n}\n```\n\n\n```php\nthrow new Exception\\Sql(\"There was an error in the\
  \ query: {$error}\");\n```\n\n我们创建的 `sync()` 方法会将类/属性转换为有效的 SQL 查询语句，并最终生成物理数据库表。其实现过程是：首先通过调用模型的\
  \ `getColumns()` 方法获取列名列表，然后遍历这些列名，创建索引数组和字段字符串。\n\n**注意：** 此 `CREATE TABLE` SQL\
  \ 语句专为 MySQL 设计，可在 `Database\\Connector` 类中找到。如果您使用的数据库引擎在执行最终 SQL 查询时遇到问题，可能需要在您的\
  \ `Database\\Connector` 子类中重写 `sync()` 方法，为其提供正确的 SQL 查询语法。\n\n在创建完所有字段字符串后，它们会被拼接在一起（连同索引一起），并应用到\
  \ `CREATE TABLE` 的 `$template` 字符串中。系统会先创建并执行一条 `DROP TABLE` 语句来清理旧表，然后再执行最终的 SQL\
  \ 查询（用于创建新表）。任何 SQL 错误都会引发 `Database\\Exception\\Sql` 异常。我们可以在代码清单 10-9 中看到 `sync()`\
  \ 方法的使用示例。\n\n**代码清单 10-9.** `sync()` 方法的使用示例\n\n```php\n$database = new Database(array(\n\
  \    \"type\" => \"mysql\",\n    \"options\" => array(\n        \"host\" => \"localhost\"\
  ,\n        \"username\" => \"prophpmvc\",\n        \"password\" => \"prophpmvc\"\
  ,\n        \"schema\" => \"prophpmvc\"\n    )\n));\n\n$database = $database->initialize()->connect();\n\
  \n$user = new User(array(\n    \"connector\" => $database\n));\n\n$database->sync($user);\n\
  ```\n\n在代码清单 10-9 中，我们首先创建了一个活动的数据库连接，并将其（作为连接器）分配给新的 `User` 模型实例。最后，我们在 `User`\
  \ 模型实例上调用 `sync()` 方法，数据库表便创建完成了。由于我们在 `Registry` 类中检查了数据库键的存在性，我们也可以使用代码清单 10-10\
  \ 所示的代码实现相同的结果。\n\n**代码清单 10-10.** 替代连接器用法\n\n```php\n$database = new Database(array(\n\
  \    \"type\" => \"mysql\",\n    \"options\" => array(\n        \"host\" => \"localhost\"\
  ,\n        \"username\" => \"prophpmvc\",\n        \"password\" => \"prophpmvc\"\
  ,\n        \"schema\" => \"prophpmvc\"\n    )\n));\n\nRegistry::set(\"database\"\
  , $database->initialize()->connect());\n\n$database->sync(new User());\n```\n\n\
  ### 修改记录\n\n现在我们有了可用的数据库表，接下来需要扩展模型以直接处理数据库操作，并为我们提供简单的接口。我们要实现的首要功能是：当提供了主键列的值时，模型能够加载对应的记录。为此，我们需要修改构造函数并添加\
  \ `load()` 方法，如代码清单 10-11 所示。\n\n**代码清单 10-11.** 模型的 `__construct()` 和 `load()`\
  \ 方法\n\n```php\nnamespace Framework\n{\n    use Framework\\Base as Base;\n    use\
  \ Framework\\Registry as Registry;\n    use Framework\\Inspector as Inspector;\n\
  \    use Framework\\StringMethods as StringMethods;\n    use Framework\\Model\\\
  Exception as Exception;\n\n    class Model extends Base\n    {\n        public function\
  \ __construct($options = array())\n        {\n            parent::__construct($options);\n\
  \            $this->load();\n        }\n\n        public function load()\n     \
  \   {\n            $primary = $this->primaryColumn;\n            $raw = $primary[\"\
  raw\"];\n            $name = $primary[\"name\"];\n\n            if (!empty($this->$raw))\n\
  \            {\n                $previous = $this->connector\n                 \
  \   ->query()\n                    ->from($this->table)\n                    ->where(\"\
  {$name} = ?\", $this->$raw)\n                    ->first();\n\n                if\
  \ ($previous == null)\n                {\n                    throw new Exception\\\
  Primary(\"Primary key value invalid\");\n                }\n\n                foreach\
  \ ($previous as $key => $value)\n                {\n                    $prop =\
  \ \"_{$key}\";\n\n                    if (!empty($previous->$key) && !isset($this->$prop))\n\
  \                    {\n                        $this->$key = $previous->$key;\n\
  \                    }\n                }\n            }\n        }\n    }\n}\n\
  ```\n\n回顾 `Base` 类，我们会想起传递给构造函数的关联数组会被应用于现有的 getter/setter 方法。这意味着我们可以通过向构造函数提供与主键列名匹配的正确键值对，以及对应现有记录的值，来加载已有的记录。\n\
  \n`load()` 方法极大地简化了记录检索过程。它确定模型的主键列并检查该值是否不为空，从而判断是否提供了主键，这为我们查找目标记录提供了可行的方法。如果主键类属性为空，我们则假定该模型实例用于创建新记录，不做进一步处理。\n\
  \n要加载数据库记录，我们首先获取当前模型的连接器，如果未找到连接器则停止执行。\n\n我们根据主键列属性的值创建数据库查询来检索记录。如果未找到记录，则抛出\
  \ `Model\\Exception\\Primary` 异常。这种情况发生在提供了主键列值，但该值不对应数据库表中任何有效记录标识符时。\n\n最后，我们遍历已加载记录的数据，仅设置在\
  \ `__construct()` 方法中未设置的属性值。这确保了模型初始化后不会丢失任何数据。模型另一个有用的方法是允许创建或更新记录，如代码清单 10-12\
  \ 所示。\n\n**代码清单 10-12.** `save()` 方法\n\n```php\nnamespace Framework\n{\n    use\
  \ Framework\\Base as Base;\n    use Framework\\Registry as Registry;\n    use Framework\\\
  Inspector as Inspector;\n    use Framework\\StringMethods as StringMethods;\n  \
  \  use Framework\\Model\\Exception as Exception;\n\n    class Model extends Base\n\
  \    {\n        public function save()\n        {\n            $primary = $this->primaryColumn;\n\
  \            $raw = $primary[\"raw\"];\n            $name = $primary[\"name\"];\n\
  \n            $query = $this->connector\n                ->query()\n           \
  \     ->from($this->table);\n\n            if (!empty($this->$raw))\n          \
  \  {\n                $query->where(\"{$name} = ?\", $this->$raw);\n           \
  \ }\n\n            $data = array();\n\n            foreach ($this->columns as $key\
  \ => $column)\n            {\n                if (!$column[\"read\"])\n        \
  \        {\n                    $prop = $column[\"raw\"];\n                    $data[$key]\
  \ = $this->$prop;\n                    continue;\n                }\n\n        \
  \        if ($column != $this->primaryColumn && $column)\n                {\n  \
  \                  $method = \"get\".ucfirst($key);\n                    $data[$key]\
  \ = $this->$method();\n                    continue;\n                }\n      \
  \      }\n\n            $result = $query->save($data);\n\n            if ($result\
  \ > 0)\n            {\n                $this->$raw = $result;\n            }\n\n\
  \            return $result;\n        }\n    }\n}\n```\n\n`save()` 方法创建一个查询实例，并定位与\
  \ `Model` 类相关的表。如果主键属性值不为空，则应用 `WHERE` 子句，并根据 `getColumns()` 方法返回的列构建数据数组。最后，调用查询实例的\
  \ `save()` 方法将数据提交到数据库。由于 `Database\\Connector` 类会根据 `WHERE` 子句条件执行 `INSERT` 或 `UPDATE`\
  \ 语句，此方法将根据主键属性是否有值来插入新记录或更新现有记录。我们最后需要的修改方法是 `delete()` 和 `deleteAll()` 方法，用于从数据库中删除记录。您可以在代码清单\
  \ 10-13 中看到这些方法。\n\n**代码清单 10-13.** `delete()` 和 `deleteAll()` 方法\n\n```php\nnamespace\
  \ Framework\n{\n    use Framework\\Base as Base;\n    use Framework\\Registry as\
  \ Registry;\n    use Framework\\Inspector as Inspector;\n    use Framework\\StringMethods\
  \ as StringMethods;\n    use Framework\\Model\\Exception as Exception;\n\n    class\
  \ Model extends Base\n    {\n        public function delete()\n        {\n     \
  \       $primary = $this->primaryColumn;\n            $raw = $primary[\"raw\"];\n\
  \            $name = $primary[\"name\"];\n\n            if (!empty($this->$raw))\n\
  \            {\n                return $this->connector\n                    ->query()\n\
  \                    ->from($this->table)\n                    ->where(\"{$name}\
  \ = ?\", $this->$raw)\n                    ->delete();\n            }\n        }\n\
  \n        public static function deleteAll($where = array())\n        {\n      \
  \      $instance = new static();\n            $query = $instance->connector\n  \
  \              ->query()\n                ->from($instance->table);\n\n        \
  \    foreach ($where as $clause => $value)\n            {\n                $query->where($clause,\
  \ $value);\n            }\n\n            return $query->delete();\n        }\n \
  \   }\n}\n```\n\n\n`delete()`方法是我们模型中修改器方法中最简单的一个。它创建一个查询对象，仅当主键属性值不为空时执行，并调用查询的`delete()`方法。`deleteAll()`方法执行几乎相同的操作，区别在于它是静态调用的。到目前为止，我们只处理了单条记录的交互，但最好是能支持多条记录的操作，类似于我们数据库的`all()`、`first()`和`count()`方法。我们将创建的第一个方法是`all()`方法，如代码清单\
  \ 10-14 所示。\n\n**代码清单 10-14.** `all()`方法\n\n```php\nnamespace Framework\n{\n   \
  \ use Framework\\Base as Base;\n    use Framework\\Registry as Registry;\n    use\
  \ Framework\\Inspector as Inspector;\n    use Framework\\StringMethods as StringMethods;\n\
  \    use Framework\\Model\\Exception as Exception;\n\n    class Model extends Base\n\
  \    {\n        public static function all($where = array(), $fields = array(\"\
  *\"), \n            $order = null, $direction = null, $limit = null, $page = null)\n\
  \        {\n            $model = new static();\n            return $model->_all($where,\
  \ $fields, $order, $direction, $limit, $page);\n        }\n\n        protected function\
  \ _all($where = array(), $fields = array(\"*\"), \n            $order = null, $direction\
  \ = null, $limit = null, $page = null)\n        {\n            $query = $this\n\
  \                ->connector\n                ->query()\n                ->from($this->table,\
  \ $fields);\n\n            foreach ($where as $clause => $value)\n            {\n\
  \                $query->where($clause, $value);\n            }\n\n            if\
  \ ($order != null)\n            {\n                $query->order($order, $direction);\n\
  \            }\n\n            if ($limit != null)\n            {\n             \
  \   $query->limit($limit, $page);\n            }\n\n            $rows = array();\n\
  \            $class = get_class($this);\n\n            foreach ($query->all() as\
  \ $row)\n            {\n                $rows[] = new $class($row);\n          \
  \  }\n\n            return $rows;\n        }\n    }\n}\n```\n\n`all()`方法是受保护的`_all()`方法的一个简单的静态包装器。`_all()`方法创建一个查询对象，并考虑各种过滤器和标志，以返回所有匹配的记录。\n\
  \n我们费心将实例方法包装在静态方法中的原因是，我们创建了一个上下文，其中模型实例等同于数据库记录。在此上下文中，多记录操作作为类方法更有意义。\n\n`first()`方法与`all()`方法类似，它也是受保护实例方法的简单静态包装器。`_first()`方法仅返回第一个匹配的记录，如代码清单\
  \ 10-15 所示。\n\n**代码清单 10-15.** `first()`方法\n\n```php\nnamespace Framework\n{\n \
  \   use Framework\\Base as Base;\n    use Framework\\Registry as Registry;\n   \
  \ use Framework\\Inspector as Inspector;\n    use Framework\\StringMethods as StringMethods;\n\
  \    use Framework\\Model\\Exception as Exception;\n\n    class Model extends Base\n\
  \    {\n        public static function first($where = array(), $fields = array(\"\
  *\"), \n            $order = null, $direction = null)\n        {\n            $model\
  \ = new static();\n            return $model->_first($where, $fields, $order, $direction);\n\
  \        }\n\n        protected function _first($where = array(), $fields = array(\"\
  *\"), \n            $order = null, $direction = null)\n        {\n            $query\
  \ = $this\n                ->connector\n                ->query()\n            \
  \    ->from($this->table, $fields);\n\n            foreach ($where as $clause =>\
  \ $value)\n            {\n                $query->where($clause, $value);\n    \
  \        }\n\n            if ($order != null)\n            {\n                $query->order($order,\
  \ $direction);\n            }\n\n            $first = $query->first();\n       \
  \     $class = get_class($this);\n\n            if ($first)\n            {\n   \
  \             return new $class($query->first());\n            }\n\n           \
  \ return null;\n        }\n    }\n}\n```\n\n`count()`方法与前面两个静态方法类似。`_count()`方法返回匹配记录的计数。代码清单\
  \ 10-16 展示了`count()`方法。\n\n**代码清单 10-16.** `count()`方法\n\n```php\nnamespace Framework\n\
  {\n    use Framework\\Base as Base;\n    use Framework\\Registry as Registry;\n\
  \    use Framework\\Inspector as Inspector;\n    use Framework\\StringMethods as\
