  trans: "\n`conventions.php`。您可以在 http://smarty.php.net/manual/en/plugins.php 了解更多关于\
    \ Smarty 插件的信息。\n\n将 Smarty 插件文件放置到位后，您可以在 Smarty 设计模板文件（`departments_list.tpl`）中通过如下一行代码引用它：\n\
    \n```\n{load_departments_list assign=\"departments_list\"}\n```\n\n在遵守正确命名约定的前提下，这一行代码足以让\
    \ Smarty 加载插件文件并执行加载部门列表的函数。之后，Smarty 设计模板文件可以像这样访问由插件函数填充的变量：\n\n```\n{$departments_list->mDepartments[i].name}\n\
    ```\n\n在实际编写组件化模板之前，您还需要了解一个小细节。\n\n**练习：创建 departments_list 组件化模板**\n\n1. 打开\
    \ `hatshop` 文件夹中的 `hatshop.css` 文件，并添加以下代码清单所示的样式。\n\n这些样式定义了部门名称在部门列表中不同状态下的外观：未选中、鼠标悬停（未选中）以及选中时。\n\
    \n```css\n.left_box p\n{\n    color: #ffffff;\n    font-family: arial, tahoma,\
    \ verdana;\n    font-size: 12px;\n    font-weight: bold;\n    margin: 0px 0px\
    \ 5px 0px;\n    padding: 2px 0px 2px 12px;\n}\n\n#departments_box\n{\n    position:\
    \ relative;\n    border: 1px solid #30b86e;\n}\n\n#departments_box p\n{\n    background:\
    \ #30b86e;\n}\n\na\n{\n    color: #a6a6a6;\n    font-family: verdana, arial, tahoma;\n\
    \    font-size: 10px;\n    font-weight: bold;\n    line-height: 20px;\n    text-decoration:\
    \ none;\n}\n\na:hover\n{\n    color: #000000;\n}\n\na.selected\n{\n    color:\
    \ #000000;\n    text-decoration: underline;\n}\n\nol\n{\n    list-style-type:\
    \ none;\n    margin: 0px 5px;\n    padding: 0px;\n}\n```\n\n2. 编辑 `presentation/page.php`\
    \ 文件，并向 `page` 类的构造函数中添加以下两行代码。这两行代码配置了 Smarty 使用的插件文件夹。第一个用于内部 Smarty 插件，第二个指定了您将创建的、用于存放为\
    \ HatShop 编写的插件的 `smarty_plugins` 文件夹。\n\n```php\n/* Class that extends Smarty,\
    \ used to process and display Smarty files */\nclass Page extends Smarty\n{\n\
    \    // Class constructor\n    public function __construct()\n    {\n        //\
    \ Call Smarty's constructor\n        parent::Smarty();\n\n        // Change the\
    \ default template directories\n        $this->template_dir = TEMPLATE_DIR;\n\
    \        $this->compile_dir = COMPILE_DIR;\n        $this->config_dir = CONFIG_DIR;\n\
    \n        $this->plugins_dir[0] = SMARTY_DIR . 'plugins';\n        $this->plugins_dir[1]\
    \ = PRESENTATION_DIR . 'smarty_plugins';\n    }\n}\n```\n\n3. 现在，为 `departments_list`\
    \ 组件化模板创建 Smarty 模板文件。在 `presentation/templates/departments_list.tpl` 中写入以下代码：\n\
    \n```smarty\n{* departments_list.tpl *}\n{load_departments_list assign=\"departments_list\"\
    }\n\n{* Start departments list *}\n<div class=\"left_box\" id=\"departments_box\"\
    >\n<p>Choose a Department</p>\n<ol>\n\n{* Loop through the list of departments\
    \ *}\n{section name=i loop=$departments_list->mDepartments}\n{assign var=selected_d\
    \ value=\"\"}\n\n{* Verify if the department is selected to decide what CSS style\
    \ to use *}\n{if ($departments_list->mSelectedDepartment ==\n$departments_list->mDepartments[i].department_id)}\n\
    {assign var=selected_d value=\"class=\\\"selected\\\"\"}\n{/if}\n\n<li>\n{* Generate\
    \ a link for a new department in the list *}\n<a {$selected_d}\nhref=\"{$departments_list->mDepartments[i].link|escape:\"\
    html\"}\">\n» {$departments_list->mDepartments[i].name}\n</a>\n</li>\n{/section}\n\
    \n</ol>\n</div>\n{* End departments list *}\n```\n\n4. 在 `presentation` 文件夹中创建一个名为\
    \ `smarty_plugins` 的文件夹。这将存放 Smarty 插件文件。\n\n5. 在 `smarty_plugins` 文件夹中，创建一个名为\
    \ `function.load_departments_list.php` 的文件，并添加以下代码：\n\n```php\n<?php\n// Plugin\
    \ functions inside plugin files must be named: smarty_type_name\nfunction smarty_function_load_departments_list($params,\
    \ $smarty)\n{\n    // Create DepartmentsList object\n    $departments_list = new\
    \ DepartmentsList();\n    $departments_list->init();\n\n    // Assign template\
    \ variable\n    $smarty->assign($params['assign'], $departments_list);\n}\n\n\
    // Manages the departments list\nclass DepartmentsList\n{\n    /* Public variables\
    \ available in departments_list.tpl Smarty template */\n    public $mDepartments;\n\
    \    public $mSelectedDepartment;\n\n    // Constructor reads query string parameter\n\
    \    public function __construct()\n    {\n        /* If DepartmentID exists in\
    \ the query string, we're visiting a department */\n        if (isset ($_GET['DepartmentID']))\n\
    \            $this->mSelectedDepartment = (int)$_GET['DepartmentID'];\n      \
    \  else\n            $this->mSelectedDepartment = -1;\n    }\n\n    /* Calls business\
    \ tier method to read departments list and create their links */\n    public function\
    \ init()\n    {\n        // Get the list of departments from the business tier\n\
    \        $this->mDepartments = Catalog::GetDepartments();\n\n        // Create\
    \ the department links\n        for ($i = 0; $i < count($this->mDepartments);\
    \ $i++)\n            $this->mDepartments[$i]['link'] =\n                'index.php?DepartmentID='\
    \ .\n                $this->mDepartments[$i]['department_id'];\n    }\n}\n?>\n\
    ```\n\n6. 修改 `include/app_top.php` 文件，包含对 `Catalog` 业务层类的引用：\n\n```php\n<?php\n\
    // Include utility files\nrequire_once 'include/config.php';\nrequire_once BUSINESS_DIR\
    \ . 'error_handler.php';\n\n// Sets the error handler\nErrorHandler::SetHandler();\n\
    \n// Load the page template\nrequire_once PRESENTATION_DIR . 'page.php';\n\n//\
    \ Load the database handler\nrequire_once BUSINESS_DIR . 'database_handler.php';\n\
    \n// Load Business Tier\nrequire_once BUSINESS_DIR . 'catalog.php';\n?>\n```\n\
    \n7. 在 `presentation/templates/index.tpl` 中进行以下修改，以加载新创建的 `departments_list` 组件化模板。查找以下代码：\n\
    \n```html\n<div class=\"left_box\">\nPlace list of departments here\n</div>\n\
    ```\n\n并将其替换为：\n\n```smarty\n{include file=\"departments_list.tpl\"}\n```\n\n\
    8. 通过访问 `http://localhost/hatshop/index.php`（参见图 3-14），在您喜欢的浏览器中检查工作结果。点击部门或将鼠标悬停在链接上，看看会发生什么。\n\
    \n> **注意** 如果没有获得预期的输出，请确保机器配置正确，并且所有必需的 PHP 模块（如 PDO）均已成功加载。许多错误会记录在 Apache 错误日志文件中（默认路径为\
    \ `Apache2/logs/error.log`）。\n\n**工作原理：departments_list Smarty 模板**\n\n如果页面从一开始就按预期工作，那么您无疑是一位幸运的程序员！大多数情况下，错误是由于拼写错误引起的，因此请注意检查！数据库访问问题也很常见，请确保像第\
    \ 2 章所示那样正确配置了 `hatshop` 数据库和 `hatshopadmin` 用户。无论如何，我们很幸运拥有良好的错误报告机制，如果出现问题，它会显示详细的错误报告。\n\
    \n图 3-15 显示了我错误地输入 `config.php` 中的数据库密码时收到的错误消息。\n\n**图 3-15.** *第 2 章中编写的错误处理代码有助于调试。*\n"
- fmt: "If everything goes right, however, you’ll get the neat page containing a list\
    \ of departments generated using a Smarty template. Each department name in the\
    \ list is a link to the department’s page, which in fact is a link to the `index.php`\
    \ page with a `DepartmentID` parameter in the query string that specifies which\
    \ department was selected. Here’s an example of such a link:\n\n`http://localhost/hatshop/index.php?DepartmentID=3`\n\
    \nWhen clicking a department’s link, the selected department will be displayed\
    \ using a different CSS style in the list (see Figure 3-16).\n\n**Figure 3-16.**\
    \ *Selecting a department*\n\nIt is important to understand how the Smarty template\
    \ file (`presentation/templates/departments_list.tpl`) and its associated plugin\
    \ file (`function.load_departments_list.php`) work together to generate the list\
    \ of departments, and use the correct style for the currently selected one.\n\n\
    The processing starts at `function.load_departments_list.php`, which is included\
    \ in the `index.tpl` file.\n\nThe first line in `departments_list.tpl` loads the\
    \ plugin:\n\n```\n{load_departments_list assign=\"departments_list\"}\n```\n\n\
    The `load_departments_list` plugin function creates and initializes a `DepartmentsList`\
    \ object (this class is included in `function.load_departments_list.php`), which\
    \ is then assigned to a variable accessible from the Smarty design template file:\n\
    \n```\nfunction smarty_function_load_departments_list($params, $smarty)\n{\n \
    \ // Create DepartmentsList object\n  $departments_list = new DepartmentsList();\n\
    \  $departments_list->init();\n\n  // Assign template variable\n  $smarty->assign($params['assign'],\
    \ $departments_list);\n}\n```\n\nThe `init()` method in `DepartmentsList` populates\
    \ a public member of the class (`$mDepartments`) with an array containing the\
    \ list of departments and another public member containing the index of the currently\
    \ selected department (`$mSelectedDepartment`).\n\nBack to the Smarty code now.\
    \ Inside the HTML code that forms the layout of the Smarty template (`presentation/templates/departments_list.tpl`),\
    \ you can see the Smarty tags that do the magic:\n\n```\n{section name=i loop=$departments_list->mDepartments}\n\
    {assign var=selected_d value=\"\"}\n{* Verify if the department is selected to\
    \ decide what CSS style to use *}\n{if ($departments_list->mSelectedDepartment\
    \ ==\n$departments_list->mDepartments[i].department_id)}\n{assign var=selected_d\
    \ value=\"class=\\\"selected\\\"\"}\n{/if}\n{* Generate a link for a new department\
    \ in the list *}\n<li>\n<a {$selected_d}\nhref=\"{$departments_list->mDepartments[i].link|escape:\"\
    html\"}\">\n» {$departments_list->mDepartments[i].name}\n</a>\n</li>\n{/section}\n\
    ```\n\nSmarty template sections are used for looping over arrays of data. In this\
    \ case, you want to loop over the departments array kept in `$departmentsList->mDepartments`:\n\
    \n```\n{section name=i loop=$departments_list->mDepartments}\n...\n{/section}\n\
    ```\n\nInside the loop, you verify whether the current department in the loop\
    \ (`$departments_list->mDepartments[i].department_id`) has the ID that was mentioned\
    \ in the query string (`$departments_list->mSelectedDepartment`). Depending on\
    \ this, you decide what style to apply to the name by saving the style name (selected\
    \ or default style) to a variable named `selected_d`.\n\nThis variable is then\
    \ used to generate the link:\n\n```\n<a {$selected_d}\nhref=\"{$departments_list->mDepartments[i].link|escape:\"\
    html\"}\">\n» {$departments_list->mDepartments[i].name}\n</a>\n```\n\n**Planning\
    \ Ahead for Secure Connections**\n\nAt some point in the development process,\
    \ you’ll want certain pages of your site to be accessible only through secure\
    \ HTTPS connections to ensure the confidentiality of the data passed from the\
    \ client to the server and back. Such sensitive pages include user login forms,\
    \ pages where the user enters credit card data, and so on.\n\nWe don’t get into\
    \ much detail here because you’ll learn much more later in the book. However,\
    \ what you do need to know is that pages accessed through HTTPS occupy much of\
    \ a server’s resources, and we only want to use a secure connection when visiting\
    \ secure pages.\n\nImplementing this is a bit trickier than it appears. Most of\
    \ the time, it’s more comfortable to use relative links inside the web site. For\
    \ example, it’s typical for the header image of a site to contain a link to `index.php`\
    \ rather than `http://www.example.com/index.php`. In this case, clicking on the\
    \ header image from a secure page would redirect the user to `https://www.example.com/index.php`,\
    \ so the visitor would end up accessing through a secure connection a page that\
    \ isn’t supposed to be accessed like that (and in effect consumes much more server\
    \ resources than necessary).\n\nTo avoid this problem and other similar ones,\
    \ we’ll write a bit of code that makes sure all the links in the web site are\
    \ absolute links.\n\n**Exercise: Preparing Links**\n\n**1.** Create a new file\
    \ named `presentation/smarty_plugins/modifier.prepare_link.php`, and add the following\
    \ code to it:\n\n```\n<?php\n// Plugin functions inside plugin files must be named:\
    \ smarty_type_name\nfunction smarty_modifier_prepare_link($string, $link_type\
    \ = 'http')\n{\n  // Use SSL?\n  if ($link_type == 'https' && USE_SSL == 'no')\n\
    \    $link_type = 'http';\n\n  switch ($link_type)\n  {\n    case 'http':\n  \
    \    $link = 'http://' . getenv('SERVER_NAME');\n      // If HTTP_SERVER_PORT\
    \ is defined and different than default\n      if (defined('HTTP_SERVER_PORT')\
    \ && HTTP_SERVER_PORT != '80')\n      {\n        // Append server port\n     \
    \   $link .= ':' . HTTP_SERVER_PORT;\n      }\n      $link .= VIRTUAL_LOCATION\
    \ . $string;\n      // Escape html\n      return htmlspecialchars($link, ENT_QUOTES);\n\
    \n    case 'https':\n      $link = 'https://' . getenv('SERVER_NAME') .\n    \
    \          VIRTUAL_LOCATION . $string;\n      // Escape html\n      return htmlspecialchars($link,\
    \ ENT_QUOTES);\n\n    default:\n      return htmlspecialchars($string, ENT_QUOTES);\n\
    \  }\n}\n?>\n```\n\n**2.** Add two new constants to `include/config.php`:\n\n\
    ```\n// Server HTTP port (can omit if the default 80 is used)\ndefine('HTTP_SERVER_PORT',\
    \ '80');\n\n/* Name of the virtual directory the site runs in, for example:\n\
    '/hatshop/' if the site runs at http://www.example.com/hatshop/\n'/' if the site\
    \ runs at http://www.example.com/ */\ndefine('VIRTUAL_LOCATION', '/hatshop/');\n\
    \n// We enable and enforce SSL when this is set to anything else than 'no'\ndefine('USE_SSL',\
    \ 'yes');\n```\n\n**3.** Modify `presentation/templates/header.tpl` like this:\n\
    \n```\n<div id=\"header\">\n  <a href=\"{\"index.php\"|prepare_link:\"http\"}\"\
    >\n    <img src=\"images/title.png\" alt=\"Site title\" />\n  </a>\n</div>\n```\n\
    \n**4.** Modify `presentation/templates/departments_list.tpl` like this:\n\n```\n\
    <li>\n<a {$selected_d}\n**href=\"{$departments_list->mDepartments[i].link|prepare_link:\"\
    http\"}\">**\n» {$departments_list->mDepartments[i].name}\n</a>\n</li>\n```\n\n\
    **How It Works: Preparing Links**\n\nFirst of all, make sure the new entry you\
    \ added to `config.php` is configured correctly. If you’re running your web site\
    \ on a different port than the default of 80 (say, if you’re using port 8080),\
    \ make sure you specify the correct port in the `HTTP_SERVER_PORT` constant.\n\
    \nWe also defined a constant named `USE_SSL`, which specifies whether the site\
    \ is supposed to generate HTTPS URLs. If the constant is set to `no`, your site\
    \ won’t generate any HTTPS links even for the places that should normally be secured.\
    \ Let’s see how this works."
