    **Naming Other Cake Resources**


    As another matter of convention over configuration, Cake divides up other important
    resources in much the same way that it does with models, views, and controllers.
    For instance, if more than one controller needed to use the same actions, then
    you could create a *component*. The controllers could essentially run an include
    of the component and run the actions as if they were individually contained in
    the controller. Other resources act in the same way.


    A view to be used by multiple views is stored in what’s called an *element*, and
    so on. Each of these resources has its own naming conventions.


    Later, you’ll make full use of each of these resources. While I’m discussing naming
    conventions in Cake, it’s worth familiarizing yourself with the conventions for
    other Cake resources.


    Components


    Component files contain actions or functions that can be used across all the controllers.
    A component typically aims to provide tools to accomplish a main objective. For
    example, you may want to organize a set of functions that manage all the e-mail
    your application must send. Various controllers may need to run an e-mail function
    here and there, so rather than write the e-mail process into the individual controllers,
    it’s best to house all the e-mailing in a component file. By doing so, you effectively
    keep all your e-mailing functions in one place in the same manner that by using
    models you separate out all your database functions.


    Components can be fully customized to meet your needs. In fact, a growing repository
    of third-party components are available on the Web from other Cake developers,
    which proves helpful in borrowing tasks from other projects and reducing the amount
    of code you assemble yourself.


    The file name of a component can be anything, but like models, views, and controllers,
    more than one word in the name must be separated by underscores and camel case
    when naming the class object.


    Cake comes with a built-in e-mail component, but for the sake of the previous
    example, if you were to create an e-mail component of your own, you could name
    the file email.php and place it in the app/controllers/components directory.


    In the file, you would need to create a new component class using the following
    syntax: class EmailComponent extends Object {


    Notice that the name of the class object is camel cased just as in the controller,
    and it extends the class Object. Later, you’ll assemble some customized components
    to be used in more complex applications.


