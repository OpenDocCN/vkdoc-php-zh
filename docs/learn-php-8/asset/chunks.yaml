  trans: "\n### 3. 为什么业务规则层必须通过接口层间接与用户交互以提供信息？\n\n### 数据层\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig8_HTML.jpg](img/394210_2_En_2_Fig8_HTML.jpg)\n\
    \n**图 2-8**  \n数据层\n\n数据层的主要功能是将信息存储到辅助设备上，或向业务规则层返回数据。数据可以（并且通常）通过数据库管理系统（如 MySQL\
    \ 或 MariaDB）存储在数据库中。该层与业务规则层进行交互，因为在数据显示之前可能需要对数据进行处理，例如生成报告。数据从该层返回时，会采用业务规则层（及编程语言）能够接受的格式。常见格式包括\
    \ `JSON`、`XML`、`SOAP` 和数据集。\n\n- `JSON`——*JavaScript 对象表示法*是一种与 `XML` 类似的格式，用于存储和交换数据。`JSON`\
    \ 可以在编辑器或浏览器中查看。它最常用于在层之间传递数据。\n- `XML`——*可扩展标记语言*是一种与 `HTML` 类似的标记语言，用于存储和描述数据。`XML`\
    \ 也可用于在层之间传输数据。\n- `SOAP`——*简单对象访问协议*用于与 Web 服务交换数据。它与 `HTTP`（超文本传输协议）和 `SMTP`（简单邮件传输协议）协同工作，为应用程序和\
    \ Web 服务之间提供通信。\n- *Web 服务*——一种没有界面的应用程序，可被调用来处理信息。Web 服务可以在 Web 服务器上远程提供业务层和/或数据层的功能。*Web\
    \ 服务描述语言*（`WSDL`）用于描述对 Web 服务的调用，以及 Web 服务所接受和返回信息的格式。`WSDL` 与 `XML` 类似。\n\n数据层的验证在数据库管理系统和/或通过程序代码完成。该层的验证是在更新数据库之前确保数据可靠且准确的最后机会。在存储前捕获验证问题，远比无效信息被记录后再处理要容易得多。\n\
    \n数据存储可以是本地的，也可以是远程的。移动设备可以将数据限制存储在本地数据库（如智能手机）中，但也可以使用 `WSDL`（Web 服务）在远程服务器或云端（如\
    \ Microsoft Azure）存储和检索信息。此外，许多应用程序会通过 Cookie 在本地保存少量信息，或将大量信息存储在远程数据库中。\n\n-\
    \ *Microsoft Azure*——Microsoft Azure 是一个云平台，提供数据服务、应用程序服务和网络服务。Visual Studio 应用程序可以上传到\
    \ Microsoft Azure 云端并进行安全保护。\n\n数据层使用 `SQL` 语句（`INSERT`、`DELETE`、`UPDATE` 和 `SELECT`）来检索和更新数据库中的信息。然而，更改信息的实际请求来自业务规则层。例如，用户在\
    \ Web 应用程序中请求更改地址时，必须先通过接口层输入更改内容，在业务规则层格式化更新请求，然后在数据层更改数据库中的信息。\n\n| 应该做 | 不应该做\
    \ |\n| --- | --- |\n| 将数据保存到辅助设备 | 操作数据 |\n| 更新辅助设备上的数据 | 显示错误消息 |\n| 引发异常 | 显示信息\
    \ |\n| 验证数据 |  |\n\n### 动手实践\n\n1. 为什么数据层在将信息存入数据库之前必须再次进行验证？\n2. 数据层中可以存在什么类型的代码（如果有的话）？\n\
    3. `SQL` 用于什么目的？\n"
- fmt: '# Putting It All Together


    The program development life cycle (`PDLC`) leads us through the overall design
    and creation process for application development. The key to application development
    success is to properly plan the layout of your system before beginning the coding
    and development. By doing so, you reduce the amount of errors and problems that
    can occur. Many projects can run into a “corner” that the developer cannot get
    around because of poor planning up front. Different authors and instructors will
    vary on their estimates on the time to spend in the planning process because it
    is based on the individual. A more skilled or more experienced individual may
    do less planning than someone who is not as confident. However, everyone plans
    out, at least, the required modules and the type of data flowing between the modules,
    even if it is done just on scratch paper. The key, also, is to revise your plan
    as you work through the coding and development process. As you start coding, you
    will discover “I did not think of that” scenarios. Go back, right then, and adjust
    your plan. The more you do so, the less likely that you will hit a “corner” that
    you cannot find a way to get around.


    Always involve the user in your `PDLC` process, along with as strong a team of
    experts. Remember you are developing this project to make your customer happy.
    You may believe you have the ultimate design and solution. However, that does
    not matter if your user does not agree with you. Sometimes you do have to adjust
    your thinking to be more in line with the customer. Working in the industry, I
    remember a major change-management system that was being created within my work
    group (I was so happy to not be involved in the project). The designers and coders
    created a very fancy and expensive system that, once it was implemented in the
    data centers, was hardly used. Why? The data center personnel did not want a fancy
    system; they wanted a simple system that could quickly complete the tasks needed.
    Even though the original project took six months to complete, a data center employee
    spent a few weekends of his own time creating another system that accomplished
    what they wanted. That system was implemented and used for many years afterward.


    Commonly the `PDLC` is defined with five steps: Planning and Information Gathering,
    Analysis, Design, Implementation, and Evaluation. In the planning and information
    gathering step, all requirements for the project and the project team are assembled.
    Initial documents are also created answering the questions, “What are we trying
    to accomplish?”, “How are we going to accomplish it?”, and “What team are we going
    to use?” In the analysis step, a determination is made as to the feasibility of
    the project. Documents answer the questions, “Can we accomplish the project with
    the team and resources available?”, “What additional resources need to be gathered?”,
    and “Can the project be accomplished in the timeframe and budget allocated?” If
    the project makes it past the analysis step (many projects do not), then the actual
    design begins. In the design phase, a top-down approach begins by first looking
    at the overall required modules, and the data flow between the modules. More details
    are gradually added as the methods required are determined, a platform is decided
    on, communication tools come together, and information storage is designed.


    After a detailed design has been created, and approved, the project goes into
    development and testing. Both unit testing (individual modules) and complete application
    testing will occur. After successful testing, the project is ready for the implementation
    step. During implementation, decisions have to be made on how to install the project
    and when to install it. After implementation, the application is “live”. But still
    continuous evaluation should occur to determine efficiency needs, security problems,
    logical problems, and possible overall enhancements to the project. Eventually,
    most projects will then revert back to the first step of the process for the development
    of a new version.


    This section assumes that the planning and information gathering and analysis
    steps have been completed successfully, which would move you into the design step.
    We will look, in general, at the process of determining what type of activities
    should occur in which tiers of an application. We will also look at the type of
    data or information that may flow between the tiers. In later chapters we will
    refine this analysis by determining the types of methods that would be required
    and the information and data that must flow into and out of these methods. We
    will also look at the actual activities and code that would be created for these
    methods.


    The best way to learn is by doing, so let us look at a case problem and go from
    there.'
