    为真，则抛出 `MyException` 类的异常。如果条件为假，则执行 `$x=$B/$A` 和 `echo "The root is \$x = $x\n"`
    语句。第一条语句计算方程的根。第二条语句显示计算结果。如果抛出异常，这些语句不会执行。如果抛出异常，则在内部 `catch` 块中处理。处理基于检查条件 `$B==0`。如果条件为假，则执行
    `echo "There are no roots\n"` 指令。如果条件为真，则 `throw $e` 命令重新抛出之前抛出的异常。这里，`$e` 表示传递给内部
    `catch` 块进行处理的异常对象。这次异常被外部 catch 块捕获并处理。特别地，外部 catch 块中执行 `echo "Any number is
    a root\n"` 命令。最后执行的命令是 `echo "The problem is solved\n"`。


    详情 |


    | --- | --- | --- |


    事实证明，如果方程的一个参数为零，则会抛出自定义类异常。如果在处理此异常时，发现第二个参数也为零，则会重新抛出异常。重新抛出异常意味着你正在使用之前抛出的异常对象。|


    ## 错误处理函数


    在程序执行过程中发生的错误通常不是致命的，不会导致程序终止。这种情况下的典型外部效果是错误或警告消息。不同的技术和方案允许你适当地响应此类情况。但即使错误是致命的，并且未在程序中被捕获（使用
    `try-catch` 构造），你仍然可以“对抗”它。


