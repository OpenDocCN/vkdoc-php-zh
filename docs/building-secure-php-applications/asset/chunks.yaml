    \ as plain text.\n\n*Back End (Controller)*\n\nOn the back end, the UserController\
    \ contains methods responsible for handling user data. Specifically, the showProfile\
    \ method retrieves user information from the database using Eloquent, Laravel’s\
    \ ORM (Object-Relational Mapping) tool. The method typically uses Eloquent’s find\
    \ method to fetch a user based on their ID. Eloquent handles parameter binding\
    \ automatically, treating the $userId parameter as a placeholder and ensuring\
    \ it is safely incorporated into the SQL query. This approach provides protection\
    \ against SQL injection attacks, as Eloquent ensures that the input is securely\
    \ processed and executed.\n\nThis example showcases how Eloquent, by default,\
    \ protects against SQL injection. It uses parameterized queries, ensuring that\
    \ user input is properly sanitized and preventing malicious SQL injection attempts.\n\
    \nLaravel’s use of Eloquent ORM provides a high level of protection against SQL\
    \ injection vulnerabilities by automatically handling parameter binding and sanitizing\
    \ user input. We can leverage this feature to write secure database queries without\
    \ the need for explicit sanitization."
  trans: "\n### 跨站脚本攻击（XSS）防护\n\nLaravel 的 Blade 模板引擎会自动转义输出，从而提供针对 XSS 攻击的保护。然而，开发者仍应保持警惕，并在需要时使用正确的转义方式。\n\
    \n```\n<?php\n// Blade 模板示例\n{{ $userInput }}\n?>\n```\n\n#### 详细说明\n\n![图 4-2](img/609480_1_En_4_Fig2_HTML.jpg)\n\
    \n**图 4-2** Laravel XSS 使用流程\n\n让我们通过一个示例来了解 Laravel 如何通过在 Blade 模板中自动转义输出来帮助防范跨站脚本攻击（XSS）。我们将涵盖前端和后端，并附上详细说明。\n\
    \n##### 前端（Blade 模板）\n\n假设你有一个 Blade 模板，用于以安全的方式显示用户数据：\n\n```\nblade\n用户资料\n\
    姓名：{{ $user->name }}\n邮箱：{{ $user->email }}\n地址：{{ $user->address }}\n```\n\n\
    在此示例中，请注意我们使用 Blade 语法（`{{ }}`）来输出用户数据。Laravel 会自动转义这些输出，确保任何潜在的有害内容都被视为纯文本，而不会作为\
    \ HTML 或 JavaScript 执行。\n\n##### 后端（控制器）\n\n现在，让我们看看 Laravel 控制器中对应的后端代码。\n\n\
    ```\n<?php\n// app/Http/Controllers/UserController.php\nnamespace App\\Http\\\
    Controllers;\n\nuse Illuminate\\Http\\Request;\nuse App\\Models\\User;\n\nclass\
    \ UserController extends Controller\n{\n    public function showProfile($userId)\n\
    \    {\n        // 从数据库检索用户数据\n        $user = User::find($userId);\n\n      \
    \  // 将用户数据传递给视图\n        return view('user_profile', ['user' => $user]);\n  \
    \  }\n}\n```\n\n##### 说明\n\n**前端**\n\n在 Laravel 应用程序的前端部分，使用 `user_profile.blade.php`\
    \ Blade 模板来显示用户信息。该模板通过类似 `{{ $user->name }}`、`{{ $user->email }}` 和 `{{ $user->address\
    \ }}` 这样的表达式来访问并输出用户数据。Laravel 的 Blade 模板引擎会自动转义这些输出，将所有 HTML 或 JavaScript 字符转换为纯文本格式。这种内置的转义机制对于防止跨站脚本攻击（XSS）至关重要。因此，即使用户数据包含潜在危险的\
    \ HTML 或 JavaScript 代码，它也会被安全地渲染为纯文本。\n\n**后端**\n\n在后端，`UserController` 在管理用户数据方面扮演着关键角色。它根据提供的用户\
    \ ID（`$userId`）从数据库检索用户信息。获取用户数据后，将其传递给 `user_profile` 视图。这一过程确保了 Blade 模板中可以获取并显示正确的用户数据。通过分离数据检索和展示逻辑，Laravel\
    \ 提倡一种清晰且有组织的代码结构，使应用程序更易于维护且更安全。\n\n通过使用 Blade 模板和 Laravel 的自动输出转义功能，我们可以降低 XSS\
    \ 攻击的风险。务必要始终使用 Blade 语法（`{{ }}`）输出用户生成的内容，并避免使用原始输出（`{!! !!}`），除非确实必要且经过了充分的验证。\n\
    \n请记住，虽然自动输出转义有助于防范许多 XSS 攻击，但我们还应该了解其他安全最佳实践，例如验证和清理用户输入，以及使用 Laravel 提供的其他安全机制。\n\
    \n### SQL 注入防护\n\nLaravel 的 Eloquent ORM 使用了参数化查询，从而防止 SQL 注入攻击。鼓励开发者使用 Eloquent\
    \ 或查询构建器进行数据库交互。\n\n```\n<?php\n$users = User::where('active', 1)->get();\n?>\n\
    ```\n\n#### 详细说明\n\n![图 4-3](img/609480_1_En_4_Fig3_HTML.jpg)\n\n**图 4-3** Laravel\
    \ 中的 SQL 注入防护\n\n让我们通过一个示例来了解 Laravel 如何使用内建的 ORM（对象关系映射）工具 Eloquent 来防范 SQL 注入。此示例将涵盖前端和后端，包括详细说明。\n\
    \n##### 前端（Blade 模板）\n\n假设你有一个 Blade 模板用于显示用户数据：\n\n```\nblade\n用户资料\n姓名：{{ $user->name\
    \ }}\n邮箱：{{ $user->email }}\n地址：{{ $user->address }}\n```\n\n##### 后端（控制器）\n\n\
    现在，让我们看看 Laravel 控制器中对应的后端代码。\n\n```\n<?php\n// app/Http/Controllers/UserController.php\n\
    namespace App\\Http\\Controllers;\n\nuse Illuminate\\Http\\Request;\nuse App\\\
    Models\\User;\n\nclass UserController extends Controller\n{\n    public function\
    \ showProfile($userId)\n    {\n        // 使用 Eloquent 通过 ID 检索用户数据\n        $user\
    \ = User::find($userId);\n\n        return view('user_profile', ['user' => $user]);\n\
    \    }\n}\n```\n\n##### 说明\n\n**前端（Blade 模板）**\n\n在 Laravel 应用程序的前端，使用 `user_profile.blade.php`\
    \ Blade 模板来显示用户信息。该模板利用 Blade 的双花括号（`{{ }}`）语法输出用户数据，例如 `{{ $user->name }}`、`{{\
    \ $user->email }}` 和 `{{ $user->address }}`。Blade 的模板引擎会自动转义这些输出，将特殊字符转换为 HTML\
    \ 实体。这种转义机制旨在通过确保用户数据中任何潜在的有害代码都被渲染为纯文本，来防止跨站脚本攻击（XSS）。\n\n**后端（控制器）**\n\n在后端，`UserController`\
    \ 包含负责处理用户数据的方法。具体来说，`showProfile` 方法使用 Laravel 的 ORM（对象关系映射）工具 Eloquent 从数据库检索用户信息。该方法通常使用\
    \ Eloquent 的 `find` 方法根据用户 ID 来获取用户。Eloquent 会自动处理参数绑定，将 `$userId` 参数视为占位符，并确保其被安全地合并到\
    \ SQL 查询中。这种方法提供了针对 SQL 注入攻击的保护，因为 Eloquent 确保输入被安全地处理和执行。\n\n此示例展示了 Eloquent\
    \ 默认情况下如何防范 SQL 注入。它使用参数化查询，确保用户输入被正确地清理，并防止恶意的 SQL 注入尝试。\n\nLaravel 通过对 Eloquent\
    \ ORM 的使用，通过自动处理参数绑定和清理用户输入，为防范 SQL 注入漏洞提供了高水平的保护。我们可以利用此功能来编写安全的数据库查询，而无需进行显式的数据清理。\n"
- fmt: "### Authentication and Authorization\n\nLaravel simplifies user authentication\
    \ and authorization, providing guards and policies for controlling access to resources.\
    \ It includes features like password hashing and protection against timing attacks.\n\
    \n```\n$email, 'password' => $password])) {\n// Authentication passed\n}\n// Authorization\n\
    if (Gate::allows('update-post', $post)) {\n// User is authorized to update the\
    \ post\n}\n```\n\n### Detailed Explanation\n\n![](images/609480_1_En_4_Chapter/609480_1_En_4_Fig4_HTML.jpg)\n\
    \n**Figure 4-4** Authentication and authorization flow in Laravel\n\nLet’s go\
    \ through an example of how Laravel handles authentication and authorization.\
    \ This will include setting up user authentication, creating controllers with\
    \ authorization checks, and utilizing Laravel’s built-in features for secure user\
    \ management.\n\n#### Step 1: Set Up Authentication\n\n`Laravel Breeze` is a package\
    \ that provides a simple and lightweight way to set up authentication in Laravel\
    \ applications. Let’s follow below steps to set it up:\n\n##### Step 1: Install\
    \ Laravel Breeze\n\nTo start, you need to install `Laravel Breeze` using `Composer`,\
    \ which is the dependency manager for PHP, by running the below command, we are\
    \ telling composer to download and install the `Breeze` package as a development\
    \ dependency in your Laravel project. This package contains all the necessary\
    \ files and configurations to quickly scaffold authentication functionality:\n\
    \n```bash\ncomposer require laravel/breeze --dev\n```\n\n##### Step 2: Install\
    \ Breeze's Authentication Scaffolding\n\nOnce `Breeze` is installed, we need to\
    \ set up the authentication scaffolding by running:\n\n```bash\nphp artisan breeze:install\n\
    ```\n\nThis command generates the necessary authentication views, routes, controllers,\
    \ and other files required for a basic authentication system. These files are\
    \ placed in the appropriate directories within your Laravel project, providing\
    \ a foundation for user login, registration, password reset, and email verification.\n\
    \n##### Step 3: Run Migrations\n\nLaravel uses migrations to manage the database\
    \ schema. To create the required database tables for authentication, run:\n\n\
    ```bash\nphp artisan migrate\n```\n\nThis command executes the migration files,\
    \ which create the tables for users, password resets, and any other required entities\
    \ in your database. Migrations ensure that your database schema is consistent\
    \ and version-controlled.\n\n##### Step 4: Install NPM Dependencies and Compile\
    \ Assets\n\n`Laravel Breeze` includes front-end assets that need to be compiled.\
    \ First, install the necessary Node.js dependencies by running:\n\n```bash\nnpm\
    \ install\n```\n\nThis command downloads and installs all the required packages\
    \ listed in the `package.json` file. After installing the dependencies, compile\
    \ the front-end assets with:\n\n```bash\nnpm run dev\n```\n\nThis command uses\
    \ tools like `Webpack` to compile and bundle your JavaScript and CSS files. It\
    \ prepares the front-end assets for development, enabling you to see the changes\
    \ immediately as you work on the application.\n\n#### Step 2: Create a Resource\
    \ Controller\n\nNext, create a resource controller for managing a resource (e.g.,\
    \ posts) with CRUD operations.\n\n```bash\nphp artisan make:controller PostController\
    \ --resource\n```\n\nThis command generates a controller (`PostController`) with\
    \ methods for `index`, `create`, `store`, `show`, `edit`, `update`, and `destroy`.\n\
    \n#### Step 3: Define Routes\n\nIn the `routes/web.php` file, define routes for\
    \ authentication and the resource controller.\n\n```php\n<?php\nuse App\\Http\\\
    Controllers\\PostController;\nuse Illuminate\\Support\\Facades\\Route;\n\n// Authentication\
    \ Routes\nrequire __DIR__.'/auth.php';\n\n// Resource Routes\nRoute::resource('posts',\
    \ PostController::class);\n```\n\n#### Step 4: Implement Authorization in the\
    \ Controller\n\nEdit the `PostController` to include authorization checks. For\
    \ example, only authenticated users should be able to create, update, and delete\
    \ posts.\n\n```php\npublic function create()\n{\n    $this->authorize('create',\
    \ Post::class);\n    return view('posts.create');\n}\n\npublic function store(Request\
    \ $request)\n{\n    $this->authorize('create', Post::class);\n    // Validation\
    \ and store logic\n    // ...\n    return redirect()->route('posts.index');\n\
    }\n// Other methods...\n```\n\n#### Step 5: Implement Authorization in Views\n\
    \nIn your Blade views, you can use the `@can` directive to conditionally show\
    \ or hide content based on the user’s authorization.\n\n```blade\n@if(Auth::check())\n\
    \    <a href=\"{{ route('posts.create') }}\">Create Post</a>\n@endif\n\n@foreach($posts\
    \ as $post)\n    <h2>{{ $post->title }}</h2>\n\n    @can('update', $post)\n  \
    \      <a href=\"{{ route('posts.edit', $post->id) }}\">Edit</a>\n    @endcan\n\
    \n    @can('delete', $post)\n        <form action=\"{{ route('posts.destroy',\
    \ $post->id) }}\" method=\"POST\">\n            @csrf\n            @method('DELETE')\n\
    \            <button type=\"submit\">Delete</button>\n        </form>\n    @endcan\n\
    @endforeach\n```\n\n#### Step 6: Define Policies\n\nIn Laravel, you can use policies\
    \ to encapsulate authorization logic. Create a policy for the `Post` model.\n\n\
    ```bash\nphp artisan make:policy PostPolicy\n```\n\nDefine the authorization logic\
    \ in the `PostPolicy` class.\n\n```php\n<?php\n\nnamespace App\\Policies;\n\n\
    use App\\Models\\User;\nuse App\\Models\\Post;\n\nclass PostPolicy\n{\n    public\
    \ function update(User $user, Post $post)\n    {\n        return $user->id ===\
    \ $post->user_id;\n    }\n\n    public function delete(User $user, Post $post)\n\
    \    {\n        return $user->id === $post->user_id;\n    }\n}\n```\n\n#### Step\
    \ 7: Register Policies\n\nIn the `AuthServiceProvider`, register the `PostPolicy`\
    \ with the corresponding model.\n\n```php\n<?php\n\nnamespace App\\Providers;\n\
    \nuse App\\Models\\Post;\nuse App\\Policies\\PostPolicy;\nuse Illuminate\\Foundation\\\
    Support\\Providers\\AuthServiceProvider as ServiceProvider;\n\nclass AuthServiceProvider\
    \ extends ServiceProvider\n{\n    protected $policies = [\n        Post::class\
    \ => PostPolicy::class,\n    ];\n\n    public function boot()\n    {\n       \
    \ $this->registerPolicies();\n    }\n}\n```\n\n#### Step 8: Authorize in the Controller\n\
    \nRefactor the `PostController` to use the `authorize` method instead of manual\
    \ checks.\n\n```php\npublic function create()\n{\n    $this->authorize('create',\
    \ Post::class);\n    return view('posts.create');\n}\n\npublic function store(Request\
    \ $request)\n{\n    $this->authorize('create', Post::class);\n    // Validation\
    \ and store logic\n    // ...\n    return redirect()->route('posts.index');\n\
    }\n// Other methods...\n```\n\n### Explanation\n\n#### Authentication\n\n`Laravel\
    \ Breeze` simplifies the setup of authentication by scaffolding the necessary\
    \ views, controllers, and routes. Unlike the deprecated `make:auth` command, `Breeze`\
    \ offers a modern and minimal approach to authentication. The authentication routes,\
    \ once `Breeze` is installed, are defined in the `routes/web.php` file, allowing\
    \ users to register, log in, and manage passwords with ease.\n\n#### Authorization\
    \ in the Controller\n\nAuthorization in Laravel controllers ensures that only\
    \ authenticated users can perform certain actions. In the `PostController`, methods\
    \ such as `create` and `store` check if the user is authenticated using the `authorize`\
    \ method. This method verifies if the user has the necessary permissions based\
    \ on defined policies. If the user is not authenticated, they are redirected to\
    \ the login page, ensuring secure access control.\n\n#### Authorization in Views\n\
    \nIn Blade views, Laravel provides the `@can` directive to conditionally display\
    \ content based on user permissions. This directive checks the authorization policies\
    \ associated with the user and determines if specific content, such as links to\
    \ edit or delete a post, should be shown. This feature ensures that only authorized\
    \ users can see and interact with certain parts of the user interface.\n\n####\
    \ Policies\n\nLaravel’s policies encapsulate authorization logic for specific\
    \ models, such as `Post`. These policies are created using the `make:policy` command.\
    \ Policies define methods that correspond to various actions a user can perform\
    \ on a model, such as updating or deleting a post. By centralizing authorization\
    \ logic, policies make it easier to manage and maintain secure access control.\n\
    \n#### Register Policies\n\nPolicies must be registered in the `AuthServiceProvider`\
    \ to be recognized by Laravel. In the `AuthServiceProvider`, policies are mapped\
    \ to their respective models. This registration ensures that Laravel uses the\
    \ correct policy for authorization checks, linking models like `Post` to their\
    \ corresponding `PostPolicy`.\n\n#### Authorize in the Controller Using Policies"
