    ## ABC Canine Shelter Reservation System Logical Design


    The final logical design of the ABC Canine Shelter Reservation System shows the
    application with four tiers (authentication, interface, business rules, and data).
    Additional tiers could also be used to break a large application across multiple
    servers.


    ![../images/394210_2_En_9_Chapter/394210_2_En_9_Fig6_HTML.jpg](images/394210_2_En_9_Chapter/394210_2_En_9_Fig6_HTML.jpg)


    **Figure 9-6** The complete ABC Canine Shelter Reservation System


    In addition to the tiers, maintenance programs (`readerrorlog` and `readchangelog`)
    provide the ability to tighten security, fix errors, and provide backup and recovery.


    ## Limitations/Suggestions


    The ABC Canine Shelter Reservation System has been used as a teaching tool in
    this book. However, the system is not complete and ready for the real world. Many
    of the limitations of the system have been addressed in this book and used as
    exercises for you to gain further PHP programming skills. The changes shown next
    should be made to the system to improve the user experience, security, and performance.
    In addition, user testing is critical to ensure that the users of the system are
    satisfied. Users who are not happy with the design and performance of the system
    are not likely to use it.


    ### `lab.php`

    - A `Dog_ID` or some other type of unique field needs to be included to determine
    the difference between dogs with the same name and breed.

    - A form for users not using JavaScript needs to use PHP to call and retrieve
    needed information for update and delete ability.

    - A link to `displaychangelog.php` needs to be provided in the menu selection.

    - A `dog_Gender` field needs to exist. It would also be good if dog pictures existed.

    - The program needs to handle and respond to users’ attempt to insert a dog that
    already exists.


    ### `dog_interface.php`

    - `Dog_ID` information (update/insert) needs to be accepted from the `Dog` class
    and passed to `lab.php`.

    - Code is needed to return requests to `lab.php` for the complete dogs array and
    a specific dog for the non-JavaScript-enabled browsers. The information will be
    retrieved from `dog.php`.

    - The `dog_Gender` field needs to be pulled from `dog.php` and passed to `lab.php`.

    - A session message must be passed to the `lab.php` program when the user attempts
    to enter a dog that is already in the data. The message is created in a `catch`
    block.


    ### `dog.php`

    - The `Dog_ID` information needs to be pulled from `dog_data.php` and passed to
    `dog_interface.php`.

    - The `dog_Gender` needs to be pulled from `dog_data.php` and passed to `dog_interface.php`.


    ### `dog_data.php`

    - The `Dog_ID` needs to be passed to `dog.php`. The ability to insert and update
    this field needs to be included.

    - The `dog_Gender` needs to be passed to `dog.php`. The ability to insert and
    update this field needs to be included.


    ### `register.php`

    - This program needs to include a unique field (`customerID`) to determine duplicate
    user IDs. This field will be generated and not entered by the users.

    - This program needs to detect users attempting to create a duplicate ID. Code
    could even make suggestions for user ID names based on what the user attempted
    to create (such as adding numbers to the end of the user ID).

    - This program needs to require the user to also use a special symbol for the
    password.'
