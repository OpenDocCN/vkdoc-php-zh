    \ (use quotes) for any strings in our code. The *string delimiters* tell PHP when\
    \ a string of characters begin and end, something PHP needs to know in order to\
    \ process your code.\n\nNote\n\n*String* is a geeky word for “text.” Because computers\
    \ are not human, they don’t really see texts, much less words. They see *strings*\
    \ of characters, which to a computer is a lot of 1s and 0s."
  trans: "\n# 总结\n\n在本章中，我们学习了操作系统及其与程序的交互方式。我们了解到操作系统如何让程序开发者的工作变得更加轻松。我们还简单了解了 PHP、MySQL\
    \ 和 Apache，明白了它们是什么以及在动态网站开发中扮演的角色。我们在本地计算机上快速便捷地安装了一个功能完备的开发环境，为测试程序创建了一个安全可靠的空间。\n\
    \n在下一章中，我们将学习 PHP 一个虽小但功能强大的子集，包括变量、对象以及一些原生语言结构和语句。你所学到的几乎所有内容都将在新的开发环境中进行测试，因此请保持\
    \ XAMPP 的 Apache 服务器处于开启和运行状态。\n\n## 项目\n\n1. 创建一个简单的 PHP 程序，使用本章介绍的 `echo` 指令显示你的姓名、地址以及一段关于你的个人信息。\n\
    2. 创建一个在 `echo` 指令内显示 HTML 代码的 PHP 程序。这对于动态网站有何用处？\n\n# 理解 PHP：语言基础\n\n## 目标\n\
    \n完成本章后，你将能够：\n\n- 在网页中嵌入 PHP\n- 在代码中添加注释\n- 创建和使用变量\n- 解读 PHP 错误\n- 创建一个 HTML5\
    \ 模板\n- 创建和使用基本对象\n- 连接字符串\n- 使用 `$_GET` 访问 URL 变量\n- 声明一个类\n- 嵌入 CSS\n\n在第一章中，我们开发了第一个\
    \ PHP 程序。虽然它很基础，但我们成功测试了开发环境，甚至显示了一些信息。正如我们提到的，PHP 是创建动态 Web 应用程序的强大工具。基于此，在接下来的几章中，我们将培养创建基本博客的技能。开发博客所用的工具也可用于创建其他动态网站。本书的目标之一是“在实践中学习”。因此，我们将通过示例和项目来构建知识体系。\n\
    \n作为博客开发的垫脚石，我们首先需要确定如何创建一个基本的动态网站。在本章中，我们将创建一个包含动态网页的简单个人网站。在此过程中，我们将学习如何使用 PHP\
    \ 创建、存储、操作和显示数据。\n\n**注意**：本章讨论了 PHP 语言的基本方面，但并非详尽无遗。我们的目标是培养能够帮助你尽快投入生产的技能。如需澄清、更多示例或巩固概念，你应该访问\
    \ [`www.php.net`](http://www.php.net) 上的 PHP 手册并搜索更多信息。或者，你也可以在 YouTube 上搜索演示视频。请务必检查所讨论的\
    \ PHP 版本（PHP 8），因为一些 PHP 编码方式会随时间变化。别忘了阅读评论，因为许多同行程序员会在评论中提供见解、技巧，甚至额外的函数。\n\n\
    ## 嵌入 PHP 脚本\n\n在第一章中，我们提到 Web 服务器只会在以 `.php` 扩展名结尾的文件中寻找 PHP 代码。但是一个 `.php` 文件可以包含不属于我们\
    \ PHP 脚本的元素，而搜索整个文件以寻找潜在的脚本可能会造成混乱并消耗大量资源。为了解决这个问题，所有 PHP 脚本都放在 *PHP 分隔符* 之间。要开始一个\
    \ PHP 脚本，我们使用开始分隔符 `<?php`。要结束一个 PHP 脚本，我们添加结束分隔符 `?>`。在这些分隔符之外的任何内容，Web 服务器都会将其视为\
    \ HTML、CSS、JavaScript 或纯文本。\n\n让我们看一些示例。首先，我们希望保持程序的组织性，所以在 `/xampp/htdocs/` 中创建一个新文件夹\
    \ `ch2`。使用我们喜欢的编辑器，创建一个新文件 `test.php`。在文件中输入以下代码。\n\n```\n静态文本\n这段文本由 PHP 生成！\"\
    ;\n?>\n这段文本不是。\n代码清单 2-1\ntest.php\n```\n\n保存文件，然后在浏览器中导航至 `http://localhost/ch2/test.php`\
    \ 进行测试。\n\n**提示**：大多数 PHP 代码行末尾都需要一个分号来指示行结束。你记得在 `echo` 语句末尾加上它了吗？\n\n如果我们没有犯任何输入错误，输出应该类似于下图所示。\n\
    \n![](img/323857_3_En_2_Fig1_HTML.jpg)\n\n该窗口表示在测试中执行代码的结果，该文件始终仅使用 PHP 格式保存。\n\
    \n**图 2-1：test.php 输出**\n\n即使在这个简单的程序中，我们也能发现几个方面。首先，显示内容包含了浏览器解析 HTML 代码的结果和\
    \ PHP 代码被解释的结果。PHP 代码的结果甚至显示在与代码本身中相同的位置（在 HTML 结果之间）。PHP 分隔符内的代码被当作 PHP 脚本处理，但外部的代码则作为常规\
    \ HTML 呈现。PHP 解释器执行 PHP 代码，而浏览器执行其余代码。\n\n### 程序设计与逻辑\n\n在一个网页中可以包含的 PHP 代码块数量没有限制。但是，不要过度。所有程序员都应该创建清晰、有组织的代码，使其尽可能易于维护。作为程序员，你需要不断地修改代码。通过保持代码整洁和逻辑清晰来简化你的体验。\n\
    \n以下代码片段是完全有效的，但它整洁且逻辑清晰吗？\n\n```\n这是一些文本。\";\n?>\n这些文本部分是静态的， \n\"; ?>\n这段文本被包裹在由\
    \ PHP 生成的段落标签中。\n\"; ?>\n代码清单 2-2\ntest2.php\n```\n\n上述代码片段向浏览器输出如下内容。\n\n![](img/323857_3_En_2_Fig2_HTML.jpg)\n\
    \n该窗口表示在 test2 中执行代码的结果，该文件始终仅使用 PHP 格式保存。\n\n**图 2-2：test2.php 输出**\n\n### 程序设计与逻辑\n\
    \n当我们编写一个只包含 PHP 的脚本时，不必用 PHP 结束分隔符来结束它。但是，我们应该这样做吗？我们可以打开冰箱门拿零食而不关上它。妈妈最终会过来把它关上。但这样做对吗？逻辑上更合理的是，如果我们打开了它，就应该把它关上。为了保持一致性和易于调试，程序员应该始终为每个开始分隔符使用结束分隔符。当您追踪缺少的必要分隔符时，这也使得调试代码更加容易。\n\
    \n### 使用 `echo`\n\n让我们再仔细看看前面代码示例中 `echo` 的使用。PHP 的 `echo` 是一个*语言结构*（PHP 代码的基本语法单元）。无需过多讨论，我们发现这个语句会显示放在双引号之间的文本字符串。`echo`\
    \ 语句可能是从 PHP 向浏览器输出文本最常用的方法。然而，我们也可以使用其他结构来显示信息。\n\n**练习**：访问 [`php.net`](http://php.net)\
    \ 网站，搜索关于 `print` 命令的信息。`echo` 和 `print` 在使用上有什么区别？\n\n请注意，`echo` 输出以双引号分隔的字符串。第一个双引号表示一串字符的开始。第二个双引号标记要输出的字符串的结束。在\
    \ PHP 中，我们必须为代码中的任何字符串使用分隔符（引号）。*字符串分隔符* 告诉 PHP 字符串何时开始和结束，这是 PHP 处理代码所必须知道的。\n\
    \n**注意**：*字符串* 是“文本”的专业说法。因为计算机不是人类，它们实际上看不到文本，更别提单词了。它们看到的是字符串，对计算机来说就是大量的 1\
    \ 和 0。\n"
- fmt: '### What Is a Variable?


    In Chapter [1](#323857_3_En_1_Chapter.xhtml), we introduced the concept of *variables*.
    We discovered that a variable acts as an identifier for a value stored in a system''s
    memory. This is useful, because it allows us to write programs that will perform
    a set of actions on a variable value, without being concerned about how and where
    the variable is stored in memory. The program can change output simply by changing
    what is stored in the variable, rather than changing the program code itself.
    Variables help us begin to create dynamic coding!


    #### Storing Values in a Variable


    It is quite straightforward to store a value in a variable. In PHP, with one single
    line of code, we can declare a new variable and assign a value to it.


    ```

    I am $myName and I have a friend called $friendsName.";

    ?>

    Listing 2-3

    test3.php

    ```


    The result of executing the code in Listing [2-3](#323857_3_En_2_Chapter.xhtml#PC3)
    within a browser is shown in Figure [2-3](#323857_3_En_2_Chapter.xhtml#Fig3).


    ![](images/323857_3_En_2_Chapter/323857_3_En_2_Fig3_HTML.jpg)


    This window represents the result of executing the code in the test3, the output
    is I am Thomas and I have a friend called Brennan.


    Figure 2-3


    test3.php output


    As mentioned in Chapter [1](#323857_3_En_1_Chapter.xhtml), the equal sign is an
    *assignment operator*. It tells the interpreter to take whatever is on the right-hand
    side, a string in these examples, and place it into the variable on the left-hand
    side. In many languages, we also need to tell the system what type of information
    will be stored, such as a string, number, or single character. PHP allows us to
    optionally declare *data types*.


    The operating system needs the data type to determine what set of bits to use
    to represent the data in memory. If a data type is not declared, PHP will look
    at the information first stored in the variable, strings in this example, to inform
    the operating system of the type of data being stored.


    #### A Variable Is a Placeholder


    Variables are used extensively in programming. They provide programs the flexibility
    to temporarily store data while the program is running and to change the data
    used whenever necessary. Let''s look at more details from the previous listing.


    ```

    echo "I am $myName and I have a friend called $friendsName.";

    ```


    When the program was executed, the variable `$friendsName` displayed Brennan and
    the variable `$myName` displayed Thomas. The information displayed replaced each
    corresponding PHP variable in the original string.


    Did you notice that we had some HTML code within the string? Remember that the
    results of the execution of PHP code are sent to the browser. The completed string,
    including the `<p>` tags, is sent to the browser to be interpreted. If we view
    the source code within the browser, we will see that the `<p>` tags exist and
    have been interpreted. We can pass any HTML, CSS, or even JavaScript code to the
    browser to be interpreted by including it in an echo string. We will soon see
    great benefits to using this technique.


    In some other programming languages, a variable cannot be contained within a string.
    The string has to be broken apart, as shown in the following line.


    ```

    echo "I am $myName and I have a friend called " . $friendsName" . ".";

    ```


    The period is a *string concatenator* character, which allows us to connect multiple
    strings together. We can replace our previous code line with this example, and
    it will produce the same result. However, hopefully, you can see that it becomes
    much more of a problem to keep up with all the periods and quotes. Debugging becomes
    more difficult. Thank you, PHP developers, for making our job easier!


    #### Valid PHP Variable Names


    In PHP, all variables must begin with a dollar sign character (`$`). Variable
    names are case sensitive. Variables can also contain underscores (`_`). Usually,
    when we create a variable, we start with an alphabetic character. However, some
    special variables begin with underscores.


    ### Program Design and Logic


    When creating variable names, be consistent. Each programmer has their own style
    in designing names; the key is to use the same style throughout your program.
    You may prefer camel hump (`$myName`), underscores (`$my_name`), a combination
    (`$my_Name`), or a different technique. All are acceptable. Some programmers will
    also include the type of data stored within the name (`$stringMyName`) to allow
    easier debugging. For readability, we suggest using names that are meaningful.
    As you note in our simple examples, so far, we did not name our variables `$name1`
    or `$name2`. We provided some meaning to the variable by using `$myName` and `$friendsName`.
    This allows anyone reviewing our code some understanding of what type of data
    will be stored. Remember, when creating larger programs, this will be important
    in helping to determine which variable relates to what areas of a program.


    **Note**


    You can actually use numbers in variable names but not in initial positions. So,
    `$1a` is an invalid variable name, whereas `$a1` is perfectly valid.


    ### Displaying PHP Errors


    On your journey toward learning PHP, you will produce code errors. It is easy
    to think that you have done something bad when you have written some erroneous
    PHP. In a sense, it is, of course, bad. You would probably prefer to write perfect
    PHP from the very start, but even experts sometimes make coding mistakes.


    In another sense, errors are a very good thing. Many such errors present a learning
    opportunity. If you understand the cause of an error, you are less likely to repeat
    it, and even if you do repeat it, you can easily correct the error if you recognize
    it.


    PHP error messages are not always displayed; it depends on your environment. Why
    are errors not always displayed? The simple answer is in a live environment, we
    don''t want to display errors to our users. This shows both poor programming on
    our part and might even cause a security breach.'
