- fmt: "2. 创建`presentation/smarty_plugins/function.load_reviews.php`文件，并在其中添加以下内容：\n\
    \n```php\n<?php\n\n// Plugin functions inside plugin files must be named: smarty_type_name\n\
    function smarty_function_load_reviews($params, $smarty)\n{\n    // Create Reviews\
    \ object\n    $reviews = new Reviews();\n    $reviews->init();\n\n    // Assign\
    \ template variable\n    $smarty->assign($params['assign'], $reviews);\n}\n\n\
    // Class that handles product reviews\nclass Reviews\n{\n    public $mProductId;\n\
    \    public $mReviews;\n    public $mTotalReviews;\n    public $mReviewerName;\n\
    \    public $mEnableAddProductReviewForm = false;\n    public $mAddProductReviewTarget\
    \ = 'index.php';\n\n    public function __construct()\n    {\n        if (isset\
    \ ($_GET['ProductID']))\n            $this->mProductId = (int)$_GET['ProductID'];\n\
    \        else\n            trigger_error('ProductID not set', E_USER_ERROR);\n\
    \n        $this->mAddProductReviewTarget .= '?ProductID=' . $this->mProductId;\n\
    \    }\n\n    public function init()\n    {\n        // If visitor is logged in\
    \ ...\n        if (Customer::IsAuthenticated())\n        {\n            // Check\
    \ if visitor is adding a review\n            if (isset($_POST['AddProductReview']))\n\
    \                Catalog::CreateProductReview(\n                    Customer::GetCurrentCustomerId(),\n\
    \                    $this->mProductId,\n                    $_POST['review'],\n\
    \                    $_POST['rating']\n                );\n\n            // Display\
    \ \"add review\" form because visitor is registered\n            $this->mEnableAddProductReviewForm\
    \ = true;\n\n            // Get visitor's (reviewer's) name\n            $customer_data\
    \ = Customer::Get();\n            $this->mReviewerName = $customer_data['name'];\n\
    \        }\n\n        // Get reviews for this product\n        $this->mReviews\
    \ = Catalog::GetProductReviews($this->mProductId);\n\n        // Get the number\
    \ of the reviews\n        $this->mTotalReviews = count($this->mReviews);\n   \
    \ }\n}\n?>\n```\n\n3. 打开`presentation/templates/product.tpl`，并在其末尾添加以下行：\n\n```\n\
    <br /><br />\n{include file=\"reviews.tpl\"}\n```\n\n4. 在`hatshop.css`末尾添加以下样式：\n\
    \n```css\nul\n{\n    list-style-type: none;\n    padding: 0px;\n}\n\nli span\n\
    {\n    background: #ccddff;\n    display: block;\n    padding: 5px;\n}\n\n.add_review\
    \ tr td\n{\n    background: #e6e6e6;\n    border: none;\n}\n```\n\n5. 在浏览器中加载`index.php`，点击某个产品查看其产品详情页面，并欣赏结果（请参考本章开头的图16-1）。您必须登录才能添加新评论。\n\
    \n## 工作原理：评论组件化模板\n\n评论组件化模板负责显示评论和添加新评论。`reviews.tpl`文件的第一部分判断当前产品是否有评论要显示。如果没有，则会显示一条简短消息，鼓励访客撰写第一条评论。\n\
    \n```\n{if $reviews->mTotalReviews != 0}\n<span class=\"description\">Customer\
    \ reviews:</span><br />\n**[a list with reviews]**\n{else}\n<span class=\"description\"\
    >\nBe the first person to voice your opinion!<br /><br />\n</span>\n{/if}\n```\n\
    \n模板的第二部分显示用于添加评论的表单，或者显示一条邀请访客“登录”以添加评论的消息：\n\n```\n{if $reviews->mEnableAddProductReviewForm}\n\
    {* add review form *}\n<span class=\"description\"> Add a review:</span><br /><br\
    \ />\n**[add review form]**\n{else}\n<span>\n<strong>You must log in to add a\
    \ review.<strong/>\n</span>\n{/if}\n```\n\n函数插件中的代码相当简单，应该不会对您造成困扰。\n\n## 总结\n\
    \n是的，就这么简单。尽管您可能希望为自己的解决方案添加某些改进（例如，允许访客编辑他们的评论，或禁止他们添加更多评论），但基础已经存在，并且按预期工作。\n\
    \n您现在已准备好进入本书的最后一章，在那里您将学习如何通过使用XML Web Services从Amazon.com向您的客户销售商品。"
