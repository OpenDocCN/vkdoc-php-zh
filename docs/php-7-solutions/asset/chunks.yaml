    本书所需的所有文件均可通过 Apress 网站上的**下载源代码**按钮获取，该按钮位于 [`www.apress.com/9781484243374`](http://www.apress.com/9781484243374)
    处。


    按照第 2 章所述，搭建 PHP 开发环境。解压文件，并将 `phpsols-4e` 文件夹及其所有内容复制到 Web 服务器的文档根目录中。每章的代码都存放在以章节名称命名的文件夹中：`ch01`、`ch02`，以此类推。请遵循每个
    PHP 解决方案中的说明，并将相关文件复制到站点根目录或指定的工作文件夹。


    当某个页面在一章中经历多次修改时，我会对不同的版本进行编号，例如：`index_01.php`、`index_02.php` 等。复制带有数字的文件时，请从文件名中删除下划线和数字，这样
    `index_01.php` 就变成了 `index.php`。如果你使用的程序在将文件从一个文件夹移动到另一个文件夹时会提示更新链接，请不要更新。文件中的链接在设计上可以在目标文件夹中正确引用相应的图片和样式表。我这样做是为了让你可以使用文件比较工具来检查你的文件与我的文件之间的差异。


    如果你没有文件比较工具，我强烈建议你安装一个。它能为你节省数小时试图找出你的版本与我的版本之间差异而绞尽脑汁的时间。在几十行代码中，缺少一个分号或输错一个变量名可能很难发现。Windows
    用户可以从 [`http://winmerge.org/`](http://winmerge.org/) 免费下载 WinMerge。我使用 Beyond
    Compare（[`www.scootersoftware.com`](http://www.scootersoftware.com)），它现在支持 Windows、macOS
    和 Linux。它不是免费的，但功能出色且价格合理。Mac 上的 BBEdit 包含一个文件比较工具。如果你习惯在 Mac 上使用终端，系统默认安装了 `diff`
    工具。


    ## 排版约定


    为了使本书尽可能清晰易懂，全文采用了以下文本约定：


    -   重要词汇或概念首次出现时通常以**粗体**突出显示。

    -   代码以 `等宽字体` 呈现。

    -   新的或更改过的代码通常以 **`加粗等宽字体`** 呈现。

    -   伪代码和变量输入以 *`斜体等宽字体`* 书写。

    -   菜单命令以“菜单 ➤ 子菜单 ➤ 子菜单”的形式书写。

    -   当我需要引起你的注意时，会像这样突出显示：


    嗯，别说我没警告你。


    ## 致谢


    许多人为这本书做出了贡献，在它历经四个版本的过程中，每个人都帮助改进了它。我特别感谢第一版的编辑 Chris Mills，正是他提出了要摆脱那种孤立解决方案的“菜谱”式写法，因为那种写法让读者对某项技术的实际用途几乎毫无概念。Chris
    的继任者 Ben Renow-Clarke（负责第二版和第三版）和 Mark Powers（负责本版）都给予了温和的指导，将我引向正确的方向，并宽恕了我迟交稿件。顺便说一句，如果你觉得我们是在任人唯亲，那么
    Mark 虽然姓氏响亮，但与我并无亲戚关系。


    非常感谢本版的技术审阅者 Rob Aley 和 Massimo Nardone。一本书出到第四版时，作者希望能轻松一些，以为所有问题在前几版都解决好了。对读者你来说幸运的是，他们对我的代码和文本进行了近乎法医式的分析，并提出了非常有用的建议。因此，本书得到了极大的改进。书中仍存在的任何错误或不一致之处，均由我本人负责。


    同时感谢 Apress 生产链中的每一位参与者。没有他们在幕后的辛勤工作，一本书永远无法面世。


    最后，我想对我已故的妻子 Toshiko 表示敬意，她忍受了我连续数小时消失去编写这本书的前几个版本。我们本应花更多时间在一起的。想念你。


    ### 关于作者及技术审阅者

    #### 关于作者

    #### 关于技术审阅者


    # 1. 什么是 PHP——我为什么要在意它？


    PHP 常被批评者描述为最糟糕的编程语言之一，但它也是最流行的语言之一。它曾为 Google、Yahoo 和 Wikipedia 等网站提供支持。根据 Web
    Technology Surveys（[`https://w3techs.com/technologies/details/pl-php/all/all`](https://w3techs.com/technologies/details/pl-php/all/all)）的数据，在每五个使用服务器端语言的网站中，就有超过四个部署了
    PHP。所以，PHP 显然有其可取之处。确实如此。PHP 是专门为构建动态网站而设计的。它是免费的；学习曲线非常平缓；而本书将向你展示如何将其付诸实践。


    针对 PHP 的大多数批评都可以忽略。由于该语言在早期的发展方式，相关函数的名称和参数的顺序有时不一致。但是，借助一个好的编辑程序（参见本章“选择 PHP
    编辑器时要注意什么”中的一些建议），这些问题很容易克服。它的一些特性在缺乏经验的人手中也会带来安全风险；但其中大部分已在本书所基于的 PHP 7 版本中消除了。


    PHP 是一种成熟、强大的语言，已成为创建动态网站最广泛使用的技术。它通过以下方式让网站充满活力：


    -   将网站反馈直接发送到你的邮箱

    -   通过网页上传文件

    -   从较大的图片生成缩略图

    -   读取和写入文件

    -   动态显示和更新信息

    -   使用数据库显示和存储信息

    -   使网站可搜索

    -   以及更多……


    通过阅读本书，你将能够做到所有这些。PHP 不仅易于学习；而且它是平台无关的，因此相同的代码可以在 Windows、macOS 和 Linux 上运行。使用
    PHP 进行开发所需的所有软件都是开源且免费的。


    在本章中，你将了解以下内容：


    -   PHP 如何发展成为动态网站最广泛使用的技术

    -   PHP 如何使网页变得动态

    -   PHP 学习起来有多难——或者多容易

    -   PHP 是否安全

    -   编写 PHP 需要什么软件

