    a database in a single operation.'
  trans: "\n#### PHP 解决方案 16-5：为更新表单添加分类功能\n\n本 PHP 解决方案对上一章 PHP 解决方案 15-2 中的 `blog_update_mysqli.php`\
    \ 进行了修改，使其能够更新与博客文章关联的分类。为简化结构，对文章关联图片的唯一修改是选择另一张现有图片或不选择任何图片。\n\n请继续使用 PHP 解决方案\
    \ 15-2 中的 `blog_update_mysqli.php`。或者，从 `ch16` 文件夹中复制 `blog_update_mysqli_04.php`，并将其保存到\
    \ `admin` 文件夹中，命名为 `blog_update_mysqli.php`。当页面首次加载时，需要执行第二个查询来获取与博客文章关联的分类。在获取所选记录详细信息的条件语句中，添加以下高亮显示的代码：\n\
    \n```\n$stmt->free_result();\n\n// 获取与文章关联的分类\n$sql = 'SELECT cat_id FROM article2cat\n\
    WHERE article_id = ?';\n\nif ($stmt->prepare($sql)) {\n    $stmt->bind_param('i',\
    \ $_GET['article_id']);\n    $OK = $stmt->execute();\n    $stmt->bind_result($cat_id);\n\
    \n    // 循环遍历结果并将其存储到数组中\n    $selected_categories = [];\n    while ($stmt->fetch())\
    \ {\n        $selected_categories[] = $cat_id;\n    }\n}\n```\n\n该查询从交叉引用表中选择所有与所选博客文章主键匹配的记录的\
    \ `cat_id`。结果绑定到 `$cat_id`，然后通过 `while` 循环将值提取到名为 `$selected_categories` 的数组中。\n\
    \n在 HTML 页面的主体中，在文本区域和显示图片列表的 `<select>` 下拉菜单之间添加一个多选的 `<select>` 列表。使用另一个 SQL\
    \ 查询来填充该列表，操作如下：\n\n```\n<p>\n<label for=\"category\">分类：</label>\n<select name=\"\
    category[]\" size=\"5\" multiple id=\"category\">\n<?php\n// 获取分类\n$getCats =\
    \ 'SELECT cat_id, category FROM categories\nORDER BY category';\n$categories =\
    \ $conn->query($getCats);\nwhile ($row = $categories->fetch_assoc()) {\n?>\n<option\
    \ value=\"<?= $row['cat_id']; ?>\" <?php\nif (isset($selected_categories) &&\n\
    in_array($row['cat_id'], $selected_categories)) {\necho 'selected';\n} ?>><?=\
    \ $row['category']; ?></option>\n<?php } ?>\n</select>\n</p>\n```\n\n`while` 循环通过将\
    \ `cat_id` 插入 `value` 属性，并在开闭标签之间显示分类名称来构建每个 `<option>` 标签。如果 `cat_id` 存在于 `$selected_categories`\
    \ 数组中，则在 `<option>` 标签中插入 `selected`。这会选中已与博客文章关联的分类。\n\n保存 `blog_update_mysqli.php`，然后在\
    \ `blog_list_mysqli.php` 中选择一个“编辑”链接，确保多选列表已填充分类。如果你在 PHP 解决方案 16-4 中插入了新文章，则与该文章关联的分类应处于选中状态，如下方截图所示。\n\
    \n如有必要，你可以对照 `ch16` 文件夹中的 `blog_update_mysqli_05.php` 检查代码。对应的 PDO 版本位于 `blog_update_pdo_05.php`。\n\
    \n接下来，你需要编辑提交表单时更新记录的代码部分。新代码首先删除交叉引用表中与 `article_id` 匹配的所有条目，然后插入在更新表单中选择的值。内联注释表示为了节省空间而省略了现有代码。\n\
    \n```\n// 如果表单已提交，则更新记录\nif (isset($_POST ['update'])) {\n    // 准备更新查询\n    if\
    \ (!empty($_POST['image_id'])) {\n        // 现有代码已省略\n    } else {\n        //\
    \ 现有代码已省略\n        $stmt->execute();\n    }\n\n    // 删除交叉引用表中的现有值\n    $sql =\
    \ 'DELETE FROM article2cat WHERE article_id = ?';\n    if ($stmt->prepare($sql))\
    \ {\n        $stmt->bind_param('i', $_POST['article_id']);\n        $stmt->execute();\n\
    \    }\n\n    // 将新值插入 articles2cat\n    if (isset($_POST['category']) && is_numeric($_POST['article_id']))\
    \ {\n        $article_id = (int) $_POST['article_id'];\n        foreach ($_POST['category']\
    \ as $cat_id) {\n            $values[] = \"($article_id, \" . (int) $cat_id .\
    \ ')';\n        }\n        if ($values) {\n            $sql = 'INSERT INTO article2cat\
    \ (article_id, cat_id)\n            VALUES ' . implode(',', $values);\n      \
    \      if (!$conn->query($sql)) {\n                $catError = $conn->error;\n\
    \            }\n        }\n    }\n}\n```\n\n插入更新表单中所选值的代码与 PHP 解决方案 16-4 第 4 步中的代码相同。关键点在于它使用的是\
    \ `INSERT` 查询，而不是 `UPDATE`。原始值已被删除，因此你是在重新添加它们。\n\n保存 `blog_update_mysqli.php`，并通过更新\
    \ `blog` 表中的现有记录进行测试。如有必要，你可以对照 `ch16` 文件夹中的 `blog_update_mysqli_06.php` 检查代码。对应的\
    \ PDO 版本位于 `blog_update_pdo_06.php`。\n\n### 在删除时维护参照完整性\n\n在 PHP 解决方案 16-5 中，删除交叉引用表中的记录时无需担心参照完整性，因为每条记录中存储的值都是外键。每条记录仅仅引用存储在\
    \ `blog` 和 `categories` 表中的主键。参考本章开头图 16-1，从交叉引用表中删除将 `article_id 2` 与 `cat_id\
    \ 1` 组合的记录，仅仅是断开了标题为“见习艺伎去购物”的文章与`京都`分类之间的链接。文章和分类本身都不会受到影响。它们都保留在各自的表中。\n\n如果决定删除文章或分类，情况则完全不同。如果从\
    \ `blog` 表中删除“见习艺伎去购物”这篇文章，则必须同时从交叉引用表中删除所有对 `article_id 2` 的引用。同样，如果删除`京都`分类，则必须从交叉引用表中删除所有对\
    \ `cat_id 1` 的引用。或者，如果某个项目的主键作为外键存储在其他地方，则必须阻止删除操作。\n\n最好的方法是通过建立外键约束来实现。为此，相关表必须使用\
    \ InnoDB 存储引擎。如果你使用的是 MySQL 或 MariaDB 5.5 或更高版本，InnoDB 是默认引擎。此外，随书附带的所有 `.sql`\
    \ 文件都选择 InnoDB 引擎。但是，如果你有使用 MyISAM 存储引擎创建的现有表，则需要先转换它们才能建立外键约束。\n\n#### PHP 解决方案\
    \ 16-6：将表转换为 InnoDB 存储引擎\n\n本 PHP 解决方案演示了如何将表从 MyISAM 转换为 InnoDB。如果你计划将表上传到远程服务器，该服务器也必须支持\
    \ InnoDB（请参阅 PHP 解决方案 16-1）。\n\n在 phpMyAdmin 中选择 `phpsols` 数据库，然后选择 `article2cat`\
    \ 表。点击屏幕右上角的“操作”选项卡。在“表选项”部分，“存储引擎”字段会显示该表当前使用的引擎。如果显示为 MyISAM，请从下拉菜单中选择 InnoDB，如图\
    \ 16-10 所示。\n\n在 phpMyAdmin 中更改表的存储引擎非常容易。点击“执行”。更改存储引擎就是这么简单！\n\n每个表都需要单独转换。你无法一次性更改数据库中的所有表。\n"
- fmt: '# PHP Solution 16-7: Setting up foreign-key constraints


    This PHP solution describes how to set up foreign-key constraints between the
    `article2cat`, `blog`, and `categories` tables in phpMyAdmin. The foreign-key
    constraints must always be defined in the child table. In this case, the child
    table is `article2cat`, because it stores the `article_id` and `cat_id` primary
    keys from the other tables as foreign keys.


    Select the `article2cat` table in phpMyAdmin and click the Structure tab. Click
    Relation view (circled in Figure [16-11](#A978-1-4842-0635-5_16_Chapter.html#Fig11))
    at the bottom of the structure table.


    ![A978-1-4842-0635-5_16_Fig11_HTML.jpg](A978-1-4842-0635-5_16_Fig11_HTML.jpg)


    Figure 16-11. Foreign-key constraints are defined in phpMyAdmin’s Relation view


    Foreign-key constraints can be set up only on columns that are indexed. The `article_id`
    and `cat_id` columns in `article2cat` are the table’s composite primary key, so
    they’re both listed in the screen that opens. If your version of phpMyAdmin has
    an option labeled “Internal relations,” you can ignore it.


    In the `article_id` row, open the drop-down menu under “Foreign key constraint
    (INNODB)” to reveal the list of indexed columns in the database, and select `phpsols.blog.article_id`
    as shown in Figure [16-12](#A978-1-4842-0635-5_16_Chapter.html#Fig12). This will
    be used to establish a formal foreign-key relationship between `article_id` in
    the `article2cat` table and `article_id` in the `blog` table.


    ![A978-1-4842-0635-5_16_Fig12_HTML.jpg](A978-1-4842-0635-5_16_Fig12_HTML.jpg)


    Figure 16-12. Selecting the parent table’s primary key


    This opens up more options (in older versions of phpMyAdmin, they’re always visible).
    Leave “Constraint name” blank. phpMyAdmin will automatically generate a name for
    the constraint.


    The `ON DELETE` drop-down menu has the following options:


    - `CASCADE`: When you delete a record in the parent table, all dependent records
    are deleted in the child table. For example, if you delete the record with the
    primary key `article_id 2` in the `blog` table, all records with `article_id 2`
    in the `article2cat` table are automatically deleted.

    - `SET NULL`: When you delete a record in the parent table, all dependent records
    in the child table have the foreign key set to `NULL`. The foreign-key column
    must accept `NULL` values.

    - `NO ACTION`: On some database systems, this allows foreign-key constraint checks
    to be delayed. MySQL performs checks immediately, so this has the same effect
    as `RESTRICT`.

    - `RESTRICT`: This prevents the deletion of a record in the parent table if dependent
    records still exist in the child table.


    Note


    The same options are available for `ON UPDATE`. With the exception of `RESTRICT`,
    they are of limited interest because you should change the primary key of a record
    only in exceptional circumstances. `ON UPDATE RESTRICT` not only stops changes
    from being made to the primary key in the parent table; it also rejects any inserts
    or updates in the child table that would result in foreign-key values that don’t
    have a match in the parent table.


    In the case of a cross-reference table, `CASCADE` is the logical choice. If you
    decide to delete a record in the parent table, you want all cross-references to
    that record to be removed at the same time. However, to demonstrate the default
    behavior of foreign-key constraints, select `RESTRICT` for both `ON DELETE` and
    `ON UPDATE`.


    In the `cat_id` row, select `phpsols.categories.cat_id` from the “Foreign key
    restraint (INNODB)” drop-down menu, and set `ON DELETE` and `ON UPDATE` to `RESTRICT`.
    Click `Save`.


    Note


    If `RESTRICT` isn’t available in the drop-down menu, leave the option blank.


    If you have not already done so, update at least one blog entry to associate it
    with a category. In phpMyAdmin, select the `categories` table and click `Delete`
    next to a category that you know to be associated with a blog entry, as shown
    in Figure [16-13](#A978-1-4842-0635-5_16_Chapter.html#Fig13).


    ![A978-1-4842-0635-5_16_Fig13_HTML.jpg](A978-1-4842-0635-5_16_Fig13_HTML.jpg)


    Figure 16-13. Try to delete a record in the `categories` table


    Note


    In older versions of phpMyAdmin, the delete icon is a large red X.


    Click `OK` when phpMyAdmin asks you to confirm the deletion. If you have set up
    the foreign-key constraints correctly, you’ll see an error message similar to
    that in Figure [16-14](#A978-1-4842-0635-5_16_Chapter.html#Fig14).


    ![A978-1-4842-0635-5_16_Fig14_HTML.jpg](A978-1-4842-0635-5_16_Fig14_HTML.jpg)


    Figure 16-14. The foreign-key constraint prevents the deletion if dependent records
    exist


    If the error message appears in a modal dialog box, click the box to dismiss it.
    Select the `article2cat` table, and click the Structure tab. Then click “Relation
    view.”


    Note


    In older versions of phpMyAdmin, `ON DELETE` and `ON UPDATE` may be blank. Leaving
    these options blank has the same effect as selecting `RESTRICT`, which is the
    default for both.


    Change both `ON DELETE` settings to `CASCADE`, and click `Save`. Select a record
    in the `blog` table that you know is associated with a category. Make a note of
    its `article_id` and then delete the record. Check the `article2cat` table. The
    records associated with the record you have just deleted have also been deleted.


    To continue your exploration of foreign-key constraints, select the `blog` table,
    and establish a foreign-key relationship with `image_id` in the `images` table.
    If you delete a record from the `images` table, the `image_id` foreign key in
    the `blog` table needs to be set to `NULL`. This is done automatically if you
    set the value of `ON DELETE` to `SET NULL`. Test it by deleting a record from
    the `images` table and checking the associated record(s) in the `blog` table.


    Note


    If you need to convert an InnoDB table back to MyISAM, you must first remove any
    foreign-key constraints. Select “Relation view,” set the “Foreign key (INNODB)”
    fields to blank, and click `Save`. After removing the foreign-key constraints,
    you can change the storage engine as described in PHP Solution 16-6\. Select `MyISAM`
    instead of `InnoDB`.'
