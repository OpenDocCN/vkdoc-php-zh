    **254**


    C H A P T E R 1 4 ■ D ATA S O U R C E S A N D B E H AV I O R S


    Array


    (


    [0] => Array


    (


    [Post] => Array


    (


    [name] => Writing Posts in XML is a Snap


    [date] => 2008-11-08 12:00:01


    [content] => Using the XML utility class in Cake with the ➥


    Set::reverse() function makes parsing XML easy.


    [user_id] => 1


    )


    )


    [1] => Array


    (


    [Post] => Array


    (


    [name] => More XML Posts, Not so Bad


    [date] => 2008-11-08 12:00:02


    [content] => Using the XML utility class in Cake with the ➥


    Set::extract() function makes parsing XML easy.


    [user_id] => 1


    )


    )


    )


    This array looks just like those you’re used to in Cake. In the Index view, you
    can add these results to the list by running a loop just like the current loop
    for the $posts variable. Of course, in the app/webroot/files/data.xml file, I
    left the <id> tags blank; you’ll have to set those manually or build an auto_increment
    method into the DataSource to provide a unique ID for each post in the XML file.


    Not only can DataSources connect with external files, but they can also be used
    for pulling data from just about anywhere, such as a web service, e-mail, or some
    legacy system.


    This tutorial explored using XML as an external datasource and demonstrated how
    extending the model in this way actually improves the code and maintains better
    order throughout the framework. Third-party DataSources by other developers are
    already available online; you might want to try installing one as practice for
    using DataSources in your Cake applications.


    **Working with Behaviors**


    Another way to extend the model is with behaviors. Behaviors provide “rules” for
    models, like the rules you may set on your mail program to apply to your incoming
    mail. For example, you may want the model, when updating a record in the database,
    to perform multiple calculations of the data on the fly and not only update one
    record or a couple of associated records but perform a series of updates across
    the database. Using a behavior, rather than building


    09775ch14final 7/1/08 9:57 PM Page 255


    C H A P T E R 1 4 ■ D ATA S O U R C E S A N D B E H AV I O R S


    **255**


    into the model all the necessary functions to manage this kind of updating, keeps
    repetitive tasks in a separate resource file and makes the model more versatile
    by allowing multiple models to access more complicated processes without bogging
    them down. Cake comes with four built-in behaviors: ACL, Containable, Translate,
    and Tree. In this chapter, I’ll explain how to use the Tree behavior to improve
    how the blog categorizes posts. Creating custom behaviors is actually simpler
    than making your own DataSources; understanding how the built-in behaviors work
    will make crafting your own behaviors much easier.


    **Using the Tree Behavior to Categorize Blog Posts**


    The blog application uses the tags table to manage multiple tags to be applied
    to a post.


    What if you wanted to create a hierarchy of tags, or a “tree” of data of some
    kind? One tag could then become a “parent” of another tag, and a series of tags
    could be assigned as


    “children” to one tag. Then, once a tag is assigned to a post, by clicking the
    parent tag, all the associated posts for that parent tag and its child tags would
    be listed for the user. This method for working with hierarchical data is more
    effective than building several relational databases to manage the hierarchy.
    Fortunately, Cake comes with the Tree behavior that maintains a tree of data dynamically.


    Inserting Required Fields into the Tags Table


    Using the Tree behavior requires that the database table associated with the behavior
    be organized a certain way. In this case, the tags table will need to include
    a couple of extra fields for the Tree behavior to save its own parameters. Wherever
    you use the Tree behavior, remember to provide these three fields:


    • parent_id


    • lft


    • rght


    The left and right fields, or lft and rght, are used by the Tree behavior to organize
    the position of the node in the tree. The parent_id field links with the ID of
    the record in the table that behaves as the parent node of the current record.
    Currently, the tags table doesn’t include these fields. To prepare the blog to
    use the Tree behavior, replace the tags table following the specifications in
    Listing 14-10.


    **Listing 14-10.** *The Tags Table with Required Fields for the Tree Behavior*
    CREATE TABLÈtags` (


    ìdìnt(11) unsigned NOT NULL auto_increment,


    `parent_idìnt(11) unsigned default NULL,


    `leftìnt(11) unsigned default NULL,


    `rightìnt(11) unsigned default NULL,


    `namè varchar(255) default NULL,


    PRIMARY KEY(''id'')


    );'
