  \ 2，但你仍需进行此比较，以防用户成功绕过了 `MAX_FILE_SIZE`。错误信息也使用 `getMaxSize()` 来显示最大大小。\n\n如果大小正常，该方法返回\
  \ `true`。\n\n第三项检测检查 MIME 类型。将以下代码添加到类定义中：\n\n```\nprotected function checkType($file)\
  \ {\n    if (in_array($file['type'], $this->permitted)) {\n        return true;\n\
  \    } else {\n        $this->messages[] = $file['name'] . ' 是不允许的文件类型。';\n    \
  \    return false;\n    }\n}\n```\n\n该条件语句将 `$_FILES` 数组报告的类型与存储在 `$permitted` 属性中的数组进行对比。如果该类型存在于数组中，则方法返回\
  \ `true`。否则，拒绝原因被添加到 `$messages` 数组中，方法返回 `false`。\n\n`getErrorMessages()` 和 `checkSize()`\
