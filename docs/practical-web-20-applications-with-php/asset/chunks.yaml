    **Directing All Requests to index.php**


    To implement our application using MVC, we will use the Zend_Controller class.
    First, though, we must alter our web server configuration to direct all page requests
    to Zend_Controller, even if the requested location is not a real file on the filesystem.
    All requests to files that do exist on the filesystem (such as our images and
    CSS files) will be handled normally by Apache; however, all other requests will
    be handled by the application bootstrap file (which will be located in /var/www/phpweb20/htdocs/index.php).


    The directives in Listing 2-3 should be placed in a file called .htaccess inside
    ./htdocs. Note that these could be placed in the httpd.conf file we created earlier,
    but doing it here allows us to make changes without restarting the web server.
    The RewriteRule directive in Listing 2-3 routes any request that doesn’t correspond
    to an actual file or directory through index.php.


