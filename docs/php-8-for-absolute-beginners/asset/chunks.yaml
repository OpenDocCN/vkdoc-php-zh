    \ Error: \"Operator type mismatch string and int for comparison\"\n\n### E-4\n\
    \n```\n\"120\" > \"99.9\";\n```\n\nResult: Error: \"Unsupported type string for\
    \ comparison\"\n\n### E-5\n\n```\n\"120\"  \"99.9\";\n```\n\nResult: Error: \"\
    Unsupported type string for comparison\"\n\n## The `switch` Statement\n\nThe *switch\
    \ statement* can be used to eliminate embedded `if-then-else` statements when\
    \ determining a value within a variable.\n\n```\nswitch (value to compare) {\n\
    case value:\n// code to execute if true\nbreak;\ncase value;\n// code to execute\
    \ if true\nbreak;\ndefault:\n// code to execute if there are no matches\nbreak;\n\
    }\n```\n\nThe structure of the `switch` statement requires `break` commands (`break;`)\
    \ at the end of each possible case situation. The colon (`:`) is used in each\
    \ header of the case(s) after the value to compare.\n\n```\nResult: Number was\
    \ not found.\nWhy: The value 36 is not caught in any of the case statements. PHP\n\
    will do conversion, when possible. In this example, it will compare the\nvalue\
    \ in the strings to the number presented. The flow of the structure\nwill drop\
    \ into the default statement since there are no matches. The\ndefault statement\
    \ acts in a similar fashion to the else statement; it\ncatches all remaining possibilities.\
    \ It is a good idea to include a\ndefault statement in all case structures to\
    \ handle the unexpected values\nrather than the possibility of causing an exceptional\
    \ situation.\n```\n\n**Exercise**: Create a program which uses a conditional statement\
    \ that will determine what color is contained in a string. If the color is green,\
    \ display \"I love the earth.\" If the color is blue, display \"The sky is beautiful.\"\
    \ If the color is yellow or orange, display \"I love sunsets.\" For any other\
    \ color, display \"selectedcolor is my favorite color.\" Replacing the `selectedcolor`\
    \ with the color chosen.\n\n**Hint**: You can put a variable inside of a string.\n\
    \n## Functions\n\nIn addition to the 1000s of built-in or easily importable PHP\
    \ functions available for your use, you can also create your own *functions*.\n\
    \n```\nfunction function_Name(attribute1, attribute2, …) {\n// code goes here\n\
    }\nfunction_name(attribute, attribute, …);\n// next statement after function has\
    \ completed\n```\n\nThe general format of a function is shown in the preceding.\
    \ The `function` keyword is lowercase. The name you provide for the function uses\
    \ almost the same format as variables, except you do not include the `$`. Variables\
    \ or values can be passed as parameters into the function in the parentheses.\
    \ All code goes between the brackets `{}`. The function is called using the function\
