    使用命令 `$A=["First"=>1,2,"Last"=>3]` 和 `$B=[100,200,"Last"=>300]` 创建两个数组。接着，计算这些数组的和（`$C=$A+$B`
    指令）。结果是什么？结果是包含两个原始数组元素的数组。关于具有匹配索引的元素，存在一些微妙之处。有两个这样的元素（两对）。这意味着键为 `"Last"` 的元素，以及索引为
    `0` 的元素（在 `$A` 数组中，即值为 `2` 的元素；在 `$B` 数组中，即值为 `100` 的元素）。如前所述，在这种情况下，第一个数组（`$A`
    数组）具有优先权。因此，在 `$C` 数组中，索引为 `0` 的元素具有值 `2`，而键为 `"Last"` 的元素具有值 `3`。'
