  trans: '

    ### 后果


    如果你和我一样，在看到 `Archer` 类的代码片段时，心里应该已经敲响了警钟。为什么我们非得在那些根本不需要支持 `addUnit()` 和 `removeUnit()`
    方法的叶子类中保留这些冗余的方法呢？答案在于 `Unit` 类型透明性。


    如果客户端接收到一个 `Unit` 对象，它会知道 `addUnit()` 方法肯定存在。组合模式的原则——原始（叶子）类与组合类拥有相同的接口——得到了贯彻。但这实际上帮不了你太多，因为你仍然不知道对遇到的任何一个
    `Unit` 对象调用 `addUnit()` 方法是否安全。


    如果我将这些 add/remove 方法下移到仅适用于组合类的地方，那么当将 `Unit` 对象传递给某个方法时，就会面临一个问题：我默认不知道它是否支持
    `addUnit()`。尽管如此，在叶子类中留下这些“陷阱”方法让我感到很不舒服。这没有增加任何价值，反而混淆了系统的设计，因为接口实际上虚报了自身的功能。


    将组合类拆分到它们自己的 `CompositeUnit` 子类型中很容易实现。首先，我从 `Unit` 中移除 add/remove 行为：


    ```

    // 清单 10.13

    abstract class Unit

    {

    public function getComposite()

    {

    return null;

    }

    abstract public function bombardStrength(): int;

    }

    ```


    注意新增的 `getComposite()` 方法。稍后我会回头讨论它。现在，我需要一个新的抽象类来容纳 `addUnit()` 和 `removeUnit()`。我甚至可以提供默认实现：


    ```

    // 清单 10.14

    abstract class CompositeUnit extends Unit

    {

    private $units = [];

    public function getComposite(): CompositeUnit

    {

    return $this;

    }

    public function addUnit(Unit $unit)

    {

    if (in_array($unit, $this->units, true)) {

    return;

    }

    $this->units[] = $unit;

    }

    public function removeUnit(Unit $unit)

    {

    $idx = array_search($unit, $this->units, true);

    if (is_int($idx)) {

    array_splice($this->units, $idx, 1, []);

    }

    }

    public function getUnits(): array

    {

    return $this->units;

    }

    }

    ```


    `CompositeUnit` 类被声明为抽象类，尽管它本身并没有声明任何抽象方法。不过，它确实扩展了 `Unit`，并且没有实现抽象的 `bombardStrength()`
    方法。`Army`（以及任何其他组合类）现在可以扩展 `CompositeUnit`。我示例中的类现在组织方式如图 10-2 所示。


    ![A314621_5_En_10_Fig2_HTML.gif](img/A314621_5_En_10_Fig2_HTML.gif)


    图 10-2. 将 add/remove 方法移出基类


    叶子类中那些恼人且无用的 add/remove 方法实现已经消失了，但客户端在使用 `addUnit()` 之前，仍然必须检查它是否拥有一个 `CompositeUnit`
    对象。


    这就是 `getComposite()` 方法发挥作用的地方。默认情况下，此方法返回 null 值。只有在 `CompositeUnit` 类中，它才返回
    `CompositeUnit` 对象。因此，如果此方法调用返回了一个对象，我们就应该能够在该对象上调用 `addUnit()`。下面是一个使用此技术的客户端：


    ```

    // 清单 10.15

    class UnitScript

    {

    public static function joinExisting(

    Unit $newUnit,

    Unit $occupyingUnit

    ): CompositeUnit {

    $comp = $occupyingUnit->getComposite();

    if (! is_null($comp)) {

    $comp->addUnit($newUnit);

    } else {

    $comp = new Army();

    $comp->addUnit($occupyingUnit);

    $comp->addUnit($newUnit);

    }

    return $comp;

    }

    }

    ```


    `joinExisting()` 方法接受两个 `Unit` 对象。第一个是某区块上的新来者，第二个是先前占用者。如果第二个 `Unit` 是一个 `CompositeUnit`，那么第一个将尝试加入它。如果不是，则会创建一个新的
    `Army` 来容纳这两个单位。我一开始无法知道 `$occupyingUnit` 参数是否包含一个 `CompositeUnit`。不过，调用 `getComposite()`
    可以解决这个问题。如果 `getComposite()` 返回一个对象，我可以直接将新的 `Unit` 对象添加进去。如果不返回，我会创建新的 `Army`
    对象并将两者都添加进去。


    我可以通过让 `Unit::getComposite()` 方法返回一个预先填充了当前 `Unit` 的 `Army` 对象来进一步简化这个模型。或者，我可以回到之前的模型（该模型在结构上不区分组合对象和叶子对象），并让
    `Unit::addUnit()` 做同样的事情：创建一个 `Army` 对象并将两个 `Unit` 对象都添加进去。这很简洁，但它预先假定你提前知道你想用来聚合单位的组合类型。你的业务逻辑将决定你在设计
    `getComposite()` 和 `addUnit()` 等方法时能做出何种假设。


    这些曲折迂回的做法，体现了组合模式的一个缺点。简单性是通过确保所有类都派生自一个公共基类来实现的。这种简单性的好处有时是以牺牲类型安全为代价的。你的模型变得越复杂，你可能需要进行的**手动**类型检查就越多。假设我有一个
    `Cavalry` 对象。如果游戏规则规定你不能把马放上运兵车，我就无法用组合模式自动强制执行这条规则：


    ```

    // 清单 10.16

    class TroopCarrier extends CompositeUnit

    {

    public function addUnit(Unit $unit)

    {

    if ($unit instanceof Cavalry) {

    throw new UnitException("不能把马弄上运兵车");

    }

    parent::addUnit($unit);

    }

    public function bombardStrength(): int

    {

    return 0;

    }

    }

    ```


    我被迫使用 `instanceof` 运算符来测试传递给 `addUnit()` 的对象的类型。如果你有太多这种特殊情况，该模式的缺点就开始超过其优点。当大多数组件可以互换时，组合模式效果最佳。


    另一个需要牢记的问题是一些组合操作的代价。`Army::bombardStrength()` 方法很典型，它会沿着树向下级联调用相同的方法。对于一个拥有大量子部队的大型树来说，单个调用可能会在幕后引发雪崩。`bombardStrength()`
    本身开销不大，但如果某些叶子执行了复杂的计算来得出其返回值，会发生什么情况？解决这个问题的一种方法是在父对象中缓存此类方法调用的结果，以便后续调用开销更小。不过，你需要小心，确保缓存的值不会过时。你应该设计策略，在树结构上发生任何操作时清除所有缓存。这可能要求你给子对象提供对其父对象的引用。


    最后，关于持久化的一点说明。组合模式很优雅，但它不适合直接存储在关系型数据库中。这是因为，默认情况下，你只能通过引用的级联来访问整个结构。要以自然的方式从数据库构建组合结构，你必须执行多次昂贵的查询。你可以通过为整个树分配一个
    ID 来解决这个问题，这样所有组件都可以一次性从数据库中取出。然而，在获取所有对象之后，你仍然需要重新创建父/子引用关系，而这些关系本身也必须存储在数据库中。这并不困难，但有些混乱。


    尽管组合模式与关系型数据库配合起来不太自然，但它非常适合存储在 XML 中。这是因为 XML 元素本身通常由子元素树组成。

