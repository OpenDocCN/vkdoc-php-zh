    \ attribute,\n    like this:"
  trans: "\n# 上传多个文件\n\n现在你已经有了一个灵活的文件上传类，但它一次只能处理一个文件。在文件字段的`<input>`标签中添加`multiple`属性，即可在符合\
    \ HTML5 标准的浏览器中选择多个文件。如果为表单添加额外的文件字段，旧版浏览器也支持多文件上传。构建`Upload`类的最后阶段，就是对其进行调整以处理多文件上传。要理解代码的工作原理，你需要了解当表单支持多文件上传时，`$_FILES`数组会发生什么变化。\n\
    \n## `$_FILES`数组如何处理多文件上传\n\n由于`$_FILES`是一个多维数组，它能够处理多文件上传。除了在`<input>`标签中添加`multiple`属性外，还需要在`name`属性后添加一对空方括号，如下所示：\n\
    \n```\n<input type=\"file\" name=\"image[]\" multiple>\n```\n\n正如你在第 6 章所学到的，在`name`属性中添加方括号会将多个值以数组形式提交。你可以通过使用`ch09`文件夹中的`multi_upload_01.php`或`multi_upload_02.php`来检查这对`$_FILES`数组的影响。图\
    \ 9-9 显示了在支持`multiple`属性的现代桌面浏览器中选择三个文件的结果。\n\n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig9_HTML.jpg](img/332054_4_En_9_Fig9_HTML.jpg)\n\
    \n**图 9-9.** `$_FILES`数组可以在单次操作中上传多个文件\n\n虽然这种结构不如将每个文件的详细信息存储在独立的子数组中那么方便，但数字键可以跟踪每个文件的详细信息。例如，`$_FILES['image']['name'][2]`直接对应于`$_FILES['image']['tmp_name'][2]`，依此类推。\n\
    \n所有现代桌面浏览器都支持`multiple`属性，iOS 上的 Safari（自 6.1 版本起）也支持。Internet Explorer 9 或更早版本不支持此属性，Android\
    \ 和其他一些移动浏览器也不支持。不支持`multiple`属性的浏览器会使用相同的结构上传单个文件，因此文件名存储为`$_FILES['image']['name'][0]`。\n\
    \n> **提示**  \n> 如果你需要在旧版浏览器上支持多文件上传，请省略`multiple`属性，并根据要同时上传的文件数量创建独立的文件输入字段。为每个`<input>`标签赋予相同的`name`属性，并在其后加上方括号。`$_FILES`数组的最终结构与图\
    \ 9-9 相同。\n\n## PHP 解决方案 9-6：调整类以处理多文件上传\n\n这个 PHP 解决方案展示了如何调整`Upload`类的`upload()`方法，以处理多文件上传。当`$_FILES`数组的结构如图\
    \ 9-9 所示时，类会自动检测，并使用循环来处理上传的任意数量的文件。\n\n当你从仅处理单次上传的表单上传文件时，`$_FILES`数组将文件名作为字符串存储在`$_FILES['image']['name']`中。但是，当你从支持多文件上传的表单上传时，`$_FILES['image']['name']`是一个数组。即使只上传了一个文件，其名称也会存储为`$_FILES['image']['name'][0]`。因此，通过检测`name`元素是否为数组，你可以决定如何处理`$_FILES`数组。如果`name`元素是一个数组，你需要将每个文件的详细信息提取到单独的数组中，然后使用循环处理每个文件。\n\
    \n考虑到这一点，请继续使用你现有的类文件。或者，使用`ch09/PhpSolutions/File`文件夹中的`Upload_04.php`。\n\n1.\
    \  修改`upload()`方法，添加一个条件语句来检查`$uploaded`的`name`元素是否为数组：\n\n    ```\n    public\
    \ function upload($fieldname, $size = null, array $mime = null,\n    $renameDuplicates\
    \ = true) {\n    $uploaded = $_FILES[$fieldname];\n    if (!is_null($size) &&\
    \ $size > 0) {\n    $this->max = (int) $size;\n    }\n    if (!is_null($mime))\
    \ {\n    $this->permitted = array_merge($this->permitted, $mime);\n    }\n   \
    \ if (is_array($uploaded['name'])) {\n    // 处理多文件上传\n    } else {\n    if ($this->checkFile($uploaded))\
    \ {\n    $this->checkName($uploaded, $renameDuplicates);\n    $this->moveFile($uploaded);\n\
    \    }\n    }\n    }\n    ```\n\n    如果`$uploaded['name']`是一个数组，则需要特殊处理。原有的`checkFile()`调用现在放在`else`块内。\n\
    \n2.  为了处理多文件上传，关键挑战在于将单个文件相关的五个值（`name`、`type`等）收集起来，然后再将它们传递给`checkFile()`、`checkName()`和`moveFile()`方法。\n\
    \n    如果你参考图 9-9，`$uploaded`数组中的每个元素都是一个索引数组。因此，第一个文件的名称位于 name 子数组的索引 0 处，其类型位于\
    \ type 子数组的索引 0 处，以此类推。我们可以使用循环来提取索引 0 处的每个值，并将这些值与相关的键组合起来。\n\n    首先，我们需要找出上传了多少个文件。这很容易通过将\
    \ name 子数组传递给`count()`函数来实现。在多文件上传注释后添加以下代码，如下所示：\n\n    ```\n    // 处理多文件上传\n\
    \    $numFiles = count($uploaded['name']);\n    ```\n\n3.  接下来，通过添加以下代码提取子数组的键：\n\
    \n    ```\n    $keys = array_keys($uploaded);\n    ```\n\n    这将创建一个由`name`、`type`、`tmp_file`等组成的数组。\n\
    \n4.  现在我们可以创建一个循环来构建每个文件详细信息的数组。在你刚插入的代码之后添加以下代码：\n\n    ```\n    for ($i = 0;\
    \ $i < $numFiles; $i++) {\n    $values = array_column($uploaded, $i);\n    $currentfile\
    \ = array_combine($keys, $values);\n    print_r($currentfile);\n    }\n    ```\n\
    \n    该循环重新组织`$_FILES`数组的内容，使得每个文件的详细信息如同单独上传时一样可用。换句话说，与其将所有的 name、type 和其他元素分组在一起，`$currentfile`包含单个文件详细信息的关联数组，可以使用我们在`Upload`类中已经定义的方法进行处理。\n\
    \n    只需两行代码即可实现这一点。那么，让我们检查一下发生了什么。`array_column()`函数从多维数组中提取所有具有相同键或索引（作为第二个参数传递）的子数组中的元素。在这种情况下，第二个参数是计数器`$i`。当循环首次运行时，`$i`为\
    \ 0。因此，它会提取`$uploaded`（即`$_FILES['image']`）每个子数组中索引 0 处的值。每个子数组有不同的键（`name`、`type`等）这一事实无关紧要；`array_column()`仅搜索每个子数组内部匹配的键或索引。实际上，它获取的是已上传的第一个文件的详细信息。\n\
    \n    然后，`array_combine()`函数构建一个数组，将每个值分配给其相关的键。因此，name 子数组中索引 0 处的值变为`$currentfile['name']`，type\
    \ 子数组中索引 0 处的值变为`$currentfile['type']`，以此类推。\n\n    下次循环运行时，`$i`递增，从而构建第二个文件详细信息的数组。循环持续运行，直到所有文件的详细信息都被处理完毕。由于这在概念上可能难以理解，我添加了`print_r()`来检查结果。\n\
    \n5.  保存`Upload.php`。要测试它，请更新`file_upload.php`，在文件字段的`name`属性末尾添加一对方括号，并插入`multiple`属性，如下所示：\n\
    \n    ```\n    <input type=\"file\" name=\"image[]\" multiple>\n    ```\n"
- fmt: "- 你不需要在`DOCTYPE`声明之上的PHP代码做任何修改。\n- 无论单文件还是多文件上传，代码都是相同的。\n\n> **注意**：IE 10\
    \ 之前的 Internet Explorer 只会上传选择的最后一个文件。\n\n1. 保存`file_upload.php`并在浏览器中重新加载。通过选择多个文件进行测试。点击上传时，每个文件的详细信息应显示在单独的数组中。右键查看浏览器的源代码，你应看到类似图\
    \ [9-10](#332054_4_En_9_Chapter.xhtml#Fig10) 的内容。\n\n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig10_HTML.jpg](images/332054_4_En_9_Chapter/332054_4_En_9_Fig10_HTML.jpg)\n\
    \n**图 9-10.** 每个上传文件的详细信息现在都位于单独的数组中\n\n2. 既然我们有了每个文件的详细信息数组，就可以像之前一样处理它们。简单的方法是将以下代码块从`else`块中复制，粘贴到`for`循环中替换对`print_r()`的调用（将所有`$uploaded`实例改为`$currentfile`）：\n\
    \n```\nif ($this->checkFile($uploaded)) {\n    $this->checkName($uploaded, $renameDuplicates);\n\
    \    $this->moveFile($uploaded);\n}\n```\n\n这只有四行代码，重复似乎不是什么大问题。然而，将来你可能需要编辑代码，也许是为了增加更多检查。那时你就需要对两个代码块做同样的修改——这正是代码错误开始蔓延的地方。现在这是一个独立的例程，应该放在专用的内部方法中。\n\
    \n不要复制这段代码，而是将其剪切到剪贴板。\n\n3. 在`Upload`类定义内部创建一个新的`protected`方法，并粘贴你刚刚剪切的代码。新方法如下所示：\n\
    \n```\nprotected function processUpload($uploaded, $renameDuplicates) {\n    if\
    \ ($this->checkFile($uploaded)) {\n        $this->checkName($uploaded, $renameDuplicates);\n\
    \        $this->moveFile($uploaded);\n    }\n}\n```\n\n4. 在`for`循环和`else`块中调用这个新方法。更新后的完整`upload()`方法现在如下所示：\n\
    \n```\npublic function upload($fieldname, $size = null, array $mime = null,\n\
    $renameDuplicates = true) {\n    $uploaded = $_FILES[$fieldname];\n    if (!is_null($size)\
    \ && $size > 0) {\n        $this->max = (int)$size;\n    }\n    if (!is_null($mime))\
    \ {\n        $this->permitted = array_merge($this->permitted, $mime);\n    }\n\
    \    if (is_array($uploaded['name'])) {\n        // deal with multiple uploads\n\
    \        $numFiles = count($uploaded['name']);\n        $keys = array_keys($uploaded);\n\
    \        for ($i = 0; $i < $numFiles; $i++) {\n            $currentfile = [];\n\
    \            foreach ($keys as $key) {\n                $currentfile[$key] = $uploaded[$key][$i];\n\
    \            }\n            $this->processUpload($currentfile, $renameDuplicates);\n\
    \        }\n    } else {\n        $this->processUpload($uploaded, $renameDuplicates);\n\
    \    }\n}\n```\n\n5. 保存`Upload.php`并尝试上传多个文件。你应该能看到与每个文件相关的消息。符合你标准的文件会被上传，过大或类型错误的文件会被拒绝。该类同样适用于单文件上传。\n\
    \n你可以将代码与`ch09/PhpSolutions/File`文件夹中的`Upload_05.php`进行对照。\n\n## 使用 Upload 类\n\
    \n`Upload`类使用起来很简单——只需按照本章前面“导入命名空间类”中的描述导入命名空间。在脚本中包含类定义，并通过将文件路径作为参数传递给`upload_test`文件夹来创建`Upload`对象，如下所示：\n\
    \n```\n$destination = 'C:/upload_test/';\n$loader = new Upload($destination);\n\
    ```\n\n> **提示**：上传文件夹路径末尾的斜杠是可选的。\n\n默认情况下，该类只允许上传图片，但这可以覆盖。该类有以下公共方法：\n\n- `upload($fieldname,\
    \ $size = null, array $mime = null, $renameDuplicates = true)`：将文件保存到目标文件夹。文件名中的空格会被下划线替换。默认情况下，与现有文件同名的文件会通过在文件扩展名前插入数字来重命名。该方法接受以下参数：\n\
    \    - `$fieldname`（必需）：上传表单中文件输入字段的名称。\n    - `$size`（可选）：一个整数，用于更改默认的最大文件大小（单位：字节，默认值\
    \ 51200，相当于 50 KB）。\n    - `$permitted`（可选）：一个 MIME 类型数组，用于允许上传图像以外的文件。\n    -\
    \ `$renameDuplicates`（可选）：将其设置为`false`会覆盖上传文件夹中同名的文件。\n\n- `getMessages()`：返回一个报告上传状态的数组。\n\
    \n## 文件上传的注意事项\n\nPHP 解决方案 9-1 中的基本脚本表明，通过 Web 表单上传文件对于 PHP 来说相当简单。失败的主要原因是没有为上传目录或文件夹设置正确的权限，以及忘记在脚本结束前将上传的文件移动到目标位置。基本脚本的问题在于它允许上传几乎任何内容。这就是本章投入大量精力构建更健壮解决方案的原因。即使`Upload`类执行了额外的检查，你也应该仔细考虑安全性。\n\
    \n允许他人将文件上传到你的服务器会给你带来风险。实际上，你在允许访问者自由地向服务器的硬盘写入数据。你不会允许陌生人在你自己的电脑上这样做，因此你应该以同样的警惕性来保护上传目录的访问权限。\n\
    \n理想情况下，上传应限于已注册的受信任用户，因此上传表单应位于网站中密码保护的部分。注册可以让你阻止滥用信任的人。此外，上传文件夹不需要位于网站根目录内，因此尽可能将其放在私有目录中。上传的图像可能包含隐藏脚本，因此不应将它们放在具有执行权限的文件夹中。请记住，PHP\
    \ 无法检查内容是否合法或得体，因此立即公开显示会带来超出单纯技术层面的风险。你还应该牢记以下安全要点：\n\n- 在 Web 表单和服务器端都设置上传文件的最大大小。\n\
    - 通过检查`$_FILES`数组中的 MIME 类型来限制上传文件的类型。\n- 将文件名中的空格替换为下划线或连字符。\n- 定期检查你的上传文件夹。确保其中没有不应存在的内容，并定期进行清理。即使你限制了文件上传大小，也可能在不知不觉中耗尽分配的磁盘空间。\n\
    \n## 章节回顾\n\n本章向你介绍了如何创建一个 PHP 类。如果你是 PHP 或编程新手，可能会觉得有些难度。不要灰心。`Upload`类包含超过 150\
    \ 行代码，其中一些代码很复杂，尽管我希望描述已经解释了代码在每个阶段的作用。即使你不理解所有代码，`Upload`类也能为你节省大量时间。它实现了文件上传所必需的主要安全措施，而使用它只需要十行左右的代码：\n\
    \n```\nuse PhpSolutions\\File\\Upload;\nif (isset($_POST['upload'])) {\n    require_once\
    \ 'PhpSolutions/File/Upload.php'; // 使用正确的路径\n    try {\n        $loader = new\
    \ Upload('C:/upload_test/');  // 将目标文件夹作为参数\n        $loader->upload('image');\n\
    \        $result = $loader->getMessages();\n    } catch (Throwable $t) {\n   \
    \     echo $t->getMessage();\n    }\n}\n```"
  raw: "```\n    You don’t need to make any changes to the PHP code above the `DOCTYPE`\
    \ declaration.\n    The code is the same for both single and multiple uploads.\n\
    \n```\n\nNote\nInternet Explorer prior to IE 10 will upload only the last file\n\
    selected.\n\n1.  Save `file_upload.php` and\n    reload it in your browser. Test\
    \ it by selecting multiple files. When you\n    click Upload, the details of each\
    \ file should be displayed in separate\n    arrays. Right-click to view the browser’s\
    \ source code. You should see\n    something like Figure [9-10](#332054_4_En_9_Chapter.xhtml#Fig10).\n\
    \n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig10_HTML.jpg](images/332054_4_En_9_Chapter/332054_4_En_9_Fig10_HTML.jpg)\n\
    \nFigure 9-10.\n\nThe details of each uploaded file are now in separate arrays\n\
    \n2.  Now that we have an individual array of details for each file, we can\n\
    \    process them the same way as before. The simple way to do this would be\n\
    \    to copy the following block of code from the `else` block and paste\n   \
    \ it into the `for`\n    loop in place of the call to `print_r()` (changing\n\
    \    all instances of `$uploaded` to `$currentfile`):\n\n```\n    if ($this->checkFile($uploaded))\
    \ {\n    $this->checkName($uploaded, $renameDuplicates);\n    $this->moveFile($uploaded);\n\
    \    }\n    ```\n\nIt’s only four lines of code, so repeating it doesn’t seem\
    \ a big\n    deal. However, you might need to edit the code in the future, perhaps\
    \ to\n    add in further checks. You would then need to make the same changes\
    \ to\n    both blocks—and that’s where code errors begin to creep in. This is\
    \ now\n    a separate routine that should be in a dedicated internal method.\n\
    \nInstead of copying this section of code, cut it to your\n    clipboard.\n\n\
    3.  Create a new protected method inside the `Upload` class\n    definition and\
    \ paste the code you have just cut into it. The new method\n    looks like this:\n\
    \n```\n    protected function processUpload($uploaded, $renameDuplicates) {\n\
    \    if ($this->checkFile($uploaded)) {\n    $this->checkName($uploaded, $renameDuplicates);\n\
    \    $this->moveFile($uploaded);\n    }\n    }\n    ```\n\n4.  Invoke this new\
    \ method in the `for` loop and the\n    `else` block. The\n    complete updated\
    \ version of the `upload()` method now\n    looks like this:\n\n```\n    public\
    \ function upload($fieldname, $size = null, array $mime = null,\n    $renameDuplicates\
    \ = true) {\n    $uploaded = $_FILES[$fieldname];\n    if (!is_null($size) &&\
    \ $size > 0) {\n    $this->max = (int)$size;\n    }\n    if (!is_null($mime))\
    \ {\n    $this->permitted = array_merge($this->permitted, $mime);\n    }\n   \
    \ if (is_array($uploaded['name'])) {\n    // deal with multiple uploads\n    $numFiles\
    \ = count($uploaded['name']);\n    $keys = array_keys($uploaded);\n    for ($i\
    \ = 0; $i processUpload($currentfile, $renameDuplicates);\n    }\n    } else {\n\
    \    $this->processUpload($uploaded, $renameDuplicates);\n    }\n    }\n    ```\n\
    \n5.  Save Upload.php and try uploading multiple files. You should see\n    messages\
    \ relating to each file. Files that meet your criteria are\n    uploaded. Those\
    \ that are too big or of the wrong type are rejected. The\n    class also works\
    \ with single files.\n\nYou can check your code against `Upload_05.php` in the\n\
    \    `ch09/PhpSolutions/File`\n    folder.\n\nUsing the Upload Class\n\nThe `Upload`\n\
    class is simple to use—just import the namespace as described in\n“Importing a\
    \ namespaced class” earlier in this chapter. Include the\nclass definition in\
    \ your script and create an `Upload` object by\npassing the file path to the `upload_test`\
    \ folder as\nan argument, like this:\n\n```\n$destination = 'C:/upload_test/';\n\
    $loader = new Upload($destination);\n```\n\nTip\nThe trailing slash at the end\
    \ of the path to the upload folder is\noptional.\n\nBy default, the class permits\
    \ only images to be uploaded, but this can\nbe overridden. The class has the following\
    \ public methods:\n\n*   `upload($fieldname, $size = null, array $mime = null,\
    \ $renameDuplicates = true)`:\n    Saves the file(s) to the destination folder.\
    \ Spaces in filenames are\n    replaced by underscores. By default, files with\
    \ the same name as an\n    existing file are renamed by inserting a number in\
    \ front of the filename\n    extension. The method takes the following arguments:\n\
    \n*   `$fieldname`\n        (required): The name of the file input field in the\
    \ upload\n        form.\n\n*   `$size`\n        (optional): An integer to change\
    \ the default maximum file size in bytes\n        (default 51200, equivalent to\
    \ 50 KB).\n\n*   `$permitted`\n        (optional): An array of MIME types to allow\
    \ files other than images to\n        be uploaded.\n\n*   `$renameDuplicates`\n\
    \        (optional): Setting this to `false` overwrites\n        files with the\
    \ same name in the upload folder.\n\n*   `getMessages()`:\n    Returns an array\
    \ of messages reporting the status of uploads.\n\nPoints to Watch with File Uploads\n\
    The basic script in PHP Solution 9-1 shows that uploading files from\na web form\
    \ is fairly straightforward with PHP. The main causes of\nfailure are not setting\
    \ the correct permissions on the upload directory\nor folder and forgetting to\
    \ move the uploaded file to its target\ndestination before the end of the script.\
    \ The problem with the basic\nscript is that it lets just about anything to be\
    \ uploaded. That’s why\nthis chapter has devoted so much effort to building a\
    \ more robust\nsolution. Even with the extra checks performed in the Upload class,\
    \ you\nshould consider security carefully.\nLetting other people upload files\
    \ to your server exposes you to risk.\nIn effect, you’re allowing visitors the\
    \ freedom to write to your\nserver’s hard disk. It’s not something you would allow\
    \ strangers to do\non your own computer, so you should guard access to your upload\n\
    directory with the same degree of vigilance.\n\nIdeally, uploads should be restricted\
    \ to registered and trusted users,\nso the upload form should be in a password-protected\
    \ part of your site.\nRegistration enables you to block people who misuse your\
    \ trust. Also,\nthe upload folder does not need to be inside your site root, so\
    \ locate\nit in a private directory whenever possible. Uploaded images might\n\
    contain hidden scripts, so they shouldn’t be located in a folder that\nhas execute\
    \ permissions. Remember there is no way PHP can check that\nmaterial is legal\
    \ or decent, so immediate public display entails risks\nthat go beyond the merely\
    \ technical. You should also bear the following\nsecurity points in mind:\n\n\
    *   Set a maximum size for uploads both in the web form and on the\n    server\
    \ side.\n\n*   Restrict the types of uploaded files by inspecting the MIME type\n\
    \    in the `$_FILES`\n    array.\n\n*   Replace spaces in filenames with underscores\
    \ or hyphens.\n\n*   Inspect your upload folder on a regular basis. Make sure\
    \ there’s\n    nothing in there that shouldn’t be, and do some housekeeping from\
    \ time\n    to time. Even if you limit file upload sizes, you may run out of your\n\
    \    allocated space without realizing it.\n\nChapter Review\n\nThis chapter has\
    \ introduced you to creating a PHP class. If you’re new\nto PHP or programming,\
    \ you might have found it tough going. Don’t be\ndisheartened. The `Upload` class\
    \ contains\nmore than 150 lines of code, some of it complex, although I hope the\n\
    descriptions have explained what the code is doing at each stage. Even\nif you\
    \ don’t understand all the code, the `Upload` class will\nsave you a lot of time.\
    \ It implements the main security measures\nnecessary for file uploads, yet using\
    \ it involves as little as a dozen\nlines of code:\n\n```\nuse PhpSolutions\\\
    File\\Upload;\nif (isset($_POST['upload'])) {\nrequire_once 'PhpSolutions/File/Upload.php';\
    \ // use correct path\ntry {\n$loader = new Upload('C:/upload_test/');  // set\
    \ destination folder as argument\n$loader->upload('image');\n$result = $loader->getMessages();\n\
    } catch (Throwable $t) {\necho $t->getMessage();\n}\n}\n```"
  trans: "\n- 你不需要在`DOCTYPE`声明之上的 PHP 代码做任何修改。\n- 无论单文件还是多文件上传，代码都是相同的。\n\n> **注意**：IE\
    \ 10 之前的 Internet Explorer 只会上传选择的最后一个文件。\n\n1. 保存`file_upload.php`并在浏览器中重新加载。通过选择多个文件进行测试。点击上传时，每个文件的详细信息应显示在单独的数组中。右键查看浏览器的源代码，你应看到类似图\
    \ 9-10 的内容。\n\n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig10_HTML.jpg](img/332054_4_En_9_Fig10_HTML.jpg)\n\
    \n**图 9-10.** 每个上传文件的详细信息现在都位于单独的数组中\n\n2. 既然我们有了每个文件的详细信息数组，就可以像之前一样处理它们。简单的方法是将以下代码块从`else`块中复制，粘贴到`for`循环中替换对`print_r()`的调用（将所有`$uploaded`实例改为`$currentfile`）：\n\
    \n```\nif ($this->checkFile($uploaded)) {\n    $this->checkName($uploaded, $renameDuplicates);\n\
    \    $this->moveFile($uploaded);\n}\n```\n\n这只有四行代码，重复似乎不是什么大问题。然而，将来你可能需要编辑代码，也许是为了增加更多检查。那时你就需要对两个代码块做同样的修改——这正是代码错误开始蔓延的地方。现在这是一个独立的例程，应该放在专用的内部方法中。\n\
    \n不要复制这段代码，而是将其剪切到剪贴板。\n\n3. 在`Upload`类定义内部创建一个新的`protected`方法，并粘贴你刚刚剪切的代码。新方法如下所示：\n\
    \n```\nprotected function processUpload($uploaded, $renameDuplicates) {\n    if\
    \ ($this->checkFile($uploaded)) {\n        $this->checkName($uploaded, $renameDuplicates);\n\
    \        $this->moveFile($uploaded);\n    }\n}\n```\n\n4. 在`for`循环和`else`块中调用这个新方法。更新后的完整`upload()`方法现在如下所示：\n\
    \n```\npublic function upload($fieldname, $size = null, array $mime = null,\n\
    $renameDuplicates = true) {\n    $uploaded = $_FILES[$fieldname];\n    if (!is_null($size)\
    \ && $size > 0) {\n        $this->max = (int)$size;\n    }\n    if (!is_null($mime))\
    \ {\n        $this->permitted = array_merge($this->permitted, $mime);\n    }\n\
    \    if (is_array($uploaded['name'])) {\n        // 处理多文件上传\n        $numFiles\
    \ = count($uploaded['name']);\n        $keys = array_keys($uploaded);\n      \
    \  for ($i = 0; $i < $numFiles; $i++) {\n            $currentfile = [];\n    \
    \        foreach ($keys as $key) {\n                $currentfile[$key] = $uploaded[$key][$i];\n\
    \            }\n            $this->processUpload($currentfile, $renameDuplicates);\n\
    \        }\n    } else {\n        $this->processUpload($uploaded, $renameDuplicates);\n\
    \    }\n}\n```\n\n5. 保存`Upload.php`并尝试上传多个文件。你应该能看到与每个文件相关的消息。符合你标准的文件会被上传，过大或类型错误的文件会被拒绝。该类同样适用于单文件上传。\n\
    \n你可以将代码与`ch09/PhpSolutions/File`文件夹中的`Upload_05.php`进行对照。\n\n## 使用 Upload 类\n\
    \n`Upload`类使用起来很简单——只需按照本章前面“导入命名空间类”中的描述导入命名空间。在脚本中包含类定义，并通过将文件路径作为参数传递给`upload_test`文件夹来创建`Upload`对象，如下所示：\n\
    \n```\n$destination = 'C:/upload_test/';\n$loader = new Upload($destination);\n\
    ```\n\n> **提示**：上传文件夹路径末尾的斜杠是可选的。\n\n默认情况下，该类只允许上传图片，但这可以覆盖。该类有以下公共方法：\n\n- `upload($fieldname,\
    \ $size = null, array $mime = null, $renameDuplicates = true)`：将文件保存到目标文件夹。文件名中的空格会被下划线替换。默认情况下，与现有文件同名的文件会通过在文件扩展名前插入数字来重命名。该方法接受以下参数：\n\
    \    - `$fieldname`（必需）：上传表单中文件输入字段的名称。\n    - `$size`（可选）：一个整数，用于更改默认的最大文件大小（单位：字节，默认值\
    \ 51200，相当于 50 KB）。\n    - `$permitted`（可选）：一个 MIME 类型数组，用于允许上传图像以外的文件。\n    -\
    \ `$renameDuplicates`（可选）：将其设置为`false`会覆盖上传文件夹中同名的文件。\n\n- `getMessages()`：返回一个报告上传状态的数组。\n\
    \n## 文件上传的注意事项\n\nPHP 解决方案 9-1 中的基本脚本表明，通过 Web 表单上传文件对于 PHP 来说相当简单。失败的主要原因是没有为上传目录或文件夹设置正确的权限，以及忘记在脚本结束前将上传的文件移动到目标位置。基本脚本的问题在于它允许上传几乎任何内容。这就是本章投入大量精力构建更健壮解决方案的原因。即使`Upload`类执行了额外的检查，你也应该仔细考虑安全性。\n\
    \n允许他人将文件上传到你的服务器会给你带来风险。实际上，你在允许访问者自由地向服务器的硬盘写入数据。你不会允许陌生人在你自己的电脑上这样做，因此你应该以同样的警惕性来保护上传目录的访问权限。\n\
    \n理想情况下，上传应限于已注册的受信任用户，因此上传表单应位于网站中密码保护的部分。注册可以让你阻止滥用信任的人。此外，上传文件夹不需要位于网站根目录内，因此尽可能将其放在私有目录中。上传的图像可能包含隐藏脚本，因此不应将它们放在具有执行权限的文件夹中。请记住，PHP\
    \ 无法检查内容是否合法或得体，因此立即公开显示会带来超出单纯技术层面的风险。你还应该牢记以下安全要点：\n\n- 在 Web 表单和服务器端都设置上传文件的最大大小。\n\
    - 通过检查`$_FILES`数组中的 MIME 类型来限制上传文件的类型。\n- 将文件名中的空格替换为下划线或连字符。\n- 定期检查你的上传文件夹。确保其中没有不应存在的内容，并定期进行清理。即使你限制了文件上传大小，也可能在不知不觉中耗尽分配的磁盘空间。\n\
    \n## 章节回顾\n\n本章向你介绍了如何创建一个 PHP 类。如果你是 PHP 或编程新手，可能会觉得有些难度。不要灰心。`Upload`类包含超过 150\
    \ 行代码，其中一些代码很复杂，尽管我希望描述已经解释了代码在每个阶段的作用。即使你不理解所有代码，`Upload`类也能为你节省大量时间。它实现了文件上传所必需的主要安全措施，而使用它只需要十行左右的代码：\n\
    \n```\nuse PhpSolutions\\File\\Upload;\nif (isset($_POST['upload'])) {\n    require_once\
    \ 'PhpSolutions/File/Upload.php'; // 使用正确的路径\n    try {\n        $loader = new\
    \ Upload('C:/upload_test/');  // 将目标文件夹作为参数\n        $loader->upload('image');\n\
    \        $result = $loader->getMessages();\n    } catch (Throwable $t) {\n   \
    \     echo $t->getMessage();\n    }\n}\n```\n"
- fmt: "如果觉得这一章很难理解，可以先跳过，等积累了更多经验再回过头来看，到时候你会发现代码更容易理解。\n\n下一章将学习如何使用PHP的图像处理函数，从较大的图片生成缩略图。还会扩展本章的`Upload`类，将上传和调整图片大小合并为一步操作。\n\
    \n## 10. 生成缩略图\n\nPHP拥有一系列功能强大的图像处理函数。你在第[5](#332054_4_En_5_Chapter.xhtml)章已经见过其中之一——`getimagesize()`。除了提供图片尺寸的有用信息外，PHP还可以调整图片大小或旋转图片。它还能在不影响原图的情况下动态添加文字，甚至能即时创建图片。\n\
    \n为了让你领略PHP图像处理的能力，我将展示如何生成上传图片的较小副本。大多数情况下，你会使用专用图形处理程序（如Adobe Photoshop）来生成缩略图，因为这样可以更好地控制质量。但是，如果你希望允许注册用户上传图片，同时确保它们不超过最大尺寸，那么使用PHP自动生成缩略图就非常有用了。你可以只保存调整大小后的副本，也可以同时保存原图和副本。\n\
    \n在上一章中，你构建了一个处理文件上传的PHP类。本章将创建两个类：一个用于生成缩略图，另一个用于将上传和调整图片大小合并为一步操作。第二个类并非从零开始构建，而是基于第[9](#332054_4_En_9_Chapter.xhtml)章的`Upload`类。使用类的一大优势在于它们是**可扩展的**——基于另一个类的类可以继承其父类的功能。构建用于上传图片和生成缩略图的类需要大量代码。但是，一旦定义了这些类，使用它们只需要几行脚本。如果你赶时间，或者编写大量代码让你冷汗直冒，可以直接使用现成的类。稍后再回来学习代码的工作原理。它使用了大量在其它场景下也很有用的基础PHP函数。\n\
    \n本章将学习以下内容：\n\n*   缩放图片\n*   保存缩放后的图片\n*   自动调整大小并重命名上传的图片\n*   通过扩展现有类来创建子类\n\
    \n### 检查服务器能力\n\n在PHP中处理图像依赖于GD扩展。第[2](#332054_4_En_2_Chapter.xhtml)章推荐的集成PHP包默认支持GD，但你需要确保远程Web服务器上也已启用GD扩展。与之前章节一样，在你的网站上运行`phpinfo()`来检查服务器配置。向下滚动，直到找到如下截图中所示的区域（它应该位于页面大约一半的位置）：\n\
    \n![../images/332054_4_En_10_Chapter/332054_4_En_10_Figa_HTML.jpg](images/332054_4_En_10_Chapter/332054_4_En_10_Figa_HTML.jpg)\n\
    \n如果找不到这个区域，说明GD扩展未启用，你将无法在你的网站上使用本章的任何脚本。请请求启用它，或者更换一个主机。\n\n别忘了删除运行`phpinfo()`的文件，除非它位于受密码保护的目录中。\n\
    \n### 动态处理图像\n\nGD扩展允许你完全从零开始生成图像，或者处理现有图像。无论哪种方式，底层过程始终遵循四个基本步骤：\n\n1.  在服务器内存中为正在处理的图像创建一个资源。\n\
    2.  处理图像。\n3.  显示和/或保存图像。\n4.  从服务器内存中移除图像资源。\n\n这个过程意味着你始终只操作内存中的图像，而不是原始图像。除非在脚本终止前将图像保存到磁盘，否则任何更改都将被丢弃。处理图像通常需要大量内存，因此一旦不再需要图像资源，就必须立即销毁它。如果脚本运行缓慢或崩溃，很可能表明原始图像过大。\n\
    \n### 制作较小的图片副本\n\n本章的目标是向你展示如何在上传时自动调整图片大小。这涉及扩展第[9](#332054_4_En_9_Chapter.xhtml)章的`Upload`类。但是，为了更容易理解如何使用PHP的图像处理函数，我建议先从处理服务器上已有的图片开始，然后创建一个单独的类来生成缩略图。\n\
    \n#### 准备工作\n\n起点是以下简单的表单，它使用PHP解决方案7-3创建了`images`文件夹中照片的下拉菜单。你可以在`ch10`文件夹的`create_thumb_01.php`中找到代码。将其复制到`phpsols-4e`站点根目录下名为`gd`的新文件夹中，并重命名为`create_thumb.php`。\n\
    \n页面的主体部分中的表单如下所示：\n\n```\n<form action=\"<?= $_SERVER['PHP_SELF'] ?>\" method=\"\
    get\">\n    <select name=\"img\" id=\"img\">\n        <?php\n        $files =\
    \ new FilesystemIterator('../images');\n        foreach ($files as $file) {\n\
    \            $filename = $file->getFilename();\n            ?>\n            <option\
    \ value=\"<?= $file->getRealPath() ?>\"><?= $filename ?></option>\n        <?php\
    \ } ?>\n    </select>\n    <input type=\"submit\" value=\"Select\">\n</form>\n\
    ```\n\n加载到浏览器后，下拉菜单应显示`images`文件夹中照片的名称。这使得测试时可以快速选择图片。每个图片的完整路径通过调用`SplFileInfo::getRealPath()`方法插入到`<option>`标签的`value`属性中。\n\
    \n在你于第[9](#332054_4_En_9_Chapter.xhtml)章创建的`upload_test`文件夹内，创建一个名为`thumbs`的新文件夹，确保它具有PHP写入所需的权限。如果需要，请回顾上一章的“建立上传目录”部分。\n\
    \n#### 构建Thumbnail类\n\n为了生成缩略图，该类需要执行以下步骤：\n\n1.  获取原始图片的尺寸。\n2.  获取图片的MIME类型。\n\
    3.  计算缩放比例。\n4.  为原始图片创建正确MIME类型的图像资源。\n5.  为缩略图创建一个图像资源。\n6.  创建调整大小后的副本。\n7.\
    \  使用正确的MIME类型将调整大小后的副本保存到目标文件夹。\n8.  销毁图像资源以释放内存。\n\n除了生成缩略图外，该类会自动在文件名扩展名之前插入`_thb`，但构造函数方法的一个可选参数允许你更改这个值。另一个可选参数设置缩略图的最大尺寸。为了简化计算，最大尺寸仅控制缩略图两个尺寸中较大的那个。\n\
    \n为了避免命名冲突，`Thumbnail`类将使用命名空间。由于它是专门用于图像的，我们将在`PhpSolutions`文件夹中创建一个名为`Image`的新文件夹，并使用`PhpSolutions\\\
    Image`作为命名空间。\n\n有很多事情要做，所以我会把代码分成几个部分。它们都是同一个类定义的一部分，但以这种方式呈现脚本应该更容易理解，特别是如果你想在其它上下文中使用部分代码的话。\n\
    \n#### PHP解决方案10-1：获取图片详情\n\n这个PHP解决方案描述了如何获取原始图片的尺寸和MIME类型。\n\n1.  在`PhpSolutions`文件夹中创建一个名为`Image`的新文件夹。然后在该文件夹内创建一个名为`Thumbnail.php`的页面。该文件将只包含PHP代码，因此请去除编辑程序插入的任何HTML代码。\n\
    \n2.  在新文件顶部声明命名空间：\n\n```\nnamespace PhpSolutions\\Image;\n```\n\n3.  该类需要跟踪相当多的属性。像这样列出它们来开始类的定义："
  raw: "If you found this chapter to be a struggle, come back to it later\nwhen you\
    \ have more experience, and you should find the code easier to\nunderstand.\n\
    In the next chapter, you’ll learn how to use PHP’s image manipulation\nfunctions\
    \ to generate thumbnails from larger images. You’ll also extend\nthe Upload class\
    \ from this chapter to upload and resize images in a\nsingle operation.\n\n10. Generating\
    \ Thumbnail Images\n\nPHP has an extensive range of functions designed to work\
    \ with images.\nYou’ve already met one of them, `getimagesize()`, in\nChapter\
    \ [5](#332054_4_En_5_Chapter.xhtml). As well as providing useful\ninformation\
    \ about an image’s dimensions, PHP can manipulate images by\nresizing or rotating\
    \ them. It can also add text dynamically without\naffecting the original and can\
    \ even create images on the fly.\nTo give you just a taste of PHP image manipulation,\
    \ I’m going to show\nyou how to generate a smaller copy of an uploaded image.\
    \ Most of the\ntime you’ll want to use a dedicated graphics program, such as Adobe\n\
    Photoshop, to generate thumbnail images because it will give you much\nbetter\
    \ quality control. However, automatic thumbnail generation with PHP\ncan be very\
    \ useful if you want to allow registered users to upload\nimages while ensuring\
    \ they conform to a maximum size. You can save just\nthe resized copy or the copy\
    \ along with the original.\nIn the previous chapter you built a PHP class to handle\
    \ file uploads.\nIn this chapter you’ll create two classes: one to generate thumbnail\n\
    images, the other to upload and resize images in a single operation.\nRather than\
    \ build the second class from scratch, you’ll base it on the\n`Upload` class\n\
    from Chapter [9](#332054_4_En_9_Chapter.xhtml). A great advantage of using\nclasses\
    \ is that they’re **extensible**—a class based on\nanother can inherit the functionality\
    \ of its parent class. Building the\nclasses to upload images and generate thumbnails\
    \ from them involves a\nlot of code. But once you have defined the classes, using\
    \ them involves\nonly a few lines of script. If you’re in a rush or if writing\
    \ a lot of\ncode makes you break out in a cold sweat, you can just use the finished\n\
    classes. Come back later to learn how the code works. It uses many basic\nPHP\
    \ functions that you’ll find useful in other situations.\n\nIn this chapter, you’ll\
    \ learn about the following:\n\n*   Scaling an image\n\n*   Saving a rescaled\
    \ image\n\n*   Automatically resizing and renaming uploaded images\n\n*   Creating\
    \ a subclass by extending an existing one\n\nChecking Your Server’s Capabilities\n\
    Working with images in PHP relies on the GD extension. The all-in-one\nPHP packages\
    \ recommended in Chapter [2](#332054_4_En_2_Chapter.xhtml) support GD by default,\
    \ but you\nneed to make sure the GD extension has also been enabled on your remote\n\
    web server.  As in\nprevious chapters, run \n`phpinfo()`\n on your web site to\
    \ check the server’s configuration. Scroll\ndown until you reach the section shown\
    \ in the following screenshot (it\nshould be about halfway down the page):\n![../images/332054_4_En_10_Chapter/332054_4_En_10_Figa_HTML.jpg](images/332054_4_En_10_Chapter/332054_4_En_10_Figa_HTML.jpg)\n\
    If you can’t find this section, the GD extension isn’t enabled, so\nyou won’t\
    \ be able to use any of the scripts in this chapter on your web\nsite. Ask for\
    \ it to be enabled or move to a different host.\nDon’t forget to delete the file\
    \ that runs `phpinfo()` unless it’s\nin a password-protected directory.\n\nManipulating\
    \ Images Dynamically\n\nThe GD extension allows you to generate images entirely\
    \ from scratch or\nwork with existing images. Either way, the underlying process\
    \ always\nfollows four basic steps:\n\n1.  Create a resource for the image in\
    \ the server’s memory while it’s\n    being processed.\n\n2.  Process the image.\n\
    \n3.  Display and/or save the image.\n\n4.  Remove the image resource from the\
    \ server’s memory.\n\nThis process means that you are always working on an image\
    \ in memory\nonly and not on the original. Unless you save the image to disk before\n\
    the script terminates, any changes are discarded. Working with images\ntypically\
    \ requires a lot of memory, so it’s vital to destroy the image\nresource as soon\
    \ as it’s no longer needed. If a script runs slowly or\ncrashes, it probably indicates\
    \ that the original image is too large.\n\nMaking a Smaller Copy of an image\n\
    The aim of this chapter is to show you how to resize images\nautomatically on\
