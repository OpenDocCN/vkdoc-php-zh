    `if (empty($month) || empty($day) || empty($year)) {`


    `$result[1] = ''Please fill in all fields'';`


    `} elseif (!is_numeric($month) || !is_numeric($day) ||`


    `!is_numeric($year)) {`


    `$result[1] = ''Please use numbers only'';`


    `} elseif (($month < 1 || $month > 12) || ($day < 1 || $day > 31) ||`


    `($year < 1000 || $year > 9999)) {`


