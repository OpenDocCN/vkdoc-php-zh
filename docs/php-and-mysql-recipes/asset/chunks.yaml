- fmt: "# Objects Comparison and String Handling in PHP\n\n## Object Comparison\n\n\
    Objects that are instances of different classes are always different, but objects\
    \ instantiated from the same classes can be equal, when compared with the loose\
    \ operator (`==`), if they have the same attributes and values. If they are compared\
    \ with the strict operator (`===`), they must refer to the same instance to be\
    \ equal.\n\nA full list of the rules can be found in the PHP manual [here](http://php.net/manual/en/language.operators.comparison.php).\n\
    \nThe next example shows a few examples of how the compare operations work when\
    \ comparing values of different or same types.\n\n```php\n// 10_20.php\n\n$i =\
    \ 100;\n$f = 12.2;\n$s = \"abc\";\n$s2 = \"100\";\n\nvar_dump($i == $s2);\nvar_dump($i\
    \ === $s2);\nvar_dump($i != $s2);\nvar_dump($i !== $s2);\n```\n\nCHAPTER 10 ■\
    \ VARIABLES\n\n```php\nvar_dump($i >= $f);\nvar_dump($s <=> $s2);\nvar_dump($s2\
    \ <=> $s);\nvar_dump($s <=> $s);\n```\n\nThe output will be a series of `true`\
    \ and `false` values with the exception of the last three.\n\n```\nbool(true)\n\
    bool(false)\nbool(false)\nbool(true)\nbool(true)\nint(1)\nint(-1)\nint(0)\n```\n\
    \n## Recipe 10-11. Working with Strings\n\n### Problem\n\nThe most common use\
    \ of PHP is to generate HTML documents (or other dynamic documents). The documents\
    \ are often created by concatenating strings or inserting variable content into\
    \ other strings in the form of templates.\n\n### Solution\n\nPHP supports both\
    \ single (`'`) and double (`\"`) quotes when defining strings. There is no difference\
    \ in the resulting string but the way PHP handles the content of the string is\
    \ slightly different. When single quotes are used, the dollar sign (`$`) will\
    \ be accepted as a character without the need to escape it with a backslash (`\\\
    `) and there is no variable substitution. Variable substitution makes it possible\
    \ to embed variables into a string without using concatenation. Simple variables\
    \ can be embedded directly into a string (the double quoted version). More complex\
    \ variables like arrays and objects will have to be wrapped in curly brackets\
    \ (`{}`) to be embedded in a string.\n\n### How it Works\n\n```php\n// 10_21.php\n\
    \n$a = 5;\n$s1 = '$a = 5';\n$s2 = \"$a = 5\";\n```\n\nStrings can also be generated\
    \ by concatenating multiple variables using the `.` (period) operator. It is possible\
    \ to mix strings with single and double quotes and any variable. Variables will\
    \ be converted to strings before the concatenation.\n\nCHAPTER 10 ■ VARIABLES\n\
    \n```php\n// 10_22.php\n\n$a = 5;\n$s = 'This string is ' .\n     'created by\
    \ concatenation of ' .\n     'strings and the variable $a ' .\n     \"with the\
    \ value $a\\n\";\n```\n\nComparing strings can be done with the normal compare\
    \ operators but that might not always give the desired results.\n\n## Recipe 10-12.\
    \ Handling Floating Point Numbers\n\n### Problem\n\nWorking with floating point\
    \ numbers can cause some confusion. Numbers that have an exact representation\
    \ in base 10 do not always translate to an exact representation in the binary\
    \ base 2. This is causing rounding errors when math operations are performed on\
    \ these values. Even simple math and comparison operations that look obvious can\
    \ yield results that seem wrong.\n\n### Solution\n\nYou should never rely on comparing\
    \ two floating point values and expect to make exact comparisons.\n\nA better\
    \ way is to look at the difference between the two values and determine if the\
    \ difference is greater or less than a certain threshold.\n\n### How it Works\n\
    \nThe operation `8 - 7.7` should give the result `0.3` but performing the math\
    \ and then comparing to the value `0.3` will show a different result.\n\n```php\n\
    // 10_23.php\n\n$v = 8 - 7.7;\n$u = 0.3;\necho \"$v\\n\";\n\nif ($v == $u) {\n\
    \    echo \"\\$v == \\$u\\n\";\n} else {\n    echo \"\\$v != $u\\n\";\n}\n```\n\
    \nInstead of comparing if the two variables are identical, it would be better\
    \ to look at the difference between the two and compare that to a number representing\
    \ the precision required. This number is often referred to as epsilon.\n\nCHAPTER\
    \ 10 ■ VARIABLES\n\n```php\n// 10_24.php\n\n$epsilon = 0.00001;\n$v = 8 - 7.7;\n\
    $u = 0.3;\necho \"$v\\n\";\n\nif (abs($v - $u) < $epsilon) {\n    echo \"\\$v\
    \ == \\$u\\n\";\n} else {\n    echo \"\\$v != $u\\n\";\n}\n```\n\nThe output of\
    \ this script looks like this:\n\n```\n0.3\n$v == $u\n```"
