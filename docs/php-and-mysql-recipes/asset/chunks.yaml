    \ $v\\n\";\n}\n\n$b = [5 => 5, 4 => 4, 3 => 3, 2 => 2];\necho \"\\$b contains\\\
    n\";\nforeach($b as $k => $v) {\n    echo \"$k = $v\\n\";\n}\n```\n\n这个例子将产生以下输出，显示数组将按照元素创建的顺序遍历，而不是按照键或值的顺序。\n\
    \n```\n$a contains\n0 = 1\n1 = 2\n5 = 3\n6 = 4\n7 = 5\n10 = 6\n\n$b contains\n\
    5 = 5\n4 = 4\n3 = 3\n2 = 2\n```\n\n注意，所示的输出来自脚本的命令行执行。如果输出显示在浏览器中，则不会显示任何换行符。输出中没有\
