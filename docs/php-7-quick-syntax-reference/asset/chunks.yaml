    ## 24. Cookies


    A cookie is a small file kept on the client’s computer that can be used to store
    data relating to that user.


    ### Creating Cookies


    To create a cookie, the `setcookie` function is used. This function must be called
    before any output is sent to the browser. It has three mandatory parameters that
    contain the name, value, and expiration date of the cookie.


    ```php

    setcookie("lastvisit", date("H:i:s"), time() + 60*60);

    ```


    The value here is set with the `date` function, which returns a string formatted
    according to the specified format string. The expiration date is measured in seconds
    and is usually set relative to the current time in seconds retrieved through the
    `time` function. In this example, the cookie expires after one hour.


    ### Cookie Array


    Once the cookie has been set for a user, this cookie is sent along the next time
    that user views the page; it can then be accessed through the `$_COOKIE` array.


    ```php

    if (isset($_COOKIE[''lastvisit'']))

    echo "Last visit: " . $_COOKIE[''lastvisit''];

    ```


    ### Deleting Cookies


    A cookie can be deleted manually by re-creating that same cookie with an old expiration
    date. It is then removed when the browser is closed.


    ```php

    setcookie("lastvisit", 0, 0);

    ```


    ## 25. Sessions


    A session provides a way to make variables accessible across multiple web pages.
    Unlike cookies, session data is stored on the server.


    ### Starting a Session


    To begin a session, the `session_start` function is used. This function must appear
    before any output is sent to the web page.


    The `session_start` function sets a cookie on the client’s computer, containing
    an id used to associate the client with the session. If the client already has
    an ongoing session, the function resumes that session instead of starting a new
    one.


    ### Session Array


    With the session started, the `$_SESSION` array is used to store session data
    as well as retrieve it. As an example, the page view count is stored with the
    following code. The first time the page is viewed, the session element is initialized
    to one.


    ```php

    if(isset($_SESSION[''views'']))

    $_SESSION[''views''] += 1;

    else

    $_SESSION[''views''] = 1;

    ```


    This element can now be retrieved from any page on the domain as long as `session_start`
    is called on the top of that page.


    ```php

    echo ''Views: '' . $_SESSION[''views''];

    ```


    ### Deleting a Session


    A session is guaranteed to last until the user leaves the web site; then, the
    garbage collector is free to delete that session. To manually remove a session
    variable, the `unset` function can be used. For removing all session variables,
    there is the `session_destroy` function.


    ```php

    unset($_SESSION[''views'']); // destroy session variable

    session_destroy();         // destroy session

    ```


    ## 26. Namespaces


    Namespaces provide a way to avoid naming conflicts and to group namespace members
    into a hierarchy. Any code may be contained within a namespace, but only four
    code constructs are affected: classes, interfaces, functions, and constants.


    ### Creating Namespaces


    A construct that is not included in a namespace belongs to the global namespace.


    ```php

    // Global code/namespace

    class MyClass {}

    ```


    To assign the construct to another namespace, a namespace directive is defined.
    Any code constructs below the namespace directive belong to that namespace. The
    naming convention for namespaces is all lowercase.


    ```php

    namespace my;

    // Belongs to my namespace

    class MyClass {}

    ```


    A script file containing namespaced code must declare the namespace at the top
    of the file before any other code, markup, or whitespace. Declare statements are
    an exception to this because they must be placed before namespace declarations.


    ### Nested Namespaces


    Namespaces can be nested any number of levels deep to further define the namespace
    hierarchy. Like directories and files in Windows, namespaces and their members
    are separated with a backslash character.


    ```php

    namespace my\sub; class MyClass {} // my\sub\MyClass

    ```


    ### Alternative Syntax


    Alternatively, namespaces may be defined with the bracketed syntax commonly used
    in other programming languages. Just as with the regular syntax, no text or code
    may exist outside of the namespace.


    Multiple namespaces can be declared in the same file, although this is not considered
    good coding practice. If global code is to be combined with namespaced code, then
    the bracketed syntax must be used. The global code is then enclosed in an unnamed
    namespace block.


    ```php

    // Namespaced code

    namespace my

    {

    const PI = 3.14;

    }

    // Global code

    namespace

    {

    echo my\PI; // "3.14"

    }

    ```


    Unlike other PHP constructs, the same namespace may be defined in more than one
    file. This allows namespace members to be split up across multiple files.


    ### Referencing Namespaces


    A namespace member can be referred to in three ways: fully qualified, qualified,
    and unqualified. The fully qualified name can always be used. It consists of the
    global prefix operator (`\`), followed by the namespace path and the member. The
    global prefix operator indicates that the path is relative to the global namespace.


    ```php

    namespace my

    {

    class MyClass {}

    }

    namespace other

    {

    // Fully qualified name

    $obj = new \my\MyClass();

    }

    ```


    The qualified name includes the namespace path, but not the global prefix operator.
    Therefore, it can only be used if the wanted member is defined in a namespace
    below the current namespace in the hierarchy.


    ```php

    namespace my

    {

    class MyClass {}

    }

    namespace

    {

    // Qualified name

    $obj = new my\MyClass();

    }

    ```


    The member name alone, or unqualified name, may only be used within the namespace
    that defines the member.


    ```php

    namespace my

    {

    class MyClass {}

    // Unqualified name

    $obj = new MyClass();

    }

