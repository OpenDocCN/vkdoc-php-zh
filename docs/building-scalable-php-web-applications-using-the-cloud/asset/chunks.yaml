- fmt: '# 7.3 Setting Up the Application to Utilize Master/Replica Replication


    The application itself is already built to make use of read-only replicas. If
    you remember, we actually have *two* connection functions, `getReadWriteConnection()`
    and `getReadOnlyConnection()`. Right now, they are both pointing to the same server.
    To make use of our new read-only replica, all we have to do is change the connection
    information in the `getReadOnlyConnection()` function, and it will shift all read-only
    connections onto the replica server.


    All we have to do is change the `host` parameter in the `getReadOnlyConnection()`
    function to point to `DB.REPLICA.PRIVATE.IP`.


    Once this is done, we just need to redeploy our code. As usual, we can do this
    either by deploying to `template_node` and then re-creating the `webnode` servers
    from it or by deploying it to each server individually.


    # 7.4 Adding More PostgreSQL Replica Servers


    If separating out a single replica server does not give you the performance increase
    that you need, you can actually have as many replica servers as you need. You
    can do this by either replicating the template node and repeating the process
    in Section 7.2 or by directly replicating the replica server.


    Replicating the replica server is not quite as automatic as replicating the web
    nodes, but it can save a few steps. In order to do this, you need to first enable
    backups on your current `dbreplica` node and then create new replica instances
    from the backups of `dbreplica`. After you create each replica instance, you need
    to `ssh` into the new replica server and set the `listen_addresses` value in `/var/lib/pgsql/data/postgresql.conf`
    to its own private IP address, because it will be set to the one for `dbreplica`
    by default. After doing this, you will need to restart PostgreSQL with `systemctl
    restart postgresql`.


    After you create a number of copies of your database, you need to modify your
    code to make use of your databases. It would be nice if we could create a load
    balancer for our replica databases and then just point all of our application
    code to the load balancer. Unfortunately, Linode does not currently have the ability
    to create *internal* load balancers (i.e., a load balancer that only accepted
    requests on the private network), so we will have to provide our own load distribution
    mechanism. We will instead emulate this feature in the application code by selecting
    a server at random when getting database connections. Because we don’t have a
    load balancer, we will have to hard-code the list of servers in your application
    code, and adding a new replica server will also require modifying the application
    code and repushing that code to all of the web servers.


    To understand how the application code will be modified, let’s say that we now
    have three replica servers, with the private IP addresses of `DB.REPLICA.PRIVATE.IP`,
    `DB.REPLICA2.PRIVATE.IP`, and `DB.REPLICA3.PRIVATE.IP`. To get our read-only connection
    to cycle between these, we will rewrite our `getReadOnlyConnection()` function
    according to Figure [7-2](#487291_1_En_7_Chapter.xhtml#Fig2).


    Once this code is in place in our cluster, all of our read-only requests will
    be load balanced across multiple replica servers like it shows in Figure [7-3](#487291_1_En_7_Chapter.xhtml#Fig3).
    This will mean that our only bottleneck is on read-write database requests. Most
    applications are dominated by read-only requests anyway, so having a bottleneck
    on read-write requests is usually unproblematic.


    ![../images/487291_1_En_7_Chapter/487291_1_En_7_Fig3_HTML.jpg](images/487291_1_En_7_Chapter/487291_1_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Diagram of a Multi-Replica Database Configuration


    ![../images/487291_1_En_7_Chapter/487291_1_En_7_Fig2_HTML.png](images/487291_1_En_7_Chapter/487291_1_En_7_Fig2_HTML.png)


    Figure 7-2


    Connecting to a Group of Replica Servers


    # 7.5 Replicating Across Datacenters


    For very large applications, sometimes you want better geographic coverage than
    can be provided in a single datacenter. Additionally, ultracritical applications
    may need the reliability that comes from having multiple datacenters so that if
    one datacenter goes down, the application can continue to at least partially function.


    The creation of this sort of setup is a bit more involved, so this book will not
    present a step-by-step method as has been the case for other architectures. However,
    these are the basic steps you will need to perform to achieve this functionality:


    1.  Change `dbmaster` so that its `listen_address` is set to `*`. Since it will
    be receiving requests from other datacenters, it has to listen on the public IP
    address as well.


    2.  Firewall `dbmaster` to prevent access from unwanted third parties.


    3.  Encrypt your connections to PostgreSQL using SSL (see later how to enable
    this).


    4.  Deploy a "primary replica" in the new datacenter, which will be a replica
    to `dbmaster` but will also be a master for other replicas on the network if you
    need them. This is still read-only, but it is a replica that streams to other
    replicas.


    5.  Deploy a copy of your web application to the new datacenter, which has the
    public IP address of `dbmaster` for read-write connections and the list of private
    IP addresses of the local replicas for read-only connections.


    At the end of the process, your cluster architecture should look something like
    Figure [7-4](#487291_1_En_7_Chapter.xhtml#Fig4).


    As your deployment becomes more complex, your need for automated deployment handling
    increases. See Chapter [12](#487291_1_En_12_Chapter.xhtml) for more information
    on automated deployments.


    ![../images/487291_1_En_7_Chapter/487291_1_En_7_Fig4_HTML.jpg](images/487291_1_En_7_Chapter/487291_1_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Diagram of a Multisite Architecture


    If you need read-write access to the database within your local setup, the configuration
    becomes still harder, as you now have to manage how synchronization occurs between
    your systems and what happens if the network connection between them goes down.
    In cases like this, you often separate out local (unshared) and global (shared)
    data into *separate* database instances. For the unshared data, you will want
    a master database at each location. For the shared data, you will set it up similar
    to Figure [7-4](#487291_1_En_7_Chapter.xhtml#Fig4).


    ## Enabling Encryption On PostgreSQL


    To enable encryption on PostgreSQL, you need to go to the directory `/var/lib/pgsql/data`
    as the root user. From there you need to edit `postgresql.conf` and add the following
    line:


    ```

    ssl = on

    ```


    Next, you need to generate an SSL key and self-signed certificate. From that same
    directory, issue the following command (all on one line):


    ```

    openssl req -nodes -new -x509 -keyout server.key -out server.crt

    ```


    This will require you to fill out a short form which will be encoded into your
    certificate. Then, you need to set the permissions on the generated files:


    ```

    chown postgres:postgres server.key server.crt

    chmod 600 server.key

    ```


    If you restart the database at this point, the server will *allow* SSL connections
    but not *require* them. To require SSL connections, you can change any or all
    of the `host` lines in `pg_hba.conf` to be `hostssl` instead.


    Once all of your changes are made, you can restart the database with:


    ```

    systemctl restart postgresql

    ```'
