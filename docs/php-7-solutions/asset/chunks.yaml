  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n---\n\n\n如果觉得这一章很难理解，可以先跳过，等积累了更多经验再回过头来看，到时候你会发现代码更容易理解。\n\
    \n下一章将学习如何使用 PHP 的图像处理函数，从较大的图片生成缩略图。还会扩展本章的 `Upload` 类，将上传和调整图片大小合并为一步操作。\n\n\
    ## 10. 生成缩略图\n\nPHP 拥有一系列功能强大的图像处理函数。你在第 5 章已经见过其中之一——`getimagesize()`。除了提供图片尺寸的有用信息外，PHP\
