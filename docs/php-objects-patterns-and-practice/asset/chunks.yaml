  trans: '

    ##### 一个命令


    你已经见过`Command`基类，第 11 章已经详细介绍了命令模式，因此无需再深入探讨命令。不过，让我们用一个简单具体的`Command`对象来做个收尾：


    ```

    // 清单 12.18

    class DefaultCommand extends Command

    {

    public function doExecute(Request $request)

    {

    $request->addFeedback("欢迎来到 WOO");

    include(__DIR__ . "/main.php");

    }

    }

    ```


    这个`Command`对象是在未收到对某个特定`Command`的明确请求时，由`CommandResolver`提供的。


    你可能已经注意到，抽象基类自己实现了`execute()`方法，该方法会向下调用其子类的`doExecute()`实现。这样一来，我们只需修改基类，就能为所有命令添加设置和清理代码。


    `execute()`方法接收一个`Request`对象，该对象提供了对用户输入以及`setFeedback()`方法的访问。`DefaultCommand`利用这一点来设置一条欢迎消息。


    最后，该命令通过调用`include()`将控制权分发到视图。将命令到视图的映射嵌入到`Command`类中是最简单的分发机制；但对于小型系统来说，它可能完全够用。更灵活的策略可以在“应用程序控制器”部分找到。


    文件`main.php`包含一些 HTML 代码以及对`Request`对象的一次调用，用于检查是否有任何反馈（稍后我将更详细地介绍视图）。现在，所有组件都已就位，可以运行系统了。以下是输出：


    ```


    Woo! 这是 WOO！


    欢迎来到 WOO


    ```


    如你所见，默认命令设置的反馈消息已经出现在输出中。让我们回顾一下得出这一结果的完整流程。


    ##### 概述


    本节中介绍的类的细节可能会掩盖前端控制器模式的简洁性。图 12-4 展示了一个说明请求生命周期的时序图。


    ![A314621_5_En_12_Fig4_HTML.gif](img/A314621_5_En_12_Fig4_HTML.gif)


    图 12-4. 运行中的前端控制器


    如你所见，前端控制器将初始化工作委托给`ApplicationHelper`对象（该对象可以使用缓存来缩短任何昂贵的设置过程）。然后，`Controller`从`CommandResolver`对象获取一个`Command`对象。最后，它调用`Command::execute()`来启动应用程序逻辑。


    在此模式实现中，`Command`自身负责将任务委托给视图层。你可以在下一节中看到对此的改进。


    #### 影响


    前端控制器并非为胆小者设计。它确实需要在看到收益之前投入大量的前期开发工作。如果你的项目需要快速交付，或者项目规模小到前端控制器框架比系统其余部分还要重，那么这是一个严重的缺点。


    话虽如此，一旦你在一个项目中成功部署了前端控制器，你会发现你可以用惊人的速度将其复用于其他项目。你可以将其大部分功能抽象到库代码中，从而有效地为自己构建一个可重用的框架。


    所有配置信息必须在每次请求时加载，这是另一个缺点。所有方法在某种程度上都会受到这个问题的影响，但前端控制器通常需要额外的信息，例如命令和视图的逻辑映射。


    通过缓存此类数据，可以大大减轻这种开销。最高效的做法是将这些数据作为原生 PHP 代码添加到你的系统中。如果你是系统的唯一维护者，这没问题；但如果你有非技术用户，你可能需要提供一个配置文件。不过，你仍然可以通过创建一个系统来使原生
    PHP 方法自动化，该系统读取配置文件，然后构建 PHP 数据结构，并将其写入缓存文件。一旦创建了原生 PHP 缓存，系统会优先使用它而不是配置文件，直到进行更改并需要重建缓存。


    从好的方面来看，前端控制器集中了系统的表示逻辑。这意味着你可以在一个地方（好吧，至少是在一组类中）控制请求的处理方式和视图的选择方式。这减少了重复，并降低了出现
    Bug 的可能性。


    前端控制器还具有很强的可扩展性。一旦你有了一个核心并使其运行，你就可以非常轻松地添加新的`Command`类和视图。


    在本示例中，命令处理它们自己的视图分发。如果你将前端控制器模式与一个有助于视图（以及可能的命令）选择的对象结合使用，那么该模式就能对导航进行出色的控制，而当表示控制分散在整个系统中时，这种控制很难优雅地维护。我将在下一节介绍这样一个对象。


    ### 应用程序控制器


    允许命令调用它们自己的视图对于较小的系统来说是可以接受的，但这并不理想。最好尽可能地将你的命令与视图层解耦。


    应用程序控制器负责将请求映射到命令，并将命令映射到视图。这种解耦意味着在无需更改代码库的情况下，切换不同的视图集变得更加容易。它还允许系统所有者更改应用程序的流程，同样无需触及任何内部代码。通过支持命令解析的逻辑系统，该模式也使得同一个命令在系统中的不同上下文中使用变得更加容易。


    #### 问题


    记住示例问题的性质。管理员需要能够向系统添加一个场地，并将一个空间与之关联。因此，系统可能支持`AddVenue`和`AddSpace`命令。根据到目前为止的示例，这些命令将使用从路径（`/addvenue`）到类（`AddVenue`）的直接映射进行选择。


    广义上讲，对`AddVenue`命令的成功调用应会导致对`AddSpace`命令的初始调用。这种关系可能被硬编码到类本身中，即`AddVenue`在成功时调用`AddSpace`。然后，`AddSpace`可能包含一个视图，该视图包含用于将空间添加到场地的表单。


    两个命令都可能与至少两个不同的视图相关联：一个用于呈现输入表单的核心视图，以及一个错误或“感谢”屏幕。根据已经讨论过的逻辑，`Command`类本身会包含这些视图（通过使用条件测试来决定在何种情况下显示哪个视图）。


    只要命令始终以相同的方式被使用，这种程度的硬编码是可以接受的。但是，如果我希望在某些情况下为`AddVenue`设置一个特殊的视图，并且我希望更改一个命令导致另一个命令的逻辑（例如，一个流程可能在成功的场地添加和开始空间添加之间包含一个额外的屏幕），那么它就开始失效了。如果你的每个命令只使用一次，与其他命令保持一种关系，并且只使用一个视图，那么你应该对命令之间的关系及其视图进行硬编码。否则，你应该继续阅读。


    一个应用程序控制器类可以接管这个逻辑，从而释放`Command`类的压力，让它们专注于自己的工作：处理输入、调用应用程序逻辑以及处理任何结果。

    '
- fmt: '#### Implementation


    As always, the key to this pattern is the interface. An application controller
    is a class (or a set of classes) that the front controller can use to acquire
    commands based on a user request and to find the right view to present after the
    command has been run. You can see the bare bones of this relationship in Figure
    [12-5](#A314621_5_En_12_Chapter.html#Fig5).


    ![A314621_5_En_12_Fig5_HTML.gif](A314621_5_En_12_Fig5_HTML.gif)


    Figure 12-5.


    The Application Controller pattern


    As with all patterns in this chapter, the aim is to make things as simple as possible
    for the client code—hence the spartan front controller class. Behind the interface,
    though, I must deploy an implementation. The approach laid out here is just one
    way of doing it. As you work through this section, remember that the essence of
    the pattern lies in the way that the participants (the application controller,
    the commands, and the views) interact—and not with the specifics of this implementation.


    Let’s begin with the code that uses the application controller.


    ##### The Front Controller


    Here is how the `FrontController` might work with the `AppController` class (simplified
    and stripped of error handling):


    ```

    // listing 12.19

    // Controller

    private function __construct()

    {

    $this->reg = Registry::instance();

    }

    public function handleRequest()

    {

    $request = $this->reg->getRequest();

    $controller = new AppController();

    $cmd = $controller->getCommand($request);

    $cmd->execute($request);

    $view = $controller->getView($request);

    $view->render($request);

    }

    ```


    Moving on from the previous example, the principal difference is that, in addition
    to changing a class name from `CommandResolver` to `AppController` (admittedly
    a somewhat cosmetic move), we now retrieve a `ViewComponent` as well as a `Command`
    object. Notice that this code uses a registry object to acquire the `Request`
    object. We might also store the `AppController` object in the `Registry`—even
    if it isn’t used elsewhere by other components. Classes that avoid direct instantiation
    are generally more flexible and easier to test.


    So by what logic does the `AppController` know which view to associate with which
    command? As always with object-oriented code, the interface is more important
    than the implementation. Let’s fill in a possible approach, however.


    ##### Implementation Overview


    A `Command` class might demand a different view according to different stages
    of operation. The default view for the `AddVenue` command might be a data input
    form. If the user adds the wrong kind of data, the form may be presented again,
    or an error page may be shown. If all goes well, and the venue is created in the
    system, then I may wish to forward to another in a chain of `Command` objects:
    `AddSpace`, perhaps.


    The `Command` objects tell the system of their current state by setting a status
    flag. Here are the flags that this minimal implementation recognizes (set as a
    property in the `Command` superclass):


    ```

    // listing 12.20

    const CMD_DEFAULT = 0;

    const CMD_OK = 1;

    const CMD_ERROR = 2;

    const CMD_INSUFFICIENT_DATA = 3;

    ```


    The application controller finds and instantiates the correct `Command` class
    using the `Request` object. Once it has been run, the `Command` will be associated
    with a status. This combination of `Command` and status can be compared against
    a data structure to determine which command should be run next, or—if no more
    commands should be run—which view to serve up.


    ##### The Configuration File


    The system’s owner can determine the way that commands and views work together
    by setting a set of configuration directives . Here is an extract:


    This XML fragment shows one strategy for abstracting the flow of commands and
    their relationship to views from the `Command` classes themselves. The directives
    are all contained within a `control` element.


    Each command element defines `path` and `class` attributes which describe basic
    command mapping. The logic for views is more complex, however. A `view` element
    at the top level of a `command` defines a default relationship. In other words,
    if no more specific condition is matched, this `view` will be used for a command.
    The `status` elements define these specific conditions. Their `value` attributes
    should match one of the command statuses you have seen. When a command’s execution
    renders a `CMD_OK` status, for example, if an equivalent status has been defined
    in the XML document, the corresponding `view` element will be used.


    A `view` element defines a `name` attribute. This value is used to build a path
    to a template file which can then be included.


    A `command` or a `status` element might contain a `forward` element instead of
    a `view`. The WOO system treats a `forward` as a special kind of `view` which,
    instead of rendering a template, reinvokes the application with a new path.


    Let’s work through a fragment of this XML in the light of that explanation:


    When the system is invoked with the `/addvenue` path, the `AddVenue` command is
    called. It then generates a status value—one of `CMD_DEFAULT`, `CMD_OK`, `CMD_ERROR`,
    or `CMD_INSUFFICIENT_DATA`. For any status but `CMD_OK`, the `addvenue` template
    will be invoked. If the command returns `CMD_OK` status, however, the condition
    is matched. The `status` element could simply contain another view that would
    be included in place of the default. Here, though, the `forward` element comes
    into play. By forwarding to another `command`, the configuration file delegates
    all responsibility for handling views to the new element. The system will then
    begin again with the `/addspace` path in a new request.'
