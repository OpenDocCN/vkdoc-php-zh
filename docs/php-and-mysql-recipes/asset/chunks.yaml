    \ `mt_srand()`），因为这会自动完成。\n\n另一个随机数生成器叫做 `mt_rand()`，它基于具有已知特性的生成器，并且通常比 `rand()`\
    \ 函数快得多。该实现被创建为 `rand()`、`srand()` 和 `getrandmax()` 函数的直接替代品，只需加 `mt_` 前缀即可。`mt`\
    \ 来源于所使用的生成器名称——梅森旋转算法（Mersenne Twister）。\n\n### 工作原理\n\n下一个示例展示了如何生成一个介于 `0`\
    \ 和最大随机值之间的随机数，以及如何生成两个边界之间的随机数。\n\n```php\n<?php\n// 3_19.php\n\n$r1 = mt_rand();\n\
    $rmax = mt_getrandmax();\n$r2 = mt_rand(-5, 5);\necho \"$r1\\n$rmax\\n$r2\\n\"\
    ;\n```\n\n随机函数总是返回介于默认边界或提供给函数的参数边界之间的整数。提供边界可以生成负随机数。随机数可以是其中一个边界，也可以是两者之间的任意值，这意味着\
    \ `mt_rand(1, 5)` 可以产生值 `1`、`2`、`3`、`4` 和 `5`。生成一个介于 `1` 和 `2` 之间、精度为 `3` 位小数的随机数可以这样做：\n\
    \n```php\n<?php\n// 3_20.php\n\n$r = mt_rand(0, 1000);\n$v = 1 + $r / 1000;\n\
    echo \"Random value between 1 and 2 is $v\\n\";\n```\n\n第 3 章 ■ 执行数学运算\n\n## 配方\
    \ 3-9\\. 用对数函数表示比率\n\n### 问题\n\n两个数之间的比率通常用分贝刻度（`0` dB）表示。这是一个可以使用加法而非乘法来表示变化的刻度。例如，发射器的功率水平通常相对于\
    \ `1` mW 或 `0` dBm 的参考值给出。将功率加倍等同于增加 `3` dB，将功率减半等同于减去 `3` dB。\n\n### 解法\n\n将比率转换为分贝刻度需要使用对数函数。PHP\
    \ 实现了基于自然常数 `e ~ 2.718282` 的自然对数函数 `log()`，以及使用基数为 `10` 的 `log10()` 函数。数字 `e`\
    \ 被定义为一个名为 `M_E` 的常量。\n\n### 工作原理\n\n以分贝表示功率比率的公式定义为 `10*log10(P2/P1)`，其中 `P1`\
    \ 和 `P2` 是功率水平。类似的公式用于以分贝表示电压和电流比率，公式为 `20*log10(V2/V1)`。在下一个示例中，我们计算 `1` W 相对于\
    \ `1` mW 的比率，并以分贝表示。通常使用 dBm 作为单位，以表明该值是相对于 `1` mW 的。\n\n```php\n<?php\n// 3_21.php\n\
    \n$ref = 0.001; // 1 mW.\n$p = 1.0; // 1 W\n$r = $p / $ref;\n$db = 10*log10($r);\n\
    echo $db . \" dBm\\n\";\n```\n\n对数函数只对正数有效。计算 `0` 的对数会得到负无穷或 `–INF`。所有对数函数在参数为\
    \ `1` 时返回 `0`。最后，所有对数函数在提供底数时返回 `1`。例如 `log(e) = 1`，`log10(10) = 1` 等。\n\n`log10()`\
    \ 是一个便捷函数，因为 `log()` 函数接受第二个参数来定义底数。如果未向函数传递该参数，底数参数默认为 `M_E`。因此，调用 `10*log($r,\
    \ 10);` 将提供与 `10*log10($r);` 相同的结果。\n\n## 配方 3-10\\. 计算未来价值\n\n### 问题\n\n计算本金按一定利率的未来价值需要使用指数函数。这些函数在\
    \ PHP 中是如何实现和使用的？\n```"
- fmt: "指数函数定义为基数乘幂，`pow()`函数用于计算`a`的`x`次幂的值。自然指数函数由自然数`e`定义，PHP有一个专门的函数`exp()`来计算`e`的`x`次幂。该函数只接受一个参数，因为基数值固定为`e`。\n\
    \n# 第3章 ■ 执行数学运算\n\n## 工作原理\n\n假设你要计算一笔1000美元贷款、年利率5%、每年计息次数分别为1、2、4、12次时的复利：\n\
    \n```php\n<?php\n// 3_22.php\n\n$principal = 1000;\n$interest = 0.05;\n$periods\
    \ = array(1, 2, 4, 12);\n\nforeach ($periods as $p) {\n    $ci = $principal *\
    \ pow(1 + $interest / $p, $p);\n    echo \"Periods: $p, future value = $ci\\n\"\
    ;\n}\n```\n\n以下结果显示，即使年利率为5%，一年后的未来价值也会因计息次数的不同而变化。\n\n```\nPeriods: 1, future\
    \ value = 1050\nPeriods: 2, future value = 1050.625\nPeriods: 4, future value\
    \ = 1050.9453369141\nPeriods: 12, future value = 1051.1618978817\n```\n\n使用相同的公式并不断增加计息频率，我们可以计算出连续复利（即`e`）的值。\n\
    \n```php\n<?php\n// 3_23.php\n\n$interest = 1;\n$periods = array(1, 2, 4, 12,\
    \ 52, 365, 8670, 525600, 31536000);\n\nforeach ($periods as $p) {\n    $ci = pow(1\
    \ + $interest / $p, $p);\n    echo \"Periods: $p, future value = $ci\\n\";\n}\n\
    ```\n\n计息频率越高，结果越接近自然数`e`。\n\n```\nPeriods: 1, future value = 2\nPeriods: 2, future\
    \ value = 2.25\nPeriods: 4, future value = 2.44140625\nPeriods: 12, future value\
    \ = 2.6130352902247\nPeriods: 52, future value = 2.6925969544372\nPeriods: 365,\
    \ future value = 2.714567482022\nPeriods: 8670, future value = 2.7181250813746\n\
    Periods: 525600, future value = 2.7182792426664\nPeriods: 31536000, future value\
    \ = 2.718281778469\n```\n\n该示例展示了当计息频率增加到每秒钟一次时的情况。即使进一步提高计息次数，结果也只会越来越接近自然指数`e`。\n\
    \n# 第3章 ■ 执行数学运算\n\n## 配方3-11：使用三角函数计算距离和方向\n\n### 问题\n\n你正在创建一个提供全国酒店列表的网站，希望提供一项服务，允许用户查找离给定位置最近的酒店。\n\
    \n### 解决方案\n\n三角函数将三角形的角度与其边长相关联，通常用于模拟周期现象以及计算球面上两点之间的距离和方向，但它们还有许多其他用途。\n\n\
    在直角三角形中，有六种基本三角函数，对应六种可能的边比。\n\nPHP中所有三角函数操作的角度单位均为弧度而非角度。为了在弧度和角度之间进行转换，PHP提供了`deg2rad()`和`rad2deg()`函数。\n\
    \n你可以使用Google Maps API查找列表中每家酒店的确切位置，或者通过邮政编码进行近似定位，执行数据库查询将邮政编码转换为经度和纬度。\n\n\
    当你知道两个位置的坐标后，可以假设地球近似为球形，使用三角函数来计算距离。\n\n### 工作原理\n\n地球半径约为6271公里或3959英里。这些数字被定义为常量，以便用户选择使用哪种单位。所有三角函数都适用于半径为1个单位的圆，这使得缩放至任意球体变得容易。\n\
    \n经度和纬度以浮点数形式提供，单位为角度，因此`Pos2Distance()`函数首先将这些值转换为PHP三角函数所使用的弧度。\n\n```php\n\
    <?php\n// 3_24.php\n\ndefine('RADIUS_KM', 6371);\ndefine('RADIUS_MILES', 3959);\n\
    \nfunction Pos2Distance($pos1, $pos2, $unit = RADIUS_KM, $precision = 0) {\n \
    \   $lon1 = deg2rad($pos1['lon']);\n    $lat1 = deg2rad($pos1['lat']);\n```"
