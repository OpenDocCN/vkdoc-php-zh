  trans: '

    # 安全编程


    不要向用户透露他们无需知道的信息。在线上环境中，我们不会使用 `print_r` 向用户显示信息，因为它会向用户展示我们在程序之间传递的所有信息。这可能会对我们程序中使用的数据造成重大的安全问题。


    ## 柯利定律：只做一件事


    你看过 1991 年的电影《城市乡巴佬》吗？没错，就是那部由比利·克里斯托主演的治愈系西部喜剧。杰克·帕兰斯扮演的柯利是一位饱经风霜的老牛仔，他知晓生活的秘诀，并勉为其难地与克里斯托饰演的米奇分享：


    *   *柯利*：你知道生活的秘诀是什么吗？

    *   *（举起一根手指）*

    *   *柯利*：就是这个！

    *   *米奇*：你的手指？

    *   *柯利*：一件事。就一件事。你坚持做这一件事，其他都无关紧要。

    *   *米奇*：但那"一件事"是什么呢？

    *   *柯利*：（微笑着）这就要*你*自己去发现了。


    我们大可以放心，柯利指的不是简洁代码的原则。但巧合的是，他阐述了一个我们可以用来编写简洁函数的原则。每个函数应该只做一件事。仅仅是一件事。


    > **注意**

    > 杰夫·阿特伍德写了一篇关于将柯利定律应用于简洁代码的有趣博客文章。请阅读 [`blog.codinghorror.com/curlys-law-do-one-thing/`](http://blog.codinghorror.com/curlys-law-do-one-thing/)。


    ## 程序设计逻辑


    简洁代码是更易于理解的代码。如果函数只做一件事，它们通常会很短。短代码比长代码更容易阅读和理解。一个函数的指令长度几乎不应该超过一个屏幕。如果你发现你的函数变得很长，请重新评估你的设计逻辑。这个函数能否分解成多个更简单的函数？如果我们能够阅读并理解自己的代码，发现错误就会容易得多——而且我们*一定*会犯错误！如果你发现自己花费了
    50% 的开发时间在代码中追逐错误，请不要感到惊讶。


    在之前的代码示例中，我们看到了两个简洁的函数，每个函数只做一件事。一个函数显示测验，另一个函数显示响应。


    ## 代码即诗


    追求富有表现力、优美的代码。追求易于阅读的代码。当你用代码开发新的解决方案时，你会花相当大一部分时间阅读自己的代码。代码就像诗歌。你只写一次，但会阅读很多次。所以，请像写诗一样编写代码：字斟句酌。


    在我们结束编码示例之前，让我们对页面数据类进行一些修改，以加强安全性。


    ## 面向对象编程：使用构造函数、Getter 和 Setter


    自从我们上次更新页面数据类已经有一段时间了。如果你忘记了它当前的结构，请参阅以下代码。


    ```

    清单 3-18

    Page_Data.class.php

    ```


    如我们所见，类名和文件名是相同的。在面向对象语言中，这种做法是标准实践。我们最初在类本身内部创建了字符串，并将它们设置为空字符串。然而，类包含一个称为*构造函数*的独特方法（函数），其主要目的是初始化属性（变量）。我们可以在构造函数中为每个字符串提供默认值。当使用
    `new` 关键字从类创建对象时，会自动调用构造函数。


    ```

    function __construct() {

    print "In constructor";

    }

    ```


    对于 PHP 类，两个下划线符号（`__`）和单词 `construct` 标识了构造函数。在这个例子中，我们只是打印一条消息。但是，我们很快就会提供一些有意义的信息。


    让我们更深入地了解一下面向对象编程，以理解为什么使用构造函数如此重要。


    一个真正的面向对象程序必须提供三种方法论。其中包括：


    *   **封装**：通过使用类、对象和其他面向对象技术，在代码周围形成一个保护层（胶囊）来保护程序的所有部分。

    *   **多态性**：调用和使用具有相同名称但接受和产生不同结果的项（如方法/函数）的能力。例如，可以有两个名为 `adder` 的函数。一个函数将两个整数相加，另一个将两个浮点数相加。程序如何知道该使用哪一个？通过传递给函数的内容（整数或浮点数）以及函数返回的内容来判断，这通常称为函数头信息。

    *   **继承**：一个对象继承另一个对象特征的能力。就像我们继承了父母的特征，但同时仍保留了一些自己的独特性。


    让我们为我们的类提供改进的封装，同时提高程序的可靠性、完整性和安全性。


    ```

    清单 3-19

    Construct_Page_Data.class.php

    ```


    在前面的示例中，我们在类的开头声明（创建）了每个属性。然后调用构造函数为每个属性赋予一个初始值，以防某些使用这个类的程序没有使用该属性。但是，我们仍然有一个潜在问题：任何程序都可以将几乎任何东西加载到这些属性中。这可能会损害网页的显示，甚至更糟的是，当我们讨论数据库时，可能会为黑客提供访问我们信息的机会。让我们通过拒绝不符合要求的内容来增加一些更好的安全性和可靠性。为此，我们将创建
    setter 和 getter 方法。


    ```

    title = "Title Goes Here";

    $this->content = "Page Content Goes Here";

    $this->css = "CSS Goes Here";

    $this->embeddedStyle = "Embedded CSS Goes Here";

    }

    public function getTitle() : string {

    return $this->title;

    }

    public function setTitle(string $value) {

    if (strpos($value, ''^'')) {

    $this->title = $value;

    }

    }

    public function getContent() : string {

    return $this->content;

    }

    public function setContent(string $value) {

    if (strpos($value, ''content = $value;

    }

    }

    public function appendContent(string $value) {

    if (strpos($value, ''content .= $value;

    }

    }

    清单 3-20

    Private_Page_Data.class.php 部分代码

    ```


    清单 3-20 是页面数据类代码更改的部分列表。有关完整列表，请查看 `Private_Page_data.class.php` 中的代码。


    ```

    private string $title = "";

    ```


    对程序的第一项更改是将每个属性的*访问修饰符*从 `public` 更改为 `private`。`public` 修饰符允许任何程序开放访问。当程序驻留在内存中（执行时）时，公共变量是脆弱的。`private`
    变量只能由创建它的类访问。`protected` 变量可以由类本身以及任何继承类或父类访问。通过将变量设置为 `private`，我们可以控制对变量内容的任何更改。


    ```

    $this->title = "Title Goes Here";

    ```


    属性的使用已从 `$title` 更改为 `$this->title`。这是将变量更改为 `private` 的直接结果。`$this` 是一个特殊的 PHP
    指针，它提供对对象内未声明为 `public` 的项的访问。在我们的示例中，`$this` 表示我们正在访问私有变量 `$title` 并将提供的字符串放入其中。


    ```

    public function getTitle() : string {

    return $this->title;

    }

    ```

    '
- fmt: "为了允许类外部的程序访问我们的私有变量，我们创建了 getter 和 setter 方法。可以将其视为提供对变量的读取和写入权限。一个 *get 方法*提供读取权限。一个\
    \ *set 方法*提供写入权限。我们实际上可以创建只读的变量（仅提供 get 方法），也可以创建只写的变量（仅提供 set 方法）。大多数 get 方法都是简单的，如示例所示；它们只是将请求的值返回给调用程序。\n\
    \n```\npublic function setTitle(string $value) {\n    if (strpos($value, '^'))\
    \ {\n        $this->title = $value;\n    }\n}\n```\n\nset 方法的目标是保护数据（封装）。在更改变量之前，set\
    \ 方法应检查信息的有效性。在示例中，一个 `if` 语句使用 PHP 函数 `strpos` 来判断变量 `$value`（传入函数的信息）是否包含脱字符（`^`）符号。如果包含，它允许用传入的信息更新\
    \ `title` 变量。这个示例实际上会失败，因为我们的 `title` 字符串不包含脱字符。如果你运行该程序，你会发现 `title` 使用的是默认值。\n\
    \n## 安全编程\n\n一个安全可靠的程序会拒绝用无效数据更新信息的尝试，而不会导致程序引发错误和/或崩溃。在这个例子中，一个无效字符串被提交以更新 `title`\
    \ 变量。程序仅拒绝无效数据并保留默认值。程序的用户只会看到 `title` 被设置为默认值，这不会影响用户试图完成的操作。因此，该程序比使用公共变量更安全、更可靠。如果程序因无效数据而无法继续运行，则应向用户提供信息性消息，该消息不会引发错误或导致程序崩溃。\n\
    \n```\npublic function appendContent(string $value) {\n    if (strpos($value,\
    \ 'content' . $value)) {\n        $this->content .= $value;\n    }\n}\n```\n\n\
    在代码示例中，`content` 变量有一个额外的方法，用于追加信息，而不是替换（设置）信息。我们的 `index` 程序对 `content` 变量进行设置和追加操作。因此，这个额外的方法对于此操作是必需的。\n\
    \n*我们应该总是使用 setter 和 getter 吗？*\n答案是否定的。如果没有理由保护数据，那么数据可以保持公开。许多教科书演示了 setter\
    \ 和 getter 的使用，但没有强调一个不进行任何验证的 set 例程只是在浪费效率。如果不需要验证，只需将变量设置为公共访问即可。然而，考虑到编程环境中存在的大量黑客攻击，程序员应该深思熟虑，避免将任何变量保留为完全公开的公共变量。\n\
    \n## 注意\n\n`strpos` 方法在一个字符串中搜索以确定被检查的值是否存在于字符串中。如果存在，它返回该值在字符串中的位置。字符串位置从第一个位置的\
    \ 0 开始编号。如果该值不在字符串中，则函数返回 `-1`。任何大于或等于 `1` 的值被判定为 `TRUE`。任何小于或等于 `0` 的值被判定为 `FALSE`。因此，只要发现该值，`if`\
    \ 语句就为 `TRUE`；如果未找到该值，则变为 `FALSE`。有关 `strpos` 的更多信息，请访问 [`www.php.net/manual/en/function.strpos`](http://www.php.net/manual/en/function.strpos)。\n\
    \n```\nsetTitle(\"Building and processing HTML forms with PHP\");\n$pageData->setContent($nav);\n\
    $pageData->appendContent(\"...and a form here\");\n$navigationIsClicked = isset($_GET['page']);\n\
    if ($navigationIsClicked ) {\n    $fileToLoad = $_GET['page'];\n} else {\n   \
    \ $fileToLoad = \"search\";\n}\ninclude_once \"views/$fileToLoad.php\";\n$pageData->appendContent($info);\n\
    require \"templates/privatepage.php\";\necho $page;\n?>"
  raw: 'To allow programs outside of the class access to our private variables,

    we create getter and

    setter methods . Think of this as providing read and write access

    to the variable. A *get method* provides read access. A *set

    method* provides write access. We can actually create variables that

    are only readable by just providing a get method. We can also create

    variables that are just writable by only providing a set method. Most

    get methods are simple methods, as shown in the example; they just

    return the value requested to the calling program.


    ```

    public function setTitle(string $value) {

    if (strpos($value, ''^'')) {

    $this->title = $value;

    }

    }

    ```


    The goal of a set method is to protect the data (encapsulation). Set

    methods should check the validity of the information before making any

    changes to the variable. In the example, an if statement uses the PHP

    function *strpos* to determine if the variable $value (the

    information passed into the function) contains a carrot (^) symbol. If

    it does, it allows the title variable to be updated with the information

    passed. This example will actually fail because our title string does

    not contain a carrot. If you run the program, you will discover that the

    default value is used for the title.


    Secure Programming


    A secure and reliable

    program  will reject attempts to update information with invalid

    data without causing the program to raise errors and/or crash. In this

    example, an invalid string has been submitted to update the title

    variable. The program merely rejects the invalid data and keeps the

    default value. The user of the program will only see that the title is

    set to the default, which does not affect what the user is attempting to

    accomplish. Thus, the program is more secure and more reliable than

    using public variables. If the program could not continue due to invalid

    data, an informative message should be provided to the user, which does

    not raise errors or cause the program to  crash.


    ```

    public function appendContent(string $value) {

    if (strpos($value, ''content .= $value;

    }

    }

    ```


    In the code example, the content variable has an additional method

    which appends the information, instead of replacing (setting) the

    information. Our index program sets and appends information to the

    content variable. Thus, the additional method is necessary for this

    operation.

    *Should we always use setters and getters?*

    The answer is no. If there is no reason to protect the data, then the

    data can remain public. Many textbooks demonstrate the user of setters

    and getters but do not emphasize that a set routine which does not do

    any validation is just a waste of efficiency. If validation is not

    required, just set the variable to public access. However, with the

    amount of hacking that occurs in the program environment, the programmer

    should think long and hard about leaving any variable as a wide-open

    public variable.


    Note


    The strpos method searches a string to determine if the value checked

    exists within the string. If it does, it returns the location of the

    value within the string. String positions are numbered starting with a 0

