    这对性能影响微乎其微，因此仅当 Mac 换行符导致 CSV 文件出现问题时才应使用。


    ## 使用 `fopen()` 替换内容


    第一种只写模式 (`w`) 会删除文件中的任何现有内容，因此适用于需要频繁更新的文件。你可以通过 `fopen_write.php` 测试 `w` 模式，该文件在
    `DOCTYPE` 声明上方包含以下 PHP 代码：


    ```

    当页面中的表单提交时，此代码会将 `$_POST[''contents'']` 的值写入一个名为 `write.txt` 的文件中。`fwrite()` 函数接受两个参数：文件引用以及你想写入文件的内容。


    注意

    你可能会遇到 `fputs()` 而不是 `fwrite()`。这两个函数是相同的：`fputs()` 是 `fwrite()` 的同义词。


    如果你在浏览器中加载 `fopen_write.php`，在文本区域中输入一些内容，然后点击“写入文件”，PHP 会创建 `write.txt` 并将你在文本区域中输入的内容插入其中。由于这只是一个演示，我省略了任何确保文件成功写入的检查。打开
    `write.txt` 验证你的文本是否已插入。现在，在文本区域中输入不同的内容并再次提交表单。原始内容会从 `write.txt` 中被删除，并替换为新文本。被删除的文本将永久丢失。

    ```


    ## 使用 `fopen()` 追加内容


    追加模式不仅会在文件末尾添加新内容，同时保留现有内容，还可以在文件不存在时创建一个新文件。`fopen_append.php` 中的代码如下所示：


    ```

    // 以追加模式打开文件

    $file = fopen(''C:/private/append.txt'', ''a'');

    // 写入内容后跟一个新行

    fwrite($file, $_POST[''contents''] . PHP_EOL);

    // 关闭文件

    fclose($file);

    ```


    请注意，我在 `$_POST[''contents'']` 之后连接了 `PHP_EOL`。这是一个 PHP 常量，它使用适合操作系统的正确字符来表示新行。在
    Windows 上，它会插入一个回车符和换行符，但在 Mac 和 Linux 上只插入一个换行符。如果你在浏览器中加载 `fopen_append.php`，输入一些文本并提交表单，它会在
    private 文件夹中创建一个名为 `append.txt` 的文件并插入你的文本。输入其他内容并再次提交表单；新文本应添加到先前文本的末尾，如下面的截图所示。

    ![../images/332054_4_En_7_Chapter/332054_4_En_7_Figg_HTML.jpg](img/332054_4_En_7_Figg_HTML.jpg)

    我们将在第 11 章中回到追加模式。


    ## 写入前锁定文件


    将 `fopen()` 与 `c` 模式一起使用的目的是让你有机会在修改文件之前使用 `flock()` 锁定它。


    `flock()` 函数接受两个参数：文件引用和一个指定锁定操作方式的常量。有三种操作类型：


    *   `LOCK_SH` 获取用于读取的共享锁。

    *   `LOCK_EX` 获取用于写入的独占锁。

    *   `LOCK_UN` 释放锁。


    要在写入之前锁定文件，请以 `c` 模式打开文件并立即调用 `flock()`，如下所示：


    ```

    // 以 c 模式打开文件

    $file = fopen(''C:/private/lock.txt'', ''c'');

    // 获取独占锁

    flock($file, LOCK_EX);

    ```


    这会打开文件（如果文件不存在则创建它），并将内部指针置于文件开头。这意味着你需要将指针移动到文件末尾或删除现有内容，然后才能开始使用 `fwrite()`
    写入。


    要移动指针到文件末尾，请使用 `fseek()` 函数，如下所示：


    ```

    // 移动到文件末尾

    fseek($file, 0, SEEK_END);

    ```


    或者，通过调用 `ftruncate()` 删除现有内容：


    ```

    // 删除现有内容

    ftruncate($file, 0);

    ```


    完成文件写入后，你必须在调用 `fclose()` 之前手动解锁文件：


    ```

    // 关闭前解锁文件

    flock($file, LOCK_UN);

    fclose($file);

    ```

