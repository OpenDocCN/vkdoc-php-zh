    \ -I/vagrant/zephir/type/ext/main -I/vagrant/zephir/type/ext -I/usr/include/php5\
    \ -I/usr/include/php5/main -I/usr/include/php5/TSRM -I/usr/include/php5/Zend -I/usr/include/php5/ext\
    \ -I/usr/include/php5/ext/date/lib  -DHAVE_CONFIG_H  -O2 -fvisibility=hidden -Wparentheses\
    \ -flto   -c /vagrant/zephir/type/ext/type/stringtype.zep.c -o type/stringtype.lo...\n\
    ```\n\nZephir 将扩展类文件交叉编译成普通 C 语言，并添加类加载代码。构建输出的结尾应该类似于：\n\n```\nInstalling...\n\
    Extension installed!\nAdd extension=type.so to your php.ini\nDon't forget to restart\
    \ your web server\n```\n\n……因此我们需要将扩展添加到 `php.ini` 文件中：\n\n```\n$ sudo bash -c\
    \ \"echo extension=type.so >> /etc/php5/cli/php.ini\"\n```\n\n这将安装我们刚刚创建的 Type\
    \ 扩展。我们可以通过运行以下命令来检查它是否已安装：\n\n```\n$ php -i | grep \"type => enabled\"\ntype\
    \ => enabled\n```\n\n如果您看到那一行返回，说明扩展已安装并可以使用了。\n\n使用这个新扩展非常简单：\n\n```\n<?php\n\
    \n$string = new Type\\StringType(\"Hello World\");\n\nprint $string->length();\n\
    ```\n\n命名空间和类完全存在于编译后的扩展文件中。Zephir 扩展可以使用预先存在的核心和扩展命名空间/类。它们可以被普通的 PHP 代码使用（前提是在使用时扩展已注册）。\n\
    \nZephir 扩展甚至可以用性能更好的版本覆盖核心函数。\n\n### 结论\n\n扩展通过为我们处理诸如装箱和拆箱之类的事情，让我们的生活变得更加轻松。它们让我们能够创建性能更好的代码（如\
    \ Zephir 的情况）和更严格的类型（如 SPL Types 的情况）。\n\n我们不必使用这些来构建一个更干净的系统。如果我们使用了，就可以期望拥有一个更强大的类型系统，而无需像纯库代码那样付出艰苦的努力。\n\
    \n## 设计\n\n### 使用哪种方法\n\n我们已经了解了许多方法和扩展，它们可以帮助我们抽象化 PHP 向我们呈现的不一致的类型处理。创建这种抽象的一部分工作是决定使用哪些方法和/或扩展。\n\
    \n#### 命名空间方法\n\n通常，我们应该避免任何会在全局作用域中暴露大量函数的方法。我们不想制造比现有更多的混乱，并且能够在使用标准内容的同时使用我们的抽象，这无疑是有益的。\n\
    \n> 我们应该努力使所有代码都位于命名空间中。\n\n此外，我们应该以一种既能用于过程式环境，也能用于面向对象环境的方式来实现代码。换句话说；我们应该将业务逻辑包含在函数中，并从面向对象的框架内调用这些函数（以便它们可以在过程式代码中使用），以便标量类型可以像对象一样使用。\n\
    \n> 我们应该在函数中构建逻辑，并将这些函数（作为方法）添加到标量类型对象中。\n\n#### 标量对象 / SPL Types\n\n这意味着我们将希望使用之前介绍的命名空间函数，并且也希望使用标量对象或\
    \ SPL Types 作为我们类型系统的面向对象基础。\n\n我提到过，不应同时使用标量对象和 SPL Types 扩展。这是因为它们做的是同样的事情。如果不为每个扩展重复整个面向对象的部分，就不可能（以我刚才描述的方式）代理函数调用。\n\
    \n这是因为标量对象扩展会自动对变量进行装箱，而 SPL Types 扩展则期望开发者自己进行变量装箱。区别在于 `return new static(substr($this,\
    \ $offset, $length));` 和 `return substr($this, $offset, $length);`\n\n虽然我喜欢标量对象扩展，但我倾向于建议使用\
    \ SPL Types 扩展。主要原因是它不会干扰 PHP 处理标量类型的方式。这意味着我们需要对变量进行装箱，但我们也将享受到状态（类似对象的标量变量）和自动拆箱的好处。\n\
    \n#### Zephir\n\n尽管 Zephir 很酷，但它不是 PHP。这意味着任何你希望他们处理你代码的开发者，都需要知道或学习另一种语言。这也增加了编码、测试和发布之间的时间。\n\
    \n因此，在本书的其余部分，我将展示构建在 SPL Types 之上、并且没有转换为 Zephir 扩展的代码。\n\n附录 [将] 包含 PHP 和 Zephir\
    \ 的实现。我不想让实现成为本书的重点，但我会很享受制作它的过程！\n"
- fmt: '# How To Structure The Types


    We’ve already decided to use namespaced functions as the basis, so we need to
    decide how to use these from within classes.


    ## Resolving Types


    We’ll often need to resolve types, within the type methods. Any arguments could
    potentially be the wrong type. It makes sense for the type resolution/conversion
    functions to be in their own namespace:


    - `Type\isString`

    - `Type\isStringObject`

    - `Type\isExpression`

    - …

    - `Type\toStringObject`

    - `Type\toExpression`

    - …


    We should proxy to the creation methods:


    ```

    1 class StringObject extends SPLString

    2 {

    3   public function trim($mask = "\t\n\r\0\x0B")

    4   {

    5     $isString       = Type\isString($mask);

    6     $isStringObject = Type\isStringObject($mask);

    8     if ($isString or $isStringObject) {

    9       if (Type\isExpression($mask)) {

    10         $raw = Type\String\trimWithExpression(

    11           $this,

    12           $mask

    13         );

    14       } else {

    15         $raw = Type\String\trimWithString(

    16           $this,

    17           $mask

    18         );

    19       }

    21       return Type\toStringObject($raw);

    22     }

    24     throw new LogicException("mask is not a string");

    25   }

    26 }

    ```


    ## Chaining


    One of the benefits of the object-oriented approach we’re taking is that we can
    chain calls on the types. You may have noticed how this is implemented (from the
    previous example), but in-case you didn’t:


    ```

    1 return Type\toStringObject($raw);

    ```


    The manipulation methods should return plain PHP types - because we want people
    to be able to use the types interchangeably. So it falls to the classes (proxies)
    to wrap plain PHP types within the SPL Types.


    ## Combining Number Types


    I’ve already alluded to my desire of a single number type, and that’s exactly
    what I want to achieve here. For that reason, we’ll completely ignore the `SPLNumber`
    class in favour of `SPLFloat`.


    The reason is simple - numbers should be able to handle decimal points, without
    a separate set of methods or additional mental overhead. This will lead to additional
    casting in numeric operations, but that’s not the end of the world.


    # How To Test


    Testing is an essential part of supplanting the native type handling system. The
    good news is that it will be easy to do!


    ## PHPUnit


    `PHPUnit` is a unit-testing library which makes the process of testing small units
    of code super easy:


    ```

    1 class StringObjectTest extends PHPUnit_Framework_TestCase

    2 {

    3   /** @test */

    4   public function trimWorksWithStrings()

    5   {

    6     $subject = Type\toStringObject("Hello World...");

    8     $this->assertEquals(

    9       "Hello World",

    10       $object->trim(".")

    11     );

    12   }

    13 }

    ```


    This kind of testing can be done with a number of testing frameworks. At the end
    of the day, as long as you are writing tests, whichever testing framework you
    use is up to you.


    ## What Should Be Tested?


    The short answer is: everything.


    We’re aiming to build something solid, and it’s pretty low-level. That means we
    need to be sure things continue to work as expected. It’s not even that hard when
    you consider how simple the methods are that we are going to make.


    We should aim to have good coverage of the namespaced functions, and a few tests
    to ensure that these are correctly called from the (proxy) classes.


    ## When Should Tests Be Written?


    This is really up to you. Maybe you want to write your tests first, and follow
    the red-green-refactor cycle. Maybe you want to write all of your library code
    first, and then make sure everything works as you expected it to (by writing tests
    for the library code).


    The important thing is to write tests.


    ## Recommendations


    I highly recommend the following books:


    - [Clean Code, by Robert C. Martin](http://www.amazon.com/Clean-Code-Handbook-Software-Craftsmanship/dp/0132350882)

    - [The Grumpy Programmer’s PHPUnit Cookbook, by Chris Hartjes](https://leanpub.com/grumpy-phpunit)


    # How To Package


    If you want your code to be used (by anyone else), you’d be wise to package it
    in such a way that others will want to use it.


    ## Make A `Readme` File


    It sounds simple, but you’d be surprised how few developers actually do this!
    When other developers stumble across your repository (on Github/BitBucket/what-have-you),
    they won’t be impressed to see a bare-bones directory structure and nothing else.


    Make a `Readme` file, and include the following…


    ## A Few Examples


    Show what your library can do. There are few things more frustrating than being
    enticed (to learn more about a library) by some marketing, only to have to figure
    it out from tests and/or source-code.


    Those things are excellent places to learn, but they must be sought out, whereas
    a few examples (in your `Readme` file) are easy to find. Include examples covering
    the major aspects of your library.


    In our case, this means an example (or two) about the procedural code underpinning
    the library. It means an example (or two) about the object-oriented wrappers,
    which provide fluent interfaces to traditionally procedural actions. It means
    providing an example (or two) about who to subclass the types for further customisation.


    It’s not hard to make these - they can even be extracted from your unit tests…


    ## Testing Instructions


    Developers want to know how solid your code is. Sure you’re using [SemVer](http://semver.org),
    but how much test coverage do you have? Do your tests pass? Can I trust you?


    The easiest want to answer these questions is to write the unit tests, and then
    provide instructions for how they can be run. You don’t require anything elaborate:


    ```

    1 $ composer install && phpunit

    ```


    That’s how you might be running your unit tests, and it’s easy to tell others
    how to run them.


    ## Installation Instructions


    Ok - you’ve convinced someone to use your [hopefully] well-tested library. The
    examples provide its value. So how do they install your library?


    This is where you make a `composer.json` file and include Composer installation
    instructions. This will require a round-trip to [Packagist](https://packagist.org),
    but you’ll be all the better for it.


    Then just a simple set of instructions is all you need add:


    ```

    1 $ composer require "vendor/library:1.0.0"

    ```


    ## License


    Include an open-source license. Something friendly like [MIT](http://opensource.org/licenses/MIT)
    will do nicely. Specify this in your `Readme` file, and include a clearly-named
    file (like `LICENSE` or `license.md`) which contains the full license.


    ## Contribution Guidelines


    This is optional, but greatly increases the chance that other developers will
    send compatible pull-requests. If you are fussy about code style (and you should
    be), then be sure to tell people how you want their submissions to look.


    # Conclusion


    Building a new type system is only partly about code. There’s a lot of design
    consideration that goes into well-crafted libraries. Take the time to decide on
    a reasonable structure - one that allows consumers the most flexibility.


    Test well. Package well. Be clear.


    ## Designing For The Future


    This chapter is incomplete.


    ## Appendices


    ### PHP Implementation


    This section is incomplete.


    ### Zephir Implementation


    This section is incomplete.


    ### JavaScript Implementation


    This section is incomplete.'
