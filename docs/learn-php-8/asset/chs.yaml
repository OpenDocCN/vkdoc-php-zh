  **期末项目**\n\n1.  利用你在第 `[1]` 章期末项目任务中确定的信息，以及本章展示的设计技术，为 ABC 计算机配件库存管理系统开发一个逻辑设计。该设计应包含所有可能的程序、接口和数据存储。应用设计必须是三层架构（接口层、业务逻辑层和数据层）。你的最终设计应类似于本章中展示的示例。\n\
