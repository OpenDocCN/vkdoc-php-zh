    the Data Tier**


    For your review system, you have to create a review table and two data tier functions
    in your hatshop database. The catalog_get_product_reviews function retrieves the
    reviews for a specific product, and the catalog_create_product_review method adds
    a review to a product.


    **Exercise: Adding Support for Customer Reviews to the Database** **1.** Load
    pgAdmin III, and connect to the hatshop database.


    **2.** Click Tools ➤ Query tool (or click the SQL button on the toolbar). A new
    query window should appear.


    **3.** Use the query tool to execute this code, which adds the review table in
    your hatshop database:


    -- Create review table


    CREATE TABLE review


    (


    review_id SERIAL NOT NULL,


    customer_id INTEGER NOT NULL,


    product_id INTEGER NOT NULL,


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH16.qxd 11/19/06 12:31 PM Page 539


    C H A P T E R 1 6 ■ P R O D U C T R E V I E W S


    **539**


    review TEXT NOT NULL,


    rating SMALLINT NOT NULL,


    created_on TIMESTAMP NOT NULL,


    CONSTRAINT pk_review_id PRIMARY KEY (review_id),


    CONSTRAINT fk_customer_id FOREIGN KEY (customer_id)


    REFERENCES customer (customer_id)


    ON UPDATE RESTRICT ON DELETE RESTRICT,


    CONSTRAINT fk_product_id FOREIGN KEY (product_id)


    REFERENCES product (product_id)


    ON UPDATE RESTRICT ON DELETE RESTRICT


    );


    **4.** Execute the following code, which creates the review_info type and the
    catalog_get_product_review function in your hatshop database:


    -- Create review_info type


    CREATE TYPE review_info AS


    (


    customer_name VARCHAR(50),


    review TEXT,


    rating SMALLINT,


    created_on TIMESTAMP


    );


    -- Create catalog_get_product_reviews function


    CREATE FUNCTION catalog_get_product_reviews(INTEGER)


    RETURNS SETOF review_info LANGUAGE plpgsql AS $$


    DECLARE


    inProductId ALIAS FOR $1;


    outReviewInfoRow review_info;


    BEGIN


    FOR outReviewInfoRow IN


