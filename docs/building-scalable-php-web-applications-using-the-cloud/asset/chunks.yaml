  trans: '

    ### 5.5 搭建网络服务器


    现在我们已配置好数据库，接下来该设置我们自己的网络服务器了。


    请注意，我们实际上并不会将`template_node`用作服务器。我喜欢保留一台小型机器，专门用作未来服务器的模板，尤其是网络节点。这样，我就能拥有一台小巧、保持更新、已备份且状态良好的机器。当需要创建新“镜像”时，只需创建一个命名备份即可使用。需要注意的是，这将会覆盖之前的快照镜像，不过就我的用途而言，这通常没什么问题。如果你需要保留旧版本，只需为你想维护的每种配置保留一个模板节点即可。


    现在我们将配置`template_node`，使其成为网络服务器模板。我们只需进行三项修改：


    1.  在这台机器上关闭数据库。

    2.  更改网络应用的代码，使其指向我们的新数据库。

    3.  为机器启用一个私有 IP 地址，使其能够使用私有网络。


    要完成第一项任务，我们只需以 root 身份登录`template_node`机器，并运行：


    ```

    systemctl stop postgresql

    systemctl disable postgresql

    ```


    要完成第二项任务，我们只需修改`common.php`文件。我建议在本地机器上修改该文件，然后使用 SFTP 传输新文件。不过，你也可以直接在服务器上使用`nano`编辑器进行修改。你所要做的就是更改连接字符串。将当前写着`host=localhost`的地方改为`host=DB.MASTER.PRIVATE.IP`，其中`DB.MASTER.PRIVATE.IP`是你`dbmaster`节点的私有
    IP 地址。你需要进行两次修改——一次在`getReadOnlyConnection()`函数中，另一次在`getReadWriteConnection()`函数中。修改完成后，使用
    SFTP 将代码重新加载到服务器上。


    此时，代码将无法运行，因为它无法访问`dbmaster`机器。这是因为 PostgreSQL *只*在它的私有 IP 地址上监听，而`template_node`还没有可以用来通信的私有
    IP 地址。因此，你需要为机器添加一个私有 IP 地址，这样它才能通过`dbmaster`的私有 IP 地址与之连接。


    使用第 5.3 节中概述的流程为机器创建一个私有 IP 地址（之后别忘了重启！）。


    完成这些步骤后，你的`template_node`机器应该能够连接到`dbmaster`了，所以测试一下。访问你`template_node`服务器的 IP
    地址，看看它是否还能正常运作。如果可以，那么恭喜你，因为你刚刚实现了一个小型的两层系统！


    现在，正如我前面所说，我们实际上并不会用`template_node`来实际处理请求。目标是利用它，以便我们能够轻松启动新的网络服务器节点，从而根据需要扩展容量。


    因此，既然`template_node`已经完全配置好成为一个网络服务器，那么就拍摄一个新的备份快照。这一步至关重要。任何时候你对`template_node`进行了更改，都应该创建一个新的备份快照，这样你用它所创建的新节点就会包含你的新更改（尽管它完全不影响现有节点）。


    现在我们将为集群创建三个（或者任意你想要的个数）网络服务器节点。


    以下是每个新网络服务器节点的创建步骤：


    1.  使用第 5.2 节的步骤创建一个新节点。确保 (a) 它与`dbmaster`创建在同一个数据中心，并且 (b) 将节点命名为`webnode1`（或
    2、3）。

    2.  使用第 5.3 节的步骤为节点添加一个私有 IP 地址，使其能够通过私有网络连接到`dbmaster`。

    3.  机器启动完成后，通过查看节点的公有 IP 地址上的网络应用（例如：`http://WEB.NODE.PUBLIC.IP/list.php`），验证其功能是否完全正常。


    完成这些操作后，你应该拥有三台机器：`webnode1`、`webnode2` 和 `webnode3`，每台机器都可以作为你网络应用的前端。现在，你只需将它们全部连接起来，这将在下一节中介绍。


    ### 5.6 设置负载均衡器


    现在我们有了三台前端机器，全部连接到一个数据库。如何将它们连接在一起呢？一种方法是设置 DNS 轮询方案。其工作原理是为一个主机名在 DNS 中设置*多个*
    A 记录。然后浏览器自己会选择要连接哪个主机。这样做的问题在于，如果你的某台机器宕机了，无法将用户从那个 IP 地址引导开。Linode 现在实际上对这类故障转移提供了一些支持，但其用法超出了本书的范围。


    ![../images/487291_1_En_5_Chapter/487291_1_En_5_Fig4_HTML.jpg](img/487291_1_En_5_Fig4_HTML.jpg)


    图 5-4：创建节点负载均衡器


    负载均衡器是一种更为交钥匙的解决方案。负载均衡器位于你的集群前端，为你接收连接，然后将这些连接转发给可以处理它们的可用服务器。此外，如果你的某台服务器发生故障，负载均衡器会检测到这一点并将流量转移到剩余服务器上。然后，当你的服务器恢复时，负载均衡器也会检测到并将流量转移回该服务器。


    在 Linode 中设置负载均衡器很简单。Linode 将其负载均衡器称为“节点负载均衡器”。要设置一个节点负载均衡器，请点击“创建”，然后选择“节点负载均衡器”菜单项。这会把你带到如图
    5-4 所示的界面。


    和其他所有操作一样，你需要：


    -   设置负载均衡器的名称（我们将使用“primary-balancer”）。

    -   将负载均衡器放置在与你的节点相同的数据中心。


    此外，你还需要添加一些额外的配置，如图 5-5 所示。请确保选择了以下选项：


    -   “端口”应设置为“80”。

    -   “协议”应设置为“HTTP”。

    -   “算法”应设置为“轮询”。

    -   “会话粘性”应设置为“无”。

    -   “主动健康检查”应设置为“无”。

    -   “被动健康检查”应开启。


    之后，你需要向负载均衡器中添加至少一个节点（创建负载均衡器后可以添加更多）。在“标签”字段中输入节点的名称（我们以`webnode1`为例）。然后，在“IP
    地址”字段中，从下拉菜单中选择你节点的 IP 地址。确保端口设置为“80”。


    完成这些设置后，点击“创建”来创建负载均衡器。


    一旦你的负载均衡器创建完成，你可以通过进入“配置”，然后点击“端口 80”，再点击底部的“添加节点”来添加其余节点。按你创建的节点数量添加。然后点击“保存”即可。


    有时负载均衡器需要几分钟时间将节点添加到其列表中。要检查状态，请返回节点负载均衡器配置界面。每个服务器旁边都会有一个“状态”字段。当状态为“运行中”时，表示服务器已成功连接到负载均衡器。


    如果你想为另一个端口设置负载均衡器，可以使用“添加另一个配置”按钮来完成。


    ![../images/487291_1_En_5_Chapter/487291_1_En_5_Fig5_HTML.jpg](img/487291_1_En_5_Fig5_HTML.jpg)


    图 5-5：节点负载均衡器附加设置

    '
- fmt: '### ![../images/487291_1_En_5_Chapter/487291_1_En_5_Figd_HTML.jpg](images/487291_1_En_5_Chapter/487291_1_En_5_Figd_HTML.jpg)
    OTHER NODE BALANCER OPTIONS


    The node balancer has a lot of options available. Here is a description of some
    of the important ones.


    **Port**: This is the TCP port that the node balancer should forward. This will
    normally be `80` (HTTP) or `443` (HTTPS). We will use port `80` for our examples.


    **Protocol**: This is how you want the server to handle forwarding your requests.
    If the protocol is set to TCP, then the only thing that the balancer does is forward
    the connection on to you. If it is set to HTTP or HTTPS, then the server will
    actually handle some parts of the connection for you. HTTP is what we will use
    for this book. HTTPS adds an additional boost for secure sites, because the load
    balancer will handle the SSL connection for you, thus removing a significant chunk
    of the load from the server (you also upload the certificate and key information
    to the load balancer for processing). When doing HTTPS, you probably want the
    port on the balancer to be different than the port on the machine. In the case
    of HTTPS, you should set the balancer to connect to the unencrypted port `80`
    on the servers. If you wanted to do HTTPS that was handled by your machine instead
    of the balancer, you would just choose TCP (instead of HTTPS) as the protocol.
    Because of the added complications of obtaining and installing certificates, for
    the examples in this book, choose port `80` and HTTP for load balancing.


    **Algorithm**: This is the way that the load balancer will determine which server
    to forward it to. Round Robin is the default and should work fine.


    **Session Stickiness**: This is whether or not a given user should continue to
    connect to the same web server once it has made an initial connection. This is
    important only if you store session information on your web servers. Imagine if
    your web server has important session information, but the next request goes to
    a different server! Therefore, this option allows you to configure whether and
    how clients get matched to servers. Our application doesn’t have session information,
    so it should be set to “None.” If your application uses local session information
    (or local caching, as we will see in Section 6.1), I would choose the HTTP Cookie
    method, as it won’t get in the way of your load tests like the “Table” method
    will. Since all requests come from the same IP address, the “Table” method will
    simply direct your entire load test to a single server rather than spreading it
    out and make it look like your load balancing isn’t giving you any help.


    **Active Health Checks**: This allows you to specify a URL for the load balancer
    to hit in order to check the status of the web server. You can configure the balancer
    to either just check for an HTTP status or also look for a specific string in
    the response body.


    **Backend Node: Weight**: This sets the preference of the node balancer for this
    server. A higher weight gives the server more connections.


    **Backend Node: Mode**: This sets the mode of the node in the balancer. “Accept”
    is for normal operation. “Reject” essentially turns off this node, meaning that
    the balancer will not send this node any more requests. However, if you have session
    stickiness turned on, you might not want to move directly from “Accept” to “Reject.”
    “Drain” tells the balancer to only accept connections from clients which have
    sessions on this node. “Backup” says to accept connections only if all other nodes
    are down.


    Once you have all of the webnodes added to your node balancer, you can now view
    your cluster by going through the IP address of the node balancer itself, and
    the node balancer will forward your requests to one of the machines in the cluster.
    You can find the IP address of your node balancer by clicking “Node Balancers”
    in the main menu. The IP address will be listed next to your balancer in the list.
    It is also listed on the right-hand side of the node balancer’s “Summary” screen.'
