    \n图 5-6. *基于 Posts 控制器烘焙视图的完整流程*\n\n#  编辑烘焙后的视图\n\n编辑视图是一项简单的任务。打开 `app/views/posts`\
    \ 文件夹，您会看到以下烘焙生成的视图：\n\n- `add.ctp`\n- `edit.ctp`\n- `index.ctp`\n- `view.ctp`\n\
    \n![图片 33](img/index-91_1.jpg)\n\n打开 `index.ctp` 文件，您会发现该视图中所有独特的 HTML 代码。将文件中的第\
    \ 2 行改为以下内容，Index 操作页面的标题将变为“博客文章”：\n\n```\n<h2><? __('博客文章');?></h2>\n```\n\n\
    您可以对该文件进行任意添加或删除，以更改 Index 操作视图，而不会影响其他操作。例如，日期的显示格式对用户不友好。您可以通过在视图文件中编辑，将此日期字符串格式化为更易读的形式。在\
    \ `app/views/posts/index.ctp` 文件中大约第 34 行，是日期字符串：\n\n```\n<?php echo $post['Post']['date'];\
    \ ?>\n```\n\n使用 PHP 的 `date()` 和 `strtotime()` 函数可以让这个变量显示得更好。将第 34 行改为类似下面的内容：\n\
    \n```\n<?=date('m 月 j 日 Y 年, g:i a',strtotime($post['Post']['date']));?>\n```\n\
    \n之后，Index 操作视图中的日期显示会更加易读（见图 5-7）。\n\n图 5-7. *Index 操作视图中的每条文章列表都包含更友好的日期字段。*\n\
    \n#  考虑国际化\n\n您可能已经注意到，烘焙生成的视图中的一些文本字符串被包裹在 PHP 函数 `__()` 中。简单来说，这个函数是 Cake 为国际化网站轻松动态修改视图而提供的方法。Cake\
    \ 可以将此函数包裹的内容本地化为用户的语言，但需要在应用程序的控制器和配置文件中进行其他设置。如果您的应用程序不需要国际化或本地化，则可以避免使用 `__()`\
    \ 函数。\n\n#  使用命令加速烘焙\n\n一些基本命令可以使烘焙 Cake 资源更加便捷。只需在控制台中输入 `cake bake` 命令后跟上您需要烘焙的资源即可。示例如下：\n\
    \n```\n$ cake bake controller\n$ cake bake model\n$ cake bake view\n$ cake bake\
    \ project\n```\n\n如果您想跳过交互模式直接生成文件，还可以输入资源的名称：\n\n```\n$ cake bake controller\
    \ tags\n$ cake bake model comment\n```\n\n如果您的 Cake 控制台安装要求您指定 `-app` 参数以便 Bake\
    \ 访问您的工作应用文件夹，请务必包含它：\n\n```\n$ cake bake controller tags -app /serverroot/blog/app/\n\
    ```\n\n#  自定义视图\n\nBake 脚本缩短了启动时间，让您可以快速获得脚手架视图。通过调整烘焙后的视图文件，您可以在其中添加自定义的元素和表单。本章中，您仅修改了\
    \ Index 操作视图，并学习了如何操作 Bake 脚本。第 6 章将详细讨论烘焙后的控制器和视图中的每一行代码，以及如何创建更高级的网页。您将分析其他的\
    \ CRUD 操作以及 Cake 如何与用户表单提交交互。Cake 自带的 Form 和 HTML 辅助函数将使您能够更有效地管理表单字段和提交，所需代码比典型的\
    \ PHP 应用程序更少。\n\n在继续之前，请按照本章的“烘焙更多资源”练习，使用其他表来练习 Bake。\n\n#  烘焙更多资源\n\n在本章中，您烘焙了\
    \ Posts 控制器和一些脚手架视图。通过为 tags 和 comments 表生成控制器、模型和视图来掌握 Bake。请务必尝试其他 Bake 命令以提高开发速度，并探索数据库配置和项目功能。\n\
    \n#  总结\n\nCake 中的布局是包裹应用程序的文件。当您创建默认布局文件时，您就拦截了 Cake 用于脚手架、错误页面和其他视图的默认布局。各个视图文件将在布局中\
    \ `$content_for_layout` 变量被回显的位置渲染，从而使您能够为多个视图创建共同的界面。\n\n让应用程序快速启动的最快方法之一是使用\
    \ Cake 的脚手架和 Bake 功能。通过设置控制台与 Bake 配合使用，您可以使用简单的 shell 命令（有时仅需一行文本）生成自定义的操作和视图。正确使用\
    \ Bake 可以提供基本代码，让您能够通过 Web 界面创建、编辑、列出和查看数据库记录，从而加速开发。第 6 章将更深入地研究烘焙元素内部的工作原理，并解释如何在\
    \ Cake 中自定义视图。\n\n#  第 6 章：自定义视图\n```"
- fmt: "# Using Bake to generate views and controller actions is great for getting\
    \ an application started quickly. Eventually, though, you will need more customized\
    \ code to flesh out the application’s feature set. For the application to provide\
    \ much functionality, it will inevitably have some level of user interaction in\
    \ the form of clicking links and HTML elements, supplying form data, or performing\
    \ other interactions. As the users interact with the application, they will make\
    \ requests that operate sequentially through controllers and views. This chapter\
    \ will go through these sequences and explore the Cake features that give you\
    \ more fine-tuned control over the user experience.\n\n## Handling User Interactions\n\
    \nIn general, three kinds of sequences result from a user interacting with a Cake\
    \ application:\n\n* A simple page request sequence\n* A form submission sequence\n\
    * An asynchronous (Ajax) sequence\n\nThe views and their interaction with the\
    \ controllers and models will vary depending on the program’s processes. When\
    \ customizing views beyond the Bake or scaffolding views, you will need to keep\
    \ in mind the kind of process you are building.\n\n## A Simple Page Request\n\n\
    Open the `app/controllers/posts_controller.php` file, and scroll to the View action.\
    \ It should be similar to Listing 6-1.\n\n**Listing 6-1.** *The View Action in\
    \ the Posts Controller*\n\n```\nfunction view($id = null) {\n    if (!$id) {\n\
    \        $this->Session->setFlash(__('Invalid Post.', true));\n        $this->redirect(array('action'=>'index'));\n\
    \    }\n    $this->set('post', $this->Post->read(null, $id));\n}\n```\n\nProcesses\
    \ are usually—if not always—dispatched to the controller. Here, the View action\
    \ is processed by the controller, and the corresponding view file will be called\
    \ when the process terminates. The first step of the action is to receive any\
    \ parameters supplied by the user. Because this is a simple page request sequence,\
    \ all the user is going to supply is one or two variables that match a record\
    \ in the database—no form data, no complicated logic tests, just a couple of parameters\
    \ at most. Line 1 in Listing 6-1 receives the parameter supplied by the user with\
    \ the function variable `$id`. This variable is defaulted to `null` but could\
    \ very well be changed to an array or have a default value, depending on your\
    \ application’s needs.\n\nIn this action, a simple logic test is performed: if\
    \ the user has not supplied a unique ID of a post to be pulled from the database,\
    \ return an error; otherwise, read the matching record and forward its contents\
    \ to the view as a variable. This test is performed on lines 2–6.\n\nLine 3 is\
    \ executed if the user has not provided an ID value as a parameter. This line\
    \ uses Cake’s Session component, which is a component class that contains several\
    \ functions for managing and working with sessions. Rather than display a Flash\
    \ page that renders an error message for the user, the Session component sends\
    \ a string of text to the view, to be displayed either in the layout or in the\
    \ individual view file. In this case, the action uses the Session component’s\
    \ `setFlash()` function. The error string that will be sent is set to “Invalid\
    \ Post.” In the `app/views/layouts/default.ctp` file, you must include the other\
    \ end of the `Session->setFlash()` function, which will receive the error string\
    \ and display it.\n\nOpen the default layout, and insert the line in Listing 6-2\
    \ somewhere within the `<body>` element.\n\n**Listing 6-2.** *Displaying Session\
    \ Flash Messages*\n\n```\n<? $session->flash();?>\n```\n\nNow when the error is\
    \ recognized, line 4 in Listing 6-1 will redirect the user to the Index action\
    \ in the Posts controller. Because you’ve included the Session component in the\
    \ default layout, the error message specified in line 3 will be displayed in the\
    \ page.\n\nLine 6 in Listing 6-1 passes information from the database to the view\
    \ using the `set()` function. This line also includes a model function, `read()`,\
    \ which looks up the record that corresponds to the ID supplied by the user and\
    \ pulls its data. By assigning this model function to the view variable `post`\
    \ in the `set()` function, everything in the record will be made available in\
    \ the view.\n\nSimple page requests usually behave like this View action. The\
    \ first step is to retrieve the parameter from the user’s link or URL and make\
    \ it available in the action. The second step is to check for a supplied parameter\
    \ and supply an error message if the parameter is null. The third step is to fetch\
    \ the data items that correspond to the request and pass them along to the view.\
    \ Now with the controller’s logic working properly for a simple page request,\
    \ you can customize the view.\n\nThis sequence can include much more than the\
    \ code I explained earlier. For instance, the action could perform more complex\
    \ checks on the parameter or work with multiple parameters at a time, run multiple\
    \ database queries, and then forward those on to the view. In some cases, you\
    \ may want the action to not even work with the view but forward data to another\
    \ action. In these scenarios, Cake behaves like a typical PHP script, except when\
    \ creating the display for the user. Using Cake functions and components, as Bake\
    \ does with the Session component, takes the place of your own functions or code,\
    \ but in general the controller will operate as a general PHP script.\n\n## A\
    \ Form Submission Sequence\n\nHandling user form data goes a step beyond a simple\
    \ page request sequence. In this scenario, a few things will happen in order:\n\
    \n1. The controller action is called, and it determines whether the user is submitting\
    \ any form data.\n2. If there is no form data, the controller instructs the view\
    \ to display the form. If editing an existing record, the controller may perform\
    \ a database lookup to propagate the fields in the subsequent view.\n3. The user\
    \ fills out the form and submits it to the controller.\n4. This time, the controller\
    \ finds form data in the request and handles the data. Depending on the results\
    \ of the action’s operation, another view is rendered, usually with a feedback\
    \ page that alerts the user to a successful submission or a failed one.\n\nTo\
    \ understand the internals of Cake flow, open `app/controllers/posts_controller.php`,\
    \ and scroll to the Add action. It should appear similar to Listing 6-3.\n\n**Listing\
    \ 6-3.** *The Add Action in the Posts Controller*\n\n```\nfunction add() {\n \
    \   if (!empty($this->data)) {\n        $this->Post->create();\n        if ($this->Post->save($this->data))\
    \ {\n            $this->Session->setFlash(__('The Post has been saved', true));\n\
    \            $this->redirect(array('action'=>'index'));\n        } else {\n  \
    \          $this->Session->setFlash(__('The Post could not be saved. Please try\
    \ again.', true));\n        }\n    }\n    $tags = $this->Post->Tag->find('list');\n\
    \    $users = $this->Post->User->find('list');\n    $this->set(compact('tags',\
    \ 'users'));\n}\n```\n\nThe Add action behaves like the outline earlier: in line\
    \ 2 of Listing 6-3, it checks for any user form data with a simple logic test\
    \ and then saves the data to the database (if present); otherwise, it returns\
    \ an error to the user and renders the Add view.\n\n### `$this->data`\n\nCake\
    \ handles form data for you and sticks to convention when doing so. All the form\
    \ fields supplied to the controller will automatically be formatted in an array\
    \ with naming conventions that dictate where in the array the data will be stored.\
    \ The form will always be parsed and organized following the MVC structure. For\
    \ an example, observe Listing 6-4.\n\n**Listing 6-4.** *A Simple Form*\n\n```\n\
    <?=$form->create('Posts');?>\n<?=$form->input('name');?>\n<?=$form->input('content',array('type'=>'textarea','rows'=>4,'cols'=>40));?>\n\
    <?=$form->end('Submit');?>\n```"
