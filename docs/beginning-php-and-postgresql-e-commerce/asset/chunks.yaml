  trans: "\n# ECS 4.0 文档章节\n\n本材料将向您展示如何使用 REST 执行多种亚马逊操作。\n\n## 使用 SOAP 访问亚马逊电子商务服务\n\
    \n通过 SOAP，您可以使用一个复杂的 API 来访问所需的 Amazon.com 功能。以下代码使用了亚马逊 API 中的 `AWSECommerceService`、`ItemSearch`\
    \ 和 `ItemSearchRequest` 对象来执行搜索帽子的操作，这与您之前使用 REST 进行的搜索操作相同。\n\n**提示：** 要使用 SOAP\
    \ 访问亚马逊服务器，我们使用了 PHP SOAP 扩展。关于 PHP SOAP 功能的文档可以在 <http://www.php.net/soap/> 找到。请查阅附录\
    \ A，以确保您在 PHP 安装中启用了 SOAP 支持。\n\n要测试使用 SOAP 访问 Web 服务，请在您的 `hatshop` 目录中创建一个名为\
    \ `test_soap.php` 的新文件，并在其中编写以下代码：\n\n```php\n<?php\n\ntry\n{\n\n    // 初始化 SOAP\
    \ 客户端对象\n\n    $client = new SoapClient(\n\n        'http://webservices.amazon.com/AWSECommerceService/AWSECommerceService.wsdl');\n\
    \n    /* 别忘了在下一行中将字符串 '[Your Access Key ID]' 替换为您的订阅 ID */\n\n    $request = array\
    \ ('Service' => 'AWSECommerceService',\n\n                     'AWSAccessKeyId'\
    \ => '[Your Access Key ID]',\n\n                     'Request' => array ('Operation'\
    \ => 'ItemSearchRequest',\n\n                                        'Keywords'\
    \ => 'super+hats',\n\n                                        'SearchIndex' =>\
    \ 'Apparel',\n\n                                        'ResponseGroup' => array\
    \ ('Request',\n\n                                                            \
    \      'Medium')));\n\n    $result = $client->ItemSearch($request);\n\n    echo\
    \ '<pre>';\n\n    print_r($result);\n\n    echo '</pre>';\n\n}\n\ncatch (SoapFault\
    \ $fault)\n\n{\n\n    trigger_error('SOAP Fault: (faultcode: ' . $fault->faultcode\
    \ . ', ' .\n\n                  'faultstring: ' . $fault->faultstring . ')', E_USER_ERROR);\n\
    \n}\n\n?>\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n整个 SOAP\
    \ 请求代码被包含在一个 `try` 块中。如果 SOAP 请求失败，它会抛出一个 `SoapFault` 类型的异常，我们通过 `trigger_error()`\
    \ 函数将其转换为一个错误。关于 SOAP 异常的更多信息，请阅读 <http://www.php.net/manual/en/function.is-soap-fault.php>。\n\
    \nSOAP 请求的结果是一个包含请求数据的对象。如果您在浏览器中加载 `test_soap.php`（别忘了在其中放入您的 Access Key ID），它应该会以一种不易于人类阅读的文本格式显示数据。\n\
    \n代码首先创建了一个指向亚马逊 SOAP Web 服务的 SOAP 客户端对象：\n\n```php\n// 初始化 SOAP 客户端对象\n$client\
    \ = new SoapClient(\n    'http://webservices.amazon.com/AWSECommerceService/AWSECommerceService.wsdl');\n\
    ```\n\n所引用的 WSDL（Web 服务定义语言）文件描述了亚马逊 SOAP 服务器能够理解的所有函数及其参数类型。之前创建的亚马逊 SOAP 客户端对象知道所有这些函数，您现在可以像这样调用它们：\n\
    \n```php\n$result = $client->ItemSearch($request);\n```\n\n或者，您也可以使用 `__soapCall`\
    \ 函数（<http://www.php.net/manual/en/function.soap-soapclient-soapcall.php>）来进行完全相同的调用并隐式地获得相同的结果，如下所示：\n\
    \n```php\n$result->__soapCall('ItemSearch', array ($request));\n```\n\n这个 Web\
    \ 服务请求对 `\"Apparel\"` 商店中的 `\"super+hats\"` 关键词执行了一个 `ItemSearch` 操作。整个请求被放置在一个\
    \ `try-catch` 块中，该块会捕获任何潜在的异常并生成一个错误。关于包含 SOAP 错误细节的 `SoapFault` 异常类，请阅读 <http://www.php.net/manual/en/function.is-soap-fault.php>。加载\
    \ `test_soap.php` 将生成如图 17-6 所示的结果。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00015.png)\n\n![](img/00083.png)\n\n![](img/00076.png)\n\n![](img/00127.png)\n\
    \n![](img/00056.png)\n\n![](img/00154.png)\n\n![](img/00105.png)\n\n![](img/00126.png)\n\
    \n![](img/00166.png)\n\n![](img/00035.png)\n\n![](img/00148.png)\n"
- fmt: "### Figure 17-6. The results of the SOAP request - Integrating Amazon E-Commerce\
    \ Service with Hat Shop\n\nThe goal is to bring some books related to \"super\
    \ hats\" from Amazon to your store. You'll build a special department with no\
    \ categories that will display some book info (cover image, title, authors, and\
    \ price). Each book will have a Buy from Amazon link that allows your visitor\
    \ to buy the book from Amazon.com. If you apply for an Amazon Associates ID account,\
    \ you'll get a small commission from this. After following the exercises, you'll\
    \ implement the Amazon integration as shown earlier in Figure 17-1.\n\nThe following\
    \ link engages a REST search for Amazon Books on the \"super hats\" keywords and\
    \ returns the first ten products' data sorted by their sales rank: `http://webservices.amazon.com/onca/xml?Service=AWSECommerceService`\n\
    \n`&Operation=ItemSearch`\n\n`&AWSAccessKeyId=[Your Access Key ID]`\n\n`&Keywords=super+hat`\n\
    \n`&SearchIndex=Apparel`\n\n`&ResponseGroup=Request%2CMedium%2CImages%2COffers&Sort=salesrank`\n\
    \nFrom these products, we will place on our site only the ones available for purchase\
    \ and with cover images.\n\n### Implementing the Business Tier\n\nIn the business\
    \ tier, you'll add the code that accesses the ECS system.\n\n#### Exercise: Adding\
    \ ECS Communication Code to the Business Tier\n\n1.  Add the following code in\
    \ your `include/config.php` file:\n    \n    ```php\n    // Amazon E-Commerce\
    \ Service\n    // define('AMAZON_METHOD', 'REST');\n    define('AMAZON_METHOD',\
    \ 'SOAP');\n    define('AMAZON_WSDL',\n      'http://webservices.amazon.com/AWSECommerceService/AWSECommerceService.wsdl');\n\
    \    define('AMAZON_REST_BASE_URL',\n      'http://webservices.amazon.com/onca/xml?Service=AWSECommerceService');\n\
    \    \n    // Set Amazon Access Key ID\n    define('AMAZON_ACCESS_KEY_ID', ' *[Your\
    \ Access Key ID]*');\n    \n    // Set Amazon Associates ID\n    define('AMAZON_ASSOCIATES_ID',\
    \ ' *[Your amazon associates ID]*');\n    \n    // Set Amazon request options\n\
    \    define('AMAZON_SEARCH_KEYWORDS', 'super hat');\n    define('AMAZON_SEARCH_NODE',\
    \ 'Apparel');\n    define('AMAZON_RESPONSE_GROUPS', 'Request,Medium');\n    ```\n\
    \n2.  Create a new file named `amazon.php` in the business folder, and add the\
    \ following code to it. The single public method, which will be called from the\
    \ upper tiers, is `GetProducts`, whereas the others are private methods for internal\
    \ use that support the functionality of `GetProducts`.\n    \n    ```php\n   \
    \ <?php\n    \n    // Class for accessing ECS\n    class Amazon\n    {\n     \
    \ public function Amazon()\n      {\n      }\n    \n      // Retrieves Amazon\
    \ products for sending to presentation tier\n      public function GetProducts()\n\
    \      {\n        // Use SOAP to get data\n        if (AMAZON_METHOD == 'SOAP')\n\
    \          $result = $this->GetDataWithSoap();\n        // Use REST to get data\n\
    \        else\n          $result = $this->GetDataWithRest();\n    \n        //\
    \ Initializes Array object\n        $results = array ();\n    \n        // Format\
    \ results\n        $results = $this->DataFormat($result);\n    \n        // Returns\
    \ results\n        return $results;\n      }\n    \n      // Call ECS using REST\n\
    \      private function GetDataWithRest()\n      {\n        $params = array ('Operation'\
    \ => 'ItemSearch',\n                         'SubscriptionId' => AMAZON_ACCESS_KEY_ID,\n\
    \                         'Keywords' => AMAZON_SEARCH_KEYWORDS,\n            \
    \             'SearchIndex' => AMAZON_SEARCH_NODE,\n                         'ResponseGroup'\
    \ => AMAZON_RESPONSE_GROUPS,\n                         'Sort' => 'salesrank');\n\
    \    \n        $query_string = '&';\n        foreach ($params as $key => $value)\n\
    \          $query_string .= $key . '=' . urlencode($value) . '&';\n        $amazon_url\
    \ = AMAZON_REST_BASE_URL . $query_string;\n    \n        // Get the XML response\
    \ using REST\n        $amazon_xml = file_get_contents($amazon_url);\n    \n  \
    \      // Unserialize the XML and return\n        return simplexml_load_string($amazon_xml);\n\
    \      }\n    \n      // Call ECS using SOAP\n      private function GetDataWithSoap()\n\
    \      {\n        try\n        {\n          $client = new SoapClient(AMAZON_WSDL);\n\
    \    \n          /* Set up an array containing input parameters to be\n      \
    \       passed to the remote procedure */\n        }\n    ```"
