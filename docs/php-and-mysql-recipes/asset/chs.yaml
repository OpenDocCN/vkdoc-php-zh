  ;\n  $mysqli->query($SQL);\n}\n```\n\n添加一小段 JavaScript 代码将遍历表单的所有元素，验证姓名或邮箱字段是否为空，如果为空则显示错误信息。在验证错误时返回`false`将确保表单不会被提交。\n\
  \n该验证可以轻松扩展，使用正则表达式检查开头/结尾的空格，甚至可以验证邮箱地址是否包含可用于发送邮件的有效邮箱地址。\n\n当同一个脚本用于生成表单和处理 POST\
  \ 请求时，通常的做法是在表单标签的 action 属性中使用`$_SERVER['PHP_SELF']`。这将确保即使脚本被重命名也能正常工作。\n\n##\
  \ 食谱 13-4. 表单生成\n\n### 问题\n\n使用静态 HTML 文件或嵌入在 php 脚本中的 HTML 片段来创建 HTML 表单可能很繁琐，尤其是当应用程序中有多种数据类型需要编辑时。如何让表单创建变得更简单？\n\
  \n### 解决方案\n\n大多数在多个地方使用的表单元素每次使用时都遵循相同的模式。可以创建一个通用函数或类，用于根据简单的表单定义生成 HTML 表单。\n\
  \n第一步是定义表单类应支持的输入类型，然后可以搭建实现框架，最后创建代码来处理实际表单标签的生成。\n\n如前所述，表单由 form 标签定义，内部包含一个或多个输入元素。一个基本表单可以包含文本、数字、单选按钮、下拉列表、复选框和多选选项。每个选项都可以有一个预定义的布局，可以根据需要多次重复使用。\n\
  \n\n\n生成 HTML 表单的基础类可以通过几个方法创建。\n\n```php\n<?php\n\nclass HTMLForm {\n\n    function\
  \ __constructor($id, $action, $method = \"POST\") {\n\n    }\n\n    function AddInput($name,\
  \ $type, $value = null) {\n\n    }\n\n    function __toString() {\n\n    }\n\n}\n\
  ```\n\n第一个方法是构造函数，在实例化对象时被调用。构造函数接受几个参数，这些参数定义了表单标签上的一些属性。\n\n接下来是一个用于向表单添加输入项的函数。所列出的参数是最小集合。随着类的开发，可能需要添加诸如最小值和最大值、下拉选项以及验证函数等内容，但这是一个好的开始。最后，`__toString()`方法用于生成输出。当对象在字符串上下文中使用时，`__toString()`函数将被调用，其返回值将作为对象的值。\n\
  \n**工作原理**\n\n构造函数的目的是初始化对象。在此例中，它所做的只是存储传入的参数。这些值将在生成输出时使用。\n\n```php\n<?php\n\n\
  // 13_4.php\n\nclass HTMLForm {\n\n    private $id;\n    private $action;\n    private\
  \ $method;\n    private $inputs = [];\n\n    function __constructor($id, $action,\
  \ $method = \"POST\") {\n        $this->id = $id;\n        $this->action = $action;\n\
  \        $this->method = $method;\n    }\n\n    function AddInput($type, $name,\
  \ $label, $value = null) {\n        $this->inputs[] = [\n            $type,\n  \
  \          $name,\n            $label,\n            $value\n        ];\n    }\n\n\
  \    function __toString() {\n        $form = '<form id=\"%s\" action=\"%s\", method=\"\
  %s>%s</form>';\n        $inputs = [];\n\n        foreach($this->inputs as $input)\
  \ {\n            switch($input[0]) {\n                case \"hidden\" :\n      \
  \              $template = '<input type=\"hidden\" name=\"%s\" value=\"%s\" />';\n\
  \                    $inputs[] = sprintf($template, $input[1], $input[3]);\n   \
  \                 break;\n                case \"text\" :\n                    $template\
  \ = '<div><label for=\"%s\">%s</label><input type=\"text\" name=\"%s\" value=\"\
  %s\" /></div>';\n                    $inputs[] = sprintf($template, $input[1], $input[2],\
  \ $input[1], $input[3]);\n                    break;\n                case \"textarea\"\
  \ :\n                    $template = '<div><label for=\"%s\">%s</label><textarea\
  \ type=\"text\" name=\"%s\" />%s</textarea></div>';\n                    $inputs[]\
  \ = sprintf($template, $input[1], $input[2], $input[1], $input[3]);\n          \
  \          break;\n                case \"number\" :\n                    $template\
  \ = '<div><label for=\"%s\">%s</label><input type=\"number\" name=\"%s\" value=\"\
  %s\" /></div>';\n                    $inputs[] = sprintf($template, $input[1], $input[2],\
  \ $input[1], $input[3]);\n                    break;\n                case \"select\"\
  \ :\n                    $template = '<div><label for=\"%s\">%s</label><select name=\"\
  %s\" >%s</select></div>';\n                    $options = [];\n                \
  \    if (is_array($value)) {\n                        $option = '<option value=\"\
  %s\">%s</option>';\n                        foreach($value as $k => $v) {\n    \
  \                        $options[] = sprintf($option, $k, $v);\n              \
  \          }\n                    }\n                    $inputs[] = sprintf($template,\
  \ $input[1], $input[2], $input[1], implode(\"\", $options));\n                 \
  \   break;\n            }\n        }\n        $form = sprintf($form, $this->id,\
  \ $this->action, $this->method, implode(\"\", $inputs));\n        return $form;\n\
  \    }\n}\n```\n\n`AddInput()`方法用于向表单添加新的输入项。该方法有三个必需参数和一个可选参数，主要目的是创建一个包含所有输入字段定义的数组。\n\
  \n最后，`__toString()`方法用于生成实际的表单。此方法使用多个 HTML 标签的字符串模板，并使用 `sprintf()`函数将占位符（`%s`）替换为实际值。\n\
  \n`HTMLForm`类定义在名为 `13_4.php` 的文件中。可以包含此文件并实例化该对象。\n\n```php\n<?php\n\n// 13_5.php\n\
  \nrequire \"./13_4.php\";\n\n$form = new HTMLForm('contact', $_SERVER['PHP_SELF']);\n\
  $form->AddInput('text', 'name', 'Name');\n$form->AddInput('text', 'email', 'Email');\n\
  $form->AddInput('text', 'phone', 'Phone');\n$form->AddInput('textarea', 'comment',\
  \ 'Comment');\n\necho <<<HEREDOC\n<!DOCTYPE html>\n<html>\n<body>\n$form\n</body>\n\
  </html>\nHEREDOC;\n```\n\n此示例没有添加任何特定样式，因此浏览器将为每个元素添加默认样式。添加 Bootstrap CSS 相对简单，并且可以轻松添加更多属性来处理每个元素上的`class`、`required`和其他属性。\n\
  \n此示例中使用了几种新的输入类型。`hidden`类型是一种添加额外信息的方式，这些信息超出用户控制范围，但会作为请求的一部分传递给服务器。`textarea`类型是一种多行输入形式，允许用户输入包含换行符的较长文本。\n\
  \n可以将`AddInput()`方法拆分为每个输入类型的独立函数，每个方法可以具有与该特定类型匹配的参数。\n\n```php\n<?php\n\n// 13_6.php\n\
  \nclass HTMLForm {\n\n    private $id;\n    private $action;\n    private $method;\n\
  \    private $inputs = [];\n\n    function __constructor($id, $action, $method =\
  \ \"POST\") {\n        $this->id = $id;\n        $this->action = $action;\n    \
  \    $this->method = $method;\n    }\n\n    function AddHidden($name, $value = null)\
  \ {\n        $this->inputs[] = <<<HEREDOC\n<input type=\"hidden\" name=\"{$name}\"\
  \ value=\"{$value}\" />\nHEREDOC;\n    }\n\n    function AddText($name, $label,\
  \ $value = null, $required = false) {\n        $attrib = $required ? \" required\"\
  \ : \"\";\n        $this->inputs[] = <<<HEREDOC\n<div>\n    <label for=\"{$name}\"\
  >{$label}</label>\n    <input type=\"text\" name=\"{$name}\" value=\"{$value}\"\
  {$attrib} />\n</div>\nHEREDOC;\n    }\n\n    function AddTextArea($name, $label,\
  \ $value = null) {\n        $this->inputs[] = <<<HEREDOC\n<div>\n    <label for=\"\
  {$name}\">{$label}</label>\n    <textarea name=\"{$name}\">{$value}</textarea>\n\
  </div>\nHEREDOC;\n    }\n\n    function AddNumber($name, $label, $value = null,\
  \ $required = false, $min = null, $max = null) {\n        $attrib = $required ?\
  \ \" required\" : \"\";\n        if (is_numeric($min)) {\n            $attrib .=\
  \ \" min=\\\"{$min}\\\"\";\n        }\n        if (is_numeric($max)) {\n       \
  \     $attrib .= \" max=\\\"{$max}\\\"\";\n        }\n        $this->inputs[] =\
  \ <<<HEREDOC\n<div>\n    <label for=\"{$name}\">{$label}</label>\n    <input type=\"\
  number\" name=\"{$name}\" value=\"{$value}\"{$attrib} />\n</div>\nHEREDOC;\n   \
  \ }\n\n    function AddSelect($name, $label, $values = [], $selected = null) {\n\
  \        $options = [];\n        if (is_array($values)) {\n            $option =\
  \ '<option value=\"%s\"%s>%s</option>';\n            foreach($values as $k => $v)\
  \ {\n                if ($k == $selected) {\n                    $options[] = sprintf($option,\
  \ $k, \" selected\", $v);\n                } else {\n                    $options[]\
  \ = sprintf($option, $k, \"\", $v);\n                }\n            }\n        }\n\
  \        $options = implode(\"\", $options);\n        $this->inputs[] = <<<HEREDOC\n\
  <div>\n    <label for=\"{$name}\">{$label}</label>\n    <select name=\"{$name}\"\
  >$options</select>\n</div>\nHEREDOC;\n    }\n\n    function __toString() {\n   \
  \     $form = '<form id=\"%s\" action=\"%s\", method=\"%s>%s</form>';\n        $inputs\
  \ = [];\n        $form = sprintf($form, $this->id, $this->action, $this->method,\
  \ implode(\"\", $this->inputs));\n        return $form;\n    }\n}\n```\n\n在这种情况下，每个`Add...()`方法负责为输入创建\
  \ HTML 布局。这使得`__toString()`方法更简单。使用这个类与之前的示例非常相似。\n\n```php\n<?php\n\n// 13_7.php\n\
  \nrequire \"./13_6.inc\";\n\n$form = new HTMLForm('contact', $_SERVER['PHP_SELF']);\n\
  $form->AddHidden('form', 'Contact');\n$form->AddText('name', 'Name', null, true);\n\
  $form->AddText('email', 'Email', null, true);\n$form->AddText('phone', 'Phone');\n\
  $form->AddSelect('ref', 'How did your find us?', ['Google', 'Bing', 'Ask', 'Yahoo',\
  \ 'Other']);\n$form->AddTextarea('comment', 'Comment');\n\necho <<<HEREDOC\n<!DOCTYPE\
  \ html>\n<html>\n<body>\n$form\n</body>\n</html>\nHEREDOC;\n```\n\n## 13-5. 文件上传\n\
  \n### 问题\n\n到目前为止，我们研究了使用键盘或鼠标输入填充的 HTML 表单。这主要生成文本输入，但鉴于网页的图形特性，有必要包含来自计算机硬盘的文件。\n\
  \n### 解决方案\n\n将文件上传到 PHP 脚本需要在`php.ini`中启用一些设置。首先，有`file_uploads = On`。如果未设置此项，PHP\
  \ 将忽略所有上传的文件。其次，有上传大小的限制。这用于防止用户上传非常大的文件，这些文件最终会填满磁盘。\n\n\n\n# PHP 中的文件上传\n\n控制此功能的设置名为\
  \ `upload_max_filesize`，其默认值为 2Mb。此外，还有针对每次请求最大文件数的设置 `max_file_uploads`，默认值为 20。通常还有一个针对\
  \ POST 请求最大尺寸的设置，该值由 `post_max_size` 定义，默认值为 8Mb。如果你打算允许输入大段文本，则需要相应调整此设置。\n\n特殊的输入类型\
  \ `\"file\"` 允许用户浏览本地硬盘以选择特定文件。文件的选择需要用户主动操作。浏览器无法通过脚本代码被指示从用户硬盘中任意选取文件。\n\n文件输入框会为用户提供一个\
  \ **\"浏览\"** 按钮。当用户点击浏览按钮时，浏览器会打开一个文件对话框。浏览器会根据平台指南处理浏览按钮和对话框的外观与交互。这些元素是无法进行样式定制的。\n\
  \n创建 HTML 表单时，必须在表单中添加 `enctype` 属性，以便表单能够处理文件上传。该属性的值定义为 `enctype=\"multipart/form-data\"\
  `，并且方法必须设置为 `POST`。无法将文件上传作为 `GET` 请求的一部分。忘记设置 `enctype` 属性会导致文件名被存储在 `$_POST` 数组中，而文件本身则不会存在于服务器上。\n\
  \n# 第 13 章：创建和使用表单\n\n在服务器端，上传文件的内容并不存在于常规的 `$_POST` 数组中，而是可以在 `$_FILES` 数组中找到。文件的上传发生在\
  \ PHP 脚本开始执行之前。文件会被赋予一个临时名称并放置在 `/tmp` 文件夹中。实际的位置由 `php.ini` 中的 `upload_temp_dir`\
  \ 设置控制。此外，还可以通过 `php.ini` 中的设置来限制上传文件的最大尺寸以及整个 POST 请求的尺寸。如果你计划允许用户上传大文件，则必须相应调整这些值。\n\
  \n超级全局变量 `$_FILES` 会根据输入的名称、所选文件的名称以及上传文件的大小，包含一系列值。\n\n### 工作原理\n\n文件上传通过一个表单（用户在此选择文件）和一个接收上传文件的\
  \ PHP 脚本来处理。和之前一样，这两者可以位于同一个 PHP 脚本中。下一个示例展示了一个包含两个输入框的简单表单。第一个是文本字段，第二个是文件字段。\n\
  \n```php\n<?php\n// 13_8.php\n\nif (empty($_POST)) {\n    // 没有提交内容，显示表单\n    echo\
  \ <<<HEREDOC\n<!DOCTYPE html>\n<html>\n<head>\n<title>文件上传</title>\n</head>\n<body>\n\
  <form name=\"contact\" method=\"POST\" action=\"{$_SERVER['PHP_SELF']}\" enctype=\"\
  multipart/form-data\" >\n<div>\n<label for=\"name\">姓名</label>\n<input name=\"name\"\
  \ type=\"text\" />\n</div>\n<div>\n<label for=\"email\">文件</label>\n<input name=\"\
  file\" type=\"file\" />\n</div>\n<button class=\"btn btn-default\" onclick=\"document.contact.submit()\"\
  >提交</button>\n</form>\n</body>\n</html>\nHEREDOC;\n}\nelse {\n    print(\"<pre>\"\
  );\n    print_r($_POST);\n    print_r($_FILES);\n    print(\"</pre>\");\n}\n?>\n\
  ```\n\n脚本的初始输出是表单，当表单被提交时，它会显示两个超级全局变量 `$_POST` 和 `$_FILES` 的内容：\n\n```\nArray (\n\
  \    [name] => test\n)\nArray (\n    [file] => Array\n        (\n            [name]\
  \ => city.list.json\n            [type] => application/json\n            [tmp_name]\
  \ => /tmp/php0pdVpy\n            [error] => 0\n            [size] => 19208925\n\
  \        )\n)\n```\n\n`$_FILES` 数组的属性是输入框的名称。它本身也是一个数组，包含文件名、MIME 类型、临时名称和路径、错误代码（0\
  \ 表示无错误）以及上传文件的字节大小。\n\n临时文件会在脚本终止时自动删除，除非脚本中发生了致命错误。为了将文件保留在服务器上，脚本必须将文件移动到其他位置。除了检查上传过程中的错误状态外，还有几个函数对移动文件非常有用。\n\
  \n\n\n函数 `is_uploaded_file()` 用于检查文件是否通过 HTTP POST 方式上传。该函数接受一个参数，通常为 `$_FILES['file']['tmp_name']`。另一个函数\
  \ `move_uploaded_file()` 用于将上传的文件移动并重命名到其永久位置。该函数接受两个参数：第一个是临时文件名，第二个是新文件/位置的路径和名称。在上面的示例中，代码大致如下：\n\
  \n```php\n<?php\n// 13_9.php\n\nif ($_FILES['file']['error'] == UPLOAD_ERR_OK &&\n\
  \    is_uploaded_file($_FILES['file']['tmp_name'])) {\n    move_uploaded_file($_FILES['file']['tmp_name'],\n\
  \        \"/path/to/file/{$_FILES['file']['name']}\");\n}\n```\n\n## **配方 13-6.\
  \ 表单数据**\n\n### **问题**\n\n在前面的所有配方中，我们都使用了 HTML 表单让用户输入数据，并通过按钮将数据提交到服务器。是否可以在没有提交按钮的情况下提交表单？\n\
  \n### **解决方案**\n\n在大多数现代浏览器（Firefox、Chrome、IE 10 及更新版本）中，存在一个名为 `FormData` 的对象。该对象可用于构建并提交具有动态字段数量的表单。\n\
  \n## **第 13 章 ■ 创建和使用表单**\n\n### **工作原理**\n\n从服务器端来看，POST 的接收和管理方式没有区别，但在客户端，POST\
  \ 完全由 JavaScript 创建，并通过 `XMLHTTPRequest` 请求提交。\n\n```javascript\nvar content = new\
  \ FormData();\ncontent.append('name', 'Frank Kromann');\ncontent.append('email',\
  \ 'fmk@php.net');\nxmlhttp = new XMLHttpRequest();\nxmlhttp.open(\"POST\", URL,\
  \ true);\nxmlhttp.send(content);\n```\n\n这可用于在提交整个表单之前验证部分表单。例如，您可以先检查数据库中是否存在用户名，然后再允许用户提交表单，或者用于其他服务器端验证。\n\
  \n## **第 14 章**\n\n## **XML、RSS、WDDX 和 SOAP**\n\nWeb 技术不仅仅是浏览器和 Web 服务器使用的 HTML\
  \ 和 JavaScript。其他类型的客户端使用其他协议和数据格式来交换和呈现数据。本章包含如何使用 HTML 和 JavaScript 以外的格式创建内容的配方。\n\
  \n### **配方 14-1. 使用 XML 交换数据**\n\n#### **问题**\n\nXML 是一种结构化数据格式，具有类似 HTML 的标签和属性。它通常更严格一些，因为缺少相应结束标签的标签会导致错误。在\
  \ HTML 中，允许出现 `<hr>` 或 `<br>` 标签而不需要对应的 `</hr>` 或 `</br>`。XHTML 标准强制执行 XML 约定，要求将标签写成\
  \ `<hr/>` 或 `<br/>`，这些是有效的 XML。\n\nXML 通常用于交换数据，因为它是一种平台无关的标准，易于阅读和解析。就像 PHP 可以用于生成\
  \ XML 内容一样，方法类似于生成 HTML 内容，但将 XML 结构作为字符串管理并不总是最有效的方式，尤其是在将 XML 作为 PHP 脚本输入时解析值。PHP\
  \ 提供了哪些工具来生成和使用 XML 内容？\n\n#### **解决方案**\n\n有多种不同的方式可以使用 PHP 生成 XML。最简单的方法是创建一个包含\
  \ XML 字符串的字符串，并输出给客户端，同时设置正确的头信息。对于像插入或更新命令的响应这样的小型 XML 字符串，这种方法效果很好，因为 XML 相对简单。下一个示例展示了如何使用\
  \ PHP 生成一个包含错误或成功 XML 结构的简单响应。\n\n```php\n<?php\n// 14_1.php\n// Process request\
  \ and make a response\n\nheader(\"Content-Type: text/xml\");\n\nif ($error) {\n\
  \    $resp = <<<HEREDOC\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<error>\n \
  \   <code>100</code>\n    <message>The insert failed</message>\n</error>\nHEREDOC;\n\
  } else {\n    $resp = <<<HEREDOC\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<success>\n\
  \    <message>The record was added</message>\n</success>\nHEREDOC;\n}\n```\n\n\n\
  \n# XML 处理扩展概览\n\n当 XML 结构变得更加复杂，或者你想要从 XML 结构转换为可用于遍历值的对象结构时，PHP 提供了多种选项。其中大多数都需要系统安装名为`libxml`的库。\n\
  \n`DOM`扩展允许通过所谓的 DOM API 来操作 XML 文档。这是一个面向对象的接口。\n\n`libxml`扩展是围绕`libxml`库的“包装器”。它主要被许多其他\
  \ XML 扩展所使用，但它本身也提供了一些可以直接调用的函数。\n\n`SDO`扩展提供了一种使用相同接口处理来自不同数据源的数据的方法。数据的使用者无需了解底层数据源以及如何与之交互。数据源可以是\
  \ XML 文件、电子表格、数据库查询等。\n\n`SimpleXML`扩展是在 PHP 5 中引入的。这是一个轻量级且易于使用的扩展，用于读写 XML 内容。\n\
  \n`WDDX`扩展使得通过不同协议在不同编程语言之间进行数据交换成为可能。\n\n`XMLDiff`扩展可用于比较两个 XML 文档，并像源代码控制系统那样对\
  \ XML 文档应用补丁。\n\n`XML Parser`扩展是一组函数，可用于为特定的文档定义构建 XML 解析器。这些解析器可以处理文件的较小部分，因此无需将大型\
  \ XML 文档一次性全部加载到内存中。\n\n`XML Reader`扩展充当一个游标，一次读取一个节点的 XML 结构。\n\n`XML Writer`扩展可用于创建\
  \ XML 流，其中每个节点被处理和写入，无需将整个数据结构加载到内存中来创建 XML 内容。\n\n最后，还有`XSLT`扩展，它使得转换 XML 结构成为可能。此扩展需要`libxslt`库。\n\
  \n### 工作原理\n\n`SimpleXML`扩展可能是最容易使用的。解析 XML 文档并将其转换为 PHP 对象结构只需几行代码即可完成。在本例中，我们将使用一个外部源作为\
  \ XML 文档。该示例使用了 OpenWeatherMap.com 的数据源。这是一个免费的天气数据源。你只需要注册一个 API 密钥。该 API 密钥必须作为参数传递给每个请求。在示例中，使用`<API\
  \ KEY>`的地方应替换为你自己的密钥。你可以通过以下链接获取 API 密钥：[`openweathermap.org/appid`](http://openweathermap.org/appid)。\n\
  \n要获取洛杉矶的当前天气，你可以使用以下带有几个参数的 URL：`http://api.openweathermap.org/data/2.5/weather`\n\
  \n该 API 接受三个参数。第一个是位置的指示。这可以是一个城市和一个国家代码。\n\n`q=Los%20Angeles,us`\n\n第二个参数是`mode`。API\
  \ 默认返回 JSON 响应。要获取 XML 响应，请添加以下参数：\n\n`mode=xml`\n\n最后，添加一个包含您的 API 密钥的参数：\n\n`appid=<API\
  \ KEY>`\n\n当使用`simplexml:load_file()`函数时，作为第一个参数提供的文件名可以指向本地文件系统上的一个文件，也可以是一个用于从远程服务器读取\
  \ XML 内容的 URL：\n\n```php\n<?php\n// 14_2.php\n\n$xml = simplexml:load_file(\"http://api.openweathermap.org/data/2.5/weather?q=Los%20\n\
  Angeles,us&mode=xml&appid=<API KEY>\");\nprint_r($xml);\n```\n\n在这个简单的示例中，XML 结构被请求并在同一个函数调用中传递。`simplexml:load_file()`函数将返回一个`SimpleXMLElement`类的实例，如下面的示例输出所示。\n\
  \n```\nSimpleXMLElement Object\n(\n    [city] => SimpleXMLElement Object\n     \
  \   (\n            [@attributes] => Array\n                (\n                 \
  \   [id] => 5368361\n                    [name] => Los Angeles\n               \
  \ )\n            [coord] => SimpleXMLElement Object\n                (\n       \
  \             [@attributes] => Array\n                        (\n              \
  \              [lon] => -118.24\n                            [lat] => 34.05\n  \
  \                      )\n                )\n            [country] => US\n     \
  \       [sun] => SimpleXMLElement Object\n                (\n                  \
  \  [@attributes] => Array\n                        (\n                         \
  \   [rise] => 2016-04-10T13:26:29\n                            [set] => 2016-04-11T02:21:43\n\
  \                        )\n                )\n        )\n)\n```\n\n\n\n# 第 14 章\
  \ ■ XML、RSS、WDDX 与 SOAP\n\n```\n[temperature] => SimpleXMLElement Object\n(\n  \
  \  [@attributes] => Array\n        (\n            [value] => 292.26\n          \
  \  [min] => 285.15\n            [max] => 294.15\n            [unit] => kelvin\n\
  \        )\n)\n[humidity] => SimpleXMLElement Object\n(\n    [@attributes] => Array\n\
  \        (\n            [value] => 56\n            [unit] => %\n        )\n)\n[pressure]\
  \ => SimpleXMLElement Object\n(\n    [@attributes] => Array\n        (\n       \
  \     [value] => 1013\n            [unit] => hPa\n        )\n)\n[wind] => SimpleXMLElement\
  \ Object\n(\n    [speed] => SimpleXMLElement Object\n        (\n            [@attributes]\
  \ => Array\n                (\n                    [value] => 6.2\n            \
  \        [name] => Moderate breeze\n                )\n        )\n    [gusts] =>\
  \ SimpleXMLElement Object\n        (\n        )\n    [direction] => SimpleXMLElement\
  \ Object\n        (\n            [@attributes] => Array\n                (\n   \
  \                 [value] => 260\n                    [code] => W\n            \
  \        [name] => West\n                )\n        )\n)\n[clouds] => SimpleXMLElement\
  \ Object\n(\n    [@attributes] => Array\n        (\n            [value] => 90\n\
  \            [name] => overcast clouds\n        )\n)\n[visibility] => SimpleXMLElement\
  \ Object\n(\n)\n[precipitation] => SimpleXMLElement Object\n(\n    [@attributes]\
  \ => Array\n        (\n            [mode] => no\n        )\n)\n[weather] => SimpleXMLElement\
  \ Object\n(\n    [@attributes] => Array\n        (\n            [number] => 804\n\
  \            [value] => overcast clouds\n            [icon] => 04d\n        )\n\
  )\n[lastupdate] => SimpleXMLElement Object\n(\n    [@attributes] => Array\n    \
  \    (\n            [value] => 2016-04-10T20:27:02\n        )\n)\n```\n\n使用 `var_dump()`\
  \ 函数可以快速获取 XML 对象的信息，但就为网站生成内容而言，它的作用并不大。\n\n为了让这个示例更有实用价值，我们可以从 XML 中提取一些值，并以表格形式展示它们。其中值得关注的数值包括温度、风和云量。通过将对象传递给\
  \ `foreach` 循环，可以列出 XML 对象中所有可用的属性。\n\n```php\n<?php\n// 14_3.php\n$xml = simplexml:load_file('http://api.openweathermap.org/data/2.5/weather?q=Los%20Angeles,us&mode=xml&appid=<API\
  \ KEY>');\nforeach($xml as $attrib => $value) {\n    echo $attrib . \"\\n\";\n}\n\
  ```\n\n这将生成以下输出。\n\n```\ncity\ntemperature\nhumidity\npressure\nwind\nclouds\nvisibility\n\
  precipitation\nweather\nlastupdate\n```\n\n这些属性中的每一个也都是一个对象，它们是 `SimpleXMLElement`\
  \ 类的实例。temperature 对象具有 value、min、max 和 unit 参数。在这个例子中，温度单位是开尔文，因此需要做一些数学计算才能以摄氏度或华氏度显示当前温度。\n\
  \n```php\n<?php\n// 14_4.php\n$xml = simplexml:load_file('http://api.openweathermap.org/data/2.5/weather?q=Los%20Angeles,us&mode=xml&appid=<API\
  \ KEY>');\necho \"City: {$xml->city['name']}\\n\";\nif ($xml->temperature['unit']\
  \ == 'kelvin') {\n    $k = $xml->temperature['value'];\n    $c = $k - 273.15;\n\
  \    $f = $c * 9 / 5 + 32;\n}\nprintf(\"Temperature: %3.1f K / %3.1f C / %3.1f F\\\
  n\", $k, $c, $f);\n```\n\n这将显示所请求城市名称，以及根据开放天气地图在一个“寒冷”的三月夜晚测得的开尔文、摄氏度和华氏度温度。\n\n\
  ```\nCity: Los Angeles\nTemperature: 282.2 K / 8.9 C / 47.9 F\n```\n\n请注意，顶层属性（如\
  \ city、temperature 等）作为对象的成员变量进行访问，而内部元素的成员则作为属性的数组键进行访问。这一区别可以从 `$xml` 变量的原始转储中看出：其中每个内部对象上的\
  \ `@attributes` 元素被标记为数组，而不是 `SimpleXMLElement` 类的实例。这在原始 XML 内容中也能看到，城市名称和 temperature\
  \ 元素的值是 XML 标签上的属性。\n\n```xml\n<current>\n    <city id=\"5368361\" name=\"Los Angeles\"\
  >\n        <coord lon=\"-118.24\" lat=\"34.05\"/>\n        <country>US</country>\n\
  \        <sun rise=\"2016-03-13T14:05:11\" set=\"2016-03-14T01:59:41\"/>\n    </city>\n\
  \    <temperature value=\"282.202\" min=\"282.202\" max=\"282.202\" unit=\"kelvin\"\
  />\n    <humidity value=\"85\" unit=\"%\"/>\n    <pressure value=\"966.32\" unit=\"\
  hPa\"/>\n    <wind>\n        <speed value=\"0.84\" name=\"Calm\"/>\n        <gusts/>\n\
  \        <direction value=\"202.504\" code=\"SSW\" name=\"South-southwest\"/>\n\
  \    </wind>\n    <clouds value=\"0\" name=\"clear sky\"/>\n    <visibility/>\n\
  \    <precipitation mode=\"no\"/>\n    <weather number=\"800\" value=\"clear sky\"\
  \ icon=\"01n\"/>\n    <lastupdate value=\"2016-03-13T01:42:16\"/>\n</current>\n\
  ```\n\n\n\n### 添加风况（速度和方向）到输出\n\n需要第二层间接访问。因为风元素包含三个独立的子元素：速度、阵风和风向。\n\n```php\n\
  <?php\n\n// 14_5.php\n\n$xml = simplexml:load_file('http://api.openweathermap.org/data/2.5/weather?q=Los%20\n\
  \nAngeles,us&mode=xml&appid=<API KEY>');\n\necho \"City: {$xml->city['name']}\\\
  n\";\n\nif ($xml->temperature['unit'] == 'kelvin') {\n\n$k = $xml->temperature['value'];\n\
  \n$c = $k - 273.15;\n\n$f = $c * 9 / 5 + 32;\n\n}\n```\n\n第 14 章 ■ XML、RSS、WDDX\
  \ 和 SOAP\n\n```php\nprintf(\"Temperature: %3.1f K / %3.1f C / %3.1f F\\n\", $k,\
  \ $c, $f); echo \"Wind: {$xml->wind->speed['value']} mph, \" .\n\n\"direction: {$xml->wind->direction['name']}\\\
  n\";\n```\n\n现在将产生以下输出：\n\n```\nCity: Los Angeles\n\nTemperature: 282.2 K / 8.9\
  \ C / 47.9 F\n\nWind: 0.84 mph, direction: South-southwest\n```\n\n如果你希望在网站中使用这些及类似的\
  \ API 来获取数据，建议为每个 API 调用构建缓存系统。这样可以防止每次用户访问你的网站时都调用 API。首先，数据通常每小时甚至更长时间才更新一次；其次，从本地服务器获取内容总比通过互联网向远程服务器发送查询要快。\n\
  \n这里使用的 SimpleXML 解析器可以被 DOM 解析器替代，但这需要更多代码，同时也能提供更多功能。SimpleXML 解析器正如其名：简单。\n\n\
  ## 配方 14-2：生成 XML 响应\n\n### 问题\n\n上一个配方专注于将 XML 文档解析成 PHP 可用的结构，并可以通过已知路径或遍历 SimpleXMLElement\
  \ 对象访问元素。当 PHP 脚本消费已经处于 XML 格式的数据时，这非常有用。当服务器需要生成 XML 响应供其他客户端消费时，我们需要一套工具来将 PHP\
  \ 数组和其他值转换为 XML 文档。\n\n### 解决方案\n\n仍然可以使用 SimpleXMLElement 类，但这次不是从 XML 文档开始，而是从一个空的\
  \ SimpleXMLElement 实例开始。然后我们可以使用 `addChild()` 和 `addAttribute()` 方法构建 XML 对象，最后使用\
  \ `asXML()` 方法将对象转换为 XML 字符串。\n\n### 工作原理\n\n本示例从一个行星列表开始。每个行星都有若干参数，描述其与太阳的距离、行星类型、卫星数量和平均表面温度。\n\
  \n```php\n<?php\n\n// 14_6.php\n\n$planets = [\n\n'mercury' => [\n\n'type' => 'rock',\n\
  \n'dist' => 0.39,\n\n'moons' => 0,\n\n'temp' => 452\n\n],\n\n'venus' => [\n\n'type'\
  \ => 'rock',\n\n'dist' => 0.723,\n\n'moons' => 0,\n\n'temp' => 726\n\n],\n\n'earth'\
  \ => [\n\n'type' => 'rock',\n\n'dist' => 1,\n\n'moons' => 1,\n\n'temp' => 285\n\n\
  ],\n\n'mars' => [\n\n'type' => 'rock',\n\n'dist' => 1.524,\n\n'moons' => 2,\n\n\
  'temp' => 240\n\n],\n\n'jupiter' => [\n\n'type' => 'gas',\n\n'dist' => 5.203,\n\n\
  'moons' => 67,\n\n'temp' => 120\n\n],\n\n'saturn' => [\n\n'type' => 'gas',\n\n'dist'\
  \ => 9.539,\n\n'moons' => 62,\n\n'temp' => 88\n\n],\n\n'uranus' => [\n\n'type' =>\
  \ 'gas',\n\n'dist' => 19.18,\n\n'moons' => 27,\n\n'temp' => 59\n\n],\n\n'neptune'\
  \ => [\n\n'type' => 'gas',\n\n'dist' => 30.06,\n\n'moons' => 13,\n\n'temp' => 48\n\
  \n],\n\n'plutu' => [\n\n'type' => 'rock',\n\n'dist' => 39,53,\n\n'moons' => 4,\n\
  \n'temp' => 37\n\n],\n\n];\n```\n\n第 14 章 ■ XML、RSS、WDDX 和 SOAP\n\n```php\n$base\
  \ = \"<?xml version=\\\"1.0\\\" ?><planets></planets>\"; $xml = new SimpleXMLElement($base);\n\
  \nforeach($planets as $name => $data) {\n\n$p = $xml->addChild('planet');\n\n$p->addAttribute('name',\
  \ $name);\n\n$a = $p->addChild('dist');\n\n$a->addAttribute('value', $data['dist']);\n\
  \n$a->addAttribute('unit', 'AU');\n\n$p->addChild('moons', $data['moons']);\n\n\
  $a = $p->addChild('temp');\n\n$a->addAttribute('value', $data['temp']);\n\n$a->addAttribute('unit',\
  \ 'kelvin');\n\n}\n\nheader(\"Content-Type: text/xml\");\n\necho $xml->asXML();\n\
  ```\n\n`asXML()` 方法接受一个可选的文件名参数。如果传入文件名，该方法会将 XML 结构保存到文件中。如果不传参数，该方法仅返回 XML 结构作为字符串，该字符串可以发送给客户端。\n\
  \n\n\n原始输出是一长串人类难以阅读的数据，但对于计算机解析来说完全没问题。\n\n```\n<?xml version=\"1.0\"?>\n<planets><planet\
  \ name=\"mercury\"><dist value=\"0.39\" unit=\"AU\"/><moons>0</moons><temp value=\"\
  452\" unit=\"kelvin\"/></planet><planet name=\"venus\"><dist value=\"0.723\" unit=\"\
  AU\"/><moons>0</moons><temp value=\"726\" unit=\"kelvin\"/></planet><planet name=\"\
  earth\"><dist value=\"1\" unit=\"AU\"/><moons>1</moons><temp value=\"285\" unit=\"\
  kelvin\"/></planet><planet name=\"mars\"><dist value=\"1.524\" unit=\"AU\"/><moons>2</moons><temp\
  \ value=\"240\" unit=\"kelvin\"/></planet><planet name=\"jupiter\"><dist value=\"\
  5.203\" unit=\"AU\"/><moons>67</moons><temp value=\"120\" unit=\"kelvin\"/></planet><planet\
  \ name=\"saturn\"><dist value=\"9.539\" unit=\"AU\"/><moons>62</moons><temp value=\"\
  88\" unit=\"kelvin\"/></planet><planet name=\"uranus\"><dist value=\"19.18\" unit=\"\
  AU\"/><moons>27</moons><temp value=\"59\" unit=\"kelvin\"/></planet><planet name=\"\
  neptune\"><dist value=\"30.06\" unit=\"AU\"/><moons>13</moons><temp value=\"48\"\
  \ unit=\"kelvin\"/></planet><planet name=\"plutu\"><dist value=\"39.53\" unit=\"\
  AU\"/><moons>4</moons><temp value=\"37\" unit=\"kelvin\"/></planet></planets>\n\
  ```\n\n添加一些换行和缩进可以让它更容易阅读。\n\n```\n<?xml version=\"1.0\"?>\n<planets>\n<planet name=\"\
  mercury\">\n<dist value=\"0.39\" unit=\"AU\"/>\n<moons>0</moons>\n<temp value=\"\
  452\" unit=\"kelvin\"/>\n</planet>\n<planet name=\"venus\">\n<dist value=\"0.723\"\
  \ unit=\"AU\"/>\n<moons>0</moons>\n<temp value=\"726\" unit=\"kelvin\"/>\n</planet>\n\
  <planet name=\"earth\">\n<dist value=\"1\" unit=\"AU\"/>\n<moons>1</moons>\n<temp\
  \ value=\"285\" unit=\"kelvin\"/>\n</planet>\n<planet name=\"mars\">\n<dist value=\"\
  1.524\" unit=\"AU\"/>\n<moons>2</moons>\n<temp value=\"240\" unit=\"kelvin\"/>\n\
  </planet>\n<planet name=\"jupiter\">\n<dist value=\"5.203\" unit=\"AU\"/>\n<moons>67</moons>\n\
  <temp value=\"120\" unit=\"kelvin\"/>\n</planet>\n<planet name=\"saturn\">\n<dist\
  \ value=\"9.539\" unit=\"AU\"/>\n<moons>62</moons>\n<temp value=\"88\" unit=\"kelvin\"\
  />\n</planet>\n<planet name=\"uranus\">\n<dist value=\"19.18\" unit=\"AU\"/>\n<moons>27</moons>\n\
  <temp value=\"59\" unit=\"kelvin\"/>\n</planet>\n<planet name=\"neptune\">\n<dist\
  \ value=\"30.06\" unit=\"AU\"/>\n<moons>13</moons>\n<temp value=\"48\" unit=\"kelvin\"\
  />\n</planet>\n<planet name=\"plutu\">\n<dist value=\"39.53\" unit=\"AU\"/>\n<moons>4</moons>\n\
  <temp value=\"37\" unit=\"kelvin\"/>\n</planet>\n</planets>\n```\n\n# 配方 14-3. 通过\
  \ RSS 共享数据\n\n### 问题\n\n前面的示例使用了相对静态的数据。短期内预计不会在我们的太阳系中发现新的行星，尽管与太阳的距离和表面温度在变化，但这些数值的变化频率远不如新闻博客的头条。此外，示例中使用了有效的\
  \ XML 格式的行星列表和数据，但如果缺少关于内容的额外信息，消费者将无法使用这些数据。如何共享易于被多个客户端消费的数据呢？\n\n### 解决方案\n\n\
  使用 XML 是朝着正确方向迈出的一步。为 XML 添加预定义的模式（Schema）使得各种客户端都能消费这些数据。关于如何使用 XML 有很多标准，有的用于特定目的（如新闻摘要），有的用于更通用的场景。其中一种称为\
  \ **Rich Site Summary（丰富站点摘要）** 或 **Really Simple Syndication（真正简易聚合）**，简称 RSS。所使用的模式（Schema）有多个变体，但最流行的两个称为\
  \ RSS 2.0 和 Atom 1.0。\n\n这两种模式提供了几乎相同的值，但使用了不同的标签名称。许多浏览器和电子邮件客户端都支持 RSS 格式，同时也有许多专门的阅读器应用可用。由于\
  \ RSS 格式的流行度下降，其中一些应用已经停止维护。\n\n### 工作原理\n\nRSS 源（feed）的顶层元素是 `<rss></rss>`，通常带有\
  \ `version` 属性。\n\n\n\n`<rss version=\"2.0\"></rss>`。在顶级元素内部，有一个名为`<channel>`的元素。该元素用于描述内容提供者，并包含`title`、`description`、`link`等字段。`<channel>`元素还包含一个或多个`<item>`元素。每个`<item>`描述一篇文章或故事。\n\
  \n使用`dom`扩展，我们可以创建一个简单的`RSSWriter`类，用于为不同类型的数据创建 RSS 订阅。新类继承了`domDocument`类，为了初始化父类，需要调用`parent::__construct()`方法。\n\
  \n```php\n//14_7.php\n\nclass RSSWriter extends domDocument {\n    private $rss;\n\
  \    private $channel;\n\n    function __construct($xml = \"1.0\", $encoding = \"\
  UTF-8\") {\n        parent::__construct($xml, $encoding);\n        $this->formatOutput\
  \ = true;\n        $this->rss = $this->CreateElement(\"rss\");\n        $this->rss->setAttribute(\"\
  version\", \"2.0\");\n        $this->channel = $this->CreateElement(\"channel\"\
  );\n    }\n\n    function SetChannel($title, $description, $link, $pubdate, $ttl=1800)\
  \ {\n        $element = $this->CreateElement('title');\n        $element->appendChild($this->CreateTextNode($title));\n\
  \        $this->channel->appendChild($element);\n\n        $element = $this->CreateElement('description');\n\
  \        $element->appendChild($this->CreateTextNode($description));\n        $this->channel->appendChild($element);\n\
  \n        $element = $this->CreateElement('link');\n        $element->appendChild($this->CreateTextNode($link));\n\
  \        $this->channel->appendChild($element);\n\n        $element = $this->CreateElement('pubDate');\n\
  \        $element->appendChild($this->CreateTextNode(gmdate(\"D, d M Y H:i:s\",\
  \ (int)$pubdate) . \" GMT\"));\n        $this->channel->appendChild($element);\n\
  \n        $element = $this->CreateElement('ttl');\n        $element->appendChild($this->CreateTextNode($ttl));\n\
  \        $this->channel->appendChild($element);\n    }\n\n    function AddItem($title,\
  \ $link, $description = null, $attribs = null) {\n        $item = $this->CreateElement(\"\
  item\");\n\n        if (!empty($title)) {\n            $obj = $this->CreateElement(\"\
  title\");\n            $obj->appendChild($this->CreateTextNode($title));\n     \
  \       $item->appendChild($obj);\n        }\n\n        if (!empty($link)) {\n \
  \           $obj = $this->CreateElement(\"link\");\n            $obj->appendChild($this->CreateTextNode($link));\n\
  \            $item->appendChild($obj);\n        }\n\n        if (!empty($attribs[\"\
  description\"])) {\n            $obj = $this->CreateElement(\"description\");\n\
  \            $obj->appendChild($this->CreateTextNode($attribs[\"description\"]));\n\
  \            $item->appendChild($obj);\n        }\n\n        if (!empty($attribs[\"\
  pubDate\"])) {\n            $obj = $this->CreateElement(\"pubDate\");\n        \
  \    $obj->appendChild($this->CreateTextNode(gmdate(\"D, d M Y H:i:s\", (int)$attribs[\"\
  pubDate\"]) . \" GMT\"));\n            $item->appendChild($obj);\n        }\n\n\
  \        if (!empty($attribs[\"category\"])) {\n            $obj = $this->CreateElement(\"\
  category\");\n            $obj->appendChild($this->CreateTextNode($attribs[\"category\"\
  ]));\n            $item->appendChild($obj);\n        }\n\n        if (!empty($attribs[\"\
  author\"])) {\n            $obj = $this->CreateElement(\"author\");\n          \
  \  $obj->appendChild($this->CreateTextNode($attribs[\"author\"]));\n           \
  \ $item->appendChild($obj);\n        }\n\n        if (!empty($attribs[\"guid\"]))\
  \ {\n            $obj = $this->CreateElement(\"guid\");\n            $obj->appendChild($this->CreateTextNode($attribs[\"\
  guid\"]));\n            $item->appendChild($obj);\n        }\n\n        if (!empty($attribs[\"\
  comments\"])) {\n            $obj = $this->CreateElement(\"comments\");\n      \
  \      $obj->appendChild($this->CreateTextNode($attribs[\"comments\"]));\n     \
  \       $item->appendChild($obj);\n        }\n\n        $this->channel->appendChild($item);\n\
  \    }\n\n    function Output($file_name = \"opensearch.xml\") {\n        $this->rss->appendChild($this->channel);\n\
  \        $this->appendChild($this->rss);\n        header(\"Content-Type: text/xml;\
  \ name=\\\"{$file_name}\\\"\");\n        header(\"Content-Disposition: inline; filename=\\\
  \"{$file_name}\\\"\");\n        echo $this->saveXML();\n    }\n}\n\n$rss = new RSSWriter();\n\
  $rss->SetChannel(\"PHP & MySQL Recipes\", \"一本关于 PHP 和 MySQL 的书\", \"http://example.com\"\
  , time());\n$rss->AddItem(\"PHP 7\", \"http://php.net\", \"更快更新的 PHP 版本\");\n$rss->AddItem(\"\
  MariaDB\", \"http://mariadb.org\", \"开源数据库\");\n$rss->Output();\n```\n\n在脚本末尾，`$rss`变量被赋值为`RSSWriter()`类的一个实例，然后定义了频道并添加了几个条目。\n\
  \n\n\n# RSS 订阅源消费最佳实践\n\n遵循最佳实践时，推送列表应限制为最近 5 或 10 条数据。订阅该源的所有客户端均可按用户意愿保存元素副本。在未超过\
  \ `ttl` 值之前，客户端不应重复请求同一源。此例中 `ttl` 值设为 1800 秒（即半小时）。过于频繁地向源请求更新会给服务器带来高负载。\n\n将\
  \ `RSSWriter()` 类放在单独文件中，便于使用同一个类生成包含不同内容的多个 RSS 推送源。\n\n## 秘诀 14-4：消费 RSS 推送源\n\
  \n### 问题\n\n根据不同的定义解释，RSS 末尾的 S 代表\"聚合\"。聚合是一种分享或分发信息的方式。如何利用这一点，从几个太空相关网站创建一篇帖子列表？\n\
  \n### 解决方案\n\n我们可以使用 `SimpleXML` 扩展创建一个类，用于读取推送源、提取数据并进行格式转换。\n\n### 工作原理\n\n该类的构造函数接收一个参数，即\
  \ RSS 推送源的 URL。当类被实例化时，会读取推送源内容并存储在名为 `$xml` 的私有变量中。\n\n`channel()` 方法同样接收一个参数，用于标识并返回对应值。该方法可用于从推送源的频道部分获取\
  \ `title` 和 `description` 的值。\n\n最后，`items()` 方法用于提取推送源中每个条目的部分值。\n\n```php\n<?php\n\
  \n// 14_8.php\n\ndate_default_timezone_set('America/Los_Angeles');\n\n$feeds = [\n\
  \n    'https://www.nasa.gov/rss/dyn/breaking_news.rss',\n\n    'http://www.nasaspaceflight.com/feed/'\n\
  \n];\n\nclass RSSReader {\n\n    private $xml;\n\n    function __construct($url)\
  \ {\n\n        $this->xml = simplexml:load_file($url);\n\n    }\n\n    function\
  \ channel($name) {\n\n        return $this->xml->channel->$name;\n\n    }\n\n  \
  \  function items() {\n\n        $i = [];\n\n        foreach($this->xml->channel->item\
  \ as $item) {\n\n            $i[] = [\n\n                (string)$item->title,\n\
  \n                (string)$item->description,\n\n                (string)$item->link,\n\
  \n                strtotime((string)$item->pubDate)\n\n            ];\n\n      \
  \  }\n\n        return $i;\n\n    }\n\n}\n\nforeach($feeds as $f) {\n\n    $rss\
  \ = new RSSReader($f);\n\n    echo \"<div>频道: {$rss->channel('title')}</div>\";\
  \ echo \"<div>{$rss->channel('description')}</div>\"; foreach($rss->items() as $item)\
  \ {\n\n        echo <<<HEREDOC\n\n<div>\n\n<a href=\"{$item[2]}\">{$item[0]}</a>\n\
  \n<div>{$item[1]}</div>\n\n</div>\n\nHEREDOC;\n\n    }\n\n}\n```\n\n此示例使用两个推送源，并将内容转换为指向各网站完整故事的链接列表。由于使用了\
  \ `strtodate()` 函数将 `pubDate` 值转换为 Unix 时间戳，因此必须调用 `date_default_timezone_set()`\
  \ 函数或在 `php.ini` 中定义默认时区值。\n\n最佳做法是将每次响应的值保存到数据库中，并且每小时仅查询一次新数据。\n\n## 秘诀 14-5：标准数据交换\n\
  \n### 问题\n\n使用 RSS 交换或同步数据虽然简单高效，但仅限于标准中定义的值。添加新字段在大多数情况下可能无法正常工作。是否有一种方法，能以服务器可描述、客户端可消费的格式交换结构化数据（如数字、字符串和布尔值等）？\n\
  \n### 解决方案\n\n在互联网早期，人们开发了 Web 分布式数据交换（WDDX）平台。该平台基于 XML，通过一组标签定义值的名称、类型和实际值。以下是一个交换两个值的\
  \ XML 结构简单示例。\n\n```xml\n<wddxPacket version='1.0'>\n\n<data>\n\n<var name=\"语言\"\
  >\n\n<string>PHP</string>\n\n</var>\n\n<var name=\"版本\">\n\n<number>7</number>\n\
  \n</var>\n\n</data>\n\n</wddxPacket>\n```\n\nWDDX 格式非常简单易用，但大多已被功能更丰富的 SOAP 和 XML-RPC\
  \ 所取代。\n\n### 工作原理\n\nWDDX 扩展默认未启用，但如果你安装了 `libxml` 和 `expat` 库（Apache 1.3.7 版本起已捆绑包含），则可以启用它。\n\
  \n\n\n该扩展提供了一些函数，用于在 WDDX 数据包格式和变量之间进行序列化和反序列化。\n\n要创建一个包含单个值的 WDDX 数据包，可以使用`wddx_serialize_value()`函数。该函数接受两个参数。第一个参数是值：\n\
  \n```\n<?php\n// 14_9.php\n\necho wddx_serialize_value(\"PHP & MySQL Recipes\",\
  \ \"Packet\");\n```\n\n此脚本将生成以下 XML：\n\n```\n<wddxPacket version='1.0'>\n<header><comment>Packet</comment></header>\n\
  <data><string>PHP &amp; MySQL Recipes</string></data>\n</wddxPacket>\n```\n\n要将\
  \ WDDX 数据包转换回 PHP 变量，可以像这样使用`wddx_deserialize()`函数：\n\n```\n<?php\n// 14_10.php\n\
  \n$wddx = <<<HEREDOC\n<wddxPacket version='1.0'>\n<header><comment>Packet</comment></header>\n\
  <data><string>PHP &amp; MySQL Recipes</string></data>\n</wddxPacket>\nHEREDOC;\n\
  \nvar_dump(wddx_deserialize($wddx));\n```\n\n此脚本将生成以下 XML：\n\n```\n<wddxPacket version='1.0'>\n\
  <header><comment>Packet</comment></header>\n<data><string>PHP &amp; MySQL Recipes</string></data>\n\
  </wddxPacket>\n```\n\n这可用于交换任何类型的单个变量，但通过使用更多函数，可以交换多个变量。\n\n```\n<?php\n// 14_11.php\n\
  \n$int = 1234;\n$str = \"PHP & MySQL Recipes\";\n$arr = [\n    12,\n    \"abc\"\
  ,\n    [\n        3.15,\n        7.25\n    ]\n];\n\n$packet_id = wddx_packet_start(\"\
  Packet\");\nwddx_add_vars($packet_id, \"int\");\nwddx_add_vars($packet_id, \"str\"\
  );\nwddx_add_vars($packet_id, \"arr\");\necho wddx_packet_end($packet_id);\n```\n\
  \n经过换行和缩进格式化后，输出如下所示：\n\n```\n<wddxPacket version='1.0'>\n<header>\n<comment>Packet</comment>\n\
  </header>\n<data>\n<struct>\n<var name='int'>\n<number>1234</number>\n</var>\n<var\
  \ name='str'>\n<string>PHP &amp; MySQL Recipes</string>\n</var>\n<var name='arr'>\n\
  <array length='3'>\n<number>12</number>\n<string>abc</string>\n<array length='2'>\n\
  <number>3.15</number>\n<number>7.25</number>\n</array>\n</array>\n</var>\n</struct>\n\
  </data>\n</wddxPacket>\n```\n\n## 方案 14-6：SOAP 服务器与客户端\n\n### 问题\n\n尽管上一节中的 WDDX\
  \ 扩展可用于在不同系统和不同编程语言之间交换数据，但它仅支持有限的数据类型，并且直接对编程语言中的变量进行操作。拥有一种包含所交换数据的定义以及数据如何被验证的描述的数据交换格式，将大大提升交换的质量和灵活性。\n\
  \n### 解决方案\n\nSOAP（最初称为“简单对象访问协议”）就是解决方案。从该标准的 1.2 版本开始，这个缩写被弃用，现在简称为 SOAP。SOAP\
  \ 是一种基于 XML 的格式，其消息定义在 WSDL 文件（同样为 XML 格式）中提供。通过使用 WSDL 文件，客户端可以自动使用 SOAP API，而无需事先了解\
  \ API 的结构。\n\nSOAP 可工作于任何类型的传输协议，但通常与 HTTP/HTTPS 一起使用。\n\nPHP 实现了用于创建 SOAP 服务器和\
  \ SOAP 客户端功能的类。其基本功能是接受一个 PHP 类，并使用它来生成一个 SOAP 服务器。该类中的每个公共方法都将作为端点暴露出来，供客户端访问。\n\
  \n### 工作原理\n\nSOAP 格式支持向端点传递参数。这些参数可以作为查询的输入，就像方法是在本地调用一样。\n\n在第一个示例中，我们将创建一个能够执行一些简单数学运算的\
  \ SOAP 服务器。名为`Math`的类包含三个方法：`Add`、`Subtract`和`Multiply`，用于对两个数字进行加、减、乘运算。\n\n```\n\
  <?php\n// 14_12.php\n\nclass Math {\n    function Add($i, $j) {\n        return\
  \ $i + $j;\n    }\n\n    function Subtract($i, $j) {\n        return $i - $j;\n\
  \    }\n\n    function Multiply($i, $j) {\n        return $i * $j;\n    }\n}\n```\n\
  \n\n\n要在 SOAP 服务器中使用此类，需要定义一个`SoapServer`类的实例。`SoapServer`类的构造函数接受两个参数：第一个是 WSDL，第二个是要使用的选项数组。将\
  \ WSDL 设为`null`可以省略它，第二个参数中最基本的选项是服务器 API 端点的 URI。在此示例中，SOAP 服务器将在本地主机上运行，因此服务器配置如下所示：\n\
  \n```php\n// 14_13.php\n\ninclude \"./14_12.php\";\n\n$server = new SoapServer(null,\
  \ ['uri' => 'http://localhost/14_13.php']);\n$server->setClass('Math');\n$server->handle();\n\
  ```\n\n最后两个方法调用用于将`Math`类添加到服务器，暴露其公共函数，并启动服务器。\n\n下一步是创建一个能够使用这些 API 的客户端。由于该文件没有\
  \ WSDL 定义，客户端必须事先了解可用的 API。\n\n```php\n// 14_14.php\n\n$client = new SoapClient(null,\
  \ array(\n    'location' => \"http://localhost/14_13.php\",\n    'uri' => \"http://localhost/14_13.php\"\
  ,\n    'trace' => 1\n));\n\necho $return = $client->__soapCall(\"Add\", array(5,\
  \ 2)) . \"\\n\";\necho $return = $client->__soapCall(\"Subtract\", array(5, 2))\
  \ . \"\\n\";\necho $return = $client->__soapCall(\"Multiply\", array(5, 2)) . \"\
  \\n\";\n```\n\n`SoapClient()`类遵循与`SoapServer()`相同的机制，可以搭配或不搭配 WSDL 文件使用。但如果没有 WSDL\
  \ 文件，则必须传入端点的 location 和 uri。\n\n创建 WSDL 文件可能有些繁琐，但这是值得的，因为它能使客户端代码更简洁、更易读。作为上述`Math`服务的示例，我们可以创建一个\
  \ WSDL 文件，定义每个过程调用的输入和输出，并将它们绑定到一个服务中：\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\" ?>\n<definitions name=\"Math\"\n             targetNamespace=\"http://localhost/math.wsdl\"\
  \n>\n\n  <message name=\"addRequest\">\n    <part name=\"i\" type=\"xsd:int\"/>\n\
  \    <part name=\"j\" type=\"xsd:int\"/>\n  </message>\n  <message name=\"addResponse\"\
  >\n    <part name=\"Result\" type=\"xsd:int\"/>\n  </message>\n\n  <message name=\"\
  subtractRequest\">\n    <part name=\"i\" type=\"xsd:int\"/>\n    <part name=\"j\"\
  \ type=\"xsd:int\"/>\n  </message>\n  <message name=\"subtractResponse\">\n    <part\
  \ name=\"Result\" type=\"xsd:int\"/>\n  </message>\n\n  <message name=\"multiplyRequest\"\
  >\n    <part name=\"i\" type=\"xsd:int\"/>\n    <part name=\"j\" type=\"xsd:int\"\
  />\n  </message>\n  <message name=\"multiplyResponse\">\n    <part name=\"Result\"\
  \ type=\"xsd:int\"/>\n  </message>\n\n  <portType name=\"MathPortType\">\n    <operation\
  \ name=\"Add\">\n      <input message=\"tns:addRequest\"/>\n      <output message=\"\
  tns:addResponse\"/>\n    </operation>\n    <operation name=\"Subtract\">\n     \
  \ <input message=\"tns:subtractRequest\"/>\n      <output message=\"tns:subtractResponse\"\
  />\n    </operation>\n    <operation name=\"Multiply\">\n      <input message=\"\
  tns:multiplyRequest\"/>\n      <output message=\"tns:multiplyResponse\"/>\n    </operation>\n\
  \  </portType>\n\n  <binding name=\"MathBinding\" type=\"tns:MathPortType\">\n \
  \   <soap:binding style=\"rpc\"\n                  transport=\"http://schemas.xmlsoap.org/soap/http\"\
  />\n    <operation name=\"Add\">\n      <soap:operation soapAction=\"http://localhost/Add\"\
  />\n      <input>\n        <soap:body use=\"encoded\"\n                   namespace=\"\
  http://localhost/math.wsdl\"\n                   encodingStyle=\"http://schemas.xmlsoap.org/soap/encoding/\"\
  />\n      </input>\n      <output>\n        <soap:body use=\"encoded\"\n       \
  \            namespace=\"http://localhost/math.wsdl\"\n                   encodingStyle=\"\
  http://schemas.xmlsoap.org/soap/encoding/\"/>\n      </output>\n    </operation>\n\
  \n    <operation name=\"Subtract\">\n      <soap:operation soapAction=\"http://localhost/Subtract\"\
  />\n      <input>\n        <soap:body use=\"encoded\"\n                   namespace=\"\
  http://localhost/math.wsdl\"\n                   encodingStyle=\"http://schemas.xmlsoap.org/soap/encoding/\"\
  />\n      </input>\n      <output>\n        <soap:body use=\"encoded\"\n       \
  \            namespace=\"http://localhost/math.wsdl\"\n                   encodingStyle=\"\
  http://schemas.xmlsoap.org/soap/encoding/\"/>\n      </output>\n    </operation>\n\
  \n    <operation name=\"Multiply\">\n      <soap:operation soapAction=\"http://localhost/Multiply\"\
  />\n      <input>\n        <soap:body use=\"encoded\"\n                   namespace=\"\
  http://localhost/math.wsdl\"\n                   encodingStyle=\"http://schemas.xmlsoap.org/soap/encoding/\"\
  />\n      </input>\n      <output>\n        <soap:body use=\"encoded\"\n       \
  \            namespace=\"http://localhost/math.wsdl\"\n                   encodingStyle=\"\
  http://schemas.xmlsoap.org/soap/encoding/\"/>\n      </output>\n    </operation>\n\
  \  </binding>\n</definitions>\n```\n\n\n\n```xml\n<soap:body use=\"encoded\"\nnamespace=http://localhost/math.wsdl\n\
  encodingStyle=\"http://schemas.xmlsoap.org/soap/encoding/\"/>\n</output>\n</operation>\n\
  </binding>\n<service name=\"MathService\">\n<port name=\"MathPort\" binding=\"MathBinding\"\
  >\n<soap:address location=\"http://localhost/14_15.php\"/>\n</port>\n</service>\n\
  </definitions>\n\n通过这种新的数据结构定义，示例 `14_13.php` 和 `14_15.php` 可以简化为例 `14_15.php` 和\
  \ `14_16.php` 中所示的代码。\n\n```php\n// 14_15.php\ninclude \"./14_12.php\";\n$server\
  \ = new SOAPServer('math.wsdl', ['encoding'=>'UTF-8']);\n$server->setClass('Math');\n\
  $server->handle();\n```\n\n`14_15.php` 中的代码被设计为服务端运行。在此情况下，`math.wsdl` 文件与 PHP 脚本位于同一文件夹中，并从服务端加载。\n\
  \n```php\n// 14_16.php\n$client = new SoapClient('https://localhost/math.wsdl');\n\
  echo $return = $client->Add(5, 2) . \"\\n\";\necho $return = $client->Subtract(5,\
  \ 2) . \"\\n\";\necho $return = $client->Multiply(5, 2) . \"\\n\";\n```\n\n在客户端示例中，wsdl\
  \ 文件是从服务端加载的。也可以本地加载以节省一次网络请求，但 soap 客户端支持缓存 wsdl 文件，避免每次请求都重新加载。缓存通常存储在 `/tmp`\
  \ 目录中，如果服务端更新了 wsdl 文件，必须手动清除缓存。\n\n"
- '# 第 14 章：XML、RSS、WDDX 与 SOAP


  通过使用 wsdl 文件，客户端代码变得更像“普通”的 PHP 代码。加载 wsdl 文件后，`SoapClient` 会为其中定义的每个方法创建魔术函数，现在可以直接调用这些函数。


  如果服务端定义了 wsdl 文件中未包含的其他方法，仍然可以调用这些方法，但只能使用 `__soapCall()` 方法。


  soap 函数可以通过 HTTPS 使用，以提高请求的安全性。此外，如果传输敏感数据，建议客户端使用额外参数传递凭证。这可以像其他参数一样实现，在客户端发起调用之前通过其他方式交换凭证值，服务端会在返回值之前验证凭证。这样一来，服务端可以通过使凭证失效来撤销客户端的访问权限。


  '
- "# 第 15 章：使用 JSON 进行数据交换\n\n第 [14 章](http://dx.doi.org/10.1007/978-1-4842-0605-8_14)介绍了如何使用\
  \ XML 在客户端和服务端之间交换数据。当客户端使用浏览器中的 JavaScript 创建时，使用一种名为 JSON 的东西来交换数据要容易得多。JSON 是\
  \ JavaScript Object Notation（JavaScript 对象表示法）的缩写。它是一种类似字符串的表示法，可以轻松声明像数组和对象这样的复杂结构。\n\
  \n### 配方 15-1：使用 AJAX 获取数据\n\n### 问题\n\n传统上，浏览器用于从服务端获取 HTML 页面。通过 HTML 文档中的链接导航到同一或不同服务器的不同页面。当用户点击链接时，浏览器会获取并渲染新页面的内容。\n\
  \n随着 Web 技术的发展，为了减少加载时间，加载页面的一部分变得越来越常见。当用户点击“阅读更多”链接或滚动到页面底部时，浏览器会获取更多内容并内联渲染，而无需重新加载现有文档。\n\
  \n### 解决方案\n\n所使用的技术是 AJAX 请求。这是一段 JavaScript 代码，它会向服务器执行 HTTP 请求（通常是与加载页面相同的服务器），然后使用响应结果将额外内容插入到\
  \ HTML 文档中。\n\n简单的方法是让服务端生成需要添加的 HTML，并将返回的值直接追加到 HTML 文档中。\n\n### 工作原理\n\n在浏览器中使用\
  \ `XMLHTTP` 对象相对简单，但使用 jQuery 可以使其更简单。jQuery 是一个 JavaScript 库，它使得操作 HTML 文档、添加事件监听器和执行\
  \ AJAX 请求变得非常容易。本章的所有配方都将使用 jQuery 库。\n\n© Frank M. Kromann 2016\nF.M. Kromann,\
  \ *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_15\n\n第一个示例展示了如何使用 jQuery\
  \ 和 PHP 脚本加载一个包含几行数据的简单文档，然后发起 AJAX 请求来更新部分数据，而无需重新加载文档。\n\n```php\n// 15_1.php\n\
  $languages = [\n    'PHP', 'JavaScript',\n    'C', 'C++', 'C#', 'Objective-C',\n\
  \    'Python', 'Java', 'Ruby',\n    'Visual Basic',\n    'Scala'\n];\nshuffle($languages);\n\
  $data = array_slice($languages, 0, 3);\n$html = \"\";\nforeach($data as $lang) {\n\
  \    $html .= \"<li>$lang</li>\";\n}\n\nif ($_REQUEST['data']) {\n    echo $html;\n\
  }\nelse {\n    echo <<<HEREDOC\n<!DOCTYPE html>\n<html>\n<head>\n<script src=\"\
  https://code.jquery.com/jquery-1.12.2.min.js\"\n    integrity=\"sha256-lZFHibXzMHo3GGeehn1hudTAP3Sc0uKXBXAzHX1sjtk=\"\
  \n    crossorigin=\"anonymous\"></script>\n</bead>\n<body>\n<h1>编程语言</h1>\n<ul id=\"\
  lang\">\n$html\n</ul>\n<button onclick=\"Update()\">更新</button>\n<script>\nfunction\
  \ Update() {\n    $.get(\"{$_SERVER['PHP_SELF']}?data=1\", function(data) {\n  \
  \      $(\"#lang\").html(data);\n    });\n}\n</script>\n</body>\n</html>\nHEREDOC;\n\
  }\n```\n\n![图 27](img/index-345_1.jpg)\n\n此脚本初始加载的输出如下所示：\n\n每当用户点击“更新”按钮时，同一脚本会以参数\
  \ `data=1` 被调用，并仅返回 3 个 `<li>` 元素的 HTML。返回的字符串将被插入到具有 `id=\"lang\"` 属性的 `<ul>` 元素中，并替换原有的内容。\n\
  \n### 配方 15-2：返回 JSON\n\n### 问题\n\n从服务端返回完整的 HTML 字符串使得客户端难以在需要时操作数据。有没有一种方法可以以结构化形式获取数据，从而允许客户端操作数据，并可能创建适合其渲染设备所需的\
  \ HTML？\n\n### 解决方案\n\nPHP 具有将变量编码和解码为 JSON 格式及从 JSON 格式还原的函数。函数 `json_encode()`\
  \ 会将变量转换为字符串化版本，`json_decode()` 会将一个字符串化的 JSON 字符串转换回 PHP 变量。将变量编码为 JSON 常用于生成响应，而解码则用于\
  \ PHP 作为客户端调用返回 JSON 响应的 API。除了 encode 和 decode 函数，PHP 还支持 `json_last_error()`。此函数不接受任何参数，可在\
  \ encode 或 decode 之后调用。它会返回一个代表上次操作结果的整数值。可能的返回值可以与以下常量之一进行比较：\n\n| 常量 | 含义 | 可用版本\
  \ |\n|---|---|---|\n| `JSON_ERROR_NONE` | 未检测到错误 | |\n| `JSON_ERROR_DEPTH` | 超出最大堆栈深度\
  \ | |\n| `JSON_ERROR_STATE_MISMATCH` | 无效的 JSON | |\n| `JSON_ERROR_CTRL_CHAR` |\
  \ 无效的控制字符 | |\n| `JSON_ERROR_SYNTAX` | 语法错误 | |\n| `JSON_ERROR_UTF8` | 格式错误的 UTF-8\
  \ 字符 | 5.3.3 |\n| `JSON_ERROR_RECURSION` | 递归引用 | 5.5.0 |\n| `JSON_ERROR_INF_OR_NAN`\
  \ | 发现 NAN 或 INF 值 | 5.5.0 |\n| `JSON_ERROR_UNSUPPORTED_TYPE` | 不支持的类型 | 5.5.0 |\n\
  \n当需要返回多个变量时，最简单的方法是将它们放入一个数组，然后返回该数组的 JSON 编码版本。\n\n### 工作原理\n\n将之前的示例改为使用 JSON\
  \ 而非 HTML 字符串只需要做少量修改。\n\n\n\n首先，确保`Content-Type`设置正确。这个简单示例即使不设置也能运行，但始终建议设置正确的`Content-Type`，以便告知客户端期望接收的内容类型。第二步是仅生成用于完整文档加载的`$html`变量，并返回`$data`变量的\
  \ JSON 编码值。最后，JavaScript 代码需要做一些小改动。在本示例中，代码会生成最终要插入文档的 HTML 片段。具体来说，代码会检查数据，如果返回的语言是\
  \ PHP，则在其周围添加粗体标签。\n\n```php\n<?php\n\n// 15_2.php\n\n$languages = [\n\n'PHP', 'JavaScript',\n\
  \n'C', 'C++', 'C#', 'Objective-C',\n\n'Python', 'Java', 'Ruby',\n\n'Visual Basic',\n\
  \n'Scala'\n\n];\n\nshuffle($languages);\n\n$data = array_slice($languages, 0, 3);\n\
  \nif ($_REQUEST['data']) {\n\nheader(\"Content-Type: application/json\");\n\necho\
  \ json_encode($data);\n\n}\n\nelse {\n\n$html = \"\";\n\nforeach($data as $lang)\
  \ {\n\n$html .= \"<li>$lang</li>\";\n\n}\n\necho <<<HEREDOC\n\n<!DOCTYPE html>\n\
  \n<html>\n\n<head>\n\n<script src=\"https://code.jquery.com/jquery-1.12.2.min.js\"\
  \n\nintegrity=\"sha256-lZFHibXzMHo3GGeehn1hudTAP3Sc0uKXBXAzHX1sjtk=\"\n\ncrossorigin=\"\
  anonymous\"></script>\n\n</bead>\n\n<body>\n\n<h1>编程语言</h1>\n\n<ul id=\"lang\">\n\
