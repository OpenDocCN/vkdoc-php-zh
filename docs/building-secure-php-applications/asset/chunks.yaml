    \n在 PHP 中防范跨站脚本（XSS）攻击涉及实施一系列安全技术。下面我们将讨论几种实用的技术。\n\n![](img/609480_1_En_3_Fig7_HTML.jpg)\n\
    \n图 3-7 — XSS 在请求-响应生命周期中的作用\n\n### 输出编码\n\n输出编码是指在网页中显示用户生成内容之前对其进行清理和转义处理。这可以防止浏览器将内容解释为可执行脚本。PHP\
    \ 为此提供了`htmlspecialchars()`和`htmlentities()`等函数。\n\n```php\n$userInput = '<script>alert(\"\
    XSS attack\");</script>';\n$safeOutput = htmlspecialchars($userInput, ENT_QUOTES,\
    \ 'UTF-8');\necho $safeOutput;\n```\n\n### 内容安全策略（CSP）\n\nCSP 是一项安全功能，允许您指定允许在网页上加载和执行哪些来源的内容。您可以在\
    \ PHP 应用的 HTTP 标头中设置 CSP 指令，以防止内联脚本和未经授权的脚本来源。\n\n在 PHP 中设置 CSP 标头的示例：\n\n```php\n\
    header(\"Content-Security-Policy: script-src 'self' 'unsafe-inline'\");\n```\n\
    \n### 输入验证\n\n验证并清理用户输入，确保其符合预期格式。使用 PHP 内置函数、正则表达式或自定义验证函数，根据预定义规则检查输入内容。\n\n\
    使用 PHP 的`filter_var()`进行输入验证的示例：\n\n```php\n$email = $_POST['email'];\nif (filter_var($email,\
