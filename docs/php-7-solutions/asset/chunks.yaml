- fmt: "# Checking Whether Your Web Site Supports PHP\n\nThe easiest way to find out\
    \ whether your web site supports PHP is to ask your hosting company. The other\
    \ way to find out is to upload a PHP page to your web site and see if it works.\
    \ Even if you know that your site supports PHP, do the following test to confirm\
    \ which version is running:\n\n1. Open your script editor, and type the following\
    \ code into a blank page:\n\n    `<?php echo phpversion();`\n\n2. Save the file\
    \ as `phpversion.php`. It’s important to make sure that your operating system\
    \ doesn’t add a `.txt` filename extension after the `.php`. If you’re using TextEdit\
    \ on a Mac, make sure that it doesn’t save the file in Rich Text Format (RTF).\
    \ If you’re at all unsure, use `phpversion.php` from the `ch02` folder in the\
    \ files accompanying this book.\n\n3. Upload `phpversion.php` to your web site\
    \ in the same way you would an HTML page and then type the URL into a browser.\
    \ Assuming you upload the file to the top level of your site, the URL will be\
    \ something like [`www.example.com/phpversion.php`](http://www.example.com/phpversion.php).\n\
    \n    If you see a three-part number like 7.2.0 displayed onscreen, you’re in\
    \ business: PHP is enabled. The number tells you which version of PHP is running\
    \ on your server. *This book assumes you’re running PHP 7.2.0 or later.*\n\n4.\
    \ If you get a message that says something like “Parse error”, it means PHP is\
    \ supported but that you have made a mistake in typing the code in the file. Use\
    \ the version in the `ch02` folder instead.\n\n5. If you just see the original\
    \ code, it means PHP is not supported.\n\nIf your server is running a version\
    \ of PHP prior to 7.2.0, contact your host and tell them you want the most recent\
    \ stable version of PHP. If your host refuses, it’s time to change your hosting\
    \ company.\n\n## Why You Should No Longer Use PHP 5\n\nPHP versions comprise three\
    \ numbers separated by dots. The first number is the major version; the second\
    \ is the branch; and the last one is the point release. Major versions introduce\
    \ significant changes that might break existing sites, including the removal of\
    \ outdated features. Branches introduce new features; but it’s extremely rare\
    \ for a branch to break compatibility with the same major version. Point releases\
    \ contain fixes for bugs and security issues.\n\nWhen PHP 5 was released in 2004,\
    \ the development team continued to release security updates for PHP 4. This not\
    \ only delayed adoption of PHP 5, it slowed vital improvements to the new major\
    \ version. A change in policy led to PHP releasing a new branch once a year. Each\
    \ branch receives two years of active support for bug and security fixes, followed\
    \ by a third year of critical security fixes. Thereafter it’s no longer supported.\n\
    \nThe final version of PHP 5 (5.6) received nearly two and a half years of extra\
    \ support; but it reached its end of life on December 31, 2018. Using PHP 5 puts\
    \ your site and valuable data at risk because security vulnerabilities won’t be\
    \ fixed. Moreover, you won’t get the benefit of PHP 7’s new features, not to mention\
    \ that it’s twice as fast as PHP 5. All support for PHP 7.0 and active support\
    \ for PHP 7.1 ended before this book was published. That’s why this book requires\
    \ a minimum of PHP 7.2. Although most of the code in this book will run on older\
    \ versions of PHP, some of it won’t.\n\n## Deciding Where to Test Your Pages\n\
    \nUnlike ordinary web pages, you can’t just double-click PHP pages in Windows\
    \ File Explorer or Finder on a Mac and view them in your browser. They need to\
    \ be parsed, or processed, through a web server that supports PHP. If your hosting\
    \ company supports PHP, you can upload your files to your web site and test them\
    \ there. However, you need to upload the file every time you make a change. In\
    \ the early days, you’ll probably find you have to do this often because of some\
    \ minor mistake in your code. As you become more experienced, you’ll still need\
    \ to upload files frequently because you’ll want to experiment with different\
    \ ideas.\n\nIf you want to get working with PHP straight away, by all means use\
    \ your own web site as a test bed. However, you’ll soon discover the need for\
    \ a local PHP test environment. The rest of this chapter is devoted to showing\
    \ you how to do this, with instructions for both Windows and macOS.\n\n## What\
    \ You Need for a Local Test Environment\n\nTo test PHP pages on your local computer,\
    \ you need to install the following:\n\n- A web server, which is a piece of software\
    \ that displays web pages, not a separate computer\n- PHP\n- A MySQL or MariaDB\
    \ database, and phpMyAdmin, a web-based front end for administering the database\n\
    \n### Tip\nMariaDB ([`https://mariadb.org/`](https://mariadb.org/)) is a community-developed\
    \ drop-in replacement for MySQL. The code in this book is fully compatible with\
    \ both MySQL and MariaDB.\n\nAll the software you need is free. The only cost\
    \ to you is the time it takes to download the necessary files, plus, of course,\
    \ the time to make sure everything is set up correctly. In most cases, you should\
    \ be up and running in less than an hour, probably considerably less. As long\
    \ as you have at least 1GB of free disk space, you should be able to install all\
    \ the software on your computer—even one with modest specifications.\n\n### Tip\n\
    If you already have a PHP 7 test environment on your local computer, there’s no\
    \ need to reinstall. Just check the section at the end of this chapter titled\
    \ “Checking Your PHP Settings.”\n\n### Individual Programs or an All-in-one Package?\n\
    \nFor many years, I advocated installing each component of a PHP testing environment\
    \ separately, rather than using a package that installs Apache, PHP, MySQL, and\
    \ phpMyAdmin in a single operation. My advice was based on the dubious quality\
    \ of some early all-in-one packages, which installed easily but were next to impossible\
    \ to uninstall or upgrade. However, the all-in-one packages currently available\
    \ are excellent, and I have no hesitation in now recommending them.\n\nOn my computers,\
    \ I use XAMPP for Windows ([`www.apachefriends.org/index.html`](http://www.apachefriends.org/index.html))\
    \ and MAMP for macOS ([`www.mamp.info/en/`](http://www.mamp.info/en/)). Other\
    \ packages are available; it doesn’t matter which you choose.\n\n## Setting Up\
    \ on Windows\n\nMake sure that you’re logged on as an administrator before proceeding.\n\
    \n### Getting Windows to Display Filename Extensions\n\nBy default, most Windows\
    \ computers hide common three- or four-letter filename extensions, such as `.doc`\
    \ or `.html`, so all you see in dialog boxes and Windows File Explorer is `thisfile`\
    \ instead of `thisfile.doc` or `thisfile.html`.\n\nUse these instructions to enable\
    \ the display of filename extensions in Windows 10 and 8:\n\n1. Open File Explorer.\n\
    2. Select View to expand the ribbon at the top of the File Explorer window.\n\
    3. Select the “File name extensions” check box.\n\nDisplaying filename extensions\
    \ is more secure—you can tell if a virus writer has attached an `.exe` or `.scr`\
    \ executable file to an innocent-looking document.\n\n### Choosing a Web Server\n\
    \nMost PHP installations run on the Apache web server. Both are open source and\
    \ work well together. However, Windows has its own web server, Internet Information\
    \ Services (IIS), which also supports PHP. Microsoft has worked closely with the\
    \ PHP development team to improve the performance of PHP on IIS to roughly the\
    \ same level as Apache. So, which should you choose?\n\nUnless you need IIS for\
    \ ASP or ASP.NET, I recommend that you install Apache, using XAMPP or one of the\
    \ other all-in-one packages, as described in the next section. If you need to\
    \ use IIS, the most convenient way to install PHP is to use the Microsoft Web\
    \ Platform Installer (Web PI), which you can download from [`www.microsoft.com/web/downloads/platform.aspx`](http://www.microsoft.com/web/downloads/platform.aspx)."
