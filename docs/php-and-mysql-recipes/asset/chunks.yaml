- fmt: "Finally, there are a number of third-party JavaScript libraries that can be\
    \ used to collect useful information from the user. One I often use is the `jstz`\
    \ library that makes it possible to get the user’s time zone and use that as part\
    \ of a request to sign up for an account on the web site. Knowing the user’s time\
    \ zone makes it possible to show date/time values according to the user’s local\
    \ time. The easy way is to provide a drop-down list with the valid time zones.\
    \ This list is going to be quite long and it’s nice to be able to have a value\
    \ preselected for the user. The library can be found here: [http://pellepim.bitbucket.org/jstz/](http://pellepim.bitbucket.org/jstz/).\n\
    \nThe library is very easy to use. After loading the library you can instantiate\
    \ the time zone object with `var timezone = jstz.determine();` and then access\
    \ the name of the time zone with `timezone.name();`.\n\nThe full script for a\
    \ user signup with automatic time zone selection could look like this.\n\n```php\n\
    <?php\n// 12_6.php\n\nif (empty($_POST)) {\n    echo <<<HEREDOC\n<!DOCTYPE html>\n\
    <html>\n<head>\n<script src=\"/js/jstz.js\"></script>\n</head>\n<body>\n<form\
    \ method=\"POST\" action=\"{$_SERVER['PHP_SELF']}\">\n<div>\n<label for=\"user\"\
    >User Name</label>\n<input name=\"user\" type=\"text\" required />\n</div>\n<div>\n\
    <label for=\"timezone\">Time Zone</label>\n<input id=\"tz\" name=\"timezone\"\
    \ type=\"text\" required />\n</div>\n<div>\n<input type=\"submit\" />\n</div>\n\
    </form>\n<script>\nvar timezone = jstz.determine();\nvar tz = document.getElementById('tz');\n\
    tz.value = timezone.name();\n</script>\n</body>\n</html>\nHEREDOC;\n} else {\n\
    \    date_default_timezone_set($_POST['timezone']);\n    $lt = date('M d Y H:i:s');\n\
    \    echo <<<HEREDOC\n<!DOCTYPE html>\n<html>\n<head>\n<script src=\"/js/jstz.js\"\
    ></script>\n</head>\n<body>\n<div>Welcome: {$_POST['user']}</div>\n<div>Local\
    \ time is: {$lt}</div>\n</body>\n</html>\nHEREDOC;\n}\n?>\n```\n\nIn this example\
    \ we used a simple text input field and used JavaScript to fill in a value for\
    \ the time zone. In my case that was `America/Los_Angeles`. The user can manually\
    \ type another time zone (i.e., `Europe/Paris`) and when the form is submitted\
    \ the script will show a welcome notice and the local time in the time zone entered.\n\
    \nThis script does not validate any of the input and it would be a better user\
    \ experience to present the user with a list of all the valid time zones. This\
    \ will prevent mistyping and the user will not have to know the exact time zone\
    \ names.\n\nOn the PHP side, when the form is submitted we use the function `date_default_timezone_set()`\
    \ to set the current time zone before using any of the date functions. This function\
    \ takes a mandatory parameter that is the string representing the time zone like\
    \ `\"Europe/Paris\"`.\n\n## Recipe 12-5. Session Data\n\n### Problem\n\nAs described\
    \ in section 12-3 we can use cookies to store data in the client, but that is\
    \ somewhat insecure, as the client will have access to manipulate the data between\
    \ requests. It would be nice if there were a way to store the data on the server\
    \ where only the server side scripts can access it.\n\n### Solution\n\nData can\
    \ be stored on the server in a number of different ways. The server can write\
    \ files, create records in a database, or other type of storage. Any of these\
    \ are usually not linked to a specific session in a browser. By using the session\
    \ data in PHP the system will generate a unique id that is used as a cookie. It’s\
    \ stored in the browser’s memory and sent with all requests to the server. The\
    \ session id is used to load or save a serialized array of data from disk (or\
    \ other storage engine). This is all handled by the `session_start()` function.\n\
    \nCalling this function before any output will look for the existence of a cookie\
    \ called `PHPSESSID`. If it exists it will load all existing data matching the\
    \ id and the same Id will be used for future references. If the cookie doesn’t\
    \ exist a new Id is generated and the cookie is set.\n\nAny variable added to\
    \ the `$_SESSION` variable will be stored when the script terminates or when the\
    \ function `session_close()` is called and all the data written will automatically\
    \ be populated in `$_SESSION` on the next request where `session_start()` is called.\n\
    \nSession data has a configurable expiration time. If no requests are made from\
    \ the client to the server before the data expires, all the data will be removed\
    \ from the session storage. The default value for the expiration is 1440 seconds\
    \ or 24 minutes. This is configured in `php.ini` with the configuration value\
    \ `session.gc_maxlifetime = 1440`. Each time the data is written the counter is\
    \ reset.\n\nThere are a number of other configuration options that I recommend\
    \ to use with the session configuration:\n\nSession Id’s can be initialized from\
    \ many sources but by setting `session.use_only_cookies = 1` in `php.ini` will\
    \ restrict the source to cookies only. To ensure that the value of the cookie\
    \ can’t be accessed from scripting languages set the `session.cookie_httponly\
    \ = 1`, and finally setting `session.hash_function = 1` will make use of that\
    \ SHA-1 function instead of the MD5 function to create the value for the cookie.\n\
    \n### How it Works\n\nIn this example we use the session storage to store values\
    \ that are linked to the browser through the cookie named `PHPSESSID`.\n\n```php\n\
    <?php\n// 12_7.php\ndate_default_timezone_set('UTC');\nsession_start();\n\nif\
    \ ($_SESSION['last_request']) {\n    echo \"Las access was \" . date('M d Y H:i:s');\n\
    } else {\n    echo 'This is the first request to the site';\n}\n\n$_SESSION['last_request']\
    \ = time();\n?>\n```\n\nThe first time a user requests the script they will get\
    \ the message indicating that they have not been on the site before. As this is\
    \ handled with a session cookie, they will get the same message if they close\
    \ the browser and open it again or if they wait more than the configured lifetime\
    \ for the garbage collector (24 min). In all other cases the script will show\
    \ when they last accessed anything on the same server where the script started\
    \ the session.\n\nThe `$_SESSION` array can contain values of any type of data.\
    \ It can be used to store scalars as shown above, arrays, and even instantiated\
    \ objects.\n\nIn example `12_3.php` we used a cookie variable (`visited`) to store\
    \ data about the time of access to the site. Using client-side storage makes it\
    \ possible for the user to alter the data before sending subsequent requests making\
    \ it an insecure form of storage. By moving the data to session data on the server\
    \ we can link multiple values to a single session cookie and at the same time\
    \ prevent the user from manipulating the data between requests.\n\nThe only security\
    \ concern becomes the session cookie. If a user can take the value of the cookie\
    \ and inject it in a different browser or other type of client they could potentially\
    \ get access to data stored in the session data and thereby gain access to the\
    \ site (if the session data contains information that identifies a user).\n\n\
    ## Recipe 12-6. Content Type and Disposition\n\n### Problem\n\nAlthough PHP is\
    \ designed to generate HTML documents it can also be used to generate other forms\
    \ of content. The content can be used within the browser or saved to disk, but\
    \ how can we tell the browser what type of content it is and how it’s expected\
    \ to use it?\n\n### Solution\n\nThere are some defaults that most browsers follow.\
    \ If the content is identified with `Content-Type` defined as one of the headers\
    \ and set to `text/html` or `text/plain` the browser will render the content as\
    \ the document.\n\nIn the same way, if the `Content-Type` is defined as `application/octet-stream`\
    \ the browser will attempt to save the content to a file by opening the save as\
    \ dialog to allow the user to select a folder and specify the filename.\n\nIf\
    \ no `Content-Type` header is given from PHP the default value will be provided,\
    \ and if the file is downloaded directly from the web server (image files, etc.)\
    \ the web server will apply the appropriate header."
  raw: 'Finally there are a number of third-party JavaScript libraries that can be
    used to collect useful information from the user. One I often use is the jstz
    library that makes it possible to get the user’s time zone and use that as part
    of a request to sign up for an account on the web site. Knowing the user’s time
    zone makes it possible to show date/time values according to the user’s local
    time. The easy way is to provide a drop-down list with the valid time zones. This
    list is going to be quite long and it’s nice to be able to have a value preselected
    for the user. The library can be found her[e: http://pellepim.bitbucket.org/jstz/
    .](http://pellepim.bitbucket.org/jstz/)


    The library is very easy to use. After loading the library you can instantiate
    the time zone object with var timezone = jstz.determine(); and then access the
    name of the time zone with timezone.name(); .


    The full script for a user signup with automatic time zone selection could look
    like this.


    <?php


    // 12_6.php


    if (empty($_POST)) {


    echo <<<HEREDOC


    <!DOCTYPE html>


    <html>


    <head>


    <script src="/js/jstz.js"></script>


    </head>


    <body>


    <form method="POST" action="{$_SERVER[''PHP_SELF'']}">


    <div>


    <label for="user">User Name</label>


    <input name="user" type="text" required />


    </div>


    <div>


    <label for="timezone">Time Zone</label>


    <input id="tz" name="timezone" type="text" required />


    </div>


    <div>


    <input type="submit" />


    </div>


    </form>


    <script>


    CHAPTER 12 ■ WEB FUNDAMENTALS


    var timezone = jstz.determine();


    var tz = document.getElementById(''tz'');


    tz.value = timezone.name();


    </script>


    </body>


    </html>


    HEREDOC;


    }


    else {


    date_default_timezone_set($_POST[''timezone'']);


    $lt = date(''M d Y H:i:s'');


    echo <<<HEREDOC


    <!DOCTYPE html>


    <html>


    <head>


    <script src="/js/jstz.js"></script>


    </head>


    <body>


    <div>Welcome: {$_POST[''user'']}</div>


    <div>Local time is: {$lt}</div>


    </body>


    </html>


    HEREDOC;


    }


    In this example we used a simple text input field and used JavaScript to fill
    in a value for the time zone.


    In my case that was America/Los_Angeles. The user can manually type another time
    zone (i.e., Europe/Paris) and when the form is submitted the script will show
    a welcome notice and the local time in the time zone entered.


    This script does not validate any of the input and it would be a better user experience
    to present the user with a list of all the valid time zones. This will prevent
    mistyping and the user will not have to know the exact time zone names.


    On the PHP side, when the form is submitted we use the function date_default_timezone_set()
    to set the current time zone before using any of the date functions. This function
    takes a mandatory parameter that is the string representing the time zone like
    “Europe/Paris.”


    R ecipe 12-5\. Session Data


    Problem


    As described in section 12-3 we can use cookies to store data in the client, but
    that is somewhat insecure, as the client will have access to manipulate the data
    between requests. It would be nice if there were a way to store the data on the
    server where only the server side scripts can access it.


    Solution


    Data can be stored on the server in a number of different ways. The server can
    write files, create records in a database, or other type of storage. Any of these
    are usually not linked to a specific session in a browser. By using the session
    data in PHP the system will generate a unique id that is used as a cookie. It’s
    stored in the browser’s memory and sent with all requests to the server. The session
    id is used to load or save a serialized array of data from disk (or other storage
    engine). This is all handled by the session_start() function .


    Calling this function before any output will look for the existence of a cookie
    called PHPSESSID. If it exists 257


    CHAPTER 12 ■ WEB FUNDAMENTALS


    it will load all existing data matching the id and the same Id will be used for
    future references. If the cookie doesn’t exist a new Id is generated and the cookie
    is set.


    Any variable added to the $_SESSION variable will be stored when the script terminates
    or when the function session_close() is called and all the data written will automatically
    be populated in $_SESSION on the next request where session_start() is called.


    Session data has a configurable expiration time. If no requests are made from
    the client to the server before the data expires, all the data will be removed
    from the session storage. The default value for the expiration is 1440 seconds
    or 24 minutes. This is configured in php.ini with the configuration value session.


    gc_maxlifetime = 1440 . Each time the data is written the counter is reset.


    There are a number of other configuration options that I recommend to use with
    the session configuration:


    Session Id’s can be initialized from many sources but by setting session.use_only_cookies
    = 1 in php.ini will restrict the source to cookies only. To ensure that the value
    of the cookie can’t be accessed from scripting languages set the session.cookie_httponly
    = 1 , and finally setting session.hash_function = 1


    will make use of that SHA-1 function instead of the MD5 function to create the
    value for the cookie.


    How it Works


    In this example we use the session storage to store values that are linked to
    the browser through the cookie named PHPSESSID.


    <?php


    // 12_7.php


    date_default_timezone_set(''UTC'');


    session_start();


    if ($_SESSION[''last_request'']) {


    echo "Las access was " . date(''M d Y H:i:s'');


    }


    else {


    echo ''This is the first request to the site'';


    }


    $_SESSION[''last_request''] = time();


    The first time a user requests the script they will get the message indicating
    that they have not been on the site before. As this is handled with a session
    cookie, they will get the same message if they close the browser and open it again
    or if they ways more than the configured lifetime for the garbage collector (24
    min). In all other cases the script will show when they last accessed anything
    on the same server where the script started the session.


    The $_SESSION array can contain values of any type of data. It can be used to
    store scalars as shown above, arrays, and even instantiated objects.


    In example 12_3.php we used a cookie variable (visited) to store data about the
    time of access to the site. Using client-side storage makes it possible for the
    user to alter the data before sending subsequent requests making it an insecure
    form of storage. By moving the data to session data on the server we can link
    multiple values to a single session cookie and at the same time prevent the user
    from manipulating the data between requests.


    The only security concern becomes the session cookie. If a user can take the value
    of the cookie and inject it in a different browser or other type of client they
    could potentially get access to data stored in the session data and thereby gain
    access to the site (of the session data contains information that identifies a
    user).


    CHAPTER 12 ■ WEB FUNDAMENTALS


    Recipe 12-6\. Content Type and Disposition


    Problem


    Although PHP is designed to generate HTML documents it can also be used to generate
    other forms of content. The content can be used within the browser or saved to
    desk, but how can we tell the browser what type of content it is and how it’s
    expected to use it?


    Solution


    There are some defaults that most browsers follow. If the content is identified
    with Content-Type defined as one of the headers and set to text/html or text/plain
    the browser will render the content as the document.


    The same way of the Content-Type is defined as application/octent-stream the browser
    will attempt to save the content to a file by opening the save as dialog to allow
    the user to select a folder and specify the filename.


    In no Content-Type header is given from PHP the default value will be provided,
    and if the file is downloaded directly from the web server (image files, etc.)
    the web server will apply the appropriate header.'
  trans: "\n最后，有许多第三方 JavaScript 库可用于收集用户的有用信息。我经常使用的一个是`jstz`库，它能够获取用户的时区，并将其作为在网站上注册账户请求的一部分。了解用户的时区，就可以根据用户的当地时间显示日期/时间值。简单的方法是提供一个包含有效时区的下拉列表。这个列表会相当长，因此能够为用户预选一个值会非常方便。该库可在此处找到：[`pellepim.bitbucket.org/jstz/`](http://pellepim.bitbucket.org/jstz/)。\n\
    \n这个库使用起来非常简单。加载库后，你可以通过`var timezone = jstz.determine();`实例化时区对象，然后通过`timezone.name();`访问时区的名称。\n\
    \n一个用于用户注册并自动选择时区的完整脚本如下所示。\n\n```php\n<?php\n// 12_6.php\n\nif (empty($_POST))\
    \ {\n    echo <<<HEREDOC\n<!DOCTYPE html>\n<html>\n<head>\n<script src=\"/js/jstz.js\"\
    ></script>\n</head>\n<body>\n<form method=\"POST\" action=\"{$_SERVER['PHP_SELF']}\"\
    >\n<div>\n<label for=\"user\">用户名</label>\n<input name=\"user\" type=\"text\"\
    \ required />\n</div>\n<div>\n<label for=\"timezone\">时区</label>\n<input id=\"\
    tz\" name=\"timezone\" type=\"text\" required />\n</div>\n<div>\n<input type=\"\
    submit\" />\n</div>\n</form>\n<script>\nvar timezone = jstz.determine();\nvar\
    \ tz = document.getElementById('tz');\ntz.value = timezone.name();\n</script>\n\
    </body>\n</html>\nHEREDOC;\n} else {\n    date_default_timezone_set($_POST['timezone']);\n\
    \    $lt = date('M d Y H:i:s');\n    echo <<<HEREDOC\n<!DOCTYPE html>\n<html>\n\
    <head>\n<script src=\"/js/jstz.js\"></script>\n</head>\n<body>\n<div>欢迎您：{$_POST['user']}</div>\n\
    <div>本地时间为：{$lt}</div>\n</body>\n</html>\nHEREDOC;\n}\n?>\n```\n\n在这个例子中，我们使用了一个简单的文本输入字段，并通过\
    \ JavaScript 为时区填充一个值。在我的例子中，该值是`America/Los_Angeles`。用户可以手动输入另一个时区（例如`Europe/Paris`），当表单提交后，脚本会显示一条欢迎信息以及所输入时区的当地时间。\n\
    \n这个脚本没有对任何输入进行验证，如果向用户提供一个包含所有有效时区的列表，用户体验会更好。这可以防止输入错误，用户也无需知道确切的时区名称。\n\n在\
    \ PHP 端，当表单提交时，我们在使用任何日期函数之前，使用函数`date_default_timezone_set()`来设置当前时区。该函数需要一个强制参数，即表示时区的字符串，例如`\"\
    Europe/Paris\"`。\n\n## 食谱 12-5. 会话数据\n\n### 问题\n\n如 12-3 节所述，我们可以使用 cookie 在客户端存储数据，但这有些不够安全，因为客户端可以在请求之间访问并操作这些数据。如果有一种方法能将数据存储在服务器端，只有服务器端脚本可以访问，那就太好了。\n\
    \n### 解决方案\n\n数据可以通过多种不同的方式存储在服务器上。服务器可以写入文件、在数据库中创建记录，或使用其他类型的存储方式。这些方式通常都与浏览器中的特定会话无关。通过使用\
    \ PHP 中的会话数据，系统会生成一个唯一的 ID，用作 cookie。它存储在浏览器的内存中，并与所有对服务器的请求一起发送。会话 ID 用于从磁盘（或其他存储引擎）加载或保存序列化的数据数组。这一切都由`session_start()`函数处理。\n\
    \n在任何输出之前调用此函数，它会查找名为`PHPSESSID`的 cookie 是否存在。如果存在，它将加载与该 ID 匹配的所有现有数据，并且后续引用将使用相同的\
    \ ID。如果 cookie 不存在，则会生成一个新的 ID 并设置该 cookie。\n\n添加到`$_SESSION`变量中的任何变量，都会在脚本终止或调用`session_close()`函数时被存储，并且所有写入的数据在下次调用`session_start()`的请求中会自动填充到`$_SESSION`中。\n\
    \n会话数据有一个可配置的过期时间。如果在数据过期之前，客户端没有向服务器发出任何请求，则所有数据都将从会话存储中移除。过期的默认值是 1440 秒，即 24\
    \ 分钟。这可以在`php.ini`中通过配置项`session.gc_maxlifetime = 1440`进行设置。每次写入数据时，计数器都会重置。\n\
    \n我建议在会话配置中使用许多其他配置选项：\n\n会话 ID 可以从许多来源初始化，但通过在`php.ini`中设置`session.use_only_cookies\
    \ = 1`，可以将来源限制为仅使用 cookie。为确保脚本语言无法访问 cookie 的值，可以设置`session.cookie_httponly =\
    \ 1`，最后，设置`session.hash_function = 1`将使用 SHA-1 函数代替 MD5 函数来创建 cookie 的值。\n\n###\
    \ 工作原理\n\n在这个例子中，我们使用会话存储来存储值，这些值通过名为`PHPSESSID`的 cookie 与浏览器关联。\n\n```php\n<?php\n\
    // 12_7.php\ndate_default_timezone_set('UTC');\nsession_start();\n\nif ($_SESSION['last_request'])\
    \ {\n    echo \"上次访问时间是 \" . date('M d Y H:i:s');\n} else {\n    echo '这是对本站的首次请求';\n\
    }\n\n$_SESSION['last_request'] = time();\n?>\n```\n\n用户第一次请求该脚本时，会看到一条提示信息，表明他们之前没有访问过该网站。由于这是通过会话\
    \ cookie 处理的，如果他们关闭浏览器并重新打开，或者等待时间超过了垃圾回收器配置的生命周期（24 分钟），他们会再次看到同样的提示信息。在所有其他情况下，脚本会显示他们上次访问同一服务器（启动该会话的服务器）上任何内容的时间。\n\
    \n`$_SESSION`数组可以包含任何类型的数据值。它可以用于存储标量（如上所示）、数组，甚至实例化的对象。\n\n在示例`12_3.php`中，我们使用了一个\
    \ cookie 变量（`visited`）来存储关于网站访问时间的数据。使用客户端存储使得用户可以在发送后续请求之前更改数据，因此这是一种不安全的存储形式。通过将数据转移到服务器端的会话数据中，我们可以将多个值与单个会话\
    \ cookie 关联起来，同时防止用户在请求之间操作数据。\n\n唯一的安全问题就在于会话 cookie 本身。如果某个用户能够获取 cookie 的值，并将其注入到不同的浏览器或其他类型的客户端中，那么他们就有可能访问存储在会话数据中的数据，从而获得对该网站的访问权限（如果会话数据包含识别用户身份的信息）。\n\
    \n## 食谱 12-6. 内容类型与处置方式\n\n### 问题\n\n尽管 PHP 旨在生成 HTML 文档，但它也可以用于生成其他形式的内容。这些内容可以在浏览器中使用或保存到磁盘，但我们如何告诉浏览器它是什么类型的内容，以及期望它如何处理呢？\n\
    \n### 解决方案\n\n大多数浏览器遵循一些默认约定。如果内容被定义为`Content-Type`，并将其设置为`text/html`或`text/plain`，浏览器会将其作为文档进行渲染。\n\
    \n同样，如果`Content-Type`被定义为`application/octet-stream`，浏览器会尝试通过打开“另存为”对话框将内容保存到一个文件，允许用户选择文件夹并指定文件名。\n\
    \n如果 PHP 没有提供`Content-Type`头，则会提供默认值；如果文件直接从 Web 服务器下载（如图片文件等），Web 服务器会应用适当的头信息。\n"
- fmt: "# Web Fundamentals\n\n## Content-Type and Content-Disposition Headers\n\n\
    If the wrong `Content-Type` is specified, the browser might even look at the content\
    \ and overwrite it, rendering the content correct anyway. This is the case with\
    \ images where it's possible to use `image/jpeg` for a GIF, and it's possible\
    \ to rename a `.jpg` file to `.gif`, and the browser will still handle the image\
    \ rendering correctly.\n\nThe header `Content-Type` is intended to tell the browser\
    \ what it is receiving in the body of the HTTP request. In the same way, we can\
    \ use the header `Content-Disposition` to tell the browser how to handle the response.\n\
    \nThe `Content-Disposition` can have two values:\n- The value `inline` means the\
    \ content should be rendered as part of the document if possible (text, HTML,\
    \ image, etc.)\n- The value `attachment` indicates that the browser should save\
    \ the file to disk. This is useful if you want the user to download a file that\
    \ can be rendered in the browser.\n\nIf you don't specify the `Content-Disposition`,\
    \ the browser will use its default behavior, and the user will have to use the\
    \ Save As function in the browser to save the content to disk.\n\nBoth of these\
    \ headers can be set with the `header()` function, and both of them have additional\
    \ options that can be provided. For the `Content-Type`, we can add `charset` and\
    \ specify if we are using `utf-8` or `iso-8889-1` or other character sets.\n\n\
    For the `Content-Disposition`, we can add a `filename` option to suggest a file\
    \ name that goes along with the content. If the filename is not provided, the\
    \ browser will default to the name of the file that is fetched from the server.\
    \ That might be okay if the file is served directly from the web server, but if\
    \ the file is generated with PHP, the file name will be the name of the script.\n\
    \n### How It Works\n\nIf you have an image file that you want to scale to a smaller\
    \ size when the image is viewed in the browser, but also allow the user to click\
    \ a link and download the full-sized version of the image, you can use the code\
    \ from `example 8_3.php` and add headers for downloading the image.\n\n```php\n\
    <?php\n\n// 12_8.php\n\n$size = [160, 120];\n$img_name = 'IMG_0099.JPG';\n$orig\
    \ = GetImageSize($img_name);\n\n$a1 = $size[0] / $size[1];\n$a2 = $orig[0] / $orig[1];\n\
    \nif ($a1 > $a2) {\n    $d = ceil($orig[0] / $size[0]);\n} else {\n    $d = ceil($orig[1]\
    \ / $size[1]);\n}\n\n$w = $orig[0] / $d;\n$h = $orig[1] / $d;\n\nheader('Content-Type:\
    \ ' . $orig['mime']);\n\nif ($_REQUEST['Download']) {\n    header('Content-Disposition:\
    \ attachment; filename=\"' . $img_name . '\"');\n    readfile($img_name);\n} else\
    \ {\n    $img = ImageCreateFromJpeg('IMG_0099.JPG');\n    $thumb = ImageScale($img,\
    \ $w, $h);\n    \n    switch ($orig[2]) {\n        case IMG_JPG:\n        case\
    \ IMG_JPEG:\n            ImageJPEG($thumb);\n            break;\n        case\
    \ IMG_PNG:\n            ImagePNG($thumb);\n            break;\n        case IMG_GIF:\n\
    \            ImageGIF($thumb);\n            break;\n    }\n    \n    ImageDestroy($thumb);\n\
    \    ImageDestroy($img);\n}\n?>\n```\n\nThe HTML to show the image and provide\
    \ a download link could look like this:\n\n```html\n<!DOCTYPE html>\n<!-- 12_8.html\
    \ -->\n<html>\n<body>\n    <img src=\"12_8.php\" />\n    <a href=\"12_8.php?Download=1\"\
    >Download this image</a>\n</body>\n</html>\n```\n\nThe `<img>` tag will render\
    \ the thumbnail of the image, and then an `<a>` tag will provide a link to download\
    \ the image in full size. Depending on the settings in the browser, the user might\
    \ or might not get a dialog box. In most browsers these days, the default action\
    \ is to save the file in a preconfigured download folder.\n\n## Recipe 12-7. Caching\n\
    \n### Problem\n\nVarious types of content might end up changing at different frequencies.\
    \ Static files like JavaScript and images might not change often, and it would\
    \ be a good idea to let the browser use the version already downloaded if it exists.\
    \ This will save bandwidth and reduce the load on the server. This is usually\
    \ handled with configurations of the web server.\n\nFor content generated by PHP,\
    \ the default behavior is to generate and send the content to the client on every\
    \ request, even if the client already has a copy of the content. That is using\
    \ both bandwidth as well as CPU and memory resources on the server. In addition,\
    \ the script might use other resources to get the data.\n\nHow can we dynamically\
    \ handle the requests to determine if the client already has a copy of the content\
    \ and whether it's okay to use the copy already on the client?\n\n### Solution\n\
    \nThe first step is to divide the content into various groups:\n\n- Images, scripts,\
    \ and other files that are served directly by the web server (without invoking\
    \ PHP) should be handled by the web server configuration.\n- Content that is generally\
    \ available to the public (no login or other user identification required) could\
    \ be served as a static file. Meaning when the content changes, a process on the\
    \ server will generate a new copy, and all requests for the content will simply\
    \ serve the pregenerated file. All this can be handled on the server without specific\
    \ headers.\n- Content that changes more often could be given an expiration time.\
    \ If that is done alone, the browser will use the local copy until the time of\
    \ expiration. But if we tell the browser that it must revalidate on every request,\
    \ the browser will add headers that can be tested. Only if the content was changed\
    \ on the server will it be regenerated; otherwise, the server will simply tell\
    \ the browser to use the copy it already has through a status code `304`. This\
    \ does require some communication between the browser and server, but the server\
    \ only spends time checking if the cache is still valid.\n\n### How It Works\n\
    \nThe trick is to use a number of headers that identify that the browser can cache\
    \ the content, how the cache should be handled, when the content was modified,\
    \ and when it expires.\n\n```php\n<?php\n\n// 12_9.php\n\nfunction Cache($last_mod,\
    \ $ttl = 86400) {\n    $gmt_mod = gmdate('D, d M Y H:i:s', $last_mod) . ' GMT';\n\
    \    $gmt_expires = gmdate('D, d M Y H:i:s', time() + $ttl) . ' GMT';\n    \n\
    \    header(\"Pragma: Cache\");\n    header(\"Cache-Control: max-age=0, must-revalidate\"\
    );\n    header(\"Last-Modified: \" . $gmt_mod);\n    header(\"Expires: \" . $gmt_expired);\n\
    \    \n    if (!empty($_SERVER['HTTP_IF_MODIFIED_SINCE']) &&\n        $_SERVER['HTTP_IF_MODIFIED_SINCE']\
    \ == $gmt_mod) {\n        http_response_code(304);\n        exit();\n    }\n}\n\
    \n// Lookup the timestamp when the data was changed\n$LastMod = GetModified();\n\
    Cache($LastMod);\n\n// Check for a cached version on the server\nif (file_exists(\"\
    cache_12_9.php\")) {\n    readfile(\"cache_12_9.php\");\n} else {\n    // Generate\
    \ the content\n}\n\n?>\n```\n\nIn the example, we use the `Cache()` function to\
    \ check if the content was changed and to set the headers for the content. This\
    \ function could be added to an include file so it can be used by multiple requests.\n\
    \nThe format for the date/time values for the `Last-Modified` and `Expires` headers\
    \ should be in the very specific format `'D, d M Y H:i:s'` or by using one of\
    \ the predefined constants `DATE_RSS`. The dates are also required to always be\
    \ in GMT.\n\nWhen the `Cache-Control` header is defined with `must-revalidate`,\
    \ the browser will always send a request to the server with the header `HTTP_IF_MODIFIED_SINCE`\
    \ set to the modification `Last-Modified` date from the original response. That\
    \ value will end up in the super global variable `$_SERVER['HTTP_IF_MODIFIED_SINCE']`\
    \ and can be compared directly to the modification date/time. If they are identical,\
    \ the script will send a status code `304` telling the browser to use the cached\
    \ content, and it exists so it does not have to spend resources on generating\
    \ the content again."
  raw: 'If the wrong Content-Type is specified the browser might even look at the
    content and overwrite, rendering the content correct anyway. This is the case
    with images where it’s possible to use image/jpeg for a GIF and it’s possible
    to rename a .jpg file to .gif and the browser will still handle the image rendering
    correct.


    The header Content-Type is intended to tell the browser what it is receiving in
    the body of the HTTP


    request. In the same way we can use the header Content-Disposition to tell the
    browser how to handle the response. The Content-Disposition can have two values.
    The value inline means the content should be rendered as part of the document
    if possible (text, html, image, etc.) and the value attachment indicates that
    the browser should save the file to disk. This is useful if you want the user
    to download a file that can be rendered in the browser. If you don’t specify the
    Content-Disposition the browser will use its default behavior and the user will
    have to use the Save As function in the browser to save the content to desk.


    Both of these headers can be set with the header() function. And both of them
    have additional options that can be provided. For the Content-Type we can add
    charset and specify if we are using utf-8 or iso-8889-1


    or other character sets.


    For the Content-Disposition we can add a filename option to suggest a file name
    that goes along with the content. If the filename is not provided the browser
    will default to the name of the file that is fetched from the server. That might
    be Ok if the file is served directly from the web server but if the file is generated
    with php the file name will be the name of the script.


    How it Works


    If you have an image file that you want to scale to a smaller size when the image
    is viewed in the browser but also allow the user to click a link and download
    the full-sized version of the image; you can use the code from example 8_3.php
    and add headers for downloading the image.


    <?php


    // 12_8.php


    $size = [160, 120];


    $img_name = ''IMG_0099.JPG'';


    $orig = GetImageSize($img_name);


    $a1 = $size[0] / $size[1];


    $a2 = $orig[0] / $orig[1];


    CHAPTER 12 ■ WEB FUNDAMENTALS


    if ($a1 > $a2) {


    $d = ceil($orig[0] / $size[0]);


    }


    else {


    $d = ceil($orig[1] / $size[1]);


    }


    $w = $orig[0] / $d;


    $h = $orig[1] / $d;


    header(''Content-Type: '' . $orig[''mime'']);


    if ($_REQUEST[''Download'']) {


    header(''Content-Disposition: attachment; filename="'' . $img_name . ''"''); readfile($img_name);


    }


    else {


    $img = ImageCreateFromJpeg(''IMG_0099.JPG'');


    $thumb = ImageScale($img, $w, $h);


    switch ($orig[2]) {


    case IMG_JPG :


    case IMG_JPEG :


    ImageJPEG($thumb);


    break;


    case IMG_PNG :


    ImagePNG($thumb);


    break;


    case IMG_GIF :


    ImageGIF($thumb);


    break;


    }


    ImageDestroy($thumb);


    ImageDestroy($img);


    }


    The HTML to show the image and provide a download link could look like this:


    <!DOCTYPE html>


    <!- 12_8.html ->


    <html>


    <body>


    <img src="12_8.php" />


    <a href="12_8.php?Download=1">Download this image</a>


    </body>


    </html>


    The image tag will render the thumbnail of the image and then a tag will provide
    a link to download the image in full size. Depending on the settings in the browser
    the user might or might not get a dialog box. In most browsers these days the
    default action is to save the file in a preconfigured download folder.


    CHAPTER 12 ■ WEB FUNDAMENTALS


    Recipe 12-7\. Caching


    Problem


    Various types of content might end up changing at different frequencies. Static
    files like javascript and images might not change often and it would be a good
    idea to let the browser use the version already downloaded if it exists. This
    will save bandwidth and reduce the load on the server. This is usually handled
    with configurations of the web server. For content generated by PHP the default
    behavior is to generate and send the content to the client on every request, even
    if the client already has a copy of the content. That is using both bandwidth
    as well as CPU and memory resources on the server. In addition the script might
    use other resources to get the data. How can we dynamically handle the requests
    to determine if the client already has a copy of the content and whether it’s
    Ok to use the copy already on the client?


    Solution


    The first step is to divide the content into various groups. Images, scripts,
    and other files that are served directly by the web server (without invoking PHP)
    should be handled by the web server configuration.


    Content that is generally available to the public, no login or other user identification
    required could be served as a static file. Meaning when the content changes a
    process on the server will generate a new copy and all requests for the content
    will simply serve the pregenerated file. All this can be handled on the server
    without specific headers.


    Content that changes more often could be given an expiration time. If that is
    done alone the browser will use the local copy until the time of expiration, but
    if we tell the browser that it must revalidate on every request the browser will
    add headers that can be tested and only of the content was changed on the server
    it will be regenerated; otherwise the server will simply tell the browser to use
    the copy it already has through a status code 304\. This does require some communication
    between the browser and server but the server only spends time checking if the
    cache is still valid.


    How it Works


    The trick is to use a number of headers that identify that the browser can cache
    the content, how the cache should be handled, when the content was modified, and
    when it expires.


    <?php


    // 12_9.php


    function Cache($last_mod, $ttl = 86400) {


    $gmt_mod = gmdate(''D, d M Y H:i:s'', $last_mod) . '' GMT'';


    $gmt_expires = gmdate(''D, d M Y H:i:s'', time() + $ttl) . '' GMT'';


    header("Pragma: Cache");


    header("Cache-Control: max-age=0, must-revalidate");


    header("Last-Modified: " . $gmt_mod);


    header("Expires: " . $gmt_expired);


    if (!empty($_SERVER[''HTTP_IF_MODIFIED_SINCE'']) &&


    $_SERVER[''HTTP_IF_MODIFIED_SINCE''] == $gmt_mod) {


    http_response_code(304);


    exit();


    }


    }


    CHAPTER 12 ■ WEB FUNDAMENTALS


    // Lookup the timestamp when the data was changed


    $LastMod = GetModified();


    Cache($LastMod);


    // Check for a cached version on the server


    if (file_exists("cache_12_9.php")) {


    readfile("cache_12_9.php");


    }


    else {


    // Generate the content


    }


    In the example we use the Cache() function to check if the content was changed
    and to set the headers for the content. This function could be added to an include
    file so it can be used by multiple requests.


    The format for the date/time values for the Last-Modified and Expires headers
    should be in the very specific format ''D, d M Y H:i:s'' or by using one of the
    predefined constants DATE_RSS . The dates are also required to always be in GMT.


    When the Cache-Control header is defined with must-revalidate the browser will
    always send a request to the server with the header HTTP_IF_MODIFIED_SINCE set
    to the modification last-modified date from the original response. That value
    will end up in the super global variable $_SERVER[''HTTP_IF_MODIFIED_


    SINCE''] and can be compared directly to the modification date/time. If they are
    identical the script will send a status code 304 telling the browser to use the
    cached content and it exists so it does not have to spend resources on generating
    the content again.'
  trans: "\n# Web 基础\n\n## Content-Type 和 Content-Disposition 标头\n\n如果指定了错误的 `Content-Type`，浏览器甚至可能检查内容并覆盖它，从而仍然正确呈现内容。例如，对于图像，可以使用\
    \ `image/jpeg` 来处理 GIF 文件，也可以将 `.jpg` 文件重命名为 `.gif`，浏览器仍然能正确渲染图像。\n\n`Content-Type`\
    \ 标头的目的是告知浏览器它在 HTTP 请求正文中接收到的是什么内容。同样，我们可以使用 `Content-Disposition` 标头告知浏览器如何处理响应。\n\
    \n`Content-Disposition` 可以有两个值：\n- `inline` 值表示如果可能的话，内容应作为文档的一部分进行渲染（例如文本、HTML、图像等）。\n\
    - `attachment` 值表示浏览器应将文件保存到磁盘。如果你希望用户下载一个可以在浏览器中渲染的文件，这会很有用。\n\n如果你不指定 `Content-Disposition`，浏览器将使用其默认行为，用户必须使用浏览器的“另存为”功能将内容保存到磁盘。\n\
    \n这两个标头都可以通过 `header()` 函数设置，并且它们都有可以提供的附加选项。对于 `Content-Type`，我们可以添加 `charset`，并指定我们使用的是\
    \ `utf-8`、`iso-8889-1` 或其他字符集。\n\n对于 `Content-Disposition`，我们可以添加 `filename` 选项来建议一个与内容相关的文件名。如果未提供文件名，浏览器将默认使用从服务器获取的文件名。如果文件是直接从\
    \ Web 服务器提供的，这或许没问题，但如果文件是使用 PHP 生成的，文件名将是脚本的名称。\n\n### 工作原理\n\n如果你有一个图像文件，希望在浏览器中查看时将其缩放到较小尺寸，但同时也允许用户点击链接下载全尺寸版本的图像，你可以使用\
    \ `example 8_3.php` 中的代码，并添加用于下载图像的标头。\n\n```php\n<?php\n\n// 12_8.php\n\n$size\
    \ = [160, 120];\n$img_name = 'IMG_0099.JPG';\n$orig = GetImageSize($img_name);\n\
    \n$a1 = $size[0] / $size[1];\n$a2 = $orig[0] / $orig[1];\n\nif ($a1 > $a2) {\n\
    \    $d = ceil($orig[0] / $size[0]);\n} else {\n    $d = ceil($orig[1] / $size[1]);\n\
    }\n\n$w = $orig[0] / $d;\n$h = $orig[1] / $d;\n\nheader('Content-Type: ' . $orig['mime']);\n\
    \nif ($_REQUEST['Download']) {\n    header('Content-Disposition: attachment; filename=\"\
    ' . $img_name . '\"');\n    readfile($img_name);\n} else {\n    $img = ImageCreateFromJpeg('IMG_0099.JPG');\n\
    \    $thumb = ImageScale($img, $w, $h);\n    \n    switch ($orig[2]) {\n     \
    \   case IMG_JPG:\n        case IMG_JPEG:\n            ImageJPEG($thumb);\n  \
    \          break;\n        case IMG_PNG:\n            ImagePNG($thumb);\n    \
    \        break;\n        case IMG_GIF:\n            ImageGIF($thumb);\n      \
    \      break;\n    }\n    \n    ImageDestroy($thumb);\n    ImageDestroy($img);\n\
    }\n?>\n```\n\n用于显示图像并提供下载链接的 HTML 代码可以如下所示：\n\n```html\n<!DOCTYPE html>\n<!--\
    \ 12_8.html -->\n<html>\n<body>\n    <img src=\"12_8.php\" />\n    <a href=\"\
    12_8.php?Download=1\">下载此图像</a>\n</body>\n</html>\n```\n\n`<img>` 标签将渲染图像的缩略图，然后\
    \ `<a>` 标签将提供一个链接用于下载全尺寸图像。根据浏览器的设置，用户可能会也可能不会看到对话框。在当今大多数浏览器中，默认操作是将文件保存到预先配置的下载文件夹中。\n\
    \n## 配方 12-7. 缓存\n\n### 问题\n\n不同类型的内容可能以不同的频率发生变化。像 JavaScript 和图像这样的静态文件可能不常变化，让浏览器使用已下载的版本（如果存在）是个好主意。这将节省带宽并减少服务器负载。这通常通过\
    \ Web 服务器的配置来处理。\n\n对于由 PHP 生成的内容，默认行为是在每次请求时生成并发送内容给客户端，即使客户端已经拥有该内容的副本。这既消耗带宽，也消耗服务器的\
    \ CPU 和内存资源。此外，脚本可能还会使用其他资源来获取数据。\n\n我们如何动态处理请求，以确定客户端是否已经拥有内容的副本，以及是否可以使用客户端已有的副本？\n\
    \n### 解决方案\n\n第一步是将内容分成不同的组：\n\n- 由 Web 服务器直接提供（不调用 PHP）的图像、脚本和其他文件应由 Web 服务器配置处理。\n\
    - 通常对公众可用的内容（无需登录或其他用户身份识别）可以作为静态文件提供。这意味着当内容发生变化时，服务器上的进程会生成一个新副本，所有对该内容的请求只需提供预生成的文件即可。所有这些都可以在服务器上处理，无需特定的标头。\n\
    - 变化更频繁的内容可以给定一个过期时间。如果仅此而已，浏览器将使用本地副本直到过期。但如果我们告知浏览器每次请求都必须重新验证，浏览器将添加可测试的标头。只有当服务器上的内容发生更改时，才会重新生成；否则，服务器只需通过状态码\
    \ `304` 告知浏览器使用其已有的副本。这确实需要浏览器和服务器之间进行一些通信，但服务器只需花时间检查缓存是否仍然有效。\n\n### 工作原理\n\n\
    技巧是使用一系列标头来标识浏览器可以缓存内容、应如何处理缓存、内容何时被修改以及何时过期。\n\n```php\n<?php\n\n// 12_9.php\n\
    \nfunction Cache($last_mod, $ttl = 86400) {\n    $gmt_mod = gmdate('D, d M Y H:i:s',\
    \ $last_mod) . ' GMT';\n    $gmt_expires = gmdate('D, d M Y H:i:s', time() + $ttl)\
    \ . ' GMT';\n    \n    header(\"Pragma: Cache\");\n    header(\"Cache-Control:\
    \ max-age=0, must-revalidate\");\n    header(\"Last-Modified: \" . $gmt_mod);\n\
    \    header(\"Expires: \" . $gmt_expired);\n    \n    if (!empty($_SERVER['HTTP_IF_MODIFIED_SINCE'])\
    \ &&\n        $_SERVER['HTTP_IF_MODIFIED_SINCE'] == $gmt_mod) {\n        http_response_code(304);\n\
    \        exit();\n    }\n}\n\n// 查找数据更改时的时间戳\n$LastMod = GetModified();\nCache($LastMod);\n\
    \n// 检查服务器上的缓存版本\nif (file_exists(\"cache_12_9.php\")) {\n    readfile(\"cache_12_9.php\"\
    );\n} else {\n    // 生成内容\n}\n\n?>\n```\n\n在示例中，我们使用 `Cache()` 函数来检查内容是否已更改，并为内容设置标头。此函数可以添加到一个包含文件中，以便多个请求使用。\n\
    \n`Last-Modified` 和 `Expires` 标头的日期/时间值格式应使用非常特定的格式 `'D, d M Y H:i:s'`，或使用预定义常量之一\
    \ `DATE_RSS`。日期还必须始终使用 GMT 时间。\n\n当 `Cache-Control` 标头定义为 `must-revalidate` 时，浏览器将始终向服务器发送一个请求，其中包含\
    \ `HTTP_IF_MODIFIED_SINCE` 标头，其值为原始响应中的 `Last-Modified` 日期。该值将存储在超全局变量 `$_SERVER['HTTP_IF_MODIFIED_SINCE']`\
    \ 中，并可以直接与修改日期/时间进行比较。如果它们相同，脚本将发送状态码 `304`，告知浏览器使用缓存的内容，并且脚本退出，从而无需花费资源重新生成内容。\n"
- fmt: 'For this to work the code that fetches the modification time must generate
    the same UNIX timestamp until the content actually changes.


    The last section of the script checks for a cached version of the content on the
    server. If this file exists it will be sent to the client as is, otherwise the
    script will generate the content and perhaps save a cached version. The elements
    of code used to update the content could also generate the cached version when
    the new content is saved. This type of caching is relevant on sites that serve
    the exact same version of the content to many users in a high volume. For low-volume
    sites it might be fine to generate the content from scratch on every request.


    ## Recipe 12-8\. Remote Content


    ### Problem


    So far we have concentrated on the communication between the server and the browser,
    but what if the data needed is located on a different (web) server?


    ### Solution


    The `fopen` wrappers (as discussed in ch[apter 7) and stream functions in PHP
    can be used to communicate with other servers. The simplest for it is to use `file_get_contents()`
    with a URL instead of a local file. This does not in itself provide a way to specify
    header values for the request or allow any access to the response headers. That’s
    here the stream context comes in. It is possible to set the default stream context
    used with all functions (`fopen()`, `file_get_contents()` etc.) when used without
    a specified stream context. This is done with the `stream_context_set_default()`
    function. If a specific stream context is needed for individual function calls
    it can be created by calling the function `stream_context_create()`. The two functions
    both work on an array of options.


    There is a long line of options available and the options are specific to the
    protocol used to communicate with the server. The supported protocols are HTTP,
    FTP, SSL, CURL, Phar, and MongoDB.


    These are available if the respective modules are installed. In this example we
    focus on the HTTP protocol, but the other protocols follow a similar pattern.
    More information can be found here: [http://php.net/manual/en/context.php](http://php.net/manual/en/context.php).


    The important options available for the HTTP protocol are `method`, `header`,
    `user_agent`, and `content`.


    There are a number of other options to enable/disable redirects and other advanced
    features.


    The `method` is either `GET` or `POST` and if it’s not defined it defaults to
    `GET`. Headers can either be a string or an array of strings if more than one
    header should be sent. It follows the exact same pattern or syntax as is used
