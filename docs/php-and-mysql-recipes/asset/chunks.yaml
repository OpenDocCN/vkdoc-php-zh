  raw: 'The formatting string for the date() function is a combination of upper- and
    lowercase letters. Any character that is not recognized as a formatting character
    will remain as is in the returned string. This is useful for adding periods, slashes,
    dashes, or colons to separate values.


    In this next example we take the timestamp for the current time and format it
    as a European and U.S.


    date time string. The timestamp will represent the date and time in the time zone
    that is configured on the server.


    <?php


    // 5_5.php


    $ts = time();


    // European


    echo date("d/m/Y H:i:s", $ts) . "\n";


    // US


    echo date("m/d/Y h:i:s a", $ts) ."\n";


    The output of this program will look something like this.


    27/03/2015 16:46:28


    03/27/2015 04:46:28 pm


    The two major differences here are the swapping of day and month and the use of
    a 24-hour vs. a 12-hour representation of time. As you can see, spaces, slashes,
    and colons are not converted but all other characters are converted to a portion
    of the date time string that is returned. The full list of the supported characters
    can be found at [http://php.net/date](http://php.net/date) .


    Because the strftime() function relies on underlying operating system functions
    to format the string and translate names for months and week days the system expects
    the formatting placeholders to be %


    followed by a single upper- or lowercase letter.


    Let’s take a look at the same example but this time we include the name for the
    day of week and the full name of the month.


    CHAPTER 5 ■ DATES AND TIMES


    <?php


    // 5_6.php


    $ts = time();


    echo date("l F d Y h:i:s a", $ts) ."\n";


    This will output the date time string as shown below.


    Friday March 27 2015 04:54:36 pm


    In order to use the strftime() function we would have to change the formatting
    string as seen in this next example.


    <?php


    // 5_7.php


    $ts = time();


    echo strftime("%A %B %e %Y %I:%M:%S %P ", $ts) ."\n"; This example will generate
    output that looks like this:


    Friday March 27 2015 05:03:40 pm


    In order to get the names for months and weekdays in a different languages we
    can use the setlocale() function to change the behavior to


    <?php


    // 5_8.php


    $ts = time();


    setlocale(LC_TIME, ''en_US'');


    echo "English: ";


    echo strftime("%A %B %e %Y %I:%M:%S %P", $ts) ."\n"; setlocale(LC_TIME, ''de_DE'');


    echo "German: ";


    echo strftime("%A %B %e %Y %H:%M:%S", $ts) ."\n";


    setlocale(LC_TIME, ''fr_FR'');


    echo "French: ";


    echo strftime("%A %B %e %Y %H:%M:%S", $ts) ."\n";


    Now we are using the strings from the operating system to show names of workdays
    and months in the language selected by setlocale() and the output will look like
    this: English: Friday March 27 2015 05:16:32 pm


    German: Freitag März 27 2015 17:16:32


    French: Vendredi mars 27 2015 17:16:32


    CHAPTER 5 ■ DATES AND TIMES


    ■ **Note** The language packages for the desired languages must be installed on
    the system in order for the setlocal() function to be able to utilize them.


    If you don’t want to rely on setlocale() for translations of names for weekdays
    and months, the simple solution is to use numeric values for these but it is also
    possible to write your own formatting function.


    <?php


    // 5_9.php


    $weekdays = array(


    ''en'' => array(


    ''Sunday'', ''Monday'', ''Tuesday'', ''Wednesday'',


    ''Thursday'', ''Friday'', ''Saturday'', ''Sunday''


    ),


    ''da'' => array(


    ''søndag'', ''mandag'', ''tirsdag'', ''onsdag'',


    ''torsdag'', ''fredag'', ''lørdag'', ''søndag''


    ),


    );


    $months = array(


    ''en'' => array(


    1 => ''January'', ''February'', ''March'', ''April'', ''May'', ''June'',


    ''July'', ''August'', ''September'', ''October'', ''November'', ''December''


    ),


    ''da'' => array(


    1 => ''januar'', ''februar'', ''marts'', ''april'', ''maj'', ''juni'',


    ''juli'', ''august'', ''september'', ''oktober'', ''november'', ''december''


    ),


    );


    function FormatDate($ts, $lang = ''en'') {


    global $weekdays, $months;


    $d = date(''j'', $ts);


    $w = date(''w'', $ts);


    $m = date(''n'', $ts);


    $y = date(''Y'', $ts);


    switch($lang) {


    case ''en'' :


    return $weekdays[$lang][$w] . ", " . $months[$lang][$m] .


    " {$m} {$y}";


    break;


    case ''da'' :


    return $weekdays[$lang][$w] . ", {$m} " . $months[$lang][$m] .


    " {$y}";


    break;


    }


    }


    CHAPTER 5 ■ DATES AND TIMES


    $ts = time();


    echo FormatDate($ts) . "\n";'
