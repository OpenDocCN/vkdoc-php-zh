    \ in this file, `SymmetricCrypt`, is used by `SecureCard` to encrypt and decrypt\
    \ data. This means that if you ever want to change the encryption method, you\
    \ only need to modify the code here, leaving the `SecureCard` class untouched.\n\
    \nWe’ll look at the code for hashing first, followed by encryption.\n\n## Implementing\
    \ Hashing Functionality in the Business Tier\n\nHashing is a means by which you\
    \ can obtain a unique value that represents an object. The algorithm used to convert\
    \ the source byte array into a hashed byte array varies. The most used hashing\
    \ algorithm is called MD5 (Message Digest, another name for the hash code generated),\
    \ which generates a 128-bit hash value. Unfortunately, many kinds of attacks are\
    \ based on word dictionaries constructed against MD5 hashes. Another popular hashing\
    \ algorithm is called SHA1 (Secure Hash Algorithm), which generates a 160-bit\
    \ hash value. SHA1 is generally agreed to be more secure (although slower) than\
    \ MD5.\n\nIn the HatShop implementation, you’ll use SHA1, although it is easy\
    \ to change this if you require another type of security. Now, you’ll implement\
    \ the `PasswordHasher` class in the following exercise.\n\n> **Note:** PHP doesn’t\
    \ come by default with support for `mhash` and `mcrypt`, the libraries we're using\
    \ in this chapter for hashing and encryption. See Appendix A to learn how to enable\
    \ support for `mhash` and `mcrypt`.\n\n### Exercise: Implementing the `PasswordHasher`\
    \ Class\n\nTo implement the `PasswordHasher` class, follow these steps:\n\n**1.**\
    \ Add the following line at the end of the `include/config.php` file. This defines\
    \ a random value (feel free to change it) to add to the passwords before hashing\
    \ them.\n\n```php\n// Random value used for hashing\ndefine('HASH_PREFIX', 'K1-');\n\
    ```\n\n**2.** Create a new file named `password_hasher.php` in the `business`\
    \ directory, and write the `PasswordHasher` class in it:\n\n```php\n<?php\nclass\
    \ PasswordHasher\n{\n    public static function Hash($password, $withPrefix =\
    \ true)\n    {\n        if ($withPrefix)\n            $hashed_password = sha1(HASH_PREFIX\
    \ . $password);\n        else\n            $hashed_password = sha1($password);\n\
    \        return $hashed_password;\n    }\n}\n?>\n```\n\n**3.** Next, write a simple\
    \ test page to test the `PasswordHasher` class. Create a new file named `test_hasher.php`\
    \ in the `hatshop` folder with the following code in it:\n\n```php\n<?php\nif\
    \ (isset ($_GET['to_be_hashed']))\n{\n    require_once 'include/config.php';\n\
