- fmt: "# Using Built-In Components\n\nLike the helpers, Cake has a wealth of component\
    \ functions that make running processes in the controller much easier. In fact,\
    \ some components are intended to work hand in hand with helpers like the `Session`\
    \ component. Running some functions in the controller makes it easier to organize\
    \ and format the data forwarded on to the view for use by the `Session` helper.\n\
    \nKnowing what built-in components can do for your controllers will save you from\
    \ \"reinventing the wheel\" and help you exploit some of the snazzy functions\
    \ that make Cake such an attractive framework.\n\nIn each of the following descriptions,\
    \ I'll give a basic overview of what the component offers and list some of its\
    \ functions. In the future, more functions may be added to these components, and\
    \ sometimes third-party components will extend them too. Cake's core components\
    \ are stored in the `cake/libs/controller/components` folder; if you'd like to\
    \ take a look at the code itself, refer to the component files there.\n\n## Authentication\n\
    \nThe `Auth` component helps with managing user authentication of the application.\
    \ Many times you may want an area of the site to be protected from ordinary users.\
    \ Common processes such as logging in to view an area of the site are made easier\
    \ by the `Auth` component. Like other components, it needs to be included in the\
    \ `$components` array to be available in the controller:\n\n```\nvar $components\
    \ = array('Auth');\n```\n\nWith the `Auth` component, you can require authentication\
    \ for miscellaneous areas of the application such as models, controllers, or other\
    \ objects. `Auth` also provides methods for automating logging in and automatically\
    \ redirecting the user to accessible areas of the site.\n\nA database table containing\
    \ stored user information is necessary for the `Auth` component to work correctly.\n\
    \n### Setting Up the Users Table\n\nBy default, `Auth` will look for a table named\
    \ `users` with fields named `username` and `password`. Of course, these default\
    \ parameters can be changed by entering custom parameters into the component before\
    \ runtime. Whatever the case, a table somewhere in the database will need to be\
    \ present to store all the users and their passwords. The `users` table doesn't\
    \ need to store only `username` and `password` fields; it can also include roles,\
    \ privileges, e-mail, and more. You'll have to tell `Auth` how to use these types\
    \ of metadata.\n\nThe `users` table is already built into your blog application.\
    \ Because the `Auth` component hashes all passwords, you'll need to make sure\
    \ the `password` field has enough space to store the hashes. Remember that `Security.salt`\
    \ value in the core configuration? The `Auth` component will use this salt value\
    \ to generate its hashes, so putting a more complicated string in this preference\
    \ will improve the security of your passwords.\n\nWith the `users` table ready\
    \ to store usernames and passwords, you can implement the `Auth` component in\
    \ your blog application. First let's initialize some parameters in the `Posts`\
    \ controller.\n\n### Initializing Variables\n\nSeveral parameters need to be set\
    \ for `Auth` to work correctly. You specify these parameters by setting variables\
    \ in the `beforeFilter()` controller action for the controller that will require\
    \ authorization before letting the user access it. In this case, you will want\
    \ to block out certain editing and deleting actions in the blog except for logged-in\
    \ users. In the `Posts` controller, you need to tell the `Auth` component which\
    \ actions are allowed and where to redirect the user upon a successful login.\
    \ Listing 11-3 contains the `beforeFilter()` action for the `Posts` controller.\n\
    \n**Listing 11-3.** *Some Auth Parameters in the `beforeFilter()` Action*\n\n\
    ```\nfunction beforeFilter() {\n    $this->Auth->loginAction = array('controller'=>'users','action'=>'login');\n\
    \    $this->Auth->allow('index','view');\n    $this->Auth->redirectLogin = array('controller'=>'posts','action'=>'add');\n\
    }\n```\n\nNotice in Listing 11-3 that each class variable is set like any typical\
    \ PHP variable. On line 3, I used the `allow` function to tell the `Auth` component\
    \ which actions don't require authentication to be accessed. You do not need to\
    \ specify the `login` and `logout` actions; otherwise, this will trip up the `Auth`\
    \ component; it automatically assumes these functions are accessible to everyone.\n\
    \nNow that the `Auth` component has been called in the controller and the `beforeFilter()`\
    \ action sets some parameters for `Auth` to use; `Auth` will check each action\
    \ against what you've specified. If a request is made for an action that is not\
    \ allowed, `Auth` will require the user to log in for access, which is specified\
    \ in line 2 of Listing 11-3. In this case, the user will be redirected to the\
    \ `Login` action in the `Users` controller (which hasn't been created yet). `Auth`\
    \ will not be run if the user requests the `Index` and `View` actions in the `Posts`\
    \ controller.\n\nThe next step is to create the `Login` action in the `Users`\
    \ controller. Because the `Auth` component does almost all the work, you will\
    \ need only to create the view with the username and password fields.\n\n## Hashed\
    \ Passwords\n\nBecause the `Auth` component requires that stored passwords be\
    \ hashed, setting up user passwords can be tricky. Using `Auth`'s `password()`\
    \ function, you can pass a string, and `Auth` will return the hash. This same\
    \ hashing process will be applied to whatever the user submits as a password and\
    \ will be compared to the database, so you will need to store the hashed version\
    \ of the user passwords and not a plain-text version.\n\nI've included a password\
    \ generator with the following line:\n\n```\n$this->set('password',$this->Auth->password($this->data['User']['password']));\n\
    ```\n\nOf course, in the view, I'll need to provide a form with an input field\
    \ named `password` for this to work, as well as a view to display what `Auth->password()`\
    \ returns. If a form view elsewhere in the site creates new user accounts, it\
    \ must use the `Auth->password()` function when saving the password.\n\n### Logging\
    \ In\n\nAs long as the view that renders the login form is named appropriately\
    \ (in other words, its names correspond to the parameters set in the `beforeFilter()`\
    \ function), the `Auth` component will automatically check the `$this->data` array\
    \ for the username and password and check it using the `userModel` and `fields`\
    \ settings. Listing 11-4 shows the view file for the `Users Login` action.\n\n\
    **Listing 11-4.** *The `app/views/users/login.ctp` File*\n\n```\n<h1>Log In</h1>\n\
    <? if ($session->check('Message.auth')) $session->flash('auth');?>\n<?=$form->create('User',array('action'=>'login'));?>\n\
    <?=$form->input('username');?>\n<?=$form->input('password',array('type'=>'password'));?>\n\
    <?=$form->end('Login');?>\n```\n\nSimple enough—the `Login` view contains a form\
    \ to render input fields for the `username` and `password` and submits it to the\
    \ `Login` action. If there are any errors, like an incorrect match, they will\
    \ be displayed in line 2 with the `flash` function.\n\nTo complete the login process,\
    \ you need only to prepare the `Users` controller. Listing 11-5 shows the contents\
    \ of the `Users` controller with the `login` function.\n\n**Listing 11-5.** *The\
    \ `Auth` Component in the `Users` Controller*\n\n```\n<?\nclass UsersController\
    \ extends AppController {\n    var $name = 'Users';\n    var $components = array('Auth');\n\
    \n    function beforeFilter() {\n        $this->Auth->allow('*');\n    }\n\n \
    \   function login() {\n    }\n}\n?>\n```\n\nYou can see that the `Login` action\
    \ is empty. This is because the `Auth` component takes care of everything for\
    \ you; you only need to specify the action so that Cake appropriately renders\
    \ the `Login` view. Line 7 shows the use of the asterisk in the `Auth->allow()`\
    \ function. This tells the `Auth` component to allow all actions in the current\
    \ controller."
