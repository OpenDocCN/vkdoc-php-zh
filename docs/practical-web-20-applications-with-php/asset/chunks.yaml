    **Displaying a User’s Tags on Their Blog**


    The next step in implementing a tagging system is to display the tags to the people
    who use the site. We will do this simply by listing all tags in the side column
    with a count of the number of posts that use that tag in the blog.


    When one of these tags is clicked, the user will be taken to a page listing all
    posts with that tag. The URL of this page will be in the format [http://phpweb20/user/
    *username*/tag/ *tagname*.](http://phpweb20/user/username/tag/tagname)


    ■**Note** Such a page is called a *tag space*. The microformats rel-tag specifica[tion
    (http://microformats.](http://microformats.org/wiki/rel-tag#Tag_Spaces)


    [org/wiki/rel-tag#Tag_Spaces) defines a ta](http://microformats.org/wiki/rel-tag#Tag_Spaces)g
    space as a well-defined URI from which an embedded tag can be mechanically extracted.
    Specifically, the last segment of a path (after the final slash) denotes that
    tag (not taking into account any URL parameters or anchors). So, in the case of
    the URL mentioned earlier, *tagname* is the last segment and therefore denotes
    the tag of that tag space. We will look at the rel-tag microformat later in this
    chapter.


    To generate the list of tags and the number of posts that have that tag, we must
    write another new function for DatabaseObject_BlogPost, which we call GetTagSummary().
    To retrieve the number of posts for each tag, we must use the following SQL statement:
    SELECT count(*) as count, t.tag


    FROM blog_posts_tags t


    INNER JOIN blog_posts p ON p.post_id = t.post_id


    WHERE p.user_id = *[user id]*


    AND p.status = ''L''


    GROUP BY t.tag


    The only problem with this query is that it differentiates between uppercase and
    lowercase versions of the same tag, whereas we don’t want it to do so. To deal
    with this, we add some extra processing to GetTagSummary(). Listing 10-11 shows
    the full function to go in


    ./include/DatabaseObject/BlogPost.php.


