    **Figure 8-1.** *The HatShop shopping cart*


    Our shopping cart will have a “Save for Later” feature, which allows the visitor
    to move a shopping cart product to a separate list, in case he or she wants to
    buy only a part of the items (see Figure 8-2).


    **Figure 8-2.** *The HatShop “Save for Later” feature*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00111.png)


    648XCH08.qxd 10/31/06 10:07 PM Page 269


