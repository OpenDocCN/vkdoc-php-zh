    和 1）会通过操作系统发送到文本编辑器。然而，大多数人并不理解 0 和 1 的模式。因此，当文本编辑器接收到信息时，显示的信息会在显示器上转换为我们按下的字母（“s”）。请注意，我们说的是显示被转换了，而非实际数据本身。当我们存储数据时，它仍然以比特格式存储。


