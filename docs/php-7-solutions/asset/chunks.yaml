    \ valid. (The updated code is\n    in `session_04.php`.)\n\nUsing file-based authentication\n\
    As you have just seen, the combination of session variables and\nconditional statements\
    \ lets you present completely different pages to a\nvisitor depending on whether\
    \ a session variable has been set. All you\nneed to do is add a password-checking\
    \ system and you have a basic user\nauthentication system.\nBefore diving into\
    \ the code, let’s consider the important question of\nsecure passwords.\n\nMaking\
    \ Passwords Secure\nPasswords should never be stored in a publicly accessible\
    \ location.\nIn other words, if you’re using a file-based authentication system,\
    \ the\nfile must be outside the web server’s document root. Moreover, the\npasswords\
    \ should not be kept in plain text. For greater security, it’s\nadvisable to hash\
    \ passwords. For many years, it was recommended to use\nthe `MD5` or\n`SHA-`1\n\
    algorithms to hash passwords as a 32- or 40-digit hexadecimal number.\nOne of\
    \ their original strengths, speed, has turned out to be a major\nweakness. Automated\
    \ scripts can process huge numbers of calculations per\nsecond in a brute force\
    \ attack to determine the original value—not so\nmuch guessing as trying every\
    \ possible combination.\n\nThe current recommendation is to use two functions:\
    \ `password_hash()` and\n`password_verify()`,\nwhich offer a much more robust\
    \ system of hashing and verifying\npasswords. To hash a password, just pass it\
    \ to the `password_hash()`\nfunction, like this:\n\n```\n$hashed = password_hash($password,\
    \ PASSWORD_DEFAULT);\n```\n\nThe second argument to `password_hash()` is a\nconstant\
    \ that leaves the encryption method up to PHP, allowing you to\nkeep up to date\
    \ with what is considered the most secure method at the\ntime.\n\nNote\nThe `password_hash()`\n\
    function  has\nother options for advanced users. For details, see [`www.php.net/manual/en/function.password-hash.php`](http://www.php.net/manual/en/function.password-hash.php)\
    \ . There’s also a FAQ (frequently asked questions) page\nabout safe password\
    \ hashing at [`www.php.net/manual/en/faq.passwords.php`](http://www.php.net/manual/en/faq.passwords.php)\
    \ .\n\nUsing `password_hash()`\nscrambles plain text passwords in a way that makes\
    \ it impossible to\nreverse. This means that even if your password file is exposed,\
    \ no one\nwill be able to work out what the passwords are. It also means that\
    \ you\nhave no way of converting a password back to its original value. In one\n\
    respect, this is unimportant: when a user logs in, `password_verify()`  checks\
    \ the submitted\nvalue against the hashed version. The disadvantage is that there\
    \ is no\nway that you can send users password reminders if they forget them; a\n\
    new password must be created. Nevertheless, good security demands\nhashing passwords.\n\
    \nHashing is no protection against the most common problem with\npasswords: ones\
    \ that are easy to guess or that use common words. Many\nregistration systems\
    \ now enforce the use of stronger passwords by\nrequiring a mixture of alphanumeric\
    \ characters and symbols.\n\nSo, the first task is to create a user registration\
    \ form that checks the\nfollowing:\n\n*   That the password and username contain\
    \ a minimum number of\n    characters\n\n*   That the password matches minimum\
    \ strength criteria, such as\n    containing a mixture of numbers, uppercase and\
    \ lowercase characters, and\n    symbols\n\n*   That the password matches a second\
    \ entry in a confirmation\n    field\n\n*   That the username isn’t already in\
    \ use\n\nPHP Solution 11-3: Creating a Password Strength\nChecker\nThis PHP solution\
    \ shows how to create a class that checks whether a\npassword meets certain requirements,\
    \ such as the use of spaces, a\nminimum number of characters, and a combination\
    \ of different types of\ncharacters. By default, the class checks only that the\
    \ password has only\nsingle spaces, no spaces at the beginning or end, and contains\
    \ a minimum\nnumber of characters. Optional methods allow you to set tougher\n\
    conditions, such as using a combination of uppercase and lowercase\ncharacters,\
    \ numbers, and nonalphanumeric symbols.\n\nThis PHP solution starts by building\
    \ the user registration form that\nwill also be used in PHP Solution 11-4.\n\n\
    1.  Create a page called `register.php` in the\n    `sessions` folder\n    and\
    \ insert a form with three text input fields and a Submit button. Lay\n    out\
    \ the form and name the input elements as shown in the following\n    screenshot.\
    \ If you want to save time, use `register_01.php` in\n    the `ch11`\n    folder.\n\
    \n![../images/332054_4_En_11_Chapter/332054_4_En_11_Figf_HTML.jpg](images/332054_4_En_11_Chapter/332054_4_En_11_Figf_HTML.jpg)\n\
    \n1.  As always, you want the processing script to run only if the form has\n\
    \    been submitted, so everything needs to be enclosed in a conditional\n   \
    \ statement that checks whether the `name` attribute of the\n    Submit button\
    \ is in the `$_POST` array. Then\n    you need to check that the input meets your\
    \ minimum requirements. Insert\n    the following code in a PHP block above the\
    \ `DOCTYPE` declaration:\n\n```\n    if (isset($_POST['register'])) {\n    $username\
    \ = trim($_POST['username']);\n    $password = trim($_POST['pwd']);\n    $retyped\
    \ = trim($_POST['conf_pwd']);\n    require_once '../PhpSolutions/Authenticate/CheckPassword.php';\n\
    \    }\n    ```\n\nThe code inside the conditional statement passes the input\
    \ from the\n    three text fields to `trim()`  to remove whitespace\n    from\
    \ the beginning and end, and it assigns the results to simple\n    variables.\
    \ Next it includes the file that will contain the class that\n    checks the password,\
    \ which you’ll define next.\n\n2.  Create a new folder called `Authenticate` in\
    \ the\n    `PhpSolutions`\n    folder. Then create a file called `CheckPassword.php`\n\
    \    inside the new folder. It will contain only PHP script, so strip out any\n\
    \    HTML and add the following code:\n\n```\n    password = $password;\n    $this->minChars\
    \ = $minChars;\n    }\n    public function check() {\n    if (preg_match('/\\\
    s{2,}/', $this->password)) {\n    $this->errors[] = 'Password can contain only\
    \ single spaces.';\n    }\n    if (preg_match('/^\\s+|\\s+$/', $this->password))\
    \ {\n    $this->errors[] = 'Password cannot begin or end with spaces.';\n    }\n\
    \    if (strlen($this->password) minChars) {\n    $this->errors[] = \"Password\
    \ must be at least\n    $this->minChars characters.\";\n    }\n    return $this->errors\
    \ ? false : true;\n    }\n    public function getErrors() {\n    return $this->errors;\n\
    \    }\n    }\n    ```\n\nThis defines the basic `CheckPassword`\n    class ,\
    \ which\n    initially checks only whether the password contains multiple spaces,\n\
    \    begins or ends with a space, and whether it has the required minimum\n  \
    \  number of characters. You’ll add the other features shortly.\n\nThe file begins\
    \ by declaring `PhpSolutions\\Authenticate`\n    as its namespace, and then defines\
    \ the `CheckPassword` class\n    with six protected properties. The first two\
    \ are for the password and\n    minimum number of characters. The `$mixedCase`,\
    \ `$minNums`, and `$minSymbols`\n    properties will be used to add strength to\
    \ the password but are\n    initially set to `false` or 0\\. The `$errors` property\
    \ will\n    be used to store an array of error messages if the password fails\
    \ any of\n    the checks.\n\nThe constructor method takes two arguments, the password\
    \ and the\n    minimum number of characters, and assigns them to the relevant\n\
    \    properties. By default, the minimum number of characters is set to 8,\n \
    \   making this an optional argument."
  trans: "\n```\n    // 使会话 cookie 失效\n    if (isset($_COOKIE[session_name()])) {\n\
    \        setcookie(session_name(), \"\", time()-86400, '/');\n    }\n    ob_end_flush();\n\
    \    ```\n\n3.  保存`session_03.php`并再次测试该序列。这次应该不会出现警告。更重要的是，会话 cookie 不再有效。（更新后的代码位于`session_04.php`中。）\n\
    \n## 使用基于文件的身份验证\n\n正如您刚才所见，会话变量和条件语句的组合让您能够根据是否设置了某个会话变量，向访问者呈现完全不同的页面。您只需要添加一个密码检查系统，就拥有了一个基本的用户身份验证系统。\n\
    \n在深入探讨代码之前，让我们先考虑一下安全密码这个重要问题。\n\n### 使密码安全\n\n密码绝不应存储在可公开访问的位置。换句话说，如果您使用基于文件的身份验证系统，该文件必须位于\
    \ Web 服务器的文档根目录之外。此外，密码不应以纯文本形式保存。为了更高的安全性，建议对密码进行哈希处理。多年来，建议使用`MD5`或`SHA-1`算法将密码哈希为\
    \ 32 位或 40 位的十六进制数字。它们最初的优势之一——速度，却变成了一个主要弱点。自动脚本可以在暴力攻击中每秒处理大量计算，以确定原始值——这与其说是猜测，不如说是尝试每一种可能的组合。\n\
    \n目前的建议是使用两个函数：`password_hash()`和`password_verify()`，它们提供了更强大的密码哈希和验证系统。要哈希一个密码，只需将其传递给`password_hash()`函数，如下所示：\n\
    \n```\n$hashed = password_hash($password, PASSWORD_DEFAULT);\n```\n\n`password_hash()`的第二个参数是一个常量，它将加密方法交给\
    \ PHP 处理，让您能够随时跟上被认为是最安全的加密方法。\n\n> **注意**：`password_hash()`函数为高级用户提供了其他选项。详情请参见[`www.php.net/manual/en/function.password-hash.php`](http://www.php.net/manual/en/function.password-hash.php)。还有一个关于安全密码哈希的常见问题解答页面，位于[`www.php.net/manual/en/faq.passwords.php`](http://www.php.net/manual/en/faq.passwords.php)。\n\
    \n使用`password_hash()`会以一种无法逆转的方式打乱纯文本密码。这意味着即使您的密码文件泄露，也没人能找出密码是什么。这也意味着您无法将密码转换回其原始值。从某方面来说，这并不重要：当用户登录时，`password_verify()`会根据哈希版本检查提交的值。缺点在于，如果用户忘记密码，您无法发送密码提醒；必须创建一个新密码。尽管如此，良好的安全性要求对密码进行哈希处理。\n\
    \n哈希处理无法防范密码最常见的问题：那些容易猜测或使用常见单词的密码。许多注册系统现在通过要求混合使用字母数字字符和符号来强制使用更强的密码。\n\n因此，首要任务是创建一个用户注册表单，用于检查以下内容：\n\
    \n*   密码和用户名包含最少字符数\n*   密码符合最低强度标准，例如包含数字、大写和小写字符以及符号的混合\n*   密码与确认字段中的第二次输入匹配\n\
    *   用户名未被使用\n\n### PHP 解决方案 11-3：创建密码强度检查器\n\n本 PHP 解决方案展示如何创建一个类，用于检查密码是否满足特定要求，例如空格的使用、最少字符数以及不同类型字符的组合。默认情况下，该类仅检查密码是否只包含单个空格、开头或结尾没有空格，以及包含最少字符数。可选方法允许您设置更严格的条件，例如使用大小写字符、数字和非字母数字符号的组合。\n\
    \n本 PHP 解决方案从构建用户注册表单开始，该表单也将在 PHP 解决方案 11-4 中使用。\n\n1.  在`sessions`文件夹中创建一个名为`register.php`的页面，并插入一个包含三个文本输入字段和一个提交按钮的表单。按下图所示布局表单并命名输入元素。如果想节省时间，请使用`ch11`文件夹中的`register_01.php`。\n\
    \n    ![../images/332054_4_En_11_Chapter/332054_4_En_11_Figf_HTML.jpg](img/332054_4_En_11_Figf_HTML.jpg)\n\
    \n2.  一如既往，您希望仅在表单已提交时才运行处理脚本，因此所有内容都需要包含在一个条件语句中，该语句检查提交按钮的`name`属性是否在`$_POST`数组中。然后，您需要检查输入是否满足您的最低要求。在`DOCTYPE`声明上方的\
    \ PHP 代码块中插入以下代码：\n\n    ```\n    if (isset($_POST['register'])) {\n        $username\
    \ = trim($_POST['username']);\n        $password = trim($_POST['pwd']);\n    \
    \    $retyped = trim($_POST['conf_pwd']);\n        require_once '../PhpSolutions/Authenticate/CheckPassword.php';\n\
    \    }\n    ```\n\n    条件语句内部的代码将三个文本字段的输入传递给`trim()`以去除开头和结尾的空白，并将结果赋值给简单变量。接下来，它包含将包含密码检查类的文件，您将在下一步中定义该类。\n\
    \n3.  在`PhpSolutions`文件夹中创建一个名为`Authenticate`的新文件夹。然后在新文件夹中创建一个名为`CheckPassword.php`的文件。该文件将只包含\
    \ PHP 脚本，因此请删除所有 HTML 并添加以下代码：\n\n    ```\n    <?php\n    namespace PhpSolutions\\\
    Authenticate;\n\n    class CheckPassword {\n        protected $password;\n   \
    \     protected $minChars;\n        protected $mixedCase = false;\n        protected\
    \ $minNums = 0;\n        protected $minSymbols = 0;\n        protected $errors\
    \ = [];\n\n        public function __construct($password, $minChars = 8) {\n \
    \           $this->password = $password;\n            $this->minChars = $minChars;\n\
    \        }\n\n        public function check() {\n            if (preg_match('/\\\
    s{2,}/', $this->password)) {\n                $this->errors[] = '密码只能包含单个空格。';\n\
    \            }\n            if (preg_match('/^\\s+|\\s+$/', $this->password))\
    \ {\n                $this->errors[] = '密码不能以空格开头或结尾。';\n            }\n     \
    \       if (strlen($this->password) < $this->minChars) {\n                $this->errors[]\
    \ = \"密码长度至少需要 $this->minChars 个字符。\";\n            }\n            return $this->errors\
    \ ? false : true;\n        }\n\n        public function getErrors() {\n      \
    \      return $this->errors;\n        }\n    }\n    ```\n\n    这定义了基本的`CheckPassword`类，该类最初仅检查密码是否包含多个空格、是否以空格开头或结尾，以及是否满足所需的最少字符数。您稍后将添加其他特性。\n\
    \n    文件首先声明`PhpSolutions\\Authenticate`作为其命名空间，然后定义具有六个受保护属性的`CheckPassword`类。前两个用于密码和最少字符数。`$mixedCase`、`$minNums`和`$minSymbols`属性将用于增加密码强度，但初始设置为`false`或\
    \ 0。`$errors`属性将用于在密码未通过任何检查时存储错误消息数组。\n\n    构造函数方法接受两个参数：密码和最少字符数，并将它们分配给相关属性。默认情况下，最少字符数设置为\
    \ 8，使其成为可选参数。\n"
- fmt: "`check()`方法包含三个条件语句。第一个使用`preg_match()`和正则表达式，搜索密码中两个或更多连续空白字符。第二个条件语句使用另一个正则表达式检查密码开头或结尾的空格，而第三个条件语句使用`strlen()`，该函数返回字符串长度，并将结果与`$minChars`进行比较。\n\
    \n如果密码未通过任何这些测试，`$errors`属性至少包含一个元素，PHP将其视为`true`。`check()`方法中的最后一行使用`$errors`属性作为三元运算符的条件。如果发现任何错误，`check()`方法返回`false`，表示密码验证失败。否则返回`true`。（如果需要复习三元运算符的工作原理，请参阅第[4](#332054_4_En_4_Chapter.xhtml)章的“使用三元运算符”部分。）\n\
    \n`getErrors()`公有方法只是返回错误消息的数组。\n\n3. 保存`CheckPassword.php`并切换到`register.php`。\n\
    4. 在`register.php`中，在PHP开始标签之后立即添加以下行以导入`CheckPassword`类：\n\n```\nuse PhpSolutions\\\
    Authenticate\\CheckPassword;\n```\n\n**注意**：你必须在脚本的顶层导入带命名空间的类。尝试在条件语句中导入该类会产生解析错误。\n\
    \n1. 在表单提交后执行代码的条件语句内部，创建一个`CheckPassword`对象，将`$password`作为参数传递。然后调用`check()`方法并按如下方式处理结果：\n\
    \n```\nrequire_once '../PhpSolutions/Authenticate/CheckPassword.php';\n$checkPwd\
    \ = new CheckPassword($password);\nif ($checkPwd->check()) {\n    $result = ['Password\
    \ OK'];\n} else {\n    $result = $checkPwd->getErrors();\n}\n```\n\n`CheckPassword`构造函数的第二个参数是可选的，因此省略它会将最小字符数设置为默认值8。`check()`方法的结果被用作条件语句的条件。如果返回`true`，则将报告密码正确的单元素数组赋值给`$result`。否则，使用`getErrors()`方法从`$checkPwd`对象检索错误数组。\n\
    \n**注意**：测试完成后，单元素数组将被注册用户的脚本替换。你需要使用数组，因为下一步使用`foreach`循环来显示结果。\n\n1. 在页面正文中表单正上方添加以下PHP代码块：\n\
    \n```\n<?php if (isset($result)) { ?>\n    <ul>\n    <?php foreach ($result as\
    \ $item) { ?>\n        <li><?= $item ?></li>\n    <?php } ?>\n    </ul>\n<?php\
    \ } ?>\n```\n\n这会在表单提交后以无序列表的形式显示密码测试结果。\n\n2. 保存`register.php`并在浏览器中加载它。单击“注册”按钮而不填写任何字段来测试`CheckPassword`类。你应该会看到一条消息，告知密码至少需要8个字符。\n\
    \n3. 尝试使用包含8个字符的密码。你应该会看到`Password OK`。\n\n4. 尝试使用至少8个字符但中间插入空格的密码。你应该会看到`Password\
    \ OK`。\n\n5. 在中间放入两个连续的空格。你会被警告只允许单个空格。\n\n6. 尝试少于8个字符且中间有多个连续空格的密码。你会看到以下警告：\n\
    \n![../images/332054_4_En_11_Chapter/332054_4_En_11_Figg_HTML.jpg](images/332054_4_En_11_Chapter/332054_4_En_11_Figg_HTML.jpg)\n\
    \n1. 更改`register.php`中的代码，将可选的第二个参数传递给`CheckPassword`构造函数，将最小字符数设置为10："
  raw: "The `check()`\n    method contains three conditional statements. The first\
    \ uses `preg_match()` with a\n    regular expression that searches for two or\
    \ more consecutive whitespace\n    characters inside the password. The second\
    \ conditional statement uses\n    another regular expression to check for spaces\
    \ at the beginning or end\n    of the password, while the third conditional statement\
    \ uses `strlen()`, which\n    returns the length of a string and compares the\
    \ result with `$minChars`.\n\nIf the password fails any of these tests, the `$errors`\
    \ property\n    contains at least one element, which PHP treats as intrinsically\
    \ `true`. The final line\n    in the `check()`\n    method  uses the\n    `$errors`\n\
    \    property as the condition with the ternary operator. If any errors are\n\
    \    found, the `check()` method\n    returns `false`,\n    indicating that the\
    \ password has failed validation. Otherwise, it\n    returns `true`\n    (see\
    \ “Using the ternary operator” in Chapter [4](#332054_4_En_4_Chapter.xhtml) if\
    \ you need a reminder of how this\n    structure works).\n\nThe `getErrors()`\
    \ public\n    method simply\n    returns the array of error messages.\n\n3.  Save\
    \ `CheckPassword.php` and\n    switch to `register.php`.\n\n4.  In `register.php`,\
    \ add the\n    following line immediately after the opening PHP tag to import\
    \ the\n    CheckPassword class:\n\n```\n    use PhpSolutions\\Authenticate\\CheckPassword;\n\
    \    ```\n\nCaution\nYou must always import namespaced classes at the top level\
    \ of a\nscript. Attempting to import the class in a conditional statement\ngenerates\
    \ a parse error.\n\n1.  Inside the conditional statement that executes the code\
    \ after the form\n    has been submitted, create a `CheckPassword` object,\n \
    \   passing `$password` as the\n    argument. Then call the `check()` method and\n\
    \    handle the result like this:\n\n```\n    require_once '../PhpSolutions/Authenticate/CheckPassword.php';\n\
    \    $checkPwd = new CheckPassword($password);\n    if ($checkPwd->check()) {\n\
