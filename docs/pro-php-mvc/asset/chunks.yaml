    \ `Imagine` 类（如官方文档所示）。由于我们已经有一个 `Files` 控制器，我们将为其添加一个新的 `thumbnails()` 动作，并通过添加清单\
    \ 19-10 所示的自定义路由使其可访问。\n\n**清单 19-10.** 自定义缩略图路由\n\n```php\narray(\n    \"pattern\"\
