  \ 64 位 PC，则需要 64 位安装程序。如果不确定，请坚持使用 32 位安装程序，它应该能在 64 位和 32 位 PC 上运行。下载安装程序后，启动它并开始完成步骤，如图\
  \ A-1 所示。\n\n![Image 3](img/index-436_1.png)\n![Image 4](img/index-436_2.png)\n\n\
  **图 A-1.** 使用 WAMP 安装程序进行设置\n\n你可以将 WAMP 安装到其推荐的默认`c:\\wamp`目录。你也可以使用其推荐的默认 SMTP\
  \ 和电子邮件设置，如果以后需要，可以更改。在某个时刻，它会要求你选择默认浏览器。由于我安装了 Google Chrome，我希望将其设为默认浏览器。找到该可执行文件的最快方法是右键单击\
