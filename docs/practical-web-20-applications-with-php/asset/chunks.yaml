- fmt: "# `mkdir -p Templater/plugins`\n\n**Tip:** The `-p` argument to `mkdir` results\
    \ in intermediate directories being created as required. That is, if the `Templater`\
    \ directory doesn’t exist, it will be created before creating the `plugins` directory.\n\
    \nWe can now create the `Templater` class, in which we specify `template_dir`\
    \ and `compile_dir`. Additionally, we must tell `Smarty` to look in the `Templater/plugins/`\
    \ directory for plug-ins (in addition to Smarty’s own plugins directory).\n\n\
    To implement this class, we must implement several key methods so that `ViewRenderer`\
    \ can interact with `Smarty`. The most important of these methods are as follows:\n\
    \n- `getEngine()`: This must return an instance of `Smarty`. Since this may be\
    \ called multiple times, we should cache the `Smarty` instance so it is only created\
    \ once. We do this by creating the `Smarty` object in the constructor.\n- `__set()`:\
    \ This assigns a variable to the template. Essentially this means we can replace\
    \ `$smarty->assign('foo', 'bar')` with `$this->view->foo = 'bar'` in any controller\
    \ action.\n- `__get()`: This returns a variable that has previously been assigned\
    \ to a template.\n- `render()`: This method renders a template. This is effectively\
    \ the same as calling `$smarty->display()`, except that this method should return\
    \ the output (not display it directly), so we must use `fetch()` instead of `display()`\
    \ on the `Smarty` object.\n\nListing 2-11 shows the code for `Templater.php`,\
    \ which in keeping with Zend Framework’s class naming structure means we must\
    \ store this class in the `./include` directory.\n\n**Listing 2-11.** *Extending\
    \ Smarty for Use with Our Web Application (`Templater.php`)*\n\n```php\n<?php\n\
    \nclass Templater extends Zend_View_Abstract\n{\n    protected $_path;\n    protected\
    \ $_engine;\n\n    public function __construct()\n    {\n        $config = Zend_Registry::get('config');\n\
    \        require_once('Smarty/Smarty.class.php');\n        $this->_engine = new\
    \ Smarty();\n        $this->_engine->template_dir = $config->paths->templates;\n\
    \        $this->_engine->compile_dir = sprintf('%s/tmp/templates_c', $config->paths->data);\n\
    \        $this->_engine->plugins_dir = array($config->paths->base . '/include/Templater/plugins',\
    \ 'plugins');\n    }\n\n    public function getEngine()\n    {\n        return\
    \ $this->_engine;\n    }\n\n    public function __set($key, $val)\n    {\n   \
    \     $this->_engine->assign($key, $val);\n    }\n\n    public function __get($key)\n\
    \    {\n        return $this->_engine->get_template_vars($key);\n    }\n\n   \
    \ public function __isset($key)\n    {\n        return $this->_engine->get_template_vars($key)\
    \ !== null;\n    }\n\n    public function __unset($key)\n    {\n        $this->_engine->clear_assign($key);\n\
    \    }\n\n    public function assign($spec, $value = null)\n    {\n        if\
    \ (is_array($spec)) {\n            $this->_engine->assign($spec);\n          \
    \  return;\n        }\n        $this->_engine->assign($spec, $value);\n    }\n\
    \n    public function clearVars()\n    {\n        $this->_engine->clear_all_assign();\n\
    \    }\n\n    public function render($name)\n    {\n        return $this->_engine->fetch(strtolower($name));\n\
    \    }\n\n    public function _run()\n    { }\n}\n\n?>\n```\n\n## Integrating\
    \ Smarty with the Web Site Controllers\n\nFinally, we need to make `Zend_Controller`\
    \ use the `Templater` class instead of its default `Zend_View` class. To do this,\
    \ we must use the following code, which we will shortly add to the application\
    \ bootstrap file:\n\n```php\n$vr = new Zend_Controller_Action_Helper_ViewRenderer();\n\
    $vr->setView(new Templater());\n$vr->setViewSuffix('tpl');\nZend_Controller_Action_HelperBroker::addHelper($vr);\n\
    ```\n\nNote that we must call `setViewSuffix()` to indicate that templates finish\
    \ with a file extension of `.tpl`. By default, `Zend_View` will use the extension\
    \ `.phtml`. Listing 2-12 shows how the controller part of `index.php` looks once\
    \ this code has been added.\n\n**Listing 2-12.** *Telling Zend_Controller to Use\
    \ Smarty Instead of its Default View Renderer (`index.php`)*\n\n```php\n<?php\n\
    // ... other code\n\n// handle the user request\n$controller = Zend_Controller_Front::getInstance();\n\
    $controller->setControllerDirectory($config->paths->base . '/include/Controllers');\n\
    \n// setup the view renderer\n$vr = new Zend_Controller_Action_Helper_ViewRenderer();\n\
    $vr->setView(new Templater());\n$vr->setViewSuffix('tpl');\nZend_Controller_Action_HelperBroker::addHelper($vr);\n\
    \n$controller->dispatch();\n?>\n```\n\n**Note:** Viewing the web site now will\
    \ still display the “Web site home” message. However, a Smarty error will occur,\
    \ since we haven’t yet created the corresponding template file for the index action\
    \ of the index controller.\n\nNow, whenever a controller action is executed, `Zend_Controller`\
    \ will automatically look for a template based on the controller and action name.\
    \ Let’s use the index action of the index controller as an example, as shown in\
    \ Listing 2-13.\n\n**Listing 2-13.** *Our New Index Controller, Now Outputting\
    \ the `index.tpl` File (`IndexController.php`)*\n\n```php\n<?php\n\nclass IndexController\
    \ extends CustomControllerAction\n{\n    public function indexAction()\n    {\n\
    \    }\n}\n\n?>\n```\n\nWhen you open `http://phpweb20` in your browser, the action\
    \ in Listing 2-13 will now be executed, and the `Templater` class we just created\
    \ will automatically render the template in `./templates/index/index.tpl`.\n\n\
    Since the `index.tpl` template doesn’t yet exist, however, we must now create\
    \ it. Again, we will simply output the “Web site home” message, but we will also\
    \ create header (`header.tpl`) and footer (`footer.tpl`) templates that will be\
    \ included in all web site templates. This allows us to make modifications to\
    \ the web site in one place and have them carry over to all pages in the site.\n\
    \nTo include the `header.tpl` and `footer.tpl` templates in `index.tpl`, we use\
    \ Smarty’s `{include}` tag. Listing 2-14 shows the contents of `index.tpl`, which\
    \ can be found in `./templates/index/index.tpl`.\n\n**Listing 2-14.** *The Template\
    \ for the Index Action of the Index Controller (`index.tpl`)*\n\n```smarty\n{include\
    \ file='header.tpl'}\nWeb site home\n{include file='footer.tpl'}\n```\n\nIf you\
    \ try to view this page in your browser without creating the `header.tpl` and\
    \ `footer.tpl` files, an error will occur, so let’s now create these templates.\
    \ Listing 2-15 shows the contents of `header.tpl`, while Listing 2-16 shows `footer.tpl`.\
    \ These files are both stored in the `./templates` directory (not within a subdirectory,\
    \ as they don’t belong to a specific controller).\n\n**Listing 2-15.** *The HTML\
    \ Header File, Which Indicates a Document Type of XHTML 1.0 Strict (`header.tpl`)*\n\
    \n```html\n<!DOCTYPE html\nPUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\"\n\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
    >\n<html lang=\"en\" xml:lang=\"en\" xmlns=\"http://www.w3.org/1999/xhtml\">\n\
    <head>\n<title>Title</title>\n<meta http-equiv=\"Content-Type\" content=\"text/html;\
    \ charset=iso-8859-1\" />\n</head>\n<body>\n<div>\n```\n\n**Listing 2-16.** *The\
    \ HTML Footer File, Which Simply Closes Off Tags Opened in the Header (`footer.tpl`)*\n\
    \n```html\n</div>\n</body>\n</html>\n```\n\nAs you can see, the header and footer\
    \ are straightforward at this stage. We will develop them further as we move along,\
    \ such as by adding style sheets, JavaScript code, and relevant page titles. The\
    \ `Content-Type` `<meta>` tag was included here because the document will not\
    \ validate correctly without it (using the W3C validator at `http://validator.w3.org`).\
    \ You may need to specify a different character set than `iso-8859-1`, depending\
    \ on your locale.\n\nNote that I have specified a document type of XHTML 1.0 Strict.\
    \ All HTML developed in this book will conform to that standard. We can achieve\
    \ this by correct use of cascading style sheets, inclusion of JavaScript, and\
    \ correctly escaping user-submitted data in the HTML (an example of this is the\
    \ Smarty escape modifier we looked at earlier in this chapter).\n\nIf you now\
    \ load the `http://phpweb20` address in your web browser, you will see the simple\
    \ “Web site home” message. If you view the source of this document, you will see\
    \ that message nested between the `<div>` open tag from `header.tpl`, and the\
    \ `</div>` close tag from `footer.tpl`. Note that the `<div>` is included as it\
    \ violates the standard to have text directly inside the `<body>` tag.\n\n## Adding\
    \ Logging Capabilities\n\nThe final thing we will look at in this chapter is adding\
    \ logging capabilities to our application. To do this, we will use the `Zend_Log`\
    \ component of the Zend Framework, which we will use in various places in our\
    \ application. For example, we will record an entry in the log every time a failed\
    \ login occurs in the members section.\n\nAlthough it is possible to do some pretty\
    \ fancy things with logging (such as writing entries to a database, or sending\
    \ e-mails to a site administrator), all we will do now is create a single log\
    \ file to hold log entries. This file can then be used to debug any possible problems\
    \ that arise not only during development of the web application, but also in its\
    \ day-to-day operation. We will store the log file in the `/var/www/phpweb20/data/logs`\
    \ directory that we created earlier. This directory must be writable by the web\
    \ server."
