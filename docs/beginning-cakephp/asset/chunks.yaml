    \ is not there by default. You can extend this array to include new tags that\
    \ aren’t already specified or to produce custom elements. In your `$blog->comments()`\
    \ function, you do use some tags to produce the voting links, namely, `<li>` tags.\
    \ In the custom `tags.php` file, you can insert a tag called `vote` with all the\
    \ necessary markup to create a default tag for the helper to use without writing\
    \ the markup in the helper file itself. Rewrite the `$tags` array in the `app/config/tags.php`\
    \ file to include the contents of Listing 9-10.\n\n**Listing 9-10.** *The* `$tags`\
    \ *Array with the Vote Tag*\n\n```php\n<?\n$tags = array(\n    'vote' => '<li>%s</li>'\n\
    );\n?>\n```\n\nTo use this tag in the Blog helper, go to the `$blog->voteUpLink()`\
    \ function. On the last line of the function where the output is returned, replace\
    \ the `$text` variable with the `$tags['vote']` value. In keeping with how the\
    \ `$tags` array is organized, you’ll need to use PHP’s `sprintf()` function to\
    \ replace the `%s` character with the contents of `$text` (see Listing 9-11).\n\
    \n**Listing 9-11.** *Replacing the* `$text` *Parameter with the Vote Tag*\n\n\
    ```php\nreturn $this->output($this->Ajax->link(sprintf($this->tags['vote'],$text)\
    \ … );\n```\n\nAgain, nothing should change in terms of the final output when\
    \ you refresh the Posts view. But by building these options and variables into\
    \ your Blog helper, you allow for more customization down the road. Now, instead\
    \ of having to get into the code of the helper itself, you can edit a configuration\
    \ file (`tags.php`) to adjust the displays. Keep this in mind when building customized\
    \ helpers. You never know where these functions will end up, especially when you\
    \ distribute them through the Internet or pull them into other Cake applications."
