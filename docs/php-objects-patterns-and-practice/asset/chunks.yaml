    ### 测试失败


    到目前为止，一切似乎进展顺利，即使`userthing`短期内不会赢得任何代码合规徽章。但测试在失败时才算成功，所以我最好破坏一些东西，以确保 Jenkins
    报告它。


    下面是命名空间`userthing\util`中名为`Validate`的类的一部分：


    ```

    public function validateUser(string $mail, string $pass): boolean

    {

    // make it always fail

    return false;

    $user = $this->store->getUser($mail);

    if (is_null($user)) {

    return null;

    }

    if ($user->getPass() == $pass) {

    return true;

    }

    $this->store->notifyPasswordFailure($mail);

    return false;

    }

    ```


