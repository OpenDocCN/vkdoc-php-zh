  trans: '

    # 封装


    封装简单来说就是向客户端隐藏数据和功能。同样，这也是一个关键的面向对象概念。


    在最简单的层面上，通过将属性声明为 `private` 或 `protected`，你就实现了数据的封装。通过向客户端代码隐藏属性，你强制定义了一个接口，并防止对象数据被意外破坏。


    多态性则体现了另一种封装。通过将不同的实现置于一个公共接口之后，你向客户端隐藏了这些底层策略。这意味着，在此接口背后所做的任何更改，对整个系统来说都是透明的。你可以添加新类或修改类中的代码而不会引发错误。重要的是接口，而不是其底层的运行机制。这些机制保持得越独立，修改或修复在项目中产生连锁反应的几率就越小。


    从某种意义上说，封装是面向对象编程的关键。你的目标应该是让每个部分都尽可能独立于同级部分。类和方法应接收执行其指定任务所必需的信息量，这些任务的范围应有限且清晰界定。


    `private`、`protected` 和 `public` 关键字的使用简化了封装。不过，封装也是一种思维状态。PHP 4 并未提供对隐藏数据的正式支持。私有性必须通过文档和命名约定来表明。例如，下划线是标识私有属性的一种常见方式：


    ```

    var $_touchezpas;

    ```


    当然，代码必须被仔细检查，因为私有性并未被严格执行。但有趣的是，错误却很少发生，因为代码的结构和风格已经清楚地表明了哪些属性希望被“单独留下”。


    同理，即使在 PHP 5 问世之后，我们也可以打破规则，通过使用 `instanceof` 运算符来发现我们在类切换上下文中使用的对象的确切子类型：


    ```

    function workWithProducts(ShopProduct $prod)

    {

    if ($prod instanceof CdProduct) {

    // 执行 CD 相关操作

    } else if ($prod instanceof BookProduct) {

    // 执行图书相关操作

    }

    }

    ```


    你可能有充分的理由这样做，但总体来说，这带有一种略显不确定的味道。通过查询示例中的特定子类型，我正在建立一个依赖关系。尽管子类型的细节被多态性所隐藏，但本来完全有可能改变
    `ShopProduct` 的继承层次结构而不会产生不良影响。然而这段代码终结了这种可能性。现在，如果我需要合理化 `CdProduct` 和 `BookProduct`
    类，我可能会在 `workWithProducts()` 方法中产生意想不到的副作用。


    从这个例子中可以得出两个教训。首先，封装有助于你创建正交的代码。其次，封装的可执行程度并非关键。封装是一种类及其客户端都应遵守的技术。


    ## 忘记如何实现


    如果你和我一样，一提到问题就会让思维飞速运转，寻找可能提供解决方案的机制。你可能会挑选能解决问题的函数，重新审视巧妙的**正则表达式**，追踪 Composer
    包。你可能在某个旧项目中有一段可复用的代码，做了些类似的事情。在设计阶段，暂时将所有这些抛诸脑后，你将会受益匪浅。清空你的头脑，不要去想过程和机制。


    只思考你系统中的关键参与者：它所需要的**类型**以及它们的**接口**。当然，你对过程的了解会为你的思考提供信息。一个打开文件的类需要一个路径，数据库代码需要管理表名和密码，等等。但请让你的代码中的结构和关系来引导你。你会发现，实现会很容易地落在一个定义良好的接口之后。这样，你就拥有了灵活性，可以在需要时切换、改进或扩展一个实现，而不会影响整个系统。


    为了强调接口，要**从抽象基类**而非具体子类的角度思考。例如，在我的参数获取代码中，接口是设计中最重要的方面。我需要一个能读写**名称/值对**的类型。这个类型的核心在于它的职责，而不是实际的持久化介质或存储和检索数据的方式。我围绕抽象的
    `ParamHandler` 类来设计系统，只在后期才添加用于实际读写参数的具体策略。通过这种方式，我从一开始就在我的系统中构建了多态性和封装性。这种结构天生适合类切换。


    话虽如此，我当然从一开始就知道会有 `ParamHandler` 的文本和 XML 实现，这无疑影响了我的接口。在设计接口时，总是需要进行一定量的脑力权衡。


    在 **《设计模式：可复用面向对象软件的基础》** (Addison-Wesley Professional, 1995) 中，四人组用一句话总结了这个原则：“针对接口编程，而非针对实现编程。”
    这是一条值得加入你程序员手册的好原则。


    ## 四个路标


    很少有人能在设计阶段就做到绝对正确。我们大多数人都会随着需求的变化或对问题本质理解的加深而修改代码。


    在修改代码时，它很容易失控。这里添加一个方法，那里添加一个新类，你的系统会逐渐开始退化。你已经看到，你的代码可以指明自我改进的方向。代码中的这些指向性特征有时被称为**代码坏味**——即代码中的一些特征，它们可能暗示特定的修复方法，或者至少提醒你重新审视你的设计。在本节中，我将把已经提出的一些观点提炼为你在编码时应留意的四个信号。


    ### 代码重复


    重复是代码中的大敌之一。如果你在写一个例程时有一种奇怪的似曾相识感，那么很可能你遇到了问题。


    检查一下你系统中重复的实例。也许它们本应归在一起。重复通常意味着紧耦合。如果你更改了一个例程中某些基础性的东西，那么类似的例程是否需要修改？如果是这样，它们很可能属于同一个类。


    ### 知道太多的类


    在方法之间传递参数可能会很麻烦。为什么不直接用全局变量来减轻这种痛苦呢？使用全局变量，每个人都能访问数据。


    全局变量有它们的位置，但确实需要对其保持一定的怀疑态度。顺便说一句，这种怀疑程度是相当高的。通过使用全局变量，或者让一个类对其更广泛的领域拥有任何了解，你就把它锚定在了其上下文中，从而降低了它的可复用性，并使其依赖于自身无法控制的代码。请记住，你希望解耦你的类和例程，而不是创建相互依赖。尽量限制一个类对其上下文的了解。我将在本书后面探讨一些实现此目的的策略。


    ### 万事通


    你的类是否试图同时做太多事情？如果是这样，看看你是否能列出这个类的职责。你可能会发现其中一项职责本身就可以构成一个好类的基础。


    如果你创建子类，不改变一个过度热心的类可能会导致特定的问题。你通过子类扩展的是哪个职责？如果你需要为一个以上的职责创建子类，你会怎么做？你很可能会最终得到太多的子类，或者过度依赖条件代码。

    '
- fmt: '# Conditional Statements


    You will use `if` and `switch` statements with perfectly good reason throughout
    your projects. Sometimes, though, such structures can be a cry for polymorphism.


    If you find that you are testing for certain conditions frequently within a class,
    especially if you find these tests mirrored across more than one method, this
    could be a sign that your one class should be two or more. See whether the structure
    of the conditional code suggests responsibilities that could be expressed in classes.
    The new classes should implement a shared abstract base class. Chances are that
    you will then have to work out how to pass the right class to client code. I will
    cover some patterns for creating objects in Chapter [9](#A314621_5_En_9_Chapter.html).


    # The UML


    So far in this book, I have let the code speak for itself, and I have used short
    examples to illustrate concepts such as inheritance and polymorphism.


    This is useful because PHP is a common currency here: it’s a language we have
    in common, if you have read this far. As our examples grow in size and complexity,
    though, using code alone to illustrate the broad sweep of design becomes somewhat
    absurd. It is hard to see an overview in a few lines of code.


    UML stands for Unified Modeling Language. The initials are correctly used with
    the definite article. This isn’t just a unified modeling language, it is the Unified
    Modeling Language.


    Perhaps this magisterial tone derives from the circumstances of the language’s
    forging. According to Martin Fowler (UML Distilled, Addison-Wesley Professional,
    1999), the UML emerged as a standard only after long years of intellectual and
    bureaucratic sparring among the great and good of the object-oriented design community.


    The result of this struggle is a powerful graphical syntax for describing object-oriented
    systems. We will only scratch the surface in this section, but you will soon find
    that a little UML (sorry, a little of the UML) goes a long way.


    Class diagrams in particular can describe structures and patterns so that their
    meaning shines through. This luminous clarity is often harder to find in code
    fragments and bullet points.


    ## Class Diagrams


    Although class diagrams are only one aspect of the UML, they are perhaps the most
    ubiquitous. Because they are particularly useful for describing object-oriented
    relationships, I will primarily use these in this book.


    ### Representing Classes


    As you might expect, classes are the main constituents of class diagrams. A class
    is represented by a named box (see Figure [6-1](#A314621_5_En_6_Chapter.html#Fig1)).


    ![A314621_5_En_6_Fig1_HTML.gif](A314621_5_En_6_Fig1_HTML.gif)


    Figure 6-1. A class


    The class is divided into three sections, with the name displayed in the first.
    These dividing lines are optional when we present no more information than the
    class name. In designing a class diagram, we may find that the level of detail
    in Figure [6-1](#A314621_5_En_6_Chapter.html#Fig1) is enough for some classes.
    We are not obligated to represent every field and method, or even every class
    in a class diagram.


    Abstract classes are represented either by italicizing the class name (see Figure
    [6-2](#A314621_5_En_6_Chapter.html#Fig2)) or by adding `{abstract}` to the class
    name (see Figure [6-3](#A314621_5_En_6_Chapter.html#Fig3)). The first method is
    the more common of the two, but the second is more useful when you are making
    notes.


    ![A314621_5_En_6_Fig3_HTML.gif](A314621_5_En_6_Fig3_HTML.gif)


    Figure 6-3. An abstract class defined using a constraint


    ![A314621_5_En_6_Fig2_HTML.gif](A314621_5_En_6_Fig2_HTML.gif)


    Figure 6-2. An abstract class


    Note: The `{abstract}` syntax is an example of a constraint. Constraints are used
    in class diagrams to describe the way in which specific elements should be used.
    There is no special structure for the text between the braces; it should simply
    provide a short clarification of any conditions that may apply to the element.


    Interfaces are defined in the same way as classes, except that they must include
    a stereotype (that is, an extension to the UML), as shown in Figure [6-4](#A314621_5_En_6_Chapter.html#Fig4).


    ![A314621_5_En_6_Fig4_HTML.gif](A314621_5_En_6_Fig4_HTML.gif)


    Figure 6-4. An interface


    ### Attributes


    Broadly speaking, attributes describe a class’s properties. Attributes are listed
    in the section directly beneath the class name (see Figure [6-5](#A314621_5_En_6_Chapter.html#Fig5)).


    ![A314621_5_En_6_Fig5_HTML.gif](A314621_5_En_6_Fig5_HTML.gif)


    Figure 6-5. An attribute


    Let’s take a close look at the attribute in the example. The initial symbol represents
    the level of visibility, or access control, for the attribute. Table [6-1](#A314621_5_En_6_Chapter.html#Tab1)
    shows the three symbols available.


    Table 6-1. Visibility Symbols


    | Symbol | Visibility | Explanation |

    | --- | --- | --- |

    | + | Public | Available to all code |

    | - | Private | Available to the current class only |

    | # | Protected | Available to the current class and its subclasses only |


    The visibility symbol is followed by the name of the attribute. In this case,
    I am describing the `ShopProduct::$price` property. A colon is used to separate
    the attribute name from its type (and optionally, its default value).


    Once again, you need only include as much detail as is necessary for clarity.


    ### Operations


    Operations describe methods; or, more properly, they describe the calls that can
    be made on an instance of a class. Figure [6-6](#A314621_5_En_6_Chapter.html#Fig6)
    shows two operations in the `ShopProduct` class.


    ![A314621_5_En_6_Fig6_HTML.gif](A314621_5_En_6_Fig6_HTML.gif)


    Figure 6-6. Operations


    As you can see, operations use a similar syntax to that used by attributes. The
    visibility symbol precedes the method name. A list of parameters is enclosed in
    parentheses. The method’s return type, if any, is delineated by a colon. Parameters
    are separated by commas and follow the attribute syntax, with the attribute name
    separated from its type by a colon.


    As you might expect, this syntax is relatively flexible. You can omit the visibility
    flag and the return type. Parameters are often represented by their type alone,
    as the argument name is not usually significant.


    ### Describing Inheritance and Implementation


    The UML describes the inheritance relationship as generalization. This relationship
    is signified by a line leading from the subclass to its parent. The line is tipped
    with an empty closed arrow.


    Figure [6-7](#A314621_5_En_6_Chapter.html#Fig7) shows the relationship between
    the `ShopProduct` class and its child classes.


    ![A314621_5_En_6_Fig7_HTML.gif](A314621_5_En_6_Fig7_HTML.gif)


    Figure 6-7. Describing inheritance


    The UML describes the relationship between an interface and the classes that implement
    it as realization. So, if the `ShopProduct` class were to implement the `Chargeable`
    interface, we could add it to our class diagram, as in Figure [6-8](#A314621_5_En_6_Chapter.html#Fig8).


    ![A314621_5_En_6_Fig8_HTML.gif](A314621_5_En_6_Fig8_HTML.gif)


    Figure 6-8. Describing interface implementation'
