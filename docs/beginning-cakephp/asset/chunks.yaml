  trans: '

    # `posts/view.ctp` 文件


    若要将视图中的评论区缩减为一行，可以将其整合到 `$blog->comments()` 函数中。但请注意，Ajax 辅助程序已用于投票链接。为了使该辅助程序的功能在
    Blog 辅助程序中可用，在创建 `$blog->comments()` 函数之前，需要先引入 Ajax 辅助程序。请将以下代码插入 `app/views/helpers/blog.php`
    文件的第 3 行：


    ```

    var $helpers = array(''Ajax'');

    ```


    ## 编写 Comments 函数


    现在 Blog 辅助程序文件已准备就绪，接下来创建 `$blog->comments()` 函数（参见代码清单 9-3）。将 `app/views/posts/view.ctp`
    文件的第 9–23 行（评论区循环）复制并粘贴到此函数中，并对其进行少量处理作为起点；然后，为此函数添加一些参数和功能，使其在需要时可移植到网站的其他区域。


    **代码清单 9-3.** *Blog 辅助程序中的* `$blog->comments()` *函数*


    ```

    1 function comments($comments=null) {

    2   if (!empty($comments)) {

    3     $out = null;

    4     foreach($comments as $comment) {

    5       $out .= ''<div class="comment">

    6         <div id="vote_''.$comment[''Comment''][''id''].''">

    7           <div class="cast_vote">

    8             <ul>'';

    9       $out .= $this->Ajax->link(''<li>up</li>'',''/comments/vote/up/''.➥

    $comment[''Comment''][''id''],array(''update''=>''vote_''.$comment[''Comment''][''id'']),➥

    null,false);

    10      $out .= $this->Ajax->link(''<li>down</li>'',''/comments/vote/➥

    down/''.$comment[''Comment''][''id''],array(''update''=>''vote_''.$comment➥

    [''Comment''][''id'']),null,false);

    11      $out .= ''</ul>

    12        </div>

    13        <div class="vote">''.$comment[''Comment''][''votes''].''</div>

    14      </div>

    15      <p><b>''.$comment[''Comment''][''name''].''</b></p>

    16      <p>''.$comment[''Comment''][''content''].''</p>

    17    </div>'';

    18    }

    19    return $this->output($out);

    20  } else {

    21    trigger_error(sprintf(''No comments found'', get_class($this)),➥

    E_USER_NOTICE);

    22  }

    23 }

    ```


    在代码清单 9-3 中，我基本上将 Posts 视图中的循环转换为由辅助程序函数返回的内容。通过使用 `$out` 变量，我可以遍历 `$comments`
    变量，并将所有迭代结果捕获到此数组中。然后在第 19 行，`$out` 的最终输出会返回给视图。请注意，在第 19 行中我使用了 `output()` 函数。这是一个用于处理最终输出的基本返回函数；可以在其他子类中重写，以进行后处理。如果未经后处理方法影响，它将按原样返回传递的变量。


    第 21 行使用 `trigger_error()` 函数，如果未向辅助程序函数传递任何评论，则会传递一个错误。此行将类本身（作为 `$this`）传递，用于调试消息。


    现在您已经创建了 `$blog->comments()` 函数，让我们在视图中使用它。在 App 控制器中，将 Blog 辅助程序加载到 `$helpers`
    数组中：


    ```

    var $helpers = array(''Html'',''Form'',''Ajax'',''Javascript'',''Blog'');

    ```


    接下来，在 `app/views/posts/view.ctp` 文件中，将第 9–23 行的评论循环替换为一行：


    ```

    <?=$blog->comments($comments);?>

    ```


    刷新 Posts 视图，应该不会看到任何变化；这很好，说明辅助程序工作正常。


    ## 比较辅助程序与元素


    当前的 `$blog->comments()` 函数与元素并无太大区别；它本质上是接收一个变量并围绕它创建一些视图标记，必要时可在多个视图中使用。不过，应该注意辅助程序与元素之间的一个根本区别。就目前而言，`$blog->comments()`
    函数实际上应该放在一个元素中，而不是辅助程序中，原因如下：


    - 元素提供无需太多逻辑即可在多个视图中使用的显示标记；辅助程序通常包含更多的逻辑测试和方法。

    - 辅助程序通常适用于任何类型的应用程序，而元素则更特定于其所属的应用程序。

    '
- fmt: '• Elements should not include several options to manipulate the displays;
    this is more a function of helpers.


    Despite these suggestions, it may be more effective to group a series of view
    functions together in one helper file than to split them apart into elements.
    Taking the current `$blog->comments()` function from an element to a helper would
    require expanding the function to take on more dynamic methods. Right now, `$blog->comments()`
    is rather static, so the next step is to expand it to include more logic and options.
    By so doing, you make the function accessible in more scenarios than one, which
    is probably the best reason for writing a helper function.


    ## Extending the Comments Function


    The aspect of passing options to a helper function allows you to extend the function
    to include more customized possibilities. With the `$blog->comments()` function
    in particular, there are a couple of features that could be made custom for use
    across the application. First, the voting link might need to change depending
    on how you may want to use the function. Second, the voting link itself may need
    to change with different content from one area to the next. Third, the update
    element may also need to be adjusted for different areas in the site. A look into
    the built-in helper functions reveals that parameters are often used to allow
    for these customizations. Let’s then extend the `$blog->comments()` function to
    include more parameters. In a way, this is the work of building customized helpers—to
    allow for specific operations to be used across the application for various uses.


    In the `$blog->comments()` function, you’ll allow for an options array that will
    contain the following parameters:


    - `link`: The voting link to be used for both up and down votes; optional override
    for `upLink` and `downLink` parameters

    - `upLink`: The voting link for up votes only

    - `downLink`: The voting link for down votes only

    - `text`: The contents of the voting links; optional override for `upText` and
    `downText` parameters

    - `upText = ''up''`: The contents for the up voting links only

    - `downText = ''down''`: The contents of the down voting links only

    - `update = ''vote_''+comment ID`: The ID for the HTML element to receive the
    returned Ajax response


    To build these options into the function, consult Listing 9-4.


    **Listing 9-4.** *The* Options *Array in the* `$blog->comments()` *Function*


    ```

    1 function comments($comments=null,$options=array()) {

    2   if (!empty($comments)) {

    3     $out = null;

    5     if (isset($options[''link''])) {

    6       $up = $down = $options[''link''];

    7     }

    9     if (isset($options[''upLink''])) {

    10      $up = $options[''upLink''];

    11    }

    13    if (isset($options[''downLink''])) {

    14      $down = $options[''downLink''];

    15    }

    17    if (isset($options[''text''])) {

    18      $upText = $downText = $options[''text''];

    19    } else {

    20      $upText = ''up'';

    21      $downText = ''down'';

    22    }

    24    if (isset($options[''upText''])) {

    25      $upText = $options[''upText''];

    26    }

    28    if (isset($options[''downText''])) {

    29      $downText = $options[''downText''];

    30    }

    32    if (isset($options[''update''])) {

    33      $update = $options[''update''];

    34    }

    36    foreach($comments as $comment) {

    37      if (empty($update) || !isset($options[''update''])) {

    38        $update = ''vote_''.$comment[''Comment''][''id''];

    39      }

    40      $out .= ''<div class="comment">

    41        <div id="vote_''.$comment[''Comment''][''id''].''">

    42          <div class="cast_vote">

    43            <ul>'';

    44      $out .= $this->voteUpLink($comment[''Comment''][''id''],array(

    ''upLink'' => $up,''text'' => $upText,''update'' => $update));

    45      $out .= $this->voteDownLink($comment[''Comment''][''id''],array(

    ''downLink'' => $down,''text'' => $downText,''update'' => $update));

    46      $out .= ''</ul>

    47        </div>

    48        <div class="vote">''.$comment[''Comment''][''votes''].''</div>

    49      </div>

    50      <p><b>''.$comment[''Comment''][''name''].''</b></p>

    51      <p>''.$comment[''Comment''][''content''].''</p>

    52    </div>'';

    53    }

    54    return $this->output($out);

    55  } else {

    56    trigger_error(sprintf(''No comments found'', get_class($this)),

    E_USER_NOTICE);

    57  }

    58 }

    ```'
