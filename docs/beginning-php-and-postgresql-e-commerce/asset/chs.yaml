  require_once BUSINESS_DIR . 'error_handler.php';\n\n...\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n`SHORT_PRODUCT_DESCRIPTION_LENGTH`常量指定了在产品列表显示时，产品描述中应出现的字符数量。完整描述会在产品详情页面显示，该页面将在本章末尾实现。\n\
  \n`PRODUCTS_PER_PAGE`指定了任何目录页面中能够显示的最大产品数量。如果访问者的选择包含超过`PRODUCTS_PER_PAGE`个产品，产品列表将被拆分为多个子页面，可通过导航控件访问。\n\
  \n我们还启用了 PHP 会话，这将有助于在翻阅产品页面时提高性能。\n\n> **注意**：会话处理是 PHP 的一项出色功能，它允许你跟踪特定访问者的变量。当访问者浏览目录时，其会话变量由\
  \ Web 服务器持久化，并与唯一的访问者标识符关联（该标识符默认以**cookie**形式存储在访问者的浏览器中）。访问者的会话对象存储了（名称, 值）对，这些数据保存在服务器端，并在整个访问者会话期间可访问。在本章中，我们将利用会话功能来提升性能。在实现分页功能时，在请求产品列表之前，先向数据库查询将要返回的产品总数，以便向访问者显示共有多少页产品可用。该数字将保存在访问者的会话中，这样在访问者浏览产品列表的各页时，数据库就不会被多次查询——后续调用时，该数字将直接从会话中读取（此功能在你稍后将实现的`HowManyPages`方法中实现）。在本章中，你还会使用会话来实现在产品详情页中的“继续购物”按钮。\n\
  \n让我们逐一讲解每个业务层方法。所有这些方法都需要添加到`Catalog`类中，该类位于你在第 3 章开始编写的`business/catalog.php`文件中。\n\
