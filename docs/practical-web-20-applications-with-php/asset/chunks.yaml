    A N D M A N A G E M E N T


    **57**


    ■**Tip** If you try to check the permissions of an undefined resource, an exception
    will be thrown. It is up to you how you want to handle this. For example, you
    may choose to automatically deny the request, or you may choose to automatically
    allow it. Another option could be to fall back to a different resource if the
    given resource is not found; the has() function is used to check the existence
    of a resource. The same principle applies to roles. In our application, a user
    will fall back to guest if their role is not found (this would result from a bogus
    value in the user_type column of the users table).


    Our actual permissions system will be almost identical to this example, in that
    members can access the account resource, while guests cannot, and administrators
    can access all areas.


    ■**Note** The code uses both the term admin and administrator. The user type (that
    is, the role) is called administrator, while the controller (that is, the resource)
    is called admin. In other words, only users of type administrator [will be able
