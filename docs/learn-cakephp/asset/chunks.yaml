  trans: '

    ### CakePHP 模型（Models）


    模型是 MVC 中的 M。作为我们 Web 应用的基础，它们负责数据的存储、访问和操作。CakePHP 的 `Model` 类文件分为 `Table` 和
    `Entity` 对象。`Table` 对象提供对存储在特定数据表中的实体集合的访问。CakePHP 支持 MySQL、SQLite、PostgreSQL、SQLServer
    和 Oracle。


    模型继承自 CakePHP 的 `Model` 类，因此它们开箱即用就具备了许多功能。它们拥有诸如 `Model.beforeFind`、`Model.beforeSave`、`Model.afterSave`
    等事件。它们还继承了如 `find()`、`get()`、`save()` 等方法。


    #### 数据库查询


    最常用的模型方法是 `find()`，它返回一个查询对象。


    ```

    1  $query = $posts

    2      ->find()

    3      ->select([''id'', ''title''])

    4      ->where([''id  100])

    5      ->order([''created'' => ''DESC'']);

    ```


    如你所见，`find()` 可以与其他模型方法（如 `select()`、`where()` 等）链式调用。这是 CakePHP 3 新对象关系映射（ORM）特性的一部分，该特性非常方便且自解释性强。通过这个查询，我们可以选择
    `id` 小于 100 的帖子的 `id` 和 `title`，并且结果集将按 `created` 字段排序。这个查询将生成类似于以下 SQL 语句的内容：


    ```

    SELECT id, title FROM posts WHERE id < 100 ORDER BY created DESC;

    ```


    查询对象可以在之后被修改，因为它们实际上是在我们调用 `execute()`、对查询进行迭代或调用 `all()` 时才执行的。


    #### 模型关联


    在 CakePHP 应用中，数据库表之间的关系由模型关联处理。共有四种关联类型。一对一关系由 `hasOne` 关联处理，一对多关系由 `hasMany`
    处理，多对一关系由 `belongsTo` 处理，多对多关系由 `belongsToMany` 处理。


    ##### HasOne 关联


    在我们的博客数据库中，没有 `hasOne` 关联。我们可以创建一个 profiles 数据表和模型，如果一个用户只有一个个人资料，那么他就与个人资料建立了
    `hasOne` 关联。在这种情况下，个人资料表应该有一个 `user_id` 字段来描述它与用户之间的联系。


    ##### HasMany 关联


    在我们的博客数据库分类中，`hasMany` 帖子意味着一个分类可以拥有多个帖子。


    ##### BelongsTo 关联


    这是 `hasOne` 或 `hasMany` 关联的另一端。因此，在前面的例子中，个人资料 `belongsTo` 一个用户，而帖子 `belongsTo`
    一个分类。


    ##### BelongsToMany 关联


    在我们的博客数据库中，帖子与标签之间存在 `belongsToMany` 关联，这意味着一个帖子可以有多个标签，并且一个标签可以被分配给多个帖子。


    ### CakePHP 控制器（Controllers）


    控制器是 MVC 中的 C。控制器是模型和视图之间的中间件。你的控制器应负责解释请求数据。通常，一个控制器用于管理一个模型的逻辑。


    控制器应继承 Cake 的 `Controller` 类。控制器提供了许多方法，这些方法被称为动作（actions）。默认情况下，控制器中的每个公共方法都是一个动作，并且可以通过
    URL 访问。动作负责解释请求、创建响应并为视图设置变量。


    ### CakePHP 视图（Views）


    视图是 MVC 中的 V。视图用于呈现响应，主要是创建 HTML 文档。布局是视图的主容器。每个控制器动作都应在 `/src/Template/` 文件夹中有其对应的视图文件。


    让我们了解如何自动创建模型、控制器和视图。


    ### 烘焙（Baking）


    在我看来，CakePHP 最好的特性之一就是烘焙，它本身就值得写一本书。


    我在此不深入细节，但 `bake` 是一个用于为你的博客自动生成基本代码的工具。使用 `bake`，你可以自动生成模型、控制器和模板文件，以及许多其他文件，例如
    fixtures、shells 等。


    打开终端，进入你的 `app` 文件夹，然后启动 CakePHP 的 `bake` 脚本。


    ```

    1  $ cd ∼/public_html/cakeBlog/

    2  $ bin/cake bake

    ```


    如果看到关于文件权限的错误信息，请忽略它。因为 Web 服务器通常以与你不同的用户身份运行，所以它具有不同的文件权限。你可以通过手动清空 `app/tmp/cache`
    文件夹的子文件夹或修复其权限来消除这些错误信息。


    你将看到如图 6-5 所示的屏幕。


    ![A337704_2_En_6_Fig5_HTML.jpg](img/A337704_2_En_6_Fig5_HTML.jpg)


    图 6-5.


    `bake` 脚本运行中


    现在让我们一次性生成所有模型的数据表和实体文件、对应的 fixtures 以及测试文件。为此，我们将为 `bake` 使用 `model all` 参数。这将在
    `/src/Model/Entity`、`/src/Model/Table`、`/tests/Fixture` 和 `/tests/TestCase/Model/Table`
    目录下创建文件。`Bake` 将为这些文件夹中的每个数据库表生成一个文件。


    ```

    1  $ bin/cake bake model all

    ```


    我们可以对控制器和视图使用相同的过程。通过以下命令，所有控制器和视图文件将由 `bake` 创建：


    ```

    1  $ bin/cake controller all

    2  $ bin/cake template all

    ```


    如果你收到如 `Error: Cannot generate views for models with no primary key` 这样的错误信息，那是因为会话模型导致的。在这种情况下，请手动烘焙你的标签和用户模板。


    ```

    1  $ bin/cake template tags

    2  $ bin/cake template users

    ```


    ### 清理工作


    一些文件是多余的，应该被删除。`Bake` 会为会话和连接表生成文件。由于我们的博客将非常简单，我们不希望连接表有任何多余的内容，因此我们不需要这些文件。


    - `src/Controller/PostsTagsController.php`

    - `src/Controller/SessionsController.php`

    - `src/Model/Entity/Session.php`

    - `src/Model/Table/SessionsTable.php`

    - `tests/TestCase/Controller/SessionsControllerTest.php`

    - `tests/TestCase/Controller/PostsTagsControllerTest.php`

    - `tests/TestCase/Model/Table/SessionsTableTest.php`

    - `tests/Fixture/SessionsFixture.php`


    你可以在将会话表添加到数据库之前烘焙你的模型。在这种情况下，将不会生成与会话相关的文件，因此你无需删除它们。


    你可以在不使用 `all` 参数的情况下烘焙模型、控制器和视图，然后逐一选择你的对象。你也可以跳过 `join` 模型，这样就不会为 `PostsTags`
    生成任何内容。


    我认为我的方法是这三个选项中速度最快的。


    ### 让我们来试试


    浏览到 `http://localhost/~rrd/cakeBlog/users`。你应该会看到类似于图 6-6 的内容，并且能够添加一个用户。


    ![A337704_2_En_6_Fig6_HTML.jpg](img/A337704_2_En_6_Fig6_HTML.jpg)


    图 6-6.


    烘焙后的用户页面


    你也可以添加、修改和删除分类、标签、帖子以及评论。所有这些代码都是由 `bake` 自动生成的。我们一行代码都还没写呢。很酷吧？


    再次运行 `vendor/bin/phpunit`，检查一切是否顺利。在图 6-7 中，点表示成功的测试；I 表示不完整的测试。


    ![A337704_2_En_6_Fig7_HTML.jpg](img/A337704_2_En_6_Fig7_HTML.jpg)


    图 6-7.


    使用 `bake` 生成代码后的测试结果


    暂时不用担心不完整的测试。所以，`bake` 生成了 43 个测试。其中，18 个是断言，40 个是不完整的测试。


    现在是时候看看这里都是由什么组成的了。让我们从测试数据 fixtures 开始。


    ## 总结


    在本章中，我们更深入地了解了测试。我们安装了所有必要的服务器、PHP 和 Composer，并通过 Composer 和我们的数据库创建了应用骨架。你学会了如何使用
    `bake` 脚本自动生成代码。我们还为博客设置了一种会话处理方法。

    '
- fmt: '# 7. Fixtures


    ![A337704_2_En_7_Figa_HTML.jpg](A337704_2_En_7_Figa_HTML.jpg)


    Felix always felt he was a little bit different


    Most of the time, an application will manipulate data. Users will add new posts
    and comments or edit them, admins will create new tags and categories, etc. Fixtures
    are sample data generated for test cases. Why do we need them? Playing with application
    data is a bad idea. We could accidentally delete or modify data during development.
    We could also break database relations. Not a good idea. Fixtures are another
    layer of isolation. A smaller and cleaner data set helps to make sure our code
    returns expected results and runs fast. Definitely a good idea.


    CakePHP uses the connection named `$test` in your `config/app.php` configuration
    file. CakePHP creates tables for the fixtures, populates the tables with data,
    and (after running test methods) empties the fixture tables and removes fixture
    tables from the test database.


    ## Creating Fixtures


    There are several ways to create fixtures. You should create your fixtures in
    the `/app/Test/Fixture` folder.


    ### On the Fly


    Because we baked our models, we already have fixture files at `/tests/Fixture`,
    such as `UsersFixture.php`. Let’s check what we generated earlier.


    ```

    1   [

    21              ''type'' => ''integer'', ''length'' => 10, ''unsigned'' => true,

    22              ''null'' => false, ''default'' => null, ''comment'' => '''',

    23              ''autoIncrement'' => true, ''precision'' => null

    24              ],

    25          ''username'' => [

