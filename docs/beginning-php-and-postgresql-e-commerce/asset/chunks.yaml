    ## 一个简单示例


    通过仔细分析一个简单的示例，可以更容易理解数据在各层之间如何传递和转换。为了使示例与我们的项目更相关，我们来分析一个在 `HatShop` 中实际会发生的情况。这个场景对于三层应用程序来说是典型的。


    像大多数电子商务网站一样，`HatShop` 将有一个购物车，我们将在本书后面讨论它。目前，只需知道访问者会通过点击 `Add to Cart`（加入购物车）按钮将产品添加到购物车。图
    2-2 显示了点击该按钮时信息如何在应用程序中流动。


    当用户点击某个特定产品的 `Add to Cart` 按钮时（步骤 1），包含该按钮的表示层将请求转发给业务层——“嘿，我想把这个产品加入我的购物车！”（步骤
    2）。业务层接收请求，理解用户想要将特定产品添加到购物车，并通过指示数据层将所选产品加入购物车来更新访问者的购物车（步骤 3）。之所以需要调用数据层，是因为它存储和管理整个网站的数据，包括用户的购物车信息。


    数据层更新数据库（步骤 4），并最终向业务层返回一个成功代码。业务层（步骤 5）处理返回代码以及数据层在更新数据库时可能发生的任何错误，然后将输出返回给表示层。


    ```

    使用浏览器的互联网访客

    1

    7

    互联网

    托管在 Web 服务器上的

    三层 Web 应用程序

    2

    表示层

    6

    3

    业务层

    5

    数据层

    4

    ```


    **图 2-2.** *互联网访客与三层应用程序交互*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00124.png)


    `648XCH02.qxd 11/8/06 9:33 AM Page 18`


