    Validation


    Getting validation right can be a tricky thing, particularly when the aim of MVC
    is to allow for good separation of concerns. Validation is connected to a number
    of unrelated components, mainly data types and views. The basic function of validation
    is to secure user input, but that has to come from somewhere (such as views/form
    data). That data has to relate to predefined data structures (such as database
    table fields), and validation needs to facilitate feedback to the user in such
    a way that they know what was wrong with the data they submitted.


    Because we already have a fairly extensive ORM library, which we have contained
    in our model layer, we will be adding validation logic to the model layer. What
    we want to do is be able to define not only our database fields (at a model level),
    but also the validation through which their data must pass. Consider the example
    model shown in Listing 16-1.


