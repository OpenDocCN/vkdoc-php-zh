    \ would be to move responsibility for iteration into the visitor objects. The\
    \ trouble with this is that you may end up duplicating the traversal code from\
    \ visitor to visitor.\n\nBy default, I prefer to keep traversal internal to the\
    \ visited classes, but externalizing it provides you with one distinct advantage.\
    \ You can vary the way that you work through the visited classes on a visitor-by-visitor\
    \ basis.\n\n## The Command Pattern\n\nIn recent years, I have rarely completed\
    \ a web project without deploying this pattern. Originally conceived in the context\
    \ of graphical user interface design, command objects make for good enterprise\
    \ application design, encouraging a separation between the controller (request\
    \ and dispatch handling) and domain model (application logic) tiers. Put more\
    \ simply, the Command pattern makes for systems that are well organized and easy\
    \ to extend.\n\n### The Problem\n\nAll systems must make decisions about what\
    \ to do in response to a user’s request. In PHP, that decision-making process\
    \ is often handled by a spread of point-of-contact pages. In selecting a page\
    \ (`feedback.php`), the user clearly signals the functionality and interface she\
    \ requires. Increasingly, PHP developers are opting for a single-point-of-contact\
    \ approach (as I will discuss in the next chapter). In either case, however, the\
    \ receiver of a request must delegate to a tier more concerned with application\
    \ logic. This delegation is particularly important in cases where the user can\
    \ make requests to different pages. Without it, duplication inevitably creeps\
    \ into the project.\n\nSo, imagine you have a project with a range of tasks that\
    \ need performing. In particular, the system must allow some users to log in and\
    \ others to submit feedback. You could create `login.php` and `feedback.php` pages\
