    # 操作步骤说明


    我已根据您的要求对文本进行了排版处理。处理过程包括：


    1.  重新划分标题层级，保留合理的`#`、`##`、`###`结构

    2.  优化段落格式，删除多余空行

    3.  保留正文核心内容，不删减有价值信息

    4.  对所有单独出现的变量名、函数名、类名、路径名、命令名及其语句或表达式添加反引号；如果被粗体或斜体包围，已去掉星号再加反引号

    5.  代码块前后加上三个反引号

    6.  未修改语义，确保输出为标准 Markdown 格式


    ---


    ## 排版后的文本


    我们将再次更新 PHP 代码，以提供一个更安全、更稳定的程序。该程序依赖于库文件中变量的存在。`$nav`、`$page` 和 `$info` 均通过不同文件的内容进行填充。但是，如果这些变量不存在该怎么办？


    ```

    title = "Thomas Blom Hansen: Portfolio site";

    $pageData->content = $nav;

    //changes begin here

    $navigationIsClicked = isset($_GET[''page'']);

    if ($navigationIsClicked ) {

    $fileToLoad = $_GET[''page''];

    } else {

    $fileToLoad = "skills";

    }

    include_once "views/$fileToLoad.php";

    $pageData->content .= $info;

    require "templates/newerpage.php";

    echo $page;

    ?>

    ```


    **注意：** `securenavigation.php` 已更新，链接到当前版本的程序。


    你可能认为我们会再次使用 `isset` 来检查变量是否存在；我们确实可以这样做。不过，一个更简单的方法是为 `$nav` 和 `$info` 提供*默认值*。这两个变量都以字符串数据类型创建，并在代码清单
    2-18 中被设置为 `""`，以便为未来的信息提供占位。`$page` 之前已被赋予一个默认值。现在，我们的程序可以处理因损坏或信息缺失而导致这些变量可能缺失的情况。这无疑是一个更稳定的程序。


    ## 验证 HTML


    生成 HTML 页面的过程有些抽象。很容易认为，只要在正确的时间显示了正确的页面视图，一切就完美无缺。如果你看到了正确的行为，就表明你的 PHP 脚本运行完美。但这并不意味着你的
    HTML 是完全有效的。请记住，`echo` 文本字符串中的任何内容都会被 PHP 解释器视为不可执行的字符串。因此，解释器不会检查字符串中任何代码（HTML）的有效性。


    我们如何检查 HTML 内容呢？请记住，动态网页应与静态 HTML 页面一样，符合 Web 标准。


    **注意：** 你可以在浏览器中加载动态页面，并通过浏览器查看生成的 HTML 源代码。看到生成的 HTML 源代码后，你可以全部选中、复制并粘贴到在线 HTML
    验证服务（例如 [`http://validator.w3.org/`](http://validator.w3.org/)）中，以判断代码是否有效。


    ## 使用 CSS 美化网站


    当所有页面视图的 HTML 都验证通过后，我们就可以开始使用 CSS 美化网站了。我们添加 CSS 的方式与通常美化静态 HTML 网站的方式完全相同：创建一个外部样式表，其中包含用于网站视觉设计的样式规则。使用外部样式表可以让我们将
    CSS 附加到网站内的所有页面，从而提供一致的风格和外观。为了做到这一点，我们将在项目文件夹中创建一个名为 `css` 的新文件夹。然后，在 `css` 文件夹中创建一个名为
    `layout.css` 的新文件。


    ```

    nav {

    background-color: #CCCCDE;

    padding-top: 10px;

    }

    nav a{

    display:inline-block;

    text-decoration:none;

    color: #000;

    margin-left: 10px;

    }

    nav a:hover{text-decoration: underline;}

    ```


    ### CSS 回顾


    CSS 中的 `nav` 标签定义了导航区域，与我们页面中由 `<nav>` HTML 标签定义的区域一致。背景色显示为浅灰色。`padding` 设置在导航菜单上方提供了一小部分内边距空间。`"Nav
    a"` 定义了链接本身的外观和感觉。它将显示方式转换为内联块，这为链接创建了块（框），而不是原始的文本链接。文本本身保持不变（`text-decoration:
    none`）。颜色设置为黑色（`#000`）。通过 `margin-left` 设置在每条链接之间提供了空间。


    有关 CSS 的更多信息，请查阅网上的免费教程，例如 [`www.w3schools.com`](http://www.w3schools.com)，或 YouTube
    上的免费视频系列。


    你可以更改或添加任何你喜欢的样式规则。前面的 `css` 只是为了让我们入门。我们将为所有动态 HTML 页面设置样式，所以让我们将此功能构建到页面模板中。我们将为指向外部样式表的
    `<link>` 元素添加一个新的占位符。


    ```

    $pageData->title


    $pageData->css


    $pageData->content


    ";

    ?>

    ```


    新的属性 `css` 被用作引用外部样式表的 `<link>` 元素的占位符。为了使用更新后的页面模板，我们必须更新我们的索引文件，并为新属性声明一个值。


    ```

    title = "Thomas Blom Hansen: Portfolio site";

    $pageData->css = "";

    $pageData->content = $nav;

    $navigationIsClicked = isset($_GET[''page'']);

    if ($navigationIsClicked ) {

    $fileToLoad = $_GET[''page''];

    } else {

    $fileToLoad = "skills";

    }

    include_once "views/$fileToLoad.php";

    $pageData->content .= $info;

    require "templates/pagewithcss.php";

    echo $page;

    ?>

    ```


    **注意：** `cssnavigation.php` 已更新，链接到当前版本的程序。


    ```

    $pageData->css = "";

    ```


    `$pageData` 中的 `css` 变量被设置为一个链接，该链接将附加外部样式表。输出结果如图 2-10 所示。


    该窗口代表了将由连接设置并加入外部模板的层叠样式表信息。


    **练习：** 调整 CSS 文件，创建一个更美观、更令用户满意的导航栏。


    ## 声明 `Page_Data` 类


    有时，使用内联 CSS 来补充外部样式表是非常有用的。我们可以轻松地更新页面模板，为 `<style>` 元素添加一个占位符。


    ```

    $pageData->title


    $pageData->css

    $pageData->embeddedStyle


    $pageData->content


    ";

    ?>

    ```


    我们可以从 `indexwithcss.php` 中声明一个属性值，但让我们换一种方式。问题是，有时你不需要任何嵌入的 `<style>` 元素，有时却需要。


    既然我们的模板有了嵌入式 CSS 的占位符，该属性就必须始终有一个值。我们不想浪费时间为一个多余的 `<style>` 元素声明值，所以让我们想一个更智能的解决方案。让我们迈向面向对象编程的下一步，为页面数据创建一个*自定义类*。我们将在项目文件夹中创建一个名为
    `classes` 的新文件夹。然后，让我们在此文件夹中创建一个名为 `Page_Data.class.php` 的新文件。


    ```

    <?php

    class Page_Data {

    public string $title = "";

    public string $content = "";

    public string $css = "";

    public string $embeddedStyle = "";

    }

    ?>

    ```


    我们将类信息保存在一个以 `class.php` 结尾的文件中。这种文件结尾并没有什么神奇之处。但是，通过在文件结尾中包含类名，可以更明显地表明该文件中包含一个独立的类。还要注意，文件名以大写字母开头。这也是指示它是一个类文件的常见风格。PHP
    并不关心使用什么文件名。然而，采用行业通用的惯例进行标识是一种良好的编程技术。


    类结构使用小写单词 `class` 来定义。类名（`Page_Data`）与包含该类的文件名完全匹配。类名应与文件名匹配。类使用的变量（属性）和方法在大括号之间创建。我们创建了这个类，并为页面模板所需的那些属性预定义了空字符串值。我们使用
    `string` 数据类型声明了每个字符串。这种声明将有助于提高程序的安全性，因为它只允许保存字符串。在后续章节中，我们将通过将访问权限设置为 `private`
    并使用 `get` 和 `set` 方法来更新值，从而增强类的安全性。在我们的程序中使用声明的类，而不是使用 `stdClass`，使我们能够保护我们正在存储的数据。

