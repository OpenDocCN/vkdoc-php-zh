    \ * FROM users WHERE user='\" . $name . \"'\";\n$result = mysql_query($sql);\n\
    ```\n\n当用户提供的数据作为文本输出到网页时，应使用 `htmlspecialchars` 函数。它将禁用任何 HTML 标记，以便用户输入被显示出来，但不会被解析执行。\n\
    \n```\n// 为网页使用进行清理\necho htmlspecialchars($_POST['comment']);\n```\n\n## 提交数组\n\
    \n通过将表单中的变量名后加上数组方括号，可以将表单数据分组为数组。这对于所有表单输入元素都有效，包括 `<input>`、`<select>` 和 `<textarea>`。\n\
    \n```\n<input type=\"text\" name=\"myArr[]\" />\n<input type=\"text\" name=\"\
    myArr[]\" />\n```\n\n元素也可以被分配它们自己的数组键。\n\n```\n<input type=\"text\" name=\"myArr[name]\"\
    \ />\n```\n\n提交后，该数组就可以在脚本中供使用了。\n\n```\n$val1 = $_POST['myArr'][0];\n$val2 =\
    \ $_POST['myArr'][1];\n$name = $_POST['myArr']['name'];\n```\n\n表单 `<select>`\
    \ 元素有一个属性用于允许从列表中选择多个项目。\n\n```\n<select name=\"myArr[]\" size=\"3\" multiple=\"\
    true\">\n  <option value=\"apple\">苹果</option>\n  <option value=\"orange\">橙子</option>\n\
    \  <option value=\"pear\">梨</option>\n</select>\n```\n\n当这个多选元素包含在表单中时，为了在脚本中检索选定的值，数组方括号是必需的。\n\
    \n```\nforeach ($_POST['myArr'] as $item)\n  echo $item . ' '; // 例如 \"apple orange\
    \ pear\"\n```\n\n## 文件上传\n\nHTML 表单提供了一种文件输入类型，允许将文件上传到服务器。要使文件上传正常工作，表单的可选属性\
    \ `enctype` 必须设置为 `\"multipart/form-data\"`，如下例所示。\n\n```\n<form action=\"MyPage.php\"\
    \ method=\"post\"\n      enctype=\"multipart/form-data\">\n  <input name=\"myfile\"\
    \ type=\"file\" />\n  <input type=\"submit\" value=\"上传\" />\n</form>\n```\n\n\
    关于上传文件的信息存储在 `$_FILES` 数组中。这个关联数组的键如下表所示。\n\n| 名称 | 描述 |\n| --- | --- |\n| name\
    \ | 上传文件的原始名称。 |\n| tmp_name | 服务器临时副本的路径。 |\n| type | 文件的 MIME 类型。 |\n| size\
    \ | 文件大小（字节）。 |\n| error | 错误代码。 |\n"
- fmt: "# 文件上传与PHP超全局变量\n\n接收到的文件仅临时存储在服务器上。如果未被脚本保存，它将被删除。以下是保存文件的简单示例。该示例检查错误代码以确保文件成功接收，如果接收成功，则将文件从临时文件夹移出并保存。在实际应用中，您还需要检查文件大小和类型，以确定是否保留该文件。\n\
    \n```\n$dest = 'upload\\\\' . basename($_FILES['myfile']['name']);\n$file = $_FILES['myfile']['tmp_name'];\n\
    $err  = $_FILES['myfile']['error'];\n\nif($err == 0 && move_uploaded_file($file,\
    \ $dest))\n  echo 'File successfully uploaded';\n```\n\n此示例中出现了两个新函数。`move_uploaded_file()`函数检查第一个参数是否包含有效的上传文件，如果是，则将其移动到第二个参数指定的路径，并重命名为指定的文件名。指定的文件夹必须已存在，如果函数成功移动文件，则返回`true`。另一个新函数是`basename()`，它返回路径中的文件名部分，包括文件扩展名。\n\
    \n## 超全局变量\n\n如本章所见，有多个内置关联数组可使外部数据对PHP脚本可用。这些数组被称为超全局变量，因为它们自动在所有作用域中可用。PHP中共有九个超全局变量，下面简要介绍每个变量。\n\
    \n| 名称 | 描述 |\n| --- | --- |\n| `$GLOBALS` | 包含所有全局变量，包括其他超全局变量。 |\n| `$_GET`\
    \ | 包含通过HTTP GET请求发送的变量。 |\n| `$_POST` | 包含通过HTTP POST请求发送的变量。 |\n| `$_FILES`\
    \ | 包含通过HTTP POST文件上传发送的变量。 |\n| `$_COOKIE` | 包含通过HTTP cookie发送的变量。 |\n| `$_SESSION`\
    \ | 包含存储在用户会话中的变量。 |\n| `$_REQUEST` | 包含`$_GET`、`$_POST`以及可能的`$_COOKIE`变量。 |\n\
    | `$_SERVER` | 包含关于Web服务器及其收到的请求的信息。 |\n| `$_ENV` | 包含Web服务器设置的所有环境变量。 |\n\n变量`$_GET`、`$_POST`、`$_COOKIE`、`$_SERVER`和`$_ENV`的内容包含在`phpinfo()`函数生成的输出中。该函数还会显示PHP配置文件`php.ini`的常规设置以及其他与PHP相关的信息。\n\
    \n```\nphpinfo(); // 显示PHP信息\n```\n\n¹`http://www.php.net/manual/en/ini.core.php#ini.request-order`\n\
    \n---\n\n# 第24章 Cookies\n\nCookie是保存在客户端计算机上的一个小文件，可用于存储与该用户相关的数据。\n\n## 创建Cookie\n\
    \n要创建Cookie，使用`setcookie()`函数。此函数必须在向浏览器发送任何输出之前调用。它有三个必需参数，分别包含Cookie的名称、值和过期时间。\n\
    \n```\nsetcookie(\"lastvisit\", date(\"H:i:s\"), time() + 60*60);\n```\n\n此处值通过`date()`函数设置，该函数根据指定的格式字符串返回格式化后的字符串。过期时间以秒为单位，通常设置为相对于通过`time()`函数获取的当前时间的偏移量。在此示例中，Cookie在一小时后过期。\n\
    \n## Cookie数组\n\n一旦为用户设置了Cookie，该Cookie将在此用户下次浏览页面时随请求发送，并可通过`$_COOKIE`数组访问。\n\
    \n```\nif (isset($_COOKIE['lastvisit']))\n  echo \"Last visit: \" . $_COOKIE['lastvisit'];\n\
    ```\n\n## 删除Cookie\n\n可以通过使用过去的时间重新创建相同的Cookie来手动删除Cookie。浏览器关闭后该Cookie将被移除。\n\
    \n```\nsetcookie(\"lastvisit\", 0, 0);\n```\n\n---\n\n# 第25章 会话\n\n会话提供了一种使变量在多个网页之间可访问的方式。与Cookie不同，会话数据存储在服务器上。\n\
    \n## 启动会话\n\n要开始会话，使用`session_start()`函数。此函数必须在向网页发送任何输出之前出现。\n\n```\n<?php session_start();\
    \ ?>\n```\n\n`session_start()`函数会在客户端计算机上设置一个Cookie，其中包含用于将客户端与会话关联的ID。如果客户端已有正在进行的会话，该函数将恢复该会话，而不是启动新会话。\n\
    \n## 会话数组\n\n会话启动后，可以使用`$_SESSION`数组存储和检索会话数据。例如，可以通过以下代码存储页面浏览次数。第一次浏览页面时，将会话元素初始化为1。\n\
    \n```\nif(isset($_SESSION['views']))\n  $_SESSION['views'] += 1;\nelse\n  $_SESSION['views']\
    \ = 1;\n```\n\n只要在页面顶部调用了`session_start()`，就可以从域中的任何页面检索此元素。\n\n```\necho 'Views:\
    \ ' . $_SESSION['views'];\n```\n\n## 删除会话\n\n会话保证持续到用户离开网站。此时垃圾回收器可以自由删除该会话。要手动删除会话变量，可以使用`unset()`函数；要删除所有会话变量，可以使用`session_destroy()`函数。\n\
    \n```\nunset($_SESSION['views']); // 销毁会话变量\nsession_destroy();         // 销毁会话\n\
    ```\n\n---\n\n# 第26章 命名空间\n\n命名空间提供了一种避免命名冲突并将命名空间成员组织成层次结构的方法。任何代码都可以包含在命名空间中，但只有四种代码结构受影响：类、接口、函数和常量。\n\
    \n## 创建命名空间\n\n未包含在命名空间中的代码结构属于全局命名空间。\n\n```\n// 全局代码/命名空间\nclass MyClass {}\n\
    ```\n\n要将代码结构分配到其他命名空间，需要定义`namespace`指令。`namespace`指令下方的代码结构将属于该命名空间。命名空间的命名约定为全小写。\n\
    \n```\nnamespace my;\n\n// 属于my命名空间\nclass MyClass {}\n```\n\n包含命名空间代码的脚本文件必须在文件顶部、任何其他PHP或HTML代码之前声明命名空间。\n\
    \n```\n<?php\nnamespace my;\nclass MyClass {}\n?>\n<html><body></body></html>\n\
    ```\n\n## 嵌套命名空间\n\n命名空间可以嵌套任意多层，以进一步定义命名空间层次结构。与Windows中的目录和文件类似，命名空间及其成员使用反斜杠字符分隔。\n\
    \n```\nnamespace my\\sub;\nclass MyClass {} // my\\sub\\MyClass\n```\n\n## 替代语法\n\
    \n或者，命名空间可以使用其他编程语言中常用的花括号语法定义。与常规语法一样，命名空间外不能存在任何文本或代码。\n\n```\n<?php\nnamespace\
    \ my\n{\n  class MyClass {}\n?>\n<html><body></body></html>\n<?php }?>\n```\n\n\
    可以在同一文件中声明多个命名空间，尽管这被认为不是良好的编码实践。如果要将全局代码与命名空间代码结合使用，则必须使用花括号语法。全局代码被包含在无名称的命名空间块中。\n\
    \n```\n// 命名空间代码\nnamespace my\n{\n  const PI = 3.14;\n}\n\n// 全局代码\nnamespace\n\
    {\n  echo my\\PI; // \"3.14\"\n}\n```\n\n与其他PHP结构不同，同一个命名空间可以在多个文件中定义。这允许将命名空间内容拆分到多个文件中。\n\
    \n## 引用命名空间\n\n命名空间成员可以通过三种方式引用：完全限定名称、限定名称和未限定名称。完全限定名称始终可以使用。它由全局前缀运算符（`\\`）后跟命名空间路径和成员组成。全局前缀运算符表示路径相对于全局命名空间。\n\
    \n```\nnamespace my\n{\n  class MyClass {}\n}\n\nnamespace other\n{\n  // 完全限定名称\n\
    \  $obj = new \\my\\MyClass();\n}\n```"
  raw: 'A received file is only temporarily stored on the server. If it is not saved
    by the script it will be deleted. A simple example of how to save the file is
    given below. The example checks the error code to make sure that the file was
    successfully received, and if so moves the file out of the temporary folder to
    save it. In practice, you would also want to examine the file size and type in
    order to determine whether the file is to be kept.


    ```

    $dest = ''upload\\'' . basename($_FILES[''myfile''][''name'']);

    $file = $_FILES[''myfile''][''tmp_name''];

    $err  = $_FILES[''myfile''][''error''];


    if($err == 0 && move_uploaded_file($file, $dest))

      echo ''File successfully uploaded'';

    ```


    Two new functions are seen in this example. The `move_uploaded_file` function
    checks to ensure the first argument contains a valid upload file, and if so it
    moves it to the path and renames it to the filename, specified by the second argument.
    The specified folder must already exist and if the function succeeds in moving
    the file it returns true. The other new function is `basename`. It returns the
    filename component of a path, including the file extension.


    Superglobals


    As seen in this chapter there are a number of built-in associate arrays that make
    external data available to PHP scripts. These arrays are known as superglobals,
    because they are automatically available in every scope. There are a total of
    nine superglobals in PHP, each of which is described briefly below.


    | Name | Description |

    | --- | --- |

    | $GLOBALS | Contains all global variables, including other superglobals. |

    | $_GET | Contains variables sent via a HTTP GET request. |

    | $_POST | Contains variables sent via a HTTP POST request. |

    | $_FILES | Contains variables sent via a HTTP POST file upload. |

    | $_COOKIE | Contains variables sent via HTTP cookies. |

    | $_SESSION | Contains variables stored in a user’s session. |

    | $_REQUEST | Contains $_GET, $_POST and possibly $_COOKIE variables. |

    | $_SERVER | Contains information about the web server and the request made to
    it. |

    | $_ENV | Contains all environment variables set by the web server. |


    The content of the variables `$_GET, $_POST, $_COOKIE, $_SERVER` and *$_ENV* is
    included in the output generated by the `phpinfo` function. This function will
    also display the general settings of the PHP configuration file, php.ini, along
    with other information regarding PHP.


    ```

    phpinfo(); // display PHP information

    ```


    [¹](#9781430262831_Ch23.xhtml#_Fn1)`http://www.php.net/manual/en/ini.core.php#ini.request-order`


    CHAPTER 24


    ![image](images/frontdot.jpg)


    Cookies


    A cookie is a small file kept on the client’s computer that can be used to store
    data relating to that user.


    Creating cookies


    To create a cookie the `setcookie` function is used. This function must be called
    before any output is sent to the browser. It has three mandatory parameters that
    contain the name, value and expiration date of the cookie.


    ```

    setcookie("lastvisit", date("H:i:s"), time() + 60*60);

    ```


    The value is here set with the `date` function, which returns a string formatted
    according to the specified format string. The expiration date is measured in seconds
    and is usually set relative to the current time in seconds retrieved through the
    `time` function. In this example, the cookie expires after one hour.


    Cookie array


    Once the cookie has been set for a user this cookie will be sent along the next
    time that user views the page and can then be accessed through the $_COOKIE array.


    ```

    if (isset($_COOKIE[''lastvisit'']))

      echo "Last visit: " . $_COOKIE[''lastvisit''];

    ```


    Deleting cookies


    A cookie can be deleted manually by recreating that same cookie with an old expiration
    date. It will then be removed when the browser is closed.


    ```

    setcookie("lastvisit", 0, 0);

    ```


    CHAPTER 25


    ![image](images/frontdot.jpg)


    Sessions


    A session provides a way to make variables accessible across multiple web pages.
    Unlike cookies, session data is stored on the server.


    Starting a session


    To begin a session the `session_start` function is used. This function must appear
    before any output is send to the web page.


    ```

    <?php session_start(); ?>

    ```


    The `session_start` function will set a cookie on the client’s computer containing
    an id used to associate the client with the session. If the client already has
    an ongoing session the function will resume that session instead of starting a
    new one.


    Session array


    With the session started the $_SESSION array can be used to store session data
    as well as retrieve it. As an example, the page view count can be stored with
    the code below. The first time the page is viewed the session element is initialized
    to one.


    ```

    if(isset($_SESSION[''views'']))

      $_SESSION[''views''] += 1;

    else

      $_SESSION[''views''] = 1;

    ```


    This element can now be retrieved from any page on the domain as long as `session_start`
    is called on the top of that page.


    ```

    echo ''Views: '' . $_SESSION[''views''];

    ```


    Deleting a session


    A session is guaranteed to last until the user leaves the website. Then the garbage
    collector is free to delete that session. To manually remove a session variable
    the `unset` function can be used, and for removing all session variables there
    is the `session_destroy` function.


    ```

    unset($_SESSION[''views'']); // destroy session variable

    session_destroy();         // destroy session

    ```


    CHAPTER 26


    ![image](images/frontdot.jpg)


    Namespaces


    Namespaces provide a way to avoid naming conflicts and to group namespace members
    into a hierarchy. Any code may be contained within a namespace, but only four
    code constructs are affected: classes, interfaces, functions and constants.


    Creating namespaces


    A construct that is not included in a namespace belongs to the global namespace.


    ```

    // Global code/namespace

    class MyClass {}

    ```


    To assign the construct to another namespace a namespace directive is defined.
    Any code constructs below the namespace directive will belong to that namespace.
    The naming convention for namespaces is all lowercase.


    ```

    namespace my;


    // Belongs to my namespace

    class MyClass {}

    ```


    A script file containing namespaced code must declare the namespace at the top
    of the file before any other PHP or HTML code.


    ```

    <?php

    namespace my;

    class MyClass {}

    ?>

    <html><body></body></html>

    ```


    Nested namespaces


    Namespaces can be nested any number of levels deep to further define the namespace
    hierarchy. Like directories and files in Windows, namespaces and their members
    are separated with a backslash character.


    ```

    namespace my\sub;

    class MyClass {} // my\sub\MyClass

    ```


    Alternative syntax


    Alternatively, namespaces may be defined with the bracketed syntax commonly used
    in other programming languages. Just as with the regular syntax, no text or code
    may exist outside of the namespace.


    ```

    <?php

    namespace my

    {

      class MyClass {}

    ?>

    <html><body></body></html>

    <?php }?>

    ```


    Multiple namespaces can be declared in the same file, although this is not considered
    good coding practice. If global code is to be combined with namespaced code then
    the bracketed syntax must be used. The global code is then enclosed in an unnamed
    namespace block.


    ```

    // Namespaced code

    namespace my

    {

      const PI = 3.14;

    }


    // Global code

    namespace

    {

      echo my\PI; // "3.14"

    }

    ```


    Unlike other PHP constructs, the same namespace may be defined in more than one
    file. This allows namespace content to be split up across multiple files.


    Referencing namespaces


    A namespace member can be referred to in three ways: fully qualified, qualified
    and unqualified. The fully qualified name can always be used. It consists of the
    global prefix operator (`\`) followed by the namespace path and the member. The
    global prefix operator indicates that the path is relative to the global namespace.


    ```

    namespace my

    {

      class MyClass {}

    }


    namespace other

    {

      // Fully qualified name

      $obj = new \my\MyClass();

    }

    ```'
