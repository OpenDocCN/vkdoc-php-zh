- fmt: '# Working with Inheritance


    The first step in building an inheritance tree is to find the elements of the
    base class that don’t fit together or that need to be handled differently.


    I know that the `getPlayLength()` and `getNumberOfPages()` methods do not belong
    together. I also know that I need to create different implementations for the
    `getSummaryLine()` method. Let’s use these differences as the basis for two derived
    classes:


    ```php

    // listing 03.35

    class ShopProduct

    {

    public $numPages;

    public $playLength;

    public $title;

    public $producerMainName;

    public $producerFirstName;

    public $price;

    public function __construct(

    string $title,

    string $firstName,

    string $mainName,

    float  $price,

    int    $numPages = 0,

    int    $playLength = 0

    ) {

    $this->title             = $title;

    $this->producerFirstName = $firstName;

    $this->producerMainName  = $mainName;

    $this->price             = $price;

    $this->numPages          = $numPages;

    $this->playLength        = $playLength;

    }

    public function getProducer()

    {

    return $this->producerFirstName . " "

    . $this->producerMainName;

    }

    public function getSummaryLine()

    {

    $base  = "{$this->title} ( {$this->producerMainName}, ";

    $base .= "{$this->producerFirstName} )";

    return $base;

    }

    }

    // listing 03.36

    class CdProduct extends ShopProduct

    {

    public function getPlayLength()

    {

    return $this->playLength;

    }

    public function getSummaryLine()

    {

    $base  = "{$this->title} ( {$this->producerMainName}, ";

    $base .= "{$this->producerFirstName} )";

    $base .= ": playing time - {$this->playLength}";

    return $base;

    }

    }

    // listing 03.37

    class BookProduct extends ShopProduct

    {

    public function getNumberOfPages()

    {

    return $this->numPages;

    }

    public function getSummaryLine()

    {

    $base  = "{$this->title} ( {$this->producerMainName}, ";

    $base .= "{$this->producerFirstName} )";

    $base .= ": page count - {$this->numPages}";

    return $base;

    }

    }

    ```


    To create a child class, you must use the `extends` keyword in the class declaration.
    In the example, I created two new classes, `BookProduct` and `CdProduct`. Both
    extend the `ShopProduct` class.


    Because the derived classes do not define constructors, the parent class’s constructor
    is automatically invoked when they are instantiated. The child classes inherit
    access to all the parent’s public and protected methods (though not to private
    methods or properties). This means that you can call the `getProducer()` method
    on an object instantiated from the `CdProduct` class, even though `getProducer()`
    is defined in the `ShopProduct` class:


    ```php

    // listing 03.38

    $product2 = new CdProduct(

    "Exile on Coldharbour Lane",

    "The",

    "Alabama 3",

    10.99,

    0,

    60.33

    );

    print "artist: {$product2->getProducer()}\n";

    ```


    So both the child classes inherit the behavior of the common parent. You can treat
    a `BookProduct` object as if it were a `ShopProduct` object. You can pass a `BookProduct`
    or `CdProduct` object to the `ShopProductWriter` class’s `write()` method and
    all will work as expected.


    Notice that both the `CdProduct` and `BookProduct` classes override the `getSummaryLine()`
    method, providing their own implementation. Derived classes can extend but also
    alter the functionality of their parents.


    The super class’s implementation of this method might seem redundant because it
    is overridden by both its children. Nevertheless, it provides basic functionality
    that new child classes might use. The method’s presence also provides a guarantee
    to client code that all `ShopProduct` objects will provide a `getSummaryLine()`
    method. Later on you will see how it is possible to make this promise in a base
    class without providing any implementation at all. Each child `ShopProduct` class
    inherits its parent’s properties. Both `BookProduct` and `CdProduct` access the
    `$title` property in their versions of `getSummaryLine()`.


    Inheritance can be a difficult concept to grasp at first. By defining a class
    that extends another, you ensure that an object instantiated from it is defined
    by the characteristics of first the child and then the parent class. Another way
    of thinking about this is in terms of searching. When I invoke `$product2->getProducer()`,
    there is no such method to be found in the `CdProduct` class, and the invocation
    falls through to the default implementation in `ShopProduct`. When I invoke `$product2->getSummaryLine()`,
    on the other hand, the `getSummaryLine()` method is found in `CdProduct` and invoked.


    The same is true of property accesses. When I access `$title` in the `BookProduct`
    class’s `getSummaryLine()` method, the property is not found in the `BookProduct`
    class. It is acquired instead from the parent class, from `ShopProduct`. The `$title`
    property applies equally to both subclasses, and therefore, it belongs in the
    superclass.


    A quick look at the `ShopProduct` constructor, however, shows that I am still
    managing data in the base class that should be handled by its children. The `BookProduct`
    class should handle the `$numPages` argument and property, and the `CdProduct`
    class should handle the `$playLength` argument and property. To make this work,
    I will define constructor methods in each of the child classes.'
