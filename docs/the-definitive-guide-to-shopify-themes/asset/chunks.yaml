- fmt: "### Adding Product Information\n\nIn the original product information hierarchy\
    \ (see Figure [5-2](#A437216_1_En_5_Chapter.html#Fig2)), we identified a “supporting”\
    \ class of information—product details not as crucial as title or price but which\
    \ are still likely be used by customers to help them make a purchasing decision.\
    \ Common examples of this would be a product’s technical specifications, shipping\
    \ and returns information, size guides, or garment care information. When adding\
    \ this sort of information to a product page, we need to consider:\n\n- How best\
    \ to display the information (as a table, graphic, chart, text, etc.)\n- How prominent\
    \ to make the information on the page, and where to place it (inline further down\
    \ the page, inside a tab component, in a popup dialog, etc.)\n- Whether the information\
    \ is relevant to every product on the store, or only a subset\n- Whether the information\
    \ varies from product to product, or if it’s consistent across the store\n- Where\
    \ to store the additional product information, and how to give storeowners the\
    \ ability to manage and update that information\n\nFor the purposes of the example\
    \ theme, we’re going to implement a common pattern for additional production information—turning\
    \ the production description section into a tabbed panel that allows customers\
    \ to view shipping information in a separate tab. We’ll also allow the storeowner\
    \ to use Shopify metafields to specify garment care information on a per-product\
    \ basis and display that information in a separate tab where present.\n\nListing\
    \ [5-5](#A437216_1_En_5_Chapter.html#Par92) shows a simple implementation of the\
    \ tabs in question, extracted out into a `product-details.liquid` snippet and\
    \ displaying the dynamic product description in one tab and some static shipping\
    \ information in the other. Figure [5-13](#A437216_1_En_5_Chapter.html#Fig13)\
    \ shows the result.\n\n![A437216_1_En_5_Fig13_HTML.jpg](A437216_1_En_5_Fig13_HTML.jpg)\n\
    \nFigure 5-13  \nThe addition of the product description tabs from Listing [5-5](#A437216_1_En_5_Chapter.html#Par92)\
    \ to the product details screen\n\n```\nDescription\n\nShipping\n\n{{ product.description\
    \ }}\n\nOrders placed before 4pm are shipped the same day.\nThe table below shows\
    \ approximate shipping times using our standard shipping service.\n\n...\nListing\
    \ 5-5\nSimple Implementation of Some Product Information Tabs\n```\n\n#### Managing\
    \ Additional Information with Metafields\n\nThe next step is to add a Garment\
    \ Care tab to the product page. We can’t just statically code this tab in as we\
    \ did with the Shipping Information tab, as the content of the tab—and whether\
    \ the tab is displayed at all—will differ from product to product.\n\nOne potential\
    \ solution is to code the care information directly into the Liquid templates—something\
    \ like Listing [5-6](#A437216_1_En_5_Chapter.html#Par95).\n\n```\n...\n{%- if\
    \ product.handle == 'foraker-canvas-coat' -%}\n\nGarment Care\n\n{%- endif -%}\n\
    ...\n\n...\n{%- if product.handle == 'foraker-canvas-coat' -%}\n\nAlways store\
    \ in a dry, well-ventilated area.\n\n{%- endif -%}\n...\n\nListing 5-6\nA Possible\
    \ (But Not Recommended) Approach to Conditionally Displaying Garment Care Information\n\
    ```\n\nThe limitation of this approach is that it requires us to open the Liquid\
    \ template and make changes any time we want to make alterations to the garment\
    \ care information itself or add care information to a new product. In general,\
    \ managing content inside Liquid templates is a recipe for disaster. It’s unwieldy\
    \ for storeowners to manage and is prone to being overwritten by other users or\
    \ automated theme deployment scripts. It also means that an inexperienced storeowner\
    \ can forget to close a HTML tag and wreak havoc with all the site’s product pages.\n\
    \nWe’re going to get around this issue by using metafields, a feature of Shopify\
    \ that allows the storage of arbitrary custom data against objects like products,\
    \ customer, collections, and the like. Metafields are accessed in Liquid code\
    \ like this: `{{ product.metafields.extra.garment_care }}`, where `extra` is a\
    \ “namespace” or “group” for the metafields (designed to avoid metafield conflicts)\
    \ and `garment_care` is the “key” for a specific metafield value.\n\nHistorically,\
    \ Shopify made accessing and managing metafield data quite obtuse and didn’t expose\
    \ metafield controls on the product pages in the Shopify Admin, which is why there\
    \ are dozens of Shopify apps that offer metafield functionality. However, you\
    \ don’t really need them—you’re able to edit product metafields within the Shopify\
    \ Admin by constructing a bulk edit URL, which looks like `https://defguide.myshopify.com/admin/bulk?resource_name=Product&edit=metafields.extra.garment_care:string`.\
    \ [³](#A437216_1_En_5_Chapter.html#Fn3)\n\nIf you open that URL in your browser\
    \ (changing `defguide.myshopify.com` to match your own store domain), you’ll be\
    \ presented with a list of products and the ability to set a value for the `extra_garment`\
    \ metafield key for each. Storeowners can bookmark this URL and return to it any\
    \ time to update or add garment care information for one or more products.\n\n\
    With a strategy for managing care information in place, we can now update our\
    \ product details snippet to conditionally display a Garment Care tab when the\
    \ metafield is present and contains information, as in Listing [5-7](#A437216_1_En_5_Chapter.html#Par102).\
    \ When implemented and the customer browses to a product that has garment care\
    \ information set, we get the result in Figure [5-14](#A437216_1_En_5_Chapter.html#Fig14).\
    \ As mentioned, this improved version uses metafields, rather than hardcoded data,\
    \ to display garment care information in a separate tab.\n\n![A437216_1_En_5_Fig14_HTML.jpg](A437216_1_En_5_Fig14_HTML.jpg)\n\
    \nFigure 5-14  \nThe display of garment care information when the relevant metafield\
    \ is present\n\n```\n...\n{%- unless product.metafields.extra.garment_care ==\
    \ blank -%}\n\nGarment Care\n\n{%- endunless -%}\n...\n\n...\n{%- unless product.metafields.extra.garment_care\
    \ == blank -%}\n\n{{ product.metafields.extra.garment_care }}\n\n{%- endunless\
    \ -%}\n...\n\nListing 5-7\nImproved Version of Listing 5-6 that Uses Metafields\n\
    ```"
  raw: '### Adding Product Information


    In the original product information hierarchy (see Figure [5-2](#A437216_1_En_5_Chapter.html#Fig2)),
    we identified a “supporting” class of information—product details not as crucial
    as title or price but which are still likely be used by customers to help them
    make a purchasing decision. Common examples of this would be a product’s technical
    specifications, shipping and returns information, size guides, or garment care
    information. When adding this sort of information to a product page, we need to
    consider:


    *   How best to display the information (as a table, graphic, chart, text, etc.)

    *   How prominent to make the information on the page, and where to place it (inline
    further down the page, inside a tab component, in a popup dialog, etc.)

    *   Whether the information is relevant to every product on the store, or only
    a subset

    *   Whether the information varies from product to product, or if it’s consistent
    across the store

    *   Where to store the additional product information, and how to give storeowners
    the ability to manage and update that information


    For the purposes of the example theme, we’re going to implement a common pattern
    for additional production information—turning the production description section
    into a tabbed panel that allows customers to view shipping information in a separate
    tab. We’ll also allow the storeowner to use Shopify metafields to specify garment
    care information on a per-product basis and display that information in a separate
    tab where present.


    Listing [5-5](#A437216_1_En_5_Chapter.html#Par92) shows a simple implementation
    of the tabs in question, extracted out into a `product-details.liquid` snippet
    and displaying the dynamic product description in one tab and some static shipping
    information in the other. Figure [5-13](#A437216_1_En_5_Chapter.html#Fig13) shows
    the result.


    ![A437216_1_En_5_Fig13_HTML.jpg](A437216_1_En_5_Fig13_HTML.jpg)


    Figure 5-13


    The addition of the product description tabs from Listing [5-5](#A437216_1_En_5_Chapter.html#Par92)
    to the product details screen


    ```


    Description


    Shipping


    {{ product.description }}


    Orders placed before 4pm are shipped the same day.

    The table below shows approximate shipping times using our standard shipping service.


    ...


    Listing 5-5

    Simple Implementation of Some Product Information Tabs

    ```


    #### Managing Additional Information with Metafields


    The next step is to add a Garment Care tab to the product page. We can’t just
    statically code this tab in as we did with the Shipping Information tab, as the
    content of the tab—and whether the tab is displayed at all—will differ from product
    to product.


    One potential solution is to code the care information directly into the Liquid
    templates—something like Listing [5-6](#A437216_1_En_5_Chapter.html#Par95).


    ```

    ...

    {%- if product.handle == ''foraker-canvas-coat'' -%}


    Garment Care


    {%- endif -%}

    ...


    ...

    {%- if product.handle == ''foraker-canvas-coat'' -%}


    Always store in a dry, well-ventilated area.


    {%- endif -%}

    ...


    Listing 5-6

    A Possible (But Not Recommended) Approach to Conditionally Displaying Garment
    Care Information

    ```


    The limitation of this approach is that it requires us to open the Liquid template
    and make changes any time we want to make alterations to the garment care information
    itself or add care information to a new product. In general, managing content
    inside Liquid templates is a recipe for disaster. It’s unwieldy for storeowners
    to manage and is prone to being overwritten by other users or automated theme
    deployment scripts. It also means that an inexperienced storeowner can forget
    to close a HTML tag and wreak havoc with all the site’s product pages .


    We’re going to get around this issue by using metafields, a feature of Shopify
    that allows the storage of arbitrary custom data against objects like products,
    customer, collections, and the like. Metafields are accessed in Liquid code like
    this: `{{ product.metafields.extra.garment_care }}`, where `extra` is a “namespace”
    or “group” for the metafields (designed to avoid metafield conflicts) and `garment_care`
    is the “key” for a specific metafield value.


    Historically, Shopify made accessing and managing metafield data quite obtuse
    and didn’t expose metafield controls on the product pages in the Shopify Admin,
    which is why there are dozens of Shopify apps that offer metafield functionality.
    However, you don’t really need them—you’re able to edit product metafields within
    the Shopify Admin by constructing a bulk edit URL, which looks like [`https://defguide.myshopify.com/admin/bulk?resource_name=Product&edit=metafields.extra.garment_care:string`](https://defguide.myshopify.com/admin/bulk%3Fresource_name=Product%26edit=metafields.extra.garment_care:string)
    .[³](#A437216_1_En_5_Chapter.html#Fn3)


    If you open that URL in your browser (changing `defguide.myshopify.com` to match
    your own store domain), you’ll be presented with a list of products and the ability
    to set a value for the `extra_garment` metafield key for each. Storeowners can
    bookmark this URL and return to it any time to update or add garment care information
    for one or more products.


    With a strategy for managing care information in place, we can now update our
    product details snippet to conditionally display a Garment Care tab when the metafield
    is present and contains information, as in Listing [5-7](#A437216_1_En_5_Chapter.html#Par102).
    When implemented and the customer browses to a product that has garment care information
    set, we get the result in Figure [5-14](#A437216_1_En_5_Chapter.html#Fig14). As
    mentioned, this improved version uses metafields, rather than hardcoded data,
    to display garment care information in a separate tab.


    ![A437216_1_En_5_Fig14_HTML.jpg](A437216_1_En_5_Fig14_HTML.jpg)


    Figure 5-14


    The display of garment care information when the relevant metafield is present


    ```

    ...

    {%- unless product.metafields.extra.garment_care == blank -%}


    Garment Care


    {%- endunless -%}

    ...


    ...

    {%- unless product.metafields.extra.garment_care == blank -%}


    {{ product.metafields.extra.garment_care }}


    {%- endunless -%}

    ...


    Listing 5-7

    Improved Version of Listing 5-6 that Uses Metafields

    ```'
  trans: "\n### 添加产品信息\n\n在原始产品信息层级结构中（见图 5-2），我们发现了一类“辅助性”信息——这些产品详情虽然不像标题或价格那样至关重要，但客户仍可能用其来辅助购买决策。常见的例子包括产品的技术规格、配送与退货信息、尺码指南或服装护理说明。在向产品页面添加此类信息时，我们需要考虑：\n\
    \n- 如何以最佳方式展示信息（表格、图形、图表、文本等）\n- 信息在页面上的显著程度及放置位置（内嵌于页面下方、选项卡组件内部、弹出对话框中等）\n-\
    \ 该信息是否适用于商店中的每一件产品，还是仅适用于部分产品\n- 该信息在不同产品之间是存在差异，还是在全店范围内保持一致\n- 在何处存储这些额外的产品信息，以及如何让店主能够管理和更新这些信息\n\
    \n为了示例主题的需要，我们将实现一种处理附加产品信息的常见模式——将产品描述区域转换为一个选项卡面板，让客户能在单独的选项卡中查看配送信息。同时，我们还会允许店主使用\
    \ Shopify 的元字段（metafields）来指定每件产品的服装护理说明，并在单独的选项卡中显示这些信息（若存在）。\n\n清单 5-5 展示了一个简单的选项卡实现，它被提取为\
    \ `product-details.liquid` 代码片段，并在一个选项卡中显示动态的产品描述，在另一个选项卡中显示一些静态的配送信息。图 5-13 显示了实现后的效果。\n\
    \n![A437216_1_En_5_Fig13_HTML.jpg](img/A437216_1_En_5_Fig13_HTML.jpg)\n\n图 5-13\
    \  \n将清单 5-5 中的产品描述选项卡添加到产品详情界面\n\n```\n描述\n\n配送\n\n{{ product.description }}\n\
    \n下午 4 点前下的订单将在当天发货。\n下表显示了使用我们标准配送服务的大致配送时间。\n\n...\n清单 5-5\n产品信息选项卡的简单实现\n```\n\
    \n#### 使用元字段管理附加信息\n\n下一步是向产品页面添加一个“服装护理”选项卡。我们不能像处理“配送信息”选项卡那样静态地编码这个选项卡，因为该选项卡的内容——以及该选项卡是否显示——在不同的产品之间会有所不同。\n\
    \n一种潜在的解决方案是将护理信息直接硬编码到 Liquid 模板中——类似于清单 5-6 所示。\n\n```\n...\n{%- if product.handle\
    \ == 'foraker-canvas-coat' -%}\n\n服装护理\n\n{%- endif -%}\n...\n\n...\n{%- if product.handle\
    \ == 'foraker-canvas-coat' -%}\n\n始终存放在干燥、通风良好的地方。\n\n{%- endif -%}\n...\n\n清单\
    \ 5-6\n有条件显示服装护理信息的一种可行（但不推荐）方法\n```\n\n这种方法的局限性在于，每当我们想要修改服装护理信息本身，或者为新产品添加护理信息时，都需要打开\
    \ Liquid 模板并进行更改。一般来说，在 Liquid 模板内部管理内容是一场灾难。这种方式对店主来说难以管理，很容易被其他用户或自动主题部署脚本覆盖。这也意味着，经验不足的店主可能会忘记关闭某个\
    \ HTML 标签，从而给网站的所有产品页面造成严重破坏。\n\n我们将使用元字段（metafields）来解决这个问题。元字段是 Shopify 的一项功能，允许针对产品、客户、商品系列等对象存储任意的自定义数据。在\
    \ Liquid 代码中这样访问元字段：`{{ product.metafields.extra.garment_care }}`，其中 `extra` 是元字段的“命名空间”或“分组”（旨在避免元字段冲突），而\
    \ `garment_care` 是特定元字段值的“键”。\n\n过去，Shopify 使得访问和管理元字段数据非常笨拙，并且没有在 Shopify 后台的产品页面上公开元字段控件，因此市面上有数十个提供元字段功能的\
    \ Shopify 应用。但实际上，你并不需要它们——你可以通过构造一个批量编辑 URL 来在 Shopify 后台内编辑产品元字段，这个 URL 看起来像\
    \ `https://defguide.myshopify.com/admin/bulk?resource_name=Product&edit=metafields.extra.garment_care:string`。\
    \ ³\n\n如果你在浏览器中打开该 URL（将 `defguide.myshopify.com` 替换为你自己的商店域名），将会看到一个产品列表，并能够为每个产品的\
    \ `extra_garment` 元字段键设置一个值。店主可以为这个 URL 添加书签，随时返回以更新或添加一个或多个产品的服装护理信息。\n\n有了管理护理信息的策略，我们现在可以更新产品详情代码片段，使其在元字段存在且包含信息时，有条件地显示“服装护理”选项卡，如清单\
    \ 5-7 所示。实现后，当客户浏览到已设置服装护理信息的产品时，我们会得到图 5-14 中的结果。如前所述，这个改进版本使用元字段（而非硬编码数据）来在单独的选项卡中显示服装护理信息。\n\
    \n![A437216_1_En_5_Fig14_HTML.jpg](img/A437216_1_En_5_Fig14_HTML.jpg)\n\n图 5-14\
    \  \n当相关元字段存在时，服装护理信息的显示效果\n\n```\n...\n{%- unless product.metafields.extra.garment_care\
    \ == blank -%}\n\n服装护理\n\n{%- endunless -%}\n...\n\n...\n{%- unless product.metafields.extra.garment_care\
    \ == blank -%}\n\n{{ product.metafields.extra.garment_care }}\n\n{%- endunless\
    \ -%}\n...\n\n清单 5-7\n清单 5-6 的改进版本，使用了元字段\n```\n"
- fmt: '### Improving the Mobile Experience


    Until now, the example has been focused on how the theme looks and works on the
    desktop. Doing this and ignoring the mobile experience — even if you’re using
    a “responsive” framework — is dangerous in commerce. Over half of all traffic
    to Shopify stores is on mobile devices, and for some stores the numbers are as
    high as 75%.


    As you’re working on a Shopify theme, make sure you consider how customers browsing
    on a mobile device are going to view the information hierarchy or take key actions
    like adding products to the cart. This doesn’t just mean resizing your browser
    on the desktop, either — you need to physically take out one or two devices and
    walk through the site to fully appreciate the different experience. Considerations
    like the size of touch areas, how hard the buttons are to reach with your thumb,
    and visible content areas all come in to play.


    Take a look at Figure [5-15](#A437216_1_En_5_Chapter.html#Fig15), which shows
    the state of the current example product page on a mobile. A couple of issues
    jump out:


    ![A437216_1_En_5_Fig15_HTML.jpg](A437216_1_En_5_Fig15_HTML.jpg)


    Figure 5-15


    Scrolling through the current product page on a mobile device, there are some
    display and usability issues that jump out


    *   The initial view on the product page doesn’t display the product title, vendor,
    or price — all information that we identified as important in our product hierarchy.

    *   The product image carousel displays the product image okay, but all the thumbnails
    are displayed beneath it as full width images, so we need to scroll a long way
    to get to the product information.

    *   The text on the `Garment Care` tab breaks to a new line and messes up the
    layout.

    *   Having the `Add To Cart` button less than half the width of the screen and
    over on the left makes it harder to reach with the thumb for a right-handed user
    holding a phone in one hand.

    *   Having only one product per row in the “You May Also Like…” section means
    it takes a long time to scroll through.


    Addressing these sorts of issues isn’t usually hard, especially if you’re using
    a CSS framework or library that provides responsive helper utilities. To resolve
    these issues in the example theme, I decided to:


    *   Add a version of the product title, vendor, and price to the top of the page
    that’s only visible on mobile, and hide the same information lower down the page.

    *   Leave the product carousel with the expectation that mobile users can swipe
    left and right to browse the available product images, but hide the product thumbnails
    altogether.

    *   Hide the word `Garment` on the `Garment Care` tab on smaller screens, as `Care`
    conveys enough information. Another popular approach if you have more tabs is
    to swap to icons when you have less space to work with.

    *   Make the `Add To Cart` button full-width on mobile devices so that it’s easier
    to reach.

    *   Display the related products in a 2x2 grid, rather than one per row.


    The code implementing these changes is available in the example theme’s repository.
    As you can see from Figure [5-16](#A437216_1_En_5_Chapter.html#Fig16), they result
    in a much more usable mobile experience.


    ![A437216_1_En_5_Fig16_HTML.jpg](A437216_1_En_5_Fig16_HTML.jpg)


    Figure 5-16


    Just a few simple changes have addressed some of the major usability issues with
    the mobile version of the site.


    ### Creating Alternate Page Templates


    The product page is looking pretty solid for now, so we’re going to move on to
    some other areas of the site, starting with the home page in Chapter [6](#A437216_1_En_6_Chapter.html).
    Before we do that, I’m going to quickly cover one final Shopify theme feature
    — alternate page templates.


    For each type of Liquid template present in a Shopify theme (`product.liquid`,
    `collection.liquid`, `article.liquid`, etc.), you’re able to create “alternate”
    versions of those templates, which you can use to selectively render different
    products (or different collections, or different articles) in a completely different
    way. This can be useful if, for example, some of your products have a demonstration
    video that completely changes the desired layout of the page, or if you want to
    create alternate layouts for text-based blog articles versus photo-heavy blog
    articles.


    To create and use alternate page templates, simply create a new template file
    with the same name as the base template but with an additional suffix — for example,
    `product.video.liquid`. Once uploaded to your store, Shopify will display a template
    selection UI on the relevant page, from where you or the storeowner can select
    the desired template. See Figure [5-17](#A437216_1_En_5_Chapter.html#Fig17).


    ![A437216_1_En_5_Fig17_HTML.jpg](A437216_1_En_5_Fig17_HTML.jpg)


    Figure 5-17


    The `Theme Templates` section appears in the Shopify Admin when multiple template
    options are available for the displayed object type.


    To demonstrate this in the example theme, I’ve created a `product.image-right.liquid`
    template (code visible in the example theme repository), which simply reverses
    the order of the columns on the product page to display the product information
    on the left and the imagery on the right. You can see how this displays on the
    store in Figure [5-18](#A437216_1_En_5_Chapter.html#Fig18).


    ![A437216_1_En_5_Fig18_HTML.jpg](A437216_1_En_5_Fig18_HTML.jpg)


    Figure 5-18


    A product page displayed with the alternate `product.image-right.liquid` template.


    **Tip**


    While the `Theme Templates` section only appears in the Shopify Admin for a select
    number of object types (products, collections, and blogs), all Shopify pages support
    alternate templates, and you can have as many alternate templates for a page as
    you like. To render these alternate templates at will, just include a `?view=`
    parameter in the URL — for example, you could force any product page on your example
    store to render with the image on the right side by linking to [`https://defguide.myshopify.com/products/foraker-canvas-coat?view=image-right`](https://defguide.myshopify.com/products/foraker-canvas-coat?view=image-right).


    One nifty use of alternate page templates is to render a custom representation
    of an object in JSON format (e.g., `product.json.liquid`), which you can fetch
    using Ajax from other pages where you might need to dynamically fetch product
    information.


    ### Summary


    This chapter has been a deep dive into the design and implementation of product
    pages on Shopify stores. It started by discussing the importance of a product’s
    information hierarchy and how the importance of different bits of product information
    changes depending on the store and the user’s context.


    With an example product hierarchy in hand, we stepped through the code required
    to put together a fully functional Shopify product page.


    **Footnotes**


    [1](#A437216_1_En_5_Chapter.html#Fn1_source) [`https://help.shopify.com/themes/liquid/filters/url-filters#product_img_url`](https://help.shopify.com/themes/liquid/filters/url-filters#product_img_url)


    [2](#A437216_1_En_5_Chapter.html#Fn2_source) See, for example, [https://blog.kissmetrics.com/product-videos-conversion/](https://blog.kissmetrics.com/product-videos-conversion/).


    [3](#A437216_1_En_5_Chapter.html#Fn3_source) If you’re a Google Chrome user, I
    highly recommend checking out ShopifyFD ([http://shopifyfd.com](http://shopifyfd.com)),
    a Chrome extension that hooks into the Shopify Admin and allows the editing of
    metafields directly on product admin pages.


    # Designing Home and Collection Pages


    With the all-important product page out of the way, we can now turn to some of
    the other important components of a Shopify theme. In this chapter, we’ll be looking
    at the design and implementation of a store’s home and collection pages.'
