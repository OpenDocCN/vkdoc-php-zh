    \ the contents of an array.\n\n9.  `Try/Catch`\n    blocks should reside in the\
    \ business rules and data tiers but not the\n    interface tier.\n\n10.  Only\
    \ `Exceptions`\n    intentionally thrown by program code should be caught.\n\n\
    **Short Answer/Essay**\n\n1.  Explain how hierarchy of exception handling works\
    \ with three-tier\n    applications.\n\n2.  What is the difference between an\
    \ error and an exception?\n\n3.  How do you correct the time zone if PHP is providing\
    \ an incorrect\n    timestamp?\n\n4.  How can PHP programmers try to capture errors\
    \ so they can be treated\n    as if they are exceptions?\n\n5.  Why is it important\
    \ to have multiple log files produced by an\n    application?\n\n**Projects**\n\
    \n1.  Adjust the code from project #1 (or #2) from Chapter [4](#394210_2_En_4_Chapter.xhtml)\
    \ to include exception handling and\n    logging.\n\n2.  Create an application\
    \ that will register contestants for your\n    favorite game show. Include verification\
    \ of the data entered using HTML5\n    and JavaScript. Also validate the data\
    \ when it is passed to the\n    application. The application should include an\
    \ interface PHP program\n    (interface tier) and a registration class (business\
    \ rules tier). The\n    registration class should include exception handling (both\
    \ user\n    exceptions and program exceptions). The interface program should handle\n\
    \    the exceptions using `try/catch` blocks as\n    shown in this chapter.\n\n\
    **Term Project**\n\n1.  Update the ABC Computer Parts Warehouse Inventory application\
    \ to\n    include exception handling. The application should attempt to handle\
    \ all\n    exceptions, and errors, when possible.\n\nUser exceptions should be\
    \ logged to a user log. All other exceptions\n    should be logged to a system\
    \ log. If the exception is considered to be\n    extreme (will cause the program\
    \ to otherwise crash), an email should be\n    sent to the system administrator.\
    \ Hint: The `Try/Catch` block\n    should only exist in the interface tier.\n\n\
    7. Data Objects\n\n*I’m an idealist. I don’t know where I’m going, but I’m on\
    \ my\nway.—*Carl Sandburg*, Incidentals (1904)*\n\nChapter Objectives/Student\
    \ Learning Outcomes\n\nAfter completing this chapter, the student will be able\
    \ to\n\n*   Create a data class that inserts, updates, and deletes XML or\n  \
    \  JSON data\n\n*   Explain how to create a data class that updates MySQL data\
    \ using\n    a SQL script\n\n*   Create a PHP program that creates a change backup\
    \ log\n\n*   Create a PHP program that can recover data from a previous\n    backup\n\
    \n*   Apply changes to create up-to-date valid information\n\n*   Use dependency\
    \ injection to attach a data class to another class\n    in the BR tier\n\n* \
    \  Create a three-tier PHP application\n\nThe Data Class\nThe interface and business\
    \ rules tiers should not store application\ninformation. These tiers should not\
    \ even be aware of how the information\nis stored (text file, XML, or database)\
    \ or the location of the stored\ninformation. Any information that is stored must\
    \ be passed from the\nbusiness rules tier to the data tier. The data tier is also\
    \ responsible\nfor reacting to requests for information from the business rules\n\
    tier.\n\nThis allows the interface\ntier and business\nrules tier to be unaware\
    \ of any changes in types of storage\nmethods (text file, XML, or database) and\
    \ the locations of stored items.\nThe signature (parameters accepted) and items\
    \ returned from the data\ntier should remain unchanged over the life of the application.\
    \ As long\nas these do not change, there should be no changes needed in the other\n\
    tiers when changes occur in the data tier.\n\n*   *Security and performance—When\
    \ using databases, it may seem\n    logical to build a SQL string in the business\
    \ rules tier and pass the\n    string to the data tier. This would cause a major\
    \ security hole in the\n    application. Hackers could pass any SQL string (including\
    \ a*\n    *delete* *string). It may also seem logical to pass SQL update\n   \
    \ commands (DELETE,* *UPDATE, and* *INSERT) into the data\n    tier. Again, this\
    \ provides a major hole. Passing data for a*\n    *WHERE* *SQL command is also\
    \ a bad idea as it might allow\n    hackers to delete or change any combination\
    \ of data in the\n    database.*\n\nA data class\nshould provide complete functionality\
    \ for manipulating information. This\nincludes the ability to read, insert, update,\
    \ and delete information.\nEven if the current application does not require all\
    \ these commands,\nlogically, they should exist in the data class for future use.\n\
    A balance should be achieved between performance and the requirement\nto store\
    \ information. While highly important information might require\nimmediate storage,\
    \ other information can be held in a data structure (list,\narray, and dataset)\
    \ in the application until the user has completed any\nupdates. Holding and making\
    \ changes to information in the memory of the\nserver, instead of the storage\
    \ location, is much more efficient. Storing\nthe information only after all changes\
    \ have been completed will reduce\nseveral calls to the storage location down\
    \ to two (initial retrieval of\nthe information and saving of the updated information).\
    \ Making changes\nto information in memory is always more efficient than making\
    \ changes on\na storage device (such as a hard drive).\nHowever, conflicts can\
    \ occur when data changes. The live data\nresiding in the data structure might\
    \ be updated while the application is\nalso making changes. There are many ways\
    \ in which the chances of\nconflicts can be reduced or eliminated. The approach\
    \ required depends on\nthe frequency of the use and changes to the data. Locking\
    \ mechanisms can\nbe designed to restrict access to the data currently being used.\
    \ These\ntechniques are usually handled within the data structure itself. For\n\
    frequently changed data, these techniques are necessary to retain valid\ndata.\
    \ The data used in the examples in this book infrequently change.\nThus, the likelihood\
    \ of conflicts is greatly reduced."
