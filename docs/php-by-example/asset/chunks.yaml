    Indexes for the array elements are determined automatically (`0`, `1`, and `2`).


    It may happen that you are not satisfied with the situation when the indexes of
    the array elements are determined automatically, or you want to use non-numeric
    values as indexes. If so, when creating an array, you pass constructions of the
    form `key=>value` as arguments to the `array()` function or list them in square
    brackets. Namely, you specify the key of the element and, after the “arrow” `=>`,
    its value. In addition, as before, you can assign values to the elements of an
