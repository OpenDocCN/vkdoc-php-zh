    以下文件已更新，引用了搜索方法的最新版本：`Searchedindex.php`、`searchedblog.php`、`searched.php`、`searchedcomments.php`、`Searched_Blog_Entry_Table.class.php`、`searched-comments-form-html.php`、`searched-comments-html.php`、`searched-entries-html.php`、`searched-form-html.php`、`searched-results-html.php`。


