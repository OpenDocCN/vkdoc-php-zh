  trans: "\n`elseif ($admin_page == 'Products')`\n\n`$pageContentsCell = 'admin_products.tpl';`\n\
    \n`648XCH07a.qxd 10/25/06 10:56 PM Page 252`\n\n**252**\n\n第 7 章 ■ 目录管理\n\n`elseif\
    \ ($admin_page == 'ProductDetails')`\n\n`$pageContentsCell = 'admin_product.tpl';`\n\
    \n**工作原理：admin_product**\n\n尽管你还不能执行该页面，但有必要查看一下新模板中包含的新元素。\n\n`admin_product.tpl`\
    \ 模板包含一个带有 `enctype=\"multipart/form-data\"` 属性的表单。该属性用于上传产品图片，并与实现文件上传的 HTML\
    \ 代码协同工作：\n\n```\n...\n<input name=\"ImageUpload\" type=\"file\" value=\"Upload\"\
    \ />\n<input type=\"submit\" name=\"Upload\" value=\"Upload\" /><br />\n...\n\
    ```\n\n在 `admin_product.tpl` 模板文件的末尾，你还会找到一段类似的代码，用于上传产品的缩略图：\n\n```\n...\n<input\
    \ name=\"ThumbnailUpload\" type=\"file\" value=\"Upload\" />\n<input type=\"submit\"\
    \ name=\"Upload\" value=\"Upload\" /><br />\n...\n```\n\n点击这些上传按钮的响应逻辑在 `AdminProduct`\
    \ 类（位于 `presentation/smarty_plugins/function.load_admin_product.php`）的 `init()`\
    \ 方法中实现：\n\n```\n// 如果正在上传产品图片……\nif (isset ($_POST['Upload']))\n{\n    /* 检查我们是否对\
    \ product_images 文件夹拥有写入权限 */\n    if (!is_writeable(SITE_ROOT . '/product_images/'))\n\
    \    {\n        echo \"无法写入 product_images 文件夹\"; exit;\n    }\n\n    // 如果错误代码为\
    \ 0，则第一个文件上传成功\n    if ($_FILES['ImageUpload']['error'] == 0)\n    {\n       \
    \ /* 使用 move_uploaded_file PHP 函数将文件\n           从其临时位置移动到 product_images 文件夹\
    \ */\n        move_uploaded_file($_FILES['ImageUpload']['tmp_name'],\n       \
    \                    SITE_ROOT . '/product_images/' .\n                      \
    \     $_FILES['ImageUpload']['name']);\n\n        // 更新数据库中产品的信息\n        Catalog::SetImage($this->mProductId,\n\
    \                          $_FILES['ImageUpload']['name']);\n    }\n\n    // 如果错误代码为\
    \ 0，则第二个文件上传成功\n    if ($_FILES['ThumbnailUpload']['error'] == 0)\n    {\n   \
    \     // 将上传的文件移动到 product_images 文件夹\n        move_uploaded_file($_FILES['ThumbnailUpload']['tmp_name'],\n\
    \                           SITE_ROOT . '/product_images/' .\n               \
    \            $_FILES['ThumbnailUpload']['name']);\n\n        // 更新数据库中产品的信息\n\
    \        Catalog::SetThumbnail($this->mProductId,\n                          \
    \    $_FILES['ThumbnailUpload']['name']);\n    }\n}\n```\n\n超全局变量 `$_FILES` 是一个二维数组，用于存储关于你上传文件的信息。如果\
    \ `$_FILES['ImageUpload']['error']` 被设置为 0，则表示产品主图的上传已成功，并且需要进行处理。变量 `$_FILES['ImageUpload']['tmp_name']`\
    \ 存储了上传文件在服务器上的临时文件名，而变量 `$_FILES['ImageUpload']['name']` 则存储了上传到服务器时指定的文件名。\n\
    \n> **注意：** 关于 `$_FILES` 超全局变量的完整描述可在 `http://www.php.net/manual/en/features.file-upload.php`\
    \ 找到。\n\n使用 PHP 的 `move_uploaded_file` 函数可将文件从临时位置移动到 `product_images` 文件夹：\n\n\
    ```\n/* 使用 move_uploaded_file PHP 函数将文件\n   从其临时位置移动到 product_images 文件夹 */\n\
    move_uploaded_file($_FILES['ImageUpload']['tmp_name'],\n                   SITE_ROOT\
    \ . '/product_images/' .\n                   $_FILES['ImageUpload']['name']);\n\
    ```\n\n上传产品图片后，文件名必须存储在数据库中（否则，文件上传将无效）：\n\n```\n// 更新数据库中产品的信息\nCatalog::SetImage($this->mProductId,\n\
    \                  $_FILES['ImageUpload']['name']);\n```\n\n如你所见，用 PHP 处理文件上传是相当简单的。\n\
    \n`648XCH07a.qxd 10/25/06 10:56 PM Page 254`\n\n**254**\n\n第 7 章 ■ 目录管理\n\n**实现业务层**\n"
- fmt: "# 实现业务层\n\n要实现业务层，您需要向`Catalog`类添加以下方法：\n\n- `DeleteProduct`：从目录中彻底删除一个产品。\n\
    - `RemoveProductFromCategory`：当点击“从分类中移除”按钮时调用，用于将产品从分类中取消分配。\n- `GetCategories`：返回目录中的所有分类。\n\
    - `GetProductInfo`：返回产品的详细信息。\n- `GetCategoriesForProduct`：用于获取与指定产品相关的分类列表。\n\
    - `SetProductDisplayOption`：设置产品的显示选项。\n- `AssignProductToCategory`：将产品分配到一个分类。\n\
    - `MoveProductToCategory`：将产品从一个分类移动到另一个分类。\n- `SetImage`：更改数据库中特定产品的图片文件名。\n\
    - `SetThumbnail`：更改特定产品的第二个图片文件名。\n\n## 练习：实现业务层方法\n\n由于这些功能通过数据层方法调用能更好地表达，我们将在实现数据层时进一步讨论它们。请将以下代码添加到`business/catalog.php`中的`Catalog`类：\n\
    \n```php\n// Removes a product from the product catalog\npublic static function\
    \ DeleteProduct($productId)\n{\n    // Build the SQL query\n    $sql = 'SELECT\
    \ catalog_delete_product(:product_id);';\n\n    // Build the parameters array\n\
    \    $params = array (':product_id' => $productId);\n\n    // Prepare the statement\
    \ with PDO-specific functionality\n    $result = DatabaseHandler::Prepare($sql);\n\
    \n    // Execute the query\n    return DatabaseHandler::Execute($result, $params);\n\
    }\n\n// Unassigns a product from a category\npublic static function RemoveProductFromCategory($productId,\
    \ $categoryId)\n{\n    // Build the SQL query\n    $sql = 'SELECT catalog_remove_product_from_category(\n\
    \        :product_id, :category_id);';\n\n    // Build the parameters array\n\
    \    $params = array (':product_id' => $productId,\n                     ':category_id'\
    \ => $categoryId);\n\n    // Prepare the statement with PDO-specific functionality\n\
    \    $result = DatabaseHandler::Prepare($sql);\n\n    // Execute the query and\
    \ return the results\n    return DatabaseHandler::GetOne($result, $params);\n\
    }\n\n// Retrieves the list of categories a product belongs to\npublic static function\
    \ GetCategories()\n{\n    // Build the SQL query\n    $sql = 'SELECT * FROM catalog_get_categories();';\n\
    \n    // Prepare the statement with PDO-specific functionality\n    $result =\
    \ DatabaseHandler::Prepare($sql);\n\n    // Execute the query and return the results\n\
    \    return DatabaseHandler::GetAll($result);\n}\n\n// Retrieves product info\n\
    public static function GetProductInfo($productId)\n{\n    // Build the SQL query\n\
    \    $sql = 'SELECT * FROM catalog_get_product_info(:product_id);';\n\n    //\
    \ Build the parameters array\n    $params = array (':product_id' => $productId);\n\
    \n    // Prepare the statement with PDO-specific functionality\n    $result =\
    \ DatabaseHandler::Prepare($sql);\n\n    // Execute the query and return the results\n\
    \    return DatabaseHandler::GetRow($result, $params);\n}\n\n// Retrieves the\
    \ list of categories a product belongs to\npublic static function GetCategoriesForProduct($productId)\n\
    {\n    // Build the SQL query\n    $sql = 'SELECT * FROM catalog_get_categories_for_product(:product_id);';\n\
    \n    // Build the parameters array\n    $params = array (':product_id' => $productId);\n\
    \n    // Prepare the statement with PDO-specific functionality\n    $result =\
    \ DatabaseHandler::Prepare($sql);\n\n    // Execute the query and return the results\n\
    \    return DatabaseHandler::GetAll($result, $params);\n}\n\n// Assigns a product\
    \ to a category\npublic static function SetProductDisplayOption($productId, $display)\n\
    {\n    // Build the SQL query\n    $sql = 'SELECT catalog_set_product_display_option(\n\
    \        :product_id, :display);';\n\n    // Build the parameters array\n    $params\
    \ = array (':product_id' => $productId,\n                     ':display' => $display);\n\
    \n    // Prepare the statement with PDO-specific functionality\n    $result =\
    \ DatabaseHandler::Prepare($sql);\n}\n```"
  raw: 'To implement the business tier, you’ll need to add the following methods to
    the Catalog class:


    • DeleteProduct completely removes a product from the catalog.


    • RemoveProductFromCategory is called when the Remove from category button is
    clicked to unassign the product from a category.


    • GetCategories returns all the categories from our catalog.


    • GetProductInfo returns the product details.


    • GetCategoriesForProduct is used to get the list of categories that are related
    to the specified product.


    • SetProductDisplayOption sets the product’s display setting.


    • AssignProductToCategory assigns a product to a category.


    • MoveProductToCategory moves a product from one category to another.


    • SetImage changes the image file name in the database for a certain product.


    • SetThumbnail changes the second image file name for a certain product.


    **Exercise: Implementing the Business Tier Methods**


    Because the functionality is better expressed by the data tier functions the methods
    call, we’ll discuss more about them when implementing the data tier. Add the following
    code to the Catalog class inside of business/catalog.php:


