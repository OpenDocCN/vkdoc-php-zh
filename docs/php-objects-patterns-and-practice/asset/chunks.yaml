- fmt: "### Cleaning Up After try/catch Clauses with finally\n\nThe way that code\
    \ flow is affected by exceptions can cause unexpected problems. For example, clean-up\
    \ code or other essential housekeeping may not be performed after an exception\
    \ is generated within a `try` clause. As you have seen, if an exception is generated\
    \ within a `try` clause, flow moves directly to the relevant `catch` clause. Code\
    \ that closes database connections or file handles may not get called, and status\
    \ information might not be updated.\n\nImagine, for example, that `Runner::init()`\
    \ keeps a log of its actions. It logs the start of the initialization process,\
    \ any errors encountered, and then it logs the end of the initialization process.\
    \ Here I provide a typically simplified example of this kind of logging:\n\n```php\n\
    // listing 04.66\npublic static function init()\n{\n    try {\n        $fh = fopen(__DIR__\
    \ . \"/log.txt\", \"a\");\n        fputs($fh, \"start\\n\");\n        $conf =\
    \ new Conf(dirname(__FILE__) . \"/conf.broken.xml\");\n        print \"user: \"\
    \ . $conf->get('user') . \"\\n\";\n        print \"host: \" . $conf->get('host')\
    \ . \"\\n\";\n        $conf->set(\"pass\", \"newpass\");\n        $conf->write();\n\
    \        fputs($fh, \"end\\n\");\n        fclose($fh);\n    } catch (FileException\
    \ $e) {\n        // permissions issue or non-existent file\n        fputs($fh,\
    \ \"file exception\\n\");\n        throw $e;\n    } catch (XmlException $e) {\n\
    \        fputs($fh, \"xml exception\\n\");\n        // broken xml\n    } catch\
    \ (ConfException $e) {\n        fputs($fh, \"conf exception\\n\");\n        //\
    \ wrong kind of XML file\n    } catch (\\Exception $e) {\n        fputs($fh, \"\
    general exception\\n\");\n        // backstop: should not be called\n    }\n}\n\
    ```\n\nI open a file, `log.txt`; I write to it; and then I call my configuration\
    \ code. If an exception is encountered in this process, I log this fact in the\
    \ relevant `catch` clause. I end the `try` clause by writing to the log and closing\
    \ its file handle.\n\nOf course, this last step will never be reached if an exception\
    \ is encountered. Flow passes straight to the relevant `catch` block, and the\
    \ rest of the `try` clause is never run. Here is the log output when a file exception\
    \ is generated:\n\n```\nstart\nfile exception\n```\n\nAs you can see, the logging\
    \ began, and the file exception was noted, but the portion of code that registers\
    \ the end of logging was never reached, and so the log was not updated with that.\n\
    \nYou might think that the solution would be to place the final logging step outside\
    \ of the `try` / `catch` block altogether. This would not work reliably. If a\
    \ generated exception is caught, and the `try` block allows execution to continue,\
    \ then flow will move beyond the `try` / `catch` construct. However, a `catch`\
    \ clause could rethrow the exception, or it might end script execution altogether.\n\
    \nTo help programmers deal with problems like this, PHP 5.5 introduced a new clause:\
    \ `finally`. If you’re familiar with Java, it’s likely you’ll have seen this clause\
    \ before. Although `catch` clauses are only conditionally run when matching exceptions\
    \ are thrown, the `finally` clause is always run, whether or not an exception\
    \ is generated within the `try` block.\n\nI can fix this problem by moving my\
    \ log write and code to close to a `finally` clause:\n\n```php\npublic static\
    \ function init()\n{\n    $fh = fopen(__DIR__ . \"/log.txt\", \"a\");\n    try\
    \ {\n        fputs($fh, \"start\\n\");\n        $conf = new Conf(dirname(__FILE__)\
    \ . \"/conf.broken.xml\");\n        print \"user: \" . $conf->get('user') . \"\
    \\n\";\n        print \"host: \" . $conf->get('host') . \"\\n\";\n        $conf->set(\"\
    pass\", \"newpass\");\n        $conf->write();\n    } catch (FileException $e)\
    \ {\n        // permissions issue or non-existent file\n        fputs($fh, \"\
    file exception\\n\");\n    } catch (XmlException $e) {\n        fputs($fh, \"\
    xml exception\\n\");\n        // broken xml\n    } catch (ConfException $e) {\n\
    \        fputs($fh, \"conf exception\\n\");\n        // wrong kind of XML file\n\
    \    } catch (Exception $e) {\n        fputs($fh, \"general exception\\n\");\n\
    \        // backstop: should not be called\n    } finally {\n        fputs($fh,\
    \ \"end\\n\");\n        fclose($fh);\n    }\n}\n```\n\nBecause the log write and\
    \ the `fclose()` invocation are wrapped in a `finally` clause, these statements\
    \ will be run even if, as is the case when a `FileException` is caught, the exception\
    \ is rethrown.\n\nHere, again, is the log text when a `FileException` is generated:\n\
    \n```\nstart\nfile exception\nend\n```\n\n**Note:**  \nA `finally` clause will\
    \ be run if an invoked `catch` clause rethrows an exception or returns a value.\
    \ However, calling `die()` or `exit()` in a `try` or `catch` block will end script\
    \ execution, and the `finally` clause will not be run.\n\n---\n\n### Final Classes\
    \ and Methods\n\nInheritance allows for enormous flexibility within a class hierarchy.\
    \ You can override a class or method so that a call in a client method will achieve\
    \ radically different effects, according to which class instance it has been passed.\
    \ Sometimes, though, a class or method should remain fixed and unchanging. If\
    \ you have achieved the definitive functionality for your class or method, and\
    \ you feel that overriding it can only damage the ultimate perfection of your\
    \ work, you may need the `final` keyword.\n\n`final` puts a stop to inheritance.\
    \ A final class cannot be subclassed. Less drastically, a final method cannot\
    \ be overridden.\n\nHere’s a `final` class:\n\n```php\n// listing 04.67\nfinal\
    \ class Checkout\n{\n    // ...\n}\n```\n\nHere’s an attempt to subclass the `Checkout`\
    \ class:\n\n```php\n// listing 04.68\nclass IllegalCheckout extends Checkout\n\
    {\n    // ...\n}\n```\n\nThis produces an error:\n\n```\nPHP Fatal error:  Class\
    \ IllegalCheckout may not inherit from final class (Checkout) in ....\n```\n\n\
    I could relax matters somewhat by declaring a method in `Checkout` final, rather\
    \ than the whole class. The `final` keyword should be placed in front of any other\
    \ modifiers such as `protected` or `static`, like this:\n\n```php\n// listing\
    \ 04.69\nclass Checkout\n{\n    final public function totalize()\n    {\n    \
    \    // calculate bill\n    }\n}\n```\n\nI can now subclass `Checkout`, but any\
    \ attempt to override `totalize()` will cause a fatal error:\n\n```php\n// listing\
    \ 04.70\nclass IllegalCheckout extends Checkout\n{\n    final public function\
    \ totalize()\n    {\n        // change bill calculation\n    }\n}\n```\n\n```\n\
    PHP Fatal error:  Cannot override final method popp\\ch04\\batch14\\Checkout::totalize()\
    \ ...\n```\n\nGood object-oriented code tends to emphasize the well-defined interface.\
    \ Behind the interface, though, implementations will often vary. Different classes\
    \ or combinations of classes conform to common interfaces but behave differently\
    \ in different circumstances. By declaring a class or method `final`, you limit\
    \ this flexibility. There will be times when this is desirable, and you will see\
    \ some of them later in the book. However, you should think carefully before declaring\
    \ something `final`. Are there really no circumstances in which overriding would\
    \ be useful? You could always change your mind later on, of course, but this might\
    \ not be so easy if you are distributing a library for others to use. Use `final`\
    \ with care."
  raw: '#### Cleaning Up After try/catch Clauses with finally


    The way that code flow is affected by exceptions can cause unexpected problems.
    For example, clean-up code or other essential housekeeping may not be performed
    after an exception is generated within a `try` clause. As you have seen, if an
    exception is generated within a `try` clause, flow moves directly to the relevant
    `catch` clause. Code that closes database connections or file handles may not
    get called, and status information might not be updated.


    Imagine, for example, that `Runner::init()` keeps a log of its actions. It logs
    the start of the initialization process, any errors encountered, and then it logs
    the end of the initialization process. Here I provide a typically simplified example
    of this kind of logging:


    ```

    // listing 04.66

    public static function init()

    {

    try {

    $fh = fopen(__DIR__ . "/log.txt", "a");

    fputs($fh, "start\n");

    $conf = new Conf(dirname(__FILE__) . "/conf.broken.xml");

    print "user: " . $conf->get(''user'') . "\n";

    print "host: " . $conf->get(''host'') . "\n";

    $conf->set("pass", "newpass");

    $conf->write();

    fputs($fh, "end\n");

    fclose($fh);

    } catch (FileException $e) {

    // permissions issue or non-existent file

    fputs($fh, "file exception\n");

    throw $e;

    } catch (XmlException $e) {

    fputs($fh, "xml exception\n");

    // broken xml

    } catch (ConfException $e) {

    fputs($fh, "conf exception\n");

    // wrong kind of XML file

    } catch (\Exception $e) {

    fputs($fh, "general exception\n");

    // backstop: should not be called

    }

    }

    ```


    I open a file, `log.txt;` I write to it; and then I call my configuration code.
    If an exception is encountered in this process, I log this fact in the relevant
    `catch` clause. I end the `try` clause by writing to the log and closing its file
    handle.


    Of course, this last step will never be reached if an exception is encountered.
    Flow passes straight to the relevant `catch` block, and the rest of the `try`
    clause is never run. Here is the log output when a file exception is generated:


    ```

    start

    file exception

    ```


    As you can see, the logging began, and the file exception was noted, but the portion
    of code that registers the end of logging was never reached, and so the log was
    not updated with that.


    You might think that the solution would be to place the final logging step outside
    of the `try` /`catch` block altogether. This would not work reliably. If a generated
    exception is caught, and the `try` block allows execution to continue, then flow
    will move beyond the `try` / `catch` construct. However, a `catch` clause could
    rethrow the exception, or it might end script execution altogether.


    To help programmers deal with problems like this, PHP 5.5 introduced a new clause:
    `finally`. If you’re familiar with Java, it’s likely you’ll have seen this clause
    before. Although `catch` clauses are only conditionally run when matching exceptions
    are thrown, the `finally` clause is always run, whether or not an exception is
    generated within the `try` block.


    I can fix this problem by moving my log write and code to close to a finally clause:


    ```

    public static function init()

    {

    $fh = fopen(__DIR__ . "/log.txt", "a");

    try {

    fputs($fh, "start\n");

    $conf = new Conf(dirname(__FILE__) . "/conf.broken.xml");

    print "user: " . $conf->get(''user'') . "\n";

    print "host: " . $conf->get(''host'') . "\n";

    $conf->set("pass", "newpass");

    $conf->write();

    } catch (FileException $e) {

    // permissions issue or non-existent file

    fputs($fh, "file exception\n");

    } catch (XmlException $e) {

    fputs($fh, "xml exception\n");

    // broken xml

    } catch (ConfException $e) {

    fputs($fh, "conf exception\n");

    // wrong kind of XML file

    } catch (Exception $e) {

    fputs($fh, "general exception\n");

    // backstop: should not be called

    } finally {

    fputs($fh, "end\n");

    fclose($fh);

    }

    }

    ```


    Because the log write and the `fclose()` invocation are wrapped in a `finally`
    clause, these statements will be run even if, as is the case when a `FileException`
    is caught, the exception is rethrown.


    Here, again, is the log text when a `FileException` is generated:


    ```

    start

    file exception

    end

    ```


    Note


    A `finally` clause will be run if an invoked catch clause rethrows an exception
    or returns a value. However, calling `die()` or `exit()` in a `try` or `catch`
    block will end script execution, and the `finally` clause will not be run.


    ## Final Classes and Methods


    Inheritance allows for enormous flexibility within a class hierarchy. You can
    override a class or method so that a call in a client method will achieve radically
    different effects, according to which class instance it has been passed. Sometimes,
    though, a class or method should remain fixed and unchanging. If you have achieved
    the definitive functionality for your class or method, and you feel that overriding
    it can only damage the ultimate perfection of your work, you may need the `final`
    keyword.


    `final` puts a stop to inheritance. A final class cannot be subclassed. Less drastically,
    a final method cannot be overridden.


    Here’s a `final` class:


    ```

    // listing 04.67

    final class Checkout

    {

    // ...

    }

    ```


    Here’s an attempt to subclass the `Checkout` class:


    ```

    // listing 04.68

    class IllegalCheckout extends Checkout

    {

    // ...

    }

    ```


    This produces an error:


    ```

    PHP Fatal error:  Class IllegalCheckout may not inherit from final class (Checkout)
    in ....

    ```


    I could relax matters somewhat by declaring a method in `Checkout` final, rather
    than the whole class. The `final` keyword should be placed in front of any other
    modifiers such as `protected` or `static`, like this:


    ```

    // listing 04.69

    class Checkout

    {

    final public function totalize()

    {

    // calculate bill

    }

    }

    ```


    I can now subclass `Checkout`, but any attempt to override `totalize()` will cause
    a fatal error:


    ```

    // listing 04.70

    class IllegalCheckout extends Checkout

    {

    final public function totalize()

    {

    // change bill calculation

    }

    }

    PHP Fatal error:  Cannot override final method popp\ch04\batch14\Checkout::totalize()
    ...

    ```


    Good object-oriented code tends to emphasize the well-defined interface. Behind
    the interface, though, implementations will often vary. Different classes or combinations
    of classes conform to common interfaces but behave differently in different circumstances.
    By declaring a class or method final, you limit this flexibility. There will be
    times when this is desirable, and you will see some of them later in the book.
    However, you should think carefully before declaring something final. Are there
    really no circumstances in which overriding would be useful? You could always
    change your mind later on, of course, but this might not be so easy if you are
    distributing a library for others to use. Use `final` with care.'
  trans: "\n### 使用 finally 处理 try/catch 之后的清理工作\n\n异常对代码流程的影响可能导致意外问题。例如，当`try`子句中产生异常后，清理代码或其他必要的维护工作可能无法执行。如你所见，如果`try`子句中产生了异常，程序流程会直接跳转到相应的`catch`子句。用于关闭数据库连接或文件句柄的代码可能不会被调用，状态信息也可能无法更新。\n\
    \n例如，假设`Runner::init()`会记录其操作日志。它会记录初始化过程的开始、遇到的任何错误，以及初始化过程的结束。这里提供一个典型的简化示例：\n\
    \n```php\n// listing 04.66\npublic static function init()\n{\n    try {\n    \
    \    $fh = fopen(__DIR__ . \"/log.txt\", \"a\");\n        fputs($fh, \"start\\\
    n\");\n        $conf = new Conf(dirname(__FILE__) . \"/conf.broken.xml\");\n \
    \       print \"user: \" . $conf->get('user') . \"\\n\";\n        print \"host:\
    \ \" . $conf->get('host') . \"\\n\";\n        $conf->set(\"pass\", \"newpass\"\
    );\n        $conf->write();\n        fputs($fh, \"end\\n\");\n        fclose($fh);\n\
    \    } catch (FileException $e) {\n        // 权限问题或文件不存在\n        fputs($fh, \"\
    file exception\\n\");\n        throw $e;\n    } catch (XmlException $e) {\n  \
    \      fputs($fh, \"xml exception\\n\");\n        // XML 格式错误\n    } catch (ConfException\
    \ $e) {\n        fputs($fh, \"conf exception\\n\");\n        // XML 文件类型错误\n \
    \   } catch (\\Exception $e) {\n        fputs($fh, \"general exception\\n\");\n\
    \        // 兜底处理：不应被调用\n    }\n}\n```\n\n我打开了一个文件`log.txt`，向其中写入内容，然后调用配置代码。如果在此过程中遇到异常，我会在相应的`catch`子句中记录这一事实。最后，通过在`try`子句末尾写入日志并关闭文件句柄来结束该子句。\n\
    \n当然，如果遇到异常，最后这一步将永远不会执行。程序流程直接跳转到相应的`catch`块，而`try`子句的其余部分永远不会运行。以下是当产生文件异常时的日志输出：\n\
    \n```\nstart\nfile exception\n```\n\n如你所见，日志记录开始了，文件异常也被记录，但记录结束的代码部分从未执行，因此日志中没有更新相应的结束信息。\n\
    \n你可能会认为解决方案是将最后的日志记录步骤完全放在`try`/`catch`块之外。但这并不能可靠地工作。如果产生的异常被捕获，并且`try`块允许继续执行，那么程序流程会转移到`try`/`catch`结构之外。然而，`catch`子句可能会重新抛出异常，或者完全结束脚本执行。\n\
    \n为了帮助程序员处理这类问题，PHP 5.5 引入了一个新的子句：`finally`。如果你熟悉 Java，很可能以前见过这个子句。虽然`catch`子句仅在匹配的异常被抛出时有条件地运行，但`finally`子句总是会运行，无论`try`块中是否产生异常。\n\
    \n我可以通过将日志写入和关闭代码移到`finally`子句中来修复这个问题：\n\n```php\npublic static function init()\n\
    {\n    $fh = fopen(__DIR__ . \"/log.txt\", \"a\");\n    try {\n        fputs($fh,\
    \ \"start\\n\");\n        $conf = new Conf(dirname(__FILE__) . \"/conf.broken.xml\"\
    );\n        print \"user: \" . $conf->get('user') . \"\\n\";\n        print \"\
    host: \" . $conf->get('host') . \"\\n\";\n        $conf->set(\"pass\", \"newpass\"\
    );\n        $conf->write();\n    } catch (FileException $e) {\n        // 权限问题或文件不存在\n\
    \        fputs($fh, \"file exception\\n\");\n    } catch (XmlException $e) {\n\
    \        fputs($fh, \"xml exception\\n\");\n        // XML 格式错误\n    } catch (ConfException\
    \ $e) {\n        fputs($fh, \"conf exception\\n\");\n        // XML 文件类型错误\n \
    \   } catch (Exception $e) {\n        fputs($fh, \"general exception\\n\");\n\
    \        // 兜底处理：不应被调用\n    } finally {\n        fputs($fh, \"end\\n\");\n   \
    \     fclose($fh);\n    }\n}\n```\n\n由于日志写入和`fclose()`调用被封装在`finally`子句中，即使捕获到`FileException`并重新抛出异常，这些语句也会被执行。\n\
    \n以下是当产生`FileException`时的日志文本：\n\n```\nstart\nfile exception\nend\n```\n\n**注意：**\
    \  \n如果调用的`catch`子句重新抛出异常或返回值，`finally`子句仍会执行。但是，在`try`或`catch`块中调用`die()`或`exit()`会结束脚本执行，此时`finally`子句将不会运行。\n\
    \n---\n\n### final 类和方法\n\n继承允许在类层次结构中实现极大的灵活性。你可以重写一个类或方法，使得客户端方法中的调用根据传入的类实例不同而产生截然不同的效果。然而，有时一个类或方法应该保持固定不变。如果你已经为你的类或方法实现了最终的功能，并且认为重写只会破坏工作的完美性，那么你可能需要使用`final`关键字。\n\
    \n`final`阻止了继承。被声明为`final`的类不能被子类化。相对不那么严格的是，被声明为`final`的方法不能被重写。\n\n下面是一个`final`类的例子：\n\
    \n```php\n// listing 04.67\nfinal class Checkout\n{\n    // ...\n}\n```\n\n下面是对`Checkout`类进行子类化的尝试：\n\
    \n```php\n// listing 04.68\nclass IllegalCheckout extends Checkout\n{\n    //\
    \ ...\n}\n```\n\n这会产生一个错误：\n\n```\nPHP Fatal error:  Class IllegalCheckout may\
    \ not inherit from final class (Checkout) in ....\n```\n\n我可以稍微放宽限制，在`Checkout`中声明一个方法为`final`，而不是整个类。`final`关键字应放在其他修饰符（如`protected`或`static`）之前，像这样：\n\
    \n```php\n// listing 04.69\nclass Checkout\n{\n    final public function totalize()\n\
    \    {\n        // 计算账单\n    }\n}\n```\n\n现在我可以子类化`Checkout`，但任何重写`totalize()`的尝试都会导致致命错误：\n\
    \n```php\n// listing 04.70\nclass IllegalCheckout extends Checkout\n{\n    final\
    \ public function totalize()\n    {\n        // 更改账单计算\n    }\n}\n```\n\n```\n\
    PHP Fatal error:  Cannot override final method popp\\ch04\\batch14\\Checkout::totalize()\
    \ ...\n```\n\n良好的面向对象代码倾向于强调定义明确的接口。然而，在接口背后，实现往往会有所不同。不同的类或类的组合遵循共同的接口，但在不同情况下行为不同。通过将类或方法声明为`final`，你限制了这种灵活性。在某些情况下，这样做是可取的，本书后面会介绍一些这样的场景。但是，在声明某物为`final`之前，你应该仔细考虑。真的没有任何情况下重写会有用吗？当然，你以后可以改变主意，但如果你分发一个供他人使用的库，这可能就不那么容易了。请谨慎使用`final`。\n"
- fmt: "# The Internal Error Class\n\nBack when exceptions were first introduced,\
    \ the world of trying and catching applied primarily to code written in PHP and\
    \ not the core engine. Internally generated errors maintained their own logic.\
    \ This could get messy if you wanted to manage core errors in the same way as\
    \ code-generated exceptions. PHP 7 has made a start on addressing this issue with\
    \ the `Error` class. This implements `Throwable` — the same built-in interface\
    \ that the `Exception` class implements, and therefore it can be treated in the\
    \ same way. This also means the methods described in Table [4-1](#A314621_5_En_4_Chapter.html#Tab1)\
    \ are honored. `Error` is subclassed for individual error types. Here’s how you\
    \ might catch a parse error generated by an `eval` statement:\n\n```php\ntry {\n\
    \    eval(\"illegal code\");\n} catch (\\Error $e) {\n    print get_class($e)\
    \ . \"\\n\";\n} catch (\\Exception $e) {\n    // do something with an Exception\n\
    }\n```\n\nHere’s the output:\n\n```\nParseError\n```\n\nSo you can match some\
    \ types of internal errors in `catch` clauses, either by specifying the `Error`\
    \ superclass or by specifying a more specific subclass. Table [4-2](#A314621_5_En_4_Chapter.html#Tab2)\
    \ shows the current `Error` subclasses.\n\n**Table 4-2.** The Built-in Error Classes\
    \ Introduced by PHP 7\n\n| Error                | Description                \
    \                                                 |\n|----------------------|-----------------------------------------------------------------------------|\n\
    | `ArithmeticError`    | Thrown for math-related errors — particularly those related\
    \ to bitwise arithmetic |\n| `AssertionError`     | Thrown when the `assert()`\
    \ language construct (used in debugging) fails     |\n| `DivisionByZeroError`|\
    \ Thrown when an attempt is made to divide a number by zero                  \
    \ |\n| `ParseError`         | Thrown when a runtime attempt to parse PHP (using\
    \ `eval()`, for example) fails |\n| `TypeError`          | Thrown when an argument\
    \ of the wrong type is passed to a method, a method returns a value of the wrong\
    \ type, or an incorrect number of arguments are passed to a method |\n\n> **Note**\
    \  \n> At the time of this writing, an attempt to call `Error::getMessage()` fails\
    \ with an error, despite the fact that this is declared in the `Throwable` interface.\
    \ It is likely that this issue will have been fixed by the time you read this!\n\
    \n# Working with Interceptors\n\nPHP provides built-in interceptor methods that\
    \ can intercept messages sent to undefined methods and properties. This is also\
    \ known as overloading, but as that term means something quite different in Java\
    \ and C++, I think it is better to talk in terms of interception.\n\nPHP supports\
    \ three built-in interceptor methods. Like `__construct()`, these are invoked\
    \ for you when the right conditions are met. Table [4-3](#A314621_5_En_4_Chapter.html#Tab3)\
    \ describes the methods.\n\n**Table 4-3.** The Interceptor Methods\n\n| Method\
    \                                    | Description                           \
    \                    |\n|-------------------------------------------|-----------------------------------------------------------|\n\
    | `__get($property)`                        | Invoked when an undefined property\
    \ is accessed            |\n| `__set($property, $value)`                | Invoked\
    \ when a value is assigned to an undefined property |\n| `__isset($property)`\
    \                      | Invoked when `isset()` is called on an undefined property\
    \ |\n| `__unset($property)`                      | Invoked when `unset()` is called\
    \ on an undefined property |\n| `__call($method, $arg_array)`             | Invoked\
    \ when an undefined non-static method is called     |\n| `__callStatic($method,\
    \ $arg_array)`       | Invoked when an undefined static method is called     \
    \    |\n\nThe `__get()` and `__set()` methods are designed for working with properties\
    \ that have not been declared in a class (or its parents).\n\n`__get()` is invoked\
    \ when client code attempts to read an undeclared property. It is called automatically\
    \ with a single string argument containing the name of the property that the client\
    \ is attempting to access. Whatever you return from the `__get()` method will\
    \ be sent back to the client as if the target property exists with that value.\
    \ Here’s a quick example:\n\n```php\n// listing 04.71\nclass Person\n{\n    public\
    \ function __get(string $property)\n    {\n        $method = \"get{$property}\"\
    ;\n        if (method_exists($this, $method)) {\n            return $this->$method();\n\
    \        }\n    }\n\n    public function getName(): string\n    {\n        return\
    \ \"Bob\";\n    }\n\n    public function getAge(): int\n    {\n        return\
    \ 44;\n    }\n}\n```\n\nWhen a client attempts to access an undefined property,\
    \ the `__get()` method is invoked. I have implemented `__get()` to take the property\
    \ name and construct a new string, prepending the word \"get\". I pass this string\
    \ to a function called `method_exists()`, which accepts an object and a method\
    \ name and tests for method existence. If the method does exist, I invoke it and\
    \ pass its return value to the client. Assume the client requests a `$name` property:\n\
    \n```php\n$p = new Person();\nprint $p->name;\n```\n\nIn this case, the `getName()`\
    \ method is invoked behind the scenes:\n\n```\nBob\n```\n\nIf the method does\
    \ not exist, I do nothing. The property that the user is attempting to access\
    \ will resolve to NULL.\n\nThe `__isset()` method works in a similar way to `__get()`.\
    \ It is invoked after the client calls `isset()` on an undefined property. Here’s\
    \ how I might extend `Person`:\n\n```php\n// listing 04.72\npublic function __isset(string\
    \ $property)\n{\n    $method = \"get{$property}\";\n    return (method_exists($this,\
    \ $method));\n}\n```\n\nNow a cautious user can test a property before working\
    \ with it:\n\n```php\nif (isset($p->name)) {\n    print $p->name;\n}\n```\n\n\
    The `__set()` method is invoked when client code attempts to assign to an undefined\
    \ property. It is passed two arguments: the name of the property and the value\
    \ the client is attempting to set. You can then decide how to work with these\
    \ arguments. Here I further amend the `Person` class:\n\n```php\n// listing 04.73\n\
    class Person\n{\n    private $myname;\n    private $myage;\n\n    public function\
    \ __set(string $property, string $value)\n    {\n        $method = \"set{$property}\"\
    ;\n        if (method_exists($this, $method)) {\n            return $this->$method($value);\n\
    \        }\n    }\n\n    public function setName(string $name)\n    {\n      \
    \  $this->myname = $name;\n        if (!is_null($name)) {\n            $this->myname\
    \ = strtoupper($this->myname);\n        }\n    }\n\n    public function setAge(int\
    \ $age)\n    {\n        $this->myage = $age;\n    }\n}\n```"
