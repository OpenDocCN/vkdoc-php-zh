  \ 11/17/06 3:39 PM Page 303\n\n第 9 章\n\n处理客户订单\n\n**好消息**是您的购物车看起来不错且功能完备。**坏消息**是它并未允许访客实际提交订单，这使得购物车在生产系统环境中完全无用。本章将通过两个独立阶段解决这个问题。在第一部分中，您将实现订单提交机制的客户端部分。更准确地说，您将为购物车控件添加一个“提交订单”按钮，允许访客提交购物车中的商品。\n\
