    ■**Note** If you prefer to store your images in the database, you shouldn’t have
    too much trouble extending the SQL we will create here to do so. However, to produce
    and save the thumbnail images as the way I describe in this chapter, it is likely
    that you will still need to store some files on the filesystem.


    **Creating the Database Table for Image Data**


    We will first create a table in the database to store information about each uploaded
    image.


    This table will hold the filename of the original image as well as a foreign key
    that links this table to the blog_posts table. The final ranking column will be
    used to record the order of the images in a blog post.


    ■**Note** The name of the ranking column isn’t too important; however, order is
    a reserved word in SQL, so we cannot use it.


    The schema for this table, which we call blog_posts_images, is shown in Listing
    11-1\. This SQL code can be found in the schema-mysql.sql file, and the corresponding
    PostgreSQL code can be found in schema-pgsql.sql.


    **Listing 11-1.** *Creating the Database Table Used to Store Image Information
    (schema-mysql.sql)* create table blog_posts_images (


    image_id serial not null,


    filename varchar(255) not null,


    post_id bigint unsigned not null,


    ranking int unsigned not null,


    primary key (image_id),


    foreign key (post_id) references blog_posts (post_id)


    ) type = InnoDB;


