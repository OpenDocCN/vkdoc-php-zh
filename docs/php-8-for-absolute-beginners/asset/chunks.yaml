- fmt: '# Setting Up a Data Dashboard


    *Data mining* and *data collection* are vital for both medium-size and large corporations.
    The ability to quickly analyze data can have a major impact on the bottom line
    for any company. Companies must be able to determine the best strategies using
    available information (such as sales data) to be successful. Data can be collected
    from multiple sources, including internally, externally (competition), environmentally
    (economics of a geographical area), and via the government. The ability to combine
    and compare this information is essential.


    The popularity of the Python programming language is partially due to the number
    of available libraries within the language to manipulate and display data efficiently.
    However, there are techniques that other languages can use to accomplish similar
    goals. One of these tools is *Google Charts*.


    `Google Charts` are JavaScript classes which are specially designed to interact
    with HTML5 web pages. This provides a natural ability for charts to interact with
    PHP, since PHP, HTML, and JavaScript work well together. Charts retrieve information
    from *Data Tables* (special types of arrays). Thus, any data source that can display
    data into an array can be a provider for a `Google Chart`.


    We will build a *data dashboard* to display our charts. A data dashboard is simply
    a screen (web page) that displays data in multiple formats. Google has over 30
    distinct types of *Charts* which can be placed within a dashboard. To demonstrate
    the ability to use different data sources, our example will allow the user to
    determine the source of the information. We will demonstrate this ability by allowing
    data to be pulled from a database table, *JSON file*, *CSV file*, or a *Microsoft
    Excel Worksheet*. The information will then be displayed in several charts within
    a dashboard.


    Let us discuss some of the process before we begin the task. A `Google Dashboard`
    is defined using `google.visualization.Dashboard Classes`. The `Dashboard` instance
    uses a data table which contains the data to be displayed and distributes this
    data to all the charts that are part of the dashboard. *Controls* provide the
    ability for the user to interface with data and to change the subset of data used
    within the charts. These controls are common widgets, pickers, sliders, and auto
    completers, which can easily be manipulated by the user.


    Now that we have a general idea of what can exist within a dashboard, let us look
    at the steps needed to accomplish our goal.


    - *HTML dashboard skeleton*: We will design an HTML framework which will position
    and hold charts to be displayed in the dashboard.

    - *Libraries*: We must load two Google libraries (a *Google AJAX API* and a *Google
    Visualization Control Package*) to access the dashboard and charts.

    - *Data*: We will retrieve the data from several sources, allowing the user to
    select which data source to use when displaying results within the dashboard.
    The selected data will be placed within a two-dimensional array which will be
    converted to a `Google Data Table` for easy use by the charts within the dashboard.

    - *Dashboard*: We will use the *Google Dashboard Class*, by creating an instance
    of it (object) and by passing a reference to the location of the dashboard within
    the HTML (div tag location).

    - *Controls/charts*: We will create controls for users to manipulate and charts
    which will display the data within the dashboard.

    - *Dependencies*: We will bind together the dashboard and charts which will automatically
    update the data displayed when the user manipulates a control.

    - *Display dashboard*: We will draw the dashboard and pass the data to it, which
    will, in turn, be displayed in the charts.

    - *Programming*: We will finally include additional programming code to allow
    the charts within the dashboard to be updated whenever a user manipulates a control.


    First, we will need to develop programs which will retrieve our information, which
    is dependent on the type of data the user selects. Remember, the key to successful
    program development is to not reinvent the wheel. We will use some existing open
    source code to make our program as reliable and simple as possible.


    ## Gathering Microsoft Excel, CSV, JSON, and Database Data


    The code included with this chapter contains several data files (`data.csv`, `data.json`,
    and `datatest.xlsx`). The Excel spreadsheet provided was used to design the data
    format and contents used for our testing. The CSV file, JSON file, and database
    table were created by extracting the spreadsheet data and reformatting it for
    each data type. While these programs would not be used in production, it gives
    us examples of how to retrieve information from an Excel spreadsheet and reformat
    it to another data format.


    ```

    rows();

    $file = fopen("data.csv","w");

    foreach ($values as $value) {

    fputcsv($file, $value);

    }

    echo "data.csv created";

    fclose($file);

    } else {

    echo SimpleXLSX::parseError();

    }

    ?>

    Listing 10-1

    createCSV.php

    ```


    One of the popular ways to access Microsoft Excel data using PHP is with the open
    source *SimpleXLSX class* available on GitHub: [`https://github.com/shuchkin/simplexlsx`](https://github.com/shuchkin/simplexlsx).


    This class can be downloaded from the link provided and placed within the `ch10`
    folder after decompression. Code examples are provided at the web location and
    within the comments of the class itself. For your convenience, the files are already
    included within the `ch10` folder on the publisher’s website.


    ```

    use Shuchkin\SimpleXLSX;

    ```


    The class includes a *namespace* (which will make sure it does not conflict with
    other existing classes). The `use` statement declares that any classes or functions
    used will be accessible through the namespace (`Shuchkin`) and the class name
    (`SimpleXLSX`).


    ```

    require_once __DIR__.''/simplexlsx-master/src/SimpleXLSX.php'';

    ```


    The `require_once` statement includes the PHP constant `__DIR__` which returns
    the current directory location. Thus, the class is imported from the `simplexlsx_master`
    source (`src`) directory within the current directory.


    ```

    if ( $xlsx = SimpleXLSX::parse(''testdata.xlsx'') ) {

    $values = $xlsx->rows();

    ```


    The `parse()` method of the `SimpleXLSX` class will retrieve all data from an
    Excel spreadsheet. This data includes more than just the values with the cells.
    Since we only are using the values stored in the cells, we can use the `SimpleXLSX`
    function `rows()` to retrieve the data in all rows. This function creates a two-dimensional
    array containing only the data, which we have named `$values`.


    ```

    $file = fopen("data.csv","w");

    foreach ($values as $value) {

    fputcsv($file, $value);

    }

    echo "data.csv created";

    fclose($file);

    ```


    Using the PHP function `fopen()`, we can create a new file (`data.csv`) and declare
    that we want to write (`w`) to the file. The `foreach` loop will now loop through
    each data item within the `$values` array. The PHP function `fputcsv()` will pass
    the information into the file in comma separated format. Finally, once all information
    has been written, the file is closed using `fclose()`. We changed the format of
    our data with just a few lines of code!


    **Note**


    Visit [`www.php.net/manual/en/function.fopen.php`](https://www.php.net/manual/en/function.fopen.php)
    for more information on `fopen()`. Visit [`www.php.net/manual/en/function.fputcsv.php`](https://www.php.net/manual/en/function.fputcsv.php)
    for more information on `fputcsv()`.


    ```

    rows());

    file_put_contents("data.json", $netJSON);

    echo "data.json created";

    } else {

    echo SimpleXLSX::parseError();

    }

    ?>

    Listing 10-2

    createJSON.php

    ```


    ```

    $netJSON = json_encode($xlsx->rows());

    file_put_contents("data.json", $netJSON);

