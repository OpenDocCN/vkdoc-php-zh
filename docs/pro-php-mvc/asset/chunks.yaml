    \n前两个语句并非特定于选择行，而是建立到数据库的连接，并请求一个用于操作`user`表的接口。我们稍后会将它们移动到一个更好的位置，但理解它们的工作原理很重要。\n\
    \n`Zend_Db`工厂类被简单地用于返回一个数据库适配器实例，其方式与我们自己的数据库工厂类非常相似。同样，`Zend_Db_Table`类返回一个用于查询/操作我们之前创建的`user`数据库表的接口。它支持类似于我们框架和\
    \ `CodeIgniter` 的查询接口。\n\n清单27-3演示了如何修改`user`行。\n\n`www.it-ebooks.info`\n\n第27章\
