  \ 判断题\n\n1. 日志文件对于成功恢复信息很重要。\n2. 数据被序列化以将数据类型转换为字符串。\n3. 更新完成后，所有数据备份副本都可以销毁。\n\
  4. 依赖注入对于保持各层（接口层、业务规则层和数据层）相互独立是必要的。\n5. SQL 脚本文件会更新所有记录，包括那些未更改的记录。\n\n### 简答题/论述题\n\
  \n1. 解释用于纠正已损坏数据文件的过程。\n2. 为什么存储在数据库中的数据通常比存储在文本文件中的数据更安全？\n3. 比较和对比用于更新 XML 数据的方法与用于更新\
  \ MySQL 数据的方法。哪一种更高效？为什么？\n4. 在更新数据时，何时应向系统管理员发送电子邮件？这封电子邮件应包含什么？不应包含什么？为什么？\n5.\
  \ 系统管理员如何确定哪个数据文件是最后一个未损坏的版本？\n\n### 项目\n\n1. 调整第 4 章项目#1 或#2 中的代码，以包含备份和恢复功能。\n\
  2. 为你之前完成的某个项目创建一个完整的存储系统（XML 或 JSON 格式）以及一个备份和恢复系统。该系统应包含用户限制恢复文件数量的功能、调整选定文件内容（更新、插入和删除）的功能，以及针对最新有效数据执行该文件的功能。当过程完成时，任何损坏的文件应自动删除。系统还应保留自己的日志文件以指示何时发生更改。\n\
  \n### 学期项目\n\n1. 更新 ABC 计算机零件库存程序，以包含数据存储（XML 或 JSON 格式）以及完整的备份和恢复功能。应用程序应包含一个变更日志以指示任何数据更改。应包含额外的支持程序，以便轻松恢复任何损坏的数据。你的完整应用程序应使用类似于本章示例所示的逻辑。\n\
  \n"
- "# 8. 身份验证\n\n*（致 Lisa）你拥有可以走得很远的智慧和才华，当你做到的时候，我会在那里向你借钱。*\n\n—巴特·辛普森\n\n## 本章目标/学生学习成果\n\
  \n完成本章后，学生将能够：\n\n*   定义会话并解释它们如何用于身份验证\n*   创建一个对用户登录进行身份验证的 PHP 程序\n*   创建一个注册用户的\
  \ PHP 程序\n*   创建一个允许用户更改密码的 PHP 程序\n*   创建一个记录无效登录尝试的 PHP 程序\n*   创建一个使用当前密码哈希技术的\
  \ PHP 程序\n\n\n\n### 验证与会话\n\n任何关于安全性的讨论都离不开用户 ID/密码认证。当前版本的 PHP 包含许多帮助开发者验证用户的技术。本章将研究其中一种较为简单的方法。\n\
  \n由于登录凭证需要即时验证的特性，认证过程直接访问数据源进行验证（不经过业务逻辑层）。因此，认证过程被视为一个独立的层级，置于应用程序之上以提供访问权限。如您所见，界面层程序只需稍作修改即可限制访问，大部分编码工作都集中在认证层。\n\
  \n除了认证之外，登录过程中还可以确定访问级别。并非所有用户都需要对应用程序拥有完全访问权限。有些用户可能只需要读取权限，有些可能只需要对自己相关的信息具有写入权限，而有些用户（管理员）则需要对整个应用程序拥有完全访问权限。应用程序的每个部分都需要能够确定正确的访问级别，而无需向用户索取额外信息（超出最初登录应用程序时的信息）。\n\
  \n一个登录流程必须允许用户验证应用程序的所有部分。应用程序的每个部分都需要访问由认证层设置的通用属性（如用户 ID 和密码），以验证有效访问和有效访问级别。PHP\
  \ 提供了一种能力，通过声明*会话*，将应用程序的信息存储在服务器内存中。会话被认为包含用户与应用程序的完整交互过程（例如，将资金从储蓄账户转移到支票账户的完整流程）。会话可以在用户登录应用程序时立即建立，在用户注销系统（或应用程序超时或关闭）后关闭。会话关闭时，服务器内存中存储的所有属性都会被垃圾回收器清除。\n\
  \n会话处于活动状态时，属性可以在整个应用程序中存储和共享。通过这种方式，用户 ID 和密码可以存储在会话属性中。应用程序的每个部分都可以通过检查`userid`和`password`属性中是否有值来验证用户是否已登录。\n\
  \n在查看登录认证流程之前，我们先来了解如何判断用户是否已登录系统。本章的示例不包括安全访问级别的验证，但确定这些级别的过程会使用与示例中类似的代码。\n\n\
  *   *编程提示—`session_start`方法调用必须是代码顶部的第一条语句。`<?php`标签和`session_start`之间不能有任何空格或代码。`session_start`方法会生成一个\
  \ HTML 头，如果在方法调用之前存在任何代码，该头将无法正确形成。*\n\n```\n<?php\nsession_start();\nif (!isset($_SESSION['username'])\
  \ || !isset($_SESSION['password'])) {\necho \"<a href='login.php'>Login</a> | <a\
  \ href='register.php'>Create an account</a>\";\n}\nelse {\necho \"Welcome back,\
  \ \" . $_SESSION['username'] . \"\";\n}\n?>\n```\n\n界面层（用户可访问）中的每个程序都应包含类似上述示例的代码。在此示例中，`session_start`方法告知操作系统该程序是现有会话的一部分（该会话在认证层中声明）。系统使用唯一生成的\
  \ ID 来标识每个会话。只要用户（或系统）未关闭会话，会话 ID 就会附加到用户调用的任何包含`session_start`方法的程序上。这使得程序能够访问与当前会话相关的所有属性。\n\
  \nPHP 的`isset`方法（在`if`语句中）可以判断`username`和`password`属性中是否存在值。如果值不存在，则表明用户尚未通过身份认证。会话属性通过`$_SESSION`来获取（和设置）。在上一个示例中，如果任何一个属性未设置，系统会向用户提供登录页面（`login.php`）或注册页面（`register.php`）的链接。如果两个属性都已设置，则会欢迎用户进入系统。用户别无选择，只能登录后才能访问该程序。\n\
  \n```\n<?php\nsession_start();\nif (!isset($_SESSION['username']) || !isset($_SESSION['password']))\
  \ {\necho \"<a href='login.php'>Login</a> | <a href='register.php'>Create an account</a>\"\
  ;\necho \"</nav>\";\n}\nelse\n{\necho \"Welcome back, \" . $_SESSION['username']\
  \ . \"\";\n?>\n\n<h1>Dog Object</h1>\n<h2>Dog Object Creator</h2>\n<p>Please complete\
  \ ALL fields. Please note the required format of information.</p>\n<form>\n<p>Enter\
  \ Your Dog's Name (max 20 characters, alphabetic) <input type='text' name='dog_name'></p>\n\
  <p>Select Your Dog's Color:\n<select name='dog_color'>\n<option value='Brown'>Brown</option>\n\
  <option value='Black'>Black</option>\n<option value='Yellow'>Yellow</option>\n<option\
  \ value='White'>White</option>\n<option value='Mixed'>Mixed</option>\n</select>\n\
  </p>\n<p>Enter Your Dog's Weight (numeric only) <input type='text' name='dog_weight'></p>\n\
  <p><input type='button' value='Create Your Dog' onclick='AjaxRequest(\"e5dog_interface.php\"\
  );'></p>\n<p>Select Your Dog's Breed</p>\n</form>\n\n<?php\n}\n?>\n```\n\n**示例 8-1**\
  \ — 包含用户 ID/密码验证的`lab.php`文件\n\n在示例 8-1 中，验证代码放在程序的顶部。`else`语句必须包含用户登录系统后需要执行的所有代码。由于该程序的代码是\
  \ HTML（和 CSS）代码，因此`if`语句必须包裹在现有代码周围。`else`语句的右花括号移动到了代码的底部（在所有 HTML 标签之后）。PHP 允许您根据需要多次关闭\
  \ PHP 代码（通过`?>`）并重新打开 PHP 代码（通过`<?php`）。在此示例中，PHP 代码在程序顶部（在`else`语句中）右花括号之前关闭。然后，在代码底部重新打开\
  \ PHP 代码，以包含一个单独的右花括号，用于闭合`else`语句。这样，`else`语句就包裹了所有现有代码。用户现在只有在登录的情况下才能访问此部分代码。\n\
  \n由于`lab`程序中现在包含 PHP 代码，文件后缀必须从`.html`更改为`.php`。否则服务器将不会执行 PHP 代码。\n\n现在，我们来看看如何通过创建登录程序来填充会话属性。首先，我们来看一下用于向用户请求信息的\
  \ HTML 代码。\n\n```\n<form action=\"login.php\" method=\"post\">\nUsername: <input\
  \ type=\"text\" name=\"username\" pattern=\".{8,}\" title=\"Eight or more characters\"\
  >\nPassword: <input type=\"password\" name=\"password\" pattern=\"(?=.*\\d)(?=.*[a-z])(?=.*[A-Z]).{8,}\"\
  \ title=\"Must contain at least one number and one uppercase and lowercase letter,\
  \ and at least 8 or more characters\">\n<input type=\"submit\" value=\"Login\">\n\
  </form>\n```\n\nHTML5 没有包含最小长度参数。但是，可以使用`pattern`参数（配合正则表达式）来设定最小长度。在上一个示例的`username`标签中，模式`\"\
  .{8,}\"`要求用户至少输入八个字符。为了密码安全，需要更复杂的模式。在密码示例中，除了最少八个字符的要求外，还要求至少包含一个数字（`?=.*\\d`）、一个大写字母（`?=.*[A-Z]`）和一个小写字母（`?=.*[a-z]`）。\n\
  \n*   *安全与性能—提供的 HTML 过滤用于告知用户可能存在的输入错误。在登录过程中，您不是在存储信息，而是在将信息与已存储的信息进行比较。您无需担心任何潜在有害信息被传递到文本框中。任何有害信息都不会与已存储的有效信息匹配。用户将收到无效的用户\
  \ ID/密码消息。*\n\n```\n// validate process not shown\n$_SESSION['username'] = $_POST['username'];\n\
  $_SESSION['password'] = $_POST['password'];\n// Redirect the user to the home page\n\
  header(\"Location: http://www.asite.com/lab.php\");\n```\n\n\n\n假设我们已经将输入的信息与有效的用户\
  \ ID 和密码列表进行了验证（我们很快会探讨这一过程），那么我们可以将有效的用户 ID 和密码信息存入会话变量。之后，可以使用 PHP 的`header`方法将应用程序重定向到下一个要执行的程序（`lab.php`）。只要`lab.php`包含了`session_start`方法（如前所示），它就能访问这些会话变量。\n\
  \n```\n用户名：\n密码：\n```\n\n整合这些部分需要一个`if`语句来判断用户是否已输入用户 ID 和密码。如果用户尚未输入，则显示用于请求输入的\
  \ HTML 代码。如果信息已经输入（并且通过所示的 HTML5 模式表达式验证为有效），则执行语句的`else`部分（将值存入会话变量并调用`lab.php`程序）。这为我们提供了接受用户\
  \ ID 和密码、验证其存在性、并在验证通过后调用接口层程序的基本框架。当然，在调用程序之前，我们需要对用户 ID 和密码进行身份验证。\n\n*如果用户未输入用户\
  \ ID/密码或输入的并非有效用户 ID/密码，可能会产生未经授权的头部消息。这将自动导致系统请求用户输入用户 ID/密码。这种技术相当直接。然而，过去曾有报告称某些浏览器无法正常使用此技术。此外，自行设计技术可以让您制作的登录屏幕与网站其他部分保持一致的风格。*\n\
  \n```\nheader('WWW-Authenticate: Basic realm=\"ABC Canine\"');\nheader('HTTP/1.0\
  \ 401 Unauthorized');\n```\n\n*关于验证用户 ID 和密码的其他方法的更多信息，请访问* [www.php.net/manual/en/features.http-auth.php](http://www.php.net/manual/en/features.http-auth.php)*.*\n\
  \n```\n$valid_useridpasswords = array(\"sjohnson\" => \" working\");\n$valid_userids\
  \ = array_keys($valid_useridpasswords);\n$userid = $_SESSION['username'];\n$password\
  \ = $_SESSION['password'];\n$valid = (in_array($userid, $valid_userids)) && ($password\
  \ == $valid_useridpasswords[$userid]);\nIf($valid) { header(\"Location: http://www.asite.com/lab.php\"\
  );}\n```\n\n有几种方法可以对用户 ID 和密码进行身份验证。如果您创建的系统不需要用户 ID 和密码进行更改，您可以使用数组。在前面的例子中，`$valid_useridpasswords`关联数组包含了有效用户\
  \ ID 和密码的组合。PHP 方法`array_keys`将所有键（在此例中为用户 ID）放入一个单独的数组（`$valid_userids`）中。在会话变量被存入`$userid`和`$password`之后，使用\
  \ PHP 的`in_array`方法来判断用户 ID 和密码的组合是否正确。`in_array`用于判断用户 ID 是否存在于数组中。然后，使用用户 ID 作为下标从`valid_useridpasswords`数组中取出密码，并与`$password`中的值进行比较。如果用户\
  \ ID 存在且密码相同，则一切有效。`$valid`将为`TRUE`。如果其中任何一个（或两者）无效，`$valid`将为`FALSE`。如果`$valid`为`TRUE`，应用程序将重定向到`lab.php`程序。\n\
  \n从技术上讲，会话中的属性是受保护的，无法从会话外部进行任何访问。然而，过去曾有报道称黑客程序突破了这种安全性并访问了会话信息。在此例中，如果用户 ID 和密码存储在会话变量中并通过互联网传递给另一个程序，黑客可能获取到这些信息。\n\
  \n如果用户 ID 和密码存储在外部文件或数据库中，这些信息也会在程序外部传输。一旦这些信息驻留在文件或数据库中，程序将不再能控制它们的安全性。这可能让黑客有机会访问这些信息。如前所述，安全性需要程序员、数据管理员和网络管理员共同努力。\n\
  \n通常的做法是对密码进行哈希处理，以降低黑客发现身份验证信息（或任何其他安全信息）的机会。自 PHP 5.5 起，可以使用`password_hash`方法来保护密码安全。\n\
  \n*编程注意事项——在存储密码的哈希版本时应谨慎。哈希结果的大小会随着新哈希版本的推出而增加。255 个字符的大小很可能在多年内都足够使用。此哈希所需的毫秒数会随着加密的大小和类型而增加。高级程序员可能希望在自己的服务器上测试时间成本。*\n\
  \n*有关哈希处理的更多信息，请访问* [www.php.net/manual/en/function.password-hash.php](http://www.php.net/manual/en/function.password-hash.php)*.*\n\
  \n*编程注意事项——您不能简单地将由 PHP 的`password_hash`方法创建的哈希密码进行直接比较。生成的哈希包含加密类型和哈希后的密码。自 PHP\
  \ 7.0.0 起，此方法使用默认的盐值设置，并且不允许其他盐值选项。*\n\n您只需替换示例中的一行代码即可验证密码。您可以将\n\n```\n$valid\
  \ = ((in_array($userid, $valid_userids)) && ($password == $valid_useridpasswords[$userid]));\n\
  ```\n\n替换为\n\n```\n$valid =( (in_array($userid, $valid_userids)) && (password_verify($password,\n\
  $valid_useridpasswords[$userid]));\n```\n\n如果您将哈希后的密码放入`$valid_useridpasswords`数组中，则验证技术无需任何其他更改。PHP\
  \ 的`password_verify`方法将对用户提供的密码进行哈希处理，并与现有密码进行比较。如果匹配，则返回`TRUE`。\n\n\n\n当使用 XML\
  \ 或 JSON 文件时，可以使用与第 7 章中`dogdata.php`程序构造器相同的逻辑来检索有效的用户 ID 和密码信息。唯一需要修改的是确定用户 ID\
  \ 和密码文件位置的`if`语句，以及构造器中的最后一行，将生成的数组放入`$valid_useridpasswords`而非`dogs_array`。\n\n\
  ```\nFredfred\n$2y$10$VosI32FejL.bOMaCjGbBp.Jre6Ipa.tLYQrVqj9kiVpef5zZ25qQK\n\n\
  Petepete\n$2y$10$FdbXxIVXmVOHtaBNxB8vzupRBJFCqUyOTJXrlpNdrL0HKQ/U.jFHO\n```\n\n\
  假设 XML 的格式与狗数据 XML 文件（如前所示）类似，则可以使用类似的逻辑来检索信息。\n\n```\n$valid_useridpasswords =\
  \ json_decode($json,TRUE);\n$userid = $_POST['username'];\n$password = $_POST['password'];\n\
  foreach($valid_useridpasswords as $users)\n{\nforeach($users as $user)\n{\n$hash\
  \ = $user['password'];\nif((in_array($userid, $user)) && (password_verify($password,$hash)))\n\
  {\n$_SESSION['username'] = $userid;\n$_SESSION['password'] = $hash;\nheader(\"Location:\
  \ lab.php\");\n}\n}\n}\n```\n\n使用`json_decode`方法创建的数组与从`dog_data` XML 文件创建的数组格式类似。它需要两个`foreach`循环，一个用于遍历“users”数组，另一个用于遍历“user”数组。然后可以使用`in_array`方法判断用户\
  \ ID 是否存在于 user 数组中。如果存在，则使用 PHP 方法`password_verify`将密码与哈希密码进行比较。此方法使用哈希密码的第一部分来检索关于哈希技术和盐值的信息。盐值是一个自动生成的值，用于生成哈希密码。如果密码匹配，则将用户\
  \ ID 和哈希密码（`$hash`）保存为会话变量。然后调用主程序（参见示例 8-1）。\n\n> **注意**：在 PHP 5.5 中，可以调整盐值。在 PHP\
  \ 7 中，此选项已被弃用，因为它被认为是不必要的系统资源使用。\n\n```\nload( 'e7dog_applications.xml' );\n$searchNode\
  \ = $xmlDoc->getElementsByTagName( \"type\" );\nforeach( $searchNode as $searchNode\
  \ )\n{\n$valueID = $searchNode->getAttribute('ID');\nif($valueID == \"UIDPASS\"\
  )\n// changed value to UIDPASS\n{\n$xmlLocation =\n$searchNode->getElementsByTagName(\
  \ \"location\" );\n// change $this->dog_data_xml to dog_data_xml\n$dog_data_xml\
  \ =\n$xmlLocation->item(0)->nodeValue;\nbreak;\n}\n}\n}\nelse\n{\nthrow new Exception(\"\
  Dog applications xml file missing or corrupt\");\n}\n$xmlfile = file_get_contents($dog_data_xml);\n\
  $xmlstring = simplexml_load_string($xmlfile);\nif ($xmlstring === false) {\n$errorString\
  \ = \"Failed loading XML: \";\nforeach(libxml:get_errors() as $error) {\n$errorString\
  \ .= $error->message . \" \" ;  }\nthrow new Exception($errorString); }\n$json =\
  \ json_encode($xmlstring);\n// changed array name to $valid_useridpasswords\n$valid_useridpasswords\
  \ = json_decode($json,TRUE);\n// ...... code to verify userid and password ....\n\
  $userid = $_POST['username'];\n$password = $_POST['password'];\nforeach($valid_useridpasswords\
  \ as $users) {\nforeach($users as $user) {\n$hash = $user['password'];\nif((in_array($userid,\
  \ $user)) && (password_verify($password,$hash))) {\n$_SESSION['username'] = $userid;\n\
  $_SESSION['password'] = $password;\n$login_string = date('mdYhis') .\n\" | Login\
  \ | \" . $userid . \"\\n\";\nerror_log($login_string,3,$user_log_file);\nheader(\"\
  Location: e7lab.php\");\n} }  } }\n}\ncatch(Exception $e)\n{\necho $e->getMessage();\n\
  }\n// code below executes if the user has not logged in or if it is an invalid login.\n\
  ?>\n\n用户 ID 必须包含八个或更多字符。\n密码必须包含至少一个数字、一个大写字母和一个小写字母，并且总长度至少为 8 个字符。\n用户名： \n密码：\n\
  \n示例 8-2\n包含 XML 用户 ID/密码验证的 login.php 文件\n```\n\n除了提到的代码外，示例 8-2 还包含一个`try catch`块来捕获抛出的异常，并调用用户日志文件记录成功登录系统的信息。\n\
  \n#### JSON 数据\n\n要使用 JSON 数据代替 XML 数据，示例 8-2 只需包含第 7 章所示的变化。`userid`和`password`的\
  \ JSON 数据也需要按如下格式进行格式化。\n\n```\n{\"user\":\n[\n{\"userid\":\"Fredfred\",\"password\"\
  :\"$2y$10$VosI32FejL.bOMaCjGbBp.Jre6Ipa.tLYQrVqj9kiVpef5zZ25qQK\"},\n{\"userid\"\
  :\"Petepete\",\"password\":\"$2y$10$FdbXxIVXmVOHtaBNxB8vzupRBJFCqUyOTJXrlpNdrL0HKQ\\\
  /U.jFHO\"}\n] }\n```\n\n#### MySQL 数据\n\n更常见且通常更安全的方式是在数据库中存储用户 ID 和密码信息。数据库可以使用用户\
