  根据 Dries 的帖子“帮助 Drupal.org 购买一台专用服务器”，仅在 6 月份，`drupal.org` 就产生了 100GB 的流量，提供了超过
  300 万个页面；用他的话说，“我们当前的服务器已经不够用了。”给 Drupal 社区的信息开头是：“不少人指出 `drupal.org` 最近变慢了。我们知道它很慢，并且一直在努力优化
  `drupal.org`... 事实是，由于 Drupal 越来越受欢迎，服务器几乎全天候处于饱和状态。这解释了 `drupal.org` 性能不佳的原因。”^(11)




  接着，这篇文章概述了一项将 `drupal.org` 迁移到由俄勒冈州立大学开源实验室（OSUOSL, OSL）托管的新服务器的计划。该开源实验室于 2004
  年 1 月正式成立，其既定使命是“帮助加速全球范围内对开源软件的采纳，并协助开发和使用它的社区。”^(12) 这些自由及开源软件的“仙女教母”在 `drupal.org`
  服务器崩溃事件发生前两个月，就已经向 Drupal 资深人士 Jeremy Andrews 伸出了援手；当 Jeremy 开始为 `http://kerneltrap.org`
  寻找新的托管主机时，OSL 是他联系的第一家机构。


  作为 OSL 的副主任，Scott Kveton 向 Jeremy 解释道：“开源实验室的目标是将自由及开源软件社区聚集在一起，从而促进思想和人员的交叉融合，有助于营造一种围绕开源进行创新的氛围。”
  为实现这一目标，到 2005 年年中，OSL 已具备得天独厚的优势，托管了包括 Arklinux、Debian GNU/Linux、Freenode.net、Gentoo
  Linux、Mozilla 基金会、PowerPC 内核档案库和 SPI 在内的项目。


  OSL 主要靠密切关注自由及开源软件的“小道消息”，并在需要时适时提供帮助，从而积累了这份令人印象深刻的参与者名单；正如 Scott 向 Jeremy 解释的那样，OSL
  团队会听说“某某项目的一台机器坏了需要帮助，或者某某组织的基础设施快要达到极限，需要援手。”


  这几乎完美地描述了 2005 年 6 月 Drupal 所处的境况。Drupal 也符合 OSL 工作人员用来评估潜在被托管方的筛选标准：它专注于社区；拥有“投入、充满活力，并且最重要的是，务实的领导层”；其社区能与
  OSL 现有托管项目的社区良好互动；它将利用 OSL 提供的服务来帮助其社区发展；并且 OSL 的资源和服务能使社区专注于快速创新（而不仅仅是维持基本运转）。


  > 让我们面对现实吧，开源正在世界各地获得发展势头。伴随着它的成功，本已捉襟见肘的资源面临着额外的压力。我们希望能成为那些不想沦为提供帮助的大公司附庸的开源项目的一个选择。我们并非反公司，也非反对靠开源赚钱；我们只是知道，项目希望确保其社区的未来，因此在选择合作伙伴时非常谨慎。我们知道这需要时间，就像开源世界中的一切事物一样；关键在于我们建立的关系。

  >

  > ——Scott Kveton，2005 年^(13)


  就在 Drupal 服务器崩溃前的几周，合作协议的条款已经敲定：OSL 将提供免费托管——包括机架空间、带宽、电力、域名服务、数据库、备份和邮件中继。Drupal
  社区所需做的只是提供硬件。^(14) 所需设备的标价为 3,000 美元。


