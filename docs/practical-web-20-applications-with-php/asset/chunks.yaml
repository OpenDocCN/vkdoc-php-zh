    # 第 3 章：用户认证、授权与管理


    在第 2 章中，我们了解了模型-视图-控制器设计模式，该模式使我们能够轻松地将应用程序逻辑与显示逻辑分离，并且我们使用`Zend_Controller_Front`实现了它。现在，我们将扩展应用程序控制器以处理用户认证、用户授权和用户管理。


    在这一阶段，您可能会想知道*认证*（Authentication）和*授权*（Authorization）之间的区别。


    - **认证：** 确定用户是否确实为其所声称的身份。这通常通过使用唯一的用户名（他们的*身份*）和密码（他们的*凭证*）来执行。

    - **授权：** 确定用户是否被允许访问特定的*资源*，前提是我们已通过认证过程知道他们是谁。授权还决定了未经身份验证的用户可以执行哪些操作。在我们的应用程序中，资源本质上是一个特定的操作或页面，例如提交新博客文章的操作。


    在本章中，我们将使用 Zend Framework 的`Zend_Auth`组件在应用程序中设置用户认证。这包括创建用于存储用户详细信息的数据库表。然后，我们将使用`Zend_Acl`组件来管理应用程序中每个用户可以访问的资源。此外，我们必须将权限系统与`Zend_Controller_Front`集成起来。


    ## 创建用户数据库表


    由于我们的应用程序将为多个用户维护用户账户，我们需要跟踪这些用户账户。为此，我们将创建一个名为`users`的数据库表。该表将为每个用户包含一条记录，并存储其用户名和密码，以及其他重要详细信息。


    访问我们 Web 应用程序的用户将分为三类：*访客*、*会员*和*管理员*。访问应用程序的用户在登录为会员之前将被自动归类为访客。为了区分会员和管理员，`users`表将包含一个用于表示每个用户*角色*的列。在实现基于`Zend_Acl`的访问控制列表时，我们将使用此列。

    '
- fmt: "■**Note** In a more complex system, you might assign multiple roles to users;\
    \ however, for the sake of simplicity we will allow only one role per user. Any\
    \ user classed as an administrator will also be able to perform all functions\
    \ that a member can. Additionally, you could also use another table to store user\
    \ types, but once again, for the sake of simplicity we will forego this and keep\
    \ a static list of user types in our code.\n\nThe core data we will store for\
    \ each user in the `users` table will be as follows:\n\n- `user_id`: An internal\
    \ integer used to represent the user.\n- `username`: A unique string used to log\
    \ in. In effect, this will be a public identifier for the user. We will display\
    \ the `username` on blog posts and other publicly available content, rather than\
    \ their real name, which many users prefer to keep anonymous.\n- `password`: A\
    \ string used to authenticate the user. We will store passwords as a hash using\
    \ the `md5()` function. Note that this means passwords cannot be retrieved; instead\
    \ they must be reset. We will implement all code required to do this.\n- `user_type`:\
    \ A string used to classify the user (either `admin` or `member`, although you\
    \ will easily be able to add extra user types in the future based on what you\
    \ learn in this book).\n- `ts_created`: A timestamp indicating when the user account\
    \ was created.\n- `ts_last_login`: A timestamp indicating when the user last logged\
    \ in. We will allow this field to have a `null` value, since the user won’t have\
    \ yet logged in when the record is created.\n\nListing 3-1 shows the SQL commands\
    \ required to create the `users` table in MySQL. All SQL schema definitions are\
    \ stored in the `schema-mysql.sql` file in the main application directory. If\
    \ you’re using PostgreSQL, you can find the corresponding schema in `schema-pgsql.sql`\
    \ instead.\n\n■**Note** How you choose to store the database schema for your own\
    \ web applications is entirely up to you. I’ve simply structured it this way so\
    \ you can easily refer to it as required (and so you have easy access to it when\
    \ downloading the code for this book).\n\n**Listing 3-1.** *SQL Used to Create\
    \ the Users Table in MySQL (`schema-mysql.sql`)*\n\n```\ncreate table users (\n\
    \  user_id serial not null,\n  username varchar(255) not null,\n  password varchar(32)\
    \ not null,\n  user_type varchar(20) not null,\n  ts_created datetime not null,\n\
    \  ts_last_login datetime,\n  primary key (user_id),\n  unique (username)\n) type\
    \ = InnoDB;\n```\n\nThe `user_id` column is defined as type `serial`, which is\
    \ the same as using `bigint unsigned not null auto_increment`. I personally prefer\
    \ using `serial`, as it is shorter and simpler to type, and it also works in PostgreSQL.\n\
    \nThe `username` column can be up to 255 characters in length, although we will\
    \ put a restriction on this length in the code. The `password` will be stored\
    \ as an MD5 encrypted string, so this column only needs to be 32 characters long.\n\
    \nNext is the `user_type` column. The length of this column isn’t too important,\
    \ although any new user types you add will be limited to 20 characters (this is\
    \ only an internal name, so it doesn’t need to be overly descriptive). This string\
    \ is used when performing ACL checks.\n\nFinally, there are the two timestamp\
    \ columns. MySQL does in fact have a data type called `timestamp`, but I chose\
    \ to use the `datetime` type instead, as MySQL will automatically update columns\
    \ that use the `timestamp` type. In PostgreSQL, you need to use the `timestamptz`\
    \ data type instead (see the `schema-pgsql.sql` file for the table definition).\
    \ The following “Timestamps” section provides more details about how timestamps\
    \ work in PHP.\n\n■**Tip** Listing 3-1 instructs MySQL to use the `InnoDB` table\
    \ type when creating a table, thereby providing us with SQL transaction capability\
    \ and enforcing foreign key constraints. The default table type used otherwise\
    \ is `MyISAM`.\n\nYou must now create this table in your database. There are two\
    \ ways to do this. First, you can pipe the entire `schema-mysql.sql` file into\
    \ your database using the following command:\n\n```\n# mysql -u phpweb20 -p phpweb20\
    \ < schema-mysql.sql\n```\n\nWhen you type this command you will be prompted to\
    \ enter your password. This will create the entire database from scratch.\n\n\
    Alternatively, you can connect directly to the database, and copy and paste the\
    \ table schema using the following command."
