    \ APress Media, LLC, part of Springer Nature.\n\nThe registered company address\
    \ is: 1 New York Plaza, New York, NY 10004, U.S.A.\n\n# Section 1. Preface\n\n\
    In this book, we will learn to construct a robust and efficient API architecture\
    \ that revolves around operations. By the end of this, you will have the knowledge\
    \ and necessary skills to build an operation-oriented API using the PHP programming\
    \ language and the Symfony framework.\n\nThis book is designed to provide you\
    \ with a comprehensive understanding of how to create a single API endpoint that\
    \ embraces the concept of operations. We will utilize the robust features of Symfony\
    \ to build an environment where operations are the focal point of our API design.\n\
    \nPlease note that this book assumes a certain level of familiarity with the Symfony\
    \ framework. It is not intended to serve as a comprehensive guide of Symfony but\
    \ rather as a focused exploration of its powerful features for building an operation-oriented\
    \ API.\n\nIt’s also important to clarify that this book does not delve into the\
    \ development of specific operations themselves. While we may use operation examples\
    \ like `SendPayment` for illustrative purposes, the primary goal is to demonstrate\
    \ how to construct the necessary code to discover, manage, and execute operations.\n\
    \nThroughout the chapters, we will cover essential Symfony topics such as dependency\
    \ injection features, security authentication, and background operations with\
    \ Symfony Messenger.\n\n# Section 2. CRUD API Endpoints and Operation-Oriented\
    \ Endpoints\n\n## CRUD-Based API Endpoints\n\nDevelopers usually build APIs using\
    \ the REST approach, that is, focusing on resources. To expose the operations\
    \ that clients can perform over those resources, we usually follow the CRUD acronym,\
    \ which means **CREATE**, **READ**, **UPDATE**, and **DELETE**. Each word represents\
    \ an operation, so it means that for each resource we can:\n\n- Create a new element\n\
    - Read from the resource listing the current elements\n- Update an existing element\n\
    - Remove an existing element\n\nWhen we refer to a resource, we can think about\
    \ a collection of elements (for instance, a book resource).\n\nWhen defining the\
    \ resource API calls, we normally set up an HTTP endpoint for each CRUD operation\
    \ we want to expose. Let’s see an example for a book resource:\n\n- **GET** `/api/v1/book`\n\
    - **GET** `/api/v1/book/{id}`\n- **POST** `/api/v1/book`\n- **PATCH** `/api/v1/book/{id}`\n\
    - **DELETE** `/api/v1/book/{id}`\n\nAs you can see above:\n\n- The **GET** endpoints\
    \ perform the **READ** operations.\n- The **POST** endpoint performs the **CREATE**\
    \ operation.\n- The **PATCH** endpoint performs the **UPDATE** operation.\n- The\
    \ **DELETE** endpoint performs the **DELETE** operation.\n\nThis approach covers\
    \ basic operations. What happens when we want to expose more complex operations?\
    \ Let’s explore it in the next section.\n\n## Operation-Oriented Endpoints\n\n\
    Imagine an e-commerce API with an endpoint for orders (`api/v1/orders/{orderId}`)\
    \ where we want to approve an order placed by a customer. With a simple PATCH\
    \ request, you might send a payload like this:\n\n```\nPATCH api/v1/orders/{orderId}\n\
    {\n\"status\": \"approved\"\n}\n```\n\nThis approach works, but it doesn’t explicitly\
    \ convey the intent behind the update. The server needs to understand that `approved`\
    \ refers to approving the order, not just changing a generic `status` field. Approving\
    \ an order may involve more tasks than just updating the value of the `status`\
    \ field.\n\nLet’s consider the operation we want to execute as a resource. To\
    \ do it, we would create an order operation resource that would receive the operation\
    \ to perform and the data required to perform this operation:\n\n```\nPOST /api/v1/orders/operation\n\
    {\n\"operation\" : \"ApproveOrder\",\n\"data\" : {\n\"id\" : 1559877444\n}\n}\n\
    ```\n\nThis is a clearer approach since the payload operation name explicitly\
    \ communicates the purpose of the request. It helps us to go one step further\
    \ and specify business actions through an operation endpoint. However, this approach\
    \ could complicate the generation of API documentation since we only have a single\
    \ endpoint. Let’s consider the following alternatives:\n\n```\nPOST /api/v1/operation/approve-order\n\
    {\n\"id\" : 1559877444\n}\nPATCH /api/v1/orders/:id/approve-order\n```\n\nThe\
    \ above alternatives would facilitate the creation of documentation, and at the\
    \ same time, our API would continue to focus on the operation.\n\nWe will see\
    \ during the last section of Chapter 1 that we can define our endpoints in other\
    \ ways while keeping our API operationally oriented. The way to discover, retrieve,\
    \ and execute operations will be the same regardless of how we define our endpoints.\n\
    \nThis approach requires discovering the operation to be executed, obtaining the\
    \ associated handler, and executing the operation using the data received. We\
    \ will learn how to code it using PHP and the Symfony framework during the course\
    \ of the book.\n\n## Conclusion\n\nIn this section, we have exposed the advantages\
    \ we can take when using an operation-oriented approach to build our API. The\
    \ next section will give us a brief guide about what Symfony components and backend\
    \ services we are going to use before starting to write code."
