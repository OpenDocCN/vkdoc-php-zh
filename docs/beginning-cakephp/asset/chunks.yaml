    **清单 14-16.** *在视图中将每个相关文章显示为链接* 1


    ```

    <? if (isset($children)): ?>

    <? foreach($children as $child): ?>

    <? foreach($child[''Post''] as $post): ?>

    <?=$html->link($post[''name''],array(''controller''=>''posts'',''action''=>➥

    ''view'',''id''=>$post[''id'']));?>

    <? endforeach;?>

    <? endforeach;?>

    <? endif;?>

    ```


    你可以看到，清单 14-16 是一个遍历由控制器传递的 `$children` 数组的循环（如清单 14-15 所示）。由于我只关心显示与给定标签相关的所有文章，因此我遍历了每个标签记录中包含的每篇文章，所以第
    2 行和第 3 行都包含一个 `foreach()` 函数。第 1 行和第 7 行是一种先测试 `$children` 变量中是否存在任何内容的方法。使用第
    4 行的 HTML 辅助函数，我可以为每篇文章渲染一个链接，该链接经过反向路由并包含文章的名称。要调整每篇文章的显示方式，只需重新设计第 4 行以满足你自己的样式；在流程的这一点上，文章记录的全部内容都可以通过
    `$post` 获取。


    就这样！得益于 `Tree` 行为及其 `children()` 函数，所有相关的文章，包括那些由相关子标签所关联的文章，都显示在此视图中。将同样的过程应用于博客的其他区域，用户可以更快速地访问分类文章。并且，由于
    `Tree` 行为在管理层级结构，管理员的工作量也减少了，他们只需在“标签添加”和“标签编辑”视图中设置父 ID 值即可。`Tree` 行为还让我不必编写自己的一套函数来查找子节点及其关联文章。


    ## 使用 Tree 行为的其他函数


    与 `children()` 函数类似，`Tree` 行为的其他函数可以通过引用模型，在模型或控制器中调用。在控制器中，通过输入模型名称并调用所需的 `Tree`
    行为函数来实现，*而不要*输入行为名称：


    ```

    $this->Model->children($id); // 这种方式可行

    $this->Model->Tree->children($id); // 这种方式不可行

    ```


    在模型中，模型名称被省略，就像引用其他模型函数一样，例如：


    ```

    $this->children($id); // 这种方式可行

    $this->Tree->children($id); // 这种方式不可行

    $this->Model->children($id); // 这种方式也不可行

    ```


    ### childCount


    `childCount()` 函数返回给定父 ID 的子节点数量。


    **`childCount( &$model, id[mixed], direct[bool] )`**


    当 `id` 设置为 `false` 时，将读取所有顶层节点；否则，仅将提供的 ID 节点作为父节点读取；当 `direct` 设置为 `true` 时，仅统计直接子节点。


    09775ch14final 7/1/08 9:57 PM 第 264 页


    **264**


    第 14 章 ■ 数据源与行为


    ### generateTreeList


    此函数是一个便捷方法，用于返回一个层级数组，该数组可用于制作 HTML 选择框或面包屑导航。


    **`generateTreeList( &$model, conditions[mixed], keyPath[string],`** ➥

    **`valuePath[string], spacer[string], recursive[int] )`**


    - `conditions` = null：作为字符串或数组的 SQL 条件（类似于在 `find()` 模型函数中使用的条件）

    - `keyPath` = null：指向键的字符串路径，例如 `{n}.Tag.name`

    - `valuePath` = null：指向值的字符串路径；类似于 `keyPath`

    - `spacer` = ''_''：对于每个处于父节点之下的层级节点，该字符将放置在返回的列表项之前；例如，父节点的孙节点在其名称前会返回两个分隔符

    - `recursive` = -1：返回数据的递归值


    ### moveUp 和 moveDown


    要在不更改父节点的情况下重新排序给定节点，请使用 `moveUp()` 和 `moveDown()` 函数。


    **`moveUp( &$model, id[int], number[mixed] )`**

    **`moveDown( &$model, id[int], number[mixed] )`**


    这些函数会根据 `number` 中设置的值，移动节点 `id`，换句话说，动态调整左值和右值字段。如果 `number` 设置为 `true`，则 `moveUp()`
    会将节点设置到最顶或第一个位置；`moveDown()` 会将节点设置到最后一个位置。


    ### getParentNode 和 getPath


    要获取给定子节点的父节点，请使用 `getParentNode()`。只需为给定节点提供一个 ID，此函数就会找到其父节点并返回其内容。要检索到给定节点的路径，请提供记录的
    ID，`getPath()` 将返回一个从最顶层节点到当前节点的数组。此函数对于显示面包屑链接非常方便。


    ### recover、removeFromTree、setParent、setup 和 verify


    恢复损坏的树（即由 `Tree` 行为重新对齐左值和右值字段）通过 `recover()` 函数完成。调用 `recover()` 时无需传递值；只需确保相关数据库表在
    `$actsAs` 属性中正确设置即可。


    要从树中移除一个节点，请使用 `removeFromTree()`。只需提供节点 ID，此函数就会从树中移除该节点，并将其所有剩余子节点重新向上提升一级父级。


    09775ch14final 7/1/08 9:57 PM 第 265 页


    第 14 章 ■ 数据源与行为


    **265**


    通常，如本章所述，只要 `parent_id` 在视图中正确设置并通过 `$this->data` 传递给模型，`Tree` 行为会自动分配父节点。然而，`setParent()`
    函数作为一个向后兼容的方法，可用于手动分配父节点。使用时，`setParent()` 将提供的 ID 值作为其第一个参数，并将匹配的记录分配为当前正在保存的记录的父节点。此函数应在模型执行保存操作时使用。


    要在某个动作或模型函数中手动调整 `$actsAs` 中使用的设置，请使用 `setup()` 函数。第一个参数必须是一个与 `$actsAs` 属性结构相同的数组；换句话说，按照格式化
    `$actsAs` 属性的方式设置一个数组，并将其传递给 `setup()`。然后，在调用行为时，新设置将应用于模型。


    要测试模型是否拥有一个有效的树，请使用 `verify()` 函数。这里不需要任何参数。只需在模型或控制器中调用此函数，如果模型拥有有效的树，它将返回 `true`
    值。


    ## 使用 ACL 和 Translate 行为


    到目前为止，我已经详细解释了 `Tree` 行为，以演示如何在你的 Cake 应用程序中使用行为。只需添加一行代码（具体来说，就是设置 `$actsAs`
    属性），你就可以扩展模型以使其表现不同。`Tree` 行为会动态调整标签，使其包含它们之间的关联，你无需在模型中再编写任何函数来维护数据树（当然，除非你想增强该树以包含更多方法和结构）。但是，你可以在相对较短的时间内为你的数据库添加基本的树结构。


    其他行为的工作方式类似，这意味着它们为模型执行类似的任务，使得移动数据更加容易。不幸的是，另外两个内置行为，即 `ACL` 和 `Translate`，比
    `Tree` 行为复杂得多。（`Containable` 行为易于使用，但我稍后会对此行为进行更详细的说明。）管理访问控制列表（`ACL` 的全称）的本质是在应用程序中建立用户控制的最复杂任务之一。深入研究此行为对许多开发者来说肯定有用，但这也会超出本书的范围。我仅在此提请你注意，并鼓励你，如果你的应用程序需要为各种用户组和单个用户建立详细的层级结构，请查看这个内置行为。

