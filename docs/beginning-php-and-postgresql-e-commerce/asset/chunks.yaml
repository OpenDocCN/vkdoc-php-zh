    **How It Works: Presentation Tier Changes**


    This was a long exercise, wasn’t it? And yet, to make the most out of it, you
    still need to go through a few more exercises to implement tax and shipping charges.
    At that moment, all your customer-handling functionality will be completed, and
    you’ll only be left with adding an order pipeline and credit card processing support.


    Load your web site to make sure your newly added code works, and then proceed
    by adding tax and shipping charges support.


    **Handling Tax and Shipping Charges**


    One feature that is common to many e-commerce web sites is adding charges for
    tax and/or shipping. Obviously, this isn’t always the case—digital download sites
    have no need to charge for shipping, for example, because no physical shipment
    is involved. However, you’ll probably want to include additional charges of one
    kind or another in your orders.


    In fact, this can be very simple, although not always. It really depends on how
    complicated you want to make things. In this chapter, we’ll keep things simple
    and provide basic but extensible functionality for both tax and shipping charges.
    First, let’s discuss the issues.


    **Tax Issues**


    The subject of tax and e-commerce web sites has a complicated history. Early on,
    you could usually get away with anything. Taxing was poorly enforced, and many
    sites simply ignored tax completely. This was especially true for international
    orders, where it was often possible for customers to avoid paying tax much of
    the time—unless orders were intercepted by customs officers!


    Then more people started to become aware of e-commerce web sites, taxation bodies
    such as the IRS realized that they were losing a lot of money—or at least not
    getting all that they could. A flurry of activity ensued as various organizations
    worldwide attempted to hook into this revenue stream. A range of solutions was
    proposed; some solutions were implemented with mixed results. Now, things are
    becoming a little more settled.


    The key concept to be aware of when thinking about tax is a nexus. A *nexus* is
    a “a suffi-cient presence in the taxing jurisdiction to justify the collection
    of tax.” Effectively, this means that when shipping internationally, you may,
    in most situations, not be responsible for what happens unless your company has
    a significant presence in the destination country. When shipping internally to
    a country (or within, say, the European Union), you probably will be responsible.
    The legislation is a little unclear, and we certainly haven’t examined the laws
    for every country in the world, but this general rule tends to hold true.


    The other key issues can be summed up by the following:


    • Taxation depends on where you are shipping from and where you are shipping to.


    • National rules apply.


    • The type of product you are selling is important.


    Some countries have it easier than others. Within the United Kingdom, for example,
    you can charge the current VAT rate on all purchases where it applies (some types
    of product are


