    ```sql

    -- Create catalog_delete_product function


    CREATE FUNCTION catalog_delete_product(INTEGER)


    RETURNS VOID LANGUAGE plpgsql AS $$


    DECLARE


    inProductId ALIAS FOR $1;


    BEGIN


    DELETE FROM product_category WHERE product_id = inProductId; DELETE FROM product
    WHERE product_id = inProductId;


    END;


    $$;

    ```


    The `catalog_delete_product` function completely removes a product from the catalog
    by deleting its entries in the `product_category` and `product` tables.


    **4.** Use the query tool to execute this code, which creates the `catalog_remove_product_from_category`
    function in your `hatshop` database:


    ```sql

    -- Create catalog_remove_product_from_category function CREATE FUNCTION catalog_remove_product_from_category(INTEGER,
    INTEGER) RETURNS SMALLINT LANGUAGE plpgsql AS $$


    DECLARE


    inProductId ALIAS FOR $1;


    inCategoryId ALIAS FOR $2;


    productCategoryRowsCount INTEGER;


    BEGIN


    SELECT INTO productCategoryRowsCount


    count(*)


    FROM product_category


    WHERE product_id = inProductId;


    IF productCategoryRowsCount = 1 THEN


    PERFORM catalog_delete_product(inProductId);


    RETURN 0;


    END IF;


    DELETE FROM product_category

