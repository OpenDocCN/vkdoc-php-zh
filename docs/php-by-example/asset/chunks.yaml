    `MyClass`类包含值为`321`的公共字段`$number`和值为`100`的私有字段`$code`。该类拥有不带参数的普通`get()`方法，该方法返回私有字段`$code`的值。此外，类中还定义了特殊的`__get()`方法，当尝试访问不可访问的字段时，该方法会被自动调用。该方法的唯一参数记为`$name`，用于标识正在被访问的字段名称。


    在方法体内，以简化形式执行条件语句，检查`isset($this->$name)`条件。如果对象拥有所请求的字段（但不可访问），则该条件为真。如果字段存在，则返回值为该字段值的一半（通过`return
    $this->$name/2`命令）。此处默认处理的是数值型字段。如果对象不包含所请求的字段，则`__get()`方法返回值`123`。


    | 详细信息 |

    | --- |

    | 字段不可访问的原因可能是对象不包含该字段，或该字段为私有类型。在这两种情况下，`__get()`方法都会被自动调用。使用条件语句可以检查对象是否包含请求名称的私有字段。还需注意`$this->$name`指令，其中`$name`变量包含字段的名称。换言之，这并非指`$name`字段本身，而是指名为`$name`变量值的字段。
    |


    创建`MyClass`类的`$obj`对象后，访问该对象的字段。表达式`$obj->number`的结果是`$obj`的`$number`字段的值`321`。指令`$obj->code`访问`$obj`对象的私有字段`$code`。该字段存在，但无法直接访问。私有字段`$code`的值是`100`，这也是`get()`方法（通过`$obj->get()`指令）返回的值。但表达式`$obj->code`的值是前者的一半（即`50`），这是由`__get()`方法返回的。当处理`$obj->code`表达式时，`__get()`方法被自动调用。指令`$obj->value`访问不存在的`$value`字段，此时`__get()`方法返回值`123`。


    使用特殊`__set()`方法的程序如清单[7-11](#613529_1_En_7_Chapter.xhtml#PC25)所示。


    ```

    code;

    }

    // The method to assign a value

    // to the private field:

    public function set($code){

    $this->code=$code;

    }

    // The special method is called when

    // assigning a value to the inaccessible field:

    public function __set($name,$arg){

    if(isset($this->$name)) $this->$name=$arg/2;

    else $this->$name=2*$arg;

    }

    }

    // Creates an object:

    $obj=new MyClass();

    // Assigns values to the fields:

    $obj->number=123;

    $obj->set(321);

    // Checks the values of the fields:

    echo "\$number: ",$obj->number,"\n";

    echo "\$code: ",$obj->get(),"\n";

    // Assigns a value to the private field:

    $obj->code=100;

    // Assigns a value to the non-existing field:

    $obj->value=100;

    // Checks the values of the fields:

    echo "\$code: ",$obj->get(),"\n";

    echo "\$value: ",$obj->value,"\n";

    ?>

