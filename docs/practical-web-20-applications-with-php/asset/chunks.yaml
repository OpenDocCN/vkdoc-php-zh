    Adding a Single Blog Post to the Index


    We will now create a function called addToIndex() that is responsible for adding
    a single live blog post to the index. Since we will also be using this function
    when a blog post is updated, we need to add functionality so the index is updated
    correctly.


    Zend_Search_Lucene does not allow a document in an index to be updated, so in
    order to reindex a document, the old version must be removed from the index before
    readding the new version. Therefore, we must query the index to find the old document
    and remove it accordingly, as you will soon see.


    First, we must open the index so we can add the document to it, as shown in Listing
    12-7.


    Note that we are using the open() method rather than the create() method. In fact,
    calling open() on a search index that does not yet exist throws an exception,
    so we simply handle this exception by calling the rebuildIndex() method we created
    earlier this chapter.


