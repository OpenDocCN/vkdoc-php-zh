  \n```\n<?php } ?>\n```\n\n保存 `gallery.php` 并在浏览器中查看。它应显示与图 12-3 相同的效果。唯一区别在于缩略图及其\
  \ `alt` 文本是动态生成的。您可以通过查看源代码来验证这一点。原始静态版本包含空 `alt` 属性，但如下图所示，现在它包含了首条记录的标题：\n\n![A978-1-4842-0635-5_12_Figa_HTML.jpg](img/A978-1-4842-0635-5_12_Figa_HTML.jpg)\n\
  \n如果出现问题，请确保图片 `src` 属性中静态文本和动态生成的文本之间没有间隙。同时检查您使用的代码是否与数据库连接类型匹配。您可以对照 `ch12` 文件夹中的\
  \ `gallery_mysqli_02.php` 或 `gallery_pdo_02.php` 检查代码。\n\n确认能从数据库中获取详细信息后，即可转换主图代码。请按如下方式修改（新增代码以粗体显示）：\n\
  \n```\n<figure id=\"main_image\">\n    <img src=\"images/<?= $mainImage; ?>\" alt=\"\
  <?= $caption; ?>\"\n         <?= $imageSize; ?>>\n    <figcaption><?= $caption;\
  \ ?></figcaption>\n</figure>\n```\n\n`$imageSize` 会插入包含主图正确 `width` 和 `height` 属性的字符串。\n\
  \n再次测试页面。效果应仍与图 12-3 相同，但图片和标题已从数据库动态获取，并且 `getimagesize()` 正在为主图计算正确尺寸。您可以对照 `ch12`\
  \ 文件夹中的 `gallery_mysqli_03.php` 或 `gallery_pdo_03.php` 检查代码。\n\n## 构建动态元素\n\n静态页面转换后的首要任务是显示所有缩略图，然后构建动态链接，以便在点击任意缩略图时显示其大图版本。显示所有缩略图很简单——只需循环遍历即可（稍后将讨论如何以每行两个的方式显示）。激活每个缩略图的链接则需要多花些心思。您需要一种方法来告知页面应显示哪张大图。\n\
  \n### 通过查询字符串传递信息\n\n在上一节中，您使用 `$mainImage` 标识大图，因此需要在点击缩略图时更改其值。解决方案是将图片文件名添加到链接\
  \ URL 末尾的查询字符串中，如下所示：\n\n```\n<a href=\"gallery.php?image=filename\">\n```\n\n然后您可以检查\
  \ `$_GET` 数组中是否包含名为 `image` 的元素。如果包含，则更改 `$mainImage` 的值；如果不包含，则保留 `$mainImage`\
  \ 为结果集中首条记录的文件名。\n\n\n\n"
- "# PHP 方案 12-2：激活缩略图\n\n继续使用上一节中的同一文件。或者，将 `gallery_mysqli_03.php` 或 `gallery_pdo_03.php`\
  \ 复制到 `phpsols` 站点根目录，并将其保存为 `gallery.php`\n\n找到包裹缩略图的链接起始 `<a>` 标签，内容如下：\n\n```\n\
  <a href=\"gallery.php\">\n```\n\n将其修改为：\n\n```\n<a href=\"<?= $_SERVER['PHP_SELF'];\
  \ ?>?image=<?=$row['filename']; ?>\">\n```\n\n键入代码时需小心。PHP 标签中的问号很容易与查询字符串开头的问号混淆。同样重要的是，`?image=`\
  \ 周围不应有空格。\n\n`$_SERVER['PHP_SELF']` 是一个便捷的预定义变量，指向当前页面的名称。你可以直接在 URL 中硬编码 `gallery.php`，但使用\
  \ `$_SERVER['PHP_SELF']` 可确保 URL 指向正确的页面。其余代码则使用当前文件名构建查询字符串。\n\n保存页面并在浏览器中加载。将鼠标指针悬停在缩略图上，查看状态栏中显示的\
  \ URL。它应显示如下：\n\n```\nhttp://localhost/phpsols/gallery.php?image=basin.jpg\n```\n\
  \n如果状态栏中未显示任何内容，请单击缩略图。页面应保持不变，但地址栏中的 URL 现在应包含查询字符串。检查 URL 或查询字符串中是否有间隙。\n\n要显示所有缩略图，您需要将表格单元格包裹在一个循环中。在关于重复行的\
  \ HTML 注释后插入新行，并创建一个 `do... while` 循环的前半部分，如下所示（关于不同类型循环的详细信息，请参阅第 3 章）：\n\n```\n\
  <!-- 此行需重复 -->\n\n<?php do { ?>\n```\n\n结果集中已有第一条记录的详细信息，因此获取后续记录的代码需要放在结束的 `</td>`\
  \ 标签之后。在结束的 `</td>` 和 `</tr>` 标签之间创建一些空间，并插入以下代码。根据不同数据库连接方法，代码略有不同。\n\n对于 MySQLi，请使用：\n\
  \n```\n</td>\n\n<?php } while ($row = $result->fetch_assoc()); ?>\n\n</tr>\n```\n\
  \n对于 PDO，请使用：\n\n```\n</td>\n\n<?php } while ($row = $result->fetch()); ?>\n\n</tr>\n\
  ```\n\n这会获取结果集中的下一条记录，并将循环返回至顶部。由于 `$row['filename']` 和 `$row['caption']` 的值不同，因此下一个缩略图及其关联的\
  \ `alt` 文本会被插入到新的表格单元格中。查询字符串也会随新文件名更新。\n\n保存页面并在浏览器中测试。您现在应该看到所有八个缩略图排列在画廊顶部的一行中，如下面的截图所示。\n\
  \n![A978-1-4842-0635-5_12_Figb_HTML.jpg](img/A978-1-4842-0635-5_12_Figb_HTML.jpg)\n\
  \n将鼠标指针悬停在每个缩略图上，您应该会看到查询字符串显示文件名。您可以对照 `gallery_mysqli_04.php` 或 `gallery_pdo_04.php`\
  \ 检查您的代码。\n\n单击缩略图仍然没有反应，因此您需要创建改变主图像及其关联说明的逻辑。在 `DOCTYPE` 声明上方的代码块中找到此部分：\n\n```\n\
  // 获取主图像的名称和说明\n$mainImage = $row['filename'];\n$caption = $row['caption'];\n```\n\
  \n选中定义 `$caption` 的那一行，并将其剪切到剪贴板。将另一行包裹在条件语句中，如下所示：\n\n```\n// 获取主图像的名称\nif (isset($_GET['image']))\
  \ {\n    $mainImage = $_GET['image'];\n} else {\n    $mainImage = $row['filename'];\n\
  }\n```\n\n`$_GET` 数组包含通过查询字符串传递的值，因此如果设置了（定义了）`$_GET['image']`，它将从查询字符串中获取文件名并存储为\
  \ `$mainImage`。如果 `$_GET['image']` 不存在，则像之前一样从结果集中的第一条记录获取值。\n\n最后，您需要获取主图像的说明。它不再每次都相同，因此您需要将其移动到在\
  \ `thumbs` 表中显示缩略图的循环中。将它放在循环的起始花括号之后（大约在第 48 行）。将光标置于花括号后，插入几行，然后粘贴您在上一步中剪切的说明定义。您希望说明与主图像匹配，因此如果当前记录的文件名与\
  \ `$mainImage` 相同，那就是您要找的。将刚刚粘贴的代码包裹在条件语句中，如下所示：\n\n```\n<?php\ndo {\n    // 如果缩略图与主图像相同，则设置说明\n\
  \    if ($row['filename'] == $mainImage) {\n        $caption = $row['caption'];\
  \ // 这是您粘贴的行\n    }\n?>\n```\n\n保存页面并在浏览器中重新加载。这次，当您单击缩略图时，主图像和说明将会改变。不用担心某些图像和说明被页脚遮挡。当缩略图移动到主图像左侧时，这将自行修正。\n\
  \n> **注意：** 像这样通过查询字符串传递信息是使用 PHP 和数据库结果的一个重要方面。虽然表单信息通常通过 `$_POST` 数组传递，但 `$_GET`\
  \ 数组经常用于传递要显示、更新或删除的记录的详细信息。它也常用于搜索，因为查询字符串很容易被添加书签。\n\n在这种情况下没有 SQL 注入的风险。但如果有其他人更改了通过查询字符串传递的文件名的值，并且开启了\
  \ `display_errors`，那么在找不到图像时，您将看到丑陋的错误消息。在调用 `getimagesize()` 之前，让我们先检查图像是否存在。将其包裹在条件语句中，如下所示：\n\
  \n```\nif (file_exists('images/'.$mainImage)) {\n    // 获取主图像的尺寸\n    $imageSize\
  \ = getimagesize('images/'.$mainImage)[3];\n} else {\n    $error = '图像未找到。';\n}\n\
  ```\n\n尝试将查询字符串中 `image` 的值更改为除现有文件之外的任何值。加载页面时，您应该会看到*图像未找到*。\n\n如有必要，请对照 `gallery_mysqli_05.php`\
  \ 或 `gallery_pdo_05.php` 检查您的代码。\n\n## 创建多列表格\n\n仅有八张图片时，画廊顶部的一行缩略图看起来还不错。然而，能够通过使用循环动态构建表格非常有用，该循环在一行中插入特定数量的表格单元格，然后移入下一行。这是通过记录已插入的单元格数量来实现的。当达到该行的限制时，代码需要为当前行插入结束标签，并且如果还有更多缩略图，还需为下一行插入开始标签。使其易于实现的是取模运算符\
  \ `%`，它返回除法的余数。\n\n这是它的工作原理。假设您希望每行有两个单元格。插入第一个单元格后，计数器设置为 `1`。如果用取模运算符计算 `1` 除以\
  \ `2`（`1 % 2`），结果是 `1`。当插入下一个单元格时，计数器增加到 `2`。`2 % 2` 的结果是 `0`。下一个单元格产生这样的计算：`3 %\
  \ 2`，结果为 `1`；但第四个单元格产生 `4 % 2`，结果又是 `0`。因此，每次计算结果为 `0` 时，您就知道——或者更确切地说，PHP 知道——您已经到达了一行的末尾。\n\
  \n那么如何知道是否还有更多行呢？通过将插入结束和开始 `<tr>` 标签的代码放在循环顶部，必须至少还剩一张图片。然而，循环第一次运行时，余数也是 `0`，问题在于您需要阻止插入这些标签，直到至少显示了一张图片。呼……让我们试试看。\n\
  \n\n\n"
- "# PHP 解决方案 12-3：水平与垂直循环\n\n本 PHP 解决方案展示了如何控制循环，以在表格中显示特定数量的列。列数通过设置一个常量来控制。继续使用上一节中的文件，或者使用\
  \ `gallery_mysqli_05.php` 或 `gallery_pdo_05.php`。\n\n你可能会在后续阶段想要更改表格中的列数，因此最好在脚本顶部创建一个易于查找的常量，而不是将数值深埋在代码中。在创建数据库连接之前插入以下代码：\n\
  \n```\n// 定义表格中的列数\ndefine('COLS', 2);\n```\n\n常量与变量类似，区别在于其值不能被脚本的其他部分更改。你可以使用\
  \ `define()` 函数创建常量，该函数接受两个参数：常量的名称和它的值。按照惯例，常量总是使用大写字母。与变量不同，它们不以美元符号开头。\n\n你需要在循环外部初始化单元格计数器。同时创建一个变量来指示是否为第一行。在你刚刚定义的常量之后立即添加以下代码：\n\
  \n```\ndefine('COLS', 2);\n\n// 初始化水平循环的变量\n$pos = 0;\n$firstRow = true;\n```\n\n\
  用于计数的代码放在显示缩略图的循环起始处的 PHP 块内。像这样修改代码：\n\n```\n<?php do {\n  // 如果缩略图与主图像相同，则设置标题\n\
  \  if ($row['filename'] == $mainImage) {\n    $caption = $row['caption'];\n  }\n\
  \n  // 如果余数为 0 且不是第一行，则关闭当前行并开始新行\n  if ($pos++ % COLS === 0 && !$firstRow) {\n\
  \    echo '</tr><tr>';\n  }\n\n  // 循环开始后，此条件不再成立\n  $firstRow = false;\n?>\n```\n\
  \n由于递增运算符（`++`）放在 `$pos` 之后，其值在递增 `1` 之前被列数除。循环第一次运行时，余数为 `0`，但 `$firstRow` 为 `true`，因此条件语句失败。然而，在条件语句之后，`$firstRow`\
  \ 被重置为 `false`。在循环的后续迭代中，每次余数为 `0` 时，条件语句会关闭当前表格行并开始新的一行。\n\n如果没有更多记录，你需要检查表格底部是否有未完成的行。在现有的\
  \ `do...while` 循环之后添加一个 `while` 循环。在 MySQLi 版本中，它看起来像这样：\n\n```\n<?php } while ($row\
  \ = $result->fetch_assoc());\n\nwhile ($pos++ % COLS) {\n  echo '<td>&nbsp;</td>';\n\
  }\n?>\n```\n\n在 PDO 版本中，新代码是相同的。唯一的区别是前一行使用 `$result->fetch()` 而不是 `$result->fetch_assoc()`。\n\
  \n第二个循环在 `$pos++ % COLS` 产生余数（被解释为 `true`）时，继续递增 `$pos`，并插入一个空单元格。\n\n**注意：** 这个第二个循环并未嵌套在第一个循环内部。它仅在第一个循环结束后运行。\n\
  \n![A978-1-4842-0635-5_12_Fig4_HTML.jpg](img/A978-1-4842-0635-5_12_Fig4_HTML.jpg)\n\
  \n图 12-4。缩略图现在整齐排列成列\n\n保存页面并在浏览器中重新加载。原本在画廊顶部单行排列的缩略图现在应整齐地两两对齐，如图 12-4 所示。\n\n\
  尝试更改 `COLS` 的值并重新加载页面。主图像可能会被移位，因为页面仅设计为两列，但你可以看到通过更改一个数字就能轻松控制每行的单元格数量。你可以将代码与\
  \ `gallery_mysqli_06.php` 或 `gallery_pdo_06.php` 进行对照检查。\n\n## 分页浏览长记录集\n\n八个缩略图的网格在画廊中显示得很合适，但如果你有\
  \ 28 个或 48 个呢？答案是限制每页显示的结果数量，然后构建一个导航系统，让你能够在结果中前后翻页。你在使用搜索引擎时已经无数次见过这种技术；现在你将学习如何自己构建它。\n\
  \n这项任务可以分解为以下两个阶段：\n\n- 选择要显示的子集记录\n- 创建用于翻页浏览子集的导航链接\n\n这两个阶段都相对容易实现，尽管它们需要应用一些条件逻辑。保持冷静，你就能轻松完成。\n\
  \n### 选择子集记录\n\n限制每页的结果数量很简单——只需在 SQL 查询中添加 `LIMIT` 关键字，如下所示：\n\n```\nSELECT filename,\
  \ caption FROM images LIMIT 起始位置, 最大数量\n```\n\n`LIMIT` 关键字后面可以跟一个或两个数字。如果只使用一个数字，它会设置要检索的最大记录数。这很有用，但不适合分页系统。为此，你需要使用两个数字：第一个数字指示从哪条记录开始，第二个数字规定要检索的最大记录数。MySQL\
  \ 从 0 开始计数记录，因此要显示前六张图片，你需要以下 SQL：\n\n```\nSELECT filename, caption FROM images\
  \ LIMIT 0, 6\n```\n\n要显示下一组，SQL 需要改为这样：\n\n```\nSELECT filename, caption FROM images\
  \ LIMIT 6, 6\n```\n\n`images` 表中只有八条记录，但第二个数字只是一个最大值，因此这会检索记录 7 和 8。\n\n要构建导航系统，你需要一种生成这些数字的方法。第二个数字永远不会改变，所以我们定义一个名为\
  \ `SHOWMAX` 的常量。生成第一个数字（称之为 `$startRecord`）也非常容易。从 0 开始对页面编号，然后将第二个数字乘以当前页码。因此，如果你将当前页称为\
  \ `$curPage`，公式如下：\n\n```\n$startRecord = $curPage * SHOWMAX;\n```\n\n对于 SQL，它变为：\n\
  \n```\nSELECT filename, caption FROM images LIMIT $startRecord, SHOWMAX\n```\n\n\
  如果 `$curPage` 是 0，`$startRecord` 也是 0（0 × 6），但当 `$curPage` 增加到 1 时，`$startRecord`\
  \ 变为 6（1 × 6），依此类推。\n\n由于 `images` 表中只有八条记录，你需要一种方法来找出记录总数，以防止导航系统检索空结果集。在上一章中，你使用了\
  \ MySQLi 的 `num_rows` 属性和 PDO 的 `rowCount()`。但这次它们不起作用，因为你想知道的是记录总数，而不是当前结果集中的记录数。答案是使用\
  \ SQL 的 `COUNT()` 函数，如下所示：\n\n```\nSELECT COUNT(*) FROM images\n```\n\n当与星号结合使用时，`COUNT()`\
  \ 会获取表中的记录总数。因此，要构建导航系统，你需要运行两个 SQL 查询：一个用于查找记录总数，另一个用于检索所需的子集。这些是简单的查询，因此结果几乎是即时的。\n\
  \n我稍后会处理导航链接。我们先从限制第一页上的缩略图数量开始。\n\n\n\n### PHP 方案 12-4：显示记录子集\n\n本 PHP 方案展示了如何筛选出记录子集，为创建长列表分页导航系统做准备。同时，它还演示了如何显示当前选中的记录编号以及记录总数。\n\
  \n继续使用之前的同一个文件。或者，使用 `gallery_mysqli_06.php` 或 `gallery_pdo_06.php`。\n\n定义 `SHOWMAX`\
  \ 以及用于查找表中记录总数的 SQL 查询。将页面顶部的代码修改如下（新代码以**粗体**显示）：\n\n```\n// 初始化水平循环器变量\n$pos =\
  \ 0;\n$firstRow = true;\n\n// 设置最大记录数\ndefine('SHOWMAX', 6);\n\n$conn = dbConnect('read');\n\
  \n// 准备获取总记录数的 SQL\n$getTotal = 'SELECT COUNT(*) FROM images';\n```\n\n现在你需要运行这条新的\
  \ SQL 查询。这段代码紧接在上一步代码之后，但根据 MySQL 连接类型的不同而有所区别。对于 MySQLi，请使用以下代码：\n\n```\n// 提交查询并将结果存储为\
  \ $totalPix\n$total = $conn->query($getTotal);\n$row = $total->fetch_row();\n$totalPix\
  \ = $row[0];\n```\n\n这段代码提交了查询，然后使用 `fetch_row()` 方法，该方法从 `MySQLi_Result` 对象中获取单行数据作为索引数组。结果中只有一列，因此\
  \ `$row[0]` 包含 `images` 表中记录的总数。\n\n对于 PDO，请使用以下代码：\n\n```\n// 提交查询并将结果存储为 $totalPix\n\
  $total = $conn->query($getTotal);\n$totalPix = $total->fetchColumn();\n```\n\n这段代码提交了查询，然后使用\
  \ `fetchColumn()` 获取单个结果，并将其存储在 `$totalPix` 中。\n\n接下来，设置 `$curPage` 的值。你稍后创建的导航链接将通过查询字符串传递所需页面的值，因此需要检查\
  \ `$_GET` 数组中是否存在 `curPage`。如果存在，则使用该值；否则，将当前页面设置为 0。将以下代码插入到上一步代码之后：\n\n```\n//\
  \ 设置当前页面\nif (isset($_GET['curPage'])) {\n    $curPage = $_GET['curPage'];\n} else\
  \ {\n    $curPage = 0;\n}\n```\n\n现在你拥有了计算起始行和构建 SQL 查询以检索记录子集所需的全部信息。将以下代码添加到上一步代码之后：\n\
  \n```\n// 计算子集的起始行\n$startRow = $curPage * SHOWMAX;\n```\n\n但这里有一个问题。`$curPage`\
  \ 的值来自查询字符串。如果有人在浏览器地址栏中手动更改了该数字，`$startRow` 可能会大于数据库中的记录数。如果 `$startRow` 的值超过了\
  \ `$totalPix`，你需要将 `$startRow` 和 `$curPage` 都重置为 `0`。将以下条件语句添加到上一步代码之后：\n\n```\n\
  if ($startRow > $totalPix) {\n    $startRow = 0;\n    $curPage = 0;\n}\n```\n\n\
  注意：如果手动将 `curPage` 改为非数字值，当它与 `SHOWMAX` 相乘时，PHP 会自动将其转换为 `0`。\n\n原始的 SQL 查询现在应该在下一行。按如下方式修改它：\n\
  \n```\n// 准备 SQL 以检索图像详情子集\n$sql = \"SELECT filename, caption FROM images LIMIT\
  \ $startRow,\" . SHOWMAX;\n```\n\n这次我使用了双引号，因为我希望 PHP 处理 `$startRow`。与变量不同，常量在双引号字符串内部不会被处理。因此，`SHOWMAX`\
  \ 通过连接运算符（句点）被添加到 SQL 查询的末尾。结束引号内的逗号是 SQL 的一部分，用于分隔 `LIMIT` 子句的两个参数。\n\n![A978-1-4842-0635-5_12_Fig5_HTML.jpg](img/A978-1-4842-0635-5_12_Fig5_HTML.jpg)\n\
  \n**图 12-5.** 缩略图的数量受 `SHOWMAX` 常量的限制\n\n保存页面并在浏览器中重新加载。您应该只能看到六个缩略图，而不是八个，如图 12-5\
  \ 所示。更改 `SHOWMAX` 的值以查看不同数量的缩略图。\n\n缩略图网格上方的文本不会更新，因为它仍然是硬编码的，所以让我们来修复它。在页面的主体部分找到以下代码行：\n\
  \n`<p id=\"picCount\">Displaying 1 to 6 of 8</p>`\n\n将其替换为以下代码：\n\n```\n<p id=\"\
  picCount\">Displaying <?php echo $startRow+1;\n    if ($startRow+1 < $totalPix)\
  \ {\n        echo ' to ';\n        if ($startRow+SHOWMAX < $totalPix) {\n      \
  \      echo $startRow+SHOWMAX;\n        } else {\n            echo $totalPix;\n\
  \        }\n    }\n    echo \" of $totalPix\";\n?></p>\n```\n\n让我们逐行分析。`$startRow`\
  \ 的值是从零开始的，因此你需要加 1 才能得到一个对用户更友好的数字。因此，`$startRow+1` 在第一页显示 1，在第二页显示 7。在第二行，`$startRow+1`\
  \ 与总记录数进行比较。如果它小于总记录数，则表示当前页面显示的是一个记录范围，因此第三行显示文本“ to ”（两边带空格）。然后，你需要计算出该范围的最大值，因此一个嵌套的\
  \ `if ... else` 条件语句将起始行的值加上页面要显示的最大记录数。如果结果小于总记录数，`$startRow+SHOWMAX` 会给出页面上的最后一条记录编号。但如果结果等于或大于总数，则改为显示\
  \ `$totalPix`。最后，退出两个条件语句并显示“ of ”以及总记录数。\n\n保存页面并在浏览器中重新加载。您仍然只能看到第一个缩略图子集，但每当您更改\
  \ `SHOWMAX` 的值时，您应该会看到第二个数字动态变化。如有必要，请对照 `gallery_mysqli_07.php` 或 `gallery_pdo_07.php`\
  \ 检查您的代码。\n\n### 在记录子集之间导航\n\n正如我在上一节第 3 步中提到的，所需页面的值通过查询字符串传递给 PHP 脚本。页面首次加载时，没有查询字符串，因此\
  \ `$curPage` 的值被设置为 `0`。虽然单击缩略图显示不同图像时会生成查询字符串，但它只包含主图像的文件名，因此原始的缩略图子集保持不变。要显示下一个子集，您需要创建一个将\
  \ `$curPage` 的值增加 `1` 的链接。同理，要返回上一个子集，您需要另一个将 `$curPage` 的值减少 `1` 的链接。\n\n这很简单，但您还需要确保只有当存在有效的导航子集时才显示这些链接。例如，在第一页上显示后退链接没有意义，因为不存在前一个子集。类似地，在显示最后一个子集的页面上不应显示前进链接，因为已无内容可导航。\n\
  \n这两个问题都可以通过使用条件语句轻松解决。还有最后一件事需要您处理。在单击缩略图时生成的查询字符串中，也必须包含当前页面的值。如果不这样做，`$curPage`\
  \ 会自动重置为 `0`，并且会显示第一组缩略图，而不是当前的子集。\n\n\n\n### PHP 解法 12-5：创建导航链接\n\n本 PHP 解法展示了如何创建导航链接，以便在每批记录子集中前后翻页。继续使用之前的同一文件，或者改用\
  \ `gallery_mysqli_07.php` 或 `gallery_pdo_07.php`。\n\n我已将导航链接放置在缩略图表格底部的额外行中。请在占位符注释与闭合的\
  \ `</table>` 标签之间插入以下代码：\n\n`<!-- Navigation link needs to go here -->`\n\n`<tr><td>`\n\
  \n`<?php`\n\n`// 如果当前页大于 0，则创建上一页链接`\n\n`if ($curPage > 0) {`\n\n`echo '<a href=\"\
  ' . $_SERVER['PHP_SELF'] . '?curPage=' . ($curPage-1) .`\n\n`'\">` `&` `lt; 上一页</a>';`\n\
  \n`} else {`\n\n`// 否则，将单元格留空`\n\n`echo '` `&` `nbsp;';`\n\n`}`\n\n`?>`\n\n`</td>`\n\
  \n`<?php`\n\n`// 如果列数大于 2，则用空单元格填充最后一行`\n\n`if (COLS-2 > 0) {`\n\n`for ($i = 0;\
  \ $i < COLS-2; $i++) {`\n\n`echo '<td>` `&` `nbsp;</td>';`\n\n`}`\n\n`}`\n\n`?>`\n\
  \n`<td>`\n\n`<?php`\n\n`// 如果存在更多记录，则创建下一页链接`\n\n`if ($startRow+SHOWMAX < $totalPix)\
  \ {`\n\n`echo '<a href=\"' . $_SERVER['PHP_SELF'] . '?curPage=' . ($curPage+1) .`\n\
  \n`'\"> 下一页` `&` `gt;</a>';`\n\n`} else {`\n\n`// 否则，将单元格留空`\n\n`echo '` `&` `nbsp;';`\n\
  \n`}`\n\n`?>`\n\n`</td></tr>`\n\n`</table>`\n\n看起来代码很多，但实际上它分为三个部分：第一部分，如果 `$curPage`\
  \ 大于 `0`，则创建一个上一页链接；第二部分，如果表格列数超过两列，则用空单元格填充表格最后一行；第三部分，使用前面的公式（`$startRow+SHOWMAX\
  \ < $totalPix`）来决定是否显示下一页链接。\n\n请确保链接中的引号组合正确无误。另需注意，`$curPage-1` 和 `$curPage+1`\
  \ 的计算被括在括号中，以免数字后的句点被误解为小数点。此处的句点用作连接运算符，用于拼接查询字符串的各个部分。\n\n现在，你需要将当前页的值添加到缩略图周围链接的查询字符串中。请找到以下代码段（大约在第\
  \ 95 行）：\n\n`<a href=\"<?= $_SERVER['PHP_SELF']; ?>?image=<?= $row['filename'];\
  \ ?>\">`\n\n将其修改为：\n\n`<a href=\"<?= $_SERVER['PHP_SELF']; ?>?image=<?= $row['filename'];?>`\n\
  \n`&` `amp;curPage=<?= $curPage; ?>` `\">`\n\n你希望在单击缩略图时显示相同的子集，因此只需通过查询字符串传递 `$curPage`\
  \ 的当前值即可。\n\n**警告**\n\n由于印刷页面限制，我不得不将代码分成两行。在你的 PHP 脚本中，所有代码必须位于同一行，且闭合 PHP 标签与\
  \ `&amp;` 之间不能有空格。此代码用于创建 URL 和查询字符串，其中不能包含空格。\n\n![A978-1-4842-0635-5_12_Fig6_HTML.jpg](img/A978-1-4842-0635-5_12_Fig6_HTML.jpg)\n\
  图 12-6.\n\n页面导航系统现已完成。保存页面并进行测试。单击“下一页”链接，你应该会看到剩余的那批缩略图，如图 12-6 所示。由于没有更多图像需要显示，“下一页”链接会消失，但缩略图网格的左下方会出现“上一页”链接。画廊顶部的记录计数器现在会反映当前显示的缩略图范围。如果你点击正确的缩略图，同一子集将保持在屏幕上，同时显示相应的大图。大功告成！\n\
  \n你可以将自己的代码与 `gallery_mysqli_08.php` 或 `gallery_pdo_08.php` 进行对照检查。\n\n### 本章回顾\n\
  \n仅仅几页的篇幅，你就把一份枯燥的文件名列表变成了一个动态的在线画廊，并且配备了页面导航系统。你只需要为每张主要图片创建一张缩略图，将两张图片上传到相应的文件夹，然后将文件名和说明文字添加到数据库的\
  \ `images` 表中。只要数据库与 `images` 和 `thumbs` 文件夹的内容保持同步，你就能拥有一个动态画廊。不仅如此，你还学会了如何选择记录子集、通过查询字符串链接到相关信息，以及构建页面导航系统。\n\
  \n你越使用 PHP，就越会意识到，这项技能与其说在于记住大量晦涩的函数，不如说在于理清让 PHP 按你意愿工作的逻辑。这无非是“如果这样，就那样做；如果那样，就做别的”的思维模式。一旦你能预见到某种情况可能的发展方向，通常就能构建出处理它的代码。\n\
  \n到目前为止，你一直专注于从简单的数据库表中提取记录。在下一章中，我将向你展示如何插入、更新和删除数据。\n\n## 13. 管理内容\n\n虽然你可以使用\
  \ phpMyAdmin 完成许多数据库管理工作，但你可能希望设置一些区域，让客户可以登录更新某些数据，同时又不必给他们访问整个数据库的全部权限。为此，你需要构建自己的表单，并创建定制的內容管理系统。\n\
  \n每个内容管理系统的核心都是所谓的 CRUD 周期——即创建（Create）、读取（Read）、更新（Update）和删除（Delete）——它仅使用四条 SQL\
  \ 命令：`INSERT`、`SELECT`、`UPDATE` 和 `DELETE`。为了演示这些基本的 SQL 命令，本章将向你展示如何为一个名为 `blog`\
  \ 的表格构建一个简单的内容管理系统。\n\n即使你不想构建自己的内容管理系统，本章涵盖的四条命令对于几乎所有基于数据库的页面（如用户登录、用户注册、搜索表单、搜索结果等）来说也是必不可少的。\n\
  \n在本章中，你将学习以下内容：\n\n*   在数据库表中插入新记录\n*   显示现有记录列表\n*   更新现有记录\n*   在删除记录前请求确认\n\n\
  ### 设置内容管理系统\n\n管理数据库表中的内容涉及四个阶段，我通常将它们分配给四个独立但相互链接的页面：分别用于插入、更新和删除记录，以及一个现有记录的列表。记录列表有两个目的：首先，标识数据库中存储了什么；更重要的是，通过查询字符串传递记录的主键，以便链接到更新和删除脚本。\n\
  \n`blog` 表包含一系列标题和文章正文，这些内容将显示在 Japan Journey 网站上，如图 13-1 所示。为了保持简洁，该表仅包含五列：`article_id`（主键）、`title`、`article`、`created`\
  \ 和 `updated`。\n\n![A978-1-4842-0635-5_13_Fig1_HTML.jpg](img/A978-1-4842-0635-5_13_Fig1_HTML.jpg)\n\
  图 13-1. 在 Japan Journey 网站中显示的 `blog` 表的内容\n\n\n\n### 创建博客数据库表\n\n如果你只想直接开始学习内容管理页面，可以从\
  \ `ch13` 文件夹中导入 `blog.sql` 文件中的表结构和数据。打开 phpMyAdmin，选择 `phpsols` 数据库，按照第 10 章的相同方式导入该表。该\
  \ SQL 文件会创建表并填充四篇简短文章。\n\n如果你想从头开始自行创建所有内容，请打开 phpMyAdmin，选择 `phpsols` 数据库，然后点击`结构`选项卡（如果未选中）。在`创建表`部分，在`名称`字段中输入\
  \ `blog`，在`列数`字段中输入 `5`。然后点击`执行`。使用以下截图和表 13-1 中显示的设置。\n\n![A978-1-4842-0635-5_13_Figa_HTML.jpg](img/A978-1-4842-0635-5_13_Figa_HTML.jpg)\n\
  \n**表 13-1.** `blog` 表的列定义\n\n| 字段 | 类型 | 长度/值 | 默认值 | 属性 | 空值 | 索引 | A_I |\n| ---\
  \ | --- | --- | --- | --- | --- | --- | --- |\n| `article_id` | `INT` | | | `UNSIGNED`\
  \ | 未选中 | `PRIMARY` | 选中 |\n| `title` | `VARCHAR` | `255` | | | 未选中 | | |\n| `article`\
  \ | `TEXT` | | | | 未选中 | | |\n| `created` | `TIMESTAMP` | | `CURRENT_TIMESTAMP`\
  \ | | 未选中 | | |\n| `updated` | `TIMESTAMP` | | `CURRENT_TIMESTAMP` | `on update\
  \ CURRENT_TIMESTAMP` | 未选中 | | |\n\n`created` 和 `updated` 列的默认值设置为 `CURRENT_TIMESTAMP`。因此，首次录入记录时，两列会获得相同的值。`updated`\
  \ 列的`属性`设置为 `on update CURRENT_TIMESTAMP`。这意味着每当对记录进行更改时，该列都会被更新。为了追踪记录的原始创建时间，`created`\
  \ 列的值永远不会被更新。\n\n### 创建基本的插入和更新表单\n\nSQL 通过提供不同的命令来区分插入和更新记录的操作。`INSERT` 仅用于创建全新的记录。一旦记录被插入，任何更改都必须使用\
  \ `UPDATE` 来完成。由于这涉及相同的字段，因此可以使用同一页面进行两种操作。但这会使 PHP 代码更复杂，因此我更喜欢先创建插入页面的 HTML，将其另存为更新页面，然后分别编写代码。\n\
  \n插入页面的表单只需要两个输入字段：标题和文章内容。其余三列（主键和两个时间戳）的内容会自动处理。插入表单的代码如下所示：\n\n```\n<form method=\"\
  post\" action=\"\">\n<p>\n<label for=\"title\">标题：</label>\n<input name=\"title\"\
  \ type=\"text\" id=\"title\">\n</p>\n<p>\n<label for=\"article\">文章：</label>\n<textarea\
  \ name=\"article\" id=\"article\"></textarea>\n</p>\n<p>\n<input type=\"submit\"\
  \ name=\"insert\" value=\"插入新条目\" id=\"insert\">\n</p>\n</form>\n```\n\n该表单使用 `post`\
  \ 方法。你可以在 `ch13` 文件夹中的 `blog_insert_01.php` 找到完整代码。这些内容管理表单使用了 `styles` 文件夹中的 `admin.css`\
  \ 进行了一些基本样式设置。在浏览器中查看时，表单如下所示：\n\n![A978-1-4842-0635-5_13_Figb_HTML.jpg](img/A978-1-4842-0635-5_13_Figb_HTML.jpg)\n\
  \n更新表单除了标题和提交按钮外完全相同。按钮代码如下所示（完整代码在 `blog_update_mysqli_01.php` 和 `blog_update_pdo_01.php`\
  \ 中）：\n\n```\n<input type=\"submit\" name=\"update\" value=\"更新条目\" id=\"update\"\
  >\n```\n\n我给了标题和文章输入字段与 `blog` 表中列相同的名称。这有助于在后续编写 PHP 和 SQL 代码时更容易地跟踪变量。\n\n**提示**\n\
  \n作为一项安全措施，一些开发者建议使用与数据库列不同的名称，因为任何人都可以通过查看表单的源代码看到输入字段的名称。使用不同的名称会使入侵数据库更加困难。在网站的密码保护区域，这不必担心。但是，对于公开可访问的表单（例如用户注册或登录表单），你可能需要考虑这一做法。\n\
  \n### 插入新记录\n\n将新记录插入表的基本 SQL 如下所示：\n\n```\nINSERT [INTO] table_name (column_names)\n\
  VALUES (values)\n```\n\n`INTO` 放在方括号中，表示它是可选的。它纯粹是为了让 SQL 读起来更接近人类语言。列名可以按任意顺序排列，但第二组括号中的值必须与其引用的列顺序一致。\n\
  \n虽然 MySQLi 和 PDO 的代码非常相似，但为了避免混淆，我将分别处理它们。\n\n**注意**\n\n本章中的许多脚本使用了一种称为“设置标志”的技术。`flag`\
  \ 是一个布尔变量，初始化为 `true` 或 `false`，用于检查是否发生了某事。例如，如果 `$OK` 最初设置为 `false`，并且仅在数据库查询成功执行时才重置为\
  \ `true`，则它可以作为控制另一个代码块的条件使用。\n\n\n\n### PHP 方案 13-1：使用 MySQLi 插入新记录\n\n本 PHP 方案演示了如何使用\
  \ MySQLi 预处理语句向 `blog` 表中插入新记录。使用预处理语句可以避免转义引号和控制字符带来的问题，同时还能防止数据库受到 SQL 注入攻击（参见第\
  \ 11 章）。\n\n在 `phpsols` 站点根目录下创建一个名为 `admin` 的文件夹。从 `ch13` 文件夹中复制 `blog_insert_01.php`，并将其保存到新文件夹中，命名为\
  \ `blog_insert_mysqli.php`。插入新记录的代码只应在表单提交后运行，因此将其封装在条件语句中，该语句检查 `$_POST` 数组中提交按钮（`insert`）的\
  \ `name` 属性。将以下代码放在 `DOCTYPE` 声明之上：\n\n```php\n<?php\n\nif (isset($_POST['insert']))\
  \ {\n\nrequire_once '../includes/connection.php';\n\n// 初始化标志\n$OK = false;\n\n\
  // 创建数据库连接\n// 初始化预处理语句\n// 创建 SQL\n// 绑定参数并执行语句\n// 如果成功则重定向，否则显示错误\n\n}\n\n?>\n\
  ```\n\n在引入连接函数后，代码将 `$OK` 设置为 `false`。仅当没有错误时，该变量才会被重置为 `true`。末尾的五个注释勾勒出了我们将在下面填充的剩余步骤。\n\
  \n创建数据库连接，用户需拥有读写权限，然后初始化预处理语句，并创建包含占位符的 SQL，这些占位符将用于存储来自用户输入的数据，具体如下：\n\n```php\n\
  // 创建数据库连接\n$conn = dbConnect('write');\n\n// 初始化预处理语句\n$stmt = $conn->stmt_init();\n\
  \n// 创建 SQL\n$sql = 'INSERT INTO blog (title, article)\nVALUES(?, ?)';\n```\n\n\
  将从 `$_POST['title']` 和 `$_POST['article']` 获取的值用问号占位符表示。其他列将自动填充。`article_id` 列是主键，使用\
  \ `AUTO_INCREMENT` 自增，而 `created` 和 `updated` 列的默认值为 `CURRENT_TIMESTAMP`。\n\n> **注意：**\
  \ 此处的代码顺序与第 11 章略有不同。该脚本将在第 15 章中进一步开发，用于执行一系列 SQL 查询，因此首先初始化预处理语句。\n\n下一步是将问号替换为变量中存储的值——这一过程称为绑定参数。插入以下代码：\n\
  \n```php\nif ($stmt->prepare($sql)) {\n\n// 绑定参数并执行语句\n$stmt->bind_param('ss', $_POST['title'],\
  \ $_POST['article']);\n$stmt->execute();\n\nif ($stmt->affected_rows > 0) {\n  \
  \  $OK = true;\n}\n\n}\n```\n\n这部分代码能防止数据库受到 SQL 注入攻击。将变量按照要插入 SQL 查询的顺序传递给 `bind_param()`\
  \ 方法，同时传递第一个参数，该参数指定每个变量的数据类型，顺序同样与变量一致。两个变量都是字符串，因此该参数为 `'ss'`。\n\n将值绑定到占位符后，调用\
  \ `execute()` 方法。\n\n`affected_rows` 属性记录了 `INSERT`、`UPDATE` 或 `DELETE` 查询所影响的行数。\n\
  \n> **警告：** 如果查询触发 MySQL 错误，`affected_rows` 会返回 –1。与某些编程语言不同，PHP 将 –1 视为 `true`。因此，你需要确认\
  \ `affected_rows` 大于零，才能确保查询成功。如果大于零，`$OK` 会被重置为 `true`。\n\n最后，将页面重定向到现有记录列表，或显示错误信息。在上一步之后添加以下代码：\n\
  \n```php\n// 如果成功则重定向，否则显示错误\nif ($OK) {\nheader('Location:\nhttp://localhost/phpsols/admin/blog_list_mysqli.php\
  \ ');\nexit;\n} else {\n$error = $stmt->error;\n}\n\n}\n\n?>\n```\n\n在页面主体中添加以下代码块，以便在插入操作失败时显示错误信息：\n\
  \n```php\n<h1>插入新博客条目</h1>\n\n<?php if (isset($error)) {\necho \"<p>错误：$error</p>\"\
  ;\n} ?>\n\n<form method=\"post\" action=\"\">\n```\n\n完整代码位于 `ch13` 文件夹中的 `blog_insert_mysqli.php`。\n\
  \n至此，插入页面已完成。但在测试之前，请先创建 `blog_list_mysqli.php`，该文件将在 PHP 方案 13-3 中介绍。\n\n> **注意：**\
  \ 为了专注于与数据库交互的代码，本章中的脚本未对用户输入进行验证。在实际应用开发中，应使用第 5 章中介绍的技术检查表单提交的数据，并在检测到错误时重新显示。\n\
  \n\n\n### PHP 方案 13-2：使用 PDO 插入新记录\n\n本 PHP 方案演示了如何使用 PDO 预处理语句向 `blog` 表中插入新记录。如果尚未操作，请先在\
  \ `phpsols` 站点根目录下创建一个名为 `admin` 的文件夹。\n\n将 `blog_insert_01.php` 复制到 `admin` 文件夹中，并另存为\
  \ `blog_insert_pdo.php`。插入新记录的代码应仅在表单提交后运行，因此它被包裹在一个条件语句中，该语句会检查 `$_POST` 数组中是否存在提交按钮的\
  \ `name` 属性值（`insert`）。请在 `DOCTYPE` 声明之前的 PHP 代码块中添加以下内容：\n\n```\nif (isset($_POST['insert']))\
  \ {\n\nrequire_once '../includes/connection.php';\n\n// 初始化标志\n$OK = false;\n\n\
  // 创建数据库连接\n// 创建 SQL 语句\n// 准备预处理语句\n// 绑定参数并执行语句\n// 成功则重定向，否则显示错误\n\n}\n```\n\
  \n在引入连接函数后，代码将 `$OK` 设置为 `false`。仅当没有错误时，它才会被重置为 `true`。末尾的五条注释勾勒出了后续步骤。\n\n以具有读写权限的用户身份创建到数据库的\
  \ PDO 连接，并按如下方式构建 SQL 语句：\n\n```\n// 创建数据库连接\n$conn = dbConnect('write', 'pdo');\n\
  \n// 创建 SQL 语句\n$sql = 'INSERT INTO blog (title, article)\nVALUES(:title, :article)';\n\
  ```\n\n从变量中获取的值由命名占位符表示，这些占位符由列名加上冒号前缀组成（`:title` 和 `:article`）。其他列的值将由数据库自动生成。`article_id`\
  \ 主键会自动递增，`created` 和 `updated` 列的默认值设置为 `CURRENT_TIMESTAMP`。\n\n下一步是初始化预处理语句，并将变量值绑定到占位符——这一过程称为参数绑定。添加以下代码：\n\
  \n```\n// 准备预处理语句\n$stmt = $conn->prepare($sql);\n\n// 绑定参数并执行语句\n$stmt->bindParam(':title',\
  \ $_POST['title'], PDO::PARAM_STR);\n$stmt->bindParam(':article', $_POST['article'],\
  \ PDO::PARAM_STR);\n\n// 执行并获取受影响行数\n$stmt->execute();\n$OK = $stmt->rowCount();\n\
  ```\n\n首先，将 SQL 查询传递给数据库连接对象（`$conn`）的 `prepare()` 方法，并将语句的引用存储为变量（`$stmt`）。\n\n\
  接下来，将变量中的值绑定到预处理语句中的占位符，然后 `execute()` 方法运行查询。\n\n当与 `INSERT`、`UPDATE` 或 `DELETE`\
  \ 查询一起使用时，PDO 的 `rowCount()` 方法会报告查询影响的行数。如果记录插入成功，`$OK` 为 `1`，PHP 会将其视为 `true`。否则，它为\
  \ `0`，被视为 `false`。\n\n最后，将页面重定向到现有记录列表，或显示错误消息。在上一步骤之后添加此代码：\n\n```\n// 成功则重定向，否则显示错误\n\
  if ($OK) {\nheader('Location: http://localhost/phpsols/admin/blog_list_pdo.php');\n\
  exit;\n} else {\n$errorInfo = $stmt->errorInfo();\nif (isset($errorInfo[2])) {\n\
  $error = $errorInfo[2];\n}\n}\n}\n?>\n```\n\n由于预处理语句已存储为 `$stmt`，因此可以使用 `$stmt->errorInfo()`\
  \ 访问错误信息数组。仅当出现问题时，数组的第三个元素才会被设置。\n\n在页面的主体部分添加一个 PHP 代码块，用于显示任何错误消息：\n\n```\n<h1>插入新博客条目</h1>\n\
  <?php if (isset($error)) {\necho \"<p>错误：$error</p>\";\n} ?>\n<form method=\"post\"\
  \ action=\"\">\n```\n\n完整代码位于 `ch13` 文件夹中的 `blog_insert_pdo.php` 文件内。\n\n至此，插入页面已完成，但在测试之前，请先创建\
  \ `blog_list_pdo.php`，具体说明见下文。\n\n### 链接到更新和删除页面\n\n在更新或删除记录之前，你需要找到其主键。一种实用的方法是查询数据库并显示所有记录的列表。你可以利用此查询结果来展示所有记录，并附上指向更新和删除页面的链接。通过在每个链接的查询字符串中添加\
  \ `article_id` 的值，即可自动标识要更新或删除的记录。如图 13-2 所示，浏览器状态栏（左下角）显示的 URL 将文章 `Tiny Restaurants\
  \ Crowded Together` 的 `article_id` 标识为 `3`。\n\n![A978-1-4842-0635-5_13_Fig2_HTML.jpg](img/A978-1-4842-0635-5_13_Fig2_HTML.jpg)\n\
  \n**图 13-2.** 编辑和删除链接在查询字符串中包含记录的主键\n\n更新页面利用此信息显示正确的记录以供修改。删除链接中也传递了相同的信息到删除页面。\n\
  \n要创建这样的列表，你需要从一个包含两行以及任意多显示列的 HTML 表格开始，此外还要为编辑和删除链接额外增加两列。第一行用于显示列标题。第二行被包裹在 PHP\
  \ 循环中，用于显示所有结果。`ch13` 文件夹中的 `blog_list_mysqli_01.php` 文件中的表格代码如下所示（`blog_list_pdo_01.php`\
  \ 中的版本相同，区别仅在于最后两个表格单元格中的链接指向的是 PDO 版本的更新和删除页面）：\n\n```\n<table>\n<tr>\n<th>创建时间</th>\n\
  <th>标题</th>\n<th>&nbsp;</th>\n<th>&nbsp;</th>\n</tr>\n<tr>\n<td></td>\n<td></td>\n\
  <td><a href=\"blog_update_mysqli.php\">编辑</a></td>\n<td><a href=\"blog_delete_mysqli.php\"\
  >删除</a></td>\n</tr>\n</table>\n```\n\n\n\n#### PHP 解决方案 13-3：创建指向更新和删除页面的链接\n\n\
  本 PHP 解决方案演示了如何创建一个页面来管理 `blog` 表中的记录，具体方法为显示所有记录的列表并链接到更新和删除页面。MySQLi 和 PDO 版本之间仅存在细微差异，因此本说明将同时介绍两者。\n\
  \n将 `blog_list_mysqli_01.php` 或 `blog_list_pdo_01.php` 复制到 `admin` 文件夹，并根据您计划使用的连接方式，将其另存为\
  \ `blog_list_mysqli.php` 或 `blog_list_pdo.php`。不同版本会链接到相应的插入、更新和删除文件。\n\n您需要连接到数据库并创建\
  \ SQL 查询。在 `DOCTYPE` 声明上方的 PHP 代码块中添加以下代码：\n\n```\nrequire_once '../includes/connection.php';\n\
  \n// 创建数据库连接\n\n$conn = dbConnect('read');\n\n$sql = 'SELECT * FROM blog ORDER BY\
  \ created DESC';\n```\n\n如果您使用的是 PDO，请在 `dbConnect()` 中添加 `'pdo'` 作为第二个参数。\n\n通过添加以下代码（位于闭合\
  \ PHP 标签之前）来提交查询。\n\n对于 MySQLi，请使用以下代码：\n\n```\n$result = $conn->query($sql);\n\n\
  if (!$result) {\n    $error = $conn->error;\n}\n```\n\n对于 PDO，请使用以下代码：\n\n```\n\
  $result = $conn->query($sql);\n\n$errorInfo = $conn->errorInfo();\n\nif (isset($errorInfo[2]))\
  \ {\n    $error = $errorInfo[2];\n}\n```\n\n在表格前添加一个条件语句以显示任何错误信息，并将表格包裹在 `else`\
  \ 代码块中。表格前的代码如下所示：\n\n```\n<?php if (isset($error)) {\n    echo \"<p>$error</p>\"\
  ;\n} else { ?>\n```\n\n闭合花括号应位于结束的 `</table>` 标签之后，并放入一个单独的 PHP 代码块中。\n\n现在，您需要将第二行表格包裹在一个循环中，并从结果集中检索每条记录。以下代码应放在第一行的闭合\
  \ `</tr>` 标签与第二行的开始 `<tr>` 标签之间。\n\n对于 MySQLi，请使用以下代码：\n\n```\n</tr>\n<?php while($row\
  \ = $result->fetch_assoc()) { ?>\n<tr>\n```\n\n对于 PDO，请使用以下代码：\n\n```\n</tr>\n<?php\
  \ while ($row = $result->fetch()) { ?>\n<tr>\n```\n\n这与前一章相同，因此无需解释。\n\n在第二行的前两个单元格中显示当前记录的\
  \ `created` 和 `title` 字段，如下所示：\n\n```\n<td><?= $row['created']; ?></td>\n<td><?=\
  \ $row['title']; ?></td>\n```\n\n在接下来的两个单元格中，将当前记录的查询字符串和 `article_id` 字段的值添加到两个\
  \ URL 中，如下所示（虽然链接不同，但高亮显示的代码对于 PDO 版本是相同的）：\n\n```\n<td><a href=\"blog_update_mysqli.php?article_id=<?=\
  \ $row['article_id']; ?>\">编辑</a></td>\n<td><a href=\"blog_delete_mysqli.php?article_id=<?=\
  \ $row['article_id']; ?>\">删除</a></td>\n```\n\n这里所做的是将 `?article_id=` 添加到 URL 中，然后使用\
  \ PHP 显示 `$row['article_id']` 的值。重要的是不要留下任何可能破坏 URL 或查询字符串的空格。在 PHP 处理完毕后，在浏览器中查看页面源代码时，开始的\
  \ `<a>` 标签应如下所示（尽管数字会根据记录而变化）：\n\n```\n<a href=\"blog_update_mysqli.php?article_id=2\"\
  >\n```\n\n最后，使用一个花括号闭合包裹第二行表格的循环，如下所示：\n\n```\n</tr>\n<?php } ?>\n</table>\n```\n\
  \n保存 `blog_list_mysqli.php` 或 `blog_list_pdo.php` 并在浏览器中加载该页面。假设您已经将 `blog.sql`\
  \ 的内容加载到 `phpsols` 数据库中，您应该会看到一个包含四个项目的列表，如图 13-2 所示。现在您可以测试 `blog_insert_mysqli.php`\
  \ 或 `blog_insert_pdo.php`。插入项目后，您应该会被重定向到相应版本的 `blog_list.php`，并且创建日期和时间以及新项目的标题应显示在列表顶部。如果遇到任何问题，请将您的代码与\
  \ `ch13` 文件夹中的版本进行对比。\n\n**提示：** 此代码假定表中始终存在一些记录。作为练习，请使用 PHP 解决方案 11-2（MySQLi）或\
  \ 11-4（PDO）中的技术来统计结果数量，并使用条件语句在没有找到记录时显示一条消息。解决方案在 `blog_list_norec_mysqli.php`\
  \ 和 `blog_list_norec_pdo.php` 中。\n\n### 更新记录\n\n更新页面需要执行两个单独的过程，如下所示：\n\n- 检索选定的记录，并将其显示以进行编辑\n\
  - 在数据库中更新编辑后的记录\n\n第一阶段使用 `$_GET` 超全局数组从 URL 中检索主键，然后使用它在更新表单中选择并显示该记录，如图 13-3 所示。\n\
  \n![A978-1-4842-0635-5_13_Fig3_HTML.jpg](img/A978-1-4842-0635-5_13_Fig3_HTML.jpg)\n\
  \n图 13-3. 主键在更新过程中跟踪记录\n\n主键存储在更新表单的一个隐藏字段中。在更新页面中编辑记录后，您使用 `post` 方法提交表单，将所有详细信息（包括主键）传递给一个\
  \ `UPDATE` 命令。\n\nSQL `UPDATE` 命令的基本语法如下所示：\n\n```\nUPDATE table_name SET column_name\
