    simplifies the constructor for occasions when you want to save the\nthumbnail\
    \ and original image in the same folder. If you want to use the\ndefault settings\
    \ for a thumbnail, there’s no need to call the `setThumbOptions()`\nmethod. Also,\
    \ I could have silently used the original upload folder\ninstead of throwing an\
    \ exception if there’s a problem with the thumbnail\ndestination. I decided that\
    \ a problem with the destination folder is too\nserious to ignore. Decisions like\
    \ this are an integral part of writing\nany script, not just of designing a class.\n\
    \n1.  Next, create a protected method to generate the thumbnail using the\n  \
    \  following code:\n\n```\n    protected function createThumbnail($image) {\n\
    \    $thumb = new Thumbnail($image, $this->thumbDestination, $this->maxSize,\n\
    \    $this->suffix);\n    $thumb->create();\n    $messages = $thumb->getMessages();\n\
    \    $this->messages = array_merge($this->messages, $messages);\n    }\n    ```\n\
    \nThis takes a single argument, the path to an image, and creates a\n    `Thumbnail`\n\
    \    object. The code is similar to `create_thumb.php` so\n    it shouldn’t need\
    \ explanation. The last three arguments passed to the\n    `Thumbnail`\n    constructor\
    \ are stored as properties of the `ThumbnailUpload`\n    class, so they’re available\
    \ even if `setThumbOptions()`\n    isn’t invoked.\n\nThe final line uses `array_merge()`\
    \ to\n    merge any messages generated by the `Thumbnail` object with\n    the\
    \ `$message`s\n    property of the `ThumbnailUpload`\n    class. Although the\
    \ properties you defined in step 2 don’t include a\n    `$messages`\n    property,\
    \ the child class automatically inherits it from its parent.\n\n2.  In the parent\
    \ class, the `moveFile()` method\n    saves  an\n    uploaded file to its target\
    \ destination. The thumbnail needs to be\n    generated from the original image,\
    \ so you need to override the parent’s\n    `moveFile()`\n    method and use it\
    \ to call the `createThumbnail()`\n    method that you have just defined. Copy\
    \ the `moveFile()` method\n    from `Upload.php`\n    and amend it by adding the\
    \ code highlighted in bold.\n\n```\n    protected function moveFile($file) {\n\
    \    $filename = $this->newName ?? $file['name'];\n    $success = move_uploaded_file($file['tmp_name'],\n\
    \    $this->destination . $filename);\n    if ($success) {\n    // add a message\
    \ only if the original image is not deleted\n    if (!$this->deleteOriginal) {\n\
    \    $result = $file['name'] . ' was uploaded successfully';\n    if (!is_null($this->newName))\
    \ {\n    $result .= ', and was renamed ' . $this->newName;\n    }\n    $this->messages[]\
    \ = $result;\n    }\n    // create a thumbnail from the uploaded image\n    $this->createThumbnail($this->destination\
    \ . $filename);\n    // delete the uploaded image if required\n    if ($this->deleteOriginal)\
    \ {\n    unlink($this->destination . $filename);\n    }\n    } else {\n    $this->messages[]\
    \ = 'Could not upload ' . $file['name'];\n    }\n    }\n    ```"
  trans: "\n此代码声明了 `PhpSolutions\\Image` 命名空间，并在导入 `Upload` 和 `Thumbnail` 类的定义之前，先从\
    \ `PhpSolutions\\File` 命名空间导入了 `Upload` 类。\n\n**注意**  \n在包含文件中使用时，`__DIR__` 返回的是被包含文件所在的目录（不带尾部斜杠）。通过在与\
    \ `Upload.php` 的相对路径开头添加斜杠，PHP 就能构建出完整路径，从而回退一级并在 `PhpSolutions/File` 文件夹中找到该文件。`Thumbnail.php`\
    \ 与 `ThumbnailUpload.php` 位于同一文件夹，因此仅通过文件名即可包含。详见第 5 章“嵌套包含文件”。\n\n随后，`ThumbnailUpload`\
    \ 类声明其继承 `Upload`。尽管 `Upload` 位于不同命名空间，但由于已将其导入，因此可直接使用 `Upload` 来引用。后续所有代码均需插入到类定义的一对花括号之间。\n\
    \n1.  子类需要四个属性：缩略图的目标保存文件夹、一个决定是否删除原始图片的布尔值、缩略图的最大尺寸，以及要添加到缩略图名称的后缀。最后两个属性在你不想使用\
    \ `Thumbnail` 中定义的默认值时是必需的。请在花括号内添加以下属性定义：\n\n    ```\n    protected $thumbDestination;\n\
    \    protected $deleteOriginal;\n    protected $maxSize = 120;\n    protected\
    \ $suffix = '_thb';\n    ```\n\n2.  当继承一个类时，只有在需要修改构造函数工作方式的情况下，才需要定义构造函数方法。`ThumbnailUpload`\
    \ 类接受一个额外参数，用于决定是否删除原始图片，这让你可以选择仅保留缩略图，或同时保留两个版本的图片。在本地测试时，`Thumbnail` 对象可以直接访问自己硬盘上的原始图片。然而，生成缩略图是服务器端操作，因此如果不先将原始图片上传到服务器，该操作在网站上无法工作。\n\
    \n    构造函数还需要调用父类构造函数来定义上传文件夹的路径。请在类中添加以下定义：\n\n    ```\n    public function __construct($path,\
    \ $deleteOriginal = false) {\n    parent::__construct($path);\n    $this->thumbDestination\
    \ = $path;\n    $this->deleteOriginal = $deleteOriginal;\n    }\n    ```\n\n \
    \   构造函数接受两个参数：上传文件夹的路径，以及一个决定是否删除原始图片的布尔变量。第二个参数在构造函数签名中被设置为 `false`，使其成为可选参数。\n\
    \n    **注意**  \n    在定义函数或类方法时，传递给函数（方法）的参数（严格来说称为形参）被称为其**签名**。\n\n    构造函数内部的第一行代码将\
    \ `$path` 传递给父类构造函数，以设置文件上传的目标文件夹。第二行代码将 `$path` 也赋值给 `$thumbDestination` 属性，使两个图片共享同一个默认文件夹。\n\
    \n    最后一行将第二个参数的值赋给 `$deleteOriginal` 属性。由于第二个参数是可选的，它会被自动设置为 `false`，因此除非你显式将其设置为\
    \ `true`，否则两个图片均会被保留。\n\n3.  创建设置缩略图选项的方法，如下所示：\n\n    ```\n    public function\
    \ setThumbOptions($path, $maxSize = null, $suffix = null) {\n    if (is_dir($path)\
    \ && is_writable($path)) {\n    $this->thumbDestination = rtrim($path, '/\\\\\
    ') . DIRECTORY_SEPARATOR;\n    } else {\n    throw new \\Exception(\"$path 必须是一个有效且可写的目录。\"\
    );\n    }\n    if (!is_null($maxSize)) {\n    $this->maxSize = $maxSize;\n   \
    \ }\n    if (!is_null($suffix)) {\n    $this->suffix = $suffix;\n    }\n    }\n\
    \    ```\n\n    此方法仅将路径作为必需参数。另外两个参数 `$maxSize` 和 `$suffix` 被设置为 `null`，因此它们是可选的。该方法会检查作为第一个参数传入的值是否是一个文件夹（目录）并且可写，然后将该值赋给\
    \ `$thumbDestination` 属性。如果作为参数传入的值无效，该类会抛出一个异常。`Exception` 前面加了一个反斜杠，表示你正在使用核心的\
    \ `Exception` 类，而不是此命名空间特有的类。\n\n    其余两个值若不为 `null`，则会被分别赋给 `$maxSize` 和 `$suffix`\
    \ 属性。\n\n    **提示**  \n    我原本可以为构造函数增加额外的参数，而不是创建一个专门设置缩略图选项的方法。然而，我选择这样做是为了简化构造函数，特别是在你想将缩略图和原始图片保存在同一文件夹时。如果你想使用缩略图的默认设置，则无需调用\
    \ `setThumbOptions()` 方法。另外，如果缩略图目标目录存在问题，我也本可以静默地使用原始上传文件夹，而不是抛出异常。但我认为目标目录的问题过于严重，不容忽视。诸如此类的决策是编写任何脚本（不仅仅是设计类时）不可或缺的一部分。\n\
    \n4.  接下来，使用以下代码创建一个受保护的方法来生成缩略图：\n\n    ```\n    protected function createThumbnail($image)\
    \ {\n    $thumb = new Thumbnail($image, $this->thumbDestination, $this->maxSize,\n\
    \    $this->suffix);\n    $thumb->create();\n    $messages = $thumb->getMessages();\n\
    \    $this->messages = array_merge($this->messages, $messages);\n    }\n    ```\n\
    \n    此方法接受一个参数（图片路径），并创建一个 `Thumbnail` 对象。代码与 `create_thumb.php` 类似，因此无需解释。传递给\
    \ `Thumbnail` 构造函数的最后三个参数作为 `ThumbnailUpload` 类的属性存储，因此即使未调用 `setThumbOptions()`\
    \ 方法，这些属性也是可用的。\n\n    最后一行使用 `array_merge()` 将 `Thumbnail` 对象生成的任何消息与 `ThumbnailUpload`\
    \ 类的 `$messages` 属性合并。尽管你在步骤 2 中定义的属性不包含 `$messages` 属性，但子类会自动从其父类继承该属性。\n\n5.\
    \  在父类中，`moveFile()` 方法将上传的文件保存到目标位置。缩略图需要从原始图片生成，因此你需要重写父类的 `moveFile()` 方法，并使用它来调用你刚刚定义的\
    \ `createThumbnail()` 方法。从 `Upload.php` 复制 `moveFile()` 方法，并通过添加粗体高亮显示的代码来修改它。\n\
    \n    ```\n    protected function moveFile($file) {\n    $filename = $this->newName\
    \ ?? $file['name'];\n    $success = move_uploaded_file($file['tmp_name'],\n  \
    \  $this->destination . $filename);\n    if ($success) {\n    // 仅当原始图片未被删除时才添加消息\n\
    \    if (!$this->deleteOriginal) {\n    $result = $file['name'] . ' 上传成功';\n \
    \   if (!is_null($this->newName)) {\n    $result .= '，并已重命名为 ' . $this->newName;\n\
    \    }\n    $this->messages[] = $result;\n    }\n    // 根据上传的图片创建缩略图\n    $this->createThumbnail($this->destination\
    \ . $filename);\n    // 如果需要，删除上传的原始图片\n    if ($this->deleteOriginal) {\n   \
    \ unlink($this->destination . $filename);\n    }\n    } else {\n    $this->messages[]\
    \ = '无法上传 ' . $file['name'];\n    }\n    }\n    ```\n"
- fmt: 'If the original image has been uploaded successfully, the new code adds a
    conditional statement to generate the message only if `$deleteOriginal` is `false`.
    It then calls the `createThumbnail()` method, passing it the uploaded image as
    the argument. Finally, if `$deleteOriginal` has been set to `true`, it uses `unlink()`
    to delete the uploaded image, leaving only the thumbnail.


    3.  Save `ThumbnailUpload.php`. To test it, copy `create_thumb_upload_01.php`
    from the `ch10` folder to the `gd` folder and save it as `create_thumb_upload.php`.
    The file contains a simple form with a file field and a PHP block that displays
    messages. Add the following PHP code block above the `DOCTYPE` declaration:


    ```

    setThumbOptions(''C:/upload_test/thumbs/'');

    $loader->upload(''image'');

    $messages = $loader->getMessages();

    } catch (Exception $e) {

    echo $e->getMessage();

    }

    }

    ?>

    ```


    Adjust the paths in the constructor and `setThumbDestination()` method, if necessary.


    4.  Save `create_thumb_upload.php` and load it in a browser. Click the Browse
    or Choose Files button and select multiple images. When you click the Upload button,
    you should see messages informing you of the successful upload and creation of
    the thumbnails. Check the destination folders, as shown in Figure [10-7](#332054_4_En_10_Chapter.xhtml#Fig7).


    ![../images/332054_4_En_10_Chapter/332054_4_En_10_Fig7_HTML.jpg](images/332054_4_En_10_Chapter/332054_4_En_10_Fig7_HTML.jpg)


    **Figure 10-7.** The thumbnails are created at the same time as the images are
    uploaded.


    5.  Test the `ThumbnailUpload` class by uploading the same images again. This
    time, the original images and thumbnails should be renamed in the same way as
    in Chapter [9](#332054_4_En_9_Chapter.xhtml) through the addition of a number
    before the filename extension.


    6.  Try different tests, changing the suffix inserted into the thumbnail names
    or deleting the original image after the thumbnail has been created. If you run
    into problems, check your code against `ThumbnailUpload.php` in the `ch10/PhpSolutions/Image`
    folder.


    **Tip** In older browsers that don’t support the `multiple` attribute on form
    fields, the class uploads a single image and creates a thumbnail from it. To support
    multiple uploads from older browsers, create multiple file fields in the form
    and give them all the same `name` attribute followed by an empty pair of square
    brackets, like this: `name="image[]"`.


    ## Using the ThumbnailUpload class


    The `ThumbnailUpload` class is easy to use. Because it uses a namespace, import
    the class at the top level of your file like this:


    ```

    use PhpSolutions\Image\ThumbnailUpload;

    ```


    Then include the class definition and pass the path for the upload folder to the
    class constructor method:


    ```

    $loader = new ThumbnailUpload(''C:/upload_test/'');

    ```


    If you want to delete the original image after the thumbnail has been created,
    pass `true` as the second argument to the constructor, as follows:


    ```

    $loader = new ThumbnailUpload(''C:/upload_test/'', true);

    ```


    The class has the following public methods:


    *   `setThumbOptions()`: This sets the path to the folder where the thumbnail
    images are to be saved. If you don’t call this method, the thumbnails are stored
    in the same folder as the original images. It also takes two optional arguments
    to set the maximum size of the thumbnail in pixels (default is 120) and to change
    the suffix inserted into the thumbnail names (the default is `_thb`).

    *   `upload()`: This uploads the original image(s) and generates the thumbnail(s).
    It has one required argument: the name of the file upload element. By default,
    images that have the same name as an existing one are renamed. To overwrite existing
    images, pass `false` as an optional second argument to this method.


    The class also inherits the following methods from the parent `Upload` class:


    *   `getMessages()`: Retrieves messages generated by the upload and the thumbnail.

    *   `getMaxSize()`: Gets the maximum upload size for an individual image. The
    default is 50 KB.


    Because the `ThumbnailUpload` class is dependent on the `Upload` and `Thumbnail`
    classes, you need to upload all three class definition files to your remote web
    server when using this class on a live web site.


    ## Chapter Review


    This has been another intense chapter, showing not only how to generate thumbnails
    from larger images but also introducing you to extending an existing class and
    overriding inherited methods. Designing and extending classes can be confusing
    at first, but it becomes less intimidating if you concentrate on what each method
    is doing. A key principle of class design is to break large tasks down into small,
    manageable units. Ideally, a method should perform a single task, such as creating
    the image resource for the original image.


    The real advantage of using classes is the time and effort they save once you
    have defined them. Instead of typing dozens of lines of code each time you want
    to add file or thumbnail upload functionality to a web site, calling the class
    involves just a few simple lines. Also, don’t think of the code in this chapter
    as being exclusively for creating and uploading thumbnail images. Many of the
    subroutines in the class files could be adapted for use in other situations.


    In the next chapter, you’ll learn all about PHP sessions, which preserve information
    related to a specific user and play a vital role in password-protecting web pages.


    ## 11. Pages That Remember: Simple Login and Multipage Forms


    The Web is a brilliant illusion. When you visit a well-designed web site, you
    get a great feeling of continuity, as though flipping through the pages of a book
    or a magazine. Everything fits together as a coherent entity. The reality is quite
    different. Each part of an individual page is stored and handled separately by
    the web server. Apart from needing to know where to send the relevant files, the
    server has no interest in who you are. Each time a PHP script runs, the variables
    exist only in the server’s memory and are normally discarded as soon as the script
    finishes. Even variables in the `$_POST` and `$_GET` arrays have only a brief
    lifespan. Their value is passed once to the next script and then removed from
    memory unless you do something with it, such as storing the information in a hidden
    form field. Even then, it persists only if the form is submitted.


    To get around these problems, PHP uses **sessions**. After briefly describing
    how sessions work, I’ll show you how you can use session variables to create a
    simple, file-based login system and pass information from one page to another
    without the need to use hidden form fields.


    In this chapter, you’ll learn about the following:


    *   Understanding what sessions are and how to create them

    *   Creating a file-based login system

    *   Checking password strength with a custom-built class

    *   Setting a time limit for sessions

    *   Using sessions to keep track of information over multiple pages


    ### What Sessions are and How They Work


    A session ensures continuity by storing a random identifier—the session ID—on
    the web server and as a cookie on the visitor’s computer. The web server uses
    the cookie to recognize that it’s communicating with the same person (or, to be
    more precise, with the same computer). Figures [11-1](#332054_4_En_11_Chapter.xhtml#Fig1)
    to [11-3](#332054_4_En_11_Chapter.xhtml#Fig3) show the details of a simple session
    created in my local testing environment.


    As Figure [11-1](#332054_4_En_11_Chapter.xhtml#Fig1) shows, the cookie stored
    in the browser is called `PHPSESSID`, and the content is a jumble of letters and
    numbers. This random string is the session’s ID.


    ![../images/332054_4_En_11_Chapter/332054_4_En_11_Fig1_HTML.jpg](images/332054_4_En_11_Chapter/332054_4_En_11_Fig1_HTML.jpg)'
