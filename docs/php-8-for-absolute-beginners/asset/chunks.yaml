  trans: "\n# 为投票功能开发数据库\n\n要深入理解数据库驱动的网页，最佳方法就是亲自创建一个来测试。在接下来的几页中，我们将创建一个数据库驱动的站点投票功能。这是一个简单的数据库驱动开发示例，但足以演示其核心原理。最简单的站点投票功能将展示一个问题，访问者可以回答*是*或*否*。所有用户的回复都会被显示，这样每个站点用户都能看到其他人的投票结果。\n\
    \n尽管这个示例非常简单，但它会用到我们目前掌握的许多技能，并教会我们如何在 PHP 项目中整合数据库驱动的数据。\n\n该站点投票功能依赖一个数据库表来存储投票问题和投票回复。PHP\
    \ 将连接到 `MySQL`/`MariaDB` 并检索相关数据，以便在浏览器中显示。使用 PHP，我们将输出一个 HTML 表单，让站点访问者能够与投票功能交互。每当访问者提交表单时，PHP\
    \ 就会提交答案，并相应地更新 `MySQL`/`MariaDB` 数据库表。让我们首先创建一个包含表和一些投票数据的数据库。\n\n## 使用 `CREATE`\
    \ 构建数据库\n\nSQL 使用关键字 `CREATE` 来构建数据库或数据库表。`CREATE` 语句必须包含 `CREATE` 关键字，以及一个表明我们想要构建的是数据库还是表的关键字。逻辑上，我们必须先创建数据库，然后才能在数据库中放置任何表。因此，我们将使用\
    \ `DATABASE` 关键字与 `CREATE` 关键字一起来构建数据库。当然，我们还需要为数据库提供一个名称。\n\n```sql\nCREATE DATABASE\
    \ playground\n```\n\n要执行 SQL 语句，我们可以选择 phpMyAdmin 控制面板中的 **SQL** 选项卡（图 6-3）。选中后，会显示一个文本字段，用于输入任何有效的\
    \ SQL 命令。要执行 SQL，请点击文本字段下方的 **执行** 按钮。\n\n![](img/323857_3_En_6_Fig3_HTML.jpg)\n\
    \n*一张 phpMyAdmin 应用程序的截图，显示了用于创建数据库的服务器 SQL 查询。*\n\n**图 6-3** phpMyAdmin 中的 SQL\
    \ 选项卡\n\n我们也可以通过选择 **数据库** 选项卡来创建数据库。\n\n![](img/323857_3_En_6_Fig4_HTML.jpg)\n\
    \n*一张 phpMyAdmin 应用程序的截图，显示了用于创建数据库的服务器数据库表。*\n\n**图 6-4** phpMyAdmin 中的数据库选项卡\n\
    \n只需输入数据库名称，然后点击 **创建**。我们也可以选择要与数据库一起使用的排序规则类型。不过，使用默认设置是可以的。\n\n> **注意**  \n\
    > 排序规则是一组规则，用于指定字符集中哪些字符排在前面。我们知道 *a* 排在 *b* 之前，但字符 *7* 呢？它应该排在字母字符之前还是之后？特殊字符如\
    \ *#”#€%*&* 呢？排序规则明确规定了字符的排序方式。\n\n## `CREATE TABLE` 语句\n\n如前所述，由于 `MySQL`/`MariaDB`\
    \ 是关系型数据库，它以表的形式存储数据。自然地，创建数据库后，我们需要创建一个表。我们需要掌握更多一点 SQL 知识来完成这一操作。创建表的一般语法如下：\n\
    \n```sql\nCREATE TABLE table_name (\n    column_name datatype [any constraints\
    \ or default values],\n    column_name datatype [any constraints or default values]\n\
    )\n```\n\n同样，我们使用 `CREATE` 语句来构建表，其格式与构建数据库类似。我们将声明属性（列）的名称以及每个列或属性的数据类型。我们随时可以添加或删除列或属性。`CREATE`\
    \ 语句还可以声明约束条件或默认值。\n\n### 安全编程\n\n在数据库中创建列时，应特别关注并仔细考虑数据类型、约束条件和默认值。一个安全的数据库会限制不符合这些参数的值进入。如果使用数据库的程序依赖于某个字段中存在的值，则应提供默认值。请记住，程序在尝试更新表之前可能会拒绝无效值。在这种情况下，使用默认值可能是可以接受的。然而，在某些情况下，为了确保创建的记录中存在足够的信息，可能需要该值。此时，应将数据库列设置为要求提供该信息。如果未提供，数据库管理系统将拒绝输入数据的尝试。\n\
    \n让我们通过点击 phpMyAdmin 控制面板左侧列中的 `playground` 数据库名称来访问它。点击屏幕顶部的 **SQL** 选项卡，然后我们就可以创建第一个表了。\n\
    \n```sql\nCREATE TABLE poll (\n    poll_id INT NOT NULL AUTO_INCREMENT,\n    poll_question\
    \ TEXT,\n    yes INT DEFAULT 0,\n    no INT DEFAULT 0,\n    PRIMARY KEY (poll_id)\n\
    )\n```\n\n注意 `CREATE` 语句的格式。在每个语句之间包含正确的括号和逗号至关重要。最后一行不需要逗号。一旦我们在文本字段中输入了 SQL，就可以点击\
    \ **执行** 来运行它。这将创建新表。\n\n![](img/323857_3_En_6_Fig5_HTML.jpg)\n\n*一张 phpMyAdmin\
    \ 应用程序的截图，显示了用于创建表 Poll 的数据库 SQL。*\n\n**图 6-5** 在 `playground` 数据库中创建一个新表\n\n\
    在从左侧列中选择数据库后，我们也可以使用默认窗口创建表。输入表名后，我们还必须选择要创建的列数。点击按钮后，下一个屏幕将显示用于输入每列属性的框。输入的信息与前面程序代码中显示的信息相同。\n\
    \n让我们通过从 phpMyAdmin 左侧面板中选择 `poll` 表来探索我们创建的新表。接着，从菜单中选择 **结构** 选项卡。\n\n![](img/323857_3_En_6_Fig6_HTML.jpg)\n\
    \n*一张 phpMyAdmin 应用程序的截图，显示了 poll 表下的结构标头。*\n\n**图 6-6** Poll 表结构\n\n`poll` 表有四个属性或列：`poll_id`、`poll_question`、`yes`\
    \ 和 `no`。每个属性都有一个*类型*（数据类型）。表的字段只能存储正确类型的数据。例如，根据 `int` 类型的指示，我们只能在 `poll_id`、`yes`\
    \ 和 `no` 中存储整数。数字 11 是整数的默认大小。这可以通过 SQL 代码进行调整，或者通过点击列右侧的 **更改** 关键字进行修改。我们将使用默认设置。`poll_question`\
    \ 的类型设置将条目限制为仅文本。最后，`yes` 和 `no` 属性创建时设置了默认值 0。其他属性都没有默认值。\n"
- fmt: '# Understanding PRIMARY KEY


    The `poll_id` attribute includes a visual key to the right of the name. Also,
    it is listed at the bottom of the screen with a `PRIMARY` key name. This indicates
    `poll_id` is now the primary key of `poll` entities. When an attribute is declared
    as the primary key, it must hold a unique value. So, however many rows of data
    the `poll` table will eventually contain, there can be no two identical `poll_id`
    values.


    If we have a row of data with a `poll_id` of 1. Then if we attempt to insert another
    row of data also with a `poll_id` of 1, the new row will display an error message.
    A primary key is used to unambiguously identify one row of data. As an example,
    think about how many John Smiths there are. We could not use name as a unique
    identifier. However, we could give each a unique id to determine which John Smith
    we want to explore.


    We can actually create tables in MySQL/MariaDB without a primary key, but such
    tables are special cases. Most of the time, you will want to create tables with
    a primary key, because data isn’t really useful if you can’t identify entries
    uniquely.


    We now know that the `poll` table is created in such a way that a primary key
    `poll_id` must have a value which is unique. The `poll_id` attribute is declared
    as `NOT NULL`, meaning that a null value (null is basically the same as no entry
    at all) will not be accepted for `poll_id`. The `poll_id` attribute must invariably
    hold an integer value. The `poll_id` attribute cannot be left empty.


    # Understanding AUTO_INCREMENT


    What about the auto-increment setting for `poll_id`? It is a simple but powerful
    tool: The first row of data in the `poll` table will get a `poll_id` of 1. The
    next row will automatically get a `poll_id` of 2. The next row will get a `poll_id`
    of 3, and so forth. The value of `poll_id` will automatically increment! A great
    way to make sure each row is identified by a unique value.


    # The INSERT Statement


    With our table created, we’re ready to start storing data. Every new entry into
    the `poll` table will be stored as a separate row. For the sake of simplicity,
    we can start with inserting a single row of data.


    ```

    INSERT INTO poll (

    poll_question

    ) VALUES (

    "Is PHP hard fun?"

    )

    ```


    This SQL statement will insert a new row of data into the table called `poll`.
    It will declare a value for the `poll_question` column or attribute. More specifically,
    the `poll_question` column will get a value of *Is PHP hard fun?* Remember how
    the `poll` table has a total of four attributes or columns? The remaining columns
    `poll_id`, `yes`, and `no` will simply be created with default values. `poll_id`
    will get a value of 1, while `yes` and `no` will both get a value of 0.


    We can execute the SQL statement in the same manner as we did when creating the
    table. First, we select the `playground` database in the phpMyAdmin control panel.
    Then, we click the SQL tab and enter the preceding SQL statement. Finally, we
    click Go to execute the entered SQL statement. The system will then indicate that
    one row has been inserted.


    Alternatively, we can select the database from the control panel. Then click insert
    in the menu provided. Text fields will be presented to allow us to enter data.
    We can then enter the “Is PHP hard fun?” statement in the `poll_question` text
    box. Then click the “Go” button at the bottom of the screen. This will generate
    an SQL statement similar to the one presented earlier. The system will also include
    the default values not previously shown. To execute the generated statement, click
    the “Go” button at the bottom of the screen.


    To insert values for more than one column (attribute), the syntax of the INSERT
    statement will slightly vary.


    ```

    INSERT INTO `poll` (`poll_id`, `poll_question`, `yes`, `no`) VALUES (NULL, ''"Is
    PHP hard fun?" '', ''0'', ''0'');

    ```


    As shown, we can specify the attribute (such as `yes`) in the first set of parentheses
    and then its related setting (`0`) in the second set of parentheses. The positions
    must be the same. `yes` is in the third position, and its value is also in the
    third position. For any attribute listed, there must be an associated value. Remember
    that any attributes not listed will be given a default value if one was defined
    in the table. Notice that in this example, `poll_id` is set to `NULL`. This setting
    is required for any auto numerated attributes. The `NULL` setting (remember, we
    set the restrictions to not allow `NULL`) will be rejected which prompts the system
    to generate a new number by incrementing the previous number. There are other
    formats that can be used to insert data. However, we will use this format because
    we can see clearly which value is associated with which attribute.


    # The SELECT Statement


    Once we have inserted a row of data into the `poll` table, it would be nice to
    see the new row displayed. To retrieve data from database tables, we will use
    the SQL `SELECT` statement.


    ```

    SELECT column_name, column_name FROM table_name

    ```


    The `SELECT` keyword is used to retrieve data. The `FROM` keyword specifies the
    table in the database to retrieve the information. The `SELECT` statement returns
    a temporary table populated with any retrieved data. The temporary table will
    have exactly the properties indicated immediately after the `SELECT` keyword.


    ```

    SELECT poll_id, poll_question, yes, no FROM poll

    ```


    We can then paste this statement into the SQL text box, as previously mentioned,
    to produce the required results.


    ![](images/323857_3_En_6_Chapter/323857_3_En_6_Fig7_HTML.jpg)


    An image of phpMyAdmin application showing SQL Query results for the `poll` table.


    **Figure 6-7** Poll table with one row inserted


    There is one row of data in the table. It has a `poll_id` of 1 and a `poll_question`.
    The `yes` and `no` columns are 1 and 0, respectively.


    # Secure Programming


    Alternatively, we could have used the `*` symbol to request all fields be displayed.


    ```

    SELECT * FROM poll

    ```


    While this format is certainly quick and easy to create, it can cause possible
    vulnerabilities. Remember that a temporary table will be created with all attributes
    returned by the `SELECT` statement. This table might be accessible to hackers.
    Only expose those columns that are necessary for the completion of the task at
    hand. We can use the `*` symbol for quickly testing that the data was stored.
    But we don’t want to use it in the final product.


    It is not much to look at in its present state, but this is all the data required
    to have a site poll displayed on a website. The website will display the poll
    question. Site visitors can then post their responses through an HTML form. Possible
    options would be *yes* or *no*. All responses from site visitors will then be
    stored in the `yes` or `no` fields. So, with a tiny bit of math, we could calculate
    the relative responses and display a message such as the following: *79% of all
    site visitors think PHP is hard and fun to learn*.


    **Exercise**: Using phpMyAdmin, execute code to accomplish the following. You
    can accomplish this task without coding, but this exercise is designed to help
    you practice your SQL coding skills. Start by creating a database named Students.
    Within that database, create a student table. Within the table, create the following
    attributes (fields): StudentID, Name, Address, City, State, Zip code, and Major.
    Populate at least three rows of information. Now display the information using
    the `SELECT` statement.


    # The UPDATE Statement


    As you can probably determine, the `yes` or `no` values in the `poll` table will
    change every time a site visitor submits a response. We need one more SQL statement
    to make these changes. Let’s assume a site user just agrees that PHP is hard to
    learn. We would need to generate an SQL statement to increase the stored value
    for the `yes` property by a value of 1.'
