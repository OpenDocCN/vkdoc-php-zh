    648XAppA.qxd 11/19/06 1:45 PM Page 571


    A P P E N D I X A


    Installing Apache, PHP, and


    PostgreSQL


    **I**n this appendix, you’ll learnhow to install


    • Apache 2.2


    • PHP 5.1 and the extra modules required for this book


    • PostgreSQL 8.1


    These are the software versions this appendix has been tested with. You should,
    however, install the latest version of all software packages, understanding that
    the installation steps might slightly differ. We’ll discuss installation under
    Windows and under Linux separately.


    The HatShop application you’ll develop in the book may work with older versions
    of the software too. It is very important that the PHP version is PHP 5.0 or more
    recent; the code uses OOP syntax that isn’t recognized by older versions of PHP.


    Because highly sensitive data such as credit card information must travel safely
    over the Web, it’s critical to host your application on an SSL-powered web server.
    Also, the PHP installation must have these modules installed: CURL, mcrypt, mhash,
    SOAP, PDO, and PDO driver for PostgreSQL.


    **Preparing Your Windows Playground**


    In this section, you’ll learn how to install Apache 2.2, PHP 5.1, and PostgreSQL
    8.1 on your development machine.


    In Windows, installing an SSL-enabled Apache is a little bit more complicated
    than installing Apache without SSL. You can follow this book even if you don’t
    have an SSL-enabled Apache; if you choose to do so, you can skip to the upcoming
    “Installing Apache (No SSL)”'
  trans: "\n# 工作原理：在 HatShop 中展示亚马逊商品\n\n在本练习中，您只需使用本章第一部分学习的技术，更新 `HatShop` 以展示亚马逊的商品。这项新功能并不特别复杂，但其带来的可能性令人兴奋。\n\
    \n若要更改访问方式，请修改 `include/config.php` 中的以下内容：\n\n```\n// Amazon E-Commerce Service\n\
    define('AMAZON_METHOD', 'REST');\n//define('AMAZON_METHOD', 'SOAP');\n```\n\n\
    当点击“从亚马逊购买”链接时，亚马逊会将客户及其购买的商品关联到您的合作伙伴 ID（该 ID 在链接中提及）。在 `AmazonProductsList`\
    \ 类的 `init` 方法中，会调用 `Amazon` 类的 `GetProducts` 方法来获取数据，从而填充产品列表。这些数据会被读取，用于构建指向检索到产品的亚马逊链接：\n\
    \n```\npublic function init()\n{\n    $amazon = new Amazon();\n    $this->mProducts\
    \ = $amazon->GetProducts();\n    for ($i = 0;$i < count($this->mProducts); $i++)\n\
    \        $this->mProducts[$i]['link'] =\n            'http://www.amazon.com/exec/obidos/ASIN/'\
    \ .\n            $this->mProducts[$i]['asin'] .\n            '/ref=nosim/' . AMAZON_ASSOCIATES_ID;\n\
    }\n```\n\n不过，您必须知道，亚马逊提供了许多方式，让您可以允许访客购买他们的产品。\n\n如果您登录到合作伙伴页面，您会看到多种可以构建并集成到您网站中的链接类型。\n\
    \n或许最有趣且最强大的功能是，通过使用亚马逊 API，您可以从 PHP 代码中创建和管理亚马逊购物车。如果您真的希望将亚马逊整合到您的网站中，您应该仔细研究\
    \ ECS 文档并充分利用它。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH17a.qxd\
    \ 11/22/06 5:42 AM Page 569\n\n第 17 章 ■ 连接 Web 服务\n\n**569**\n\n## 总结\n\n在本章中，您学习了如何使用\
    \ `REST` 和 `SOAP` 访问亚马逊电子商务服务。在通过这些协议访问任何类型的外部功能时，您都可以使用相同的技术。\n\n恭喜您，您刚刚完成了学习使用\
    \ PHP 和 PostgreSQL 构建电子商务网站的旅程。您已经具备了构建自己定制解决方案的知识，这些方案甚至可能比本书展示的更令人兴奋、更强大。我们希望您喜欢阅读这本书，并祝您在自己的\
    \ PHP 和 PostgreSQL 项目中好运！\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XCH17a.qxd 11/22/06 5:42 AM Page 570\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XAppA.qxd 11/19/06 1:45 PM Page 571\n\n# 附录 A：安装 Apache、PHP 和 PostgreSQL\n\
    \n在本附录中，您将学习如何安装：\n\n- Apache 2.2\n- PHP 5.1 以及本书所需的额外模块\n- PostgreSQL 8.1\n\n\
    这些是本附录测试过的软件版本。不过，您应该安装所有软件包的最新版本，并理解安装步骤可能会略有不同。我们将分别讨论在 Windows 和 Linux 下的安装。\n\
    \n您在本书中开发的 `HatShop` 应用程序也可能在旧版本的软件上运行。非常重要的是，PHP 版本应为 PHP 5.0 或更高版本；代码使用了旧版 PHP\
    \ 无法识别的 OOP 语法。\n\n由于信用卡信息等高度敏感数据必须在网络上安全传输，因此将您的应用程序托管在支持 SSL 的 Web 服务器上至关重要。此外，PHP\
    \ 安装必须包含以下模块：`CURL`、`mcrypt`、`mhash`、`SOAP`、`PDO` 以及适用于 PostgreSQL 的 `PDO` 驱动程序。\n\
    \n## 准备您的 Windows 开发环境\n\n在本节中，您将学习如何在您的开发机上安装 Apache 2.2、PHP 5.1 和 PostgreSQL\
    \ 8.1。\n\n在 Windows 中，安装支持 SSL 的 Apache 比安装不带 SSL 的 Apache 要稍微复杂一些。即使您没有支持 SSL\
    \ 的 Apache，也可以继续学习本书；如果选择这样做，您可以跳到接下来的“安装 Apache（无 SSL）”部分。\n"
- fmt: "# Installing SSL-Enabled Apache\n\nThe steps that follow will install Apache\
    \ on port 80, so you must make sure you don’t have another web server, such as\
    \ IIS, running on port 80.\n\n1. Download `httpd-2.2.3-win32-x86-ssl.zip`, or\
    \ a more recent version, from `http://www.apachelounge.com/download/`.\n2. Unpack\
    \ the archive, and follow the steps in `Read Me First.txt`. Your Apache installation\
    \ will reside in `C:\\Apache2`, but `https://localhost` will not respond yet —\
    \ there are still a few steps to follow.\n3. Copy `ssleay32.dll` and `libeay32.dll`\
    \ from `C:\\Apache2\\bin` to the `System32` folder of your Windows installation.\
    \ (Typically, the full path to it is `C:\\Windows\\System32`).\n4. Open a command\
    \ prompt window, and navigate to the `C:\\Apache2\\bin` folder of your Apache\
    \ installation, with a command that looks like `cd C:\\Apache2\\bin`.\n5. Execute\
    \ the following command, eventually replacing `hatshop.csr` with another name\
    \ (but be sure to keep the `.csr` extension):\n   ```\n   openssl req -config\
    \ C:\\Apache2\\conf\\openssl.cnf -new -out hatshop.csr\n   ```\n6. When asked\
    \ for “Common Name (that is, your web site’s domain name),” give the exact domain\
    \ name of your web server (for example, `www.example.com`). If the name in the\
    \ certificate doesn’t match with the URL perfectly, the browsers will alert the\
    \ users with a warning message.\n7. Execute the following command:\n   ```\n \
    \  openssl rsa -in privkey.pem -out hatshop.key\n   ```\n8. Execute the following\
    \ command:\n   ```\n   openssl x509 -in hatshop.csr -out hatshop.crt -req -signkey\
    \ hatshop.key -days 365\n   ```\n9. Create a directory in the Apache folder named\
    \ `C:\\Apache2\\conf\\ssl`, and move `hatshop.key` and `hatshop.crt` to it.\n\
    10. Open `C:\\Apache2\\conf\\httpd.conf`, and uncomment the following lines:\n\
    \    ```\n    LoadModule ssl_module modules/mod_ssl.so\n    Include conf/extra/httpd-ssl.conf\n\
    \    ```\n11. Open `C:\\Apache2\\conf\\extra\\httpd-ssl.conf`, find `SSLCertificateFile\
    \ c:/Apache2/conf/server.crt` and change it to `SSLCertificateFile c:/Apache2/conf/ssl/hatshop.crt`.\n\
    12. Also in `httpd-ssl.conf`, find `SSLCertificateKeyFile c:/Apache2/conf/server.key`\
    \ and change it to `SSLCertificateKeyFile c:/Apache2/conf/ssl/hatshop.key`.\n\
    13. Restart Apache, and load `https://localhost`. You should get a simple “It\
    \ Works” page.\n\n## Installing Apache (No SSL)\n\nIf you already have an SSL-enabled\
    \ Apache installation, you don’t need to go through these steps; instead, simply\
    \ skip to installing PHP, in the next section.\n\nDownload the latest Win32 Binary\
    \ (MSI Installer) version of the Apache HTTP Server from `http://httpd.apache.org/download.cgi`.\
    \ The file will be named something like `apache_2.x.y-win32-x86-no_ssl.msi`. Execute\
    \ the file.\n\nAt install time, you’ll be given the option to choose the location\
    \ to which your Apache web server should be installed. By default, this location\
    \ is `C:\\Program Files\\ Apache Software Foundation\\Apache2.2\\`, but you can\
    \ choose a more convenient location (such as `C:\\Apache2`) that will make your\
    \ life working with Apache a tad easier.\n\nAfter accepting the license agreement\
    \ and reading the introductory text, you’re asked to enter your server’s information\
    \ (see Figure A-1).\n\n**Figure A-1.** *Installing Apache*\n\nIf you’re not sure\
    \ about how to complete the form, just use `localhost` for the first two fields,\
    \ and enter an email address for the last. You can change this information later\
    \ by editing the `httpd.conf` file (located in `C:\\Program Files\\Apache Software\
    \ Foundation\\ApacheX.Y\\ conf\\httpd.conf` by default)."
