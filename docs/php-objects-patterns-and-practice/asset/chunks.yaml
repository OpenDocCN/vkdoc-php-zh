    ## The Null Object Pattern


    Half the problems that programmers face seem to be related to type. That’s one
    reason PHP has increasingly supported type checks for method declarations and
    returns. If dealing with a variable that contains the wrong type is a problem,
    dealing with one that contains no type at all is at least as bad. This happens
    all the time, since so many functions return `null` when they fail to generate
    a useful value. You can avoid inflicting this issue on yourself and others by
    using the Null Object pattern in your projects. As you will see, while the other
    patterns in this chapter try to get stuff done, Null Object is designed to do
    nothing as gracefully as possible.


    ### The Problem


    If your method has been charged with the task of finding an object, sometimes
    there is little to be done but to admit defeat. The information provided by the
    calling code may be stale or a resource may be unavailable. If the failure is
    catastrophic, you might choose to throw an exception. Often, though, you’ll want
    to be a little more forgiving. In such a case, returning a `null` value might
    seem like a good way of signaling failure to the client.


    The problem here is that your method is breaking its contract. If it has committed
    to return an object with a certain method, then returning null forces the client
    code to adjust to unexpected circumstances.


    Let’s return once again to our game. And let’s say that a class named `TileForces`
    keeps track of information about units on a particular tile. Our game maintains
    local saved information about the units in the system, and a component named `UnitAcquisition`
    is responsible for turning this metadata into an array of objects.


    Here is the `TileForces` constructor :


    ```

    // listing 11.53

    class TileForces

    {

    private $units = [];

    private $x;

    private $y;

    function __construct(int $x, int $y, UnitAcquisition $acq)

    {

    $this->x = $x;

    $this->y = $x;

    $this->units = $acq->getUnits($this->x, $this->y);

    }

    // ...

    }

    ```


    The `TileForces` object does little but delegate to the provided `UnitAcquisition`
    object to get an array of Unit objects. Let’s build a fake `UnitAcquisition` object:


    ```

    // listing 11.54

    class UnitAcquisition

    {

    function getUnits(int $x, int $y): array

    {

    // 1\. looks up x and y in local data and gets a list of unit ids

    // 2\. goes off to a data source and gets full unit data

    // here''s some fake data

    $army = new Army();

    $army->addUnit(new Archer());

    $found = [

    new Cavalry(),

    null,

    new LaserCanonUnit(),

    $army

    ];

    return $found;

    }

    }

    ```


    In this class, I hide the process of getting `Unit` data. Of course, in a real
    system, some actual look up would be performed here. I have contented myself with
    a few direct instantiations. Notice, though, that I embedded a sneaky `null` value
    in the `$found` array. This might happen, for example, if our network game client
    holds metadata that has fallen out of alignment with the state of data on a server.


    Armed with its array of `Unit` objects, `TileForces` can provide some functionality:


    ```

    // listing 11.55

    // TileForces

    public function firepower(): int

    {

    $power = 0;

    foreach($this->units as $unit) {

    $power += $unit->bombardStrength();

    }

    return $power;

    }

    ```


    Let’s put the code through its paces:


    ```

    // listing 11.56

    $acquirer = new UnitAcquisition();

    $tileforces = new TileForces(4, 2, $acquirer);

    $power = $tileforces->firepower();

    print "power is {$power}\n";

    ```


    Thanks to that lurking null, this code causes an error:


    ```

    Error: Call to a member function bombardStrength() on null

    ```


    `TileForces::firepower()` cycles through its `$units` array, calling `bombardStrength()`
    on each `Unit`. The attempt to invoke a method on a `null` value, of course, causes
    an error.


    The most obvious solution is to check each element of the array before working
    with it:


    ```

    // listing 11.57

    // TileForces

    public function firepower(): int

    {

    $power = 0;

    foreach ($this->units as $unit) {

    if (! is_null($unit)) {

    $power += $unit->bombardStrength();

    }

    }

    return $power;

    }

    ```


    On its own, this isn’t too much of a problem. But imagine a version of `TileForces`
    that performs all sorts of operations on the elements in its `$units` property.
    As soon as we begin to replicate the `is_null()` check in multiple places, we
    are presented once again with a particular code smell. Often, the answer to parallel
    chunks of client code is to replace multiple conditionals with polymorphism. We
    can do that here, too.'
