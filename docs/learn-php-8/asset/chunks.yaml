    \ Weight (numeric only)\n\nExample 5-1\nThe lab.html file with some validation\n\
    ```\n\n![../images/394210_2_En_5_Chapter/394210_2_En_5_Fig1_HTML.jpg](images/394210_2_En_5_Chapter/394210_2_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1\nThe lab.html file\n\nIn Example [5-1](#394210_2_En_5_Chapter.xhtml#PC1),\
    \ the `dog_name`, `dog_breed`, and `dog_color` text boxes\nset field lengths to\
