    ## Unit Tests


    Unit tests are the key to continuous integration. It’s no good successfully building
    a project that contains broken code. I covered unit testing with PHPUnit in Chapter
    [18](#A314621_5_En_18_Chapter.html). If you’re reading out of order, however,
    you’ll want to install this invaluable tool before proceeding. Here is one way
    to install PHPUnit globally:


    ```

    $ wget https://phar.phpunit.de/phpunit.phar

    $ chmod 755 phpunit.phar

    $ sudo mv phpunit.phar /usr/local/bin/phpunit

    ```


    You can also install PHPUnit with Composer:


    ```

    "require-dev": {

    "phing/phing": "2.*",

    "phpunit/phpunit": "5.4.*"

    }

    ```


    Again, this is the approach I’ll take for my example. Because PHPUnit will be
    installed under the `vendor/` directory, my development directory will remain
    independent of the wider system.


    I’ve separated my test directory from the rest of my source code, so I’ll need
    to set up my autoload rules so that PHP can locate all the system’s classes during
    testing. Here’s my complete `composer.json`:


    ```

    {

    "require-dev": {

    "phing/phing": "2.*",

    "phpunit/phpunit": "5.4.*"

    },

    "autoload": {

    "psr-4": {

    "userthing\\": ["src/", "test/"]

    }

    }

    }

    ```


    Also in Chapter [18](#A314621_5_En_18_Chapter.html), I wrote tests for a version
    of the `userthing` code I’ll be working with in this chapter. Here I run them
    once again (from within the `src` directory), to make sure my reorganization has
    not broken anything new:


    ```

    $ vendor/bin/phpunit test/

    PHPUnit 5.4.6 by Sebastian Bergmann and contributors.

    ...... 6 / 6 (100%)

    Time: 378 ms, Memory: 4.00MB

    OK (6 tests, 5 assertions)

    ```


    So this confirms that my tests work. However, I would like to invoke them with
    Phing.


    Phing provides an `exec` task which we might use to invoke the `phpunit` command.
    However, it’s always best to use a specialized tool if there’s one available.
    There is a built-in task for this job:


    Because these are unit tests and not functional tests, we can run them against
    the local `src/` directory rather than requiring an installed instance (with a
    functioning database or web server). Among many other attributes, the `phpunit`
    task accepts a `printsummary` attribute, which causes an overview of the test
    process to be output.


    Much of this task’s functionality is configured using nested elements. The `formatter`
    element manages the way that test information is generated. In this case, I have
    opted to output basic human-readable data. `batchtest` lets you define multiple
    test files using the nested `fileset` element.


    > **Note**

    >

    > The `phpunit` task is highly configurable. The Phing manual provides full documentation
    at [`https://www.phing.info/docs/guide/stable/PHPUnitTask.html`](https://www.phing.info/docs/guide/stable/PHPUnitTask.html).


    Here, I run the tests with Phing:


    ```

    $ vendor/bin/phing test

    Buildfile: /var/poppch21/build.xml

    userthing > build:

    userthing > test:

    [phpunit] Testsuite: userthing\persist\UserStoreTest

    [phpunit] Tests run: 4, Failures: 0, Errors: 0, Incomplete: 0, Skipped: 0, Time
    elapsed: 0.01105 s

    [phpunit] Testsuite: userthing\util\ValidatorTest

    [phpunit] Tests run: 2, Failures: 0, Errors: 0, Incomplete: 0, Skipped: 0, Time
    elapsed: 0.00864 s

    [phpunit] Total tests run: 6, Failures: 0, Errors: 0, Incomplete: 0, Skipped:
    0, Time elapsed: 0.02641 s

    BUILD FINISHED

    Total time: 0.5815 seconds

    BUILD FINISHED

    Total time: 1.0921 second

    ```


    ## Documentation


    Transparency is one of the principles of CI. When you’re looking at a build in
    a Continuous Integration environment, therefore, it’s important to be able to
    check that the documentation is up-to-date, and covers the most recent classes
    and methods. You can install phpDocumentor with PEAR like this:


    ```

    $ pear channel-discover pear.phpdoc.org

    $ pear install phpdoc/phpdocumentor

    ```


    Or, once again, you can use Composer:


    ```

    "require-dev": {

    "phing/phing": "2.*",

    "phpunit/phpunit": "5.4.*",

    "phpdocumentor/phpdocumentor": "2.*"

    }

    ```


    I’d better invoke the tool just to be sure, this time from the `build` directory:


    ```

    $ ./vendor/bin/phpdoc --directory=src --target=docs --title=userthing

    ```


    This generates some pretty bare documentation. Once it’s published on a CI server,
    I’m sure to be shamed into writing some real inline documentation.


    Once again, I want to add this to my `build.xml` document. There is a task named
    `phpdoc2` that is designed to integrate with PHPDocumentor:


    Again, my `doc` target depends upon the `build` target. I create the `reports/docs`
    output directory, and then invoke the `phpdoc2` task. `phpdoc2` accepts a nested
    `fileset` element, which specifies the files to document.


    > **Note**

    >

    > The full documentation for `PhpDocumentor2Task` is available at [`https://www.phing.info/docs/guide/stable/PhpDocumentor2Task.html`](https://www.phing.info/docs/guide/stable/PhpDocumentor2Task.html).


    ## Code Coverage


    It’s no good relying on tests if they don’t apply to the code you have written.
    PHPUnit includes the ability to report on code coverage. Here’s an extract from
    PHPUnit’s usage information:


    ```

    --coverage-html     Generate code coverage report in HTML format.

    --coverage-clover  Write code coverage data in Clover XML format.

    ```


    In order to use this feature, you must have the Xdebug extension installed. You
    can find more about this at [`http://pecl.php.net/package/Xdebug`](http://pecl.php.net/package/Xdebug)
    (installation information is at [`http://xdebug.org/docs/install`](http://xdebug.org/docs/install)).
    You may also be able to install directly using your Linux distribution’s package-management
    system. This should work for you in Fedora, for example:


    ```

    $ yum install php-pecl-xdebug

    ```


    Or, if you’re using a version-specific repository, you might do something like
    this:


    ```

    $ sudo yum -y install php70w-pecl-xdebug

    ```


    Here I run PHPUnit from the `src/` directory with code coverage enabled:


    ```

    $ ./vendor/bin/phpunit --whitelist src/ --coverage-html coverage test

    PHPUnit 5.4.6 by Sebastian Bergmann and contributors.

    ......                                                              6 / 6 (100%)

    Time: 1.84 seconds, Memory: 6.00MB

    OK (6 tests, 5 assertions)

    Generating code coverage report in HTML format ... done

    ```


    Now you can see the report in your browser (see Figure 21-1).


    ![A314621_5_En_21_Fig1_HTML.jpg](A314621_5_En_21_Fig1_HTML.jpg)


    **Figure 21-1.** The code coverage report


    It’s important to note that achieving full coverage is not the same as adequately
    testing a system. On the other hand, it’s good to know about any gaps in your
    tests. As you can see from Figure 21-2, I’ve still got some work to do.


