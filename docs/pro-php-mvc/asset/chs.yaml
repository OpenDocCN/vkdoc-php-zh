  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 19 章 ■ 扩展\n\n```php\nelse\n\
  {\n    header(\"Location: {$path}/{$name}\");\n}\n}\n}\n```\n\n`fonts()` 操作相当长，因此我们将它拆分为以下五个主要部分：\n\
  \n1. 首先，我们检查请求的文件是否实际存在。如果存在，则重定向到该文件。如果文件不存在，我们实际上并不会创建它（因为每次新浏览器请求时都必须重新创建样式表），但这样做是为了防范字体文件位于公共目录内的\
  \ `fonts` 目录中的情况。\n\n2. 如果请求的字体带有尾随变体指示符（`-Oblique`、`-Bold` 或 `-BoldOblique`），我们会相应地调整\
  \ `weight` 和 `style` 属性。\n\n3. 在确定需要提供哪些字体后（通过调用 `server()` 代理方法），我们编译 CSS 样式声明。\n\
  \n4. 最后，我们设置正确的 `Content-type` 并将样式声明返回给浏览器。\n\n假设你有一个 `fonts` 目录（位于公共目录内），并且其中包含符合命名方案的字体变体，那么对\
  \ `http://localhost/fonts/fontname.css` 的请求应返回特定于浏览器的自定义字体 CSS 声明。\n\n### Imagine\n\
  \n我们将要集成到框架中的第二种库是一个名为 Imagine 的第三方库。\n\n`Imagine` 是一个图像编辑库（基于外观设计模式），它致力于为处理 PHP\
  \ 可用的各种图像库提供一致的接口。\n\n使用 `Imagine` 的好处之一是它已经有了命名空间，这非常符合我们框架的设计理念。我们将使用 `Imagine`\
  \ 对上传的照片进行修改，特别是创建缩略图。要开始使用 `Imagine`，我们需要下载源代码（来自 [`github.com/avalanche123/Imagine`](https://github.com/avalanche123/Imagine)），解压内容，并将解压后的\
  \ `lib` 目录的内容复制到 `application/libraries/imagine` 目录。在新的 `imagine` 目录中，文件排列得相当整齐，但类名与我们的命名约定略有不同。因此，我们的类自动加载器（`Core::_autoload()`）无法为它们工作。为了让\
  \ `Imagine` 类加载，我们需要向 `spl_autoload_register` 添加另一个自动加载函数，如清单 19-9 所示。\n\n***清单\
  \ 19-9.*** 自动加载 `Imagine` 类\n\n```php\nspl_autoload_register(function($class)\n\
  {\n    $path = lcfirst(str_replace(\"\\\\\", DIRECTORY_SEPARATOR, $class));\n  \
  \  $file = APP_PATH.\"/application/libraries/{$path}.php\";\n    if (file_exists($file))\n\
  \    {\n        require_once $file;\n        return true;\n    }\n});\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 19 章 ■ 扩展\n\n\n# 这个新的自动加载函数并非特别复杂，但它必须放在 `Core::initialize()` 调用之上。原因是，我们让\
  \ `Core::_autoload()` 在找不到类文件时抛出异常。如果在执行这个新自动加载方法之前运行了 `Core::_autoload()`，就会引发异常。\n\
  \n此时，我们可以开始使用 `Imagine` 类（如官方文档所示）。由于我们已经有一个 `Files` 控制器，我们将为其添加一个新的 `thumbnails()`\
  \ 动作，并通过添加清单 19-10 所示的自定义路由使其可访问。\n\n**清单 19-10.** 自定义缩略图路由\n\n```php\narray(\n\
  \    \"pattern\" => \"thumbnails/:id\",\n    \"controller\" => \"files\",\n    \"\
  action\" => \"thumbnails\"\n)\n```\n\n路由配置完成后，就可以创建（并使用）`thumbnails()` 动作，如清单 19-11\
  \ 所示。\n\n**清单 19-11.** `thumbnails()` 动作\n\n```php\nuse Shared\\Controller as Controller;\n\
  use Fonts\\Proxy as Proxy;\nuse Fonts\\Types as Types;\n\nclass Files extends Controller\n\
  {\n    public function thumbnails($id)\n    {\n        $path = APP_PATH.\"/public/uploads\"\
  ;\n        $file = File::first(array(\n            \"id = ?\" => $id\n        ));\n\
  \        if ($file)\n        {\n            $width = 64;\n            $height =\
  \ 64;\n            $name = $file->name;\n            $filename = pathinfo($name,\
  \ PATHINFO_FILENAME);\n            $extension = pathinfo($name, PATHINFO_EXTENSION);\n\
  \            if ($filename && $extension)\n            {\n                $thumbnail\
  \ = \"{$filename}-{$width}x{$height}.{$extension}\";\n                if (!file_exists(\"\
  {$path}/{$thumbnail}\"))\n                {\n                    $imagine = new\
  \ Imagine\\Gd\\Imagine();\n                    $size = new Imagine\\Image\\Box($width,\
  \ $height);\n                    $mode = Imagine\\Image\\ImageInterface::THUMBNAIL_OUTBOUND;\n\
  \                    $imagine\n                        ->open(\"{$path}/{$name}\"\
  )\n                        ->thumbnail($size, $mode)\n                        ->save(\"\
  {$path}/{$thumbnail}\");\n                }\n                header(\"Location:\
  \ /uploads/{$thumbnail}\");\n                exit();\n            }\n          \
  \  header(\"Location: /uploads/{$name}\");\n            exit();\n        }\n   \
  \ }\n}\n```\n\n`thumbnails()` 动作首先尝试查找与提供的 `$id` 匹配的 `File` 数据库行。如果没有找到匹配行，则不返回缩略图。接着，它将\
  \ `$file->name` 拆分为 `$filename` 和 `$extension`。这是为了构建缩略图文件名。\n\n如果缩略图已存在，浏览器将直接重定向到该文件，避免执行后续代码。\n\
  \n如果缩略图不存在，我们创建一个新的 `Imagine\\Gd\\Imagine` 实例，并使用它：a) 打开上传的照片，b) 将照片调整为 `$width`\
  \ 和 `$height` 大小的缩略图，c) 保存缩略图文件。\n\n**注意：** 你可以通过以下网址获取更多关于如何使用这些方法/属性的详细信息：\n[`imagine.readthedocs.org/en/latest/index.html`](http://imagine.readthedocs.org/en/latest/index.html)\n\
  \n唯一剩下的工作就是修改 `search.html` 和 `profile.html` 模板，以使用新的缩略图文件。清单 19-12 展示了我们如何实现这一点。\n\
  \n**清单 19-12.** `application/views/users/profile.html`（摘录）\n\n```html\n{script $file\
  \ = $user->file}\n{if $file} <img src=\"/thumbnails/{echo $file->id}\" />{/if}\n\
  ```\n\n现在，我们知道了如何构建自己的可复用应用程序库，以及如何将第三方库集成到我们的应用程序中。\n\n### 观察者模式\n\n在第 1 章中，我们了解了框架中使用的一些设计模式。在本章中，我们将看到另一个模式的运作，特别是观察者模式。观察者模式的简要总结是：接收者等待某些状态发生变化（事件），而发送者通知接收者（发出事件）状态的变化。\n\
  \n### 同步性\n\n现代编程语言（及平台）之间存在许多差异。最近备受关注的一个区别是，现代平台对代码的同步执行（有时是线程式）和异步执行（有时是多线程或非线程式）所做的区分。\n\
  \n同步语言/平台是指代码以线性方式执行的语言/平台，每条语句在执行下一条语句之前必须完成。请参考清单 19-13 中的示例。\n\n\n\n# 清单 19-13：同步\
  \ Apache/PHP 执行\n\n```\necho \"正在打开文件...\";\n\n$contents = file_get_contents(\"\
  /路径/到/某个/文件.txt\");\n\necho \"获取内容：\" . $contents;\n```\n\n第一条语句几乎会立即执行。其含义简单明了：输出一个字符串的内容。但第二条语句则稍微复杂一些。它要求服务器打开一个文件，并将文件内容赋值给一个变量。在编程术语中，这被称为*瓶颈*。服务器在定位文件时必须暂停执行，必须先打开文件并读取其内容，之后才能恢复执行。\n\
  \n这会产生两个影响：\n- 第二个 `echo` 语句必须等到第二条语句完成才会执行。\n- 在 PHP/Apache 中，所有代码的执行行为都类似。\n\n\
  现在，让我们考虑一下诸如 JavaScript/Node.JS 这类异步语言/平台。在异步语言/平台中，代码虽然也是以线性方式执行，但执行过程可以被挂起（在状态变化后，稍后再继续执行）。换句话说，服务器会持续执行，直到遇到一个潜在的瓶颈点。它会转而处理其他任务，直到需要返回处理当前的“请求”。请参考清单\
  \ 19-14 所示的例子。\n\n## 清单 19-14：异步 Node.JS/JavaScript 执行\n\n```\nvar fs = require(\"\
  fs\");\n\nconsole.log(\"正在打开文件...\");\n\nfs.readFile(\"/路径/到/某个/文件.txt\", function(error,\
  \ data)\n{\n    if (!error)\n    {\n        console.log(\"获取内容：\" + data);\n   \
  \ }\n});\n```\n\n这个例子与上一个例子基本上做的是相同的事情，但有一个主要区别。我们首先输出一个字符串的内容，并请求服务器读取文件的内容。同时，我们还提供了一个函数（或回调），服务器在恢复执行后会执行它。第二个输出语句（`console.log`）仍然需要等待文件读取完成，但服务器在获取文件时并不会暂停执行。这意味着服务器可以继续处理其他请求，直到当前这个请求能够恢复执行（在文件读取完成后）。\n\
  \n**注意**：我特意小心翼翼地不仅指明了语言，还指明了这些语言所运行的“服务器”。这是因为存在其他“服务器”，它们可能会模糊同步/异步之间的界限。例如，有`nginx`（用于\
  \ PHP），甚至有可能创建出阻塞/暂停执行的 JavaScript（至少在客户端是这样）。关键在于理解其中的区别。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 19 章：扩展\n\n理解这一点对我们有什么帮助？首先，它将有助于解释为什么当 PHP 执行阻塞代码时，事情会卡住。阻塞代码可以是像循环一样简单的事情，也可以是像连接到\
  \ TCP 服务器一样复杂的事情。虽然可以模拟 PHP 代码的异步执行，但它永远是同步的，无论执行速度有多快，或者并行处理多少个请求。\n\n在像 JavaScript\
  \ 这样的语言中，可以通过传递函数（或回调）来克服这个问题，这些函数将在密集操作完成后被执行。PHP 5.3 也支持回调，但考虑到该语言本身并非设计为非阻塞的，因此它们几乎没那么有用。\n\
  \n那么，如果回调对我们来说不是避免阻塞代码的有效方法，我们为什么还要使用它们呢？\n\n剩下的一种用途是观察状态变化，并通知监听器这些事件。你可以想象这会有多么有用。请看清单\
  \ 19-15 中的演示。\n\n## 清单 19-15：监听新状态\n\n```\naddEvent(\"状态.已发生改变\", function($message)\
  \ {\n    echo \"状态变为：\" . $message;\n});\n\nfireEvent(\"状态.已发生改变\", array(\"新状态\"\
  ));\nfireEvent(\"状态.已发生改变\", array(\"另一个新状态\"));\n```\n\n我们正在处理一个大型框架，甚至可能是一个大型应用程序。有些时候，了解状态何时发生变化至关重要，而这正是我们使用观察者模式的绝佳机会。\n\
  \n```\n代码\n```\n\n\n\n理解事件的作用只是成功的一半。我们需要构建一个类来管理事件监听器并触发事件。请看清单 19-16 中的这个类。\n\n\
  **清单 19-16.** `Events`类\n\n```php\nnamespace Framework\n{\n\nclass Events\n{\n\n\
  private static $_callbacks = array();\n\nprivate function __construct()\n{\n\n//\
  \ 不执行任何操作\n\n}\n\nprivate function __clone()\n{\n\n// 不执行任何操作\n\n}\n\npublic static\
  \ function add($type, $callback)\n{\n\nif (empty(self::$_callbacks[$type]))\n\n\
  {\n\nself::$_callbacks[$type] = array();\n\n}\n\nself::$_callbacks[$type][] = $callback;\n\
  \n}\n\npublic static function fire($type, $parameters = null)\n{\n\nif (!empty(self::$_callbacks[$type]))\n\
  \n{\n\nforeach (self::$_callbacks[$type] as $callback)\n\n{\n\ncall_user_func_array($callback,\
  \ $parameters);\n\n}\n\n}\n\n}\n\npublic static function remove($type, $callback)\n\
  {\n\nif (!empty(self::$_callbacks[$type]))\n\n{\n\nforeach (self::$_callbacks[$type]\
  \ as $i = > $found)\n\n{\n\nif ($callback == $found)\n\n{\n\nunset(self::$_callbacks[$type][$i]);\n\
  \n}\n\n}\n\n}\n\n}\n\n}\n\n}\n```\n\n这个类看起来与`Registry`类非常相似，但将它们分开更好。`add()`方法将提供的`$callback`添加到`$_callbacks`数组中，以便在发生任何`$type`事件时执行它。\n\
  \n`fire()`方法用于发射/触发一个事件。如果你提供了一个可选的`$parameters`数组，该数组将对所有被执行的回调可用。`remove()`方法只是简单地从`$_callbacks`数组中移除存储的`$callback`。它需要一个对要移除的原始回调的引用。让我们看看如何使用这个新类来监听和触发事件，如清单\
  \ 19-17 所示。\n\n**清单 19-17.** 使用`Events`类\n\n```php\nuse Framework\\Events as Events;\n\
  \nEvents::add(\"the.state.changed\", function($message) {\n\necho \"state changed\
  \ to: \" . $message;\n\n});\n\nEvents::fire(\"the.state.changed\", array(\"new state\"\
  ));\n\nEvents::fire(\"the.state.changed\", array(\"another new state\"));\n```\n\
  \n这与我们之前的例子几乎完全匹配。数组元素的顺序直接映射到回调参数的顺序。如果你提供了四个数组元素，那么回调中就会有四个参数。\n\n现在我们应该借此机会向我们的框架添加一些事件，以便其他开发者可以为我们的框架类创建监听器。我们将一起创建前两个事件。这些事件将被称为`framework.controller.destruct.before`和`framework.controller.destruct.after`。此方法应尽可能晚地在`__destruct()`方法中触发，其形式如清单\
  \ 19-18 所示。\n\n**清单 19-18.** 修改后的`Controller`类\n\n```php\nnamespace Framework\n\
  {\n\nuse Framework\\Events as Events;\n\nclass Controller extends Base\n{\n\n/**\n\
  * @read\n*/\n\nprotected $_name;\n\nprotected function getName()\n{\n\nif (empty($this-\
  \ >_name))\n{\n\n$this- >_name = get_class($this);\n\n}\n\nreturn $this- >_name;\n\
  \n}\n\npublic function __destruct()\n{\n\nEvents::fire(\"framework.controller.destruct.before\"\
  , array($this- >name));\n\n$this->render();\n\nEvents::fire(\"framework.controller.destruct.after\"\
  , array($this- >name));\n\n}\n\n}\n\n}\n```\n\n新事件将在模板渲染前后被触发，并且回调将获得当前控制器的名称。如果没有监听器等待此事件，则不会发生任何事情（也不会产生错误消息）。\n\
  \n我们还应该看到一个有用的方式，其中一个新事件可以帮到我们。如果你回想一下我们创建的`Shared\\Controller`类（在第 15 章中），你可能记得我们连接到了数据库，但从未断开连接。我们实际上在每个请求上都打开了一个数据库连接，但从未关闭任何连接。通过在模板渲染后关闭连接，可以提高效率，如清单\
  \ 19-19 所示。\n\n**清单 19-19.** 修改后的`Shared\\Controller`类\n\n```php\nnamespace Shared\n\
  {\n\nuse Framework\\Events as Events;\n\nuse Framework\\Registry as Registry;\n\
  ```\n\n\n\n```php\nclass Controller extends \\Framework\\Controller\n{\n    /**\n\
  \     * @readwrite\n     */\n    protected $_user;\n\n    public function __construct($options\
  \ = array())\n    {\n        parent::__construct($options);\n        // 连接数据库\n\
  \        $database = Registry::get(\"database\");\n        $database->connect();\n\
  \        // 安排数据库断开连接\n        Events::add(\"framework.controller.destruct.after\"\
  , function($name) {\n            $database = Registry::get(\"database\");\n    \
  \        $database->disconnect();\n        });\n    }\n}\n```\n\n我们修改后的 `__construct()`\
  \ 方法实际上利用新的事件系统，调度了一次对 `$database->disconnect()` 方法的调用。只有在确保数据库连接关闭后不再需要使用它时，这种做法才是安全的。其巧妙之处在于，我们无需专门找个位置塞入断开连接的代码，只需在\
  \ `__construct()` 方法内监听该事件，断开连接的操作便会自动执行。\n\n我们应该在尽可能多的类中添加类似的方法，例如 表 19-1 中所列的事件。\n\
  \n**表 19-1.** 添加到框架中的事件列表\n\n| 事件 | 签名 |\n| --- | --- |\n| `framework.cache.initialize.before`\
  \ | `function($type, $options)` <br/> `$type` — 所需驱动程序的类型 <br/> `$options` — 缓存资源的初始化选项\
  \ |\n| `framework.cache.initialize.after` | `function($type, $options)` <br/> `$type`\
  \ — 所需驱动程序的类型 <br/> `$options` — 缓存资源的初始化选项 |\n| `framework.configuration.initialize.before`\
  \ | `function($type, $options)` <br/> `$type` — 所需驱动程序的类型 <br/> `$options` — 配置资源的初始化选项\
  \ |\n| `framework.configuration.initialize.after` | `function($type, $options)`\
  \ <br/> `$type` — 所需驱动程序的类型 <br/> `$options` — 配置资源的初始化选项 |\n| `framework.controller.construct.before`\
  \ | `function($name)` <br/> `$name` — 控制器类的名称 |\n| `framework.controller.construct.after`\
  \ | `function($name)` <br/> `$name` — 控制器类的名称 |\n| `framework.controller.render.before`\
  \ | `function($name)` <br/> `$name` — 控制器类的名称 |\n| `framework.controller.render.after`\
  \ | `function($name)` <br/> `$name` — 控制器类的名称 |\n| `framework.controller.destruct.before`\
  \ | `function($name)` <br/> `$name` — 控制器类的名称 |\n| `framework.controller.destruct.after`\
  \ | `function($name)` <br/> `$name` — 控制器类的名称 |\n| `framework.database.initialize.before`\
  \ | `function($type, $options)` <br/> `$type` — 所需驱动程序的类型 <br/> `$options` — 数据库资源的初始化选项\
  \ |\n| `framework.database.initialize.after` | `function($type, $options)` <br/>\
  \ `$type` — 所需驱动程序的类型 <br/> `$options` — 数据库资源的初始化选项 |\n| `framework.request.request.before`\
  \ | `function($method, $url, $parameters)` <br/> `$method` — 请求方法（`GET`、`POST`、`PUT`\
  \ 等）<br/> `$url` — 发送请求的目标 URL <br/> `$parameters` — 请求的参数 |\n| `framework.request.request.after`\
  \ | `function($method, $url, $parameters, $response)` <br/> `$method` — 请求方法（`GET`、`POST`、`PUT`\
  \ 等）<br/> `$url` — 发送请求的目标 URL <br/> `$parameters` — 请求的参数 <br/> `$response` — 发出请求后收到的响应\
  \ |\n| `framework.router.dispatch.before` | `function($url)` <br/> `$url` — 要调度的\
  \ URL |\n| `framework.router.dispatch.after` | `function($url, $controller, $action,\
  \ $parameters)` <br/> `$url` — 要调度的 URL <br/> `$controller` — 目标控制器 <br/> `$action`\
  \ — 目标操作 <br/> `$parameters` — 为请求提供的参数 |\n| `framework.session.initialize.before`\
  \ | `function($type, $options)` <br/> `$type` — 所需驱动程序的类型 <br/> `$options` — 会话资源的初始化选项\
  \ |\n| `framework.session.initialize.after` | `function($type, $options)` <br/>\
  \ `$type` — 所需驱动程序的类型 <br/> `$options` — 会话资源的初始化选项 |\n| `framework.view.construct.before`\
  \ | `function($file)` <br/> `$file` — 应渲染的模板文件 |\n| `framework.view.construct.after`\
  \ | `function($file, $template)` <br/> `$file` — 应渲染的模板文件 |\n\n\n\n`$template` —\
  \ 被实例化的模板\n\n`framework.view.render.before`\n\n`function($file)`\n\n`$file` — 应被渲染的模板文件\n\
  \n#### 插件\n\n事件可能对我们的框架/应用程序需求有用，但对于大多数插件架构而言，它们是必不可少的。*插件*的定义正是能够在不要求对系统进行根本性更改的情况下，附着到某个功能系统上的东西。\n\
  \n为了进一步验证这一概念，我们将构建一个活动日志插件。活动日志将包含每个触发事件的明细信息，以及事件发生的时间戳。它还将包含一些基准测试信息。让我们从创建清单\
  \ 19-20 所示的插件加载器开始。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**清单\
  \ 19-20.** `/public/index.php`（摘录）\n\n```\n$path = APP_PATH . \"/application/plugins\"\
  ;\n\n$iterator = new DirectoryIterator($path);\n\nforeach ($iterator as $item)\n\
  {\n    if (!$item->isDot() && $item->isDir())\n    {\n        include($path . \"\
  /\" . $item->getFilename() . \"/initialize.php\");\n    }\n}\n```\n\n这段代码应放在`/public/index.php`文件中，紧接在核心初始化代码之后。这样插件就可以立即开始监听框架事件，并做出相应处理。`DirectoryIterator`类只是一个用于读取目录信息（文件系统中的）的接口。我们用它来遍历`/application/plugins`目录中包含的所有子目录。对于找到的每个目录，我们随后包含一个`initialize.php`文件。如果插件希望被自动加载，它们需要将其初始化逻辑放在这个文件中。\n\
  \n使用`include`允许应用程序继续执行，即使在插件目录中未找到初始化文件也是如此。我们现在应该添加这个初始化文件，如清单 19-21 所示。\n\n**清单\
  \ 19-21.** 初始化日志记录器插件\n\n```\n// 初始化日志记录器\ninclude(\"logger.php\");\n$logger = new\
  \ Logger(array(\n    \"file\" => APP_PATH . \"/logs/\" . date(\"Y-m-d\") . \".txt\"\
  \n));\n\n// 记录缓存事件\nFramework\\Events::add(\"framework.cache.initialize.before\"\
  , function($type, $options) use ($logger)\n{\n    $logger->log(\"framework.cache.initialize.before:\
  \ \" . $type);\n});\n\nFramework\\Events::add(\"framework.cache.initialize.after\"\
  , function($type, $options) use ($logger)\n{\n    $logger->log(\"framework.cache.initialize.after:\
  \ \" . $type);\n});\n\n// 记录配置事件\nFramework\\Events::add(\"framework.configuration.initialize.before\"\
  , function($type, $options) use ($logger)\n{\n    $logger->log(\"framework.configuration.initialize.before:\
  \ \" . $type);\n});\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  ```\nFramework\\Events::add(\"framework.configuration.initialize.after\", function($type,\
  \ $options) use ($logger)\n{\n    $logger->log(\"framework.configuration.initialize.after:\
  \ \" . $type);\n});\n```\n\n`initialize.php`文件非常简单。我们包含`logger.php`并实例化`Logger`类。我们不能依赖任何框架类，甚至不能依赖类自动加载器。我们必须假设它们不存在！\n\
  \n初始化`Logger`类后，我们需要为我们想要记录的所有事件添加监听器。这会产生大量代码（其中大部分代码未在此处列出，但仍然是微不足道的）。所以我们知道如何使用`Logger`类，但它实际上是如何记录消息的呢？让我们仔细看看清单\
  \ 19-22 中的这个类。\n\n**清单 19-22.** Logger 类\n\n```\nclass Logger\n{\n    protected\
  \ $_file;\n    protected $_entries;\n    protected $_start;\n    protected $_end;\n\
  \n    protected function _sum($values)\n    {\n        $count = 0;\n        foreach\
  \ ($values as $value)\n        {\n            $count += $value;\n        }\n   \
  \     return $count;\n    }\n\n    protected function _average($values)\n    {\n\
  \        return $this->_sum($values) / sizeof($values);\n    }\n\n    public function\
  \ __construct($options)\n    {\n        if (!isset($options[\"file\"]))\n      \
  \  {\n            throw new Exception(\"日志文件无效。\");\n        }\n        $this->_file\
  \ = $options[\"file\"];\n        $this->_entries = array();\n        $this->_start\
  \ = microtime();\n    }\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n```\n    public function log($message)\n    {\n        $this->_entries[] = array(\n\
  ```\n\n\n`\"message\" => \"[\" . date(\"Y-m-d H:i:s\") . \"]\" . $message,`\n\n\
  `\"time\" => microtime()`\n\n);\n\n}\n\npublic function __destruct()\n\n{\n\n`$messages\
  \ = \"\";`\n\n`$last = $this->_start;`\n\n`$times = array();`\n\n`foreach ($this->_entries\
  \ as $entry)`\n\n{\n\n`$messages .= $entry[\"message\"] . \"\\n\";`\n\n`$times[]\
  \ = $entry[\"time\"] - $last;`\n\n`$last = $entry[\"time\"];`\n\n}\n\n`$messages\
  \ .= \"Average: \" . $this->_average($times);`\n\n`$messages .= \", Longest: \"\
  \ . max($times);`\n\n`$messages .= \", Shortest: \" . min($times);`\n\n`$messages\
  \ .= \", Total: \" . (microtime() - $this->_start);`\n\n`$messages .= \"\\n\";`\n\
  \n`file_put_contents($this->_file, $messages, FILE_APPEND);`\n\n}\n\n}\n\n`Logger`类有一个公共方法（除了魔术方法之外），该方法将一条日志消息（以及时间戳）添加到\
  \ `$_entries` 数组中。实例化 `Logger` 时，它会检查提供的选项中的 `file` 参数，该参数是对应日志消息要追加到的文件的引用。如果未提供此选项，则会引发异常。`__destruct()`\
  \ 方法会将日志消息以及一些基准测试信息渲染到目标文件中。\n\n**注意** 基准测试值仅为估算值，基于记录器初始化时间和每条消息存储的时间戳。不过，这些值对于调试仍然有用。\n\
  \n得益于我们这里的事件系统，我们现在拥有一个相当实用的插件架构。我们还有一个有用的 `Logger` 类，它将有助于未来的调试！\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n# 第 19 章 ■ 扩展\n\n### 问题\n\n1. `files()` 和 `thumbnails()` 这两个操作都依赖于文件 I/O。我们如何能让这些方法更高效？\n\
  \n2. 我们实际上并没有改变 `Imagine` 类的结构。如果重写 `Imagine` 类使其符合我们的组织体系，对我们的应用程序来说不是更好吗？\n\n\
  3. 我们是否应该创建 `thumbnails()` 操作（以及类似操作）来接受不同的 `$width`/`$height` 参数？\n\n4. PHP 可能并非为无阻塞而构建，但能否将所有类/函数都编写为无阻塞形式，以避免同步执行的问题？\n\
  \n5. 我们构建了一个处理回调的类，但有没有常见的 PHP 函数支持将回调作为代码延迟执行的手段？\n\n6. 鉴于 `Events` 类与 `Registry`\
  \ 类看起来非常相似，我们为什么不直接使用 `Registry` 类来存储回调呢？\n\n### 答案\n\n1. 显而易见的答案是尽可能使用缓存。这可能意味着缓存具有一致字体/用户代理组合的字体请求的响应。也可能意味着在读取现有缩略图的内容后，首次读取时就缓存其内容。\n\
  \n2. 如果有无限的时间和精力，通常更倾向于重写库以匹配一致的主题或结构。在这种情况下，我们只能接受现有的结构。这带来了一些奇怪的权衡（比如自动加载函数的位置），但我们能够轻松地使用\
  \ `Imagine`。\n\n3. 是的，应该这样做。不过，这对本课来说并不重要。\n\n4. 虽然可能可以使用回调构建所有类/函数，但这并不能避免代码的同步执行。PHP\
  \ 中仍会存在阻塞的方面（例如文件 I/O、数据库、循环等）。这并不是因为我们无法使用回调，而是因为每个请求都在单个线程上处理。我们可以允许使用更多线程，甚至在负载均衡器上运行多个\
  \ PHP 服务器，但这些都无法真正解决问题。\n\n5. PHP 至今已支持回调概念一段时间了。它们并非总是那么优雅（通常是引用函数名称的字符串），但在 PHP\
  \ 中，将引用传递给另一段可执行代码的想法并不罕见。\n\n6. 我们没有使用 `Registry` 类，纯粹是为了让事件与所有其他内容隔离。一旦开始共享相同的存储空间，我们就需要担心命名方案的问题，这会使我们的事件系统变得不必要地复杂。\n\
  \n\n\n# 第 19 章 ■ 扩展\n\n### 练习\n\n1.  我们简要讨论了使用缓存来避免昂贵的文件 I/O 操作。尝试在你的 `Files` 控制器中实现这些想法。对缓存与未缓存的操作进行基准测试对比可能也很有用。\n\
  \n2.  添加 Imagine 的自动加载器函数为 `spl_autoload_register` 提供了一种指定自动加载器函数的替代方法。尝试修改 `Core`\
  \ 类，使用类似的方法来定义其自动加载器功能。\n\n3.  尝试修改 `thumbnails()` 动作以允许自定义 `$width`/`$height`，并修改\
  \ `fonts()` 动作以允许在单个请求中处理多种字体。\n\n4.  我们了解了**观察者模式**的有用性，但只构建了一个插件。尝试通过创建另一个使用事件系统的插件来利用其强大功能。\n\
  \n# 第 20 章  \n管理\n\n*管理*一词让许多开发者心生恐惧。问题在于，大多数大型（或用户内容驱动的）应用程序都需要某种形式的内容审核。幸运的是，这是一个已经被深入探讨过的主题。从所有预构建的\
  \ CMS（内容管理系统），如 WordPress 和 PHP-Nuke，到能自动生成这些 CMS 区域的框架（如 Django），都有完整的应用程序被开发出来以帮助进行内容审核。\n\
  \n### 目标\n\n-   我们需要理解任何管理界面中的基本组件。\n-   我们需要构建不同的模型、视图和控制器来管理用户提交的内容。\n\n### 什么是\
  \ CMS？\n\nCMS 是一个辅助性的、安全的网站，通过它，可以审核和/或更改主网站的内容。它并非设计用于与主网站同等规模的用户群体，并且通常需要管理员用户接受一定程度的培训才能高效使用。\n\
  \nCMS 通常提供一个界面来添加其他管理用户，有时它甚至能提供一些关于主网站使用情况的统计数据。我们在本章中将构建的 CMS 只关注内容审核和用户创建的基础功能，将统计功能的添加留作练习。\n\
  \n### 管理员\n\n只有管理员才应有权访问 CMS。管理员被定义为具有高于普通用户权限的用户，允许他们访问和控制这个辅助性的、安全的网站。在结构上，他们不必与普通用户截然不同，（在我们的案例中）将通过\
  \ `User` 模型中的一个简单标志字段来区分。让我们看看这在清单 20-1 中是如何定义的。\n\n***清单 20-1.** * 用户模型管理标志\n\n\
  ```\nclass User extends Shared\\Model\n{\n    /**\n    * @column\n    * @readwrite\n\
  \    * @type boolean\n    */\n    protected $_admin = false;\n}\n```\n\n`$_admin`\
  \ 字段是一个简单的布尔字段，我们将用它来确定用户是否有权访问管理界面。我们为它提供了一个默认值，当向数据库添加行时，如果未提供 admin 值，将使用该默认值。\n\
  \n### 登录\n\n如果你想知道是否需要为这些管理用户创建一个完全独立的登录界面，答案是所有用户都将通过同一个界面登录。我们不会创建一个独立的管理网站，而是创建一套只有管理用户才能访问的动作/视图。\n\
  \n不过，我确实需要对登录系统做一些修改。回顾一下，登录代码如清单 20-2 所示。\n\n***清单 20-2.** * 当前的 `login()` 动作\n\
  \n```\nuse Framework\\Registry as Registry;\nuse Framework\\RequestMethods as RequestMethods;\n\
  use Shared\\Controller as Controller;\n\nclass Users extends Controller\n{\n   \
  \ public function login()\n    {\n        if (RequestMethods::post(\"login\"))\n\
  \        {\n            $email = RequestMethods::post(\"email\");\n            $password\
  \ = RequestMethods::post(\"password\");\n        }\n    }\n}\n```\n\n\n\n```php\n\
  $user = User::first(array(\n    \"email = ?\" => $email,\n    \"password = ?\" =>\
  \ $password,\n    \"live = ?\" => true,\n    \"deleted = ?\" => false\n));\n\nif\
  \ (empty($email) || empty($password) || empty($user))\n{\n    $this->actionView->set(\"\
  password_error\", \"Email address and/or password are incorrect\");\n}\n```\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 20 章 ■ 管理\n\n```php\nelse\n\
  {\n    $session = Registry::get(\"session\");\n    $this->user = $user;\n    self::redirect(\"\
  /profile.html\");\n}\n```\n\n`login()` 动作会查找已提交的表单数据并进行验证。如果数据验证失败，则向用户显示错误消息。如果数据通过验证并找到有效的用户行，则将该用户行保存到会话并分配给控制器。最后，`login()`\
  \ 动作重定向到个人资料页面。这与当前的 `settings()` 动作类似，如代码清单 20-3 所示。\n\n***代码清单 20-3.*** 当前的 settings()\
  \ 动作\n\n```php\nuse Framework\\Registry as Registry;\nuse Framework\\RequestMethods\
  \ as RequestMethods;\nuse Shared\\Controller as Controller;\n\nclass Users extends\
  \ Controller\n{\n    /**\n     * @before _secure\n     */\n    public function settings()\n\
  \    {\n        if (RequestMethods::post(\"update\"))\n        {\n            $user\
  \ = new User(array(\n                \"id\" => $this->user->id,\n              \
  \  \"first\" => RequestMethods::post(\"first\"),\n                \"last\" => RequestMethods::post(\"\
  last\"),\n                \"email\" => RequestMethods::post(\"email\"),\n      \
  \          \"password\" => RequestMethods::post(\"password\"),\n               \
  \ \"live\" => (boolean) RequestMethods::post(\"live\"),\n                \"deleted\"\
  \ => (boolean) RequestMethods::post(\"deleted\")\n            ));\n\n          \
  \  if ($user->validate())\n            {\n                $user->save();\n     \
  \           $this->user = $user;\n                $this->_upload(\"photo\", $user->id);\n\
  \                $this->actionView->set(\"success\", true);\n            }\n\n \
  \           $this->actionView->set(\"errors\", $user->errors);\n        }\n    }\n\
  }\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 20 章 ■ 管理\n\n\
  类似地，`settings()` 动作会验证提交的表单数据、更新用户行，并将用户数据存储在会话和控制器中。这些动作在大多数情况下是足够用的，但我想要改进的是未修改的用户对象同时被保存到会话和控制器中的情况。我想进行以下更改：\n\
  \n- 不应将整个用户对象直接存储在会话中。我的意思是，我们不应该在会话中保留密码和状态等详细信息，以防会话数据被泄露。相反，我们应该做的是存储对用户行的引用，并在需要时从数据库或缓存中返回该用户行。\n\
  - 我们不需要通过将用户帐户同时保存到会话和控制器来重复代码。当然，我们确实需要在某个时刻将对用户的引用（存储在会话中），但不需要在多个用户动作中重复此操作。我们将创建一些代码，在请求周期结束时自动存储此引用。\n\
  \n为了实现这两个目标，我们需要利用在第 19 章中创建的事件，并且需要解决 PHP 中的一个缺陷以使其生效。首先，让我们将这些事件添加到 `Shared\\\
  Controller` 中，如代码清单 20-4 所示。\n\n***代码清单 20-4.*** Shared\\Controller 类中的事件\n\n```php\n\
  namespace Shared\n{\n    use Framework\\Events as Events;\n    use Framework\\Router\
  \ as Router;\n    use Framework\\Registry as Registry;\n\n    class Controller extends\
  \ \\Framework\\Controller\n    {\n        public function setUser($user)\n     \
  \   {\n            $session = Registry::get(\"session\");\n\n            if ($user)\n\
  \            {\n                $session->set(\"user\", $user->id);\n          \
  \  }\n            else\n            {\n                $session->erase(\"user\"\
  );\n            }\n\n            $this->_user = $user;\n            return $this;\n\
  \        }\n\n        public function __construct($options = array())\n        {\n\
  \            parent::__construct($options);\n\n            // 连接数据库\n          \
  \  $database = Registry::get(\"database\");\n            $database->connect();\n\
  \n            // 计划：从会话中加载用户\n            Events::add(\"framework.router.beforehooks.before\"\
  , function($name, $parameters) {\n                $session = Registry::get(\"session\"\
  );\n                $controller = Registry::get(\"controller\");\n             \
  \   $user = $session->get(\"user\");\n\n                if ($user)\n           \
  \     {\n                    $controller->user = \\User::first(array(\n        \
  \                \"id = ?\" => $user\n                    ));\n                }\n\
  \            });\n\n            // 计划：将用户保存到会话\n        }\n    }\n}\n```\n\n\n\n\
  `Events::add(\"framework.router.afterhooks.after\", function($name, $parameters)\
  \ {\n\n    $session = Registry::get(\"session\");\n\n    $controller = Registry::get(\"\
  controller\");\n\n    if ($controller->user) {\n\n        $session->set(\"user\"\
  , $controller->user->id);\n\n    }\n\n});\n\n// schedule: disconnect from database\n\
  \nEvents::add(\"framework.controller.destruct.after\", function($name) {\n\n   \
  \ $database = Registry::get(\"database\");\n\n    $database->disconnect();\n\n});\n\
  \n`我们所做的，是在`Shared\\Controller`类的`__construct()`方法中添加了两个新的事件监听器。这些监听器将用户会话相关细节挂载到请求周期中。第一个事件在`\"\
  framework.router.beforehooks.before\"`事件触发时发生，用于根据会话数据检索用户行。这意味着它会在任何操作钩子或操作执行之前发生。第二个事件在`\"\
  framework.router.afterhooks.after\"`事件触发时发生，用于将用户引用存储到会话中。这意味着它会在所有操作钩子和操作执行之后发生。\n\
  \n我们还重写了`$_user`设置器方法。这样做是为了让`login()`和`logout()`操作能够立即更改会话。保存事件与我们之前在`login()`和`settings()`操作中重复的代码类似，都是获取用户行并将其保存到会话中。我们从控制器的用户属性获取这些数据，在本例中就是用户的\
  \ id。这比以前的方法要好得多，因为它让我们只需处理控制器的用户属性，而不再需要考虑将用户行保存到会话中！\n\n我们也不再保存用户的所有信息到会话，而只保存用户的\
  \ id 属性。这意味着当我们从会话中获取引用时，也需要请求用户行，但这比将会话中存储所有信息更可取。我们也可以将用户行存储在缓存中，以减少额外数据库查询的开销，但这不是当前的重点。\n\
  \n现在我们需要处理那个 PHP 的 bug。在第 19 章中，我们添加了一个事件，以便在数据库实例不再使用时（大约在`\"framework.controller.destruct.after\"\
  `事件触发时）断开连接。我们不打算改变这种方法，但让你惊讶的是，它实际上并没有发生。\n\n你看，由于 PHP 的执行方式（特别是垃圾回收的工作原理），当请求周期结束时，对象会按照变量顺序被取消设置。除此之外，PHP\
  \ 解释器在垃圾回收对象之前，也会关闭所有正在使用的 PHP 模块。这意味着当我们的`__destruct()`方法被调用时，所有 PHP 模块都已经关闭，而`\"\
  framework.controller.destruct.after\"`事件仅在`Controller`类的`__destruct()`方法中被调用。`$database`实例从未断开连接，因为（在这种情况下）MySQL\
  \ 模块已经关闭。哎呀！\n\n有一个变通方法，但需要一些额外的代码。`__destruct()`魔术方法在对象被垃圾回收时运行，但如果通过`unset()`语句手动销毁对象，该方法也会运行。如果我们希望`__destruct()`事件对我们有任何实际用途，我们需要手动调用`unset()`来销毁对象，以便它们能在所有模块关闭之前被触发。对于`Controller`的`__destruct()`方法，我们需要修改`Router`类。看看我们在代码清单\
  \ 20-5 中是如何实现这一点的。\n\n**代码清单 20-5.** 取消设置控制器\n\n```\nnamespace Framework\n{\n  \
  \  use Framework\\Base as Base;\n    use Framework\\Events as Events;\n    use Framework\\\
  Registry as Registry;\n    use Framework\\Inspector as Inspector;\n    use Framework\\\
  Router\\Exception as Exception;\n\n    class Router extends Base\n    {\n      \
  \  protected function _pass($controller, $action, $parameters = array())\n     \
  \   {\n            $name = ucfirst($controller);\n            $this->_controller\
  \ = $controller;\n            $this->_action = $action;\n```\n\n\n```php\nEvents::fire(\"\
  framework.router.controller.before\", array($controller, $parameters));\ntry {\n\
  \    $instance = new $name(array(\n        \"parameters\" => $parameters\n    ));\n\
  \    Registry::set(\"controller\", $instance);\n} catch (\\Exception $e) {\n   \
  \ throw new Exception\\Controller(\"Controller {$name} not found\");\n}\nEvents::fire(\"\
  framework.router.controller.after\", array($controller, $parameters));\n```\n\n\
  ```php\nif (!method_exists($instance, $action)) {\n    $instance->willRenderLayoutView\
  \ = false;\n    $instance->willRenderActionView = false;\n    throw new Exception\\\
  Action(\"Action {$action} not found\");\n}\n\n$inspector = new Inspector($instance);\n\
  $methodMeta = $inspector->getMethodMeta($action);\n\nif (!empty($methodMeta[\"@protected\"\
  ]) || !empty($methodMeta[\"@private\"])) {\n    throw new Exception\\Action(\"Action\
  \ {$action} not found\");\n}\n\n$hooks = function($meta, $type) use ($inspector,\
  \ $instance) {\n    if (isset($meta[$type])) {\n        $run = array();\n      \
  \  foreach ($meta[$type] as $method) {\n            $hookMeta = $inspector->getMethodMeta($method);\n\
  \            if (in_array($method, $run) && !empty($hookMeta[\"@once\"])) {\n  \
  \              continue;\n            }\n            $instance->$method();\n   \
  \         $run[] = $method;\n        }\n    }\n};\n\nEvents::fire(\"framework.router.beforehooks.before\"\
  , array($action, $parameters));\n$hooks($methodMeta, \"@before\");\nEvents::fire(\"\
  framework.router.beforehooks.after\", array($action, $parameters));\nEvents::fire(\"\
  framework.router.action.before\", array($action, $parameters));\ncall_user_func_array(array(\n\
  \    $instance,\n    $action\n), is_array($parameters) ? $parameters : array());\n\
  Events::fire(\"framework.router.action.after\", array($action, $parameters));\n\
  Events::fire(\"framework.router.afterhooks.before\", array($action, $parameters));\n\
  $hooks($methodMeta, \"@after\");\nEvents::fire(\"framework.router.afterhooks.after\"\
  , array($action, $parameters));\n\n// unset controller\nRegistry::erase(\"controller\"\
  );\n```\n\n我们通过调用 `Registry` 类上的 `erase()` 方法来取消设置控制器。这反过来会取消存储的控制器实例，这意味着 `__destruct()`\
  \ 方法会立即执行。在我们开始创建受保护的操作/视图之前，最后需要做的是创建一个方法，用于确保用户是有效的管理员。我们将把这个方法添加到 `Shared\\Controller`\
  \ 类中，如代码清单 20-6 所示。\n\n**代码清单 20-6.** `_admin()` 钩子\n\n```php\nnamespace Shared\n\
  {\n    use Framework\\Events as Events;\n    use Framework\\Router as Router;\n\
  \    use Framework\\Registry as Registry;\n\n    class Controller extends \\Framework\\\
  Controller\n    {\n        /**\n         * @protected\n         */\n        public\
  \ function _admin()\n        {\n            if (!$this->user->admin) {\n       \
  \         throw new Router\\Exception\\Controller(\"Not a valid admin user account\"\
  );\n            }\n        }\n    }\n}\n```\n\n我们将把这个方法用作钩子，其含义很简单：如果用户的 `admin`\
  \ 属性的值为假，则用户将通过引发的异常被重定向到 404 错误页面。\n\n### 用户\n\n每个 CMS 都有一些一致的元素。这些元素包括用于添加、编辑、查看和删除数据库表行的接口（有时称为*CRUD*，代表**C**reate（创建）、**R**ead（读取）、**U**pdate（更新）、**D**elete（删除））。由于我们不打算添加用户或照片（因为这些功能已经在公共接口中可用），我们将专注于从应用程序中查看、编辑和删除行。首先，我们需要向\
  \ `Users` 和 `Files` 控制器添加一些操作。让我们从 `Users` 控制器开始，如代码清单 20-7 所示。\n\n**代码清单 20-7.**\
  \ `edit()`/`view()` 操作\n\n```php\nuse Framework\\Registry as Registry;\nuse Framework\\\
  RequestMethods as RequestMethods;\nuse Shared\\Controller as Controller;\n\nclass\
  \ Users extends Controller\n{\n    /**\n     * @before _secure, _admin\n     */\n\
  \    public function edit($id)\n    {\n        $errors = array();\n        $user\
  \ = User::first(array(\n            \"id = ?\" => $id\n        ));\n\n        if\
  \ (RequestMethods::post(\"save\")) {\n            $user->first = RequestMethods::post(\"\
  first\");\n            $user->last = RequestMethods::post(\"last\");\n        }\n\
  \    }\n}\n```\n\n\n\n```php\n$user-> email = RequestMethods::post(\"email\");\n\
  $user-> password = RequestMethods::post(\"password\");\n$user-> live = (boolean)\
  \ RequestMethods::post(\"live\");\n$user-> admin = (boolean) RequestMethods::post(\"\
  admin\");\nif ($user-> validate())\n{\n    $user-> save();\n    $this-> actionView->\
  \ set(\"success\", true);\n}\n$errors = $user-> errors;\n}\n$this-> actionView\n\
  -> set(\"user\", $user)\n-> set(\"errors\", $errors);\n}\n/**\n* @before _secure,\
  \ _admin\n*/\npublic function view()\n{\n    $this-> actionView-> set(\"users\"\
  , User::all());\n}\n}\n```\n\n我们新增的两个动作用于更新和列出用户行。`edit()` 动作与 `settings()` 动作非常相似，不同之处在于它新增了两个表单字段（`live`\
  \ 和 `admin`）。`view()` 动作则更加简单，只需将所有用户行返回给视图。为了让这些动作能够成功路由，我们需要在 `public/routes.php`\
  \ 文件中添加一些额外的路由，如清单 20-8 所示。\n\n***清单 20-8.*** `public/routes.php`（节选）\n\n```php\n\
  // define routes\n$routes = array(\n    array(\n        \"pattern\" => \"users/edit/:id\"\
  ,\n        \"controller\" => \"users\",\n        \"action\" => \"edit\"\n    ),\n\
  \    array(\n        \"pattern\" => \"users/delete/:id\",\n        \"controller\"\
  \ => \"users\",\n        \"action\" => \"delete\"\n    ),\n    array(\n        \"\
  pattern\" => \"users/undelete/:id\",\n        \"controller\" => \"users\",\n   \
