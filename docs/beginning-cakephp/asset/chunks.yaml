    A P P E N D I X A ■ I N S TA L L AT I O N I S S U E S


    **Why Doing It All Remotely Is Bad**


    Should you circumvent the localhost setup, you’ll be forced into developing everything
    remotely. That’s fine, I suppose, if the following things don’t bother you:


    • Running a continuous FTP session


    • Uploading every time you want to test the slightest alteration to your code


    • Timeouts because of your Internet connection occurring during program executions


    • Users accidentally stumbling on your half-baked programs


    • Buying up test domains to keep users from accidentally stumbling on your half-baked
    programs


    • Eating into your own bandwidth (which for some hosting plans may be tight as
    it is) **Setting Up a Localhost**


    Whatever operating system you’re running on your computer, installing a localhost
    environment is easy. If running on a Mac, I recommend installing Living-e’s MAMP.
    If on a Windows-based PC, install XAMPP.


    Normally, creating a localhost setup will require installing various server programs
    via a command-line interface that takes a good understanding of PHP, MySQL, Apache,
    ProFTPd, and other server technologies. What MAMP and XAMPP do is simplify these
    complex server setups so that essentially you run an installer program and the
    setup is complete.


    **Setting Up on a Mac**


    Mac OS X already comes with a localhost setup built in. But if you want to run
    MySQL and upgrade PHP to version 5.0 or higher, you’ll need to install each element
    manually, which can be a little tedious. Running MAMP will likely save you a lot
    of time. The following sections outline how to do it.


    Step 1: Download the Software


    Go to [http://www.mamp.info, and locate on the home page the MAMP do](http://www.mamp.info)wnload
    link. It will ask you whether you want MAMP Pro, and if you do, go ahead and pay
    the $49 to download it.


    Otherwise, download the latest free version of MAMP.


    Step 2: Open the Disk Image and Install the MAMP Folder


    This step is simple enough. It will ask you to drop a folder into the Applications
    folder. This is necessary for the localhost setup to work properly. Make sure
    you do not use any subfolders or rename the MAMP folder to anything else. If you
    dislike having to do this, you may want to consider more elaborate localhost setup
    methods.


    ![Image 50](index-305_1.jpg)'
  trans: "\n一旦您的应用程序准备好在 Web 上使用，最后的例行工作就是将项目从本地主机环境迁移到远程主机。如果远程主机与本地主机具有相同的设置，您应该能够将父应用程序文件夹“原样”上传到远程目录，并且它应该可以正常运行。您需要运行某种类型的\
    \ MySQL 转储文件来镜像远程和本地主机数据库。\n\n为了确保应用程序的安全，您应该将 Cake 库和 `app` 文件夹放置在远程服务器上文档根目录之外。这要求您对应用程序的文件夹结构进行一些调整，并更改几个全局变量。\n\
    \n可以在服务器上移动的三个主要文件夹是 `cake`、`app` 和 `webroot`。\n\n更改应用程序文件夹结构时，主要注意事项是 `webroot`\
    \ 文件夹必须位于公共目录或文档根目录中。假设我的远程主机设置了一个根目录（位于文档根目录之外），并将 `www` 作为文档根目录，而域名指向 `[user/home/www](http://www.To)`。为了更好地保护应用程序，我将\
    \ Cake 库和 `app` 文件夹放在 `user/home` 中，并将 `webroot` 从 `app` 文件夹中取出，放在 `[user/home/www](http://www.Cake)`\
    \ 中。Cake 可以处理这种结构，但我必须在 `user/home/www/webroot/index.php` 中更改一些变量，才能使其正确编译。\n\n\
    我打开 `webroot/index.php` 文件，滚动到看到三个全局常量的位置：`ROOT`、`APP_DIR` 和 `CAKE_CORE_INCLUDE_PATH`。表\
    \ 15-1 显示了在当前的文件夹结构下，远程主机上每个常量应被分配的路径。\n\n**表 15-1.** *远程设置的路径*\n\n| 常量 | 服务器路径\
    \ |\n| :--- | :--- |\n| `ROOT` | `/user/home` |\n| `APP_DIR` | `www` |\n| `CAKE_CORE_INCLUDE_PATH`\
    \ | `user/home` |\n\nCake 使用 `DS` 作为目录分隔符。因此，我根据表 15-1 将这些常量重新分配到它们的新路径，最终得到清单\
    \ 15-2 所示的内容。（通常，此文件中会有一些注释行；我已将其从清单中省略。）\n\n**清单 15-2.** *修改* `webroot/index.php`\
    \ *文件以在远程主机上工作*\n\n```\nif (!defined('ROOT')) {\n    define('ROOT', DS.'user'.DS.'home');\n\
    }\nif (!defined('APP_DIR')) {\n    define('APP_DIR', 'www');\n}\nif (!defined('CAKE_CORE_INCLUDE_PATH'))\
    \ {\n    define('CAKE_CORE_INCLUDE_PATH', DS.'user'.DS.'home');\n}\n```\n\n##\
    \ 总结\n\n本章解释了在完成 Cake 项目时需要考虑的一些重要例行事务。请记住在 `app/config/routes.php` 中提供起点，并在整个应用程序中创建导航方法，以改善用户对博客以及任何其他\
    \ Cake 应用程序的体验。同时，不要忘记彻底检查代码中的错误，并根据您的方法修改视图的设计。在将应用程序部署到远程主机时，请确保将 Cake 库放置在文档根目录之外，并相应调整\
    \ `webroot/index.php` 文件。\n\n# 附录 A\n## 安装问题\n\n设置开发环境的最佳方法是在您的计算机上配置一个本地主机服务器。让我解释一下这意味着什么。当您访问一个网站时，您正在通过互联网连接向另一台计算机发送和请求信息。该服务器可以在大量可能的配置中通信和处理信息。例如，当您购买一台计算机时，您可以选择购买\
    \ Mac 或 Windows 机器。或者，如果您愿意，可以运行 Linux、Unix 甚至 DOS。\n\n所有这些可能性意味着，对于作为用户的您来说，体验将取决于您选择的操作系统。但假设您想打印一份文档。那么，无论操作系统或该操作系统如何打印内容，一旦文档被打印出来，计算机拥有何种配置就无关紧要了；对于文档的读者来说都是一样的。\n\
    \n互联网与这个例子非常相似。处理请求并生成输出的另一端计算机/服务器几乎可以运行任何东西。但最终的输出将是某种网页或某种网络输出。对于作为开发人员的您来说，配置将至关重要。事实上，它会影响您创建和提供网站所做的一切。\n\
    \n### 在本地主机环境中开发\n\n当您设置本地主机时，您实际上是在自己的计算机上设置一个服务器。\n\n您将启动一个像 Firefox 或 Safari\
    \ 这样的网页浏览器，并输入类似 `http://localhost` 的内容来访问服务器，就像网站在线时用户所做的那样。实际上，您是在欺骗计算机，让它认为自己在与一个\
    \ web 服务器通信，而实际上它是在与自己对话。\n\n#### 先使用本地主机，最后使用远程主机\n\n只要您本地主机上的配置与托管网站的远程 web\
    \ 服务器上的配置相同，您就可以在自己的计算机上进行开发。\n\n一旦网站运行良好，您将把根目录或应用程序的整个内容移动到服务器，然后就完成了。如果您做得正确，该网站应该在远程服务器上也能同样运行。\n\
    \n#### 为什么完全在远程上开发不好\n\n如果您绕过了本地主机的设置，您将被迫完全在远程进行开发。我认为这没问题，前提是以下事情不会困扰您：\n\n\
    - 运行持续的 FTP 会话\n- 每次想要测试代码最细微的更改时都需要上传\n- 由于互联网连接超时导致程序执行中断\n- 用户偶然发现您半成品的程序\n\
    - 购买测试域名以防止用户偶然发现您半成品的程序\n- 消耗您自己的带宽（对于一些托管计划来说可能已经很紧张）\n\n### 设置本地主机\n\n无论您的计算机运行什么操作系统，安装本地主机环境都很简单。如果您使用的是\
    \ Mac，我建议安装 Living-e 的 MAMP。如果您使用的是基于 Windows 的 PC，请安装 XAMPP。\n\n通常，创建本地主机设置需要通过命令行界面安装各种服务器程序，这需要对\
    \ PHP、MySQL、Apache、ProFTPd 和其他服务器技术有很好的理解。而 MAMP 和 XAMPP 的作用是简化这些复杂的服务器设置，这样您基本上只需运行一个安装程序，设置就完成了。\n\
    \n#### 在 Mac 上设置\n\nMac OS X 已经内置了本地主机设置。但是，如果您想运行 MySQL 并将 PHP 升级到 5.0 或更高版本，您需要手动安装每个元素，这可能会有点繁琐。运行\
    \ MAMP 可能会为您节省大量时间。以下部分概述了操作方法。\n\n**第 1 步：下载软件**\n\n访问 `http://www.mamp.info`，在主页上找到\
    \ MAMP 下载链接。它会询问您是否需要 MAMP Pro，如果需要，请支付 49 美元下载它。否则，下载最新免费版本的 MAMP。\n\n**第 2 步：打开磁盘映像并安装\
    \ MAMP 文件夹**\n\n这一步非常简单。它会要求您将一个文件夹拖放到“应用程序”文件夹中。这是本地主机设置正常工作所必需的。请确保您没有使用任何子文件夹或将\
    \ MAMP 文件夹重命名为其他任何名称。如果您不喜欢这样做，您可能需要考虑更复杂的本地主机设置方法。\n\n![Image 50](img/index-305_1.jpg)\n"
- fmt: '# Appendix A: Installation Issues


    ## Step 3: Run the MAMP Application Program


    At any time you can manage your localhost setup by running the application `/Applications/MAMP/MAMP`.
    The main screen looks like Figure A-1.


    **Figure A-1.** *The MAMP main application screen*


    This program, when you click **Start Servers**, will maintain the localhost environment.
    You now can begin executing PHP code, but you have to know where to access the
    localhost on your hard drive.


    ## Step 4: Configure the Localhost Root Folder


    By default, any file contained in the `/Applications/MAMP/htdocs` folder can be
    accessed in the localhost environment. This isn’t too bad, altogether, but I personally
    prefer having my web sites outside my `Applications` folder. Changing this setting
    is as simple as going into the Preferences area of the MAMP application.


    Click **Preferences** to open the Preferences area. Click the **Apache** tab,
    and you’ll find a field called **Document Root**. It should read `/applications/mamp/htdocs`
    or something similar. Click **Select** to change the document root to something
    else. In this case, I’ll select the `~/Sites/` folder (if my Mac OS X username
    is `dave`, then the path will look like `/Users/dave/Sites`). Now, from here on
    out, any folder or file placed in the `Sites` folder will be executed by the MAMP
    localhost setup and not Mac OS X’s default web sharing.


    ## Step 5: Change the Localhost Ports


    Now click the **Ports** tab, still in the Preferences area. It lists the **Apache
    port** and the **MySQL port**. The values in these fields are set to `8888` and
    `8889`, respectively, by default. To better mimic a typical remote web server,
    these should be changed. In the Apache port field, type `80`, and in the MySQL
    port field, type `3306`. (You can also click the **Set to Default Apache and MySQL
    Ports** button.)


    Because these ports are configured this way, you can now open Safari and type
    `http://localhost` instead of `http://localhost:8888` whenever you want to execute
    scripts and files. Also, when configuring programs to work with MySQL, you can
    simply enter `localhost` in the server setting instead of `localhost:8888`.


    ## Step 6: Make the Localhost Easier to Manage


    It can’t get much easier than this to get a localhost environment running on a
    Mac. But one flaw with the MAMP application is that it must be running for the
    localhost environment to be running. So if you quit MAMP, you will no longer be
    able to run PHP code via the localhost. Fortunately, Living-e provides a Dashboard
    widget that does exactly what the MAMP application does to keep the localhost
    active. Simply launch the `Mamp Control.wdgt` file, and click **Start Servers**
    to make the localhost active. It will now run in the background through Dashboard.


    ---


    # Setting Up on Windows


    Windows XP Pro has Microsoft’s web server built into it, known as Internet Information
    Server (IIS). Installing IIS is pretty easy to do. However, most PHP and MySQL
    scenarios are more easily handled in a bundled localhost installer available from
    Apache Friends called XAMPP. The following sections outline the steps to take
    when installing and configuring XAMPP on your PC.


    ## Step 1: Download the Software


    You can download XAMPP from the Apache Friends web site. As of the printing of
    this book, a direct link is right here:


    [http://www.apachefriends.org/en/xampp-windows.html](http://www.apachefriends.org/en/xampp-windows.html)


    You can download an installer application, a ZIP file, or a self-extracting 7-ZIP
    archive. The easiest option is to just run the installer application. So, scroll
    down to the download area of the page, and click **Installer**. The download should
    immediately commence.


    ## Step 2: Run the Installer Program


    The program will walk you through installing XAMPP. It will ask for a destination
    folder for XAMPP, and the default location is at `c:\xampp`. I recommend sticking
    to this configuration since you will likely want XAMPP to be able to access any
    area of your C drive. Click **Next**, and on the following screen leave the Service
    Section check boxes blank. To wrap it all up, click the **Install** button at
    the end. It will extract all the necessary files and leave you with a convenient
    localhost environment in the `c:\xampp` folder.


    ![Image 51](index-307_1.jpg)


    ## Step 3: Open the XAMPP Control Panel


    After installation is complete, you’ll be taken to the XAMPP Control Panel. This
    panel is accessible in the future by clicking the shortcut icon on the desktop
    or by going to **Start / Apache Friends / XAMPP / XAMPP Control Panel**. The screen
    looks something like Figure A-2.


    **Figure A-2.** *The XAMPP Control Panel screen*


    Clicking the **Start** buttons starts those important web server services such
    as Apache, MySQL, and more. Start up Apache and MySQL using the **Start** buttons,
    and fire up your web browser. In the URL field, type `http://localhost`. You’ll
    be taken to the XAMPP welcome screen.


    ## Step 4: Secure the Localhost


    Unfortunately, XAMPP doesn’t come preinstalled with a more secure localhost environment.
    In some ways this may be a good thing, but for right now, the last thing you want
    is to compromise your network or your computer. If you think there is little to
    worry about other users accessing your localhost (which is really only the case
    in a work environment when other co-workers are using the same subnet or network),
    then you can bypass this step. If there is any chance of other users having access
    to your localhost in the least, then you may just want to take a moment to make
    XAMPP more secure. On the left side of the XAMPP startup web page is the **Security**
    link. Click it, bringing up the security information page. Most items, if not
    all, will be marked “unsecure.” Let’s make those all light up green.


    A link below the main table called `http://localhost/security/xamppsecurity.php`
    takes you to some fields that will allow you to secure the localhost. Change the
    MySQL root password, and click **Password Changing**. Below the MySQL root password
    fields is another set of fields to protect the XAMPP directory (`.htaccess`).
    Put in a username and password there. For both, make sure you do not save the
    passwords in a plain-text file.


    From here on out, you will be asked to log in to access the XAMPP control pages.
    Restart Apache and MySQL to propagate the settings you’ve created.


    ---


    # Running MySQL


    The most powerful web-based tool for setting up and running MySQL is called PHPMyAdmin,
    another open source application that comes installed with MAMP and XAMPP. The
    startup screens for both localhost environments contain a link to PHPMyAdmin.
    This is the quickest way to begin working in MySQL, since we’ve already installed
    a localhost that has the program preconfigured and ready to go. Many developers
    prefer PHPMyAdmin over other desktop-based MySQL applications because it’s web-based
    and free and, quite honestly, a great application. I prefer desktop-based applications
    because of their speed, and I can avoid screen refreshing, which PHPMyAdmin is
    locked into because it’s a web application.


    ## Where to Find Other MySQL Tools


    If you’d like to use a desktop application to manage your databases, you can find
    some listed in the following sections. They will likely require an extra level
    of configuration to get them working with your localhost environment. I’ll list
    them and then explain some of the necessary settings to get them working right.


    ### CocoaMySQL'
