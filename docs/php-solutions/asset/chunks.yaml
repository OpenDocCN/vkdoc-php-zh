    \ the end date. The code in `date_interval_05.php` has been amended like this:\n\
    \n```\n$start = new DateTime('12/31/2014');\n$interval = DateInterval::createFromDateString('second\
    \ Tuesday of next month');\n$end = new DateTime('12/31/2015');\n$period = new\
    \ DatePeriod($start, $interval, $end, DatePeriod::EXCLUDE_START_DATE);\nforeach\
    \ ($period as $date) {\n    echo $date->format('l, F jS, Y') . '<br>';\n}\n```\n\
    \nThis produces exactly the same output as shown in Figure [14-11](#A978-1-4842-0635-5_14_Chapter.html#Fig11).\n\
    \nYou can also create a `DatePeriod` object using the ISO 8601 recurring time-interval\
    \ standard ([http://en.wikipedia.org/wiki/ISO_8601#Repeating_intervals](http://en.wikipedia.org/wiki/ISO_8601#Repeating_intervals)).\
