- fmt: '#### Go It Alone


    The first approach I recommend is to simply set up your own landing page offering
    the theme for sale (you can and should do this even if you’re accepted into the
    theme store, by the way). Write your landing page content to target storeowners
    that have a specific use case that your theme can show off, but isn’t found in
    the regular theme store.


    The advantage of this approach is that your cut of the proceeds is 100% minus
    processing costs, rather than 70%. The downside, obviously, is that it’s going
    to be much more difficult to drive sales outside of the official channel, and
    the price point for such themes tends to be lower (in the $50 to $100 range).


    In recent times, established Shopify theme developers have experimented with selling
    themes at a higher price point outside the Shopify theme store. One perfect example
    of this is the “Turbo” theme in Figure [11-8](#A437216_1_En_11_Chapter.html#Fig8)
    from long-term developers Out of the Sandbox, which currently retails at $350.
    While this has been a successful strategy for them, and has more fairly compensated
    them for the time required to support their themes, I imagine it would be difficult
    for a non-established developer with no existing customer base to follow this
    approach.


    ![A437216_1_En_11_Fig8_HTML.jpg](A437216_1_En_11_Fig8_HTML.jpg)


    Figure 11-8


    This “Turbo” theme is sold outside the theme store by Out of the Sandbox


    #### Use Alternative Theme Marketplaces


    Sites like ThemeForest (`https://themeforest.net`) and Creative Market (`https://creativemarket.com`)
    offer alternative theme marketplaces for you to list your theme. These sites tend
    to be a race to the bottom with price, so expect to be selling your themes for
    $30-$50 here. The quality of themes on offer is often (but not always) quite low.


    #### Framework-ize


    Most Shopify theme developers building bespoke themes for clients eventually start
    to develop their own “framework” for themes—a set of starting templates and styles
    to avoid going through the same steps again and again. Consider extracting parts
    of what you’ve built into your own framework or pattern library to get a head
    start the next time you work on a project for a client.


    #### Use Open-Source


    You won’t make any money directly from this strategy, but open-sourcing your theme
    can be a great way to get yourself in front of more savvy clients and other theme
    developers. This in turn can generate inbound leads for custom development work.
    The next section discusses some of the benefits of open-sourcing your Shopify
    work.


    ## Leveraging the Shopify Ecosystem


    When I started working as a Shopify Expert, I didn’t have that much interaction
    with other developers. I was comfortable just doing my own thing, and I managed
    to get by with the clients I had coming in through the experts listing or word
    of mouth referrals.


    After a couple of years tinkering around with the platform, I built up the confidence
    to start publishing the occasional article on my personal blog. It wasn’t anything
    game-changing—mostly just describing how I was working around some of Shopify’s
    limitations at the time, like getting the `Respond.js` library to work on Shopify’s
    CDN.[¹](#A437216_1_En_11_Chapter.html#Fn1) I got some positive feedback from other
    developers (both in and outside Shopify), so I continued putting out the occasional
    Shopify-related post.


    Over time, knowing that my blog content was being read and found useful gave me
    the courage to start putting other things I was working on out into the wild.
    Since then, I’ve released a paid framework to help people build themes using the
    Bootstrap frontend framework, developed a bunch of open-source projects to aid
    with Shopify development (visible at `https://github.com/discolabs`), recorded
    several screencasts on theme and app development, delivered talks and workshops
    about Shopify at meetups and conferences around the world, and now have written
    this book.


    None of these projects led the way to untold riches, or spun up into a hugely
    popular and closely followed project (although one, `Cart.js`, was used by Kanye
    West’s Yeezy store, which was pretty cool). Despite not reaping huge financial
    reward directly, in every case I feel like I’ve gotten something back:


    - I’ve gotten lots of warm and fuzzies when complete strangers said nice things
    about my articles or projects.

    - I’ve gotten even more warm and fuzzies when complete strangers paid for my articles
    or projects.

    - The number of inquiries from higher-quality clients has increased, and selling
    clients becomes easier when one can say they’ve literally written the book on
    Shopify.

    - My relationship with one of my very best clients, which started years ago with
    them asking me to make a single tweak to my paid framework, is still ongoing and
    profitable (for both of us!)

    - I’ve been able to connect with and meet some really great folks in the Shopify
    ecosystem.


    The point of going through all this isn’t meant to be the world’s longest humble
    brag, but more to highlight that sharing your work with the community, however
    small the contribution, can lead to lots of interesting opportunities and pay
    real dividends.


    Now that you’re reaching the end of this book, you’re hopefully in a position
    where you feel more confident about tackling your next Shopify theme development
    project. (Well, I certainly hope you are—if not, you’d better get in touch with
    me to let me know what needs to improve for the next edition.)


    As you work on that project, I encourage you to think about how the things you’re
    learning and developing could be turned into something valuable for the wider
    community. When I say “community,” I’m not referring to anything official. There’s
    no admission process or secret handshake. I also don’t believe that you need to
    have years and years of experience with Shopify to teach others something valuable.


    It might be a blog post describing how you overcame a difficulty when building
    your theme, or replying to someone who’s asked a question on the Shopify forums.
    Even just raising an issue on GitHub for an open-source library you’ve been using
    is super useful and will be very much appreciated by the maintainers!


    A rising tide lifts all boats, and having a Shopify developer community that’s
    vibrant and full of active and supportive members is only going to encourage the
    ecosystem’s growth.


    ## Where to Join


    This section contains a list of resources that I think are useful for participating
    in the Shopify community.'
