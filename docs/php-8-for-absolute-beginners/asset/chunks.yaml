- fmt: "# 窗口与导航\n\n当编辑器区域中的所有条目都完成输入后，窗口会进行刷新，以便进行导航。\n\n**图 7-2**  \n`adminWithNavigation.php`\
    \ 的输出\n\n在浏览器中运行程序时，我们应该会在浏览器窗口顶部看到导航栏。点击某个导航项不会立即产生可见效果；导航只是一个视图。点击任何导航项都会编码一个名为\
    \ `page` 的 URL 变量。如果我们查看浏览器的地址栏，就能看到它。接下来，我们将创建控制器代码来响应这些用户交互。\n\n## 加载管理员模块控制器\n\
    \n如前所述，`admin.php` 程序是我们的前端控制器。因此，它将加载与用户点击的导航项相关联的任何其他控制器。导航栏中有两个链接，因此我们需要两个控制器。\n\
    \n让我们创建两个初步控制器，这样在点击导航项时就能在浏览器中看到可见的变化。我们在 `controllers` 文件夹中添加一个 `admin` 文件夹。我们将在此文件夹内为编辑器视图创建一个程序。\n\
    \n```\n<?php\necho \"editor controller loaded!\";\n?>\n```\n\n**列表 7-4**  \n`editor.php`\n\
    \n这个编辑器控制器一开始不会做太多事情。最初，我们只想检查它是否正确连接了相关文件。有了这个基础，我们就可以开发更复杂的代码了。让我们再创建另一个文件，用于控制最终将列出所有条目的视图。\n\
    \n```\n<?php\necho \"entries controller loaded!\";\n?>\n```\n\n**列表 7-5**  \n\
    `entries.php`\n\n现在我们可以调整管理员程序来处理这些控制器。\n\n```\n<?php\n$pageData->setTitle(\"\
    PHP/MySQL blog demo\");\n$pageData->setCss(\"\");\n$pageData->setContent($nav);\n\
    //新代码从这里开始\n$navigationIsClicked = isset( $_GET['page'] );\nif ( $navigationIsClicked\
    \ ) {\n    //准备加载对应的控制器\n    $contrl = $_GET['page'];\n} else {\n    //准备加载默认控制器\n\
    \    $contrl = \"entries\";\n}\n//加载控制器\ninclude_once \"controllers/admin/$contrl.php\"\
    ;\n$pageData->appendContent($info);\ninclude_once \"views/page.php\";\necho $page;\n\
    ?>\n```\n\n**列表 7-6**  \n`newadminWithNavigation.php`\n\n同样，这个前端控制器的风格应该非常熟悉。它类似于之前的章节。请记住文件名\
    \ `entries.php` 和 `editor.php`。这些名字至关重要。它们必须与用户点击导航项时声明的 URL 变量 `page` 的对应值相匹配。让我们仔细看看导航中使用的\
    \ `href` 值：\n\n```\n<a href=\"?page=entries\">All entries</a>\n<a href=\"?page=editor\"\
    >Editor</a>\n```\n\n当用户点击 `All entries` 项时，URL 变量 `page` 获得值 `entries`。URL 变量\
    \ `page` 通过 `$_GET` 获取。字符串值 `entries` 存储在一个名为 `$contrl` 的变量中，随后用于包含 `controllers/admin/$contrl.php`，这实际上会转换为包含\
    \ `controllers/admin/entries.php`，因为变量 `$contrl` 持有值 `entries`。如果用户点击 `Editor`\
    \ 项，则会包含 `controllers/admin/editor.php`。\n\n此时，我们可以再次测试系统，确保一切仍然正常工作。默认情况下，我们会看到从\
    \ `entries` 控制器返回的消息。如果我们点击编辑器导航项，则会看到从编辑器控制器返回的消息。\n\n## 创建管理员条目输入表单\n\n既然我们已经有了动态导航，是时候创建一个表单来接受博客条目了。同时，让我们创建一个用于删除条目的按钮。我们将在后续章节中创建删除代码。\n\
    \n```\n<?php\nreturn \"\n<form method='post' action='editor.php'>\n    <fieldset>\n\
    \        <legend>New Entry Submission</legend>\n        <label for='title'>Title</label>\n\
    \        <input type='text' id='title' name='title' maxlength='150' />\n     \
    \   <label for='entry'>Entry</label>\n        <textarea id='entry' name='entry'></textarea>\n\
    \    </fieldset>\n    <fieldset id='editor-buttons'>\n        <input type='submit'\
    \ value='Save' />\n        <input type='submit' value='Delete' />\n    </fieldset>\n\
    </form>\n\";\n?>\n```\n\n**列表 7-7**  \n`editor-html.php`\n\n如果你以前用过 HTML，上述大部分代码应该很熟悉。我们包含了两个\
    \ `<fieldset>` 元素。它们用于将相关的表单字段分组在一起。主 `<fieldset>` 有一个 `<legend>` 元素。`<legend>`\
    \ 类似于 `<fieldset>` 元素的标题。\n\n条目标题的 `<input>` 元素有一个设置为 150 的 `maxlength` 属性。你可能猜到了，显示的文本字段只接受\
    \ 150 个字符。这很完美，因为我们数据库中的 `entries` 表对于新的 `title` 属性最多接受 150 个字符。我们应该始终确保 HTML\
    \ 表单中设置的所有限制与存储此信息的数据库表中的限制相匹配。\n\n`maxlength` 属性增强了表单的可用性，因为用户更难通过表单创建无效的标题。`maxlength`\
    \ 属性执行客户端验证，并且只允许提交有效的标题。需要牢记的一点是，客户端验证非常适合增强可用性。它会在信息发送到服务器之前进行首次验证尝试。这提高了效率，因为信息在有效之前不会被发送到服务器。然而，它并不能提高安全性，因为恶意用户可以覆盖客户端验证。我们还需要在\
    \ PHP 内部对提交到服务器的信息进行验证，以确保我们收到了期望的信息。\n\n创建了新的编辑器视图后，我们必须更新控制器，以便它显示新的视图。现在，你可以通过将以下控制器放入浏览器来测试我们当前的进度。\n\
    \n```\n<?php\n$info = include_once \"views/admin/editor-html.php\";\nreturn $info;\n\
    ?>\n```\n\n**列表 7-8**  \n`neweditor.php`\n\n目前，编辑器仅包含 HTML 页面。我们还需要更新导航，以调用这个新版本。\n\
    \n```\n<?php\nreturn \"\n<nav>\n    <a href='?page=entries'>All entries</a>\n\
    \    <a href='?page=neweditor'>Editor</a>\n</nav>\n\";\n?>\n```\n\n**列表 7-9**\
    \  \n`updatedadminWithNavigation.php`\n\n一个简单的更改现在将页面设置为 `neweditor`。最后，我们需要更新我们的前端控制器以使用新的导航。更改的行包含在下面。新的前端控制器现在是\
    \ `newestadminWithNavigation.php`。\n\n```\ninclude_once 'views/admin/updatedadminWithNavigation.php';\n\
    ```\n\n完成这些更改后，我们可以打开前端控制器，然后点击编辑器菜单项来查看表单。不过，让我们添加一点 CSS 来使表单看起来更好看。\n\n## 样式化管理员编辑器\n\
    \n你可能会同意，未设置样式的条目编辑器表单不够专业。一点 CSS 就能极大地改善美学效果。\n\n```css\n/* code listing for\
    \ blog/css/blog.css */\nform#editor{\n    width: 300px;\n    margin-top:10px;\n\
    \    padding:0px;\n    background-color: #dedede;\n}\nform#editor label, form#editor\
    \ input[type='text']{\n    display:block;\n}\nform#editor #editor-buttons{\n \
    \   border:none;\n    text-align:right;\n}\nform#editor textarea, form#editor\
    \ input[type='text']{\n    width:90%;\n    margin-bottom:2em;\n}\nform#editor\
    \ textarea{\n    height:10em;\n}\n```\n\n**列表 7-10**  \n`newblog.css`\n\n前端控制器中的一行必须更新以使用新的\
    \ CSS 样式表。\n\n```\n$pageData->setCss(\"css/newblog.css\");\n```\n\n最后，我们可以通过将\
    \ `updatedadminWithNavigation.php` 加载到浏览器中并点击编辑器菜单项来查看结果。\n\n![输出：点击编辑器菜单项后](images/323857_3_En_7_Chapter/323857_3_En_7_Fig3_HTML.jpg)\n\
    \n此对话框在点击编辑器菜单时刷新，包含两个栏区：一个标题栏和两个输入栏，以及保存和删除选项。\n\n**图 7-3**  \n点击编辑器菜单项后的输出\n\
    \n学习 CSS 的最佳方法是使用现有的样式表并根据你的喜好进行调整。这个样式表为表单提供了一个简单的显示——足以让它看起来更专业一些。\n\n**练习**：调整\
    \ CSS 文件以使表单更具吸引力。使按钮更圆润，并磨平表单框的边角。调整菜单项使其显示更专业的外观。"
  raw: 'A window reflects when all entries are completed in the editor

    portion for navigation purposes.


    Figure 7-2

    Output from adminWithNavigation.php


    When running the program within our browser, we should see the

    navigation displayed in the top of the browser window. Clicking a

    navigation item will not have any immediately visible effect; the

    navigation is just a view. Clicking any navigation item will encode a

    URL variable named `page` *.* We

    can see it if we look in the browser’s address bar. Next, we will create

    the controller code to respond to these user interactions.


    Loading Admin Module Controllers

    As already mentioned, the `admin.php` program is

    our front controller. As such, it will load any other controller(s)

    associated with the navigation item the user clicked. There are two

    links in the navigation, so we will need two controllers .


    Let us create two preliminary controllers so we can see visible changes

    in the browser when we click a navigation item. Let us add an `admin` folder to
    the

    `controllers`

    folder. We will create a program for the editor view within this folder.


    ```

    editor controller loaded!";

    ?>

    Listing 7-4

    editor.php

    ```


    The editor controller will not be doing a whole lot to start. Initially,

    we just want to check that it hooks up the right files. With that in

    place, we can develop code of greater complexity. Let us create another

    file for controlling the view that will eventually list all entries.


    ```

    entries controller loaded!";

    ?>

    Listing 7-5

    entries.php

    ```


    Now we can adjust the admin program to process these controllers.


    ```

    setTitle("PHP/MySQL blog demo");

    $pageData->setCss("");

    $pageData->setContent($nav);

    //new code begins here

    $navigationIsClicked = isset( $_GET[''page''] );

    if ( $navigationIsClicked ) {

    //prepare to load corresponding controller

    $contrl = $_GET[''page''];

    } else {

    //prepare to load default controller

    $contrl = "entries";

    }

    //load the controller

    include_once "controllers/admin/$contrl.php";

    $pageData->appendContent($info);

    include_once "views/page.php";

    echo $page;

    ?>

    Listing 7-6

    newadminWithNavigation.php

    ```


    Again, the style of this front controller should look very familiar. It

    is similar to previous chapters. Remember the file names `entries.php` and `editor.php`.
    These

    names are essential. They must be matched with corresponding values of

    the URL variable `page` declared when a

    user clicks a navigation item. Let us take a closer look at the `href` values
    used in

    the navigation:


    ```

    All entries

    Editor

    ```


    When a user clicks the `All entries` item, the

    URL variable `page` gets a value of

    `entries`

    *.* The URL variable `page` is fetched using

    `$_GET`. The

    string value `entries` are stored

    inside a variable called `$contrl` and

    subsequently used to include `controllers/admin/$contrl.php`,

    which will really translate to including `controllers/admin/entries.php`,

    because the variable `$contrl` holds the

    value `entries`.

    If the `user clicks the Editor item`, `controllers/admin/editor.php`

    will be included.

    At this point, we can test the system again to make sure everything

    is still working properly. By default, we will see the message returned

    from the entries controller. If we click the navigation item for the

    editor, we will see the returned message from the editor controller.


    Creating the Admin Entry Input Form


    Now that we have dynamic navigation, it’s time to create a form  to accept blog

    entries. While we are at it, let us create a button for deleting an

    entry. We will create code for deletion in a later chapter.


    ```


    New Entry Submission

    Title


    Entry


    ";

    ?>

    Listing 7-7

    editor-html.php

    ```


    If you have used HTML before, most of the preceding code should be

    familiar. We included two `<fieldset>`

    elements. They are used to group related form fields together. The main

    `<fieldset>` has

    a `<legend>`

    element. A `<legend>` is

    like a heading for a `<fieldset>`

    element.

    The `<input>` element

    for the entry title has a `maxlength` attribute

    set to 150\. You can probably guess that the displayed text field will

    only accept 150 characters. That is perfect, because our entry table in

    the database accepts a maximum of 150 characters for new `title` attributes. We

    should always make sure that any limits placed in HTML forms match the

    limits placed in the database table that will store this

    information.

    The `maxlength` attribute

    enhances form usability, in that it becomes harder for users to create

    an invalid title through the form. The `maxlength` attribute

    performs client-side validation and will only allow submission of valid

    titles. One thing to keep in mind is the fact that client-side

    validation is great for enhancing usability.

    A first attempt is made to validate information before it is sent to

    the server. This increases efficiency because the information is not

    sent to the server until it is valid. However, it does not improve

    security, because a malicious user can override client-side validation.

    We will also need to validate the information submitted to the server,

    within PHP, to make sure we received the information we expected.


    With a new editor view created, we must update the controller, so it

    shows the new view. You can now test our current progress by placing the

    following controller in your browser.


    ```

    Listing 7-8

    neweditor.php

    ```


    At the moment, the editor simply includes the HTML page. We will also

    need to update the navigation to now call this new version.


    ```

    All entries

    Editor

    ";

    ?>

    Listing 7-9

    updatedadminWithNavigation.php

    ```


    A simple change has now set the page to `neweditor`. Finally,

    we need to update our front controller to use the new navigation. The

    line changed is included in the following. The new front controller is

    now `newestadminWithNavigation.php`.


    ```

    include_once ''views/admin/updatedadminWithNavigation.php'';

    ```


    After completing these changes, we can open the front controller, and

    click the Editor menu item to see the form. However, let us add a little

    CSS to make the form look better.


    Styling the Admin Editor


    You will probably agree that the unstyled entry editor  form is not

    professional. A little CSS can take us a long way toward improved

    aesthetics.


    ```

    /* code listing for blog/css/blog.css */

    form#editor{

    width: 300px;

    margin-top:10px;

    padding:0px;

    background-color: #dedede;

    }

    form#editor label, form#editor input[type=''text'']{

    display:block;

    }

    form#editor #editor-buttons{

    border:none;

    text-align:right;

    }

    form#editor textarea, form#editor input[type=''text'']{

    width:90%;

    margin-bottom:2em;

    }

    form#editor textarea{

    height:10em;

    }

    Listing 7-10

    newblog.css

    ```


    One line in the front controller must be updated to use the new CSS

    style sheet.


    ```

    $pageData->setCss("");

    ```


    Finally, we can see our results by loading `updatedadminWithNavigation.php`

    into our browser and by clicking the Editor menu item.


    ![](images/323857_3_En_7_Chapter/323857_3_En_7_Fig3_HTML.jpg)


    This dialer reflects when the editor menu clicks, it contains two

    bars with one title bar and two entry bars along with save and delete

    options.


    Figure 7-3

    Output after clicking the Editor menu item


    The best way to learn CSS is by using an existing style sheet and

    adjusting it to what you like. This sheet gives a simple display of the

    form – enough to make it look more professional.

    **Exercise**: Adjust the CSS file to make the form more

    appealing. Make the buttons more rounded and curve off the edges of the

    form box. Adjust the menu items so they display a more professional

    look.'
  trans: "\n# 窗口与导航\n\n当编辑器区域中的所有条目都完成输入后，窗口会进行刷新，以便进行导航。\n\n**图 7-2**  \n`adminWithNavigation.php`\
    \ 的输出\n\n在浏览器中运行程序时，我们应该会在浏览器窗口顶部看到导航栏。点击某个导航项不会立即产生可见效果；导航只是一个视图。点击任何导航项都会编码一个名为\
    \ `page` 的 URL 变量。如果我们查看浏览器的地址栏，就能看到它。接下来，我们将创建控制器代码来响应这些用户交互。\n\n## 加载管理员模块控制器\n\
    \n如前所述，`admin.php` 程序是我们的前端控制器。因此，它将加载与用户点击的导航项相关联的任何其他控制器。导航栏中有两个链接，因此我们需要两个控制器。\n\
    \n让我们创建两个初步控制器，这样在点击导航项时就能在浏览器中看到可见的变化。我们在 `controllers` 文件夹中添加一个 `admin` 文件夹。我们将在此文件夹内为编辑器视图创建一个程序。\n\
    \n```\n<?php\necho \"editor controller loaded!\";\n?>\n```\n\n**列表 7-4**  \n`editor.php`\n\
    \n这个编辑器控制器一开始不会做太多事情。最初，我们只想检查它是否正确连接了相关文件。有了这个基础，我们就可以开发更复杂的代码了。让我们再创建另一个文件，用于控制最终将列出所有条目的视图。\n\
    \n```\n<?php\necho \"entries controller loaded!\";\n?>\n```\n\n**列表 7-5**  \n\
    `entries.php`\n\n现在我们可以调整管理员程序来处理这些控制器。\n\n```\n<?php\n$pageData->setTitle(\"\
    PHP/MySQL blog demo\");\n$pageData->setCss(\"\");\n$pageData->setContent($nav);\n\
    //新代码从这里开始\n$navigationIsClicked = isset( $_GET['page'] );\nif ( $navigationIsClicked\
    \ ) {\n    //准备加载对应的控制器\n    $contrl = $_GET['page'];\n} else {\n    //准备加载默认控制器\n\
    \    $contrl = \"entries\";\n}\n//加载控制器\ninclude_once \"controllers/admin/$contrl.php\"\
    ;\n$pageData->appendContent($info);\ninclude_once \"views/page.php\";\necho $page;\n\
    ?>\n```\n\n**列表 7-6**  \n`newadminWithNavigation.php`\n\n同样，这个前端控制器的风格应该非常熟悉。它类似于之前的章节。请记住文件名\
    \ `entries.php` 和 `editor.php`。这些名字至关重要。它们必须与用户点击导航项时声明的 URL 变量 `page` 的对应值相匹配。让我们仔细看看导航中使用的\
    \ `href` 值：\n\n```\n<a href=\"?page=entries\">All entries</a>\n<a href=\"?page=editor\"\
    >Editor</a>\n```\n\n当用户点击 `All entries` 项时，URL 变量 `page` 获得值 `entries`。URL 变量\
    \ `page` 通过 `$_GET` 获取。字符串值 `entries` 存储在一个名为 `$contrl` 的变量中，随后用于包含 `controllers/admin/$contrl.php`，这实际上会转换为包含\
    \ `controllers/admin/entries.php`，因为变量 `$contrl` 持有值 `entries`。如果用户点击 `Editor`\
    \ 项，则会包含 `controllers/admin/editor.php`。\n\n此时，我们可以再次测试系统，确保一切仍然正常工作。默认情况下，我们会看到从\
    \ `entries` 控制器返回的消息。如果我们点击编辑器导航项，则会看到从编辑器控制器返回的消息。\n\n## 创建管理员条目输入表单\n\n既然我们已经有了动态导航，是时候创建一个表单来接受博客条目了。同时，让我们创建一个用于删除条目的按钮。我们将在后续章节中创建删除代码。\n\
    \n```\n<?php\nreturn \"\n<form method='post' action='editor.php'>\n    <fieldset>\n\
    \        <legend>New Entry Submission</legend>\n        <label for='title'>Title</label>\n\
    \        <input type='text' id='title' name='title' maxlength='150' />\n     \
    \   <label for='entry'>Entry</label>\n        <textarea id='entry' name='entry'></textarea>\n\
    \    </fieldset>\n    <fieldset id='editor-buttons'>\n        <input type='submit'\
    \ value='Save' />\n        <input type='submit' value='Delete' />\n    </fieldset>\n\
    </form>\n\";\n?>\n```\n\n**列表 7-7**  \n`editor-html.php`\n\n如果你以前用过 HTML，上述大部分代码应该很熟悉。我们包含了两个\
    \ `<fieldset>` 元素。它们用于将相关的表单字段分组在一起。主 `<fieldset>` 有一个 `<legend>` 元素。`<legend>`\
    \ 类似于 `<fieldset>` 元素的标题。\n\n条目标题的 `<input>` 元素有一个设置为 150 的 `maxlength` 属性。你可能猜到了，显示的文本字段只接受\
    \ 150 个字符。这很完美，因为我们数据库中的 `entries` 表对于新的 `title` 属性最多接受 150 个字符。我们应该始终确保 HTML\
    \ 表单中设置的所有限制与存储此信息的数据库表中的限制相匹配。\n\n`maxlength` 属性增强了表单的可用性，因为用户更难通过表单创建无效的标题。`maxlength`\
    \ 属性执行客户端验证，并且只允许提交有效的标题。需要牢记的一点是，客户端验证非常适合增强可用性。它会在信息发送到服务器之前进行首次验证尝试。这提高了效率，因为信息在有效之前不会被发送到服务器。然而，它并不能提高安全性，因为恶意用户可以覆盖客户端验证。我们还需要在\
    \ PHP 内部对提交到服务器的信息进行验证，以确保我们收到了期望的信息。\n\n创建了新的编辑器视图后，我们必须更新控制器，以便它显示新的视图。现在，你可以通过将以下控制器放入浏览器来测试我们当前的进度。\n\
    \n```\n<?php\n$info = include_once \"views/admin/editor-html.php\";\nreturn $info;\n\
    ?>\n```\n\n**列表 7-8**  \n`neweditor.php`\n\n目前，编辑器仅包含 HTML 页面。我们还需要更新导航，以调用这个新版本。\n\
    \n```\n<?php\nreturn \"\n<nav>\n    <a href='?page=entries'>All entries</a>\n\
    \    <a href='?page=neweditor'>Editor</a>\n</nav>\n\";\n?>\n```\n\n**列表 7-9**\
    \  \n`updatedadminWithNavigation.php`\n\n一个简单的更改现在将页面设置为 `neweditor`。最后，我们需要更新我们的前端控制器以使用新的导航。更改的行包含在下面。新的前端控制器现在是\
    \ `newestadminWithNavigation.php`。\n\n```\ninclude_once 'views/admin/updatedadminWithNavigation.php';\n\
    ```\n\n完成这些更改后，我们可以打开前端控制器，然后点击编辑器菜单项来查看表单。不过，让我们添加一点 CSS 来使表单看起来更好看。\n\n## 样式化管理员编辑器\n\
    \n你可能会同意，未设置样式的条目编辑器表单不够专业。一点 CSS 就能极大地改善美学效果。\n\n```css\n/* code listing for\
    \ blog/css/blog.css */\nform#editor{\n    width: 300px;\n    margin-top:10px;\n\
    \    padding:0px;\n    background-color: #dedede;\n}\nform#editor label, form#editor\
    \ input[type='text']{\n    display:block;\n}\nform#editor #editor-buttons{\n \
    \   border:none;\n    text-align:right;\n}\nform#editor textarea, form#editor\
    \ input[type='text']{\n    width:90%;\n    margin-bottom:2em;\n}\nform#editor\
    \ textarea{\n    height:10em;\n}\n```\n\n**列表 7-10**  \n`newblog.css`\n\n前端控制器中的一行必须更新以使用新的\
    \ CSS 样式表。\n\n```\n$pageData->setCss(\"css/newblog.css\");\n```\n\n最后，我们可以通过将\
    \ `updatedadminWithNavigation.php` 加载到浏览器中并点击编辑器菜单项来查看结果。\n\n![输出：点击编辑器菜单项后](img/323857_3_En_7_Fig3_HTML.jpg)\n\
    \n此对话框在点击编辑器菜单时刷新，包含两个栏区：一个标题栏和两个输入栏，以及保存和删除选项。\n\n**图 7-3**  \n点击编辑器菜单项后的输出\n\
    \n学习 CSS 的最佳方法是使用现有的样式表并根据你的喜好进行调整。这个样式表为表单提供了一个简单的显示——足以让它看起来更专业一些。\n\n**练习**：调整\
    \ CSS 文件以使表单更具吸引力。使按钮更圆润，并磨平表单框的边角。调整菜单项使其显示更专业的外观。\n"
- fmt: "# 连接数据库\n\n我们已经完成了基本的编辑器视图。不久，我们将能够通过编辑器表单将新的博客条目插入到`blog_entry`数据库表中。为此，我们需要从应用程序到数据库建立数据库连接。\n\
    \n我们将采用与投票应用程序相同的方法：使用`PDO`进行连接，并将连接包含在前端控制器中，以便与后续加载的控制器共享。\n\n```php\n<?php\n\
    # database.php\n\ntry {\n    $db = new PDO(\"sqlite:../data/simple_blog.db\");\n\
    \    $db->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION);\n} catch (Exception\
    \ $e) {\n    $pageData->setContent(\"Connection failed! $e\");\n    exit();\n\
    }\n?>\n```\n\n我们可以使用位于投票程序`models`文件夹中的`database.php`文件来访问数据库。我们唯一需要做的更改是将数据库改为`simple_blog`。我们很快会将其包含到前端控制器中。\n\
    \n# 使用设计模式\n\n设计模式是针对常见任务的通用最佳实践解决方案。有些设计模式被定义得很全面。随着经验的增长，你会遇到更多的设计模式。作为一名绝对初学者，你不需要全面了解设计模式——那可能弊大于利。\n\
    \n本书使用了几个设计模式的简单实现。我们已经看到了前端控制器设计模式的简单实现，以及同样简单的MVC实现。可以在同一个项目中组合多个设计模式。\n\n>\
    \ **注意**\n> \n> 有关设计模式的更多信息，请访问[`http://en.wikipedia.org/wiki/Software_design_pattern`](http://en.wikipedia.org/wiki/Software_design_pattern)。\n\
    \n## 表数据网关设计模式\n\n表数据网关设计模式是一个相对容易理解的设计模式。该模式规定，数据库中的每个表对应创建一个PHP类。其理念是系统与某个表之间的所有通信都通过一个特定的对象进行。表数据网关封装了系统与特定数据库表之间的数据通信。\n\
    \n所有用于此通信的SQL语句都将在表数据网关类定义中声明。这有几个优点：一是我们知道在哪里编写SQL语句。相应地，我们也知道在哪里找到与特定数据库表相关的SQL语句。\n\
    \n如果作为PHP开发者的你将所有SQL封装在相对较少的类定义中，那么团队中的任何数据库专家只需处理这几个类。这比将SQL语句分散在整个代码库中具有巨大优势。始终记住，保持代码尽可能简洁清晰。这有助于减少逻辑编码错误。\n\
    \n# 编写`Blog_Entry_Table`类\n\n最初，我们需要能够插入从编辑器表单接收的新博客条目。我们可以为`blog_entry`表创建一个新的表网关类定义。\n\
    \n让我们在`models`文件夹中创建新的类定义，将其命名为`Blog_Entry_Table.class.php`。\n\n```php\n<?php\n\
    class Blog_Entry_Table {\n    private $db;\n\n    public function __construct($db)\
    \ {\n        $this->db = $db;\n    }\n\n    public function saveEntry($title,\
    \ $entry) {\n        // 注意SQL字符串中的占位符。? 是占位符\n        // 注意属性的顺序：先是title，然后是entry_text\n\
    \        $entrySQL = \"INSERT INTO blog_entry (title, entry_text) VALUES (?, ?)\"\
    ;\n        $entryStatement = $this->db->prepare($entrySQL);\n        \n      \
    \  // 创建一个包含动态数据的数组\n        // 顺序很重要：$title必须在前，$entry在后\n        $formData =\
    \ array($title, $entry);\n\n        try {\n            // 将$formData作为参数传递给execute\n\
    \            $entryStatement->execute($formData);\n        } catch (Exception\
    \ $e) {\n            $msg = \"You tried to run this sql: $entrySQL Exception:\
    \ $e\";\n            trigger_error($msg);\n        }\n    }\n}\n?>\n```\n\n`Blog_Entry_Table`在被其他脚本使用之前不会执行任何操作。`Blog_Entry_Table`有一个属性`db`和两个方法：构造函数和`saveEntry()`。构造函数接受一个`PDO`对象作为参数。接收到的`PDO`对象将存储在`db`属性中。这样，`Blog_Entry_Table`的所有方法都可以访问`PDO`对象并访问`simple_blog`数据库。\n\
    \n在面向对象的术语中，`Blog_Entry_Table`和`PDO`现在通过`has-a`关系关联。`Blog_Entry_Table`拥有一个`PDO`对象。\n\
    \n目前，我们只会保存新条目。因此，`Blog_Entry_Table`类除了构造函数外只有一个方法。`saveEntry()`方法接受两个参数：`title`和`blog_entry`。\n\
    \n代码使用了预处理语句将数据插入到表中。在创建投票应用程序时，我们没有直接将用户提供的任何信息插入到数据库中。但在博客中，我们希望保存标题和博客条目信息。\n\
    \n## 安全编程\n\n你可能在网上发现一些PHP和SQL代码直接将信息保存到数据库中。然而，这是一个主要的安全风险。黑客可以利用SQL注入破坏我们的数据库信息。简单来说，黑客可以篡改我们原本要创建、更改或删除信息的SQL语句。\n\
    \n> **注意**\n> \n> 有关SQL注入的更多信息，请访问[`http://en.wikipedia.org/wiki/SQL_injection`](http://en.wikipedia.org/wiki/SQL_injection)。\n\
    \n预处理语句还有一个积极作用，即允许用户将包含引号的信息传递到数据库中。预处理语句将所有输入视为不可执行的字符串，从而消除了这两个问题。\n\n使用预处理语句有三个同等重要的要求：\n\
    \n1.  在SQL字符串中使用`?`字符作为占位符。\n\n```php\n$entrySQL = \"INSERT INTO blog_entry (title,\
    \ entry_text) VALUES (?, ?)\";  // ? ? 用作占位符\n```\n\n2.  创建一个包含动态数据的数组。项目的顺序必须与SQL字符串中使用的顺序匹配。\n\
    \n```php\n// $formdata是一个包含动态数据的数组\n// 顺序很重要：$title必须在前，$entry在后\n$formData =\
    \ array($title, $entry);\n```\n\n3.  将包含动态数据的数组作为参数传递给`execute()`方法。\n\n```php\n\
    // 将$formData作为参数传递给execute\n$entryStatement->execute($formData);\n```\n\n当语句执行时，数组中的值将被插入到占位符所在的位置。插入的信息不会允许任何SQL注入。\n\
    \n```php\n} catch (Exception $e) {\n    $msg = \"You tried to run this sql: $entrySQL\
    \ Exception: $e\";\n    trigger_error($msg);\n}\n```\n\n如果发生异常，代码将触发一个错误，显示导致异常的SQL字符串以及对异常的更详细信息。在生产环境中，我们不想向用户显示所有这些信息，但这是一个帮助我们在开发过程中调试任何问题的好方法。\n\
    \n# 处理管理表单输入并保存条目\n\n创建了`Blog_Entry_Table`类后，我们可以继续开发。逻辑上的下一步是处理从编辑器表单接收的输入，并使用`Blog_Entry_Table`对象将新的博客条目保存到数据库中。让我们更新编辑器控制器。\n\
    \n```php\n<?php\n# newesteditor.php\n\ninclude_once \"models/Blog_Entry_Table.class.php\"\
    ;\n$entryTable = new Blog_Entry_Table($db);\n\nif (isset($_POST['buttonClicked']))\
    \ {\n    $buttonClicked = $_POST['buttonClicked'];\n\n    if ($buttonClicked ===\
    \ 'save') {\n        // 从编辑器表单获取标题和条目数据\n        $title = $_POST['title'];\n \
    \       $entry = $_POST['entry'];\n        // 保存新条目\n        $entryTable->saveEntry($title,\
    \ $entry);\n    }\n}\n\ninclude_once \"views/admin/insert-editor-html.php\";\n\
    ?>\n```\n\n```php\ninclude_once \"models/Blog_Entry_Table.class.php\";\n$entryTable\
    \ = new Blog_Entry_Table($db);\n```\n\n类被包含进来，数据库连接被传递到构造函数中。\n\n```php\nif ($buttonClicked\
    \ === 'save') {\n    // 从编辑器表单获取标题和条目数据\n    $title = $_POST['title'];\n    $entry\
    \ = $_POST['entry'];\n    // 保存新条目\n    $entryTable->saveEntry($title, $entry);\n\
    }\n```"
  raw: "Connecting to the Database\nWe have completed the basic editor view. Soon,\
    \ we will be able to\ninsert new blog entries into the `blog_entry` database\n\
    table through the editor form. To do that, we will need a database connection\
    \ \nfrom the application to the database.\n\nWe will take the same approach we\
    \ used for the poll: use PDO for making\na connection and include the connection\
    \ in the front controller to share\nit with subsequently loaded controllers.\n\
    \n```\ngetMessage();\n$pageData->setContent(\"Connection failed!$e\");\nexit();\n\
    }\n?>\nListing 7-11\ndatabase.php located in the models folder\n```\n\nWe can\
    \ use the `database.php` file\nlocated in the `models` folder of the\npoll program\
    \ from Chapter [6](#323857_3_En_6_Chapter.xhtml) to access our database. The only\n\
    change we need to make is to change the database to `simple_blog`. We will\nsoon\
    \ include it into our front controller.\n\nUsing Design Patterns\nA design pattern\n\
    \ is a general, best-practice solution to a common task. Some\ndesign patterns\
    \ are defined comprehensively. As your experience grows,\nyou will come across\
    \ more design patterns. As an absolute beginner, you\ndo not need a comprehensive\
    \ treatment of design patterns – that would\nlikely be more confusing than helpful.\n\
    This book uses simple implementations of a few design patterns. We\nhave already\
    \ seen a simple implementation of the *front controller\ndesign pattern* and an\
    \ equally simple implementation of MVC. It is\npossible to combine several design\
    \ patterns in the same project.\n\nNote\n\nFor more information on design patterns,\
    \ visit [`http://en.wikipedia.org/wiki/Software_design_pattern`](http://en.wikipedia.org/wiki/Software_design_pattern)\
    \ .\n\nThe Table Data Gateway Design Pattern\nThe *table data gateway* design\
    \ pattern is a relatively simple\ndesign pattern to understand. The table data\
    \ gateway pattern\n specifies that one PHP class be created for every one table\
    \ in a\ndatabase. The idea is that all communication between the system and the\n\
    one table happens through one specific object. The table data gateway\nencapsulates\
    \ data communication between the system and a specific\ndatabase table.\nAll SQL\
    \ statements for this communication will be declared in a table\ndata gateway\
    \ class definition. This has a couple of advantages: One is\nthat we know where\
    \ to write your SQL statements. Consequently, we also\nknow where to find our\
    \ SQL statements related to the particular database\ntable.\nIf you as a PHP developer\
    \ keep all your SQL encapsulated in\nrelatively few class definitions, then any\
    \ database expert on your team\nwill only have to work with these few classes.\
    \ That is a huge advantage\nover having your SQL statements scattered all through\
    \ your code base.\nAlways remember, keep your coding as clean and simple as possible.\
    \ This\nhelps to reduce logical coding errors.\n\nWriting the Entry_Table Class\n\
    Initially, we will need to be able to insert new blog entries\nreceived from the\
    \ editor form. We can create a new table gateway class\ndefinition for the `blog_entry`\
    \ table.\n\nLet us create the new class definition in the `models` folder; we\n\
    will call it `Blog_Entry_Table.class`\n  `.php`.\n\n```\ndb = $db;\n}\npublic\
    \ function saveEntry ( $title, $entry ) {\n//notice placeholders in SQL string.\
    \ ? is a placeholder\n//notice the order of attributes: first title, next entry_text\n\
    $entrySQL = \"INSERT INTO blog_entry ( title, entry_text )\nVALUES ( ?, ?)\";\n\
    $entryStatement = $this->db->prepare( $entrySQL );\n//create an array with dynamic\
    \ data\n//Order is important: $title must come first, $entry second\n$formData\
    \ = array( $title, $entry );\ntry{\n//pass $formData as argument to execute\n\
    $entryStatement->execute( $formData );\n} catch (Exception $e){\n$msg = \"You\
    \ tried to run this sql: $entrySQL\nException: $e\";\ntrigger_error($msg);\n}\n\
    }\n}\n?>\nListing 7-12\nBlog_Entry_Table.class.php\n```\n\nThe `Blog_Entry_Table`\
    \ will\nnot do anything until it is used from another script. The `Blog_Entry_Table`\
    \ has\none property `db`\nand two methods: the `constructor` and `saveEntry()`.\
    \ The\nconstructor takes a PDO object as argument. The received PDO object will\n\
    be stored in the `db` property. This\nway, all methods of `Blog_Entry_Table` will\n\
    have access to the PDO object and access to the `simple_blog`\ndatabase.\nIn object-oriented\
    \ terminology, `Blog_Entry_Table` and\nPDO are now associated through a `has-a`\
    \ relationship.\nThe `Blog_Entry_Table has-a` PDO object.\nAt this point, we will\
    \ only be saving new entries. So, the `Blog_Entry_Table`\nclass has just one method\
    \ besides the constructor. The `saveEntry()` method\ntakes two arguments: the\
    \ `title` and the `blog_entry`.\nThe code provided uses *prepared statements*\
    \ to insert data\ninto the table. When we created the poll application, we did\
    \ not\ndirectly insert any information the user provided into the database.\n\
    However, in our blog, we want to save the title and blog entry\ninformation.\n\
    \nSecure Programming\nYou might discover some PHP and SQL code on the Internet\
    \ that\ndirectly save information into a database. However, this is a major\n\
    security risk. A hacker can use *SQL Injection* to destroy our\ndatabase information.\
    \ Simply stated, the hacker can alter the SQL\nstatement we intended to create,\
    \ change, or delete information.\n\nNote\n\nFor more information on SQL injections,\
    \ visit [`http://en.wikipedia.org/wiki/SQL_injection`](http://en.wikipedia.org/wiki/SQL_injection)\
    \ .\n\nPrepared statements\n also have a positive side effect of allowing the\
    \ user to pass\ninformation containing quotes into the database. Prepared statements\n\
    treat all input as nonexecutable strings which eliminates both of these\nconcerns.\n\
    \nThere are three equally important requirements  for our\nuse of prepared statements:\n\
    \n1.  Characters are used as placeholders in the SQL string.\n\n```\n    $entrySQL\
    \ = \"INSERT INTO blog_entry ( title, entry_text )\n    VALUES ( ?, ?)\";  //\
    \ ? ? are used as placeholders\n    ```\n\n2.  An array is created with the dynamic\
    \ data. The order of items must match\n    the order used in the SQL string.\n\
    \n```\n    //$formdata is an array with dynamic data\n    //Order is important:\
    \ $title must come first, $entry second\n    $formData = array( $title, $entry\
    \ );\n    ```\n\n3.  The array with dynamic data is passed as an argument to the\
    \ `execute()` method.\n\n```\n    // pass $formData as argument to execute\n \
    \   $entryStatement->execute( $formData );\n    ```\n\nWhen the statement is executed,\
    \ the values in the array will be inserted\nwhere the placeholders existed. The\
    \ information inserted will not allow\nany SQL Injection.\n\n```\n} catch (Exception\
    \ $e){\n$msg = \"You tried to run this sql: $entrySQL\nException: $e\";\ntrigger_error($msg);\n\
    }\n```\n\nIn case an exception occurs, the code will trigger an error showing\n\
    the SQL string that caused the exception and a more detailed look at the\nexception.\
    \ In production, we do not want to display all this information\nto the user,\
    \ but it’s a good technique to help us debug any problems\ndoing development.\n\
    \nProcessing the Admin Form Input and Saving the\nEntry\n\nWith the `Blog_Entry_Table`\n\
    class created, we can continue development. A logical next step is to\nprocess\
    \ input \nreceived from the editor form and use a `Blog_Entry_Table`\nobject to\
    \ save a new blog entry in the database. Let us update our\neditor controller.\n\
    \n```\nsaveEntry( $title, $entry );\n}\n}\ninclude_once \"views/admin/insert-editor-html.php\"\
    ;\n?>\nListing 7-13\nnewesteditor.php\n```\n\n```\ninclude_once \"models/Blog_Entry_Table.class.php\"\
    ;\n$entryTable = new Blog_Entry_Table( $db );\n```\n\nThe class is included, and\
    \ the database connection is passed into the\nconstructor.\n\n```\nif ( $buttonClicked\
    \ === 'save' ) {\n//get title and entry data from editor form\n$title = $_POST['title'];\n\
    $entry = $_POST['entry'];\n//save the new entry\n$entryTable->saveEntry( $title,\
    \ $entry );\n}\n```"
