    [0] => banana


    [1] => apple


    [2] => orange


    )


    Array


    (


    [0] => apple


    [1] => orange


    )


    Recipe 4-8\. Slicing and Splicing Arrays


    Problem


    You need to get a section of an array or insert an array into the middle of another
    array.


    Solution


    There are two functions to handle these operations. The function array_slice()
    can be used to cut a portion of an array and assign it to a new array. The function
    array_splice() can be used to insert an array anywhere in another array.


    How it Works


    The array_slice() function takes two to four parameters. The first is the source
    array, the second is the offset. This is the number of elements to skip from the
    beginning of the array. The optional third parameter is the length of the slice
    or number of elements to copy. Finally the optional fourth element defines if
    the numerical array keys are going to be preserved. The default is false. The
    following example shows how a small section of two elements can be copied from
    a larger array. The example also demonstrates the difference between preserving
    the keys or not.


    <?php


    // 4_26.php


    $a = array(


    ''apple'',


    CHAPTER 4 ■ WORKING WITH ARRAYS


    ''orange'',


    ''banana'',


    ''animal'' => ''horse'',


    ''vechicle'' => ''truck''


    );


    print_r(array_slice($a, 2, 2));


    print_r(array_slice($a, 2, 2, true));


    The output looks like this:


    Array


    (


    [0] => banana


    [animal] => horse


    )


    Array


    (


    [2] => banana


    [animal] =>


    horse


    )


    It is a small difference but in the first part of the output the index from the
    banana is changed from 2 to 0


    and in the second part its position/key is preserved.


    The array_splice() function also takes four parameters. The first is the source
    array, the second is the offset, the third is a length, and the fourth is the
    array to inset. The function can be used in three distinct ways. The first is
    to remove a section of an array, the second is to insert a new array into the
    array, and the third is a combination of both of these things.


    This first parameter (the source array) is passed by reference. This causes the
    value of the array to be changed by the function. In addition the function will
    return an array with all the elements that were replaced.


    The second parameter can be positive or negative. If it''s positive the offset
    is counted from the beginning of the array and if it''s negative it''s counted
    from the end of the array.'
