    # 设置数据仪表盘


    *数据挖掘*和*数据收集*对于中型和大型企业都至关重要。快速分析数据的能力能对任何公司的利润产生重大影响。公司必须能够利用现有信息（如销售数据）来确定最佳策略，从而获得成功。数据可以从多种来源收集，包括内部、外部（竞争对手）、环境（某个地区经济状况）以及通过政府渠道。合并和对比这些信息的能力至关重要。


    Python 编程语言的流行，部分归因于该语言中可用于高效处理和显示数据的库的数量。然而，其他语言也可以使用一些技术来实现类似的目标。其中一个工具是 *Google
    Charts*。


    `Google Charts` 是专门设计用来与 HTML5 网页交互的 JavaScript 类。这为图表与 PHP 交互提供了天然的能力，因为 PHP、HTML
    和 JavaScript 协同工作得很好。图表从*数据表*（特殊类型的数组）中检索信息。因此，任何能够将数据显示到数组中的数据源都可以作为 `Google
    Chart` 的提供者。


    我们将构建一个*数据仪表盘*来显示我们的图表。数据仪表盘就是一个以多种格式显示数据的屏幕（网页）。Google 提供了超过 30 种不同类型的*图表*，可以放置在仪表盘中。为了演示使用不同数据源的能力，我们的示例将允许用户决定信息的来源。我们将通过允许从数据库表、*JSON
    文件*、*CSV 文件*或 *Microsoft Excel 工作表*中拉取数据来展示这一能力。然后，这些信息将在仪表盘内的多个图表中显示。


    在开始任务之前，让我们讨论一些流程。`Google Dashboard` 是使用 `google.visualization.Dashboard Classes`
    定义的。`Dashboard` 实例使用一个包含待显示数据的数据表，并将这些数据分发给属于该仪表盘的所有图表。*控件*为用户提供了与数据交互以及更改图表中使用数据子集的能力。这些控件是常见的组件，如选择器、滑块和自动完成器，用户可以轻松操作它们。


    现在我们大致了解了仪表盘中可以包含什么，让我们看看实现目标所需的步骤。


    - *HTML 仪表盘骨架*：我们将设计一个 HTML 框架，用于定位和容纳要在仪表盘中显示的图表。

    - *库文件*：我们必须加载两个 Google 库（一个 *Google AJAX API* 和一个 *Google Visualization Control
    Package*）来访问仪表盘和图表。

    - *数据*：我们将从多个来源检索数据，允许用户选择在仪表盘内显示结果时要使用的数据源。选定的数据将被放入一个二维数组中，该数组将被转换为`Google Data
    Table`，以便仪表盘内的图表轻松使用。

    - *仪表盘*：我们将使用 *Google Dashboard 类*，通过创建它的一个实例（对象）并传递一个对 HTML 中仪表盘位置（div 标签位置）的引用来实现。

    - *控件/图表*：我们将创建供用户操作的控件，以及将在仪表盘内显示数据的图表。

    - *依赖关系*：我们将把仪表盘和图表绑定在一起，当用户操作控件时，显示的数据会自动更新。

    - *显示仪表盘*：我们将绘制仪表盘并将数据传递给仪表盘，数据随后会在图表中显示。

    - *编程*：最后，我们将包含额外的编程代码，以便在用户操作控件时更新仪表盘内的图表。


    首先，我们需要开发能够检索信息的程序，这取决于用户选择的数据类型。请记住，成功开发程序的关键是不要重复造轮子。我们将使用一些现有的开源代码，使我们的程序尽可能可靠和简单。


    ## 收集 Microsoft Excel、CSV、JSON 和数据库数据


    本章附带的代码包含几个数据文件（`data.csv`、`data.json` 和 `datatest.xlsx`）。提供的 Excel 电子表格用于设计我们测试所用的数据格式和内容。CSV
    文件、JSON 文件和数据库表是通过提取电子表格数据并针对每种数据类型重新格式化而创建的。虽然这些程序不会在生产中使用，但它们为我们提供了如何从 Excel
    电子表格中检索信息并将其重新格式化为其他数据格式的示例。


    ```

    rows();

    $file = fopen("data.csv","w");

    foreach ($values as $value) {

    fputcsv($file, $value);

    }

    echo "data.csv created";

    fclose($file);

    } else {

    echo SimpleXLSX::parseError();

    }

    ?>

    清单 10-1

    createCSV.php

    ```


    使用 PHP 访问 Microsoft Excel 数据的一种流行方法是使用 GitHub 上提供的开源 *SimpleXLSX 类*：[`https://github.com/shuchkin/simplexlsx`](https://github.com/shuchkin/simplexlsx)。


    可以从提供的链接下载此类，并在解压缩后将其放置在 `ch10` 文件夹中。在网页位置和类本身的注释中都提供了代码示例。为方便起见，这些文件已包含在出版商网站的
    `ch10` 文件夹中。


    ```

    use Shuchkin\SimpleXLSX;

    ```


    该类包含一个*命名空间*（这将确保它不会与其他现有类冲突）。`use` 语句声明，所使用的任何类或函数都将通过命名空间（`Shuchkin`）和类名（`SimpleXLSX`）进行访问。


    ```

    require_once __DIR__.''/simplexlsx-master/src/SimpleXLSX.php'';

    ```


    `require_once` 语句包含了一个 PHP 常量 `__DIR__`，它返回当前目录位置。因此，该类是从当前目录下的 `simplexlsx_master`
    源代码（`src`）目录中导入的。


    ```

    if ( $xlsx = SimpleXLSX::parse(''testdata.xlsx'') ) {

    $values = $xlsx->rows();

    ```


    `SimpleXLSX` 类的 `parse()` 方法将从 Excel 电子表格中检索所有数据。这些数据包含的内容不仅仅是单元格中的值。由于我们只使用存储在单元格中的值，我们可以使用
    `SimpleXLSX` 函数 `rows()` 来检索所有行的数据。该函数创建一个仅包含数据的二维数组，我们将其命名为 `$values`。


    ```

    $file = fopen("data.csv","w");

    foreach ($values as $value) {

    fputcsv($file, $value);

    }

    echo "data.csv created";

    fclose($file);

    ```


    使用 PHP 函数 `fopen()`，我们可以创建一个新文件（`data.csv`）并声明我们要写入（`w`）该文件。`foreach` 循环现在将遍历
    `$values` 数组中的每个数据项。PHP 函数 `fputcsv()` 将以逗号分隔的格式将信息传递到文件中。最后，一旦所有信息都写入完毕，使用 `fclose()`
    关闭文件。我们仅用了几行代码就改变了数据的格式！


    **注意**


    访问 [`www.php.net/manual/en/function.fopen.php`](https://www.php.net/manual/en/function.fopen.php)
    获取关于 `fopen()` 的更多信息。访问 [`www.php.net/manual/en/function.fputcsv.php`](https://www.php.net/manual/en/function.fputcsv.php)
    获取关于 `fputcsv()` 的更多信息。


    ```

    rows());

    file_put_contents("data.json", $netJSON);

    echo "data.json created";

    } else {

    echo SimpleXLSX::parseError();

    }

    ?>

    清单 10-2

    createJSON.php

    ```


    ```

    $netJSON = json_encode($xlsx->rows());

    file_put_contents("data.json", $netJSON);

    ```

