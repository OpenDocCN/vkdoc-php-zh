    # 类的描述


    这种模式意味着 `Bravo` 类是基于 `Alpha` 类创建的。在 `Bravo` 类中，你只需要描述那些你想要追加到从 `Alpha` 类继承的成员中的成员。


    | 详细信息 |

    | --- |

    | 情况就好像 `Alpha` 类的所有公有成员和保护成员都在 `Bravo` 类中声明了一样。在 `Bravo` 类的主体中，你可以直接访问这些类成员。
    |


    列表 8-1 是一个创建并使用父类和子类的程序。


    ```

    number=$number;

    }

    }

    // 子类：

    class Bravo extends Alpha{

    // 字段：

    public $symbol;

    // 为字段赋值的函数：

    public function setSymbol($symbol){

    $this->symbol=$symbol;

    }

    // 为两个字段赋值的函数：

    public function setAll($symbol,$number){

    // 调用在父类中描述的函数：

    $this->setSymbol($symbol);

    // 调用继承来的函数：

    $this->setNumber($number);

    }

    // 显示字段的函数：

    public function show(){

    // 调用在父类中描述的函数：

    echo "字段 \$symbol: ",$this->symbol,"\n";

    // 调用继承来的函数：

    echo "字段 \$number: ",$this->number,"\n";

    }

    }

    // 创建对象：

    $obj=new Bravo;

    // 为字段赋值：

    $obj->setSymbol(''A'');

    $obj->setNumber(100);

    // 显示字段：

    $obj->show();

    // 为字段赋值：

    $obj->setAll(''B'',200);

    // 显示字段：

    $obj->show();

    ?>

    列表 8-1

    创建子类

    ```


    程序执行结果如下。


    ```

    程序输出（来自列表 8-1）

    字段 $symbol: A

    字段 $number: 100

    字段 $symbol: B

    字段 $number: 200

    ```


    该程序描述了两个类：`Alpha` 父类和基于 `Alpha` 父类创建的 `Bravo` 子类。`Alpha` 类具有公有的 `$number` 字段和一个用于给该字段赋值的公有单参数
    `setNumber()` 方法。由于 `Bravo` 子类是基于 `Alpha` 类创建的，因此 `Bravo` 类也拥有 `$number` 字段和 `setNumber()`
    方法，即便这些类成员并未在 `Bravo` 类中定义。它们是从 `Alpha` 类继承而来的。除了继承的成员之外，你还在 `Bravo` 类中显式声明了公有的
    `$symbol` 字段和三个公有方法。带一个参数的 `setSymbol()` 方法用于给 `$symbol` 字段赋值。`setAll()` 方法有两个参数，该方法为
    `$number` 和 `$symbol` 字段赋值。它包含调用 `setSymbol()` 和 `setNumber()` 方法的命令。`show()`
    方法没有参数。当调用该方法时，它会显示调用它的对象的 `$symbol` 和 `$number` 字段。


    > **注意**: 在子类的主体中，你可以像处理直接在子类中声明的字段和方法一样，来处理从父类继承的字段和方法。


    使用 `$obj=new Bravo` 命令创建基于 `Bravo` 类的 `$obj` 对象。


    > **注意**: 你不需要创建 `Alpha` 父类的对象，因为它没什么特别之处。它只是一个普通类的普通对象。


    首先，`$obj->setNumber(100)` 和 `$obj->setSymbol(''A'')` 命令为 `$obj` 对象的字段赋值。然后使用 `show()`
    方法检查字段。`$obj->setAll(200,''B'')` 命令是更改 `$obj` 对象字段的另一种方式。


    | 详细信息 |

    | --- |

    | 你也可以直接访问 `$obj` 的 `$number` 和 `$symbol` 字段。注意，成员必须是公有的才能在类外部访问。另外值得一提的是，有一种方法可以防止特定类被继承。在这种情况下，该类应该使用
    `final` 关键字声明。 |


    ## 覆盖方法


    由于继承，子类能够获得其父类的字段和方法，这非常方便。然而，在某些情况下，子类中继承的方法需要以与父类中实现方式不同的方式执行。换句话说，有时需要*覆盖*继承的方法。在子类中覆盖方法很容易。你只需要显式地声明它。列表
    8-2 展示了如何操作。


    ```

    number=$args[0];

    }

    // 显示字段的函数：

    public function show(){

    echo "类 Alpha\n";

    echo "字段 \$number: ",$this->number,"\n";

    }

    }

    // 子类：

    class Bravo extends Alpha{

    // 字段：

    public $symbol;

    // 覆盖为字段赋值的函数：

    public function set(...$args){

    parent::set($args[0]);

    $this->symbol=$args[1];

    }

    // 覆盖显示字段的函数：

    public function show(){

    echo "-----------------\n";

    parent::show();

    echo "类 Bravo\n";

    echo "字段 \$symbol: ",$this->symbol,"\n";

    }

    }

    // 父类的对象：

    $A=new Alpha;

    // 为字段赋值：

    $A->set(100);

    // 显示字段：

    $A->show();

    // 子类的对象：

    $B=new Bravo;

    // 为字段赋值：

    $B->set(200,''B'');

    // 显示字段：

    $B->show();

    ?>

    列表 8-2

    覆盖方法

    ```


    程序执行结果如下。


    ```

    程序输出（来自列表 8-2）

    类 Alpha

    字段 $number: 100


    类 Alpha

    字段 $number: 200

    类 Bravo

    字段 $symbol: B

    ```


    `Alpha` 父类拥有 `$number` 字段和两个你想要在子类中覆盖的公有方法 `set()` 和 `show()`。`show()` 方法没有参数。当调用该方法时，它会显示一条包含
    `Alpha` 类名称以及调用该方法的对象的 `$number` 字段的消息。`set()` 方法用于给 `$number` 字段赋值，它被描述为可以接受任意数量的参数（形式上，它使用前面带有省略号的
    `$args` 参数来描述）。要理解为什么这样做，需要考虑以下重要情况。在子类中覆盖方法时，该方法必须使用与父类中相同的参数进行声明。父类中的 `set()`
    方法为一个字段赋值。在子类中，使用该方法为两个字段赋值。因此，使用一个技巧：用任意数量的参数描述该方法，并且只使用需要的参数。在父类中，这是第一个参数，通过
    `$args[0]` 指令访问。在方法体中，通过 `$this->number=$args[0]` 命令将值赋给 `$number` 字段。


    > **PHP 8 标准**: 在 PHP 8 中，具有任意数量参数的方法可以覆盖具有固定数量参数的方法（需满足类型兼容性）。


