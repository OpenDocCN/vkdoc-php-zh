- fmt: '# A Scoring Ability


    A scoring ability must keep track of the number of checkers and be reduced each
    time a checker is removed from the board. A player wins when all the other opponents''
    checkers are removed. However, a player also wins when the opponent cannot make
    any other moves. This would require the program to look at all possible moves
    a player can accomplish. A technique to keep track of the number of wins for each
    player is needed.


    A technique to keep the wrong player from trying to move a piece when it is not
    their turn is necessary.


    Depending on the version of checkers, some versions do not allow checker pieces
    to jump kings. Some versions do not allow checker pieces to jump at all. The code
    shown does allow checker pieces to jump kings.


    A recursion technique is needed to allow multiple jumps in the same turn. Depending
    on the version of checkers, players may be required to jump if they can. This
    would require coding to determine all jumps after the player selects a piece to
    move.


    # Summary


    Another long chapter! We covered a lot. We now know we can use PHP to access many
    data types and to display dashboards and charts, via an open source class. We
    also began to look at the logic of game development, by using arrays to set up
    a checkers game. It''s time to depart from our adventure. We hope that you learned
    a lot and realize how much PHP can accomplish. We have barely skimmed the surface
    of possibilities. Keep up your learning process by working through free tutorials
    and viewing free videos on the Web. Good luck. You are on your way to becoming
    a great programmer!


    # Projects


    1.  Using the design practices (MVC) from this and previous chapters, complete
    the programming and design for the checker''s game. First test the example functions
    provided and link them together. Attack one part at a time, test the logic and
    code, then tackle the next part.


    2.  Update the Google Dashboard program to display the file type request. Then
    once it is selected, display it again, along with the next requirement for the
    user (either the database name or file name). Continue this process to display
    all the drop-down lists when the user has selected all requirements. Allow the
    user to change selections and redisplay the changes.


    3.  Investigate the ability for PHP to access other database types. Make changes
    to the Google Dashboard program to allow the user to select a type of database,
    and then select the databases available for the type selected. Continue the process
    to select the table and columns from the new database type(s).


