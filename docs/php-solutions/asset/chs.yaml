  \ 提升密码安全性\n\n尽管这种基于文件的用户认证方式足以限制网页访问权限，但所有密码都以明文形式存储。为了更高的安全性，建议对密码进行加密。多年来，一直推荐使用`MD5`或`SHA-1`算法将密码加密为\
  \ 32 位或 40 位的十六进制数。这些算法最初的优势——运算速度快——如今却成为了主要弱点。自动化脚本每秒可进行海量计算，通过暴力破解尝试所有可能的组合来推断原始值。\n\
  \nPHP 5.5 引入了一个更强大的密码加密和验证系统，使用两个函数：`password_hash()`和`password_verify()`。要加密密码，只需将其传递给`password_hash()`函数，如下所示：\n\
  \n```\n$encrypted = password_hash($password, PASSWORD_DEFAULT);\n```\n\n`password_hash()`的第二个参数是一个常量，它将加密方法的选择权交给\
  \ PHP，让你能够始终采用当前公认最安全的加密方法。\n\n**注意：** `password_hash()`函数为高级用户提供了其他选项。详情请参见[`http://php.net/manual/en/function.password-hash.php`](http://php.net/manual/en/function.password-hash.php)。关于安全密码哈希的常见问题（FAQ）页面位于[`http://php.net/manual/en/faq.passwords.php`](http://php.net/manual/en/faq.passwords.php)。\n\
  \n使用`password_hash()`执行的是单向加密。这意味着即使你的密码文件泄露，也没有人能破解出原始密码。这也意味着你无法将加密后的密码还原回原始值。从某个角度来看，这无关紧要：当用户登录时，`password_verify()`会将提交的值与加密版本进行比对。缺点是如果用户忘记密码，你无法向他们发送密码提醒；你必须生成一个新密码。尽管如此，出于安全考虑，加密是必要的。\n\
  \n### 在旧版 PHP 中启用密码哈希\n\n密码哈希函数在 PHP 5.5 之前的版本中不可用。不过，如果你的服务器运行的是 PHP 5.3.7 或更高版本，或者任何\
  \ PHP 5.4 版本，你可以通过`password_compat`库启用相同的功能。\n\n要检查`password_compat`是否能在你的 PHP 版本上运行，请从[`https://github.com/ircmaxell/password_compat`](https://github.com/ircmaxell/password_compat)下载`version-test.php`。如果输出结果为\"\
  Pass\"，则在脚本中包含`password.php`即可启用密码哈希函数。这是一个单个文件，可以从同一 URL 下的`lib`文件夹中下载。\n\n一旦包含了`password.php`，这些函数的工作原理与\
  \ PHP 5.5 及更高版本完全相同。\n\n加密并不能防范密码最常见的问题：密码过于简单或使用常见词汇。许多注册系统现在通过要求混合使用字母数字字符和符号来强制使用更强的密码。\n\
  \n为了改进目前开发的基本登录系统，你需要创建一个用户注册表单，用于检查以下内容：\n\n- 密码和用户名包含最少字符数\n- 密码符合最低强度标准，例如包含数字、大小写字母和符号的混合\n\
  - 密码与确认字段中的第二次输入一致\n- 用户名尚未被使用\n\n## PHP 解决方案 9-6：创建密码强度检查器\n\n本 PHP 解决方案演示如何创建一个类，用于检查密码是否满足特定要求，例如无空格、最少字符数以及不同类型字符的组合。默认情况下，该类仅检查密码是否无空格并包含最少字符数。可选方法允许你设置更严格的条件，例如使用大小写字母、数字以及非字母数字符号的组合。\n\
  \n本 PHP 解决方案从构建用户注册表单开始，该表单也将在 PHP 解决方案 9-7 中使用。\n\n在`sessions`文件夹中创建一个名为`register.php`的页面，并插入一个包含三个文本输入字段和一个提交按钮的表单。按以下截图中所示布局表单并命名输入元素。如果想节省时间，请使用`ch09`文件夹中的`register_01.php`。\n\
  \n![A978-1-4842-0635-5_9_Figh_HTML.jpg](img/A978-1-4842-0635-5_9_Figh_HTML.jpg)\n\
  \n与往常一样，你希望处理脚本仅在表单提交后运行，因此所有内容都需要封装在一个条件语句中，该语句检查提交按钮的`name`属性是否存在于`$_POST`数组中。然后你需要检查输入是否满足最低要求。在`DOCTYPE`声明上方的\
  \ PHP 代码块中插入以下代码：\n\n```\nif (isset($_POST['register'])) {\n    $username = trim($_POST['username']);\n\
  \    $password = trim($_POST['pwd']);\n    $retyped = trim($_POST['conf_pwd']);\n\
  \    require_once '../PhpSolutions/Authenticate/CheckPassword.php';\n}\n```\n\n\
  在`PhpSolutions`文件夹中创建一个名为`Authenticate`的新文件夹。然后在新文件夹内创建一个名为`CheckPassword.php`的文件。该文件仅包含\
  \ PHP 脚本，因此移除所有 HTML 并添加以下代码：\n\n- 条件语句内的代码将三个文本字段的输入传递给`trim()`以去除首尾空白，并将结果赋值给简单变量。接下来包含将包含密码检查类的文件，你将随后定义该类。\n\
  \n```\n<?php\nnamespace PhpSolutions\\Authenticate;\n\nclass CheckPassword {\n \
  \   protected $password;\n    protected $minimumChars;\n    protected $mixedCase\
  \ = false;\n    protected $minimumNumbers = 0;\n    protected $minimumSymbols =\
  \ 0;\n    protected $errors = [];\n\n    public function __construct($password,\
  \ $minimumChars = 8) {\n        $this->password = $password;\n        $this->minimumChars\
  \ = $minimumChars;\n    }\n\n    public function check() {\n        if (preg_match('/\\\
  s/', $this->password)) {\n            $this->errors[] = '密码不能包含空格。';\n        }\n\
  \        if (strlen($this->password) < $this->minimumChars) {\n            $this->errors[]\
  \ = \"密码长度必须至少为$this->minimumChars 个字符。\";\n        }\n        return $this->errors\
  \ ? false : true;\n    }\n\n    public function getErrors() {\n        return $this->errors;\n\
  \    }\n}\n```\n\n保存`CheckPassword.php`并切换到`register.php`。在`register.php`中，在开头的\
  \ PHP 标签后立即添加以下一行以导入`CheckPassword`类：\n\n\n\n"
- "# CheckPassword 类文档\n\n- 这定义了基本的`CheckPassword`类，它最初只检查密码是否包含空格以及是否具有所需的最少字符数。您很快就会添加其他功能。\n\
  - 该文件首先声明`PhpSolutions\\Authenticate`为其命名空间，然后定义具有六个受保护属性的`CheckPassword`类。前两个用于密码和最少的字符数。`$mixedCase`、`$minimumNumbers`和`$minimumSymbols`属性将用于增强密码强度，但最初设置为`false`或\
  \ 0。`$errors`属性将用于在密码未通过任何检查时存储错误消息数组。\n- 构造函数方法接受两个参数：密码和最少的字符数，并将它们分配给相关属性。默认情况下，最少字符数设置为\
  \ 8，这使得此参数可选。\n- `check()`方法包含两个条件语句。第一个使用`preg_match()`和一个正则表达式来搜索密码中的空白字符。第二个条件语句使用`strlen()`，它返回字符串的长度，并将结果与`$minimumChars`进行比较。\n\
