    \ $row['article_id']; ?>\">EDIT</a></td>\n<td><a href=\"blog_delete_mysqli.php?article_id=<?=\
    \ $row['article_id']; ?>\">DELETE</a></td>\n```\n\nWhat you’re doing here is adding\
