- fmt: "`&ResponseGroup=Request,SalesRank,Small,Images,OfferSummary` The new XML response\
    \ from Amazon.com includes more details about the Amazon.com item, as shown in\
    \ Figure 17-4.\n\n**Figure 17-4.** *The XML response of a Web Service request*\
    \  \nWe have just mixed five response groups: `Request`, `SalesRank`, `Small`,\
    \ `Images`, and `OfferSummary`. To learn more about the response groups, go to\
    \ `http://developer.amazonwebservices.com/connect/kbcategory.jspa?categoryID=5`,\
    \ and click the Latest Tech Docs button. Alternatively, you can click the Technical\
    \ Documentation link, and then click the link of the latest documentation version.\
    \ You can download the documentation in PDF format, or you can read it online\
    \ here: `http://docs.amazonwebservices.com/AWSEcommerceService/2006-09-13/`.\n\
    \nIn the ECS documentation, find the response groups details under the API Reference,\
    \ Response Groups section. Here’s the description for the five response groups\
    \ used in the previous example:\n\n- `Request` response group is a default response\
    \ group in every kind of operation, and it returns the list of name-value pairs\
    \ you used to make the request.\n- `SalesRank` response group returns data about\
    \ the current Amazon.com sales rank of the product.\n- `Small` response group\
    \ returns general item data (ASIN, item name, URL, and so on) about items included\
    \ in the response. This is a default response group for an `ItemLookup` operation\
    \ (like we have in this example).\n- `Images` response group gives you the addresses\
    \ for the three pictures (small, medium, and large) for each item in the response.\n\
    - `OfferSummary` response group returns price information for each item in the\
    \ response.\n\nLet’s continue by learning how to make a REST request from PHP.\
    \ To populate the future Amazon Super Hats department, you’ll search the Amazon.com\
    \ Apparel department for the \"super hats\" keywords. One trivial way is to use\
    \ the PHP `file_get_contents` function, as you can see in the following script.\n\
    \nTo test accessing Web Services using REST, create a new file named `test_rest.php`\
    \ in your `hatshop` directory, and write the following code in it:\n\n```php\n\
    <?php\n// Tell the browser it is going to receive an XML document.\nheader('Content-type:\
    \ text/xml');\n\n/* DON'T FORGET to replace the string '[Your Access Key ID]'\
    \ with your Access Key ID in the following line */\n$url = 'http://webservices.amazon.com/onca/xml?Service=AWSECommerceService'\
    \ .\n    '&AWSAccessKeyId=[Your Access Key ID]' .\n    '&Operation=ItemSearch'\
    \ .\n    '&Keywords=super+hats' .\n    '&SearchIndex=Apparel' .\n    '&ResponseGroup=Request,Medium';\n\
    \necho file_get_contents($url);\n?>\n```\n\n**Note:** Some PHP installations and\
    \ web hosting providers may not allow this code to run by default. In that case,\
    \ you can change this setting in `php.ini`:\n\n```\nallow_url_fopen = On\n```\n\
    \nAlternatively, you can add the following line to `include/config.php`. This\
    \ second solution is preferred because it only affects your application, and it\
    \ remains set if you need to move the application to another server.\n\n```\n\
    ini_set('allow_url_fopen', 'On');\n```\n\nLoading `http://localhost/hatshop/test_rest.php`\
    \ will show you XML data about Amazon’s Super Hats (see Figure 17-5).\n\n**Figure\
    \ 17-5.** *Super Hats from Amazon*\n\nTo exercise and build more XML links, just\
    \ study the examples in the \"API Reference\""
