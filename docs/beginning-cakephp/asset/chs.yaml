  \n### 在控制器和模型中创建投票动作\n\n清单 8-12 第 14-15 行引用的 `Vote` 动作尚不存在；让我们在 Comments 控制器中创建它。这个动作将相当简单：在\
  \ comments 表的 `votes` 字段中加 1 或减 1，并将总票数返回给视图。当然，这个动作将使用 `render()` 函数以 Ajax 模式渲染视图。\n\
  \n使用清单 8-13 将 `Vote` 动作添加到 Comments 控制器。\n\n**清单 8-13.** *Comments 控制器中的投票动作*\n\n\
  ```\n1\nfunction vote($type=null,$id=null) {\n  if ($id) {\n    $votes = $this->Comment->vote($type,$id);\n\
  \    $this->set(compact('votes'));\n    $this->render('votes','ajax');\n  }\n}\n\
  ```\n\n回想一下，CakePHP 的一个最佳实践是尽可能让模型比控制器“更胖”；也就是说，如果可能的话，应该将代码添加到模型而不是控制器。我在清单 8-13\
  \ 的第 3 行运用了这一原则，创建了自己的模型函数 `vote()`，并将清单 8-12 第 14-15 行 `$ajax->link()` 函数中提供的参数传递给它。此函数将完成所有与数据库相关的操作，以获取票数并更新评论的票数。它需要知道是投赞成票还是反对票，以及要更新哪条评论，这些信息已通过控制器变量\
  \ `$type` 和 `$id` 传递。\n\n清单 8-14 包含了模型函数 `vote()`，它将执行数据库操作以实现投票。将其添加到 Comment 模型中，放在其他属性和关联之后。\n\
  \n**清单 8-14.** *Comment 模型中的 `vote()` 模型函数*\n\n```\n1\nfunction vote($type=null,$id=null)\
  \ {\n  if (!$id) {\n    return \"-\";\n  } else {\n    $votes = $this->read(null,$id);\n\
  \    $votes = ($type == 'up' ? $votes['Comment']['votes']+1 : $votes➥\n['Comment']['votes']-1);\n\
  \    $this->id = $id;\n    $this->saveField('votes',$votes);\n    return $votes;\n\
  \  }\n11 }\n```\n\n清单 8-14 的第 5 行从数据库中提取指定评论 ID 的票数。第 6 行根据投票类型对总数进行加 1 或减 1。第 7-8\
  \ 行使用 `saveField()` 函数将结果保存到数据库。此函数允许你仅更新行中的一个字段（或列），而无需为更常见的 `save()` 函数格式化整个 `$this->data`\
  \ 数组。当然，你需要告诉模型要更新哪条记录，这在第 7 行通过设置 `id` 属性完成。最后，在第 9 行，新的总数被返回给控制器以在视图中显示。\n\n###\
  \ 创建 Votes 视图\n\n最后一步是创建视图，供控制器动作在清单 8-13 的第 5 行渲染。这非常简单：它只需要在 Posts 视图中使用的同一个 `<div>`\
  \ 元素内显示传递的值。清单 8-15 包含了 `app/views/comments/votes.ctp` 文件的代码。\n\n**清单 8-15.** *使用\
  \ Votes 视图显示新的总数*\n\n```\n<div class=\"vote\"><?=$votes;?></div>\n```\n\n继续刷新 Posts\
  \ 视图，并点击 Ajax 链接对评论进行投票。总票数应在后台自动更改，无需重新加载页面，而且这一切都没有通过提交表单实现，如图 8-4 所示。使用 `$ajax->link()`\
  \ 函数可以轻松地执行类似的异步任务，这种方式通常对用户来说更简单、更有趣。而且它肯定比手动编写所有实现此功能的 JavaScript 要好。\n\n![Image\
  \ 40](img/index-151_1.png)\n\n**图 8-4.** *评论部分的 Ajax 投票现在可以工作了。*\n\n### 使用 Ajax\
  \ 助手做更多事情\n\n你还只是触及了 Ajax 助手所开启可能性的表面。如表 8-1 所示，Ajax 助手包含的功能远不止 `form()`、`submit()`\
  \ 和 `link()` 函数。诚然，这些函数很有用，因为它们允许你讨论在 Cake 应用程序中使用 Ajax 的主要概念。那么，使用带有动画框架的 Ajax\
  \ 呢？或者构建花哨的 Web 2.0 功能，比如拖放式购物车或调整 HTML 元素大小的滑块工具？在考虑如何将 Ajax 引入你的 Cake 应用程序时，请记住这些基本步骤。\n\
  \n**将 JavaScript 与选项数组一起传递**\n\n在各种助手函数中查找选项数组，即使在非 Ajax 助手中引入更复杂或定制化的 JavaScript\
  \ 函数时也是如此。通过使用此数组，你可以将 JavaScript 函数传递给你希望与更复杂的 Ajax 方法一起工作的助手所渲染的 HTML 元素。例如，如果我想编写自己的\
  \ JavaScript 函数，我可以像这样使用选项数组调用该函数：\n\n```\n$form->input('OK',array('type'=>'button','onSubmit'=>'alert(\\\
  'Hello World\\');'));\n```\n\n我不仅传递了参数来说明助手应渲染哪种类型的表单输入字段（在本例中是一个 HTML 按钮），还通过指定\
  \ HTML 属性 `onSubmit` 并赋予其值，将 JavaScript 的 `alert()` 函数分配给了该元素。\n\n\n\n使用 `options`\
  \ 数组通常比直接使用原始 HTML 更有效。通常，这些辅助函数能提供统一的链接系统或显示机制，从而减少维护应用程序一致性带来的麻烦。此外，习惯辅助函数字符串的视觉和流程后，观感上会更美观，尤其是当你更偏爱\
  \ PHP 语法而非 HTML 标记时。坚持使用辅助函数（即使是自定义的 JavaScript 和 Ajax 调用）最重要的原因，可能是为了防止你的应用程序变成“胶带拼凑体”。换句话说，你在\
  \ Cake 框架中工作，而该框架足够强大，可以减少你的代码量。开发者们常常为了正确处理复杂流程，而满足于使用权宜之计或已被弃用的方法。不要忽视 Cake 辅助函数对你开发流程的贡献。你会发现，它们提供的功能远超你的预期，能帮你攻克难关。\n\
  \n### Prototype 还是 jQuery\n\n近几个月来，jQuery 框架在流行度和功能性上都有了显著提升。\n\n许多 Cake 开发者一直呼吁\
  \ Cake 围绕这个框架而非 Prototype 进行重写。在撰写本文时，有传言称 jQuery 最终将取代 `Ajax` 辅助函数中的 Prototype。无论情况如何，`Ajax`\
  \ 辅助函数注定会以相同的方式继续工作；你可能只需要在 `app/webroot/js` 文件夹中安装一个不同的库即可。\n\n无论 Cake 未来方向如何，这两个框架都提供了一些每个认真的\
  \ Ajax 开发者都需要考虑的重要特性。再次强调，你可以通过在各种辅助函数中使用 `options` 数组来调用它们的功能。例如，使用 jQuery 的表单插件，我可以使用\
  \ `Form` 辅助函数上传文件：\n\n```\n<?=$form->button('Upload',array('onClick'=>'$(\\'#storyEditForm\\\
  ').ajaxSubmit({\ntarget: \\'#storyTextUpload\\',url: \" .$html->url('/stories/text').'\\\
  '}); return\nfalse;'));?>\n```\n\n这个函数显然比这里展示的要复杂得多，但此示例确实说明了如何将 jQuery 函数分配给 `$form->button()`\
  \ 函数中的 `onClick` 事件。只要我的控制器在 Ajax 模式下使用 `render()` 函数，Cake 就能像往常一样通过 MVC 结构运行其逻辑，同时还能使用\
  \ `Ajax` 辅助函数之外的 Ajax 库。\n\n### 使用 jQuery 上传文件\n\n我们不可能探索 Cake 中所有可用的 Ajax 方法。然而，Web\
  \ 应用程序最常见的需求之一是某种文件上传。这个任务可能相当繁琐，尤其是当你想要使用 Ajax 管理文件上传时。由于序列化 HTML 表单的方式，许多 Ajax\
  \ 框架不支持文件输入元素。JavaScript 无法将文件内容放入字符串中，而这正是许多框架提交表单数据的方式。幸运的是，jQuery 的 Form 插件可以处理文件上传，使得将上传功能与\
  \ Ajax 集成成为可能。\n\n由于 jQuery 目前不是默认 `Ajax` 辅助函数的一部分，为你的博客添加文件上传功能将演示如何将非 Prototype\
  \ 框架集成到 Cake 中。\n\n#### 安装 jQuery 和 Form 插件\n\n请记住，你必须手动安装需要调用的 JavaScript 库。下载最新版本的\
  \ jQuery 以及 Form 插件。以下链接应能帮助你找到这些文件：\n\n*   jQuery：[`docs.jquery.com/Downloading_jQuery`](http://docs.jquery.com/Downloading_jQuery)\n\
  *   Form 插件：[`jqueryjs.googlecode.com/svn/trunk/plugins/form/`](http://jqueryjs.googlecode.com/svn/trunk/plugins/form)\
  \ `jquery.form.js`\n\n接下来，你必须将必要的文件放入 `app/webroot/js` 目录，并让它们在默认布局中可用。麻烦在于，jQuery\
  \ 可能会与你用来提供评论投票和提交功能的 Prototype 发生冲突，所以让我们在默认布局中添加一些逻辑，以检测当前正在运行的是 `Posts Add` 操作还是其他操作。\n\
  \n\n\n打开默认布局文件（`app/views/layouts/default.ctp`），并将引用 Prototype 的 JavaScript 辅助函数行替换为以下代码：\n\
  \n```php\n<?=($this->params['controller'] == 'posts' && $this->params['action']\
  \ == 'add' ? $javascript->link(array('jquery.js','jquery.form.js')) : $javascript->link('prototype'));?>\n\
  ```\n\n现在，当执行“Posts Add”操作时，jQuery 将被初始化，而不是 Prototype。但 Prototype 仍将是所有其他操作的默认脚本，从而避免与评论区冲突。\n\
  \n### 创建 Posts Add 操作\n\n假设博客作者已在纯文本文件中写好了一篇文章，并希望将其上传到博客。让我们创建一个文件上传机制，该机制可以分析纯文本文件，并将其内容插入到“Posts\
  \ Add”操作的“Content”字段中，从而简化新文章的创建过程。\n\n打开`app/views/posts/add.ctp`文件（该文件应该已经通过烘焙生成），并将其内容替换为列表\
  \ 8-16。\n\n**列表 8-16.** *添加操作中的文件上传功能*\n\n```php\n<div class=\"posts form\">\n<?=$form->create('Post',array('name'=>'postAddForm','id'=>'postAddForm','type'=>'file'));?>\n\
  <fieldset>\n<legend>Add Post</legend>\n<?=$form->input('name');?>\n<?=$form->input('date');?>\n\
  <?=$form->input('content');?>\n<div id=\"postTextUpload\">\n<?=$form->input('content',\
  \ array('label'=>'Content ','rows'=>'15','cols'=>'75'));?>\n<?=$form->input('upload_text',array('label'=>'Upload\
  \ Text File ','type'=>'file'));?>\n<?=$form->button('Upload Text',array('onClick'=>'$(\\\
  '#postAddForm\\').ajaxSubmit({target: \\'#postTextUpload\\', url: \\\"'.$html->url('/posts/text').'\\\
  '});return false;'));?>\n</div>\n<?=$form->input('User');?>\n<?=$form->input('Tag',array('type'=>'select','multiple'=>'checkbox'));?>\n\
  </fieldset>\n<?=$form->end('Submit');?>\n</div>\n```\n\n列表 8-15 的第 2 行将表单的 ID 设置为`postAddForm`，jQuery\
  \ 将需要此 ID 来收集表单数据。此行还将`type`属性设置为`file`，以便表单包含`enctype=\"multipart/form-data\"`属性，确保表单提交正常工作。\n\
  \n请注意，我从第 8 行开始，用一个`<div>`元素包裹了“Content”字段，这样在文件上传后，我可以用已填充内容的字段替换当前字段。\n\n第 10\
  \ 行包含了实际的文件输入字段。使用 Form 辅助函数时，只需指定`input`的`type`等于`file`，即可渲染一个文件输入字段。\n\n第 11 行是所有\
  \ Ajax 发生的地方。通过将`onClick`属性设置为一个包含所有必要代码的 jQuery 格式字符串，Form 辅助函数将能够渲染一个按钮，该按钮包含通过\
  \ jQuery 执行 Ajax 方法所需的 JavaScript。此语法遵循 jQuery Form 插件中使用的表单提交方法。\n\n### 创建 Posts\
  \ Controller Text 操作\n\n当用户选择了文件并点击“Upload Text”按钮时，jQuery 会将整个表单提交到 Posts 控制器中的`text`操作，这得益于你在`onClick`事件中编写的\
  \ URL 参数。\n\n因此，在`app/controllers/posts_controller.php`文件中，你需要包含列表 8-17 中所示的函数。\n\
  \n**列表 8-17.** *Posts 控制器中的 Text 操作*\n\n```php\nfunction text() {\n    if (!$this->data['Post']['upload_text'])\
  \ {\n        $this->set('error','You must select a text (.txt) file before you can\
  \ upload.');\n        $this->render('text','ajax');\n    } else {\n        App::import('Core','File');\n\
  \        $file =& new File($this->data['Post']['upload_text']['tmp_name']);\n  \
  \      if ($this->data['Post']['upload_text']['type'] != 'text/plain') {\n     \
  \       $this->set('error','You may only upload text (.txt) files.');\n        \
  \    $this->render('text','ajax');\n        } else {\n            $data = h($file->read());\n\
  \            $file->close();\n            $this->set('text',$data);\n          \
  \  $this->render('text','ajax');\n        }\n    }\n}\n```\n\n列表 8-17 的第 2 行检查`upload_file`字段中是否有任何内容。文件上传仍然会被\
  \ Cake 自动解析，这比使用 PHP 的`$_FILES`数组更安全。\n\n为了简化文件处理，Cake 核心包含了一系列`File`类函数。但是，要在控制器中使用这些函数，由于它们不是组件类、辅助函数或其他\
  \ Cake 元素，你必须实例化一个新的`File`类；这在第 6 行通过`App::import()`函数完成。在第 7 行，`File`实用程序被赋值给`$file`作为一个类对象；现在，在整个操作中，`$file`对象将为你提供\
  \ Cake 的核心`File`函数。此外，`$file`对象将代表上传的文件本身，因此当你需要操作上传时，将数据保存到服务器会容易得多。\n\n第 8 行检查文件是否为正确的\
  \ MIME 类型（纯文本文件为“text/plain”）。第 12-15 行处理文件本身。现在，在此操作中，你只需要检索文件的内容，并将其在“Contents”字段中提供。因此，第\
  \ 12 行读取文件并将内容放入`$data`变量。第 13 行关闭文件，第 14-15 行使`$data`变量在`app/views/posts/text.ctp`视图文件中可用。第\
  \ 15 行负责以 Ajax 模式渲染视图，从而避免触发 Cake 的同步渲染引擎。\n\n剩下的工作就是用一个新的、已填充内容的字段替换“Content”字段；这在“Text”视图文件中完成，你尚未创建该文件。\n\
  \n### 编写 Text 视图\n\n创建`app/views/posts/text.ctp`文件，并将列表 8-18 粘贴到其中。\n\n**列表 8-18.**\
  \ *Text 视图文件*\n\n```php\n<? if (!empty($error)): ?>\n<p><?=$error;?></p>\n<?=$form->input('Post.content',\
  \ array('label'=>'Content','rows'=>'15','cols'=>'75'));?>\n<? else: ?>\n<p>Upload\
  \ successful</p>\n<?=$form->input('Post.content',array('label'=>'Current Text ','value'=>$text,'rows'=>'15','cols'=>'75'));?>\n\
  <? endif;?>\n<?=$form->input('Post.upload_text',array('label'=>'Upload Text File\
  \ ', 'type'=>'file'));?>\n<?=$form->button('Upload Text',array('onClick'=>'$(\\\
  '#postAddForm\\').ajaxSubmit({target: \\'#postTextUpload\\',url: \\\"'.$html->url('/posts/text').'\\\
  \"}); return false;'));?>\n```\n\n列表 8-16 模仿了“Posts Add”视图，只是它添加了一个错误检查（并显示错误消息），并将文件上传内容（从控制器中的`$text`数组获得）提供给“Content”字段。\n\
  \n现在，你应该能够上传纯文本文件的内容，并使其在“Add”操作中立即可用，而无需重新加载页面。得益于 jQuery 及其 Form 插件，你可以通过 Ajax\
  \ 实现这一点。不幸的是，Ajax 辅助函数尚不支持 jQuery 函数或文件上传，因此你必须在`onClick`属性中提供 JavaScript 函数来实现此功能。\n\
  \n### 更多 Ajax 功能\n\nAjax 的世界在不断扩展。一些开源项目已经将以前昂贵或复杂的库提供给了大众。随着 Ajax 方法的不断改进，你可以放心，Cake\
  \ 的架构将始终对 Ajax 保持开放，并允许将这些方法引入你的 Cake 应用程序中。将`onClick`和其他 DOM 事件硬编码到代码中，无疑扩展了 Cake\
  \ 应用程序的能力，但通过练习使用其他 Ajax 辅助函数，你可以用 Cake 处理大多数常见的 Ajax 流程。\n\n### 总结\n\n在本章中，我们讨论了\
  \ Cake 如何通过其内置的 Ajax 辅助函数简化 Ajax 方法。\n\n\n\n# 辅助函数\n\n在前面的章节中，你利用 Cake 内置的一些辅助函数显著提升并加速了典型\
  \ Web 应用某些流程的开发。借助 Ajax 辅助函数，你为博客评论的提交和投票流程增添了一些视觉效果。Form 辅助函数简化了数据处理和表单提交，而 HTML\
  \ 辅助函数则减少了你在视图中手写的标记量，并管理整个网站的链接以防止断裂。在本章中，你将深入探索内置辅助函数，甚至亲手构建几个自己的辅助函数。首先，我会简要讨论如何安装辅助函数。\n\
  \n### 安装辅助函数\n\n你之前已经使用过一些内置辅助函数，并通过在控制器或 App 控制器的 `var $helpers` 数组中输入它们的名称使其对应用可用。当安装第三方辅助函数或创建自己的辅助函数时，必须按照以下步骤确保其正常工作：\n\
  \n1.  每个辅助函数文件都应放在 `app/views/helpers` 目录下。\n2.  在 App 控制器或可能调用该辅助函数的特定控制器的 `var\
  \ $helpers` 数组中包含该辅助函数的类名。\n3.  在视图中使用辅助函数时，请确保正确调用辅助函数的类对象（即使用 `$ajax` 变量调用 Ajax\
  \ 辅助函数对象）。不要在视图中创建可能与可用辅助函数对象冲突的局部变量。\n\n在第 8 章中，你创建了 App 控制器文件，使一些辅助函数对整个应用可用。当应用中大部分控制器都使用一组辅助函数时，这通常是一种良好实践，因为这样可以在一处使用一行代码，而不必在不同位置逐一列出辅助函数的包含语句。你可能会问，为什么默认不在\
  \ App 控制器中包含所有内置辅助函数，从而省去这个额外步骤呢？答案是，这样做会损害应用的加载性能。更好的做法是使用 App 控制器来指定所有或大多数控制器最常用的辅助函数，而不是从一开始就包含所有函数，拖慢应用速度。\n\
  \n例如，如果应用中只有一个控制器使用 Time 辅助函数，那么最好仅在该控制器中包含此辅助函数。像 HTML、Form 和 Ajax 这样的辅助函数最好在 App\
  \ 控制器中调用，因为它们在整个应用中通用。当在 App 控制器中调用一个辅助函数时，该辅助函数对象会被创建并加载到服务器内存中，供应用执行的每个动作使用。如果为整个站点调用过多的辅助函数，内存消耗会迅速增加。\n\
  \n由于 PHP 代码在每次被访问时都需要解析和编译，因此任何能减少代码量的措施都有助于提升网站性能。只在需要的地方使用代码，也有助于问题排查。在 App 控制器中包含过多的辅助函数会加剧服务器负载，并可能需要调整\
  \ PHP 设置或使用 PHP 运行时加速器。\n\n### 使用 Cake 的内置辅助函数\n\nCake 最具吸引力的特性之一就是其丰富的辅助函数集合。诸如渲染\
  \ RSS 源、管理表单提交、截断和高亮文本以及执行 Ajax 方法等任务，都因辅助函数而得以简化。Cake 提供了大量针对 Web 的函数，可以为你节省大量时间，避免头疼；了解\
  \ Cake 内置辅助函数提供了哪些功能，是构建高级 Cake 应用的关键。\n\n> **注意** 为了避免用冗长的解释性表格充斥本章，我选择采用更接近“词典”的方式来解释辅助函数及其功能。每个函数都有一组自己的参数，通过在视图中填充这些参数来调用。每个参数之间用逗号分隔，并在方括号内注明参数指定的数据类型。在每个描述下方，我列出了每个参数的默认值。将参数留空，或在其位置输入\
  \ `null`，意味着函数执行时将使用该参数的默认值。\n\n#### 是否要解释每个辅助函数？\n\n本章很快就会变得非常乏味。列出所有可能的辅助函数会形成一个非常长的列表，而且或多或少会将本章变成\
  \ API 文档。（如果你想要 API 文档，那么完全可以查看 Cake 的在线 API [在 `http://api.cakephp.org`](http://api.cakephp.org)。它保持更新，并包含每个函数对应源码的资源链接。）我将详细解释这些函数，而不是重印\
  \ API 文档。事实是，某些辅助函数使用频率如此之高，以至于对大多数开发者来说，忽略对 Cake 内置辅助函数的详细考察会阻碍你真正利用 Cake 所提供功能的进步。因此，我将仅详细讲解\
  \ HTML 和 Form 辅助函数，因为即使是最基本的 Cake 应用，它们对于任何操作都是必不可少的。\n\n不要害怕自己尝试这些函数；大多数时候，它们非常直接，而且由于它们不操作你的数据库，你无法对应用造成永久性损害。通常你使用的辅助函数越多，节省的时间就越多，所以值得练习。Cake\
  \ 新手开发人员常犯的一个错误是，不了解辅助函数，因此他们转而构建自己的过程或自定义辅助函数来执行那些已经在辅助函数中标准化的任务。（我当然也犯过这个错误——我曾写过一整个控制台脚本来自动化构建视图，后来才意识到\
  \ Cake 自带了 Bake！）\n\n接下来让我们进入 HTML 和 Form 辅助函数。由于你之前已经使用过它们，所以应该已经熟悉了；但它们提供的功能远不止到目前为止提到的那些。\n\
  \n#### 使用 HTML 辅助函数\n\n\n\n你一定已经使用过 HTML 辅助器，这或许是最容易掌握的一个。使用 HTML 辅助器有以下优势：\n\n\
  - 通常，坚持使用辅助器可以减少在视图中必须输入的 HTML 标记数量。\n- 通过向辅助器传递变量，可以动态管理 HTML 输出，而无需手动操作。你不必再为那些\
  \ HTML 辅助器已提供的常见任务编写自己的方法。\n- 我是否过分强调了管理链接的优势？让我再说一遍：这个辅助器能让你免于在更改域名、更改 URL 方案或迁移到不同托管商时，逐一排查并测试所有可能存在的链接失效问题而引发的头痛。这一点再怎么强调也不为过——尤其是对新手网页开发者而言，最大的挑战之一就是让应用具备可移植性。\n\
  - 对某些用户来说，阅读 PHP 比阅读 HTML 更容易。至少，那些偏爱 PHP 语法胜过 HTML 标记的人会发现，HTML 辅助器是编写视图的更好方法。\n\
  \n在视图中，通过使用 `$html` 对象来调用 HTML 辅助器。它是 Cake 应用中默认包含的两个辅助器之一，无需在控制器中使用 `var $helpers`\
  \ 数组声明。然而，一旦你在应用中添加了更多辅助器，最好在 `var $helpers` 数组中明确写出 HTML 辅助器；这样，无论未来应用运行在哪个 Cake\
  \ 版本上，该辅助器都能被正确调用。一个更详细的 `$helpers` 属性也能确保项目中的其他开发者明确知道视图中使用了哪些辅助器。\n\n> **注意**：HTML\
  \ 辅助器在 `var $helpers` 数组中的指定方式与其他所有辅助器一样，需要使用首字母大写的驼峰式写法。这意味着使用 `var $helpers =\
  \ array('HTML');`（全大写）将无法正常工作；必须像这样使用 `Html`：`var $helpers = array('Html');`。\n\n\
  在接下来的章节中，我将介绍大部分 HTML 辅助器函数及其用法。当你在应用中有机会使用它们时，请务必保持代码的一致性；你当然可以直接手写 HTML，但这可能会绕开使用\
  \ HTML 辅助器的一些优势。\n\n---\n\n### `charset`\n\n该函数用于输出 HTML `<meta>` 标签，指定页面的字符集。通常，该函数在布局文件中使用。\n\
  \n**`charset( charset[string])`**\n\n- `charset` = null：要在 `<meta>` 标签中使用的字符集\n\n\
  例如，以下代码：\n\n```\n<?=$html->charset('UTF-16');?>\n```\n\n将输出：\n\n```\n<meta http-equiv=\"\
  Content-Type\" content=\"text/html; charset=UTF-16\"/>\n```\n\n默认字符集可以在 `app/config/core.php`\
  \ 文件中指定。请按照标准的 HTML 字符集规范，更改第 47 行附近的 `App.encoding` 设置。（供参考：已注册字符集值的列表可从万维网联盟 [www.w3.org/International/O-charset-lang.html](http://www.w3.org/International/O-charset-lang.html)\
  \ 获取。）`App.encoding` 的值默认设置为 `UTF-8`。\n\n---\n\n### `css`\n\n该函数用于输出引入样式表的标签。通常，CSS\
  \ 文件存储在 `app/webroot/css` 目录下，并通过本节描述的 `css` 函数来引用。根据参数中指定的值，该函数会返回一个 `<link>` 或\
  \ `<style>` 标签。\n\n**`css( path[mixed], rel[string], attributes[array], inline[bool])`**\n\
  \n- `path`：样式表的名称（不包含 `.css` 扩展名），或者一个包含 `app/webroot/css` 目录下多个样式表名称的数组。\n- `rel`\
  \ = `'stylesheet'`：`rel` 属性；如果设置为 `import`，则该函数将返回 `<style>` 标签中的 `@import` 链接，而不是\
  \ `<link rel='stylesheet'>` 标签。\n- `attributes`：包含要添加到 `<link>` 或 `<style>` 标签中的任何\
  \ HTML 属性；以键值对形式组织，键为属性名，值为要赋给该属性的值。\n\n\n\n`inline = true`: 如果设置为`false`，结果将被放置在页面的`<head>`元素中；否则，函数将输出内联内容。\n\
  \n使用`attributes`数组，你可以为打印或屏幕输出指定样式表，如下所示：\n\n`<?=$html->css('cake.generic.print',null,array('media'=>'print'));?>`\n\
  \n或者这样：\n\n`<?=$html->css('cake.generic.screen',null,array('media'=>'screen'));?>`\n\
  \n可以通过在`path`参数中传入数组来调用多个样式表：\n\n`<?=$html->css(array('reset','type','layout'));?>`\n\
  \n`CSS`函数通常用于布局中，但也可以在单个视图文件中调用。\n\n### `div`\n\n此函数返回一个格式化的`<div>`标签。其用法相当直接和基础，因为`<div>`标签旨在作为\
  \ HTML 样式和布局的包装器，或作为 JavaScript 操作的占位符。\n\n**`div( class[string], text[string],\
  \ attributes[array], escape[bool] )`**\n\n- `class` = null: 标签的`class`属性名称。\n- `text`\
  \ = null: 显示在`<div>`元素内部的文本。\n- `attributes`: 包含要包含在标签中的任何 HTML 属性；以属性名称为键，属性值为值的数组形式组织。\n\
  - `escape` = false: 如果设置为`true`，`text`参数的内容将进行 HTML 转义。\n\n假设我想创建一个独特设计的标签或页面元素，以`<div>`元素显示。`$html->div()`函数可以这样使用：\n\
  \n`<?=$html->div('tab','Home');?>`\n\n输出如下：\n\n```html\n<div class=\"tab\">Home</div>\n\
  ```\n\n如果传递的变量包含了`<div>`标签的内容，我可以使用比纯 HTML 标记稍少的代码来轻松显示该变量。`div()`函数如下所示：\n\n`<?=$html->div('story',$story['Story']['contents']);?>`\n\
  \n它比以下代码少用了几个字符：\n\n`<div class=\"story\"><?=$story['Story']['contents'];?></div>`\n\
  \n此函数通常用作显示`<div>`标签的便捷包装器，并允许你坚持使用 PHP 而不是 HTML（如果你愿意）。\n\n### `docType`\n\n与`$html->charset()`函数类似，此函数主要用在布局中，以避免输入冗长的符合标准的\
  \ HTML 文档类型字符串。\n\n**`docType( type[string] )`**\n\n- `type` = 'xhtml-strict': 要用于`docType`声明的文档类型。有关可在`type`参数中使用的可能文档类型，请参见表\
  \ 9-1。\n\n**表 9-1.** *可与 `$html->docType()` 函数一起使用的可能文档类型*\n\n| 参数值           |\
  \ 文档类型                 |\n|------------------|--------------------------|\n| `html4-strict`\
  \   | HTML 4.0 Strict          |\n| `html4-trans`    | HTML 4.0 Transitional   \
  \ |\n| `html4-frame`    | HTML 4.0 Frameset        |\n| `xhtml-strict`   | XHTML\
  \ 1.0 Strict         |\n| `xhtml-trans`    | XHTML 1.0 Transitional   |\n| `xhtml-frame`\
  \    | XHTML 1.0 Frameset       |\n| `xhtml11`        | XHTML 1.1              \
  \  |\n\n通过在布局文件中输入以下内容：\n\n`<?=$html->docType('xhtml-strict');?>`\n\n文档类型声明将生成为以下字符串：\n\
  \n```html\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\" \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
  >\n```\n\n### `image`\n\n管理图像对于复杂的网站来说可能是一项繁琐的任务。`$html->image()`函数通过简化图像标签的渲染和使用标准化的内部路径方案来引用文件，从而帮助进行图形管理。此函数动态输出一个`<img>`标签。\n\
  \n**`image( path[string], attributes[array] )`**\n\n- `path`: 图像文件的路径\n- `attributes`:\
  \ 一个键值对数组，对应于要包含在`<img>`标签中的 HTML 属性\n\n图像文件的路径可以通过以下三种方式之一构建。首先，如果只输入文件名，此函数将自动输出相对于`app/webroot/img`目录的路径。例如，要显示文件`app/webroot/img/title.jpg`，只需在`path`参数中输入文件名`title.jpg`即可。\n\
  \n`<?=$html->image('title.jpg');?>`\n\n\n\n第 9 章 ■ 辅助函数\n\n**143**\n\n其次，如果输入一个外部图片文件的完整链接，`$html->image()`\
  \ 函数将直接引用该文件，而不进行任何路径处理。例如，位于 `www.mydomain.com/images/title.jpg` 的图片可以通过以下方式调用此函数：\n\
  \n```php\n<?=$html->image('www.mydomain.com/images/title.jpg');?>\n```\n\n最后，路径可以通过以斜杠开头，使其相对于\
  \ `app/webroot` 目录：\n\n```php\n<?=$html->image('/img/gallery/title.jpg');?>\n```\n\
  \n与其他辅助函数类似，可以通过属性数组向此函数传递 HTML 属性。例如，以下代码：\n\n```php\n<?=$html->image('title.jpg',array('alt'=>'我的主页','class'=>'title'));?>\n\
  ```\n\n会输出以下内容：\n\n```html\n<img src=\"/blog/img/title.jpg\" alt=\"我的主页\" class=\"\
  title\" />\n```\n\n## link\n\n使用 `$html->link()` 函数有助于维护一致的链接，同时也是通用 `<a>` 标签的便捷封装。此函数输出一个\
  \ `<a>` 锚点标签。\n\n`link( 标题[string], 链接地址[mixed], 属性[array], 确认消息[string], 转义标题[bool]\
  \ )`\n\n- **标题**：要链接的内容；可以包含 HTML 标签，但必须将 `escapeTitle` 参数设置为 false 才能正确显示。\n- **链接地址**\
  \ = null：如果是数组，则会使链接指向控制器和动作；如果是相对于 Cake 的路径，则会被解析为内部链接；如果是绝对 URL，则会原样传递。\n- **属性**：用于传递要包含在标签中的\
  \ HTML 属性的参数。\n- **确认消息** = false：设置后，该消息将显示在 JavaScript 警告对话框中；如果用户继续操作，则激活链接。\n\
  - **转义标题** = true：默认情况下，任何符号都会被转义以符合 HTML 规范；当设置为 false 时，`title` 中提供的字符串将按原样传递。\n\
  \n此函数相当简单：提供要链接的内容，并告诉 Cake 在点击时将用户发送到哪里。我在展示如何烘焙一些视图时，已经讨论过如何使用 `$html->link()`\
  \ 函数创建基本的内联链接。这些链接非常简单——将字符串 \"添加一篇文章\" 链接到 Posts 的添加动作，可以使用以下代码：\n\n```php\n<?=$html->link('添加一篇文章','/posts/add');?>\n\
  ```\n\n09775ch09final 7/1/08 9:49 PM Page 144\n\n**144**\n\n第 9 章 ■ 辅助函数\n\n但你也可以使用另一种方法来生成相同的链接，即在\
  \ `url` 参数中输入一个数组，如下所示：\n\n```php\n<?=$html->link('添加一篇文章',array('controller'=>'posts','action'=>'add'));?>\n\
  ```\n\n当然，在 `url` 参数中输入绝对 URL 会将用户引导到站外：\n\n```php\n<?=$html->link('查看面包房','http://bakery.cakephp.org');?>\n\
  ```\n\n你可以通过在 `confirmMessage` 参数中输入字符串，来包含一个显示为 JavaScript 警告对话框的确认消息。例如，假设你想在从数据库中删除记录之前提醒用户。你可以通过在\
  \ `$html->link()` 函数中输入确认消息来实现：\n\n```php\n<?=$html->link('删除','/posts/delete/'.$post['Post']['id'],null,'您确定要删除这篇文章吗？');?>\n\
  ```\n\n当点击时，会弹出一个对话框询问用户 \"您确定要删除这篇文章吗？\" 如果用户点击 \"继续\"，那么链接将被激活。\n\n你可以通过将 `escapeTitle`\
  \ 参数设置为 false，在此函数中包含 HTML 标签。甚至其他输出 HTML 的辅助函数也可以包含在 `title` 参数中，如下所示：\n\n```php\n\
  <?=$html->link($html->image('title.jpg'),'/',null,null,false);?>\n```\n\n## meta\n\
  \n`$html->meta()` 输出 `<meta>` 标签，可用于指定网站描述或其他 `<meta>` 标签。它还可以输出用于 RSS 源和网站图标的 `<link>`\
  \ 标签。\n\n`meta( 类型[string], 链接地址[mixed], 属性[array], 内联[bool] )`\n\n- **类型** = null：要生成的\
  \ `<meta>` 标签的类型；可以设置为任何字符串，但也提供了一些内置字符串（`rss`、`atom`、`icon`、`keywords` 和 `description`）。\n\
  \n\n\n### 排版后的文本\n\n#### `$html->nestedList()`\n\n`$html->nestedList()` 将一个数组显示为嵌套列表，这在调试时非常有用。\n\
  \n##### 参数说明\n\n**`nestedList( list[array], attributes[array], itemAttributes[array],\
  \ tag[string] )`**\n\n- `list`: 要列表化的元素\n- `attributes`: 传递给列表标签的 HTML 属性\n- `itemAttributes\
  \ = null`: 传递给单个项（`<li>`）标签的 HTML 属性\n- `tag = 'ul'`: 要使用的列表标签类型，有序或无序列表（通过输入`ol`或`ul`对应`<ol>`或`<ul>`标签）\n\
  \n##### 行为描述\n\n对于传入`list`参数中的每个数组和嵌套数组，都会调用一个新的列表标签（例如，对于无序列表，会返回一个新的`<ul>`标签，其内容为用`<li>`标签解析的嵌套数组）。数组可以包含任意多的层级。\n\
  \n例如，假设`$posts`变量包含以下数组内容：\n\n```php\n$posts = array(\n    'Post 1'=>array(\n  \
  \      'Jan 1, 2008',\n        'No Author'),\n    'Post 2'=>array(\n        'Jan\
  \ 2, 2008',\n        'Administrator')\n);\n```\n\n##### 示例输出\n\n将上述数组放入`$html->nestedList()`函数的`list`参数中，将返回以下\
  \ HTML：\n\n```html\n<ul>\n<li>Post 1\n    <ul>\n    <li>Jan 1, 2008</li>\n    <li>No\
  \ Author</li>\n    </ul>\n</li>\n<li>Post 2\n    <ul>\n    <li>Jan 2, 2008</li>\n\
  \    <li>Administrator</li>\n    </ul>\n</li>\n</ul>\n```\n\n##### 适用场景\n\n该函数与通过`find('list')`或`generateList()`模型函数从数据库拉取的列表配合使用效果良好。\n\
  \n---\n\n#### `$html->para()`\n\n简单来说，这是一个用于在文本块外包裹段落标签（`<p>`）的便捷函数。它有助于简化可能包含非字母数字字符的内容的\
  \ HTML 转义。\n\n##### 参数说明\n\n**`para( class[string], text[string], attributes[array],\
  \ escape[bool] )`**\n\n- `class`: `<p>`标签的 CSS 类名\n- `text`: 出现在`<p>`元素内部的内容\n-\
  \ `attributes`: 要传递并在标签中显示的 HTML 属性\n- `escape = false`: 设置为`true`时，内容将被 HTML 转义\n\
  \n##### 示例\n\n以下测试字符串：\n\n```php\n<?=$html->para(null,'This is a test for the $html->para()\
  \ function',null,true);?>\n```\n\n通过`$html->para()`函数运行后将返回：\n\n```html\n<p>This\
  \ is a test for the $html-&gt;para() function</p>\n```\n\n---\n\n#### `$html->style()`\n\
  \n`$html->style()`函数是一个便捷封装器，用于将样式插入到 HTML 元素中。例如，某个特定元素可能需要使用`style`属性为其分配一些内联样式。此函数允许您在\
  \ PHP 中指定这些样式，而不是在 CSS 中。\n\n##### 参数说明\n\n**`style( data[array], inline[bool] )`**\n\
  \n- `data`: 以数组形式组织的 CSS 设置\n- `inline = true`: 如果设置为`false`，每个 CSS 元素将由硬回车分隔；如果为`true`，CSS\
  \ 将作为一个字符串返回。\n\n##### 应用示例\n\nCake 应用可能使用数据库来管理 CSS 样式。CSS 表的模型可以获取样式并将其作为数组提供给视图使用。为了简化对这个数组的解析，`$html->style()`函数可以节省一些时间。假设我有一些\
  \ CSS 存储为如下数组：\n\n```php\n$styles = array(\n    'p_bold'=>array(\n        'font-size'=>'1.0\
  \ em',\n        'font-weight'=>'bold'\n    ),\n    'p_italic'=>array(\n        'font-style'=>'italic'\n\
  \    )\n);\n```\n\n\n\n然后，通过使用 `$html->styles()` 函数，我只需一个函数就能减少这些样式的获取。结合 `$html->para()`\
  \ 函数，并假设视图中可以使用 `$styles` 变量，注意 `styles()` 函数如何便捷地处理动态 CSS：\n\n```php\n<?=$html->para(null,'段落文本',array('style'=>$html->styles($styles['p_bold'])));?>\n\
  ```\n\n此行将返回以下 HTML：\n\n```html\n<p style=\"font-size:1.0em; font-weight:bold\"\
  >段落文本</p>\n```\n\n该函数还可以简化通过数据库驱动样式的元素循环。\n\n只需按照前面的示例确保样式数组中的键格式正确即可。\n\n#### `tableHeaders`\
  \ 和 `tableCells`\n\n这些函数用于显示表格。此外，表格显示的常见功能是交替行。\n\n`$html->tableCells()` 函数可以自动将\
  \ CSS 类或 HTML 属性附加到奇数行和偶数行，而不是构建用于交替表格行的 PHP 公式。与其他便捷封装类似，`$html->tableHeaders()`\
  \ 和 `$html->tableCells()` 函数使在 HTML 中显示动态内容的管理变得更加容易。\n\n**`tableHeaders( names[数组],\
  \ trAttributes[数组], thAttributes[数组] )`**\n\n- `names`：表格列名的数组\n- `trAttributes\
  \ = null`：要传递给 `<tr>` 标签的 HTML 属性\n- `thAttributes = null`：要传递给 `<th>` 标签的 HTML\
  \ 属性\n\n**`tableCells( data[数组], oddTrAttributes[数组], evenTrAttributes[数组], useCount[布尔值]\
  \ )`**\n\n- `data`：以行和列排列的表格数据数组\n- `oddTrAttributes = null`：要传递给奇数行的 HTML 属性\n\
  - `evenTrAttributes = null`：要传递给偶数行的 HTML 属性\n- `useCount = false`：如果为 true，则将类名\
  \ `column-` 加上行号添加到 `<tr>` 元素\n\n`$html->tableHeaders()` 函数仅渲染表格内的标题行。请务必手动以 HTML\
  \ 形式输入 `<table>` 元素标签，并将这些表格函数包含在此元素内。返回的 HTML 包含 `<th>` 和 `<tr>` 标签，因此要向其传递 HTML\
  \ 属性，请分别使用 `trAttributes` 和 `thAttributes` 参数。以下代码行：\n\n```php\n<?=$html->tableHeaders(array('1','2'),array('class'=>'row'),array('class'=>'header'));?>\n\
  ```\n\n将返回以下内容：\n\n```html\n<tr class=\"row\"><th class=\"header\">1</th> <th class=\"\
  header\">2</th></tr>\n```\n\n`$html->tableHeaders()` 函数的 `names` 数组仅由名称本身格式化，不含任何嵌套数组。但是，`$html->tableCells()`\
  \ 函数的 `data` 数组必须包含按每行列组织的嵌套数组。例如，以下数组是为在 `$html->tableCells()` 函数中使用而格式化的：\n\n\
  ```php\n$cells = array(\n    'row1'=>array(\n        '列 1','列 2','列 3'\n    ),\n\
  \    'row2'=>array(\n        '列 1','列 2','列 3'\n    )\n);\n```\n\n行键中包含的实际文本（例如\
  \ `row1` 和 `row2`）不会在 HTML 输出中显示：\n\n```html\n<tr>\n    <td>列 1</td>\n    <td>列\
  \ 2</td>\n    <td>列 3</td>\n</tr>\n<tr>\n    <td>列 1</td>\n    <td>列 2</td>\n  \
  \  <td>列 3</td>\n</tr>\n```\n\n#### `addCrumb` 和 `getCrumbs`\n\n`$html->addCrumb()`\
  \ 和 `$html->getCrumbs()` 函数用于渲染面包屑导航（例如，首页->关于->邮寄地址）。这些函数管理一个面包屑数组，并使其在每个视图中可用。`$html->addCrumb()`\
  \ 函数向面包屑数组添加一个链接，`$html->getCrumbs()` 函数则获取并显示该数组。\n\n**`addCrumb( 名称[字符串], 链接[混合类型],\
  \ 属性[数组] )`**\n\n- `name`：要显示的文本\n- `link = null`：可以以数组形式键值（例如，`array('controller'=>'posts','action'=>'add')`）或以字符串形式输入（例如，`'/posts/add'`）；如果留空，则文本周围不会渲染链接\n\
  - `attributes`：要传递给面包屑的 `<a>` 标签的 HTML 属性\n\n例如，使用此函数将网站首页添加到面包屑数组中非常简单。\n\n\n\n\
  <?=$html->addCrumb('首页','/');?>\n\n要显示面包屑导航，您必须使用`$html->getCrumbs()`函数。\n\n`$html->getCrumbs()`函数存在一些参数，用于更好地控制这些链接的渲染方式。\n\
  \n**`getCrumbs( separator[string], startText[string] )`**\n\n- `separator` = `'&raquo;'`:\
  \ 当存在多个面包屑时，显示在它们之间的文本。\n- `startText` = `false`: 面包屑轨迹中的第一个面包屑；如果设置为`false`，则数组中的第一个面包屑将首先显示。\n\
  \n如果您想显示在前一个`$html->addCrumb()`函数示例中添加到面包屑数组的主页链接，您可以像这样使用`$html->getCrumbs()`：\n\
  \n`<?=$html->getCrumbs();?>`\n\n当 Cake 应用命名为 `blog` 时，这将渲染以下内容：\n\n`<a href=\"/blog/\"\
  >首页</a>`\n\n当然，该链接会根据应用的特定服务器设置而改变。\n\n**在默认布局中使用 HTML 助手**\n\n目前，您的博客应用在其默认布局中并未大量使用\
  \ HTML 助手。\n\n为了充分利用这些函数，让我们改造默认布局以包含更多函数。\n\n在`app/views/default.ctp`中，将其内容替换为清单\
  \ 9-1。\n\n**清单 9-1.** *在默认布局中使用 HTML 助手*\n\n```\n<?=$html->docType('xhtml-strict');?>\n\
  <head>\n<title>广泛博客</title>\n<?=$html->charset('UTF-8');?>\n<?=$html->meta('图标');?>\n\
  <?=$html->css('cake.generic');?>\n<?=($this->params['controller'] == 'posts' &&\
  \ $this->params['action'] == 'add' ? $javascript->link(array('jquery.js')) : $javascript->link('prototype'));?>\n\
  </head>\n<body>\n<?=$html->div(null,$session->flash().$html->div(null,$content_for_layout,array('id'=>'内容')),array('id'=>'容器'));?>\n\
  </body>\n</html>\n```\n\n在默认布局中找到使用 HTML 助手的方法，使您能够用 PHP 替换大量 HTML。通过使用`$html->docType()`和`$html->charset()`函数，您已经绕过了所有符合标准的声明编码，同时使布局能够适应未来可能的标准变更。此外，`$html->div()`函数允许您将布局内容包裹在与`app/webroot/css/cake.generic.css`样式表匹配的`<div>`标签中，并将其缩减为一行代码。\n\
  \n在各个视图中，您可以重复此过程，并寻找使用 HTML 助手来替换手工编码标记为 PHP 的方法。\n\n**使用表单助手**\n\n就像 HTML 助手对于简化视图中\
  \ HTML 标记的使用至关重要一样，表单助手对于表单处理也是不可或缺的。事实上，避免使用这个助手可能需要比学习其功能更多的精力。\n\n在详细检查表单助手函数之前，有几个要点需要解释。首先，某些函数旨在显示已处理表单的结果。从某种意义上说，这些函数充当一种接收器，在页面中并非立即可见。其他函数则负责格式化数据并将其发送给模型使用。接收器和供应函数都必须遵循模型命名约定才能正常工作。例如，`模型.字段名`用于告诉`$form->input()`函数将用户输入数据存储在数据库中的哪个字段和哪个表中。每当在函数中调用字段参数或字段数组时，请务必正确命名这些字段。为确保助手能够将数据发送到正确的模型，请包含驼峰式命名的模型名称，后跟一个句点，再后跟字段名称：\n\
  \n`<?=$form->error('Post.content');?>`\n\n当您确定控制器不会与多个模型发生冲突时，通常可以只指定字段的名称：\n\n\
  `<?=$form->error('内容');?>`\n\n■**注意** 较早版本的 Cake 遵循此约定，使用 HTML 助手指定模型和字段时使用斜杠代替句点，例如\
  \ `Model/fieldname`。如果您确实遇到较早的 Cake 应用程序，请务必将正斜杠替换为句点，以与 Cake 1.2 保持一致。请使用表单助手（而非\
  \ HTML 助手）来渲染所有表单元素。\n\n其次，大多数表单元素将以相同的方式使用 `options` 或 `attributes` 参数。由于表单元素在\
  \ JavaScript、Ajax 和其他交互功能方面可能比其他 HTML 元素更复杂，因此它们可能需要传递更具体的选项。您可以通过正确键控 `options`\
  \ 或 `attributes` 数组，完全自定义要在表单元素中传递的 HTML 属性。确保键与属性名称匹配，其值包含正确的值。以下代码行：\n\n`<?=$form->submit('提交',array('onSubmit'=>'return\
  \ false;'));?>`\n\n将返回一个包含 `onSubmit` 属性的提交按钮，如下所示：\n\n`<input type=\"submit\" value=\"\
  提交\" onSubmit=\"return false;\" />`\n\n任何属性都可以通过 `options` 和 `attributes` 数组传递。\n\
  \n■**注意** 由于大多数表单助手函数的 `options` 和 `attributes` 参数基本一致，我将不为每个函数详细描述它们。在特定选项或属性影响函数输出的地方，我会在描述中强调该选项。\n\
  \n记住这些要点，让我们来看看表单助手的主要函数。它们中的大多数只有在包含在`<form>`元素内时才能正常工作，该元素通常使用下面列出的`$form->create()`函数创建。\n\
  \n**`create`**\n\n`$form->create()`函数简化了`<form>`标签的渲染。此函数还管理 `action` HTML 属性，并将表单指向正确的模型。\n\
  \n**`create( model[string], options[array] )`**\n\n- `model` = `null`: 表单数据应发送到的模型。\n\
  - `options`: 除了 HTML 属性外，此数组还可以包含一些特定选项——`type`、`action`、`url` 和 `default`。\n\n\
  当为控制器和模型要处理的新表单创建时，此函数确保`<form>`标签指向正确的 URL 并适当发送数据。例如，您可以通过在 `options` 数组中指定 `type`\
  \ 选项来选择 `post` 或 `get` 方法来处理用户数据。或者，对于处理文件上传的表单，通过将 `type` 选项指定为 `file`，必要的 `enctype`\
  \ 属性会自动正确格式化。`model` 参数确保表单数据被发送到适当的模型，而无需担心 URL 或其他应用程序路径。可能的表单类型包括 `delete`、`file`、`get`、`post`\
  \ 和 `put`。\n\n当您需要指定提交表单时要调用的操作时，只需将 `action` 选项设置为该操作的 Cake 相对路径。此操作必须在当前控制器中才能正常工作。\n\
  \n要将表单发送到当前控制器之外的操作，请使用 `url` 选项。这可以是一个指定控制器和操作的数组，也可以是指向该操作的 Cake 相对路径。\n\n要抑制表单的默认行为，请将\
  \ `default` 选项设置为 `false`。当设置为 `false` 时，`default` 选项会告知表单不要提交。这可以允许进行 Ajax 处理或对表单数据进行其他自定义行为。默认情况下，`default`\
  \ 选项设置为 `true`，这意味着表单将像正常的 HTTP 请求一样运行。\n\n如果我要添加一个将数据提交到另一个模型的表单，我可以像这样使用`$form->create()`函数进行设置：\n\
  \n`<?=$form->create('Post',array('url'=>'/tags/add'));?>`\n\n在这个例子中，此表单的提交将被发送到\
  \ `Tags` 控制器的 `添加` 操作。通常，表单只包含当前模型的名称。需要注意的一点是，您可以通过 `options` 参数传递 HTML 属性。\n\n\
  \n\n`<?=$form->create('Post',array('id'=>'add','class'=>'form'));?>` 结束\n\n然而，`$form->end()`函数可以方便地将提交按钮（通常是表单中最后一个显示的元素）和结束标签`</form>`合并为一个字符串。\n\
  \n**`end( options[mixed] )`**\n\n`options`：当作为字符串输入时，此参数将渲染为提交按钮的值；如果作为数组，则向提交元素传递\
  \ HTML 属性。\n\n如果使用`options`数组来传递 HTML 属性，请使用`label`选项来设置提交按钮的值：\n\n`<?=$form->end(array('label'=>'Submit\
  \ Form','id'=>'submit_btn'));?>`\n此行将返回以下输出：\n\n`<input type=\"submit\" value=\"\
  Submit Form\" id=\"submit_btn\" />`\n\n`</form>`\n\n与`$form->create()`函数配合使用时，此函数用于闭合表单；一个最基本的表单可以简化为两行代码：\n\
  \n`<?=$form->create('Post');?>`\n\n`<?=$form->end('Submit');?>`\n\n**secure**\n\n\
  为了防止跨站请求伪造（CSRF）攻击，许多开发者使用哈希插入技术。简而言之，`$form->secure()`函数通过生成一个包含基于表单中其他字段的哈希值的隐藏表单字段，来辅助哈希插入。\n\
  \n**`secure( fields[array] )`**\n\n`fields`：用于生成哈希值的字段列表\n\n`fields`参数是函数正确运行所必需的。在格式化数组时，请确保按模型和字段名称进行排列：\n\
  \n`<?=$form->secure(array('Post'=>array('id','name'));?>`\n\n这将输出包含服务器端生成哈希值的隐藏输入元素：\n\
  \n```\n<fieldset style=\"display:none;\">\n<input type=\"hidden\" name=\"data[_Token][fields]\"\
  \ value=\"1932368593ef664fc975581e➥\n92e2df1490401570\" id=\"TokenFields1314770757\"\
  \ />\n</fieldset>\n```\n\n隐藏输入元素的值将根据`app/config/core.php`文件中设置的`Security.salt`值以及函数自身的随机化算法而变化。该哈希值可以在`$this->data`数组中的`['_Token']['fields']`键下获取。\n\
  \n**label**\n\n此函数渲染一个`<label>`元素并将其包裹在指定的输入字段周围。`$form->input()`函数在渲染输入字段时会自动调用此函数（可以在该函数的选项中禁用）。\n\
  \n**`label( field[string], text[string], attributes[array] )`**\n\n*   `field`：要包裹`<label>`HTML\
  \ 元素的字段\n*   `text = null`：标签的文本\n\n要更改标签的类名或提供其他 HTML 属性设置，只需在`attributes`数组中输入这些自定义设置：\n\
  \n`<?=$form->input('Post.name','Title of Post',array('class'=>'post_label'));?>`\n\
  \n**input**\n\n**`input( field[string], options[array] )`**\n\n也许没有其他辅助函数能像`$form->input()`函数这样多功能。此工具既可以用于接收数据，也可以用于发送数据；在接收数据时，它会在表单元素中显示其内容；在发送数据时，它会处理所有表单字段和命名约定，以便控制器和模型能够自动解析用户的数据。每个表单输入元素也由该函数渲染。当数据验证错误或消息被发送回视图时，该函数也会渲染这些消息并高亮显示该字段（如果需要）。坚持使用此函数，许多典型的表单结构可以被简化为更少的代码（通常只有一行）。\n\
  \n**自动魔法**\n\n对于输入的字段，`$form->input()`函数会解释该字段，并根据找到的数据类型自动渲染表单元素。大多数情况下，尤其是在简单表单中，只需要字段名称：\n\
  \n`<?=$form->input('content');?>`\n\n在这个例子中，函数会识别出数据库表中的匹配字段是一个文本字段，因此会渲染一个`<textarea>`元素及其与模型配合所需的必要参数。表\
  \ 9-2 展示了`$form->input()`函数如何检查数据库字段类型以及它将返回什么给浏览器。\n\n**表 9-2.** `$form->input()`\
  \ 函数对数据库字段结构的自动魔法响应\n\n| 字段类型                    | 返回                          \
  \      |\n| --------------------------- | ----------------------------------- |\n\
  | Boolean                     | 复选框输入元素                      |\n| Date         \
  \               | 日、月、年选择菜单                  |\n| Datetime                    |\
  \ 日、月、年、小时、分钟和子午线选择菜单 |\n| String (例如 `varchar`)     | 文本框输入元素                 \
  \     |\n| Text                        | 文本域元素                          |\n| Time\
  \                        | 小时、分钟和子午线选择菜单          |\n| Timestamp               \
  \    | 日、月、年、小时、分钟和子午线选择菜单 |\n| Tinyint(1)                  | 复选框              \
  \                |\n| 名为 `password`, `passwd`, 或 `psword` 的字符串或文本字段 | 密码框      \
  \                        |\n\n通过遵循表 9-2，您可以构建能被 Form 辅助器自动识别的数据库结构。将字段类型设为`tinyint`并赋予其长度为\
  \ 1，将免去您告诉`$form->input()`函数该字段是布尔值且应渲染为复选框的麻烦。当然，如果应用程序的特殊需求要求其他行为，您也可以指定具体细节。例如，假设您希望在不更改数据库结构的情况下强制用户提交字符串而不是段落文本。您需要添加一些选项来覆盖`$form->input()`函数的自动魔法行为。\n\
  \n**Type 选项**\n\n`type`选项允许您显式选择表单元素的类型。例如，您可以显示一个文本框而不是`<textarea>`：\n\n`<?=$form->input('content',array('type'=>'text'));?>`\n\
  \n要回到`<textarea>`元素，您可以在`type`选项中输入它（或者让默认行为为您执行此操作）：\n\n`<?=$form->input('content',array('type'=>'textarea'));?>`\n\
  \n表 9-3 列出了可与`type`参数一起使用的选项。当这些选项别名化另一个 Form 辅助函数时，该函数的相同选项可以在`$form->input()`函数的`options`数组中使用，并产生相同的效果。\n\
  \n**表 9-3.** 可在`options`数组的`type`参数中使用的选项\n\n| 选项       | 描述                   \
  \                                      |\n| ---------- | ------------------------------------------------------------\
  \ |\n| checkbox   | `$form->checkbox()`函数的别名                                  |\n\
  | date       | 渲染按月份、日和年顺序排列的选择菜单                         |\n| datetime   | `$form->dateTime()`函数的别名\
  \                                  |\n| file       | `$form->file()`函数的别名      \
  \                                |\n| hidden     | `$form->hidden()`函数的别名      \
  \                              |\n| password   | `$form->password()`函数的别名      \
  \                            |\n| radio      | `$form->radio()`函数的别名           \
  \                          |\n| select     | `$form->select()`函数的别名            \
  \                        |\n| text       | `$form->text()`函数的别名                \
  \                      |\n| textarea   | `$form->textarea()`函数的别名              \
  \                    |\n| time       | 渲染按小时、分钟和子午线顺序排列的选择菜单                   |\n\
  \n**其他选项**\n\n大量其他选项允许实现更多自定义和功能。根据函数的上下文，许多这些选项可以在其他表单输入元素函数中使用。表 9-4 列出了这些选项以及它们如何被使用的一般描述。\n\
  \n**表 9-4.** 在许多 Form 辅助函数的`options`参数中使用的选项\n\n| 选项               | 描述        \
  \                                                 |\n| ------------------ | ------------------------------------------------------------\
  \ |\n| before[string]     | 注入到函数输出中的标记；位于标签元素之前。                   |\n| between[string]\
  \    | 注入的标记，位于标签和字段元素之间。                         |\n| after[string]      | 注入的标记，出现在字段之后。\
  \                                 |\n| options[array]     | 手动指定用于`select`元素或单选框组的选项；可以以简单的值数组或键值对形式提供；键渲染在`value`属性中，值显示在元素中。\
  \ |\n| multiple[mixed]    | 设置为`true`时，显示允许多选的菜单；设置为`checkbox`时，`select`类型渲染为复选框而不是多选菜单。\
  \ |\n| maxLength[int]     | 设置 HTML 的`maxLength`属性。                            \
  \      |\n| div[bool] = true   |                                               \
  \               |\n\n\n\n# 技术文档格式\n\n## 第 9 章：辅助函数\n\n### 表 9-4. 表单输入元素选项\n\n**选项：**\
  \ `id[string]`\n**说明：** 将 ID 属性设置为所提供的值。\n\n**选项：** `error[string]`\n**说明：** 设置后，验证错误时将显示此处的文本；留空则允许显示默认消息。\n\
  \n**选项：** `selected[string]`\n**说明：** 在渲染基于选择的输入元素时，要选中的项目对应的值。\n\n**选项：** `rows[int]`\n\
  **说明：** 用于调整 `<textarea>` 元素尺寸的行数。\n\n**选项：** `cols[int]`\n**说明：** 用于调整 `<textarea>`\
  \ 元素尺寸的列数。\n\n**选项：** `empty[mixed]`\n**说明：** 设置为 `true` 时，提交时该字段将强制保持为空；与选择菜单一起使用时，可以提供要显示为空选项的字符串（例如，“请选择一个...”）。\n\
  \n**选项：** `timeFormat[string]`\n**说明：** 时间相关字段的选择菜单格式；唯一选项是 `12`、`24`、`none`。\n\n\
  **选项：** `dateFormat[string]`\n**说明：** 与 `timeFormat` 选项类似；可能的值仅有 `DMY`、`MDY`、`YMD`\
  \ 和 `none`。\n\n**选项：** `label[mixed]`\n**说明：** 作为字符串时，产生的文本将显示为标签；设置为 `false` 时，禁用标签元素。\n\
  \n**选项：** `(continued)`\n**说明：** 设置为 `false` 时，禁用包装用的 `<div>` 标签。\n\n如果你能巧妙地组合使用这些可用选项，你会发现没有任何场景是\
  \ `$form->input()` 函数无法处理的。\n\n有时你可能需要直接使用表单元素函数，而不是在 `$form->input()` 函数中指定类型。或者，你可能更愿意使用特定于所渲染字段类型的函数来组织视图。无论哪种情况，Form\
  \ 辅助函数都提供了特定于元素的函数，其行为与 `$form->input()` 函数完全相同。\n\n其他 Form 辅助函数则用于处理其他任务，例如显示错误或将日期时间元素拆分为独立的菜单。表\
  \ 9-5 列出了这些函数及其参数。\n\n### 表 9-5. 表单输入元素函数\n\n**函数名称和参数**\n\n- `button( title[string],\
  \ options[array] )`\n- `checkbox( field[string], options[array] )`\n- `file( field[string],\
  \ options[array] )`\n- `hidden( field[string], options[array] )`\n- `password( field[string],\
  \ options[array] )`\n- `radio( field[string], options[array], attributes[array]\
  \ )`\n- `submit( caption[string], options[array] )`\n- `select( field[string], options[array],\
  \ selected[mixed], attributes[array], showEmpty[mixed] )`\n- `text( field[string],\
  \ options[array] )`\n- `textarea( field[string], options[array] )`\n- `dateTime(\
  \ field[string], dateFormat[string], timeFormat[string], selected[string], attributes[array],\
  \ showEmpty[mixed] )`\n- `day( field[string], selected[string], attributes[array],\
  \ showEmpty[mixed] )`\n- `month( field[string], selected[string], attributes[array],\
  \ showEmpty[mixed] )`\n- `year( field[string], minYear[int], maxYear[int], selected[string],\
  \ attributes[array], showEmpty[mixed] )`\n- `hour( field[string], format[bool],\
  \ selected[string], attributes[array], showEmpty[mixed] )`\n- `minute( field[string],\
  \ selected[string], attributes[array], showEmpty[mixed] )`\n- `meridian( field[string],\
  \ selected[string], attributes[array], showEmpty[mixed] )`\n- `error( field[string],\
  \ message[string], options[array] )`\n\n### 使用其他内置辅助函数\n\n尽管 HTML 和 Form 辅助函数非常有用，但它们并非\
  \ Cake 所提供的唯一辅助函数。\n\nCake 1.2 包含了一些其他辅助函数，这些函数扩展了你的应用程序可用的功能。关于每个辅助函数当前功能集的列表，请参考\
  \ Cake 1.2 API ([`api.cakephp.org`](http://api.cakephp.org))。在这里，我将只解释每个辅助函数并概述其功能。\n\
  \n#### Ajax 辅助函数\n\n在第 8 章中，你使用了 Ajax 辅助函数来创建一个评论投票系统。我解释过，它的许多函数需要 Prototype JavaScript\
  \ 框架才能在视图中正常运行。请确保正确安装该框架，以便充分利用此辅助函数。Ajax 辅助函数不仅可以简化 Prototype 的使用，还可以让动画效果更容易应用。（有关\
  \ Ajax 辅助函数更深入的说明，请参阅第 8 章；要查看 Ajax 函数列表，请参考表 8-1。）\n\n#### JavaScript 辅助函数\n\n\
  此辅助函数主要用于简化 JavaScript 代码的编写。一个你已经引用过的常见函数是 `$javascript->link()` 函数，它作为自动化工具在视图中创建\
  \ `<script>` 标签。此辅助函数的其他用途包括 JavaScript 对象和事件函数，这些函数提供一些常用的 JavaScript 功能和代码。此辅助函数和\
  \ Ajax 辅助函数都可以简化新兴的 Ajax 技术并实现高级的 JavaScript 方法。\n\n要在应用程序中包含此辅助函数，请使用以下代码：\n\n\
  ```php\nvar $helpers = array('Javascript');\n```\n\nJavaScript 辅助函数带有表 9-6 中列出的函数。\n\
  \n#### 表 9-6. JavaScript 辅助函数中的函数\n\n**函数** | **说明**\n--- | ---\n`$javascript->afterRender()`\
  \ | 渲染后的回调；将缓存的事件写入视图或临时文件\n`$javascript->blockEnd()` | 结束一段 JavaScript 代码块\n`$javascript->cacheEvents()`\
  \ | 缓存使用 `event()` 函数创建的 JavaScript 事件\n`$javascript->codeBlock()` | 使用 `<script>`\
  \ 标签包裹 JavaScript 代码\n`$javascript->escapeScript()` | 转义 JavaScript 代码段中的回车符、单引号或双引号\n\
  `$javascript->escapeString()` | 转义字符串以使其兼容 JavaScript\n`$javascript->event()` |\
  \ 与 Prototype 框架一起使用，将事件附加到元素上\n`$javascript->getCache()` | 获取当前的 JavaScript 缓存；也可以清除\
  \ JavaScript 缓存\n`$javascript->includeScript()` | 在一个单一的 `<script>` 标签内包含一个脚本\n\
  `$javascript->link()` | 链接 JavaScript 文件以供网页使用\n`$javascript->object()` | 从数组创建一个\
  \ JSON 对象\n`$javascript->writeEvents()` | 写入缓存的 JavaScript 事件\n\n#### Number 辅助函数\n\
  \n这是一个处理数字格式的简单辅助函数。从货币格式到使内存文件大小易读，Number 辅助函数将一些常见任务浓缩到一些方便的函数中。如果你的应用程序必须处理多种数字格式，或者需要显示文件大小，那么请尝试使用表\
  \ 9-7 中列出的一些函数。要在应用程序中包含此辅助函数，请使用以下代码：\n\n```php\nvar $helpers = array('Number');\n\
  ```\n\n#### 表 9-7. Number 辅助函数\n\n**函数** | **说明**\n--- | ---\n`$number->currency()`\
  \ | 将浮点整数格式化为货币格式\n`$number->format()` | 根据提供的设置格式化浮点整数\n`$number->precision()`\
  \ | 根据指定的精度值格式化数字\n`$number->toPercentage()` | 将数字转换为百分比\n`$number->toReadableSize()`\
  \ | 将字节数转换为可读的大小格式（例如 KB 或 MB）\n\n#### Paginator 辅助函数\n\n此辅助函数与 Pagination 组件配合使用，以将数据分页或按指定参数对数据进行排序。Paginator\
  \ 辅助函数在视图中工作，以操作提供的数据显示，满足应用程序的定制需求。换句话说，当在控制器中使用 Pagination 组件时（在 Bake 中为控制器创建标准操作时就是这种情况），发送到视图的数据就是*已分页*的数据。要遍历数据页面，请使用\
  \ Paginator 辅助函数。表 9-8 列出了允许你自定义如何在视图中显示分页数据的函数。\n\n要在应用程序中包含此辅助函数，请使用以下代码：\n\n\
  ```php\nvar $helpers = array('Paginator');\n```\n\n#### 表 9-8. Paginator 辅助函数\n\n\
  **函数** | **说明**\n--- | ---\n_(待记录的附加函数)_ | _(相应的说明)_\n\n\n\n`$paginator->counter()`\n\
  \n返回当前分页结果集的计数器字符串\n\n`$paginator->current()`\n\n返回分页结果集的当前页码\n\n`$paginator->defaultModel()`\n\
  \n返回分页集的默认模型\n\n`$paginator->first()`\n\n返回分页结果中首页的页码或首页数字集\n\n`$paginator->hasNext()`\n\
  \n如果提供的分页结果集不是最后一页，返回 `true`\n\n`$paginator->hasPage()`\n\n检查指定页码在分页结果中是否有对应的结果集\n\
  \n`$paginator->hasPrev()`\n\n如果提供的分页结果集不是第一页，返回 `true`\n\n`$paginator->last()`\n\
  \n返回分页结果中末页的页码或末页数字集\n\n`$paginator->link()`\n\n创建带有分页参数的链接\n\n`$paginator->next()`\n\
  \n创建指向下一组分页结果的链接\n\n`$paginator->numbers()`\n\n返回当前页码两侧的数字集，以便更直接访问其他结果\n\n`$paginator->options()`\n\
  \n设置所有分页链接的默认选项\n\n`$paginator->params()`\n\n返回指定模型结果集的当前页码\n\n`$paginator->prev()`\n\
  \n创建指向上一组分页结果的链接\n\n`$paginator->sort()`\n\n为结果集中的某列创建排序链接\n\n`$paginator->sortDir()`\n\
  \n返回给定结果集的排序方向\n\n`$paginator->sortKey()`\n\n返回给定结果集的排序键\n\n`$paginator->url()`\n\
  \n创建用于访问结果集其他页面的分页 URL\n\n### RSS 助手\n\nRSS 助手用于创建符合标准的 RSS 订阅源。RSS 助手函数列表参见表 9-9。若要在应用中包含此助手，请使用：`var\
  \ $helpers = array('Rss');`\n\n**表 9-9.** *RSS 助手函数*\n\n| 函数 | 描述 |\n| --- | ---\
  \ |\n| `$rss->channel()` | 返回 `<channel>` 元素 |\n| `$rss->document()` | 返回包含在 `<rss>`\
  \ 标签中的 RSS 文档 |\n| `$rss->item()` | 将数组转换为 RSS 元素 |\n| `$rss->items()` | 使用可选回调函数转换数据数组；将数组映射为一组\
  \ RSS 标签 |\n| `$rss->time()` | 将任意格式的指定时间戳转换为 RSS 时间规范 |\n\n### Session 助手\n\nSession\
  \ 助手显示由其组件和控制器提供的会话信息。它能显示闪存消息、错误，并通过表 9-10 列出的便捷函数读取会话数据。若要在应用中包含此助手，请使用：`var $helpers\
  \ = array('Session');`\n\n**表 9-10.** *Session 助手函数*\n\n| 函数 | 描述 |\n| --- | ---\
  \ |\n| `$session->activate()` | 如果 `app/config/core.php` 文件中的 `Session.start` 属性设置为\
  \ `false`，则启用会话处理 |\n| `$session->check()` | 如果设置了会话键，返回 `true` |\n| `$session->error()`\
  \ | 返回会话中遇到的最后一个错误 |\n| `$session->flash()` | 渲染通过 Session 组件的 `setFlash()` 函数设置的消息\
  \ |\n| `$session->id()` | 返回会话 ID |\n| `$session->read()` | 返回给定会话键中存储的所有值 |\n|\
  \ `$session->valid()` | 返回会话键在视图中是否可用 |\n| `$session->write()` | 覆盖 Session 组件的\
  \ `write()` 函数；不应在视图中使用，但可在其他助手函数中调用 |\n\n### Text 助手\n\n处理文本时，诸如截断和高亮等任务可能需要复杂的正则表达式或繁琐的\
  \ PHP 操作。Text 助手将一些常见的 Web 文本处理方法浓缩为助手函数。Text 助手函数列表参见表 9-11。\n\n若要在应用中包含此助手，请使用：`var\
  \ $helpers = array('Text');`\n\n**表 9-11.** *Text 助手函数*\n\n| 函数 | 描述 |\n| --- |\
  \ --- |\n| `$text->autoLink()` | 将所有链接和电子邮件地址转换为 HTML 链接 |\n| `$text->autoLinkEmails()`\
  \ | 为给定文本提供电子邮件链接 |\n| `$text->autoLinkUrls()` | 查找以 `http://` 或 `ftp://` 开头的文本，并为其包裹链接标签\
  \ |\n| `$text->excerpt()` | |\n\n\n\n`$text->highlight()`  \n高亮显示给定文本字符串  \n\n`$text->stripLinks()`\
  \  \n从文本中移除链接  \n\n`$text->toList()`  \n将数组格式化为以逗号分隔的可读列表  \n\n`$text->trim()` \
  \ \n`truncate()` 的别名  \n\n`$text->truncate()`  \n将文本截断至指定长度  \n\n## 时间助手  \n\n处理日期和时间字符串时的各种变化可能会让人头疼——一分钟有\
  \ 60 秒，一小时有 60 分钟，一天有 24 小时，一周有 7 天……你懂的。那些用于比较时间或自动处理日期任务的方法很容易变得混乱或复杂。如果再加上将日期存入数据库，难度还会进一步提升。幸好有了时间助手，一些常见的日期时间方法管理起来就轻松多了。从处理\
  \ SQL 查询字符串到呈现格式精美的日期，这个助手对于任何依赖时间元素的 Cake 应用都非常有用。时间助手函数列表请参见表 9-12。要在应用中包含这个助手，请使用以下代码：\
  \  \n\n```php\nvar $helpers = array('Time');\n```\n\n### 表 9-12. 时间助手函数  \n\n| 函数\
  \ | 描述 |\n|----------|-------------|\n| `$time->dayAsSql()` | 返回部分 SQL 字符串，用于搜索同一天内两个时间点之间的记录\
  \ |\n| `$time->daysAsSql()` | 返回部分 SQL 字符串，用于搜索两个日期之间的记录 |\n| `$time->format()`\
  \ | 返回格式化的日期字符串；转换有效的 `strtotime()` 字符串或 Unix 时间戳 |\n| `$time->fromString()` | 根据给定的有效\
  \ `strtotime()` 字符串或整数返回 Unix 时间戳 |\n| `$time->gmt()` | 将给定的 Unix 时间戳或有效的 `strtotime()`\
  \ 字符串转换为格林威治标准时间 |\n| `$time->isThisMonth()` | 如果给定的日期时间字符串在本月内，则返回 true |\n| `$time->isThisWeek()`\
  \ | 如果给定的日期时间字符串在本周内，则返回 true |\n| `$time->isThisYear()` | 如果给定的日期时间字符串在今年内，则返回\
  \ true |\n| `$time->isToday()` | 如果给定的日期时间字符串是今天，则返回 true |\n| `$time->isTomorrow()`\
  \ | 如果给定的日期时间字符串是明天，则返回 true |\n| `$time->nice()` | 将日期时间字符串格式化为可读的字符串 |\n| `$time->niceShort()`\
  \ | 类似于 `nice()`，但会将字符串压缩到更少的单词和数字 |\n| `$time->relativeTime()` | `timeAgoInWords()`\
  \ 的别名；也可用于计算未来日期 |\n| `$time->timeAgoInWords()` | 比较给定日期时间字符串与当前时间的差异；用过去时态表达差异（例如，三天前）\
  \ |\n| `$time->toAtom()` | 格式化日期字符串，用于 Atom 订阅源 |\n| `$time->toQuarter()` | 返回给定日期所在的季度\
  \ |\n| `$time->toRSS()` | 格式化日期字符串，用于 RSS 订阅源 |\n| `$time->toUnix()` | `strtotime()`\
  \ 函数的便利封装 |\n| `$time->wasWithinLast()` | 如果给定日期在指定时间间隔内，则返回 true |\n| `$time->wasYesterday()`\
  \ | 如果给定的日期时间字符串代表昨天，则返回 true |\n\n## XML 助手  \n\n作为一种数据存储文件格式，XML 近年来获得了显著的 popularity。一些开发者因其灵活性和易用性而更青睐它而非数据库引擎。无论您如何使用\
  \ XML，这个助手都可以简化一些典型的 XML 处理流程。XML 助手函数列表请参见表 9-13。要在应用中包含这个助手，请使用以下代码：  \n\n```php\n\
  var $helpers = array('Xml');\n```\n\n### 表 9-13. XML 助手函数  \n\n| 函数 | 描述 |\n|----------|-------------|\n\
  | `$xml->elem()` | 创建一个 XML 元素 |\n| `$xml->header()` | 生成一个 XML 文档头部 |\n| `$xml->serialize()`\
  \ | 将模型结果集或 Cake 格式化的数组转换为 XML |\n\n## 创建自定义助手  \n\n创建最佳 Web 应用的一个关键是要确保程序的前端清晰且组织良好。在这方面，助手是无价的。HTML\
  \ 和表单助手大大缩短了生成有效表单或 HTML 显示所需的时间。  \n\n想象一下能够编写自己定制的助手函数的可能性。Cake 不仅允许创建自定义助手，而且使其创建过程变得简单。当然，助手的全部功能可以通过更出色的代码进行扩展，而且您可以找到由最优秀的\
  \ Cake 开发者设计的各种第三方助手。  \n\n本节将探讨如何创建自定义助手以及如何使用其他助手中的函数。您将为您的博客应用构建一个助手，其中包含专为博客本身设计的一些特定方法。首先，让我们来构建\
  \ App 助手。  \n\n### 使用 App 助手  \n\n与控制器和模型一样，Cake 用于处理助手的 Helper 对象可以为整个应用提供一个全局助手。这被称为\
  \ App 助手，它存储在应用的 `app/app_helper.php` 文件中。创建此文件，并将清单 9-2 的内容复制进去。  \n\n**清单 9-2.**\
  \ `app/app_helper.php` *文件的内容*  \n\n```php\n<?\nclass AppHelper extends Helper {\n\
  \n}\n?>\n```\n\n请注意，在清单 9-2 的第 2 行中，App 助手是 Helper 对象的扩展。  \n\n现在，无论您在此助手中放置什么函数，您创建的任何助手都可以访问它们。目前，我将\
  \ `AppHelper` 类留空，但稍后我会用它来构建一些功能，使其适应您的自定义需求。  \n\n### 创建助手文件  \n\n自定义或第三方助手文件存储在\
  \ `app/views/helpers` 文件夹中，其命名方式与元素类似——即助手的名称后跟 `.php` 扩展名。在文件内部，助手的类以助手名称和单词 *Helper*\
  \ 组合成一个驼峰式单词的形式指定：  \n\n```php\nclass CustomHelper extends AppHelper {\n```\n\n\
  此助手将扩展 App 助手对象，因此您也需要包含该扩展。任何您希望助手内所有函数都能访问的对象变量，都可以像任何类对象一样指定：  \n\n```php\nvar\
  \ $variable = true;\n```\n\n各个函数的创建方式与典型的 PHP 函数相同：  \n\n```php\nfunction myHelperFunction()\
  \ { }\n```\n\n大多数情况下，助手函数将由视图调用。因此，您需要使用 `return` 命令返回一个值供视图使用：  \n\n```php\nreturn\
  \ '<p>测试助手函数</p>';\n```\n\n安装此助手的方式与我已经讨论过的其他内置助手相同。在视图中，助手的调用方式为：按照文件名和类对象声明中指定的名称，将其作为对象调用：\
  \  \n\n```php\n$custom->myHelperFunction();\n```\n\n### 使用外部助手函数  \n\n您可能希望扩展 Cake\
  \ 内置助手函数的功能，组合几个函数的过程，或者在您自己的自定义助手中使用某个函数中已定义的过程。为此，只需通过在控制器中引用的方式，填充 `var $helpers`\
  \ 数组来指定要使用的助手：  \n\n```php\nvar $helpers = array('Html','Ajax');\n```\n\n然后，在助手文件中，根据需要，使用\
  \ `$this->Helper` 来调用外部助手函数：  \n\n```php\n$this->Html->link('使用外部函数','/');\n```\n\
  \n### 为您的博客创建一个助手  \n\n让我们为您的博客构建一些自定义函数。第一个函数将简化带有 Ajax 投票链接的评论的显示。为此，您首先需要创建助手本身。创建一个名为\
  \ `app/views/helpers/blog.php` 的新文件。在其中，按如下方式创建新的 `BlogHelper` 类：  \n\n```php\n\
  <?\nclass BlogHelper extends AppHelper {\n\n}\n?>\n```\n\n#### 包含 Ajax 助手  \n\n\
  回想一下，您已经在 `app/views/`\n\n\n\n### `posts/view.ctp` 文件\n\n若要将视图中的评论区缩减为一行，可以将其整合到\
  \ `$blog->comments()` 函数中。但请注意，Ajax 辅助程序已用于投票链接。为了使该辅助程序的功能在 Blog 辅助程序中可用，在创建 `$blog->comments()`\
  \ 函数之前，需要先引入 Ajax 辅助程序。请将以下代码插入 `app/views/helpers/blog.php` 文件的第 3 行：\n\n```\n\
  var $helpers = array('Ajax');\n```\n\n#### 编写 Comments 函数\n\n现在 Blog 辅助程序文件已准备就绪，接下来创建\
  \ `$blog->comments()` 函数（参见代码清单 9-3）。将 `app/views/posts/view.ctp` 文件的第 9–23 行（评论区循环）复制并粘贴到此函数中，并对其进行少量处理作为起点；然后，为此函数添加一些参数和功能，使其在需要时可移植到网站的其他区域。\n\
  \n**代码清单 9-3.** *Blog 辅助程序中的* `$blog->comments()` *函数*\n\n```\n1 function comments($comments=null)\
  \ {\n2   if (!empty($comments)) {\n3     $out = null;\n4     foreach($comments as\
  \ $comment) {\n5       $out .= '<div class=\"comment\">\n6         <div id=\"vote_'.$comment['Comment']['id'].'\"\
  >\n7           <div class=\"cast_vote\">\n8             <ul>';\n9       $out .=\
  \ $this->Ajax->link('<li>up</li>','/comments/vote/up/'.➥\n$comment['Comment']['id'],array('update'=>'vote_'.$comment['Comment']['id']),➥\n\
  null,false);\n10      $out .= $this->Ajax->link('<li>down</li>','/comments/vote/➥\n\
  down/'.$comment['Comment']['id'],array('update'=>'vote_'.$comment➥\n['Comment']['id']),null,false);\n\
  11      $out .= '</ul>\n12        </div>\n13        <div class=\"vote\">'.$comment['Comment']['votes'].'</div>\n\
  14      </div>\n15      <p><b>'.$comment['Comment']['name'].'</b></p>\n16      <p>'.$comment['Comment']['content'].'</p>\n\
  17    </div>';\n18    }\n19    return $this->output($out);\n20  } else {\n21   \
  \ trigger_error(sprintf('No comments found', get_class($this)),➥\nE_USER_NOTICE);\n\
  22  }\n23 }\n```\n\n在代码清单 9-3 中，我基本上将 Posts 视图中的循环转换为由辅助程序函数返回的内容。通过使用 `$out` 变量，我可以遍历\
  \ `$comments` 变量，并将所有迭代结果捕获到此数组中。然后在第 19 行，`$out` 的最终输出会返回给视图。请注意，在第 19 行中我使用了 `output()`\
  \ 函数。这是一个用于处理最终输出的基本返回函数；可以在其他子类中重写，以进行后处理。如果未经后处理方法影响，它将按原样返回传递的变量。\n\n第 21 行使用\
  \ `trigger_error()` 函数，如果未向辅助程序函数传递任何评论，则会传递一个错误。此行将类本身（作为 `$this`）传递，用于调试消息。\n\n\
  现在您已经创建了 `$blog->comments()` 函数，让我们在视图中使用它。在 App 控制器中，将 Blog 辅助程序加载到 `$helpers`\
  \ 数组中：\n\n```\nvar $helpers = array('Html','Form','Ajax','Javascript','Blog');\n\
  ```\n\n接下来，在 `app/views/posts/view.ctp` 文件中，将第 9–23 行的评论循环替换为一行：\n\n```\n<?=$blog->comments($comments);?>\n\
  ```\n\n刷新 Posts 视图，应该不会看到任何变化；这很好，说明辅助程序工作正常。\n\n#### 比较辅助程序与元素\n\n当前的 `$blog->comments()`\
  \ 函数与元素并无太大区别；它本质上是接收一个变量并围绕它创建一些视图标记，必要时可在多个视图中使用。不过，应该注意辅助程序与元素之间的一个根本区别。就目前而言，`$blog->comments()`\
  \ 函数实际上应该放在一个元素中，而不是辅助程序中，原因如下：\n\n- 元素提供无需太多逻辑即可在多个视图中使用的显示标记；辅助程序通常包含更多的逻辑测试和方法。\n\
  - 辅助程序通常适用于任何类型的应用程序，而元素则更特定于其所属的应用程序。\n\n\n\n• 元素不应包含多个用于操作显示的选项，这更像辅助函数的功能。\n\n\
  尽管有这些建议，但将一系列视图函数集中在一个辅助文件中，可能比将其拆分为多个元素更为有效。将当前的 `$blog->comments()` 函数从元素迁移到辅助函数，需要扩展该函数以采用更多动态方法。目前，`$blog->comments()`\
  \ 相当静态，因此下一步是扩展它，使其包含更多逻辑和选项。通过这样做，你可以让该函数在多种场景下都能使用，而这可能是编写辅助函数的最佳理由。\n\n#### 扩展评论函数\n\
  \n向辅助函数传递选项这一方面，让你能够扩展函数以包含更多自定义的可能性。特别是对于 `$blog->comments()` 函数，有几个特性可以定制以便在整个应用中使用。首先，投票链接可能需要根据你使用该函数的方式而改变。其次，投票链接本身可能需要因不同区域的不同内容而变化。第三，更新元素也可能需要根据网站的不同区域进行调整。查看内置辅助函数可以发现，通常使用参数来实现这些自定义。那么，让我们扩展\
  \ `$blog->comments()` 函数以包含更多参数。从某种意义上说，这就是构建自定义辅助函数的工作——允许在应用程序中针对各种用途执行特定操作。\n\
  \n在 `$blog->comments()` 函数中，你将允许使用一个包含以下参数的选项数组：\n\n- `link`：用于向上和向下投票的投票链接；可选，用于覆盖\
  \ `upLink` 和 `downLink` 参数\n- `upLink`：仅用于向上投票的投票链接\n- `downLink`：仅用于向下投票的投票链接\n\
  - `text`：投票链接的内容；可选，用于覆盖 `upText` 和 `downText` 参数\n- `upText = 'up'`：仅用于向上投票链接的内容\n\
  - `downText = 'down'`：仅用于向下投票链接的内容\n- `update = 'vote_'+评论 ID`：用于接收 Ajax 响应的 HTML\
  \ 元素的 ID\n\n要在函数中构建这些选项，请参阅代码清单 9-4。\n\n**代码清单 9-4.** `$blog->comments()` *函数中的*选项*数组*\n\
  \n```\n1 function comments($comments=null,$options=array()) {\n2   if (!empty($comments))\
  \ {\n3     $out = null;\n5     if (isset($options['link'])) {\n6       $up = $down\
  \ = $options['link'];\n7     }\n9     if (isset($options['upLink'])) {\n10     \
  \ $up = $options['upLink'];\n11    }\n13    if (isset($options['downLink'])) {\n\
  14      $down = $options['downLink'];\n15    }\n17    if (isset($options['text']))\
  \ {\n18      $upText = $downText = $options['text'];\n19    } else {\n20      $upText\
  \ = 'up';\n21      $downText = 'down';\n22    }\n24    if (isset($options['upText']))\
  \ {\n25      $upText = $options['upText'];\n26    }\n28    if (isset($options['downText']))\
  \ {\n29      $downText = $options['downText'];\n30    }\n32    if (isset($options['update']))\
  \ {\n33      $update = $options['update'];\n34    }\n36    foreach($comments as\
  \ $comment) {\n37      if (empty($update) || !isset($options['update'])) {\n38 \
  \       $update = 'vote_'.$comment['Comment']['id'];\n39      }\n40      $out .=\
  \ '<div class=\"comment\">\n41        <div id=\"vote_'.$comment['Comment']['id'].'\"\
  >\n42          <div class=\"cast_vote\">\n43            <ul>';\n44      $out .=\
  \ $this->voteUpLink($comment['Comment']['id'],array(\n'upLink' => $up,'text' =>\
  \ $upText,'update' => $update));\n45      $out .= $this->voteDownLink($comment['Comment']['id'],array(\n\
  'downLink' => $down,'text' => $downText,'update' => $update));\n46      $out .=\
  \ '</ul>\n47        </div>\n48        <div class=\"vote\">'.$comment['Comment']['votes'].'</div>\n\
  49      </div>\n50      <p><b>'.$comment['Comment']['name'].'</b></p>\n51      <p>'.$comment['Comment']['content'].'</p>\n\
  52    </div>';\n53    }\n54    return $this->output($out);\n55  } else {\n56   \
  \ trigger_error(sprintf('No comments found', get_class($this)),\nE_USER_NOTICE);\n\
  57  }\n58 }\n```\n\n\n\n\n## 第 9 章：辅助函数\n\n清单 9-4 的第 9 至 39 行均为逻辑测试，用于检查`options`数组中的值。如果存在值，则将这些行中的变量传递至评论渲染时使用的参数中。若这些值不存在，则会生成一些重要的默认值。\n\
  \n请注意第 44-45 行引用了`$blog->voteUpLink()`和`$blog->voteDownLink()`函数。我构建这些函数的目的，是从`$blog->comments()`函数中剥离生成投票链接的方法。目前尚不确定是否会在其他视图或辅助函数中使用这些方法。但无论如何，将这些操作独立于`$blog->comments()`函数之外或许是明智之举，因此我们将在完成本函数后构建这些新函数。创建这些新函数的方法请参见清单\
  \ 9-5 和 9-6。\n\n**清单 9-5.** *`$blog->voteUpLink()`函数*\n\n```php\n1 function voteUpLink($id=null,$options=array())\
  \ {\n2     if (isset($options['text'])) {\n3         $text = $options['text'];\n\
  4     } else {\n5         $text = 'up';\n6     }\n8     if (isset($options['update']))\
  \ {\n9         $update = $options['update'];\n10     } else {\n11         $update\
  \ = 'vote_'.$id;\n12     }\n14     $up = $options['upLink'].$id;\n15     return\
  \ $this->output($this->Ajax->link($text,$up,array('update'=>➥\n$update),null,false));\n\
  16 }\n```\n\n**清单 9-6.** *`$blog->voteDownLink()`函数*\n\n```php\n1 function voteDownLink($id=null,$options=array())\
  \ {\n2     if (isset($options['text'])) {\n3         $text = $options['text'];\n\
  4     } else {\n5         $text = 'down';\n6     }\n8     if (isset($options['update']))\
  \ {\n9         $update = $options['update'];\n10     } else {\n11         $update\
  \ = 'vote_'.$id;\n12     }\n14     $down = $options['downLink'].$id;\n15     return\
  \ $this->output($this->Ajax->link($text,$down,array('update'=>➥\n$update),null,false));\n\
  16 }\n```\n\n同样，在这些函数中，清单 9-4 和 9-5 的第 2-14 行负责管理`options`数组。第 15 行返回用于对评论进行赞/踩投票的\
  \ Ajax 链接。由于博客辅助函数的三个功能均支持选项设置，您现在可以在任何需要显示评论并提供 Ajax 评论投票的地方使用这些函数。\n\n既然已将`options`数组集成到辅助函数中，就必须修改\
  \ Posts 视图中的函数调用方式。为使`$blog->comments()`函数能在应用中正常工作，需要指定`upLink`和`downLink`参数。请将`app/views/posts/view.ctp`文件的第\
  \ 9 行替换为以下内容：\n\n```php\n<?=$blog->comments($comments,array('upText'=>'<li>up</li>','downText'=>'<li>down➥\n\
  </li>','upLink'=>'/comments/vote/up/','downLink'=>'/comments/vote/down/'));?>\n\
  ```\n\n刷新 Posts 视图后，您会发现评论显示效果完全相同——只不过现在所有评论都由自定义的博客辅助函数管理（见图 9-1）。\n\n**图 9-1.**\
  \ *由`$blog->comments()`函数显示的评论区域*\n\n### 自定义辅助函数变量\n\n您已创建了包含特定操作函数的自定义辅助函数。但如何自定义内置辅助函数使用的变量呢？假设您希望执行\
  \ HTML 辅助函数中已有的操作，但需要改变其输出显示效果。与其为适应自定义输出而构建完全不同的辅助函数，不如直接修改 HTML 辅助函数使用的变量，然后调用所需函数。\n\
  \n回想一下，您已在`app/`目录下创建了 App 辅助文件。在这里，您可以截获任何辅助函数使用的全局变量并插入自定义代码。打开`cake/libs/view/helpers/html.php`文件阅读原始\
  \ HTML 辅助函数代码。向下滚动至第 47 行查看`$tags`数组（如清单 9-7 所示）。\n\n**清单 9-7.** *HTML 辅助函数的`$tags`数组*\n\
  \n```php\n47 var $tags = array(\n48–96 …\n97     'error' => '<div%s>%s</div>'\n\
  98 );\n```\n\n我特意跳过了清单 9-7 的第 48-96 行，因为整个数组都重复着相同的思路。HTML 辅助函数使用此数组构建返回的 HTML 标签。修改其中任意键值对都会改变整个\
  \ HTML 辅助函数的输出。换句话说，无论 HTML 辅助函数在哪个函数中显示错误标签，您都可以用自定义内容替换第 97 行的值，所有错误标签都会随之改变。\n\
  \n修改`$tags`数组最直接的方法是在 App 辅助函数中创建自己的数组。但您必须指定 HTML 辅助函数使用的*所有*标签，这会导致 App 辅助函数与\
  \ HTML 辅助函数之间的重复。为减少影响`$tags`数组所需提供的数据量，您可以使用 Helper 对象的`loadConfig()`函数配合`__construct()`函数。\n\
  \n在 App 辅助函数中插入清单 9-8 的内容。\n\n**清单 9-8.** *App 辅助函数中的`__construct()`函数*\n\n```php\n\
  1 function __construct() {\n2     parent::__construct();\n3     $this->loadConfig();\n\
  4 }\n```\n\n当任何辅助函数被包含到控制器中时，此函数将被调用。第 2 行确保优先执行 Helper 对象的所有默认构造。然后在第 3 行包含了`loadConfig()`函数。默认情况下，该函数会在`app/config`文件夹中搜索`tags.php`文件，并将其内容与`$tags`数组合并。您可以通过在函数中包含文件名来指定要合并的文件：`$this->loadConfig('blog');`。\n\
  \n在上述示例中，App 辅助函数会搜索`app/config/blog.php`文件并将其内容与`$tags`数组合并。\n\n在现有 App 辅助函数的基础上，您仍需创建`app/config/tags.php`文件并编写`$tags`数组，以使`__construct()`函数正常运行。创建此文件并插入清单\
  \ 9-9 的内容。\n\n**清单 9-9.** *用于 App 辅助函数的`$tags`数组*\n\n```php\n<?\n$tags = array(\n\
  \    'button' => '<div class=\"button\"><input type=\"%s\" %s/></div>'\n);\n?>\n\
  ```\n\n清单 9-9 为辅助函数中使用的所有输入按钮包裹了`<div>`元素（默认无此元素）。您可以扩展此数组，添加尚未指定的新标签或生成自定义元素。在`$blog->comments()`函数中，您确实使用了一些标签（即`<li>`标签）来生成投票链接。在自定义的`tags.php`文件中，您可以插入一个名为`vote`的标签，包含创建默认标签所需的所有标记，这样辅助函数就无需在自身文件中编写标记。重写`app/config/tags.php`文件中的`$tags`数组，包含清单\
  \ 9-10 的内容。\n\n**清单 9-10.** *包含投票标签的`$tags`数组*\n\n```php\n<?\n$tags = array(\n \
  \   'vote' => '<li>%s</li>'\n);\n?>\n```\n\n要在博客辅助函数中使用此标签，请转到`$blog->voteUpLink()`函数。在函数返回输出的最后一行，将`$text`变量替换为`$tags['vote']`的值。为与`$tags`数组的组织方式保持一致，您需要使用\
  \ PHP 的`sprintf()`函数将`%s`字符替换为`$text`的内容（见清单 9-11）。\n\n**清单 9-11.** *用投票标签替换`$text`参数*\n\
  \n```php\nreturn $this->output($this->Ajax->link(sprintf($this->tags['vote'],$text)\
  \ … );\n```\n\n再次强调，刷新 Posts 视图时最终输出不应有任何变化。但通过将这些选项和变量集成到博客辅助函数中，您为后续的定制化提供了更多可能。现在，无需深入辅助函数本身的代码，只需编辑配置文件（`tags.php`）即可调整显示效果。在构建自定义辅助函数时请牢记这一点。您永远不知道这些函数最终会用在何处，尤其是在通过互联网分发或将它们引入其他\
  \ Cake 应用时。\n\n\n\n\n通过让辅助器更多特性能在配置文件等区域中编辑，或在视图中通过参数自定义，可以使其更具可移植性，最终也更为实用。\n\n\
  ### 投票标签\n\n清单 9-11 展示了如何用来自 `tags.php` 文件的投票标签替换 `$blog->voteUpLink()` 函数中的 `$text`\
  \ 参数。在此练习中，请对 `$blog->voteDownLink()` 函数执行相同操作。你也可以寻找其他方式，为 `$blog->comments()`\
  \ 函数生成其他标签。请参考 PHP 手册中关于 `sprintf()` 函数的说明，以扩展你自定义标签的功能。\n\n### 总结\n\n本章探讨了 Cake\
  \ 的内置辅助器。大多数 Cake 应用程序中使用的两个辅助器是 HTML 辅助器和表单辅助器。它们共同简化了 HTML 渲染和表单处理。得益于表单辅助器，传递用户表单提交变得简单，并为控制器和模型提供了处理数据的标准化方法。Cake\
  \ 中还有其他几个可用的辅助器。本章概述了这些辅助器及其包含的功能。很多时候，你需要创建自己的自定义辅助器。我展示了如何为你的博客应用程序编写一个辅助器，用于渲染视图的评论。\n\
  \n通过使用这个辅助器，你可以将视图中的代码量减少到几个字符串。\n\n自定义辅助器变量是扩展辅助器功能的一种方式。本章还解释了如何提供一组输出变量，使辅助器更具可移植性。在第\
  \ 10 章中，你将转向 Cake 的路由，并研究如何为你的应用程序自定义 URL 结构。\n\n# 第 10 章\n\n## 路由\n\n**在**开箱即用的情况下，Cake\
  \ 会拦截所有 URL，并将它们映射到相应的控制器和操作。这是框架的一个出色特性，可加快应用程序开发速度。与在 URL 中使用长字符串传递变量，或创建数十个独立脚本处理应用程序中每个函数不同，Cake\
  \ 的路由系统管理所有请求，正如你在前几章看到的那样。但是，如何自定义路由方案呢？或者，如果你想生成非 HTML 文件，例如 PDF、RSS 源或某种 XML\
  \ 输出呢？还有搜索引擎优化怎么办？出于这些目的，Cake 的路由功能将消除映射 URL、处理动态请求以及自定义应用程序路径和 URL 结构带来的麻烦。\n\n\
  几乎所有主要的路由操作都将在 `app/config/routes.php` 文件中进行。所有路由及其配置都存储在此文件中，并使用特定的语法。一些默认路由（用于处理主要\
  \ URL）已写入 `routes.php` 文件。默认情况下，Cake 会解析斜杠之间列出的传递值，并推导出指向控制器和操作的路径，以及将参数传递给这些操作。通过使用魔术变量、参数、扩展名、参数和其他特性，你可以完全操控路由以适应你的应用程序，同时仍然保持\
  \ MVC 结构。\n\n**注意** 请记住，`routes.php` 页面是级联的，这意味着路由的顺序很重要。如果 Cake 通过一个路由解析了 URL，它将立即在此结束，而不会继续检查页面下方的其他路由。虽然这通常不会影响整个应用程序，但如果你在处理同一控制器或操作中的更复杂路由时，它可能会产生影响。\n\
  \n### 基本路由\n\n正如你在默认的 `routes.php` 配置文件中看到的，基本路由通过 `Router::connect()` 函数调用，该函数带有一个路径以及一个存储路由参数的数组：\n\
  \n`Router::connect('/', array('controller' => 'pages', 'action' => 'display', 'home'));`\n\
  \n上一行是应用程序的基本路由。它将 URL 元素连接到 Pages 控制器的 Display 操作，并发送值 `home` 作为可在操作中使用的参数。通过指定另一个控制器和操作，你可以更改基本路由，从而使默认首页不再是\
  \ Pages 控制器的 Display 操作。\n\n`Router::connect()` 函数中的第一个值是路由引擎接收到的路径。如果路径验证通过，则将调用参数数组，用户将被带到数组中指定的任何位置。看待此路径的另一种方式是将其视为一个\
  \ if-then 语句；如果输入的 URL 没有参数，只有基本 URL，则将值 `home` 传递给 Pages 控制器中的 Display 操作。你可以手动指定值，或使用占位符来接受该\
  \ URL 参数的所有可能值：\n\n`Router::connect('/articles/*', array('controller'=>'posts','action'=>'index'));`\n\
  \n上一行显示了一种连接到博客应用程序中 Posts 控制器的新方法。通过在路径中使用星号，你本质上是在告诉路由器接受并传递它在单词 `articles` 之后找到的任何内容。与基本路径示例一样，该路径将被像\
  \ if-then 语句一样测试：如果提供的 URL 以单词 `articles` 开头，则将 URL 中的后续内容传递给 Posts 控制器。默认情况下，将调用\
  \ Index 操作。你基本上为 Posts 控制器构造了一个别名。\n\n现在，如果你愿意，你可以将所有指向 Posts 控制器的链接输入为指向 Articles\
  \ 控制器。\n\n### 参数\n\n传统上，在 PHP 中为请求变量赋值是通过使用参数构建序列化字符串来完成的：\n\n`http://localhost/script.php?variable=value&another_var=another_val`\n\
  \n在前面的代码中，字符串中的参数是 `variable` 和 `another_var`。当控制器操作与各种参数和可能的参数组合交互时，可能有必要以不同于 Cake\
  \ 默认路由模式的方式构造 URL 字符串。\n\n路由器中的参数以冒号后跟一个值的形式出现在 URL 中：\n\n`http://localhost/blog/posts/view/id:5/set:2`\n\
  \n在前面的代码中，参数是 `id` 和 `set`，它们的值分别是 `5` 和 `2`。通常，这个例子最好在视图中不带参数进行管理，即只使用值。但是，当操作使用诸如\
  \ Paginator 之类的组件时，可能需要传递参数以使组件正常工作。例如，对于 Paginator，正常的 Cake URL 默认指向数据集的第一页。但是通过向字符串添加参数，Paginator\
  \ 能够检索数据集的另一页：\n\n`http://localhost/blog/posts/index/page:2/sort:id/direction:asc`\n\
  \n传递的参数包含在 `passedArgs` 数组中。前面的字符串将像这样存储值：\n\n```\n$this->passedArgs = Array(\n\
  \    'page'=>2,\n    'sort'=>'id',\n    'direction'=>'asc'\n);\n```\n\n参数作为键值对传递到此数组中的控制器，除非在\
  \ `routes.php` 配置文件中被绕过。\n\n参数的一个重要用途是作为 Cake 向操作传递变量的方式。请注意，因为路由器已在 URL 字符串中找到了参数，所以它不会将它们作为变量传递给操作。\n\
  \n\n\n# 路由（Routes）\n\n### 传递参数（Passed Arguments）\n\n[`localhost/blog/posts/view/5/comments:false`](http://localhost/blog/posts/view/5/comments:false)\n\
  \n上述 URL 中，第二个参数（`comments:false`）*不会*像第一个参数那样被传递给动作（action）：\n\n```\nfunction view($id=null)\
  \ {\n    $displayComments = $this->passedArgs['comments'];\n    ...\n}\n```\n\n\
  典型的动作参数与传递参数（passed arguments）之间的这种区别，在控制器中构建方法时会产生影响。动作可以在没有任何传递参数的情况下正常执行，根据动作的具体需求，这可能是一个重要的选项。\n\
  \n### 反向路由（Reverse Routing）\n\nWeb 应用程序已开始倾向于使用友好的 URL，而非复杂的 URL 字符串。例如，`[www.site.com/cart/item/race_car](http://www.site.com/cart/item/race_car)`\
  \ 就比 `www.site.com/index.php?page=cart&item=race_car` 更好。这种做法不仅是为了搜索引擎优化或让应用程序对用户更友好，也是为了便于对应用的整体路由进行简单修改。试想，如果一个\
  \ Web 应用程序构建在 GET 变量之上，那么要彻底改造其整个路由结构将非常困难。在维护旧 URL 的同时实现新 URL，将面临许多新问题。\n\n这在很大程度上取决于应用程序本身，但通常需要添加一些额外的函数来实现\
  \ URL 的反向解析。\n\n### 查找（Lookups）\n\n默认情况下，URL 查找是单向地通过路由器进行的，这意味着当点击一个链接时，路由器会执行查找，并映射出相应的控制器、动作和参数。输入\
  \ `/posts/view/17` 将导致路由器查找 `Posts` 控制器的 `View` 动作在应用程序中的位置，并将参数传递给它。但是，反向查找又如何呢？假设你想要编写一个链接，并让路由器查找如何构造这个链接。这就是*反向查找*，即逆向查找。\n\
  \n### 在路由器中重写 URL\n\n在博客应用程序中，假设将来某个时候你需要停止在 URL 中使用 `Posts` 控制器名称。这意味着需要遍历整个应用程序，将所有指向\
  \ `Posts` 控制器的链接实例更改为新的路由。这显然会拖慢开发进度，并使站点结构更难更改。或者，你可以使用 Cake 的反向路由机制来重写所有指向 `Posts`\
  \ 控制器的 URL。\n\n`09775ch10final 7/1/08 9:50 PM Page 178`\n\n**178**\n\n第 10 章 ■ 路\
  \ 由\n\n### 详细链接（Verbose Linking）\n\n要反向生成路由，首先必须使用详细方法来编写链接。在 `$html->link()` 函数中，不再写入路径字符串，而是像这样将一些\
  \ URL 参数包含在一个数组中：\n\n```\n$html->link('View Post', array('controller'=>'posts',\
  \ 'action'=>'view', $post['Post']['id']));\n```\n\n这个数组并不会告诉函数 URL 路径是什么，而是提供了动态构建路径所需的必要参数。虽然使用这种数组确实会需要在组合链接时输入更多字符，但它允许你通过一个地方（即\
  \ `routes.php` 配置文件）来使用路由器拦截整个应用程序中的所有链接，而无需回头逐个查找需要更改的链接。\n\n要完成反向路由，你只需要在 `routes.php`\
  \ 配置文件中输入一条新的连接字符串来更改路由：\n\n```\nRouter::connect('/articles/*', array('controller'=>'posts',\
  \ 'action'=>'view'));\n```\n\n如果在 `$html->link()` 函数中不使用详细数组，路由器仍会尝试访问 `Posts` 控制器，并且\
  \ URL 中仍会出现 *posts* 一词。然而，既然你已经指定了希望用 *articles* 一词来链接到 `Posts` 控制器，路由器就会为你构建应用程序中的路径。只要链接同时调用了\
  \ `Posts` 控制器和 `View` 动作，路由器就会用 *articles* 替换路径中的相应部分。例如，通常指向以下位置的链接：\n\n`/posts/view/25`\n\
  \n\n\n### 路由动态变更\n\n请求将被路由器动态地指向这里：\n\n`/articles/25`\n\n请记住，要使反向路由在整个应用程序中正常工作，您需要始终如一地使用详细链接。\n\
  \n### 管理路由\n\n许多应用程序需要某种管理区域，以便通过用户界面管理网站功能。创建完全不同的控制器来管理这些管理功能会违反 Cake 的约定。但在构建应用程序时，如何区分前端用户和站点管理员呢？路由器可以为您动态管理管理路由，这意味着您可以使某些操作仅对管理员可用，而\
  \ URL 仍遵循 Cake 的标准结构。\n\n与其像这样构建自己的控制器来管理管理员操作：`posts_admin_controller.php`\n\n\
  不如将以下所有链接指向 `Posts` 控制器：\n\n`http://localhost/blog/admin/posts`\n\n首先，您必须选择一个管理前缀，然后相应地命名您的操作和视图文件。\n\
  \n---\n\n### 选择管理前缀\n\n管理前缀可以是您喜欢的任意一个单词。大多数人使用 `admin`（如之前的示例），但您也可以将其设为 `webmaster`\
  \ 或 `superuser`。管理路由必须在核心配置中启用，并且前缀也必须在那里提供。打开 `app/config/core.php` 文件，向下滚动到管理路由首选项：\n\
  \n`Configure::write('Routing.admin', 'admin');`\n\n在第 69 行附近，您会看到该首选项被注释掉了；取消注释以激活管理路由。请注意，默认情况下，前缀设置为\
  \ `admin`。您可以在此处输入任何符合标准 HTTP URL 语法的字符串作为前缀。路由器会将该前缀映射到相应的管理操作。\n\n### 链接管理操作和视图\n\
  \n一旦在核心配置中定义了前缀，您就可以开始创建管理员操作。这些操作可以出现在任何控制器中；它们只需要以包含前缀的方式命名。假设您希望将 `Posts` 控制器中的\
  \ `Edit` 和 `Add` 操作改为通过管理路由访问。您需要将控制器中的操作分别重命名为 `admin_edit` 和 `admin_add`。\n\n\
  前缀通过下划线附加到操作名称上。因此，如果前缀在核心配置中被定义为 `superuser`，那么这些 `Edit` 和 `Add` 操作需要将 `superuser`\
  \ 前缀添加到名称中：\n\n```\nfunction superuser_edit($id=null) { …\n```\n\n当某些操作被改为通过管理路由访问时，这些操作的视图也需要重命名。视图文件需要与对应的操作链接起来。因此，`admin_edit`\
  \ 操作需要将其视图文件命名为 `admin_edit.ctp`。\n\n这些管理操作在 URL 中不是通过下划线调用的。例如，执行 `Admin Edit`\
  \ 操作不是通过键入：\n\n`http://localhost/blog/posts/admin_edit/16`\n\n而是通过在控制器名称前使用管理前缀：\n\
  \n`http://localhost/blog/admin/posts/edit/16`\n\n若要限制这些管理路由，必须构建一个身份验证系统来检查用户与数据库的匹配情况并授予其权限。至少通过这种路由机制，您可以创建必要的路径来区分管理员和前端用户。\n\
  \n### 生成管理路由\n\n`Bake` 脚本自动化了构建管理路由的过程。在使用 `Bake` 创建控制器或视图并启用“交互式构建”功能时，您可以输入选项来构建带有管理路由的操作和视图。换句话说，只需在\
  \ `Bake` 询问您是否需要管理路由时告知它管理前缀是什么，它不仅会构建典型的 CRUD 操作和视图，还会在操作名称和视图文件中添加管理前缀。\n\n\n\n\
  # 第 10 章 ■ 路由\n\n### 路由参数\n\n您可能需要指定 URL 中的哪些部分对应控制器中的参数。通过路由参数，您可以告知路由器如何解析 URL。以\
  \ `Posts` 控制器为例。您可能希望只有当 URL 中指定了此控制器时，才调用特定路由。但那些不使用控制器名称、仅为特定动作调用的路由又该如何处理呢？在这种情况下，您需要为控制器指定一个路由参数；换句话说，路由器需要知道路径中的第一个参数代表控制器，而其他参数则代表其他元素。例如，如果您想影响所有控制器的\
  \ `View` 动作，可以按如下方式输入路由：\n\n```\nRouter::connect('/:controller/view',array('action'=>'read'));\n\
  ```\n\n这里，每当调用 `View` 动作时，它都会指向 `Read` 动作。您已使用路由参数 `:controller` 告知路由器路径的第一部分代表要映射的控制器。\n\
  \n路由参数可以是任何内容，只要它们是单个单词、前面带有冒号，并且在参数数组中定义即可。它们可以通过神奇变量或正则表达式进行检查，以激活路由。路由参数不必用斜杠分隔。由于路由器可以检测到路由参数，因此可以使用斜杠、破折号、冒号和\
  \ & 符号等符号来分隔参数。\n\n### 神奇变量\n\n那么如何通过路由引擎传递变量呢？您可以通过神奇变量部分实现这一点。这些变量包括常见的动作名称、日期元素和\
  \ ID 编号。\n\n换句话说，如果需要，路由器会自动检测 URL 中的月份和年份，并决定将这些类型的请求映射到哪里。\n\n例如，大多数博客应用程序都按日期管理其文章。为此，您需要在\
  \ `Router::connect()` 函数中使用神奇变量：\n\n```\nRouter::connect('/:controller/:month-:day-:year',\
  \ array('action'=>'view',array('month'=>$Month,'day'=>$Day,'year'=>$Year)));\n```\n\
  \n您可以看到，在路径中，您输入了一些占位符——具体来说，在每组斜杠之间都有一个控制器、月份、日期和年份占位符。这些就是“神奇变量”，它们总是以冒号开头。换句话说，您已经在\
  \ URL 中定义了插槽并为其命名。第一个插槽将包含控制器名称，第二个将包含月份值，依此类推。路由器将对照参数数组中使用的神奇变量检查这些插槽，如果匹配，则会将它们传递给指定控制器的\
  \ `View` 动作。\n\n在 URL 中替代神奇变量插槽输入的值会通过 `$this->params` 数组传递给动作。在前面的示例中，给定的月份可以通过数组中的如下方式获取：\n\
  \n```\n$this->params['month']\n```\n\n依此类推。可以在控制器和视图中检查或调用 `$this->params` 数组。\n\
  \n可用的神奇*函数*包括以下内容：\n\n- `$Action`\n- `$Day`\n- `$Month`\n- `$Year`\n- `$ID`\n\n\
  每个函数都会自动判断提供的值是否有效。例如，`$Action` 神奇变量会检查常见的动作名称，如 `View`、`Delete`、`Edit` 等。`$Year`\
  \ 神奇变量会检查典型的年份值，而 `$ID` 会检查有效的整数。\n\n在博客应用程序中使用此路由时，以下 URL：\n\n```\nhttp://localhost/blog/posts/12-24-2008\n\
  ```\n\n会将 `$this->params` 数组格式化为：\n\n```\n$this->params = Array(\n    'month' =>\
  \ 12,\n    'day' => 24,\n    'year' => 2008,\n    …\n);\n```\n\n### 自定义表达式\n\n将正则表达式与路由参数结合使用，可以在映射路由之前执行自定义逻辑测试。这些表达式在与使用神奇变量相同的数组中指定。\n\
  \n```\nRouter::connect('/:controller/:id/:month-:day-:year',array('action'=>'view'),\n\
  ```\n\n\n\n`array('month'=>$Month,'day'=>$Day,'year'=>$Year,'id'=>'[\\d]+')`。此处\
  \ ID 通过路由中的 `:id` 路由参数和 `parameters` 数组中的正则表达式定义进行测试。如果 ID 槽位包含通过正则表达式测试 `[\\d]+`\
  \ 的值（且其他槽位也通过测试），则该路由将被映射。如果 ID 槽位未包含有效整数，则路由将被绕过，路由器将移至 `routes.php` 配置文件中的下一个定义。\n\
  \n**通行键**\n\n到目前为止，通过非默认方法的路由传递的 URL 中的任何值都被放置在 `$this->params` 数组中；参数则被放置在 `$this->passedArgs`\
  \ 数组中。但是，如何映射值以便它们作为典型参数传递到操作中呢？通行键允许您实现这一点。在映射数组（包含控制器和操作定义）中，添加 `Pass` 键并分配一个数组。然后，在数组中提供与您使用的路由参数相对应的值。例如，带有参数\
  \ `title` 和 `id` 的路由可以使其值像普通的 Cake 参数一样出现在操作中，如下所示：\n\n```\nRouter::connect('/posts/:title/:id',\
  \ array('controller'=>'posts', 'action'=>'view', 'pass'=>array('title','id')));\n\
  ```\n\n路由器现在会将 `:title` 和 `:id` 槽中包含的值传递到函数定义中的操作：\n\n`function view($title=null,\
  \ $id=null) { …`\n\n这很有益，因为它可以节省时间；您无需通过 `$this->params` 数组来处理传递的值。\n\n**解析扩展名非\
  \ `.php` 的文件**\n\n到目前为止，您仅将路由映射到了 Cake 中的控制器和操作。像 RSS 或 XML 文件等其他文件类型呢？由于 Cake 的\
  \ `.htaccess` 文件的构建方式，当服务器上直接引用且存在这些文件时，服务器将提供这些文件。因此，您可以编写诸如 RSS 供稿、PDF 文件或 XML\
  \ 文件等静态文件，并将这些文件放置在 `app/webroot` 目录中，通过在 URL 中输入文件名即可直接访问。但路由器也可以解析扩展名，这使得使用 Cake\
  \ 动态创建和呈现非 HTML 文件类型成为可能。\n\n**流程**\n\n理解路由器解析扩展名的过程对于构建正确的路由配置和其他 Cake 元素至关重要。首先，您需要告诉路由器注意指向特定扩展名的任何\
  \ URL。假设您想为博客应用动态构建一个 RSS 供稿。那么您需要使用 `Router::parseExtensions()` 函数，以便路由器检测何时在 URL\
  \ 中调用了 `.rss` 扩展名：`Router::parseExtensions('rss');`\n\n接下来，您需要告诉 Cake 此扩展名是什么 MIME\
  \ 类型。一些扩展名默认情况下已被识别，但其他扩展名需要被定义。对于 RSS 扩展名，Cake 不需要定义 MIME 类型，但为了了解如何操作，请打开 App\
  \ 控制器并添加以下行：\n\n```\nvar $components = array('RequestHandler');\n\nfunction beforeFilter()\
  \ {\n    $this->RequestHandler->setContent('rss', 'application/rss+xml');\n}\n```\n\
  \n现在，Cake 可以以正确的 MIME 类型定义响应浏览器和 HTTP 请求。但最后一步是创建布局，将标准文件内容包裹在视图周围。一旦布局被正确定义，控制器就可以包含在视图中输出\
  \ RSS 而不是 HTML 的操作，浏览器会将路由识别为文件，即使 Cake 正在动态创建它。\n\n**创建 RSS 供稿**\n\n了解了路由器解析 RSS\
  \ 扩展名的流程后，让我们为博客构建一个 RSS 供稿。首先，在 `routes.php` 配置文件的顶部附近编写解析扩展名函数：\n\n`Router::parseExtensions('rss');`\n\
  \n接下来，在 App 控制器中运行 `RequestHandler` 组件，以通过控制器过滤 HTTP 请求。清单 10-1 包含了 App 控制器的全部内容。请注意，它使用了\
  \ `beforeFilter()` 函数，以便在每个控制器操作被调用之前运行 `RequestHandler` 组件的 `setContent()` 函数。\n\
  \n**清单 10-1.** *使用了 RequestHandler 组件的 App 控制器*\n\n```\n<?\nclass AppController\
  \ extends Controller {\n    var $helpers = array('Html', 'Form', 'Ajax', 'Javascript',\
  \ 'Blog');\n    var $components = array('RequestHandler');\n\n    function beforeFilter()\
  \ {\n        $this->RequestHandler->setContent('rss', 'application/rss+xml');\n\
  \    }\n}\n?>\n```\n\n现在路由器 和 App 控制器 能够处理包含 RSS 文件扩展名的 HTTP 请求，您只需要创建必要的布局和视图来生成供稿。\n\
  \n**扩展名布局**\n\n对于 RSS 扩展名，路由器将查找 `app/layouts/rss` 目录以找到默认的 RSS 布局。创建 `default.ctp`\
  \ 布局文件，并将其放置在此目录中。将清单 10-2 的内容粘贴到此新文件中。\n\n**清单 10-2.** *`app/layouts/rss/default.ctp`\
  \ 的文件内容*\n\n`<?=$rss->document(null, $content_for_layout);?>`\n\n借助内置的 `$rss->document()`\
  \ 函数，您无需担心了解标准 RSS 文件的格式。如果您使用的文件类型未包含在 Cake 的辅助函数中，您将需要自行提供正确的头部信息；当然，这取决于所讨论文件类型的适当语法和规范。\n\
  \n**控制器操作**\n\n现在，您需要做的就是创建一个操作，作为被解析扩展名的文件名。对于博客，您将按如下方式访问 RSS 供稿：\n\n`http://localhost/blog/posts/feed.rss`\n\
  \n因此，让我们在 Posts 控制器中创建 `Feed` 操作（见清单 10-3）。您不应在函数定义中附加扩展名。此操作将类似于 `Index` 操作，您只需要提供供稿中最新的五篇文章。\n\
  \n**清单 10-3.** *Posts 控制器中的 Feed 操作*\n\n```\nfunction feed() {\n    $this->set('posts',\
  \ $this->Post->feed());\n}\n```\n\n注意，清单 10-3 的第 2 行引用了一个名为 `feed()` 的模型函数。由于 RSS\
  \ 输出需要一个格式化为特定语法键和值的数组，您应让模型来处理数据。在 Post 模型中，粘贴清单 10-4 中所示的 `feed()` 函数。\n\n**清单\
  \ 10-4.** *Post 模型中的 Feed 函数*\n\n```\nfunction feed() {\n    $posts = $this->find('all',\
  \ array('order'=>'date DESC', 'limit'=>5));\n    $out = array();\n    foreach ($posts\
  \ as $post) {\n        foreach ($post as $key=>$val) {\n            if ($key ==\
  \ 'Post') {\n                $out[$val['id']]['pubDate'] = date('D, d M Y H:i:s\
  \ +O', strtotime($val['date']));\n                $out[$val['id']]['title'] = $val['name'];\n\
  \                $out[$val['id']]['description'] = $val['content'];\n          \
  \      $out[$val['id']]['content'] = $val['content'];\n            }\n        }\n\
  \    }\n    return $out;\n}\n```\n\n清单 10-4 的第 2 行检索了最新的五篇文章，并将它们放入 `$posts` 数组中。函数的其余部分遍历此数组，并只提取您希望在供稿中出现的部分。注意第\
  \ 7–10 行如何以 RSS 供稿中将要出现的实际标签名称来命名输出数组中的键。这是因为一旦您编写了 Feed 视图，您将使用 RSS 辅助函数来渲染标签。RSS\
  \ 辅助函数需要数组以此方式格式化，以便为每个标签获取正确的数据。\n\n现在数据已正确处理，布局也能正常工作，您只剩下 Feed 视图了。\n\n**Feed\
  \ 视图**\n\n最后，创建与操作匹配的 Feed 视图（见清单 10-5）。它将需要使用 RSS 辅助函数。\n\n\n\n### 用于渲染各种标签的辅助程序，请务必在\
  \ `PostsController` 或 `AppController` 中包含该辅助程序（关于在控制器中包含辅助程序的更多信息，请参阅第 9 章）。\n\n\
  请注意，`Feed` 视图文件存储在 `Posts` 视图文件夹中名为 `rss` 的子文件夹内。\n\n**代码清单 10-5.** *`app/views/posts/rss/feed.ctp`\
  \ 文件内容*\n\n```\n<?=$rss->channel(null,array('title'=>'深度博客','description'=>'我的博客',➥\n\
  'language'=>'zh-cn'));?>\n<? foreach($posts as $post): ?>\n<?=$rss->item(null,$post);?>\n\
  <? endforeach;?>\n</channel>\n```\n\n这里的 `RSS` 辅助程序会自动处理频道和条目标签的构建。\n\n您已经传入了在 `Post`\
  \ 模型中已正确格式化的 `$post` 数组，现在整个过程已完成。在任何新闻聚合器中打开这个新的 Feed，或者使用您的浏览器订阅该 Feed。由于路由解析了扩展名且控制器正确处理了请求，您最终会得到一个有效的\
  \ `RSS` Feed，而不是一个 HTML 页面。\n\n### 自定义路由练习\n\n本章探讨了在 Cake 中构建自定义路由的一些方法。在此练习中，请构建一条路由，使其能够按日期和\
  \ ID 显示博客文章。提供正确的路由配置只是问题的一半；请务必重建 `View` 操作以正确执行查找。同时，构建管理路由以处理博客文章的编辑和添加。如果可以通过访问\
  \ `http://localhost/blog/admin/posts/edit/{id}` 来编辑文章，而不是使用编辑和添加的标准路径，则说明您已正确完成练习。\n\
  \n### 总结\n\n通过编辑 Cake 的路由配置文件，重写应用程序的 URL 变得容易得多。您不仅可以通过 `app/config/routes.php`\
  \ 文件使 URL 更友好，甚至可以设置反向路由，即由分发器动态映射的路由；只需在创建链接时使用详细链接语法，Cake 便会自动为您指定的所有控制器和操作更改所有\
  \ URL 字符串。路由器还包含一个管理路由功能，您可以通过该功能为任何操作名称和视图文件附加前缀，Cake 会将包含该前缀的 URL 映射到这些文件。这对于区分仅管理员可访问的\
  \ CRUD 操作和普通用户可用的操作非常有用。对于生成非 HTML 文件输出的应用程序，分发器可以解析扩展名。例如，在本章中，我描述了如何使用 Cake 生成一个\
  \ `.rss` 文件的 RSS Feed。当输入包含 `.rss` 扩展名的 URL 时，路由器会检测到此扩展名并相应地映射请求。现在您已了解如何在 Cake\
  \ 中自定义 URL 和其他路径，是时候探索更多 Cake 的高级功能了。在第 11 章中，我将介绍组件和工具，它们可以显著增强您的 Cake 应用程序并减少多项与网络相关的任务。\n\
  \n---\n\n## 第 11 章：组件和工具\n\n**C**ake 使用辅助程序来扩展视图的功能。通过将多个视图功能放置在辅助程序中，不仅能使视图保持简洁，还能让应用程序更好地组织。除了保持有序和维持应用程序的一致性外，并没有精确的方法来规定如何在辅助程序中组织功能。辅助程序之于视图，就如同组件和工具之于控制器。在某种程度上，您可以将组件视为“控制器的辅助程序”。\n\
  \n### 为什么要使用组件？\n\n但您可能会问，既然已经有 `AppController`，为什么还要有组件呢？难道 `AppController` 不应该包含所有被多个控制器使用的功能吗？既是也不是。`AppController`\
  \ 确实保存了更通用的操作，或是多个控制器都会使用的操作。与其使用 `requestAction()` 函数让一个控制器访问另一个控制器中的函数，不如直接将函数放在\
  \ `AppController` 中，并使其能够在整个应用程序中被多个控制器调用。\n\n您可以把 `AppController` 中的操作看作布局中的显示元素；即那些您希望在所有视图中可见的视图部分。多个视图应该放在布局中，类似地，跨控制器使用的操作应该放在\
  \ `AppController` 中。然而，视图仍然有用于*特定*显示输出任务的辅助程序。例如，`$html->link()` 辅助函数只能用于视图，因为它生成\
  \ HTML 输出；但由于它会在多个视图中重复使用，因此将此函数放在辅助程序文件中而不是布局或控制器中才合理。在 Cake 应用程序中，组件服务于类似的目的，它们包含控制器或多个控制器可以使用的特定功能。\n\
  \n例如，考虑 Cake 中的内置组件。其中一些包括 `Auth`、`Session` 和 `RequestHandler` 组件。它们的功能都专门用于帮助控制器执行与其特定方法相关的操作；认证组件中的操作都与帮助控制器管理用户认证过程等有关。从某种意义上说，辅助程序是*可移植的视图函数*，因为它们可以被分发并引入任何\
  \ Cake 应用程序，并以特定方式工作，以增强和简化视图可能需要的流程。类似地，组件是*可移植的控制器函数*，它们服务于特定目的，并且可以被分发到任何 Cake\
  \ 应用程序中的任何控制器。\n\n### 使用组件\n\n所有组件都存储在 `app/controllers/components` 目录中，并通过 `$components`\
  \ 数组像辅助程序一样被引入到控制器中。与其他参数一样，组件必须使用驼峰式命名，并在数组中用逗号分隔。内置组件和自定义组件都必须包含在 `$components`\
  \ 数组中才能在控制器中工作，并且像辅助程序一样，`AppController` 可以包含供任何或所有控制器使用的组件。请参见代码清单 11-1。\n\n**代码清单\
  \ 11-1.** *使用 $components 数组在控制器中包含组件*\n```\nvar $components = array('Session','RequestHandler');\n\
  ```\n\n一旦组件被包含在控制器中，控制器就可以通过 `$this` 标识符来引用其函数。请记住，像使用模型一样指定组件：`$this` 后跟组件的驼峰式名称以及正在使用的函数。代码清单\
  \ 11-2。\n\n**代码清单 11-2.** *在控制器中运行组件函数*\n```\n$user = $this->Session->read('User');\n\
  ```\n\n组件并非设计为直接与数据库交互，因此组件除了返回供控制器使用的变量、字符串或数组外，不会做更多事情。如果需要数据库调用，使用该组件的控制器应该通过模型运行这些调用，并将必要的数据提供给组件。这并不意味着组件仅限于逻辑测试或重新格式化转发的数据；像\
  \ `Session` 和 `Cookie` 组件一样，这里的函数可以写入外部文件或处理图像等等。\n\n除了允许使用自定义组件外，Cake 还附带了许多内置组件和工具。在构建您自己的组件之前，让我们先看看\
  \ Cake 提供了什么，并探讨这些组件函数如何改进应用程序。\n\n\n\n### 使用内置组件\n\n与辅助函数类似，Cake 拥有丰富的组件函数，可以更轻松地在控制器中运行处理流程。事实上，有些组件旨在与辅助函数协同工作，例如\
  \ `Session` 组件。在控制器中运行某些函数，可以更轻松地组织和格式化转发给视图的数据，以供 `Session` 辅助函数使用。\n\n了解内置组件能为你的控制器做些什么，将避免你“重复造轮子”，并帮助你利用一些出色的功能，这些功能正是\
  \ Cake 成为如此有吸引力的框架的原因。\n\n在接下来的每个组件描述中，我会对该组件的功能进行基本概述，并列出它的一些函数。未来，这些组件可能会增加更多函数，有时第三方组件也会对其进行扩展。Cake\
  \ 的核心组件存储在 `cake/libs/controller/components` 文件夹中；如果你想查看代码本身，请参考该文件夹中的组件文件。\n\n\
  #### 身份验证\n\n`Auth` 组件有助于管理应用程序的用户身份验证。很多时候，你可能希望站点的某些区域对普通用户进行保护。`Auth` 组件使登录查看站点某个区域等常见过程变得更加简单。与其他组件一样，它需要被包含在\
  \ `$components` 数组中，才能在控制器中使用：\n\n```\nvar $components = array('Auth');\n```\n\n\
  使用 `Auth` 组件，你可以对应用程序的不同区域（例如模型、控制器或其他对象）要求身份验证。`Auth` 还提供了自动化登录过程以及自动将用户重定向到站点可访问区域的方法。\n\
  \n`Auth` 组件需要包含存储用户信息的数据库表才能正常工作。\n\n##### 设置用户表\n\n默认情况下，`Auth` 会查找名为 `users` 的表，其中包含名为\
  \ `username` 和 `password` 的字段。当然，你可以通过在运行时之前向组件输入自定义参数来更改这些默认参数。无论如何，数据库中需要存在一个表来存储所有用户及其密码。`users`\
  \ 表不必只存储 `username` 和 `password` 字段；它还可以包含角色、权限、电子邮件等。你需要告诉 `Auth` 如何使用这些类型的元数据。\n\
  \n`users` 表已经内置于你的博客应用程序中。因为 `Auth` 组件会对所有密码进行哈希处理，所以你需要确保 `password` 字段有足够的空间来存储哈希值。还记得核心配置中的\
  \ `Security.salt` 值吗？`Auth` 组件会使用这个 salt 值来生成哈希值，因此在这个偏好设置中使用更复杂的字符串将提高密码的安全性。\n\
  \n准备好存储用户名和密码的 `users` 表后，你就可以在博客应用程序中实现 `Auth` 组件了。首先，让我们在 `Posts` 控制器中初始化一些参数。\n\
  \n##### 初始化变量\n\n需要设置几个参数才能使 `Auth` 正常工作。你可以在需要授权才能允许用户访问的控制器中，通过在其 `beforeFilter()`\
  \ 控制器方法中设置变量来指定这些参数。在这种情况下，你将需要阻止博客中某些编辑和删除操作，除非是已登录用户。在 `Posts` 控制器中，你需要告诉 `Auth`\
  \ 组件哪些操作是允许的，以及在成功登录后将用户重定向到哪里。清单 11-3 包含了 `Posts` 控制器的 `beforeFilter()` 方法。\n\n\
  **清单 11-3.** *`beforeFilter()` 方法中的一些 Auth 参数*\n\n```\nfunction beforeFilter() {\n\
  \    $this->Auth->loginAction = array('controller'=>'users','action'=>'login');\n\
  \    $this->Auth->allow('index','view');\n    $this->Auth->redirectLogin = array('controller'=>'posts','action'=>'add');\n\
  }\n```\n\n注意在清单 11-3 中，每个类变量都像典型的 PHP 变量一样被设置。在第 3 行，我使用了 `allow` 函数来告诉 `Auth` 组件哪些操作不需要身份验证即可访问。你不需要指定\
  \ `login` 和 `logout` 操作；否则会干扰 `Auth` 组件；它会自动假定这些功能对所有人都是可访问的。\n\n现在，`Auth` 组件已在控制器中被调用，并且\
  \ `beforeFilter()` 方法为 `Auth` 设置了一些参数；`Auth` 将根据你指定的内容检查每个操作。如果请求的操作不被允许，`Auth`\
  \ 将要求用户登录才能访问，这在清单 11-3 的第 2 行中指定。在这种情况下，用户将被重定向到 `Users` 控制器中的 `Login` 操作（该操作尚未创建）。如果用户请求\
  \ `Posts` 控制器中的 `Index` 和 `View` 操作，则不会运行 `Auth`。\n\n下一步是在 `Users` 控制器中创建 `Login`\
  \ 操作。由于 `Auth` 组件几乎完成了所有工作，你只需要创建包含用户名和密码字段的视图即可。\n\n#### 哈希密码\n\n因为 `Auth` 组件要求存储的密码必须是哈希过的，所以设置用户密码可能有些棘手。使用\
  \ `Auth` 的 `password()` 函数，你可以传入一个字符串，`Auth` 将返回哈希值。同样的哈希过程将应用于用户作为密码提交的任何内容，并与数据库中的内容进行比较，因此你需要存储用户密码的哈希版本，而不是明文版本。\n\
  \n我使用以下行包含了一个密码生成器：\n\n```\n$this->set('password',$this->Auth->password($this->data['User']['password']));\n\
  ```\n\n当然，在视图中，我需要提供一个包含名为 `password` 的输入字段的表单才能使其工作，以及一个用于显示 `Auth->password()`\
  \ 返回值的视图。如果站点其他地方的某个表单视图创建了新用户帐户，则在保存密码时必须使用 `Auth->password()` 函数。\n\n##### 登录\n\
  \n只要用于渲染登录表单的视图命名得当（即其名称与 `beforeFilter()` 函数中设置的参数相对应），`Auth` 组件就会自动检查 `$this->data`\
  \ 数组中的用户名和密码，并使用 `userModel` 和 `fields` 设置来验证它。清单 11-4 显示了 `Users Login` 操作的视图文件。\n\
  \n**清单 11-4.** *`app/views/users/login.ctp` 文件*\n\n```\n<h1>Log In</h1>\n<? if ($session->check('Message.auth'))\
  \ $session->flash('auth');?>\n<?=$form->create('User',array('action'=>'login'));?>\n\
  <?=$form->input('username');?>\n<?=$form->input('password',array('type'=>'password'));?>\n\
  <?=$form->end('Login');?>\n```\n\n足够简单——`Login` 视图包含一个表单，用于渲染 `username` 和 `password`\
  \ 的输入字段，并将其提交到 `Login` 操作。如果有任何错误（例如不匹配），它们将在第 2 行使用 `flash` 函数显示。\n\n要完成登录过程，你只需要准备好\
  \ `Users` 控制器。清单 11-5 显示了包含 `login` 函数的 `Users` 控制器的内容。\n\n**清单 11-5.** *`Users`\
  \ 控制器中的 `Auth` 组件*\n\n```\n<?\nclass UsersController extends AppController {\n \
  \   var $name = 'Users';\n    var $components = array('Auth');\n\n    function beforeFilter()\
  \ {\n        $this->Auth->allow('*');\n    }\n\n    function login() {\n    }\n\
  }\n?>\n```\n\n你可以看到 `Login` 方法是空的。这是因为 `Auth` 组件为你处理了一切；你只需要指定该操作，以便 Cake 正确地渲染\
  \ `Login` 视图。第 7 行显示了在 `Auth->allow()` 函数中使用星号。这告诉 `Auth` 组件允许当前控制器中的所有操作。\n\n\n\
  \n##### 确保用户控制器正常工作\n\n在`Users`控制器成功集成`Auth`组件并提供了`Login`操作和视图后，`Auth`现在可以为`Posts`控制器管理认证了。尝试编辑一篇文章，你会注意到`Auth`组件要求你先登录。\n\
  \n##### 退出登录\n\n让用户退出登录比登录更加简单。只需在`Users`控制器中添加`Auth->logout()`函数即可，如清单 11-6 所示。\n\
  \n**清单 11-6.** *用户控制器中的退出操作*\n\n```\nfunction logout() {\n    $this->redirect($this->Auth->logout());\n\
  }\n```\n\n现在，每当用户请求`http://localhost/blog/users/logout`时，`Auth`组件就会将其退出登录，并删除会话。用户需要重新登录才能访问被限制的操作。\n\
  \n##### 检查用户角色\n\n`Auth`组件可以检查用户的角色，以判断其是否为管理员。为此，你需要在`users`表中再添加一个字段：`role`。请参见清单\
  \ 11-7。\n\n**清单 11-7.** *在`users`表中添加`role`字段的 SQL 查询语句*\n\n```\nALTER TABLE users\
  \ ADD `role` varchar(50) DEFAULT 'user'\n```\n\n由于`Auth`组件默认不检查用户角色，你需要运行自己的登录流程。首先，在`Posts`控制器中，你必须告诉`Auth`组件不要执行其默认逻辑：\n\
  \n```\n$this->Auth->authorize = 'controller';\n```\n\n这行代码本质上告诉`Auth`在当前控制器中查找名为`isAuthorized()`的操作。在这个函数中，你将运行自己的授权逻辑；如果它返回`true`，则用户被授权，以此类推。现在让我们创建`isAuthorized()`函数来检查用户角色。请参见清单\
  \ 11-8。\n\n**清单 11-8.** *`Posts`控制器中的`isAuthorized()`函数*\n\n```\nfunction isAuthorized()\
  \ {\n    if ($this->Auth->user('role') == 'admin') {\n        return true;\n   \
  \ } else {\n        return false;\n    }\n}\n```\n\n第 2 行执行检查。通过使用`Auth->user()`函数并传入值`role`，你告诉`Auth`查找名为`role`的字段，并检查它是否包含`admin`。如果用户在`users`表中没有被赋予`admin`角色，那么他将无权访问除`Index`和`View`操作之外的任何内容。\n\
  \n同样的检查也可以在模型中而不是控制器中完成。不要将`Auth->authorize`设置为`controller`，而是将其设置为`model`。然后在模型中而不是控制器中运行`isAuthorized()`函数。该函数需要包含`$user`、`$controller`和`$action`参数才能在模型中工作（参见清单\
  \ 11-9）。\n\n**清单 11-9.** *`Post`模型中的`isAuthorized()`函数*\n\n```\nfunction isAuthorized($user,\
  \ $controller, $action) {\n    if ($user['User']['role'] == 'admin') {\n       \
  \ return true;\n    } else {\n        return false;\n    }\n}\n```\n\n`$user`数组将包含`Auth`组件检索到的用户名和密码匹配的用户记录，因此第\
  \ 2 行使用此数组而不是`Auth->user()`函数。检查用户角色的两种方法都有效；遵循模型大于控制器的约定意味着大多数情况下你会在模型中检查用户角色。\n\
  \n##### 使用其他 Auth 参数和函数\n\n以下是可以与`Auth`组件一起使用的其他参数列表。它们用于定制`Auth`管理用户登录、会话和认证的方式。\n\
  \n- **`deny( actions )`**  \n  `actions`：用逗号分隔的操作列表，访问这些操作需要认证，否则将被拒绝\n\n- **`hashPasswords(\
  \ data[array] )`**  \n  `data`：接收数组中名为`password`的键所赋的值，并返回其哈希后的等价形式\n\n- **`$userModel\
  \ = 'User';`**  \n  用于自定义存储用户的表名。默认设置为`User`。  \n  请确保使用模型名称，而不是表名（例如，`bloggers`表在此应设置为`Blogger`）。\n\
  \n- **`$fields = array('username'=>'username','password'=>'password');`**  \n  此数组可以更改，以反映用户名字段和密码字段的自定义名称。\n\
  \n- **`$loginAction = array('admin'=>false,'controller'=>'users','action'=>'login');`**\
  \  \n  将此数组中的键设置为其他控制器或操作，可以告诉`Auth`在哪里运行`Login`操作。可以通过将`admin`设置为`true`来使用管理员路由（参见第\
  \ 10 章）及其后续操作。\n\n- **`$loginRedirect = array('controller'=>'users','action'=>'index');`**\
  \  \n  此参数告诉`Auth`在成功登录后将用户重定向到哪里。\n\n- **`$loginError = 'Login failed. Invalid\
  \ username or password.';`**  \n  登录出错时显示的错误消息可以在此处自定义。\n\n- **`$autoRedirect =\
  \ true;`**  \n  如果你将此参数设置为`false`，`Auth`组件在用户认证后将不会自动重定向。在成功认证后，可以在`Login`操作中运行其他检查，例如写入信息、检查\
  \ Cookie 内容或检查其他会话变量。\n\n- **`$ajaxLogin = null;`**  \n  在进行基于 Ajax 的登录时，将此首选项设置为登录失败时应显示的视图文件。\n\
  \n##### 会话\n\n`Session`组件处理读取、写入、启动和销毁会话的各种方法。\n\n一些设置可以被操作，以更改 Cake 在核心配置中保存会话的方式。核心配置文件中的`Session.save`参数包含三种可选值：`php`、`cake`和`database`。默认情况下，此值设置为`php`，这意味着会话将根据主机当前的\
  \ PHP 设置进行保存。将其设置为`cake`将告诉 Cake 将会话信息写入`app/tmp`文件夹中的临时文件。第三种选项`database`要求数据库中有一个表，该表具有相应的字段，Cake\
  \ 可以在其中保存会话信息。生成此表所需的 SQL 语句可以在`app/config/sql/session.sql`文件中找到。只需在你的数据库中运行此文件，就会创建一个名为`cake_sessions`的默认表，其中包含存储会话数据所需的所有字段。`Session`组件将使用的其他会话设置遵循`Session.save`的首选项，并且相当直观。\n\
  \n##### 读取和写入会话变量\n\n使用`Session`组件在会话中读取和写入变量非常简单。在控制器中，当然在实例化`Session`组件之后，你可以通过使用`create()`函数指定一个会话名称来创建一个新会话：\n\
  \n```\n$this->Session->create('User');\n```\n\n现在，在应用程序的任何地方，都可以通过使用`read()`函数读取此会话：\n\
  \n```\n$user = $this->Session->read('User');\n```\n\n此函数将生成一个遵循典型 Cake 数组结构的数组，允许你通过调用键来提取任何你想存储在会话中的内容：\n\
  \n```\n$password = $user['password'];\n```\n\n写入会话同样简单。使用`write()`函数，提供会话名称和值即可：\n\
  \n```\n$this->Session->write('User', $locale);\n```\n\n##### 删除和销毁会话\n\n`delete()`和`destroy()`函数允许你停止存储会话信息或完全终止一个会话。使用`delete()`时，提供你想要移除的会话键的名称。这不会完全销毁整个会话，而只会删除与提供的键关联的数据。\n\
  \n另一方面，`destroy()`函数会移除当前用户的所有会话；它等同于 PHP 的`session_destroy()`函数。\n\n#### Cookie\n\
  \n\n  \n# Cookie 组件  \n\n编写 `Cookie` 时，`Cookie` 组件简化了这一过程。与 `Session` 组件非常相似，`Cookie`\
  \ 组件在用户的系统上创建新的 cookie，检查 cookie，并对其进行读写操作。为了确保 `Cookie` 组件正常工作，请在设置该组件时提供必要的参数。\
  \  \n\n## 设置 Cookie 组件  \n\n运行此组件需要三个变量：`cookieName`、`cookieKey` 和 `cookieDomain`。它们分别告诉\
  \ `Cookie` 组件：  \n\n-   cookie 的名称  \n-   用于加密写入 cookie 信息的字符串  \n-   有权访问该 cookie\
  \ 的域名  \n\n其他 `Cookie` 组件首选项包括：  \n\n-   `cookiePath`：服务器上存储 cookie 的路径；默认设置为整个域名\
  \  \n-   `cookieSecure`：一个布尔值，默认为 `false`；告诉组件是否通过安全连接保存 cookie  \n-   `cookieTime`：cookie\
  \ 过期前的秒数；默认值为 `0`，这意味着关闭浏览器时 cookie 将过期  \n\n这些设置在控制器中作为类属性被调用，如下所示：  \n\n```\n\
  var $cookieName = 'super_duper_cookie';\nvar $cookieKey = '$%sdkj29KA9Ne@@uxlqW';\n\
  var $cookieDomain = 'www.domain_name.com';\nvar $cookieTime = 5400;\n```\n\n## 写入\
  \ Cookie  \n\n使用 `write()` 函数将信息存储在 cookie 中非常简单，并且与 `Session->write()` 函数类似。函数中的第一个值是\
  \ cookie 的键，第二个值包含要写入的值。请记住，该值将使用 `cookieKey` 首选项进行加密。  \n\n```\n$this->Cookie->write('User',$user_agent);\n\
  ```\n\n## 读取 Cookie  \n\n就像 `Session` 组件一样，使用 `read()` 函数读取 cookie：`$user = $this->Cookie->read('User');`。只要\
  \ cookie 尚未过期，该信息就应该可用。  \n\n## 删除 Cookie  \n\n使用 `del()` 函数删除 cookie。提供要删除的 cookie\
  \ 的名称，组件将为您删除该 cookie：  \n\n```\n$this->Cookie->del('User');\n```\n\n# 电子邮件组件  \n\
  \n网站最常见的任务之一是向用户发送自动电子邮件。无论是电子商务网站还是用于传播信息的营销工具，自动电子邮件在网络上都有广泛的应用。但它们实现起来可能很繁琐，尤其是在使用\
  \ PHP 的 `mail()` 函数处理 HTTP 标头时。`Email` 组件提供了一种在您的 Cake 应用程序中使用布局和视图发送电子邮件的方法，而不是在脚本或控制器中编写长长的电子邮件文本字符串。\
  \  \n\n## 设置电子邮件布局  \n\n`Email` 组件区分 HTML 和纯文本电子邮件。要为每种类型创建布局，您必须在 `app/views/layouts/email`\
  \ 目录中创建文件夹。HTML 布局存储在名为 `html` 的文件夹中，纯文本布局存储在 `text` 文件夹中。  \n\n在每个文件夹中，创建一个 `default.ctp`\
  \ 文件，其中包含围绕 `$content_for_layout` 变量的必要布局标记。例如，HTML 布局可能包含以下内容：  \n\n```\n<!DOCTYPE\
  \ XHTML PUBLIC \"-//W3C//DTD XHTML 1.0 strict//EN\">\n<html>\n<body>\n<?=$content_for_layout;\
  \ ?>\n</body>\n</html>\n```\n\n纯文本布局可能只需要 `$content_for_layout` 变量本身。  \n\n## 发送电子邮件\
  \  \n\n在发送电子邮件的控制器操作中，为 `Email` 组件提供一些设置，然后运行 `send()` 函数来发送电子邮件。可用的设置包括：  \n\n\
  -   `$to`  \n-   `$cc`  \n-   `$bcc`  \n-   `$replyTo`  \n-   `$from`  \n-   `$sendAs`\
  \  \n-   `$subject`  \n\n您会注意到，这些参数不言自明，对应于典型的电子邮件设置。`$sendAs` 设置告诉 `Email` 组件如何发送电子邮件，可以是\
  \ `html` 或 `text`。  \n\n假设您想在某个控制器的 `email()` 操作中发送一条基本消息。它可能如下所示：  \n\n```\nfunction\
  \ email() {\n    $this->Email->to = 'foo@bar.com';\n    $this->Email->cc = 'another@email.com';\n\
  \    $this->Email->replyTo = 'me@sender.com';\n    $this->Email->from = 'do-not-reply@domain.com';\n\
  \    $this->Email->subject = 'Basic Email Greeting';\n    $this->Email->send('Glad\
  \ to see you');\n}\n```\n\n在 `send()` 函数中传递的文本是要发送的电子邮件的正文。  \n\n## 使用电子邮件消息模板 \
  \ \n\n创建电子邮件模板并通过它发送内容，而不是在控制器中提供内容，这很简单。制作存储在带键文件夹中的元素以创建电子邮件模板。  \n\n例如，一个基本的纯文本模板将存储在\
  \ `app/views/elements/email/text/hello.ctp` 文件中，并且可能包含以下内容：  \n\n```\nHello! This\
  \ message is from <?=$sender;?>.\n```\n\n然后，在 `email()` 函数中，如果需要，您可以设置 `$sender`\
  \ 变量：  \n\n```\nfunction email() {\n    $this->Email->to = 'foo@bar.com';\n    $this->Email->cc\
  \ = 'another@email.com';\n    $this->Email->replyTo = 'me@sender.com';\n    $this->Email->from\
  \ = 'do-not-reply@domain.com';\n    $this->Email->subject = 'Basic Email Greeting';\n\
  \    $this->set('sender','Me, Myself, and I');\n    $this->Email->template = 'hello';\n\
  \    $this->Email->send();\n}\n```\n\n请注意，通过使用 `set()` 函数，您可以向模板文件中的 `$sender` 变量传递一个值。您还告诉了\
  \ `Email` 组件在发送消息时要使用哪个模板；在这种情况下，您需要将模板文件命名为 `hello.ctp`。  \n\nHTML 模板可以像 Cake 中的其他视图一样工作，并且可以引用网站上存储的图像；请记住对任何图形使用绝对\
  \ URL，因为用户的电子邮件客户端在打开电子邮件时将无法获取相对路径。  \n\n# 其他组件  \n\nCake 的内置组件无疑减少了运行常见 Web 应用程序方法所需的代码量。它不仅包括前面讨论的组件，还包括其他更高级的组件：ACL（代表“访问控制列表”）、`RequestHandler`\
  \ 和 `Security` 组件。  \n\n## ACL 组件  \n\n构建 Web 应用程序最复杂的方法之一是对多用户进行访问控制。`Auth` 组件负责处理简单的身份验证，但如果您想为用户及其访问级别设置多个层级呢？或者，更好的是，动态更改用户在整个站点中的权限呢？这种更复杂的为分配用户区域系统需要访问控制列表，该列表概述了谁有权访问站点中哪些区域的树或矩阵。`ACL`\
  \ 组件通过一系列函数和方法简化了这种类型的用户管理。  \n\n## RequestHandler 组件  \n\n该组件有助于管理 HTTP 请求和获取更多客户端信息。诸如\
  \ SSL 检测、读取 HTTP 请求的类型以及使用唯一的 MIME 类型进行响应等功能，使 `RequestHandler` 拥有强大的能力，能让您的 Web\
  \ 应用程序对多种类型的用户可访问。例如，可以使用 `RequestHandler` 管理 Web 服务，这允许其他 Web 站点访问信息并与您的应用程序通信。`RequestHandler`\
  \ 还可以将信息输出为 `text/html` 之外的 MIME 类型，这使您的应用程序甚至可以在非浏览器的客户端应用程序中工作。  \n\n## Security\
  \ 组件  \n\n\n\n### 安全组件\n\n`Security`组件提供了加强 Web 应用程序安全性并避免漏洞的方法。与`Auth`组件配合使用时，`Security`可以提供额外的机制来检查用户身份验证，并能根据用户与应用程序的交互方式显示更复杂的错误信息。你可以要求特定操作仅在\
  \ SSL 安全请求下执行，或通过此组件对字符串进行哈希处理。通过坚持使用安全的方法构建应用程序，并运行`Security`组件来保护网站，你可以更有效地阻止未经授权的入侵或其他攻击。\n\
  \n### 工具类\n\n如前所述，组件服务于控制器根据自身动作和流程可能需要的特定目的或功能。组件自身使用或在 Cake 核心库中使用的其他类函数，可以执行更多可在控制器或自定义组件中使用的功能。这些函数存放在工具类中，并通过`App::import()`函数在应用程序的任何位置访问。Cake\
  \ 中提供了几个内置工具类，但假设不会分发第三方工具，因为这些类深藏在核心库内部，且原则上不应对应用程序进行修改。若要创建自己的工具类，你需要创建第三方供应商文件，并通过`App::import()`将它们引入应用程序（详见第\
  \ 12 章，了解 Cake 供应商的概念及如何在 Cake 应用程序中安装它们）。通常，只有当你尝试将第三方软件整合到应用程序中时，才需要自行编写工具类；否则，解决方案通常在于构建\
  \ Cake 的资源文件之一，如辅助器或组件。\n\n#### 配置\n\n`Configure`工具负责存储全局变量。这类变量通常存储在核心配置文件中，并可在整个\
  \ Cake 应用程序中访问。\n\n##### 读取和写入全局变量\n\n正如你在核心配置文件中看到的，常量或全局变量通过`Configure::write()`函数设置。第一个参数是变量名，第二个参数是赋予的值。\n\
  \n```\nConfigure::write('Site.title','My Favorite Web Site');\n```\n\n要读取这些全局变量，只需像这样使用`Configure::read()`函数：`$title\
  \ = Configure::read('Site.title');`\n\n`Configure::read()`函数可以在控制器、模型或视图中调用。\n\n\
  #### 文件与文件夹\n\n`File`和`Folder`工具在服务器上读写文件或列出文件夹内容文件名时特别有用。它们还可用于设置文件夹和文件权限，或删除文件和文件夹。与`Configure`工具不同，`File`和`Folder`工具必须通过`App::import()`函数导入到使用它们的控制器或模型中，并通过实例化一个新的类对象来使用。\n\
  \n要使`File`和`Folder`工具正常工作，必须提供服务器上文件或文件夹的路径。如清单 11-10 所示，你可以对代表文件的这个对象执行多项操作。以下各节列出了其中一些操作。\n\
  \n**清单 11-10.** *导入工具并实例化类对象*\n\n```\nApp::import('Core','File');\n$file =& new\
  \ File('path/to/file');\n```\n\n##### 读取文件\n\n`read()`函数提取文件内容：\n\n```\n$contents\
  \ = $file->read();\n```\n\n##### 创建新文件\n\n如果为实际不存在的文件实例化了`File`对象，你可以使用`create()`函数在服务器上创建一个新的空白文件：\n\
  \n```\n$file->create();\n```\n\n##### 写入文件\n\n`write()`函数将内容写入文件。\n\n\n\n`$file->write($filedata);`\n\
  \n`write()` 函数默认使用 PHP 的 `w` 模式。`w` 模式会覆盖文件中原有的内容。PHP 中 `fwrite()` 函数使用的其他模式可以作为第二个参数提供。例如，参数\
  \ `a` 允许将内容附加到文件中：\n\n```php\n$file->write($filedata, 'a');\n```\n\n### 更改文件和文件夹权限\n\
  \n使用 `Folder` 工具，您可以在文件和文件夹上运行 `chmod` 命令。`Folder` 工具的实例化方式与 `File` 工具相同：\n\n```php\n\
  App::import('Core', 'Folder');\n$folder =& new Folder();\n```\n\n可以通过 `chmod()`\
  \ 函数更改新的 `$folder` 对象的权限：`$folder->chmod('/path/to/folder', 0777);`\n\n也可以使用其他权限值。`chmod()`\
  \ 函数还可以通过 `recursive` 参数递归应用权限。该函数的最后一个特性是 `exceptions` 参数；如果有任何文件或文件夹不应接收这些权限，可以通过在数组中指定它们的名称来跳过它们。\n\
  \n```php\n$folder->chmod('/path/to/folder', 0777, true, array('nested_1', 'nested_3'));\n\
  ```\n\n### 读取文件夹内容\n\n当 `Folder` 工具被实例化时，可以提供一个路径：\n\n```php\n$folder =& new Folder('/path/to/folder');\n\
  ```\n\n该工具可以通过使用 `read()` 函数返回一个包含此文件夹内容的数组：\n\n```php\n$folder->read();\n```\n\n\
  ### 读取文件夹树状结构\n\n要获取嵌套目录或包含每个目录中文件的树的数组，只需像这样使用 `tree()` 函数：\n\n```php\n$folder->tree();\n\
  ```\n\n### 复制、创建和删除文件夹\n\n您可以使用 `Folder::copy()` 函数将文件夹的内容复制到服务器上的另一个区域。请注意，此函数需要一个包含某些参数的数组：\n\
  \n```php\n$folder->copy(array('to' => '/path/to/new/folder'));\n```\n\n当然，`$folder`\
  \ 对象代表当前文件夹。\n\n创建新文件夹的方式与 `File` 工具类似，使用 `Folder::create()` 函数。第二个参数设置新文件夹的权限值：\n\
  \n```php\n$folder->create('/path/for/new/folder', 0755);\n```\n\n删除文件夹也很容易。只需运行\
  \ `delete()` 函数，如果权限允许，Cake 将删除该目录：\n\n```php\n$folder->delete('/folder/to/be/deleted');\n\
  ```\n\n### 计算文件夹大小\n\n要查找当前文件夹的文件大小（以字节为单位），只需运行 `dirsize()` 函数：\n\n```php\n$folder->dirsize();\n\
  ```\n\n### 在文件夹中查找文件\n\n按文件名搜索文件可能很棘手，但使用 `Folder` 工具则不然。要在文件夹中搜索，只需向 `find()` 函数提供一个正则表达式，它将返回当前目录中所有匹配文件的数组：\n\
  \n```php\n$results = $folder->find('title(.*).pdf');\n```\n\n### HTTP Socket\n\n\
  在运行 HTTP 请求或构造标头时，`HTTP Socket` 工具就派上用场了。与其他工具一样（掌握这个要领了吗？），它通过 `App::import()`\
  \ 在控制器或模型中导入。\n\n```php\nApp::import('Core', 'HttpSocket');\n$http =& new HttpSocket();\n\
  ```\n\n#### 发起 HTTP 请求\n\n`HTTP Socket` 工具最有用的特性之一是其请求处理。不要与 `RequestHandler` 组件混淆，`HTTP\
  \ Socket` 可以执行 HTTP 请求的细节工作，例如 GET 和 POST。\n\n要使用 `HTTP Socket` 工具运行 POST，首先创建一个包含\
  \ POST 变量的数组。数组中的键对应于 HTML 输入元素的 `name` 属性，值则匹配 `value` 属性。\n\n```php\n$post = array('username'\
  \ => 'cakeuser', 'password' => 'somehashedpassword');\n```\n\n然后，使用 `HttpSocket::post()`\
  \ 函数，将该数组传递到特定的 URL：\n\n```php\n$result = $http->post('http://domain.com/', $post);\n\
  ```\n\n成功的 POST 将返回 `true`；失败的 POST 将返回 `false`。\n\n\n\nGET 方法也可通过 HTTP Socket 工具执行。序列化的\
  \ GET 名称和值组通常附加到 URL 字符串上，因此在使用 `HttpSocket::get()` 函数时，你可以将 GET 查询作为第二个参数提供。GET\
  \ 响应的内容会返回给变量，因此如果服务器返回了一些 HTML、错误信息或 HTTP 标头，它们都将以返回字符串的形式出现。\n\n`$response = $http->get('http://domain.com/');`\n\
  \n要抓取其他网站的页面或执行其他 HTTP 请求，请使用 `HttpSocket::request()` 函数。该函数将执行一个 HTTP 请求，并返回原始的服务器响应，无论它是一个网页还是其他文本。\n\
  \n`$response = $http->request('http://domain.com/web_page.html');`\n\n### 使用其他 HTTP\
  \ Socket 函数\n\nHTTP Socket 工具中的其他函数包括 `buildHeader()`、`buildRequestLine()`、`buildUri()`、`decodeBody()`、`delete()`、`parseHeader()`、`parseUri()`、`put()`\
  \ 等。在考虑如何为你的网站执行 HTTP 请求或 socket 方法时，请查阅此工具，它很可能包含有用的函数，能最大限度地减少你需要编写的代码量。\n\n###\
  \ 本地化与国际化\n\n对于拥有国际受众的网站来说，翻译网站内容可能比较困难。近年来，一些重要的本地化（L10n）和国际化（I18n）标准已在 Web 及其他软件系统中得到实施。Cake\
  \ 利用 L10n 和 I18n 的标准和方法，并通过各自的工具来实现。\n\n> **注意** `L10n` 和 `I18n` 中的“10”和“18”分别代表单词\
  \ *localization* 和 *internationalization* 首尾字母之间的字母数量。（开发者经常使用这些术语，以至于拼写出完整单词耗时过长。）Cake\
  \ 的工具类使用这些缩写形式命名，而非全称，因此本地化工具类在核心中被命名为 `L10n`，而非 Localization。\n\n### 使用区域设置文件\n\
  \n要本地化一个网站，或者说，使网站内容符合访问者的语言、数字系统、货币及其他标准，请使用 `L10n` 工具。例如，如果西班牙的用户需要使用该应用程序，你可能需要将一些重要的标题、按钮、链接及其他字符串翻译成西班牙语。为此，你必须首先为\
  \ `L10n` 设置西班牙语地区或地区文件，以便在翻译中使用。\n\n地区文件存储在 `app/locale` 目录中，并按语言或地区命名的子文件夹进行组织。`L10n`\
  \ 使用的名称和字符串符合 ISO 639–2 标准（更多信息，请咨询作为该标准官方注册机构的美国国会图书馆：[`www.loc.gov/standards/iso639-2/`](http://www.loc.gov/standards/iso639-2)）。地区文件使用\
  \ `.po` 文件扩展名，并按地区组织。\n\n默认情况下，Cake 包含了英语区域文件夹 `app/locale/eng`。在它里面，你会看到另一个子文件夹\
  \ `LC_MESSAGES`，其中包含用于翻译字符串和消息的地区文件。对于你想要本地化的每种语言，创建一个 `default.po` 文件并将其存储在其区域文件夹中。例如，对于西班牙语，你不仅需要为\
  \ `app/locale/eng/LC_MESSAGES` 目录创建 `default.po` 文件，还需要为 `app/locale/spa/LC_MESSAGES`\
  \ 文件夹创建一个。下一步是在这些区域文件中写入你想要翻译的字符串。\n\n### 翻译字符串\n\n通过使用两个键：`msgid` 和 `msgstr`，翻译字符串变得非常简单。在\
  \ `default.po` 区域文件中，为每一行提供其中一个键及其关联值。例如，在英语区域文件中，你可以包含清单 11-11 的内容。\n\n**清单 11-11.**\
  \ *英语区域文件内容示例*\n\n```\nmsgid\n\"home\"\nmsgstr\n\"Welcome to Our Site\"\n\nmsgid\
  \ \"contact\"\nmsgstr\n\"Contact Us\"\n\nmsgid\n\"login\"\nmsgstr \"Log In\"\n```\n\
  \n\n\n\n`\"logout\"`\n\n`msgstr` `\"Log Out\"`\n\n只要其他语言区域包含相同的 `msgid` 值，L10n 工具就可以根据区域设置获取对应的\
  \ `msgstr` 值。默认区域设置在核心配置的 `Config.language` 中定义。该值默认设为英语，但可以更改为任何区域。当 L10n 查找 `msgid`\
  \ 键时，它会首先访问 `Config.language` 设置中指定的区域。\n\n对应的西班牙语区域设置如下所示：\n\n`msgid`\n\n`\"home\"\
  `\n\n`msgstr` `\"Bienvenidos a Nuestro Sitio\"`\n\n`msgid` `\"contact\"`\n\n`msgstr`\n\
  \n`\"Contactarnos\"`\n\n`msgid`\n\n`\"login\"`\n\n`msgstr` `\"Ingresar\"`\n\n`msgid`\n\
  \n`\"logout\"`\n\n`msgstr`\n\n`\"Salir\"`\n\n### 本地化内容\n\n一旦区域文件就位，本地化内容就很简单了。首先，像其他工具一样实例化\
  \ `L10n` 工具类：\n\n```\nApp::import('Core','L10n');\n$l10n =& new L10n();\n```\n\n\
  然后，运行 `L10n::get()` 函数来告知控制器本地化时应使用哪个区域。\n\n现在，便利函数 `__()` 中包含的所有内容都将在区域文件中进行查找。\n\
  \n```\n$l10n->get('spa');\n__('home');\n```\n\n前面的几行代码将输出 `msgid` 值为 `home` 所对应的\
  \ `msgstr`。如果你想将返回的本地化字符串作为原始数据传递而不回显，请将 `escape` 参数设置为 `true`：\n\n```\n$form->error('Post.title',__('postTitleError',true));\n\
  ```\n\n### 数据清洗\n\n`Sanitize` 工具包含用于清理数据和文本的函数。使用 `Sanitize` 工具可以去除空白、HTML 标签以及对脚本和样式表的引用，还可以对\
  \ SQL 文本进行转义。\n\n请记住，首先使用 `App::import()` 实例化 `Sanitize` 工具，并将其作为类对象分配给控制器或模型使用：\n\
  \n```\nApp::import('Core','Sanitize');\n$sanitize =& new Sanitize();\n```\n\n`Sanitize`\
  \ 可以通过 `stripTags()` 函数从文本块中去除 HTML 标签：`$this->set('output',$sanitize->stripTags($output,array('<p>','<em>','<div>')));`\
  \ 其他函数包括 `clean()`、`escape()`、`html()`、`stripImages()`、`stripScripts()` 和 `stripWhitespace()`。如果你需要清理数据、文本或\
  \ SQL 查询，请查阅 `Sanitize` 工具。\n\n### 第三方组件\n\nCake 内置的组件和工具在扩展控制器和模型的功能方面非常有帮助。通过\
  \ Cake 的开源服务 CakeForge（[www.cakeforge.org](http://www.cakeforge.org)）和 Bakery（[`bakery.cakephp.org`](http://bakery.cakephp.org)），还可以在线获得更多组件。\n\
  \n这些第三方组件涵盖了各种功能，可以减少你需要编写的代码量。运行组件时，请务必遵循开发者提供的说明，这些说明通常假定你知道如何安装组件（在之前的“使用组件”部分已介绍过）。Bakery\
  \ 上可用的第三方组件包括 Twitter、Image Resizer、LastRSS、SMS Text、Authorize.net AIM Integration\
  \ 和 Yahoo! Weather。\n\n在尝试自己编写冗长的控制器流程之前，先搜索一下组件，可能会获得极佳的结果。\n\n### 创建自定义组件\n\n\
  创建你自己的自定义组件很简单，并遵循前面章节展示的模式。所有组件都存储在 `app/controllers/components` 目录中，并遵循 Cake 的命名方案。如果你想安装自己的工具，则需要将它们作为供应商文件安装，因为工具存储在\
  \ Cake 核心中。\n\n基本组件文件的文件名与其类名匹配。与控制器类一样，这些文件名采用驼峰式命名并带有 `.php` 扩展名。请参见列表 11-12。\n\
  \n**列表 11-12.** *存储在`components`目录下的基本组件文件，命名为* `blog.php`\n\n```\n<?\nclass BlogComponent\
  \ extends Object {\n\n}\n?>\n```\n\n该组件包含类似控制器的函数。由于这些函数由非组件（即控制器）调用，它们将运行 `return()`\
  \ 函数来发送输出。这些函数也可以带有参数。\n\n### 使用初始化函数和 Startup 函数\n\n要在调用控制器的函数之前（例如控制器中的 `beforeFilter()`\
  \ 函数）运行逻辑，请使用 `initialize()` 函数。此函数可以包含在处理组件函数之前运行的任何逻辑。\n\n有时组件函数需要访问其父控制器，即当前正在调用它的控制器。像\
  \ `$this->data` 和 `$this->params` 这样的属性，以及控制器当前正在使用的任何其他属性，都可以被拉取到组件中。通过使用 `startup()`\
  \ 函数，你可以向组件提供控制器对象，从而让任何组件函数都能访问其父控制器。请参见列表 11-13。\n\n**列表 11-13.** *组件中的* `startup()`\
  \ *函数*\n\n```\nfunction startup(&$controller) {\n    $this->data = $controller->data;\n\
  }\n```\n\n如列表 11-13 所示，控制器中 `$this` 对象下的任何内容都作为 `$controller` 提供给组件。你可以设置一个组件类变量来包含控制器对象：\n\
  \n```\nvar $controller = null;\n```\n\n然后使用 `startup()` 函数实例化控制器对象。这样，控制器中的所有函数都可以使用\
  \ `$this->controller` 来访问父控制器中的任何内容。\n\n```\nfunction startup(&$controller) {\n\
  \    $this->controller = $controller;\n}\n```\n\n现在，在一个占位函数中，你可以从父控制器中拉取参数并在组件中使用它们：\n\
  \n```\nfunction test() {\n    $params = $this->controller->params;\n    $data =\
  \ $params['data'];\n    return $data;\n}\n```\n\n#### 编写供应商文件而非组件\n\n请记住，组件背后的理念是共享跨控制器的可移植函数代码。理论上，你应该能够分发任何组件，并且它应该适用于任何\
  \ Cake 应用，无论该应用是如何设计的。如果代码不符合 CakePHP 框架或 MVC 模型，那么你应该创建供应商文件，而不是组件。通过遵守这一标准，你可以确保其他\
  \ Cake 开发者能够从你的工作中受益，反之亦然。\n\n与助手一样，组件旨在减少控制器中多余的代码。\n\n当控制器开始看起来比模型更臃肿时，你通常需要寻找方法将更多代码迁移到模型中。当代码在多个控制器之间共享时，你可能需要考虑将该逻辑放入组件中，并使代码比在特定控制器或\
  \ Cake 应用中更具可移植性。从长远来看，你的网站将组织得更好、更整洁、更轻量——这些总是值得多花一步功夫的好理由。\n\n### 总结\n\n\n\n####\
  \ 组件\n\n组件对控制器的扩展，就像辅助器对视图的扩展一样。它们为控制器提供了一组特定于某种整体方案的功能和方法，并且其设计考虑了可移植性。换句话说，如果你正确地构建了组件，就应该能够分发它们，供任何\
  \ Cake 应用程序使用。在本章中，我讨论了如何在控制器中包含一个组件类，以及如何使用它的功能。你使用 `Auth` 组件在你的博客应用程序中编写了一些用户身份验证方法，以更好地保护网站的区域，并限制普通用户的访问。本章还解释了如何将\
  \ Cake 的实用工具类集成到你的应用程序中。其中许多类压缩了执行某些典型 Web 任务（如读写文件和文件夹）所需的时间和代码。我概述了一些其他的实用工具类，并讨论了供应商文件、实用工具和组件之间的一些重要区别。在第\
  \ 12 章中，我将更详细地介绍供应商以及如何在你的 Cake 项目中使用它们。\n\n# 供应商\n\n使用 Cake 的好处之一是它构建于 PHP 之上，而\
  \ PHP 是 Web 开发中最流行的语言之一。来自全球各地的数千名开发者积极地为可用的 PHP 类和脚本库做出贡献，这使得使用 PHP 具有优势。然而，选择框架的\
  \ PHP 开发者面临的一个主要问题是，如何移植现有项目，或者如何在框架中使用他们花费大量时间开发的自己的类。\n\nPHP 使用 `include()` 和\
  \ `require()` 函数来引用外部脚本或多个文件。为什么不直接运行其中一个来实现外部脚本呢？再次强调，Cake 的“约定优于配置”原则适用。Cake 不仅关心提供快捷方式和自动化典型的\
  \ Web 函数，还关心命名和排列各种应用程序资源的方式。Cake 建议，与其随意包含文件，不如将任何第三方脚本或非 Cake 对象组织为供应商。\n\n###\
  \ 使用供应商\n\n简单来说，*供应商* 是某种类型的非 Cake 脚本。例如，假设你想包含一个你在互联网上找到的、能简化生成 CAPTCHA 图片的、炫酷的\
  \ PHP 类脚本。你可以假设该开发者在构建该脚本时并没有特别考虑 CakePHP，因此它的函数和类的结构不适合在 Cake 中工作。没问题——你只需将该脚本作为供应商引入应用程序。\n\
  \n第一步是将 PHP 脚本放入 `app/vendors` 文件夹。通过这样做，你可以让 Cake 应用程序使用该脚本，同时将所有供应商文件集中在一个地方。\n\
  \n你不需要重命名文件以符合 Cake 的约定。\n\n接下来，在你想要使用该脚本的控制器、模型或视图中包含该文件的内容。你可以使用 `App::import()`\
  \ 函数来实现这一点（参见列表 12-1）。\n\n**列表 12-1.** *包含一个供应商*\n\n```php\n<?php\n\nApp::import('Vendor','some_captcha_script.php');\n\
  ```\n\n请注意，在列表 12-1 中，第一个参数是 `Vendor`；这告诉 Cake 导入一个供应商文件。此外，我包含了标准的 PHP 起始行 `<?php`，以强调此函数被调用的位置：在任何类声明之前。因此，如果列表\
  \ 12-1 出现在 `Posts` 控制器中，那么 `App::import()` 函数将出现在类声明之前：\n\n```php\n<?php\n\nApp::import('Vendor','some_captcha_script.php');\n\
  \nclass PostsController extends AppController { …\n```\n\n最后，你可以像使用 `include()`\
  \ 函数引入的脚本一样，通过简单地调用其函数或类，在控制器或视图中使用供应商的内容（参见列表 12-2）。\n\n**列表 12-2.** *在控制器中使用供应商函数的示例*\n\
  \n```php\n<?php\n\nApp::import('Vendor','some_captcha_script.php');\n\nclass PostsController\
  \ extends AppController {\n\nfunction index() {\n\n$captcha = new someCaptchaClass();\n\
  \n$captcha_image = $captcha->generateImage();\n\n$this->set(compact('captcha','captcha_image'));\n\
  \n}\n\n}\n?>\n```\n\n请记住，列表 12-2 是一个基础示例，需要在视图中做更多工作才能正常运行。但你可以看到供应商在第 2 行被导入，其类对象在第\
  \ 5-6 行被引入到控制器中。\n\n在没有类对象的情况下使用供应商函数也同样简单。假设 `some_captcha_script.php` 的内容只包含一个函数：\n\
  \n```php\nfunction cleanAmpersands($text=null) {\n\nreturn str_replace('&','&amp;',$text);\n\
  \n}\n```\n\n然后，在操作方法中，像在普通的 PHP 脚本中一样使用该函数：\n\n```php\nfunction view($id=null) {\n\
  \n$post = $this->Post->read(null,$id);\n\n$text = cleanAmpersands($post['Post']['contents']);\n\
  \n$this->set(compact('post','text'));\n\n}\n```\n\n通过供应商系统引用外部脚本非常有用，尤其是当你想要使用那些并非构造成\
  \ Cake 函数的现有脚本时。使用 `App::import()` 函数可以使这项任务变得简单，保持供应商的组织性，并管理到供应商文件的路径。\n\n###\
  \ 处理文件名\n\n`App::import()` 函数不仅仅用于包含供应商。其他 Cake 核心类对象也可以使用此函数引入到控制器或视图中。正因为如此，`App::import()`\
  \ 会执行一些默认方法，这些方法会影响你指定要包含在应用程序中的供应商文件的方式。只要指定的名称全部小写并且与文件名完全匹配，Cake 就会根据名称自动包含供应商文件。这意味着你必须使用全小写字母来指定供应商。如果文件名是大写、首字母大写、驼峰式大小写或任何非全小写的形式，则供应商不会被自动包含，并且需要提供更多参数。\n\
  \n`App::import('Vendor','Title');` //不会引入文件 `Title.php`\n\n如果供应商文件在某个文件夹中或包含任何大写字母，则你必须使用参数数组手动指定文件名。要将\
  \ `Title.php` 引入控制器，你必须在参数数组中传递文件名，或者重命名文件本身：\n\n`App::import('Vendor','title',array('file'=>'Title.php'));`\n\
  \n### 处理嵌套文件夹\n\n假设你要导入到应用程序中的供应商有一个内部文件夹结构，为了使其正常工作，需要保留该结构。只要提供的路径格式正确，`App::import()`\
  \ 函数也可以处理这些文件夹中的供应商。请记住，所有路径都相对于 `app/vendors` 目录。\n\n`App::import('Vendor','title',array('file'=>'my_vendors/title.php'));`\n\
  \n上面这行代码将包含 `app/vendors/my_vendors/title.php` 文件，供应用程序使用。\n\n### 不对第三方脚本做任何假设\n\
  \n关于供应商，有一点很重要：Cake 对供应商*不做任何假设*。这样做首先会与在 Cake 应用程序中使用供应商的初衷相矛盾。换句话说，你在 Cake 应用程序中使用供应商的主要原因，可能是利用\
  \ Cake 本身无法处理的某个特性、方法或任务。因此，如果你将一个执行 Cake 无法理解方法的第三方脚本引入 Cake，那么你必须接受，如果出现问题，Cake\
  \ 无法提供帮助。\n\n\n\n### 在 CakePHP 中引入和使用第三方库\n\n简而言之，引入第三方库是一种机制，让您能够灵活地将外部资源引入应用程序，而不受框架限制；但作为一个框架，Cake\
  \ 无法代为管理第三方库的局限性。因此，Cake 提供的用于支持第三方库的函数和方法，实际上仅限于将其引入应用程序。从那里开始，要让第三方库正常工作，就需要理解该库本身的具体构造，以及它如何与\
  \ Cake 交互。\n\n此外，不能期望命名约定、设计模式以及 MVC 结构能延伸到第三方库中。如果您需要执行控制器逻辑，就应该在控制器或组件中编写代码，而不是在第三方库中。我曾与一位初学\
  \ Cake 的开发者交流过，他试图通过将所有内容编写为第三方库文件，并只引入一两个 Cake 资源，来绕过学习 Cake 的函数和结构。这不仅首先就违背了使用\
  \ Cake 的目的，而且还导致在调试第三方库文件上浪费更多时间。\n\n如果您想要分发一个用 Cake 构建的资源，您可能希望保持其原样，而不是将其作为第三方库发布。换句话说，如果您编写的是一个辅助类，那么就将其作为辅助类提供给其他开发者；他们能更好地理解您编写该脚本的意图，更重要的是，他们会知道如何在自己的应用程序中使用它。第三方库最适合用于那些独立于\
  \ CakePHP 开发、并在各种应用中广泛使用的库或其他脚本。\n\n### 单向脚本\n\n关于第三方库的另一个重要点是，Cake 以单向方式支持它们。第三方库文件本身不能使用\
  \ Cake 的辅助函数、类对象或其他资源。尝试将诸如 Ajax 辅助之类的功能引入第三方库，会遇到更多问题，并且需要大量改造才能实现。与此相关的问题是显而易见的；强制第三方库改变其行为，会抵消使用\
  \ Cake 的便利性。关于第三方库可以谈很多，仅仅是因为经常有 Cake 新手会从“包含文件”的角度思考，而不是反过来。所以，请记住——Cake 可以使用第三方库的功能，但第三方库不能使用\
  \ Cake 的功能。第三方库的数据是单向流动的，而不是双向的。\n\n### 安装第三方脚本\n\n既然我已经介绍了引入第三方库的基础知识，那么让我们在您的博客应用程序中使用一个第三方脚本。与其从头构建一个维基引擎，不如选择众多开源文本解析引擎之一：Textile。\n\
  \n首先，获取一份 Textile 的副本，可从 [`textile.thresholdstate.com`](http://textile.thresholdstate.com)\
  \ 获取。\n\n在本教程中，我将使用 2.0 版本。下载并解压文件后，您会找到名为 `classTextile.php` 的主引擎文件。将此文件放入博客应用程序的\
  \ `app/vendors` 文件夹中。\n\n#### 引入 Textile\n\n通过使用 `App::import()` 函数来引入第三方库（参见清单\
  \ 12-3），使 `Posts` 控制器能够使用 `classTextile.php` 文件的内容。请确保将这一行放置在 `Posts` 控制器类实例化行之前。由于文件名并非全小写，您必须在参数数组中指定文件名。\n\
  \n**清单 12-3.** *将 Textile 作为第三方库引入*\n\n```php\n<?\nApp::import('Vendor','textile',array('file'=>'classTextile.php'));\n\
  class PostsController extends AppController {\n…\n```\n\n现在 Textile 已被引入 `Posts`\
  \ 控制器中，视图就可以使用它的函数来解析文章内容了。在控制器中引入的第三方库将在视图中可用，因此您无需在控制器中添加其他内容。现在，由于一切都依赖于第三方库本身，并且\
  \ Cake 无法为第三方脚本提供约定，因此这个过程可能需要根据所使用的第三方库而改变。当任何类型的文本需要按照维基风格的解析器在浏览器中渲染时，Textile\
  \ 就派上用场了。因此，这个第三方库实际上会在视图渲染数据库提供的内容时在视图中执行。\n\n#### 实例化并运行 Textile\n\n在 `app/views/posts/view.ctp`\
  \ 文件中，通过插入清单 12-4 到第 1 行，来启动一个新的 `Textile` 类实例。\n\n**清单 12-4.** *启动一个新的 Textile\
  \ 类*\n\n```php\n<? $textile = new Textile();?>\n```\n\n得益于 `Posts` 控制器和清单 12-4，`classTextile.php`\
  \ 中的类对象函数现在可以在视图中使用了。Textile 提供了 `TextileThis()` 函数，用于通过其引擎过滤最终文本，并解析其独有的维基风格命令。\n\
  \n第 6 行现在包含了通过 `$post['Post']['content']` 变量传递来的文章内容。让我们通过用以下行替换第 6 行，来通过 Textile\
  \ 的 `TextileThis()` 函数运行这个变量：\n\n```php\n<?=$textile->TextileThis($post['Post']['content']);?>\n\
  ```\n\n#### 使用 Textile 撰写文章\n\n现在 Textile 已经在您的应用程序中运行了，您可以在撰写博客文章时使用它的语法，轻松添加一些文本格式化的点缀。由于\
  \ Textile 作用于最终输出，您无需在其他“添加”或“编辑”操作中做任何修改；只需在输入文本时遵循其语法，一切就应该能正确显示。\n\n要测试您的 Textile\
  \ 实现，可以尝试在博客文章中添加一些使用 Textile 维基命令的内容。例如，在单词周围加下划线会得到用 `<em>` 标签包裹该单词的结果，等等。\n\n\
  ### 在 CakePHP 中使用其他框架\n\n使用 PHP 框架时，最复杂的方面之一可能是如何将其集成到运行着多个框架的大型企业级应用程序中。您可能熟悉一些其他的\
  \ Web 框架；您甚至可能在尝试 Cake 之前就实验过几个。如何将另一个框架与 Cake 结合使用的问题，有时是所有关注点中最重要的。\n\n由于不能假定这些框架与\
  \ Cake 完全兼容，因此核心中并未安排或包含使用它们的约定。要将它们引入应用程序，您必须逐个项目地处理；每个框架自身的工作方式都截然不同，并且肯定需要一套独特的参数和方法才能与\
  \ Cake 协同工作。\n\n#### Zend Framework\n\n最流行的 PHP 框架之一是 Zend Framework（[`framework.zend.com`](http://framework.zend.com)）。您可能需要利用它的函数来构建\
  \ Web 应用程序。为此，您必须在 Cake 应用程序中将 Zend Framework（简称 Zend 或 ZF）作为第三方库来使用。\n\n**ZEND\
  \ 还是 ZF？**\n\n在提及 Zend Framework 时有一些细微差别。创建该框架的*公司*叫 Zend，而该*框架*的官方名称是 Zend Framework。在其网站和其他地方，为了避免与公司名称混淆，该框架通常简称为\
  \ ZF。然而在本节中，我倾向于避免使用缩写，所以我将坚持使用 Zend 来同时指代公司和框架。请注意，当您在网络上查阅 Zend Framework 的资料时，可能需要比仅使用公司名称更具体一些。\n\
  \n\n\n幸运的是，对于 Cake 开发者来说，Zend 更像是一组库（按照 Zend 开发者的习惯，称之为**组件**）而非一个 MVC 框架。它的每个组件都可以通过包含（include）的方式引入到独立的\
  \ PHP 应用程序中。如前所述，将这些组件作为供应商（vendor）使用，可以让您将 Zend 集成到 Cake 应用中。每个组件都有自己特定的安装步骤，您需要查阅\
  \ Zend 的支持网站和文档来了解这些步骤。但在 Cake 中安装 Zend 组件的一般步骤将在以下各节中说明。首先，让我们看看您的博客应用程序中是否可以使用\
  \ Zend 提供的任何功能。\n\n### 在评论添加操作中屏蔽垃圾信息\n\nZend 的竞争优势之一是其 Web 服务库。从 1.5 版本开始，Zend\
