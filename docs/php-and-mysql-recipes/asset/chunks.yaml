    Recipe 2-9\. Instantiation of Classes


    Problem


    When objects are instantiated or destroyed it’s sometimes necessary to run code
    to perform the initialization of the object or to clean up connections to resources,
    etc.


    Solution


    Classes in PHP have two special functions called __construct() and __destruct()
    . Note the two underscores before the name. These functions are optional. If they
    are defined they will be executed when the new operator or when the object is
    removed with the unset() function, when the variable that contains the object
    is assigned a new value or when it is destroyed automatically when the script
    ends.


    Constructors can take any number of parameters but destructors can’t have any
    parameters.


    CHAPTER 2 ■ CLASSES AND OBJECTS


    How it Works


    Each time a class is instantiated to an object the system will call the constructor
    method of the class to initialize the object. It is not required for a class to
    have a constructor, if no special initialization is needed.


    The constructor is defined with the special method name __construct() .


