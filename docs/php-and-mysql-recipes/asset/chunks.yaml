  trans: "\n# 解决方案\n\n我们可以使用 `ImageCrop()` 函数来代替 `ImageScale()` 函数。这是一个相对较新的函数（PHP\
    \ 5.5.0 和 PHP 7.0.0）。如果你使用的是旧版本的 PHP，可以使用 `ImageCopyResampled()` 来实现相同的结果。该函数用于将一个图像的矩形区域复制到另一个图像（或同一图像）的矩形区域，并对像素进行重采样，以使复制结果尽可能平滑。\n\
    \n`ImageCrop()` 函数接受两个参数。第一个参数是原始图像的图像资源，第二个参数是一个包含四个值的数组，分别表示要返回区域的 `x`、`y`、`width`\
    \ 和 `height`。坐标 `x`、`y` 从图像的左上角开始计算。\n\n## 工作原理\n\n如果我们使用与之前相同的图像，但希望将其裁剪并缩放到适合\
    \ 150x150 像素的盒子中，首先需要计算要裁剪哪一侧，然后计算从原始图像中复制的 `x`、`y`、`width` 和 `height`。\n\n当我们有一个正方形图像时，它可以被缩放到所需尺寸。假设原始图像的宽度和高度都大于\
    \ 150 像素。本例中没有对此进行检查，但可以轻松添加。对于已经适合盒子大小的图像，无需进行裁剪。\n\n```\n<?php\n// 8_4.php\n\
    \n$size = [150, 150];\n\n$orig = GetImageSize('IMG_0099.JPG');\n\n$a1 = $orig[0]\
    \ / $size[0];\n$a2 = $orig[1] / $size[1];\n\nif ($a1 < $a2) {\n    $width = $size[0]\
    \ * $a1;\n    $height = $size[1] * $a1;\n    $x = 0;\n    $y = ($orig[1] - $height)\
    \ / 2;\n}\nelse {\n    $width = $size[0] * $a2;\n    $height = $size[1] * $a2;\n\
    \    $x = ($orig[0] - $width) / 2;\n    $y = 0;\n}\n\n$area = ['x' => $x, 'y'\
    \ => $y, 'width' => $width, 'height' => $height];\n$img = ImageCreateFromJpeg('IMG_0099.JPG');\n\
    $crop = ImageCrop($img, $area);\n$thumb = ImageScale($crop, $size[0], $size[1]);\n\
    \nheader('Content-Type: ' . $orig['mime']);\n\nswitch ($orig[2]) {\n    case IMG_JPG\
    \ :\n    case IMG_JPEG :\n        ImageJPEG($thumb);\n        break;\n    case\
    \ IMG_PNG :\n        ImagePNG($thumb);\n        break;\n    case IMG_GIF :\n \
    \       ImageGIF($thumb);\n        break;\n}\n\nImageDestroy($thumb);\nImageDestroy($crop);\n\
    ImageDestroy($img);\n```\n\n在这个例子中，我们最终在脚本末尾需要释放三个图像资源。此代码生成的图像现在是一个包含图像中心的正方形。\n\
    \n![Image 15](img/index-207_1.jpg)\n\n如果你使用的是旧版本的 PHP，或者希望少用一个图像资源，可以使用 `ImageCopyResampled()`\
    \ 函数来实现相同的结果。\n\n```\n<?php\n// 8_5.php\n\n$size = [150, 150];\n\n$orig = GetImageSize('IMG_0099.JPG');\n\
    \n$a1 = $orig[0] / $size[0];\n$a2 = $orig[1] / $size[1];\n\nif ($a1 < $a2) {\n\
    \    $width = $size[0] * $a1;\n    $height = $size[1] * $a1;\n    $x = 0;\n  \
    \  $y = ($orig[1] - $height) / 2;\n}\nelse {\n    $width = $size[0] * $a2;\n \
    \   $height = $size[1] * $a2;\n    $x = ($orig[0] - $width) / 2;\n    $y = 0;\n\
    }\n\n$img = ImageCreateFromJpeg('IMG_0099.JPG');\n$thumb = ImageCreateTrueColor($size[0],\
    \ $size[1]);\n\nImageCopyResampled($thumb, $img, 0, 0, $x, $y, $size[0], $size[1],\
    \ $width, $height);\n\nheader('Content-Type: ' . $orig['mime']);\n\nswitch ($orig[2])\
    \ {\n    case IMG_JPG :\n    case IMG_JPEG :\n        ImageJPEG($thumb);\n   \
    \     break;\n    case IMG_PNG :\n        ImagePNG($thumb);\n        break;\n\
    \    case IMG_GIF :\n        ImageGIF($thumb);\n        break;\n}\n\nImageDestroy($thumb);\n\
    ImageDestroy($img);\n```\n\n在这个例子中，我们创建了一个新的空白图像，并将原始图像中调整大小后的区域复制到这个图像上。`ImageCopyResampled()`\
    \ 函数需要跟踪 10 个参数，包括目标图像和源图像，以及两个图像的 `x`、`y`、`width` 和 `height`。\n\n## 技巧 8-4. 图像旋转\n\
    \n### 问题\n\n手机拍摄的图像可能是纵向或横向（或介于两者之间）。有时，根据拍照时手机的握持方式，图像甚至会出现上下颠倒的情况。\n\n手机软件和一些图像查看程序可以利用图像中的元数据在显示时纠正这个问题。但浏览器通常不支持这种操作。当用户从手机上传图像时，他们可能希望在调整大小或裁剪之前旋转图像。\n\
    \n### 解决方案\n"
- fmt: '# Image Rotation


    `Images` can be rotated any number of degrees with the use of the `ImageRotate()`
    function. The rotation is measured anticlockwise. If you want to rotate an image
    90 degrees clockwise, either use `-90` or `270` degrees as the rotation angle.
    As most of the image functions, this one also takes an image resource as the first
    parameter. After that, the angle of rotation is followed by the color to use in
    any areas that are no longer covered by the image, and finally an optional parameter
    to ignore transparent values.


    The center of the rotation is the center of the original image. The rotated image
    might have different image dimensions compared to the original. If you rotate
    a square image 45 degrees, you will end up with an image that is 1.41 times larger
    in both directions. If you rotate an image 180 degrees, you will end up with an
    image with the exact same dimensions.


    ## How it Works


    The following example shows how to rotate an image 30 degrees. The background
    color of the new areas of the image is set to black.


    ```php

    <?php


    // 8_6.php


    $orig = GetImageSize(''IMG_0099.JPG'');


    $img = ImageCreateFromJpeg(''IMG_0099.JPG'');


    $thumb = ImageRotate($img, 30, 0);


    header(''Content-Type: '' . $orig[''mime'']);


    switch ($orig[2]) {


    case IMG_JPG :


    case IMG_JPEG :


    ImageJPEG($thumb);


    break;


    case IMG_PNG :


    ImagePNG($thumb);


    break;


    case IMG_GIF :


    ImageGIF($thumb);


    break;


    }


    ImageDestroy($thumb);


    ImageDestroy($img);

    ```


    ---


    # Recipe 8-5. Image Flip


    ## Problem


    In the previous recipe, we discussed how to rotate an image to correct for different
    camera orientations. What if you need to create a copy of the image that is the
    mirror image horizontally or vertically?


    ## Solution


    This can be handled with the `ImageFlip()` function.


    > **Note:** This function is only available if the GD extension is compiled with
    the bundled version of `libgd`.


    The `ImageFlip()` function can flip the image horizontally, vertically, or both,
    although flipping in both directions would be the same as a 180-degree rotation.


    ### How it Works


    `ImageFlip()` takes two parameters. The first is an image resource, and the second
    is the flip direction. This can be one of the predefined constants: `IMG_FLIP_HORIZONTAL`,
    `IMG_FLIP_VERTICAL`, or `IMG_FLIP_BOTH`.


    ```php

    <?php


    // 8_7.php


    $orig = GetImageSize(''IMG_0099.JPG'');


    $img = ImageCreateFromJpeg(''IMG_0099.JPG'');


    ImageFlip($img, IMG_FLIP_HORIZONTAL);


    header(''Content-Type: '' . $orig[''mime'']);


    switch ($orig[2]) {


    case IMG_JPG :


    case IMG_JPEG :


    ImageJPEG($img);


    break;


    case IMG_PNG :


    ImagePNG($img);


    break;


    case IMG_GIF :


    ImageGIF($img);


    break;


    }


    ImageDestroy($img);

    ```


    The `ImageFlip()` function works slightly differently compared to the copy and
    rotate functions. This function does not create a copy of the image; it simply
    flips the image in place (in memory. The file is not changed). No need to destroy
    extra copies at the end of the script.


    ---


    # Recipe 8-6. Adding a Watermark


    ## Problem


    If you are a photographer and want to show high-resolution images on your website,
    you might want to protect the images by adding a watermark. The same technology
    can be used if you are selling images for use on other websites and you want to
    prevent the buyer from using images from your catalog pages without paying. In
    either case, it is always a good idea to keep the original image, create a new
    copy when the files are uploaded, and add the watermark to that image.


    ## Solution


    Watermarks can be as simple as adding a string of text somewhere on top of the
    image, but it can also be an image that is overlaid on top of the image. Adding
    text will be covered in Recipe 8-10. This recipe will cover the merging of two
    images into one.


    In Recipe 8-3, we discussed image cropping and the use of the function `ImageCopyResampled()`
    to copy and resize a section of one image onto another image. We can use the same
    function to copy a small image onto a larger image.


    ### How it Works'
