    => ''display'', ''home'')); The previous line is the base route for the application.
    It connects URL elements to the Pages controller’s Display action and sends the
    value home as a parameter to be used in the action. By specifying another controller
    and action, you can change the base route so that, by default, the home page is
    other than the Pages controller’s Display action.


