    # 欢迎阅读《*Beginning PHP and PostgreSQL E-Commerce: From Novice to Professional*》


    互联网零售业的爆炸式增长，正在鼓励更多中小型企业考虑建立电子商务网站的优势。尽管在线零售有着显著且明显的优势，但在开发零售网站时，您也可能遇到许多隐藏的陷阱。本书为您提供了一份实用、循序渐进地建立电子商务网站的指南。本书将引导您完成设计和构建过程的每一步，让您能够快速、轻松地构建高质量、可扩展的电子商务网站。


    通过本书的学习，您将掌握所有必要的技能，让您的业务上线并面向全球受众。我们通过贯穿全书的一个案例研究来呈现这些信息，随着您在书中知识的增长，案例的复杂性也会逐步提升。


    该案例研究分为三个阶段。第一阶段侧重于以低成本尽快让网站上线运行。虽然功能尚不完善，但在此阶段结束时，您的网站将能够接受 PayPal 付款，使您能够立即开始创收。


    第二阶段侧重于通过改善购物体验来提高收入。在本阶段，您将学习如何通过实施产品推荐来主动鼓励客户购买更多商品。我们还将通过开发和集成自定义购物车功能，为处理信用卡交易奠定基础。


    在第三阶段，我们将向您展示如何通过自动化和简化订单处理与管理，以及自行处理信用卡交易来降低成本，从而提高利润率。您还将学习如何通过 Web 服务集成外部功能，以及如何通过添加产品评论功能来改善客户的购物体验。


    ## 本书读者对象


    《*Beginning PHP and PostgreSQL E-Commerce: From Novice to Professional*》面向那些寻求教程式方法，以构建一个从设计到部署的完整电子商务网站的开发者。不过，前提是您已具备使用
    PHP 和 PostgreSQL 构建网站的一些基础知识。由 W. Jason Gilmore 和 Robert Treat 合著的《*Beginning
    PHP and PostgreSQL 8: From Novice to Professional*》（Apress，2006）可以为您提供这些基础知识。


    对于喜欢通过实例学习，并希望亲身体验 PHP 5 开发技术的 PHP 4 开发者来说，本书也极具价值。


    xvii


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XFM.qxd 11/22/06 4:43 PM Page xviii **xviii**


    ■ 前言


    ## 本书结构


    本书分为三部分，共 17 章和 2 个附录。我们涵盖了广泛的主题，向您展示如何：


    - 构建一个可浏览和搜索的在线产品目录

    - 实现目录管理页面，允许添加、修改和删除产品、类别和部门

    - 使用 PHP 创建您自己的购物篮和结账流程

    - 通过实施产品推荐和产品评论来增加销售额

    - 使用 PayPal、DataCash 和 Authorize.net 处理付款

    - 实现客户账户系统

    - 通过 Web 服务集成外部功能


    以下简要路线图展示了我们将如何就上述列表中的每个主题，带您从新手走向专家。


    ### 第一部分：开发第一阶段


    **第 1 章：启动电子商务网站**


    在本章中，我们将介绍现实世界中电子商务的一些原则。您将看到关注短期收入和降低风险的重要性。我们将探讨电子商务网站盈利的三种基本方式。然后，我们将这些原则应用于一个三阶段计划，该计划在本书的每个阶段都提供一个可交付、可用的网站。


    **第 2 章：奠定基础**


    第一章概述了现实世界中的电子商务。既然您已决定开发一个网站，我们将更详细地探讨为其未来发展奠定基础。我们将讨论您将使用哪些技术和工具，更重要的是，您将如何使用它们。


    **第 3 章：创建产品目录：第一部分**


    在了解了三层架构并实现了网站主页的一部分之后，是时候继续您的工作，开始创建 HatShop 产品目录了。


    由于产品目录由许多组件构成，您将分两章来创建它。在第 3 章中，您将创建第一个数据库表并实现数据访问代码。到本章结束时，您的网页上将会有动态生成的内容。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XFM.qxd 11/22/06 4:43 PM Page xix


    ■ 前言


    **第 4 章：创建产品目录：第二部分**


    乐趣还没有结束！在上一章中，您为 HatShop 创建了一个可选择的部门列表。然而，产品目录远不止是一个部门列表。在第 4 章中，您将添加其余的产品目录功能。


    **第 5 章：搜索目录**


    在前两章中，您将为 HatShop 实现一个功能性的产品目录。但是，该网站仍然缺少至关重要的搜索功能。本章的目标是让访问者通过输入一个或多个关键字来搜索网站上的产品。您将学习如何实现搜索结果排名，以及如何逐页浏览搜索结果页面。您将看到通过将新组件集成到现有架构中，为现有网站添加新功能是多么容易。


    **第 6 章：使用 PayPal 接收付款**


    让我们开始赚钱吧！您的电子商务网站需要一种从客户那里接收付款的方式。成熟公司的首选解决方案是开设一个商家账户，但许多小企业选择从更易于实施的解决方案开始，这样他们就不必自己处理信用卡或支付信息。


    有许多公司和网站可以帮助那些没有资源处理信用卡和电汇交易的个人或小企业。这些公司可用于处理企业与客户之间的支付。在本章中，我们将演示其中一家公司 PayPal
    提供的部分功能，因为我们将在开发的前两个阶段在 HatShop 网站上使用它。


    **第 7 章：目录管理**


    在启动网站之前需要处理的最后一个细节是创建其管理界面。尽管这是访问者永远不会看到的部分，但它对于为客户交付一个高质量的网站仍然至关重要。


    ### 第二部分：开发第二阶段


    **第 8 章：购物车**


    从本章开始，您将进入开发的第二阶段，在此阶段，您将开始改进已存在的、功能完善的电子商务网站并为其添加新功能。在第 8 章中，您将实现自定义购物车，它将数据存储在本地数据库中。这为您提供了比
    PayPal 购物篮更高的灵活性，因为您无法控制 PayPal 购物篮，也无法将其保存到数据库中进行进一步处理和分析。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


