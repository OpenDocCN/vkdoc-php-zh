    ## 访问产品并将其显示在屏幕上


    你已经学习了用于与 MySQL 服务器建立连接以及打开数据库以执行操作的函数。你还学习了在指定数据库上执行 SQL 查询的过程。如清单 3-1 所示的 `allitemslist.php`
    脚本，使用这些函数从 `products` 表中访问产品信息，并以表格形式将其显示在屏幕上。


    **清单 3-1.** 用于显示 `products` 表中项目的 `allitemslist.php` 脚本


    ```

    <html>

    <head>

    </head>

    <body>

    <?php

    $connect = mysqli_connect("localhost", "root", "gold", "shopping") or die("请检查您的服务器连接。");

    $query = "SELECT item_code, item_name, description, imagename, price FROM products";

    $results = mysqli_query($connect, $query) or die(mysql_error());

    echo "<table border=\"0\">";

    $x=1;

    echo "<tr>";

    while ($row = mysqli_fetch_array($results, MYSQLI_ASSOC))  {

    if ($x <= 3)

    {

    $x = $x + 1;

    extract($row);

    echo "<td style=\"padding-right:15px;\">";

    echo "<a href=itemdetails.php?itemcode=$item_code>";

    echo ''<img src='' . $imagename . '' style="max-width:220px;max-height:240px;width:auto;height:auto;"></img><br/>'';

    echo $item_name .''<br/>'';

    echo "</a>";

    echo ''$''.$price .''<br/>'';

    echo "</td>";

    }

    else

    {

    $x=1;

    echo "</tr><tr>";

    }

    }

    echo "</table>";

    ?>

    </body>

    </html>

    ```


    这段代码首先以用户 `root` 身份连接到 MySQL 服务器，并选择 `shopping` 数据库。然后，编写一条 SQL 语句，用于检索 `products`
    表中的所有行。执行 SQL 查询，从 `products` 表中获取数据行，并将其赋值给 `$results` 数组。之后，借助 `while` 循环，每次从
    `$results` 数组中取出一行，并将产品信息以表格形式显示在屏幕上（参见图 3-1）。变量 `x` 用于确保每行显示三个产品。


    ![A978-1-4842-1672-9_3_Fig1_HTML.jpg](img/A978-1-4842-1672-9_3_Fig1_HTML.jpg)


    **图 3-1.** `products` 表中的所有项目及其图片一同显示


    为了链接到不同的网页，使用户能够从网站访问所需的信息，你需要创建一个下拉菜单。我们来看看如何实现。


    ## 创建下拉菜单


    假设你的网站销售电子产品、家居家具产品和书籍，那么下拉菜单需要提供指向这些产品分类的链接。同时，假设该网站销售智能手机、笔记本电脑、相机和电视，这些产品类别必须归在电子产品分类下。如清单
    3-2 所示的 `menu.php` 文件，定义了一个提供指向这些产品类别链接的下拉菜单。


    **清单 3-2.** 用于显示电子商务网站下拉菜单的 `menu.php` 脚本


    ```

    <!DOCTYPE html>

    <head>

    <meta charset="utf-8">

    <title>宾图在线集市</title>

    <link rel="stylesheet" href="css/style.css">

    </head>

    <body>

    <div class="container">

    <nav>

    <ul class="nav">

    <li><a href="index.php">首页</a></li>

    <li class="dropdown">

    <a href="index.php">电子产品</a>

    <ul>

    <li><a href="itemlist.php?category=CellPhone">智能手机</a></li>

    <li><a href="itemlist.php?category=Laptop">笔记本电脑</a></li>

    <li><a href="index.php">相机</a></li>

    <li><a href="index.php">电视</a></li>

    </ul>

    </li>

    <li class="dropdown">

    <a href="index.php">家居 & 家具</a>

    <ul class="large">

    <li><a href="index.php">厨房用品</a></li>

    <li><a href="index.php">卫浴用品</a></li>

