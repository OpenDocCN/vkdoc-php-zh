    ''language''=>''en-us''));?>


    <? foreach($posts as $post): ?>


    <?=$rss->item(null,$post);?>


    <? endforeach;?>


    </channel>


    The RSS helper here takes care of building the channel and the item tags automatically.


    You’ve passed the $post array that has been formatted correctly in the Post model,
    and now the process is complete. Open the new feed in any news aggregator, or
    use your browser to subscribe to the feed. You should end up with a valid RSS
    feed instead of an HTML page thanks to the router parsing the extension and the
    controller handling the request properly.


    **Custom Routes Exercise**


    This chapter explored some of the methods for building custom routes in Cake.
    For this exercise, construct a route that will display blog posts by their date
    and ID. Providing the correct route configuration is only half the problem; be
    sure to rebuild the View action to run the lookup correctly. Also build the admin
    route to handle editing and adding blog posts. You have completed the exercise
    correctly if posts are editable by accessing [http://](http://localhost/blog/admin/posts/edit)


    [localhost/blog/admin/posts/edit/{id}](http://localhost/blog/admin/posts/edit)
    rather than with the standard path to edit and add.


    **Summary**


    Rewriting URLs for the application is made much easier by editing Cake’s routing
    configuration file. Not only can you make URLs friendlier with the app/config/routes.php
    file, but you can even set up reverse routes, or routes that are dynamically mapped
    by the dispatcher; just use verbose linking syntax when creating links, and Cake
    will automatically change all URL


    strings for any controllers and actions you specify. The router also includes
    an admin routing feature with which you can attach a prefix to any action name
    and view file, and Cake will map URLs containing the prefix to these files. This
    is useful for distinguishing between CRUD


    actions that should be accessed only by an administrator and those that are available
    to a public user. For applications that create output as non-HTML files, the dispatcher
    can parse extensions. For instance, in this chapter I described how to use Cake
    to generate an RSS feed as an .rss file. When a URL containing the .rss extension
    is entered, the router detects this extension and maps the request accordingly.
    Now that you understand how to customize URLs and other paths in Cake, it’s time
    to explore more of Cake’s advanced features. In Chapter 11, I’ll explain components
    and utilities, which can dramatically enhance your Cake application and cut down
    on several web-related tasks.


