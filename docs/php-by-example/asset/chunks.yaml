  trans: '

    清单 6-9 使用了部分讨论过的函数。


    ```

    清单 6-9

    逐行读取文件

    ```


    要使该程序成功运行，必须在 `D:\books\php` 文件夹中存在一个包含一些文本的 `myfile.txt` 文件。在本例中，文本文件的内容如下。


    ```

    第聂伯河汹涌咆哮，

    狂风怒吼，肆虐疯狂，

    它将柳枝压弯到地面，

    又把巨浪推得如山高。

    塔拉斯·舍甫琴科

    ```


    文件的完整路径被写入 `$path` 变量。然后，`$h=fopen($path,"rt")` 命令尝试打开文件，如果成功，文件标识符被写入 `$h` 变量。接着，使用该变量即可访问文件。具体来说，可以逐行读取文件内容，并将读取的字符串显示在输出区域。每行前面都会加上其行号（用方括号括起来）。`$k`
    变量用于统计行数。


    传递给 `fopen()` 函数的第二个参数 `"rt"`，表示文件以字符流模式打开，且仅用于读取。


    | 详情 |

    | --- |

    | 如果尝试打开的文件不存在，则会出现错误。在这种情况下，可以使用 `$h=fopen($path,"rt") or die("文件访问错误")` 这样的命令来代替
    `$h=fopen($path,"rt")` 命令。这里使用了 `or` 逻辑运算符。它以简化的形式执行逻辑或运算：仅当第一个操作数 `$h=fopen($path,"rt")`
    的值为 `false` 时，才会计算第二个操作数 `die("文件访问错误")`。如果文件打开成功，第一个操作数不为零，相当于 `true`。在这种情况下，不会计算第二个操作数。如果无法打开文件，则会计算第二个操作数
    `die("文件访问错误")`，结果是在输出区域显示一条错误消息，并且代码执行停止。 |


    要读取文件内容，需要使用 `while` 循环语句。条件由 `!feof($h)` 表达式定义。`feof()` 函数用于判断传递给该函数的标识符所对应的文件是否已到达末尾。因此，如果未到达文件末尾，`!feof($h)`
    表达式的值为 `true`。


    在到达文件末尾之前，`$line=fgets($h)` 命令会使用 `fgets()` 函数将读取的行写入 `$line` 变量。然后，`echo "[$k]
    ",$line` 指令将读取的行显示在输出区域。最后，`$k++` 命令递增计数器变量 `$k` 的值。一旦到达文件末尾，该过程即终止。`fclose($h)`
    命令用于关闭文件。程序运行的结果如下。


    ```

    程序的输出（来自清单 6-9）

    [1] 第聂伯河汹涌咆哮，

    [2] 狂风怒吼，肆虐疯狂，

    [3] 它将柳枝压弯到地面，

    [4] 又把巨浪推得如山高。

    [5] 塔拉斯·舍甫琴科

    ```


    清单 6-10 展示了如何在程序中写入文件。


    ```

    清单 6-10

    写入文件

    ```


    程序执行的结果可能如下所示（用户输入的文本以粗体标记）。


    ```

    程序的输出（来自清单 6-10）

    正在写入文件。

    请输入文本。输入 exit 终止：

    第聂伯河汹涌咆哮，

    狂风怒吼，肆虐疯狂，

    它将柳枝压弯到地面，

    又把巨浪推得如山高。

    塔拉斯·舍甫琴科

    exit

    程序结束。

    ```


    但最重要的是，在 `D:\books\php` 文件夹中，会出现（如果原本不存在）一个名为 `mytext.txt` 的文件，其内容如下。


    ```

    [1] 第聂伯河汹涌咆哮，

    [2] 狂风怒吼，肆虐疯狂，

    [3] 它将柳枝压弯到地面，

    [4] 又把巨浪推得如山高。

    [5] 塔拉斯·舍甫琴科

    ```


    让我们弄清楚为什么会这样。也就是说，我们来分析一下这个程序。`$path` 变量与上一个例子一样，存储了打算写入文本的文件的完整路径。具体来说，就是 `D:\books\php`
    文件夹中的 `mytext.txt` 文件。使用 `$h=fopen($path,"wt")` 指令打开文件。第二个参数 `"wt"` 表示文件以字符流模式打开，用于写入。接下来，显示几条消息，然后借助
    `$line=trim(fgets(STDIN))` 命令读取用户输入的文本（该命令会预先丢弃所有前导和尾随的空格及特殊字符）。之后，启动 `while`
    循环语句，其中检查条件 `$line!=="exit"`。如果用户没有输入文本 `"exit"`，则该条件为真。


    > **注意**

    >

    > 因此，要终止输入过程，必须输入单词 `exit`。


    `fwrite($h,"[$k] ")` 命令将方括号内的行号写入文件，之后 `fwrite($h,$line."\n")` 命令将读取的字符串（附加上换行指令）添加到文件中。`$k++`
    指令更改计数器变量 `$k` 的值，然后 `$line=trim(fgets(STDIN))` 命令读取用户输入的下一行。最后，使用 `fclose($h)`
    指令关闭文件。

