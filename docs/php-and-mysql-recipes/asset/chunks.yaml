    CHAPTER 13 ■ CREATING AND USING FORMS


    Recipe 13-3\. Form Validation


    Problem


    HTML 5 supports a new attribute on the input field called required. Setting this
    attribute will prevent the browser from submitting the form if the input field
    is blank/empty. This can be an easy way to add some validation but it might not
    be enough. A field marked required will still allow the form to be submitted if
    the field contains a space. How can form validation be added on the client side?


    Solution


    The solution is to use JavaScript to traverse through all the (or a few selected)
    input fields and validate that the content is as expected before the form is submitted.
    This will not eliminate the requirement to do server-side validation. The client
    submitting the form might not be a browser or it could have JavaScript disabled
    causing the validation to fail.


    How it Works


    In order to use jQuery it’s necessary to have a way to identify the elements of
    the form. This can be done with the name of the form but it’s a simpler syntax
    if an id attribute is added to the form.


    <form id="cont" name="contact" method="POST" action="{$_SERVER[''PHP_SELF'']}">


    </form>


    To access this form via jQuery we use the selector ‘#cont’, indicating that all
    elements with an id=“cont” should be selected. If there are other elements with
    the same id adding the element type can reduce the number of elements selected.
    The selector ‘form#cont’ will select all elements of type form and with the id
    of cont.


    The next step is to find all the inputs for the form. This is done by expanding
    the selector to ‘form#cont


    :input’. This selector will select all inputs that are located inside of the form
    tag with the id of cont. Iterating over the elements and applying a validation
    rule to each of them could look like this:


