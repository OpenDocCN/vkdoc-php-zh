    ■**Tip** The -p argument to mkdir results in intermediate directories being created
    as required. That is, if the Templater directory doesn’t exist, it will be created
    before creating the plugins directory.


    We can now create the Templater class, in which we specify template_dir and compile_dir.


    Additionally, we must tell Smarty to look in the Templater/plugins/ directory
    for plug-ins (in addition to Smarty’s own plugins directory).


