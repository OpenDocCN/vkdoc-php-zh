  trans: "```php\nfunction myPrint($s) { echo $s; }\n\n$func = 'myPrint';\n$func('Hello');\
    \ // \"Hello\"\n```\n\n此行为不适用于内建语言结构，例如 `echo`。\n\n```php\necho('Hello');  //\
    \ \"Hello\"\n\n$func = 'echo';\n$func('Hello'); // error\n```\n\n## 可变类名\n\n与可变函数名类似，类也可以使用字符串变量来引用。此功能于\
    \ PHP 5.3 中引入。\n\n```php\nclass MyClass {}\n\n$classname = 'MyClass';\n$obj =\
    \ new $classname();\n```\n\n通过字符串和字符串变量访问代码实体的机制同样适用于类或实例的成员。\n\n```php\nclass\
    \ MyClass\n{\n  public $myProperty = 10;\n}\n\n$obj = new MyClass();\necho $obj->{'myProperty'};\
    \ // \"10\"\n```\n\n# 第 29 章\n\n![image](img/frontdot.jpg)\n\n# 错误处理\n\n错误即是代码中需要开发者修正的失误。当\
    \ PHP 中出现错误时，默认行为是在浏览器中显示错误消息。该消息包含文件名、行号和错误描述，以帮助开发者纠正问题。\n\n虽然编译错误和解析错误通常容易发现和修复，但运行时错误可能更难发现，因为它们可能仅在特定情况下发生，且原因超出开发者的控制。考虑以下尝试使用\
    \ `fopen` 函数打开文件进行读取的代码。\n\n```php\n$handle = fopen('myfile.txt', 'r');\n```\n\
    \n它依赖于所请求的文件始终存在的假设。如果由于任何原因，该文件不存在或无法访问，该函数将生成一个错误。\n\n```\nWarning: fopen(myfile.txt):\n\
    failed to open stream: No such file or directory in\nC:\\xampp\\htdocs\\mypage.php\
    \ on line 2\n```\n\n一旦检测到错误，就应该修正它，即使它只发生在异常情况下。\n\n## 修正错误\n\n有两种方法可以修正此错误。第一种方法是在尝试打开文件之前检查确认文件是否可读。PHP\
    \ 为此方便地提供了 `is_readable` 函数，如果指定文件存在且可读，则返回 true。\n\n```php\nif (is_readable('myfile.txt'))\n\
    \  $handle = fopen('myfile.txt', 'r');\n```\n\n第二种方法是使用错误控制运算符（`@`）。当将其置于表达式之前时，该运算符会抑制该表达式可能生成的任何错误消息。两种方法都可以去除警告。\n\
    \n```php\n$handle = @fopen('myfile.txt', 'r');\n```\n\n要确定文件是否成功打开，需要检查返回值。查阅文档¹，你会发现\
    \ `fopen` 在出错时返回 false。\n\n```php\nif ($handle === false)\n{\n  echo '未找到文件。';\n\
    }\n```\n\n如果不是这种情况，则可以使用 `fread` 函数读取文件内容。该函数从第一个参数给定的文件句柄中读取第二个参数指定的字节数。\n\n\
    ```php\nelse\n{\n  // 读取整个文件的内容\n  $content = fread($handle, filesize('myfile.txt'));\n\
    \n// 关闭文件句柄\n  fclose($handle);\n}\n```\n\n当不再需要文件句柄时，最好用 `fclose` 关闭它，尽管 PHP\
    \ 也会在脚本执行完毕后自动关闭文件。\n\n## 错误级别\n\nPHP 提供了几个内建常量来描述不同的错误级别。下表包含了一些比较重要的级别。\n\n\
    | 名称 | 描述 |\n|---|---|\n| `E_ERROR` | 致命运行时错误。执行被终止。 |\n| `E_WARNING` | 非致命运行时错误。\
    \ |\n| `E_NOTICE` | 关于可能错误的运行时通知。 |\n| `E_USER_ERROR` | 致命用户自定义错误。 |\n| `E_USER_WARNING`\
    \ | 非致命用户自定义警告。 |\n| `E_USER_NOTICE` | 用户自定义通知。 |\n| `E_COMPILE_ERROR` | 致命编译时错误。\
    \ |\n| `E_PARSE` | 编译时解析错误。 |\n| `E_STRICT` | 为确保向前兼容性而建议的更改。 |\n| `E_ALL` | 所有错误，但\
    \ PHP 5.4 之前的 `E_STRICT` 除外。 |\n\n前三个级别表示 PHP 引擎生成的运行时错误。以下是一些会触发这些错误的操作示例。\n\n\
    ```php\n// E_NOTICE – 使用未赋值的变量\n$a = $x;\n\n// E_WARNING – 缺少文件\n$b = fopen('missing.txt',\
    \ 'r');\n\n// E_ERROR – 缺少函数\n$c = missing();\n```\n\n## 错误处理环境\n\nPHP 提供了一些配置指令来设置错误处理环境。`error_reporting`\
    \ 函数设置 PHP 将通过内部错误处理器报告哪些错误。错误级别常量具有位掩码值。这允许使用位运算符将它们组合和减去，如下所示。\n\n```php\nerror_reporting(E_ALL\
    \ | ~E_NOTICE); // 除 E_NOTICE 外的所有错误\n```\n\n错误报告级别也可以在 `php.ini` 中永久更改。`php.ini`\
    \ 中的默认值因服务器而异，但对于 XAMPP 服务器，它设置为显示所有错误消息。这是在开发过程中的良好设置，可以通过在脚本开头放置以下代码行来以编程方式设置。注意添加了\
    \ `E_STRICT`，因为在 PHP 5.4 之前，此错误级别未包含在 `E_ALL` 中。\n\n```php\n// 开发期间\nerror_reporting(E_ALL\
    \ | E_STRICT);\n```\n\n当 Web 应用上线时，原始错误消息应向用户隐藏。这可以通过 `display_errors` 指令实现。它确定内部错误处理器是否将错误打印到网页上。默认值是打印它们，但当网站上线时，隐藏任何潜在的原始错误消息是一个好主意。\n\
    \n```php\n// 生产期间\nini_set('display_errors','0');\n```\n\n另一个与错误处理环境相关的指令是 `log_errors`\
    \ 指令。它设置是否将错误消息记录到服务器的错误日志中。此指令默认被禁用，但在开发期间启用它以跟踪错误是一个好主意。\n\n```php\n// 开发期间\n\
    ini_set('log_errors','1');\n```\n\n`ini_set` 函数设置配置选项的值。或者，所有这些选项都可以在 `php.ini`\
    \ 配置文件中永久设置，而不是在脚本文件中。\n\n## 自定义错误处理器\n\n内部错误处理器可以被自定义错误处理器覆盖。这是处理错误的首选方法，因为它允许你向最终用户将原始错误抽象为友好、自定义的错误消息。\n\
    \n自定义错误处理器使用 `set_error_handler` 函数定义。该函数接受两个参数：一个回调函数，当错误引发时会调用该函数；以及可选的该函数将处理的错误级别。\n\
    \n```php\nset_error_handler('myError', E_ALL | E_STRICT);\n```\n\n如果未指定错误级别，错误处理器将设置为处理所有错误，包括\
    \ `E_STRICT`。然而，用户定义的错误处理器实际上只能处理运行时错误，并且只能处理除 `E_ERROR` 之外的运行时错误。请记住，对 `error_reporting`\
    \ 设置的更改不会影响自定义错误处理器，只会影响内部错误处理器。\n\n回调函数需要两个参数：错误级别和错误描述。可选参数包括文件名、行号和错误上下文，后者是一个包含触发错误作用域内所有变量的数组。\n\
    \n```php\nfunction myError($errlvl, $errdesc, $errfile, $errline)\n{\n  switch($errlvl)\n\
    \  {\n    case E_USER_ERROR:\n      error_log(\"错误: $errdesc\", 1, 'me@example.com');\n\
    \      require_once('my_error_page.php');\n      return true;\n  }\n  return false;\n\
    }\n```\n\n此示例函数处理级别为 `E_USER_ERROR` 的错误。当发生此类错误时，会向指定地址发送一封电子邮件，并显示自定义错误页面。通过在函数中对其他错误返回\
    \ false，它们将由内部错误处理器处理。\n\n## 抛出错误"
- fmt: "# PHP 错误处理与异常机制\n\n## 错误处理\n\nPHP 提供了 `trigger_error` 函数用于引发错误。它有一个必需参数（错误消息）和一个可选参数（指定错误级别）。错误级别必须是三个\
    \ `E_USER` 级别之一，默认级别为 `E_USER_NOTICE`。\n\n```\nif( !isset($myVar) )\n  trigger_error('$myVar\
    \ not set'); // E_USER_NOTICE\n```\n\n当您拥有自定义错误处理器时，触发错误非常有用，这允许您将自定义错误和 PHP 引发的错误的处理结合起来。\n\
    \n[¹](#9781430262831_Ch29.xhtml#_Fn1)`http://www.php.net/manual/en/function.fopen.php`\n\
    \n---\n\n## 异常处理\n\nPHP 5 引入了异常，这是一种内置机制，用于在其发生的上下文中处理程序故障。与通常需要由开发人员修复的错误不同，异常由脚本处理。它们代表一种应被视为可能发生的异常运行时情况，并且脚本应能够自行处理。\n\
    \n### 抛出异常\n\n当函数遇到无法恢复的情况时，它可以生成一个异常，向调用者发出函数已失败的信号。这是通过 `throw` 关键字后跟 `Exception`\
    \ 类或其子类（如 `LogicException`）的新实例来完成的。[¹](#9781430262831_Ch30.xhtml#Fn1)\n\n```\n\
    function invert($x)\n{\n  if ($x == 0)\n    throw new LogicException('Division\
    \ by zero');\n\nreturn 1 / $x;\n}\n```\n\n### Try-catch 语句\n\n要处理异常，必须使用 `try-catch`\
    \ 语句将其捕获。该语句由一个包含可能导致异常的代码的 `try` 块和一个或多个 `catch` 子句组成。\n\n```\ntry\n{\n  $div\
    \ = invert(0);\n}\ncatch (LogicException $e) {}\n```\n\n如果 `try` 块成功执行，程序将继续在\
    \ `try-catch` 语句之后运行。然而，如果发生异常，执行将传递到第一个能够处理该异常类型的 `catch` 块。\n\n### Catch 块\n\
    \n在前面的示例中，`catch` 块被设置为处理内置的 `LogicException` 类型。如果 `try` 块中的代码可能引发更多类型的异常，则可以使用多个\
    \ `catch` 块，从而以不同的方式处理不同的异常。\n\n```\ncatch (LogicException $e) {}\ncatch (RuntimeException\
    \ $e) {}\n// ...\n```\n\n要捕获更具体的异常，`catch` 块需要放在更一般的异常之前。例如，`LogicException` 继承自\
    \ `Exception`，因此需要先捕获 `LogicException`。\n\n```\ncatch (LogicException $e) {}\n\
    catch (Exception $e) {}\n```\n\n`catch` 子句定义了一个异常对象。该对象可用于获取有关异常的更多信息，例如使用 `getMessage`\
    \ 方法获取异常描述。\n\n```\ncatch (LogicException $e)\n{\n  echo $e->getMessage(); //\
    \ \"Division by zero\"\n}\n```\n\n### Finally 块\n\nPHP 5.5 引入了 `finally` 块，它可以作为\
    \ `try-catch` 语句中的最后一个子句添加。此块用于清理在 `try` 块中分配的资源，并且无论是否出现异常都会始终执行。\n\n```\n$resource\
    \ = myopen();\ntry { myuse($resource); }\ncatch(Exception $e) {}\nfinally { myfree($resource);\
    \ }\n```\n\n### 重新抛出异常\n\n有时，异常在第一次被捕获的地方无法处理。然后可以使用 `throw` 关键字后跟异常对象重新抛出它。\n\
    \n```\ntry { $div = invert(0); }\ncatch (LogicException $e) { throw $e; }\n```\n\
    \n该异常随后会向上传播调用者堆栈，直到被另一个 `try-catch` 语句捕获。如果异常从未被捕获，除非定义了未捕获的异常处理器，否则它将变成 `E_ERROR`\
    \ 级别的错误，从而停止脚本。\n\n### 未捕获异常处理器\n\n`set_exception_handler` 函数允许捕获任何未捕获的异常。它接受一个参数，即针对此类事件将触发的回调函数。\n\
    \n```\nset_exception_handler('myException');\n```"
  raw: 'PHP provides the `trigger_error` function for raising errors. It has one required
    argument, the error message, and a second optional argument specifying the error
    level. The error level must be one of the three E_USER levels, with E_USER_NOTICE
    being the default level.


    ```

    if( !isset($myVar) )

      trigger_error(''$myVar not set''); // E_USER_NOTICE

    ```


    Triggering errors is useful when you have a custom error handler in place, allowing
    you to combine the handling of both custom errors and errors raised by PHP.


    [¹](#9781430262831_Ch29.xhtml#_Fn1)`http://www.php.net/manual/en/function.fopen.php`


    CHAPTER 30


    ![image](images/frontdot.jpg)


    Exception Handling


    PHP 5 introduced exceptions, a built-in mechanism for handling program failures
    within the context in which they occur. Unlike errors, which generally need to
    be fixed by the developer, exceptions are handled by the script. They represent
    an irregular run-time situation that should have been expected as a possibility,
    and which the script should be able to handle on its own.


    Throwing exceptions


    When a situation occurs that a function cannot recover from it can generate an
    exception to signal to the caller that the function has failed. This is done using
    the `throw` keyword followed by a new instance of the Exception class or a child
    class of `Exception`, such as `LogicException`.[¹](#9781430262831_Ch30.xhtml#Fn1)


    ```

    function invert($x)

    {

      if ($x == 0)

        throw new LogicException(''Division by zero'');


    return 1 / $x;

    }

    ```


    Try-catch statement


    To handle an exception it must be caught using a try-catch statement. This statement
    consists of a `try` block containing the code that may cause the exception, and
    one or more catch clauses.


    ```

    try

    {

      $div = invert(0);

    }

    catch (LogicException $e) {}

    ```


    If the `try` block successfully executes, the program will then continue running
    after the try-catch statement. However, if an exception occurs the execution will
    then be passed to the first `catch` block able to handle that exception type.


    Catch block


    In the previous example, the catch block is set to handle the built-in `LogicException`
    type. If the code in the `try` block could throw more kinds of exceptions, multiple
    `catch` blocks can be used, allowing different exceptions to be handled in different
    ways.


    ```

    catch (LogicException $e) {}

    catch (RuntimeException $e) {}

    // ...

    ```


    To catch a more specific exception the `catch` block needs to be placed before
    more general exceptions. For example, the `LogicException` inherits from `Exception`,
    so the `LogicException` needs to be caught first.


    ```

    catch (LogicException $e) {}

    catch (Exception $e) {}

    ```


    The `catch` clause defines an exception object. This object can be used to obtain
    more information about the exception, such as a description of the exception using
    the `getMessage` method.


    ```

    catch (LogicException $e)

    {

      echo $e->getMessage(); // "Division by zero"

    }

    ```


    Finally block


    PHP 5.5 introduced the `finally` block, which can be added as the last clause
    in a try-catch statement. This block is used to clean up resources allocated in
    the `try` block and will always execute whether or not there is an exception.


    ```

    $resource = myopen();

    try { myuse($resource); }

    catch(Exception $e) {}

    finally { myfree($resource); }

    ```


    Re-throwing exceptions


    Sometimes an exception cannot be handled where it is first caught. It can then
    be re-thrown using the `throw` keyword followed by the exception object.


    ```

    try { $div = invert(0); }

    catch (LogicException $e) { throw $e; }

    ```


    The exception will then propagate up the caller stack until it is caught by another
    try-catch statement. If the exception is never caught it will become an error
    of level E_ERROR which halts the script, unless an uncaught exception handler
    has been defined.


    Uncaught exception handler


    The `set_exception_handler` function allows any uncaught exceptions to be caught.
    It takes a single argument, which is the callback function that will be raised
    for such an event.


    ```

    set_exception_handler(''myException'');

    ```'
