  trans: '

    # 安装 LAMP 服务器


    LAMP 代表 Linux、Apache、MySQL 和 PHP。它是一组开源软件产品，用于在 Linux 机器上运行 Web 服务器。以下是安装 LAMP
    的步骤：


    **安装 Apache。** 要安装 Apache，请打开终端并输入以下命令：

    ```

    sudo apt-get install apache2

    ```

    要检查 Apache 是否已安装，请打开浏览器并访问地址 `http://localhost/`。如果页面显示文本 "It works!"，则表示 Apache
    安装成功。


    **安装 MySQL。** 要安装 MySQL，请打开终端并输入以下命令：

    ```

    sudo apt-get install mysql-server

    ```

    系统会提示您设置 root 密码。如果您的计算机没有提示，请输入以下命令来设置 root 密码：

    ```

    mysql -u root

    mysql> SET PASSWORD FOR ''root''@''localhost'' = PASSWORD(''yourpassword'');

    ```

    要安装 `phpMyAdmin` 工具，请在终端中输入以下命令：

    ```

    sudo apt-get install libapache2-mod-auth-mysql php5-mysql phpmyadmin

    ```

    MySQL 安装完成后，您可以使用以下命令激活它：

    ```

    sudo mysql_install_db

    ```


    **安装 PHP。** 要安装 PHP，请打开终端并输入以下命令：

    ```

    sudo apt-get install php5 libapache2-mod-php5 php5-mcrypt

    ```

    对提示的问题回答 "yes"，PHP 将自行安装。


    成功安装 WampServer 或 LAMP 后，您可以继续启动其中任何一个。本书中使用的是 WampServer，但步骤对于两个服务器是通用的。


    # 启动服务器


    要使用 WampServer，您需要启动它。因此，请双击其桌面图标或按照以下步骤操作：


    - 打开开始屏幕。

    - 在开始屏幕上显示的磁贴列表中，找到 WampServer。如果在应用程序和程序列表中找不到 WampServer，请在屏幕的空白处输入文本 "WAMP"。

    - 将出现一个搜索框，并列出所有与输入文本匹配的应用程序。

    - 单击结果列表中显示的 WampServer 图标。


    启动 WampServer 后，任务栏中会出现一个图标，如图 1-21 所示。


    ![A978-1-4842-1672-9_1_Fig21_HTML.jpg](img/A978-1-4842-1672-9_1_Fig21_HTML.jpg)


    *图 1-21. 任务栏中显示的 WampServer 图标*


    当 WampServer 图标为红色时，表示其上的服务均未运行。当其为橙色时，表示 WampServer 已启动，但并非所有服务都在运行。当其为绿色时，表示
    WampServer 已启动且所有服务均正常运行。要启动服务器，请单击其图标，并从弹出的菜单中选择**启动所有服务**选项（见图 1-22）。


    ![A978-1-4842-1672-9_1_Fig22_HTML.jpg](img/A978-1-4842-1672-9_1_Fig22_HTML.jpg)


    *图 1-22. WampServer 弹出菜单*


    随着服务器启动，它会从红色变为橙色再变为绿色。WampServer 可能与 Skype 的默认设置、IIS 服务器以及其他服务器发生冲突。如果您发现并非所有
    WampServer 服务都在运行（即图标在启动后仍保持橙色），则需要停止您的 IIS 服务器，退出 Skype，然后重新启动您的 WampServer。


    如果 WampServer 图标变为绿色，则表示服务器已成功设置并完全正常运行。您也可以通过启动浏览器并访问 `http://localhost` 地址来验证这一点。如果您看到显示服务器配置、Apache
    版本、PHP 版本等信息（见图 1-23）以及已加载的扩展的屏幕，则表示 WampServer 已成功安装并正在运行。


    ![A978-1-4842-1672-9_1_Fig23_HTML.jpg](img/A978-1-4842-1672-9_1_Fig23_HTML.jpg)


    *图 1-23. 成功安装 WampServer 后，浏览器显示服务器配置*


    恭喜，您的 WampServer 已成功安装。这也意味着 Apache、MySQL 和 PHP 已成功安装在您的机器上。


    默认情况下，WampServer 不会为 MySQL 的 root 用户设置密码。为了实现安全性并避免未经授权的访问，您需要为 MySQL 的 root 用户设置密码，并在必要时创建其他用户。那么，让我们继续配置
    MySQL 服务器。


    # 配置 MySQL


    您将使用 `phpMyAdmin` 来配置 MySQL 服务器。`phpMyAdmin` 是一个用 PHP 编写的软件工具，用于通过网络管理 MySQL。您可以通过
    `phpMyAdmin` 的图形用户界面轻松管理 MySQL 数据库、表、索引、用户等。要调用 `phpMyAdmin`，请单击 WampServer 图标并选择
    `phpMyAdmin` 选项。


    `phpMyAdmin` 将打开，如图 1-24 所示。屏幕的左窗格中显示了最近的数据库。在右上角，您会找到用于管理数据库、SQL、用户等的按钮。中间窗格显示了下拉列表，使您能够定义
    MySQL 连接。您还会找到用于更改默认语言、主题、字体大小和其他设置的下拉列表。


    ![A978-1-4842-1672-9_1_Fig24_HTML.jpg](img/A978-1-4842-1672-9_1_Fig24_HTML.jpg)


    *图 1-24. 启动 phpMyAdmin 工具时的首屏*


    要配置 root 密码，您需要访问位于左窗格 `mysql` 数据库中的用户表。`mysql` 数据库节点上的 `+`（加号）表示它当前处于折叠状态。要展开节点，请单击其
    `+` 号。`mysql` 数据库节点将展开，显示其中存在的所有表。单击 `user` 表以显示其中的行数（见图 1-25）。您可以看到 `user` 表默认包含以下四个用户：


    -   主机 `127.0.0.1` 的用户 `root`——表示 localhost（IPv4 未解析 IP）的 root 用户。

    -   主机 `::1` 的用户 `root`——表示 localhost（IPv6 未解析 IP）的 root 用户。

    -   主机 `localhost` 的用户 `root`——表示 localhost（已解析 IP）的 root 用户。

    -   主机 `localhost` 的用户 `anonymous`——表示具有已解析 IP 的匿名用户。


    ![A978-1-4842-1672-9_1_Fig25_HTML.jpg](img/A978-1-4842-1672-9_1_Fig25_HTML.jpg)


    *图 1-25. 显示 user 表行的屏幕*


    默认情况下，这些用户的密码为空。root 用户名是拥有所有权限的超级用户帐户，但空密码使得 MySQL 服务器极易受到未经授权的访问。因此，首要任务是为所有这些
    root 帐户提供密码，并删除匿名用户或也为该用户帐户提供一个密码。


    要为 root 用户提供密码，请单击相应行上的**编辑**图标以编辑其内容。该行将展开并显示三个文本框——Host、User 和 Password。在**Password**列中输入密码（见图
    1-26）。如果您想加密密码（而不是以纯文本格式保存），请从**函数**组合框中选择 `PASSWORD` 选项。输入密码后，单击底部的**执行**按钮以保存更改。


    ![A978-1-4842-1672-9_1_Fig26_HTML.jpg](img/A978-1-4842-1672-9_1_Fig26_HTML.jpg)


    *图 1-26. 更改 MySQL 服务器的 root 密码*


    一旦为所有 root 用户设置了密码，您的 MySQL 服务器就会变得相当安全，免受未经授权的访问。接下来，让我们了解您的电子商务网站所需的不同数据库表。

    '
- fmt: '### Required Database Tables


    In all there will be seven tables created for our e-commerce site with the following
    names:


    - `products` — Stores information about the product that includes product name,
    weight, price, description, etc.

    - `productfeatures` — Stores features of the products.

    - `cart` — Stores information of the products selected in the cart.

    - `customers` — Stores information about the registered customers.

    - `orders` — Stores order numbers, order data, and shipping information of the
    customer who placed the order.

    - `orders_details` — Stores the information about all the products that are purchased
    in a given order.

    - `payment_details` — Stores the card number and other information about the payment
    mode selected to pay for any order.


    You will be creating these tables in a database called `shopping`. The structure
    of these mentioned tables is explained in Tables [1-1](#A978-1-4842-1672-9_1_Chapter.html#Tab1)
    to [1-7](#A978-1-4842-1672-9_1_Chapter.html#Tab7).


    **Table 1-7.** Brief Description of the Structure of the `payment_details` Table


    | Column | Type | Description |

    | --- | --- | --- |

    | `order_no` | `int(6)` | Keeps the order number for whom payment is being made.
    |

    | `order_date` | `date` | Keeps the date on which the given order was placed.
    |

    | `amount_paid` | `DECIMAL(7,2)` | Stores the amount that is paid for the given
    order. |

    | `email_address` | `varchar(50)` | Stores the e-mail address of the customer
    doing the payment. |

    | `customer_name` | `varchar(50)` | Stores the name of the customer who is doing
    the payment. |

    | `payment_type` | `varchar(20)` | Stores the mode of payment, i.e. whether the
    customer is paying through debit card, credit card, net banking, etc. |

    | `name_on_card` | `varchar(30)` | Stores the name on the debit/credit card if
    the customer is paying with a card. |

    | `card_number` | `varchar(20)` | Stores the credit card number. |

    | `expiration_date` | `varchar(10)` | Stores the expiry date of the card (if customer
    is paying with a card). |


    **Table 1-6.** Brief Description of the structure of `orders_details` Table


    | Column | Type | Description |

    | --- | --- | --- |

