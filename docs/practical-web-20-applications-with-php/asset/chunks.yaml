    **Adding Page Titles and Breadcrumbs**


    Visually indicating to users where they are in the structure of a web site is
    very important for the site’s usability, and many web sites overlook this. A user
    should easily be able to identify where they are and how they got there without
    having to retrace their steps.


    To do this, we must assign a title to every page in our application. Once we have
    the titles, we can set up a *breadcrumb* system. A breadcrumb trail is a navigational
    tool that shows users the hierarchy of pages from the home page to where they
    currently are. Note that this differs from how the web browser’s history works—the
    breadcrumb system essentially shows all of the parent sections the current page
    is in, not the trail of specific pages the user visited to get to the current
    page.


    A breadcrumb system might look like this:


    Home > Products > XYZ Widget


    In this example, the current page would be XYZ Widget, while Home would be hyperlinked
    to the web site’s home page, and Products would link to the appropriate page.


    **171**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch06CMP2 11/13/07 7:56 PM Page 172


    **172**


    C H A P T E R 6 ■ S T Y L I N G T H E W E B A P P L I C AT I O N


    To name the pages, we need to define a title in each action handler of each controller
    (for example, to add a title to the account login page we will add it to the loginAction()
    method of the AccountController PHP class). Some titles will be dynamically generated
    based on the purpose of the action (such as using the headline of a news article
    as the page title when displaying that article), while others will be static.
    You could argue about whether the title of a page should be determined by the
    application logic (that is, in the controller file) or by the display logic (determined
    by the template). In some special cases titles will need to be determined in the
    template, but it is important to always define a page title in the controller
    actions to build up a correct breadcrumb trail. If the page titles were defined
    within templates, it would be very difficult to construct the breadcrumb trail.


    ■**Note** In larger web applications, where the target audience includes people
    not only from your country but also other countries, you need to consider internationalization
    and localization (also known as i18n and L10n, with the numbers indicating the
    number of letters between the starting and finishing letters). Internationalization
    and localization take into account a number of international differences, including
    languages and formatting of numbers, currencies, and dates. In the case of page
    titles, you would fetch the appropriate page title for the given language based
    on the user’s settings, rather than hard-coding the title in the PHP


    code. The Zend_Translate component of the Zend Framework can help with implementation
    of i18n and L10n.


    To implement the title and breadcrumb system, we need to make two changes to the
    way we create application controllers:


    **1.** We must implement the Breadcrumbs class, which is used to hold each of
    the breadcrumb steps. The Breadcrumbs object will be assigned to the template,
    so we can easily output the trail in the header.tpl file.


    **2.** We must build a trail in each controller action with the steps that lead
    up to the action.


    The steps (and number of steps) will be different for each action, depending on
    its specific purpose.


