  trans: '

    # 选择 PHP 编辑器


    你的开发机现已具备执行 PHP 所需的所有程序。下一步是决定如何编写脚本。PHP 脚本基于文本，因此你有众多选择，从简单的`Notepad.exe`和文本编辑程序，到高度专业化的*集成开发环境*（*IDE*）。


    你很可能可以使用编写 HTML 和 CSS 的程序来编写 PHP 代码。一个好的编辑器应具备以下功能：


    *   *语法高亮*：能够识别编程语言中的特定词汇，例如变量、控制结构及其他特殊文本。这些特殊文本会以高亮或其他方式区分，使代码浏览更加轻松。

    *   *内置函数参考*：当你输入函数或对象方法名称时，此功能会显示可用参数、声明该函数的文件、函数的简短说明，以及参数和返回值的详细分解。处理大型库时，此功能价值连城，能免去你频繁访问
    PHP 网站确认函数参数顺序或可接受参数的麻烦。

    *   *自动补全功能*：此功能将可用 PHP 关键字添加到下拉列表中，让你能快速轻松地从中选择目标关键字，省去每次记忆和手动输入的麻烦。生产力争分夺秒，此功能是节省时间的绝佳方式。

    *   *代码折叠*：此功能允许折叠代码片段，使工作区整洁有序，代码更易导航。

    *   *自动缩进*：以一致的方式自动缩进你编写的代码。对人类阅读者而言，缩进后的代码更易读，因为缩进表明了代码块之间的关系。

    *   *内置 FTP*：当你想将项目发布到万维网时，需要使用 FTP 将 PHP 文件上传到在线网络服务器。你可以使用独立的 FTP 程序，但如果 FTP
    集成在 IDE 中，你只需单击一下即可上传整个项目。


    有许多优秀的 IDE 和编辑器可供选择。初学者可能会发现从更简单的编辑器入手更容易。本书中的示例使用 Notepad++ (notepadplusplus.com)
    创建，以保持开发的简洁性。当然，你也可以自由探索其他选项。以下列表提供了四种最受欢迎的免费 PHP IDE 的下载链接：


    *   *NetBeans* – [`https://netbeans.org/`](https://netbeans.org/)

    *   *Aptana* – [`www.aptana.com/`](http://www.aptana.com/)

    *   *Eclipse* – [`www.eclipse.org/`](http://www.eclipse.org/)

    *   *Visual Studio* – [`https://visualstudio.microsoft.com/`](https://visualstudio.microsoft.com/)


    还有众多付费 PHP IDE，其中一些提供 30 天免费试用。我们选择推荐那些无需付费即可使用的产品。


    **练习**：探索编辑 PHP 程序的不同选项。选择你觉得最顺手的编辑器或 IDE。如需安装帮助，请前往 YouTube 搜索相关安装演示视频。搜索时别忘了带上版本号。下一节，我们将创建第一个程序。为此，我们需要一个编辑器。


    如前所述，本书示例将使用 Notepad++。使用其他任何编辑器，你也能毫无困难地跟进这些示例。如果你决定使用 IDE，则需查阅在线文档，了解如何在所选 IDE
    中设置新项目。


    # 创建你的第一个 PHP 程序


    一切设置完毕并按预期运行后，就该投身实践，编写我们的第一个 PHP 脚本了。


    作为一种服务器端脚本语言，PHP 需要像 Apache 这样的网络服务器才能运行。你刚刚在本地计算机上安装了 Apache，因此系统已准备就绪。Apache
    会解释保存在名为`htdocs`文件夹内的任何 PHP 文件。你可以在 XAMPP 安装目录下的`XAMPP/xamppfiles/htdocs`中找到它。


    你很快会创建许多 PHP 文件，因此最好保持文件井然有序。在`htdocs`内创建一个新文件夹，命名为`ch1`。


    **注意**


    要充分掌握和理解 PHP 编程，务必亲手编写本书提供的所有示例。虽然可以下载已完成代码，但只有通过实践才能学习和记住。花时间和精力自行创建程序是值得的。与所有编程书籍一样，可能存在出版错误。如果你确信代码与书中所示一致但仍收到错误，请检查本章提供的代码文件。每个代码文件都经过准确性和完整性测试。


    现在打开你选择的编辑器或 IDE。弄清楚如何在编辑器中创建“新”文件，以便开始编码。然后严格按照所示输入以下程序。如果此代码遇到问题，请将你的代码与本书前言所述方式下载的第
    1 章代码文件（`test.php`）中的示例进行核对。


    ```

    Listing 1-1

    test.php

    ```


    务必在`htdocs`下创建的`ch1`文件夹中将文件另存为`test.php`。你的编辑器可能需要你“另存为”“所有文件”或“另存为”“php”。**务必**确保文件后缀为`.php`，而不是`.txt`或其他后缀。PHP
    文件只有使用`.php`文件后缀才能执行。这是一个简单的过程，但如果保存不当，可能会让你“措手不及”。


    ![](img/323857_3_En_1_Fig16_HTML.jpg)


    此对话框表示我们完成工作后希望如何保存输出文件，我们总是希望使用 Notepad 以`name.php`格式保存。


    图 1-16


    在 Notepad++中保存`test.php`


    # 运行你的第一个 PHP 脚本


    下一步是让 Apache 处理你的 PHP 脚本。如果你通过浏览器请求该脚本，此过程会自动发生。因此，打开网络浏览器，导航至`http://localhost/ch1/test.php`，欣赏浏览器中应出现的
    PHP 生成输出（图 1-17）。你已经成功创建并执行了第一个 PHP 脚本！


    ![](img/323857_3_En_1_Fig17_HTML.jpg)


    这是在系统中成功运行编写的程序后，我们看到的文件最终输出方式。


    图 1-17


    查看`test.php`的输出


    如果你意外将文件保存为`.txt`后缀，你的代码将无法执行（图 1-18），你会看到代码的列表。如果你的代码未保存在`htdocs`文件夹下，或者 Apache
    未运行，也会出现此情况。如果出现这种情况，请修正文件后缀、文件位置，或启动 Apache，然后重试。一旦成功，请为自己鼓掌。你做到了！你创建了第一个 PHP
    程序（并顺利读完本章）。


    ![](img/323857_3_En_1_Fig18_HTML.jpg)


    此窗口类型反映了编写的程序具有不正确的文件后缀。


    图 1-18


    以不正确文件后缀保存并运行`test.php`

