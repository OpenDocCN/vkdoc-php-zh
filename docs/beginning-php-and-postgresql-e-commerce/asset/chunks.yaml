    \     | Union Civil War Kepi Cap     |\n| 0.31684  |            | Civil War Leather\
    \ Kepi Cap   |\n| 0.303964 |            | Confederate Civil War Kepi   |\n| 0.0379954|\
    \            | Military Beret               |\n| 0.0303964|            | Confederate\
    \ Slouch Hat       |\n| 0.0303964|            | Uncle Sam Top Hat            |\n\
    \nYou should be ready now to implement your web site’s search functionality. To\
    \ learn more about the inner workings of the `tsearch2` engine, consult its official\
    \ documentation.\n\n## Exercise: Writing the Database Searching Code\n\n1.  Load\
    \ pgAdmin III, and connect to the `hatshop` database.\n2.  Click Tools ➤ Query\
    \ Tools (or click the SQL button on the toolbar). A new query window should appear.\n\
    3.  Write the following code in the query tool, and then execute it by pressing\
    \ F5. This command prepares the `product` table to be searched using the `tsearch2`\
    \ engine, as explained earlier in this chapter.\n\n    ```sql\n    -- Alter product\
    \ table adding search_vector field\n    ALTER TABLE product ADD COLUMN search_vector\
    \ tsvector;\n\n    -- Create index for search_vector field in product table\n\
    \    CREATE INDEX idx_search_vector ON product USING gist(search_vector);\n\n\
    \    -- Update newly added search_vector field from product table\n    UPDATE\
    \ product\n    SET search_vector =\n    setweight(to_tsvector(name), 'A') || to_tsvector(description);\n\
    \    ```\n\n    [www.it-ebooks.info](http://www.it-ebooks.info/)\n    648XCH05.qxd\
    \ 10/31/06 10:04 PM Page 176\n\n    **176**\n    C H A P T E R 5 ■ S E A R C H\
    \ I N G T H E C ATA L O G\n\n4.  Use the Query tool to execute this code, which\
    \ creates the `catalog_flag_stop_words` function into your `hatshop` database:\n\
    \n    ```sql\n    -- Create catalog_flag_stop_words function\n    CREATE FUNCTION\
    \ catalog_flag_stop_words(TEXT[])\n    RETURNS SETOF SMALLINT LANGUAGE plpgsql\
    \ AS $$\n    DECLARE\n        inWords ALIAS FOR $1;\n        outFlag SMALLINT;\n\
    \        query TEXT;\n    BEGIN\n        FOR i IN array_lower(inWords, 1)..array_upper(inWords,\
    \ 1) LOOP\n            SELECT INTO query\n                to_tsquery(inWords[i]);\n\
    \            IF query = '' THEN\n                outFlag := 1;\n            ELSE\n\
    \                outFlag := 0;\n            END IF;\n            RETURN NEXT outFlag;\n\
    \        END LOOP;\n    END;\n    $$;\n    ```\n\n5.  Use the Query tool to execute\
    \ this code, which creates the `catalog_count_search_result` function into your\
    \ `hatshop` database:\n\n    ```sql\n    -- Function returns the number of products\
    \ that match a search string\n    CREATE FUNCTION catalog_count_search_result(TEXT[],\
    \ VARCHAR(3))\n    RETURNS INTEGER LANGUAGE plpgsql AS $$\n    DECLARE\n     \
    \   -- inWords is an array with the words from user's search string\n        inWords\
    \ ALIAS FOR $1;\n        -- inAllWords is 'on' for all-words searches\n      \
    \  -- and 'off' for any-words searches\n        inAllWords ALIAS FOR $2;\n   \
    \     outSearchResultCount INTEGER;\n        query TEXT;\n        search_operator\
    \ VARCHAR(1);\n    BEGIN\n        -- Initialize query with an empty string\n \
    \       query := '';\n        -- Establish the operator to be used when preparing\
