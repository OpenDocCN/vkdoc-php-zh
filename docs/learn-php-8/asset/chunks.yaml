    string $breed_error = $this->set_dog_breed($properties_array[1]) ==

    TRUE ? ''TRUE,'' : ''FALSE,'';

    string $color_error = $this->set_dog_color($properties_array[2]) ==

    TRUE ? ''TRUE,'' : ''FALSE,'';

    string $weight_error= $this->set_dog_weight($properties_array[3]) ==

    TRUE ? ''TRUE'' : ''FALSE'';

    ```


    This requires changing these lines in the `dog.php` file to accept an array and
    then use the values in the array to set each property.


    Notice that `$properties_array` in the first line does not have anything that
    declares it as an array (except the name). Remember that PHP properties determine
    what data type they are by what is passed in the property. The same is true with
    arrays. If an array is passed into `$properties_array`, it becomes an array.


    The address of the array is passed into the method. The property that accepts
    the address (`$properties_array`) actually points to the location of the array
    in memory. This is very efficient. If you needed to pass 50 items into a method,
    you could pass them all one at a time with different properties declared in the
    method''s signature for each of these 50 items. However, instead, you can create
    an array that holds the 50 items and pass the array. You are only passing one
    value using this approach, which is the address of the array in memory. Also,
    as noted with this example, using an array allows us to be flexible in the number
    of items you want to pass into a method signature.


    ```

    $name_error = $this->set_dog_name($properties_array[0]) == TRUE ? ''TRUE,'' :
    ''FALSE,'';

    ```


    To copy an item from an array, we refer to the item using the array''s name (`$properties_array`)
    and the position that the item exists in the array (`[0]`). Notice that we use
    `[]` brackets for declaring the position. The position is commonly called the
    *subscript*. Array subscripts usually begin with position 0, not position 1.


