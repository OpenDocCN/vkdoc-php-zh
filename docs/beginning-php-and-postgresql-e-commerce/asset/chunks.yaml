    Let’s analyze the function to see how it does its job.


    The method is private because you won’t access it from within other classes—it’s
    a helper class for other methods of Catalog.


    The method verifies whether the previous call to it was for the same SELECT query.
    If it was, the result cached from the previous call is returned. This small trick
    improves performance when the visitor is browsing subpages of the same list of
    products because the actual counting in the database is performed only once.


