    \ 查询可以涉及网站数据或其数据结构的任何内容，例如“给我部门列表”、“删除产品编号 223”、“创建一个数据表”或“在目录中搜索黄色帽子”。\n\n无论\
    \ SQL 查询内容是什么，我们都需要一种方式将其发送给 PostgreSQL。PostgreSQL 附带了一个简单的、基于文本的界面（名为 `\"psql\"\
    `），它允许执行 SQL 查询并获取结果。命令行界面使用起来不是特别方便，但功能齐全。不过，也有其他替代方案。\n\n一些免费的第三方数据库管理工具允许你通过易于使用的图形界面来操作数据结构和执行\
    \ SQL 查询。在本书中，我们将向你展示如何使用 `pgAdmin III`，这是随 PostgreSQL 一起提供的管理工具。\n\n除了需要通过直接界面与\
