  trans: '

    ## `while` 循环语句


    循环语句使得重复执行指令或命令成为可能。PHP 中有多种循环语句。它们的作用是相同的（从能够解决相同任务、功能等效的角度来看）。


    在所有的循环语句中，`while` 循环语句的语法或许是最简单的。它以 `while` 关键字开头，其后括号内放置一个条件，接着在花括号内跟一个命令块。其通用形式如下所示。


    ```

    while(condition){

    # commands

    }

    ```


    我们来讨论一下 `while` 循环语句是如何执行的。首先，检查条件。如果条件为真，则执行循环体中的命令。然后，再次检查条件。如果条件仍为真，则再次执行命令，并再次检查条件？如此往复。此过程持续进行，直到下一次条件检查结果为假。如果结果为假，则循环语句终止。


    > **注意：** 如果循环体只包含一条命令，则可以省略花括号。但这并非良好的实践。


    `while` 循环语句还有另一种形式，该形式不使用花括号，而是在条件后放置一个冒号，并且语句以 `endwhile` 指令（及分号）结束。


    ```

    while(condition):

    # commands

    endwhile;

    ```


    清单 3-4 使用 `while` 循环语句计算数字之和。


    ```

    清单 3-4

    数字之和

    ```


    程序执行的结果如下所示。


    ```

    程序输出（来自清单 3-4）

    1+2+...+100=5050

    ```


    该程序使用了三个变量：总和的上限（项数）保存在 `$n` 变量中，总和的值保存在 `$s` 变量中（该变量的初始值为 `0`），下一项的值保存在 `$k`
    变量中（初始值为 `1`）。


    循环语句检查 `$k<=$n` 条件，如果 `$k` 变量的值不超过 `$n` 变量的值，则该条件为真。在循环体中，命令 `$s+=$k` 将一项加到总和中。命令
    `$k++` 将 `$k` 的值增加 1。在下一个迭代中，这将是新的加项。


    循环语句终止后，`$s` 变量包含了从 `1` 到 `$n` 变量中存储的值的数字之和。此结果显示在控制台中。


    > **注意：** 从 1 到 *n* 的数字之和可以使用公式 `n(n+1)/2` 计算。此处并未使用此公式，而是通过逐项相加来直接计算总和。


    另一个计算某个数约数的示例见清单 3-5。此处使用了 `while` 语句的另一种形式。


    ```

    清单 3-5

    一个数的约数

    ```


    以下是程序执行的结果。


    ```

    程序输出（来自清单 3-5）

    数字 315 可以被以下数整除：

    1 3 5 7 9 15 21 35 45 63 105 315

    ```


    程序用于计算约数的数字存储在 `$number` 变量中（使用值 `315`）。它还使用了 `$A` 变量，其初始值为 `1`。你需要该变量来存储保存在 `$number`
    变量中的数字的下一个约数值。寻找约数的方法很简单：遍历特定范围内的数字，并检查它是否为约数。为此，你使用了循环语句。


    循环语句检查 `2*$A<$number` 条件。在此，一个数的约数（除了该数字本身）不可能超过该数字的一半。在循环体中，命令 `$A++` 递增 `$A`
    变量，并且在条件语句中（采用简化形式，不含 `else` 块），检查 `$number%$A==0` 条件（`$number` 除以 `$A` 的余数为零）。如果条件为真，则执行命令
    `print(" ".$A)`。这意味着相应数字被识别为约数。如果条件为假，则不执行任何操作。


    > **注意：** `" ".$A` 表达式的值是将空格 `" "` 与 `$A` 变量的值拼接后得到的文本。后者会自动转换为文本格式。


    最后的 `print(" ".$number)` 指令将该数字本身添加到其约数列表中。这是不经检查而执行的，因为任何数都能被自身整除。

    '
- fmt: '## `do-while` Loop Statement


    The other loop statement is the `do-while` statement. The following is the syntax
    for the statement.


    ```

    do{

    # commands

    }while(condition);

    ```


    It begins with the `do` keyword followed by a block of commands in curly braces
    that form the loop statement’s body. Then the `while` keyword follows, and, in
    parentheses, some condition. Let’s discuss how the `do-while` loop statement is
    executed. First, the commands in the body of the loop statement are executed.
    After that, the condition after the `while` keyword is checked. If the condition
    is true, the commands in the body of the loop statement are executed again, and
    the condition is checked. If it is true, the commands are executed, and so on.
    The execution of the loop statement terminates if the next time the condition
    is checked, it gives `false`.


    ![](images/613529_1_En_3_Chapter/613529_1_En_3_Figg_HTML.jpg) An information icon.


    **Note:** The fundamental difference between the `do-while` statement and the
    `while` statement is that in the `while` statement, the condition is checked first,
    and then the commands are executed. At the same time, in the `do-while` statement,
    the commands are executed first, and then the condition is checked. When using
    the `while` statement, it may turn out that the commands in the statement’s body
    are not executed at all. That happens if the condition is false the first time
    it is tested. If the `do-while` statement is used, then the commands in the loop
    statement are executed at least once.


    As an example of using the `do-while` loop statement, Listing [3-6](#613529_1_En_3_Chapter.xhtml#PC24)
    is a program that tests a user-entered number for being prime.


    ![](images/613529_1_En_3_Chapter/613529_1_En_3_Figh_HTML.jpg) An information icon.


    **Note:** A number is called prime if it has no divisors but one and the number
    itself.


    ```

    Listing 3-6

    A Prime Number

    ```


    If the user enters a prime number (marked in bold), the program’s output is as
    follows.


    ```

    The output of the program (from Listing 3-6)

    A number to check: 37

    It is a prime number

    ```


    If the number is not prime, the result is somewhat different.


    ```

    The output of the program (from Listing 3-6)

    A number to check: 91

    The number can be divided by 7

    ```


    The program runs as follows. First, the user enters a number to check. That number
    is stored in the `$number` variable. The text `"It is a prime number"` is saved
    to the `$result` variable, which is displayed in the console if it turns out that
    the number entered by the user is prime.


    The `do-while` loop statement uses the conditional statement that tests the `$number%$A==0`
    condition. The truth of the condition means that `$number` is divisible without
    remainder by `$A` (whose initial value is `2`). If so, the `$result="The number
    can be divided by $A"` command assigns a new value to the `$result` variable,
    after which the `break` statement is executed. It terminates the execution of
    the loop statement.


    If, when checking the `$number%$A==0` condition in the conditional statement,
    it gives `false`, then the `break` statement is not executed, and the loop statement
    goes on. In such a case, the `$A++` command increments the value of `$A` by one,
    and at the next iteration, the test for divisibility is performed for that new
    value.


    The loop statement is executed while the `$A<=sqrt($number)` condition is true.
    Here, the `sqrt()` function is used; it calculates the square root of the number
    passed as an argument to the function.


    | Details |

    | --- |

    | If when searching the smallest (after 1) divisor for a certain number *X*, some
    value *A* is found, that means the initial number can be presented as the product
    *X* = *A* · *B* and here *A* ≤ *B*. That is why *A*² ≤ *X*. This relation gives
    you the upper limit for the range where you search for divisors. |


    If the loop statement is terminated not due to the `break` instruction but because
    the `$A<=sqrt($number)` condition becomes false, then the `$result` variable remains
    with its original value. If so, the `print($result)` command prints a message
    stating that the number is prime. If the `break` statement “works,” then the `$result`
    variable gets a new value, and the message in the console states that the number
    being checked has a divisor. That means that the number is not prime.


    | Details |

    | --- |

    | The `break` instruction terminates the execution of the loop statement in which
    it is called. Here, the `do-while` statement and the `while` and `for` statements
    (discussed later in the chapter). In addition to this instruction, the `continue`
    instruction may be helpful, which terminates the current iteration (while the
    entire loop statement goes on). |'
