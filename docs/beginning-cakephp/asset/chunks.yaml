    ***/


    $out .= ''<tr>'';


    37 for ($i=8; $i<=14; $i++) {


    $out .= ''<td>''.$day.''<br/>'';


    $out .= $this->events($month,$day,$year,$events);


    $out .= ''</td>'';


    $day++;


