    There are a couple of different ways you can handle this.\n\nOne way is by throwing\
    \ your own exception instead of having the system\nthrow it.\n\n*   *Programming\
    \ note—In addition to* *getMessage*\n    *method*\n     *,\n    the* *Exception*\
    \ *and* *Error* *objects\n    include*\n\n*   *getCode()—Displays the code causing\
