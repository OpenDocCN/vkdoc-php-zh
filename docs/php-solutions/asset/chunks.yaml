    \ next section describes how to create the SQL file."
  trans: "\n### 使用 phpMyAdmin 手动插入记录\n\n以下说明介绍了如何通过 phpMyAdmin 界面将记录添加到 `images` 表中。\n\
    \n如果 phpMyAdmin 仍像上一节末尾那样显示 `images` 表的结构，请跳至步骤 2。否则，请启动 phpMyAdmin，并从左侧列表中选择\
    \ `phpsols` 数据库。然后，在 `images` 右侧点击 `Structure`，如下方截图所示：\n\n![A978-1-4842-0635-5_10_Figi_HTML.jpg](img/A978-1-4842-0635-5_10_Figi_HTML.jpg)\n\
    \n**提示：** 主框架顶部的面包屑导航提供了页面顶部各选项卡的上下文背景。上方截图左上角的 `Structure` 选项卡指的是 `phpsols` 数据库的结构。要访问单个表的结构，请点击该表名称旁边的\
    \ `Structure` 链接。\n\n点击页面顶部中央的 `Insert` 选项卡。这将显示以下界面，供您插入最多两条记录：\n\n![A978-1-4842-0635-5_10_Figj_HTML.jpg](img/A978-1-4842-0635-5_10_Figj_HTML.jpg)\n\
    \n点击第二个表单底部的 `Go` 按钮。用于插入记录的 SQL 语句将显示在页面顶部。我将在后续章节中解释基本的 SQL 命令，但学习 phpMyAdmin\
    \ 显示的 SQL 语句是掌握如何构建自己查询语句的好方法。SQL 与人类语言非常接近，因此学习起来并不困难。\n\n点击页面左上角的 `Browse` 选项卡。您应该能看到\
    \ `images` 表中的前两条记录，如下图所示：\n\n*   通常，当您在第二个表单中添加值时，`Ignore` 复选框会自动取消勾选，但如有必要，请手动取消勾选。\n\
    \n在第二个表单中，将 `image_id` 的 `Value` 字段留空，并按如下方式填写接下来的两个字段：\n\n*   `filename`: `fountains.jpg`\n\
    *   `caption`: `Fountains in central Tokyo`\n\n*   由于已将 `image_id` 定义为 `AUTO_INCREMENT`，MySQL\
    \ 会自动插入下一个可用的数字。因此，您必须将 `image_id` 的 `Value` 字段留空。按如下方式填写接下来的两个 `Value` 字段：\n\
    \    *   `filename`: `basin.jpg`\n    *   `caption`: `Water basin at Ryoanji temple,\
    \ Kyoto`\n\n这些表单会显示每个列的名称和详细信息。您可以忽略 `Function` 字段。MySQL 拥有大量函数，可应用于要存储在表中的值。您将在后续章节中了解更多相关信息。`Value`\
    \ 字段用于输入要插入表中的数据。\n\n![A978-1-4842-0635-5_10_Figk_HTML.jpg](img/A978-1-4842-0635-5_10_Figk_HTML.jpg)\n\
    \n*   如您所见，MySQL 已为 `image_id` 字段插入了 `1` 和 `2`。\n\n您可以继续输入其余六张图片的详细信息，但为了加快速度，让我们使用一个包含所有必要数据的\
    \ SQL 文件。\n\n### 从 SQL 文件加载图片记录\n\n由于 `images` 表的主键已设置为 `AUTO_INCREMENT`，因此需要删除该表及其所有数据。SQL\
    \ 文件会自动执行此操作，并从头重建该表。以下说明假定 phpMyAdmin 已打开并停留在上一节步骤 6 的页面上。\n\n如果您愿意覆盖 `images`\
    \ 表中的数据，请直接跳至步骤 2。但是，如果您已输入不想丢失的数据，请将数据复制到另一个表。点击页面顶部的 `Operations` 选项卡，在 `Copy\
    \ table to (database.table)` 部分的空白字段中输入新表的名称，然后点击 `Go`。以下截图显示了将 `images` 表的结构和数据复制到\
    \ `phpsols` 数据库中的 `images_backup` 表的设置。\n\n![A978-1-4842-0635-5_10_Figl_HTML.jpg](img/A978-1-4842-0635-5_10_Figl_HTML.jpg)\n\
    \n点击页面顶部的 `Import` 选项卡。在下一个界面中，点击 `File to import` 中的 `Browse`（或 `Choose File`）按钮，然后导航到\
    \ `ch10` 文件夹中的 `images.sql` 文件。将所有选项保留为默认设置，并点击页面底部的 `Go`。\n\n*   点击 `Go` 后，您应该会看到表已复制成功的确认信息。页面顶部的面包屑导航表明\
    \ phpMyAdmin 仍位于 `images` 表中，因此您可以继续执行步骤 2，即使屏幕上显示的是不同的页面。\n\n![A978-1-4842-0635-5_10_Figm_HTML.jpg](img/A978-1-4842-0635-5_10_Figm_HTML.jpg)\n\
    \nphpMyAdmin 会删除原始表，创建一个新版本，并插入所有记录。当您看到文件已成功导入的确认信息后，点击页面左上角的 `Browse` 按钮。您现在应该可以看到与本章开头图\
    \ 10-1 相同的数据。\n\n如果您在文本编辑器中打开 `images.sql`，将会看到其中包含创建 `images` 表并填充数据的 SQL 命令。该表的构建方式如下：\n\
    \n```\nDROP TABLE IF EXISTS `images`;\n\nCREATE TABLE `images` (\n\n `image_id`\
    \ int(10) unsigned NOT NULL AUTO_INCREMENT,\n\n `filename` varchar(25) NOT NULL,\n\
    \n `caption` varchar(120) NOT NULL,\n\nPRIMARY KEY (`image_id`)\n\n) ENGINE=InnoDB\
    \  DEFAULT CHARSET=latin1 AUTO_INCREMENT=9 ;\n```\n\n像这样从 SQL 文件导入数据，就是将数据从本地测试环境传输到网站所在的远程服务器的方式。假设您的托管公司提供\
    \ phpMyAdmin 来管理远程数据库，那么传输数据所需做的就是启动远程服务器上的 phpMyAdmin 版本，点击 `Import` 选项卡，选择本地计算机上的\
    \ SQL 文件，然后点击 `Go`。\n\n下一节将介绍如何创建 SQL 文件。\n"
- fmt: "### Creating an SQL File for Backup and Data Transfer\n\nMySQL doesn't store\
    \ your database in a single file that you can simply upload to your website. Even\
    \ if you find the right files, you're likely to damage them unless the MySQL server\
    \ is turned off. Anyway, most hosting companies won't permit you to upload the\
    \ raw files because it would also involve shutting down their server, causing\
    \ a great deal of inconvenience for everyone.\n\nNevertheless, moving a database\
    \ from one server to another is easy. All it involves is creating a backup dump\
    \ of the data and loading it into the other database using `phpMyAdmin` or any\
    \ other database administration program. The dump is a text file that contains\
    \ all the SQL commands needed to populate an individual table, or even an entire\
    \ database. `phpMyAdmin` can create backups of your entire MySQL server, individual\
    \ databases, selected tables, or individual tables.\n\n**Tip**  \nYou don't need\
    \ to read the details of how to create a dump file until you're ready to transfer\
    \ data to another server or create a backup.\n\nTo keep things simple, these instructions\
    \ show how to back up only a single database.\n\nIn `phpMyAdmin`, select the `phpsols`\
    \ database from the list on the left. If the database was already selected, click\
    \ the `Database: phpsols` breadcrumb at the top of the screen, as shown here:\n\
    \n![A978-1-4842-0635-5_10_Fign_HTML.jpg](A978-1-4842-0635-5_10_Fign_HTML.jpg)\n\
    \nSelect `Export` from the tabs along the top of the screen. There are two export\
    \ methods: Quick and Custom. The Quick method has only one option for the format\
    \ of the export file. The default is SQL, so all you have to do is click `Go`,\
    \ and `phpMyAdmin` creates the SQL dump file and saves it to your browser's default\
    \ `Downloads` folder. The file has the same name as the database, so for the `phpsols`\
    \ database, it's called `phpsols.sql`.  \n\nThe Quick method is okay for exporting\
    \ a small amount of data, but you normally need more control over the export options;\
    \ select the `Custom` radio button. There are a lot of options, so let's take\
    \ a look at them section by section.  \n\nThe `Table(s)` section lists all the\
    \ tables in your database. By default all are selected, but you can choose which\
    \ to export by clicking `Unselect All`, then holding down the Control key on Windows\
    \ or the Command key on a Mac and selecting those that you want. In the following\
    \ screenshot only the `images` table has been selected, so `images_backup` won't\
    \ be exported.\n\n![A978-1-4842-0635-5_10_Figo_HTML.jpg](A978-1-4842-0635-5_10_Figo_HTML.jpg)\n\
    \n**Tip**  \nIt's often a good idea to back up individual tables rather than an\
    \ entire database because most PHP servers are configured to limit uploads to\
    \ 2 MB. Compressing dump files, as described in the next step, also helps get\
    \ around size restrictions.\n\nThe `Output` section has radio buttons that give\
    \ you the option of either saving the SQL dump to a file (this is the default)\
    \ or viewing the output as text. Viewing as text can be useful if you want to\
    \ check the SQL that's being generated before you create the file.\n\n![A978-1-4842-0635-5_10_Figp_HTML.jpg](A978-1-4842-0635-5_10_Figp_HTML.jpg)\n\
    \n*   The `File name template` contains a value between `@` marks. This automatically\
    \ generates the filename from the server, database, or table, depending on what\
    \ you're exporting. A really cool feature of the template is that you can enhance\
    \ it with PHP `strftime()` formatting characters (see [`http://php.net/manual/en/function.strftime.php`](http://php.net/manual/en/function.strftime.php)).\
    \ For example, you can add the current date automatically to the filename just\
    \ before the filename extension, like this:\n\n    `@DATABASE@` `_%Y-%m-%d`\n\n\
    *   The `Format` section defaults to SQL but offers a range of other formats,\
    \ including CSV, JSON, and XML. In `Format-specific options`, you have the option\
    \ to maximize output compatibility with different database systems or older versions\
    \ of MySQL. Normally, the value should be set to the default: `NONE`.\n*   The\
    \ default value of `Character set of the file` is `utf-8`. You need to change\
    \ this only if your data is stored in a specific regional format.\n*   `Compression`\
    \ is a really useful option. By default dump files are not compressed, but the\
    \ drop-down menu offers the option to use zip, gzip, or bzip compression. This\
    \ can greatly reduce the size of the dump file, speeding up the transfer of data\
    \ to another server. When importing a compressed file, `phpMyAdmin` automatically\
    \ detects the compression type and unzips it.\n\n![A978-1-4842-0635-5_10_Figq_HTML.jpg](A978-1-4842-0635-5_10_Figq_HTML.jpg)\n\
    \nThe `Object creation options` section lets you fine-tune the SQL for creating\
    \ databases and tables. The following screenshot shows the default settings.\n\
    \n*   The radio buttons give you the option to export only the structure, only\
    \ the data, or both structure and data. Exporting both is the default.\n*   If\
    \ you select either the `structure` or `data` radio button, some of the remaining\
    \ options are removed from the page.\n\n![A978-1-4842-0635-5_10_Figr_HTML.jpg](A978-1-4842-0635-5_10_Figr_HTML.jpg)\n\
    \nThe `Data creation options` section controls how data is inserted into tables.\
    \ In most cases, the default settings are fine. However, you may be interested\
    \ in changing the first four, which are shown in the following screenshot.\n\n\
    *   When creating a backup, it's usually a good idea to select the `Add DROP TABLE\
    \ / VIEW / PROCEDURE / FUNCTION / EVENT` statement check box, because a backup\
    \ is normally used to replace existing data that has become corrupted.\n*   The\
    \ final check box, which is selected by default, wraps table and column names\
    \ in backquotes (backticks) to avoid problems with names that contain invalid\
    \ characters or use reserved words. I suggest always leaving this selected.\n\n\
    ![A978-1-4842-0635-5_10_Figs_HTML.jpg](A978-1-4842-0635-5_10_Figs_HTML.jpg)\n\n\
    When you have made all your selections, click `Go` at the bottom of the page.\
    \ You now have a backup that can be used to transfer the contents of your database\
    \ to another server.\n\n*   The first check box allows you to truncate the table\
    \ before inserting the data. This is useful if you want to replace the existing\
    \ data, perhaps if it has been corrupted.\n*   The other two check boxes affect\
    \ how `INSERT` commands are executed. `INSERT DELAYED` doesn't work with the default\
    \ InnoDB tables. Moreover, it is deprecated as of MySQL 5.6.6, so it's probably\
    \ best to avoid it.\n*   `INSERT IGNORE` skips errors, such as duplicate primary\
    \ keys. Personally, I think it's best to be alerted to errors, so I don't recommend\
    \ using it.\n*   The drop-down menu labeled `Function to use when dumping data`\
    \ lets you choose `INSERT`, `UPDATE`, or `REPLACE`. The default is to insert new\
    \ records with `INSERT`. If you select `UPDATE`, only existing records are updated.\
    \ `REPLACE` updates where necessary, and inserts new records if they don't already\
    \ exist.\n\n**Tip**  \nBy default, the file created by `phpMyAdmin` contains the\
    \ SQL commands only to create and populate the database tables. It does not include\
    \ the command to create the database unless you select the custom option to do\
    \ so. This means you can import the tables into any database. It does not need\
    \ to have the same name as the one in your local testing environment.\n\n### Choosing\
    \ the Right Data Type in MySQL\n\nYou may have received a bit of a shock when\
    \ selecting `Type` for the `image_id` column. `phpMyAdmin` lists all available\
    \ data types—there are nearly 40 in MySQL 5.6. Rather than confuse you with unnecessary\
    \ details, I'll explain just those most commonly used.\n\nYou can find full details\
    \ of all data types in the MySQL documentation at [`http://dev.mysql.com/doc/refman/5.6/en/data-types.html`](http://dev.mysql.com/doc/refman/5.6/en/data-types.html)."
  raw: '### Creating an SQL file for backup and data transfer


    MySQL doesn’t store your database in a single file that you can simply upload
    to your website. Even if you find the right files, you’re likely to damage them
    unless the MySQL server is turned off. Anyway, most hosting companies won’t permit
    you to upload the raw files because it would also involve shutting down their
    server, causing a great deal of inconvenience for everyone.


    Nevertheless, moving a database from one server to another is easy. All it involves
    is creating a backup dump of the data and loading it into the other database using
    phpMyAdmin or any other database administration program. The dump is a text file
    that contains all the SQL commands needed to populate an individual table, or
    even an entire database. phpMyAdmin can create backups of your entire MySQL server,
    individual databases, selected tables, or individual tables.


    Tip


    You don’t need to read the details of how to create a dump file until you’re ready
    to transfer data to another server or create a backup.


    To keep things simple, these instructions show how to back up only a single database.


    In phpMyAdmin, select the `phpsols` database from the list on the left. If the
    database was already selected, click the Database: phpsols breadcrumb at the top
    of the screen, as shown here:


    ![A978-1-4842-0635-5_10_Fign_HTML.jpg](A978-1-4842-0635-5_10_Fign_HTML.jpg)


    Select Export from the tabs along the top of the screen.   There are two export
    methods: Quick and Custom. The Quick method has only one option for the format
    of the export file. The default is SQL, so all you have to do is click Go, and
    phpMyAdmin creates the SQL dump file and saves it to your browser’s default `Downloads`
    folder. The file has the same name as the database, so for the `phpsols` database,
    it’s called `phpsols.sql`.   The Quick method is okay for exporting a small amount
    of data, but you normally need more control over the export options; select the
    Custom radio button. There are a lot of options, so let’s take a look at them
    section by section.   The Table(s) section lists all the tables in your database.
    By default all are selected, but you can choose which to export by clicking `Unselect
    All`, then holding down the Control key on Windows or the Command key on a Mac
    and selecting those that you want. In the following screenshot only the `images`
    table has been selected, so `images_backup` won’t be exported.


    ![A978-1-4842-0635-5_10_Figo_HTML.jpg](A978-1-4842-0635-5_10_Figo_HTML.jpg)


    Tip


    It’s often a good idea to back up individual tables rather than an entire database
    because most PHP servers are configured to limit uploads to 2 MB. Compressing
    dump files, as described in the next step, also helps get around size restrictions.


    The Output section has radio buttons that give you the option of either saving
    the SQL dump to a file (this is the default) or viewing the output as text. Viewing
    as text can be useful if you want to check the SQL that’s being generated before
    you create the file.


    ![A978-1-4842-0635-5_10_Figp_HTML.jpg](A978-1-4842-0635-5_10_Figp_HTML.jpg)


    *   The File name template contains a value between @ marks. This automatically
    generates the filename from the server, database, or table, depending on what
    you’re exporting. A really cool feature of the template is that you can enhance
    it with PHP `strftime()` formatting characters (see [`http://php.net/manual/en/function.strftime.php`](http://php.net/manual/en/function.strftime.php)
    ). For example, you can add the current date automatically to the filename just
    before the filename extension, like this:


    `@DATABASE@` `_%Y-%m-%d`


    The Format section defaults to SQL but offers a range of other formats, including
    CSV, JSON, and XML.   In Format-specific options, you have the option to maximize
    output compatibility with different database systems or older versions of MySQL.
    Normally, the value should be set to the default: `NONE`.


    *   The default value of Character set of the file is utf-8\. You need to change
    this only if your data is stored in a specific regional format.

    *   Compression is a really useful option. By default dump files are not compressed,
    but the drop-down menu offers the option to use zip, gzip, or bzip compression.
    This can greatly reduce the size of the dump file, speeding up the transfer of
    data to another server. When importing a compressed file, phpMyAdmin automatically
    detects the compression type and unzips it.


    ![A978-1-4842-0635-5_10_Figq_HTML.jpg](A978-1-4842-0635-5_10_Figq_HTML.jpg)


    The Object creation options section lets you fine-tune the SQL for creating databases
    and tables. The following screenshot shows the default settings.


    *   The radio buttons give you the option to export only the structure, only the
    data, or both structure and data. Exporting both is the default.

    *   If you select either the structure or data radio button, some of the remaining
    options are removed from the page.


    ![A978-1-4842-0635-5_10_Figr_HTML.jpg](A978-1-4842-0635-5_10_Figr_HTML.jpg)


    The Data creation options section controls how data is inserted into tables. In
    most cases, the default settings are fine. However, you may be interested in changing
    the first four, which are shown in the following screenshot.


    *   When creating a backup, it’s usually a good idea to select the `Add DROP TABLE
    / VIEW / PROCEDURE / FUNCTION / EVENT` statement check box, because a backup is
    normally used to replace existing data that has become corrupted.

    *   The final check box, which is selected by default, wraps table and column
    names in backquotes (backticks) to avoid problems with names that contain invalid
    characters or use reserved words. I suggest always leaving this selected.


    ![A978-1-4842-0635-5_10_Figs_HTML.jpg](A978-1-4842-0635-5_10_Figs_HTML.jpg)


    When you have made all your selections, click `Go` at the bottom of the page.
    You now have a backup that can be used to transfer the contents of your database
    to another server.


    *   The first check box allows you to truncate the table before inserting the
    data. This is useful if you want to replace the existing data, perhaps if it has
    been corrupted.

    *   The other two check boxes affect how `INSERT` commands are executed. `INSERT
    DELAYED` doesn’t work with the default InnoDB tables. Moreover, it is deprecated
    as of MySQL 5.6.6, so it’s probably best to avoid it.

    *   `INSERT IGNORE` skips errors, such as duplicate primary keys. Personally,
    I think it’s best to be alerted to errors, so I don’t recommend using it.

    *   The drop-down menu labeled `Function to use when dumping data` lets you choose
    `INSERT, UPDATE,` or `REPLACE`. The default is to insert new records with `INSERT`.
    If you select `UPDATE`, only existing records are updated. `REPLACE` updates where
    necessary, and inserts new records if they don’t already exist.


    Tip


    By default, the file created by phpMyAdmin contains the SQL commands only to create
    and populate the database tables. It does not include the command to create the
    database unless you select the custom option to do so. This means you can import
    the tables into any database. It does not need to have the same name as the one
    in your local testing environment.


    ## Choosing the Right Data Type in MySQL


    You may have received a bit of a shock when selecting Type for the `image_id`
    column. phpMyAdmin lists all available data types—there are nearly 40 in MySQL
    5.6\. Rather than confuse you with unnecessary details, I’ll explain just those
    most commonly used.


    You can find full details of all data types in the MySQL documentation at [`http://dev.mysql.com/doc/refman/5.6/en/data-types.html`](http://dev.mysql.com/doc/refman/5.6/en/data-types.html)
    .'
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将以下英文文本翻译成中文。\n\n\n### 创建用于备份和数据传输的\
    \ SQL 文件\n\nMySQL 并不会将你的数据库存储在单个文件中，让你可以简单地将其上传到你的网站。即使你找到了正确的文件，除非 MySQL 服务器已关闭，否则你很可能会损坏它们。无论如何，大多数主机公司不会允许你上传原始文件，因为这还需要关闭他们的服务器，给所有人带来极大的不便。\n\
    \n尽管如此，将一个数据库从一个服务器移动到另一个服务器是很容易的。这只需要创建一个数据的备份转储，然后使用 `phpMyAdmin` 或任何其他数据库管理程序将其加载到另一个数据库中。这个转储文件是一个文本文件，包含了填充单个表，乃至整个数据库所需的所有\
    \ SQL 命令。`phpMyAdmin` 可以为你的整个 MySQL 服务器、单个数据库、选定的表或单个表创建备份。\n\n**提示**  \n在你准备将数据传输到另一台服务器或创建备份之前，不需要阅读关于如何创建转储文件的细节。\n\
    \n为简单起见，这些说明只展示了如何备份单个数据库。\n\n在 `phpMyAdmin` 中，从左侧的列表中选择 `phpsols` 数据库。如果该数据库已经被选中，请点击屏幕顶部的\
    \ `Database: phpsols` 面包屑导航，如下所示：\n\n![A978-1-4842-0635-5_10_Fign_HTML.jpg](img/A978-1-4842-0635-5_10_Fign_HTML.jpg)\n\
    \n从屏幕顶部的选项卡中选择 `导出`。有两种导出方法：快速（Quick）和自定义（Custom）。快速方法对于导出文件的格式只有一个选项。默认是 SQL，所以你只需点击\
    \ `执行`，`phpMyAdmin` 就会创建 SQL 转储文件并将其保存到浏览器的默认 `下载` 文件夹。该文件与数据库同名，因此对于 `phpsols`\
    \ 数据库，它被称为 `phpsols.sql`。\n\n快速方法适用于导出少量数据，但你通常需要对导出选项进行更多控制；请选择 `自定义` 单选按钮。有很多选项，让我们逐节查看它们。\n\
    \n`表` 部分列出了你数据库中的所有表。默认情况下，所有表都被选中，但你可以通过点击 `取消全选`，然后在 Windows 上按住 Control 键或在\
    \ Mac 上按住 Command 键并选择你想要导出的表，来选择导出哪些表。在下面的截图中，只选择了 `images` 表，因此 `images_backup`\
    \ 不会被导出。\n\n![A978-1-4842-0635-5_10_Figo_HTML.jpg](img/A978-1-4842-0635-5_10_Figo_HTML.jpg)\n\
    \n**提示**  \n通常，备份单个表而不是整个数据库是个好主意，因为大多数 PHP 服务器被配置为将上传限制在 2 MB。如下一步所述，压缩转储文件也有助于规避大小限制。\n\
    \n`输出` 部分有单选按钮，让你可以选择将 SQL 转储保存到文件（这是默认设置）或将输出视为文本。如果你想在创建文件之前检查生成的 SQL，将输出视为文本会很有用。\n\
    \n![A978-1-4842-0635-5_10_Figp_HTML.jpg](img/A978-1-4842-0635-5_10_Figp_HTML.jpg)\n\
    \n*   `文件名模板` 包含一个位于 `@` 标记之间的值。这会根据你导出的内容（是服务器、数据库还是表）自动生成文件名。这个模板的一个非常酷的特性是，你可以使用\
    \ PHP 的 `strftime()` 格式化字符来增强它（参见 [`http://php.net/manual/en/function.strftime.php`](http://php.net/manual/en/function.strftime.php)）。例如，你可以在文件扩展名之前自动添加当前日期到文件名，如下所示：\n\
    \n    `@DATABASE@` `_%Y-%m-%d`\n\n*   `格式` 部分默认为 SQL，但提供了一系列其他格式，包括 CSV、JSON 和\
    \ XML。在 `格式特定选项` 中，你可以选择最大化与不同数据库系统或旧版本 MySQL 的输出兼容性。通常，该值应设置为默认值：`NONE`。\n* \
    \  `文件的字符集` 的默认值是 `utf-8`。仅当你的数据以特定的区域格式存储时，你才需要更改此选项。\n*   `压缩` 是一个非常有用的选项。默认情况下，转储文件不被压缩，但下拉菜单提供了使用\
    \ zip、gzip 或 bzip 压缩的选项。这可以大大减小转储文件的大小，从而加快向另一台服务器传输数据的速度。在导入压缩文件时，`phpMyAdmin`\
    \ 会自动检测压缩类型并解压缩它。\n\n![A978-1-4842-0635-5_10_Figq_HTML.jpg](img/A978-1-4842-0635-5_10_Figq_HTML.jpg)\n\
    \n`对象创建选项` 部分允许你微调用于创建数据库和表的 SQL。下面的截图显示了默认设置。\n\n*   单选按钮为你提供了仅导出结构、仅导出数据或同时导出结构和数据的选项。默认是同时导出两者。\n\
    *   如果你选择了 `结构` 或 `数据` 单选按钮，页面上的其余一些选项将被移除。\n\n![A978-1-4842-0635-5_10_Figr_HTML.jpg](img/A978-1-4842-0635-5_10_Figr_HTML.jpg)\n\
    \n`数据创建选项` 部分控制数据如何插入到表中。在大多数情况下，默认设置就可以了。但是，你可能对更改前四个选项感兴趣，如下面的截图所示。\n\n*   在创建备份时，通常最好选中\
    \ `添加 DROP TABLE / VIEW / PROCEDURE / FUNCTION / EVENT 语句` 复选框，因为备份通常用于替换已损坏的现有数据。\n\
    *   最后一个复选框（默认选中）将表和列名包裹在反引号（`` ` ``）中，以避免与包含无效字符或使用保留字的名称产生问题。我建议始终勾选此选项。\n\n\
    ![A978-1-4842-0635-5_10_Figs_HTML.jpg](img/A978-1-4842-0635-5_10_Figs_HTML.jpg)\n\
    \n当你做出所有选择后，点击页面底部的 `执行`。现在你有了一个备份，可以用来将数据库的内容传输到另一台服务器。\n\n*   第一个复选框允许你在插入数据之前清空表。如果你想替换现有数据（例如，在数据损坏时），这会很有用。\n\
    *   另外两个复选框影响 `INSERT` 命令的执行方式。`INSERT DELAYED` 不适用于默认的 InnoDB 表。而且，它在 MySQL 5.6.6\
    \ 中已被弃用，因此最好避免使用它。\n*   `INSERT IGNORE` 会跳过错误，例如重复的主键。就我个人而言，我认为最好能收到错误警报，所以我不推荐使用它。\n\
    *   标记为 `转储数据时使用的函数` 的下拉菜单允许你选择 `INSERT`、`UPDATE` 或 `REPLACE`。默认是使用 `INSERT` 插入新记录。如果你选择\
    \ `UPDATE`，则仅更新现有记录。`REPLACE` 在必要时进行更新，如果新记录不存在则插入它们。\n\n**提示**  \n默认情况下，`phpMyAdmin`\
    \ 创建的文件只包含用于创建和填充数据库表的 SQL 命令。除非你选择自定义选项来执行此操作，否则它不包含创建数据库的命令。这意味着你可以将表导入到任何数据库中。它的名称不需要与本地测试环境中的名称相同。\n\
    \n### 在 MySQL 中选择正确的数据类型\n\n当你为 `image_id` 列选择 `类型` 时，你可能会感到有点震惊。`phpMyAdmin`\
    \ 列出了所有可用的数据类型——在 MySQL 5.6 中将近有 40 种。为了避免用不必要的细节使你困惑，我将只解释那些最常用的。\n\n你可以在 MySQL\
    \ 文档中找到所有数据类型的完整详细信息，网址是 [`http://dev.mysql.com/doc/refman/5.6/en/data-types.html`](http://dev.mysql.com/doc/refman/5.6/en/data-types.html)。\n"
- fmt: '### Storing text


    The difference between the main text data types boils down to the maximum number
    of characters that can be stored in an individual field, the treatment of trailing
    spaces, and whether you can set a default value.


    - `CHAR`: A fixed-length string. You must specify the required length in the Length/Values
    field. The maximum permitted value is 255. Internally, strings are right-padded
    with spaces to the specified length, but the trailing spaces are stripped when
    you retrieve the value. You can define a default.

    - `VARCHAR`: A variable-length string. You must specify the maximum number of
    characters you plan to use (in phpMyAdmin, enter the number in the Length/Values
    field). Prior to MySQL 5.0, the limit was 255. This was increased to 65,535 in
    MySQL 5.0. If a string is stored with trailing spaces, they are preserved on retrieval.
    Accepts a default value.

    - `TEXT`: Stores text up to a maximum of 65,535 characters (approximately 50%
    longer than this chapter). Cannot define a default value.


    `TEXT` is convenient because you don’t need to specify a maximum size (in fact,
    you can’t). Although the maximum length of `VARCHAR` is the same as `TEXT` in
    MySQL 5.0 and later, other factors may limit the actual amount that can be stored.


    **Tip:** Keep it simple: use `VARCHAR` for short text items and `TEXT` for longer
    ones.


    ### Storing numbers


    The most frequently used numeric column types are as follows:


    - `INT`: Any whole number (integer) between –2,147,483,648 and 2,147,483,647.
    If the column is declared as `UNSIGNED`, the range is from 0 to 4,294,967,295.

    - `FLOAT`: A floating-point number. You can optionally specify two comma-separated
    numbers to limit the range. The first number specifies the maximum number of digits,
    and the second specifies how many of those digits should come after the decimal
    point. Since PHP will format numbers after calculation, I recommend that you use
    `FLOAT` without the optional parameters.

    - `DECIMAL`: A number with a fraction; contains a fixed number of digits after
    the decimal point. When defining the table, you need to specify the maximum number
    of digits and how many of those digits should come after the decimal point. In
    phpMyAdmin, enter the numbers separated by a comma in the Length/Values field.
    For example, 6,2 permits numbers in the range from –9999.99 to 9999.99. If you
    don’t specify the size, the decimal fraction is truncated when values are stored
    in this type of column.


    The difference between `FLOAT` and `DECIMAL` is accuracy. Floating-point numbers
    are treated as approximate values and are subject to rounding errors (for a detailed
    explanation, see [`http://dev.mysql.com/doc/refman/5.6/en/problems-with-float.html`](http://dev.mysql.com/doc/refman/5.6/en/problems-with-float.html)).


    Use `DECIMAL` to store currencies. However, it’s important to note that prior
    to MySQL 5.0.3, the `DECIMAL` data type was stored as a string, so it could not
    be used with SQL functions, such as `SUM()`, to perform calculations inside the
    database. If your remote server is running an older version of MySQL, store currencies
    in an `INT` column as cents; for pounds, use pence. Then use PHP to divide the
    result by 100 and format the currency as desired. Better still, move to a server
    that runs MySQL 5.0 or higher.


    **Caution:** Don’t use commas or spaces as the thousands separator. Apart from
    numerals, the only characters permitted in numbers are the negative operator (`-`)
    and the decimal point (`.`).


    ### Storing dates and times


    MySQL stores dates in one format only: `YYYY-MM-DD`. It’s the standard approved
    by the ISO (International Organization for Standardization) and avoids the ambiguity
    inherent in different national conventions. I’ll return to the subject of dates
    in Chapter 14. The most important column types for dates and times are as follows:


    - `DATE`: A date stored as `YYYY-MM-DD`. The range is 1000-01-01 to 9999-12-31.

    - `DATETIME`: A combined date and time displayed in the format `YYYY-MM-DD HH:MM:SS`.

    - `TIMESTAMP`: A timestamp (normally generated automatically by the computer).
    Legal values range from the beginning of 1970 to partway through January 2038.


    **Caution:** MySQL timestamps are based on a human-readable date and, since MySQL
    4.1, use the same format as `DATETIME`. As a result, they are incompatible with
    Unix and PHP timestamps, which are based on the number of seconds elapsed since
    January 1, 1970. Don’t mix them.


    ### Storing predefined lists


    MySQL lets you store two types of predefined lists that could be regarded as the
    database equivalents of radio-button and check-box states:


    - `ENUM`: This column type stores a single choice from a predefined list, such
    as “yes, no, don’t know” or “male, female.” The maximum number of items that can
    be stored in the predefined list is a mind-boggling 65,535—some radio-button group!

    - `SET`: This column type stores zero or more choices from a predefined list.
    The list can hold a maximum of 64 choices.


    While `ENUM` is quite useful, `SET` tends to be less so, mainly because it violates
    the principle of storing only one piece of information in each field. The type
    of situation in which it can be useful is when recording optional extras on a
    car or multiple choices in a survey.


    ### Storing binary data


    Storing binary data, such as images, isn’t a good idea. It bloats your database,
    and you can’t display images directly from a database. However, the following
    column types are designed for binary data:


    - `TINYBLOB`: Up to 255 bytes

    - `BLOB`: Up to 64 KB

    - `MEDIUMBLOB`: Up to 16 MB

    - `LONGBLOB`: Up to 4 GB


    With such whimsical names, it’s a bit of a letdown to discover that `BLOB` stands
    for binary large object.


    ## Chapter Review


    Much of this chapter has been devoted to theory, explaining the basic principles
    of good database design. Instead of putting all the information you want to store
    in a single, large table like a spreadsheet, you need to plan the structure of
    your database carefully, moving repetitive information into separate tables. As
    long as you give each record in a table a unique identifier—its primary key—you
    can keep track of information and link it to related records in other tables through
    the use of foreign keys. The concept of using foreign keys can be difficult to
    understand at the outset, but it should become clearer by the end of this book.


    You have also learned how to create MySQL user accounts with limited privileges,
    as well as how to define a table and import and export data using an SQL file.
    In the next chapter, you’ll use PHP to connect to the `phpsols` database in order
    to display the data stored in the `images` table.'
