    The XMLHttpRequest Callback Argument


    In all of the preceding examples, I have included an argument called transport
    in the callback functions. As I mentioned previously, this argument is the XMLHttpRequest
    object created as a result of the call to Ajax.Request.


    ■**Note** The primary reason for naming this argument transport (and not xhr or
    something similar) is simply convention. You can call it what you like, but to
    be consistent you should just call it transport.


    You can use transport in your callback functions to read the response data. The
    following properties are available inside the transport variable:


    • responseText: The response from the request as a string.


    • responseXML: The response from the request as an XMLDocument object. This allows
    you to manipulate the response in the same way you would with the normal DOM.
    I will demonstrate this shortly, in the “An Ajax.Request Example” section.


    • status: The HTTP status code resulting from the request (such as 200 for a successful
    request, or 404 for a file-not-found error).


    • statusText: A textual description for the HTTP status code (such as OK for a
    status response of 200).


    So you could modify the handleSuccess() callback from the previous example to
    show the response data in an alert box using the following code:


    <script type="text/javascript">


    function handleSuccess(transport)


    {


    alert(transport.responseText);


    }


    </script>


    **JavaScript Object Notation (JSON)**


    JavaScript Object Notation, or JSON, is a data-exchange format that is very useful
    in Ajax-enabled web applications. In essence, JSON is JavaScript code. It is typically
    used to serialize JavaScript arrays or objects (what I referred to as hashes earlier)
    into a simple format that can be exchanged between client and server.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


