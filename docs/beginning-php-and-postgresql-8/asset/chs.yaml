  ,\"mypswd\");\n\n// 检索所有属性\n\n$status = imap_status($ms, $mailserver.\"INBOX\",SA_ALL);\n\
  \n// 有多少封未读邮件？\n\necho $status->unseen;\n\nimap_close($ms);\n\n?>\n\n```\n\n返回结果为：\n\
  \n```\n毫无疑问，其中大部分是垃圾邮件！\n```\n\n#### 检索邮件\n\n显然，你最感兴趣的是你收到的邮件中包含的信息。本节将展示如何解析这些邮件的头部和正文信息。\n\
  \n##### imap_headers()\n\n`array imap_headers(resource *msg_stream*)`\n\n`imap_headers()`\
  \ 函数检索一个数组，其中包含由 `msg_stream` 指定的邮箱中的邮件。示例如下：\n\n```php\n<?php\n\n// 指定邮箱并建立连接\n\
