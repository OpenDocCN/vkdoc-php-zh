    Please note that all header values must be set before any other output is generated.
    If headers are set after output is generated, PHP will generate a warning.


    Recipe 12-2\. $_GET and $_POST


    Problem


    GET and POST are two HTTP request methods support by browsers. The GET method
    is used when a user clicks a link in a document or types a URL in the address
    bar. The POST method is associated with submitting the HTML form from a web page.


    How can the data from a GET or POST request be access in a PHP script?


    CHAPTER 12 ■ WEB FUNDAMENTALS


    Solution


    The solution is again the super globals. Depending on the configuration value
    variables_order in php.ini the super globals will be populated with values from
    the request. The valid configuration options are zero or more of the letters G,
    P, C, E, and S. Each of these represents Get, Post, Cookie, Environment, and Server.


    Environment variables are not commonly used by PHP scripts so a common configuration
    is variables_


    order = "GPCS" . In addition to variables_order you can also configure request_order
    to define which of the request data is populated into the $_REQUEST array.


    The $_REQUEST super global is a combination of data from other the requests and
    there can be overlap, so the order of whose data is populated matter. If you are
    posting a form with a field named ‘phone’ and the


    [post URL is http://mydomain.com?phone=123](http://mydomain.com/?phone=123) you
    will end up with an index called phone in both the $_GET'
  trans: "\n# 是否可以定义一个接受可变数量参数的函数？\n\n## 解决方案\n\n函数在被调用时，可以传入比其声明时更多的参数。在这种情况下，有几个特殊的函数可以用来获取参数的相关信息。`func_num_args()`\
    \ 函数返回传递给函数的参数数量。`func_get_arg()` 和 `func_get_args()` 函数可用于获取单个参数（按序号）或传递给函数的所有参数。\n\
    \n如果在全局作用域中调用这些函数中的任何一个，都会发出警告。它们只应在函数或方法内部调用。\n\n## 实现原理\n\n在下一个示例中，声明了一个没有必需参数的函数，然后用一个字符串、一个整数和一个数组作为参数来调用它。该函数将显示有三个参数被传递给了它。\n\
    \n```php\n<?php\n// 11_20.php\nfunction MyFunc() {\n    echo func_num_args() .\
    \ \"\\n\";\n}\n\nMyFunc(\"A\", 1, [1,2,3]);\n```\n\n如果函数有一些必需和可选参数，仍然可以传递并处理额外的参数。\n\
    \n```php\n<?php\n// 11_21.php\nfunction MyFunc(string $s, int $i = 0) {\n    echo\
    \ func_num_args() . \"\\n\";\n    print_r(func_get_args());\n}\n\nMyFunc(\"Abc\"\
    , 1, [1,2,3]);\n```\n\n尽管定义了参数 `$s` 和 `$i`，但它们将被分配函数调用时传入的前两个参数；`func_num_args()`\
    \ 和 `func_get_args()` 将计算并返回传入的参数总数。在 PHP 7 下执行时，输出将如下所示：\n\n```\n3\nArray\n(\n\
    \    [0] => Abc\n    [1] => 1\n    [2] => Array\n        (\n            [0] =>\
    \ 1\n            [1] => 2\n            [2] => 3\n        )\n)\n```\n\n# Web 基础\n\
    \nPHP 的主要目的是通过 Web 服务器处理来自浏览器的 Web 或 HTTP 请求，并生成对这些请求的有效响应。Web 请求的特点是通常是短期的，并且不保留关于之前或未来请求的任何信息。这一原则使得即使是一般的硬件配置也可以在短时间内处理大量请求。这通常通过平均响应时间或每秒（或每小时）处理的请求数来衡量。\n\
    \n最初，PHP 是一种将值或内容片段注入现有 HTML 文档的方法，但从 PHP 3 版本开始，已经可以从脚本语言以及 PHP 在运行时可用的任何资源中动态创建完整的\
    \ HTML 文档。PHP 文件的结构可以包含静态 HTML 部分以及解析为动态内容的 PHP 代码段，也可以不包含静态块，而只是一个脚本，其输出返回给发出请求的客户端。\n\
    \n## 配方 12-1. 标头 (Headers)\n\n### 问题\n\n超文本传输协议（HTTP）非常简单。当浏览器和 Web 服务器之间建立 TCP/IP\
    \ 套接字连接时，浏览器会发送一个包含两个基本部分的请求。第一部分是标头（headers），第二部分是消息主体（body）。当服务器返回响应时，也由标头和主体组成。标头和主体之间的分隔符是\
    \ `\\r\\n\\r\\n`（两个回车换行符组合）。\n\n对于大多数简单的请求，开发者可以忽略请求和响应中的标头值。PHP 的默认配置会自动设置有效的标头，假设响应是一个\
    \ HTML 文档。但在其他情况下，可能需要覆盖这些标头或添加额外信息。对于请求，可能需要验证某个标头才能继续处理。\n\n### 解决方案\n\n随 PHP\
    \ 响应发送的默认标头（用于 `Content-Type`）是在 `php.ini` 中配置的，设置项为 `default_mimetype`，默认值为 `text/html`。此外，还有一个名为\
    \ `default_charset` 的设置项，默认值为 `UTF-8`。旧版本的 PHP 使用 `ISO-8859-1` 作为默认字符集。如果要添加或覆盖任何标头，可以使用\
    \ `header()` 函数。每个标头都是一个键值对，由标头名称后跟冒号（`:`）和值组成。设置 `Content-Type` 标头的方法如下：\n\n\
    ```php\nheader(\"Content-Type: text/html\");\n```\n\n有几种方法可以获取请求标头。在标准配置下，标头会位于名为\
    \ `$_SERVER` 的超全局变量中，并且键会以 `HTTP_` 作为前缀。除了请求标头外，`$_SERVER` 变量还包含环境变量和其他数据。\n\n\
    一个常用的请求标头是用户代理（`$_SERVER['HTTP_USER_AGENT']`）变量。这可用于检测请求内容的客户端类型，并据此为特定客户端格式化响应。\n\
    \n所有标头值都很容易被伪造，任何标头值都应像其他用户输入一样处理。\n\n### 实现原理\n\n在接下来的示例中，我们使用 `header()` 函数将\
    \ `Content-Type` 设置为 `text/plain`，然后向客户端发送一些纯文本内容。所有对 `header()` 函数的调用都应在向客户端发送任何其他输出之前完成。\n\
    \n```php\n<?php\n// 12_1.php\nheader(\"Content-Type: text/plain\");\n?>\nThis\
    \ software is licensed under the MIT license\nPlease see https://opensource.org/licenses/MIT\
    \ for details\n```\n\n如果您想将移动设备的用户重定向到网站的特定版本，可以通过检查用户代理字符串和一个用于检查特定关键词的正则表达式来实现。如果找到匹配的关键词，则使用\
    \ `header()` 函数重定向请求。\n\n```php\n<?php\n// 12_2.php\n$mobile = '/(ios|ipod|mobile|pad|phone|tablet|'\
    \ .\n    'symbian|android|blackberry|webos)/i';\n\nif (isset($_SERVER['HTTP_USER_AGENT'])\
    \ &&\n    preg_match($mobile, $_SERVER['HTTP_USER_AGENT'])) {\n    header(\"Location:\
    \ http://m.mysite.com\");\n}\n```\n\n`if` 语句中检查变量是否已设置的第一部分，是为了避免在从未设置用户代理值的客户端请求脚本时产生警告。这可能是一个使用打开包装器（open\
    \ wrappers）从远程服务器请求内容的 PHP 脚本。这可以是对 `file_get_contents()` 的简单调用。这是将文件或流的内容读入变量的首选方式。除非提供了流上下文，否则不会设置任何标头。\n\
    \n请注意，所有标头值必须在生成任何其他输出之前设置。如果在生成输出后设置标头，PHP 将生成一个警告。\n\n## 配方 12-2. $_GET 和 $_POST\n\
    \n### 问题\n\nGET 和 POST 是浏览器支持的两种 HTTP 请求方法。当用户点击文档中的链接或在地址栏中输入 URL 时，使用 GET 方法。POST\
    \ 方法与从网页提交 HTML 表单相关联。\n\n如何在 PHP 脚本中访问来自 GET 或 POST 请求的数据？\n\n### 解决方案\n\n解决方案仍然是使用超全局变量。根据\
    \ `php.ini` 中的配置值 `variables_order`，超全局变量将被来自请求的值填充。有效的配置选项是字母 `G`、`P`、`C`、`E`\
    \ 和 `S` 的零个或多个组合。这些字母分别代表 Get、Post、Cookie、Environment 和 Server。\n\n环境变量通常不被 PHP\
    \ 脚本使用，因此常见的配置是 `variables_order = \"GPCS\"`。除了 `variables_order`，你还可以配置 `request_order`\
    \ 来定义哪些请求数据会被填充到 `$_REQUEST` 数组中。\n\n`$_REQUEST` 超全局变量是来自其他请求数据的组合，并且可能存在重叠，因此数据填充的顺序很重要。如果你提交一个带有名为\
    \ `phone` 字段的表单，并且提交的 URL 是 `http://mydomain.com?phone=123`，那么结果将是 `$_GET` 和 `$_POST`\
    \ 数组中都会有一个名为 `phone` 的索引。\n"
- fmt: "`$_POST`超级全局变量。当数据填充到`$_REQUST`数组中时，其值来自`request_order`配置中最后定义的数组。如果`request_order`设置为`GP`，则`$_POST`数组中的值胜出。如果设置为`PG`，则得到`$_GET`数组中的值。\n\
    \n## 工作原理\n\n当执行不带任何参数的`GET`请求时，`$_GET`数组将是一个空数组。当向URL添加参数时，每个参数都将作为键存入`$_GET`数组。例如，URL\
    \ `http://mydomain.com?p1=test&p2=123`将在`$_GET`变量中产生以下值：\n```\nArray (\n    [p1]\
    \ => test\n    [p2] => 123\n)\n```\n\n可以多次使用相同的变量名，但由于键必须唯一，只有最后一个值会被注册。例如，URL\
    \ `http://mydomain.com?p1=test&p2=123&p1=abc`中参数`p1`被包含了两次，且值不同，这将在`$_GET`数组中生成以下值：\n\
    ```\nArray (\n    [p1] => abc\n    [p2] => 123\n)\n```\n\n就像PHP可以使用语法`$a[] = 'abc'`向数组添加元素一样，也可以在`$_GET`数组中生成包含值数组的元素。例如，URL\
    \ `http://mydomain.com?p1[]=test&p2=123&p1[]=abc`将实现这一点：\n```\nArray (\n    [p1]\
    \ => Array (\n        [0] => test\n        [1] => abc\n    )\n    [p2] => 123\n\
    )\n```\n\n## 第12章 Web基础\n\n如果你想指定数组中的键，也可以这样做。例如，URL `http://mydomain.com?p1[a]=test&p2=123&p1[b]=abc`将在`$_GET`数组的`p1`元素上生成键`a`和`b`：\n\
    ```\nArray (\n    [p1] => Array (\n        [a] => test\n        [b] => abc\n \
    \   )\n    [p2] => 123\n)\n```\n\n将数据填充到`$_POST`数组要复杂一些。虽然它遵循与`$_GET`数组完全相同的规则，但需要用户通过浏览器（或其他能生成`POST`请求的客户端）提交HTML表单。这就是`POST`请求被用于甚至更倾向于用于API请求的原因之一。\n\
    \n要求使用`POST`请求可以防止用户通过浏览器或`wget`命令行工具发送请求，也可能使测试变得更复杂。要求使用`POST`请求并没有真正的安全保障，但增加了难度。\n\
    \n在浏览器中创建`POST`请求始于一个包含提交按钮的HTML表单。表单包含两个HTML组件：首先是包裹一个或多个输入标签的`<form>`标签。`<form>`标签具有定义方法（`GET`或`POST`）和动作（`action`）的属性。动作是接收`POST`请求的目标URL，可以是相对于加载包含该表单的HTML文档所在URL的绝对或相对路径，也可以是不同网站上的完整URL。一个能填充与前面示例类似值的`$_POST`数组的HTML表单可能如下所示：\n\
    ```\n<form method=\"POST\" action=\"/\">\n    <input name=\"p1[a]\" type=\"text\"\
    \ />\n    <input name=\"p1[b]\" type=\"text\" />\n    <input name=\"p2\" type=\"\
    text\" />\n    <input type=\"submit\" />\n</form>\n```\n\n而`$_POST`数组的内容将如下所示：\n\
    ```\nArray (\n    [p1] => Array (\n        [a] => abc\n        [b] => def\n  \
    \  )\n    [p2] => 123\n)\n```\n\n并非必须使用HTML表单才能创建`POST`请求。这也可以通过异步JavaScript和XML请求（AJAX）实现，本章后续部分将详细介绍。\n\
    \n如以下示例所示，可以在查询字符串和请求体中使用相同的变量名：\n```\n<form method=\"POST\" action=\"/?p2=value\"\
    >\n    <input name=\"p1[a]\" type=\"text\" />\n    <input name=\"p1[b]\" type=\"\
    text\" />\n    <input name=\"p2\" type=\"text\" />\n    <input type=\"submit\"\
    \ />\n</form>\n```\n\n这将导致`$_GET`和`$_POST`数组中都包含`p2`的值。\n\n`$_GET`的内容将如下所示：\n\
    ```\nArray (\n    [p2] => value\n)\n```\n\n而`$_POST`数组仍将包含这些值：\n```\nArray (\n\
    \    [p1] => Array (\n        [a] => abc\n        [b] => def\n    )\n    [p2]\
    \ => 123\n)\n```\n\n## 配方12-3 Cookie"
