    ![A978-1-4842-1672-9_2_Fig5_HTML.jpg](A978-1-4842-1672-9_2_Fig5_HTML.jpg)


    Figure 2-5.


    Sign-up form for creating new account


    This PHP script seems perfectly okay if the user supplies essential information
    like an e-mail address, password, etc. correctly. What if the user leaves some
    of the essential boxes blank?


    The previous PHP script does not apply validation checks. Next, let’s learn how
