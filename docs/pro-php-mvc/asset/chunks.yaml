    ```\n\nThis template allows administrators to see the thumbnails of files that\
    \ users have uploaded, and delete/undelete those they feel need changing. This\
    \ means we can now view/edit both users and photos they upload, concluding the\
    \ work we need to do in order to administer our social network.\n\n## Questions\n\
    \n1. In previous chapters, we stored all of a user's information in session variables,\
    \ but in this chapter we slimed it down to just storing a user's `id` property.\
    \ Can you think of any advantages to this approach?\n2. In this chapter, we also\
    \ developed a means of automatically storing the user in the session by overriding/modifying\
    \ some `Shared\\Controller` methods. Can you think of any advantages of this approach?\n\
    3. Can you think of any other user-submitted data that we could build administration\
    \ interfaces for?\n\n## Answers\n\n1. Apart from the stated security benefit of\
    \ not keeping items such as e-mail address and password in the session variables,\
    \ it also speeds up storage/retrieval at the cost of extra database queries. We\
    \ could also use cache to cut down on these extra queries.\n2. We saw that this\
    \ automatic storage/retrieval helped us to work with the user session, without\
    \ the hassle of getting/setting the session details each time we worked with it.\
    \ This benefitted our login, logout, settings, and profile actions/view. This\
    \ will also help whenever we need to get or set any user session information.\n\
    3. We built administration interfaces for users and files, but we could also build\
    \ them for messages and statistics. The sky's the limit!\n\n## Exercises\n\n1.\
    \ With the changes to how we stored user sessions came an increase in database\
    \ queries for user account information. Try storing this information in the cache\
    \ and retrieving it from cache on each page load, instead of additional database\
    \ queries. Just be sure to keep the session information secure!\n2. In Chapter\
    \ 16, we used a primitive form of pagination and neglected adding pagination to\
    \ our administration interface. Try implementing the same primitive pagination\
    \ or even something more creative.\n3. We are displaying thumbnails for the `files/view`\
    \ action, but it would be even better to have the thumbnails click through to\
    \ a larger version of the uploaded file. Perhaps even using some form of JavaScript\
    \ lightbox effect. Try implementing this.\n\n---\n\n# Chapter 21: Testing\n\n\
    With our sample application progressing nicely along, we once again need to turn\
    \ our attention back to the topic of testing. What you are likely to find is that\
    \ testing abstract code is much easier than testing application logic. What's\
    \ more, the tests we need to perform require a level of interaction that's difficult\
    \ to simulate through code.\n\n## Goals\n\n- We need to test the format of various\
    \ input forms.\n- We need to test the results of various user interactions with\
    \ these forms.\n\nOne of the many ways in which we can test the validity of forms\
    \ is by checking for certain elements within the returned body of HTML. To do\
    \ this, we need to utilize our `Request` class (for making various HTTP requests\
    \ to pages within our application) and we need to evaluate the HTML returned by\
    \ the `Request` class to determine whether certain fields are provided for input.\n\
    \nThese two goals can be achieved using the functions shown in Listing 21-1.\n\
    \n**Listing 21-1.** Testing with `Request`\n\n```php\n$get = function($url)\n\
    {\n    $request = new Framework\\Request();\n    return $request->get(\"http://\"\
    .$_SERVER[\"HTTP_HOST\"].\"/{$url}\");\n};\n\n$has = function($html, $fields)\n\
    {\n    foreach ($fields as $field)\n    {\n        if (!stristr($html, \"name=\\\
    \"{$field}\\\"\"))\n        {\n            return false;\n        }\n    }\n \
    \   return true;\n};\n```\n\nThe first function simply creates a new `Request`\
    \ instance and makes a `GET` request to a path within our localhost. If you set\
    \ up your sample application to run under a different host name, be sure to adjust\
    \ this function accordingly.\n\nThe second function iterates over an array of\
    \ field names, checking whether they are contained within the provided `$html`\
    \ string. It converts them into a format of `\"name=\\\"{$field}\\\"\"`, which\
    \ targets form fields. With these functions in place, we can write the tests for\
    \ our sample application's various forms, as demonstrated in Listing 21-2.\n\n\
    **Listing 21-2.** Testing Form Fields\n\n```php\nFramework\\Test::add(\n    function()\
    \ use ($get, $has)\n    {\n        $html = $get(\"register.html\");\n        $status\
    \ = $has($html, array(\n            \"first\",\n            \"last\",\n      \
    \      \"email\",\n            \"password\",\n            \"photo\",\n       \
    \     \"register\"\n        ));\n        return $status;\n    },\n    \"Register\
    \ form has required fields\",\n    \"Forms/Users\"\n);\n\nFramework\\Test::add(\n\
