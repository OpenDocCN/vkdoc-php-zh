- fmt: "### 3.6 Installing PHP 7\n\nSince this is a book on web *application* development,\
    \ we want to do more than just web pages. We need to enable scripting on the server\
    \ side. Therefore, we need to install the application framework we are developing\
    \ with, as well as the plugins to get it running with Apache. This book focuses\
    \ on PHP 7. Unfortunately, CentOS 7 only has PHP 5 available. Therefore, we are\
    \ going to have to load PHP 7 from another repository.\n\nTwo commonly used package\
    \ repositories are the EPEL (Extra Packages for Enterprise Linux) repository and\
    \ Remi Collet’s repositories. It is easy to load new repositories for `yum` to\
    \ find. Each repository has a URL that `yum` can load so that `yum` can use it\
    \ for future installation commands. To enable these repositories, just type the\
    \ following (the indented lines should be put on the same line as the previous\
    \ line):\n\n```\nyum install -y\nhttps://dl.fedoraproject.org/pub/epel/epel-release-latest-7.noarch.rpm\n\
    yum install -y\nhttps://rpms.remirepo.net/enterprise/remi-release-7.rpm\n```\n\
    \nNow we can install PHP 7. To do this, just type:\n\n```\nyum install -y php74\n\
    ```\n\nThis installs the base PHP 7 package and its dependencies, but without\
    \ much else. Once installed, while still in the `/var/www/html` directory, run\
    \ the command `nano test.php` and enter the following script:\n\n![../images/487291_1_En_3_Chapter/487291_1_En_3_Figc_HTML.png](images/487291_1_En_3_Chapter/487291_1_En_3_Figc_HTML.png)\n\
    \nAfter doing this, save the file with `control-o` and exit with `control-x`.\
    \ You can now run the file directly using the command line. Type the command:\n\
    \n```\nphp74 test.php\n```\n\nIt will run the code in your file and output the\
    \ string `This is a test` just like the code says.\n\nNow, open your web browser\
    \ and go to `http://MY.IP.ADDRESS.HERE/test.php`. Notice that it did *not* run\
    \ it as a PHP script. That is because Apache and PHP are not connected together.\n\
    \nWe now need to *connect* PHP to Apache. This is done through the FastCGI Process\
    \ Manager (FastCGI is the protocol that allows PHP and Apache to communicate).\
    \ You can install this with the command:\n\n```\nyum install -y php74-php-fpm\n\
    ```\n\nThis is a separate process, so it has to be enabled and started as well.\n\
    \n```\nsystemctl enable php74-php-fpm\nsystemctl start php74-php-fpm\n```\n\n\
    Now, we have to configure Apache to connect `.php` files to the PHP 7 interpreter.\
    \ Create a file called `/etc/httpd/conf.d/php.conf` using `nano`, and put in this\
    \ text (the indented lines should go on the *same line* as the previous line).\n\
    \n![../images/487291_1_En_3_Chapter/487291_1_En_3_Fig6_HTML.png](images/487291_1_En_3_Chapter/487291_1_En_3_Fig6_HTML.png)\n\
    \nFigure 3-6  \nPHP Configuration File\n\nThis code tells Apache to forward (called\
    \ proxying) all requests for files ending in `.php` to the FastCGI service we\
    \ previously installed. The last line tells Apache that it can treat `index.php`\
    \ as a directory index, meaning that if someone leaves off a filename, and an\
    \ `index.php` file is available, it can serve that file up as the default page\
    \ in that directory.\n\nNow, to get it to all work, restart Apache:\n\n```\nsystemctl\
    \ restart httpd\n```\n\nNow you should be able to hit the file with your browser,\
    \ and it should be processing through PHP 7. Hooray!\n\nWhile PHP is installed,\
    \ you only have the base package installed. To see all of the extensions you can\
    \ install, run the command `yum search php74`. This will display a list of all\
    \ of the available PHP packages, each of which can be installed with `yum install\
    \ -y`.\n\n### 3.7 Turning Off SELinux\n\nSELinux is a security enhancement feature\
    \ for Linux. While, in theory, SELinux can do a lot to minimize security risks\
    \ on servers, in practice it is too unwieldy for practical use. SELinux is generally\
    \ not needed for well-built sites and not enough protection for poorly built ones.\
    \ Instead, it winds up adding a large system administration headache for very\
    \ little gain. If you run SELinux, the most likely outcome is that you will spend\
    \ days trying to figure out why something isn’t working, only to find out that\
    \ SELinux is preventing some basic operation for no good reason.\n\nTo turn off\
    \ SELinux, edit the file `/etc/selinux/config` and change the line that says `SELINUX=enforcing`\
    \ to say `SELINUX=permissive`.\n\nReboot your machine. When it comes back up,\
    \ log in and issue the command `getenforce`. It should say `Permissive`. You are\
    \ now all set to go.\n\nNote that if you don’t disable SELinux, the application\
    \ built in this book will not work, because SELinux will prevent the application\
    \ from connecting to the database.\n\n### 3.8 Setting Up a User for Development\n\
    \nSo far we have used the root user (i.e., the superuser). While there are many\
    \ things for which the root user is required, normally you should spend as little\
    \ time being the root user as possible for safety reasons. Since the root user\
    \ is allowed to do anything, it is easy to violate safeguards as the root user\
    \ to either damage the system or accidentally allow unauthorized entities access\
    \ to your system.\n\nTherefore, we will create a non-administrative user to do\
    \ most of our tasks. This user will be named `fred`. To create the user, type\
    \ the following:\n\n```\nuseradd fred\n```\n\nThis sets up Fred as a user on the\
    \ system, creates a home directory for him, and gives him a user and group number.\
    \ Now we need to set a password for Fred by typing in the following:\n\n```\n\
    passwd fred\n```\n\nThis will prompt you for a password and make sure that you\
    \ typed it in correctly by asking you to repeat it. We want Fred to be able to\
    \ add and modify files in the `/var/www/html` directory, so we need to grant him\
    \ the ownership of those files. We do this with the `chown` command:\n\n```\n\
    chown -R fred /var/www/html\n```\n\nThis tells to change the owner of the `/var/www/html`\
    \ directory and all of the files under it to `fred`. We can now log out or we\
    \ can open a new window and `ssh` back into the machine as `fred`:\n\n```\nssh\
    \ fred@MY.IP.ADDRESS.HERE\n```\n\nThis will land us in Fred’s home directory.\
    \ We can now `cd` into `/var/www/html` and modify the files as before, since they\
    \ are now owned by Fred. Note that root, since it is the superuser, can still\
    \ modify the files as well even though they are owned by Fred."
  raw: '## 3.6 Installing PHP 7


    Since this is a book on web *application* development , we want to do more than
    just web pages. We need to enable scripting on the server side. Therefore, we
    need to install the application framework we are developing with, as well as the
    plugins to get it running with Apache. This book focuses on PHP 7\. Unfortunately,
    CentOS 7 only has PHP 5 available. Therefore, we are going to have to load PHP
    7 from another repository.


    Two commonly used package repositories are the EPEL (Extra Packages for Enterprise
    Linux) repository and Remi Collet’s repositories. It is easy to load new repositories
    for `yum` to find. Each repository has a URL that `yum` can load so that `yum`
    can use it for future installation commands. To enable these repositories, just
    type the following (the indented lines should be put on the same line as the previous
    line):


    ```

    yum install -y

    https://dl.fedoraproject.org/pub/epel/epel-release-latest-7.noarch.rpm

    yum install -y

    https://rpms.remirepo.net/enterprise/remi-release-7.rpm

    ```


    Now we can install PHP 7\. To do this, just type:


    ```

    yum install -y php74

    ```


    This installs the base PHP 7 package and its dependencies, but without much else.
    Once installed, while still in the `/var/www/html` directory, run the command
    `nano test.php` and enter the following script:


    ![../images/487291_1_En_3_Chapter/487291_1_En_3_Figc_HTML.png](images/487291_1_En_3_Chapter/487291_1_En_3_Figc_HTML.png)


    After doing this, save the file with control-o and exit with control-x. You can
    now run the file directly using the command line. Type the command:


    ```

    php74 test.php

    ```


    It will run the code in your file and output the string `This is a test` just
    like the code says.


    Now, open your web browser and go to [`http://MY.IP.ADDRESS.HERE/test.php.`](http://my.ip.address.here/test.php)
    Notice that it did *not* run it as a PHP script. That is because Apache and PHP
    are not connected together.


    We now need to *connect* PHP to Apache. This is done through the FastCGI Process
    Manager (FastCGI is the protocol that allows PHP and Apache to communicate). You
    can install this with the command:


    ```

    yum install -y php74-php-fpm

    ```


    This is a separate process, so it has to be enabled and started as well.


    ```

    systemctl enable php74-php-fpm

    systemctl start php74-php-fpm

    ```


    Now, we have to configure Apache to connect `.php` files to the PHP 7 interpreter.
    Create a file called `/etc/httpd/conf.d/php.conf` using `nano`, and put in this
    text (the indented lines should go on the *same line* as the previous line).


    ![../images/487291_1_En_3_Chapter/487291_1_En_3_Fig6_HTML.png](images/487291_1_En_3_Chapter/487291_1_En_3_Fig6_HTML.png)


    Figure 3-6


    PHP Configuration File


    This code tells Apache to forward (called proxying) all requests for files ending
    in `.php` to the FastCGI service we previously installed. The last line tells
    Apache that it can treat `index.php` as a directory index, meaning that if someone
    leaves off a filename, and an `index.php` file is available, it can serve that
    file up as the default page in that directory.


    Now, to get it to all work, restart Apache:


    ```

    systemctl restart httpd

    ```


    Now you should be able to hit the file with your browser, and it should be processing
    through PHP 7\. Hooray!


    While PHP is installed, you only have the base package installed. To see all of
    the extensions you can install, run the command `yum search php74`. This will
    display a list of all of the available PHP packages, each of which can be installed
    with `yum install -y`.


    ## 3.7 Turning Off SELinux


    SELinux is a security enhancement feature for Linux. While, in theory, SELinux
    can do a lot to minimize security risks on servers, in practice it is too unwieldy
    for practical use. SELinux is generally not needed for well-built sites and not
    enough protection for poorly built ones. Instead, it winds up adding a large system
    administration headache for very little gain. If you run SELinux, the most likely
    outcome is that you will spend days trying to figure out why something isn’t working,
    only to find out that SELinux is preventing some basic operation for no good reason.


    To turn off SELinux, edit the file `/etc/selinux/config` and change the line that
    says `SELINUX=enforcing` to say `SELINUX=permissive`.


    Reboot your machine. When it comes back up, log in and issue the command `getenforce`.
    It should say `Permissive`. You are now all set to go.


    Note that if you don’t disable SELinux, the application built in this book will
    not work, because SELinux will prevent the application from connecting to the
    database.


    ## 3.8 Setting Up a User for Development


    So far we have used the root user (i.e., the superuser). While there are many
    things for which the root user is required, normally you should spend as little
    time being the root user as possible for safety reasons. Since the root user is
    allowed to do anything, it is easy to violate safeguards as the root user to either
    damage the system or accidentally allow unauthorized entities access to your system.


    Therefore, we will create a non-administrative user to do most of our tasks. This
    user will be named `fred`. To create the user, type the following:


    ```

    useradd fred

    ```


    This sets up Fred as a user on the system, creates a home directory for him, and
    gives him a user and group number. Now we need to set a password for Fred by typing
    in the following:


    ```

    passwd fred

    ```


    This will prompt you for a password and make sure that you typed it in correctly
    by asking you to repeat it. We want Fred to be able to add and modify files in
    the `/var/www/html` directory, so we need to grant him the ownership of those
    files. We do this with the `chown` command:


    ```

    chown -R fred /var/www/html

    ```


    This tells to change the owner of the `/var/www/html` directory and all of the
    files under it to `fred`. We can now log out or we can open a new window and `ssh`
    back into the machine as `fred`:


    ```

    ssh fred@MY.IP.ADDRESS.HERE

    ```


    This will land us in Fred’s home directory. We can now `cd` into `/var/www/html`
    and modify the files as before, since they are now owned by Fred. Note that root,
    since it is the superuser, can still modify the files as well even though they
    are owned by Fred.'
  trans: "\n### 3.6 安装 PHP 7\n\n由于这是一本关于 Web *应用*开发的书籍，我们的目标不仅仅是制作网页。我们需要启用服务器端脚本功能。因此，我们需要安装我们正在开发的应用程序框架，以及使其能够在\
    \ Apache 下运行的插件。本书聚焦于 PHP 7。遗憾的是，CentOS 7 仅提供 PHP 5。因此，我们需要从另一个仓库加载 PHP 7。\n\n\
    两个常用的软件包仓库是 EPEL（企业版 Linux 的附加软件包）仓库和 Remi Collet 的仓库。为 `yum` 加载新仓库以便其查找是非常容易的。每个仓库都有一个\
    \ `yum` 可以加载的 URL，这样 `yum` 就可以在将来的安装命令中使用它。要启用这些仓库，只需输入以下命令（缩进行应与上一行放在同一行）：\n\n\
    ```\nyum install -y\nhttps://dl.fedoraproject.org/pub/epel/epel-release-latest-7.noarch.rpm\n\
    yum install -y\nhttps://rpms.remirepo.net/enterprise/remi-release-7.rpm\n```\n\
    \n现在我们可以安装 PHP 7 了。为此，只需输入：\n\n```\nyum install -y php74\n```\n\n这将安装基础的 PHP 7\
    \ 软件包及其依赖项，但不会安装其他额外内容。安装完成后，在 `/var/www/html` 目录下，运行命令 `nano test.php` 并输入以下脚本：\n\
    \n![../images/487291_1_En_3_Chapter/487291_1_En_3_Figc_HTML.png](img/487291_1_En_3_Figc_HTML.png)\n\
    \n完成后，使用 `control-o` 保存文件，并使用 `control-x` 退出。现在，您可以直接使用命令行运行该文件。输入命令：\n\n```\n\
    php74 test.php\n```\n\n它将运行您文件中的代码，并输出字符串 `This is a test`，与代码所示一致。\n\n现在，打开您的网页浏览器，访问\
    \ `http://MY.IP.ADDRESS.HERE/test.php`。请注意，它并*没有*将其作为 PHP 脚本来运行。这是因为 Apache 和\
    \ PHP 尚未连接在一起。\n\n我们现在需要将 PHP *连接* 到 Apache。这可以通过 FastCGI 进程管理器实现（FastCGI 是允许\
    \ PHP 和 Apache 进行通信的协议）。您可以使用以下命令安装它：\n\n```\nyum install -y php74-php-fpm\n```\n\
    \n这是一个独立的进程，因此也需要启用并启动它。\n\n```\nsystemctl enable php74-php-fpm\nsystemctl start\
    \ php74-php-fpm\n```\n\n现在，我们必须配置 Apache，将 `.php` 文件连接到 PHP 7 解释器。使用 `nano` 创建一个名为\
    \ `/etc/httpd/conf.d/php.conf` 的文件，并输入以下文本（缩进行应与上一行放在*同一行*）。\n\n![../images/487291_1_En_3_Chapter/487291_1_En_3_Fig6_HTML.png](img/487291_1_En_3_Fig6_HTML.png)\n\
    \n图 3-6  \nPHP 配置文件\n\n这段代码告诉 Apache 将所有以 `.php` 结尾的文件的请求转发（称为代理）到我们之前安装的 FastCGI\
    \ 服务。最后一行告诉 Apache 可以将 `index.php` 视为目录索引，这意味着如果某人省略了文件名，并且存在 `index.php` 文件，它可以提供该文件作为该目录的默认页面。\n\
    \n现在，为了使所有配置生效，请重启 Apache：\n\n```\nsystemctl restart httpd\n```\n\n现在，您应该能够通过浏览器访问该文件，并且它应该通过\
    \ PHP 7 进行处理了。太好了！\n\n虽然 PHP 已安装，但您只安装了基础包。要查看所有可安装的扩展，请运行命令 `yum search php74`。这将显示所有可用\
    \ PHP 包的列表，每个包都可以使用 `yum install -y` 安装。\n\n### 3.7 关闭 SELinux\n\nSELinux 是 Linux\
    \ 的一项安全增强功能。虽然理论上 SELinux 可以大大降低服务器上的安全风险，但在实践中，它对于实际使用来说过于笨重。对于构建良好的网站，通常不需要\
    \ SELinux；而对于构建拙劣的网站，它的保护又不够。相反，它最终会带来巨大的系统管理难题，而收益甚微。如果您运行 SELinux，最可能的结果是您会花费数天时间试图弄清楚为什么某些功能无法工作，最后却发现\
    \ SELinux 无缘无故地阻止了某些基本操作。\n\n要关闭 SELinux，请编辑文件 `/etc/selinux/config`，将写着 `SELINUX=enforcing`\
    \ 的那一行改为 `SELINUX=permissive`。\n\n重启您的机器。当它重新启动后，登录并执行命令 `getenforce`。它应该显示 `Permissive`。现在您就一切就绪了。\n\
    \n请注意，如果您不禁用 SELinux，本书中构建的应用程序将无法运行，因为 SELinux 会阻止应用程序连接到数据库。\n\n### 3.8 为开发设置用户\n\
    \n到目前为止，我们一直使用 root 用户（即超级用户）。虽然很多操作都需要 root 用户，但出于安全原因，通常您应该尽可能少地使用 root 用户。由于\
    \ root 用户有权执行任何操作，因此作为 root 用户很容易破坏安全防护机制，从而损害系统或意外允许未经授权的实体访问您的系统。\n\n因此，我们将创建一个非管理用户来执行大部分任务。该用户将被命名为\
    \ `fred`。要创建该用户，请输入以下命令：\n\n```\nuseradd fred\n```\n\n这将把 Fred 设置为系统上的一个用户，为他创建一个主目录，并分配给他一个用户\
    \ ID 和组 ID。现在，我们需要为 Fred 设置一个密码，输入以下命令：\n\n```\npasswd fred\n```\n\n系统将提示您输入密码，并要求您重复输入以确保输入正确。我们希望\
    \ Fred 能够在 `/var/www/html` 目录中添加和修改文件，因此我们需要授予他对这些文件的所有权。我们使用 `chown` 命令来执行此操作：\n\
    \n```\nchown -R fred /var/www/html\n```\n\n这告诉系统将 `/var/www/html` 目录及其下所有文件的所有者更改为\
    \ `fred`。现在，我们可以注销，或者打开一个新窗口，以 `fred` 的身份通过 `ssh` 重新登录到机器：\n\n```\nssh fred@MY.IP.ADDRESS.HERE\n\
    ```\n\n这将使我们进入 Fred 的主目录。现在我们可以像之前一样 `cd` 进入 `/var/www/html` 并修改文件，因为这些文件现在归 Fred\
    \ 所有。请注意，root 用户因为是超级用户，即使文件归 Fred 所有，也仍然可以修改这些文件。\n"
- fmt: '# 3.9 Transmitting Files to the Server


    Now, most people don’t like programming directly on their servers. Usually, they
    want to write the program on their own machine and then transmit it to the server.
    To do this, you will need a tool that supports the SFTP protocol. SFTP is basically
    FTP over SSH.


    The easiest SFTP solution that works across Windows, Macintosh, and Linux is FileZilla
    (`www.filezilla-project.org`). You can use either the regular (free) or the professional
    (paid) version. To use FileZilla, after you install it, just open it up, click
    “File,” and then click “Site Manager.” Click the “New Site” button.


    Fill out this screen similar to Figure 3-7. In the “Host” box, put the IP address
    of your Linode server. In the “Protocol” box, select SFTP. Set the “Logon Type”
    to normal, and put the username as `fred` and the password as whatever you set
    for Fred’s password. You can also change the name of the site to something memorable
    (I called mine “Linode Virtual Server”).


    ![../images/487291_1_En_3_Chapter/487291_1_En_3_Fig7_HTML.jpg](images/487291_1_En_3_Chapter/487291_1_En_3_Fig7_HTML.jpg)


    **Figure 3-7** Setting Up FileZilla to Connect


    When you are done, click the “Connect” button.


    The first time you connect, it may bring up a dialog that says, “Unknown host
    key.” This is fine—it is the same idea as when you first connected via `ssh`.
    The software just has never seen the server before. Click the box that says, “Always
    trust this host,” and then click “OK.” Once it is connected, it will look similar
    to Figure 3-8.


    ![../images/487291_1_En_3_Chapter/487291_1_En_3_Fig8_HTML.jpg](images/487291_1_En_3_Chapter/487291_1_En_3_Fig8_HTML.jpg)


    **Figure 3-8** FileZilla Connected to Your Linode Server


    FileZilla operates with two panes—the left pane is your local computer, and the
    right pane is the remote computer. It tells you which directory it is looking
    at in each one. What you need to do is set the local directory to wherever your
    files are you want to transfer, and the remote directory to wherever you want
    to put those files (presumably `/var/www/html`). Once these directories are set,
    the two panes below those list the actual files, and you can simply drag and drop
    them back and forth.


    As an exercise, create a few simple PHP files on your local computer and transfer
    them to the server, and verify that you can see them through your web browser.


    ## Editing `php.ini`


    ![../images/487291_1_En_3_Chapter/487291_1_En_3_Figd_HTML.jpg](images/487291_1_En_3_Chapter/487291_1_En_3_Figd_HTML.jpg)


    For some applications, you may need to modify the `php.ini` file. The version
    of PHP 7 we have installed puts the `php.ini` file in the directory `/etc/opt/remi/php74/`.
    However, only root can access this file.


    If you need to transfer it with FileZilla, you will need to reconnect as root,
    with root’s password. You can also log in via `ssh` and modify it directly with
    `nano`. In any case, always exercise care when modifying this file. Also, after
    modifying the file, be sure to restart the PHP process using


    ```

    systemctl restart php74-php-fpm

    ```


    This may seem to be a lot of work to get set up. While there are faster ways to
    get started, this method gives you several advantages. First of all, you are now
    more familiar than most people with how all of these pieces connect together.
    Second, you have a web server running PHP 7, and not some decade-old version.
    Finally, you have everything you need, and nothing that you don’t, which will
    help you with keeping your web server secure.


    ## Other Tools to Install


    ![../images/487291_1_En_3_Chapter/487291_1_En_3_Fige_HTML.jpg](images/487291_1_En_3_Chapter/487291_1_En_3_Fige_HTML.jpg)


    Personally, I like my nodes packed with tools. I have been a Linux user longer
    than many of my readers have been alive, so I am pretty familiar with a large
    swath of tools. Thankfully, they are all easy to install (you must be logged in
    as root to do so).


    In any case, the following are the install commands for the tools that I frequently
    use:


    ```

    yum install -y git

    yum install -y screen

    yum install -y telnet

    yum install -y bind-utils

    yum install -y traceroute

    yum install -y nmap

    yum install -y strace

    yum install -y perl

    ```


    This book is not an introduction to these commands, but they are worth investigating.


    # Creating a Simple Web App


    In this chapter, we are going to be creating an extremely simple web application
    to use for demonstration purposes in subsequent chapters. The goal here is to
    get a full, end-to-end application up and running.


    The application we are going to develop will simply be a guestbook, so that anyone
    can come and post a message into the guestbook.'
