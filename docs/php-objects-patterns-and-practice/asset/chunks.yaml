- fmt: 'Remember that the data needed for the process of acquiring`Command`and`ViewComponent`objects
    in Figure [12-7](#A314621_5_En_12_Chapter.html#Fig7) was compiled by our old friend,`ApplicationHelper`.
    As a reminder, here is the high-level code that achieved that:


    ```

    // listing 12.29

    private function setupOptions()

    {

    //...

    $vcfile = $conf->get("viewcomponentfile");

    $cparse = new ViewComponentCompiler();

    $commandandviewdata = $cparse->parseFile($vcfile);

    $reg->setCommands($commandandviewdata);

    }

    ```


    ### The`Command`Class


    Now that commands are no longer responsible for invoking their templates, it’s
    worth looking briefly at the base class and the implementation. We have already
    seen the new statuses in the`Command`class, but there is an additional piece of
    housekeeping to note:


    ```

    // listing 12.30

    abstract class Command

    {

    const CMD_DEFAULT = 0;

    const CMD_OK = 1;

    const CMD_ERROR = 2;

    const CMD_INSUFFICIENT_DATA = 3;

    final public function __construct()

    {

    }

    public function execute(Request $request)

    {

    $status = $this->doExecute($request);

    $request->setCmdStatus($status);

    }

    abstract public function doExecute(Request $request): int;

    }

    ```


    In a good example of the Template Method pattern, the`execute()`method calls the
    abstract`doExecute()`method, and caches the return value in the`Request`object.
    This will be used a little later by the`ComponentDescriptor`in selecting the correct
    view to return.


    ### A Concrete Command


    Here is how a simple`AddVenue`command might look:


    ```

    // listing 12.31

    class AddVenue extends Command

    {

    public function doExecute(Request $request): int

    {

    $name = $request->getProperty("venue_name");

    if (is_null($name)) {

    $request->addFeedback("no name provided");

    return self::CMD_INSUFFICIENT_DATA;

    } else {

    // do some stuff

    $request->addFeedback("''{$name}'' added");

    return self::CMD_OK;

    }

    return self::CMD_DEFAULT;

    }

    }

    ```


    In fact, this is missing functional code related to building a`Venue`object and
    saving it to a database, but we will get to all that. All that’s important at
    this point is the fact that the command returns different statuses, according
    to the circumstances. As we have already seen, different statuses will cause different
    views to be selected and returned by the application controller. So, if we’re
    using the example XML, when`CMD_OK`is returned, the forwarding mechanism will
    trigger forwarding to`/addspace`. This is triggered in this way only for`/addvenue`.
    If the request that caused this command to be invoked uses the path`/quickaddvenue`,
    then no forwarding will take place, and the`quickaddvenue`view will be displayed.
    The`AddVenue`command knows nothing of this, though. It sticks to its core responsibilities.


    ### Consequences


    A fully featured instance of the Application Controller pattern can be a pain
    to set up because of the sheer amount of work that must go into acquiring and
    applying metadata that describes the relationships between command and request,
    command and command, and command and view.


    For this reason, I tend to implement something like this only when my application
    tells me it is needed. I usually hear this whisper when I find myself adding conditionals
    to my commands that invoke different views or invoke other commands, according
    to the circumstances. It is at about this time that I feel that command flow and
    display logic are beginning to spiral out of my control.


    Of course, an application controller can use all sorts of mechanisms to build
    its associations among commands and views, not just the approach I have taken
    here. Even if you’re starting off with a fixed relationship among a request string,
    a command name, and a view in all cases, you could still benefit from building
    an application controller to encapsulate this. It will give you considerable flexibility
    when you must refactor in order to accommodate more complexity.


    ## Page Controller


    Much as I like the Front Controller pattern, it is not always the right approach
    to take. The investment in up-front design tends to reward the larger system and
    penalize simple, need-results-now projects. The Page Controller pattern will probably
    be familiar to you already as it is a common strategy. Nevertheless, it is worth
    exploring some of the issues.


    ### The Problem


    Once again, the problem is your need to manage the relationship among request,
    domain logic, and presentation. This is pretty much a constant for enterprise
    projects. What differs, though, are the constraints placed on you.


    If you have a relatively simple project, one in which big up-front design could
    threaten your deadline without adding huge amounts of value, Page Controller can
    be a good option for managing requests and views.


    Let’s say that you want to present a page that displays a list of all venues in
    the Woo system. Even with the database retrieval code finished, without Front
    Controller already in place, I have a daunting task to get just this simple result.


    The view is a list of venues; the request is for a list of venues. Errors permitting,
    the request does not lead to a new view, as you might expect in a complex task.
    The simplest thing that works here is to associate the view and the controller—often
    in the same page.'
