    $this->key=1;

    $this->previous=1;

    $this->last=1;

    }

    public function current(){

    return $this->previous;

    }

    public function key(){

    return $this->key;

    }

    public function next(){

    ++$this->key;

    $this->last+=$this->previous;

    $this->previous=$this->last-$this->previous;

    }

    public function valid(){

    if($this->keymax) return true;

    else return false;

    }

