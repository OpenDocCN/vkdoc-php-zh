- "# PHP 解决方案 15-4：构建详情页面\n\n本 PHP 解决方案演示了如何关联 `blog` 和 `images` 表，以显示所选文章及其关联图片。MySQLi\
  \ 和 PDO 的代码几乎相同，因此本解决方案将同时涵盖两者。\n\n将 `ch15` 文件夹中的 `details_01.php` 复制到 `phpsols`\
  \ 站点根目录，并将其重命名为 `details.php`。如果编辑环境提示您更新链接，**请勿**更新。确保 `footer.php` 和 `menu.php`\
  \ 位于 `includes` 文件夹中，然后在浏览器中加载该页面。它应如图 15-5 所示。\n\n![A978-1-4842-0635-5_15_Fig5_HTML.jpg](img/A978-1-4842-0635-5_15_Fig5_HTML.jpg)\n\
  \n图 15-5。\n\n详情页面包含占位图片和文本。在浏览器中加载 `blog_list_mysqli.php` 或 `blog_list_pdo.php`，并通过分配如下所示的图片文件名来更新以下三篇文章：\n\
