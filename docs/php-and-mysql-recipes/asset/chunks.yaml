  raw: 'When the XML structure becomes more complex or you want to convert from an
    XML structure to an object structure that can be used to iterate over values,
    there are a number of options in PHP. Most of them require the library called
    libxml to be installed on the system.


    The DOM extension allows the manipulation of a XML document through the so-called
    DOM API. This is an object-oriented interface.


    The libxml extension is the “wrapper” around the libxml library. It is mostly
    been used by many of the other XML extensions, but it does provide a few functions
    that can be called directly.


    The SDO extension provides a way to work with data from different data sources
    using the same interface. The consumer of data does not have to know anything
    about the underlying data source and how to interact with it. The data sources
    can be XML files, Spreadsheets, and Database queries, etc.


    The SimpleXML extension was introduced in PHP 5\. This is a lightweight and simple-to-use
    extension for reading and writing XML content.


    The WDDX extension makes it possible to do data exchanges between different programming
    languages over different protocols.


    The XMLDiff extension can be used to compare two XML documents and to apply patches
    to XML


    documents in a similar way to how source control systems work.


    The XML Parser extension is a set of functions that can be used to build XML parsers
    for specific document definitions. The parsers can work on small sections of a
    file so its not needed to load large XML


    documents into memory all at the same time.


    The XML Reader extension acts as a cursor that reads the XML structure one node
    at the time.


    The XML Writer extension can be used to create XML streams, where each node is
    processed and written without the need to load the entire data structure into
    memory to create the XML content.


    Finally there is the XSLT extension that makes it possible to transform an XML
    structure. This extension requires the libxslt library.


    How it Works


    The SimpleXML extension is perhaps the easiest to use. Parsing and converting
    an XML document into a PHP object structure can be done in a few lines of code.
    In this example we are going to use an external source for the XML document. The
    example uses OpenWeatherMap.com and the source. This is a free source of weather
    data. It is only required that you sign up for an API key. The API key must be
    passed as a parameter to every request. In the example where <API KEY> is used
    you should replace it with your own key. You can get an API key her[e: http://openweathermap.org/appid](http://openweathermap.org/appid)
    .


    To get the current weather in Los Angeles you can use this url with a few parameters:
    http://api.openweathermap.org/data/2.5/weather


    The API takes three parameters. The first is an indication of the location. This
    can be a city and a country code.


    q=Los%20Angeles,us


    CHAPTER 14 ■ XML, RSS, WDDX, AND SOAP


    The second is the mode . The API will default to a JSON response. To get an XML
    response, add this parameter:


    mode=xml


    And finally add a parameter with your api key :


    appid=<API KEY>


    When using the simplexml:load_file() function the filename provided as the first
    parameter can point to a file on the local file system or it can be a URL to read
    the XML content from a remote server:


    <?php


    // 14_2.php


    $xml = simplexml:load_file("http://api.openweathermap.org/data/2.5/weather?q=Los%20


    Angeles,us&mode=xml&appid=<API KEY>");


    print_r($xml);


    In this simple example the XML structure is requested and passed in the same function
    call. The simplexml:load_file() function will return an instance of the class
    SimpleXMLElement as shown with the sample output.


    SimpleXMLElement Object


    (


    [city] => SimpleXMLElement Object


    (


    [@attributes] => Array


    (


    [id] => 5368361


    [name] => Los Angeles


    )


    [coord] => SimpleXMLElement Object


    (


    [@attributes] => Array


    (


    [lon] => -118.24


    [lat] => 34.05


    )


    )


    [country] => US


    [sun] => SimpleXMLElement Object


    (


    [@attributes] => Array


    (


    [rise] => 2016-04-10T13:26:29


    [set] => 2016-04-11T02:21:43


    )


    )


    )'
