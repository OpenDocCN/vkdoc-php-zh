- fmt: '# Parsing the Configuration File


    Thanks to the SimpleXML extension, we don’t have to do any actual parsing—that
    is handled for us. All that is left is to traverse the SimpleXML data structure
    and build our own data. Here is a class named `ViewComponentCompiler` that does
    just that:


    ```php

    // listing 12.21

    class ViewComponentCompiler

    {

    private static $defaultcmd = DefaultCommand::class;

    public function parseFile($file)

    {

    $options = \simplexml:load_file($file);

    return $this->parse($options);

    }

    public function parse(\SimpleXMLElement $options): Conf

    {

    $conf = new Conf();

    foreach ($options->control->command as $command) {

    $path = (string)$command[''path''];

    $cmdstr = (string)$command[''class''];

    $path = (empty($path)) ? "/" : $path;

    $cmdstr = (empty($cmdstr)) ? self::$defaultcmd : $cmdstr;

    $pathobj = new ComponentDescriptor($path, $cmdstr);

    $this->processView($pathobj, 0, $command);

    if (isset($command->status) && isset($command->status[''value''])) {

    foreach ($command->status as $statusel) {

    $status = (string)$statusel[''value''];

    $statusval = constant(Command::class . "::" . $status);

    if (is_null($statusval)) {

    throw new AppException("unknown status: {$status}");

    }

    $this->processView($pathobj, $statusval, $statusel);

    }

    }

    $conf->set($path, $pathobj);

    }

    return $conf;

    }

    public function processView(ComponentDescriptor $pathobj, int $statusval, \SimpleXMLElement
    $el)

    {

    if (isset($el->view) && isset($el->view[''name''])) {

    $pathobj->setView($statusval, new TemplateViewComponent((string)$el->view[''name'']));

    }

    if (isset($el->forward) && isset($el->forward[''path''])) {

    $pathobj->setView($statusval, new ForwardViewComponent((string)$el->forward[''path'']));

    }

    }

    }

    ```


    The real action here takes place in the `parse()` method, which accepts a `SimpleXMLElement`
    object for traversal. I start by instantiating a `Conf` object (remember, this
    is just a wrapper around an array). Then I loop through the command elements in
    the XML. For each command, I extract the values of the `path` and `class` attributes,
    and I pass this data to the constructor of a `ComponentDescriptor` object. This
    object will manage the bundle of information associated with a `command` element—you’ll
    see the class soon.


    Then I call a private method named `processView()`, passing it the `ComponentDescriptor`,
    a zero-valued integer (because we’re handling the default status), and a reference
    to the current XML element (that is `command` right now). Depending on what it
    finds in the XML fragment, `processView()` either creates a `TemplateViewComponent`
    or a `ForwardViewComponent`, which it passes along to `ComponentDescriptor::setView()`.
    It may match nothing and make no call at all, of course—but that is probably inadvisable.
    Perhaps we’d make it an error condition in a fuller implementation.


    Back in `parse()`, I begin work on the `status` attributes. I call `processView()`
    once again—but this time with the integer that corresponds to the string in the
    `status` element’s `value` attribute. In other words, the string `CMD_OK` becomes
    1, `CMD_ERROR` becomes 2, and so on. PHP’s `constant()` method provides a neat
    way of making this conversion. So I pass `processView()` a non-zero integer this
    time around, as well as the `status` XML element.


    Once again `processView()` populates the `ComponentDescriptor` with any found
    `ViewComponent` objects.


    Finally, I store the `ComponentDescriptor` object in the `Conf` object, indexed
    by the command component’s `path` value.


    Once the loop is finished, I return the `Conf` object.


    It may take a little re-reading before you can follow this flow; but in essence,
    the process is very simple: `ViewComponentCompiler` builds up an array (wrapped,
    as previously, in a `Conf` object) of `ComponentDescriptor` objects. Each `ComponentDescriptor`
    object maintains information about a path and a `Command` class, as well as an
    array of `ViewComponent` objects (managing template display or forwarding) indexed
    by a status value (0 for the default view).


    Despite all this busywork, it is important to remember the high-level process
    is pretty simple. We are constructing the relationships between potential requests
    on the one hand, and commands and views on the other. Figure [12-6](#A314621_5_En_12_Chapter.html#Fig6)
    shows this initialization process.


    ![A314621_5_En_12_Fig6_HTML.gif](A314621_5_En_12_Fig6_HTML.gif)


    **Figure 12-6.** Compiling commands and views'
