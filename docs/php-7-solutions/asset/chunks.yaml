    \ is empty the first time you run the script (you can tell\n    because the `filesize()`\n\
    \    function  returns\n    `0`), so you can\n    go ahead and write the details\
    \ using `fputcsv()`. This is\n    the counterpart of `fgetcsv()`, which was\n\
    \    described in Chapter [7](#332054_4_En_7_Chapter.xhtml). Whereas `fgetcsv()`\
    \ extracts\n    the data from a CSV file one line at a time, `fputcsv()` creates\
    \ a\n    CSV record. It has two required arguments: the file reference and an\n\
    \    array of values to be inserted as a CSV record. It also accepts optional\n\
    \    arguments to set the delimiter and enclosure characters (see the online\n\
    \    documentation at [`www.php.net/manual/en/function.fputcsv.php`](http://www.php.net/manual/en/function.fputcsv.php)\
    \ ).\n\nIf `filesize()` doesn’t\n    return `0`, you\n    need to reset the internal\
