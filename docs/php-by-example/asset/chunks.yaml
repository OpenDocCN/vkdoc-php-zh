    程序创建了两个多维数组，并以不同模式显示其内容。第一个数组是使用`$A=[[1,2,3,4,5],["A","B","C"],[6,7,8,9]]`命令创建的。这是一个由三个元素组成的数组：元素`$A[0]`是数组`[1,2,3,4,5]`，元素`$A[1]`是数组`["A","B","C"]`，元素`$A[2]`是数组`[6,7,8,9]`。如果你指定第二个索引，就可以访问内部数组的元素。例如，表达式`$A[0][1]`引用的是`$A`数组中索引为`0`的数组里索引为`1`的元素（元素值为`2`）。指令`$A[1][2]`引用的是`$A`数组中索引为`1`的数组里索引为`2`的元素（元素值为`"C"`）。


    你没有为数组元素指定索引，因此它们是自动确定的。你可以利用这一点，使用索引来枚举数组元素。这在嵌套的`for`循环语句中完成。在外层语句中，循环变量`$i`从`0`运行到`count($A)`（`$A`数组中的元素个数）减一。在内层循环语句中，循环变量`$j`从`0`运行到`count($A[$i])`（内部数组`$A[$i]`中的元素个数）减一。在给定的`$i`和`$j`变量值下，执行`echo
    $A[$i][$j]," "`命令，该命令会显示元素`$A[$i][$j]`（`$A`数组中索引为`$i`的数组里索引为`$j`的元素）的值和一个空格。内层循环语句终止后，`echo
    "\n"`命令会换行（将光标移动到输出区域的新行）。'
  raw: 'The `foreach` loop statement is used to iterate over the elements of the `$A`
    array. The key is stored in the `$k` variable, and the element’s value is stored
    in the `$v` variable. For each cycle, the `print("\$A[$k] = $v")` command displays
    the value of the array element. Then, the conditional statement comes into play,
    in which the `gettype($v)=="string"` condition is checked (the element’s value
    is of the `string` type). If so, the `print(" - remove\n")` command displays a
    message about removing the element, and then the element is removed from the array
    using the `unset($A[$k])` command.


    If the `gettype($v)=="string"` condition is false, then the `print(" - remain\n")`
    command displays a message that the element remains in the array.


    After the loop statement is terminated, check the array’s contents. The check
    shows that the element with the text value is removed from the array.


    Sometimes, you do not need to know and use the keys of the array elements. That
    means that you are interested only in the values of the elements. If so, a simplified
    syntax can be used in the `foreach` loop statement.


    ```

    foreach(array as variable){

    # commands

    }

    ```


    Here, a variable to store the keys is not specified, and the name of the variable
    follows the `as` keyword that sequentially, cycle by cycle, takes the values of
    the elements from the array placed before the `as` keyword. An example of using
    the `foreach` loop statement in a simplified form is shown in Listing [4-5](#613529_1_En_4_Chapter.xhtml#PC12).


    ```

    100,"Y"=>200,"Z"=>300];

    echo "\$A = [ ";

    # Iterates over the values of the elements:

    foreach($A as $v){

    echo $v," ";

    }

    echo "]";

    ?>

    Listing 4-5

    Iterating over the Array’s Elements

    ```


    The following shows the program’s output.


    ```

    The output of the program (from Listing 4-5)

    $A = [ 100 200 300 ]

    ```


    Here, in the loop statement, the `$v` variable sequentially takes the values of
    the `$A` array elements. The keys are not used.


    It is worth mentioning that within the framework described, you can access the
    value of an element in a read-only mode. You cannot assign a new value to the
    element since the standard scheme for iterating over array elements assumes that
    a copy of the element’s value is written to the corresponding variable. By changing
    the value of the copy, you do not affect the element’s value. Nevertheless, there
    exists an easy way to change the situation. To do that, in the description of
    the `foreach` loop statement, before the name of the variable proposed for storing
    the values of the array elements, you should place the `&` symbol. If you do so,
    the specified variable refers to an array element. In other words, you get access
    to the element’s value and the element itself (and you can, if necessary, change
    its value).


    | Details |

    | --- |

    | You can also refer to ordinary variables. A variable reference is an alternative
    way to get access to that variable. To create a reference to a variable, you must
    create a new variable (reference) in the program and assign the original variable
    as a value, prefixing it with the `&` symbol. For example, the `$x=100` command
    creates the `$x` variable with the value `100`. Then, the `$y=&$x` command creates
    the `$y` reference to the `$x` variable. That means changing the `$x` variable
    automatically changes the `$y` variable, and vice versa. The reason is simple:
    the `$x` and `$y` variables refer to the same memory area. |


