  \ |\n\n### 5.20 `Titanium`\n\n`Titanium` 在概念上与 Adobe Air 类似，两者的优缺点及用法也基本相同。然而，它本可以截然不同——因为早期版本的\
  \ `Titanium` 曾将 PHP 作为一等公民语言集成支持。这意味着你可以像使用 JavaScript 一样，在 *HTML 内部* 使用 PHP，无需服务器。你可以直接在页面上运行\
  \ PHP 代码、访问页面 DOM，并完成 PHP 能做的所有事情。但自 v2 版本起，Appcelerator 移除了该功能，转而专注于 JavaScript。虽然较旧版本的开源核心产品仍保留\
