    Building the Blogging System


    **N**ow thatusers can register and log in to theweb application, it is time toallow
    them to create their own blogs. In this chapter, we will begin to build the blogging
    functionality for our Web 2.0 application. We will implement the tools that will
    permit each user to create and manage their own blog posts.


    In this chapter, we will be adding the following functionality to our web application:


    • **Enable users to create new blog posts.** A blog post will consist of a title,
    the date submitted, and the content (text or HTML) relating to the post. We will
    implement the form (and corresponding processing code) that allows users to enter
    this content, and that correctly filters submitted HTML code so JavaScript-based
    attacks cannot occur. This form will also be used for editing existing posts.


    • **Permit users to preview new posts.** This simple workflow system will allow
    users to double-check a post before sending it live. When a user creates a new
    post, they will have an option to either preview the post or send it live immediately.
    When previewing a post, they will have the option to either send it live or to
    make further changes.


    • **Notify users of results.** We will implement a system that notifies the user
    what has happened when they perform an action. For instance, when they choose
    to publish one of their blog posts, the notification system will flash a message
    on the screen confirming this action once it has happened.


    There are additional features we will be implementing later in this book (such
    as tags, images, and web feeds); in this chapter we will simply lay the groundwork
    for the blog.


    There will be some repetition of Chapter 3 in this chapter when we set up database
    tables and classes for modifying the database, but I will keep it as brief as
    possible and point out the important differences.


    Because there is a lot of code to absorb in developing the blog management tools,
    Chapter 8 also deals with implementing the blog manager. In this chapter we will
    primarily deal with creating and editing blog posts; in the next chapter we will
    implement a what-you-see-is-what-you-get (WYSIWYG) editor to help format blog
    posts.


    **Creating the Database Tables**


    Before we start on writing the code, we must first create the database tables.
    We are going to create one table to hold the main blog post information and a
    secondary table to hold extra properties for each post (this is much like how
    we stored user information). This allows us to **219**


