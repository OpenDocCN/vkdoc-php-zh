  trans: "\n要使用新的数据库表和存储过程，你需要对 `business/shopping_cart.php` 进行几处修改。你还必须修改 `ShoppingCart`\
    \ 类中的 `CreateOrder`，以便为新订单配置税费和运费。\n\n## 练习：修改业务层\n\n**1.** 按如下方式修改 `business/shopping_cart.php`\
    \ 中的 `CreateOrder` 方法：\n\n```php\n// 创建新订单\npublic static function CreateOrder($customerId,\
    \ $shippingId, $taxId)\n{\n    // 构建 SQL 查询\n    $sql = 'SELECT shopping_cart_create_order(:cart_id,\
    \ :customer_id,\n                                             :shipping_id, :tax_id);';\n\
    \    // 构建参数数组\n    $params = array (':cart_id' => self::GetCartId(),\n      \
    \               ':customer_id' => $customerId,\n                     ':shipping_id'\
    \ => $shippingId,\n                     ':tax_id' => $taxId);\n    // 使用 PDO 特定功能预处理语句\n\
    \    $result = DatabaseHandler::Prepare($sql);\n    // 执行查询并返回结果\n    return DatabaseHandler::GetOne($result,\
    \ $params);\n}\n```\n\n**2.** 在 `business/orders.php` 的 `Orders` 类中添加 `GetShippingInfo`\
    \ 方法：\n\n```php\n// 根据给定的 $shippingRegionId 检索运费详情\npublic static function GetShippingInfo($shippingRegionId)\n\
    {\n    // 构建 SQL 查询\n    $sql = 'SELECT * FROM orders_get_shipping_info(:shipping_region_id);';\n\
    \    // 构建参数数组\n    $params = array (':shipping_region_id' => $shippingRegionId);\n\
    \    // 使用 PDO 特定功能预处理语句\n    $result = DatabaseHandler::Prepare($sql);\n    //\
    \ 执行查询并返回结果\n    return DatabaseHandler::GetAll($result, $params);\n}\n```\n\n\
    ## 表示层修改\n\n最后，我们来看表示层。实际上，由于我们已做的更改，这里唯一需要修改的是结账页面与订单管理页面。\n\n## 练习：修改表示层\n\n\
    **1.** 修改 `presentation/templates/checkout_info.tpl`：\n\n```smarty\n配送区域：{$checkout_info->mShippingRegion}\n\
    </span>\n{/if}\n<br /><br />\n{if $checkout_info->mNoCreditCard != 'yes' && $checkout_info->mNoShippingAddress\
    \ != 'yes'}\n配送方式：\n<select name=\"shipping\">\n{section name=cShippings loop=$checkout_info->mShippings}\n\
    <option value=\"{$checkout_info->mShippings[cShippings].shipping_id}\">\n{$checkout_info->mShippings[cShippings].shipping_type}\n\
    </option>\n{/section}\n</select>\n<br /><br />\n{/if}\n<input type=\"submit\"\
    \ name=\"sended\" value=\"提交订单\"\n       {$checkout_info->mOrderButtonVisible}\
    \ />\n<input type=\"button\" value=\"编辑购物车\"\n```\n\n**2.** 按如下方式在 `presentation/smarty_plugins/function.load_checkout_info.php`\
    \ 的 `CheckoutInfo` 类中添加新成员：\n\n```php\npublic $mPlainCreditCard;\npublic $mShippingRegion;\n\
    public $mShippings;\n```\n\n**3.** 修改 `function.load_checkout_info.php` 中 `CheckoutInfo`\
    \ 类的 `init()` 方法：\n\n```php\n// 如果“提交订单”按钮被点击，则将订单保存到数据库\nif ($this->_mPlaceOrder\
    \ == 1)\n{\n    $this->mCustomerData = Customer::Get();\n    $tax_id = '';\n \
