    ```\n\n刷新 Posts 视图后，您会发现评论显示效果完全相同——只不过现在所有评论都由自定义的博客辅助函数管理（见图 9-1）。\n\n**图 9-1.**\
    \ *由`$blog->comments()`函数显示的评论区域*\n\n## 自定义辅助函数变量\n\n您已创建了包含特定操作函数的自定义辅助函数。但如何自定义内置辅助函数使用的变量呢？假设您希望执行\
    \ HTML 辅助函数中已有的操作，但需要改变其输出显示效果。与其为适应自定义输出而构建完全不同的辅助函数，不如直接修改 HTML 辅助函数使用的变量，然后调用所需函数。\n\
    \n回想一下，您已在`app/`目录下创建了 App 辅助文件。在这里，您可以截获任何辅助函数使用的全局变量并插入自定义代码。打开`cake/libs/view/helpers/html.php`文件阅读原始\
    \ HTML 辅助函数代码。向下滚动至第 47 行查看`$tags`数组（如清单 9-7 所示）。\n\n**清单 9-7.** *HTML 辅助函数的`$tags`数组*\n\
    \n```php\n47 var $tags = array(\n48–96 …\n97     'error' => '<div%s>%s</div>'\n\
    98 );\n```\n\n我特意跳过了清单 9-7 的第 48-96 行，因为整个数组都重复着相同的思路。HTML 辅助函数使用此数组构建返回的 HTML\
    \ 标签。修改其中任意键值对都会改变整个 HTML 辅助函数的输出。换句话说，无论 HTML 辅助函数在哪个函数中显示错误标签，您都可以用自定义内容替换第\
    \ 97 行的值，所有错误标签都会随之改变。\n\n修改`$tags`数组最直接的方法是在 App 辅助函数中创建自己的数组。但您必须指定 HTML 辅助函数使用的*所有*标签，这会导致\
    \ App 辅助函数与 HTML 辅助函数之间的重复。为减少影响`$tags`数组所需提供的数据量，您可以使用 Helper 对象的`loadConfig()`函数配合`__construct()`函数。\n\
    \n在 App 辅助函数中插入清单 9-8 的内容。\n\n**清单 9-8.** *App 辅助函数中的`__construct()`函数*\n\n```php\n\
    1 function __construct() {\n2     parent::__construct();\n3     $this->loadConfig();\n\
    4 }\n```\n\n当任何辅助函数被包含到控制器中时，此函数将被调用。第 2 行确保优先执行 Helper 对象的所有默认构造。然后在第 3 行包含了`loadConfig()`函数。默认情况下，该函数会在`app/config`文件夹中搜索`tags.php`文件，并将其内容与`$tags`数组合并。您可以通过在函数中包含文件名来指定要合并的文件：`$this->loadConfig('blog');`。\n\
    \n在上述示例中，App 辅助函数会搜索`app/config/blog.php`文件并将其内容与`$tags`数组合并。\n\n在现有 App 辅助函数的基础上，您仍需创建`app/config/tags.php`文件并编写`$tags`数组，以使`__construct()`函数正常运行。创建此文件并插入清单\
    \ 9-9 的内容。\n\n**清单 9-9.** *用于 App 辅助函数的`$tags`数组*\n\n```php\n<?\n$tags = array(\n\
    \    'button' => '<div class=\"button\"><input type=\"%s\" %s/></div>'\n);\n?>\n\
    ```\n\n清单 9-9 为辅助函数中使用的所有输入按钮包裹了`<div>`元素（默认无此元素）。您可以扩展此数组，添加尚未指定的新标签或生成自定义元素。在`$blog->comments()`函数中，您确实使用了一些标签（即`<li>`标签）来生成投票链接。在自定义的`tags.php`文件中，您可以插入一个名为`vote`的标签，包含创建默认标签所需的所有标记，这样辅助函数就无需在自身文件中编写标记。重写`app/config/tags.php`文件中的`$tags`数组，包含清单\
    \ 9-10 的内容。\n\n**清单 9-10.** *包含投票标签的`$tags`数组*\n\n```php\n<?\n$tags = array(\n\
    \    'vote' => '<li>%s</li>'\n);\n?>\n```\n\n要在博客辅助函数中使用此标签，请转到`$blog->voteUpLink()`函数。在函数返回输出的最后一行，将`$text`变量替换为`$tags['vote']`的值。为与`$tags`数组的组织方式保持一致，您需要使用\
    \ PHP 的`sprintf()`函数将`%s`字符替换为`$text`的内容（见清单 9-11）。\n\n**清单 9-11.** *用投票标签替换`$text`参数*\n\
    \n```php\nreturn $this->output($this->Ajax->link(sprintf($this->tags['vote'],$text)\
    \ … );\n```\n\n再次强调，刷新 Posts 视图时最终输出不应有任何变化。但通过将这些选项和变量集成到博客辅助函数中，您为后续的定制化提供了更多可能。现在，无需深入辅助函数本身的代码，只需编辑配置文件（`tags.php`）即可调整显示效果。在构建自定义辅助函数时请牢记这一点。您永远不知道这些函数最终会用在何处，尤其是在通过互联网分发或将它们引入其他\
    \ Cake 应用时。\n\n"
- fmt: "Making as many features of the helpers editable in other areas like a config\
    \ file or customizable in the views through the use of parameters allows the helper\
    \ to be more portable and, ultimately, useful.\n\n## The Vote Tag\n\nListing 9-11\
    \ showed how to replace the `$text` parameter in the `$blog->voteUpLink()` function\
    \ with the vote tag from the `tags.php` file. In this exercise, do the same for\
    \ the `$blog->voteDownLink()` function. You can also look for ways to generate\
    \ other tags for use in the `$blog->comments()` function. Consult the PHP manual\
    \ for help with the `sprintf()` function to extend the capabilities of your custom\
    \ tags.\n\n## Summary\n\nThis chapter explored Cake’s built-in helpers. The two\
    \ used in most Cake applications are the HTML and Form helpers. Together, they\
    \ simplify rendering HTML and processing forms. Thanks to the Form helper, passing\
    \ along user form submissions is easy and provides the controller and model with\
    \ a standardized method for handling data. Several other helpers are available\
    \ in Cake. This chapter outlined what these helpers are and what functions they\
    \ include. Many times you will want to create your own custom helper. I showed\
    \ how to write one for your blog application that renders the comments for the\
    \ view.\n\nBy using this helper, you can reduce the amount of code in the view\
    \ to a couple of strings.\n\nCustomizing helper variables is one way to expand\
    \ the functionality of the helper. This chapter also explained how to provide\
    \ a set of output variables that make the helper more portable. In Chapter 10,\
    \ you’ll move to routing in Cake and examine how to customize URL structures for\
    \ your applications.\n\n# CHAPTER 10\n\n## Routes\n\n**O**ut of the box, Cake\
    \ intercepts all URLs and maps them to their appropriate controllers and actions.\
    \ This is a wonderful aspect of the framework that improves the speed of developing\
    \ applications. Rather than having long strings of passed variables in the URL\
    \ or creating dozens of individual scripts to handle every function in the application,\
    \ Cake’s routing system manages all the requests, as you saw in previous chapters.\
    \ But what about customizing the routing scheme? Or what if you want to generate\
    \ non-HTML files such as PDFs, RSS feeds, or some kind of XML output? And what\
    \ about search engine optimization? For these purposes, Cake’s routing features\
    \ will remove the headache of mapping URLs, handling dynamic requests, and customizing\
    \ the paths and URL structure of the application.\n\nAlmost all the main routing\
    \ action will take place in the `app/config/routes.php` file. All the routes and\
    \ their configurations are stored in this file and use a specific syntax. A few\
    \ default routes, which serve to handle the main URLs, are already written to\
    \ the `routes.php` file. By default, Cake parses the passed values listed between\
    \ slashes and derives a path to controllers and actions as well as passing parameters\
    \ to those actions. By using magic variables, arguments, extensions, parameters,\
    \ and other features, you can fully manipulate the routes to fit your application\
    \ and still maintain the MVC structure.\n\n**Caution** Remember that the `routes.php`\
    \ page is cascading, meaning that the order of routes matters. If Cake resolves\
    \ a URL with one route, it will immediate end there and not proceed to check other\
    \ routes down the page. Although this generally doesn’t affect the overall application,\
    \ it can make a difference if you are working with more complex routes that occur\
    \ in the same controller or action.\n\n### The Basic Route\n\nAs you can see in\
    \ the default `routes.php` configuration file, the basic route is called as the\
    \ `Router::connect()` function with a path as well as an array storing route parameters:\n\
    \n`Router::connect('/', array('controller' => 'pages', 'action' => 'display',\
    \ 'home'));`\n\nThe previous line is the base route for the application. It connects\
    \ URL elements to the Pages controller’s Display action and sends the value `home`\
    \ as a parameter to be used in the action. By specifying another controller and\
    \ action, you can change the base route so that, by default, the home page is\
    \ other than the Pages controller’s Display action.\n\nThe first value in the\
    \ `Router::connect()` function is the path that the routing engine has received.\
    \ If it checks out, then the parameters array will be called, and the user will\
    \ be taken to whatever is specified there. Another way of looking at this path\
    \ is like an if-then statement; if the URL entered has no parameters but the base\
    \ URL only, then pass the value `home` to the Display action in the Pages controller.\
    \ You can specify the value by hand or use placeholders to accept all possible\
    \ values for that URL parameter:\n\n`Router::connect('/articles/*', array('controller'=>'posts','action'=>'index'));`\n\
    \nThe previous line shows a new method for connecting with the Posts controller\
    \ in your blog application. By using the asterisk in the path, you’re essentially\
    \ telling the router to accept and pass along anything it finds following the\
    \ word `articles`. As in the base path example, the path will be tested like an\
    \ if-then statement: if the supplied URL begins with the word `articles`, then\
    \ pass along whatever else follows in the URL to the Posts controller. By default,\
    \ the Index action will be called. You’ve more or less constructed an alias for\
    \ the Posts controller.\n\nNow, if you wanted, you could enter all your links\
    \ that point to the Posts controller as if they pointed to an Articles controller.\n\
    \n### Arguments\n\nTraditionally, assigning values to request variables is done\
    \ in PHP by constructing a serialized string with arguments:\n\n`http://localhost/script.php?variable=value&another_var=another_val`\n\
    \nIn the previous code, the arguments in the string are `variable` and `another_var`.\
    \ When a controller action interacts with a variety of arguments and combinations\
    \ of possible arguments, then it may be necessary to construct the URL string\
    \ differently than Cake’s default route pattern.\n\nArguments in the router appear\
    \ in the URL with a colon followed by a value:\n\n`http://localhost/blog/posts/view/id:5/set:2`\n\
    \nIn the previous code, the arguments are `id` and `set`, and their values are\
    \ `5` and `2`. Usually, this example would be better managed without the arguments\
    \ in view, namely, with just the values. But when the action uses components such\
    \ as the Paginator, arguments may need to be passed along for the component to\
    \ work properly. For instance, in the case of the Paginator, normal Cake URLs\
    \ are defaulted to the first page of the data set. But by adding arguments to\
    \ the string, the Paginator is able to retrieve another page in the data set:\n\
    \n`http://localhost/blog/posts/index/page:2/sort:id/direction:asc`\n\nPassed arguments\
    \ are contained in the `passedArgs` array. The previous string would store the\
    \ values like so:\n\n```\n$this->passedArgs = Array(\n    'page'=>2,\n    'sort'=>'id',\n\
    \    'direction'=>'asc'\n);\n```\n\nArguments are passed to the controller as\
    \ keys and values in this array unless it is bypassed in the `routes.php` configuration\
    \ file.\n\nOne important use for arguments is as Cake’s way of passing variables\
    \ to the actions. Notice that because the router has found arguments in the URL\
    \ string, it does not pass them as variables in the action."
