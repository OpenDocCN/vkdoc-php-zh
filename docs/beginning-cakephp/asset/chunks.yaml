    ## About the Technical Reviewer


    **Richard K. Miller** is the executive vice president of a nonprofit foundation
    in Utah. He graduated from Brigham Young University with a bachelor’s degree in
    business management but has been interested in technology since he began computer
    programming at age 10. His experience includes web programming, Internet marketing,
    and new media strategies such as blogging, podcasting, social networking, and
    online video. He is the developer of several MediaWiki extensions and WordPress
    plugins, including the widely used What Would Seth Godin Do plugin.


