  raw: 'The callback function only needs one parameter, the exception object that
    was thrown.


    ```

    function myException($e)

    {

      $file = ''exceptionlog.txt'';

      file_put_contents($file,$e->getMessage(),FILE_APPEND);

      require_once(''my_error_page.php'');

      exit;

    }

    ```


    As this exception handler is called outside the context where the exception occurred,
    recovering from the exception would be difficult. Instead, this example handler
    writes the exception to a log file and displays an error page. To stop further
    execution of the script the built-in `exit` construct is used. It is synonymous
    with the `die` construct and optionally takes a string argument that will be printed
    before the script is halted.


    Errors and exceptions


    Whereas exceptions are thrown with the intention of being handled by the script,
    errors are generated for the purpose of informing the developer that there is
    a mistake in the code. When it comes to problems that occur at run-time, the exception
    mechanism is generally considered superior. However, since it was not introduced
    until PHP 5 all internal functions still use the error mechanism. For user-defined
    functions, the developer is free to choose either mechanism. Keep in mind that
    errors cannot be caught by try-catch statements. Likewise, exceptions do not trigger
    error handlers.


    [¹](#9781430262831_Ch30.xhtml#_Fn1)`http://www.php.net/manual/en/spl.exceptions.php`


