    # 类生成对象


    我们可以在索引文件中使用新的类定义。这只需要一个小小的改动。


    ```

    title = "Thomas Blom Hansen: Portfolio site";

    $pageData->css = "";

    $pageData->content = $nav;

    $navigationIsClicked = isset($_GET[''page'']);

    if ($navigationIsClicked ) {

    $fileToLoad = $_GET[''page''];

    } else {

    $fileToLoad = "skills";

    }

    include_once "views/$fileToLoad.php";

    $pageData->content .= $info;

    require "templates/pagewithcss.php";

    echo $page;

    ?>

    ```


    `stdClass` 已被移除，并替换为 `Page_Data` 类。如果我们将 `indexwithclass.php` 加载到浏览器中，将会发现结果与图
    2-10 所示相同。结果相同，但程序变得更安全了。`Page_Data` 类使我们能够在页面模板中为嵌入样式保留一个占位符，并且仅当我们需要一个包含嵌入 `<style>`
    元素的页面时，才为该属性赋予实际值。


    ## 使用动态样式规则高亮当前导航项


    我们已经创建了一个页面模板和一个 `Page_Data` 对象，它们都包含嵌入样式。我们将网页中通用的样式保留在外部样式表中。但在某些情况下，单个页面上的动态样式非常强大。


    **练习**：我们可以使用动态样式规则来高亮当前导航项。复习你的 CSS 技能，并调整 `indexwithclass` 程序，使其包含一个动态的内部样式表，用于高亮当前在菜单中选中的导航项，并使用
    `embeddedStyle` 属性来保存和解释新的 CSS 代码。


    ## 总结


    我们已经了解了如何使用一点基础的 PHP 来构建一个非常动态的网站。此时，你的学习过程可能会从一些实验中获得益处。尝试做一下本章末尾的一些项目建议。在下一章中，我们将学习
    HTML 表单、PHP 函数以及关于条件语句的更多细节。


    ## 项目


    1.  完成本章的个人作品集网站。添加你认为合适的任意数量的页面视图，并相应地更新导航。


    2.  创建一些更全面、更详细的页面视图。在此过程中，你应该会逐渐对动态网站结构以及页面视图如何被返回以在索引文件中显示变得更加熟悉。


    3.  运用你现有的 CSS 技能，为作品集开发一个一致的网站设计。在这个新的动态网站背景下，运用你现有的 HTML 和 CSS 技能将是一个非常有益的练习。在你正在开发的网站还比较简单的时候进行这个练习是个好主意。


    # 3. 表单管理


    ## 目标


    完成本章后，你将能够


    *   创建和使用 HTML 表单

    *   使用超全局数组

    *   使用 `GET` 方法通过 HTML 表单编码 URL 变量

    *   使用 `POST` 方法通过 HTML 表单编码 URL 变量

    *   创建一个动态的 PHP 测验程序

    *   使用 `if-else` 条件语句

    *   创建和使用命名函数

    *   使用构造函数、设置器和获取器创建安全的类和对象

    *   理解一部美国西部片如何教你编写整洁的代码

    *   发现为什么代码真的是诗


    在第 2 章中，我们构建了一个动态的个人作品集网站。在此过程中，我们看到了如何使用 `<a>` 元素编码 URL 变量，以及如何利用 `$_GET` 超全局变量访问这些
    URL 变量。传递数据是动态网页与静态网页的区别所在。通过根据用户的选择定制体验，我们能够为网站增加全新的价值。


    现在我们已经接触了一点 PHP 并编写了一个基础的动态网站，我们准备更深入地研究 URL 变量。HTML `<form>` 元素通常用于创建允许用户与动态网站交互的界面。如果你在网络上花过一些时间，你一定使用过
    HTML 表单来提交信息。为了创建一个交互式网站，我们需要学习如何创建和使用这些 HTML 表单。


    ## 什么是表单？


    HTML 表单允许访问者与网站交互并提供信息。图 3-1 展示了 Google 的搜索表单。当用户访问 [`www.google.com`](http://www.google.com)，在文本输入字段中输入搜索词，然后点击谷歌搜索时，谷歌将执行所请求的搜索。


    ![](img/323857_3_En_3_Fig1_HTML.jpg)


    一个展示谷歌搜索栏如何对用户可见的模型，它有助于轻松搜索所需信息。


    **图 3-1** 来自 [*www.google.com*](http://www.google.com) 的搜索表单


    你可能遇到的另一种表单是登录表单，注册用户可以通过它登录并进入受限区域。当你登录 Facebook 账户、银行账户或 Gmail 账户时，你可能见过此类表单。图
    3-2 中的登录框来自 Facebook。


    ![](img/323857_3_En_3_Fig2_HTML.jpg)


    此图片展示了 Facebook 的登录页面，包含登录邮箱和密码，用于进入 Facebook 门户。底部有一个创建新账户的选项。


    **图 3-2** 来自 [*www.facebook.com*](http://www.facebook.com) 的登录表单


    最后一个熟悉的例子可能是星级评分系统。当你从在线书店购买一本书时，你可能遇到过星级评分系统。图 3-3 显示了来自亚马逊的星级评分表单。


    ![](img/323857_3_En_3_Fig3_HTML.jpg)


    一个模型展示了亚马逊的星级评分如何对用户可见，其中还添加了标题撰写、照片和视频添加选项。


    **图 3-3** 来自 [*www.amazon.com*](http://www.amazon.com) 的星级评分表单


    如果你要成为一名 Web 开发人员或 Web 设计师，你将开发和设计可用且功能性的表单。Web 表单是系统与其用户之间的接口；开发和设计 Web 表单极其重要。


    ## 建立新的 PHP 项目


    让我们在 `XAMPP/htdocs` 文件夹中创建一个名为 `ch3` 的新项目文件夹，用于存放我们在本章中将完成的所有工作。在 `ch3` 内部，我们需要从第
    2 章中复制 `templates` 和 `classes` 文件夹以及 PHP 脚本的副本。我们可以从第 2 章文件夹中复制这些文件，或者从出版商的网站下载。我们还需要创建一个名为
    `views` 的空文件夹。


    让我们为 `index.php` 文件添加一个基础的 PHP 模板。请注意，我们正在重用第 2 章中的 `classes/Page_Data.class.php`
    和 `templates/page.php`，而没有更改这两个脚本中的任何一行代码。高效且有效的程序员会在他们的程序中重用库文件。无论这些文件是由 PHP
    提供的，还是由程序员（或公司中的其他人）创建的，通过重用已知可靠且安全的代码，可以以更高的效率和速度开发稳定安全的程序。解决问题一次就好；不要重复造轮子！

