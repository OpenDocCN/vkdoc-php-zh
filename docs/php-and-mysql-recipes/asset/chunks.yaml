    \ gmdate(\"M j Y\", $person['date_of_birth']), $r);\n    $p[] = $r;\n}\necho str_replace('%persons%',\
    \ implode('', $p), $section_tpl);\n```\n\n内部模板（`$person_tpl`）定义了每个人的布局，外部模板定义了注入所有记录的\
    \ HTML 部分。\n\n---\n\n## 食谱 6-5. 字符串转义\n\n### 问题描述\n\n当字符串用作数据库查询的输入时，单引号用于开始和结束字符串值，因此需要指示字符串值中的单引号并非字符串的结束。如果没有正确处理，黑客很容易将恶意代码注入数据库。转义字符串是防止这种情况的最低限度措施。通常，程序员永远不应该信任用户的输入，尤其不应该将任何用户输入（查询字符串、表单提交等）直接注入数据库查询。\n\
    \n### 解决方案\n\n大多数数据库使用反斜杠（`\\`）形式的转义字符串，或者在某些情况下在单引号前添加一个额外的单引号，以指示该引号应该是字符串的一部分。使用`str_replace()`函数将单引号替换为两个单引号是准备用于更新和插入语句的字符串的一种方法。PHP\
    \ 中的许多数据库扩展都支持转义字符串的函数。\n\n使用数据库引擎提供的函数的好处是，它允许数据库根据选定的字符集来处理转义。\n\n有两个函数用于添加和删除字符串中的反斜杠，分别是`addslashes()`和`stripslashes()`。这些函数不应用于转义插入数据库的字符串，而是用于向将要被求值的代码添加反斜杠，或者当输出嵌入在\
    \ JavaScript 代码中的内容时。`addslashes()`函数会转义 NULL 字符、反斜杠、单引号和双引号。\n\n### 工作原理\n\n\
    在接下来的示例中，我们有一个包含带撇号名称的字符串变量。如果直接使用这个变量，SQL 服务器会报错；但如果在插入数据库之前正确转义了字符串变量，则会成功。\n\
    \n```php\n<?php\n// 6_12.php\n$con = mysqli_connect(\"127.0.0.1\", \"root\", \"\
    secret\", \"book\");\n\n// create table strings (\n//   val varchar(250);\n//\
    \ );\n\n$name = \"Mark O'Brian\";\n\n// 这会失败\nmysqli_query($con, \"insert into\
    \ strings (val) values ('{$name}');\"); \n$name = mysqli_escape_string($con, $name);\n\
    \n// 这会成功\nmysqli_query($con, \"insert into strings (val) values ('{$name}');\"\
    );\n```\n\n请记住，你永远不应该信任任何输入。始终验证和转义所有输入到你代码中的内容。\n\n考虑以下代码，其中字符串`$name`可能是用户填写\
    \ HTML 表单中的名字值并提交到服务器的结果：\n\n```php\n<?php\n// 6_13.php\n$con = mysqli_connect(\"\
    127.0.0.1\", \"root\", \"secret\", \"book\");\n\n// create table strings (\n//\
    \   val varchar(250);\n// );\n\n$name = \"My Name\";\n\n// 这会失败\nmysqli_query($con,\
    \ \"insert into strings (val) values ('{$name}');\");\n```\n\n这段代码中没有任何内容阻止用户向`$name`变量中输入\
    \ SQL 语句。用户不是输入`My Name`，而是可以输入`My Name'; delete from strings; --`。这将导致代码执行两条语句：第一条从`strings`表中获取所有匹配的行，第二条删除该表中的所有行。\n\
    \n---\n\n## 食谱 6-6. 字符串格式化\n\n### 问题描述\n\n字符串有很多用途，通常需要处理字符串的部分内容。这可能涉及重新排序各部分、添加或删除字符串的部分内容，或者添加\
    \ HTML 标签来格式化字符串。\n\n### 解决方案\n\n可以使用`explode()`函数将字符串转换为数组，该函数接受两个参数。第一个参数是要查找并执行分割的模式，可以是空格字符、换行符或任何其他字符串模式。第二个参数是要转换为数组的字符串。返回值将是一个字符串数组。\n"
- fmt: '# PHP 字符串处理函数


    ## 字符串拆分与合并


    反向功能由`implode()`函数处理，该函数将数组转换为字符串，在每个数组元素之间插入分隔符字符串（第一个参数）。源数组不必是字符串数组，但每个元素在拼接前都会被转换为字符串。`join()`函数是`implode()`的别名。


    这两个函数都不会修改参数中的字符串或数组，因此系统最终会拥有包含数据的两个变量。如果字符串或数组很大，可能没有足够的内存来同时保存两个值。在这种情况下，最好使用分词器函数`strtok()`，它可以一次拆分一个令牌，从而在任何时候只保留原始字符串和当前令牌在内存中。


    ### 工作原理


    `explode()`和`implode()`有很多用途。假设你有一个文件想要逐行读取和处理，你可以读取文件内容并将其转换为可在循环中使用的数组。


    ```

    <?php


    // 6_14.php


    $content = file_get_contents(''file.txt'');


    $a = explode("\n", $content);


    foreach ($a as $line) {


    // Do something


    }

    ```


    如果你不需要将内容作为字符串使用，可以使用`file()`函数。该函数将读取文件并将各行作为数组返回。


    同样，我们可以将一个整数数组转换为逗号分隔的整数字符串，用于 SQL 查询。


    ```

    <?php


    // 6_15.php


    $a = [1, 5, 7, 9, 3, 4];


    $s = implode('','', $a);


    $sql = "select * form mytable where id in({$s})"

    ```


    ## 去除空白字符


    ### 问题


    当用户在 HTML 表单中输入字符串值时，他们可能会不小心添加前导或尾随空格。如果这些值是名字和姓氏，并且你希望将它们拼接成全名，则可能会产生多余的空格。如果该字符串用作搜索查询的输入且包含前导或尾随空格，除非先移除这些字符，否则搜索可能不会产生任何结果。


    ### 解决方案


    可以使用`ltrim()`、`rtrim()`或`trim()`函数之一移除开头、结尾或两端的空白字符。这些函数不会移除字符串中间的空白字符。空白字符包括空格字符、换行符（`\n`）或回车符（`\r`）。


    ### 工作原理


    如果你使用 HTML 表单的输入作为数据库查询中的搜索参数，可以使用`trim()`函数去除字符串开头和结尾的空白字符。


    ```

    <?php


    // 6_16.php


    $con = mysqli_connect(''127.0.0.1'', ''root'', ''secret'', ''book'');


    $q = mysqli_escape_string($con, trim($_POST[''name'']));


    $sql = "select * form person where name like ''%{$q}%''";

    ```


    ## 在字符串中查找字符串


    ### 问题


    检查一个字符串是否包含在另一个字符串中、检查一个字符串在另一个字符串中出现的次数、或者查找特定字符串在另一个字符串中的位置，是处理字符串时常见的问题。


    ### 解决方案


    在 PHP 中，有函数可以查找一个字符串（针）在另一个字符串（草堆）中的第一个或最后一个位置。这些函数称为`strpos()`或`strrpos()`，它们将返回一个表示位置的整数值，如果未找到字符串则返回`NULL`。`strpos()`系列函数区分大小写且二进制安全。


    函数名中的额外`r`表示反向或从字符串末尾而不是开头开始。许多字符串函数都有一个从开头开始的版本和一个从字符串末尾开始的版本。所有这些函数在名称中都有一个额外的`r`。同样，名称中可以有一个额外的`i`表示不区分大小写。


    两个`strpos()`函数都接受一个可选参数，用于指示搜索应从字符串中的哪个位置开始。这可用于重复搜索以检查字符串是否多次存在。这些函数区分大小写，但如果你不关心大小写，可以使用不区分大小写的版本，称为`stripos()`和`strripos()`。


    同样，有函数可以查找字符或字符串在字符串中的第一次和最后一次出现。这些函数称为`strchr()`、`strrchr()`、`strstr()`和`strrstr()`。在内部，`strchr()`是`strstr()`的别名。返回值是从搜索字符串的第一次或最后一次出现开始以及字符串其余部分组成的第一个字符串。即使你搜索单个字符，这些函数也会返回从找到该字符的位置开始的字符串的其余部分。


    ### 工作原理


    在下一个示例中，我们有一个长字符串，我们将查找字符串`''at''`的第一次和最后一次出现。


    ```

    <?php


    // 6_17.php


    $s = "Lorem ipsum dolor sit amet, has dicit eleifend no, legimus " .


    "voluptatibus ad mei. Ornatus sententiae vituperatoribus mel ea, " .


    "at veri maiorum quaerendum vel, vis at deleniti vulputate. An vis " .


    "quis percipitur reformidans. Eu agam tation vel, " .


    "pri nemore discere no.";


    $p_first = strpos($s, ''at'');


    $p_last = strrpos($s, ''at'');


    echo "''at'' is first found at positionn {$p_first}\n";


    echo "''at'' is last found at positionn {$p_last}\n";


    $p = strchr($s, ''at'');


    echo "{$p}\n";


    $p = strrchr($s, ''at'');


    echo "{$p}\n";

    ```


    首先，我们使用`strpos()`和`strrpos()`获取`''at''`第一次和最后一次出现的位置。这些函数返回一个整数，表示字符串中从 0 开始的索引位置。


    接下来，我们使用`strchr()`和`strrchr()`获取从这些位置开始的字符串。示例的输出如下：


    ```

    ''at'' is first found at positionn 65

    ''at'' is last found at positionn 227

    atibus ad mei. Ornatus sententiae vituperatoribus mel ea, at veri maiorum quaerendum
    vel, vis at deleniti vulputate. An vis quis percipitur reformidans. Eu agam tation
    vel, pri nemore discere no.

    ation vel, pri nemore discere no.

    ```


    请注意，这些函数会精确匹配正在搜索的字符串，即使该字符串是单词的一部分。


    ## 将字符串分割成子字符串


    ### 问题


    字符串可用于存储不同类型的数据，当代码逻辑需要知道字符串的特定部分时，我们需要能够将字符串切割成小元素的函数。


    ### 解决方案


    这由`substr()`函数处理。该函数接受一个字符串和一个或两个整数作为参数。第一个整数是起始位置（从 0 偏移量开始），第二个整数是可选的长度。如果省略长度参数，该函数将返回从起始位置开始的所有字符。


    起始参数可以是负数，导致函数从字符串末尾开始。如果未提供长度，将`start`设置为`-3`将返回最后三个字符。如果起始位置是大于字符串长度的数字，`substr()`函数将返回`NULL`。如果起始值为负且长度值为小于或等于起始值的负值，则该函数将返回一个空字符串。


    ### 工作原理


    在前面的示例中，我们看到了如何查找字符和字符串在另一个字符串中的位置。现在我们将研究如何使用它来获取字符串的特定部分。


    如果我们采用相同的长字符串，并希望获取`''at''`第一次和最后一次出现之间的字符串内容，代码如下：


    ```

    <?php


    // 6_18.php


    $s = "Lorem ipsum dolor sit amet, has dicit eleifend no, legimus " .


    "voluptatibus ad mei. Ornatus sententiae vituperatoribus mel ea, " .


    "at veri maiorum quaerendum vel, vis at deleniti vulputate. An vis " .


    "quis percipitur reformidans. Eu agam tation vel, " .


    "pri nemore discere no.";


    $p_first = strpos($s, ''at'');


    $p_last = strrpos($s, ''at'');


    echo substr($s, $p_first + 2, $p_last - $p_first - 2) . "\n";

    ```'
  raw: 'The reverse functionality is handled with the implode() function that turns
    an array into a string, inserting the separator string (first argument) between
    each element in the array. The source array does not have to be an array of strings
    but each element will be converted into strings before concatenation. The function
    join() is an alias for implode() .


    Both of these functions do not alter the string or array in the argument so the
    system ends up with two variables that contain the data. If the string or array
    is large there might not be enough memory to hold both values. In that case it
    might be better to use the tokenizer function strtok() , which can split the string
    one token at the time and as such only keep the original string plus the current
    token in memory at any given time.


    How it Works


    There are many uses of explode() and implode() . Say you have a file that you
    want to read and process line by line; you can read the contents of the file and
    convert it into an array that can be used in a loop.


    <?php


    // 6_14.php


    $content = file_get_contents(''file.txt'');


    $a = explode("\n", $content);


    foreach ($a as $line) {


    // Do something


    }


    If you don''t have a need for the contents as a string you can use the file()
    function. This function will read the file and return the lines as an array.


    This is the same way we can take an array of integers and turn into a comma-separated
    string of integers that could be used in a SQL query.


    CHAPTER 6 ■ STRINGS


    <?php


    // 6_15.php


    $a = [1, 5, 7, 9, 3, 4];


    $s = implode('','', $a);


    $sql = "select * form mytable where id in({$s})"


    Recipe 6-7\. Trimming Whitespace


    Problem


    When users enter string values in HTML forms they might add leading or trailing
    spaces by mistake. If those values are first and last name and you want to concatenate
    them into a full name you might end up with extra spaces. If the string is used
    as input to a search query and it contains leading or trailing spaces the search
    might not yield any results unless these characters are moved first.


    Solution


    Whitespace in the beginning, the end, or both can be removed with one of the functions
    ltrim() , rtim(), or trim() . Whitespace in the middle of the string is not removed
    by any of these functions. Whitespace characters include a space character, newline
    ( \n ), or carriage return ( \r ).


    How it Works


    If you are using input from a HTML form as a search parameter in a database query,
    you can use the trim() function to get rid of whitespace in the beginning and
    end of the string.


    <?php


    // 6_16.php


    $con = mysqli_connect(''127.0.0.1'', ''root'', ''secret'', ''book'');


    $q = mysqli_escape_string($con, trim($_POST[''name'']));


    $sql = "select * form person where name like ''%{$q}%''";


    Recipe 6-8\. Finding Strings in Strings


    Problem


    Checking to see if one string is included in another string, checking how many
    times a sting occurs in another string, or finding where in a string a specific
    string exists are common problems when working with strings.


    CHAPTER 6 ■ STRINGS


    Solution


    In PHP there are functions to find the first or the last position of a string
    (needle) in another string (haystack). These functions are called strops() or
    strrpos() and will return an integer value for the position or NULL if the string
    is not found. The family of strops() functions are case sensitive and binary safe.


    The extra r in the function name indicates reverse or starting from the end instead
    of the beginning of the string. Many of the string functions have a version that
    starts from the beginning and a version that starts from the end of the string.
    All these have an extra r in the name. In the same way the name can have an extra
    i for case insensitive.


    Both strpos() functions take an optional parameter to indicate where in the string
    the search should begin. This can be used to repeat the search to see if the string
    exists more than once. The functions are case sensitive but if you don''t care
    about case you can use the case insensitive versions called stripos() and strripos()
    .


    In the same where there are functions to find the first and last occurrence of
    a character or a string in a string. These are called strchr() , strrchr() , strstr()
    , and strrstr() . Internally strchr() is an alias for strstr() . The return value
    is the first sting that starts from the first or last occurrence of the search
    string and the rest of the string. Even if you search for a single character these
    functions will return the rest of the string from the place where the character
    is found.


    How it Works


    In the next example we have a long string and we will be looking for the first
    and last occurrence of the string ''at''.


    <?php


    // 6_17.php


    $s = "Lorem ipsum dolor sit amet, has dicit eleifend no, legimus " .


    "voluptatibus ad mei. Ornatus sententiae vituperatoribus mel ea, " .


    "at veri maiorum quaerendum vel, vis at deleniti vulputate. An vis " .


    "quis percipitur reformidans. Eu agam tation vel, " .


    "pri nemore discere no.";


    $p_first = strpos($s, ''at'');


    $p_last = strrpos($s, ''at'');


    echo "''at'' is first found at positionn {$p_first}\n";


    echo "''at'' is last found at positionn {$p_last}\n";


    $p = strchr($s, ''at'');


    echo "{$p}\n";


    $p = strrchr($s, ''at'');


    echo "{$p}\n";


    At first we use strops() and strrpos() to get the position of the first and last
    occurrence of ''at''. These functions return an integer for the 0-based index
    of the position in the string.


    CHAPTER 6 ■ STRINGS


    Next we use strchr() and strrchr() to get the string that starts at these positions.
    The output of the sample looks like this:


    ''at'' is first found at positionn 65


    ''at'' is last found at positionn 227


    atibus ad mei. Ornatus sententiae vituperatoribus mel ea, at veri maiorum quaerendum
    vel, vis at deleniti vulputate. An vis quis percipitur reformidans. Eu agam tation
    vel, pri nemore discere no.


    ation vel, pri nemore discere no.


    Note that the functions are looking for an exact match to the string being searched
    for, even if that string is a part of a word.


    Recipe 6-9\. Dividing Strings into Substrings


    Problem


    Strings can be used to store different types of data and when the logic of the
    code calls for knowing a certain portion of the string we need functions that
    can cut the string into small elements.


    Solution


    This is handled with the substr() function. This function takes a string and one
    or two integers as parameters. The first integer is the starting position (0 offset
    numbers) and the optional second integer is the length. If the length parameter
    is omitted the function will return all characters from the start position.


    The start parameter can be negative causing the function to start at the end of
    the string. Setting start to -3 will return the last three characters if the length
    is not given. If the start position is a number higher than the length of the
    string the substr() function will return null. If a negative value is given as
    the start and the length is a negative value that is less than or equal to the
    start value, the function will return an empty string.


    How it Works


    In the previous recipe we saw how we can find the position of characters and strings
    in another string. Now we are going to look at how this can be used to get a specific
    section of a string.


    If we take the same long string and want to get the content of the string between
    the first and last occurrence of ''at'' it would look something like this:


    <?php


    // 6_18.php


    $s = "Lorem ipsum dolor sit amet, has dicit eleifend no, legimus " .


    "voluptatibus ad mei. Ornatus sententiae vituperatoribus mel ea, " .


    "at veri maiorum quaerendum vel, vis at deleniti vulputate. An vis " .


    "quis percipitur reformidans. Eu agam tation vel, " .


    "pri nemore discere no.";


    $p_first = strpos($s, ''at'');


    $p_last = strrpos($s, ''at'');


    echo substr($s, $p_first + 2, $p_last - $p_first - 2) . "\n"; 135


