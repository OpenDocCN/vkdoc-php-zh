- fmt: '# Individual Programs or an All-in-one Package?


    For many years, I advocated installing each component of a PHP testing environment
    separately, rather than using a package that installs Apache, PHP, MySQL, and
    phpMyAdmin in a single operation. My advice was based on the dubious quality of
    some early all-in-one packages, which installed easily but were next to impossible
    to uninstall or upgrade. However, the all-in-one packages currently available
    are excellent, and I have no hesitation in now recommending them.


    On my computers, I use `XAMPP` for Windows ([www.apachefriends.org/index.html](http://www.apachefriends.org/index.html))
    and `MAMP` for Mac OS X ([www.mamp.info/en/](http://www.mamp.info/en/)). Other
    packages are available; it doesn’t matter which you choose.


    **Tip**


    Setting up a PHP testing environment with an all-in-one package is normally trouble
    free. The main cause of difficulty is a conflict with another program using port
    80, which the web server uses to listen for page requests. If Skype is installed,
    go to **Tools** ➤ **Options** ➤ **Advanced** ➤ **Connection** and make sure that
    port 80 is not being used for incoming connections. Try port 33087 instead.


    ## Setting Up on Windows


    Make sure that you’re logged on as an administrator before proceeding.


    ### Getting Windows to Display Filename Extensions


    By default, most Windows computers hide the three- or four-letter filename extension,
    such as `.doc` or `.html`, so all you see in dialog boxes and Windows File Explorer
    is `thisfile` instead of `thisfile.doc` or `thisfile.html`. Windows 8 does display
    the filename extension for PHP files, but it’s useful to turn on the display of
    filename extension for all files. In Windows 7, it’s essential for working with
    PHP.


    Use these instructions to enable the display of filename extensions in Windows
    8:


    - Open File Explorer.

    - Select **View** to expand the ribbon at the top of the File Explorer window.

    - Select the "Filename extensions" check box.


    Use these instructions in Windows 7:


    - Open **Start** ➤ **Computer**.

    - Select **Organize** ➤ **Folder** and then **Search Options**.

    - In the dialog box that opens, select the **View** tab.

    - In the **Advanced Settings** section, uncheck the box marked "Hide extensions
    for known file types."

    - Click **OK**.


    Displaying filename extensions is more secure—you can tell if a virus writer has
    attached an `.exe` or `.scr` executable file to an innocent-looking document.


    ### Choosing a Web Server


    Most PHP installations run on the Apache web server. Both are open source and
    work well together. However, Windows has its own web server, Internet Information
    Services (IIS), which also supports PHP. Microsoft has worked closely with the
    PHP development team to improve the performance of PHP on IIS to roughly the same
    level as Apache. So, which should you choose?


    The answer depends on whether you develop webpages using ASP or ASP.NET, or intend
    to do so. ASP and ASP.NET require IIS. You can install Apache on the same computer
    as IIS, but they both listen for requests on port 80. You can’t run both servers
    simultaneously on the same port.


    Unless you need IIS for ASP or ASP.NET, I recommend that you install Apache, using
    `XAMPP` or one of the other all-in-one packages, as described in the next section.
    If you need to use IIS, the most convenient way to install PHP is to use the Microsoft
    Web Platform Installer (Web PI), which you can download from [www.microsoft.com/web/downloads/platform.aspx](http://www.microsoft.com/web/downloads/platform.aspx).


    ### Installing an All-in-one Package on Windows


    There are three popular packages for Windows that install Apache, PHP, MySQL,
    phpMyAdmin, and several other tools on your computer in a single operation: `XAMPP`
    ([www.apachefriends.org/index.html](http://www.apachefriends.org/index.html)),
    `WampServer` ([www.wampserver.com/en/](http://www.wampserver.com/en/)), and `EasyPHP`
    ([www.easyphp.org](http://www.easyphp.org/)). The installation process normally
    takes only a few minutes. Once the package has been installed, you might need
    to change a few settings, as explained later in this chapter.


    Versions are liable to change over the lifetime of a printed book, so I won’t
    describe the installation process. Each package has instructions on its website.
    There are also helpful videos for setting up `WampServer` and `XAMPP` in David
    Gassner’s *Installing Apache, MySQL, and PHP* course on lynda.com. Although lynda.com
    is a subscription service, at the time of this writing all the videos in that
    course can be viewed free of charge even if you’re not a subscriber ([www.lynda.com/Apache-HTTP-Server-tutorials/Installing-Apache-MySQL-PHP/77958-2.html](http://www.lynda.com/Apache-HTTP-Server-tutorials/Installing-Apache-MySQL-PHP/77958-2.html)).


    ## Setting Up on Mac OS X


    The Apache web server and PHP are preinstalled on Mac OS X, but they’re not enabled
    by default. Rather than using the preinstalled versions, I recommend that you
    use `MAMP`, which installs Apache, PHP, MySQL, phpMyAdmin, and several other tools
    in a single operation.


    To avoid conflicts with the preinstalled versions of Apache and PHP, `MAMP` locates
    all the applications in a dedicated folder on your hard disk. This makes it easier
    to uninstall everything by simply dragging the `MAMP` folder to the Trash if you
    decide you no longer want `MAMP` on your computer.


    ### Installing MAMP


    Before you begin, make sure you’re logged in to your computer with administrative
    privileges.


    1. Go to [www.mamp.info/en/downloads/](http://www.mamp.info/en/downloads/) and
    select the link for **MAMP & MAMP PRO**. This downloads a disk image that contains
    both the free and paid-for versions of `MAMP`.

    2. When the download completes, launch the disk image. You’ll be presented with
    a license agreement. You must click **Agree** to continue with mounting the disk
    image.

    3. Follow the onscreen instructions.

    4. Verify that `MAMP` has been installed in your **Applications** folder.


    **Note**


    `MAMP` automatically installs both the free and paid-for versions in separate
    folders called `MAMP` and `MAMP PRO`. The paid-for version makes it easier to
    configure PHP and to work with virtual hosts, but the free version is perfectly
    adequate, especially for beginners. If you want to remove the `MAMP PRO` folder,
    don’t drag it to the Trash. Open the folder and double-click the `MAMP PRO` uninstall
    icon. The paid-for version requires both folders.'
