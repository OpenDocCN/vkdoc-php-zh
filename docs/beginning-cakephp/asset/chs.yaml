  \ 函数。这里不需要任何参数。只需在模型或控制器中调用此函数，如果模型拥有有效的树，它将返回 `true` 值。\n\n### 使用 ACL 和 Translate\
  \ 行为\n\n到目前为止，我已经详细解释了 `Tree` 行为，以演示如何在你的 Cake 应用程序中使用行为。只需添加一行代码（具体来说，就是设置 `$actsAs`\
  \ 属性），你就可以扩展模型以使其表现不同。`Tree` 行为会动态调整标签，使其包含它们之间的关联，你无需在模型中再编写任何函数来维护数据树（当然，除非你想增强该树以包含更多方法和结构）。但是，你可以在相对较短的时间内为你的数据库添加基本的树结构。\n\
  \n其他行为的工作方式类似，这意味着它们为模型执行类似的任务，使得移动数据更加容易。不幸的是，另外两个内置行为，即 `ACL` 和 `Translate`，比\
  \ `Tree` 行为复杂得多。（`Containable` 行为易于使用，但我稍后会对此行为进行更详细的说明。）管理访问控制列表（`ACL` 的全称）的本质是在应用程序中建立用户控制的最复杂任务之一。深入研究此行为对许多开发者来说肯定有用，但这也会超出本书的范围。我仅在此提请你注意，并鼓励你，如果你的应用程序需要为各种用户组和单个用户建立详细的层级结构，请查看这个内置行为。\n\
  \n\n\n### 翻译行为\n\n`Translate`行为也涉及更复杂的方法来将其集成到应用程序中。本行为的教程超出了本书的总体范围，因为它需要掌握另一种语言（以及英语）的知识。因此，请记住，如果您的项目需要复杂的数据映射来更改语言设置，那么`Translate`行为是您以动态方式使用这些方法的最佳选择。简而言之，`Translate`可以动态地映射字段名、路由等。\n\
  \n### 使用 Containable 行为\n\n通过向模型提供特定的查找条件，您可以有效地搜索数据库，并精确过滤掉结果集中不需要的内容。您不仅可以避免编写和循环复杂的查询，坚持使用\
  \ Cake 的模型函数，还可以使用规范化的数据库，并扩展您的应用程序以适应更复杂的模式。但面对所有这些可能性，您可能会注意到，构建能够与数据库协作并精确提供所需内容的查找条件，本身也可能变得困难。或者更糟的是，您可能会发现自己编写了复杂的循环或辅助函数来在视图中过滤数据，尤其是在处理复杂的多对多关联时。\n\
  \n最好让模型向控制器和视图提供精确的数据片段，但当使用复杂的关联时，必须采用额外的查找方法。这就是`Containable`行为发挥作用的地方——它对关联模型和记录应用过滤方法，使您在检索关联数据时能够更加具体。\n\
  \n与所有其他行为一样，`Containable`必须包含在`$actsAs`属性中。为了说明`Containable`的工作方式，考虑一下我们博客应用程序中一些表的排列方式：文章拥有多条评论，标签与文章是多对多关系，用户拥有多篇文章。现在，考虑这样一个场景：假设您想从`Post`模型基于特定的评论作者获取一篇文章。`Containable`使此操作变得简单。\n\
  \n在控制器中，您可以输入以下内容：\n\n```\n$this->Post->find('all', array('contain'=>'Comment.name\
  \ = \"Superman\"'));\n```\n\n这个字符串将返回所有包含评论且评论的`name`值为`Superman`的文章。\n\n`Containable`还可以“包含”关联模型，这意味着您可以将结果集限制为特定模型，而无需使用`unbindModel()`或更改递归参数。\n\
  \n例如，如果您想检索数据库中的所有文章，但只包含关联的评论（不包含关联的标签），`Containable`可以通过以下方式简化该操作：\n\n```\n$this->Post->find('all',array('contain'=>'Comment'));\n\
  ```\n\n如果没有`Containable`，您需要使用`unbindModel()`来产生相同的结果，如下所示：\n\n```\n$this->Post->undbindModel(array('hasAndBelongsToMany'=>'Tag'));\n\
  $this->Post->find('all');\n```\n\n`Containable`还可以在关联的结果集中返回特定字段。例如，您可能只想要文章作者的姓名，而不需要用户表中的其他字段（例如密码和角色）。使用以下代码：\n\
  \n```\n$this->Post->find('all',array('contain'=>'User.username'));\n```\n\n仍会为您提供每篇文章的关联用户，但只包含`username`和`id`字段。以这种方式使用`Containable`返回的一篇文章的示例数组如下所示：\n\
  \n```\nArray\n(\n    [Post] => Array\n    (\n        [id] => 1\n        [name] =>\
  \ 示例文章标题\n        [date] => 2008-12-01 00:00:00\n         => 示例内容。\n    )\n    [User]\
  \ => Array\n    (\n        [id] => 1\n        [username] => 示例用户\n    )\n)\n```\n\
  \n注意，`User`数组中只返回了`id`和`username`。使用`Containable`，您可以为模型执行的查找操作应用更具体的规则，并显著减少在应用程序中传递的数据量，更不用说在控制器或视图中处理结果集所需的工作量了。\n\
  \n### 附加和分离行为\n\n在处理数据时，任何应用程序都可能被信息淹没。不仅在 Web 开发中，在一般的编程中，管理内存和 CPU 负载对于保持程序以最佳性能运行至关重要。在\
  \ Web 开发中，任何可以减少服务器负载的措施都能改善用户体验，尤其是考虑到速度是用户与网站交互的一个因素。模型通过使用详细的查找条件、递归设置及其`bindModel()`和`unbindModel()`函数，来减少从数据源拉取的数据量。类似地，模型可以通过有效地附加或分离行为来减轻其服务器的负载。附加和分离行为还有其他原因，通常围绕着精简应用程序，无论是为了减少服务器负载还是清理代码。模型内置了一些函数来管理它对行为的使用程度以及使用哪些行为。\n\
  \n#### 分离和禁用行为\n\n有两种方法可以减少模型对行为的使用：让模型“关闭”某个行为的所有回调，或者让模型完全停止采用指定的行为。`disable()`和`detach()`函数分别执行这些任务。只需提供一个包含每个行为名称的数组，这些行为将被禁用或从当前模型中分离。唯一的注意事项是这些函数通过`Behaviors`类调用：\n\
  \n```\n$this->Tag->Behaviors->detach(array('Tree'));\n```\n\n因此，要完全从当前模型中移除某个行为，请使用`detach()`函数；要限制行为将发送给模型的回调响应，请使用`disable()`函数。当使用了`disable()`时，模型函数可能仍然可以使用该行为的函数。只需记住，自动回调过程（例如将记录保存到数据库时）将不会运行；这些过程必须在模型中手动调用。\n\
  \n#### 附加和启用行为\n\n与`detach()`和`disable()`一样，您可以手动告诉模型何时何地使用特定行为。使用`enable()`，您可以告诉模型允许该行为在回调期间开始工作。这意味着模型在执行回调方法（如保存到数据库或从数据库删除文件）时，将自动咨询该行为。\n\
  \n`attach()`函数用于启动行为。此处的设置与`$actsAs`数组中的设置一样传递。只需像设置`$actsAs`属性那样格式化一个数组，并将其作为此函数的第一个参数。\n\
  \n要测试特定行为是已启用还是已禁用（不一定是已附加或已分离），请使用`enabled()`函数。该函数接受一个行为名称，并检查该行为在模型中是否已启用。`enabled()`函数将返回`true`或`false`值，指示指定的行为是否已启用。\n\
  \n### 编写自定义行为\n\n按照惯例，行为用于扩展模型，因此它们不应包含通常出现在控制器或组件中的任何逻辑。以下是一个简单的清单，用于判断特定任务或一组任务是否应由行为执行：\n\
  \n-   该任务是否涉及为模型处理数据？\n-   该任务是否不仅仅执行数据验证？\n-   该任务在获取数据时是否执行了多个查询？\n\n\n\n• 该任务是否适用于现有数据（换句话说，它无需执行本应由`DataSource`管理的连接方法）？\n\
  \n• 该任务是否涉及基本的保存、读取、更新或删除方法之外的操作（换句话说，在处理单条数据记录时是否需要进行多次更新等）？\n\n如果你对以上所有问题的回答都是“是”，并且找不到与任务匹配的内置或第三方行为，那么你应该编写一个自定义行为。与`DataSources`不同，行为不需要特定的框架才能工作。它们只需要按照约定命名、存储在正确的目录中，并在模型中被适当调用。模型使用行为函数的方式与控制器使用组件函数的方式非常相似。然而，通过在行为中编写某些回调函数，当父模型执行自身的保存、更新或删除操作时，可以触发特定的处理流程。\n\
  \n### 设置行为文件\n\n与 Cake 中的其他资源（现在你可能已经习惯创建它们）一样，行为遵循特定的约定。首先，文件名遵循与模型相同的命名约定：使用小写名称，多个单词之间用下划线分隔，并带有`.php`扩展名。其次，文件必须存储在`app/models/behaviors`目录中。\n\
  \n最后，行为必须具有正确的类名；请参见清单 14-17 中一个基本行为的示例。\n\n**清单 14-17.** *基本行为文件示例*\n\n```\n<?\n\
  class UpdateBehavior extends ModelBehavior {\n\nfunction setup(&$model, $config=array())\
  \ {\n\n}\n\n}\n?>\n```\n\n请注意，行为类继承了`ModelBehavior`并包含了`setup()`函数。该函数在行为被实例化时作为启动函数被调用。通过使用`&$model`参数，父模型对象在该函数中是可访问的，这意味着在`setup()`函数中，父模型的所有属性和函数都可以通过`$model`调用。例如，`setup()`函数中的`$model->data`将包含当前模型的`$this->data`数组。在行为中执行数据方法，如保存到数据库或运行查询，可以通过使用标准的模型函数来完成，如下所示：\n\
  \n```\n$rows = $model->find('all',array('conditions'=>array('id'=>$config['id'])));\n\
  ```\n\n### 在行为中通过 ConnectionManager 使用 DataSources\n\n如果你的自定义行为必须使用`$model`类对象中可用的`DataSource`之外的`DataSource`，那么你必须使用`ConnectionManager`工具来创建一个`DataSource`对象。清单\
  \ 14-18 演示了执行此操作的最简单方法。\n\n**清单 14-18.** *使用 ConnectionManager 工具在行为中实例化 DataSource*\n\
  \n```\n$db =& ConnectionManager::getDataSource($model->useDbConfig);\n```\n\n请注意，清单\
  \ 14-18 使用了父模型对象；这仅在使用了`ConnectionManager`的行为函数将其第一个参数设置为`&$model`时才能实现。\n\n通过清单\
  \ 14-18，`$db`成为要在行为中使用的`DataSource`对象。就像模型使用`DataSource`一样，行为现在可以直接与`DataSource`一起工作。例如，该行为可以通过以下方式调用本章前面构建的\
  \ XML `DataSource`：\n\n```\n$xml =& ConnectionManager::getDataSource($model->useDbConfig['xml']);\n\
  ```\n\n然后使用`$xml->findAll()`函数执行查找全部的操作。\n\n### 在行为中执行回调\n\n你可能已经注意到，`Tree`行为在模型保存标签时执行了一些函数。通过在保存标签时简单地为模型提供一个`parent_id`值，`Tree`行为会自动为记录分配一个父级值并对树进行排序。这些类型的自动方法是在行为中使用某些回调函数时执行的。换句话说，对于父模型将要执行的所有保存操作，该行为都会执行相应的回调。\n\
  \n\n\n`09775ch14final 7/1/08 9:57 PM Page 270`\n\n**270**\n\n## 第 14 章 ■ 数据源与行为\n\
  \n`beforeSave()` 回调函数，只要该行为被附加到模型并启用即可。你可以通过使用表 14-4 中列出的回调函数，让行为自动为模型执行任何逻辑。请记住，在回调函数中可以通过\
  \ `&$model` 访问父模型。\n\n**表 14-4.** *行为中的回调函数*\n\n**函数名称**\n**调用时机**\n\n`afterDelete(&$model)`\n\
  在模型成功删除一条或一组记录之后。\n\n`afterFind(&$model, $results, $primary)`\n在模型执行查找之后；可用于修改 `find()`\
  \ 返回的结果。如果模型是通过关联模型被查询的，则 `$primary` 将被设置为 `false`。\n\n`afterSave(&$model, $created)`\n\
  在模型成功保存一条或一组记录之后；如果是新条目被保存，则 `$created` 被设置为 `true`。\n\n`beforeDelete(&$model, $cascade)`\n\
  在模型删除记录之前；如果 `$cascade` 被设置为 `true`，则依赖于当前记录的其他记录也会被删除。\n\n`beforeFind(&$model,\
  \ $query)`\n在模型执行查找之前；`$query` 是一个包含查找条件的数组。\n\n`beforeSave(&$model)`\n在模型保存一条或一组记录之前。\n\
  \n`beforeValidate(&$model)`\n在模型验证数据之前。\n\n### 编写行为函数时需牢记的要点\n\n构建行为很简单，尽管它们可以像任何其他\
  \ Cake 资源一样复杂。通常，它们只包含一些函数和若干属性（或类变量），用于简化模型的数据处理。这些函数的作用类似于辅助函数，最终会返回一组值、一个数组或一个布尔值。只有当使用\
  \ `ConnectionManager` 连接到 `DataSource` 或编写了特定的回调函数时，行为才会直接与数据源交互。其他时候，行为的作用是容纳那些否则会拖慢模型的处理过程。\n\
  \n### 总结\n\n按照惯例，模型处理所有数据，而控制器处理应用程序的所有逻辑。为了更好地扩展模型，Cake 包含了两种资源来分离重复性功能：数据源和行为。通过数据源，你可以在一个底层抽象层中为模型提供所有连接和查询过程，并允许相同的查找、更新、保存和删除方法出现在模型中，而无需更改其中的代码。\n\
  \n在本章中，我解释了如何构建一个简单的 XML 数据源，该数据源会自动打开一个 XML 文件、解析 XML，并将每条记录显示为一篇博客文章。通过行为，你可以为模型提供更复杂的数据处理方法，或者那些可以同时发生而不会拖慢模型的方法。通过使用内置的\
  \ Tree 行为来更好地组织标签，博客应用现在拥有了更高效的分类层级结构。用户也能从你使用 Tree 行为中受益；当点击一个分类时，用户不仅能看到直接与该标签关联的文章列表，还能看到所有与子标签关联的文章。Containable\
  \ 行为用于“包含”关联模型，或者说，以特定方式限制结果集，从而精确提供你想要的数据值，它同样允许你扩展模型的功能。我展示了一些在你的应用中使用 Containable\
  \ 的简单方法。\n\n编写自定义行为允许你将这些类型的模型函数封装在一种扩展中，从而使你的应用程序更加精简。现在，你已经使用了 Cake 的所有资源文件并在\
  \ MVC 结构中工作过，剩下的就是收尾博客应用了。\n\n`09775ch14final 7/1/08 9:57 PM Page 271`\n\n`09775ch14final\
  \ 7/1/08 9:57 PM Page 272`\n\n`09775ch15final 7/1/08 9:56 PM Page 273`\n\n## 第 15\
  \ 章\n\n## 收尾应用\n\n**到**此为止，你已经全面探索了在 Cake 中进行开发的基础知识。以博客应用作为你的第一个进阶项目，你构建了控制器、模型和视图等自定义资源；并通过组件、行为、数据源和辅助函数等其他资源扩展了这些资源。但你可能已经意识到，当前的博客应用还不能投入生产（你还不能将其提供给任何真实用户使用）。\n\
  \n博客应用目前已经具备主要方法，允许你将文章、标签和用户添加到数据库中，还有其他方法可以为访客提供评论和阅读文章的方式。要让应用进入生产环境，只需你处理一些收尾工作。\n\
  \n在本章中，我将讲解在收尾一个 Cake 应用并使其准备部署时需要考虑的最终例程。我不会逐行讲解代码，但会引导你完成一些常见任务，为你的 Cake 项目画上点睛之笔。请将这里概述的例程视为有助于你练习的练习。\n\
  \n### 设计首页\n\n到目前为止，我一直通过指定直接 URL 来引导你进入应用的各个区域。例如，在告诉你编辑某个动作时，我会用完整 URL 写出该动作的路径（如\
  \ `http://localhost/blog/posts/view/1`）。你需要创建一个包含所有这些 URL 的首页，或者至少一个列出如何导航到你已构建到博客中的所有功能的页面。许多初学者在构建应用功能之前就从首页开始，这可能会导致访客的起点混乱。撇开设计考虑不谈，Cake\
  \ 凭借其架构和约定，提倡尽可能使用动态方法来生成网站内容。你可以利用你已经构建到博客应用中的内容来创建链接，将用户引导到网站的其他所有区域。\n\n第一步是创建一个起点。然后，你提供内容和导航，引导用户从该点到达下一个界面。你有两个选项来创建这个起点（即首页）：你可以使用\
  \ Cake 内置的 Pages 控制器，或者选择一个动作作为起点，例如 Posts Index 动作。\n\n#### 使用 Pages 控制器生成单一视图\n\
  \n应用中那些不一定执行任何逻辑，或者组合了来自多个控制器的各种方法的部分（如首页），可能只需要一个视图。对于你的博客应用，首页只需要包含几篇链接到其完整故事视图的文章，以及你在第\
  \ 14 章中使用 Tree 行为构建的分类链接。我通常会在 Posts Index 动作的基础上添加这些内容（稍后我会描述），因为我希望首页上显示一些文章。但如果我不想在首页上显示任何文章，或者首页只是一个包含几个指向网站主要区域链接的简单页面呢？在这种情况下，用静态\
  \ HTML 编写一个简单的视图可能会更容易。\n\nPages 控制器是开箱即用的；它是渲染 Cake 欢迎界面的方法。请注意，在 `app/config/routes.php`\
  \ 中，默认首页被列为顶部路由：\n\n\n\n`Router::connect('/', array('controller' => 'pages', 'action'\
  \ => 'display', 'home'));` 你会从我们在第 10 章的讨论中认出，这个路由将基础路径（`'/'`）连接到了 `Pages` 控制器的\
  \ `Display` 动作。它还向该动作传递了参数 `home`，从而渲染了 Cake 的默认主页，也就是欢迎界面。将 `home` 改为其他值，或者在 `app/views/pages`\
  \ 目录下创建一个名为 `home.ctp` 的视图文件，会使这个基础路由指向你自己的自定义视图。`Pages` 控制器已内置于核心中，因此你无需手动创建 `app/controllers/pages_controller.php`\
  \ 文件。只需传递你想要渲染的视图名称，并创建相应的视图文件（使用 `.ctp` 扩展名），`Pages` 控制器就会自动为你渲染该视图。\n\n一旦你创建了自己的\
  \ `home.ctp` 文件或自定义文件，你应该能够访问 `http://localhost/blog`，并且该视图将被显示。只需在此视图文件中添加指向 `Posts`\
  \ 的 `Index` 动作以及网站其他区域的链接，用户就能顺畅地浏览博客。在网站的其他地方，你可以通过使用基础路径或更详细的链接（例如：`$html->link('示例链接',array('controller'=>'pages','action'=>'display','home'));`）来指向这个主页。\n\
  \n### 使某个动作成为起始点\n\n要使 `Posts` 的 `Index` 动作成为主页，只需更改 `app/config/routes.php` 中的基础路由。一种实现方式是使用以下路由：`Router::connect('/',\
  \ array('controller' => 'posts', 'action' => 'index'));` 现在，当用户访问主页时，将渲染 `Posts`\
  \ 的 `Index` 视图，而非 Cake 的欢迎界面。然后，在 `app/views/posts/index.ctp` 文件中，你可以提供所有导航来访问网站的其他区域。使用现有动作作为应用程序的起始点，其好处在于整合各种方法所需的逻辑已经就绪。创建诸如分类链接之类的动态内容成为可能，因为控制器和模型已经在努力获取这些数据。我更喜欢用这种方法来构建主页，但过去也因项目特定原因使用过其他方法。然而，最重要的是，你要提供一个主页或起始点，该起始点能轻松提供必要的导航，并动态地展示来自整个应用程序的内容。大多数情况下，你不想手动更新主页，因此，尽可能让应用程序为你完成这项工作，效果会更好。\n\
  \n### 生成动态导航\n\n更复杂的导航可能需要在应用程序中创建某种菜单系统。该博客已具备处理分类和渲染文章的能力。创建一个在每个视图中都能渲染的菜单很容易。（显示菜单是使用元素（element）而非布局（layout）或助手（helper）的好时机。）\n\
  \n你可以像我创建的**清单 15-1**那样创建一个菜单元素，并在整个网站的各个视图中调用它。注意，我已检查了 `Session` 组件以查看用户是否登录，并相应地更改了可供用户使用的链接。当然，登录过程需要构建，最好配合\
  \ `Auth` 组件，但这个元素在根据用户会话状态调整界面以提供链接方面确实表现良好。\n\n**清单 15-1.** *`app/views/elements/menu.ctp`\
  \ 元素*\n\n```html\n<div class=\"menu\">\n<ul>\n<?=$html->link('<li>首页</li>','/',null,null,false);?>\n\
  <?=$html->link('<li>文章</li>',array('controller'=>'posts','action'=>➥\n'index'),null,null,false);?>\n\
  <?=$html->link('<li>标签</li>',array('controller'=>'tags','action'=>➥\n'index'),null,null,false);?>\n\
  <? if (!$session->check('User')): ?>\n<?=$html->link('<li>登录</li>',array('controller'=>'users',➥\n\
  'action'=>'login'),null,null,false);?>\n<? else: ?>\n<?=$html->link('<li>添加文章</li>',array('controller'=>'posts',➥\n\
  'action'=>'admin_add'),null,null,false);?>\n<?=$html->link('<li>编辑文章</li>',array('controller'=>'posts',➥\n\
  'action'=>'admin_index'),null,null,false);?>\n<?=$html->link('<li>登出</li>',array('controller'=>'users',➥\n\
  'action'=>'logout'),null,null,false);?>\n<? endif;?>\n</ul>\n</div>\n```\n\n记得在视图中使用\
  \ `$this->element()` 视图函数来调用你的菜单元素：\n\n```\n$this->element('menu');\n```\n\n###\
  \ 自定义整体设计\n\n在准备将应用程序投入生产环境以及在此过程中改进现有方法时，你很可能需要更改视图的设计，通常需要逐个进行。完成应用程序时的一个重要步骤是检查每个视图并与网站进行交互。然后根据需要调整设计。\n\
  \n在本书中，我尽可能地使用了 Cake 内置的样式表和 HTML 标记。你无疑会希望更改设计以适应自己的需求。大多数时候，你会在构建应用程序时使用 CSS 和\
  \ HTML 来调整设计。对于你的博客应用程序来说，现在正是应用你自己的 CSS 和图形来设计的好时机。也许你会想聘请一位图形设计师来完成这部分工作。\n\n\
  在任何 Cake 项目中，审查设计并尽可能改进是完成应用程序时的一项重要常规工作。有时你会在此阶段创建新的布局、视图、元素和助手，以更好地分离显示元素并保持代码结构的一致性。请记住，尽可能确保可重复的设计元素保存在代码中的单一位置。这就是被称为\
  \ DRY 的编程原则——不要重复自己。通过这种方式，你可以为将来可能需要做的任何调整提前考虑，从而节省时间。\n\n### 调试应用程序\n\n希望你的 Cake\
  \ 应用程序在构建时没有引入太多错误。尽管如此，完成应用程序时的一个重要步骤是再次检查是否有任何错误。当通过浏览器在控制器中调用动作时，测试更深层的资源（如模型、组件、数据源和行为）可能会比较棘手。Cake\
  \ 附带了一个有用的测试套件，允许你使用样本数据对模型和组件运行测试。你需要正确设置 `app/config/database.php` 文件以连接到测试数据库，然后通过\
  \ Cake 称之为 *fixtures* 的工具来运行单元测试。但是，使用样本数据执行单元测试最终可以减少你花费在确保应用程序模型无错误上的时间，特别是当你构建大量自定义模型函数时。在探索如何更好地使用\
  \ Cake 时，请查阅在线 Cake 社区以获取运行测试套件的详细信息。许多功能仍在开发中，一些有前景的方法计划在后续版本中发布。（Mariano Iglesias\
  \ 在 `http://bakery.cakephp.org/articles/view/testing-models-with-cakephp-1-2-test-suite`\
  \ 上撰写了一篇关于使用内置测试套件进行模型测试的优秀教程，这将帮助你开始使用 fixtures；你可以在 `http://bakery.cakephp.org/tags/view/test`\
  \ 查看其他关于测试套件的文章。）\n\n### 在远程主机上运行应用程序\n\n\n\n一旦您的应用程序准备好在 Web 上使用，最后的例行工作就是将项目从本地主机环境迁移到远程主机。如果远程主机与本地主机具有相同的设置，您应该能够将父应用程序文件夹“原样”上传到远程目录，并且它应该可以正常运行。您需要运行某种类型的\
  \ MySQL 转储文件来镜像远程和本地主机数据库。\n\n为了确保应用程序的安全，您应该将 Cake 库和 `app` 文件夹放置在远程服务器上文档根目录之外。这要求您对应用程序的文件夹结构进行一些调整，并更改几个全局变量。\n\
  \n可以在服务器上移动的三个主要文件夹是 `cake`、`app` 和 `webroot`。\n\n更改应用程序文件夹结构时，主要注意事项是 `webroot`\
  \ 文件夹必须位于公共目录或文档根目录中。假设我的远程主机设置了一个根目录（位于文档根目录之外），并将 `www` 作为文档根目录，而域名指向 `[user/home/www](http://www.To)`。为了更好地保护应用程序，我将\
  \ Cake 库和 `app` 文件夹放在 `user/home` 中，并将 `webroot` 从 `app` 文件夹中取出，放在 `[user/home/www](http://www.Cake)`\
  \ 中。Cake 可以处理这种结构，但我必须在 `user/home/www/webroot/index.php` 中更改一些变量，才能使其正确编译。\n\n\
  我打开 `webroot/index.php` 文件，滚动到看到三个全局常量的位置：`ROOT`、`APP_DIR` 和 `CAKE_CORE_INCLUDE_PATH`。表\
  \ 15-1 显示了在当前的文件夹结构下，远程主机上每个常量应被分配的路径。\n\n**表 15-1.** *远程设置的路径*\n\n| 常量 | 服务器路径\
  \ |\n| :--- | :--- |\n| `ROOT` | `/user/home` |\n| `APP_DIR` | `www` |\n| `CAKE_CORE_INCLUDE_PATH`\
  \ | `user/home` |\n\nCake 使用 `DS` 作为目录分隔符。因此，我根据表 15-1 将这些常量重新分配到它们的新路径，最终得到清单 15-2\
  \ 所示的内容。（通常，此文件中会有一些注释行；我已将其从清单中省略。）\n\n**清单 15-2.** *修改* `webroot/index.php` *文件以在远程主机上工作*\n\
  \n```\nif (!defined('ROOT')) {\n    define('ROOT', DS.'user'.DS.'home');\n}\nif\
  \ (!defined('APP_DIR')) {\n    define('APP_DIR', 'www');\n}\nif (!defined('CAKE_CORE_INCLUDE_PATH'))\
  \ {\n    define('CAKE_CORE_INCLUDE_PATH', DS.'user'.DS.'home');\n}\n```\n\n### 总结\n\
  \n本章解释了在完成 Cake 项目时需要考虑的一些重要例行事务。请记住在 `app/config/routes.php` 中提供起点，并在整个应用程序中创建导航方法，以改善用户对博客以及任何其他\
  \ Cake 应用程序的体验。同时，不要忘记彻底检查代码中的错误，并根据您的方法修改视图的设计。在将应用程序部署到远程主机时，请确保将 Cake 库放置在文档根目录之外，并相应调整\
  \ `webroot/index.php` 文件。\n\n# 附录 A\n## 安装问题\n\n设置开发环境的最佳方法是在您的计算机上配置一个本地主机服务器。让我解释一下这意味着什么。当您访问一个网站时，您正在通过互联网连接向另一台计算机发送和请求信息。该服务器可以在大量可能的配置中通信和处理信息。例如，当您购买一台计算机时，您可以选择购买\
  \ Mac 或 Windows 机器。或者，如果您愿意，可以运行 Linux、Unix 甚至 DOS。\n\n所有这些可能性意味着，对于作为用户的您来说，体验将取决于您选择的操作系统。但假设您想打印一份文档。那么，无论操作系统或该操作系统如何打印内容，一旦文档被打印出来，计算机拥有何种配置就无关紧要了；对于文档的读者来说都是一样的。\n\
  \n互联网与这个例子非常相似。处理请求并生成输出的另一端计算机/服务器几乎可以运行任何东西。但最终的输出将是某种网页或某种网络输出。对于作为开发人员的您来说，配置将至关重要。事实上，它会影响您创建和提供网站所做的一切。\n\
  \n### 在本地主机环境中开发\n\n当您设置本地主机时，您实际上是在自己的计算机上设置一个服务器。\n\n您将启动一个像 Firefox 或 Safari\
  \ 这样的网页浏览器，并输入类似 `http://localhost` 的内容来访问服务器，就像网站在线时用户所做的那样。实际上，您是在欺骗计算机，让它认为自己在与一个\
  \ web 服务器通信，而实际上它是在与自己对话。\n\n#### 先使用本地主机，最后使用远程主机\n\n只要您本地主机上的配置与托管网站的远程 web 服务器上的配置相同，您就可以在自己的计算机上进行开发。\n\
  \n一旦网站运行良好，您将把根目录或应用程序的整个内容移动到服务器，然后就完成了。如果您做得正确，该网站应该在远程服务器上也能同样运行。\n\n#### 为什么完全在远程上开发不好\n\
  \n如果您绕过了本地主机的设置，您将被迫完全在远程进行开发。我认为这没问题，前提是以下事情不会困扰您：\n\n- 运行持续的 FTP 会话\n- 每次想要测试代码最细微的更改时都需要上传\n\
  - 由于互联网连接超时导致程序执行中断\n- 用户偶然发现您半成品的程序\n- 购买测试域名以防止用户偶然发现您半成品的程序\n- 消耗您自己的带宽（对于一些托管计划来说可能已经很紧张）\n\
  \n### 设置本地主机\n\n无论您的计算机运行什么操作系统，安装本地主机环境都很简单。如果您使用的是 Mac，我建议安装 Living-e 的 MAMP。如果您使用的是基于\
  \ Windows 的 PC，请安装 XAMPP。\n\n通常，创建本地主机设置需要通过命令行界面安装各种服务器程序，这需要对 PHP、MySQL、Apache、ProFTPd\
  \ 和其他服务器技术有很好的理解。而 MAMP 和 XAMPP 的作用是简化这些复杂的服务器设置，这样您基本上只需运行一个安装程序，设置就完成了。\n\n####\
  \ 在 Mac 上设置\n\nMac OS X 已经内置了本地主机设置。但是，如果您想运行 MySQL 并将 PHP 升级到 5.0 或更高版本，您需要手动安装每个元素，这可能会有点繁琐。运行\
  \ MAMP 可能会为您节省大量时间。以下部分概述了操作方法。\n\n**第 1 步：下载软件**\n\n访问 `http://www.mamp.info`，在主页上找到\
  \ MAMP 下载链接。它会询问您是否需要 MAMP Pro，如果需要，请支付 49 美元下载它。否则，下载最新免费版本的 MAMP。\n\n**第 2 步：打开磁盘映像并安装\
  \ MAMP 文件夹**\n\n这一步非常简单。它会要求您将一个文件夹拖放到“应用程序”文件夹中。这是本地主机设置正常工作所必需的。请确保您没有使用任何子文件夹或将\
  \ MAMP 文件夹重命名为其他任何名称。如果您不喜欢这样做，您可能需要考虑更复杂的本地主机设置方法。\n\n![Image 50](img/index-305_1.jpg)\n\
  \n\n\n## 附录 A：安装问题\n\n##### 第三步：运行 MAMP 应用程序\n\n您随时可以通过运行 `/Applications/MAMP/MAMP`\
  \ 应用程序来管理您的本地主机设置。主屏幕如图 A-1 所示。\n\n**图 A-1.** *MAMP 主应用程序屏幕*\n\n点击**启动服务器**后，该程序将维持本地主机环境。您现在可以开始执行\
  \ PHP 代码，但需要知道在硬盘上何处访问本地主机。\n\n##### 第四步：配置本地主机根文件夹\n\n默认情况下，`/Applications/MAMP/htdocs`\
  \ 文件夹中的任何文件都可在本地主机环境中访问。总体来说这也不算太差，但我个人更倾向于将网站放在 `Applications` 文件夹之外。更改此设置只需进入\
  \ MAMP 应用程序的偏好设置区域即可。\n\n点击**偏好设置**打开偏好设置区域。点击 **Apache** 选项卡，您会找到一个名为**文档根目录**的字段。其内容应为\
  \ `/applications/mamp/htdocs` 或类似路径。点击**选择**将文档根目录更改为其他位置。在此示例中，我将选择 `~/Sites/`\
  \ 文件夹（如果我的 Mac OS X 用户名是 `dave`，则路径将显示为 `/Users/dave/Sites`）。从现在开始，放置在 `Sites` 文件夹中的任何文件夹或文件都将由\
  \ MAMP 本地主机设置执行，而非 Mac OS X 的默认 Web 共享。\n\n##### 第五步：更改本地主机端口\n\n现在仍留在偏好设置区域，点击**端口**选项卡。其中列出了\
  \ **Apache 端口**和 **MySQL 端口**。默认情况下，这些字段的值分别设置为 `8888` 和 `8889`。为了更好地模拟典型的远程 Web\
  \ 服务器，应更改这些端口。在 Apache 端口字段中输入 `80`，在 MySQL 端口字段中输入 `3306`。（您也可以点击**设置为默认 Apache\
  \ 和 MySQL 端口**按钮。）\n\n由于端口按此方式配置，您现在可以在想要执行脚本和文件时，打开 Safari 并输入 `http://localhost`\
  \ 来替代 `http://localhost:8888`。此外，在配置需与 MySQL 协同工作的程序时，您只需在服务器设置中输入 `localhost` 即可，无需输入\
  \ `localhost:8888`。\n\n##### 第六步：让本地主机更易管理\n\n在 Mac 上搭建本地主机环境，没有比这更简单的方法了。但 MAMP\
  \ 应用程序的一个缺陷是：必须保持运行，本地主机环境才能工作。因此，如果退出 MAMP，您将无法再通过本地主机运行 PHP 代码。幸运的是，Living-e 提供了一个\
  \ Dashboard 小工具，它能执行与 MAMP 应用程序完全相同的操作来保持本地主机活跃。只需启动 `Mamp Control.wdgt` 文件，然后点击**启动服务器**即可激活本地主机。此后它将在后台通过\
  \ Dashboard 运行。\n\n---\n\n# 在 Windows 上设置\n\nWindows XP Pro 内置了微软的 Web 服务器，称为 Internet\
  \ 信息服务 (IIS)。安装 IIS 非常简单。然而，大多数 PHP 和 MySQL 场景更容易通过 Apache Friends 提供的集成式本地主机安装程序\
  \ XAMPP 来处理。以下各节概述了在 PC 上安装和配置 XAMPP 的步骤。\n\n##### 第一步：下载软件\n\n您可以从 Apache Friends\
  \ 网站下载 XAMPP。截至本书出版时，直接链接如下：\n\n[`www.apachefriends.org/en/xampp-windows.html`](http://www.apachefriends.org/en/xampp-windows.html)\n\
  \n您可以下载安装程序应用程序、ZIP 文件或自解压的 7-ZIP 存档。最简单的选项是直接运行安装程序应用程序。因此，向下滚动到页面的下载区域，点击**安装程序**。下载将立即开始。\n\
  \n##### 第二步：运行安装程序\n\n该程序将引导您完成 XAMPP 的安装。它会询问 XAMPP 的目标文件夹，默认位置为 `c:\\xampp`。我建议坚持使用此配置，因为您很可能希望\
  \ XAMPP 能够访问 C 驱动器的任何区域。点击**下一步**，在下一个屏幕上，将服务部分复选框留空。最后，点击末尾的**安装**按钮。它将解压所有必要文件，并在\
  \ `c:\\xampp` 文件夹中为您提供一个方便的本地主机环境。\n\n![图 51](img/index-307_1.jpg)\n\n##### 第三步：打开\
  \ XAMPP 控制面板\n\n安装完成后，您将进入 XAMPP 控制面板。将来可以通过点击桌面上的快捷方式图标或进入**开始 / Apache Friends\
  \ / XAMPP / XAMPP 控制面板**来访问此面板。屏幕如图 A-2 所示。\n\n**图 A-2.** *XAMPP 控制面板屏幕*\n\n点击**启动**按钮可启动重要的\
  \ Web 服务器服务，如 Apache、MySQL 等。使用**启动**按钮启动 Apache 和 MySQL，然后打开您的 Web 浏览器。在 URL 字段中输入\
  \ `http://localhost`。您将进入 XAMPP 欢迎屏幕。\n\n##### 第四步：保护本地主机\n\n遗憾的是，XAMPP 并未预先安装更安全的本地主机环境。在某些方面这可能是件好事，但目前最不想要的就是危及网络或计算机的安全。如果您认为其他用户访问您的本地主机几乎无需担心（这实际上仅在工作环境中，当其他同事使用同一子网或网络时才可能发生），那么您可以跳过此步骤。如果其他用户有任何可能访问您的本地主机，那么您可能只需花点时间让\
  \ XAMPP 更安全。在 XAMPP 启动网页的左侧有一个**安全**链接。点击它，会弹出安全信息页面。大多数项目（如果不是全部）将被标记为“不安全”。让我们让它们全部亮起绿灯。\n\
  \n主表下方有一个名为 `http://localhost/security/xamppsecurity.php` 的链接，点击后会进入一些字段，这些字段允许您保护本地主机。更改\
  \ MySQL root 密码，然后点击**更改密码**。在 MySQL root 密码字段下方还有另一组字段，用于保护 XAMPP 目录（`.htaccess`）。在那里输入用户名和密码。对于这两项，请确保不要将密码保存在纯文本文件中。\n\
  \n从现在开始，您需要登录才能访问 XAMPP 控制页面。重启 Apache 和 MySQL 以传播您已创建的设置。\n\n---\n\n### 运行 MySQL\n\
  \n用于设置和运行 MySQL 的最强大的基于 Web 的工具是 PHPMyAdmin，它是另一个随 MAMP 和 XAMPP 安装的开源应用程序。两个本地主机环境的启动屏幕都包含指向\
  \ PHPMyAdmin 的链接。这是在 MySQL 中开始工作的最快方式，因为我们已经安装了一个本地主机环境，该程序已预先配置好并随时可用。许多开发者更喜欢\
  \ PHPMyAdmin 而非其他基于桌面的 MySQL 应用程序，因为它基于 Web 且免费，而且说实话，它是一款出色的应用程序。我本人更喜欢基于桌面的应用程序，因为它们速度快，而且可以避免屏幕刷新，而\
  \ PHPMyAdmin 因为是 Web 应用程序，所以无法避免屏幕刷新。\n\n## 在哪里可以找到其他 MySQL 工具\n\n如果您希望使用桌面应用程序来管理数据库，可以在以下各节中找到一些列出的工具。它们可能需要额外的配置才能与您的本地主机环境配合使用。我将列出它们，然后解释一些使其正常工作的必要设置。\n\
  \n##### CocoaMySQL\n\n\n\n# 在 Mac 上，运行 MySQL 最简单的免费软件可能是 `CocoaMySQL`。\n\n访问 [`cocoamysql.sourceforge.net`](http://cocoamysql.sourceforge.net)\
  \ 即可获取该软件。\n\n##### MySQL Query Browser\n\n在 Mac 和 PC 上，`MySQL Query Browser` 是一款可靠易用的免费应用程序，可让你通过图形界面操作\
  \ MySQL（请访问 [`dev.mysql.com/downloads/gui-tools`](http://dev.mysql.com/downloads/gui-tools)）。\n\
  \n##### HeidiSQL\n\n此软件与 Mac 上的 `CocoaMySQL` 非常相似，但专为 Windows 构建。在某些方面，其布局比 `MySQL\
  \ Query Browser` 更易于导航，并且入门所需的 MySQL 技能较少。它同样是开源的，因此尝试一下也无妨（请访问 [www.heidisql.com](http://www.heidisql.com)）。\n\
  \n#### 运行 MySQL 时的典型设置\n\n无论你决定使用哪个应用程序，每个程序在连接到 MySQL 之前都需要一些参数。以下部分重点介绍了让你成功连接所需的常见参数。\n\
  \n##### 主机\n\n这几乎总是 `localhost`，即使你正在设置要在远程服务器上运行的脚本也是如此。如果你尝试访问远程数据库，它可能是该站点的域名，但你需要从虚拟主机提供商处获取详细信息。按照前面概述的配置，只需输入\
  \ `localhost`。如果这不起作用，只需确定你计算机的 IP 地址，该地址通常默认为 `127.0.0.1`。\n\n##### 用户和密码\n\nMySQL\
  \ 支持多个用户和组来管理和维护数据库。登录到你的应用程序并访问必要的区域以添加或更改帐户后，即可添加或更改这些内容。在此示例中，除非你输入了不同的内容，否则用户名和密码都将为\
  \ `root`。有时，网络主机可能会为你设置共享主机帐户；在这些情况下，你可能需要为用户名添加前缀，例如 `cake_`。\n\n##### Socket\n\
  \n当 MySQL 运行时，应用程序和 PHP 的连接点称为 *socket*。其默认路径是 `/var/mysql/mysql.sock`，但使用这些快速简便的本地主机设置配置时，此路径将无效。如果你知道\
  \ MySQL socket 存储在其默认位置（如大多数主机设置一样），则可以将此设置留空。在本地主机上，你必须指定路径。在 PC 上，如果你按照教程操作，默认设置即可正确连接。在\
  \ Mac 上，如有必要，表 A-1 中包含了路径字符串。\n\n**表 A-1.** *将应用程序连接到 MySQL Socket 的路径字符串*\n\n|\
  \ **Web 服务器软件** | **路径** |\n|-------------------|----------|\n| Mac OS X Server\
  \ | `/` |\n| MAMP | `/applications/mamp/tmp/mysql/mysql.sock` |\n| XAMPP | `/applications/xampp/xamppfiles/var/mysql/mysql.sock`\
  \ |\n\n##### 端口\n\nMySQL 的默认端口是 `3306`。仅当应用程序要求你输入或你以某种方式将端口号更改为其他值时，才需输入此端口。\n\n\
  # CakePHP 与其他框架的比较\n\n为了让您大致了解 Cake 的表现，本附录将其与其他一些流行的 Web 框架进行了比较。\n\n### PHP 框架\n\
  \n目前，最流行的 PHP 框架包括：\n\n- CakePHP ([www.cakephp.org](http://www.cakephp.org))\n-\
  \ CodeIgniter ([www.codeigniter.com](http://www.codeigniter.com))\n- Symfony ([www.symfony-project.org](http://www.symfony-project.org))\n\
  - Zend Framework ([`framework.zend.com`](http://framework.zend.com))\n\n这些框架都是用\
  \ PHP 语言构建的，但它们的方法和库有所不同。这里也可以列出其他框架（与其他语言相比，PHP 拥有大量且不断增长的框架数量），但我将只关注这四个。毫无疑问，其他框架将会出现，但我预计这些框架将继续成为\
  \ PHP 框架市场中最主要的参与者。有关其中一些框架基本信息的比较，请参见表 B-1。\n\n**表 B-1.** *基本信息*\n\n| **框架** |\
  \ **官方支持组织** | **最新版本¹** |\n|-----------|-----------------|---------------|\n| CakePHP\
  \ | Cake 软件基金会 | 1.2 rc1 |\n| CodeIgniter | EllisLab | 1.6.2 |\n| Symfony | Sensio\
  \ Labs | 1.1 rc2 |\n| Zend Framework | Zend Technologies | 1.5.2 |\n\n¹截至本书写作时。\n\
  \n## 使用各种框架\n\n这些框架均已作为开源项目发布，这意味着大量的开发工作依赖于社区支持。跟踪错误、编写支持文档以及提供通用支持都是需要像您这样的开发者参与的任务。很多时候，无论您选择哪个框架，您都会去在线社区寻求帮助。社区的规模以及可用的在线资源可能会影响您使用该框架的体验。\n\
  \n在以下部分中，我将讨论每个框架在线社区当前的一些特性，以及它们如何帮助用户开发软件。我还将描述使用各种框架时的一些基本观察，并将每个框架与 Cake 进行比较。我认识到关于每个框架还有很多可以讨论的内容，但我的目标是向您概述与\
  \ Cake 相关的用户体验，而不是对所有框架进行详尽比较。您将对从一个框架迁移到 Cake 的感觉以及在考虑将 Cake 作为主要开发框架时从何处入手有一个大致了解。\n\
  \n#### CakePHP\n\n在本书中，我提到了一些可以参与 Cake 社区的主要网站。表 B-2 列出了这些网站以及获取更多 CakePHP 信息的其他网站。\n\
  \n**表 B-2.** *CakePHP 社区网站*\n\n| **URL** | **详情** |\n|---------|---------|\n| [www.cakephp.org](http://www.cakephp.org)\
  \ | CakePHP 首页 |\n| [`bakery.cakephp.org`](http://bakery.cakephp.org) | The Bakery；包含关于\
  \ CakePHP 的文章、代码和其他公告 |\n| [`groups.google.com/group/cake-php`](http://groups.google.com/group/cake-php)\
  \ | 讨论组；包含数千个关于该框架的讨论，是解答问题的绝佳资源 |\n| [www.cakeforge.org](http://www.cakeforge.org)\
  \ | 开源 CakePHP 项目的仓库；下载第三方 Cake 应用程序和插件的绝佳资源 |\n| [`trac.cakephp.org`](http://trac.cakephp.org)\
  \ | Cake 的支持网站和跟踪系统；在这里，您可以查看和提交与 Cake 版本相关的工单 |\n| [`live.cakephp.org`](http://live.cakephp.org)\
  \ | The Show；一个围绕 CakePHP 所有内容的实时互联网广播播客 |\n| irc://irc.freenode.net/cakephp | 用于讨论\
  \ CakePHP 的主要 IRC 聊天室 |\n\n表 B-2 中列出的网站和聊天室活动频繁；迄今为止，Cake 已被下载超过 68 万次，并且仍然是最常被搜索的\
  \ Web 框架之一。该讨论组拥有近 9000 名活跃成员，并拥有超过 54,000 条已审核讨论主题的存档。在任何时候，IRC 聊天室通常都有 100 到 200\
  \ 名访客。\n\n\n\n\n社区中的重复内容被控制在最低限度，因此当您提问或请求支持时，可能会被引导到某个已经讨论过相同主题的帖子或博客。您还会感受到社区中的完美主义倾向。我的意思是：管理\
  \ Cake 开发的 Cake 软件基金会本可以在开发框架时走捷径。与其他框架相比，Cake 本可以被认定为 3.0 或 4.0 版本，但它目前仍处于 1.2\
  \ 版本。这主要是因为它在真正收紧框架，而不是为了快速实现大量方法而仓促开发。这种策略的结果是，Cake 确实比原本更加稳健、成熟且编写得更好，并且您可以信赖它在引入更多高级方法时仍能保持这种稳健性。我绝不是在贬低其内置方法的庞大数量（这足以媲美任何其他框架的函数）；我只是想指出，Cake\
  \ 的一个关键优势在于其架构，或者换句话说，其方法论——该方法经过精心设计和测试。\n\n也许 Cake 最具竞争力的特性是其用于数据处理`find()`方法。在本书中，我解释了如何使用`find()`模型函数轻松获取数据库记录，而无需编写\
  \ SQL 或其他数据源查询。通过有效设置查询条件和其他参数，您可以减少循环和匹配的工作量，因为模型能干净地返回结果集。不幸的是，`CodeIgniter`附带的数据库辅助函数仍要求您编写大部分\
  \ SQL 查询。`Symfony`则在模型层使用相当复杂的条件语法来设置查询条件，这仅仅是比 PHP 的数据库函数略有改进。而`Zend Framework`几乎完全依赖您的\
  \ SQL 语法知识来使用其数据库适配器类。由于`Cake`的`find()`方法是独立于数据源设计的，它们不必遵循特定的查询语言，这使得通过模型执行查询变得容易得多。\n\
  \n**CodeIgniter**\n\n`CodeIgniter`的社区相比`CakePHP`较小，但拥有良好的在线支持网络。其用户指南（[www.codeigniter.com/user_guide](http://www.codeigniter.com/user_guide)）设计精良，目录导航布局清晰。`Cake`使用的许多概念也被`CodeIgniter`采用，例如`MVC`结构、辅助器、路由、脚手架和缓存。其支持网络非常出色，论坛拥有超过\
  \ 66,000 个主题和 400,000 篇帖子。然而，那里的许多主题不像`Cake`的讨论组那样直接与代码开发问题相关。从某种意义上说，`CodeIgniter`的论坛和维基更像是`Cake`的讨论组、`Bakery`和`CakeForge`的结合体。基于`CodeIgniter`构建的网站数量少于`Cake`，但`CodeIgniter`起步良好，未来可能会成为一个更流行的框架。\n\
  \n2. 根据其他框架使用 Google 趋势历史工具（[www.google.com/trends](http://www.google.com/trends)）的比较结果。在\
  \ PHP 框架中，`CakePHP`的搜索量最高。\n\n`09775appBfinal 7/1/08 9:35 PM Page 292`\n\n**292**\n\
  \n附录 B ■CakePHP 如何与其他框架比较\n\n启动`CodeIgniter`应用程序所需的时间少于设置`Cake`应用程序；然而，`Cake`预装的一些配置方法在`CodeIgniter`中并未提供。例如，要设置路由使其像在`Cake`中那样工作，您需要手动编写一个`.htaccess`文件，以便通过类似的路由引擎传递路径。默认情况下，`CodeIgniter`比`Cake`更轻量级，这是其主要卖点之一。\n\
  \n然而，随着您扩展`CodeIgniter`应用程序，您可能需要在某些地方执行额外的步骤，才能获得与`Cake`相同的功能。\n\n`CodeIgniter`中的`MVC`结构与`Cake`类似。因此，创建模型、视图和控制器的总体流程与您在构建`Cake`应用程序时学到的几乎相同。除了在应用程序中传递数据和命名约定方面的一些细微差异外，运行`CodeIgniter`的体验与`Cake`大体相同。然而，`Cake`的胜出之处在于其强大的核心类、辅助器、路由和数据处理方法。\n\
  \n`Cake`中的可用资源和内置功能更加强大，坦率地说，也更具内聚性。换句话说，当`Cake`开发者完全沉浸于`CodeIgniter`时，可能会感觉自己退了一步，尽管他们无疑会觉得自己身处熟悉的环境。这并不是说`CodeIgniter`不是一个优秀的框架；只是它在将方法分配到资源方面不如`Cake`高效。简而言之，`Cake`的范式更侧重于使模型“臃肿”并分散各种方法；而`CodeIgniter`则导致控制器非常庞大。\n\
  \n**Symfony**\n\n`Symfony`很早就进入了 PHP 框架领域，并一直保持流行。其社区也很庞大，拥有开发者群组、论坛、聊天室、维基等资源。这些在线群组和网站的主要链接都可以在\
  \ Symfony 的社区页面（[www.symfony-project.com/community](http://www.symfony-project.com/community)）上找到。\n\
  \n`Symfony`在方法上与`CakePHP`有很大不同。在本书中，我展示了如何通过重命名文件夹并将其放置在服务器或本地主机上来创建一个`Cake`项目。在`Symfony`中，您需要学习通过`Symfony`控制台脚本运行重要命令，就像使用`Bake`一样。您可以通过下载打包文件并配置其文件以在服务器上运行，来手动安装`Symfony`；或者您可以使用`PEAR`让安装脚本处理大部分工作。我发现让`Symfony`正确运行通常比`Cake`需要更多时间，仅仅因为要让服务器和控制台都能与整个框架正常协作，需要执行许多步骤。但是，一旦这些配置完成，启动一个新的`Symfony`应用程序就简单到只需输入一行命令。\n\
  \n成功启动一个`Symfony`应用程序后，您需要使用命令行初始化数据源连接，并执行其他设置任务。生成脚手架也是在控制台中完成的，但最终结果与`Cake`的脚手架类似。构建模型主要通过基于`YAML`的配置结合`symfony`控制台脚本来完成。如果您更喜欢用`YAML`而不是`JSON`或`XML`来配置数据库模式，那么`Symfony`可能很适合您。`Cake`在这方面确实无法比拟，因为它连接数据源的方法不涉及命令行（尽管您可以使用`Bake`编写`database.php`配置文件并构建模型）。\n\
  \n`09775appBfinal 7/1/08 9:35 PM Page 293`\n\n附录 B ■CakePHP 如何与其他框架比较\n\n**293**\n\
  \n在扩展`Symfony`应用程序以容纳更多方法时，许多使`Cake`有效的相同概念也被使用了。从`Cake`转向`Symfony`的学习曲线更陡峭，主要因为`Symfony`提供的优势通常在于其命令行界面。然而，`Symfony`用户应该不会觉得学习`Cake`有多么困难。可能需要一些时间来习惯在控制台中运行较少的命令，但总的来说，您构建`Cake`应用程序所需的步骤不应比构建`Symfony`应用程序更多。\n\
  \n**Zend Framework**\n\n\n\n\n### Zend Framework 与 CakePHP 对比分析\n\nZend Framework\
  \ 可以说是为 PHP 构建的第一个框架。其企业赞助商 Zend Technologies 与 PHP 语言本身有着悠久的历史；其创始人包括 PHP 的两位原始作者\
  \ Andi Gutmans 和 Zeev Suraski。PHP 之所以成为最流行的 Web 编程语言之一，很大程度上始于 Zend Technologies\
  \ 及其对语言的贡献。正因如此，Zend Framework 早期就取得了成功，并继续在 PHP 框架市场中扮演重要角色。\n\n就社区支持而言，Zend Framework\
  \ 可能拥有所有 PHP 框架中最大的在线追随者群体。其文档广泛且详尽，非官方博客和论坛使得几乎任何问题都能获得在线支持。提交到核心的代码都经过严格的测试方法，这使得\
  \ Zend Framework 成为一个极其健壮的框架。然而，Zend Framework 更像是一个大型的库集合，而非轻量级的 MVC 框架。例如，其主要库文件夹大小接近\
  \ 16MB，是 Cake 库大小的三倍多。启动 Zend Framework 需要更多的自定义和配置，而 Cake 则采用了\"约定优于配置\"的范式。你几乎可以在任何\
  \ PHP 项目中使用 Zend Framework（我在第 12 章中演示了如何在 Cake 中使用 Zend 库），但代价是你必须编写或配置大量 Cake\
  \ 通过其调度方法自动完成的工作。\n\nZend Framework 不像 Cake、CodeIgniter 和 Symfony 那样有单一开发范式，这吸引了许多开发人员。因此，像\
  \ MVC 这样的模式在 Zend Framework 中是可行的，但这需要你手动编写配置方法，而这些方法在 Cake 和其他框架中是自动内置的。在框架如何减少扩展所需代码量方面，Cake\
  \ 无疑领先于 Zend Framework。学习 Zend Framework 通常比学习 Cake 更耗时，主要是因为框架的设计。对于初学者来说，启动 Zend\
  \ Framework 的 MVC 变体通常比 Symfony 更困难，更不用说 Cake 了。\n\n诚然，在大多数 PHP 圈子中，Zend Framework\
  \ 比 Cake 更为人知；可以说它是团队中的老将。但 Cake 正证明自己更像一颗冉冉升起的新星，移动更快且战略上更稳健。鉴于 Cake 有效实现了 MVC\
  \ 结构及其结构设计，它很可能会继续吸引前 Zend Framework 开发人员，并保持 PHP 框架领域的顶尖地位。\n\n`09775appBfinal\
