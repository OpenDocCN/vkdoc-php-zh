    Figure 14-4.


    Method code coverage


    Green lines are covered, red lines are not covered, and white lines are not executable.


    ## Fixtures Data


    Creating fixtures is boring, and automatically generated fixtures are filled with
    useless data. We need an easy, and intelligent, solution that can hold table relations
    with real data.


    PHPMyAdmin ( [`http://phpmyadmin.net`](http://phpmyadmin.net) ) gives us a way
    to export table data. Choose `PHP array` as the format and `custom` for the type.
    Then you can define how many rows you want to take from your existing records.


    While PHPMyAdmin is a complete MySQL administration tool with which you can create,
    edit, and remove databases, tables, fields, and records, it is not only for exporting
    data for fixtures. If you are not familiar with it, it is time to become so. If
    you’ve made friends with the Terminal, you can learn to use the MySQL console
    also.


    ## Testing Private Methods


    We’ve seen a lot of examples of testing `public` methods. Testing `protected`
    methods is the same.


    If we try to test a private method, we will get an error message complaining about
    an unknown method.


    Let’s create a private method in `/src/Model/Table/PostsTable.php`:


    ```

    1  private function getPostsInCategory($categoryId)

    2  {

    3      return $this->find()

    4          ->where([''category_id'' => $categoryId]);

    5  }

    ```


    While, again, this is a silly example of a `private` method, it’s good enough
    for testing `private` methods.


    `Private` methods should be instanced as a reflection class, to enable testing.
    Paste the following into `/tests/TestCase/Model/Table/PostsTableTest.php`:


    ```

    1  public function testGetPostsInCategory()

    2  {

    3      $class = new ReflectionClass($this->Posts);

    4      $method = $class->getMethod(''getPostsInCategory'');

    5      $method->setAccessible(true);

    6      $actual = $method->invoke($this->Posts, 1);

    7      $expected = 1;

    8      $this->assertEquals($expected, $actual->toArray()[0]->id);

    9  }

    ```


    To get it to work, we should include `ReflectionClass` at the beginning of this
    file.


    ```

    1  use ReflectionClass;

    ```


    Many developers say you shouldn’t test `private` methods. Instead of getting into
    the details of their arguments, I’ll leave it up to you to decide whether or not
    to test them.


    ## Testing Views


    Generally, we do not test views, as we do with models and controllers. HTML tends
    to change, and most of it is not testable. The best approach is to rely on `assertContains`,
    if you want to check data in the view. Selenium `(` [`http://seleniumhq.org/`](http://seleniumhq.org/)
    ) is a tool for testing views.


    ## Testing Components


    If you created your own component at `/src/Controller/Component/YourComponent.php`,
    you should put its test file to `/tests/TestCase/Controller/Component/YourComponentTest.php`.


    At the `setUp()` method of your test class, you should mock Cake’s `Controller`
    class and register your component.


    A sample `setUp()` method is the following:


    ```

    1  public function setUp()

    2  {

    3      parent::setUp();

    4      $request = new Request();

    5      $response = new Response();

    6      $this->controller = $this->getMock(

    7          ''Cake\Controller\Controller'',

    8          null,

    9          [$request, $response]

    10      );

    11      $registry = new ComponentRegistry($this->controller);

    12      $this->component = new YourComponent($registry);

    13  }

    ```


    At the `tearDown()` method, we should unset the class variables created by `setup()`.


    ```

    1  public function tearDown()

    2  {

    3      parent::tearDown();

    4      unset($this->component, $this->controller);

    5  }

    ```


    Let’s say `YourComponent` manipulates pagination. It has a `textToNumber()` method
    that sets the pagination’s limit to different numbers, based on textual parameters.
    For example, if `textToNumber(''long'')` is called, the pagination’s limit will
    be set to 100. In this case, our test method will look like the following:


    ```

    1  public function testTextToNumberLong()

    2  {

    3      $this->component->textToNumber(''long'');

    4      $this->assertEquals(100, $this->controller->paginate[''limit'']);

    5  }

    ```


    We called the component’s `textToNumber()` method and then we checked the controller’s
    pagination limit value by the assertion.


    ## Testing Helpers


    Let’s say we have a helper that creates a date string based on a given number
    of days passed since the millennium. Paste the following code to `/src/View/Helper/EasyDateHelper.php`:


    ```

    1  namespace App\View\Helper;


    3  use Cake\View\Helper;


    5  class EasyDateHelper extends Helper

    6  {

    7      public function add($days)

    8      {

    9          return ''D: '' . date(''Y-m-d'', mktime(0, 0, 0, 1, $days, 2000));

    10      }

    11  }

    ```


    The corresponding test file should be `/tests/TestCase/View/Helper/EasyDateHelperTest.php`.
    It is very similar to model tests, except we should call the helper’s constructor
    in the `setUp()` method.


    ```

    1  namespace App\Test\TestCase\View\Helper;


    3  use App\View\Helper\EasyDateHelper;

    4  use Cake\TestSuite\TestCase;

    5  use Cake\View\View;


    7  class EasyDateHelperTest extends TestCase

    8  {


    10    public $helper = null;


    12    public function setUp()

    13    {

    14        parent::setUp();

    15        $View = new View();

    16        $this->helper = new EasyDateHelper($View);

    17     }


    19     public function testAdd()

    20     {

    21        $this->assertEquals(''D: 2000-01-15'', $this->helper->add(15));

    22        $this->assertEquals(''D: 2000-04-09'', $this->helper->add(100));

    23        $this->assertEquals(''D: 2002-09-26'', $this->helper->add(1000));

    24     }

    25  }

    ```


    When you are testing a `Helper` that uses other helpers, be sure to mock the `View`
    class’s `loadHelpers` method.


    ## Testing Plugins


    If you have a plugin called Pizza at `/src/plugins`, you should have all your
    tests in the `/src/plugins/Pizza/tests` folder, with the same subfolders as in
    `/tests`.


    ```

    1  namespace Pizza\Test\TestCase\Model\Table;


    3  use Pizza\Model\Table\PizzaSlicesTable;

    4  use Cake\TestSuite\TestCase;


    6  class PizzaSlicesTableTest extends TestCase

    7  {

    8      public $fixtures = [''plugin.pizza.pizza_slices''];


    10      public function testTaste()

    11      {

    12          // Test taste of the pizza slices

    13      }

    14  }

    ```'
