- fmt: "# Problems and Solutions in Generating Objects\n\nObject creation can be a\
    \ weak point in object-oriented design. In the previous chapter, you saw the principle,\
    \ “Code to an interface, not to an implementation.” To this end, you are encouraged\
    \ to work with abstract supertypes in your classes. This makes code more flexible,\
    \ allowing you to use objects instantiated from different concrete subclasses\
    \ at runtime. This has the side effect that object instantiation is deferred.\n\
    \nHere’s a class that accepts a name string and instantiates a particular object:\n\
    \n```\n// listing 09.01\nabstract class Employee\n{\n    protected $name;\n  \
    \  public function __construct(string $name)\n    {\n        $this->name = $name;\n\
    \    }\n    abstract public function fire();\n}\n// listing 09.02\nclass Minion\
    \ extends Employee\n{\n    public function fire()\n    {\n        print \"{$this->name}:\
    \ I'll clear my desk\\n\";\n    }\n}\n// listing 09.03\nclass NastyBoss\n{\n \
    \   private $employees = [];\n    public function addEmployee(string $employeeName)\n\
    \    {\n        $this->employees[] = new Minion($employeeName);\n    }\n    public\
    \ function projectFails()\n    {\n        if (count($this->employees) > 0) {\n\
    \            $emp = array_pop($this->employees);\n            $emp->fire();\n\
    \        }\n    }\n}\n// listing 09.04\n$boss = new NastyBoss();\n$boss->addEmployee(\"\
    harry\");\n$boss->addEmployee(\"bob\");\n$boss->addEmployee(\"mary\");\n$boss->projectFails();\n\
    mary: I'll clear my desk\n```\n\nAs you can see, I define an abstract base class,\
    \ `Employee`, with a downtrodden implementation, `Minion`. Given a name string,\
    \ the `NastyBoss::addEmployee()` method instantiates a new `Minion` object. Whenever\
    \ a `NastyBoss` object runs into trouble (via the `NastyBoss::projectFails()`\
    \ method), it looks for a `Minion` to fire.\n\nBy instantiating a `Minion` object\
    \ directly in the `NastyBoss` class, we limit flexibility. If a `NastyBoss` object\
    \ could work with any instance of the `Employee` type, we could make our code\
    \ amenable to variation at runtime as we add more `Employee` specializations.\
    \ You should find the polymorphism in Figure [9-1](#A314621_5_En_9_Chapter.html#Fig1)\
    \ familiar.\n\n![A314621_5_En_9_Fig1_HTML.gif](A314621_5_En_9_Fig1_HTML.gif)\n\
    \n**Figure 9-1.** Working with an abstract type enables polymorphism\n\nIf the\
    \ `NastyBoss` class does not instantiate a `Minion` object, where does it come\
    \ from? Authors often duck out of this problem by constraining an argument type\
    \ in a method declaration, and then conveniently omitting to show the instantiation\
    \ in anything other than a test context:\n\n```\n// listing 09.05\nclass NastyBoss\n\
    {\n    private $employees = [];\n    public function addEmployee(Employee $employee)\n\
    \    {\n        $this->employees[] = $employee;\n    }\n    public function projectFails()\n\
    \    {\n        if (count($this->employees)) {\n            $emp = array_pop($this->employees);\n\
    \            $emp->fire();\n        }\n    }\n}\n// listing 09.06\n// new Employee\
    \ class...\nclass CluedUp extends Employee\n{\n    public function fire()\n  \
    \  {\n        print \"{$this->name}: I'll call my lawyer\\n\";\n    }\n}\n// listing\
    \ 09.07\n$boss = new NastyBoss();\n$boss->addEmployee(new Minion(\"harry\"));\n\
    $boss->addEmployee(new CluedUp(\"bob\"));\n$boss->addEmployee(new Minion(\"mary\"\
    ));\n$boss->projectFails();\n$boss->projectFails();\n$boss->projectFails();\n\
    mary: I'll clear my desk\nbob: I'll call my lawyer\nharry: I'll clear my desk\n\
    ```\n\nAlthough this version of the `NastyBoss` class works with the `Employee`\
    \ type, and therefore benefits from polymorphism, I still haven’t defined a strategy\
    \ for object creation. Instantiating objects is a dirty business, but it has to\
    \ be done. This chapter is about classes and objects that work with concrete classes,\
    \ so that the rest of your classes do not have to.\n\nIf there is a principle\
