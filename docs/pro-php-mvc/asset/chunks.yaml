    The last thing we need to do in Ubuntu is set the ownership of the files to Apache2
    and set the correct document root. Use the following command to change ownership
    of the files, from within the same folder: chown –R www-data:www-data *


    Next, type vim /etc/apache2/sites-enabled/000-default and change the line that
    shows DocumentRoot to the correct path of your application directory’s public
    folder. Mine is at /var/www/public, so that line in the config file should read
    DocumentRoot /var/www/public (see Figure [A-18](#index_split_007.html#p448)).


