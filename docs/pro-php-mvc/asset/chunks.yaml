    $imagine


    ->open("{$path}/{$name}")


    ->thumbnail($size, $mode)


    ->save("{$path}/{$thumbnail}");


    }


    return $thumbnail;


    }


    }


    public function profileAction()


    {


    // check for user session


    $this->_isSecure();


    // load thumbnail


    $file = Application_Model_File::first(array(


    "user = ?" => $this->user->id


    ));


    $filename = $this->_thumbnail($file);


    // load view


    $this->view->user = $this->user;


    $this->view->filename = $filename;


    }


    }


    ■ **Note** remember to secure your uploads directory!


    The _thumbnail() method is similar to the façade class we created in our CodeIgniter
    application, and is also called internally by the profile action. This will produce
    a thumbnail should none already exist, and return it to our profileAction() method,
    which then assigns it to the view. We also need to modify our profile.phtml view,
    as shown in Listing 28-8.


    ***Listing 28-8.*** The profile.phtml View


    <?php if ($this->filename): ?>


    <img src="/uploads/<?php echo $this->filename; ?>" />


    <?php endif; ?>


    <h1><?php echo $this->user->first; ?> <?php echo $this->user->last; ?></h1> This
    is a profile page!


    We now know how to utilize built-in Zend Framework libraries, as well as third-party
    libraries with namespace support and class autoloading.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 28 ■ Zend Framework: extending


    Questions


    1\. What are some of the differences between Zend Framework’s namespace schema
    and the namespace schema PHP 5.3 provides?


    2\. We began our time with Zend Framework by using the Command Line Interface
    to create a project, yet most of the work we’ve done has been without the help
    of the CLI.


    Why might this be?


    Answers


    1\. Zend Framework (1.11) uses underscores as namespace separators where PHP 5.3


    namespaces are separated by backslash characters. Zend Framework’s class libraries
    aren’t technically namespaced in that they are all in the global namespace. Conflicts
    aren’t likely to occur, though, as Zend Framework’s class names tend to be verbose.


    2\. While the CLI provides a lot of helpful functionality, learning a framework
    has to be done by manual coding. We could have used the CLI, but then we would
    also have


    understood much less of Zend Framework.


    Exercises


    1\. There is no way to generate thumbnails outside of the profileAction() method.
    Try creating a public action that allows for this functionality.


    2\. Take a look at some of the many class libraries bundled with Zend Framework.


    There are many helpful resources and the libraries can even be used alongside
    other frameworks.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Chapter 29**


    **Zend Framework: Testing**


    We end our time with Zend Framework by looking at how to run unit tests in our
    application, using PHPUnit.


