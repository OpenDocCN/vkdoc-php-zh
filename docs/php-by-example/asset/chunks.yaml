- fmt: "# Figure 12-14\nThe result of processing the form data\n\nThe window displays\
    \ information about the order (the selected drink and the need to add milk and\
    \ sugar). Let’s analyze how the program’s execution leads to the described result.\
    \ The `index.html` file contains the following code.\n\n```\n<!DOCTYPE html>\n\
    <html>\n<head>\n<title>Menu</title>\n</head>\n<body>\n<h1>Make your choice</h1>\n\
    <form action=\"listing12_05.php\" method=\"post\">\n<p>Select a drink:</p>\n<select\
    \ name=\"drinks\">\n<option value=\"Tea\">Tea</option>\n<option value=\"Coffee\"\
    >Coffee</option>\n<option value=\"Chocolate\">Chocolate</option>\n</select>\n\
    <p><input type=\"checkbox\" name=\"milk\" value=\"add\"> Add milk</p>\n<p><input\
    \ type=\"checkbox\" name=\"sugar\" value=\"add\"> Add sugar</p>\n<p><input type=\"\
    reset\" value=\"Reset\">\n<input type=\"submit\" value=\"Submit\"></p>\n</form>\n\
    </body>\n</html>\n```\n\nThe drop-down list is an element defined by the `<select>`\
    \ and `</select>` tags. And this time, you implement the buttons as `<input>`\
    \ elements.\n\n## THE HTML BASICS\n\nThe element defined by the `<select>` and\
    \ `</select>` tags is a drop-down list. The items of the list (you see them when\
    \ expanding the list) are created by the `<option>` and `</option>` tags. The\
    \ text between those descriptors is the item’s content displayed in the list.\
    \ You specify the `value` attribute for the three `<option>` elements. The `<select>`\
    \ element has the value `\"drinks\"` for the `name` attribute. When the form data\
    \ is submitted to the server, there is an element in the `$_POST` array with the\
    \ key `\"drinks\"`, and the value of that element is determined by the `value`\
    \ attribute of the `<option>` element selected in the drop-down list.\n\nThe checkboxes\
    \ are created as `<input>` elements, with the `type` attribute set to `\"checkbox\"\
    `. For one of the checkboxes, the `value` and `name` attributes are `\"add\"`\
    \ and `\"milk\"`, respectively, and for the other – `\"add\"` and `\"sugar\"`.\
    \ Suppose a checkbox is selected when submitting the form data. In that case,\
    \ the `$_POST` array contains an element with the key determined by the value\
    \ of the `name` attribute of that checkbox, and the value of the array element\
    \ is determined by the `value` attribute.\n\nThe buttons are also created as `<input>`\
    \ elements. The `type` attribute for the first button is set to `\"reset\"`, and\
    \ for the second button, that attribute is set to `\"submit\"`. Therefore, the\
    \ first button is a reset button. If you click it, the settings of all form elements\
    \ return to their original state. The second button is a button for submitting\
    \ the form data. The `name` attribute for buttons is equal to `\"rb\"` and `\"\
    sb\"`, respectively, but those values are not used. The `value` attribute determines\
    \ the title displayed on the button.\n\nThe text labels are used for the list\
    \ and checkboxes. The label elements are created using the `<label>` and `</label>`\
    \ tags. The `for` attribute of those elements specifies the name (the value of\
    \ the `name` attribute) of the element for which the text label belongs.\n\nThe\
    \ `<br>` instruction is a command to break a line in the browser window.\n\nThe\
    \ document also uses HTML comments. Comments in HTML begin with `<!--` and end\
    \ with `-->`.\n\nAs you can see from the form description, data processing is\
    \ performed by the program in the `listing12_05.php` file. The program code is\
    \ shown in Listing [12-5](#613529_1_En_12_Chapter.xhtml#PC22).\n\n```\n<?php\n\
    $drink=$_POST[\"drinks\"];\nif (isset($_POST[\"milk\"])) {\n  $milk=$_POST[\"\
    milk\"];\n} else {\n  $milk=\"do not add\";\n}\nif (isset($_POST[\"sugar\"]))\
    \ {\n  $sugar=$_POST[\"sugar\"];\n} else {\n  $sugar=\"do not add\";\n}\n$txt=<<<MYTEXT\n\
    <h2>Your order</h2>\n<p>Your order is ready</p>\n<p>You ordered:</p>\n<p>The drink:\
    \ $drink</p>\n<p>Milk: $milk</p>\n<p>Sugar: $sugar</p>\nMYTEXT;\n// Adds the text\
    \ to the document:\necho $txt;\n?>\n<p>Thank you for your choice!</p>\n```\n\n\
    Listing 12-5\nUsing a List and Checkboxes\n\nThis HTML document contains a PHP\
    \ code that generates text (based on the form data), and then the text is added\
    \ to the document. But first, the `$drink=$_POST[\"drinks\"]` command assigns\
    \ the `value` attribute of the element selected in the drop-down list to the `$drink`\
    \ variable.\n\n> **Note:** In this case, you don’t check if the `$_POST` array\
    \ contains an element with the key `\"drinks\"` (the value of the drop-down list’s\
    \ `name` attribute) because some element in the list is always selected.\n\nNext,\
    \ two similar conditional statements follow. In the first one, the `isset($_POST[\"\
    milk\"])` condition is checked. It is true if the `$_POST` array contains an element\
    \ with the key `\"milk\"` (the checkbox for adding milk is checked). If so, then\
    \ the `$milk=$_POST[\"milk\"]` command assigns the `value` attribute of the corresponding\
    \ checkbox to the `$milk` variable. Otherwise, the `$milk=\"do not add\"` command\
    \ is executed.\n\nThe data associated with the checkbox “responsible” for adding\
    \ sugar is processed similarly. But now, the `isset($_POST[\"sugar\"])` condition\
    \ is checked. If the condition is true, the `$sugar=$_POST[\"sugar\"]` command\
    \ is executed. If the condition is false, the `$sugar=\"do not add\"` command\
    \ is executed.\n\nAfter the values of the `$drink`, `$milk`, and `$sugar` variables\
    \ are defined, the `$txt` variable is created with a multi-line text value.\n\n\
    ## THE HTML BASICS\n\nUse the `<ul>` and `</ul>` tags to create an unordered list.\
    \ List items are defined by the `<li>` and `</li>` tags. The `<hr>` instruction\
    \ adds a horizontal line to the document.\n\nThe `echo $txt` command adds the\
    \ generated text into the document, which the server returns to the browser.\n\
    \n# A Slider and Radio Buttons\n\nThe following example continues the “culinary”\
    \ theme. This time, you use controls such as a slider and radio buttons. The browser\
    \ window displays the document shown in Figure [12-15](#613529_1_En_12_Chapter.xhtml#Fig15)\
    \ at the initial stage.\n\n![](images/613529_1_En_12_Chapter/613529_1_En_12_Fig15_HTML.jpg)\n\
    \nA screenshot of the web page titled coffee. It reads the following. Coffee is\
    \ the best drink. We would like you to taste it. Espresso is checked and the slider\
    \ for the sugar is set as no more than 5 spoons. The reset and submit buttons\
    \ are at the bottom.\n\nFigure 12-15\nThe document with a slider and radio buttons\n\
    \nIn addition to text, the document contains a group of four radio buttons with\
    \ the names of coffee drinks and a slider at the bottom of the form for selecting\
    \ the amount of sugar to add to the drink. Two buttons in the document (**Reset**\
    \ and **Submit**) allow us to clear the form (reset controls) and submit the form\
    \ data to the server. The server sends a response, which depends on the form settings.\
    \ For example, if the settings in the form are the same as those proposed in the\
    \ initial document, the result is as in Figure [12-16](#613529_1_En_12_Chapter.xhtml#Fig16).\n\
    \n![](images/613529_1_En_12_Chapter/613529_1_En_12_Fig16_HTML.jpg)\n\nA screenshot\
    \ of the web page titled coffee. It reads the following. Your coffee is ready.\
    \ It will be coffee espresso with two spoons of sugar. Good luck and come again,\
    \ exclamatory mark.\n\nFigure 12-16\nThe document is displayed after submitting\
    \ the form data\n\nIf you change the original document’s settings, the result\
    \ is different. Figure [12-17](#613529_1_En_12_Chapter.xhtml#Fig17) shows the\
    \ document in which different (compared to the initial version) settings are made.\n\
    \n![](images/613529_1_En_12_Chapter/613529_1_En_12_Fig17_HTML.jpg)\n\nA screenshot\
    \ of the web page titled coffee. It reads the following. Coffee is the best drink.\
    \ We would like you to taste it. Cappuccino is selected and the slider for the\
    \ sugar is set as no more than 5 spoons. The reset and submit buttons are at the\
    \ bottom.\n\nFigure 12-17\nThe settings of the form are changed in the initial\
    \ document\n\nAfter submitting the form data, you get the result, as shown in\
    \ Figure [12-18](#613529_1_En_12_Chapter.xhtml#Fig18).\n\n![](images/613529_1_En_12_Chapter/613529_1_En_12_Fig18_HTML.jpg)\n\
    \nA screenshot of the web page titled coffee. It reads the following. Your coffee\
    \ is ready. It will be coffee Cappuccino with four spoons of sugar. Good luck\
    \ and come again, exclamatory mark.\n\nFigure 12-18\nThe server response depends\
    \ on the form settings"
  raw: 'Figure 12-14

    The result of processing the form data


    The window displays information about the order (the selected drink and

    the need to add milk and sugar). Let’s analyze how the program’s

    execution leads to the described result. The `index.html` file contains the

    following code.


    ```


    Menu


    Make your choice


    Select a drink:


    Tea

    Coffee

    Chocolate


    Add milk


    Add sugar


    ```


    The drop-down list is an element defined by the `<select>` and

    `</select>`

    tags. And this time, you implement the buttons as `<input>`

    elements.


    THE HTML BASICS


    The element defined by the `<select>` and

    `</select>`

    tags is a drop-down list. The items of the list (you see them when

    expanding the list) are created by the `<option>` and

    `</option>`

    tags. The text between those descriptors is the item’s content displayed

    in the list. You specify the `value` attribute for

    the three `<option>`

    elements. The `<select>`

    element has the value `"drinks"` for the

    `name` attribute.

    When the form data is submitted to the server, there is an element in

    the `$_POST`

    array with the key `"drinks"`, and the

    value of that element is determined by the `value` attribute of

    the `<option>`

    element selected in the drop-down list.

    The checkboxes are created as `<input>` elements, with the

    `type` attribute

    set to `"checkbox"`. For one

    of the checkboxes, the `value` and `name` attributes are

    `"add"` and `"milk"`, respectively,

    and for the other – `"add"` and `"sugar"`. Suppose a

    checkbox is selected when submitting the form data. In that case, the

    `$_POST` array

    contains an element with the key determined by the value of the `name` attribute
    of

    that checkbox, and the value of the array element is determined by the

    `value`

    attribute.

    The buttons are also created as `<input>`

    elements. The `type` attribute for

    the first button is set to `"reset"`, and for the

    second button, that attribute is set to `"submit"`. Therefore,

    the first button is a reset button. If you click it, the settings of all

    form elements return to their original state. The second button is a

    button for submitting the form data. The `name` attribute for

    buttons is equal to `"rb"` and `"sb"`, respectively,

    but those values are not used. The `value` attribute

    determines the title displayed on the button.

    The text labels are used for the list and checkboxes. The label

    elements are created using the `<label>` and

    `</label>`

    tags. The `for`

    attribute of those elements specifies the name (the value of the `name` attribute)
    of

    the element for which the text label belongs.

    The `<br>`

    instruction is a command to break a line in the browser window.

    The document also uses HTML comments. Comments in HTML begin with

    `<!--` and end

    with `-->`.


    As you can see from the form description, data processing is performed

    by the program in the `listing12_05.php`

    file. The program

    code is shown in Listing [12-5](#613529_1_En_12_Chapter.xhtml#PC22).


    ```


    Your order


    Your order is ready

    You ordered:


    The drink: $drink

    Milk: $milk

    Sugar: $sugar


    MYTEXT;

    // Adds the text to the document:

    echo $txt;

    ?>


    Thank you for your choice!


    Listing 12-5

    Using a List and Checkboxes

    ```


    This HTML document contains a PHP code that generates text (based on

    the form data), and then the text is added to the document. But first,

    the `$drink=$_POST["drinks"]`

    command assigns the `value` attribute of

    the element selected in the drop-down list to the `$drink` variable.


    A circular icon

    reads a letter i at the center.Note


    In this case, you don’t check if the `$_POST` array contains

    an element with the key `"drinks"` (the value

    of the drop-down list’s `name` attribute)

    because some element in the list is always selected.


    Next, two similar conditional statements follow. In the first one,

    the `isset($_POST["milk"])`

    condition is checked. It is true if the `$_POST` array contains

    an element with the key `"milk"` (the checkbox

    for adding milk is checked). If so, then the `$milk=$_POST["milk"]`

    command assigns the `value` attribute of

    the corresponding checkbox to the `$milk` variable.

    Otherwise, the `$milk="do not add"`

    command is executed.

    The data associated with the checkbox “responsible” for adding sugar

    is processed similarly. But now, the `isset($_POST["sugar"])`

    condition is checked. If the condition is true, the `$sugar=$_POST["sugar"]`

    command is executed. If the condition is false, the `$sugar="do not add"`

    command is executed.

    After the values of the `$drink`, `$milk`, and `$sugar` variables are

    defined, the `$txt` variable is

    created with a multi-line text value.


    THE HTML BASICS


    Use the `<ul>` and `</ul>` tags to

    create an unordered list. List items are defined by the `<li>` and `</li>` tags.

    The `<hr>`

    instruction adds a horizontal line to the document.


    The `echo $txt` command adds the generated text into the document, which the

    server returns to the browser.


    A Slider and Radio Buttons


    The following example continues the “culinary” theme. This time, you use

    controls such as

    a slider and radio buttons. The browser window displays the document

    shown in Figure [12-15](#613529_1_En_12_Chapter.xhtml#Fig15) at the

    initial stage.


    ![](images/613529_1_En_12_Chapter/613529_1_En_12_Fig15_HTML.jpg)


    A screenshot of the web page titled coffee. It reads the following.

    Coffee is the best drink. We would like you to taste it. Espresso is

    checked and the slider for the sugar is set as no more than 5 spoons.

    The reset and submit buttons are at the bottom.


    Figure 12-15

    The document with a slider and radio buttons


    In addition to text, the document contains a group of four radio buttons

    with the names of coffee drinks and a slider at the bottom of the form

    for selecting the amount of sugar to add to the drink. Two buttons in

    the document (**Reset** and **Submit**) allow us to clear the

    form (reset controls) and submit the form data to the server. The server

    sends a response, which depends on the form settings. For example, if

    the settings in the form are the same as those proposed in the initial

    document, the result is as in Figure [12-16](#613529_1_En_12_Chapter.xhtml#Fig16).


    ![](images/613529_1_En_12_Chapter/613529_1_En_12_Fig16_HTML.jpg)


    A screenshot of the web page titled coffee. It reads the following.

    Your coffee is ready. It will be coffee espresso with two spoons of

    sugar. Good luck and come again, exclamatory mark.


    Figure 12-16

    The document is displayed after submitting the form data


    If you change the original document’s settings, the result is different.

    Figure [12-17](#613529_1_En_12_Chapter.xhtml#Fig17) shows the

    document in which different (compared to

    the initial version) settings are made.


    ![](images/613529_1_En_12_Chapter/613529_1_En_12_Fig17_HTML.jpg)


    A screenshot of the web page titled coffee. It reads the following.

    Coffee is the best drink. We would like you to taste it. Cappuccino is

    selected and the slider for the sugar is set as no more than 5 spoons.

    The reset and submit buttons are at the bottom.


    Figure 12-17

    The settings of the form are changed in the initial document


    After submitting the form data, you get the result, as shown in Figure

    [12-18](#613529_1_En_12_Chapter.xhtml#Fig18).


    ![](images/613529_1_En_12_Chapter/613529_1_En_12_Fig18_HTML.jpg)


    A screenshot of the web page titled coffee. It reads the following.

    Your coffee is ready. It will be coffee Cappuccino with four spoons of

    sugar. Good luck and come again, exclamatory mark.


    Figure 12-18

    The server response depends on the form settings'
  trans: "\n# 图 12-14\n处理表单数据的结果\n\n窗口显示了关于订单的信息（所选饮料以及是否需要添加牛奶和糖）。让我们分析一下程序的执行过程如何导致描述的结果。`index.html`\
    \ 文件包含以下代码。\n\n```\n<!DOCTYPE html>\n<html>\n<head>\n<title>菜单</title>\n</head>\n\
    <body>\n<h1>做出你的选择</h1>\n<form action=\"listing12_05.php\" method=\"post\">\n\
    <p>选择一种饮料：</p>\n<select name=\"drinks\">\n<option value=\"Tea\">茶</option>\n<option\
    \ value=\"Coffee\">咖啡</option>\n<option value=\"Chocolate\">巧克力</option>\n</select>\n\
    <p><input type=\"checkbox\" name=\"milk\" value=\"add\"> 添加牛奶</p>\n<p><input type=\"\
    checkbox\" name=\"sugar\" value=\"add\"> 添加糖</p>\n<p><input type=\"reset\" value=\"\
    重置\">\n<input type=\"submit\" value=\"提交\"></p>\n</form>\n</body>\n</html>\n```\n\
    \n下拉列表是由 `<select>` 和 `</select>` 标签定义的元素。这一次，你使用 `<input>` 元素来实现按钮。\n\n## HTML\
    \ 基础知识\n\n由 `<select>` 和 `</select>` 标签定义的元素是一个下拉列表。列表项（展开列表时可以看到）由 `<option>`\
    \ 和 `</option>` 标签创建。这些描述符之间的文本是列表中显示的项的内容。你为三个 `<option>` 元素指定了 `value` 属性。`<select>`\
    \ 元素的 `name` 属性值为 `\"drinks\"`。当表单数据提交到服务器时，`$_POST` 数组中有一个键为 `\"drinks\"` 的元素，该元素的值由下拉列表中选择的\
    \ `<option>` 元素的 `value` 属性决定。\n\n复选框是作为 `<input>` 元素创建的，其 `type` 属性设置为 `\"checkbox\"\
    `。其中一个复选框的 `value` 和 `name` 属性分别为 `\"add\"` 和 `\"milk\"`，另一个则为 `\"add\"` 和 `\"\
    sugar\"`。假设在提交表单数据时选中了一个复选框。那么，`$_POST` 数组会包含一个元素，其键由该复选框的 `name` 属性值决定，数组元素的值由\
    \ `value` 属性决定。\n\n按钮也是作为 `<input>` 元素创建的。第一个按钮的 `type` 属性设置为 `\"reset\"`，第二个按钮的该属性设置为\
    \ `\"submit\"`。因此，第一个按钮是重置按钮。如果你点击它，所有表单元素的设置将恢复到初始状态。第二个按钮是用于提交表单数据的按钮。按钮的 `name`\
    \ 属性分别等于 `\"rb\"` 和 `\"sb\"`，但这些值并未被使用。`value` 属性决定了按钮上显示的标题。\n\n文本标签用于列表和复选框。标签元素使用\
    \ `<label>` 和 `</label>` 标签创建。这些元素的 `for` 属性指定了文本标签所属元素的名称（`name` 属性的值）。\n\n`<br>`\
    \ 指令是在浏览器窗口中换行的命令。\n\n文档还使用了 HTML 注释。HTML 中的注释以 `<!--` 开头，以 `-->` 结束。\n\n从表单描述中可以看出，数据处理由\
    \ `listing12_05.php` 文件中的程序执行。程序代码如列表 12-5 所示。\n\n```\n<?php\n$drink=$_POST[\"\
    drinks\"];\nif (isset($_POST[\"milk\"])) {\n  $milk=$_POST[\"milk\"];\n} else\
    \ {\n  $milk=\"不加\";\n}\nif (isset($_POST[\"sugar\"])) {\n  $sugar=$_POST[\"sugar\"\
    ];\n} else {\n  $sugar=\"不加\";\n}\n$txt=<<<MYTEXT\n<h2>您的订单</h2>\n<p>您的订单已准备就绪</p>\n\
    <p>您点了：</p>\n<p>饮料：$drink</p>\n<p>牛奶：$milk</p>\n<p>糖：$sugar</p>\nMYTEXT;\n// 将文本添加到文档中：\n\
    echo $txt;\n?>\n<p>感谢您的选择！</p>\n```\n\n列表 12-5\n使用列表和复选框\n\n该 HTML 文档包含一段 PHP\
    \ 代码，它根据表单数据生成文本，然后将文本添加到文档中。但首先，`$drink=$_POST[\"drinks\"]` 命令将下拉列表中所选元素的 `value`\
    \ 属性赋值给变量 `$drink`。\n\n> **注意：** 在这种情况下，你不需要检查 `$_POST` 数组中是否包含键为 `\"drinks\"\
    `（下拉列表的 `name` 属性值）的元素，因为列表中总有一个元素被选中。\n\n接下来是两条类似的条件语句。在第一条中，检查条件 `isset($_POST[\"\
    milk\"])`。如果 `$_POST` 数组包含键为 `\"milk\"` 的元素（即用于添加牛奶的复选框被选中），则该条件为真。如果是这样，则 `$milk=$_POST[\"\
    milk\"]` 命令将相应复选框的 `value` 属性赋值给变量 `$milk`。否则，执行 `$milk=\"不加\"` 命令。\n\n与添加糖相关的复选框的数据处理方式类似。但现在，检查的是条件\
    \ `isset($_POST[\"sugar\"])`。如果条件为真，则执行 `$sugar=$_POST[\"sugar\"]` 命令。如果条件为假，则执行\
    \ `$sugar=\"不加\"` 命令。\n\n在定义了 `$drink`、`$milk` 和 `$sugar` 变量的值之后，创建变量 `$txt`，其值是一个多行文本。\n\
    \n## HTML 基础知识\n\n使用 `<ul>` 和 `</ul>` 标签创建无序列表。列表项由 `<li>` 和 `</li>` 标签定义。`<hr>`\
    \ 指令向文档中添加一条水平线。\n\n`echo $txt` 命令将生成的文本添加到文档中，服务器将该文档返回给浏览器。\n\n# 滑块和单选按钮\n\n\
    下面的例子延续了“烹饪”主题。这次，你将使用滑块和单选按钮等控件。浏览器窗口在初始阶段显示的文档如图 12-15 所示。\n\n![](img/613529_1_En_12_Fig15_HTML.jpg)\n\
    \n网页截图，标题为咖啡。内容如下。咖啡是最好的饮料。我们希望你品尝一下。选中了浓缩咖啡，糖的滑块设置为不超过 5 勺。底部有重置和提交按钮。\n\n图 12-15\n\
    带有滑块和单选按钮的文档\n\n除了文本，文档还包含一组四个单选按钮，上面有咖啡饮料的名称，以及表单底部一个用于选择加入饮料中糖量的滑块。文档中的两个按钮（**重置**和**提交**）允许我们清空表单（重置控件）并将表单数据提交给服务器。服务器发送一个响应，该响应取决于表单设置。例如，如果表单设置与初始文档中提出的设置相同，则结果如图\
    \ 12-16 所示。\n\n![](img/613529_1_En_12_Fig16_HTML.jpg)\n\n网页截图，标题为咖啡。内容如下。您的咖啡已准备就绪。这将是一杯加了两勺糖的浓缩咖啡。祝您好运，欢迎再次光临，感叹号。\n\
    \n图 12-16\n提交表单数据后显示的文档\n\n如果你更改原始文档的设置，结果会有所不同。图 12-17 显示了进行不同设置（与初始版本相比）的文档。\n\
    \n![](img/613529_1_En_12_Fig17_HTML.jpg)\n\n网页截图，标题为咖啡。内容如下。咖啡是最好的饮料。我们希望你品尝一下。选中了卡布奇诺，糖的滑块设置为不超过\
    \ 5 勺。底部有重置和提交按钮。\n\n图 12-17\n在初始文档中更改了表单设置\n\n提交表单数据后，你得到的结果如图 12-18 所示。\n\n\
    ![](img/613529_1_En_12_Fig18_HTML.jpg)\n\n网页截图，标题为咖啡。内容如下。您的咖啡已准备就绪。这将是一杯加了四勺糖的卡布奇诺咖啡。祝您好运，欢迎再次光临，感叹号。\n\
    \n图 12-18\n服务器响应取决于表单设置\n"
- fmt: "# 代码分析\n\n接下来，让我们分析代码。本项目使用两个文件。第一个是根目录（本地服务器启动目录）中的`index.html`文件。第二个是同一目录中的`listing12_06.php`文件，用于处理发送到服务器的表单数据。以下是`index.html`文件的代码。\n\
    \n```\n<!DOCTYPE html>\n<html>\n<body>\n\n<h1>Coffee</h1>\n\n<p>Coffee is the\
    \ best drink</p>\n<p>We would like you to taste it.</p>\n\n<form action=\"listing12_06.php\"\
    \ method=\"post\">\n  <p>Espresso</p>\n  <p>Latte</p>\n  <p>Americano</p>\n  <p>Cappuccino</p>\n\
    \  <p>Sugar (no more than 5 spoons):</p>\n</form>\n\n</body>\n</html>\n```\n\n\
    该文档（尤其是表单）包含许多熟悉的元素。除此之外，还有单选按钮和滑块。单选按钮和滑块被实现为`<input>`元素。\n\n## HTML基础\n\n对于单选按钮，`type`属性设置为`\"\
    radio\"`；对于滑块，`type`属性设置为`\"range\"`。除`type`属性外，还为单选按钮指定了以下属性。所有单选按钮的`name`属性均为`\"\
    coffee\"`。你需要为`name`属性使用相同的值，因为你需要对单选按钮进行分组。在一个分组内，只能选择一个单选按钮。通过为`name`属性赋予相同值来对单选按钮进行分组。各个单选按钮可以使用`id`属性进行标识。你使用该属性将文本标签与单选按钮绑定。单选按钮还具有`value`属性。通过该属性，在处理请求时，你可以确定提交表单时选择了哪个单选按钮。其中一个单选按钮具有`checked`属性，这意味着相应的单选按钮已被选中（勾选）。\n\
    \n对于滑块，`name`属性的值为`\"sugar\"`。该属性在处理表单数据时用于确定滑块。滑块的状态由`value`属性定义（初始设置为`\"2\"\
    `）。`min`和`max`属性分别是滑块的最小值和最大值。`step`属性包含滑块位置的增量。\n\n清单[12-6](#613529_1_En_12_Chapter.xhtml#PC24)是用于处理表单数据的代码。\n\
    \n```\n<?php\n$coffee=$_POST[\"coffee\"];\nfunction getsugar($sugar) {\n    if($sugar\
    \ == 0) return \"no sugar\";\n    if($sugar == 1) return \"a spoon of sugar\"\
    ;\n    return \"$sugar spoons of sugar\";\n}\n$sugar=getsugar($_POST[\"sugar\"\
    ]);\n$txt=\"<h2>Your coffee is ready</h2>\n<p>$coffee $sugar.</p>\";\n// Adding\
    \ text to the document:\necho $txt;\n?>\n<p>Good luck and come again!</p>\n\n\
    Listing 12-6\nUsing a Slider and Radio Buttons\n```\n\n思路非常简单。根据表单的设置，形成`$txt`变量，并将其文本值插入到服务器发送给浏览器的文档中。文本包括`$coffee`和`$sugar`变量的值。`$coffee`变量由`$coffee=$_POST[\"\
