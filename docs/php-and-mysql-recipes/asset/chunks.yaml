    \ . \"\\n\";\necho \"Accessed : \" . date(\"Y-m-d H:i:s\", fileatime($file)) .\
    \ \"\\n\";\n?>\n```\n\n输出将如下所示：\n```\nFile Size: 354\nCreated : 2016-04-10 11:30:46\n\
    Modified : 2016-04-10 11:30:46\nAccessed : 2016-04-10 11:31:19\n```\n\n在某些 UNIX/Linux\
    \ 平台上，可以将系统配置为忽略访问时间的更新。这样做通常是为了提高性能。在这种情况下，`fileatime()` 函数作用不大。\n\n您也可以使用 `stat()`\
    \ 函数通过一次函数调用获取类似的数据。\n\n```php\n<?php\n// 7_12.php\ndate_default_timezone_set(\"\
