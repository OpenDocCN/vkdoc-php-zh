- fmt: '`// split into an array of words`

    ```

    $words = explode('' '', $words);

    ```

    `// extract the first nine array elements`

    ```

    $first_line = array_slice($words, 0, 9);

    ```

    `// join the first nine elements and display`

    ```

    echo implode('' '', $first_line);

    ```


    This stores the contents of `sonnet.txt` in a variable called `$sonnet`, which
    is passed to `str_replace()`, which then replaces the carriage return and newline
    characters with a space and stores the result as `$words`.


    **Note**


    See “Using escape sequences inside double quotes” in [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html)
    for an explanation of `"\r\n"`). The text file was created in Windows, so line
    breaks are represented by a carriage return and newline character. Files created
    on Mac OS X and Linux use only a newline character (`"\n"`).


    Then `$words` is passed to the `explode()` function. This alarmingly named function
    “blows apart” a string and converts it into an array, using the first argument
    to determine where to break the string. In this case a space is used, so the contents
    of the text file are split into an array of words.


    The array of words is then passed to the `array_slice()` function, which takes
    a slice out of an array starting from the position specified in the second argument.
    The third argument specifies the length of the slice. PHP counts arrays from 0,
    so this extracts the first nine words.


    Finally, `implode()` does the opposite of `explode()`, joining the elements of
    an array and inserting the first argument between each one. The result is displayed
    by `echo`, producing the following outcome:


    ![A978-1-4842-0635-5_7_Figc_HTML.jpg](A978-1-4842-0635-5_7_Figc_HTML.jpg)


    Instead of displaying the entire contents of the file, the script now displays
    only the first line. The full string is still stored in `$sonnet`.


    However, if you want to process each line individually, it’s simpler to use `file()`,
    which reads each line of a file into an array. To display the first line of `sonnet.txt`,
    the previous code can be simplified to this (see `get_contents_05.php`):


    ```

    $sonnet = file(''C:/private/sonnet.txt'');

    echo $sonnet[0];

    ```


    In fact, if you don’t need the full array, you can access a single line directly
    by adding its index number in square brackets after the call to the `file()` function.
    The following code displays the eleventh line of the sonnet (see `get_contents_06.php`):


    ```

    echo file(''C:/private/sonnet.txt'')[10];

    ```


    ![A978-1-4842-0635-5_7_Figd_HTML.jpg](A978-1-4842-0635-5_7_Figd_HTML.jpg)


    **Note**


    Directly accessing an array element that’s the result of a function like this
    is a technique known as “array dereferencing.” It was introduced in PHP 5.4. The
    code in `get_contents_06.php` won’t work in older versions of PHP.


    Of the three functions we’ve just explored, `readfile()` is probably the least
    useful. It simply reads the contents of a file and dumps it directly into the
    output. You can’t manipulate the file content or extract information from it.
    However, a practical use of `readfile()` is to force a file to be downloaded,
    as you’ll see later in this chapter.


    The other two functions, `file_get_contents()` and `file()`, are more useful because
    you can capture the contents in a variable that is ready for reformatting or extracting
    information. The only difference is that `file_get_contents()` reads the contents
    into a single string, whereas `file()` generates an array in which each element
    corresponds to a line in the file.


    **Tip**


    The `file()` function preserves newline characters at the end of each array element.
    If you want to strip the newline characters, pass the constant `FILE_IGNORE_NEW_LINES`
    as the second argument to the function. You can also skip empty lines by using
    `FILE_SKIP_EMPTY_LINES` as the second argument. To remove newline characters and
    skip empty lines, separate the two constants with a vertical pipe, like this:
    `FILE_IGNORE_NEW_LINES | FILE_SKIP_EMPTY_LINES`.


    Although we’ve tested `file_get_contents()` and `file()` only with a local text
    file, they can also retrieve the contents from public files on other domains.
    This makes them very useful for accessing information on other webpages, although
    extracting the information usually requires a solid understanding of string functions
    and the Document Object Model (DOM).


    The disadvantage of `file_get_contents()` and `file()` is that they read the whole
    file into memory. With very large files, it’s preferable to use functions that
    process only a part of a file at a time. We’ll look at those next.'
