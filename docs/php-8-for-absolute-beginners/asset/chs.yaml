  \ 程序以提出多个问题。调整 `indexnewquiz.php` 程序以显示所有问题的答案。\n\n### `$_POST` 是一个数组\n\n我们曾说过 `$_GET`\
  \ 是一个超全局数组。`$_POST` 是另一个超全局数组。但数组到底是什么呢？基本上，一个*数组*可以容纳多个项目。每个项目都存储在一个索引下。在 PHP 中，索引可以是数字，也可以是字符串。具有字符串索引的数组被称为*关联数组*。`$_POST`\
  \ 和 `$_GET` 创建关联数组来保存从一个程序传递到另一个程序的值。当我们检索值时，我们实际上是在访问 PHP 在内存中创建的关联数组。\n\n我们可以创建自己的关联数组。让我们看一个例子。\n\
  \n```\n代码清单 3-15\ntestAssocArray.php\n```\n\n如果我们在浏览器中运行这个程序，我们会看到“My name is Thomas.”。在这个例子中，`$my`\
  \ 是一个关联数组。我们可以看到它保存了一个存储在同一个名称（`$my`）下但具有不同索引（`name`、`year-of-birth`、`height`）的数据集合。为了从数组中检索数据，我们必须使用带索引的数组名。“Thomas”存储在数组\
  \ `$my` 的 `['name']` 索引下。PHP 允许在同一数组中存储不同类型的数据。在我们的例子中，存储了两个字符串和一个整数。请记住，PHP 通常在存储第一个值时确定数据类型。因此，数据类型实际上是在数组初始创建之后才确定的。在许多其他编程语言中，数组仅限于一种数据类型，并且必须在创建数组时声明该类型。\n\
  \n检查数组中的所有项通常很方便。PHP 有一个专门用于此的函数。它叫做 `print_r()`。这里有一种使用它的方法。\n\n```\n\";\n$out\
  \ .=print_r($my, true);\n$out .= \"\";\necho $out;\n```\n\n**代码清单 3-16** printAssocArray.php\n\
  \n如果我们运行这段代码，我们会看到 `$my` 的每个索引及其对应的值。\n\n![图 3-13 printAssocArray.php 的输出](img/323857_3_En_3_Fig13_HTML.jpg)\n\
  \n此窗口表示输出关联数组的代码是如何编写的。\n\n**图 3-13** printAssocArray.php 的输出\n\n数组非常有用，因为它们允许我们将项目分组在一起。`$_GET`\
