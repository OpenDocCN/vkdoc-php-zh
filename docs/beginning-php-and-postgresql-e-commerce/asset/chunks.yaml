    Implementing the Business Tier


    The business tier consists of a new class named Orders, whose methods call their
    data tier counterparts. This class is pretty straightforward with no particularly
    complex logic, so we’ll just list the code. Create the business/orders.php file,
    and add the following code to it:


    <?php


    // Business tier class for the orders


    class Orders


    {


    public static $mOrderStatusOptions = array (''placed'', // 0


    ''verified'', // 1


    ''completed'', // 2


    ''canceled''); // 3


    // Get the most recent $how_many orders


    public static function GetMostRecentOrders($how_many)


    {


    // Build the SQL query


    $sql = ''SELECT * FROM orders_get_most_recent_orders(:how_many);'';


    // Build the parameters array


    $params = array ('':how_many'' => $how_many);


    // Prepare the statement with PDO-specific functionality $result = DatabaseHandler::Prepare($sql);


    // Execute the query and return the results


    return DatabaseHandler::GetAll($result, $params);


    }


