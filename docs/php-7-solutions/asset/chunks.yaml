  trans: '

    ### 编辑 `php.ini`


    PHP 配置文件 `php.ini` 是一个非常长的文件，这常常会让编程新手感到不安，但完全不必担心。该文件以纯文本编写，其长度较长的一个原因是其中包含大量用于解释各种选项的注释。话虽如此，在编辑
    `php.ini` 之前最好先备份一份，以防操作失误。


    打开 `php.ini` 的方式取决于你的操作系统以及安装 PHP 的方式：


    - 如果你在 Windows 上使用了集成安装包（如 XAMPP），请在 Windows 资源管理器中双击 `php.ini`。该文件会自动在记事本中打开。

    - 如果你使用 Microsoft Web PI 安装了 PHP，`php.ini` 通常位于 Program Files 的子文件夹中。虽然你可以双击打开
    `php.ini`，但将无法保存任何修改。此时，请右键单击记事本，选择“以管理员身份运行”。在记事本中，选择“文件”➤“打开”，并将选项设置为显示所有文件（`*.*`）。导航到
    `php.ini` 所在的文件夹，选中该文件，然后点击“打开”。

    - 在 macOS 上，请使用纯文本编辑器打开 `php.ini`。如果使用 TextEdit，请确保它以纯文本格式（而非富文本格式）保存文件。


    以分号（`;`）开头的行是注释。你需要编辑的行不以分号开头。


    使用文本编辑器的“查找”功能，定位到需要按照表 2-1 建议进行修改的指令。大多数指令前面都有一个或多个如何设置它们的示例。确保不要误编辑某个带注释的示例。


    对于使用 `On` 或 `Off` 的指令，只需将值更改为建议值即可。例如，如果你需要开启错误信息的显示，请编辑如下行：


    ```

    display_errors = Off

    ```


    将其修改为：


    ```

    display_errors = On

    ```


    要设置错误报告级别，你需要使用 PHP 常量，这些常量以大写字母书写且**区分大小写**。该指令应如下所示：


    ```

    error_reporting = E_ALL

    ```


    编辑 `php.ini` 后，保存文件，然后重启 Apache 或 IIS 以使更改生效。如果 Web 服务器无法启动，请检查服务器的错误日志文件。该文件可在以下位置找到：


    - **XAMPP**：在 XAMPP 控制面板中，点击 Apache 旁边的“日志”按钮，然后选择 Apache (error.log)。

    - **MAMP**：在 `/Applications/MAMP/logs` 中，双击 `apache_error.log` 以在控制台应用中打开。

    - **WampServer**：在 WampServer 菜单中，选择 Apache ➤ Apache 错误日志。

    - **EasyPHP**：右键单击系统托盘中的 EasyPHP 图标，选择“日志文件”➤ Apache。

    - **IIS**：日志文件的默认位置是 `C:\inetpub\logs`。


    错误日志中的最新条目会提示你是什么原因阻止了服务器重启。利用该信息来修正你对 `php.ini` 所做的更改。如果这样仍不起作用，那就庆幸自己在编辑前备份了
    `php.ini` 吧。使用一份干净的备份从头开始，并仔细检查你的编辑内容。


    ## 接下来做什么？


    现在你已经拥有了一个可用的 PHP 测试环境，想必已经迫不及待想要开始工作了。我最不愿做的就是打击任何人的热情，但在将 PHP 用于正式网站之前，你应当对这门语言的基本规则有所了解。因此，在深入那些酷炫的功能之前，请阅读下一章，其中解释了如何编写
    PHP 脚本。即使你已经接触过 PHP，也请不要跳过这一章——它真的非常重要。


    # 3. 如何编写 PHP 脚本


    本章快速概述了 PHP 的工作方式，并为你提供了基本规则。它主要面向没有 PHP 或编程经验的读者。即使你之前用过 PHP，也请浏览一下本章的主要标题，了解其内容，并就任何你不太清楚的方面巩固一下知识。


    本章涵盖以下内容：

    - 理解 PHP 的结构

    - 在网页中嵌入 PHP

    - 在变量和数组中存储数据

    - 让 PHP 做出判断

    - 循环执行重复任务

    - 使用函数完成预设任务

    - 显示 PHP 输出

    - 理解 PHP 错误信息


    ## PHP：全景概览


    乍看之下，PHP 代码可能看起来相当复杂，但一旦你理解了基础，你就会发现其结构非常简单。如果你使用过任何其他计算机语言（如 JavaScript 或 jQuery），你将会发现它们有很多共同之处。


    每个 PHP 页面*必须*包含以下内容：

    - 正确的文件扩展名，通常为 `.php`

    - 包围每段 PHP 代码的 PHP 标记（如果文件仅包含 PHP 代码，则结束标记可省略）


    一个典型的 PHP 页面会使用以下部分或全部元素：

    - 变量，用作未知或变化值的占位符

    - 数组，用于保存多个值

    - 条件语句，用于做出决策

    - 循环，用于执行重复任务

    - 函数或对象，用于执行预设任务


    让我们逐一快速浏览这些元素，从文件名和开始/结束标记开始。

