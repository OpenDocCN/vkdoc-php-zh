  \ |\n\n### 9.14 SPL - 标准 PHP 库\n\n在本章的开头，我们讨论了 PHP 一些明显的性能问题，其原因在于为了向用户提供易用且多功能的数据结构和函数所必需的额外开销。如果你发现这些开销开始限制脚本的运行，一个可以考虑的方案是使用\
  \ SPL，这是一个核心的 PHP 扩展，包含了常见及特殊的数据结构和函数。它们旨在解决常见的编程问题，尽管与普通的 PHP 数组类型等更常见的结构相比，使用它们需要更多的思考。\n\
  \n因此，举例来说，如果你发现大型数据数组导致脚本触及内存限制，你可能需要查看 `SplFixedArray` 类。它有一些限制（只能使用整数作为索引，数组长度固定），但能提供更快速的实现且比普通数组占用更少内存。PHP\
  \ 文档相当全面。如果你对某些数据结构（如堆、链表等）不熟悉，那么大多数计算机科学（或传统语言编程）的基础入门资料都能帮助你。\n\n| ![信息](img/image00248.jpeg)\
  \ | **延伸阅读**PHP SPL 文档 [`www.php.net/manual/en/book.spl.php`](http://www.php.net/manual/en/book.spl.php)演示文稿“SPL\
  \ 简介”。快速概述 SPL。\n[`www.slideshare.net/ctankersley/intro-to-the-php-spl`](http://www.slideshare.net/ctankersley/intro-to-the-php-spl)\
  \ |\n\n### 9.15 垃圾回收\n\n在每种编程语言中，创建变量、数组和其他资源都会占用计算机的部分内存。当这些内存被占用时，它便无法供你的软件或任何其他软件使用。当你不再需要这些内存时，就需要释放它，以便能够再次使用。当内存没有被释放（通常是意外情况）时，我们就会遇到所谓的“内存泄漏”，即可用内存会逐渐（或在某些情况下快速！）被未使用的数据或“垃圾”填满。在像\
  \ C 这样的底层语言中，程序员需要自己负责内存管理，例如为变量分配内存，并在使用完毕后释放它。在像 PHP 这样的高级语言中，内存管理由系统自动完成，未使用的内存会自动归还到可用内存池中。\n\
  \n在 PHP 中，有几种机制用于实现这一点。最基本的是，当程序结束时，所有分配的内存都会被释放。其次，在特定作用域内创建的资源，当退出该作用域时，这些资源会被取消设置，从而自动释放其内存。例如，在函数内部声明的变量（而非全局作用域）会在函数结束时消失（除非使用了\
  \ `static` 或类似关键字），其内存也会被释放。\n\n最后，PHP 通过“引用计数”来追踪值。例如，当你创建一个变量或数组时，PHP 会在内存中创建一个容器来保存该变量的值，并启动一个计数器来记录有多少个东西正在使用这个值。当你引用该变量时（例如将其赋值给另一个变量），PHP\
  \ 会增加计数器，以便知道谁在使用它。一旦没有变量使用它，计数器降至 0，PHP 就知道可以安全地移除该容器并释放内存。\n\n然而，引用计数并非完美无缺，特别是在出现循环引用时（例如，子对象包含对父对象的引用，反之亦然），即使资源不再使用，引用仍可能存在。在这种情况下，它们不会被自动释放，从而导致内存泄漏。为了解决这个问题，PHP\
  \ 提供了自动垃圾回收机制，也称为循环回收。PHP 会定期检查所有已知信息，寻找这类未被释放的未使用内存，然后将其释放。当前的算法比之前的算法有效得多，从 PHP\
  \ 5.3 版本开始可用。关于引用计数和循环回收的更详细描述可以在 PHP 手册中找到：\n\n| ![信息](img/image00248.jpeg) | **延伸阅读**PHP\
  \ 手册中的垃圾回收 [`www.php.net/manual/en/features.gc.php`](http://www.php.net/manual/en/features.gc.php)\
  \ |\n\n理论上这很棒，它可以防止内存泄漏，并避免程序员进行过多的内存管理。然而，在某些应用中，它也有缺点。PHP 会保留一个当前已创建值的“缓冲区”，每当此缓冲区的大小达到\
  \ 10,000 时，就会触发垃圾回收。如果你的程序恰好在那时执行对时间特别敏感的操作，那也只能等待垃圾回收完成。对于短期的 Web 脚本来说，这通常不是问题，但对于长时间运行的基于\
  \ CLI 的脚本来说，绝对可能成为问题，因为它们可能会频繁且反复地达到 10,000 的限制并启动回收周期。话虽如此，对于许多应用来说，这种速度减慢可能并不明显或不成问题，而自动内存管理的优势可能超过其劣势。\n\
  \n\n\nPHP 允许我们在需要时自行管理垃圾回收，可以按需开启或关闭它。与任何其他性能问题一样，很难预先估算这对特定脚本的好处，因此建议在禁用和启用垃圾回收的情况下，对软件（或其高性能部分）进行性能分析和基准测试。\n\
  \n要关闭垃圾回收，只需调用 `gc_disable()` 函数。当准备重新开启时，使用 `gc_enable()` 函数。如果你想在合适的时间手动运行一次垃圾回收周期，可以使用\
  \ `gc_collect_cycles()` 函数，该函数将启动一次性的垃圾回收。\n\n**注意**：当你调用 `gc_collect_cycles()`\
  \ 或使用 `gc_enable()` 重新开启自动回收时，为了确保正确回收，PHP 会在后台持续维护并更新一个最多包含 10,000 个值的缓冲区。这个缓冲区大小是固定的，因此如果关闭垃圾回收太久，较旧的值会被挤出缓冲区。其中一些值可能是垃圾回收旨在释放的问题变量，即使你之后重新开启了垃圾回收，也可能无意中引入内存泄漏。因此，请谨慎使用这些函数。\n\
  \n### 多线程与 PHP 并发编程\n\n多线程是在一个进程内使用并发编程的“线程”，允许一个程序同时执行多件事情。多线程通常用于提升适合并发处理的任务（即，流程中的一个步骤不依赖于另一个步骤的完成）的性能。PHP\
  \ 在设计之初并不具备多线程能力，也没有原生支持并发处理或利用多处理器/多核的设施。在过去，这并非大问题，Web 开发很少需要多线程带来的性能提升，并且 Web\
  \ 服务器可以启动多个 PHP 实例来防止 AJAX 类型应用中的接口阻塞。典型的 CLI 脚本通常也不需要，它们往往是规模较小或批处理类型的应用。然而，随着\
  \ PHP 开发的应用规模越来越大，以及 Web 服务器管理员希望从现有硬件中获得更高的资源利用率，缺乏多线程或其他并行处理方法正逐渐成为 PHP 社区中一个更突出的问题。事实上，这已经成为\
  \ PHP 批评者经常抓住不放的一个大“问题”。随着摩尔定律开始失效（取决于你与谁讨论），性能提升通常更多地来自多核和多处理器架构，而在这些架构中，多线程和并行编程将变得越来越重要。\n\
  \n多线程的话题在 PHP 社区内颇具争议。一些人认为，要使 PHP 被“认真”视为通用编程语言，就必须支持多线程；而另一些人则认为，多线程在 PHP 的核心领域（Web\
  \ 接口）中用处不大，并且会给语言增加额外的复杂性，而 PHP 的原则是尽可能保持简单直接。诚然，即使 PHP 以其备受喜爱的简单易懂的接口添加了线程支持，这也仅仅是个开始。无论语法如何，线程编程都是一个相当高级的学科，它比\
  \ PHP 程序员通常要处理的更深入地探究了代码相互依赖性和结构的复杂性。在任何情况下，利用多处理器和多核的最佳方式就是多线程，这一论点也并非定论。下面来自 IBM\
  \ 的文章概述了当前关于多线程与多进程编程的一些思考，而这篇文章最终支持了多进程的一方。\n\n| ![信息](img/image00248.jpeg) | **扩展阅读**“为什么线程化的应用并行性在多核时代被超越”\
  \ by Vasudevan Thiyagarajan [`www.ibm.com/developerworks/java/library/j-nothreads/index.html?ca=drs-`](http://www.ibm.com/developerworks/java/library/j-nothreads/index.html?ca=drs-)\
  \ |\n\n两种并发方式各有利弊。例如，线程的开销更少，通信更容易；而多进程编程则更容易实现任务的隔离，共享状态也最少。无论争论如何，PHP 目前不支持线程，并且当前\
  \ 5.x 或 7.x 系列的发布路线图上也没有相关规划。由于 PHP 核心开发社区目前缺乏进行此类重大改革的意愿，这些开发成果最快可能也要数年之后。即便如此，成功实现线程化也并非易事。Python\
  \ 程序员经常抱怨其语言中线程的实现方式和性能特征（或性能不佳），导致一些人即使有线程可用，也默认选择多进程编程。因此，目前如果我们想进行并发或并行处理，必须在没有线程的情况下完成。幸运的是，有几种方法可以在\
  \ PHP 内部或周边解决这个问题，最佳方法取决于你想要达成的目标。\n\n最常见的方法是创建和控制新的 PHP 进程。使用此方法，当你的 PHP 脚本需要执行并发编程时，它可以启动多个副本作为独立的进程（或多次派生自身成为新进程），将数据传递给其他脚本，并等待它们运行结束。请参阅第\
  \ 6 章和第 7 章，了解关于进程派生和进程间通信的详细信息。多进程编程在某些方面比多线程编程更简单，通常无需担心共享状态（例如，意外覆盖其他线程正在使用的变量/数据/内存）。但是，你仍然需要考虑如何处理进程间的交互、如何处理另一个脚本中的故障（例如，如果用户、系统或错误杀死了你的一个工作脚本，你该怎么办）以及如何管理/监控系统资源。\n\
  \n除了自行管理进程控制外，另一种方法是使用任务分发与管理系统来替你管理。像 Gearman（在第 6 章中讨论）这样的系统会接收你的任务并将其分配给工作脚本，管理从启动脚本到传递任务信息以及监控脚本和系统资源的整个过程。但在某些情况下，这类系统也有一些缺点。你需要部署和支持额外的软件（例如\
  \ Gearman 软件），并且定时、错误处理和资源管理的选项可能无法完全满足你脚本的需求。然而，对于许多情况，它消除了多进程软件所需的大量编程开销，从而有助于加速开发（同时避免了重复造轮子）。\n\
  \n如果你的性能问题源于处理非常大量的数据（这通常是线程或并发处理可以改善的任务），请参考下文“PHP 与大数据”部分，那里介绍了一个可能对你有帮助的工具。\n\
  \n\n\n### 9.17 大数据与 PHP——MapReduce\n\n2004 年，谷歌发布了一篇关于 MapReduce 的开创性论文，向外界打开了他们“大数据”处理世界的一扇窗。MapReduce\
  \ 是谷歌用于处理其搜索引擎所需网络规模数据的编程模型。尽管有报道称谷歌现已不再使用 MapReduce，但对于我们其他人来说，它目前仍被视为最先进的技术。一个名为\
  \ Hadoop 的流行开源实现，将允许你通过 PHP 脚本来运行 MapReduce。\n\n在继续之前，我们先明确一下什么是*大*数据。Hadoop 和其他\
  \ MapReduce 算法在工作方式上存在固有的开销。这意味着，数据集越大，它们才开始产生效益（至少是性能方面的效益）。具体效果取决于你想要应用于数据的算法以及可用的替代方法，但通常你的数据集需要达到\
  \ GB 级别，才能开始看到明显的性能提升，而要使其优势超过在任务中实施 MapReduce 所需付出的工程努力，数据集则需要更大。\n\n如果你的数据符合这种对“大数据”的特定定义，那么你就可以利用\
  \ PHP 来驾驭 Hadoop 的强大功能。虽然 Hadoop 是用 Java 编写的，但在编写驱动数据处理的 map 和 reduce 任务时，它是与语言无关的。它还使用标准流（STDIN\
  \ 及其相关流）进行数据交换，正如我们在前面章节中看到的，PHP 原生就能轻松处理这些流。甚至还有一个 PHP 框架可以帮助编写这些 map 和 reduce\
  \ 任务。\n\n如果你认为自己的数据集符合“大数据”的条件，以下链接将带你踏上用 PHP 处理大数据的道路。\n\n| ![信息图标](img/image00248.jpeg)\
  \ | **延伸阅读**“MapReduce: Simplified Data Processing on Large Clusters” - 谷歌原创论文 [`research.google.com/archive/mapreduce.html`](http://research.google.com/archive/mapreduce.html)“什么是\
  \ MapReduce” - 对 MapReduce 的非常简单的解释\n[`www-01.ibm.com/software/data/infosphere/hadoop/mapreduce/`](http://www-01.ibm.com/software/data/infosphere/hadoop/mapreduce/)Jason\
  \ Graves 的入门教程“使用 Hadoop 和 PHP”\n[`collaboradev.com/2010/12/10/using-hadoop-and-php/`](http://collaboradev.com/2010/12/10/using-hadoop-and-php/)HadooPHP\
  \ - PHP Hadoop 框架\n[`github.com/dzuelke/HadooPHP`](https://github.com/dzuelke/HadooPHP)David\
  \ Zuelke 的演讲“大数据分析（使用 Hadoop 和 PHP）”\n[`speakerdeck.com/dzuelke/big-data-analytics-with-hadoop-and-php-dpc2013-2013-06-06`](https://speakerdeck.com/dzuelke/big-data-analytics-with-hadoop-and-php-dpc2013-2013-06-06)维基百科上对\
  \ MapReduce 的批评\n[`en.wikipedia.org/wiki/MapReduce#Criticism`](http://en.wikipedia.org/wiki/MapReduce#Criticism)\
  \ |\n\n### 9.18 数据缓存\n\n在本章（以及其他章节）的多个地方，我们提到，在可能的情况下缓存数据通常是一种良好的实践。对于初学者来说，这仅仅意味着，当我们生成一些以后可能再次使用的数据（无论是脚本中使用的变量，还是文本或其他程序输出）时，我们不会每次都重新生成它们，而是将它们存储在某处，直到再次需要。\n\
  \n应该很清楚如何做到这一点，你可能已经熟悉了创建变量、将文件写入磁盘或数据库等操作。然而，虽然缓存数据可以加速程序运行，但它也可能带来一系列问题，例如何时删除缓存数据（缓存失效）、当磁盘空间或内存不足时如何处理缓存优先级、如何在进程甚至机器之间共享缓存数据，以及其他你（和我）可能都没想到的事情。\n\
