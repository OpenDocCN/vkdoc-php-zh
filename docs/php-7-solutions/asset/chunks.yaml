    \n在开发本章代码时，我最初将密码检查器设计为一个函数。函数内部的代码基本相同，但我决定将其转换为一个类，以使其更灵活且更易于使用。这个函数的问题在于它需要大量参数来设置不同的选项，而且很难记住参数顺序。此外，处理结果也很困难。如果没有错误，函数返回`true`；但如果发现任何错误，它会返回错误消息数组。由于\
