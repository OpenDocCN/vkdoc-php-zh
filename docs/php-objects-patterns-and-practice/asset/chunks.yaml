- fmt: '### Examining Methods


    Just as `ReflectionClass` is used to examine a class, a `ReflectionMethod` object
    examines a method.


    You can acquire a `ReflectionMethod` in two ways. First, you can get an array
    of `ReflectionMethod` objects from `ReflectionClass::getMethods()`. Second, if
    you need to work with a specific method, `ReflectionClass::getMethod()` accepts
    a method name and returns the relevant `ReflectionMethod` object.


    Here, we use `ReflectionClass::getMethods()` to put the `ReflectionMethod` class
    through its paces:


    ```

    // listing 05.40

    $prodclass = new \ReflectionClass(''popp\\ch04\\batch02\\CdProduct'');

    $methods = $prodclass->getMethods();

    foreach ($methods as $method) {

    print ClassInfo::methodData($method);

    print "\n----\n";

    }

    // listing 05.41

    // class ClassInfo

    public static function methodData(\ReflectionMethod $method)

    {

    $details = "";

    $name = $method->getName();

    if ($method->isUserDefined()) {

    $details .= "$name is user defined\n";

    }

    if ($method->isInternal()) {

    $details .= "$name is built-in\n";

    }

    if ($method->isAbstract()) {

    $details .= "$name is abstract\n";

    }

    if ($method->isPublic()) {

    $details .= "$name is public\n";

    }

    if ($method->isProtected()) {

    $details .= "$name is protected\n";

    }

    if ($method->isPrivate()) {

    $details .= "$name is private\n";

    }

    if ($method->isStatic()) {

    $details .= "$name is static\n";

    }

    if ($method->isFinal()) {

    $details .= "$name is final\n";

    }

    if ($method->isConstructor()) {

    $details .= "$name is the constructor\n";

    }

    if ($method->returnsReference()) {

    $details .= "$name returns a reference (as opposed to a value)\n";

    }

    return $details;

    }

    ```


    The code uses `ReflectionClass::getMethods()` to get an array of `ReflectionMethod`
    objects and then loops through the array, passing each object to `methodData()`.


    The names of the methods used in `methodData()` reflect their intent: the code
    checks whether the method is user-defined, built-in, abstract, public, protected,
    static, or final. You can also check whether the method is the constructor for
    its class and whether or not it returns a reference.


    There’s one caveat: `ReflectionMethod::returnsReference()` doesn’t return `true`
    if the tested method simply returns an object, even though objects are passed
    and assigned by reference in PHP 5. Instead, `ReflectionMethod::returnsReference()`
    returns `true` only if the method in question has been explicitly declared to
    return a reference (by placing an ampersand character in front of the method name).


    As you might expect, you can access a method’s source code using a technique similar
    to the one used previously with `ReflectionClass`:


    ```

    // listing 05.42

    // class ReflectionUtil

    public static function getMethodSource(\ReflectionMethod $method): string

    {

    $path  = $method->getFileName();

    $lines = @file($path);

    $from  = $method->getStartLine();

    $to    = $method->getEndLine();

    $len   = $to - $from + 1;

    return implode(array_slice($lines, $from - 1, $len));

    }

    // listing 05.43

    $class = new \ReflectionClass(''popp\\ch04\\batch02\\CdProduct'');

    $method = $class->getMethod(''getSummaryLine'');

    print ReflectionUtil::getMethodSource($method);

    ```


    Because `ReflectionMethod` provides us with `getFileName()`, `getStartLine()`,
    and `getEndLine()` methods, it’s a simple matter to extract the method’s source
    code.


    ### Examining Method Arguments


    Now that method signatures can constrain the types of object arguments, the ability
    to examine the arguments declared in a method signature becomes immensely useful.
    The Reflection API provides the `ReflectionParameter` class just for this purpose.
    To get a `ReflectionParameter` object, you need the help of a `ReflectionMethod`
    object. The `ReflectionMethod::getParameters()` method returns an array of `ReflectionParameter`
    objects.


    `ReflectionParameter` can tell you the name of an argument and whether the variable
    is passed by reference (that is, with a preceding ampersand in the method declaration).
    It can also tell you the class required by argument hinting and whether the method
    will accept a null value for the argument.


    Here are some of `ReflectionParameter`’s methods in action:


    ```

    // listing 05.44

    $class = new \ReflectionClass(''popp\\ch04\\batch02\\CdProduct'');

    $method = $class->getMethod("__construct");

    $params = $method->getParameters();

    foreach ($params as $param) {

    print ClassInfo::argData($param) . "\n";

    }

    // listing 05.45

    // class ClassInfo

    public function argData(\ReflectionParameter $arg)

    {

    $details = "";

    $declaringclass = $arg->getDeclaringClass();

    $name  = $arg->getName();

    $class = $arg->getClass();

    $position = $arg->getPosition();

    $details .= "\$$name has position $position\n";

    if (! empty($class)) {

    $classname = $class->getName();

    $details .= "\$$name must be a $classname object\n";

    }

    if ($arg->isPassedByReference()) {

    $details .= "\$$name is passed by reference\n";

    }

    if ($arg->isDefaultValueAvailable()) {

    $def = $arg->getDefaultValue();

    $details .= "\$$name has default: $def\n";

    }

    if ($arg->allowsNull()) {

    $details .= "\$$name can be null\n";

    }

    return $details;

    }

    ```


    Using the `ReflectionClass::getMethod()` method, the code acquires a `ReflectionMethod`
    object. It then uses `ReflectionMethod::getParameters()` to get an array of `ReflectionParameter`
    objects. The `argData()` function uses the `ReflectionParameter` object it was
    passed to acquire information about the argument.


    First, it gets the argument’s variable name with `ReflectionParameter::getName()`.
    The `ReflectionParameter::getClass()` method returns a `ReflectionClass` object
    if a hint’s been provided. The code checks whether the argument is a reference
    with `isPassedByReference()`; and finally, it looks for the availability of a
    default value, which it then adds to the return string.'
