  ; Default Value: None

  ; Development Value: "GP"

  ; Production Value: "GP"


  ; session.gc_divisor

  ; Default Value: 100

  ; Development Value: 1000

  ; Production Value: 1000


  ; session.hash_bits_per_character

  ; Default Value: 4

  ; Development Value: 5

  ; Production Value: 5


  CHAPTER 1 ■ INSTALLATION AND CONFIGURATION


  ; short_open_tag

  ; Default Value: On

  ; Development Value: Off

  ; Production Value: Off


  ; track_errors

  ; Default Value: Off

