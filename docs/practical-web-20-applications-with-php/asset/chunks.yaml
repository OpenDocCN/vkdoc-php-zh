    ■INTRODUCTION


    **How This Book Is Structured**


    We will start the book by determining which features to implement in our web application
    and then implement each one as we progress through the book. Each chapter will
    add a new set of features to the application, until reaching the final chapter
    where we look at strategies for deploying the application.


    The specific type of application we develop in this book (a multiuser blogging
    system) is not particularly important; rather, it is used simply as a tool to
    show you the process of developing a web application. Each chapter is specifically
    designed to demonstrate particular aspects of development that may arise regardless
    of the type of application:


    • **Chapter 1, Application Planning and Design.** We begin the book by looking
    at what defines Web 2.0, as well as looking briefly at the features that will
    be implemented in the application. Additionally, this chapter covers various aspects
    of the web development life cycle that should be considered when planning and
    implementing web applications.


    • **Chapter 2, Setting Up the Application Framework.** In this chapter, we begin
    to implement the web application. This process begins by correctly setting up
    the environment (that is, installing the correct web server software) and then
    by creating the initial file structure of the site. In addition to connecting
    to the database with PHP, we will handle user requests with the Zend Framework
    and manage HTML code using the Smarty Template Engine.


    • **Chapter 3, User Authentication, Authorization, and Management.** This chapter
    gives the first look at using a database. We look at how to easily manage database
    data when we implement the user system. Additionally, we look at how a role-based
    permissions system works and then implement it into the application.


    • **Chapter 4, User Registration, Login, and Logout.** Continuing from Chapter
    3, this chapter shows how to implement a user registration system. Since this
    is the first time the book deals with user-submitted data, this chapter looks
    at how to correctly deal with such data when we create the registration and login
    forms.


    • **Chapter 5, Introduction to Prototype and Scriptaculous.** Since we make heavy
    use of JavaScript and Ajax in later chapters, we move away from the main application
    in this chapter while we explore two of the most useful JavaScript libraries available.
    Prototype helps programmers develop easily maintainable cross-platform JavaScript
    code, while Scriptaculous simplifies the process of adding appealing visual effects
    to web pages.


    • **Chapter 6, Styling the Web Application.** In this chapter, we step back slightly
    from the web application in that we focus more on the user experience rather than
    on the main application features. We first look at implementing various navigational
    items (which also gives us a first taste of developing custom Smarty plug-ins),
    and we then complete the chapter by implementing a simple and clean web design
    into the application.


