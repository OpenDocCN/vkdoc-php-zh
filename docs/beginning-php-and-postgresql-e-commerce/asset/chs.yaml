  \n## 步骤 7：测试网站\n\n在浏览器中加载你的网站，并选择一个部门，确保一切按预期工作。\n\n## 工作原理：部门组件化模板\n\n既然最重要的功能已经在数据层和业务层实现，那么实现可视化部分就变得很简单了。\n\
  \n在添加 CSS 样式并创建空白模板文件后，你创建了 Smarty 模板文件 `department.tpl`，其中包含用于显示部门数据的 HTML 布局。该模板文件被加载到\
