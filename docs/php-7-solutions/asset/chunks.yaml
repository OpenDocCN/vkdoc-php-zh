    \ dimensions. The value set in the `$maxSize` property\ndetermines the width or\
    \ height, depending on which is larger. To avoid\ndistorting the thumbnail, you\
    \ need to calculate the scaling ratio for\nthe shorter dimension. The ratio is\
    \ calculated by dividing the maximum\nthumbnail size by the larger dimension of\
    \ the original image.\n\nFor example, the original image of the Golden Pavilion\
    \ (`kinkakuji.jpg`) is 270\n× 346 pixels. If the maximum size is set at 120, dividing\
    \ 120 by 346\nproduces a scaling ratio of 0.3468\\. Multiplying the width of the\n\
    original image by this ratio fixes the thumbnail’s width at 94 pixels\n(rounded\
    \ up to the nearest whole number), maintaining the correct\nproportions. Figure\
    \ [10-3](#332054_4_En_10_Chapter.xhtml#Fig3) shows how the\nscaling ratio works.\n\
    \n![../images/332054_4_En_10_Chapter/332054_4_En_10_Fig3_HTML.jpg](images/332054_4_En_10_Chapter/332054_4_En_10_Fig3_HTML.jpg)\n\
    \nFigure 10-3.\nWorking out the scaling ratio for a thumbnail image\n\nContinue\
    \ working with your existing class definition. Alternatively, use\n`Thumbnail_02.php`\
    \ in\nthe `ch10/PhpSolutions/Image`\nfolder.\n\n![../images/332054_4_En_10_Chapter/332054_4_En_10_Fig4_HTML.jpg](images/332054_4_En_10_Chapter/332054_4_En_10_Fig4_HTML.jpg)\n\
    \nFigure 10-4.\nThe class is now generating all the values needed to create the\n\
    thumbnail image\n\n1.  Calculating the thumbnail dimensions doesn’t require any\
    \ further user\n    input, so it can be handled by a protected method. Add the\
    \ following\n    code to the class definition.\n\n```\n    protected function\
    \ calculateRatio($width, $height, $maxSize) {\n    if ($width  $height) {\n  \
    \  return $maxSize/$width;\n    } else {\n    return $maxSize/$height;\n    }\n\
    \    }\n    ```\n\nThe dimensions of the original image and the maximum size are\
    \ stored\n    as properties of the `Thumbnail` object, so,\n    instead of passing\
    \ them as arguments, you could refer to them inside the\n    method as `$this->originalwidth`,\n\
    \    `$this->originalheight`,\n    and `$this->maxSize`.\n    However, using parameters\
    \ like this (a technique known as dependency\n    injection) makes the code more\
    \ generic, so it could be used\n    elsewhere.\n\nThe conditional statement begins\
    \ by checking if the width and height\n    of the original image are less than\
    \ or equal to the maximum size. If\n    they are, the image doesn’t need to be\
    \ resized, so the method returns a\n    scaling ratio of 1.\n\nThe `elseif`\n\
    \    block checks if the width is greater than the height. If it is, the\n   \
    \ width is used to calculate the scaling ratio. The `else` block is invoked\n\
    \    if the height is greater or both sides are equal. In either case, the\n \
    \   height is used to calculate the scaling ratio.\n\n2.  To test the new method,\
    \ amend the `test()` method like\n    this:\n\n```\n    public function test()\
    \ {\n    $ratio = $this->calculateRatio($this->originalwidth, $this->originalheight,\n\
    \    $this->maxSize);\n    $thumbwidth = round($this->originalwidth * $ratio);\n\
    \    $thumbheight = round($this->originalheight * $ratio);\n    $details = \n\
    \    File: $this->original\n    Original width: $this->originalwidth\n    Original\
    \ height: $this->originalheight\n    Base name: $this->basename\n    Image type:\
    \ $this->imageType\n    Destination: $this->destination\n    Max size: $this->maxSize\n\
    \    Suffix: $this->suffix\n    Thumb width: $thumbwidth\n    Thumb height: $thumbheight\n\
    \nEND;\n    // Remove the indentation of the preceding line in messages) {\n \
    \   print_r($this->messages);\n    }\n    }\n    ```\n\nThis calls the new method,\
    \ passing the `$originalwidth`, `$originalheight`, and\n    `$maxSize`\n    properties\
    \ as arguments. The resulting scaling ratio is then used to\n    calculate the\
    \ width and height of the thumbnail. The calculation is\n    passed to the `round()`\
    \ function to\n    convert the result to the nearest integer. The calculations\
    \ will need to\n    be moved out of the `test()` method, but\n    it’s important\
    \ to check first that we’re getting the expected\n    results.\n\n3.  Test the\
    \ updated class by selecting an image in `create_thumb.php` and\n    clicking\
    \ `Create Thumbnail`. You should see the values displayed onscreen, as shown\n\
    \    in Figure [10-4](#332054_4_En_10_Chapter.xhtml#Fig4).\n\nIf necessary, check\
    \ your code against `Thumbnail_03.php` in\nthe `ch10`\nfolder.\n\nUsing GD functions\
    \ to create a Scaled Copy of\nan image"
  trans: "\n# 如果 `$suffix` 的第一个字符*不是*下划线，则条件为 `true`。这里使用 `strpos()` 函数查找第一个下划线的位置。如果第一个字符是下划线，`strpos()`\
    \ 返回的值是 0。然而，如果 `$suffix` 不包含下划线，`strpos()` 会返回 `false`。如第 4 章所述，PHP 将 `0` 视为\
    \ `false`，因此条件需要使用“不全等”运算符（两个等号）。所以，如果后缀不是以下划线开头，就添加一个下划线。否则，保留原始值。\n\n**注意事项**\
    \  \n不要混淆 `strpos()` 和 `strrpos()`。前者查找第一个匹配字符的位置。后者则是反向搜索字符串。\n\n1. 更新 `test()`\
    \ 方法，显示你刚为其创建了 setter 方法的属性值。修改后的代码如下：\n\n```\npublic function test() {\n    $details\
    \ = <<<END\n    文件：$this->original\n    原始宽度：$this->originalwidth\n    原始高度：$this->originalheight\n\
    \    基本名称：$this->basename\n    图片类型：$this->imageType\n    目标路径：$this->destination\n\
    \    最大尺寸：$this->maxSize\n    后缀：$this->suffix\nEND;\n    // 移除消息中上一行的缩进) {\n\
    \    print_r($this->messages);\n    }\n}\n```\n\n2. 通过在 `create_thumb.php` 中设置新参数来测试更新后的类，如下所示：\n\
    \n```\n$thumb = new Thumbnail($_POST['pix'], 'C:/upload_test/thumbs', 100, 'small');\n\
    $thumb->test();\n```\n\n将 `upload_test/thumbs` 的路径调整为与你自己的设置匹配。\n\n3. 保存两个页面，并从\
    \ `create_thumb.php` 的列表中选择一张图片。你应该会看到与图 10-2 相似的结果。\n\n![../images/332054_4_En_10_Chapter/332054_4_En_10_Fig2_HTML.jpg](img/332054_4_En_10_Fig2_HTML.jpg)\n\
    \n图 10-2. 验证默认值已更改\n\n4. 进行多次测试，包括从传递给 `setDestination()` 的值中省略尾部斜杠，或选择一个不存在的文件夹。同时为最大尺寸和后缀传递无效值。无效的目标文件夹会抛出异常，但其他情况会静默失败，对于最大尺寸使用默认值，对于后缀使用\
    \ `_thb`。\n\n如有必要，将你的代码与 `ch10/PhpSolutions/Image` 中的 `Thumbnail_02.php` 以及 `ch10`\
    \ 文件夹中的 `create_thumb_03.php` 进行对比。\n\n你可能不同意我对传递无效参数时静默失败的决策。不过，到现在为止，你应该已经具备了足够的条件语句经验，可以根据自己的需求调整代码。例如，如果你希望\
    \ `setMaxSize()` 方法抛出异常而不是静默失败，可以检查该值是否大于零并添加一个 `else` 块来处理错误。下面是修改 `setMaxSize()`\
    \ 方法的方式：\n\n```\nprotected function setMaxSize($size) {\n    if (is_numeric($size)\
    \ && $size > 0) {\n        $this->maxSize = $size;\n    } else {\n        throw\
    \ new \\Exception('传递给 setMaxSize() 的值必须为正数。');\n    }\n}\n```\n\n## PHP 解决方案\
    \ 10-3：计算缩略图的尺寸\n\n这个 PHP 解决方案向 `Thumbnail` 类添加了一个受保护的方法，用于计算缩略图的尺寸。`$maxSize`\
    \ 属性中设置的值决定了宽度或高度，具体取决于哪一边更大。为了避免缩略图失真，你需要计算较短边的缩放比例。该比例通过将最大缩略图尺寸除以原始图片的较大边来计算。\n\
    \n例如，金阁寺的原始图片（`kinkakuji.jpg`）尺寸为 270 × 346 像素。如果最大尺寸设置为 120，将 120 除以 346 会得到\
    \ 0.3468 的缩放比例。将原始图片的宽度乘以这个比例，可将缩略图的宽度固定为 94 像素（向上取整到最接近的整数），从而保持正确的比例。图 10-3\
    \ 展示了缩放比例的工作原理。\n\n![../images/332054_4_En_10_Chapter/332054_4_En_10_Fig3_HTML.jpg](img/332054_4_En_10_Fig3_HTML.jpg)\n\
    \n图 10-3. 计算缩略图的缩放比例\n\n继续使用你现有的类定义。或者使用 `ch10/PhpSolutions/Image` 文件夹中的 `Thumbnail_02.php`。\n\
    \n![../images/332054_4_En_10_Chapter/332054_4_En_10_Fig4_HTML.jpg](img/332054_4_En_10_Fig4_HTML.jpg)\n\
    \n图 10-4. 该类现在生成了创建缩略图所需的所有值\n\n1. 计算缩略图尺寸不需要任何额外的用户输入，因此可以由一个受保护的方法来处理。向类定义中添加以下代码。\n\
    \n```\nprotected function calculateRatio($width, $height, $maxSize) {\n    if\
    \ ($width <= $maxSize && $height <= $maxSize) {\n        return 1;\n    } elseif\
    \ ($width > $height) {\n        return $maxSize/$width;\n    } else {\n      \
    \  return $maxSize/$height;\n    }\n}\n```\n\n原始图片的尺寸和最大尺寸作为 `Thumbnail` 对象的属性存储，因此，你可以在方法内部通过\
    \ `$this->originalwidth`、`$this->originalheight` 和 `$this->maxSize` 来引用它们，而无需将它们作为参数传递。然而，像这样使用参数（一种称为依赖注入的技术）会使代码更具通用性，以便在其他地方使用。\n\
    \n条件语句首先检查原始图片的宽度和高度是否都小于或等于最大尺寸。如果是，则图片无需调整大小，因此该方法返回缩放比例 1。\n\n`elseif` 块检查宽度是否大于高度。如果是，则使用宽度来计算缩放比例。如果高度更大或两边相等，则调用\
    \ `else` 块。在这两种情况下，都使用高度来计算缩放比例。\n\n2. 要测试新方法，按如下方式修改 `test()` 方法：\n\n```\npublic\
    \ function test() {\n    $ratio = $this->calculateRatio($this->originalwidth,\
    \ $this->originalheight, $this->maxSize);\n    $thumbwidth = round($this->originalwidth\
    \ * $ratio);\n    $thumbheight = round($this->originalheight * $ratio);\n    $details\
    \ = <<<END\n    文件：$this->original\n    原始宽度：$this->originalwidth\n    原始高度：$this->originalheight\n\
    \    基本名称：$this->basename\n    图片类型：$this->imageType\n    目标路径：$this->destination\n\
    \    最大尺寸：$this->maxSize\n    后缀：$this->suffix\n    缩略图宽度：$thumbwidth\n    缩略图高度：$thumbheight\n\
    END;\n    // 移除消息中上一行的缩进) {\n    print_r($this->messages);\n    }\n}\n```\n\n\
    这会调用新方法，并将 `$originalwidth`、`$originalheight` 和 `$maxSize` 属性作为参数传递。然后使用计算出的缩放比例来计算缩略图的宽度和高度。计算结果会传递给\
    \ `round()` 函数，以转换为最接近的整数。这些计算将来需要移出 `test()` 方法，但首先检查我们是否得到了预期的结果很重要。\n\n3. 通过在\
    \ `create_thumb.php` 中选择一张图片并点击 `创建缩略图` 来测试更新后的类。你应该会看到屏幕上显示的值，如图 10-4 所示。\n\n\
    如有必要，将你的代码与 `ch10` 文件夹中的 `Thumbnail_03.php` 进行对比。\n\n## 使用 GD 函数创建图片的缩放副本\n"
- fmt: "After you have gathered all the necessary information, you can generate a\
    \ thumbnail image from a larger one. This involves creating image resources for\
    \ both the original image and the thumbnail. For the original image, you need\
    \ to use a function that matches the image’s MIME type. Each of the following\
    \ functions takes a single argument—the path to the file:\n\n- `imagecreatefromjpeg()`\n\
    - `imagecreatefrompng()`\n- `imagecreatefromgif()`\n- `imagecreatefromwebp()`\n\
    \nBecause the thumbnail doesn’t yet exist, you use a different function, `imagecreatetruecolor()`,\
    \ which takes two arguments—the width and height (in pixels).\n\nYet another function\
    \ creates a resized copy of an image: `imagecopyresampled()`. This takes no fewer\
    \ than ten arguments—all of them required. The arguments fall into five pairs,\
    \ as follows:\n\n- References to the two image resources—copy first, original\
    \ second\n- The `x` and `y` coordinates of where to position the top-left corner\
    \ of the copied image\n- The `x` and `y` coordinates of the top-left corner of\
    \ the original\n- The width and height of the copy\n- The width and height of\
    \ the area to copy from the original\n\nFigure [10-5](#332054_4_En_10_Chapter.xhtml#Fig5)\
    \ shows how the last four pairs of arguments can be used to extract a specific\
    \ area, using the following arguments to `imagecopyresampled()`:\n\n![../images/332054_4_En_10_Chapter/332054_4_En_10_Fig5_HTML.jpg](images/332054_4_En_10_Chapter/332054_4_En_10_Fig5_HTML.jpg)\n\
    \nFigure 10-5. The `imagecopyresampled()` function allows you to copy part of\
    \ an image\n\n```\nimagecopyresampled($thumb, $source, 0, 0, 170, 20, $thbwidth,$thbheight,\
    \ 170, 102);\n```\n\nThe `x` and `y` coordinates of the area to copy are measured\
    \ in pixels from the top left of the image. The `x` and `y` axes begin at 0 at\
    \ the top left and increase to the right and down. By setting the width and height\
    \ of the area to copy to 170 and 102, respectively, PHP extracts the area outlined\
    \ in white. So now you know how web sites manage to crop uploaded images. They\
    \ calculate the coordinates dynamically using JavaScript or some other technology.\
    \ For the `Thumbnail` class, you’ll use the whole of the original image to generate\
    \ the thumbnail.\n\nAfter creating the copy with `imagecopyresampled()`, you need\
    \ to save it, again using a function specific to the MIME type, namely:\n\n- `imagejpeg()`\n\
    - `imagepng()`\n- `imagegif()`\n- `imagewebp()`\n\nEach function takes as its\
    \ first two arguments the image resource and the path to where you want to save\
    \ it. The `imagejpeg()`, `imagepng()`, and `imagewebp()` functions take an optional\
    \ third argument to set the image quality. For `imagejpeg()` and `imagewebp()`,\
    \ you set the quality by specifying a number in the range of 0 (worst) to 100\
    \ (best). If you omit the argument, the default is 75 for `imagejpeg()` and 80\
    \ for `imagewebp()`. For `imagepng()`, the range is 0 to 9. Confusingly, 0 produces\
    \ the best quality (no compression).\n\nFinally, once you have saved the thumbnail,\
    \ you need to destroy the image resources by passing them to `imagedestroy()`.\
    \ In spite of its destructive name, this function has no effect on the original\
    \ image or the thumbnail. It simply frees the server memory by destroying the\
    \ image resources required during processing.\n\n## PHP Solution 10-4: Generating\
    \ the Thumbnail Image\n\nThis PHP solution completes the `Thumbnail` class by\
    \ creating the image resources, copying the thumbnail, and saving it in the destination\
    \ folder.\n\nContinue working with your existing class definition. Alternatively,\
    \ use `Thumbnail_03.php` in the `ch10/PhpSolutions/Image` folder.\n\n1.  Now that\
    \ we have verified that the class is calculating the correct values to generate\
    \ a thumbnail image, we can rename the `test()` method and delete the code that\
    \ displayed the results. Change the method’s name to `create()` and delete everything\
    \ except the first three lines. You should be left with this:\n\n    ```\n   \
    \ public function create() {\n    $ratio = $this->calculateRatio($this->originalwidth,\
    \ $this->originalheight,\n    $this->maxSize);\n    $thumbwidth = round($this->originalwidth\
    \ * $ratio);\n    $thumbheight = round($this->originalheight * $ratio);\n    }\n\
    \    ```\n\n2.  The image resource for the original image needs to be specific\
    \ to its MIME type, so create an internal method to select the correct type. Add\
    \ the following code to the class definition:\n\n    ```\n    protected function\
    \ createImageResource() {\n    switch ($this->imageType) {\n    case 'jpeg':\n\
    \    return imagecreatefromjpeg($this->original);\n    case 'png':\n    return\
    \ imagecreatefrompng($this->original);\n    case 'gif':\n    return imagecreatefromgif($this->original);\n\
    \    case 'webp':\n    return imagecreatefromwebp($this->original);\n    }\n \
    \   }\n    ```\n\n    The `checkType()` method that you created in PHP Solution\
    \ 10-1 stores the MIME type as `jpeg`, `png`, `gif`, or `webp`. So, the `switch`\
    \ statement checks the MIME type, matches it to the appropriate function, and\
    \ passes the original image as an argument. The method then returns the resulting\
    \ image resource.\n\n3.  The `create()` method needs two image resources: one\
    \ for the original image and the other for the thumbnail. Update the `create()`\
    \ method like this:\n\n    ```\n    public function create() {\n    $ratio = $this->calculateRatio($this->originalwidth,\
    \ $this->originalheight,\n    $this->maxSize);\n    $thumbwidth = round($this->originalwidth\
    \ * $ratio);\n    $thumbheight = round($this->originalheight * $ratio);\n    $resource\
    \ = $this->createImageResource();\n    $thumb = imagecreatetruecolor($thumbwidth,\
    \ $thumbheight);\n    }\n    ```\n\n    This calls the `createImageResource()`\
    \ method that you created in step 2 and then creates an image resource for the\
    \ thumbnail, passing the thumbnail’s width and height to `imagecreatetruecolor()`.\n\
    \n4.  The next stage in creating the thumbnail involves passing both image resources\
    \ to `imagecopyresampled()` and setting the coordinates and dimensions. Add the\
    \ following line of code to the `create()` method:\n\n    ```\n    imagecopyresampled($thumb,\
    \ $resource, 0, 0, 0, 0, $thumbwidth, $thumbheight,\n    $this->originalwidth,\
    \ $this->originalheight);\n    ```\n\n    The first two arguments are the image\
    \ resources you have just created for the thumbnail and original image. The next\
    \ four arguments set the `x` and `y` coordinates for both the copy and the original\
    \ to the top-left corner. Next come the width and height calculated for the thumbnail,\
    \ followed by the original image’s width and height. Setting arguments 3–6 to\
    \ the top-left corner and both sets of dimensions to the full amounts copies the\
    \ whole original image to the whole of the thumbnail. In other words, it creates\
    \ a smaller copy of the original.\n\n    You don’t need to assign the result of\
    \ `imagecopyresampled()` to a variable. The scaled-down image is now stored in\
    \ `$thumb`, but you still need to save it.\n\n5.  Complete the definition of `createThumbnail()`\
    \ like this:"
