- fmt: 'server. Cake’s method for connecting to these datasources is through a resource
    file called a `DataSource`, which is not the same as the source of data. To provide
    consistency in this chapter, I’ll stick with `DataSource`, the camel-cased word,
    to refer to Cake’s resource file and the lowercase word, `datasource`, to refer
    to the actual source of data. Simply put, in Cake you use `DataSources` to connect
    to datasources such as MySQL, XML files, and LDAP servers.


    ![Image 47](index-266_1.jpg)


    ![Image 48](index-266_2.jpg)


    ![Image 49](index-266_3.jpg)


    to the `read()` function rather than have to perform the step-by-step process
    of reading a record in whatever unique way the current datasource may require.
    As much as possible, the model shouldn’t have to change its current methods to
    accommodate a particular datasource.


    For example, Figure 14-2 shows how the MySQL `DataSource` extends the model so
    that the model doesn’t have to figure out the necessary SQL query strings and
    perform the connection methods for the database.


    **Figure 14-2.** *The MySQL DataSource pieces together the connection strings
    and database queries for the model.*


    Here’s the process:


    1. The model runs one of its functions, which gets sent to the `DataSource`; in
    this case, `find()` is invoked, and the contents of `$value` are sent.

    2. The `DataSource` pieces together a query string based on the language of the
    source, connects to the source, and runs the query; in this case, the MySQL `DataSource`
    runs a query like `"SELECT * FROM table WHERE field=$value"`.

    3. The datasource returns a result set; here, the MySQL `DataSource` performs
    some `mysql_fetch_array()` functions and loops through the result set from the
    database to get the final results.

    4. Once the final results are obtained, the `DataSource` formats the set for use
    in the model. This will usually be an array of some kind.

    5. The formatted array or result set is sent back to the model. The model then
    uses the data for its own purposes.


    ## Using Built-in DataSources


    Cake’s built-in `DataSources` include support only for relational database systems.
    Because they act as a layer between the model and the database, no additional
    `DataSource` functions are invoked in the model. To change from one `DataSource`
    to another, simply adjust the database configuration file.


    The first step in changing the main `DataSource` for the application is to set
    the `driver` parameter in `app/config/database.php`. Open this file, and you’ll
    find the `DATABASE_CONFIG` class; it should contain the original settings you
    used when first setting up the blog application (see Listing 14-1).


    **Listing 14-1.** *The `DATABASE_CONFIG` Class in `app/config/database.php`*


    ```

    1 class DATABASE_CONFIG {

    2   var $default = array(

    3     ''driver'' => ''mysql'',

    4     ''persistent'' => false,

    5     ''host'' => ''localhost'',

    6     ''port'' => '''',

    7     ''login'' => ''root'',

    8     ''password'' => ''root'',

    9     ''database'' => ''blog'',

    10    ''schema'' => '''',

    11    ''prefix'' => '''',

    12    ''encoding'' => ''''

    13   );

    14 }

    ```


    Lines 2–13 of Listing 14-1 contain the `$default` variable that tells Cake where
    to connect to the default datasource. The blog application currently connects
    to MySQL through the built-in MySQL `DataSource`. This is set in line 3 with the
    `driver` parameter. By changing this to another driver, Cake will use the new
    corresponding `DataSource` instead of MySQL. Table 14-2 shows a list of available
    driver options that you can use depending on the `DataSource` you want to connect
    with.


    **Table 14-2.** *Driver Options Available for the `DATABASE_CONFIG` Class*


    | Driver Parameter | DataSource | Minimum PHP Version Requirement |

    |------------------|------------|--------------------------------|

    | `db2` | IBM DB2, Cloudscape, and Apache Derby | PHP 4 |

    | `mssql` | Microsoft SQL Server 2000 and higher | PHP 4 |

    | `mysql` | MySQL 4 and 5 | PHP 4 |

    | `mysqli` | MySQL 4 and 5 improved interface | PHP 5 |

    | `oracle` | Oracle 8 and higher | PHP 4 |

    | `postgres` | PostgreSQL 7 and higher | PHP 4 |

    | `sqlite` | SQLite | PHP 5 |'
