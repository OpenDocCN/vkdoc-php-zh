    \ request. As a result, that value is displayed on the welcome page. The document\
    \ now has the following HTML markup.\n\n```\nGreetings\n\nWelcome Page\nWe are\
    \ happy to greet you, \nMickey Mouse! It is a great honor for us.\n```\n\nThe\
    \ markup differs from the previous case only in the name (`Mickey Mouse` instead\
