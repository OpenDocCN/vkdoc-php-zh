- fmt: '# The Shopify Theme Store


    I''d imagine that many readers have picked up this book with one eye toward the
    Shopify theme store (see [`https://themes.shopify.com`](https://themes.shopify.com)).
    From the store, shown in Figure [11-7](#A437216_1_En_11_Chapter.html#Fig7), merchants
    can purchase new themes to use on their stores. The rewards of getting your theme
    listed on the theme store can be significant; while Shopify doesn''t publish the
    official numbers, it''s estimated that a top ten theme on the store earns between
    $15,000 and $25,000 per month in sales, with the top ten theme authors (many of
    whom have multiple themes listed) earn between $25,000 to $50,000 per month.


    ![A437216_1_En_11_Fig7_HTML.jpg](A437216_1_En_11_Fig7_HTML.jpg)


    Figure 11-7

    The Shopify theme store


    These numbers are supported by Shopify maintaining "premium" pricing for themes
    (between $140 and $180 per install) and having a very, very strict submissions
    process that keeps the number of themes limited (only 55 themes are available
    at the time of writing, with each theme containing 2-4 preset styles). While this
    process means that only a small percentage of submissions make it to be published,
    the rest of this section looks at what you can do to maximize your chances, as
    well as covers some fallback options to consider in the event that your submission
    is rejected.


    ## Getting In to the Theme Store


    Obviously, there''s no magical trick to getting in to the theme store. You need
    to have experience with theme design and development, a solid concept, and the
    willingness to put in a lot of hard work—in the design, revision, and submission
    phases, and also once you launch your theme. It''s unlikely that the first theme
    you develop or submit will make it through the review process.


    That said, there are always some things you can do to maximize your chances of
    success.


    ### Familiarize Yourself with the Process


    According to the Shopify Themes Team, the number one mistake they see theme developers
    make is rushing head-first into development and spending a lot of time and effort
    on a theme build, only to have it rejected at step one because it doesn''t address
    a need on the store or is too similar to an existing theme.


    Shopify has a detailed explanation of their process available at [`https://themes.shopify.com/services/themes/guidelines`](https://themes.shopify.com/services/themes/guidelines),
    which outlines three key steps. These are:


    - The submission of a theme brief, covering the vision of the theme, a description
    of the unmet merchant needs addressed by your theme, and details about how your
    theme will be implemented and the team behind it.

    - The submission of interactive mobile design prototypes using `Invision` or a
    similar tool.

    - The submission of interactive desktop design prototypes using `Invision` or
    a similar tool.


    You should get detailed feedback from the Shopify Themes Team at each step before
    spending your time moving to the next stage. The first hurdle is probably the
    hardest to get past—your theme brief needs to make a convincing case for why your
    theme will address a real-world problem merchants have, without becoming too niche
    or vertical-specific.


    Approval of your theme brief by Shopify doesn''t automatically guarantee final
    entry to the theme store, but if your brief is sufficiently detailed and your
    final product addresses the brief completely, you''ll have the best possible chance.


    ### Have a Novel or Unique Angle


    The Shopify Themes Team states:


    > What we need to see is a project brief that consists of both subjective opinions
    and objective research, that outlines the necessity and validity of a perceived
    problem, opportunity, and solution.


    When evaluating that perceived problem and solution, you''ll need to keep clear
    of broad and subjective statements ("there aren''t enough themes that make good
    use of flat design") or just providing a list of features your theme will offer
    ("multi-level navigation menus, image carousels, and slick quick shop functionality").
    Instead, start thinking at a higher level about the types of merchants you think
    might be your customers, and why your theme will help them where existing themes
    don''t. ("Merchants who focus on selling a select range of digital products are
    underserved as most themes focus on merchants selling physical goods. My theme
    will address this by offering merchants useful functionality that only makes sense
    in a digital context and can help increase conversions for those types of products.")


    ### Work Closely with the Themes Team


    While the Themes Team will always be willing to provide feedback and advice on
    your theme''s brief and prototypes as you move through the submission process,
    it''s important to pay close attention to the feedback you are getting from them
    and revise your submission to address any of their concerns.


    You don''t have an unlimited number of revisions to play with before your submission
    will be permanently rejected, so try to gather as much detail as possible about
    any concerns held by the Themes Team. If something in their feedback isn''t clear,
    ask for clarification—even better, provide your reviewer a few alternatives to
    an original suggestion to reduce their workload and come up with something they
    can get behind.


    ### Follow the Theme Liquid and Content Guidelines


    To ensure you know what you''re getting yourself into, make sure you read the
    Themes Team''s `Liquid` requirements ([`https://help.shopify.com/themes/development/theme-store-requirements/theme-file-requirements`](https://help.shopify.com/themes/development/theme-store-requirements/theme-file-requirements))
    and content checklist ([`https://help.shopify.com/themes/development/theme-store-requirements/content-style-guide`](https://help.shopify.com/themes/development/theme-store-requirements/content-style-guide))
    before starting the submission process.


    The number of things checked by the Themes Team with respect to functionality,
    accessibility, and content often catches developers off guard when it comes to
    planning their development timelines.


    ### Be Ready for Support


    Shopify offers two revenue split models for theme developers: 70/30 and 50/50.
    The 70/30 split is offered where the developer agrees to handle support for the
    theme, while under the 50/50 model, Shopify fields inbound support.


    It''s important to note, however, that the 50/50 split is only offered on a case-by-case
    basis, so even if you''re thinking of forgoing the extra 20% revenue, you should
    be prepared to handle a significant number of support requests. Anecdotally, I
    think Shopify will rarely be offering the 50/50 model to theme developers moving
    forward, due to the resource demands and difficulties of supporting a third-party
    product.


