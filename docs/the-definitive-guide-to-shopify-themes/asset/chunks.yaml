- fmt: "#### WebPageTest.org\n\nThis is my favorite of the various performance testing\
    \ tools. Unlike the previous solution, it’s not available as a browser plugin—you\
    \ simply access it at [`http://www.webpagetest.org`](http://www.webpagetest.org)\
    \ and plug in the page’s URL to test.  \n\nAs you can see from Figure [10-3](#A437216_1_En_10_Chapter.html#Fig3),\
    \ it’s a much more advanced tool than `PageSpeed` or `YSlow`, letting you specify\
    \ a huge number of variables when running the test (browser, geographic location,\
    \ connection type and speed, user agent strings… the list goes on). It also lets\
    \ you record the test as a video, simulate the failure of particular domains during\
    \ the page load, and gives you a detailed “waterfall” timeline of your page load.\n\
    \n![A437216_1_En_10_Fig3_HTML.jpg](A437216_1_En_10_Fig3_HTML.jpg)  \nFigure 10-3\
    \  \n`WebPageTest.org` may not be the prettiest thing going around, but it provides\
    \ a lot of useful detail.\n\nA nice additional feature is the “cost analysis”\
    \ of your site, indicating how much a mobile visitor may have to pay to load your\
    \ site based on average mobile data rates in their country of origin. This is\
    \ a nice reminder for those of us in countries where data and WiFi are plentiful.\
    \  \n\n`WebPageTest.org` is the only tool mentioned here that analyzes a site’s\
    \ `SpeedIndex`,[³](#A437216_1_En_10_Chapter.html#Fn3) which is a way of measuring\
    \ how quickly the visible parts of a page are presented to a user (often a much\
    \ more important metric than the overall page load time).\n\n#### Which Tool to\
    \ Use?\n\nUnless you’re itching to get into the nitty gritty of performance optimization,\
    \ I recommend sticking to the simpler reports and analysis of `PageSpeed Insights`\
    \ and `YSlow` for the moment. They’ll identify 90% of the performance issues in\
    \ your theme and indicate where you’re going to see the biggest wins.  \n\nOnce\
    \ you’ve gotten the low hanging fruit out of the way, turning to `WebPageTest`’s\
    \ detailed reports can help you identify those “one-percenters,” which can often\
    \ be worth spending the time on for sites with large sales volumes.  \n\nIf you’re\
    \ looking for a way to integrate performance testing into your development workflow,\
    \ check out the `grunt-perfbudget` Grunt plugin.[⁴](#A437216_1_En_10_Chapter.html#Fn4)\
    \ It’s written by Tim Kadlec, who has a wealth of material on setting a “performance\
    \ budget” for your site on his blog ([`https://timkadlec.com`](https://timkadlec.com)).\n\
    \n### Theme Performance Metrics\n\nBeing able to get all this performance information\
    \ is great, but now the question is: how do we use it? First, it’s good to have\
    \ an idea of which things we should be worried about and which can be safely ignored.\
    \  \n\nIn the case of Shopify themes, any performance optimizations that require\
    \ server or CDN configuration are out of your hands. Fortunately, Shopify does\
    \ a pretty good job of optimizing these things on their end, so we generally don’t\
    \ have to worry about them and can instead focus on the things that are under\
    \ our control.  \n\nIn the following sections, I’ve provided a list of the key\
    \ metrics I look at when trying to improve my Shopify themes, along with a list\
    \ of the techniques I use to try to improve those metrics. Many of these will\
    \ be familiar to experienced web developers (Shopify themes are just HTML, CSS,\
    \ and JavaScript at the end of the day after all), but some are Shopify-specific\
    \ either in concept or execution.  \n\nThe final part of this chapter focuses\
    \ on each of these listed techniques in detail and walks through how to implement\
    \ them.\n\n#### Key Metric 1: Page Weight\n\nPage weight indicates how many bytes\
    \ need to be transferred to the browser to display your site. You should be looking\
    \ at two numbers here: the number of bytes transferred when the page first loads\
    \ (before the browser has cached anything) and the number of bytes after caching.\
    \  \n\nEven if your site is pretty image-heavy, you should be able to deliver\
    \ a usable page to a customer with a few hundred kilobytes or less. Using some\
    \ of the techniques described in this lesson, you can do this and then pull in\
    \ larger assets (like high-resolution images) later as needed.  \n\nOptimization\
    \ techniques that focus on reducing page weight include:  \n\n*   Image optimization\
    \  \n*   Asset minification  \n*   Lazy loading  \n*   Page simplification  \n\
    \n#### Key Metric 2: Number of HTTP Requests\n\nEvery HTTP request your browser\
    \ makes for an asset requires a round trip from the browser to the server and\
    \ back again, along with all of the overhead that implies.  \n\nMethods focused\
    \ on improving the efficiency of the requests your page makes are:  \n\n*   Asset\
    \ concatenation  \n*   Cookieless CDN domains (handled by Shopify)  \n*   CDN\
    \ hostname distribution (not handled by Shopify, but there’s not too much we can\
    \ do about it if we still want to leverage Shopify’s comprehensive CDN)  \n* \
    \  Intelligent asset loading  \n*   Page simplification  \n\n#### Key Metric 3:\
    \ Time to Load\n\nThe term “time to load” is a bit imprecise, as “load” in the\
    \ context of web performance can mean a few different things. It could mean: \
    \ \n\n*   The time taken for the browser to load your initial HTML and start rendering\
    \ the page (“time to render”)  \n*   The time taken for the browser to visually\
    \ display the page to the user (“time to visual completion”)  \n*   The time taken\
    \ for the entire page, including assets, to load, render, and execute (“time to\
    \ load”)  \n\nFrom the perspective of user experience, the “time to visual completion”\
    \ is the most important interpretation, as it’s what makes a site “feel” fast.\
    \ Unfortunately, it’s also the most difficult to measure with automated tools\
    \ (although `SpeedIndex`, a metric developed by Google and thoroughly analyzed\
    \ in `WebPageTest.org`’s report, does a pretty good job).  \n\nThe good news is\
    \ that the optimization techniques for all types of page load have some overlap,\
    \ so efforts towards optimizing your initial time to render will help improve\
    \ your other metrics as well. In some cases, you may wish to prioritize one type\
    \ of load time over another—this is most commonly seen in techniques that attempt\
    \ to get the page to an initial “visually complete” stage as fast as possible,\
    \ then complete the load of additional assets.  \n\nAn example of this would be\
    \ the use of progressive JPEGs, which render a low-quality “first pass” image\
    \ that is subsequently replaced with one of a higher quality as the page continues\
    \ to load. The effect is that the user feels like the page loads much quicker,\
    \ even if the overall number of bytes transferred to the user is increased, as\
    \ we need to send the data for multiple versions of the image at different quality\
    \ levels.\n\n## Performance Optimization Techniques\n\nHaving identified the metrics\
    \ we consider most important, we’ll now get to the meat and potatoes of the chapter:\
    \ identifying what you can actually do as a theme developer to improve those numbers."
