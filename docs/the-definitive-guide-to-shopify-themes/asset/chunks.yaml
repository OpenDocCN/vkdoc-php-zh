- fmt: "### A Git Workflow for Shopify Themes\n\nGit is pretty much the de facto version\
    \ control system these days (and it’s the only one I’m familiar with, having managed\
    \ to force unhappy memories of RCS and Subversion out of my head). If you’re a\
    \ Mercurial fan, I apologize but the following examples are going to be pretty\
    \ Git-centric.\n\nAssuming we have Git installed, Listing [2-4](#A437216_1_En_2_Chapter.html#Par37)\
    \ shows how we would start putting our example theme under revision control.\n\
    \n```bash\n$ cd /projects/example-theme\n$ git init .\nInitialized empty Git repository\
    \ in /projects/example- theme/.git/\n$ echo \"config.yml\" > .gitignore\n$ git\
    \ add .\n$ git commit -m \"Initial commit.\"\nListing 2-4\nInitializing a Git\
    \ Repository in a Shopify Theme Directory\n```\n\nNote that before we initialize\
    \ the repository, we have to add `config.yml` to Git’s ignore list. This is because\
    \ Theme Kit uses this file to store sensitive API credentials, which we definitely\
    \ don’t want checked in to revision control. From there, you can edit the theme\
    \ files locally while running the theme gem to automatically upload the changes\
    \ to the store, and then once we’re done, commit the changes to Git.\n\nIf you’re\
    \ in a situation where you’re not sure if your local working directory matches\
    \ what’s on your Shopify store, you can run a `theme download` to fetch all of\
    \ the remote files and use `git diff` to see the differences.\n\nThis actually\
    \ occurs quite often for me when I’m working with clients that like to be able\
    \ to make small changes (often minor copy or style tweaks) to their themes themselves\
    \ through the web editor. Doing a `theme download` and committing any of their\
    \ changes can avoid overwriting their work if you end up touching the same file.\
    \ (If this is happening often, it’s probably a good sign that the changes the\
    \ client is making should be moved into a theme setting or language file, which\
    \ is covered in Chapter [8](#A437216_1_En_8_Chapter.html).)\n\n**Tip**\n\nWhen\
    \ you run `theme download`, sometimes you might notice some “orphan files” being\
    \ pulled down from your Shopify theme—files that used to be in your repository\
    \ and were renamed or deleted, but still got uploaded to the version of the theme\
    \ on the Shopify servers. A nice one-line command to clean those files from the\
    \ server (after you’ve run `theme download`) is `git clean -n | sed 's/Would remove\
    \ //' | xargs theme remove`. This uses `git clean` to get a list of files that\
    \ aren’t in version control and passes them on to the `theme remove` command to\
    \ clean them up from the server. This command won’t remove the files locally,\
    \ so you don’t need to worry about accidentally losing work.\n\n#### Theme Feature\
    \ Branches with Git\n\nWhen using Git for development, it’s quite common to want\
    \ to work on a feature branch in order to develop a new feature without impacting\
    \ the master or live codebase. With a bit of tinkering, we can do this with Shopify\
    \ themes as well. Assuming that:\n\n1.  You have a main theme currently installed\
    \ and published on your Shopify store (the “master” theme).  \n2.  You have a\
    \ local copy of that theme that’s been put into version control (the “master”\
    \ branch).  \n3.  You’re synchronizing your changes to the master theme using\
    \ Theme Kit and have configured Theme Kit’s `config.yml` with the ID of the “master”\
    \ theme.  \n\nYou can create a feature branch to work on by first making sure\
    \ that any `theme watch` process in Theme Kit is stopped, and then, in your browser:\n\
    \n1.  Open the Themes section in the store admin.  \n2.  Open the Actions dropdown\
    \ on the “master” theme and select Duplicate  \n3.  Wait for the theme to duplicate,\
    \ then get the ID of the newly created theme by clicking the Customize Theme button\
    \ and looking at the URL.  \n\nThen, on the command line, switch to a new git\
    \ branch and swap over the theme ID, as shown in Listing [2-5](#A437216_1_En_2_Chapter.html#Par51).\n\
    \n```bash\n$ cd /project/example-theme\n$ git checkout -b new-feature\nSwitched\
    \ to a new branch 'new-feature'\n$ sed -i '' 's/[master theme ID]/[new theme ID]/g'\
    \ config.yml\n$ theme watch\n[development] Watching for changes on host example.myshopify.com\n\
    Listing 2-5\nSwapping to a Git Feature Branch from the Command Line\n```\n\nYou’ve\
    \ now created a completely separate preview theme on your Shopify store that will\
    \ be synchronized to and from the local `new-feature` branch. Make some changes,\
    \ wait for them to be uploaded automatically, and run `theme open`. You’ll be\
    \ taken to a preview of your “new-feature” theme (you’ll see a notice to this\
    \ effect at the bottom of your browser, as in Figure [2-3](#A437216_1_En_2_Chapter.html#Fig3)),\
    \ but visitors coming to the regular site will still be looking at the “master”\
    \ theme.\n\n![A437216_1_En_2_Fig3_HTML.jpg](A437216_1_En_2_Fig3_HTML.jpg)\n\n\
    Figure 2-3\n\nThis overlay appears at the bottom of the browser when we’re viewing\
    \ a page not visible to public visitors\n\nIf you’re wondering what that `sed`\
    \ command in the console was all about, it’s simply updating the `config.yml`\
    \ file to point to the new copy of the theme on your store instead of the master.\
    \ You could do the same thing by simply opening `config.yml` in a text editor\
    \ and changing the line containing `theme_id` manually.\n\nAs you can see, this\
    \ process is a little tricky, and it can get even trickier when you’re trying\
    \ to switch back and forth between branches, as you’ll often want to do. The process\
    \ for switching back to working on the master branch from the feature branch would\
    \ now be something like:\n\n1.  Ensure all changes we want to keep on our feature\
    \ branch are committed or stashed.  \n2.  Ensure any `theme watch` process is\
    \ stopped.  \n3.  Run `git checkout master`.  \n4.  Edit the `theme_id` in `config.yml`\
    \ file to point to the “master” theme again.  \n5.  Run `theme watch`.  \n\nOnce\
    \ you’ve gotten used to this process, you can execute branch switches quite easily.\
    \ You can also merge in changes to your master branch while `theme watch` is running\
    \ and have your merged files update directly to the main Shopify store theme (watch\
    \ out for merge conflicts, though!).\n\nThis workflow suits you for now, and it\
    \ can handle everything we’ll be throwing at it as we build the example theme\
    \ in the following chapters. In Chapter [11](#A437216_1_En_11_Chapter.html), you’ll\
    \ start looking at some alternative deployment strategies for themes and learn\
    \ how you can automate the rollout of theme changes to themes currently in production.\n\
    \n## Slate and Theme Build Tools\n\nUp to this point, we’ve had a 1:1 correlation\
    \ between the theme files we’re editing while building our theme and the final\
    \ format used by Shopify. This is great while getting started—it helps us fully\
    \ understand how Shopify themes are put together and lets us start working with\
    \ themes very quickly. But if you’re coming from a web development background\
    \ outside of Shopify, you’ll understand that modern web sites rarely have this\
    \ 1:1 mapping between source files and deliverables in production.\n\nAs with\
    \ any other web site, Shopify themes can benefit greatly from transforming source\
    \ files in different ways before delivering them to the end user. Two such transformations\
    \ are concatenation and optimization.\n\nConcatenation takes many separate files\
    \ and bundles them together as a single asset to be sent to the browser. This\
    \ allows us to logically separate and maintain files while writing our theme,\
    \ but send only a single file to the browser. Optimization takes a source file\
    \ (it could be JavaScript, CSS, Liquid, or an image) and performs some processing\
    \ on it, usually to reduce the overall number of bytes to be delivered to the\
    \ browser.\n\nYou’ll be looking at the specifics of these processes and their\
    \ advantages in a lot more detail when you get to Chapter [10](#A437216_1_En_10_Chapter.html)\
    \ (performance), but for current purposes, the focus is on one thing: given that\
    \ we want to perform these transformations on our source files, how can we slot\
    \ that into our existing development workflow?"
  raw: '### A Git Workflow for Shopify Themes


    Git is pretty much the de facto version control system these days (and it’s the
    only one I’m familiar with, having managed to force unhappy memories of RCS and
    Subversion out of my head). If you’re a Mercurial fan, I apologize but the following
    examples are going to be pretty Git-centric.


    Assuming we have Git installed, Listing [2-4](#A437216_1_En_2_Chapter.html#Par37)
    shows how we would start putting our example theme under revision control.


    ```

    $ cd /projects/example-theme

    $ git init .

    Initialized empty Git repository in /projects/example- theme/.git/

    $ echo "config.yml" > .gitignore

    $ git add .

    $ git commit -m "Initial commit."

    Listing 2-4

    Initializing a Git Repository in a Shopify Theme Directory

    ```


    Note that before we initialize the repository, we have to add `config.yml` to
    Git’s ignore list. This is because Theme Kit uses this file to store sensitive
    API credentials, which we definitely don’t want checked in to revision control.
    From there, you can edit the theme files locally while running the theme gem to
    automatically upload the changes to the store, and then once we’re done, commit
    the changes to Git.


    If you’re in a situation where you’re not sure if your local working directory
    matches what’s on your Shopify store, you can run a `theme download` to fetch
    all of the remote files and use `git diff` to see the differences.


    This actually occurs quite often for me when I’m working with clients that like
    to be able to make small changes (often minor copy or style tweaks) to their themes
    themselves through the web editor. Doing a `theme download` and committing any
    of their changes can avoid overwriting their work if you end up touching the same
    file. (If this is happening often, it’s probably a good sign that the changes
    the client is making should be moved into a theme setting or language file, which
    is covered in Chapter [8](#A437216_1_En_8_Chapter.html).)


    Tip


    When you run `theme download`, sometimes you might notice some “orphan files”
    being pulled down from your Shopify theme—files that used to be in your repository
    and were renamed or deleted, but still got uploaded to the version of the theme
    on the Shopify servers. A nice one-line command to clean those files from the
    server (after you’ve run `theme download`) is `git clean -n | sed ''s/Would remove
    //'' | xargs theme remove`. This uses `git clean` to get a list of files that
    aren’t in version control and passes them on to the `theme remove` command to
    clean them up from the server. This command won’t remove the files locally, so
    you don’t need to worry about accidentally losing work.


    #### Theme Feature Branches with Git


    When using Git for development, it’s quite common to want to work on a feature
    branch in order to develop a new feature without impacting the master or live
    codebase. With a bit of tinkering, we can do this with Shopify themes as well.
    Assuming that:


    1.  You have a main theme currently installed and published on your Shopify store
    (the “master” theme).  

    2.  You have a local copy of that theme that’s been put into version control (the
    “master” branch).  

    3.  You’re synchronizing your changes to the master theme using Theme Kit and
    have configured Theme Kit’s `config.yml` with the ID of the “master” theme.  


    You can create a feature branch to work on by first making sure that any `theme
    watch` process in Theme Kit is stopped, and then, in your browser:


    1.  Open the Themes section in the store admin.  

    2.  Open the Actions dropdown on the “master” theme and select Duplicate  

    3.  Wait for the theme to duplicate, then get the ID of the newly created theme
    by clicking the Customize Theme button and looking at the URL.  


    Then, on the command line, switch to a new git branch and swap over the theme
    ID, as shown in Listing [2-5](#A437216_1_En_2_Chapter.html#Par51).


    ```

    $ cd /project/example-theme

    $ git checkout -b new-feature

    Switched to a new branch ''new-feature''

    $ sed -i '''' ''s/[master theme ID]/[new theme ID]/g'' config.yml

    $ theme watch

    [development] Watching for changes on host example.myshopify.com

    Listing 2-5

    Swapping to a Git Feature Branch from the Command Line

    ```


    You’ve now created a completely separate preview theme on your Shopify store that
    will be synchronized to and from the local `new-feature` branch. Make some changes,
    wait for them to be uploaded automatically, and run `theme open`. You’ll be taken
    to a preview of your “new-feature” theme (you’ll see a notice to this effect at
    the bottom of your browser, as in Figure [2-3](#A437216_1_En_2_Chapter.html#Fig3)),
    but visitors coming to the regular site will still be looking at the “master”
    theme.


    ![A437216_1_En_2_Fig3_HTML.jpg](A437216_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    This overlay appears at the bottom of the browser when we’re viewing a page not
    visible to public visitors


    If you’re wondering what that `sed` command in the console was all about, it’s
    simply updating the `config.yml` file to point to the new copy of the theme on
    your store instead of the master. You could do the same thing by simply opening
    `config.yml` in a text editor and changing the line containing `theme_id` manually.


    As you can see, this process is a little tricky, and it can get even trickier
    when you’re trying to switch back and forth between branches, as you’ll often
    want to do. The process for switching back to working on the master branch from
    the feature branch would now be something like:


    1.  Ensure all changes we want to keep on our feature branch are committed or
    stashed.  

    2.  Ensure any `theme watch` process is stopped.  

    3.  Run `git checkout master`.  

    4.  Edit the `theme_id` in `config.yml` file to point to the “master” theme again.
     

    5.  Run `theme watch`.  


    Once you’ve gotten used to this process, you can execute branch switches quite
    easily. You can also merge in changes to your master branch while `theme watch`
    is running and have your merged files update directly to the main Shopify store
    theme (watch out for merge conflicts, though!).


    This workflow suits you for now, and it can handle everything we’ll be throwing
    at it as we build the example theme in the following chapters. In Chapter [11](#A437216_1_En_11_Chapter.html),
    you’ll start looking at some alternative deployment strategies for themes and
    learn how you can automate the rollout of theme changes to themes currently in
    production.


    ## Slate and Theme Build Tools


    Up to this point, we’ve had a 1:1 correlation between the theme files we’re editing
    while building our theme and the final format used by Shopify. This is great while
    getting started—it helps us fully understand how Shopify themes are put together
    and lets us start working with themes very quickly. But if you’re coming from
    a web development background outside of Shopify, you’ll understand that modern
    web sites rarely have this 1:1 mapping between source files and deliverables in
    production.


    As with any other web site, Shopify themes can benefit greatly from transforming
    source files in different ways before delivering them to the end user. Two such
    transformations are concatenation and optimization.


    Concatenation takes many separate files and bundles them together as a single
    asset to be sent to the browser. This allows us to logically separate and maintain
    files while writing our theme, but send only a single file to the browser. Optimization
    takes a source file (it could be JavaScript, CSS, Liquid, or an image) and performs
    some processing on it, usually to reduce the overall number of bytes to be delivered
    to the browser.


    You’ll be looking at the specifics of these processes and their advantages in
    a lot more detail when you get to Chapter [10](#A437216_1_En_10_Chapter.html)
    (performance), but for current purposes, the focus is on one thing: given that
    we want to perform these transformations on our source files, how can we slot
    that into our existing development workflow?'
  trans: '

    ### 适用于 Shopify 主题的 Git 工作流


    Git 可以说是当下事实上的版本控制系统（也是我唯一熟悉的系统，我已经成功将 RCS 和 Subversion 的不愉快记忆从脑海中抹去）。如果你是 Mercurial
    的粉丝，我表示歉意，但以下示例将完全以 Git 为中心。


    假设我们已经安装了 Git，清单 2-4 展示了如何开始将我们的示例主题纳入版本控制。


    ```bash

    $ cd /projects/example-theme

    $ git init .

    已初始化空的 Git 仓库于 /projects/example-theme/.git/

    $ echo "config.yml" > .gitignore

    $ git add .

    $ git commit -m "初始提交。"

    清单 2-4

    在 Shopify 主题目录中初始化 Git 仓库

    ```


    请注意，在初始化仓库之前，我们必须将 `config.yml` 添加到 Git 的忽略列表中。这是因为 Theme Kit 使用此文件来存储敏感的 API
    凭据，我们绝对不希望将其检入版本控制。之后，你可以在本地编辑主题文件，同时运行主题 gem 以自动将更改上传到商店，然后完成工作后，将更改提交到 Git。


    如果你不确定本地工作目录是否与 Shopify 商店上的内容匹配，可以运行 `theme download` 来获取所有远程文件，并使用 `git diff`
    查看差异。


    当我与那些喜欢通过网页编辑器自行对主题进行小改动（通常是微小的文案或样式调整）的客户合作时，这种情况实际上经常发生。执行 `theme download`
    并提交他们的任何更改，可以避免在你最终修改同一文件时覆盖他们的工作。（如果这种情况频繁发生，很可能是一个明确的信号，表明客户所做的更改应移入主题设置或语言文件中，这将在第
    8 章中介绍。）


    **提示**


    当你运行 `theme download` 时，有时可能会注意到一些“孤立文件”从你的 Shopify 主题中被拉取下来——这些文件曾经在你的仓库中，后来被重命名或删除，但仍然上传到了
    Shopify 服务器上的主题版本中。一个便捷的一行命令（在运行 `theme download` 之后）可以用来清理服务器上的这些文件：`git clean
    -n | sed ''s/Would remove //'' | xargs theme remove`。此命令使用 `git clean` 获取不在版本控制中的文件列表，并将它们传递给
    `theme remove` 命令，以便从服务器上清理。此命令不会在本地删除文件，因此你无需担心意外丢失工作。


    #### 使用 Git 的主题功能分支


    在使用 Git 进行开发时，通常希望在功能分支上工作，以便开发新功能而不影响主分支或线上代码库。稍加调整，我们也可以在 Shopify 主题中实现这一点。假设：


    1.  你已在 Shopify 商店中安装并发布了一个主主题（“master”主题）。

    2.  你有一个已纳入版本控制的该主题的本地副本（“master”分支）。

    3.  你正在使用 Theme Kit 将更改同步到主主题，并已使用“master”主题的 ID 配置了 Theme Kit 的 `config.yml`。


    你可以创建一个功能分支来进行开发，首先确保 Theme Kit 中的任何 `theme watch` 进程已停止，然后在浏览器中：


    1.  打开商店管理后台的主题部分。

    2.  打开“master”主题上的操作下拉菜单，选择“复制”。

    3.  等待主题复制完成，然后通过单击“自定义主题”按钮并查看 URL 来获取新创建主题的 ID。


    然后，在命令行中，切换到新的 git 分支并更换主题 ID，如清单 2-5 所示。


    ```bash

    $ cd /project/example-theme

    $ git checkout -b new-feature

    切换到一个新分支 ''new-feature''

    $ sed -i '''' ''s/[主主题 ID]/[新主题 ID]/g'' config.yml

    $ theme watch

    [development] 正在监听主机 example.myshopify.com 上的更改

    清单 2-5

    从命令行切换到 Git 功能分支

    ```


    你现在已在 Shopify 商店上创建了一个完全独立的预览主题，该主题将与本地的 `new-feature` 分支同步。进行一些更改，等待它们自动上传，然后运行
    `theme open`。你将被带到“new-feature”主题的预览页面（你会在浏览器底部看到相关通知，如图 2-3 所示），但访问常规网站的访客仍然会看到“master”主题。


    ![A437216_1_En_2_Fig3_HTML.jpg](img/A437216_1_En_2_Fig3_HTML.jpg)


    图 2-3


    当我们查看对公众不可见的页面时，浏览器底部会出现此覆盖层


    如果你想知道控制台中的那个 `sed` 命令是做什么的，它只是更新 `config.yml` 文件，使其指向商店上主题的新副本，而不是主副本。你也可以通过在文本编辑器中直接打开
    `config.yml` 并手动更改包含 `theme_id` 的行来达到同样的效果。


    如你所见，这个过程有点棘手，而且当你试图在分支之间来回切换时（这正是你经常想做的），它可能会变得更加棘手。从功能分支切换回主分支工作的过程现在大致如下：


    1.  确保所有我们想在功能分支上保留的更改都已提交或暂存。

    2.  确保任何 `theme watch` 进程已停止。

    3.  运行 `git checkout master`。

    4.  编辑 `config.yml` 文件中的 `theme_id`，使其再次指向“master”主题。

    5.  运行 `theme watch`。


    一旦你习惯了这个过程，就可以很轻松地执行分支切换。你还可以在 `theme watch` 运行时将更改合并到主分支，并将合并后的文件直接更新到主要的 Shopify
    商店主题（不过要注意合并冲突！）。


    这个工作流目前适合你，并且可以处理我们在后续章节构建示例主题时将遇到的所有情况。在第 11 章中，你将开始了解一些替代的主题部署策略，并学习如何自动化地将主题更改推送到当前生产环境中的主题。


    ## Slate 与主题构建工具


    到目前为止，我们在构建主题时所编辑的主题文件与 Shopify 使用的最终格式之间存在 1:1 的对应关系。这在入门阶段非常棒——它有助于我们完全理解 Shopify
    主题是如何组合在一起的，并让我们能够非常快速地开始使用主题。但是，如果你拥有 Shopify 之外的 Web 开发背景，你就会知道现代网站很少在源文件和生产交付物之间保持这种
    1:1 的映射关系。


    与任何其他网站一样，Shopify 主题可以在将源文件交付给最终用户之前，通过不同方式的转换而受益匪浅。其中两种转换是合并和优化。


    合并将许多单独的文件捆绑成一个单独的资产发送到浏览器。这使我们在编写主题时能够在逻辑上分离和维护文件，但只向浏览器发送一个文件。优化则接收一个源文件（可能是
    JavaScript、CSS、Liquid 或图像）并对其进行一些处理，通常是为了减少要交付给浏览器的总字节数。


    当你阅读到第 10 章（性能）时，你将更详细地了解这些过程的具体细节及其优势。但就目前而言，重点在于一件事：鉴于我们希望对源文件执行这些转换，我们如何将其整合到现有的开发工作流中？

    '
- fmt: '### Grunt 和 Gulp：自动化任务运行器


    直到最近，想要在主题工作流中接入拼接（concatenation）或优化等预处理任务的最佳选择是使用任务运行器，其中最常用的两个是 `Grunt`（[`http://gruntjs.com`](http://gruntjs.com)）和
    `Gulp`（[`http://gulpjs.com`](http://gulpjs.com)）。


    这些工具对于在其他平台上工作的 Web 开发者来说可能很熟悉，但如果你之前从未见过或使用过它们，那么两者的目标都是提供一种方式，用于定义在特定情况下要执行的一系列自动化任务。在
    Shopify 主题的上下文中，这些任务的一些示例包括：


    - 优化图像资源

    - 预处理并将 `SASS` 或 `LESS` 源文件编译成最终的 CSS 样式表

    - 拼接并压缩 JavaScript

    - 将主题打包成 `.zip` 文件以便分发


    `Grunt` 和 `Gulp` 都允许你定义触发这些自动化任务的事件，因此你可以配置它们来监听主题的源文件，并在保存更改时自动执行处理步骤。在我过去为主题使用的标准设置中，我在本地处理
    Shopify 主题的目录结构类似于列表 [2-6](#A437216_1_En_2_Chapter.html#Par73)。


    ```

    /.build

    /theme

    /Gruntfile.coffee

    Listing 2-6

    The Top-Level Directory Structure of a Theme Using Grunt for a Preprocessing Workflow

    ```


    在这种配置中，顶层`/theme`目录包含我的主题源文件，其结构便于维护。例如，我不会被限制在将所有脚本和样式表资源放在一个`/assets`目录中的扁平目录结构里，而是将内容分离到`/assets/js/vendor`、`/assets/js/product`、`/assets/js/common`等目录中。`Gruntfile.coffee`定义了所有要运行的任务以及触发它们的规则，而`/.build`则包含最终“构建完成”的主题，其组织方式符合
    Shopify 期望的标准目录结构。


    当积极开发一个主题时，我会在`/.build`目录内运行 Theme Kit 的 `theme configure` 和 `theme watch` 命令，然后在顶层目录运行
    `grunt watch` 命令。当我修改`/theme`中的模板和资源时，`Grunt` 的监听任务会检测到更改，触发相应的处理任务，并将更新编译到`/.build`，Theme
    Kit 会从那里自动将更改后的文件上传到 Shopify。


    此工作流的目录布局（包括设置说明和一个标准的 `Gruntfile.coffee`，它能处理许多常见的 Shopify 构建任务，如 Sass 编译、JavaScript
    压缩、图像优化以及生成适合上传到 Shopify 的 `.zip` 文件）可免费在 [`https://github.com/discolabs/shopify-theme-scaffold`](https://github.com/discolabs/shopify-theme-scaffold)
    获取。


    ### 其他工作流自动化工具


    `Gulp` 和 `Grunt` 是相当“底层”的工具，它们需要你花一些时间编写配置文件并将其设置为可与 Shopify 一起工作。我觉得这里应该提一下另外几个工作流自动化工具，它们要么更“用户友好”，要么是专门为
    Shopify 设计的：


    - `Prepos`（[`https://prepros.io/`](https://prepros.io/)）是一个跨平台的 GUI 工具，用于配置和执行常见的预处理任务，并支持实时浏览器重载。

    - `CodeKit`（[`https://codekitapp.com/`](https://codekitapp.com/)）与 `Prepos` 类似，但仅适用于
    Mac（不过开发者似乎更有幽默感）。

    - `Quickshot`（[`https://quickshot.readme.io`](https://quickshot.readme.io)）是一个命令行工具，但它是专门针对
    Shopify 开发而设计的。它支持预编译、并行上传和下载，以及一些不错的高级功能，例如能够下载/上传 Shopify 博客、页面和产品内容。


    ### 介绍 Slate


    在上一节中，我提到像 `Grunt` 和 `Gulp` 这样的工具“直到最近”还是向主题工作流添加自动化任务的最佳选择。2017 年，Shopify 发布了
    `Slate`，这是一个新的命令行工具，专门专注于辅助 Shopify 主题的开发（见图 [2-4](#A437216_1_En_2_Chapter.html#Fig4)）。


    ![A437216_1_En_2_Fig4_HTML.jpg](A437216_1_En_2_Fig4_HTML.jpg)


    图 2-4


    位于 [https://​shopify.​github.​io/​slate](https://shopify.github.io/slate) 的 Slate
    文档页面


    `Slate` 提供了与 `Grunt` 或 `Gulp` 驱动的类似工作流：它允许你使用灵活的目录结构开发 Shopify 主题，并将预处理任务接入开发流程。它还提供了一些额外的功能，例如：


    - 主题脚手架生成，允许通过一个简单的 `slate theme new-theme` 命令为新的 Shopify 主题创建源目录和构建目录。

    - 内置支持监听、重新编译并将更改上传到多个 Shopify 环境，这意味着你只需要运行一个 `watch` 进程，而不是像 `Grunt`/`Gulp`
    和 Theme Kit 示例中那样需要运行两个进程（`Slate` 底层使用 Theme Kit 来实现此功能）。

    - 支持在浏览器中实时重载主题，以缩短修改代码和看到结果之间的循环时间。

    - 向工作流添加自动化测试和样式检查。

    - 提供大多数 Shopify 主题通用的可复用前端组件。


    由于 `Slate` 是专为 Shopify 主题开发而设计的，它提供了比 `Grunt`、`Gulp` 或其他工具更流畅的体验。虽然它仍是 Shopify
    生态系统中的一个非常新的成员，并且还有一些粗糙之处需要打磨，但我预计 Shopify 主题开发者将以我们在不太标准的 `Grunt` 和 `Gulp` 工作流中未曾见过的方式围绕
    `Slate` 实现标准化，这将使得在项目和项目之间共享可复用的主题片段和设计模式变得更加容易。


    在本书中的大多数示例开发中，我们不会使用 `Slate` 或任何其他构建工具。原因是它在我们编写的代码和 Shopify 上运行的代码之间增加了一层额外的间接层。然而，在本书的最后一章中，你将看到如何将你的示例主题迁移到由
    `Slate` 驱动的工作流中，以及如何将其接入更高级的部署流程。通过示例 GitHub 仓库，你将看到确切需要修改的代码以及使用 `Slate` 处理你自己主题所需运行的命令。


    ## 总结


    本章涵盖了一些你可以用来开发 Shopify 主题的关键工具，并解释了它们如何帮助你更高效地构建商店。它涵盖了本地开发、版本控制和工作流自动化，并介绍了 `Slate`，一个
    Shopify 开发的工具，它提供了许多开箱即用的功能。'
  raw: '### Grunt and Gulp : Automated Task Runners


    Until recently, the best choice for anyone wanting to slot preprocessing tasks
    like concatenation or optimization into their theme workflow was to use a task
    runner, the most common ones being Grunt ( [`http://gruntjs.com`](http://gruntjs.com)
    ) and Gulp ( [`http://gulpjs.com`](http://gulpjs.com) ).


    These tools may be familiar to web developers working on other platforms, but
    if you haven’t seen or used them before, the goal of both is to provide a way
    to define a list of automated tasks to perform in certain situations. In the context
    of Shopify themes, some examples of these tasks could be:


    *   Optimizing image assets

    *   Preprocessing and compiling SASS or LESS source files into a final CSS stylesheet

    *   Concatenating and minifying JavaScript

    *   Packaging up the theme as a .`zip` file for distribution


    Both Grunt and Gulp allow you to define the events that trigger these automated
    tasks, so you can configure them to watch your theme’s sources files and automatically
    perform processing steps when changes are saved. In the standard setup I’ve used
    for my themes in the past, the local directory where I’m working on a Shopify
    theme looks something like Listing [2-6](#A437216_1_En_2_Chapter.html#Par73).


    ```

    /.build

    /theme

    /Gruntfile.coffee

    Listing 2-6

    The Top-Level Directory Structure of a Theme Using Grunt for a Preprocessing Workflow

    ```


    In this configuration, the top-level `/theme` directory contains the source files
    for my theme, arranged in a structure that makes it easy to maintain. For example,
    instead of being constrained to a flat directory structure with all script and
    stylesheet assets in the one `/assets` directory, I’ll separate things out into
    `/assets/js/vendor`, `/assets/js/product`, `/assets/js/common`, etc. `Gruntfile.coffee`
    defines all the tasks to be run and rules on when to trigger them, and `/.build`
    contains the final “built” theme, organized in the standard directory structure
    expected by Shopify.


    When actively developing a theme, I will run Theme Kit’s `theme configure` and
    `theme watch` commands from within the `/.build` directory, and then the `grunt
    watch` command from the top-level directory. As I make changes to the template
    and assets contained in `/theme`, Grunt’s watching task detects the changes, triggers
    the appropriate processing tasks, and compiles the updates to `/.build`, from
    where Theme Kit automatically uploads the changed files to Shopify.


    The directory layout for this workflow—including setup instructions and a standard
    `Gruntfile.coffee` that handles a multitude of common Shopify build tasks, such
    as Sass compilation, JavaScript minification, image optimization, and the production
    of a .`zip` file suitable for upload to Shopify—is freely available at [`https://github.com/discolabs/shopify-theme-scaffold`](https://github.com/discolabs/shopify-theme-scaffold)
    .


    ### Other Workflow Automation Tools


    Gulp and Grunt are reasonably “low level” tools, and they require you to spend
    a bit of time writing configuration files and setting them up to work with Shopify.
    There are a couple of additional workflow automation tools that I thought I should
    mention here that are either are a little more “user-friendly” or are built with
    Shopify specifically in mind:


    *   Prepos ( [`https://prepros.io/`](https://prepros.io/) ) is a cross-platform
    GUI tool for configuring and performing common preprocessing tasks with support
    for live browser reloading.

    *   CodeKit ( [`https://codekitapp.com/`](https://codekitapp.com/) ) is similar
    to Prepos but Mac-only (although the developer seems to have a better sense of
    humor).

    *   Quickshot ( [`https://quickshot.readme.io`](https://quickshot.readme.io) )
    is a command-line tool but one that is specifically targeted toward Shopify development.
    It supports precompilation, parallel uploads and downloads, and some nice additional
    features like being able to download/upload Shopify blog, page, and product content.


    ### Introducing Slate


    In the previous section, I mentioned that tools like Grunt and Gulp were “until
    recently” the best option for adding automated tasks into your theme workflow.
    In 2017, Shopify release Slate, a new command-line tool specifically focused on
    aiding the development of Shopify themes (see Figure [2-4](#A437216_1_En_2_Chapter.html#Fig4)).


    ![A437216_1_En_2_Fig4_HTML.jpg](A437216_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    The Slate documentation page at [https://​shopify.​github.​io/​slate](https://shopify.github.io/slate)


    Slate offers similar functionality to a Grunt or Gulp powered workflow: it allows
    you to develop Shopify themes using a flexible directory structure and slot preprocessing
    tasks into your development flow. It also offers some additional functionality,
    such as:


    *   Theme scaffold generation, allowing the creation of source and build directories
    for a new Shopify theme with a simple `slate theme new-theme` command.

    *   Built-in support for watching, recompiling, and uploading changes to multiple
    Shopify environments, meaning you only need to run a single `watch` process instead
    of two, as in the Grunt/Gulp and Theme Kit examples (Slate uses Theme Kit under
    the hood for this functionality).

    *   Support for live reloading of your theme in the browser, to shorten the cycle
    between making changes to code and seeing the results.

    *   Adding automated testing and style checks to your workflow.

    *   Providing reusable frontend components that are common to most Shopify themes.


    Because Slate is designed specifically for Shopify theme development, it offers
    a smoother experience than Grunt, Gulp, or other tools. While it’s still a very
    new addition to the Shopify ecosystem and there are some rough edges to iron out,
    I expect Shopify theme developers to standardize around Slate in a way we haven’t
    seen with less standard Grunt and Gulp workflows, making it easier to share reusable
    theme snippets and design patterns between projects and each other .


    For most of the example development in this book, we won’t be using Slate or any
    other build tool. The reason for this is that it adds an extra layer of indirection
    between the code we’re writing and the code running on Shopify. However, in the
    final chapter of the book, you will see how to move your example theme into a
    Slate-driven workflow, and how that plugs into a more advanced deployment process.
    Through the example GitHub repository, you’ll see the exact code changes you make
    and the commands needed to use Slate with your own themes.


    ## Summary


    This chapter covered some of the key tools you can use to develop Shopify themes
    and explained how they can help you build stores more efficiently. It covered
    local development, revision control, and workflow automation, and introduced Slate,
    a Shopify-developed tool that provides lots of functionality out of the box.'
  trans: '

    ### Grunt 和 Gulp：自动化任务运行器


    直到最近，想要在主题工作流中接入拼接（concatenation）或优化等预处理任务的最佳选择是使用任务运行器，其中最常用的两个是 `Grunt`（[`http://gruntjs.com`](http://gruntjs.com)）和
    `Gulp`（[`http://gulpjs.com`](http://gulpjs.com)）。


    这些工具对于在其他平台上工作的 Web 开发者来说可能很熟悉，但如果你之前从未见过或使用过它们，那么两者的目标都是提供一种方式，用于定义在特定情况下要执行的一系列自动化任务。在
    Shopify 主题的上下文中，这些任务的一些示例包括：


    - 优化图像资源

    - 预处理并将 `SASS` 或 `LESS` 源文件编译成最终的 CSS 样式表

    - 拼接并压缩 JavaScript

    - 将主题打包成 `.zip` 文件以便分发


    `Grunt` 和 `Gulp` 都允许你定义触发这些自动化任务的事件，因此你可以配置它们来监听主题的源文件，并在保存更改时自动执行处理步骤。在我过去为主题使用的标准设置中，我在本地处理
    Shopify 主题的目录结构类似于列表 2-6。


    ```

    /.build

    /theme

    /Gruntfile.coffee

    Listing 2-6

    The Top-Level Directory Structure of a Theme Using Grunt for a Preprocessing Workflow

    ```


    在这种配置中，顶层`/theme`目录包含我的主题源文件，其结构便于维护。例如，我不会被限制在将所有脚本和样式表资源放在一个`/assets`目录中的扁平目录结构里，而是将内容分离到`/assets/js/vendor`、`/assets/js/product`、`/assets/js/common`等目录中。`Gruntfile.coffee`定义了所有要运行的任务以及触发它们的规则，而`/.build`则包含最终“构建完成”的主题，其组织方式符合
    Shopify 期望的标准目录结构。


    当积极开发一个主题时，我会在`/.build`目录内运行 Theme Kit 的 `theme configure` 和 `theme watch` 命令，然后在顶层目录运行
    `grunt watch` 命令。当我修改`/theme`中的模板和资源时，`Grunt` 的监听任务会检测到更改，触发相应的处理任务，并将更新编译到`/.build`，Theme
    Kit 会从那里自动将更改后的文件上传到 Shopify。


    此工作流的目录布局（包括设置说明和一个标准的 `Gruntfile.coffee`，它能处理许多常见的 Shopify 构建任务，如 Sass 编译、JavaScript
    压缩、图像优化以及生成适合上传到 Shopify 的 `.zip` 文件）可免费在 [`https://github.com/discolabs/shopify-theme-scaffold`](https://github.com/discolabs/shopify-theme-scaffold)
    获取。


    ### 其他工作流自动化工具


    `Gulp` 和 `Grunt` 是相当“底层”的工具，它们需要你花一些时间编写配置文件并将其设置为可与 Shopify 一起工作。我觉得这里应该提一下另外几个工作流自动化工具，它们要么更“用户友好”，要么是专门为
    Shopify 设计的：


    - `Prepos`（[`https://prepros.io/`](https://prepros.io/)）是一个跨平台的 GUI 工具，用于配置和执行常见的预处理任务，并支持实时浏览器重载。

    - `CodeKit`（[`https://codekitapp.com/`](https://codekitapp.com/)）与 `Prepos` 类似，但仅适用于
    Mac（不过开发者似乎更有幽默感）。

    - `Quickshot`（[`https://quickshot.readme.io`](https://quickshot.readme.io)）是一个命令行工具，但它是专门针对
    Shopify 开发而设计的。它支持预编译、并行上传和下载，以及一些不错的高级功能，例如能够下载/上传 Shopify 博客、页面和产品内容。


    ### 介绍 Slate


    在上一节中，我提到像 `Grunt` 和 `Gulp` 这样的工具“直到最近”还是向主题工作流添加自动化任务的最佳选择。2017 年，Shopify 发布了
    `Slate`，这是一个新的命令行工具，专门专注于辅助 Shopify 主题的开发（见图 2-4）。


    ![A437216_1_En_2_Fig4_HTML.jpg](img/A437216_1_En_2_Fig4_HTML.jpg)


    图 2-4


    位于 [`​shopify.​github.​io/​slate`](https://shopify.github.io/slate) 的 Slate 文档页面


    `Slate` 提供了与 `Grunt` 或 `Gulp` 驱动的类似工作流：它允许你使用灵活的目录结构开发 Shopify 主题，并将预处理任务接入开发流程。它还提供了一些额外的功能，例如：


    - 主题脚手架生成，允许通过一个简单的 `slate theme new-theme` 命令为新的 Shopify 主题创建源目录和构建目录。

    - 内置支持监听、重新编译并将更改上传到多个 Shopify 环境，这意味着你只需要运行一个 `watch` 进程，而不是像 `Grunt`/`Gulp`
    和 Theme Kit 示例中那样需要运行两个进程（`Slate` 底层使用 Theme Kit 来实现此功能）。

    - 支持在浏览器中实时重载主题，以缩短修改代码和看到结果之间的循环时间。

    - 向工作流添加自动化测试和样式检查。

    - 提供大多数 Shopify 主题通用的可复用前端组件。


    由于 `Slate` 是专为 Shopify 主题开发而设计的，它提供了比 `Grunt`、`Gulp` 或其他工具更流畅的体验。虽然它仍是 Shopify
    生态系统中的一个非常新的成员，并且还有一些粗糙之处需要打磨，但我预计 Shopify 主题开发者将以我们在不太标准的 `Grunt` 和 `Gulp` 工作流中未曾见过的方式围绕
    `Slate` 实现标准化，这将使得在项目和项目之间共享可复用的主题片段和设计模式变得更加容易。


    在本书中的大多数示例开发中，我们不会使用 `Slate` 或任何其他构建工具。原因是它在我们编写的代码和 Shopify 上运行的代码之间增加了一层额外的间接层。然而，在本书的最后一章中，你将看到如何将你的示例主题迁移到由
    `Slate` 驱动的工作流中，以及如何将其接入更高级的部署流程。通过示例 GitHub 仓库，你将看到确切需要修改的代码以及使用 `Slate` 处理你自己主题所需运行的命令。


    ## 总结


    本章涵盖了一些你可以用来开发 Shopify 主题的关键工具，并解释了它们如何帮助你更高效地构建商店。它涵盖了本地开发、版本控制和工作流自动化，并介绍了 `Slate`，一个
    Shopify 开发的工具，它提供了许多开箱即用的功能。

