    PHP 支持所有主流数据库，包括 Microsoft SQL Server、Oracle 和 PostgreSQL，但它最常与开源数据库 MySQL 结合使用。根据
    DB-Engines（[`db-engines.com/en/ranking`](http://db-engines.com/en/ranking)）的数据，截至
    2014 年底，MySQL 排名为使用第二广泛的数据库。然而，围绕 MySQL 的未来存在争议，Google 和 Wikimedia 已放弃 MySQL 转而支持
    MariaDB（[`mariadb.org/`](https://mariadb.org/)）。几个领先的 Linux 发行版也已用 MariaDB 取代了
    MySQL。本章首先简要讨论这两个数据库之间竞争的影响。


    在本章中，你将学习以下内容：


    *   数据库如何存储信息

    *   选择图形界面与数据库交互

    *   创建用户帐户

    *   使用适当的数据类型定义数据库表

    *   备份数据并将其传输到另一台服务器

