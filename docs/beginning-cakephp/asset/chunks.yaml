    <p>Date Published: <?=$post[''Post''][''date''];?></p>


    <hr/>


    <p><?=$post[''Post''][''content''];?></p>


    **Creating a Model for the Blog**


    The Add and Edit actions in the Posts controller use important model functions.
    You can extend the interactions these actions have with the Post and related models
