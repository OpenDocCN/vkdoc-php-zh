    **secure**


    为了防止跨站请求伪造（CSRF）攻击，许多开发者使用哈希插入技术。简而言之，`$form->secure()`函数通过生成一个包含基于表单中其他字段的哈希值的隐藏表单字段，来辅助哈希插入。


    **`secure( fields[array] )`**


    `fields`：用于生成哈希值的字段列表


    `fields`参数是函数正确运行所必需的。在格式化数组时，请确保按模型和字段名称进行排列：


    `<?=$form->secure(array(''Post''=>array(''id'',''name''));?>`


    这将输出包含服务器端生成哈希值的隐藏输入元素：


    ```

    <fieldset style="display:none;">

    <input type="hidden" name="data[_Token][fields]" value="1932368593ef664fc975581e➥

    92e2df1490401570" id="TokenFields1314770757" />

    </fieldset>

    ```


    隐藏输入元素的值将根据`app/config/core.php`文件中设置的`Security.salt`值以及函数自身的随机化算法而变化。该哈希值可以在`$this->data`数组中的`[''_Token''][''fields'']`键下获取。


    **label**


    此函数渲染一个`<label>`元素并将其包裹在指定的输入字段周围。`$form->input()`函数在渲染输入字段时会自动调用此函数（可以在该函数的选项中禁用）。


    **`label( field[string], text[string], attributes[array] )`**


    *   `field`：要包裹`<label>`HTML元素的字段

    *   `text = null`：标签的文本


    要更改标签的类名或提供其他HTML属性设置，只需在`attributes`数组中输入这些自定义设置：


    `<?=$form->input(''Post.name'',''Title of Post'',array(''class''=>''post_label''));?>`


    **input**


    **`input( field[string], options[array] )`**


    也许没有其他辅助函数能像`$form->input()`函数那样多功能。此工具既可以用于接收数据，也可以用于发送数据；在接收数据时，它会在表单元素中显示其内容；在发送数据时，它会处理所有表单字段和命名约定，以便控制器和模型能够自动解析用户的数据。每个表单输入元素也由该函数渲染。当数据验证错误或消息被发送回视图时，该函数也会渲染这些消息并高亮显示该字段（如果需要）。坚持使用此函数，许多典型的表单结构可以被简化为更少的代码（通常只有一行）。


    **自动魔法**


    对于输入的字段，`$form->input()`函数会解释该字段，并根据找到的数据类型自动渲染表单元素。大多数情况下，尤其是在简单表单中，只需要字段名称：


    `<?=$form->input(''content'');?>`


    在这个例子中，函数会识别出数据库表中的匹配字段是一个文本字段，因此会渲染一个`<textarea>`元素及其与模型配合所需的必要参数。表9-2展示了`$form->input()`函数如何检查数据库字段类型以及它将返回什么给浏览器。


