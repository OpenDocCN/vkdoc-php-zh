  trans: "\n在最简单的使用形式下，`extract()` 函数是一种粗放的工具。除非你确切知道关联数组中的键，否则会有覆盖现有变量的风险。为克服这一问题，该函数可以接受两个可选参数：一个是八个\
    \ PHP 常量之一，用于决定在命名冲突时如何处理；另一个是可用于为变量名添加前缀的字符串。你可以在在线文档 [`www.php.net/manual/en/function.extract.php`](http://www.php.net/manual/en/function.extract.php)\
    \ 中找到这些选项的详细信息。\n\n尽管可选参数优化了 `extract()` 的行为，但使用它们却降低了函数本身提供的便利性。`extract()` 还有另一个缺点：它无法处理包含变量名中非法字符的键。例如，以下是一个完全有效的关联数组：\n\
    \n```\n$author = ['first name' => 'David', 'last name' => 'Powers'];\n```\n\n\
    尽管键包含空格，`$author['first name']` 和 `$author['last name']` 仍然是有效的。然而，将 `$author`\
    \ 数组传递给 `extract()` 将导致不会创建任何变量。这些局限性大大降低了 `extract()` 的价值。\n\n## 使用 `list()`\n\
    \n虽然括号让 `list()` 看起来像一个函数，但从技术上讲，它并不是；它是一个 PHP 语言结构，用于在单次操作中将一个变量列表赋值给一个值的数组。它自\
    \ PHP 4 起就已存在，但在 PHP 7.1 及更高版本中得到了显著增强。\n\n在 PHP 7.1 之前，`list()` 仅适用于索引数组。你按值在数组中出现的顺序列出要赋值的变量名。以下\
    \ `list_01.php` 中的示例展示了其工作原理：\n\n```\n$person = ['David', 'Powers', 'London'];\n\
    list($first_name, $last_name, $city) = $person;\n// 输出 \"David Powers lives in\
    \ London.\"\necho \"$first_name $last_name lives in $city.\";\n```\n\n在 PHP 7.1\
    \ 及更高版本中，`list()` 也可以用于关联数组。其语法与创建字面关联数组的语法类似。使用双箭头运算符将关联数组键赋值给一个变量。由于每个数组键标识其关联的值，它们不必按数组中的顺序列出，也不必使用所有键，如下面\
    \ `list_02.php` 中的示例所示：\n\n```\n$person = [\n'first name' => 'David',\n'last name'\
    \ => 'Powers',\n'city' => 'London',\n'country' => 'the UK'];\nlist('country' =>\
    \ $country,\n'last name' => $surname,\n'first name' => $name) = $person;\n// 输出\
    \ \"David Powers lives in the UK.\"\necho \"$name $surname lives in $country.\"\
    ;\n```\n\n### 对 `list()` 使用数组简写语法\n\nPHP 7.1 的另一个增强是可以在 `list()` 中使用数组简写语法。前两个示例中的变量赋值可以简化为如下形式（完整代码在\
    \ `list_03.php` 和 `list_04.php` 中）：\n\n```\n[$first_name, $last_name, $city] =\
    \ $person;\n['country' => $country, 'last name' => $surname, 'first name' => $name]\
    \ = $person;\n```\n\n## PHP 解决方案 8-10：使用生成器处理 CSV 文件\n\n本 PHP 解决方案改编了 PHP 解决方案\
    \ 7-2“从 CSV 文件中提取数据”中的脚本，以使用生成器处理 CSV 文件，并使用 `list()` 数组简写将每行生成的数组中的值赋值给变量。\n\n\
    1.  打开 `ch08` 文件夹中的 `csv_processor.php`。它包含一个名为 `csv_processor()` 的生成器的定义如下：\n\
    \n```\n    // 将 CSV 文件的每一行作为数组生成的生成器\n    function csv_processor($csv_file) {\n\
    \    if (@!$file = fopen($csv_file, 'r')) {\n    echo \"无法打开 $csv_file。\";\n \
    \   return;\n    }\n    while (($data = fgetcsv($file)) !== false) {\n    yield\
    \ $data;\n    }\n    fclose($file);\n    }\n    ```\n\n    该生成器接受一个参数，即 CSV 文件的名称。它使用第\
    \ 7 章中描述的文件操作函数以读取模式打开文件。如果文件无法打开，错误控制运算符（`@`）会抑制任何 PHP 错误消息，显示自定义消息并返回，从而阻止进一步处理文件的尝试。\n\
    \n    假设文件成功打开，`while` 循环将每次向 `fgetcsv()` 函数传递一行，该函数将数据作为数组返回，并由生成器生成。当循环结束时，文件被关闭。\n\
    \n    这是一个方便的工具函数，可用于处理任何 CSV 文件。\n\n2.  在 `ch08` 文件夹中创建一个名为 `csv_list.php` 的文件，并包含\
    \ `csv_processor.php`：\n\n```\n    require_once './csv_processor.php';\n    ```\n\
    \n3.  在 `ch08/data` 文件夹中，`scores.csv` 包含以下以逗号分隔值存储的数据：\n\n```\n    Home team,Home\
    \ score,Away team,Away score\n    Arsenal,2,Newcastle United,0\n    Tottenham\
    \ Hotspur,2,Crystal Palace,0\n    Watford,4,Fulham,1\n    Manchester City,2,Cardiff\
    \ City,0\n    Southampton,1,Liverpool,3\n    Wolverhampton Wanderers,2,Manchester\
    \ United,1\n    ```\n\n4.  通过创建 `csv_processor()` 生成器的实例来加载 CSV 文件中的数据，如下所示：\n\
    \n```\n    $scores = csv_processor('./data/scores.csv');\n    ```\n\n5.  使用生成器最简单的方式是使用\
    \ `foreach` 循环。每次循环运行时，生成器将 CSV 文件的当前行作为索引数组生成。使用 `list()` 数组简写将数组值赋值给变量，然后使用\
    \ `echo` 显示它们，如下所示：\n\n```\n    foreach ($scores as $score) {\n    [$home, $hscore,\
    \ $away, $ascore] = $score;\n    echo \"$home $hscore:$ascore $away\";\n    }\n\
    \    ```\n\n6.  保存文件并通过在浏览器中加载来运行脚本。或者，使用 `ch08` 文件夹中的 `csv_list_01.php`。如图 8-12\
    \ 所示，输出包含 CSV 文件中的列标题行。\n\n    ![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig12_HTML.jpg](img/332054_4_En_8_Fig12_HTML.jpg)\n\
    \n    **图 8-12.** 生成器处理 CSV 文件的每一行，包括列标题。\n\n7.  使用 `foreach` 循环的问题在于它会处理 CSV\
    \ 文件中的每一行。我们可以在每次循环运行时递增一个计数器，并使用 `continue` 关键字跳过第一行。然而，生成器有内置方法，允许我们在要生成的值之间移动并检索当前值。按如下方式编辑步骤\
    \ 5 中的代码（更改以粗体突出显示）：\n\n```\n    $scores->next();\n    while ($scores->valid())\
    \ {\n    [$home, $hscore, $away, $ascore] = $scores->current();\n    echo \"$home\
    \ $hscore:$ascore $away\";\n    $scores->next();\n    }\n    ```\n\n    修改后的代码使用\
    \ `while` 循环代替了 `foreach` 循环，该循环调用生成器的 `valid()` 方法。只要生成器至少还有一个值要生成，该方法就返回 `true`。因此，这具有遍历正在处理的\
    \ CSV 文件中每一行的效果。\n\n    要跳过第一行，在循环开始前调用 `next()` 方法。顾名思义，这会将生成器移动到下一个可用的值。在循环内部，`current()`\
    \ 方法返回当前值，而 `next()` 方法移动到下一个值，为循环的下一次运行做准备。\n\n8.  保存文件并再次运行脚本（代码在 `csv_list_02.php`\
    \ 中）。这次只显示比分，如图 8-13 所示。\n\n    ![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig13_HTML.jpg](img/332054_4_En_8_Fig13_HTML.jpg)\n\
    \n    **图 8-13.** 在遍历其余值之前，第一行已被跳过。\n"
- fmt: "# Unpacking arguments from an array with the Splat Operator\n\nThe splat operator\
    \ (`...`) that was introduced briefly in Chapter [4](#332054_4_En_4_Chapter.xhtml)\
    \ has two roles, namely:\n\n- When used in a function definition, it converts\
    \ multiple arguments into an array that can be used inside the function.\n- When\
    \ invoking a function, it unpacks an array of arguments and applies them to the\
    \ function’s parameters.\n\nThe example in Chapter [4](#332054_4_En_4_Chapter.xhtml)\
    \ demonstrated the first way in which the splat operator can be used. The following\
    \ function definition allows an arbitrary number of arguments to be passed to\
    \ the function and to be handled inside the function as an array:\n\n```\nfunction\
    \ addEm(...$nums) {\n    return array_sum($nums);\n}\n```\n\nThe second way in\
    \ which the splat operator works does the reverse. Instead of converting an arbitrary\
    \ number of arguments into an array, it treats the elements of an array as if\
    \ they were passed individually to a function. The following PHP solution shows\
    \ a simple example of how this can be of practical value.\n\n## PHP Solution 8-11:\
    \ Processing a CSV File with the Splat Operator\n\nThe `fgetcsv()` function returns\
    \ the data from a CSV file as an indexed array. This PHP solution shows how the\
    \ splat operator can be used to pass the array directly to a function that requires\
    \ multiple arguments without the need to separate the individual elements. It\
    \ also uses the `csv_processor()` generator described in the previous PHP solution.\n\
    \n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig14_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Fig14_HTML.jpg)\n\
    \n**Figure 8-14.** Each data array has been processed by passing it directly to\
    \ the function with the splat operator\n\n1.  Create a file called `csv_splat.php`\
    \ in the `ch08` folder and include `csv_processor.php`:\n\n    ```\n    require_once\
    \ './csv_processor.php';\n    ```\n\n2.  In the `ch08/data` folder, `weather.csv`\
    \ contains the following data:\n\n    ```\n    City,temp\n    London,11\n    Paris,10\n\
    \    Rome,12\n    Berlin,8\n    Athens,19\n    ```\n\n    The temperatures are\
    \ in degrees Celsius. For the benefit of people who believe that water freezes\
    \ at 32° rather than 0°, we need to process this data in a user-friendly way.\n\
    \n3.  In `csv_splat.php`, add the following function definition (the code is in\
    \ `csv_splat_01.php`):\n\n    ```\n    function display_temp($city, $temp) {\n\
    \        $tempF = round($temp/5*9+32);\n        return \"$city: $temp&deg;C ($tempF&deg;F)\"\
    ;\n    }\n    ```\n\n    The function takes two arguments: the name of a city\
    \ and a temperature. The temperature is converted to Fahrenheit using the standard\
    \ formula (divide by 5, multiply by 9, and add 32) and rounded to the nearest\
    \ integer.\n\n    The function then returns a string consisting of the city name\
    \ and temperature in degrees Celsius followed by the Fahrenheit equivalent in\
    \ parentheses.\n\n4.  The CSV file containing the data begins with a row of column\
    \ titles, so we need to skip the first row using the same technique as in the\
    \ previous solution. Load the data into the `csv_processor()` generator and skip\
    \ the first line like this:\n\n    ```\n    $cities = csv_processor('./data/weather.csv');\n\
    \    $cities->next();\n    ```\n\n5.  Use a `while` loop to process the remaining\
    \ lines of data with the `display_temp()` function and splat operator like this:\n\
    \n    ```\n    while ($cities->valid()) {\n        echo display_temp(...$cities->current())\
    \ . '';\n        $cities->next();\n    }\n    ```\n\n    As in the previous solution,\
    \ the generator’s `current()` method returns the current line of data as an array.\
    \ However, this time, instead of assigning each array element to a variable, the\
    \ splat operator unpacks the array and assigns the values as arguments in the\
    \ same order as they appear in the array.\n\n    If you find this code difficult\
    \ to understand, assign the return value from the `current()` method to a variable\
    \ first like this:\n\n    ```\n    $data = $cities->current();\n    echo display_temp(...$data)\
    \ . '';\n    ```\n\n    Preceding the array passed as the argument to the function\
    \ with the splat operator has exactly the same effect as this (the code is in\
    \ `csv_splat_02.php`):\n\n    ```\n    [$city, $temp] = $cities->current();\n\
    \    echo display_temp($city, $temp) . '';\n    ```\n\n    Figure [8-14](#332054_4_En_8_Chapter.xhtml#Fig14)\
    \ shows the result of using either technique.\n\nUsing the splat operator to unpack\
    \ an array of arguments has the advantage of conciseness, but shorter code isn’t\
    \ always the most readable, which can make it difficult to debug when you don’t\
    \ get the results you expected. Personally, I think that assigning array elements\
    \ to variables and then passing them explicitly as arguments is a safer approach.\
    \ But even if you don’t use a particular technique, it’s useful to understand\
    \ how it works in case you need to work with other people’s code.\n\n## Chapter\
    \ Review\n\nWorking with arrays is one of the most common tasks in PHP, particularly\
    \ when working with a database. Nearly all results from a database query are returned\
    \ as an associative array, so it’s important to understand how to process them.\
    \ In this chapter, we’ve looked at modifying arrays, merging them, sorting, and\
    \ extracting data. The main point to remember about using an array in a loop is\
    \ that PHP always works on a copy of the array unless you pass the values into\
    \ the loop by reference. By contrast, the functions that sort functions work on\
    \ the original array.\n\nYou can find full details of all array-related functions\
    \ in the PHP online documentation at [`www.php.net/manual/en/ref.array.php`](http://www.php.net/manual/en/ref.array.php).\
    \ This chapter has shown practical examples of using roughly half of them, putting\
    \ you well on the way to becoming an expert in handling arrays in PHP.\n\n# 9.\
    \ Uploading Files\n\nPHP’s ability to handle forms isn’t restricted to text. It\
    \ can also be used to upload files to a server. For instance, you could build\
    \ a real estate web site for clients to upload pictures of their properties or\
    \ a site for all your friends and relatives to upload their holiday photos. However,\
    \ just because you can do it doesn’t necessarily mean that you should. Allowing\
    \ others to upload material to your web site could expose you to all sorts of\
    \ problems. You need to make sure that images are the right size, that they’re\
    \ of suitable quality, and that they don’t contain any illegal material. You also\
    \ need to ensure that uploads don’t contain malicious scripts. In other words,\
    \ you need to protect your web site just as carefully as your own computer.\n\n\
    PHP makes it relatively simple to restrict the type and size of files accepted.\
    \ What it cannot do is check the suitability of the content. Think carefully about\
    \ security measures, such as restricting uploads to registered and trusted users\
    \ by placing the upload form in a password-protected area.\n\nUntil you learn\
    \ how to restrict access to pages with PHP in Chapters [11](#332054_4_En_11_Chapter.xhtml)\
    \ and [19](#332054_4_En_19_Chapter.xhtml), use the PHP solutions in this chapter\
    \ only in a password-protected directory if deployed on a public web site. Most\
    \ hosting companies provide simple password protection through the site’s control\
    \ panel.\n\nThe first part of this chapter is devoted to understanding the mechanics\
    \ of file uploads, which will make it easier to understand the code that follows.\
    \ This is a fairly intense chapter, not a collection of quick solutions. But by\
    \ the end of the chapter, you will have built a PHP class capable of handling\
    \ single and multiple file uploads. You can then use the class in any form by\
    \ writing only a few lines of code.\n\nYou’ll learn about the following:\n\n-\
    \ Understanding the `$_FILES` array\n- Restricting the size and type of uploads\n\
    - Preventing files from being overwritten\n- Handling multiple uploads"
