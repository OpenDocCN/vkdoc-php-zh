    **Figure 3-2.** *Cake’s scaffolding feature rendering a list view of the* `items`
    *table* Notice that no items appear in this list view; you haven’t created any
    yet. Normally, you would have to go into the Items controller, create a new function
    named `add()`, and then specify each operation for adding a new record in the
    `items` table. But Cake’s scaffolding will handle all the CRUD operations for
    you. You can see the link on the screen named New Item.


    Click it, and you will have a complete add view generated by the scaffold (see
    Figure 3-3).


    Scaffolding is useful because in one line of code you can translate typical database-handling
    methods into a web interface. In a short amount of time, you can interact with
    the database through your Cake application and, consequently, the browser as well.
    Later, you’ll build more dynamic schemes that will use multiple tables simultaneously,
    and the scaffolding will tell you quickly whether you’ve effectively linked the
    associations in the models.


    Valuable as it is, Cake’s scaffolding does have some limitations. For example,
    you cannot easily change the look or order of the fields in the forms. To do that,
    you need to generate a different view file separate from the scaffolding views,
    which would also require you to write the whole `add()` and `edit()` functions
    in the Items controller. For this and other reasons, the scaffold feature is not
    intended for production-level output. You will discover more about its utility,
    however, as you create more elaborate skeletons from which to build more powerful
    applications.


