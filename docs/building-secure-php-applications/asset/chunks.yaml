  trans: '

    ### 通用设置


    一些常见的 PHP 配置设置包括 `display_errors`（用于控制错误报告）、`max_execution_time`（用于限制脚本执行时间）、`memory_limit`（用于限制内存使用）等等。再次以我们的柠檬水摊位为例。`display_errors`
    就像决定是否要在顾客面前放一个写着“哎呀，我们的柠檬用完了！”的牌子。`max_execution_time` 就像为搅拌柠檬水设置一个计时器。`memory_limit`
    就像限制我们一次可以使用的柠檬数量。


    理解 PHP 配置有助于我们优化 Web 应用程序的性能和安全性，确保它们按预期工作。然而，我们在修改配置设置时应保持谨慎，因为错误的配置可能导致安全漏洞或应用程序出现意外行为。现在，我们对
    PHP 中的配置是什么以及它们如何工作有了基本的了解，接下来让我们重点了解其中一些配置如何帮助我们增强安全性。如需更全面地查看所有可用的配置，我们随时可以查阅
    PHP 手册。


    如需全面查看所有可用配置，可以参考 [PHP 手册](https://www.php.net/manual/en/ini.core.php)。


    PHP 配置在增强 Web 应用程序的安全性方面发挥着重要作用。正确配置 PHP 设置有助于保护您的应用程序免受各种安全威胁和漏洞的侵害。让我们讨论一些具体的示例，说明
    PHP 配置如何提高安全性。


    ### 错误报告（`display_errors`、`error_reporting`）


    正确配置错误报告设置有助于防止敏感信息暴露给潜在的攻击者。通过将 `display_errors` 设置为 “Off”，并将 `error_reporting`
    配置为仅报告必要的错误，您可以确保错误消息不会泄露有关应用程序的关键信息，例如数据库凭据或服务器路径。


    例如：假设您的网站是一家带有后台办公室的商店，员工在其中工作。如果办公室的门（错误报告）大敞四开，任何人都能看见里面，那么顾客可能会无意中看到敏感信息，比如员工排班表或库存水平。通过关上门（将
    `display_errors` 设置为 “Off”）并只允许必要的员工进入（明智地使用 `error_reporting`），您可以确保这些信息的安全。


    ![](img/609480_1_En_2_Figa_HTML.jpg)


    示例：


    ```php

    display_errors = Off

    error_reporting = E_ALL & ~E_NOTICE & ~E_WARNING

    ```


    接下来，让我们从安全含义的角度，逐一审视图 2-3 中的每个 PHP 配置设置。


    ### `expose_php = Off`


    将 `expose_php` 设置为 “Off” 是一项安全最佳实践。当暴露时，诸如 PHP 版本和服务器信息等 PHP 信息可能会在 HTTP 响应头中可见。攻击者可以利用这些信息来识别潜在的漏洞或过时的软件。通过关闭
    PHP 的暴露，您可以增加攻击者收集服务器配置信息的难度。


    例如：假设您的门牌号（PHP 版本）醒目地显示在前门上。如果一个小偷知道哪些房子根据门牌号配备了过时的安全系统，他们就会瞄准这些房子。通过隐藏您的门牌号（将
    `expose_php` 设置为 “Off”），您可以让小偷更难搞清楚您的安全设置。


    ![](img/609480_1_En_2_Fig3_HTML.jpg)


    图 2-3


    显示 PHP 版本信息暴露的请求-响应序列


    ### `error_reporting = E_ALL`


    此设置配置错误报告的级别。将其设置为 `E_ALL` 是相当宽松的，它将报告所有类型的错误，包括通知和警告。虽然这对于开发和调试很有价值，但在生产环境中，您可能希望将错误报告降低到更低的级别（例如
    `error_reporting = E_ERROR`），以避免泄露潜在的敏感信息。减少错误报告有助于防止披露详细的错误消息，这些消息可能被攻击者用来深入了解您的应用程序结构。


    例如：假设您经营一家餐厅，在培训期间（开发环境），您允许员工公开讨论所有错误以改进服务（错误报告设置为 `E_ALL`）。然而，在有顾客在场的晚餐服务期间（生产环境），您只想处理需要立即关注的关键问题（错误报告设置为
    `E_ERROR`），以维持专业和安全的环境，防止顾客无意中听到任何内部问题。


    ### `display_errors = Off`


    此设置控制 PHP 是否在浏览器中显示错误消息。在生产环境中将 `display_errors` 设置为 “Off” 对安全性至关重要。当错误在浏览器中显示时，可能会泄露有关代码的敏感信息，例如文件路径和变量值。关闭错误显示可确保此类细节不会暴露给用户或攻击者。


    例如：假设您的网站是一个餐厅厨房。在员工培训期间（开发环境），您可能会公开讨论错误以便从中学习。但在繁忙的晚餐服务期间（生产环境），您不希望顾客（用户）看到或听到这些讨论，因为这可能会泄露有关您操作的敏感信息。通过关闭错误显示（`display_errors
    = Off`），您可以将此类细节隐藏起来，维持一个专业且安全的环境。


    ### `display_startup_errors = Off`


    与 `display_errors` 类似，`display_startup_errors` 控制 PHP 是否显示 PHP 脚本启动期间（例如在 PHP
    配置文件中）发生的错误。出于安全考虑，建议将此设置保持为 “Off”，以防止暴露可能包含与服务器配置相关的敏感信息的错误。


    例如：假设您的网站是一家餐厅，厨房的准备工作（PHP 启动）对于一天的运营至关重要。在准备阶段，可能会出错，但您不希望顾客（用户）看到厨房员工（服务器配置错误）在处理这些问题。通过将
    `display_startup_errors` 设置为“Off”，您可以确保任何初始设置问题都不会暴露给公众，保持安全且专业的形象。


    ### `log_errors = On`


    启用 `log_errors` 是一项安全最佳实践。当设置为 “On” 时，PHP 会将错误记录到 `error_log`（即下一个设置）指定的文件中。记录错误对于安全和故障排除至关重要，因为它允许您跟踪和审查错误，而无需向最终用户公开。它提供了问题的记录，可用于分析和调试，同时确保信息安全，远离窥探。


    假设您的网站是一所学校，当出现问题时，老师会将其记录在一个私人笔记本（错误日志）中。这样，老师可以在事后回顾问题并找到解决方案，而学生（用户）则不会知晓这些问题。通过将
    `log_errors` 设置为 “On”，您可以确保问题被安全地记录下来，以便日后分析和修复，同时不会向用户泄露敏感信息。

    '
- fmt: '### `error_log = /valid_path/PHP-logs/php_error.log`


    This setting determines the path to the error log file where PHP errors will be
    written. It’s important for security to specify a valid and secure path. The specified
    directory and file should only be accessible to authorized personnel. Avoid placing
    error logs in web-accessible directories to prevent attackers from potentially
    accessing them.


    Imagine your website is a library, and the error log is a special book where the
    librarian (server) writes down any problems. You wouldn’t leave this book on a
    public table where anyone can read it. Instead, you keep it in a secure office
    where only the librarian (authorized personnel) can access it. By setting `error_log`
    to a secure path, you ensure that only trusted individuals can see and review
    the problems.


    ### `ignore_repeated_errors = Off`


    When set to `Off`, `ignore_repeated_errors` means that PHP will report repeated
    errors. This can be valuable for identifying patterns of errors that may indicate
    a potential security issue. In a security context, you might want to leave this
    setting as `Off` to ensure that repeated errors are not ignored, allowing you
    to investigate and address potential security vulnerabilities.


    Imagine your website is a school, and every time a student reports the same problem,
    the teacher writes it down in a notebook (error log). If the teacher ignored repeated
    reports (setting `ignore_repeated_errors` to `On`), they might miss a bigger issue,
    like a broken swing in the playground. By keeping this setting `Off`, the teacher
    can see if the same problem is reported multiple times and can take action to
    fix it, ensuring a safer environment for everyone.


    The configuration settings you’ve provided demonstrate best practices for enhancing
    the security of a PHP environment. They help in reducing the exposure of sensitive
    information, logging errors for review and analysis, and ensuring that important
    errors are not ignored, which can be crucial for identifying security issues.


    ### File Inclusion (`allow_url_fopen`, `allow_url_include`)


    These settings control whether PHP can include files from remote locations via
    URLs. Allowing remote file inclusions can be a significant security risk, as it
    can be exploited to execute arbitrary code on the server. By setting both `allow_url_fopen`
    and `allow_url_include` to `Off`, you prevent PHP from including files from external
    sources.


    Imagine your website is a school’s computer lab. If you let students download
    and run any software from the Internet (allowing remote file inclusion), it could
    introduce viruses or malicious programs. By setting `allow_url_fopen` and `allow_url_include`
    to `Off`, you’re ensuring that only approved and safe software from within the
    school’s network can be used, keeping the computers secure.


    Example:


    ```php

    allow_url_fopen = Off

    allow_url_include = Off

    ```


    ### SQL Injection Prevention (`magic_quotes_gpc`, `mysqli`)


    While `magic_quotes_gpc` is deprecated in newer PHP versions, it used to automatically
    escape data from external sources (e.g., form inputs) to help prevent SQL injection
    attacks. Modern PHP applications should use prepared statements and parameterized
    queries with extensions like `mysqli` or `PDO` (PHP Data Objects) to prevent SQL
    injection.


    Imagine your website is a restaurant, and customers (users) place orders by writing
    their choices on paper slips (form inputs). If you simply take these slips and
    pass them directly to the chef (database), someone might write something harmful
    or misleading (SQL injection). Instead, you can use a special translator (prepared
    statements) to read the slips and ensure everything is safe and understandable
    before the chef sees them. This way, you prevent any harmful or misleading orders
    from reaching the kitchen.


    Example (for older PHP versions):


    ```php

    magic_quotes_gpc = Off

    ```


    ### File Uploads (`upload_max_filesize`, `post_max_size`)


    Configuring the maximum file size and handling of file uploads is essential to
    prevent malicious file uploads. By setting appropriate limits on `upload_max_filesize`
    and `post_max_size`, you can prevent users from uploading oversized files that
    could potentially harm your server or application.


    Imagine your website is a community art gallery where people can submit their
    artwork (file uploads). If you let anyone bring in huge sculptures (oversized
    files), it could overcrowd the gallery and cause problems. By setting size limits
    on submissions, like allowing only paintings up to a certain size, you ensure
    the gallery remains manageable and secure. Similarly, setting `upload_max_filesize`
    and `post_max_size` ensures that uploads are within a safe and manageable size.


    ![](images/609480_1_En_2_Chapter/609480_1_En_2_Figb_HTML.jpg)


    Example:


    ```php

    upload_max_filesize = 5M

    post_max_size = 8M

    ```


    Let’s go through each of the PHP configuration settings in the figure above in
    the context of their security implications.


    ### `file_uploads = On`


    This setting controls whether file uploads are allowed in your PHP application.
    Setting it to `On` enables file uploads, while `Off` disables them.


    Enabling file uploads without proper validation and controls can introduce significant
    security risks. It opens the door to potential file upload vulnerabilities, including
    allowing malicious files to be uploaded to your server.


    If file uploads are necessary for your application, you should implement strong
    validation, including checking file types, limiting file size, and storing uploaded
    files in a secure location. Additionally, consider using the `move_uploaded_file()`
    function to store uploaded files securely.


    For example, imagine your website is a school art contest where students can submit
    their drawings (file uploads). If you allow any type of drawing without checking,
    someone might submit inappropriate or harmful content (malicious files). To keep
    the contest safe, you need to check that the drawings are appropriate (valid file
    types), not too large (file size limits), and stored safely in a secure gallery
    (secure location). Using the `move_uploaded_file()` function is like having a
    secure process to move and store the drawings where only authorized staff can
    access them.


    ### `upload_tmp_dir = /path/PHP-uploads/`


    This setting specifies the temporary directory where uploaded files are stored
    before they are moved to their final destination.


    If the specified temporary directory is not properly secured, it can be a potential
    target for attackers. Malicious users could upload files that, even if not executed,
    might cause other security issues in the temporary directory.


    Ensure that the `upload_tmp_dir` directory is properly configured and secured.
    It should not be accessible via the Web, and access permissions should be restricted
    to the PHP process for read and write operations.


    For example, imagine your website is a delivery service where packages (files)
    are temporarily stored in a sorting area (temporary directory) before being delivered
    to their final destination. If the sorting area is not secure, anyone could tamper
    with the packages, causing problems. To prevent this, you secure the sorting area
    so only authorized staff (PHP process) can access and handle the packages, ensuring
    they are safe until they reach their final destination.'
  raw: '### “error_log = /valid_path/PHP-logs/php_error.log”


    This setting determines the path to the error log file where PHP errors will be
    written. It’s important for security to specify a valid and secure path. The specified
    directory and file should only be accessible to authorized personnel. Avoid placing
    error logs in web-accessible directories to prevent attackers from potentially
    accessing them.


    Imagine your website is a library, and the error log is a special book where the
    librarian (server) writes down any problems. You wouldn’t leave this book on a
    public table where anyone can read it. Instead, you keep it in a secure office
    where only the librarian (authorized personnel) can access it. By setting error_log
    to a secure path, you ensure that only trusted individuals can see and review
    the problems.


    ### “ignore_repeated_errors = Off”


    When set to “Off,” ignore_repeated_errors means that PHP will report repeated
    errors. This can be valuable for identifying patterns of errors that may indicate
    a potential security issue. In a security context, you might want to leave this
    setting as “Off” to ensure that repeated errors are not ignored, allowing you
    to investigate and address potential security vulnerabilities.


    Imagine your website is a school, and every time a student reports the same problem,
    the teacher writes it down in a notebook (error log). If the teacher ignored repeated
    reports (setting ignore_repeated_errors to “On”), they might miss a bigger issue,
    like a broken swing in the playground. By keeping this setting “Off,” the teacher
    can see if the same problem is reported multiple times and can take action to
    fix it, ensuring a safer environment for everyone.


    The configuration settings you’ve provided demonstrate best practices for enhancing
    the security of a PHP environment. They help in reducing the exposure of sensitive
    information, logging errors for review and analysis, and ensuring that important
    errors are not ignored, which can be crucial for identifying security issues.


    ### File Inclusion (“allow_url_fopen”, “allow_url_include”)


    These settings control whether PHP can include files from remote locations via
    URLs. Allowing remote file inclusions can be a significant security risk, as it
    can be exploited to execute arbitrary code on the server. By setting both allow_url_fopen
    and allow_url_include to “Off,” you prevent PHP from including files from external
    sources.


    Imagine your website is a school’s computer lab. If you let students download
    and run any software from the Internet (allowing remote file inclusion), it could
    introduce viruses or malicious programs. By setting allow_url_fopen and allow_url_include
    to “Off,” you’re ensuring that only approved and safe software from within the
    school’s network can be used, keeping the computers secure.


    Example:


    ```

    ```php

    allow_url_fopen = Off

    allow_url_include = Off

    ```

    ```


    ### SQL Injection Prevention (“magic_quotes_gpc”, “mysqli”)


    While magic_quotes_gpc is deprecated in newer PHP versions, it used to automatically
    escape data from external sources (e.g., form inputs) to help prevent SQL injection
    attacks. Modern PHP applications should use prepared statements and parameterized
    queries with extensions like mysqli or PDO (PHP Data Objects) to prevent SQL injection.


    Imagine your website is a restaurant, and customers (users) place orders by writing
    their choices on paper slips (form inputs). If you simply take these slips and
    pass them directly to the chef (database), someone might write something harmful
    or misleading (SQL injection). Instead, you can use a special translator (prepared
    statements) to read the slips and ensure everything is safe and understandable
    before the chef sees them. This way, you prevent any harmful or misleading orders
    from reaching the kitchen.


    Example (for older PHP versions):


    ```

    ```php

    magic_quotes_gpc = Off

    ```

    ```


    ### File Uploads (“upload_max_filesize”, “post_max_size”)


    Configuring the maximum file size and handling of file uploads is essential to
    prevent malicious file uploads. By setting appropriate limits on upload_max_filesize
    and post_max_size, you can prevent users from uploading oversized files that could
    potentially harm your server or application.


    Imagine your website is a community art gallery where people can submit their
    artwork (file uploads). If you let anyone bring in huge sculptures (oversized
    files), it could overcrowd the gallery and cause problems. By setting size limits
    on submissions, like allowing only paintings up to a certain size, you ensure
    the gallery remains manageable and secure. Similarly, setting upload_max_filesize
    and post_max_size ensures that uploads are within a safe and manageable size.


    ![](images/609480_1_En_2_Chapter/609480_1_En_2_Figb_HTML.jpg)


    Example:


    ```

    ```php

    upload_max_filesize = 5M

    post_max_size = 8M

    ```

    ```


    Let’s go through each of the PHP configuration settings in the figure above in
