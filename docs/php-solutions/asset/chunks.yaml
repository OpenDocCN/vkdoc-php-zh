    \n## PHP：快速参考\n\n以下各节并不试图涵盖 PHP 语法的所有方面。为此，你应该参考 [`http://php.net/manual/en/`](http://php.net/manual/en/)\
    \ 上的 PHP 文档，或查阅更详细的参考书，例如 W. Jason Gilmore 所著的 *Beginning PHP and MySQL: From\
    \ Novice to Professional, Fourth Edition*（Apress, 2010，ISBN: 978-1-4302-3114-1）。\n\
    \n### 在现有网站中使用 PHP\n\n在同一网站中混合使用 `.html` 和 `.php` 页面是没有问题的。但是，PHP 代码通常仅在具有 `.php`\
    \ 文件扩展名的文件中才会被处理，因此，即使并非所有页面都包含动态功能，最好也为所有页面使用相同的扩展名。这样，你就可以灵活地向页面添加 PHP，而不会破坏现有链接或丢失搜索引擎排名。\n\
    \n### PHP 中的数据类型\n\nPHP 是一种所谓的弱类型语言。实际上，这意味着与某些其他计算机语言（例如 Java 或 C#）不同，PHP 不关心你在变量中存储什么类型的数据。\n\
