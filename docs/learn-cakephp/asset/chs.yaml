- '# Bake 背后的魔法


  CakePHP 团队运用了大量巧妙的编程工具，才打造出像 `bake` 这样便捷的工具。如前面的示例所示，它确实能为我们编写代码。


  当我们烘焙模型时，它会检测数据库字段类型，并据此创建实体类和模型类。实体对象代表数据库中的一行，而模型对象则代表数据库表，包含其关联关系、验证规则和方法。由于模型继承了
  CakePHP 的 `Table` 类，它们也继承了许多有用的方法。这就是为什么我们可以直接使用像 `get`、`save` 和 `delete` 这样的方法，而无需自己创建它们。这些方法是由框架本身提供的。


  当我们烘焙控制器时，会生成 `index`、`edit`、`view` 和 `delete` 这些最常用的操作方法。这些方法会使用到相关的模型。


  烘焙还会为所有控制器方法生成视图。例如，对于 `index` 方法，就会生成对应的 index 视图。在视图中，我们能够访问那些在控制器中设置的变量。


  正如你所见，通过继承和 `bake`，我们直接从“烤箱”里得到了很多东西。不过，有一点你需要牢记在心：由 `bake` 生成的代码只是为了让你尽快得到一个可运行的基础骨架。它不会处理权限或用户认证问题，因此任何人都可以创建和删除东西。CakePHP
  对这些功能也提供了良好的支持，但它们并不会由 `bake` 自动生成。


