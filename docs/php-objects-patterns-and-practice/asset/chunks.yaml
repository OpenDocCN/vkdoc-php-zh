    \ count(self::$types)) - 1;\n        $class = __NAMESPACE__ . \"\\\\\".self::$types[$num];\n\
    \        return new $class($name);\n    }\n    public function __construct(string\
    \ $name)\n    {\n        $this->name = $name;\n    }\n    abstract public function\
    \ fire();\n}\n// listing 09.09\n// new Employee class...\nclass WellConnected\
