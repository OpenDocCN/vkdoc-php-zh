  trans: "\n1. 赋值运算符（`=`）将获取表达式右侧的值（`1`），并将其放入表达式左侧的变量（`$my_num`）中。如果该变量不存在，它将被创建在内存中。\n\
    \n```php\n$my_num = 1;\n```\n\n2. 以下两个语句都将表达式右侧的值（`$my_num`）添加到表达式左侧变量（`$value`）中已有的内容。如果该变量之前不存在，则向右侧的值加零，并将结果放入变量（`$value`）中。如果变量中存在字符串，则在相加之前会尝试将其转换为数字。\n\
    \n```php\n$value += $my_num;\n$value = $value + $my_num;\n```\n\n3. 此语句与 #2 类似，不同之处在于从变量中包含的值中减去右侧的值。如果该变量之前不存在，则从\
    \ 0 中减去右侧的值（`$my_num`）。如果变量中存在字符串，则在相减之前会尝试将其转换为数字。\n\n```php\n$value -= $my_num;\n\
    $value = $value - $my_num;\n```\n\n4. 此语句与 #3 类似，不同之处在于执行乘法而非减法。如果该变量之前不存在，则右侧的值（`$my_num`）乘以\
    \ 0。如果变量中存在字符串，则在相乘之前会尝试将其转换为数字。\n\n```php\n$value *= $my_num;\n$value = $value\
    \ * $my_num;\n```\n\n5. 此语句与 #4 类似，不同之处在于将右侧的值（`$my_num`）除以变量中包含的值。除法将返回一个浮点数，除非两个值都是整数且能整除（没有小数部分）。如果变量中存在字符串，则在相除之前会尝试将其转换为数字。\n\
    \n*注意：如果变量 `$my_num` 不存在，它将被设置为 0。这将导致抛出异常，因为不能除以零！*\n\n```php\n$value /= $my_num;\n\
    $value = $value / $my_num;\n```\n\n注意：PHP 8 提供了函数 `fdiv()`，它在除以零时会返回 `INF`（无穷大）、`-INF`（负无穷大）或\
    \ `NAN`（非数字），而不是抛出异常。\n\n6. 此语句与 #5 类似，不同之处在于将除法的余数放入变量中。如果变量中存在字符串，则在取模之前会尝试将其转换为数字。\n\
    \n*注意：如果变量 `$my_num` 不存在，它将被设置为 0。这将导致抛出异常，因为不能除以零！*\n\n```php\n$value %= $my_num;\n\
    $value = $value % $my_num;\n```\n\n7. 此语句将 `$value` 提升到 `$my_num` 中包含的幂次，并将结果放回\
    \ `$value`。\n\n```php\n$value = $value ** $my_num;\n```\n\n8. 变量可以在使用前进行**递增/递减**（`++$num`，`--$num`），也可以在使用后进行（`$num++`，`$num--`）。\n\
