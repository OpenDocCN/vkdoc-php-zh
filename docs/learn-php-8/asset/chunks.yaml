    \    3.  Determines whether a class output is numeric\n    4.  Converts a string\
    \ value to an integer\n\n11. PEAR is an acronym for\n    1.  PHP Extends and Applies\
    \ Registry\n    2.  PHP Excellence in Applied Requirements\n    3.  PHP Extension\
    \ and Application Repository\n    4.  Properties of Extension and Application\
    \ Registry\n\n12. Creating `set` methods inside classes\n    1.  Allows properties\
