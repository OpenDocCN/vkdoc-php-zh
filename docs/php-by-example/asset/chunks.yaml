    ## 嵌套的 try-catch 构造与 finally 块


    `try-catch` 构造可以嵌套。如果在内部 `try-catch` 构造中抛出的异常未被其处理，则该异常会被传递给外部 `try-catch` 构造进行处理。此外，`try-catch`
