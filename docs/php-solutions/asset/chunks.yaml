- fmt: "### Working with Dates in PHP\n\nThe way PHP handles dates and time underwent\
    \ major changes in PHP 5.2 with the introduction of the `DateTime` and `DateTimeZone`\
    \ classes. Further changes were introduced in PHP 5.3 through the addition of\
    \ new `DateTime` methods and the `DateInterval` and `DatePeriod` classes. Yet\
    \ another enhancement came in PHP 5.5 with the addition of the `DateTimeImmutable`\
    \ class. Prior to these changes, dates and time were handled exclusively as Unix\
    \ timestamps—the number of seconds since midnight UTC (Coordinated Universal Time)\
    \ on January 1, 1970.\n\nThe new classes don’t entirely replace the original ways\
    \ of handling date and time information, but they are more flexible. If PHP is\
    \ compiled on a 32-bit processor, timestamps are stored as 32-bit integers, restricting\
    \ the upper range limit of dates to January 2038. The new classes store date and\
    \ time information internally as a 64-bit number, increasing the range from about\
    \ 292 billion years in the past to the same number of years in the future.\n\n\
    **Note**  \nIf PHP is compiled on a 64-bit processor, all dates and times are\
    \ stored as 64-bit numbers, removing the January 2038 limit on timestamps and\
    \ the date- and time-related functions inherited from PHP 4.\n\nTable [14-3](#Tab3)\
    \ summarizes the main date- and time-related classes and functions in PHP.\n\n\
    **Table 14-3.** PHP date- and time-related classes and functions\n\n| | Name |\
    \ Arguments | Description |\n| --- | --- | --- | --- |\n| Class | | | |\n| | `DateTime`\
    \ | Date string, `DateTimeZone` object | Creates a time zone-sensitive object\
    \ containing date and/or time information that can be used for date and time calculations.\
    \ |\n| | `DateTimeImmutable` | Same as `DateTime` | Basically the same as `DateTime`,\
    \ but changing any value returns a new object, leaving the original unmodified.\
    \ Requires PHP 5.5 or later. |\n| | `DateTimeZone` | Time zone string | Stores\
    \ time zone information for use with `DateTime` objects. |\n| | `DateInterval`\
    \ | Interval specification | Represents a fixed amount of time in years, months,\
    \ hours, etc. |\n| | `DatePeriod` | Start, interval, end/recurrence, options |\
    \ Calculates recurring dates over a set period or number of recurrences. |\n|\
    \ Function | | | |\n| | `time()` | None | Generates a Unix timestamp for the current\
    \ date and time. |\n| | `mktime()` | Hour, minute, second, month, date, year |\
    \ Generates a Unix timestamp for the specified date/time. |\n| | `strtotime()`\
    \ | Date string, timestamp | Attempts to generate a Unix timestamp from an English\
    \ textual description, such as “next Tuesday.” The returned value is relative\
    \ to the second argument, if supplied. |\n| | `date()` | Format string, timestamp\
    \ | Formats a date in English using the specifiers listed in Table 14-4. If the\
    \ second argument is omitted, the current date and time are used. |\n| | `strftime()`\
    \ | Format string, timestamp | Same as `date()`, but uses the language specified\
    \ by the system locale. |\n\n#### Setting the Default Time Zone\n\nAll date and\
    \ time information in PHP is stored according to the server’s default time zone\
    \ setting. It’s common for web servers to be located in a different time zone\
    \ from your target audience, so it’s useful to know how to change the default.\n\
    \nThe server’s default time zone should normally be set in the `date.timezone`\
    \ directive in `php.ini`, but if your hosting company forgets to do so, or you\
    \ want to use a different time zone, you need to set it yourself.\n\nIf your hosting\
    \ company gives you control over your own version of `php.ini`, change the value\
    \ of `date.timezone` there. That way, it’s automatically set for all your scripts.\n\
    \nIf your server supports `.htaccess` or `.user.ini` files, you can change the\
    \ time zone by adding the appropriate command in the site root. For `.htaccess`,\
    \ use this:\n\n```\nphp_value date.timezone 'timezone'\n```\n\nFor `.user.ini`,\
    \ the command looks like this:\n\n```\ndate.timezone=timezone\n```\n\nReplace\
    \ `timezone` with the correct setting for your location. You can find a full list\
    \ of valid time zones at [http://docs.php.net/manual/en/timezones.php](http://docs.php.net/manual/en/timezones.php).\n\
    \nIf none of those options is available to you, add the following at the beginning\
    \ of any script that uses date or time functions (replacing `timezone` with the\
    \ appropriate value):\n\n```\nini_set('date.timezone', 'timezone');\n```\n\n####\
    \ Creating a DateTime Object\n\nTo create a `DateTime` object, just use the `new`\
    \ keyword followed by `DateTime()`, like this:\n\n```\n$now = new DateTime();\n\
    ```\n\nThis creates an object that represents the current date and time according\
    \ to the web server’s clock and default time zone setting.\n\nThe `DateTime()`\
    \ constructor also takes two optional arguments: a string containing a date and/or\
    \ time, and a `DateTimeZone` object. The date/time string for the first argument\
    \ can be in any of the formats listed at [http://php.net/manual/en/datetime.formats.php](http://php.net/manual/en/datetime.formats.php).\
    \ Unlike MySQL, which accepts only one format, PHP goes to the opposite extreme.\
    \ For example, to create a `DateTime` object for Christmas Day 2014, all the following\
    \ formats are valid:\n\n```\n'12/25/2014'\n'25-12-2014'\n'25 Dec 2014'\n'Dec 25\
    \ 2014'\n'25-XII-2014'\n'25.12.2014'\n'2014/12/25'\n'2014-12-25'\n'December 25th,\
    \ 2014'\n```\n\nThis is not an exhaustive list. It’s just a selection of valid\
    \ formats. Where the potential confusion arises is in the use of separators. For\
    \ example, the forward slash is permitted in American-style (`12/25/2010`) and\
    \ ISO (`2010/12/25`) dates, but not when the date is presented in European order\
    \ or when the month is represented by Roman numerals. To present the date in European\
    \ order, the separator must be a dot, tab, or dash.\n\nDates can also be specified\
    \ using relative expressions, such as “next Wednesday,” “tomorrow,” or “last Monday.”\
    \ However, there’s potential for confusion here, too. Some people use “next Wednesday”\
    \ to mean “Wednesday next week.” PHP interprets the expression literally. If today\
    \ is Tuesday, “next Wednesday” means the following day.\n\n**Note**  \nPHP 5.3\
    \ expanded this flexibility even further by introducing a method to create a `DateTime`\
    \ object from a custom format. It’s described after the next section because the\
    \ same technique is used for specifying both output and input formats.\n\nYou\
    \ can’t use `echo` on its own to display the value stored in a `DateTime` object.\
    \ In addition to `echo`, you need to tell PHP how to format the output using the\
    \ `format()` method."
  raw: '### Working with Dates in PHP


    The way PHP handles dates and time underwent major changes in PHP 5.2 with the
    introduction of the `DateTime` and `DateTimeZone` classes. Further changes were
    introduced in PHP 5.3 through the addition of new `DateTime` methods and the `DateInterval`
    and `DatePeriod` classes. Yet another enhancement came in PHP 5.5 with the addition
    of the `DateTimeImmutable` class. Prior to these changes, dates and time were
    handled exclusively as Unix timestamps—the number of seconds since midnight UTC
    (Coordinated Universal Time) on January 1, 1970.


    The new classes don’t entirely replace the original ways of handling date and
    time information, but they are more flexible. If PHP is compiled on a 32-bit processor,
    timestamps are stored as 32-bit integers, restricting the upper range limit of
    dates to January 2038. The new classes store date and time information internally
    as a 64-bit number, increasing the range from about 292 billion years in the past
    to the same number of years in the future.


    Note


    If PHP is compiled on a 64-bit processor, all dates and times are stored as 64-bit
    numbers, removing the January 2038 limit on timestamps and the date- and time-related
    functions inherited from PHP 4.


    Table [14-3](#A978-1-4842-0635-5_14_Chapter.html#Tab3) summarizes the main date-
    and time-related classes and functions in PHP.


    Table 14-3.


    PHP date- and time-related classes and functions


    |   | Name | Arguments | Description |

    | --- | --- | --- | --- |

    | Class |   |   |   |

    |   | `DateTime` | Date string, `DateTimeZone` object | Creates a time zone-sensitive
    object containing date and/or time information that can be used for date and time
    calculations. |

    |   | `DateTimeImmutable` | Same as `DateTime` | Basically the same as `DateTime`,
    but changing any value returns a new object, leaving the original unmodified.
    Requires PHP 5.5 or later. |

    |   | `DateTimeZone` | Time zone string | Stores time zone information for use
    with `DateTime` objects. |

    |   | `DateInterval` | Interval specification | Represents a fixed amount of time
    in years, months, hours, etc. |

    |   | `DatePeriod` | Start, interval, end/recurrence, options | Calculates recurring
    dates over a set period or number of recurrences. |

    | Function |   |   |   |

    |   | `time()` | None | Generates a Unix timestamp for the current date and time.
    |

    |   | `mktime()` | Hour, minute, second, month, date, year | Generates a Unix
    timestamp for the specified date/time. |

    |   | `strtotime()` | Date string, timestamp | Attempts to generate a Unix timestamp
    from an English textual description, such as “next Tuesday.” The returned value
    is relative to the second argument, if supplied. |

    |   | `date()` | Format string, timestamp | Formats a date in English using the
    specifiers listed in Table 14-4\. If the second argument is omitted, the current
    date and time are used. |

    |   | `strftime()` | Format string, timestamp | Same as `date()`, but uses the
    language specified by the system locale. |


    #### Setting the Default Time Zone


    All date and time information in PHP is stored according to the server’s default
    time zone setting. It’s common for web servers to be located in a different time
    zone from your target audience, so it’s useful to know how to change the default.


    The server’s default time zone should normally be set in the `date.` `timezone`
    directive in `php.ini`, but if your hosting company forgets to do so, or you want
    to use a different time zone, you need to set it yourself.


    If your hosting company gives you control over your own version of `php.ini`,
    change the value of `date.timezone` there. That way, it’s automatically set for
    all your scripts.


    If your server supports `.htaccess` or `.user.ini`files, you can change the time
    zone by adding the appropriate command in the site root. For `.htaccess`, use
    this:


    `php_value date.timezone ''` `timezone` `''`


    For `.user.ini`, the command looks like this:


    `date.timezone=` `timezone`


    Replace `timezone` with the correct setting for your location. You can find a
    full list of valid time zones at [`http://docs.php.net/manual/en/timezones.php`](http://docs.php.net/manual/en/timezones.php)
    .


    If none of those options is available to you, add the following at the beginning
    of any script that uses date or time functions (replacing `timezone` with the
    appropriate value):


    `ini_set(''date.timezone'', ''` `timezone` `'');`


    #### Creating a DateTime Object


    To create a `DateTime` object, just use the `new` keyword followed by `DateTime()`,
    like this:


    `$now = new DateTime();`


    This creates an object that represents the current date and time according to
    the web server’s clock and default time zone setting.


    The `DateTime()` constructor also takes two optional arguments: a string containing
    a date and/or time, and a `DateTimeZone` object. The date/time string for the
    first argument can be in any of the formats listed at [`http://php.net/manual/en/datetime.formats.php`](http://php.net/manual/en/datetime.formats.php)
    . Unlike MySQL, which accepts only one format, PHP goes to the opposite extreme.
    For example, to create a `DateTime` object for Christmas Day 2014, all the following
    formats are valid:


    `''12/25/2014''`


    `''25-12-2014''`


    `''25 Dec 2014''`


    `''Dec 25 2014''`


    `''25-XII-2014''`


    `''25.12.2014''`


    `''2014/12/25''`


    `''2014-12-25''`


    `''December 25th, 2014''`


    This is not an exhaustive list. It’s just a selection of valid formats. Where
    the potential confusion arises is in the use of separators. For example, the forward
    slash is permitted in American-style (12/25/2010) and ISO (2010/12/25) dates,
    but not when the date is presented in European order or when the month is represented
    by Roman numerals. To present the date in European order, the separator must be
    a dot, tab, or dash.


    Dates can also be specified using relative expressions, such as “next Wednesday,”
    “tomorrow,” or “last Monday.” However, there’s potential for confusion here, too.
    Some people use “next Wednesday” to mean “Wednesday next week.” PHP interprets
    the expression literally. If today is Tuesday, “next Wednesday” means the following
    day.


    Note


    PHP 5.3 expanded this flexibility even further by introducing a method to create
    a `DateTime` object from a custom format. It’s described after the next section
    because the same technique is used for specifying both output and input formats.


    You can’t use `echo` on its own to display the value stored in a `DateTime` object.
    In addition to `echo`, you need to tell PHP how to format the output using the
    `format()` method.'
  trans: "\n### 在 PHP 中处理日期\n\nPHP 处理日期和时间的方式在 PHP 5.2 中发生了重大变化，引入了 `DateTime` 和 `DateTimeZone`\
    \ 类。PHP 5.3 通过添加新的 `DateTime` 方法以及 `DateInterval` 和 `DatePeriod` 类，又引入了进一步的更改。PHP\
    \ 5.5 中新增了 `DateTimeImmutable` 类，这是另一个增强。在这些更改之前，日期和时间完全以 Unix 时间戳的形式处理——即自 1970\
    \ 年 1 月 1 日午夜 UTC（协调世界时）以来的秒数。\n\n新类并没有完全取代处理日期和时间信息的原始方式，但它们更加灵活。如果 PHP 在 32\
    \ 位处理器上编译，时间戳将存储为 32 位整数，将日期的上限范围限制在 2038 年 1 月。新类在内部将日期和时间信息存储为 64 位数字，将范围从过去的大约\
    \ 2920 亿年扩展到同样遥远的未来。\n\n**注意**  \n如果 PHP 在 64 位处理器上编译，所有日期和时间都存储为 64 位数字，从而消除了\
    \ 2038 年 1 月对时间戳以及从 PHP 4 继承的日期和时间相关函数的限制。\n\n表 14-3 总结了 PHP 中主要的日期和时间相关类与函数。\n\
    \n**表 14-3.** PHP 日期和时间相关类与函数\n\n| | 名称 | 参数 | 描述 |\n| --- | --- | --- | --- |\n\
    | 类 | | | |\n| | `DateTime` | 日期字符串，`DateTimeZone` 对象 | 创建一个包含日期和/或时间信息且对时区敏感的对象，可用于日期和时间计算。\
    \ |\n| | `DateTimeImmutable` | 同 `DateTime` | 基本与 `DateTime` 相同，但更改任何值都会返回一个新对象，原对象保持不变。需要\
    \ PHP 5.5 或更高版本。 |\n| | `DateTimeZone` | 时区字符串 | 存储时区信息，供 `DateTime` 对象使用。 |\n\
    | | `DateInterval` | 间隔规范 | 表示固定数量的时间，如年、月、小时等。 |\n| | `DatePeriod` | 开始，间隔，结束/重复次数，选项\
    \ | 计算在设定期间或指定重复次数内的重复日期。 |\n| 函数 | | | |\n| | `time()` | 无 | 生成当前日期和时间的 Unix\
    \ 时间戳。 |\n| | `mktime()` | 时，分，秒，月，日，年 | 生成指定日期/时间的 Unix 时间戳。 |\n| | `strtotime()`\
    \ | 日期字符串，时间戳 | 尝试根据英文文本描述（例如“下周二”）生成 Unix 时间戳。如果提供了第二个参数，返回值将相对于该参数。 |\n| | `date()`\
    \ | 格式字符串，时间戳 | 使用表 14-4 中列出的说明符格式化英文日期。如果省略第二个参数，则使用当前日期和时间。 |\n| | `strftime()`\
    \ | 格式字符串，时间戳 | 与 `date()` 相同，但使用系统区域设置指定的语言。 |\n\n#### 设置默认时区\n\nPHP 中的所有日期和时间信息都根据服务器的默认时区设置进行存储。Web\
    \ 服务器与目标受众位于不同时区是很常见的，因此了解如何更改默认时区很有用。\n\n服务器的默认时区通常应在 `php.ini` 的 `date.timezone`\
    \ 指令中设置，但如果您的托管公司忘记设置，或者您想使用不同的时区，则需要自己进行设置。\n\n如果您的托管公司允许您控制自己的 `php.ini` 版本，请在其中更改\
    \ `date.timezone` 的值。这样，它将自动为您的所有脚本设置。\n\n如果您的服务器支持 `.htaccess` 或 `.user.ini`\
    \ 文件，您可以通过在站点根目录下添加相应的命令来更改时区。对于 `.htaccess`，请使用：\n\n```\nphp_value date.timezone\
    \ 'timezone'\n```\n\n对于 `.user.ini`，命令如下所示：\n\n```\ndate.timezone=timezone\n```\n\
    \n将 `timezone` 替换为您所在位置的正确设置。您可以在 [`docs.php.net/manual/en/timezones.php`](http://docs.php.net/manual/en/timezones.php)\
    \ 找到所有有效时区的完整列表。\n\n如果这些选项都不可用，请在任意使用日期或时间函数的脚本开头添加以下内容（将 `timezone` 替换为适当的值）：\n\
    \n```\nini_set('date.timezone', 'timezone');\n```\n\n#### 创建 DateTime 对象\n\n要创建一个\
    \ `DateTime` 对象，只需使用 `new` 关键字后跟 `DateTime()`，如下所示：\n\n```\n$now = new DateTime();\n\
    ```\n\n这将创建一个表示根据 Web 服务器时钟和默认时区设置的当前日期和时间的对象。\n\n`DateTime()` 构造函数还接受两个可选参数：一个包含日期和/或时间的字符串，以及一个\
    \ `DateTimeZone` 对象。第一个参数的日期/时间字符串可以是 [`php.net/manual/en/datetime.formats.php`](http://php.net/manual/en/datetime.formats.php)\
    \ 中列出的任何格式。与仅接受一种格式的 MySQL 不同，PHP 走向了另一个极端。例如，要为 2014 年圣诞节创建一个 `DateTime` 对象，以下所有格式都是有效的：\n\
    \n```\n'12/25/2014'\n'25-12-2014'\n'25 Dec 2014'\n'Dec 25 2014'\n'25-XII-2014'\n\
    '25.12.2014'\n'2014/12/25'\n'2014-12-25'\n'December 25th, 2014'\n```\n\n这不是一个详尽的列表，只是有效格式的一部分。可能引起混淆的地方在于分隔符的使用。例如，斜杠允许用于美式日期（`12/25/2010`）和\
    \ ISO 日期（`2010/12/25`），但当日期以欧洲顺序呈现或月份用罗马数字表示时则不允许。要以欧洲顺序表示日期，分隔符必须是点、制表符或破折号。\n\
    \n日期也可以使用相对表达式来指定，例如“下周三”、“明天”或“上周一”。然而，这里也可能存在混淆。有些人使用“下周三”来表示“下周的星期三”。PHP 是按字面意思解释表达式的。如果今天是星期二，“下周三”意味着第二天。\n\
    \n**注意**  \nPHP 5.3 通过引入一种从自定义格式创建 `DateTime` 对象的方法，进一步扩展了这种灵活性。这将在下一节之后描述，因为相同的技术用于指定输出和输入格式。\n\
    \n您不能单独使用 `echo` 来显示存储在 `DateTime` 对象中的值。除了 `echo`，您需要告诉 PHP 如何使用 `format()` 方法来格式化输出。\n"
- fmt: '# Formatting Dates in PHP


    The `DateTime` class’s `format()` method uses the same format characters as the
    original `date()` function. Although this makes for continuity, the format characters
    are often difficult to remember and seem to have no obvious reasoning behind them.
    Table [14-4](#A978-1-4842-0635-5_14_Chapter.html#Tab4) lists the most useful date
    and time format characters.


    The `DateTime` class and `date()` function display the names of weekdays and months
    in English only, but the `strftime()` function uses the language specified by
    the server’s locale. So, if the server’s locale is set to Spanish, a `DateTime`
    object and `date()` display Saturday, but `strftime()` displays sábado. In addition
    to the format characters used by both the `DateTime` class and the `date()` function,
    Table [14-4](#A978-1-4842-0635-5_14_Chapter.html#Tab4) lists the equivalent characters
    used by `strftime()`. Not all formats have an equivalent in `strftime()`.


    **Table 14-4.** The main date and time format characters


    | Unit | `DateTime/date()` | `strftime()` | Description | Example |

    | --- | --- | --- | --- | --- |

    | Day | `d` | `%d` | Day of the month with leading zero | 01 through 31 |

    |   | `j` | `%e`* | Day of the month without leading zero | 1 through 31 |

    | `S` |   | English ordinal suffix for day of the month | st, nd, rd, or th |

    | `D` | `%a` | First three letters of day name | Sun, Tue |

    | `l` (lowercase “L”) | `%A` | Full name of day | Sunday, Tuesday |

    | Month | `m` | `%m` | Number of month with leading zero | 01 through 12 |

    |   | `n` |   | Number of month without leading zero | 1 through 12 |

    | `M` | `%b` | First three letters of month name | Jan, Jul |

    | `F` | `%B` | Full name of month | January, July |

    | Year | `Y` | `%Y` | Year displayed as four digits | 2014 |

    | `y` | `%y` | Year displayed as two digits | 14 |

    | Hour | `g` |   | Hour in 12-hour format without leading zero | 1 through 12
    |

    | `h` | `%I` | Hour in 12-hour format with leading zero | 01 through 12 |

    | `G` |   | Hour in 24-hour format without leading zero | 0 through 23 |

    | `H` | `%H` | Hour in 24-hour format with leading zero | 01 through 23 |

    | Minutes | `i` | `%M` | Minutes with leading zero if necessary | 00 through 59
    |

    | Seconds | `s` | `%S` | Seconds with leading zero if necessary | 00 through 59
    |

    | AM/PM | `a` | `%p` | Lowercase | am |

    | AM/PM | `A` |   | Uppercase | PM |


    * Note: `%e` is not supported on Windows.


    You can combine these format characters with punctuation to display the current
    date in your webpages according to your own preferences.


    To format a `DateTime` object, pass the format string as an argument to the `format()`
    method like this (the code is in `date_format_01.php` in the `ch14` folder):


    ```

    <?php

    $now = new DateTime();

    $xmas2014 = new DateTime(''12/25/2014'');

    ?>

    <p>It''s now <?= $now->format(''g.ia''); ?> on <?= $now->format(''l, F jS, Y'');
    ?></p>

    <p>Christmas 2014 falls on a <?= $xmas2014->format(''l''); ?></p>

    ```


    In this example, two `DateTime` objects are created: one for the current date
    and time, and the other for December 25, 2014. Using the format characters from
    Table 14-4, various date parts are extracted from the two objects, producing the
    output shown in the following screenshot:


    ![A978-1-4842-0635-5_14_Figa_HTML.jpg](A978-1-4842-0635-5_14_Figa_HTML.jpg)


    The code in `date_format_02.php` produces the same output by using the `date()`
    and `strtotime()` functions, like this:


    ```

    <?php $xmas2014 = strtotime(''12/25/2014''); ?>

    <p>It''s now <?= date(''g.ia''); ?> on <?= date(''l, F jS, Y''); ?></p>

    <p>Christmas 2014 falls on a <?= date(''l'', $xmas2014); ?></p>

    ```


    The first line uses `strtotime()` to create a timestamp for December 25, 2014.
    There’s no need to create a timestamp for the current date and time, because `date()`
    defaults to them when used without a second argument.


    If the timestamp for Christmas Day isn’t used elsewhere in the script, the first
    line can be omitted, and the last call to `date()` can be rewritten like this
    (see `date_format_03.php`):


    ```

    date(''l'', strtotime(''12/25/2014''));

    ```


    # Creating a DateTime Object From a Custom Format


    You can specify a custom input format for a `DateTime` object using the format
    characters in Table 14-4. Instead of creating the object with the `new` keyword,
    you use the `createFromFormat()` static method, like this:


    ```

    $date = DateTime::createFromFormat(format_string, input_date, timezone);

    ```


    The third argument, `timezone`, is optional. If included, it should be a `DateTimeZone`
    object.


    A static method belongs to the whole class, rather than to a particular object.
    You call a static method using the class name followed by the scope resolution
    operator (a double colon) and the method name.


    **Tip**


    Internally, the scope resolution operator is called `PAAMAYIM_NEKUDOTAYIM`, which
    is Hebrew for “double colon.” Why Hebrew? The Zend Engine that powers PHP was
    originally developed by Zeev Suraski and Andi Gutmans when they were students
    at the Technion–Israel Institute of Technology. Apart from earning points in a
    geek trivia quiz, knowing the meaning of `PAAMAYIM_NEKUDOTAYIM` could save you
    a lot of head scratching when you see it in a PHP error message.


    For example, you can use the `createFromFormat()` method to accept a date in the
    European format of day, month, year, separated by slashes, like this (the code
    is in `date_format_04.php`):


    ```

    $xmas2014 = DateTime::createFromFormat(''d/m/Y'', ''25/12/2014'');

    echo $xmas2014->format(''l, jS F Y'');

    ```


    This produces the following output:


    ![A978-1-4842-0635-5_14_Figb_HTML.jpg](A978-1-4842-0635-5_14_Figb_HTML.jpg)


    **Caution**


    Attempting to use `25/12/2014` as the input to the `DateTime` constructor triggers
    a fatal error because the `DD/MM/YYYY` is not supported. If you want to use a
    format not supported by the `DateTime` constructor, you must use the `createFromFormat()`
    static method.


    Although the `createFromFormat()` method is useful, it can be used only in circumstances
    where you know the date will always be in a specific format.'
