    **Web Feeds**


    A *web feed* is a stream of a web site’s content in a format (typically XML) that
    can be easily interpreted by other programs. The feed will usually contain a summary
    of recent items (such as news articles or, in our case, blog posts) with a link
    to a more detailed version of the item.


    By providing one or more feeds, a web site owner can syndicate their content so
    others can easily access without needing to “scrape” the content from the web
    site HTML (which can be slow, difficult, susceptible to breaking, and possibly
    illegal).


    Modern browsers have the ability to save and update feeds, meaning users can easily
    subscribe to their favorite feeds and be notified by their browser when the content
    is updated.


    Feeds can also be used in other applications, such as podcasts in Apple’s iTunes.
    If you subscribe to a podcast, iTunes will automatically download any new episodes
    that are published (according to the data contained in the podcast web feed).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch10CMP2 11/11/07 5:18 PM Page 352


    **352**


    C H A P T E R 1 0 ■ I M P L E M E N T I N G W E B 2 . 0 F E AT U R E S


    **Data Formats for Web Feeds**


    There are several data formats that can be used for web feeds. The most popular
    of these are RSS and Atom, which both use XML. Really Simple Syndication (RSS)
    is arguably the most widely used format for web feeds. Atom, on the other hand,
    was born out of the shortcomings of RSS and aims to address some of the problems
    with RSS.


    For example, Atom allows the developer to indicate exactly what kind of data is
    being included in the payload, whether it is plain text, HTML, or binary data
    (included using Base64


    encoding). This is a significant improvement since people who consume RSS feeds
    may not know exactly how to treat the data. Some feeds will include HTML tags
    in the feed data, while others won’t.


    An RSS feed may contain either (or both) of the following two lines:


    <description>Some plain text</description>


    <description>Some <strong>HTML</strong> text</description> Using Atom, the type
    can be explicitly set, allowing the consumer of the feed to decide how to present
    the data:


    <content type="text">Some plain text</content>


    <content type="html">Some <strong>HTML</strong> text</content> We will use the
    Zend_Feed component of the Zend Framework to create an Atom feed for each user
    in our system who has a blog. Note that we will not be concerning ourselves with
    the specific formats for Atom; we will allow Zend_Feed to take care of this for
    us.


    ■**Note** Zend_Feed supports both RSS and Atom, so if you prefer to use RSS, the
    changes required to your PHP code will be minimal, as you will shortly see.


    **Creating an Atom Feed with Zend_Feed**


    It is relatively straightforward to create a web feed using Zend_Feed. Although
    we will implement this shortly, the general process is as follows.


    The first step is to build an array of the data that will form the web feed. There
    is a specification of how this array should be structured in the Zend Framework
    manual at [http://](http://framework.zend.com/manual/en/zend.feed.importing.html)


    [framework.zend.com/manual/en/zend.feed.importing.html.](http://framework.zend.com/manual/en/zend.feed.importing.html)


    The next step is to call Zend_Feed::importArray() to create the actual feed. Other
    methods are available for creating feeds (such as using another feed). The first
    argument to this method is the array to use to build the feed, while the second
    argument indicates the type of feed to build. In our case, we will pass atom as
    the second argument. To create an RSS feed, this value would be rss.


    Finally, we call the send() method on the object returned from importArray(),
    which will send the appropriate headers (such as Content-type: application/atom+xml)
    and then output the feed. You could instead call saveXml() to write the XML to
    a variable rather than calling send() (such as if you wanted to write it to a
    file or output it with different headers).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


