    If you’ve already created database models, you can import them to your fixture
    without any existing data records. This can be useful in early development stages,
    when the database structure tends to change frequently. Without this, all database
    changes should be manually changed in fixtures also. It adds some overhead, so
    at later development phases, the previous examples will be faster.


    ```

    1   ''Users''];

    4  }

    5  ?>

    ```


    If you have tables but no models, you should use the following code sample. It
    is useful when you create plugins or libraries.


    ```

    1   ''users''];

    4  }

    5  ?>

    ```


    Don’t forget to manually add records to your fixtures. As tests should run as
    fast as possible, try to have just enough records. Do not forget: Inserting and
    removing test records takes time. More records require more time, so add just
    enough records as is absolutely necessary. Let’s say somewhere in our application
    we would like to list all users whose names start with a given letter. We would
    have a `getUsersByName($ch)` method in our model that will handle this.


    In this scenario, we should have at least three records in our user fixture with
    different usernames.


    ```

    65      public $records = [

    66          [

    67              ''id'' => 1,

    68              ''username'' => ''rrd'',

    69              ''password'' => ''Lorem ipsum dolor sit amet'',

    70              ''role'' => ''Lorem ipsum dolor '',

    71              ''created'' => ''2016-04-24 18:39:32'',

    72              ''modified'' => ''2016-04-24 18:39:32''

    73          ],

    74          [

    75              ''id'' => 2,

    76              ''username'' => ''gauranga'',

    77              ''password'' => ''Lorem ipsum dolor sit amet'',

    78              ''role'' => ''Lorem ipsum dolor '',

    79              ''created'' => ''2016-04-24 18:39:32'',

    80              ''modified'' => ''2016-04-24 18:39:32''

    81          ],

    74          [

    75              ''id'' => 3,

    76              ''username'' => ''r2d2'',

    77              ''password'' => ''Lorem ipsum dolor sit amet'',

    78              ''role'' => ''Lorem ipsum dolor '',

    79              ''created'' => ''2016-04-24 18:39:32'',

    80              ''modified'' => ''2016-04-24 18:39:32''

    81          ],

    82      ];

    ```


    As we have these three records, we can write tests for `getUsersByName($ch)`.
    If `$ch` is “g,” we should get record 2; if `$ch` is “r,” we should get records
    1 and 3 and should not get any records otherwise.


    If you do not like entering records manually, you can import them from an existing
    database table, with `phpMyAdmin`. Just use the `export` function and choose `PHP
    array` as the format of the export, as shown in Figure [7-1](#A337704_2_En_7_Chapter.html#Fig1).


