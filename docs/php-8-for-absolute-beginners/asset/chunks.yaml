    \ $sql, $data );\n$statement = $this->executeSQL( $sql, $data );\n//if a user\
    \ with that email is found in database\nif ( $statement->rowCount() >= 1 ) {\n\
    return false;\n} else {\nreturn true;\n}\n```\n\nThe function `checkAvailable()`\n\
