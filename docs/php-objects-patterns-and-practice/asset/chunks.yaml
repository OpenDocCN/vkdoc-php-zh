- fmt: '# `CommandResolver`


    A controller needs a way of deciding how to interpret an HTTP request, so that
    it can invoke the right code to fulfill that request. You could easily include
    this logic within the `Controller` class itself, but I prefer to use a specialist
    class for the purpose. That makes it easy to refactor for polymorphism, if necessary.


    A Front Controller often invokes application logic by running a `Command` object
    (I introduced the `Command` pattern in Chapter [11](#A314621_5_En_11_Chapter.html)).
    The `Command` is chosen according to the request URL (using either the URL path
    or, less frequently these days, a GET parameter). Either way, you end up with
    a token or pattern which can be used for `Command` selection. There is more than
    one way of using a URL to select a command. For example, you can test the token
    against a configuration file or data structure (a logical strategy). Or, you can
    test it directly against class files on the file system (a physical strategy).


    You saw an example of a command factory that used a physical strategy in the last
    chapter. This time, I will take the logical approach, mapping URL fragments to
    `Command` classes:


    ```php

    // listing 12.13

    class CommandResolver

    {

    private static $refcmd = null;

    private static $defaultcmd = DefaultCommand::class;

    public function __construct()

    {

    // could make this configurable

    self::$refcmd = new \ReflectionClass(Command::class);

    }

    public function getCommand(Request $request): Command

    {

    $reg = Registry::instance();

    $commands = $reg->getCommands();

    $path = $request->getPath();

    $class = $commands->get($path);

    if (is_null($class)) {

    $request->addFeedback("path ''$path'' not matched");

    return new self::$defaultcmd();

    }

    if (! class_exists($class)) {

    $request->addFeedback("class ''$class'' not found");

    return new self::$defaultcmd();

    }

    $refclass = new \ReflectionClass($class);

    if (! $refclass->isSubClassOf(self::$refcmd)) {

    $request->addFeedback("command ''$refclass'' is not a Command");

    return new self::$defaultcmd();

    }

    return $refclass->newInstance();

    }

    }

    ```


    This simple class acquires a `Conf` object from the registry and uses the URL
    path (provided by the `Request::getPath()` method) to attempt to get a class name.
    If the class name is found, and if the class both exists and extends the `Command`
    base class, then it is instantiated and returned.


    If any of these conditions are not met, the `getCommand()` method degrades gracefully
    by serving up a default `Command` object.


    A more sophisticated implementation (e.g., like the ones used by the routing logic
    in Silex and Symfony) would allow for wildcards in these paths.


    You may wonder why this code takes it on trust that the `Command` class it locates
    does not require parameters:


    ```php

    return $refclass->newInstance();

    ```


    The answer to this lies in the signature of the `Command` class itself:


    ```php

    // listing 12.14

    abstract class Command

    {

    final public function __construct()

    {

    }

    public function execute(Request $request)

    {

    $this->doExecute($request);

    }

    abstract public function doExecute(Request $request);

    }

    ```


    By declaring the constructor method `final`, I make it impossible for a child
    class to override it. No `Command` class, therefore, will ever require arguments
    to its constructor.


    When creating command classes, you should be careful to keep them as devoid of
    application logic as you possibly can. As soon as they begin to do application-type
    stuff, you''ll find that they turn into a kind of tangled transaction script and
    duplication will soon creep in. Commands are a kind of relay station: they should
    interpret a request, call into the domain to juggle some objects, and then lodge
    data for the presentation layer. As soon as they begin to do anything more complicated
    than this, it''s probably time to refactor. The good news is that refactoring
    is relatively easy. It''s not hard to spot when a command is trying to do too
    much, and the solution is usually clear: move that functionality down to a helper
    or domain class.


    # `Request`


    Requests are magically handled for us by PHP and neatly packaged up in superglobal
    arrays. You might have noticed that I still use a class to represent a request.
    A `Request` object is passed to `CommandResolver`, and later on, to `Command`.


    Why do I not let these classes simply query the `$_REQUEST`, `$_POST`, or `$_GET`
    arrays for themselves? I could do that, of course, but by centralizing request
    operations in one place, I open up new options.


    You could, for example, apply filters to the incoming request. Or, as the next
    example shows, you could gather request parameters from somewhere other than an
    HTTP request, allowing the application to be run from the command line or from
    a test script.


    The `Request` object is also a useful repository for data that needs to be communicated
    to the view layer. In fact, many systems offer a separate `Response` object for
    that purpose, but we will keep things lean here.


    Here is a simple `Request` superclass:


    ```php

    // listing 12.15

    abstract class Request

    {

    protected $properties;

    protected $feedback = [];

    protected $path = "/";

    public function __construct()

    {

    $this->init();

    }

    abstract public function init();

    public function setPath(string $path)

    {

    $this->path = $path;

    }

    public function getPath(): string

    {

    return $this->path;

    }

    public function getProperty(string $key)

    {

    if (isset($this->properties[$key])) {

    return $this->properties[$key];

    }

    return null;

    }

    public function setProperty(string $key, $val)

    {

    $this->properties[$key] = $val;

    }

    public function addFeedback(string $msg)

    {

    array_push($this->feedback, $msg);

    }

    public function getFeedback(): array

    {

    return $this->feedback;

    }

    public function getFeedbackString($separator = "\n"): string

    {

    return implode($separator, $this->feedback);

    }

    public function clearFeedback()

    {

    $this->feedback = [];

    }

    }

    ```


    As you can see, most of this class is taken up with mechanisms for setting and
    acquiring properties. The `init()` method is responsible for populating the private
    `$properties` array, and it will be handled by child classes. It''s important
    to note that this example implementation ignores request methods—not something
    you would ever want to do in the real world. A full implementation should manage
    `GET`, `POST`, and `PUT` arrays, as well as provide a unified query mechanism.
    Once you have a `Request` object, you should be able to access a parameter via
    the `getProperty()` method, which accepts a key string and returns the corresponding
    value (as stored in the `$properties` array). You can also add data via `setProperty()`.


    The class also manages a `$feedback` array. This is a simple conduit through which
    controller classes can pass messages to the user. In a fuller implementation,
    we would likely want to differentiate between error and informational messages.


    You may remember that `ApplicationHelper` instantiates one of `HttpRequest` and
    `CliRequest`. Here is the first of these:


    ```php

    // listing 12.16

    class HttpRequest extends Request

    {

    public function init()

    {

    // we''re conveniently ignoring POST/GET/etc distinctions

    // don''t do that in the real world!

    $this->properties = $_REQUEST;

    $this->path = $_SERVER[''PATH_INFO''];

    $this->path = (empty($this->path)) ? "/" : $this->path;

    }

    }

    ```


    `CliRequest` takes argument pairs from the command line in the form `key=value`
    and breaks them out into properties. It also detects an argument with a `path:`
    prefix and assigns the provided value to the object''s `$path` property:


    ```php

    // listing 12.17

    class CliRequest extends Request

    {

    public function init()

    {

    $args = $_SERVER[''argv''];

    foreach ($args as $arg) {

    if (preg_match("/^path:(\S+)/", $arg, $matches)) {

    $this->path = $matches[1];

    } else {

    if (strpos($arg, ''='')) {

    list($key, $val) = explode("=", $arg);

    $this->setProperty($key, $val);

    }

    }

    }

    $this->path = (empty($this->path)) ? "/" : $this->path ;

    }

    }

    ```'
