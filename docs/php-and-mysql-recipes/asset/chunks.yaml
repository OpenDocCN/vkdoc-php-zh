    \n## 食谱 13-4. 表单生成\n\n### 问题\n\n使用静态 HTML 文件或嵌入在 php 脚本中的 HTML 片段来创建 HTML 表单可能很繁琐，尤其是当应用程序中有多种数据类型需要编辑时。如何让表单创建变得更简单？\n\
    \n### 解决方案\n\n大多数在多个地方使用的表单元素每次使用时都遵循相同的模式。可以创建一个通用函数或类，用于根据简单的表单定义生成 HTML 表单。\n\
    \n第一步是定义表单类应支持的输入类型，然后可以搭建实现框架，最后创建代码来处理实际表单标签的生成。\n\n如前所述，表单由 form 标签定义，内部包含一个或多个输入元素。一个基本表单可以包含文本、数字、单选按钮、下拉列表、复选框和多选选项。每个选项都可以有一个预定义的布局，可以根据需要多次重复使用。\n"
- fmt: "生成 HTML 表单的基础类可以通过几个方法创建。\n\n```php\n<?php\n\nclass HTMLForm {\n\n    function\
    \ __constructor($id, $action, $method = \"POST\") {\n\n    }\n\n    function AddInput($name,\
    \ $type, $value = null) {\n\n    }\n\n    function __toString() {\n\n    }\n\n\
    }\n```\n\n第一个方法是构造函数，在实例化对象时被调用。构造函数接受几个参数，这些参数定义了表单标签上的一些属性。\n\n接下来是一个用于向表单添加输入项的函数。所列出的参数是最小集合。随着类的开发，可能需要添加诸如最小值和最大值、下拉选项以及验证函数等内容，但这是一个好的开始。最后，`__toString()`方法用于生成输出。当对象在字符串上下文中使用时，`__toString()`函数将被调用，其返回值将作为对象的值。\n\
    \n**工作原理**\n\n构造函数的目的是初始化对象。在此例中，它所做的只是存储传入的参数。这些值将在生成输出时使用。\n\n```php\n<?php\n\
    \n// 13_4.php\n\nclass HTMLForm {\n\n    private $id;\n    private $action;\n\
    \    private $method;\n    private $inputs = [];\n\n    function __constructor($id,\
    \ $action, $method = \"POST\") {\n        $this->id = $id;\n        $this->action\
    \ = $action;\n        $this->method = $method;\n    }\n\n    function AddInput($type,\
    \ $name, $label, $value = null) {\n        $this->inputs[] = [\n            $type,\n\
    \            $name,\n            $label,\n            $value\n        ];\n   \
    \ }\n\n    function __toString() {\n        $form = '<form id=\"%s\" action=\"\
    %s\", method=\"%s>%s</form>';\n        $inputs = [];\n\n        foreach($this->inputs\
    \ as $input) {\n            switch($input[0]) {\n                case \"hidden\"\
    \ :\n                    $template = '<input type=\"hidden\" name=\"%s\" value=\"\
    %s\" />';\n                    $inputs[] = sprintf($template, $input[1], $input[3]);\n\
    \                    break;\n                case \"text\" :\n               \
    \     $template = '<div><label for=\"%s\">%s</label><input type=\"text\" name=\"\
    %s\" value=\"%s\" /></div>';\n                    $inputs[] = sprintf($template,\
    \ $input[1], $input[2], $input[1], $input[3]);\n                    break;\n \
    \               case \"textarea\" :\n                    $template = '<div><label\
    \ for=\"%s\">%s</label><textarea type=\"text\" name=\"%s\" />%s</textarea></div>';\n\
    \                    $inputs[] = sprintf($template, $input[1], $input[2], $input[1],\
    \ $input[3]);\n                    break;\n                case \"number\" :\n\
    \                    $template = '<div><label for=\"%s\">%s</label><input type=\"\
    number\" name=\"%s\" value=\"%s\" /></div>';\n                    $inputs[] =\
    \ sprintf($template, $input[1], $input[2], $input[1], $input[3]);\n          \
    \          break;\n                case \"select\" :\n                    $template\
    \ = '<div><label for=\"%s\">%s</label><select name=\"%s\" >%s</select></div>';\n\
    \                    $options = [];\n                    if (is_array($value))\
    \ {\n                        $option = '<option value=\"%s\">%s</option>';\n \
    \                       foreach($value as $k => $v) {\n                      \
    \      $options[] = sprintf($option, $k, $v);\n                        }\n   \
    \                 }\n                    $inputs[] = sprintf($template, $input[1],\
    \ $input[2], $input[1], implode(\"\", $options));\n                    break;\n\
    \            }\n        }\n        $form = sprintf($form, $this->id, $this->action,\
    \ $this->method, implode(\"\", $inputs));\n        return $form;\n    }\n}\n```\n\
    \n`AddInput()`方法用于向表单添加新的输入项。该方法有三个必需参数和一个可选参数，主要目的是创建一个包含所有输入字段定义的数组。\n\n最后，`__toString()`方法用于生成实际的表单。此方法使用多个\
    \ HTML 标签的字符串模板，并使用 `sprintf()`函数将占位符（`%s`）替换为实际值。\n\n`HTMLForm`类定义在名为 `13_4.php`\
    \ 的文件中。可以包含此文件并实例化该对象。\n\n```php\n<?php\n\n// 13_5.php\n\nrequire \"./13_4.php\"\
    ;\n\n$form = new HTMLForm('contact', $_SERVER['PHP_SELF']);\n$form->AddInput('text',\
    \ 'name', 'Name');\n$form->AddInput('text', 'email', 'Email');\n$form->AddInput('text',\
    \ 'phone', 'Phone');\n$form->AddInput('textarea', 'comment', 'Comment');\n\necho\
    \ <<<HEREDOC\n<!DOCTYPE html>\n<html>\n<body>\n$form\n</body>\n</html>\nHEREDOC;\n\
    ```\n\n此示例没有添加任何特定样式，因此浏览器将为每个元素添加默认样式。添加 Bootstrap CSS 相对简单，并且可以轻松添加更多属性来处理每个元素上的`class`、`required`和其他属性。\n\
    \n此示例中使用了几种新的输入类型。`hidden`类型是一种添加额外信息的方式，这些信息超出用户控制范围，但会作为请求的一部分传递给服务器。`textarea`类型是一种多行输入形式，允许用户输入包含换行符的较长文本。\n\
    \n可以将`AddInput()`方法拆分为每个输入类型的独立函数，每个方法可以具有与该特定类型匹配的参数。\n\n```php\n<?php\n\n//\
    \ 13_6.php\n\nclass HTMLForm {\n\n    private $id;\n    private $action;\n   \
    \ private $method;\n    private $inputs = [];\n\n    function __constructor($id,\
    \ $action, $method = \"POST\") {\n        $this->id = $id;\n        $this->action\
    \ = $action;\n        $this->method = $method;\n    }\n\n    function AddHidden($name,\
    \ $value = null) {\n        $this->inputs[] = <<<HEREDOC\n<input type=\"hidden\"\
    \ name=\"{$name}\" value=\"{$value}\" />\nHEREDOC;\n    }\n\n    function AddText($name,\
    \ $label, $value = null, $required = false) {\n        $attrib = $required ? \"\
    \ required\" : \"\";\n        $this->inputs[] = <<<HEREDOC\n<div>\n    <label\
    \ for=\"{$name}\">{$label}</label>\n    <input type=\"text\" name=\"{$name}\"\
    \ value=\"{$value}\"{$attrib} />\n</div>\nHEREDOC;\n    }\n\n    function AddTextArea($name,\
    \ $label, $value = null) {\n        $this->inputs[] = <<<HEREDOC\n<div>\n    <label\
    \ for=\"{$name}\">{$label}</label>\n    <textarea name=\"{$name}\">{$value}</textarea>\n\
    </div>\nHEREDOC;\n    }\n\n    function AddNumber($name, $label, $value = null,\
    \ $required = false, $min = null, $max = null) {\n        $attrib = $required\
    \ ? \" required\" : \"\";\n        if (is_numeric($min)) {\n            $attrib\
    \ .= \" min=\\\"{$min}\\\"\";\n        }\n        if (is_numeric($max)) {\n  \
    \          $attrib .= \" max=\\\"{$max}\\\"\";\n        }\n        $this->inputs[]\
    \ = <<<HEREDOC\n<div>\n    <label for=\"{$name}\">{$label}</label>\n    <input\
    \ type=\"number\" name=\"{$name}\" value=\"{$value}\"{$attrib} />\n</div>\nHEREDOC;\n\
    \    }\n\n    function AddSelect($name, $label, $values = [], $selected = null)\
    \ {\n        $options = [];\n        if (is_array($values)) {\n            $option\
    \ = '<option value=\"%s\"%s>%s</option>';\n            foreach($values as $k =>\
    \ $v) {\n                if ($k == $selected) {\n                    $options[]\
    \ = sprintf($option, $k, \" selected\", $v);\n                } else {\n     \
    \               $options[] = sprintf($option, $k, \"\", $v);\n               \
    \ }\n            }\n        }\n        $options = implode(\"\", $options);\n \
    \       $this->inputs[] = <<<HEREDOC\n<div>\n    <label for=\"{$name}\">{$label}</label>\n\
    \    <select name=\"{$name}\">$options</select>\n</div>\nHEREDOC;\n    }\n\n \
    \   function __toString() {\n        $form = '<form id=\"%s\" action=\"%s\", method=\"\
    %s>%s</form>';\n        $inputs = [];\n        $form = sprintf($form, $this->id,\
    \ $this->action, $this->method, implode(\"\", $this->inputs));\n        return\
    \ $form;\n    }\n}\n```\n\n在这种情况下，每个`Add...()`方法负责为输入创建 HTML 布局。这使得`__toString()`方法更简单。使用这个类与之前的示例非常相似。\n\
    \n```php\n<?php\n\n// 13_7.php\n\nrequire \"./13_6.inc\";\n\n$form = new HTMLForm('contact',\
    \ $_SERVER['PHP_SELF']);\n$form->AddHidden('form', 'Contact');\n$form->AddText('name',\
    \ 'Name', null, true);\n$form->AddText('email', 'Email', null, true);\n$form->AddText('phone',\
    \ 'Phone');\n$form->AddSelect('ref', 'How did your find us?', ['Google', 'Bing',\
    \ 'Ask', 'Yahoo', 'Other']);\n$form->AddTextarea('comment', 'Comment');\n\necho\
    \ <<<HEREDOC\n<!DOCTYPE html>\n<html>\n<body>\n$form\n</body>\n</html>\nHEREDOC;\n\
    ```\n\n## 13-5. 文件上传\n\n### 问题\n\n到目前为止，我们研究了使用键盘或鼠标输入填充的 HTML 表单。这主要生成文本输入，但鉴于网页的图形特性，有必要包含来自计算机硬盘的文件。\n\
    \n### 解决方案\n\n将文件上传到 PHP 脚本需要在`php.ini`中启用一些设置。首先，有`file_uploads = On`。如果未设置此项，PHP\
    \ 将忽略所有上传的文件。其次，有上传大小的限制。这用于防止用户上传非常大的文件，这些文件最终会填满磁盘。"
  raw: 'The basic class to generate a HTML form can be created with a few methods.


    <?php


    class HTMLForm {


    function __constructor($id, $action, $method = "POST") {


    }


    function AddInput($name, $type, $value = null) {


    }


    function __toString() {


    }


    }


    The first method is the constructor that is called when the object is instantiated.
    The constructor takes a few parameters that define some of the attributes on the
    form tag.


    Next there is a function used to add inputs to the form. The parameters listed
    are a minimum set. As the class is developed there might be a need to add things
    like min and max values, options for a drop-down, and validations functions, but
    this is a good start. Finally the method __toString() is used to generate the
    output. When the object is used in a string context the __toString() function
    will be called and the returned value will be used as the value of the object.


    CHAPTER 13 ■ CREATING AND USING FORMS


    How it Works


    The purpose of the constructor is to initialize the object. In this case all it
    does is to store the parameters that are passed in. These values will be used
    later when the output is generated.


    <?php


    // 13_4.php


    class HTMLForm {


    private $id;


    private $action;


    private $method;


    private $inputs = [];


    function __constructor($id, $action, $method = "POST") {


    $this->id = $id;


    $this->action = $action;


    $this->method = $method;


    }


    function AddInput($type, $name, $label, $value = null) {


    $this->inputs[] = [


    $type,


    $name,


    $label,


    $value


    ];


    }


    function __toString() {


    $form = ''<form id="%s" action="%s", method="%s>%s</form>''; $inputs = [];


    foreach($this->inputs as $input) {


    switch($input[0]) {


    case "hidden" :


    $template = ''<input type="hidden" name="%s" value="%s" />''; $inputs[] = sprintf($template,
    $input[1], $input[3]);


    break;


    case "text" :


    $template = ''<div><label for="%s">%s</label><input type="text" name="%s"


    value="%s" /></div>'';


    $inputs[] = sprintf($template, $input[1], $input[2], $input[1], $input[3]); break;


    case "textarea" :


    $template = ''<div><label for="%s">%s</label><textarea type="text" name="%s" />%s</


    textarea></div>'';


    $inputs[] = sprintf($template, $input[1], $input[2], $input[1], $input[3]); break;


    case "number" :


    $template = ''<div><label for="%s">%s</label><input type="number" name="%s"


    value="%s" /></div>'';


    CHAPTER 13 ■ CREATING AND USING FORMS


    $inputs[] = sprintf($template, $input[1], $input[2], $input[1], $input[3]); break;


    case "select" :


    $template = ''<div><label for="%s">%s</label><select name="%s" >%s</select></div>'';
    $options = [];


    if (is_array($value)) {


    $option = ''<option value="%s">%s</option>'';


    foreach($value as $k => $v) {


    $options[] = sprintf($option, $k, $v);


    }


    }


    $inputs[] = sprintf($template, $input[1], $input[2], $input[1], implode("", $options));
    break;


    }


    }


    $form = sprintf($form, $this->id, $this->action, $this->method, implode("", $inputs));
    return $form;


    }


    }


    The AddInput() method is used to add new inputs to the form. The method has three
    mandatory and one optional argument and the main purpose is to create an array
    with the definition of all the input fields.


    Finally the method __toString() is used to generate the actual form. This method
    uses a number of string templates for the HTML tags and the function sprint()
    to populate the placeholders (%s) with the actual values.


    The HTMLForm class is defined in a file called 13_4.php. This file can be included
    and the object instantiated.


    <?php


    // 13_5.php


    require "./13_4.php";


    $form = new HTMLForm(''contact'', $_SERVER[''PHP_SELF'']);


    $form->AddInput(''text'', ''name'', ''Name'');


    $form->AddInput(''text'', ''email'', ''Email'');


    $form->AddInput(''text'', ''phone'', ''Phone'');


    $form->AddInput(''textarea'', ''comment'', ''Comment'');


    echo <<<HEREDOC


    <!DOCTYPE html>


    <html>


    <body>


    $form


    </body>


    </html>


    HEREDOC;


    This example does not add any specific styling so the browser will add the default
    styling for each element. It is relatively simple to add the Bootstrap css and
    it’s straightforward to add more attributes to handle class, required, and other
    attributes on each element.


    CHAPTER 13 ■ CREATING AND USING FORMS


    A couple of new input types were used in this example. The hidden type is a way
    to add additional information that is beyond the control of the user but the values
    are passed on to the server as part of the request. The text area type is a form
    of multiline input that will allow the user to enter longer text with line breaks.


    The AddInput() method could be split into separate functions for each type of
    input where each method could have parameters that matches the specific type.


    <?php


    // 13_6.php


    class HTMLForm {


    private $id;


    private $action;


    private $method;


    private $inputs = [];


    function __constructor($id, $action, $method = "POST") {


    $this->id = $id;


    $this->action = $action;


    $this->method = $method;


    }


    function AddHidden($name, $value = null) {


    $this->inputs[] = <<<HEREDOC


    <input type="hidden" name="{$name}" value="{$value}" /> HEREDOC;


    }


    function AddText($name, $label, $value = null, $required = false) {


    $attrib = $required ? " required" : "";


    $this->inputs[] = <<<HEREDOC


    <div>


    <label for="{$name}">{$label}</label>


    <input type="text" name="{$name}" value="{$value}"{$attrib} />


    </div>


    HEREDOC;


    }


    function AddTextArea($name, $label, $value = null) {


    $this->inputs[] = <<<HEREDOC


    <div>


    <label for="{$name}">{$label}</label>


    <textarea name="{$name}">{$value}</textarea>


    </div>


    HEREDOC;


    }


    CHAPTER 13 ■ CREATING AND USING FORMS


    function AddNumber($name, $label, $value = null, $required = false, $min = null,
    $max = null) {


    $attrib = $required ? " required" : "";


    if (is_numeric($min)) {


    $attrib .= " min=\"{$min}\"";


    }


    if (is_numeric($max)) {


    $attrib .= " max=\"{$max}\"";


    }


    $this->inputs[] = <<<HEREDOC


    <div>


    <label for="{$name}">{$label}</label>


    <input type="number" name="{$name}" value="{$value}"{$attrib} />


    </div>


    HEREDOC;


    }


    function AddSelect($name, $label, $values = [], $selected = null) {


    $options = [];


    if (is_array($values)) {


    $option = ''<option value="%s"%s>%s</option>'';


    foreach($values as $k => $v) {


    if ($k == $selected) {


    $options[] = sprintf($option, $k, " selected", $v);


    }


    else {


    $options[] = sprintf($option, $k, "", $v);


    }


    }


    }


    $options = implode("", $options);


    $this->inputs[] = <<<HEREDOC


    <div>


    <label for="{$name}">{$label}</label>


    <select name="{$name}">$options</select>


    </div>


    HEREDOC;


    }


    function __toString() {


    $form = ''<form id="%s" action="%s", method="%s>%s</form>''; $inputs = [];


    $form = sprintf($form, $this->id, $this->action, $this->method, implode("", $this->inputs));
    return $form;


    }


    }


    CHAPTER 13 ■ CREATING AND USING FORMS


    In this case each of the Add..() methods is responsible for creating the HTML
    layout for the input. This makes the __toString() method simpler. Using this class
    is very similar to the previous example.


    <?php


    // 13_7.php


    require "./13_6.inc";


    $form = new HTMLForm(''contact'', $_SERVER[''PHP_SELF'']);


    $form->AddHidden(''form'', ''Contact'');


    $form->AddText(''name'', ''Name'', null, true);


    $form->AddText(''email'', ''Email'', null, true);


    $form->AddText(''phone'', ''Phone'');


    $form->AddSelect(''ref'', ''How did your find us?'', [''Google'', ''Bing'', ''Ask'',
    ''Yahoo'', ''Other'']); $form->AddTextarea(''comment'', ''Comment'');


    echo <<<HEREDOC


    <!DOCTYPE html>


    <html>


    <body>


    $form


    </body>


    </html>


    HEREDOC;


    Recipe 13-5\. File Upload


    Problem


    So far we have looked at HTML forms that are populated with input from the keyboard
    or mouse. This generates mostly textual input, but with the graphic nature of
    the web it is necessary to include files from the computer’s hard drive.


    Solution


    Uploading files to a PHP script requires some settings to be enabled in php.ini.
    First of all there is file_


    uploads = On . If this is not set PHP will ignore all uploaded files. Secondly
    there is the limit on the upload size. This is used to prevent users from uploading
    very large files that eventually would fill up the disk drive.'
  trans: "\n生成 HTML 表单的基础类可以通过几个方法创建。\n\n```php\n<?php\n\nclass HTMLForm {\n\n   \
    \ function __constructor($id, $action, $method = \"POST\") {\n\n    }\n\n    function\
    \ AddInput($name, $type, $value = null) {\n\n    }\n\n    function __toString()\
    \ {\n\n    }\n\n}\n```\n\n第一个方法是构造函数，在实例化对象时被调用。构造函数接受几个参数，这些参数定义了表单标签上的一些属性。\n\
    \n接下来是一个用于向表单添加输入项的函数。所列出的参数是最小集合。随着类的开发，可能需要添加诸如最小值和最大值、下拉选项以及验证函数等内容，但这是一个好的开始。最后，`__toString()`方法用于生成输出。当对象在字符串上下文中使用时，`__toString()`函数将被调用，其返回值将作为对象的值。\n\
    \n**工作原理**\n\n构造函数的目的是初始化对象。在此例中，它所做的只是存储传入的参数。这些值将在生成输出时使用。\n\n```php\n<?php\n\
    \n// 13_4.php\n\nclass HTMLForm {\n\n    private $id;\n    private $action;\n\
    \    private $method;\n    private $inputs = [];\n\n    function __constructor($id,\
    \ $action, $method = \"POST\") {\n        $this->id = $id;\n        $this->action\
    \ = $action;\n        $this->method = $method;\n    }\n\n    function AddInput($type,\
    \ $name, $label, $value = null) {\n        $this->inputs[] = [\n            $type,\n\
    \            $name,\n            $label,\n            $value\n        ];\n   \
    \ }\n\n    function __toString() {\n        $form = '<form id=\"%s\" action=\"\
    %s\", method=\"%s>%s</form>';\n        $inputs = [];\n\n        foreach($this->inputs\
    \ as $input) {\n            switch($input[0]) {\n                case \"hidden\"\
    \ :\n                    $template = '<input type=\"hidden\" name=\"%s\" value=\"\
    %s\" />';\n                    $inputs[] = sprintf($template, $input[1], $input[3]);\n\
    \                    break;\n                case \"text\" :\n               \
    \     $template = '<div><label for=\"%s\">%s</label><input type=\"text\" name=\"\
    %s\" value=\"%s\" /></div>';\n                    $inputs[] = sprintf($template,\
    \ $input[1], $input[2], $input[1], $input[3]);\n                    break;\n \
    \               case \"textarea\" :\n                    $template = '<div><label\
    \ for=\"%s\">%s</label><textarea type=\"text\" name=\"%s\" />%s</textarea></div>';\n\
    \                    $inputs[] = sprintf($template, $input[1], $input[2], $input[1],\
    \ $input[3]);\n                    break;\n                case \"number\" :\n\
    \                    $template = '<div><label for=\"%s\">%s</label><input type=\"\
    number\" name=\"%s\" value=\"%s\" /></div>';\n                    $inputs[] =\
    \ sprintf($template, $input[1], $input[2], $input[1], $input[3]);\n          \
    \          break;\n                case \"select\" :\n                    $template\
    \ = '<div><label for=\"%s\">%s</label><select name=\"%s\" >%s</select></div>';\n\
    \                    $options = [];\n                    if (is_array($value))\
    \ {\n                        $option = '<option value=\"%s\">%s</option>';\n \
    \                       foreach($value as $k => $v) {\n                      \
    \      $options[] = sprintf($option, $k, $v);\n                        }\n   \
    \                 }\n                    $inputs[] = sprintf($template, $input[1],\
    \ $input[2], $input[1], implode(\"\", $options));\n                    break;\n\
    \            }\n        }\n        $form = sprintf($form, $this->id, $this->action,\
    \ $this->method, implode(\"\", $inputs));\n        return $form;\n    }\n}\n```\n\
    \n`AddInput()`方法用于向表单添加新的输入项。该方法有三个必需参数和一个可选参数，主要目的是创建一个包含所有输入字段定义的数组。\n\n最后，`__toString()`方法用于生成实际的表单。此方法使用多个\
    \ HTML 标签的字符串模板，并使用 `sprintf()`函数将占位符（`%s`）替换为实际值。\n\n`HTMLForm`类定义在名为 `13_4.php`\
    \ 的文件中。可以包含此文件并实例化该对象。\n\n```php\n<?php\n\n// 13_5.php\n\nrequire \"./13_4.php\"\
    ;\n\n$form = new HTMLForm('contact', $_SERVER['PHP_SELF']);\n$form->AddInput('text',\
    \ 'name', 'Name');\n$form->AddInput('text', 'email', 'Email');\n$form->AddInput('text',\
    \ 'phone', 'Phone');\n$form->AddInput('textarea', 'comment', 'Comment');\n\necho\
    \ <<<HEREDOC\n<!DOCTYPE html>\n<html>\n<body>\n$form\n</body>\n</html>\nHEREDOC;\n\
    ```\n\n此示例没有添加任何特定样式，因此浏览器将为每个元素添加默认样式。添加 Bootstrap CSS 相对简单，并且可以轻松添加更多属性来处理每个元素上的`class`、`required`和其他属性。\n\
    \n此示例中使用了几种新的输入类型。`hidden`类型是一种添加额外信息的方式，这些信息超出用户控制范围，但会作为请求的一部分传递给服务器。`textarea`类型是一种多行输入形式，允许用户输入包含换行符的较长文本。\n\
    \n可以将`AddInput()`方法拆分为每个输入类型的独立函数，每个方法可以具有与该特定类型匹配的参数。\n\n```php\n<?php\n\n//\
    \ 13_6.php\n\nclass HTMLForm {\n\n    private $id;\n    private $action;\n   \
    \ private $method;\n    private $inputs = [];\n\n    function __constructor($id,\
    \ $action, $method = \"POST\") {\n        $this->id = $id;\n        $this->action\
    \ = $action;\n        $this->method = $method;\n    }\n\n    function AddHidden($name,\
    \ $value = null) {\n        $this->inputs[] = <<<HEREDOC\n<input type=\"hidden\"\
    \ name=\"{$name}\" value=\"{$value}\" />\nHEREDOC;\n    }\n\n    function AddText($name,\
    \ $label, $value = null, $required = false) {\n        $attrib = $required ? \"\
    \ required\" : \"\";\n        $this->inputs[] = <<<HEREDOC\n<div>\n    <label\
    \ for=\"{$name}\">{$label}</label>\n    <input type=\"text\" name=\"{$name}\"\
    \ value=\"{$value}\"{$attrib} />\n</div>\nHEREDOC;\n    }\n\n    function AddTextArea($name,\
    \ $label, $value = null) {\n        $this->inputs[] = <<<HEREDOC\n<div>\n    <label\
    \ for=\"{$name}\">{$label}</label>\n    <textarea name=\"{$name}\">{$value}</textarea>\n\
    </div>\nHEREDOC;\n    }\n\n    function AddNumber($name, $label, $value = null,\
    \ $required = false, $min = null, $max = null) {\n        $attrib = $required\
    \ ? \" required\" : \"\";\n        if (is_numeric($min)) {\n            $attrib\
    \ .= \" min=\\\"{$min}\\\"\";\n        }\n        if (is_numeric($max)) {\n  \
    \          $attrib .= \" max=\\\"{$max}\\\"\";\n        }\n        $this->inputs[]\
    \ = <<<HEREDOC\n<div>\n    <label for=\"{$name}\">{$label}</label>\n    <input\
    \ type=\"number\" name=\"{$name}\" value=\"{$value}\"{$attrib} />\n</div>\nHEREDOC;\n\
    \    }\n\n    function AddSelect($name, $label, $values = [], $selected = null)\
    \ {\n        $options = [];\n        if (is_array($values)) {\n            $option\
    \ = '<option value=\"%s\"%s>%s</option>';\n            foreach($values as $k =>\
    \ $v) {\n                if ($k == $selected) {\n                    $options[]\
    \ = sprintf($option, $k, \" selected\", $v);\n                } else {\n     \
    \               $options[] = sprintf($option, $k, \"\", $v);\n               \
    \ }\n            }\n        }\n        $options = implode(\"\", $options);\n \
    \       $this->inputs[] = <<<HEREDOC\n<div>\n    <label for=\"{$name}\">{$label}</label>\n\
    \    <select name=\"{$name}\">$options</select>\n</div>\nHEREDOC;\n    }\n\n \
    \   function __toString() {\n        $form = '<form id=\"%s\" action=\"%s\", method=\"\
    %s>%s</form>';\n        $inputs = [];\n        $form = sprintf($form, $this->id,\
    \ $this->action, $this->method, implode(\"\", $this->inputs));\n        return\
    \ $form;\n    }\n}\n```\n\n在这种情况下，每个`Add...()`方法负责为输入创建 HTML 布局。这使得`__toString()`方法更简单。使用这个类与之前的示例非常相似。\n\
    \n```php\n<?php\n\n// 13_7.php\n\nrequire \"./13_6.inc\";\n\n$form = new HTMLForm('contact',\
    \ $_SERVER['PHP_SELF']);\n$form->AddHidden('form', 'Contact');\n$form->AddText('name',\
    \ 'Name', null, true);\n$form->AddText('email', 'Email', null, true);\n$form->AddText('phone',\
    \ 'Phone');\n$form->AddSelect('ref', 'How did your find us?', ['Google', 'Bing',\
    \ 'Ask', 'Yahoo', 'Other']);\n$form->AddTextarea('comment', 'Comment');\n\necho\
    \ <<<HEREDOC\n<!DOCTYPE html>\n<html>\n<body>\n$form\n</body>\n</html>\nHEREDOC;\n\
    ```\n\n## 13-5. 文件上传\n\n### 问题\n\n到目前为止，我们研究了使用键盘或鼠标输入填充的 HTML 表单。这主要生成文本输入，但鉴于网页的图形特性，有必要包含来自计算机硬盘的文件。\n\
    \n### 解决方案\n\n将文件上传到 PHP 脚本需要在`php.ini`中启用一些设置。首先，有`file_uploads = On`。如果未设置此项，PHP\
    \ 将忽略所有上传的文件。其次，有上传大小的限制。这用于防止用户上传非常大的文件，这些文件最终会填满磁盘。\n"
- fmt: "# File Uploads in PHP\n\nThe setting to control this is called `upload_max_filesize`\
    \ and it defaults to 2Mb. Finally there is the setting for maximum number of files\
    \ per request, `max_file_uploads`, and that has a default value of 20. In general\
    \ there is also a setting for the maximum size of a post request. This value is\
    \ defined by `post_max_size` and the default value is 8Mb. If you are going to\
    \ allow large text inputs you will have to adjust this setting accordingly.\n\n\
    The special input type `\"file\"` allows the user to browse the local hard drive\
    \ for a specific file. The selection of a file requires an action from the user.\
    \ The browser can’t be instructed with script code to select arbitrary files from\
    \ the user’s hard drive.\n\nThe file input will provide the user with a `\"browse\"\
    ` button. When the user clicks the browse button, the browser will open a file\
    \ dialog. The browser, according to the guidelines from the platform, handles\
    \ the look and feel of the browse button and the dialog. It is not possible to\
    \ style these elements.\n\nWhen the HTML form is created it is necessary to add\
    \ the `enctype` attribute to the form in order for the form to handle file uploads.\
    \ The value is defined as `enctype=\"multipart/form-data\"` and the method must\
    \ be set to `POST`. It’s not possible to include file uploads as part of a `GET`\
    \ request. Forgetting to set the `enctype` attribute will cause the name of the\
    \ file to be stored in the `$_POST` array and the file is not available on the\
    \ server.\n\n## Chapter 13: Creating and Using Forms\n\nOn the server side the\
    \ content of the upload is not available in the normal `$_POST` array but can\
    \ be found in the `$_FILES` array. The upload of the file(s) takes place before\
    \ the PHP script starts executing. The file is given a temporary name and placed\
    \ in the `/tmp` folder. The actual location is controlled with the `upload_temp_dir`\
    \ setting in `php.ini`. It is also possible to restrict the max size of uploads\
    \ and the entire POST with settings in `php.ini`. If you plan to allow your users\
    \ to upload large files you will have to adjust these values accordingly.\n\n\
    The super global `$_FILES` will contain a number of values based on the name of\
    \ the input, the name of the selected file, and the size of the uploaded file.\n\
    \n### How it Works\n\nA file upload is handled with a form where the user selects\
    \ the file and a PHP script that receives the uploaded file. As before these can\
    \ be in one PHP script. The next example shows a simple form with two inputs.\
    \ The first is a text field and the second is a file.\n\n```php\n<?php\n// 13_8.php\n\
    \nif (empty($_POST)) {\n    // nothing posted show the form\n    echo <<<HEREDOC\n\
    <!DOCTYPE html>\n<html>\n<head>\n<title>File Upload</title>\n</head>\n<body>\n\
    <form name=\"contact\" method=\"POST\" action=\"{$_SERVER['PHP_SELF']}\" enctype=\"\
    multipart/form-data\" >\n<div>\n<label for=\"name\">Name</label>\n<input name=\"\
    name\" type=\"text\" />\n</div>\n<div>\n<label for=\"email\">File</label>\n<input\
    \ name=\"file\" type=\"file\" />\n</div>\n<button class=\"btn btn-default\" onclick=\"\
    document.contact.submit()\">Submit</button>\n</form>\n</body>\n</html>\nHEREDOC;\n\
    }\nelse {\n    print(\"<pre>\");\n    print_r($_POST);\n    print_r($_FILES);\n\
    \    print(\"</pre>\");\n}\n?>\n```\n\nThe initial output of the script is the\
    \ form, and when the form is submitted it will show the contents of the two super\
    \ globals `$_POST` and `$_FILES`:\n\n```\nArray (\n    [name] => test\n)\nArray\
    \ (\n    [file] => Array\n        (\n            [name] => city.list.json\n  \
    \          [type] => application/json\n            [tmp_name] => /tmp/php0pdVpy\n\
    \            [error] => 0\n            [size] => 19208925\n        )\n)\n```\n\
    \nThe attribute of the `$_FILES` array is the name of the input. This is also\
    \ an array that contains the name of the file, the MIME type, the temporary name\
    \ and path, an error code (0 means no errors), and the size in bytes of the uploaded\
    \ file.\n\nThe temporary file is automatically deleted when the script terminates,\
    \ unless there is a fatal error in the script. In order to keep the file on the\
    \ server the script must move the file to a different location. Besides checking\
    \ for error conditions with the upload there are a couple of functions that are\
    \ useful to move files."
  raw: 'The setting to control this is called upload_max_filesize and it defaults
    to 2Mb. Finally there is the setting for maximum number of files per request,
    max_file_uploads and that has a default value of 20. In general there is also
    a setting for the maximum size of a post request. This value is defined by post_max_size
    and the default value is 8Mb. If you are going to allow large text inputs you
    will have to adjust this setting accordingly.


    The special input type “file” allows the user to browse the local hard drive for
    a specific file. The selection of a file requires an action from the user. The
    browser can’t be instructed with script code to select arbitrary files from the
    user’s hard drive.


    The file input will provide the user with a “browse” button. When the user clicks
    the browse button, the browser will open a file dialog. The browser, according
    to the guidelines from the platform, handles the look and feel of the browse button
    and the dialog. It is not possible to style these elements.


    When the html form is created it is necessary to add the enctype attribute to
    the form in order for the form to handle file uploads. The value is defined as
    enctype="multipart/form-data" and the method must be set to POST. It’s not possible
    to include file uploads as part of a GET request. Forgetting to set the enctype
    attribute will cause the name of the file to be stored in the $_POST array and
    the file is not available on the server.


    CHAPTER 13 ■ CREATING AND USING FORMS


    On the server side the content of the upload is not available in the normal $_POST
    array but can be found in the $_FILES array. The upload of the file(s) take place
    before the PHP script starts executing. The file is given a temporary name and
    placed in the /tmp folder. The actual location is controlled with the upload_temp_dir
    setting in php.ini. It is also possible to restrict the max size of uploads and
    the entire POST


    with settings in php.ini. If you plan to allow your users to upload large files
    you will have to adjust these values accordingly.


    The super global $_FILES will contain a number of values based on the name of
    the input, the name of the select file, and the size of the uploaded file.


    How it Works


    A file upload is handled with a form where the user selects the file and a PHP
    script that received the uploaded file. As before these can be in one php script.
    The next example shows a simple form with two inputs. The first is a text field
    and the second is a file.


    <?php


    // 13_8.php


    if (empty($_POST)) {


    // nothing posted show the form


    echo <<<HEREDOC


    <!DOCTYPE html>


    <html>


    <head>


    <title>File Upload</title>


    </head>


    <body>


    <form name="contact" method="POST" action="{$_SERVER[''PHP_SELF'']}" enctype="multipart/form-data"
    >


    <div>


    <label for="name">Name</label>


    <input name="name" type="text" />


    </div>


    <div>


    <label for="email">File</label>


    <input name="file" type="file" />


    </div>


    <button class="btn btn-default" onclick="document.contact.submit()">Submit</button>


    </form>


    </body>


    </html>


    HEREDOC;


    }


    else {


    print("<pre>");


    print_r($_POST);


    print_r($_FILES);


    print("</pre>");


    }


    CHAPTER 13 ■ CREATING AND USING FORMS


    The initial output of the script is the form and when the form is submitted it
    will show the contents of the two super globals $_POST and $_FILES .


    Array (


    [name] => test


    )


    Array (


    [file] => Array


    (


    [name] => city.list.json


    [type] => application/json


    [tmp_name] => /tmp/php0pdVpy


    [error] => 0


    [size] => 19208925


    )


    )


    The attribute of the $_FILES array is the name of the input. This is also an array
    that contains the name of the file, the mime type, the temporary name and path,
    an error code (0 means no errors), and the size in bytes of the uploaded file.


    The temporary file is automatically deleted when the script terminates, unless
    there is a fatal error in the script. In order to keep the file on the server
    the script must move the file to a different location. Besides checking for error
    conditions with the upload there are a couple of functions that are useful to
    move files.'
  trans: "\n# PHP 中的文件上传\n\n控制此功能的设置名为 `upload_max_filesize`，其默认值为 2Mb。此外，还有针对每次请求最大文件数的设置\
    \ `max_file_uploads`，默认值为 20。通常还有一个针对 POST 请求最大尺寸的设置，该值由 `post_max_size` 定义，默认值为\
    \ 8Mb。如果你打算允许输入大段文本，则需要相应调整此设置。\n\n特殊的输入类型 `\"file\"` 允许用户浏览本地硬盘以选择特定文件。文件的选择需要用户主动操作。浏览器无法通过脚本代码被指示从用户硬盘中任意选取文件。\n\
    \n文件输入框会为用户提供一个 **\"浏览\"** 按钮。当用户点击浏览按钮时，浏览器会打开一个文件对话框。浏览器会根据平台指南处理浏览按钮和对话框的外观与交互。这些元素是无法进行样式定制的。\n\
    \n创建 HTML 表单时，必须在表单中添加 `enctype` 属性，以便表单能够处理文件上传。该属性的值定义为 `enctype=\"multipart/form-data\"\
    `，并且方法必须设置为 `POST`。无法将文件上传作为 `GET` 请求的一部分。忘记设置 `enctype` 属性会导致文件名被存储在 `$_POST`\
    \ 数组中，而文件本身则不会存在于服务器上。\n\n## 第 13 章：创建和使用表单\n\n在服务器端，上传文件的内容并不存在于常规的 `$_POST`\
    \ 数组中，而是可以在 `$_FILES` 数组中找到。文件的上传发生在 PHP 脚本开始执行之前。文件会被赋予一个临时名称并放置在 `/tmp` 文件夹中。实际的位置由\
    \ `php.ini` 中的 `upload_temp_dir` 设置控制。此外，还可以通过 `php.ini` 中的设置来限制上传文件的最大尺寸以及整个\
    \ POST 请求的尺寸。如果你计划允许用户上传大文件，则必须相应调整这些值。\n\n超级全局变量 `$_FILES` 会根据输入的名称、所选文件的名称以及上传文件的大小，包含一系列值。\n\
    \n### 工作原理\n\n文件上传通过一个表单（用户在此选择文件）和一个接收上传文件的 PHP 脚本来处理。和之前一样，这两者可以位于同一个 PHP 脚本中。下一个示例展示了一个包含两个输入框的简单表单。第一个是文本字段，第二个是文件字段。\n\
    \n```php\n<?php\n// 13_8.php\n\nif (empty($_POST)) {\n    // 没有提交内容，显示表单\n   \
    \ echo <<<HEREDOC\n<!DOCTYPE html>\n<html>\n<head>\n<title>文件上传</title>\n</head>\n\
    <body>\n<form name=\"contact\" method=\"POST\" action=\"{$_SERVER['PHP_SELF']}\"\
    \ enctype=\"multipart/form-data\" >\n<div>\n<label for=\"name\">姓名</label>\n<input\
    \ name=\"name\" type=\"text\" />\n</div>\n<div>\n<label for=\"email\">文件</label>\n\
    <input name=\"file\" type=\"file\" />\n</div>\n<button class=\"btn btn-default\"\
    \ onclick=\"document.contact.submit()\">提交</button>\n</form>\n</body>\n</html>\n\
    HEREDOC;\n}\nelse {\n    print(\"<pre>\");\n    print_r($_POST);\n    print_r($_FILES);\n\
    \    print(\"</pre>\");\n}\n?>\n```\n\n脚本的初始输出是表单，当表单被提交时，它会显示两个超级全局变量 `$_POST`\
    \ 和 `$_FILES` 的内容：\n\n```\nArray (\n    [name] => test\n)\nArray (\n    [file]\
    \ => Array\n        (\n            [name] => city.list.json\n            [type]\
    \ => application/json\n            [tmp_name] => /tmp/php0pdVpy\n            [error]\
    \ => 0\n            [size] => 19208925\n        )\n)\n```\n\n`$_FILES` 数组的属性是输入框的名称。它本身也是一个数组，包含文件名、MIME\
    \ 类型、临时名称和路径、错误代码（0 表示无错误）以及上传文件的字节大小。\n\n临时文件会在脚本终止时自动删除，除非脚本中发生了致命错误。为了将文件保留在服务器上，脚本必须将文件移动到其他位置。除了检查上传过程中的错误状态外，还有几个函数对移动文件非常有用。\n"
- fmt: "函数 `is_uploaded_file()` 用于检查文件是否通过 HTTP POST 方式上传。该函数接受一个参数，通常为 `$_FILES['file']['tmp_name']`。另一个函数\
    \ `move_uploaded_file()` 用于将上传的文件移动并重命名到其永久位置。该函数接受两个参数：第一个是临时文件名，第二个是新文件/位置的路径和名称。在上面的示例中，代码大致如下：\n\
    \n```php\n<?php\n// 13_9.php\n\nif ($_FILES['file']['error'] == UPLOAD_ERR_OK\
    \ &&\n    is_uploaded_file($_FILES['file']['tmp_name'])) {\n    move_uploaded_file($_FILES['file']['tmp_name'],\n\
    \        \"/path/to/file/{$_FILES['file']['name']}\");\n}\n```\n\n## Recipe 13-6.\
    \ Form Data\n\n### Problem\n\n在前面的所有配方中，我们都使用了 HTML 表单让用户输入数据，并通过按钮将数据提交到服务器。是否可以在没有提交按钮的情况下提交表单？\n\
    \n### Solution\n\n在大多数现代浏览器（Firefox、Chrome、IE 10 及更新版本）中，存在一个名为 `FormData` 的对象。该对象可用于构建并提交具有动态字段数量的表单。\n\
    \n## CHAPTER 13 ■ CREATING AND USING FORMS\n\n### How it Works\n\n从服务器端来看，POST\
    \ 的接收和管理方式没有区别，但在客户端，POST 完全由 JavaScript 创建，并通过 `XMLHTTPRequest` 请求提交。\n\n```javascript\n\
    var content = new FormData();\ncontent.append('name', 'Frank Kromann');\ncontent.append('email',\
    \ 'fmk@php.net');\nxmlhttp = new XMLHttpRequest();\nxmlhttp.open(\"POST\", URL,\
    \ true);\nxmlhttp.send(content);\n```\n\n这可用于在提交整个表单之前验证部分表单。例如，您可以先检查数据库中是否存在用户名，然后再允许用户提交表单，或者用于其他服务器端验证。\n\
    \n## **CHAPTER 14**\n\n## **XML, RSS, WDDX, and SOAP**\n\nWeb 技术不仅仅是浏览器和 Web 服务器使用的\
    \ HTML 和 JavaScript。其他类型的客户端使用其他协议和数据格式来交换和呈现数据。本章包含如何使用 HTML 和 JavaScript 以外的格式创建内容的配方。\n\
    \n### Recipe 14-1. Exchanging Data with XML\n\n#### Problem\n\nXML 是一种结构化数据格式，具有类似\
    \ HTML 的标签和属性。它通常更严格一些，因为缺少相应结束标签的标签会导致错误。在 HTML 中，允许出现 `<hr>` 或 `<br>` 标签而不需要对应的\
    \ `</hr>` 或 `</br>`。XHTML 标准强制执行 XML 约定，要求将标签写成 `<hr/>` 或 `<br/>`，这些是有效的 XML。\n\
    \nXML 通常用于交换数据，因为它是一种平台无关的标准，易于阅读和解析。就像 PHP 可以用于生成 XML 内容一样，方法类似于生成 HTML 内容，但将\
    \ XML 结构作为字符串管理并不总是最有效的方式，尤其是在将 XML 作为 PHP 脚本输入时解析值。PHP 提供了哪些工具来生成和使用 XML 内容？\n\
    \n#### Solution\n\n有多种不同的方式可以使用 PHP 生成 XML。最简单的方法是创建一个包含 XML 字符串的字符串，并输出给客户端，同时设置正确的头信息。对于像插入或更新命令的响应这样的小型\
    \ XML 字符串，这种方法效果很好，因为 XML 相对简单。下一个示例展示了如何使用 PHP 生成一个包含错误或成功 XML 结构的简单响应。\n\n```php\n\
    <?php\n// 14_1.php\n// Process request and make a response\n\nheader(\"Content-Type:\
    \ text/xml\");\n\nif ($error) {\n    $resp = <<<HEREDOC\n<?xml version=\"1.0\"\
    \ encoding=\"UTF-8\"?>\n<error>\n    <code>100</code>\n    <message>The insert\
    \ failed</message>\n</error>\nHEREDOC;\n} else {\n    $resp = <<<HEREDOC\n<?xml\
    \ version=\"1.0\" encoding=\"UTF-8\"?>\n<success>\n    <message>The record was\
    \ added</message>\n</success>\nHEREDOC;\n}\n```"
  raw: 'The function is_uploaded_file() will check if the file was actually uploaded
    via the HTTP POST. This function takes a single parameter, which usually is $_FILES[''file''][''tmp_name'']
    . The other function move_uploaded_file() is used to move and rename the uploaded
    file into its permanent position. This function takes two parameters where the
    first is the temporary name and the second is the path and name of the new file/location.
    In the example above this would look something like this:


    <?php


    // 13_9.php


    if ($_FILES[''file''][''error''] == UPLOAD_ERR_OK &&


    is_uploaded_file($_FILES[''file''][''tmp_name''])) {


    move_uploaded_file($_FILES[''file''][''tmp_name''],


    "/path/to/file/{$_FILES[''file''][''name'']}");


    }


    Recipe 13-6\. Form Data


    Problem


    In all the previous recipes we have used a HTML form to allow the user to enter
    data and a button to submit data to the server. Is it possible to submit forms
    without the submit button?


    Solution


    In most modern browsers (Firefox, Chrome, IE 10, and newer) there is an object
    called FormData. This object can be used to build and post forms with a dynamic
    number of fields.


    CHAPTER 13 ■ CREATING AND USING FORMS


    How it Works


    From the server side there is no difference in how the POST is received and managed
    but in the client the POST is created entirely with javascript and is submitted
    with a XMLHTTP request.


    var content = new FormData();


    content.append(''name'', ''Frank Kromann'');


    content.append(''email'', ''fmk@php.net'');


    xmlhttp = new XMLHttpRequest();


    xmlhttp.open("POST", URL, true);


    xmlhttp.send(content);


    This can be used to validate a partial form without submitting the entire form.
    For example, you might want to check if a user name exists in the database before
    allowing the user to submit the form or if you want to use other server-side validation.


    **CHAPTER 14**


    **XML, RSS, WDDX, and SOAP**


    Web technology is more than HTML and JavaScript used by browsers and web servers.
    Other types of clients use other protocols and data formats to exchange and present
    data. This chapter contains recipes on how to create content in formats other
    than the usual HTML and JavaScript.


    Recipe 14-1\. Exchanging Data with XML


    Problem


    XML is a structured data format with tags and attributes like HTML. It is usually
    a bit stricter as tags without a corresponding closing tag will cause an error.
    In HTML it is allowed to have a <hr> or <br> tag without a corresponding </hr>
    or </br>. The XHTML standard enforces the XML convention and requires the tags
    to be written as <hr/> or <br/> which is valid XML.


    XML is commonly used to exchange data, as it is a platform independent standard
    that is easy to read and parse. Just like PHP can be used to generate XML content
    the same way it generates HTML content but managing XML structures as strings
    is not always the most efficient, especially when it comes to parsing the values
    if the XML is used as an input to the PHP script. What tools does PHP provide
    to generate and consume XML content?


    Solution


    There are a number of different ways to generate XML with PHP. The simplest form
    is to create a string that contains the XML string and output that goes to the
    client with the correct headers. For small XML strings like a response to an insert
    or update command this can work well as the XML is relatively simple. The next
    example shows how PHP can be used to generate a simple response with an error
    or success XML structure .


    <?php


    // 14_1.php


    // Process request and make a response


    header("Content-Type: text/xml");


    if ($error) {


    $resp = <<<HEREDOC


    <?xml version="1.0" encoding="UTF-8"?>


    <error>


    <code>100</code>


    <message>The insert failed</message>


    </error>


    HEREDOC;


    © Frank M. Kromann 2016


    F.M. Kromann, *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_14


    CHAPTER 14 ■ XML, RSS, WDDX, AND SOAP


    }


    else {


    $resp = <<<HEREDOC


    <?xml version="1.0" encoding="UTF-8"?>


    <success>


    <message>The record was added</message>


    </sucess>


    HEREDOC;


    }'
