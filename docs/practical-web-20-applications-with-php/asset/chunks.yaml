    After calling _GetBaseQuery(), we add the fields we require to the statement.
    To execute the query, we call fetchPairs(). This method returns an array of the
    rows returned from the SQL query. It uses the first selected column as the array
    key and the second selected column as the array element.


    In this code, we use the timestamp as the array key and the number of posts for
    that month as the array value. The format string we pass to MySQL’s date_format()
    function will generate a timestamp in the format of YYYY-MM, so in the case of
    November 2007, the returned month column would have the value 2007-11.


    ■**Note** The date_format() function is specific to MySQL and will not work in
    other database servers.


    Other servers such as PostgreSQL use the to_char() function instead, which is
    why we check the type of database adapter being used in Listing 8-6.


    Next we must group the data by the year/month value, before setting the ordering
    options.


