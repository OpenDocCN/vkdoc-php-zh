    \ pages contain simple forms that ask for the user’s name,\n    age, and address.\
    \ The `action` attribute of\n    each `<form>` tag is\n    set to the current\
    \ page, so the forms are self-processing, but they\n    don’t yet contain any\
    \ processing script. The final page is where the\n    data from the first three\
    \ pages will eventually be displayed.\n\n2.  Add the following code in a PHP block\
    \ above the `DOCTYPE` declaration\n    in `multiple_01.php`:\n\n```\n    if (isset($_POST['next']))\
    \ {\n    session_start();\n    // set a variable to control access to other pages\n\
    \    $_SESSION['formStarted'] = true;\n    // set required fields\n    $required\
    \ = 'first_name';\n    $firstPage = 'multiple_01.php';\n    $nextPage = 'multiple_02.php';\n\
    \    $submit = 'next';\n    require_once '../includes/multiform.php';\n    }\n\
    \    ```\n\nThe `name`\n    attribute of the Submit button is `next`, so the code\
    \ in\n    this block runs only if the form has been submitted. It initiates a\n\
    \    session and creates a session variable that will be used to control\n   \
    \ access to the other form pages.\n\nNext come four variables that will be used\
    \ by the script that processes\n    the multipage form:\n\n*   `$required`: This\
    \ is an\n        array of the `name` attributes of\n        required fields in\
    \ the current page. If only one field is required, a\n        string can be used\
    \ instead of an array. If no fields are required, it\n        can be omitted.\n\
    \n*   `$firstPage`: The\n        filename of the first page of the form.\n\n*\
    \   `$nextPage`: The\n        filename of the next page in the form.\n\n*   `$submit`:\n\
    \        The name of the Submit button in the current page.\n\nFinally, the code\
    \ includes the script that processes the multipage\n    form.\n\n3.  Create a\
    \ file called `multiform.php` in the\n    `includes`\n    folder. Delete any HTML\
    \ markup and insert the following code:\n\n```\n    <?php\n    if (!isset($_SESSION))\
    \ {\n    session_start();\n    }\n    $filename = basename($_SERVER['SCRIPT_FILENAME']);\n\
    \    $current = 'http://' . $_SERVER['HTTP_HOST'] . $_SERVER['PHP_SELF'];\n  \
    \  ```\n\nEach page of the multipage form needs to call `session_start()`, but\n\
    \    calling it twice on the same page generates an error, so the conditional\n\
    \    statement first checks whether the `$_SESSION` superglobal\n    variable\
    \ is accessible. If it isn’t, it initiates the session for the\n    page.\n\n\
    After the conditional statement, `$_SERVER['SCRIPT_FILENAME']`\n    is passed\
    \ to the `basename()` function\n    to extract the filename of the current page.\
    \ This is the same technique\n    that you used in PHP Solution 5-3.\n\n`$_SERVER['SCRIPT_FILENAME']`\n\
    \    contains the path of the parent file, so when this script is included in\n\
    \    `multiple_01.php`, the\n    value of `$filename` will be\n    `multiple_01.php`,\n\
    \    *not* `multiform.php`.\n\nThe next line builds the URL for the current page\
    \ from the string\n    `http://` and the\n    values of `$_SERVER['HTTP_HOST']`,\n\
    \    which contains the current domain name, and `$_SERVER['PHP_SELF']`,\n   \
    \ which contains the path of the current file minus the domain name. If\n    you’re\
    \ testing locally, when the first page of the multipage form loads,\n    `$current`\
    \ is\n    `http://localhost/phpsols-4e/sessions/multiple_01.php`.\n\n4.  Now that\
    \ you have both the name of the current file and its URL, you can\n    use `str_replace()`\
    \ to\n    create the URLs for the first and next pages, like this:\n\n```\n  \
    \  $redirectFirst = str_replace($filename, $firstPage, $current);\n    $redirectNext\
    \ = str_replace($filename, $nextPage, $current);\n    ```\n\nThe first argument\
    \ is the string you want to replace, the second is\n    the replacement string,\
    \ and the third is the target string. In step 2,\n    you set `$firstPage` to\
    \ `multiple_01.php` and\n    `$nextPage` to\n    `multiple_02.php`. As a\n   \
    \ result, `$redirectFirst`\n    becomes `http://localhost/phpsols-4e/sessions/multiple_01.php`,\n\
    \    and `$redirectNext` is\n    `http://localhost/phpsols-4e/sessions/multiple_02.php`.\n\
    \n5.  To prevent users from accessing the multipage form without starting at\n\
    \    the beginning, add a conditional statement that checks the value of\n   \
    \ `$filename`. If\n    it’s not the same as the first page, and `$_SESSION['formStarted']`\n\
    \    hasn’t been created, the `header()` function\n    redirects to the first\
    \ page, like this:\n\n```\n    if ($filename != $firstPage && !isset($_SESSION['formStarted']))\
    \ {\n    header(\"Location: $redirectFirst\");\n    exit;\n    }\n    ```\n\n\
    6.  The rest of the script loops through the `$_POST` array,\n    checking for\
    \ required fields that are blank and adding them to a `$missing` array. If\n \
    \   nothing is missing, the `header()` function\n    redirects the user to the\
    \ next page of the multipage form. The complete\n    script for `multiform.php`\
    \ looks\n    like this:\n\n```\n     $value) {\n    // skip submit button\n  \
    \  if ($key == $submit) continue;\n    // strip whitespace if not an array\n \
    \   if (!is_array($value)) {\n    $value = trim($value);\n    }\n    // if empty\
    \ and required, add to $missing array\n    if (in_array($key, $required) && empty($value))\
    \ {\n    $missing[] = $key;\n    continue;\n    }\n    // otherwise, assign to\
    \ a session variable of the same name as $key\n    $_SESSION[$key] = $value;\n\
    \    }\n    // if no required fields are missing, redirect to next page\n    if\
    \ (!$missing) {\n    header(\"Location: $redirectNext\");\n    exit;\n    }\n\
    \    }\n    ```\n\nThe code is very similar to that used in Chapter [6](#332054_4_En_6_Chapter.xhtml)\
    \ to process the feedback form, so\n    the inline comments should be sufficient\
    \ to explain how it works. The\n    conditional statement wrapped around the new\
    \ code uses `$_POST[$submit]` to\n    check if the form has been submitted. I\
    \ have used a variable rather than\n    hard-coding the name of the Submit button\
    \ to make the code more\n    flexible. Although this script is included in the\
    \ first page only after\n    the form has been submitted, it’s included directly\
    \ in the other pages,\n    so it’s necessary to add the conditional statement\
    \ here.\n\nThe name and value of the Submit button are always included in the\n\
    \    `$_POST` array,\n    so the `foreach`\n    loop uses the `continue` keyword\
    \ to\n    skip to the next item if the key is the same as the Submit button’s\n\
    \    name. This avoids adding the unwanted value to the `$_SESSION` array. See\n\
    \    “Breaking out of a loop” in Chapter [4](#332054_4_En_4_Chapter.xhtml) for\
    \ a description of `continue`.\n\n7.  Add the following code in a PHP block above\
    \ the `DOCTYPE` declaration\n    in `multiple_02.php`:\n\n```\n    $firstPage\
    \ = 'multiple_01.php';\n    $nextPage = 'multiple_03.php';\n    $submit = 'next';\n\
    \    require_once '../includes/multiform.php';\n    ```"
  trans: "\n# PHP 解决方案 11-9：使用会话实现多页表单\n\n顾名思义，隐藏字段是表单代码的一部分，但屏幕上不会显示任何内容。隐藏字段适合存储一两个项目，但假设你有一个分布在四页上的调查问卷。如果每页有\
    \ 10 个项目，则总共需要 60 个隐藏字段（第二页 10 个，第三页 20 个，第四页 30 个）。**会话变量**可以省去所有这些编码工作。它们还可以确保访问者始终从多页表单的正确页面开始。\n\
    \n在本 PHP 解决方案中，你将构建一个用于多页表单的脚本，该脚本从 `$_POST` 数组中收集数据并将其分配给会话变量。如果有人试图直接访问表单的其他页面，该脚本会自动将用户重定向到表单的第一页。\n\
    \n1. 将 `ch11` 文件夹中的 `multiple_01.php`、`multiple_02.php`、`multiple_03.php` 和 `multiple_04.php`\
    \ 复制到 `sessions` 文件夹。前三页包含简单的表单，用于询问用户的姓名、年龄和地址。每个 `<form>` 标签的 `action` 属性都设置为当前页面，因此表单是自处理的，但它们尚不包含任何处理脚本。最后一页将最终显示前三页的数据。\n\
    \n2. 在 `multiple_01.php` 的 `DOCTYPE` 声明上方的一个 PHP 代码块中添加以下代码：\n\n```\nif (isset($_POST['next']))\
    \ {\n    session_start();\n    // 设置一个变量来控制对其他页面的访问\n    $_SESSION['formStarted']\
    \ = true;\n    // 设置必填字段\n    $required = 'first_name';\n    $firstPage = 'multiple_01.php';\n\
    \    $nextPage = 'multiple_02.php';\n    $submit = 'next';\n    require_once '../includes/multiform.php';\n\
    }\n```\n\n提交按钮的 `name` 属性是 `next`，因此仅当表单已提交时，此代码块中的代码才会运行。它会启动一个会话并创建一个会话变量，该变量将用于控制对其他表单页面的访问。\n\
    \n接下来是四个变量，它们将由处理多页表单的脚本使用：\n\n- `$required`：这是一个数组，包含当前页面中必填字段的 `name` 属性。如果只有一个必填字段，则可以使用字符串而不是数组。如果没有必填字段，则可以省略。\n\
    - `$firstPage`：表单第一页的文件名。\n- `$nextPage`：表单中下一页的文件名。\n- `$submit`：当前页面中提交按钮的名称。\n\
    \n最后，代码包含了处理多页表单的脚本。\n\n3. 在 `includes` 文件夹中创建一个名为 `multiform.php` 的文件。删除所有 HTML\
    \ 标记并插入以下代码：\n\n```\n<?php\nif (!isset($_SESSION)) {\n    session_start();\n}\n\
    $filename = basename($_SERVER['SCRIPT_FILENAME']);\n$current = 'http://' . $_SERVER['HTTP_HOST']\
    \ . $_SERVER['PHP_SELF'];\n```\n\n多页表单的每一页都需要调用 `session_start()`，但在同一页上调用两次会导致错误，因此条件语句首先检查\
    \ `$_SESSION` 超全局变量是否可访问。如果不可访问，它会为当前页面启动会话。\n\n条件语句之后，`$_SERVER['SCRIPT_FILENAME']`\
    \ 被传递给 `basename()` 函数以提取当前页面的文件名。这与您在 PHP 解决方案 5-3 中使用的技术相同。\n\n`$_SERVER['SCRIPT_FILENAME']`\
    \ 包含父文件的路径，因此当此脚本被包含在 `multiple_01.php` 中时，`$filename` 的值将是 `multiple_01.php`，*而不会是*\
    \ `multiform.php`。\n\n下一行通过字符串 `http://` 以及 `$_SERVER['HTTP_HOST']`（包含当前域名）和 `$_SERVER['PHP_SELF']`（包含当前文件除域名外的路径）的值来构建当前页面的\
    \ URL。如果您在本地测试，当多页表单的第一页加载时，`$current` 将是 `http://localhost/phpsols-4e/sessions/multiple_01.php`。\n\
    \n4. 现在你已经有了当前文件的名称及其 URL，你可以使用 `str_replace()` 来创建第一页和下一页的 URL，如下所示：\n\n```\n\
    $redirectFirst = str_replace($filename, $firstPage, $current);\n$redirectNext\
    \ = str_replace($filename, $nextPage, $current);\n```\n\n第一个参数是要替换的字符串，第二个参数是替换字符串，第三个参数是目标字符串。在第\
    \ 2 步中，你将 `$firstPage` 设置为 `multiple_01.php`，将 `$nextPage` 设置为 `multiple_02.php`。因此，`$redirectFirst`\
    \ 变成 `http://localhost/phpsols-4e/sessions/multiple_01.php`，而 `$redirectNext`\
    \ 是 `http://localhost/phpsols-4e/sessions/multiple_02.php`。\n\n5. 为防止用户不从头开始就访问多页表单，请添加一个条件语句来检查\
    \ `$filename` 的值。如果它不是第一页，并且 `$_SESSION['formStarted']` 尚未创建，则 `header()` 函数会重定向到第一页，如下所示：\n\
    \n```\nif ($filename != $firstPage && !isset($_SESSION['formStarted'])) {\n  \
    \  header(\"Location: $redirectFirst\");\n    exit;\n}\n```\n\n6. 脚本的其余部分会遍历 `$_POST`\
    \ 数组，检查是否有必填字段为空，并将它们添加到 `$missing` 数组中。如果没有缺失项，`header()` 函数会将用户重定向到多页表单的下一页。`multiform.php`\
    \ 的完整脚本如下所示：\n\n```\n     $value) {\n    // 跳过提交按钮\n    if ($key == $submit) continue;\n\
    \    // 如果不是数组，则去除空白\n    if (!is_array($value)) {\n        $value = trim($value);\n\
    \    }\n    // 如果为空且是必填字段，则添加到 $missing 数组\n    if (in_array($key, $required)\
    \ && empty($value)) {\n        $missing[] = $key;\n        continue;\n    }\n\
    \    // 否则，分配给与 $key 同名的会话变量\n    $_SESSION[$key] = $value;\n}\n// 如果没有必填字段缺失，则重定向到下一页\n\
    if (!$missing) {\n    header(\"Location: $redirectNext\");\n    exit;\n}\n```\n\
    \n这段代码与第 6 章中用于处理反馈表单的代码非常相似，因此内联注释应该足以说明其工作原理。包裹新代码的条件语句使用 `$_POST[$submit]`\
    \ 来检查表单是否已提交。我使用了变量而不是硬编码提交按钮的名称，以使代码更加灵活。虽然此脚本仅在表单提交后被包含在第一页中，但它直接被包含在其他页面中，因此有必要在此处添加条件语句。\n\
    \n提交按钮的名称和值始终包含在 `$_POST` 数组中，因此 `foreach` 循环使用 `continue` 关键字，以便在键与提交按钮的名称相同时跳过该项。这可以避免将不需要的值添加到\
    \ `$_SESSION` 数组中。有关 `continue` 的描述，请参见第 4 章的“跳出循环”。\n\n7. 在 `multiple_02.php`\
    \ 的 `DOCTYPE` 声明上方的一个 PHP 代码块中添加以下代码：\n\n```\n$firstPage = 'multiple_01.php';\n\
    $nextPage = 'multiple_03.php';\n$submit = 'next';\nrequire_once '../includes/multiform.php';\n\
    ```\n"
- fmt: "This sets the values of `$firstPage`, `$nextPage`, and `$submit` and includes\
    \ the processing script you have just created. The form on this page contains\
    \ only one field, which is optional, so the `$required` variable isn’t needed.\
    \ The processing script automatically creates an empty array if it isn’t set in\
    \ the main page.\n\n8.  In `multiple_03.php`, add the following in a PHP code\
    \ block above the `DOCTYPE` declaration:\n\n```\n// set required fields\n$required\
    \ = ['city', 'country'];\n$firstPage = 'multiple_01.php';\n$nextPage = 'multiple_04.php';\n\
    $submit = 'next';\nrequire_once '../includes/multiform.php';\n```\n\nTwo fields\
    \ are required, so their `name` attributes are listed as an array and assigned\
    \ to `$required`. The other code is the same as in the previous page.\n\n9.  Add\
    \ the following code above the `<form>` tag in `multiple_01.php`, `multiple_02.php`,\
    \ and `multiple_03.php`:\n\n```\n<?php\nif ($missing) {\n    echo 'Please fix\
    \ the following required fields:<ul>';\n    foreach ($missing as $item) {\n  \
    \      echo \"<li>$item</li>\";\n    }\n    echo '</ul>';\n}\n?>\n```\n\nThis\
    \ displays a list of required items that haven’t yet been filled in.\n\n10.  In\
    \ `multiple_04.php`, add the following code in a PHP block above the `DOCTYPE`\
    \ declaration to redirect users to the first page if they didn’t enter the form\
    \ from there:\n\n```\n<?php\nsession_start();\nif (!isset($_SESSION['formStarted']))\
    \ {\n    header('Location: http://localhost/phpsols-4e/sessions/multiple_01.php');\n\
    \    exit;\n}\n?>\n```\n\n11.  In the body of the page, add the following code\
    \ to the unordered list to display the results:\n\n```\n<?php\n$expected = ['city',\
    \ 'country', 'first_name', 'last_name', 'age'];\nforeach ($expected as $key) {\n\
    \    echo \"<li>$key: \" . htmlentities($_SESSION[$key]) . '</li>';\n    // unset\
    \ the session variable\n    unset($_SESSION[$key]);\n}\n?>\n```\n\nThis lists\
    \ the `name` attributes of the form fields as an array and assigns the array to\
    \ `$expected`. This is a security measure to ensure you don’t process bogus values\
    \ that might have been injected into the `$_POST` array by a malicious user.\n\
    \nThe code then unsets `$_SESSION['formStarted']` and loops through the `$expected`\
    \ array using each value to access the relevant element of the `$_SESSION` array\
    \ and display it in the unordered list. The session variable is then deleted.\
    \ Deleting the session variables individually leaves intact any other session-related\
    \ information.\n\n12.  Save all the pages, then try to load one of the middle\
    \ pages of the form, or the last one, into a browser. You should be taken to the\
    \ first page. Click Next without filling in either field. You’ll be asked to fill\
    \ in the `first_name` field. Fill in the required fields and click Next on each\
    \ page. The results should be displayed on the final page, as shown in Figure\
    \ [11-5](#332054_4_En_11_Chapter.xhtml#Fig5).\n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Fig5_HTML.jpg](images/332054_4_En_11_Chapter/332054_4_En_11_Fig5_HTML.jpg)\n\
    \nFigure 11-5. The session variables preserved the input from multiple pages\n\
    \nYou can check your code against `multiple_01_done.php`, `multiple_02_done.php`,\
    \ `multiple_03_done.php`, `multiple_04_done.php`, and `multiform.php` in the `ch11`\
    \ folder.\n\nThis is just a simple demonstration of a multipage form. In a real-world\
    \ application, you would need to preserve the user input when required fields\
    \ are left blank. The script in `multiform.php` can be used with any multipage\
    \ form by creating `$_SESSION['formStarted']` on the first page after the form\
    \ has been submitted, and by using `$required`, `$firstPage`, `$nextPage`, and\
    \ `$submit` on each page. Use the `$missing` array to handle required fields that\
    \ aren’t filled in.\n\n## Chapter Review\n\nIf you started this book with little\
    \ or no knowledge of PHP, you’re no longer in the beginners’ league, but rather\
    \ are leveraging the power of PHP in a lot of useful ways. Hopefully, by now you’ll\
    \ have begun to appreciate that the same or similar techniques crop up again and\
    \ again. Instead of just copying code, you should start to recognize techniques\
    \ that you can adapt to your needs and then experiment on your own.\n\nThe rest\
    \ of this book continues to build on your knowledge but brings a new factor into\
    \ play: the MySQL relational database (and its drop-in replacement, MariaDB),\
    \ which will take your PHP skills to a higher level. The next chapter offers an\
    \ introduction to MySQL and shows you how to set it up for the remaining chapters.\n\
    \n## 12. Getting Started with a Database\n\nDynamic web sites take on a whole\
    \ new meaning in combination with a database. Drawing content from a database\
    \ allows you to present material in ways that would be impractical—if not impossible—with\
    \ a static web site. Examples that spring to mind are online stores, such as [Amazon.com](http://amazon.com);\
    \ news sites, such as the BBC ([www.bbcnews.com](http://www.bbcnews.com)); and\
    \ the big search engines, including Google and Bing. Database technology allows\
    \ these web sites to present thousands, often millions, of unique pages. Even\
    \ if your ambitions are nowhere near as grandiose, a database can increase your\
    \ web site’s richness of content with relatively little effort.\n\nPHP supports\
    \ all major databases, including Microsoft SQL Server, Oracle, and PostgreSQL,\
    \ but it’s most frequently used in conjunction with the open source MySQL database.\
    \ According to DB-Engines ([http://db-engines.com/en/ranking](http://db-engines.com/en/ranking)),\
    \ MySQL ranked as the second most widely used database in early 2019, a position\
    \ it has held for many years. However, controversy surrounds the future of MySQL,\
    \ which Google and Wikimedia have abandoned in favor of MariaDB ([https://mariadb.org/](https://mariadb.org/)),\
    \ which stands at 15 in the DB-Engines ranking. Several leading Linux distributions\
    \ have also replaced MySQL with MariaDB. This chapter begins with a brief discussion\
    \ of the implications of the rivalry between these two databases.\n\nIn this chapter,\
    \ you’ll learn about the following:\n\n* Understanding how a database stores information\n\
    * Choosing a graphical interface to interact with a database\n* Creating user\
    \ accounts\n* Defining a database table with the appropriate data types\n* Backing\
    \ up and transferring data to another server"
