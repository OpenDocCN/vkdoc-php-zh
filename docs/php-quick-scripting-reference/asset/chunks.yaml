    # Introduction


    PHP is a server-side programming language used for creating dynamic websites and
    interactive web applications. The acronym PHP originally stood for “Personal Home
    Page,” but as its functionality grew this was changed to “PHP: Hypertext Preprocessor.”
    This recursive acronym comes from the fact that it takes PHP code as input and
    produces HTML as output. This means that users do not need to install any software
    to be able to view PHP generated web pages. All that is required is that the web
    server has PHP installed in order to interpret the script.


    In contrast with HTML sites, PHP sites are dynamically generated. Instead of the
    site being made up of a large number of static HTML files, a PHP site may consist
    of only a handful of template files. The template files describe only the structure
    of the site using PHP code, while the web content is pulled from a database and
    the style formatting from a Cascading Style Sheet (CSS). This provides a flexible
    website that allows for site-wide changes from a single location, providing a
    site that is easy to design, maintain and update with new content.


    When creating websites with PHP a Content Management System (CMS) is generally
    used. A CMS provides a fully integrated platform for website development consisting
    of a backend and a frontend. The frontend is what visitors see when they arrive
    to the site, while the backend is where the site may be configured, updated and
    managed by an administrator. The backend also allows a web developer to change
    template files and modify plugins, to more extensively customize the functionality
    and structure of the site. Examples of free PHP-based CMS solutions include WordPress,
    Joomla, ModX and Drupal, with WordPress being the most popular and accounting
    for more than half of the CMS market.


    The first version of PHP was created by Rasmus Lerdorf and released in 1995. Since
    then PHP has evolved greatly from a simple scripting language to a fully featured
    web programming language. The official implementation is now released by The PHP
    Group, with PHP 5.5 being the most recent version as of writing. The language
    may be used free of charge and is open source, allowing developers to extend it
    for their own use or contribute to its development.


    PHP is by far the most popular server-side programming language in use today.
    It holds a growing 75% market share when compared with other server-side technologies
    such as ASP.NET, Java, Ruby and Perl. One of the reasons for the widespread adoption
    of PHP is its platform independence. It can be installed on all major web servers
    and operating systems and used together with any major database system. Another
    strong feature of PHP is its simple-to-use syntax based on C and Perl, which is
    easy to learn for a newcomer but also offers many advanced features for a professional
    programmer.


    # Chapter 1: Using PHP


    ![image](images/frontdot.jpg)


    To start developing in PHP, create a plain text file with a `.php` file extension
    and open it in the editor of your choice – for example Notepad, JEdit, Dreamweaver,
    Netbeans or PHPEclipse. This PHP file can include any HTML, as well as PHP scripting
    code. Begin by first entering the following standard HTML elements into the document.


    ```

    <html>

     <head><title>PHP Test</title></head>

     <body></body>

    </html>

    ```


    ## Embedding PHP


    PHP code can be embedded anywhere in a web document in one of four different ways.
    The standard notation is to delimit the code by “`<?php`” and “`?>`”. This is
    called a PHP code block, or just a PHP block.


    ```

    <?php ... ?>

    ```


    Within a PHP block the engine is said to be in PHP mode, and outside of the block
    the engine is in HTML mode. In PHP mode everything will be parsed (executed) by
    the PHP engine, whereas in HTML mode everything will be sent to the generated
    web page without any execution.


    The second notation for switching to PHP mode is a short version of the first
    where the “php” part is left out. Although this notation is shorter, the longer
    one is preferable if the PHP code needs to be portable. This is because support
    for the short delimiter can be disabled in the `php.ini` configuration file.


    ```

    <? ... ?>

    ```


    A third alternative is to embed the PHP code within a HTML script element with
    the language attribute set to “php”. This alternative is always available, but
    seldom used.


    ```

    <script language="php">...</script>

    ```


    One remaining style you may encounter is when the script is embedded between ASP
    tags. This style is disabled by default, but can be enabled from the PHP configuration
    file.


    ```

    <% ... %>

    ```


    The last closing tag in a script file may be omitted if the file ends in PHP mode.


    ```

    <?php ... ?>

    <?php ...

    ```


    ## Outputting Text


    Printing text in PHP is done by either typing `echo` or `print` followed by the
    output. Each statement must end with a semicolon (`;`) in order to separate it
    from other statements. The semicolon for the last statement in a PHP block is
    optional.


    ```

    <?php

      echo  "Hello World";

      print "Hello World"

    ?>

    ```


    Output can also be generated using the “`<?=`” open delimiter. As of PHP 5.4 this
    syntax is valid, even if the short PHP delimiter is disabled.


    ```

    <?= "Hello World" ?>

    <? echo "Hello World" ?>

    ```


    Keep in mind that text output will only be visible on the web page if it is located
    within the HTML body element.


    ```

    <html>

     <head><title>PHP Test</title></head>

    <body>

     <?php echo "Hello World"; ?>

    </body>

    </html>

    ```


    ## Installing a Web Server


    To view PHP code in a browser the code first has to be parsed on a web server
    with the PHP module installed. An easy way to set up a PHP environment is to download
    and install a distribution of the popular Apache web server called XAMPP, which
    comes pre-installed with PHP, Perl and MySQL. This will allow you to experiment
    with PHP on your own computer.


    After installing the web server point your browser to “`http://localhost`” to
    make sure that the server is online. It should display the file `index.php`, which
    by default is located under `C:\xampp\htdocs\index.php` on a Windows machine.
    Htdocs is the folder that the Apache web server looks to for files to serve on
    your domain.


