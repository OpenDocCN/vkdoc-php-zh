    field to the current date and time for the user that has just logged in. It is
    for this reason (updating the database) that we pass in the database connection
    as the first argument.


    We then fetch the $logger object from the application registry so we can write
    a message indicating that the given user just logged in. We also include the IP
    address of the user.


    LoginFailure() is essentially the same as loginSuccess(), except we do not make
    any database updates. Also, the function accepts the error code generated during
    the login attempt (retrieved with the getCode() method on the authentication result
    object in Listing 4-24), which we use to generate extra information to write to
    the log. We log this message as a warning, since it’s of greater importance than
    a successful login.


