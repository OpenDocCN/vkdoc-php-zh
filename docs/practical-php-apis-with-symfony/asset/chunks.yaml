    {\n    public function __construct(\n        public readonly string $operation,\n\
    \        public readonly mixed $operationInput,\n        public readonly ?string\
    \ $userIdentifier\n    ){ }\n}\n```\n\nThe message class holds in the constructor\
    \ the necessary parameters to execute an operation: the operation name, the operation\
