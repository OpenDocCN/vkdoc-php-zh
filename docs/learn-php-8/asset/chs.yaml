  \n**图 1-6** 搜索（2020 年 3 月 28 日）\n\n出于某些非常奇怪的原因，我们决定在互联网上搜索“绿色猫”。当我们把字符串输入到最常用的搜索引擎（本例中为\
  \ Google）并点击搜索按钮时，信息会被传送到某个地方的 Google 服务器集群。在哪里？谁知道呢，可能在地球上的任何地方。但互联网的力量在于，只要我们能够快速得到结果，我们就不在乎具体位置。好吧，我得说，看到有\
  \ 8.83 亿个关于绿色猫的可能链接，我感到非常惊讶。哇，这个数字在 2014 年还只有 1 亿多。也许我们应该再过滤一下。然而，关键在于，Google 返回了一个网页，其中列出了链接以及这些链接的描述（外加广告）。Google\
  \ 返回的是一个已经存在的*静态*页面吗？不。服务器是根据用户的请求创建了一个*动态*页面。Google 的算法（软件）搜索了庞大的 Google 数据库集群。请求首先从用户的浏览器发送到\
  \ Google 的 Web 服务器。然后，Web 服务器向 Google 数据库（实际上使用的是类似于 SQL 的 Google 查询语言）发送请求，以返回关于“绿色猫”的信息。接着，Web\
  \ 服务器上的软件编译结果，添加 HTML 和 JavaScript（以及一些 Google 脚本语言代码）来格式化结果页面，最后将信息返回给用户。\n\n-\
  \   **静态网页与动态网页** —— 静态网页不会根据用户请求或输入而改变。该页面由 Web 开发人员创建并驻留在 Web 服务器上。当用户通过浏览器请求该页面时，页面的副本会被发送到浏览器进行显示。动态页面不存在于\
  \ Web 服务器中。该页面是利用用户的输入创建的。驻留在 Web 服务器上的程序会创建并格式化页面。程序创建的页面随后会被下载到用户的浏览器中。（通常）不会在\
  \ Web 服务器上保留该页面的副本。有关静态网页的更多信息，请访问 [`en.wikipedia.org/wiki/Static_web_page`](http://en.wikipedia.org/wiki/Static_web_page)。有关动态网页的更多信息，请访问\
  \ [`en.wikipedia.org/wiki/Dynamic_web_page`](http://en.wikipedia.org/wiki/Dynamic_web_page)。\n\
  \n是否每个页面都被下载到了用户的 Web 浏览器？不，只有第一页。第一页结果底部的页面链接会将信息返回给 Web 服务器，请求下一组信息（以便动态创建第二页或其他请求的页面）。你可能已经开始意识到，我们刚才讨论的关于在互联网上处理\
  \ PHP 文件的相同过程，是创建动态页面的一种非常常见的过程。你可能已经注意到结果页面的 URL 地址有些有趣的地方。这个地址是 `www.google.com/search?source=hp&ei=KQ2KXtaJOOW3ggeY9IWQBw&q=green+cats&oq=green+cats&gs_lcp=CgZwc3ktYWIQAzICCAAyAggAMgIIADICCAAyAggAMgIIADICCAAyAggAMgIIADICCAA6BQgAEIMBSioIFxImMGcxMTRnMTAyZzk2ZzEwMGcxMjFnMTA3Zzk3ZzExNmcxMDNnOTBKGQgYEhUwZzFnMWcxZzFnMWcxZzFnMWcxZzFQr01Y93Bgv-AHaAJwAHgAgAFliAG3BpIBAzkuMZgBAKABAaoBB2d3cy13aXo&sclient=psy-ab&ved=0ahUKEwiWwvP639HoAhXlm-AKHRh6AXIQ4dUDCAg&uact=5`，而不是\
  \ `www.google.com`。Google 算法在向服务器发送搜索请求时使用 *GET HTTP 请求*。\n\n-   **HTTP —— 超文本传输协议**是在互联网上的节点（计算机和服务器）之间传输消息（文本和网页）的协议（标准）。它是一种请求-响应协议。例如，用户通过浏览器“请求”一个网页。Web\
  \ 服务器“响应”该请求并将页面返回给浏览器。浏览器将请求转换为一个 HTTP GET 请求（例如 `GET /pages/mypage.html HTTP/3`），发送给\
  \ Web 服务器。Web 服务器则返回所请求的信息以及一个状态码（例如 `HTTP/3 200 OK`）。有关 HTTP 的更多信息，请访问 [`en.wikipedia.org/wiki/Hypertext_Transfer_Protocol#Request_methods`](http://en.wikipedia.org/wiki/Hypertext_Transfer_Protocol%2523Request_methods)。\n\
  \n```\nName:\n```\n\n让我们看一个更简单的例子来了解发生了什么。假设上述代码保存在本地主机网站的 `projects` 文件夹下的 `index.html`\
  \ 文件中。如果用户在浏览器显示的文本框中输入 `Fred`，结果页面（通过解释并执行 Web 服务器上的 `searchprocess.php` 文件，并将结果发送回浏览器而创建）将显示\
  \ URL 行：\n\n```\nhttp://127.0.0.1/projects/searchprocess.php?customername=Fred.\n\
  ```\n\n\n\n文本框名称（`customername`）以及在该文本框中输入的值（`Fred`）现在显示在 URL 行上。实际上，`customername`现在是一个参数，而`Fred`是该参数的值。这是使用\
  \ GET 过程的结果。\n\n当我们点击 Google 搜索按钮或我们简单示例中的搜索按钮时，请求的信息会通过 GET HTTP 过程发送。接收程序所需的所有信息（和参数）都通过实际的\
  \ URL 行发送，以供 Web 服务器上的程序接收并处理初始请求。\n\n为什么 Google 搜索引擎通过 GET 而不是 POST（POST 会隐藏信息）发送信息？主要原因是为了节省服务器内存。试想一下\
  \ Google 每天要处理数百万的信息请求。如果所有这些请求都驻留在内存中，服务器很快就会崩溃。此外，由于用户是在进行“公开”信息搜索，因此没有理由隐藏这些信息。在后面的章节中，我们将了解如何在\
  \ PHP 程序中读取 GET 和 POST 参数。\n\n现在，让我们回到关于 Apache、PHP 和 DBMS 的讨论中。PHP 可以访问多种 DBMS\
  \ 系统中的信息，包括 Oracle 和 SQL Server。然而，最流行的组合（如前所述）是将 PHP 与 MySQL 或 MariaDB 配对使用。我猜你现在能猜出原因了？是的，两者都有免费版本。MySQL\
  \ 和 MariaDB 也是较易使用的 DBMS 系统之一。MySQL 还允许使用 NoSQL 数据库结构。\n\n就像我们讨论过的所有开源产品一样，用户可以访问官方网站\
  \ [www.mysql.com](https://www.mysql.com) 下载最新版本。当前版本及之前的几个版本的文档均可下载。这些文档非常详尽，不适合心智薄弱者或初学者阅读。同样，你可能已经读腻了，但建议在你经验更丰富之前，不要单独下载新版本的\
  \ MySQL。至少现在，请坚持使用 WAMP、LAMP 和 MAMP 集成软件包。我们将在后面的章节中向你展示如何在服务器集成软件包内升级 MySQL 版本。\n\
  \n#### 动手实践\n\n1.  为什么 PHP 处理器将 SQL 发送给 DBMS，而不是 Apache Web 服务器直接将其发送给 DBMS？\n2.\
  \  在将 DBMS 返回的信息发送回用户的浏览器之前，Apache 可能会对这些信息做什么处理？\n3.  前往 [`www.mysql.com`](http://www.mysql.com)。MySQL\
  \ 的最新版本是什么？哪些版本的 Apache 和 PHP 与其兼容？\n4.  为什么搜索引擎通过 GET HTTP 请求而非 POST HTTP 请求传递信息？你会在什么时候使用\
  \ POST 请求？\n\n### 整合起来——PHP、Apache 和 MySQL\n\n正如你到目前为止所发现的，PHP、Apache 和 MySQL/MariaDB\
  \ 需要无缝协同工作，才能成功创建动态网页。有许多可用的**服务器集成软件包**提供了这些产品的组合，以及诸如 phpMyAdmin 和 MySQL Workbench（在设置\
  \ Web 服务器和数据库方面非常有帮助）等其他工具。通过安装其中一个产品，你将大大降低挫败感，甚至可能保住大部分头发。\n\n选择服务器集成软件包时有很多选择。有些软件包仅适用于特定操作系统；有些则提供了许多你可以选择添加的附加工具。一些最受欢迎的选择包括：\n\
  \n- *XAMPP*: [`www.apachefriends.org/index.html`](http://www.apachefriends.org/index.html)\n\
  - *easyPHP*: [`www.easyphp.org/`](http://www.easyphp.org/)\n- *AMAPPS*: [`www.ampps.com/`](http://www.ampps.com/)\n\
  - *LAMP*: [`www.linux.com/training-tutorials/easy-lamp-server-installation/`](http://www.linux.com/training-tutorials/easy-lamp-server-installation/)\n\
  - *LEMP*: [`https://linuxtechlab.com/beginners-guide-creating-lemp-server/`](https://linuxtechlab.com/beginners-guide-creating-lemp-server/)\n\
  - *MAMP*: [`www.mamp.info/en/downloads/`](http://www.mamp.info/en/downloads/)\n\n\
  对于 Microsoft Visual Studio 开发者，你还可以安装 DevSense 的 PHP Tools 插件。对于那些希望使用 Microsoft\
  \ IIS 服务器（而不是 Apache）或 NGINX 的人来说，这是集成 PHP 最简单的方法。更多信息，请访问 [`www.devsense.com/en`](http://www.devsense.com/en)。\n\
  \n现在让我们简要地看看两个受欢迎的选择：easyPHP 和 XAMPP。我们不会深入探讨或提供分步安装说明，原因有二：本书出版后，相关说明很可能会发生变化；而且使用默认设置通常没问题。接受开发者建议的设置大多数情况下都能正常工作。\n\
  \n#### easyPHP\n\n你可以从以下链接下载 easyPHP 的开发者版本。除非你打算直接将计算机上的“真实”网页托管到互联网上，否则无需下载主机版本。[`www.easyphp.org/easyphp-devserver.php`](http://www.easyphp.org/easyphp-devserver.php)\n\
  \neasyPHP 的开发者版本是一个 WAMP（Windows, Apache, MariaDB, PHP）集成软件包，用于 Microsoft Windows\
  \ 环境。当 Oracle 收购 MySQL 时，easyPHP 的开发者转向了 MariaDB 数据库。这个数据库由一些创建 MySQL 的相同开发者创建。因此，它的工作方式类似。在后面的章节中，我们将了解如何安装最新版本的\
  \ MySQL。你可以选择安装一些额外的工具来辅助开发（包括代码嗅探器）。然而，就我们的目的而言，你只需要基本安装。安装后，文件将位于你程序文件目录下的 easyPHP\
  \ 目录中。\n\n> **警告**\n> \n> 在下载过程中，请注意点击网站上的哪些按钮。你可能会下载到不需要的额外项目。\n\n在网站上点击下载箭头下载安装程序后，按照软件提供的说明进行操作。在初次尝试时，请保留所有默认设置。希望一切都能正确安装。如果你没有选择让\
  \ easyPHP 自动启动 Apache 和 PHP，那么在 easyPHP 启动后，右键单击系统托盘中的 easyPHP 图标，选择 `Dashboard`。然后点击\
  \ HTTP 服务器标题下的启动按钮。如果它启动了（启动按钮会切换为停止按钮），则用同样的方式启动数据库。如果出现问题，请阅读下一节“常见安装问题”。\n\n\
  ### 常见安装问题\n\n##### 缺少 C# 库\n\nPHP 8（以及早期版本的 PHP）需要 Microsoft Visual Studio C# 库。如果你使用的是\
  \ Windows 8 或更高版本，这个库可能已经安装。此外，如果你安装了较新版本的 Microsoft Visual Studio，它也可能已经安装。如果你收到指示缺少\
  \ C# 或版本错误的错误信息，请将错误信息粘贴到互联网的搜索引擎中。搜索来自 Microsoft 的关于如何修复该错误的说明。回复信息中应包含下载缺失文件和安装说明的链接。\n\
  \n#### 端口冲突\n\n如果你已经有服务在使用端口 80（PC 与外部世界之间 HTML 流量的默认端口），当 Apache 尝试运行时，你将会收到一条错误消息。你可以通过多种方法解决这个问题。\n\
  \n1.  如果你不介意在开发期间关闭其他使用该端口的服务，可以按照给定的说明进行操作。在你使用完 Apache 和 PHP 后，可以重新打开这些服务，或者只需重启电脑，这些服务就会重新启动。\n\
  \    1.  前往 Microsoft Windows 任务管理器（同时按下 `Ctrl+Alt+Delete`）。\n    2.  选择“服务”选项卡。\n\
  \n\n\n3.  在 Windows 10 中查找以下任一服务：`SQL Server Reporter`、`Web Deployment Agent`、`BranchCache`、`Sync\
  \ Share Service`、`WAS`（`IIS Administrator`）和 `W3SVC`。如果发现某个服务正在运行，右键单击它并将其关闭。然后尝试重新启动\
  \ `Apache`。如果不起作用，请重新打开该服务，然后尝试其他服务。（具体名称可能因 Windows 版本而异。）\n\n2.  如果你需要其他服务保持运行，或者你没有关闭\
  \ 80 端口上服务的管理员权限，则可以更改 `Apache` 的默认监听端口。\n\n*   *Wikipedia 对端口（port）的定义如下：*\n\n\
  *   *在计算机网络中，端口是一种特定于应用程序或进程的软件结构，作为计算机主机操作系统中的通信端点。端口的作用是唯一标识单台计算机上运行的不同应用程序或进程，从而使它们能够共享到分组交换网络（如互联网）的单个物理连接。在互联网协议（Internet\
  \ Protocol）的上下文中，端口与主机的 IP 地址以及用于通信的协议类型相关联。*\n\n*   *有关端口的更多信息，请访问* [`http://en.wikipedia.org/wiki/Port_(computer_networking)`](http://en.wikipedia.org/wiki/Port_%2528computer_networking%2529)。\n\
  \n转到系统托盘（屏幕右下角）。通过滚动图标找到 `easyPHP` 图标。每个图标应显示相应的描述。如果未看到图标，请单击系统托盘中的向上箭头以查看更多图标。右键单击\
  \ `easyPHP` 图标。选择 `Dashboard`。这将在默认浏览器中打开。尝试单击 `HTTP Server`（默认设置为 `Apache`）下方的启动按钮。如果收到端口冲突错误，请单击齿轮图标（`Server\
  \ Settings`）。然后你可以在下一个屏幕上更改端口。（将其更改为 `8080` 或 `81`。）通过单击绿色启动按钮再次尝试启动 `Apache`。返回\
  \ `Dashboard` 并通过单击启动按钮启动数据库。\n\n#### 缺失文件（Missing Files）\n如果你收到与此相关的错误消息，则说明你的文件在安装前已损坏。返回\
  \ `easyPHP` 网站并重新下载文件。此外，如果你不小心弄乱了 `Apache` 配置文件，请返回并重新安装该产品。\n\n#### 无法在 Program\
  \ Files 目录中安装文件（Cannot Install Files in Program Files Directory）\n这表明你或其他对象对该目录有高安全限制。重新运行安装程序，并将安装位置更改为其他目录。请记住，当本书后面引用\
  \ `Program Files` 目录时，你应该查看你的文件实际安装到的目录。\n\n#### Apache 延迟和挂起（Apache Delays and\
  \ Hang-Ups）\n在 Windows 中，你可能会遇到 `Apache` 运行缓慢或挂起的问题。要解决此问题，请转到系统托盘（屏幕右下角）。通过滚动图标找到\
  \ `easyPHP` 图标。每个图标应显示相应的描述。如果未看到图标，请单击系统托盘中的向上箭头以查看更多图标。右键单击 `easyPHP` 图标。选择 `Dashboard`。当\
  \ `Dashboard` 在默认浏览器中打开时，选择齿轮图标（`Server Settings`）。然后单击 `Configuration File` 按钮。文件内容将显示在按钮下方。单击铅笔图标以编辑\
  \ `Apache` 配置文件。这将在默认文本编辑器（可能是 `Notepad`）中打开 `Apache` 配置文件（`httpd.conf`）。首先将文件副本保存在某处，以防出错。这将使你能够从任何重大错误中恢复。\n\
  \n> **注意**  \n> 使用 `Notepad` 或任何其他文本编辑器时，请确保使用 `Save As`，然后选择 `All Files` 作为文件类型。另外，请确保包含\
  \ `.conf` 文件扩展名。  \n> 如果不将文件类型更改为所有文件，你的文件将保存为 `httpd.conf.txt`。如果发生这种情况，服务器将找不到该文件。你可以通过重新打开文件并以正确方法保存来轻松解决此问题。\n\
  \n然后在文件底部添加以下两行：\n\n```\nAcceptFilter http none\nAcceptFilter https none\n```\n\n\
  通过执行 `Save As` ➤ 选择 `All Files` 重新保存文件（确保将原始文件重新保存到原始位置）。它应显示该文件将保存在配置文件夹中。\n\n\
  #### 其他错误（Other Errors）\n对于此处未讨论的错误，请将错误消息复制并粘贴到搜索引擎中。查找提供解决错误建议的答案列或博客。互联网上有很多免费资源。不要为网站（或其他人）付费来解决你的问题。\n\
  \n#### 配置（Configurations）\n你需要确定何时希望 `Apache` 运行。可以将 `Apache` 设置为在启动 PC 时运行、在应用程序需要时运行或手动运行。要更改设置，你可以右键单击系统托盘（屏幕右下角）中的\
  \ `easyPHP` 图标，然后选择 `Dashboard`。如果未看到该图标，请单击系统托盘中的向上箭头。选择左侧菜单中的 `Settings and Applications`。然后你可以选中（或取消选中）复选框以自动启动服务器和\
  \ `PHP`。然后单击 `save` 按钮。\n有许多可选库，你可以根据需要链接或取消链接到 `PHP`。在许多情况下，库已加载，只需链接即可。你可以通过转到\
  \ `PHP` 配置文件（`php.ini`）并删除行首的注释（`;`）字符来添加这些库。可以轻松地通过右键单击系统托盘中的 `easyPHP` 图标找到 `PHP`\
  \ 配置文件。然后选择 `Dashboard`。接着单击 `HTTP server` 旁边的齿轮图标（`Server Settings`）。单击 `Configuration\
  \ File` 按钮。文件将显示在按钮下方。单击文件内容右上角的铅笔图标。该文件将在默认文本编辑器（可能是 `Notepad`）中打开。在进行任何更改之前，请确保保存备份副本。同时确保使用\
  \ `Save As` 并选择 `All Files`。否则，你的文件可能以 `.txt` 结尾，而不是以 `.config` 结尾。目前不需要进行任何更改。还建议仅在需要时进行这些更改。\n\
  \n#### XAMPP\n虽然 **XAMPP** 与 `easyPHP` 类似，但 `XAMPP` 更受欢迎，因为它有免费的 Windows、Linux 和\
  \ OS X 版本。它还包含许多附加组件，包括一些最受欢迎的内容管理系统——`Drupal`、`Joomla` 和 `WordPress`。`XAMPP` 使用\
  \ `MariaDB` 代替 `MySQL`。此更改发生在 `Oracle` 收购 `MySQL` 时。`MariaDB` 和 `MySQL` 的基础知识非常相似。我们将在本书后面探讨如何更改为最新版本的\
  \ `MySQL`。在某些设置中，`XAMPP` 仍然引用 `MySQL`，而实际上它是 `MariaDB`。最新版本可以直接从 `XAMPP` 官方网站或许多其他下载站点获取。[www.​apachefriends.​org/​](https://www.apachefriends.org/)\n\
  \n> **警告**  \n> 注意你点击网站上的哪些按钮。你可能会下载到不想安装的额外项目。\n\n\n\n首次尝试安装时，请使用开发人员在安装软件中建议的**默认设置**。这能极大降低出现问题的可能性或避免令人头疼的情况。如果你没有选择自动启动服务器和数据库，而现在想要启用自动启动，或者想关闭它，请双击系统托盘中的\
  \ XAMPP 图标。然后点击右上角的 **Config** 按钮（而不是服务器或 MySQL 旁边的那个）。下一个屏幕将显示复选框，允许你选择要自动启动的应用程序。勾选要自动启动的项目，然后点击\
  \ **save** 按钮。\n\n如果你想要手动启动服务器或数据库，可以点击服务器右侧的 **start** 按钮。当服务器启动后，再点击 MySQL 右侧的\
  \ **start** 按钮。如果它们正确启动，按钮会变为 **stop** 按钮，并且相关项目会高亮显示为**绿色**。如果未能正确启动，相关项目则会高亮显示为**红色**。如果你确实遇到错误，请阅读下一节“常见安装问题”以获取帮助。\n\
  \n### 常见安装问题\n\n你可能会收到 Microsoft Windows 防火墙的警告消息，要求你批准启动 Apache 和 MariaDB。当然，你应该点击允许它们运行。此外，在\
  \ Windows 中，安装过程中你可能会收到一条消息，告知你该机器已启用**用户安全控制**。如果你选择继续安装，在你的机器上安装过程通常仍能正常工作。\n\n\
  #### 端口冲突\n\n如果你已经有服务在使用端口 80（PC 与外部世界之间传输 HTML 数据的默认端口），Apache 在尝试运行时将会收到错误消息。你可以通过多种方式解决此问题。\n\
  \n1.  如果你不介意在开发期间关闭使用该端口的其他服务，可以按照视频链接中的说明进行操作。完成 Apache 和 PHP 的使用后，你可以重新开启这些服务，或者只需重启\
  \ PC，这些服务便会自动重新启动。\n\n2.  转到 Windows 任务管理器（同时按 `Ctrl+Alt+Delete`）。\n    -   选择 **服务**\
  \ 选项卡。\n    -   在 Windows 中查找以下任意服务：SQL Server Reporter、Web Deployment Agent、BranchCache、Sync\
  \ Share Service、WAS（IIS 管理员）和 W3SVC。如果发现某个服务正在运行，右键单击它并选择**关闭**。然后尝试重新启动 Apache。如果不起作用，请重新打开该服务，再尝试关闭另一个。（名称可能因\
  \ Windows 版本而异。）\n\n3.  如果你需要保持其他服务运行，或者没有关闭端口 80 上服务的**管理权限**，则可以更改 Apache 的默认监听端口。\n\
  \n转到你的系统托盘（在 Microsoft Windows 中，位于屏幕右下角）。通过将鼠标悬停在图标上找到 XAMPP 图标。每个图标的描述应该会显示出来。如果看不到该图标，请单击系统托盘中的向上箭头以查看更多图标。双击该图标，会出现**控制面板**。你应该会在控制台上看到以红色显示的启动错误消息。如果是端口冲突，请点击\
  \ Apache 右侧的 **Config** 按钮。选择 **Services and Port Setting** 按钮（靠近右下角）。弹出的选项卡默认会选中\
  \ Apache。如果问题是 Apache 引起的，请将端口设置从 80 更改为 `8080` 或 `81`。这将允许 Apache 服务器监听这些不常用的端口之一。\n\
  \n然后，你可以通过点击 XAMPP 控制台中 Apache 旁边的 **Start** 按钮来重新启动 Apache。如果 Apache 状态变为绿色，你还应点击\
  \ MariaDB 右侧的 **Start** 按钮来启动它。\n\n#### 文件缺失\n\n如果你收到与此相关的错误消息，说明你的文件在安装前已损坏。请返回\
  \ XAMPP 网站，重新下载并安装文件。如果你不小心弄乱了 Apache 配置文件，你同样需要重新下载文件。\n\n#### 无法在 Program Files\
  \ 目录安装文件\n\n这表明你或其他程序对该目录有**很高的安全限制**。请重新运行安装程序，并将安装位置更改为其他目录。请记住，当你之后在本书中引用程序文件目录时，应该查看你实际安装文件的目录。\n\
  \n#### Apache 延迟和挂起\n\n在 Windows 中，你可能会遇到 Apache 运行缓慢或挂起的问题。要解决此问题，请转到系统托盘（屏幕右下角）。通过将鼠标悬停在图标上找到\
  \ XAMPP 图标。每个图标的描述应该会显示出来。如果看不到该图标，请单击系统托盘中的向上箭头以查看更多图标。双击 XAMPP 图标。选择 Apache 右侧的\
  \ **Config** 按钮（不是右上角的按钮，也不是 PHP 的 config 按钮）。选择 **Apache (httpd.conf)**。这将在记事本（或你的默认文本编辑器）中打开\
  \ Apache 配置文件（`httpd.conf`）。首先，在此文件某处保存一个副本，以防出现错误。这将允许你从可能发生的任何重大错误中恢复。\n\n> **注意**\n\
  >\n> 确保在使用记事本或任何其他文本编辑器时，你使用了**另存为**，然后选择**所有文件**作为文件类型。同时确保包含 `.conf` 文件扩展名。如果你不将文件类型更改为所有文件，你的文件将被保存为\
  \ `httpd.conf.txt`。如果发生这种情况，服务器将无法找到该文件。你可以通过重新打开文件并以正确方法保存来轻松解决此问题。\n\n然后将以下两行添加到文件底部：\n\
  \n```\nAcceptFilter http none\nAcceptFilter https none\n```\n\n重新保存文件（确保将原始文件保存回原始位置）。\n\
  \n#### 其他错误\n\n对于此处未讨论的错误，请将错误信息复制并粘贴到搜索引擎中。查找提供修复错误建议的问答专栏或博客。互联网上有许多免费资源。不要付费让某个网站（或其他人）来修复你的问题。\n\
  \n#### 配置\n\n你可以通过转到**控制面板**（双击屏幕右下角系统托盘中的 XAMPP）来更改 XAMPP 的配置。然后点击你屏幕右上角的 **config**\
  \ 按钮（而不是应用程序右侧的 config 按钮）。要**自动启动**（或停止自动启动）你的应用程序，你可以勾选（或取消勾选）提供的复选框，以便在下一次控制面板启动时自动启动相应项目。然后点击\
  \ **Save**。当然，你也可以在需要时随时从控制面板启动它们。\n\n有许多可选的库，你可以根据需要链接或取消链接到 PHP。在许多情况下，库已经加载，只需链接即可。你可以通过转到\
  \ PHP 配置文件（`php.ini`）并删除行首的注释（`;`）字符来添加这些库。通过双击系统托盘中的 XAMPP 图标，可以轻松找到 PHP 配置文件。然后点击\
  \ Apache 右侧的 **Config** 按钮。将显示一个列表；选择 `php.ini`。目前无需进行任何更改。也建议只在需要时才进行这些更改。\n\n\
  #### Microsoft Internet Information Server\n\n或者，如果你无法让 Apache 在 Windows（尤其是 Windows\
  \ 10）中正常运行，或者你喜欢 Microsoft 的 IIS 服务器，你可以安装 PHP 以使用 Microsoft IIS（Internet Information\
  \ Server）替代 Apache。有关更多信息，请访问 [`www.php.net/manual/en/install.windows.php`](http://www.php.net/manual/en/install.windows.php)。\n\
  \n#### 动手实践\n\n\n\n### 使用搜索引擎回答以下问题\n\n1.  你在安装 XAMPP 或 easyPHP 时，或者刚尝试启动它们时，收到了以下错误。如何才能找到问题的解决方案？可能是什么原因导致了此错误？\n\
  \n```\nInternal Server Error\n\nThe server encountered an internal error or misconfiguration\
  \ and was unable to complete your request.\n\nPlease contact the server administrator,\
  \ you@example.com, and inform them of the time the error occurred, and anything\
  \ you might have done that may have caused the error.\n\nMore information about\
  \ this error may be available in the server error log.\n```\n\n2.  什么是 XAMPP 错误\
  \ #1130？如何修复此错误？\n\n3.  尝试使用 easyPHP（和 Apache）运行 PHP 程序时，收到以下错误。是什么导致了此错误？如何修复？\n\
  \n```\nCannot load mcrypt extension. Please check your PHP configuration.\n```\n\
  \n4.  如果你之前还没有尝试过，请在个人机器上安装 easyPHP 或 XAMPP。安装过程中遇到问题了吗？如果有，遇到了什么问题？你是如何解决这些问题的？\n\
  \n### 测试你的环境\n\n现在你的指示灯都变绿了，对吧？一切都运行正常？希望如此。但你需要确认一下。最好的方法就是测试你的环境。\n\n#### 测试你的管理环境\n\
  \n首先，我们需要测试服务器，看看管理页面能否正常显示。在 easyPHP 中，你可以执行以下任一操作：\n\n1.  右键单击 easyPHP 图标，然后选择**控制面板**（Dashboard）。\n\
  2.  打开你最喜欢的浏览器，然后输入以下地址：\n\n`http://127.0.0.1:1111/index.php`\n\n如果因为端口冲突而不得不更改端口，你可能需要输入端口号，例如：\n\
  \n`http://127.0.0.1:8080/index.php`\n\n你应该会看到一个类似于图 1-23 所示的界面。\n\n对于 XAMPP，打开你最喜欢的浏览器，然后输入以下地址：\n\
  \n`http://127.0.0.1/dashboard/`\n\n如果因为端口冲突而不得不更改端口，那么你也必须包含此端口：\n\n`http://127.0.0.1:8080/dashboard/`\n\
  \n如果 XAMPP 安装正确，你应该会看到一个类似于图 1-24 所示的界面。\n\n如果在此时你没有看到这个页面（或任何显示 XAMPP 的页面），那么说明出了问题。请检查以下内容：\n\
  -   easyPHP 或 XAMPP 是否正在运行（已启动）？\n-   在 XAMPP 控制面板或 easyPHP 中，你是否看到了 Apache 的绿色指示灯或绿色阴影？如果没有，请尝试点击启动按钮或链接。\n\
  -   如果 Apache 无法启动，你是否看到了错误信息？如果没有，请检查错误日志文件。对于 easyPHP，请打开控制面板（Dashboard），选择齿轮图标（**服务器配置**），然后选择**错误日志**按钮。对于\
  \ XAMPP，请单击控制面板上 Apache 旁边的**日志**按钮，然后选择**错误日志**。\n-   如果你看到了绿色指示灯，但页面似乎卡住了，请尝试停止并重新启动\
  \ Apache。可能需要尝试几次才能将其唤醒。如果它持续挂起，请检查你的计算机设置。你的 CPU 使用率是否已达到上限？\n\n你能确定问题所在吗？如果你有错误信息，请将其粘贴到你最常用的搜索引擎中，看看专家们对此有何看法。\n\
  \n#### 动手实践\n\n1.  如果你之前还没有这样做过，请按照前面的说明测试你的环境。遇到任何问题了吗？如果有，出现了什么问题？你是如何解决这些问题的？\n\
  \n#### 测试你的 PHP 环境\n\n希望现在一切顺利。你要么运气极佳、一帆风顺，要么已经成功解决了所有遇到的问题。但是，你仍需确认是否真的能在 Apache\
  \ 中运行你自己的 PHP 程序。\n\n打开一个文本编辑器（不要用 Word，用记事本或 Notepad++ 就行），然后严格按照下面所示输入代码：\n\n\n\
  \n使用\"文件\"菜单中的\"另存为\"选项，将文件类型更改为\"所有文件\"或`php`。输入文件名`myfirstprogram.php`，并将其保存在以下位置之一。\n\
  \n如果你使用的是 `easyPHP`，请将其保存到：\n\n```\nC:\\Program Files (x86)\\EasyPHP-Devserver-xxxx\\\
  eds-www\n```\n\n当然，你需要将版本名称（或程序文件名称）更改为你机器上使用的正确版本（位置）。在此位置下，创建一个名为`projects`的文件夹，然后将文件保存在该文件夹下。\n\
  \n如果你使用的是 `XAMPP`，首先进入`C:\\xampp\\htdocs`，并创建一个名为`projects`的文件夹。然后返回你的文本编辑器，选择\"\
  另存为\"（不要忘记将文件类型更改为\"所有文件\"或`php`），将文件命名为`myfirstprogram.php`，并将其保存到以下位置：\n\n```\n\
  C:\\xampp\\htdocs\\projects\n```\n\n如果你正确地将文件保存在 `easyPHP` 或 `XAMPP` 的位置，你可以尝试通过在浏览器地址栏中输入以下内容来运行你的程序：\n\
  \n```\nhttp://127.0.0.1/projects/myfirstprogram.php\n```\n\n如果你更改了端口，则将第一部分更改为`http://127.0.0.1:8080/`（将`8080`替换为你正在使用的正确端口）。你的程序应显示图\
  \ 1-26 中所示的消息。\n\n#### 常见问题\n\n**未显示任何内容，出现 404 错误：**\n\n1.  确保你完全按照所示输入了地址。\n2.\
  \  你的服务器可能挂起了。停止并重新启动它。\n3.  确保你将文件放在了正确的位置。\n4.  确保你将文件保存为`.php`文件，而不是`.txt`文件。重新尝试\"\
  另存为\"并重命名文件（确保文件类型是\"所有文件\"或`php`）。\n5.  检查实际程序代码中的拼写错误。你是否记得使用分号（`;`）？修正任何错误并重新保存。如果服务器因某种原因未看到更改，你可能需要停止并重新启动服务器。你可以查看日志文件中的\
  \ PHP 日志文件，以查看代码中可能存在的任何错误。\n6.  查看 Apache 日志文件（参见之前常见问题中的说明）以查找错误。如果你无法修正这些错误，请复制错误信息并将其粘贴到搜索引擎中，看看其他人找到了什么解决方案。\n\
  \n**显示的是实际程序代码，而不是代码执行的结果：**\n\n1.  确保你将文件保存为`.php`文件，而不是`.txt`文件。重新尝试\"另存为\"并重命名文件（确保文件类型是\"\
  所有文件\"或`php`）。\n2.  你的 Apache 服务器或 PHP 可能未启动或已挂起。停止并重新启动 Apache。\n3.  你是否忘记或在`<?php`或`?>`行中有拼写错误？\n\
  4.  查看 Apache 日志文件（参见之前常见问题的说明）以查找错误。如果你无法修正这些错误，请复制错误信息并将其粘贴到搜索引擎中，看看其他人找到了什么解决方案。\n\
  \n**对于任何其他错误，** 请将其复制并粘贴到网络搜索引擎中，查看其他人发现了什么解决方案。\n\n#### 动手实践\n\n1.  如果你尚未测试你的环境，请进行测试。测试成功了吗？你遇到了什么问题（如果有的话）？你是如何解决这些问题的？\n\
  \n#### 别名（工作）目录\n\n在实际开发中，在 Web 服务器中创建*别名*目录是一种常见做法。别名目录是文件的\"虚假\"位置，它会欺骗你网站的用户，使其相信文件在一个位置，而实际上它在另一个位置。\n\
  \n为什么要使用别名目录？随着网站的发展，服务器上的文件位置可能必须更改。通过使用别名，你网站的用户将不知道文件的实际位置已更改。别名使你能够将文件存储在计算机（服务器）上的任何位置。如果你不使用别名，所有文件都必须存储在默认位置。默认位置是：\n\
  \n*   *EasyPHP*：`C:\\Program Files (x86)\\EasyPHP-Devserver-xxxx\\eds-www`\n   \
  \ *   `（将 xxxx 替换为你开发服务器的当前版本）`\n*   *XAMPP*：`C:\\xampp\\htdocs\\`\n\n你可能需要考虑创建一个别名目录，尤其是当你希望将文件定位在\
  \ U 盘上时。在本书中，我们假设文件位于`projects`文件夹下的默认位置。\n\n*   *EasyPHP*：`C:\\Program Files (x86)\\\
  EasyPHP-Devserver-xxxx\\eds-www\\projects`\n*   *XAMPP*：`C:\\xampp\\htdocs\\projects`\n\
  \n这将使我们能够使用相同的 URL 测试程序，无论我们使用的是 `easyPHP` 还是 `XAMPP`。\n\n```\nhttp://127.0.0.1/projects/myfirstprogram.php\n\
  ```\n\n如果你确实创建了别名目录，只需记住将`projects`替换为你正在使用的任何别名名称。\n\n在 `easyPHP` 中，可以从 Dashboard\
  \ 屏幕创建别名目录。转到系统托盘（屏幕右下角），右键单击 `easyPHP` 图标，然后选择 Dashboard。在屏幕中间，找到\"工作目录\"，然后单击右侧的\"\
  添加工作目录\"。单击并按照说明操作。如果该目录尚不存在，系统将创建它。\n\n在 `XAMPP` 中，需要进行更多操作。通过双击图标打开系统面板。然后点击 Apache\
  \ 右侧的 Config 按钮。从列表中选择`httpd-xampp`配置文件。在进行更改之前，请保存文件的备份副本。从文本编辑器菜单中选择\"编辑\"，然后选择\"\
  查找\"。搜索字符串`\"<IfModule alias_module>\"`。不要更改此部分中已列出的任何内容。但是，你可以为可执行文件添加位置（使用以下代码）。输入所需行后，停止并重新启动\
  \ Apache 以帮助它找到新的更改。\n\n```\nAlias /myfiles \"C:/Temp\"\n\n<Directory \"C:/Temp\"\
  >\n    Options Indexes FollowSymLinks MultiViews ExecCGI\n    AllowOverride All\n\
  \    Require all granted\n</Directory>\n\n```\n\n注意：\n\n> 此目录设置允许对目录具有完全的读写能力。我们将在后面的章节中讨论保护\"\
  在线\"网站目录安全的选项。\n\n此配置允许当用户在 URL 行中输入`myfiles`作为目录名时，`C:/Temp`目录中的任何 PHP 文件在 Apache\
  \ 中执行。所示的目录设置并未提供太多安全性。但是，这仅用于在测试机上进行测试。如果你处于在线环境，则需要加强`Directory`标签下的安全设置。要执行此目录中的文件，你需要在浏览器中输入\
  \ URL `http://127.0.0.1/myfiles`。如果你不包含文件名，Apache 将尝试查找`index.html`或`index.php`文件。如果两者都不存在，Apache\
  \ 将根据当前设置列出目录中的文件。这便于轻松访问文件进行测试。但是，在在线环境中这不是一个好主意。你可以通过添加文件名`http://127.0.0.1/myfiles/myfirstprogram.php`来请求非索引文件。如果你不得不更改端口号，请记住包含端口号：`http://127.0.0.1:8080/myfiles/myfirstprogram.php`。当然，目录必须存在，并且文件必须在浏览器中测试\
  \ URL 之前位于该目录中。\n\n#### 动手实践\n\n1.  创建一个名为`myfiles`的别名文件夹，指向硬盘或闪存（可移动）驱动器上的一个现有位置。将你用于测试环境的`hello\
  \ world`程序放入该文件夹。尝试使用之前的说明从该文件夹运行程序。你成功了吗？如果没成功，你遇到了什么问题？你是如何解决这些问题的？\n\n#### Notepad++、编辑器和代码测试器\n\
  \n创建 PHP 代码时，你不需要使用特定的编辑器或购买编辑器。你可以使用任何文本编辑器（甚至记事本）创建所有代码。但是，使用一个能高亮（着色）代码的编辑器确实有助于更容易地发现编码（语法）错误。\n\
  \n\n\n### Notepad++\n\nNotepad++ 可在 [`www.notepad-plus-plus.org`](http://www.notepad-plus-plus.org)\
  \ 下载。该编辑器基础且易于使用，支持创建超过 20 种不同格式的文件（包括 PHP）。本书提供的大部分编码示例均使用 Notepad++ 创建。当你在 Notepad++\
  \ 中创建新的 PHP 程序时，必须告知应用程序文件类型。你可以通过选择“Language”菜单项，然后选择 PHP 来完成此操作。这将使应用程序能够为你提供代码颜色高亮及其他功能。\n\
  \n#### 其他编辑器\n\n市面上还有数百种其他编辑器可供选择。我建议你选择一款自己最顺手的工具。挑选一个用户众多且评价较高的编辑器。\n\n#### 动手实践\n\
  \n1.  确定一个文本编辑器，用于完成本书中的编码练习。将编辑器下载到你的电脑上。在编辑器中重新输入你的`hello world`程序并保存。通过浏览器运行该程序。你为什么选择下载的这款编辑器？你喜欢它的哪些功能？又不喜欢哪些功能？\n\
