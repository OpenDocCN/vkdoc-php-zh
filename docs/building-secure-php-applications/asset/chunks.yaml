    \ 1 号，邮编 10004。\n\n*本书献给我的父母和妹妹。*\n\n## 引言\n\n如今，我们正见证 Web 应用构建方式的重大转变，尤其是“左移”范式的重要性日益凸显。随着安全领域对左移的重视，开发人员从一开始就在设计和代码中构建安全性的责任也随之增加。鉴于我们跨行业的合规性要求多种多样，忽视安全性的代价实在太高，不容忽视。基于此，本书旨在向\
    \ Web 应用开发者介绍 Web 应用安全背景，特别是在 `PHP` 环境下的安全。\n\n开发人员处理的应用类型多种多样，包括全新项目、现有项目、混合项目（`Kubernetes`\
    \ 和 `OpenShift`）以及云原生项目。为了理解这一点并获得实用见解，本书聚焦于在构建不使用任何框架的核心应用时需要理解并实现的安全方面，然后深入探讨帮助我们构建\
    \ Web 应用的各种流程背后的安全协议，最后介绍 `Laravel` 等企业框架中普遍存在的安全实践。\n\n软件开发生命周期包含多个阶段，安全需要从一开始就融入每个阶段。本书提供了实用见解，介绍如何与利益相关者讨论安全、理解不同阶段（如开发、测试、部署、基础设施即云、云安全和维护）的安全背景。\n\
    \n本书最后详细介绍了安全的未来以及将纳入开发者生命周期的一些有用工具。书中分享了贯穿始终的概念和代码范例，不仅有助于学习，也有助于在实际项目中使用。\n\n\
    ### 致谢\n\n我要将本书献给我的父母，他们始终相信我，并在我追求技术兴趣时给予耐心，让我有自由去探索和尝试不同事物。还要感谢我的妹妹 Lipsa，在我需要时她总是陪伴在我身边。我要感谢所有在我学习旅程中陪伴我的老师；感谢\
    \ Runish 在我职业生涯初期提供的基础指导支持；感谢 Mindfire Solutions 给我第一份职业机会；也感谢所有我曾与之互动并向其学习的人。最后但同样重要的是，我要感谢\
    \ Melissa 给我这个撰写第二本书的绝佳机会，以及 Apress 的出色团队给予的一切支持，没有他们，这本书就不可能完成。\n\n### 关于作者\n\
    \n### 关于技术审稿人\n\n# 1. PHP 应用安全简介\n\n在本章中，我们将讨论应用安全的一般性质及其在 `PHP` 环境中的重要性。在安全生态系统中，软件工程师扮演着关键角色，我们将学习他们在不断发展的基于安全的开发领域中的责任。然后，我们将探讨在构建\
    \ `PHP` 应用时安全漏洞的影响，了解常见的攻击向量和威胁。最后，我们将学习如何在 `PHP` 中应用安全应用开发的原则。\n\n## 什么是应用安全？\n\
    \n应用安全，通常缩写为 `AppSec`，是信息安全中的一个关键方面，专注于保护软件应用免受安全威胁和漏洞的侵害。它涵盖了广泛实践、工具和方法论，旨在确保应用及其数据的机密性、完整性和可用性（`CIA`\
    \ 三要素）。\n\n如何从开发者的角度理解这一点？作为开发者，我们参与应用的开发。虽然这是最简单的理解方式，但在考虑现实世界时，还有其他层面会发挥作用。由于应用不仅仅存在于我们的笔记本电脑中，最终会部署并在全球范围内使用，因此应用的安全性变得非常重要。\n\
    \n举个简单的例子，考虑一座城堡。我们可以将城堡比作我们构建的应用，它内容丰富、外观优美且功能多样，对世人来说是一个值得访问的乐园。但表象之下还有更多东西。从顶部俯瞰，我们看到建造城堡时建立的不同层次的分区和边界。我特别强调“*在建造时*”这个词，而不是在城堡建成之后。这为它增添了安全方面的考量。\n\
    \n接下来，我们来讨论一些关于应用安全的其他背景。\n\n### 保护软件应用\n\n应用安全主要涉及保护软件应用（包括 Web 应用、移动应用、桌面软件和服务器端应用）免受各种安全风险和潜在攻击。这些应用承载着我们许多重要的资产，例如企业的知识产权、客户的宝贵用户数据（这些数据可被用于或更确切地说被滥用于各种目的），以及对重要资源（如核电站）的访问权限——核电站潜力巨大，但若落入不当之人手中则成为重大隐患。\n\
    \n### 识别漏洞\n\n漏洞是指系统、流程、软件或网络中的弱点或缺陷，可被威胁行为者（如黑客）利用，以获取未经授权的访问、造成损害或执行恶意活动。漏洞可能源于各种问题，包括设计缺陷、代码错误、配置错误等。识别并处理漏洞对于维护系统和数据的安全性与完整性至关重要。它涉及识别并处理应用代码、配置和设计中可能被恶意行为者利用的漏洞。常见漏洞包括\
    \ `SQL` 注入、跨站脚本攻击（`XSS`）、跨站请求伪造（`CSRF`）以及不安全的身份验证机制。我们将在后续章节中详细讨论这些内容。\n"
- fmt: '# Lifecycle Approach


    Application security is not a one-time task; it’s an ongoing process that spans
    the entire software development lifecycle (SDLC). It is a multistep end-to-end
    process integral to all parts and processes inherent to the system and has to
    be iterative to understand the current security environment and see that our system
    evolves to safeguard against them in a proactive stance. It starts from the initial
    design and continues through development, testing, deployment, and maintenance
    phases.


    In the development stage, the application developer adds security in the code,
    configuration, CI/CD pipeline, and any other infrastructure part of the development
    environment like cloud, third-party APIs, etc. Once the development phase is done
    or many times while the development phase is continuing in iterative steps, the
    Quality Assurance (QA) team validates and tests the applications from a 360-degree
    outlook to consider the application for security and performance, taking into
    consideration the enterprise guidelines laid for the organization. Once the QA
    team approves it, then the application has to be deployed to production. Before
    that, the enterprise security team runs through all the design processes, templates,
    standards, and security guidelines and comes with feedback for the application.
    This whole process goes on iteratively since the application builds new features
    and there are new security hacks which have been shared in the security community
    which need to be validated against our application.


    # Security Testing


    One of the fundamental components of application security is security testing.
    This includes activities such as quality assurance testing, penetration testing,
    vulnerability scanning, code review, and security-focused quality assurance to
    detect and rectify vulnerabilities. These are handled by many teams within an
    enterprise organization but also sometimes by a small team capable of such skills
    in a startup environment.


    # Secure Development Practices


    Promoting secure coding practices is a key aspect of application security. We
    as developers need to follow guidelines and best practices to write code that
    is resistant to common vulnerabilities. These guidelines have been the result
    of many years of improvement and shared knowledge of working engineers, communities,
    and experts through incremental learning from mistakes and hacks from different
    parties both internal and external.


    These guidelines vary from organization to organization, since each organization
    has their unique business model and domain and has different security requirements.
    An application related to the defense of a country will have a more extended and
    different set of guidelines than a web application catering to blogs for users.
    These guidelines and practices have always to be updated to be current in the
    security environment and with the evolving nature of the business model.


    # Authentication and Authorization


    Authentication ensures we verify the users are who they say they are, while authorization
    ensures what the users are allowed to do. Both are crucial for the security of
    an application, ensuring that the application employs strong authentication mechanisms
    to verify the identity of users and enforces appropriate authorization to control
    access to data and features.


    There are various industry standard protocols for implementing authentication
    and authorization. Some authentication protocols and frameworks to be named are
    password-based authentication, multifactor authentication (MFA), `OAuth` (Open
    Authorization), `OpenID Connect`, `Kerberos`, `SAML` (Security Assertion Markup
    Language), `LDAP` (Lightweight Directory Access Protocol), and `JWT` (JSON Web
    Token). Similarly, some authorization protocols and frameworks are `OAuth 2.0`,
    `RBAC` (Role-Based Access Control), `ABAC` (Attribute-Based Access Control), `ACL`
    (Access Control List), `SAML`, `JWT`, etc. We will explore some of these in the
    coming chapters to know more about them.


    # Data Protection


    Protecting sensitive data is crucial. This involves encrypting data during transmission
    to ensure it can’t be intercepted or read by unauthorized parties. Access controls
    are implemented so only authorized users can access the data. Additionally, secure
    storage practices are used to protect data at rest, ensuring it remains safe from
    breaches. These measures collectively help maintain the integrity and confidentiality
    of sensitive information.


    # Incident Response


    An incident response plan is a structured approach outlining the steps to detect,
    respond to, and recover from security incidents or breaches. It ensures a systematic
    and efficient reaction to minimize damage and restore normal operations. A well-defined
    incident response plan is essential. This plan enables quick detection of security
    incidents or breaches, allowing for immediate action. It outlines procedures to
    contain the threat, preventing further damage, and provides steps to mitigate
    the impact. By having this plan in place, organizations can respond effectively
    to security incidents, minimizing potential harm and ensuring a swift recovery.


    # Compliance and Regulations


    Compliance refers to adhering to laws, regulations, and industry standards relevant
    to an organization’s operations. Regulations are the specific rules and guidelines
    established by governing bodies to ensure legal and ethical conduct. Ensuring
    compliance with relevant security regulations, industry standards, and legal requirements
    is critical. This involves aligning the application with the specific rules and
    guidelines based on its use case and the nature of the data it handles, thereby
    maintaining legal and operational integrity.


    # Importance of Security


    In today’s interconnected digital landscape, application security is of paramount
    importance. Neglecting it can lead to data breaches, financial losses, reputational
    damage, and legal consequences. Therefore, organizations must integrate robust
    application security practices into their development processes to mitigate risks
    and protect their applications and users from cyber threats.


    Security is a critical aspect of building software applications, as it ensures
    the protection of sensitive data, maintains user trust, and prevents malicious
    attacks. In the context of banking, for example, applications must safeguard financial
    information. A breach can lead to severe financial losses for both individuals
    and institutions. The 2019 Capital One breach, where over 100 million credit card
    applications were compromised, highlights the devastating impact of inadequate
    security measures.


    In the realm of healthcare, securing patient data is equally vital. Health records
    contain sensitive information that, if exposed, can lead to identity theft and
    privacy violations. The 2015 Anthem Inc. data breach, which exposed the personal
    information of nearly 80 million individuals, underscores the importance of robust
    security protocols in healthcare applications.


    Data protection is another crucial area. Applications across various industries
    handle vast amounts of personal and sensitive data. Without proper security measures,
    this data is vulnerable to unauthorized access and misuse. The 2017 Equifax breach,
    which affected 147 million people, revealed the catastrophic consequences of poor
    data security practices.


    Security in applications also involves ensuring compliance with regulations such
    as the General Data Protection Regulation (GDPR) and the Health Insurance Portability
    and Accountability Act (HIPAA). These regulations mandate stringent data protection
    measures to safeguard user information and ensure privacy. Failure to comply can
    result in hefty fines and legal repercussions, as seen in the case of Google,
    which was fined $57 million for GDPR violations in 2019.'
  raw: '### Lifecycle Approach


    Application security is not a one-time task; it’s an ongoing process that spans
    the entire software development lifecycle (SDLC). It is a multistep end-to-end
    process integral to all parts and processes inherent to the system and has to
    be iterative to understand the current security environment and see that our system
    evolves to safeguard against them in a proactive stance. It starts from the initial
    design and continues through development, testing, deployment, and maintenance
    phases.


    In the development stage, the application developer adds security in the code,
    configuration, CI/CD pipeline, and any other infrastructure part of the development
    environment like cloud, third-party APIs, etc. Once the development phase is done
    or many times while the development phase is continuing in iterative steps, the
    Quality Assurance (QA) team validates and tests the applications from a 360-degree
    outlook to consider the application for security and performance, taking into
    consideration the enterprise guidelines laid for the organization. Once the QA
    team approves it, then the application has to be deployed to production. Before
    that, the enterprise security team runs through all the design processes, templates,
    standards, and security guidelines and comes with feedback for the application.
    This whole process goes on iteratively since the application builds new features
    and there are new security hacks which have been shared in the security community
    which need to be validated against our application.


    ### Security Testing


    One of the fundamental components of application security is security testing.
    This includes activities such as quality assurance testing, penetration testing,
    vulnerability scanning, code review, and security-focused quality assurance to
    detect and rectify vulnerabilities. These are handled by many teams within an
    enterprise organization but also sometimes by a small team capable of such skills
    in a startup environment.


    ### Secure Development Practices


    Promoting secure coding practices is a key aspect of application security. We
    as developers need to follow guidelines and best practices to write code that
    is resistant to common vulnerabilities. These guidelines have been the result
    of many years of improvement and shared knowledge of working engineers, communities,
    and experts through incremental learning from mistakes and hacks from different
    parties both internal and external.


    These guidelines vary from organization to organization, since each organization
    has their unique business model and domain and has different security requirements.
    An application related to the defense of a country will have a more extended and
    different set of guidelines than a web application catering to blogs for users.
    These guidelines and practices have always to be updated to be current in the
    security environment and with the evolving nature of the business model.


    ### Authentication and Authorization


    Authentication ensures we verify the users are who they say they are, while authorization
    ensures what the users are allowed to do. Both are crucial for the security of
    an application, ensuring that the application employs strong authentication mechanisms
    to verify the identity of users and enforces appropriate authorization to control
    access to data and features.


    There are various industry standard protocols for implementing authentication
    and authorization. Some authentication protocols and frameworks to be named are
    password-based authentication, multifactor authentication (MFA), OAuth (Open Authorization),
    OpenID Connect, Kerberos, SAML (Security Assertion Markup Language), LDAP (Lightweight
    Directory Access Protocol), and JWT (JSON Web Token). Similarly, some authorization
    protocols and frameworks are OAuth 2.0, RBAC (Role-Based Access Control), ABAC
    (Attribute-Based Access Control), ACL (Access Control List), SAML, JWT, etc. We
    will explore some of these in the coming chapters to know more about them.


    ### Data Protection


    Protecting sensitive data is crucial. This involves encrypting data during transmission
    to ensure it can’t be intercepted or read by unauthorized parties. Access controls
    are implemented so only authorized users can access the data. Additionally, secure
    storage practices are used to protect data at rest, ensuring it remains safe from
    breaches. These measures collectively help maintain the integrity and confidentiality
    of sensitive information.


    ### Incident Response


    An incident response plan is a structured approach outlining the steps to detect,
    respond to, and recover from security incidents or breaches. It ensures a systematic
    and efficient reaction to minimize damage and restore normal operations. A well-defined
    incident response plan is essential. This plan enables quick detection of security
    incidents or breaches, allowing for immediate action. It outlines procedures to
    contain the threat, preventing further damage, and provides steps to mitigate
    the impact. By having this plan in place, organizations can respond effectively
    to security incidents, minimizing potential harm and ensuring a swift recovery.


    ### Compliance and Regulations


    Compliance refers to adhering to laws, regulations, and industry standards relevant
    to an organization’s operations. Regulations are the specific rules and guidelines
    established by governing bodies to ensure legal and ethical conduct. Ensuring
    compliance with relevant security regulations, industry standards, and legal requirements
    is critical. This involves aligning the application with the specific rules and
    guidelines based on its use case and the nature of the data it handles, thereby
    maintaining legal and operational integrity.


    ## Importance of Security


    In today’s interconnected digital landscape, application security is of paramount
    importance. Neglecting it can lead to data breaches, financial losses, reputational
    damage, and legal consequences. Therefore, organizations must integrate robust
    application security practices into their development processes to mitigate risks
    and protect their applications and users from cyber threats.


    Security is a critical aspect of building software applications, as it ensures
    the protection of sensitive data, maintains user trust, and prevents malicious
    attacks. In the context of banking, for example, applications must safeguard financial
    information. A breach can lead to severe financial losses for both individuals
    and institutions. The 2019 Capital One breach, where over 100 million credit card
    applications were compromised, highlights the devastating impact of inadequate
    security measures.


    In the realm of healthcare, securing patient data is equally vital. Health records
    contain sensitive information that, if exposed, can lead to identity theft and
    privacy violations. The 2015 Anthem Inc. data breach, which exposed the personal
    information of nearly 80 million individuals, underscores the importance of robust
    security protocols in healthcare applications.


    Data protection is another crucial area. Applications across various industries
    handle vast amounts of personal and sensitive data. Without proper security measures,
    this data is vulnerable to unauthorized access and misuse. The 2017 Equifax breach,
    which affected 147 million people, revealed the catastrophic consequences of poor
    data security practices.


    Security in applications also involves ensuring compliance with regulations such
    as the General Data Protection Regulation (GDPR) and the Health Insurance Portability
    and Accountability Act (HIPAA). These regulations mandate stringent data protection
    measures to safeguard user information and ensure privacy. Failure to comply can
    result in hefty fines and legal repercussions, as seen in the case of Google,
    which was fined $57 million for GDPR violations in 2019.'
  trans: '

    # 生命周期方法


    应用安全并非一次性任务，而是一个贯穿整个软件开发生命周期的持续过程。它是一个多步骤的端到端流程，是系统所有组成部分和固有流程的核心，并且必须迭代进行，以理解当前的*安全环境*，并确保我们的系统能够主动演进以抵御威胁。它从最初的设计开始，并持续贯穿开发、测试、部署和维护阶段。


    在开发阶段，应用程序开发者将安全性融入代码、配置、CI/CD 流水线以及开发环境的任何其他基础设施部分，例如云服务、第三方 API 等。一旦开发阶段完成，或在开发阶段以迭代步骤持续进行的过程中，质量保证（QA）团队会从
    360 度的视角验证和测试应用程序，综合考虑企业为组织制定的指南，评估应用的安全性和性能。一旦 QA 团队批准，应用程序将被部署到生产环境。在此之前，企业安全团队会审查所有的设计流程、模板、标准和安全指南，并为应用程序提供反馈。由于应用程序会构建新功能，并且安全社区中会共享新的安全攻击手段需要针对我们的应用进行验证，整个过程会迭代进行。


    # 安全测试


    应用安全的基本组成部分之一是安全测试。这包括质量保证测试、渗透测试、漏洞扫描、代码审查以及以安全为重点的质量保证等活动，用于发现和修复漏洞。这些工作通常由企业组织内的多个团队处理，但在初创企业环境中，有时也由一个具备此类技能的小团队负责。


    # 安全开发实践


    推广安全编码实践是应用安全的一个关键方面。作为开发者，我们需要遵循指南和最佳实践，编写能够抵御常见漏洞的代码。这些指南是多年改进、在职工程师、社区和专家通过从内部和外部的错误与攻击中不断学习而积累的共享知识结晶。


    这些指南因组织而异，因为每个组织都有其独特的商业模式和领域，并具有不同的安全要求。一个与国防相关的应用，其指南将比一个面向用户博客的 Web 应用更长且有所不同。这些指南和实践必须持续更新，以适应不断变化的安全环境以及商业模式的演进。


    # 身份验证与授权


    身份验证确保我们核实用户确实为其所声称的身份，而授权则确保我们控制用户被允许执行的操作。两者对于应用的安全都至关重要，确保应用采用强大的身份验证机制来验证用户身份，并实施适当的授权来控制对数据和功能的访问。


    有多种行业标准协议可用于实现身份验证和授权。一些身份验证协议和框架包括：基于密码的身份验证、多因素身份验证（MFA）、`OAuth`（开放授权）、`OpenID
    Connect`、`Kerberos`、`SAML`（安全断言标记语言）、`LDAP`（轻量级目录访问协议）以及`JWT`（JSON Web 令牌）。同样，一些授权协议和框架包括：`OAuth
    2.0`、`RBAC`（基于角色的访问控制）、`ABAC`（基于属性的访问控制）、`ACL`（访问控制列表）、`SAML`、`JWT`等。我们将在后续章节中探讨其中一些内容以加深了解。


    # 数据保护


    保护敏感数据至关重要。这涉及在传输过程中对数据进行加密，以确保其不会被未授权方拦截或读取。实施访问控制，确保只有授权用户才能访问数据。此外，采用安全存储实践来保护静态数据，确保其免受泄露。这些措施共同有助于维护敏感信息的完整性和机密性。


    # 事件响应


    事件响应计划是一种结构化的方法，概述了检测、响应和恢复安全事件或漏洞的步骤。它确保系统性和高效的应对，以最小化损害并恢复正常运营。一个明确定义的事件响应计划至关重要。该计划能够快速检测安全事件或漏洞，以便立即采取行动。它概述了遏制威胁、防止进一步损害的程序，并提供了减轻影响的步骤。通过制定此计划，组织可以有效响应安全事件，最大限度减少潜在危害，并确保快速恢复。


    # 合规性与法规


    合规性指遵守与组织运营相关的法律、法规和行业标准。法规是由监管机构制定的具体规则和指南，以确保合法和道德行为。确保遵守相关的安全法规、行业标准和法律要求至关重要。这涉及根据应用的用例及其处理数据的性质，使其符合特定的规则和指南，从而维护法律和运营的完整性。


    # 安全的重要性


    在当今相互关联的数字环境中，应用安全至关重要。忽视它可能导致数据泄露、财务损失、声誉损害和法律后果。因此，组织必须将健壮的应用安全实践集成到其开发流程中，以减轻风险并保护其应用和用户免受网络威胁。


    安全是构建软件应用的一个关键方面，因为它能确保敏感数据的保护、维护用户信任并防止恶意攻击。例如，在银行业背景下，应用必须保护金融信息。一次泄露可能导致个人和机构都遭受严重的财务损失。2019
    年 Capital One 数据泄露事件，导致超过 1 亿份信用卡申请信息被泄露，凸显了安全措施不足的破坏性影响。


    在医疗保健领域，保护患者数据同样至关重要。健康记录包含敏感信息，一旦泄露，可能导致身份盗窃和隐私侵犯。2015 年 Anthem Inc.数据泄露事件，暴露了近
    8000 万人的个人信息，强调了在医疗保健应用中实施强大安全协议的重要性。


    数据保护是另一个关键领域。各行各业的应用程序处理着海量的个人和敏感数据。如果没有适当的安全措施，这些数据很容易受到未经授权的访问和滥用。2017 年 Equifax
    数据泄露事件，影响了 1.47 亿人，揭示了糟糕数据安全实践带来的灾难性后果。


    应用安全还涉及确保遵守诸如《通用数据保护条例》（GDPR）和《健康保险流通与责任法案》（HIPAA）等法规。这些法规规定了严格的数据保护措施，以保障用户信息并确保隐私。不遵守规定可能导致巨额罚款和法律后果，正如
    2019 年谷歌因违反 GDPR 而被罚款 5700 万美元的案例所示。

