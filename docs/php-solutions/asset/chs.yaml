  \ 之前，你需要创建 `menu.php` 并使用会话限制访问权限。\n\n\n\n### PHP 方案 9-4：通过会话限制页面访问\n\n本 PHP 方案演示了如何通过检查指示用户凭证已验证的会话变量是否存在，来限制对页面的访问。如果该变量未被设置，`header()`\
  \ 函数会将用户重定向到登录页面。\n\n在 `sessions` 文件夹中创建两个页面，分别命名为 `menu.php` 和 `secretpage.php`。只要它们相互链接，内容无所谓。或者，使用\
  \ `ch09` 文件夹中的 `menu_01.php` 和 `secretpage_01.php`。通过在 `DOCTYPE` 声明上方插入以下代码来保护每个页面的访问：\n\
