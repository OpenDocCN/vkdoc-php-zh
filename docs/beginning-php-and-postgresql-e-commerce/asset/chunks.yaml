- fmt: '# Welcome to *Beginning PHP and PostgreSQL E-Commerce: From Novice to Professional*


    The explosive growth of retail over the Internet is encouraging more small- to
    medium-sized businesses to consider the benefits of setting up e-commerce web
    sites. Although there are great and obvious advantages to online retail, there
    are also many hidden pitfalls that you might encounter when developing a retail
    web site. This book provides you with a practical, step-by-step guide to setting
    up an e-commerce web site. Guiding you through every step of the design and build
    process, this book will have you building high quality, extendable e-commerce
    web sites quickly and easily.


    Over the course of the book, you will develop all the skills necessary to get
    your business up on the web and available to a worldwide audience. We present
    this information in a book-long case study, the complexity of which develops as
    your knowledge increases through the book.


    The case study is presented in three phases. The first phase focuses on getting
    the site up and running as quickly as possible and at a low cost. Although not
    yet full-featured, at the conclusion of this phase, your site will be capable
    of accepting PayPal payments, enabling you to begin generating revenue immediately.


    The second phase concentrates on increasing revenue by improving the shopping
    experience. In this phase, you’ll learn how to proactively encourage customers
    to buy more by implementing product recommendations. We’ll also begin laying the
    groundwork for handling credit card transactions by developing and integrating
    custom shopping cart functionality.


    In the third phase, we’ll show you how to increase your profit margins by reducing
    costs through automating and streamlining order processing and administration
    and by handling credit card transactions yourself. You also learn how to integrate
    external functionality through Web Services and how to improve your customer’s
    shopping experience by adding product reviews functionality.


    ## Who This Book Is For


    *Beginning PHP and PostgreSQL E-Commerce: From Novice to Professional* is aimed
    at developers looking for a tutorial approach to building a full e-commerce web
    site from design to deployment. However, it’s assumed that you have some knowledge
    of building web sites with PHP and PostgreSQL. *Beginning PHP and PostgreSQL 8:
    From Novice to Professional* (Apress, 2006), authored by W. Jason Gilmore and
    Robert Treat, can provide this foundation knowledge for you.


    This book will also prove valuable for PHP 4 developers who learn best by example
    and want to experience PHP 5 development techniques first hand.


    xvii


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XFM.qxd 11/22/06 4:43 PM Page xviii **xviii**


    ■ INTRODUCTION


    ## How This Book Is Structured


    This book is divided into three parts consisting of 17 chapters and 2 appendixes.
    We cover a wide variety of topics, showing you how to


    - Build an online product catalog that can be browsed and searched

    - Implement the catalog administration pages that allow adding, modifying, and
    removing products, categories, and departments

    - Create your own shopping basket and checkout in PHP

    - Increase sales by implementing product recommendations and product reviews

    - Handle payments using PayPal, DataCash, and Authorize.net

    - Implement a customer accounts system

    - Integrate external functionality through Web Services


    The following brief roadmap highlights how we’ll take you from novice to professional
    regarding each of the topics in the previous list.


    ### Part 1: Phase I of Development


    **Chapter 1: Starting an E-Commerce Site**


    In this chapter, we’ll introduce some of the principles of e-commerce in the real
    world. You see the importance of focusing on short-term revenue and keeping risks
    down. We look at the three basic ways in which an e-commerce site can make money.
    We then apply those principles to a three-phase plan that provides a deliverable,
    usable site at each phase of this book.


    **Chapter 2: Laying Out the Foundations**


    The first chapter offered an overview of e-commerce in the real world. Now that
    you’ve decided to develop a web site, we start to look in more detail at laying
    down the foundations for its future. We’ll talk about what technologies and tools
    you’ll use, and even more importantly, how you’ll use them.


    **Chapter 3: Creating the Product Catalog: Part I**


    After learning about the three-tier architecture and implementing a bit of your
    web site’s main page, it’s time to continue your work by starting to create the
    HatShop product catalog.


    Because the product catalog is composed of many components, you’ll create it over
    two chapters. In Chapter 3, you’ll create the first database table and implement
    the data access code. By the end of this chapter, you’ll have something dynamically
    generated on your web page.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XFM.qxd 11/22/06 4:43 PM Page xix


    ■ INTRODUCTION


    **Chapter 4: Creating the Product Catalog: Part II**


    The fun isn’t over yet! In the previous chapter, you created a selectable list
    of departments for HatShop. However, a product catalog is much more than a list
    of departments. In Chapter 4, you’ll add the rest of the product catalog features.


    **Chapter 5: Searching the Catalog**


    In the preceding two chapters, you will have implemented a functional product
    catalog for HatShop. However, the site still lacks the all-important search feature.
    The goal in this chapter is to allow the visitor to search the site for products
    by entering one or more keywords. You’ll learn how to implement search results
    rankings and how to browse through the search results page by page. You’ll see
    how easy it is to add new functionality to a working site by integrating the new
    components into the existing architecture.


    **Chapter 6: Receiving Payments Using PayPal**


    Let’s make some money! Your e-commerce web site needs a way to receive payments
    from customers. The preferred solution for established companies is to open a
    merchant account, but many small businesses choose to start with a solution that’s
    simpler to implement, where they don’t have to process credit card or payment
    information themselves.


    A number of companies and web sites exist to help individuals or small businesses
    that don’t have the resources to process credit card and wire transactions. These
    companies can be used to process the payment between companies and their customers.
    In this chapter, we’ll demonstrate some of the functionality provided by one such
    company, PayPal, as we use it on the HatShop web site in the first two stages
    of development.


    **Chapter 7: Catalog Administration**


    The final detail to take care of before launching a web site is to create its
    administrative interface. Although this is a part visitors will never see, it’s
    still key to delivering a quality web site to your client.


    ### Part 2: Phase II of Development


    **Chapter 8: The Shopping Cart**


    With this chapter, you enter the second phase of development, where you start
    improving and adding new features to the already existing, fully functional e-commerce
    site. In Chapter 8, you’ll implement the custom shopping cart, which stores its
    data in the local database. This provides you with more flexibility than the PayPal
    shopping basket, over which you have no control and which you can’t save into
    your database for further processing and analysis.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XFM.qxd 11/22/06 4:43 PM Page xx


    **Chapter 9: Dealing with Customer Orders**'
