    Using Homebrew, we can install a drop-in replacement for Linux’s wget command.


    ■ **Note** if would like more information on Homebrew, or are having trouble installing
    it, you can read more at


    [https://github.com/mxcl/homebrew/wiki.](http://www.github.com/mxcl/homebrew/wiki)


    ■ **Note** it is normal to see these warnings, and okay to ignore them.


