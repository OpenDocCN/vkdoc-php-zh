    Most of the examples you have seen so far could use static methods because they
    do not store instance data. There’s nothing complicated about placing a static
    method in a trait. Here I change the `PriceUtilities::$taxrate` property and the
    `PriceUtilities::calculateTax()` methods so that they are static:


    ```

    // listing 04.33

    trait PriceUtilities

    {

    private static $taxrate = 17;

    public static function calculateTax(float $price): float

    {

    return ((self::$taxrate / 100) * $price);

    }

    // other utilities

    }

    // listing 04.34

    class UtilityService extends Service

    {

    use PriceUtilities;

    }

    // listing 04.35

    $u = new UtilityService();

    print $u::calculateTax(100) . "\n";

    ```


    As you might expect, this script outputs the following:


    ```


    ```


    So, static methods are declared in traits and accessed via the host class in the
    normal way.'
  raw: '### Using More than One Trait


    You can include multiple traits in a class by listing each one after the `use`
    keyword, separated by commas. In this example, I define and apply a new trait,
    `IdentityTrait`, keeping my original `PriceUtilities` trait:


    ```

    // listing 04.17

    trait IdentityTrait

    {

    public function generateId(): string

    {

    return uniqid();

    }

    }

    // listing 04.18

    class ShopProduct

    {

    use PriceUtilities, IdentityTrait;

    }

    // listing 04.19

