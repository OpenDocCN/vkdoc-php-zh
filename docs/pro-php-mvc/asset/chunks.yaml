    \        }\n    }\n}\n```\n\n### Questions\n\n1. We used URL rewriting to reroute\
    \ application requests to a single `index.php` file. Why was this required?\n\n\
    2. Our bootstrap file references many classes by their full namespace (e.g., `Framework\\\
    Configuration`) instead of utilizing `use` statements. It also unsets the variables\
    \ we define. Why are these steps necessary?\n\n3. We added automatic configuration\
    \ of the `Database` and `Cache` classes. This is useful for configuring these\
