- fmt: '# 搜索引擎目录


    请注意，向量保留了单词的位置（尽管我们并不真正需要这一点），并且“A”相关性因子被添加到来自产品名称的单词中。同时要注意，同一单词的各种形式都会被识别（例如“fit”），而停用词不会被考虑。


    **表 5-1.** *产品的搜索向量*


    | **字段** | **值** |

    | --- | --- |

    | `product_id` | |

    | `name` | Santa Jester Hat |

    | `description` | This three-prong velvet jester is one size fits all and has
    an adjustable touch fastener back for perfect fitting. |

    | `search_string` | `''fit'':13,24 ''hat'':3A ''one'':11 ''back'':21 ''size'':12
    ''prong'':7 ''santa'':1A ''three'':6 ''touch'':19 ''adjust'':18 ''fasten'':20
    ''jester'':2A,9 ''velvet'':8 ''perfect'':23 ''three-prong'':5` |


    ■**注意**  当向表中添加新产品或更新现有产品时，需要确保同时（重新）创建它们的搜索向量。负责解析这些向量的索引会自动完成其工作，但向量本身必须手动创建。你将在第7章中处理这个问题，届时将添加目录管理功能。在此之前，如果你手动更改了产品，只需执行之前的
    SQL 命令来更新搜索向量。


    ## 搜索数据库


    现在你已经为每个产品构建了搜索向量，让我们看看如何用它进行搜索。


    要执行搜索，同样需要三个步骤：


    1. **构建一个*搜索字符串***，表达你究竟在查找什么。它可以包含布尔运算符；我们在全词搜索时使用 `&`（AND），在任意词搜索时使用 `|`（OR）。

    2. **对查询字符串应用 `to_tsquery` 函数**。这将把查询字符串准备成可用于搜索的形式。

    3. **执行搜索时**，使用条件 `search_vector @@ prepared_search_string`，如果匹配则返回 `TRUE`，否则返回
    `FALSE`。这里，`search_vector` 是之前计算的结果（上一部分的步骤3），而 `prepared_search_string` 是步骤2的结果。


    让我们看看这在实践中如何应用。以下查询对“yankee war”搜索字符串执行全词搜索：


    ```sql

    SELECT product_id, name

    FROM product

    WHERE search_vector @@ to_tsquery(''yankee & war'')

    ORDER BY product_id;

    ```


    对于示例产品数据库，此查询应得到表5-2所示的结果。


    **表 5-2.** *匹配“yankee & war”的帽子*


    | `product_id` | `name` |

    | --- | --- |

    | | Civil War Union Slouch Hat |

    | | Union Civil War Kepi Cap |


    要执行任意词搜索，应在搜索字符串中使用 `|` 代替 `&`：


    ```sql

    SELECT product_id, name

    FROM product

    WHERE search_vector @@ to_tsquery(''yankee | war'')

    ORDER BY product_id;

    ```


    如预期，这次将会有更多匹配的产品，如表5-3所示（因为列表未排序，结果顺序可能不同）。


    **表 5-3.** *匹配“yankee | war”的帽子*


    | `product_id` | `name` |

    | --- | --- |

    | | Military Beret |

    | | Confederate Civil War Kepi |

    | | Uncle Sam Top Hat |

    | | Confederate Slouch Hat |

    | | Civil War Union Slouch Hat |

    | | Civil War Leather Kepi Cap |

    | | Union Civil War Kepi Cap |


    ## 按相关性排序结果


    前面的查询显示了匹配的产品，但未按特定顺序排序。数据库引擎会以其认为简单的方式返回结果。对于搜索，我们更希望首先显示相关性更高的匹配项。请记住，我们为来自产品标题的匹配赋予了更高优先级，因此一切已准备就绪。


    `tsearch2` 引擎提供了 `rank` 函数，可用于对结果进行排序。默认顺序是先显示排名较低的匹配项，因此还需要使用 `ORDER BY` 的 `DESC`
    选项将更好的匹配项置于顶部。'
