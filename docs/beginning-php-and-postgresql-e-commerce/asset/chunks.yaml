- fmt: "# Indexes\n\nIndexes are related to PostgreSQL performance tuning, so we’ll\
    \ mention them only briefly here.\n\n`Indexes` are database objects meant to increase\
    \ the overall speed of database operations. Indexes work on the presumption that\
    \ the vast majority of database operations are read operations. Indexes increase\
    \ the speed of search operations but slow down insert, delete, and update operations.\
    \ Usually, the gains of using indexes considerably outweigh the drawbacks.\n\n\
    On a table, you can create one or more indexes, with each index working on one\
    \ column or on a set of columns. When a table is indexed on a specific column,\
    \ its rows are either indexed or physically arranged based on the values of that\
    \ column and the type of index. This makes search operations on that column very\
    \ fast. If, for example, an index exists on `department_id` and then you do a\
    \ search for the department with the ID value 934, the search would be performed\
    \ very quickly.\n\nThe drawback of indexes is that they can slow down database\
    \ operations that add new rows or update existing ones because the index must\
    \ be actualized (or the table rows rearranged) each time these operations occur.\n\
    \nYou should keep the following in mind about indexes:\n\n- Indexes greatly increase\
    \ search operations on the database, but they slow down operations that change\
    \ the database (delete, update, and insert operations).\n- Having too many indexes\
    \ can slow down the general performance of the database. The general rule is to\
    \ set indexes on columns frequently used in `WHERE`, `ORDER BY`, and `GROUP BY`\
    \ clauses or used in table joins.\n- By default, unique indexes are automatically\
    \ created on primary key table columns.\n\nYou can use dedicated tools to test\
    \ the performance of a database under stress conditions with and without particular\
    \ indexes; in fact, a serious database administrator will want to run some of\
    \ these tests before deciding on a winning combination for indexes.\n\n# Creating\
    \ the `department` Table\n\nYou created the `hatshop` database in Chapter 2. In\
    \ the following exercise, you’ll add the `department` table to it using pgAdmin\
    \ III. Alternatively, you can use the SQL scripts from the Source Code/Download\
    \ to create and populate the `department` table (you can also execute them through\
    \ pgAdmin III).\n\n> **Note** Unlike other database servers, PostgreSQL still\
    \ allows you to manually specify for an autonumbered field when adding new rows,\
    \ if you want.\n\n> **Note** You can find the database creation scripts in the\
    \ Source Code/Download section for this book, which you can find on the Apress\
    \ web site (http://www.apress.com). You can find the files on the authors’ web\
    \ sites as well, at http://www.cristiandarie.ro and http://www.emilianbalanescu.ro.\n\
    \n## Exercise: Creating the `department` Table\n\n1. Start pgAdmin III, and log\
    \ into your database server using the `hatshopadmin` username, as you did in the\
    \ last exercise of Chapter 2.\n\n2. Expand the `hatshop` database node, expand\
    \ `Schemas`, expand `public`, and then select the `Tables` node. Right-click this\
    \ node, and choose **New Table** from the context menu.\n\n3. Type **department**\
    \ in the **Name** text box, and then click the **Columns** tab.\n\n4. In the **Columns**\
    \ window, click **Add**. Complete the details as shown in Figure 3-10, and then\
    \ click **OK**.\n\n   **Figure 3-10.** *Adding the `department_id` field*\n\n\
    5. Click **Add** again to add the `name` field, as shown in Figure 3-11.\n\n \
    \  **Figure 3-11.** *Adding the `name` field*\n\n6. Click **Add** again to add\
    \ the `description` field. This should also be a `varchar` field, with a maximum\
    \ length of 1000. Let the **Not NULL** check box stay unchecked, and click **OK**.\n\
    \n7. The final step for creating the table is to specify a primary key. Click\
    \ the **Constraints** tab, make sure **Primary Key** is selected in the combo\
    \ box, and click **Add**.\n\n8. Type **pk_department** for the key’s name, then\
    \ switch to the **Columns** tab, and add **department_id** to the list. Click\
    \ **OK** to close the dialog box.\n\n9. Click **OK** again to create the table.\
    \ Your new table should now appear in the **Tables** list of your database (see\
    \ Figure 3-12). As you can see, apart from your new table, there are a few tables\
    \ created by default by PostgreSQL—it’s safe to ignore them. If you select the\
    \ `department` table from the list, pgAdmin III shows you the SQL code that creates\
    \ the structure you’ve just built using the visual interface. You can check that\
    \ you see the same code on your computer to ensure you’ve followed the steps of\
    \ the exercise correctly.\n\n   **Figure 3-12.** *The `department` table in pgAdmin\
    \ III*\n\n   > **Note** You’ll learn more about SQL in the following chapters,\
    \ but for now it’s enough to know that SQL is a language that can be used to interact\
    \ with the database, to create data tables, to read data from these tables, and\
    \ so on.\n\n10. Let’s populate the table with some sample data. Right-click on\
    \ the `department` table, and select **View Data**.\n\n11. Using the form that\
    \ shows up, add the records mentioned in Table 3-2.\n\n    **Table 3-2.** *Three\
    \ Records for the `department` Table*\n\n    | `department_id` | `name`      \
    \    | `description`                                                         \
    \                          |\n    |-----------------|-----------------|-------------------------------------------------------------------------------------------------|\n\
    \    | Holiday         | Prepare for the holidays with our special collection\
    \ of seasonal hats!                          |                               \
    \                                                                  |\n    | Caps\
    \ and Berets | The perfect hats to wear at work and costume parties!         \
    \                                  |                                         \
    \                                                        |\n    | Costume Hats\
    \    | Find the matching hat for your new costume!                           \
    \                          |                                                 \
    \                                                |\n\n    > **Caution** Because\
    \ you have a sequence in place, it’s better to let it generate the department\
    \ IDs, rather than typing the values yourself. You just need to type in the names\
    \ and descriptions. If you write the `department_id` value manually instead of\
    \ letting the sequence generate it, you’ll also need to update the sequence because\
    \ this doesn’t happen automatically. If you don’t update the sequence, it will\
    \ generate values that already exist in the database.\n\n## How It Works: Creating\
    \ PostgreSQL Data Tables\n\nYou have just created your first database table! You\
    \ also set a primary key, set a serial column, and filled the table with some\
    \ data.\n\nAs you can see, as soon as you have a clear idea about the structure\
    \ of a table, it’s relatively easy to use pgAdmin III to create it into your database.\
    \ Let’s move on!\n\n# Communicating with the Database\n\nNow that you have a table\
    \ filled with data, let’s do something useful with it! The ultimate goal with\
    \ this table is to get the list of department names from a PHP page and populate\
    \ the Smarty template with that list.\n\nTo get data from a database, you first\
    \ need to know how to communicate with the database. Relational databases understand\
    \ dialects and variants of SQL. The usual way of communicating with PostgreSQL\
    \ is to write an SQL command, send it to the PostgreSQL server, and get the results\
    \ back.\n\nIn practice, as you’ll see later, we prefer to centralize the data\
    \ access code using PostgreSQL functions, but before you can learn about them,\
    \ you need to know the basics of SQL.\n\n## The Structured Query Language (SQL)"
