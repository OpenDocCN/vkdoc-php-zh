  \ `search.php` 控制器。\n\n### 搜索模型\n\n我们已经有了搜索表单视图和一个初步的搜索控制器。现在该着手处理搜索模型了，这样我们才能执行实际的搜索。为了执行搜索，我们需要查询\
  \ `blog_entry` 数据库表。我们已经有了一个 `Blog_Entry_Table` 类来提供对该表的单一访问点。明智的做法是向 `Blog_Entry_Table`\
  \ 类添加另一个方法。\n\n\n```php\n// 在 Blog_Entry_Table 类中声明新方法\npublic function searchEntry\
  \ ( $searchTerm ) {\n$sql = \"SELECT entry_id, title FROM blog_entry\nWHERE title\
  \ LIKE ?\nOR entry_text LIKE ?\";\n$data = array( \"%$searchTerm%\", \"%$searchTerm%\"\
  \ );\n$statement = $this->executeSQL($sql, $data);\nreturn $statement;\n}\n```\n\
  清单 8-21\n部分清单 `Searched_Blog_Entry_Table.class.php`\n\n或许需要为 `$data` 数组稍作解释。*当两个元素完全相同时*，创建包含两个独立元素的数组难道不奇怪吗？实际上，SQL\
  \ 中未命名占位符的数量必须与数组中执行的项目数量完全一致。由于 SQL 中有两个占位符，我们需要一个包含两个值的数组用于搜索。在上述示例中，代码将在两个不同的表列（`title`\
  \ 和 `entry_text`）中搜索相同的搜索词。\n\n### 使用 LIKE 条件进行搜索\n\n前面的 SQL 语句展示了一个本书先前示例中未使用过的\
  \ SQL 关键字：`LIKE`。\n\n```php\n$sql = \"SELECT entry_id, title FROM blog_entry\nWHERE\
  \ title LIKE ?\nOR entry_text LIKE ?\";\n$data = array( \"%$searchTerm%\", \"%$searchTerm%\"\
  \ );\n```\n\n`%` 字符表示通配符。通配符可以代表任何内容。该查询将返回所有 `title` 或 `entry_text` 包含搜索值（无论出现在这些列中的任何位置）的行结果集。例如，如果搜索值为“test”，则可能返回\
  \ `title` 为“test if it works”的行；也可能返回 `entry_text` 值为“This is a test”的行。由于通配符同时位于搜索词的前后，因此两种结果都有可能。\n\
