    The set() handler is curious for two reasons. The first is that it is the first
    public construct handler we have used in any of our template implementations.
    This is because we want to allow for the shared storage to be accessed not only
    within our template files, but also from within our application’s controllers
    and actions.


    The second reason the set() method is interesting is that it modifies the value
    string from something resembling $_text = "foo"; to something resembling foo.
    This is because of how our Template class parses text nodes within our template
    files. If you refer back to the Template- >_script() method, you will see one
    of the first things we do is convert plain text nodes to code that adds them directly
    to the $_text array. This is desired behavior, which we need to revert in this
    fringe case.


    We do this by removing everything up to the first " character and everything after
    the last " character. This gives us the raw data, which is what we want to store.


    Next, we tackle the prepend() and append() handlers, shown in Listing 15-11.


    ***Listing 15-11.*** The prepend() and append() Handlers


    public function append($key, $value)


    {


    if (is_array($key))


    {


    $key = $this- >_getKey($key);


    }


    $previous = $this- >_getValue($key);


    $this- >set($key, $previous.$value);


    }


    public function prepend($key, $value)


    {


    if (is_array($key))


    {


    $key = $this- >_getKey($key);


    }


    $previous = $this- >_getValue($key);


    $this- >set($key, $value.$previous);


    }


    Like the set() handler, these handler methods are also public. They too allow
    either a string or node tree to be supplied as the $key. If a node tree is provided,
    the _getKey() method will be used to extract the storage key needed.


