    ```


    如果你的任何模型查询不会尝试检索相关的数据库表，这就足够了。由于只有这里添加的固件才会加载到测试数据库中，因此相关的数据库表将不存在，尝试查询它们会产生错误。


    始终保持测试简单，只加载绝对必要的固件，这是一个好习惯。


    ## 总结


    在本章中，你学习了固件的概念，并了解了如何编写、生成固件并将其加载到测试中。最重要的经验之一是尽量保持固件简短，并且只在测试中加载必要的固件。


