    The blogging application will allow users to create and manage their own blog.
    Each user will have their own public page on which their blog posts are published.


    Figure 1-1 shows how the application will be structured. As you can see, we will
    use a database to store application data, and we will create separate logical
    areas in the application to manage each feature as required. Additionally, one
    of the core aspects of Web 2.0 applications is using standards-compliant XHTML
    and CSS. We will focus on developing clean markup and well-structured JavaScript
    classes to ensure maximum compatibility and accessibility.


    **Figure 1-1.** *The basic structure of our web application*


    There are a number of different aspects of the application that we must cover,
    including database connectivity, template management, user authentication and
