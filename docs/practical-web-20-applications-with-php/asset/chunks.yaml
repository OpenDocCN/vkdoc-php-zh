    Generating URLs in Smarty Templates


    Before we go any further, we must also cater for URL generation within our templates.
    To achieve this, we will implement a Smarty plug-in called geturl. Doing so will
    allow us to generate URLs by using {geturl} in templates. For instance, we could
    generate a URL for the login page like this:


    {geturl action=''login'' controller=''account''}


    Additionally, we will allow the user to omit the controller argument, meaning
    that the current controller would be used.


    ■**Tip** The preceding code is an example of a Smarty function call. The three
    main types of plug-ins are functions, modifiers, and blocks. Modifiers are functions
    that are applied to strings that are being output (making a string uppercase with
    {$myString|upper}, for example) while blocks are used to define output that wraps
    whatever is between the opening and closing tags (such as {rounded_box} Inner
    content.


    {/rounded_box}). In the case of geturl, we will use a Smarty *function* in order
    to perform a specific operation based on the provided arguments; that function
    isn’t being applied to an existing string, so it is not a modifier.


    A Smarty plug-in is created by defining a PHP function called smarty_ *type* _
    *name*(), where type is either function, modifier, or block. In our case, since
    the plug-in is called geturl, the function is called smarty_function_geturl().


    ■**Tip** There are other plug-in types available, such as output filters (which
    modify template output after it has been generated), compiler functions (which
    change the behavior of the template compiler), pre and post filters (which modify
    template source prior to or immediately after compilation), and resources (which
    load templates from a source other than the defined template directory). These
    could be the subject of their own book, so I can’t cover them all here, but this
    section will at least give you a good idea of how to implement your own function
    plug-ins.


    All plug-ins should be stored in one of the registered Smarty plug-in directories.
    Smarty comes with its own set of plug-ins, and in Chapter 2 we created our own
    directory in which to store custom plug-ins (./include/Templater/plugins). The
    filename of plug-ins follows the


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch06CMP2 11/13/07 7:56 PM Page 177


    C H A P T E R 6 ■ S T Y L I N G T H E W E B A P P L I C AT I O N


    **177**


    format *type*. *name*.php, so in our case the file is named function.geturl.php.
    Smarty will automatically load the plug-in as soon as we try to access it in a
    template.


    The code for the geturl plug-in is shown in Listing 6-4\. It should be written
    to


    ./include/Templater/plugins/function.geturl.php.


    **Listing 6-4.** *The Smarty geturl Plug-In That Uses the Zend_Controller URL
    Helper* *(function.geturl.php)*


    <?php


    function smarty_function_geturl($params, $smarty)


    {


    $action = isset($params[''action'']) ? $params[''action''] : null;


    $controller = isset($params[''controller'']) ? $params[''controller''] : null;
    $helper = Zend_Controller_Action_HelperBroker::getStaticHelper(''url'');


    $request = Zend_Controller_Front::getInstance()->getRequest();


    $url = rtrim($request->getBaseUrl(), ''/'') . ''/'';


    $url .= $helper->simple($action, $controller);


    return $url;


    }


    ?>


    All function plug-ins in Smarty retrieve an array of parameters as the first argument
    and the Smarty object as the second argument. The array of parameters is generated
    using the arguments specified when calling the function. In other words, calling
    the geturl function using {geturl action=''login'' controller=''account''} will
    result in the $params array being the same as if you used the following PHP code:


    <?php


    $params = array(


    ''action'' => ''login'',


    ''controller'' => ''account''


    );


    ?>


    The function must do its own initialization and checking of the specified parameters.
    This is why the code in Listing 6-4 checks for the existence of the action and
    controller parameters in the first two lines of the function.


    Next the Url helper and the current request are retrieved using the provided functions.


    You will notice that the code we use to generate the actual URL is almost identical
    to that in the CustomControllerAction class.


    Finally, the URL is returned to the template, meaning it is output directly. This
    allows us to use it inside forms and hyperlinks (such as <form action="{geturl
    …}">).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch06CMP2 11/13/07 7:56 PM Page 178


    **178**


    C H A P T E R 6 ■ S T Y L I N G T H E W E B A P P L I C AT I O N


    ■**Tip** The function in Listing 6-4 returns the generated URL so it is output
    directly to the template. You may prefer to write it to a variable in your template
    so you can reuse the URL as required. The convention for this in Smarty is to
    pass an argument called assign, whose value is then used as the variable name.


    For instance, you could call the function using {geturl action=''login'' controller=''account''


    assign=''myUrl''}. By including $smarty->assign($params[''assign''], $url) in
    the plug-in instead of returning the value, you can then access $myUrl from within
    your template. Typically you would check for the existence of assign and output
    the value normally if it is not specified.


    Now, if you need to link to another controller action within a template, you should
    be using the {geturl} plug-in. This may be a normal hyperlink, or it may be a
    form action.


