  trans: "\n### 3. 用于统计列数的代码需要放在显示缩略图的循环开始处的 PHP 代码块内。请按如下方式修改代码：\n\n```\n    ';\n\
    \    }\n    // 循环开始时，此值不再为 true\n    $firstRow = false;\n    ?>\n```\n\n由于递增运算符（`++`）位于\
    \ `$pos` 之后，其值在被 `1` 递增之前先被列数除。循环首次运行时余数为 `0`，但 `$firstRow` 为 `true`，因此条件语句不成立。然而，在条件语句之后，`$firstRow`\
    \ 被重置为 `false`。在后续循环迭代中，每当余数为 `0` 时，条件语句会关闭当前表格行并开始新的一行。\n\n### 4. 如果没有更多记录了，你需要检查表格底部是否存在未完成的行。在现有的\
    \ `do...while` 循环之后添加一个 `while` 循环。在 MySQLi 版本中，代码如下所示：\n\n```\n    fetch_assoc());\n\
    \    while ($pos++ % COLS) {\n        echo '&nbsp;';\n    }\n    ?>\n```\n\n新代码在\
    \ PDO 版本中完全相同。唯一的区别在于前一行使用的是 `$result->fetch()` 而不是 `$result->fetch_assoc()`。\n\
    \n第二个循环会持续递增 `$pos`，只要 `$pos++ % COLS` 产生余数（被解释为 `true`），就会插入一个空单元格。\n\n**注意** 这个第二个循环并非嵌套在第一个循环内部。它只在第一个循环结束后才运行。\n\
    \n### 5. 保存页面并在浏览器中重新加载。画廊顶部单行的缩略图现在应该整齐地两两排列，如图 14-4 所示。\n\n![../images/332054_4_En_14_Chapter/332054_4_En_14_Fig4_HTML.jpg](img/332054_4_En_14_Fig4_HTML.jpg)\n\
    \n**图 14-4.** 缩略图现在排列成整齐的列\n\n尝试更改 `COLS` 的值并重新加载页面。由于页面仅为两列设计，主图像可能会发生偏移，但你可以看到通过仅更改一个数字就能轻松控制每行的单元格数量。你可以将代码与\
    \ `gallery_mysqli_06.php` 或 `gallery_pdo_06.php` 进行对照。\n\n## 对长记录集进行分页\n\n八张缩略图的网格在画廊中相当合适，但如果你有\
    \ 28 张或 48 张呢？答案是限制每页显示的结果数量，然后构建一个导航系统，让你可以在结果集中前后翻页。你在使用搜索引擎时已经无数次见过这种技术；现在你将学习如何自己构建它。该任务可以分为以下两个阶段：\n\
    \n1.  选择要显示的子记录集\n2.  创建用于翻页浏览子集的导航链接\n\n尽管这两个阶段都需要应用一些条件逻辑，但实现起来相对容易。保持冷静，你就能轻松掌握。\n\
    \n## 选择子记录集\n\n限制每页的结果数量很简单——只需在 SQL 查询中添加 `LIMIT` 关键字，如下所示：\n\n```\nSELECT filename,\
    \ caption FROM images LIMIT startPosition, maximum\n```\n\n`LIMIT` 关键字后面可以跟一个或两个数字。如果只使用一个数字，它设置的是要检索的最大记录数。这很有用，但不适用于分页系统。为此，你需要使用两个数字：第一个数字指示从哪条记录开始，第二个数字规定要检索的最大记录数。MySQL\
    \ 从 0 开始计数记录，因此要显示前六张图片，你需要以下 SQL：\n\n```\nSELECT filename, caption FROM images\
    \ LIMIT 0, 6\n```\n\n要显示下一组，SQL 需要更改为：\n\n```\nSELECT filename, caption FROM images\
    \ LIMIT 6, 6\n```\n\n`images` 表中只有八条记录，但第二个数字只是一个最大值，因此这会检索第 7 和第 8 条记录。\n\n要构建导航系统，你需要一种生成这些数字的方法。第二个数字从不改变，所以我们定义一个名为\
    \ `SHOWMAX` 的常量。生成第一个数字（称之为 `$startRecord`）也非常容易。从 0 开始为页面编号，并将第二个数字乘以当前页码。因此，如果你将当前页面称为\
    \ `$curPage`，公式如下：\n\n```\n$startRecord = $curPage * SHOWMAX;\n```\n\n而对于 SQL，则变成：\n\
    \n```\nSELECT filename, caption FROM images LIMIT $startRecord, SHOWMAX\n```\n\
    \n如果 `$curPage` 为 0，则 `$startRecord` 也为 0（0 × 6），但当 `$curPage` 增加到 1 时，`$startRecord`\
    \ 变为 6（1 × 6），依此类推。\n\n由于 `images` 表中只有八条记录，你需要一种找出总记录数的方法，以防止导航系统检索到空结果集。在上一章中，你使用了\
    \ MySQLi 的 `num_rows` 属性和 PDO 的 `rowCount()`。然而，这次这行不通，因为你想知道的是总记录数，而不是*当前*结果集中的记录数。答案是使用\
    \ SQL 的 `COUNT()` 函数，如下所示：\n\n```\nSELECT COUNT(*) FROM images\n```\n\n当与星号结合使用时，`COUNT()`\
    \ 会获取表中的总记录数。因此，要构建导航系统，你需要同时运行两个 SQL 查询：一个用于查找总记录数，另一个用于检索所需的子集。这些是简单查询，因此结果几乎是即时的。\n\
    \n稍后我会处理导航链接。让我们先从限制第一页上的缩略图数量开始。\n\n## PHP 解法 14-4：显示子记录集\n\n本 PHP 解法展示了如何选择子记录集，为创建用于更长记录集翻页的导航系统做准备。它还演示了如何显示当前选择的编号以及总记录数。\n\
    \n继续使用之前的同一个文件。或者，使用 `gallery_mysqli_06.php` 或 `gallery_pdo_06.php`。\n\n### 1.\
    \ 定义 `SHOWMAX` 和用于查找表中总记录数的 SQL 查询。按如下方式修改页面顶部的代码（新代码以粗体显示）：\n\n```\n    // 初始化水平循环变量\n\
    \    $pos = 0;\n    $firstRow = true;\n    // 设置最大记录数\n    define('SHOWMAX', 6);\n\
    \    $conn = dbConnect('read');\n    // 准备获取总记录数的 SQL\n    $getTotal = 'SELECT\
    \ COUNT(*) FROM images';\n```\n\n### 2. 现在你需要运行新的 SQL 查询。该代码紧接在上一步的代码之后，但根据 MySQL\
    \ 连接类型的不同而有所不同。对于 MySQLi，使用以下代码：\n\n```\n    // 提交查询并将结果存储为 $totalPix\n    $total\
    \ = $conn->query($getTotal);\n    $totalPix = $total->fetch_row()[0];\n```\n\n\
    这会提交查询，然后使用 `fetch_row()` 方法，该方法从 `MySQLi_Result` 对象中获取单行作为索引数组。结果中只有一列，因此我们可以通过在调用\
    \ `fetch_row()` 后添加方括号 `[0]` 来使用数组解引用获取 `images` 表中的总记录数。\n\n对于 PDO，使用以下代码：\n\n\
    ```\n    // 提交查询并将结果存储为 $totalPix\n    $total = $conn->query($getTotal);\n   \
