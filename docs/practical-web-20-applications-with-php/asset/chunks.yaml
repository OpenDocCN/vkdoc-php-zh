    **Selecting Objects in the Document Object Model**


    There are several functions available in Prototype for selecting elements in the
    Document Object Model (DOM). I recommend that you use the Prototype functions
    wherever possible instead of methods you may be more used to using (such as document.getElementById()),
    since they are simpler, they work across different browsers, and they provide
    you with extra functionality (as you will shortly see).


    **The $() Function**


    The $() function is used to select an element from the Document Object Model (DOM)—in
    other words, it selects an element on your HTML page. This function is extremely
    useful and may be one of the most commonly used functions in your JavaScript development.


    Essentially, $() is a replacement for using document.getElementById(), except
    that it will also do the following:


    • Return an array of elements if you pass in multiple arguments (each returned
    element corresponds to the argument position; that is, the 0 element corresponds
    to the first argument).


    • Extend the returned element(s) with extra Prototype functionality (which we
    will cover in this chapter).


    Because of this second point, you should always use $() (or one of the other Prototype
    element selectors we will look at shortly) to select elements in your JavaScript
    code when you are using Prototype. This will give you the full range of functionality
    that Prototype provides.


    Listing 5-1 shows several examples of selecting elements with the $() function.
    Note that you can pass in an element’s ID or you can pass in the element directly
    (which effectively will just add the extra Prototype functionality to the element).


