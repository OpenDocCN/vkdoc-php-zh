  这允许您将 SQL 查询分散到多行，以提高可读性。唯一不允许出现空格的地方是在函数名和左括号之间。以下写法会报错：


  `SELECT COUNT (*) FROM images`  /* 错误示例 */


  需要消除空格，像这样：


  `SELECT COUNT(*) FROM images`  /* 正确示例 */


  正如您可能从这些示例中推断出的那样，您可以通过将注释放在 `/*` 和 `*/` 之间来向 SQL 查询添加注释。


