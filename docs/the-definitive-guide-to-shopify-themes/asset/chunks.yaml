  trans: "\n### 产品列表的不同呈现方式\n\n如前所述，集合页面设计的主要目标之一是让顾客能够有效了解当前集合中的产品范围，同时还能在不深入产品页面的情况下直接比较特定产品。\n\
    \n让顾客实现这一目标的最佳方式往往取决于所售产品的类型以及顾客所处的场景。一个经典的例子是：在“网格”视图（例如示例主题当前的产品列表方式）与“列表”视图（每行仅显示一个产品）之间做出选择。\n\
    \n传统观点认为，网格视图在以下情况下最为适用：\n\n- 产品的外观比产品信息更重要。\n- 所展示的产品之间视觉差异明显。\n- 顾客不太可能对展示的产品进行直接比较。\n\
    - 顾客更倾向于浏览，而非寻找特定产品。\n\n由此推论，列表视图在以下情况下则更为适宜：\n\n- 产品的信息比产品外观更重要。\n- 所展示的产品视觉上相似或完全相同。\n\
    - 顾客可能想要对展示的产品进行比较。\n- 顾客很可能在寻找特定产品。\n\n第一种场景的一个典型例子是服装店的“新品”集合。该集合很可能包含完全不同类型的服装（围巾、帽子和夹克），顾客可能在毫无特定目标的情况下随意浏览。一般来说，那些产品外观至关重要的店铺（如服装店）更倾向于使用网格视图（见图\
    \ 6-13）。\n\n![A437216_1_En_6_Fig13_HTML.jpg](img/A437216_1_En_6_Fig13_HTML.jpg)\n\
    \n图 6-13  \n时尚店铺及其他产品视觉元素突出的店铺常使用网格视图\n\n相反的案例是电子产品商店中的“液晶电视”列表。所有电视机看起来都相当相似——重要的是规格参数（尺寸、对比度和功能），而且顾客很可能想要比较两种或多种选择。当产品细节更为重要时，更倾向于使用列表视图（见图\
    \ 6-14）。\n\n![A437216_1_En_6_Fig14_HTML.jpg](img/A437216_1_En_6_Fig14_HTML.jpg)\n\
    \n图 6-14  \n拥有大量技术信息或产品比较尤为重要的店铺常使用列表视图\n\n电商网站提供在这两种视图之间切换的功能相当普遍。添加此类功能会增加额外的工作量，但在以下情况下会很有用：\n\
    \n- 你无法确定所设计的主题将面向哪些产品类型（在构建供多位商家使用的主题时很常见）。\n- 你有一些产品集合更适合网格视图，而另一些则更适合列表视图。\n\
    - 你拥有大型产品集合，顾客可能希望先用网格视图直观地缩小选择范围，再通过列表视图对挑选出的产品进行比较。\n\n我一直主张保持界面简洁并降低用户的认知负担，所以如果你认为集合页面仅凭网格视图或列表视图就能胜任其功能，我会建议你坚持单一视图。如果你确实觉得需要提供视图选择功能，务必添加主题选项（见第\
    \ 8 章），以便店主能够独立开启或关闭每种视图，并设置默认视图类型。\n\n你还需要花些时间思考：根据不同的视图类型，你所展示给顾客的信息可能会发生怎样的变化。如果考虑经典场景——网格视图主要用于浏览，那么“顶层”信息（如产品外观、标题和价格）可能就足以让用户判断是否要进一步了解。列表视图通常信息密度更高，以便顾客能够从集合页面进行更全面的比较（见图\
    \ 6-15）。\n\n![A437216_1_En_6_Fig15_HTML.jpg](img/A437216_1_En_6_Fig15_HTML.jpg)\n\
    \n图 6-15  \nKershaw 刀具网站在网格视图中仅显示产品图片、标题和价格\n\n切换到列表视图后，会展示更详细的信息，如组件材质和刀片规格。这使得比较变得更加容易，尽管列表视图中产品图片的尺寸使得同时比较两个以上产品时略显困难。\n"
- fmt: '#### Adding Alternative Views to the Example Theme


    Working on the basis that we''d like to give the users of the example theme a
    choice of view, let''s see how we''d go about adding a list view to our collection
    page to complement the existing grid view. To do this, we''re going to use Shopify''s
    alternate templates functionality, discussed in the previous chapter.


    We start by moving all the existing code inside `templates/collection.liquid`
    to a snippet (`snippets/collection-view.liquid`). We need to do this because we
    want to share much of this code between the grid and list views—the sorting, filtering,
    pagination, and general layout of the page will be the same for both views and
    we''ll want to avoid duplicating code whenever possible. Once that''s done, we
    can include the snippet from a new version of `templates/collection.liquid` (see
    Listing [6-7](#A437216_1_En_6_Chapter.html#Par95)). This template will be used
    whenever the collection URL includes a `?view=grid` parameter, or when no view
    parameter is specified. The default collection template (`templates/collection.liquid`)
    includes the collection snippet and specifies that we should use the grid view.


    ```

    {%- include ''collection-view'' with ''grid'' -%}

    Listing 6-7

    The Grid View

    ```


    The alternate collection template below (`templates/collections.list.liquid`)
    will be rendered whenever the collection URL includes a `?view=list` parameter
    (see Listing [6-8](#A437216_1_En_6_Chapter.html#Par97)).


    ```

    {%- include ''collection-view'' with ''list'' -%}

    Listing 6-8

    The ?view=list Parameter

    ```


    If you haven''t seen it before, the `with` keyword in the `{% include %}` Liquid
    tag allows us to pass an argument to the included snippet. Inside that snippet,
    a Liquid variable named `collection-view` will be available, containing the type
    of view we want to render.


    Inside the `collection-view.liquid` snippet, the code remains the same as the
    original collection template, with two key changes. Underneath the collection
    sorting `<select>` element, we add a second `<select>` to handle the changing
    views (see Listing [6-9](#A437216_1_En_6_Chapter.html#Par100)). This is inserted
    in `snippets/collection-view.liquid` between the existing sorting select dropdown
    and the "Update" form submit button. Then, the code around the output of the product
    loop (see Listing [6-10](#A437216_1_En_6_Chapter.html#Par101)) checks the value
    of `collection-view` to render the appropriate product snippet—either the `product.liquid`
    snippet used previously for the grid view, or a new `product-list.liquid` snippet
    that renders a product in a single horizontal row (see Listing [6-11](#A437216_1_En_6_Chapter.html#Par102)).


    ```

    View as...


    Grid

    List


    Listing 6-9

    Code for the New View Select Dropdown

    ```


    ```

    ...

    {%- paginate collection.products by 12 -%}


    {%- if collection-view == ''grid'' -%}

    {%- for product in collection.products -%}

    {%- include ''product'' -%}

    {%- endfor -%}

    {%- else  -%}

    {%- for product in collection.products -%}

    {%- include ''product-list'' -%}

    {%- endfor -%}

    {%- endif -%}

    ...

    Listing 6-10

    Updated Code for the Product Loop

    ```


    ```

    {{ product.title | escape }}

    {{ product.vendor | escape }}


    {{ product.price | money }}


    Listing 6-11

    The New snippets/product-list.liquid Snippet

    ```


    Figure [6-16](#A437216_1_En_6_Chapter.html#Fig16) shows the result, with a new
    view selection dropdown in the left column and products rendered in the new list
    style on the right.


    ![A437216_1_En_6_Fig16_HTML.jpg](A437216_1_En_6_Fig16_HTML.jpg)


    Figure 6-16


    The collection page can now be displayed in a simple list view


    #### Adding Category-Level Filtering


    We''ve now implemented pagination, sorting, and view management on our collection
    pages. The last bit of functionality to add is filtering—a way for customers to
    be able to narrow down a range of products to just those they''re interested in.


    More than any of the other work we''ve done so far on the collection page, product
    filters are the most use-case specific. Depending on the product range in question,
    different filtering strategies and methods for grouping different filters together
    are called for. A store selling wine may have thousands of products and need to
    let customers filter on various combinations of vintage, country of origin, or
    grape type. A site selling a limited range of prepackaged meals, on the other
    hand, may only need to offer filtering on a single dimension (breakfast, lunch,
    or dinner) at any one time.


    Most stores will need to have some notion of "category-level" filtering, a high-level
    way of starting to narrow down the product range to something a customer is interested
    in. As discussed earlier, this level of filtering is achieved in Shopify through
    collections. Adding category-level filtering on a collections page can be as simple
    as adding a list of links to each collection on your store, which is what I''ve
    implemented for the example theme in Listing [6-12](#A437216_1_En_6_Chapter.html#Par107).
    This code has been added to `snippets/collection-view.liquid`, underneath the
    sorting and view controls.


    ![A437216_1_En_6_Fig17_HTML.jpg](A437216_1_En_6_Fig17_HTML.jpg)


    Figure 6-17


    Category filters appear as a simple list of links in the left column. Only one
    category can be selected at any one time


    ```

    ...

    Update


    Category


    {%- for collection_option in collections -%}


    {%- if collection.handle == collection_option.handle -%}

    {{ collection_option.title | escape }}

    {%- else -%}


    {{ collection_option.title | escape }}


    {%- endif -%}


    {%- endfor -%}


    ...

    Listing 6-12

    Addition of a Straightforward Category (Collection)-Level Filter

    ```


    This simple approach lets customers easily navigate through each of the collections
    on the store by iterating through all collections and rendering a link to the
    collection page for each one. Note that when generating the URL to each collection,
    we include the current view and sort parameters to maintain a consistent experience
    when moving from collection to collection. Conversely, we don''t include current
    pagination information, as it seems optimal from a user experience experience
    to move back to the first page as we completely change the visible category.


    One potential issue with this straightforward approach is that storeowners don''t
    have any control over the list of collections displayed, or the order in which
    they appear. We will remedy this at the end of the chapter, but for now let''s
    move on to the next level of filtering functionality.'
