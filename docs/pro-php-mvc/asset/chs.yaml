  \ _getValue($key)\n{\n    $data = Registry::get($this->getDefaultKey());\n    if\
  \ (isset($data[$key]))\n    {\n        return $data[$key];\n    }\n    return \"\
  \";\n}\n```\n\n`_getKey()` 方法简单地从语言构造中提取提供的存储键。`_setValue()` 方法提供了可从任何地方访问的存储解决方案。过去，我们使用\
  \ `Registry` 类来存储类实例，但其美妙之处在于我们也可以存储普通对象和数组。此方法检索数据数组（如果不存在则默认为空数组），并设置提供的 `$key`/`$value`。然后将数据数组存回注册中心。最后，`_getValue()`\
  \ 方法查询存储的数据数组，以获取与提供的 `$key` 匹配的值。\n\n创建这些方法后，我们可以查看最终的模板构造，从清单 15-10 中所示的 set 构造开始。\n\
  \n***清单 15-10.*** `set()` 处理程序\n\n```php\npublic function set($key, $value)\n{\n\
  \    if (StringMethods::indexOf($value, \"\\$_text\") > -1)\n    {\n        $first\
  \ = StringMethods::indexOf($value, \"\\\"\");\n        $last = StringMethods::lastIndexOf($value,\
  \ \"\\\"\");\n        $value = stripslashes(substr($value, $first + 1, ($last -\
  \ $first) - 1));\n    }\n    if (is_array($key))\n    {\n        $key = $this->_getKey($key);\n\
  \    }\n    $this->_setValue($key, $value);\n}\n```\n\n`set()` 处理程序有两个有趣之处。首先，它是我们在任何模板实现中使用的第一个公有构造处理程序。这是因为我们希望共享存储不仅可以用于模板文件内部，还可以在应用程序的控制器和操作中使用。\n\
  \n`set()` 方法有趣的第二个原因是它将值字符串从类似于 `$_text = \"foo\";` 的形式修改为类似于 `foo` 的形式。这是因为 `Template`\
  \ 类解析模板文件中文本节点的方式。如果你回顾一下 `Template->_script()` 方法，你会看到我们首先做的事情之一就是将纯文本节点转换为直接将其添加到\
  \ `$_text` 数组的代码。这是预期的行为，我们需要在这种边缘情况下还原。\n\n我们通过删除第一个 `\"` 字符之前的所有内容以及最后一个 `\"`\
  \ 字符之后的所有内容来实现这一点。这给了我们原始数据，即我们想要存储的内容。\n\n接下来，我们处理 `prepend()` 和 `append()` 处理程序，如清单\
  \ 15-11 所示。\n\n***清单 15-11.*** `prepend()` 和 `append()` 处理程序\n\n```php\npublic function\
  \ append($key, $value)\n{\n    if (is_array($key))\n    {\n        $key = $this->_getKey($key);\n\
  \    }\n    $previous = $this->_getValue($key);\n    $this->set($key, $previous.$value);\n\
  }\n\npublic function prepend($key, $value)\n{\n    if (is_array($key))\n    {\n\
  \        $key = $this->_getKey($key);\n    }\n    $previous = $this->_getValue($key);\n\
  \    $this->set($key, $value.$previous);\n}\n```\n\n与 `set()` 处理程序一样，这些处理程序方法也是公有的。它们也允许提供字符串或节点树作为\
  \ `$key`。如果提供了节点树，将使用 `_getKey()` 方法提取所需的存储键。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
- "# 第 15 章 ■ 搜索\n\n最后一个新的模板构造是 yield 构造，如清单 15-12 所示。\n\n***清单 15-12.*** `yield()`\
  \ 处理程序\n\n```php\npublic function yield($tree, $content)\n{\n    $key = trim($tree[\"\
  raw\"]);\n    $value = addslashes($this->_getValue($key));\n    return \"\\$_text[]\
  \ = \\\"{$value}\\\";\";\n}\n```\n\n`yield()` 处理程序是所有新构造中最简单的，其功能与标准实现中的 `_literal()`\
  \ 处理程序方法基本相同。\n\n■ **注意** 记得调整 `View` 类以使用这个新的 `Template\\Implementation\\Extended`\
  \ 类，否则你将无法使用新的构造。\n\n### 搜索\n\n完成上述工作后，添加搜索页面将变得容易得多。我们已经有登录页面，现在可以使用刚刚添加到扩展模板实现中的\
  \ partial 模板渲染。\n\n目标很简单：我们应该为应用程序添加一致的导航，使登录用户可以访问注销/设置/个人资料，未登录用户可以访问登录/注册/搜索。我们首先在新视图文件中生成导航链接，如清单\
  \ 15-13 所示。\n\n***清单 15-13.*** `application/views/nagivation.html`\n\n```html\n\
  <a href=\"/\" > home</a>\n\n{if (isset($user))}\n<a href = \"/users/profile.html\"\
  \ > profile</a>\n<a href = \"/users/settings.html\" > settings</a>\n<a href = \"\
  /users/logout.html\" > logout</a>\n{/if}\n{else}\n<a href = \"/users/register.html\"\
  \ > register</a>\n<a href = \"/users/login.html\" > login</a>\n{/else}\n```\n\n\
  逻辑很简单：如果模板有 `$user` 变量，则用户已登录，我们应该显示备用链接。你可能想知道这个变量在哪里设置，那么让我们回顾一下登录系统的工作原理。\n\n\
  用户输入他们的电子邮件地址和密码。这些字段然后提交给 `login()` 操作，该操作从数据库请求用户行。如果返回了一行，则该行将被序列化并存储在会话中。\n\n\
