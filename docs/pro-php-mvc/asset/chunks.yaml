    protected function _setValue($key, $value)


    {


    if (!empty($key))


    {


    $default = $this- > getDefaultKey();


    $data = Registry::get($default, array());


    $data[$key] = $value;


    Registry::set($default, $data);


    }


    }


    protected function _getValue($key)


    {


    $data = Registry::get($this- >getDefaultKey());


    if (isset($data[$key]))


    {


    return $data[$key];


    }


    return "";


    }


    The _getKey() method simply extracts the provided storage key from the language
    constructs. The _setValue() method offers the solution to storage that can be
    accessed from everywhere. In the past, we have used the Registry class to store
    class instances, but the beauty of this is that we can also store plain objects
    and arrays. This method retrieves the data array (or defaults with a blank array)
    and sets the $key/$value provided. It then stores the data array back in the registry.
    Finally, the _getValue() method queries the stored data array for the value matching
    the provided $key.


    With these methods created, we can look at the final template constructs, beginning
    with the set construct shown in Listing 15-10.


    ***Listing 15-10.*** The set() Handler


