    \            [1] => 1\n        )\n)\n```\n\n## 方案 7-10. 流\n\n**问题**\n\n文件可能并不总是位于本地文件系统，也可能存在其他类型的数据，这些数据可以使用加载文件所提供的基本功能集来消费。这些功能可以包括读取、写入和定位操作。\n\
    \n**解决方案**\n\n在 PHP 4.3 版本中引入了流的概念。流使开发者能够使用 URL 风格协议从多种不同系统读取和写入数据。甚至可以注册自定义的流包装器，以便使用\
    \ `fopen()`、`fread()` 和 `fwrite()` 函数访问自己的数据。\n\n除了从本地硬盘读取文件，您还可以使用 `file_get_contents()`\
    \ 从 URL 读取数据。\n\n`file_get_contents()` 函数是将本地或远程文件的内容读入字符串的首选方法，前提是文件内容足够小，可以放入内存。这可以是返回\
