- fmt: "### PHP Solution 6-6: Renaming duplicate files\n\nThis PHP solution improves\
    \ the `Upload` class by adding the option to insert a number before the filename\
    \ extension of an uploaded file to avoid overwriting an existing file of the same\
    \ name. By default, this option is turned on.\n\nContinue working with the same\
    \ class definition file as before. Alternatively, use `Upload_04.php` in the `ch06/PhpSolutions/File`\
    \ folder.\n\nRenaming duplicate files needs to be optional, so add a new property\
    \ to the list at the top of the class definition:\n\n`protected $renameDuplicates;`\n\
    \nRather than create a public method to set the value of this property, let’s\
    \ make it an optional argument to the `upload()` method. Amend the method definition\
    \ like this:\n\n```\npublic function upload( $renameDuplicates = true ) {\n  \
    \  $this->renameDuplicates = $renameDuplicates;\n    $uploaded = current($_FILES);\n\
    \    if ($this->checkFile($uploaded)) {\n        $this->moveFile($uploaded);\n\
    \    }\n}\n```\n\nAs explained in the previous PHP solution, you can make an argument\
    \ optional by assigning it a value in the function (method) definition. This automatically\
    \ sets the `$renameDuplicates` property to `true` unless you pass `false` as an\
    \ argument to the `upload()` method.\n\nAll the code for renaming duplicate files\
    \ needs to be added to the `checkName()` method, which you created in the previous\
    \ PHP solution. Add the following code just before the method’s closing curly\
    \ brace:\n\n```\nif ($this->renameDuplicates) {\n    $name = isset($this->newName)\
    \ ? $this->newName : $file['name'];\n    $existing = scandir($this->destination);\n\
    \    if (in_array($name, $existing)) {\n        // rename file\n    }\n}\n```\n\
    \nThe conditional statement checks whether the `$renameDuplicates` property is\
    \ `true` or `false`. The code inside the braces is executed only if it’s `true`.\n\
    \nThe first line of code inside the conditional block uses the ternary operator\
    \ to set the value of `$name`. This is the same technique used in the `moveFile()`\
    \ method. If the `$newName` property has a value, that value is assigned to `$name`.\
    \ Otherwise, the original name is used.\n\nThe next line uses the `scandir()`\
    \ function, which returns an array of all the files and folders in a directory.\
    \ The argument passed to `scandir()` is the upload folder, so `$existing` contains\
    \ an array of files already in that folder.\n\nThe conditional statement on the\
    \ next line passes `$name` to the `in_array()` function to determine if the `$existing`\
    \ array contains a file with the same name. If there’s no match, nothing remains\
    \ to be done.\n\nIf `$name` is found in the `$existing` array, a new name needs\
    \ to be generated. Add the following code under the “rename file” comment inside\
    \ the nested conditional statement:\n\n```\n// rename file\n$basename = pathinfo($name,\
    \ PATHINFO_FILENAME);\n$extension = pathinfo($name, PATHINFO_EXTENSION);\n$i =\
    \ 1;\ndo {\n    $this->newName = $basename . '_' . $i++;\n    if (!empty($extension))\
    \ {\n        $this->newName .= \".$extension\";\n    }\n} while (in_array($this->newName,\
    \ $existing));\n```\n\nIn the previous PHP solution, we used `pathinfo()` to get\
    \ the filename extension. This time, you need to get both the file’s base name\
    \ and the extension. You need to get the extension again because a suffix might\
    \ have been appended to the filename if the file is of a type that’s not trusted.\n\
    \nTo get the base name, the second argument passed to `pathinfo()` is `PATHINFO_FILENAME`.\
    \ Now that we’ve got both the base name and the extension stored in separate variables,\
    \ it’s easy to build a new name by inserting a number between the base name and\
    \ the extension.\n\nA counter variable, `$i`, is initialized at 1, and then a\
    \ `do . . . while` loop builds the new name from `$basename`, an underscore, and\
    \ the counter `$i`, which is incremented each time the loop runs. The conditional\
    \ statement adds a dot and the extension if `$extension` isn’t an empty string.\
    \ The loop’s condition keeps checking if the new name is in the `$existing` array.\n\
    \n**Note**  \nSee “Using loops with while and do . . . while” in [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html)\
    \ for an explanation of how the loop works.\n\nLet’s say you’re uploading a file\
    \ called `menu.jpg` and there’s already a file with the same name in the upload\
    \ folder. The loop rebuilds the name as `menu_1.jpg` and assigns the result to\
    \ the `$newName` property. The loop’s condition then uses `in_array()` to check\
    \ whether `menu_1.jpg` is in the `$existing` array.\n\nIf `menu_1.jpg` already\
    \ exists, the loop continues, but the increment operator (`++`) has increased\
    \ `$i` to 2, so `$newName` becomes `menu_2.jpg`, which is again checked by `in_array()`.\
    \ The loop continues until `in_array()` no longer finds a match. Whatever value\
    \ remains in the `$newName` property is used as the new filename.\n\nSave `Upload.php`\
    \ and test the revised class in `file_upload.php`. Start by passing `false` as\
    \ an argument to the `upload()` method, like this:\n\n`$loader->upload( false\
    \ );`\n\nUpload the same file several times. You should receive a message that\
    \ the upload has been successful, but when you check the contents of the `upload_test`\
    \ folder, there should be only one copy of the file. It has been overwritten each\
    \ time.\n\nRemove the argument from the call to `upload()`:\n\n`$loader->upload();`\n\
    \nSave `file_upload.php` and repeat the test, uploading the same file several\
    \ times. Each time you upload the file, you should see a message that it has been\
    \ renamed.\n\nTry it also with a file that has an extension in the `$notTrusted`\
    \ array. By default, the number is inserted before the suffix. If you pass `false`\
    \ as an argument to `allowAllTypes()`, no suffix is added, and the number is inserted\
    \ before the file’s normal extension.\n\nCheck the results by inspecting the contents\
    \ of the `upload_test` folder. You should see something similar to Figure [6-9](#A978-1-4842-0635-5_6_Chapter.html#Fig9).\n\
    \nYou can check your code, if necessary, against `Upload_05.php` in the `ch06/PhpSolutions/File`\
    \ folder.\n\n![A978-1-4842-0635-5_6_Fig9_HTML.jpg](A978-1-4842-0635-5_6_Fig9_HTML.jpg)\n\
    \n*Figure 6-9.*  \nThe class removes spaces from filenames and prevents files\
    \ from being overwritten\n\n### Uploading Multiple Files\n\nYou now have a flexible\
    \ class for file uploads, but it can handle only one file at a time. Adding the\
    \ `multiple` attribute to the file field’s `<input>` tag permits the selection\
    \ of multiple files in an HTML5-compliant browser. Older browsers also support\
    \ multiple uploads if you add extra file fields to your form.\n\nThe final stage\
    \ in building the `Upload` class is to adapt it to handle multiple files. To understand\
    \ how the code works, you need to see what happens to the `$_FILES` array when\
    \ a form allows for multiple uploads."
  raw: '#### PHP Solution 6-6: Renaming duplicate files


    This PHP solution improves the `Upload` class by adding the option to insert a
    number before the filename extension of an uploaded file to avoid overwriting
    an existing file of the same name. By default, this option is turned on.


    Continue working with the same class definition file as before. Alternatively,
    use `Upload_04.php` in the `ch06/PhpSolutions/File` folder.


    Renaming duplicate files needs to be optional, so add a new property to the list
    at the top of the class definition:


    `protected $renameDuplicates;`


    Rather than create a public method to set the value of this property, let’s make
    it an optional argument to the `upload()` method. Amend the method definition
    like this:


    `public function upload(` `$renameDuplicates = true` `) {`


    `$this->renameDuplicates = $renameDuplicates;`


    `$uploaded = current($_FILES);`


    `if ($this->checkFile($uploaded)) {`


    `$this->moveFile($uploaded);`


    `}`


    `}`


    As explained in the previous PHP solution, you can make an argument optional by
    assigning it a value in the function (method) definition. This automatically sets
    the `$renameDuplicates` property to `true` unless you pass `false` as an argument
    to the `upload()` method.


    All the code for renaming duplicate files needs to be added to the `checkName()`
    method, which you created in the previous PHP solution. Add the following code
    just before the method’s closing curly brace:


    `if ($this->renameDuplicates) {`


    `$name = isset($this->newName) ? $this->newName : $file[''name''];`


    `$existing = scandir($this->destination);`


    `if (in_array($name, $existing)) {`


    `// rename file`


    `}`


    `}`


    The conditional statement checks whether the `$renameDuplicates` property is `true`
    or `false`. The code inside the braces is executed only if it’s `true`.


    The first line of code inside the conditional block uses the ternary operator
    to set the value of `$name`. This is the same technique used in the `moveFile()`
    method. If the `$newName` property has a value, that value is assigned to `$name`.
    Otherwise, the original name is used.


    The next line uses the `scandir()` function, which returns an array of all the
    files and folders in a directory. The argument passed to `scandir()` is the upload`_`folder,
    so `$existing` contains an array of files already in that folder.


    The conditional statement on the next line passes `$name` to the `in_array()`
    function to determine if the `$existing` array contains a file with the same name.
    If there’s no match, nothing remains to be done.


    If `$name` is found the `$existing` array, a new name needs to be generated. Add
    the following code under the “rename file” comment inside the nested conditional
    statement:


    `// rename file`


    `$basename = pathinfo($name, PATHINFO_FILENAME);`


    `$extension = pathinfo($name, PATHINFO_EXTENSION);`


    `$i = 1;`


    `do {`


    `$this->newName = $basename . ''_'' . $i++;`


    `if (!empty($extension)) {`


    `$this->newName .= ".$extension";`


    `}`


    `} while (in_array($this->newName, $existing));`


    In the previous PHP solution, we used `pathinfo()` to get the filename extension.
    This time, you need to get both the file’s base name and the extension. You need
    to get the extension again because a suffix might have been appended to the filename
    if the file is of a type that’s not trusted.


    To get the base name, the second argument passed to `pathinfo()` is `PATHINFO_FILENAME`.
    Now that we’ve got both the base name and the extension stored in separate variables,
    it’s easy to build a new name by inserting a number between the base name and
    the extension.


    A counter variable, `$i`, is initialized at 1, and then a `do . . . while` loop
    builds the new name from `$basename`, an underscore, and the counter `$i`, which
    is incremented each time the loop runs. The conditional statement adds a dot and
    the extension if `$extension` isn’t an empty string. The loop’s condition keeps
    checking if the new name is in the `$existing` array.


    Note


    See “Using loops with while and do . . . while” in [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html)
    for an explanation of how the loop works.


    Let’s say you’re uploading a file called `menu.jpg` and there’s already a file
    with the same name in the upload folder. The loop rebuilds the name as `menu_1.jpg`
    and assigns the result to the `$newName` property. The loop’s condition then uses
    `in_array()` to check whether `menu_1.jpg` is in the `$existing` array.


    If `menu_1.jpg` already exists, the loop continues, but the increment operator
    (`++`) has increased `$i` to 2, so `$newName` becomes `menu_2.jpg`, which is again
    checked by `in_array()`. The loop continues until `in_array()` no longer finds
    a match. Whatever value remains in the `$newName` property is used as the new
    filename.


    Save `Upload.php` and test the revised class in `file_upload.php`. Start by passing
    `false` as an argument to the `upload()` method, like this:


    `$loader->upload(` `false` `);`


    Upload the same file several times. You should receive a message that the upload
    has been successful, but when you check the contents of the `upload_test` folder,
    there should be only one copy of the file. It has been overwritten each time.
      Remove the argument from the call to `upload()`:


    `$loader->upload();`


    Save `file_upload.php` and repeat the test, uploading the same file several times.
    Each time you upload the file, you should see a message that it has been renamed.
      Try it also with a file that has an extension in the `$notTrusted` array. By
    default, the number is inserted before the suffix. If you pass `false` as an argument
    to `allowAllTypes()`, no suffix is added, and the number is inserted before the
    file’s normal extension.   Check the results by inspecting the contents of the
    `upload_test` folder. You should see something similar to Figure [6-9](#A978-1-4842-0635-5_6_Chapter.html#Fig9).


    You can check your code, if necessary, against `Upload_05.php` in the `ch06/PhpSolutions/File`
    folder.


    ![A978-1-4842-0635-5_6_Fig9_HTML.jpg](A978-1-4842-0635-5_6_Fig9_HTML.jpg)


    Figure 6-9.


    The class removes spaces from filenames and prevents files from being overwritten


    ## Uploading Multiple Files


    You now have a flexible class for file uploads, but it can handle only one file
    at a time. Adding the `multiple` attribute to the file field’s `<input>` tag permits
    the selection of multiple files in an HTML5-compliant browser. Older browsers
    also support multiple uploads if you add extra file fields to your form.


    The final stage in building the `Upload` class is to adapt it to handle multiple
    files. To understand how the code works, you need to see what happens to the `$_FILES`
    array when a form allows for multiple uploads.'
  trans: "\n### PHP 方案 6-6：重命名重复文件\n\n此 PHP 方案对 `Upload` 类进行了改进，增加了在上传文件的扩展名前插入数字的选项，以避免覆盖已存在的同名文件。默认情况下，此选项已启用。\n\
    \n继续使用之前的同一个类定义文件进行操作。或者，使用 `ch06/PhpSolutions/File` 文件夹中的 `Upload_04.php` 文件。\n\
    \n重命名重复文件需要成为可选功能，因此请在类定义顶部的属性列表中添加一个新属性：\n\n`protected $renameDuplicates;`\n\n\
    我们并不创建公共方法来设置该属性的值，而是将其作为 `upload()` 方法的一个可选参数。像这样修改方法定义：\n\n```\npublic function\
