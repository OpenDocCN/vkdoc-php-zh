    ## Reviewing the Four Essential SQL Commands


    Now that you have seen `SELECT`, `INSERT`, `UPDATE`, and `DELETE` in action, let’s
    review the basic syntax for MySQL and MariaDB. This is not an exhaustive listing,
    but it concentrates on the most important options, including some that have not
    yet been covered.


    I have used the same typographic conventions as the MySQL online manual at [`http://dev.mysql.com/doc/refman/5.6/en`](http://dev.mysql.com/doc/refman/5.6/en)
    (which you may also want to consult).


    *   Anything in uppercase is an SQL command.

    *   Expressions in square brackets are optional.

    *   Lowercase italics represent variable input.

    *   A vertical pipe (`|`) separates alternatives.


    Although some expressions are optional, they must appear in the order listed.
    For example, in a `SELECT` query, `WHERE`, `ORDER BY`, and `LIMIT` are all optional,
    but `LIMIT` can never come before `WHERE` or `ORDER BY`.'
  trans: "\n然而，如果出现错误，你需要在屏幕上显示该消息。但如果有人将查询字符串改为无效数字，`$article_id` 将被设置为 `0`，因此显示更新表单就没有意义了。请在开头的\
    \ `<form>` 标签之前，立即添加以下条件语句：\n\n```\n<p><a href=\"blog_list_pdo.php\">返回文章列表</a></p>\n\
    \n<?php if (isset($error)) {\necho \"<p class='warning'>错误：$error</p>\";\n}\n\
    if($article_id == 0) { ?>\n<p class=\"warning\">无效请求：记录不存在。</p>\n<?php } else\
    \ { ?>\n<form name=\"form1\" method=\"post\" action=\"\">\n```\n\n第一个条件语句用于显示\
    \ PDO 预处理语句报告的任何错误消息。第二个条件语句将更新表单包裹在 `else` 块中，这样当 `$article_id` 为 `0` 时，表单将被隐藏。\n\
    \n在结束的 `</form>` 标签之后，立即添加 `else` 块的闭合花括号，如下所示：\n\n```\n</form>\n<?php } ?>\n\
    </body>\n```\n\n如果 `$article_id` 不为 `0`，则你知道 `$title` 和 `$article` 也已存在，并可以在更新表单中显示，而无需进一步测试。但是，你需要将文本值传递给\
    \ `htmlentities()` 以避免显示引号时出现问题。在标题输入字段的 `value` 属性中显示 `$title`，如下所示：\n\n```\n\
    <input name=\"title\" type=\"text\" id=\"title\" value=\"<?= htmlentities($title);\
    \ ?>\" >\n```\n\n对文章文本区域执行相同操作。由于文本区域没有 `value` 属性，因此代码需要放在开头的 `<textarea>` 和结束的\
    \ `</textarea>` 标签之间，如下所示：\n\n```\n<textarea name=\"article\" id=\"article\"><?=\
    \ htmlentities($article);?></textarea>\n```\n\n确保 PHP 标签与 `<textarea>` 标签之间没有空格。否则，在更新的记录中会出现不必要的空格。\n\
    \n`UPDATE` 命令需要知道要更改记录的主键。你需要将主键存储在一个隐藏字段中，以便它与其他详细信息一起在 `$_POST` 数组中提交。由于隐藏字段不会在屏幕上显示，以下代码可以放在表单内的任何位置：\n\
    \n```\n<input name=\"article_id\" type=\"hidden\" value=\"<?= $article_id; ?>\"\
    >\n```\n\n保存更新页面，并通过在浏览器中加载 `blog_list_pdo.php` 并选择某个记录的 `编辑` 链接来测试它。记录的内容应显示在表单字段中，如图\
    \ 13-3 所示。\n\n“更新条目”按钮目前没有功能。只需确保所有内容正确显示，并确认主键已在隐藏字段中注册即可。如有必要，你可对照 `blog_update_pdo_02.php`\
    \ 检查你的代码。\n\n提交按钮的 `name` 属性是 `update`，因此所有更新处理代码都需要放在一个条件语句中，该语句检查 `$_POST` 数组中是否存在\
    \ `update`。请将以下（以**粗体**突出显示的）代码放在步骤 1 中重定向页面的代码之上：\n\n```\n$stmt->fetch();\n}\n\
    // 如果表单已提交，则更新记录\nif (isset($_POST['update'])) {\n// 准备更新查询\n$sql = 'UPDATE blog\
    \ SET title = ?, article = ?\nWHERE article_id = ?';\n$stmt = $conn->prepare($sql);\n\
    // 通过传递变量数组来执行查询\n$done = $stmt->execute([$_POST['title'], $_POST['article'],\n\
    $_POST['article_id']]);\n}\n// 成功或 $_GET['article_id'] 未定义时重定向页面\nif ($done ||\
    \ !isset($_GET['article_id'])) {\n```\n\n同样，SQL 查询使用问号作为占位符，这些占位符的值将由变量提供。这一次，有三个占位符，因此需要将对应的变量作为数组传递给\
    \ `execute()` 方法。不用说，数组的顺序必须与占位符的顺序一致。\n\n如果 `UPDATE` 查询成功，`execute()` 方法返回 `true`，从而重置\
    \ `$done` 的值。你不能在此处使用 `rowCount()` 方法来获取受影响的行数，因为如果点击“更新条目”按钮但未做任何更改，它将返回 `0`。你会注意到我们已经在重定向脚本中的条件里添加了\
    \ `$done ||`。这确保了无论更新成功还是有人试图直接访问该页面，页面都会被重定向。\n\n保存 `blog_update_pdo.php` 并通过加载\
    \ `blog_list_pdo.php` 进行测试，选择一个 `编辑` 链接，并对显示的记录进行更改。当你点击“更新条目”时，应该会被带回 `blog_list_pdo.php`。你可以通过再次点击同一个\
    \ `编辑` 链接来验证你的更改是否已生效。如有必要，对照 `blog_update_pdo_03.php` 检查你的代码。\n\n### 删除记录\n\n\
    删除数据库中的记录与更新记录类似。基本的 `DELETE` 命令如下所示：\n\n`DELETE FROM 表名 WHERE 条件`\n\n`DELETE`\
    \ 命令的潜在危险在于它是不可逆的。一旦删除了记录，就无法恢复——它将永久消失。没有回收站或垃圾桶可以将其找回。更糟糕的是，`WHERE` 子句是可选的。如果省略它，表中的每一条记录都将被不可撤销地发送到网络虚无之中。因此，较好的做法是显示待删除记录的详细信息，并让用户确认或取消该过程（见图\
    \ 13-4）。\n\n![A978-1-4842-0635-5_13_Fig4_HTML.jpg](img/A978-1-4842-0635-5_13_Fig4_HTML.jpg)\n\
    \n图 13-4. 删除记录不可逆，因此在继续之前需要获得确认\n\n构建和编写删除页面的脚本与更新页面几乎完全相同，因此我将不提供逐步说明。不过，以下是主要要点：\n\
    \n-   检索所选记录的详细信息。\n-   显示足够的详细信息（例如标题），以便用户确认已选择正确的记录。\n-   为“确认删除”和“取消”按钮赋予不同的\
    \ `name` 属性，并使用每个 `name` 属性配合 `isset()` 来控制执行的操作。\n-   不要将整个表单包裹在 `else` 块中，而是使用条件语句来隐藏“确认删除”按钮和隐藏字段。\n\
    \n以下是为每种方法执行删除的代码。\n\n对于 MySQLi：\n\n```\nif (isset($_POST['delete'])) {\n    $sql\
    \ = 'DELETE FROM blog WHERE article_id = ?';\n    if ($stmt->prepare($sql)) {\n\
    \        $stmt->bind_param('i', $_POST['article_id']);\n        $stmt->execute();\n\
    \        if ($stmt->affected_rows > 0) {\n            $deleted = true;\n     \
    \   } else {\n            $error = '删除记录时出现问题。';\n        }\n    }\n}\n```\n\n\
    对于 PDO：\n\n```\nif (isset($_POST['delete'])) {\n    $sql = 'DELETE FROM blog WHERE\
    \ article_id = ?';\n    $stmt = $conn->prepare($sql);\n    $stmt->execute([$_POST['article_id']]);\n\
    \    // 获取受影响的行数\n    $deleted = $stmt->rowCount();\n    if (!$deleted) {\n  \
    \      $error = '删除记录时出现问题。';\n    }\n}\n```\n\n你可以在 `ch13` 文件夹中的 `blog_delete_mysqli.php`\
    \ 和 `blog_delete_pdo.php` 中找到完成的代码。要测试删除脚本，请将相应文件复制到 `admin` 文件夹。\n\n## 回顾四大基本\
    \ SQL 命令\n\n既然你已经了解了 `SELECT`、`INSERT`、`UPDATE` 和 `DELETE` 的实际用法，现在我们来回顾一下 MySQL\
    \ 和 MariaDB 的基本语法。这不是一个详尽的列表，而是侧重于最重要的选项，包括一些尚未涉及的选项。\n\n我使用了与 MySQL 在线手册（[`http://dev.mysql.com/doc/refman/5.6/en`](http://dev.mysql.com/doc/refman/5.6/en)）相同的排版惯例（你也可以参考该手册）。\n\
    \n-   大写字母表示 SQL 命令。\n-   方括号内的表达式是可选的。\n-   小写斜体表示变量输入。\n-   竖线（`|`）分隔选项。\n\n\
    尽管某些表达式是可选的，但它们必须按列出的顺序出现。例如，在 `SELECT` 查询中，`WHERE`、`ORDER BY` 和 `LIMIT` 都是可选的，但\
    \ `LIMIT` 绝不能出现在 `WHERE` 或 `ORDER BY` 之前。\n"
- fmt: '### SELECT


    `SELECT` is used for retrieving records from one or more tables. Its basic syntax
    is as follows:


    ```

    SELECT [DISTINCT] select_list

    FROM table_list

    [WHERE where_expression]

    [ORDER BY col_name | formula] [ASC | DESC]

    [LIMIT [skip_count,] show_count]

    ```


    The `DISTINCT` option tells the database you want to eliminate duplicate rows
    from the results.


    The `select_list` is a comma-separated list of columns that you want included
    in the result. To retrieve all columns, use an asterisk (`*`). If the same column
    name is used in more than one table, the references must be unambiguous, using
    the syntax `table_name.column_name`. Chapters 15 and 16 explain in detail about
    working with multiple tables.


    The `table_list` is a comma-separated list of tables from which the results are
    to be drawn. All tables that you want to be included in the results must be listed.


    The `WHERE` clause specifies search criteria, for example:


    ```

    WHERE quotations.family_name = authors.family_name

    WHERE article_id = 2

    ```


    `WHERE` expressions can use comparison, arithmetic, logical, and pattern-matching
    operators. The most important ones are listed in Table 13-2.


    Table 13-2. The main operators used in MySQL `WHERE` expressions


    | Comparison |   | Arithmetic |   |

    | --- | --- | --- | --- |

    | `<` | Less than | `+` | Addition |

    | `<=` | Less than or equal to | `-` | Subtraction |

    | `=` | Equal to | `*` | Multiplication |

    | `!=` | Not equal to | `/` | Division |

    | `<>` | Not equal to | `DIV` | Integer division |

    | `>` | Greater than | `%` | Modulus |

    | `>=` | Greater than or equal to |   |   |

    | `IN()` | Included in list |   |   |

    | `BETWEEN min AND max` | Between (and including two values) |   |   |

    | Logical |   | Pattern matching |   |

    | `AND` | Logical and | `LIKE` | Case-insensitive match |

    | `&&` | Logical and | `NOT LIKE` | Case-insensitive nonmatch |

    | `OR` | Logical or | `LIKE BINARY` | Case-sensitive match |

    | `&#124;&#124;` | Logical or (best avoided) | `NOT LIKE BINARY` | Case-sensitive
    nonmatch |


    Of the two operators that mean “not equal to,” `<>` is standard SQL. Not all databases
    support `!=`.


    `DIV` is the counterpart of the modulus operator. It produces the result of division
    as an integer with no fractional part, whereas modulus produces only the remainder.


    ```

    5 / 2        /* result 2.5 */

    5 DIV 2      /* result 2  */

    5 % 2        /* result 1  */

    ```


    I suggest you avoid using `||` because it’s actually used as the string concatenation
    operator in standard SQL. By not using it with MySQL, you avoid confusion if you
    ever work with a different relational database. To join strings, MySQL uses the
    `CONCAT()` function (see [http://dev.mysql.com/doc/refman/5.6/en/string-functions.html#function_concat](http://dev.mysql.com/doc/refman/5.6/en/string-functions.html#function_concat)).


    `IN()` evaluates a comma-separated list of values inside the parentheses and returns
    `true` if one or more of the values is found. Although `BETWEEN` is normally used
    with numbers, it also applies to strings. For instance, `BETWEEN ''a'' AND ''d''`
    returns `true` for a, b, c, and d (but not their uppercase equivalents). Both
    `IN()` and `BETWEEN` can be preceded by `NOT` to perform the opposite comparison.


    `LIKE`, `NOT LIKE`, and the related `BINARY` operators are used for text searches
    in combination with the following two wildcard characters:


    - `%`: matches any sequence of characters, or none.

    - `_` (an underscore): matches exactly one character.


    So, the following `WHERE` clause matches Dennis, Denise, and so on, but not Aiden:


    ```

    WHERE first_name LIKE ''den%''

    ```


    To match Aiden, put `%` at the front of the search pattern. Because `%` matches
    any sequence of characters, or none, `''%den%''` still matches Dennis and Denise.
    To search for a literal percentage sign or underscore, precede it with a backslash
    (`\%` or `\_`).


    Conditions are evaluated from left to right but can be grouped in parentheses
    if you want a particular set of conditions to be considered together.


    `ORDER BY` specifies the sort order of the results. This can be specified as a
    single column, a comma-separated list of columns, or an expression such as `RAND()`,
    which randomizes the order. The default sort order is ascending (a–z, 0–9), but
    you can specify `DESC` (descending) to reverse the order.


    `LIMIT` followed by one number stipulates the maximum number of records to return.
    If two numbers are given separated by a comma, the first tells the database how
    many rows to skip (see “Selecting a subset of records” in Chapter 12).


    See [http://dev.mysql.com/doc/refman/5.6/en/select.html](http://dev.mysql.com/doc/refman/5.6/en/select.html)
    for more details on `SELECT`.


    ### INSERT


    The `INSERT` command is used to add new records to a database. The general syntax
    is as follows:


    ```

    INSERT [INTO] table_name (column_names)

    VALUES (values)

    ```


    The word `INTO` is optional; it simply makes the command read a little more like
    human language. The column names and values are comma-delimited lists, and both
    must be in the same order. So, to insert the forecast for New York (blizzard),
    Detroit (smog), and Honolulu (sunny) into a weather database, this is how you
    would do it:


    ```

    INSERT INTO forecast (new_york, detroit, honolulu)

    VALUES (''blizzard'', ''smog'', ''sunny'')

    ```


    The reason for this syntax is to allow you to insert more than one record at a
    time. Each subsequent record is in a separate set of parentheses, with each set
    separated by a comma:


    ```

    INSERT numbers (x,y)

    VALUES (10,20),(20,30),(30,40),(40,50)

    ```


    You’ll use this multiple insert syntax in Chapter 16. Any columns omitted from
    an `INSERT` query are set to their default value. Never set an explicit value
    for the primary key where the column is set to `AUTO_INCREMENT`; leave the column
    name out of the `INSERT` statement.


    For more details, see [http://dev.mysql.com/doc/refman/5.6/en/insert.html](http://dev.mysql.com/doc/refman/5.6/en/insert.html).


    ### UPDATE


    This command is used to change existing records. The basic syntax looks like this:


    ```

    UPDATE table_name

    SET col_name = value [, col_name = value]

    [WHERE where_expression]

    ```


    The `WHERE` expression tells MySQL which record or records you want to update
    (or perhaps in the case of the following example, dream about):


    ```

    UPDATE sales SET q1_2015 = 25000

    WHERE title = ''PHP Solutions, Third Edition''

    ```


    See [http://dev.mysql.com/doc/refman/5.6/en/update.html](http://dev.mysql.com/doc/refman/5.6/en/update.html)
    for more details on `UPDATE`.


    ### DELETE


    `DELETE` can be used to delete single records, multiple records, or the entire
    contents of a table. The general syntax for deleting from a single table is as
    follows:


    ```

    DELETE FROM table_name [WHERE where_expression]

    ```


    Although phpMyAdmin prompts you for confirmation before deleting a record, databases
    take you at your word and perform the deletion immediately. `DELETE` is totally
    unforgiving—once the data is deleted, it is gone forever. The following query
    will delete all records from a table called `subscribers` where the date in `expiry_date`
    has already passed:


    ```

    DELETE FROM subscribers

    WHERE expiry_date < NOW()

    ```


    For more details, see [http://dev.mysql.com/doc/refman/5.6/en/delete.html](http://dev.mysql.com/doc/refman/5.6/en/delete.html).


    Caution


    Although the `WHERE` clause is optional in both `UPDATE` and `DELETE`, you should
    be aware that if you leave `WHERE` out, the entire table is affected. This means
    that a careless slip with either of these commands could result in every single
    record being identical—or wiped out.'
