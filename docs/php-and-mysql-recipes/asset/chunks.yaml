- fmt: "# Using MySQL Databases\n\n## Schema Information\n\n### Problem\n\nIn the\
    \ previous example the schema definition for the two tables were hard coded and\
    \ would need to be updated if there were any changes to the database. Would it\
    \ be possible to extract the schema information from the database?\n\n### Solution\n\
    \nThere is a special purpose database or schema in the MySQL database. This is\
    \ called `INFORMATION_SCHEMA` and it contains information about all the tables\
    \ and columns in any of the databases on the server. `INFORMATION_SCHEMA` is common\
    \ among many SQL92 database engines.\n\nThe commands `show databases;` and `show\
    \ tables;` that were used on the command line can also be used from the `Query()`\
    \ method of the `mysqli` class. These commands use the information in the `INFORMATION_SCHEMA`\
    \ to extract data about the system.\n\nThe command `show databases;` is equivalent\
    \ to this:\n\n```\nselect schema_name as `Database` from information_schema.schemata;\n\
    ```\n\nThe ticks around the alias `Database` are there because `database` is a\
    \ reserved word and it must be escaped to be used as a column name in the query.\n\
    \nIn a similar way we can write a statement to get all the tables in the database\
    \ called `music`. This will be equivalent to the following:\n\n```\nuse music;\n\
    Show tables;\n```\n\nUsing the information schema makes it possible to use this\
    \ from any location. You don't have to select a specific database before querying\
    \ this schema.\n\n```\nselect table_name from information_schema.tables where\
    \ table_schema='music';\n```\n\nAnd finally we can get the list of columns in\
    \ each of the tables by using this SQL statement:\n\n```\nselect column_name,\
    \ column_type from information_schema.columns where table_name='album';\n```\n\
    \n### How it Works\n\nWith this information we can now change the constructor\
    \ of the `music` class to query the database for the schema information.\n\n```php\n\
    <?php\n// 16_10.php\n\nclass music extends mysqli {\n    private $schema = [];\n\
    \n    function __construct() {\n        parent::__construct('127.0.0.1', 'php',\
    \ 'secret', 'music');\n        if ($this->connect_error) {\n            die(\"\
    Unable to connect to music\\n\");\n        }\n\n        $sql = \"select table_name\
    \ from information_schema.tables where table_schema='music';\";\n        $rs =\
    \ $this->Query($sql);\n        while ($table = $rs->fetch_assoc()) {\n       \
    \     $sql = \"select column_name, column_type from information_schema.columns\
    \ where table_name='{$table['table_name']}';\";\n            $rs1 = $this->query($sql);\n\
    \            while($col = $rs1->fetch_assoc()) {\n                $this->schema[$table['table_name']][$col['column_name']]\
    \ = $col['column_type'];\n            }\n            $rs1->close();\n        }\n\
    \        $rs->close();\n        print_r($this->schema);\n    }\n}\n\n$music =\
    \ new music();\n```\n\nThe `addArtist()` and `addAlbum()` methods are also refactored\
    \ to use the common schema definitions.\n\n```php\nif (sizeof($columns)) {\n \
