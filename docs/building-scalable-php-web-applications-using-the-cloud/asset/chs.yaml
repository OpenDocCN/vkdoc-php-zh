  \n在选择生产服务器时，出于后续将更明确的原因，我通常为数据库选择相当大的规格（因为它们更难复制），而为 Web 服务器选择低端到中端规格（因为我可以通过增加更多服务器来轻松扩展容量）。\n\
  \n## 3.2 登录并查看\n\n那么，你已经有了一台机器，但它在哪里，你如何访问它呢？\n\n点击仪表盘上的“网络”选项卡。它看起来应该像图 3-3。在“访问”下方有一个名为“SSH\
  \ 访问”的区域。这里包含了你需要输入到命令行中以进行登录的命令。使用你为节点创建的密码进行登录。\n\n![../images/487291_1_En_3_Chapter/487291_1_En_3_Fig3_HTML.jpg](img/487291_1_En_3_Fig3_HTML.jpg)\n\
  \n图 3-3\n\n网络选项卡\n\n### 命令行？那是什么？\n\n命令行是访问计算机的老式方法。早在漂亮的图形界面出现之前，人们就通过输入命令来与计算机交互。对于许多事情，*尤其是*与系统管理相关的任务，命令行仍然是管理系统的最佳方式。\n\
  \n如果你没有任何使用命令行的经验，别担心！本书并不假定你在这方面有专业知识，并会逐步引导你完成每个步骤。如果你只是想弄清楚如何*进入*命令行，以下是每种主要操作系统的操作方法：\n\
  \n* **Windows 10**：Windows 实际上拥有*两种*命令行系统：较旧的“命令提示符”（`cmd.exe`）和较新的 PowerShell。只需点击\
  \ Windows 图标并输入 `PowerShell` 即可开始。至少需要 2018 年 4 月更新才能无需额外设置即可运行这里的命令。\n\n* **MacOS\
  \ X**：每台 Mac 都带有一个名为“终端”的应用程序。你可以通过 Spotlight 搜索找到它，或者前往“应用程序”，然后进入“实用工具”中找到它。我建议你将它添加到\
  \ Dock 栏，因为你可能会经常使用它。\n\n* **Linux**：每个 Linux 发行版都安装有一个命令行程序，通常名为“终端”或“Bash 提示符”之类的。\n\
  \n当你第一次启动命令行时，它会显示一些文本，随后是一个闪烁的光标。现在你就可以开始输入命令了！\n\n如果你不熟悉 Linux，`ssh` 是一个非常方便的工具，它允许远程、安全地连接到你的服务器命令行。也就是说，你可以\
  \ `ssh` 进入你的机器，其工作方式就像你登录到控制台一样。此外，连接是加密的，所以你无需担心有人窃听你或窃取你的密码。`ssh` 在每个主流操作系统上都是默认安装的，所以你应该已经安装了它。如果你使用的是旧版\
  \ Windows，你可能需要下载一个单独的 `ssh` 应用程序，例如 `PuTTY`，可以从 [`www.putty.org`](http://www.putty.org)\
  \ 免费下载.\n\n要登录你的机器，只需打开一个命令行，并输入“SSH 访问”下列出的命令。它应该类似于 `ssh root@MY.IP.ADDRESS.HERE`，其中\
  \ `MY.IP.ADDRESS.HERE` 是你的 Linode 的 IP 地址。由于 `ssh` 之前没有见过这台计算机，它很可能会警告你无法确认主机的真实性，并询问你是否要继续连接。只需回答\
  \ `yes`。它只会在第一次询问你，因为 `ssh` 会记住远程计算机。然后，在输入密码时，输入你在设置机器时设置的密码。图 3-4 显示了这大概会是什么样子。\n\
  \n![../images/487291_1_En_3_Chapter/487291_1_En_3_Fig4_HTML.png](img/487291_1_En_3_Fig4_HTML.png)\n\
  \n图 3-4\n\n从命令行登录\n\n现在你已经成功登录到你的机器了！\n\n最后一行被称为“命令提示符”。它提供了关于你当前会话状态的基本信息。`root`\
  \ 是你的用户名。这是 Linux 上管理用户的名称。`li1125-199`（或者 `@` 符号后面的任何内容）是你的机器名称。最后，`~` 告诉你当前所在的目录（对于新程序员，“目录”是“文件夹”的旧称）。`~`\
  \ 表示用户的“家”目录。\n\n如果你不熟悉 Linux，有几个命令是值得了解的。\n\n\n\n*   `pwd`：代表“print working directory”（打印工作目录）。此命令会显示你当前所在的工作目录。如果你在首次登录时执行此命令，它应该会显示`/root`。Linux\
  \ 目录不以盘符开头，而是以斜杠（`/`）作为顶层目录。`/root` 是 root 用户的主目录。\n*   `mkdir`：代表“make directory”（创建目录）。此命令会在当前目录下创建一个新目录。\n\
  *   `cd`：代表“change directory”（切换目录）。如果后面跟一个目录名称，它会切换到该目录。如果直接输入命令而不带任何参数，它会带你回到你的主目录。命令`cd\
  \ /`会将你带到根目录（请注意，根目录指的是顶层目录，而非 root 用户的目录）。如果目录名称以斜杠开头，`cd`命令会将其视为从根目录开始的绝对路径。如果目录名称以波浪号（`~`）开头，`cd`命令会将其解释为相对于你的主目录的路径。否则，它会将该路径解释为相对于当前目录。\n\
  *   `ls`：代表“list”（列表），它会列出当前目录中的文件列表。要查看文件权限，请在命令后添加选项`-l`。要同时查看隐藏文件，请添加选项`-a`。因此，要*同时*查看隐藏文件和文件权限，请输入`ls\
  \ -l -a`。\n*   `nano`：Nano 是你易用的文本编辑器。如果你的工作职责包含运行机器，你还应该学习`vim`，因为它对你来说效率更高，但学习难度也更大。Nano\
  \ 易于使用，足以满足入门需求。如果你想在当前目录下创建一个名为`test.txt`的文件，请输入`nano test.txt`并开始输入。组合键 `control-o`\
  \ 可以保存（即输出）你的文件，`control-x` 可以退出。\n*   `systemctl`：此命令负责在包括 CentOS 在内的某些 Linux 发行版上启动和停止系统服务。你将在本章稍后部分了解如何使用它。\n\
  *   `logout`：此命令退出当前用户会话。你也可以通过输入`exit`或按 `control-d` 来实现。\n\n我鼓励你花些时间动手练习`mkdir`、`cd`、`ls`和`nano`这些命令。尝试创建一个新目录，进入该目录，并在其中创建一个新文件。然后，尝试注销，用`ssh`重新登录，找到你的文件并查看它。重复这个操作几次，直到你完全熟悉登录、注销、导航目录和编辑文件的过程。\n\
  \n当你熟练在主目录下创建文件和目录后，应该扩展范围，去查看其他目录。你还不要在那里编辑文件（主目录之外的文件可能对操作系统有重要意义），但四处看看是无害的。\n\
  \n要开始查看，请转到根目录（`cd /`）并查看（`ls`）。你会看到许多目录，其中大部分在 Linux 文件系统层次结构标准（参见 `www.pathname.com/fhs`）中都有说明。尽管文件系统层次结构标准是了解各目录用途的好资料，但它已不再被严格遵守，因此遇到一些偏差时不必惊讶。不过，简而言之，`/etc`\
  \ 包含服务器配置信息，`/home` 包含除 root 之外的用户的主目录，`/usr` 包含已安装的程序，`/opt` 包含定制程序和其他服务器特定项目，`/var`\
  \ 包含经常变化的信息（例如日志文件、缓存、队列等）。\n\n## 3.3 更新你的系统\n\n在系统启动并运行后，你应该做的第一件事就是用最新的升级包和安全包更新服务器。CentOS\
  \ 使用 `yum` 来管理系统软件安装。`yum` 能够简单安全地处理软件包的下载、安装、升级、移除和验证。当你要求 `yum` 安装或更新一个软件包时，它能聪明地在远程服务器上找到该软件包，验证其真实性，查找并安装该软件包所依赖的任何其他软件，并跟踪所有已安装的软件包及其文件。`yum`\
  \ 只能由 root 用户运行，但到目前为止，这是我们唯一可用的用户。\n\n当你拥有新服务器时，应该做的第一件事是将其所有已安装的软件包更新到最新版本。幸运的是，使用\
  \ `yum` 这非常简单。只需运行以下命令：\n\n```\nyum -y update\n```\n\n这通常会下载*非常大量*的软件包——这完全没问题。CentOS\
  \ 持续修复发行版中每个软件的错误和安全问题，因此这些更新可能会变得很大。然而，CentOS 也非常小心地确保其包含的修订版不包含任何不兼容的升级。因此，运行\
  \ `yum update` 可以使你保持最新状态，并且你不太可能因为运行它而意外破坏任何东西。\n\n\n\n## 3.4 运行 Web 服务器\n\n默认情况下，Linode\
  \ 附带的 Linux 发行版只安装绝对必要的组件。这其实很棒，因为维护安全的主要方法之一就是只安装你确实需要的东西，从而最大限度地减少你暴露在外的潜在漏洞数量。然而，默认情况下\
  \ Web 服务器并未安装。\n\n如果你在浏览器中输入 Web 服务器的 IP 地址，浏览器会回应无法连接到该计算机。这是因为 Web 服务器尚未运行。要安装\
  \ Web 服务器，我们将使用 CentOS 的 `yum` 包管理器。本书介绍的是 Apache Web 服务器，它在系统中被称为 `httpd`，当然也有其他可选项。\n\
  \n要安装 `httpd`，请运行：\n\n```\nyum -y install httpd\n```\n\n运行 `yum` 时，你位于哪个目录并不重要。无论你从哪里运行它，它都会将包安装到正确的目录。`yum`\
  \ 会列出你想要安装的包，以及运行它所需的其他包。\n\n现在你的 Web 服务器已安装，但它并未*运行*。要运行 Web 服务器，只需输入：\n\n```\n\
  systemctl start httpd\n```\n\n这个命令同样不在意你当前位于哪个目录。\n\n现在你的 Web 服务器正在运行，但你可能仍然无法连接到它。这是因为\
  \ CentOS 默认会运行一个防火墙。因此，我们需要在防火墙中打开一些端口，以允许从外部访问 Web 服务器。\n\n为此，请执行以下命令：\n\n```\n\
  firewall-cmd --add-service http\nfirewall-cmd --add-service http –permanent\nfirewall-cmd\
  \ --add-service https\nfirewall-cmd --add-service https --permanent\n```\n\n这些命令会将\
  \ HTTP 和 HTTPS 都添加到远程用户可以连接的服务列表中。`firewall-cmd` 用于管理你的防火墙。添加一个服务（`--add-service`）允许访问该服务。不带\
  \ `--permanent` 标志运行会修改当前的防火墙。添加 `--permanent` 标志则告知防火墙在服务器重启后仍保留该规则。要同时启用当前规则并使其在服务器重启后仍然有效，你需要执行这两条命令。\n\
  \n你可以通过执行以下命令来查看允许的服务列表：\n\n```\nfirewall-cmd --list-services\n```\n\n当这些命令执行完毕后，你只需在浏览器中访问你的服务器\
  \ IP 地址，就应该能看到一个如图 3-5 所示的测试页面。\n\n![../images/487291_1_En_3_Chapter/487291_1_En_3_Fig5_HTML.jpg](img/487291_1_En_3_Fig5_HTML.jpg)\n\
  \n图 3-5\n\nWeb 服务器的测试页面\n\n这意味着你的 Web 服务器已按预期启动并运行——恭喜你！\n\n然而，还有一个问题需要考虑。尽管服务器当前正在运行，但如果你重启机器，它启动时并不会自动运行。为了确保该服务也能在启动时运行，请执行以下命令：\n\
  \n```\nsystemctl enable httpd\n```\n\n为了测试，请前往你的节点控制面板，在页面右上角应该显示“运行中”。如果你点击它，会显示一个“重启”按钮。点击该按钮重启你的机器。在服务重启过程中，测试网页可能会在某时刻消失。但是，一旦重启的进度条完成，测试网页应该会再次可用。\n\
  \n重启会导致你登出，因为计算机关机了。不过，你可以立即重新登录，然后你会回到 root 用户的主目录。\n\n## 3.5 搭建你自己的网页\n\n如果网站没有内容，我们看到的测试页面会自动生成。要为网站创建内容，你只需将内容放到正确的位置即可。\n\
  \n进入 `/var` 目录（输入 `cd /var`）并查看一下（输入 `ls`）。你会看到其中一个目录是 `www`。这是 Web 服务器提供数据服务的默认目录（即网页目录）。进入\
  \ `www` 目录（输入 `cd www`）并查看一下（输入 `ls`）。`html` 目录就是你放置 HTML 和 PHP 文件的地方。进入该目录（输入 `cd\
  \ html`）。为了确认你身处正确的位置，输入 `pwd`，它应该会告诉你当前位于 `/var/www/html`。\n\n现在你已经在 `/var/www/html`\
  \ 目录中，你需要创建供 Web 服务提供的页面。使用 `nano index.html` 命令创建 `index.html` 文件，并在其中输入一些内容（如果你不知道写什么，就输入\
  \ `hello there` 或类似的内容）。使用 control-o 保存文件，使用 control-x 退出编辑器。一旦你创建了文件，你就可以访问你的 IP\
  \ 地址，该文件将作为默认页面显示。\n\n\n\n## 3.6 安装 PHP 7\n\n由于这是一本关于 Web *应用*开发的书籍，我们的目标不仅仅是制作网页。我们需要启用服务器端脚本功能。因此，我们需要安装我们正在开发的应用程序框架，以及使其能够在\
  \ Apache 下运行的插件。本书聚焦于 PHP 7。遗憾的是，CentOS 7 仅提供 PHP 5。因此，我们需要从另一个仓库加载 PHP 7。\n\n两个常用的软件包仓库是\
  \ EPEL（企业版 Linux 的附加软件包）仓库和 Remi Collet 的仓库。为 `yum` 加载新仓库以便其查找是非常容易的。每个仓库都有一个 `yum`\
  \ 可以加载的 URL，这样 `yum` 就可以在将来的安装命令中使用它。要启用这些仓库，只需输入以下命令（缩进行应与上一行放在同一行）：\n\n```\nyum\
  \ install -y\nhttps://dl.fedoraproject.org/pub/epel/epel-release-latest-7.noarch.rpm\n\
  yum install -y\nhttps://rpms.remirepo.net/enterprise/remi-release-7.rpm\n```\n\n\
  现在我们可以安装 PHP 7 了。为此，只需输入：\n\n```\nyum install -y php74\n```\n\n这将安装基础的 PHP 7 软件包及其依赖项，但不会安装其他额外内容。安装完成后，在\
  \ `/var/www/html` 目录下，运行命令 `nano test.php` 并输入以下脚本：\n\n![../images/487291_1_En_3_Chapter/487291_1_En_3_Figc_HTML.png](img/487291_1_En_3_Figc_HTML.png)\n\
  \n完成后，使用 `control-o` 保存文件，并使用 `control-x` 退出。现在，您可以直接使用命令行运行该文件。输入命令：\n\n```\nphp74\
  \ test.php\n```\n\n它将运行您文件中的代码，并输出字符串 `This is a test`，与代码所示一致。\n\n现在，打开您的网页浏览器，访问\
  \ `http://MY.IP.ADDRESS.HERE/test.php`。请注意，它并*没有*将其作为 PHP 脚本来运行。这是因为 Apache 和 PHP\
  \ 尚未连接在一起。\n\n我们现在需要将 PHP *连接* 到 Apache。这可以通过 FastCGI 进程管理器实现（FastCGI 是允许 PHP 和\
  \ Apache 进行通信的协议）。您可以使用以下命令安装它：\n\n```\nyum install -y php74-php-fpm\n```\n\n这是一个独立的进程，因此也需要启用并启动它。\n\
  \n```\nsystemctl enable php74-php-fpm\nsystemctl start php74-php-fpm\n```\n\n现在，我们必须配置\
  \ Apache，将 `.php` 文件连接到 PHP 7 解释器。使用 `nano` 创建一个名为 `/etc/httpd/conf.d/php.conf`\
  \ 的文件，并输入以下文本（缩进行应与上一行放在*同一行*）。\n\n![../images/487291_1_En_3_Chapter/487291_1_En_3_Fig6_HTML.png](img/487291_1_En_3_Fig6_HTML.png)\n\
  \n图 3-6  \nPHP 配置文件\n\n这段代码告诉 Apache 将所有以 `.php` 结尾的文件的请求转发（称为代理）到我们之前安装的 FastCGI\
  \ 服务。最后一行告诉 Apache 可以将 `index.php` 视为目录索引，这意味着如果某人省略了文件名，并且存在 `index.php` 文件，它可以提供该文件作为该目录的默认页面。\n\
  \n现在，为了使所有配置生效，请重启 Apache：\n\n```\nsystemctl restart httpd\n```\n\n现在，您应该能够通过浏览器访问该文件，并且它应该通过\
  \ PHP 7 进行处理了。太好了！\n\n虽然 PHP 已安装，但您只安装了基础包。要查看所有可安装的扩展，请运行命令 `yum search php74`。这将显示所有可用\
  \ PHP 包的列表，每个包都可以使用 `yum install -y` 安装。\n\n## 3.7 关闭 SELinux\n\nSELinux 是 Linux\
  \ 的一项安全增强功能。虽然理论上 SELinux 可以大大降低服务器上的安全风险，但在实践中，它对于实际使用来说过于笨重。对于构建良好的网站，通常不需要 SELinux；而对于构建拙劣的网站，它的保护又不够。相反，它最终会带来巨大的系统管理难题，而收益甚微。如果您运行\
  \ SELinux，最可能的结果是您会花费数天时间试图弄清楚为什么某些功能无法工作，最后却发现 SELinux 无缘无故地阻止了某些基本操作。\n\n要关闭 SELinux，请编辑文件\
  \ `/etc/selinux/config`，将写着 `SELINUX=enforcing` 的那一行改为 `SELINUX=permissive`。\n\n\
  重启您的机器。当它重新启动后，登录并执行命令 `getenforce`。它应该显示 `Permissive`。现在您就一切就绪了。\n\n请注意，如果您不禁用\
  \ SELinux，本书中构建的应用程序将无法运行，因为 SELinux 会阻止应用程序连接到数据库。\n\n## 3.8 为开发设置用户\n\n到目前为止，我们一直使用\
  \ root 用户（即超级用户）。虽然很多操作都需要 root 用户，但出于安全原因，通常您应该尽可能少地使用 root 用户。由于 root 用户有权执行任何操作，因此作为\
  \ root 用户很容易破坏安全防护机制，从而损害系统或意外允许未经授权的实体访问您的系统。\n\n因此，我们将创建一个非管理用户来执行大部分任务。该用户将被命名为\
  \ `fred`。要创建该用户，请输入以下命令：\n\n```\nuseradd fred\n```\n\n这将把 Fred 设置为系统上的一个用户，为他创建一个主目录，并分配给他一个用户\
  \ ID 和组 ID。现在，我们需要为 Fred 设置一个密码，输入以下命令：\n\n```\npasswd fred\n```\n\n系统将提示您输入密码，并要求您重复输入以确保输入正确。我们希望\
  \ Fred 能够在 `/var/www/html` 目录中添加和修改文件，因此我们需要授予他对这些文件的所有权。我们使用 `chown` 命令来执行此操作：\n\
  \n```\nchown -R fred /var/www/html\n```\n\n这告诉系统将 `/var/www/html` 目录及其下所有文件的所有者更改为\
  \ `fred`。现在，我们可以注销，或者打开一个新窗口，以 `fred` 的身份通过 `ssh` 重新登录到机器：\n\n```\nssh fred@MY.IP.ADDRESS.HERE\n\
  ```\n\n这将使我们进入 Fred 的主目录。现在我们可以像之前一样 `cd` 进入 `/var/www/html` 并修改文件，因为这些文件现在归 Fred\
  \ 所有。请注意，root 用户因为是超级用户，即使文件归 Fred 所有，也仍然可以修改这些文件。\n\n\n\n## 3.9 将文件传输到服务器\n\n如今，大多数人都不喜欢直接在服务器上编程。他们通常更倾向于在自己本机上编写程序，然后再传输到服务器上。为此，你需要一个支持\
  \ SFTP 协议的工具。SFTP 本质上就是基于 SSH 的 FTP。\n\n最简单且能跨 Windows、Macintosh 和 Linux 平台使用的 SFTP\
  \ 解决方案是 FileZilla（`www.filezilla-project.org`）。你可以使用普通版（免费）或专业版（付费）。使用 FileZilla\
  \ 时，安装完成后，只需打开它，点击“文件”，然后点击“站点管理器”。接着点击“新站点”按钮。\n\n按照图 3-7 所示填写此界面。在“主机”框中，输入你的\
  \ Linode 服务器的 IP 地址。在“协议”框中，选择 SFTP。将“登录类型”设置为“正常”，并将用户名设为 `fred`，密码设为你为 Fred 设置的密码。你还可以将站点名称改成容易记住的名字（我管我的叫“Linode\
  \ 虚拟服务器”）。\n\n![../images/487291_1_En_3_Chapter/487291_1_En_3_Fig7_HTML.jpg](img/487291_1_En_3_Fig7_HTML.jpg)\n\
  \n**图 3-7** 设置 FileZilla 进行连接\n\n完成后，点击“连接”按钮。\n\n第一次连接时，可能会弹出一个对话框，提示“未知主机密钥”。这很正常——这与当初首次通过\
  \ `ssh` 连接时的情况类似。软件只是从未见过这台服务器而已。勾选“始终信任此主机”复选框，然后点击“确定”。连接成功后，界面将类似于图 3-8。\n\n\
  ![../images/487291_1_En_3_Chapter/487291_1_En_3_Fig8_HTML.jpg](img/487291_1_En_3_Fig8_HTML.jpg)\n\
  \n**图 3-8** FileZilla 已连接至你的 Linode 服务器\n\nFileZilla 的操作界面分为两个窗格——左侧窗格是你的本地计算机，右侧窗格是远程计算机。它会显示每个窗格当前所查看的目录。你需要做的，就是将本地目录设置为你想要传输的文件所在位置，并将远程目录设置为你想要存放这些文件的位置（通常是\
  \ `/var/www/html`）。设置好这些目录后，下方两个窗格会列出实际的文件，你可以直接通过拖放来相互传输。\n\n作为练习，在你的本地计算机上创建几个简单的\
  \ PHP 文件，将它们传输到服务器上，并验证你可以通过 web 浏览器看到这些文件。\n\n### 编辑 `php.ini`\n\n![../images/487291_1_En_3_Chapter/487291_1_En_3_Figd_HTML.jpg](img/487291_1_En_3_Figd_HTML.jpg)\n\
  \n对于某些应用程序，你可能需要修改 `php.ini` 文件。我们安装的 PHP 7 版本将 `php.ini` 文件放在了 `/etc/opt/remi/php74/`\
  \ 目录下。但是，只有 root 用户才能访问此文件。\n\n如果你需要用 FileZilla 传输它，你需要使用 root 身份并输入 root 密码重新连接。你也可以通过\
  \ `ssh` 登录，直接用 `nano` 修改它。无论如何，修改此文件时务必小心。此外，修改文件后，请确保使用以下命令重启 PHP 进程：\n\n```\n\
  systemctl restart php74-php-fpm\n```\n\n这设置起来看似工作量很大。虽然还有更快的入门方法，但这种方式有几个好处。首先，你现在比大多数人都更了解所有这些组件是如何连接在一起的。其次，你拥有一个运行着\
  \ PHP 7 的 Web 服务器，而不是某个十年前的旧版本。最后，你拥有了所需的一切，而没有多余的东西，这有助于你保持 Web 服务器的安全。\n\n###\
  \ 其他需要安装的工具\n\n![../images/487291_1_En_3_Chapter/487291_1_En_3_Fige_HTML.jpg](img/487291_1_En_3_Fige_HTML.jpg)\n\
  \n就我个人而言，我喜欢让我的节点装满足够的工具。我使用 Linux 的时间比很多读者的年龄都长，因此我对大量的工具都相当熟悉。幸运的是，它们都很容易安装（但必须以\
  \ root 身份登录才能安装）。\n\n无论如何，以下是我经常使用的工具的安装命令：\n\n```\nyum install -y git\nyum install\
  \ -y screen\nyum install -y telnet\nyum install -y bind-utils\nyum install -y traceroute\n\
  yum install -y nmap\nyum install -y strace\nyum install -y perl\n```\n\n本书并非这些命令的入门教程，但它们值得你去探索研究。\n\
  \n"
- "# 创建一个简单的 Web 应用程序\n\n在本章中，我们将创建一个极其简单的 Web 应用程序，用于在后续章节中作为演示示例。目标是让一个完整的端到端应用程序能运行起来。\n\
  \n我们将要开发的应用程序只是一个留言簿，这样任何人都可以进来在留言簿上发布一条消息。\n\n\n\n\n## 4.1 设置数据库服务\n\n任何优秀的 Web\
  \ 应用程序都有数据库。我一直选择 PostgreSQL（[`www.postgresql.org`](http://www.postgresql.org)）。有传言说\
  \ PostgreSQL 很慢。这在 20 世纪 90 年代有一定道理。\n\n然而，从 PostgreSQL 7 开始，PostgreSQL 一直表现出色，并且每个新版本都变得更好。此外，PostgreSQL\
  \ 在处理复杂查询方面一贯表现优异，至今仍然如此。PostgreSQL 致力于无限制编程。例如，在 PostgreSQL 的文本列中，你可以在单行单列中存储多达\
  \ 4 GB 的数据——并且仍然可以对其进行排序。在许多数据库上，大部分时间都花在使数据匹配数据库的优选架构上。我发现，使用 PostgreSQL，数据库往往已经准备好适应你自己的数据架构。\n\
  \n虽然这不是一本关于 PostgreSQL 的书，但我们将讨论一些与节点集群相关的特性。\n\n要安装 PostgreSQL，只需以 root 身份执行以下操作（本节所有操作均应以\
  \ root 用户身份执行）：\n\n```bash\nyum install -y postgresql-server\n```\n\n这将安装 PostgreSQL\
  \ 所需的所有软件包。要设置初始数据库，请输入以下内容：\n\n```bash\npostgresql-setup initdb\n```\n\n这将创建 PostgreSQL\
  \ 运行所需的所有目录和文件。接下来，我们需要设置连接到 PostgreSQL 数据库的身份验证方法。PostgreSQL 将其数据和配置都存储在目录`/var/lib/pgsql/data`中。控制数据库访问的文件是`pg_hba.conf`。\n\
  \n编辑该文件（输入`nano /var/lib/pgsql/data/pg_hba.conf`），并在文件顶部添加以下两行：\n\n```\nlocal all\
  \ all trust\nhost all all all md5\n```\n\n第一行表示信任所有本地连接（即不通过网络）。因此，在命令行上直接处理数据库时，我们不需要密码。第二行表示任何人都可以使用适当的密码通过网络连接到数据库。这有点不安全（我们不希望任何人能够连接到我们的数据库），除非默认情况下数据库只监听本地地址`127.0.0.1`，所以目前你无法从外部连接。请确保保存文件然后退出编辑器。\n\
  \n请注意，即使采用了现有的限制措施（仅本地连接、防火墙等），许多人仍会认为上述配置过于暴露。这里的措施是为了平衡安全性和易学性。有关保护 PostgreSQL\
  \ 安全的更多信息，你应该阅读[`www.postgresql.org`](http://www.postgresql.org)上关于`pg_hba.conf`文件的文档。\n\
  \n现在是时候启动我们的数据库了。为此，请输入以下内容：\n\n```bash\nsystemctl enable postgresql\nsystemctl\
  \ start postgresql\n```\n\n你的数据库系统现在已启动并运行。你已经创建了数据库*系统*，但尚未创建数据库本身。不过，首先我们需要一个数据库用户。`createuser`命令创建一个新的数据库用户：\n\
  \n```bash\ncreateuser -U postgres -d -P gbuser\n```\n\n该命令以数据库管理员用户身份运行（`-U postgres`），并创建一个名为`gbuser`的新用户，该用户可以创建数据库（`-d`），并提示你为此新数据库用户设置密码（`-P`）。当提示时，将密码设置为你想要的任何内容，并记下来以便日后使用。在本书中需要用到的地方，我们将使用密码`mypassword`，但请注意，这在实际生产环境中是一个糟糕的密码。由于我们将命令行设置为`trust`，因此在命令行中使用时无需密码，但从应用程序连接时则需要密码。\n\
  \n要以该用户身份创建数据库，请键入：\n\n```bash\ncreatedb -U gbuser guestbookapp\n```\n\n这将为指定的数据库用户创建一个新数据库。现在，要创建表，我们需要登录到数据库。`psql`命令将为你提供一个与数据库交互的\
  \ SQL 会话。要使用它，只需键入：\n\n```bash\npsql -U gbuser guestbookapp\n```\n\n命令提示符将变为类似`guestbookapp=>`，表示你已进入数据库。要随时退出，可以键入`\\\
  q`。像许多系统管理命令一样，PostgreSQL 并不关心你在运行其命令时位于文件系统中的哪个位置。它正在与一个在其自有目录中运行的数据库服务进行通信。\n\n\
  现在我们已经连接到数据库，将使用以下命令创建一个表：\n\n```sql\ncreate table gb_entries(id serial primary\
  \ key, name text, email text, message text, created_at timestamp,\nhas_img bool\
  \ default false);\n```\n\n`id`字段的类型为`serial`，这是 PostgreSQL 的自动编号机制。要查看刚创建的表，请键入`\\\
  d gb_entries`。完成后，输入`\\q`退出数据库。\n\n\n\n\n## 4.2 PHP 代码\n\n在编写 PHP 代码之前，我们需要安装一些额外的\
  \ PHP 库，以便能够连接到数据库。使用以下命令安装它们：\n\n```\nyum install -y php74-php-pgsql php74-php-pdo\n\
  systemctl restart php74-php-fpm\n```\n\n我们的应用程序将很简单：\n\n*   一个文件用于保存配置信息和通用函数\n\
  *   一个文件用于显示留言簿条目列表\n*   一个文件用于显示单条留言簿条目\n*   一个文件用于录入新的留言簿条目\n*   一个 CSS 样式表\n\n\
  本书假定你了解一点 PHP 和 SQL 知识，但即使不了解，无论你熟悉哪种语言，代码也应该足够清晰易懂。因此，此处直接给出文件内容，不做过多注释。你可以在本章末尾找到包含代码的图示。\n\
  \n图 4-1 展示了其他文件会包含的通用函数。它有两个用于获取数据库连接的函数——一个用于获取只读连接，另一个用于获取读写连接。目前，它们都返回相同的连接（实际上都是读写连接），但随着我们进一步开发应用程序，我们将看到分离仅用于读取的连接和用于读取与写入的连接可以带来很多好处。这两个函数都简单地使用\
  \ `PDO`（PHP 数据对象）通过连接字符串获取数据库连接。请注意，这些连接字符串包含数据库密码。请务必将*这两个*连接字符串中的密码都更改为你之前为 `gbuser`\
  \ 数据库用户输入的密码。\n\n它还包含 `getHeader()` 和 `getFooter()` 函数，这样我们就不必编写过多的 HTML 代码。此外，`h()`\
  \ 作为 `htmlspecialchars()` 的简短版本被使用，以便我们可以获得更安全的输出。\n\n图 4-2 是列出数据库中所有条目的 PHP 脚本。这段代码简单地创建了一个数据库语句，执行它，然后遍历结果。\n\
  \n图 4-3 展示了如何从数据库中获取单条条目。同样，这里有一条准备好的 SQL 语句被执行，然后将结果显示在屏幕上。\n\n图 4-4 简单地展示了一个用于创建新留言簿条目的表单。该表单将其数据提交给\
  \ 图 4-5 中的程序。该程序根据输入的值创建一条新记录。然后，在执行 `SQL` 插入语句后，它将用户重定向回列表页面。\n\n最后，图 4-6 是一个静态\
  \ CSS 文件，为整个程序提供少量的样式。如 第 1 章 所述，如果你不想自己手动输入所有这些文件，可以从 GitHub 获取它们，地址如下：\n\n```\n\
  https://github.com/johnnyb/cloud-example-application\n```\n\n要在服务器上直接使用 git，你需要以\
  \ root 用户身份安装它，命令如下：\n\n```\nyum install -y git\n```\n\n在输入完所有程序后，将它们上传到你新服务器的 `/var/www/html`\
  \ 文件夹中。然后，在浏览器中导航到 `http://MY.IP.ADDRESS.HERE/list.php`，看看你的程序是否运行成功！如果失败，你可以通过以\
  \ root 用户身份登录并查看日志文件来检查 PHP-FPM 的错误日志，使用以下命令：\n\n```\ntail -200 /var/opt/remi/php74/log/php-fpm/error.log\n\
  ```\n\n这将显示 PHP 错误日志的最后 200 行。\n\n另一个可以获取有用信息的日志可以通过执行以下命令查看：\n\n```\ntail -200\
  \ /var/opt/remi/php74/log/php-fpm/www-error.log\n```\n\n修复你遇到的任何错误，然后重试。最可能的错误是程序中有输入错误，或者连接字符串中列出的密码与你为\
  \ PostgreSQL 用户设置的密码不匹配。\n\n另一个可以查找错误信息的地方是 Web 服务器的错误日志。你可以使用以下命令查看该日志的末尾部分：\n\n\
  ```\ntail -200 /etc/httpd/logs/error_log\n```\n\n如果需要，可以在附录 C 中找到其他故障排除步骤。如果一切顺利，你应该会看到一个提示你创建新条目的屏幕。点击链接会显示一个需要填写的表单。填写完表单后，点击“提交”按钮会将新的留言簿条目添加到列表中。然后，你可以点击单条条目查看完整信息。如果你的应用程序不是这样运行的，那么可能是某处输入有误。\n\
  \n### 应用程序的局限性\n\n本书的目标是让你快速了解如何扩展应用程序。因此，开发中的其他重要方面，如错误处理、日志记录、数据清理和安全加固等，并未涉及。其目标是传达一个可以快速键入、易于完全理解，并且无需深厚平台知识即可遵循或修改的应用程序。尽管如此，我们还是实现了一些基本的安全实践，例如使用\
  \ `bindValue` 来正确转义通过 `$_GET` 和 `$_POST` 发送的值，以及使用 `htmlspecialchars()` 在将数据发送回用户时进行转义。\n\
  \n关于安全编程的良好信息可以在 `www.owasp.org` 网站上找到。\n\n![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig6_HTML.png](img/487291_1_En_4_Fig6_HTML.png)\n\
  \n图 4-6  \nCSS 文件 (`guestbook.css`)\n\n![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig5_HTML.png](img/487291_1_En_4_Fig5_HTML.png)\n\
  \n图 4-5  \n创建留言簿条目 (`create.php`)\n\n![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig4_HTML.png](img/487291_1_En_4_Fig4_HTML.png)\n\
  \n图 4-4  \n新留言簿条目 (`new.php`)\n\n![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig3_HTML.png](img/487291_1_En_4_Fig3_HTML.png)\n\
  \n图 4-3  \n单条留言簿条目 (`single.php`)\n\n![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig2_HTML.png](img/487291_1_En_4_Fig2_HTML.png)\n\
  \n图 4-2  \n列出所有留言簿条目 (`list.php`)\n\n![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig1_HTML.png](img/487291_1_En_4_Fig1_HTML.png)\n\
  \n图 4-1  \n配置和通用函数 (`common.php`)\n\n"
- "# 5. 设置基本云集群\n\n至此，我们有了一个可以在单台服务器上运行的简单云应用程序。虽然我们可以通过简单的点击操作将其部署到我们自己构建的服务器上，但这并没有充分利用云的优势。云的目标之一是创建应用程序*集群*——一组协同工作以解决问题的服务器，其计算能力可以根据需要扩展或收缩。\n\
  \n\n\n## 5.1 一种简单的双层架构\n\n在本章中，我们将探讨一种简单的双层架构。这种架构由以下部分组成：\n\n- 一个数据库服务器\n- 一组 Web\
  \ 服务器\n- 一个在 Web 服务器之间管理流量的负载均衡器\n\n![../images/487291_1_En_5_Chapter/487291_1_En_5_Fig1_HTML.jpg](img/487291_1_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1：简单双层架构示意图\n\n该架构的基本结构如图 5-1 所示。所有连接都汇聚至单个负载均衡器，其职责是将连接转发到若干 Web 服务器中的某一个。负载均衡器不仅负责转发连接，还会监控各个\
  \ Web 服务器的健康状态，一旦某台 Web 服务器停止响应，便会停止向其转发连接。随后，每台 Web 服务器共享同一个数据库服务器。\n\n在开发云应用时，程序员不仅需要知道如何搭建集群，还需要懂得如何分析它。观察图\
  \ 5-1 的示意图，你会看到所有 Web 服务器都依赖于单个数据库服务器。这使得数据库服务器成为集群的*限制因素*。几乎每个集群，无论设计得多好，都存在某些限制因素。目标是尽量减少这些因素对架构的影响。\n\
  \n由于这种应用架构受限于单个数据库节点，因此它最适合中小型部署，其中大部分处理工作是在 Web 服务器上完成，而非数据库上。示例应用因其简单性，在 Web 服务器上进行的处理其实非常少。尽管如此，本章仍将展示如何搭建服务器，以便在这种配置下部署该应用。\n\
  \n## 5.2 复制节点\n\n图 5-1 描述的基本双层应用表明，我们需要若干个服务器节点。我们可以通过启动带有空白 CentOS 系统的新机器，并逐一配置每台机器来实现这一点。然而，既然我们已经花费时间将当前服务器配置成我们想要的工作方式，就应该充分利用这个配置好的成果。\n\
  \nLinode 提供了几种可完成此任务的服务，每种服务各有其优缺点。Linode 能够创建保存的镜像，这些镜像可直接用于创建新节点（你可以选择已保存的镜像，而不是选择操作系统）。Linode\
  \ 还提供克隆服务，允许你在源机器和目标机器都处于关机状态时克隆现有机器（这不是一条硬性规定，但如果你尝试克隆正在运行的机器，可能会遇到一致性问题）。最后，你还可以从机器的备份中创建克隆。\n\
  \n我倾向于从备份中创建克隆，因为：(a) 你无论如何都应该定期备份服务器；(b) 你无需在创建新服务器期间关闭一台机器并使其闲置；(c) 这迫使你在学习克隆服务器的同时，熟悉备份系统（总有一天你需要从备份中恢复，所以在需要之前熟悉这个过程是件好事）。Linode\
  \ 镜像服务*可以*用于此目的，但它在实际生产环境中存在过多限制。为了防止用户将镜像服务当作备份服务来使用，他们限制了镜像的大小和数量，而我的大多数机器通常都超过了\
  \ Linode 镜像所允许的最小尺寸。请注意，其他云服务（例如 DigitalOcean）也提供类似的服务，但附带不同的限制条件。\n\n如果我们想启动一台与现有服务器完全相同的新服务器，那么我们需要做的就是备份当前服务器。我们首先要做的是在我们的服务器节点上启用备份功能。为此，只需登录到\
  \ Linode，在列表中点击你的节点，然后从节点控制面板中点击“备份”标签页。页面上会显示一个“为此 Linode 启用备份”按钮。这会增加少量的月度费用，但绝对是值得的。点击该按钮，你的机器将自动提供每周、每日以及临时的快照。此时屏幕应类似于图\
  \ 5-2 所示。\n\n![../images/487291_1_En_5_Chapter/487291_1_En_5_Fig2_HTML.jpg](img/487291_1_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2：Linode 备份管理界面\n\n我们现在要做的是为我们的机器拍摄一个快照。为你的备份命名（我将其命名为 `snapshot-for-replication`），然后点击“拍摄快照”按钮。由于\
  \ Linode 服务器都采用固态硬盘，快照速度非常快，通常只需 5–10 分钟。\n\n### 其他备份设置\n\n![../images/487291_1_En_5_Chapter/487291_1_En_5_Figa_HTML.jpg](img/487291_1_En_5_Figa_HTML.jpg)\n\
  \n因为备份确实会在一定程度上拖慢磁盘速度，所以 Linode 允许你指定备份窗口。你可以选择希望执行备份的一天中的具体时间，以及将被视为“每周备份”的周几。备份时间点应选在系统使用量最低的时候，而备份日期应选在任何主要批处理之前。例如，如果你在星期五进行批处理，将备份日期设置为星期四可以确保在主要处理发生之前有一个“之前”状态的快照。如果你不进行大规模批处理，那么选择哪一天作为每周备份日就无关紧要了。\n\
  \n备份开始后，我们可以进行下一步任务：创建一台新服务器。这台新服务器将成为我们的数据库服务器。\n\n要创建机器，请像我们在第 3 章中那样，进入“创建”然后选择“Linode”。不过，这次在选择发行版时，需要在“镜像”标题下选择“我的镜像”，然后选择“备份”。这将显示所有拥有可用备份的节点列表。点击你的节点，然后它会显示可用的备份，其中就包括我们刚刚创建的备份。参见图\
  \ 5-3 了解具体样式。\n\n你可以创建任意大小的机器，但仅为了练习，你也可以使用它们的最小机型。这个节点需要与你的另一个节点位于同一数据中心（否则它们将无法进行私有、低成本和快速的相互通信），但\
  \ Linode 会自动将从备份创建的新节点放入同一数据中心。\n\n至于 Linode 标签，我们将其命名为 `dbmaster`，以便知道此节点将用作主数据库。拥有大量没有名称（或名称不佳）的节点很快就会变得难以管理，因此请务必*始终*为你的节点起描述性的名称。\n\
  \n![../images/487291_1_En_5_Chapter/487291_1_En_5_Fig3_HTML.jpg](img/487291_1_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3：从备份启动新的 Linode 节点\n\n现在点击“创建”来构建你的新节点。从备份创建时，你需要在该节点完全创建完成后自行启动它。在屏幕右上角，应该显示“离线”。点击它，然后选择“开机”来启动你的新机器。现在你可以使用为初始机器设置的用户名和密码\
  \ `ssh` 登录到这台新机器。实际上，它应该也运行着你之前创建好的应用程序。它是另一台机器的精确副本，仅网络设置已被修改。\n\n\n好的，身为高级文档工程师和翻译员，我将严格按照您的要求，完成以下翻译工作。\n\
  \n\n### ![../images/487291_1_En_5_Chapter/487291_1_En_5_Figb_HTML.jpg](img/487291_1_En_5_Figb_HTML.jpg)\
  \ 恢复到更大的机器\n\n如果你将备份恢复到更大的机器上，可能无法使用全部已购买的磁盘空间。由于分区是直接复制的，旧分区的大小将与它被复制时所在服务器上的大小相同，这可能小于你可用的空间。\n\
  \n要解决这个问题，首先关闭你的服务器。然后，在节点的控制面板上，点击“高级”选项卡。你可以选择添加另一个磁盘来使用剩余空间（这更难管理，所以我不推荐），或者调整主磁盘大小以使用所有空间。要调整磁盘大小，请在“磁盘”下找到主磁盘。它应该被命名为类似“CentOS\
  \ 7 磁盘”的名称（不要选择标有“交换镜像”的磁盘）。点击主磁盘旁边的省略号（即 `...`），然后选择“调整大小”。接着，你可以将大小设置为它告诉你的最大值，然后点击“调整大小”按钮。\n\
  \n调整大小完成后，你可以重新启动机器，现在一切都就绪了。\n\n## 5.3 设置你的私有网络\n\n因为我们有两台机器，所以需要它们能够通信。它们*可以*通过公共\
  \ IP 地址通信，但这会导致几个问题。首先，如果你有一些不希望公开的服务（比如你的数据库），如果你只有一个公共 IP 地址，那么阻止公众访问这些服务会更加困难。此外，Linode\
  \ 会对公共 IP 地址的流量收费，所以，如果你通过那个 IP 地址通信，Linode 会向你收取*内部*流量的费用。因此，拥有一个私有 IP 地址很重要，因为它可以让计算机通过一个快速、免费、更安全的内部网络相互通信。\n\
  \n为了解决这些问题，Linode 允许你为服务器设置一个内部网络。一个账户内的所有服务器如果都为之进行了设置，它们就可以共享一个内部网络。要将服务器添加到你的内部网络，你只需要进入节点的“网络”选项卡，然后点击“添加私有\
  \ IPv4”。系统会提供一些关于私有地址的额外信息，你只需点击“分配”即可继续。这将为计算机分配一个私有 IP 地址。因为所有的 Web 服务器都将与这台服务器通信，你需要记下生成的这个私有\
  \ IP 地址。从现在开始，我们将这个地址称为 `DB.MASTER.PRIVATE.IP`，所以请始终用你刚刚记下的服务器的私有 IP 地址来替换它。\n\n\
  请注意，在某些云平台（包括 Linode）上，私有 IP 地址并非完全私有。也就是说，同一数据中心内的其他云客户可能也在该网络上。因此，虽然它肯定比在公共网络上更安全，但云上的私有网络并不能保证只有我们自己的计算机才能连接。因此，在生产系统上，即使在内部网络中，你仍然需要采取预防措施以防止未经授权的访问。不过，Linode\
  \ 确实会过滤发往每个节点的流量，所以你不必担心有人在内部网络上窥探数据流量。\n\n你需要重启节点来完成这个过程。\n\n启动完成后，你仍然可以通过 `http://NEW.NODE.PUBLIC.IP/list.php`\
  \ 访问该应用，但你无法通过私有 IP 地址访问它，因为如前所述，它是私有的。\n\n要查看服务器上的地址列表，请以 root 用户身份登录并执行命令：\n\n\
  ```\nip addr show\n```\n\n这会打印出分配给该节点的所有 IP 地址。\n\n### ![../images/487291_1_En_5_Chapter/487291_1_En_5_Figc_HTML.jpg](img/487291_1_En_5_Figc_HTML.jpg)\
  \ 私有 IP 地址\n\n如果你不熟悉 IP 寻址，一些 IPv4 地址已被保留供内部网络使用。这些地址包括：\n\n*   `192.168.X.X`\n\n\
  *   `172.16–31.X.X`\n\n*   `10.X.X.X`\n\n这些 IP 地址都不允许用于互联网上的公共通信。\n\n因此，在设置你的内部网络时，Linode\
  \ 会从这些地址池中选择 IP 地址来配置你的机器。\n\n另一个广为人知的 IP 地址是 `127.0.0.1`，它被称为*回环*地址，是机器用来指代自身的\
  \ IP 地址（实际上，整个 `127.X.X.X` 范围都为此目的而保留，但通常只使用 `127.0.0.1`）。\n\n## 5.4 处理来自其他服务器的数据库连接\n\
  \n这台机器现在拥有完整的应用和数据库副本。但是，它仍然被配置为一个单服务器系统。我们需要将其配置为服务器集群的主数据库。本节操作应以 root 用户身份执行，将展示实现此目标所需执行的步骤。\n\
  \n由于此机器是 `template_node` 的克隆，这意味着所有用户、程序和配置都已复制到此节点。因此，你可以使用之前设置的密码以 root 用户身份通过\
  \ `ssh` 登录到该机器。\n\n要将其用作其他节点的数据库服务器，你需要启用数据库以监听来自这些节点的连接。默认情况下，PostgreSQL 仅监听 localhost\
  \ 接口上的连接。我们*不希望* PostgreSQL 监听公共互联网上的连接。因此，我们希望配置 PostgreSQL，使其同时监听 localhost 及其*私有*IP\
  \ 地址上的连接。\n\n为此，以 root 用户身份，使用 `nano` 打开文件 `/var/lib/pgsql/data/postgresql.conf`，并修改写着\
  \ `listen_addresses` 的那一行。将该行修改为：\n\n```\nlisten_addresses = 'localhost,DB.MASTER.PRIVATE.IP'\n\
  ```\n\n确保将 `DB.MASTER.PRIVATE.IP` 替换为你节点的*实际*私有 IP 地址。如果该行开头有注释标记（`#`），请务必将其删除；否则该命令将不会生效。使用\
  \ control-o 保存文件（如果提示，只需按回车键确认文件名）。然后，使用 control-x 退出。现在使用以下命令重启 PostgreSQL：\n\n\
  ```\nsystemctl restart postgresql\n```\n\n此外，你需要打开防火墙，使其能够接受 PostgreSQL 的远程连接。你可以使用以下命令完成此操作：\n\
  \n```\nfirewall-cmd --add-service postgresql\nfirewall-cmd --add-service postgresql\
  \ --permanent\n```\n\n通常，我会让 Web 服务器在数据库服务器上运行，以便我能够检查它。但是，如果你愿意，可以使用以下命令关闭 Web\
  \ 服务器：\n\n```\nsystemctl stop httpd\nsystemctl disable httpd\n```\n\n\n\n## 5.5\
  \ 搭建网络服务器\n\n现在我们已配置好数据库，接下来该设置我们自己的网络服务器了。\n\n请注意，我们实际上并不会将`template_node`用作服务器。我喜欢保留一台小型机器，专门用作未来服务器的模板，尤其是网络节点。这样，我就能拥有一台小巧、保持更新、已备份且状态良好的机器。当需要创建新“镜像”时，只需创建一个命名备份即可使用。需要注意的是，这将会覆盖之前的快照镜像，不过就我的用途而言，这通常没什么问题。如果你需要保留旧版本，只需为你想维护的每种配置保留一个模板节点即可。\n\
  \n现在我们将配置`template_node`，使其成为网络服务器模板。我们只需进行三项修改：\n\n1.  在这台机器上关闭数据库。\n2.  更改网络应用的代码，使其指向我们的新数据库。\n\
  3.  为机器启用一个私有 IP 地址，使其能够使用私有网络。\n\n要完成第一项任务，我们只需以 root 身份登录`template_node`机器，并运行：\n\
  \n```\nsystemctl stop postgresql\nsystemctl disable postgresql\n```\n\n要完成第二项任务，我们只需修改`common.php`文件。我建议在本地机器上修改该文件，然后使用\
  \ SFTP 传输新文件。不过，你也可以直接在服务器上使用`nano`编辑器进行修改。你所要做的就是更改连接字符串。将当前写着`host=localhost`的地方改为`host=DB.MASTER.PRIVATE.IP`，其中`DB.MASTER.PRIVATE.IP`是你`dbmaster`节点的私有\
  \ IP 地址。你需要进行两次修改——一次在`getReadOnlyConnection()`函数中，另一次在`getReadWriteConnection()`函数中。修改完成后，使用\
  \ SFTP 将代码重新加载到服务器上。\n\n此时，代码将无法运行，因为它无法访问`dbmaster`机器。这是因为 PostgreSQL *只*在它的私有\
  \ IP 地址上监听，而`template_node`还没有可以用来通信的私有 IP 地址。因此，你需要为机器添加一个私有 IP 地址，这样它才能通过`dbmaster`的私有\
  \ IP 地址与之连接。\n\n使用第 5.3 节中概述的流程为机器创建一个私有 IP 地址（之后别忘了重启！）。\n\n完成这些步骤后，你的`template_node`机器应该能够连接到`dbmaster`了，所以测试一下。访问你`template_node`服务器的\
  \ IP 地址，看看它是否还能正常运作。如果可以，那么恭喜你，因为你刚刚实现了一个小型的两层系统！\n\n现在，正如我前面所说，我们实际上并不会用`template_node`来实际处理请求。目标是利用它，以便我们能够轻松启动新的网络服务器节点，从而根据需要扩展容量。\n\
  \n因此，既然`template_node`已经完全配置好成为一个网络服务器，那么就拍摄一个新的备份快照。这一步至关重要。任何时候你对`template_node`进行了更改，都应该创建一个新的备份快照，这样你用它所创建的新节点就会包含你的新更改（尽管它完全不影响现有节点）。\n\
  \n现在我们将为集群创建三个（或者任意你想要的个数）网络服务器节点。\n\n以下是每个新网络服务器节点的创建步骤：\n\n1.  使用第 5.2 节的步骤创建一个新节点。确保\
  \ (a) 它与`dbmaster`创建在同一个数据中心，并且 (b) 将节点命名为`webnode1`（或 2、3）。\n2.  使用第 5.3 节的步骤为节点添加一个私有\
  \ IP 地址，使其能够通过私有网络连接到`dbmaster`。\n3.  机器启动完成后，通过查看节点的公有 IP 地址上的网络应用（例如：`http://WEB.NODE.PUBLIC.IP/list.php`），验证其功能是否完全正常。\n\
  \n完成这些操作后，你应该拥有三台机器：`webnode1`、`webnode2` 和 `webnode3`，每台机器都可以作为你网络应用的前端。现在，你只需将它们全部连接起来，这将在下一节中介绍。\n\
  \n## 5.6 设置负载均衡器\n\n现在我们有了三台前端机器，全部连接到一个数据库。如何将它们连接在一起呢？一种方法是设置 DNS 轮询方案。其工作原理是为一个主机名在\
  \ DNS 中设置*多个* A 记录。然后浏览器自己会选择要连接哪个主机。这样做的问题在于，如果你的某台机器宕机了，无法将用户从那个 IP 地址引导开。Linode\
  \ 现在实际上对这类故障转移提供了一些支持，但其用法超出了本书的范围。\n\n![../images/487291_1_En_5_Chapter/487291_1_En_5_Fig4_HTML.jpg](img/487291_1_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4：创建节点负载均衡器\n\n负载均衡器是一种更为交钥匙的解决方案。负载均衡器位于你的集群前端，为你接收连接，然后将这些连接转发给可以处理它们的可用服务器。此外，如果你的某台服务器发生故障，负载均衡器会检测到这一点并将流量转移到剩余服务器上。然后，当你的服务器恢复时，负载均衡器也会检测到并将流量转移回该服务器。\n\
  \n在 Linode 中设置负载均衡器很简单。Linode 将其负载均衡器称为“节点负载均衡器”。要设置一个节点负载均衡器，请点击“创建”，然后选择“节点负载均衡器”菜单项。这会把你带到如图\
  \ 5-4 所示的界面。\n\n和其他所有操作一样，你需要：\n\n-   设置负载均衡器的名称（我们将使用“primary-balancer”）。\n-  \
  \ 将负载均衡器放置在与你的节点相同的数据中心。\n\n此外，你还需要添加一些额外的配置，如图 5-5 所示。请确保选择了以下选项：\n\n-   “端口”应设置为“80”。\n\
  -   “协议”应设置为“HTTP”。\n-   “算法”应设置为“轮询”。\n-   “会话粘性”应设置为“无”。\n-   “主动健康检查”应设置为“无”。\n\
  -   “被动健康检查”应开启。\n\n之后，你需要向负载均衡器中添加至少一个节点（创建负载均衡器后可以添加更多）。在“标签”字段中输入节点的名称（我们以`webnode1`为例）。然后，在“IP\
  \ 地址”字段中，从下拉菜单中选择你节点的 IP 地址。确保端口设置为“80”。\n\n完成这些设置后，点击“创建”来创建负载均衡器。\n\n一旦你的负载均衡器创建完成，你可以通过进入“配置”，然后点击“端口\
  \ 80”，再点击底部的“添加节点”来添加其余节点。按你创建的节点数量添加。然后点击“保存”即可。\n\n有时负载均衡器需要几分钟时间将节点添加到其列表中。要检查状态，请返回节点负载均衡器配置界面。每个服务器旁边都会有一个“状态”字段。当状态为“运行中”时，表示服务器已成功连接到负载均衡器。\n\
  \n如果你想为另一个端口设置负载均衡器，可以使用“添加另一个配置”按钮来完成。\n\n![../images/487291_1_En_5_Chapter/487291_1_En_5_Fig5_HTML.jpg](img/487291_1_En_5_Fig5_HTML.jpg)\n\
  \n图 5-5：节点负载均衡器附加设置\n\n\n\n### ![../images/487291_1_En_5_Chapter/487291_1_En_5_Figd_HTML.jpg](img/487291_1_En_5_Figd_HTML.jpg)\
  \ 其他节点负载均衡器选项\n\n节点负载均衡器有很多可用的选项。以下是一些重要选项的说明。\n\n**端口**：这是节点负载均衡器需要转发的 TCP 端口。通常为\
  \ `80`（HTTP）或 `443`（HTTPS）。我们的示例将使用 `80` 端口。\n\n**协议**：这是您希望服务器处理请求转发的方式。如果将协议设置为\
  \ TCP，那么负载均衡器唯一做的事情就是将连接转发给您。如果设置为 HTTP 或 HTTPS，那么服务器实际上会为您处理连接中的某些部分。本书将使用 HTTP。HTTPS\
  \ 为安全站点提供了额外的增强，因为负载均衡器会为您处理 SSL 连接，从而显著减轻服务器的负载（您还需要将证书和密钥信息上传到负载均衡器进行处理）。使用 HTTPS\
  \ 时，您可能希望负载均衡器上的端口与机器上的端口不同。对于 HTTPS，您应该将负载均衡器设置为连接到服务器上未加密的 `80` 端口。如果您希望由自己的机器（而不是负载均衡器）来处理\
  \ HTTPS，那么只需选择 TCP（而非 HTTPS）作为协议即可。由于获取和安装证书会带来额外的复杂性，本书中的示例将选择 `80` 端口和 HTTP 进行负载均衡。\n\
  \n**算法**：这是负载均衡器确定将请求转发到哪台服务器的方式。轮询是默认算法，并且应该工作良好。\n\n**会话粘性**：此选项决定给定用户在建立初始连接后是否应继续连接到同一台\
  \ Web 服务器。只有当您的 Web 服务器上存储了会话信息时，此选项才重要。试想一下，如果您的 Web 服务器保存了重要的会话信息，但下一个请求却发到了另一台服务器！因此，此选项允许您配置是否以及如何将客户端与服务器匹配。我们的应用程序没有会话信息，因此应将其设置为“无”。如果您的应用程序使用本地会话信息（或本地缓存，正如我们将在\
  \ 6.1 节中看到的那样），我会选择 HTTP Cookie 方法，因为它不会像“表”方法那样干扰您的负载测试。由于所有请求都来自同一个 IP 地址，“表”方法只会将您的整个负载测试定向到单个服务器，而不是分散开来，从而让您的负载均衡看起来毫无帮助。\n\
  \n**主动健康检查**：此选项允许您指定一个 URL，让负载均衡器访问该 URL 以检查 Web 服务器的状态。您可以配置负载均衡器仅检查 HTTP 状态，或者也检查响应正文中是否包含特定字符串。\n\
  \n**后端节点：权重**：此选项设置节点负载均衡器对该服务器的偏好。权重越高，该服务器获得的连接数越多。\n\n**后端节点：模式**：此选项设置节点在负载均衡器中的模式。“接受”用于正常操作。“拒绝”本质上是关闭此节点，这意味着负载均衡器将不再向该节点发送任何请求。但是，如果您开启了会话粘性，您可能不希望直接从“接受”切换到“拒绝”。“排空”告诉负载均衡器仅接受那些在该节点上有会话的客户端的连接。“备份”表示仅当所有其他节点都宕机时才接受连接。\n\
  \n一旦您将所有 Web 节点添加到节点负载均衡器，您现在就可以通过访问节点负载均衡器本身的 IP 地址来查看您的集群，节点负载均衡器会将您的请求转发到集群中的某台机器。您可以通过单击主菜单中的“节点负载均衡器”来找到您的节点负载均衡器的\
  \ IP 地址。IP 地址将列在列表中您的负载均衡器旁边。它也会列在节点负载均衡器“摘要”屏幕的右侧。\n\n  \n## 5.7 测量可扩展性  \n\n我们开发的简单\
  \ Web 应用并未从本文介绍的架构中获得太多益处。该应用本质上只是几个数据库查询的简单外壳。因此，仅增加前端服务器无法解决应用受限于数据库的事实。将数据库与\
  \ Web 服务器分离会带来一定提升，因为这能让数据库服务器专注于仅处理数据库连接。然而，从核心来看，我们在该应用中做的一切都只是围绕数据库查询的薄薄一层封装。\
  \  \n\n但如何*衡量*应用的可扩展性呢？ApacheBench 是一种常见且简单的应用可扩展性测量工具。它在 Macintosh 和大多数 Linux 发行版中都是标配。在我们的场景中，可以直接从\
  \ `template_node` 服务器运行 ApacheBench 来测试集群中的其他节点。  \n\n要执行此操作，请以 `root` 或 `fred`\
  \ 身份登录到 `template_node` 服务器。运行一个简单的 ApacheBench 会话，只需输入：  \n\n```\nab http://BALANCER.IP.ADDRESS.HERE/list.php\n\
  ```  \n\n显然，请将 `BALANCER.IP.ADDRESS.HERE` 替换为负载均衡器的 IP 地址。  \n\n这将向负载均衡器发送单个请求，并记录处理该请求所花费的时间。输出结果将类似于图\
  \ 5-6。  \n\n由于仅对单个请求进行了基准测试，其中包含的有用信息并不多。结果显示该请求耗时 9.674 毫秒，据此推算，预计服务器每秒可处理多达 103.37\
  \ 次请求。  \n\nApacheBench 还提供了多个选项，允许我们更全面地测试服务器。`-n` 选项指定请求总数（默认值为 1）。`-c` 选项指定并发连接数（即同时发起的连接数）。不使用\
  \ `-c` 时，ApacheBench 一次只会运行一个请求。但如果添加 `-c 50`，ApacheBench 将始终与 Web 服务器保持 50 个活跃请求。\
  \  \n\n因此，为了测试集群性能，我执行了以下命令：  \n\n```\nab -c 50 -n 1000 http://BALANCER.IP.ADDRESS.HERE/list.php\n\
  ```  \n\n该命令总共发送 1000 个请求，并确保始终有 50 个请求同时处于活跃状态。结果如图 5-7 所示。  \n\n结果表明，在 50 个并发请求的情况下，每个请求的*平均*时间降至\
  \ 5.136 毫秒，但*每个*请求的实际时间增至 256.822 毫秒。这并非大问题，因为平均每请求时间对容量规划最为重要。同时，数据显示在此速率下，服务器每秒可处理多达\
  \ 194.69 次请求。  \n\n![../images/487291_1_En_5_Chapter/487291_1_En_5_Fig7_HTML.png](img/487291_1_En_5_Fig7_HTML.png)\
  \  \n\n图 5-7  \n1000 个请求的 ApacheBench 结果  \n\n![../images/487291_1_En_5_Chapter/487291_1_En_5_Fig6_HTML.png](img/487291_1_En_5_Fig6_HTML.png)\
  \  \n\n图 5-6  \n单个请求的 ApacheBench 输出示例  \n\n这听起来很棒，但将其与单机测试结果（只需将 IP 地址替换为你某台机器的\
  \ IP 即可）对比时，会发现两者结果接近。当并发请求数激增时，负载均衡器能承受稍高的压力，但总体而言两者结果基本相同。这是因为我们的应用几乎完全只是数据库的一个外壳。因此，这个数字反映了数据库服务器的最大容量。为了验证这一点，你可以临时将数据库服务器扩容为更大的实例。\
  \  \n\n要调整 `dbmaster` 服务器大小，请前往 `dbmaster` 的控制面板，点击“调整大小”（Resize）选项卡，并选择新的套餐（我选择了\
  \ Linode 4GB）。然后点击“立即调整此 Linode 大小”。经过几分钟停机后，你的 Linode 将完成扩容，且 IP 地址保持不变！扩容完成后，服务器会启动，你将拥有一个扩容后的服务器！\
  \  \n\n现在，你可以在此配置上运行 ApacheBench，并发现扩容数据库服务器相比之前配置会带来巨大优势。完成此实验后，我已将 `dbmaster`\
  \ 恢复为 Nanode 1GB，以便后续章节能更清晰地展示架构优化的效果。  \n\n如果应用不如此重度依赖数据库，我们应已能在当前架构中看到扩展性提升。然而，即使存在数据库瓶颈，第\
  \ 6 章将探讨架构改进方案，这些方案将带来显著提升的扩展能力。本章的目标仅是理解该架构的工作原理以及如何在 Linode 上进行设置。  \n\n同时，我们也应认识到：仅仅能为系统添加节点，并不意味着系统会自动具备可扩展性。\
  \  \n\n"
- "# 6. 通过缓存提升可扩展性  \n\n本章将介绍对前一章描述的基础双层架构进行的若干调整。  \n\n\n\n## 6.1 理解缓存架构\n\n在当前的应用中，数据库是主要的瓶颈。这意味着增加更多的\
  \ Web 服务器并不会大幅提升云环境能够处理的负载。当你发现一个瓶颈时，最好花些时间思考如何避免这个瓶颈。\n\n在我们的案例中，数据其实并不经常变化。即使它经常变化，从留言板获取精确到秒的数据也并非那么关键。如果有人需要等待几秒甚至几分钟才能看到最新的留言条目，这也不是世界末日。\n\
  \n当你拥有经常被访问、但可以容忍稍微（甚至很大程度）过期的内容时，就可以实施*缓存*来加速处理。缓存仅仅意味着拥有一个可以快速访问的临时结果存储。数据库之所以慢，是因为数据库主要关注*数据完整性*。你需要知道你的数据是安全的、存储在磁盘上、不会丢失，并且可以通过任意查询访问。而缓存则是短暂的——它们通常只存储在内存中。它们的目标是不惜一切代价实现快速数据检索。例如，许多缓存如果内存满了，就会直接开始丢弃数据。这没关系，因为如果缓存中不存在某个数据，我们可以去数据库重新获取。\n\
  \n简而言之，数据库关乎持久性和可靠性，而缓存则关乎尽可能快速地获取我想要的东西。缓存通常以简单的键/值对实现，并且通常带有一个过期时间。也就是说，缓存存储的每条数据都有一个指定的“键”。例如，由于所有留言条目只有一个列表，我们可以为此设置一个单一的缓存“键”。在应用中，这个键将被称为\
  \ `entrylist`。然而，每条单独的留言条目可能都会有自己的缓存键（这样缓存就能知道它是唯一的），该键会包含该条目的数据库 ID。缓存键通常只是普通的字符串，并且在大多数缓存系统中，内容可以是任何东西。缓存不做任何特殊处理，它们只存储你在给定键下请求的任何内容，因此你必须小心，不要为两个不同的东西使用相同的键！\n\
  \n缓存的使用方式是：程序首先确定要为数据使用哪个键。目标是能够从 URL 参数中轻松推断出缓存键。程序首先检查缓存中是否有该缓存键对应的值。如果缓存包含该值，则使用该值。如果没有，程序则通过“正常”方式获取值（即通常从数据库获取值，并可能进行一些额外的计算或处理），然后将其连同过期时间一起保存到缓存。接着，无论该值是来自缓存还是“正常”方式，都会在应用中使用。一旦过期时间过去（或者缓存中值太多被填满），那么缓存的值就会在下次查询时消失，迫使程序通过“正常”方式获取一个全新的值。\n\
  \n![../images/487291_1_En_6_Chapter/487291_1_En_6_Fig1_HTML.jpg](img/487291_1_En_6_Fig1_HTML.jpg)\n\
  \n**图 6-1** — 带本地缓存的两层架构\n\n如你所见，这种缓存与正常访问的方法确保了在优先使用缓存机制的同时，非缓存机制同样可用，并且这个非缓存机制会填充缓存。\n\
  \n如前所述，数据库通常被认为是任何应用中的慢速部分，因为它必须非常小心地正确处理你的数据并永久保存。而另一方面，缓存被认为是短暂的。如果我们突然想清除缓存，这不会影响页面的运行，因为它会直接回到数据库再次获取值。\n\
  \n如果一个网站负载很高，并且持续请求相同的内容，即使只缓存几秒钟，也能极大提高速度并减少资源使用。我们之前对此集群进行了负载测试，发现列表页每秒能处理大约 250\
  \ 个请求。如果我们将该页面的结果缓存 10 秒，那么在这段时间内就能减少 2500 次数据库请求！\n\n图 6-1 展示了如何修改我们标准的两层架构以添加缓存层。在此架构中，每个\
  \ Web 服务器维护自己的结果缓存。这可能导致 Web 服务器之间出现微小不一致，因为它们可能在不同时间刷新了结果。但是，如果过期时间设置得不是太远，这些问题就很小。此外，如果出现问题，请记住在第\
  \ 5.6 节我们讨论过负载均衡器的“粘滞性”。这会将特定用户绑定到特定服务器，意味着该用户将始终在同一台服务器上，因此也将始终使用同一台服务器的缓存。此外，这也使缓存更高效，因为每台服务器只需要为一部分用户缓存数据。\n\
  \n![../images/487291_1_En_6_Chapter/487291_1_En_6_Fig2_HTML.jpg](img/487291_1_En_6_Fig2_HTML.jpg)\n\
  \n**图 6-2** — 带全局缓存的两层架构\n\n缓存什么以及缓存多久，非常依赖于具体的应用。对于许多架构来说，有些部分可以缓存几分钟甚至几天，而其他部分则只能缓存几秒或根本无法缓存。缓存常常会导致意想不到的结果，因此在开发时，最好包含一个能够完全关闭缓存的功能，以便查看你的缓存是否是问题的根源。\n\
  \n如果在所有服务器之间保持缓存一致性很重要，另一种可考虑的架构是使用全局缓存，如图 6-2 所示。在这种架构中，不是每个 Web 服务器维护自己的缓存，而是存在一个所有服务器都访问的共享缓存。这会增加一点网络延迟，因为所有缓存调用都必须通过网络进行，但它增加了结果的一致性。\n\
  \n根据实现方式的不同，这种外部缓存也可能成为瓶颈。然而，有许多缓存服务器可以跨多台服务器进行扩展，并在这些服务器之间平衡请求。尽管如此，这也为整个系统增加了一层管理复杂性。\n\
  \n在几乎所有情况下，我发现设置和维护一个单一的外部缓存服务都很困难，而且几乎没有什么好处。对于大多数情况，将缓存放在每个 Web 服务器上能为你带来最大的可扩展效率，即使这会以牺牲一点一致性为代价，但如前所述，这一点可以通过使用负载均衡器的“粘滞性”来缓解。\n\
  \n\n\n## 6.2 在应用中实现缓存\n\n我们将要实现的缓存架构如图 6-1 所示，这既是因为它更容易实现，也是因为从长远来看它更易于管理。我们的做法是，在\
  \ `template_node` 机器上执行配置变更，然后简单地关闭现有的 `webnodeX` 主机，并用从 `template_node` 复制的新主机替换它们。这比遍历每台服务器并逐一修改配置要容易得多（也更不容易出错）。\n\
  \n我们需要做的第一件事是安装缓存服务。我们将使用 `memcached` 作为缓存服务，因为它易于运行、访问和管理。要以 root 身份安装 `memcached`\
  \ 并启动它，只需输入以下命令：\n\n```\nyum install -y memcached\nsystemctl enable memcached\n\
  systemctl start memcached\n```\n\n你还需要 `memcached` 的 PHP 扩展。这些扩展需要编译，因此我们需要安装一些额外的扩展（同样以\
  \ root 身份）。\n\n![../images/487291_1_En_6_Chapter/487291_1_En_6_Fig3_HTML.png](img/487291_1_En_6_Fig3_HTML.png)\n\
  \n图 6-3\n\nMemcache 连接函数\n\n```\nyum install -y libmemcached\nyum install -y php74-php-pecl-memcached\n\
  ```\n\n不要忘记 `memcached` 末尾的“d”，因为还有另一个名为 `memcache` 的扩展，它无法实现我们想要的功能。请注意，这也会在 PHP\
  \ 中启用该扩展。它会为我们自动完成此操作，但如果你需要调整 PHP 端的配置，配置文件位于目录 `/etc/opt/remi/php74/php.d` 中。\n\
  \n现在，我们需要重启 PHP-FPM 进程以使用新的 PHP 扩展：\n\n```\nsystemctl restart php74-php-fpm\n```\n\
  \n接下来，我们需要修改我们的应用，以创建到本地 `memcached` 服务的连接。因此，请将图 6-3 中的代码添加到 `common.php` 中。代码中提到的数字\
  \ `11211` 是 `memcached` 默认监听的端口。\n\n你的代码应该按照以下方式使用缓存：\n\n1.  创建一个缓存键，用于在缓存中唯一标识该信息。\n\
  2.  检查该信息是否已存在于缓存中。如果存在，则直接使用。\n3.  如果该信息尚不存在于缓存中，则通过较慢的方式（即执行数据库查询）获取信息。\n\n  \
  \  ![../images/487291_1_En_6_Chapter/487291_1_En_6_Fig4_HTML.png](img/487291_1_En_6_Fig4_HTML.png)\n\
  \n    图 6-4\n\n    重写 `list.php` 以使用缓存\n\n4.  获取该信息后，使用该键将其存储在缓存中，并设置一个未来的过期时间（在本例中，我们将过期时间设置为从设定时起\
  \ 10 秒）。\n\n接下来，我们将更新 `list.php` 函数以使用缓存。图 6-4 展示了如何重写 `list.php` 来使用缓存。这只是脚本中将查询结果存储在\
  \ `$result` 中的顶部部分。实际的 HTML 输出代码保持不变。\n\n## 6.3 重建集群镜像\n\n现在，我们需要将此部署到我们的集群中。为此，我们首先需要为\
