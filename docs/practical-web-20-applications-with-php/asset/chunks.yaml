    add to DatabaseObject_BlogPost. We use the create() method from the Zend_Search_Lucene
    class to create a new index, with the first and only argument being the file system
    path of the index.


    When we query the index later, we will be using the open() method instead of create().
    We use the getIndexFullpath() from Listing 12-3 as the argument to create().


