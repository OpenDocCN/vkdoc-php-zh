    FROM orders


    WHERE order_id = inOrderId;


    RETURN outOrdersRow;


    END;


    $$;

    ```


    **7.** Create the `orders_get_orders_by_customer_id` function:


    ```sql

    -- Create orders_get_by_customer_id function


    CREATE FUNCTION orders_get_by_customer_id(INTEGER)


