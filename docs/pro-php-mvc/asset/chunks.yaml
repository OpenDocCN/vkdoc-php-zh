    The _echo() method converts the string “{echo $hello}” to “$_text[] = $hello”,
    so that it is already optimized for our final evaluated function. Similarly, the
    _script() method converts the string “{:$foo + = 1}”


    to “$foo + = 1”.


    The _each() and _for() methods are also similar, but depend on the _loop() method
    to augment their output with checks for the contents of the arrays used by those
    statements, as long as an {else} tag follows them.


    The _each() method returns the code to perform a foreach loop through an array,
    while the _for() method produces the code to perform a for loop through an array.


    The methods _if(), _else(), and _elif() return code to perform each of those operations
    within our templates. We could obviously rewrite these methods (as well as _each()
    and _for()) to use the alternative closing syntax (endif, endforeach, endfor,
    etc.), but that’s really up to you.


    The _macro() method creates the string representation of a function, based on
    the contents of a


