  trans: "\n7.  如果一切顺利，你现在就可以开始与`phpsols`数据库交互了。如果遇到问题，请查看下一节。\n\n## 解决数据库连接问题\n\n\
    连接数据库时最常见的失败原因是用户名或密码错误。密码和用户名是区分大小写的。请仔细检查拼写。例如，以下截图显示了将`psread`改为`Psread`会发生什么。\n\
    \n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figb_HTML.jpg](img/332054_4_En_13_Figb_HTML.jpg)\n\
    \n访问被拒绝是因为没有这个用户。用户名的首字母大写造成了完全不同的结果。但即使用户名正确，你也可能收到同样的错误信息，如下所示：\n\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figc_HTML.jpg](img/332054_4_En_13_Figc_HTML.jpg)\n\
    \n这让许多人感到十分困惑。错误信息确认你正在使用密码。那么为什么访问被拒绝呢？因为密码错误，就是这个原因。如果错误信息显示`using password:\
    \ NO`，则表示你忘记提供密码。短语`using password`是问题与登录凭据相关的线索。当这个短语缺失时，表示是另一个不同的问题，如下一张截图所示。\n\
    \n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figd_HTML.jpg](img/332054_4_En_13_Figd_HTML.jpg)\n\
    \n这里的问题是数据库名称不正确。如果你拼写错了主机名，你会收到一条未知主机的消息。本节中的截图是由 MySQLi 生成的。PDO 会生成相同的消息，但还会包含错误编号和代码。\n\
    \n## 清洗来自数据库的文本结果\n\n在显示 SQL 查询结果时，你可以确信存储在特定类型列中的值将采用特定格式。例如，数字类型的列只能存储数字。同样，日期和时间相关的列只能以\
    \ ISO 日期时间格式存储值。然而，文本相关的列可以存储任何类型的字符串，包括 HTML、JavaScript 和其他可执行代码。在输出来自文本列的值时，你应该始终对其进行清洗，以防止任意代码被执行。\n\
    \n清洗文本输出的简单方法是将其传递给`htmlspecialchars()`。此函数与`htmlentities()`相关，但它将更有限范围的字符转换为其等效的\
    \ HTML 字符实体。具体来说，它会转换&符号、引号和尖括号；但会保留句点（点号）。这起到了在浏览器中显示时中和执行代码尝试的效果，因为`<script>`和\
    \ PHP 标签的尖括号被转换了。重要的是不要转换点号，因为它们用于我们想要显示的文件名中。\n\n`htmlspecialchars()`的缺点是默认情况下它会对现有的字符实体进行双重编码。结果，`&amp;`被转换为`&amp;amp;`。你可以通过将`false`作为第四个参数传递给`htmlspecialchars()`来关闭此默认行为。\n\
    \n每次调用`htmlspecialchars()`都输入四个参数很繁琐。因此，我在`ch13`文件夹中一个名为`utility_funcs.php`的文件里定义了以下自定义函数：\n\
    \n```\nfunction safe($text) {\nreturn htmlspecialchars($text, ENT_COMPAT|ENT_HTML5,\
    \ 'UTF-8', false);\n}\n```\n\n这简单地将`$text`传递给`htmlspecialchars()`，设置了三个可选参数，并返回结果。其他参数如下：\n\
    \n- `ENT_COMPAT|ENT_HTML5`：将双引号转换为实体，但保留单引号不变，并将输出视为 HTML5\n- `UTF-8`：将编码设置为 UTF-8\n\
    - `false`：关闭 HTML 字符实体的双重编码\n\n将`utility_funcs.php`复制到`includes`文件夹，并在从数据库输出文本的脚本中引入它。\n\
    \n作为`htmlspecialchars()`的替代方案，你可以将文本值传递给`strip_tags()`，它允许你指定允许的 HTML 标签（参见第 7\
    \ 章的“访问远程文件”）。\n\n## 查询数据库并显示结果\n\n在尝试显示数据库查询结果之前，最好先了解有多少条结果。如果没有结果，你将没有内容可显示。这也对于为长结果集创建分页导航系统是必要的（你将在下一章学习如何操作）。在用户认证中（第\
    \ 19 章介绍），搜索用户名和密码时没有结果意味着登录应失败。\n\nMySQLi 和 PDO 在计数和显示结果时使用不同的方法。接下来的两个 PHP 解决方案展示了如何使用\
    \ MySQLi 实现。对于 PDO，请跳到 PHP 解决方案 13-4。\n\n### PHP 解决方案 13-2: 统计结果集中的记录数 (MySQLi)\n\
    \n此 PHP 解决方案展示了如何提交一条选择`images`表中所有记录的 SQL 查询，并将结果存储在`MySQLi_Result`对象中。该对象的`num_rows`属性包含查询检索到的记录数。\n\
    \n1.  在`phpsols-4e`站点根目录中创建一个名为`mysqli`的新文件夹，然后在该文件夹内创建一个名为`mysqli.php`的新文件。该页面最终将用于显示一个表格，因此它应包含`DOCTYPE`声明和一个\
    \ HTML 骨架。\n\n2.  在`DOCTYPE`声明上方的 PHP 代码块中包含连接文件，并使用具有只读权限的账户连接到`phpsols`数据库，如下所示：\n\
    \n```\n    require_once '../includes/connection.php';\n    $conn = dbConnect('read');\n\
    ```\n\n3.  接下来，准备 SQL 查询。在上一步之后（但在结束 PHP 标签之前）立即添加以下代码：\n\n```\n    $sql = 'SELECT\
    \ * FROM images';\n```\n\n这意味着“从`images`表中选择所有内容”。星号（`*`）是“所有列”的简写。\n\n4.  现在通过调用连接对象的`query()`方法并将\
    \ SQL 查询作为参数传递来执行查询，如下所示：\n\n```\n    $result = $conn->query($sql);\n```\n\n结果存储在一个变量中，我将其直观地命名为`$result`。\n\
    \n5.  如果出现问题，`$result`将为`false`。要找出问题所在，我们需要获取错误信息，该信息存储为`mysqli`连接对象的`error`属性。在前一行之后添加以下条件语句：\n\
    \n```\n    if (!$result) {\n    $error = $conn->error;\n    }\n```\n\n6.  假设没有问题，`$result`现在持有一个`MySQLi_Result`对象，它有一个名为`num_rows`的属性。要获取查询找到的记录数，在条件语句中添加一个`else`块并将该值赋给一个变量，如下所示：\n\
    \n```\n    if (!$result) {\n    $error = $conn->error;\n    } else {\n    $numRows\
    \ = $result->num_rows;\n    }\n```\n\n7.  现在可以像这样在页面的主体中显示结果：\n\n```\n    $error\"\
    ;\n    } else {\n    echo \"共找到 $numRows 条记录。\";\n    }\n    ?>\n```\n\n如果出现问题，`$error`将被设置，因此会显示它。否则，`else`块显示找到的记录数。两个字符串都嵌入了变量，因此它们用双引号括起来。\n\
    \n8.  保存`mysqli.php`并在浏览器中加载它。你应该会看到以下结果：\n\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Fige_HTML.jpg](img/332054_4_En_13_Fige_HTML.jpg)\n\
    \n如有必要，请对照`ch13`文件夹中的`mysqli_01.php`检查你的代码。\n"
- fmt: "# PHP Solution 13-3: Displaying the `images` Table Using MySQLi\n\nThe most\
    \ common way to display the results of a `SELECT` query is to use a loop to extract\
    \ one row from the result set at a time. `MySQLi_Result` has a method called `fetch_assoc()`\
    \ that retrieves the current row as an associative array ready for display in\
    \ the web page. Each element in the array is named after the corresponding column\
    \ in the table.\n\nThis PHP solution shows how to loop through a `MySQLi_Result`\
    \ object to display the results of a `SELECT` query. Continue using the file from\
    \ PHP Solution 13-2.\n\n1.  Copy `utility_funcs.php` from the `ch13` folder to\
    \ the `includes` folder, and include it at the top of the script:\n\n    ```php\n\
    \    require_once '../includes/connection.php';\n    require_once '../includes/utility_funcs.php';\n\
    \    ```\n\n2.  Remove the closing curly brace at the end of the `else` block\
    \ in the body of the page (it should be around line 24). Although most of the\
    \ code to display the `images` table is HTML, it needs to be inside the `else`\
    \ block.\n\n3.  Insert a blank line after the closing PHP tag and add the closing\
    \ brace on the next line in a separate PHP block. The revised code should look\
    \ like this:\n\n    ```php\n    } else {\n    echo \"A total of $numRows records\
    \ were found.\";\n    ?>\n    ```\n\n4.  Add the following table between the two\
    \ PHP blocks in the main body of `mysqli.php` so that it’s controlled by the `else`\
    \ block. The reason for doing this is to prevent errors if the SQL query fails.\
    \ The PHP code that displays the result set is highlighted in bold.\n\n    ```php\n\
    \    image_id\n    filename\n    caption\n\n    fetch_assoc()) { ?>\n    ```\n\
    \n**Tip** The `while` loop iterates through the database result, using the `fetch_assoc()`\
    \ method to extract each record into `$row`. Each element of `$row` is displayed\
    \ in a table cell. The loop continues until `fetch_assoc()` comes to the end of\
    \ the result set.\n\nIt’s not necessary to sanitize the value of `image_id` because\
    \ it’s in a column that stores only integers.\n\n5.  Save `mysqli.php` and view\
    \ it in a browser. You should see the contents of the `images` table displayed\
    \ as shown in the following screenshot:\n\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figf_HTML.jpg](images/332054_4_En_13_Chapter/332054_4_En_13_Figf_HTML.jpg)\n\
    \nYou can compare your code, if necessary, with `mysql_02.php` in the `ch13` folder.\n\
    \n## MySQLi Connection Crib Sheet\n\nTable [13-1](#332054_4_En_13_Chapter.xhtml#Tab1)\
    \ summarizes the basic details of connection and database queries for MySQLi.\n\
    \n**Table 13-1.** Connection to MySQL/MariaDB with the MySQL Improved object-oriented\
    \ interface\n\n| Action | Usage | Comments |\n| --- | --- | --- |\n| Connect |\
    \ `$conn = new mysqli($h,$u,$p,$d);` | All arguments are optional; first four\
    \ always needed in practice: hostname, username, password, database name. Creates\
    \ connection object. |\n| Choose DB | `$conn->select_db('dbName');` | Used to\
    \ select a different database. |\n| Submit query | `$result = $conn->query($sql);`\
    \ | Returns result object. |\n| Count results | `$numRows = $result->num_rows;`\
    \ | Returns number of rows in result object. |\n| Extract record | `$row = $result->fetch_assoc();`\
    \ | Extracts current row from result object as associative array. |\n| Extract\
    \ record | `$row = $result->fetch_row();` | Extracts current row from result object\
    \ as indexed (numbered) array. |\n\n# PHP Solution 13-4: Counting Records in a\
    \ Result Set (PDO)\n\nPDO doesn’t have a direct equivalent to the MySQLi `num_rows`\
    \ property. With most databases you need to execute an SQL query to count the\
    \ number of items in the table and then fetch the result. However, the PDO `rowCount()`\
    \ method fulfills a dual purpose with both MySQL and MariaDB. Normally, it reports\
    \ only the number of rows affected by inserting, updating, or deleting records,\
    \ but with MySQL and MariaDB, it also reports the number of records found by a\
    \ `SELECT` query.\n\n1.  Create a new folder called `pdo` in the `phpsols-4e`\
    \ site. Then create a file called `pdo.php` in the folder you have just created.\
    \ The page will eventually be used to display a table, so it should have a `DOCTYPE`\
    \ declaration and an HTML skeleton.\n\n2.  Include the connection file in a PHP\
    \ block above the `DOCTYPE` declaration, then create a PDO connection to the `phpsols`\
    \ database using the read-only account, like this:\n\n    ```php\n    require_once\
    \ '../includes/connection.php';\n    $conn = dbConnect('read', 'pdo');\n    ```\n\
    \n3.  Next, prepare the SQL query:\n\n    ```php\n    $sql = 'SELECT * FROM images';\n\
    \    ```\n\n    This means “select every record in the `images` table.” The asterisk\
    \ (`*`) is shorthand for “all columns.”\n\n4.  Now execute the query and store\
    \ the result in a variable, like this:\n\n    ```php\n    $result = $conn->query($sql);\n\
    \    ```\n\n5.  To check if there’s a problem with the query, you can get an array\
    \ of error information from the database using the connection object’s `errorInfo()`\
    \ method. The third element of the array contains a brief description of the problem\
    \ if something goes wrong. Add the following code:\n\n    ```php\n    $error =\
    \ $conn->errorInfo()[2];\n    ```\n\n    We’re interested only in the third element,\
    \ so we can use the array dereferencing technique we encountered in PHP Solution\
    \ 7-1 (“Getting the contents of a text file”) by adding the array index in a pair\
    \ of square brackets immediately after the call to `$conn->errorInfo()` and assigning\
    \ the value to `$error`.\n\n6.  If the query is executed successfully, `$error`\
    \ will be `null`, which PHP treats as `false`. So, if there’s no error, we can\
    \ get the number of rows in the result set by calling the `rowCount()` method\
    \ on the `$result` object, like this:\n\n    ```php\n    if (!$error) {\n    $numRows\
    \ = $result->rowCount();\n    }\n    ```\n\n7.  You can now display the outcome\
    \ of the query in the body of the page, as follows:\n\n    ```php\n    $error\"\
    ;\n    } else {\n    echo \"A total of $numRows records were found.\";\n    }\n\
    \    ?>\n    ```\n\n8.  Save the page and load it into a browser. You should see\
    \ the same result as shown in step 8 of PHP Solution 13-2\\. Check your code,\
    \ if necessary, with `pdo_01.php`.\n\n## Counting Records with PDO in Other Databases\n\
    \nUsing the PDO `rowCount()` to report the number of items found by a `SELECT`\
    \ query works with both MySQL and MariaDB, but it cannot be guaranteed to work\
    \ on all other databases. If `rowCount()` doesn’t work, use the following code\
    \ instead:\n\n```php\n// prepare the SQL query\n$sql = 'SELECT COUNT(*) FROM images';\n\
    // submit the query and capture the result\n$result = $conn->query($sql);\n$error\
    \ = $conn->errorInfo()[2];\nif (!$error) {\n// find out how many records were\
    \ retrieved\n$numRows = $result->fetchColumn();\n// free the database resource\n\
    $result->closeCursor();\n}\n```\n\nThis uses the SQL `COUNT()` function with an\
    \ asterisk to count all items in the table. There’s only one result, so it can\
    \ be retrieved with the `fetchColumn()` method, which gets the first column from\
    \ a database result. After storing the result in `$numRows`, you must call the\
    \ `closeCursor()` method to free the database resource for any further queries.\n\
    \n# PHP Solution 13-5: Displaying the Images Table Using PDO\n\nTo display the\
    \ results of a `SELECT` query with PDO, you can use the `query()` method in a\
    \ `foreach` loop to extract the current row as an associative array. Each element\
    \ in the array is named after the corresponding column in the table.\n\nContinue\
    \ working with the same file as in the previous PHP solution.\n\n1.  Copy `utility_funcs.php`\
    \ from the `ch13` folder to the `includes` folder, and include it at the top of\
    \ the script:\n\n    ```php\n    require_once '../includes/connection.php';\n\
    \    require_once '../includes/utility_funcs.php';\n    ```"
