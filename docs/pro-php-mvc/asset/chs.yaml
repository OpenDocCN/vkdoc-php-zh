  3. 你能想到其他用户提交的数据，我们可以为其构建管理界面吗？\n\n### 答案\n\n1. 除了不将电子邮件地址和密码等项保留在 session 变量中这一已说明的安全优势外，它还能以增加数据库查询为代价，加快存储/检索速度。我们也可以使用缓存来减少这些额外的查询。\n\
