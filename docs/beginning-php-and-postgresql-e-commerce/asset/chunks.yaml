    • How to count or remove old shopping cart elements by building a simple shopping
    cart administration page. This is important because without this feature, the
    shopping_cart table keeps growing, filled with old temporary (and useless) carts.


    **Deleting Products Residing in the Shopping Cart**


    The catalog administration pages enable you to completely delete products from
    the catalog.


    Before removing a product, you should also remove its appearances in visitors’
    shopping carts.


    Update the catalog_delete_product function from the hatshop database by following
    these steps:


    **1.** Load pgAdmin III, and connect to the hatshop database.


    **2.** Click Tools ➤ Query tool (or click the SQL button on the toolbar). A new
    query window should appear.


    **3.** Use the query tool to execute this code, which updates the catalog_delete_product
    function from your hatshop database:


    -- Updates catalog_delete_product function


    CREATE OR REPLACE FUNCTION catalog_delete_product(INTEGER) RETURNS VOID LANGUAGE
    plpgsql AS $$


    DECLARE


    inProductId ALIAS FOR $1;


    BEGIN


    DELETE FROM product_category WHERE product_id = inProductId; **DELETE FROM shopping_cart
    WHERE product_id = inProductId;** DELETE FROM product WHERE product_id = inProductId;


