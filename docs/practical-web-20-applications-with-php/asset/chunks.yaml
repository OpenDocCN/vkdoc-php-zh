    **Linking the Thumbnailer to the Image Action Handler**


    Now that we have the capability to easily create image thumbnails, we must hook
    this into our web application. We will do this by making some simple modifications
    to the imageAction() function we created in Listing 11-16.


    We are going to provide the ability to specify the desired width and height in
    the URL, so it will be extremely simple to generate thumbnails as required. This
    means you can decide on the dimensions of the thumbnail in the templates that
    output the image, rather than having to hard-code these dimensions in your PHP
    code.


    Because users could potentially abuse a system that allows them to generate thumbnails
    of any size, we will add a mechanism to make it more difficult for this to occur.
    This mechanism works as follows:


    **1.** When an image is requested, the URL must include a parameter called a hash
    in addition to the image ID, width, and height. This parameter will be generated
    based on the ID, width, and height.


    **2.** The imageAction() method will check the supplied hash against what the
    hash should be for the combination of ID, width, and height.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


