    **Displaying the User’s Blog**


    Now that we know which user’s blog is being requested when the UserController
    class is invoked, we can load the relevant blog posts and display them. This works
    much like the blog index in the blog manager controller we created in Chapter
    6\. The key difference is in the presentation:


    • Only approved blog posts will ever be included in this controller. This applies
    to all actions, not just the index action.


    • The index page will only show recent blog posts (determined by the num_posts
    setting we implemented earlier in this chapter). All posts from previous months
    will be accessible using the archive links. Each month in the archive will have
    a unique URL.


    • Rather than seeing edit and delete buttons, users will see a link to view the
    full blog post.


    **Displaying the Blog Index Page**


    On the blog index page, we want to show recent posts, although this differs from
    the blog manager in that we must be wary of the following:


    • If we only show posts from the current month, there may be no content to display.
    This is especially true when a new month begins.


    • If we show all content from the current month, there may be too much content
    to display. If the user has been extremely active in the month, there could be
    30 or 40 posts, which could result in a long loading time for the page.


    • If we don’t show all of the posts from the current month, the viewer may not
    be able to access posts from earlier in the month.


    We are going to solve each of these problems by displaying only a limited number
    of posts on the user’s home page (based on the num_posts setting) and providing
    a link to the monthly archives.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


