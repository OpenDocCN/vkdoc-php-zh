  \n在 `printnewquiz.php` 中添加了一个 `print_r` 语句，用于显示数组的内容。\n\n![图 3-14 带数组的测验结果输出](img/323857_3_En_3_Fig14_HTML.jpg)\n\
  \n此拨号器表示在动态测验上通过 localhost 搜索的结果。\n\n**图 3-14** 带数组的测验结果输出\n\n从输出中我们可以看到，`answer`\
  \ 和 `quiz-submitted` 索引都被创建了。`answer` 索引的值为 `yes`，因为用户选择了这个答案。存储在 `quiz-submitted`\
