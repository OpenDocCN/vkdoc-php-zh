    **Using PostgreSQL to Store Web Site Data**


    Most of the data your visitors will see while browsing the web site will be retrieved
    from a relational database. A Relational Database Management System (RDBMS) is
    a complex software program, the purpose of which is to store, manage, and retrieve
    data as quickly and reliably as possible. For the HatShop web site, it will store
    all data regarding the products, departments, users, shopping carts, and so on.


    Many RDBMSs are available for you to use with PHP, including PostgreSQL, MySQL,
    Oracle, and so on. PostgreSQL is arguably the world’s most advanced open source
    database, and it’s a free, fast, and reliable database. Another important advantage
    is that many web hosting providers offer access to a PostgreSQL database, which
    makes your life easier when going live with your newly created e-commerce web
    site. We’ll use PostgreSQL as the backend database when developing the HatShop
    e-commerce web site.


    The language used to communicate with a relational database is SQL (Structured
    Query Language). However, each database engine recognizes a particular dialect
    of this language. If you decide to use a different RDBMS than PostgreSQL, you’ll
    probably need to update some of the SQL queries.


    Getting in Touch with PostgreSQL


    You talk with the database server by formulating an SQL query, sending it to the
    database engine, and retrieving the results. The SQL query can say anything related
    to the web site data, or its data structures, such as “give me the list of departments,”
    “remove product no. 223,”


    “create a data table,” or “search the catalog for yellow hats.”


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH02.qxd 11/8/06 9:33 AM Page 24


    **24**


    C H A P T E R 2 ■ L AY I N G O U T T H E F O U N D AT I O N S


    No matter what the SQL query says, we need a way to send it to PostgreSQL. PostgreSQL


    ships with a simple, text-based interface (named “psql”) that permits executing
    SQL queries and getting back the results. The command-line interface isn’t particularly
    easy to use, but it is functional. However, there are alternatives.


    Several free, third-party database administration tools allow you to manipulate
    data structures and execute SQL queries via an easy-to-use graphical interface.
    In this book, we’ll show you how to use pgAdmin III, which is an admin tool that
    ships together with PostgreSQL.


    Apart from needing to interact with PostgreSQL with a direct interface to its
    engine, you also need to learn how to access PostgreSQL programmatically, from
    PHP code. This requirement is obvious, because the e-commerce web site will need
    to query the database to retrieve catalog information (departments, categories,
    products, and so on) when building pages for the visitors.


    As for querying PostgreSQL databases through PHP code, the tool you’ll rely on
    here is PDO (PHP Data Objects).


    Implementing Database Integration Using PDO


    **PDO (PHP Data Objects)** is a native data-access abstraction library that ships
    with PHP 5.1'
