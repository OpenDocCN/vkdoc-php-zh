    and manage new databases, tables and the like. Default t is available at `http://localhost/phpmyadmin/`
    or `http://localhost/phpMyAdmin/`.


    However, we would like to try to create our new database directly within our PHP
    script:


    ```php

    <?php


    $mysqli=new mysqli(''localhost'',''root'','''');


    $result= $mysqli->query("CREATE DATABASE`test`;"); $mysqli->close();


    var_dump($result);


    ?>

    ```


    You already know the functions of connecting and disconnecting to the MySQL server.
    The new function in the example is `$mysqli->query`. By queries, you tell MySQL
    what to do. Such queries, as in our example, can also be commands or instructions
    to update something in our database. However, a result is always returned as to
    whether the request could be successfully executed.


    If you run the script more than once, you will receive a success message only
    on the first run, then there will be error messages indicating that the given
    database name has already been assigned.


    ## Select our database


    If we know what our database is called, we need to specify the script to use it:


    ```php

    <?php


    $mysqli=new mysqli(''localhost'',''root'','''', ''test'');


    ?>

    ```


    The database, which should be used, is defined as the last parameter. All following
    queries are now sent to the selected database.


    ## Create tables


    Now we want to create a table, for example, to store personal records:


    ```php

    <?php


    $mysqli=new mysqli(''localhost'',''root'', '''',''test''); $result = $mysqli->query("


    CREATE TABLE IF NOT EXISTS `persons` (


    `id` int(10) unsigned AUTO_INCREMENT,


    `firstname` varchar(50),


    `lastname` varchar(50),


    PRIMARY KEY (`id`)


    )"


    );


    var_dump($result);


    ?>

    ```


    This query is a bit more complex. We tell MySQL to create a table named `persons`,
    if it does not already exist. When creating the columns, we must already specify
    which type they will be. Unlike PHP, the database server must know exactly whether
    a value is a text, a number, a date or any other given type.


    We create the column ID of type `Integer(10)`. Integers are numbers without commas.
    The `unsigned` attribute means that no sign is to be stored, so there will be
    no minus sign.


    Furthermore, we use `AUTO_INCREMENT` to indicate that the ID column automatically
    increases by the value of 1 compared to the last highest entry when we insert
    a new row into the table. Thus, we have a consecutive number that we can use as
    the primary key as we specify it in the last line of the table. Each table must
    have a primary key. This must be unique for each table row so that the primary
    key allows you to always address a specific table row.


    The number ten in the brackets (10) defines that the number can have the length
    of maximum ten digits, so, the maximum number is 9,999,999,999.


    We also create a column for the first names and one for the last names of both
    the variable character (`VARCHAR`) types. This means that we do not yet know what
    the length of the string, to be stored, will be, but we limit it to a maximum
    of 50 characters. Alternatively, we could use the type, `TEXT`, which has no limitation
    on a certain number of characters but consumes considerably more memory.


