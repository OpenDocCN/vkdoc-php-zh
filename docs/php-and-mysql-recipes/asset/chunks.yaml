    array it’s the value from the array defined last in the request_order configuration.
    If the request_order is set to “GP” the value from the $_POST array will win.
    Setting it to “PG” will give you the value from the $_GET array.


    How it Works


    When a get request is performed without any parameters the $_GET array will be
    an empty array. When parameters are added to the URL each of the parameters will
    end up in the $_GET array as a key. The URL


    [ http://mydomain.com?p1=test&p2=123 w](http://mydomain.com/?p1=test&p2=123)ill
    produce the following values in the $_GET variable: Array (


    [p1] => test


    [p2] => 123


    )


    It is possible to use the same variable name multiple times, but only the last
    one is registered, as keys must be unique[. The URL http://mydomain.com?p1=test&p2=123&p1=abc
    , wher](http://mydomain.com/?p1=test&p2=123&p1=abc)e the parameter p1 is included
    twice with two different values will give these values in the $_GET array.


    Array (


    [p1] => abc


    [p2] => 123


    )


    Just like PHP can add elements to an array with the syntax $a[] = ‘abc’; it’s
    possible to generate elements in the $_GET array that contains an array of values[.
    The URL http://mydomain.com?p1[]=test&p2=123&p1[]=abc](http://mydomain.com/?p1%5B%5D=test&p2=123&p1%5B%5D=abc)


    will do just that.


    Array (


    [p1] => Array (


    [0] => test


    [1] => abc


    )


    [p2] => 123


    )


    CHAPTER 12 ■ WEB FUNDAMENTALS


    If you want to specify the keys in the array you can do that too. [ The URL http://mydomain.com?p1[a]=t](http://mydomain.com/?p1%5Ba%5D=test&p2=123&p1%5Bb%5D=abc)


    [est&p2=123&p1[b]=abc](http://mydomain.com/?p1%5Ba%5D=test&p2=123&p1%5Bb%5D=abc)
    will generate the keys a and b on the p1 element in the $_GET array.


    Array (


    [p1] => Array (


    [a] => test


    [b] => abc


    )


    [p2] => 123


    )


    Getting data into the $_POST array is a bit more complicated. Although it follows
    the exact same rules as the $_GET array it requires the user to submit a HTML
    form from a browser (or other client that can generate a POST request). This is
    one reason why POST requests are used or even preferred for API requests.


    Requiring a POST request will prevent a user from sending requests from a browser
    or the wget command-line tool. It can also make testing a bit more complicated.
    There is no real security in requiring a POST


    request but it makes it more difficult.


    Creating a post request in a browser starts with a HTML form and a button to submit
    the form. The form has two HTML components. The first is the form tag that wraps
    one or more input tags. The form tag has attributes to define the method (GET
    or POST) and an action. The action is the target URL that will receive the post.
    This can be an absolute or relative URL to the URL where the HTML document that
    included the form was loaded from, or it can be a URL on a completely different
    web site. A HTML form that can populate the $_POST array with similar values as
    in the previous examples could look like this:


    <form method="POST" action="/">


    <input name="p1[a]" type="text" />


    <input name="p1[b]" type="text" />


    <input name="p2" type="text" />


    <input type="submit" />


    </form>


    And the contents of the $_POST array will look like this:


    Array (


    [p1] => Array (


    [a] => abc


    [b] => def


    )


    [p2] => 123


    )


    It is not necessary to have a HTML form to create a POST request. This can be
    done with an Asynchronous Javascript and XML request (AJAX). This is described
    in more detail in a later section of this chapter.


    The same variable name can be used in the query string and the post body as shown
    in the next example:


    <form method="POST" action="/?p2=value">


    <input name="p1[a]" type="text" />


    <input name="p1[b]" type="text" />


    <input name="p2" type="text" />


    <input type="submit" />


    </form>


    CHAPTER 12 ■ WEB FUNDAMENTALS


    This will result in both the $_GET and $_POST arrays containing a value for p2.


    The contents of $_GET will look like this:


    Array (


    [p2] => value


    )


    And the $_POST array will still contain these values:


    Array (


    [p1] => Array (


    [a] => abc


    [b] => def


    )


    [p2] => 123


    )


