  trans: "\n# PHP 数组与枚举\n\n`foreach`循环与数组配合良好。前面的示例遍历了之前示例中展示的一维数值数组（`$class_array`），并显示每个值。`$value`代表循环当前在数组中查看的值。`foreach`循环不需要程序员编写检查数组末尾的代码，这消除了可能发生“越界”错误消息的任何可能性。此外，`foreach`循环会自动跳过数组中尚未声明的位置，这消除了在遍历数组时可能显示“空值”消息的情况。\n\
    \n有许多 PHP 函数可用于处理数组。让我们花点时间看几个例子。`array_merge()`可用于将一个或多个数组的内容追加到任何现有数组的末尾，或追加到已定义但当前不包含任何值的数组。\n\
    \n```\n$result = array_merge($color1, $color2);\n```\n\n`$color2`数组被合并到`$color1`数组的末尾，结果被放入新的`$result`数组中。原始数组不会改变。`print_r()`函数是一个方便的工具，它会显示数组`$result`的内容，如下所示。\n\
    \n```\nArray\n(\n[0] => red\n[1] => green\n[2] => blue\n[3] => yellow\n)\n```\n\
    \n您也可以使用*展开运算符*来合并两个数组。\n\n```\n$cars = [\"civic\", \"smart\", ...$more_cars,\
    \ \"tuson\"];\n```\n\n展开运算符（`...`）允许您将一个数组放置在另一个数组的任何位置。`var_dump()`函数是一个很好的工具，用于发现任何数组内部的内容以及数组中位置的数据类型。它比`print_r()`函数提供更多细节。`$cars`数组现在包含\n\
    \n```\narray(5) {\n[0]=>\nstring(5) \"civic\"\n[1]=>\nstring(5) \"smart\"\n[2]=>\n\
    string(5) \"falcon\"\n[3]=>\nstring(7) \"mustang\"\n[4]=>\nstring(5) \"tuson\"\
    \n}\n```\n\n## 枚举\n\n枚举（`enum`）是具有固定数量可能值的类型集合。例如，让我们定义一个包含某些允许食物类型的 `Food` 枚举。\n\
    \n```php\nenum Food {\n    case Hotdog;\n    case Fish;\n    case Steak;\n   \
    \ case Salad;\n}\n```\n\n声明后，您可以将枚举用作类型提示，以限制函数接受或返回的值。\n\n```php\nfunction eating(Food\
    \ $type) {\n    echo \"I like $type\";\n}\n```\n\n要传递值或返回值，您必须包含枚举及其值（使用 `::`），否则会产生错误。\n\
    有关枚举的更多信息，请访问 [`www.zend.com/blog/php-8-1`](http://www.zend.com/blog/php-8-1)\
    \ 。\n\n## 总结\n\n正如我们在本章开头所述，目标是向您介绍该语言的基本结构。我们回顾了函数、条件语句和变量的使用与创建。我们并不期望您现在就成为\
    \ PHP 专家。前面的章节还有很多，它们将构建您的知识。现在您已经有了基本理解，我们准备探索数据库的使用。我们将很快利用这些知识来构建一个博客系统。\n\n\
    ## 项目\n\n1.  创建一个包含您房屋或公寓信息的数值数组，包括卧室数量、浴室数量和街道地址。使用一种循环结构在格式良好的表格中输出信息。提示：您可以在\
    \ `print` 或 `echo` 语句中使用 HTML 和 CSS 代码来创建表格。\n\n2.  使用关联数组完成第 1 题。\n\n3.  修改第\
    \ 1 题，使其包含一个二维数组，该数组将包含您街道上的所有房屋或您公寓楼中的所有单元。要输出信息，您将需要两个嵌套循环。您可以提前浏览书中示例，或在您喜欢的网络搜索引擎中搜索“displaying\
    \ a php two-dimensional array”。\n\n---\n\n## 第二部分\n\n# 6. 数据库、MVC 与数据对象\n\n##\
    \ 目标\n\n完成本章后，您将能够\n\n*   理解如何创建 MySQL/MariaDB 数据库\n*   操作 MySQL/MariaDB 表中的数据\n\
    *   设计数据库表结构\n*   使用 PHP 与 MySQL/MariaDB 数据库进行安全交互\n"
- fmt: "# Organize PHP scripts with a model-view-controller approach\n\n# Create and\
    \ use PHP Data Objects\n\nModern websites are incredibly powerful, and much of\
    \ this power derives from their ability to store information. Storing information\
    \ creates highly customizable interactions between software and the user. These\
    \ interactions can range from entry-based blogs and commenting systems to high-powered\
    \ banking applications that handle sensitive transactions securely. This chapter\
    \ covers the basics of MySQL/MariaDB, a powerful, open source database platform.\
    \ We will also explore an object-oriented approach to accessing data within PHP\
    \ projects.\n\n> **Note**\n> \n> In 2009, Sun Microsystems purchased MySQL. Within\
    \ a brief period of time, Oracle purchased Sun Microsystems. There was a concern\
    \ that MySQL would not continue to be open source. Some of the developers of MySQL\
    \ banded together to create a free and open source database system, MariaDB, which\
    \ would be highly compatible with MySQL. While over the years, each product has\
    \ added additional features not replicated in the other product, the basic commands\
    \ and routines used to access and manipulate databases have remained the same.\
    \ Many WAMP, MAMP, and LAMP stack software packages actually include MariaDB instead\
    \ of MySQL (even though there is still a free version of MySQL available). Some\
    \ of these products even use commands and references which indicate the database\
    \ used is MySQL when it is actually MariaDB. However, since both products use\
    \ virtually the same commands to access and manipulate databases, the code shown\
    \ in this book and many others will work with either database system.\n\n# The\
    \ Basics of MySQL/MariaDB Data Storage\n\nMySQL/MariaDB is a relational database\
    \ management system that lets us store data in multiple tables. Each table contains\
    \ a set of named columns, and each row consists of a data entry into the table.\
    \ Tables will often contain information about other table entries. This allows\
    \ tables to be linked together using a value stored in both tables.\n\nWhen comparing\
    \ Tables [6-1](#323857_3_En_6_Chapter.xhtml#Tab1) and [6-2](#323857_3_En_6_Chapter.xhtml#Tab2),\
    \ the value in one table (`artist_id` in the artist table) can be associated with\
    \ the same value (`artist_id` in album table) in another table. `artist_id` in\
    \ the artist table is the *primary key* for that table as it uniquely identifies\
    \ each row. `artist_id` in the album table is the *secondary key* because it is\
    \ not used to uniquely identify the rows in the album table (`album_id` uniquely\
    \ identifies the rows; it is the primary key). However, it is used to link to\
    \ another table.\n\n**Table 6-2** The Album Table\n\n| album_id | artist_id |\
    \ album_name |\n|----------|-----------|------------|\n| 1        | 1        \
    \ | For Emma, Forever Ago |\n| 2        | 1         | Blood Bank - EP3 |\n| 3\
    \        | 2         | Let It Die |\n| 4        | 2         | The Reminder |\n\
    \n**Table 6-1** The Artist Table\n\n| artist_id | artist_name |\n|-----------|-------------|\n\
    | 1         | Bon Iver    |\n| 2         | Feist       |\n\nThe artist table includes\
    \ two columns. The first column, `artist_id`, stores a unique numerical identifier\
    \ for each artist. The second column, `artist_name`, stores the artist’s name.\n\
    \nThe album table stores a unique identifier for each album in the `album_id`\
    \ column and the album name in – you guessed it – the `album_name` column. The\
    \ album table includes a third column, `artist_id`, that relates the artist and\
    \ album tables. This column stores the unique artist identifier that corresponds\
    \ to the artist who recorded the album.\n\nAt first glance, it might seem like\
    \ a silly way of storing data. Why keep an abstract, incomprehensible number,\
    \ instead of simply writing the artist’s name for every album? Table [6-3](#323857_3_En_6_Chapter.xhtml#Tab3)\
    \ gives an example of why this is not a good idea.\n\n**Table 6-3** The Badly\
    \ Designed Album Table\n\n| album_id | artist | album_name |\n|----------|--------|------------|\n\
    | 1        | Bon Iver | For Emma, Forever Ago |\n| 2        | Bon Iver | Blood\
    \ Bank - EP3 |\n| 3        | Feist   | Let It Die |\n| 4        | fiest   | The\
    \ Reminder |\n\nDid you notice the spelling error for `album_id`? Because the\
    \ artist’s name is spelled out separately for every album, it is possible to store\
    \ different names for the same artist. In a tiny table with four entries, like\
    \ the one preceding, it is easy to spot and correct errors. But tables are rarely\
    \ that small in the real world. Imagine building a database for a music store.\
    \ We would have to keep track of thousands of albums.\n\nThis problem also demonstrates\
    \ the need to design databases in *third-normal form*. Without going into too\
    \ much detail, a database is in third-normal form if data redundancy is reduced,\
    \ and records can easily be uniquely identified. By creating an artist table,\
    \ we eliminate the need to duplicate the artist’s name in the album table. We\
    \ also eliminate the possibility that two artists might have the same name. Using\
    \ an artist id keeps each artist name unique, even if the spelling of the name\
    \ is the same. If we did not use an id, to uniquely identify an album row, we\
    \ would need to include both the album id and the artist’s name (hopefully spelled\
    \ correctly).  \nBy designing tables that store one piece of data once, and only\
    \ once, you design a robust database with data integrity. Joe Celko, a prominent\
    \ figure in the SQL community, has aptly coined the slogan “One simple fact, in\
    \ one place, one time.” Memorize that slogan and let your database tables follow\
    \ this one rule.\n\n# Manipulating Data with SQL\n\nWe can manipulate the data\
    \ in a MySQL/MariaDB table via the *Structured Query Language (SQL)*. SQL is a\
    \ language which manages data in a *relational database system*. A relational\
    \ database system (such as MySQL/MariaDB) formats data into tables and builds\
    \ relationships between the tables, using primary and secondary keys. In this\
    \ section, we will discover the basics of SQL, including the ability to create\
    \ a database, create tables, insert data, update data, and display data.\n\n*phpMyAdmin*\
    \ is provided in many WAMP, LAMP, and MAMP stacks to easily create and maintain\
    \ databases. In addition, other tools, such as *MySQL Workbench* (`www.mysql.com/products/workbench/`),\
    \ provide additional ways to design, develop, and secure MySQL/MariaDB databases.\
    \ We will start by looking at phpMyAdmin because it is included in the XAMPP stack.\
    \ But first, we must activate both Apache and MySQL from the XAMPP control panel.\n\
    \n![](images/323857_3_En_6_Chapter/323857_3_En_6_Fig1_HTML.jpg)\n\nA window shows\
    \ the modules of XAMPP control panel version 3.3.0, compiled on April 6th 2021.\
    \ The modules are service, module, PID(s), Port(s) and Actions.\n\n**Figure 6-1**\
    \ The XAMPP control panel\n\nTo start both Apache and MySQL, simply click the\
    \ start button to the right of each. Once they have properly started, each will\
    \ be highlighted in green, and the start button will change to a stop button.\
    \ If there are problems, the program will be highlighted in red, with error messages\
    \ displayed in the view box. If this occurs, copy the error message into a browser\
    \ to discover what others have done to fix the problem.\n\nWith MySQL and Apache\
    \ running, open a browser and navigate to `http://localhost/`. The XAMPP Dashboard\
    \ will display. On the menu of the dashboard, select phpMyAdmin to open the phpMyAdmin\
    \ control panel.\n\n![](images/323857_3_En_6_Chapter/323857_3_En_6_Fig2_HTML.jpg)\n\
    \nAn image of the phpMyAdmin application shows the server's general settings,\
    \ appearance settings and database server.\n\n**Figure 6-2** The phpMyAdmin control\
    \ panel\n\nWe are now ready to create our first MySQL/MariaDB database!"
