    \n`<a href=\"{\"admin.php?Page=Cart\"|prepare_link:\"https\"}\">CART ADMIN</a>\
    \ |`\n\n### Displaying Pending Orders\n\nIn the following pages, you’ll implement\
    \ the `admin_orders` componentized template and its supporting data tier and business\
    \ tier functionality. `admin_orders` is the componentized template that allows\
    \ the administrator to view the orders that have been placed on the web site.\n\
    \nBecause the orders list will become very long, it is important to have a few\
    \ well-chosen filtering options. The administrator will be able to select the\
    \ orders using the following criteria:\n\n- Show the most recent orders.\n- Show\
    \ orders that took place in a certain period of time.\n- Show orders with a specified\
    \ status value.\n\nOkay, now that you know what you want, let’s start writing\
    \ some code. You’ll start with the data tier.\n\n### Implementing the Data Tier\n\
    \nIn the following exercise, you’ll create the data tier functions one at a time,\
    \ and we’ll comment a little upon each one of them.\n\n#### Exercise: Implementing\
    \ the Functions\n\n1. Load pgAdmin III, and connect to the `hatshop` database.\n\
    2. Click **Tools** ➤ **Query tool** (or click the **SQL** button on the toolbar).\
    \ A new query window should appear.\n3. Use the query tool to execute this code,\
    \ which creates the `order_short_details` type and `orders_get_most_recent_orders`\
    \ function in your `hatshop` database:\n\n```sql\n-- Create order_short_details\
    \ type\nCREATE TYPE order_short_details AS\n(\n  order_id INTEGER,\n  total_amount\
    \ NUMERIC(10, 2),\n  created_on TIMESTAMP,\n  shipped_on TIMESTAMP,\n  status\
    \ INTEGER,\n  customer_name VARCHAR(50)\n);\n\n-- Create orders_get_most_recent_orders\
    \ function\nCREATE FUNCTION orders_get_most_recent_orders(INTEGER)\nRETURNS SETOF\
    \ order_short_details LANGUAGE plpgsql AS $$\nDECLARE\n  inHowMany ALIAS FOR $1;\n\
    \  outOrderShortDetailsRow order_short_details;\nBEGIN\n  FOR outOrderShortDetailsRow\
    \ IN\n    SELECT order_id, total_amount, created_on,\n           shipped_on, status,\
    \ customer_name\n    FROM orders\n    ORDER BY created_on DESC\n    LIMIT inHowMany\n\
    \  LOOP\n    RETURN NEXT outOrderShortDetailsRow;\n  END LOOP;\nEND;\n$$;\n```\n\
    \nThe `orders_get_most_recent_orders` function retrieves a list of the most recent\
    \ orders. The `SELECT` SQL statement used in this method uses the `LIMIT` clause\
    \ to limit the number of returned rows to `inHowMany` rows. The `ORDER BY` clause\
    \ is used to sort the results. The default sorting mode is ascending, but by adding\
    \ `DESC`, the descending sort mode is set (so the most recent orders will be listed\
    \ first).\n\n4. Use the query tool to execute this code, which creates the `orders_get_orders_between_dates`\
