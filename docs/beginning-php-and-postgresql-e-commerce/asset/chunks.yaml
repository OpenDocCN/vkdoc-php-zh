- fmt: "The alternative solution, and the one you’ll use when implementing HatShop,\
    \ can be described like this:\n\n1. **Open** a connection to the database the\
    \ first time you need to access the database during a request.\n\n2. **Execute**\
    \ all database functions (or SQL queries) through that connection without closing\
    \ it. Here you also need to handle any possible errors.\n\n3. **Close** the database\
    \ connection when the client request finishes processing.\n\nUsing this method,\
    \ all database operations that happen for a single client request (which happens\
    \ each time a user visits a new page of our site) will go through a single database\
    \ connection, avoiding opening and closing the connection each time you need something\
    \ from the database. You’ll still use persistent connections to improve the efficiency\
    \ of opening a new database connection for each client request.\n\nThis solution\
    \ is the one you will use for data access in the HatShop project.\n\n## Using\
    \ PHP PDO for Database Operations\n\nNow you should learn the theory about how\
    \ to put this in practice using PHP PDO. You’ll effectively write the code a bit\
    \ later, when building the added functionality into the web site.\n\nAs explained\
    \ in Chapter 2, you won’t access PostgreSQL through PHP’s PostgreSQL-specific\
    \ database functions but through a database abstraction layer (PHP PDO). The PDO\
    \ classes permit accessing various data sources using the same API (Application\
    \ Programming Interface), so you won’t need to change the PHP data access code\
    \ or learn different data-access techniques when working with database systems\
    \ other than PostgreSQL (but you might need to change the SQL code itself if the\
    \ database you migrate to uses a different dialect). Using PHP PDO makes your\
    \ life as a programmer easier in the long run.\n\nThe important PHP PDO class\
    \ you’ll work with is `PDO`, which provides methods for performing various database\
    \ operations.\n\n> **Note** In this book, you’ll learn about the PHP PDO functionality\
    \ as used in HatShop. For more details about PHP PDO, see the PHP Manual documentation\
    \ at http://www.php.net/manual/en/ref.pdo.php.\n\nThe `PDO` class provides the\
    \ functionality to connect to the PostgreSQL server and execute SQL queries. The\
    \ function that opens a database connection is `PDO`’s constructor, which receives\
    \ as parameters the connection string to the database server and an optional parameter\
    \ that specifies whether the connection is a persistent connection. The connection\
    \ string contains the data required to connect to the database server. You create\
    \ a new `PDO` object like this:\n\n```\n$dbh = new PDO('pgsql:dbname=' . $db_name\
    \ . ';host=' . $db_host, $db_user,\n$db_pass,\narray(PDO::ATTR_PERSISTENT => $persistent));\n\
    ```\n\n> **Note** The constructor of the `PDO` class returns an initialized database\
    \ connection object (which is specific to the type of database you’re connecting\
    \ to, such as `pgsql`) if the connection is successful; otherwise, an exception\
    \ is thrown.\n\nThe previous code snippet shows the standard data you need to\
    \ supply when connecting to a PostgreSQL server and uses five variables:\n\n-\
    \ `$db_user` represents the username.\n- `$db_pass` represents the user’s password.\n\
    - `$db_host` is the hostname of your PostgreSQL server.\n- `$db_name` is the name\
    \ of the database you’re connecting to.\n- `$persistent` is `true` if we want\
    \ to create a persistent database connection or `false` otherwise.\n\nTo disconnect\
    \ from the database, you need to make `$dbh = null`.\n\nThe following code snippet\
    \ demonstrates how to create, open, and then close a PostgreSQL database connection\
    \ and also catch any exceptions that are thrown:\n\n```\ntry\n{\n    // Open connection\n\
    \    $dbh = new PDO('pgsql:dbname=' . $db_name . ';host=' . $db_host, $db_user,\
    \ $db_pass);\n\n    // Close connection\n    $dbh = null;\n}\n```"
