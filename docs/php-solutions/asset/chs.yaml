- "# 处理数字\n\n作为一般规则，数字不应加引号，因为引号内的任何内容都是字符串。然而，MySQL 接受用引号括起来的数字，并将其视为等效的数字。务必将实数与由数字组成的其他数据类型区分开来。例如，日期由数字组成，但应括在引号中并存储在日期相关的列类型中。同样，电话号码应括在引号中并存储在文本相关的列类型中。\n\
  \n> **注意：** SQL 查询通常以分号结尾，这是指示数据库执行查询的指令。使用 PHP 时，必须从 SQL 语句中省略分号。因此，本书中的独立 SQL\
  \ 示例均不包含结尾分号。\n\n## 优化 SELECT 查询检索的数据\n\n到目前为止，您唯一运行过的 SQL 查询是从 `images` 表中检索所有记录。在大多数情况下，您希望更具选择性。\n\
  \n### 选择特定列\n\n使用星号选择所有列是一种方便的快捷方式，但通常您应该只指定所需的列。在 `SELECT` 关键字后列出以逗号分隔的列名。例如，此查询仅为每条记录选择\
  \ `filename` 和 `caption` 字段：\n\n`SELECT filename, caption FROM images`\n\n您可以在 `ch11`\
  \ 文件夹中的 `mysqli_03.php` 和 `pdo_03.php` 文件中测试此查询。\n\n### 更改结果的顺序\n\n要控制排序顺序，请添加一个\
  \ `ORDER BY` 子句，后跟按优先级顺序排列的列名。多个列名之间用逗号分隔。以下查询按字母顺序对 `images` 表中的标题进行排序（代码在 `mysqli_04.php`\
  \ 和 `pdo_04.php` 中）：\n\n`$sql = 'SELECT * FROM images ORDER BY caption';`\n\n> **注意：**\
  \ 此分号是 PHP 语句的一部分，而不是 SQL 查询的一部分。\n\n前面的查询产生以下输出：\n\n![A978-1-4842-0635-5_11_Figg_HTML.jpg](img/A978-1-4842-0635-5_11_Figg_HTML.jpg)\n\
  \n要反转排序顺序，请添加 `DESC`（表示“降序”）关键字，如下所示（在 `mysqli_05.php` 和 `pdo_05.php` 中有示例）：\n\n\
  `$sql = 'SELECT * FROM images ORDER BY caption DESC';`\n\n![A978-1-4842-0635-5_11_Figh_HTML.jpg](img/A978-1-4842-0635-5_11_Figh_HTML.jpg)\n\
  \n还有一个 `ASC`（表示“升序”）关键字。这是默认排序顺序，因此通常省略。\n\n但是，当同一个表中的列按不同顺序排序时，指定 `ASC` 可以提高清晰度。例如，如果您每天发布多篇文章，可以使用以下查询按字母顺序显示标题，但按发布日期排序，最新的在前：\n\
  \n`SELECT * FROM articles`  \n`ORDER BY published DESC, title ASC`\n\n### 搜索特定值\n\
  \n要搜索特定值，请在 `SELECT` 查询中添加一个 `WHERE` 子句。`WHERE` 子句位于表名之后。例如，`mysqli_06.php` 和 `pdo_06.php`\
  \ 中的查询如下所示：\n\n`$sql = 'SELECT * FROM images`  \n`WHERE image_id = 6';`\n\n> **注意：**\
  \ SQL 使用一个等号来测试相等性，这与 PHP 使用两个等号不同。\n\n它产生以下结果：\n\n![A978-1-4842-0635-5_11_Figi_HTML.jpg](img/A978-1-4842-0635-5_11_Figi_HTML.jpg)\n\
  \n除了测试相等性之外，`WHERE` 子句还可以使用比较运算符，例如大于 (`>`) 和小于 (`<`)。现在先不逐一介绍所有选项，我将在需要时介绍其他选项。第\
  \ 13 章全面总结了四个主要的 SQL 命令：`SELECT`、`INSERT`、`UPDATE` 和 `DELETE`，包括与 `WHERE` 一起使用的主要比较运算符列表。\n\
  \n如果与 `ORDER BY` 结合使用，`WHERE` 子句必须放在前面。例如（代码在 `mysqli_07.php` 和 `pdo_07.php` 中）：\n\
  \n`$sql = 'SELECT * FROM images`  \n`WHERE image_id > 5`  \n`ORDER BY caption DESC';`\n\
  \n这将选择 `image_id` 大于 5 的三张图片，并按标题降序排序。\n\n### 使用通配符搜索文本\n\n在 SQL 中，百分号（`%`）是一个通配符，可以匹配任何内容或不匹配任何内容。它在\
  \ `WHERE` 子句中与 `LIKE` 关键字结合使用。\n\n`mysqli_08.php` 和 `pdo_08.php` 中的查询如下所示：\n\n`$sql\
  \ = 'SELECT * FROM images`  \n`WHERE caption LIKE \"%Kyoto%\"';`\n\n它搜索 `images`\
  \ 表中所有 `caption` 列包含“Kyoto”的记录，并产生以下结果：\n\n![A978-1-4842-0635-5_11_Figj_HTML.jpg](img/A978-1-4842-0635-5_11_Figj_HTML.jpg)\n\
  \n如前面的屏幕截图所示，它从 `images` 表的八条记录中找到了六条。所有标题都以“Kyoto”结尾，因此结尾的通配符不匹配任何内容，而开头的通配符匹配每个标题的其余部分。\n\
  \n如果您省略开头的通配符（`\"Kyoto%\"`），查询将搜索以“Kyoto”开头的标题。没有标题以它开头，因此您将无法获得任何搜索结果。\n\n`mysqli_09.php`\
  \ 和 `pdo_09.php` 中的查询如下所示：\n\n`$sql = 'SELECT * FROM images`  \n`WHERE caption LIKE\
  \ \"%maiko%\"';`\n\n它产生以下结果：\n\n![A978-1-4842-0635-5_11_Figk_HTML.jpg](img/A978-1-4842-0635-5_11_Figk_HTML.jpg)\n\
  \n该查询将“maiko”全部拼写为小写，但查询也找到了首字母大写的记录。使用 `LIKE` 进行通配符搜索不区分大小写。\n\n要执行区分大小写的搜索，您需要添加\
  \ `BINARY` 关键字，如下所示（代码在 `mysqli_10.php` 和 `pdo_10.php` 中）：\n\n`$sql = 'SELECT *\
  \ FROM images`  \n`WHERE caption LIKE BINARY \"%maiko%\"';`\n\n到目前为止，您看到的所有示例都是硬编码的，但大多数情况下，SQL\
  \ 查询中使用的值需要来自用户输入。除非您非常小心，否则这会使您面临称为 SQL 注入的恶意攻击风险。本章的其余部分将解释这种危险以及如何避免它。\n\n\n\n"
- "# 理解 SQL 注入的危险\n\nSQL 注入与我在第 5 章中警告过的邮件头注入非常相似。注入攻击试图在 SQL 查询中插入虚假条件，从而暴露或破坏你的数据。以下查询的含义应该很容易理解：\n\
  \n```\nSELECT * FROM users WHERE username = 'xyz' AND pwd = 'abc'\n```\n\n这是登录应用程序的基本模式。如果查询找到了一个记录，其中\
  \ `username` 为 `xyz` 且 `pwd` 为 `abc`，你就知道提交了正确的用户名和密码组合，因此登录成功。攻击者需要做的只是注入一个额外的条件，就像这样：\n\
  \n```\nSELECT * FROM users WHERE username = 'xyz' AND pwd = 'abc' OR 1 = 1\n```\n\
  \n`OR` 意味着只需要其中一个条件为真，因此即使没有正确的用户名和密码，登录也会成功。SQL 注入依赖于引号和其他控制字符在查询部分来自变量或用户输入时没有被正确转义。\n\
  \n根据具体情况，你可以采用多种策略来防止 SQL 注入：\n\n*   如果变量是整数（例如，记录的主键），使用 `is_numeric()` 和 `(int)`\
  \ 类型转换运算符，确保其在插入查询时是安全的。\n*   如果使用 MySQLi，在将每个变量插入查询之前，将其传递给 `real_escape_string()`\
  \ 方法。\n*   与 `real_escape_string()` 对应的 PDO 方法是 `quote()`，但它并非适用于所有数据库。PDO 文档建议不要使用\
  \ `quote()`，强烈推荐改用预处理语句。\n*   使用预处理语句。在预处理语句中，SQL 查询中的占位符代表来自用户输入的值。PHP 代码会自动将字符串包裹在引号中，并转义嵌入的引号和其他控制字符。MySQLi\
  \ 和 PDO 的语法不同。\n*   上述策略均不适用于列名，因为列名不能放在引号中。要对列名使用变量，需创建一个可接受值的数组，并在将提交的值插入查询之前检查该值是否在数组中。\n\
  \n除了 `quote()` 之外，我们来看一下每种技术的使用方法。\n\n## PHP 解决方案 11-6：将用户输入的整数插入到查询中\n\n此 PHP 解决方案演示了如何在将来自用户输入的变量插入\
  \ SQL 查询之前，对其进行清理以确保其仅包含整数。该技术对于 MySQLi 和 PDO 是相同的。\n\n从 `ch11` 文件夹中将 `mysqli_integer_01.php`\
  \ 或 `pdo_integer_01.php` 复制到 `mysqli` 或 `pdo` 文件夹。每个文件都包含一个 SQL 查询，用于从 `images`\
  \ 表中选择 `image_id` 和 `filename` 列。在页面主体中，有一个带有下拉菜单的表单，该菜单由一个循环填充，循环遍历 SQL 查询的结果。MySQLi\
  \ 版本如下所示：\n\n```php\n<form action=\"\" method=\"get\">\n\n<select name=\"image_id\"\
  >\n\n<?php while ($row = $images->fetch_assoc()) { ?>\n\n<option value=\"<?= $row['image_id'];\
  \ ?>\"\n\n<?php if (isset($_GET['image_id']) &&\n\n$_GET['image_id'] == $row['image_id'])\
  \ {\n\necho 'selected';\n\n} ?>\n\n><?= $row['filename']; ?></option>\n\n<?php }\
  \ ?>\n\n</select>\n\n<input type=\"submit\" name=\"go\" value=\"Display\">\n\n</form>\n\
  ```\n\n*   表单使用 `get` 方法，并将 `image_id` 赋值给 `<option>` 标签的 `value` 属性。如果 `$_GET['image_id']`\
  \ 与 `$row['image_id']` 的值相同，则当前 `image_id` 与通过页面查询字符串传递的相同，因此会向开头的 `<option>` 标签添加\
  \ `selected` 属性。`$row['filename']` 的值会被插入到开头的 `<option>` 和结尾的 `</option>` 标签之间。\n\
  *   PDO 版本是相同的，只是它使用 PDO 的 `fetch()` 方法直接在 `foreach` 循环中运行查询。\n*   如果将页面加载到浏览器中，你会看到一个下拉菜单，其中列出了\
  \ `images` 文件夹中的文件，效果如下：\n\n![A978-1-4842-0635-5_11_Figl_HTML.jpg](img/A978-1-4842-0635-5_11_Figl_HTML.jpg)\n\
  \n在 `</form>` 标签之后立即插入以下代码。除了一行代码之外，该代码对于 MySQLi 和 PDO 是相同的。\n\n```php\n<?php\n\n\
  if (isset($_GET['image_id'])) {\n\nif (!is_numeric($_GET['image_id'])) {\n\n$image_id\
  \ = 1;\n\n} else {\n\n$image_id = (int) $_GET['image_id'];\n\n}\n\n$sql = \"SELECT\
  \ filename, caption FROM images\n\nWHERE image_id = $image_id\";\n\n$result = $conn->query($sql);\n\
  \n$row = $result->fetch_assoc();\n\n?>\n\n<figure><img src=\"../images/<?= $row['filename'];\
  \ ?>\">\n\n<figcaption><?= $row['caption']; ?></figcaption>\n\n</figure>\n\n<?php\
  \ } ?>\n```\n\n如果你使用的是 PDO 版本，请找到这一行：\n\n*   条件语句检查 `image_id` 是否通过 `$_GET` 数组发送。如果是，下一个条件语句使用逻辑非运算符与\
  \ `is_numeric()` 来检查它是否不是数字。`is_numeric()` 函数应用了严格测试，只接受数字或数字字符串。如果值以数字开头，它不会尝试将其转换为数字。\n\
  *   如果通过查询字符串提交的值不是数字，则会将默认值赋给一个名为 `$image_id` 的新变量。然而，如果 `$_GET['image_id']` 是数字，则使用\
  \ `(int)` 类型转换运算符将其赋值给 `$image_id`。使用类型转换运算符是一项额外的预防措施，以防有人通过提交浮点数来探测脚本的错误信息。\n\
  *   既然你知道 `$image_id` 是一个整数，将其直接插入 SQL 查询是安全的。因为它是一个数字，所以不需要用引号包裹，但赋值给 `$sql` 的字符串需要使用双引号，以确保\
  \ `$image_id` 的值被插入到查询中。\n*   新查询通过 `query()` 方法提交给 MySQL，结果存储在 `$row` 中。最后，`$row['filename']`\
  \ 和 `$row['caption']` 用于在页面中显示图像及其标题。\n\n`$row = $result->fetch_assoc();`\n\n将其更改为：\n\
  \n```php\n$row = $result->fetch();\n```\n\n\n\n保存页面并在浏览器中加载。页面首次加载时，只显示下拉菜单。从下拉菜单中选择一个文件名，然后点击“Display”。您选择的图像应显示出来，如下面的截图所示：\n\
  \n![A978-1-4842-0635-5_11_Figm_HTML.jpg](img/A978-1-4842-0635-5_11_Figm_HTML.jpg)\n\
  \n- 像这样修改 MySQLi 的代码：\n\n在浏览器中编辑查询字符串，将 `image_id` 的值改为一个字符串，或以数字开头的字符串。您应该会看到 `basin.jpg`，其\
  \ `image_id` 为 1。尝试一个介于 1.0 和 8.9 之间的浮点数。相关图像会正常显示。尝试一个超出 1 到 8 范围的数字。由于查询本身没有问题，因此不会显示错误消息。它只是在寻找一个不存在的值。在这个示例中，这无关紧要，但通常情况下，您应该使用\
  \ MySQLi 的 `num_rows` 属性或 PDO 的 `rowCount()` 方法来检查查询返回的行数。\n\n- 如果遇到问题，请对照 `ch11`\
  \ 文件夹中的 `mysqli_integer_02.php` 或 `pdo_integer_02.php` 检查您的代码。\n\n```\n$result =\
  \ $conn->query($sql);\nif ($result->num_rows) {\n$row = $result->fetch_assoc();\n\
  ?>\n<figure><img src=\"../images/<?= $row['filename']; ?>\">\n<figcaption><?= $row['caption'];\
  \ ?></figcaption>\n</figure>\n<?php } else { ?>\n<p>Image not found</p>\n<?php }\n\
  } ?>\n```\n\n再次测试页面。当您从下拉菜单中选择图像时，它会像以前一样正常显示。但如果您在查询字符串中输入一个超出范围的值，则会看到以下信息：\n\n\
  - 对于 PDO，使用 `$result->rowCount()` 代替 `$result->num_rows`。\n- 如果查询没有返回任何行，PHP 会将\
  \ 0 隐式视为 `false`，因此条件判断失败，转而执行 `else` 子句。\n\n![A978-1-4842-0635-5_11_Fign_HTML.jpg](img/A978-1-4842-0635-5_11_Fign_HTML.jpg)\n\
  \n修改后的代码位于 `ch11` 文件夹中的 `mysqli_integer_03.php` 和 `pdo_integer_03.php`。\n\n### PHP\
  \ 解决方案 11-7：使用 `real_escape_string()` 在 MySQLi 中插入字符串\n\n本 PHP 解决方案展示了如何使用 MySQLi\
  \ 的 `real_escape_string()` 方法将搜索表单中的值插入到 SQL 查询中。除了处理单引号和双引号之外，它还会转义其他控制字符，例如换行符和回车符。\n\
  \n提示\n\n仅当需要将来自外部源的一两个字符串值插入到查询中，或者该查询仅使用一次时，此 MySQLi 专属技术才更有用。对于更复杂的查询，请使用准备好的语句，如下一节所述。要在\
  \ PDO 中嵌入字符串，始终建议使用准备好的语句。\n\n从 `ch11` 文件夹复制 `mysqli_real_escape_01.php`，并将其保存到\
  \ `mysqli` 文件夹中，命名为 `mysql_real_escape.php`。该文件包含一个搜索表单和一个用于显示结果的表格。在 `DOCTYPE`\
  \ 声明之上的 PHP 代码块中添加以下代码：\n\n```\nif (isset($_GET['go'])) {\nrequire_once '../includes/connection.php';\n\
  $conn = dbConnect('read');\n$searchterm = '%' . $conn->real_escape_string($_GET['search'])\
  \ . '%';\n}\n```\n\n在下一行（右花括号之前）添加 `SELECT` 查询：\n\n```\n$sql = \"SELECT * FROM images\
  \ WHERE caption LIKE '$searchterm'\";\n```\n\n- 如果表单已提交，这将包含连接文件并为只读用户帐户建立连接。然后，将\
  \ `$_GET['search']` 传递给连接对象的 `real_escape_string()` 方法，使其能够安全地合并到 SQL 查询中，并在结果两端连接\
  \ `%` 通配符，然后将结果赋值给 `$searchterm`。因此，如果通过搜索表单提交的值是“hello”，则 `$searchterm` 变为 `%hello%`。\n\
  \n执行查询并通过在前一行之后添加以下代码来获取返回的行数：\n\n- 整个查询被包裹在双引号中，以便包含 `$searchterm` 的值。但是，`$searchterm`\
  \ 包含一个字符串，因此它也需要用引号包裹。为避免冲突，请在 `$searchterm` 周围使用单引号。\n\n```\n$result = $conn->query($sql);\n\
  if (!$result) {\n$error = $conn->error;\n} else {\n$numRows = $result->num_rows;\n\
  }\n```\n\n在表单上方插入一个 PHP 代码块，以在查询出现问题时显示错误消息：\n\n```html\n<body>\n<?php\nif (isset($error))\
  \ {\necho \"<p>$error</p>\";\n}\n?>\n<form method=\"get\" action=\"\">\n```\n\n\
  在表单之后，添加显示结果的 PHP 代码：\n\n```html\n</form>\n<?php if (isset($numRows)) { ?>\n<p>Number\
  \ of results for <b><?= htmlentities($_GET['search']); ?></b>:\n<?= $numRows; ?></p>\n\
  <?php if ($numRows) { ?>\n<table>\n<tr>\n<th>image_id</th>\n<th>filename</th>\n\
  <th>caption</th>\n</tr>\n<?php while ($row = $result->fetch_assoc()) { ?>\n<tr>\n\
  <td><?= $row['image_id']; ?></td>\n<td><?= $row['filename']; ?></td>\n<td><?= $row['caption'];\
  \ ?></td>\n</tr>\n<?php } ?>\n</table>\n<?php }\n} ?>\n</body>\n```\n\n- 第一个条件语句包裹了段落和表格，如果\
  \ `$numRows` 不存在（这在页面首次加载时发生），则阻止显示它们。如果表单已提交，则会设置 `$numRows`，因此搜索词会使用 `htmlentities()`（参见第\
  \ 5 章）重新显示，并且 `$numRows` 的值报告匹配的数量。\n- 如果查询未返回任何结果，则 `$numRows` 为 0，该值被视为 `false`，因此表格不会显示。如果\
  \ `$numRows` 包含除 0 以外的任何值，则显示表格，并且 `while` 循环显示查询结果。\n\n![A978-1-4842-0635-5_11_Figo_HTML.jpg](img/A978-1-4842-0635-5_11_Figo_HTML.jpg)\n\
  \n您可以将代码与 `ch11` 文件夹中的 `mysqli_real_escape_02.php` 进行对照。\n\n注意\n\n如果您在搜索字段中未输入任何内容就单击“`Search`”按钮，则会显示所有记录。这是因为搜索词变为\
  \ `%%`，它可以匹配任何内容。如果您不希望发生这种情况，可以使用 `empty()` 函数来测试 `$_GET['search']` 是否有值。\n\n尽管\
  \ `real_escape_string()` 会转义提交值中的引号和其他控制字符，您仍然需要在 SQL 查询中用引号包裹字符串。`LIKE` 关键字后必须始终跟一个字符串，即使搜索词仅限于数字也是如此。\n\
  \n\n\n## 对用户输入使用预处理语句\n\n`MySQLi` 和 `PDO` 都支持预处理语句，这提供了重要的安全特性。预处理语句是 SQL 查询的一个模板，它为每个可变的值包含一个占位符。这不仅使得在\
  \ PHP 代码中嵌入变量更加容易，还能防止 SQL 注入攻击，因为在查询执行之前，引号和其他字符会被自动转义。\n\n使用预处理语句的其他优点是，当相同的查询被多次使用时，它们更加高效。此外，你可以将\
  \ `SELECT` 查询中每一列的结果绑定到命名变量，从而更容易地显示输出。\n\n`MySQLi` 和 `PDO` 都使用问号作为匿名占位符，如下所示：\n\
  \n`$sql = 'SELECT image_id, filename, caption FROM images WHERE caption LIKE ?';`\n\
  \n`PDO` 也支持命名占位符的使用。命名占位符以冒号开头，后跟一个标识符，如下所示：\n\n`$sql = 'SELECT image_id, filename,\
  \ caption FROM images WHERE caption LIKE :search';`\n\n**注意**：即使占位符代表的值是字符串，它们也不需要用引号包裹。这使得构建\
  \ SQL 查询更加容易，因为无需担心单引号和双引号的正确组合。\n\n占位符仅能用于列值。它们不能用于 SQL 查询的其他部分，例如列名或运算符。这是因为当\
  \ SQL 执行时，包含非数字字符的值会被自动转义并用引号包裹。列名和运算符不能放在引号中。\n\n预处理语句所需的代码比直接提交查询略多，但占位符使 SQL\
  \ 更易于阅读和编写，并且该过程更安全。\n\n`MySQLi` 和 `PDO` 的语法不同，因此接下来的部分将分别讨论它们。\n\n### 在 MySQLi\
  \ 预处理语句中嵌入变量\n\n使用 `MySQLi` 预处理语句涉及几个阶段。\n\n#### 初始化语句\n\n要初始化预处理语句，请在数据库连接上调用 `stmt_init()`\
  \ 方法，并将其存储在一个变量中，如下所示：\n\n`$stmt = $conn->stmt_init();`\n\n#### 准备语句\n\n然后，将 SQL\
  \ 查询传递给语句的 `prepare()` 方法。这会检查你是否在错误的位置使用了问号占位符，并确保当所有内容组合在一起时，查询是有效的 SQL。\n\n如果有任何错误，`prepare()`\
  \ 方法会返回 `false`，因此通常将后续步骤包含在条件语句中，以确保它们仅在一切正常时才运行。\n\n可以通过语句的 `error` 属性访问错误消息。\n\
  \n### 将值绑定到占位符\n\n用变量中的实际值替换问号，在技术术语中称为绑定参数。正是这一步保护你的数据库免受 SQL 注入。\n\n按照希望它们插入到\
  \ SQL 查询中的相同顺序，将变量传递给语句的 `bind_param()` 方法，同时第一个参数指定每个变量的数据类型，同样按照与变量相同的顺序。数据类型必须由以下四个字符之一指定：\n\
  \n- `b`：二进制（例如图像、Word 文档或 PDF 文件）\n- `d`：双精度（浮点数）\n- `i`：整数（整数）\n- `s`：字符串（文本）\n\
  \n传递给 `bind_param()` 的变量数量必须与问号占位符的数量完全相同。例如，要传递一个字符串值，请使用以下代码：\n\n`$stmt->bind_param('s',\
  \ $_GET['words']);`\n\n要传递两个值，`SELECT` 查询需要两个问号作为占位符，并且两个变量都需要使用 `bind_param()`\
  \ 进行绑定，如下所示：\n\n```\n$sql = 'SELECT * FROM products WHERE price < ? AND type = ?';\n\
  $stmt = $conn->stmt_init();\n$stmt->prepare($sql);\n$stmt->bind_param('ds', $_GET['price'],\
  \ $_GET['type']);\n```\n\n`bind_param()` 的第一个参数 `'ds'` 指定 `$_GET['price']` 为浮点数，`$_GET['type']`\
  \ 为字符串。\n\n### 执行语句\n\n一旦语句准备好并且值已绑定到占位符，就调用语句的 `execute()` 方法。然后可以从语句对象中获取 `SELECT`\
  \ 查询的结果。对于其他类型的查询，这就是过程的结束。\n\n### 绑定结果（可选）\n\n可选地，你可以使用 `bind_result()` 方法将 `SELECT`\
  \ 查询的结果绑定到变量。这避免了解析每一行然后以 `$row['column_name']` 的形式访问结果。\n\n要绑定结果，你必须在 `SELECT`\
  \ 查询中具体指定每一列的名称。按照相同的顺序列出你想要使用的变量，并将它们作为参数传递给 `bind_result()`。例如，假设你的 SQL 如下所示：\n\
  \n`$sql = 'SELECT image_id, filename, caption FROM images WHERE caption LIKE ?';`\n\
  \n要绑定查询的结果，请使用以下代码：\n\n`$stmt->bind_result($image_id, $filename, $caption);`\n\n\
  这允许你直接以 `$image_id`、`$filename` 和 `$caption` 的形式访问结果。\n\n#### 存储结果（可选）\n\n当你对 `SELECT`\
  \ 查询使用预处理语句时，结果是无缓冲的。这意味着它们会保留在数据库服务器上，直到你获取它们。这样做的好处是占用更少的内存，特别是当结果集包含大量行时。然而，无缓冲结果施加了以下限制：\n\
  \n- 一旦结果被获取，它们就不再存储在内存中。因此，你不能多次使用同一个结果集。\n- 在所有的结果被获取或清除之前，你不能在同一数据库连接上运行另一个查询。\n\
  - 你不能使用 `num_rows` 属性来查找结果集中有多少行。\n- 你不能使用 `data_seek()` 来移动到结果集中的特定行。\n\n为避免这些限制，你可以使用语句的\
  \ `store_result()` 方法选择性地存储结果集。但是，如果你只是想立即显示结果而不在之后重复使用，则无需先存储它。\n\n**注意**：要清除无缓冲结果，请调用语句的\
  \ `free_result()` 方法。\n\n### 获取结果\n\n要遍历使用预处理语句执行的 `SELECT` 查询的结果，可以使用 `fetch()`\
  \ 方法。如果已经将结果绑定到变量，请这样做：\n\n```\nwhile ($stmt->fetch()) {\n    // 显示每一行绑定的变量\n}\n\
  ```\n\n如果你没有将结果绑定到变量，请使用 `$row = $stmt->fetch()` 并以 `$row['column_name']` 的形式访问每个变量。\n\
  \n#### 关闭语句\n\n当你完成预处理语句的使用后，`close()` 方法会释放所使用的内存。\n\n\n\n#### PHP 解决方案 11-8：在搜索中使用\
  \ MySQLi 预处理语句\n\n本 PHP 解决方案演示了如何在 `SELECT` 查询中使用 MySQLi 预处理语句，并展示了如何将结果绑定到命名变量。\n\
  \n从 `ch11` 文件夹中复制 `mysqli_prepared_01.php`，并将其保存到 `mysqli` 文件夹中，重命名为 `mysqli_prepared.php`。该文件包含的搜索表单和结果表格与\
  \ PHP 解决方案 11-7 中使用的相同。在 `DOCTYPE` 声明上方的 PHP 代码块中，创建一个条件语句，以便在提交搜索表单时引入 `connection.php`\
  \ 并创建只读连接。代码如下所示：\n\n```\nif (isset($_GET['go'])) {\n    require_once '../includes/connection.php';\n\
  \    $conn = dbConnect('read');\n}\n```\n\n接下来，在条件语句内部添加 SQL 查询。查询需要指定要从 `images`\
  \ 表中检索的三个列的名称。使用问号作为搜索词的占位符，如下所示：\n\n```\n$sql = 'SELECT image_id, filename, caption\
  \ FROM images\n        WHERE caption LIKE ?';\n```\n\n在将用户提交的搜索词传递给 `bind_param()`\
  \ 方法之前，需要为其添加通配符，并赋值给一个新变量，如下所示：\n\n```\n$searchterm = '%'. $_GET['search'] .'%';\n\
  ```\n\n现在可以创建预处理语句了。`DOCTYPE` 声明上方 PHP 代码块中的完成代码如下所示：\n\n```\nif (isset($_GET['go']))\
  \ {\n    require_once '../includes/connection.inc.php';\n    $conn = dbConnect('read');\n\
  \    $sql = 'SELECT image_id, filename, caption FROM images\n            WHERE caption\
  \ LIKE ?';\n    $searchterm = '%'. $_GET['search'] .'%';\n    $stmt = $conn->stmt_init();\n\
  \    if ($stmt->prepare($sql)) {\n        $stmt->bind_param('s', $searchterm);\n\
  \        $stmt->execute();\n        $stmt->bind_result($image_id, $filename, $caption);\n\
  \        $stmt->store_result();\n        $numRows = $stmt->num_rows;\n    } else\
  \ {\n        $error = $stmt->error;\n    }\n}\n```\n\n在 `<body>` 开始标签后添加一个条件语句，以便在出现问题时显示错误消息：\n\
  \n- 这将初始化预处理语句并将其赋值给 `$stmt`。然后将 SQL 查询传递给 `prepare()` 方法，该方法检查查询语法的有效性。如果语法有问题，`else`\
  \ 块会将错误消息赋值给 `$error`。如果语法无误，则执行条件语句中的其余脚本。\n- 条件语句中的第一行将 `$searchterm` 绑定到 `SELECT`\
  \ 查询，替换问号占位符。第一个参数告诉预处理语句将其视为字符串。\n- 执行预处理语句后，下一行将 `SELECT` 查询的结果绑定到 `$image_id`、`$filename`\
  \ 和 `$caption`。这些变量必须与查询中的顺序一致。我这里用它们代表的列名来命名变量，但你可以使用任何你想要的变量名。\n- 然后存储结果。请注意，只需调用语句对象的\
  \ `store_result()` 方法即可存储结果。与使用 `query()` 不同，你无需将 `store_result()` 的返回值赋值给变量。如果赋值，其值仅根据结果是否成功存储而为\
  \ `true` 或 `false`。\n- 最后，通过语句对象的 `num_rows` 属性获取查询检索到的行数，并存储在 `$numRows` 中。\n\n\
  ```\n<?php\nif (isset($error)) {\n    echo \"<p>$error</p>\";\n}\n?>\n```\n\n在搜索表单后添加以下代码以显示结果：\n\
  \n```\n<?php if (isset($numRows)) { ?>\n<p>针对 <b><?= htmlentities($_GET['search']);\
  \ ?></b> 的结果数量：<?= $numRows; ?></p>\n<?php if ($numRows) { ?>\n<table>\n<tr>\n<th>image_id</th>\n\
  <th>filename</th>\n<th>caption</th>\n</tr>\n<?php while ($stmt->fetch()) { ?>\n\
  <tr>\n<td><?= $image_id; ?></td>\n<td><?= $filename; ?></td>\n<td><?= $caption;\
  \ ?></td>\n</tr>\n<?php } ?>\n</table>\n<?php }\n} ?>\n```\n\n- 这段代码大部分与 PHP 解决方案\
  \ 11-7 中使用的代码相同。区别在于显示结果的 `while` 循环。它不再对结果对象使用 `fetch_assoc()` 方法并将结果存储在 `$row`\
  \ 中，而是直接调用预处理语句的 `fetch()` 方法。无需将当前记录存储为 `$row`，因为各列的值已绑定到 `$image_id`、`$filename`\
  \ 和 `$caption`。\n\n你可以将自己的代码与 `ch11` 文件夹中的 `mysqli_prepared_02.php` 进行比较。\n\n###\
  \ 在 PDO 预处理语句中嵌入变量\n\nPDO 预处理语句提供了匿名和命名占位符两种选择。\n\n#### 使用匿名占位符\n\n匿名占位符使用问号，方式与\
  \ MySQLi 完全相同：\n\n```\n$sql = 'SELECT image_id, filename, caption FROM images WHERE\
  \ caption LIKE ?';\n```\n\n#### 使用命名占位符\n\n命名占位符以冒号开头，如下所示：\n\n```\n$sql = 'SELECT\
  \ image_id, filename, caption FROM images WHERE caption LIKE :search';\n```\n\n\
  使用命名占位符可以使代码更易于理解，尤其是如果你选择了基于包含要嵌入 SQL 的值的变量名来命名时。\n\n#### 准备语句\n\n准备和初始化语句只需一步完成（与需要两步的\
  \ MySQLi 不同）。你直接将带有占位符的 SQL 传递给连接对象的 `prepare()` 方法，该方法会返回预处理语句，如下所示：\n\n```\n$stmt\
  \ = $conn->prepare($sql);\n```\n\n\n\n### 将值绑定到占位符\n\n有多种方法可以将值绑定到占位符。使用匿名占位符时，最简单的方法是创建一个与占位符顺序相同的值数组，然后将该数组传递给语句的\
  \ `execute()` 方法。即使只有一个占位符，也必须使用数组。例如，要将 `$searchterm` 绑定到单个匿名占位符，必须将其用一对方括号括起来，如下所示：\n\
  \n`$stmt->execute([$searchterm]);`\n\n你也可以用类似方式将值绑定到命名占位符，但传递给 `execute()` 方法的参数必须是一个关联数组，将命名占位符作为每个值的键。因此，以下代码将\
  \ `$searchterm` 绑定到 `:search` 命名占位符：\n\n`$stmt->execute([':search' => $searchterm]);`\n\
  \n或者，你可以在调用 `execute()` 方法之前，使用语句的 `bindParam()` 和 `bindValue()` 方法来绑定值。与匿名占位符一起使用时，这两个方法的第一个参数都是一个从\
  \ 1 开始的数字，表示占位符在 SQL 中的位置。对于命名占位符，第一个参数是作为字符串的命名占位符。第二个参数是你想要插入查询中的值。\n\n不过，这两种方法之间有一个细微的差别。\n\
  \n- 使用 `bindParam()` 时，第二个参数必须是变量。它不能是字符串、数字或任何其他类型的表达式。\n- 使用 `bindValue()` 时，第二个参数应为字符串、数字或表达式。但它也可以是变量。\n\
  \n由于 `bindValue()` 接受任何类型的值，`bindParam()` 可能显得多余。区别在于，传递给 `bindValue()` 的参数值必须是已知的，因为它绑定的是实际值，而\
  \ `bindParam()` 只绑定变量。因此，值可以在之后赋给该变量。\n\n为了说明这种差异，我们使用“使用命名占位符”中的 `SELECT` 查询。`:search`\
  \ 占位符跟在 `LIKE` 关键字之后，因此该值需要与通配符组合。尝试执行以下操作会生成错误：\n\n```\n// 这不会生效\n$stmt->bindParam(':search',\
  \ '%'. $_GET['search'] .'%');\n```\n\n你不能使用 `bindParam()` 将通配符与变量连接起来。通配符需要在将变量作为参数传递之前添加，如下所示：\n\
  \n```\n$searchterm = '%'. $_GET['search'] .'%';\n$stmt->bindParam(':search', $searchterm);\n\
  ```\n\n或者，你也可以将该表达式构建为 `bindValue()` 的参数。\n\n```\n// 这会生效\n$stmt->bindValue(':search',\
  \ '%'. $_GET['search'] .'%');\n```\n\n`bindParam()` 和 `bindValue()` 方法接受一个可选的第三个参数：一个指定数据类型的常量。主要的常量如下：\n\
  \n- `PDO::PARAM_INT`：整数（整型数）\n- `PDO::PARAM_LOB`：二进制（如图像、Word 文档或 PDF 文件）\n- `PDO::PARAM_STR`：字符串（文本）\n\
  - `PDO::PARAM_BOOL`：布尔值（真或假）\n- `PDO::PARAM_NULL`：空值\n\n如果你想将数据库列的值设置为 `null`，`PDO::PARAM_NULL`\
  \ 非常有用。例如，如果主键是自动递增的，则在插入新记录时需要传递 `null` 作为值。以下是使用 `bindValue()` 将名为 `:id` 的参数设置为\
  \ `null` 的方法：\n\n```\n$stmt->bindValue(':id', NULL, PDO::PARAM_NULL);\n```\n\n>\
  \ **注意：** PDO 中没有用于浮点数的常量。\n\n### 执行语句\n\n如果你使用 `bindParam()` 或 `bindValue()` 将值绑定到占位符，则只需不带参数地调用\
  \ `execute()` 方法：\n\n```\n$stmt->execute();\n```\n\n否则，按照上一节所述传递一个值数组。在这两种情况下，查询的结果都存储在\
  \ `$stmt` 中。\n\n错误消息的访问方式与 PDO 连接相同。但是，不是在连接对象上调用 `errorInfo()` 方法，而是在 PDO 语句对象上调用它，如下所示：\n\
  \n```\n$errorInfo = $stmt->errorInfo();\nif (isset($errorInfo[2])) {\n    $error\
  \ = $errorInfo[2];\n}\n```\n\n### 绑定结果（可选）\n\n要将 `SELECT` 查询的结果绑定到变量，需要使用 `bindColumn()`\
  \ 方法分别绑定每一列，该方法接受两个参数。第一个参数可以是列的名称，也可以是从 1 开始计数的列编号。该编号来自其在 `SELECT` 查询中的位置，而不是在数据库表中的出现顺序。因此，为了在我们一直使用的\
  \ SQL 示例中将 `filename` 列的结果绑定到 `$filename`，以下任一方式均可接受：\n\n```\n$stmt->bindColumn('filename',\
  \ $filename);\n$stmt->bindColumn(2, $filename);\n```\n\n由于每一列是分别绑定的，因此你不需要绑定所有列。但是，这样做会更方便，因为它避免了将\
  \ `fetch()` 方法的结果赋值给数组的需要。\n\n### 获取结果\n\n要获取 `SELECT` 查询的结果，请调用语句的 `fetch()` 方法。如果你使用了\
  \ `bindColumn()` 将输出绑定到变量，则可以直接使用这些变量。否则，它会返回当前行的数组，该数组同时以列名和零索引的列编号作为索引。\n\n> **注意：**\
  \ 你可以通过向 PDO 的 `fetch()` 方法传递一个常量作为参数来控制其输出类型。参见 [`http://php.net/manual/en/pdostatement.fetch.php`](http://php.net/manual/en/pdostatement.fetch.php)。\n\
  \n### PHP 方案 11-9：在搜索中使用 PDO 预处理语句\n\n本 PHP 方案展示了如何将搜索表单中用户提交的值嵌入到带有 PDO 预处理语句的\
  \ `SELECT` 查询中。它使用的搜索表单与 PHP 方案 11-7 和 11-8 中 MySQLi 版本的搜索表单相同。\n\n将 `ch11` 文件夹中的\
  \ `pdo_prepared_01.php` 复制到 `pdo` 文件夹中，并将其保存为 `pdo_prepared.php`。在 `DOCTYPE` 声明上方的\
  \ PHP 代码块中添加以下代码：\n\n```\nif (isset($_GET['go'])) {\n    require_once '../includes/connection.php';\n\
  \    $conn = dbConnect('read', 'pdo');\n    $sql = 'SELECT image_id, filename, caption\
  \ FROM images\n            WHERE caption LIKE :search';\n    $stmt = $conn->prepare($sql);\n\
  \    $stmt->bindValue(':search', '%' . $_GET['search'] . '%');\n    $stmt->execute();\n\
  \    $errorInfo = $stmt->errorInfo();\n    if (isset($errorInfo[2])) {\n       \
  \ $error = $errorInfo[2];\n    } else {\n        $stmt->bindColumn('image_id', $image_id);\n\
  \        $stmt->bindColumn('filename', $filename);\n        $stmt->bindColumn(3,\
  \ $caption);\n        $numRows = $stmt->rowCount();\n    }\n}\n```\n\n用于显示结果的代码与\
  \ PHP 方案 11-8 中步骤 6 和 7 的代码相同。你可以在 `ch11` 文件夹中的 `pdo_prepared_02.php` 文件中查看完整的代码。\n\
  \n- 当表单提交时，此代码会包含连接文件并创建一个 PDO 只读连接。预处理语句使用 `:search` 作为命名参数，替代用户提交的值。\n- `%` 通配符在绑定到预处理语句的同时与搜索词连接。因此，这里使用\
  \ `bindValue()` 而不是 `bindParam()`。\n- 语句执行后，会调用语句的 `errorInfo()` 方法来查看是否生成了错误消息并存储在\
  \ `$errorInfo[2]` 中。\n- 如果没有问题，`else` 块会使用 `bindColumn()` 方法将结果绑定到 `$image_id`、`$filename`\
  \ 和 `$caption`。前两个使用了列名，但 `caption` 列是通过其在 `SELECT` 查询中的位置（从 1 开始计数）来引用的。\n\n\n\n\
  ### PHP 解决方案 11-10：通过用户输入更改列选项\n\n本 PHP 解决方案演示了如何通过用户输入更改 `SELECT` 查询中 SQL 关键字的名称。SQL\
  \ 关键字不能使用引号包裹，因此使用预处理语句或 MySQLi 的 `real_escape_string()` 方法无效。相反，你需要确保用户输入与预期的值数组匹配。如果找不到匹配项，则使用默认值。该技术对于\
  \ MySQLi 和 PDO 是相同的。\n\n将 `ch11` 文件夹中的 `mysqli_order_01.php` 或 `pdo_order_01.php`\
  \ 复制到 `mysqli` 或 `pdo` 文件夹中。两个版本都从 `images` 表中选出所有记录，并以表格形式显示结果。页面还包含一个表单，允许用户选择用于对结果进行升序或降序排序的列名。在初始状态下，表单处于非活动状态。页面默认按\
  \ `image_id` 升序显示详细信息，如下所示：\n\n![A978-1-4842-0635-5_11_Figp_HTML.jpg](img/A978-1-4842-0635-5_11_Figp_HTML.jpg)\n\
  \n按如下方式修改 `DOCTYPE` 声明上方 PHP 代码块中的代码（以下清单显示的是 PDO 版本，但以**粗体**突出显示的更改对于 MySQLi 同样适用）：\n\
  \n```\nrequire_once '../includes/connection.php';\n\n// 连接数据库\n$conn = dbConnect('read',\
  \ 'pdo');\n\n// 设置默认值\n$col = 'image_id';\n$dir = 'ASC';\n\n// 创建允许值的数组\n$columns\
  \ = ['image_id', 'filename', 'caption'];\n$direction = ['ASC', 'DESC'];\n\n// 如果表单已提交，仅使用期望的值\n\
  if (isset($_GET['column']) && in_array($_GET['column'], $columns)) {\n    $col =\
  \ $_GET['column'];\n}\n\nif (isset($_GET['direction']) && in_array($_GET['direction'],\
  \ $direction)) {\n    $dir = $_GET['direction'];\n}\n\n// 使用清理后的变量准备 SQL 查询\n$sql\
  \ = \"SELECT * FROM images\n        ORDER BY $col $dir\";\n\n// 提交查询并捕获结果\n$result\
  \ = $conn->query($sql);\n$errorInfo = $conn->errorInfo();\nif (isset($errorInfo[2]))\
  \ {\n    $error = $errorInfo[2];\n}\n```\n\n编辑下拉菜单中的 `<option>` 标签，使其显示 `$col` 和\
  \ `$dir` 的已选值，如下所示：\n\n*   新代码定义了两个变量 `$col` 和 `$dir`，它们被直接嵌入到 `SELECT` 查询中。由于已为其分配了默认值，因此页面首次加载时，查询会按\
  \ `image_id` 列以升序显示结果。\n*   然后，两个数组 `$columns` 和 `$direction` 定义了允许的值：列名以及 `ASC`\
  \ 和 `DESC` 关键字。条件语句使用这些数组来检查 `$_GET` 数组中的 `column` 和 `direction` 参数。仅当提交的值分别与 `$columns`\
  \ 和 `$direction` 数组中的值匹配时，才会将其重新赋值给 `$col` 和 `$dir`。这可以防止任何尝试向 SQL 查询中注入非法值的行为。\n\
  \n```\n<select name=\"column\" id=\"column\">\n    <option <?php if ($col == 'image_id')\
  \ echo 'selected'; ?>\n    >image_id</option>\n    <option <?php if ($col == 'filename')\
  \ echo 'selected'; ?>\n    >filename</option>\n    <option <?php if ($col == 'caption')\
  \ echo 'selected'; ?>\n    >caption</option>\n</select>\n\n<select name=\"direction\"\
  \ id=\"direction\">\n    <option value=\"ASC\" <?php if ($dir == 'ASC') echo 'selected';\
  \ ?>\n    >Ascending</option>\n    <option value=\"DESC\" <?php if ($dir == 'DESC')\
  \ echo 'selected'; ?>\n    >Descending</option>\n</select>\n```\n\n保存页面并在浏览器中测试。你可以通过选择下拉菜单中的值并点击“更改”来更改显示的排序顺序。但是，如果你尝试通过查询字符串注入非法值，页面将使用\
  \ `$col` 和 `$dir` 的默认值，按 `image_id` 以升序显示结果。\n\n你可以将你的代码与 `ch11` 文件夹中的 `mysqli_order_02.php`\
  \ 和 `pdo_order_02.php` 进行对照。\n\n## 章节回顾\n\nPHP 提供了三种与 MySQL 通信的方法：\n\n*   原始的 MySQL\
  \ 扩展，已弃用：不应在新项目中使用。如果你维护一个现有站点，可以轻松识别它是否使用了原始的 MySQL 扩展，因为所有函数都以 `mysql_` 开头。你需要立即计划将站点转换为使用其他方法之一。原始的\
  \ MySQL 函数将在 PHP 的未来版本中停止工作。\n*   MySQL 改进版（MySQLi）扩展：建议用于所有新的 MySQL 项目。它需要 PHP\
  \ 5.0 和 MySQL 4.1 或更高版本。它更高效，并且具有预处理语句的附加安全性。它也完全兼容 MariaDB。\n*   PHP 数据对象（PDO）抽象层，它是与数据库无关的：如果你可能需要调整项目以适用于其他数据库，则应选择此选项。尽管代码与数据库无关，但\
  \ PDO 需要为所选数据库安装正确的驱动程序。MySQL 的驱动程序完全兼容 MariaDB，并且通常已安装。其他驱动程序不太常见。但是，如果安装了正确的驱动程序，则只需更改连接字符串中的数据源名称（DSN）即可从一个数据库切换到另一个数据库。\n\
  \n尽管 PHP 与数据库通信并存储结果，但查询需要用 SQL 编写，SQL 是用于查询关系型数据库的标准语言。本章展示了如何使用 `SELECT` 语句检索存储在数据库表中的信息，使用\
  \ `WHERE` 子句细化搜索，以及使用 `ORDER BY` 更改排序顺序。你还学习了几种保护查询免受 SQL 注入的技术，包括预处理语句，它使用占位符而不是将变量直接嵌入查询中。\n\
  \n在下一章中，你将通过创建一个在线相册来将所学知识付诸实践。\n\n## 12. 创建动态相册\n\n上一章主要侧重于以文本形式提取 `images` 表的内容。本章将基于这些技术来开发图\
  \ 12-1 所示的迷你相册。\n\n![A978-1-4842-0635-5_12_Fig1_HTML.jpg](img/A978-1-4842-0635-5_12_Fig1_HTML.jpg)\n\
  \n图 12-1. 这个迷你相册通过从数据库中提取信息来驱动\n\n该相册还演示了一些你很可能会希望整合到纯文本驱动页面中的酷炫功能。例如，左侧的缩略图网格每行显示两张图片。只需更改两个数字，你就可以随心所欲地设置网格的列宽和行深。单击其中一个缩略图会替换主图像和标题。重新加载的是同一个页面，但创建在线目录时使用的正是同样的技术，该目录会将你带到另一个页面，获取有关产品的更多详细信息。缩略图网格底部的“下一步”链接会向你显示下一组照片，使用的技术与在长搜索结果集中翻页的技术完全相同。这个相册可不只是一两张漂亮脸蛋......\n\
  \n本章涵盖内容：\n\n*   为什么将图片存储在数据库中是一个坏主意，以及你应该怎么做\n*   规划动态相册的布局\n*   在表格行中显示固定数量的结果\n\
  *   限制一次检索的记录数\n*   在长结果集中进行分页\n\n\n\n"
- "# 为何不在数据库中存储图片？\n\n`images` 表包含文件名和标题，但并不存储图片本身。尽管你可以在数据库中存储二进制对象（如图片），但我并不打算这样做，原因很简单：这通常得不偿失。主要问题如下：\n\
  \n-   若不单独存储文本信息，图片无法被索引或搜索。\n-   图片通常体积较大，会导致表体积膨胀。如果数据库存储空间有限，你可能会面临空间耗尽的风险。\n\
  -   若频繁删除图片，表碎片化会影响性能。\n-   从数据库检索图片需要将图片传递给一个单独的脚本，这会拖慢网页显示速度。\n\n更高效的做法是将图片存储在你网站的一个普通文件夹中，并利用数据库来存储图片的相关信息。你只需要两类信息——文件名和可作为`alt`文本使用的标题。一些开发者会在数据库中存储图片的完整路径，但我认为只存储文件名能为你提供更大的灵活性。指向`images`文件夹的路径将被嵌入到\
  \ HTML 中。无需存储图片的高度和宽度。正如你在第 4 章和第 8 章中所见，你可以使用 PHP 的`getimagesize()`函数动态生成这些信息。\n\
  \n## 规划画廊\n\n我发现设计数据库驱动网站的最佳方法是，首先创建一个包含占位文本和图片的静态页面。然后，我创建 CSS 样式规则，使页面达到我想要的视觉效果，最后用\
  \ PHP 代码替换每个占位元素。每次替换后，我都会在浏览器中检查页面，确保一切正常运作。\n\n图 12-2 展示了我为画廊制作的静态模型，并指出了需要转换为动态代码的元素。这些图片与第\
  \ 4 章中随机图片生成器使用的图片相同，并且尺寸各异。我尝试过缩放图片以创建缩略图，但认为结果看起来过于杂乱，因此我将缩略图设为标准尺寸（80×54 像素）。此外，为了方便起见，我将每个缩略图命名为与大图相同的名称，并将它们存储在`images`文件夹下一个名为`thumbs`的子文件夹中。\n\
  \n![A978-1-4842-0635-5_12_Fig2_HTML.jpg](img/A978-1-4842-0635-5_12_Fig2_HTML.jpg)\n\
  \n图 12-2. 明确将静态画廊转换为动态画廊所需完成的工作\n\n在前一章中，显示`images`表的内容很简单。你创建了一个单行表格，每个字段的内容放在单独的表格单元格中。通过遍历结果集，每条记录都显示在单独的一行上，模拟了数据库表的列结构。而这次，缩略图网格的两列结构不再匹配数据库结构。你需要在创建下一行之前，统计一行中已经插入了多少个缩略图。\n\
  \n在弄清楚需要做什么之后，我删除了缩略图 2 到 6 的代码以及导航链接的代码。下面的列表显示了`gallery.php`的`<main>`元素中剩余的内容，其中需要转换为\
  \ PHP 代码的元素已加粗标出（你可以在`ch12`文件夹的`gallery_01.php`中找到这段代码）：\n\n```html\n<main>\n<h2>Images\
  \ of Japan</h2>\n<p id=\"picCount\">Displaying 1 to 6 of 8</p>\n<div id=\"gallery\"\
  >\n<table id=\"thumbs\">\n<tr>\n<!-- This row needs to be repeated -->\n<td><a href=\"\
  gallery.php\"><img src=\"images/thumbs/basin.jpg\" alt=\"\"\nwidth=\"80\" height=\"\
  54\"></a></td>\n</tr>\n<!-- Navigation link needs to go here -->\n</table>\n<figure\
  \ id=\"main_image\">\n<img src=\"images/basin.jpg\" alt=\"\" width=\"350\" height=\"\
  237\">\n<figcaption>Water basin at Ryoanji temple, Kyoto</figcaption>\n</figure>\n\
  </div>\n</main>\n```\n\n## 将画廊元素转换为 PHP\n\n在显示画廊内容之前，你需要连接到`phpsols`数据库，并检索`images`表中存储的所有记录。其步骤与前一章相同，使用以下简单的\
  \ SQL 查询：\n\n```sql\nSELECT filename, caption FROM images\n```\n\n然后，你可以使用第一条记录来显示第一张图片及其关联的标题和缩略图。你不需要用到`image_id`。\n\
  \n\n\n### PHP 解决方案 12-1：显示首张图片\n\n如果你已在第 4 章设置了\"日本之旅\"网站，可直接使用原始的 `gallery.php`\
  \ 文件。或者，将 `ch12` 文件夹中的 `gallery_01.php` 复制到 `phpsols` 站点根目录并重命名为 `gallery.php`。同时需要将\
  \ `title.php`、`menu.php` 和 `footer.php` 复制到 `phpsols` 站点的 `includes` 文件夹中。如果编辑器询问是否要更新文件中的链接，请选择不更新。\n\
  \n该画廊需要数据库连接，因此需引入 `connection.php`，创建对 `phpsols` 数据库的只读连接，并定义 SQL 查询。请在 `gallery.php`\
  \ 文件中 `DOCTYPE` 声明上方、PHP 结束标记之前添加以下代码（新增代码以粗体显示）：\n\n![A978-1-4842-0635-5_12_Fig3_HTML.jpg](img/A978-1-4842-0635-5_12_Fig3_HTML.jpg)\n\
  \n**图 12-3.** 精简版静态画廊，已准备好进行转换\n\n在浏览器中加载 `gallery.php` 确认显示正常。页面主体部分应如图 12-3 所示，包含一个缩略图及其同版本大图。\n\
  \n```\ninclude './includes/title.php';\nrequire_once './includes/connection.php';\n\
  $conn = dbConnect('read');\n$sql = 'SELECT filename, caption FROM images';\n```\n\
  \n如果使用 PDO，请在 `dbConnect()` 中添加第二个参数 `'pdo'`。\n\n提交查询并从结果中提取首条记录的代码取决于所使用的连接方式。对于\
  \ MySQLi，请使用以下代码：\n\n```\n// 提交查询\n$result = $conn->query($sql);\nif (!$result)\
  \ {\n    $error = $conn->error;\n} else {\n    // 将首条记录提取为数组\n    $row = $result->fetch_assoc();\n\
