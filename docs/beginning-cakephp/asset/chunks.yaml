    \ the lines. This is accomplished on lines 15–27. Lines 29–32 send the formatted\
    \ data to the browser with PDF-specific HTTP headings, and then line 33 exits\
    \ to prevent Cake from rendering any views.\n\nThe script cannot work yet unless\
    \ (as with the Akismet component) you alter the `include_path` setting for Zend\
    \ to work correctly. Open the `app/vendors/Zend/Pdf.php` file, and place the following\
    \ line near the top and before any includes:\n\n```\nini_set('include_path', dirname(dirname(__FILE__)));\n\
    ```\n\nYou’re all set. Launch the PDF action, and a basic PDF file should automatically\
    \ render.\nYou may want to add a link in the Posts view to output as a PDF file:\n\
    \n```\n<?=$html->link('Save as PDF','/posts/pdf/'.$post['Post']['id']);?>\n```\n\
    \n## Other Zend Components\n\nMany other powerful components are included in the\
    \ Zend Framework. Aside from some components that make Zend work in an MVC environment,\
    \ you ought to be able to bring various components into a Cake application. In\
    \ this exercise, try your hand with a couple of unique components that aren’t\
    \ already available in Cake, such as Lucene, Translate, or Validate, by bringing\
    \ them into a Cake application as vendors. Remember to fix the include paths for\
    \ Zend to work properly and test the components thoroughly since they are third-party\
    \ elements.\n\n## Summary\n\nWhen you must use third-party scripts in your Cake\
    \ application, it’s best to include them as vendors using the `App::import()`\
    \ method. Once the script is available, its functions and objects can be directly\
    \ called in the application. Of course, because vendors work in Cake unidirectionally,\
    \ how you further implement the vendor will depend on the vendor’s own methods.\
    \ In this chapter, we discussed using components from Zend Framework to perform\
    \ Akismet spam checks and PDF file rendering. Other web service components can\
    \ be used in Cake using similar methods. In Chapter 13, we’ll examine plugins—resources\
    \ that allow you to create a mini-application of sorts that can be distributed\
    \ across multiple Cake applications.\n\n# Plugins\n\nIn some situations, developers\
    \ may want to use a Cake application in several other applications. Sometimes\
    \ another Cake application may be useful in your project but may be difficult\
    \ to fit in because of its independent structure; controllers, models, and such\
    \ may conflict with the current project’s namespaces. Plugins are elements that\
    \ function as mini-applications inside the main Cake application. They include\
    \ their own models, views, and controllers, and they make it possible to reuse\
    \ an entire application within other applications.\n\nCake comes with no built-in\
    \ plugins. Thus, only third-party applications can be used inside an existing\
    \ Cake application. Of course, you may build your own plugins to fit your needs,\
    \ but be aware that plugins are available online at various locations. The Bakery\
    \ ([http://bakery.cakephp.org](http://bakery.cakephp.org)) and CakeForge ([www.cakeforge.org](http://www.cakeforge.org))\
    \ host plugins along with other Cake applications, components, helpers, and more.\
    \ The Bakery also hosts articles explaining how developers wrote their plugins—which\
    \ can be useful in learning advanced CakePHP methods.\n\nThird-party plugins save\
    \ time. Because they follow the MVC structure, they can do much more than a component\
    \ or helper alone. A plugin may contain its own models and therefore work with\
    \ the database in ways that a component or helper doesn’t. Often, running a complex\
    \ method for an application is as simple as dropping a plugin in the `app/plugins`\
    \ directory and tweaking some settings in the application to get it running.\n\
    \n## Installing a Third-Party Plugin\n\nPlugins are fairly simple to install because\
    \ of their design. Simply put, they are self-contained folders that can be dropped\
    \ in the `app/plugins` directory and referenced in the model, view, or controller.\
    \ They should be written so that they require little configuration.\n\nSometimes\
    \ a plugin may require a database table to be set up to work correctly, or it\
    \ may need you to specify some global variables or settings in the core configuration.\
    \ Whatever the case, the plugin will generally come with its own installation\
    \ notes that should be fairly simple to follow. I’ll show how to install an Ajax\
    \ chat room plugin by Pseudocoder in your blog application to show how it’s done.\n\
    \nFirst, you must obtain the plugin code. Pseudocoder’s Ajax Chat plugin is available\
    \ at\n[http://sandbox2.pseudocoder.com/demo/chat](http://sandbox2.pseudocoder.com/demo/chat).\
    \ You should end up with a compressed file that contains a folder with some model,\
    \ view, and controller files inside.\n\nYou should notice that this plugin calls\
    \ for the Prototype JavaScript library to be running in the application. I have\
    \ already gone through installing Prototype in the default layout, so you shouldn’t\
    \ have to change anything in the layout for this plugin to work. However, you\
    \ may still want to double-check that Prototype is running correctly in the application.\
    \ Open the `app/views/layouts/default.ctp` file, and look for the Prototype include\
    \ line:\n\n```\n<?=$javascript->link('prototype.js');?>\n```\n\nAlso make sure\
    \ the `prototype.js` file is located in the `app/webroot/js` folder. With these\
    \ two settings in place, the Ajax Chat plugin is ready to be installed.\n\nPlace\
    \ the contents of the downloaded file in the `app/plugins` folder. The Ajax Chat\
    \ plugin also uses its own database table, so you will need to run the SQL query\
    \ to generate the appropriate table and fields. Pseudocoder makes this SQL available\
    \ on its web page, which you already may have noticed when downloading the plugin.\
    \ To save you time, Listing 13-1 contains the necessary SQL to build the table.\
    \ Be sure to create the `chats` table in MySQL before running the plugin in the\
    \ application; otherwise, errors will occur.\n\n**Listing 13-1.** The `chats`\
    \ Table to Be Used by the Ajax Chat Plugin\n```sql\nCREATE TABLE `chats` (\n \
    \ `id` int(10) unsigned NOT NULL auto_increment,\n  `key` varchar(45) NOT NULL\
    \ default '',\n  `handle` varchar(20) NOT NULL default '',\n  `text` text NOT\
    \ NULL,\n  `ip_address` varchar(12) NOT NULL default '',\n  `created` datetime\
    \ NOT NULL default '0000-00-00 00:00:00',\n  PRIMARY KEY (`id`),\n  KEY `KEY_IDX`\
    \ (`key`)\n);\n```\n\nThe plugin is now installed for use in your Cake application.\
    \ To use it, you will need to call its actions and such in your own controllers\
    \ or models, depending on the plugin’s methods."
