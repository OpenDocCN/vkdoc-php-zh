  \n第 11 章 ■ 测试\n\n## 神圣的代码，蝙蝠侠！\n\n测试的好处之一，除了能可靠地确保代码持续工作外，还在于它们能帮助我们识别代码中的不足，以及如何更好地使用我们所测试的各个部分。\n\
  \n我花了几个小时编写这些测试，并不是因为它们有多复杂，而是因为测试揭示了许多我可以修复的 bug，以及我能在前面章节的代码中做出的改进。\n\n\n### 问题\n\
  \n1. 我们创建的单元测试似乎重复了大量代码。`Database`和`Model`类的单元测试尤其如此。为什么这种做法是必要的？\n\n2. 这类测试应该在编写被测试类的同时编写，还是在它们完成之后编写？\n\
  \n### 答案\n\n1. 我们的测试发生在框架所支持的 MVC 结构之外的原因，与我们在单个单元测试中重复代码的原因相同。测试对外部变量的依赖越少，就越能准确地指出单元测试所覆盖的类中出现的破坏性变更。\n\
  \n2. 决定编写这些测试的时机远没有从一开始就拥有它们重要。忘记或忽视对代码进行单元测试是很容易陷入的陷阱。在编写被测试类的同时编写测试，或者在此之后编写，两者几乎没有区别。\n\
  \n### 练习\n\n1. 我们已经为框架中最大的类库创建了测试。现在尝试覆盖一些较小的类库，比如`Registry`、`StringMethods`或`ArrayMethods`类。\n\
  \n2. 我们创建的`Test`类是一个运行单元测试的好工具，但它不处理任何输出格式化。尝试整理一份关于通过的测试以及失败的或引发异常的测试的清晰概览。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 12 章\n\n## 结构\n\n现在我们开始走出理论的领域，进入实际应用。到目前为止，我们在一些示例中使用了社交网络的概念，现在我们将构建一个真实的社交网络。\n\
  \n为了更好地规划我们的应用程序，我们需要审视大多数社交网络的共同特征。首先便是用户资料的概念。用户资料包含一些关于所属用户的信息，例如他们的爱好或原籍国。根据社交网络的侧重点，这些信息可以是任何内容，从工作经历和资质，到之前的度假目的地和最喜爱的乐队。\n\
  \n社交网络也是分享的平台——照片、音乐曲目和视频的链接可以轻松分享。如果你有什么值得炫耀的东西，或者想知道朋友在看什么，社交网络就是最佳去处。\n\n这些网络可能有所不同的最后一个领域，是它们如何管理用户及其分享的信息。非常排外的社交网络可能会限制用户分享的内容种类，而其他网络则允许用户分享（并查看）任何内容！\n\
  \n### 目标\n\n-   我们需要构建用户注册、登录、更新设置和查看个人资料的页面/操作。\n-   用户应该能够查看其他用户的资料，并与他们成为好友。\n\
  -   用户应该能够分享状态消息和照片，上传自己的照片，并通过多种不同字段搜索用户。\n-   应该有一个管理界面，系统管理员可以通过它审查和/或修改存储在数据库中的信息。\n\
  \n我们的应用程序需要存储相当多的用户相关数据，这非常适合于测试我们的数据库/ORM 代码。它还需要相当多的视图，这将使我们能够测试（并扩展）我们的模板解析器。照片分享功能使我们能够接入第三方图像编辑库，而链接分享和好友功能则使我们能够连接到第三方网络服务。\n\
  \n### 数据库\n\n我们可以将社交网络的数据库表示如图 12-1 所示。用户可以拥有多个好友（本质上就是其他用户）。他们可以拥有多张照片，然后可以与好友分享这些照片。链接和状态消息也可以与好友分享。可以根据用户交互添加/删除好友，用户也可以将照片、分享的链接和其他用户举报为不适当内容。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图 2](img/index-196_1.png)\n\
  \n第 12 章 ■ 结构\n\n用户\n\n好友\n\n照片\n\n状态消息 +\n\n分享的链接/照片\n\n**图 12-1.** 数据结构\n\n\n\
  好的，遵照您的指示，以下是翻译后的中文文本。\n\n\n### 用户与内容管理\n\n所有用户和内容都可以通过管理界面进行管理，这需要对有效的管理员用户账户进行身份验证。我们将根据需要创建各个模型结构。\n\
  \n### 文件夹\n\n我们需要为应用程序建立文件夹结构，以便文件存储在可预测的位置。我们已经将框架本身放置在同名文件夹中，但应用程序的其余部分应遵循图 12-2\
  \ 所示整洁的组织模式。\n\n***Figure 12-2.** 文件夹结构*\n\n`application`文件夹将存放所有内容，从框架代码到应用程序代码。我们创建的\
  \ HTML 视图将保存在`views`文件夹中，而任何第三方库将保存在`libraries`文件夹中。\n\n`configuration`文件夹将存放应用程序类的配置文件，而`model`和`controller`文件将分别存放在各自的文件夹中。\n\
  \n`public`文件夹将存放所有可公开访问的文件，这些文件不会在应用程序执行过程中直接加载。这包括图片、JavaScript 文件和层叠样式表。\n\n一个有趣的现象是，我们的应用程序测试存放在`public`文件夹中。这样做的目的是将测试与框架和应用程序代码库完全分离。我们的测试最终将使用框架代码并测试框架/应用程序代码，但保持这些方面（测试、框架和应用程序）的分离非常重要。\n\
  \n### 问题\n\n1. 我们已经为社交网络中的数据库表/数据对象定义了粗略的结构。在开始编码之前规划数据结构有什么意义？\n\n2. 我们使用的文件夹结构在很大程度上取决于所构建的应用程序类型。既然这种结构对于每个新应用程序都可能发生不同程度的变化，为什么我们还需要决定它？\n\
  \n### 答案\n\n1. 花在规划应用程序上的时间越多，开发过程就会越顺利。这在 MVC 应用程序中尤为明显。当应用程序使用数据库时，我们不仅仅是使用 PHP\
  \ 查询数据库；我们是在构建模型并与数据库交互，就像对待其他类一样。我们需要事先知道这些类应该是什么样子。\n\n2. 文件夹结构在两个领域很重要。第一，它保持一切整洁有序。第二，我们可以快速找到所需内容。无论是查找模型、控制器还是第三方库，通过理解文件夹结构，我们都能快速定位。\n\
  \n"
- "# 第 13 章 引导\n\n引导是一个比喻，指无需外部帮助即可自我维持的过程。就我们的框架而言，引导是一个统称，描述框架为了从网址到达特定的控制器、模型和视图集合而执行的一系列过程。\n\
  \n这些过程之所以必要，是因为我们的框架高度专注于面向对象编程（OOP）实践，我们试图将尽可能多的功能隔离到各个类中。如果我们尝试采用函数式方法来构建 MVC\
  \ 框架，这意味着代码以自上而下的方式执行，并且不需要初始代码来将各个类拼接成有意义的应用程序。\n\n到目前为止，我们已经构建了许多作为坚实框架基础的类。当我们开始在框架之上构建应用程序时，就需要开始思考每个部分如何与它需要的其他部分进行交互。这始于引导。\n\
  \n### 目标\n\n- 我们需要拦截对应用程序的请求（使用`.htaccess`），并将这些请求重定向到引导文件。\n- 引导文件需要实例化运行应用程序所需的类。这些类包括配置、缓存和路由器等。\n\
  - 路由器将决定加载哪个控制器和动作。控制器将首先允许动作执行，然后渲染动作的视图（如果找到匹配的视图）。\n\n## 当文件不是文件时……\n\n涉足框架开发的开发者可能会惊讶地发现，唯一的网址并不一定指向\
  \ Web 服务器上的唯一文件。多个域名指向同一个网站是很常见的。同样，带有各种查询字符串参数的地址指向同一个文件也很常见。我所说的地址到文件的关系，是指 Web\
  \ 服务器根据模式匹配将地址（任何类型）重定向到它们选择的任何文件的能力。这个过程称为*URL 重写*。\n\nURL 重写是服务器可以做的事情，只要给予足够的指令，告诉它要匹配哪些地址，以及将相应的请求发送到哪里。请求可以重定向到本地文件系统中的文件/脚本，甚至可以重定向到远程文件和/或地址。这些指令通常放在特定\
  \ Web 服务器的配置文件中。\n\n一些 Web 服务器（如 Apache2）允许在服务器启动时同时加载这些配置文件。这些服务器也可能允许在每个目录中存放配置文件，就像\
  \ Apache2 的情况一样。\n\n### URL 重写\n\nURL 重写对我们很重要，因为我们将使用它将所有请求汇集到一个`index.php`文件中。这是因为我们希望所有请求都通过相同的引导代码（包含在这个`index.php`文件中）来处理，以便我们能够选择最佳的响应，而无需重复代码。\n\
  \n我提到过可以使用基于目录的配置文件来初始化 URL 重写，我们现在就来创建一个。这个文件应放在`public`目录中，而您的 Web 服务器根目录应指向`public`目录内部。这将确保我们的应用程序代码可以读取所有框架文件，而只有`public`目录中包含的文件才能被外部世界公开访问。让我们看看这个文件在清单\
  \ 13-1 中是什么样子。\n\n***Listing 13-1.*** Apache2 中的 URL 重写\n\n```\nRewriteEngine On\n\
  \nRewriteCond %{REQUEST_FILENAME} !-d\n\nRewriteCond %{REQUEST_FILENAME} !-f\n\n\
  RewriteCond %{REQUEST_URI} !=/favicon.ico\n\nRewriteRule ^([a-zA-Z0-9\\/\\-_]+)\\\
  .?([a-zA-Z]+)?$ index.php?url = $1&extension = $2 [QSA,L]\n```\n\n这五行代码看起来可能复杂，但它们的含义很简单。第一行指示\
  \ Apache2 为此目录启用 URL 重写。它假设服务器启动时已安装并启用了该模块。\n\n第二行指令告诉 Apache2 忽略对此目录中实际目录的所有请求。例如，如果`public`目录下有一个`scripts`目录，并且请求发送到`http://localhost/scripts`，Apache2\
  \ 将忽略重写，让请求正常执行。第三行指令类似，但针对文件。如果请求发送到`http://localhost/scripts/shared.js`，请求将正常执行。\n\
  \n第四行指令告诉 Apache2 忽略对`http://localhost/favicon.ico`的所有请求。浏览器经常请求此类标准文件，我们不希望这种额外流量触发\
  \ 404 错误页面，因为我们的框架不处理该地址。\n\n\n\n最后一条指令是最重要的。它告诉`Apache2`匹配所有包含`a-zA-Z0-9/-_`字符（所有大小写字母数字字符）的地址，并将它们作为查询字符串参数中继到`index.php`文件。它还告诉`Apache2`将任何提到的文件扩展名作为查询字符串参数发送到`index.php`文件。\n\
  \n例如，对`http://localhost/users/add.html`的请求将通过这个`.htaccess`文件，`Apache2`会将请求（包含查询字符串参数和表单数据）发送到地址`http://localhost/index.php?url=users/add&extension=html`。\n\
  \n您可能想知道为什么要将所有请求隔离到`public`目录，而不是简单地将`index.php`文件放在与我们的应用程序/框架目录相同的目录中。原因是我们`.htaccess`无法区分可以从外部合法访问的文件（脚本、样式表和图像）和那些应该保密的文件。我们不希望人们篡改我们的框架和应用程序代码。\n\
  \n我们应该消除任何网络服务器返回敏感`PHP`代码的可能性，这是朝着正确方向迈出的一步！\n\n**注意**: 如果您的网络服务器在使用`public`目录作为其根目录时遇到问题，您也可以尝试创建第二个`.htaccess`文件来将所有请求重定向到`public`目录，但`Apache`需要启用`mod_rewrite`才能使用\
  \ URL 重写。\n\n---\n\n## 第 13 章 引导\n\n#### `Index.php`\n\n我们现在需要创建一个脚本，将重定向的请求发送到控制器/动作。正如您所猜测的，这个文件是`index.php`。这是一个简单的任务，构成了我们将在本章中创建的大部分引导代码。\n\
  \n您可能会将引导代码视为我们已创建的框架代码的扩展，但它实际上是我们将创建的第一个特定于应用程序的代码。您看，框架在这个阶段基本已经完成。它具备了将请求路由到控制器和加载模型的方法。它可以将这些模型结构（`ORM`数据对象）持久化到数据库。我们已创建了用于解析模板、管理缓存和配置文件、甚至处理会话、检查类结构以及存储类实例的代码。然而，为了让我们的应用程序能够利用这些框架类，它必须首先将它们加载到内存中并将它们串联起来。这就是我们将要创建的引导代码的核心。\n\
  \n有几个框架类我们可以预期在整个框架中使用。让应用程序启动的第一步是实例化这些类并将它们存储在注册表中。我们在建立应用程序目录（以便我们的类加载器知道从哪里开始查找框架类）之后执行此操作，然后立即分派请求。在代码方面，我们的`index.php`应该看起来像清单\
  \ 13-2 所示。\n\n***清单 13-2.*** 引导\n\n```\n// 1. 定义包含路径的默认路径\ndefine(\"APP_PATH\",\
  \ dirname(dirname(__FILE__)));\n\n// 2. 加载包含自动加载器的 Core 类\nrequire(\"../framework/core.php\"\
  );\nFramework\\Core::initialize();\n\n// 3. 加载并初始化 Configuration 类\n$configuration\
  \ = new Framework\\Configuration(array(\n    \"type\" => \"ini\"\n));\nFramework\\\
  Registry::set(\"configuration\", $configuration->initialize());\n\n// 4. 加载并初始化\
  \ Database 类 – 不连接\n$database = new Framework\\Database();\nFramework\\Registry::set(\"\
  database\", $database->initialize());\n\n// 5. 加载并初始化 Cache 类 – 不连接\n$cache = new\
  \ Framework\\Cache();\nFramework\\Registry::set(\"cache\", $cache->initialize());\n\
  \n// 6. 加载并初始化 Session 类\n$session = new Framework\\Session();\nFramework\\Registry::set(\"\
  session\", $session->initialize());\n```\n\n\n\n```php\n// 7. 加载 Router 类并提供 URL\
  \ 和扩展名\n\n$router = new Framework\\Router(array(\n\n    \"url\" => isset($_GET[\"\
  url\"]) ? $_GET[\"url\"] : \"index/index\",\n\n    \"extension\" => isset($_GET[\"\
  url\"]) ? $_GET[\"url\"] : \"html\"\n\n));\n\nFramework\\Registry::set(\"router\"\
  , $router);\n\n// 8. 分发当前请求\n\n$router->dispatch();\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 13 章：引导程序\n\n```php\n// 9. 清除全局变量\n\nunset($configuration);\n\nunset($database);\n\
  \nunset($cache);\n\nunset($session);\n\nunset($router);\n```\n\n正如我之前提到的，第一步是定义应用程序的基础文件路径。这样，我们的类自动加载器\
  \ `Core::autoload()` 就能知道从哪里开始查找框架文件。我已将此语句标记为 (1)，并在后续对此清单的说明中引用类似的标记。\n\n接下来我们要做的事情\
  \ (2) 是包含 `Core` 类文件并调用 `Core::initialize()` 方法。这将为类自动加载设置包含路径，并将 `Core::autoload()`\
  \ 方法注册为框架类的类自动加载器。\n\n之后，我们实例化了框架的四个类 (3、4、5、6)，从 `Configuration` 开始，到 `Session`\
  \ 结束。我们只为 `Configuration` 实例提供了构造选项——这是一个有趣的事实，稍后我们会探讨。\n\n接下来，我们实例化 `Router` 类\
  \ (7)，并将 URL/扩展名参数（带有默认值）作为构造选项传入。如果你回顾一下我们创建 `Router` 类的第 7 章，你会记得这些选项用于确定应调用的控制器/动作。\n\
  \n我们还需要调用 `Router->dispatch()` 方法 (8)，告知 `Router` 我们希望它开始获取正确的控制器/动作。这是将控制权移交给 `Router`\
  \ 的关键指示。\n\n剩余的语句 (9) 只是用来移除对此脚本中创建的类实例的全局引用。由于这些实例已经在 `Registry` 中被引用，我们不再需要它们以全局形式存在。\n\
  \n总之，我们的 `index.php` 文件设置了应用程序文件路径，初始化了 `Core`（自动加载器），定义了一些实例（我们稍后会用到），并将请求移交给 `Router`。\n\
  \n**注意**\n■ 如果你一直在跟进，并且想看看引导程序会向浏览器返回什么，那么你会感到有些惊讶。`index.php` 文件完成了我们需要它做的所有事情，但地址\
  \ `http://localhost` 会返回一个错误。再看一下 `Router` 代码 (7)。我们提供的 URL 查询字符串参数是唯一指示加载哪个控制器/动作的线索。同时，在未找到\
  \ URL 查询字符串参数时，我们为其提供了一个默认值 (`index/index`)。这意味着我们的 `Router` 实例将尝试加载 `Index` 控制器和\
  \ `index` 动作，即 `Index->index()`。除非该控制器和动作已经创建，否则 `Router` 将抛出 `Router/Exception/Controller`\
  \ 或 `Router/Exception/Action` 异常。\n\n---\n\n### 配置\n\n我们在实例化刚刚使用的四个类中的一半时，没有提供任何配置。回顾一下，它们是\
  \ `Database`、`Cache` 和 `Session`。我们尚未介绍 `Session` 类，但足以理解它与我们在第 5 章中创建的 `Cache`\
  \ 类非常相似。当我们开始创建用户账户时，我们将了解它有何不同。\n\n可以安全地假设，`Database` 和 `Cache`（甚至 `Session`）的实例需要我们尚未提供的配置参数。这些参数对于我们的框架类来说至关重要，以便它们能够基本了解要连接哪些服务以及使用什么凭据进行连接。这些细节需要提供，但我们在这里并未看到它们。这是因为我们将要向每个大型类工厂添加一些代码。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 数据库\n\n我们可以从 `Database`\
  \ 工厂类开始。工厂至少需要知道要创建哪种类型的数据库驱动程序。我们可以通过修改 `Database::initialize()` 方法来实现这一点，如清单 13-3\
  \ 所示。\n\n***清单 13-3.*** 自动数据库配置\n\n```php\npublic function initialize()\n{\n   \
  \ $type = $this->getType();\n\n    if (empty($type))\n    {\n        $configuration\
  \ = Registry::get(\"configuration\");\n\n        if ($configuration)\n        {\n\
  \            $configuration = $configuration->initialize();\n            $parsed\
  \ = $configuration->parse(\"configuration/database\");\n\n            if (!empty($parsed->database->default)\
  \ &&\n                !empty($parsed->database->default->type))\n            {\n\
  \                $type = $parsed->database->default->type;\n                unset($parsed->database->default->type);\n\
  \                $this->__construct(array(\n                    \"type\" => $type,\n\
  \                    \"options\" => (array) $parsed->database->default\n       \
  \         ));\n            }\n        }\n    }\n\n    if (empty($type))\n    {\n\
  \        throw new Exception\\Argument(\"Invalid type\");\n    }\n\n    switch ($type)\n\
  \    {\n        case \"mysql\":\n        {\n            return new Database\\Connector\\\
  Mysql($this->getOptions());\n            break;\n        }\n        default:\n \
  \       {\n            throw new Exception\\Argument(\"Invalid type\");\n      \
  \      break;\n        }\n    }\n}\n```\n\n以前，我们通过 `Database::initialize()` 方法直接拒绝任何类实例请求，现在我们首先检查是否已提供类型。如果在构造选项中未找到类型，我们会尝试加载数据库配置文件\
  \ `application/configuration/database.ini`。如果解析后的配置数据定义了默认的数据库类型，则该类型将用于初始化数据库连接器类。\n\
  \n此修改后的方法确保，如果存在数据库配置文件，并且该文件包含一个定义了默认数据库连接器类型的默认数组，则会返回该类型的连接器实例。这仅在构造选项中未找到类型时才会发生。\n\
  \n**注意** 对于 `Database` 工厂，务必记住初始化并不等同于连接到数据库。工厂返回一个有效的连接器实例是完全合理的，该实例可能随后因凭据错误而无法连接到数据库。\n\
  \n### 缓存\n\n`Cache` 类工厂的自动配置与 `Database` 类工厂非常相似。它涉及对 `Cache::initialize()` 方法进行类似的修改，你可以在清单\
  \ 13-4 中看到。\n\n***清单 13-4.*** 自动缓存配置\n\n```php\npublic function initialize()\n{\n\
  \    $type = $this->getType();\n\n    if (empty($type))\n    {\n        $configuration\
  \ = Registry::get(\"configuration\");\n\n        if ($configuration)\n        {\n\
  \            $configuration = $configuration->initialize();\n            $parsed\
  \ = $configuration->parse(\"configuration/cache\");\n\n            if (!empty($parsed->cache->default)\
  \ && !empty($parsed->cache->default->type))\n            {\n                $type\
  \ = $parsed->cache->default->type;\n                unset($parsed->cache->default->type);\n\
  \                $this->__construct(array(\n                    \"type\" => $type,\n\
  \                    \"options\" => (array) $parsed->cache->default\n          \
  \      ));\n            }\n        }\n    }\n\n    if (empty($type))\n    {\n  \
  \      throw new Exception\\Argument(\"Invalid type\");\n    }\n\n    switch ($type)\n\
  \    {\n        case \"memcached\":\n        {\n            return new Cache\\Driver\\\
  Memcached($this->getOptions());\n            break;\n        }\n        default:\n\
  \        {\n            throw new Exception\\Argument(\"Invalid type\");\n     \
  \       break;\n        }\n    }\n}\n```\n\n缓存驱动程序的默认类型定义在 `application/configuration/cache.ini`\
  \ 文件中，很明显这将是一个缓存驱动程序类的列表，而不是数据库连接器类。除此之外，自动配置遵循与 `Database` 类工厂相同的模式。\n\n\n\n"
- "# 第 13 章：引导启动\n\n**注意：** 根据缓存驱动的不同，`Cache::initialize()` 和 `Cache->connect()` 之间也可能存在同样的区别。对于\
  \ Memcached 而言，虽然没有用户凭据，但涉及地址和端口，因此可能出现缓存实例有效，但无法连接到有效服务器的情况。当工厂类执行失败时，请始终参考生成的异常类型——它们很可能属于\
  \ `Database/Exception/Service` 或 `Cache/Exception/Service` 类型，这表示实例有效，但无法连接到所需的服务器/服务。\n\
  \n### 控制器\n\n引导启动谜题的最后一块，严格来说并不属于引导启动或我们的框架范畴。它实际上是关于每个控制器将如何渲染视图。让我澄清一下：这部分代码既属于应用代码，也属于框架代码。\n\
  \n回顾我们框架的三个目标，第二个目标是创建一个易于使用、且对我们将要创建的应用做出最少假设的框架。然而，有时这两个陈述会相互矛盾。视图渲染就是一个非常实际的例子。\n\
  \n我们可以假设应用的所有动作都会引发响应。此外，这种响应应该以能够传达给应用用户的形式呈现。它可以是 HTML、JavaScript（JSON）、XML 等形式。关键在于，所有（或几乎所有）动作都需要输出，且这些输出很可能以视图的形式出现。\n\
  \n因此，MVC 范式是框架的绝佳选择。我们期望有大量控制器/动作，每个都需要大量的视图渲染操作。虽然我们在此处实现了良好的分离，但也存在大量重复行为。如果每个动作都需要输出到视图，我们要么需要在每个动作（方法）的主体中渲染视图，要么需要将其挂接到框架执行的某个公共点上，使其成为标准行为。\n\
  \n此时，我们可以选择创建一个特定于应用的 `Controller` 子类，应用中所有控制器都将继承其视图渲染行为；或者我们也可以决定将这种常见行为整合到默认的\
  \ `Controller` 类中。我认为，现阶段最佳做法就是直接修改 `Controller` 类。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**注意：** 我们将在后续章节中学习如何扩展框架类，但现在你只需跟着我一起扩展默认的 `Controller` 类。\n\n### 视图\n\n在开始修改\
  \ `Controller` 类之前，我们必须先创建一个用于处理（和渲染）视图的类。为保持该类简洁，我们假设它处理的是类似于我们已构建的模板解析器之类的类；也就是说，一个包含\
  \ `parse()` 和 `process()` 方法，且外观如清单 13-5 所示的类。\n\n***清单 13-5.*** 视图类\n\n```\nnamespace\
  \ Framework\n\n{\n\nuse Framework\\Base as Base;\n\nuse Framework\\Template as Template;\n\
  \nuse Framework\\View\\Exception as Exception;\n\nclass View extends Base\n\n{\n\
  \n    /**\n\n    * @readwrite\n\n    */\n\n    protected $_file;\n\n    /**\n\n\
  \    * @read\n\n    */\n\n    protected $_template;\n\n    protected $_data = array();\n\
  \n    public function _getExceptionForImplementation($method)\n\n    {\n\n     \
  \   return new Exception\\Implementation(\"{$method} 方法未实现\");\n\n    }\n\n    public\
  \ function _getExceptionForArgument()\n\n    {\n\n        return new Exception\\\
  Argument(\"参数无效\");\n\n    }\n\n    public function __construct($options = array())\n\
  \n    {\n\n        parent::__construct($options);\n\n        $this->_template =\
  \ new Template(array(\n\n            \"implementation\" => new Template\\Implementation\\\
  Standard()\n\n        ));\n\n    }\n\n    public function render()\n\n    {\n\n\
  \        [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n        if (!file_exists($this->getFile()))\n\
  \n        {\n\n            return \"\";\n\n        }\n\n        $content = file_get_contents($this->getFile());\n\
  \n        $this->_template->parse($content);\n\n        return $this->_template->process($this->_data);\n\
  \n    }\n\n}\n```\n\n\n\n`public function get($key, $default = \"\")`\n\n```\n{\n\
  \    if (isset($this->_data[$key]))\n    {\n        return $this->_data[$key];\n\
  \    }\n    return $default;\n}\n\nprotected function _set($key, $value)\n{\n  \
  \  if (!is_string($key) && !is_numeric($key))\n    {\n        throw new Exception\\\
  Data(\"Key must be a string or a number\");\n    }\n    $this->_data[$key] = $value;\n\
  }\n\npublic function set($key, $value = null)\n{\n    if (is_array($key))\n    {\n\
  \        foreach ($key as $_key => $value)\n        {\n            $this->_set($_key,\
  \ $value);\n        }\n        return $this;\n    }\n    $this->_set($key, $value);\n\
  \    return $this;\n}\n\npublic function erase($key)\n{\n    unset($this->_data[$key]);\n\
  \    return $this;\n}\n}\n```\n\n关于 `View` 类，有几个重要事项需要注意。首先，它的构造函数会创建一个 `Template`\
  \ 实例，后续将使用该实例来解析视图模板。其次，它拥有存储、检索和擦除模板数据键值对的方法，这些数据会提供给模板解析器。你可以将 `View` 类看作类似缓存驱动器的组件，并结合我们之前看到的模板解析器使用示例。\n\
  \n我们假设视图将通过我们创建的模板解析器进行渲染。如果我们希望实现不同的行为，可以轻松地对这个 `View` 类进行子类化，用我们自己的逻辑重写 `__construct()`\
  \ 和 `render()` 方法。不过，这个类确实为模板解析提供了一个便捷的外观模式接口。\n\n> **注意** 我们之前使用的外观设计模式，可以描述为一个类为更复杂的功能集提供简单接口。你可以通过\
  \ [`en.wikipedia.org/wiki/Facade_pattern`](http://en.wikipedia.org/wiki/Facade_pattern)\
  \ 了解更多关于外观模式的信息。\n\n### 渲染（Rendering）\n\n`View` 类只完成了自动渲染正确视图所需工作的一半。我们现在需要在一个修改后的\
  \ `Controller` 类中使用它，以便每个动作都能渲染其对应的视图。对 `Controller` 的修改相当广泛，因此我们将逐一审查每个部分。我们从之前\
  \ `Controller` 骨架的一些补充开始，如清单 13-6 所示。\n\n***清单 13-6.*** 完善控制器（Controller）\n\n```\n\
  namespace Framework\n{\n    use Framework\\Base as Base;\n    use Framework\\View\
  \ as View;\n    use Framework\\Registry as Registry;\n    use Framework\\Template\
  \ as Template;\n    use Framework\\Controller\\Exception as Exception;\n\n    class\
  \ Controller extends Base\n    {\n        /**\n         * @readwrite\n         */\n\
  \        protected $_parameters;\n\n        /**\n         * @readwrite\n       \
  \  */\n        protected $_layoutView;\n\n        /**\n         * @readwrite\n \
  \        */\n        protected $_actionView;\n\n        /**\n         * @readwrite\n\
  \         */\n        protected $_willRenderLayoutView = true;\n\n        /**\n\
  \         * @readwrite\n         */\n        protected $_willRenderActionView =\
  \ true;\n\n        /**\n         * @readwrite\n         */\n        protected $_defaultPath\
  \ = \"application/views\";\n\n        /**\n         * @readwrite\n         */\n\
  \        protected $_defaultLayout = \"layouts/standard\";\n\n        /**\n    \
  \     * @readwrite\n         */\n        protected $_defaultExtension = \"html\"\
  ;\n\n        /**\n         * @readwrite\n         */\n        protected $_defaultContentType\
  \ = \"text/html\";\n\n        protected function _getExceptionForImplementation($method)\n\
  \        {\n            return new Exception\\Implementation(\"{$method} method\
  \ not implemented\");\n        }\n\n        protected function _getExceptionForArgument()\n\
  \        {\n            return new Exception\\Argument(\"Invalid argument\");\n\
  \        }\n    }\n}\n```\n\n我们增加了三个额外的 getter/setter 属性：`layoutView`、`actionView`，以及\
  \ `willRenderLayoutView`/`willRenderActionView`。`layoutView` 属性是布局视图的占位符，`actionView`\
  \ 属性是动作视图的占位符，而 `willRenderLayoutView`/`willRenderActionView` 属性是用于禁用自动视图渲染的标志位。\n\
  \n布局解决了你可能甚至未曾意识到存在的问题。在界面设计方面，一致的布局对于良好的用户体验至关重要。我之前说过将忽略（大部分）界面设计，但这是任何优秀应用的功能性需求，因此我们现在就添加它。\n\
  \n\n\n"
- "# 布局与视图\n\n布局本质上就是共享的视图。它们作为框架，在其中渲染各个动作的视图，旨在减少整个应用视图文件中的重复 HTML。通过它们的使用流程，你可以更好地理解它们。\n\
  \n当控制器需要尝试自动渲染视图时，它会先渲染当前动作的视图，然后再渲染布局的视图。动作视图和布局视图都是`View`实例，但动作视图的标记会被插入到布局视图标记的正中央。现在，我们来看看**列表\
  \ 13-7**中负责渲染视图的方法。\n\n## 列表 13-7. 渲染方法\n\n```\npublic function render()\n{\n  \
  \  $defaultContentType = $this->getDefaultContentType();\n    $results = null;\n\
  \    $doAction = $this->getWillRenderActionView() && $this->getActionView(); \n\
  \    $doLayout = $this->getWillRenderLayoutView() && $this->getLayoutView(); \n\
  \    try\n    {\n        if ($doAction)\n        {\n            $view = $this->getActionView();\n\
  \            $results = $view->render();\n        }\n        if ($doLayout)\n  \
  \      {\n            $view = $this->getLayoutView();\n            $view->set(\"\
  template\", $results);\n            $results = $view->render();\n            header(\"\
  Content-type: {$defaultContentType}\");\n            echo $results;\n        }\n\
  \        else if ($doAction)\n        {\n            header(\"Content-type: {$defaultContentType}\"\
  );\n            echo $results;\n            $this->setWillRenderLayoutView(false);\n\
  \            $this->setWillRenderActionView(false);\n        }\n    }\n    catch\
  \ (\\Exception $e)\n    {\n        throw new View\\Exception\\Renderer(\"Invalid\
  \ layout/template syntax\");\n    }\n}\n\npublic function __destruct()\n{\n    $this->render();\n\
  }\n```\n\n`__destruct()` 方法负责调用 `render()` 方法。这意味着在每个动作执行结束时都会调用 `render()` 方法。如果\
  \ `willRenderLayoutView` 和 `layoutView` 均为真，则会渲染布局。同样，如果 `willRenderActionView`\
  \ 和 `actionView` 均为真，则会渲染动作视图。如果布局和动作视图都进行了渲染，那么动作视图的内容会赋值给布局的模板；否则，动作视图的内容将直接返回给浏览器。为了防止多次调用\
  \ `render()`，`willRenderLayoutView` / `willRenderActionView` 会被设为 false，以避免重复渲染布局/动作视图。\n\
  \n我们需要修改的最后一个`Controller`方法是`__construct()`方法，如**列表 13-8**所示。\n\n## 列表 13-8. `__construct()`\
  \ 方法\n\n```\npublic function __construct($options = array())\n{\n    parent::__construct($options);\n\
  \    if ($this->getWillRenderLayoutView())\n    {\n        $defaultPath = $this->getDefaultPath();\n\
  \        $defaultLayout = $this->getDefaultLayout();\n        $defaultExtension\
  \ = $this->getDefaultExtension();\n        $view = new View(array(\n           \
  \ \"file\" => APP_PATH.\"/{$defaultPath}/{$defaultLayout}.{$defaultExtension}\"\n\
  \        ));\n        $this->setLayoutView($view);\n    }\n    if ($this->getWillRenderLayoutView())\n\
  \    {\n        $router = Registry::get(\"router\");\n        $controller = $router->getController();\n\
  \        $action = $router->getAction();\n        $view = new View(array(\n    \
  \        \"file\" => APP_PATH.\"/{$defaultPath}/{$controller}/{$action}.{$defaultExtension}\"\
  \n        ));\n        $this->setActionView($view);\n    }\n}\n```\n\n这个新的`__construct()`方法做了两件重要的事。首先，它定义了布局模板的位置，该位置被传递给新的`View`实例，随后该实例被传入`setLayoutView()`设置方法。\n\
  \n其次，它从路由器获取控制器/动作的名称。它从注册表中获取路由器实例，并使用相应的 getter 方法获取名称。然后，它根据控制器/动作的名称构建一个路径，指向一个可渲染的模板。\n\
  \n例如，如果用户请求 URL `http://localhost/users/add.html`，新的`__construct()`方法会将位置定义为 `APP_PATH/application/views/users/add.html`。两者之间的对应关系只是与我们命名和组织结构的一种巧合。\n\
  \n为了帮助你理解新`Controller`类的完整结构，我在**列表 13-9**中包含了完整代码。\n\n\n\n### ***清单 13-9.*** 修改后的控制器类\n\
  \n```php\nnamespace Framework\n{\n    use Framework\\Base as Base;\n    use Framework\\\
