    Controller


    Model


    ***Figure 1-1.** Model-View-Controller in a nutshell*


    ■ **Note** Not every request to the application will require a model or a view.
    Which elements are loaded depends on the type of request and the resources required
    to fulfill it. The URL requested defines this, in a process called *routing*,
    which we will cover in Chapter 7. A controller could, for instance, serve only
    to toggle an application’s state, or to return unparsed data directly from a third-party
    service. In such cases, there would be no need for models or views!


    Let’s look at an example application that illustrates the use of these classes.
    Social networks are usually simple to use, but can be quite complicated behind
    the scenes. If we were to build a simple social network, we would have to consider
    not only the user interface elements, but also how the user data is stored and
    how the user interface reacts to user input. We would need to consider the following
    aspects:


    - Our social network is likely to maintain user data within a database. It will
    also need to access user photos from a third-party service, such as Flickr. The
    code for both these operations should be kept in models, as these operations directly
    relate to our business requirements.

    - Our social network should be easy to use, and attractive to its users. Because
    we are building it for the Web, we will use standard web site technologies such
    as HTML for markup, externally linked CSS style sheets, and externally linked
    JavaScript files for behavior. All of these elements will be present in views.

    - Our application’s models and views must be connected together without interfering
    with one another. Additionally, the application needs a way to respond to user
    interaction in views and persist the relevant data to models. Controllers are
    used for this purpose.


    Hopefully, this illustrates the concept in a way that makes sense. We will be
    looking at each part in much more detail throughout this book. The simple social
    network will also be used as a consistent example as we unpack the code required
    to make our framework work.


    ## Benefits of MVC


    There is no point explaining what MVC is without knowing why you should use it.
    Remember Christopher Alexander’s patterns that I mentioned earlier? MVC is one
    of the many patterns that will be explained in this book, but to understand the
    usefulness of this design pattern, we must look toward the problems it helps to
    alleviate.


    If you think of a sports team, you might realize that it is essentially a large
    group of players who fulfill their individual roles in order to drive the team
    forward. Good sports teams require the effort of each player performing their
    role to the best of their individual abilities to drive the team forward as a
    whole.


    The Web is an open playing field. It allows businesses, both large and small,
    to compete against each other without size being a factor in the quality of work.
    This means many small companies with small developer pools can get the chance
    to build big web applications. It also means many big companies can have many
    people working on big web applications at the same time. In all this multitasking
    and/or group participation, the aspects of an application (which should be separate)
    often interfere with each other and require more time and effort than strictly
    necessary to drive forward.


    There are many aspects to any complicated web application. There is design, which
    piques user interest in the product. There is business logic required to do practical
    things such as process sale items and invoice shoppers. Then there is the continual
    process of improving, updating, bug-fixing, and general streamlining of the application.


    In any unstructured application, these areas tend to melt together in an incoherent
    mess. When the database needs to be changed to accommodate a new product line,
    or the company decides to rebrand, it doesn’t only affect the code it should.
    More developers have to get involved to make sure that changes in one part of
    the application don’t immediately break other parts of the application. Changes
    that should only affect a tiny section of code end up spilling into all sorts
    of strange and problematic areas.


    This is the problem that MVC seeks to address. It defines strict containers for
    all of an application’s code and features. When changes to database code are isolated
    in a model, views and controllers will not break. When an application’s artwork
    changes drastically, its controller and model will be safe from breaking changes.


    ■ **Note** A good MVC-based application needs more than just a good MVC framework
    to succeed. It needs developers who are prepared to play by the rules and think
    carefully where they keep their code, instead of just throwing it in the codebase.
    We can only design the structure, just like an architect designing a beautiful
    house. It is up to the developers that use our framework to keep things in order.


    Now that we know more about why we should be using MVC, let’s look at some popular
    alternatives to writing our own framework.


    ## Popular MVC Frameworks


    There are many great PHP frameworks available, but if we limit our view to just
    three, I think we can get a good idea of what they have in common, and what makes
    each special. These are not the best or the only PHP MVC frameworks, but simply
    a good cross-section of the different approaches to PHP MVC development.


    ### CodeIgniter


    CodeIgniter is the first and simplest of the frameworks we will be looking into.
    It is developed and maintained by EllisLab and can be described as an open source
    (though, tightly controlled) framework that forms the base for EllisLab’s premium
    CMS (Content Management System) ExpressionEngine.


    It has been around for ages, yet its ideals have changed very little in all the
    years since first I used it. It strives to maintain a tiny footprint, excellent
    developer documentation, and high code quality. It does not enjoy the same levels
    of popularity as some of the other frameworks we will talk about, and this is
    partly due to how EllisLab has managed the CodeIgniter community. They have recently
    begun to address this issue with new conferences and staff, and things are looking
    up for this framework.


    It has also inspired other frameworks, giving birth to projects such as KohanaPHP.


    ■ **Note** You can download CodeIgniter at [http://codeigniter.com](http://codeigniter.com).
    You can also learn more about EllisLab and ExpressionEngine at [http://ellislab.com](http://ellislab.com).
    Finally, you can learn more about KohanaPHP at [http://kohanaframework.org](http://kohanaframework.org).


    ### Zend Framework


    Zend Framework is an extensive collection of loosely coupled code libraries that
    can form the basis of an MVC architecture. Zend Framework takes quite a bit of
    effort to understand and master relative to other popular MVC frameworks. It is
    developed by Zend Technologies and enjoys all the benefits of a large, stable
    community and wide adoption.'
