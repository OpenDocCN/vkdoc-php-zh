    # 界面层中的代码部分


    界面层中可能存在一些代码（后续章节会展示），这些代码负责准备要发送给其他层的信息。例如，用于验证用户是否已输入所有必要信息或正确信息（如年龄文本框中的数字字符）的`JavaScript`代码是可接受的。此外，可能还有代码负责将从业务规则层接收的信息（例如将数字转换为文本格式）进行预处理，以便在界面中显示。


    - **验证/验证码** — 验证码用于校验信息。这些代码将接收到的信息与预期的标准格式进行比对。例如，代码可以验证电子邮件地址是否同时包含`@`和`.`（句点）。如果信息包含这两个符号，则可视为“有效”（尽管我们仍不确定该邮箱地址是否真实存在）。如果缺少任一符号，则代码判定为无效。无效信息通常会导致程序向用户显示错误消息，要求重新输入有效信息。


    界面层通常提供能够响应用户交互（如点击提交按钮）的代码，这通常被称为*用户事件*。还可能存在代码，用于处理用户提供的信息，以便供其他层使用（例如将用户输入的文本转换为数字格式，供业务规则层进行计算）。


    - **事件 — 事件驱动型语言**（如`PHP`）可以在事件发生时执行代码块。事件既可以是用户的操作（如点击按钮），也可以由操作系统触发。程序提供监听代码来“侦听”事件。当事件发生时，代码会提供一个事件方法，然后该方法被执行。


    程序根据是否提供监听代码来选择要监听的事件。


    界面层不应直接与数据库管理系统或数据库本身交互。如果这样做，该层将被锁定在特定的数据库位置和实际数据库设计中。该层不应（除显示目的外）操作数据。任何与应用程序本身相关的记账、数学计算或数据处理都应在业务规则层完成。


    ## 界面层中的该做与不该做


    | 该做 | 不该做 |

    | --- | --- |

    | 格式化数据以用于显示 | 从数据库访问数据 |

    | 验证用户信息的正确性 | 计算结果 |

    | 响应用户事件 | 处理信息 |

    | 处理意外情况（异常） | 验证用户 ID 和密码 |

    | 为业务规则层格式化数据 |  |


    - **数据库管理系统（DBMS）** — 数据库管理系统是一种允许用户或应用程序创建和定义数据库的软件。它还提供了在数据库中插入、更新或删除信息的能力。


    ### 动手实践


    1.  列举三个应包含在界面层中的项目示例。

    2.  列举三个不应包含在界面层中的项目示例。

    3.  界面层中可以包含一些程序代码吗？如果可以，这些代码提供了哪些任务功能？


    # 业务规则层


    ![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig7_HTML.jpg](img/394210_2_En_2_Fig7_HTML.jpg)


    **图 2-7** 业务规则层


    业务规则层处理从界面层和数据层接收的所有信息与数据。该层还会返回界面层请求的信息（例如返回`"Hello World"`），并将信息提交给数据层进行存储。大部分实际编程代码都包含在这一层中。


    业务规则层的代码通常使一个应用程序与其他应用程序真正区别开来。如果某个应用程序拥有版权，其独特创意的算法很可能隐藏在该层中。例如，网络搜索引擎之间的许多差异以及信息最终如何显示的机制，都嵌入在业务规则层中。


    与可能包含浏览器中代码的界面层不同，业务层的所有编码都是使用服务器上的程序（例如`PHP`）完成的。驻留在服务器上的脚本和编程代码由服务器本身保护，用户无法访问。业务层代码也可以驻留在应用服务器上（作为服务）或网络服务器上（作为网络服务）。服务器通过不允许用户直接访问，来确保该层中代码的安全。


    - **服务器/应用服务器/网络服务器** — 服务器连接到网络，为网络（或互联网）上的任何节点（机器）提供服务。一台服务器可以提供不止一种服务（通信、安全和/或存储），也可以提供特定服务。应用服务器承载可供网络（或互联网）上用户访问的应用程序。网络服务器托管网页和网络应用程序。它们通常暴露在公司的外部访问中。

    - **服务** — 服务是驻留在计算机或服务器内存中、响应其他应用程序请求的应用程序。服务可以在计算机或服务器启动时自动加载到内存中，也可以根据需要手动启动和停止。服务没有图形用户界面。业务规则层可以作为一项或多项服务驻留在计算机或服务器上。


    在应用程序各层之间传递的信息可能会受到黑客的篡改；因此，该层可能包含类似于界面层中的代码，用于验证接收数据的有效性和正确格式。


    从该层传递到其他层的信息可以格式化为易于接收的形式。例如，一个*数据集*（类似于表格或电子表格）可以返回给界面层，以便在网页上的表格或列表框中显示。数据集也可以发送到数据层，以便插入到数据库中。


    - **数据集** — *数据集*是一种可以容纳多个数据表的结构。数据表类似于数据库中的表（包含行、列和数据）或电子表格。数据集通常用于在层之间和方法之间传递信息。


    业务规则层向请求信息的各层返回数值。该层不提供任何图形用户界面或任何形式的表单。不需要界面，因为该层在任何时候都不与用户直接接触。所有与业务规则层的通信都通过界面层或数据层处理。与界面层类似，业务规则层不直接更新数据库中的存储信息。所有存储更新都在数据层进行。


    ## 业务规则层中的该做与不该做


    | 该做 | 不该做 |

    | --- | --- |

    | 操作数据 | 显示信息 |

    | 格式化数据 | 将数据保存到辅助存储设备 |

    | 将数据存储在内存中 | 显示错误消息 |

    | 抛出异常 |  |

    | 验证数据 |  |


    ### 动手实践


    1.  业务规则层代码可以完成哪些与界面层代码相似的任务？为什么这些代码可能在这两个层中重复出现？

    2.  业务规则层如何传递和接收数据（信息）？

    '
- fmt: "### 3. Why must the business rules tier talk indirectly through the interface\
    \ tier to provide information to the users?\n\n### Data Tier\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig8_HTML.jpg](images/394210_2_En_2_Chapter/394210_2_En_2_Fig8_HTML.jpg)\n\
    \n**Figure 2-8**  \nData tier\n\nThe data tier’s main function is to store information\
    \ on a secondary device or to return data to the business rules tier. Data can\
    \ (and usually is) be stored in a database using a Database Management System\
    \ (like MySQL or MariaDB). The tier interfaces with the business rules tier, since\
    \ data may be manipulated before being displayed, as in the creation of a report.\
    \ Data is returned from the tier in a format that the business rules tier (and\
    \ programming languages) can accept. Common formats include `JSON`, `XML`, `SOAP`,\
    \ and datasets.\n\n- `JSON`—*JavaScript Object Notation* is a format, similar\
    \ to `XML`, to store and exchange data. `JSON` can be viewed within an editor\
    \ or browser. It is most commonly used to pass data between tiers.\n- `XML`—*Extensible\
    \ Markup Language* is a markup language, similar to `HTML`, to store and describe\
    \ data. `XML` can also be used to transmit data between tiers.\n- `SOAP`—*Simple\
    \ Object Access Protocol* is used to exchange data with a web service. It works\
    \ with `HTTP` (Hypertext Transfer Protocol) and `SMTP` (Simple Mail Transfer Protocol)\
    \ to provide communication between an application and a web service.\n- *Web service*—An\
    \ application, without an interface, that can be called to process information.\
    \ A web service can provide the functionality of the business tier and/or data\
    \ tier remotely on a web server. The *Web Services Description Language* (`WSDL`)\
    \ is used to describe calls to the web service and the format of information accept\
    \ and returned by the web service. `WSDL` is similar to `XML`.\n\nValidation with\
    \ the data tier is done in the Database Management System and/or via program code.\
    \ Validation in this tier is the last chance to make sure data is reliable and\
    \ accurate before the database is updated. It is much easier to catch validation\
    \ problems before they are stored than after invalid information has been recorded.\n\
    \nData storage can be local and/or remote. Mobile devices can restrict storage\
    \ to local databases (smart phones) but can also use `WSDL` (web services) to\
    \ store and retrieve information remotely on a server or within a cloud (such\
    \ as Microsoft Azure). Additionally, many applications save small amounts of information\
    \ locally with cookies, or larger amounts of information in remote databases.\n\
    \n- *Microsoft Azure*—Microsoft Azure is a cloud platform that provides data services,\
    \ app services, and network services. Visual Studio Applications can be uploaded\
    \ and secured in the Microsoft Azure cloud.\n\nThe data tier uses `SQL` statements\
    \ (`INSERT`, `DELETE`, `UPDATE`, and `SELECT`) to retrieve and update information\
    \ in a database. However, the actual request for the information to be changed\
    \ comes from within the business rules tier. For example, a user requesting an\
    \ address change in a web application would have to enter the requested change\
    \ in the interface tier, format the update request in the business rules tier,\
    \ and change the information in the database in the data tier.\n\n| Do | Don’t\
    \ |\n| --- | --- |\n| Save data on secondary device | Manipulate data |\n| Update\
    \ data on secondary device | Display error messages |\n| Raise exceptions | Display\
    \ information |\n| Verify data |  |\n\n### Do It\n\n1. Why must the data tier\
    \ validate information again before it is placed in a database?\n2. What type\
    \ of code, if any, can exist in the data tier?\n3. What is `SQL` used for?"
