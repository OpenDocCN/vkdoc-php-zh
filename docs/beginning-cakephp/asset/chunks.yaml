    **92**


    C H A P T E R 7 ■ W O R K I N G W I T H C O N T R O L L E R S A N D M O D E L
    S


    **How Callback Actions Work in the Controller**


    Controller callbacks make it possible to perform logic before or after launching
    an action. For example, say you launched the View action in the Posts controller.
    Before the View action is run by the controller, certain callbacks are checked
    for any content. By placing code in these callback actions, you can perform some
    logic for any and all actions before the action is executed, after it is executed,
    or just before the view is rendered. Let’s say you wanted to restrict access to
    the View action; you could accomplish this in a callback action.


