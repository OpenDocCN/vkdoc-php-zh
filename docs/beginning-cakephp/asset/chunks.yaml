    the parent application folder “as is”


    to a remote directory, and it should run just fine. You will need to run a MySQL
    dump file of some kind to mirror the remote and localhost databases.


    To secure your application, you should place the Cake libraries and app folder
    outside the document root on your remote server. This requires that you make a
    couple of adjustments to the folder structure of the application and that you
    change a couple of global variables.


    The three main folders you can move around on the server are cake, app, and webroot.


    The main catch when you do change the folder structure of the application is that
    the webroot folder must be available in a public directory or document root. Let’s
    assume that my remote host is set up with a home folder (outside the document
    root) and www as the document root, while the domain points to [user/home/www.
    To better secur](http://www.To)e the application, I place the Cake libraries and
    the app folder in user/home, and I take webroot out of the app folder and place
    it in [user/home/www. Cake can handle this str](http://www.Cake)ucture, but I
    must change some variables in user/home/www/webroot/index.php before it will compile
    correctly.


    I open the webroot/index.php file and scroll to where I see three global constants:
    ROOT, APP_DIR, and CAKE_CORE_INCLUDE_PATH. Table 15-1 shows the path on the remote
    host that each constant should be assigned, given my current folder structure.


    **Table 15-1.** *Paths for My Remote Setup*


    **Constant**


    **Server Path**


    ROOT


    /user/home


    APP_DIR


    www


    CAKE_CORE_INCLUDE_PATH


    user/home


    Cake uses DS as the directory separator. So, I reassign these constants to their
    new paths following Table 15-1 and end up with what is shown in Listing 15-2\.
    (Normally, there are a few comment lines in this file; I’ve omitted them from
    the listing.)


    **Listing 15-2.** *Changing the* webroot/index.php *File to Work on My Remote
    Host* if (!defined(''ROOT'')) {


    define(''ROOT'', DS.''user''.DS.''home'');


