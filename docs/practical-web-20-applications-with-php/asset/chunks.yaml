    ## Chapter 9: Personalized User Areas


    In Chapters 7 and 8 we created the necessary forms and tools for users to manage
    their blogs, allowing them to create, edit, and delete posts. In this chapter
    we will be extending the web application further by creating a public home page
    for each user, which will be used to display their blog posts.


    In addition to creating a home page for each user, we will populate the main home
    page of the web application. The home page will consist of blog posts from all
    users who choose to have their posts included. They will be able to make this
    choice by using the options we will add to the "Your Account Details" page in
    this chapter.


    One key technique we will be looking at in this chapter is defining a custom URL
    scheme, instead of using the */controller*/*action* method used previously. The
    address of a user''s home page will be defined by their username, and we will
    manipulate the request handling of `Zend_Controller_Front` so that `http://phpweb20/user/*username*`
    will be used as the unique address to a user''s page. Combining this with the
    URL field we defined for blog posts, we will also create a unique permanent URL
    for every blog post that exists in the database.


    **Controlling User Settings**


    The first thing we''re going to do in this chapter is implement a settings-management
    system for users. This will allow them to control the way their blog behaves.
    These are the settings we want users to be able to control:


    - **Whether or not posts are shown on the application home page.** In the last
    section of this chapter we will change the application so it displays blog posts
    from all registered users on the home page if they choose to. By default, we will
    not include a user''s posts on the home page, but if they want to allow it, they
    will be able to change this setting.

    - **The number of posts displayed on their own home page.** When we set up the
    user home page, we will list the most recent posts on the this page. This setting
    will let the user control how many posts are shown on their home page. To see
    further posts, visitors will be able to click on a month to view all posts from
    that month.


    When we created the database tables for managing user data in Chapter 3, we created
    two tables: `users` and `users_profile`. The `users_profile` table was designed
    to allow us to easily expand the amount of data stored for each user account.
    We will use this table to store the settings we add in this section.


    Because of how this system is designed, you will be able to expand on it in the
    future if you want to give users more control over how their accounts or public
    home pages work.


    **Note:** Since we have also created a profile table for blog posts (`blog_posts_profile`),
    we could even add per-post settings. You could use this in a number of different
    scenarios. For example, if you had allowed visitors to post comments on your blog
    posts, you could use per-post settings to disable commenting on a single post.
    An appropriate place to add these settings to the interface would be in the "Edit
    Blog Post" form that we added in Chapter 7.


    **Presenting Customizable Settings to Users**


    To give users control over these settings, we will add them to the "Your Account
    Details" page. This involves adding the necessary HTML elements to the template
    for this page, as well as updating the class that processes this form (`FormProcessor_UserDetails`).


    **Note:** The code used to update user details was introduced at the end of Chapter
    4. We didn''t actually implement this code in the book, so you will need to first
    download the source code to implement the functionality in this section. This
    includes the `UserDetails.php` file in `./include/FormProcessor`, the `detailsAction()`
    and `detailscompleteAction()` methods in `./include/Controllers/AccountController.php`,
    and the `details.tpl` and `detailscomplete.tpl` templates in `./templates/account`.


    To implement settings management, the first thing we will do is add the settings
    described previously to the "Your Account Details" template. Listing 9-1 shows
    the HTML code we will add to the `./templates/account/details.tpl` template. This
    code also includes several variables from the form processor. We will add these
    to the form processor shortly.


    **Listing 9-1.** Allowing Users to Configure Settings When Updating Their Account
    Details (details.tpl)


    ```

    {include file=''header.tpl'' section=''account''}

    <form method="post" action="{geturl action=''details''}">

    <fieldset>

    <legend>Update Your Details</legend>

    <!-- // ... other code -->

    </fieldset>

    <fieldset>

    <legend>Account Settings</legend>

    <dl>

    <dt>

    How many blog posts would you like to show on your home page?

    </dt>

    <dd>

    <input type="text" name="num_posts" value="{$fp->num_posts}" />

    </dd>

    <dt>

    Would you like to display your blog posts on the web site home page?

    </dt>

    <dd>

    <select name="blog_public">

    <option value="0"

    {if !$fp->blog_public} selected="selected"{/if}>No</option>

    <option value="1"

    {if $fp->blog_public} selected="selected"{/if}>Yes</option>

    </select>

    </dd>

    </dl>

    </fieldset>

    <div class="submit">

    <input type="submit" value="Save New Details" />

    </div>

    </form>

    {include file=''footer.tpl''}

    ```


    **Tip:** To create standards-compliant XHTML, we must use `selected="selected"`
    to choose the preselected value in a `<select>` element. This is a change from
    the HTML 4.01 specification, which says Boolean values such as this should be
    specified using `selected` without an attribute value. Similarly, when preselecting
    the state of a check box (`<input type="checkbox" … />`), `checked="checked"`
    should be used. For more information about this, refer to the "Attribute Minimization"
    section at `http://www.w3.org/TR/xhtml1/#h-4.5`.


    This form can be viewed by logged-in users at `http://phpweb20/account/details`.


    **Processing Changes to User Settings**


    The next change we will make is to the form processor that processes the `details.tpl`
    template. First, we will retrieve the existing settings from the user profile
    so that they can be used in the form. Then we will process the submitted values
    and save them to the user profile.


    Listing 9-2 shows the changes we will make to the `UserDetails.php` file in `./include/FormProcessor`.


    **Listing 9-2.** Changes to the User Details Form Processor (UserDetails.php)


    ```

    <?php

    class FormProcessor_UserDetails extends FormProcessor

    {

    // ... other code

    public function __construct($db, $user_id)

    {

    // ... other code

    $this->blog_public = $this->user->profile->blog_public;

    $this->num_posts = $this->user->profile->num_posts;

    }

    public function process(Zend_Controller_Request_Abstract $request)

    {

    // ... other code

    // process the user settings

    $this->blog_public = (bool) $request->getPost(''blog_public'');

    $this->num_posts = max(1, (int) $request->getPost(''num_posts''));

    $this->user->profile->blog_public = $this->blog_public;

    $this->user->profile->num_posts = $this->num_posts;

    // if no errors have occurred, save the user

    if (!$this->hasError()) {

    $this->user->save();

    }

    // return true if no errors have occurred

    return !$this->hasError();

    }

    }

    ?>

    ```


    It is now possible for users to update their settings by submitting the form shown
    in Figure 9-1.


    **Figure 9-1.** Allowing users to update account settings


    **Creating Default User Settings**


    If you were paying close attention to Figure 9-1, you might have noticed that
    the `num_posts` setting is empty. In other words, this setting won''t be set until
    the form has been submitted. It would be better to include some default value
    so the user has some reference point for changing the setting when they use this
    form.


    In order to assign default settings to a new user account, we will modify the
    `preInsert()` method on the `DatabaseObject_User` class. This method is automatically
    called prior to a new user record being saved to the database—we used this method
    previously to create the password for a new account.


    Listing 9-3 shows the changes we will make to the `User.php` file in `./include/DatabaseObject`.
    I have set the default value for `num_posts` to be 10, and I chose `false` as
    the default setting for `blog_public`. You may prefer different values.


    **Listing 9-3.** Assigning Default Settings for Users (User.php)


    ```

    <?php

    class DatabaseObject_User extends DatabaseObject

    {

    // ... other code

    protected function preInsert()

    {

    $this->_newPassword = Text_Password::create(8);

    $this->password = $this->_newPassword;

    // default account settings

    $this->profile->blog_public = false;

    $this->profile->num_posts = 10;

    return true;

    }

    // ... other code

    }

    ?>

    ```


    **Note:** You could present these settings to users when they register, thereby
    not requiring any defaults to be set here. However, you typically want to encourage
    people to register, so you want to make the process as simple as possible and
    allow them to further customize their account once they log in.


    To test that this functionality works correctly, try registering as a new user
    in the application. Once you have done so, you can either check the `users_profile`
    table in the database to see which values have been saved, or you can log in with
    the new account and visit the "Your Account Details" form we just modified to
    see if the setting values are prepopulated correctly.


    **The UserController Class**


    The next thing we will do is create a new controller for `Zend_Controller_Front`
    to display the public page. We will call it `UserController`. In this class, we
    will implement three main actions:


    - `indexAction()`: This method will be used to generate the home page for each
    user, accessible from `http://phpweb20/user/*username*`. On this page, we will
    list the most recent posts on the given user''s blog. The number of posts to be
    shown is controlled by the `num_posts` setting we added in the previous section.

    - `archiveAction()`: This method will be used to generate a list of all posts
    for a single month (which I refer to as a monthly archive). The output will be
    basically the same as that of `indexAction()`. By default, the current month will
    be selected.

    - `viewAction()`: This method will be used to display a single blog post. The
    posts listed on the `indexAction()` and `monthAction()` methods will link to this
    method.


    In the left column of each of these pages, a list of months that have blog posts
    will be shown, much like in the blog manager. The key difference is that this
    list is for visitors to view the blog archive, while the one in the blog manager
    allows the blog owner to access their posts to update them.


    In addition to these three main actions, we will also implement two methods called
    `userNotFoundAction()` and `postNotFoundAction()`, the first being used when a
    nonexistent username is present in the URL, while the second when trying to display
    a nonexistent blog post.


    **Routing Requests to UserController**


    For all the other controllers we have created so far, the access URL has been
    in the format `http://phpweb20/*controller*/*action*`; for example, the edit action
    of the blogmanager controller has a URL of `http://phpweb20/blogmanager/edit`.
    If no action is specified, `index` is the default action used for a controller.
    So in the case of `blogmanager`, the index action can be accessed using either
    `http://phpweb20/blogmanager` or `http://phpweb20/blogmanager/index`.


    In `UserController`, we will be altering the way URLs work, since all actions
    in this controller will relate to a particular user. In order to specify the user,
    we will change the URL scheme to be `http://phpweb20/user/*username*/*action*`.
    As you can see, we have inserted the username between the controller name (`user`)
    and the action.


    To achieve this, we must modify the *router* for our front controller. The router—an
    instance of `Zend_Controller_Router`—is responsible for determining the controller
    and action that should handle a user''s request based on the request URL. When
    `Zend_Controller_Front` is instantiated in our bootstrap `index.php` file, a set
    of default routes is automatically created to route requests using the `http://phpweb20/*controller*/*action*`
    scheme. We want to keep these routes intact for all other requests, but for the
    `UserController` we want an extra route. To do this, we must define the route,
    and then inject it into the front controller''s router.


    **Creating a New Route**


    To create a new route, there are three `Zend_Controller` classes that can be used
    (or you can develop your own). These are the existing classes:


    - `Zend_Controller_Router_Route`: This is the standard route used by Zend_Controller,
    allowing a combination of static and dynamic variables in a URL. A dynamic variable
    is indicated by preceding the variable name with a colon, such as `:controller`.
    The route we have used in this application so far has been `/:controller/:action`.
    For example, in `http://phpweb20/blogmanager/edit`, `blogmanager` is assigned
    to the `controller` request variable, while `edit` is assigned to the `action`
    request variable.

    - `Zend_Controller_Router_Route_Static`: In some cases, the URL you want to use
    doesn''t require any dynamic variables, and you can use this static route type.
    For example, if you wanted a URL such as `http://phpweb20/sitemap`, which internally
    was handled by a controller action called `sitemapAction()` in one of your controllers,
    you could route this URL accordingly, using `/sitemap` as the static route.

    - `Zend_Controller_Router_Route_Regex`: This type of route allows you to route
    URLs based on regular expression matches. For example, if you wanted to route
    all requests such as `http://phpweb20/*1234*` (where 1234 could be any number),
    you could match the route using `/([0-9]+)`. When used in combination with the
    default routes, any request that didn''t match this regular expression would be
    routed using the normal `/:controller/:action` route.


    We will now create a new route to match a URL scheme of `http://phpweb20/user/*username*/*action*`.
    Since this route will only be used for the `UserController` class we will be implementing
    shortly, we will hard-code the controller name (`user`), while the username and
    action values will be determined dynamically. If the action isn''t specified in
    the URL (as in the URL `http://phpweb20/user/*username*`), the action will default
    to `index`, just as it has previously.


    The route we will use is `user/:username/:action/*`. Since we are only using this
    route for `UserController`, we don''t include `:controller` in the string. When
    instantiating `Zend_Controller_Router_Route`, the first argument is this string,
    while the second argument is an array that specifies the default parameters for
    the request. Since we know the controller for this request is `user`, we can specify
    this. We can also specify `index` as the default action. Therefore, the code we
    use to create this new route is as follows:


    ```

    $route = new Zend_Controller_Router_Route(

    ''user/:username/:action/*'',

    array(''controller'' => ''user'',

    ''action'' => ''index'')

    );

    ```


    **Injecting the Route into the Router**


    Once the route has been created, it must be injected into the router so subsequent
    user requests will be matched against the route (in addition to any existing routes).


    The route is added by calling the `addRoute()` method on the `Zend_Controller`
    router, which can be accessed from the front controller by calling `getRouter()`.
    The first argument to `addRoute()` is a unique name to identify the route—it does
    not actually affect the behavior of the route.


    Listing 9-4 shows the code we will add to `./htdocs/index.php` in order to create
    this route. The route should be added just prior to dispatching the request with
    `$controller->dispatch()`.


    **Listing 9-4.** Defining a New Route for User Home Pages (index.php)


    ```

    <?php

    // ... other code

    // setup the route for user home pages

    $route = new Zend_Controller_Router_Route(''user/:username/:action/*'',

    array(''controller'' => ''user'',

    ''action'' => ''index''));

    $controller->getRouter()->addRoute(''user'', $route);

    $controller->dispatch();

    ?>

    ```


    **Note:** An alternative solution to the route we have created in this section
    could be to create URLs like `http://phpweb20/*username*` without including the
    `user` controller name in the URL. While this is relatively easy to achieve, it
    requires some other changes in coding. For example, when users enter a username
    on the registration form, you would need to ensure that the entered username doesn''t
    conflict with an existing controller name (or file or directory name). You would
    also need to be wary of any future controllers you may want to create, as they
    will not be able to conflict with an existing username.


    Once this route has been added, you will be able to access the `username` parameter
    of the URL inside any of the actions in `UserController` by calling `$request->getUserParam(''username'')`.


    **Dynamically Generating URLs for Custom Routes**


    When we implemented the `{geturl}` Smarty plug-in—as well as the `getUrl()` method
    in the `CustomControllerAction` class—in Chapter 6, we used the `Url` helper.
    We used the `simple()` method from this class to generate a URL based on the controller
    and action name. This helper also provides a method called `url()`, which can
    be used to generate more complex URLs based on custom routes, such as the one
    we added in Listing 9-4. We will now use this method to generate the URL to the
    home page of each user.


    To generate a link using the `url()` method of the `Url` helper, you pass the
    route parameters (in our case, the name of the action and the username) as the
    first parameter, and the name of the route it is being built for as the second
    argument. The `Url` helper will then reconstruct a URL based on these parameters.


    Let''s now look at a specific example. In Listing 9-4, the name of the route we
    created was called `user`. Thus, if we wanted to generate a link to the home page
    of the user with a username of `qz`, the following code would be used:


    ```

    $helper = Zend_Controller_Action_HelperBroker::getStaticHelper(''url'');

    $url = $helper->url(

    array(''username'' => ''qz''),

    ''user''

    );

    ```


    This code would generate the following string:


    ```

    /user/qz/

    ```


    We want to make use of this functionality in our own code, not only for the actions
    we will add in this chapter, but also for other actions we will add to this controller
    later in this book.


    To do this, we will add a new function to the `CustomControllerAction.php` file
    in `./include`. Listing 9-5 shows the code for the `getCustomUrl()` method, which
    accepts the URL parameters as the first argument and the name of the route as
    the second argument. As described in Chapter 6, we can access the helper using
    `$this->_helper->url` from within a controller.


    **Listing 9-5.** Building Complex URLs for Custom Routes (CustomControllerAction.php)


    ```

    <?php

    class CustomControllerAction extends Zend_Controller_Action

    {

    // ... other code

    public function getUrl($action = null, $controller = null)

    {

    $url = rtrim($this->getRequest()->getBaseUrl(), ''/'') . ''/'';

    $url .= $this->_helper->url->simple($action, $controller);

    return $url;

    }

    public function getCustomUrl($options, $route = null)

    {

    return $this->_helper->url->url($options, $route);

    }

    // ... other code

    }

    ?>

    ```


    In order to generate URLs with this helper from within our templates, we will
    also make some changes to the `{geturl}` Smarty plug-in. We will modify this plug-in
    so that if a parameter called `route` is specified, we will use the `url()` method
    of the `Url` helper; otherwise we will revert back to the previous method of generating
    URLs (using `simple()`).


    For instance, to generate a URL back to the home page of the `qz` user from within
    a template, we will be able to use the following code in the template:


    ```

    {geturl route=''user'' username=''qz''}

    ```


    Listing 9-6 shows the changes we will make to the `function.geturl.php` file in
    `./include/Templater/plugins`.


    **Listing 9-6.** Extending the geturl Smarty Plug-In to Support Custom Routes
    (function.geturl.php)


    ```

    <?php

    function smarty_function_geturl($params, $smarty)

    {

    $action = isset($params[''action'']) ? $params[''action''] : null;

    $controller = isset($params[''controller'']) ? $params[''controller''] : null;

    $route = isset($params[''route'']) ? $params[''route''] : null;

    $helper = Zend_Controller_Action_HelperBroker::getStaticHelper(''url'');

    if (strlen($route) > 0) {

    unset($params[''route'']);

    $url = $helper->url($params, $route);

    }

    else {

    $request = Zend_Controller_Front::getInstance()->getRequest();

    $url = rtrim($request->getBaseUrl(), ''/'') . ''/'';

    $url .= $helper->simple($action, $controller);

    }

    return $url;

    }

    ?>

    ```


    **Note:** The `url()` method of the `Url` helper will automatically prepend the
    `Zend_Controller` base URL, but the `simple()` method does not. This is why we
    manually do this only for the `simple()` call in this code.


    **Generating Other Required Routes**


    In addition to the route added in Listing 9-4, we will add two more routes: one
    for displaying individual blog posts, and one for displaying the monthly archives
    of a user''s blog.


    When we implemented the blog-management tools in Chapters 7 and 8, we included
    a `url` field with each blog post. The value for this field is unique for every
    post in a single user''s blog. We will now use this value to create URLs for individual
    blog posts. Each blog post will have a URL in the form of `/user/*username*/view/*blog-post-url*`.
    The controller action that will handle requests to this route will be called `viewAction()`—we
    will implement this method later in this chapter.


    In this particular case, the controller and action name are hard-coded in the
    URL; it''s the username and blog post URL that are unique. Thus, we can use the
    following code to generate this new route:


    ```

    $route = new Zend_Controller_Router_Route(

    ''user/:username/view/:url/*'',

    array(''controller'' => ''user'',

    ''action'' => ''view'')

    );

    ```


    For example, if I created a blog post with the title "My Holiday", this would
    generate a unique URL of `my-holiday`. The full URL to this blog post (remembering
    that my username is `qz`) would be `/user/qz/view/my-holiday`.


    If I wanted to generate a link to this post from within a Smarty template, I could
    use the `{geturl}` plug-in we modified in Listing 9-6 as follows:


    ```

    {geturl user=''qz'' url=''my-holiday'' route=''post''}

    ```


    **Note:** This assumes that when we inject the preceding route into the router,
    we use a name of `post`. We will do this shortly.


    Similarly, we can now create another route to handle blog post archives. The URL
    format for blog archives will be `/user/*username*/archive/*year*/*month*`. So
    to view my blog''s archive for, say, November 2007, the URL would be `/user/qz/archive/2007/11`.


    Once this route has been added (with a name of `archive`), we will be able to
    generate a link to this particular page in Smarty like this:


    ```

    {geturl user=''qz'' year=2007 month=11 route=''archive''}

    ```


    The code we use to create this route is as follows:


    ```

    $route = new Zend_Controller_Router_Route(

    ''user/:username/archive/:year/:month/*'',

    array(''controller'' => ''user'',

    ''action'' => ''archive'')

    );

    ```


    Listing 9-7 shows the changes we need to make to the bootstrap file (`./htdocs/index.php`)
    in order to create these new routes and add them to the router.


    **Listing 9-7.** Adding the Post and Archive Routes to the Router (index.php)


    ```

    <?php

    // ... other code

    // set up the route for user home pages

    $route = new Zend_Controller_Router_Route(

    ''user/:username/:action/*'',

    array(''controller'' => ''user'',

    ''action'' => ''index'')

    );

    $controller->getRouter()->addRoute(''user'', $route);

    // set up the route for viewing blog posts

    $route = new Zend_Controller_Router_Route(

    ''user/:username/view/:url/*'',

    array(''controller'' => ''user'',

    ''action'' => ''view'')

    );

    $controller->getRouter()->addRoute(''post'', $route);

    // set up the route for viewing monthly archives

    $route = new Zend_Controller_Router_Route(

    ''user/:username/archive/:year/:month/*'',

    array(''controller'' => ''user'',

    ''action'' => ''archive'')

    );

    $controller->getRouter()->addRoute(''archive'', $route);

    $controller->dispatch();

    ?>

    ```


    **Handling Requests to UserController**


    Despite the fact that we have changed the routing rules for this particular controller,
    we still create actions in the same way as the other controllers. The only difference
    is that for all actions in this controller, there will be a request parameter
    called `username` available.


    Since each method in the controller is used to present data for a particular user,
    we want to load that user''s database record in every action. To aid with this,
    we will add code to `UserController`''s `preDispatch()` method, which is called
    automatically prior to the controller action method being called. Loading the
    user details in `preDispatch()` means the user data will be available to all actions
    in `UserController`. If the user record cannot be loaded (such as if we have an
    invalid username), we will forward control to a method we will implement shortly
    called `userNotFoundAction()`.


    Listing 9-8 shows the initial code for the `UserController.php` file, which is
    stored in the `./include/Controllers` directory.


    **Listing 9-8.** Loading the Requested User Automatically for All Actions (UserController.php)


    ```

    <?php

    class UserController extends CustomControllerAction

    {

    protected $user = null;

    public function preDispatch()

    {

    // call parent method to perform standard predispatch tasks

    parent::preDispatch();

    // retrieve request object so we can access requested user and action

    $request = $this->getRequest();

    // check if already dispatching the user not found action. if we are

    // then we don''t want to execute the remainder of this method

    if (strtolower($request->getActionName()) == ''usernotfound'')

    return;

    // retrieve username from request and clean the string

    $username = trim($request->getUserParam(''username''));

    // if no username is present, redirect to site home page

    if (strlen($username) == 0)

    $this->_redirect($this->getUrl(''index'', ''index''));

    // load the user, based on username in request. if the user record

    // is not loaded then forward to notFoundAction so a ''user not found''

    // message can be shown to the user.

    $this->user = new DatabaseObject_User($this->db);

    if (!$this->user->loadByUsername($username)) {

    $this->_forward(''userNotFound'');

    return;

    }

    // Add a link to the breadcrumbs so all actions in this controller

    // link back to the user home page

    $this->breadcrumbs->addStep(

    $this->user->username . "''s Blog",

    $this->getCustomUrl(

    array(''username'' => $this->user->username,

    ''action'' => ''index''),

    ''user''

    )

    );

    // Make the user data available to all templates in this controller

    $this->view->user = $this->user;

    }

    public function userNotFoundAction()

    {

    $username = trim($this->getRequest()->getUserParam(''username''));

    $this->breadcrumbs->addStep(''User Not Found'');

    $this->view->requestedUsername = $username;

    }

    public function indexAction()

    {

    }

    public function viewAction()

    {

    }

    public function postNotFoundAction()

    {

    }

    public function archiveAction()

    {

    }

    }

    ?>

    ```


    The first thing we do in this class is define the `$user` property, which holds
    an instance of `DatabaseObject_User` (created in Chapter 3). This variable will
    be automatically assigned to all templates in this controller (this is done on
    the final line of `preDispatch()`).


    We begin the `preDispatch()` method by first calling the parent `preDispatch()`
    method, as this contains code that we need executed for all actions (such as initializing
    the breadcrumbs trail and flash messenger created in Chapter 6). After this we
    must check whether the current action is the user-not-found action. If we don''t
    do this, the code will enter a recursive loop that cannot be broken (since it
    will continually redirect back to the `userNotFoundAction()` method).


    The `preDispatch()` method continues by initializing the `username` parameter
    from the request. If the string is empty (as will be the case if a URL of `http://phpweb20/user`
    is used), we ignore the request by just redirecting back to the home page.


    **Note:** We could have used `getParam()` instead of `getUserParam()` on the request,
    but this would fall back to check "get" and "post" variables if an internal parameter
    was not found. This means that if you used `http://phpweb20/user?username=validUser`,
    the user record would be loaded. Typically, you don''t want people to be able
    to manipulate your applications in a way that wasn''t intended.


    If the string isn''t empty, we try to load a `DatabaseObject_User` record based
    on the `username` value. To do this, we implement a loader function called `loadByUsername()`
    in the `DatabaseObject_User` class, which is shown shortly in Listing 9-9.


    If the user record doesn''t load, we instantly forward the request to the `userNotFound`
    action and return from the current function.


    **Tip:** Normally when you call `_forward()` in the `Zend_Controller_Front` controller,
    the current action is completed before calling the action to which you''re forwarding.
    If you call `_forward()` in `preDispatch()`, however, the original action is completely
    skipped and only the new action is executed. In Listing 9-8, we must still return
    after calling `_forward()` because the remainder of the code in `preDispatch()`
    will still be executed otherwise.


    Next, we add a new step to the breadcrumb trail—one that will be automatically
    added to the trail for all actions in this controller. We use the `getCustomUrl()`
    method we added in Listing 9-5.


    Finally, we write the `$this->user` object to the view so it is available for
    all actions within this controller.


    As mentioned previously, we also need to implement a new record in the `DatabaseObject_User`
