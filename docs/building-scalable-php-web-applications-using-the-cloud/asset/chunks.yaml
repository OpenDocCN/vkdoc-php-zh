- fmt: "### 4.2 The PHP Code\n\nBefore we write the PHP code, we need to install some\
    \ additional PHP libraries so that we can connect to our database. Install them\
    \ with:\n\n```\nyum install -y php74-php-pgsql php74-php-pdo\nsystemctl restart\
    \ php74-php-fpm\n```\n\nOur application will be simple:\n\n* One file to hold\
    \ the configuration information and common functions\n* One file to show a list\
    \ of guestbook entries\n* One file to show an individual guestbook entry\n* One\
    \ file to enter a new guestbook entry\n* A CSS stylesheet\n\nThis book presumes\
    \ that you know a modicum of PHP and SQL, but even if you don’t, the code should\
    \ be straightforward enough to follow no matter what language you are familiar\
    \ with. Therefore, the files will be presented here without too much comment.\
    \ You will find the figures containing the code at the end of the chapter.\n\n\
    Figure [4-1](#487291_1_En_4_Chapter.xhtml#Fig1) shows the common functions that\
    \ are included by the other files. It has two functions for getting database connections—one\
    \ for getting a read-only connection and one for getting a read/write connection.\
    \ At this point, they both return the same connection (and they are indeed both\
    \ read/write), but as we develop the application further, we will see how a lot\
    \ can be gained by separating out connections that are used for reads only and\
    \ those that are used for reading and writing. These functions both simply use\
    \ `PDO` (PHP Data Objects) to grab a connection to the database using a connection\
    \ string. Note that these connection strings contain the password to the database.\
    \ Be sure to change the password on *both* of these connection strings to whatever\
    \ password you entered for `gbuser` database user earlier.\n\nIt also has the\
    \ `getHeader()` and `getFooter()` functions so we don’t have to write as much\
    \ HTML. Also, `h()` is used as a shorter version of `htmlspecialchars()` so that\
    \ we can have more secure output.\n\nFigure [4-2](#487291_1_En_4_Chapter.xhtml#Fig2)\
    \ is the PHP script that lists all of the entries in the database. This code simply\
    \ creates a database statement, executes it, and iterates through the results.\n\
    \nFigure [4-3](#487291_1_En_4_Chapter.xhtml#Fig3) shows getting a single entry\
    \ out of the database. Again, there is a single SQL statement that is prepared\
    \ and executed, and the results are displayed to the screen.\n\nFigure [4-4](#487291_1_En_4_Chapter.xhtml#Fig4)\
    \ simply shows a form that will be used to create a new guestbook entry. This\
    \ form posts its data to the program in Figure [4-5](#487291_1_En_4_Chapter.xhtml#Fig5).\
    \ That program creates a new record based on the values entered in. Then, after\
    \ performing the `SQL` insert statement, it redirects the user back to the listing\
    \ screen.\n\nFinally, Figure [4-6](#487291_1_En_4_Chapter.xhtml#Fig6) is a static\
    \ CSS file that provides a small amount of style to the whole procedure. As mentioned\
    \ in Chapter [1](#487291_1_En_1_Chapter.xhtml), if you don’t want to type in all\
    \ of these files yourself, you can get them all from GitHub at:\n\n```\nhttps://github.com/johnnyb/cloud-example-application\n\
    ```\n\nTo use git directly on the server, you will need to install it as the root\
    \ user with:\n\n```\nyum install -y git\n```\n\nAfter typing in all of the programs,\
    \ send them up to the `/var/www/html` folder on your new server. Then, navigate\
    \ your browser to `http://MY.IP.ADDRESS.HERE/list.php` and see if your program\
    \ works! If it does not, you can check the error log for PHP-FPM by logging in\
    \ as root and looking at the log file with the following command:\n\n```\ntail\
    \ -200 /var/opt/remi/php74/log/php-fpm/error.log\n```\n\nThis will give you the\
    \ last 200 lines of PHP’s error log.\n\nAnother log that will give you good information\
    \ can be accessed by issuing:\n\n```\ntail -200 /var/opt/remi/php74/log/php-fpm/www-error.log\n\
    ```\n\nFix any errors that you have and try again. The most likely error is that\
    \ there was something mistyped in the program, or the password listed in the connection\
    \ string doesn’t match the password you set for your PostgreSQL user.\n\nAnother\
    \ place to look for error messages is the web server’s error log. You can look\
    \ at the end of that log with the command:\n\n```\ntail -200 /etc/httpd/logs/error_log\n\
    ```\n\nAdditional troubleshooting steps can be found in Appendix C if needed.\
    \ If all goes well, you should have a screen that prompts you to create a new\
    \ entry. Clicking the link will give you a form to fill out. Once you fill out\
    \ that form, clicking “Submit” will add the new guestbook entry to the list. You\
    \ can then click the individual entry to see the full information. If that is\
    \ not what your application does, then something was probably entered incorrectly.\n\
    \n#### The Limitations of the Application\n\nThe goal of this book is to get you\
    \ up to speed on how to scale your applications. As such, other important aspects\
    \ of development such as error handling, logging, sanitizing data, and security\
    \ hardening are not covered. The goal is to convey an application that can be\
    \ typed in quickly, is easy to understand fully, and does not require deep platform\
    \ knowledge to follow or modify. Nonetheless, we have implemented some basic security\
    \ practices, such as using `bindValue` to properly escape the values sent in via\
    \ `$_GET` and `$_POST` and using `htmlspecialchars()` to escape them when sending\
    \ them back to the user.\n\nGood information about programming with security in\
    \ mind can be found on the `www.owasp.org` web site.\n\n![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig6_HTML.png](images/487291_1_En_4_Chapter/487291_1_En_4_Fig6_HTML.png)\n\
    \nFigure 4-6  \nCSS File (`guestbook.css`)\n\n![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig5_HTML.png](images/487291_1_En_4_Chapter/487291_1_En_4_Fig5_HTML.png)\n\
    \nFigure 4-5  \nCreate the Guestbook Entry (`create.php`)\n\n![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig4_HTML.png](images/487291_1_En_4_Chapter/487291_1_En_4_Fig4_HTML.png)\n\
    \nFigure 4-4  \nNew Guestbook Entry (`new.php`)\n\n![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig3_HTML.png](images/487291_1_En_4_Chapter/487291_1_En_4_Fig3_HTML.png)\n\
    \nFigure 4-3  \nSingle Guestbook Entry (`single.php`)\n\n![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig2_HTML.png](images/487291_1_En_4_Chapter/487291_1_En_4_Fig2_HTML.png)\n\
    \nFigure 4-2  \nList All Guestbook Entries (`list.php`)\n\n![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig1_HTML.png](images/487291_1_En_4_Chapter/487291_1_En_4_Fig1_HTML.png)\n\
    \nFigure 4-1  \nConfiguration and Common Functions (`common.php`)\n\n# 5. Setting\
    \ Up a Basic Cloud Cluster\n\nAt this point, we have a simple cloud application\
    \ which works on a single server. While it is nice that we can put this on a server\
    \ that we built just by pointing and clicking, this doesn’t take full advantage\
    \ of the cloud. One of the goals of the cloud is to create an application *cluster*—a\
    \ set of servers that work together to solve the problem, where the computing\
    \ power can be expanded and contracted as needed."
  raw: '## 4.2 The PHP Code


    Before we write the PHP code, we need to install some additional PHP libraries
    so that we can connect to our database. Install them with:


    ```

    yum install -y php74-php-pgsql php74-php-pdo

    systemctl restart php74-php-fpm

    ```


    Our application will be simple:


    *   One file to hold the configuration information and common functions


    *   One file to show a list of guestbook entries


    *   One file to show an individual guestbook entry


    *   One file to enter a new guestbook entry


    *   A CSS stylesheet


    This book presumes that you know a modicum of PHP and SQL, but even if you don’t,
    the code should be straightforward enough to follow no matter what language you
    are familiar with. Therefore, the files will be presented here without too much
    comment. You will find the figures containing the code at the end of the chapter.


    Figure [4-1](#487291_1_En_4_Chapter.xhtml#Fig1) shows the common functions that
    are included by the other files. It has two functions for getting database connections—one
    for getting a read-only connection and one for getting a read/write connection.
    At this point, they both return the same connection (and they are indeed both
    read/write), but as we develop the application further, we will see how a lot
    can be gained by separating out connections that are used for reads only and those
    that are used for reading and writing. These functions both simply use PDO (PHP
    Data Objects) to grab a connection to the database using a connection string.
    Note that these connection strings contain the password to the database. Be sure
    to change the password on *both* of these connection strings to whatever password
    you entered for `gbuser` database user earlier.


    It also has the `getHeader()` and `getFooter()` functions so we don’t have to
    write as much HTML. Also, `h()` is used as a shorter version of `htmlspecialchars()`
    so that we can have more secure output.


    Figure [4-2](#487291_1_En_4_Chapter.xhtml#Fig2) is the PHP script that lists all
    of the entries in the database. This code simply creates a database statement,
    executes it, and iterates through the results.


    Figure [4-3](#487291_1_En_4_Chapter.xhtml#Fig3) shows getting a single entry out
    of the database. Again, there is a single SQL statement that is prepared and executed,
    and the results are displayed to the screen.


    Figure [4-4](#487291_1_En_4_Chapter.xhtml#Fig4) simply shows a form that will
    be used to create a new guestbook entry. This form posts its data to the program
    in Figure [4-5](#487291_1_En_4_Chapter.xhtml#Fig5). That program creates a new
    record based on the values entered in. Then, after performing the SQL insert statement,
    it redirects the user back to the listing screen.


    Finally, Figure [4-6](#487291_1_En_4_Chapter.xhtml#Fig6) is a static CSS file
    that provides a small amount of style to the whole procedure. As mentioned in
    Chapter [1](#487291_1_En_1_Chapter.xhtml), if you don’t want to type in all of
    these files yourself, you can get them all from GitHub at:


    ```

    https://github.com/johnnyb/cloud-example-application

    ```


    To use git directly on the server, you will need to install it as the root user
    with:


    ```

    yum install -y git

    ```


    After typing in all of the programs, send them up to the `/var/www/html` folder
    on your new server. Then, navigate your browser to [`http://MY.IP.ADDRESS.HERE/list.php`](http://my.ip.address.here/list.php)
    and see if your program works! If it does not, you can check the error log for
    PHP-FPM by logging in as root and looking at the log file with the following command:


    ```

    tail -200 /var/opt/remi/php74/log/php-fpm/error.log

    ```


    This will give you the last 200 lines of PHP’s error log.


    Another log that will give you good information can be accessed by issuing:


    ```

    tail -200 /var/opt/remi/php74/log/php-fpm/www-error.log

    ```


    Fix any errors that you have and try again. The most likely error is that there
    was something mistyped in the program, or the password listed in the connection
    string doesn’t match the password you set for your PostgreSQL user.


    Another place to look for error messages is the web server’s error log. You can
    look at the end of that log with the command:


    ```

    tail -200 /etc/httpd/logs/error_log

    ```


    Additional troubleshooting steps can be found in Appendix C if needed. If all
    goes well, you should have a screen that prompts you to create a new entry. Clicking
    the link will give you a form to fill out. Once you fill out that form, clicking
    “Submit” will add the new guestbook entry to the list. You can then click the
    individual entry to see the full information. If that is not what your application
    does, then something was probably entered incorrectly.


    ### ![../images/487291_1_En_4_Chapter/487291_1_En_4_Figa_HTML.jpg](images/487291_1_En_4_Chapter/487291_1_En_4_Figa_HTML.jpg)
    The Limitations of the Application


    The goal of this book is to get you up to speed on how to scale your applications.
    As such, other important aspects of development such as error handling, logging,
    sanitizing data, and security hardening are not covered. The goal is to convey
    an application that can be typed in quickly, is easy to understand fully, and
    does not require deep platform knowledge to follow or modify. Nonetheless, we
    have implemented some basic security practices, such as using `bindValue` to properly
    escape the values sent in via `$_GET` and `$_POST` and using `htmlspecialchars()`
    to escape them when sending them back to the user.


    Good information about programming with security in mind can be found on the [`www.owasp.org`](http://www.owasp.org)
    web site.


    ![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig6_HTML.png](images/487291_1_En_4_Chapter/487291_1_En_4_Fig6_HTML.png)


    Figure 4-6


    CSS File (`guestbook.css`)


    ![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig5_HTML.png](images/487291_1_En_4_Chapter/487291_1_En_4_Fig5_HTML.png)


    Figure 4-5


    Create the Guestbook Entry (`create.php`)


    ![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig4_HTML.png](images/487291_1_En_4_Chapter/487291_1_En_4_Fig4_HTML.png)


    Figure 4-4


    New Guestbook Entry (`new.php`)


    ![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig3_HTML.png](images/487291_1_En_4_Chapter/487291_1_En_4_Fig3_HTML.png)


    Figure 4-3


    Single Guestbook Entry (`single.php`)


    ![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig2_HTML.png](images/487291_1_En_4_Chapter/487291_1_En_4_Fig2_HTML.png)


    Figure 4-2


    List All Guestbook Entries (`list.php`)


    ![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig1_HTML.png](images/487291_1_En_4_Chapter/487291_1_En_4_Fig1_HTML.png)


    Figure 4-1


    Configuration and Common Functions (`common.php`)


    # 5. Setting Up a Basic Cloud Cluster


    At this point, we have a simple cloud application which works on a single server.
    While it is nice that we can put this on a server that we built just by pointing
    and clicking, this doesn’t take full advantage of the cloud. One of the goals
    of the cloud is to create an application *cluster*—a set of servers that work
    together to solve the problem, where the computing power can be expanded and contracted
    as needed.'
  trans: "\n### 4.2 PHP 代码\n\n在编写 PHP 代码之前，我们需要安装一些额外的 PHP 库，以便能够连接到数据库。使用以下命令安装它们：\n\
    \n```\nyum install -y php74-php-pgsql php74-php-pdo\nsystemctl restart php74-php-fpm\n\
    ```\n\n我们的应用程序将很简单：\n\n*   一个文件用于保存配置信息和通用函数\n*   一个文件用于显示留言簿条目列表\n*   一个文件用于显示单条留言簿条目\n\
    *   一个文件用于录入新的留言簿条目\n*   一个 CSS 样式表\n\n本书假定你了解一点 PHP 和 SQL 知识，但即使不了解，无论你熟悉哪种语言，代码也应该足够清晰易懂。因此，此处直接给出文件内容，不做过多注释。你可以在本章末尾找到包含代码的图示。\n\
    \n图 4-1 展示了其他文件会包含的通用函数。它有两个用于获取数据库连接的函数——一个用于获取只读连接，另一个用于获取读写连接。目前，它们都返回相同的连接（实际上都是读写连接），但随着我们进一步开发应用程序，我们将看到分离仅用于读取的连接和用于读取与写入的连接可以带来很多好处。这两个函数都简单地使用\
    \ `PDO`（PHP 数据对象）通过连接字符串获取数据库连接。请注意，这些连接字符串包含数据库密码。请务必将*这两个*连接字符串中的密码都更改为你之前为\
    \ `gbuser` 数据库用户输入的密码。\n\n它还包含 `getHeader()` 和 `getFooter()` 函数，这样我们就不必编写过多的 HTML\
    \ 代码。此外，`h()` 作为 `htmlspecialchars()` 的简短版本被使用，以便我们可以获得更安全的输出。\n\n图 4-2 是列出数据库中所有条目的\
    \ PHP 脚本。这段代码简单地创建了一个数据库语句，执行它，然后遍历结果。\n\n图 4-3 展示了如何从数据库中获取单条条目。同样，这里有一条准备好的\
    \ SQL 语句被执行，然后将结果显示在屏幕上。\n\n图 4-4 简单地展示了一个用于创建新留言簿条目的表单。该表单将其数据提交给 图 4-5 中的程序。该程序根据输入的值创建一条新记录。然后，在执行\
    \ `SQL` 插入语句后，它将用户重定向回列表页面。\n\n最后，图 4-6 是一个静态 CSS 文件，为整个程序提供少量的样式。如 第 1 章 所述，如果你不想自己手动输入所有这些文件，可以从\
    \ GitHub 获取它们，地址如下：\n\n```\nhttps://github.com/johnnyb/cloud-example-application\n\
    ```\n\n要在服务器上直接使用 git，你需要以 root 用户身份安装它，命令如下：\n\n```\nyum install -y git\n```\n\
    \n在输入完所有程序后，将它们上传到你新服务器的 `/var/www/html` 文件夹中。然后，在浏览器中导航到 `http://MY.IP.ADDRESS.HERE/list.php`，看看你的程序是否运行成功！如果失败，你可以通过以\
    \ root 用户身份登录并查看日志文件来检查 PHP-FPM 的错误日志，使用以下命令：\n\n```\ntail -200 /var/opt/remi/php74/log/php-fpm/error.log\n\
    ```\n\n这将显示 PHP 错误日志的最后 200 行。\n\n另一个可以获取有用信息的日志可以通过执行以下命令查看：\n\n```\ntail -200\
    \ /var/opt/remi/php74/log/php-fpm/www-error.log\n```\n\n修复你遇到的任何错误，然后重试。最可能的错误是程序中有输入错误，或者连接字符串中列出的密码与你为\
    \ PostgreSQL 用户设置的密码不匹配。\n\n另一个可以查找错误信息的地方是 Web 服务器的错误日志。你可以使用以下命令查看该日志的末尾部分：\n\
    \n```\ntail -200 /etc/httpd/logs/error_log\n```\n\n如果需要，可以在附录 C 中找到其他故障排除步骤。如果一切顺利，你应该会看到一个提示你创建新条目的屏幕。点击链接会显示一个需要填写的表单。填写完表单后，点击“提交”按钮会将新的留言簿条目添加到列表中。然后，你可以点击单条条目查看完整信息。如果你的应用程序不是这样运行的，那么可能是某处输入有误。\n\
    \n#### 应用程序的局限性\n\n本书的目标是让你快速了解如何扩展应用程序。因此，开发中的其他重要方面，如错误处理、日志记录、数据清理和安全加固等，并未涉及。其目标是传达一个可以快速键入、易于完全理解，并且无需深厚平台知识即可遵循或修改的应用程序。尽管如此，我们还是实现了一些基本的安全实践，例如使用\
    \ `bindValue` 来正确转义通过 `$_GET` 和 `$_POST` 发送的值，以及使用 `htmlspecialchars()` 在将数据发送回用户时进行转义。\n\
    \n关于安全编程的良好信息可以在 `www.owasp.org` 网站上找到。\n\n![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig6_HTML.png](img/487291_1_En_4_Fig6_HTML.png)\n\
    \n图 4-6  \nCSS 文件 (`guestbook.css`)\n\n![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig5_HTML.png](img/487291_1_En_4_Fig5_HTML.png)\n\
    \n图 4-5  \n创建留言簿条目 (`create.php`)\n\n![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig4_HTML.png](img/487291_1_En_4_Fig4_HTML.png)\n\
    \n图 4-4  \n新留言簿条目 (`new.php`)\n\n![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig3_HTML.png](img/487291_1_En_4_Fig3_HTML.png)\n\
    \n图 4-3  \n单条留言簿条目 (`single.php`)\n\n![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig2_HTML.png](img/487291_1_En_4_Fig2_HTML.png)\n\
    \n图 4-2  \n列出所有留言簿条目 (`list.php`)\n\n![../images/487291_1_En_4_Chapter/487291_1_En_4_Fig1_HTML.png](img/487291_1_En_4_Fig1_HTML.png)\n\
    \n图 4-1  \n配置和通用函数 (`common.php`)\n\n# 5. 设置基本云集群\n\n至此，我们有了一个可以在单台服务器上运行的简单云应用程序。虽然我们可以通过简单的点击操作将其部署到我们自己构建的服务器上，但这并没有充分利用云的优势。云的目标之一是创建应用程序*集群*——一组协同工作以解决问题的服务器，其计算能力可以根据需要扩展或收缩。\n"
- fmt: '# 5.1 A Simple Two-Tier Architecture


    In this chapter, we will explore a simple, two-tier architecture. This architecture
    will consist of


    - A database server

    - A set of web servers

    - A load balancer that manages traffic among the web servers


    ![../images/487291_1_En_5_Chapter/487291_1_En_5_Fig1_HTML.jpg](images/487291_1_En_5_Chapter/487291_1_En_5_Fig1_HTML.jpg)


    Figure 5-1: Diagram of a Simple Two-Tier Architecture


    The basic structure of the architecture is shown in Figure 5-1. All of the connections
    come in to a single load balancer, whose job it is to forward connections to one
    of several web servers. The load balancer not only forwards connections, but it
    also monitors the health of the individual web servers and will stop sending a
    web server connections if it stops responding. Each web server then shares a single
    database server.


    In developing cloud applications, a programmer needs to know not only how to set
    up a cluster but also how to analyze it. If you look at the diagram in Figure
    5-1, you can see that all of the web servers depend on a single database server.
    This makes the database server the *limiting factor* of the cluster. Nearly every
    cluster, no matter how well designed, has some limiting factors. The goal is to
    minimize their impact on your architecture.


    Because this application architecture is limited by the single database node,
    it is best used for small- or medium-sized deployments where most of the processing
    is done on the web servers rather than on the database. The example application,
    because of its simplicity, actually does very little processing on the web server.
    Nonetheless, this chapter will show you how to set up the servers to deploy it
    in this configuration.


    # 5.2 Replicating a Node


    The basic two-tier application described in Figure 5-1 indicates that we will
    need several server nodes. We could accomplish this simply by booting up new machines
    with a blank copy of CentOS, and configure each one individually. However, since
    we have already spent time setting up the current server to work the way that
    we want it to, we should take advantage of the time we spent configuring everything.


    Linode offers several services that can accomplish this task, each with their
    own benefits and drawbacks. Linode has the ability to create saved images which
    can be used to directly create new nodes (instead of choosing an operating system,
    you can choose your saved image). Linode also has a cloning service, which allows
    you to clone existing machines, if both the source and destination machines are
    turned off (this is not a hard and fast rule, but you can wind up with consistency
    problems if you try to clone a running machine). Finally, you can make clones
    from a machine’s backups.


    I prefer making clones from backups because (a) you should be backing up your
    servers regularly anyway, (b) you don’t have to have a machine turned off and
    doing nothing while you create new servers, and (c) this forces you to work with
    the backup system and be comfortable with it while you are also learning to clone
    servers (someday you will need to restore from backup, so it is good to get comfortable
    with the process before you need it). The Linode image service *can* work for
    this, but it has too many limitations for real production use. In order to prevent
    users from using the image service as a backup service, they have limited the
    size and number of images, but most of my machines are usually heftier than the
    minimum size allowed for Linode images. Note that other cloud services (such as
    DigitalOcean) offer similar services but with different sets of restrictions.


    If we want to boot up a new server that is an identical clone of the existing
    server, then all we have to do is back up the current server. What we will need
    to do is first enable backups on our server node. To do that, just log in to Linode,
    click your node in the list, and click the “Backups” tab off of your node’s dashboard.
    This will give you a button that says, “Enable backups for this Linode.” This
    adds a small monthly charge, but it is certainly worth it. Click the button, and
    your machine will automatically have weekly, daily, and ad hoc snapshots available.
    The screen should now look similar to Figure 5-2.


    ![../images/487291_1_En_5_Chapter/487291_1_En_5_Fig2_HTML.jpg](images/487291_1_En_5_Chapter/487291_1_En_5_Fig2_HTML.jpg)


    Figure 5-2: The Linode Backup Management Screen


    What we want to do now is to take a snapshot of our machine. Put in a name for
    your backup (I called mine `snapshot-for-replication`), and click the button that
    says, “Take Snapshot.” Because Linode servers are all on SSD drives, snapshots
    are very quick, usually only taking 5–10 minutes.


    ## OTHER BACKUP SETTINGS


    ![../images/487291_1_En_5_Chapter/487291_1_En_5_Figa_HTML.jpg](images/487291_1_En_5_Chapter/487291_1_En_5_Figa_HTML.jpg)


    Because backups do in fact slow down your disk somewhat, Linode gives you the
    ability to specify your backup window. You can choose both a time of day when
    you want to have your backups take place and the day of the week which will be
    counted as a “weekly backup.” The time of day should be when your system is having
    the lightest usage, while the day of the week should be before any major batch
    processing. For instance, if you do batch processing on Fridays, setting the backup
    day to Thursday will make sure you have a “before” snapshot before the major processing
    occurs. If you don’t do large-scale batch processing, the day of the weekly backup
    doesn’t really matter.


    Once the backup has started, we can go to our next task, which is creating a new
    server. The new server will be our database server.


    To create the machine, go to “Create” then “Linode” as we did in Chapter 3. However,
    instead of choosing a distribution, under the “Images” heading, you want to choose
    “My Images” and then “Backups.” This will show a list of your nodes which have
    backups available. Click your node, and then it will show the available backups,
    which will include the one we just created. See Figure 5-3 to see what this should
    look like.


    You can create as large as a machine as you want, but just for practice, you might
    as well use their smallest machine size. This node needs to be in the same datacenter
    as your other one (otherwise they won’t be able to privately, cheaply, and quickly
    talk to each other), but Linode will automatically put a new node created from
    backup into the same datacenter.


    For the Linode label, let’s use the name `dbmaster` so that we know that this
    node will be used for the master database. Having a bunch of nodes without names
    (or with bad names) quickly becomes difficult to manage, so be sure to *always*
    give your nodes descriptive names.


    ![../images/487291_1_En_5_Chapter/487291_1_En_5_Fig3_HTML.jpg](images/487291_1_En_5_Chapter/487291_1_En_5_Fig3_HTML.jpg)


    Figure 5-3: Booting a New Linode from a Backup


    Now click “Create” to build your new node. When creating from a backup, you will
    have to boot the node yourself once it is fully created. On the top right of the
    screen, it should say “Offline.” Click that, and choose “Power On” to boot your
    new machine. You can now `ssh` to this new machine using the same users and passwords
    that you set up for your initial machine. In fact, it should also have the same
    application running that you had created. It is an exact copy of the other machine,
    with only the network settings having been modified.'
