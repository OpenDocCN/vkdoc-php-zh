    ## 比较数组


    另一个重要的操作是比较数组是否相等或不相等。如果两个数组具有相同的元素集合（包括这些元素的键和值），则视为相等。但这里你需要考虑数组比较时涉及到的自动类型转换。也就是说，如果使用
    `==` 和 `!=` 运算符比较数组，则会在考虑自动类型转换的情况下进行比较。如果你想在不涉及自动类型转换的情况下比较数组，则应使用 `===` 和 `!==`
    运算符。此时仅考虑元素的值，而键在比较时无论如何都会涉及自动类型转换。列表 4-10 展示了一个数组比较的示例。


    ```

    $A=["0"=>123,1=>true,2=>""];

    $B=["123",10,0];

    $C=[0=>123,"1"=>true,"2"=>""];

    $D=[0=>123,1=>true,3=>""];

    // 比较数组：

    if($A==$B){

    echo ''$A==$B'',"\n";

    }

    if($A!==$B){

    echo ''$A!==$B'',"\n";

    }

    if($A===$C){

    echo ''$A===$C'',"\n";

    }

    if($A!=$D){

    echo ''$A!=$D'',"\n";

