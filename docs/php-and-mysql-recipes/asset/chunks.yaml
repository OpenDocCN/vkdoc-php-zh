    `php-ldap.x86_64` 5.4.16-36.el7_1 base

    `php-mbstring.x86_64` 5.4.16-36.el7_1 base

    `php-mysql.x86_64` 5.4.16-36.el7_1 base

    `php-mysqlnd.x86_64` 5.4.16-36.el7_1 base

    `php-odbc.x86_64` 5.4.16-36.el7_1 base

    `php-pdo.x86_64` 5.4.16-36.el7_1 base

    `php-pear.noarch` 1:1.9.4-21.el7 base

    `php-pecl-memcache.x86_64` 3.0.8-4.el7 base

    `php-pgsql.x86_64` 5.4.16-36.el7_1 base

    `php-process.x86_64` 5.4.16-36.el7_1 base

    `php-pspell.x86_64` 5.4.16-36.el7_1 base

    `php-recode.x86_64` 5.4.16-36.el7_1 base

    `php-snmp.x86_64` 5.4.16-36.el7_1 base

    `php-soap.x86_64` 5.4.16-36.el7_1 base

    `php-xml.x86_64` 5.4.16-36.el7_1 base

    `php-xmlrpc.x86_64` 5.4.16-36.el7_1 base


    Note that the version is 5.4.16 although the custom version is 5.6.20 or 7.0.5.
    This is the case with many Linux distributions. They do backport security updates
    but they might not backport new features or new versions. It is possible to get
    PHP from other repositories other than the official CentOS one, but if a newer
    version is needed, I recommend compiling it from source as described in Recipe
    1-3.


    The basic package is all that''s needed, but installing the `php-cli`, `php-common`,
    and one or more database packages is most likely going to work for most people.
    The packages can be installed one by one or you can choose to install all the
    packages. The first example shows how to install a few packages:


    ```

    yum install php php-cli php-common php-mysql

    ```


    This will also install `libzip` and `php-pdo`.


    Installing all packages is done with `yum install php*`.


    After installation of the PHP packages it is necessary to restart the Apache server.
    This will make sure the installed Apache module is loaded:


    ```

    systemctl restart httpd

    ```


    Pointing the browser to the web server (`http://192.168.23.148/phpinfo.php` or
    `http://localhost/phpinfo.php`) will now yield this output:


    The actual output will show much more data but this shows that PHP is now working
    on the server.


    It is not that common to have Linux installed on a desktop or laptop computer.
    If you want to be able to test the PHP code locally before deploying it to a server
    you will need a local web server that supports PHP. It is also possible to do
    all the development remotely, but that will require Internet access.


    Use the following commands to show the actual version of Apache and PHP that''s
    installed on the system:


    ```

    # httpd -v

    Server version: Apache/2.4.6 (CentOS)

    Server built: Nov 19 2015 21:43:13

    ```


    And for PHP:


