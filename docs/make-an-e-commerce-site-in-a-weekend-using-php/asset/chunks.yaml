    \n![A978-1-4842-1672-9_4_Fig2_HTML.jpg](A978-1-4842-1672-9_4_Fig2_HTML.jpg)\n\n\
    图 4-2. 维护购物车\n\n假设访客向购物车中添加了两部 iPhone 智能手机，购物车内容现在应如图[4-3](#A978-1-4842-1672-9_4_Chapter.html#Fig3)所示。\n\
