- fmt: '# Summary


    In this chapter, we explored the importance of securing PHP applications against
    various threats and vulnerabilities. It emphasizes the need for a security-first
    approach in the development process, starting with threat modeling and implementing
    secure architecture. It highlights key security practices such as secure coding,
    authentication, session management, and file upload handling. It also covers essential
    aspects of communication security, vulnerability management, and incident response
    planning. The main takeaways are that building secure PHP applications requires
    proactive measures, continuous learning, and adaptation to emerging threats.


    # 2. PHP Core Security


    PHP is one of the most widely used programming languages in the world, and as
    such, it is also susceptible to security threats. This chapter will cover the
    security considerations related to the PHP core and provide practical guidance
    for securing PHP code. As a result, it is essential for developers to take appropriate
    measures to ensure the security of their PHP applications. From secure PHP configuration
    to secure file handling, this chapter will cover everything you need to know to
    build a safe and secure PHP application. By the end of this chapter, readers will
    have a solid foundation in PHP security and be able to write their own secure
    code.


    As discussed in the previous chapter, we will be focusing on Core PHP and later
    delve into frameworks and ecosystems. Figure [2-1](#609480_1_En_2_Chapter.xhtml#Fig1)
    shares the three concentric circles which illustrate the layered security approach
    to protecting web applications. At the core is Core PHP, representing the foundation
    of code that requires protection from vulnerabilities and attacks. The second
    layer, Frameworks and Libraries, supports Core PHP with additional layers of security,
    such as input validation, authentication, and authorization. The outermost circle
    represents the Ecosystem, encompassing external factors like HTTP protocols, third-party
    integrations, and user interactions. This ecosystem requires protection from common
    web attacks, such as SQL injection, cross-site scripting (XSS), and denial-of-service
    (DoS) attacks.


    ![](images/609480_1_En_2_Chapter/609480_1_En_2_Fig1_HTML.jpg)


    **Figure 2-1** Web development in layers: a visual representation


    ## The Great PHP Update Debate


    Imagine you’re running a popular restaurant, but you’ve been using a recipe book
    from ten years ago. You think it’s still good, but little do you know, some of
    the ingredients are actually poisonous! That’s what happens when your website
    uses an outdated version of PHP.


    ## Why Does PHP Version Matters?


    The PHP version you are using is critically important from a security perspective.
    The PHP development team continually releases new versions to address security
    vulnerabilities and improve the overall security of the language. Let’s discuss
    a few reasons why keeping your PHP version up to date is crucial.


    ### Security Updates


    Let’s delve into the importance of security updates, particularly in the context
    of PHP versions. One of the primary reasons for updating to newer PHP versions
    is the inclusion of security patches. These patches address vulnerabilities that
    have been discovered in previous versions. By running an outdated PHP version,
    we are essentially leaving our web application exposed to these known security
    issues, which can be exploited by malicious actors.


    Think of it this way: just as you wouldn’t leave the doors of your house unlocked
    if you knew there had been break-ins in the neighborhood, you shouldn’t leave
    your web server vulnerable to attacks that have known solutions. Keeping PHP up
    to date is like reinforcing the locks and adding security cameras; it’s an essential
    measure to ensure that your server is protected against known threats.


    Moreover, staying current with PHP updates doesn’t just protect you from existing
    vulnerabilities; it also helps mitigate the risks associated with new types of
    attacks. Cybersecurity is an ever-evolving field, and attackers are constantly
    finding new ways to exploit software. By regularly updating PHP, you benefit from
    the latest security research and improvements made by the community and the developers
    maintaining the language.


    Also updating PHP can also help maintain compliance with industry standards and
    regulations. Many compliance frameworks require that you keep your software up
    to date to ensure the security of sensitive data. By neglecting updates, you not
    only risk the security of your application but also potential legal and financial
    repercussions.


    Another point to consider is the impact on your reputation. If your web application
    is compromised due to running an outdated PHP version, it can lead to data breaches,
    loss of customer trust, and damage to your brand’s reputation. In today’s digital
    age, news of security breaches spreads quickly, and customers are increasingly
    aware of the importance of data security. Demonstrating that we take security
    seriously by keeping our software updated can enhance your credibility and trustworthiness.


    ### End of Life (EOL)


    Let’s explore the concept of End of Life (EOL) for PHP versions and why it is
    crucial for us to stay informed about the support lifecycle of the software we
    are using. PHP, like many other software products, has a limited support lifecycle.
    This means that each version of PHP is actively maintained and supported for a
    certain period, after which it reaches its EOL.


    When a PHP version reaches its EOL, it no longer receives official updates. This
    includes not only feature enhancements and bug fixes but also, most critically,
    security patches. Security patches are essential as they address vulnerabilities
    that have been discovered in the software. If we continue to use an EOL PHP version,
    we are missing out on these crucial updates.


    Imagine this scenario: we have a robust security system for our house, but over
    time, new types of locks and alarms are developed to counter more advanced burglary
    techniques. If we don’t update our security system, it becomes easier for burglars
    to break in. Similarly, by using an EOL PHP version, our application remains exposed
    to vulnerabilities that have been identified but not patched, making it an easy
    target for attackers.


    Moreover, using an EOL version can have significant implications for compliance
    and legal responsibilities. Many regulatory frameworks require organizations to
    use supported and up-to-date software to protect sensitive data. By running an
    unsupported PHP version, we may be in violation of these requirements, which could
    result in fines, penalties, or legal action.


    Relying on an EOL PHP version can also impact the performance and reliability
    of our web application. As new PHP versions are released, they often include optimizations
    and improvements that enhance the performance and stability of our application.
    Sticking with an outdated version means we are not benefiting from these enhancements,
    which could affect our application’s efficiency and user experience.


    The broader PHP community and third-party developers often stop supporting older
    versions once they reach EOL. This means that we might find it increasingly difficult
    to get help, find compatible libraries, or integrate with other modern software
    solutions.'
  raw: '## Summary


    In this chapter, we explored the importance of securing PHP applications against
    various threats and vulnerabilities. It emphasizes the need for a security-first
    approach in the development process, starting with threat modeling and implementing
    secure architecture. It highlights key security practices such as secure coding,
    authentication, session management, and file upload handling. It also covers essential
    aspects of communication security, vulnerability management, and incident response
    planning. The main takeaways are that building secure PHP applications requires
    proactive measures, continuous learning, and adaptation to emerging threats.


    # 2. PHP Core Security


    PHP is one of the most widely used programming languages in the world, and as
    such, it is also susceptible to security threats. This chapter will cover the
    security considerations related to the PHP core and provide practical guidance
    for securing PHP code. As a result, it is essential for developers to take appropriate
    measures to ensure the security of their PHP applications. From secure PHP configuration
    to secure file handling, this chapter will cover everything you need to know to
    build a safe and secure PHP application. By the end of this chapter, readers will
    have a solid foundation in PHP security and be able to write their own secure
    code.


    As discussed in the previous chapter, we will be focusing on Core PHP and later
    delve into frameworks and ecosystems. Figure [2-1](#609480_1_En_2_Chapter.xhtml#Fig1)
    shares the three concentric circles which illustrate the layered security approach
    to protecting web applications. At the core is Core PHP, representing the foundation
    of code that requires protection from vulnerabilities and attacks. The second
    layer, Frameworks and Libraries, supports Core PHP with additional layers of security,
    such as input validation, authentication, and authorization. The outermost circle
    represents the Ecosystem, encompassing external factors like HTTP protocols, third-party
    integrations, and user interactions. This ecosystem requires protection from common
    web attacks, such as SQL injection, cross-site scripting (XSS), and denial-of-service
    (DoS) attacks.


    ![](images/609480_1_En_2_Chapter/609480_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Web development in layers: a visual representation


    ## The Great PHP Update Debate


    Imagine you’re running a popular restaurant, but you’ve been using a recipe book
    from ten years ago. You think it’s still good, but little do you know, some of
    the ingredients are actually poisonous! That’s what happens when your website
    uses an outdated version of PHP.


    ## Why Does PHP Version Matters?


    The PHP version you are using is critically important from a security perspective.
    The PHP development team continually releases new versions to address security
    vulnerabilities and improve the overall security of the language. Let’s discuss
    a few reasons why keeping your PHP version up to date is crucial.


    ### Security Updates


    Let’s delve into the importance of security updates, particularly in the context
    of PHP versions. One of the primary reasons for updating to newer PHP versions
    is the inclusion of security patches. These patches address vulnerabilities that
    have been discovered in previous versions. By running an outdated PHP version,
    we are essentially leaving our web application exposed to these known security
    issues, which can be exploited by malicious actors.


    Think of it this way: just as you wouldn’t leave the doors of your house unlocked
    if you knew there had been break-ins in the neighborhood, you shouldn’t leave
    your web server vulnerable to attacks that have known solutions. Keeping PHP up
    to date is like reinforcing the locks and adding security cameras; it’s an essential
    measure to ensure that your server is protected against known threats.


    Moreover, staying current with PHP updates doesn’t just protect you from existing
    vulnerabilities; it also helps mitigate the risks associated with new types of
    attacks. Cybersecurity is an ever-evolving field, and attackers are constantly
    finding new ways to exploit software. By regularly updating PHP, you benefit from
    the latest security research and improvements made by the community and the developers
    maintaining the language.


    Also updating PHP can also help maintain compliance with industry standards and
    regulations. Many compliance frameworks require that you keep your software up
    to date to ensure the security of sensitive data. By neglecting updates, you not
    only risk the security of your application but also potential legal and financial
    repercussions.


    Another point to consider is the impact on your reputation. If your web application
    is compromised due to running an outdated PHP version, it can lead to data breaches,
    loss of customer trust, and damage to your brand’s reputation. In today’s digital
    age, news of security breaches spreads quickly, and customers are increasingly
    aware of the importance of data security. Demonstrating that we take security
    seriously by keeping our software updated can enhance your credibility and trustworthiness.


    ### End of Life (EOL)


    Let’s explore the concept of End of Life (EOL) for PHP versions and why it is
    crucial for us to stay informed about the support lifecycle of the software we
    are using. PHP, like many other software products, has a limited support lifecycle.
    This means that each version of PHP is actively maintained and supported for a
    certain period, after which it reaches its EOL.


    When a PHP version reaches its EOL, it no longer receives official updates. This
    includes not only feature enhancements and bug fixes but also, most critically,
    security patches. Security patches are essential as they address vulnerabilities
    that have been discovered in the software. If we continue to use an EOL PHP version,
    we are missing out on these crucial updates.


    Imagine this scenario: we have a robust security system for our house, but over
    time, new types of locks and alarms are developed to counter more advanced burglary
    techniques. If we don’t update our security system, it becomes easier for burglars
    to break in. Similarly, by using an EOL PHP version, our application remains exposed
    to vulnerabilities that have been identified but not patched, making it an easy
    target for attackers.


    Moreover, using an EOL version can have significant implications for compliance
    and legal responsibilities. Many regulatory frameworks require organizations to
    use supported and up-to-date software to protect sensitive data. By running an
    unsupported PHP version, we may be in violation of these requirements, which could
    result in fines, penalties, or legal action.


    Relying on an EOL PHP version can also impact the performance and reliability
    of our web application. As new PHP versions are released, they often include optimizations
    and improvements that enhance the performance and stability of our application.
    Sticking with an outdated version means we are not benefiting from these enhancements,
    which could affect our application’s efficiency and user experience.


    The broader PHP community and third-party developers often stop supporting older
    versions once they reach EOL. This means that we might find it increasingly difficult
    to get help, find compatible libraries, or integrate with other modern software
    solutions.'
  trans: '

    # 总结


    在本章中，我们探讨了保护 PHP 应用程序免受各种威胁和漏洞攻击的重要性。它强调了在开发过程中采用安全优先方法的必要性，从威胁建模和实现安全架构开始。本章重点介绍了安全的编码实践、身份验证、会话管理和文件上传处理等关键安全措施。同时还涵盖了通信安全、漏洞管理和事件响应规划的基本方面。主要结论是：构建安全的
    PHP 应用程序需要采取主动措施、持续学习并适应不断出现的新型威胁。


    # 2. PHP 核心安全


    PHP 是全世界使用最广泛的编程语言之一，因此它也容易受到安全威胁。本章将涵盖与 PHP 核心相关的安全注意事项，并为保护 PHP 代码安全提供实用指导。因此，开发人员必须采取适当措施来确保其
    PHP 应用程序的安全性。从安全的 PHP 配置到安全的文件处理，本章将涵盖构建安全可靠的 PHP 应用程序所需了解的所有内容。通过本章的学习，读者将打下坚实的
    PHP 安全基础，并能够编写自己的安全代码。


    如前一章所述，我们将重点讨论核心 PHP，之后会深入探讨框架和生态系统。图 2-1 展示了三个同心圆，说明了保护 Web 应用程序的分层安全方法。核心是 PHP
    核心，代表了需要防范漏洞和攻击的代码基础。第二层，框架和库，通过提供额外的安全层（如输入验证、身份验证和授权）来支持 PHP 核心。最外层的圆代表生态系统，涵盖了
    HTTP 协议、第三方集成和用户交互等外部因素。该生态系统需要防范常见的 Web 攻击，例如 SQL 注入、跨站脚本 (XSS) 和拒绝服务 (DoS) 攻击。


    ![](img/609480_1_En_2_Fig1_HTML.jpg)


    **图 2-1** Web 开发的分层结构：可视化呈现


    ## PHP 更新大讨论


    想象一下，你经营一家很受欢迎的餐厅，但你一直使用十年前的食谱。你觉得它仍然不错，却不知道其中一些食材实际上是有毒的！当你的网站使用过时版本的 PHP 时，就是这种情况。


    ## 为什么 PHP 版本如此重要？


    你正在使用的 PHP 版本从安全角度来看至关重要。PHP 开发团队持续发布新版本以解决安全漏洞并提高语言的整体安全性。让我们讨论一下保持 PHP 版本更新至关重要的几个原因。


    ### 安全更新


    让我们深入探讨安全更新的重要性，尤其是在 PHP 版本的背景下。更新到更新的 PHP 版本的主要原因之一是其包含了安全补丁。这些补丁解决了在先前版本中发现的漏洞。运行过时的
    PHP 版本，我们实际上是在让我们的 Web 应用程序暴露于这些已知的安全问题之下，这些问题可能会被恶意行为者利用。


    可以这样理解：就像你知道附近发生过入室盗窃却不会不锁家门一样，你也不应该让你的 Web 服务器暴露在有已知解决方案的攻击之下。保持 PHP 最新就像加固门锁和添加安全摄像头；这是保护你的服务器免受已知威胁的重要措施。


    此外，跟上 PHP 更新不仅能保护你免受现有漏洞的侵害；还有助于降低与新型攻击相关的风险。网络安全是一个不断发展的领域，攻击者一直在寻找利用软件的新方法。通过定期更新
    PHP，你可以从社区和语言维护开发者所做的最新安全研究和改进中获益。


    另外，更新 PHP 也有助于保持对行业标准和法规的合规性。许多合规框架要求你保持软件更新，以确保敏感数据的安全。忽视更新，你不仅会面临应用程序的安全风险，还可能面临潜在的法律和财务后果。


    另一个需要考虑的因素是对你声誉的影响。如果你的 Web 应用程序因运行过时的 PHP 版本而被攻破，可能会导致数据泄露、客户信任度下降以及品牌声誉受损。在当今的数字时代，安全漏洞的消息传播迅速，客户对数据安全的重要性也越来越了解。通过保持软件更新来展示我们对安全的重视，可以提升你的可信度和可靠性。


    ### 生命周期终止 (EOL)


    让我们探讨一下 PHP 版本的生命周期终止 (EOL) 概念，以及为什么了解我们所用软件的支持生命周期至关重要。像许多其他软件产品一样，PHP 具有有限的支持生命周期。这意味着每个
    PHP 版本都会在一段特定时间内得到积极维护和支持，此后便会达到其生命周期终点 (EOL)。


    当某个 PHP 版本达到 EOL 时，它将不再收到官方更新。这包括功能增强和错误修复，最关键的是，还包括安全补丁。安全补丁至关重要，因为它们可以解决在软件中发现的漏洞。如果我们继续使用
    EOL 的 PHP 版本，我们将错过这些关键更新。


    设想一下这个场景：我们为房子配备了一个强大的安全系统，但随着时间的推移，为了应对更先进的入室盗窃技术，新型锁和警报器被开发出来。如果我们不更新安全系统，窃贼就更容易闯入。同样，通过使用
    EOL 的 PHP 版本，我们的应用程序仍然暴露于那些已被识别但尚未修补的漏洞之下，使其成为攻击者的容易目标。


    此外，使用 EOL 版本可能对合规性和法律责任产生重大影响。许多监管框架要求组织使用受支持且最新的软件来保护敏感数据。通过运行不受支持的 PHP 版本，我们可能违反了这些要求，这可能导致罚款、处罚或法律诉讼。


    依赖 EOL 的 PHP 版本还可能影响我们 Web 应用程序的性能和可靠性。随着新 PHP 版本的发布，它们通常包含优化和改进，以增强应用程序的性能和稳定性。坚持使用过时版本意味着我们无法从这些增强中受益，这可能会影响应用程序的效率和用户体验。


    更广泛的 PHP 社区和第三方开发者在旧版本达到 EOL 后通常也会停止支持它们。这意味着我们可能会发现，在获取帮助、查找兼容的库或与其他现代软件解决方案集成方面变得越来越困难。

