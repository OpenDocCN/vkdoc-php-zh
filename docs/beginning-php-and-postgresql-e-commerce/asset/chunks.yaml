    PHP，以启用所有必需的库。


    **安装 Apache 2**


    创建支持 SSL 的 Web 服务器最常见的方法是使用 Apache 和 OpenSSL。你的系统上可能已经安装了它们。


    你应首先使用以下命令检查系统上是否已安装 OpenSSL RPM 包：


    `rpm -qa | grep openssl`


    如果没有 OpenSSL，请从 `http://www.rpmfind.net/` 等资源处获取以下 RPM 包并进行安装。请务必获取最新的可用版本。


    - `openssl-*version*.rpm`

    - `openssl-devel-*version*.rpm`


    我们决定从源代码构建最新的 Apache Web 服务器（撰写本文时为版本 2.2.3）。首先，你应从 `http://httpd.apache.org/download.cgi`
    下载最新的 Unix Apache 源代码，并使用类似以下命令解压：`tar -zxvf httpd-2.2.3.tar.gz`


    现在你可以继续在系统上编译并安装 Apache Web 服务器。进入 Apache 源代码的根目录，并执行以下命令（执行 `make install` 时需要以
    `root` 身份登录）：


    ```

    ./configure --prefix=/usr/local/apache2 --enable-so --enable-ssl --with-ssl --enable-auth-digest

    make

    make install

    ```


    `648XAppA.qxd 11/19/06 1:45 PM Page 578`


    **578**


    附录 A ■ 安装 Apache、PHP 和 PostgreSQL


    要启用 SSL，你需要在 Apache 中安装 SSL 证书。如果你使用提供 SSL 的主机托管服务商托管应用程序，可以在开发机器上使用自己生成的“假”SSL
    证书进行所有测试。你可以通过将自己设为证书颁发机构来做到这一点。要生成自己的证书，应遵循网上一些优秀的教程，例如 `http://www.linux.com/howtos/SSL-Certificates-HOWTO/index.shtml`
    上的教程（你也可以通过简单的网络搜索找到更多教程）。否则，如果你希望为生产环境安装 SSL 证书，则需要从证书颁发机构（如 VeriSign）获取“真正的”SSL
    证书，如第 7 章所述。


    在 `httpd.conf` 配置文件中进行所需的所有更改，然后使用以下命令启动 Apache 服务器：


    `/usr/local/apache2/bin/apachectl start`


    > **注意：** 如果遇到类似“module access_module is built in and can’t be loaded”（模块 access_module
    已内置且无法加载）的错误，请尝试注释掉 `httpd.conf` 中与生成该错误的模块相对应的 `LoadModule` 行。更好的方法是尝试注释掉所有不需要的模块。


    现在在浏览器中加载 `http://localhost/`，确保 Apache Web 服务器已启动并运行，然后浏览 `https://localhost/`
    以测试是否也能通过 SSL 访问 Apache。


    **安装 PostgreSQL 8**


    请按照以下步骤在您的系统上安装 PostgreSQL：


    1. 从 `http://www.postgresql.org/ftp/source/` 下载 PostgreSQL 源代码。就本安装指南而言，我们使用 `postgresql-8.1.5.tar.gz`，但你应下载最新的可用版本。

    2. 使用如下命令解压存档：`tar -zxvf postgresql-8.1.5.tar.gz`

    3. 切换到 `postgresql-8.1.5` 文件夹：`cd postgresql-8.1.5`

    4. 执行以下命令，将 PostgreSQL 准备安装到 `/usr/local/pgsql`：`./configure --prefix=/usr/local/pgsql`

    5. 确保以 `root` 身份登录（如有必要，使用 `su` 命令），然后执行：`make install`

    6. 出于安全原因，PostgreSQL 不允许 `root` 启动服务器。执行以下命令以将所有文件的所有者更改为 `postgres`：`chown -R
    postgres:postgres /usr/local/pgsql`

    7. 以 `postgres` 身份登录，或使用 `su` 命令，然后切换目录到 `/usr/local/pgsql`：`cd /usr/local/pgsql`

    8. 使用此命令初始化数据库集群：`bin/initdb -D ./data`

    9. 使用此命令启动 PostgreSQL：`bin/pg_ctl -D ./data -l data/logfile start`

    10. 现在 PostgreSQL 已启动，你需要先创建一个数据库和另一个用户，然后才能继续。你应该为每个项目使用单独的数据库，以使事情更清晰、更易于理解。你还应该为每个数据库使用单独的用户。这可以使所有内容保持独立，并且“项目
    A”将无法修改“项目 B”的任何数据。在 PostgreSQL 中创建新用户非常简单。只需使用以下命令，然后按照提示操作即可：`/usr/local/pgsql/bin/createuser`。新用户不应能够创建新数据库或创建新用户。创建数据库略有不同：`/usr/local/pgsql/bin/createdb
    --owner=用户名 数据库名`


