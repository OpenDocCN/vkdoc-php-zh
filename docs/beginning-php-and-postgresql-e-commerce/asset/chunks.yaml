    **4.** Uncomment the following lines from php.ini to enable the mhash, mcrypt,
    curl, pdo, and soap extensions. If any of these lines isn’t present in the file,
    simply add it.


    extension=php_mhash.dll


    extension=php_mcrypt.dll


    extension=php_curl.dll


    extension=php_pdo.dll


