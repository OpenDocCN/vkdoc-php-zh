    \ * @return string\n15    */\n16   public function toString()\n17   {\n18    \
    \ return (string) $this;\n19   }\n20 }\n\n22 $number = new NumberType(13.86);\n\
    \n24 print $number->toInteger(); // 14\n25 print $number->toString();  // \"13.86\"\
    \n\n27 print (float) $number + 1.00; // 14.86\n28 print $number * 12;        \
    \   // 156\n```\n\n`toInteger` 和 `toString` 方法的功能与装箱类类似。神奇之处在于我们对 `$number` 对象进行基本算术运算时发生。`SPL`\
    \ 类型在用于算术表达式、强制类型转换或字符串拼接时，会被自动拆箱。任何通常用于标量类型的运算符，都可以与对应的 `SPL` 类型一起使用。\n\n这里是另一个示例：\n\
    \n```\n 1 <?php\n\n 3 class StringType extends SplString\n 4 {\n 5   /**\n 6 \
    \   * @param int   $start\n 7    * @param mixed $length\n 8    *\n 9    * @return\
    \ StringType\n10    */\n11   public function slice($start = 0, $length = null)\n\
    12   {\n13     if ($length === null) {\n14       return new static(substr($this,\
    \ $start));\n15     }\n\n17     return new static(substr($this, $start, $length));\n\
    18   }\n19 }\n\n21 $string = new StringType(\"Hello World\");\n\n23 print $string->slice(6);\
    \ // \"World\"\n```\n\n我们可以设计自己的类型，使其返回新的实例。这为我们提供了一个简单的*链式调用*接口。\n\n在假设原生 PHP\
    \ 函数的返回类型时要小心。在调用 `new static()` 之前一定要检查它们，否则可能会遇到致命错误。\n\n### 标量对象\n\n[Nikita\
    \ Popov](https://twitter.com/nikita_ppv) 是 PHP（包括核心和用户层）的一位多产贡献者。他制作了诸如 [PHP-Parser](https://github.com/nikic/PHP-Parser)\
    \ 之类的库，这些库在网络上以及流行的框架（如 [Laravel](http://laravel.com)）中被广泛使用。他倡导了许多 RFC，这些 RFC\
    \ 已成为 PHP 核心的一部分。\n\n他还创建了一个自定义扩展，允许注册自定义类型处理器。你可以在 [`github.com/nikic/scalar_objects`](https://github.com/nikic/scalar_objects)\
    \ 找到它。\n\n我们将安装并使用这个模块，以更接近我们理想的类型处理情况……\n\n本节假设你正在使用前面介绍的 Vagrant 虚拟机。如果没有，请先进行配置。以下命令均为\
    \ Linux 专用，并依赖于前面介绍的预装模块。\n\n#### 安装标量对象\n\n首先，我们需要安装 `Git` 命令行工具：\n\n```\n1 $\
    \ sudo apt-get install git\n\n3 正在读取软件包列表... 完成\n4 正在构建依赖关系树\n5 正在读取状态信息... 完成\n\
    6 将安装以下额外的软件包：\n7   git-man liberror-perl...\n```\n\n接着，我们可以克隆并构建该扩展：\n\n```\n\
    1 $ git clone https://github.com/nikic/scalar_objects.git\n\n3 Cloning into 'scalar_objects'...\n\
    4 remote: Reusing existing pack: 213, done.\n5 remote: Total 213 (delta 0), reused\
    \ 0 (delta 0)\n6 Receiving objects: 100% (213/213), 75.36 KiB, done.\n7 Resolving\
    \ deltas: 100% (112/112), done.\n```\n\n```\n1 $ cd scalar_objects && phpize &&\
    \ ./configure && make && sudo make install\n```\n\n这些命令会安装标量对象扩展，但我们还需要将其添加到配置文件中：`$\
    \ sudo bash -c \"echo extension=scalar_objects.so >> /etc/php5/cli/php.ini\"`\n\
    \n此命令与我们用于安装 `SPL` 类型的命令类似。我们本质上是在做同样的事情，因此我们需要重启 `PHP5-FPM`：\n\n```\n1 $ sudo\
    \ service php5-fpm restart\n\n3 php5-fpm stop/waiting\n4 php5-fpm start/running,\
    \ process...\n```\n\n这应该可以完成标量对象扩展的安装过程，但我们可以通过运行以下命令来确认它是否正常工作：\n\n```\n1 $ php\
    \ -i | grep scalar\n\n3 scalar_objects\n4 scalar-objects support => enabled\n\
    ```\n\n#### 使用标量对象\n\n这个新扩展添加了一个方法，我们可以用它来注册这些类型处理器。以下是如何使用它的方法：\n\n```\n 1 <?php\n\
    \n 3 class StringHandler\n 4 {\n 5   /**\n 6    * @param int   $start\n 7    *\
    \ @param mixed $length\n 8    *\n 9    * @return StringType\n10    */\n11   public\
    \ function slice($start = 0, $length = null)\n12   {\n13     if ($length === null)\
    \ {\n14       return substr($this, $start);\n15     }\n\n17     return substr($this,\
    \ $start, $length);\n18   }\n19 }\n\n21 register_primitive_type_handler(\"string\"\
    , \"StringHandler\");\n\n23 $string = \"Hello World\";\n\n25 print $string->slice(6);\
    \ // \"World\"\n```\n\n这比装箱标量类型更简单，因为我们不必从类实例中提取*原生*类型。这比 `SPL` 类型更简单，因为我们不必将*原生*类型放入类实例中。\n\
    \n支持七种类型：\n\n*   `null`\n*   `bool`\n*   `int`\n*   `float`\n*   `string`\n* \
    \  `array`\n*   `resource`\n\n你可能想知道这个扩展是否能与 `SPL` 类型良好协作。答案是*可能不行*。你不应该混合使用这些扩展，并且由于标量对象扩展能完成\
    \ `SPL` 类型的所有功能，你应该不需要两者都用。\n\n### Zephir\n\n`Zephir` 是一个用于编写可编译且可安装的 PHP 扩展的框架，它使用一种与\
    \ C 代码有相似之处的 PHP 超集语言。`Zephir` 严格来说并非 PHP 扩展，使用 Zephir 编写的库也并非用真正的 PHP 写成。\n\n\
    它属于与 `Phalcon` 框架相同的集体，而 `Phalcon` 本身就是一个 PHP 扩展。这应该会变得有趣起来！\n"
- fmt: "### Installing Zephir\n\nZephir requires a few libraries, in order to compile\
    \ correctly. We can install these with:\n\n```\n$ sudo apt-get install git gcc\
    \ make re2c php5 php5-json php5-dev libpcre3-dev\n```\n\nNext, we need to install\
    \ the JSON-C library (which Zephir uses to compile extensions):\n\n```\n$ git\
    \ clone https://github.com/json-c/json-c.git && cd json-c && sh autogen.sh &&\
    \ ./configure && make && sudo make install\n```\n\nThese commands will clone the\
    \ JSON-C repository, configure and compile it. Finally, we need to install Zephir:\n\
    \n```\n$ git clone https://github.com/phalcon/zephir && cd zephir && ./install\
    \ -c\n```\n\nThat should have installed a usable version of Zephir. You can check\
    \ that it’s working by heading into the clone folder and running:\n\n```\n$ zephir\
    \ version\n```\n\n### Using Zephir\n\nUsing Zephir is relatively simple (considering\
    \ the work that actually goes on). Let’s begin by initialising a new extension\
    \ skeleton project:\n\n```\n$ zephir init type\n```\n\nThis will create a skeleton\
    \ project folder in the current working directory. Navigate into the new `type`\
    \ directory and run:\n\n```\n$ ls -la\next/ type/ config.json\n```\n\nExtension\
    \ classes go in the `type` folder (it’s specific to the name of the extension,\
    \ which we gave the `init` command). Make a find in there, called `StringType.zep`,\
    \ and open that file in your editor.\n\nThe Zephir syntax is quite similar to\
    \ PHP, but with a twist of C style. You can find a reasonable amount of documentation\
    \ at [http://www.zephir-lang.com/index.html](http://www.zephir-lang.com/index.html).\n\
    \nCreate the following class:\n\n```\nnamespace Type;\n\nclass StringType\n{\n\
    \    protected data;\n\n    public function __construct(var data)\n    {\n   \
    \     let this->data = data;\n    }\n\n    public function length()\n    {\n \
    \       return strlen(this->data);\n    }\n}\n```\n\nOther than the missing `$`\
    \ symbols, and the `var`/`let` keywords added, this is pretty understandable.\
    \ Save the file and (from the base extension folder) run:\n\n```\n$ zephir build\n\
    \nCompiling...\n/bin/bash /vagrant/zephir/type/ext/libtool --mode=compile gcc\
    \  -I. -I/vagrant/zephir/type/ext -DPHP_ATOM_INC -I/vagrant/zephir/type/ext/include\
    \ -I/vagrant/zephir/type/ext/main -I/vagrant/zephir/type/ext -I/usr/include/php5\
    \ -I/usr/include/php5/main -I/usr/include/php5/TSRM -I/usr/include/php5/Zend -I/usr/include/php5/ext\
    \ -I/usr/include/php5/ext/date/lib  -DHAVE_CONFIG_H  -O2 -fvisibility=hidden -Wparentheses\
    \ -flto   -c /vagrant/zephir/type/ext/type/stringtype.zep.c -o type/stringtype.lo...\n\
    ```\n\nZephir cross-compiles the extension class files to Plain Ol’ C, and adds\
    \ the class loading code. The end of the build output should look something like:\n\
    \n```\nInstalling...\nExtension installed!\nAdd extension=type.so to your php.ini\n\
    Don't forget to restart your web server\n```\n\n…So we need to add the extension\
    \ to the `php.ini` file:\n\n```\n$ sudo bash -c \"echo extension=type.so >> /etc/php5/cli/php.ini\"\
    \n```\n\nThis will have installed the Type extension we just created. We can check\
    \ that it’s installed by running:\n\n```\n$ php -i | grep \"type => enabled\"\n\
    type => enabled\n```\n\nIf you see that line returned, you know the extension\
    \ is installed, and ready to go.\n\nUsing this new extension is as simple as:\n\
    \n```\n<?php\n\n$string = new Type\\StringType(\"Hello World\");\n\nprint $string->length();\n\
    ```\n\nThe namespace and class reside completely within the compiled extension\
    \ file. Zephir extensions can use pre-existing core and extension namespaces/classes.\
    \ The can be used by Plain Ol’ PHP code (provided the extension is registered\
    \ by the time it’s used).\n\nZephir extensions can even override core functions,\
    \ with better-performing versions.\n\n### Conclusion\n\nExtensions make our lives\
    \ significantly easier, by handling things like boxing and unboxing for us. They\
    \ let us create better-performing code (as in the case of Zephir) and stricter\
    \ types (as in the case of SPL Types).\n\nWe don’t have to use these to make a\
    \ cleaner system. If we do, we can expect to have a much strong type system, without\
    \ the hard work that library-only code expects of us.\n\n## Design\n\n### Which\
    \ Method To Use\n\nWe’ve had a look at a number of methods and extensions which\
    \ can help us to abstract away the inconsistent type handling PHP presents to\
    \ us. Part of creating this abstraction is deciding on which methods and/or extensions\
    \ to use.\n\n#### Namespace Methods\n\nGenerally, we should avoid any method that\
    \ would expose a significant amount of functions in the global scope. We don’t\
    \ want to create any more clutter than there already is, and being able to use\
    \ our abstraction, in addition to the standard stuff, is definitely beneficial.\n\
    \n> We should endeavour to have all our code reside in namespaces.\n\nFurthermore,\
    \ we should implement our code in such a way that it can be used both in procedural\
    \ environments and object-oriented environments. Stated differently; we should\
    \ contain the business logic within functions and call those functions (so that\
    \ they can be used in procedural code) from within an object-oriented framework\
    \ (so that scalar types can be used like objects).\n\n> We should build our logic\
    \ in functions and add those functions (as methods) to scalar type objects.\n\n\
    #### Scalar Objects / SPL Types\n\nThis means we will want to use the namespace\
    \ functions we covered earlier, and that we will also want to use either the scalar\
    \ objects or the SPL Types as an Object-Oriented basis for our type system.\n\n\
    I mentioned that the Scalar Objects and SPL Types extensions shouldn’t be used\
    \ together. That’s because they do the same thing. It’s not possible to proxy\
    \ function calls (in the way I’ve just described) without repeating the whole\
    \ Object-Oriented side of things for each extension.\n\nThis is due to the fact\
    \ that the Scalar Objects extension automatically boxes variables while the SPL\
    \ Types extension expects developers to box their own variables. It’s the different\
    \ between `return new static(substr($this, $offset, $length));` and `return substr($this,\
    \ $offset, $length);`\n\nWhile I love the Scalar Objects extension, I am inclined\
    \ to suggest with the SPL Types extension. The main reason is that it doesn’t\
    \ interfere with how PHP handles scalar types. This means we will need to box\
    \ variables, but we’ll also enjoy the benefits of state (object-like scalar variables)\
    \ and automatic unboxing.\n\n#### Zephir\n\nAs cool as Zephir is, it’s not PHP.\
    \ That means any developers you want to work on your code, will need to know or\
    \ learn another language. It also increases the time between coding, testing and\
    \ shipping.\n\nSo, for the remainder of the book, I will show code that is built\
    \ on top of SPL Types and not translated into Zephir extensions.\n\nThe appendices\
    \ [will] include a PHP and a Zephir implementation. I don’t want the implementation\
    \ to be a focus of the book, but I will enjoy making it!"
