  trans: "\n# 信不信由你\n\n信不信由你，到目前为止，本教程中产品目录的数据层和业务层已经全部完成。你只需在表示层中使用它们的功能即可。在本节最后部分，你将创建几个\
    \ Smarty 模板，并将其集成到现有项目中。\n\n运行 HatShop 项目（或在浏览器中打开 `http://localhost/hatshop`），再次查看访客点击某个部门时会发生什么。页面加载后，点击其中一个部门。主页面（`index.php`）会重新加载，但此时地址栏末尾会附带一个查询字符串：\n\
    \n`http://localhost/hatshop/index.php?DepartmentID=1`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00141.png)\n\n利用 `DepartmentID` 这个参数，你可以获取所选部门的任何信息，例如名称、描述、产品列表等。在接下来的几节中，你将创建用于显示与所选部门关联的类别列表，以及用于显示所选部门、类别或主网页的产品的控件。\n\
    \n## 显示部门和类别详情\n\n负责显示特定部门内容的组件化模板名为 `department`，你将在接下来的练习中创建它。首先创建组件化模板，然后修改\
    \ `index.php` 和 `templates/index.tpl`，使其在查询字符串中包含 `DepartmentID` 时加载该模板。完成此练习后，点击列表中的某个部门时，你应该会看到类似图\
    \ 4-9 的页面。\n\n**图 4-9.** *选择“假日”部门*\n\n## 练习：显示部门详情\n\n**1.** 在 `hatshop.css`\
    \ 文件中添加以下两个样式。它们将用于显示部门的标题和描述：\n\n```css\n.title\n{\n  color: #ff0000;\n  font-family:\
    \ arial, tahoma, verdana;\n  font-size: 18px;\n  margin: 0px;\n}\n\n.description\n\
    {\n  color: #0583b5;\n  font-size: 12px;\n  font-weight: bold;\n  margin: 0px;\n\
    }\n```\n\n**2.** 在 `presentation/templates` 文件夹中创建一个名为 `blank.tpl` 的新模板文件，内容如下：\n\
    \n```\n{* Smarty 空白页面 *}\n```\n\n没错，这是一个空白的 Smarty 模板文件，只包含一条注释。稍后会用到它。请确保将此注释添加到文件中；否则，如果文件为空，尝试使用该模板时会报错。\n\
    \n**3.** 在 `presentation/templates` 文件夹中创建一个名为 `department.tpl` 的新模板文件，并添加以下代码：\n\
    \n```\n{* department.tpl *}\n{load_department assign=\"department\"}\n<p class=\"\
    title\">{$department->mNameLabel}</p>\n<br />\n<p class=\"description\">{$department->mDescriptionLabel}</p>\n\
    <br />\n此处放置产品列表\n```\n\n两个变量 `$department->mNameLabel` 和 `$department->mDescriptionLabel`\
    \ 包含了所选部门的名称和描述，它们由模板插件文件 `function.load_department.php` 填充。\n\n**4.** 现在为 `department.tpl`\
    \ 创建模板插件文件。创建 `presentation/smarty_plugins/function.load_department.php` 文件，并添加以下代码：\n\
    \n```php\n<?php\n// 插件文件内的插件函数必须命名为：smarty_type_name\nfunction smarty_function_load_department($params,\
    \ $smarty)\n{\n  // 创建 Department 对象\n  $department = new Department();\n  $department->init();\n\
    \n  // 分配模板变量\n  $smarty->assign($params['assign'], $department);\n}\n\n// 用于处理部门详情检索的类\n\
    class Department\n{\n  // Smarty 模板的公共变量\n  public $mDescriptionLabel;\n  public\
    \ $mNameLabel;\n\n  // 私有成员\n  private $_mDepartmentId;\n  private $_mCategoryId;\n\
    }\n```\n"
- fmt: "# Class Constructor\n\n```php\npublic function __construct()\n{\n    // We\
    \ need to have DepartmentID in the query string\n    if (isset($_GET['DepartmentID']))\n\
    \        $this->_mDepartmentId = (int)$_GET['DepartmentID'];\n    else\n     \
    \   trigger_error('DepartmentID not set');\n\n    /* If CategoryID is in the query\
    \ string we save it\n       (casting it to integer to protect against invalid\
    \ values) */\n    if (isset($_GET['CategoryID']))\n        $this->_mCategoryId\
    \ = (int)$_GET['CategoryID'];\n}\n```\n\n```php\npublic function init()\n{\n \
    \   // If visiting a department ...\n    $details = Catalog::GetDepartmentDetails($this->_mDepartmentId);\n\
    \    $this->mNameLabel = $details['name'];\n    $this->mDescriptionLabel = $details['description'];\n\
    \n    // If visiting a category ...\n    if (isset($this->_mCategoryId))\n   \
    \ {\n        $details = Catalog::GetCategoryDetails($this->_mCategoryId);\n  \
    \      $this->mNameLabel = $this->mNameLabel . ' » ' . $details['name'];\n   \
    \     $this->mDescriptionLabel = $details['description'];\n    }\n}\n```\n\n##\
    \ Step 5: Modify `index.php`\n\nNow let's modify `index.tpl` and `index.php` to\
    \ load the newly created componentized template when `DepartmentID` appears in\
    \ the query string. If the visitor is browsing a department, you set the `pageContentsCell`\
    \ variable to the componentized template you have just created.\n\nModify `index.php`\
    \ as shown:\n\n```php\n<?php\n// Load Smarty library and config files\nrequire_once\
    \ 'include/app_top.php';\n\n// Load Smarty template file\n$page = new Page();\n\
    \n// Define the template file for the page contents\n$pageContentsCell = 'blank.tpl';\n\
    \n// Load department details if visiting a department\nif (isset($_GET['DepartmentID']))\n\
    {\n    $pageContentsCell = 'department.tpl';\n}\n\n// Assign a template file to\
    \ the page contents cell\n$page->assign('pageContentsCell', $pageContentsCell);\n\
    \n// Display the page\n$page->display('index.tpl');\n\n// Load app_bottom which\
    \ closes the database connection\nrequire_once 'include/app_bottom.php';\n?>\n\
    ```\n\n## Step 6: Modify `index.tpl`\n\nOpen `presentation/templates/index.tpl`,\
    \ and replace the text `Place contents here` with:\n\n```\n{include file=\"$pageContentsCell\"\
    }\n```\n\n## Step 7: Test the Website\n\nLoad your web site in a browser, and\
    \ select one of the departments to ensure everything works as expected.\n\n##\
    \ How It Works: The Department Componentized Template\n\nNow that the most important\
    \ functionality has already been implemented in the data and business tiers, implementing\
    \ the visual part was an easy task.\n\nAfter adding the CSS styles and creating\
    \ the blank template file, you created the Smarty template file `department.tpl`,\
    \ which contains the HTML layout for displaying a department's data. This template\
    \ file is loaded in the page contents cell, just below the header, in `index.tpl`:\n\
    \n```\n{include file=\"header.tpl\"}\n<div id=\"content\">\n{include file=\"$pageContentsCell\"\
    }\n</div>\n```\n\nThe `$pageContentsCell` variable is populated in `index.php`,\
    \ depending on the query string parameters. At the moment, if the `DepartmentID`\
    \ parameter is found in the query string, the page contents cell is populated\
    \ with the `department.tpl` template file you just wrote. Otherwise (such as when\
    \ being on the first page), the blank template file is used (you'll change this\
    \ when creating a template to populate the contents cell for the first page).\
    \ This is the code in `index.php` that assigns a value to `$pageContentsCell`:\n\
    \n```php\n// Define the template file for the page contents\n$pageContentsCell\
    \ = 'blank.tpl';\n\n// Load department details if visiting a department\nif (isset($_GET['DepartmentID']))\n\
    {\n    $pageContentsCell = 'department.tpl';\n}\n\n// Assign a template file to\
    \ the page contents cell\n$page->assign('pageContentsCell', $pageContentsCell);\n\
    ```\n\nThe first interesting aspect to know about `department.tpl` is the way\
    \ it loads the `load_department` function plugin.\n\n```\n{* department.tpl *}\n\
    {load_department assign=\"department\"}\n```"
