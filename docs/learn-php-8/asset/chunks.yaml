  trans: '

    示例 7-2 测试了使用 `dog_data` 类的一些可能场景。注意最后一行代码调用了析构函数（以保存数据）。这是通过将指向对象的指针（`$tester`）设置为
    `NULL` 来实现的，这会释放该对象。这将通知操作系统的垃圾回收器，该对象应从内存中移除。这会导致析构函数执行，从而更新 XML 文件并将该对象从服务器内存中移除。


    ## JSON 数据


    让我们稍作停顿，回顾一下读写 JSON 数据的能力。使用本章所示的示例代码，当您使用除 XML 以外的其他数据形式时，只需调整构造函数和析构函数。访问和使用
    JSON 数据甚至比使用 XML 数据更加简单。


    ```

    ...

    $json = file_get_contents($this->dog_data_JSON);

    $this->dogs_array = json_decode($json,TRUE);

    if ($this->dogs_array === null && json_last_error() !== JSON_ERROR_NONE)

    {

    throw new Exception("JSON error: " . json_last_error_msg());

    }

    ...

    ```


    在构造函数中，在从 `dog_application.xml` 文件获取数据位置的 `if else` 结构之后，原先用于访问和格式化 XML 数据的多行代码可以替换为前面所示的这几行代码。`json_decode`
    方法（如前所示）会尝试将文本文件中的数据格式化为关联数组格式。如果数据不是有效的 JSON 格式，则会抛出异常并传递错误信息。由于使用了 `Exception`
    类，`dog_interface` 程序会将这些信息记录到错误日志中，发送邮件给支持人员，并向用户显示一条通用消息。


    ```

    $json = json_encode($this->dogs_array);

    file_put_contents($this->dog_data_JSON,$json);

    ```


    析构函数的完整代码只需要两行。`json_encode` 方法会将关联数组数据转换为 JSON 格式。然后 `file_put_contents` 方法会将信息保存到
    JSON 文件的正确位置（`$this->dog_data_JSON`）。`dog_data` 中的任何其他方法都不需要修改。


    ## MySQL 8+ 的 MySQL 和 NoSQL 数据


    现在是简要举例说明我们可以对构造函数和析构函数方法进行调整以访问和更新数据库信息的好时机。当前版本的 MySQL 允许创建 MySQL 和 NoSQL 数据。


    *有关安装最新版本 MySQL 的信息，请访问* [*https://dev.mysql.com/doc/refman/8.0/en/installing.html*](https://dev.mysql.com/doc/refman/8.0/en/installing.html)*。*


    每当使用外部数据存储技术时，都应实施所有安全措施以完全保护所有数据。所有数据库系统都包含数据安全工具，以便在存储之前对信息进行验证。


    *有关在* *MySQL 数据库结构* *中保护数据安全的信息，请访问* [*https://dev.mysql.com/doc/refman/8.0/en/security.html*](https://dev.mysql.com/doc/refman/8.0/en/security.html)*。*


    ```

    $mysqli =mysqli_connect($server, $db_username, $db_password, $database);

    if (mysqli_connect_errno())

    {

    throw new Exception("MySQL connection error: " . mysqli_connect_error());

    }

    $sql="SELECT * FROM Dogs";

    $result=mysqli_query($con,$sql);

    If($result===null)

    {

    throw new Exception("No records retrieved from Database");

    }

    $this->dogs_array = mysqli_fetch_assoc($result);

    mysqli_free_result($result);

    mysqli_close($con);

    ```


    构造函数所需的大部分代码都与连接、检索和断开数据库相关。`mysqli_connect` 方法使用服务器位置（`$server`）、数据库用户 ID（`$db_username`）、数据库密码（`$db_password`）和数据库名称（`$database`）来连接数据库。如果
    `mysqli_connect_errno` 包含任何错误，则会抛出一个描述该错误的 `Exception`。如果没有错误，则使用 SQL SELECT 语句（`$sql`）从数据库的
    `Dogs` 表中检索所有记录。如果没有检索到记录，则会抛出另一个异常。如果检索到记录，`mysqli_fetch_assoc` 方法会将数据转换为关联数组。`mysqli_free_result`
    语句会释放 `$result` 中的数据。`mysqli_close` 方法会关闭对数据库的访问。


    析构函数需要编写更多的代码。然而，其循环结构与保存 XML 数据类似。


    ```

    $mysqli = new mysqli($server, $db_username, $db_password, $database);

    if ($mysqli->connect_errno)

    {

    throw new Exception("MySQL connection error:" . $mysqli->connect_error);

    }

    If( (!$mysqli->query("DROP TABLE IF EXISTS Dogs") ||

    (!$mysqli->query("CREATE TABLE IF NOT EXISTS Dogs (dog_id CHAR(4), dog_name CHAR(20),
    dog_weight CHAR(3), dog_color CHAR(15), dog_breed CHAR(35)") )

    {

    throw new Exception("Dog table can''t be created or deleted. Error: " .

    $mysqli->error);

    }

    foreach ($this->dogs_array as $dogs=>$dogs_value) {

    foreach ($dogs_value as $dog => $dog_value)

    {

    $dog_id = $dog_value["dog_id"];

    $dog_name = $dog_value["dog_name"];

    $dog_weight = $dog_value["dog_weight"];

    $dog_color = $dog_value["dog_color"];

    $dog_breed = $dog_value["dog_breed"];

    If(!$mysqli->query("INSERT INTO Dogs(dog_id, dog_name,

    dog_weight, dog_color, dog_breed)

    VALUES (''$dog_id'', ''$dog_name'', ''$dog_weight'', ''$dog_color'', ''$dog_breed'')"))

    {

    throw new Exception("Dog Table Insert Error: " . $mysqli->error);

    }

    }

    }

    ...

    ```


    析构函数方法尝试连接数据库。如果连接成功，该方法会删除任何预先存在的 `Dogs` 表，并使用所需的字段创建一个新表。（注意：或许重命名旧表再创建新表会更好。）如果旧表能被删除且新表被成功创建，那么该方法会尝试向表中插入行。SQL
    `INSERT` 语句将 `$dog_name`、`$dog_weight`、`$dog_color` 和 `$dog_breed` 中的值放入表中的一行。`foreach`
    循环从关联数组中检索每一行以便放入表中。如果任何插入操作不成功，则会抛出一个异常。


    *有关创建和使用 MySQL 数据存储以保存* *NoSQL 数据* *的信息，请访问* [*https://dev.mysql.com/doc/refman/8.0/en/document-store.html*](https://dev.mysql.com/doc/refman/8.0/en/document-store.html)*。*


    *   *编程注意事项——要运行此（或类似）数据库示例，必须正确配置 Apache 服务器，并且必须正确安装 MySQL。* `$server` *必须设置为
    URL、“localhost”或“127.0.0.1”。* `$db_username` *必须设置为用于访问数据库的用户 ID 名称（如果尚未配置用户 ID，则为''root''*
    *）。* `$db_password` *必须设置为数据库密码（如果没有密码，则为* `''''` *）。* `$database` *必须设置为数据库名称。在*
    *PHP 语言* *中有多种访问和操作数据库的方式。*


    ## 动手实践

    '
- fmt: "1.  从本书网站下载本节的示例文件。\n    调整`deleteRecords`方法以支持删除多条记录。同时，增加检查机制以限制可删除的记录数量。允许删除所有记录是非常不安全的。如果试图删除所有记录（或过多记录），应抛出异常。该异常应导致调用程序（最终是`dog_interface`）向主日志文件写入错误信息、通过电子邮件通知支持人员，并向用户显示通用消息（如第[6](#394210_2_En_6_Chapter.xhtml)章所示）。调整`testdata`程序以测试删除多条记录的功能并捕获异常。\n\
    \n2.  从本书网站下载本节的示例文件。\n    调整`testdata`程序以测试所有尚未测试的剩余场景。这些场景涉及插入、更新（多条）、读取和删除记录。务必测试格式不正确的信息。在`testdata`程序中创建一个`try\
    \ catch`块来捕获任何异常。你可以参考第[6](#394210_2_En_6_Chapter.xhtml)章中`dog_interface`的`try\
    \ catch`块作为示例。\n\n## 备份与恢复\n\n对存储信息进行更改时，总有可能出现问题。一个完善的应用程序在保存数据前必须过滤和清理数据，同时也必须准备好处理坏数据可能渗透并损坏信息的情况。除了故意破坏，还可能出现不可预见的问题（如系统崩溃）。应用程序必须提供在不丢失数据的情况下进行恢复的能力。这可以通过记录变更请求和备份有效信息来实现。恢复可以通过使用有效的备份，并将有效的更改重新应用于备份文件以生成最新信息来完成。\n\
    \n只需对`dogdata`文件（示例[7-1](#394210_2_En_7_Chapter.xhtml#PC13)）进行少量改动，即可创建变更日志并提供备份和恢复能力。首先，我们将创建一个主方法（`processRecords`），它负责解释传递给该类的任何数据。此函数通过允许恢复程序将所有变更日志信息传递给一个方法，从而简化恢复过程。\n\
    \n```\nfunction processRecords(string $change_Type, $records_array)\n{\nswitch($change_Type)\n\
    {\ncase \"Delete\":\n$this->deleteRecord($records_array);\nbreak;\ncase \"Insert\"\
    :\n$this->insertRecords($records_array);\nbreak;\ncase \"Update\":\n$this->updateRecords($records_array);\n\
    break;\ncase \"Display\":\n$this->readRecords($records_array);\nBreak;\ndefault:\n\
    throw new Exception(\"Invalid XML file change type: $change_Type\");\n}\n}\n```\n\
    \n所有更改请求现在都将通过此方法传递。该方法接受一个变更类型（`Insert`、`Delete`、`Update`或`Display`）以及数组（用于`Insert`或`Update`）或记录编号（用于`Delete`或`Update`）。这些值被传递给`$record_array`。`$record_array`被动态创建为数组或字符串。这使得`processRecords`方法能够提供*多态性*（同一方法调用接受不同参数的能力），这是面向对象语言的要求之一（与封装和继承一起）。`switch`语句检查`$change_Type`以决定调用哪个方法，然后调用相应的方法。如果传递了无效类型，则抛出异常。\n\
    \n> 安全和性能提示——在“生产”环境中，向此类方法传递“代码”而非指示将要执行的操作的值会更安全。例如，可以用`101`表示更新。`switch`语句可以轻松调整为检查这些代码以决定调用哪个方法。\n\
    \n此前我们审查过的每个方法（除了构造方法和析构方法）现在都被设置为`'private'`。这使得过程更加安全；更改只能通过使用`processRecords`方法进行。在每个方法的末尾还增加了三行代码以提供备份和恢复能力。\n\
    \n```\n...\n$change_string = date('mdYhis') . \" | Delete | \" . $recordNumber\
    \ . \"\\n\";\n$chge_log_file = date('mdYhis') . $this->change_log_file;\nerror_log($change_string,3,$chge_log_file);\
    \ // might exceed 120 chars\n...\n```\n\n第一行格式化了一个用于变更日志文件的字符串。其格式类似于我们在第[6](#394210_2_En_6_Chapter.xhtml)章中看到的格式。在前面的示例中，根据`delete`方法的要求传入了记录编号。\n\
    \n```\n$change_string = date('mdYhis') . \" | Update | \" . serialize($records_array)\
    \ . \"\\n\";\n```\n\n对于`update`和`insert`方法，传入了数组。但是，数组不能直接放入字符串中。`serialize`方法将数组转换为类似以下格式的字符串：\n\
    \n```\na:1:{i:0;a:4:{s:8:\"dog_name\";s:7:\"Spot\";s:10:\"dog_weight\";s:2:\"\
    19\";s:9:\n\"dog_color\";s:5:\"Green\";s:9:\"dog_breed\";s:3:\"Lab\";}}\n```\n\
    \n序列化字符串中的数据可以使用`unserialize`方法恢复为数组格式（或其他格式）。第二行创建了一个字符串`($chge_log_file`)，它使用`date`方法和位于`dog_applications`\
    \ XML文件中的日志文件名来创建备份文件名（和路径）。然后将该字符串通过`error_log`方法传递给此日志。日志文件的内容将类似于以下内容：\n\n\
    ```\n07142020042510 | Insert | a:1:{i:0;a:4:{s:8:\"dog_name\";s:7:\"tester1\"\
    ;s:10:\n\"dog_weight\";s:2:\"19\";s:9:\"dog_color\";s:5:\"Green\";s:9:\"dog_breed\"\
    ;s:3:\"Lab\";}}\n07142020042510 | Update | a:1:{i:1;a:4:{s:8:\"dog_name\";s:7:\"\
    tester2\";s:10:\n\"dog_weight\";s:2:\"19\";s:9:\"dog_color\";s:5:\"Green\";s:9:\"\
    dog_breed\";s:3:\"Lab\";}}\n07142020042510 | Delete | 1\n```\n\n此格式提供了帮助恢复过程所需的所有信息。如果当前版本的狗狗数据文件损坏，可以使用变更日志文件将更改应用于一个完好的文件版本，以生成一个新的当前版本。\n\
    \n`data`类需要的其他唯一改动是在析构函数中增加几行代码。\n\n```\n$new_valid_data_file = preg_replace('/[0-9]+/',\
    \ '', $this->dog_data_xml);\n// remove the previous date and time if it exists\n\
    $oldxmldata = date('mdYhis') . $new_valid_data_file;\nif (!rename($this->dog_data_xml,\
    \ $oldxmldata))\n{\nthrow new Exception(\"Backup file $oldxmldata could not be\
    \ created.\");\n}\nfile_put_contents($new_valid_data_file,$xmlstring);\n```"
  raw: "1.  Download the example files for this section from the book’s web site.\n\
    \    Adjust the `deleteRecords` method\n    to allow the ability to delete multiple\
    \ records. However, also include a\n    check to limit the amount of records that\
    \ can be deleted. It would not\n    be very secure to allow all records to be\
    \ deleted. If an attempt is made\n    to delete all records (or too many records),\
    \ an exception should be\n    raised. The exception should cause the calling program\
    \ (eventually `dog_interface`) to\n    write an error message to the main log\
    \ file, email the support\n    personnel, and display the general message to the\
    \ users (shown in\n    Chapter [6](#394210_2_En_6_Chapter.xhtml)). Adjust the\
    \ `testdata` program to\n    test the ability to delete multiple records and catch\
    \ the\n    exceptions.\n\n2.  Download the example files for this section from\
    \ the book’s web site.\n    Adjust the `testdata` program to\n    test all remaining\
    \ scenarios that have not already been tested. These\n    are related to inserting,\
    \ updating (more than one), reading, and\n    deleting records. Be sure to test\
    \ improperly formatted information.\n    Create a `try catch` block in the `testdata`\
    \ program to\n    capture any exceptions. You can use the `try catch` block from\n\
    \    `dog_interface`\n    in Chapter [6](#394210_2_En_6_Chapter.xhtml) as an example.\n\
    \nBackup and Recovery\nThere is always a possibility that something can go wrong\
    \ when\nchanges are made to stored information. While a well-developed\napplication\
    \ must filter and clean data before it is saved, it must also\nbe prepared to\
    \ handle the possibility that bad data may still flowed\nthrough and corrupt the\
    \ information. In addition to intentional\ncorruption, unforeseen problems (such\
    \ as system crashes) may occur. An\napplication must provide the ability to recover\
    \ without the loss of\ndata. This can be accomplished by logging change requests\
    \ and backing up\nvalid information. Recovery can be accomplished by using a valid\
    \ backup\nand reapplying valid changes to the backup files to produce up-to-date\n\
    information.\n\nYou can make just a few minor changes to the `dogdata` file (Example\n\
    [7-1](#394210_2_En_7_Chapter.xhtml#PC13)) to create a\nchange log and to provide\
    \ backup and recovery capability. First, we will\ncreate a main method (`processRecords`)\
    \ that\nwill interpret any data passed into the class. This function will\nsimplify\
    \ the recovery process by allowing the\nrecovery program to pass all change log\
    \ information into one method.\n\n```\nfunction processRecords(string $change_Type,\
    \ $records_array)\n{\nswitch($change_Type)\n{\ncase \"Delete\":\n$this->deleteRecord($records_array);\n\
    break;\ncase \"Insert\":\n$this->insertRecords($records_array);\nbreak;\ncase\
    \ \"Update\":\n$this->updateRecords($records_array);\nbreak;\ncase \"Display\"\
    :\n$this->readRecords($records_array);\nBreak;\ndefault:\nthrow new Exception(\"\
    Invalid XML file change type: $change_Type\");\n}\n}\n```\n\nAll requests for\
    \ changes will now be passed through this method. The\nmethod accepts a change\
    \ type (`Insert`, `Delete`, `Update`, or `Display`) and the\narray (for `Insert`\
    \ or `Update`) or the record\nnumber (for `Delete` or `Update`). The values\n\
    are passed into `$record_array`. `$record_array` is\ndynamically created as either\
    \ an array or a string. This allows the\n`processRecords`\nmethod to provide *polymorphism*\
    \ \n(the ability for the same method call to accept different parameters),\nwhich\
    \ is one of the requirements of an object-oriented language (along\nwith encapsulation\
    \ and inheritance). The `switch` statement\nlooks at `$change_Type` to\ndetermine\
    \ which method to call. It then calls the related method. If an\ninvalid type\
    \ is passed, an exception is thrown.\n\n*   *Security and performance—In a “live”\
    \ environment, it would be\n    more secure to pass “codes” into this type of\
    \ method instead of using a\n    value that indicates the action that will take\
    \ place. For example, 101\n    could be used to indicate an update. The* *switch*\n\
    \    *statement could easily be adjusted to examine the codes to determine\n \
    \   which method to call.*\n\nEach of the methods that we have examined previously\
    \ (except for the\nconstructor and destructor) is now set to `'private'`. This\
    \ makes\nthe process much more secure; changes can only occur by using the `processRecords`\n\
    method. Three code lines have also been added to the end of each of the\nthree\
    \ methods to provide backup and recovery capabilities.\n\n```\n...\n$change_string\
    \ = date('mdYhis') . \" | Delete | \" . $recordNumber . \"\\n\";\n$chge_log_file\
    \ = date('mdYhis') . $this->change_log_file;\nerror_log($change_string,3,$chge_log_file);\
    \ // might exceed 120 chars\n...\n```\n\nThe first line formats a string for a\
    \ change log file. The format used\nis similar to the format we look at in Chapter\
    \ [6](#394210_2_En_6_Chapter.xhtml). In the previous example, the\nrecord number\
    \ is passed as required for the `delete` method.\n\n```\n$change_string = date('mdYhis')\
    \ . \" | Update | \" . serialize($records_array) . \"\\n\";\n```\n\nFor `update`\
    \ and\n`insert`, the\narrays are passed. However, an array cannot be placed into\
    \ a string. The\n`serialize`\nmethod  transforms\nan array into a string format\
    \ similar to the following:\n\n```\na:1:{i:0;a:4:{s:8:\"dog_name\";s:7:\"Spot\"\
    ;s:10:\"dog_weight\";s:2:\"19\";s:9:\n\"dog_color\";s:5:\"Green\";s:9:\"dog_breed\"\
    ;s:3:\"Lab\";}}\n```\n\nThe data in a serialized string can be returned to an\
    \ array format (or\nanother format) using the `unserialize`\nmethod . The\nsecond\
    \ line creates a string `($chge_log_file`),\nwhich uses the `date` method and\
    \ the\nlog file name located in the `dog_applications` XML\nfile to create a backup\
    \ file name (and location). The string created is\nthen passed to this log using\
    \ the `error_log` method . The contents of the\nlog file will look similar to\
    \ the following:\n\n```\n07142020042510 | Insert | a:1:{i:0;a:4:{s:8:\"dog_name\"\
    ;s:7:\"tester1\";s:10:\n\"dog_weight\";s:2:\"19\";s:9:\"dog_color\";s:5:\"Green\"\
    ;s:9:\"dog_breed\";s:3:\"Lab\";}}\n07142020042510 | Update | a:1:{i:1;a:4:{s:8:\"\
    dog_name\";s:7:\"tester2\";s:10:\n\"dog_weight\";s:2:\"19\";s:9:\"dog_color\"\
    ;s:5:\"Green\";s:9:\"dog_breed\";s:3:\"Lab\";}}\n07142020042510 | Delete | 1\n\
    ```\n\nThis format provides all the information needed to help with the\nrecovery\
    \ process. If the current version of the dog data file is\ncorrupted, the change\
    \ log file can be used to apply changes to a good\nversion of the file to develop\
    \ a new current version.\n\nThe only other changes needed to the `data` class\
    \ are a few\nadditional code lines in the destructor.\n\n```\n$new_valid_data_file\
    \ = preg_replace('/[0-9]+/', '', $this->dog_data_xml);\n// remove the previous\
    \ date and time if it exists\n$oldxmldata = date('mdYhis') . $new_valid_data_file;\n\
    if (!rename($this->dog_data_xml, $oldxmldata))\n{\nthrow new Exception(\"Backup\
    \ file $oldxmldata could not be created.\");\n}\nfile_put_contents($new_valid_data_file,$xmlstring);\n\
    ```"
  trans: "\n1.  从本书网站下载本节的示例文件。\n    调整`deleteRecords`方法以支持删除多条记录。同时，增加检查机制以限制可删除的记录数量。允许删除所有记录是非常不安全的。如果试图删除所有记录（或过多记录），应抛出异常。该异常应导致调用程序（最终是`dog_interface`）向主日志文件写入错误信息、通过电子邮件通知支持人员，并向用户显示通用消息（如第\
    \ 6 章所示）。调整`testdata`程序以测试删除多条记录的功能并捕获异常。\n\n2.  从本书网站下载本节的示例文件。\n    调整`testdata`程序以测试所有尚未测试的剩余场景。这些场景涉及插入、更新（多条）、读取和删除记录。务必测试格式不正确的信息。在`testdata`程序中创建一个`try\
    \ catch`块来捕获任何异常。你可以参考第 6 章中`dog_interface`的`try catch`块作为示例。\n\n## 备份与恢复\n\n\
    对存储信息进行更改时，总有可能出现问题。一个完善的应用程序在保存数据前必须过滤和清理数据，同时也必须准备好处理坏数据可能渗透并损坏信息的情况。除了故意破坏，还可能出现不可预见的问题（如系统崩溃）。应用程序必须提供在不丢失数据的情况下进行恢复的能力。这可以通过记录变更请求和备份有效信息来实现。恢复可以通过使用有效的备份，并将有效的更改重新应用于备份文件以生成最新信息来完成。\n\
    \n只需对`dogdata`文件（示例 7-1）进行少量改动，即可创建变更日志并提供备份和恢复能力。首先，我们将创建一个主方法（`processRecords`），它负责解释传递给该类的任何数据。此函数通过允许恢复程序将所有变更日志信息传递给一个方法，从而简化恢复过程。\n\
    \n```\nfunction processRecords(string $change_Type, $records_array)\n{\nswitch($change_Type)\n\
    {\ncase \"Delete\":\n$this->deleteRecord($records_array);\nbreak;\ncase \"Insert\"\
    :\n$this->insertRecords($records_array);\nbreak;\ncase \"Update\":\n$this->updateRecords($records_array);\n\
    break;\ncase \"Display\":\n$this->readRecords($records_array);\nBreak;\ndefault:\n\
    throw new Exception(\"Invalid XML file change type: $change_Type\");\n}\n}\n```\n\
    \n所有更改请求现在都将通过此方法传递。该方法接受一个变更类型（`Insert`、`Delete`、`Update`或`Display`）以及数组（用于`Insert`或`Update`）或记录编号（用于`Delete`或`Update`）。这些值被传递给`$record_array`。`$record_array`被动态创建为数组或字符串。这使得`processRecords`方法能够提供*多态性*（同一方法调用接受不同参数的能力），这是面向对象语言的要求之一（与封装和继承一起）。`switch`语句检查`$change_Type`以决定调用哪个方法，然后调用相应的方法。如果传递了无效类型，则抛出异常。\n\
    \n> 安全和性能提示——在“生产”环境中，向此类方法传递“代码”而非指示将要执行的操作的值会更安全。例如，可以用`101`表示更新。`switch`语句可以轻松调整为检查这些代码以决定调用哪个方法。\n\
    \n此前我们审查过的每个方法（除了构造方法和析构方法）现在都被设置为`'private'`。这使得过程更加安全；更改只能通过使用`processRecords`方法进行。在每个方法的末尾还增加了三行代码以提供备份和恢复能力。\n\
    \n```\n...\n$change_string = date('mdYhis') . \" | Delete | \" . $recordNumber\
    \ . \"\\n\";\n$chge_log_file = date('mdYhis') . $this->change_log_file;\nerror_log($change_string,3,$chge_log_file);\
    \ // might exceed 120 chars\n...\n```\n\n第一行格式化了一个用于变更日志文件的字符串。其格式类似于我们在第 6 章中看到的格式。在前面的示例中，根据`delete`方法的要求传入了记录编号。\n\
    \n```\n$change_string = date('mdYhis') . \" | Update | \" . serialize($records_array)\
    \ . \"\\n\";\n```\n\n对于`update`和`insert`方法，传入了数组。但是，数组不能直接放入字符串中。`serialize`方法将数组转换为类似以下格式的字符串：\n\
    \n```\na:1:{i:0;a:4:{s:8:\"dog_name\";s:7:\"Spot\";s:10:\"dog_weight\";s:2:\"\
    19\";s:9:\n\"dog_color\";s:5:\"Green\";s:9:\"dog_breed\";s:3:\"Lab\";}}\n```\n\
    \n序列化字符串中的数据可以使用`unserialize`方法恢复为数组格式（或其他格式）。第二行创建了一个字符串`($chge_log_file`)，它使用`date`方法和位于`dog_applications`\
    \ XML 文件中的日志文件名来创建备份文件名（和路径）。然后将该字符串通过`error_log`方法传递给此日志。日志文件的内容将类似于以下内容：\n\n\
    ```\n07142020042510 | Insert | a:1:{i:0;a:4:{s:8:\"dog_name\";s:7:\"tester1\"\
    ;s:10:\n\"dog_weight\";s:2:\"19\";s:9:\"dog_color\";s:5:\"Green\";s:9:\"dog_breed\"\
    ;s:3:\"Lab\";}}\n07142020042510 | Update | a:1:{i:1;a:4:{s:8:\"dog_name\";s:7:\"\
    tester2\";s:10:\n\"dog_weight\";s:2:\"19\";s:9:\"dog_color\";s:5:\"Green\";s:9:\"\
    dog_breed\";s:3:\"Lab\";}}\n07142020042510 | Delete | 1\n```\n\n此格式提供了帮助恢复过程所需的所有信息。如果当前版本的狗狗数据文件损坏，可以使用变更日志文件将更改应用于一个完好的文件版本，以生成一个新的当前版本。\n\
    \n`data`类需要的其他唯一改动是在析构函数中增加几行代码。\n\n```\n$new_valid_data_file = preg_replace('/[0-9]+/',\
    \ '', $this->dog_data_xml);\n// 移除之前的日期和时间（如果存在）\n$oldxmldata = date('mdYhis')\
    \ . $new_valid_data_file;\nif (!rename($this->dog_data_xml, $oldxmldata))\n{\n\
    throw new Exception(\"备份文件 $oldxmldata 无法创建。\");\n}\nfile_put_contents($new_valid_data_file,$xmlstring);\n\
    ```\n"
- fmt: '在析构函数使用`file_put_contents`方法将更改应用到XML文件之前，应创建一个备份，以防更改导致当前数据损坏。恢复过程将允许支持人员选择包含良好数据的数据文件，以及将哪些更改文件应用于数据，以生成数据的正确当前版本。


    由于此过程可能使用数据的备份文件（其文件名包含日期和时间），因此使用`preg_replace`方法从数据文件名中移除所有数值信息。第一个参数中的正则表达式（`/[0-9]+/`）指示该方法搜索`$this->dog_data_xml`中所有出现的数字。如果找到任何匹配项，则将其替换为第二个参数（`''''`）中的值，在本例中为空字符串。然后，新文件名被存储在`$new_valid_data_file`中。这不会对“正常的”非备份文件名造成任何更改，因为它不包含任何数值信息。使用`$new_valid_data_file`中的文件名加上日期和时间信息，创建了一个新的备份文件名，并存储在`$oldxmldata`中。


    现在，可以使用`rename`方法将最后有效的原始数据移动到新的备份文件中。`$this->dog_data_xml`中的数据（未更改的有效数据位置）被复制到新的备份文件位置（`$oldxmldata`）。如果文件无法重命名，则抛出异常。最后，有效的更改数据（位于`$xmlstring`中）可以被放置到有效数据的新位置（即不含任何日期信息的相同文件名），该位置由`$new_valid_data_file`属性指定。


    例如，如果`07142020042510dog_data.xml`包含最后可用的有效数据，那么`07152020001510dog_data.xml`可能是在应用任何更改之前此数据的新位置。`dog_data.xml`将是应用更改后有效数据的位置。对`dog`数据类的最后一次编码更改是包含了一个`set`方法。


    ```php

    function setChangeLogFile($value)

    {

    $this->dog_data_xml = $value;

    }

    ```


