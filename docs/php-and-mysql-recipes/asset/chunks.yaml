    $crop = ImageCrop($img, $area);


    $thumb = ImageScale($crop, $size[0], $size[1]);


    header(''Content-Type: '' . $orig[''mime'']);


    switch ($orig[2]) {


    case IMG_JPG :


    case IMG_JPEG :


    ImageJPEG($thumb);


    break;


    case IMG_PNG :


    ImagePNG($thumb);


    break;


    case IMG_GIF :


    ImageGIF($thumb);


    break;


    }


    ImageDestroy($thumb);


