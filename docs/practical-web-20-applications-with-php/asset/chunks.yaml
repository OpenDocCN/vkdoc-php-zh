    **Summary**


    In this chapter, we created a fully functioning search engine for our web application
    using Zend_Search_Lucene. We achieved this by creating a search index for all
    of the blog posts in the application. We altered the blog management code so the
    index is automatically maintained when posts are created, updated, or deleted.


    Next we added a search form to the website to allow users to find blog posts.
    The powerful querying syntax of Lucene meant posts could be found based on several
    criteria, including the title, the body, or its tags.


    Finally, we improved the search form to behave similarly to Google’s Suggest interface.


    This provides users with some suggestions on what to search for, based on the
    tags registered users have applied to their blog posts.


    In the next chapter, we will be looking closely at Google Maps. We will extend
    the blog functionality so users can add locations to their blog posts and display
    those maps accordingly.


