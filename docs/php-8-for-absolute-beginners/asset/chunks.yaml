    We can see from the output that both `answer` and `quiz-submitted` indexes are
    created. The `answer` index has a value of `yes` because the user answered the
    question with this selection. The value stored in `quiz-submitted` gives us an
    indication that the array was created via the `POST` method. The use of `print_r`
    can be a great debugging tool that allows us to see what is being passed from
    one program to another.'
