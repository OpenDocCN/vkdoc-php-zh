- "# 实现业务层\n\n要实现业务层，您需要向`Catalog`类添加以下方法：\n\n- `DeleteProduct`：从目录中彻底删除一个产品。\n- `RemoveProductFromCategory`：当点击“从分类中移除”按钮时调用，用于将产品从分类中取消分配。\n\
  - `GetCategories`：返回目录中的所有分类。\n- `GetProductInfo`：返回产品的详细信息。\n- `GetCategoriesForProduct`：用于获取与指定产品相关的分类列表。\n\
  - `SetProductDisplayOption`：设置产品的显示选项。\n- `AssignProductToCategory`：将产品分配到一个分类。\n\
  - `MoveProductToCategory`：将产品从一个分类移动到另一个分类。\n- `SetImage`：更改数据库中特定产品的图片文件名。\n- `SetThumbnail`：更改特定产品的第二个图片文件名。\n\
  \n## 练习：实现业务层方法\n\n由于这些功能通过数据层方法调用能更好地表达，我们将在实现数据层时进一步讨论它们。请将以下代码添加到`business/catalog.php`中的`Catalog`类：\n\
  \n```php\n// Removes a product from the product catalog\npublic static function\
  \ DeleteProduct($productId)\n{\n    // Build the SQL query\n    $sql = 'SELECT catalog_delete_product(:product_id);';\n\
  \n    // Build the parameters array\n    $params = array (':product_id' => $productId);\n\
  \n    // Prepare the statement with PDO-specific functionality\n    $result = DatabaseHandler::Prepare($sql);\n\
  \n    // Execute the query\n    return DatabaseHandler::Execute($result, $params);\n\
  }\n\n// Unassigns a product from a category\npublic static function RemoveProductFromCategory($productId,\
  \ $categoryId)\n{\n    // Build the SQL query\n    $sql = 'SELECT catalog_remove_product_from_category(\n\
  \        :product_id, :category_id);';\n\n    // Build the parameters array\n  \
  \  $params = array (':product_id' => $productId,\n                     ':category_id'\
  \ => $categoryId);\n\n    // Prepare the statement with PDO-specific functionality\n\
  \    $result = DatabaseHandler::Prepare($sql);\n\n    // Execute the query and return\
  \ the results\n    return DatabaseHandler::GetOne($result, $params);\n}\n\n// Retrieves\
  \ the list of categories a product belongs to\npublic static function GetCategories()\n\
  {\n    // Build the SQL query\n    $sql = 'SELECT * FROM catalog_get_categories();';\n\
  \n    // Prepare the statement with PDO-specific functionality\n    $result = DatabaseHandler::Prepare($sql);\n\
  \n    // Execute the query and return the results\n    return DatabaseHandler::GetAll($result);\n\
  }\n\n// Retrieves product info\npublic static function GetProductInfo($productId)\n\
  {\n    // Build the SQL query\n    $sql = 'SELECT * FROM catalog_get_product_info(:product_id);';\n\
  \n    // Build the parameters array\n    $params = array (':product_id' => $productId);\n\
  \n    // Prepare the statement with PDO-specific functionality\n    $result = DatabaseHandler::Prepare($sql);\n\
  \n    // Execute the query and return the results\n    return DatabaseHandler::GetRow($result,\
  \ $params);\n}\n\n// Retrieves the list of categories a product belongs to\npublic\
  \ static function GetCategoriesForProduct($productId)\n{\n    // Build the SQL query\n\
  \    $sql = 'SELECT * FROM catalog_get_categories_for_product(:product_id);';\n\n\
  \    // Build the parameters array\n    $params = array (':product_id' => $productId);\n\
  \n    // Prepare the statement with PDO-specific functionality\n    $result = DatabaseHandler::Prepare($sql);\n\
  \n    // Execute the query and return the results\n    return DatabaseHandler::GetAll($result,\
  \ $params);\n}\n\n// Assigns a product to a category\npublic static function SetProductDisplayOption($productId,\
  \ $display)\n{\n    // Build the SQL query\n    $sql = 'SELECT catalog_set_product_display_option(\n\
  \        :product_id, :display);';\n\n    // Build the parameters array\n    $params\
  \ = array (':product_id' => $productId,\n                     ':display' => $display);\n\
  \n    // Prepare the statement with PDO-specific functionality\n    $result = DatabaseHandler::Prepare($sql);\n\
  }\n```\n\n\n```markdown\n\n// 执行查询\n\nreturn `DatabaseHandler::Execute($result,\
  \ $params)`;\n\n}\n\n// 将产品分配给一个类别\n\npublic static function `AssignProductToCategory($productId,\
  \ $categoryId)`\n\n{\n\n// 构建 SQL 查询语句\n\n$sql = 'SELECT catalog_assign_product_to_category(\n\
  \n:product_id, :category_id);';\n\n// 构建参数数组\n\n$params = array (':product_id' =>\
  \ $productId,\n\n':category_id' => $categoryId);\n\n// 使用 PDO 特定功能准备语句 `$result\
  \ = DatabaseHandler::Prepare($sql)`;\n\n// 执行查询\n\nreturn `DatabaseHandler::Execute($result,\
  \ $params)`;\n\n}\n\n// 将产品从一个类别移动到另一个类别\n\npublic static function `MoveProductToCategory($productId,\
  \ $sourceCategoryId, $targetCategoryId)`\n\n{\n\n// 构建 SQL 查询语句\n\n$sql = 'SELECT\
  \ catalog_move_product_to_category(:product_id,\n\n:source_category_id, :target_category_id);';\n\
  \n// 构建参数数组\n\n$params = array (':product_id' => $productId,\n\n':source_category_id'\
  \ => $sourceCategoryId,\n\n':target_category_id' => $targetCategoryId);\n\n// 使用\
  \ PDO 特定功能准备语句 `$result = DatabaseHandler::Prepare($sql)`;\n\n// 执行查询\n\nreturn\
  \ `DatabaseHandler::Execute($result, $params)`;\n\n}\n\n// 更改数据库中产品图片文件的名称\n\npublic\
  \ static function `SetImage($productId, $imageName)`\n\n{\n\n// 构建 SQL 查询语句\n\n\
  $sql = 'SELECT catalog_set_image(:product_id, :image_name);';\n\n// 构建参数数组\n\n$params\
  \ = array (':product_id' => $productId, ':image_name' => $imageName);\n\n// 使用 PDO\
  \ 特定功能准备语句 `$result = DatabaseHandler::Prepare($sql)`;\n\n// 执行查询\n\nreturn `DatabaseHandler::Execute($result,\
  \ $params)`;\n\n}\n\n// 更改数据库中产品缩略图文件的名称\n\npublic static function `SetThumbnail($productId,\
  \ $thumbnailName)`\n\n{\n\n// 构建 SQL 查询语句\n\n$sql = 'SELECT catalog_set_thumbnail(:product_id,\
  \ :thumbnail_name);';\n\n// 构建参数数组\n\n$params = array (':product_id' => $productId,\n\
  \n':thumbnail_name' => $thumbnailName);\n\n// 使用 PDO 特定功能准备语句 `$result = DatabaseHandler::Prepare($sql)`;\n\
  \n// 执行查询\n\nreturn `DatabaseHandler::Execute($result, $params)`;\n\n}\n\n## 实现数据层\n\
  \n在数据层中，您需要在 `Catalog` 类中添加与您刚才看到的业务层方法相对应的方法。\n\n## 练习：添加数据层函数\n\n**1.** 加载 `pgAdmin\
  \ III`，并连接到 `hatshop` 数据库。\n\n**2.** 点击**工具** ➤ **查询工具**（或点击工具栏上的 SQL 按钮）。此时会弹出一个新的查询窗口。\n\
  \n**3.** 使用查询工具执行以下代码，该代码将在您的 `hatshop` 数据库中创建 `catalog_delete_product` 函数：\n\n\
  ```sql\n-- 创建 catalog_delete_product 函数\n\nCREATE FUNCTION catalog_delete_product(INTEGER)\n\
  \nRETURNS VOID LANGUAGE plpgsql AS $$\n\nDECLARE\n\ninProductId ALIAS FOR $1;\n\n\
  BEGIN\n\nDELETE FROM product_category WHERE product_id = inProductId; DELETE FROM\
  \ product WHERE product_id = inProductId;\n\nEND;\n\n$$;\n```\n\n`catalog_delete_product`\
  \ 函数通过删除 `product_category` 和 `product` 表中的相关条目，将产品从目录中完全移除。\n\n**4.** 使用查询工具执行以下代码，该代码将在您的\
  \ `hatshop` 数据库中创建 `catalog_remove_product_from_category` 函数：\n\n```sql\n-- 创建 catalog_remove_product_from_category\
  \ 函数 CREATE FUNCTION catalog_remove_product_from_category(INTEGER, INTEGER) RETURNS\
  \ SMALLINT LANGUAGE plpgsql AS $$\n\nDECLARE\n\ninProductId ALIAS FOR $1;\n\ninCategoryId\
  \ ALIAS FOR $2;\n\nproductCategoryRowsCount INTEGER;\n\nBEGIN\n\nSELECT INTO productCategoryRowsCount\n\
  \ncount(*)\n\nFROM product_category\n\nWHERE product_id = inProductId;\n\nIF productCategoryRowsCount\
  \ = 1 THEN\n\nPERFORM catalog_delete_product(inProductId);\n\nRETURN 0;\n\nEND IF;\n\
  \nDELETE FROM product_category\n```\n\n```\n\n\n"
- "# 第七章：目录管理\n\n`catalog_remove_product_from_category`函数检查产品存在于多少个类别中。如果产品存在于多个类别中，则仅从指定类别（通过\
  \ ID 作为参数接收）中移除该产品。如果产品仅与一个类别关联，则从数据库中完全删除。\n\n5.  使用查询工具执行以下代码，它在`hatshop`数据库中创建`catalog_get_categories`函数：\n\
  \n```sql\n-- Create catalog_get_categories function\nCREATE FUNCTION catalog_get_categories()\n\
  RETURNS SETOF department_category LANGUAGE plpgsql AS $$\nDECLARE\n  outDepartmentCategoryRow\
  \ department_category;\nBEGIN\n  FOR outDepartmentCategoryRow IN\n    SELECT category_id,\
  \ name, description\n    FROM category\n    ORDER BY category_id\n  LOOP\n    RETURN\
  \ NEXT outDepartmentCategoryRow;\n  END LOOP;\nEND;\n$$;\n```\n\n`catalog_get_categories`简单地返回目录中的所有类别。\n\
  \n6.  使用查询工具执行以下代码，它在`hatshop`数据库中创建`product_info`类型和`catalog_get_product_info`函数：\n\
  \n```sql\n-- Create product_info type\nCREATE TYPE product_info AS\n(\n  name VARCHAR(50),\n\
  \  image VARCHAR(150),\n  thumbnail VARCHAR(150),\n  display SMALLINT\n);\n\n--\
  \ Create catalog_get_product_info function\nCREATE FUNCTION catalog_get_product_info(INTEGER)\n\
  RETURNS product_info LANGUAGE plpgsql AS $$\nDECLARE\n  inProductId ALIAS FOR $1;\n\
  \  outProductInfoRow product_info;\nBEGIN\n  SELECT INTO outProductInfoRow\n   \
  \ name, image, thumbnail, display\n  FROM product\n  WHERE product_id = inProductId;\n\
  \  RETURN outProductInfoRow;\nEND;\n$$;\n```\n\n`catalog_get_product_info`函数检索由产品\
  \ ID（`$1`）标识的产品的名称、图片和缩略图。\n\n7.  使用查询工具执行以下代码，它在`hatshop`数据库中创建`product_category_details`类型和`catalog_get_categories_for_product`函数：\n\
  \n```sql\n-- Create product_category_details type\nCREATE TYPE product_category_details\
  \ AS\n(\n  category_id INTEGER,\n  department_id INTEGER,\n  name VARCHAR(50)\n\
  );\n\n-- Create catalog_get_categories_for_product function\nCREATE FUNCTION catalog_get_categories_for_product(INTEGER)\
  \ RETURNS SETOF product_category_details LANGUAGE plpgsql AS $$\nDECLARE\n  inProductId\
  \ ALIAS FOR $1;\n  outProductCategoryDetailsRow product_category_details;\nBEGIN\n\
  \  FOR outProductCategoryDetailsRow IN\n    SELECT c.category_id, c.department_id,\
  \ c.name\n    FROM category c\n    JOIN product_category pc\n      ON c.category_id\
  \ = pc.category_id\n    WHERE pc.product_id = inProductId\n    ORDER BY category_id\n\
  \  LOOP\n    RETURN NEXT outProductCategoryDetailsRow;\n  END LOOP;\nEND;\n$$;\n\
  ```\n\n`catalog_get_categories_for_product`函数返回属于指定产品的类别列表。只返回它们的 ID 和名称，因为这是我们唯一关心的信息。\n\
  \n8.  使用查询工具执行以下代码，它在`hatshop`数据库中创建`catalog_set_product_display_option`函数：\n\n\
  ```sql\n-- Create catalog_set_product_display_option function\nCREATE FUNCTION catalog_set_product_display_option(INTEGER,\
  \ SMALLINT) RETURNS VOID LANGUAGE plpgsql AS $$\nDECLARE\n  inProductId ALIAS FOR\
  \ $1;\n  inDisplay ALIAS FOR $2;\nBEGIN\n  UPDATE product SET display = inDisplay\
  \ WHERE product_id = inProductId; END;\n$$;\n```\n\n9.  使用查询工具执行以下代码，它在`hatshop`数据库中创建`catalog_assign_product_to_category`函数：\n\
  \n```sql\n-- Create catalog_assign_product_to_category function\nCREATE FUNCTION\
  \ catalog_assign_product_to_category(INTEGER, INTEGER) RETURNS VOID LANGUAGE plpgsql\
  \ AS $$\nDECLARE\n  inProductId ALIAS FOR $1;\n```\n\n\n\n`inCategoryId` 是 `$2`\
  \ 的别名；\n\n`BEGIN`\n\n`INSERT INTO product_category (product_id, category_id)`\n\n\
  `VALUES (inProductId, inCategoryId);`\n\n`END;`\n\n`$$;`\n\n`catalog_assign_product_to_category`\
  \ 函数通过向 `product_category` 表中添加 `(product_id, category_id)` 值对，将产品与类别关联起来。\n\n**10.**\
  \ 使用查询工具执行此代码，该代码将在您的 `hatshop` 数据库中创建 `catalog_assign_product_to_category` 函数：\n\
  \n```sql\n-- 创建 catalog_move_product_to_category 函数\nCREATE FUNCTION catalog_move_product_to_category(\n\
  INTEGER, INTEGER, INTEGER)\nRETURNS VOID LANGUAGE plpgsql AS $$\nDECLARE\n  inProductId\
  \ ALIAS FOR $1;\n  inSourceCategoryId ALIAS FOR $2;\n  inTargetCategoryId ALIAS\
  \ FOR $3;\nBEGIN\n  UPDATE product_category\n  SET category_id = inTargetCategoryId\n\
  \  WHERE product_id = inProductId\n    AND category_id = inSourceCategoryId;\nEND;\n\
  $$;\n```\n\n`catalog_move_product_to_category` 函数将产品从一个类别中移除，并放置到另一个类别中。\n\n**11.**\
  \ 使用查询工具执行此代码，该代码将在您的 `hatshop` 数据库中创建 `catalog_set_image` 和 `catalog_set_thumbnail`\
  \ 函数：\n\n```sql\n-- 创建 catalog_set_image 函数\nCREATE FUNCTION catalog_set_image(INTEGER,\
  \ VARCHAR(150)) RETURNS VOID LANGUAGE plpgsql AS $$\nDECLARE\n  inProductId ALIAS\
  \ FOR $1;\n  inImage ALIAS FOR $2;\nBEGIN\n  UPDATE product SET image = inImage\
  \ WHERE product_id = inProductId;\nEND;\n$$;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00120.png)\n\n648XCH07a.qxd 10/25/06 10:56 PM 第 262 页\n\n**262**\n\n第\
  \ 7 章 ■ 目录管理\n\n```sql\n-- 创建 catalog_set_thumbnail 函数\nCREATE FUNCTION catalog_set_thumbnail(INTEGER,\
  \ VARCHAR(150)) RETURNS VOID LANGUAGE plpgsql AS $$\nDECLARE\n  inProductId ALIAS\
  \ FOR $1;\n  inThumbnail ALIAS FOR $2;\nBEGIN\n  UPDATE product\n  SET thumbnail\
  \ = inThumbnail\n  WHERE product_id = inProductId;\nEND;\n$$;\n```\n\n在上传新图片时，我们需要这些函数来更改产品的图片或缩略图名称。\n\
  \n**12.** 加载您的产品详情页面，确保一切正常工作。您需要测试许多功能！图 7-13 展示了产品详情管理页面的实际操作。\n\n**图 7-13.**\
  \ *将产品分配到新类别*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH07a.qxd\
  \ 10/25/06 10:56 PM 第 263 页\n\n第 7 章 ■ 目录管理\n\n**263**\n\n## 小结\n\n您在本章中编写了大量代码。您实现了一些组件化模板，以及它们的中层方法和数据层方法。您还学习了如何实现一个简单的身份验证方案，以便只有管理员才能访问目录管理页面。在本章的最后，您学习了如何使用\
  \ PHP 将文件从客户端上传到服务器。\n\n在下一章中，您将通过实现自定义购物车进入开发的第二阶段。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n648XCH07a.qxd 10/25/06 10:56 PM 第 264 页\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
