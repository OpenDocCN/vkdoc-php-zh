  raw: 'Similar to how we handled file uploads in our original application, the register()
    action does not actually perform the file upload logic, yet it calls a protected
    _upload() method. The _upload() method is slightly changed from our original implementation
    in that it has less flexibility before the file is uploaded and more information
    after the file is uploaded.


    The built-in CodeIgniter file upload library is actually quite powerful in terms
    of validating uploaded files and handling all the PHP required to move the files
    around in the file system. We simply need to give the field name for the file
    we want to upload, and it will figure out the rest (with a little help from initialization
    parameters).


    ■ **Note** You can learn more about the CodeIgniter File Upload class at [http://codeigniter.com/user_guide/](http://codeigniter.com/user_guide/libraries/file_uploading.html)


    [libraries/file_uploading.html.](http://codeigniter.com/user_guide/libraries/file_uploading.html)


    After the file is uploaded, we create a row in the file table, linking it to the
    user ID. Before we can use this photo on the profile page, we need to look at
    another aspect of extending CodeIgniter through third-party libraries.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 24 ■ CodEIgnITER: ExTEndIng


    Third-Party Libraries


    Similar to our framework, CodeIgniter allows third-party libraries to be placed
    in a special directory so that they can be loaded within the actions where they
    are needed. The problem is that CodeIgniter makes no effort to autoload classes,
    so it would be far easier for us to create a façade class, as shown in Listing
    24-5, to wrap Imagine thumbnail generation.


    ***Listing 24-5.*** The Thumbnail Façade Class


    require("imagine/image/imagineinterface.php");


    require("imagine/image/manipulatorinterface.php");


    require("imagine/image/imageinterface.php");


    require("imagine/image/boxinterface.php");


    require("imagine/image/box.php");


    require("imagine/gd/imagine.php");


    require("imagine/gd/image.php");


    require("imagine/image/pointinterface.php");


    require("imagine/image/point.php");


    class Thumbnail


    {


    protected $_filename;


    public function __construct($options = array())


    {


    if (isset($options["file"]))


    {


    $file = $options["file"];


    $path = dirname(BASEPATH)."/uploads";


    $width = 64;


    $height = 64;


    $name = $file->name;


    $filename = pathinfo($name, PATHINFO_FILENAME);


    $extension = pathinfo($name, PATHINFO_EXTENSION);


    if ($filename && $extension)


    {


    $thumbnail = "{$filename}-{$width}x{$height}.{$extension}";


    if (!file_exists("{$path}/{$thumbnail}"))


    {


    $imagine = new Imagine\Gd\Imagine();


    $size = new Imagine\Image\Box($width, $height);


    $mode = Imagine\Image\ImageInterface::THUMBNAIL_OUTBOUND;


    $imagine


    ->open("{$path}/{$name}")


    ->thumbnail($size, $mode)


    ->save("{$path}/{$thumbnail}");


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 24 ■ CodEIgnITER: ExTEndIng


    $this->_filename = $thumbnail;


    }


    }


    }


    public function getFilename()


    {


    return $this->_filename;


    }


    }


    The first thing you should notice about our façade class is that it requires multiple
    Imagine classes. We could create an autoloader, but manually including the Imagine
    dependencies is quicker and easier for this small thumbnail class.


    The Thumbnail class is made to work with an instance of the File class, passed
    into __construct() as a value of the associative array. We will see how to call
    this in a moment, but it is important to note that CodeIgniter’s library loader
    will automatically instantiate the Thumbnail class, so we need to make sure the
    file parameter is set before doing any image resizing.


    After we have a file row to work with, we need to get the file name and extension.
    We then construct the thumbnail file name and check whether the thumbnail has
    been created yet. If the thumbnail hasn’t already been created, we create the
    thumbnail with Imagine and, finally, we store the thumbnail’s file name in a protected
    $_filename property.'
