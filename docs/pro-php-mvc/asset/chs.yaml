  Y-m-d H:i:s\");\n            return $this->getTable()->insert($data);\n        }\n\
  \    }\n\n    public static function first($where = null)\n    {\n        $user\
  \ = new self();\n        $table = $user->getTable();\n        $query = $table->select()->limit(1);\n\
  \n        // narrow search\n        if (is_array($where))\n        {\n         \
