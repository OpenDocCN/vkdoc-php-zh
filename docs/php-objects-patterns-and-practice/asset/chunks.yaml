    ## Configuring a Host Name


    We have logged in to our new production-like development environment several times,
    so networking is more or less taken care of. Even though I’ve configured a web
    server, I’ve yet to use it. That’s because we still need to support a hostname
    for our VM. So let’s add one to `Vagrantfile`:


    ```

    config.vm.hostname = "poppch20.vagrant.internal"

    config.vm.network :private_network, ip: "192.168.33.148"

    ```


    I invent a hostname and use the `config.vm.hostname` directive to add it. I also
    configure private networking with `config.vm.network`, assigning a static IP address.
    You should use private address space for this—an unused IP address beginning with
    `192.168` should work.


    Because this is an invented hostname, we must configure our operating system to
    handle the resolution. On a Unix-like system that means editing a system file,
    `/etc/hosts`. In this case, I would add the following:


    ```

    192.168.33.148  poppch20.vagrant.internal

    ```


    Not overly onerous, but we are working towards a one-command install for our team,
    so it would be good to have a way of automating this step. Fortunately, Vagrant
    supports plug-ins, and the `hostmanager` plug-in does exactly what we need.


    You can see what plug-ins are installed with this command:


    ```

    $ vagrant plugin list

    vagrant-login (1.0.1, system)

    vagrant-share (1.1.5, system)

    ```


    To add a plug-in, you simply run the `vagrant plugin install` command:


    ```

    $ vagrant plugin install vagrant-hostmanager

    Installing the ''vagrant-hostmanager'' plugin. This can take a few minutes...

    Installed the plugin ''vagrant-hostmanager (1.8.2)''!

    ```


    Then you can explicitly tell the plug-in to update `/etc/hosts`, like this:


    ```

    $ vagrant hostmanager

    [default] Updating /etc/hosts file...

    ```


    In order to make this process automatic for our team members, we should explicitly
    enable hostmanager in `Vagrantfile`:


    ```

    config.hostmanager.enabled = true

    ```


    With the configuration changes in place, we should run `vagrant reload` in order
    to apply them. Then it’s the moment of truth! Will our system run in the browser?
    As you can see in Figure [20-2](#A314621_5_En_20_Chapter.html#Fig2), the system
    should work just fine.


    ![A314621_5_En_20_Fig2_HTML.jpg](A314621_5_En_20_Fig2_HTML.jpg)


    Figure 20-2. Accessing a configured system on a Vagrant box


    ## Wrapping It Up


    So we have gone from nothing to a fully working development environment. Given
    that it took a chapter’s worth of effort to get here, it might seem like a bit
    of a cheat to say that Vagrant is quick and easy. There are two answers to that.
    First, once you have done this a few times, it becomes a pretty simple matter
    to spin up yet another Vagrant setup—certainly much easier than trying to juggle
    multiple dependency stacks by hand.


    More importantly, though, the real speed and efficiency gain does not lie with
    the person who sets Vagrant up. Imagine a new developer coming in to your project
    expecting days'' worth of downloads, configuration file edits, and wiki-clicking.
    Imagine telling her, “Install Vagrant and VirtualBox. Check out the code. From
    the infrastructure directory, run `vagrant up`.” And that’s it! Compare that with
    some of the painful onboarding processes you have experienced or heard described.


    Of course, we’ve only scratched the surface in this chapter. As you need to configure
    Vagrant to do more for you, the official site at [https://www.vagrantup.com](https://www.vagrantup.com)
    will provide you with all the support you need.


    Table [20-1](#A314621_5_En_20_Chapter.html#Tab1) provides a quick reminder of
    the Vagrant commands we encountered in this chapter.


    Table 20-1. Some Vagrant Commands


    | Command | Description |

    | --- | --- |

    | `vagrant up` | Boot the virtual machine and provision if not yet provisioned
    |

    | `vagrant reload` | Halt the system and bring it back up |

    | `vagrant plugin list` | List the installed plug-ins |

    | `vagrant plugin install <plugin-name>` | Install a plug-in |

    | `vagrant provision` | Run the provision step again (useful if you have updated
    provision scripts) |

    | `vagrant halt` | Gracefully shut down the virtual machine |

    | `vagrant init` | Create a new `Vagrantfile` document |

    | `vagrant destroy` | Destroy the virtual machine. Don’t worry, you can always
    start again with `vagrant up`! |


    ## Summary


    In this chapter, I introduced Vagrant, the application that lets you work in a
    production-like development environment without sacrificing your authoring tools.
    I covered installation, the choosing of a distribution, and initial setup—including
    mounting your development directories. Once we had a virtual machine to play with,
    I moved on to the provisioning process—covering package installation, as well
    as database and web server configuration. Finally, I looked at hostname management,
    and I showed our system working in the browser!


    ## 21. Continuous Integration


    In previous chapters, you’ve seen a plethora of tools that are designed to support
    a well-managed project. Unit testing, documentation, build, and version control
    are all fantastically useful. But tools, and testing in particular, can be bothersome.


    Even if your tests only take a few minutes to run, you’re often too focused on
    coding to bother with them. Not only that, but you have clients and colleagues
    waiting for new features. The temptation to keep on coding is always there. But
    bugs are much easier to fix close to the time they are hatched. That’s because
    you’re more likely to know which change caused the problem and are better able
    to come up with a quick fix.


    In this chapter, I introduce Continuous Integration, a practice that automates
    test and build, and brings together the tools and techniques you’ve encountered
    in recent chapters.


    This chapter will cover these topics:


    - Defining Continuous Integration

    - Preparing a project for CI

    - Looking at Jenkins: a CI server

    - Customizing Jenkins for PHP projects with specialized plug-ins


    ### What Is Continuous Integration?


    In the bad old days, integration was something you did after you’d finished the
    fun stuff. It was also the stage at which you realized how much work you still
    had to do. Integration is the process by which all of the parts of your project
    are bundled up into packages that can be shipped and deployed. It’s not glamorous,
    and it’s actually hard.


    Integration is tied up also with QA. You can’t ship a product if it isn’t fit
    for purpose. That means tests. Lots of tests. If you haven’t been testing much
    prior to the integration stage, it probably also means nasty surprises. Lots of
    them.


    You know from Chapter [18](#A314621_5_En_18_Chapter.html) that it’s best practice
    to test early and often. You know from Chapters [15](#A314621_5_En_15_Chapter.html)
    and [19](#A314621_5_En_19_Chapter.html) that you should design with deployment
    in mind right from the start. Most of us accept that this is the ideal, but how
    often does the reality match up?'
