    **586**


    ## Advantages of the Waterfall Method


    The main advantages of the Waterfall method are its simplicity and the fact that
    everything is documented and agreed upon with the customer. This leads to some
    important benefits:


    - Because everything is planned from the start, it’s easy for the project manager
    to correctly estimate project costs and timelines.

    - The rigorous initial planning makes the project goals clear.

    - All requirements are analyzed and validated by the customer, so the customer
    can estimate the benefits incurred by the software application before it’s actually
    implemented.


    ## Disadvantages of the Waterfall Method


    The disadvantages of the Waterfall method are:


    - The customer is not able to see the product until it’s completely finished.
    At that stage, it can be very expensive to make any changes to the project.

    - It has little flexibility for scope changes during the project’s development.

    - The architecture limitations are often not discovered until late in the development
    cycle.

    - Because testing happens at the end of the Coding phase, unexpected problems
    with the code might force developers to find quick fixes at the expense of the
    planned architecture.

    - The Waterfall method doesn’t work on projects whose requirements can’t be rigorously
    planned from the start.


    ## The Spiral Method


    As a development of the Waterfall method, the Spiral method is more suitable for
    large, expensive, and complicated projects. Barry Boehm first described it in
    1988 as an iterative waterfall in which every iteration provides increased software
    capability (see Figure B-2, which represents the diagram created by Barry Boehm).


    The diagram consists of a spiral divided into four quadrants. Each quadrant represents
    a management process: Identify, Design, Construct, and Evaluate. The system goes
    through four cycles of these four processes:


    - **Proof-of-concept cycle:** Define the business goals, capture the requirements,
    develop a conceptual design, construct a “proof-of-concept,” establish test plans,
    and conduct a risk analysis. Share results with user.

    - **First-build cycle:** Derive system requirements, develop logic design, construct
    first build, and evaluate results. Share results with user.

    - **Second-build cycle:** Derive subsystem requirements, produce physical design,
    construct second build, and evaluate results. Share results with user.

    - **Final-build cycle:** Derive unit requirements, produce final design, construct
    final build, and test all levels. Seek user acceptance.


    **Figure B-2.** *The Spiral model*


    The main advantages of the Spiral method proposed by Boehm are:


    - The entire application is built on working with the client.

    - Any gaps in the Requirement phase of the Waterfall method are identified as
    work progresses.

    - The spiral representation conveys very clearly the cyclic nature of the project
    and the progression through its lifespan.


    However, the Spiral method has some disadvantages as well:


    - Requires serious discipline on the part of the client.

    - Executive control can be difficult because in most projects, the client is not
    responsible for the schedule and budget.


    > **Note:** The Spiral method is more suitable for software in which the entire
    problem is well defined from the start, such as modeling and simulating software.


    ## The Rapid Application Development (RAD) Method


    RAD is another common project-management method that is, in essence, “try before
    you buy.” Whereas in the Waterfall and even Spiral methods, the client was working
    with a lot of documentation, in the RAD approach, the client works with the software
    as it’s being developed. The belief is that the client can produce better feedback
    when working with a live system as opposed to working strictly with documentation.
    When using RAD as a project-management method, customer rejection cases are significantly
    less when going into production.


    The RAD method consists of the following phases:


    - Business modeling

    - Data modeling

    - Process modeling

    - Application generation

    - Testing and turnover


    The RAD approach allows rapid generation and change of UI features. The client
    works with the software just like in the production environment.


    The main disadvantage of RAD is that the client will always want more enhancements
    to the software—not always important ones—and the developer must try to satisfy
    the client’s needs. This can result in an unending cycle of requirements, going
    away from the main purpose of the project.


    ## Extreme Programming (XP) Methodology


    Extreme Programming (XP) is a controversial method because it eliminates a lot
    of phases from the traditional Waterfall methodology. XP, an *agile development
    methodology*, is simple and based on communication, feedback, and courage.


    > **Note:** XP is one of the agile development methodologies, but there are more.
    These methodologies try to overcome the essential problem of the Waterfall method:
    you can’t always predict the evolution of a project from the beginning. If you
    don’t have previous exposure to agile methods, I recommend you start by reading
    the great article at <http://www.martinfowler.com/articles/newMethodology.html>.


    The professional analysts are replaced with the client, who is very active in
    the process.


    The client writes a document named “User Stories,” which is a simple description
    of the desired functionality of the software. The programmers read the document
    and give an estimated time frame for implementing each functionality. After receiving
    the time estimates, the customer chooses a group of functionalities to be developed
    first. This is called an **iteration**.


    The developers use a **test-driven** design in the implementation phase, meaning
    that a testing method for the desired functionality is conceived before the code
    is actually written.


    Usually, every piece of code is written by a programmer under the supervision
    of another programmer who tests the functionality of the code.


    After the code for the entire iteration is complete, it’s then given an acceptance
    test with the customer, who approves (or disapproves) the iteration. The programmer
    keeps developing or improving code for that iteration until it passes the acceptance
    test.


    The software is deployed in a number of **releases**, composed of one or more
    iterations; the software gets to the final release when all iterations that contain
    all the functionalities described in the User Stories document pass the acceptance
    test.


