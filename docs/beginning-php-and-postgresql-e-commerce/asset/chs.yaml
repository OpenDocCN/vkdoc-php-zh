  \ B）之外，这就是您在向客户公开新完成的电子商务应用之前需要做的所有事情。\n\n## 使用 Authorize.net\n\n要使用 `Authorize.net`，您需要通过\
  \ `http://developer.authorize.net/testaccount/` 注册一个开发者测试账户。开发人员可以获取 `Authorize.net`\
  \ 集成信息的主页是 `http://developer.authorize.net/`。\n\n与 `Authorize.net` 通信的方式不同于与 `DataCash`\
  \ 通信。无需发送和接收 XML 文件，而是发送由名称-值对组成的字符串，这些名称-值对通过 & 符号分隔。实际上，您使用的语法类似于附加到 URL 的查询字符串。\n\
  \n`Authorize.net` 以包含返回值（不含名称）的字符串形式返回交易结果，这些返回值由您在初始请求时指定的字符分隔。在我们的示例中，我们将使用管道符（`|`）。返回值按预定顺序排列，其含义由它们在返回字符串中的位置决定。\n\
  \n> **注意** `Authorize.net` API 的完整文档可以在高级集成方法 (AIM) 实施指南的“非面对面交易”部分找到，网址为 `http://www.authorize.net/support/AIM_guide.pdf`。更多文档可在文档库\
  \ `http://www.authorize.net/resources/documentlibrary/` 中找到。\n\n默认交易类型为 `AUTH_CAPTURE`，即通过单个请求从信用卡中请求并扣除资金。对于\
  \ `HatShop`，我们将使用另外两种交易类型：`AUTH_ONLY`，用于检查是否有可用资金（这发生在 `PsCheckFunds` 管道阶段）；以及 `PRIOR_AUTH_CAPTURE`，用于扣除先前通过\
  \ `AUTH_ONLY` 检查过的金额（这发生在 `PsTakePayment` 管道阶段）。\n\n要执行 `AUTH_ONLY` 交易，您首先需要创建一个类似如下的数组，其中包含必要的交易数据。\n\
  \n```\n// Auth\n$transaction = array ('x_invoice_num' => '99999', // 发票号码\n    \
  \                 'x_amount' => '45.99',        // 金额\n```\n\n\n```php\n$x_card_num`\
  \ = '4007000000027', // 信用卡号\n$x_exp_date` = '1209',         // 有效期\n$x_method`\
  \ = 'CC',             // 支付方式\n$x_type` = 'AUTH_ONLY');       // 交易类型\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n648XCH15.qxd 11/15/06 6:21 PM Page 525\n\n第 15 章 ■ 信用卡交易\n\n**525**\n\n对于`PRIOR_AUTH_CAPTURE`交易，您无需再次指定所有这些信息；只需传递在`AUTH_ONLY`请求响应中返回的交易\
  \ ID 即可。\n\n```php\n// 捕获\n$transaction = array (\n    'x_ref_trans_id' => $ref_trans_id,\
  \ // 交易 ID\n    'x_method' => 'CC',                // 支付方式\n    'x_type' => 'PRIOR_AUTH_CAPTURE');\
  \ // 交易类型\n```\n\n我们将把这些数组转换为一个由键值对组成的字符串，并将其提交给`Authorize.net`服务器。响应以字符串形式返回，其值由可配置的字符分隔。在图\
  \ 15-3 中，您可以看到`AUTH_ONLY`请求（窗口左侧）和`PRIOR_AUTH_CAPTURE`请求（窗口右侧）的示例响应。\n\n在对`HatShop`进行任何修改之前，我们将编写一个使用此交易类型的简单测试。请按照练习中的步骤测试`Authorize.net`。\n\
