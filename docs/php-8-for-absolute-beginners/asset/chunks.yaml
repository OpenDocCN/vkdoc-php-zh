    \n![](img/323857_3_En_6_Fig8_HTML.jpg)\n\n一张 PhpMyAdmin 应用程序的截图，显示了在投票（Poll）表下的浏览页面中，从\
    \ SQL 查询栏输入的内容。\n\n**图 6-8**  \n更新投票表后的结果\n\n可以看到，投票表中第一行数据的 `yes` 属性已经增加到了 `1`。如果我们再次执行同样的\
    \ SQL 语句，`yes` 的值将继续增加到 `2`。请注意 `WHERE` 子句是如何限定受影响的行数的：只有 `poll_id` 为 `1` 的那一行会被更新。表中其他任何行都不会被更新，这都归功于\
    \ `WHERE` 子句。\n\n## 安全编程\n\n一条没有 `WHERE` 子句的 `UPDATE` 语句会更新投票表中所有行的 `yes` 属性。在这个例子中，表中只有一行数据，所以\
    \ `WHERE` 子句并非绝对必要。然而，你将要处理的大多数表都远不止一行数据，因此明确指出要更新的行是至关重要的。否则，可能会更新那些本不应被修改的属性，从而破坏数据库中的数据。现在我们已经掌握了一些基础的\
    \ SQL 知识，是时候为我们的数据库驱动型站点投票功能编写代码了。\n\n## 编写数据库驱动型站点投票功能\n\n显然，我们的程序需要通过 PHP 连接数据库，并利用额外的\
    \ PHP 脚本来显示网站内容。PHP 是一门非常宽容的语言，我们可以用多种方式来完成这项任务。但有些方式比另一些更具可扩展性。有些起初看似简单的方法，最终可能会让代码变得完全混乱、纠缠不清，如同意大利面条一般。让我们采用一种久经考验的代码架构方法，它可以进行扩展以适应复杂的项目。虽然这对我们简单的站点投票功能来说有些大材小用，但它给了我们一个介绍*模型-视图-控制器*（MVC）设计技术的机会。\n\
    \n## 使用 MVC 分离关注点\n\n模型-视图-控制器（MVC）设计模式是一种常见的一致化组织脚本的方法。使用一致的方法来组织脚本可以帮助你更快速、更高效地进行开发和调试。MVC\
    \ 框架建立在模型-视图-控制器所定义的基本原则之上。一旦你熟悉了基本概念，就有许多现成的 MVC 框架可用于逻辑地组织你的 PHP 项目，例如 CodeIgniter、CakePHP\
    \ 和 Yii。这些框架将有助于设计和开发更复杂的 Web 应用程序。\n\n在最基本的层面上，正如你所想，MVC 将编码关注点分为三类：模型（models）、视图（views）和控制器（controllers）。*模型*是代表数据的代码片段。你的模型还应该包含正在构建的系统中涉及的大部分逻辑。*视图*是用于可视化展示信息的代码片段。视图要显示的信息从模型接收。*控制器*是获取用户输入并向相关模型发送命令的代码片段。简而言之，MVC\
    \ 将用户交互、可视化表示与系统逻辑和数据分离开来。这使得我们可以划分大型项目：HTML 专家可以创建视图，数据库专家可以创建模型，PHP 程序员则可以创建控制器。我们还可以包含多个视图，这样代码无需任何重大改动即可同时用于\
    \ Web 和应用程序。\n\n> **注意**  \n> 您可以在 [`http://en.wikipedia.org/wiki/Model-view-controller`](http://en.wikipedia.org/wiki/Model-view-controller)\
    \ 了解更多关于 MVC 的信息。\n\n我们已经见过将代码分离为模型、视图和控制的例子。还记得我们是如何为 HTML 页面制作模板的吗？我们当时使用的就是一个包含最简\
    \ HTML 页面骨架的视图。你可以在第 4 章开始构建的图库中找到它。该视图位于 `ch4/templates/page.php`。在同一项目中，我们创建了一个与该视图相关的模型：`ch4/classes/Page_Data.class.php`，它声明了许多与\
    \ HTML 页面内容相关的方法和属性。模型和视图通过一个控制器连接起来。在 `ch4/index.php` 中，我们为模型赋值，并将模型提供给视图，最终显示了一个格式良好的\
    \ HTML5 页面。因此，`index.php` 就是我们的控制器。\n\n在本书中，目标是使用 MVC 的一个简单实现。你遇到的大多数其他 MVC 实现都可能要复杂得多。你可以轻易找到许多不适合初学者的\
    \ MVC 示例。一旦你理解了基本的 MVC 原则，并在简单的上下文中获得了使用这些原则的经验，你会发现理解更复杂的实现会容易得多。\n\n**练习：**\
    \ 既然我们已经发现之前的项目也使用了 MVC，请回到第 4 章的最后一个项目。修改文件夹名称，以指明该项目中的模型、视图和控制器。然后进行必要的代码更改（应该不多），以便在新文件夹中引用正确的文件。\n\
    \n## 规划逻辑\n\n让我们把投票功能设计得简单一些。我们将创建一个 `index.php` 来输出一个格式良好的 HTML5 页面，用于显示投票。这个\
    \ `index.php` 将作为一个*前端控制器*（front controller）。前端控制器是 MVC Web 应用程序中非常常见的设计模式。前端控制器是\
    \ Web 应用程序的单一“入口”。我们在之前的项目中已经使用过前端控制器了。还记得 `index.php` 一直是你浏览器中唯一直接加载的脚本吗？它就是一个前端控制器。\n\
    \n> **注意**  \n> 前端控制器设计模式在网上有详尽记载。你可以从 [`http://en.wikipedia.org/wiki/Front_Controller_pattern`](http://en.wikipedia.org/wiki/Front_Controller_pattern)\
    \ 开始你自己的研究。\n\n与之前的项目一样，`index.php` 将输出一个格式良好的 HTML5 页面，并加载投票控制器。投票控制器应将投票结果以\
    \ HTML 格式返回，以便在 `index.php` 上显示。请注意，每个视图都有自己专属的模型和控制器（图 6-7）。\n\n![](img/323857_3_En_6_Fig9_HTML.png)\n\
    \n一张职责分配流程图，从前端（页面）控制器开始，指向模型-视图-控制器。\n\n**图 6-9**  \n职责分配\n\n请注意投票模型、投票控制器和投票视图。这三者协同工作，以显示一个功能完整的投票功能。我们还可以看到，页面本身也有自己的模型、视图和控制器。前端控制器就是页面控制器。\n\
    \n## 创建投票项目\n\n让我们使用基本的 MVC 结构来逻辑地组织项目。首先，在我们的可执行文件夹（在 XAMPP 中是 `htdocs` 文件夹）中创建一个新文件夹\
    \ `ch6`，然后在该文件夹内再创建一个 `poll` 文件夹。接着，在 `poll` 文件夹内创建三个子文件夹：`models`（模型）、`views`（视图）和\
    \ `controllers`（控制器）。现在，我们可以将 `ch4` 中 `template` 文件夹下的 `PrivatePage.php` 程序复制到\
    \ `poll` 下的 `views` 文件夹中（并将其重命名为 `page.php`）。同时，将 `ch4 classes` 文件夹中的 `Private_Page_Data.class.php`\
    \ 程序复制到 `models` 文件夹中（并将其重命名为 `Page_Data.class.php`）。当然，你也可以从出版商的网站上下载本章的相关文件。\n\
    \n现在，让我们创建第一个版本的 `index.php` 程序来测试一切是否正常。该文件将直接放置在 `poll` 文件夹下。\n"
- fmt: "# PHP/MySQL Site Poll Example\n\n```php\nsetTitle(\"PHP/MySQL site poll example\"\
    );\n$pageData->setContent(\"Everything works so far!\");\n$pageData->appendContent(\"\
    ...and content goes here.\");\nrequire \"views/page.php\";\necho $page;\n?>\n\
    ```\n\n**Listing 6-1** `index.php`\n\nThis `index` program is just a slight modification\
    \ from the original `privateindex` program seen previously. Some content has been\
    \ removed, and the folder names and the values for title and content have changed!\
    \ Let's test it.\n\n![](images/323857_3_En_6_Chapter/323857_3_En_6_Fig10_HTML.jpg)\n\
    \nA image of admin webpage having main heading as, everything works so far exclamation\
    \ mark and subheading saying, and the content goes here.\n\n**Figure 6-10** Output\
    \ of new `index.php` program\n\nOur view has now changed. We are now looking at\
    \ this code with a model-view-controller perspective. We can see how the created\
    \ HTML page is a combination of a *view* merged with a *model*. We can see how\
    \ the *front controller* hooks up the model and the view and outputs a well-formed\
    \ HTML5 page to the browser for the user to see.\n\n## Making a Poll Controller\n\
    \nWith a nearly blank page created with its own model and view and a front controller\
    \ setup, we can prepare a file for displaying our poll example in the browser.\
    \ Sticking to the MVC approach, we will eventually need a poll model, a poll view,\
    \ and a poll controller. Let's create a bare-bones poll controller and load that\
    \ from the front controller (`index.php`). Let's create a new file, `poll.php`,\
    \ in the `controllers` folder.\n\n```php\n<?php\n$info = \"<p>Poll will show here\
    \ soon</p>\";\n?>\n```\n\n**Listing 6-2** `poll.php`\n\nNext, we will load the\
    \ poll controller from the front controller (which we will now name `pollindex.php`).\n\
    \n```php\n<?php\n$pageData = new stdClass();\n$pageData->setTitle(\"PHP/MySQL\
    \ site poll example\");\ninclude_once \"controllers/poll.php\";\n$pageData->setContent($info);\n\
    $pageData->appendContent(\"...and content goes here.\");\nrequire \"views/page.php\"\
    ;\necho $page;\n?>\n```\n\n**Listing 6-3** `pollindex.php`\n\nThis format should\
    \ look familiar, as it is very similar to the previous index examples in this\
    \ textbook.\n\n![](images/323857_3_En_6_Chapter/323857_3_En_6_Fig11_HTML.jpg)\n\
    \nA image of admin webpage saying, Poll will show here soon.\n\n**Figure 6-11**\
    \ Output from `pollindex.php`\n\nNow our front controller and poll controller\
    \ are working together to create a dynamic web page for our poll! Let's work on\
    \ our poll model next.\n\n## Making a Poll Model\n\nWith a preliminary poll controller\
    \ in place, we can develop a preliminary poll model.\n\n```php\n<?php\nclass Poll\
    \ {\n    private $poll_question = \"Are you sure?\";\n    private $yes = 0;\n\
    \    private $no = 0;\n\n    public function getPollData() {\n        return $this;\n\
    \    }\n\n    public function getPollQuestion() : string {\n        return $this->poll_question;\n\
    \    }\n\n    public function getYes() : int {\n        return $this->yes;\n \
    \   }\n\n    public function getNo() : int {\n        return $this->no;\n    }\n\
    }\n?>\n```\n\n**Listing 6-4** `Poll.class.php`\n\nThe `Poll` class defines a blueprint\
    \ for all `Poll` objects. The `Poll` class includes a method, `getPollData()`,\
    \ which returns `$this`. What does the return accomplish? The simple answer is\
    \ that it returns a *pointer* (address in memory) to the object for whatever code\
    \ calls this method. What object, there is not one in this program? Before this\
    \ method is called, an instance of this class (which we will see soon) must be\
    \ created. Once it is created, then the `getPollData()` method can be called.\
    \ At that point, an object with the contents of this class will exist in its own\
    \ space in memory. The return statement passes a reference (pointer) to the object\
    \ to the code that has called the function. This will allow the calling code to\
    \ directly access and use the object and its contents.\n\nThe `$pollData` object\
    \ has properties and get methods for `poll_question`, `yes`, and `no`. The `$pollData`\
    \ object *represents* all the content required to show a poll. In other words,\
    \ the `$pollData` *models* poll data.\n\n## Making a Poll View\n\nWe can now create\
    \ a poll view to look at our data (contained in the model we just created).\n\n\
    ```php\n<?php\necho \"\n<div>\n<h2>Poll results</h2>\n<ul>\n<li>\" . $pollData->getYes()\
    \ . \" said yes</li>\n<li>\" . $pollData->getNo() . \" said no</li>\n</ul>\n</div>\n\
    \";\n?>\n```\n\n**Listing 6-5** `poll-html.php`\n\nThis view uses the get methods\
    \ to retrieve the results of the poll (currently defaulting to zero values) and\
    \ places them into an unordered list.\n\n## Hooking Up Poll View with Poll Model\n\
    \nWith a preliminary poll model and poll view created, we can update the poll\
    \ controller to hook up model and view and, finally, show something in the browser.\n\
    \n```php\n<?php\ninclude_once \"models/Poll.class.php\";\n$poll = new Poll();\n\
    $pollData = $poll->getPollData();\ninclude_once \"views/poll-html.php\";\n?>\n\
    ```\n\n**Listing 6-6** `newpoll.php`\n\nThe `Poll` class model is included into\
    \ the controller, and an instance (`$poll`) is created. The `getPollData()` method\
    \ is called which creates the reference to the `$poll` object named `$pollData`.\
    \ We say that `$pollData` is now a pointer which points to the object. We can\
    \ now access anything in the object using `$pollData`. Finally, the `poll-html.php`\
    \ view is attached which displays the poll results. That's it! We have an MVC\
    \ poll.\n\n![](images/323857_3_En_6_Chapter/323857_3_En_6_Fig12_HTML.jpg)\n\n\
    An application output (`newpollindex.php`) shows poll results, 0 for YES and NO.\n\
    \n**Figure 6-12** Output from `newpollindex.php`\n\nPerhaps you're dying to ask\
    \ a question such as, *Why should I create three different files to show a simple\
    \ `<ul>` element?* It would be a completely justified question to ask. If all\
    \ you wanted was to show a `<ul>` element with a few hard-coded values, the MVC\
    \ approach would be complete overkill. The best approach would probably be to\
    \ write a short HTML program.\n\nThe point here is to introduce the MVC design\
    \ pattern with a very simple example, so there is no overly complex code hiding\
    \ the basic principles of MVC from your eyes. With the MVC approach, you are perfectly\
    \ set up for creating a database-driven web application. The MVC architecture\
    \ is hardly necessary for something this simple, but it can really solve some\
    \ challenges you will come across with projects of greater complexity, such as\
    \ the blogging system we will start making in the next chapter.\n\nMVC encapsulates\
    \ views from models and from controllers. That means we can change a view without\
    \ changing anything else. Imagine we didn't want a `<ul>` element for the poll.\
    \ We could simply change the HTML tags used in `views/poll-html.php` and trust\
    \ the rest of the code to run correctly. We can easily change a view without changing\
    \ anything else.\n\nSimilarly, we could change the content and still trust our\
    \ code to run as expected. It would be a simple task to set the `no` property\
    \ to 9. We would only need to change a tiny bit of code. This poll application\
    \ is built with self-contained elements.\n\n## Connecting to MySQL/MariaDB from\
    \ PHP\n\nThe MVC architecture will make it a fairly straightforward task to connect\
    \ the database and use database-driven data for the poll. Once we have established\
    \ such a connection, we can retrieve data from our database and view it with HTML.\
    \ That is the essence of an MVC database-driven website.\n\n### PHP Data Objects\
    \ (PDO)\n\nPHP provides several ways to access MySQL/MariaDB databases. In this\
    \ book, we will exclusively use PHP Data Objects (PDO). It is a very safe and\
    \ efficient way of connecting to a database from PHP. PDO supports multiple databases\
    \ and provides a uniform set of methods for handling most database interactions.\
    \ This is a great advantage for applications that have to support multiple database\
    \ types, such as PostgreSQL, Firebird, or Oracle.\n\n### Opening a Connection\n\
    \nIt is time to connect to our database. Remember that models contain all code\
    \ that retrieves data. Thus, we will create a model program to connect to our\
    \ database, and soon, a program to retrieve our database information. The following\
    \ code assumes that the database does not require a userid and password for access.\
    \ However, in production, it is essential that the database be secured with login\
    \ credentials. This requires only a simple change to update the code with the\
    \ proper userid and password.\n\n```php\n<?php\ntry {\n    $dbh = new PDO('mysql:host=localhost;dbname=bitter',\
    \ 'root', '');\n    $pageData->setContent(\"Connection succeeded!\");\n} catch\
    \ (PDOException $e) {\n    $pageData->setContent(\"Connection failed!$e\");\n\
    \    exit();\n}\n?>\n```\n\n**Listing 6-7** `database.php`"
