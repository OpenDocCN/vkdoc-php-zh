  trans: "\n■**注意** 在更复杂的系统中，你可能会为用户分配多个角色；然而，为简单起见，我们只允许每个用户拥有一个角色。任何被归类为管理员的用户也将能够执行普通成员的所有功能。此外，你也可以使用另一个表来存储用户类型，但同样为了简化，我们将放弃这种做法，而在代码中维护一个静态的用户类型列表。\n\
    \n我们在`users`表中为每个用户存储的核心数据如下：\n\n- `user_id`：用于表示用户的内部整数。\n- `username`：用于登录的唯一字符串。实际上，这将是用户的公共标识符。我们会在博客文章和其他公开内容中显示`username`，而不是他们的真实姓名，因为许多用户希望保持匿名。\n\
    - `password`：用于验证用户身份的字符串。我们将使用`md5()`函数以哈希形式存储密码。请注意，这意味着密码无法被找回，必须重新设置。我们将实现所有必要的代码来完成此操作。\n\
    - `user_type`：用于对用户进行分类的字符串（可以是`admin`或`member`，尽管根据你从本书学到的内容，未来可以轻松添加其他用户类型）。\n\
    - `ts_created`：表示用户账户创建时间的时间戳。\n- `ts_last_login`：表示用户最后登录时间的时间戳。我们允许此字段具有`null`值，因为在创建记录时用户尚未登录。\n\
    \n清单 3-1 展示了在 MySQL 中创建`users`表所需的 SQL 命令。所有 SQL 模式定义都存储在主应用目录的`schema-mysql.sql`文件中。如果你使用的是\
    \ PostgreSQL，可以在`schema-pgsql.sql`中找到相应的模式。\n\n■**注意** 选择如何为你的 Web 应用存储数据库模式完全由你决定。我这样组织只是为了让你在需要时能轻松查阅（并且在下载本书代码时也能方便地获取）。\n\
    \n**清单 3-1.** *用于在 MySQL 中创建用户表的 SQL (`schema-mysql.sql`)*\n\n```\ncreate table\
    \ users (\n  user_id serial not null,\n  username varchar(255) not null,\n  password\
    \ varchar(32) not null,\n  user_type varchar(20) not null,\n  ts_created datetime\
    \ not null,\n  ts_last_login datetime,\n  primary key (user_id),\n  unique (username)\n\
    ) type = InnoDB;\n```\n\n`user_id`列被定义为`serial`类型，这与使用`bigint unsigned not null\
    \ auto_increment`等效。我个人更喜欢使用`serial`，因为它更短、更易输入，并且在 PostgreSQL 中也能正常工作。\n\n`username`列最大长度为\
    \ 255 个字符，但我们会在代码中对此长度施加限制。`password`将以 MD5 加密字符串的形式存储，因此该列只需要 32 个字符长度。\n\n接下来是`user_type`列。该列的长度并不太重要，尽管你添加的任何新用户类型将被限制在\
    \ 20 个字符以内（这只是一个内部名称，因此不需要过于描述性）。此字符串用于执行 ACL 检查。\n\n最后是两个时间戳列。MySQL 实际上有一种名为`timestamp`的数据类型，但我选择了`datetime`类型，因为\
    \ MySQL 会自动更新使用`timestamp`类型的列。在 PostgreSQL 中，你需要改用`timestamptz`数据类型（参见`schema-pgsql.sql`文件中的表定义）。下面的“时间戳”部分提供了关于时间戳在\
    \ PHP 中如何工作的更多细节。\n\n■**提示** 清单 3-1 指示 MySQL 在创建表时使用`InnoDB`表类型，从而为我们提供 SQL 事务能力并强制外键约束。否则使用的默认表类型是`MyISAM`。\n\
    \n现在你必须在数据库中创建此表。有两种方法可以实现。首先，你可以使用以下命令将整个`schema-mysql.sql`文件通过管道导入数据库：\n\n```\n\
    # mysql -u phpweb20 -p phpweb20 < schema-mysql.sql\n```\n\n当你输入此命令时，系统会提示你输入密码。这将从头开始创建整个数据库。\n\
    \n或者，你可以直接连接到数据库，并使用以下命令复制并粘贴表模式。"
- fmt: "# mysql -u phpweb20 -p phpweb20\n\nSince we will be building on the database\
    \ as we go, I recommend the second method for simply adding each new table as\
    \ required.\n\n## Timestamps\n\nThe way dates and times are handled in PHP, MySQL,\
    \ and PostgreSQL is often misunderstood.\n\nBefore we go any further, I will quickly\
    \ cover some important points to be aware of when using dates and times in MySQL.\n\
    \nMySQL does not store time zone information with its date and time data. This\
    \ means that your MySQL server must be set to use the same time zone as PHP; otherwise\
    \ you may notice odd behavior with timestamps. For example, if you want to use\
    \ the PHP `date()` function to format a timestamp from a MySQL table, be cautious—if\
    \ you use the MySQL `unix_timestamp()` function when retrieving that timestamp,\
    \ the incorrect date will be retrieved if the time zones do not match up.\n\n\
    There are three major drawbacks to using the date field types in MySQL:\n\n- If\
    \ you need to move your database to another server (let`s say you change web hosts),\
    \ the moved data will be incorrect if the server uses a different time zone. The\
    \ server configuration would need to be modified, which most web hosts will not\
    \ do for you.\n- Various issues can arise concerning when daylight savings starts\
    \ and finishes (assuming your location uses daylight savings).\n- It is difficult\
    \ to store timestamps from different time zones. You must convert all timestamps\
    \ to the server time zone before inserting them.\n\nIf you think these aren`t\
    \ problems that will occur often, you are probably right, although here`s a practical\
    \ example. A web application I wrote stored the complete schedule for a sports\
    \ league (among other things). Week to week, all games took place in different\
    \ cities, and therefore in different time zones. For accurate scheduling data\
    \ to be output on the web application (for instance, \"3 hours until game time\"\
    ), the time zone data needed to be accurate.\n\nPostgreSQL does not have the `datetime`\
    \ data type. Instead, I prefer to use the `timestamptz` column, which stores a\
    \ date, time, and time zone. If you don`t specify the time zone when inserting\
    \ a value into this column, it uses the server`s time zone (for instance, both\
    \ `2007-04-18 23:32:00` and `2007-04-18 23:32:00+09:30` are valid; the former\
    \ will use the server`s time zone and the latter will use `+09:30`).\n\nIn the\
    \ sports schedule example, I used PostgreSQL, which allowed me to easily store\
    \ the time zone of the game. PostgreSQL`s equivalent of `unix_timestamp(ts_column)`\
    \ is `extract(epoch from ts_column)`. Using `timestamptz`, this returns an accurate\
    \ value that can be used in PHP`s `date()` function. It also seamlessly deals\
    \ with daylight savings.\n\n## User Profiles\n\nYou may have noticed that the\
    \ `users` table (Listing 3-1) didn`t store any useful information about the user,\
    \ such as their name or e-mail address. To store this data, we will create an\
    \ extra table called `users_profile`.\n\nBy using an extra table to store this\
    \ information, we can easily store an arbitrary amount of information about the\
    \ user without modifying the `users` table at all. For instance, we can store\
    \ their name, e-mail address, phone number, location, favorite food, or anything\
    \ else.\n\nAdditionally, we can use this table to store preferences for each user.\n\
    \nEach record in the `users_profile` table corresponds to a single user profile\
    \ value. That is, one record will correspond to a user`s e-mail address, while\
    \ another record will hold their name. There is slightly more overhead in retrieving\
    \ this data at runtime, but the added flexibility makes it well worth it. All\
    \ that is required in this table is three columns:\n\n- `user_id`: This column\
    \ links the profile value to a record in `users`.\n- `profile_key`: This is the\
    \ name of the profile value. For instance, we would use the value `email` here\
    \ if the record holds an e-mail address.\n- `profile_value`: This is the actual\
    \ profile value. If the `profile_key` value is `email`, this column would hold\
    \ the actual e-mail address.\n\n**Tip:** We use the `text` field type for `profile_value`\
    \ because this allows us to store a large amount of data if required. There is\
    \ no difference in performance between the `varchar` and `text` types in MySQL\
    \ and PostgreSQL. In fact, MySQL internally creates a `varchar` field as the smallest\
    \ possible `text` field based on the specified precision.\n\nListing 3-2 shows\
    \ the MySQL table definition for `users_profile`. We will implement code to manage\
    \ user profiles later in this chapter.\n\n**Listing 3-2.** SQL Used to Create\
    \ the `users_profile` Table in MySQL (schema-mysql.sql)\n\n```sql\ncreate table\
    \ users_profile (\n  user_id bigint unsigned not null,\n  profile_key varchar(255)\
    \ not null,\n  profile_value text not null,\n  primary key (user_id, profile_key),\n\
    \  foreign key (user_id) references users (user_id)\n) type = InnoDB;\n```\n\n\
    As mentioned previously, the `serial` column type (used for the `user_id` column\
    \ in Listing 3-1) is an alias for an auto-incrementing unsigned `bigint` column.\
    \ Since the `user_id` column in this table refers back to the `users` table, we\
    \ manually use the `bigint unsigned` type because we don`t want this column to\
    \ auto-increment.\n\nWe use the `user_id` and `profile_key` columns as the primary\
    \ key for the `users_profile` table, as no profile values can be repeated for\
    \ each user. However, a user can have several different profile values.\n\n**Note:**\
    \ If you`re using PostgreSQL, the `int` data type is used for `user_id`, as this\
    \ is what the PostgreSQL `serial` type uses. Once again, the PostgreSQL version\
    \ of the table can be found in `schema-pgsql.sql`.\n\n## Introduction to Zend_Auth\n\
    \nNow that we`ve created the `users` table, we have something to authenticate\
    \ against using `Zend_Auth`. Before we get to that, though, we must understand\
    \ exactly how `Zend_Auth` works.\n\nFirst, we must understand the terminology\
    \ `Zend_Auth` uses. The unique information that identifies a user is referred\
    \ to as their *identity*. After a user successfully authenticates, we store their\
    \ identity in a PHP session so we can identify them in subsequent page requests.\n\
    \n**Note:** It is possible to write custom storage methods, but the most common\
    \ storage method will arguably be in a PHP session. `Zend_Auth` provides the `Zend_Auth_Storage_Session`\
    \ class for this. This class, in turn, uses the `Zend_Session` component, which\
    \ is essentially a wrapper to PHP`s `$_SESSION` variable (although it does provide\
    \ greater functionality). To create some other storage method, you simply implement\
    \ the `Zend_Auth_Storage_Interface` interface. For example, if you wanted to \"\
    remember a user\" in between sessions, you could create a storage class that writes\
    \ identity data to a cookie. You would then create an adapter (discussed shortly)\
    \ to authenticate against cookie data. Be careful with this though, as it could\
    \ potentially be dangerous if done incorrectly, since cookie data can be forged.\
    \ One safeguard against this could be to give them a restricted role until they\
    \ provide their credentials again, as Amazon.com does: it will remember your identity\
    \ but not allow you to make any changes to your account unless you re-enter your\
    \ password. Another example of using custom session storage is in a load-balanced\
    \ environment (where multiple web servers are used for a single site). Disk-based\
    \ sessions will not typically be available across all servers, so a subsequent\
    \ user request may be handled on a different server than the previous request.\
    \ Storing session data in the database alleviates this problem.\n\nIn order to\
    \ authenticate a user, they must provide *credentials*. In the case of the application\
    \ we are writing, we will use the `password` column from the `users` table as\
    \ the user`s credentials.\n\nWe use an *adapter* to check the given identity and\
    \ credentials against our database.\n\nAdapters in `Zend_Auth` implement the `Zend_Auth_Adapter_Interface`\
    \ interface. Thankfully, the Zend Framework comes with an adapter that we can\
    \ use to check our MySQL database. If we wanted to authenticate users against\
    \ a different storage method (such as LDAP or a password file generated by Apache`s\
    \ htpasswd), we would need to write a new adapter.\n\nWe will be using the `Zend_Auth_Adapter_DbTable`\
    \ adapter, which is designed to work with the `Zend_Db` component. If you choose\
    \ instead to write your own adapter, the only method you need to implement is\
    \ the `authenticate()` method, which returns a `Zend_Auth_Result` object. This\
    \ object contains information about whether authentication was successful, as\
    \ well as diagnostic messages (such as whether the provided credentials were incorrect,\
    \ or authentication failed because the identity wasn`t found or for some other\
    \ reason).\n\nBy default, `Zend_Auth_Adapter_DbTable` returns only the submitted\
    \ username in the `Zend_Auth_Result` object. However, we need to store additional\
    \ information about the user (such as their name and, more importantly, their\
    \ user type). When we look at processing user logins with `Zend_Auth`, we will\
    \ deal with this.\n\n### Instantiating Zend_Auth\n\n`Zend_Auth` is a singleton\
    \ class, which means only one instance of it can exist (like the `Zend_Controller_Front`\
    \ class we used in Chapter 2). As such, we can use the static `getInstance()`\
    \ method to retrieve that instance. We must then set the storage class (remember,\
    \ we are using sessions) using the `setStorage()` method. If you use multiple\
    \ storage methods, you will need to call this every time you want to access identity\
    \ data in each storage location. Typically though, you will only need to call\
    \ this once: at the start of each request.\n\nThe following code is used to set\
    \ up the `Zend_Auth` instance. As you can see, it is fairly straightforward in\
    \ its initial usage:\n\n```php\n<?php\n$auth = Zend_Auth::getInstance();\n$auth->setStorage(new\
    \ Zend_Auth_Storage_Session());\n?>\n```\n\nWe will be using the `$auth` object\
    \ in several places in our web application. First, it will be used when we check\
    \ user permissions with `Zend_Acl` (in the \"Introduction to Zend_Acl\" section\
    \ later in this chapter). It will also be used in application login and logout\
    \ methods, as we need to store and then clear the identity data for each of these\
    \ methods.\n\nAs we did with our application configuration and database connection,\
    \ we will store the `$auth` object in the application registry using `Zend_Registry`.\
    \ Listing 3-3 shows the `index.php` bootstrap file as it stands with `Zend_Auth`.\n\
    \n**Listing 3-3.** The Application Bootstrap File, Now Using `Zend_Auth` (index.php)\n\
    \n```php\n<?php\nrequire_once('Zend/Loader.php');\nZend_Loader::registerAutoload();\n\
    \n// load the application configuration\n$config = new Zend_Config_Ini('../settings.ini',\
    \ 'development');\nZend_Registry::set('config', $config);\n\n// create the application\
    \ logger\n$logger = new Zend_Log(new Zend_Log_Writer_Stream($config->logging->file));\n\
    Zend_Registry::set('logger', $logger);\n\n// connect to the database\n$params\
    \ = array('host' => $config->database->hostname,\n                'username' =>\
    \ $config->database->username,\n                'password' => $config->database->password,\n\
    \                'dbname' => $config->database->database);\n$db = Zend_Db::factory($config->database->type,\
    \ $params);\nZend_Registry::set('db', $db);\n\n// setup application authentication\n\
    $auth = Zend_Auth::getInstance();\n$auth->setStorage(new Zend_Auth_Storage_Session());\n\
    \n// handle the user request\n$controller = Zend_Controller_Front::getInstance();\n\
    $controller->setControllerDirectory($config->paths->base .\n                 \
    \                   '/include/Controllers');\n$controller->registerPlugin(new\
    \ CustomControllerAclManager($auth));\n\n// setup the view renderer\n$vr = new\
    \ Zend_Controller_Action_Helper_ViewRenderer();\n$vr->setView(new Templater());\n\
    $vr->setViewSuffix('tpl');\nZend_Controller_Action_HelperBroker::addHelper($vr);\n\
    \n$controller->dispatch();\n?>\n```\n\n### Authenticating with Zend_Auth\n\nIn\
    \ Chapter 4 we will be implementing the login and logout forms for our web application,\
    \ but before we get to that we will take a look at how the login and logout process\
    \ actually work. As mentioned previously, we will be using the `Zend_Auth_Adapter_DbTable`\
    \ authentication adapter. Prior to using this adapter, you must already have a\
    \ valid `Zend_Db` object.\n\nBecause `Zend_Auth_Adapter_DbTable` is flexible and\
    \ is designed to work with any database configuration, you must tell it how your\
    \ storage is set up. Thus, you must include the following when instantiating it:\n\
    \n- The name of the database table being used (our table is called `users`).\n\
    - The column that holds the user identity (we are using the `username` column\
    \ in the `users` table).\n- The column that holds the user credentials (we are\
    \ using the `password` column).\n- And finally, the *treatment* used on the credentials.\
    \ This is essentially a function that (if specified) wraps around the credentials.\
    \ Remember that we are storing an MD5 hash of the password in the `password` column.\
    \ Therefore, we pass `md5(?)` as this final argument. The question mark tells\
    \ `Zend_Db` where to substitute in the password value.\n\nOnce `Zend_Auth_Adapter_DbTable`\
    \ is instantiated (we will use the variable name `$adapter`), we can set the identity\
    \ (username) and credentials (password). To do this, we use `setIdentity()` and\
    \ `setCredential()`.\n\nNext, we will call the `authenticate()` method on the\
    \ `$auth` object (the instance of `Zend_Auth`). The single argument passed to\
    \ `authenticate()` is the adapter (`$adapter`). An instance of `Zend_Auth_Result`\
    \ is then returned. We can call `isValid()` on this object to see whether the\
    \ user successfully authenticated. If they didn`t, we can either call `getMessages()`\
    \ on the result to determine why, or we can generate our own error message based\
    \ on the result from `getCode()`.\n\n**Note:** Although `Zend_Auth_Result` allows\
    \ us to easily distinguish between an invalid username and an invalid password,\
    \ this typically isn`t information you should present to the user. Doing so can\
    \ implicitly let them know when a username exists or not, which can aid malicious\
    \ users in gaining unauthorized access to your application. The example in Listing\
    \ 3-4 differentiates between these errors purely to demonstrate how you can detect\
    \ them. The code we add to our application will not inform users whether it was\
    \ their username or their password that was incorrect.\n\nListing 3-4 shows the\
    \ code used to instantiate `Zend_Auth_Adapter_DbTable` and to authenticate against\
    \ the `users` table. At this stage, we are simply providing a fake username and\
    \ password, as we haven`t yet populated the `users` table. As you can see, we\
    \ also handle authentication errors and output a message indicating the reason\
    \ for failure.\n\n**Listing 3-4.** Authenticating Against a Database Table Using\
    \ `Zend_Auth` and `Zend_Db` (listing-3-4.php)\n\n```php\n<?php\nrequire_once('Zend/Loader.php');\n\
    Zend_Loader::registerAutoload();\n\n// connect to the database\n$params = array('host'\
    \ => 'localhost',\n                'username' => 'phpweb20',\n               \
    \ 'password' => 'myPassword',\n                'dbname' => 'phpweb20');\n$db =\
    \ Zend_Db::factory('pdo_mysql', $params);\n\n// setup application authentication\n\
    $auth = Zend_Auth::getInstance();\n$auth->setStorage(new Zend_Auth_Storage_Session());\n\
    \n$adapter = new Zend_Auth_Adapter_DbTable($db,\n                            \
    \              'users',\n                                          'username',\n\
    \                                          'password',\n                     \
    \                     'md5(?)');\n\n// try and login the \"fakeUsername\" user\n\
    $adapter->setIdentity('fakeUsername');\n$adapter->setCredential('fakePassword');\n\
    \n$result = $auth->authenticate($adapter);\n\nif ($result->isValid()) {\n  //\
    \ user successfully authenticated\n} else {\n  // user not authenticated\n  switch\
    \ ($result->getCode()) {\n    case Zend_Auth_Result::FAILURE_IDENTITY_NOT_FOUND:\n\
    \      echo 'Identity not found';\n      break;\n    case Zend_Auth_Result::FAILURE_IDENTITY_AMBIGUOUS:\n\
    \      echo 'Multiple users found with this identity!';\n      break;\n    case\
    \ Zend_Auth_Result::FAILURE_CREDENTIAL_INVALID:\n      echo 'Invalid password';\n\
    \      break;\n    default:\n      var_dump($result->getMessages());\n  }\n}\n\
    ?>\n```\n\nYou can also check whether or not a user is authenticated using the\
    \ `$auth` object. The `hasIdentity()` method indicates whether or not a user is\
    \ authenticated. Then, to determine which user that is, you can use the `getIdentity()`\
    \ method.\n\nSimilarly, you can use the `clearIdentity()` method to log a user\
    \ out. If you are using sessions as the storage method, this effectively unsets\
    \ the identity from the session.\n\nAs mentioned previously, when `$auth->authenticate()`\
    \ succeeds using `Zend_Auth_Adapter_DbTable`, only the username is stored for\
    \ the identity data. In Chapter 4, when we implement the user login form, we will\
    \ alter the identity data to include other user details, such as the user type.\n\
    \n## Introduction to Zend_Acl\n\n`Zend_Acl` is a component of the Zend Framework\
    \ that provides access control list (ACL) functionality. While it doesn`t fundamentally\
    \ require the use of `Zend_Auth`, we will combine these two components to control\
    \ what users can and cannot do in our web application.\n\nEssentially what `Zend_Acl`\
    \ does is determine whether a *role* has sufficient privileges to access a *resource*.\n\
    \n- **Resource:** Some object (not an object in the OOP sense, just some \"thing\"\
    ) in a web application to which access can be controlled. An example of a resource\
    \ is an action in a web application, such as approving the content of an article\
    \ before it is published, or deleting a user from the system. Additionally, you\
    \ can provide finer-grained control over privileges to resources. So, in the example\
    \ of approving an article, the resource would be the article-management system\
    \ (or a particular article, depending on how you look at it), while the privilege\
    \ would be the `approve` action.\n\n- **Role:** Some object that requests access\
    \ to resources. In our web application, a role refers to a user of certain privileges.\n\
    \nAlthough this language might be somewhat confusing, each user in our application\
    \ (that is, each record in the `users` table) has a particular user type. We refer\
    \ to this as a user`s role.\n\n**Note:** It is possible to make a role or a resource\
    \ inherit from another role or resource, respectively. For example, let`s say\
    \ you assign certain privileges to Role A. If you make Role B inherit from Role\
    \ A, it will get all of the privileges that Role A has, in addition to any extra\
    \ privileges you add to Role B. This can make your permissions system confusing\
    \ (especially when inheriting from more than one other role or resource), so we\
    \ will try to keep it as simple as possible in our application.\n\nWe will control\
    \ access to particular resources (such as publishing a blog post or resetting\
    \ a password) based on a user`s role. As mentioned when creating the `users` table,\
    \ the three types of users (the three user roles) will be `guest`, `member`, and\
    \ `administrator`.\n\nThe typical flow for using `Zend_Acl` in a web application\
    \ is as follows:\n\n1. Instantiate the `Zend_Acl` class (let`s call this object\
    \ `$acl`).\n2. Add one or more roles to `$acl` using the `addRole()` method.\n\
    3. Add resources to `$acl` using the `add()` method.\n4. Add the full list of\
    \ privileges for each role (that is, use `allow()` or `deny()` to indicate which\
    \ resources roles have access to).\n5. Use the `isAllowed()` method on `$acl`\
    \ to determine whether a particular role has access to a particular resource/privilege\
    \ combination.\n6. Repeat step 5 as often as necessary while the script executes.\n\
    \n### A Zend_Acl Example\n\nLet`s take a look at actually using the `Zend_Acl`\
    \ class. In this example, I will use the role names we will be using in our application.\
    \ The privileges I set up here should give you an idea of exactly what we will\
    \ be doing when we integrate `Zend_Acl` into our application.\n\nThe first thing\
    \ I need to do to manage and check permissions is to instantiate the `Zend_Acl`\
    \ class. The constructor takes no arguments:\n\n```php\n$acl = new Zend_Acl();\n\
    ```\n\nNext, I create each of the roles that I`m checking permissions for. As\
    \ mentioned previously, we will be using three different roles: `guest`, `member`,\
    \ and `administrator`.\n\n```php\n$acl->addRole(new Zend_Acl_Role('guest'));\n\
    $acl->addRole(new Zend_Acl_Role('member'));\n$acl->addRole(new Zend_Acl_Role('administrator'));\n\
    ```\n\nAfter creating the roles, I can create the resources. In fact, I could\
    \ swap the order; the key thing is that both roles and resources must be added\
    \ before defining or checking permissions.\n\nFor this example, I will only add\
    \ `account` and `admin` as the resources that will be granted permissions. There\
    \ will be other resources in our application, but only items that will be granted\
    \ permissions need to be added here, because when checking permissions, we check\
    \ for the existence of the requested resource. It`s up to you as the developer\
    \ how you handle a permissions check for a nonexistent resource. In this case,\
    \ I will simply allow access to a requested resource if it hasn`t been added to\
    \ `$acl`.\n\n```php\n$acl->add(new Zend_Acl_Resource('account'));\n$acl->add(new\
    \ Zend_Acl_Resource('admin'));\n```\n\nThe next step is to define the different\
    \ permissions required in the application. This is achieved by making a series\
    \ of calls to `allow()` and `deny()` on the `Zend_Acl` instance. The first argument\
    \ to this function is the role, and the second is the resource. You can add finer-grained\
    \ control by specifying the third parameter (the permission name).\n\nIn the permissions\
    \ system for our application, the name of the controller (in the context of `Zend_Controller`)\
    \ is the resource, while the controller action is the permission name. As in the\
    \ following example, we can allow or deny access to an entire controller (as we\
    \ will do for `guest` in the `admin` controller), or we can open up one or two\
    \ specific actions within a controller (as we will do for the `login` and `fetchpassword`\
    \ actions for `guest`).\n\n```php\n$acl->allow('guest');                   //\
    \ allow guests everywhere ...\n$acl->deny('guest', 'admin');           // ...\
    \ except in the admin section ...\n$acl->deny('guest', 'account');         //\
    \ ... and the account management section\n$acl->allow('guest', 'account',    \
    \     // ... although let them log in\n            array('login', 'fetchpassword'));\n\
    ```\n\nIn addition to defining what guests can do, I also want to define what\
    \ members are allowed to do. Members are privileged users, so I allow them more\
    \ access than guests:\n\n```php\n$acl->allow('member');                  // members\
    \ can go everywhere ...\n$acl->deny('member', 'admin');          // ... except\
    \ for the site admin section\n```\n\nNext I define the permissions for administrators,\
    \ who are even more privileged than members:\n\n```php\n$acl->allow('administrator');\
    \           // administrators can go everywhere!\n```\n\nOnce all the permissions\
    \ have been defined, they can be queried to determine what can and can`t be accessed.\
    \ Here are some examples:\n\n```php\n// check permissions\n$acl->isAllowed('guest',\
    \ 'account');                       // returns false\n$acl->isAllowed('guest',\
    \ 'account', 'login');              // true\n$acl->isAllowed('member', 'account');\
    \                      // true\n$acl->isAllowed('member', 'account', 'login');\
    \              // true\n$acl->isAllowed('member', 'admin');                  \
    \      // false\n$acl->isAllowed('administrator', 'admin');                 //\
    \ true\n```\n\nNote that in our application the role names will be dynamically\
    \ determined based on the user that is logged in, and the resource and permission\
    \ names will be determined by the requested controller and action.\n\nRealistically,\
    \ the call to `isAllowed()` will be in an `if` statement, such as this:\n\n```php\n\
    <?php\nif ($acl->isAllowed('member', 'account')) {\n  // display member account\
    \ area\n}\n?>\n```\n\n**Tip:** If you try to check the permissions of an undefined\
    \ resource, an exception will be thrown. It is up to you how you want to handle\
    \ this. For example, you may choose to automatically deny the request, or you\
    \ may choose to automatically allow it. Another option could be to fall back to\
    \ a different resource if the given resource is not found; the `has()` function\
    \ is used to check the existence of a resource. The same principle applies to\
    \ roles. In our application, a user will fall back to `guest` if their role is\
    \ not found (this would result from a bogus value in the `user_type` column of\
    \ the `users` table).\n\nOur actual permissions system will be almost identical\
    \ to this example, in that members can access the `account` resource, while guests\
    \ cannot, and administrators can access all areas.\n\n**Note:** The code uses\
    \ both the term `admin` and `administrator`. The user type (that is, the role)\
    \ is called `administrator`, while the controller (that is, the resource) is called\
    \ `admin`. In other words, only users of type `administrator` will be able to\
    \ access the `http://phpweb20/admin` URL.\n\n## Combining Zend_Auth, Zend_Acl,\
    \ and Zend_Controller_Front\n\nThe next step in developing our web application\
    \ is to integrate the `Zend_Auth` and `Zend_Acl` components. In this section,\
    \ we will change the behavior of the application controller (that is, the instance\
    \ of `Zend_Controller_Front`), to check permissions using `Zend_Acl` prior to\
    \ dispatching a user`s request. When checking permissions, we will use the identity\
    \ stored with `Zend_Auth` to determine the role of the current user.\n\nTo control\
    \ permissions, we will treat each controller as a resource, and treat the action\
    \ handlers in these controllers as the permissions associated with the resource.\
    \ For instance, later in this chapter we will create the `AccountController.php`\
    \ file, which is used to control everything relating to user accounts (such as\
    \ logging in, logging out, fetching passwords, and updating user details). The\
    \ `AccountController` controller will be the resource for `Zend_Acl`, while the\
    \ privileges associated with this resource are the actions just mentioned (`login`,\
    \ `logout`, `fetchpassword`, `update` details).\n\n**Note:** There are many ways\
    \ to structure a permissions system. In this application, we will simply control\
    \ access to action handlers in controller files. This is relatively straightforward,\
    \ as we can automate all ACL checks dynamically based on the action and controller\
    \ name in a user request.\n\nThe way we achieve this setup of using controller\
    \ and action names to dictate permissions is to write a plug-in for `Zend_Controller`\
    \ (by extending the `Zend_Controller_Plugin_Abstract` class). This plug-in defines\
    \ the `preDispatch()` method, which receives a user request before the front controller\
    \ dispatches the request to the respective action. Effectively, we are intercepting\
    \ the request and checking whether the current user has sufficient privileges\
    \ to execute that action.\n\nTo register a plug-in with `Zend_Controller`, we\
    \ call the `registerPlugin()` method on our `Zend_Controller_Front` instance.\
    \ Before we do that, let`s create the plug-in, which we will call `CustomControllerAclManager`.\
    \ We will create all roles and resources for `Zend_Acl` in this class, as well\
    \ as checking permissions.\n\nListing 3-5 shows the contents of the `CustomControllerAclManager.php`\
    \ file, which we will store in the `/var/www/phpweb20/include` directory.\n\n\
    **Listing 3-5.** The `CustomControllerAclManager` Plug-in, Which Checks Permissions\
    \ Prior to Dispatching User Requests (`CustomControllerAclManager.php`)\n\n```php\n\
    <?php\nclass CustomControllerAclManager extends Zend_Controller_Plugin_Abstract\n\
    {\n  // default user role if not logged or (or invalid role found)\n  private\
    \ $_defaultRole = 'guest';\n\n  // the action to dispatch if a user doesn't have\
    \ sufficient privileges\n  private $_authController = array('controller' => 'account',\n\
    \                                   'action' => 'login');\n\n  public function\
    \ __construct(Zend_Auth $auth)\n  {\n    $this->auth = $auth;\n    $this->acl\
    \ = new Zend_Acl();\n\n    // add the different user roles\n    $this->acl->addRole(new\
    \ Zend_Acl_Role($this->_defaultRole));\n    $this->acl->addRole(new Zend_Acl_Role('member'));\n\
    \    $this->acl->addRole(new Zend_Acl_Role('administrator'), 'member');\n\n  \
    \  // add the resources we want to have control over\n    $this->acl->add(new\
    \ Zend_Acl_Resource('account'));\n    $this->acl->add(new Zend_Acl_Resource('admin'));\n\
    \n    // allow access to everything for all users by default\n    // except for\
    \ the account management and administration areas\n    $this->acl->allow();\n\
    \    $this->acl->deny(null, 'account');\n    $this->acl->deny(null, 'admin');\n\
    \n    // add an exception so guests can log in or register\n    // in order to\
    \ gain privilege\n    $this->acl->allow('guest', 'account', array('login',\n \
    \                                               'fetchpassword',\n           \
    \                                     'register',\n                          \
    \                      'registercomplete'));\n\n    // allow members access to\
    \ the account management area\n    $this->acl->allow('member', 'account');\n\n\
    \    // allows administrators access to the admin area\n    $this->acl->allow('administrator',\
    \ 'admin');\n  }\n\n  /**\n   * preDispatch\n   *\n   * Before an action is dispatched,\
    \ check if the current user\n   * has sufficient privileges. If not, dispatch\
    \ the default\n   * action instead\n   *\n   * @param Zend_Controller_Request_Abstract\
    \ $request\n   */\n  public function preDispatch(Zend_Controller_Request_Abstract\
    \ $request)\n  {\n    // check if a user is logged in and has a valid role,\n\
    \    // otherwise, assign them the default role (guest)\n    if ($this->auth->hasIdentity())\n\
    \      $role = $this->auth->getIdentity()->user_type;\n    else\n      $role =\
    \ $this->_defaultRole;\n\n    if (!$this->acl->hasRole($role))\n      $role =\
    \ $this->_defaultRole;\n\n    // the ACL resource is the requested controller\
    \ name\n    $resource = $request->controller;\n\n    // the ACL privilege is the\
    \ requested action name\n    $privilege = $request->action;\n\n    // if we haven't\
    \ explicitly added the resource, check\n    // the default global permissions\n\
    \    if (!$this->acl->has($resource))\n      $resource = null;\n\n    // access\
    \ denied - reroute the request to the default action handler\n    if (!$this->acl->isAllowed($role,\
    \ $resource, $privilege)) {\n      $request->setControllerName($this->_authController['controller']);\n\
    \      $request->setActionName($this->_authController['action']);\n    }\n  }\n\
    }\n?>\n```\n\nThe class constructor is where we define roles, resources, and permissions.\
    \ In Listing 3-5 we first make the `administrator` role inherit from the `member`\
    \ role. This means that any permission given to members is also given to administrators.\
    \ Additionally, we can then give the `administrator` role privileges on its own\
    \ to access the `admin` area.\n\nNext, we set up the default permissions (that\
    \ is, permissions that apply to all roles). These allow access to everything except\
    \ for the `account` and `admin` resources. Obviously, a guest needs the chance\
    \ to authenticate themselves and become a privileged user, so we must open up\
    \ access to the `login` and `fetchpassword` privileges. Additionally, if they\
    \ are not yet registered, we need to grant them access to `register` and `registercomplete`\
    \ (a helper action used to confirm registration to a user).\n\nOnce a guest becomes\
    \ authenticated (thereby becoming either a `member` or an `administrator`), they\
    \ need to be able to access the `account` resource. Since the `administrator`\
    \ role inherits from the `member` role, permitting members access to the `account`\
    \ resource also gives access to administrators.\n\nFinally, we open up the `admin`\
    \ areas to administrators only. In other words, guests and members cannot access\
    \ this area.\n\nNow, let`s take a look at the `preDispatch()` method, which takes\
    \ the user request as an argument. First, we set up the role and resource so the\
    \ ACL check will work correctly. If the resource is not found, we set the `$resource`\
    \ variable to `null`, which means the default permission will be used for the\
    \ given role. Based on the way we have set this up (that is, allowing access to\
    \ everything), this effectively means the ACL check will return `true`. If the\
    \ role is not found, we use the `guest` role instead.\n\n**Note:** We are accessing\
    \ the `user_type` property of the identity stored with `Zend_Auth`. We haven`t\
    \ yet looked at storing this property with the identity when performing a login,\
    \ but we will cover this in Chapter 4, when we implement the login action to our\
    \ account controller.\n\nFinally, we call `isAllowed()` to determine whether the\
    \ `$role` role has access to the `$privilege` privilege of resource `$resource`.\
    \ If this returns `true`, we do nothing and let the front controller dispatch\
    \ loop continue. If this returns `false`, we reroute the dispatcher to execute\
    \ the `login` action of the `account` controller. In other words, when an unprivileged\
    \ user tries to do something they are not allowed to do, they will be redirected\
    \ to a login screen.\n\n**Note:** One side effect of this behavior is that if\
    \ a member tries to access the `admin` area, they will be shown a login screen,\
    \ even though they are already logged in. You could modify the code to show the\
    \ login screen if no identity is found in `$auth`, but show a different screen\
    \ if the user is logged in but has insufficient privileges.\n\n## Managing User\
    \ Records with DatabaseObject\n\n`DatabaseObject` is a class I developed several\
    \ years ago that I make heavy use of in nearly all of my PHP development tasks.\
    \ It acts as an extra layer on top of a database connection, which makes reading,\
    \ writing, and deleting rows from a database very simple. You can find the full\
    \ `DatabaseObject.php` file in the `./include` directory of the downloadable source\
    \ code.\n\nEssentially, I extend the abstract `DatabaseObject` class for each\
    \ major table in an application. So to manage records in the `users` table of\
    \ our web application, we will create a class called `DatabaseObject_User`. Once\
    \ we instantiate this class, we can then call the `load()` method to fetch a record\
    \ from the database, use the `save()` method to either insert or update data in\
    \ the database (depending on whether or not a record has already been loaded),\
    \ and call `delete()` to delete a loaded record.\n\n**Note:** When I first wrote\
    \ `DatabaseObject`, neither PHP 5 nor the Zend Framework were out yet, but I have\
    \ since updated this class to use PHP 5 and to work with the `Zend_Db` component.\
    \ If you are not using `Zend_Db`, you will have to make appropriate changes.\n\
    \nInstead of looking at the implementation details, we will take a look at the\
    \ available functions and exactly how `DatabaseObject` can be used:\n\n- `load()`:\
    \ Loads a record by performing a `select` query. Returns `true` if the record\
    \ is loaded.\n- `isSaved()`: Returns `true` if a record has previously been loaded\
    \ with `load()`.\n- `save()`: Saves the current data to the database. If the record\
    \ wasn`t previously loaded, an `insert` statement is used; otherwise the loaded\
    \ record is updated with an SQL `update`.\n- `delete()`: If a record has been\
    \ loaded, this function performs an SQL `delete` query.\n- `getId()`: Retrieves\
    \ the database ID of a saved record.\n\nThere are also a number of callbacks you\
    \ can define, which are automatically called as required. The callbacks that can\
    \ be defined are as follows:\n\n- `postLoad()`: Called after a record is successfully\
    \ loaded. It could be used to load data from other tables as required.\n- `preInsert()`:\
    \ Called prior to inserting a new record (note that in this case `save()` distinguishes\
    \ inserts from updates). It could be used to set values dynamically (such as a\
    \ timestamp recording the date of insert).\n- `postInsert()`: Called after a new\
    \ record is saved. In the case of our `users` table, we will use this to send\
