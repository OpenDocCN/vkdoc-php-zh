    \ one for the current date and time and the other for December 25, 2019. Using\
    \ the format characters from Table [16-4](#332054_4_En_16_Chapter.xhtml#Tab4),\
    \ various date parts are extracted from the two objects, producing the output\
    \ shown in the following screenshot:  \n![../images/332054_4_En_16_Chapter/332054_4_En_16_Figa_HTML.jpg](images/332054_4_En_16_Chapter/332054_4_En_16_Figa_HTML.jpg)\n\
    \nThe code in `date_format_02.php` produces the same output by using the `date()`\
    \ and `strtotime()` functions, like this:\n\n```\nIt's now  on \nChristmas 2019\
    \ falls on a \n```\n\nThe first line uses `strtotime()` to create a timestamp\
    \ for December 25, 2019. There's no need to create a timestamp for the current\
    \ date and time, because `date()` defaults to them when used without a second\
    \ argument.\n\nIf the timestamp for Christmas Day isn't used elsewhere in the\
    \ script, the first line can be omitted, and the last call to `date()` can be\
    \ rewritten like this (see `date_format_03.php`):\n\n```\ndate('l', strtotime('12/25/2019'))\n\
    ```\n\n## Creating a DateTime Object from a Custom Format\n\nYou can specify a\
    \ custom input format for a `DateTime` object using the format characters in Table\
    \ [16-4](#332054_4_En_16_Chapter.xhtml#Tab4). Instead of creating the object with\
    \ the `new` keyword, you use the `createFromFormat()` static method, like this:\n\
    \n```\n$date = DateTime::createFromFormat(format_string, input_date, timezone);\n\
    ```\n\nThe third argument, *timezone*, is optional. If included, it should be\
    \ a `DateTimeZone` object.\n\nA **static method** belongs to the whole class,\
    \ rather than to a particular object. You call a static method using the class\
    \ name followed by the scope resolution operator (a double colon) and the method\
    \ name.\n\n> **Tip**  \n> Internally, the scope resolution operator is called\
    \ `PAAMAYIM_NEKUDOTAYIM`, which is Hebrew for \"double colon.\" Why Hebrew? The\
    \ Zend Engine that powers PHP was originally developed by Zeev Suraski and Andi\
    \ Gutmans when they were students at the Technion—Israel Institute of Technology.\
    \ Apart from earning points in a geek trivia quiz, knowing the meaning of `PAAMAYIM_NEKUDOTAYIM`\
    \ could save you a lot of head scratching when you see it in a PHP error message.\n\
    \nFor example, you can use the `createFromFormat()` method to accept a date in\
    \ the European format of day, month, year, separated by slashes, like this (the\
    \ code is in `date_format_04.php`):\n\n```\n$xmas2019 = DateTime::createFromFormat('d/m/Y',\
    \ '25/12/2019');\necho $xmas2019->format('l, jS F Y');\n```\n\nThis produces the\
    \ following output:  \n![../images/332054_4_En_16_Chapter/332054_4_En_16_Figb_HTML.jpg](images/332054_4_En_16_Chapter/332054_4_En_16_Figb_HTML.jpg)\n\
    \n> **Caution**  \n> Attempting to use 25/12/2014 as the input to the `DateTime`\
    \ constructor triggers a fatal error because the `DD/MM/YYYY` format is not supported.\
    \ If you want to use a format not supported by the `DateTime` constructor, you\
    \ must use the `createFromFormat()` static method.\n\nAlthough the `createFromFormat()`\
    \ method is useful, it can be used only in circumstances where you know the date\
    \ will always be in a specific format.\n\n## Choosing Between date() and the DateTime\
    \ Class\n\nWhen it comes to displaying a date, it's always a two-step process\
    \ with the `DateTime` class. You need to instantiate the object before you can\
    \ call the `format()` method. With the `date()` function, you can do it in a single\
    \ pass. Since they both use the same format characters, `date()` wins hands down\
    \ when dealing with the current date and/or time.\n\nFor simple tasks like displaying\
    \ the current date, time, or year, use `date()`. Where the `DateTime` class comes\
    \ into its own is when working with date-related calculations and time zones using\
    \ the methods listed in Table [16-5](#332054_4_En_16_Chapter.xhtml#Tab5).\n\n\
    **Table 16-5.** The main `DateTime` methods\n\n| Method | Arguments | Description\
    \ |\n| --- | --- | --- |\n| `format()` | Format string | Formats the date/time\
    \ using the format characters in Table [16-4](#332054_4_En_16_Chapter.xhtml#Tab4).\
    \ |\n| `setDate()` | Year, month, day | Changes the date. The arguments should\
    \ be separated by commas. Months or days in excess of the permitted range are\
    \ added to the resulting date, as described in the main text. |\n| `setTime()`\
    \ | Hours, minutes, seconds | Resets the time. Arguments are comma-separated values.\
    \ Seconds are optional. Values in excess of the permitted range are added to the\
    \ resulting date/time. |\n| `modify()` | Relative date string | Changes the date/time\
    \ using a relative expression, such as `'+2 weeks'`. |\n| `getTimestamp()` | None\
    \ | Returns the Unix timestamp for the date/time. |\n| `setTimestamp()` | Unix\
    \ timestamp | Sets the date/time according to the Unix timestamp. |\n| `setTimezone()`\
    \ | `DateTimeZone` object | Changes the time zone. |\n| `getTimezone()` | None\
    \ | Returns a `DateTimeZone` object representing the `DateTime` object's time\
    \ zone. |\n| `getOffset()` | None | Returns the time zone offset from UTC, expressed\
    \ in seconds. |\n| `add()` | `DateInterval` object | Increments the date/time\
    \ by the set period. |\n| `sub()` | `DateInterval` object | Deducts the set period\
    \ from the date/time. |\n| `diff()` | `DateTime` object, Boolean | Returns a `DateInterval`\
    \ object representing the difference between the current `DateTime` object and\
    \ the one passed as an argument. Using `true` as the optional second argument\
    \ converts negative values to their positive equivalent. |\n\nAdding out-of-range\
    \ values with `setDate()` and `setTime()` results in the excess being added to\
    \ the resulting date or time. For example, using 14 as the month sets the date\
    \ to February of the following year. Setting the hour to 26 results in 2 am on\
    \ the following day.\n\nA useful trick with `setDate()` allows you to set the\
    \ date to the last day of any month by setting the month value to the following\
    \ month, and the day to 0. The code in `setDate.php` demonstrates this with the\
    \ last day of February 2019 and 2020 (a leap year):\n\n```\nsetDate(2019, 3, 0);\n\
    ?>\nNon-leap year: format($format) ?>.\nLeap year: setDate(2020, 3, 0);\necho\
    \ $date->format($format); ?>.\n```\n\nThe preceding example produces the following\
    \ output:  \n![../images/332054_4_En_16_Chapter/332054_4_En_16_Figc_HTML.jpg](images/332054_4_En_16_Chapter/332054_4_En_16_Figc_HTML.jpg)"
