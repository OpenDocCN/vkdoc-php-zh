    Recipe 4-7\. Using Arrays as Stacks


    Problem


    A stack is a commonly used structure where elements can be added and removed from
    the open end of the stack. Stacks are considered as last-in first-out structures.


    CHAPTER 4 ■ WORKING WITH ARRAYS


    Solution


    With the use of the functions array_pop() , array_push() , array_shift(), and
    array_unshift() it is possible to use arrays as a stack. Shift and unshift works
    on the beginning of the array where push and pop works on the end of the array.
    These functions will return the first or last element of the array. If the array
    is empty or the variable is not an array these functions will return NULL.


    How it Works'
  trans: "\n此外，还有一个标志可使排序不区分大小写。该标志可与任何其他标志组合使用。\n\n当然，使用数据库的排序功能并按应使用顺序返回记录效率更高，但有时可能需要不同的顺序。更改查询来改变列的顺序可能会影响呈现效果，因此这种方法也可能不是最佳选择。\n\
    \n这时，`usort()` 函数就派上了用场。`usort()` 函数接受两个参数：第一个是要排序的数组，第二个是用户自定义回调函数的名称，该函数用于比较数组中的两个元素。如果我们想扩展示例\
    \ `3_9.php`，并定义按名字、姓氏或出生日期对人数组进行排序的函数，代码可能如下所示。\n\n```php\n<?php\n\n// 4_23.php\n\
    \nfunction SortFirstName($a, $b) {\n\nif ($a['first_name'] == $b['first_name'])\
    \ {\n\nreturn 0;\n\n}\n\nelseif ($a['first_name'] > $b['first_name']) {\n\nreturn\
    \ 1;\n\n}\n\nelse {\n\nreturn -1;\n\n}\n\n}\n\nfunction SortLastName($a, $b) {\n\
    \nif ($a['last_name'] == $b['last_name']) {\n\nreturn 0;\n\n}\n\nelseif ($a['last_name']\
    \ > $b['last_name']) {\n\nreturn 1;\n\n}\n\nelse {\n\nreturn -1;\n\n}\n\n}\n\n\
    function SortDOB($a, $b) {\n\nif ($a['date_of_birth'] == $b['date_of_birth'])\
    \ {\n\nreturn 0;\n\n}\n\nelseif ($a['date_of_birth'] > $b['date_of_birth']) {\n\
    \nreturn 1;\n\n}\n\nelse {\n\nreturn -1;\n\n}\n\n}\n\n$con = mysqli_connect(\"\
    127.0.0.1\", \"root\", \"Wbp2Theworld\", \"book\"); $rs = mysqli_query($con, \"\
    select * from person\");\n\nif ($rs) {\n\n$persons = array();\n\nwhile($row =\
    \ mysqli_fetch_assoc($rs)) {\n\n$persons[] = $row;\n\n}\n\nmysqli_free_result($rs);\n\
    \n}\n\nmysqli_close($con);\n\nusort($persons, 'SortFirstName');\n\nprint_r($persons);\n\
    \nusort($persons, 'SortLastName');\n\nprint_r($persons);\n\nusort($persons, 'SortDOB');\n\
    \nprint_r($persons);\n```\n\n在本例中，我们定义了三个回调函数，每个函数用于按特定列排序。代码调用了每个排序函数，输出如下所示。\n\
    \n```\nArray\n(\n    [0] => Array\n        (\n            [first_name] => George\n\
    \            [last_name] => Harrison\n            [date_of_birth] => -847324800\n\
    \        )\n    [1] => Array\n        (\n            [first_name] => John\n  \
