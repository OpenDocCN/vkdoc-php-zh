  \ |\n\n## 9. 性能与稳定性——性能分析与改进\n\n或者，*“为什么 PHP 那么慢”* **（提示 - 通常并非如此）**\n\nPHP 脚本性能（我们使用这个术语来涵盖执行速度、资源利用率等指标）对于基于\
  \ PHP 的网站以及其他用 PHP 编写的应用来说都是一个重要问题。本章将探讨普遍影响 PHP 性能的问题、非 Web 应用特有的性能考量，以及可用于解决性能相关问题的工具和资源。我们还将探讨长时间运行脚本的稳定性，这一问题通常与性能问题密切相关。\n\
  \n\n\n### 9.1 性能背景\n\n`PHP` 通常被认为是一种“脚本”或“解释型”语言。这意味着它不像语言（如 `C`）那样，将源代码编译或转换成机器可执行指令，并将这些指令作为独立程序分发，而是以\
  \ `PHP` 源代码的形式分发程序。软件的用户需要 `PHP` 解释器（也称为 `PHP` 虚拟机）来运行该源代码，解释器会在应用程序执行时，即时地将 `PHP`\
  \ 源代码转换成机器指令。这种执行方式有其优点和缺点。主要优点包括代码更新和部署的便利性（无需编译步骤）以及较少的架构问题（一次编写，随处运行，无需针对特定平台进行编译）。主要缺点则在于应用程序运行时，解释阶段带来的性能开销。现代版本的\
  \ `PHP` 实际上通过首先将代码转换为中间“操作码”然后执行来减少这种性能开销。这些操作码在相同代码（例如循环中）重复出现时无需被重新解释。对于经常使用的脚本，例如网络脚本和一些应用程序，这些操作码甚至可以在脚本运行之间被缓存，以便后续能够更快地执行。\n\
  \n`PHP` 也是一种“高级”语言，这意味着它使用抽象来向用户隐藏计算机代码所需的大量底层细节。`PHP` 和其他高级语言并不处理像内存寻址和调用栈这类实现细节，而是通过变量、数组和函数等抽象概念向程序员展示计算机。像\
  \ `PHP` 这类语言的吸引力之一在于其提供了执行常见任务的内置函数和运算符，从而提高了开发者的生产力。多功能的**数据结构**（例如 `PHP` 的数组类型，它实际上是一种受管理的有序映射，可以用作传统数组、列表、哈希表、字典或其他几种常见的数据结构类型）隐藏了内存管理的细节，简化了访问，并提供了丰富多样的相关操作函数。然而，这些抽象是**以性能为代价**的。每一个函数、数组操作或磁盘访问的背后，都是用\
  \ `C` 语言编写的底层算法。这些算法的实现必须满足“通用”情况，并包含该算法的所有可能用途。因此，它们很少能像专门为你特定需求编写的 `C` 算法那样优化。与像\
  \ `C` 这样的底层语言相比，这种抽象层级再次为 `PHP` 增加了开销，尽管在过去几年中，`PHP` 核心开发者投入了大量时间和精力来优化、精简、重构 `C`\
  \ 后端，并取得了显著成效，在许多常见情况下极大地提高了速度并减少了内存消耗。而且，对于这些常见情况，这些预构建的 `PHP` 算法通常比你可能自己编写的算法要更好！\n\
  \n性能问题的最后一个原因可能是最普遍的问题之一，但也是最容易解决的之一。这个原因就是 `PHP` 程序员。许多开发者不知道如何在自己的代码中发现和解决性能问题，常常将自己代码的不足归咎于\
  \ `PHP` 本身，尽管 `PHP` 在性能上并不逊色于其他语言。虽然 `PHP` 为你消除了编程中的许多痛苦和艰辛，隐藏并处理了大量任务，但它仍然是一种通用编程语言，因此写出性能欠佳的代码是完全可能的。即使意识到了这些问题，许多开发者也不了解有哪些可用的工具和资源可以帮助他们提升程序的性能。\n\
  \n对于那些怀疑用 `PHP` 是否能写出高性能系统的人，下面“延伸阅读”部分的一组幻灯片提供了一个公司的示例，证明了这不仅是可能的，而且在现实世界中已经实现。附录\
  \ D 也展示了一些人们正在用 `PHP` 完成的事情，在这些应用中，性能显然并未成为阻碍。\n\n| ![信息图标](img/image00248.jpeg)\
  \ | **延伸阅读**“超越网站：Datasift 的 PHP 与 Firehose” 作者：Stuart Herbert [`blog.stuartherbert.com/php/2013/04/16/slides-from-brighton-php-more-than-websites-php-and-the-firehose/`](http://blog.stuartherbert.com/php/2013/04/16/slides-from-brighton-php-more-than-websites-php-and-the-firehose/)\
  \ |\n\n### 9.2 通用编程的特有问题\n\n如上所述，网络脚本和非网络 `PHP` 脚本都可能存在性能问题。然而，在编写运行时间更长且没有内存限制的脚本时，还需要考虑一些额外的性能相关问题。在\
  \ `CLI SAPI` 中，与传统的网络 `PHP` 编程模型一样，`PHP` 会管理内存消耗的限制并替你执行垃圾回收。这在网络环境中运行良好，因为许多脚本的生命周期较短且资源密集度较低，使得限制和管理过程很少被注意到。然而，当你编写通用应用程序时，你通常希望移除强加的内存限制，以便你的应用程序能够在具有不同内存量的不同系统上消耗其所需的所有内存。实际上，除非你另行指定，否则\
  \ `CLI SAPI` 的默认配置现在会将内存和执行时间限制设置为 `0`。这便将管理和限制内存使用的负担转移到了你的脚本上。同样，在运行时间较长、资源密集且对响应时间敏感的脚本中，垃圾回收需要采用不同的方法，以避免不希望的阻塞或不必要的保守回收。这涉及到在脚本中手动管理垃圾回收过程。\n\
  \n与在网络环境中相比，你作为程序员编写的低效编程和算法设计也可能更加明显。生成网页时算法所花费的时间，可能会被传输和显示页面的其他时间开销所掩盖；但当完全相同的算法在命令行上执行时，可能会产生明显的停顿。对用户的响应性在网络环境中至关重要，但对本地用户来说也是显而易见。\n\
  \n本章的其余部分将探讨如何分析和优化脚本的性能及其使用的资源，包括针对性解决上述问题的策略。\n\n\n\n### 9.3 分析、分析、再分析！\n\n我们都遇到过运行缓慢的脚本（通常是我们自己写的！），而第一反应通常是去查找提升\
  \ PHP 速度的方法。编译、缓存、重构代码、加速器；这些是搜索 PHP 性能或速度问题时很容易找到的话题，我们可能已经读过相关内容，然后就直接投入实践。我的建议（源自惨痛的个人经验）是：立刻停止。盲目地将各种性能优化技巧（通常是你在网上或类似的好书里找到的）应用到你的代码中，即使它们看起来合理且逻辑清晰，最终也可能只会无端地让你的代码变得复杂，或增加不必要的依赖。为什么？因为当我们不知道问题的根源时，我们无法判断某个特定的解决方案，无论理论上多么完美，是否能真正解决我们遇到的这个具体问题。即使它看起来有效，我们也不清楚它是不是最简单的修复方法，从而我们是否在不必背负的情况下，给自己增加了额外的“技术债务”。\n\
  \n我们常常遗漏的一步是直接询问我们的脚本：“你为什么跑得这么慢？”。如果我们的脚本能告诉我们答案，我们就可以尝试直接修复问题，而无需借助编译器、缓存系统等外部工具。那么，我们该如何向脚本提问“为什么”呢？通过“性能分析”（profiling）来实现。\n\
  \n如果你不熟悉这个术语，剖析器（profiler）会监控软件（通常是从“内部”）的运行过程，并分解程序每个部分所使用的时间（有时也包括资源）。分析信息通常会细致到报告每一行代码或每个函数调用的耗时。这有助于我们精确定位脚本速度变慢的具体位置。是那个复杂的数据库查询？一个写得糟糕的循环？一个被调用次数超乎预期的函数？磁盘或网络访问导致的执行暂停？无论问题是什么，剖析器都会告诉我们。一旦我们确切地知道了速度变慢的原因，解决方案通常也就显而易见了（或者至少我们可以排除那些实际上行不通的潜在方案）。可能只需要重写几行代码，或者缓存一些数据而不用反复生成。它也可能指出\
  \ PHP 外部的问题，比如数据库服务器响应慢、网络连接延迟或资源问题。当然，在某些情况下，从 PHP 编程的角度来看，这可能确实是一个棘手的问题，需要借助加速器或外部缓存系统。无论如何，通过使用剖析器在尝试“怎么做”之前先问“为什么”，我们很可能会节省时间，并避免对代码或部署环境进行不必要的更改。\n\
  \n在 PHP 中，关于性能分析，你有几种选择。你可以通过直接在代码库中添加分析/测量语句来手动进行性能分析，或者使用多种工具之一来自动分析你的代码。如果你大致知道问题出在代码的哪个位置，前者快捷方便，且无需更改你的开发环境。后者虽然需要设置和配置工具，并要花时间学习如何使用，但它能提供更全面的分析。它也不依赖于你是否知道问题可能的位置，并且通常只需要对代码库进行最小程度的修改或根本无需修改。下面我们将探讨这两种方案。\n\
  \n### 9.4 手动性能分析\n\n手动性能分析需要在源代码中添加额外的代码，以便直接从脚本内部测量时间或资源使用情况。以下是一个测量不同代码行执行时间的示例。\n\
  \n```\n 1 <?\n\n 3 # 让我们通过循环来填充一些变量\n\n 5 $something = $anotherthing = '';\n\n 7\
  \ # 通过记录当前时间和内存使用量来创建一个“检查点”\n 8 # \n10 $time1 = microtime(true);\n11 $memory1 =\
  \ memory_get_usage();\n\n13 # 现在，让我们循环 10 次，每次短暂休眠并给变量添加少量数据\n\n16 for ($counter\
  \ = 0; $counter < 10; $counter++) {\n17 \t\tusleep(10);\t\t\t\n18 \t\t$something\
  \ .= 'a';\n19 };\n\n21 # 现在创建第二个检查点\n\n23 $memory2 = memory_get_usage();\n24 $time2\
  \ = microtime(true);\n\n26 # 让我们进行第二个循环 1000 次，休眠时间更长，每次给变量添加大量数据\n\n29 for ($counter\
  \ = 0; $counter < 1000; $counter++) {\n30 \t\tusleep(100);\n31 \t\t$anotherthing\
  \ .= str_repeat('abc',1000);\n32 };\n\n34 # 并创建最后一个检查点\n\n36 $memory3 = memory_get_usage();\n\
  37 $time3 = microtime(true);\n\n39 # 现在，输出每个循环所用的时间和内存。\n\n41 echo (\"1st Loop :\
  \ \".($time2-$time1).\" msecs, \".\n42 \t\t($memory2-$memory1).\" bytes\\n\");\n\
  \n44 echo (\"2nd Loop : \".($time3-$time2).\" msecs, \".\n45 \t\t($memory3-$memory2).\"\
  \ bytes\\n\");\n\n47 echo (\"Peak memory usage : \". memory_get_peak_usage().\"\
  \ bytes\\n\");\n```\n\n运行上面的脚本，你应该会看到第二个循环花费了更长的时间，并且消耗了更多内存。现在你知道我们的“问题”出在第二个循环，你可以通过移除\
  \ `usleep` 语句，甚至完全移除循环并使用 `str_repeat('abc',1000000)` 来填充变量来“修复”它。你还应该看到，最后一行报告的峰值内存使用量高于两个循环中的任何一个。这表明，如果没有积极地管理变量（例如，使用\
  \ `unset()` 释放它们），内存使用量会在整个脚本中不断累积。这显然是一个简单的人为示例，但其中使用的原则同样适用于现实世界的代码。\n\n正如你所见，对于几行代码来说，手动性能分析既快速又简单。然而，对较大的代码库进行性能分析很快就会变得笨拙，如果不小心，会极大地增加代码库的规模。在排查特定问题时，你可以先分析较大的代码段，当找到有问题的较大模块后，再将其细分为更小的块进行分析，依此类推，直到找到问题代码（实际上是在执行二分查找）。如果你花费大量时间这样做，那么花必要的时间来实现和学习一个剖析工具（如下面详述的那些）可能是更好的选择。\n\
  \n手动性能分析时还需要记住的另一件事是，手动分析的代码会给你的脚本增加额外的性能开销，虽然通常很小，但日积月累也不可忽视，尤其是在你不断地将分析信息记录到磁盘时。因此，在代码投入生产环境之前，考虑移除或禁用分析代码（或许作为构建/部署流程的一部分）是值得的。当然，在某些情况下，有意识地将分析代码加入生产代码库也是有用的，例如，当需要/有助于从最终用户那里收集分析信息，而他们很可能没有安装专用的分析软件时。自动剖析工具通常也会增加一些开销，尽管通常较小（它们通常用较低级的语言编写，并且常常直接集成到\
  \ PHP 解释器中），并且通常更容易开启和关闭。它们通常只在开发环境中使用，而不会在正式的生产机器上启用，因此任何额外开销都仅限于开发工作。\n\n\n###\
  \ 9.5 性能分析工具\n\nPHP 有几种可用的性能分析工具。虽然 `xDebug` 调试器提供了一些性能分析选项（如果你已经为了调试而安装了它，值得一看），但最常用且最全面的工具是\
  \ `XHProf`。它最初由 Facebook 开发，作为 PECL 扩展提供，因此可以简单方便地安装。其数据收集部分用 C 语言编写，并提供了一个图形化的\
  \ PHP 界面来查看收集到的性能分析数据，包括调用图（可视化展示哪个函数调用了哪个函数，前提是你安装了 `Graphviz`）。一个相关的项目 `XHGui`（`XHProf`\
  \ 的一个分支）提供了扩展的视觉界面，将多次运行的结果存储在 MySQL 数据库中，并提供了排序和比较多次运行结果的访问功能。`XHGui` 的安装和配置稍显复杂，特别适合用于\
  \ Web 脚本，但如果你定期分析代码，或对生产系统上的实时代码进行分析，它能提供极大的灵活性。不过，对于在开发代码中寻找明显问题的基本性能分析，`XHProf`\
  \ 是一个不错的起点。\n\n另一个新兴的性能分析器是 `php-profiler`，它是一个纯 PHP 编写的分析器。虽然不如 `XHProf` 全面，但它仍然有用且易于部署——只需在代码中\
  \ `include()` 你的 profiler.php 即可。请注意，由于它专为 Web 设计，此分析器的输出默认会附加在其分析过的网页上。如果将其用于非\
  \ Web 脚本，你需要使用输出缓冲或类似方法，将输出重定向到（例如）磁盘上单独的 HTML 文件中，以便稍后在浏览器中查看。\n\n| ![信息图标](img/image00248.jpeg)\
