    \ image/gif');`\n\n`ImageGIF($img);`\n\n`break;`\n\n`}`\n\n`ImageDestroy($img);`\n\
    \nAnd the resulting output would be an image with the text:\n\nBesides the fact\
    \ the text is slanted on a 10 degree angle there is another difference between\
    \ the two ways of drawing text. This has to do with the positioning of the text.\
    \ `ImageString()` takes the upper-left corner of the text and places it at the\
    \ coordinates specified in the function call. The function `ImageTTFText()` takes\
    \ the lower-left corner and positions it at the coordinates provided.\n\n## Recipe\
    \ 8-11. Caching Images\n\n### Problem\n\nAlthough images can be created, scaled,\
    \ and rotated, etc., it is not optimal to do so on every request. These image\
    \ manipulations take many CPU cycles and, to some extent, memory. Holding onto\
    \ these resources for a long time will reduce the number of requests the server\
    \ is capable of handling within a given time frame.\n\n### Solution\n\nImages\
    \ that can be generated once and stored on the disk to be shared with other users\
    \ will provide a much better performance. The very first user who is accessing\
    \ an image could experience load time if the image generation is handled as part\
    \ of the request. If this becomes a problem the image generation can be linked\
    \ to the upload process or an offline process that detects new images and generates\
    \ the needed files.\n\n### How it Works\n\nThis example is an extension to Recipe\
    \ 8-6 for adding a watermark to an image. If your web site is hosting images that\
    \ you want to protect from being copied and used elsewhere you might create lower\
    \ resolution versions and add a watermark with your logo. Instead of doing this\
    \ on every request a caching system can be implemented that checks if the requested\
    \ image exists on the desk and use that instead.\n\nIn the next example a script\
    \ takes three parameters (file name and maximum width) to show how we can look\
    \ for a previously generated image and use that if it exists; otherwise create\
    \ a new image based on the parameters, save it to disk for the next request, and\
    \ return it to the user.\n\n## CHAPTER 8 ■ DYNAMIC IMAGING\n\n```php\n// 8_23.php\n\
    \n$file = $_REQUEST['file'] ?: 'IMG_0099.JPG';\n\n$max_width = $_REQUEST['w']\
    \ ?: 600;\n\nif (file_exists($file)) {\n\n$orig = GetImageSize($file);\n\nheader('Content-Type:\
    \ ' . $orig['mime']);\n\nheader('Content-Disposition: inline; filename=\"'. $file\
    \ . '\"'); if (!file_exists(\"_\" . $file)) {\n\nif ($orig[0] > $max_width) {\n\
    \n$src = ImageCreateFromJpeg($file);\n\n$img = ImageScale($src, $max_width);\n\
    \nImageDestroy($src);\n\n$orig[0] = ImageSX($img);\n\n$orig[1] = ImageSY($img);\n\
    \n}\n\nelse {\n\n$img = ImageCreateFromJpeg($file);\n\n}\n\n$wm = GetImageSize('watermark.png');\n\
    \n$watermark = ImageCreateFromPng('watermark.png');\n\nif ($orig[0] > $wm[0])\
    \ {\n\n$width = $wm[0];\n\n$height = $wm[1];\n\n$x = ($orig[0] - $wm[0]) / 2;\n\
    \n$y = ($orig[1] - $wm[1]) / 2;\n\n}\n\nelse {\n\n$d = $orig[0] / $wm[0];\n\n\
    $width = $orig[0];\n\n$height = $wm[1] * $d;\n\n$x = 0;\n\n$y = ($orig[1] - $height)\
    \ / 2;\n\n}\n\nImageCopyResampled($img, $watermark, $x, $y, 0, 0,\n\n$width, $height,\
    \ $wm[0], $wm[1]);\n\nswitch ($orig[2]) {\n\ncase IMG_JPG :\n\ncase IMG_JPEG :\n\
    \nImageJPEG($img, '_' . $file);\n\nbreak;\n\ncase IMG_PNG :\n\nImagePNG($img,\
    \ '_' . $file);\n\nbreak;\n\ncase IMG_GIF :\n\nImageGIF($img, '_' . $file);\n\n\
    break;\n\n}\n\nImageDestroy($watermark);\n\nImageDestroy($img);\n\n}\n\nreadfile(\"\
    _\" . $file);\n\n}\n```\n\nThe first step is to get two parameters for file name\
    \ and max width. Then there is a check for a cached version of the file. In this\
    \ case an underscore is used in front of the filename to indicate that the file\
    \ is cached. We could also include the width of this image. This will allow us\
    \ to have multiple versions of the same image cached. This could be one for thumbnail\
    \ and one for a preview, for example. If the cached file is missing the script\
    \ will scale the image to the max size if needed and then add the watermark. In\
    \ this case the three `Image...()` functions use an extra parameter that will\
    \ cause the image to be saved to disk instead of returned to the client. The last\
    \ step is to read the image file from disk and send it to the client.\n\n# CHAPTER\
    \ 9\n\n# Regular Expressions\n\nPHP is often described as a templating language\
    \ where HTML sections and script are mixed to generate HTML documents for rendering\
    \ in a browser. As the web technology is advancing PHP is used to generate other\
    \ types of content (JSON, see chapter 14; and images see chapter 8, etc.) and\
    \ the PHP scripts contain less embedded HTML sections. Instead the script will\
    \ read a template from disk or a database and perform string replacements on the\
    \ content before sending it to the client.\n\nSimple string replacements can be\
    \ done with the `str_replace()` function, but this function will replace a fixed\
    \ string of characters with a different string of characters and unless the `str_ireplace()`\
    \ version of the function is used the replacement is case sensitive. It is possible\
    \ to create other types of logic with the use of the `str_pos()` and `substr()`\
    \ functions, but that often ends up creating complex logic that can be difficult\
    \ to maintain, and because it’s written in PHP it might not be the most efficient\
    \ use of resources.\n\nWith the Regular Expression functions it is possible to\
    \ do advanced search and/or replace functionality with very few lines of code.\
    \ The syntax for regular expressions is very powerful but can sometimes be hard\
    \ to understand.\n\nIn the early days of PHP the regular expressions were made\
    \ up of a few system functions: `ereg()`, `eregi()`, `ereg_replace()`, and `eregi_replace()`.\
    \ These functions were deprecated in PHP 5.3 and removed completely in PHP 7.0.\
    \ The functions are replaced with a more powerful library called Perl Compatible\
    \ Regular Expressions (PCRE). The PCRE library is bundled with the PHP source\
    \ and is enabled standardly by most PHP distributions on Linux, OSX, and Windows.\n\
    \nThe heart of regular expressions is a pattern or sequence of characters that\
    \ describes the expression.\n\nThe expression is made of a number of components\
    \ called metacharacters, character classes, subpatterns, qualifiers, and branches.\n\
    \nA metacharacter is a regular character with a special meaning for the expression.\
    \ This can be an escape character that can change the meaning of the character\
    \ following the escape. The backslash `\\` character is used as the escape character\
    \ and it will turn the character `n` into a new line by adding the backslash in\
    \ front `\\n`. It can also be used to turn a metacharacter into a regular character\
    \ like `\\(` or `\\)` etc. Table 9-1 shows a full list of supported metacharacters.\n\
    \n© Frank M. Kromann 2016  \nF.M. Kromann, *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_9\n\
    \n## CHAPTER 9 ■ REGULAR EXPRESSIONS\n\n### Table 9-1. Meta characters\n\n| Character\
    \ | Description |\n|-----------|-------------|\n| `\\` | Escape character |\n\
    | `^` | Matches the beginning of the string or line |\n| `$` | Matches the end\
    \ of string or line |\n| `[` | Start of character class |\n| `]` | End of character\
    \ class |\n| `(` | Start of subpattern |\n| `)` | End of subpattern |\n| `.` |\
    \ Match any character |\n| `*` | Qualifier to repeat 0 or more times |\n| `+`\
    \ | Qualifier to repeat 1 or more times |\n| `{` | Start qualifier range |\n|\
    \ `}` | End qualifier range |\n| `?` | Allows the pattern to be there or not |\n\
    \nA character class is defined with square brackets `[]`. This can define a list\
    \ or range of characters. `[abc]` will match any of the characters a, b, or c\
    \ and `[a-z]` will match any character between a and z. A character call will\
    \ match a single character in the subject string, but they can be used with repetitions\
    \ to match any number of characters all being defined by the character class.\n\
    \nSubexpressions or sub patterns are created with regular parentheses `()` and\
    \ are used for both grouping and to extract specific portions of a pattern for\
    \ further use."
  raw: 'ImagePNG($img);


    break;


    default :


    header(''Content-Type: image/gif'');


    ImageGIF($img);


    break;


    }


    ImageDestroy($img);


    And the resulting output would be an image with the text:


    Besides the fact the text is slanted on a 10 degree angle there is another difference
    between the two ways of drawing text. This has to do with the positioning of the
    text. ImageString() takes the upper-left corner of the text and places it at the
    coordinates specified in the function call. The function ImageTTFText() takes
    the lower-left corner and positions it at the coordinates provided.


    Recipe 8-11\. Caching Images


    Problem


    Although images can be created, scaled, and rotated, etc., it is not optimal to
    do so on every request. These image manipulations take many CPU cycles and, to
    some extent, memory. Holding onto these resources for a long time will reduce
    the number of requests the server is capable of handling within a given time frame.


    Solution


    Images that can be generated once and stored on the disk to be shared with other
    users will provide a much better performance. The very first user who is accessing
    an image could experience load time if the image generation is handled as part
    of the request. If this becomes a problem the image generation can be linked to
    the upload process or an offline process that detects new images and generates
    the needed files.


    How it Works


    This example is an extension to Recipe 8-6 for adding a watermark to an image.
    If your web site is hosting images that you want to protect from being copied
    and used elsewhere you might create lower resolution versions and add a watermark
    with your logo. Instead of doing this on every request a caching system can be
    implemented that checks if the requested image exists on the desk and use that
    instead.


    In the next example a script takes three parameters (file name and maximum width)
    to show how we can look for a previously generated image and use that if it exists;
    otherwise create a new image based on the parameters, save it to disk for the
    next request, and return it to the user.


    CHAPTER 8 ■ DYNAMIC IMAGING


    <?php


    // 8_23.php


    $file = $_REQUEST[''file''] ?: ''IMG_0099.JPG'';


    $max_width = $_REQUEST[''w''] ?: 600;


    if (file_exists($file)) {


    $orig = GetImageSize($file);


    header(''Content-Type: '' . $orig[''mime'']);


    header(''Content-Disposition: inline; filename="''. $file . ''"''); if (!file_exists("_"
    . $file)) {


    if ($orig[0] > $max_width) {


    $src = ImageCreateFromJpeg($file);


    $img = ImageScale($src, $max_width);


    ImageDestroy($src);


    $orig[0] = ImageSX($img);


    $orig[1] = ImageSY($img);


    }


    else {


    $img = ImageCreateFromJpeg($file);


    }


    $wm = GetImageSize(''watermark.png'');


    $watermark = ImageCreateFromPng(''watermark.png'');


    if ($orig[0] > $wm[0]) {


    $width = $wm[0];


    $height = $wm[1];


    $x = ($orig[0] - $wm[0]) / 2;


    $y = ($orig[1] - $wm[1]) / 2;


    }


    else {


    $d = $orig[0] / $wm[0];


    $width = $orig[0];


    $height = $wm[1] * $d;


    $x = 0;


    $y = ($orig[1] - $height) / 2;


    }


    ImageCopyResampled($img, $watermark, $x, $y, 0, 0,


    $width, $height, $wm[0], $wm[1]);


    switch ($orig[2]) {


    case IMG_JPG :


    case IMG_JPEG :


    ImageJPEG($img, ''_'' . $file);


    break;


    case IMG_PNG :


    ImagePNG($img, ''_'' . $file);


    break;


    case IMG_GIF :


    ImageGIF($img, ''_'' . $file);


    break;


    }


    CHAPTER 8 ■ DYNAMIC IMAGING


    ImageDestroy($watermark);


    ImageDestroy($img);


    }


    readfile("_" . $file);


    }


    The first step is to get two parameters for file name and max width. Then there
    is a check for a cached version of the file. In this case an underscore is used
    in front of the filename to indicate that the file is cached. We could also include
    the width of this image. This will allow us to have multiple versions of the same
    image cached. This could be one for thumbnail and one for a preview, for example.
    If the cached file is missing the script will scale the image to the max size
    if needed and then add the watermark. In this case the three Image...() functions
    use an extra parameter that will cause the image to be saved to disk instead of
    returned to the client. The last step is to read the image file from disk and
    send it to the client.


    **CHAPTER 9**


    **Regular Expressions**


    PHP is often described as a templating language where HTML sections and script
    are mixed to generate HTML documents for rendering in a browser. As the web technology
    is advancing PHP is used to generate other types of content (JSON, see ch[apter
    14](http://dx.doi.org/10.1007/978-1-4842-0605-8_14) ; and images see ch[apter
    8](http://dx.doi.org/10.1007/978-1-4842-0605-8_8) , etc.) and the PHP scripts
    contain less embedded HTML sections. Instead the script will read a template from
    disk or a database and perform string replacements on the content before sending
    it to the client.


    Simple string replacements can be done with the str_replace() function , but this
    function will replace a fixed string of characters with a different string of
    characters and unless the str_ireplace() version of the function is used the replacement
    is case sensitive. It is possible to create other types of logic with the use
    of the str_pos() and substr() functions , but that often ends up creating complex
    logic that can be difficult to maintain, and because it’s written in PHP it might
    not be the most efficient use of resources.


    With the Regular Expression functions it is possible to do advanced search and/or
    replace functionality with very few lines of code. The syntax for regular expressions
    is very powerful but can sometimes be hard to understand.


    In the early days of PHP the regular expressions were made up of a few system
    functions: ereg() , erigi() , ereg_replace() , and eregi_replace() . These functions
    were deprecated in PHP 5.3 and removed completely in PHP 7.0\. The functions are
    replaced with a more powerful library called Perl Compatible Regular Expressions
    (PCRE). The PCRE library is bundled with the PHP source and is enabled standardly
    by most PHP distributions on Linux, OSX, and Windows.


    The heart of regular expressions is a pattern or sequence of characters that describes
    the expression.


    The expression is made of a number of components called metacharacters, character
    classes, subpatterns, qualifiers, and branches.


    A metacharacter is a regular character with a special meaning for the expression.
    This can be an escape character that can change the meaning of the character following
    the escape. The backslash ‘\’ character is used as the escape character and it
    will turn the character ‘n’ into a new line by adding the backslash in front


    ‘\n’. It can also be used to turn a metacharacter into a regular character like
    ‘\ (’ or ‘\)’ etc. Ta[ble 9-1](#index_split_004.html#p229) shows a full list of
    supported metacharacters.


    © Frank M. Kromann 2016


    F.M. Kromann, *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_9


    CHAPTER 9 ■ REGULAR EXPRESSIONS


    ***Table 9-1.** Meta characters*


    \


    Escape character


    ^


    Matches the beginning of the string or line


    $


    Matches the end of string or line


    [


    Start of character class


    ]


    End of character class


    (


    Start of subpattern


    )


    End of subpattern


    .


    Match any character


    *


    Qualifier to repeat 0 or more times


    +


    Qualifier to repeat 1 or more times


    {


    Start qualifier range


    }


    End qualifier range


    ?


    Allows the pattern to be there or not


    A character class is defined with square brackets []. This can define a list or
    range of characters. [abc]


    will match any of the characters a, b, or c and [a-z] will match any character
    between a and z. A character call will match a single character in the subject
    string, but they can be used with repetitions to match any number of characters
    all being defined by the character class.


    Subexpressions or sub patterns are created with regular parentheses () and are
    used for both grouping and to extract specific portions of a pattern for further
    use.'
  trans: "\n# 动态图像\n\n`ImagePNG($img);`\n\n`break;`\n\n`default :`\n\n`header('Content-Type:\
    \ image/gif');`\n\n`ImageGIF($img);`\n\n`break;`\n\n`}`\n\n`ImageDestroy($img);`\n\
    \n最终生成的输出将是一幅包含以下文字的图像：\n\n除了文字倾斜 10 度之外，这两种绘制文字的方式还存在另一个差异。这与文字的位置有关。`ImageString()`函数将文字的左上角放置在函数调用中指定的坐标处。而`ImageTTFText()`函数则将文字的左下角定位在所提供的坐标处。\n\
    \n## 技巧 8-11. 图像缓存\n\n### 问题\n\n尽管可以创建、缩放和旋转图像，但每次请求都这样做并非最佳方案。这些图像处理操作会消耗大量 CPU\
    \ 周期，并在一定程度上消耗内存。长期占用这些资源会减少服务器在给定时间范围内能够处理的请求数量。\n\n### 解决方案\n\n那些可以只生成一次并存储在磁盘上供其他用户共享的图像，将能提供更好的性能。如果图像生成作为请求的一部分来处理，那么第一个访问图像的*用户*可能会经历加载时间。如果这成为了一个问题，可以将图像生成与上传过程或离线进程关联起来，后者负责检测新图像并生成所需文件。\n\
    \n### 工作原理\n\n此示例是对技巧 8-6（为图像添加水印）的扩展。如果你的网站托管了你想保护以免被复制和在其他地方使用的图像，你可能会创建分辨率较低的版本并添加带有你徽标的水印。不必每次请求都这样做，而是可以实现一个缓存系统，检查请求的图像是否已存在于磁盘上，并使用该缓存版本。\n\
    \n在下一个示例中，脚本接收两个参数（文件名和最大宽度），以演示我们如何查找先前生成的图像，如果存在则使用它；否则根据参数创建新图像，将其保存到磁盘以供下一次请求使用，并将其返回给用户。\n\
    \n## 第 8 章 ■ 动态图像\n\n```php\n// 8_23.php\n\n$file = $_REQUEST['file'] ?: 'IMG_0099.JPG';\n\
    \n$max_width = $_REQUEST['w'] ?: 600;\n\nif (file_exists($file)) {\n\n$orig =\
    \ GetImageSize($file);\n\nheader('Content-Type: ' . $orig['mime']);\n\nheader('Content-Disposition:\
    \ inline; filename=\"'. $file . '\"'); if (!file_exists(\"_\" . $file)) {\n\n\
    if ($orig[0] > $max_width) {\n\n$src = ImageCreateFromJpeg($file);\n\n$img = ImageScale($src,\
    \ $max_width);\n\nImageDestroy($src);\n\n$orig[0] = ImageSX($img);\n\n$orig[1]\
    \ = ImageSY($img);\n\n}\n\nelse {\n\n$img = ImageCreateFromJpeg($file);\n\n}\n\
    \n$wm = GetImageSize('watermark.png');\n\n$watermark = ImageCreateFromPng('watermark.png');\n\
    \nif ($orig[0] > $wm[0]) {\n\n$width = $wm[0];\n\n$height = $wm[1];\n\n$x = ($orig[0]\
    \ - $wm[0]) / 2;\n\n$y = ($orig[1] - $wm[1]) / 2;\n\n}\n\nelse {\n\n$d = $orig[0]\
    \ / $wm[0];\n\n$width = $orig[0];\n\n$height = $wm[1] * $d;\n\n$x = 0;\n\n$y =\
    \ ($orig[1] - $height) / 2;\n\n}\n\nImageCopyResampled($img, $watermark, $x, $y,\
    \ 0, 0,\n\n$width, $height, $wm[0], $wm[1]);\n\nswitch ($orig[2]) {\n\ncase IMG_JPG\
    \ :\n\ncase IMG_JPEG :\n\nImageJPEG($img, '_' . $file);\n\nbreak;\n\ncase IMG_PNG\
    \ :\n\nImagePNG($img, '_' . $file);\n\nbreak;\n\ncase IMG_GIF :\n\nImageGIF($img,\
    \ '_' . $file);\n\nbreak;\n\n}\n\nImageDestroy($watermark);\n\nImageDestroy($img);\n\
    \n}\n\nreadfile(\"_\" . $file);\n\n}\n```\n\n第一步是获取两个参数：文件名和最大宽度。然后检查该文件是否存在缓存版本。在本例中，文件名前加了一个下划线以指示该文件已被缓存。我们还可以包含此图像的宽度信息。这将允许我们缓存同一图像的多个版本。例如，一个用于缩略图，另一个用于预览。如果缓存文件缺失，脚本会根据需要将图像缩放到最大尺寸，然后添加水印。在此例中，三个`Image...()`函数使用了一个额外参数，该参数会导致图像被保存到磁盘，而不是返回给客户端。最后一步是从磁盘读取图像文件并将其发送给客户端。\n\
    \n# 第 9 章\n\n# 正则表达式\n\nPHP 通常被描述为一种模板语言，其中 HTML 部分和脚本混合在一起，以生成供浏览器渲染的 HTML 文档。随着网络技术的发展，PHP\
    \ 被用于生成其他类型的内容（JSON，参见第 14 章；图像，参见第 8 章等），PHP 脚本中包含的内嵌 HTML 部分越来越少。相反，脚本会从磁盘或数据库读取模板，并在将内容发送给客户端之前对其执行字符串替换。\n\
    \n简单的字符串替换可以使用`str_replace()`函数完成，但此函数会将一个固定的字符串替换为另一个不同的字符串，除非使用该函数的`str_ireplace()`版本，否则替换是区分大小写的。通过使用`str_pos()`和`substr()`函数可以创建其他类型的逻辑，但这通常会导致创建难以维护的复杂逻辑，并且由于它是用\
    \ PHP 编写的，可能不是最高效的资源利用方式。\n\n使用正则表达式函数，可以用很少的代码行实现高级的搜索和/或替换功能。正则表达式的语法非常强大，但有时可能难以理解。\n\
    \n在 PHP 的早期版本中，正则表达式由几个系统函数组成：`ereg()`、`eregi()`、`ereg_replace()` 和 `eregi_replace()`。这些函数在\
    \ PHP 5.3 中被弃用，并在 PHP 7.0 中被完全移除。这些函数被一个更强大的库所取代，称为 Perl 兼容正则表达式（PCRE）。PCRE 库随\
    \ PHP 源码一起发布，并且在 Linux、OSX 和 Windows 上，大多数 PHP 发行版默认启用它。\n\n正则表达式的核心是一个描述表达式的模式或字符序列。\n\
    \n该表达式由多个组件构成，称为元字符、字符类、子模式、限定符和分支。\n\n元字符是一个具有特殊表达式意义的常规字符。它可以是一个转义字符，能够改变其后跟随字符的意义。反斜杠`\\\
    `字符用作转义字符，通过在字符`n`前添加反斜杠`\\n`，它会将字符`n`转换为换行符。它也可以用于将元字符转换为常规字符，例如`\\(`或`\\)`等。表\
    \ 9-1 显示了受支持的元字符的完整列表。\n\n© Frank M. Kromann 2016  \nF.M. Kromann, *PHP and MySQL\
    \ Recipes*, DOI 10.1007/978-1-4842-0605-8_9\n\n## 第 9 章 ■ 正则表达式\n\n### 表 9-1.\
    \ 元字符\n\n| 字符 | 描述 |\n|-----------|-------------|\n| `\\` | 转义字符 |\n| `^` | 匹配字符串或行的开头\
    \ |\n| `$` | 匹配字符串或行的结尾 |\n| `[` | 字符类起始符 |\n| `]` | 字符类结束符 |\n| `(` | 子模式起始符\
    \ |\n| `)` | 子模式结束符 |\n| `.` | 匹配任意单个字符 |\n| `*` | 限定符，重复 0 次或多次 |\n| `+` | 限定符，重复\
    \ 1 次或多次 |\n| `{` | 限定符范围起始符 |\n| `}` | 限定符范围结束符 |\n| `?` | 允许模式存在与否 |\n\n字符类由方括号`[]`定义。它可以定义一个字符列表或范围。`[abc]`将匹配字符\
    \ a、b 或 c 中的任意一个，而`[a-z]`将匹配 a 到 z 之间的任意字符。字符类将匹配主题字符串中的单个字符，但它们可以与重复限定符一起使用，以匹配由该字符类定义的任意数量的字符。\n\
    \n子表达式或子模式使用常规圆括号`()`创建，既用于分组，也用于提取模式中的特定部分以便进一步使用。\n"
- fmt: "# Regular Expressions\n\nFinally the qualifiers are used to indicate that\
    \ something is repeated. The asterisk `*` indicates 0 or more repetitions, the\
    \ plus `+` indicates 1 or more repetitions, and with the use of curly brackets\
    \ `{}` you can specify either a fixed number of repetitions or a range like `{3,7}`,\
    \ which will take the pattern before the qualifier and allow repetition between\
    \ 3 and 7 times. The asterisk and plus are short for `{0,}` and `{1,}` indicating\
    \ 0 or more and 1 or more. The same way the question mark could be written as\
    \ `{0,1}` meaning 0 or 1 of the preceding element.\n\nThe repetition qualifiers\
    \ can be used after a single character as `a{1,3}` indicates a string with 1,\
    \ 2, or 3 a’s.\n\nWhen used after a character class `[^\"]*` it means that the\
    \ class defines any character but the double quotes and is repeated 0 or more\
    \ times. And if used with a subpattern `([a-z0-9]+\\.){2,4}`, it indicates that\
    \ the pattern must match a string of 2 to 4 sections where each section contains\
    \ 1 or more characters from a-z or the numbers 0-9, and each section is ended\
    \ with a period.\n\nThere are three metacharacters, as listed in Ta[ble 9-2](#index_split_004.html#p229),\
    \ that can be used inside a character class. Besides the general escape character\
    \ it’s the `^` for negation and the `-` for ranges.\n\n**Table 9-2.** Metacharacters\
    \ in a character class\n\n| Character | Description                          \
    \                                                                  |\n|-----------|--------------------------------------------------------------------------------------------------------|\n\
    | `\\`       | General escape character                                      \
    \                                         |\n| `^`       | Negate. When used as\
    \ the first character in a character class the class will match any character\
    \ but the one listed in the class |\n| `-`       | Range separator           \
    \                                                                            \
    \ |\n\n## Chapter 9 ■ Regular Expressions\n\nThere are a number of characters\
    \ that gives a special meaning when they are preceded by the escape character.\
    \ Some of these are listed in Ta[ble 9-3](#index_split_004.html#p230). Please\
    \ see the PHP documentation for a full list:\n\n[http://php.net/manual/en/regexp.reference.escape.php](http://php.net/manual/en/regexp.reference.escape.php)\n\
    \n**Table 9-3.** Special characters\n\n| Character | Description             \
    \                                                    |\n|-----------|-----------------------------------------------------------------------------|\n\
    | `\\b`      | A word boundary. This can be a space, a period, or other characters.\
    \          |\n| `\\d`      | A decimal digit                                 \
    \                            |\n| `\\D`      | Any character that is not a decimal\
    \ digit                                     |\n| `\\n`      | New line       \
    \                                                              |\n| `\\r`    \
    \  | Carriage return                                                         \
    \    |\n| `\\t`      | Tab                                                   \
    \                       |\n| `\\s`      | A whitespace character (space, newline,\
    \ tab, etc.)                            |\n| `\\S`      | A character that is\
    \ not a whitespace character                                |\n\nThis concludes\
    \ the brief description of the building blocks of a regular expression. In practice\
    \ there is a bit more to it. The expression is typically placed between two slashes\
    \ and when used in PHP you also need to place the entire expression in quotes\
    \ to create a string. In JavaScript it’s not necessary to create the expression\
    \ as a string as the language natively supports the regular expression. A regular\
    \ expression that matches any instance of the word `new` is written like this:\
    \ `/new/`.\n\nAlthough the `/` is commonly used as the delimiter it is also valid\
    \ to use a hash sign (`#`), plus (`+`), and percentage (`%`). `/new/`, `#new#`,\
    \ `+new+` and `%new%` are all the same regular expression.\n\nOne benefit of using\
    \ different delimiters is it eliminates the need to use the escape character.\
    \ If you want to create a regular expression that matches a specific protocol\
    \ like `http://` it would be written as this when the `/` delimiter is used:\n\
    \n```\n/http:\\/\\/(.*)/\n```\n\nAnd by using the `#` delimiter it would look\
    \ like this:\n\n```\n#http://(.*)#\n```\n\nThis is perhaps a bit more readable\
    \ but both provide the exact same result.\n\nIn addition to the building blocks\
    \ of regular expressions there are a couple of modifiers. These are identified\
    \ by characters placed after the closing delimiter (`/`). In PHP there are a number\
    \ of modifiers that can be used to change how the expression works. Ta[ble 9-4](#index_split_004.html#p230)\
    \ lists some of these. A full list can be found here:\n\n[http://php.net/manual/en/reference.pcre.pattern.modifiers.php](http://php.net/manual/en/reference.pcre.pattern.modifiers.php)\n\
    \n**Table 9-4.** Modifiers\n\n| Modifier | Description                       \
    \                                                                            \
    \                                                                            \
    \                  |\n|----------|-------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|\n\
    | `i`      | Make the pattern case insensitive.                              \
    \                                                                            \
    \                                                                 |\n| `m`   \
    \   | Treat the subject as a multiline subject. Without this modifier the pattern\
    \ will be treated as a single line string where `^` and `$` will match the beginning\
    \ and ending of the string, even if the string contains new line characters. If\
    \ the `m` modifier is used `^` and `$` will match the beginning and end of each\
    \ line in the string. |\n| `s`      | Changes how the dot (`.`) metacharacter\
    \ works. Without this modifier the dot will not match newline characters.    \
    \                                                                            \
    \              |\n| `u`      | This modifier will cause the pattern and subject\
    \ strings to be treated as UTF-8 encoded strings.                            \
    \                                                                            \
    \    |\n\n## Chapter 9 ■ Regular Expressions\n\nWith the expression from before\
    \ `/new/` we can add a modifier that will match all possible upper- and lowercase\
    \ versions of the word `new` by assigning the `i` modifier `/new/i`.\n\n## Recipe\
    \ 9-1. Format Validation\n\n### Problem\n\nRegular expressions can be used in\
    \ both PHP and Javascript to validate the input from a user. Validating the input\
    \ in the browser with Javascript can be used to prevent the submission of a form\
    \ with invalid data, but the data should still be validated on the server side\
    \ as there is no guarantee that the client validated the content before submitting\
    \ the request. The post could come from a non-browser-based client.\n\nHow can\
    \ we use regular expressions to validate things like e-mail addresses or phone\
    \ numbers?\n\n### Solution\n\nAny content validation starts with a definition\
    \ of the pattern to validate. An e-mail address will always contain some letters\
    \ and/or numbers followed by the `@` character, followed by more letters and numbers\
    \ then a dot and some more letters. A simple validation pattern can be created\
    \ with a character class, the `@` character, another character class, a dot, and\
    \ a final character class.\n\n```\n/[a-zA-Z0-9]+@[a-zA-Z0-9]+\\.[a-zA-Z0-9]+/\n\
    ```\n\nThis can be made a bit shorter by using the case insensitive modifier.\n\
    \n```\n/[a-z0-9]+@[a-z0-9]+\\.[a-z0-9]+/i\n```\n\nIn this example we allow characters\
    \ from a-z and A-Z as well as numbers in all three character classes and the `+`\
    \ sign after each indicates that we need at least one character from the character\
    \ class in each of these locations.\n\nNot too long ago the top-level domain (the\
    \ characters after the last dot) was two or three characters but lately top-level\
    \ domains with more letters such as f.eks. `.info`, `.software`, and other longer\
    \ names require that more characters are allowed.\n\nA phone number also follows\
    \ some patterns. Depending of the country those patterns might vary a bit.\n\n\
    A U.S. phone number is usually described with the country code `1` followed by\
    \ 10 digits. These digits are often separated with spaces, dashes, parentheses,\
    \ etc., to increase readability.\n\nThe pattern to validate a U.S. phone number\
    \ could look something like this: `1?\\d{7}|\\d{10}` this will allow an optional\
    \ leading `1` for the country code and 7 or 10 digits. This format will not allow\
    \ the user to enter spaces or other characters and we could allow for that by\
    \ extending the expression to `1?\\d{7}|\\d{10}|(\\d{3} \\d{3} \\d{4})`, or written\
    \ as the full regular expression:\n\n```\n/1?\\d{7}|\\d{10}|(\\d{3} \\d{3} \\\
    d{4})/\n```\n\nThis pattern will allow a string that starts with an optional one\
    \ followed by one of 3 options; 7 digits, 10 digits or 10 digits with 3 spaces\
    \ in the format `### ### ####`.\n\n### How It Works\n\nIn this first example we\
    \ take the input from a post request that contains a value with the name `e-mail`.\
    \ Only if the field contains a valid e-mail address will it be added to the database.\n\
    \n## Chapter 9 ■ Regular Expressions\n\n```php\n<?php\n\n// 9_1.php\n\nfunction\
    \ AddEmail($email) {\n\n  // do the database query.\n\n  echo \"$email was added\
    \ to the database\\n\";\n\n}\n\nif ($_POST['email']) {\n\n  if (preg_match(\"\
    /[a-z0-9]+@[a-z0-9]+\\.[a-z0-9]+/i\", $_POST['email'])) {\n\n    AddEmail($_POST['email']);\n\
    \n  }\n\n}\n```\n\nIt is assumed that the function `AddEmail()` will take an e-mail\
    \ address and add a row to a database table.\n\nThe function of interest in this\
    \ example is the `preg_match()` function. This function takes at least two parameters\
    \ where the first is the pattern and the second is the subject. If the subject\
    \ matches the pattern it will return `true`; otherwise it will return `false`."
  raw: 'Finally the qualifiers are used to indicate that something is repeated. The
    asterisk * indicates 0 or more repetitions, the plus + indicates 1 or more repetitions,
    and with the use of curly brackets {} you can specify either a fixed number of
    repetitions or a range like {3,7}, which will take the pattern before the qualifier
    and allow repetition between 3 and 7 times. The asterisk and plus are short for
    {0,} and {1,} indicating 0


    or more and 1 or more. The same way the question mark could be written as {0,1}
    meaning 0 or 1 of the preceding element.


    The repetition qualifiers can be used after a single character as a{1,3} indicates
    a string with 1, 2, or 3 a’s.


    When used after a character class [^”]* it means that the class defines any character
    but the double quotes and is repeated 0 or more times. And if used with a subpattern
    ([a-z0-9]+\.){2,4}, it indicates that the pattern must match a string of 2 to
    4 sections where each section contains 1 or more characters from a-z or the numbers
    0-9, and each section is ended with a period.


    There are three metacharacters, as listed in Ta[ble 9-2](#index_split_004.html#p229)
    , that can be used inside a character class. Besides the general escape character
    it’s the ^ for negation and the – for ranges.


    ***Table 9-2.** Metacharacters in a character class*


    \


    General escape character


    ^


    Negate. When used as the first character in a character class the class will match
    any character but the one listed in the class


    -


    Range separator


    CHAPTER 9 ■ REGULAR EXPRESSIONS


    There are a number of characters that gives a special meaning when they are preceded
    by the escape character. Some of these are listed in Ta[ble 9-3](#index_split_004.html#p230)
    . Please see the PHP documentation for a full list:


    [http://php.net/manual/en/regexp.reference.escape.php.](http://php.net/manual/en/regexp.reference.escape.php)


    ***Table 9-3.** Special characters*


    \b


    A word boundary. This can be a space, a period, or other characters.


    \d


    A decimal digit


    \D


    Any character that is not a decimal digit


    \n


    New line


    \r


    Carriage return


    \t


    Tab


    \s


    A whitespace character (space, newline, tab, etc.)


    \S


    A character that is not a whitespace character


    This concludes the brief description of the building blocks of a regular expression.
    In practice there is a bit more to it. The expression is typically placed between
    two slashes and when used in PHP you also need to place the entire expression
    in quotes to create a string. In JavaScript it’s not necessary to create the expression
    as a string as the language natively supports the regular expression. A regular
    expression that matches any instance of the word ‘new’ is written like this: /new/.


    Although the / is commonly used as the delimiter it is also valid to use a hash
    sign (#), plus (+), and percentage (%). /new/, #new#, +new+ and %new% are all
    the same regular expression.


    One benefit of using different delimiters is it eliminates the need to use the
    escape character. If you want to create a regular expression that matches a specific
    protocol like http:// it would be written as this when the / delimiter is used:


    /http:\/\/(.*)/


    And by using the # delimiter it would look like this:


    #http://(.*)#


    This is perhaps a bit more readable but both provide the exact same result.


    In addition to the building blocks of regular expressions there are a couple of
    modifiers. These are identified by characters placed after the closing delimiter
    (/). In PHP there are a number of modifiers that can be used to change how the
    expression works. Ta[ble 9-4](#index_split_004.html#p230) lists some of these.
    A full list can be found here:


    [http://php.net/manual/en/reference.pcre.pattern.modifiers.php .](http://php.net/manual/en/reference.pcre.pattern.modifiers.php)


    ***Table 9-4.** Modifiers*


    i


    Make the pattern case insensitive.


    m


    Treat the subject as a multiline subject. Without this modifier the pattern will
    be treated as a single line string where ^ and $ will match the beginning and
    ending of the string, even if the string contains new line characters. If the
    m modifier is used ^ and $ will match the beginning and end of each line in the
    string.


    s


    Changes how the dot (.) metacharacter works. Without this modifier the dot will
    not match newline characters.


    u


    This modifier will cause the pattern and subject strings to be treated as UTF-8
    encoded strings.


    CHAPTER 9 ■ REGULAR EXPRESSIONS


    With the expression from before /new/ we can add a modifier that will match all
    possible upper- and lowercase versions of the word new by assigning the I modifier
    /new/i.


    Recipe 9-1\. Format Validation


    Problem


    Regular expressions can be used in both PHP and Javascript to validate the input
    from a user. Validating the input in the browser with Javascript can be used to
    prevent the submission of a form with invalid data, but the data should still
    be validated on the server side as there is no guarantee that the client validated
    the content before submitting the request. The post could come from a non-browser-based
    client.


    How can we use regular expressions to validate things like e-mail addresses or
    phone numbers?


    Solution


    Any content validation starts with a definition of the pattern to validate. An
    e-mail address will always contain some letters and/or numbers followed by the
    @ character, followed by more letters and numbers then a dot and some more letters.
    A simple validation pattern can be created with a character class, the @


    character, another character class, a dot, and a final character class.


    /[a-zA-Z0-9]+@[a-zA-Z0-9]+\.[a-zA-Z0-9]+/


    This can be made a bit shorter by using the case insensitive modifier.


    /[a-z0-9]+@[a-z0-9]+\.[a-z0-9]+/i


    In this example we allow characters from a-z and A-Z as well as numbers in all
    three character classes and the + sign after each indicates that we need at least
    one character from the character class in each of these locations.


    Not too long ago the top-level domain (the characters after the last dot) was
    two or three characters but lately top-level domains with more letters such as
    f.eks. .info, .software, and other longer names require that more characters are
    allowed.


    A phone number also follows some patterns. Depending of the country those patterns
    might vary a bit.


    A U.S. phone number is usually described with the country code 1 followed by 10
    digits. These digits are often separated with spaces, dashes, parentheses, etc.,
    to increase readability.


    The pattern to validate a U.S. phone number could look something like this: 1?\d{7}|\d{10}
    this will allow an optional leading 1 for the country code and 7 or 10 digits.
    This format will not allow the user to enter spaces or other characters and we
    could allow for that by extending the expression to 1?\d{7}|\d{10}|(\d{3} \d{3}
    \d{4}), or written as the full regular expression:


    /1?\d{7}|\d{10}|(\d{3} \d{3} \d{4})/


    This pattern will allow a string that starts with an optional one followed by
    one of 3 options; 7 digits, 10


    digits or 10 digits with 3 spaces in the format ### ### ####.


    How it Works


    In this first example we take the input from a post request that contains a value
    with the name e-mail. Only if the field contains a valid e-mail address will it
    be added to the database.


    CHAPTER 9 ■ REGULAR EXPRESSIONS


    <?php


    // 9_1.php


    function AddEmail($email) {


    // do the database query.


    echo "$email was added to the database\n";


    }


    if ($_POST[''email'']) {


    if (preg_match("/[a-z0-9]+@[a-z0-9]+\.[a-z0-9]+/i", $_POST[''email''])) {


    AddEmail($_POST[''email'']);


    }


    }


    It is assumed that the function AddEmail() will take an e-mail address and add
    a row to a database table.


    The function of interest in this example is the preg_match() function. This function
    takes at least two parameters where the first is the pattern and the second is
    the subject. If the subject matches the pattern it will return true; otherwise
    it will return false.'
  trans: "\n# 正则表达式\n\n最后，限定符用于表示某个内容被重复。星号 `*` 表示重复 0 次或更多次，加号 `+` 表示重复 1 次或更多次，而使用花括号\
    \ `{}` 可以指定一个固定的重复次数或一个范围（例如 `{3,7}`），该范围会作用于限定符之前的模式，并允许重复 3 到 7 次。星号和加号分别是 `{0,}`\
    \ 和 `{1,}` 的简写形式，分别表示 0 次或更多次以及 1 次或更多次。同样，问号可以写为 `{0,1}`，表示前面的元素出现 0 次或 1 次。\n\
    \n重复限定符可以用在单个字符之后，例如 `a{1,3}` 表示一个包含 1、2 或 3 个 `a` 的字符串。\n\n当用于字符类之后时，例如 `[^\"\
    ]*`，它表示该类定义了除双引号之外的任何字符，并且可以重复 0 次或更多次。如果与子模式一起使用，例如 `([a-z0-9]+\\.){2,4}`，则表示该模式必须匹配一个包含\
    \ 2 到 4 个部分的字符串，其中每个部分包含 1 个或多个来自 a-z 或数字 0-9 的字符，并且每个部分以句点结尾。\n\n有三个元字符（如表 9-2\
    \ 所列）可以在字符类内部使用。除了通用转义字符之外，还有用于取反的 `^` 和用于范围的 `-`。\n\n**表 9-2.** 字符类中的元字符\n\n\
    | 字符 | 描述                                                                    \
    \                       |\n|------|------------------------------------------------------------------------------------------------|\n\
    | `\\`  | 通用转义字符                                                             \
    \                      |\n| `^`  | 取反。当作为字符类中的第一个字符使用时，该类将匹配除列表中列出的字符之外的任何字符 \
    \                      |\n| `-`  | 范围分隔符                                     \
    \                                                |\n\n## 第 9 章 ■ 正则表达式\n\n有许多字符在它们前面加上转义字符时会获得特殊含义。其中一些已列在表\
    \ 9-3 中。请参阅 PHP 文档以获取完整列表：\n\n[`php.net/manual/en/regexp.reference.escape.php`](http://php.net/manual/en/regexp.reference.escape.php)\n\
    \n**表 9-3.** 特殊字符\n\n| 字符 | 描述                                               \
    \                                          |\n|------|----------------------------------------------------------------------------------------------|\n\
    | `\\b` | 单词边界。可以是空格、句点或其他字符。                                                \
    \       |\n| `\\d` | 十进制数字                                                   \
    \                                  |\n| `\\D` | 任何非十进制数字的字符                  \
    \                                                       |\n| `\\n` | 换行符     \
    \                                                                            \
    \      |\n| `\\r` | 回车符                                                      \
    \                                 |\n| `\\t` | 制表符                           \
    \                                                            |\n| `\\s` | 空白字符（空格、换行符、制表符等）\
    \                                                             |\n| `\\S` | 非空白字符\
    \                                                                            \
    \         |\n\n至此，关于正则表达式构建块的简要描述就结束了。在实践中，情况要更复杂一些。表达式通常放在两个斜杠之间，当在 PHP 中使用时，你还需要将整个表达式放在引号中以创建一个字符串。在\
    \ JavaScript 中，由于该语言原生支持正则表达式，因此无需将表达式创建为字符串。匹配单词 `new` 的任何实例的正则表达式是这样写的：`/new/`。\n\
    \n虽然 `/` 是常用的分隔符，但使用井号（`#`）、加号（`+`）和百分号（`%`）也是有效的。`/new/`、`#new#`、`+new+` 和 `%new%`\
    \ 都是相同的正则表达式。\n\n使用不同分隔符的一个好处是免去了使用转义字符的需要。如果你想创建一个匹配特定协议（如 `http://`）的正则表达式，当使用\
    \ `/` 分隔符时，它会写成这样：\n\n```\n/http:\\/\\/(.*)/\n```\n\n而使用 `#` 分隔符时，它会看起来像这样：\n\n\
    ```\n#http://(.*)#\n```\n\n这可能更具可读性，但两者提供的结果完全相同。\n\n除了正则表达式的构建块之外，还有一些修饰符。这些修饰符由放置在结束分隔符（`/`）后面的字符标识。在\
    \ PHP 中，有许多修饰符可用于改变表达式的工作方式。表 9-4 列出了其中一部分。完整列表可以在这里找到：\n\n[`php.net/manual/en/reference.pcre.pattern.modifiers.php`](http://php.net/manual/en/reference.pcre.pattern.modifiers.php)\n\
    \n**表 9-4.** 修饰符\n\n| 修饰符 | 描述                                               \
    \                                                                            \
    \                                                                            \
    \                      |\n|--------|----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|\n\
    | `i`    | 使模式不区分大小写。                                                        \
    \                                                                            \
    \                                                                         |\n\
    | `m`    | 将主题视为多行文本。如果没有此修饰符，模式将被视为单行字符串，其中 `^` 和 `$` 将匹配字符串的开头和结尾，即使字符串包含换行符也是如此。如果使用了\
    \ `m` 修饰符，`^` 和 `$` 将匹配字符串中每一行的开头和结尾。                           |\n| `s`    |\
    \ 改变点（`.`）元字符的工作方式。如果没有此修饰符，点将不匹配换行符。                                        \
    \                                                                            \
    \                                |\n| `u`    | 此修饰符将使模式和主题字符串被视为 UTF-8 编码的字符串。\
    \                                                                            \
    \                                                                            \
    \                |\n\n## 第 9 章 ■ 正则表达式\n\n对于之前的表达式 `/new/`，我们可以添加一个修饰符，通过指定 `i`\
    \ 修饰符 `/new/i`，来匹配单词 `new` 的所有可能大小写版本。\n\n## 配方 9-1. 格式验证\n\n### 问题\n\n正则表达式可以同时在\
    \ PHP 和 Javascript 中使用，以验证来自用户的输入。在浏览器中使用 Javascript 验证输入可以防止提交带有无效数据的表单，但数据仍应在服务器端进行验证，因为无法保证客户端在提交请求前验证了内容。该\
    \ POST 请求可能来自非基于浏览器的客户端。\n\n我们如何使用正则表达式来验证诸如电子邮件地址或电话号码之类的内容？\n\n### 解决方案\n\n\
    任何内容验证都始于要验证的模式的定义。电子邮件地址将始终包含一些字母和/或数字，后跟 `@` 字符，然后是更多的字母和数字，接着是一个句点和更多的字母。可以使用字符类、`@`\
    \ 字符、另一个字符类、一个句点以及最后一个字符类来创建一个简单的验证模式。\n\n```\n/[a-zA-Z0-9]+@[a-zA-Z0-9]+\\.[a-zA-Z0-9]+/\n\
    ```\n\n通过使用不区分大小写的修饰符，这可以变得更简短一些。\n\n```\n/[a-z0-9]+@[a-z0-9]+\\.[a-z0-9]+/i\n\
    ```\n\n在这个示例中，我们允许在所有三个字符类中使用 a-z 和 A-Z 的字符以及数字，每个字符类后面的 `+` 号表示我们在每个这些位置至少需要一个来自该字符类的字符。\n\
    \n在不久之前，顶级域名（最后一个句点之后的字符）是两到三个字符，但近来，包含更多字母的顶级域名，例如 `.info`、`.software` 和其他更长的名称，要求允许更多字符。\n\
    \n电话号码也遵循一些模式。根据国家/地区的不同，这些模式可能会略有不同。\n\n美国电话号码通常用国家代码 `1` 后跟 10 位数字来描述。这些数字通常用空格、破折号、括号等分隔，以增加可读性。\n\
    \n用于验证美国电话号码的模式可能类似于这样：`1?\\d{7}|\\d{10}`，这将允许一个可选的领先 `1` 作为国家代码，以及 7 或 10 位数字。这种格式不允许用户输入空格或其他字符，我们可以通过将表达式扩展为\
    \ `1?\\d{7}|\\d{10}|(\\d{3} \\d{3} \\d{4})` 来允许这些，或者写成完整的正则表达式：\n\n```\n/1?\\\
    d{7}|\\d{10}|(\\d{3} \\d{3} \\d{4})/\n```\n\n此模式将允许一个以可选的前导 1 开头的字符串，后跟以下三种选项之一：7\
    \ 位数字、10 位数字，或者以 `### ### ####` 格式表示并包含 3 个空格的 10 位数字。\n\n### 工作原理\n\n在第一个示例中，我们从包含名为\
    \ `e-mail` 的值的 POST 请求中获取输入。仅当该字段包含有效的电子邮件地址时，它才会被添加到数据库中。\n\n## 第 9 章 ■ 正则表达式\n\
    \n```php\n<?php\n\n// 9_1.php\n\nfunction AddEmail($email) {\n\n  // 执行数据库查询。\n\
    \n  echo \"$email 已添加到数据库\\n\";\n\n}\n\nif ($_POST['email']) {\n\n  if (preg_match(\"\
    /[a-z0-9]+@[a-z0-9]+\\.[a-z0-9]+/i\", $_POST['email'])) {\n\n    AddEmail($_POST['email']);\n\
    \n  }\n\n}\n```\n\n假设 `AddEmail()` 函数将接收一个电子邮件地址并向数据库表中添加一行。\n\n这个示例中我们关注的函数是\
    \ `preg_match()` 函数。该函数至少接受两个参数，第一个是模式，第二个是主题。如果主题与模式匹配，它将返回 `true`；否则返回 `false`。\n"
- fmt: 'With the expression used above it would be possible for the user to enter
    more than the valid e-mail address and get that full string inserted into the
    database. This can be prevented by using the third parameter, called `$matches`.
    This is used to return the actual values that match the pattern. `$matches` will
    return an array of all the strings that match. So instead of calling the `AddEmail()`
    function with the input provided by the user we take the value that is returned
    from the `preg_match()` function.


    ```

    <?php


    // 9_2.php


    function AddEmail($email) {


    // do the database query.


    echo "$email was added to the database\n";


    }


    if ($_POST[''email'']) {


    if (preg_match("/[a-z0-9]+@[a-z0-9]+\.[a-z0-9]+/i",


    $_POST[''email''],


    $matches)) {


    AddEmail($matches);


    }


    }

    ```


    With this code the user can write “email@example.com,” “My Name email@example.com,”
    or “My Name <email@example.com>” and the regular expression will pick out the
    e-mail address portion and add just that to the database.


    In the next example we will look closer at the phone number example from before.
    With the pattern `/1?\d{7,10}|(\d{3} \d{3} \d{4})/` there is no need to use the
    `I` modifier as only digital digits are of interest, but it might be useful to
    get rid of anything that is not a digit before inserting the number into the database.


    This can be done with the `preg_replace()` function. This function works a bit
    like `str_replace()` but instead of matching one or more predefined strings it
    uses a regular expression to find the sections of the string to replace. If we
    assume the user can enter numbers, spaces, dots, dashes, and parentheses in the
    phone number field we could get rid of those with the use of the `str_replace()`
    function by doing something like this:


    ```

    <?php


    // 9_3.php


    $phone = str_replace(['' '',''.'',''-'',''('','')''],


    ['''','''','''','''',''''],


    $_POST[''phone'']);

    ```


    To do the same operation with a regular expression, we use a character class that
    defines anything that is not a digit `[^\d]` and replace that with the empty string.
    The regular expression will get rid of anything that is not a digit. In the example
    above it’s only the special characters listed in the first array that will be
    removed.


    ```

    <?php


    // 9_4.php


    $phone = preg_replace("/[^\d]/", "", $_POST[''phone'']);

    ```


    With all the non-digits removed it’s easy to perform the validation to check if
    the user entered enough digits for the number to be a valid U.S. phone number.
    That would require 10 or 11 digits with the first digit being a 1. Checking the
    length of the string alone will not work but the check could be done without regular
    expressions:


    ```

    <?php


    // 9_5.php


    $phone = preg_replace("/[^\d]/", "", $_POST[''phone'']);

    if (strlen($phone) == 10 || (strlen($phone) == 11 && $phone[0] == ''1'')) {


    echo "$phone is a valid US number\n";


    }

    ```


    To do the same check with a regular expression would be a bit shorter:


    ```

    <?php


    // 9_6.php


    $phone = preg_replace("/[^\d]/", "", $_POST[''phone'']);

    if (preg_match("/^1?\d{10}$/", $phone)) {


    echo "$phone is a valid US number\n";


    }

    ```


    Note that the metacharacters `^`, `?`, and `$` are used in the pattern. The `^`
    makes a thematic start at the beginning of the line, and then look for an optional
    `1` and then finally 10 digits at the end of the line. Without the `^` in the
    beginning and `$` at the end, the pattern could match other numbers that have
    more than 10 or 11 digits. This would be the case for the string of numbers `00`
    **`13215554444`** `99` that would be matched by the pattern `/1?\d{10}/` as indicated
    with the bold digits.


    ## Recipe 9-2. SubPatterns


    ### Problem


    In the previous example the branching (`|`) was used to define multiple options
    of content, but how can the parser know when the last option ends?


    ### Solution


    The solution is subpatterns. These are defined surrounding the patterns with parentheses.
    To look for multiple phrases: new car, new house, or just the word new by itself
    we could create a pattern that looks like this:


    `/new|new car|new house/`


    This can be written more efficiently by using subpatters. The word new is used
    in the beginning of all three branches so that can be pulled outside of a subbranch
    like this:


    `/new( car| house|)/`


    Note that there is nothing between the last pipe and the closing parentheses.
    This allows an empty branch in the subpattern. Putting the empty string at the
    beginning of the subpattern will not work.


    ### How it Works


    The next example shows how a regular expression can be used to scan a text and
    find all the instances of the phrases new, new car, and new house. The approach
    here is to start with the `preg_match()` function used in the previous examples.


    ```

    <?php


    // 9_7.php


    $txt = "I got a new car and I''m now looking for a new house";

    if (preg_match("/new(( car| house)|)/", $txt, $matches) {


    print_r($matches);


    }

    ```


    The output of this is an array of three elements. The first element with index
    0 corresponds to the string found by the entire pattern. The following two elements
    correspond to the matching string for each of the subpatterns.


    ```

    Array


    (


    [0] => new car


    [1] => car


    [2] => car


    )

    ```


    This shows that the `preg_match()` function only returns the first instance found.
    It is possible to pass a parameter with a character count used as an offset for
    where the search should start.


    To get all the strings that matche the pattern in the subject string we can use
    the function `preg_match_all()` instead. This function will return an array of
    arrays, where the first array contains all the strings found matching the full
    pattern and then an array for each of the subpatterns.


    ```

    <?php


    // 9_8.php


    $txt = "I got a new car and I''m now looking for a new house";

    if (preg_match_all("/new(( car| house)|)/", $txt, $matches)) {


    print_r($matches);


    }

    ```


    The output looks like this:


    ```

    Array


    (


    [0] => Array


    (


    [0] => new car


    [1] => new house


    )


    [1] => Array


    (


    [0] => car


    [1] => house


    )


    [2] => Array


    (


    [0] => car


    [1] => house


    )


    )

    ```


    Having the matches for each of the subpatterns as well as the full pattern, is
    useful as it’s not necessary to call the `preg_match()` function multiple times
    to get this information. In the next example a list of e-mail addresses with varying
    amounts of information is used to generate two lists. The first is a list of names
    and the second is a list of e-mail addresses. Starting with a regular expression
    that will match any of the lines could look like this: `/^"?[a-z0-9, ]*"? ?<[a-z0-9]+@[a-z0-9]+.[a-z0-9]+>$/mi`.
    This pattern does not contain any subpatterns so the returned array will be a
    list of the matches to the full pattern. Adding a couple of subpatterns makes
    it possible to separate out the name and e-mail portions: `/^"?([a-z0-9, ]*) ?<([a-z0-9]+@[a-z0-9]+.[a-z0-9]+)>$/mi`.
    The subpattern for the name portion uses the `*` meta character that specifies
    0 or more repetitions of the character class and the two quotation marks and the
    space between name and e-mail address are made optional with the question marks.


    ```

    <?php


    // 9_9.php


    $emails = <<<HEREDOC


    Joe Smith <smithj@example.com>


    "Scott, Colin" <scottc@example.com>


    <new@example.com>


    some other content


    HEREDOC;


    if (preg_match_all(


    ''/^"?([a-z0-9, ]*)"? ?<([a-z0-9]+@[a-z0-9]+.[a-z0-9]+)>$/mi'', $emails, $matches))
    {


    echo "names: " . implode(", ", $matches[1]) . "\n";

    echo "emails: " . implode(", ", $matches[2]) . "\n";


    }

    ```


    The output is just two lines of comma-separated lists.


    ```

    names: Joe Smith , Scott, Colin,


    emails: smithj@example.com, scottc@example.com, new@example.com

    ```


    One of the e-mail addresses in the list does not have a name. That’s why the output
    for the names has a trailing comma. All the arrays in the `$matches` variable
    will have the same number of elements.'
