    \ $i++; } while ($i < 10); // 0-9\n```\n\n### For 循环\n\n`for` 循环用于按特定次数执行代码块。它使用三个参数。第一个参数初始化一个计数器，并在循环开始前始终执行一次。第二个参数包含循环的条件，在每次迭代前检查。第三个参数包含计数器的增量，在每次迭代结束时执行。\n\
    \n```\nfor ($i = 0; $i < 10; $i++) { echo $i; } // 0-9\n```\n\n`for` 循环有多种变体，因为其中任何一个参数都可以省略。例如，如果省略第一个和第三个参数，它的行为与\
    \ `while` 循环相同。\n\n```\nfor (;$i < 10;) { echo $i++; }\n```\n\n第一个和第三个参数也可以使用逗号运算符（`,`）拆分为多个语句。\n\
    \n```\nfor ($i = 0, $x = 9; $i < 10; $i++, $x--) {\n  echo $x; // 9-0\n}\n```\n\
    \n`sizeof` 函数用于获取数组中的元素数量。结合 `for` 循环，它可以用来遍历数字索引数组。\n\n```\n$a = array(1,2,3);\n\
    \nfor($i = 0; $i < sizeof($a); $i++) {\n  echo $a[$i]; // \"123\"\n}\n```\n\n\
