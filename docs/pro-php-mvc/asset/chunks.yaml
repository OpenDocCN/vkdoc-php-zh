    We add three additional getter/setter properties: layoutView, actionView, and
    willRenderLayoutView/wi llRenderActionView. The layoutView property is a placeholder
    for a layout’s view, the actionView property is a placeholder for the action’s
    view, and the willRenderLayoutView/willRenderActionView properties are flags that
    will be used to disable automatic view rendering.


    Layouts address a problem you might not even have known existed. In terms of interface
    design, a consistent layout is essential for a good user experience. I did say
    that we would ignore (most) interface design, but this is a functional requirement
    of any good application, so we are adding it now.'
  trans: "\n`public function get($key, $default = \"\")`\n\n```\n{\n    if (isset($this->_data[$key]))\n\
    \    {\n        return $this->_data[$key];\n    }\n    return $default;\n}\n\n\
    protected function _set($key, $value)\n{\n    if (!is_string($key) && !is_numeric($key))\n\
    \    {\n        throw new Exception\\Data(\"Key must be a string or a number\"\
    );\n    }\n    $this->_data[$key] = $value;\n}\n\npublic function set($key, $value\
    \ = null)\n{\n    if (is_array($key))\n    {\n        foreach ($key as $_key =>\
    \ $value)\n        {\n            $this->_set($_key, $value);\n        }\n   \
    \     return $this;\n    }\n    $this->_set($key, $value);\n    return $this;\n\
    }\n\npublic function erase($key)\n{\n    unset($this->_data[$key]);\n    return\
    \ $this;\n}\n}\n```\n\n关于 `View` 类，有几个重要事项需要注意。首先，它的构造函数会创建一个 `Template` 实例，后续将使用该实例来解析视图模板。其次，它拥有存储、检索和擦除模板数据键值对的方法，这些数据会提供给模板解析器。你可以将\
    \ `View` 类看作类似缓存驱动器的组件，并结合我们之前看到的模板解析器使用示例。\n\n我们假设视图将通过我们创建的模板解析器进行渲染。如果我们希望实现不同的行为，可以轻松地对这个\
    \ `View` 类进行子类化，用我们自己的逻辑重写 `__construct()` 和 `render()` 方法。不过，这个类确实为模板解析提供了一个便捷的外观模式接口。\n\
    \n> **注意** 我们之前使用的外观设计模式，可以描述为一个类为更复杂的功能集提供简单接口。你可以通过 [`en.wikipedia.org/wiki/Facade_pattern`](http://en.wikipedia.org/wiki/Facade_pattern)\
    \ 了解更多关于外观模式的信息。\n\n## 渲染（Rendering）\n\n`View` 类只完成了自动渲染正确视图所需工作的一半。我们现在需要在一个修改后的\
    \ `Controller` 类中使用它，以便每个动作都能渲染其对应的视图。对 `Controller` 的修改相当广泛，因此我们将逐一审查每个部分。我们从之前\
    \ `Controller` 骨架的一些补充开始，如清单 13-6 所示。\n\n***清单 13-6.*** 完善控制器（Controller）\n\n\
    ```\nnamespace Framework\n{\n    use Framework\\Base as Base;\n    use Framework\\\
    View as View;\n    use Framework\\Registry as Registry;\n    use Framework\\Template\
    \ as Template;\n    use Framework\\Controller\\Exception as Exception;\n\n   \
    \ class Controller extends Base\n    {\n        /**\n         * @readwrite\n \
    \        */\n        protected $_parameters;\n\n        /**\n         * @readwrite\n\
    \         */\n        protected $_layoutView;\n\n        /**\n         * @readwrite\n\
    \         */\n        protected $_actionView;\n\n        /**\n         * @readwrite\n\
    \         */\n        protected $_willRenderLayoutView = true;\n\n        /**\n\
    \         * @readwrite\n         */\n        protected $_willRenderActionView\
    \ = true;\n\n        /**\n         * @readwrite\n         */\n        protected\
    \ $_defaultPath = \"application/views\";\n\n        /**\n         * @readwrite\n\
    \         */\n        protected $_defaultLayout = \"layouts/standard\";\n\n  \
    \      /**\n         * @readwrite\n         */\n        protected $_defaultExtension\
    \ = \"html\";\n\n        /**\n         * @readwrite\n         */\n        protected\
    \ $_defaultContentType = \"text/html\";\n\n        protected function _getExceptionForImplementation($method)\n\
    \        {\n            return new Exception\\Implementation(\"{$method} method\
    \ not implemented\");\n        }\n\n        protected function _getExceptionForArgument()\n\
    \        {\n            return new Exception\\Argument(\"Invalid argument\");\n\
    \        }\n    }\n}\n```\n\n我们增加了三个额外的 getter/setter 属性：`layoutView`、`actionView`，以及\
    \ `willRenderLayoutView`/`willRenderActionView`。`layoutView` 属性是布局视图的占位符，`actionView`\
    \ 属性是动作视图的占位符，而 `willRenderLayoutView`/`willRenderActionView` 属性是用于禁用自动视图渲染的标志位。\n\
    \n布局解决了你可能甚至未曾意识到存在的问题。在界面设计方面，一致的布局对于良好的用户体验至关重要。我之前说过将忽略（大部分）界面设计，但这是任何优秀应用的功能性需求，因此我们现在就添加它。\n"
- fmt: "# Layouts and Views\n\nLayouts are essentially views that are shared. They\
    \ are frames within which the views of individual actions are rendered, and serve\
    \ to reduce repeated HTML across the application’s view files. You can understand\
    \ them better by the process in which they are used.\n\nThe controller, should\
    \ it be required to attempt automatic view rendering, will first render the current\
    \ action’s view, and then the layout’s view. The action’s view and the layout’s\
    \ view are both `View` instances, but the action’s view markup is placed smack-dab\
    \ in the middle of the layout view’s markup. We will now look at the methods responsible\
    \ for rendering the views in **Listing 13-7**.\n\n## Listing 13-7. Render Methods\n\
    \n```\npublic function render()\n{\n    $defaultContentType = $this->getDefaultContentType();\n\
    \    $results = null;\n    $doAction = $this->getWillRenderActionView() && $this->getActionView();\
    \ \n    $doLayout = $this->getWillRenderLayoutView() && $this->getLayoutView();\
    \ \n    try\n    {\n        if ($doAction)\n        {\n            $view = $this->getActionView();\n\
    \            $results = $view->render();\n        }\n        if ($doLayout)\n\
    \        {\n            $view = $this->getLayoutView();\n            $view->set(\"\
    template\", $results);\n            $results = $view->render();\n            header(\"\
    Content-type: {$defaultContentType}\");\n            echo $results;\n        }\n\
    \        else if ($doAction)\n        {\n            header(\"Content-type: {$defaultContentType}\"\
    );\n            echo $results;\n            $this->setWillRenderLayoutView(false);\n\
    \            $this->setWillRenderActionView(false);\n        }\n    }\n    catch\
    \ (\\Exception $e)\n    {\n        throw new View\\Exception\\Renderer(\"Invalid\
    \ layout/template syntax\");\n    }\n}\n\npublic function __destruct()\n{\n  \
    \  $this->render();\n}\n```\n\nThe `__destruct()` method is responsible for calling\
    \ the `render()` method. This means the `render()` method will be called at the\
    \ end of each action’s execution. If `willRenderLayoutView` and `layoutView` are\
    \ true, then the layout will be rendered. The same can be said of the action’s\
    \ view if `willRenderActionView` and `actionView` are true. If both the layout\
    \ and action views are rendered, then the action view’s content is assigned to\
    \ the layout’s template, else the action view’s content is returned to the browser.\
    \ As a precaution against multiple `render()` calls, `willRenderLayoutView` /\
    \ `willRenderActionView` are set to false to prevent rerendering the layout/action\
    \ views.\n\nThe last `Controller` method we need to modify is the `__construct()`\
    \ method, as shown in **Listing 13-8**.\n\n## Listing 13-8. `__construct()` Method\n\
    \n```\npublic function __construct($options = array())\n{\n    parent::__construct($options);\n\
    \    if ($this->getWillRenderLayoutView())\n    {\n        $defaultPath = $this->getDefaultPath();\n\
    \        $defaultLayout = $this->getDefaultLayout();\n        $defaultExtension\
    \ = $this->getDefaultExtension();\n        $view = new View(array(\n         \
    \   \"file\" => APP_PATH.\"/{$defaultPath}/{$defaultLayout}.{$defaultExtension}\"\
    \n        ));\n        $this->setLayoutView($view);\n    }\n    if ($this->getWillRenderLayoutView())\n\
    \    {\n        $router = Registry::get(\"router\");\n        $controller = $router->getController();\n\
    \        $action = $router->getAction();\n        $view = new View(array(\n  \
    \          \"file\" => APP_PATH.\"/{$defaultPath}/{$controller}/{$action}.{$defaultExtension}\"\
    \n        ));\n        $this->setActionView($view);\n    }\n}\n```\n\nThis new\
    \ `__construct()` method does two important things. First, it defines the location\
    \ of the layout template, which is passed to the new `View` instance, which is\
    \ then passed into the `setLayoutView()` setter method.\n\nSecond, it gets the\
    \ controller/action names from the router. It gets the router instance from the\
    \ registry, and uses getters for the names. It then builds a path from the controller/action\
    \ names, to a template it can render.\n\nFor example, if the user requests the\
    \ URL `http://localhost/users/add.html`, the new `__construct()` method will define\
    \ the location as `APP_PATH/application/views/users/add.html`. The correlation\
    \ between the two is merely coincidental to our naming and organizational structures.\n\
    \nTo gain an understanding of the full structure of the new `Controller` class,\
    \ I have included the full code in **Listing 13-9**."
