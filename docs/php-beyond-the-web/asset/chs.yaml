  \ |\n\n### 4.5 测试与单元测试\n\n有很多测试各类代码（包括 PHP）的策略，并且已经有很多关于这个主题的专著，因此在此我们不会全面介绍测试，只会提出几个关键点并介绍一些与\
  \ PHP 相关的工具。\n\n随着你的开发项目规模增大（在通用编程中，你很可能创建比在 Web 编程中更长、更复杂的脚本），测试对于即使是单独工作的开发者来说也变得越来越重要。随着项目的增长，你能够记住所编写代码所有细节的能力会下降。导致修改某部分代码时，对软件其他部分造成影响的情况也会增加。\n\
  \n软件测试方法有很多种，但“单元测试”尤其有助于理清这些问题。对于初学者来说，单元测试涉及为代码的各个部分（如函数、类、方法等）创建测试，这些测试针对该部分代码的规范/预期行为来检验其输出。例如，对于给定的函数\
  \ `Foo()`，你可以编写一个测试来检查它对于任何给定的输入（除了应返回 `-1` 值的 `bar` 输入外），输出值是否总是在 `1` 和 `10` 之间。然后你可以在其他地方使用该函数，并有信心无论给其传递什么值，它都会返回指定范围内的值。如果你后来对\
  \ `Foo()` 的实现方式做出了更改，你的单元测试就会发现 `Foo()` 给出的输出值范围是否发生了变化（例如，如果在某些条件下它现在也输出 `0` 和\
  \ `-2`），并且该测试将失败。这会提醒你一个事实：要么你在 `Foo()` 中编写的新代码存在错误，要么你对 `Foo()` 的规范已经改变，你将需要仔细检查调用\
  \ `Foo()` 的地方，以确保新的输出值范围不会在其他地方引起问题。如果没有这样的测试，很容易忽略代码更改可能产生的连锁反应，特别是它们可能如何影响其他潜在遥远的代码段。\n\
  \n然而，在你开始编程之前，重要的是要考虑你打算使用哪种类型的测试，并据此规划你的设计。某些类型的测试从一开始就需要有严格的软件规范，而其他类型（如单元测试）则通过以特定方式组织代码来使其更易于构造和维护测试，从而简化了过程。\n\
