    \ = 0;\n        $this->last = 1;\n    }\n\n    #[\\ReturnTypeWillChange]\n   \
    \ public function current() {\n        return $this->previous;\n    }\n\n    #[\\\
    ReturnTypeWillChange]\n    public function key() {\n        return $this->key;\n\
