    \ 键来执行查询。\n5. 用数据填充该表。由于数据行数较多，请使用源代码/下载部分 (http://www.apress.com) 提供的 `populate_product_category.sql`\
    \ 脚本。\n\n### 工作原理：多对多关系\n\n多对多关系是通过添加第三个表（称为连接表，此处命名为 `product_category`）来创建的。该表包含\
    \ (`product_id`, `category_id`) 对，表中的每条记录都将一个特定产品与一个特定类别关联起来。因此，如果在 `product_category`\
    \ 中看到诸如 `(1,4)` 的记录，就能知道 ID 为 1 的产品属于 ID 为 4 的类别。\n\n这种多对多关系通过两个 **FOREIGN KEY（外键）**\
    \ 约束在物理层面得到强制执行——一个约束将 `product` 表链接到 `product_category` 表，另一个约束将 `product_category`\
    \ 表链接到 `category` 表。用通俗的话来说，这意味着“一个产品可以与多个产品-类别条目关联，而每个这样的条目又与一个类别关联”。外键确保出现在\
    \ `product_category` 表中的产品和类别确实存在于数据库中，并且如果某个产品关联了类别，则不允许删除该产品，反之亦然。\n\n这也是你第一次设置由多个列组成的主键。`product_category`\
    \ 的主键由它的两个字段构成：`product_id` 和 `category_id`。这意味着表中不允许出现两个完全相同的 (`product_id`,\
    \ `category_id`) 对。然而，只要在唯一的 (`product_id`, `category_id`) 对中，`product_id` 或 `category_id`\
    \ 出现多次是完全合法的。这很合理，因为你不想在 `product_category` 表中有两条完全相同的记录。一个产品可以关联一个特定的类别，也可以不关联；但它不能多次关联同一个类别。\n\
    \n起初，关于表关系的所有理论可能会让人感到有些困惑，直到你习惯为止。为了更清晰地理解这种关系，你可以使用数据库关系图来直观地了解。\n\n### 使用数据库关系图\n\
    \n许多工具允许你以可视化的方式构建数据库结构，在数据库中物理实现它们，并生成必要的 SQL 脚本。虽然本书不会介绍任何特定的工具，但了解它们的存在是件好事。你可以在\
    \ http://www.databaseanswers.com/modelling_tools.htm 找到最常用工具的列表。\n\n数据库关系图也具有实现表之间关系的能力。例如，如果你已经在四个表之间实现了关系，那么数据库关系图看起来会像图\
    \ 4-8 那样。\n\n**图 4-8.** *使用数据库关系图查看表和关系*\n\n在关系图中，每个表的主键都用 **PK** 标记表示。外键用 **FK**\
    \ 标记（因为一个表中可能有多个外键，所以会进行编号）。两个表之间的箭头指向关系中“一”的那一端所对应的表。\n\n## 查询新数据\n\n现在，你的数据库拥有大量信息，正等待有人来读取。然而，新的元素也带来了一系列需要学习的新知识。\n\
    \n对于本章而言，数据层逻辑比前一章稍微复杂一些，因为它必须回答诸如“给我卡通类别中第二页的产品”或“给我 X 部门正在促销的产品”之类的查询。在继续编写实现此逻辑的存储过程之前，让我们先了解以下理论知识：\n\
    \n- 检索简短的产品描述\n- 连接数据表\n- 实现分页\n\n让我们逐一处理这些任务。\n\n### 获取简短描述\n\n在浏览商品目录时，访客看到的产品列表中，我们不会显示完整的产品描述，而只显示其中的一部分。在\
    \ HatShop 中，我们将显示每个产品描述的前 150 个字符，并在其后附加“...”。\n\n在 PostgreSQL 中，你可以使用 `substring`\
    \ 函数从字符串中提取子串。以下 SELECT 命令返回产品描述被截断为 30 个字符并附加“...”的结果：\n\n```sql\nSELECT name,\n\
    \       substring(description, 1, 30) || '...' AS description\nFROM product\n\
    ORDER BY name;\n```\n\n由 `(substring(description, 1, 30) || '...')` 表达式生成的新列没有名称，因此我们使用\
    \ `AS` 关键字为其创建了一个别名。根据你当前的数据，该查询将返回类似以下内容的结果：\n\n| name               | description\
    \                            |\n|--------------------|----------------------------------------|\n\
    | 454 黑色海盗帽      | 我们的羊毛毡海盗帽...                 |\n| 9 绿色疯帽子高顶礼帽 | 我们的每顶疯帽子帽...\
    \                 |\n| 黑色巴斯克贝雷帽     | 这是我们久经考验的男...               |\n| 黑色清教徒帽\
    \        | Haentze Hatcrafters 一直...          |\n| 黑色巫师帽          | 这顶酷炫的 Merlin\
    \ 风格巫师...        |\n| ...                | ...                               \
    \     |\n\n### 连接数据表\n\n由于你的数据存储在多个表中，通常并非所需的所有信息都只在一个表中。看看下面的列表，它包含了来自 `department`\
    \ 表和 `category` 表的数据：\n\n| 部门名称            | 类别名称              |\n|----------------------|------------------------|\n\
    | 假日                 | 圣诞帽                |\n| 假日                 | 万圣节帽     \
    \         |\n| 假日                 | 圣帕特里克节帽        |\n| 帽子和贝雷帽         | 贝雷帽 \
    \               |\n| 帽子和贝雷帽         | 驾驶帽                |\n| 戏服帽            \
    \   | 戏剧帽                |\n| 戏服帽               | 军帽                  |\n\n在其他情况下，你需要的所有信息都在一个表中，但你需要根据另一个表中的信息对其施加条件。使用到目前为止所学的简单查询是无法得到这种结果集的。需要基于多个表中的数据获得结果集，这很好地表明你可能需要使用**表连接**。\n"
- fmt: 'When extracting the products that belong to a category, the SQL query isn’t
    the same as when extracting the categories that belong to a department. This is
    because products and categories are linked through the `product_category` associate
    table.


    To get the list of products in a category, you first need to look in the `product_category`
    table and get all the `(product_id, category_id)` pairs where `category_id` is
    the ID of the category you’re looking for. That list contains the IDs of the products
    in that category. Using these IDs, you’ll be able to generate the required product
    list. Although this sounds pretty complicated, it can be done using a single SQL
    query. The real power of SQL lies in its capability to perform complex operations
    on large amounts of data using simple queries.


    You’ll learn how to make table joins by analyzing the `product` and `product_category`
    tables and by analyzing how you can get a list of products that belong to a certain
    category.


    Tables are joined in SQL using the `JOIN` clause. Joining one table with another
    results in the columns (not the rows) of those tables being joined. When joining
    two tables, there always must be a common column on which the join will be made.


    Suppose you want to get all the products in the category where `category_id =
    5`.


    The query that joins the `product` and `product_category` tables is as follows:


    ```sql

    SELECT product_category.product_id,

    product_category.category_id,

    product.name

    FROM product_category

    INNER JOIN product

    ON product.product_id = product_category.product_id

    ORDER BY product.product_id;

    ```


    The result will look something like this (to save space, the listing doesn’t include
    all returned rows and columns):


    ```

    product_id category_id name

    ----------- ----------- --------------------------------------------------

    1           1           Christmas Candy Hat

    2           1           Hanukah Hat

    3           1           Springy Santa Hat

    4           1           Plush Santa Hat

    5           1           Red Santa Cowboy Hat

    6           1           Santa Jester Hat

    7           1           Santa’s Elf Hat

    8           2           Chauffeur Hat

    8           5           Chauffeur Hat

    ...

    ```


    The resultant table is composed of the requested fields from the joined tables
    synchronized on the `product_id` column, which was specified as the column to
    make the join on. You can see that the products that exist in more categories
    are listed more than once, once for each category they belong in, but this problem
    will go away after we filter the results to get only the products for a certain
    category.


    Note that in the `SELECT` clause, the column names are prefixed by the table name.
    This is a requirement if the columns exist in more tables that participate in
    the table join, such as `product_id` in our case. For the other column, prefixing
    its name with the table name is optional, although it’s a good practice to avoid
    confusion.


    The query that returns only the products that belong to category 5 is:


    ```sql

    SELECT product.product_id, product.name

    FROM product_category

    INNER JOIN product

    ON product.product_id = product_category.product_id

    WHERE product_category.category_id = 5;

    ```


    The results are:


    ```

    product_id Name

    ----------- --------------------------------------------------

    8          Chauffeur Hat

    27         Bond-Leather Driver

    28         Moleskin Driver

    29         Herringbone English Driver

    ```


    A final thing worth discussing here is the use of **aliases**. Aliases aren’t
    necessarily related to table joins, but they become especially useful (and sometimes
    necessary) when joining tables, and they assign different (usually) shorter names
    for the tables involved. Aliases are necessary when joining a table with itself,
    in which case, you need to assign different aliases for its different instances
    to differentiate them. The following query returns the same products as the query
    before, but it uses aliases:


    ```sql

    SELECT p.product_id, p.name

    ```'
