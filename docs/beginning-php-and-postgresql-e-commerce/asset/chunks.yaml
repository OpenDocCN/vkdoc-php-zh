    第二章 ■ 奠定基础


    最后，表示层生成购物车的更新视图（步骤 6）。执行结果通过生成一个 `HTML` 网页来封装，该网页返回给访问者（步骤 7），访问者的网络浏览器中即可看到更新后的购物车。


    请注意，在这个简单的例子中，业务层没有进行大量处理，其业务逻辑也并不复杂。然而，如果应用程序出现了新的业务规则，你将需要更改业务层。例如，如果业务逻辑规定，只有当产品的库存数量大于零时，才能将其加入购物车，那么就需要额外调用一次数据层来确定库存数量。只有当产品有库存时，才会请求数据层更新购物车。无论如何，表示层都会获知状态，并向访问者提供人类可读的反馈。


    ## 数字的含义是什么？


    有趣的是，每个层对同一信息片段的解读方式不同。对于数据层来说，其存储的数字和信息毫无意义，因为它只是一个保存、管理和检索数字、字符串或其他数据类型的引擎——而不是产品数量或产品名称。在前一个例子的上下文中，产品数量
    `0` 对数据层来说只是一个简单的纯数字，没有任何意义（它仅仅是 `0`，一个 32 位整数）。


    当业务层读取这些数据时，数据才具有意义。当业务层向数据层询问产品数量并得到 `0` 的结果时，业务层将其解读为“嘿，没有库存了！”。最后，这些数据由表示层封装成漂亮的视觉形式，例如显示一个标签，上面写着：“抱歉，目前该产品无法订购。”


    即使你不太可能想禁止顾客将缺货产品加入购物车，但这个例子（如图 2-3 所示）也足以从另一个角度说明三个层各自具有不同的用途。


    ```

    用户点击

    “加入购物车”按钮。

    用户被告知

    该产品无法

    加入购物车。

    表示层

    将此产品

    加入购物车。

    该产品

    不可用。

    业务层

    我们库存

    有多少件？

    数据层

    ```


    **图 2-3.** *互联网访客与三层应用程序交互*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    `648XCH02.qxd 11/8/06 9:33 AM Page 19`


    第二章 ■ 奠定基础


    **19**


    ## 为正确的层配置正确的逻辑


    由于每一层都包含自己的逻辑，有时很难决定各层之间的界限究竟在哪里。在前面的场景中，与其在业务层读取产品数量并根据该数字决定产品是否可用（这会导致两次数据层调用，也就意味着两次数据库调用），不如使用一个名为
    `add_product_if_available`（如果可用则添加产品）的单一数据层方法，该方法仅当产品有库存时才将其加入购物车。

