  \n第 15 章 ■ 处理文件上传\n\n`move_uploaded_file()`函数是在 4.0.3 版本中引入的，作为一种将上传的文件从临时目录移动到最终位置的便捷方法。虽然`copy()`同样有效，但`move_uploaded_file()`提供了一个`copy()`所没有的额外功能：它会检查由`filename`输入参数标识的文件是否确实是通过`PHP`的`HTTP\
  \ POST`上传机制上传的。如果文件尚未上传，则移动将失败并返回`FALSE`值。因此，您可以省去在使用`move_uploaded_file()`之前将`is_uploaded_file()`作为前置条件的使用。\n\
