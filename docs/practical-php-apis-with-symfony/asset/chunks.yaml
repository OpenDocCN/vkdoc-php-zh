  trans: '

    ### 测试无效的操作数据


    在此案例中，我们将测试一项因发送数据无效而无法执行的操作。


    ```php

    public function testOperationInvalidData(): void

    {

    $client = static::createClient();

    $client->request(''POST'', ''/api/v1/operation'', [], [], [

    ''HTTP_X-AUTH-TOKEN'' => ''fYDg7nMhlvxAtL7KfBnS'',

    ''HTTP_Content-Type'' => ''application/json''

    ], json_encode([

    ''operation'' => ''SendPayment'',

    ''data'' => [

    ''amount'' => 0,

    ''receiver'' => ''hghgfyyfg''

    ]

    ]));

    $this->assertResponseStatusCodeSame(400);

    }

    ```


    测试发送了一个无效的请求负载，因为 `amount` 参数必须大于 0。它应返回一个 *400 Bad request* 响应。此测试假设操作输入模型包含一个
    `amount` 参数，并且该参数被 Symfony 的 `GreaterThan` 验证约束所包裹，该约束指定 `amount` 的值必须大于 0。让我们回顾一下第一章中创建的输入模型。


    ```php

    readonly class SendPaymentInput

    {

    public function __construct(

    #[Assert\NotBlank(message: ''Receiver cannot be empty'')]

    public string $receiver,

    #[Assert\NotBlank(message: ''Amount cannot be empty'')]

    #[Assert\GreaterThan(0, message: ''Amount must be greater than 0'')]

    public float|int $amount,

    public ?string $label = null

    ){}

    }

    ```


    如上所示，`amount` 参数既不能为空，也不能为 0。


    ### 测试不存在的操作


    此项测试检查一项因操作不存在而无法执行的操作。


    ```php

    public function testUnexistingOperation(): void

    {

    $client = static::createClient();

    $client->request(''POST'', ''/api/v1/operation'', [], [], [

    ''HTTP_X-AUTH-TOKEN'' => ''fYDg7nMhlvxAtL7KfBnS'',

    ''HTTP_Content-Type'' => ''application/json''

    ], json_encode([

    ''operation'' => ''SendPayme'',

    ''data'' => [

    ''amount'' => 0,

    ''receiver'' => ''hghgfyyfg''

    ]

    ]));

    $this->assertResponseStatusCodeSame(404);

    }

    ```


    测试发送了一个无效的操作名称，因此应返回 *404 Not Found* 响应码。


    ### 测试缺少操作名称


    此项测试检查因未发送操作名称而导致操作请求验证失败的情况。


    ```php

    public function testMissingOperationName(): void

    {

    $client = static::createClient();

    $client->request(''POST'', ''/api/v1/operation'', [], [], [

    ''HTTP_X-AUTH-TOKEN'' => ''zPLhK8iQqg9fg7u5jnp'',

    ''HTTP_Content-Type'' => ''application/json''

    ], json_encode([

    ''operation'' => '''',

    ''data'' => [

    ''amount'' => 13.69,

    ''receiver'' => ''hghgfyyfg''

    ]

    ]));

    $this->assertResponseStatusCodeSame(422);

    }

    ```


    测试发送了一个有效的数据负载；然而，操作名称缺失，这应导致返回 *422 UnprocessableEntityHttpException* 状态码。出现此响应的原因是操作名称的缺失会在
    `ApiInput` 模型验证期间触发异常。具体来说，当请求到达控制器时，Symfony 的 `MapRequestPayload` 属性执行验证并随后抛出
    `UnprocessableEntityHttpException` 异常。


    ### 测试无效的用户令牌


    此项测试检查因发送的令牌无效而导致操作无法执行的情况。


    ```php

    public function testInvalidAuth(): void

    {

    $client = static::createClient();

    $client->request(''POST'', ''/api/v1/operation'', [], [], [

    ''HTTP_X-AUTH-TOKEN'' => ''fYDg7AtL7KfBnS'',

    ''HTTP_Content-Type'' => ''application/json''

    ], json_encode([

    ''operation'' => ''SendPayment'',

    ''data'' => [

    ''amount'' => 13.69,

    ''receiver'' => ''hghgfyyfg''

    ]

    ]));

    $this->assertResponseStatusCodeSame(401);

    }

    ```


    测试发送了正确的负载，但 `X-AUTH-TOKEN` 头部包含了一个无效的令牌，因此响应码应为 *401 Unauthorized*。


    ### 测试未授权用户


    此项测试检查 API 因用户没有正确角色而拒绝执行操作的情况。


    ```php

    public function testUnauthorizedToExecuteOperation(): void

    {

    $client = static::createClient();

    $client->request(''POST'', ''/api/v1/operation'', [], [], [

    ''HTTP_X-AUTH-TOKEN'' => ''vWvn1GOu2Lx5foFgQrRp'',

    ''HTTP_Content-Type'' => ''application/json''

    ], json_encode([

    ''operation'' => ''SendPayment'',

    ''data'' => [

    ''amount'' => 13.69,

    ''receiver'' => ''hghgfyyfg''

    ]

    ]));

    $this->assertResponseStatusCodeSame(403);

    }

    ```


    测试发送了正确的负载和一个存在的用户令牌，但此用户没有正确的角色，因此返回的状态码应为 *403 Forbidden*。为了执行此测试，我们应该创建一个持有未被允许执行
    `SendPayment` 操作角色的用户，并使用其令牌进行测试。


    ### 测试无效的上下文


    此项测试尝试请求一个不允许在当前上下文中执行的操作。


    ```php

    public function testInvalidContext(): void

    {

    $client = static::createClient();

    $client->request(''POST'', ''/api/v1/inventory-management/operation'', [], [],
    [

    ''HTTP_X-AUTH-TOKEN'' => ''fYDg7nMhlvxAtL7KfBnS'',

    ''HTTP_Content-Type'' => ''application/json''

    ], json_encode([

    ''operation'' => ''SendPayment'',

    ''data'' => [

    ''amount'' => 13.69,

    ''receiver'' => ''hghgfyyfg''

    ]

    ]));

    $this->assertResponseStatusCodeSame(403);

    }

    ```


    测试发送了正确的负载和一个有效的用户令牌，但由于 `SendPayment` 操作不能在 `inventory-management` 上下文中执行，因此应返回一个
    *403 Forbidden* 响应码。


    ### 进行轻微重构


    你应该注意到，所有测试都共享相同的代码来发送 API 请求。为了提高可读性并避免重复，我们可以创建一个私有方法来执行 API 请求。


    ```php

    private function postOperation(array $payload, string $token, string $uri = ''/api/v1/operation''):
    void

    {

    static::createClient()->request(''POST'', $uri, [], [], [

    ''HTTP_X-AUTH-TOKEN'' => $token,

    ''HTTP_Content-Type'' => ''application/json'',

    ], json_encode($payload));

    }

    ```


    上述方法接收要发送的负载、认证令牌和要调用的 URI。`uri` 参数默认持有 `/api/v1/operation` 路径，因为它在大多数测试中都会用到。


    然后我们可以在测试中使用这个方法。例如，在无效上下文测试中使用它。


    ```php

    public function testInvalidContext(): void

    {

    $this->postOperation([

    ''operation'' => ''SendPayment'',

    ''data'' => [

    ''amount'' => 13.69,

    ''receiver'' => ''hghgfyyfg''

    ]], ''vWvn1GOu2Lx5foFgQrRp'');

    $this->assertResponseStatusCodeSame(403);

    }

    ```


    如你所见，通过此更改，我们不再重复发送请求的逻辑。在每个测试中，我们只需要提供负载和认证令牌。


    ### 执行测试


    要执行测试，我们需要从项目根目录运行以下命令：


    ```bash

    bin/phpunit

    ```


    这将执行你所有的测试。


    ### 结论


    本章提供了关于如何使用 Symfony 为 API 实现有效测试的详细指南。通过各种示例，我们学会了验证操作的预期行为，从成功执行到错误处理和验证。这些测试不仅确保了
    API 的功能性，还有助于在整个开发过程中维护代码质量。通过整合这些测试实践，开发者可以确保其 API 的健壮性和可靠性，从而提升最终用户的整体体验。


    ## 后记


    在这段旅程中，我们探索了使用 PHP 和 Symfony 框架构建功能强大且通用的面向操作 API 的复杂性。我们走过了从定义操作及其输入/输出模型到实现安全措施以及通过后台执行优化性能的路径。这篇后记旨在作为对关键要点以及面向操作的方法在
    API 开发领域所带来的优势的最终反思。

    '
- fmt: '# Key Takeaways


    - **Structured Approach**: Promote well-defined operations encapsulated within
    individual services, fostering modularity and maintainability.

    - **Flexibility**: New operations can be seamlessly integrated without disrupting
    existing ones, ensuring your API can evolve alongside your application.

    - **Security**: By leveraging Symfony''s security features, we have established
    a multi-layered approach to securing the API. This includes authentication to
    ensure only authorized users can perform operations and authorization mechanisms
    using voters to further restrict or grant access based on specific user roles
    or conditions.

    - **Performance Optimization**: Background execution with Symfony Messenger allows
    us to handle non-critical operations asynchronously, keeping the API responsive
    even under heavy load.


    # Benefits


    - **Enhanced Maintainability**: Promote code organization and reusability, making
    maintenance and future modifications significantly easier.

    - **Scalability**: The modular design allows for smooth scaling as the API requirements
    grow, enabling us to add new operations efficiently.

    - **Improved Developer Experience**: The clear separation of concerns promotes
    a well-structured codebase, fostering a more enjoyable and productive development
    experience.


    # Disadvantages


    - **Learning Curve**: For teams unfamiliar with the operation-oriented paradigm,
    there may be a steep learning curve. Understanding how to effectively design and
    implement operations, as well as manage their interactions, can require additional
    training and experience.

    - **Potential for Redundancy**: As new operations are added, there is a risk of
    redundancy if similar functionalities are implemented across different services.
    This can lead to code duplication and increased maintenance efforts. Here, if
    many operations share some logic, it would be key to extract it to other services.


    # Real-World Applications


    Beyond theoretical advantages, the operation-oriented approach would excel in
    various practical scenarios. Here are some examples:


    - **E-commerce Platforms**: User actions like adding items to carts, processing
    payments, and managing orders can be implemented as distinct operations within
    an operation-oriented API. This facilitates the addition of new features like
    loyalty programs or subscription services without compromising existing functionalities.

    - **Social Media Applications**: Building APIs for interacting with social media
    platforms can benefit greatly from an operation-oriented approach. Each action,
    such as following users or liking comments, can be defined as a dedicated operation.
    This structure ensures a scalable and maintainable API, allowing for seamless
    integration of new features like group chats or live video streaming.

    - **IoT (Internet of Things) Applications**: Building APIs for interacting with
    various IoT devices often involves handling diverse data streams and functionalities.
    An operation-oriented approach provides a solid structure for defining operations
    related to device control, data retrieval, and configuration management, leading
    to a robust and maintainable API.


    # Conclusion


    By adopting an operation-oriented approach, we can equip our APIs with the power
    to handle complex functionalities in a structured, secure, and performant manner.
    This approach empowers you to build APIs that adapt to evolving business needs,
    ensuring their longevity and resilience within your application ecosystem.'
