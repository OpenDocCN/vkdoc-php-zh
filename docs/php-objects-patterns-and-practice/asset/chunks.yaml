    ### Consequences


    Identity objects allow client coders to define search criteria without reference
    to a database query. They also save you from having to build special query methods
    for the various kinds of find operations your user might need.


    Part of the point of an identity object is to shield users from the details of
    the database. It’s important, therefore, that if you build an automated solution
    like the fluent interface in the preceding example, the labels you use should
    refer explicitly to your domain objects and not to the underlying column names.
    Where these differ, you should construct a mechanism for aliasing between them.


    Where you use specialized entity objects, one for each domain object, it is useful
    to use an abstract factory (like `PersistenceFactory` described in the previous
    section) to serve them up along with other domain object related objects.


    Now that I can represent search criteria, I can use this to build the query itself.


    ## The Selection Factory and Update Factory Patterns


    I have already pried a few responsibilities from the `Mapper` classes. With these
    patterns in place, a `Mapper` does not need to create objects or collections.
    With query criteria handled by Identity Objects, it must no longer manage multiple
    variations on the `find()` method. The next stage is to remove responsibility
    for query creation.


    ### The Problem


    Any system that speaks to a database must generate queries, but the system itself
    is organized around domain objects and business rules rather than the database.
    Many of the patterns in this chapter can be said to bridge the gap between the
    tabular database and the more organic, treelike structures of the domain. There
    is, however, a moment of translation—the point at which domain data is transformed
    into a form that a database can understand. It is at this point that the true
    decoupling takes place.


    ### Implementation


    Of course, you have seen some of this functionality before in the Data Mapper
    pattern. In this specialization, though, I can benefit from the additional functionality
    afforded by the identity object pattern. This will tend to make query generation
    more dynamic, simply because the potential number of variations is so high.


    Figure [13-9](#A314621_5_En_13_Chapter.html#Fig9) shows my simple selection and
    update factories.


    ![A314621_5_En_13_Fig9_HTML.gif](A314621_5_En_13_Fig9_HTML.gif)


    Figure 13-9.


    Selection and update factories


    Selection and update factories are, once again, typically organized so that they
    parallel the domain objects in a system (possibly mediated via identity objects).
    Because of this, they are also candidates for my `PersistenceFactory`: the Abstract
    Factory I maintain as a one-stop shop for domain object persistence tools. Here
    is an implementation of a base class for update factories:


    ```

    // listing 13.41

    abstract class UpdateFactory

    {

    abstract public function newUpdate(DomainObject $obj): array;

    protected function buildStatement(string $table, array $fields, array $conditions
    = null): array

    {

    $terms = array();

    if (! is_null($conditions)) {

    $query  = "UPDATE {$table} SET ";

    $query .= implode(" = ?,", array_keys($fields)) . " = ?";

    $terms  = array_values($fields);

    $cond   = [];

    $query .= " WHERE ";

    foreach ($conditions as $key => $val) {

    $cond[] = "$key = ?";

    $terms[] = $val;

    }

    $query .= implode(" AND ", $cond);

    } else {

    $query  = "INSERT INTO {$table} (";

    $query .= implode(",", array_keys($fields));

    $query .= ") VALUES (";

    foreach ($fields as $name => $value) {

    $terms[] = $value;

    $qs[] = ''?'';

    }

    $query .= implode(",", $qs);

    $query .= ")";

    }

    return array($query, $terms);

    }

    }

    ```


    In interface terms, the only thing that this class does is define the `newUpdate()`
    method . This will return an array containing a query string, and a list of terms
    to apply to it. The `buildStatement()` method does the generic work involved in
    building the update query, with the work specific to individual domain objects
    handled by child classes. `buildStatement()` accepts a table name, an associative
    array of fields and their values, and a similar associative array of conditions.
    The method combines these to create the query. Here’s a concrete `UpdateFactory`
    class :


    ```

    // listing 13.42

    class VenueUpdateFactory extends UpdateFactory

    {

    public function newUpdate(DomainObject $obj): array

    {

    // note type checking removed

    $id = $obj->getId();

    $cond = null;

    $values[''name''] = $obj->getName();

    if ($id > -1) {

    $cond[''id''] = $id;

    }

    return $this->buildStatement("venue", $values, $cond);

    }

    }

    ```


    In this implementation, I work directly with a `DomainObject`. In systems where
    one might operate on many objects at once in an update, I could use an identity
    object to define the set on which I would like to act. This would form the basis
    of the `$cond` array, which here only holds `id` data.


    `newUpdate()` distills the data required to generate a query. This is the process
    by which object data is transformed to database information.


    Notice that the new`Update()` method will accept any `DomainObject`. This is so
    that all `UpdateFactory` classes can share an interface. It would be a good idea
    to add some further type checking to ensure the wrong object is not passed in.


    Here’s some quick code to try out the `VenueUpdateFactory` class :


    ```

    // listing 13.43

    $vuf = new VenueUpdateFactory();

    print_r($vuf->newUpdate(new Venue(334, "The Happy Hairband")));

