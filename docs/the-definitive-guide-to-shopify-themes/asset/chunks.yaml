- fmt: '# 1. A Shopify Theme Primer


    For some content platforms, the word “theme” means a limited degree of control.
    It evokes the idea of selecting from a few predefined choices, perhaps picking
    a color scheme or replacing some images.


    Shopify themes are more than that; they give storeowners complete control over
    every aspect of the frontend of their sites, including HTML, stylesheets, and
    scripts. This, I believe, is one of Shopify’s greatest strengths. It’s why it
    can be suitable for solo entrepreneurs starting their first business while at
    the same time supporting Fortune 500 companies.


    This chapter starts by explaining how Shopify gives us that flexibility. It covers
    the directory structure of a theme package, explains Liquid (Shopify’s templating
    language) a little better, explains how assets are handled, and gives us a sense
    of how these parts work together to deliver a usable shopping experience to our
    customers.


    ## Anatomy of a Shopify Theme


    One Shopify store can have many themes installed, although only one can be published
    and visible to the public at any given time. Themes can come from different sources—purchased
    from the official Shopify Theme Store (`https://themes.shopify.com`), downloaded
    from a third-party marketplace, built for a specific customer by a freelancer
    or agency, or developed in-house by the merchant.


    Each theme installed into a Shopify store is presented in the Online Store - Themes
    section of the Shopify Admin, as shown in Figure 1-1.


    ![A437216_1_En_1_Fig1_HTML.jpg](A437216_1_En_1_Fig1_HTML.jpg)


    Figure 1-1: The Themes List in the Shopify Admin. Note that one theme (the large
    one at the top) is “published,” meaning it’s currently active and being displayed
    to customers. The other themes are installed but only visible to the storeowner
    in a “preview” mode.


    New themes can be added to a Shopify store in two ways: directly from the Theme
    Store, or by uploading a `.zip` file containing files in the standard theme directory
    structure. Themes can then be “previewed” prior to publishing, giving the store
    owner the chance to see how a new theme will look and feel before pushing it out
    to real customers.


    When a customer visits a page on the storefront, Shopify looks at the files contained
    in a theme to find the appropriate template files to render and uses them in combination
    with “dynamic” information (such as the store’s current inventory, details of
    the logged-in customer, and the contents of the cart) to generate HTML, which
    is then delivered to the browser. In this way, Shopify themes operate in a similar
    fashion to many template-based platforms or programming languages used to generate
    dynamic, content-driven web sites, such as WordPress or Drupal.


    ### Theme Structure


    Regardless of their source, all Shopify themes share a common format under the
    hood: a package of files arranged in a specific directory structure, as shown
    in Figure 1-2.


    ![A437216_1_En_1_Fig2_HTML.jpg](A437216_1_En_1_Fig2_HTML.jpg)


    Figure 1-2: The standard directory structure for a finished Shopify theme


    As you can see, the structure is quite flat, with seven top-level directories
    (and one subdirectory) containing a large number of Liquid template files (`.liquid`),
    configuration files (`.json`), and assets (`.css`, `.js`, `.png`, etc.).


    Assets include all the static assets you’d like to use with your theme, like images,
    stylesheets, and scripts. Shopify has built-in support for Sass stylesheets (with
    some limitations, discussed shortly), so if you’re a Sass aficionado, you can
    simply save files with a `.scss` extension directly in your theme. Your theme’s
    assets are automatically served from Shopify’s CDN.


    Config is a directory containing specifications for global theme settings, which
    allow theme designers to create themes that give merchants control and flexibility
    over the layout, appearance, and data model of their storefront. Theme settings
    are presented to store owners with the markup defined in `settings_schema.json`
    and, when saved, are stored in `settings_data.json`. These are currently the only
    two files that reside in the `/config` directory.


    Layouts serve as the “master template” for all pages in your theme, and as such
    they contain all the HTML common to every page (for example, the `<head>` section).
    Most themes only require the single default layout, which is called `theme.liquid`,
    but you can create as many base layouts as you like. If you’re working with a
    store on Shopify Plus (Shopify’s enterprise offering), you’ll also have access
    to `checkout.liquid`, which defines the layout of the store’s checkout pages.


    Locales are JSON-formatted translation files for all the different locales (locations)
    your theme may support—`en.default.json`, `es.json`, etc. You’re not required
    to provide translations for multiple languages with your theme, but it’s a good
    idea to make sure your theme supports future internationalization. All themes
    being submitted for sale on the Shopify Theme Store must fully support internationalization.


    Sections and snippets are similar, in that they both contain small pieces of HTML
    and Liquid code that can be included from other templates. Their goal is to allow
    you to break your theme code into smaller, logical components, making maintenance
    and re-use much easier. Where they differ is that sections (the newer of the two)
    allow you to define component-level theme settings, stylesheets, and JavaScript.


    While both sections and snippets can be used “statically” by including them directly
    from within a theme’s template files, sections have the additional ability to
    be dynamically included and configured on a store’s home page by a merchant. We’ll
    see detailed examples of both `sections` and `snippets` later as we walk through
    the details of building a theme.


    Templates contain the HTML structure for the different types of pages in your
    theme—for example, `product.liquid` is used for your product pages, while `index.liquid`
    is used for your home page and `article.liquid` is used for blog articles. These
    individual page templates are rendered within the “content” section of your theme’s
    layout file (usually `theme.liquid`).


    You can create variations of each template type—e.g., `article.photo.liquid` for
    photo-based posts and `article.video.liquid` for video-based posts. Note that
    this is the only one of the top-level directories to contain a subdirectory, `/customers`,
    which contains several templates that are required if a store has customer login
    accounts enabled.'
