    \n图 11-2 展示了该示例的完整类图。\n\n![A314621_5_En_11_Fig2_HTML.gif](img/A314621_5_En_11_Fig2_HTML.gif)\n\
    \n图 11-2.\n\n部署的解释器模式\n\n### 解释器模式问题\n\n一旦你为解释器模式实现设置了核心类，扩展就变得容易了。代价是最终可能会创建大量的类。因此，解释器模式最适合应用于规模相对较小的语言。如果你需要一个完整的编程语言，最好寻找第三方工具来使用。\n\
    \n由于解释器类经常执行非常相似的任务，值得密切关注你创建的类，以便提取重复的部分。\n\n许多初次接触解释器模式的人，在最初的兴奋之后，会失望地发现它并不处理解析问题。这意味着你无法立即为用户提供一个友好易用的语言。第\
    \ 24 章包含一些粗略的代码，用于说明解析迷你语言的一种策略。\n\n## 策略模式\n\n类经常试图做太多事情。这可以理解：你创建一个执行几个相关操作的类；在编码过程中，其中一些操作需要根据情况而变化。同时，你的类需要被拆分成子类。在你意识到之前，你的设计就被竞争力量拉扯得四分五裂了。\n\
    \n### 问题\n\n由于我最近构建了一个标记语言，我继续使用测验示例。测验需要问题，所以你构建了一个`Question`类，并给它一个`mark()`方法。一切顺利，直到你需要支持不同的评分机制。\n\
    \n假设您被要求支持简单的 MarkLogic 语言，通过直接匹配和正则`Expression`进行评分。你的第一反应可能是为这些差异创建子类，如图 11-3\
    \ 所示。\n\n![A314621_5_En_11_Fig3_HTML.gif](img/A314621_5_En_11_Fig3_HTML.gif)\n\
    \n图 11-3.\n\n根据评分策略定义子类\n\n只要评分是类中唯一变化的方面，这种方法就会很有效。但想象一下，你被要求支持不同类型的问题：基于文本的问题和支持富媒体的问题。当涉及到在一个继承树中整合这些力量时，这就给你带来了问题，如图\
    \ 11-4 所示。\n\n![A314621_5_En_11_Fig4_HTML.gif](img/A314621_5_En_11_Fig4_HTML.gif)\n\
    \n图 11-4.\n\n根据两种力量定义子类\n\n不仅继承层次结构中的类数量激增，还必然引入了重复。你的评分逻辑在继承层次结构的每个分支上都被重复了。\n\
    \n每当你发现自己在继承树（无论是通过子类化还是重复的条件语句）的兄弟节点之间重复一个算法时，考虑将这些行为抽象成它们自己的类型。\n"
- fmt: '### Implementation


    As with all the best patterns, Strategy is simple and powerful. When classes must
    support multiple implementations of an interface (e.g., multiple marking mechanisms),
    the best approach is often to extract these implementations and place them in
    their own type, rather than to extend the original class to handle them.


    So, in the example, your approach to marking might be placed in a `Marker` type.
    Figure [11-5](#A314621_5_En_11_Chapter.html#Fig5) shows the new structure.


    ![A314621_5_En_11_Fig5_HTML.gif](A314621_5_En_11_Fig5_HTML.gif)


    Figure 11-5. Extracting algorithms into their own type


    Remember the Gang of Four principle, “Favor composition over inheritance”? This
    is an excellent example. By defining and encapsulating the marking algorithms,
    you reduce subclassing and increase flexibility. You can add new marking strategies
    at any time without the need to change the `Question` classes at all. All `Question`
    classes know is that they have an instance of a `Marker` at their disposal, and
    that it is guaranteed by its interface to support a `mark()` method. The details
    of implementation are entirely somebody else’s problem.


    Here are the `Question` classes rendered as code:


    ```

    // listing 11.13

    abstract class Question

    {

    protected $prompt;

    protected $marker;

    public function __construct(string $prompt, Marker $marker)

    {

    $this->prompt = $prompt;

    $this->marker = $marker;

    }

    public function mark(string $response): bool

    {

    return $this->marker->mark($response);

    }

    }

    // listing 11.14

    class TextQuestion extends Question

    {

    // do text question specific things

    }

    // listing 11.15

    class AVQuestion extends Question

    {

    // do audiovisual question specific things

    }

    ```


    As you can see, I have left the exact nature of the difference between `TextQuestion`
    and `AVQuestion` to the imagination. The `Question` base class provides all the
    real functionality, storing a prompt property and a `Marker` object. When `Question::mark()`
    is called with a response from the end user, the method simply delegates the problem
    solving to its `Marker` object.


    Now it’s time to define some simple `Marker` objects:


    ```

    // listing 11.16

    abstract class Marker

    {

    protected $test;

    public function __construct(string $test)

    {

    $this->test = $test;

    }

    abstract public function mark(string $response): bool;

    }

    // listing 11.17

    class MarkLogicMarker extends Marker

    {

    private $engine;

    public function __construct(string $test)

    {

    parent::__construct($test);

    $this->engine = new MarkParse($test);

    }

    public function mark(string $response): bool

    {

    return $this->engine->evaluate($response);

    }

    }

    // listing 11.18

    class MatchMarker extends Marker

    {

    public function mark(string $response): bool

    {

    return ($this->test == $response);

    }

    }

    // listing 11.19

    class RegexpMarker extends Marker

    {

    public function mark(string $response): bool

    {

    return (preg_match("$this->test", $response) === 1);

    }

    }

    ```


    There should be little, if anything, that is particularly surprising about the
    `Marker` classes themselves. Note that the `MarkParse` object is designed to work
    with the simple parser developed in Chapter [24](#A314621_5_En_24_Chapter.html).
    The key here is in the structure that I have defined, rather than in the detail
    of the strategies themselves. I can swap `RegexpMarker` for `MatchMarker`, with
    no impact on the `Question` class.


    Of course, you must still decide what method to use to choose between concrete
    `Marker` objects. I have seen two real-world approaches to this problem. In the
    first, producers used radio buttons to select the preferred marking strategy.
    In the second, the structure of the marking condition itself was used; that is,
    a match statement was left plain:


    ```

    five

    ```


    A MarkLogic statement was preceded by a colon:


    ```

    :$input equals ''five''

    ```


    And a regular Expression used forward slashes:


    ```

    /f.ve/

    ```


    Here is some code to run the classes through their paces:


    ```

    // listing 11.20

    $markers = [

    new RegexpMarker("/f.ve/"),

    new MatchMarker("five"),

    new MarkLogicMarker(''$input equals "five"'')

    ];

    foreach ($markers as $marker) {

    print get_class($marker)."\n";

    $question = new TextQuestion("how many beans make five", $marker);

    foreach (["five", "four"] as $response) {

    print "    response: $response: ";

    if ($question->mark($response)) {

    print "well done\n";

    } else {

    print "never mind\n";

    }

    }

    }

    ```


    I construct three strategy objects, using each in turn to help construct a `TextQuestion`
    object. The `TextQuestion` object is then tried against two sample responses.


    Here is the output (including namespaces):


    ```

    popp\ch11\batch02\RegexpMarker

    response: five: well done

    response: four: never mind

    popp\ch11\batch02\MatchMarker

    response: five: well done

    response: four: never mind

    popp\ch11\batch02\MarkLogicMarker

    response: five: well done

    response: five: never mind

    ```


    In the example, I passed specific data (the `$response` variable) from the client
    to the strategy object via the `mark()` method. Sometimes, you may encounter circumstances
    in which you don’t always know in advance how much information the strategy object
    will require when its operation is invoked. You can delegate the decision as to
    what data to acquire by passing the strategy an instance of the client itself.
    The strategy can then query the client in order to build the data it needs.'
