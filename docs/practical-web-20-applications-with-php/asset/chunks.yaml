    The Firefox Operator Plug-In


    A plug-in for Firefox has been developed that is specifically designed to read
    microformats on web pages and use the data accordingly. Operator—developed by
    Michael K[aply (http://www.](http://www.kaply.com/weblog)%E2%80%94)


    [kaply.com/weblog)—will automatically detect all micr](http://www.kaply.com/weblog)%E2%80%94)oformatted
    data on a page and make various actions available within your browser. You can
    download Operator from the Firefox A[dd-Ons site at http://addons.mozilla.org/en-US/firefox/addon/4106.](http://addons.mozilla.org/en-US/firefox/addon/4106)


    Some of the functions it provides are as follows:


    • **Contact details.** It finds all contacts on a page (by finding data using
    the hCard specification we just looked at).


    • **Events.** Any events on a page marked up using hCalendar will be found, allowing
    you to easily add them to your Google Calendar. We will use the hCalendar microformat
    in Chapter 13.


    • **Tag spaces.** Earlier this chapter we looked at tag spaces. Shortly we will
    look at how to link to tag spaces with the rel-tag microformat. Operator will
    find all tag spaces specified on a page.


    • **Locations.** Any geographical information using the GEO microformat will be
    found, providing links to mapping services such as Google Maps. We will use GEO
    in Chapter 13.


    Figure 10-5 shows the Operator plug-in in action on the hCard example we created
    in Listing 10-29\. The contact details can easily be exported to your computer’s
    address book.


