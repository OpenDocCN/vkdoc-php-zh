    echo “此行不显示”;

    }

    catch (errorException $e ){

    echo $e->getMessage();

    }

    catch (userException $e) {

    echo $e->getMessage();

    }

    catch (Throwable $t) {

    echo $t->getMessage();

    }

    echo “此行会显示”;

    ?>

    示例 6-2

    handleerror.php 文件捕获错误或异常

