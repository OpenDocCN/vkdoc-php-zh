- '# 第一部分：解耦式 Drupal 基础


  第 1 部分


  在第一部分中，我们将为解耦式 Drupal 建立重要的概念基础。这种范式虽广受欢迎，但也并非没有风险。首先，我们将审视不断变化的网络如何通过为其他技术中的数字体验敞开大门，影响了内容管理系统的演变。服务端和客户端（尤其是通用
  JavaScript）的同步变革，甚至鼓励网络从业者探索解耦式 CMS 架构，而不仅仅将其用于原生应用。


  我们将解耦式 Drupal 定义为将 Drupal 用作供其他应用程序消费的内容服务，并在此过程中识别出两种主要的架构范式。第一种是完全解耦式 Drupal，它将
  Drupal 的默认前端与消费者应用程序完全分离。这种方式不仅越来越多地用于满足原生应用和物联网应用的需求，也用于 JavaScript 应用。另一种是渐进式解耦
  Drupal，它通过将 JavaScript 框架插值到 Twig 驱动的前端中，提供了一种折中方案。


  最后，在深入探讨解耦 Drupal 的用例和动机之后，我们将分析这些方法的一些关键优缺点。这些考虑因素不仅涉及开发者，还包括那些不可避免地会塑造和操纵最终体验的内容编辑者、站点构建者、站点管理员以及最终用户。由于解耦式
  Drupal 相对不成熟，我鼓励您在项目探索阶段仔细评估这些风险与回报，因为这些架构决策可能会在后续过程中产生不成比例的影响。


  '
- '# 1. 不断变化的网络


  关于寒武纪大爆发——地球历史上一个开创性事件——最引人注目的事实或许是，现存的生命形式在 5.41 亿年前的化石记录中，于同一时刻从以单细胞生物为主，多样化发展为构成了当今大多数动物王国的多细胞生物。在过去几年中，数字体验和内容管理正处于另一次寒武纪大爆发之中——这次爆发的不是生命形式，而是形态因素。


  如今，用户面对的是与各类组织互动方式的快速增长的饕餮盛宴。例如，美国一名典型的大学生体验可能涉及一系列接触点，包括网站、移动应用、数字标牌和交互式信息亭。这种现象引发了一个根本性问题：如何为日益广泛的体验做好准备并进行架构设计，使其接近*内容无处不在*的理想状态。在深入探讨我们如何构思和构建这些体验之前，不妨先退一步，审视我们走过的路、数字体验的演变历程以及未来的发展方向。我们只能构建我们能清晰定义的内容。


  ## 网站现在仅仅是起点


  直到 20 世纪 90 年代末，绝大多数网站内容都是由文本、图片以及（不常出现的）其他媒体资产构成的。这种网络内容的原始状态由大段的叙事或长篇文本组成，图片和其他媒体穿插其中。从网络用户体验的角度来看，大多数用户仅依靠鼠标和键盘（桌面计算机的主要交互方式）与这些体验进行交互。


  即使在第一次浏览器战争末期，编写网站的标准也并未在负责浏览器的各个厂商之间得到统一规范，即便是在哈康·维姆·莱于 1994 年颁布的层叠样式表（CSS）标准于
  20 世纪 90 年代末成为广泛理解的规范之后，情况依然如此。万维网联盟（W3C）既定标准长期以来未被广泛采用，这阻碍了网页开发领域最佳实践的发展，例如放弃基于表格的布局以及引入基于`CSS`的布局。与此同时，浏览器制造商网景和微软之间的激烈竞争掩盖了
  JavaScript 的兴起。这种编程语言最初由布兰登·艾奇于 1995 年仅在十天内完成原型设计，随后在不同的浏览器中得到了截然不同的实现。


  自由且开源的 Drupal 内容管理系统（CMS）在其 1.0 到 3.0 版本发布期间，在向服务端动态网页的演进中发挥了作用。服务端动态技术的出现，使得服务端实现（例如
  CMS）能够创建标记，并将模板与从数据库检索到的用户生成内容拼接起来，从而颠覆了之前通过文件传输协议（FTP）上传平面 HTML 文件及媒体资产的方法。反过来，服务端动态是
  21 世纪头十年此类应用程序逻辑向客户端迁移的重要前身。更多细节见第 3 章。


  对于许多 Web 开发者来说，很难理解在当前行业状态下，网站仅仅被视为起点。尽管如此，还有无数其他格式，其最佳实践和标准的规范化（类似 21 世纪初网络所经历的那样）仍处于起步阶段。


  ## 从网站到 Web 应用


  Web 2.0 和动态 HTML（DHTML）预示着网页交互元素的到来，标志着 Web 应用时代的开始。21 世纪初，JavaScript 不再像以前那样因在不同浏览器中实现方式不一致而声名狼藉，而是被用于通过异步
  JavaScript 和 XML（Ajax）增强交互。这促进了网页刷新到浏览器后，在客户端进行动态标记更改。


  借助 Ajax 范式，前端开发者受益于`XMLHttpRequest`（XHR）应用程序编程接口（API）（这是浏览器中 JavaScript 的核心功能），能够从服务器异步检索数据，并提供无需完全刷新页面的后台操作。这一转变可以被认为是网站真正成为
  Web 应用的时刻，而不再是交付到浏览器的静态资产，从而巩固了摆脱服务器端拼凑的平面 HTML 或标记的做法。 “新”网页是包含动态部分的网页，这些部分消除了往返服务器多次的必要性。


  在 Web 开发历史的这个节点上，网站与 Web 应用之间的区别变得越来越模糊，至今仍难以明确界定这种差异。更多关于客户端 JavaScript 的演进、由此引发的
  JavaScript 复兴以及通用（同构）JavaScript 的信息，请参见第 3 章。




  ## 响应式网页设计


  21 世纪末期出现了响应式网页设计（RWD），这是一种让网站能够无缝适配桌面端、平板端和移动端，无需提供页面不同版本的方法。通过将内容视为可以适应其容器的流体（"内容如水"），响应式网页设计这一由
  Ethan Marcotte 于 2010 年提出的术语（尽管早在 21 世纪初某些网站就已有所体现）消除了网页设计中桌面端与移动端的割裂，如今已遍布整个网络，成为用户界面可塑性的重要典范。^(¹)


  在 RWD 中，网页内容既能遵循传统网站的框架，也能在移动设备上展现许多原生移动应用的特性。从用户角度来看，移动设备上的体验相似但又有区别：在移动端，文本和图片等大多数资源会铺满整个视口。


  ## 原生桌面与移动应用


  原生桌面与移动应用，以及构建它们的框架已经存在多年，但它们通常是专有生态系统与平台特定技术的结合。开发者需要与两个截然不同的生态系统和社区打交道：用`Objective-C`编写
  iOS 应用，而用`Java`编写 Android 应用。


  到 21 世纪末期，旨在促进跨设备原生移动应用实现的框架开始出现。这些框架往往基于非原生代码，例如`Xamarin`将用`C#`编写的应用转换为原生就绪代码。`Titanium`和`Cordova`（原名`PhoneGap`）的发布反映了向"网页转原生"框架的新趋势——这些针对构建原生移动应用优化的
  Web 框架，使开发者能够先编写自己熟悉的代码，再将其编译为原生代码。到 2013 年，全球约 10%的智能手机上运行的应用由`Titanium`提供支持。^(²)


  随着 JavaScript 的复兴，`React`和`Angular`等 JavaScript 框架与库通过提供`React Native`、`Electron`和`Ionic`等纯
  JavaScript 转原生框架，已深度融入"网页转原生"范式。其中一些框架还提供通过 Web 技术构建原生桌面应用的功能。因此，JavaScript 转原生框架通过宣称
  Web 应用应与原生应用难以区分，着力强调应用的跨平台相似性。


  ## 零用户界面


  在 Web 开发领域之外，用户界面也以同样颠覆性的方式发展，在各类渠道中占据一席之地——企业需要在这些渠道中考虑网站、Web 应用和原生应用之外的选项。如今日常使用的一些用户界面已不再依赖手动或可视化的交互组件。这类零用户界面完全摒弃屏幕和物理操作元素。^(³)


  Amazon Echo 和 Google Home 等语音助手符合零用户界面范式，但其他依赖听觉或手势操作的界面也属于这一范畴，例如环境界面和触觉界面——它们对周围刺激做出反应，而非依赖用户在屏幕上的显式输入或手动操作。虽然远超出本书范围，但随着界面本身变得日益自适应和智能化，零用户界面及其交互设计将需要重新审视可用性测试。


  ### 对话式内容


  对话式内容（通过文本或语音对话与内容互动）在过去几年一直是营销团队和企业的热门目标。前述语音助手占据了对话式界面的一端，但传统聊天机器人、短信文本机器人和 Facebook、Slack
  上的即时通讯机器人也在改变内容访问的面貌。Amazon Echo 和 Google Home 等语音助手可通过自定义功能进行编程，而 Cortana 和 Siri
  等设备助手则反映出更封闭的生态系统，限制了自定义代码的扩展。


  没有提供通往目标内容的分岔路口的信息架构，对话式内容便无法访问。它倾向于简短的单轮语句以保持注意力，且不能依赖音频之外的媒体资源。用户只能通过口头或书面的语言形式与对话式界面进行交互。


  对许多企业而言，通过基础聊天机器人将基于 Web 的内容直接作为对话式内容呈现，虽能满足集中式内容的需求，但对需要更贴近真实人际交流的对话友好型内容的客户来说远远不够。精心设计对话式内容仍是一片相对未经探索的荒野，在`Dialogflow`（原名`api.ai`）等新兴企业的推动下，平台无关性正开始在此成形。


  ## 增强现实与虚拟现实中的内容


  随着内容日益对话化，它也变得越来越情境化。机器视觉（检测和识别设备视野中的物品）和增强现实（AR：在真实世界投影上叠加媒体）等新兴技术预示着未来内容将在我们的物理世界和数字世界中同样占据重要地位。


  对营销团队和企业而言，尤为重要的是强调基于位置的内容——这些内容可以存在于用户物理环境的上下文中，无论是用户实际环境的投影（如 AR）还是虚构呈现（如虚拟现实[VR]）。Forrester
  Research 在 2016 年指出："企业将继续尝试 AR 和 VR，为 2018 和 2019 年更大规模的部署奠定基础。"^(⁴) 紧随 2018 年消费电子展之后，埃森哲委托的一项调查也支持了这一观点，^(⁵)表明用户对
  AR 和 VR 中提供环境信息或帮助提升特定任务表现的界面越来越适应。AR 和 VR 的实用性如今已远远超越其游戏导向的局限。^(⁶)


  这些叠加在 AR 和 VR 界面上的内容不仅具有情境性，而且会覆盖或投射在用户视野之上。因此，与 Web 内容或对话式内容不同，任何有限的文本或媒体资源都需要与用户体验中已有的视觉元素互补。与通过显式输入进行交互的对话式界面或手动界面不同，AR
  和 VR 界面通常依赖用户视角或手势来切换应用状态。



  ### 情境内容


  随着地理定位技术的日益成熟，精确锁定用户位置使得根据用户当前所在位置来优化内容投放成为可能。有多种方法可以三角测量用户的位置，但目前最常用的方式是借助智能手机上的定位服务或蓝牙低功耗（BLE）近场信标（如
  Estimote 公司生产的产品）。如今，WiFi 也能实现这一功能。


  近期，借助信标及其他物联网（IoT）硬件来传递个性化内容的“近场营销”正日益受到重视。我们在日常生活中消费的内容，正越来越呈现地理空间化、位置化和情境化的特点。支撑这类内容传递的是一系列协同运作的技术，它们共同促成了更具情境感的数字体验。ABI
  Research 在 2015 年的一份报告中指出，到 2020 年，支持蓝牙的信标出货量将超过 4 亿个^(⁷)。与此同时，沃尔玛、塔吉特和梅西百货等企业已采用信标来提升其卖场体验，而万豪酒店的
  14 家分店目前也正在使用信标，作为传递推广信息、展示可用宾客设施的手段^(⁸)。


  然而，由于需要协调横跨多种硬件设备（每种设备都有自己的软件开发工具包 SDK）的复杂性，这种形式的情境内容往往仍然难以企及。用内容来增强用户的视角和周围环境——而不是反过来——这一愿景，与优先考虑内容的网站设计和架构方式相去甚远。


  ### 其他渠道


  我们无法涵盖所有可能的内容传递渠道，但在整个行业中，有三个渠道尤为突出，分别是可穿戴技术、数字标牌以及苹果电视（Apple TV）和 Roku 等机顶盒。


  在这些渠道中，数字体验固有的局限性限制了内容的呈现方式。例如，数字标牌将清晰可读性置于首位，因此内容数量较少，以便在远距离也能看清。在另一个极端，由于智能手表上的屏幕空间极为宝贵，内容必须以小号字体呈现。与此同时，机顶盒则受到设计局限，需要将内容封装在遵循严格规则的预制模板中。


  ### 结论


  渠道的爆炸式增长仍在持续，内容传递及其技术范式的交织叙事，挑战着在一个越来越脱离屏幕的数字体验世界中，“内容”真正含义的本质。在本章中，我们审视了内容必须成功应对的多个维度，以便更好地将我们需要呈现的内容，与传递这些内容的机制分离开来。


  虽然 Drupal 历来专注于为网站消费提供内容，但解耦式 Drupal 要求开发者、设计师和架构师共同重新思考这一重点，转向一种更与渠道无关的立场，使内容不再受制于严格的呈现机制。在下一章中，我们将深入探讨
  CMS 自身的演变过程，以及解耦式内容管理如何成为一种引人注目的范式。


