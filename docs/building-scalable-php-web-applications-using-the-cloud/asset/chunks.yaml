  trans: "  \n## 5.7 测量可扩展性  \n\n我们开发的简单 Web 应用并未从本文介绍的架构中获得太多益处。该应用本质上只是几个数据库查询的简单外壳。因此，仅增加前端服务器无法解决应用受限于数据库的事实。将数据库与\
    \ Web 服务器分离会带来一定提升，因为这能让数据库服务器专注于仅处理数据库连接。然而，从核心来看，我们在该应用中做的一切都只是围绕数据库查询的薄薄一层封装。\
    \  \n\n但如何*衡量*应用的可扩展性呢？ApacheBench 是一种常见且简单的应用可扩展性测量工具。它在 Macintosh 和大多数 Linux\
    \ 发行版中都是标配。在我们的场景中，可以直接从 `template_node` 服务器运行 ApacheBench 来测试集群中的其他节点。  \n\n\
    要执行此操作，请以 `root` 或 `fred` 身份登录到 `template_node` 服务器。运行一个简单的 ApacheBench 会话，只需输入：\
    \  \n\n```\nab http://BALANCER.IP.ADDRESS.HERE/list.php\n```  \n\n显然，请将 `BALANCER.IP.ADDRESS.HERE`\
    \ 替换为负载均衡器的 IP 地址。  \n\n这将向负载均衡器发送单个请求，并记录处理该请求所花费的时间。输出结果将类似于图 5-6。  \n\n由于仅对单个请求进行了基准测试，其中包含的有用信息并不多。结果显示该请求耗时\
    \ 9.674 毫秒，据此推算，预计服务器每秒可处理多达 103.37 次请求。  \n\nApacheBench 还提供了多个选项，允许我们更全面地测试服务器。`-n`\
    \ 选项指定请求总数（默认值为 1）。`-c` 选项指定并发连接数（即同时发起的连接数）。不使用 `-c` 时，ApacheBench 一次只会运行一个请求。但如果添加\
    \ `-c 50`，ApacheBench 将始终与 Web 服务器保持 50 个活跃请求。  \n\n因此，为了测试集群性能，我执行了以下命令：  \n\n\
    ```\nab -c 50 -n 1000 http://BALANCER.IP.ADDRESS.HERE/list.php\n```  \n\n该命令总共发送\
    \ 1000 个请求，并确保始终有 50 个请求同时处于活跃状态。结果如图 5-7 所示。  \n\n结果表明，在 50 个并发请求的情况下，每个请求的*平均*时间降至\
    \ 5.136 毫秒，但*每个*请求的实际时间增至 256.822 毫秒。这并非大问题，因为平均每请求时间对容量规划最为重要。同时，数据显示在此速率下，服务器每秒可处理多达\
    \ 194.69 次请求。  \n\n![../images/487291_1_En_5_Chapter/487291_1_En_5_Fig7_HTML.png](img/487291_1_En_5_Fig7_HTML.png)\
    \  \n\n图 5-7  \n1000 个请求的 ApacheBench 结果  \n\n![../images/487291_1_En_5_Chapter/487291_1_En_5_Fig6_HTML.png](img/487291_1_En_5_Fig6_HTML.png)\
    \  \n\n图 5-6  \n单个请求的 ApacheBench 输出示例  \n\n这听起来很棒，但将其与单机测试结果（只需将 IP 地址替换为你某台机器的\
    \ IP 即可）对比时，会发现两者结果接近。当并发请求数激增时，负载均衡器能承受稍高的压力，但总体而言两者结果基本相同。这是因为我们的应用几乎完全只是数据库的一个外壳。因此，这个数字反映了数据库服务器的最大容量。为了验证这一点，你可以临时将数据库服务器扩容为更大的实例。\
    \  \n\n要调整 `dbmaster` 服务器大小，请前往 `dbmaster` 的控制面板，点击“调整大小”（Resize）选项卡，并选择新的套餐（我选择了\
    \ Linode 4GB）。然后点击“立即调整此 Linode 大小”。经过几分钟停机后，你的 Linode 将完成扩容，且 IP 地址保持不变！扩容完成后，服务器会启动，你将拥有一个扩容后的服务器！\
    \  \n\n现在，你可以在此配置上运行 ApacheBench，并发现扩容数据库服务器相比之前配置会带来巨大优势。完成此实验后，我已将 `dbmaster`\
    \ 恢复为 Nanode 1GB，以便后续章节能更清晰地展示架构优化的效果。  \n\n如果应用不如此重度依赖数据库，我们应已能在当前架构中看到扩展性提升。然而，即使存在数据库瓶颈，第\
    \ 6 章将探讨架构改进方案，这些方案将带来显著提升的扩展能力。本章的目标仅是理解该架构的工作原理以及如何在 Linode 上进行设置。  \n\n同时，我们也应认识到：仅仅能为系统添加节点，并不意味着系统会自动具备可扩展性。\
    \  \n\n# 6. 通过缓存提升可扩展性  \n\n本章将介绍对前一章描述的基础双层架构进行的若干调整。  \n"
- fmt: '# 6.1 Understanding Caching Architectures


    In our current application, the database is the main bottleneck. This means that
    adding more web servers will not substantially increase the load that the cloud
    can handle. When you discover a bottleneck, it is good to take some time and think
    about ways that the bottleneck can be avoided.


    In our case, our data doesn''t really change all that often. Even if it did, getting
    up-to-the-second values from a guestbook isn''t all that mission critical. If
    someone had to wait seconds or even minutes to see a recent guestbook entry, it
    wouldn''t be the end of the world.


    When you have content that is accessed often, but can afford to be just a little
    stale (or a lot stale), you can implement *caching* to speed things up. Caching
    simply means to have a temporary store of results that we can access quickly.
    Databases are slow because databases are primarily concerned about *data integrity*.
    You want to know that your data is safe, stored on disk, won''t go away, and can
    be accessed with arbitrary queries. A cache, on the other hand, is ephemeral—they
    are usually just stored in memory. Their goal is for fast data retrieval at all
    costs. Many caches, for instance, will just start throwing away data if they fill
    up their memory. That''s fine, because, if something doesn''t exist in the cache,
    we can go to the database and refetch the data.


    In short, databases are about permanence and reliability, and caches are about
    getting what I want as fast as humanly possible. Caches are usually implemented
    as simple key/value pairs, usually with an expiration date attached. That is,
    each piece of data that the cache stores has a designated "key." For instance,
    since there is only one listing of all the guestbook entries, we can have a single
    cache "key" for this. In the application, this will be called `entrylist`. However,
    each individual guestbook entry might wind up getting its own cache key (so the
    cache can know that it is unique), which would include the database ID of the
    entry. Cache keys are usually just regular strings, and, with most caching systems,
    the content can be anything at all. Caches do not do any special processing, they
    just store whatever you ask it to in a given key, so you must be careful not to
    use the same key for two different things!


    The way a cache is used is that the program will first figure out what key to
    use for the data. The goal is to be able to easily infer the cache key from the
    URL parameters. The program starts by checking to see if the cache has a value
    for the cache key. If the cache contains the value, then that value is used. If
    it doesn''t, the program then gets the value the "normal" way (i.e., usually going
    to the database for the value, and perhaps doing some additional calculations
    or manipulations) and then saves it to the cache with an expiration date. Then,
    whether the value came from the cache or the "normal" way, the value is used in
    the application. Once the expiration date passes (or the cache gets too full of
    values), then the cached value simply disappears for the next query, forcing the
    program to get a fresh value the "normal" way.


    ![../images/487291_1_En_6_Chapter/487291_1_En_6_Fig1_HTML.jpg](images/487291_1_En_6_Chapter/487291_1_En_6_Fig1_HTML.jpg)


    **Figure 6-1** — Two-Tier Architecture with Local Caching


    As you can see, this methodology of cache vs. normal accessing makes sure that
    while the caching mechanism is preferred, the non-cache mechanism is available
    as well, and this mechanism will fill the cache.


    As noted, the database is usually considered the slow part of any application,
    because it has to be very careful to handle your data correctly and keep it forever.
    Caches, on the other hand, are considered ephemeral. If we just want to clear
    the cache all of a sudden, it would not affect the operation of the page, because
    it would just go back to the database and get the value again.


    If a site is heavily loaded and continually asking for the same content, even
    caching for a few seconds can greatly increase speed and decrease resource usage.
    We previously load tested this cluster as serving up approximately 250 requests
    per second on the listing page. If we cached the results of that page for 10 seconds,
    then that would be 2,500 fewer database requests over that time period!


    Figure 6-1 shows how we can modify our standard two-tier architecture to add a
    caching layer. In this architecture, each individual web server maintains its
    own cache of results. This can lead to small inconsistencies between web servers
    since they may have refreshed their results at different times. However, if the
    expiration is not set too far in the future, these issues are minimal. Additionally,
    if there are issues, remember in Section 5.6 we discussed load balancer "Stickiness."
    This ties a specific user to a specific server, which means that user will always
    be on the same server, which means they will always be using the same server cache.
    Additionally, this makes the caching more efficient, as each server only has to
    cache data for a subset of users.


    ![../images/487291_1_En_6_Chapter/487291_1_En_6_Fig2_HTML.jpg](images/487291_1_En_6_Chapter/487291_1_En_6_Fig2_HTML.jpg)


    **Figure 6-2** — Two-Tier Architecture with Global Caching


    What to cache and how long to cache it is very application dependent. For many
    architectures, there are pieces which can be cached for minutes or even days,
    and other pieces that can only be cached for seconds or can''t be cached at all.
    Caching can often lead to unexpected results, so it is good when you are developing
    to include a feature that can be used to turn off caching altogether in order
    to see if your cache is the problem.


    If keeping the cache consistent among all of your servers is important, another
    architecture to consider is using a global cache, as in Figure 6-2. In this architecture,
    rather than each web server maintaining its own cache, there is a shared cache
    that they all access. This adds a little more network latency since all caching
    calls have to run over the network, but it adds more consistency to your results.


    Depending on how it is implemented, this sort of external cache can also become
    a bottleneck. However, there are many caching servers that can span across multiple
    servers and balance requests among the servers. Nonetheless, this also adds a
    layer of management complexity to the puzzle.


    In nearly all cases, I find that having a single, external caching service is
    difficult to set up and maintain, with little if any benefit. For most situations,
    putting the cache on each web server gives you the most scalable efficiency, even
    if it comes at a cost of a little consistency, which, as mentioned, can be alleviated
    by using load balancer "stickiness."'
