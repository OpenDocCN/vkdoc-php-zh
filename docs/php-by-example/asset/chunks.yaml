    数组通常是一组由共同名称统一的值。当有很多值，并且为每个值创建单独的变量不可能时，通常会使用数组。在这种情况下，整个值集使用一个通用名称，而特定值（数组元素）通过一个或多个索引来标识。在“经典”版本中，索引是整数。在
    PHP 中，整数和字符串都可用作索引。在这种情况下，可能会使用术语“键”代替“索引”。具有字符串键的数组通常称为*关联数组*。


    ![](img/613529_1_En_4_Figa_HTML.jpg)一个 i 符号的图示。注意


