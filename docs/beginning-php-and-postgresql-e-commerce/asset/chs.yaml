  \ *DataCash 交易报告详情*\n\n### 工作原理：与 DataCash 通信的代码\n\n`DataCashRequest` 类非常简单。首先，构造函数设置了发送请求的\
  \ HTTPS 地址：\n\n```php\n// 构造函数使用 DataCash 的 URL 初始化类\npublic function __construct($url)\n\
  {\n    // Datacash URL\n    $this->_mUrl = $url;\n}\n```\n\n当你想发起预认证请求时，首先需要调用 `MakeXmlPre`\
  \ 方法来创建此类型请求所需的 XML。有些 XML 元素是可选的（例如 `startdate` 或 `issuenumber`，如果你不提供自己的值，它们会使用默认值——可以查看\
  \ `MakeXmlPre` 方法的定义），但其他元素是必填的。\n\n\n\n**注意** 如需查看每种请求类型中哪些元素是必填项、哪些是可选项，请查阅 DataCash\
  \ 的 XML API FAQ 文档。\n\n您需要能向 DataCash 系统发送的下一种请求是执行请求。此类请求的 XML 在 `MakeXmlFulfill`\
  \ 方法中生成。\n\n接下来是 `GetRequest` 方法，它返回由 `MakeXmlPre` 或 `MakeXmlFulfill` 构建的最后一个 XML\
  \ 文档：\n\n```\n// 获取当前 XML\npublic function GetRequest()\n{\n    return $this->_mXml;\n\
  }\n```\n\n最后，`GetResponse` 方法实际发送由调用 `MakeXmlPre` 或 `MakeXmlFulfill` 构建的最新 XML 请求文件，并返回响应\
  \ XML。我们来仔细研究一下这个方法。\n\n`GetResponse` 首先初始化一个 CURL 会话，并设置 POST 方法以发送数据：\n\n```\n\
  // 使用 CURL 向 DataCash 发送 HTTP POST 请求\npublic function GetResponse()\n{\n    //\
  \ 初始化 CURL 会话\n    $ch = curl_init();\n\n    // 准备 HTTP POST 请求\n    curl_setopt($ch,\
  \ CURLOPT_POST, 1);\n\n    // 准备要 POST 的 XML 文档\n    curl_setopt($ch, CURLOPT_POSTFIELDS,\
  \ $this->_mXml);\n\n    // 设置要 POST XML 结构的 URL\n    curl_setopt($ch, CURLOPT_URL,\
  \ $this->_mUrl);\n\n    /* 不在 SSL 握手过程中验证对等证书的通用名称 */\n    curl_setopt($ch, CURLOPT_SSL_VERIFYHOST,\
  \ 0);\n\n    // 阻止 CURL 验证对等证书\n    curl_setopt($ch, CURLOPT_SSL_VERIFYPEER, 0);\n\
  ```\n\n为了将传输结果返回到 PHP 变量中，我们将 `CURLOPT_RETURNTRANSFER` 参数设置为 1，发送请求，然后关闭 CURL 会话：\n\
  \n```\n    /* 我们希望 CURL 直接返回传输结果而不是打印它 */\n    curl_setopt($ch, CURLOPT_RETURNTRANSFER,\
  \ 1);\n\n    // 执行 CURL 会话\n    $result = curl_exec($ch);\n\n    // 关闭 CURL 会话\n\
  \    curl_close($ch);\n\n    // 返回响应\n    return $result;\n}\n```\n\n`test_datacash.php`\
  \ 文件的工作原理如下。当您在浏览器中加载它时，脚本会执行预认证请求和执行请求，然后将预认证请求 XML、预认证响应 XML 和执行响应 XML 数据保存到会话中：\n\
  \n```\nsession_start();\n\nif (empty ($_GET['step']))\n{\n    require_once 'include/config.php';\n\
  \    require_once BUSINESS_DIR . 'datacash_request.php';\n\n    $request = new DataCashRequest(DATACASH_URL);\n\
  \    $request->MakeXmlPre(DATACASH_CLIENT, DATACASH_PASSWORD, 8880000 + rand(0,\
  \ 10000), 49.99, 'GBP',\n                         'pre', '3528000000000007', '11/08');\n\
  \    $request_xml = $request->GetRequest();\n    $_SESSION['pre_request'] = $request_xml;\n\
  \n    $response_xml = $request->GetResponse();\n    $_SESSION['pre_response'] =\
  \ $response_xml;\n\n    $xml = simplexml_load_string($response_xml);\n    $request->MakeXmlFulfill(DATACASH_CLIENT,\
  \ DATACASH_PASSWORD,\n                             'fulfill', $xml->merchantreference,\n\
  \                             $xml->datacash_reference);\n    $response_xml = $request->GetResponse();\n\
  \    $_SESSION['fulfill_response'] = $response_xml;\n}\n```\n\n`test_datacash.php`\
  \ 页面还会被加载三次，因为您有三个需要填充数据的框架：\n\n```\n<frameset cols=\"33%, 33%, 33%\">\n    <frame\
  \ src=\"test_datacash.php?step=1\">\n    <frame src=\"test_datacash.php?step=2\"\
  >\n    <frame src=\"test_datacash.php?step=3\">\n</frameset>\n```\n\n根据参数值，您决定显示之前保存在用户会话中的哪个\
  \ XML，具体如下：\n\n```\nelse\n{\n    header('Content-type: text/xml');\n\n    switch\
  \ ($_GET['step'])\n    {\n        case 1:\n            print $_SESSION['pre_request'];\n\
  \            break;\n\n        case 2:\n            print $_SESSION['pre_response'];\n\
  \            break;\n\n        case 3:\n            print $_SESSION['fulfill_response'];\n\
  \            break;\n    }\n\n    exit;\n}\n```\n\n## 将 DataCash 与 HatShop 集成\n\n\
