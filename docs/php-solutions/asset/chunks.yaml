    \n这会产生与图 14-11 完全相同的输出。\n\n你还可以使用 ISO 8601 重复时间间隔标准 ([`en.wikipedia.org/wiki/ISO_8601#Repeating_intervals`](http://en.wikipedia.org/wiki/ISO_8601#Repeating_intervals))\
    \ 来创建 `DatePeriod` 对象。这种方式不太友好，主要是因为需要按照正确的格式构造字符串，格式如下：\n\n`R` `n` `/YYYY-MM-DDTHH:MM:SS`\
    \ `tz` `/P` `interval`\n\n`R` `n` 是字母 `R` 后跟重复次数；`tz` 是相对于 UTC 的时区偏移量（或使用 `Z`\
    \ 表示 UTC，如下例所示）；`P` `interval` 使用与 `DateInterval` 类相同的格式。`date_interval_06.php`\
    \ 中的代码演示了如何将 `DatePeriod` 与 ISO 8601 重复间隔一起使用。代码如下：\n\n```\n$period = new DatePeriod('R5/2015-02-10T00:00:00Z/P10D');\n\
    foreach ($period as $date) {\n    echo $date->format('l, F j, Y') . '<br>';\n\
    }\n```\n\nISO 重复间隔设置了自 2015 年 2 月 10 日 UTC 午夜开始，间隔为 10 天的 5 次重复。重复次数是在原始日期之后进行的，因此上面的示例会生成\
    \ 6 个日期，如下面输出所示。\n\n![A978-1-4842-0635-5_14_Figg_HTML.jpg](img/A978-1-4842-0635-5_14_Figg_HTML.jpg)\n\
    \n### 本章回顾\n\n本章的大部分内容都致力于介绍 PHP 5.2 和 5.3 中引入的强大日期和时间特性。我没有介绍 PHP 5.5 中引入的 `DateTimeImmutable`\
    \ 类，因为它除了一个方面之外，在其他所有方面都与 `DateTime` 相同。`DateTimeImmutable` 对象从不修改自身。相反，它总是返回一个包含修改后值的新对象。如果你有一个不会改变的日期（例如一个人的出生日期），这可能会很有用。对此类对象使用\
    \ `setDate()` 或 `add()` 方法会返回一个新对象，从而保留原始详细信息，并为更新后的信息（例如入职日期、结婚日期、退休年龄等）提供一个新对象。\n\
    \n你可能不会每天都需要使用日期和时间相关的类，但它们非常有用，并且是对原始 PHP 日期和时间函数的重大改进。MySQL 的日期和时间函数也使得根据时间条件格式化日期和执行查询变得容易。\n\
    \n也许日期最大的问题在于决定是使用 SQL 还是 PHP 来处理格式化和/或计算。PHP `DateTime` 类的一个有用特性是，其构造函数接受以 ISO\
    \ 格式存储的日期，因此你可以使用数据库中未格式化的日期或时间戳来创建 `DateTime` 对象。但是，除非你需要执行进一步的计算，否则在 `SELECT`\
    \ 查询中使用 `DATE_FORMAT()` 函数会更高效。\n\n本章还为你提供了三个用于格式化文本和日期的函数。在下一章中，你将学习如何在多个数据库表中存储和检索相关信息。\n\
    \n# 15. 从多个表中提取数据\n\n正如我在第 11 章中所述，关系型数据库的主要优势之一是能够通过使用一个表中的主键作为另一个表中的外键来链接不同表中的数据。`phpsols`\
    \ 数据库有两个表：`images` 和 `blog`。现在是时候添加更多表并将它们关联起来，以便你可以为博客文章分配类别，并将图像与单个文章关联。\n\n\
    你并不是物理上地连接多个表，而是通过 SQL 来实现。通常，你可以通过识别主键和外键之间的直接关系来连接表。然而，在某些情况下，关系更为复杂，需要通过第三个表来作为其他两个表之间的交叉引用。\n\
    \n在本章中，你将学习如何建立表之间的关系，以及如何将一个表的主键作为外键插入到另一个表中。虽然概念上听起来很困难，但实际上相当简单——你使用一个数据库查询来查找第一个表中的主键，保存结果，然后在另一个查询中使用该结果将其插入到第二个表中。\n\
    \n具体来说，你将学习以下内容：\n\n- 理解不同类型的表关系\n- 使用交叉引用表处理多对多关系\n- 修改表结构以添加新列或索引\n- 将主键作为外键存储在另一个表中\n\
    - 使用 `INNER JOIN` 和 `LEFT JOIN` 连接表\n"
- fmt: '# Understanding Table Relationships


    The simplest type of relationship is one-to-one (often represented as 1:1). This
    type of relationship is often found in databases that contain information only
    certain people should see. For example, companies often store details of employees’
    salaries and other confidential information in a table separate from the more
    widely accessible staff list. Storing the primary key of each staff member’s record
    as a foreign key in the salaries table establishes a direct relationship between
    the tables, allowing the accounts department to see the full range of information,
    while restricting others to only the public information.


    There’s no confidential information in the `phpsols` database, but you might create
    a one-to-one relationship between a single photo in the `images` table with an
    article in the `blog` table, as illustrated by Figure [15-1](#A978-1-4842-0635-5_15_Chapter.html#Fig1).


    ![A978-1-4842-0635-5_15_Fig1_HTML.jpg](A978-1-4842-0635-5_15_Fig1_HTML.jpg)


    Figure 15-1.


    A one-to-one relationship links one record directly with another


    This is the simplest way of creating a relationship between the two tables, but
    it’s not ideal. As more articles are added, the nature of the relationship is
    likely to change. The photo associated with the first article in Figure [15-1](#A978-1-4842-0635-5_15_Chapter.html#Fig1)
    shows maple leaves floating on the water, so it might be suitable for illustrating
    an article about the changing seasons or autumn hues. The crystal-clear water,
    bamboo water scoop, and bamboo pipe also suggest other themes that the photo could
    be used to illustrate. So you could easily end up with the same photo being used
    for several articles, or a one-to-many (or 1:n) relationship, as represented by
    Figure [15-2](#A978-1-4842-0635-5_15_Chapter.html#Fig2).


    ![A978-1-4842-0635-5_15_Fig2_HTML.jpg](A978-1-4842-0635-5_15_Fig2_HTML.jpg)


    Figure 15-2.


    A one-to-many relationship links one record with several others


    As you have already learned, a primary key must be unique. So, in a `1:n` relationship,
    you store the primary key from the table on the `1` side of the relationship (the
    primary or parent table) as a foreign key in the table on the `n` side (the secondary
    or child table). In this case, the `image_id` from the `images` table needs to
    be stored as a foreign key in the `blog` table. What’s important to understand
    about a `1:n` relationship is that it’s also a collection of `1:1` relationships.
    Reading Figure [15-2](#A978-1-4842-0635-5_15_Chapter.html#Fig2) from right to
    left, each article has a relationship with a single image. Without this one-on-one
    relationship, you wouldn’t be able to identify which image is associated with
    a particular article.


    What happens if you want to associate more than one image to each article? You
    could create several columns in the `blog` table to hold the foreign keys, but
    this rapidly becomes unwieldy. You might start off with `image1`, `image2`, and
    `image3`, but if most articles have only one image, two columns are redundant
    much of the time. And are you going add an extra column for that extra-special
    article that requires four images?


    When faced with the need to accommodate many-to-many (or n:m) relationships, you
    need a different approach. The `images` and `blog` tables don’t contain sufficient
    records to demonstrate `n:m` relationships, but you could add a `categories` table
    to tag individual articles. Most articles are likely to belong to multiple categories,
    and each category will be related with several articles.


    The way to resolve complex relationships is through a cross-reference table (sometimes
    called a linking table), which establishes a series of one-to-one relationships
    between related records. This is a special table containing just two columns,
    both of which are declared a joint primary key. Figure [15-3](#A978-1-4842-0635-5_15_Chapter.html#Fig3)
    shows how this works. Each record in the cross-reference table stores details
    of the relationship between individual articles in the `blog` and `categories`
    tables. To find all articles that belong to the `Kyoto` category, you match `cat_id
    1` in the `categories` table with `cat_id 1` in the cross-reference table. This
    identifies the records in the `blog` table with the `article_id 2`, `3`, and `4`
    as being associated with `Kyoto`.


    ![A978-1-4842-0635-5_15_Fig3_HTML.jpg](A978-1-4842-0635-5_15_Fig3_HTML.jpg)


    Figure 15-3.


    A cross-reference table resolves many-to-many relationships as 1:1


    Establishing relationships between tables through foreign keys has important implications
    for how you update and delete records. If you’re not careful, you end up with
    broken links. Ensuring that dependencies aren’t broken is known as maintaining
    referential integrity. We’ll tackle this important subject in the next chapter.
    First, let’s concentrate on retrieving information stored in separate tables linked
    through a foreign-key relationship.


    ## Linking an Image to an Article


    To demonstrate how to work with multiple tables, let’s begin with the straightforward
    scenarios outlined in Figures [15-1](#A978-1-4842-0635-5_15_Chapter.html#Fig1)
    and [15-2](#A978-1-4842-0635-5_15_Chapter.html#Fig2): relations that can be resolved
    as `1:1` through the storage of the primary key from one table (the parent table)
    as a foreign key in a second table (the child or dependent table). This involves
    adding an extra column in the child table to store the foreign key.


    ### Altering the Structure of an Existing Table


    Ideally, you should design your database structure before populating it with data.
    However, relational databases, such as MySQL, are flexible enough to let you add,
    remove, or change columns in tables even when they already contain records. To
    associate an image with individual articles in the `phpsols` database, you need
    to add an extra column to the `blog` table to store `image_id` as a foreign key.


    #### PHP Solution 15-1: Adding an Extra Column to a Table


    This PHP solution shows how to add an extra column to an existing table using
    phpMyAdmin. It assumes that you created the `blog` table in the `phpsols` database
    in [Chapter 13](#A978-1-4842-0635-5_13_Chapter.html).


    In phpMyAdmin, select the `phpsols` database and click the `Structure` link for
    the `blog` table. Below the `blog` table structure is a form that allows you to
    add extra columns. You want to add only one column, so the default value in the
    `Add field(s)` text box is fine. It’s normal practice to put foreign keys immediately
    after the table’s primary key, so select the `After` radio button and check that
    the drop-down menu is set to `article_id`, as shown in the following screenshot.
    Then click `Go`.


    ![A978-1-4842-0635-5_15_Figa_HTML.jpg](A978-1-4842-0635-5_15_Figa_HTML.jpg)


    This opens the screen for you to define column attributes. Use the following settings:


    * Name: `image_id`

    * Type: `INT`

    * Attributes: `UNSIGNED`

    * Null: Selected

    * Index: `INDEX`


    Do not select the `A_I` (`AUTO_INCREMENT`) check box. You don’t want `image_id`
    to be incremented automatically. Its value will be inserted from the `images`
    table.


    The `Null` check box has been selected because not all articles will be associated
    with an image. Click `Save`.


    Select the `Structure` tab and check that the `blog` table structure now looks
    like this:


    ![A978-1-4842-0635-5_15_Figb_HTML.jpg](A978-1-4842-0635-5_15_Figb_HTML.jpg)


    If you click the `Browse` tab at the top left of the screen, you will see that
    the value of `image_id` is NULL in each record. The challenge now is to insert
    the correct foreign keys without the need to look up the numbers manually. We’ll
    tackle that next.'
