    **catalog_get_products_in_category**


    This function returns the products that belong to a certain category. To obtain
    this list of products, you need to join the product and product_category tables,
    as explained earlier in this chapter. We also trim the product’s description.


    The function receives four parameters:


    • inCategoryID represents the ID for which we’re returning products.


    • inShortProductDescriptionLength represents the maximum length allowed for the
    product’s description. If the description is longer than this value, it will be
    truncated, and “...” is added at the end. Note this is only used when displaying
    product lists; in a product details page, the description won’t be truncated.


    • inProductsPerPage represent the maximum number of products our site can display
    on a catalog page. If the total number of products in the category is larger than
    this number, we only return a page containing inProductsPerPage products.


    • inStartItem represents the index of the first product to return. When using
    pagination and displaying four products per page, inStartItem will be 5 and inProductsPerPage
    will be 4 when the visitor visits the second page of products. With these values,
    the catalog_get_products_in_category function will return the products from fifth
    to ninth.


