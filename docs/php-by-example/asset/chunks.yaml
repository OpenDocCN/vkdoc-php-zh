    # 在程序中包含文件


    在程序中，经常需要包含来自另一个文件的一些代码。接下来，我们看一个小例子，它（在基础层面）展示了如何实现这一点。主要思路如下：你在一个文件中描述某个函数，然后在另一个文件中调用它。具体来说，创建一个名为
    `show.php` 的文件，其中包含以下代码。


    我们在与包含 `show()` 函数代码的 `show.php` 文件相同的文件夹中创建一个文件（参见清单 6-11）。


    ```

    清单 6-11

    在程序中包含文件

    ```


    程序的输出如下：


    ```

    程序输出（来自清单 6-11）

    参数 - 123

    ```


    代码以 `require_once ''show.php''` 命令开头，该命令将 `show.php` 文件的内容导入到程序中。然后，创建变量 `$val`
    并将其作为参数传递给 `show()` 函数。函数被调用，并在输出区域显示相应的消息。


    ## 总结


    -   引用提供了对变量的替代访问方式。在创建对变量的引用时，变量名前加上 `&` 指令被赋值给该引用。这种引用称为硬引用。

    -   使用软引用时，某个变量会被赋予一个包含另一个变量名称（不带 `$` 符号）的字符串。在第一个变量名称前加上第二个 `$` 符号，可以访问其名称包含赋给第一个变量的字符串的那个变量。

    -   除了变量，还可以使用常量。常量在首次赋值后其值不能更改。常量可以使用 `define()` 函数或 `const` 语句创建。常量名称中不使用 `$`
    符号。

    -   函数可以使用全局变量。这些变量在函数作用域之外也是可访问的。在函数体内，使用 `global` 语句声明全局变量。

    -   函数可以使用静态变量。（使用了 `static` 关键字来声明此类变量。）静态变量在函数首次调用时被创建并获得其初始值。函数终止后，静态变量不会从内存中移除，下次调用该函数时，该变量会被再次使用。

    -   在某些情况下，会使用多行字符串。在这种情况下，变量被赋值的表达式以 `<<<` 指令开头，后跟某个标签。文本在多行中输入，无需引号。表达式以相同的标签和分号结束。这相当于双引号字符串。如果标签首次出现时被括在单引号中，则得到单引号字符串的类似形式。

    -   有一组函数用于处理文件。`fopen()` 函数用于打开文件。第一个参数指定文件的完整路径，第二个参数指定访问模式。文件处理完毕后，使用 `fclose()`
    函数关闭它。

    -   要导入文件的内容，需要在程序中添加 `require_once` 指令，后面跟上包含导入文件名称的字符串。


    # 7. 类与对象


    *——你可能已经猜到了，我麻烦大了。*

    *——你总是麻烦不断。*

    *——《ALF》（电视剧）*


    本章讨论面向对象编程（简称 OOP）的原理如何在 PHP 中实现。让我们从引入*类*和*对象*的概念开始。这是 OOP 范式的基石，而主要概念点的掌握程度将在很大程度上决定使用
    PHP 的丰富功能创建 OOP 项目的成功与否。


    ## OOP 原理


    学习 OOP 原理通常从列举它们开始：*封装*、*多态*和*继承*。这听起来可能有点吓人。然而，并非所有事情都像初看起来那么可怕。要理解 OOP 的概念，有必要弄清楚它是什么以及为什么需要用其创建程序。OOP
    范式必然意味着某种组织程序的方式。换句话说，OOP 是关于如何组织程序的。在这里，一个类比可以帮助我们。


    假设有一个带厨房的小咖啡馆，你需要组织厨房的工作。厨房接收顾客的订单，并根据这些订单准备菜肴。如果咖啡馆不是很大，顾客也不多，你需要一名主厨来管理流程以确保厨房成功运作。你还需要几名助理厨师。每位助理厨师负责准备一道或多道特定的菜肴。例如，一位厨师专攻肉类菜肴，另一位专攻鱼类菜肴，下一位准备沙拉，有人专攻甜点，等等。可以使用一台或多台冰箱来存储食材，所有厨师都将食材存放在那里，并使用这些食材来准备餐点。所有厨师都可以使用所有冰箱。任务的分配由主厨负责。主厨还控制冰箱里的内容：所有食材都有吗？数量够吗？


    > **注意：** 即使在实际中，厨房的工作组织方式不同，这也没关系。这个例子只是为了说明；你只需要解释方法上的差异，而不是组织一个真实厨房的工作。


    我们来比较一下厨房的工作方式和程序的工作方式。助理厨师类似于函数，而冰箱里存放的食材类似于数据。总体目标是“连接”数据与处理该数据相关的“功能”。用“烹饪”的语言来说，这意味着你需要为每位助理厨师定义其职责范围以及在工作中可以使用的食材。


    假设你把一切都安排妥当了，厨房运转得像时钟一样精准。什么会破坏这种局面呢？主要原因之一是“企业”的扩张。在编程语言中，这表现为代码量的增加。想象一下，顾客很多，厨房很大——很多助理厨师，很多台冰箱。不可避免的，由于有人错误地接单、拿走了另一位厨师的食材或从流程中退出，就会出现问题。这是一个纯粹的规模扩展问题。可以通过改变生产结构来解决。也就是说，我们把厨房分成几个部门。每个部门都有自己的专长。每个部门的食材存放在各自的冰箱里。每个部门都有自己的主厨。这可能会增加员工和总体成本，但它使厨房更可靠，因为由于生产组织方式的原因，一些问题会自动消除。例如，如果冰箱位于鱼类部门，肉类部门的人就无法使用它。


    在这个新模型中，什么重要？重要的是你使用了一个相互交互的部门系统。而在最初的方案中，是单个助理厨师之间相互交互。在新的方法中，厨师们也在部门内部相互交互。在下一个层级，部门之间也存在交互。你可以用同样的方式处理程序。具体来说，你可以将程序组织为一些包含数据并能处理这些数据的块之间的交互。这些块被称为*对象*。这种方案本身就描述了面向对象编程（OOP）的范式。

    '
- fmt: "OOP  principles were developed for creating large programs. A large program\
    \ usually contains several thousand lines of code or more.\n\nThus, writing a\
    \ program within the framework of OOP implies the creation of objects. Objects\
    \ are created based on patterns called *classes*.\nLet’s consider another analogy\
    \ to understand the difference between a class and an object. Let’s say you want\
    \ to build a house (an analogy to an object). But to build a house, you need a\
    \ plan or scheme according to which you build (an analogy to a class). You take\
    \ a plan and build a house following the plan. Similarly, you take a class and\
    \ create an object based on the class. Several houses can be built based on the\
    \ same plan. They are of the same type but physically different. And if you build\
    \ houses based on different plans, you get different houses. As well multiple\
    \ objects can also be created based on a class. They are also of the same type\
    \ (with the same functionality), but at the same time, physically, they are different.\
    \ If you create objects based on different classes, the objects are also different.\
    \ It is also possible that there is a plan but no buildings. Similarly, you can\
    \ create a class but not create any object based on it.\nThat is the main idea.\
    \ Next, you must learn how to declare classes and create objects based on them.\n\
    \n> **Note**  \n> Returning to encapsulation, polymorphism, and inheritance, it\
    \ is worth mentioning the following. These are the three basic mechanisms of OOP.\
    \ Encapsulation means that the data and the code for processing it are combined\
    \ into a single unit, which is an object. Polymorphism implies using generic interfaces\
    \ for interacting with objects, functions, and methods. Finally, inheritance allows\
    \ you to create new classes based on existing ones by inheriting their properties.\
    \ All these mechanisms are examined step by step in examples.\n\n## Creating Classes\
    \ and Objects\n\nIt is time to go deep into the practical issues. Let’s start\
    \ by creating classes.\n\nA class declaration begins with the `class` keyword\
    \ followed by the class name. Then, in a block defined by curly braces, the contents\
    \ of the class are described. The class declaration template looks as follows.\n\
    \n```\nclass name{\n```"
