    **Chapter 3**


    **Base Class**


    One of the excellent things about building an MVC framework, using OOP paradigms,
    is the ability for us to reuse code, with minimal effort. At any time, we might
    be required to add core functionality to the majority of our classes, and a good
    OOP base will help us to do this.


    Imagine we build an application with our newly built framework, and we suddenly
    need to add new security measures across the whole application. We could make
    changes to every controller, invoking a repeated function, or referencing a shared
    function, but the best solution would be to add the shared functionality higher
    up the inheritance chain.


    If all our framework classes inherit from one base class, we can easily add this
    sort of thing by merely changing one class. This is an example of how inheritance
    is good for our framework. We will also be looking at other uses for it, in the
    chapter that follows.


    Goals


    • We need to use the Inspector class, which we created last chapter, to inspect
    the methods/properties of our Base class, and any subclasses.


    • With the retrieved metadata, we need to determine whether certain properties
    should be treated as though they have getters/setters.


    Getters and Setters


    In this chapter, we are going to look at how to create a solid base class, which
    allows us to use the inspector code we wrote, to create getters/setters. These
    getters/setters will be points of public access, giving access to protected class
    properties. Before we begin doing this, let us take a look at some examples, as
    shown in Listing 3-1.


    ***Listing 3-1.*** Publicly Accessible Properties


    class Car


    {


    public $color;


    public $model;


    }


    $car = new Car();


    $car->color = "blue";


    $car->model = "b-class";


