  ```\n\n## 本章小结\n\n在本章中，您大致了解了在开发领域使用 PHP 编程语言的原因、内容和方式。我们介绍了为什么要使用 PHP、Nginx 和 MySQL\
  \ 及其优势。作为后续步骤，您学习了如何安装 Docker 工具，这是一个用于开发、交付和运行应用程序的开放平台。最后，您了解了为什么需要项目的 YAML 文件来设置您的开发环境。\n\
  \n在下一章中，我们将解释编程语言如何使用变量来存储和操作数据，并在 PHP 中构建有用的工具。\n\n"
- "# 2. PHP 基础\n\n为了在 PHP 中构建有用的工具，您需要知道如何操作数据。编程语言使用变量来存储和操作数据。\n\n在本章中，您将学习编程语言如何使用变量来存储和操作数据，并在\
  \ PHP 中构建有用的工具。\n\n此外，您还将探讨以下主题：\n\n- 将错误用作工具\n- 对象\n- 动词：`GET` 和 `POST`\n\n\n\n\
  #### 变量\n\nPHP 对变量有一些规则：\n\n- 变量必须以 `$` 符号开头，后跟变量名。\n- 变量名必须以字母或下划线开头。\n- 变量名不能以数字开头。\n\
  - 变量名只能包含字母数字字符和下划线（A-z、0-9 和 _）。\n- 变量名区分大小写（`$pants` 和 `$PANTS` 是两个不同的变量）。\n\n\
  与其他编程语言不同，PHP 没有用于声明变量的特定命令。你必须注意变量的声明位置和方式，以及如何使用它们。\n\n让我们编写一些代码，看看浏览器如何处理它们。进入你的\
  \ `beginning-php8-and-mysql` 目录，在 `chapter 2` 文件夹下，创建一个名为 `newtest.php` 的文件。在这个文件中，写入：\n\
  \n```\nthis is normal text\nThis is created by php';\n?>\nthis is normal text again\n\
  ```\n\n上面的代码展示了三行。第一行是普通的 HTML，第二行运行 PHP 代码并生成 HTML，第三行是更多的 HTML，但位于 PHP 代码片段之后/之外。你可以在一个\
  \ `.php` 文件中随意在 PHP 和 HTML 之间来回切换多次。这样做可能会变得混乱，因此你应该将其限制在非常清晰和精确的代码元素中。现在创建一个名为\
  \ `vartest.php` 的文件并打开它。将以下代码输入到文件中并保存：\n\n```\nvariable test\";\n$color = \"blue\"\
  ;\n$item = \"pants\";\necho \"Today I am using $item which happen to be the color\
  \ $color\";\n```\n\n导航到 `localhost:8000/chapter2/vartest.php` 并查看结果（图 2-1）。\n\n\
  ![](img/514068_1_En_2_Fig1_HTML.jpg)\n\n图 2-1\n\nURL 结果网页\n\n好的，我们来总结一下你在做什么。首先，你用\
  \ `<?php` 声明了 PHP 脚本。\n\n接下来的一行，你使用了 `echo`。这是一个 PHP 命令，是向浏览器显示 PHP 文本最基本的方式之一。它只做一件事：将输出发送到浏览器或命令提示符。注意，在\
  \ `echo` 之后，你使用了双引号（`\"`）作为分隔符，来分隔这一段文本，并开始你想要输出到屏幕的文本行。当你处理完文本后，用另一个双引号结束它。双引号是标记你想要使用的文本行开始和结束的分隔符。作为人类，我们可以很容易地识别出写在纸上或屏幕上的文本或句子。计算机需要特殊的标记，在这里就是分隔符，来确定文本的边界。这对于\
  \ `echo` 命令或设置变量（如下一行）都是如此。`$color` 是你想要使用的变量名，`\"blue\"` 是你为其设置的值。在这个特定例子中，`$color`\
  \ 是一个字符串类型的变量。字符串是任何你希望使用的、不会用于计算（例如数学值）的文本。一旦你在 `$color` 中设置了 `\"blue\"` 这个值，你就可以使用\
  \ `echo` 在页面上显示它。当你将变量 `$item` 的值设置为 `\"pants\"` 时，也做了同样的事情。你还会注意到，每一行代码都以分号（`;`）结尾。在\
  \ PHP 中，这就是你告诉解释器停止读取该行并继续执行的方式。任何时候你遗漏了结尾的分号，都会收到一个错误。\n\n说到错误，让我们继续前进，并习惯于将错误视为对我们有用的工具，而不是烦扰。\n\
  \n## 将错误用作工具\n\n在 PHP 中，你并不总是能看到发生的错误。这是因为有三种不同的级别，以及关于如何以及在何处显示它们的配置。让我们回到 `vartest.php`\
  \ 中，在文件顶部添加以下几行：\n\n```\nvariable test\";\n$color = \"blue\";\n$item = \"pants\"\
  ;\necho \"Today I am using $item which happen to be the color $color\";\n```\n\n\
  在运行之前，让我们解释一下你在做什么。\n\n`error_reporting( E_ALL );` 是告诉 PHP 显示*所有*错误。以下是 `error_reporting`\
  \ 的完整选项列表：\n\n```\n<?php\n// 关闭所有错误报告\nerror_reporting(0);\n// 报告简单的运行错误\nerror_reporting(E_ERROR\
  \ | E_WARNING | E_PARSE);\n// 报告 E_NOTICE 也可能是有用的（用于报告未初始化的\n// 变量或捕捉变量名拼写错误...）\n\
  error_reporting(E_ERROR | E_WARNING | E_PARSE | E_NOTICE);\n// 报告除 E_NOTICE 之外的所有错误\n\
  error_reporting(E_ALL & ~E_NOTICE);\n// 报告所有 PHP 错误\nerror_reporting(E_ALL);\n//\
  \ 报告所有 PHP 错误\nerror_reporting(-1);\n// 等同于 error_reporting(E_ALL);\nini_set('error_reporting',\
  \ E_ALL);\n```\n\n接下来的一行是 `ini_set()`，它在 PHP 中用于覆盖在 `php.ini` 文件中设置的配置选项。当你需要进行一次性配置，或者你所在的服务器上无法访问\
  \ `ini` 文件时，这非常有用。再下一行是错误行。你看到了吗？继续，在浏览器中打开该文件，看看它显示什么。\n\n```\nParse error: syntax\
  \ error, unexpected token \">\" in /var/www/chapter2/vartest.php on line 8\n```\n\
  \n利用这个错误，你可以开始追踪 bug。这个错误是说第 8 行出现了一个意外的 `>`。看看你代码的第 8 行：\n\n```\necho \"variable\
  \ test\";\n```\n\n这一行在我看来完全没问题。PHP 告诉我们的是，你在第 8 行*之前*的那一行做了一些事情（在这个例子中设置了一个文本分隔符），导致本应完全正常的第\
  \ 8 行的 `>` 变得意外了。你需要查看第 6 行，你会发现你的文本末尾缺少了结束分隔符 `\"`。继续，在行末添加 `\"` 并刷新页面，现在页面应该能正常渲染，没有错误了。\n\
  \n既然你可以创建和赋值变量、将文本渲染到屏幕上，以及触发/理解出现的错误，让我们开始构建一些页面吧。这正是你拿起这本书的原因，对吧？回到你的 `Chapter2`\
  \ 目录，打开文件 `main.php`。\n\n```\n$title\n\n$content\n\n\";\necho $html;\n```\n\n这些是包含\
  \ PHP 的 HTML5 网页所需的基本元素。你像之前一样在顶部声明了要打开错误报告。接下来的两行设置了两个变量，一个用于标题，一个用于内容。文件的其余部分将变量\
  \ `$html` 设置为你想要在页面上显示的全部 HTML 内容。在这段代码中，你将 `$title` 和 `$content` 变量放置在你希望在页面上显示它们的位置。继续，在你的浏览器中打开这个页面，看看它是什么样的。如果你有许多页面遵循相同的\
  \ HTML 呈现样式，这可能会变得有些重复。因此，你将使用这个页面作为一个模板，你可以调用它，只需替换你想要显示的值。在你的编辑器中打开 `main2.php`。\n\
  \n这里你引入了 `include_once` 函数。通过调用 `include_once`，你告诉 PHP 你想要将一个特定的文件加载到这个区域。通过将设计部分（HTML）与\
  \ PHP 分离，你可以更好地查看你的代码，并在其他 PHP 文件中重用 HTML 元素。基于这个例子，让我们更进一步，在你的模板中包含多个 PHP 文件。在\
  \ `main2.php` 中，将 `template.php` 改为 `template2.php` 并刷新页面。\n\n\n\n在你的情况中，你首先引入了位于\
  \ `inc/` 目录下的 `header.php`。当你采用这种方法在 HTML 代码中嵌入 PHP 片段时，实际上就是在创建一种模板。这个模板（`main.php`）如果被其他文件使用，依然会包含页头、内容和页脚。让我们复制\
  \ `main.php` 文件并将其重命名为 `second.php`，从而创建一个名为 `second.php` 的新文件。\n\n既然你已经理解了如何将模板分离并加以利用，现在我们来看看变量。到目前为止，你一直在为简单的内容、颜色和项目名称使用变量。如果你想存储某人的姓名和地址呢？像下面这样做是完全正确的：\n\
  \n```\n$firstName = \"gunnard\";\n$lastName = \"engebreth\";\n```\n\n这种写法在程序内部函数之间传递这些信息时也完全可行，直到你开始需要将这些信息在程序内部函数之间传递。基本上，想象一下递给朋友一把彩虹糖和递给一整袋彩虹糖的区别。朋友最终都得到了糖果，但其中一种方式更清爽、更优化，并且所有糖果都能保证到达朋友手中。这就引出了对象的概念。\n\
  \n#### 对象\n\n在 PHP 中，对象是由类定义的一组特定数据。在上面的代码示例中，你会说这些信息属于一个名为 `User` 的类。你应该这样定义这个类：\n\
  \n```php\nclass User {\n    public $firstName;\n    public $lastName;\n\n    function\
  \ setFirstName($firstName) {\n        $this->firstName = $firstName;\n    }\n  \
  \  function getFirstName() {\n        echo $this->firstName;\n    }\n    function\
  \ setLastName($lastName) {\n        $this->lastName = $lastName;\n    }\n    function\
  \ getLastName() {\n        echo $this->lastName;\n    }\n}\n```\n\n要创建一个新用户，你可以调用：\n\
  \n```php\n$user = new UserClass();\n$user->setFirstName('gunnard');\n$user->setLastName('engebreth');\n\
  var_dump($user);\n```\n\n让我们分析一下这段代码。\n\n`$user = new UserClass();` 的作用正如其字面含义：现在变量\
  \ `$user` 将拥有你在 `UserClass` 类中定义的配置和格式。这也说明了在 PHP 中正确命名的重要性。看到这一行代码，你就能大概率确定变量 `$user`\
  \ 极有可能与 `$UserClass` 关联，而很少会与名为 `$DumpTruckClass` 的类关联。\n\n接下来的两行调用了你在 `UserClass`\
  \ 中创建的一个方法（函数）。这些特定类型的方法，即 `Get____` 和 `Set___`，被称为辅助方法，通常也称为类的“getter”和“setter”。这些方法简化了在对象中设置值的操作。\n\
  \n最后一行是一个 PHP 特定的函数，常用于调试代码。`var_dump()` 可以精确显示变量中的内容及其类型。在你的示例中，调用 `var_dump` 显示了对象中的所有信息。`$user`\
  \ 就是那袋彩虹糖，而 `$user->firstName` 则是其中的一颗糖果。\n\n现在，如何将它们整合在一起使用呢？你需要在一个文件中定义类信息，然后在另一个文件中引入它。幸运的是，你已经知道如何操作。让我们打开\
  \ `main3.php`。\n\n```php\n<?php\nrequire_once 'inc/UserClass.php';\n\n$user = new\
  \ UserClass();\n$user->setFirstName = 'gunnard';\n$user->setLastName = 'engebreth';\n\
  var_dump($user);\nerror_reporting(E_ALL);\nini_set(\"display_errors\", 1);\n$html\
  \ = include_once \"inc/template2.php\";\n?>\n```\n\n你已经了解了前两行的作用，即设置变量 `$user` 并将其作为\
  \ `UserClass` 类的一部分。接下来的两行设置了姓和名。如果你在命令行或浏览器中运行这个脚本，可以通过 `var_dump()` 函数进行验证。图 2-2\
  \ 显示了你应该看到的结果。\n\n![图 2-2](img/514068_1_En_2_Fig2_HTML.png)\n\n**图 2-2** 代码结果的网页\n\
  \n这是开发中的一个基础阶段。你已经创建了一个对象，为其赋值，并能在页面上显示信息。现在你需要通过表单添加用户交互，使其变得动态化。\n\n表单不仅仅用于在 Facebook\
  \ 上评论他人的照片。表单是用户与程序交互的方法。用户可以直接与代码以及你创建的数据库进行通信。由于这种访问权限，必须花大量精力对输入进行验证和清理，我们后续会讨论这一点。现在，先熟悉如何获取和使用输入。让我们从技术层面探讨如何接收来自用户的数据。\n\
  \n\n\nHTTP（超文本传输协议）是连接你所知的 Web 的协议。这一达成共识的通信协议或方法，允许服务器、PHP 和用户之间相互通信。HTTP 中有许多规范，涵盖错误处理、预期的标准文档格式以及请求方法等方面。这些方法通过五个动词定义：\n\
  \n*   [`GET`](https://developer.mozilla.org/en-US/docs/Web/HTTP/Methods/GET)：`GET`\
  \ 方法请求指定资源的表示。使用 `GET` 的请求应仅用于检索数据。\n*   [`POST`](https://developer.mozilla.org/en-US/docs/Web/HTTP/Methods/POST)：`POST`\
  \ 方法用于向指定资源提交实体，通常会导致服务器状态变更或产生副作用。\n*   [`PUT`](https://developer.mozilla.org/en-US/docs/Web/HTTP/Methods/PUT)：`PUT`\
  \ 方法用请求负载替换目标资源的所有当前表示。\n*   [`DELETE`](https://developer.mozilla.org/en-US/docs/Web/HTTP/Methods/DELETE)：`DELETE`\
  \ 方法删除指定的资源。\n*   [`PATCH`](https://developer.mozilla.org/en-US/docs/Web/HTTP/Methods/PATCH)：`PATCH`\
  \ 方法用于对资源进行部分修改。\n\n你将重点关注 `GET` 和 `POST`，但请放心，在构建 REST API 时，你也会用到其他动词。\n\n将浏览器指向\
  \ `http://localhost:8000/chapter2/main4.php?pants=123`。请注意，在 URL 中，你看到了 `main4.php?pants=123`。页面加载后，应如图\
  \ 2-3 所示。\n\n![图 2-3 URL 结果网页](img/514068_1_En_2_Fig3_HTML.png)\n\n图 2-3\n\n顶部是\
  \ `var_dump()`，你可以看到 URL 中的信息现在在 PHP 中作为变量 `$userVars` 可用。这是通过 HTTP 动词 `GET` 实现的，在\
  \ PHP 中你使用全局变量 `$_GET`。`GET` 特别允许通过 URL 传输数据。你也可以发送多个值。将 URL 修改为包含：\n\n```\nhttp://localhost:8000/chapter2/main4.php?pants=123&dog=poodle&food=spaghetti\n\
  ```\n\n刷新页面，你将看到 `Pants`、`Dog` 和 `Food` 都有了对应的值。另一种从用户向代码传输数据的方法是使用 `POST`。\n\n\
  `POST` 动词的行为方式几乎相同，但不使用 URL，从而使你传输的数据更安全。要查看 `POST` 功能，请打开 `main5.php` 并查看其内容。\n\
  \n```\n$user->setFirstName = 'gunnard';\n$user->setLastName = 'engebreth';\nvar_dump($userVars);\n\
  error_reporting( E_ALL );\nini_set( \"display_errors\",1);\n$html = include_once\
  \ \"inc/template3.php\";\n```\n\n这段代码的主要变化是你使用了 PHP 全局变量 `$_POST` 而非 `$_GET`，并且引入了\
  \ `template3.php`。让我们看看 `template3.php` 文件。\n\n```\n$content = include('contentPost.php');\n\
  ```\n\nTemplate3 引入了一个名为 `contentPost.php` 的特定内容片段。\n\n```\n<form action=\"<?php\
  \ echo htmlspecialchars($_SERVER['PHP_SELF']); ?>\" method=\"post\">\n```\n\n在这里你可以看到允许你使用\
  \ `$_POST` 的差异。你定义了一个表单，并将其 `action` 设置为文件 (`main5.php`) 本身。你看到的这段代码通过动态定位包含表单的文件名并将其填入，使得表单可以在多个地方使用。`$_SERVER['PHP_SELF']`\
  \ 是当前调用此脚本的文件，`htmlspecialchars` 是一个用于移除 HTML 的 PHP 函数，因为 HTML 可能被用于恶意目的。下面的两行声明了用于收集用户输入的\
  \ `firstname` 和 `lastname` 输入框。最后，你有一个提交按钮，触发表单供你的代码使用。请填写表单，然后查看结果页面（图 2-4）。\n\n\
  ![图 2-4 代码结果网页](img/514068_1_En_2_Fig4_HTML.png)\n\n图 2-4\n\n在 `var_dump` 中，你可以看到\
  \ `first name` 和 `last name` 的变量已经成功传递，并且如果你查看 URL，你会发现它是干净的，没有列出任何变量。在你的示例中，你使用了\
  \ `GET` 和 `POST` 来向你的 PHP 提交数据。从技术上讲，你也可以使用 `GET` 来提交此表单，但你确实不应该这样做。`GET` 和 `POST`\
  \ 这两种方法（如上所述）是动词组的一部分，这些动词在现代 API 开发中正被广泛使用。应用程序编程接口（API）是一种允许开发者与应用程序交互的方法。可以这样理解：股票行情、推文流、WordPress\
  \ 的 Instagram 插件——这些都是独立的软件片段，它们连接到其他事物：\n\n*   股票行情 -> Bloomberg API\n*   推文流 ->\
  \ Twitter API\n*   Instagram 画廊 -> Instagram API\n\n软件将向 API 发送特定格式（通常是 JSON 或 XML）的数据，API\
  \ 将验证软件的访问权限并返回所请求的数据。然后，软件将获取这些数据，读取并重新格式化，使其变得可用。回顾上面的 API 动词，软件会向 API 发送 `GET`\
  \ 请求，并期望收到包含所请求数据的响应。这就是我们之前提到的股票、Twitter 或 Instagram 信息。软件也可以向 API `POST` 数据以创建或启动一个流程。`POST`\
  \ 请求用于创建新的 Twitter 账户或与 Bloomberg 实际进行交易。`PUT` 和 `PATCH` 可以用作“更新”方法，例如，更改用户的状态或更换头像。`DELETE`\
  \ 主要用于从 API 中移除或销毁数据。虽然完全有可能仅使用 `GET` 和 `POST` 来构建一个 API，但基于这些动词来分离动词和路由（正如你将要看到的）将为使用给定\
  \ API 的开发者提供更简单、更好的体验。如果你使用 `POST` 来进行创建、更新、删除和搜索操作，这可能会变得混乱，因为你不仅需要检查请求是 `GET`\
  \ 还是 `POST`，还需要设置一个新变量来指定预期的动作（创建、更新、删除、搜索等）。清晰直接的通信方法不仅有助于人类沟通，也能使软件开发保持简洁明了。\n\
  \n## 总结\n\n让我们回顾一下你目前学到的概念。\n\n1.  变量存储供 PHP 使用的信息。这些信息可以由开发者在代码中设置，也可以由用户从外部接收。变量以\
  \ `$` 开头，并且其命名应与用途相关。\n2.  PHP 和 HTML 可以混用。通过 `<?php` 和 `?>` 在 HTML 中打开和关闭 PHP 是完全可以接受的。保持代码整洁和可读性应是首要任务。\n\
  3.  `echo` 用于打印输出文本或变量。\n4.  应拥抱错误，将其视为调试工具。错误可以通过以下方式开启/关闭和配置：\n    *   `error_reporting(\
  \ E_ALL );`\n    *   `ini_set( \"display_errors\", 1);`\n5.  `include_once()` 允许你从另一个文件中引入代码，从而能够将\
  \ PHP 和 HTML 分离到不同的文件中。\n6.  PHP 对象允许你将一组信息分组成一个容器或对象。\n7.  `GET` 和 `POST` 用于接收用户输入。`GET`\
  \ 通过 URL 以明文传输，而 `POST` 则不会。\n8.  `GET` 和 `POST` 是 API 常用的五个动词中的两个。\n\n在下一章中，你将学习如何声明和使用类与函数（包括性状，即类对于对象而言）。同时，还将解释面向对象编程（OOP）。\n\
  \n\n\n"
- "# 3. 函数、类与特征\n\n到目前为止，你一直在使用 PHP 进行简单的自上而下脚本编写。\n\n在本章中，你将学习如何声明和使用类与函数（包括类的定义、可见性、继承和特征）。同时，还将介绍和解释面向对象编程\
  \ (OOP)。\n\nPHP 的真正威力在于能够声明和使用类与函数。快速概括来说，类（如上一章所述）是创建对象时使用的定义。类定义随后会转化为对象，你可以利用这些对象来存储和操作数据。函数是\
  \ PHP 中的保留字，你可以声明、定义并调用它们，以完成或大或小的任务。将这些任务分离到函数中的原因是为了能够抽象它们及其用法。“抽象”是一种花哨的说法，允许一个函数被多个来源为了同一个目的而调用。与其在多个类中编写完全相同的函数，不如将该函数独立放在一个类中，并在需要时调用它。在重构甚至梳理逻辑时，代码重复是需要警惕的问题之一。\n\
  \n基于这些概念，本章将重点介绍 OOP 的世界，它围绕现实世界中的对象（如用户、汽车、颜色，甚至蔬菜）来建模应用程序和开发过程。\n\n本章将涵盖以下主题：\n\
  \n- 面向对象编程 (OOP)\n- 类的定义\n- 类的可见性\n- 类的继承\n- 多态与抽象类\n\n## OOP\n\n面向对象编程中的三个基本概念是：\n\
  \n- **封装**：这关注的是信息在类与应用程序其他部分之间的呈现或暴露。其好处包括：\n  - **降低复杂性**：某些类外部不需要的数据，在这些类外部是不可用的。\n\
  \  - **数据保护**：通过 `GET`/`SET` 方法允许访问数据，创建了一个灵活且可维护的代码库。\n\n- **多态**：一种数据结构具备多种用途和实现的能力。\n\
  \  - 类的扩展和抽象实现了这一点。\n\n- **继承**：类之间能够根据可见性和父子关系共享信息。\n\n这些概念不仅仅是一种声明方法和属性的特定方式。它们关乎思考方式、结构、数据流以及编码方法论。这好比是了解国际象棋规则与知道“伦敦开局”以及如何应对防守之间的区别。这些概念驱动着你如何思考数据、数据使用和数据操作。虽然面向对象编程可以教授，但最好的学习方式是亲身实践。OOP\
  \ 起初可能显得有些刻板和强制，但总有一天，定义、扩展和抽象所带来的自由和创造性会变得有意义，并开始驱动你的开发过程。\n\n### 回顾类的定义\n\n让我们回顾一下上面的类定义：\n\
  \n```\nfirstName = $firstName;\n}\nfunction getFirstName(){\necho $this->firstName;\n\
  }\nfunction setLastName($lastName){\n$this->lastName = $lastName;\n}\nfunction getLastName(){\n\
  echo $this->lastName;\n}\n}\n\n```\n\n类定义以 PHP 关键字 `class` 开头，后跟类名，然后是一对花括号。在这些花括号内，定义了属于该类的属性（变量）和方法（函数）。在类中，函数被称为方法。这类似于威士忌和波本威士忌的关系。所有波本威士忌都是威士忌，但并非所有威士忌都是波本威士忌。所有方法都是函数，但并非你看到的所有函数都是方法。类名，在示例中是\
  \ `UserClass`，在命名方式上有一些限制：\n\n- 不能是保留字。\n- 必须以字母或下划线开头。\n\nPHP 有很多保留字。你已经见过 `class`、`function`\
  \ 以及任何 PHP 函数，例如 `var_dump` 或 `echo`。这些词不能作为用户代码（“userland”）中变量或名称重复使用。任何由用户创建、非\
  \ PHP 内置的类、方法、函数或变量都被视为“用户代码”。这并不一定像听起来那样具有贬义，只是一种将两个世界区分开来的方式。在你的示例中，你声明了变量：\n\n\
  ```\n/* User variables */\nvar $firstName;\nvar $LastName;\n\n```\n\n### 类的可见性\n\
  \n类的属性和方法具有所谓的可见性。这种可见性可以通过在属性声明前添加前缀来定义。例如：\n\n```\npublic $firstName = 'Abraham';\n\
  protected $lastName = 'lincolin';\nprivate $nickName = 'beardyface';\n\n```\n\n\
  在上面的示例类中，你使用 `var` 来声明属性，这默认为 `public`。设置可见性级别的目的是为了控制代码中数据的流动方式。PHP 允许你这样操作：\n\n\
  ```\n$user = getUser($userId);\nfunction showUserName() {\n$user = getUser(4);\n\
  var_dump($user);\n}\nvar_dump($user);\nshowUserName();\n\n```\n\n在这里，你对变量和逻辑的处理相当草率，而\
  \ PHP 相信你知道自己在做什么。PHP 提供了三个级别来保持内部函数变量和外部变量相互独立：public、protected 和 private。\n\n\
  #### Public\n\n公有属性在任何作用域中调用都没有限制。这意味着一个对象的公有属性可以在代码中的任何地方被获取和修改。如前所述，这是使用 `var`\
  \ 声明类属性时的默认行为。虽然这在功能正常的 PHP 代码中是可以接受的，但你应在声明属性时定义其可见性。\n\n#### Protected\n\n第二个级别是受保护的，这意味着声明它们的类或任何扩展它们的类可以访问该属性。\n\
  \n#### Private\n\n最后一个级别是私有的，它类似于受保护的，但更进一步，只允许在其被定义的类中访问。任何子类或扩展类都不能访问此属性。\n\n\
  关于可见性还有更多内容，例如使属性和方法“更可见”以及对它们进行扩展。这些话题改日再谈，但如果你想深入了解，`php.net` 上有关于所有可见性内容的精彩信息。\n\
  \n\n\n## 深入探讨类继承\n\nPHP 中的继承特指从父类到子类的继承。子类可以继承父类中定义的任何公共（public）或受保护（protected）的属性或方法。当一个新类“扩展”（extends）了之前的父类时，就发生了继承。例如，你可以扩展你之前的\
  \ `UserClass` 类。\n\n```\nclass RegisteredUser extends UserClass {\n    function\
  \ setRegistrationNumber($number) {\n        $this->registrationNumber = $number;\n\
  \    }\n    function getRegistrationNumber() {\n        return $this->registrationNumber;\n\
  \    }\n}\n$currentUser = new RegisteredUser();\n$currentUser->setFirstName('Robert');\n\
  $currentUser->setLastName('Paulson');\n$currentUser->setRegistrationNumber('1234xyz');\n\
  ```\n\n如你所见，`$currentUser` 基于或“扩展”自 `UserClass`，因此可以访问 `setFirstName` 和 `setLastName`\
  \ 方法。`$currentUser` 通过 `setRegistrationNumber` 进行了扩展，这允许你扩展 `UserClass` 的类规范。\n\n\
  换句话说，扩展一个类就如同给一个已有的墨西哥卷饼加上鳄梨酱。如果你从菜单上点一个 2 号卷饼，它已经定义并设置好了配料。这就像你的父类 `UserClass`。现在，通过添加一种非预定义的配料，你就是在扩展这个卷饼。这个卷饼本质上没变，但多了你指定的东西。没错，餐厅不能再把这个卷饼叫做\
  \ 2 号了，因为它已经不是了，需要给它另起一个名字，就像你对 `RegisteredUser` 做的那样。`RegisteredUser` 本质上与 `UserClass`\
  \ 相同，但多了一些你定义的额外内容。扩展并不局限于整个类，而是任何公共或受保护的内容。只要类可见性允许，属性（变量）和方法（函数）都可以被扩展。\n\n现在，让我们通过研究抽象类来讨论多态性。\n\
  \n## 多态性与抽象类\n\n与扩展类不同，抽象类就像一个自助冰淇淋圣代吧。你声明想要一个冰淇淋圣代，但你只有一个空杯子。在你放入冰淇淋和你想要的的所有配料之前，它不是一个完整的圣代。无论如何，你创造了一个新的圣代，最终得到的就是一个新的圣代。能够自定义对象（圣代）的特性使其成为抽象。使用抽象类，你可以在父类中定义方法名称和属性，但允许子类定义该方法实际执行的操作。这同时也产生了子类必须定义此方法的依赖关系。让我们来看一下：\n\
  \n```\n<?php\nabstract class Candy {\n    public $name;\n    public function __construct($name)\
  \ {\n        $this->name = $name;\n    }\n    abstract public function slogan()\
  \ : string;\n}\n// 子类\nclass Skittle extends Candy {\n    public function slogan()\
  \ : string {\n        return \"$this->name! - 品尝彩虹！\";\n    }\n}\nclass Twix extends\
  \ Candy {\n    public function slogan() : string {\n        return \"$this->name\
  \ - 你站哪一边？\";\n    }\n}\nclass KitKat extends Candy {\n    public function slogan()\
  \ : string {\n        return \"$this->name - 给我休息一下！\";\n    }\n}\n// 从子类创建对象\n\
  $skittle = new Skittle('Skittles');\necho $skittle->slogan();\n$kitkat = new KitKat('KitKat');\n\
  echo $kitkat->slogan();\n?>\n```\n\n在这个例子中，你定义了一个抽象父类 `Candy`，它包含一个 name 属性和两个方法。`__construct`\
  \ 方法是标准的，它接收一个字符串作为 `$name`。第二个是 `slogan()` 方法，它（就所有实际目的而言）是空的，并返回一个字符串。你这样做的目的是在类中预留了\
  \ `slogan` 这个名称，但允许子类去定义这个方法实际执行的操作。通过这样做，你保持了你所创建的对象之间的一致性。只要对象是创建自一个扩展了 `Candy`\
  \ 的类，你就知道它有一个 `slogan()` 方法；如果你是扩展该类的人，你就知道你需要定义这个方法的功能。\n\n### 常量\n\n类也可以有常量。常量是可以在类中定义并从任何地方使用（取决于可见性）的属性或方法。\n\
  \n```\n<?php\nclass MessageClass {\n    const EXIT_MESSAGE = \"感谢您参加我的 TEDDY 演讲！\"\
  ;\n\n    public function thankyouBye() {\n        echo self::EXIT_MESSAGE;\n   \
  \ }\n}\n\n$message = new MessageClass();\n$message->thankyouBye();\n?>\n\"感谢您参加我的\
  \ TEDDY 演讲！\"\n```\n\n有两种方式可以访问这个常量。一种是在类内部使用 `self::`，正如你在例子中所做的那样。另一种方式是引用类名和双\
  \ `::`，例如 `MessageClass::EXIT_MESSAGE`。常量在组织属性和确保整个应用程序值的连续性方面非常有用。在您的例子中，你有一个消息类来存放你的所有应用消息。这样一来，你就只有一个类需要调用，并且在需要更新消息时，只有一个类需要修改。如果存在一次性的消息，你总可以扩展该类并从中调整措辞。以这种方式使用常量的主要目的是保持数据的结构化和组织性，以便在开发过程中达到最佳使用效果，并将代码重复降到最低。如果你可以在一个类中设置相同的“欢迎”消息并从任何地方引用它，就无需使用多个包含相同消息的变量。\n\
  \n### 构造与析构\n\n类提供了构造函数和析构函数。前者在创建新对象时被调用并“构造”，后者则在没有对特定对象的其他引用时立即“析构”。一个构造方法看起来像这样：\n\
  \n```\npublic function __construct() {\n    // 初始化属性\n}\n```\n\n注意 `__construct()`\
  \ 方法名称前面有 `__`。在 PHP 8 之前，如果类的方法名与类名相同，那么该方法会被视为构造函数。现在这样做会引发一个 `E_DEPRECATED` 错误，但仍会作为构造函数运行。如果同时定义了\
  \ `__construct()` 和一个与类名相同的方法，则会调用 `__construct()`。\n\n构造函数用于在创建新对象时，为属性设置特定的参数。在\
  \ PHP 8 中，这可以通过构造函数属性提升轻松完成。\n\n一个析构方法看起来如下所示：\n\n```\npublic function __destruct()\
  \ {\n    echo '正在销毁 UserClass';\n}\n```\n\n虽然这个析构函数只打印了状态 `正在销毁 UserClass`，但更实际的用途是清除缓存、`unset()`\
  \ 变量或其他整理工作。\n\n### 特征（Trait）\n\n接下来是特征（Trait）。可以把特征理解为：类之于对象，犹如特征之于类。你可以在一个特征中定义多个方法，并在几个不同的类中使用它们，只要这些类引用了该特征。在\
  \ PHP 中使用特征的原因是 PHP 是一种单继承语言。这意味着，虽然你可以定义一个类及其所有方法，并且你扩展的任何子类都可以访问这些方法，但你不能跨越到另一个类去借用方法。子类不能从另一个类继承方法。为了防止你在各处重复代码，你可以从多个子类引用一个特征来使用单一方法。这里有一个简单的例子：\n\
  \n```\n<?php\ntrait MessageTrait {\n    public function message1() {\n        echo\
  \ \"用户消息 1\";\n    }\n}\n\nclass User1 {\n    use MessageTrait;\n}\n\nclass User2\
  \ {\n    use MessageTrait;\n}\n\n$user1 = new User1();\n$user2 = new User2();\n\
  $user1->message1();\n$user2->message1();\n?>\n```\n\n这会从两个不同的类打印出消息“用户消息 1 用户消息\
  \ 1”。这在处理共享功能但并非共享相同数据的大型系统时非常有用。\n\n最后，我们必须讨论命名空间及其在面向对象编程中的功能。\n\n\n\n### 命名空间\n\
  \n命名空间允许对类进行标记，这样在代码中引用它们时，你可以通过命名空间指定要使用的类。你也可以使用命名空间将类分组，以便更好地组织代码。此外，命名空间还允许在不同的类中使用相同的名称。以下是命名空间的声明方式：\n\
  \n命名空间声明必须是 PHP 文件中的第一行代码。命名空间声明之后的所有内容都被视为属于该命名空间。\n\n```\npantsLabel('leeevi');\n\
  ```\n\n在 `Pants` 类声明外部的文件中，代码如下所示：\n\n```\npantsLabel('leeevi');\n```\n\n你也可以直接在同一命名空间中包含此\
  \ PHP 文件，这样就不需要在开头使用 `Pants\\.`\n\n```\npantsLabel('leeevi');\n```\n\n此外，还可以为命名空间创建别名，以便于使用或更好地管理代码。\n\
  \n```\nnamespace Pants as P;\n$thesePants = new P\\PantsMaker();\necho $thesePants->pantsLabel('leeevi');\n\
  ```\n\n关于 PHP 对象和面向对象编程（OOP）还有很多内容需要覆盖。这里只是冰山一角。我们强烈建议你进一步搜索关于 OOP 以及 PHP 所提供的相关功能的更多信息。\n\
  \n## 总结\n\n让我们回顾一下你现在对 OOP 的了解。\n\n- OOP 包含三个概念：\n  - **封装**：将功能保留在特定类中，与不需要它的地方分离\n\
  \  - **多态**：允许从一个父类创建多个版本\n  - **继承**：从父类向子类共享特定的属性和方法\n- 类用于定义对象。\n- 对象使用类中定义的属性和方法来处理数据。\n\
  - 类之间可以通过父子关系相互继承。\n- 类使用可见性（`public`、`private` 或 `protected`）来允许扩展类共享属性和方法。\n-\
  \ 类可以是抽象的，允许子类在创建时定义方法或属性的工作方式。\n\n在下一章中，你将学习如何处理数据以及像 `Bool`、`Int`、`Float` 和 `Array`\
  \ 这样的数据类型。\n\n"
- "# 4. 数据与数据类型\n\n在本章中，你将学习 PHP 如何处理数据与数据类型，以及如何在 PHP 中使用变量存储数据——从简单的字符串和数字，到更复杂的数组和对象。\n\
  \n数据类型是根据属性将数据分类为特定类别的方式，这些属性可以是：\n\n- **字母数字型**：字符被归类为字符串\n- **整数型**：归类为整数\n- **浮点型**：带有小数点的数字\n\
  - **布尔型**：可以是 `true` 或 `false`\n\n本章将涵盖以下主题：\n\n- PHP 数据类型简介\n- 标量类型（预定义）\n- 复合类型（用户自定义）\n\
  - 特殊类型\n\n### PHP 数据类型\n\n通常，PHP 支持八种基本数据类型用于创建变量，根据你要存储的数据类型，选择合适的数据类型变量。如果你想在变量中存储短语\
  \ `\"Hello World\"`，你会选择 `string` 类型而不是 `integer` 类型。为什么？因为 `string` 是字符序列，而 `integer`\
  \ 是介于 -2,147,483,648 和 2,147,483,647 之间的非小数的数字。出于实际目的，使用 `string` 更合理，如果你试图将 `\"\
  Hello World\"` 赋值给一个 `integer` 类型的变量，PHP 会友善地告诉你不能这样做。\n\n以下是 PHP 中用于创建变量的八种基本数据类型：\n\
  \n- 标量类型（预定义）：\n  - `Boolean`\n  - `Integer`\n  - `Float`\n  - `String`\n- 复合类型（用户自定义）：\n\
  \  - `Array`\n  - `Object`\n- 特殊类型：\n  - `NULL`\n  - `Resource`\n\n## PHP 数据类型：标量类型\n\
  \n在 PHP 中，标量的含义是：\n\n1. 一个完全由其大小决定且没有方向的量，例如质量、长度或速度。\n2. 一个数字、数值量或域中的元素。\n3. 一种设备，其输出等于输入乘以一个常数，如在线性放大器中。\n\
  \n你可以将诸如 10 或 5 这样的数字视为标量。像 `\"Hello World\"` 这样的单词、字母或短语也被视为标量。\n\n这种 PHP 数据类型只保存单一值，包含四种标量数据类型：\n\
  \n- `Boolean`\n- `Integer`\n- `Float`\n- `String`\n\n\n\n##### 布尔型\n\n布尔类型是最简单的类型。它表示一个“真”值，即\
  \ `true` 或 `false`。\n\n要指定一个布尔字面量，请使用常量 `true` 或 `false`。两者均不区分大小写。\n\n布尔类型常用于条件测试中。\n\
  \n##### 整型\n\n`int` 是一个介于 -2,147,483,648 和 2,147,483,647 之间的非小数数字。整数可以用四种不同的进制来指定：\n\
  \n1.  十进制（基数为 10）[1, 2, 3, 4, 5, 6, 等]\n2.  十六进制（基数为 16）[1A, 1B, 1C, 等]\n3.  八进制（基数为\
  \ 8）[1, 2, 3, 4, 5, 6, 7]\n4.  二进制（基数为 2）[0, 1, 1011, 等]\n\n整数还必须遵守以下规则：\n\n*  \
  \ 整数必须至少包含一位数字。\n*   整数不得包含小数点。\n\n##### 浮点型\n\n浮点型（浮点数）是一个带小数点的数字，或是指数形式的数字。\n\n\
  ##### 字符串\n\n字符串是一组字符序列，例如 \"Hello World!\"。\n\n字符串可以是引号内的任何文本。你可以使用单引号或双引号。\n\n\
  字符串字面量可以通过四种不同的方式指定：\n\n*   单引号\n*   双引号\n*   Heredoc 语法\n*   Nowdoc 语法\n\n将变量指定为字符串最基本的方法是用单引号（`'`）将其括起来。如果你想指定一个*真正的*单引号供使用，你需要“转义”该字符本身，即告诉\
  \ PHP 忽略此字符的功能，只将其作为你想要在某个地方打印出来的真实单引号。PHP 的转义字符是反斜杠（`\\`）。这引发了一个问题：如何转义反斜杠才能使用一个字面反斜杠？很简单。以同样的方式转义它，即（`\\\
  \\`）。与字符串的其他语法（双引号和 Heredoc）不同，使用单引号字符串时，变量和特殊字符的转义序列不会被展开。\n\n使用双引号（`\"`）时，PHP\
  \ 会解释以下针对特殊字符的转义序列：\n\n| 序列 | 含义 |\n| -------- | ------- |\n| `\\n` | 换行（LF 或 ASCII\
  \ 中的 0x0A (10)） |\n| `\\r` | 回车（CR 或 ASCII 中的 0x0D (13)） |\n| `\\t` | 水平制表符（HT 或\
  \ ASCII 中的 0x09 (9)） |\n| `\\v` | 垂直制表符（VT 或 ASCII 中的 0x0B (11)） |\n| `\\e` | 转义（ESC\
  \ 或 ASCII 中的 0x1B (27)） |\n| `\\f` | 换页（FF 或 ASCII 中的 0x0C (12)） |\n| `\\\\` | 反斜杠\
  \ |\n| `\\$` | 美元符号 |\n| `\\\"` | 双引号 |\n| `\\[0-7]{1,3}` | 匹配此正则表达式的字符序列是八进制表示的一个字符，它会静默溢出以适配一个字节（例如，`\"\
  \\400\"` === `\"\\000\"`） |\n| `\\x[0-9A-Fa-f]{1,2}` | 匹配此正则表达式的字符序列是十六进制表示的一个字符\
  \ |\n| `\\u{[0-9A-Fa-f]+}` | 匹配此正则表达式的字符序列是一个 Unicode 码点，该码点将以 UTF-8 编码形式输出到字符串中\
  \ |\n\n双引号字符串的转义字符与单引号字符串相同，都是反斜杠（`\\`）。单引号和双引号字符串的主要区别在于，如果在双引号内使用变量，变量会被展开。\n\n\
  在 PHP 中创建字符串数据类型的第三种方法是使用 Heredoc 语法：`<<<`。这种方法对于处理大量预格式化文本特别有用。要使用 Heredoc，你只需以这个运算符\
  \ `<<<` 开头，随后紧跟一个标识字符串名称或引用的标识符，然后是一个换行。接下来是字符串内容，最后用开头相同的标识符来闭合或结束引号。它看起来像这样：\n\
  \n```\nHeredoc 中的文本行为与双引号字符串完全相同。上述转义码和引号仍然可以使用。变量也会被展开。\n```\n\n此外，闭合标识符必须遵循 PHP\
  \ 中任何其他标签的相同命名规则：它只能包含字母数字字符和下划线，并且必须以非数字字符或下划线开头。\n\nNowdoc 是单引号版本的 Heredoc。Nowdoc\
  \ 的指定方式相同，但标识符需要用单引号括起来。\n\n\n\n使用双引号或 `heredoc` 指定的字符串会解析其中的变量。有两种语法可用于此：简单语法或复杂语法。这并非描述二者的易用性，而是描述被解析变量的复杂性。简单语法最常用，它提供了一种以最小工作量在字符串中嵌入变量、数组值或对象属性的方式。复杂语法则使用花括号来组织并告知\
  \ `PHP` 需要解析什么。\n\n```\n这将输出以下内容：\nHe drank some earl grey tea.\nHe drank some tea\
  \ made of .\nHe drank some tea made of earl grey.\n如之前所述，复杂语法之所以被称为“复杂”，并非因其语法复杂，而是因为它允许使用复杂表达式。通过复杂语法，任何具有字符串表示形式（具有字符串的变量）的数组元素、标量变量或对象属性都可以包含在此语法中。这意味着您不仅可以显示通过变量`$foo\
  \ = \"bar\"`定义的简单字符串，还可以显示更复杂的情况，例如`$foo[$x] = \"Bar\"`。\n\n这是有效的语法，尽管某些变量需要先定义。请查看以下正确语法示例：\n\
  \n```\nwidth}00 centimeters broad.\";\n// 有效，带引号的键只能使用花括号语法\necho \"This works:\
  \ {$arr['key']}\";\n// 有效\necho \"This works: {$arr[4][3]}\";\n// 这错误，原因与在字符串外使用\
  \ $foo[bar] 相同。\n// 换句话说，它仍然会工作，但仅仅是因为 PHP 首先会寻找一个名为 foo 的常量；将会抛出一个 E_NOTICE 级别（未定义常量）的错误。\n\
  echo \"This is wrong: {$arr[foo][3]}\";\n// 有效。在字符串内使用多维数组时，始终在数组周围使用花括号\necho \"\
  This works: {$arr['foo'][3]}\";\n// 有效。\necho \"This works: \" . $arr['foo'][3];\n\
  echo \"This works too: {$obj->values[3]->name}\";\necho \"This is the value of the\
  \ var named $name: {${$name}}\";\necho \"This is the value of the var named by the\
  \ return value of getName(): {${getName()}}\";\necho \"This is the value of the\
  \ var named by the return value of \\$object->getName(): {${$object->getName()}}\"\
  ;\n// 无效，输出：This is the return value of getName(): {getName()}\necho \"This is the\
  \ return value of getName(): {getName()}\";\n// 无效，输出：C:\\folder\\{fun}.txt\necho\
  \ \"C:\\folder\\{$great}.txt\"\n// 有效，输出：C:\\folder\\fun.txt\necho \"C:\\\\folder\\\
  \\{$great}.txt\"\n?>\n```\n\n访问类属性：\n\n```\n$bar}\\n\";\necho \"{$foo->{$baz[1]}}\\\
  n\";\n?>\n```\n\n### PHP 字符串函数\n\nPHP 有许多专门为字符串设计的内置函数，包括：\n\n*   `substr()`\n*\
  \   `strlen()`\n*   `str_replace()`\n*   `trim()`\n*   `strpos()`\n*   `strtolower()`\n\
  *   `strtoupper()`\n*   `is_string()`\n*   `strstr()`\n\n#### `substr()`\n\n```\n\
  string substr(string string, int start[, int length] );\n```\n\n返回值是从字符串中复制出来的一个子字符串。\n\
  \n```\n$comment = 'your product works well!';\n```\n\n调用函数时，您可以使用正数或负数。正数表示从起始位置获取字符串直到字符串末尾。负数起始值表示从字符串末尾减去起始字符数开始获取字符串直到字符串末尾。请查看\
  \ `chapter4-substring.php`。\n\n```\n$comment = 'Your product is great!';\necho substr($comment,\
  \ 1) . \"\\n\";\n//  返回 'Your product is great!'.\n$comment = 'Your product is great!';\n\
  echo substr($comment, -9) . \"\\n\";\n//  返回 'is great!'\nour product is great!\n\
  is great!\n```\n\n`length` 参数用于指定以下两者之一：\n\n*   返回的字符数（正数长度）\n*   返回序列的结束字符（负数长度）\n\
  \n```\n$comment = 'Your product is great!';\nsubstr($comment, 0, 4);\n// 返回 'Your'\n\
  substr($comment, 5, -10);\n// 返回 'product'\n```\n\n`5` 表示起始字符点（p），`-10` 确定结束点（从字符串末尾开始向前数\
  \ 10 个位置）。\n\n#### `strlen()`\n\n`strlen()` 用于检查字符串的长度。\n\n```\necho strlen(\"Harder\
  \ Faster Better Stronger\");\n// 29\n 0) {\necho 'that is valid foo';\n} else {\n\
  echo 'that foo is too small';\n}\n?>\n// that foo is too small\n```\n\n#### `str_replace()`\n\
  \n很多时候，使用字符串时，能够查找和替换子字符串非常有用。使用 `str_replace()`，这变得很容易。\n\n```\nmixed str_replace(mixed\
  \ needle, mixed new_needle, mixed haystack[, int &count]));\n```\n\n`str_replace()`\
  \ 使用 PHP 中一个常见概念：“needle”和“haystack”。看到这个，您可以想象在干草堆里找一根针的想法。这为您指明了哪个术语对应什么。我是在干草堆中寻找一根针，如\
  \ `str_replace(\"pants\", $longParagraph)` 所示。要明确的是：`\"pants\"` == needle，`$longParagraph`\
  \ == haystack。\n\n```\n<?php\n$strings = array (\n'You like to have a snazzy time',\n\
  'You are a really snazzy person',\n'Would you like to drink a cup of coffee?'\n\
  );\n$search = array (\n'snazzy',\n'cup',\n'person',\n'coffee'\n);\n$replace = array\
  \ (\n'great',\n'bottle'',\n'dude',\n'Dark brown stuff'\n);\n$replaced = str_replace\
  \ ( $search, $replace, $strings );\n```\n\n#### `trim()`\n\n处理未知输入比较棘手，这正是 `trim()`\
  \ 的用武之地。`trim()` 函数用于去除字符串左、右或两侧不需要的空格。您也可以指定想要去除的字符。\n\n#### `strpos()`\n\n`strpos()`\
  \ 函数的运作方式与 `strstr()` 类似，不同之处在于它返回一个子字符串在干草堆中的数值位置，而不是返回一个子字符串。\n\n```\nint strpos(string\
  \ haystack, string needle, int [offset] );\n```\n\n返回的整数是 needle 在 haystack 中首次出现的位置。第一个字符位于位置\
  \ 0，与数组类似。\n\n通过运行以下代码，您可以看到感叹号位于位置 13。\n\n```\n$awesome = \"Super Awesome!\";\n\
  echo strpos($awesome, \"!\");\n// 13\n```\n\n此函数接受单个字符作为 needle，但它也可以接受任意长度的字符串。可选的\
  \ `offset` 参数决定了在 haystack 中开始搜索的点。\n\n```\n$awesome = \"Super Awesome!\";\necho\
  \ strpos($awesome, 'm', 3);\n// 11\n```\n\n这段代码向浏览器输出值 11，因为 PHP 从位置 3 开始寻找字符 `m`。\n\
  \n在任何这些情况下，如果 needle 不在字符串中，`strpos()` 将返回 `false`。为避免奇怪的行为，您可以使用 `===` 运算符来测试返回值。请查看\
  \ `chapter4-strpos.php`。\n\n#### `strtolower()`\n\n在 `PHP` 中经常需要比较字符串或纠正当人们使用全大写或奇怪写法时的大小写。为了比较字符串，您需要确保它们大小写一致。您可以为此目的使用\
  \ `strtolower()`。让我们使用一个用 `strtolower()` 创建的函数来安抚一个愤怒的人。\n\n#### `strtoupper()`\n\
  \n`strtoupper()` 也很流行，原因与上述相反，即它接受一个小写或大小写混合的字符串并将其转换为全大写。让我们改变一下，创建一个叫醒函数让您的员工在早上精神起来。\n\
  \n#### `is_string()`\n\n`is_string()` 用于检查一个值是否为字符串。让我们在 `if()` 语句中查看它，以便对字符串和非字符串采取不同的操作。`is_string()`\
  \ 返回 `true` 或 `false`。\n\n#### `strstr()`\n\n最后但同样重要的是 `strstr()` 函数。`strstr()`\
  \ 函数可用于在较长的字符串中查找字符串或字符匹配。此函数可用于在一个字符串内查找另一个字符串，包括查找仅包含单个字符的字符串。\n\n```\nstring\
  \ strstr(string haystack, string needle);\n```\n\n\n\n您向`strstr()`传递一个待搜索的`haystack`和一个待查找的`needle`。如果找到完全匹配的`needle`，`strstr()`函数将从`needle`开始返回`haystack`。如果未找到`needle`，则返回`false`。如果`needle`出现多次，返回的字符串将从`needle`第一次出现的位置开始。\n\
  \n举例来说，假设您有一个供人们提交其网站的提交表单，但您希望网站采用特定格式。您可以使用`strstr()`来检查字符串中是否包含某子字符串，从而帮助实现这一点。\n\
  \n```\n两种复合类型：\nI\n在下一节中，您将学习复合数据类型。\n```\n\n## PHP 数据类型：复合类型\n\nPHP 复合类型可以包含多个值，包括两种数据类型：\n\
  \n- 数组\n- 对象\n\n##### 数组\nPHP 中的数组实际上是一个有序映射。映射是一种将值与键关联起来的类型。此类型针对多种不同用途进行了优化；它可以被视为数组、列表（向量）、哈希表（映射的一种实现）、字典、集合、栈、队列等。由于数组值可以是其他数组，因此树和多维数组也是可能的。对这些数据结构的解释超出了本手册的范围，但我们将为每种结构至少提供一个示例。有关更多信息，请查阅关于此广泛主题的大量现有文献。\n\
  \nPHP 中的数组是一种将值与键关联起来的类型。默认情况下，PHP 将键分配为从 0 开始、一直到数组大小的数字。请参见`chapter4.php`。\n\n\
  ```\narray(3) {\n[0]=>\nstring(5) \"first\"\n[1]=>\nstring(6) \"second\"\n[2]=>\n\
  string(3) \"3rd\"\n}\n```\n\nPHP 还允许您指定对应用程序可能更有意义的特定键，它们被称为关联数组。\n\n```\narray(3)\
  \ {\n[\"fruit\"]=>\nstring(5) \"apple\"\n[\"vegetable\"]=>\nstring(6) \"carrot\"\
  \n[\"color\"]=>\nstring(4) \"blue\"\n}\n```\n\n您还可以创建多维数组。您可以将其想象成一个电视节目，由标题“Strangest\
  \ Things”组成，分为多个季节，每个季节包含单集。作为 PHP 中的一个变量，它可能如下所示：\n\n```\narray(2) {\n[\"season1\"\
  ]=>\narray(2) {\n[\"episode1\"]=>\nstring(12) \"The Beginning\"\n[\"episode3\"]=>\n\
  string(17) \"The Third Episode\"\n}\n[0]=>\narray(1) {\n[0]=>\nstring(13) \"The\
  \ Beginning\"\n}\n}\n```\n\n接下来，您将探索面向对象编程中的“对象”。\n\n#### 对象\n对象以及类是面向对象编程（OOP）的主要组成部分。您可以将类视为模板或结构，当创建并使用新对象时，该对象将使用这个模板或结构。当对象数据类型作为变量创建，例如`$myCar`，它将拥有`$car`类的所有属性和功能，包括`$model`、`$color`、`$price`等。当创建各个对象时，它们继承类中的所有属性和行为，但每个对象的属性值不同。假设您有一个名为`Car`的类。`Car`可以拥有`model`和`color`等属性。您可以定义`$model`和`$color`等变量来保存这些属性的值。当创建各个对象（`Volvo`、`BMW`、`Toyota`等）时，它们继承类中的所有属性和行为，但每个对象的属性值不同。如果您创建了一个`__construct()`函数，那么当您从类创建对象时，PHP\
  \ 将自动调用此函数。\n\n## PHP 数据类型：特殊类型\n\n在 PHP 中，有两种特殊类型：\n\n- NULL\n- 资源\n\n##### NULL\n\
  `NULL`是一个特殊值，表示没有值的变量。`NULL`是唯一可能放入的值。特殊值`NULL`表示一个没有值的变量。`NULL`是类型为`NULL`的变量的唯一可能值。在以下情况下，变量被视为`null`：\n\
  \n- 已分配常量`null`。\n- 未设置其他值。\n- 它已被`unset()`。\n\n（`chapter4-1.php`）\n\n```\nNull\
  \ value\n```\n\n### 资源\n资源在 PHP 中并不完全是一种数据类型，因为它们主要用于存储某些函数调用或作为对外部 PHP 资源的引用。\n\
  \n## 总结\n在本章中，您了解到 PHP 中有不同的数据类型，如标量类型（预定义）、复合类型（用户定义）和特殊类型。您还了解到 PHP 数据类型可以是字母数字、整数、浮点数和布尔值。您特别关注了字符串，它是\
  \ PHP 中非常有用的类型，您将经常使用它。请记住，字符串的强大之处在于可以对其执行多种不同的操作，以及有大量可用的预构建字符串函数。在下一章中，您将学习 PHP\
  \ 表单数据处理，并了解如何使用 PHP 超全局变量（如`$_GET`和`$_POST`）创建和使用表单来获取表单数据。\n\n# 5. 表单数据\n\n在本章中，您将学习如何使用`POST`和`GET`方法在\
  \ PHP 中创建和管理表单。您将探索三个超全局变量：`$_POST`、`$_GET`和`$_REQUEST`。`$_POST`和`$_GET`是在 PHP 中接收用户输入的两种最常见方式。`$_REQUEST`使用较少。\n\
  \n本章包括以下章节：\n\n- PHP GET 表单\n- PHP POST 表单\n\n我们曾询问一位初级开发者`POST`和`GET`（总体上）的区别。他给出的答案虽然不太理想，但并非错误。他说`POST`用于发送数据，`GET`用于检索数据。这没错。当使用\
  \ RESTful API 时，我们会`POST`数据供服务器使用，并`GET`数据作为数据库查询的请求（例如）。然而，这并非我们期望的答案——甚至他都不知道自己在说什么。我们想找的`POST`和`GET`之间的区别如下：`POST`通过\
  \ HTTP 正文将数据发送到等待的服务器（API、特定 PHP 文件等）。`GET`将表单数据以名称-值对的形式附加到 URL。下次您点击表单上的“提交”按钮时，请查看\
  \ URL。如果您看到刚填写的任何信息，则说明使用了`GET`。如果 URL 是干净的，那么肯定使用了`POST`。老实说，您甚至不需要使用表单就能使用`GET`。`GET`是一种非常有用的方式来持久化唯一\
  \ ID、面包屑导航和各种数据。它们都有各自的功能和用例，但使用两者时，我们都必须将安全放在首位。曾经有个关于一位医生的电视节目，他以“永远不要相信病人。他们会撒谎。”而闻名。在我们的情况下，永远不要相信用户输入。将您的代码暴露给像表单这样的开放攻击向量……这本身就是一个攻击向量。这不是“是否”有人试图通过表单进行黑客攻击的问题，而是\
  \ 100%的“何时”问题。如果您现在查看实时服务器日志，您会看到成百上千的请求涌入，扫描它们能找到的所有文件和目录。当他们试图找到您暴露的 WordPress\
  \ 配置文件时，他们同时也在通过机器人攻击前端，试图对您的表单进行 SQL 注入。一旦您创建了一个表单，您就向外部世界敞开了大门，黑客们会欣然进入。现在，我已经把您完全吓跑了，以至于您再也不敢尝试编码了，但这是可以管理的。可以采取一些策略来减缓、阻止甚至完全阻止黑客通过您编写的代码获得访问权限。尽管如此，没有万无一失的方法来抵御\
  \ SQL 注入。不过，您可以遵循许多最佳实践来尽可能感到安全，在您设置好自己的黑客红地毯（我的意思是表单）之后，您将学习这些实践。\n\n### PHP POST\
  \ 表单\n\n让我们看看 PHP POST 表单是如何工作的。让我们创建一个简单的 HTML 表单，看看`$_POST`如何从 HTML 页面中的 POST\
  \ 请求变量接收数据。\n\n这是一个基本的 HTML 表单：\n\n```\n(basicForm.php)\n\nName: \nE-mail:\n\n```\n\
  \n\n\n该表单获取用户的姓名和电子邮件输入，并通过`POST`方法将其发送到`functions.php`。`method`设置指定了请求方法，而`action`设置则指定了数据发送的目标地址。如果你打开`functions.php`，就能看到后续的处理逻辑。\n\
  \n```php\nback\n```\n\n上述代码接收并验证了从表单发送的两个`POST`变量`$_POST['name']`和`$_POST['email']`，然后将它们打印到屏幕上。你会看到`name=\"\
  name\"`和`name=\"email\"`被发送到了`functions.php`，并通过`$_POST['name']`或`$_POST['email']`进行检索。如果你在表单页面中将电子邮件字段的`name`属性从`name=\"\
  email\"`改为`name=\"myEmail\"`，那么就需要使用`$_POST['myEmail']`来引用它。\n\n让我们快速尝试一下。\n不要在“姓名”字段中输入你的名字，而是输入`pants`。\n\
  \n```\npants\n```\n\n现在按回车键，观察图 5-1 所示的结果。\n\n![](img/514068_1_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1 POST 表单的代码结果\n\n这并不是开发者在创建表单时所期望的结果。作为开发者，不仅要考虑代码的精确用例，还必须考虑到边界情况、边缘情况和最坏情况。用户通常很可靠，会按照“正确”的方式使用应用程序，但有时也可能出现上述示例中的情况。这通常是由于一次性的输入错误造成的，但现实是，越来越多的攻击者利用像你构建的这种表单，利用安全措施的缺失来入侵你的系统。无论你在哪里工作，或者你自认为系统多么安全，都必须将安全性放在首位。\n\
  \n让我们开始缓解这种情况。\n\n打开`functions.php`，添加以下代码行，使其看起来像这样：\n\n```php\nback\n```\n\n返回并尝试再次将`<h1>pants</h1>`作为“name”发送。这次你会看到不同的结果。现在，你已经阻止了\
  \ HTML 元素被浏览器渲染。这是朝着正确方向迈出的积极一步。当今许多成功的攻击都是从简单的 HTML 元素在页面上渲染开始的。现在，让我们看看你能对电子邮件地址做些什么。\n\
  \n你已经对电子邮件地址进行了清理，以确保没有恶意字符通过，但你还希望验证其格式是否符合特定要求。你需要检查用户输入的电子邮件地址是否包含由字母、数字以及一些特殊字符（如`-`和`.`）组成的起始部分。然后，检查是否有`@`符号，其后是更多的字母和数字，最后是一个句点加上有效的域名（如`.com`、`.org`、`.net`等）。这可以通过使用之前用过的`filter_var`函数，并指定`FILTER_VALIDATE_EMAIL`选项来实现。再次打开`functions.php`，添加以下代码行以验证电子邮件地址：\n\
  \n```php\nback\n```\n\n重新加载表单，并输入一个格式非常不正确的电子邮件地址，例如`pants one1@mail.$$$`。这将返回“Invalid\
  \ email format”，因为其格式无效（明白了吗？）。当然，这种方法并非万无一失。如果没有实际从该域名的邮件服务器发送并接收响应，就无法真正验证这是一个真实且正在使用的电子邮件地址。这只是帮助你通过第一轮检查。下一步是实现“请检查您的电子邮件以验证您是真实用户”的步骤，以使流程更加真实。\n\
  \n你是否注意到，在收到“Invalid email format”消息并点击后退按钮后，输入框中的内容就消失了？你的姓名和电子邮件不再保留。如果能在输入框中保留这些内容，以防用户输错一个字母而不想重新输入所有内容，岂不是更好？\n\
  \n### PHP GET 表单\n让我们看看 PHP GET 表单是如何工作的。\n\n你可以使用`$_GET`轻松实现上述功能。再次打开`functions.php`，并在底部的“back”链接处添加以下代码行：\n\
  \n```php\n&email=\">back\n```\n\n这里，你将`$name`和`$email`变量添加到 URL 中，以便在返回`shortForm.php`时使用它们。不过，`<?=`是什么意思呢？这是\
  \ PHP 使用其短打开选项的方式。当你需要在 HTML 中使用 PHP 代码执行简单操作时，可以使用短打开标签`<?=`，而不必输入`<?php`。其中`=`代表`echo`。因此，有了这个工具，你可以快速将`$name`和`$email`变量放入\
  \ URL 中，以便在`basicForm.php`页面上使用`$_GET`变量。继续打开该文件，并添加以下代码行：\n\n```php\nName: \">\n\
  E-mail: \">\n```\n\n表单页面现在会检查`$_GET`超级全局变量中是否设置了任何变量。如果有，它会检查`$_GET['name']`和`$_GET['email']`是否已设置。如果它们中有值，则分别将其赋给`$name`和`$email`。接下来，它会检查`$name`或`$email`是否已设置。这是一个`if`语句的三元表达式。与其这样写：\n\
  \n```php\nif ($name != \"\" ) {\n$name = $name;\n} else {\n$name = \"\";\n}\n```\n\
  \n不如这样写：\n\n```\n(Conditional statement) ? (Statement_1) : (Statement_2);\n```\n\
  \n因此，你想要的是：\n\n```\n$name != \"\" ? $name : \"\"\n如果$name 不为空，则将其值赋给$name，否则将其设置为\"\
  \"。\n```\n\n在输入框中，你使用`value`属性来添加刚从`$_GET`（通过 URL）接收到的姓名或电子邮件（或者为空）。现在，你可以获取用户信息并将其传递回自己的脚本，从而与用户进行完整的交互。使用`$_GET`和`$_POST`超级全局变量可以让你熟悉数组，特别是关联数组。\n\
  \n## 总结\n在本章中，你学习了 PHP 表单数据处理。你学习了如何创建和使用表单，以及如何通过 PHP 超级全局变量（如`$_GET`和`$_POST`）获取表单数据。在下一章中，你将更深入地学习数组，数组用于在单个变量中保存多个相似类型的值。\n\
  \n# 6. 数组\n\n在前面的章节中，你学习了如何处理 PHP 变量。在本章中，我们将教你如何创建和管理 PHP 数组。\n假设你需要在单个变量中保存多个相似类型的值，而无需创建额外的变量来存储它们。你该如何实现呢？通过使用\
  \ PHP 数组。\n\n本章包含以下部分：\n\n*   PHP 索引数组和关联数组\n*   PHP 多维数组\n*   PHP 数组函数\n\n## PHP\
  \ 索引数组和关联数组\n数组是 PHP 中最通用和最有用的元素之一。那么，究竟什么是数组？数组用于在单个变量中存储多个值。可以把数组想象成一个有多个隔间的容器。使用这个容器，你可以存储和组织其他信息，包括变量。\n\
  使用 PHP 关联数组，你可以通过`=>`符号为每个数组元素关联一个名称。\n\n这看起来像：\n\n```php\narray(\nkey  => value,\n\
  key2 => value2,\nkey3 => value3,\n...\n)\n```\n\n对于 PHP 索引数组，索引由数字表示，从 0 开始，如下所示：\n\
  \n```php\n$city=array(\"Rome\",\"Naples\",\"Milan\");\n$city[0] = \"Rome\";\n$city[1]\
  \ = \"Naples\";\n$city[3] = \"Milan\";\n```\n\n使用关联数组的实际 PHP 代码如下所示：\n\n`Chapter6/firstArray.php`\n\
  \n```php\n \"bar\",\n\"bar\" => \"foo\",\n);\n// 使用短数组语法\n$array2 = [\n\"foo2\"\
  \ => \"bar2\",\n\"bar2\" => \"foo2\",\n];\nvar_dump($array1);\necho '';\nvar_dump($array2);\n\
  ```\n\n输出结果如下：\n\n```\narray(2) { [\"foo\"]=> string(3) \"bar\" [\"bar\"]=> string(3)\
  \ \"foo\" }\narray(2) { [\"foo2\"]=> string(4) \"bar2\" [\"bar2\"]=> string(4) \"\
  foo2\" }\n```\n\n\n\n第一部分 `array(2)` 告诉你正在使用的变量 `var_dump` 的类型是数组。其中的 `2` 表示该数组包含的元素数量。接下来是键值对列表：键位于方括号内，值位于\
  \ `=>` 符号右侧。在 `=>` 符号的右侧，你可以看到 `string(3)`，这表示该键值对中的值是一个长度为 3 的字符串（`\"bar\"`）。让我们看一下\
  \ `firstArray2.php`，了解使用不同类型变量的示例。\n\n```\n \"bar\",\n\"bar\" => \"foo\",\n100 \
  \  => -100,\n-100  => 100,\n);\nvar_dump($array);\n?>\n```\n\n输出结果如下：\n\n```\narray(4)\
  \ { [\"foo\"]=> string(3) \"bar\" [\"bar\"]=> string(3) \"foo\" [100]=> int(-100)\
  \ [-100]=> int(100) }\n```\n\n注意，这个数组中包含了 `string` 和 `int` 类型的数据。到目前为止，你一直使用键值对关系来定义数组，但如果你“不需要”键呢？例如，当你只是用数组来存储首选客户的名字时，你不会想这样写：\n\
  \n```\n\"Customer\" => \"john\",\n\"Customer\" => \"peter\",\netc...\n```\n\n这样做行不通。首先，你不能成功地为多个值使用同一个键。其次，这样做毫无意义。当用户未定义键时，PHP\
  \ 会自动分配数字键。\n\n`firstArray3.php`\n\n```\n<?php\n$array = array(\"foo\", \"bar\"\
  , \"hello\", \"world\");\nvar_dump($array);\n```\n\n输出结果为：\n\n```\narray(4) { [0]=>\
  \ string(3) \"foo\" [1]=> string(3) \"bar\" [2]=> string(5) \"hello\" [3]=> string(5)\
  \ \"world\" }\n```\n\n你可以看到，PHP 使用数字来代替你定义的键。注意数组从 `0` 开始，而不是 `1`。在众多编程语言及其差异中，它们在一个问题上保持一致：数组从\
  \ `0` 开始。\n\n如果你一直跟着学习，你可能会好奇是否可以在一个数组内包含另一个数组。答案是肯定的，这被称为多维数组。来看一下 `firstArray4.php`。\n\
  \n```\n \"bar\",\n42    => 24,\n\"multi\" => array(\n\"dimensional\" => array(\n\
  \"array\" => \"foobar\"\n)\n)\n);\nvar_dump($array[\"foo\"]);\nvar_dump($array[42]);\n\
  var_dump($array[\"multi\"][\"dimensional\"][\"array\"]);\n```\n\n输出结果为：\n\n```\n\
  string(3) \"bar\" int(42) string(6) \"foobar\"\n```\n\n前两个示例：\n\n```\nvar_dump($array[\"\
  foo\"]);\nvar_dump($array[42]);\n```\n\n相当直接明了，但最后一个：\n\n```\nvar_dump($array[\"\
  multi\"][\"dimensional\"][\"array\"]);\n```\n\n则更为复杂，需要一些解释。这就是多维数组。可以把它想象成专辑中的一首歌。你可能在和朋友聊天时这样引用这首歌：`$artist['album']['trackNumber']`。如果这位艺术家有大量音乐作品，那么它可能是\
  \ `$music['artist']['album']['trackNumber']`，而 `$music['elvis']['live'][1]` 就是 Elvis\
  \ 名为“Live”的专辑中的第一首歌。多维数组可能会变得相当复杂，但有时它们是存储和组织数据的唯一方法。以下是更多关于多维数组的使用场景：\n\n`multiArray1.php`\n\
  \n```\n<?php\n$cars = array (\narray(\"Subaru\",21,17),\narray(\"Toyota\",13,12),\n\
  array(\"Lexus\",6,8),\narray(\"Ford\",14,10)\n);\n```\n\n这里你可以看到，使用二手车场的数据创建了一个二维数组。你正在跟踪汽车品牌、可用数量和已售数量。主数组包含四个独立的数组，每个数组包含特定数据。`Cars`\
  \ 是一个数组，其第一个元素是一个包含 `Subaru`、`21` 和 `17` 的数组。要访问 `Subaru`，你使用：\n\n```\n$cars[0][0];\n\
  ```\n\n这意味着，在 `$cars` 数组中，你想要第一个元素（`[0]`）中的第一个元素（`[0]`）。如果你想访问 `21`，你使用 `$cars[0][1]`，即你想要第一个元素（`[0]`）中的第二个元素（`[1]`）。\n\
  \n```\necho $cars[0][0] . \": 现有库存: \" . $cars[0][1] . \", 已售: \" . $cars[0][2]\
  \ . \" . \";\necho $cars[1][0] . \": 现有库存: \" . $cars[1][1] . \", 已售: \" . $cars[1][2]\
  \ . \" . \";\necho $cars[2][0] . \": 现有库存: \" . $cars[2][1] . \", 已售: \" . $cars[2][2]\
  \ . \" . \";\necho $cars[3][0] . \": 现有库存: \" . $cars[3][1] . \", 已售: \" . $cars[3][2]\
  \ . \" . \";\n```\n\n当你需要处理存储在数组中的数据时，`for` 循环是一个很好的解决方案。这里你遍历数组并打印出所需信息：\n\n```\n\
  for ($row = 0; $row < 4; $row++) {\n    echo \"第 #$row 行 -- {$cars[$row][0]}\";\n\
  \    echo \"<br />\";\n    for ($col = 1; $col < 3; $col++) {\n        echo \" \"\
  .$cars[$row][$col].\"\";\n    }\n    echo \"<br />\";\n}\n```\n\n## PHP 多维数组\n\n\
  PHP 多维数组也被称为数组的数组，通常用于在数组中存储表格数据，并以行乘列的矩阵形式呈现。\n\n多维数组看起来像这样：\n\n```\n定义\n$emp =\
  \ array\n(\narray(1,\"Luna\",10000),\narray(2,\"Leo\",20000),\narray(3,\"Neve\"\
  ,30000)\n);\n```\n\n## PHP 数组函数\n\n你已经了解了索引数组、关联数组和多维数组，现在我们来学习 PHP 数组函数，这些函数用于在\
  \ PHP 语言中访问和操作数组元素。PHP 数组的内置函数通常在你需要创建简单和多维数组时使用。\n\n以下是 PHP 数组函数的完整列表；它们将在本章中进行解释。\n\
  \n`array_chunk()` `array_combine()` `array_count_values()` `array_diff_assoc()`\
  \ `array_diff_keys()` `array_diff_uassoc()` `array_diff_ukey()` `array_diff()` `array_fill_keys()`\
  \ `array_fill()` `array_filter()` `array_flip()` `array_intersect_assoc()` `array_intersect_key()`\
  \ `array_intersect_uassoc()` `array_intersect()` `array_key_exists()` `array_keys()`\
  \ `array_merge_recursive()` `array_multisort()` `array_pad()` `array_pop()` `array_product()`\
  \ `array_push()` `array_rand()` `array_reduce()` `array_replace_recursive()` `array_replace()`\
  \ `array_reverse()` `array_search()` `array_shift()` `array_slice()` `array_splice()`\
  \ `array_sum()` `array_udiff_assoc()` `array_udiff()` `array_uintersect_assoc()`\
  \ `array_uintersect_uassoc()` `array_uintersect()` `array_unique()` `array_unshift()`\
  \ `array_values()` `array_walk_recursive()` `array_walk()` `array()` `arsort()`\
  \ `asort()` `compact()` `count()` `current()` `end()` `extract()` `in_array()` `key()`\
  \ `krsort()` `ksort()` `list()` `natcasesort()` `natsort()` `next()` `pos()` `prev()`\
  \ `range()` `reset()` `rsort()` `shuffle()` `sizeof()` `sort()` `uasort()` `uksort()`\
  \ `usort()` `each()`\n\n现在我们来介绍一些最常用和常见的 PHP 数组函数。\n\n### `array_change_key_case`\n\
  \n更改数组中所有键的大小写。\n\n```\narray_change_key_case(array $array, int $case = CASE_LOWER):\
  \ array\n```\n\n返回一个数组，其中所有键都转换为小写或大写。数字索引保持不变。\n\n**参数**\n\n- `array`：要操作的数组\n\
  - `case`：`CASE_UPPER` 或 `CASE_LOWER`（默认值）\n\n**返回值**\n\n返回一个键已转换为小写或大写的数组，如果数组不是数组则返回\
  \ `null`。\n\n### `array_chunk`\n\n将数组分割成块。\n\n```\narray_chunk(array $array, int\
  \ $length, bool $preserve_keys = false): array\n```\n\n将数组分割成包含 `length` 个元素的数组块。最后一个块可能包含少于\
  \ `length` 个元素。\n\n**参数**\n\n- `array`：要操作的数组\n- `length`：每个块的大小\n- `preserve_keys`：设置为\
  \ `true` 时，键将被保留。默认值为 `false`，将重新索引块为数字索引。\n\n**返回值**\n\n返回一个从 `0` 开始的多维数字索引数组，每个维度包含\
  \ `length` 个元素。\n\n### `array_column`\n\n返回输入数组中单个列的值。\n\n```\narray_column(array\
  \ $array, int|string|null $column_key, int|string|null $index_key = null): array\n\
  ```\n\n\n\n## PHP 数组函数参考\n\n### `array_column()`\n\n`array_column()` 返回数组中指定单列的值，该列由\
  \ `column_key` 标识。还可以提供 `index_key`，通过输入数组中 `index_key` 列的值来索引返回数组中的值。\n\n#### 参数\n\
  \n- **`array`**：一个多维数组或对象数组，从中提取列的值。如果提供的是对象数组，则可以直接提取公共属性。若要提取受保护或私有属性，该类必须同时实现\
  \ `__get()` 和 `__isset()` 魔术方法。\n- **`column_key`**：要返回值的列。该值可以是要检索的列的整数键，也可以是关联数组的字符串键名或属性名。也可以为\
  \ `null` 以返回完整的数组或对象（这在使用 `index_key` 重新索引数组时很有用）。\n- **`index_key`**：用作返回数组索引/键的列。该值可以是列的整数键，也可以是字符串键名。该值的强制类型转换与数组键的常规转换相同（不过在\
  \ PHP 8.0.0 之前，也允许支持转换为字符串的对象）。\n\n#### 返回值\n\n返回一个数组，其中包含输入数组中单个列的值。\n\n---\n\n\
  ### `array_combine`\n\n通过使用 `keys` 数组的值作为键，`values` 数组的值作为对应的值，创建一个数组。\n\n```\n\
  array_combine(array $keys, array $values): array\n```\n\n#### 参数\n\n- **`keys`**：要使用的键数组。键的非法值将被转换为字符串。\n\
  - **`values`**：要使用的值数组。\n\n#### 返回值\n\n返回组合后的数组，如果每个数组的元素数量不相等，则返回 `false`。\n\n\
  ---\n\n### `array_count_values()`\n\n`array_count_values()` 返回一个数组，使用 `array` 的值作为键，它们在\
  \ `array` 中出现的频率作为值。\n\n```\narray_count_values(array $array): array\n```\n\n####\
  \ 参数\n\n- **`array`**：要计数值的数组。\n\n#### 返回值\n\n返回一个关联数组，以数组中的值为键，以其出现次数为值。\n\n---\n\
  \n### `array_diff_assoc`\n\n使用额外的索引检查计算数组的差集。\n\n```\narray_diff_assoc(array $array,\
  \ array ...$arrays): array\n```\n\n与 `array_diff()` 不同，比较中也会使用数组键。\n\n#### 参数\n\n\
  - **`array`**：要比较的数组。\n- **`arrays`**：用于比较的数组。\n\n#### 返回值\n\n返回一个数组，包含 `array`\
  \ 中所有其他数组中不存在的值。\n\n---\n\n### `array_diff_key`\n\n使用键名比较计算数组的差集。\n\n```\narray_diff_key(array\
  \ $array, array ...$arrays): array\n```\n\n此函数类似于 `array_diff()`，但比较的是键而不是值。\n\n\
  #### 参数\n\n- **`array`**：要比较的数组。\n- **`arrays`**：用于比较的数组。\n\n#### 返回值\n\n返回一个数组，包含\
  \ `array` 中所有键名在其他数组中都不存在的条目。\n\n---\n\n### `array_diff_uassoc`\n\n使用用户提供的回调函数执行额外的索引检查，计算数组的差集。与\
  \ `array_diff()` 不同，比较中会使用数组键。\n\n```\narray_diff_uassoc(array $array, array ...$arrays,\
  \ callable $key_compare_func): array\n```\n\n与 `array_diff_assoc()` 不同，索引比较使用用户提供的回调函数，而非内部函数。\n\
  \n#### 参数\n\n- **`array`**：要比较的数组。\n- **`arrays`**：用于比较的数组。\n- **`key_compare_func`**：比较函数必须返回一个整数，如果第一个参数被认为分别小于、等于或大于第二个参数，则返回小于、等于或大于零的整数。\n\
  \n```\ncallback(mixed $a, mixed $b): int\n```\n\n#### 返回值\n\n返回一个数组，包含 `array` 中所有其他数组中不存在的条目。\n\
  \n---\n\n### `array_diff_ukey`\n\n将 `array` 的键与 `arrays` 的键进行比较，并返回差集。此函数类似于 `array_diff()`，但比较的是键而不是值。\n\
  \n```\narray_diff_ukey(array $array, array ...$arrays, callable $key_compare_func):\
  \ array\n```\n\n与 `array_diff_key()` 不同，索引比较使用用户提供的回调函数，而非内部函数。\n\n#### 参数\n\n-\
  \ **`array`**：要比较的数组。\n- **`arrays`**：用于比较的数组。\n- **`key_compare_func`**：比较函数必须返回一个整数，如果第一个参数被认为分别小于、等于或大于第二个参数，则返回小于、等于或大于零的整数。\n\
  \n```\ncallback(mixed $a, mixed $b): int\n```\n\n#### 返回值\n\n返回一个数组，包含 `array` 中所有其他数组中不存在的条目。\n\
  \n---\n\n### `array_diff`\n\n计算数组的差集。\n\n```\narray_diff(array $array, array ...$arrays):\
  \ array\n```\n\n将一个数组与一个或多个其他数组进行比较，并返回 `array` 中其他数组中不存在的值。\n\n#### 参数\n\n- **`array`**：要比较的数组。\n\
  - **`arrays`**：用于比较的数组。\n\n#### 返回值\n\n返回一个数组，包含 `array` 中所有其他数组中不存在的条目。`array`\
  \ 中的键会被保留。\n\n---\n\n### `array_fill_keys`\n\n使用 `keys` 数组的值作为键，用 `value` 参数的值填充数组。\n\
  \n```\narray_fill_keys(array $keys, mixed $value): array\n```\n\n#### 参数\n\n- **`keys`**：将用作键的值数组。键的非法值将被转换为字符串。\n\
  - **`value`**：用于填充的值。\n\n#### 返回值\n\n返回填充后的数组。\n\n---\n\n### `array_fill`\n\n用值填充数组。\n\
  \n```\narray_fill(int $start_index, int $count, mixed $value): array\n```\n\n用 `value`\
  \ 参数的值填充 `count` 个条目，键从 `start_index` 参数开始。\n\n#### 参数\n\n- **`start_index`**：返回数组的第一个索引。如果\
  \ `start_index` 为负数，则返回数组的第一个索引为 `start_index`，后续索引从 0 开始（参见示例）。\n- **`count`**：要插入的元素数量。必须大于或等于零。\n\
  - **`value`**：用于填充的值。\n\n#### 返回值\n\n返回填充后的数组。\n\n---\n\n### `array_filter`\n\n\
  使用 `callback` 函数过滤数组元素。\n\n```\narray_filter(array $array, ?callable $callback =\
  \ null, int $mode = 0): array\n```\n\n遍历数组中的每个值，将其传递给 `callback` 函数。如果 `callback`\
  \ 函数返回 `true`，则当前值会被包含在结果数组中。\n\n数组键会被保留，如果数组是索引的，可能会导致键出现间隙。结果数组可以使用 `array_values()`\
  \ 函数重新索引。\n\n#### 参数\n\n- **`array`**：要遍历的数组。\n- **`callback`**：要使用的回调函数。如果未提供回调函数，则将移除\
  \ `array` 中的所有空条目。参见 `empty()` 了解 PHP 在这种情况下如何定义“空”。\n- **`mode`**：决定哪些参数传递给 `callback`\
  \ 的标志：\n  - `ARRAY_FILTER_USE_KEY`：将键作为唯一参数传递给 `callback`，而不是值。\n  - `ARRAY_FILTER_USE_BOTH`：将值和键都作为参数传递给\
  \ `callback`，而不是只传递值。默认值为 0，即只将值作为唯一参数传递给回调函数。\n\n#### 返回值\n\n返回过滤后的数组。\n\n---\n\
  \n### `array_flip`\n\n交换数组中的键及其关联的值。\n\n```\narray_flip(array $array): array\n```\n\
  \n\n\n## PHP 数组函数参考\n\n### `array_flip()`\n\n`array_flip()`返回一个键值对反转的数组；换言之，原数组的键成为值，原数组的值成为键。\n\
  \n请注意，`array` 的值必须是合法的键，因此它们必须是 `int` 或 `string` 类型。如果某个值类型错误，将会产生警告，并且该键值对不会包含在结果中。\n\
  \n如果一个值出现多次，则最后一个键会被用作其值，而其他所有键都将丢失。\n\n**参数**\n\n-   `array`\n    要反转的键值对数组\n\n\
  **返回值**\n\n返回反转后的数组\n\n---\n\n### `array_intersect_assoc`\n\n带索引检查计算数组的交集\n\n```\n\
  array_intersect_assoc(array $array, array ...$arrays): array\n```\n\n`array_intersect_assoc()`\
  \ 返回一个数组，其中包含所有出现在所有参数中的 `array` 的值。请注意，与 `array_intersect()` 不同，此函数在比较时也会用到键名。\n\
  \n**参数**\n\n-   `array`\n    用作主值进行检查的数组\n-   `arrays`\n    用于比较值的数组\n\n**返回值**\n\
  \n返回一个关联数组，其中包含所有出现在所有参数中的 `array` 的值\n\n---\n\n### `array_intersect_key`\n\n使用键名比较计算数组的交集\n\
  \n```\narray_intersect_key(array $array, array ...$arrays): array\n```\n\n`array_intersect_key()`\
  \ 返回一个数组，其中包含 `array` 中所有键名出现在所有参数中的条目。\n\n**参数**\n\n-   `array`\n    用作主键进行检查的数组\n\
  -   `arrays`\n    用于比较键名的数组\n\n**返回值**\n\n返回一个关联数组，其中包含 `array` 中所有键名出现在所有参数中的条目\n\
  \n---\n\n### `array_intersect_uassoc`\n\n带索引检查计算数组的交集，并通过 `callback` 函数比较索引\n\n\
  ```\narray_intersect_uassoc(array $array, array ...$arrays, callable $key_compare_func):\
  \ array\n```\n\n`array_intersect_uassoc()` 返回一个数组，其中包含所有出现在所有参数中的 `array` 的值。请注意，与\
  \ `array_intersect()` 不同，此函数在比较时也会用到键名。\n\n**参数**\n\n-   `array`\n    用于数组比较的初始数组\n\
  -   `arrays`\n    用于比较键名的数组\n-   `key_compare_func`\n\n如果第一个参数被认为分别小于、等于或大于第二个参数，则比较函数必须返回一个小于、等于或大于零的整数。\n\
  \n```\ncallback(mixed $a, mixed $b): int\n```\n\n**返回值**\n\n返回 `array` 中那些值存在于所有参数中的值\n\
  \n---\n\n### `array_intersect_ukey`\n\n使用 `callback` 函数比较键名来计算数组的交集\n\n```\narray_intersect_ukey(array\
  \ $array, array ...$arrays, callable $key_compare_func): array\n```\n\n`array_intersect_ukey()`\
  \ 返回一个数组，其中包含 `array` 中所有那些键名匹配且存在于所有参数中的值。\n\n**参数**\n\n-   `array`\n    用于数组比较的初始数组\n\
  -   `arrays`\n    用于比较键名的数组\n-   `key_compare_func`\n\n如果第一个参数被认为分别小于、等于或大于第二个参数，则比较函数必须返回一个小于、等于或大于零的整数。\n\
  \n```\ncallback(mixed $a, mixed $b): int\n```\n\n**返回值**\n\n返回 `array` 中那些键名存在于所有参数中的值\n\
  \n---\n\n### `array_intersect`\n\n计算数组的交集\n\n```\narray_intersect(array $array,\
  \ array ...$arrays): array\n```\n\n`array_intersect()` 返回一个数组，其中包含所有出现在所有参数中的 `array`\
  \ 的值。注意键名会被保留。\n\n**参数**\n\n-   `array`\n    用作主值进行检查的数组\n-   `arrays`\n    用于比较值的数组\n\
  \n**返回值**\n\n返回一个数组，其中包含 `array` 中那些值存在于所有参数中的值\n\n---\n\n### `array_is_list`\n\n\
  检查给定数组是否为列表\n\n```\narray_is_list(array $array): bool\n```\n\n如果数组的键名由从 0 到 `count($array)-1`\
  \ 的连续数字组成，则该数组被视为列表。\n\n**参数**\n\n-   `array`\n    被评估的数组\n\n**返回值**\n\n如果 `array`\
  \ 是列表则返回 `true`，否则返回 `false`\n\n---\n\n### `array_key_exists`\n\n检查数组中是否存在指定的键名或索引\n\
  \n```\narray_key_exists(string|int $key, array $array): bool\n```\n\n如果给定的 `key`\
  \ 在 `array` 中已设置，则 `array_key_exists()` 返回 `true`。`key` 可以是任何可能作为数组索引的值。\n\n**参数**\n\
  \n-   `key`\n    要检查的值\n-   `array`\n    包含要检查的键名的数组\n\n**返回值**\n\n成功时返回 `true`，失败时返回\
  \ `false`\n\n---\n\n### `array_key_first`\n\n获取数组的第一个键名，不影响内部数组指针\n\n```\narray_key_first(array\
  \ $array): int|string|null\n```\n\n**参数**\n\n-   `array`\n    一个数组\n\n**返回值**\n\n\
  如果数组不为空，则返回 `array` 的第一个键名，否则返回 `null`\n\n---\n\n### `array_key_last`\n\n获取数组的最后一个键名，不影响内部数组指针\n\
  \n```\narray_key_last(array $array): int|string|null\n```\n\n**参数**\n\n-   `array`\n\
  \    一个数组\n\n**返回值**\n\n如果数组不为空，则返回 `array` 的最后一个键名，否则返回 `null`\n\n---\n\n### `array_keys`\n\
  \n返回数组中的所有键名或键名的子集\n\n```\narray_keys(array $array): array\narray_keys(array $array,\
  \ mixed $search_value, bool $strict = false): array\n```\n\n`array_keys()` 返回 `array`\
  \ 中的键名，包括数字和字符串键名。如果指定了 `search_value`，则仅返回该值的键名。否则，返回数组中的所有键名。\n\n**参数**\n\n- \
  \  `array`\n    包含要返回的键名的数组\n-   `search_value`\n    如果指定，则仅返回包含此值的键名。\n-   `strict`\n\
  \    决定在搜索期间是否应使用严格比较 (`===`)。\n\n**返回值**\n\n返回一个包含 `array` 中所有键名的数组\n\n---\n\n\
  ### `array_map`\n\n将回调函数应用到给定数组的元素上\n\n```\narray_map(?callable $callback, array\
  \ $array, array ...$arrays): array\n```\n\n`array_map()` 返回一个数组，其中包含将 `callback`\
  \ 应用到作为回调参数的 `array`（如果提供了更多数组，则还有 `arrays`）的相应值的结果。`callback` 函数接受的参数数量应与传递给 `array_map()`\
  \ 的数组数量匹配。多余的输入数组会被忽略。如果提供的参数数量不足，则会抛出 `ArgumentCountError`。\n\n**参数**\n\n-   `callback`\n\
  \    为每个数组中的每个元素运行的可回调函数。可以将 `Null` 作为值传递给 `callback` 以对多个数组执行 zip 操作。如果只提供一个数组，`array_map()`\
  \ 将返回输入数组。\n-   `array`\n    要通过 `callback` 函数处理的数组\n-   `arrays`\n    要通过 `callback`\
  \ 函数处理的补充变量列表数组参数\n\n**返回值**\n\n返回一个数组，其中包含将 `callback` 函数应用到作为回调参数的 `array`（如果提供了更多数组，则还有\
  \ `arrays`）的相应值的结果。当且仅当只传递一个数组时，返回的数组将保留该 `array` 参数的键名。如果传递了多个数组，则返回的数组将具有连续的整数键名。\n\
  \n---\n\n### `array_merge_recursive`\n\n递归地合并一个或多个数组\n\n```\narray_merge_recursive(array\
  \ ...$arrays): array\n```\n\n\n\n## PHP 数组函数参考\n\n### `array_merge_recursive()`\n\
  \n`array_merge_recursive()` 合并一个或多个数组的元素，将后一个数组的值追加到前一个数组的末尾。它返回结果数组。\n\n如果输入数组具有相同的字符串键，则这些键的值会被合并到一个数组中，并且此过程会递归进行。因此，如果其中一个值本身是数组，该函数也会将其与另一个数组中的对应条目合并。然而，如果数组具有相同的数字键，后面的值不会覆盖原始值，而是会被追加。\n\
  \n**参数**\n\n`arrays`  \n要递归合并的可变参数列表。\n\n**返回值**\n\n返回合并所有参数后得到的结果数组。如果未传入任何参数，则返回空数组。\n\
  \n### `array_merge()`\n\n`array_merge()` 合并一个或多个数组。\n\n```\narray_merge(array ...$arrays):\
  \ array\n```\n\n将多个数组的元素合并，使后一个数组的值追加到前一个数组的末尾。它返回结果数组。\n\n如果输入数组具有相同的字符串键，则该键的后面值会覆盖前面值。如果数组包含数字键，后面的值不会覆盖原始值，而是被追加。\n\
  \n输入数组中带有数字键的值会被重新编号，从零开始递增。\n\n**参数**\n\n`arrays`  \n要合并的可变参数列表。\n\n**返回值**\n\n\
  返回结果数组。如果未传入任何参数，则返回空数组。\n\n### `array_multisort()`\n\n`array_multisort()` 对多个数组或多维数组进行排序。\n\
  \n`array1_sort_flags`  \n前一个数组参数的排序选项。\n\n**排序类型标志：**\n\n`SORT_REGULAR`  \n正常比较项目（不改变类型）。\n\
  \n`SORT_NUMERIC`  \n按数值比较项目。\n\n`SORT_STRING`  \n按字符串比较项目。\n\n`SORT_LOCALE_STRING`\
  \  \n基于当前区域设置，按字符串比较项目。它使用可通过 `setlocale()` 更改的区域设置。\n\n`SORT_NATURAL`  \n使用“自然排序”按字符串比较项目，类似于\
  \ `natsort()`。\n\n`SORT_FLAG_CASE`  \n可以与 `SORT_STRING` 或 `SORT_NATURAL`（按位 OR）组合，以不区分大小写的方式排序字符串。\n\
  \n此参数可以与 `array1_sort_order` 互换，或者完全省略，此时默认为 `SORT_REGULAR`。\n\n`rest`  \n更多数组，可选地后跟排序顺序和标志。仅比较前一个数组中对应元素相同的元素。换句话说，排序是按字典顺序进行的。\n\
  \n**返回值**\n\n成功时返回 `true`，失败时返回 `false`。\n\n### `array_pad()`\n\n`array_pad()` 用指定值将数组填充到指定长度。\n\
  \n```\narray_pad(array $array, int $length, mixed $value): array\n```\n\n`array_pad()`\
  \ 返回数组的一个副本，并用 `value` 将其填充到 `length` 指定的大小。如果 `length` 为正，则数组从右侧填充；如果为负，则从左侧填充。如果\
  \ `length` 的绝对值小于或等于数组的长度，则不进行填充。每次最多可以添加 1,048,576 个元素。\n\n**参数**\n\n`array`  \n\
  要填充的初始数组。\n\n`length`  \n数组的新大小。\n\n`value`  \n当数组长度小于 `length` 时用于填充的值。\n\n**返回值**\n\
  \n返回数组填充到 `length` 指定大小后的副本。如果 `length` 为正，则数组从右侧填充；如果为负，则从左侧填充。如果 `length` 的绝对值小于或等于数组的长度，则不进行填充。\n\
  \n### `array_pop()`\n\n`array_pop()` 弹出数组末尾的元素。\n\n```\narray_pop(array &$array):\
  \ mixed\n```\n\n`array_pop()`\n\n**注意**\n\n此函数在使用后会重置输入数组的指针（即调用 `reset()`）。\n\n\
  **参数**\n\n`array`  \n要从中获取值的数组。\n\n**返回值**\n\n返回数组最后一个元素的值。如果数组为空（或不是数组），则返回 `null`。\n\
  \n### `array_product()`\n\n`array_product()` 计算数组中所有值的乘积。\n\n```\narray_product(array\
  \ $array): int|float\n```\n\n**参数**\n\n`array`  \n要计算的数组。\n\n**返回值**\n\n返回乘积，类型为整数或浮点数。\n\
  \n### `array_push()`\n\n`array_push()` 将一个或多个元素推入数组末尾。\n\n```\narray_push(array\
  \ &$array, mixed ...$values): int\n```\n\n`array_push()` 将数组视为栈，并将传入的变量推入数组末尾。数组的长度会增加所推入变量的数量。其效果等同于：\n\
  \n```\n$array[] = $value;\n// 对每个传入的值重复\n```\n\n如果使用 `array_push()` 向数组添加一个元素，不如使用\
  \ `$array[] =`，因为那样可以避免调用函数的开销。\n\n**参数**\n\n`array`  \n输入数组。\n\n`values`  \n要推入数组末尾的值。\n\
  \n**返回值**\n\n返回数组中新的元素数量。\n\n### `array_rand()`\n\n`array_rand()` 从数组中随机选取一个或多个键，并返回随机条目的键（或键数组）。\n\
  \n```\narray_rand(array $array, int $num = 1): int|string|array\n```\n\n它使用伪随机数生成器，不适用于加密目的。\n\
  \n**参数**\n\n`array`  \n输入数组。\n\n`num`  \n指定应选取的条目数量。\n\n**返回值**\n\n当只选取一个条目时，`array_rand()`\
  \ 返回随机条目的键。否则，返回包含随机条目键的数组。这样设计是为了既可以随机选取数组的键，也可以选取随机值。如果返回多个键，它们将按照在原数组中出现的顺序返回。尝试选取超过数组中元素数量的条目会导致\
  \ `E_WARNING` 级别的错误，并返回 `NULL`。\n\n### `array_reduce()`\n\n`array_reduce()` 使用回调函数迭代地将数组缩减为单个值。\n\
  \n```\narray_reduce(array $array, callable $callback, mixed $initial = null): mixed\n\
  ```\n\n**参数**\n\n`array`  \n输入数组。\n\n`callback`  \n`callback(mixed $carry, mixed\
  \ $item): mixed`\n\n`carry`  \n保存上一次迭代的返回值；在第一次迭代时，它保存 `initial` 的值。\n\n`item` \
  \ \n保存当前迭代的值。\n\n`initial`  \n如果提供了可选的 `initial`，它将在处理开始时被使用，或者当数组为空时作为最终结果。\n\n\
  **返回值**\n\n返回最终结果值。如果数组为空且未传递 `initial`，则 `array_reduce()` 返回 `null`。\n\n### `array_replace_recursive()`\n\
  \n`array_replace_recursive()` 递归地将传入数组中的元素替换到第一个数组中。\n\n```\narray_replace_recursive(array\
  \ $array, array ...$replacements): array\n```\n\n`array_replace_recursive()` 将第一个数组中的值替换为所有后续数组中相同的键对应的值。如果第一个数组中的键存在于第二个数组中，其值将被第二个数组中的值替换。如果键存在于第二个数组中但不在第一个数组中，它将被创建到第一个数组中。如果某个键仅存在于第一个数组中，则保持不变。如果传递了多个替换数组，它们将按顺序处理，后面的数组会覆盖前面的值。\n\
  \n`array_replace_recursive()` 是递归的：它会递归进入数组，并对内部值应用相同的过程。\n\n当第一个数组中的值是标量时，无论第二个数组中的值是标量还是数组，它都会被第二个数组中的值替换。当第一个数组和第二个数组中的值都是数组时，`array_replace_recursive()`\
  \ 会递归替换它们的相应值。\n\n**参数**\n\n`array`  \n元素被替换的数组。\n\n`replacements`  \n从中提取元素的数组。\n\
  \n**返回值**\n\n如果成功则返回数组，如果发生错误则返回 `null`。\n\n### `array_replace()`\n\n`array_replace()`\
  \ 将传入数组中的元素替换到第一个数组中。\n\n```\narray_replace(array $array, array ...$replacements):\
  \ array\n```\n\n\n\n### `array_replace()`\n\n`array_replace()` 使用后续数组中具有相同键的值来替换\
  \ `array` 中的值。如果第一个数组中的某个键存在于第二个数组中，则该键的值将被第二个数组中的值替换。如果该键存在于第二个数组中，但不存在于第一个数组中，它将在第一个数组中被创建。如果某个键仅存在于第一个数组中，则其值保持不变。如果传入了多个数组用于替换，它们将按顺序处理，后面的数组会覆盖前面的值。`array_replace()`\
  \ 不是递归的：它会将第一个数组中的值替换为第二个数组中任意类型的值。\n\n#### 参数\n\n- `array` — 元素被替换的数组。\n- `replacements`\
  \ — 从中提取元素的数组。后面数组中的值会覆盖前面的值。\n\n#### 返回值\n\n成功时返回一个 `array`，如果发生错误则返回 `null`。\n\
  \n---\n\n### `array_reverse`\n\n返回一个元素顺序相反的数组。\n\n```\narray_reverse(array $array,\
  \ bool $preserve_keys = false): array\n```\n\n#### 参数\n\n- `array` — 输入的数组。\n- `preserve_keys`\
  \ — 如果设为 `true`，则保留数字键名。非数字键名不受此设置影响，并始终会被保留。\n\n#### 返回值\n\n返回反转后的数组。\n\n---\n\n\
  ### `array_search`\n\n在数组中搜索给定的值，如果成功则返回第一个对应的键名。\n\n```\narray_search(mixed $needle,\
  \ array $haystack, bool $strict = false): int|string|false\n```\n\n在 `haystack`\
  \ 中搜索 `needle`。\n\n#### 参数\n\n- `needle` — 要搜索的值。\n\n> **注意：**  \n> 如果 `needle`\
  \ 是一个字符串，则比较是区分大小写的。\n\n- `haystack` — 数组。\n- `strict` — 如果将第三个参数 `strict` 设为 `true`，则\
  \ `array_search()` 函数将在 `haystack` 中搜索完全相同的元素。这意味着它还会对 `haystack` 中的 `needle` 执行严格的类型比较，并且对象必须是同一个实例。\n\
  \n#### 返回值\n\n如果在数组中找到 `needle`，则返回其键名，否则返回 `false`。  \n如果 `needle` 在 `haystack`\
  \ 中出现多次，则返回第一个匹配的键名。要返回所有匹配值的键名，请改用 `array_keys()` 并传入可选的 `search_value` 参数。\n\n\
  ---\n\n### `array_shift`\n\n将数组开头的元素移出。\n\n```\narray_shift(array &$array): mixed\n\
  ```\n\n`array_shift()` 移出数组的第一个值并将其返回，同时将数组长度减一并将所有元素下移。所有数字键名将被修改为从 0 开始计数，而文字键名则不受影响。\n\
  \n#### 参数\n\n- `array` — 输入的数组。\n\n#### 返回值\n\n返回移出的值，如果数组为空或不是数组则返回 `null`。\n\n\
  ---\n\n### `array_slice`\n\n从数组中取出一段。\n\n```\narray_slice(\n    array $array,\n\
  \    int $offset,\n    ?int $length = null,\n    bool $preserve_keys = false\n):\
  \ array\n```\n\n`array_slice()` 返回由 `offset` 和 `length` 参数指定的数组 `array` 中的元素序列。\n\
  \n#### 参数\n\n- `array` — 输入的数组。\n- `offset` — 如果 `offset` 为非负值，则序列将从数组中的该偏移量开始。如果\
  \ `offset` 为负值，则序列将从距离数组末尾该偏移量的位置开始。\n\n> **注意：**  \n> `offset` 参数表示在数组中的位置，而不是键名。\n\
  \n- `length` — 如果给出了 `length` 且为正数，则序列中将包含最多该数量的元素。如果数组长度小于 `length`，则仅包含可用的数组元素。如果给出了\
  \ `length` 且为负数，则序列将在距离数组末尾该数量的元素处停止。如果省略该参数，则序列将包含从 `offset` 到数组末尾的所有元素。\n- `preserve_keys`\n\
  \n> **注意：**  \n> `array_slice()` 默认会重新排序并重置整数数组索引。可以通过将 `preserve_keys` 设为 `true`\
  \ 来更改此行为。字符串键名始终会被保留，不受此参数影响。\n\n#### 返回值\n\n返回取出的切片。如果偏移量大于数组大小，则返回一个空数组。\n\n---\n\
  \n### `array_splice`\n\n移除数组的一部分并用其他值替代。\n\n```\narray_splice(\n    array &$array,\n\
  \    int $offset,\n    ?int $length = null,\n    mixed $replacement = []\n): array\n\
  ```\n\n从数组 `array` 中移除由 `offset` 和 `length` 指定的元素，并用 `replacement` 数组中的元素替换它们（如果提供了的话）。\n\
  \n#### 参数\n\n- `array` — 输入的数组。\n- `offset` — 如果 `offset` 为正数，则移除部分的起始位置位于数组 `array`\
  \ 开头该偏移量处。如果 `offset` 为负数，则移除部分的起始位置位于数组 `array` 末尾该偏移量处。\n- `length` — 如果省略 `length`，则移除从\
  \ `offset` 到数组末尾的所有元素。如果指定了 `length` 且为正数，则将移除该数量的元素。如果指定了 `length` 且为负数，则移除部分的结束位置位于距离数组末尾该数量的元素处。如果指定了\
  \ `length` 且为 0，则不移除任何元素。\n\n> **提示：**  \n> 要在同时指定了 `replacement` 的情况下移除从 `offset`\
  \ 到数组末尾的所有元素，请将 `count($input)` 用作 `length` 的值。\n\n- `replacement` — 如果指定了替换数组，则移除的元素将被此数组中的元素替换。如果\
  \ `offset` 和 `length` 使得没有元素被移除，则替换数组中的元素将被插入到偏移量指定的位置。如果 `replacement` 只有一个元素，则无需将其用\
  \ `array()` 或方括号括起来，除非该元素本身是数组、对象或 `null`。\n\n#### 返回值\n\n返回一个由被移除元素组成的数组。\n\n---\n\
  \n### `array_sum`\n\n计算数组中所有值的和。\n\n```\narray_sum(array $array): int|float\n```\n\
  \n#### 参数\n\n- `array` — 输入的数组。\n\n#### 返回值\n\n以整数或浮点数形式返回值的总和，如果数组为空则返回 0。\n\n\
  ---\n\n### `array_udiff_assoc`\n\n带额外索引检查计算数组的差集，并通过 `callback` 函数比较数据。\n\n```\n\
  array_udiff_assoc(array $array, array ...$arrays, callable $value_compare_func):\
  \ array\n```\n\n#### 参数\n\n- `array` — 第一个数组。\n- `arrays` — 要与之比较的数组。\n- `value_compare_func`\
  \ — 比较函数必须返回一个整数，如果第一个参数被认为分别小于、等于或大于第二个参数，则返回值小于、等于或大于零。\n\n```\ncallback(mixed\
  \ $a, mixed $b): int\n```\n\n#### 返回值\n\n`array_udiff_assoc()` 返回一个数组，其中包含所有在 `array`\
  \ 中但不在任何其他参数中的值。注意，与 `array_diff()` 和 `array_udiff()` 不同，键名也用于比较。对数组数据的比较是通过使用用户提供的回调函数进行的。在这方面，其行为与\
  \ `array_diff_assoc()` 相反，后者使用内部函数进行比较。\n\n---\n\n### `array_udiff_uassoc`\n\n带额外索引检查计算数组的差集，并通过回调函数比较数据和索引。\n\
  \n```\narray_udiff_uassoc(\n    array $array,\n    array ...$arrays,\n    callable\
  \ $value_compare_func,\n    callable $key_compare_func\n): array\n```\n\n注意，与 `array_diff()`\
  \ 和 `array_udiff()` 不同，键名也用于比较。\n\n#### 参数\n\n- `array` — 第一个数组。\n- `arrays` — 要与之比较的数组。\n\
  - `value_compare_func` — 比较函数必须返回一个整数，如果第一个参数被认为分别小于、等于或大于第二个参数，则返回值小于、等于或大于零。\n\
  \n```\ncallback(mixed $a, mixed $b): int\n```\n\n- `key_compare_func` — 键名（索引）的比较也由回调函数\
  \ `key_compare_func` 完成。此行为与 `array_udiff_assoc()` 不同，因为后者使用内部函数比较索引。\n\n#### 返回值\n\
  \n返回一个数组，其中包含所有在 `array` 中但不在任何其他参数中的值。\n\n---\n\n### `array_udiff`\n\n通过使用回调函数比较数据来计算数组的差集。\n\
  \n\n```php\narray_udiff(array $array, array ...$arrays, callable $value_compare_func):\
  \ array\n```\n\n这与 `array_diff()` 不同，后者使用内部函数来比较数据。\n\n**参数**  \n`array`  \n第一个数组\
  \  \n`arrays`  \n用于比较的数组  \n`value_compare_func`  \n回调比较函数。如果第一个参数被认为分别小于、等于或大于第二个参数，则比较函数必须返回一个小于、等于或大于零的整数。\n\
  \n```php\ncallback(mixed $a, mixed $b): int\n```\n\n**返回值**  \n返回一个数组，包含 `array`\
  \ 中所有未出现在其他任何参数中的值。\n\n---\n\n### `array_uintersect_assoc`\n\n使用额外的索引检查计算数组的交集，并通过回调函数比较数据\n\
  \n```php\narray_uintersect_assoc(array $array, array ...$arrays, callable $value_compare_func):\
  \ array\n```\n\n注意，与 `array_uintersect()` 不同，此函数在比较中使用了键名。数据通过回调函数进行比较。\n\n**参数**\
  \  \n`array`  \n第一个数组  \n`arrays`  \n用于比较的数组  \n`value_compare_func`  \n如果第一个参数被认为分别小于、等于或大于第二个参数，则比较函数必须返回一个小于、等于或大于零的整数。\n\
  \n```php\ncallback(mixed $a, mixed $b): int\n```\n\n**返回值**  \n返回一个数组，包含 `array`\
  \ 中所有出现在所有参数中的值。\n\n---\n\n### `array_uintersect_uassoc`\n\n使用额外的索引检查计算数组的交集，并通过单独的回调函数比较数据和索引\n\
  \n```php\narray_uintersect_uassoc(\n    array $array1,\n    array ...$arrays,\n\
  \    callable $value_compare_func,\n    callable $key_compare_func\n): array\n```\n\
  \n**参数**  \n`array1`  \n第一个数组  \n`arrays`  \n更多的数组  \n`value_compare_func`  \n如果第一个参数被认为分别小于、等于或大于第二个参数，则比较函数必须返回一个小于、等于或大于零的整数。\n\
  \n```php\ncallback(mixed $a, mixed $b): int\n```\n\n`key_compare_func`  \n键名比较回调函数\n\
  \n**返回值**  \n返回一个数组，包含 `array1` 中所有出现在所有参数中的值。\n\n---\n\n### `array_uintersect`\n\
  \n计算数组的交集，并通过回调函数比较数据\n\n```php\narray_uintersect(array $array, array ...$arrays,\
  \ callable $value_compare_func): array\n```\n\n**参数**  \n`array`  \n第一个数组  \n`arrays`\
  \  \n用于比较的数组  \n`value_compare_func`  \n如果第一个参数被认为分别小于、等于或大于第二个参数，则比较函数必须返回一个小于、等于或大于零的整数。\n\
  \n```php\ncallback(mixed $a, mixed $b): int\n```\n\n**返回值**  \n返回一个数组，包含 `array`\
  \ 中所有出现在所有参数中的值。\n\n---\n\n### `array_unique`\n\n移除数组中的重复值\n\n```php\narray_unique(array\
  \ $array, int $flags = SORT_STRING): array\n```\n\n它接受一个输入数组，并返回一个不含重复值的新数组。注意，键名会被保留。如果在给定的\
  \ `flags` 下多个元素比较相等，则保留第一个相等元素的键名和值。\n\n> **注意**  \n> 当且仅当 `(string) $elem1 ===\
  \ (string) $elem2` 时，两个元素被认为相等；换句话说，当字符串表示相同时，将使用第一个元素。\n\n**参数**  \n`array`  \n\
  输入数组  \n`flags`  \n可选的第二个参数 `flags` 可用于通过以下值修改排序行为：\n\n**排序类型标志**：\n- `SORT_REGUALR`\
  \ – 正常比较项目（不改变类型）。\n- `SORT_NUMERIC` – 以数字方式比较项目。\n- `SORT_STRING` – 以字符串方式比较项目。\n\
  - `SORT_LOCALE_STRING` – 基于当前区域设置，以字符串方式比较项目。\n\n**返回值**  \n返回过滤后的数组\n\n---\n\n\
  ### `array_unshift`\n\n将一个或多个元素添加到数组的开头\n\n```php\narray_unshift(array &$array,\
  \ mixed ...$values): int\n```\n\n\n注意，元素列表会作为一个整体进行前置（prepend），因此前置的元素会保持原有的顺序。所有数字类型的数组键名将被修改为从零开始计数，而字面量键名则保持不变。\n\
  \n**参数**  \n`array`  \n输入的数组  \n`values`  \n要前置的值  \n\n**返回值**  \n返回数组中新的元素数量\n\n\
  ---\n\n`array_values`\n\n返回数组中所有的值，并对数组进行数值索引\n\n```\narray_values(array $array):\
  \ array\n```\n\n**参数**  \n`array`  \n数组  \n\n**返回值**  \n返回一个包含所有值的索引数组\n\n---\n\n\
  `array_walk_recursive`\n\n对数组中的每个成员递归地应用用户自定义函数\n\n```\narray_walk_recursive(array|object\
  \ &$array, callable $callback, mixed $arg = null): bool\n```\n\n此函数会递归到更深层的数组中。\n\
  \n**参数**  \n`array`  \n输入的数组  \n`callback`  \n通常，`callback` 接受两个参数：数组参数的值和键名/索引。\
  \  \n`arg`  \n如果提供了可选的 `arg` 参数，它将被作为第三个参数传递给回调函数。\n\n**返回值**  \n成功时返回 true，失败时返回\
  \ false\n\n---\n\n`array_walk`\n\n对数组中的每个成员应用用户提供的函数\n\n```\narray_walk(array|object\
  \ &$array, callable $callback, mixed $arg = null): bool\n```\n\n`array_walk()` 不受数组内部数组指针的影响。无论指针位置如何，`array_walk()`\
  \ 都会遍历整个数组。\n\n**参数**  \n`array`  \n输入的数组  \n`callback`  \n通常，`callback` 接受两个参数：数组参数的值和键名/索引。只有数组的值可能被改变；数组的结构不能被修改，因此程序员不能添加、删除或重新排序元素。如果回调函数不遵守此要求，则该函数的行为是未定义且不可预测的。\
  \  \n`arg`  \n如果提供了可选的 `arg` 参数，它将被作为第三个参数传递给回调函数。\n\n**返回值**  \n返回 true\n\n---\n\
  \n`array`\n\n创建一个数组\n\n```\narray(mixed ...$values): array\n```\n\n请阅读关于数组类型的章节以获取更多关于数组的信息。\n\
  \n**参数**  \n`values`  \n语法 “`index => values`”，用逗号分隔，定义了 `index` 和 `values`。`index`\
  \ 可以是字符串或整数类型。当省略 `index` 时，会自动生成一个从 0 开始的整数索引。如果 `index` 是整数，则下一个生成的索引将是最大的整数索引加\
  \ 1。注意，当定义了两个相同的索引时，后者会覆盖前者。在最后一个定义的数组条目后面加上一个尾随逗号，虽然不常见，但也是有效的语法。\n\n**返回值**  \n\
  返回包含参数（作为元素）的数组。可以使用 `=>` 运算符为参数指定索引。请阅读关于数组类型的章节以获取更多关于数组的信息。\n\n---\n\n`arsort`\n\
  \n对数组进行降序排序并保持索引关联\n\n```\narsort(array &$array, int $flags = SORT_REGULAR): bool\n\
  ```\n\n它就地（in place）对数组进行降序排序，使其键名与关联的值保持对应关系。这主要用于对实际元素顺序很重要的关联数组进行排序。\n\n**参数**\
  \  \n`array`  \n输入的数组  \n`flags`  \n可选的第二个参数 flags 可用于通过以下值修改排序行为：\n\n**排序类型标志：**\
  \  \n`SORT_REGULAR` – 正常比较元素；详情见比较运算符章节。  \n`SORT_NUMERIC` – 按数值比较元素。  \n`SORT_STRING`\
  \ – 按字符串比较元素。  \n`SORT_LOCALE_STRING` – 基于当前区域设置，按字符串比较元素。它使用可通过 `setlocale()` 更改的区域设置。\
  \  \n`SORT_NATURAL` – 使用类似 `natsort()` 的“自然排序”按字符串比较元素。  \n`SORT_FLAG_CASE` 可以与\
  \ `SORT_STRING` 或 `SORT_NATURAL` 进行组合（按位 OR）以实现不区分大小写的字符串排序。\n\n**返回值**  \n总是返回\
  \ true\n\n---\n\n`asort`\n\n对数组进行升序排序并保持索引关联\n\n```\nasort(array &$array, int $flags\
  \ = SORT_REGULAR): bool\n```\n\n就地（in place）对数组进行升序排序，使其键名与关联的值保持对应关系。这主要用于对实际元素顺序很重要的关联数组进行排序。\n\
  \n**参数**  \n`array`  \n输入的数组  \n`flags`  \n可选的第二个参数 flags 可用于通过以下值修改排序行为：\n\n**排序类型标志：**\
  \  \n`SORT_REGULAR` – 正常比较元素；详情见比较运算符章节。  \n`SORT_NUMERIC` – 按数值比较元素。  \n`SORT_STRING`\
  \ – 按字符串比较元素。  \n`SORT_LOCALE_STRING` – 基于当前区域设置，按字符串比较元素。它使用可通过 `setlocale()` 更改的区域设置。\
  \  \n`SORT_NATURAL` – 使用类似 `natsort()` 的“自然排序”按字符串比较元素。  \n`SORT_FLAG_CASE` 可以与\
  \ `SORT_STRING` 或 `SORT_NATURAL` 进行组合（按位 OR）以实现不区分大小写的字符串排序。\n\n**返回值**  \n总是返回\
  \ true\n\n---\n\n`compact`\n\n创建一个包含变量及其值的数组\n\n```\ncompact(array|string $var_name,\
  \ array|string ...$var_names): array\n```\n\n对于每个参数，`compact()` 会在当前符号表中查找具有该名称的变量，并将其添加到输出数组中，使得变量名成为键名，变量的内容成为该键的值。简而言之，它的作用与\
  \ `extract()` 相反。\n\n**参数**  \n`var_name`  \n`var_names`  \n`compact()` 接受可变数量的参数。每个参数可以是一个包含变量名的字符串，或者是一个包含变量名列表的数组。该数组内部可以包含其他变量名数组；`compact()`\
  \ 会递归地处理这种情况。\n\n**返回值**  \n返回包含所有添加的变量的输出数组\n\n---\n\n`count`\n\n统计数组或 `Countable`\
  \ 对象中所有元素的数量\n\n```\ncount(Countable|array $value, int $mode = COUNT_NORMAL): int\n\
  ```\n\n当用于实现了 `Countable` 接口的对象时，它返回 `Countable::count()` 方法的返回值。\n\n**参数**  \n\
  `value`  \n一个数组或 `Countable` 对象  \n`mode`  \n如果将可选的 mode 参数设置为 `COUNT_RECURSIVE`（或\
  \ 1），则 `count()` 会递归地统计数组。这对于统计多维数组的所有元素特别有用。\n\n**警告**  \n`count()` 能够检测递归以避免无限循环，但每次检测到递归时都会发出\
  \ `E_WARNING` 警告（以防数组包含自身多次），并且返回的计数值可能高于预期。\n\n**返回值**  \n返回 value 中的元素数量。在 PHP\
  \ 8.0.0 之前，如果参数既不是数组也不是实现了 `Countable` 接口的对象，则返回 1，除非 value 是 `null`，在这种情况下返回 0。\n\
  \n---\n\n`current`\n\n返回数组中的当前元素\n\n```\ncurrent(array|object $array): mixed\n```\n\
  \n每个数组都有一个指向其“当前”元素的内部指针，该指针初始化为插入数组的第一个元素。\n\n**参数**  \n`array`  \n数组  \n\n**返回值**\
  \  \n`current()` 函数简单地返回内部指针当前指向的数组元素的值。它不会以任何方式移动指针。如果内部指针指向元素列表末尾之外，或者数组为空，则 `current()`\
  \ 返回 false。\n\n**警告**  \n此函数可能返回布尔值 false，但也可能返回一个求值为 false 的非布尔值。请阅读关于布尔类型的章节以获取更多信息。请使用\
  \ `===` 运算符来测试此函数的返回值。\n\n---\n\n`each`\n\n从数组中返回当前的键值对，并向前移动数组指针\n\n```\neach(array|object\
  \ &$array): array\n```\n\n\n\n当 `each()` 执行完毕后，数组光标将停留在数组的下一个元素上，如果已到达数组末尾，则会停留在最后一个元素之后。如果你想使用\
  \ `each()` 再次遍历数组，必须使用 `reset()`。\n\n**参数**\n\n`array`\n输入的数组\n\n**返回值**\n\n返回数组\
  \ `array` 中当前的键值对。该键值对以包含四个元素的数组形式返回，其键分别为 0、1、key 和 value。元素 0 和 key 包含数组元素的键名，元素\
  \ 1 和 value 包含数据。如果数组的内部指针指向了数组内容的末尾之外，`each()` 将返回 false。\n\n## end\n\n将数组的内部指针指向其最后一个元素，并返回其值。\n\
  \n```\nend(array|object &$array): mixed\n```\n\n**参数**\n\n`array`\n数组。该数组通过引用传递，因为函数会修改它。这意味着你必须向其传递一个真实的变量，而不是一个返回数组的函数，因为只有实际变量才能通过引用传递。\n\
  \n**返回值**\n\n返回最后一个元素的值，如果数组为空则返回 false。\n\n## extract\n\n从数组中将变量导入到当前的符号表。\n\n\
  ```\nextract(array &$array, int $flags = EXTR_OVERWRITE, string $prefix = \"\"):\
  \ int\n```\n\n检查每个键，看其是否具有有效的变量名。同时还会检查与符号表中已有变量的冲突。\n\n**警告**\n\n不要对不可信的数据使用 `extract()`，例如用户输入（如\
  \ `$_GET`、`$_FILES`）。\n\n**参数**\n\n`array`\n一个关联数组。此函数将键视为变量名，将值视为变量值。对于每个键值对，它将在当前符号表中创建一个变量，具体行为受\
  \ `flags` 和 `prefix` 参数的影响。你必须使用关联数组；除非你使用了 `EXTR_PREFIX_ALL` 或 `EXTR_PREFIX_INVALID`，否则使用数字索引的数组不会产生结果。\n\
  \n`flags`\n无效/数字键以及冲突的处理方式由提取标志决定。它可以取以下值之一：\n\n- `EXTR_OVERWRITE` – 如果有冲突，覆盖已有的变量。\n\
  - `EXTR_SKIP` – 如果有冲突，不覆盖已有的变量。\n- `EXTR_PREFIX_SAME` – 如果有冲突，在变量名前加上 `prefix`。\n\
  - `EXTR_PREFIX_ALL` – 给所有变量名前加上 `prefix`。\n- `EXTR_PREFIX_INVALID` – 仅在无效/数字变量名前加上\
  \ `prefix`。\n- `EXTR_IF_EXISTS` – 仅在当前符号表中已存在该变量时覆盖它；否则不执行任何操作。这对于定义一组有效变量，然后仅从\
  \ `$_REQUEST` 等数组中提取那些已定义的变量非常有用。\n- `EXTR_PREFIX_IF_EXISTS` – 仅在当前符号表中存在不带前缀的相同变量时，才创建带前缀的变量名。\n\
  - `EXTR_REFS` – 以引用方式提取变量。这实际上意味着导入变量的值仍然引用着 `array` 参数的值。你可以单独使用此标志，或通过 `OR` 操作将其与其他任何标志组合。\n\
  \n如果未指定 `flags`，则默认为 `EXTR_OVERWRITE`。\n\n`prefix`\n请注意，仅当 `flags` 为 `EXTR_PREFIX_SAME`、`EXTR_PREFIX_ALL`、`EXTR_PREFIX_INVALID`\
  \ 或 `EXTR_PREFIX_IF_EXISTS` 时才需要 `prefix`。如果添加前缀后的结果不是有效的变量名，则不会将其导入到符号表。前缀会自动通过下划线字符与数组键分隔开。\n\
  \n**返回值**\n\n返回成功导入到符号表中的变量数量。\n\n## in_array\n\n检查数组中是否存在某个值。\n\n```\nin_array(mixed\
  \ $needle, array $haystack, bool $strict = false): bool\n```\n\n在 `haystack` 中搜索\
  \ `needle`，除非设置了 `strict`，否则使用松散比较。\n\n**参数**\n\n`needle`\n被搜索的值。\n\n**注意**\n\n\
  如果 `needle` 是字符串，则比较是区分大小写的。\n\n`haystack`\n数组。\n\n`strict`\n如果将第三个参数 `strict` 设置为\
  \ `true`，则 `in_array()` 函数还将检查 `haystack` 中 `needle` 的类型。\n\n**返回值**\n\n如果在数组中找到\
  \ `needle` 则返回 `true`，否则返回 `false`。\n\n## key_exists\n\n`array_key_exists` 的别名。\n\
  \n## key\n\n从数组中获取一个键。\n\n```\nkey(array|object $array): int|string|null\n```\n\n\
  `key()` 返回当前数组位置的索引元素。\n\n**参数**\n\n`array`\n数组。\n\n**返回值**\n\n`key()` 函数简单地返回内部指针当前所指向的数组元素的键。它不会以任何方式移动指针。如果内部指针指向元素列表末尾之外，或者数组为空，则\
  \ `key()` 返回 `null`。\n\n## krsort\n\n按键名对数组进行降序排序。\n\n```\nkrsort(array &$array,\
  \ int $flags = SORT_REGULAR): bool\n```\n\n原地按键名降序排序数组。\n\n**参数**\n\n`array`\n输入的数组。\n\
  \n`flags`\n可选的第二个参数 `flags` 可用于使用以下值修改排序行为：\n\n**排序类型标志：**\n\n- `SORT_REGULAR` –\
  \ 正常比较元素；详细描述见比较运算符章节。\n- `SORT_NUMERIC` – 按数字方式比较元素。\n- `SORT_STRING` – 按字符串方式比较元素。\n\
  - `SORT_LOCALE_STRING` – 基于当前区域设置，按字符串方式比较元素。它使用可通过 `setlocale()` 更改的区域设置。\n- `SORT_NATURAL`\
  \ – 使用“自然排序”像 `natsort()` 一样比较字符串。\n- `SORT_FLAG_CASE` 可以与 `SORT_STRING` 或 `SORT_NATURAL`\
  \ 组合（按位 OR）以不区分大小写的方式排序字符串。\n\n**返回值**\n\n始终返回 `true`。\n\n## ksort\n\n按键名对数组进行升序排序。\n\
  \n```\nkrsort(array &$array, int $flags = SORT_REGULAR): bool\n```\n\n**参数**\n\n\
  `array`\n输入的数组。\n\n`flags`\n可选的第二个参数 `flags` 可用于使用以下值修改排序行为：\n\n**排序类型标志：**\n\n\
  - `SORT_REGULAR` – 正常比较元素；详细描述见比较运算符章节。\n- `SORT_NUMERIC` – 按数字方式比较元素。\n- `SORT_STRING`\
  \ – 按字符串方式比较元素。\n- `SORT_LOCALE_STRING` – 基于当前区域设置，按字符串方式比较元素。它使用可通过 `setlocale()`\
  \ 更改的区域设置。\n- `SORT_NATURAL` – 使用“自然排序”像 `natsort()` 一样比较字符串。\n- `SORT_FLAG_CASE`\
  \ 可以与 `SORT_STRING` 或 `SORT_NATURAL` 组合（按位 OR）以不区分大小写的方式排序字符串。\n\n**返回值**\n\n始终返回\
  \ `true`。\n\n## list\n\n如同数组一样给变量赋值。\n\n```\nlist(mixed $var, mixed ...$vars = ?):\
  \ array\n```\n\n类似于 `array()`，这实际上不是一个函数，而是一个语言结构。`list()` 用于在一次操作中给一组变量赋值。字符串不能被解包，且\
  \ `list()` 表达式不能完全为空。\n\n**参数**\n\n`var`\n一个变量。\n\n`vars`\n更多的变量。\n\n**返回值**\n\n\
  返回被赋值的数组。\n\n## natcasesort\n\n使用不区分大小写的“自然顺序”算法对数组进行排序。\n\n```\nnatcasesort(array\
  \ &$array): bool\n```\n\n`natcasesort()` 是 `natsort()` 的不区分大小写版本。此函数实现了一种排序算法，该算法按人类习惯的方式对字母数字字符串进行排序，同时保持键/值关联。这被称为“自然排序”。\n\
  \n**参数**\n\n`array`\n输入的数组。\n\n**返回值**\n\n始终返回 `true`。\n\n## natsort\n\n使用“自然顺序”算法对数组进行排序。\n\
  \n```\nnatsort(array &$array): bool\n```\n\n此函数实现了一种排序算法，该算法按人类习惯的方式对字母数字字符串进行排序，同时保持键/值关联。这被称为“自然排序”。\n\
  \n**参数**\n\n`array`\n输入的数组。\n\n**返回值**\n\n始终返回 `true`。\n\n## next\n\n将数组的内部指针向前移动一位。\n\
  \n```\nnext(array|object &$array): mixed\n```\n\n\n\n## PHP 数组函数\n\n### `next()`\n\
  \n`next()` 的行为与 `current()` 类似，但有一个区别。它在返回元素值之前，会将内部数组指针向前移动一位。这意味着它返回下一个数组值，并将内部数组指针向前移动一位。\n\
  \n**参数**\n\n`array` - 受影响的数组\n\n**返回值**\n\n返回内部数组指针指向的下一个位置的数组值，如果没有更多元素则返回 `false`。\n\
  \n> **警告**\n> \n> 此函数可能返回布尔值 `false`，但也可能返回一个计算值为 `false` 的非布尔值。请阅读布尔值章节以获取更多信息。请使用\
  \ `===` 运算符来测试此函数的返回值。\n\n**`pos()`** - `current()` 的别名\n\n### `prev()`\n\n将内部数组指针倒回一位\n\
  \n```\nprev(array|object &$array): mixed\n```\n\n`prev()` 的行为与 `next()` 类似，区别在于它是将内部数组指针向后移动一位，而不是向前移动。\n\
  \n**参数**\n\n`array` - 输入的数组\n\n**返回值**\n\n返回内部数组指针指向的上一个位置的数组值，如果没有更多元素则返回 `false`。\n\
  \n> **警告**\n> \n> 此函数可能返回布尔值 `false`，但也可能返回一个计算值为 `false` 的非布尔值。请阅读布尔值章节以获取更多信息。请使用\
  \ `===` 运算符来测试此函数的返回值。\n\n### `range()`\n\n创建一个包含指定范围元素的数组\n\n```\nrange(string|int|float\
  \ $start, string|int|float $end, int|float $step = 1): array\n```\n\n**参数**\n\n\
  - `start` - 序列的第一个值\n- `end` - 序列在达到结束值时终止。\n- `step` - 如果指定了步进值，则将其用作序列中元素之间的增量（或减量）。`step`\
  \ 不能等于 0，且不能超过指定的范围。如果未指定，则 `step` 默认为 1。\n\n**返回值**\n\n返回一个包含从 `start` 到 `end`（包括两端）的元素的数组\n\
  \n### `reset()`\n\n将数组的内部指针指向其第一个元素\n\n```\nreset(array|object &$array): mixed\n\
  ```\n\n`reset()` 将数组的内部指针倒回到第一个元素，并返回第一个数组元素的值。\n\n**参数**\n\n`array` - 输入的数组\n\n\
  **返回值**\n\n返回第一个数组元素的值，如果数组为空则返回 `false`\n\n> **警告**\n> \n> 此函数可能返回布尔值 `false`，但也可能返回一个计算值为\
  \ `false` 的非布尔值。请阅读布尔值章节以获取更多信息。请使用 `===` 运算符来测试此函数的返回值。\n\n### `rsort()`\n\n对数组进行降序排序\n\
  \n```\nrsort(array &$array, int $flags = SORT_REGULAR): bool\n```\n\n**参数**\n\n\
  - `array` - 输入的数组\n- `flags` - 可选的第二个参数 `flags` 可用于使用以下值修改排序行为：\n\n**排序类型标志：**\n\
  \n| 标志 | 描述 |\n|------|-------------|\n| `SORT_REGULAR` | 正常比较项目；详细信息在比较运算符章节中描述。\
  \ |\n| `SORT_NUMERIC` | 数值比较项目。 |\n| `SORT_STRING` | 作为字符串比较项目。 |\n| `SORT_LOCALE_STRING`\
  \ | 基于当前语言环境将项目作为字符串进行比较。它使用可以通过 `setlocale()` 更改的语言环境。 |\n| `SORT_NATURAL` | 使用“自然排序”（如\
  \ `natsort()`）将项目作为字符串进行比较。 |\n| `SORT_FLAG_CASE` | 可以与 `SORT_STRING` 或 `SORT_NATURAL`\
  \ 结合（按位 OR）以不区分大小写的方式对字符串进行排序。 |\n\n**返回值**\n\n始终返回 `true`\n\n### `shuffle()`\n\n\
  打乱数组\n\n```\nshuffle(array &$array): bool\n```\n\n此函数打乱（随机化数组中元素的顺序）一个数组。它使用一个不适合加密目的的伪随机数生成器。\n\
  \n**参数**\n\n`array` - 数组\n\n**返回值**\n\n成功时返回 `true`，失败时返回 `false`。\n\n**`sizeof()`**\
  \ - `count()` 的别名\n\n### `sort()`\n\n对数组进行原地升序排序\n\n```\nsort(array &$array, int\
  \ $flags = SORT_REGULAR): bool\n```\n\n**参数**\n\n- `array` - 输入的数组\n- `flags` -\
  \ 可选的第二个参数 `flags` 可用于使用以下值修改排序行为：\n\n**排序类型标志：**\n\n| 标志 | 描述 |\n|------|-------------|\n\
  | `SORT_REGULAR` | 正常比较项目；详细信息在比较运算符章节中描述。 |\n| `SORT_NUMERIC` | 数值比较项目。 |\n| `SORT_STRING`\
  \ | 作为字符串比较项目。 |\n| `SORT_LOCALE_STRING` | 基于当前语言环境将项目作为字符串进行比较。它使用可以通过 `setlocale()`\
  \ 更改的语言环境。 |\n| `SORT_NATURAL` | 使用“自然排序”（如 `natsort()`）将项目作为字符串进行比较。 |\n| `SORT_FLAG_CASE`\
  \ | 可以与 `SORT_STRING` 或 `SORT_NATURAL` 结合（按位 OR）以不区分大小写的方式对字符串进行排序。 |\n\n**返回值**\n\
  \n始终返回 `true`\n\n### `uasort()`\n\n使用用户自定义的比较函数对数组进行排序，并保持索引关联\n\n```\nuasort(array\
  \ &$array, callable $callback): bool\n```\n\n使用用户自定义的比较函数对数组进行原地排序，并保持其键与关联值之间的相关性。这主要用于排序关联数组，其中实际元素的顺序很重要。\n\
  \n**参数**\n\n- `array` - 输入的数组\n- `callback` - 比较函数必须返回一个整数，如果第一个参数被认为分别小于、等于或大于第二个参数，则返回小于、等于或大于零的值。\n\
  \n```\ncallback(mixed $a, mixed $b): int\n```\n\n**返回值**\n\n始终返回 `true`\n\n### `uksort()`\n\
  \n使用用户自定义的比较函数按键对数组进行排序\n\n```\nuksort(array &$array, callable $callback): bool\n\
  ```\n\n**参数**\n\n- `array` - 输入的数组\n- `callback` - 比较函数必须返回一个整数，如果第一个参数被认为分别小于、等于或大于第二个参数，则返回小于、等于或大于零的值。\n\
  \n```\ncallback(mixed $a, mixed $b): int\n```\n\n**返回值**\n\n始终返回 `true`\n\n### `usort()`\n\
  \n使用用户自定义的比较函数按值对数组进行排序\n\n```\nusort(array &$array, callable $callback): bool\n\
  ```\n\n**参数**\n\n- `array` - 输入的数组\n- `callback` - 比较函数必须返回一个整数，如果第一个参数被认为分别小于、等于或大于第二个参数，则返回小于、等于或大于零的值。\n\
  \n```\ncallback(mixed $a, mixed $b): int\n```\n\n**返回值**\n\n始终返回 `true`\n\n## 总结\n\
  \n总的来说，数组可以如你所愿地简单或复杂。一旦你熟练掌握了它们，它们就是你的工具箱中一个很棒的工具。\n\n在本章中，你学习了如何使用 PHP 数组在单个变量中保存多个相似类型的值，这些数组可以是索引数组、关联数组和多维数组。你还了解了最常见的\
  \ PHP 数组函数。\n\n在下一章中，你将学习如何使用会话（在 PHP 中用于跟踪你在应用程序中的活动）和 Cookie（用于存储有限数据，例如用户身份）。\n\
  \n# 7. 会话与 Cookie\n\n在前面的章节中，你学习了如何使用 PHP 中最通用、最有用的元素之一——数组，在单个变量中存储多个值。现在，假设你需要在多个网页之间存储一些信息。你需要将某些信息存储在本地计算机上（客户端），或者使用网页在服务器上（服务端）存储某些信息一段时间。你会怎么做？通过使用会话和\
  \ Cookie。\n\n会话和 Cookie 的主要区别在于，如前所述，Cookie 用于将某些用户信息作为客户端文件存储在本地计算机上，而会话是将用户信息存储在\
  \ Web 服务器上的服务端文件。\n\nCookie 在你定义的指定生命周期结束后立即过期，而会话在你关闭 Web 浏览器或从网页或程序注销时结束。\n\n\
  本章包含以下部分：\n\n- PHP 会话\n- PHP Cookie\n\n\n\n## PHP 会话\n\n会话（Session）是 PHP 用来追踪你在应用中活动的机制。例如，当你登录一个应用、进行一些修改、上传图片然后离开网站时，整个过程就是一个会话。应用知道你是谁，并且一直在传递和追踪一个变量（`$_SESSION`）。会话变量存储着关于单个用户的信息，并在应用中传递以追踪用户活动。\n\
  \n与普通变量不同，会话需要被启动才能保持完整性。为此，PHP 提供了一个 `session_start()` 函数。之后，通过 `$_SESSION` 全局变量就可以设置会话变量了。\n\
  \n让我们创建一个包含基本会话声明的简单页面。打开 `chapter7` 文件夹和 `first_session.php` 文件。\n\n那么，会话数据已经设置好了，但它在哪里呢？会话存储在服务器端，所以你无法通过\
  \ `检查元素` 这类方法来查看它们。不过，你可以使用 `var_dump()` 来确保它们被正确存储。\n\n请浏览回 `chapter7` 文件夹并打开 `first_session2.php`。太棒了！现在你成功保存了会话变量。要进行真正的测试，请回到\
  \ `chapter7` 文件夹并找到 `session_test.php`。如果你能打开一个全新的页面并且仍然能读取到会话数据，那么你就成功了。在 `session_test.php`\
  \ 中，你只需要使用 `session_start()` 函数来访问会话数据。继续点击 `session_test.php` 来查看数据。\n\n```\n\"\
  ;\necho \"最喜欢的动物是 \" . $_SESSION[\"favanimal\"] . \".\";\n?>\n```\n\n最后一个小技巧，让我们查看会话变量，然后销毁它们！这将移除通过\
  \ `session_start()` 启动的当前活跃的会话信息。\n\n点击 `chapter7` 目录下的 `remove_session.php` 来查看并移除会话数据。以下是\
  \ `remove_session.php` 的内容：\n\n```\n\";\nvar_dump($_SESSION);\necho \"\";\n// 移除所有会话变量\n\
  session_unset();\necho \"执行 session_unset 后的变量：\";\nvar_dump($_SESSION);\necho \"\
  \";\n// 销毁会话\nsession_destroy();\necho \"执行 session_destroy 后的变量：\";\nvar_dump($_SESSION);\n\
  echo \"\";\n?>\n```\n\n让我们将这个概念应用到实际场景中，比如一个连接到数据库的登录页面。访问 `http://localhost/chapter7/`\
  \ 会显示一个名为 `seedDB.php` 的文件。继续点击它。你将用这个文件向数据库中填充一些数据。如果一切正常，你应该会在浏览器中看到如下输出：\n\n\
  ```\n向表中添加用户..1..2..3\n用户已添加\n1 - tom - hanks - 1234 - 2022-04-15 17:39:21\n2 -\
  \ billy - mitchell - 1234 - 2022-04-15 17:39:21\n3 - mega - man - 1234 - 2022-04-15\
  \ 17:39:21\n```\n\n这是你可以用于此示例的测试数据。打开 `login.php` 并查看代码。\n\n```\n登录\n\n0){\n// 将匹配的用户设置为当前用户\n\
  $_SESSION['first_name'] = $first_name;\n$_SESSION['timestamp'] = date(\"h:i:sa\"\
  );\n// 显示成功消息\necho \"您已登录！\";\nif (isset($_SESSION)) {\necho \"\";\nprint_r($_SESSION);\n\
  }\n// 如果行数小于零\n} else {\n// 显示失败消息\necho \"错误！名字或密码无效。\";\n}\n}\n}\n?>\n```\n\n\
  让我们逐行分析一下。\n\n```\n<?php\n// 启动一个 PHP 会话\nsession_start();\n```\n\n这里你使用 `session_start()`\
  \ 函数来启动你的会话。\n\n```\n?>\n\n登录\n\n```\n\n这是一个基本表单，用来收集用户的凭据。使用与数据库一致的命名方式以便于追踪。这可以是任何名称，例如“用户名”/“密码”或“用户”/“密钥”。\n\
  \n```\n<?php\n// 数据库主机名\n$host = \"mysql-db\";\n// 数据库用户\n$user = \"user\";\n//\
  \ 数据库密码\n$password = \"pass\";\n// 数据库名称\n$db = \"beginningPHP\";\n$connection =\
  \ mysqli_connect($host, $user, $password, $db);\n```\n\n这使用本书中会一直使用的凭据连接到你的数据库。下面，你检查连接是否成功，如果因任何原因失败，则显示错误：\n\
  \n```\n// 如果连接失败\nif (!$connection) {\n// 显示消息并终止脚本\ndie(\"连接失败：\" . mysqli_connect_error());\n\
  }\n// 如果提交按钮被按下\nif(isset($_POST['submit'])){\n// 转义字符串中的特殊字符\n$first_name = mysqli_real_escape_string($connection,\
  \ $_POST['first_name']);\n$password = mysqli_real_escape_string($connection, $_POST['password']);\n\
  // 如果用户名和密码不为空\nif ($first_name != \"\" && $password != \"\"){\n```\n\n在将输入数据引入数据库之前，你需要检查并清理它。这将有助于防止\
  \ MySQL 注入攻击。\n\n```\n$query = \"select count(*) as countUser from users where first_name='\"\
  .$first_name.\"' and password='\".$password.\"'\";\n```\n\n这是你的查询语句，用来检查数据库中的 `first_name`\
  \ 值是否等于表单中的 `$first_name`。\n\n```\n// 存储查询结果\n$result = mysqli_query($connection,\
  \ $query);\n// 将结果行作为关联数组获取\n$row = mysqli_fetch_array($result);\n// 获取行数\n$count\
  \ = $row['countUser'];\n// 如果行数大于零\nif($count > 0){\n// 将匹配的用户设置为当前用户\n$_SESSION['first_name']\
  \ = $first_name;\n$_SESSION['timestamp'] = date(\"h:i:sa\");\n// 显示成功消息\necho \"\
  您已登录！\";\nif (isset($_SESSION)) {\necho \"\";\nprint_r($_SESSION);\n}\n// 如果行数小于零\n\
  } else {\n// 显示失败消息\necho \"错误！名字或密码无效。\";\n}\n}\n}\n?>\n```\n\n使用测试数据 “tom” 和密码\
  \ “1234” 进行测试。你可以随时回到 `chapter7` 目录，运行 `remove_session.php` 来清除或注销会话数据。\n\n请注意，为了防止\
  \ SQL 注入，你可以使用 PDO（PHP 数据对象），它是一个抽象层，可以作为 MySQLi 的替代方案用于数据库查询。\n\n## PHP Cookie\n\
  \nCookie 常用于识别用户。Cookie 是由服务器嵌入到用户计算机上的一个小文件。请记住，与 Cookie 不同，会话变量是存储在服务器上的。每当同一台计算机请求页面时，应用程序就可以读取\
  \ Cookie 来识别用户。PHP 可用于创建和检索这些 Cookie 值。\n\n与会话类似，你需要使用一个名为 `setcookie()` 的内置 PHP\
  \ 函数来开始使用它们。设置 Cookie 的语法是：\n\n```\nsetcookie(name, value, expire, path, domain,\
  \ secure, httponly);\n```\n\n`Name` 是唯一必需的值。打开 `chapter7` 中的 `first_cookie.php`\
  \ 文件并查看代码。\n\n```\n\";\necho \"值为：\" . $_COOKIE[$cookie_name];\n}\n?>\n```\n\n在这个例子中，你创建了一个名为\
  \ `username` 的 Cookie，并将其值设置为 `Betchy McCleaver`（我八年级的科学老师）。该 Cookie 的过期时间是 30 天。你是通过将\
  \ 86,400（24 小时/一天的总秒数）乘以 30（你希望 Cookie 保持有效的天数）来得出这个值的。接下来，你设置了网站中可以访问此 Cookie 的路径：`/`，这意味着该域名下的任何\
  \ PHP 应用都可以访问。为了检索 Cookie，与 `$_SESSION` 非常相似，你使用 `$_COOKIE`。\n\n在浏览器的本地主机上进入 `chapter7`\
  \ 目录，并点击 `first_cookie.php`。你会看到它显示 Cookie 未设置。这是因为你第一次运行该脚本。按刷新按钮，你就会看到 Cookie！你可以通过浏览器的\
  \ `检查元素` 功能来验证这个 Cookie。右键点击页面，选择 `检查元素`，然后点击右上角的 `应用程序`，接着点击左侧栏的 `Cookie`，如图 7-1\
  \ 所示。\n\n![图 7-1](img/514068_1_En_7_Fig1_HTML.jpg)\n\n**图 7-1** 检查元素页面以查看 Cookie\
  \ 信息\n\n现在让我们修改一个 Cookie。打开 `modify_cookie.php`。将 `username` 的值改为 `杰森·伯恩`。你可以通过刷新页面或使用上述的\
  \ `检查元素` 方法来验证这一点。\n\n\n\n## 删除 Cookies\n\n要删除一个 Cookie，你基本上需要使其时间失效。Cookie 被创建，但将其过期时间设置为一个过去的日期。这将使\
  \ Cookie 失效并将其从系统中删除。\n\n你可以点击`delete_cookie.php`查看一个可运行的示例。\n\n在依赖 Cookie 之前，养成检查\
  \ Cookie 是否启用的好习惯。\n\n```php\n<?php\nif (count($_COOKIE) > 0) {\n    echo \"Cookies\
  \ are enabled.\";\n} else {\n    echo \"Cookies are disabled.\";\n}\n?>\n```\n\n\
  这里，你尝试设置一个任意的 Cookie，然后读取它。如果你能验证 Cookie 已被设置，你就知道用户的 Cookie 已启用！\n\n## 总结\n\n在本章中，你学习了如何在\
  \ PHP 语言中使用会话（Sessions）和 Cookie 来跟踪你在 Web 应用中的活动。你了解了如何在 PHP 会话和 Cookie 中创建、存储和管理信息。\n\
  在下一章中，你将学习如何使用 PHP 对象，这是另一种复合数据类型。它们类似于数组，可以设置和使用多种类型的信息，从字符串到所有类型的数字。\n\n# 8. 对象\n\
  \n到目前为止，我们已经介绍了几种数据类型，包括字符串、整数和浮点数。你已经学会了如何使用字符串、整数和数组。这些类型各有其优点和局限性。整数不能使用字母“s”作为值，而字符串可以包含整数“1”。通过数组，你了解了复合数据类型的概念。这种数据类型允许组合和混合不同的元素。一个数组可以同时包含字母和数字，包含特定的键值对（关联数组），或者仅包含一组组织有序的数据。最终结果是，多种类型的值可以一起存储在一个单独的变量中。\n\
  \n在这一简短的章节中，我们将重点讨论我们在第 2 章和第 4 章中简要提及的一种 PHP 数据类型：对象。请注意，一般来说，类和对象是面向对象编程的两个主要方面，因此它们非常重要。\n\
  \n要理解类和对象是如何相互关联的，我们可以说，类是对象的模板，而对象是某个类的实例。与数组类似，你可以设置和使用多种类型的信息，从字符串到所有类型的数字。然而，对象赋予你定义特定功能的能力。这个功能在类定义中设置。因此，当你创建一个单独的对象时，它将继承其关联类的所有属性和行为，但每个对象的属性值仍然是不同的。\n\
  \n对象是用户定义的类，可以存储值和函数，并且必须显式声明。\n\n让我们看一些基本的例子。\n\n```php\n<?php\nclass Vegetable\
  \ {\n    var $name;\n    var $color;\n\n    function set_name($name) {\n       \
  \ $this->name = $name;\n    }\n    function get_name() {\n        return $this->name;\n\
  \    }\n}\n?>\n```\n\n这里，你声明了一个名为`Vegetable`的类。这个类同时包含了属性和方法。请记住，属性是变量，方法是函数。两个属性是`$name`和`$color`。两个方法是`set_name`和`get_name`。它们通常被称为“getters\
  \ 和 setters”。这类方法在对象中很常见，因为你不断地“获取”和“设置”类属性的值。创建这些辅助函数非常方便。如果你的对象中有这些函数，你只需要记住`$vegetable->get_name();`和`$vegetable->set_name();`。\n\
  \n这是另一个对象的例子：\n\n```php\n<?php\nclass Message {\n  function hi() {\n    echo \"\
  Hello World\";\n  }\n}\n$msg = new Message();\n$msg->hi();\n?>\n```\n\n输出：Hello\
  \ World\n\n在某些情况下，你可能想要动态创建一个对象。PHP 有`stdClass`，它允许你这样做。\n\n```php\n<?php\n$obj\
  \ = new stdClass();\n$obj->name=\"gunnard\";\n$obj->age=26;\n$obj->twitter=\"@gunnard\"\
  ;\nprint_r($obj);\n?>\n```\n\n输出\n\n这将产生以下结果：\n\n```\nstdClass Object(\n[name] =>\
  \ gunnard\n[age] => 26\n[twitter] => @gunnard\n)\n```\n\n让我们从一个基础的类开始，看看类中的变化如何影响对象。你将创建一个`Beverage`类来对你经营的披萨店中的饮料进行分类和跟踪信息。\n\
  \n```php\n<?php\nclass Beverage {\n    public $name;\n    public $type;\n    public\
  \ $temperature;\n    public $price;\n    public $sale;\n}\n```\n\n为了将这个类作为一个对象使用，你需要实例化它。这通过`new`关键字完成。\n\
  \n```php\n$cola = new Beverage();\n```\n\n现在你有了一个名为`$cola`的对象，它包含了你在`Beverage`类中定义的属性。你可以通过`->`运算符为属性赋值来使用这个对象。这将允许你为每个属性分配特定的值。\n\
  \n```php\n<?php\n$cola->name = \"Rocky Cola\";\n$cola->type = \"Soda\";\n$cola->temperature\
  \ = \"45 f\";\n$cola->price = \"0.50\";\n$cola->sale = null;\n?>\n```\n\n现在你可以为类属性设置值了，让我们添加类方法（或类中的函数），这些方法允许对象操作数据。例如，\n\
  \n```php\n<?php\nclass Beverage {\n    public $name;\n    public $type;\n    public\
  \ $temperature;\n    public $price;\n    public $sale;\n\n    public function getMenuName()\
  \ {\n        return $this->type . ' ' . $this->name . ' ' . $this->price;\n    }\n\
  }\n?>\n```\n\n使用`getMenuName`方法，目的是显示饮料的类型、名称和价格。这在显示餐厅的完整菜单时可以使用。你可以使用这个方法处理所有格式化工作，而不是使用对象分别返回名称、类型和价格，然后再进行格式化。\n\
  `$this`变量指的是当前正在使用的对象。当你调用`getMenuName()`方法时，`$this`指的是调用该方法的特定对象。对象方法的访问方式与属性类似，使用对象运算符`->`，但与任何函数一样，末尾需要加上括号，例如`()`。\n\
  \n## 总结\n\n在本章中，你学习了如何使用 PHP 对象，这是另一种复合数据类型。它类似于数组，可以设置和使用多种类型的信息，从字符串到所有类型的数字。\n\
  在下一章中，你将学习如何……\n\n# 9. PHP 异常、验证和正则表达式\n\nPHP 确实是世界上用于在互联网上开发应用程序和网站的最常用的编程语言之一。PHP\
  \ 8 是一种非常动态、灵活的编程语言；它也易于作为嵌入式语言使用，例如用于 HTML。\n在本章中，你将学习关于异常、表单验证和正则表达式的所有内容。它们是什么以及什么时候我们需要使用它们？\n\
  PHP 确实是一种非常灵活的编程语言，在处理异常时也是如此，异常是代码中可能出现的非正常场景。代码异常可能是输入错误或代码错误，与之前的版本相比，PHP 8 已经更新，更加安全，并能更好地处理更多的异常。\n\
  我们将解释如何使用 PHP 异常，使用`try`、`catch`和`throw`。\n此外，作为开发者，你将需要进行 Web 表单验证，这意味着验证在 PHP\
  \ 表单中输入的各种字段类型的特定值，例如文本框、复选框、单选按钮和清单。\n最后，我们将描述 PHP 正则表达式的用法，它只是一系列形成搜索模式的字符，可用于（例如）在你的\
  \ PHP 代码中检查提供的文本字符串是否包含特定的字符模式。\n\n本章包含以下部分：\n\n*   PHP 异常（`try`、`catch`、`finally`和`throw`）\n\
  *   PHP 表单验证（验证名称和电子邮件值）\n*   PHP 正则表达式\n\n\n\n### PHP 异常\n\n正如本章引言所述，编程语言中的异常就是\
  \ PHP 程序出现的意外结果。你的目标是告诉代码如何尽可能自行处理任何意外结果。\n\n请记住，错误和异常的主要区别在于，异常会中断代码的正常流程，但通过添加一些额外的代码可以处理它；而错误则无法由代码本身处理。你将看到如何使用\
  \ PHP 来处理并捕获抛出的异常。\n\nPHP 与所有编程语言一样，必须拥有一种代码异常机制来处理运行时错误，这些错误也称为异常。在 PHP 以及其他任何语言中，这对于维持应用程序的正常流程都是必要的。\n\
  \n每种语言都包含一组可抛出的异常和错误。在 PHP 中，代码中可能发生多种不同类型的错误。以下是一些例子：\n\n* `CompileError`\n* `ParseError`\n\
  * `TypeError`\n* `ArithmeticError`\n\nPHP 还包含一个名为 `Throwable` 的异常，它可以表示以下这些：\n\n\
  * `ClosedGeneratorException`：当试图对已关闭或终止的生成器执行遍历时发生。\n* `DOMException`：当由于逻辑原因无法执行某项操作时发生。\n\
  * `ErrorException`：用于将 PHP 错误转换为异常。\n* `IntlException`：根据 PHP 文档，当 `intl` 函数内部发生错误时，使用此类生成异常。仅在启用\
  \ `intl.use_exceptions` 时才会生成此类异常。\n\nPHP 可以帮助我们处理诸如 `IOException`、`SQLException`、`ClassNotFoundException`\
  \ 等运行时错误。\n\n让我们从一个不幸未被捕获的异常示例开始，该异常会生成一个带有\"未捕获异常\"消息的致命错误。在此示例中，你将抛出一个异常而不捕获它，方法是将数字\
  \ 3 发送给一个名为 `checkMyNum()` 的 PHP 函数，该函数只期望接收 1 或更小的值。\n\n代码如下：\n\n`Chapter9/exception1.php`\n\
  \n```\n<?php\nfunction checkMyNum($number) {\nif($number > 1) {\nthrow new Exception(\"\
  输入的数字必须为 1 或更小！！\");\n}\nreturn true;\n}\ncheckMyNum(3);\n?>\n致命错误：未捕获异常 'Exception'\n\
  消息为：输入的数字必须为 1 或更小！！'，位于 C:\\mytest.php:5\n堆栈跟踪：#0 C:\\mytest.php(11): checkMyNum(3)\
  \ #1 {main} 在 C:\\mytest.php 第 5 行抛出\n```\n\n要修复此错误，让我们看看如何使用名为 `try`、`catch` 和\
  \ `throw` 的 PHP 异常处理方法来处理和纠正上述未捕获的异常错误。\n\n* `try`：`try` 块包含你的函数，在代码发生异常的情况下触发。如果没有异常触发\
  \ `try`，代码将像往常一样继续执行。如果触发了异常，则表示该异常被\"抛出\"。\n* `throw`：这就是你触发特定异常的方式，但请记住，每个 `throw`\
  \ 在代码中必须至少有一个对应的 `catch`。\n* `catch`：`catch` 块主要检索发生的异常，创建一个包含异常信息的对象，并决定如何处理，例如打印错误消息。\n\
  * `finally`：`finally` 块可以在 `catch` 块之后指定，或者代替 `catch` 块。`finally` 块中的代码将在 `try`\
  \ 和 `catch` 块之后始终执行，无论是否抛出了异常，并且在恢复正常执行之前。\n\n`try...catch...finally` 块的语法如下所示：\n\
  \n```\n<?php\ntry {\n// 在我们的代码中执行某些操作\n} catch (Exception $e) {\n// 处理任何异常的代码\n\
  } finally {\n// 清理资源并完成代码执行的代码\n}\n```\n\n一般来说，当运行代码并触发异常时，会发生以下情况：\n\n* 代码的当前状态将被保存。\n\
  * 代码的执行将自动切换到你在代码中添加的预定义异常处理函数。\n* 最后，处理函数将停止程序的执行，要么从最后保存的代码状态恢复执行，要么从代码的另一部分继续执行。\n\
  \n现在，让我们获取你未捕获异常的 PHP 代码，并使用 `try`、`catch`、`finally` 和 `throw` 方法来修复它。\n\n`Chapter9/exception2.php`\n\
  \n```\n<?php\nfunction checkMyNum($number) {\nif($number > 1) {\nthrow new Exception(\"\
  输入的数字必须为 1 或更小！！\");\n}\nreturn true;\n}\n// 让我们在 \"try\" 块中触发异常，发送数字 3\ntry {\n\
  checkMyNum(3);\n// 如果抛出异常，此文本将不会显示给用户\necho '你输入的数字为 1 或更小！！';\n}\n// 我们的代码将捕获异常并生成一条消息\n\
  catch(Exception $e) {\necho '捕获到异常：',  $e->getMessage(), \"\\n\";\n}\n// finally\
  \ 块完成我们的代码执行过程\nfinally {\necho \"代码执行完成。\";\n}\n?>\n```\n\n这段代码的输出如下：\n\n```\n\
  捕获到异常：输入的数字必须为 1 或更小！！\n代码执行完成。\n```\n\n让我们解释一下这段代码。\n\n* 你创建了一个 `checkMyNum()`\
  \ 函数，它简单地检查数字是否大于 1。\n* 由于你发送了数字 3，`checkMyNum()` 函数内部的异常被抛出。\n* `checkMyNum()`\
  \ 函数在 `try` 块中被调用。\n* `catch` 块中的代码将简单地检索异常并创建包含异常信息的对象（`$e`），在你的例子中，使用 `echo` 打印\"\
  捕获到异常\"错误消息，最后通过调用 `$e->getMessage()` 打印异常中的错误消息。\n* `finally` 块将完成你的代码，只是关闭代码执行并写入消息\"\
  代码执行完成。\"\n\n请记住，你可以通过创建一个特殊的类，其中包含在 PHP 代码中发生特定异常时可以调用的函数，来开发自己的 PHP 自定义异常处理程序。这个自定义异常处理程序类必须是异常类的扩展。\n\
  \n接下来，让我们看看如何验证一个 PHP 网页表单。\n\n### PHP 表单验证\n\n出于安全原因，客户端的网页表单验证非常重要，它帮助开发者保护 PHP\
  \ 表单免受黑客和垃圾邮件发送者的攻击。\n\n你可能需要对包含各种类型字段（如文本框、复选框、单选按钮和核对清单）的 PHP 表单中输入的值进行 PHP 表单验证。\n\
  \n假设你有一个 HTML 网页表单，并且希望在将其发送到服务器之前使用 PHP 验证表单中输入的值。\n\n首先，构建一个简单的 HTML 网页表单，如下所示：\n\
  \n`Chapter9/form-action.xhtml`\n\n```html\n<html>\n<head>\n<title>PHP 表单验证</title>\n\
