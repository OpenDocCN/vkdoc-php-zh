  trans: "\n# 异常处理原则\n\nPHP 语言在许多方面都相当民主。这一点同样适用于对错误引发的反应。在大多数编程语言中，错误通常意味着程序终止（除非涉及特殊的错误处理系统），但在\
    \ PHP 中，情况并非总是如此严重。即使发生了像错误这样不愉快的事情，也不意味着程序会突然终止。通常，它仅限于一条警告消息，甚至根本没有警告。换句话说，存在着多种不同类型的错误。导致程序终止的错误通常被称为致命错误或*异常*。首先，让我们探讨如何处理这类错误。\n\
    \n异常处理背后的思路非常简单。你必须提供一些在发生异常时要执行的程序代码。在 PHP 中，你可以通过多种不同的方式来实现这个思路。让我们从最简单的情况开始，然后深入探讨这个问题。\n\
    \n> **注意：** 再次强调，在 PHP 的上下文中，错误和异常并不相同。然而，从现在开始，除非会导致误解，否则诸如*异常*和*错误*之类的术语是同义词。\n\
    \n那么，假设有一个代码块，你怀疑它在执行过程中可能会发生错误。你需要做什么？有一个简单的方法。它要求将提到的代码（受控代码）放在一个特殊的块中，该块以 `try`\
    \ 关键字开头并用花括号括起来。在包含受控代码的 `try` 块之后，放置 `catch` 块，其中包含在发生错误时要执行的代码。以下是整个 `try-catch`\
    \ 的模板。\n\n```\ntry{\n    // 受控代码\n}catch(Error_type $object_name){\n    // 处理错误的代码\n\
    }\n```\n\n`catch` 关键字后面跟着错误类名和括号内用于错误对象的形式标记（与错误对象关联的变量）。\n\n**详情：** 关键在于，当发生错误时，会自动创建一个包含错误信息的对象。这些信息原则上可以用于处理错误。`catch`\
    \ 块包含错误类的名称（错误类型）和错误对象。你可以使用不同的处理方法来处理不同类型的错误。如果是这样，那么在 `try-catch` 结构中，使用多个 `catch`\
    \ 块——每个块用于处理特定类型的错误。\n\n> **PHP 8 标准：** 在 PHP 8 中，你可以（如果需要）仅在 `catch` 关键字后的括号内的\
    \ `catch` 块描述中指定异常类名，而无需为异常对象指定任何变量。\n\n带有 `try-catch` 结构的代码按如下方式执行。首先，执行受控代码。如果没有错误，则忽略\
    \ `catch` 块。如果在执行受控代码时 `try` 块中发生错误，则停止 `try` 块，并执行 `catch` 块。然后，运行 `try-catch`\
    \ 结构之后的命令。具体情况如清单 10-1 所示。\n\n```\n清单 10-1\n异常处理原则\n```\n\n这个程序很简单。要求用户输入一个表达式来指定\
    \ `$x` 变量的值。你丢弃读取字符串中的前导和尾随空格。`$input=\"\\$x=\".trim(fgets(STDIN)).\";\"` 指令构成了一个为\
    \ `$x` 变量赋值的命令。相应的字符串被写入 `$input` 变量。当你将 `$input` 变量中的字符串作为参数传递给 `eval()` 函数时，该命令就会被执行。接下来，显示\
    \ `$x` 变量的值。所有命令都放在 `try` 块内。关键在于，`eval($input)` 语句可能会因为用户输入的值无效而导致错误。这种错误属于 `ParseError`\
    \ 类。为了捕获错误，使用 `catch` 块，在其中执行 `echo \"There was an error\\n\"` 命令。\n\n因此，如果在 `try`\
    \ 块中的代码执行期间没有发生 `ParseError` 类的错误，则忽略 `catch` 块，并显示计算出的 `$x` 变量的值。如果发生错误，则不显示\
    \ `$x` 的值，而是执行 `catch` 块中的代码。但无论如何，在 `try-catch` 结构之后都会执行 `echo \"The program\
    \ is over\\n\"` 命令。\n\n程序的执行结果取决于用户输入的表达式。如果表达式是正确的 PHP 语句，结果如下（用户输入以粗体显示）。\n\n\
    ```\n程序输出（来自清单 10-1）\n变量 $x 的值：3+4*5\n$x = 23\n程序结束\n```\n\n如果用于确定 `$x` 变量值的表达式不正确，结果如下所示。\n\
    \n```\n程序输出（来自清单 10-1）\n变量 $x 的值：3++4\n发生了一个错误\n程序结束\n```\n\n你可以按照所述方式处理不同类型的错误。\n\
    \n## 异常类\n\n对应于不同类型错误（不同类的异常）的类基于类的继承和接口的实现形成了一个层次结构。为什么这很重要？原因在于，如果 `catch` 块被设计用于处理特定类的错误，那么它也可以处理该类的所有子类的错误。\n\
    \n接下来，让我们讨论与错误处理相关的主要类。但让我们从 `Throwable` 接口开始。它很重要，因为用于错误处理的类直接或间接地实现了该接口。因此，接口中声明的方法对于许多异常类来说是通用的。这些方法在表\
    \ 10-1 中列出并描述。\n\n**表 10-1** `Throwable` 接口方法\n\n| 方法 | 描述 |\n| --- | --- |\n\
    | `getMessage()` | 该方法返回与异常关联的消息。 |\n| `getCode()` | 该方法返回异常代码。 |\n| `getFile()`\
    \ | 该方法返回一个字符串，其中包含创建异常对象的文件名。 |\n| `getLine()` | 该方法的整数结果确定创建异常对象时所执行的行。 |\n\
