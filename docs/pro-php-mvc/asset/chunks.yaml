    $database = \Framework\Registry::get("database");


    $database- > connect();


    }


    }


    }


    As Listing 14**-**1 demonstrates, it is fairly easy to subclass the Controller
    class within our application. The libraries directory was added as a possible
    include directory (in the Core::initialize() method), so it will be loaded easily
    enough, and we can even keep the shared Controller subclass namespaced.


    We override the __construct() method (making sure to call the appropriate parent
    method), retrieving the database instance from the registry, and then connecting
    to the database server with it. At first glance, it might appear that we are mixing
    concerns by talking to the database from within a generic, shared Controller subclass.
    It does, however, make sense to do so. After all, both this shared Controller
    subclass and the (bootstrap) index.php file are part of the same application codebase.
    They are concerned with the application, and sharing this database connection
    code is far preferable to adding it in each database-aware action.


    ■ **Note** if our application controllers are to utilize this shared Controller
    subclass, they should extend it. Be sure to change the Controller reference (in
    each application controller) from Framework\Controller to Shared\ Controller.


    After creating this subclass, we can comfortably assume that the registry’s Database
    instance is connected by the time we need to do any database work within our actions.


