    \ 不仅仅包含类图。有关 UML 的更多信息，请访问 [`www.uml.org`](http://www.uml.org)。\n\n### 上传器类需求\n\
    \n如前所述，我们需要将表单接收的文件数据从临时目录移动到永久位置。因此，该类需要一个属性来存储文件元数据，以及一个用于保存文件的方法。该方法需要一个文件名，因此我们创建一个\
    \ `$filename` 属性。我们还需要将文件保存到某处，因此创建一个存储位置的属性 `$destination` 和一个保存方法。现在可以开始规划新类的定义。\n\
    \n![](img/323857_3_En_4_Fig9_HTML.jpg)\n\n该图展示了统一建模语言的上传器类图。\n\n**图 4-9** `Uploader`\
    \ 类的 UML 图\n\n有了规划和 UML 类图，编写类定义就变得容易了。让我们创建一个新文件 `classes/Uploader.class.php`，内容如下：\n\
    \n```php\n<?php\nclass Uploader {\n    public $filename;\n    public $fileData;\n\
    \    public $destination;\n\n    public function saveIn( $folder ) {\n       \
    \ $this->destination = $folder;\n    }\n\n    public function save() {\n     \
    \   // 此处尚无代码\n    }\n}\n?>\n```\n\n**清单 4-13** `Uploader.class.php`\n\n上述代码声明了一个类，包含类名和用花括号分隔的类代码块。类内部声明了三个属性和两个方法。当我们已经创建了\
    \ UML 类图时，创建类会容易得多。属性 `destination` 将在调用 `saveIn` 方法时获取其值。属性 `filename` 和 `fileData`\
    \ 当前没有任何值。我们可以从超全局数组 `$_FILES` 中检索 `filename` 和 `fileData` 的值。如果在创建新的 `Uploader`\
    \ 对象时它们能自动获取值，那么它们的值就能反映当时要上传的文件。\n\n### 魔术方法 `__construct()`\n\n正好可以使用 `__construct()`\
    \ 构造方法来完成此任务。它仅在每次使用 `new` 关键字创建新的 `Uploader` 对象时运行一次。请记住，方法名前有两个下划线字符。让我们为 `Uploader`\
    \ 声明一个构造方法，以便在创建新的 `Uploader` 对象时，`filename` 和 `fileData` 属性能从 `$_FILES` 获取值。\n\
    \n```php\n<?php\nclass Uploader {\n    public $filename;\n    public $fileData;\n\
    \    public $destination;\n\n    public function __construct( $key ) {\n     \
    \   $this->filename = $_FILES[$key]['name'];\n        $this->fileData = $_FILES[$key]['tmp_name'];\n\
    \    }\n\n    public function saveIn( $folder ) {\n        $this->destination\
    \ = $folder;\n    }\n\n    public function save() {\n        // 此处尚无代码\n    }\n\
    }\n?>\n```\n\n**清单 4-14** `ImageUploader.class.php`\n\n请记住，我们必须知道用于上传文件的 `<input\
    \ type=\"file\">` 元素的 `name` 属性。正如我们之前发现的，我们需要 `name` 属性来访问 `$_FILES` 中的所有文件数据。在上述代码中，构造方法使用\
    \ `$key` 作为参数。`$key` 值将用于将 `name` 属性值传递给构造方法。这样，构造方法就能访问上传文件的所有元数据。\n\n### 保存上传的文件\n\
    \n`Uploader` 类已接近完成。我们需要完成保存新文件的方法，并验证要上传的文件是否有效。请记住，始终要为意外情况做好准备。在执行文件上传时，我们可能会遇到一个常见问题：目标文件夹可能不可写。我们可以在代码中为此做好准备。\n\
    \n```php\n<?php\nclass ImagesUploader {\n    public $filename;\n    public $fileData;\n\
    \    public $destination;\n    public $keyValue;\n\n    public function __construct(\
    \ $key ) {\n        $this->keyValue = $key;\n        $this->filename = $_FILES[$key]['name'];\n\
    \        $this->fileData = $_FILES[$key]['tmp_name'];\n    }\n\n    public function\
    \ saveIn( $folder ) {\n        $this->destination = $folder;\n    }\n\n    public\
    \ function save() {\n        $variableName = $this->keyValue;\n        $tmp =\
    \ $_FILES[$this->keyValue]['tmp_name'];\n        $folderIsWriteAble = is_writable(\
    \ $this->destination );\n        $notValid = checkImageFile($tmp, $variableName);\n\
    \        if( !$notValid and $folderIsWriteAble) {\n            $name = \"$this->destination/$this->filename\"\
    ;\n            $success = move_uploaded_file( $this->fileData, $name );\n    \
    \    } else {\n            $success = false;\n        }\n        return $success;\n\
    \    }\n}\n?>\n```\n\n**清单 4-15** `ImagesUploader.class.php`\n\n让我们看一下这些更改：\n\n\
    ```php\nrequire_once \"views/checkImageFile.php\";\n```\n\n先前用于检查图像有效性的函数已稍作修改，删除了函数调用，现在该调用将在\
    \ `ImagesUploader` 类的 `save` 方法中执行。包含验证方法的新文件名是 `checkImageFile.php`。\n\n```php\n\
    $variableName = $this->keyValue;\n$tmp = $_FILES[$this->keyValue]['tmp_name'];\n\
    $folderIsWriteAble = is_writable( $this->destination );\n$notValid = checkImageFile($tmp,\
    \ $variableName);\nif( !$notValid and $folderIsWriteAble) {\n    $name = \"$this->destination/$this->filename\"\
    ;\n    $success = move_uploaded_file( $this->fileData, $name );\n```\n\n变量 `$variableName`\
    \ 和 `$tmp` 在 `save` 方法中设置，其值与原始检查文件方法中设置的值相同。同时，使用 PHP 的 `is_writable` 函数来确定文件将要移动到的目录是否可写。如果文件通过验证且目录可写，则\
    \ `if` 语句产生 `true` 结果，文件被移动到永久位置。\n\n```php\n} else {\n    $success = false;\n\
    }\nreturn $success;\n```\n\n如果出现问题，则执行 `if` 语句的 `else` 部分。我们将 `$success` 设置为 `false`，表示出现问题，并将\
    \ `$success` 的值（`true` 或 `false`）返回给调用程序。\n\n### 使用上传器类\n\n现在我们可以有效使用 `Uploader`\
    \ 类来上传文件了。代码量不大，因为大部分代码都写在 `Uploader` 类内部。\n\n```php\n<?php\nfunction upload()\
    \ {\n    $uploader = new ImagesUploader( \"image-data\" );\n    $uploader->saveIn(\"\
    imgs\");\n    $fileUploaded = $uploader->save();\n    if ( $fileUploaded ) {\n\
    \        $out = \"新文件已上传到图片库\";\n    } else {\n        $out = \"出现错误\";\n    }\n\
    \    return $out;\n}\n$info = upload();\n?>\n```\n\n**清单 4-16** `imagesUpload.php`\n\
    \n> **注意：** 以下文件已进行了微小调整以访问当前版本：`ImagesUploader.class.php`、`imageslistnavigation.php`、`imageslistindex.php`、`imagesUploadForm.php`。请花些时间查看发布商提供的这些文件的更改。"
- fmt: "# The upload function pulls in the uploader class. It then creates an instance\
    \ of the uploader (object `$uploader`) and passes the property name which holds\
    \ the image information. This name was set in the HTML upload form. The permanent\
    \ file location (`imgs`) is also passed into `saveIn` which stores it in the object.\
    \ Then the `save` function is called from `$uploader`, which validates the image\
    \ and checks to make sure the folder (`imgs`) is writable. If the file does get\
    \ moved, `$out` is set to “New file uploaded to Images Gallery.” If it does not\
    \ get moved due to invalidation or the folder not being writable, the message\
    \ “Something went wrong file not uploaded to Images Gallery” is passed into `$out`.\
    \ `$out` is returned and set to `$info`, which will cause it to be displayed on\
    \ the page.\n\nTest the program using `imageslistindex.php`. The program should\
    \ allow the upload of any JPEG files that don’t exceed the size requirements.\n\
    \n**Exercise**: What can be added to these final programs to make them more secure?\
    \ Scan each of the programs and use the knowledge you have gained so far to provide\
    \ more secure programs. How can we limit the total size of all files to be uploaded\
    \ into the final destination? Add code to provide this limitation. This will also\
    \ help reduce the chance of successful DOS attacks. Also, go to [`www.php.net`](http://www.php.net)\
    \ and discover how to create constants. Constants cannot be changed once they\
    \ are initially created. Edit the programs and change any variables that do not\
    \ change after being given an initial value to constants. Constants do add another\
    \ tool in creating secure programs.\n\nHow cool is that? We have a completely\
    \ dynamic image gallery, and users can upload their own images through the website.\
    \ It is not quite `flickr.com` yet, but we hope you will agree that you are really\
    \ starting to use PHP to create something fun and useful.\n\n## The Single Responsibility\
    \ Principle\n\nWe hope you marvel at the beauty of the `Uploader` class definition.\
    \ It is planned and written with a single focus: It wants to upload files. It\
    \ has properties and methods used to accomplish only one task. The properties\
    \ are all about the file to be uploaded, and the methods are about uploading a\
    \ valid file.\n\nThe *single responsibility principle* is a common principle used\
    \ in object-oriented programming. The single responsibility principle states that\
    \ a class should be written for a single purpose. All properties and methods of\
    \ the class should relate directly to that single purpose. The class should only\
    \ have a single reason to change.\n\nFor example: The `Uploader` has only one\
    \ reason to change. It will change if you want to use it for uploading a different\
    \ file. The single responsibility principle is a beautiful ideal to strive for\
    \ in code. It is really Curly’s law again, only this time, applied to object-oriented\
    \ programming.\n\n> **Note**\n> \n> You can read more about the single responsibility\
    \ principle at [`http://en.wikipedia.org/wiki/Single_responsibility_principle`](http://en.wikipedia.org/wiki/Single_responsibility_principle).\n\
    \n## Summary\n\nIn this chapter, we have seen how we can make a dynamic image\
    \ gallery, using objects and object methods. We also declared a custom class definition\
    \ with properties and methods. We learned about the several types of loops and\
    \ discovered that the `foreach` loop is designed to access information within\
    \ an array, especially arrays in which we might not know the actual size.\n\n\
    We now have written two class definitions: the `Uploader` and the `Page_Data`.\
    \ We are just starting to learn about classes and objects. We will get to work\
    \ with many more classes and objects throughout the rest of this book. There are\
    \ plenty of examples and explanations waiting for you in the pages to come, so\
    \ hang in there. Learning takes time, and we are just getting started.\n\n## Projects\n\
    \n1.  Explore examples on the Web about uploading multiple files using HTML and\
    \ PHP. Adjust the examples in this chapter to upload multiple files at the same\
    \ time. Discover and use the HTML setting which limits the size of upload to the\
    \ same size contained in the `php.ini` file. However, be aware that a hacker can\
    \ change the HTML and avoid this limitation. To plan for this possibility, add\
    \ code to the PHP uploader class to limit the multi-file upload to the value in\
    \ `php.ini`. Also, add code to the HTML form to limit the number of files uploaded\
    \ at the same time to the value set in the `php.ini` file. Add PHP code in the\
    \ uploader class to also limit the number of files to be uploaded.\n\n2.  Add\
    \ PHP code that will determine the number of files in the `imgs` folder before\
    \ the images are displayed. Only display the number of images to the value set\
    \ in the `php.ini` file.\n\n3.  Explore examples on the Web to restrict access\
    \ to the HTML upload form to specific users by requiring a userid and password\
    \ be entered before the file(s) is uploaded. Again, expect that a hacker might\
    \ try to bypass this restriction. Use PHP code to check the userid and password\
    \ before calling the uploader program. If you want a challenge, how can we hash\
    \ the password and verify it when hashed? Check [`www.php.net`](http://www.php.net)\
    \ for the most current techniques to secure passwords.\n\n4.  Change the program\
    \ examples to upload documents (such as PDFs) instead of images. Instead of displaying\
    \ the images, display HTML links to the documents.\n\n5.  Reviewing PHP 8 Basic\
    \ Syntax\n\n## Objectives\n\nAfter completing this chapter, you will be able to\n\
    \n*   Understand the use and value of conditional statements\n*   Understand the\
    \ use and value of `for`, `while`, and `foreach` loops\n*   Understand the use\
    \ and value of functions\n*   Understand the use and value of arrays\n\nNow that\
    \ we have successfully created our first usable project, let us take a minute\
    \ to review the basic PHP syntax. We will review some topics already covered and\
    \ explore additional new topics in this chapter. After gathering the knowledge\
    \ from this chapter and the previous chapters, we will be ready to explore the\
    \ use of databases and other external files and tackle a much larger project:\
    \ a blogging system. Take the time to enter in the code from the examples in this\
    \ chapter and alter it to challenge yourself to become a better programmer. The\
    \ more you work with code, the more you will get comfortable with quick efficient\
    \ code development.\n\n### From the Beginning\n\nAs stated earlier, all PHP code\
    \ must be placed between the `<?php` and `?>` tags. The web server first looks\
    \ at the file ending (`.php`) for an indication of the existence of PHP code.\
    \ Once it determines its existence, it uses the tags to indicate the location\
    \ of the code.\n\n```\nI love Green Tomatoes\nMy partner hates Green Tomatoes\n\
    ```\n\nAs shown in the preceding, PHP code can be scattered into different areas\
    \ of the file (web page) by simply using the opening and closing tags. However,\
    \ each time this occurs, it requires sending the code to the PHP interpreter for\
    \ processing. So, do not get too carried away with the thrill of doing so. You\
    \ want code that is easy to read and understand. You reduce the chances of creating\
    \ logical errors when the flow of the code is easy to follow.\n\n### Comments\n\
    \nComments can be created using `//` or `/*`. Remember, comments are not executed.\
    \ However, they are very important. Good programmers provide comments so others\
    \ can understand any complicated code. Gone are the days in which only one person\
    \ maintains a program. Anyone that supports the code you created will really appreciate\
    \ the effort you put forth in providing comments."
