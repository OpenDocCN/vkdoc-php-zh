  \n## 总结\n\n在本章中，您通过集成信用卡授权功能完成了电子商务应用程序。除了上架您自己的产品、与供应商建立联系、获取商户银行账户以及将其发布到网络上之外，您已经准备就绪了。好吧，这仍然是相当多的工作，但其中没有一项是特别困难的。最困难的工作现在已经完成了。\n\
  \n具体来说，在本章中，我们研究了网络上信用卡交易背后的理论，并查看了一个完整的实现——DataCash。我们创建了一个可用于访问 DataCash 的库，并将其集成到我们的应用程序中。我们还研究了\
  \ Authorize.net。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH15.qxd\
