  trans: '

    # 本章内容


    在本章中，你还将学习处理电子商务网站的另一个常见功能：税费和运费。实现这一功能有许多可选方案，但我们将只探讨一种简单的方法，为你后续的自主开发打下基础。


    本章分为以下三个部分：


    - 允许客户通过账户下单。

    - 修改订单管理部分以集成新功能。

    - 添加税费和运费。


    在下一章中，你将开始实现一个更复杂的订单系统，而本章编写的代码将为这一系统提供支持。因此，你将进行一些在当前阶段看似不必要的修改，但这些修改将使你后续的工作更加轻松。


    ## 向客户账户添加订单


    为了实现客户下单功能，你需要进行多项修改。你需要修改数据库和业务层以便处理客户订单，并在表示层提供新代码以开放该功能。


    首先，我们将修改数据库，使其能够存储客户订单信息。你需要先修改 `orders` 表，然后修改 `shopping_cart_create_order` 函数。


    当前 `orders` 表包含的信息不足以支持客户订单功能的实现。此外，你还需要在后续章节中进行一些修改，因此需要在 `orders` 表中添加新列。


    **注意** 新的 `orders` 表与表中此前存储的数据不完全兼容，你需要删除所有现有数据。在进行这些更改之前，请务必备份数据库并保存当前数据。


    具体而言，你将要对 `orders` 表进行以下更改：


    - 清空所有现有数据。

    - 删除 `customer_name`、`shipping_address` 和 `customer_email` 字段。

    - 添加 `customer_id`、`auth_code` 和 `reference` 字段。其中 `customer_id` 字段引用 `customer`
    表，用于指定下单的客户。另外两个字段与处理信用卡数据有关，将在第 14 章中讨论。


    你还将修改 `shopping_cart_create_order` 函数，以反映 `orders` 表的更改。


    请按照以下练习中的步骤修改你的 `orders` 表和 `shopping_cart_create_order` 函数。


    ### 练习：向客户账户添加订单


    1. 加载 pgAdmin III，并连接到 `hatshop` 数据库。


    2. 点击“工具” ➤ “查询工具”（或点击工具栏上的 SQL 按钮）。将出现一个新的查询窗口。


    3. 请务必备份数据。然后使用查询工具执行以下代码，该代码将从 `hatshop` 数据库中删除 `order_details` 和 `orders` 表中存储的数据。


    ```sql

    -- 从 order_detail 表中删除所有记录

    DELETE FROM order_detail;


    -- 从 orders 表中删除所有记录

    DELETE FROM orders;

    ```


    4. 从 `orders` 表中删除不再需要的 `customer_name`、`shipping_address` 和 `customer_email`
    字段。这些数据现存储于 `customer` 表中。


    ```sql

    -- 从 orders 表中删除 customer_name 字段

    ALTER TABLE orders DROP COLUMN customer_name;


    -- 从 orders 表中删除 shipping_address 字段

    ALTER TABLE orders DROP COLUMN shipping_address;


    -- 从 orders 表中删除 customer_email 字段

    ALTER TABLE orders DROP COLUMN customer_email;

    ```


    5. 添加新字段（`customer_id`、`auth_code` 和 `reference`），并添加一个约束条件，用于检查 `customer_id`
    字段中的值是否引用了现有的客户。


    ```sql

    -- 向 orders 表添加名为 customer_id 的新字段

    ALTER TABLE orders ADD COLUMN customer_id INTEGER;


    -- 向 orders 表添加名为 auth_code 的新字段

    ```'
- fmt: "```sql\nALTER TABLE orders ADD COLUMN auth_code VARCHAR(50);\n```\n\n```sql\n\
    -- Adding a new field named reference to orders table\nALTER TABLE orders ADD\
    \ COLUMN reference VARCHAR(50);\n```\n\n```sql\n-- Adding a new foreign key constraint\
    \ to orders table\nALTER TABLE orders\nADD CONSTRAINT fk_customer_id FOREIGN KEY\
    \ (customer_id) REFERENCES customer (customer_id)\nON UPDATE RESTRICT ON DELETE\
    \ RESTRICT;\n```\n\n**6.** Delete the old `shopping_cart_create_order` function\
    \ and create a new one by executing the following code:\n\n```sql\n-- Drop shopping_cart_create_order\
    \ function\nDROP FUNCTION shopping_cart_create_order(CHAR(32));\n\n-- Create shopping_cart_create_order\
    \ function\nCREATE FUNCTION shopping_cart_create_order(CHAR(32), INTEGER) RETURNS\
    \ INTEGER LANGUAGE plpgsql AS $$\nDECLARE\n  inCartId ALIAS FOR $1;\n  inCustomerId\
    \ ALIAS FOR $2;\n  outOrderId INTEGER;\n  cartItem cart_product;\n  orderTotalAmount\
    \ NUMERIC(10, 2);\nBEGIN\n  -- Insert a new record into orders\n  INSERT INTO\
    \ orders (created_on, customer_id)\n  VALUES (NOW(), inCustomerId);\n\n  -- Obtain\
    \ the new Order ID\n  SELECT INTO outOrderId\n  currval('orders_order_id_seq');\n\
    \n  orderTotalAmount := 0;\n\n  -- Insert order details in order_detail table\n\
    \  FOR cartItem IN\n    SELECT p.product_id, p.name,\n           COALESCE(NULLIF(p.discounted_price,\
    \ 0), p.price) AS price, sc.quantity,\n           COALESCE(NULLIF(p.discounted_price,\
    \ 0), p.price) * sc.quantity AS subtotal\n    FROM shopping_cart sc\n    INNER\
    \ JOIN product p\n    ON sc.product_id = p.product_id\n    WHERE sc.cart_id =\
    \ inCartId AND sc.buy_now\n  LOOP\n    INSERT INTO order_detail (order_id, product_id,\
    \ product_name, quantity, unit_cost)\n    VALUES (outOrderId, cartItem.product_id,\
    \ cartItem.name, cartItem.quantity, cartItem.price);\n    orderTotalAmount :=\
    \ orderTotalAmount + cartItem.subtotal;\n  END LOOP;\n\n  -- Save the order's\
    \ total amount\n  UPDATE orders\n  SET total_amount = orderTotalAmount\n  WHERE\
    \ order_id = outOrderId;\n\n  -- Clear the shopping cart\n  PERFORM shopping_cart_empty(inCartId);\n\
    \n  -- Return the Order ID\n  RETURN outOrderId;\nEND;\n$$;\n```\n\n**7.** Modify\
    \ the `CreateOrder` method from the `ShoppingCart` class in `business/shopping_cart.php`\
    \ as follows:\n\n```php\n// Create a new order\npublic static function CreateOrder($customerId)\n\
    {\n  // Build the SQL query\n  $sql = 'SELECT shopping_cart_create_order(:cart_id,\
    \ :customer_id);';\n\n  // Build the parameters array\n  $params = array (':cart_id'\
    \ => self::GetCartId(),\n                   ':customer_id' => $customerId);\n\n\
    \  // Prepare the statement with PDO-specific functionality\n  $result = DatabaseHandler::Prepare($sql);\n\
    \n  // Execute the query and return the results\n  return DatabaseHandler::GetOne($result,\
    \ $params);\n}\n```\n\n**8.** Modify the `init()` method in `presentation/smarty_plugins/function.load_checkout_info.php`\
    \ as highlighted:\n\n```php\npublic function init()\n{\n  // If the Place Order\
    \ button was clicked, save the order to database\n  if ($this->_mPlaceOrder ==\
    \ 1)\n  {\n    $order_id = ShoppingCart::CreateOrder(Customer::GetCurrentCustomerId());\n\
    \n    // Redirect to index.php\n    $redirect_link = 'http://' . getenv('SERVER_NAME');\n\
    \  }\n}\n```\n\n**9.** Place an order or two using the new system to check that\
    \ the code works. You’ll need to log on to do this and supply enough details to\
    \ get past the validation on the checkout page.\n\n> **Note:** At this stage,\
    \ the orders administration page isn’t functional anymore. We’ll need to update\
    \ it as well.\n\n**How It Works: Adding Customer Orders to HatShop**\n\nThe code\
    \ added in this exercise is very simple and hardly merits much discussion. The\
    \ orders handling functions in the data and business tiers now take as parameter\
    \ a customer ID, which is assigned to the order.\n\nAfter you’ve implemented more\
    \ of the new ordering code, you’ll be able to provide more information to customers,\
    \ such as sending them confirmation emails. For now, however, this is as far as\
    \ we can take things.\n\n**Administering Customer Orders**"
