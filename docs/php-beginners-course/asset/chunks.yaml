    为了给出具体的建议，我个人建议你先在像 `jEdit` 这样的文本编辑器中编写第一个脚本，在完成少量几个小型 PHP 项目之后，再将更高级的脚本编写到集成开发环境的界面中。


    ## 第一个 PHP 程序（欢迎全世界）


    我们现在来编写第一个小型 PHP 脚本。

