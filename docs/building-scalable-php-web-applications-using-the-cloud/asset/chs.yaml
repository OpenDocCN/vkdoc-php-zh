  \ Events”下，它列出了系统最近执行的所有操作。请注意，EB 中的*一切*操作最终花费的时间都可能比你想象的要长得多，但“Recent Events”能帮助你密切关注进度，并让你在等待时有所参照。在左侧，我们将关注三个区域：“Dashboard”（我们当前所在位置）、“Configuration”（应用程序的设置方式）和“Logs”。\n\
  \n![../images/487291_1_En_10_Chapter/487291_1_En_10_Fig8_HTML.jpg](img/487291_1_En_10_Fig8_HTML.jpg)\n\
