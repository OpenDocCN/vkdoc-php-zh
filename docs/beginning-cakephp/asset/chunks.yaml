    3


    $this->Auth->allow(''index'',''view'');


    $this->Auth->redirectLogin = array(''controller''=>''posts'',''action''=>''add'');
    5


    }


    Notice in Listing 11-3 that each class variable is set like any typical PHP variable.
    On line 3, I used the allow function to tell the Auth component which actions
    don’t require authentication to be accessed. You do not need to specify the login
    and logout actions; otherwise, this will trip up the Auth component; it automatically
    assumes these functions are accessible to everyone.


    Now that the Auth component has been called in the controller and the beforeFilter()
    action sets some parameters for Auth to use; Auth will check each action against
    what you’ve specified. If a request is made for an action that is not allowed,
    Auth will require the user to log in for access, which is specified in line 2
    of Listing 11-3\. In this case, the user will be redirected to the Login action
    in the Users controller (which hasn’t been created yet). Auth will not be run
    if the user requests the Index and View actions in the Posts controller.


    The next step is to create the Login action in the Users controller. Because the
    Auth component does almost all the work, you will need only to create the view
    with the username and password fields.


    **HASHED PASSWORDS**


    Because the Auth component requires that stored passwords be hashed, setting up
    user passwords can be tricky. Using Auth’s password() function, you can pass a
    string, and Auth will return the hash. This same hashing process will be applied
    to whatever the user submits as a password and will be compared to the database,
    so you will need to store the hashed version of the user passwords and not a plain-text
    version.


    I’ve included a password generator with the following line:


    $this->set(''password'',$this->Auth->password($this->data[''User''][''password'']));
    Of course, in the view, I’ll need to provide a form with an input field named
    password for this to work, as well as a view to display what Auth->password()
    returns. If a form view elsewhere in the site creates new user accounts, it must
    use the Auth->password() function when saving the password.


    Logging In


    As long as the view that renders the login form is named appropriately (in other
    words, its names correspond to the parameters set in the beforeFilter() function),
    the Auth component will automatically check the $this->data array for the username
    and password and check it using the userModel and fields settings. Listing 11-4
    shows the view file for the Users Login action.


    09775ch11final 7/1/08 9:51 PM Page 191


    C H A P T E R 1 1 ■ C O M P O N E N T S A N D U T I L I T I E S


    **191**


    **Listing 11-4.** *The app/views/users/login.ctp File*


    <h1>Log In</h1>


    <? if ($session->check(''Message.auth'')) $session->flash(''auth'');?> 3


    <?=$form->create(''User'',array(''action''=>''login''));?>


    <?=$form->input(''username'');?>


    <?=$form->input(''password'',array(''type''=>''password''));?> 6


    <?=$form->end(''Login'');?>


    Simple enough—the Login view contains a form to render input fields for the username
    and password and submits it to the Login action. If there are any errors, like
    an incorrect match, they will be displayed in line 2 with the flash function.


    To complete the login process, you need only to prepare the Users controller.
    Listing 11-5


    shows the contents of the Users controller with the login function.


    **Listing 11-5.** *The Auth Component in the Users Controller*


    <?


    class UsersController extends AppController {


    var $name = ''Users'';


    var $components = array(''Auth'');


    function beforeFilter() {


    $this->Auth->allow(''*'');


    }


    10 function login() {


    }


    You can see that the Login action is empty. This is because the Auth component
    takes care of everything for you; you only need to specify the action so that
    Cake appropriately renders the Login view. Line 7 shows the use of the asterisk
    in the Auth->allow() function. This tells the Auth component to allow all actions
    in the current controller.'
  trans: "\n# 使用内置组件\n\n与辅助函数类似，Cake 拥有丰富的组件函数，可以更轻松地在控制器中运行处理流程。事实上，有些组件旨在与辅助函数协同工作，例如\
    \ `Session` 组件。在控制器中运行某些函数，可以更轻松地组织和格式化转发给视图的数据，以供 `Session` 辅助函数使用。\n\n了解内置组件能为你的控制器做些什么，将避免你“重复造轮子”，并帮助你利用一些出色的功能，这些功能正是\
    \ Cake 成为如此有吸引力的框架的原因。\n\n在接下来的每个组件描述中，我会对该组件的功能进行基本概述，并列出它的一些函数。未来，这些组件可能会增加更多函数，有时第三方组件也会对其进行扩展。Cake\
    \ 的核心组件存储在 `cake/libs/controller/components` 文件夹中；如果你想查看代码本身，请参考该文件夹中的组件文件。\n\n\
    ## 身份验证\n\n`Auth` 组件有助于管理应用程序的用户身份验证。很多时候，你可能希望站点的某些区域对普通用户进行保护。`Auth` 组件使登录查看站点某个区域等常见过程变得更加简单。与其他组件一样，它需要被包含在\
    \ `$components` 数组中，才能在控制器中使用：\n\n```\nvar $components = array('Auth');\n```\n\
    \n使用 `Auth` 组件，你可以对应用程序的不同区域（例如模型、控制器或其他对象）要求身份验证。`Auth` 还提供了自动化登录过程以及自动将用户重定向到站点可访问区域的方法。\n\
    \n`Auth` 组件需要包含存储用户信息的数据库表才能正常工作。\n\n### 设置用户表\n\n默认情况下，`Auth` 会查找名为 `users` 的表，其中包含名为\
    \ `username` 和 `password` 的字段。当然，你可以通过在运行时之前向组件输入自定义参数来更改这些默认参数。无论如何，数据库中需要存在一个表来存储所有用户及其密码。`users`\
    \ 表不必只存储 `username` 和 `password` 字段；它还可以包含角色、权限、电子邮件等。你需要告诉 `Auth` 如何使用这些类型的元数据。\n\
    \n`users` 表已经内置于你的博客应用程序中。因为 `Auth` 组件会对所有密码进行哈希处理，所以你需要确保 `password` 字段有足够的空间来存储哈希值。还记得核心配置中的\
    \ `Security.salt` 值吗？`Auth` 组件会使用这个 salt 值来生成哈希值，因此在这个偏好设置中使用更复杂的字符串将提高密码的安全性。\n\
    \n准备好存储用户名和密码的 `users` 表后，你就可以在博客应用程序中实现 `Auth` 组件了。首先，让我们在 `Posts` 控制器中初始化一些参数。\n\
    \n### 初始化变量\n\n需要设置几个参数才能使 `Auth` 正常工作。你可以在需要授权才能允许用户访问的控制器中，通过在其 `beforeFilter()`\
    \ 控制器方法中设置变量来指定这些参数。在这种情况下，你将需要阻止博客中某些编辑和删除操作，除非是已登录用户。在 `Posts` 控制器中，你需要告诉 `Auth`\
    \ 组件哪些操作是允许的，以及在成功登录后将用户重定向到哪里。清单 11-3 包含了 `Posts` 控制器的 `beforeFilter()` 方法。\n\
    \n**清单 11-3.** *`beforeFilter()` 方法中的一些 Auth 参数*\n\n```\nfunction beforeFilter()\
    \ {\n    $this->Auth->loginAction = array('controller'=>'users','action'=>'login');\n\
    \    $this->Auth->allow('index','view');\n    $this->Auth->redirectLogin = array('controller'=>'posts','action'=>'add');\n\
    }\n```\n\n注意在清单 11-3 中，每个类变量都像典型的 PHP 变量一样被设置。在第 3 行，我使用了 `allow` 函数来告诉 `Auth`\
    \ 组件哪些操作不需要身份验证即可访问。你不需要指定 `login` 和 `logout` 操作；否则会干扰 `Auth` 组件；它会自动假定这些功能对所有人都是可访问的。\n\
    \n现在，`Auth` 组件已在控制器中被调用，并且 `beforeFilter()` 方法为 `Auth` 设置了一些参数；`Auth` 将根据你指定的内容检查每个操作。如果请求的操作不被允许，`Auth`\
    \ 将要求用户登录才能访问，这在清单 11-3 的第 2 行中指定。在这种情况下，用户将被重定向到 `Users` 控制器中的 `Login` 操作（该操作尚未创建）。如果用户请求\
    \ `Posts` 控制器中的 `Index` 和 `View` 操作，则不会运行 `Auth`。\n\n下一步是在 `Users` 控制器中创建 `Login`\
    \ 操作。由于 `Auth` 组件几乎完成了所有工作，你只需要创建包含用户名和密码字段的视图即可。\n\n## 哈希密码\n\n因为 `Auth` 组件要求存储的密码必须是哈希过的，所以设置用户密码可能有些棘手。使用\
    \ `Auth` 的 `password()` 函数，你可以传入一个字符串，`Auth` 将返回哈希值。同样的哈希过程将应用于用户作为密码提交的任何内容，并与数据库中的内容进行比较，因此你需要存储用户密码的哈希版本，而不是明文版本。\n\
    \n我使用以下行包含了一个密码生成器：\n\n```\n$this->set('password',$this->Auth->password($this->data['User']['password']));\n\
    ```\n\n当然，在视图中，我需要提供一个包含名为 `password` 的输入字段的表单才能使其工作，以及一个用于显示 `Auth->password()`\
    \ 返回值的视图。如果站点其他地方的某个表单视图创建了新用户帐户，则在保存密码时必须使用 `Auth->password()` 函数。\n\n### 登录\n\
    \n只要用于渲染登录表单的视图命名得当（即其名称与 `beforeFilter()` 函数中设置的参数相对应），`Auth` 组件就会自动检查 `$this->data`\
    \ 数组中的用户名和密码，并使用 `userModel` 和 `fields` 设置来验证它。清单 11-4 显示了 `Users Login` 操作的视图文件。\n\
    \n**清单 11-4.** *`app/views/users/login.ctp` 文件*\n\n```\n<h1>Log In</h1>\n<? if\
    \ ($session->check('Message.auth')) $session->flash('auth');?>\n<?=$form->create('User',array('action'=>'login'));?>\n\
    <?=$form->input('username');?>\n<?=$form->input('password',array('type'=>'password'));?>\n\
    <?=$form->end('Login');?>\n```\n\n足够简单——`Login` 视图包含一个表单，用于渲染 `username` 和 `password`\
    \ 的输入字段，并将其提交到 `Login` 操作。如果有任何错误（例如不匹配），它们将在第 2 行使用 `flash` 函数显示。\n\n要完成登录过程，你只需要准备好\
    \ `Users` 控制器。清单 11-5 显示了包含 `login` 函数的 `Users` 控制器的内容。\n\n**清单 11-5.** *`Users`\
    \ 控制器中的 `Auth` 组件*\n\n```\n<?\nclass UsersController extends AppController {\n\
    \    var $name = 'Users';\n    var $components = array('Auth');\n\n    function\
    \ beforeFilter() {\n        $this->Auth->allow('*');\n    }\n\n    function login()\
    \ {\n    }\n}\n?>\n```\n\n你可以看到 `Login` 方法是空的。这是因为 `Auth` 组件为你处理了一切；你只需要指定该操作，以便\
    \ Cake 正确地渲染 `Login` 视图。第 7 行显示了在 `Auth->allow()` 函数中使用星号。这告诉 `Auth` 组件允许当前控制器中的所有操作。\n"
- fmt: "# With the Users Controller Working Correctly\n\nWith the `Users` controller\
    \ working correctly with the `Auth` component and the `Login` action and view\
    \ provided, `Auth` can now manage authentication for the `Posts` controller. Try\
    \ editing a post, and you’ll notice that the `Auth` component requires you to\
    \ log in.\n\n# Logging Out\n\nLogging a user out is even easier than logging one\
    \ in. Simply add the `Auth->logout()` function to the `Users` controller, as shown\
    \ in Listing 11-6.\n\n**Listing 11-6.** *The Logout Action in the Users Controller*\n\
    \n```\nfunction logout() {\n    $this->redirect($this->Auth->logout());\n}\n```\n\
    \nNow, whenever the user requests `http://localhost/blog/users/logout`, they will\
    \ be logged out by the `Auth` component, and the session will be deleted. The\
    \ user will need to log back in to access blocked actions.\n\n# Checking a User’s\
    \ Role\n\nThe `Auth` component can check for a user’s role to see whether the\
    \ user is an administrator. To do so, you will need to add one more field to the\
    \ `users` table: `role`. See Listing 11-7.\n\n**Listing 11-7.** *The SQL Query\
    \ for Adding the `role` Field in the `users` Table*\n\n```\nALTER TABLE users\
    \ ADD `role` varchar(50) DEFAULT 'user'\n```\n\nBecause the `Auth` component does\
    \ not check user roles by default, you will need to run your own login process\
    \ instead. First, in the `Posts` controller, you must tell the `Auth` component\
    \ not to perform its default logic:\n\n```\n$this->Auth->authorize = 'controller';\n\
    ```\n\nThis line essentially tells `Auth` to look in the active controller for\
    \ an action named `isAuthorized()`. In this function, you’ll run your own authorization\
    \ logic; if it returns `true`, then the user is authorized, and so forth. Now\
    \ let’s create the `isAuthorized()` function to check the user’s role. See Listing\
    \ 11-8.\n\n**Listing 11-8.** *The `isAuthorized()` Function in the `Posts` Controller*\n\
    \n```\nfunction isAuthorized() {\n    if ($this->Auth->user('role') == 'admin')\
    \ {\n        return true;\n    } else {\n        return false;\n    }\n}\n```\n\
    \nLine 2 performs the test. Using the `Auth->user()` function and passing the\
    \ value `role`, you’re telling `Auth` to look for a field named `role` and see\
    \ whether it contains `admin`. If the user is not given the `admin` role in the\
    \ `users` table, then he will not be authorized to view anything other than the\
    \ `Index` and `View` actions.\n\nThis same check can be accomplished in the model\
    \ rather than the controller. Rather than set `Auth->authorize` to `controller`,\
    \ set it to `model` instead. Then run the `isAuthorized()` function in the model\
    \ rather than the controller. The function will need to include the `$user`, `$controller`,\
    \ and `$action` parameters to work in the model (see Listing 11-9).\n\n**Listing\
    \ 11-9.** *The `isAuthorized()` Function in the `Post` Model*\n\n```\nfunction\
    \ isAuthorized($user, $controller, $action) {\n    if ($user['User']['role'] ==\
    \ 'admin') {\n        return true;\n    } else {\n        return false;\n    }\n\
    }\n```\n\nThe `$user` array will contain the `Auth` component’s retrieval of the\
    \ user record where the username and password match, so line 2 uses this array\
    \ rather than the `Auth->user()` function. Both methods for checking a user’s\
    \ role will work; following the convention of having larger models than controllers\
    \ will mean that most of the time you’ll check user roles in the model.\n\n# Using\
    \ Other Auth Parameters and Functions\n\nThe following is a list of other parameters\
    \ that can be used with the `Auth` component. They are used to customize the way\
    \ in which `Auth` manages user logins, sessions, and authentication.\n\n- **`deny(\
    \ actions )`**  \n  `actions`: The actions, separated by commas, which should\
    \ be denied access without authentication\n\n- **`hashPasswords( data[array] )`**\
    \  \n  `data`: Takes values assigned to keys named `password` in an array and\
    \ returns their hashed equivalents\n\n- **`$userModel = 'User';`**  \n  Used to\
    \ customize the table name where users are stored. By default this is set to `User`.\
    \  \n  Be sure to use the model name, not the table name (for example, the `bloggers`\
    \ table would need to be set to `Blogger` here).\n\n- **`$fields = array('username'=>'username','password'=>'password');`**\
    \  \n  This array can be changed to reflect customized field names for the username\
    \ and password.\n\n- **`$loginAction = array('admin'=>false,'controller'=>'users','action'=>'login');`**\
    \  \n  Setting the keys in this array to other controllers or actions tells `Auth`\
    \ where to run the `Login` action. Admin routing (see Chapter 10) and subsequent\
    \ actions can be used by setting `admin` to `true`.\n\n- **`$loginRedirect = array('controller'=>'users','action'=>'index');`**\
    \  \n  This parameter tells `Auth` where to redirect the user after a successful\
    \ login.\n\n- **`$loginError = 'Login failed. Invalid username or password.';`**\
    \  \n  The error message displayed in the event of a login error can be customized\
    \ here.\n\n- **`$autoRedirect = true;`**  \n  If you set this parameter to `false`,\
    \ the `Auth` component will not automatically redirect the user after authenticating.\
    \ Other checks can be run in the `Login` action after a successful authentication\
    \ occurs, such as writing information to or checking the contents of a cookie\
    \ or checking other session variables.\n\n- **`$ajaxLogin = null;`**  \n  When\
    \ doing Ajax-based logins, set this preference to the view the file that should\
    \ be displayed in the event of an unsuccessful login.\n\n# Session\n\nThe `Session`\
    \ component handles various methods for reading, writing, starting, and destroying\
    \ sessions.\n\nSome settings may be manipulated to change how Cake saves sessions\
    \ in the core configuration. The `Session.save` parameter in the core configuration\
    \ file contains one of three possibilities: `php`, `cake`, and `database`. By\
    \ default, this value is set to `php`, which means that sessions will be saved\
    \ depending on the current PHP settings on the host. Setting this to `cake` will\
    \ tell Cake to write session information in temporary files in the `app/tmp` folder.\
    \ The third option, `database`, requires that a table be present in the database\
    \ that has corresponding fields where Cake can save session information. The necessary\
    \ SQL statements to generate this table are found in the `app/config/sql/session.sql`\
    \ file. Simply run this file through your database, and a default table named\
    \ `cake_sessions` should appear with all the necessary fields to store session\
    \ data. Other session settings that the `Session` component will use follow the\
    \ `Session.save` preference and are fairly self-explanatory.\n\n# Reading and\
    \ Writing Session Variables\n\nReading and writing variables in a session are\
    \ easy with the `Session` component. In the controller, after instantiating the\
    \ `Session` component, of course, you can create a new session by specifying a\
    \ session name with the `create()` function:\n\n```\n$this->Session->create('User');\n\
    ```\n\nNow, anywhere in the application, this session can be read by using the\
    \ `read()` function:\n\n```\n$user = $this->Session->read('User');\n```\n\nThis\
    \ function will produce an array that follows the typical Cake array structure,\
    \ allowing you to pull anything you want to store in the session by calling the\
    \ key:\n\n```\n$password = $user['password'];\n```\n\nWriting to the session is\
    \ just as simple. With the `write()` function, supply the session name and the\
    \ value:\n\n```\n$this->Session->write('User', $locale);\n```\n\n# Deleting and\
    \ Destroying Sessions\n\nThe `delete()` and `destroy()` functions allow you to\
    \ stop storing session information or kill a session entirely. With `delete()`,\
    \ supply the name of the session key you want to remove. This will not completely\
    \ destroy the whole session—only the data associated with the provided key.\n\n\
    The `destroy()` function, on the other hand, removes all sessions for the current\
    \ user; it’s the equivalent of PHP’s `session_destroy()` function.\n\n# Cookie"
