  trans: '

    # 选择加密方法


    第 9 章中的 PHP 解决方案采用**单向加密**方式——密码一旦加密，就无法逆转该过程。这既是优点也是缺点。它为用户提供了更高的安全性，因为以这种方式加密的密码会保持隐秘。然而，丢失的密码无法重新发放，因为即使是网站管理员也无法解密。唯一的解决方法是重置密码。


    另一种方案是使用**双向加密**，它依赖于一对函数：一个用于加密密码，另一个用于将密码还原为明文，从而可以轻松地向健忘的用户重新发放密码。双向加密使用一个密钥，该密钥被传递给这两个函数以执行转换。密钥只是你自己定义的一个字符串。显然，为了确保数据安全，密钥必须足够难以猜测，并且绝不应存储在数据库中。但是，你需要将密钥嵌入到注册和登录脚本中——无论是直接嵌入还是通过包含文件——因此一旦脚本暴露，安全性就会彻底崩溃。


    MySQL 和 MariaDB 提供了多种双向加密函数，但 `AES_ENCRYPT()` 被认为是最安全的。它采用美国标准与技术研究院（NIST）批准的**高级加密标准**，密钥长度为
    128 位（AES-128），可用于保护机密级（SECRET）机密材料（最高机密（TOP SECRET）材料需要 AES-192 或 AES-256）。


    单向加密和双向加密各有优缺点。许多安全专家建议密码应频繁更换。因此，由于密码无法解密而强制用户更改遗忘的密码，可被视为一项良好的安全措施。另一方面，用户每次忘记现有密码时都需要处理新密码，这可能会让他们感到沮丧。我将由你决定哪种方法最适合你的情况，我仅专注于技术实现。


    # 使用单向加密


    为了保持简洁，我将使用与第 9 章相同的基本表单，因此数据库中仅存储用户名和加密后的密码。


    **注意**


    以下 PHP 解决方案使用了 `password_hash()` 和 `password_verify()`，这需要 PHP 5.5 或更高版本。你可以在旧版
    PHP（最低版本 5.3.7）上使用来自 [`https://github.com/ircmaxell/password_compat`](https://github.com/ircmaxell/password_compat)
    的 `password_compat` 库模拟这些函数。


    ## 创建存储用户详细信息的表


    在 phpMyAdmin 中，在 `phpsols` 数据库中创建一个名为 `users` 的新表。该表需要包含表 17-1 中列出的三列设置。


    **表 17-1.** `users` 表的设置


    | 名称 | 类型 | 长度/值 | 属性 | 空值 | 索引 | A_I |

    | --- | --- | --- | --- | --- | --- | --- |

    | `user_id` | `INT` | | `UNSIGNED` | 未选中 | `PRIMARY` | 已选中 |

    | `username` | `VARCHAR` | `15` | | 未选中 | `UNIQUE` | |

    | `pwd` | `VARCHAR` | `255` | | 未选中 | | |


    为了确保无人能注册与现有用户名相同的名称，`username` 列被赋予了 `UNIQUE` 索引。


    用于存储密码的 `pwd` 列允许存储最多 255 个字符的字符串。这远大于 PHP 5.5 和 5.6 中 `password_hash()` 默认加密方法所需的
    60 个字符。但 `PASSWORD_DEFAULT` 常量会随着 PHP 中添加新的、更强的算法而随时间变化。因此，建议的大小为 255 个字符。


    ## 在数据库中注册新用户


    要在数据库中注册用户，你需要创建一个要求输入用户名和密码的注册表单。`username` 列已定义了 `UNIQUE` 索引，因此如果有人尝试注册与现有用户名相同的名称，数据库将返回错误。除了验证用户输入外，处理脚本还需要检测该错误，并建议用户选择不同的用户名。

    '
- fmt: '### PHP Solution 17-1: Creating a User Registration Form


    This PHP solution shows how to adapt the registration script from [Chapter 9](#A978-1-4842-0635-5_9_Chapter.html)
    to work with MySQL or MariaDB. It uses the `CheckPassword` class from PHP Solution
    9-6 and `register_user_csv.php` from PHP Solution 9-7.


    If necessary, copy `CheckPassword.php` from the `ch17/PhpSolutions/Authenticate`
    folder to the `PhpSolutions/Authenticate` folder in the `phpsols` site root, and
    copy `register_user_csv.php` from the `ch17` folder to the `includes` folder.
    You should also read the instructions in PHP Solutions 9-6 and 9-7 to understand
    how the original scripts work.


    ![A978-1-4842-0635-5_17_Figa_HTML.jpg](A978-1-4842-0635-5_17_Figa_HTML.jpg)


    Copy `register_db.php` from the `ch17` folder to a new folder called `authenticate`
    in the `phpsols` site root. The page contains the same basic user registration
    form as in [Chapter 9](#A978-1-4842-0635-5_9_Chapter.html), with a text input
    field for the username, a password field, another password field for confirmation,
    and a button to submit the data, as shown in the following screenshot:


    Add the following code in a PHP block above the `DOCTYPE` declaration:


    ```

    if (isset($_POST[''register''])) {

    $username = trim($_POST[''username'']);

    $password = trim($_POST[''pwd'']);

    $retyped = trim($_POST[''conf_pwd'']);

    require_once ''../includes/register_user_mysqli.php'';

    }

    ```


    This is very similar to the code in PHP Solution 9-7. If the form has been submitted,
    the user input is stripped of leading and trailing whitespace and assigned to
    simple variables. Then an external file called `register_user_mysqli.php` is included.
    If you plan to use PDO, name the include file `register_user_pdo.php` instead.


    The file that processes the user input is based on `register_user_csv.php`, which
    you created in [Chapter 9](#A978-1-4842-0635-5_9_Chapter.html). Make a copy of
    your original file and save it in the `includes` folder as `register_user_mysqli.php`
    or `register_user_pdo.php`.


    In the file you have just copied and renamed, locate the conditional statement
    that begins like this (around line 24):


    ```

    if (!$errors) {

    // encrypt password using default encryption

    $password = password_hash($password, PASSWORD_DEFAULT);

    ```


    Delete the rest of the code inside the conditional statement. The conditional
    statement should now look like this:


    ```

    if (!$errors) {

    // encrypt password using default encryption

    $password = password_hash($password, PASSWORD_DEFAULT);

    }

    ```


    The code that inserts the user’s details in the database goes inside the conditional
    statement. Begin by including the database connection file and creating a connection
    with read and write privileges.


    ```

    if (!$errors) {

    // encrypt password using default encryption

    $password = password_hash($password, PASSWORD_DEFAULT);

    // include the connection file

    require_once ''connection.php'';

    $conn = dbConnect(''write'');

    }

    ```


    The connection file is also in the `includes` folder, so you need only the filename.
    For PDO, add `''pdo''` as the second argument to `dbConnect()`.


    The final section of the code prepares and executes the prepared statement to
    insert the user’s details into the database. Because the `username` column has
    a `UNIQUE` index, the query fails if the username already exists. If that happens,
    the code needs to generate an error message. The code is different for MySQLi
    and PDO.


    For MySQLi, add the code highlighted in bold:


    ```

    if (!$errors) {

    // encrypt password using default encryption

    $password = password_hash($password, PASSWORD_DEFAULT);

    // include the connection file

    require_once ''connection.php'';

    $conn = dbConnect(''write'');

    // prepare SQL statement

    $sql = ''INSERT INTO users (username, pwd) VALUES (?, ?)'';

    $stmt = $conn->stmt_init();

    if ($stmt = $conn->prepare($sql)) {

    // bind parameters and insert the details into the database

    $stmt->bind_param(''ss'', $username, $password);

    $stmt->execute();

    }

    if ($stmt->affected_rows == 1) {

    ```'
