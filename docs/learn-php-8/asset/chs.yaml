  \  }\n}\n}\n?>\n```\n**示例 6-3：包含异常处理的狗类**\n\n比较示例 [5-8] 和示例 [6-3]，你只会注意到代码的几处细微变化。`__toString`方法已被移除，取而代之的是一个`if`语句，该语句检查`error_message`字符串中是否存在`FALSE`。如果存在，则会引发一个`setException`消息，将`error_message`字符串传递给异常处理器。这导致了整个应用程序流程的逻辑改变。`dog_interface`程序（在示例\
  \ [5-12] 中）不再通过调用`__toString`方法来检查用户输入错误，而是由`Dog`类在用户出错时通知`dog_interface`（通过抛出的异常）。以前，界面层必须从`Dog`类中拉取错误。在这个例子中，`Dog`类将错误推送给界面类。正如你将看到的，这将消除`dog_interface`程序中的代码，因为它不再需要询问是否有任何错误。\n\
  \n\n\n### 安全性与性能\n\n#### `__toString` 方法与安全性\n\n安全性与性能——`__toString` 方法会将其返回的任何内容“暴露”给任何创建了该函数所在类实例的程序。使用此方法传递错误消息可能让黑客判断出他们正在向程序发送何种错误信息。在第\
  \ 5 章的 `dog.class` 示例中，`__toString` 返回了包含 `'TRUE'` 或 `'FALSE'` 响应的 `error_message`\
  \ 字符串。这比直接返回错误消息更安全。然而，通过替换 `__toString` 方法并抛出一个特定的异常，你可以提供更好的安全性。黑客现在不仅需要知道 `error_message`\
  \ 的含义，还必须知道异常的名称（`setException`），才能在自己的程序中捕获它。\n\n```php\nasXML();\n$this->result\
  \ = \"\";\n$this->result = $this->result . \"\n选择一种犬种\";\nforeach ($breed_file->children()\
  \ as $name => $value)\n{\n$this->result = $this->result . \"$value\";\n}\n$this->result\
  \ = $this->result . \"\";\nreturn $this->result;\n}\nelse\n{\nthrow new Exception(\"\
