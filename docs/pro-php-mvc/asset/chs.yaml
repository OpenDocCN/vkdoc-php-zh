  \ `register.html` 视图和 `register()` 方法（在 Users 控制器中），以便允许用户在注册时上传照片。清单 24-3 展示了如何实现这一点。\n\
  \n**清单 24-3.** `register.html` 视图\n\n```\n<h1>注册</h1>\n\n<?php if ($success): ?>\n\
  \n您的账户已创建成功！\n\n<?php else: ?>\n\n<form method=\"post\" enctype=\"multipart/form-data\"\
  >\n\n<ol>\n\n<li>\n\n<label>\n\n名：\n\n<input type=\"text\" name=\"first\" />\n\n\
  <?php echo form_error(\"first\"); ?>\n\n</label>\n\n</li>\n\n<li>\n\n<label>\n\n\
  姓：\n\n<input type=\"text\" name=\"last\" />\n\n<?php echo form_error(\"last\");\
  \ ?>\n\n</label>\n\n</li>\n\n<li>\n\n<label>\n\n电子邮件：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 24 章 ■ CodeIgniter：扩展\n\n<input type=\"text\" name=\"email\" />\n\n<?php echo\
  \ form_error(\"email\"); ?>\n\n</label>\n\n</li>\n\n<li>\n\n<label>\n\n密码：\n\n<input\
  \ type=\"password\" name=\"password\" />\n\n<?php echo form_error(\"password\");\
  \ ?>\n\n</label>\n\n</li>\n\n<li>\n\n<label>\n\n照片：\n\n<input type=\"file\" name=\"\
  photo\" />\n\n</label>\n\n</li>\n\n<li>\n\n<input type=\"submit\" name=\"save\"\
  \ value=\"注册\" />\n\n</li>\n\n</ol>\n\n</form>\n\n<?php endif; ?>\n```\n\n此视图包含一个新的文件输入框，它将在\
  \ Users 控制器中使用，如清单 24-4 所示。\n\n**清单 24-4.** Users 控制器\n\n```\nclass Users extends\
  \ CI_Controller\n{\n\nprotected function _upload($name, $user)\n{\n\n// 加载文件上传辅助函数\n\
  \n$this->load->library(\"upload\");\n\n// 获取扩展名\n\n$time = time();\n\n$path = dirname(BASEPATH).\"\
  /uploads/\";\n\n$filename = \"{$user}-{$time}\";\n\n// 执行上传\n\n$this->upload->initialize(array(\n\
  \n\"upload_path\" => $path,\n\n\"file_name\" => $filename,\n\n\"allowed_types\"\
  \ => \"gif|jpg|png\"\n\n));\n\nif ($this->upload->do_upload($name))\n\n{\n\n// 获取上传的文件数据\n\
  \n$data = $this->upload->data();\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 24 章 ■ CodeIgniter：扩展\n\n// 加载文件模型\n\n$this->load->model(\"file\");\n\n$file\
  \ = new File(array(\n\n\"name\" => $data[\"file_name\"],\n\n\"mime\" => $data[\"\
  file_type\"],\n\n\"size\" => $data[\"file_size\"],\n\n\"width\" => $data[\"image_width\"\
  ],\n\n\"height\" => $data[\"image_height\"],\n\n\"user\" => $user\n\n));\n\n$file->save();\n\
  \n}\n\n}\n\npublic function register()\n{\n\n$success = false;\n\n// 加载表单验证库\n\n\
  $this->load->library(\"form_validation\");\n\n// 如果表单已提交\n\nif ($this->input->post(\"\
  save\"))\n\n{\n\n// 初始化验证规则\n\n$this->form_validation->set_rules(array(\n\narray(\n\
  \n\"field\" => \"first\",\n\n\"label\" => \"名\",\n\n\"rules\" => \"required|alpha|min_length[3]|max_length[32]\"\
  \n\n),\n\narray(\n\n\"field\" => \"last\",\n\n\"label\" => \"姓\",\n\n\"rules\" =>\
  \ \"required|alpha|min_length[3]|max_length[32]\"\n\n),\n\narray(\n\n\"field\" =>\
  \ \"email\",\n\n\"label\" => \"电子邮件\",\n\n\"rules\" => \"required|max_length[100]\"\
  \n\n),\n\narray(\n\n\"field\" => \"password\",\n\n\"label\" => \"密码\",\n\n\"rules\"\
  \ => \"required|min_length[8]|max_length[32]\"\n\n)\n\n));\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 24 章 ■ CodeIgniter：扩展\n\n// 如果表单数据通过验证...\n\nif ($this->form_validation->run())\n\
  \n{\n\n// 加载用户模型\n\n$this->load->model(\"user\");\n\n// 创建新用户并保存\n\n$user = new\
  \ User(array(\n\n\"first\" => $this->input->post(\"first\"),\n\n\"last\" => $this->input->post(\"\
  last\"),\n\n\"email\" => $this->input->post(\"email\"),\n\n\"password\" => $this->input->post(\"\
  password\")\n\n));\n\n$user->save();\n\n// 上传文件\n\n$this->_upload(\"photo\", $user->id);\n\
  \n// 在视图中指示成功\n\n$success = true;\n\n}\n\n}\n\n// 加载视图\n\n$this->load->view(\"users/register\"\
  , array(\n\n\"success\" => $success\n\n));\n\n}\n\n}\n```\n\n\n\n与我们最初应用中处理文件上传的方式类似，`register()`\
  \ 动作实际上并未执行文件上传逻辑，而是调用了一个受保护的 `_upload()` 方法。与最初实现相比，`_upload()` 方法略有改动：在文件上传前的灵活性降低，但上传后能提供更多信息。\n\
  \nCodeIgniter 内置的文件上传库在验证上传文件和处理 PHP 所需的所有文件系统移动操作方面，功能实际上相当强大。我们只需指定要上传文件的表单字段名称，库就能（借助初始化参数的少量帮助）自行处理其余工作。\n\
  \n**注意：** 您可以访问 [`codeigniter.com/user_guide/libraries/file_uploading.html`](http://codeigniter.com/user_guide/libraries/file_uploading.html)\
  \ 了解更多关于 CodeIgniter 文件上传类的信息。\n\n文件上传后，我们在 `file` 表中创建一行记录，并将其与用户 ID 关联起来。在个人资料页面使用这张照片之前，我们需要研究通过第三方库扩展\
  \ CodeIgniter 的另一个方面。\n\n### 第三方库\n\n与我们的框架类似，CodeIgniter 允许将第三方库放置在特定目录中，以便在需要它们的动作中加载。问题在于\
  \ CodeIgniter 不会自动加载类，因此对我们来说，更简单的方法是创建一个外观类（如清单 24-5 所示）来封装 Imagine 缩略图生成功能。\n\n\
  **清单 24-5.** 缩略图外观类\n\n```php\nrequire(\"imagine/image/imagineinterface.php\");\n\
  require(\"imagine/image/manipulatorinterface.php\");\nrequire(\"imagine/image/imageinterface.php\"\
  );\nrequire(\"imagine/image/boxinterface.php\");\nrequire(\"imagine/image/box.php\"\
  );\nrequire(\"imagine/gd/imagine.php\");\nrequire(\"imagine/gd/image.php\");\nrequire(\"\
  imagine/image/pointinterface.php\");\nrequire(\"imagine/image/point.php\");\n\n\
  class Thumbnail\n{\n    protected $_filename;\n\n    public function __construct($options\
  \ = array())\n    {\n        if (isset($options[\"file\"]))\n        {\n       \
  \     $file = $options[\"file\"];\n            $path = dirname(BASEPATH).\"/uploads\"\
  ;\n            $width = 64;\n            $height = 64;\n            $name = $file->name;\n\
  \            $filename = pathinfo($name, PATHINFO_FILENAME);\n            $extension\
  \ = pathinfo($name, PATHINFO_EXTENSION);\n\n            if ($filename && $extension)\n\
  \            {\n                $thumbnail = \"{$filename}-{$width}x{$height}.{$extension}\"\
  ;\n\n                if (!file_exists(\"{$path}/{$thumbnail}\"))\n             \
  \   {\n                    $imagine = new Imagine\\Gd\\Imagine();\n            \
  \        $size = new Imagine\\Image\\Box($width, $height);\n                   \
  \ $mode = Imagine\\Image\\ImageInterface::THUMBNAIL_OUTBOUND;\n                \
  \    $imagine\n                        ->open(\"{$path}/{$name}\")\n           \
  \             ->thumbnail($size, $mode)\n                        ->save(\"{$path}/{$thumbnail}\"\
  );\n                }\n                $this->_filename = $thumbnail;\n        \
  \    }\n        }\n    }\n\n    public function getFilename()\n    {\n        return\
  \ $this->_filename;\n    }\n}\n```\n\n关于这个外观类，您首先会注意到它需要引入多个 Imagine 类。我们可以创建自动加载器，但对于这个小型缩略图类来说，手动包含\
  \ Imagine 依赖更快速、更简单。\n\n`Thumbnail` 类的设计是为了与 `File` 类的实例配合使用，该实例通过关联数组的值传递给 `__construct()`。我们稍后将展示如何调用它，但重要的是要注意，CodeIgniter\
  \ 的库加载器会自动实例化 `Thumbnail` 类，因此在进行任何图像缩放之前，我们需要确保 `file` 参数已被设置。\n\n在我们有可用的文件行记录后，需要获取文件名和扩展名。然后构建缩略图文件名，并检查缩略图是否已创建。如果缩略图尚未创建，我们就使用\
  \ Imagine 创建缩略图，最后将缩略图的文件名存储在受保护的 `$_filename` 属性中。\n\n\n\n现在让我们看看如何在 Users 控制器中使用这个类，我们将在其中修改\
  \ `profile()` 方法。请参考清单 24-6。\n\n**清单 24-6.** 修改后的 `profile()` 方法\n\n```\nclass Users\
  \ extends CI_Controller\n\n{\n\npublic function profile()\n\n{\n\n// 检查用户会话状态\n\n\
  $this->_isSecure();\n\n// 获取个人资料照片\n\n$this->load->model(\"file\");\n\n$file = File::first(array(\n\
  \n\"user\" => $this->user->id\n\n));\n\n// 生成缩略图\n\n$this->load->library(\"thumbnail\"\
  , array(\n\n\"file\" => $file\n\n));\n\n$filename = $this->thumbnail->getFilename();\n\
  \n// 加载视图\n\n$this->load->view(\"users/profile\", array(\n\n\"user\" => $this->user,\n\
  \n\"filename\" => $filename\n\n));\n\n}\n\n}\n```\n\n我们的 `profile()` 方法有两个新特点。第一，我们从数据库中获取了第一条\
  \ `File` 记录。第二，我们需要将其传递给 `$this->load->library()`。这将使用我们想要生成缩略图的文件来初始化 `Thumbnail`\
  \ 类。\n\n**注意** 你可以在 [`codeigniter.com/user_guide/libraries/loader.html`](http://codeigniter.com/user_guide/libraries/loader.html)\
  \ 了解有关 CodeIgniter 资源加载细节的更多信息。\n\n最后，我们需要修改 `profile.html` 视图文件和主 `.htaccess` 文件，如清单\
  \ 24-7 和 24-8 所示。\n\n**清单 24-7.** 修改后的 `.htaccess` 文件\n\n```\nRewriteEngine on\n\
  \nRewriteCond $1 !^(index\\.php|images|uploads|robots\\.txt)\n\nRewriteRule ^(.*)$\
  \ /index.php/$1 [L]\n```\n\n**清单 24-8.** 修改后的 `profile.html` 视图\n\n```\n<?php if\
  \ ($filename): ?>\n\n<img src=\"/uploads/<?php echo $filename; ?>\" />\n\n<?php\
  \ endif; ?>\n\n<h1><?php echo $user->first; ?> <?php echo $user->last; ?></h1> 这是一个个人资料页面！\n\
  ```\n\n我们对 `.htaccess` 文件（在正则表达式中）所做的修改允许对 `uploads` 目录中的文件进行调用。同时，如果控制器提供了个人资料照片，我们也会将其添加到\
  \ `profile.html` 视图中。\n\n**注意** 从安全角度来看，文件上传目录不应允许通过网络直接访问，或者应有严格的 `.htaccess` 规则来防止在\
  \ `uploads` 目录内执行脚本。当恶意用户能够通过专门设计用于文件上传的界面上传脚本并在服务器上执行时，网站通常会崩溃。\n\n### 扩展核心\n\n\
  我们需要介绍的最后一个话题是如何扩展 CodeIgniter 核心类。诀窍在于在 `application/core` 目录中添加与核心类名称匹配并带有特殊前缀的类。如果我们想创建一个可供应用程序继承的控制器，我们只需在此目录中创建一个\
  \ `MY_Controller.php` 文件，如清单 24-9 所示。\n\n**清单 24-9.** `application/core/MY_Controller.php`\n\
  \n```\nclass MY_Controller extends CI_Controller\n\n{\n\npublic $user;\n\npublic\
  \ static function redirect($url)\n\n{\n\nheader(\"Location: {$url}\");\n\nexit();\n\
  \n}\n\nprotected function _isSecure()\n\n{\n\n// 获取用户会话\n\n$this->_getUser();\n\n\
  if (!$this->user)\n\n{\n\nself::redirect(\"/login\");\n\n}\n\n}\n\nprotected function\
  \ _getUser()\n\n{\n\n// 加载会话库\n\n$this->load->library(\"session\");\n\n// 获取用户 ID\n\
  \n$id = $this->session->userdata(\"user\");\n\nif ($id)\n\n{\n\n// 加载用户模型\n\n$this->load->model(\"\
  user\");\n\n// 获取用户\n\n$this->user = new User(array(\n\n\"id\" => $id\n\n));\n\n\
  }\n\n}\n\n}\n```\n\n关于扩展核心类需要注意的重要事项是：文件名必须符合 `my_*` 模式，并且自定义核心类必须继承内置的核心类。我们可以将\
  \ `redirect()`、`_isSecure()` 和 `_getUser()` 方法移入这个新类，因为任何控制器都可以重用它们。\n\n**注意** 关于扩展核心类还有很多知识需要了解，你可以在\
  \ [`codeigniter.com/user_guide/general/core_classes.html`](http://codeigniter.com/user_guide/general/core_classes.html)\
  \ 了解更多。\n\n### 问题\n\n1. 在我们最初的应用程序中，我们也创建了一个 `File` 模型来存储对数据库中已上传文件的引用。为什么不直接在 `uploads`\
  \ 目录中搜索属于用户的文件？\n2. 在我们最初的应用程序中，我们还创建了一个专门的 `/thumbnails/*` 路由用于生成缩略图，然后将缩略图生成集成到控制器中。这种新方法有什么缺点吗？\n\
  \n### 答案\n\n1. 我们在文件查找中引入数据库，只是因为查询数据库比遍历文件系统中的文件要快。我们还可以通过缓存属于用户的文件列表来进一步提高速度。\n\
  2. 这种新方法有两个缺点。第一，控制器现在需要知道缩略图是如何生成的。第二，缩略图变得不够动态——你无法再简单地请求一个新的缩略图尺寸，因为它必须通过编码实现！\n\
  \n### 练习\n\n1. 我们已经了解了这种缩略图生成方法的缺点。现在请使用 CodeIgniter MVC 重新创建我们之前的方法。\n2. 我们还学习了如何扩展核心类，并且对\
  \ `CI_Controller` 类进行了扩展。尝试将这种思路应用到我们创建的模型上，将可重用的代码移入一个扩展的 `CI_Model` 子类中。\n\n#\
  \ 第 25 章 CodeIgniter：测试\n\n我们通过探讨如何使用 CodeIgniter 内置类进行单元测试来结束对 CodeIgniter 的讨论。\n\
  \n### 目标\n\n- 我们需要了解 CodeIgniter 在单元测试方面提供了什么功能。\n- 我们需要了解有哪些替代方案。\n\n### 工具\n\n\
  CodeIgniter 提供了一个简单的单元测试类，你可以用来为你的 CodeIgniter 应用程序编写测试。\n\n它有一个方法可用于添加更多测试，还有一个方法用于返回格式化后的结果。让我们看一个如何使用它的示例，如清单\
  \ 25-1 所示。\n\n**清单 25-1.** 使用 CodeIgniter 单元测试类\n\n```\nclass Welcome extends CI_Controller\n\
  \n{\n\npublic function index()\n\n{\n\n$this->load->view('welcome_message');\n\n\
  }\n\npublic function tests()\n\n{\n\n$this->load->library(\"unit_test\");\n\n$test\
  \ = $this->testing();\n\n$expected_result = \"hello world\";\n\n$test_name = \"\
  testing function returns hello world\";\n\n$this->unit->run($test, $expected_result,\
  \ $test_name);\n\necho $this->unit->report();\n\n}\n\npublic function testing()\n\
  \n{\n\nreturn \"hello world\";\n\n}\n\n}\n```\n\n如清单 25-1 所示，你可以使用 CodeIgniter 提供的单元测试库来比较两个值（其中一个值很可能是对某个方法或函数调用的结果）。这在测试当提供表单提交数据时方法如何执行方面有些局限。\n\
  \n我们需要意识到的另一个局限是，CodeIgniter 允许的单元测试必须在 MVC 架构内部进行。这使测试与它们应该测试的框架紧密耦合，这从来都不是一件好事。\n\
  \n#### 替代方案\n\n使用第三方库来测试 CodeIgniter 应用程序的功能要好得多。\n\n像 `PHPUnit` 这样的单元测试库包含大量不同的断言函数，不仅可以测试两个值的相等性，还可以测试数组的大小、抛出的异常类型、文件是否存在于目录中等等。\n\
  \n**注意** 如果你想下载或了解更多关于 `PHPUnit` 的信息，可以访问 [`github.com/sebastianbergmann/phpunit`](https://github.com/sebastianbergmann/phpunit)。\n\
  \n你可以通过将第三方单元测试库包含在 `application/libraries` 文件夹中（如我们在第 24 章中所做的那样），甚至将它们完全分离到应用程序之外来使用它们。选择权在你手中。\n\
  \n\n\n如果你将我们在原始示例应用中实现的单元测试与 `application/libraries` 目录下的内容进行比较，你会发现前者完全独立于 `application/framework`\
  \ 架构运行。这使得测试即使在 `application/framework` 未被加载的情况下也能正常工作。\n\n### 问题\n\n1.  CodeIgniter\
  \ 的单元测试类和我们自己的单元测试类有何异同？\n2.  既然 CodeIgniter 已经提供了单元测试类，为什么使用第三方单元测试库仍是个好主意？\n\n\
  ### 答案\n\n1.  我们的单元测试类执行两项基本检查：是否触发了异常，以及测试返回 `true` 还是 `false`。它旨在应用程序架构之外使用，并且依赖项极少。CodeIgniter\
  \ 的单元测试类则设计在 CodeIgniter 的 MVC 应用程序代码内部运行，仅测试两个值之间的相等性。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 25 章 ■ CodeIgniter：测试\n\n2.  与我们目前所见的简单单元测试类相比，第三方单元测试库提供了许多优势。它们允许我们编写更复杂的测试，从而触及应用程序功能的核心。\n\
  \n### 练习\n\n1.  CodeIgniter 的单元测试类易于设置和使用。尝试使用它创建几个动作测试。\n2.  `PHPUnit` 是 CodeIgniter\
  \ 内置单元测试类的一个出色的替代方案。\n\n尝试将其集成到我们的应用程序中，并为其编写一些测试。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 26 章\n\n## Zend Framework：引导\n\nPHP 的创建者和维护者维护着 Zend Framework。它是（我们重点关注的三个框架中）唯一一个应用程序架构并非由框架下载归档文件预先生成的框架。这是由于\
  \ Zend Framework 的一个设计目标：成为一个由松散耦合组件组成的“按需使用”架构。\n\n这并不意味着我们需要做任何特殊处理才能让它像 CodeIgniter\
  \ 或 CakePHP 那样运行，而只是需要我们发出正确的命令来获得我们想要的布局。\n\n> **注** 你可以从 [`framework.zend.com/download/overview`](http://framework.zend.com/download/overview)\
  \ 下载 Zend Framework。\n\n### 目标\n\n-   我们需要理解 Zend Framework 的理念和优势。\n-   我们需要学习如何为我们的示例应用创建架构需求。\n\
  \n### 为什么选择 Zend Framework？\n\nZend Framework 结构极其良好，并包含许多与流行第三方服务的接口。该框架背后的理念是，它应包含每个人都需要的大约\
  \ 80% 的功能，同时让开发者自定义另外 20% 以满足其特定的业务需求。\n\nZend Framework 的文档非常详尽，并且还涵盖了与核心类一起提供的所有\
  \ API 类的细节。它还包含了众多关于捆绑类通用用途的示例。\n\n> **注** 你可以在 [`framework.zend.com/manual/en/introduction.overview.html`](http://framework.zend.com/manual/en/introduction.overview.html)\
  \ 找到 Zend Framework 的文档。\n\n### 为什么不选择 Zend Framework？\n\nZend Framework 可能很难学，仅仅是因为其初始的应用程序布局（或者说布局缺失）以及捆绑类的庞大数量。一旦你理解了如何创建\
  \ MVC 应用程序以及如何查阅文档，这些因素就不再是持续使用该框架的真正障碍了。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 26 章 ■ Zend Framework：引导\n\nZend Framework (1.11) 不使用命名空间，这主要是由于其类的命名方式。\n\
  \n> **注** 在撰写本文时，Zend Framework 2 正处于 beta 测试阶段，并完全支持命名空间。你可以从 [`packages.zendframework.com`](http://packages.zendframework.com)\
  \ 下载 2.0 版本。请注意，就安装和使用而言，它似乎与本章使用的当前 Zend 版本有很大不同。\n\n### 开始设置\n\n使用 Zend Framework\
  \ 生成一个功能性的应用程序相当简单。你可以下载的归档文件都包含一个构建脚本，该脚本将构建推荐的目录结构，甚至为你的应用程序提供示例控制器、视图和配置。我们需要遵循的开始构建示例应用的步骤如下：\n\
  \n1.  下载 Zend Framework 最小化包 ([`framework.zend.com/download/current`](http://framework.zend.com/download/current))\
  \ 并将其解压到任意位置。记住你解压到哪里，因为你稍后需要进入该目录。\n2.  打开终端（如果你使用的是 Linux 或 OS X）或命令提示符（如果你使用的是\
  \ Windows），并导航到解压目录中的 `bin/` 文件夹。\n3.  使用以下命令运行 `zf.sh` 文件（如果你使用的是 Linux 或 OS X）或\
  \ `zf.bat` 文件（如果你使用的是 Windows）：\n    -   Linux/OS X：`./zf.sh create project prophpmvc`\n\
  \    -   Windows：`zf.bat create project prophpmvc`\n\n> **注** 第二个命令可能会警告未找到 `PHPUnit`。这没关系，因为我们不需要使用它。\n\
  \n你需要配置你的 Web 服务器以指向 `public/` 目录，以便生成的引导代码能够执行。\n\n### 路由\n\n除了由 `create project`\
  \ 命令生成的目录结构外，还创建了一个引导文件，允许我们为应用程序指定任何自定义的初始化逻辑。我们必须在（位于 `application/bootstrap.php`\
  \ 的）这个文件的类中添加应用程序的自定义路由，如清单 26-1 所示。\n\n***清单 26-1.*** `application/bootstrap.php`\n\
  \n```php\nclass Bootstrap extends Zend_Application_Bootstrap_Bootstrap\n{\n    protected\
  \ function _initRouter()\n    {\n        $router = Zend_Controller_Front::getInstance()->getRouter();\n\
  \n        $routes = array(\n            \"register\" => array(\"register\", \"users\"\
  , \"register\"),\n            \"login\" => array(\"login\", \"users\", \"login\"\
  ),\n            \"logout\" => array(\"logout\", \"users\", \"logout\"),\n      \
  \      \"search\" => array(\"search\", \"users\", \"search\"),\n            \"profile\"\
  \ => array(\"profile\", \"users\", \"profile\"),\n            \"settings\" => array(\"\
  settings\", \"users\", \"settings\"),\n            \"friend\" => array(\"friend/:id\"\
  , \"users\", \"friend\"),\n            \"unfriend\" => array(\"unfriend/:id\", \"\
  users\", \"unfriend\"),\n            \"users/edit\" => array(\"users/edit/:id\"\
  , \"users\", \"edit\"),\n            \"users/delete\" => array(\"users/delete/:id\"\
  , \"users\", \"delete\"),\n            \"users/undelete\" => array(\"users/undelete/:id\"\
  , \"users\", \"undelete\"),\n            \"fonts\" => array(\"fonts/:name\", \"\
  files\", \"fonts\"),\n            \"thumbnails\" => array(\"thumbnails/:id\", \"\
  files\", \"thumbnails\"),\n            \"files/delete\" => array(\"files/delete/:id\"\
  , \"files\", \"delete\"),\n            \"files/undelete\" => array(\"files/undelete/:id\"\
  , \"files\", \"undelete\")\n        );\n\n        foreach ($routes as $name => $route)\n\
  \        {\n            list($pattern, $controller, $action) = $route;\n       \
  \     $router->addRoute($name, new Zend_Controller_Router_Route($pattern, \n   \
  \             array(\"controller\" => $controller, \"action\" => $action)));\n \
  \       }\n    }\n}\n```\n\n过程很简单：我们获取 `Zend_Controller_Router` 类的一个实例（通过 `Zend_Controller_Front`\
  \ 类），并向其添加几个 `Zend_Controller_Router_Route` 实例。主应用程序代码将在 `Zend_Application_Bootstrap_Bootstrap`\
  \ 类执行后运行，因此当应用程序尝试确定请求的 URL 对应哪些控制器和动作时，这些新路由将可用。\n\n\n\n在三个我们关注的框架中，需要注意的是，`Zend\
  \ Framework`处理路由的方式与我们的框架最为相似。重要的区别在于，`Zend Framework`的`router`类是单例的，而我们的则由注册表管理；此外，`Zend\
  \ Framework`的所有路由都是命名的。\n\n如果你尝试访问这些新路由中的任何一个，将会看到错误。这是因为我们还没有创建相应的控制器、动作等。在第 27\
  \ 章中，我们将创建大多数这些路由正常运行所需的控制器、模型和视图。\n\n**注意** 你可以在以下网址找到关于`Zend Framework`路由的更多详细信息：\
  \  \n`http://framework.zend.com/manual/en/zend.controller.router.html`\n\n问题\n\n\
  1. 为什么我们应该在`Zend_Application_Bootstrap_Bootstrap`类中添加路由？  \n   难道我们不能直接在`public/index.php`文件中定义它们吗？\n\
  \n2. 你能想到一些自动化构建脚本（例如本章中使用的那个）可以加速应用程序开发的方法吗？\n\n`www.it-ebooks.info`\n\n第 26 章\
  \ ■ Zend Framework：引导\n\n答案\n\n1. 这里没有硬性规定。这仅仅是`Zend`推荐的添加自定义路由的方式之一。如果我们愿意，完全可以直接在`public/index.php`文件中添加路由。\n\
  \n2. 除了创建应用程序的初始结构外，自动化构建脚本还可用于创建额外的控制器、模型甚至视图。`Zend Framework`命令行工具可以完成所有这些任务。\n\
  \n练习\n\n1. 在本章中，我们创建了示例应用程序所需的所有路由。现在尝试创建一个使用用户名来调用`users/profile`动作的路由。\n\n2. 拥有所有这些路由却没有相应的控制器和动作对我们帮助不大。尝试创建控制器和动作来处理我们定义的几个路由。\n\
  \n`www.it-ebooks.info`\n\n**第 27 章**\n\n**Zend Framework：MVC**\n\n就构建示例应用程序所提供的工具而言，`Zend\
  \ Framework` 比 `CodeIgniter` 更接近我们的框架。我们已经看到了`Zend Framework`的路由系统与我们框架的相似之处，但它也有一个类似于我们自己的`ORM`系统。在本章中使用它们时，我们将逐渐体会到这些。\n\
  \n目标\n\n在为示例应用程序创建控制器、模型和视图时，我们需要认识到我们的框架与`Zend Framework`之间的差异。\n\n• 我们需要为用户、好友、文件和消息创建模型。\n\
  \n• 我们需要创建相应的视图和控制器。\n\n差异\n\n在本节重点讨论的框架中，`Zend Framework` 实际上与我们的框架最为相似。\n\n它们之间的不同之处（除其他方面外）在于遵循`MVC`模式的紧密程度。我们可能会倾向于认为我们的框架做得更好，但`Zend`实际上为`Zend\
  \ Framework`选择了一种松散耦合的模型，这一点从一开始就显而易见。你下载的不是一个组织在熟悉文件夹结构中的、整洁的`MVC`框架。相反，你下载的是一组在应用`MVC`模式时表现非常出色的类集合。\n\
  \n正因为如此，我们可能需要编写比我们自己的框架执行关于用户、好友、文件和消息的等效操作时更多的代码。这仅仅是因为我们的框架将诸如`ORM`和控制器等组件耦合得比`Zend\
  \ Framework`耦合其`ORM`和控制器更紧密。\n\n模型\n\n我们将通过查看一些使用`Zend Framework`的`ORM`来选择和修改数据库记录的方法，开始我们的模型工作。在我们可以修改数据库记录之前，需要定义应用程序将使用的数据库表。目前，我们只需要`user`表，如清单\
  \ 27-1 所示。\n\n`www.it-ebooks.info`\n\n第 27 章 ■ Zend Framework：MVC\n\n***清单 27-1.***\
  \ `user`表\n\n```\nCREATE TABLE 'user' (\n  'id' int(11) NOT NULL AUTO_INCREMENT,\n\
  \  'live' tinyint(4) DEFAULT NULL,\n  'deleted' tinyint(4) DEFAULT NULL,\n  'created'\
  \ datetime DEFAULT NULL,\n  'modified' datetime DEFAULT NULL,\n  'first' varchar(32)\
  \ DEFAULT NULL,\n  'last' varchar(32) DEFAULT NULL,\n  'email' varchar(100) DEFAULT\
  \ NULL,\n  'password' varchar(32) DEFAULT NULL,\n  PRIMARY KEY ('id')\n) ENGINE\
  \ = InnoDB DEFAULT CHARSET = utf8 ;\n```\n\n有了这个表之后，我们就可以执行数据库操作，例如清单 27-2 中所示的`select`操作。\n\
  \n***清单 27-2.*** 选择行\n\n```\n$db = Zend_Db::factory(\n    \"pdo_mysql\",\n    array(\n\
  \        \"host\" => \"localhost\",\n        \"username\" => \"prophpmvc\",\n  \
  \      \"password\" => \"prophpmvc\",\n        \"dbname\" => \"prophpmvc-zendframework\"\
  \n    )\n);\n$table = new Zend_Db_Table(array(\n    \"name\" => \"user\",\n    \"\
  db\" => $db\n));\n$select = $table->select()\n    ->where(\"first = ?\", \"Chris\"\
  )\n    ->order(\"id ASC\");\n$user = $table->fetchRow($select);\n```\n\n前两个语句并非特定于选择行，而是建立到数据库的连接，并请求一个用于操作`user`表的接口。我们稍后会将它们移动到一个更好的位置，但理解它们的工作原理很重要。\n\
  \n`Zend_Db`工厂类被简单地用于返回一个数据库适配器实例，其方式与我们自己的数据库工厂类非常相似。同样，`Zend_Db_Table`类返回一个用于查询/操作我们之前创建的`user`数据库表的接口。它支持类似于我们框架和\
  \ `CodeIgniter` 的查询接口。\n\n清单 27-3 演示了如何修改`user`行。\n\n`www.it-ebooks.info`\n\n第 27\
  \ 章 ■ Zend Framework：MVC\n\n***清单 27-3.*** 修改用户行\n\n```\n$id = $table->insert(array(\n\
  \    \"first\" => \"Joe\",\n    \"last\" => \"Blogs\",\n    \"email\" => \"joe@example.com\"\
  ,\n    \"password\" => \"password\",\n    \"live\" => true,\n    \"deleted\" =>\
  \ false,\n    \"created\" => date(\"Y-m-d\"),\n    \"modified\" => date(\"Y-m-d\"\
  )\n));\n$user = $table->find($id)->getRow(0);\n$user->password .= \"123\";\n$user->save();\n\
  echo $user->password; // 输出: password123\n$user->delete();\n```\n\n当我们使用 `CodeIgniter`\
  \ 构建示例应用程序时，我们必须手动定义模型，创建每个行函数。我们将使用刚学到的技巧，对`Zend Framework`示例应用程序执行相同的操作。在开始我们的用户模型之前，我们需要定义一个`DbTable`类。\n\
  \n在 `Zend Framework` 中，`DbTable` 类被定义为数据库表元数据的容器。我们将通过使用`DbTable`类来生成各种所需的数据库查询，而不是直接使用数据库适配器，从而节省时间（参见清单\
  \ 27-4）。\n\n***清单 27-4.*** `Application_Model_DbTable_User` 扩展类\n\n```\nclass Application_Model_DbTable_User\
  \ extends Zend_Db_Table_Abstract\n{\n    protected $_name = 'user';\n}\n```\n\n\
  如您所见，这个类只需要一个表名即可生成用于查询生成的完整元数据集。这其实没什么意思，所以我们继续看模型本身，如清单 27-5 所示。\n\n***清单 27-5.***\
