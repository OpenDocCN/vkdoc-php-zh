    This PHP solution shows how to extract the information from a live news feed using
    SimpleXML and then display it in a webpage. It also shows how to format the `<pubDate>`
    element to a more user-friendly format and how to limit the number of items displayed
    using the `LimitIterator` class.


    Create a new page called `newsfeed.php` in the `filesystem` folder. This page
    will contain a mixture of PHP and HTML.   The news feed chosen for this PHP solution
    is BBC World News. A condition of using most news feeds is that you acknowledge
    the source. So add The Latest from BBC News formatted as an `<h1>` heading at
    the top of the page.   Note


    For the terms and conditions of using a BBC news feed on your own site, see [`www.bbc.co.uk/news/10628494#mysite`](http://www.bbc.co.uk/news/10628494#mysite)
    and [`www.bbc.co.uk/terms/additional_rss.shtml`](http://www.bbc.co.uk/terms/additional_rss.shtml)
    .


    Create a PHP block below the heading and add the following code to load the feed:


    `$url = ''` [`http://feeds.bbci.co.uk/news/world/rss.xml`](http://feeds.bbci.co.uk/news/world/rss.xml)
    `'';`


    `$feed = simplexml_load_file($url);`


    Use a `foreach` loop to access the `<item>` elements and display the `<title>`
    of each one:


    `foreach ($feed->channel->item as $item) {`


    `echo $item->title . ''<br>'';`


    `}`


    The normal feed often contains 50 or more items. That’s fine for a news site,
    but you probably want a shorter selection in your own site. Use another SPL iterator
    to select a specific range of items. Amend the code like this:


    ![A978-1-4842-0635-5_7_Fig4_HTML.jpg](A978-1-4842-0635-5_7_Fig4_HTML.jpg)


    Figure 7-4.


    The news feed contains a large number of items Save `newsfeed.php` and load the
    page in a browser. You should see a long list of news items similar to Figure
    [7-4](#A978-1-4842-0635-5_7_Chapter.html#Fig4).


    `$url = ''` [`http://feeds.bbci.co.uk/news/world/rss.xml`](http://feeds.bbci.co.uk/news/world/rss.xml)
    `'';`


    `$feed = simplexml_load_file($url` `, ''SimpleXMLIterator''` `);`


    `$filtered = new LimitIterator($feed->channel->item, 0 , 4);`


    `foreach (` `$filtered` `as $item) {`


    `echo $item->title . ''<br>'';`


    `}`


    To use SimpleXML with an SPL iterator, you need to supply the name of the `SimpleXMLIterator`
    class as the second argument to `simplexml_load_file()`. You can then pass the
    SimpleXML element you want to affect to an iterator constructor.


    In this case, `$feed->channel->item` is passed to the `LimitIterator` constructor.
    The `LimitIterator` takes three arguments: the object you want to limit, the starting
    point (counting from 0), and the number of times you want the loop to run. This
    code starts at the first item and limits the number of items to four.


    The `foreach` loop now loops over the `$filtered` result. If you test the page
    again, you’ll see just four titles, as shown in Figure [7-5](#A978-1-4842-0635-5_7_Chapter.html#Fig5).
    Don’t be surprised if the selection of headlines is different from before. The
    BBC News website is updated every minute.


    Now that you have limited the number of items, amend the `foreach` loop to wrap
    the `<title>` elements in a link to the original article, then display the `<pubDate>`
    and `<description>` items. The loop looks like this:


    ![A978-1-4842-0635-5_7_Fig5_HTML.jpg](A978-1-4842-0635-5_7_Fig5_HTML.jpg)


    Figure 7-5.


    The `LimitIterator` restricts the number of items displayed


    `foreach ($filtered as $item) {` `?>`


    `<h2><a href="<?= $item->link; ?>"><?= $item->title;?></a></h2>`


    `<p class="datetime"><?php echo $item->pubDate; ?></p>`


    `<p><?php echo $item->description; ?></p>`


    `<?php` `} ?>`


    Save the page and test it again. The links take you directly to the relevant news
    story on the BBC website. The news feed is now functional, but the `<pubDate>`
    format follows the format laid down in the RSS specification, as shown in the
    next screenshot:


    ![A978-1-4842-0635-5_7_Figl_HTML.jpg](A978-1-4842-0635-5_7_Figl_HTML.jpg)


    To format the date and time in a more user-friendly way, pass `$item->pubDate`
    to the `DateTime` class constructor, then use the `DateTime format()` method to
    display it. Change the code in the `foreach` loop, like this:


    `<p class="datetime"><?php` `$date = new DateTime(` `$item->pubDate` `);`


    `echo $date->format(''M j, Y, g:ia'');` `?></p>`


    This reformats the date as below:


    ![A978-1-4842-0635-5_7_Figm_HTML.jpg](A978-1-4842-0635-5_7_Figm_HTML.jpg)


    The mysterious PHP formatting strings for dates are explained in [Chapter 14](#A978-1-4842-0635-5_14_Chapter.html).


    That looks a lot better, but the time is still expressed in GMT (London time).
    If most of your site’s visitors live on the east coast of the United States, you
    probably want to show the local time. That’s no problem with a `DateTime` object.
