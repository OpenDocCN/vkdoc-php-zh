    \ loop=$products_list->mProducts}\n{assign var=direction_p value=\"left\"}\n{if\
    \ $smarty.section.k.index != 0 &&\n($smarty.section.k.index + 1) % 2 == 0}\n{assign\
    \ var=direction_p value=\"right\"}\n{else}\n<br />\n{/if}\n\n<p class=\"{$direction_p}\"\
    >\n<a class=\"product_name\"\nhref=\"{$products_list->mProducts[k].link|prepare_link:\"\
