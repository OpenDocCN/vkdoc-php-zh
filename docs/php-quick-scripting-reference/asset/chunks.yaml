    \ 8 章\n\n![image](img/frontdot.jpg)\n\n# 函数\n\n函数是一段可重用的代码块，仅在调用时执行。\n\n## 定义函数\n\
    \n要创建函数，需要使用 `function` 关键字，后跟函数名、一对圆括号和一个代码块。函数的命名约定与变量相同——使用描述性名称，除首单词外每个单词首字母大写。\n\
