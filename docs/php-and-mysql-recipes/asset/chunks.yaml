    \ = mysqli_connect('127.0.0.1', 'php', 'secret', 'music');\nif (mysqli_connect_error())\
    \ {\n    die(\"Error connecting: \" . mysqli_connect_errno() . ' '\n        .\
    \ mysqli_connect_error() . \"\\n\");\n}\nelse {\n    echo \"Connected to music\\\
    n\";\n}\n```\n\n作为一种替代方案，相同的功能可以通过面向对象的方法实现。\n\n```php\n<?php\n// 16_2.php\n$mysqli\
    \ = new mysqli('127.0.0.1', 'php', 'secret', 'music');\nif ($mysqli->connect_error)\
    \ {\n    die(\"Error connecting: {$mysqli->connect_errno} {$mysqli->connect_error}\\\
    n\");\n}\nelse {\n    echo \"Connected to music\\n\";\n}\n```\n\n第 16 章 ■ 使用 MySQL\
    \ 数据库\n\n如果脚本作为来自 Web 服务器的请求调用，则无需断开连接或释放任何资源。当脚本终止时，PHP 会自动处理这些。如果脚本运行时间较长或不再需要数据库连接，最好关闭连接。这可以通过`mysqli_close()`函数或`mysqli::close()`方法完成。\n\
    \n```php\n<?php\n// 16_3.php\n$con = mysqli_connect('127.0.0.1', 'php', 'secret',\
    \ 'music');\nif (mysqli_connect_error()) {\n    die(\"Error connecting: \" . mysqli_connect_errno()\
    \ . ' '\n        . mysqli_connect_error() . \"\\n\");\n}\nelse {\n    echo \"\
    Connected to music\\n\";\n    mysqi_close($con);\n}\n```\n\n或者使用面向对象的代码：\n\n```php\n\
    <?php\n// 16_4.php\n$mysqli = new mysqli('127.0.0.1', 'php', 'secret', 'music');\n\
    if ($mysqli->connect_error) {\n    die(\"Error connecting: {$mysqli->connect_errno}\
    \ {$mysqli->connect_error}\\n\");\n}\nelse {\n    echo \"Connected to music\\\
    n\";\n    $mysqli->close();\n}\n```\n\n配方 16-2。持久连接\n\n问题\n"
- fmt: "# Connecting to a Database\n\nConnecting to a database can be a process that\
    \ takes some time, and if the same database is used by all, or most, requests\
    \ to the web server, it can make sense to keep a pool of connections open and\
    \ reuse them again and again.\n\n## Solution\n\n`Persistent` connection in various\
    \ database extensions has been available for a long time. Although persistent\
    \ connections can save some time they can also cause problems. If a persistent\
    \ connection is used to lock a table and the script is unable to release the lock\
    \ the table might stay locked until the connection is killed manually (restart\
    \ of the web server and possibly the database server) so be careful.\n\nIn the\
    \ older database drivers it used to be a special connect function (`mysql_pconnect()`\
    \ instead of `mysql_connect()`), but in the `mysqli` driver the persistent connection\
    \ is created by adding the prefix `'p:'` in front of the hostname.\n\nThe number\
    \ of persistent connections allowed is configurable in `php.ini` and it should\
    \ match the number of simultaneous requests to the web site. If the number is\
    \ set too low some users might experience connectivity issues.\n\nPersistent connections\
    \ are closed when the web server is shut down or restarted. If the persistent\
    \ connection is created from a script running under CLI the connection will be\
    \ closed when the script terminates. In that case there will be no difference\
    \ between persistent and non-persistent connections.\n\n## How it Works\n\nThe\
    \ next example shows the use of the `'p:'` prefix to the host name to create a\
    \ persistent connection.\n\n```php\n<?php\n// 16_5.php\n\n$mysqli = new mysqli('p:127.0.0.1',\
    \ 'php', 'secret', 'music');\n\nif ($mysqli->connect_error) {\n    die(\"Error\
    \ connecting: {$mysqli->connect_errno} {$mysqli->connect_error}\\n\");\n}\nelse\
    \ {\n    echo \"Connected to music\\n\";\n}\n```\n\nDon’t use the `close()` function\
    \ on a persistent link as that will remove it from memory.\n\nThe function `phpinfo()`\
    \ can be used to display status about `mysqli` connections. `Active Persistent\
    \ Links` is the number of links currently in use. `Inactive Persistent Links`\
    \ is the number of available links not currently in use and `Active Links` is\
    \ the number of non-persistent links currently in use.\n\n### `mysqli`\n\n- **`MysqlI\
    \ Support`**: enabled\n- **`Client API library version`**: `mysqlnd 5.0.12-dev\
    \ - 20150407 - $Id: d8daadaf41e3cd81d7c6ae96c6091fd15b2c9382 $`\n- **`Active Persistent\
    \ Links`**\n- **`Inactive Persistent Links`**\n- **`Active Links`**\n\n# Recipe\
    \ 16-3. Fetching Data\n\n## Problem\n\nDatabases use an internal format to store\
    \ the data and are optimized to use indexes and memory to extract the data based\
    \ on a query. If we use the `mysql` command-line tool the result of a query will\
    \ be listed as text on the console. How can the data be extracted into PHP variables\
    \ so it can be used in the script to perform action or generate output?\n\n##\
    \ Solution\n\nThe net rectangular nature of SQL databases can easily be represented\
    \ in PHP arrays. This will be an array of arrays. The outer array will correspond\
    \ to the rows in the result and the inner array will represent the values of all\
    \ columns in each row.\n\n## How it Works\n\nIn order to have some data in the\
    \ table to fetch we need to insert some first. Use the `mysql` command-line tool\
    \ to execute the following commands:\n\n```sql\nuse music;\n\ninsert into album\
    \ (title) values('Yellow Submarine');\ninsert into album (title) values('Sgt.\
    \ Pepper''s Lonely Hearts Club Band');\ninsert into album (title) values('Help');\n\
    insert into album (title) values('Abbey Road');\n```\n\nAnd to verify the data\
    \ select all columns from the table:\n\n```sql\nMariaDB [music]> select * from\
    \ album;\n+----+---------------------------------------+-------------+\n| id |\
    \ title                                 | description |\n+----+---------------------------------------+-------------+\n\
    |  1 | Yellow Submarine                      | NULL        |\n|  2 | Sgt. Pepper's\
    \ Lonely Hearts Club Band | NULL        |\n|  3 | Help                       \
    \           | NULL        |\n|  4 | Abbey Road                            | NULL\
    \        |\n+----+---------------------------------------+-------------+\n4 rows\
    \ in set (0.00 sec)\n```"
  raw: 'Connecting to a database can be a process that takes some time, and if the
    same database is used by all, or most, requests to the web server, it can make
    sense to keep a pool of connections open and reuse them again and again.


    Solution


    Persistent connection in various database extensions has been available for a
    long time. Although persistent connections can save some time they can also cause
    problems. If a persistent connection is used to lock a table and the script is
    unable to release the lock the table might stay locked until the connection is
    killed manually (restart of the web server and possibly the database server) so
    be careful.


    In the older database drivers it used to be a special connect function ( mysql_pconnect()
    instead of mysql_connect() ), but in the mysqli driver the persistent connection
    is created by adding the prefix ‘p:’ in front of the hostname.


    CHAPTER 16 ■ USING MYSQL DATABASES


    The number of persistent connections allowed is configurable in php.ini and it
    should match the number of simultaneous requests to the web site. If the number
    is set too low some users might experience connectivity issues.


    Persistent connections are closed when the web server is shut down or restarted.
    If the persistent connection is created from a script running under CLI the connection
    will be closed when the script terminates. In that case there will be no difference
    between persistent and non-persistent connections.


    How it Works


    The next example shows the use of the ‘p:’ prefix to the host name to create a
    persistent connection.


    <?php


    // 16_5.php


    $mysqli = new mysqli(''p:127.0.0.1'', ''php'', ''secret'', ''music'');


    if ($mysqli->connect_error) {


    die("Error connecting: {$mysqli->connect_errno} {$mysqli->connect_error}\n");


    }


    else {


    echo "Connected to music\n";


    }


    Don’t use the close() function on a persistent link as that will remove it from
    memory.


    The function phpinfo() can be used to display status about mysqli connections.
    Active Persistent Links is the number of links currently in use. Inactive Persistent
    Links is the number of available links not currently in use and Active Links is
    the number on non-persistent links currently in use.


    ***mysqli***


    **MysqlI Support**


    **enabled**


    **Client API library version**


    mysqlnd 5.0.12-dev - 20150407 - $Id:


    d8daadaf41e3cd81d7c6ae96c6091fd15b2c9382 $


    **Active Persistent Links**


    **Inactive Persistent Links**


    **Active Links**


    Recipe 16-3\. Fetching Data


    Problem


    Databases use an internal format to store the data and are optimized to use indexes
    and memory to extract the data based on a query. If we use the mysql command-line
    tool the result of a query will be listed as text on the console. How can the
    data be extracted into PHP variables so it can be used in the script to perform
    action or generate output?


    CHAPTER 16 ■ USING MYSQL DATABASES


    Solution


    The net rectangular nature of SQL databases can easily be represented in PHP arrays.
    This will be an array of arrays. The outer array will correspond to the rows in
    the result and the inner array will represent the values of all columns in each
    row.


    How it Works


    In order to have some data in the table to fetch we need to insert some first.
    Use the mysql command-line tool to execute the following commands:


    use music;


    insert into album (title) values(''Yellow Submarine'');


    insert into album (title) values(''Sgt. Pepper''''s Lonely Hearts Club Band'');
    insert into album (title) values(''Help'')


    insert into album (title) values(''Abbey Road'');


    And to verify the date select all columns from the table:


    MariaDB [music]> select * from album;


    +----+---------------------------------------+-------------+


    | id | title | description |


    +----+---------------------------------------+-------------+


    | 1 | Yellow Submarine | NULL |


    | 2 | Sgt. Pepper''s Lonely Hearts Club Band | NULL |


    | 3 | Help | NULL |


    | 4 | Abbey Road | NULL |


    +----+---------------------------------------+-------------+


    4 rows in set (0.00 sec)'
  trans: "\n# 连接数据库\n\n连接数据库可能需要花费一些时间，如果所有或大多数对 Web 服务器的请求都使用同一个数据库，那么保持一个连接池并反复重用这些连接是合理的。\n\
    \n## 解决方案\n\n各种数据库扩展中的`持久连接`功能已经存在很长时间了。尽管持久连接可以节省一些时间，但也可能引发问题。如果使用持久连接锁定了某个表，而脚本无法释放该锁，那么该表可能会一直保持锁定状态，直到手动终止连接（重启\
    \ Web 服务器，可能还需要重启数据库服务器），因此需谨慎使用。\n\n在较旧的数据库驱动中，曾使用专门的连接函数（例如用`mysql_pconnect()`代替`mysql_connect()`），但在`mysqli`驱动中，持久连接是通过在主机名前添加前缀`'p:'`来创建的。\n\
    \n允许的持久连接数量可在`php.ini`中配置，并且应匹配网站的同时请求数。如果该数值设置过低，某些用户可能会遇到连接问题。\n\n当 Web 服务器关闭或重启时，持久连接会被关闭。如果持久连接是由\
    \ CLI 模式下运行的脚本创建的，那么当脚本终止时连接也会关闭。在这种情况下，持久连接和非持久连接没有区别。\n\n## 工作原理\n\n以下示例展示了如何使用主机名的`'p:'`前缀来创建持久连接。\n\
    \n```php\n<?php\n// 16_5.php\n\n$mysqli = new mysqli('p:127.0.0.1', 'php', 'secret',\
    \ 'music');\n\nif ($mysqli->connect_error) {\n    die(\"Error connecting: {$mysqli->connect_errno}\
    \ {$mysqli->connect_error}\\n\");\n}\nelse {\n    echo \"Connected to music\\\
    n\";\n}\n```\n\n不要在持久链接上使用`close()`函数，因为这会将其从内存中移除。\n\n可以使用`phpinfo()`函数来显示`mysqli`连接的状态。`Active\
    \ Persistent Links` 是当前正在使用的链接数。`Inactive Persistent Links` 是当前未使用但可用的链接数，而`Active\
    \ Links` 是当前正在使用的非持久链接数。\n\n### `mysqli`\n\n- **`MysqlI 支持`**: 已启用\n- **`客户端 API\
    \ 库版本`**: `mysqlnd 5.0.12-dev - 20150407 - $Id: d8daadaf41e3cd81d7c6ae96c6091fd15b2c9382\
    \ $`\n- **`活动持久链接`**\n- **`非活动持久链接`**\n- **`活动链接`**\n\n# 配方 16-3. 获取数据\n\n## 问题\n\
    \n数据库使用内部格式存储数据，并优化了索引和内存的使用，以便基于查询提取数据。如果使用`mysql`命令行工具，查询结果会以文本形式列在控制台上。那么，如何将数据提取到\
    \ PHP 变量中，以便在脚本中使用这些数据执行操作或生成输出呢？\n\n## 解决方案\n\nSQL 数据库的矩形网格特性可以很容易地在 PHP 数组中表示。这将是一个数组的数组。外层数组对应结果中的行，内层数组代表每一行中所有列的值。\n\
    \n## 工作原理\n\n为了在表中有数据可供获取，我们首先需要插入一些数据。使用`mysql`命令行工具执行以下命令：\n\n```sql\nuse music;\n\
    \ninsert into album (title) values('Yellow Submarine');\ninsert into album (title)\
    \ values('Sgt. Pepper''s Lonely Hearts Club Band');\ninsert into album (title)\
    \ values('Help');\ninsert into album (title) values('Abbey Road');\n```\n\n为了验证数据，从表中查询所有列：\n\
    \n```sql\nMariaDB [music]> select * from album;\n+----+---------------------------------------+-------------+\n\
    | id | title                                 | description |\n+----+---------------------------------------+-------------+\n\
    |  1 | Yellow Submarine                      | NULL        |\n|  2 | Sgt. Pepper's\
    \ Lonely Hearts Club Band | NULL        |\n|  3 | Help                       \
    \           | NULL        |\n|  4 | Abbey Road                            | NULL\
    \        |\n+----+---------------------------------------+-------------+\n4 rows\
    \ in set (0.00 sec)\n```\n"
- fmt: "注意第二条专辑的插入语句中，撇号处有两个引号。这是因为单引号是字符串分隔符，为了插入单引号，必须对其进行转义，以告知解析器这并非字符串的结束。\n\n\
    `Id`列是自动添加的，因为插入语句未提供该列；`description`字段未指定，因此显示为`NULL`值。\n\n下一个示例演示如何创建扩展`mysqli`类的类。\n\
    \n```php\n<?php\n\n// 16_6.php\n\nini_set('display_errors', 1);\n\nclass music\
    \ extends mysqli {\n\nfunction __construct() {\n\nparent::__construct('127.0.0.1',\
    \ 'php', 'secret', 'music');\n\nif ($this->connect_error) {\n\ndie(\"Unable to\
    \ connect to music\\n\");\n\n}\n\n}\n\nfunction getAlbums() {\n\n$albums = [];\n\
    \n$result = $this->Query(\"select * from album;\");\n\nif ($result) {\n\nwhile($row\
    \ = $result->fetch_assoc()) {\n\n$albums[] = $row;\n\n}\n\n$result->close();\n\
    \n}\n\nreturn $albums;\n\n}\n\n}\n\n$music = new music();\n\nprint_r($music->getAlbums());\n\
    ```\n\n`music`类的构造函数不接受任何参数，但它会使用一些硬编码参数（主机、用户、密码和数据库）调用父类的构造函数。`getAlbums()`方法执行查询`\"\
    select * from album;\"`，如果查询成功执行，它会循环遍历结果，并将每一行插入到一个数组中，最后返回该数组。在函数返回前关闭结果集，这会释放查询所使用的任何内存。\n\
    \n此脚本的输出如下所示：\n\n```\nArray\n(\n    [0] => Array\n        (\n            [id]\
    \ => 1\n            [title] => Yellow Submarine\n            [description] =>\n\
    \        )\n\n    [1] => Array\n        (\n            [id] => 2\n           \
    \ [title] => Sgt. Pepper's Lonely Hearts Club Band\n            [description]\
    \ =>\n        )\n\n    [2] => Array\n        (\n            [id] => 3\n      \
    \      [title] => Help\n            [description] =>\n        )\n\n    [3] =>\
    \ Array\n        (\n            [id] => 4\n            [title] => Abbey Road\n\
    \            [description] =>\n        )\n\n)\n```\n\n有几种不同的函数可以从结果集中获取数据。这里使用的是`fetch_assoc()`。它会为每一行返回一个关联数组。这就是为什么内部数组中的每个元素都有与所选列名匹配的键。在这个例子中，查询使用了`\"\
    select * from album;\"`来选择所有列，但我们也可以编写`\"select id, title from album;\"`来仅选择前两列。\n\
    \n## Recipe 16-4. 插入数据\n\n### 问题\n\n上一个示例中的类可用于从数据库的特定表中提取数据，但如何添加新行呢？\n\n###\
    \ 解决方案\n\n在从数据库提取数据之前，必须先添加数据。这通过命令行工具使用`insert`语句完成。`insert`语句可以作用于单个表，并可用于创建包含任意数量列的新记录。在命令行示例中，我们只提供了`title`列。在此示例中，该列是必填列，因为它定义了`NOT\
    \ NULL`约束。\n\n一个可以向数据库添加行的简单函数可以这样编写：\n```php\nfunction addAlbum($title, $description\
    \ = null) {\n    $t = $this->real_escape_string($title);\n    if ($description)\
    \ {\n        $d = $this->real_escape_string($description);\n        $sql = \"\
    insert into album (title, description) values ('$t', '$d')\";\n    }\n    else\
    \ {\n        $sql = \"insert into album (title) values ('$t')\";\n    }\n    $this->Query($sql);\n\
    \    return $this->insert_id;\n}\n```\n此方法使用`real_escape_string()`函数来确保单引号和其他字符在能够被包含在查询中之前得到处理。返回值将是新创建行的`id`。这可以在以后用于将其他数据链接到特定记录。\n\
    \n### 工作原理\n\n用于插入新专辑并获取所有专辑列表的完整脚本如下所示：\n```php\n<?php\n\n// 16_7.php\n\nini_set('display_errors',\
