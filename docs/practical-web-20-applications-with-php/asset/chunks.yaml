    **Allowing Users to Update Their Details**


    The final thing we need to add to the user account section for now is the ability
    for users to update their details. In the new header.tpl shown in Figure 4-7,
    there is a link labeled Update Your Details, which will allow users to do this.


    Because this code is largely similar to the user registration system, I have not
    included all of the repetitive details. The key differences between user registration
    and updating details are as follows:


    • We are updating an existing user record rather than creating a new one.


    • We do not allow the user to update their username.


    • We allow the user to set a new password.


    • We do not need the CAPTCHA test.


    • Because the user is already logged in, we must update their Zend_Auth identity
    accordingly.


    ■**Note** While there isn’t anything inherently bad about allowing users to change
    their own usernames, it is my own preference to generally not allow users to do
    so (an exception might be if their e-mail address is used as their login username).
    One reason why it is bad to allow the changing of usernames is that other users
    get to know a user by their username; in the case of this application, we will
    be using the username to generate a unique user home page URL. Changing their
    username would result in a new URL for their home page.


    When allowing users to change their password, we will show them a password field
    and a password confirmation field, requiring them to enter the new password twice
    in order to change it. Additionally, we will include a note telling them to leave
    the password field blank if they do not want to change their password. This is
    because we cannot prepopulate the password field with their existing password,
    since we only store an MD5 hash of it.


    To implement the update details function, we must do the following:


    • **Create a new form processor class called FormProcessor_UserDetails**, **which
    is similar** **to FormProcessor_UserRegistration.** This class will read the submitted
    form values and process them to ensure they are valid. If no errors occur when
    validating the data, the existing user record is updated.


    • **Create a new action called detailsAction() in AccountController that instantiates**
    **FormProcessor_UserDetails, and passes to it the ID of the logged-in user.**
    This function also updates the Zend_Auth identity by calling the createAuthIdentity()
    function in DatabaseObject_User that we created earlier.


    • **Create a confirmation page to confirm to the user that their details have
    been** **updated.** To do this, we will create a new action handler called detailscompleteAction(),
    which simply tells the user that their details have been saved.


    Figure 4-8 shows what the form looks like when initially displayed to users. Note
    the prepopulated fields, as well as the lack of a username field and the addition
