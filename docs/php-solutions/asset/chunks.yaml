    ### Deleting Records


    Deleting a record in a database is similar to updating one. The basic `DELETE`
    command looks like this:


    `DELETE FROM` `table_name` `WHERE` `condition`


    What makes the `DELETE` command potentially dangerous is that it is final. Once
    you have deleted a record, there’s no going back—it’s gone forever. There’s no
    Recycle Bin or Trash to fish it out from. Even worse, the `WHERE` clause is optional.
    If you omit it, every single record in the table is irrevocably sent into cyber-oblivion.
    Consequently, it’s a good idea to display details of the record to be deleted
    and ask the user to confirm or cancel the process (see Figure [13-4](#A978-1-4842-0635-5_13_Chapter.html#Fig4)).


    ![A978-1-4842-0635-5_13_Fig4_HTML.jpg](A978-1-4842-0635-5_13_Fig4_HTML.jpg)


