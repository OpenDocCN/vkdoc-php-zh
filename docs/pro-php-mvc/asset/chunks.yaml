    ```php

    namespace Framework\Database

    {


    use Framework\Base as Base;

    use Framework\ArrayMethods as ArrayMethods;

    use Framework\Database\Exception as Exception;


    class Query extends Base

    {


    public function first()

    {


    $limit = $this->_limit;

    $offset = $this->_offset;


    $this->limit(1);

    $all = $this->all();

    $first = ArrayMethods::first($all);


    if ($limit)

    {


    $this->_limit = $limit;

    }


    if ($offset)

    {


    $this->_offset = $offset;

    }


    return $first;

    }


    public function count()

    {


    $limit = $this->limit;

    $offset = $this->offset;

    $fields = $this->fields;


    $this->_fields = array($this->from => array("COUNT(1)" => "rows"));

    $this->limit(1);


    $row = $this->first();


    $this->_fields = $fields;


    if ($fields)

    {


    $this->_fields = $fields;

    }


    if ($limit)

    {


    $this->_limit = $limit;

    }


    if ($offset)

    {


    $this->_offset = $offset;

    }


    return $row["rows"];

    }


    }

    }

    ```


    # Listing 9-13. `Database\Driver\Mysql` Data Access Method


    ```php

    namespace Framework\Database\Query

    {


    use Framework\Database as Database;

    use Framework\Database\Exception as Exception;


    class Mysql extends Database\Query

    {


    public function all()

    {


    $sql = $this->_buildSelect();

    $result = $this->connector->execute($sql);


    if ($result === false)

    {


    $error = $this->connector->lastError;

    throw new Exception\Sql("There was an error with your SQL query: {$error}");

    }


    $rows = array();


    for ($i = 0; $i < $result->num_rows; $i++)

    {


    $rows[] = $result->fetch_array(MYSQLI_ASSOC);

    }


    return $rows;

    }


    }

    }

    ```


    The `all()` method is responsible for returning a variable number of rows, based
    on the `SELECT` query performed. It calls the `_buildSelect()` method and attempts
    to execute it. If it fails, a `Database\Exception\Sql` exception is thrown. If
    it gets valid results, it will loop through them and assign the object representation
    of the returned associative arrays to the `$rows` array.


    The `first()` and `count()` methods are both based on the `all()` method. The
    `first()` method alters the `$_limit` and `$_offset` properties so that only one
    row is returned. Those properties are then reset to their original values, and
    then that single row is returned.


    The `count()` method also alters the `$_limit` and `$_offset` properties, and
    also the `$_fields` property. It adds the field `count(1)` (the most efficient
    way to return the number of rows in a single query on a table). It calls `all()`,
    gets the first row, gets the count value and then resets the `$_limit`, `$_offset`,
    and `$_fields` properties to their original values.


    With all of this database code in place, we can now perform many different kinds
    of queries using our stable, polymorphic database library. The code in Listing
    9-14 gives a good all-around example of that.


    # Listing 9-14. Example Database Usage


    ```php

    $database = new Database(array(

    "type" => "mysql",

    "options" => array(

    "host" => "localhost",

    "username" => "prophpmvc",

    "password" => "prophpmvc",

    "schema" => "prophpmvc",

    "port" => "3306"

    )

    ));


    $database = $database->initialize();


    $all = $database->query()

    ->from("users", array(

    "first_name",

    "last_name" => "surname"

    ))

    ->join("points", "points.id = users.id", array(

    "points" => "rewards"

    ))

    ->where("first_name = ?", "chris")

    ->order("last_name", "desc")

    ->limit(100)

    ->all();


    $print = print_r($all, true);

    echo "all => {$print}";


    $id = $database->query()

    ->from("users")

    ->save(array(

    "first_name" => "Liz",

    "last_name" => "Pitt"

    ));


    echo "id => {$id}\n";


    $affected = $database->query()

    ->from("users")

    ->where("first_name = ?", "Liz")

    ->delete();


    echo "affected => {$affected}\n";


    $id = $database->query()

    ->from("users")

    ->where("first_name = ?", "Chris")

    ->save(array(

    "modified" => date("Y-m-d H:i:s")

    ));


    echo "id => {$id}\n";


    $count = $database->query()

    ->from("users")

    ->count();


    echo "count => {$count}\n";

    ```'
