    # 警告


    **警告**：MySQL 的时间戳采用与 `DATETIME` 相同的格式，这意味着它们与基于 1970 年 1 月 1 日以来秒数的 Unix 和 PHP
    时间戳不兼容。切勿混用。


    ## 存储预定义列表


    MySQL 允许存储两种可被视为数据库版单选按钮和复选框状态的预定义列表：


    - `ENUM`：此列类型从预定义列表中存储单个选项，例如“是、否、不知道”或“100–110 V、220–240 V”。预定义列表最多可存储的项目数量令人难以置信——高达
    65,535 个——这称得上是一个庞大的单选按钮组！


    - `SET`：此列类型从预定义列表中存储零个或多个选项。该列表最多可容纳 64 个选项。


    尽管 `ENUM` 相当有用，但 `SET` 往往不那么有用，这主要是因为其违反了每个字段只存储一条信息的原则。`SET` 适用的场景包括记录汽车的可选附加配置或调查问卷中的多选答案。


    ## 存储二进制数据


    存储图像等二进制数据并非好主意。它会使数据库变得臃肿，而且无法直接从数据库中显示图像。不过，以下列类型是为二进制数据设计的：


    - `TINYBLOB`：最大 255 字节

    - `BLOB`：最大 64 KB

    - `MEDIUMBLOB`：最大 16 MB

    - `LONGBLOB`：最大 4 GB


    尽管名字如此奇特，但发现 `BLOB` 代表**二进制大对象**（**binary large object**）时，难免会感到有些失望。


    ## 章节回顾


    本章大部分内容致力于理论，阐述了良好数据库设计的基本原则。你需要仔细规划数据库结构，将重复信息移至单独的表中，而不是像电子表格那样将所有信息都塞进一个巨大的表里。只要为表中的每条记录赋予一个唯一标识符（即主键），你就能跟踪信息，并通过外键将其与其他表中的相关记录关联起来。外键的概念起初可能难以理解，但在阅读完本书后，你就能豁然开朗。


    你还学习了如何创建具有有限权限的 MySQL 用户账户，以及如何定义表并使用 SQL 文件导入和导出数据。下一章中，你将使用 PHP 连接到 `phpsols`
    数据库，以显示 `images` 表中存储的数据。


    ---


    # 13. 使用 PHP 和 SQL 连接数据库


    PHP 7 提供了两种连接并与 MySQL 数据库交互的方式：MySQL 改进版（`MySQLi`）和 PHP 数据对象（`PDO`）。选择哪种方式至关重要，因为它们使用不兼容的代码。你不能在同一数据库连接中混用它们。同样重要的是，不要将
    `MySQLi` 与原始 MySQL 扩展混淆，后者在 PHP 7 中已不再支持。大多数情况下，`MySQLi` 函数名称唯一的区别是多了一个字母 *I*（例如，`mysqli_query()`
    替代了 `mysql_query()`）。然而，参数的顺序通常不同，因此转换旧脚本不仅仅是在函数名中插入一个 *I* 那么简单。


    顾名思义，`MySQLi` 是专门为与 MySQL 配合使用而设计的。它也与 MariaDB 完全兼容。另一方面，`PDO` 是与数据库系统无关的。至少理论上，你只需更改几行
    PHP 代码，就能将网站从 MySQL 切换到 Microsoft SQL Server 或其他数据库系统。但在实践中，你通常需要至少重写部分 SQL 查询，因为每个数据库供应商都会在标准
    SQL 之上添加自定义函数。


    我个人偏好使用 `PDO`；但为了内容全面，其余章节将同时介绍 `MySQLi` 和 `PDO`。如果你只想专注于其中之一，忽略与另一种相关的部分即可。虽然你使用
    PHP 连接数据库并存储结果，但数据库查询需要用 SQL 编写。本章教你检索表中存储信息的基础知识。


    在本章中，我们将涵盖以下内容：


    - 使用 `MySQLi` 和 `PDO` 连接到 MySQL 和 MariaDB

    - 统计表中的记录数

    - 使用 `SELECT` 查询检索数据并将其显示在网页上

    - 使用预处理语句和其他技术确保数据安全


    ## 检查远程服务器设置


    `XAMPP` 和 `MAMP` 都支持 `MySQLi` 和 `PDO`，但你需要检查远程服务器的 PHP 配置以验证其支持程度。在你的远程服务器上运行
    `phpinfo()`，向下滚动配置页面，查找以下部分。它们是按字母顺序列出的，因此你需要向下滚动很长一段距离才能找到。


    ![images/332054_4_En_13_Chapter/332054_4_En_13_Figa_HTML.jpg](img/332054_4_En_13_Figa_HTML.jpg)


    所有托管公司都应该拥有第一个部分（`mysqli`）。如果只列出了 `mysql`（不带最后的 *I*），说明你的服务器版本已过时，存在危险。请尽快让你的托管公司为你迁移到运行新版
    PHP 7.x 的服务器上（你可以在 [`php.net/supported-versions.php`](https://php.net/supported-versions.php)
    查看当前支持的 PHP 版本）。如果你打算使用 `PDO`，你不仅需要检查 `PDO` 是否已启用，还必须确保列出了 `pdo_mysql`。`PDO` 需要针对每种数据库类型使用不同的驱动程序。


    ## PHP 如何与数据库通信


    无论你使用 `MySQLi` 还是 `PDO`，流程总是遵循以下顺序：


    1.  使用主机名、用户名、密码和数据库名连接到数据库。

    2.  准备一个 SQL 查询。

    3.  执行查询并保存结果。

    4.  从结果中提取数据（通常使用循环）。

    '
- fmt: "用户名和密码是你在第[12](#332054_4_En_12_Chapter.xhtml)章创建或由托管公司提供的账户信息。那么主机名呢？在本地测试环境中，主机名是`localhost`。令人惊讶的是，在远程服务器上它通常也是`localhost`。这是因为在很多情况下，数据库服务器与你的网站位于同一台服务器上。换句话说，显示页面的Web服务器和数据库服务器是相互本地的。然而，如果数据库服务器位于另一台机器上，你的托管公司会告知你需要使用的地址。重点是主机名*通常不*等于你网站的域名。\n\
    \n让我们快速看看如何使用每种方法连接数据库。\n\n## 使用MySQL改进版扩展连接\n\n`MySQLi`有两种接口：过程式和面向对象式。过程式接口旨在简化从原始MySQL函数的过渡。由于面向对象版本更简洁，这里采用后者。\n\
    \n要连接MySQL或MariaDB，你需要向构造函数传递四个参数来创建`mysqli`对象：主机名、用户名、密码和数据库名。以下是连接`phpsols`数据库的方式：\n\
    \n```php\n$conn = new mysqli($hostname, $username, $password, 'phpsols');\n```\n\
    \n这将连接对象存储为`$conn`。如果你的数据库服务器使用非标准端口，你需要将端口号作为第五个参数传递给`mysqli`构造函数。\n\n**提示**：MAMP使用套接字连接MySQL，即使MySQL监听端口8889，也无需添加端口号。这同时适用于`MySQLi`和`PDO`。\n\
    \n## 使用PDO连接\n\n`PDO`需要略微不同的方法。最重要的区别是：如果连接失败，`PDO`会抛出异常。如果你不捕获异常，调试信息会显示所有连接详情，包括你的用户名和密码。因此，你需要将代码包裹在`try`块中并捕获异常，以防止敏感信息泄露。\n\
    \n传递给`PDO`构造函数的第一个参数是**数据源名称(DSN)**。这是一个字符串，由`PDO`驱动名称后跟冒号，再跟`PDO`驱动特定的连接详情组成。\n\
    \n要连接MySQL或MariaDB，DSN需采用以下格式：\n\n```\n'mysql:host=hostname;dbname=databaseName'\n\
    ```\n\n如果你的数据库服务器使用非标准端口，DSN还应包含端口号，如下所示：\n\n```\n'mysql:host=hostname;port=portNumber;dbname=databaseName'\n\
    ```\n\n在DSN之后，你将用户名和密码传递给`PDO()`构造函数。因此连接`phpsols`数据库的代码如下：\n\n```php\ntry {\n\
    $conn = new PDO(\"mysql:host=$hostname;dbname=phpsols\", $username, $password);\n\
    } catch (PDOException $e) {\necho $e->getMessage();\n}\n```\n\n使用`echo`显示异常生成的消息在测试阶段是可以接受的，但在将脚本部署到实际网站时，你需要将用户重定向到错误页面，如PHP解决方案5-9所述。\n\
    \n**提示**：DSN是`PHP`代码中唯一需要更改以连接不同数据库系统的部分。所有剩余的`PDO`代码完全与数据库无关。关于如何为PostgreSQL、Microsoft\
    \ SQL Server、SQLite和其他数据库系统创建DSN的详细信息，请访问[`www.php.net/manual/en/pdo.drivers.php`](http://www.php.net/manual/en/pdo.drivers.php)。\n\
    \n## PHP解决方案13-1：制作可复用的数据库连接器\n\n连接数据库是一项常规任务，从现在开始每个页面都需要执行。这个PHP解决方案创建了一个存储在外部文件中的简单函数，用于连接数据库。它主要为测试剩余章节中不同的`MySQLi`和`PDO`脚本而设计，无需每次重新输入连接详情或在不同的连接文件之间切换。\n\
    \n1. 在`includes`文件夹中创建一个名为`connection.php`的文件，并插入以下代码（`ch13`文件夹中有一个完成脚本的副本）：\n\
    \n```php\n    <?php\n    function dbConnect($usertype, $connectionType = 'mysqli')\
    \ {\n    $host = 'localhost';\n    $db = 'phpsols';\n    if ($usertype  == 'read')\
    \ {\n    $user = 'psread';\n    $pwd = 'K1yoMizu^dera';\n    } elseif ($usertype\
    \ == 'write') {\n    $user = 'pswrite';\n    $pwd = '0Ch@Nom1$u';\n    } else\
    \ {\n    exit('Unrecognized user');\n    }\n    // Connection code goes here\n\
    \    }\n    ```\n\n   该函数接受两个参数：用户类型和连接类型。第二个参数默认为`mysqli`。如果你想专注于使用`PDO`，请将第二个参数的默认值设置为`pdo`。\n\
    \n   函数内部的前两行存储了要连接的主机服务器和数据库的名称。\n\n   条件语句检查第一个参数的值，并在`psread`和`pswrite`用户名和密码之间切换。如果用户账户无法识别，`exit()`函数会终止脚本并显示`Unrecognized\
    \ user`。\n\n2. 将`Connection code goes here`注释替换为以下内容：\n\n```php\n    if ($connectionType\
    \ == 'mysqli') {\n    $conn = @ new mysqli($host, $user, $pwd, $db);\n    if ($conn->connect_error)\
    \ {\n    exit($conn->connect_error);\n    }\n    return $conn;\n    } else {\n\
    \    try {\n    return new PDO(\"mysql:host=$host;dbname=$db\", $user, $pwd);\n\
    \    } catch (PDOException $e) {\n    echo $e->getMessage();\n    }\n    }\n \
    \   ```\n\n   如果第二个参数设置为`mysqli`，则会创建一个名为`$conn`的`MySQLi`连接对象。错误控制运算符(`@`)阻止构造函数显示错误消息。如果连接失败，原因会存储在对象的`connect_error`属性中。如果该属性为空，则视为`false`，因此下一行被跳过，并返回`$conn`对象。但如果出现问题，`exit()`会显示`connect_error`的值并终止脚本。\n\
    \n   否则，函数返回一个`PDO`连接对象。无需对`PDO`构造函数使用错误控制运算符，因为如果有问题它会抛出`PDOException`。`catch`块使用异常的`getMessage()`方法显示问题原因。\n\
    \n### 提示\n\n如果你的数据库服务器使用非标准端口，不要忘记将端口号作为第五个参数添加到`mysqli()`构造函数中，并将其包含在`PDO`的DSN中，如前几节所述。如果数据库使用套接字连接（这在macOS和Linux上很常见），则不需要这样做。\n\
    \n3. 在`phpsols`站点根文件夹中创建一个名为`connection_test.php`的文件，并插入以下代码：\n\n```php\n    <?php\n\
    \    require_once './includes/connection.php';\n    if ($conn = dbConnect('read'))\
    \ {\n    echo 'Connection successful';\n    }\n    ```\n\n   这包含了连接脚本，并使用`psread`用户账户和`MySQLi`进行测试。\n\
    \n4. 保存页面并在浏览器中加载。如果看到`Connection successful`，则一切正常。如果收到错误消息，请查阅下一节的故障排除提示。\n\n\
    5. 使用`pswrite`用户和`MySQLi`测试连接：\n\n```php\n    if ($conn = dbConnect('write'))\
    \ {\n    echo 'Connection successful';\n    }\n    ```\n\n6. 通过将`'pdo'`作为第二个参数传递给`dbConnect()`来测试两个用户账户与`PDO`的连接。"
  raw: "Username and password are the usernames and passwords of the accounts\nyou\
    \ created in Chapter [12](#332054_4_En_12_Chapter.xhtml), or of the account given\
    \ to you\nby your hosting company. But what about hostname? In a local testing\n\
    environment it’s `localhost`. What comes\nas a surprise is that it’s often `localhost`\
    \ even on a\nremote server. This is because in many cases the database server\
    \ is\nlocated on the same server as your web site. In other words, the web\nserver\
    \ that displays your pages and the database server are local to\neach other. However,\
    \ if the database server is on a separate machine,\nyour hosting company will\
    \ tell you the address to use. The important\npoint is that the hostname is *not*\
    \ usually the same as your web\nsite’s domain name.\nLet’s take a quick look at\
    \ how you connect to a database with each of\nthe methods.\n\nConnecting with\
    \ the MySQL Improved extension\nMySQLi has two interfaces: procedural and object-oriented.\
    \ The\nprocedural interface is designed to ease the transition from the\noriginal\
    \ MySQL functions. Since the object-oriented version is more\ncompact, that’s\
    \ the version adopted here.\n\nTo connect to MySQL or MariaDB, you create a `mysqli`\
    \ object by\npassing four arguments to the constructor method: the hostname,\n\
    username, password, and name of the database. This is how you connect to\nthe\
    \ `phpsols`\ndatabase:\n\n```\n$conn = new mysqli($hostname, $username, $password,\
    \ 'phpsols');\n```\n\nThis stores the connection object as `$conn`.\nIf your database\
    \ server uses a nonstandard port, you need to pass the\nport number as a fifth\
    \ argument to the `mysqli`\nconstructor.\n\nTip\nMAMP uses a socket connection\
    \ to MySQL, so there’s no need to add the\nport number even if MySQL is listening\
    \ on port 8889\\. This applies to\nboth MySQLi and PDO.\n\nConnecting with PDO\n\
    PDO requires a slightly different approach. The most important\ndifference is\
    \ that PDO throws an exception if the connection fails. If\nyou don’t catch the\
    \ exception, the debugging information displays all\nthe connection details, including\
    \ your username and password.\nConsequently, you need to wrap the code in a `try`\
    \ block and catch\nthe exception to prevent sensitive information from being displayed.\n\
    The first argument to the `PDO` constructor\nmethod is a **data source name**\
    \ (DSN). This is a string\nthat consists of the PDO driver name followed by a\
    \ colon, followed by\nPDO driver-specific connection details.\n\nTo connect to\
    \ MySQL or MariaDB, the DSN needs to be in the following\nformat:\n\n```\n'mysql:host=hostname;dbname=databaseName'\n\
    ```\n\nIf your database server is using a nonstandard port, the DSN should also\n\
    contain the port number, like this:\n\n```\n'mysql:host=hostname;port=portNumber;dbname=databaseName'\n\
    ```\n\nAfter the DSN, you pass the username and password to the `PDO()` constructor\n\
    method. So the code to connect to the `phpsols` database\nlooks like this:\n\n\
    ```\ntry {\n$conn = new PDO(\"mysql:host=$hostname;dbname=phpsols\", $username,\
    \ $password);\n} catch (PDOException $e) {\necho $e->getMessage();\n}\n```\n\n\
    Using `echo`\nto display the message generated by the exception is acceptable\
    \ during\ntesting, but when you deploy the script on a live web site, you need\
    \ to\nredirect the user to an error page, as described in PHP Solution\n5-9.\n\
    \nTip\nThe DSN is the only part of the PHP code that you need to change in\norder\
    \ to connect to a different database system. All the remaining PDO\ncode is completely\
    \ database-neutral. Details of how to create the DSN\nfor PostgreSQL, Microsoft\
    \ SQL Server, SQLite, and other database systems\ncan be found at [`www.php.net/manual/en/pdo.drivers.php`](http://www.php.net/manual/en/pdo.drivers.php)\
    \ .\n\nPHP Solution 13-1: Making a Reusable Database\nConnector\n\nConnecting\
    \ to a database is a routine chore that needs to be performed\nin every page from\
    \ now on. This PHP solution creates a simple function\nstored in an external file\
    \ that connects to the database. It’s designed\nmainly for testing the different\
    \ MySQLi and PDO scripts in the remaining\nchapters without the need to retype\
    \ the connection details each time or\nto switch between different connection\
    \ files.\n\n1.  Create a file called `connection.php` in the\n    `includes` folder\n\
    \    and insert the following code (there’s a copy of\n    the completed script\
    \ in the `ch13` folder):\n\n```\n    <?php\n    function dbConnect($usertype,\
    \ $connectionType = 'mysqli') {\n    $host = 'localhost';\n    $db = 'phpsols';\n\
    \    if ($usertype  == 'read') {\n    $user = 'psread';\n    $pwd = 'K1yoMizu^dera';\n\
    \    } elseif ($usertype == 'write') {\n    $user = 'pswrite';\n    $pwd = '0Ch@Nom1$u';\n\
    \    } else {\n    exit('Unrecognized user');\n    }\n    // Connection code goes\
    \ here\n    }\n    ```\n\nThe function takes two arguments: the user type and\
    \ the connection\n    type. The second argument defaults to `mysqli`. If you want\n\
    \    to concentrate on using PDO, set the default value of the second\n    argument\
    \ to `pdo`.\n\nThe first two lines inside the function store the names of the\
    \ host\n    server and the database that you want to connect to.\n\nThe conditional\
    \ statement checks the value of the first argument and\n    switches between the\
    \ `psread` and `pswrite` username and\n    password as appropriate. If the user\
    \ account is unrecognized, the `exit()` function  halts the script and\n    displays\
    \ `Unrecognized user`.\n\n2.  Replace the `Connection code goes here` comment\
    \ with the following:\n\n```\n    if ($connectionType == 'mysqli') {\n    $conn\
    \ = @ new mysqli($host, $user, $pwd, $db);\n    if ($conn->connect_error) {\n\
    \    exit($conn->connect_error);\n    }\n    return $conn;\n    } else {\n   \
    \ try {\n    return new PDO(\"mysql:host=$host;dbname=$db\", $user, $pwd);\n \
    \   } catch (PDOException $e) {\n    echo $e->getMessage();\n    }\n    }\n  \
    \  ```\n\nIf the second argument is set to `mysqli`, a MySQLi\n    connection\
    \ object called `$conn` is created. The\n    error control operator (`@`) prevents\
    \ the\n    constructor method from displaying error messages. If the connection\n\
    \    fails, the reason is stored in the object’s `connect_error`\n    property.\
    \ If it’s empty, it’s treated as `false`, so the next\n    line is skipped, and\
    \ the `$conn` object is\n    returned. But if there’s a problem, `exit()` displays\
    \ the\n    value of `connect_error` and\n    brings the script to a halt.\n\n\
    Otherwise, the function returns a PDO connection object. There’s no\n    need\
    \ to use the error control operator with the `PDO` constructor\n    because it\
    \ throws a `PDOException` if\n    there’s a problem. The `catch` block uses the\n\
    \    exception’s `getMessage()`\n    method  to\n    display the cause of the\
    \ problem.\n\n### Tip\n\nIf your database server uses a nonstandard port, don’t\
    \ forget to add\n    the port number as the fifth argument to the `mysqli()` constructor\n\
    \    and to include it in the PDO DSN, as described in the preceding\n    sections.\
    \ This isn’t necessary if the database uses a socket connection,\n    which is\
    \ common on macOS and Linux.\n\n3.  Create a file called `connection_test.php`\n\
    \    in the `phpsols`\n    site root folder and insert the following code:\n\n\
    ```\n    <?php\n    require_once './includes/connection.php';\n    if ($conn =\
    \ dbConnect('read')) {\n    echo 'Connection successful';\n    }\n    ```\n\n\
    This includes the connection script and tests it with the `psread` user account\n\
    \    and MySQLi.\n\n4.  Save the page and load it in a browser. If you see `Connection\
    \ successful`, all is well. If you get an error message, consult the\n    troubleshooting\
    \ hints in the next section.\n\n5.  Test the connection with the `pswrite` user\
    \ and\n    MySQLi:\n\n```\n    if ($conn = dbConnect('write')) {\n    echo 'Connection\
    \ successful';\n    }\n    ```\n\n6.  Test both user accounts with PDO by adding\
    \ `'pdo'` as the second\n    argument to `dbConnect()`."
  trans: "\n用户名和密码是你在第 12 章创建或由托管公司提供的账户信息。那么主机名呢？在本地测试环境中，主机名是`localhost`。令人惊讶的是，在远程服务器上它通常也是`localhost`。这是因为在很多情况下，数据库服务器与你的网站位于同一台服务器上。换句话说，显示页面的\
    \ Web 服务器和数据库服务器是相互本地的。然而，如果数据库服务器位于另一台机器上，你的托管公司会告知你需要使用的地址。重点是主机名*通常不*等于你网站的域名。\n\
    \n让我们快速看看如何使用每种方法连接数据库。\n\n## 使用 MySQL 改进版扩展连接\n\n`MySQLi`有两种接口：过程式和面向对象式。过程式接口旨在简化从原始\
    \ MySQL 函数的过渡。由于面向对象版本更简洁，这里采用后者。\n\n要连接 MySQL 或 MariaDB，你需要向构造函数传递四个参数来创建`mysqli`对象：主机名、用户名、密码和数据库名。以下是连接`phpsols`数据库的方式：\n\
    \n```php\n$conn = new mysqli($hostname, $username, $password, 'phpsols');\n```\n\
    \n这将连接对象存储为`$conn`。如果你的数据库服务器使用非标准端口，你需要将端口号作为第五个参数传递给`mysqli`构造函数。\n\n**提示**：MAMP\
    \ 使用套接字连接 MySQL，即使 MySQL 监听端口 8889，也无需添加端口号。这同时适用于`MySQLi`和`PDO`。\n\n## 使用 PDO\
    \ 连接\n\n`PDO`需要略微不同的方法。最重要的区别是：如果连接失败，`PDO`会抛出异常。如果你不捕获异常，调试信息会显示所有连接详情，包括你的用户名和密码。因此，你需要将代码包裹在`try`块中并捕获异常，以防止敏感信息泄露。\n\
    \n传递给`PDO`构造函数的第一个参数是**数据源名称(DSN)**。这是一个字符串，由`PDO`驱动名称后跟冒号，再跟`PDO`驱动特定的连接详情组成。\n\
    \n要连接 MySQL 或 MariaDB，DSN 需采用以下格式：\n\n```\n'mysql:host=hostname;dbname=databaseName'\n\
    ```\n\n如果你的数据库服务器使用非标准端口，DSN 还应包含端口号，如下所示：\n\n```\n'mysql:host=hostname;port=portNumber;dbname=databaseName'\n\
    ```\n\n在 DSN 之后，你将用户名和密码传递给`PDO()`构造函数。因此连接`phpsols`数据库的代码如下：\n\n```php\ntry {\n\
    $conn = new PDO(\"mysql:host=$hostname;dbname=phpsols\", $username, $password);\n\
    } catch (PDOException $e) {\necho $e->getMessage();\n}\n```\n\n使用`echo`显示异常生成的消息在测试阶段是可以接受的，但在将脚本部署到实际网站时，你需要将用户重定向到错误页面，如\
    \ PHP 解决方案 5-9 所述。\n\n**提示**：DSN 是`PHP`代码中唯一需要更改以连接不同数据库系统的部分。所有剩余的`PDO`代码完全与数据库无关。关于如何为\
    \ PostgreSQL、Microsoft SQL Server、SQLite 和其他数据库系统创建 DSN 的详细信息，请访问[`www.php.net/manual/en/pdo.drivers.php`](http://www.php.net/manual/en/pdo.drivers.php)。\n\
    \n## PHP 解决方案 13-1：制作可复用的数据库连接器\n\n连接数据库是一项常规任务，从现在开始每个页面都需要执行。这个 PHP 解决方案创建了一个存储在外部文件中的简单函数，用于连接数据库。它主要为测试剩余章节中不同的`MySQLi`和`PDO`脚本而设计，无需每次重新输入连接详情或在不同的连接文件之间切换。\n\
    \n1. 在`includes`文件夹中创建一个名为`connection.php`的文件，并插入以下代码（`ch13`文件夹中有一个完成脚本的副本）：\n\
    \n```php\n    <?php\n    function dbConnect($usertype, $connectionType = 'mysqli')\
    \ {\n    $host = 'localhost';\n    $db = 'phpsols';\n    if ($usertype  == 'read')\
    \ {\n    $user = 'psread';\n    $pwd = 'K1yoMizu^dera';\n    } elseif ($usertype\
    \ == 'write') {\n    $user = 'pswrite';\n    $pwd = '0Ch@Nom1$u';\n    } else\
    \ {\n    exit('Unrecognized user');\n    }\n    // Connection code goes here\n\
    \    }\n    ```\n\n   该函数接受两个参数：用户类型和连接类型。第二个参数默认为`mysqli`。如果你想专注于使用`PDO`，请将第二个参数的默认值设置为`pdo`。\n\
    \n   函数内部的前两行存储了要连接的主机服务器和数据库的名称。\n\n   条件语句检查第一个参数的值，并在`psread`和`pswrite`用户名和密码之间切换。如果用户账户无法识别，`exit()`函数会终止脚本并显示`Unrecognized\
    \ user`。\n\n2. 将`Connection code goes here`注释替换为以下内容：\n\n```php\n    if ($connectionType\
    \ == 'mysqli') {\n    $conn = @ new mysqli($host, $user, $pwd, $db);\n    if ($conn->connect_error)\
    \ {\n    exit($conn->connect_error);\n    }\n    return $conn;\n    } else {\n\
    \    try {\n    return new PDO(\"mysql:host=$host;dbname=$db\", $user, $pwd);\n\
    \    } catch (PDOException $e) {\n    echo $e->getMessage();\n    }\n    }\n \
    \   ```\n\n   如果第二个参数设置为`mysqli`，则会创建一个名为`$conn`的`MySQLi`连接对象。错误控制运算符(`@`)阻止构造函数显示错误消息。如果连接失败，原因会存储在对象的`connect_error`属性中。如果该属性为空，则视为`false`，因此下一行被跳过，并返回`$conn`对象。但如果出现问题，`exit()`会显示`connect_error`的值并终止脚本。\n\
    \n   否则，函数返回一个`PDO`连接对象。无需对`PDO`构造函数使用错误控制运算符，因为如果有问题它会抛出`PDOException`。`catch`块使用异常的`getMessage()`方法显示问题原因。\n\
    \n### 提示\n\n如果你的数据库服务器使用非标准端口，不要忘记将端口号作为第五个参数添加到`mysqli()`构造函数中，并将其包含在`PDO`的 DSN\
    \ 中，如前几节所述。如果数据库使用套接字连接（这在 macOS 和 Linux 上很常见），则不需要这样做。\n\n3. 在`phpsols`站点根文件夹中创建一个名为`connection_test.php`的文件，并插入以下代码：\n\
    \n```php\n    <?php\n    require_once './includes/connection.php';\n    if ($conn\
    \ = dbConnect('read')) {\n    echo 'Connection successful';\n    }\n    ```\n\n\
    \   这包含了连接脚本，并使用`psread`用户账户和`MySQLi`进行测试。\n\n4. 保存页面并在浏览器中加载。如果看到`Connection\
    \ successful`，则一切正常。如果收到错误消息，请查阅下一节的故障排除提示。\n\n5. 使用`pswrite`用户和`MySQLi`测试连接：\n\
    \n```php\n    if ($conn = dbConnect('write')) {\n    echo 'Connection successful';\n\
    \    }\n    ```\n\n6. 通过将`'pdo'`作为第二个参数传递给`dbConnect()`来测试两个用户账户与`PDO`的连接。\n"
- fmt: "7.  Assuming all went well, you’re ready to start interacting with the `phpsols`\
    \ database. If you ran into problems, check out the next section.\n\n## Troubleshooting\
    \ Database Connection Problems\n\nThe most common cause of failure when connecting\
    \ to a database is getting the username or password wrong. Passwords and usernames\
    \ are case-sensitive. Check the spelling carefully. For example, the following\
    \ screenshot shows what happens if you change `psread` to `Psread`.\n\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figb_HTML.jpg](images/332054_4_En_13_Chapter/332054_4_En_13_Figb_HTML.jpg)\n\
    \nAccess has been denied because there’s no such user. The initial cap in the\
    \ username makes all the difference. But even if the username is right, you may\
    \ get the same error message, like this:\n\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figc_HTML.jpg](images/332054_4_En_13_Chapter/332054_4_En_13_Figc_HTML.jpg)\n\
    \nThis totally confuses many people. The error message confirms that you’re using\
    \ a password. So why is access denied? It’s the wrong password, that’s why. If\
    \ the error message says `using password: NO`, it means you’ve forgotten to supply\
    \ the password. The phrase `using password` is a clue that the problem is related\
    \ to login credentials. When the phrase is missing, it indicates a different problem,\
    \ as shown in the next screenshot.\n\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figd_HTML.jpg](images/332054_4_En_13_Chapter/332054_4_En_13_Figd_HTML.jpg)\n\
    \nThe problem here is that the name of the database is incorrect. If you misspell\
    \ the host, you’ll get a message that no such host is known. The screenshots in\
    \ this section were generated by MySQLi. PDO generates the same messages, but\
    \ includes error numbers and codes as well.\n\n## Sanitizing text results from\
    \ a database\n\nWhen displaying results of an SQL query, you can be confident\
    \ that values stored in certain types of columns will be in a specific format.\
    \ For example, numeric column types can store only numbers. Similarly, date- and\
    \ time-related columns store values only in the ISO date-time format. However,\
    \ text-related columns can store any type of string, including HTML, JavaScript,\
    \ and other executable code. When outputting values from a text-related column,\
    \ you should always sanitize them to prevent arbitrary code from being executed.\n\
    \nThe simple way to sanitize text output is to pass it to `htmlspecialchars()`.\
    \ This function is related to `htmlentities()`, but it converts a more restricted\
    \ range of characters to their equivalent HTML character entities. Specifically,\
    \ it converts ampersands, quotes, and angle brackets; but it leaves periods (dots)\
    \ untouched. This has the effect of neutralizing attempts to execute code when\
    \ displayed in a browser because the angle brackets of `<script>` and PHP tags\
    \ are converted. It’s important not to convert dots because they’re used in the\
    \ names of files that we want to display.\n\nThe drawback with `htmlspecialchars()`\
    \ is that by default it double encodes existing character entities. As a result,\
    \ `&amp;` is converted to `&amp;amp;`. You can turn off this default behavior\
    \ by passing `false` as the fourth argument to `htmlspecialchars()`.\n\nTyping\
    \ out four arguments every time you want to invoke `htmlspecialchars()` is tedious.\
    \ So, I have defined the following custom function in a file called `utility_funcs.php`\
    \ in the `ch13` folder:\n\n```\nfunction safe($text) {\nreturn htmlspecialchars($text,\
    \ ENT_COMPAT|ENT_HTML5, 'UTF-8', false);\n}\n```\n\nThis simply passes `$text`\
    \ to `htmlspecialchars()`, setting three optional arguments, and returns the result.\
    \ The other arguments are as follows:\n\n- `ENT_COMPAT|ENT_HTML5`: Converts double\
    \ quotes to entities, but leaves single quotes untouched, and treats the output\
    \ as HTML5\n- `UTF-8`: Sets the encoding to UTF-8\n- `false`: Turns off the double\
    \ encoding of HTML character entities\n\nCopy `utility_funcs.php` to the `includes`\
    \ folder, and include it in scripts that output text from the database.\n\nAs\
    \ an alternative to `htmlspecialchars()`, you can pass text values to `strip_tags()`,\
    \ which allows you to specify permitted HTML tags (see “Accessing Remote Files”\
    \ in Chapter 7).\n\n## Querying the database and displaying the results\n\nBefore\
    \ you attempt to display the results of a database query, it’s a good idea to\
    \ find out how many results there are. If there aren’t any results, you’ll have\
    \ nothing to display. It’s also necessary for creating a navigation system for\
    \ paging through a long set of results (you’ll learn how to do that in the next\
    \ chapter). In user authentication (covered in Chapter 19), no results when searching\
    \ for a username and password mean that the login should fail.\n\nMySQLi and PDO\
    \ use different approaches to counting and displaying results. The next two PHP\
    \ solutions show how to do it with MySQLi. For PDO, skip ahead to PHP Solution\
    \ 13-4.\n\n### PHP Solution 13-2: Counting records in a Result Set (MySQLi)\n\n\
    This PHP solution shows how to submit an SQL query that selects all the records\
    \ in the `images` table and stores the result in a `MySQLi_Result` object. The\
    \ object’s `num_rows` property contains the number of records retrieved by the\
    \ query.\n\n1.  Create a new folder called `mysqli` in the `phpsols-4e` site root,\
    \ then create a new file called `mysqli.php` inside the folder. The page will\
    \ eventually be used to display a table, so it should have a `DOCTYPE` declaration\
    \ and an HTML skeleton.\n\n2.  Include the connection file in a PHP block above\
    \ the `DOCTYPE` declaration, and connect to the `phpsols` database using the account\
    \ with read-only privileges like this:\n\n```\n    require_once '../includes/connection.php';\n\
    \    $conn = dbConnect('read');\n```\n\n3.  Next, prepare the SQL query. Add this\
    \ code immediately after the previous step (but before the closing PHP tag):\n\
    \n```\n    $sql = 'SELECT * FROM images';\n```\n\nThis means “select everything\
    \ from the `images` table.” The asterisk (`*`) is shorthand for “all columns.”\n\
    \n4.  Now execute the query by calling the `query()` method on the connection\
    \ object and passing the SQL query as an argument, like this:\n\n```\n    $result\
    \ = $conn->query($sql);\n```\n\nThe result is stored in a variable, which I have\
    \ imaginatively named `$result`.\n\n5.  If there’s a problem, `$result` will be\
    \ `false`. To find out what the problem is, we need to get the error message,\
    \ which is stored as the `error` property of the `mysqli` connection object. Add\
    \ the following conditional statement after the previous line:\n\n```\n    if\
    \ (!$result) {\n    $error = $conn->error;\n    }\n```\n\n6.  Assuming there’s\
    \ no problem, `$result` now holds a `MySQLi_Result` object, which has a property\
    \ called `num_rows`. To get the number of records found by the query, add an `else`\
    \ block to the conditional statement and assign the value to a variable, like\
    \ this:\n\n```\n    if (!$result) {\n    $error = $conn->error;\n    } else {\n\
    \    $numRows = $result->num_rows;\n    }\n```\n\n7.  You can now display the\
    \ result in the body of the page like this:\n\n```\n    $error\";\n    } else\
    \ {\n    echo \"A total of $numRows records were found.\";\n    }\n    ?>\n```\n\
    \nIf there’s a problem, `$error` will have been set, so it’s displayed. Otherwise,\
    \ the `else` block shows the number of records found. Both strings embed variables,\
    \ so they’re enclosed in double quotes.\n\n8.  Save `mysqli.php` and load it into\
    \ a browser. You should see the following result:\n\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Fige_HTML.jpg](images/332054_4_En_13_Chapter/332054_4_En_13_Fige_HTML.jpg)\n\
    \nCheck your code, if necessary, with `mysqli_01.php` in the `ch13` folder."
