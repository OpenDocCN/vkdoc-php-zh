    it was encrypted.


    There’s also a function called `password_needs_rehash()` that checks whether the
    encrypted password needs to be updated to the current standard. It’s designed
    to be used when a user logs in to the site. The following code assumes that the
    submitted password is stored in `$password`, that the encrypted one is in `$encrypted`,
    and that you’re using the PHP default method of encryption.


    `if (password_verify($password, $encrypted) {`


    `if (password_needs_rehash($encrypted, PASSWORD_DEFAULT)) {`


    `$encrypted = password_hash($password, PASSWORD_DEFAULT);`


    `// store the updated version of $encrypted`


    `}`


    `}`


    Performing this check every time a user logs in is almost certainly excessive.
    PHP’s policy is to change the default encryption only upon a full release, such
    as 5.7.0 or 7.0.0\. The only exception to this is in an emergency when a critical
    security flaw is found in the current default. If you keep abreast of PHP developments,
    you can create a script that updates all stored passwords in a single operation
    whenever the default changes. If you don’t have the time to follow what’s happening
    in the PHP world, using `password_needs_rehash()` every time someone logs in should
    keep your site secure, even though it might slow down the login process.


    ## Setting a Time Limit on Sessions


    By default, PHP sets the lifetime of the session cookie on the user’s computer
    to 0, which keeps the session active until the user logs out or the browser is
    closed. You can make the session timeout earlier through a call to `ini_set()`,
    the function that allows you to change some PHP configuration directives on the
    fly. As soon as the session starts, pass the directive `session.cookie_lifetime`
    as the first argument and a string containing the number of seconds you want the
    cookie to remain active as the second argument. For example, you could limit the
    session cookie’s lifetime to 10 minutes like this:


    `session_start();`


    `ini_set(''session.cookie_lifetime'', ''600'');`


    Although this is effective, it has two drawbacks. First, the expiration is set
    relative to the time on the server, not the user’s computer. If the user’s computer
    clock is wrong, the cookie might be out of date immediately, or it might persist
    much longer than you anticipate. The other problem is that the user might be automatically
    logged out without explanation. The next PHP solution offers an approach that
    is more user friendly.'
  trans: "\n### 使用 `password_verify()` 验证加密密码\n\n`password_verify()` 函数的功能正如你所期望的那样：它用于验证通过\
    \ `password_hash()` 加密的密码。该函数仅需两个参数：提交的密码和加密后的版本。若提交的密码正确，函数返回 `true`，否则返回 `false`。\n\
    \n### PHP 解决方案 9-8：使用加密登录\n\n既然你已经有了加密的密码，就需要修改登录表单以适配新的设置。只需选择包含加密密码的 CSV 文件，并使用\
    \ `password_verify()` 检查所提交密码的有效性。同样，这依赖于使用 PHP 5.5 或在脚本中包含 `password_compat`\
    \ 库。\n\n打开 PHP 解决方案 9-3 中的 `login.php`，或使用 `ch09` 文件夹中的 `login_02.php`。将 `$userlist`\
    \ 的位置改为使用加密密码：\n\n`$userlist = 'C:/private/encrypted.csv';`\n\n打开 PHP 解决方案 9-3\
    \ 中的 `includes/authenticate.php`，或使用 `ch09` 文件夹中的 `authenticate_01.php`。加密密码文件的第一行没有标题，因此删除以下注释和代码行：\n\
    \n`// 忽略 CSV 文件第一行的标题`  \n`$titles = fgetcsv($file);`\n\n找到以下代码行：\n\n`if ($data[0]\
    \ == $username && $data[1] == $password) {`\n\n将其修改为：\n\n`if ($data[0] == $username\
    \ && password_verify($password, $data[1])) {`\n\n保存 `login.php` 并进行测试。它应该与之前一样正常工作，同时更加安全。如有必要，可使用\
    \ `ch09` 文件夹中的 `login_03.php` 和 `authenticate_02.php` 检查你的代码。\n\n*   `$password`\
    \ 包含提交的密码，而 `$data[1]` 包含加密版本，因此它们作为参数传递给 `password_verify()`，该函数仅在密码正确时返回 `true`。\n\
    \nPHP 解决方案 9-3 至 9-8 构建了一个简单而有效的用户认证系统，无需数据库后端。然而，它确实存在局限性。最重要的是，包含用户名和密码的 CSV\
    \ 文件必须位于服务器根目录之外。此外，一旦记录数量增多，查询数据库通常比逐行遍历 CSV 文件快得多。第 17 章 涵盖了使用数据库进行用户认证的内容。\n\
    \n#### 保持加密与时俱进\n\n使用 PHP 5.5 新增的密码哈希函数的主要优势在于，它们被设计为能紧跟加密技术的改进。无需指定特定的加密标准，而是将\
    \ `PASSWORD_DEFAULT` 作为 `password_hash()` 的第二个参数，这能确保新注册始终使用当时被认为最安全的方法。即使默认值发生变化，`password_verify()`\
    \ 函数仍能验证现有密码，因为加密密码包含识别其加密方式的信息。\n\n还有一个名为 `password_needs_rehash()` 的函数，用于检查加密密码是否需要更新为当前标准。它被设计用于用户登录网站时。以下代码假设提交的密码存储在\
    \ `$password` 中，加密密码存储在 `$encrypted` 中，并且你使用的是 PHP 默认的加密方法。\n\n```\nif (password_verify($password,\
    \ $encrypted) {\n    if (password_needs_rehash($encrypted, PASSWORD_DEFAULT))\
    \ {\n        $encrypted = password_hash($password, PASSWORD_DEFAULT);\n      \
    \  // 存储更新后的 $encrypted\n    }\n}\n```\n\n每次用户登录都执行此检查，几乎肯定过于频繁。PHP 的策略是仅在重大版本发布（如\
    \ 5.7.0 或 7.0.0）时更改默认加密方式。唯一的例外是当当前默认加密方式发现严重安全漏洞时。如果你紧跟 PHP 的发展动态，可以在默认加密方式更改时，创建一个脚本一次性更新所有存储的密码。如果你没有时间关注\
    \ PHP 世界的变化，那么在每次登录时使用 `password_needs_rehash()` 应该能确保网站安全，尽管这可能会拖慢登录过程。\n\n##\
    \ 设置会话时间限制\n\n默认情况下，PHP 将用户计算机上的会话 cookie 的生命周期设置为 0，这会使会话保持活动状态，直到用户注销或关闭浏览器。你可以通过调用\
    \ `ini_set()` 函数来提前设置会话超时，该函数允许你动态更改某些 PHP 配置指令。在会话开始时，将指令 `session.cookie_lifetime`\
    \ 作为第一个参数，将包含 cookie 保持活动秒数的字符串作为第二个参数。例如，你可以将会话 cookie 的生命周期限制为 10 分钟，如下所示：\n\
    \n```\nsession_start();\nini_set('session.cookie_lifetime', '600');\n```\n\n尽管这很有效，但它有两个缺点。首先，过期时间是基于服务器时间，而非用户计算机时间。如果用户计算机时钟不准，cookie\
    \ 可能立即过期，或者持续的时间远超你的预期。另一个问题是，用户可能会在没有说明的情况下自动注销。下一个 PHP 解决方案提供了一种更友好的方法。\n"
- fmt: "### PHP Solution 9-9: Ending a Session after a Period of Inactivity\n\nThis\
    \ PHP solution shows how to end a session if a user doesn’t do anything within\
    \ a specified period that triggers a page to load. When the session first starts,\
    \ typically when the user logs in, the current time is stored in a session variable.\
    \ Each time the user loads a page, the session variable is compared with the current\
    \ time. If the difference is greater than a predetermined limit, the session and\
    \ its variables are destroyed. Otherwise, the variable is updated to the current\
    \ time.\n\nThese instructions assume you have set up the login system in PHP Solutions\
    \ 9-3 to 9-8.\n\nYou need to store the current time after the user’s credentials\
    \ have been authenticated but before the script redirects the user to the restricted\
    \ part of the site. Locate the following section of code in `authenticate.php`\
    \ (around lines 16–20) and insert the new code highlighted in bold as follows:\n\
    \n```\nif ($data[0] == $username && password_verify($password, $data[1])) {\n\
    \    $_SESSION['authenticated'] = 'Jethro Tull';\n    $_SESSION['start'] = time();\n\
    \    session_regenerate_id();\n    break;\n}\n```\n\nWhen a session times out,\
    \ just dumping a user unceremoniously back at the login screen isn’t very friendly,\
    \ so it’s a good idea to explain what’s happened. In `login.php`, add the code\
    \ highlighted in bold to the PHP block immediately after the opening `<body>`\
    \ tag (around lines 22–27):\n\n- The `time()` function returns a current timestamp.\
    \ By being stored in `$_SESSION['start']` it becomes available to every page that\
    \ begins with `session_start()`.\n\n```\n<?php\nif ($error) {\n    echo \"<p>$error</p>\"\
    ;\n} elseif (isset($_GET['expired'])) { ?>\n    <p>Your session has expired. Please\
    \ log in again.</p>\n<?php } ?>\n```\n\nOpen `menu.php`, cut the code in the PHP\
    \ block above the `DOCTYPE` declaration, and paste it into a new blank file. Save\
    \ the file as `session_timeout.php` in the `includes` folder, then edit the code\
    \ like this:\n\n- The message is shown if the URL contains a variable called `expired`\
    \ in a query string.\n\n```\n<?php\nsession_start();\nob_start();\n// set a time\
    \ limit in seconds\n$timelimit = 15;\n// get the current time\n$now = time();\n\
    // where to redirect if rejected\n$redirect = 'http://localhost/phpsols/sessions/login.php';\n\
    // if session variable not set, redirect to login page\nif (!isset($_SESSION['authenticated']))\
    \ {\n    header(\"Location: $redirect\");\n    exit;\n} elseif ($now > $_SESSION['start']\
    \ + $timelimit) {\n    // if timelimit has expired, destroy session and redirect\n\
    \    $_SESSION = [];\n    // invalidate the session cookie\n    if (isset($_COOKIE[session_name()]))\
    \ {\n        setcookie(session_name(), '', time()-86400, '/');\n    }\n    //\
    \ end session and redirect with query string\n    session_destroy();\n    header(\"\
    Location: {$redirect}?expired=yes\");\n    exit;\n} else {\n    // if it's got\
    \ this far, it's OK, so update start time\n    $_SESSION['start'] = time();\n\
    }\n```\n\n- The inline comments explain what is going on, and you should recognize\
    \ most of the `elseif` clause from PHP Solution 9-5. PHP measures time in seconds,\
    \ and I’ve set `$timelimit` (in line 5) to a ridiculously short 15 seconds purely\
    \ to demonstrate the effect. To set a more reasonable limit of, say, 15 minutes,\
    \ change this later, like this:\n\n`$timelimit = 15 * 60; // 15 minutes`\n\n-\
    \ You could, of course, set `$timelimit` to `900`, but why bother when PHP can\
    \ do the hard work for you?\n- If the sum of `$_SESSION['start']` plus `$timelimit`\
    \ is less than the current time (stored as `$now`), you end the session and redirect\
    \ the user to the login page. The line that performs the redirect adds a query\
    \ string to the end of the URL, as follows:\n\n`http://localhost/phpsols/sessions/login.php?expired=yes`\n\
    \nInclude `session_timeout.php` above the `DOCTYPE` declaration in `menu.php`.\
    \ The include command should be the only code in the PHP block:\n\n- The code\
    \ in step 2 takes no notice of the value of `expired`; adding `yes` as the value\
    \ just makes it look more user friendly in the browser address bar.\n- If the\
    \ script gets as far as the final `else`, it means that `$_SESSION['authenticated']`\
    \ has been set and that the time limit hasn’t been reached, so `$_SESSION['start']`\
    \ is updated to the current time, and the page displays as normal.\n\n```\n<?php\
    \ require_once '../includes/session_timeout.php'; ?>\n<!DOCTYPE HTML>\n```\n\n\
    Replace the code above the `DOCTYPE` declaration in `secretpage.php` in the same\
    \ way. Save all the pages you have edited and load either `menu.php` or `secretpage.php`\
    \ into a browser. If the page displays, click Log out. Then log back in and navigate\
    \ back and forth between `menu.php` and `secretpage.php`. Once you have verified\
    \ that the links work, wait 15 seconds or more and try to navigate back to the\
    \ other page. You should be automatically logged out and presented with the following\
    \ screen:\n\n![A978-1-4842-0635-5_9_Figk_HTML.jpg](A978-1-4842-0635-5_9_Figk_HTML.jpg)\n\
    \n- If necessary, check your code against `authenticate_03.php`, `login_04.php`,\
    \ `session_timeout.php`, `menu_05.php`, and `secretpage_04.php` in the `ch09`\
    \ folder.\n\n### Passing Information Through Multipage Forms\n\nVariables passed\
    \ through the `$_POST` and `$_GET` arrays have only a fleeting existence. Once\
    \ they have been passed to a page, they’re gone, unless you save their values\
    \ in some way. The usual method of preserving information that’s passed from one\
    \ form to another is to extract its value from the `$_POST` array and store it\
    \ in a hidden field in HTML, like this:\n\n`<input type=\"hidden\" name=\"address\"\
    \ id=\"address\" value=\"<?= $_POST['address']; ?>\">`\n\nAs their name suggests,\
    \ hidden fields are part of a form’s code, but nothing is displayed onscreen.\
    \ Hidden fields are fine for one or two items, but say you have a survey that’s\
    \ spread over four pages. If you have 10 items on a page, you need a total of\
    \ 60 hidden fields (10 on the second page, 20 on the third, and 30 on the fourth).\
    \ Session variables can save you all that coding. They can also make sure that\
    \ visitors always start on the right page of a multipage form."
  raw: '### PHP Solution 9-9: Ending a Session after a Period of Inactivity


    This PHP solution shows how to end a session if a user doesn’t do anything within
    a specified period that triggers a page to load. When the session first starts,
    typically when the user logs in, the current time is stored in a session variable.
    Each time the user loads a page, the session variable is compared with the current
    time. If the difference is greater than a predetermined limit, the session and
    its variables are destroyed. Otherwise, the variable is updated to the current
    time.


    These instructions assume you have set up the login system in PHP Solutions 9-3
    to 9-8.


    You need to store the current time after the user’s credentials have been authenticated
    but before the script redirects the user to the restricted part of the site. Locate
    the following section of code in `authenticate.php` (around lines 16–20) and insert
    the new code highlighted in bold as follows:


    `if ($data[0] == $username && password_verify($password, $data[1])) {`


    `$_SESSION[''authenticated''] = ''Jethro Tull'';`


    `$_SESSION[''start''] = time();`


    `session_regenerate_id();`


    `break;`


    `}`


    When a session times out, just dumping a user unceremoniously back at the login
    screen isn’t very friendly, so it’s a good idea to explain what’s happened. In
    `login.php`, add the code highlighted in bold to the PHP block immediately after
    the opening `<body>` tag (around lines 22–27):


    *   The `time()` function returns a current timestamp. By being stored in `$_SESSION[''start'']`
    it becomes available to every page that begins with `session_start()`.


    `<?php`


    `if ($error) {`


    `echo "<p>$error</p>";`


    `}` `elseif (isset($_GET[''expired''])) { ?>`


    `<p>Your session has expired. Please log in again.</p>`


    `<?php }` `?>`


    Open `menu.php`, cut the code in the PHP block above the `DOCTYPE` declaration,
    and paste it into a new blank file.   Save the file as `session_timeout.php` in
    the `includes` folder, then edit the code like this:


    *   The message is shown if the URL contains a variable called `expired` in a
    query string.


    `<?php`


    `session_start();`


    `ob_start();`


    `// set a time limit in seconds`


    `$timelimit = 15;`


    `// get the current time`


    `$now = time();`


    `// where to redirect if rejected`


    `$redirect = ''` `http://localhost/phpsols/sessions/login.php` `'';`


    `// if session variable not set, redirect to login page`


    `if (!isset($_SESSION[''authenticated''])) {`


    `header(` `"Location: $redirect"` `);`


    `exit;`


    `}` `elseif ($now > $_SESSION[''start''] + $timelimit) {`


    `// if timelimit has expired, destroy session and redirect`


    `$_SESSION = [];`


    `// invalidate the session cookie`


    `if (isset($_COOKIE[session_name()])) {`


    `setcookie(session_name(), '''', time()-86400, ''/'');`


    `}`


    `// end session and redirect with query string`


    `session_destroy();`


    `header("Location: {$redirect}?expired=yes");`


    `exit;`


    `} else {`


    `// if it''s got this far, it''s OK, so update start time`


    `$_SESSION[''start''] = time();`


    `}`


    *   The inline comments explain what is going on, and you should recognize most
    of the `elseif` clause from PHP Solution 9-5\. PHP measures time in seconds, and
    I’ve set `$timelimit` (in line 5) to a ridiculously short 15 seconds purely to
    demonstrate the effect. To set a more reasonable limit of, say, 15 minutes, change
    this later, like this:


    `$timelimit = 15` `* 60` `; // 15 minutes`


    *   You could, of course, set `$timelimit` to `900`, but why bother when PHP can
    do the hard work for you?

    *   If the sum of `$_SESSION[''start'']` plus `$timelimit` is less than the current
    time (stored as `$now`), you end the session and redirect the user to the login
    page. The line that performs the redirect adds a query string to the end of the
    URL, as follows:


    `http://localhost/phpsols/sessions/login.php?expired=yes`


    Include `session_timeout.php` above the `DOCTYPE` declaration in `menu.php`. The
    include command should be the only code in the PHP block:


    *   The code in step 2 takes no notice of the value of `expired`; adding `yes`
    as the value just makes it look more user friendly in the browser address bar.

    *   If the script gets as far as the final `else`, it means that `$_SESSION[''authenticated'']`
    has been set and that the time limit hasn’t been reached, so `$_SESSION[''start'']`
    is updated to the current time, and the page displays as normal.


    `<?php` `require_once ''../includes/session_timeout.php'';` `?>`


    `<!DOCTYPE HTML>`


    Replace the code above the `DOCTYPE` declaration in `secretpage.php` in the same
    way.   Save all the pages you have edited and load either `menu.php` or `secretpage.php`
    into a browser. If the page displays, click Log out. Then log back in and navigate
    back and forth between `menu.php` and `secretpage.php`. Once you have verified
    that the links work, wait 15 seconds or more and try to navigate back to the other
    page. You should be automatically logged out and presented with the following
    screen:


    ![A978-1-4842-0635-5_9_Figk_HTML.jpg](A978-1-4842-0635-5_9_Figk_HTML.jpg)


    *   If necessary, check your code against `authenticate_03.php`, `login_04.php`,
    `session_timeout.php`, `menu_05.php`, and `secretpage_04.php` in the `ch09` folder.


    ## Passing Information Through Multipage Forms


    Variables passed through the `$_POST` and `$_GET` arrays have only a fleeting
    existence. Once they have been passed to a page, they’re gone, unless you save
    their values in some way. The usual method of preserving information that’s passed
    from one form to another is to extract its value from the `$_POST` array and store
    it in a hidden field in HTML, like this:


    `<input type="hidden" name="address" id="address" value="<?= $_POST[''address''];
    ?>">`


    As their name suggests, hidden fields are part of a form’s code, but nothing is
    displayed onscreen. Hidden fields are fine for one or two items, but say you have
    a survey that’s spread over four pages. If you have 10 items on a page, you need
    a total of 60 hidden fields (10 on the second page, 20 on the third, and 30 on
    the fourth). Session variables can save you all that coding. They can also make
    sure that visitors always start on the right page of a multipage form.'
  trans: "\n### PHP 方案 9-9：在一段非活动时间后结束会话\n\n本 PHP 方案演示了如何在用户于指定时间段内未进行任何触发页面加载的操作时结束会话。当会话首次启动时（通常在用户登录时），当前时间会被存储在一个会话变量中。每当用户加载页面时，该会话变量都会与当前时间进行比较：如果时间差超过预设限制，则销毁会话及其变量；否则，将该变量更新为当前时间。\n\
    \n以下说明假设你已经按照 PHP 方案 9-3 至 9-8 设置了登录系统。\n\n你需要将当前时间存储在用户凭证验证通过之后、但脚本将用户重定向到网站受限制部分之前。在\
    \ `authenticate.php` 中找到以下代码段（大约在第 16-20 行），并插入以下粗体显示的新代码：\n\n```\nif ($data[0]\
    \ == $username && password_verify($password, $data[1])) {\n    $_SESSION['authenticated']\
    \ = 'Jethro Tull';\n    $_SESSION['start'] = time();\n    session_regenerate_id();\n\
    \    break;\n}\n```\n\n当会话超时时，直接将用户毫不客气地丢回登录屏幕并不友好，因此最好解释一下发生了什么。在 `login.php`\
    \ 中，在紧接 `<body>` 标签（大约在第 22-27 行）后的 PHP 代码块中添加以下粗体显示的代码：\n\n- `time()` 函数会返回一个当前时间戳。通过将其存储在\
    \ `$_SESSION['start']` 中，它变得对所有以 `session_start()` 开头的页面都可用。\n\n```\n<?php\nif\
    \ ($error) {\n    echo \"<p>$error</p>\";\n} elseif (isset($_GET['expired']))\
    \ { ?>\n    <p>您的会话已过期。请重新登录。</p>\n<?php } ?>\n```\n\n打开 `menu.php`，剪切 `DOCTYPE`\
    \ 声明上方 PHP 代码块中的代码，并将其粘贴到一个新的空白文件中。将该文件保存为 `includes` 文件夹下的 `session_timeout.php`，然后按如下方式编辑代码：\n\
    \n- 如果 URL 的查询字符串中包含名为 `expired` 的变量，则会显示该消息。\n\n```\n<?php\nsession_start();\n\
    ob_start();\n// 设置时间限制（单位：秒）\n$timelimit = 15;\n// 获取当前时间\n$now = time();\n//\
    \ 如果被拒绝，重定向到的页面\n$redirect = 'http://localhost/phpsols/sessions/login.php';\n\
    // 如果未设置会话变量，则重定向到登录页面\nif (!isset($_SESSION['authenticated'])) {\n    header(\"\
    Location: $redirect\");\n    exit;\n} elseif ($now > $_SESSION['start'] + $timelimit)\
    \ {\n    // 如果已超时，销毁会话并重定向\n    $_SESSION = [];\n    // 使会话 cookie 失效\n    if\
    \ (isset($_COOKIE[session_name()])) {\n        setcookie(session_name(), '', time()-86400,\
    \ '/');\n    }\n    // 结束会话并使用查询字符串重定向\n    session_destroy();\n    header(\"\
    Location: {$redirect}?expired=yes\");\n    exit;\n} else {\n    // 如果代码执行到这里，说明一切正常，因此更新开始时间\n\
    \    $_SESSION['start'] = time();\n}\n```\n\n- 行内注释解释了发生了什么，你应该能认出 `elseif` 子句中的大部分内容（来自\
    \ PHP 方案 9-5）。PHP 以秒为单位衡量时间，我将 `$timelimit`（第 5 行）设置为了极其短暂的 15 秒，纯粹是为了演示效果。若要设置一个更合理的限制，例如\
    \ 15 分钟，之后可以这样修改：\n\n`$timelimit = 15 * 60; // 15 分钟`\n\n- 当然，你也可以将 `$timelimit`\
    \ 设置为 `900`，但当 PHP 可以帮你完成繁重工作时，何必自寻烦恼呢？\n- 如果 `$_SESSION['start']` 加上 `$timelimit`\
    \ 的和小于当前时间（存储为 `$now`），你就结束会话并将用户重定向到登录页面。执行重定向的那一行会在 URL 末尾添加一个查询字符串，如下所示：\n\n\
    `http://localhost/phpsols/sessions/login.php?expired=yes`\n\n在 `menu.php` 的 `DOCTYPE`\
    \ 声明上方包含 `session_timeout.php`。include 命令应为 PHP 代码块中的唯一代码：\n\n- 第 2 步中的代码不关心 `expired`\
    \ 的值；将值设为 `yes` 只是为了让它在浏览器地址栏中看起来更友好。\n- 如果脚本执行到了最后的 `else`，这意味着 `$_SESSION['authenticated']`\
    \ 已设置且未达到时间限制，因此 `$_SESSION['start']` 被更新为当前时间，页面正常显示。\n\n```\n<?php require_once\
    \ '../includes/session_timeout.php'; ?>\n<!DOCTYPE HTML>\n```\n\n用同样的方式替换 `secretpage.php`\
    \ 中 `DOCTYPE` 声明上方的代码。保存所有已编辑的页面，并将 `menu.php` 或 `secretpage.php` 加载到浏览器中。如果页面显示，请点击“退出”。然后重新登录，并在\
    \ `menu.php` 和 `secretpage.php` 之间来回导航。一旦确认链接正常工作，等待 15 秒或更长时间，再尝试导航回另一个页面。你应会被自动注销，并看到以下画面：\n\
    \n![A978-1-4842-0635-5_9_Figk_HTML.jpg](img/A978-1-4842-0635-5_9_Figk_HTML.jpg)\n\
    \n- 如有必要，请根据 `ch09` 文件夹中的 `authenticate_03.php`、`login_04.php`、`session_timeout.php`、`menu_05.php`\
    \ 和 `secretpage_04.php` 检查你的代码。\n\n### 在多页表单间传递信息\n\n通过 `$_POST` 和 `$_GET` 数组传递的变量只具有短暂的存在性。一旦它们被传递到某个页面，除非你以某种方式保存其值，否则它们就会消失。在表单之间传递信息的常用方法是从\
    \ `$_POST` 数组中提取其值，并将其存储在 HTML 的隐藏字段中，如下所示：\n\n`<input type=\"hidden\" name=\"\
    address\" id=\"address\" value=\"<?= $_POST['address']; ?>\">`\n\n顾名思义，隐藏字段是表单代码的一部分，但屏幕上不会显示任何内容。隐藏字段适用于一两个项目，但假设你有一个分布在四页上的调查。如果每页有\
    \ 10 个项目，那么你总共需要 60 个隐藏字段（第二页 10 个，第三页 20 个，第四页 30 个）。会话变量可以帮你省去所有这些编码工作。它们还可以确保访问者始终从多页表单的正确页面开始。\n"
- fmt: "### PHP Solution 9-10: Using Sessions for a Multipage Form\n\nIn this PHP\
    \ solution you’ll build a script for use in multipage forms that gathers data\
    \ from the `$_POST` array and assigns it to session variables. The script automatically\
    \ redirects the user to the first page of the form if an attempt is made to access\
    \ any other part of the form first.\n\nCopy `multiple_01.php`, `multiple_02.php`,\
    \ `multiple_03.php`, and `multiple_04.php` from the `ch09` folder to the `sessions`\
    \ folder. The first three pages contain simple forms that ask for the user’s name,\
    \ age, and address. The `action` attribute of each `<form>` tag is empty, so the\
    \ forms are self-processing, but they don’t yet contain any processing script.\
    \ The final page is where the data from the first three pages will eventually\
    \ be displayed.\n\nAdd the following code in a PHP block above the `DOCTYPE` declaration\
    \ in `multiple_01.php`:\n\n```\nif (isset($_POST['next'])) {\n    session_start();\n\
    \    // set a variable to control access to other pages\n    $_SESSION['formStarted']\
    \ = true;\n    // set required fields\n    $required = 'first_name';\n    $firstPage\
    \ = 'multiple_01.php';\n    $nextPage = 'multiple_02.php';\n    $submit = 'next';\n\
    \    require_once '../includes/multiform.php';\n}\n```\n\nCreate a file called\
    \ `multiform.php` in the `includes` folder. Delete any HTML markup and insert\
    \ the following code:\n\n* The `name` attribute of the Submit button is `next`,\
    \ so the code in this block runs only if the form has been submitted. It initiates\
    \ a session and creates a session variable that will be used to control access\
    \ to the other form pages.\n* Next come four variables that will be used by the\
    \ script that processes the multipage form:\n    * `$required`: This is an array\
    \ of the `name` attributes of required fields in the current page. If only one\
    \ field is required, a string can be used instead of an array. If no fields are\
    \ required, it can be omitted.\n    * `$firstPage`: The filename of the first\
    \ page of the form\n    * `$nextPage`: The filename of the next page in the form\n\
    \    * `$submit`: The name of the Submit button in the current page\n* Finally,\
    \ the code includes the script that processes the multipage form.\n\n```\n<?php\n\
    if (!isset($_SESSION)) {\n    session_start();\n}\n$filename = basename($_SERVER['SCRIPT_FILENAME']);\n\
    $current = 'http://' . $_SERVER['HTTP_HOST'] . $_SERVER['PHP_SELF'];\n```\n\n\
    Now that you have both the name of the current file and its URL, you can use `str_replace()`\
    \ to create the URLs for the first and next pages, like this:\n\n* Each page of\
    \ the multipage form needs to call `session_start()`, but calling it twice on\
    \ the same page generates an error, so the conditional statement first checks\
    \ whether the `$_SESSION` superglobal variable is accessible. If it isn’t, it\
    \ initiates the session for the page.\n* After the conditional statement, `$_SERVER['SCRIPT_FILENAME']`\
    \ is passed to the `basename()` function to extract the filename of the current\
    \ page. This is the same technique that you used in PHP Solution 4-3.\n* `$_SERVER['SCRIPT_FILENAME']`\
    \ contains the path of the parent file, so when this script is included in `multiple_01.php`,\
    \ the value of `$filename` will be `multiple_01.php`, not `multiform.php`.\n*\
    \ The next line builds the URL for the current page from the string `http://`\
    \ and the values of `$_SERVER['HTTP_HOST']`, which contains the current domain\
    \ name, and `$_SERVER['PHP_SELF']`, which contains the path of the current file\
    \ minus the domain name. If you’re testing locally, when you load the first page\
    \ of the multipage form `$current` is `http://localhost/phpsols/sessions/multiple_01.php`.\n\
    \n```\n$redirectFirst = str_replace($filename, $firstPage, $current);\n$redirectNext\
    \ = str_replace($filename, $nextPage, $current);\n```\n\nTo prevent users from\
    \ accessing the multipage form without starting at the beginning, add a conditional\
    \ statement that checks the value of `$filename`. If it’s not the same as the\
    \ first page, and `$_SESSION['formStarted']` hasn’t been created, the `header()`\
    \ function redirects to the first page, like this:\n\n* The first argument to\
    \ `str_replace()` is the string you want to replace, the second is the replacement\
    \ string, and the third is the target string. In step 2, you set `$firstPage`\
    \ to `multiple_01.php` and `$nextPage` to `multiple_02.php`. As a result, `$redirectFirst`\
    \ becomes `http://localhost/phpsols/sessions/multiple_01.php`, and `$redirectNext`\
    \ is `http://localhost/phpsols/sessions/multiple_02.php`.\n\n```\nif ($filename\
    \ != $firstPage && !isset($_SESSION['formStarted'])) {\n    header(\"Location:\
    \ $redirectFirst\");\n    exit;\n}\n```\n\nThe rest of the script loops through\
    \ the `$_POST` array, checking for required fields that are blank and adding them\
    \ to a `$missing` array. If nothing is missing, the `header()` function redirects\
    \ the user to the next page of the multipage form. The complete script for `multiform.php`\
    \ looks like this:\n\n```\n<?php\nif (!isset($_SESSION)) {\n    session_start();\n\
    }\n$filename = basename($_SERVER['SCRIPT_FILENAME']);\n$current = 'http://' .\
    \ $_SERVER['HTTP_HOST'] . $_SERVER['PHP_SELF'];\n$redirectFirst = str_replace($filename,\
    \ $firstPage, $current);\n$redirectNext = str_replace($filename, $nextPage, $current);\n\
    if ($filename != $firstPage && !isset($_SESSION['formStarted'])) {\n    header(\"\
    Location: $redirectFirst\");\n    exit;\n}\nif (isset($_POST[$submit])) {\n  \
    \  // create empty array for any missing fields\n    $missing = [];\n    // create\
    \ $required array if not set\n    if (!isset($required)) {\n        $required\
    \ = [];\n    } else {\n        // using casting operator to turn single string\
    \ to array\n        $required = (array) $required;\n    }\n    // process the\
    \ $_POST variables and save them in the $_SESSION array\n    foreach ($_POST as\
    \ $key => $value) {\n        // skip submit button\n        if ($key == $submit)\
    \ continue;\n        // assign to temporary variable and strip whitespace if not\
    \ an array\n        $temp = is_array($value) ? $value : trim($value);\n      \
    \  // if empty and required, add to $missing array\n        if (empty($temp) &&\
    \ in_array($key, $required)) {\n            $missing[] = $key;\n        } else\
    \ {\n            // otherwise, assign to a variable of the same name as $key\n\
    \            $_SESSION[$key] = $temp;\n        }\n    }\n    // if no required\
    \ fields are missing, redirect to next page\n    if (!$missing) {\n        header(\"\
    Location: $redirectNext\");\n        exit;\n    }\n}\n```\n\nAdd the following\
    \ code in a PHP block above the `DOCTYPE` declaration in `multiple_02.php`:\n\n\
    > **Note:** The code is very similar to that used in Chapter 5 to process the\
    \ feedback form, so the inline comments should be sufficient to explain how it\
    \ works. The conditional statement wrapped around the new code uses `$_POST[$submit]`\
    \ to check if the form has been submitted. I have used a variable rather than\
    \ hard-coding the name of the Submit button to make the code more flexible. Although\
    \ this script is included in the first page only after the form has been submitted,\
    \ it’s included directly in the other pages, so it’s necessary to add the conditional\
    \ statement here.  \n> The name and value of the Submit button are always included\
    \ in the `$_POST` array, so the `foreach` loop uses the `continue` keyword to\
    \ skip to the next item if the key is the same as the Submit button’s name. This\
    \ avoids adding the unwanted value to the `$_SESSION` array. See “Breaking out\
    \ of a loop” in Chapter 3 for a description of `continue`.\n\n```\n$firstPage\
    \ = 'multiple_01.php';\n$nextPage = 'multiple_03.php';\n$submit = 'next';\nrequire_once\
    \ '../includes/multiform.php';\n```\n\nIn `multiple_03.php`, add the following\
    \ in a PHP code block above the `DOCTYPE` declaration:"
