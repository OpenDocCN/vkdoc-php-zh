  trans: "  \n### PHP 解决方案 9-1：一个简单的会话示例\n\n此示例只需几分钟即可构建完成，但你也可以在 `ch09` 文件夹中的 `session_01.php`、`session_02.php`\
    \ 和 `session_03.php` 文件中找到完整代码。\n\n在 `phpsols` 站点根目录下创建一个名为 `sessions` 的新文件夹，并在其中创建一个名为\
    \ `session_01.php` 的页面。插入一个包含名为 `name` 的文本字段和一个 `Submit` 按钮的表单。将 `method` 设置为\
    \ `post`，`action` 设置为 `session_02.php`。表单应如下所示：\n\n```\n<form method=\"post\"\
    \ action=\"session_02.php\">\n\n<p>\n\n<label for=\"name\">Name:</label>\n\n<input\
    \ type=\"text\" name=\"name\" id=\"name\">\n\n</p>\n\n<p>\n\n<input type=\"submit\"\
    \ name=\"Submit\" value=\"Submit\">\n\n</p>\n\n</form>\n```\n\n在另一个名为 `session_02.php`\
    \ 的页面中，在 `DOCTYPE` 声明上方插入以下代码：\n\n```\n<?php\n\n// 启动会话\n\nsession_start();\n\n\
    // 检查表单是否已提交且 name 不为空\n\nif ($_POST && !empty($_POST['name'])) {\n\n// 设置会话变量\n\
    \n$_SESSION['name'] = $_POST['name'];\n\n}\n\n?>\n```\n\n在 `session_02.php` 的\
    \ `<body>` 标签之间插入以下代码：\n\n- 内联注释解释了代码的功能。会话启动后，只要 `$_POST['name']` 不为空，其值就会被赋给\
    \ `$_SESSION['name']`。\n\n```\n<?php\n\n// 检查会话变量是否已设置\n\nif (isset($_SESSION['name']))\
    \ {\n\n// 如果已设置，则按名称问候\n\necho 'Hi, ' . $_SESSION['name'] . '. <a href=\"session_03.php\"\
    >Next</a>';\n\n} else {\n\n// 如果未设置，则返回登录页面\n\necho 'Who are you? <a href=\"session_01.php\"\
    >Login</a>';\n\n}\n\n?>\n```\n\n- 如果 `$_SESSION['name']` 已设置，则会显示一条欢迎消息以及一个指向\
    \ `session_03.php` 的链接。否则，页面会提示访客无法识别其身份，并提供返回第一个页面的链接。\n\n**注意**\n\n输入以下行时请务必小心：\n\
    \n`echo 'Hi, ' . $_SESSION['name'] . '. <a href=\"session03.php\">Next</a>';`\n\
    \n前两个句点（围绕 `$_SESSION['name']` 的）是 PHP 的连接运算符。第三个句点（紧跟在单引号之后）是一个普通的句点，将作为字符串的一部分显示。\n\
    \n创建 `session_03.php`。在 `DOCTYPE` 上方输入以下代码以启动会话：\n\n`<?php session_start(); ?>`\n\
    \n在 `session_03.php` 的 `<body>` 标签之间插入以下代码：\n\n```\n<?php\n\n// 检查会话变量是否已设置\n\n\
    if (isset($_SESSION['name'])) {\n\n// 如果已设置，则按名称问候\n\necho 'Hi, ' . $_SESSION['name']\
    \ . '. See, I remembered your name!<br>';\n\n// 取消设置会话变量\n\nunset($_SESSION['name']);\n\
    \n// 使会话 cookie 失效\n\nif (isset($_COOKIE[session_name()])) {\n\nsetcookie(session_name(),\
    \ '', time()-86400, '/');\n\n}\n\n// 结束会话\n\nsession_destroy();\n\necho '<a href=\"\
    session_02.php\">Page 2</a>';\n\n} else {\n\n// 如果无法识别，则显示相应信息\n\necho \"Sorry,\
    \ I don't know you.<br>\";\n\necho '<a href=\"session_01.php\">Login</a>';\n\n\
    }\n\n?>\n```\n\n在浏览器中加载 `session_01.php`，在文本字段中输入你的姓名，然后点击 Submit。你应该会看到类似以下截图的内容。在此阶段，这里发生的情况与普通表单相比没有明显区别。\n\
    \n- 如果 `$_SESSION['name']` 已设置，页面会显示它，然后将其取消设置并使当前会话 cookie 失效。通过在第一个代码块末尾放置 `session_destroy()`，会话及其关联的变量将不再可用。\n\
    \n![A978-1-4842-0635-5_9_Figa_HTML.jpg](img/A978-1-4842-0635-5_9_Figa_HTML.jpg)\n\
    \n当你点击 Next 时，会话的强大功能开始显现。即使 `$_POST` 数组不再可用，页面仍能记住你的姓名。如果你使用 XAMPP 作为测试环境，你可能会看到类似以下截图的画面。\n\
    \n![A978-1-4842-0635-5_9_Figb_HTML.jpg](img/A978-1-4842-0635-5_9_Figb_HTML.jpg)\n\
    \n- 但是，在其他环境（例如 MAMP）中，你可能会收到类似这样的\"headers already sent\"警告消息：\n\n![A978-1-4842-0635-5_9_Figc_HTML.jpg](img/A978-1-4842-0635-5_9_Figc_HTML.jpg)\n\
    \n**注意**\n\n正如第 4 章中所解释的，XAMPP 不会产生关于标头的警告，因为它被配置为缓冲前 4 KB 的输出。然而，并非所有服务器都会缓冲输出，因此修复此问题非常重要。\n\
    \n点击 Page 2 的链接（如果你收到了错误消息，它就在消息下方）。会话已被销毁，因此这次 `session_02.php` 不知道你是谁。\n\n![A978-1-4842-0635-5_9_Figd_HTML.jpg](img/A978-1-4842-0635-5_9_Figd_HTML.jpg)\n\
    \n在浏览器地址栏中输入 `session_03.php` 的地址并加载它。它同样不记得该会话，并显示一条适当的消息。\n\n![A978-1-4842-0635-5_9_Fige_HTML.jpg](img/A978-1-4842-0635-5_9_Fige_HTML.jpg)\n\
    \n即使你在第 8 步中没有收到警告消息，当你将依赖会话的页面部署到其他服务器时，也需要防止它发生。错误消息不仅看起来不好，而且还意味着 `setcookie()`\
    \ 无法使会话 cookie 失效。尽管 `session_start()` 紧跟在 `session_03.php` 中开头 PHP 标签之后，但警告消息是由在\
    \ `setcookie()` 之前输出的 `DOCTYPE` 声明、`<head>` 和其他 HTML 内容触发的。\n\n### PHP 解决方案 9-2：使用\
    \ ob_start() 缓冲输出\n\n虽然你可以将 `setcookie()` 放在 `DOCTYPE` 声明上方的 PHP 代码块中，但你还需要将 `$_SESSION['name']`\
    \ 的值赋给一个普通变量，因为它在会话销毁后就不复存在了。与其完全拆解整个脚本，不如使用 `ob_start()` 来缓冲输出。\n\n继续使用上一节中的\
    \ `session_03.php` 文件。\n\n像这样修改 `DOCTYPE` 声明上方的 PHP 代码块：\n\n```\n<?php\n\nsession_start();\n\
    \nob_start();\n\n?>\n```\n\n在使会话 cookie 失效后立即刷新输出，如下所示：\n\n- 这会开启输出缓冲，并阻止将输出发送到浏览器，直到脚本结束或你使用\
    \ `ob_end_flush()` 专门刷新输出。\n\n```\n// 使会话 cookie 失效\n\nif (isset($_COOKIE[session_name()]))\
    \ {\n\nsetcookie(session_name(), '', time()-86400, '/');\n\n}\n\nob_end_flush();\n\
    ```\n\n保存 `session_03.php` 并再次测试整个流程。这次应该不会出现警告。更重要的是，会话 cookie 将不再有效。\n\n###\
    \ 使用基于文件的身份验证\n\n正如你刚才所见，会话变量和条件语句的结合使用，让你能够根据会话变量是否已设置，向访问者呈现完全不同的页面。你只需要添加一个密码检查系统，就拥有了一个基本的用户身份验证系统。\n\
    \n在 PHP 解决方案 7-2 中，我向你展示了如何使用 `fopen()` 和 `fgetcsv()` 函数从 CSV 文件生成一个多维关联数组。现在，你可以改编该脚本，利用会话创建一个简单的登录系统。每个人的用户名和密码作为逗号分隔的值存储在\
    \ `users.csv` 文件中。文件的第一行包含用作每个子数组键的字段标题。文件内容如下所示：\n\n```\nname,password\n\ndavid,codeslave\n\
    \nben,bigboss\n```\n\n**注意**\n\n以下 PHP 解决方案假设在 `private` 文件夹中有一个 `users.csv` 的副本，该文件夹是在第\
    \ 7 章中设置的。如果你尚未设置供 PHP 读写文件的文件夹，请参阅第 7 章。如果你创建自己的 `users.csv` 版本，请注意用户名和密码之间的逗号后不应有空格。\n"
- fmt: "# PHP Solution 9-3: Building the Login Page\n\nThis PHP solution shows how\
    \ to submit a username and password through the `post` method and then check the\
    \ submitted values against those stored in an external text file. If a match is\
    \ found, the script sets a session variable and then redirects the user to another\
    \ page.\n\nCreate a file called `login.php` in the `sessions` folder, then insert\
    \ a form with text input fields for username and password, plus a Submit button\
    \ named `login`, like this (alternatively, use `login_01.php` in the `ch09` folder):\n\
    \n```html\n<form method=\"post\" action=\"\">\n  <p>\n    <label for=\"username\"\
    >Username:</label>\n    <input type=\"text\" name=\"username\" id=\"username\"\
    >\n  </p>\n  <p>\n    <label for=\"pwd\">Password:</label>\n    <input type=\"\
    password\" name=\"pwd\" id=\"pwd\">\n  </p>\n  <p>\n    <input name=\"login\"\
    \ type=\"submit\" value=\"Log in\">\n  </p>\n</form>\n```\n\nIt’s a simple form,\
    \ nothing fancy:\n\n![A978-1-4842-0635-5_9_Figf_HTML.jpg](A978-1-4842-0635-5_9_Figf_HTML.jpg)\n\
    \nAdd the following code in a PHP block above the `DOCTYPE` declaration:\n\n```php\n\
    $error = '';\n\nif (isset($_POST['login'])) {\n  session_start();\n  $username\
    \ = $_POST['username'];\n  $password = $_POST['pwd'];\n\n  // location of usernames\
    \ and passwords\n  $userlist = 'C:/private/users.csv';\n\n  // location to redirect\
    \ on success\n  $redirect = 'http://localhost/phpsols/sessions/menu.php';\n\n\
    \  require_once '../includes/authenticate.php';\n}\n```\n\n- This initializes\
    \ a variable called `$error` as an empty string. If the login fails, this will\
    \ be used to display an error message informing the user of the reason for failure.\n\
    - The conditional statement then checks whether the `$_POST` array contains an\
    \ element named `login`. If it does, the form has been submitted, and the code\
    \ inside the curly braces initiates a PHP session and stores the values passed\
    \ through the `$_POST` array in `$username` and `$password`. Then it creates `$userlist`,\
    \ which defines the location of the file that contains the registered usernames\
    \ and passwords, and `$redirect`, the URL of the page the user will be sent to\
    \ after successfully logging in.\n- Finally, the code inside the conditional statement\
    \ includes `authenticate.php`, which you’ll create next.\n\n> **Note:** Adjust\
    \ the value of `$userlist` to match the location in your own setup.\n\nCreate\
    \ a file called `authenticate.php` in the `includes` folder. It will contain only\
    \ PHP code, so strip out any HTML inserted by your script editor and insert the\
    \ following code:\n\n```php\n<?php\nif (!file_exists($userlist) || !is_readable($userlist))\
    \ {\n  $error = 'Login facility unavailable. Please try later.';\n} else {\n \
    \ $file = fopen($userlist, 'r');\n  // ignore the titles in the first row of the\
    \ CSV file\n  $titles = fgetcsv($file);\n  // loop through the remaining lines\n\
    \  while (($data = fgetcsv($file)) !== false) {\n    // ignore if the first element\
    \ is null\n    if (is_null($data[0])) {\n      continue;\n    }\n    // if username\
    \ and password match, create session variable,\n    // regenerate the session\
    \ ID, and break out of the loop\n    if ($data[0] == $username && $data[1] ==\
    \ $password) {\n      $_SESSION['authenticated'] = 'Jethro Tull';\n      session_regenerate_id();\n\
    \      break;\n    }\n  }\n  fclose($file);\n}\n```\n\nIf the login is successful,\
    \ the `header()` function needs to redirect the user to the URL stored in `$redirect`\
    \ and then exit the script. Otherwise, an error message needs to be created, informing\
    \ the user that the login failed. The complete script looks like this:\n\n- This\
    \ adapts the code that you used in `getcsv.php` in PHP Solution 7-2. The conditional\
    \ statement checks for a nonexistent file or one that can’t be read. If there’s\
    \ a problem with `$userlist`, the error message is created immediately.\n- Otherwise,\
    \ the main code in the `else` block extracts the content of the CSV file by opening\
    \ the file in read mode and using the `fgetcsv()` function to return an array\
    \ of the data in each line. In PHP Solution 7-2, the values were stored in a multidimensional\
    \ array containing the name and password of each registered user. This time, there’s\
    \ no need to store them. All we’re interested in is finding a username/password\
    \ pair that matches the values in `$username` and `$password`.\n- The first line\
    \ in the CSV file contains the field titles. The script extracts them to a variable\
    \ called `$titles`, but they’re never used. The `while` loop then examines the\
    \ remaining lines. Each time the loop runs, it extracts the current line into\
    \ to an array called `$data`. The first element contains the username, and the\
    \ second contains the related password. If `$data[0]` is `null`, it probably means\
    \ the current line is blank, so it’s skipped.\n- If both elements in the `$data`\
    \ array match `$username` and `$password`, the script creates a variable called\
    \ `$_SESSION['authenticated']` and assigns it the name of one of the great folk-rock\
    \ bands of the 1970s. There’s nothing magic about either of these (apart from\
    \ Jethro Tull’s music); I’ve chosen the name and value of the variable arbitrarily.\
    \ All that matters is a session variable is created. As soon as a match is found,\
    \ the session ID is regenerated, and `break` exits the loop.\n\n```php\n<?php\n\
    if (!file_exists($userlist) || !is_readable($userlist)) {\n  $error = 'Login facility\
    \ unavailable. Please try later.';\n} else {\n  $file = fopen($userlist, 'r');\n\
    \  // ignore the titles in the first row of the CSV file\n  $titles = fgetcsv($file);\n\
    \  // loop through the remaining lines\n  while (($data = fgetcsv($file)) !==\
    \ false) {\n    // ignore if the first element is null\n    if (is_null($data[0]))\
    \ {\n      continue;\n    }\n    // if username and password match, create session\
    \ variable,\n    // regenerate the session ID, and break out of the loop\n   \
    \ if ($data[0] == $username && $data[1] == $password) {\n      $_SESSION['authenticated']\
    \ = 'Jethro Tull';\n      session_regenerate_id();\n      break;\n    }\n  }\n\
    \  fclose($file);\n\n  // if the session variable has been set, redirect\n  if\
    \ (isset($_SESSION['authenticated'])) {\n    header(\"Location: $redirect\");\n\
    \    exit;\n  } else {\n    $error = 'Invalid username or password.';\n  }\n}\n\
    ```\n\nIn `login.php`, add the following short code block just after the opening\
    \ `<body>` tag to display any error messages:\n\n```php\n<body>\n<?php\nif ($error)\
    \ {\n  echo \"<p>$error</p>\";\n}\n?>\n<form method=\"post\" action=\"\">\n```\n\
    \nThe completed code is in `login_02.php` in the `ch09` folder. Before you can\
    \ test `login.php`, you need to create `menu.php` and restrict access with a session."
