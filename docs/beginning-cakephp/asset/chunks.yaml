    Not only do some file names for plugins need to be adjusted to work properly;
    so do the class names in the files. For the plugin not to conflict with the surrounding
    Cake application file names and class names, the naming conventions and syntax
    must be slightly adjusted.


    Instead of naming the class AppController, for instance, the class name will need
    to be prepended with the name of the plugin. A plugin named Calendar would need
    to have its class names named after the plugin. For example, the App controller
    would be named CalendarAppController, and the App model would be named CalendarAppModel.
    Other elements used by the plugin should have their class names adjusted depending
    on what type of element they are.


    Controllers and models extend the plugin’s App controller and App model, respectively
    (see Listing 13-3). Thus, the class name must reflect this extension when the
    plugin classes are instantiated.


    **Listing 13-3.** *An Example of a Plugin Controller Extending the App Controller*
    1


    <?


    class EventsController extends CalendarAppController {


    var $name = ''Events'';


    var $uses = array(''Event'');


    }


    ?>


    Notice that line 4 of Listing 13-3 shows the plugin controller using the $uses
    class attribute to specify the corresponding model. Though Cake should automatically
    pick up the appropriate models and views, consistently setting the $uses array
    will allow the plugin to be more portable and reduces the risk of the plugin controller
