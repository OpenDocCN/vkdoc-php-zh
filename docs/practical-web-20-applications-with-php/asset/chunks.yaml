    **Listing 5-12.** *The getItems() Function, Which Returns an Associative Array
    of the Rows from the* *Table Items (items.php)*


    function getItems()


    {


    $query = ''select item_id, title from items order by ranking, lower(title)'';
    $result = mysql_query($query);


    $items = array();


    while ($row = mysql_fetch_object($result)) {


    $items[$row->item_id] = $row->title;


    }


    return $items;


    }


    In this function, we sort the list by each item’s ranking value. This is the value
    that is updated when the list order is changed. Initially, there is no ranking
    value for items, so we use the title column as the secondary ordering field.


    Processing and Saving the List Order


    Finally, we must save the new list order to the database after a user drags a
    list item to a new location. In the processItemsOrder() function, we retrieve
    the new order from the post data (using PHP’s $_POST superglobal), and then update
    the database. If this action fails, false is returned; this will occur if the
    new ordering data isn’t found in $_POST. If the new list order is saved, true
    is returned.


