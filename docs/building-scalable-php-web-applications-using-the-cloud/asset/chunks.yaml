- fmt: '# 8.5 Putting `CloudFront` In Front of the Entire Application


    With our app, the content is dynamic. This makes it difficult (but, as we will
    see, not impossible) to put a CDN such as `CloudFront` in front of it. Using `CloudFront`
    poses a problem—how do we prevent people from viewing stale content?


    In fact, most CDNs can be treated much in the same way as we dealt with our local
    caching. We can simply set a maximum expiration date for our content.


    On `CloudFront`, if you look at your distribution, you will see a “Behaviors”
    tab. Clicking this, you will see a single, default behavior. These behaviors allow
    you to set different settings on different content paths from your server. For
    this example, we only need to edit the one that is already there. Select the current
    behavior and then click “Edit.”


    If you scroll down, you will see a set of TTL (time-to-live) values, which are
    in seconds. To change these values, first change the “Object Caching” setting
    from “Use Origin Cache Headers” to “Customize.” If you don’t want the content
    to be older than 5 seconds, set the “Maximum TTL” to 5. This will mean that the
    cache will only keep the content around for 5 seconds before requerying for the
    content. Thus, the content may be a *little* stale, but not very much.


    This leads to another question—how will the CDN handle sending forms to the server?
    This can be handled by Behavior settings as well. Under “Allowed HTTP Methods,”
    select the option to include all of the HTTP methods. The CDN will only cache
    the `GET` and `HEAD` requests, but will forward all other requests straight to
    your server.


    Additionally, by default, `CloudFront` doesn’t forward cookies, HTTP headers,
    or query strings to the server. This is to decrease the number of origin requests
    it has to make, as well as the number of objects it has to cache. However, in
    our application, the content you see is based on the query string. Therefore,
    you need to set “Query String Forwarding and Caching” to “Forward All, Cache Based
    on All” to get the application to work correctly.


    Once these are all set, click “Yes, Edit” to save the changes in the behavior.


    You can now go to your `CloudFront` distribution’s URL and use it as if it were
    the regular web site. You can also follow the instruction in Section 8.4 in order
    to have the user access this via your web site’s own hostname.


    Before you go hog wild with application setups like this, keep in mind that all
    cache setups are a balance. If you use too many keys for your cache (i.e., paths,
    headers, query strings, cookies), then most of your content will be passed through
    to the server (i.e., not cached), and you won’t get the performance improvement.
    In fact, it will just add overhead and cost, because you have to pay *both* the
    bandwidth of the cache *and* the bandwidth at your server. However, if the cache
    setup is too loose, users will see out-of-date data or, worse, someone else’s
    data! For example, if your content is personalized based on a cookie, but you
    don’t use the cookie as part of your cache key, then if Jim Bob requests a page
    and it is put into the cache, when Jane Doe requests the same page, she will get
    Jim Bob’s page!


    So how does someone with a highly personalized web application make better use
    of the CDN? The answer to that is by turning your application inside out.


    # 8.6 Turning Your Application Inside Out


    The problem we ran into in the last section was the issue of delivering highly
    customized pages to users and still making good use of the cache. Having customized
    pages generally means that they aren’t cacheable. This dilemma can be solved by
    employing an “inside-out” page architecture for your web site.


    Historically, web applications are built by having servers generate pages. When
    a user navigates to a URL, the server takes a template, combines it with user
    data, and adds in the page content to produce the final HTML page. This HTML page
    is then delivered, as a whole, back to the user.


    This architecture works well for a variety of reasons:


    - Most web application frameworks are built around this paradigm.

    - This architecture closely matches the way HTML is structured.

    - This architecture is easy to conceive of and build.

    - This architecture requires much less planning to implement.

    - This architecture has very little up-front development required.

    - Much of the Web’s history is rooted in this architecture.

    - Optimization of this architecture is performed last (i.e., premature optimization
    is the root of all evil).


    The problem with this architecture, however, is that for most use cases, it is
    very inefficient in high-traffic situations.


    An alternative way to structure your application that has been made possible through
    developments of Ajax techniques over the years is to turn your page inside out.
    That is, in a typical architecture, the server generates a page which contains
    dynamic content. In the new way, the server generates a page that is basically
    static, but *calls back* to the server for any dynamic content.


    Imagine, for instance, having a page that lists your products. In typical web
    frameworks, your server would perform the following tasks:


    1. The user’s browser requests a specific page from the server.

    2. The server begins web application process engine (PHP, Ruby on Rails, etc.).

    3. The application accesses the database to get a list of products.

    4. The application generates HTML for the product list.

    5. The application accesses the database for status information on the user (i.e.,
    login information, cart information, other status information, etc.).

    6. The application generates HTML headers and footers that incorporated the user’s
    status information and where they were in the page navigation.

    7. The application stitches together the whole HTML page from the generated fragments.

    8. The server sends the final HTML page back to the user.

    9. The user’s browser renders the page.


    As you can see, this is a fairly involved process, and the user doesn’t get *any*
    feedback until the entire page has been rendered on the server. This leads to
    a lot of waiting around for the server to finish up.


    However, if we turn it inside out, we can achieve a much better optimization strategy.
    What we will do is serve up the page as a static page and then let the user’s
    own browser be responsible for getting user-based content and stitching together
    the page.


    The new sequence would look like this:


    1. The user’s browser requests the page from the CDN.

    2. Assuming it is already cached, a CDN server near the user immediately responds
    with the page content (i.e., a list of products).

    3. The user’s browser loads the content and displays it immediately, with a loading
    spinner next to any user-specific data.

    4. The page executes JavaScript, which issues a request back to the server for
    the user’s status information.

    5. The server sends back the user’s JSON-encoded status information.

    6. The page renders the remaining components of the web page.'
