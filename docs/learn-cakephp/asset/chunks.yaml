    ```


    我们希望在文章中使用标签功能，因此还需要一个用于存储标签的表。


    ```

    74  -- -----------------------------------------------------

    75  -- 表 `cake_blog`.`posts_tags`

    76  -- -----------------------------------------------------

    77  CREATE TABLE IF NOT EXISTS `cake_blog`.`posts_tags` (

    78    `id` INT UNSIGNED NOT NULL AUTO_INCREMENT,

    79    `post_id` INT(10) UNSIGNED NOT NULL ,

    80    `tag_id` INT UNSIGNED NOT NULL ,

    81    PRIMARY KEY (`id`),

    82    INDEX `fk_posts_has_tags_tags1` (`tag_id` ASC) ,

    83    INDEX `fk_posts_has_tags_posts1` (`post_id` ASC) ,

    84    CONSTRAINT `fk_posts_has_tags_posts1`

    85      FOREIGN KEY (`post_id` )

    86      REFERENCES `cake_blog`.`posts` (`id` )

    87      ON DELETE RESTRICT

    88      ON UPDATE RESTRICT,

    89    CONSTRAINT `fk_posts_has_tags_tags1`

    90      FOREIGN KEY (`tag_id` )

    91      REFERENCES `cake_blog`.`tags` (`id` )

    92      ON DELETE RESTRICT

    93      ON UPDATE RESTRICT)

    94  ENGINE = InnoDB

    95  DEFAULT CHARACTER SET = latin1;

    ```


    接下来需要创建文章表和标签表之间的关联表。


    ```

    98  -- -----------------------------------------------------

    99  -- 表 `cake_blog`.`comments`

    100  -- -----------------------------------------------------

    101  CREATE TABLE IF NOT EXISTS `cake_blog`.`comments` (

    102    `id` INT UNSIGNED NOT NULL AUTO_INCREMENT ,

    103    `comment` TEXT NULL ,

    104    `user_id` INT(10) UNSIGNED NOT NULL ,

    105    `post_id` INT(10) UNSIGNED NOT NULL ,

    106    PRIMARY KEY (`id`) ,

    107    INDEX `fk_comments_users1` (`user_id` ASC) ,

    108    INDEX `fk_comments_posts1` (`post_id` ASC) ,

    109    CONSTRAINT `fk_comments_users1`

    110      FOREIGN KEY (`user_id` )

    111      REFERENCES `cake_blog`.`users` (`id` )

    112      ON DELETE RESTRICT

    113      ON UPDATE RESTRICT,

    114    CONSTRAINT `fk_comments_posts1`

    115      FOREIGN KEY (`post_id` )

    116      REFERENCES `cake_blog`.`posts` (`id` )

    117      ON DELETE RESTRICT

    118      ON UPDATE RESTRICT)

    119  ENGINE = InnoDB;

    ```


    最后，我们创建评论表，评论将存储在该表中。


    ```

    123  SET SQL_MODE=@OLD_SQL_MODE;

    124  SET FOREIGN_KEY_CHECKS=@OLD_FOREIGN_KEY_CHECKS;

    125  SET UNIQUE_CHECKS=@OLD_UNIQUE_CHECKS;

    ```


    作为最后一步，我们还需要创建测试数据库。目前，`cake_blog_test` 可以没有任何数据库表。


    ```

    127  CREATE SCHEMA IF NOT EXISTS `cake_blog_test`

    128    DEFAULT CHARACTER SET latin1;

    ```


    如果一切按计划进行，你应该会看到类似图 6-4 所示的内容。


    ![A337704_2_En_6_Fig4_HTML.jpg](img/A337704_2_En_6_Fig4_HTML.jpg)


    图 6-4.


    数据库创建后的 `phpMyAdmin`


    ### 设置会话处理


    正如我们在真实的中型应用中所做的那样，我们将为此项目使用 CakePHP 的数据库会话处理。


    CakePHP 提供了四种不同的现成会话处理机制。


    默认选项是 `php`，此时会话处理由 PHP 按照 `php.ini` 定义的方式进行。我通常不选择此选项。


    第二个选项是 `cake`，会话数据将存储在 `/tmp/sessions` 文件夹的文件中。当应用非常简单且不使用任何数据库时，我会使用此选项。


    第三个选项是 `database`，会话数据存储在数据库的 `sessions` 表中。在大多数情况下，我会使用此选项。


    最后一个选项是 `cache`，会话存储在诸如 APC、Memcached 或 XCache 这类缓存中。如果你计划开发一个高使用率的应用，推荐使用此选项。


    Cake 使得随时更改会话处理变得极其简单。因此，随着你的应用受欢迎程度增长，你可以从 `database` 切换到 `cache`。


    打开你的 `/config/app.php` 文件，将会话处理的默认值更改为 `database`。


    ```

    1  ''Session'' => [

    2       ''defaults'' => ''database'',

    3   ],

    ```


    用于会话的数据库表的 SQL 脚本位于 `app/config/schema/sessions.sql`。你应该将此表添加到 `default` 数据库。


    你无需向测试数据库添加任何数据库表。CakePHP 的测试套件会自动完成此操作。


    ### 创建默认布局


    如果需要，可以更改 `/src/Template/Layout` 目录下的 `default.ctp` 文件。这不是必需的，但在某个时候，我们会想更改 CakePHP
    的默认布局。为什么不现在就开始呢？

    '
- fmt: '### CakePHP Models


    Models are the M in MVC. They are the basis of our web application, as they are
    responsible for storing, accessing, and manipulating data. CakePHP’s `Model` class
    files are split between `Table` and `Entity` objects. `Table` objects provide
    access to the collection of entities stored in a specific table. CakePHP supports
    MySQL, SQLite, PostgreSQL, SQLServer, and Oracle.


    Models extend CakePHP’s `Model` class, so they are equipped with a lot of features
    out of the box. They have events such as `Model.beforeFind`, `Model.beforeSave`,
    `Model.afterSave`, and others. They have inherited methods such as `find()`, `get()`,
    `save()`, and so on.


    #### Database Queries


    The most widely used model method is `find()`, which returns a query object.


    ```

    1  $query = $posts

    2      ->find()

    3      ->select([''id'', ''title''])

    4      ->where([''id  100])

    5      ->order([''created'' => ''DESC'']);

    ```


    As you can see, `find()` can be chained with other model methods, such as `select()`,
    `where()`, etc. This is a new feature of CakePHP 3’s new object-relational mapping
    (ORM) feature, which is really handy and self-descriptive. With this query, we
    can select `id` and `title` of posts, whose `id`s are smaller than 100, and the
    result set will be ordered by the `created` field. This query will generate something
    similar to the following SQL statement:


    ```

    SELECT id, title FROM posts WHERE id < 100 ORDER BY created DESC;

    ```


    Query objects can be modified later, as they actually execute if we call `execute()`
    or iterate over the query or call `all()`.


    #### Model Associations


    Relations between database tables are handled by model associations in CakePHP
    applications. There are four association types. One-to-one relationships are handled
    by the `hasOne` association, one-to-many relationships by `hasMany`, many-to-one
    relationships by `belongsTo`, and many-to-many relationships by `belongsToMany`.


    ##### HasOne Associations


    In our blog database, there is no `hasOne` association. We can create a profiles
    database table and model, and if a user has only one profile, he or she is in
    a `hasOne` association with the profile. In this case, the profile table should
    have a `user_id` field for describing the link between it and the user.


    ##### HasMany Associations


    In our blog database categories, `hasMany` posts means that a category can have
    many posts.


    ##### BelongsTo Associations


    This is the other end of a `hasOne` or `hasMany` association. So, in the previous
    examples, a profile `belongsTo` a user and a post `belongsTo` a category.


    ##### BelongsToMany associations


    In our blog database, there is a `belongsToMany` association between posts and
    tags, meaning that a post can have many tags and a tag can be assigned to many
    posts.


    ### CakePHP Controllers


    Controllers are the C in MVC. Controllers are the middleware between models and
    views. Your controller should handle interpreting the request data. Commonly,
    a controller is used to manage the logic for one model.


    Controllers should extend Cake’s `Controller` class. Controllers provide a number
    of methods. These are called actions. By default, each public method in a controller
    is an action and is accessible from a URL. An action is responsible for interpreting
    the request and creating the response and setting up variables for the view.


    ### CakePHP Views


    Views are the V in MVC. Views are for presenting the response, mainly meaning
    to create an HTML document. A layout is the main container for views. Each controller
    action should have its corresponding view file at `/src/Template/` folder.


    Let’s see how to create models, controllers, and views automatically.


    ### Baking


    In my opinion, one of the best features of CakePHP is baking, which is itself
    worth writing a book about.


    I will not go into detail here, but `bake` is a tool for automatically generating
    basic code four your blog. With `bake`, you can automatically generate model,
    controller, and template files and many others, such as fixtures, shells, etc.


    Open a terminal, go into your `app` folder, and start CakePHP’s `bake` script.


    ```

    1  $ cd ∼/public_html/cakeBlog/

    2  $ bin/cake bake

    ```


    If you see an error message about file permissions, just ignore it. Because the
    web server usually runs as a different user than yourself, it has different file
    permissions. You can get rid of these error messages by manually emptying your
    `app/tmp/cache` folder’s subfolders or fixing its permissions.


    You’ll see the screen shown in Figure [6-5](#A337704_2_En_6_Chapter.html#Fig5).


    ![A337704_2_En_6_Fig5_HTML.jpg](A337704_2_En_6_Fig5_HTML.jpg)


    Figure 6-5.


    `bake` script in action


    Now let’s generate all model table and entity files, corresponding fixtures, and
    test files at once. For this, we will use the `model all` parameters for `bake`.
    This will create files at `/src/Model/Entity`, `/src/Model/Table`, `/tests/Fixture`,
    and `/tests/TestCase/Model/Table.Bake` will generate one file for each database
    table in each of these folders.


    ```

    1  $ bin/cake bake model all

    ```


    We can use the same process for our controllers and views. With the following
    commands, all controller and view files will be created by `bake`:


    ```

    1  $ bin/cake controller all

    2  $ bin/cake template all

    ```


    If you receive an error message such as `Error: Cannot generate views for models
    with no primary key`, it is because of the session model. In this case, bake your
    tags and users template manually.


    ```

    1  $ bin/cake template tags

    2  $ bin/cake template users

    ```


    ### Clean It Up


    Some files are unnecessary and should be deleted. `Bake` generates files for sessions
    and join tables. As our blog will be very simple, we do not want anything extra
    with join tables, so we do not need these files.


    - `src/Controller/PostsTagsController.php`

    - `src/Controller/SessionsController.php`

    - `src/Model/Entity/Session.php`

    - `src/Model/Table/SessionsTable.php`

    - `tests/TestCase/Controller/SessionsControllerTest.php`

    - `tests/TestCase/Controller/PostsTagsControllerTest.php`

    - `tests/TestCase/Model/Table/SessionsTableTest.php`

    - `tests/Fixture/SessionsFixture.php`


    You can bake your models before you add the session table to your database. In
    this case, session-related files will not be generated, so you don’t have to delete
    them.


    You can bake your models, controllers, and views without the `all` parameter and
    then choose your objects one by one. You can also skip the `join` model, so that
    nothing will be generated for `PostsTags`.


    I think my approach is the fastest of these three options.


    ### Let’s Play


    Browse to `http://localhost/~rrd/cakeBlog/users`. You should see something similar
    to Figure [6-6](#A337704_2_En_6_Chapter.html#Fig6), and be able to add a user.


    ![A337704_2_En_6_Fig6_HTML.jpg](A337704_2_En_6_Fig6_HTML.jpg)


    Figure 6-6.


    Baked Users page


    You can add, modify, and delete categories, tags, posts, and comments also. And
    all of this code is generated automatically by `bake`. We did not write a single
    line of code yet. Cool, huh?


    Run `vendor/bin/phpunit` again, to check if all went well. In Figure [6-7](#A337704_2_En_6_Chapter.html#Fig7),
    dots are the successful test; I’s are the incomplete ones.


    ![A337704_2_En_6_Fig7_HTML.jpg](A337704_2_En_6_Fig7_HTML.jpg)


    Figure 6-7.


    Tests after code generation with `bake`


    Do not worry about incomplete tests for now. So, `bake` generated 43 tests. Of
    these, 18 are assertions and 40 are incomplete tests.


    It is now time to see what is what here. Let’s start with test data fixtures.


    ## Summary


    In this chapter, we took a closer look at testing. We installed all the necessary
    servers, PHP, and Composer and created our application skeleton, via Composer,
    and our databases. You learned how to use the `bake` script to automatically generate
    code. We also set up a session-handling method for our blog.'
