    \ first letter in every word except the first one), such as `$someEnemy`, `$someOtherEnemy`.\n\
    \n- Variable names should be written in lowercase, with an underscore as the word\
    \ separator, such as `$master_of_war`.\n\n- Database objects use the same conventions\
    \ as variable names (the `department_id` column).\n\n- Try to indent your code\
    \ using a fixed number of spaces (say, four) for each level.\n\n(The code in this\
    \ book uses two spaces because of physical space limitations.) Among the decisions\
    \ that need to be made is whether to use quotes for strings. JavaScript, HTML,\
    \ and PHP allow using both single quotes and double quotes. For the code in this\
    \ book, we’ll use double quotes in HTML and JavaScript code, and we’ll use single\
    \ quotes in PHP.\n\nAlthough for JavaScript it’s a matter of taste (you can use\
    \ single quotes, as long as you use them consistently), in PHP, the single quotes\
    \ are processed faster, they are more secure, and they are less likely to cause\
    \ programming errors. Learn more about PHP strings at `http://php.net/types.string`.\
    \ You can find two useful articles on PHP strings at `http://www.sitepoint.com/print/quick-php-tips`\
    \ and `http://www.jeroenmulder.com/weblog/2005/04/php_single_and_double_quotes.php`.\n\
