    ## A Simple Example


    It’s easier to understand how data is passed and transformed between tiers if
    you take a closer look at a simple example. To make the example even more relevant
    to our project, let’s analyze a situation that will actually happen in `HatShop`.
    This scenario is typical for three-tier applications.


    Like most e-commerce sites, `HatShop` will have a shopping cart, which we will
    discuss later in the book. For now, it’s enough to know that the visitor will
    add products to the shopping cart by clicking an `Add to Cart` button. Figure
    2-2 shows how the information flows through the application when that button is
    clicked.


    When the user clicks on the `Add to Cart` button for a specific product (step
    1), the presentation tier (which contains the button) forwards the request to
    the business tier—“Hey, I want this product added to my shopping cart!” (step
    2). The business tier receives the request, understands that the user wants a
    specific product added to the shopping cart, and handles the request by telling
    the data tier to update the visitor’s shopping cart by adding the selected product
    (step 3). The data tier needs to be called because it stores and manages the entire
    web site’s data, including users’ shopping cart information.


    The data tier updates the database (step 4) and eventually returns a success code
    to the business tier. The business tier (step 5) handles the return code and any
    errors that might have occurred in the data tier while updating the database and
    then returns the output to the presentation tier.


    ```

    Internet Visitor Using Web Browser

    1

    7

    Internet

    Three Tier Web Application

    Hosted on Web Server

    2

    Presentation Tier

    6

    3

    Business Tier

    5

    Data Tier

    4

    ```


    **Figure 2-2.** *Internet visitor interacting with a three-tier application*


