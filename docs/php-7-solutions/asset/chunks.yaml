- fmt: '### Can I Just Copy and Paste the Code?


    There’s nothing wrong with copying the code in this book. That’s what it’s there
    for. I’ve structured this book as a series of practical projects. I explain what
    the code is for and why it’s there. Even if you don’t understand exactly how it
    all works, this should give you sufficient confidence to know which parts of the
    code to adapt to your own needs and which parts are best left alone. But to get
    the most out of this book, you need to start experimenting with the tools found
    in these pages and then come up with your own solutions.


    `PHP` is a toolbox full of powerful features. It has thousands of built-in functions
    that perform all sorts of tasks, such as converting text to uppercase, generating
    thumbnail images from full-sized ones, or connecting to a database. The real power
    comes from combining these functions in different ways and adding your own conditional
    logic.


    ### How Safe Is PHP?


    `PHP` is like the electricity or kitchen knives in your home: handled properly,
    it’s very safe; handled irresponsibly, it can do a lot of damage. One of the inspirations
    for the first edition of this book was a spate of attacks that exploited a vulnerability
    in email scripts, turning web sites into spam relays. The solution is quite simple,
    as you’ll learn in Chapter [6](#332054_4_En_6_Chapter.xhtml), but even many years
    later, I still see people using the same insecure techniques, exposing their sites
    to attack.


    `PHP` is not unsafe, nor does everyone need to become a security expert to use
    it. What is important is to understand the basic principle of `PHP` safety: *always
    check user input before processing it*. You’ll find that to be a constant theme
    throughout this book. Most security risks can be eliminated with very little effort.


    The best way to protect yourself is to understand the code you’re using.


    ## What Software Do I Need to Write PHP?


    Strictly speaking, you don’t need any special software to write `PHP` scripts.
    `PHP` code is plain text and can be created in any text editor, such as `Notepad`
    on Windows or `TextEdit` on macOS. Having said that, your life will be a lot easier
    if you use a program that has features designed to speed up the development process.
    There are many available—both free and on a paid-for basis.


    ### What to Look for When Choosing a PHP Editor


    If there’s a mistake in your code, your page will probably never make it as far
    as the browser, and all you’ll see is an error message. You should choose a script
    editor that has the following features:


    - **PHP syntax checking**: This used to be found only in expensive, dedicated
    programs, but it’s now a feature in several free programs. Syntax checkers monitor
    the code as you type and highlight errors, saving a great deal of time and frustration.


    - **PHP syntax coloring**: Code is highlighted in different colors according to
    the role it plays. If your code is in an unexpected color, it’s a sure sign you’ve
    made a mistake.


    - **PHP code hints**: `PHP` has so many built-in functions that it can be difficult
    to remember how to use them, even for an experienced user. Many script editors
    automatically display tooltips with reminders of how a particular piece of code
    works.


    - **Line numbering**: Finding a specific line quickly makes troubleshooting a
    lot simpler.


    - **A "balance braces" feature**: Parentheses (`()`), square brackets (`[]`),
    and curly braces (`{}`) must always be in matching pairs. It’s easy to forget
    to close a pair. All good script editors help find the matching parenthesis, bracket,
    or brace.


    The program you’re already using to build web pages might already have some or
    all of these features. Even if you don’t plan to do a lot of `PHP` development,
    you should consider using a dedicated script editor if your web development program
    doesn’t support syntax checking. The following dedicated script editors have all
    the essential features, such as syntax checking and code hints. It’s not an exhaustive
    list, but rather one based on personal experience.


    - **PhpStorm** (`www.jetbrains.com/phpstorm/`): Although this is a dedicated `PHP`
    editing program, it also has excellent support for `HTML`, `CSS`, and `JavaScript`.
    It’s currently my favorite program for developing with `PHP`. It’s sold on an
    annual subscription basis. If you cancel after a minimum of 12 months, you get
    a perpetual license for an older version.


    - **Visual Studio Code** (`https://code.visualstudio.com/`): An excellent code
    editor from Microsoft that runs not only on Windows but also on macOS and Linux.
    It’s free and has built-in support for `PHP`.


    - **Sublime Text** (`www.sublimetext.com/`): If you’re a `Sublime Text` fan, there
    are plug-ins for `PHP` syntax coloring, syntax checking, and documentation. Free
    for evaluation, but you should buy the relatively inexpensive license for continued
    use.


    - **Zend Studio** (`www.zend.com/en/products/studio/`): If you’re serious about
    `PHP` development, `Zend Studio` is the most fully featured integrated development
    environment (`IDE`) for `PHP`. It’s created by Zend, the company run by leading
    contributors to the development of `PHP`. `Zend Studio` runs on Windows, macOS,
    and Linux. Different pricing applies to personal and commercial use.


    - **PHP Development Tools** (`www.eclipse.org/pdt/`): `PDT` is a cut-down version
    of `Zend Studio` and has the advantage of being free. It runs on `Eclipse`, the
    open source `IDE` that supports multiple computer languages. If you have used
    `Eclipse` for other languages, you should find it relatively easy to use. `PDT`
    runs on Windows, macOS, and Linux and is available either as an `Eclipse` plug-in
    or as an all-in-one package that automatically installs `Eclipse` and the `PDT`
    plug-in.


    ## So, Let’s Get on with It…


    This chapter has provided only a brief overview of what `PHP` can do to add dynamic
    features to your web sites and what software you need to do so. The first stage
    in working with `PHP` is to set up a testing environment. The next chapter covers
    what you need for both Windows and macOS.


    # 2. Getting Ready to Work with PHP


    Now you’ve decided to use `PHP` to enrich your web pages, you need to make sure
    that you have everything you need to get on with the rest of this book. Although
    you can test everything on your remote server, it’s usually more convenient to
    test `PHP` pages on your local computer. Everything you need to install is free.
    In this chapter, I’ll explain the various options for Windows and macOS. The necessary
    components are normally installed by default on Linux.


    This chapter covers:


    - Checking if your web site supports `PHP`

    - Understanding why you should no longer use `PHP` 5

    - Deciding whether to create a local testing setup

    - Using a ready-made package in Windows and macOS

    - Deciding where to store your `PHP` files

    - Checking the `PHP` configuration on your local and remote servers'
