    # 三元运算符


    运算符通常是一元（只有一个操作数）或二元（有两个操作数）。但有一种运算符拥有三个操作数，被称为*三元*运算符。通常来说，如果你不纠结于术语，可以将其视为一种特殊的语法结构，它允许你根据一个真或假的条件来为变量赋值。三元运算符的语法如下。


    ```

    condition?value_1:value_2

    ```


    首先，放置条件（通常是一个返回布尔值的表达式）。然后输入一个问号（`?`）、条件为真时返回的值、一个冒号（`:`），以及条件为假时返回的值。上述结构可以赋值给一个变量。例如，执行`$number=($x<0)?-10:10`语句后，如果`$x`的值小于零（即条件`$x<0`为真），则`$number`被设为`-10`，否则（条件`$x<0`为假）设为`10`。清单
    2-4 展示了一个使用三元运算符的简单示例。


    ```

    清单 2-4

    三元运算符

    ```


    这个程序很简单，但包含一些值得注意的指令。首先，`$number=(int)trim(fgets(STDIN))`语句从键盘读取用户输入的整数值，并将其写入`$number`变量。接着，利用三元运算符判断`$number`变量是偶数还是奇数，根据判断结果，为`$word`变量赋予`"even"`或`"odd"`的值。判断结果显示在屏幕上。


    运行程序时，系统会提示你输入一个数字。程序等待用户输入。用户输入数字并按下回车键。之后，会显示另一条消息，其中包含该数字是偶数还是奇数的信息。根据用户输入的值（以粗体显示），程序执行的结果可能如下（输入奇数时）。


    ```

    程序输出（来自清单 2-4）

    输入一个数字：123

    这是一个奇数

    ```


    或者结果可能如下（输入偶数时）。


    ```

    程序输出（来自清单 2-4）

    输入一个数字：124

    这是一个偶数

    ```


    现在，我们来分析主要语句。首先，考虑`$number=(int)trim(fgets(STDIN))`指令。它基于对`fgets()`函数的调用，该函数从输入流中读取字符串。函数参数是标准输入流的常量标识符`STDIN`（在本例中，与控制台关联）。但`fgets()`函数会将任何输入值作为文本读取，而且文本可能包含特殊转义序列（如换行指令）。要删除所有“多余”字符，请使用`trim()`函数。它会移除作为参数传递的字符串中的所有前导和尾随空格及特殊字符。因此，如果用户输入一个整数，那么`trim(fgets(STDIN))`表达式包含该数字的文本表示形式。例如，如果用户输入数字`123`，则读取的值（考虑到对`trim()`函数的调用）是`"123"`。坦率地说，考虑到自动类型转换，即使使用该值也可以进行计算。


    不过，为了可靠性，你需要将读取的文本转换为数字。为此，请在整个表达式前放置`(int)`指令。除了前面提到的`settype()`函数，这是另一种显式转换类型的方法。


    | 详细信息 |

    | --- |

    | 除了使用从控制台为`$number`变量读取值的`$number=(int)trim(fgets(STDIN))`语句外，你也可以使用`$number=123`或`$number=124`语句，直接为`$number`变量显式赋值。
    |


    `$word=($number%2==0)?"even":"odd"`命令将`($number%2==0)?"even":"odd"`表达式（基于三元运算符）赋值给`$word`变量。如果`$number%2==0`条件为真（意味着`$number`变量除以`2`的余数为零），则`$word`变量获取文本`"even"`。如果`$number%2==0`条件为假，则`$word`变量获取文本`"odd"`。`$word`变量的值用于显示判断结果。


    ## 总结


    *   变量是一个命名的内存块，允许你通过名称引用该内存块。要在 PHP 中创建变量，只需为变量赋值即可。变量名以`$`字符开头。

    *   变量没有类型，但变量引用的值有类型。主要类型包括`integer`（整数）、`double`（实数）、`string`（文本）、`boolean`（布尔值）、`array`（数组）和`object`（对象）。你可以使用`gettype()`函数获取变量引用的值的类型。

    *   对于显式类型转换，你可以使用`settype()`函数或在待转换的值前用括号指定最终类型。PHP 也具备自动类型转换系统。

    *   基本运算使用算术、逻辑、位运算和比较运算符。*点*运算符用于连接字符串。

    *   赋值运算符返回的值与变量（被赋值的变量）的值相同。存在简化形式的赋值运算符。

    *   三元运算符返回一个值，该值取决于一个可以为真或假的具体条件。

    *   `fgets()`函数可以从控制台读取数据。


    # 3. 控制语句


    > *我静静地、安详地坐着。然后我饿了。接着，仿佛在迷雾中。*

    >

    > ——《ALF》（电视剧）


    本章讨论控制语句，这些指令旨在在程序中创建分支点以及重复执行语句块。换句话说，本章涵盖条件语句、循环语句和选择语句。

    '
- fmt: '# The `if` Conditional Statement


    The conditional `if` statement allows you to execute different blocks of commands
    depending on some condition. The conditional statement has two alternative syntaxes.
    Usually, you use the following option.


    ```

    if(condition){

    # commands

    }

    else{

    # commands

    }

    ```


    The `if` keyword is followed by a condition in parentheses. Then, in curly braces,
    commands follow. After the block of commands, the `else` keyword is placed with
    other commands in curly braces.


    Let''s discuss how the conditional statement is executed. First, the condition
    after the `if` keyword is checked. If the condition is true, the commands after
    the condition are executed. If the condition is false, the commands in the block
    after the `else` keyword are executed.


    The `else` block is optional. It is allowed not to use it. The syntax of the conditional
    statement, in that case, is as follows.


    ```

    if(condition){

    # commands

    }

    ```


    If the `else` block is not used, the conditional statement is executed. First,
    the condition is checked; if it is true, the commands after the condition are
    executed. If the condition is false, then nothing happens, and the instruction
    after the conditional statement starts to execute.


    > **Note:** Curly braces can be omitted if the `if` block or `else` block consists
    of a single command. However, the absence of curly braces reduces the readability
    of the code and leads to errors. Therefore, it is reasonable to use curly braces
    always.


    Another way to describe the conditional statement is to use no curly braces but
    a colon after the condition, the `else` keyword, and the `endif` statement (followed
    by a semicolon) at the end of the whole construction. The general syntax of the
    conditional statement, in that case, looks as follows.


    ```

    if(condition):

    # commands

    else:

    # commands

    endif;

    ```


    As in the previous case, the `else` block can be omitted. If so, the conditional
    statement is declared according to the following pattern.


    ```

    if(condition):

    # commands

    endif;

    ```


    A small example that uses the conditional statement is shown in Listing 3-1.


    > **Note:** Let''s continue to examine the conditional statement execution without
    considering the automatic type conversion. In other words, assume that the user
    enters the correct values when asked by a program. All kinds of "exotic" cases
    in the programs are not tracked or processed.


    The program is simple. The user enters a number there, and the program checks
    whether the number can be divided by another known number.


    ```

    Listing 3-1

    The Conditional Statement

    ```


    The result of the program execution is shown next (the number entered by the user
    is marked in bold).


    ```

    The output of the program (from Listing 3-1)

    Enter an integer number: 5

    The number 5 can not be divided by 3

    ```


    There is also possibly another result.


    ```

    The output of the program (from Listing 3-1)

    Enter an integer number: 15

    The number 15 can be divided by 3

    ```


    In the conditional statement, the `$number%$A==0` condition is checked, which
    is true if the value of the `$number` variable (entered by the user) is divisible
    without a remainder by the value of the `$A` variable (explicitly specified in
    the program).


    | Details |

    | --- |

    | The `$number=(integer)trim(fgets(STDIN))` command is used to read the value
    of the `$number` variable. The value of the variable is determined by the `(integer)trim(fgets(STDIN))`
    expression. The `fgets()` function reads a line from the standard input (the `STDIN`
    identifier). This means that the value entered by the user is read as a string.
    The `trim()` function removes leading and trailing spaces and escape sequences
    from that string. The `(integer)` instruction converts the textual representation
    of the number to the integer. |'
