- fmt: "该文件名称符合 Cake 的命名规范，你需要确保在创建模型时正确命名文件。如果为这个文件指定了其他名称，则必须在控制器中（以及根据访问模型的其他位置）指定这个非标准文件名。请牢记框架的控制反转结构——Cake\
    \ 会自动在`app/models`文件夹中寻找名为`item.php`的文件，这为你省去了编写不必要代码的工作。\n\n在`item.php`文件中，粘贴清单\
    \ 3-1 所示的代码。\n\n**清单 3-1.** `app/models/item.php`*文件的内容* 1\n\n```\n<?\nclass Item\
    \ extends AppModel {\n    var $name = 'Item';\n}\n?>\n```\n\n■**注意** 根据你的本地主机或远程托管设置，你可能需要更改第\
    \ 1 行。在本书所有示例中，我使用了 PHP 短标记。但在某些设置中，PHP 短标记不可用。如果是这种情况，只需在第 1 行使用`<?php`。从语义上讲，短标记使代码更简洁、更易读，因此为了改善本书的可读性，我将继续使用它。如果你的本地主机设置不同，或者确定你的环境不支持\
    \ PHP 短标记，则需要仔细核对示例。\n\n**这个模型在做什么**\n\n所有模型始终会包含一些相同的头部代码。首先你会注意到在第 2 行，你创建了一个名为`Item`的\
    \ PHP 类，并且这个类继承了另一个名为`AppModel`的类。Cake 已经创建了必要的 PHP 对象来连接数据库，因此，从某种意义上说，你所做的一切只是向这个预配置的对象添加功能。作为补充，第\
    \ 3 行将一个名为`name`的对象变量赋值为`Item`，这提供了对 PHP 4 的向后兼容性。第 4 行和第 5 行结束了这个文件。\n\n**模型的可能性**\n\
    \n在这个类内部，你可以放置模型函数或指定表关联，这些函数和关联会直接与数据库中的`items`表交互并返回结果。可能的功能包括字段验证、复杂的查找查询与操作，以及精密的表设计清理。\n\
    \n现在，`Item`模型已经准备就绪。让我们来创建控制器。\n\n**创建控制器**\n\n在`app/controllers`文件夹中，为数据库中的`items`表创建一个新文件。默认情况下，控制器会链接到与它同名的表。在这种情况下，你创建了一个`items`表，因此\
    \ Cake 的惯例是使用下划线与扩展名`controller.php`来命名控制器文件。所以，将这个新文件命名为`items_controller.php`，并将其放置在`app/controllers`文件夹中。将清单\
    \ 3-2 所示的代码粘贴到这个文件中。\n\n**清单 3-2.** `app/controllers/items_controller.php`*的内容*\
    \ 1\n\n```\n<?\nclass ItemsController extends AppController {\n    var $name =\
    \ 'Items';\n    var $scaffold;\n}\n?>\n```\n\n**这个控制器在做什么**\n\n让我解释一下清单 3-2 中发生了什么。\n\
    \n第 2 行是 Cake 运行控制器所必需的。就像它对模型所做的那样，Cake 已经在其所谓的*控制器*中启动了一些自身的 PHP 代码。接着，它会转到任何继承了该父类的对象。这些对象将包括应用程序自身的控制器，即`AppController`，以及它在`app/controllers`文件夹中找到的任何其他控制器文件。在底层，你需要告知\
    \ Cake 你是否插入了自己的`AppController`或独立的控制器文件，而实现方式是创建一个类并继承上一级的控制器。在本例中，你创建了`ItemsController`类，并且它继承了`AppController`。\n\
    \n第 3 行将控制器命名为`Items`，其原因与模型之前将对象变量设置为`$name`相同。\n\n在第 4 行，你调用了 Cake 的内置功能之一：`scaffold`。你可以将该行代码包含在任何控制器中，Cake\
    \ 会根据其在数据库表中找到的内容，构建自己的一套 HTML 表单和表格。稍后你将看到这一小段代码能有多大帮助。\n\n**控制器的可能性**\n\n由于控制器控制着应用程序中发生的一切，它很可能会是我目前为止讨论的其他资源中变化最大的。从某种意义上讲，它扮演着应用程序“大脑”的角色，并协调模型和视图中的过程。一个好的\
    \ MVC 应用程序的控制器通常会扮演这个角色，并将大部分自定义逻辑放置于此。在 Cake 中，控制器包含一系列函数，这些函数的输入方式与普通 PHP 函数相同：`function\
    \ foo() { ... }`。\n\nCake 的助手和组件可以引入控制器并在应用程序中使用，第三方组件、插件和助手也同样可以。稍后你将构建更高级的控制器，充分利用所有这些可能性。\n\
    \n**启动应用程序**\n\n启动 Cake 应用程序总是通过在 Web 浏览器中输入相应的 URL 来完成。所有 URL 都会发送到调度器或 Cake\
    \ 的中央路由引擎，该引擎负责处理所有 HTTP 请求。调度器会解析 URL 并对其进行解析。你可以通过更改路由来操控调度器执行此操作的方式，这将在第 10\
    \ 章中进行说明。\n\n**Cake 如何解析 URL**\n\n默认情况下，URL 结构使用斜杠分隔，而不是你可能在许多使用 PHP 的网站上见过的、典型的杂乱字符（如问号或\
    \ & 符号）。越来越多的网站倾向于进行优化，以便在搜索引擎返回的结果列表中尽可能靠前。这使得许多开发者放弃了将 URL 路由传递给 PHP 脚本的传统方式，转而使用斜杠来分隔\
    \ URL 元素。这些路径通常被称为*友好* URL，它们更易于用户和搜索引擎理解，这本身对你的应用程序是有益的。友好 URL 还允许 Cake 在应用程序内部更好地维护一致的引用系统，这最终会使编程方面对你——开发者——来说更加简单和清晰。\n\
    \nCake 的默认路由遵循以下模式：\n\n```\nhttp://localhost/{应用程序}/{控制器}/{操作}/{参数 1}/{参数 2, 等}\n\
    ```\n\n因此，遵循 Cake 的默认设置，要启动应用程序，你需要在 Web 浏览器中输入以下内容：\n\n```\nhttp://localhost/todo\n\
    ```\n\n你应该会看到与安装 Cake 后相同的 Cake 欢迎界面。你尚未为 Cake 设置默认或基础路由，因此它默认会继续显示欢迎界面。\n\n由于你已经创建了`Items`控制器，要访问应用程序的该区域，你需要在\
    \ URL 的控制器位置插入`items`：\n\n```\nhttp://localhost/todo/items\n```\n\n**创建脚手架**\n\
    \n这就是 Cake 脚手架发挥作用的地方。回想一下，在清单 3-2 的第 4 行，你调用了对象变量`$scaffold`。当调度器接收到 URL 并发现你正在请求`Items`控制器时，它会查找一个名为`index()`的默认函数。然而，首先它会注意到你已告知它渲染脚手架（第\
    \ 4 行），并且由于你尚未在控制器中指定名为`index()`的函数，调度器将获取内置视图，并为数据库中的`items`表渲染一个标准的列表视图。在浏览器中启动`Items`控制器后，你应该会看到一个类似图\
    \ 3-2 的界面。\n\n![Image 21](index-46_1.jpg)"
  raw: 'This file name conforms with Cake’s naming conventions, and you will need
    to make sure when creating models that you name the files correctly. Should you
    give this file a different name, you would then have to specify the nonstandard
    file name in the controller and (depending on what accesses the model) elsewhere
    too. Remember the inversion of control structure of the framework—Cake will automatically
    look for a file named item.php in the app/models folder, which saves you from
    writing unnecessary code.


    In the item.php file, paste the code shown in Listing 3-1.


    **Listing 3-1.** *Contents of the* app/models/item.php *File* 1


    <?


    class Item extends AppModel {


    var $name = ''Item'';


    }


    ?>


    09775ch03final 7/1/08 9:39 PM Page 21


    C H A P T E R 3 ■ C R E AT I N G A TO - D O L I S T A P P L I C AT I O N


    **21**


    ■**Caution** Depending on your localhost or remote hosting setup, you may need
    to change line 1\. In all the examples in this book, I’m using a type of PHP shorthand.
    In some setups, though, PHP shorthand is not available. If this is the case, just
    use <?php on line 1 instead. Semantically, shorthand makes your code cleaner and
    easier to read, so to improve the readability of this book, I’m going to stick
    with it. You will want to double-check the examples if you have set up your localhost
    differently or if you’re sure that PHP shorthand is not available on your setup.


    **What’s Happening in This Model**


    All models will always contain some of the same header code. First you will notice
    on line 2


    that you have created a PHP class named Item and that this class extends another
    class named AppModel. Cake has already created the necessary PHP objects to connect
    to the database, so in a way all you’re doing is adding to that preconfigured
    object. For good measure, line 3 gives an object variable named name the value
    of Item, which allows for backward compatibility with PHP 4\. Lines 4 and 5 close
    out the file.


    **Model Possibilities**


    Inside this class you can place model functions or specify table associations
    that directly interact with the items table in the database and return results.
    Possible functions include field validation, complex find queries and operations,
    and elaborate table design cleanup.


    For now, the Item model is ready to go. Let’s make the controller.


    **Creating Controllers**


    In the app/controllers folder, create a new file for the items table in the database.
    Controllers, by default, link up to the table after which they are named. In this
    case, you have created an items table, so the convention in Cake is to name the
    controller file after this table, using an underscore and the extension controller.php.
    So, name this new file items_controller.php, and place it in the app/controllers
    folder. Paste the code shown in Listing 3-2 into this file.


    **Listing 3-2.** *Contents of* app/controllers/items_controller.php 1


    <?


    class ItemsController extends AppController {


    var $name = ''Items'';


    var $scaffold;


    }


    ?>


    09775ch03final 7/1/08 9:39 PM Page 22


    **22**


    C H A P T E R 3 ■ C R E AT I N G A TO - D O L I S T A P P L I C AT I O N


    **What’s Happening in This Controller**


    Let me explain what’s happening in Listing 3-2.


    Line 2 is necessary for Cake to run the controller. Just as it does with the model,
    Cake is already starting some of its own PHP code in what it calls the *controller*.
    Next, it moves to any objects that extend this parent class. These will include
    the application’s own controller, or AppController, and any other controller files
    it finds in the app/controllers folder. All the way down, you need to tell Cake
    whether you’ve inserted your own AppController or individual controller file,
    and you do this by starting a class and extending the previous level of controller.
    In this case, you created the ItemsController class, and it extends from the AppController.


    Line 3 names the controller Items for the same reasons the model also set the
    object variable to $name earlier.


    In line 4, you’ve called out one of Cake’s built-in features: the scaffold. You
    can include this line in any controller, and Cake will build its own set of HTML
    forms and tables around what it finds in the database table. In a second, you’ll
    see how helpful this one little string of code can be.


    **Controller Possibilities**


    Because the controller controls what happens in the application, it will likely
    be the most variable of the other resources I’ve discussed to this point. In a
    sense, it behaves like the “brain” of the application and coordinates the processes
    in the models and views. A good MVC application’s controller will generally act
    in this role with most of the custom logic placed here. In Cake, the controller
    contains a series of functions that are entered like normal PHP functions: function
    foo() {


    …


    }


    Cake’s helpers and components can be pulled into a controller and used in the
    application, as well as third-party components, plugins, and helpers. Later you’ll
    build more advanced controllers that make use of all these possibilities.


    **Launching the Application**


    Launching Cake applications is always done by entering the appropriate URL in
    a web browser. All URLs are sent to the dispatcher or Cake’s central routing engine
    that handles all HTTP requests. The dispatcher parses the URL and resolves it.
    You can manipulate how the dispatcher does this by changing routes, which is explained
    in Chapter 10.


    09775ch03final 7/1/08 9:39 PM Page 23


    C H A P T E R 3 ■ C R E AT I N G A TO - D O L I S T A P P L I C AT I O N


    **23**


    **How Cake Resolves URLs**


    By default, the URL structure is delimited by slashes, not the typical messy characters
    such as the question mark or ampersand that you have undoubtedly seen with many
    web sites using PHP. There is a growing trend for web sites to be optimized so
    that they show up as high as possible on the result lists returned by search engines.
    This has led many developers to forego the traditional way of passing URL routes
    to a PHP script, instead using slashes to separate URL elements. Usually called
    *friendly* URLs, these paths are more easily understood by users and search engines,
    which are themselves beneficial to your application. Friendly URLs also allow
    Cake to better maintain a consistent reference system within the application,
    which ultimately makes the programming aspect easier and cleaner for you, the
    developer.


    Cake’s default routes follow this pattern:


    [http://localhost/{Application}/{Controller}/{Action}/{Parameter 1}/](http://localhost)➥


    {Parameter 2, etc.}


    So, following the Cake defaults, to launch the application, you enter the following
    in your web browser:


    [http://localhost/todo](http://localhost/todo)


    You should see the same Cake welcome screen that you got after installing Cake.
    You haven’t set up a default or base route for Cake, so it will continue to show
    the welcome screen by default.


    Since you have created the Items controller, to access that area of the application
    you plug in items in the controller spot in the URL:


    [http://localhost/todo/items](http://localhost/todo/items)


    **Creating the Scaffolding**


    Here is where Cake’s scaffolding comes in. Recall that in Listing 3-2, line 4,
    you called the object variable $scaffold. When the dispatcher receives the URL
    and finds that you are requesting the Items controller, it looks for a default
    function named index(). First, however, it notices that you have told it to render
    the scaffolding (line 4), and since you haven’t specified a function in the controller
    called index() yet, the dispatcher will fetch the built-in views and render a
    standard list view for the items table in the database. After launching the Items
    controller in the browser, you should get a screen like Figure 3-2.


    ![Image 21](index-46_1.jpg)


