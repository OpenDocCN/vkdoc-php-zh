  trans: "\n# PHP 如何处理文件上传\n\n“上传”一词指将文件从一台计算机移动到另一台计算机，但对于 PHP 而言，实际上只是将文件从一个位置移动到另一个位置。这意味着你可以在本地计算机上测试本章的所有脚本，无需将文件上传到远程服务器。\n\
    \nPHP 默认支持文件上传，但托管公司可能会限制上传大小或完全禁用上传功能。在开始之前，最好先检查远程服务器的设置。\n\n## 检查服务器是否支持上传\n\
    \n你所需的所有信息都显示在主 PHP 配置页面上，你可以按照第 2 章所述，在远程服务器上运行 `phpinfo()` 来查看此页面。向下滚动，直到在 Core\
    \ 部分找到 `file_uploads`。\n\n如果 Local Value 为 `On`，一切就绪，但你还应该检查表 9-1 中列出的其他配置设置。\n\
    \n**表 9-1.** 影响文件上传的 PHP 配置设置\n\n| 指令 | 默认值 | 描述 |\n| --- | --- | --- |\n| `max_execution_time`\
    \ | 30 | PHP 脚本可以运行的最大秒数。如果脚本运行时间更长，PHP 会生成致命错误。 |\n| `max_file_uploads` | 20\
    \ | 可以同时上传的最大文件数。多余的文件会被静默忽略。 |\n| `max_input_time` | 60 | PHP 脚本解析 `$_POST` 和\
    \ `$_GET` 数组以及文件上传所允许的最大秒数。非常大的上传可能会超时。 |\n| `post_max_size` | 8M | 所有 `$_POST`\
    \ 数据的最大允许大小，*包括*文件上传。虽然默认是 8M（8 兆字节），但托管公司可能施加更小的限制。 |\n| `upload_tmp_dir` | \
    \ | PHP 存储上传文件的位置，直到你的脚本将其移动到永久位置。如果 `php.ini` 中没有定义值，PHP 会使用系统默认的临时目录（`C:\\Windows\\\
    Temp` 或 Mac/Linux 上的 `/tmp`）。 |\n| `upload_max_filesize` | 2M | 单个上传文件的最大允许大小。默认是\
    \ 2M（兆字节），但托管公司可能施加更小的限制。整数值表示字节数。K 表示千字节，M 表示兆字节，G 表示千兆字节。 |\n\nPHP 7 可以处理大于\
    \ 2 GB 的单个文件上传，但实际限制由表 9-1 中的设置决定。`post_max_size` 的默认值 8 MB 包含 `$_POST` 数组的内容，因此在典型服务器上可以同时上传的文件总大小小于\
    \ 8 MB，且单个文件不能大于 2 MB。服务器管理员可以更改这些默认值，因此检查托管公司设置的限值很重要。如果超出这些限值，原本完美的脚本也会失败。\n\
    \n如果 `file_uploads` 的 Local Value 为 `Off`，则表示上传功能已被禁用。除了询问托管公司是否提供已启用文件上传的套餐外，你对此无能为力。唯一的替代方案是更换主机或使用其他解决方案，例如通过\
    \ FTP 上传文件。\n\n**提示**  \n使用 `phpinfo()` 检查远程服务器设置后，请删除该脚本或将其放入受密码保护的目录中。\n\n##\
    \ 在表单中添加文件上传字段\n\n向 HTML 表单添加文件上传字段很容易。只需在开头的 `<form>` 标签中添加 `enctype=\"multipart/form-data\"\
    `，并将 `<input>` 元素的 `type` 属性设置为 `file`。以下代码是上传表单的简单示例（位于 `ch09` 文件夹中的 `file_upload_01.php`）：\n\
    \n```\n<form action=\"\" method=\"post\" enctype=\"multipart/form-data\">\n  <p>\n\
    \    <input type=\"file\" name=\"image\">\n  </p>\n  <p>\n    <input type=\"submit\"\
    \ name=\"upload\" value=\"Upload\">\n  </p>\n</form>\n```\n\n虽然这是标准的 HTML，但它在网页中的呈现方式取决于浏览器（参见图\
    \ 9-1）。许多浏览器会显示“选择文件”或“浏览”按钮，右侧带有一条状态消息或所选文件的名称。Microsoft Edge 会显示一个只读文本输入字段，右侧有一个“浏览”按钮。Edge\
    \ 在点击字段内部时会立即启动文件选择面板。这些差异不会影响上传表单的操作，但在设计布局时需要考虑到。\n\n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig1_HTML.jpg](img/332054_4_En_9_Fig1_HTML.jpg)\n\
    \n**图 9-1.** 文件输入字段的外观取决于浏览器\n\n## 理解 $_FILES 数组\n\n让许多人困惑的是，他们的文件在上传后似乎消失了。这是因为你不能像对待文本输入那样，在\
    \ `$_POST` 数组中引用上传的文件。PHP 在一个名为 `$_FILES`（这个命名很合理）的独立超全局数组中传输上传文件的详细信息。此外，文件会上传到临时文件夹，除非你明确将其移动到所需位置，否则会被删除。这使你在接受上传之前可以对文件进行安全检查。\n\
    \n### 检查 $_FILES 数组\n\n理解 `$_FILES` 数组工作原理的最佳方式是实际查看它的运作。你可以在计算机上的本地测试环境中测试所有内容，其工作方式与将文件上传到远程服务器相同。\n\
    \n1. 在 `phpsols-4e` 站点根目录中创建一个名为 `uploads` 的文件夹。在 `uploads` 文件夹中创建一个名为 `file_upload.php`\
    \ 的文件，并插入上一节的代码。或者，复制 `ch09` 文件夹中的 `file_upload_01.php` 并将文件重命名为 `file_upload.php`。\n\
    \n2. 在结束的 `</form>` 标签后立即插入以下代码（该代码也存在于 `file_upload_02.php` 中）：\n\n    ```\n\
    \    <?php\n    if (isset($_POST['upload'])) {\n        echo '<pre>';\n      \
    \  print_r($_FILES);\n        echo '</pre>';\n    }\n    ?>\n    ```\n\n    这段代码使用\
    \ `isset()` 检查 `$_POST` 数组中是否包含 `upload`（提交按钮的 `name` 属性）。如果包含，则表示表单已提交，因此你可以使用\
    \ `print_r()` 检查 `$_FILES` 数组。`<pre>` 标签使输出更易于阅读。\n\n3. 保存 `file_upload.php` 并在浏览器中加载。\n\
    \n4. 单击“浏览”（或“选择文件”）按钮并选择一个本地文件。单击“打开”（在 Mac 上为“选择”）关闭选择对话框，然后单击“上传”。你应该会看到类似图\
    \ 9-2 的内容。\n\n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig2_HTML.jpg](img/332054_4_En_9_Fig2_HTML.jpg)\n\
    \n**图 9-2.** $_FILES 数组包含上传文件的详细信息\n\n`$_FILES` 是一个多维数组——一个由数组组成的数组。顶层包含一个单一元素，其键（或索引）来自文件输入字段的\
    \ `name` 属性，在本例中为 `image`。\n\n顶层 `image` 数组包含一个由五个元素组成的子数组，分别是：\n\n* `name`：上传文件的原始名称\n\
    * `type`：上传文件的 MIME 类型\n* `tmp_name`：上传文件的位置\n* `error`：表示上传状态的整数\n* `size`：上传文件的大小（以字节为单位）\n\
    \n不要浪费时间查找 `tmp_name` 指示的临时文件：它不会在那里。如果不立即保存，PHP 会将其丢弃。\n\n**注意**  \nMIME 类型是浏览器用来确定文件格式及其处理方式的标准。更多信息，请参见\
    \ [`https://developer.mozilla.org/en-US/docs/Web/HTTP/Basics_of_HTTP/MIME_types`](https://developer.mozilla.org/en-US/docs/Web/HTTP/Basics_of_HTTP/MIME_types)。\n\
    \n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig3_HTML.jpg](img/332054_4_En_9_Fig3_HTML.jpg)\n\
    \n**图 9-3.** 未上传文件时，$_FILES 数组仍然存在\n"
- fmt: "# 1. 文件上传与错误处理\n\n1.  Click Upload without selecting a file. The `$_FILES`\
    \ array should look like Figure [9-3](#332054_4_En_9_Chapter.xhtml#Fig3).\n\n\
    An error level of 4 indicates that no file was uploaded; 0 means the upload succeeded.\
    \ Table [9-2](#332054_4_En_9_Chapter.xhtml#Tab2) later in this chapter lists all\
    \ the error codes.\n\n1.  Select a program file and click the Upload button. In\
    \ many cases, the form will happily try to upload the program and will display\
    \ its type as `application/zip`, `application/octet-stream`, or something similar.\
    \ This should serve as a warning that it’s important to check what type of file\
    \ is being uploaded.\n\n# 2. 建立上传目录\n\nFor security, files uploaded through an\
    \ online form shouldn’t be publicly accessible through a browser. In other words,\
    \ they shouldn’t be inside the site root (typically `htdocs`, `public_html`, or\
    \ `www`). On your remote server, create a directory for uploads outside the site\
    \ root and set the permissions to 644 (owner can read and write; others can read\
    \ only).\n\n## 2.1. 为 Windows 本地测试创建上传文件夹\n\nFor the following exercises, I suggest\
    \ you create a folder called `upload_test` at the top level of the C drive. There\
    \ are no permissions issues on Windows, so that’s all that you need to do.\n\n\
    ## 2.2. 为 macOS 本地测试创建上传文件夹\n\nMac users might need to do a little more preparation\
    \ because file permissions are similar to Linux. Create a folder called `upload_test`\
    \ in your home folder and follow the instructions in PHP Solution 9-1.\n\nIf everything\
    \ goes smoothly, you won’t need to do anything extra. But if you get a warning\
    \ that PHP “failed to open stream,” change the permissions for the `upload_test`\
    \ folder like this:\n\n1.  Select `upload_test` in the Mac Finder and select File\
    \ ➤ Get Info (Cmd+I) to open its info panel.\n\n2.  In Sharing & Permissions click\
    \ the padlock icon at the bottom right to unlock the settings, then change the\
    \ setting for everyone from Read only to Read & Write, as shown in the following\
    \ screenshot.\n\n![../images/332054_4_En_9_Chapter/332054_4_En_9_Figa_HTML.jpg](images/332054_4_En_9_Chapter/332054_4_En_9_Figa_HTML.jpg)\n\
    \n3.  Click the padlock icon again to preserve the new settings and close the\
    \ info panel. You should now be able to use the `upload_test` folder to continue\
    \ with the rest of the chapter.\n\n# 3. 上传文件\n\nBefore building the file upload\
    \ class, it’s a good idea to create a simple file upload script to make sure that\
    \ your system handles uploads correctly.\n\n## 3.1. 将临时文件移动到上传文件夹\n\nThe temporary\
    \ version of an uploaded file has only a fleeting existence. If you don’t do anything\
    \ with the file, it’s discarded immediately. You need to tell PHP where to move\
    \ it and what to call it. You do this with the `move_uploaded_file()` function,\
    \ which takes the following two arguments:\n\n*   The name of the temporary file\n\
    *   The full path name of the file’s new location, including the filename itself\n\
    \nObtaining the name of the temporary file itself is easy: it’s stored in the\
    \ `$_FILES` array as `tmp_name`. Because the second argument requires a full path\
    \ name, it gives you the opportunity to rename the file. For the moment, let’s\
    \ keep things simple and use the original filename, which is stored in the `$_FILES`\
    \ array as `name`.\n\n# 4. PHP Solution 9-1: Creating a Basic File Upload Script\n\
    \nContinue working with the same file as in the previous exercise. Alternatively,\
    \ use `file_upload_03.php` from the `ch09` folder. The final script for this PHP\
    \ solution is in `file_upload_04.php`.\n\n*   If you are using Windows and you\
    \ created the `upload_test` folder at the top level of the C drive, it should\
    \ look like this:\n\n```\n$destination = 'C:/upload_test/';\n```\n\nNote that\
    \ I have used forward slashes instead of the Windows convention of backslashes.\
    \ You can use either, but if you use backslashes, the final one needs to be escaped\
    \ by another backslash, like this (otherwise the backslash escapes the quote):\n\
    \n```\n$destination = 'C:\\upload_test\\\\';\n```\n\n*   On a Mac, if you created\
    \ the `upload_test` folder in your home folder, it should look like this (replace\
    \ *username* with your Mac username):\n\n```\n$destination = '/Users/username/upload_test/';\n\
    ```\n\n*   On a remote server, you need the fully qualified file path as the second\
    \ argument. On Linux, it will probably be something like this:\n\n```\n$destination\
    \ = '/home/user/private/upload_test/';\n```\n\n1.  If you are using the file from\
    \ the previous exercise, delete the code highlighted in bold between the closing\
    \ `</form>` and `</body>` tags:\n\n2.  In addition to the automatic limits set\
    \ in the PHP configuration (see Table [9-1](#332054_4_En_9_Chapter.xhtml#Tab1)),\
    \ you can specify a maximum size for an upload file in your HTML form. Add the\
    \ following line highlighted in bold immediately before the file input field:\n\
    \n```\nUpload image: <input type=\"hidden\" name=\"MAX_FILE_SIZE\" value=\"<?=\
    \ $max ?>\">\n```\n\nThis is a hidden form field, so it won’t be displayed onscreen.\
    \ However, it’s vital to place it *before* the file input field, otherwise it\
    \ won’t work. The `name` attribute, `MAX_FILE_SIZE`, is fixed and case-sensitive.\
    \ The `value` attribute sets the maximum size of the upload file in bytes.\n\n\
    Instead of specifying a numeric value, I have used a variable called `$max`. This\
    \ value will also be used in the server-side validation of the file upload, so\
    \ it makes sense to define it once, avoiding the possibility of changing it in\
    \ one place but forgetting to change it elsewhere.\n\nThe advantage of using `MAX_FILE_SIZE`\
    \ is that PHP abandons the upload if the file is bigger than the stipulated value,\
    \ avoiding unnecessary delays if the file is too big. Unfortunately, users can\
    \ get around this restriction by faking the value submitted by the hidden field,\
    \ so the script you’ll develop in the rest of this chapter will check the size\
    \ on the server side, too.\n\n3.  Define the value of `$max` in a PHP block above\
    \ the DOCTYPE declaration, like this:\n\nThis sets the maximum upload size to\
    \ 50 KB (51,200 bytes).\n\n4.  The code that moves the uploaded file from its\
    \ temporary location to its permanent one needs to be run after the form has been\
    \ submitted. Insert the following code in the PHP block you have just created\
    \ at the top of the page:\n\n```\n$max = 51200;\nif (isset($_POST['upload']))\
    \ {\n    // define the path to the upload folder\n    $destination = '/path/to/upload_test/';\n\
    \    // move the file to the upload folder and rename it\n    move_uploaded_file($_FILES['image']['tmp_name'],\n\
    \    $destination . $_FILES['image']['name']);\n}\n?>\n```\n\nAlthough the code\
    \ is quite short, there’s a lot going on. The conditional statement executes the\
    \ code only if the Upload button has been clicked by checking to see if its key\
    \ is in the `$_POST` array.\n\nThe value of `$destination` depends on your operating\
    \ system and the location of the `upload_test` folder.\n\nThe final line inside\
    \ the `if` statement moves the file with the `move_uploaded_file()` function.\
    \ The function takes two arguments: the name of the temporary file and the full\
    \ path to where the file is to be saved. `$_FILES` is a multidimensional array\
    \ that takes its name from the file input field. So, `$_FILES['image']['tmp_name']`\
    \ is the temporary file, and `$_FILES['image']['name']` contains the name of the\
    \ original file. The second argument, `$destination . $_FILES['image']['name']`,\
    \ stores the uploaded file under its original name inside the upload folder."
