  类别 2  \n产品 3\n\n**图 4-4.** *类别与产品之间的多对多关系*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n648XCH04.qxd 10/31/06 10:01 PM 第 112 页\n\n**112**\n\n第 4 章 ■ 创建产品目录：第二部分\n\n注意，连接表中的每条记录都将一个类别与一个产品连接起来。你可以在连接表中拥有任意数量的记录，将任何类别与任何产品连接起来。\n\
  \n这个链接表包含两个字段，每个字段分别引用两个链接表之一的主键。在我们的案例中，连接表将包含两个字段：`category_id` 字段和 `product_id`\
  \ 字段。\n\n连接表中的每条记录都包含一个 `(product_id, category_id)` 对，用于将特定的产品与特定的类别关联起来。通过向 `product_category`\
  \ 表中添加更多记录，你可以将一个产品关联到更多类别，或将一个类别关联到更多产品，从而有效地实现多对多关系。\n\n由于多对多关系是使用一个第三个表来建立链接表之间的连接，因此无需像我们在\
  \ `category` 表中添加 `department_id` 来实现一对多关系那样，向相关表中添加额外的字段。\n\n连接表没有明确的命名约定。大多数情况下，将两个链接表的名称连接起来即可——在本例中，连接表被命名为\
  \ `product_category`。\n\n## 使用 FOREIGN KEY 约束强制表关系\n\n可以使用 `FOREIGN KEY` 约束（简称*外键*）在数据库中物理地强制执行表之间的关系。\n\
  \n你在前一章已经学习了 `PRIMARY KEY` 和 `UNIQUE` 约束。我们之所以在那里介绍它们，是因为它们适用于作为独立实体的表。而外键则发生在两个表之间：定义外键的表（*引用表*）和外键引用的表（*被引用表*）。\n\
  \n> **提示：** 实际上，引用表和被引用表可以是同一个表。这在实际中不常见，但也并非罕见。例如，你可以有一个员工表，其中每个员工都引用其上级（在此场景中，大老板可能会引用自己）。\n\
  \n\n\n"
- "# 外键（Foreign Key）\n\n**外键**是一个列或列的组合，用于强制两个表之间的数据链接（通常表示一对多关系）。外键既用作确保数据完整性的一种方法，也用于建立表之间的关系。\n\
  \n为了强制数据库完整性，外键与其他类型的约束一样，会应用某些限制。与将限制应用于单个表的`PRIMARY KEY`和`UNIQUE`约束不同，`FOREIGN\
  \ KEY`约束将限制应用于引用表和被引用表。例如，如果通过`FOREIGN KEY`约束强制`department`和`category`表之间的一对多关系，数据库将把此关系作为其完整性的一部分包含在内。它不允许您向不存在的部门添加类别，也不允许您删除存在属于它的类别的部门。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n`648XCH04.qxd 10/31/06 10:01\
  \ PM Page 113`\n\n**第 4 章 ■ 创建产品目录：第二部分 113**\n\n您现在了解了外键的一般理论。在以下练习中，您将通过创建并填充以下表来实践您所学到的关于表关系的新理论：\n\
  \n- `category`\n- `product`\n- `product_category`\n\n## 添加类别\n\n创建`category`表的过程与您在第二章中创建的`department`表基本相同。`category`表将有四个字段，如表\
  \ 4-1 所述。\n\n**表 4-1.** *设计* `category` *表*\n\n| **字段名** | **数据类型** | **描述** |\n\
  |------------|--------------|--------------------------------------------------------------------------------------------------|\n\
  | `category_id` | `SERIAL` | 一个表示类别唯一 ID 的整数。它是表的主键。 |\n| `department_id` | `INTEGER`\
  \ | 一个表示类别所属部门的整数。不允许为`NULL`。 |\n| `name` | `VARCHAR(50)` | 存储类别名称。不允许为`NULL`。 |\n\
  | `description` | `VARCHAR(1000)` | 存储类别描述。允许为`NULL`。 |\n\n有两种方法可以创建`category`表并填充它。要么从\
  \ Apress 网站（http://www.apress.com/）的源代码/下载部分执行 SQL 脚本，要么按照以下练习中的步骤操作。\n\n### 练习：创建`category`表\n\
  \n1. 启动 pgAdmin III，并连接到`hatshop`数据库。\n2. 选择 **工具 ➤ 查询工具**。\n3. 输入以下代码：\n\n   ```sql\n\
  \   -- 创建 category 表\n   CREATE TABLE category\n   (\n       category_id SERIAL\
  \ NOT NULL,\n       department_id INTEGER NOT NULL,\n       name VARCHAR(50) NOT\
  \ NULL,\n       description VARCHAR(1000),\n       CONSTRAINT pk_category_id PRIMARY\
  \ KEY (category_id),\n       CONSTRAINT fk_department_id FOREIGN KEY (department_id)\
  \ REFERENCES department (department_id)\n       ON UPDATE RESTRICT ON DELETE RESTRICT\n\
  \   );\n   ```\n\n   [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n   ![](img/00017.png)\n\
  \n   `648XCH04.qxd 10/31/06 10:01 PM Page 114`\n\n   **114 第 4 章 ■ 创建产品目录：第二部分**\n\
  \n4. 通过选择 **查询 ➤ 执行** 或按 F5 键执行查询。结果如图 4-5 所示。\n\n   **图 4-5.** *使用 pgAdmin III\
  \ 创建* `category` *表*\n\n   > **提示** 执行此命令时，数据库将自动创建一个名为`category_category_id_seq`的序列，该序列将为`category_id`字段生成值。此外，您从第三章中了解到，将在主键列上创建一个索引。\n\
  \n## 工作原理：一对多关系\n\n好的，您已经创建并强制了`category`和`department`表之间的关系。但它是如何工作的，以及它如何影响您的操作？让我们研究一下如何实现这种关系。\n\
  \n在`category`表中，除了主键以及通常的`category_id`、`name`和`description`列之外，您还添加了一个`department_id`列。此列存储类别所属部门的\
  \ ID。因为`category`表中的`department_id`字段不允许`NULL`，所以您必须为每个类别提供一个部门。此外，由于外键关系，数据库不允许您指定一个不存在的部门。\n\
  \n外键的行为由用于创建它的命令决定，在我们的例子中：\n\n```sql\nCONSTRAINT fk_department_id FOREIGN KEY (department_id)\
  \ REFERENCES department (department_id)\nON UPDATE RESTRICT ON DELETE RESTRICT\n\
  ```\n\n可以指示约束对更新和删除操作采取不同的行为。在这里，两种情况下的行为都是`RESTRICT`。让我们看看替代方案：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n`648XCH04.qxd 10/31/06 10:01 PM Page 115`\n\n**第 4 章 ■ 创建产品目录：第二部分 115**\n\n-\
  \ **`RESTRICT`（类似于`NO ACTION`）：** 这可能是最重要的选项。它告诉 PostgreSQL 确保涉及关系中的表的数据库操作不会破坏该关系。当设置此选项时，PostgreSQL\
  \ 不允许您向不存在的部门添加类别，也不允许您删除具有相关类别的部门。\n- **`CASCADE`**：执行自动数据更改以维护数据完整性。例如，更改现有部门的\
  \ ID 将导致更改传播到`category`表，以保持类别-部门关联的完整性。这样，即使您更改了部门的 ID，其类别仍将属于它。此选项很危险，因为当删除一个部门时，PostgreSQL\
  \ 会自动删除该部门的所有相关类别。这是一个敏感的选项，请非常小心。您不会在 HatShop 项目中使用它。\n- **`SET NULL`**：当父表被更新或删除时，将外键字段设置为`NULL`。\n\
  - **`SET DEFAULT`**：当父表被更新或删除时，将外键字段设置为其默认值。\n\n在一对多关系（以及隐式的`FOREIGN KEY`约束）中，您链接来自两个不同表的两个列。其中一个列是主键，它定义了关系的“一”方。在我们的例子中，`department_id`是`department`表的主键，因此`department`是连接到多个`category`的那一方。主键必须位于“一”方以确保其唯一性——如果无法确保部门\
  \ ID 是唯一的，则类别无法链接到部门。您必须确保没有两个部门具有相同的 ID；否则，这种关系就没有太大意义。\n\n您可以在 http://techdocs.postgresql.org/techdocs/hackingreferentialintegrity.php\
  \ 找到一篇关于 PostgreSQL 参照完整性的非常好的文章。\n\n现在您已经创建了`category`表，可以用一些数据填充它。我们还将尝试添加会破坏您在`department`和`category`表之间建立的关系的数据。\n\
  \n我们将添加到`category`表的示例数据如表 4-2 所示。\n\n**表 4-2.** *设计* `category` *表*\n\n| `category_id`\
  \ | `department_id` | `name` | `description` |\n|----------------|-----------------|---------------------------------|-----------------------------------------------------------|\n\
  | 1 | 1 | Christmas Hats | Enjoy browsing our collection of Christmas hats! |\n\
  | 2 | 1 | Halloween Hats | Find the hat you’ll wear this Halloween! |\n| 3 | 1 |\
  \ St. Patrick’s Day Hats | Try one of these beautiful hats on St. Patrick’s Day!\
  \ |\n| 4 | 2 | Berets | An amazing collection of berets from all around the world!\
  \ |\n| 5 | 2 | Driving Caps | Be an original driver! Buy a driver’s hat today! |\n\
  | 6 | 2 | Theatrical Hats | Going to a costume party? Try one of these hats to complete\
  \ your costume! |\n| 7 | 3 | Military Hats | This collection contains the most realistic\
  \ replicas of military hats! |\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n`648XCH04.qxd 10/31/06 10:01 PM Page 116`\n\n**116 第 4 章 ■ 创建产品目录：第二部分**\n\n###\
  \ 练习：添加类别\n\n\n\n1.  启动 `pgAdmin`，并连接到 `hatshop` 数据库。\n\n2.  选择 `Tools` ➤ `Query\
  \ Tool`。\n\n3.  输入以下代码：\n\n```sql\n-- Populate category table\n\nINSERT INTO category\
  \ (category_id, department_id, name, description) VALUES (1, 1, 'Christmas Hats',\n\
  \n'Enjoy browsing our collection of Christmas hats!');\n\nINSERT INTO category (category_id,\
  \ department_id, name, description) VALUES (2, 1, 'Halloween Hats',\n\n'Find the\
  \ hat you''ll wear this Halloween!');\n\nINSERT INTO category (category_id, department_id,\
  \ name, description) VALUES (3, 1, 'St. Patrick''s Day Hats',\n\n'Try one of these\
  \ beautiful hats on St. Patrick''s Day!'); INSERT INTO category (category_id, department_id,\
  \ name, description) VALUES (4, 2, 'Berets',\n\n'An amazing collection of berets\
  \ from all around the world!'); INSERT INTO category (category_id, department_id,\
  \ name, description) VALUES (5, 2, 'Driving Caps',\n\n'Be an original driver! Buy\
  \ a driver''s hat today!');\n\nINSERT INTO category (category_id, department_id,\
  \ name, description) VALUES (6, 3, 'Theatrical Hats',\n\n'Going to a costume party?\
  \ Try one of these hats to complete your costume!'); INSERT INTO category (category_id,\
  \ department_id, name, description) VALUES (7, 3, 'Military Hats',\n\n'This collection\
  \ contains the most realistic replicas of military hats!');\n\n-- Update the sequence\n\
  \nALTER SEQUENCE category_category_id_seq RESTART WITH 8;\n```\n\n**注意**：在创建类别的\
  \ SQL 代码中，我们选择不依赖数据库自动生成的`category_id`值，以确保您最终拥有的 ID 与我们假设您拥有的 ID 相同。这将在稍后为产品 ID\
  \ 分配特定类别 ID 时非常重要。\n\n当手动指定本应由序列生成的值时，您还需要更新序列，如前面的代码片段所示。如果您计划添加新类别，请确保在执行 SQL\
  \ INSERT 语句之前该表为空。您可以使用以下命令删除`category`表的内容：\n\n```sql\nDELETE FROM category;\n\
  ```\n\n4.  通过选择 `Query` ➤ `Execute` 或按 `F5` 来执行查询。结果如图 4-6 所示。\n\n**图 4-6.** *添加示例类别*\n\
  \n5.  现在，尝试通过向不存在的部门（例如，将`DepartmentID`设置为 500）添加类别来破坏数据库完整性。尝试使用 `pgAdmin III`\
  \ 执行以下 SQL 命令：\n```sql\nINSERT INTO category (department_id, name, description)\
  \ VALUES (500, 'New category', 'Executing this command should throw an error.');\n\
  ```\n\n6.  如果一切顺利，数据库应拒绝添加新记录，并抛出如图 4-7 所示的错误。\n\n**图 4-7.** *外键约束生效*\n\n**工作原理：填充类别表**\n\
  \n鉴于您已知需要插入的数据，向表中添加数据应该是一项简单的任务。如前所述，您可以在 Apress 网站（`http://www.apress.com`）的源代码/下载部分找到本书代码中的\
  \ SQL 脚本。\n\n请注意我们如何转义类别描述中的特殊字符，例如单引号，这些字符需要成对出现，以便 PostgreSQL 知道将其解释为要添加到描述中的引号，而不是字符串终止字符。\n\
  \n当手动向字段添加值，而这些字段的值本应由序列生成时，您需要手动更新序列，因为序列是独立的数据库对象，如果未用于生成数据，则不会自动更新。如果不更改序列，它可能会生成已添加到数据库中的值，导致部分或全部\
  \ INSERT 命令抛出错误。\n\n### 添加产品\n\n现在，您将重复之前的步骤，但这次创建一个更复杂的表：`product`。`product`表具有表\
  \ 4-3 所示的字段。\n\n**表 4-3.** *设计* product *表*\n\n| 字段名 | 数据类型 | 描述 |\n| :--- | :---\
  \ | :--- |\n| `product_id` | `SERIAL` | 代表类别唯一 ID 的整数。它是表的主键。 |\n| `name` | `VARCHAR(50)`\
  \ | 存储产品名称。不允许为 NULL。 |\n| `description` | `VARCHAR(1000)` | 存储类别描述。允许为 NULL。 |\n\
  | `price` | `NUMERIC(10,2)` | 存储产品价格。 |\n| `discounted_price` | `NUMERIC(10,2)`\
  \ | 存储打折后的产品价格。如果产品当前没有折扣，则存储 0.00。 |\n| `image` | `VARCHAR(150)` | 存储产品图片文件的名称（或完整路径），该图片在产品详情页显示。您可以将图片直接存储在表中，但在大多数情况下，将图片文件存储在文件系统中，仅将其名称存储在数据库中要高效得多。如果您有一个高流量的网站，您甚至可能需要将图片文件放在单独的物理位置（例如，另一个硬盘）以提高站点性能。\
  \ |\n| `thumbnail` | `VARCHAR(150)` | 存储产品缩略图图片的名称。在浏览目录的产品列表中显示此图片。 |\n| `display`\
  \ | `INTEGER` | 存储一个值，指定该产品应在目录的哪些区域显示。可能的值有 0（默认；产品仅在其所属类别的页面显示）、1（产品也在目录首页突出显示）、2（产品也在其所属部门页面突出显示）和\
  \ 3（产品同时在首页和部门页面突出显示）。借助此字段，站点管理员可以在特定时间突出显示一组访问者特别感兴趣的产品。例如，在万圣节前夕，您可能希望万圣节帽子在网站首页显著显示。此外，如果您想推广有折扣的产品，此功能正是您所需要的。\
  \ |\n\n请按照练习的步骤在您的数据库中创建`product`表。\n\n### 练习：创建产品表\n\n1.  启动 `pgAdmin III`，并连接到\
  \ `hatshop` 数据库。\n\n2.  选择 `Tools` ➤ `Query tool`。\n\n3.  输入以下代码：\n\n```sql\n--\
  \ Create product table\n\nCREATE TABLE product\n\n(\n\nproduct_id SERIAL NOT NULL,\n\
  \nname VARCHAR(50) NOT NULL,\n\ndescription VARCHAR(1000) NOT NULL,\n\nprice NUMERIC(10,\
  \ 2) NOT NULL,\n\ndiscounted_price NUMERIC(10, 2) NOT NULL DEFAULT 0.00,\n\nimage\
  \ VARCHAR(150),\n\nthumbnail VARCHAR(150),\n\ndisplay SMALLINT NOT NULL DEFAULT\
  \ 0,\n\nCONSTRAINT pk_product PRIMARY KEY (product_id)\n\n);\n```\n\n4.  通过选择 `Query`\
  \ ➤ `Execute` 或按 `F5` 来执行查询。\n\n**注意**：执行此命令时，数据库将自动创建一个名为`product_product_id_seq`的序列，该序列将生成`product_id`字段的值。此外，还将为主键列创建一个索引。\n\
  \n5.  现在，让我们用产品填充该表。由于产品数量众多，请使用源代码/下载部分（`http://www.apress.com`）提供的`populate_product.sql`脚本。\n\
  \n\n\n"
- "# 创建产品目录：第二部分\n\n## 关联产品与类别\n\n`product_category` 表是链接表，用于实现 `product` 和 `category`\
  \ 之间的多对多关系。它包含两个字段：`product_id` 和 `category_id`，这两个字段共同构成该表的主键。\n\n请按照练习中的步骤创建并填充该表。\n\
  \n### 练习：创建 `product_category` 表\n\n1. 启动 pgAdmin III，并连接到 `hatshop` 数据库。\n2. 选择\
  \ **工具 ➤ 查询工具**。\n3. 输入以下代码：\n\n```sql\n-- 创建 product_category 表\n\nCREATE TABLE\
  \ product_category\n(\n  product_id INTEGER NOT NULL,\n  category_id INTEGER NOT\
  \ NULL,\n  CONSTRAINT pk_product_id_category_id PRIMARY KEY (product_id, category_id),\n\
  \  CONSTRAINT fk_product_id FOREIGN KEY (product_id) REFERENCES product (product_id)\n\
  \    ON UPDATE RESTRICT ON DELETE RESTRICT,\n  CONSTRAINT fk_category_id FOREIGN\
  \ KEY (category_id) REFERENCES category (category_id)\n    ON UPDATE RESTRICT ON\
  \ DELETE RESTRICT\n);\n```\n\n4. 选择 **查询 ➤ 执行** 或按 F5 键来执行查询。\n5. 用数据填充该表。由于数据行数较多，请使用源代码/下载部分\
  \ (http://www.apress.com) 提供的 `populate_product_category.sql` 脚本。\n\n### 工作原理：多对多关系\n\
  \n多对多关系是通过添加第三个表（称为连接表，此处命名为 `product_category`）来创建的。该表包含 (`product_id`, `category_id`)\
  \ 对，表中的每条记录都将一个特定产品与一个特定类别关联起来。因此，如果在 `product_category` 中看到诸如 `(1,4)` 的记录，就能知道\
  \ ID 为 1 的产品属于 ID 为 4 的类别。\n\n这种多对多关系通过两个 **FOREIGN KEY（外键）** 约束在物理层面得到强制执行——一个约束将\
  \ `product` 表链接到 `product_category` 表，另一个约束将 `product_category` 表链接到 `category`\
  \ 表。用通俗的话来说，这意味着“一个产品可以与多个产品-类别条目关联，而每个这样的条目又与一个类别关联”。外键确保出现在 `product_category`\
  \ 表中的产品和类别确实存在于数据库中，并且如果某个产品关联了类别，则不允许删除该产品，反之亦然。\n\n这也是你第一次设置由多个列组成的主键。`product_category`\
  \ 的主键由它的两个字段构成：`product_id` 和 `category_id`。这意味着表中不允许出现两个完全相同的 (`product_id`, `category_id`)\
  \ 对。然而，只要在唯一的 (`product_id`, `category_id`) 对中，`product_id` 或 `category_id` 出现多次是完全合法的。这很合理，因为你不想在\
  \ `product_category` 表中有两条完全相同的记录。一个产品可以关联一个特定的类别，也可以不关联；但它不能多次关联同一个类别。\n\n起初，关于表关系的所有理论可能会让人感到有些困惑，直到你习惯为止。为了更清晰地理解这种关系，你可以使用数据库关系图来直观地了解。\n\
  \n### 使用数据库关系图\n\n许多工具允许你以可视化的方式构建数据库结构，在数据库中物理实现它们，并生成必要的 SQL 脚本。虽然本书不会介绍任何特定的工具，但了解它们的存在是件好事。你可以在\
  \ http://www.databaseanswers.com/modelling_tools.htm 找到最常用工具的列表。\n\n数据库关系图也具有实现表之间关系的能力。例如，如果你已经在四个表之间实现了关系，那么数据库关系图看起来会像图\
  \ 4-8 那样。\n\n**图 4-8.** *使用数据库关系图查看表和关系*\n\n在关系图中，每个表的主键都用 **PK** 标记表示。外键用 **FK**\
  \ 标记（因为一个表中可能有多个外键，所以会进行编号）。两个表之间的箭头指向关系中“一”的那一端所对应的表。\n\n## 查询新数据\n\n现在，你的数据库拥有大量信息，正等待有人来读取。然而，新的元素也带来了一系列需要学习的新知识。\n\
  \n对于本章而言，数据层逻辑比前一章稍微复杂一些，因为它必须回答诸如“给我卡通类别中第二页的产品”或“给我 X 部门正在促销的产品”之类的查询。在继续编写实现此逻辑的存储过程之前，让我们先了解以下理论知识：\n\
  \n- 检索简短的产品描述\n- 连接数据表\n- 实现分页\n\n让我们逐一处理这些任务。\n\n### 获取简短描述\n\n在浏览商品目录时，访客看到的产品列表中，我们不会显示完整的产品描述，而只显示其中的一部分。在\
  \ HatShop 中，我们将显示每个产品描述的前 150 个字符，并在其后附加“...”。\n\n在 PostgreSQL 中，你可以使用 `substring`\
  \ 函数从字符串中提取子串。以下 SELECT 命令返回产品描述被截断为 30 个字符并附加“...”的结果：\n\n```sql\nSELECT name,\n\
  \       substring(description, 1, 30) || '...' AS description\nFROM product\nORDER\
  \ BY name;\n```\n\n由 `(substring(description, 1, 30) || '...')` 表达式生成的新列没有名称，因此我们使用\
  \ `AS` 关键字为其创建了一个别名。根据你当前的数据，该查询将返回类似以下内容的结果：\n\n| name               | description\
  \                            |\n|--------------------|----------------------------------------|\n\
  | 454 黑色海盗帽      | 我们的羊毛毡海盗帽...                 |\n| 9 绿色疯帽子高顶礼帽 | 我们的每顶疯帽子帽...\
  \                 |\n| 黑色巴斯克贝雷帽     | 这是我们久经考验的男...               |\n| 黑色清教徒帽  \
  \      | Haentze Hatcrafters 一直...          |\n| 黑色巫师帽          | 这顶酷炫的 Merlin 风格巫师...\
  \        |\n| ...                | ...                                    |\n\n\
  ### 连接数据表\n\n由于你的数据存储在多个表中，通常并非所需的所有信息都只在一个表中。看看下面的列表，它包含了来自 `department` 表和 `category`\
  \ 表的数据：\n\n| 部门名称            | 类别名称              |\n|----------------------|------------------------|\n\
  | 假日                 | 圣诞帽                |\n| 假日                 | 万圣节帽       \
  \       |\n| 假日                 | 圣帕特里克节帽        |\n| 帽子和贝雷帽         | 贝雷帽     \
  \           |\n| 帽子和贝雷帽         | 驾驶帽                |\n| 戏服帽               | 戏剧帽\
  \                |\n| 戏服帽               | 军帽                  |\n\n在其他情况下，你需要的所有信息都在一个表中，但你需要根据另一个表中的信息对其施加条件。使用到目前为止所学的简单查询是无法得到这种结果集的。需要基于多个表中的数据获得结果集，这很好地表明你可能需要使用**表连接**。\n\
  \n\n\n当提取属于某个类别的产品时，SQL 查询与提取属于某个部门的产品并不相同。这是因为产品和类别之间通过 `product_category` 关联表进行链接。\n\
  \n要获取某类别中的产品列表，首先需要查看 `product_category` 表，找出所有 `(product_id, category_id)` 配对，其中\
  \ `category_id` 是你要查找的类别 ID。该列表包含了该类别中产品的 ID。利用这些 ID，你就能生成所需的产品列表。虽然这听起来相当复杂，但仅用一条\
  \ SQL 查询就能完成。SQL 的真正强大之处在于，它能通过简单的查询对大量数据执行复杂操作。\n\n你将通过分析 `product` 和 `product_category`\
  \ 表，以及分析如何获取属于特定类别的产品列表，来学习如何实现表连接。\n\n在 SQL 中，使用 `JOIN` 子句来连接表。将一个表与另一个表连接后，会合并这些表的列（而不是行）。连接两个表时，必须有一个用于连接的共同列。\n\
  \n假设你想获取 `category_id = 5` 类别中的所有产品。\n\n连接 `product` 和 `product_category` 表的查询如下：\n\
  \n```sql\nSELECT product_category.product_id,\nproduct_category.category_id,\nproduct.name\n\
  FROM product_category\nINNER JOIN product\nON product.product_id = product_category.product_id\n\
  ORDER BY product.product_id;\n```\n\n结果大致如下（为节省篇幅，列表未包含所有返回的行和列）：\n\n```\nproduct_id\
  \ category_id name\n----------- ----------- --------------------------------------------------\n\
  1           1           Christmas Candy Hat\n2           1           Hanukah Hat\n\
  3           1           Springy Santa Hat\n4           1           Plush Santa Hat\n\
  5           1           Red Santa Cowboy Hat\n6           1           Santa Jester\
  \ Hat\n7           1           Santa's Elf Hat\n8           2           Chauffeur\
  \ Hat\n8           5           Chauffeur Hat\n...\n```\n\n结果表由连接表中按 `product_id`\
  \ 列同步的请求字段组成，该列被指定为连接列。你可以看到，存在于多个类别中的产品会多次列出，每个所属类别一次，但在我们过滤结果以仅获取特定类别的产品后，这个问题就会消失。\n\
  \n请注意，在 `SELECT` 子句中，列名前缀了表名。如果列存在于参与连接的多个表中（例如本例中的 `product_id`），则这是必需的。对于其他列，是否用表名作为前缀是可选的，但为了避免混淆，最好还是加上。\n\
  \n仅返回属于类别 5 的产品的查询是：\n\n```sql\nSELECT product.product_id, product.name\nFROM product_category\n\
  INNER JOIN product\nON product.product_id = product_category.product_id\nWHERE product_category.category_id\
  \ = 5;\n```\n\n结果是：\n\n```\nproduct_id Name\n----------- --------------------------------------------------\n\
  8          Chauffeur Hat\n27         Bond-Leather Driver\n28         Moleskin Driver\n\
  29         Herringbone English Driver\n```\n\n最后值得讨论的一点是**别名**的使用。别名不一定与表连接相关，但在连接表时它们会变得特别有用（有时是必需的），并且它们会为涉及的表分配不同（通常更短）的名称。当表与自身连接时，别名是必需的，此时你需要为其不同实例分配不同的别名来区分它们。以下查询返回与前一个查询相同的产品，但使用了别名：\n\
  \n```sql\nSELECT p.product_id, p.name\n```\n\n\n\n`FROM product_category pc`\n\n\
  `INNER JOIN product p`\n\n`ON p.product_id = pc.product_id`\n\n`WHERE pc.category_id\
  \ = 5;`\n\n**逐页显示产品**\n\n如果某些网页部分需要列出大量产品，让访问者能够以每页预定义（或由访问者配置）的产品数量逐页浏览，会非常实用。\n\
  \n根据在架构中执行分页的层级不同，主要有三种实现分页的方式：\n\n**在数据层分页：** 在此情况下，数据库仅返回表示层所需的该页产品。\n\n**在业务层分页：**\
  \ 业务层从数据库请求完整的产品页面，执行过滤，然后仅向表示层返回需要显示的该页产品。\n\n**在表示层分页：** 在此场景中，表示层接收完整的产品列表，并提取出需要向访问者显示的该页产品。\n\
  \n在业务层和表示层进行分页存在潜在的性能问题，尤其是在处理大型结果集时，因为它们意味着需要将不必要的大量数据从数据库传输到表示层。额外的数据还需要存储在服务器内存中，不必要地消耗服务器资源。\n\
  \n在我们的网站中，我们将在数据层实现分页，这不仅因为其性能更佳，还因为它能让您学习一些在开发网站时会发现很有用的数据库编程技巧。\n\n要在数据层实现分页，我们需要找到如何构建一个`SELECT`查询，该查询只从更大的记录集中返回一部分记录（产品），而每种数据库语言似乎都有不同的实现方式。要在\
  \ PostgreSQL 中实现此功能，您需要将`LIMIT`和`OFFSET`关键字与`SELECT`语句结合使用：\n\n- `OFFSET`指定从原始行集中跳过多少条记录。因此，如果您想检索一个每页显示四个产品的产品目录中的第二页产品，则需要指定`OFFSET\
  \ 4`。没有偏移量的查询等同于`OFFSET 0`的查询。\n- `LIMIT`指定要返回的最大行数。\n\n使用`OFFSET`和`LIMIT`时，强烈建议同时使用`ORDER\
  \ BY`。没有此子句，PostgreSQL 无法保证结果返回的顺序，因此，理论上，对某个特定产品页面的不同请求可能会返回不同的结果。以下 SQL 查询告诉 PostgreSQL\
  \ 从按字母顺序排序的产品列表中返回第 15、16、17、18 和 19 行：\n\n```\nSELECT name\nFROM product\nORDER\
  \ BY name\nLIMIT 5\nOFFSET 14;\n```\n\n在当前数据库下，您应获得以下产品：\n```\nname\nConfederate\
  \ Civil War Kepi\nConfederate Slouch Hat\nCotton Beret\nGreen MadHatter Hat\nHanukah\
  \ Hat\n```\n\n您将使用`LIMIT`和`OFFSET`关键字来指定在检索产品列表时感兴趣的记录范围。有关更多详细信息，您可以随时参考官方文档：[`www.postgresql.org/docs/current/interactive/queries-limit.html`](http://www.postgresql.org/docs/current/interactive/queries-limit.html)。\n\
  \n**编写新的数据库函数**\n\n现在，您将实现从数据库返回数据的数据层函数。首先，您将实现检索部门和类别信息的 PostgreSQL 函数：\n\n- `catalog_get_department_details`\n\
  - `catalog_get_categories_list`\n- `catalog_get_category_details`\n\n之后，您将编写处理产品的函数。实际上只有四个函数用于请求产品，但您还将实现三个辅助函数（`catalog_count_products_in_category`、`catalog_count_products_on_department`和`catalog_count_products_on_catalog`）来协助实现分页功能。\n\
  \n\n\n你需要实现的方法完整列表如下：\n\n- `catalog_count_products_in_category`\n- `catalog_get_products_in_category`\n\
  - `catalog_count_products_on_department`\n- `catalog_get_products_on_department`\n\
  - `catalog_count_products_on_catalog`\n- `catalog_get_products_on_catalog`\n- `catalog_get_product_details`\n\
  \n在接下来的章节中，你将看到每个函数的代码及其返回类型。我们不会通过单独的练习来创建这些函数。请使用 `pgAdmin III` 将它们添加到你的数据库中。\n\
  \n### `catalog_get_department_details`\n\n`catalog_get_category_details` 函数根据接收到的部门\
  \ ID 返回其名称和描述。当用户在商品目录中选择一个部门时，需要查询数据库以找出该特定部门的名称和描述。\n\n返回数据被封装为一个 `department_details`\
  \ 类型的对象。以下是创建 `catalog_get_department_details` 函数和 `department_details` 类型的 SQL\
  \ 代码：\n\n```sql\n-- Create department_details type\nCREATE TYPE department_details\
  \ AS\n(\n  name VARCHAR(50),\n  description VARCHAR(1000)\n);\n\n-- Create catalog_get_department_details\
  \ function\nCREATE FUNCTION catalog_get_department_details(INTEGER)\n  RETURNS department_details\n\
  \  LANGUAGE plpgsql AS $$\nDECLARE\n  inDepartmentId ALIAS FOR $1;\n  outDepartmentDetailsRow\
  \ department_details;\nBEGIN\n  SELECT INTO outDepartmentDetailsRow\n    name, description\n\
  \  FROM department\n  WHERE department_id = inDepartmentId;\n  RETURN outDepartmentDetailsRow;\n\
  END;\n$$;\n```\n\n`WHERE` 子句（`WHERE department_id = inDepartmentId`）用于请求特定部门的详细信息。\n\
  \n### `catalog_get_categories_list`\n\n当访问者选择一个部门时，必须显示属于该部门的类别。这些类别将由 `catalog_get_categories_list`\
  \ 函数检索，该函数返回特定部门中的类别列表。该函数需要知道要检索类别的部门 ID。返回类型为 `category_list`。\n\n```sql\n-- Create\
  \ category_list type\nCREATE TYPE category_list AS\n(\n  category_id INTEGER,\n\
  \  name VARCHAR(50)\n);\n\n-- Create catalog_get_categories_list function\nCREATE\
  \ FUNCTION catalog_get_categories_list(INTEGER)\n  RETURNS SETOF category_list\n\
  \  LANGUAGE plpgsql AS $$\nDECLARE\n  inDepartmentId ALIAS FOR $1;\n  outCategoryListRow\
  \ category_list;\nBEGIN\n  FOR outCategoryListRow IN\n    SELECT category_id, name\n\
  \    FROM category\n    WHERE department_id = inDepartmentId\n    ORDER BY category_id\n\
  \  LOOP\n    RETURN NEXT outCategoryListRow;\n  END LOOP;\nEND;\n$$;\n```\n\n###\
  \ `catalog_get_category_details`\n\n当访问者选择一个特定的类别时，我们需要显示其名称和描述。\n\n```sql\n-- Create\
  \ category_details type\nCREATE TYPE category_details AS\n(\n  name VARCHAR(50),\n\
  \  description VARCHAR(1000)\n);\n\n-- Create catalog_get_category_details function\n\
  CREATE FUNCTION catalog_get_category_details(INTEGER)\n  RETURNS category_details\n\
  \  LANGUAGE plpgsql AS $$\nDECLARE\n  inCategoryId ALIAS FOR $1;\n  outCategoryDetailsRow\
  \ category_details;\nBEGIN\n  SELECT INTO outCategoryDetailsRow\n    name, description\n\
  \  FROM category\n  WHERE category_id = inCategoryId;\n  RETURN outCategoryDetailsRow;\n\
  END;\n$$;\n```\n\n### `catalog_count_products_in_category`\n\n此函数返回一个类别中的产品数量。当需要对产品列表进行分页时，该数据是必需的，因为我们需要能够计算一个类别中有多少页产品。\n\
  \n```sql\n-- Create catalog_count_products_in_category function\n```\n\n\n```sql\n\
  CREATE FUNCTION catalog_count_products_in_category(INTEGER) RETURNS INTEGER LANGUAGE\
  \ plpgsql AS $$\n\nDECLARE\ninCategoryId ALIAS FOR $1;\noutCategoriesCount INTEGER;\n\
  \nBEGIN\nSELECT INTO outCategoriesCount\ncount(*)\nFROM product p\nINNER JOIN product_category\
  \ pc\nON p.product_id = pc.product_id\nWHERE pc.category_id = inCategoryId;\nRETURN\
  \ outCategoriesCount;\n\nEND;\n\n$$;\n```\n\n`catalog_get_products_in_category`\
  \ 函数返回属于特定类别的产品。要获取产品列表，需要像本章前面所述的那样连接 `product` 和 `product_category` 表，同时还会对产品描述进行截断处理。\n\
  \n该函数接收四个参数：\n\n- `inCategoryID`：表示我们为其返回产品的类别 ID。\n- `inShortProductDescriptionLength`：表示产品描述允许的最大长度。如果描述超过此值，将被截断，并在末尾添加“...”。请注意，这仅在显示产品列表时使用；在产品详情页面，描述不会被截断。\n\
  - `inProductsPerPage`：表示我们网站上每个目录页面可显示的最大产品数量。如果类别中的产品总数大于此数值，则仅返回包含 `inProductsPerPage`\
  \ 个产品的一页。\n- `inStartItem`：表示要返回的第一个产品的索引。当使用分页且每页显示 4 个产品时，如果访问者访问第二页产品，`inStartItem`\
  \ 将为 5，`inProductsPerPage` 将为 4。使用这些值，`catalog_get_products_in_category` 函数将返回从第五个到第九个的产品。\n\
  \n```\n-- 创建 product_list 类型\nCREATE TYPE product_list AS\n(\n    product_id INTEGER,\n\
  \    name VARCHAR(50),\n    description VARCHAR(1000),\n    price NUMERIC(10, 2),\n\
  \    discounted_price NUMERIC(10, 2),\n    thumbnail VARCHAR(150)\n);\n\n-- 创建 catalog_get_products_in_category\
  \ 函数\nCREATE FUNCTION catalog_get_products_in_category(\n    INTEGER, INTEGER, INTEGER,\
  \ INTEGER)\nRETURNS SETOF product_list LANGUAGE plpgsql AS $$\nDECLARE\n    inCategoryId\
  \ ALIAS FOR $1;\n    inShortProductDescriptionLength ALIAS FOR $2;\n    inProductsPerPage\
  \ ALIAS FOR $3;\n    inStartItem ALIAS FOR $4;\n    outProductListRow product_list;\n\
  BEGIN\n    FOR outProductListRow IN\n        SELECT p.product_id, p.name, p.description,\
  \ p.price, p.discounted_price, p.thumbnail\n        FROM product p\n        INNER\
  \ JOIN product_category pc\n            ON p.product_id = pc.product_id\n      \
  \  WHERE pc.category_id = inCategoryId\n        ORDER BY p.product_id\n        LIMIT\
  \ inProductsPerPage\n        OFFSET inStartItem\n    LOOP\n        IF char_length(outProductListRow.description)\
  \ >\n           inShortProductDescriptionLength THEN\n            outProductListRow.description\
  \ :=\n                substring(outProductListRow.description, 1,\n            \
  \    inShortProductDescriptionLength) || '...';\n        END IF;\n        RETURN\
  \ NEXT outProductListRow;\n    END LOOP;\nEND;\n$$;\n```\n\n`catalog_count_products_on_department`\
  \ 函数计算在指定部门页面上显示的产品数量。请注意，部门的页面上不会列出该部门的所有产品，而仅列出 `display` 值为 2（部门促销产品）或 3（部门及目录促销产品）的产品。\n\
  \n```\n-- 创建 catalog_count_products_on_department 函数\nCREATE FUNCTION catalog_count_products_on_department(INTEGER)\n\
  RETURNS INTEGER LANGUAGE plpgsql AS $$\nDECLARE\n    inDepartmentId ALIAS FOR $1;\n\
  \    outProductsOnDepartmentCount INTEGER;\nBEGIN\n    SELECT DISTINCT INTO outProductsOnDepartmentCount\n\
  \        count(*)\n    FROM product p\n    INNER JOIN product_category pc\n    \
  \    ON p.product_id = pc.product_id\n    INNER JOIN category c\n        ON pc.category_id\
  \ = c.category_id\n    WHERE (p.display = 2 OR p.display = 3)\n        AND c.department_id\
  \ = inDepartmentId;\n    RETURN outProductsOnDepartmentCount;\nEND;\n$$;\n```\n\n\
  \nSQL 代码与即将讨论的`catalog_get_products_on_department`中的代码几乎相同。\n\n**`catalog_get_products_on_department`**\n\
  \n当访客选择一个特定部门时，除了需要列出其名称、描述和类别列表（你之前已为这些任务编写了必要代码）外，你还希望显示该部门的特色产品列表。\n\n`catalog_get_products_on_department`返回所有属于特定部门且显示设置（`display`）为\
  \ 2（部门促销产品）或 3（部门及目录促销产品）的产品。\n\n在`catalog_get_products_in_category`中，你需要进行表连接来找出属于特定类别的产品。现在你需要为部门执行此操作，任务稍显复杂，因为你无法直接知道哪些产品属于每个部门。\n\
  \n你已经知道如何查找属于特定部门的类别（在`catalog_get_categories_list`中完成），也已知如何获取属于特定类别的产品（在`catalog_get_products_in_category`中完成）。通过组合这些信息，你可以生成部门中的产品列表。为此，你需要进行两次表连接。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH04.qxd 10/31/06 10:01\
  \ PM Page 132\n\n**132**  第四章 ■ 创建产品目录：第二部分\n\n你还需要使用`DISTINCT`子句来过滤结果，避免多次获取相同的记录。当某个产品属于多个类别，且这些类别位于同一部门时，就可能出现这种情况。在这种情况下，除非使用`DISTINCT`过滤结果，否则每个匹配的类别都会返回相同的产品。\n\
  \n```sql\n-- 创建 catalog_get_products_on_department 函数\n\nCREATE FUNCTION catalog_get_products_on_department(\n\
  \nINTEGER, INTEGER, INTEGER, INTEGER)\n\nRETURNS SETOF product_list LANGUAGE plpgsql\
  \ AS $$\n\nDECLARE\n\ninDepartmentId ALIAS FOR $1;\n\ninShortProductDescriptionLength\
  \ ALIAS FOR $2;\n\ninProductsPerPage ALIAS FOR $3;\n\ninStartItem ALIAS FOR $4;\n\
  \noutProductListRow product_list;\n\nBEGIN\n\nFOR outProductListRow IN\n\nSELECT\
  \ DISTINCT p.product_id, p.name, p.description, p.price, p.discounted_price, p.thumbnail\n\
  \nFROM product p\n\nINNER JOIN product_category pc\n\nON p.product_id = pc.product_id\n\
  \nINNER JOIN category c\n\nON pc.category_id = c.category_id\n\nWHERE (p.display\
  \ = 2 OR p.display = 3)\n\nAND c.department_id = inDepartmentId\n\nORDER BY p.product_id\n\
  \nLIMIT inProductsPerPage\n\nOFFSET inStartItem\n\nLOOP\n\nIF char_length(outProductListRow.description)\
  \ >\n\ninShortProductDescriptionLength THEN\n\noutProductListRow.description :=\n\
  \nsubstring(outProductListRow.description, 1,\n\ninShortProductDescriptionLength)\
  \ || '...';\n\nEND IF;\n\nRETURN NEXT outProductListRow;\n\nEND LOOP;\n\nEND;\n\n\
  $$;\n```\n\n■**提示** 如果表连接的工作方式看起来过于复杂，请尝试按照前面图 4-8 所示的图表进行操作。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n648XCH04.qxd 10/31/06 10:01 PM Page 133\n\n第四章 ■ 创建产品目录：第二部分 **133**\n\n**`catalog_count_products_on_catalog`**\n\
  \n`catalog_count_products_on_catalog`目录返回要在目录首页显示的产品数量。这些产品的`display`字段值为 1（产品在首页推广）或\
  \ 3（产品在首页和部门页面推广）。\n\n```sql\n-- 创建 catalog_count_products_on_catalog 函数\n\nCREATE\
  \ FUNCTION catalog_count_products_on_catalog()\n\nRETURNS INTEGER LANGUAGE plpgsql\
  \ AS $$\n\nDECLARE\n\noutProductsOnCatalogCount INTEGER;\n\nBEGIN\n\nSELECT INTO\
  \ outProductsOnCatalogCount\n\ncount(*)\n\nFROM product\n\nWHERE display = 1 OR\
  \ display = 3;\n\nRETURN outProductsOnCatalogCount;\n\nEND;\n\n$$;\n```\n\n**`catalog_get_products_on_catalog`**\n\
  \n\n`catalog_get_products_on_catalog`函数返回要在商品目录首页上显示的商品。这些商品的`display`字段值为`1`（商品在首页推广）或`3`（商品在首页和部门页面推广）。商品描述会在指定字符数处截断。分页功能的实现方式与之前两个返回商品列表的函数相同。\n\
  \n```sql\n-- Create catalog_get_products_on_catalog function\n\nCREATE FUNCTION\
  \ catalog_get_products_on_catalog(INTEGER, INTEGER, INTEGER) RETURNS SETOF product_list\
  \ LANGUAGE plpgsql AS $$\n\nDECLARE\n\ninShortProductDescriptionLength ALIAS FOR\
  \ $1;\n\ninProductsPerPage ALIAS FOR $2;\n\ninStartItem ALIAS FOR $3;\n\noutProductListRow\
  \ product_list;\n\nBEGIN\n\nFOR outProductListRow IN\n\nSELECT product_id, name,\
  \ description, price,\n\ndiscounted_price, thumbnail\n\nFROM product\n\nWHERE display\
  \ = 1 OR display = 3\n\nORDER BY product_id\n\nLIMIT inProductsPerPage\n\nOFFSET\
  \ inStartItem\n\nLOOP\n\nIF char_length(outProductListRow.description) >\n\ninShortProductDescriptionLength\
  \ THEN\n\noutProductListRow.description :=\n\nsubstring(outProductListRow.description,\
  \ 1,\n\ninShortProductDescriptionLength) || '...';\n\nEND IF;\n\nRETURN NEXT outProductListRow;\n\
  \nEND LOOP;\n\nEND;\n\n$$;\n```\n\n`catalog_get_product_details`\n---\n\n`catalog_get_product_details`函数返回商品的详细信息，该函数被调用以获取将在商品详情页上显示的数据。\n\
  \n```sql\n-- Create product_details type\n\nCREATE TYPE product_details AS\n\n(\n\
  \nproduct_id INTEGER,\n\nname VARCHAR(50),\n\ndescription VARCHAR(1000),\n\nprice\
  \ NUMERIC(10, 2),\n\ndiscounted_price NUMERIC(10, 2),\n\nimage VARCHAR(150)\n\n\
  );\n\n-- Create catalog_get_product_details function\n\nCREATE FUNCTION catalog_get_product_details(INTEGER)\n\
  \nRETURNS product_details LANGUAGE plpgsql AS $$\n\nDECLARE\n\ninProductId ALIAS\
  \ FOR $1;\n\noutProductDetailsRow product_details;\n\nBEGIN\n\nSELECT INTO outProductDetailsRow\n\
  \nproduct_id, name, description,\n\nprice, discounted_price, image\n\nFROM product\n\
  \nWHERE product_id = inProductId;\n\nRETURN outProductDetailsRow;\n\nEND;\n\n$$;\n\
