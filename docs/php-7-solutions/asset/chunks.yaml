    \n1.  Under `Database-specific privileges`, select `phpsols` from the list\n \
    \   (if necessary, activate the drop-down menu labeled `Add privileges on the\
    \ following database(s))` and click `Go`.\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Fige_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Fige_HTML.jpg)\n\
    \nNote\nMySQL has three default databases: `information_schema`, a\nread-only,\
    \ virtual database that contains details of all other databases\non the same server;\
    \ `mysql`, which contains\ndetails of all user accounts and privileges; and `test`,\
    \ which is empty.\nYou should never edit the `mysql` database\ndirectly unless\
    \ you’re sure what you’re doing.\n\n1.  The next screen allows you to set the\
    \ privileges for this user on\n    just the `phpsols` database. You\n    want\
    \ `pswrite` to\n    have all four privileges listed earlier, so click the check\
    \ boxes next\n    to `SELECT, INSERT, UPDATE`, and `DELETE`.\n\nIf you hover your\
    \ mouse pointer over each option, phpMyAdmin displays\n    a tooltip describing\
    \ the option’s use, as shown. After selecting the\n    four privileges, click\
    \ `Go`.\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figf_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Figf_HTML.jpg)\n\
    \nCaution\nMany screens in phpMyAdmin have more than one `Go` button. Always\n\
    click the button at the foot of or alongside the section with the\noptions you\
    \ want to set.\n\n1.  phpMyAdmin presents you with confirmation that the privileges\
    \ have\n    been updated for the `pswrite` user account;\n    the page displays\
    \ the `Database-specific privileges` table again, in case you need to change anything.\n\
    \    Click the `User accounts` tab at the top of the page to return to the `User\
    \ accounts overview`.\n\n2.  Click `Add user account` and repeat steps 3 through\
    \ 8 to create a second user\n    account called `psread`. This user\n    will\
    \ have much more restricted privileges, so when you get to step 7,\n    check\
    \ only the `SELECT` option. The\n    password used for `psread` in the example\n\
    \    files is `K1yoMizu^dera`.\n\nCreating a Database Table\n\nNow that you have\
    \ a database and dedicated user accounts, you can begin\ncreating tables.\nLet’s\
    \ begin by creating a table to hold the details of images, as shown\nin Figure\
    \ [12-1](#332054_4_En_12_Chapter.xhtml#Fig1) at the\nbeginning of this chapter.\
    \ Before you can start entering data, you need\nto define the table structure.\
    \ This involves deciding the following:\n\n*   The name of the table\n\n*   How\
    \ many columns it will have\n\n*   The name of each column\n\n*   What type of\
    \ data will be stored in each column\n\n*   Whether the column must always have\
    \ data in each field\n\n*   Which column contains the table’s primary key\n\n\
    If you look at Figure [12-1](#332054_4_En_12_Chapter.xhtml#Fig1), you can see\n\
    that the table contains three columns: `image_id` (primary\nkey), `filename`,\n\
    and `caption`.\nBecause it contains details of images, that’s a good name to use\
    \ for the\ntable. There’s not much point in storing a filename without a caption,\n\
    so every column must contain data. Great! Apart from the data type, all\nthe decisions\
    \ have been made. I’ll explain the data types as we go\nalong.\n\nDefining the\
    \ Images Table\n\nThese instructions show how to define a table in phpMyAdmin.\
    \ If you\nprefer to use Navicat or a different UI for MySQL, use the settings\
    \ in\nTable [12-1](#332054_4_En_12_Chapter.xhtml#Tab1).\n\nTable 12-1.\nSettings\
    \ for the `images` table"
