  \ $this->minChars 个字符。\";\n    }\n    if ($this->mixedCase) {\n        $pattern\
  \ = '/(?=.*\\p{Ll})(?=.*\\p{Lu})/u';\n        if (!preg_match($pattern, $this->password))\
  \ {\n            $this->errors[] = '密码应包含大写和小写字符。';\n        }\n    }\n    if ($this->minNums)\
  \ {\n        $pattern = '/\\d/';\n        $found = preg_match_all($pattern, $this->password,\
  \ $matches);\n        if ($found < $this->minNums) {\n            $this->errors[]\
  \ = \"密码应至少包含 $this->minNums 个数字。\";\n        }\n    }\n    if ($this->minSymbols)\
  \ {\n        $pattern = '/[\\p{S}\\p{P}]/u';\n        $found = preg_match_all($pattern,\
  \ $this->password, $matches);\n        if ($found < $this->minSymbols) {\n     \
  \       $this->errors[] = \"密码应至少包含 $this->minSymbols 个非字母数字字符。\";\n        }\n\
  \    }\n    return $this->errors ? false : true;\n}\n```\n\n这三个新的条件语句，每一个都仅在`check()`方法之前调用了对应的公有方法时才会执行。每个语句都将一个正则表达式存储为`$pattern`，然后使用`preg_match()`或`preg_match_all()`来测试密码。\n\
  \n如果将`$mixedCase`属性设置为`true`，正则表达式和密码会被传递给`preg_match()`，以在密码的任何位置查找至少一个小写字母和至少一个大写字母。该正则表达式使用了\
  \ Unicode 类别元字符来匹配小写和大写字母，因此允许的字符不限于未重音的 A–Z 字母。结尾定界符后的小写`u`是一个修饰符，它使模式字符串和主题字符串被视为\
  \ UTF-8 编码。\n\n`$minNums`和`$minSymbols`属性默认为 0。如果它们被重置为正数，则正则表达式和密码会被传递给 `preg_match_all()`\
  \ 函数，以查找正则表达式匹配的次数。该函数需要三个参数：正则表达式、要搜索的字符串以及一个用于存储匹配结果的变量；它返回找到的匹配数量。在这种情况下，你只关心匹配的数量。存储匹配结果的变量会被丢弃。\n\
  \n最后一个条件语句中的`$pattern`使用了 Unicode 类别元字符来匹配数学符号、货币符号、标点符号以及其他符号，同时使用了 UTF-8 修饰符。\n\
