    \ simple.\n\n```\nThe main task is solved using the conditional statement.\nIt\
    \ checks the isset($_GET[\"name\"]) condition. The condition is true if there\
    \ is an element in the $_GET array with the key \"name\".\nHere, you need to consider\
    \ that all parameters passed in the request are stored in the $_GET array. The\
    \ name of the parameter is the key of the element, and the value of the parameter\
    \ is the element’s value. Therefore, you can use the $_GET[\"name\"] instruction\
    \ to get the name parameter value passed in the request.\nHowever, the problem\
    \ is that the user may not pass a value for the name parameter in the request.\
    \ Therefore, you first check if the $_GET array contains the corresponding element.\
    \ If the element exists, then the $name=$_GET[\"name\"] statement assigns the\
    \ value of the name parameter to the $name variable.\nIf the required element\
    \ is not in the array, the $name variable is assigned the \"Mister X\" value.\
    \ After that, the echo $name instruction writes the value of the $name variable\
    \ to the HTML document.\n```\n\n## Using Buttons\n\nOften, when working with HTML\
    \ documents, use *forms*. Those are special blocks with controls, such as buttons,\
