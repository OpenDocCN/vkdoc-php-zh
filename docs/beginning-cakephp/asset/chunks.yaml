    \n当前的`Comments`控制器仅包含`$name`属性。让我们为其添加`Add`操作，但要考虑到Ajax（请参见清单8-8）。\n\n**Listing\
    \ 8-8.** *The Add Action in the Comments Controller*\n\n```\nfunction add() {\n\
