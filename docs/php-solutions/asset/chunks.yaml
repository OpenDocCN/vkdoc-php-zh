    as `true`. (There’s a more detailed explanation in “The truth according to PHP”
    in the second half of this chapter.)


    The other thing to note about `true`, `false`, and `null` is that they are case-insensitive.
    The following examples are all valid:


    `$OK = TRUE;`


    `$OK = tRuE;`


