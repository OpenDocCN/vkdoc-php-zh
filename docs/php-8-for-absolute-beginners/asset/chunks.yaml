    # 目标


    完成本章后，你将能够


    -   理解操作系统如何简化编程

    -   理解 PHP 如何与 Apache 和 MySQL/MariaDB 协作创建动态网页

    -   安装 PHP 测试环境

    -   判断测试环境是否正常运行

    -   创建简单的 PHP 程序

    -   执行并测试简单的 PHP 程序


    欢迎来到编程的世界！无论你此前从未尝试过编写程序，还是已经编写了一段时间，我们都希望这本书能帮助你理解程序开发的基础知识。你生命中的每一分钟都离不开计算机。从你出生那一刻产房里的监护仪，到今天早上为你冲泡黑咖啡（假设你喜欢咖啡）的咖啡机，计算机和程序都在努力让我们的生活更轻松。你对编程的兴趣可能源于在游戏世界中大放异彩的能力、使用社交媒体应用，或者观看电视上企业家推销发明、试图创建成功企业。无论原因是什么，你来到这里是为了探索如何使用
    PHP 语言创建程序，更重要的是，判断编程是否是你想做的事情。


    IT（信息技术）行业为你提供了无限的创造力和成为真正先驱者的潜力。你能设计和创造的东西没有限制。你的创造可能有助于拯救地球，或者让残疾人的生活更便捷。真正决定你将发明什么的权利在你手中。你可以选择为大型跨国公司、小型初创企业工作，或者独自冒险创业。随着职业生涯的发展，你可以根据需要多次改变路径。你可能先从大公司积累经验，一旦发现专长便跳槽到初创公司，最后开发出自己的应用，为退休铺平道路。IT
    行业给了你决定自己道路的自由。


    那么，让我们开始这段冒险吧。既然我们假设你想尽快开始编程（这就是你买这本书的原因，对吧？），让我们简要地介绍一些基础知识，以便大家从相同的理解水平出发。


    开始吧！首先且最重要的是，“计算机是愚蠢的。”什么？但它们为我们提供了这么多惊人的工具，怎么会愚蠢呢？简单来说，计算机只知道两件事：0 和 1。这是基于电路要么有电（1）要么没电（0）的概念。这是计算机*硬件*和*软件*设计的基本构建块。当有人提到计算机时，我们通常想到的是硬件。物理组件，如键盘、屏幕、电路、内存芯片和其他内部组件。软件则是与硬件通信的实际程序（应用程序）。每台计算机都有一个*操作系统*，它为应用程序（也可能包括人）提供了与硬件通信的能力。操作系统就像一个语言翻译员；它将接收到的信息（来自应用程序或人）转换为计算机能理解的语言。就像人类翻译员可以将英语转换为西班牙语一样。


    *程序*通常被定义为一组用于完成任务的代码。一个*应用程序*（app）可以由许多程序、多种硬件，甚至还包括人协作完成任务。但是，不要在这些定义上钻牛角尖，因为在现实世界中，我们往往互换使用这两个词。正如你会注意到的，我们在本书中已经这样做了。应用软件通常不是设计来直接与计算机硬件通信的。它与操作系统对话，然后操作系统再与硬件对话。


    举个例子，想想你使用的应用程序。当你想要从某个应用程序打印东西时，会出现一个打印窗口，提供给你一些任务选项。如果你随后在计算机上打开另一个应用程序并从中打印，会弹出相同的打印窗口。这是从哪里来的？操作系统。操作系统包含了应用程序请求的常见任务的代码。这些模块包括代码块，以及在需要时的*界面*（图形窗口）。应用程序在使用这些工具时会进行一次
    *API*（*应用程序编程接口*）调用。API 就是一行告诉操作系统要执行哪个代码块以及在执行代码时要使用什么参数（信息）的代码。


    打印 API 可能会请求操作系统将指定的文档放入*打印队列*。打印队列是等待打印的文档列表。操作系统不仅能与打印机通信，打印机也能与操作系统通信。它实际上会发送一个特殊的信号（*中断*）回操作系统，告知打印作业何时完成（或者是否存在问题，例如缺纸）。一旦打印作业完成，操作系统会将该作业从队列中移除，并将下一个作业发送给打印机。


    我们大大简化了实际过程。例如，当请求在操作系统和打印机之间来回发送时，指令（语言）会在操作系统能理解的语言和打印机能理解的语言之间来回转换。这种转换发生在哪里？是借助了一个叫做*打印驱动程序*的小应用程序。实际上，我们还可以更深入地探讨这一点，但关键是，应用程序、操作系统和硬件（包括打印机）协同工作来完成各种任务。没有软件的硬件毫无价值（也许除了当作门挡），没有硬件的软件也不存在（也许除了在我们的想象中）。


    记住，我们说过计算机只知道 0 和 1。那么，如果它们只知道这些，又如何完成这么多事情呢？正如我们所知，计算机具有存储信息的能力。它们可以将信息存储在*内存*中、*内部存储设备*（*硬盘*、*芯片*）上，甚至*外部服务器*（云端）上。计算机存储的信息是以一系列
    0 和 1 的形式存储的。一个*位*（bit）是一个单独的 0 或 1。一个*字节*（byte）是由多个 0 和 1 组成的序列。一个字节的大小（0 和 1
    的数量）可能因计算机而异（例如 32、64、128 位），但它实现的功能相同：要么存储信息，要么执行任务。*字长*（word size）是指计算机在一个位置（内存或存储设备中）可以存储或一次执行的位数。字长越大，一次能保存或处理的信息就越多。字长更大的计算机处理信息的速度更快。

    '
- fmt: '`Unicode`是一个标准，它将比特组合起来，表示全世界使用的众多符号和语言。这确实是一项艰巨的任务！曾几何时，编程主要面向英语国家。然而今天，程序员遍布全球各地。让我们看一个示例，了解从键盘输入字符到文档中的简单过程。假设我们已经打开了最喜欢的文本处理器（例如`Microsoft
    Word`），就可以开始打字。当我们点击键盘上的字母“s”时，它神奇地出现在屏幕上的文档中。这是如何发生的？当键盘上的一个键被按下时，该字母的比特模式（0和1）会通过操作系统发送到文本编辑器。然而，大多数人并不理解0和1的模式。因此，当文本编辑器接收到信息时，显示的信息会在显示器上转换为我们按下的字母（“s”）。请注意，我们说的是显示被转换了，而非实际数据本身。当我们存储数据时，它仍然以比特格式存储。


    再次说明，我们简化了这个过程，因为实际的转换涉及内存、文本编辑器、其驱动程序、操作系统、显卡以及显示器及其驱动程序。这一切发生得非常快。幸运的是，我们只需理解这一切会发生，而无需深究细节。只需记住，计算机理解的内容与我们理解的内容是不同的。


    除了作为语言解释器，操作系统还是一个内存管理器。在所有高级编程语言（如`PHP`）中，当数据需要临时存储在内存中，或更永久地存储在存储设备（或云服务器）上时，操作系统就会接管。作为程序员，我们通过创建变量或常量来请求操作系统将数据存储在内存中。变量类似于我们在代数中使用的变量。在代数中，当`A
    + B = C`时，`A`、`B`和`C`都是变量。我们知道它们可以代表任何数字。在编程中，同样的变量也可以存储数字，甚至字符，同时通知操作系统暂时将这些项目存储在内存中。


    大多数编程语言（包括`PHP`）将代数等式反转成`C = A + B`。为什么？很高兴你问到这点。虽然`A`、`B`和`C`是变量，但编程中的等号实际上是一个赋值运算符。它会将右侧（`A
    + B`）的任何内容取过来，存储到左侧（`C`）中。因此，它取出存储在`A`中的值（数字），将其与存储在`B`中的值相加，然后将结果放入变量`C`中。这三个变量都驻留在计算机的内存中。


    我们加法程序的结果存储在内存的某个位置，而我们不知道具体在哪里。什么？我们真的不关心在哪里，只要我们能使用变量`C`在需要时随时检索它即可。我们信任操作系统为我们提供支持（它会妥善地存储和保护我们的信息）。


    操作系统会查看存储在变量中的值，或者查看程序代码中的变量声明语句，以帮助确定如何存储该变量。请记住，比特模式用于表示计算机中的所有字符（包括数字）。当信息存储在内存或存储设备中时，它以比特格式存储。因此，操作系统需要知道存储的是数字还是字符。数字1和字符1之间有区别。基本上，我们通常不对字符进行数学运算，但会对数字进行。因此，系统需要知道我们是否可能进行数学运算。如果我们要在计算中使用它，它会以一种允许我们进行计算的格式存储。我们将在使用`PHP`进行计算时进一步探讨这一点。


    这也引出了我们与计算机之间的另一个区别。我们使用十进制系统创建数字。我们从0数到9（十个不同的数字）。然后当需要进入下一个数字时，我们增加一位数形成数字10。如你所知，当我们到100（10组10）时，最终还要加一位数。然而，计算机使用二进制系统（基数为2）来存储0或1（两个不同的数字）。当计算机需要存储更大的数字时，它会增加一位（10）。你可能已经注意到，在使用计算机或购买计算机时，一切似乎实际上都基于八的倍数（8、16、32、64……）。为什么？实际上，这是随着我们添加更多比特而逻辑上产生的。


    将二进制0转换为十进制0（或将二进制1转换为十进制1）很容易，因为它们表示相同的值（零或一）。然而，二进制10与十进制10是不同的。十进制10代表10个值（十个手指）。在上一段中，我们提到当二进制数需要大于1时，需要增加一位。二进制10比1大一；它是十进制中的数字2（两根手指）。


    困惑了吗？让我们看一些例子。


    **表1-1 十进制与二进制对比**


    | 十进制 | 二进制（基数为2） |

    | :--- | :--- |

    | 0 | 0 |

    | 1 | 1 |

    | 2 | 10 |

    | 3 | 11 |

    | 4 | 100 |

    | 5 | 101 |

    | 6 | 110 |

    | 7 | 111 |


    请记住，二进制中第一位（最右边）是0或1。第二位代表2。因此，`10`是2（2 + 0）。`11`是3（2 + 1）。由于`11`是3，我们必须增加一位来产生4（`100`）。5是`101`（4
    + 0 + 1）。6是`110`（4 + 2 + 0）。7是`111`（4 + 2 + 1）。这需要一些练习才能习惯。不要纠结于细节；如果你理解了基本概念，随着编程技能的提升，你最终会恍然大悟。请注意，当我们达到三位数（`111`）时，实际上已经创建了八个值（0–7）。这逻辑上表明比特可以基于八的倍数进行收集。`111
    111`将是两组8（8 × 2 = 16）。`111 111 111`是三组8（8 × 3 = 24）。`111 111 111 111`是32（8 × 4）。在确定计算机如何存储信息时，我们关注八的倍数就合乎逻辑了。我们继续吧；稍后会再次讨论这一点。


    让我们回到操作系统的讨论。操作系统还会决定变量存储在内存中的什么位置。操作系统用来确定数据存储位置的算法（代码）非常精良且高效。它经过多年调整，为信息存储提供了最佳解决方案。操作系统会考虑很多因素（对于一个初级书籍来说，太多以至于无法深入探讨）来决定将数据存储在何处。它考虑的一些因素包括：数据可能被使用的频率、哪个程序在使用它、数据的大小以及存储的数据类型。


    我们希望你现在能看到，操作系统使我们的生活作为程序员变得更加轻松。我们无需担心存储位置等细节，甚至不必担心实际程序在内存中的运行位置。操作系统会为我们的程序所需的一切分配内存位置。它还会努力保护我们的程序不受其他试图造成伤害的程序的侵扰，甚至在我们程序崩溃时处理问题。根据程序崩溃的原因，它甚至可能通过错误消息告诉我们发生了什么。例如，如果没有足够的内存来运行我们的程序（或继续运行我们的程序），它会告知我们。'
  raw: '*Unicode* is a standard that combines bits together to represent many symbols
    and languages used throughout the world. Quite a task indeed! At one time, programming
    was mostly designed for English-speaking countries. However, today, programmers
    exist in all regions of the world. Let’s look at an example of following a simple
    process of typing a character on the keyboard into a document. Assuming we have
    opened our favorite text processor (such as Microsoft Word), we can begin typing.
    When we click the letter “s” on the keyboard, it magically appears on the screen
    (in the document). How does that happen? When a key on the keyboard is pressed,
    the bit pattern (0s and 1s) for the letter is sent to the text editor via the
    operating system. However, most people don’t understand patterns of 0s and 1s.
    So, when the text editor receives the information, the information that is displayed
    is converted on the monitor to the letter we pressed (“s”). Notice, we stated
    that the display is converted, not the actual data itself. When we store the data,
    it is still stored in *bit format* .


    Again, we have simplified it, because the conversion actually involves memory,
    the text editor, its driver, the operating system, a graphics card, and the monitor
    and its driver. A lot goes on very quickly. Luckily, we can just understand that
    this all happens, without digging into the details. Just remember, what the computer
    understands, and what we understand is different.


    In addition to being a language interpreter, the operating system is also a *memory
    manager* . In all higher-level programming languages (such as PHP), when data
    needs to be temporarily stored in memory or more permanently stored on a storage
    device (or cloud server), the operating system takes over. As a programmer, we
    ask the operating system to store data in memory by creating variables or constants.
    A *variable* is similar to the variables we used in algebra. In algebra, when
    A + B = C, A, B, and C are all variables. We know that they can represent any
    number. In programming, the same variables can also store numbers, or even characters,
    while, at the same time, informing the operating system to temporarily store these
    items in memory.


    Most program languages (including PHP) reverse the algebra equation to C = A +
    B. Why? Glad you asked. While A, B, and C are variables, the equal sign in programming
    is actually an *assignment operator* . It takes whatever is on the right side
    (A + B) and stores it into whatever is on the left side (C). Thus, it takes the
    value (number) stored in A and adds it to the value stored in B and places the
    result into the variable C. All three of these variables reside in the memory
    of the computer.


    The result of our addition program is stored someplace in memory, and we don’t
    know where. What? We really don’t care where, as long as we can use the variable
    C to retrieve it anytime we need it. We trust that the operating system has our
    back (it does the right thing by properly storing and protecting our information).


    The operating system will either look at the values that are being stored in the
    variable or look at a *variable* *declaration statement* in the program code to
    help determine how to store the variable. Remember that bit patterns are used
    to represent all characters (including numbers) in a computer. When information
    is stored in memory or a storage device, it is stored in bit format. Thus, the
    operating system needs to know if a number is being stored or a character is being
    stored. There is a difference between the number 1 and the character 1. Basically,
    we usually don’t do mathematics on a character, and we do on a number. Thus, the
    system needs to know if we might do mathematics. If we are going to use it in
    a calculation, it is stored in a format that allows us to do so. We will explore
    this more when we do calculations in PHP.


    This also brings up another difference between us and the computer. We create
    numbers using the *base 10 system*. We count from 0 to 9 (ten different numbers).
    Then when we need to go to the next number, we add a digit to form the number
    10\. As you know, eventually we’ll add a digit when we go to 100 (10 sets of 10).
    Computers, however, use the *binary system* (*base 2*) to store a 0 or a 1 (two
    different numbers). When the computer needs to store a number bigger than that,
    it adds a digit (10). You might have noticed when you are using a computer or
    shop for one that everything seems to actually be based on eighths (8, 16, 32,
    64, …). Why? Actually, that occurs logically as we add more bits.


    When converting from binary 0 to base 10 zero (or from binary 1 to base ten 1)
    is easy because they mean the same value (zero or one). However, a binary 10 is
    not the same as a base ten 10\. A base ten 10 represents 10 values (ten fingers).
    In the last paragraph, we mentioned that when a binary number needs to go above
    1, it needs to add a digit. A binary 10 is one more than 1; it is the number 2
    in base ten (two fingers).


    Confused? Let’s look at some examples.


    Table 1-1


    Comparing Base Ten to Binary


    | Base Ten | Binary (Base Two) |

    | --- | --- |

    | 0 | 0 |

    | 1 | 1 |

    | 2 | 10 |

    | 3 | 11 |

    | 4 | 100 |

    | 5 | 101 |

    | 6 | 110 |

    | 7 | 111 |


    Remember, the first digit (to the right) in binary is a 0 or 1\. The second digit
    represents a 2\. Thus, 10 is 2 (2 + 0). 11 is 3 (2 + 1). Since 11 is 3, we have
    to add a digit to produce a 4 (100). Five is 101 (4 + 0 + 1). Six is 110 (4 +
    2 + 0). Seven is 111 (4 + 2 + 1). It takes some practice to get comfortable with
    this. Don’t get hung up on the details; if you understand the basic idea, eventually
    you will have an “aha” moment as your programming skills increase. Notice that
    when we reach three digits (111), we have actually created eight values (0–7).
    This logically shows that bits can be collected based on eighths. 111 111 would
    be two sets of 8s (8 × 2 = 16). 111 111 111 is three sets of 8s (8 × 3 = 24).
    111 111 111 111 is 32 (8 × 4). It becomes logical that we look at multiples of
    eight when determining how the computer stores information. Let’s move on; we
    will look at this again later.


    Let’s return to our operating system discussion. The operating system also will
    determine where in memory a variable is stored. The *algorithm* (code) the operating
    system uses to determine where it stores the data is well refined and very efficient.
    It has been tweaked for many years and provides the best solution for storage
    of information. The operating system looks at a lot of factors (too many for us
    to explore in a beginner’s book) to determine where to store the data. Some of
    what it considers is how frequent it might be used, what program is using it,
    how big the data is, and what type of data is being stored.


    We hope you are now seeing that the operating system makes our lives easier as
    programmers. We don’t have to worry about details of where to store information
    and even where our actual program runs in memory. The operating system will allocate
    locations in memory for everything our program needs. It will also try to protect
    our program from other programs trying to cause it harm and even handle problems
    when our program decides to crash. Depending on what caused our program to crash,
    it might even let us know, via *error messages* , what happened. For example,
    if there is not enough memory available to run our program (or continue running
    our program), it will let us know.'
