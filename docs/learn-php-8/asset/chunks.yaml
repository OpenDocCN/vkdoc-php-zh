    PHP, AJAX, and CSS—Smart Phone Web Applications


    At this point, you should be beginning to discover the flexibility and power of
    creating PHP applications. You might be a little disappointed that we did not
    cover app development for smart phones in any detail. Currently, PHP is not usually
    used to create smart phone applications. However, with the increased efficiency
    and speed of PHP 8, maybe someday it will be. However, there are times when we
    want to provide smart phones with the ability to access a web application from
    the browser on the phone. We can provide this ability with just a few changes
    to the previous demo. This provides you with an application that works with any
    size device that includes a browser.


    You can make this change without adjusting the HTML (except for adding a link),
    JavaScript, or PHP code. You can adjust the `ajaxdemo` web page to format properly
    in smart phones or other mobile devices using CSS. In this example, you only need
    to change the HTML file to discover the size of the display (interface). Then
    CSS can be used to change the graphics to fit the proper screen size.


    If the PHP file includes a lot of HTML (and/or other CSS code), we might need
    to also adjust the PHP file. However, we should always consider having CSS format
    the overall output (instead of the PHP file). This will allow you to use the same
    code in multiple containers (hosts).


    You can add the following lines just below the link to the original CSS file in
    the `ajaxdemo.html` file:


    Note


    The new complete HTML file is located on the Apress web site.


    These two lines will attempt to determine the size of the display screen and use
    the new CSS file for any screens that are 480px or less. The demo program, as
    is, will fit on most mobile devices. However, let us adjust it to remove some
    of the spacing, padding, and margins.


    Note


    You can also use the CSS3 Flexbox Attribute for multiple device sizes. Since its
    use requires a little more understanding of CSS, we will stick with the “old style”
    method. You can find more information on CSS3 Flexbox at the following w3schools
    link: [`www.w3schools.com/css/css2_flexbox.asp`](http://www.w3schools.com/css/css2_flexbox.asp).


    ```

    body { background-color: #000000;

    font-family: Arial, Verdana, sans-serif; margin: 0; }

    #wrapper { margin: 0 auto;

    width: 100%;

    margin: 0;

    min-width: 0px;

    background-color: #cc0000;

    color: #000066; }

    #header { background-color: #ff0000;

    color: #00005D;

    font-size: 100%;

    padding: 0.5px; }

    h1 { margin: 0px; }

    #content { background-color: #ffffff;

    color: #000000;

    padding: 0.5px;

    overflow: auto; }

    #footer { font-size: 80%;

    text-align: left;

    padding: 0px;

    background-color: #0000FF;

    color: #ffffff;

    clear: both;}

    h2 { color: #000000;

    font-family: Arial, sans-serif;

    margin: 0px; }

    #floatright { float: none;

    margin: 0px; }

    Example 2-4

    The ajaxdemomobile.css file

    ```


    Compare Example [2-4](#394210_2_En_2_Chapter.xhtml#PC5) to Example [2-3](#394210_2_En_2_Chapter.xhtml#PC3).
    The code in Example [2-4](#394210_2_En_2_Chapter.xhtml#PC5) is not perfect, but
    it does give you an idea of what can be adjusted in the original CSS file for
    display in mobile devices. This example reduces margins and padding to zero, or
    almost zero. This greatly reduces the wasted space on the display of a smaller
    mobile device.


    Do It


    1.  Locate the new HTML file and CSS file on the Apress web site. If you have
    a web host provider, upload these files (and the `.js` file) to the host. Try
    to access the HTML page from your smart phone. Was your test successful? If not,
    why not? Did the page format properly on your phone? If not, what do you think
    needs to be adjusted?


    Note


    If you don’t have a host web site on the Internet, you can also test this CSS
    file by downloading one of the free mobile emulators available on the Web. You
    can also change the link tag in the HTML file to point to the `ajaxdemomobile.css`
    file instead of the `ajaxdemo.css` file. Then try reducing the size of your browser
    to simulate a smart phone screen.


    PHP, HTML, JavaScript, CSS, and Dynamic Web Pages


    As a last example of containers (hosts) for PHP programs, let us consider the
    browser. As you have seen in this chapter, you can use an HTML file to call our
    PHP program (clicking the button in the previous demonstration). This, as detailed
    in Chapter [1](#394210_2_En_1_Chapter.xhtml), will cause the PHP program to execute
    and the results to be returned to the browser. You could also have your PHP program
    return HTML code.


    ```

    <?php

    print "<html><body>";

    print "<h1>My Program</h1>";

    print "<p>Hello World</p>";

    print "</body></html>";

    ?>

    Example 2-5

    Dynamic HTML page created by a PHP program

