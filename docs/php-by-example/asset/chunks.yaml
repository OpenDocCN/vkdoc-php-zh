    `Alpha` 父类有一个受保护的 `$code` 字段。该字段仅在 `Alpha` 类的主体中可用。而该字段在 `Bravo` 子类中被继承。因此，在 `Bravo`
    类的主体中，在 `set()`（用于给字段赋值的方法）和 `show()`（用于显示字段值的方法）方法中，你可以直接访问继承来的 `$code` 字段（如
    `$this->code` 指令）。`$obj` 对象是基于 `Bravo` 类创建的。该对象拥有 `$code` 字段，但不能直接访问。要给该字段赋值，使用
    `set()` 方法（`$obj->set(123)` 命令）；要显示字段值，使用 `show()` 方法（`$obj->show()` 命令）。


