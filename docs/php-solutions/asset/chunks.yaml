- fmt: "### Checking Encrypted Passwords with `password_verify()`\n\nThe `password_verify()`\
    \ function does exactly what you expect: it verifies passwords that have been\
    \ encrypted with `password_hash()`. It takes just two arguments, the submitted\
    \ password and the encrypted version. If the submitted password is correct, the\
    \ function returns `true`. Otherwise, it returns `false`.\n\n### PHP Solution\
    \ 9-8: Using an Encrypted Login\n\nNow that you have encrypted passwords, you\
    \ need to change the login form to handle the new setup. All that’s necessary\
    \ is to select the CSV file that contains the encrypted passwords and to use `password_verify()`\
    \ to check the validity of the submitted password. Again, this relies on using\
    \ PHP 5.5 or including the `password_compat` library in your script.\n\nOpen `login.php`\
    \ from PHP Solution 9-3 or use `login_02.php` from the `ch09` folder. Change the\
    \ location of `$userlist` to use the encrypted passwords:  \n\n`$userlist = 'C:/private/encrypted.csv';`\n\
    \nOpen `includes/authenticate.php` from PHP Solution 9-3 or use `authenticate_01.php`\
    \ in the `ch09` folder. The file of encrypted passwords doesn’t have titles in\
    \ the first row, so delete the following comment and line of code:  \n\n`// ignore\
    \ the titles in the first row of the CSV file`  \n`$titles = fgetcsv($file);`\n\
    \nLocate the following line:  \n\n`if ($data[0] == $username && $data[1] == $password)\
    \ {`\n\nChange it like this:  \n\n`if ($data[0] == $username && password_verify($password,\
    \ $data[1])) {`\n\nSave `login.php` and test it. It should work the same as before,\
    \ while being more secure. Check your code, if necessary, with `login_03.php`\
    \ and `authenticate_02.php` in the `ch09` folder.  \n\n*   `$password` contains\
    \ the submitted password, and `$data[1]` contains the encrypted version, so they’re\
    \ passed as arguments to `password_verify()`, which returns `true` only if the\
    \ password is correct.\n\nPHP Solutions 9-3 to 9-8 build a simple yet effective\
    \ user authentication system that doesn’t require a database backend. However,\
    \ it does have its limitations. Above all, it’s essential that the CSV file containing\
    \ the usernames and passwords be located outside the server root. Also, once you\
    \ get more than a few records, querying a database is usually much faster than\
    \ looping through a CSV file line by line. [Chapter 17](#A978-1-4842-0635-5_17_Chapter.html)\
    \ covers user authentication with a database.\n\n#### Keeping Encryption Up to\
    \ Date\n\nThe major advantage of using the password hashing functions that were\
    \ added in PHP 5.5 is that they’re designed to keep abreast of improvements in\
    \ encryption technology. Instead of specifying a particular encryption standard,\
    \ using `PASSWORD_DEFAULT` as the second argument to `password_hash()` ensures\
    \ that new registrations always use whatever is considered to be the most secure\
    \ method at the time. Even if the default changes, existing passwords can still\
    \ be verified by the `password_verify()` function because the encrypted password\
    \ contains information that identifies how it was encrypted.\n\nThere’s also a\
    \ function called `password_needs_rehash()` that checks whether the encrypted\
    \ password needs to be updated to the current standard. It’s designed to be used\
    \ when a user logs in to the site. The following code assumes that the submitted\
    \ password is stored in `$password`, that the encrypted one is in `$encrypted`,\
    \ and that you’re using the PHP default method of encryption.\n\n```\nif (password_verify($password,\
    \ $encrypted) {\n    if (password_needs_rehash($encrypted, PASSWORD_DEFAULT))\
    \ {\n        $encrypted = password_hash($password, PASSWORD_DEFAULT);\n      \
    \  // store the updated version of $encrypted\n    }\n}\n```\n\nPerforming this\
    \ check every time a user logs in is almost certainly excessive. PHP’s policy\
    \ is to change the default encryption only upon a full release, such as 5.7.0\
    \ or 7.0.0. The only exception to this is in an emergency when a critical security\
    \ flaw is found in the current default. If you keep abreast of PHP developments,\
    \ you can create a script that updates all stored passwords in a single operation\
    \ whenever the default changes. If you don’t have the time to follow what’s happening\
    \ in the PHP world, using `password_needs_rehash()` every time someone logs in\
    \ should keep your site secure, even though it might slow down the login process.\n\
    \n## Setting a Time Limit on Sessions\n\nBy default, PHP sets the lifetime of\
    \ the session cookie on the user’s computer to 0, which keeps the session active\
    \ until the user logs out or the browser is closed. You can make the session timeout\
    \ earlier through a call to `ini_set()`, the function that allows you to change\
    \ some PHP configuration directives on the fly. As soon as the session starts,\
    \ pass the directive `session.cookie_lifetime` as the first argument and a string\
    \ containing the number of seconds you want the cookie to remain active as the\
    \ second argument. For example, you could limit the session cookie’s lifetime\
    \ to 10 minutes like this:\n\n```\nsession_start();\nini_set('session.cookie_lifetime',\
    \ '600');\n```\n\nAlthough this is effective, it has two drawbacks. First, the\
    \ expiration is set relative to the time on the server, not the user’s computer.\
    \ If the user’s computer clock is wrong, the cookie might be out of date immediately,\
    \ or it might persist much longer than you anticipate. The other problem is that\
    \ the user might be automatically logged out without explanation. The next PHP\
    \ solution offers an approach that is more user friendly."
