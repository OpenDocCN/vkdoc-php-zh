  \ success or $_GET['article_id'] not defined\n    if ($done || !isset($_GET['article_id']))\
  \ {\n    $url = 'http://localhost/phpsols-4e/admin/blog_list_pdo.php';\n    if ($done)\
  \ {\n    $url .= '?updated=true';\n    }\n    header(\"Location: $url\");\n    exit;\n\
