- fmt: '# Summary


    In this chapter, we took a step back to think holistically about Shopify design
    and the goals we’re trying to achieve when building a theme. The chapter discussed
    the importance of empathizing with the user and the importance of designing for
    visitors in a range of contexts.


    It also discussed a number of best practices to keep in mind during the development
    of your themes and studied some techniques to help you uncover usability issues
    during the testing phase.


    Footnotes [1](#A437216_1_En_3_Chapter.html#Fn1_source)


    The leading cited example of this is that of Target, who settled a USD $6 million
    lawsuit brought against them to failing to make their online store accessible
    to blind customers. See [`https://www.w3.org/WAI/bcase/target-case-study`](https://www.w3.org/WAI/bcase/target-case-study).


    [2](#A437216_1_En_3_Chapter.html#Fn2_source)


    These examples are taken from the Filament Group’s book Designing with Progressive
    Enhancement by Todd Parker, Patty Toland, Scott Jehl, and Maggie Costello Wachs.


    # 4. Designing Theme Foundations


    Over the next four chapters, we’ll be walking through the process of designing
    and building an example Shopify theme—page by page, feature by feature. In this
    chapter, we’ll be looking at the options for getting started with a new theme,
    then design and implement the key elements common to your store’s entire site—the
    layout and navigation.


    The focus will be on the fundamentals of building a Shopify theme more than the
    fundamentals of web or visual design. This means you won’t see too much attention
    paid to styling, visual tweaks, or frontend framework choices, except for when
    those things directly overlap with some Shopify-specific concerns.


    When building an Ecommerce site, there are a wide range of design choices that
    can and should be made in different scenarios—what style of navigation to use,
    what the best layout for a product page is, etc. The “right” choice (if there
    is such a thing) will of course be different depending on the store and audience
    in question.


    We can’t explore every possible choice in detail within the scope of a single
    book, so instead when faced with these choices, I’ll discuss the different possible
    approaches before settling on a common one for demonstration purposes.


    Also, rather than try to dump all the code used to build the example theme directly
    in this book, I’ve made it available in a GitHub repository (`https://github.com/gavinballard/defguide-theme`).
    The commit history of this repository tracks the progress of the example theme
    from this chapter onward, so it’s easy for you to follow along with the exact
    changes made at each section.


    I will use code in the text when it’s helpful to illustrate a point or demonstrate
    a technique. To keep these examples as clear and as useful as possible, I’ll strip
    them of extraneous information (like HTML class names or accessibility attributes).
    You can always refer to the corresponding snippets of code in the example theme
    repository, which contain things in full.


    Ready? Let’s get started!


    ## A Starting Point


    Before we start designing and building our theme, let’s establish the workflow
    and get into a position to begin work. I discussed a variety of tools and workflow
    techniques in Chapter [2](#A437216_1_En_2_Chapter.html), including Shopify’s Slate
    and other build tools that assemble your themes into Shopify’s expected directory
    structure from a different starting point.


    Learning about and using these tools is important, but to begin with you’re going
    to strike a balance between simplicity and ease-of-use. This assumes that we’re
    working directly with the Shopify theme directory structure (so no build and compilation
    tools like Grunt or Slate), but are working on files locally with a text editor
    and using Theme Kit or the Theme gem to keep changes synced with a development
    store (refer back to Chapter [2](#A437216_1_En_2_Chapter.html) if you need a refresher
    on either of these tools).


    ### Theme Scaffolds


    In your day-to-day life dealing with Shopify themes, much of your work will be
    done on existing Shopify source files—perhaps you’ll be brought in to customize
    a theme purchased from the theme store or developed by someone else. For situations
    where you’re starting on a “greenfield” project, it’s helpful to have a starting
    point—a blank canvas to work from. There are several freely available theme scaffolds:


    *   Slate: Shopify’s official theme development tool includes its own default
    theme setup, which will be generated when you run `slate theme new-theme-name`.
    It’s a reasonably bare-bones setup, giving you template files and several initial
    styles and JavaScript helpers. Slate uses a series of build tools to “compile”
    your theme from a source directory.

    *   Timber: Before Slate came on the scene, this was Shopify’s official theme
    framework, offering many styling helpers and JavaScript functionality like Ajax
    carts. With the introduction of Slate, Timber is no longer being maintained so
    it may be best to look at Timber as inspiration for how to implement particular
    Shopify features rather than as a starting point.

    *   Shopify Theme Scaffold: This is an unofficial project, based on the theme
    work we do at Disco. It includes a simple Grunt-based workflow for theme compilation.
    Unlike the tools, it’s truly a blank canvas, as it includes empty template files
    and no styling or JavaScript.


    Over time, you’ll probably start to develop your own preferences for working with
    Shopify themes and start to build your own starting scaffold.


    For the purposes of this book, however, we’re going right back to basics. We’re
    going to start by uploading `blank.zip` (available from the GitHub resources for
    this book) into the Theme Editor on our development store. As its name suggests,
    `blank.zip` is a completely empty theme that contains only the bare minimum required
    for Shopify to consider it a valid upload. You can see in Figure [4-1](#A437216_1_En_4_Chapter.html#Fig1)
    that, once it’s uploaded, it lives up to that name.


    ![A437216_1_En_4_Fig1_HTML.jpg](A437216_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    You can upload the `blank.zip` file directly into the Themes page in the Shopify
    admin (left). Once you’ve done that, previewing the theme provides an exciting
    view (right)'
