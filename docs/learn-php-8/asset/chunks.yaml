    \  Places an instance of a class into memory\n    4.  A and B\n\n6.  The `&&`\
    \ symbol and/or the word `AND`\n    1.  Are relational operators, when used, and\
    \ require all statements checked to be true for the complete `if` statement to\
    \ be considered `true`\n    2.  Are conjunctions used in PHP to connect programs\n\
