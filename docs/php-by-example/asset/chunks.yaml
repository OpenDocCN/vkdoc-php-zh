    ## 连接数组


    另一个实际的操作是数组的连接（加法）。为此，使用 `+` 运算符。规则如下：如果将数组加到另一个数组上，会得到一个由两个数组的元素组成的数组。如果合并的数组具有相同键的元素，则结果数组保留第一个操作数中的值（来自第一个数组的值）。清单
    [4-9](#613529_1_En_4_Chapter.xhtml#PC20) 说明了这种情况。


    ```

    1,2,"Last"=>3];

    $B=[100,200,"Last"=>300];

    // The sum of the arrays:

    $C=$A+$B;

    // The contents of the resulting array:

    print_r($C);

    ?>

    Listing 4-9

    The Sum of Arrays

    ```


    程序的输出如下。


    ```

    The output of the program (from Listing 4-9)

