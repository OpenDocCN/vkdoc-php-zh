- "# Drush\n\n**作者：Greg Anderson**\n\nDrush 是 Drupal 的 Shell——一个允许你通过命令行输入指令来检查和修改\
  \ Drupal 站点的程序。它也是一个包含众多实用工具的百宝箱和一个脚本编写环境，能帮助你快速分割、征服并掌控你的 Drupal 站点。\n\nDrupal\
  \ 本身提供了一个复杂的图形界面，通过网页浏览器就能接触到大量的配置选项。能够直观地浏览这些设置非常有用，尤其是在你初次学习核心功能或刚刚安装的新模块时。然而，一旦你熟悉了某个操作，并且需要反复执行它，Shell\
  \ 脚本就能提供 GUI 工作无法比拟的可重复性和效率。你在 Drupal 上做的事情越多（尤其是你用 Drupal 构建的站点越多），你就越会倾向于将常见操作编写成脚本，从而腾出更多时间来处理更重要的事情。\n\
  \n事实上，很多人确实利用 Shell 脚本来加速 Drupal 站点的配置、管理和开发；快速搜索一下谷歌就会发现，有些人用了 Drush，有些人没用。相比自己编写脚本，使用\
  \ Drush 有着非常显著的优势，其中最大的优势之一是 Drush 将 Drupal 社区的力量带到了 Shell 中。目前有六位 Drush 维护者，并且来自更大社区的许多贡献者也通力合作，提供了各种补丁和功能，使得\
  \ Drush 既全面又可靠。很可能 Drush 已经实现了许多你希望它实现的功能——甚至更多——并且这些功能都已经过编写和测试。更进一步，Drush 还提供了一个用于引导\
  \ Drupal 环境的成熟框架，允许你用 PHP 编写脚本，并直接利用 Drupal 的 API。Drush 拥有自己的一套 API 和函数，为不同的数据库和不同版本的\
  \ Drupal 提供了抽象层，这意味着随着 Drupal 环境的发展，你的脚本更有可能继续正常工作。\n\nDrush 还具有高度的可配置性；它允许你为所有\
  \ Drupal 站点提供命名别名，并且你可以以非常灵活的方式控制 Drush 如何与每个站点交互。如果这些配置文件在开发团队成员之间共享（例如，通过将它们提交到版本控制系统），那么每个团队成员与他们正在工作的站点之间的交互就可以实现标准化。通过这种方式，Drush\
  \ 可以帮助定义和传播团队的开发流程。\n\n在本章中，我将超越基础知识，带你深入探讨如何最大限度地发挥 Drush 的作用。如果你一直在跟随本书中的示例进行操作，那么你可能已经至少安装和使用过几次\
  \ Drush 了；但如果没有，请访问 Drush 项目页面 [`http://drupal.org/project/drush`](http://drupal.org/project/drush)，下载最新的稳定版本，并查阅\
  \ `README.txt` 文件来安装和运行它。之后，你就可以跟随我的指导，开始探索 Drush 的能力了。我将向你展示如何：\n\n-   通过设置一些基本配置选项，并为你正在开发的\
  \ Drupal 站点定义一个或两个别名，快速上手并运行 Drush。\n-   利用 Drush Shell 增强功能，在命令行上加速你的 Drupal 站点维护。\n\
  -   对 Drupal 核心和你安装的模块应用代码更新。\n-   安装 Drush 扩展，为 Drush 增添更多功能。\n-   更深入地了解 Drush\
  \ 配置，以进一步优化你的环境。\n-   使用 Drush 部署站点，然后安全地从线上站点复制回用户贡献的内容，用于离线测试和进一步开发。\n-   使用 Drush\
  \ 编写 Shell 脚本。\n-   通过编写你自己的 Drush 命令来扩展 Drush。\n\n熟练掌握 Drush 这些不同方面，将会极大地提升你对 Drupal\
  \ 站点的维护效率。让我们开始吧。\n\n### Drush 快速入门\n\nDrush 适用于 Drupal 版本 5 到 7，以及 MySQL、Postgres\
  \ 和 SQLite 数据库。它可以在同一系统上的多个 Drupal 站点上工作，也可以在远程服务器上的 Drupal 站点上工作。它支持 Drupal 多站点配置（多个站点共享一套共同的\
  \ Drupal 核心文件）和单站点配置（每个站点包含自己的 Drupal 核心副本）。此外，Drush 可以通过与 Drupal 模块或主题打包在一起，或者单独捆绑的新命令进行扩展。为了以系统上可能出现的所有不同方式支持所有这些不同的配置，Drush\
  \ 提供了大量的设置和配置选项来简化你的工作。\n\n![images](img/square.jpg) **提示** 如果你想创建一个临时的 Drupal 站点来测试\
  \ Drush 命令，可以使用 Drush 的 `site-install` 命令快速完成。只需输入以下命令行：\n\n```\n$ mkdir dgd7\n\
  $ cd dgd7\n$ drush dl drupal --drupal-project-rename=web -y\nProject drupal (7.0)\
  \ downloaded to dgd7/web.\nProject drupal contains:\n- 3 profiles: minimal, standard,\
  \ testing\n- 4 themes: seven, bartik, garland, stark\n- 47 modules: node, trigger,\
  \ system, statistics, simpletest, php, poll, contextual, shortcut,\nfield_ui, tracker,\
  \ contact, path, profile, help, overlay, aggregator, toolbar, image, update,\nlocale,\
  \ translation, menu, blog, file, comment, dashboard, syslog, user, book, filter,\
  \ dblog,\ntaxonomy, search, block, rdf, forum, color, number, options, text, list,\
  \ field_sql_storage,\nfield, openid, drupal_system_listing_incompatible_test, drupal_system_listing_compatible_test\n\
  $ cd web\n$ cp sites/default/default.settings.php sites/default/settings.php\n$\
  \ chmod -R o+w sites/default\n$ drush site-install --db-url=pgsql://www-data:yoursqlpw@localhost/dgd7db\
  \ --account-name=admin --account-pass=secretsecret -y\n```\n\n要在网页浏览器中查看你的临时 Drupal\
  \ 站点，你还需要为其创建一个虚拟主机配置文件；不过，仅仅为了在其上运行 Drush 命令，这不是必需的。\n\n\n\n#### Drush 命令中的 Drupal\
  \ 站点选择\n\n学习如何有效配置 Drush 的第一步是理解 Drush 在运行命令时如何选择要操作的 Drupal 站点。`drush status` 命令会提供\
  \ Drush 当前环境的摘要信息。如果你在刚安装完 Drush 后运行它，将会看到类似 列表 26–1 所示的输出。\n\n**列表 26–1.** 使用 `core-status`\
  \ 命令检查 Drush 环境\n\n```\n$ drush core-status\n PHP configuration     :  /etc/php5/cli/php.ini\n\
  \ Drush version         :  4.1\n Drush configuration   :  \n Drush alias files \
  \    :                                   \n```\n\n这表明你已经安装了 Drush 4.1 版本，并且尚未提供任何\
  \ Drush 配置文件。同时，为了方便起见，也显示了 `php.ini` 的路径。现在你知道了 Drush 已安装并可运行，但你没有任何关于 Drupal 站点的信息。Drush\
  \ 需要先获知你的站点位置，才能对其进行操作。有多种方法可以实现这一点。最直接的方法可能是将当前工作目录切换到你所操作的 Drupal 站点的 sites 文件夹。这个文件夹包含了\
  \ `settings.php` 文件（参见 列表 26–2）。\n\n**列表 26–2.** 在 dgd7.org 的站点目录下运行 `core-status`\n\
  \n```\n$ cd dgd7/web/sites/default/\n$ drush core-status\n Drupal version      \
  \          :  7.0                                 \n Site URI                  \
  \    :  http://default                      \n Database driver               : \
  \ pgsql                               \n Database hostname             :  localhost\
  \                           \n Database username             :  www-data       \
  \                     \n Database name                 :  dgd7devdb            \
  \               \n Database                      :  Connected                  \
  \         \n Drupal bootstrap              :  Successful                       \
  \   \n Drupal user                   :  Anonymous                           \n Default\
  \ theme                 :  bartik                              \n Administration\
  \ theme          :  seven                               \n PHP configuration   \
  \          :  /etc/php5/cli/php.ini               \n Drush version             \
  \    :  4.1                             \n Drush configuration           :     \
  \                                 \n Drush alias files             :           \
  \                           \n Drupal root                   :  /srv/www/dgd7/web\n\
  \ Site path                     :  sites/default                       \n File directory\
  \ path           :  sites/default/files\n```\n\n现在，status 命令的输出显示了你站点的额外信息。如果你从这个目录运行其他\
  \ Drush 命令，它们将会对 `drush status` 所指示的站点进行操作。\n\n> **注意** 每次 Drush 运行命令时，都会执行一个称为\
  \ *引导* (bootstrapping) 的过程，在这个过程中 Drupal 环境会被初始化。我将在本章后面部分详细讨论这一引导过程，但目前只需理解 `drush\
  \ status` 显示的是 Drush 在引导过程中收集的信息，因此它是诊断你的 Drush 配置并确保一切正常工作的好方法。\n\n从这里开始，你可以让 Drush\
  \ 对你刚刚选定的站点进行操作。例如，如 列表 26–3 所示，你可以使用 `cache-clear` 命令清除 Drupal 缓存。\n\n**列表 26–3.**\
  \ 在选定的 Drupal 站点上使用 `cache-clear` 命令\n\n```\n$ drush cache-clear\nEnter a number\
  \ to choose which cache to clear.\n[0] : Cancel\n[1] : all\n[2] : theme\n[3] : menu\n\
  [4] : css+js\n1\n'all' cache was cleared\n```\n\n当你熟练掌握了 Drush 后，如果进行了需要清空缓存的配置更改，就无需再通过\
  \ Web 管理界面操作；你可以直接从命令行快速完成。`drush cache-clear all` 的工作方式与前面的例子相同，但不会显示交互式菜单。\n\n\
  然而，Drush 能做的远不止清除 Drupal 缓存；它配备了超过五十条命令，涵盖了诸如检查 Drupal 配置、复制文件、操作数据库、运行 cron、重建搜索缓存、安装\
  \ Drupal、更新 Drupal 模块和核心文件、运行单元测试、添加和编辑字段与用户等各种主题。Drush 甚至可以用来更新自身！完整的命令列表始终可以通过\
  \ `drush help` 命令获取，如 图 26–1 所示。你会看到许多命令都有缩写形式，称为 *命令别名*；这些别名在帮助页面中显示在命令名称后的括号内。为了清晰起见，本教程将始终使用\
  \ Drush 命令的长格式；然而，随着你对 Drush 越来越熟悉，你很可能会很快学会并使用这些较短的别名。\n\n**图 26–1.** Drush 命令摘要\n\
  \n利用可用的 Drush 命令作为构建块，可以轻松创建简单的别名和 shell 脚本来执行常见操作。不过，在脚本环境中，我们希望能够在无需更改当前工作目录的情况下选择目标\
  \ Drupal 站点。幸运的是，Drush 提供了其他指定站点的方法。一种方法是使用 `--root` 和 `--uri` 选项来提供 Drupal 根目录的位置，以及你希望定位的\
  \ sites 文件夹中 Drupal 站点的 URI，如下所示：\n\n```\n$ drush --root=/srv/www/dgd7.org/web --uri=dgd7.org\
  \ core-status \"Site URI\"\n Site URI : dgd7.org\n```\n\n命令行中使用的 URI 应与从 Web 浏览器访问该站点时使用的\
  \ URI 相同。也可以使用包含 `settings.php` 文件的文件夹名称作为 URI（例如 `--uri=default`）。这样也能工作，并且事实上，在\
  \ Drush 调用 Drupal 时使用的站点 URI 方面，它与 列表 26–2 是等价的；你可以通过比较 列表 26–2 中“Site URI”行的输出来确认这一点。正确设置站点\
  \ URI 并非总是必需的，但某些模块可能需要它，例如，当它们要生成绝对 URL 或向同一主机发起 HTTP 请求时；因此，建议尽可能设置正确的 URI。\n\n\
  也可以将 `--root` 和 `--uri` 选项的信息合并成单个命令行参数传递给 Drush。在这种形式下，Drupal 根目录和站点 URI 通过 '#'\
  \ 字符连接在一起，如下所示：\n\n```\n$ drush /srv/www/dgd7.org/web#dgd7.org core-status \"Site\
  \ URI\"\n Site URI : dgd7.org\n```\n\n这比之前的选项更简洁一些，但输入起来仍然稍显冗长。在下一节中，我将讨论如何通过自定义\
  \ Drush 配置文件来匹配你的安装，从而保持命令简洁。Drush 有两种配置文件：包含配置选项的 Drush 资源文件 (`drushrc.php`)，以及包含你所操作的各个本地和远程\
  \ Drupal 站点信息的别名文件 (`aliases.drushrc.php`)。我将在后续章节中讨论这两种文件。\n\n\n\n##### Drush 别名文件（`aliases.drushrc.php`）\n\
  \n通过使用 Drush 别名为每个站点定义简写名称，可以极大地提升处理多个 Drupal 站点的便利性。别名并非定义在 `drushrc.php` 中；它们存储在一个独立的\
  \ `aliases.drushrc.php` 文件中，该文件可以存放在与标准 `drushrc.php` 配置文件相同的位置。正如稍后你将看到的，Drush\
  \ 在如何分组和组织别名方面提供了更大的灵活性；你可以将与团队成员共享的别名放在一个别名文件中，而将个人和临时别名放在其他地方。现在，你只需考虑 `aliases.drushrc.php`。在示例目录中有一个别名文件示例；让我们先将其复制到你的\
  \ Drush 配置文件夹，操作如下：\n\n```\n$ cp examples/example.aliases.drushrc.php $HOME/.drush/aliases.drushrc.php\n\
  ```\n\n如果你打开 `example.aliases.drushrc.php` 并查看其内容，你会看到它以下面的介绍开头：\n\n```\n别名通常用于为本地或远程的\
  \ Drupal 安装定义简短的名称；\n然而，别名实际上只是一组选项的集合。一个指向名为 \"dev.mydrupalsite.com\" 的本地 Drupal\
  \ 站点的规范别名 \"dev\" 看起来是这样的：\n  $aliases['dev'] = array(\n    'root' => '/path/to/drupal',\n\
  \    'uri' => 'dev.mydrupalsite.com',\n   );\n```\n\n如果你将此定义复制到你的 `aliases.drushrc.php`\
  \ 文件中，并将 root 项改为指向 Drupal 根目录，将 uri 项改为你的站点 URI，那么你就可以使用简写符号来选择你的开发站点。不必再使用 `--root`\
  \ 和 `--uri`，你可以使用新的别名，如 清单 26–4 所示。\n\n***清单 26–4.** 使用站点别名指定站点*\n\n```\n$ drush\
  \ @dev core-status\n Drupal version                :  7.0\n Site URI           \
  \           :  http://dgd7.org\n Database driver               :  pgsql\n Database\
  \ hostname             :  localhost\n Database username             :  www-data\n\
  \ Database name                 :  dgd7devdb\n Database                      : \
  \ Connected\n Drupal bootstrap              :  Successful\n Drupal user        \
  \           :  Anonymous\n Default theme                 :  bartik\n Administration\
  \ theme          :  seven\n PHP configuration             :  /etc/php5/cli/php.ini\n\
  \ Drush version                 :  4.1\n Drush configuration           :  /home/user/.drush/drushrc.php\n\
  \ Drush alias files             :  /home/user/.drush/aliases.drushrc.php\n Drupal\
  \ root                   :  /srv/www/dgd7/install/dgd7/web\n Site path         \
  \            :  sites/default\n File directory path           :  sites/default/files\n\
  ```\n\n![images](img/square.jpg) **注意** 别名 `@dev` 位于命令名称之*前*。这将其与命令的参数区分开来。\n\n\
  一旦你为正在处理的每个 Drupal 站点都定义了别名，你就可以通过在 Drupal 命令前加上相应的符号名称，更轻松地单独操作它们。在下一节中，你将看到如何通过\
  \ Drush 交互式 shell 使站点选择更加便捷。\n\n##### 使用 Drush Shell\n\nDrush 被称作 Drupal Shell 并非徒有虚名；它甚至自带交互式\
  \ shell，可以通过命令 `drush core-cli` 进入。Drush 交互式 shell 实际上只是一个 *bash 子进程*；这意味着每当使用 `core-cli`\
  \ 时，Drush 都会运行另一个 bash 副本。当输入 `core-cli` 命令时，Drush 会动态生成一个针对 Drush 使用优化的 bash 配置文件。然后再次执行\
  \ bash shell，这次使用的是 Drush 的自定义配置。要返回常规 shell，只需输入 exit 或按 CONTROL-D 即可。Drush shell\
  \ 旨在减少你使用 Drush 时需要键入的内容。其中一个重要的方式是它为每个 Drush 命令创建 bash 别名，因此无需在命令名称前输入 drush。再结合一些专门为此\
  \ shell 优化并借助 bash 强大功能的自定义命令，你就获得了一个非常强大的、用于从 shell 进行 Drupal 站点维护的环境。让我们来看看这个\
  \ shell 能做什么。\n\n首先，当你进入 `core-cli` 时，Drush 会记住你选择的站点，并将之后的每个命令都应用于该站点。考虑 表 26–1\
  \ 中向两个 Drupal 站点添加一些模块的示例；左列是在使用 `core-cli` 配合 Drush 命令别名时需要键入的命令，右列是从 bash shell\
  \ 中输入的全写形式的等效命令。\n\n***表 26–1.** 向一些 Drupal 站点添加若干模块*\n\n| **Drush core-cli** |\
  \ **Bash** |\n| --- | --- |\n| `$ drush @site1 core-cli` `@site1>` **`dl og`** `@site1>`\
  \ **`en og`** `@site1>` **`cd @site2`** `@site2>` **`dl devel coder`** `@site2>`\
  \ **`en devel coder`** `@site2>` **`cd %devel`** `@site2>` **`use`** `$` | **`$\
  \ drush @site1 pm-download og`** **`$ drush @site1 pm-enable og`** **`` $ cd `drush\
  \ drupal-directory @site2` ``** **`$ drush @site2 pm-download devel coder`** **`$\
  \ drush @site2 pm-enable devel coder`** **`` $ cd `drush drupal-directory @site2:%devel`\
  \ ``** |\n\n左侧显示的简写命令别名在普通的 bash shell 中使用 Drush 时也可以使用，但 `cd` 和 `use` 的便捷性真正让 Drush\
  \ shell 大放异彩。`cd` 命令在目录间切换时的行为与内置的 `cd` 命令完全相同；将 `cd` 与 Drupal 站点别名一起使用，你就会选择该站点并将工作目录切换到该站点的\
  \ Drupal 根目录。Drush 还能识别许多路径别名；如果你将 `%modulename` 作为 `cd` 的参数，那么你会切换到指定名称模块所安装的位置。Drush\
  \ 的 `use` 命令与 `cd` 命令类似，但有两点不同。首先，它不会更改你的工作目录；它只是选择一个新站点作为未来 Drush 命令的目标。其次，它也能用于远程站点别名；如果你使用\
  \ `use @remotealias` 选择一个远程站点，那么之后的每个 Drush 命令都会通过 ssh 在该远程站点上执行。这要求在站点之间设置公钥/私钥\
  \ SSH 密钥对，正如后续关于使用 Drush 部署远程站点的章节所述。\n\n\n\n如果你经常使用 `core-cli`，你可能会想把你的登录 shell\
  \ 转换为 Drush shell。为此，请运行 `drush core-cli --pipe`；这会输出 Drush 生成的 bash 配置内容并退出。如果将此配置文件放在\
  \ bash 读取配置文件的路径中，那么 `core-cli` 命令的功能就会永久应用到你日常使用的 bash shell 中。bash 读取文件的位置和名称因平台而异；`$HOME`\
  \ 目录下的 `.bashrc` 和 `.profile` 是两种常见的配置来源。如果你使用的是基于 Debian 的 Linux 发行版（例如 Ubuntu），那么\
  \ `.bash_aliases` 文件（也位于 `$HOME` 目录下）初始时是空的，但如果它存在，bash 就会读取它。这使得它成为放置 Drush 配置的绝佳位置。\n\
  \n```\n$ drush core-cli --pipe > $HOME/.bash_aliases\n$ source $HOME/.bash_aliases\n\
  ```\n\n![images](img/square.jpg) **提示** `source` 命令会读取 bash 配置文件，并执行其中所有的配置指令，这与你在登录账户时的处理方式完全相同。在阅读\
  \ bash 脚本时，你会发现 `source` 命令经常被使用，虽然它通常以简写形式 `.`（一个点）出现。\n\n完成上述操作后，你的 shell 并不会立刻表现出任何与之前不同的行为；Drush\
  \ 会尽量“不碍事”，直到你需要它。但是，Drush 的强大功能现在已经触手可及。输入 `help` 命令。你将会看到 `drush help` 命令的输出，而不是通常的\
  \ `bash help`！你仍然可以通过输入 `builtin help` 来访问 `bash help`。接下来，尝试输入 `status`。这次，你会看到一条错误信息；常规的\
  \ Linux `status` 命令在这种情况下优先级高于 Drush 命令。如果你输入 `use @alias`，Drush 会将你的提示符更改为 `@alias>`，表示后续的任何\
  \ Drush 命令都将针对该别名指定的站点。现在，如果你输入 `status` 命令，你将看到 Drush status 的输出。要返回常规的 bash 提示符，请输入不带参数的\
  \ `use`；你会看到提示符恢复正常。\n\n这种机制——Drush 会在适当的时候选择 Drush 命令，或者在需要时调用标准命令——被称为**上下文命令**。这是一个非常强大的功能；它使得只需敲击几个按键就可以使用\
  \ Drush 命令，而不会改变你习惯的 shell 的默认行为。我所有的 bash shell 都像这样配置；这确实大大加快了操作速度。\n\n### 使用\
  \ Drush 应用代码更新\n\nDrupal 的一个优点是，它频繁发布 bug 修复和安全更新，有助于保持站点的稳定和安全。而频繁发布的缺点则是，它可能会让维护工作变得非常耗时。即使有了\
  \ `update_status` 模块的改进，在在线图形界面中查找待升级的模块、查看其发布说明并应用更改仍然需要进行大量的点击操作。Drush 让这一切变得容易得多。不过，在开始之前，需要记住一点：代码更新应该始终在*生产站点的副本*上进行，而不是在实时站点上。升级需要一些时间来处理和测试，在此期间让生产站点离线是不可取的。但是，使用临时站点的最重要原因是，升级并不总是一帆风顺的；有时，你可能对你正在使用的模块应用了升级，结果却发现出现了新的\
  \ bug 或不兼容问题。有时，你可能只是不喜欢某些新功能的工作方式。如果你总是在开发站点上先测试升级，那么一旦出现问题，就可以很容易地丢弃正在进行的升级并重新开始。我将在后面的章节中介绍如何复制站点；如果你还没有站点的开发副本，你总是可以先创建一个空的测试站点来跟着操作。\n\
  \n让我们一步步地对一个开发站点应用代码更新。首先，如果你打算在一个刚安装的临时站点上尝试更新过程，那么确保你有东西可以更新是很重要的。请使用 `pm-download`\
  \ 的 `--select` 标志，并选择一个 `logintoboggan` 模块的旧版本；同时加上 `--all` 标志，这样 Drush 就不会过滤掉“不感兴趣”的版本（参见\
  \ 清单 26-5）。\n\n***清单 26-5.** 选择一个要安装的模块的旧版本*\n\n```\n$ drush @dev pm-download logintoboggan\
  \ --select --all\nChoose one of the available releases:\n [0]  :  Cancel       \
  \                                             \n [1]  :  7.x-1.x-dev     -  2011-Jan-06\
  \  -  Development            \n [2]  :  7.x-1.0         -  2011-Jan-06  -  Supported,\
  \ Recommended\n [3]  :  7.x-1.0-alpha3  -  2010-Aug-10  -                      \
  \   \n [4]  :  7.x-1.0-alpha2  -  2009-Oct-25  -                         \n [5]\
  \  :  7.x-1.0-alpha1  -  2009-Oct-21  -                         \n4\nProject logintoboggan\
  \ (7.x-1.0-alpha2) downloaded to\n/srv/www/dgd7/web/sites/all/modules/logintoboggan.\
  \                                                \n$ drush @dev pm-enable logintoboggan\n\
  The following extensions will be enabled: logintoboggan\nDo you really want to continue?\
  \ (y/n): y\nlogintoboggan was enabled successfully.\n```\n\n选择 `alpha2` 版本；这样，当你运行\
  \ `pm-updatecode` 时，就会有可以更新的内容（参见 清单 26-6）。\n\n***清单 26-6.** 运行 `pm-updatecode`\
  \ 更新 Drupal 站点上的模块*\n\n```\n$ drush @dev pm-updatecode\nRefreshing update status\
  \ information ...\nDone.\nUpdate information last refreshed: Sat, 01/15/2011 - 19:57\n\
  \nUpdate status information on all installed and enabled Drupal projects:\n Name\
  \           Installed version  Proposed version  Status\n Drupal core    7.0   \
  \             7.0               Up to date\n LoginToboggan  7.x-1.0-alpha2     7.x-1.0\
  \           Update available\n\nCode updates will be made to the following projects:\
  \ LoginToboggan [logintoboggan-7.x-1.0]\n```\n\n\n\n```\n注意：如果您的项目不受支持的版本控制系统管理，其备份将存储至\
  \ backups 目录。\n注意：如果您对这些项目中的任何一个文件进行了修改，更新后需要迁移这些修改。\n您确定要继续更新流程吗？(y/n): `y`\nProject\
  \ logintoboggan 已成功更新。当前安装版本为 7.x-1.0。\n备份已保存至目录 [ok]\n`/home/user/drush-backups/20110101170457/modules/logintoboggan`。\n\
  'all' 缓存已清除 [success]\n您有待处理的数据库更新。请运行 `drush updatedb` 或 [warning]\n在浏览器中访问 `update.php`。\n\
  \n请注意，`pm-updatecode` 建议将 1.0-alpha2 版本更新至 1.0 版本，尽管有更新的开发版本可用。它这样做是因为 1.0 版本被标记为推荐版本。通常，`pm-updatecode`\
  \ 总是会更新到推荐版本；唯一的例外是，如果您明确向 `pm-updatecode` 指定了要更新到的项目版本，或者推荐版本比您当前安装的版本更旧。如果您想从模块的稳定版本更新到开发版本，可以使用\
  \ `drush pm-download modulename --dev` 重新下载它。\n\n回到清单 26–6，如果在运行 `pm-updatecode`\
  \ 时添加了 `--notes` 选项，Drush 将显示任何有可用更新的模块的发布说明。如果需要，您也可以通过 `pm-releasenotes` 命令直接显示发布说明，而无需运行\
  \ `pm-updatecode`，如清单 26–7 所示。\n\n### 清单 26–7. 显示 Drupal 模块的发布说明\n\n`$ drush @dev\
  \ pm-releasenotes logintoboggan`  \n`------------------------------------------------------------------------------`\
  \  \n`> 'LOGINTOBOGGAN' 项目版本 7.x-1.0-alpha2 的发布说明：`  \n`> 最后更新：2010 年 12 月 24 日\
  \ - 23:18 .`  \n`> 已安装`  \n`------------------------------------------------------------------------------`\
  \  \n\n` 自 DRUPAL-7--1-0-ALPHA1 以来的变更：`  \n` * 根据 hook_theme 的变更，将 arguments 改为\
  \ variables。`  \n\n`pm-releasenotes` 命令的实际输出将包含从已安装版本到推荐版本（含）的所有发布说明；清单 26–7 显示了安装\
  \ logintoboggan-7.x-1.0-alpha2 时截断的输出。\n\n除非有安全更新，否则您不想花时间升级和测试网站，可以使用 `--security-only`\
  \ 标志。清单 26–8 中的代码将过滤掉错误修复/功能发布，仅显示那些有安全更新的项目。\n\n### 清单 26–8. 运行 pm-updatecode 以更新\
  \ Drupal 站点上的模块\n\n`$ drush @dev pm-updatecode --security-only`  \n`正在刷新更新状态信息...`\
  \  \n`完成。`  \n`更新信息最后刷新时间：2011 年 1 月 15 日星期六 - 19:57`  \n\n`所有已安装并启用的 Drupal 项目的更新状态信息：`\
  \  \n` 名称            已安装版本   建议版本  状态`  \n` Drupal 核心    7.0               7.0 \
  \             已是最新`  \n` LoginToboggan  7.x-1.0-alpha2    7.x-1.0          有可用更新`\
  \  \n\n`没有可用的安全更新。`\n\n在清单 26–8 中，logintoboggan 从 7.x-1.0-alpha2 之后到当前推荐版本的任何一个发布版本都未被标记为安全更新，因此\
  \ Drush 报告在此实例中没有可更新的内容。\n\n更新代码后，您必须更新数据库（`update.php`）。您也可以使用 Drush 执行此操作，如清单\
  \ 26–9 所示。\n\n### 清单 26–9. 从 Drush 运行 updatedb\n\n`$ drush @dev updatedb`  \n`以下更新待处理：`\
  \  \n\n`logintoboggan 模块：`  \n`  7000 - 移除区块中硬编码的数字 delta。`  \n\n`是否要运行所有待处理的更新？(y/n):`\
  \ `y`  \n`完成更新操作。`\n\n由于这是一个非常常见的操作，Drush 提供了一个单一命令 `pm-update`，它将依次调用 `pm-updatecode`\
  \ 和 `updatedb`。\n\n正如 Drush 使更新代码变得容易，它也使*不*更新代码变得容易。您可能有多种原因不希望更新站点上的某些模块；例如，模块可能会以您不喜欢的方式发生变化。您可以通过使用清单\
  \ 26–10 中所示的 `--lock` 选项来阻止 Drush 更新该模块。\n\n### 清单 26–10. 通过 Drush 锁定模块\n\n`$ drush\
  \ @dev pm-updatecode --lock=logintoboggan`  \n`正在刷新更新状态信息...`  \n`完成。`  \n`正在锁定\
  \ logintoboggan`  \n`更新信息最后刷新时间：2011 年 1 月 15 日星期六 - 19:57`  \n\n`所有已安装并启用的 Drupal\
  \ 项目的更新状态信息：`  \n` 名称            已安装版本   建议版本  状态`  \n` Drupal 核心    7.0       \
  \        7.0              已是最新`  \n` LoginToboggan  7.x-1.0-alpha2    7.x-1.0  \
  \       通过 drush 锁定。（有可用更新）`  \n\n`没有可用的代码更新。`\n\n此锁定是持久的；除非您使用 `--unlock=module_name`\
  \ 或 `--unlock=all` 解锁，否则无法更新被锁定的模块。\n\n生产站点上的 RAM 和 CPU 时间非常宝贵。为什么要使用处理用户请求的 CPU\
  \ 来检查代码更新？您可以在生产站点上关闭更新状态，并通过 Drush 测试代码更新。如果您的开发站点有部署在生产站点的代码副本，请使用以下代码：\n\n`$\
  \ drush @dev pm-updatecode --pipe`  \n`logintoboggan 7.x-1.0-alpha2 7.x-1.0 有可用更新`\n\
  \n`--pipe` 选项在许多 Drush 命令中都受支持。它使 Drush 将输出从通常的人类可读形式转换为设计用于脚本处理的格式。对于 `pm-updatecode`，它还使\
  \ Drush 仅打印已安装代码的当前状态。如果没有可用更新，则不会有任何输出。在 cron 中调用前面的命令，如果有可用更新，您的脚本就可以很容易地复制站点并执行更新——甚至可能运行一些单元测试。脚本化提供了很多选择；自动化频繁执行的任务将很快带来回报。\n\
  \n![images](img/square.jpg) **注意** `update_advanced` 模块也允许您选择不希望更新的模块。如果您这样做，Drush\
  \ 也将支持此设置。`Update_advanced` 目前尚不适用于 Drupal 7，但可能很快会提供。\n```\n\n\n### 安装 Drush 扩展\n\
  \n除了我已经讨论过的所有命令，`Drush` 还允许扩展定义新的命令供你使用。一些提供额外 `Drush` 命令的项目示例包括 `drush_extras`、`drush_make`、`drubuntu`\
  \ 和 `devel`。常规的 Drupal 模块也可以提供 `Drush` 命令；`devel` 和 `features` 就是两个这样的模块示例。任何 Drupal\
  \ 模块都能添加 `Drush` 命令文件，这一能力是一个非常强大的工具，因为它允许模块开发者为模块提供的功能提供命令行接口。大量 Drupal 模块都利用了这一能力；`Drush`\
  \ 项目页面（[`http://drupal.org/project/drush`](http://drupal.org/project/drush)）上有一个链接，列出了提供\
  \ `Drush` 集成的模块。\n\n按照约定，`Drush` 扩展必须将定义的 `Drush` 命令放置在称为 `Drush` 命令文件的 PHP 源文件中。`Drush`\
  \ 命令文件的文件名始终以 `.drush.inc` 结尾。`Drush` 会在引导过程中搜索这些文件，找到的任何命令文件都会被添加到一个用于查找和调度命令的内部列表中。`Drush`\
  \ 会在以下位置查找命令文件：\n\n-   `Drush` 安装目录下的 `commands` 文件夹（`/path/to/drush/commands`）\n\
  -   `include` 选项中列出的文件夹，该选项既可以在命令行中设置（`--include=/path/to/my/drush/commands`），也可以在\
  \ `drushrc.php` 文件中设置（`$options['include'] = /path/to/my/drush/commands`）。\n-  \
  \ 系统级的 `Drush` 命令文件夹，例如 `/usr/share/drush/commands`\n-   用户 `$HOME` 目录下的 `.drush`\
  \ 文件夹。\n-   当前 Drupal 安装中所有启用的模块\n\n`Drush` 的 `pm-download` 命令足够智能，会将 `Drush` 扩展放置到易于寻找以便日后使用的位置。例如，如果你执行\
  \ `pm-download drush_extras`，`Drush` 会将其放置在 `$HOME/.drush/drush_extras`。这个位置仅适用于仅包含\
  \ `Drush` 命令的项目。对于同时包含 Drupal 模块和 `Drush` 命令文件的项目，例如 `devel` 模块，则需要 `Drush` 将其放置在\
  \ Drupal 站点内部，通常是在 `sites/all/modules` 下。这样做是必要的，因为模块无法在 Drupal 站点之外工作，并且项目不能被拆分并安装到不同位置。理解这一限制很重要，因为它意味着绑定在模块中的\
  \ `Drush` 命令只有在模块已启用，并且执行 `Drush` 时该模块所安装的站点已被选中（引导）的情况下，才会可见。清单 26-11 展示了如何在你的\
  \ `@dev` 站点上安装 `devel` 模块，并查看其效果。\n\n***清单 26-11.** 下载并显示 devel 模块的帮助信息*\n\n```\n\
  $ drush @dev pm-download devel\nProject devel (7.x-1.0) downloaded to /srv/www/dgd7/web/sites/all/modules/devel.\n\
  Project devel contains 4 modules: devel_generate, performance, devel_node_access,\
  \ devel.\n$ drush @dev pm-enable devel\nThe following extensions will be enabled:\
  \ devel\nDo you really want to continue? (y/n): y\ndevel was enabled successfully.\n\
  FirePHP has been checked out via svn to /srv/www/dgd7/web/sites/all/modules/devel/FirePHPCore.\n\
  $ drush @dev help --filter=devel\nAll commands in devel: (devel)\n devel-download\
  \        Downloads the FirePHP library from http://firephp.org/.  \n devel-reinstall\
  \       Disable, Uninstall, and Install a list of projects.      \n (dre)      \
  \                                                                 \n devel-token\
  \ (token)   List available tokens                               \n fn-hook (fnh,\
  \ hook)   List implementations of a given hook and explore source of\n         \
  \              specified one.\n fn-view (fnv)         Show the source of specified\
  \ function or method.      \n```\n\n在清单 26-11 中，你执行了 `drush @dev help` 来告诉 `Drush`\
  \ 在帮助文本中包含来自 `@dev` Drupal 站点的命令文件。`--filter=devel` 标志指示 `Drush` 只显示来自名为 `devel`\
  \ 的命令文件的那些命令。如果你省略了 `--filter` 标志，那么 `Drush help` 的输出会长得多；但如果你省略了 `@dev` 别名，那么 `devel`\
  \ 的 `Drush` 命令就不会出现在输出的任何地方。\n\n你可能还会注意到，`devel` 模块在启用时会自动下载其依赖项 `FirePHP`。这是一点易于复现的\
  \ `Drush` 魔法；我将在关于更改 `Drush` 命令行为的部分中解释如何实现。\n\n### 深入探讨 Drush 配置选项和别名\n\n既然你已经见识了一些\
  \ `Drush` 能做的事情，让我们回到配置文件的主题。你已经了解了如何在 `aliases.drushrc.php` 文件中配置站点别名，但我跳过了更基础的\
  \ `Drush` 配置文件 `drushrc.php`。`Drush` 会在多个位置搜索配置文件，主要位置是 `$HOME/.drush/drushrc.php`，用于按用户进行配置。其他选项将在稍后讨论，但首先，让我们看一些简单的配置选项。在\
  \ `drush` 文件夹中，有一个名为 `examples` 的目录，其中包含许多示例文件，有助于我们开始各种操作。其中之一是 `example.drushrc.php`。让我们先把这个文件复制到\
  \ `$HOME/.drush/drushrc.php`，如下所示：\n\n```\n$ mkdir $HOME/.drush\n$ cp examples/example.drushrc.php\
  \ $HOME/.drush/drushrc.php\n```\n\n默认文件中所有配置选项最初都是注释掉的，因此你需要编辑新的配置文件，它才能为你做任何事情。以下是指定默认站点的方法：\n\
  \n```\n// 指定一个特定的多站点。\n#### $options['uri'] = 'http://d7dg.org';\n// 指定你的 Drupal\
  \ 核心基础目录（如果你使用符号链接，这很有用）。\n#### $options['root'] = '/srv/www/d7dg.org/drupal';\n\
  ```\n\n现在，如果你执行 `drush core-status` 命令，你将看到示例站点被选中，即使在命令行上没有指定 `--root` 或 `--uri`。还要注意，在配置文件中指定这些选项将优先于\
  \ `Drush` 根据当前工作目录选择特定 Drupal 站点的功能。如果本地机器上有多个 Drupal 站点，通常最好*不要*在配置文件中指定 root 和\
  \ URI，以便你可以继续使用 `cd` 来选择 Drupal 站点。然而，在包含多个 Drupal 实例的系统上，这个配置选项可以节省大量时间。\n\n\n\n\
  ### Drush 上下文\n\n在配置文件中指定选项，而非在命令行中直接输入，其灵活性远超初印象。如前所述，Drush 会在多个位置搜索配置文件，其中部分文件会根据\
  \ Drush 被调用时的上下文进行条件性加载。每个配置文件都会加载到一个独立的*上下文*中；Drush 上下文按类型标记，并按优先级排序。加载到高优先级上下文中的配置选项，会屏蔽加载到低优先级上下文中的同名选项。以下是一些较为重要的上下文：\n\
  \n- **CLI**：用户输入的命令行选项被加载到 `cli` 上下文中。\n- **Specific**：当执行指定命令时，命令特定选项会生效。\n- **Site**：存放从\
  \ Drupal 站点目录（即 `settings.php` 所在目录）加载的 `drushrc.php` 文件中的选项。\n- **Drupal**：存放从\
  \ Drupal 根目录（即 Drupal 的 `index.php` 所在目录）加载的 `drush.php` 文件中的选项。\n- **Alias**：当引用别名时，在站点别名中定义的选项会被复制到别名上下文中。\n\
  - **Home**：存放从用户 `$HOME/.drush` 目录加载的 `drush.php` 文件中的选项。\n\n通过在这些不同的上下文中定义选项，可以针对每个站点、每个别名或每个命令来改变\
  \ Drush 的行为。上下文优先级如上所示，其中选项上下文是列表中优先级最高的之一；这确保了用户在命令行中显式输入的任何选项，都会覆盖配置文件中的选项。类似地，在别名中定义的选项会覆盖全局配置文件中的选项，而特定于\
  \ Drupal 站点的选项优先级则高于别名选项。\n\n### 命令特定选项\n\n除了之前介绍的全局选项，Drush 还允许在配置文件中定义命令特定选项。命令特定选项使您对\
  \ Drush 的行为拥有极大的控制力。例如，如果指定了 `--notes` 选项，`pm-download` 和 `pm-updatecode` 这两个命令都会显示发布说明。如果您希望\
  \ `pm-updatecode` 总是显示发布说明，而保持 `pm-download` 的行为不变，您可以像这样为 `pm-updatecode` 定义一个命令特定选项：\n\
  \n```\n$command_specific['pm-updatecode'] = array('notes' => TRUE);\n```\n\n也可以将命令特定选项放入别名记录中（参见列表\
  \ 26–12）。这种语法一点也不让人意外。\n\n**列表 26–12.** 别名记录中的命令特定选项\n\n```\n$aliases['dev'] = array(\n\
  \  'root' => '/srv/www/dgd7.org',\n  'uri' => 'http://dev.dgd7.org',\n  'command-specific'\
  \ => array(\n    'status' => array('show-passwords' => TRUE),\n  ),\n);\n```\n\n\
  在列表 26–12 中，每当执行 `drush @dev core-status` 命令时，`--show-passwords` 选项都会被设置。如果您希望轻松查看测试站点的状态显示中的临时密码，但又不想在生产系统上显示密码，这会非常有用。\n\
  \n### 站点列表\n\n除了简单的单站点别名，Drush 还支持代表多个站点的别名列表。创建此类列表有两种方法。第一种是显式定义列表，并列出应包含在列表中的每个别名，如下所示：\n\
  \n```\n$aliases['all-scratch'] = array(\n  'site-list' => array('@dev', '@stage'),\n\
  );\n```\n\n当您拥有这样的站点列表时，可以依次对多个 Drupal 站点执行 Drush 命令，如下所示：\n\n```\n$ drush @all-scratch\
  \ core-status \"Drupal Version\"\nYou are about to execute 'core-status Drupal Version'\
  \ on all of the following targets:\n  @dev\n  @stage\nContinue?  (y/n): y\n@dev\
  \   >>  Drupal version   :  7.0-dev\n@stage >>  Drupal version   :  7.0\n```\n\n\
  另一种创建站点列表的方式是通过分组别名文件隐式实现。分组别名文件与常规别名文件类似，区别在于其文件名以组名开头。例如，要为 dgd7.org 创建一个代表生产站点、预发布站点和开发站点的别名组，您可以创建一个名为\
  \ `dgd7.aliases.drushrc.php` 的文件，并在其中为这三个站点添加别名。其代码可能类似于列表 26–13。\n\n**列表 26–13.**\
  \ 分组别名文件 `dgd7.aliases.drushrc.php`\n\n```\n$aliases['dev'] = array(\n  'root' =>\
  \ '/srv/www/dgd7.org',\n  'uri' => 'http://dev.dgd7.org',\n);\n$aliases['stage']\
  \ = array(\n  'root' => '/srv/www/stage.dgd7.org',\n  'uri' => 'http://stage.dgd7.org',\n\
  );\n$aliases['live'] = array(\n  'remote-host' => 'host.isp.com',\n  'remote-user'\
  \ => 'wwwadmin',\n  'root' => '/srv/www/dgd7.org',\n  'uri' => 'http://dgd7.org',\n\
  );\n```\n\nDrush 会对遇到的每个分组别名文件执行一些特殊操作。首先，它会为每个定义的别名生成一个带有组名前缀的附加名称，因此 `@dev` 别名也可以写作\
  \ `@dgd7.dev`（如果多个别名分组文件都定义了名为 `@dev` 的别名，那么简化名称会变得不明确，必须使用带有组名的较长名称）。其次，会生成一个以别名组命名的隐式站点列表；在列表\
  \ 26–13 中，这相当于以下别名定义：\n\n```\n$aliases['dgd7'] = array(\n  'site-list' => array('@dgd7.dev',\
  \ '@dgd7.stage', '@dgd7.live'),\n);\n```\n\n列表 26–13 中 `@dgd7.live` 站点的定义包含了名为 `remote-host`\
  \ 和 `remote-user` 的条目。当别名记录中设置了这些键时，表示所关联的 Drupal 站点位于远程机器上。如果您将其中一个别名作为 Drush 命令的目标，您会发现\
  \ Drush 允许使用远程站点别名远程执行命令。然而，要使此功能正常工作，您必须首先进行一些初步配置。此过程将在下一节中讨论。\n\n### 使用远程命令通过\
  \ Drush 部署站点\n\n当您拥有像 `@live` 这样描述位于远程服务器上的 Drupal 站点的别名时，就可以像运行本地命令一样轻松地在那个站点上运行远程命令。Drush\
  \ 通过使用 `ssh` 调用远程 Drush 实例来实现这一点。在本节中，我将展示这个功能如何极大地简化管理运行在多个远程服务器上的多个 Drupal 站点的工作——或者，仅仅为您唯一的\
  \ Drupal 站点创建一个用于开发和测试的本地副本。\n\n\n\n#### 设置 SSH 密钥对\n\n为了让远程 Drush 命令能够执行，你首先需要设置一个\
  \ SSH 密钥对，使本地机器能够连接到远程机器。如果你知道方法，这并不难做到，而使用 Drush 来实现则更加简单。在 `drush_extras` 模块中有一个名为\
  \ `pushkey` 的命令，它可以为你完成所有工作。要使用 `drush_extras`，你必须先下载它。`drush_extras` **不是**一个 Drupal\
  \ 模块；它只包含 Drush 命令。当你下载这样的项目时，Drush 会自动将其放置在 Drush 能够找到其命令的位置。因此，一旦下载了 `drush_extras`，`pushkey`\
  \ 即可使用（参见清单 26–14）。\n\n**清单 26–14.** 下载 `drush_extras` 并使用 `pushkey` 设置公钥/私钥对\n\n\
  ```\n$ drush pm-download drush_extras\nProject drush_extras (7.x-4.0) downloaded\
  \ to                        [success]\n/home/user/.drush/drush_extras.\n$ drush\
  \ pushkey @live\nEnter passphrase (empty for no passphrase):\nEnter same passphrase\
  \ again:\nGenerating public/private rsa key pair.\nYour identification has been\
  \ saved in /home/user/.ssh/id_rsa.\nYour public key has been saved in /home/user/.ssh/id_rsa.pub.\n\
  The key fingerprint is:\nd1:72:ed:7c:05:c4:cb:75:75:dc:3b:c4:ba:95:0d:1e user@localhost\n\
  The key's randomart image is:\n+--[ RSA 2048]----+\n|             o+.=|\n|     \
  \     . .  E+*|\n|        o o .oo=*|\n|         + o .+*.|\n|        S   o + .|\n\
  |             o   |\n|                 |\n|                 |\n|               \
  \  |\n+-----------------+\nwwwadmin@host.isp.com's password:\n$ drush @live core-status\n\
  \ Drupal version                :  7.0\n Site URI                      :  http://live.dgd7.org\n\
  \ Database driver               :  pgsql\n Database hostname             :  localhost\n\
  \ Database username             :  www-data\n Database name                 :  dgd7livedb\n\
  \ Database                      :  Connected\n Drupal bootstrap              : \
  \ Successful\n Drupal user                   :  Anonymous\n Default theme      \
  \           :  bartik\n Administration theme          :  seven\n PHP configuration\
  \             :  /etc/php5/cli/php.ini\n Drush version                 :  4.0-dev\n\
  \ Drush configuration           :  /home/user/.drush/drushrc.php\n Drush alias files\
  \             :  /home/user/.drush/live.aliases.drushrc.php\n                  \
  \                /home/user/.drush/dev.aliases.drushrc.php\n Drupal root       \
  \            :  /srv/www/dgd7-live/web\n Site path                     :  sites/default\n\
  \ File directory path           :  sites/default/files\n```\n\n为了使 `core-status`\
  \ 命令能够工作，你必须在远程机器上安装 Drush。一旦远程安装了 Drush，你就可以快速轻松地运行远程命令来影响其他机器上的 Drupal 站点，而无需显式登录。Drush\
  \ 会对每个命令通过 ssh 进行隐式远程登录；如果你的公钥受密码保护（建议如此），你可能会在第一个命令以及一段时间不活动后需要输入密码，但除此之外，使用远程别名来管理运行在不同服务器上的多个站点会方便得多。如果由于某种原因你无法在远程服务器上安装\
  \ Drush，仍然可以使用稍后描述的 `drush core-rsync` 和 `drush sql-sync` 命令，而无需远程副本。如果你需要这样做，请跳到本节末尾；不过，现在我假设你的两台机器上都安装了\
  \ Drush，并且清单 26–14 中显示的远程 `core-status` 命令可以正常工作。\n\n\n\n#### 制作远程 Drupal 网站的本地副本\n\
  \n设置好远程执行环境后，可使用 Drush 的 `core-rsync` 和 `sql-sync` 命令快速将 Drupal 网站从一个位置复制到另一个位置。无论一个网站是远程的还是两个都是本地的，基本操作方式都相同。如果你希望先进行一次试运行，看看\
  \ Drush 会为特定网站组合给 `core-rsync` 传递哪些参数，可以先使用 `--simulate` 选项运行该命令，如清单 26–15 所示。\n\
  \n**清单 26–15.** 使用 `drush rsync` 将远程服务器的所有 Drupal 文件复制到本地系统\n\n```\n$ drush core-rsync\
  \ @live @dev --include-conf --simulate\nCalling system(rsync -e 'ssh ' -az --exclude=\"\
  .bzr\" --exclude=\".bzrignore\" --exclude=\".bzrtags\" --exclude=\".svn\" wwwadmin@host.isp.com:/srv/www/dgd7-live/web/\n\
  /srv/www/dgd7/web/);\n$ drush core-rsync @live @dev --include-conf\nYou will destroy\
  \ data from /srv/www/dgd7/web/ and replace with data from wwwadmin@host.isp.com:/srv/www/dgd7-live/web/\n\
  Do you really want to continue? (y/n): y\n```\n\n`--include-conf` 选项告诉 Drush 同时复制\
  \ `settings.php` 文件。设置文件通常在生产环境和开发环境之间有部分变量部分不同，因此 Drush 在复制网站时默认会跳过该文件。首次复制网站时使用\
  \ `--include-conf`，之后则无需使用，Drush 将不会覆盖你的 `settings.php` 文件。说到这个，如果你需要更改开发网站的数据库设置，现在正是打开刚复制的\
  \ `settings.php` 文件并根据需要调整的好时机。如果两个网站运行在同一台机器上，你至少需要更改数据库名称；不过，当 Drupal 网站运行在不同机器上时，它们很可能能够直接使用相同的\
  \ `settings.php` 文件而无需任何修改。\n\n文件复制完成后，你就可以拉取数据库了。注意，你无需预先创建数据库；你可以让 Drush 为你完成这个操作（见清单\
  \ 26–16）。\n\n**清单 26–16.** 使用 `drush sql-sync` 从远程服务器复制 Drupal 数据库\n\n```\n$ drush\
  \ sql-sync @live @dev --create-db\nWARNING:  Using temporary files to store and\
  \ transfer sql-dump.  It is recommended that you\nspecify --source-dump and --target-dump\
  \ options on the command line, or set '%dump' or '%dump-\ndir' in the path-aliases\
  \ section of your site alias records. This facilitates fast file\ntransfer via rsync.\n\
  You will destroy data from dgd7devdb and replace with data from host.isp.com/dgd7livedb.\n\
  \nYou might want to make a backup first, using the sql-dump command.\n\nDo you really\
  \ want to continue? (y/n): y\nDROP DATABASE\nCREATE DATABASE\n```\n\n如果 `sql-sync`\
  \ 命令出现错误 \"Access denied for user 'www-data'@'localhost'\"，你可以使用 `--db-su` 和 `--db-su-pw`\
  \ 指定具有更高权限的用户名和密码。\n\n基本上就是这样了；如果你已将 Web 服务器配置为提供开发网站的内容，那么你就可以在浏览器中打开它并查看本地副本。可能需要修复文件权限；例如，文件文件夹必须对\
  \ Web 服务器可写。不过，你可以通过设置一些选项来改善体验。例如，Drupal 会在网站的 SQL 数据库中缓存大量信息。你可以通过将这些表排除在同步操作之外来节省时间，如下所示：\n\
  \n```\n$ drush sql-sync @live @dev --structure-tables-key=common\n```\n\n结构表列表定义在\
  \ `drushrc.php` 文件中。以下是 `example.drushrc.php` 中的表列表：\n\n```\n$options['structure-tables']\
  \ = array(\n 'common' => array('cache', 'cache_filter', 'cache_menu', 'cache_page',\
  \ 'history', 'sessions',\n'watchdog'),\n);\n```\n\n你可能需要向此列表添加更多表。一个好的起点是通过 `drush\
  \ sql-query 'show tables;' | grep cache` 考虑名称中包含 \"cache\" 的表列表。从该列表中删除诸如 `imagecache_action`\
  \ 等表，并将剩余的表添加到你的结构表列表中。\n\n在跳过了某些表执行 `sql-sync` 后，你需要在目标网站上清除缓存以确保一切正常运行。`drush\
  \ cache-clear all` 命令可以实现这一目的。\n\nDrush 还会在同步网站时帮助你修复 SQL 数据库。`--sanitize` 选项用于选择此操作（见清单\
  \ 26–17）。\n\n**清单 26–17.** 将数据库同步清理到测试用的暂存网站\n\n```\n$ drush sql-sync @dev @test\
  \ --sanitize\n\nYou will destroy data from testdb and replace with data from devdb.\n\
  \nThe following post-sync operations will be done on the destination:\n\n  * Reset\
  \ passwords and email addresses in user table\n\nYou might want to make a backup\
  \ first, using the sql-dump command.\n\nDo you really want to continue? (y/n):\n\
  ```\n\n你可以通过自己的清理操作来扩展 Drush；你可以在 `docs/drush.api.php` 文件中找到相关示例。默认操作会将所有用户密码替换为默认密码（例如\
  \ \"password\"）。这使得以任何用户身份登录进行测试变得容易，同时也意味着清理后的数据库副本无法用于进行字典攻击以获取实际用户密码。默认清理操作的另一个作用是将每个用户的电子邮件地址设置为指定的测试地址。这既有利于隐私保护，也有利于测试。例如，你可以在清理后的数据库副本上测试电子邮件通知代码，而无需真正向所有用户发送测试邮件。\n\
  \n![images](img/square.jpg) **注意** Drush 使得复制网站变得非常容易；然而，如果你管理着许多网站，你可能想了解一下 Aegir，它包含\
  \ provision 和 hostmaster 项目。要开始使用 Aegir，请访问 Aegir 社区网站 [`http://community.aegirproject.org/`](http://community.aegirproject.org/)，在那里你可以找到关于使用提供的安装脚本或通过\
  \ Drush 安装它的说明。\n\n\n\n#### 管理转储文件\n\n默认情况下，`sql-sync` 会将源 SQL 数据库转储到一个临时文件中，该文件在导入目标数据库后被删除。这对于同步托管在同一台机器上的站点来说没有问题，但对于跨网络同步站点，使用持久化转储文件通常更有优势。Drush\
  \ 分三步执行 `sql-sync`。首先，根据需要，通过 `mysqldump` 或 `pg_dump` 从源机器导出源 SQL 数据库。接着，使用 `core-rsync`\
  \ 将数据库转储文件复制到目标机器。最后一步，将目标转储文件导入目标 SQL 数据库。如果你的 SQL 数据库相当大，而变更相对较小，那么当目标文件内容与源文件相似时，Drush\
  \ 用于传输转储文件的 `core-rsync` 操作完成速度会快得多。Drush 提供了许多管理转储文件的功能，以便你可以利用 `core-rsync` 的这一内在特性。\n\
  \n利用转储文件最简单的方法是在你的 Drush 配置文件中设置 `$options['dump-dir']`。通过此设置，Drush 会自动生成转储文件的名称，并将其存储在该选项指定的目录中。虽然设置简单，但这种方式不够灵活，因为源和目标数据库转储将使用相同的位置。这显然意味着两台机器上必须存在相同的文件系统目录结构；如果情况并非如此，则必须逐个站点地单独指定转储文件。\n\
  \n有两种方法可以指定转储文件的位置，从而允许单独控制每个转储文件的存储位置。最直接的方法是使用 `--source-dump` 和 `--target-dump`\
  \ 命令行选项。这些选项应设置为数据库应存储的准确文件的完整路径。这种方式完全可行，但每次需要同步数据库时都手动输入可能有点繁琐。为了减轻这一负担，Drush\
  \ 还允许你将转储文件路径记录在源站点和目标站点的站点别名记录中。这可以通过在别名记录的 `path-aliases` 部分设置一个值来实现，如下所示：\n\n\
  ```\n$aliases['dev'] = array(\n  'root' => '/srv/www/dgd7.org',\n  'uri' => 'http://dev.dgd7.org',\n\
  \  'path-aliases' => array(\n    '%dump' => '/path/to/dumpfile.sql',\n);\n```\n\n\
  使用此配置时，当别名是同步的源参数时，`--source-dump` 选项将被设置为 `%dump` 项的值；当它用作目标参数时，则会设置 `--target-dump`\
  \ 选项。\n\n使用转储文件时，了解 Drush 的自动缓存行为也很重要。`sql-sync` 命令有一个 `--cache` 选项，用于指定缓存的持久化转储文件的最大保留时间（以小时为单位）。如果未指定，缓存设置默认为二十四小时；如果你尝试在此时间间隔内更频繁地使用同一数据库执行\
  \ `sql-sync`，那么你将重复使用上次的转储文件，而不是获取新的转储。要覆盖此行为，请在配置文件中设置 `$options['cache'] = 0`；以禁用缓存。特别是当你更改\
  \ `structure-tables` 或 `skip-tables` 选项的设置时，务必小心禁用缓存，否则结果可能会出乎你的意料。\n\n#### 在远程系统上未安装\
  \ Drush 的情况下使用 `sql-sync`\n\n前面的代码片段显示，只需几个简单的站点别名和一对正确配置的 SSH 公钥/私钥对，Drush 就可以轻松地将数据库从一个系统复制到另一个系统。手动执行此操作需要许多步骤，并且需要了解源系统和目标系统的数据库参数。使用\
  \ Drush 省去了每次迁移数据库时都需要查找这些设置的麻烦。所有这些便利性都非常棒，但你可能想知道 Drush 是如何知道远程机器的数据库设置的。\n\n\
  你可能还记得，在上一节中，我提到在运行 `sql-sync` 示例之前，需要在远程机器上安装 Drush。之所以需要这样做，是因为如果 Drush 无法确定应该使用本地可用信息，它将通过\
  \ SSH 调用远程 Drush 实例来请求远程系统的数据库设置。Drush 使用 `sql-conf` 命令来查找这些信息。如果你使用 `--debug` 标志运行\
  \ `sql-sync` 命令，可以观察到 Drush 执行此操作的过程，如下所示：\n\n```\n$ drush sql-sync @live @dev --debug\n\
  [ 为简洁起见，省略了一些调试信息 ]\nRunning: ssh -o PasswordAuthentication=no 'wwwadmin'@'remoteserver.com'\
  \      [command]\n'drush  --all --uri='\\''http://dev.dgd7.org'\\'' --root='\\''/srv/www/drupal'\\\
  ''\nsql-conf --backend' [0.05 sec, 3.7 MB]\n```\n\n从中可以看出，Drush 正在使用 SSH 调用带有 `--all`\
  \ 标志的 Drush 命令 `sql-conf`。`sql-conf` 是一个隐藏命令，不会显示在 `drush help` 中；但是，你仍然可以自己运行这个相同的命令并直接查看其输出（参见清单\
  \ 26–18）。\n\n**清单 26–18.** 使用 `sql-conf` 检查远程数据库凭据\n\n```\n$ drush @live sql-conf\
  \ --all --show-passwords\nArray\n(\n    [default] => Array\n        (\n        \
  \    [default] => Array\n                (\n                    [driver] => pgsql\n\
  \                    [username] => www-data\n                    [password] => secretsecret\n\
  \                    [port] =>\n                    [host] => localhost\n      \
  \              [database] => dgd7db\n                )\n\n        )\n\n)\n```\n\n\
  `--all` 标志指示 Drush 包含所有可用数据库的信息，而不仅仅是当前活动的数据库。`--show-passwords` 覆盖 Drush 的默认隐私模式，该模式试图避免在控制台输出中打印敏感信息。`sql-conf`\
  \ 命令仅显示数据库连接信息；一个类似的命令 `site-alias` 将以 Drush `aliases.drushrc.php` 文件中使用的相同格式显示站点的信息（参见清单\
  \ 26–19）。\n\n**清单 26–19.** 使用 `site-alias` 显示包含远程 Drupal 站点数据库记录的站点别名\n\n```\n$\
  \ drush site-alias @live --with-db --show-passwords\n$aliases['live'] = array (\n\
  \  'remote-host' => 'host.isp.com',\n  'remote-user' => 'wwwadmin',\n  'uri' =>\
  \ 'http://live.dgd7.org',\n  'root' => '/srv/www/dgd7',\n  'databases' =>\n  array\
  \ (\n    'default' =>\n    array (\n      'default' =>\n      array (\n        'driver'\
  \ => 'pgsql',\n        'username' => 'www-data',\n        'password' => 'secretsecret',\n\
  \        'port' => '',\n        'host' => 'localhost',\n        'database' => 'dgd7db',\n\
  \      ),\n    ),\n  ),\n);\n```\n\n该命令的输出可以直接用于你的 `aliases.drushrc.php` 文件中；只需将其复制到适当位置即可。完成此操作后，`sql-sync`\
  \ 命令将不再需要额外的远程调用来获取数据库信息。不过，将数据库信息存储在别名记录中的缺点是，如果远程 Drupal 站点的 `settings.php` 中的数据库信息发生更改，这些信息有可能变得过时。你是喜欢使用手动缓存的数据库设置，还是在每次调用\
  \ `sql-sync` 时动态获取它们，主要取决于个人偏好和需求。Drush 为你提供了选择最适合你的方法的灵活性。\n\n\n\n#### 使用 Drush\
  \ 站点上下文控制 sql-sync 选项\n\n现在你已经掌握了足够的知识来构建一个更高级的示例。假设你有一组特定的配置选项，总是希望将其应用于 `sql-sync`。例如，你可能希望确保在使用\
  \ `sql-sync` 操作你的**在线站点**时，永远不会覆盖 `users` 或 `user_roles` 表。正如你所见，可以通过命令行选项从 `sql-sync`\
  \ 操作中排除某些表，并且你也知道可以在配置文件或别名中定义命令特定选项。除此之外，Drush 还允许别名文件为 `sql-sync` 和 `core-rsync`\
  \ 定义命令特定选项，这些选项仅在别名用作操作源时应用，而其他选项则可在别名用作目标站点时应用（参见列表 26–20）。\n\n***列表 26–20.** 指定当别名是\
  \ sql-sync 命令目标时要跳过的 SQL 表*\n\n```\n$aliases['live'] = array(\n  'remote-host' =>\
  \ 'host.isp.com',\n  'remote-user' => 'wwwadmin',\n  'root' => '/srv/www/dgd7.org',\n\
  \  'uri' => 'http://dgd7.org',\n  'target-command-specific' = array(\n    'sql-sync'\
  \ => array('structure-tables' =>'users,user_roles'),\n  ),\n);\n```\n\n如果使用此别名定义，那么命令\
  \ `drush sql-sync @dev @live` 将包含选项 `--target-structure-tables='users,user_roles'`，但当站点顺序颠倒时（即\
  \ `drush sql-sync @live @dev`），则不会设置此类选项。如果此别名记录被不同用户共享，那么在写入站点 `@live` 时避免覆盖 `users`\
  \ 和 `user_roles` 表会更方便，但当从 `@live` 同步时，仍会完整复制所有表。\n\n在上一节中，我展示了 Drush 会获取 `sql-sync`\
  \ 命令的源站点和目标站点的数据库记录。事实上，Drush 同时也会拾取这些站点的特殊配置选项。要使此技巧生效，必须满足两个前提条件。首先，别名记录*不能*定义站点的数据库记录。如果定义了数据库记录，Drush\
  \ 就不会进行远程（或本地）调用来获取它，因此也就没有机会获取配置选项。另一个要求是，要共享的配置选项必须在别名记录的站点上下文中定义。如前所述，站点上下文是从存放\
  \ Drupal 站点 `settings.php` 文件同一文件夹内的 `drushrc.php` 文件中加载的。因此，可以通过在 `@live` 站点的站点文件夹中定义选项来达到与列表\
  \ 26–20 相同的效果，如下所示：\n\n```\n$options['target-command-specific']['sql-sync'] => array('structure-tables'\
  \ => 'users,user_roles');\n```\n\n效果是一样的；当 `@live` 是目标时，`users` 和 `user_roles` 表将被跳过，但当它是\
  \ `sql-sync` 操作的源时则不会。区别在于这些选项不需要存储在别名文件中；当它们在站点上下文中定义时，对该 `drushrc.php` 文件的任何更改都会影响选择该\
  \ Drupal 站点的任何目标。\n\n![images](img/square.jpg) **警告** 不要混淆预定义配置选项的用途。用户指定的命令行选项始终优先于任何配置文件或别名记录中定义的选项。因此，默认选项仅仅是一种便利。不能指望它们来保护你的数据免受粗心错误的影响。\n\
  \n### 使用 Drush 编写脚本\n\n如果你对 Linux 和 bash shell（或类似变体）有所了解，你可能已经接触过古老的 shell 脚本。列表\
  \ 26–21 和 26–22 展示了编写 Hello World 的其他方式。\n\n***列表 26–21.** bash 中的 “Hello World”\
  \ 脚本*\n\n*`helloworld.sh`*:\n```\n#!/bin/bash\n echo \"Hello world!  This machine's\
  \ name is:\" `uname -n`\n```\n\n***列表 26–22.** 运行 helloworld.sh*\n\n```\n$ chmod\
  \ +x helloworld.sh\n$ helloworld.sh\nHello world!  This machine's name is: genkan\n\
  ```\n\n实际上，你可以用 Drush 做完全相同的事情；参见列表 26–23 和 26–24。\n\n***列表 26–23.** Drush 中的 “Hello\
  \ World” 脚本*\n\n*`helloworld.drush`*:\n```\n#!/usr/bin/env drush\ndrush_print(dt(\"\
  Hello world!  This site's name is: @name\", array(\"@name\" => variable_get('site_name',\
  \ 'unknown'))));\n```\n\n***列表 26–24.** 运行 helloworld.drush*\n\n```\n$ chmod +x\
  \ helloworld.drush\n$ cd /srv/www/dgd7.org\n$ /path/to/drush/examples/helloworld.drush\n\
  Hello world!  This site's name is: The Definitive Guide To Drupal 7\n```\n\n![images](img/square.jpg)\
  \ **注意** 如果你觉得看到不带 `\"<?php\"` 起始标记的 PHP 脚本不舒服，可以添加它，但这并非必需。同样，你的 Drush shell 脚本也不一定非要\
  \ `.drush` 结尾，就像你的 bash 脚本不一定非要以 `.sh` 结尾一样。脚本可以任意命名并放在任何位置，只要它们在你的 PATH 中。通常认为最佳实践是*不要*在脚本文件名上添加扩展名；这样，如果你将来用另一种语言重新实现某个命令，该命令的名称也无需更改。\n\
  \n在 Drush 示例文件夹中，有一个名为 `drush/examples/helloworld.script` 的示例脚本；它比列表 26–23 中展示的\
  \ `helloworld.drush` 示例更全面。\n\n当你运行 Drush shell 脚本时，Drush 会先引导你的站点，然后才运行你的代码。这意味着\
  \ Drupal API（如 `variable_get`）是可用的，并且它们会对你的站点数据库进行操作。就是这么简单——你只需调用函数，剩下的交给 Drush\
  \ 去准备 Drupal 站点并确保代码已被包含。这使得 Drush shell 脚本成为一种非常快速便捷的方式，来保存你可能偶尔需要在站点上运行的小段 PHP\
  \ 代码。开始编写 Drush 脚本的一种方法是编写运行 Drush 命令序列的脚本。当然，你也可以用 bash 脚本做到这一点，但 Drush 让你能用 PHP\
  \ 完成同样的工作。\n\n#### 处理脚本命令行参数和选项\n\nDrush 使得获取传递给脚本的命令行参数和选项变得非常容易。如前所述，在 `drush/examples/helloworld.script`\
  \ 中有一个更全面的 hello world 示例；它包含了一些有用的片段，比如如何遍历脚本的命令行参数，如下所示：\n\n```\nwhile ($arg =\
  \ drush_shift()) {\n  drush_print('  ' . $arg);\n}\n// 获取 --target 选项的值；如果未指定 --target，则返回\
  \ \"@self\"\n$target_value = drush_get_option('target', '@self');\n```\n\n#### 运行外部命令\n\
  \n有许多便捷函数可以帮助你在 Drush 脚本中运行 shell 和 Drush 命令。以下部分描述了一些可供使用的重要命令；[`http://api.drush.ws`](http://api.drush.ws)\
  \ 网站包含一个全面的 API 参考，其中包含更多信息。\n\n\n\n#### `drush_shell_exec` 和 `drush_op_system`\n\
  \n`drush_shell_exec` 和 `drush_op_system` 这两个命令允许你从 Drush 脚本中轻松调用 shell 命令。在这两个函数中，`drush_op_system`\
  \ 更容易调用，但局限性也大得多；它总是丢弃 shell 命令的输出，并且要求调用者正确地转义传递给命令的所有参数。如果你需要记录 shell 命令的输出，请改用\
  \ `drush_shell_exec`。它会为你转义参数，并返回 shell 的输出。以下是调用 `drush_shell_exec` 的示例：\n\n```\n\
  drush_shell_exec(\"tar -tf %s\", $tarpath);\n$output = drush_shell_exec_output();\n\
  $project_dir = rtrim($output[0], DIRECTORY_SEPARATOR);\n```\n\n切换使用这两个函数时要小心；`drush_op_system`\
  \ 成功时返回 0，而 `drush_shell_exec` 成功时返回 TRUE。\n\n#### `drush_invoke`\n\n`drush_invoke`\
  \ 函数将使用当前的引导状态和当前命令行选项来调用一个 Drush 命令。以下是一个简单的脚本，用于清除所有 Drupal 缓存并启用 devel 和 hacked\
  \ 模块。你可能希望在将线上站点同步到开发站点后按顺序运行它。\n\n```\n#!/bin/env drush\ndrush_invoke('cache-clear',\
  \ 'all');\ndrush_invoke('pm-enable', 'devel', 'hacked');\n```\n\n#### `drush_dispatch`\n\
  \n`drush_dispatch` 函数与 `drush_invoke` 非常相似，但它基于一条完整的命令记录来执行命令。如果你出于某种原因希望参与命令分发过程，这偶尔会很有用；例如，Drush\
  \ 命令 `core-topic` 会查询主题命令列表，允许用户选择一个，然后通过 `drush_dispatch` 执行它。\n\n```\n$commands\
  \ = drush_get_commands();\n$command_name = function_to_select_one_command($commands);\n\
  return drush_dispatch($commands[$command_name]);\n```\n\n#### `drush_invoke_process`\
  \ 和 `drush_invoke_sitealias`\n\n`drush_invoke_process` 和 `drush_invoke_sitealias`\
  \ 这两个函数都与 `drush_invoke` 非常相似；主要区别在于 process 和 sitealias API 在新进程和新环境中执行所需的命令。对于\
  \ `drush_invoke_sitealias`，还需要提供一条站点别名记录以定位到不同的 Drupal 站点；目标站点可以是本地的，也可以是远程的。获取站点别名记录最便捷的方法是使用\
  \ `drush_sitealias_get_record` 函数从可用的 Drush 别名文件中查找一条。\n\n```\n// 在名为 @dev 的站点上运行\
  \ core-status 命令，并传递 \"Drupal version\" 作为其参数。\n// 这等同于命令：drush @dev core-status\
  \ \"Drupal version\"\n$site_record = drush_sitealias_get_record('@dev');\n$result_record\
  \ = drush_invoke_sitealias($site_record, 'core-status', \"Drupal version\");\ndrush_print($result_record['output']);\n\
  ```\n\n当调用 `drush_invoke_sitealias` 时，它会在新进程中运行一个新的 Drush 命令，引导指定的 Drupal 站点并执行指定的命令。无论站点别名代表的是本地还是远程\
  \ Drupal 站点，此过程都能同样出色地工作。命令结果出现在返回对象的输出项中；这将在本章后面更详细地解释。\n\n#### `drush_invoke_process_args`\
  \ 和 `drush_invoke_sitealias_args`\n\n要将命令选项传递给被调用的命令，请使用变体 API 之一：`drush_invoke_process_args`\
  \ 或 `drush_invoke_sitealias_args`。这些函数的工作方式与其非 args 版本相同，区别在于前者允许使用数组变量传递命令行参数和命令行选项。\n\
  \n```\n// 使用 --all 选项调用 sql-conf 以确定与提供的别名记录相关联的\n// 所有数据库的配置设置。\n$result_record\
  \ = drush_invoke_sitealias_args($alias_record, \"sql-conf\", array(), array('all'\
  \ => TRUE));\n$database_records = $result_record['object'];\n```\n\n这个示例是 `sql-sync`\
  \ 在别名记录不包含内联数据库配置时用于查找数据库配置的技术。它不传递任何参数，传递的唯一选项是 `--all`，用于指示 `sql-conf` 返回所有数据库，而不仅仅是主数据库。如果你想使用用户传递给当前命令的相同选项，在引导后的站点上调用另一个命令（`drush_invoke_process_args`）或在其他站点上调用命令（`drush_invoke_sitealias_args`），可以使用\
  \ `drush_redispatch_get_options` 函数，该函数会为你查找这些选项。\n\n### 处理调用进程结果\n\n如上一节所示，`drush_invoke_process`、`drush_invoke_sitealias`\
  \ 以及它们的 `_args` 变体函数返回一个关联数组，其中包含所执行命令的结果。你可能已经注意到，一个示例从输出中获取结果，而另一个示例则查看了一个名为 object\
  \ 的不同项。这些字段以及调用进程结果的其他内容说明如下：\n\n-   **output:** 此项包含所执行命令的文本输出。这是你从 shell 运行相同\
  \ Drush 命令时会看到的文本。\n-   **object**: 并非每个 Drush 命令都提供 object 项。当它可用时，它将包含命令结果的 PHP\
  \ 对象表示。这通常是一个关联数组；例如，`sql-conf` 命令返回一个包含数据库配置信息的数组。\n-   **self**: self 对象包含在执行命令时用于选择引导后站点的别名记录。在返回之前，来自站点上下文的所有选项都会合并到该记录中；这就是\
  \ `sql-sync` 命令从远程（或本地）站点的站点上下文中获取共享选项的方式。\n-   **error_status**: 此项返回命令的错误状态。零表示“无错误”。\n\
  -   **log**: log 项包含一个按时间顺序排列的、来自命令执行的日志消息数组。每条日志条目都是一个关联数组。一条日志条目包含以下项目：\n    -\
  \   **type**: 日志条目的类型，例如“notice”或“warning”。\n    -   **message**: 日志消息。\n    - \
  \  **timestamp**: 记录消息的时间。\n    -   **memory**: 记录消息时可用的内存。\n    -   **error**:\
  \ 与日志消息关联的错误代码（仅适用于类型为“error”的日志条目）。\n\n关于 type 和 error 含义的更多信息，请参见日志记录和错误报告部分。\n\
  \n-   **error_log**: error_log 项包含日志中条目的另一种表示形式。只有设置了 error 项的日志条目才会出现在错误日志中。错误日志是一个关联数组，其键是错误代码，其值是一个消息数组——针对每个具有相同错误代码的日志条目各有一条消息。\n\
  -   **context**: context 项包含所有影响命令操作的选项值的表示形式，包括命令行选项、在 `drushrc.php` 配置文件中设置的选项以及从与该命令一起使用的别名记录中设置的选项。此项使用函数\
  \ `drush_get_merged_options` 的结果进行初始化，该函数仅将所有来自所有 Drush 上下文的选项合并在一起。\n\n\n\n####\
  \ 输出与日志\n\n在编写 Drush 的脚本或命令时，遵循已建立的输出和日志记录惯例至关重要。使用本节所述的内置函数，可确保你的 Drush 脚本返回正确的结果代码，并且输出可供其他脚本以及最终用户检查。Drush\
  \ 命令可以远程且非交互地执行；一个规范的 Drush 命令可以作为更大脚本的构建块，该脚本随后能够分离输出和错误日志，并根据当前情况做出响应。这使得将 Drush\
  \ 命令集成到其他可能需要解析和处理命令输出的脚本中变得更加容易。相反，忽略可用的 Drush 实用程序例程会增加他人重用你脚本的难度。\n\n##### 使用\
  \ `drush_print` 和 `dt` 进行简单输出\n\nDrush 提供了函数 `drush_print`、`drush_print_r` 和 `dt`，应分别用以替代\
  \ `print`、`print_r` 和 `t`。Drush 在 `drush_print` 函数中提供了自动字符编码转换，这对于与无法直接处理 UTF-8\
  \ 输出的系统进行正确互操作至关重要。请参阅 `examples/examples.drushrc.php` 中的 `output_charset` 选项，了解如何配置此功能。\n\
  \n类似地，在将任何输出发送到 `drush_print` 或其他输出函数之前，应使用 `dt` 函数对其进行包装。其目的与 Drupal 函数 `t` 相同：允许识别用户可见的文本以进行翻译。Drush\
  \ 脚本不能简单地使用现有的 Drupal `t` 函数，因为 `t` 仅在 Drupal 站点已引导后才可用。有时 Drush 会在 Drupal 引导之前产生输出，而某些\
  \ Drush 命令根本不引导 Drupal 站点。`dt` 函数的模式与 `t` 相同，你应该对此很熟悉。\n\n```\ndrush_print(dt(\"\
  命令 !command 说了 !exclamation\", array('!command' => $command,\n'!exclamation' =>\
  \ $exclamation)));\n```\n\n在使用 `drush_print` 之前，应首先考虑是否更适合使用可用的 Drush 日志记录函数之一，如下文所述。\n\
  \n##### 使用 `drush_print_pipe` 输出供 Shell 脚本使用的数据\n\nDrush 提供了一种机制，允许脚本生成其输出的替代表示形式，以便于脚本处理。例如，命令\
  \ `pm-list` 默认会以人类可读的表格显示有关可用 Drush 扩展的信息。当使用 `--pipe` 标志调用时，`pm-list` 将仅输出扩展名称，不包含其他内容。\n\
  \n要实现此结果，Drush 脚本只需使用要包含在替代表示中的输出来调用 `drush_print_pipe`。无需检查管道模式；管道输出仅在请求时显示。脚本的常规输出也会被抑制，因此脚本可以简单地产出两种输出，由\
  \ Drush 决定如何处理。\n\n##### 使用 `drush_print_table` 格式化表格结果\n\n函数 `drush_print_table`\
  \ 会获取表格信息的表示形式（其中每个单元格包含文本）并进行格式化，使输出的列宽平衡，并且每个单元格中的文本自动换行以适应设定的边界。它实际上是 Richard\
  \ Heyes 和 Jan Schneider 开发的 Pear Consol Table 库的一个封装；其源代码版本可从主要来源 [`http://pear.php.net/package/Console_Table`](http://pear.php.net/package/Console_Table)\
  \ 获取。Console Table 代码并未随 Drush 实际分发；相反，Drush 会在首次运行时尝试下载并安装它。\n\n要使用此函数，只需构建一个表格行数组，其中每一行本身又是一个表格单元格数组。每个单元格应包含一个字符串（参见清单\
  \ 26–25）。\n\n***清单 26–25.** 为 `drush_print_table` 构建数组的数组*\n\n```\n$header = array(dt('ID'),\
  \ dt('日期'), dt('严重级别'), dt('类型'), dt('消息'));\nwhile ($result = drush_db_fetch_object($rsc))\
  \ {\n  $row = core_watchdog_format_result($result);\n  $table[] = array($row->wid,\
  \ $row->date, $row->severity, $row->type, $row->message);\n}\nif ($tail) {\n  $table\
  \ = array_reverse($table);\n}\narray_unshift($table, $header);\ndrush_print_table($table,\
  \ TRUE);\n```\n\n清单 26–25 中的代码是 Drush 命令 `watchdog-show` 的简化版本，用于将 Drupal watchdog\
  \ 表中的条目打印到控制台。此命令具有一种 tail 模式，可以持续打印日志中新添加的结果；在执行此操作时，结果会被反转，以便较新的条目位于底部。表头最后被添加；参数\
  \ `TRUE` 表示表格的第一行包含表头。例如，让我们看看 `watchdog-show` 命令的实际运行情况。如果 `watchdog-show` 的输出是：\n\
  \n```\n$ drush watchdog-show\n ID  日期            严重级别   类型     消息\n 61  15/Jan 09:01\
  \  notice     user     Session opened for admin.\n 60  15/Jan 08:47  notice    \
  \ cron     Cron run completed.\n```\n\n那么 `watchdog-show` 函数将构建一个类似如下的数组的数组：\n\n\
  ```\narray(\n  array ( 'ID', '日期', '严重级别', '类型', '消息',   ),\n  array ( '61', '15/Jan\
  \ 09:01', 'notice', 'user', 'Session opened for admin.', ),\n  array ( '60', '15/Jan\
  \ 08:47', 'notice', 'cron', 'Cron run completed.',   ),\n);\n```\n\n如果不需要在显示前操作表格内容，那么当然可以直接将表头行放入表格中，然后在其后追加数据。`drush_print_table`\
  \ 还有第三个可选参数（此处未显示），允许你指定部分或全部列的确切宽度。如果你想构建一个包含标签列和值列的简单表格（就像 `drush core-status`\
  \ 那样），那么可以使用便捷函数 `drush_key_value_to_array_table` 来进行转换，如下所示：\n\n```\n$status_table['Drush\
  \ 版本'] = DRUSH_VERSION;\n$status_table['Drush 配置'] = implode(' ', $configuration_list);\n\
  drush_print_table(drush_key_value_to_array_table($status_table));\n```\n\n当然，drush\
  \ `core-status` 的实际实现与此略有不同（且更广泛），但这是大致思路。如你所见，这些函数将使你能够非常快速地编写生成格式化表格输出的代码。\n\n\
  ##### 使用 `drush_html_to_text` 将 HTML 输出渲染为文本显示\n\nDrupal 包含一个在命令行脚本中非常有用的函数 `drupal_html_to_text`。但如前所述，Drush\
  \ 命令并不总是在已引导 Drupal 站点的环境中运行；因此，Drush 提供了 `drush_html_to_text` 函数作为此函数的更简单替代品。\n\
  \n此函数并非旨在替代文本网络浏览器，但它通常用于显示已知结构足够简单、兼容且适合文本输出的 HTML 页面上的信息。例如，Drush 命令 `pm-releasenotes`\
  \ 使用 `drush_html_to_text` 将请求的发行说明 HTML 页面转换为可在终端中显示的格式。但是，如果你需要在始终引导 Drupal 站点的\
  \ Drush 命令中解析 HTML，那么不妨直接使用 `drupal_html_to_text` 函数，并利用其增强的将 HTML 转换为纯文本的能力。\n\n\
  \n\n#### 提示用户\n\nDrush 还提供了一些辅助函数，用于以不同方式处理用户输入。尽可能使用提供的封装器，有助于保持脚本行为的一致性。可用的三个函数如下：\n\
  \n- `drush_confirm` 会提示用户进行是/否回答。\n- `drush_prompt` 会提示用户输入一个字符串。调用者也可以提供一个默认值，用户在不输入任何内容的情况下，只需按回车键即可选择该默认值。\n\
  - `drush_choice` 会向用户展示多个选项，这些选项可以通过数字标签来选择。可用的选择项通过一个关联数组传递给 `drush_choice`，数组的键是用户选择该项时返回的标识符，而值则是显示给用户的可读字符串。`drush_choice`\
  \ 的显示格式通过 `drush_print_table` 来格式化；如果调用者提供一个数据表，其值为字符串数组，那么这些数组将包含在每一行数组中，因此数组的值会被格式化到对齐的列中。Drush\
  \ 内部在 `pm-download` 命令中使用 `--select` 选项时，就利用了这种机制，因此可用版本的版本号和发布日期是对齐的。\n\n以下是来自\
  \ Drush `pm-download` 命令中 `drush_choice` 的使用示例。关联数组 `$releases` 预先填充了以版本号为键的项目；每个版本项包含一个日期字符串和一个\
  \ `release_status` 数组。Drush 遍历这个结构，构建一个选项的关联数组，并将其传递给 `drush_choice`。\n\n```\nforeach($releases\
  \ as $version => $release) {\n  $options[$version] = array($version, '-', gmdate('Y-M-d',\
  \ $release['date']), '-', implode(', ', $release['release_status']));\n}\n$choice\
  \ = drush_choice($options, dt('请选择其中一个可用版本：'));\n```\n\n这将把 `drush_choice` 中的每一行显示为多列，第一列为版本号，第二列为发布日期，最后一列为发布状态值（包含诸如“已支持”和“推荐”等术语）。你还会注意到其中包含两个仅包含“-”字符的额外列，用于在各列之间提供一些分隔。你已经看到了这个函数输出的样子；它在\
  \ 清单 26–5 的“使用 Drush 应用代码更新”一节中展示过。\n\n用户可以通过分别使用 `--yes` 和 `--no` 选项，指示 Drush 以肯定或否定的方式自动确认所有提示。当\
  \ Drush 在本地机器或远程机器上运行另一个链式命令时，它会自动设置 `--yes` 选项，以防止在后台运行的命令因等待用户输入而挂起。在自动确认模式下，`drush_prompt`\
  \ 也始终会返回默认值，而无需等待用户。\n\n如果用户取消了一个命令，无论是通过对 `drush_confirm` 回答“否”，还是选择 `drush_choice`\
  \ 中的第一个选项（通常是“取消”），最好的做法是通过 `return drush_user_abort();` 退出当前函数。这将确保 Drush 能够干净地从该函数退出。更多信息请参见\
  \ Drush 命令钩子章节。\n\n#### 日志记录与错误报告\n\nDrush 对如何报告错误以及如何使用日志函数有特定规则。理解何时使用 `drush_print`，何时使用\
  \ `drush_log` 或 `drush_set_error`，是编写在不同上下文中既方便又行为得体的脚本的关键。本节将描述你需要如何正确做到这一点。\n\n\
  ##### 使用 `drush_log` 显示重要事件\n\n当消息表明执行过程中发生了值得注意的事件，或者提供了辅助信息时，最好使用 `drush_log`\
  \ 而不是 `drush_print`。Drush 提供了另外两个输出控制级别：`--verbose` 和 `--debug`。某些日志消息仅在这些模式下显示，而其他日志消息默认始终显示。然而，Drush\
  \ 还提供了供其他脚本调用 Drush 命令并检索结果的功能，在这些上下文中，`drush_log` 非常有用，因为它不仅提供了消息文本，还提供了消息类型给调用者，这有助于调用者决定如何格式化和显示结果。默认的\
  \ `drush_log` 输出也会格式化结果，将消息类型描述放在消息第一行的右侧，并根据消息的状态级别使用相应的颜色。这使得很容易注意到可能混入命令输出中的错误，因为它们会以红色文本显示，从而与其他显示的信息区分开来。最后，Drush\
  \ 还会将所有日志消息的输出发送到标准错误流，而不是标准输出，这有助于调用者控制日志和普通输出的分离。如你所见，Drush 的日志函数增加了用户对输出消息的控制和理解能力，原因有很多。此外，调用\
  \ `drush_log` 与调用 `drush_print` 非常相似：\n\n```\ndrush_log(dt('!extension 已成功启用。',\
  \ array('!extension' => $extension->name)), 'ok');\n```\n\n支持的日志级别如下：\n\n- **‘ok’**\
  \ 或 **‘success’**：这些日志级别表示某个操作已成功完成。Drush 在使用‘ok’和‘success’方面略有出入，但一个良好的指导原则是：当子操作成功且执行正在（或可能）继续时，使用‘ok’；当命令或脚本顺利执行完毕时，使用‘success’作为最终消息。‘ok’日志消息的一个示例是在前面展示的\
  \ `pm-enable` 函数中，其中 `drush_log` ‘ok’用于告知用户指定的模块之一已经启用。\n- **‘warning’**：此日志级别表示出现了用户必须注意的情况，但当前脚本或命令的执行仍可继续。例如，命令\
  \ `pm-updatecode` 会使用 `drush_log` ‘warning’通知用户，其中一个已更新的模块需要数据库更新，并且必须在某个时刻运行 `updatedb`。\n\
  - **‘notice’**：通知日志级别用于告知用户进度或可能有趣的情况，但这些情况不需要任何特定的操作或响应。除非指定了 `--verbose` 标志，否则通知不会显示。使用通知的\
  \ Drush 命令的一个示例是 `pm-releasenotes`，它在获取发布说明文本的 HTTP 请求完成后通知用户。\n- **‘debug’**：此调试日志级别包含用户在调查某些故障的根本原因时可能需要的附加信息。除非指定了\
  \ `--debug` 选项，否则这些消息不会显示。调试日志消息的一个示例可以在 `php-script` 命令中找到，该命令在搜索要运行的脚本时显示所使用的文件系统路径列表。\n\
  - **‘error’**：错误日志用于指示某些条件阻止了命令执行其预期操作。通常，不应使用此日志级别，因为更好的做法是调用 `drush_set_error`\
  \ 函数，该函数将在下文描述。Drush 内部使用 `drush_log` ‘error’来报告 Drush 命令或脚本返回了错误条件且无法继续运行。\n\n\n\
  \n##### 使用 Drush 日志和错误处理\n\n使用`drush_log`函数可以让脚本对用户更透明、更友好，但要注意不要过度记录日志。如果任何类型的日志消息不能为用户提供额外信息，就应省略。有时，日志消息提供的进度信息本身就足以使其有用；这通常需要根据具体情况判断，因为并非总有一个适合所有情况的正确答案。优化日志记录的最佳方法是分析脚本在不同日志级别和不同条件（例如成功和失败）下的输出，并调整日志消息以优化显示的有用信息量，使用户能够确定发生了什么以及还需要做什么，而无需翻阅大量与当前情况无关的文本。\n\
  \n##### 当发生不可恢复错误时使用 `drush_set_error`\n\n每当发生完全不可恢复的情况时，应调用`drush_set_error`函数。按照惯例，每当\
  \ Drush 命令调用`drush_set_error`时，它还应将`FALSE`作为函数结果返回。为简化此操作，Drush 还建立了约定：`drush_set_error`的返回值始终为`FALSE`，因此可以简洁地中止函数，如下所示：\n\
  \n```php\nreturn drush_set_error('DRUSH_CRON_FAILED', dt('Cron run failed.'));\n\
  ```\n\n`drush_set_error`的第一个参数是一个字符串常量，其他脚本可以在检查特定失败条件的原因时对其进行测试。要查看所有已定义的 Drush\
  \ 错误代码列表，请运行命令`drush topic docs-errorcodes`。这将显示错误代码列表及其对应的错误消息；列表按错误代码排序。第二个参数（错误消息）是可选的。如果缺失，Drush\
  \ 将尝试通过将\"error:\"与 Drush 错误代码拼接（例如\"error:DRUSH_CRON_FAILED\"）来查找错误消息。Drush 的`help`钩子用于执行查找；此钩子将在后面描述。\n\
  \n### 编写 Drush 扩展\n\nDrush Shell 脚本是入门的好方法，它们特别适合构建专门用于特定 Drupal 站点的工具。如果您想编写一个旨在任何\
  \ Drupal 站点上运行的通用工具，最好编写一个 Drush 命令。好消息是，上一节中描述的所有技术也适用于 Drush 命令，因此，如果您开发了一个有用的\
  \ Drush 脚本并希望使其更通用并转换为 Drush 命令，只需适当地命名文件并实现所需的 Drush 命令钩子文件即可。本节将解释如何做到这一点。\n\n\
  Drush 包含一个示例命令文件`drush/examples/sandwich.drush.inc`，展示了如何定义命令。Drush 命令与 Drush 脚本之间的关键区别在于，Drush\
  \ 命令包含一个命令钩子，该钩子返回一个描述命令的数组，包括其参数、选项和帮助文本。此外，Drush 命令由 Drush 管理；它们存储在一个称为 Drush\
  \ 命令文件的 PHP 文件中，并且必须出现在 Drush 将搜索它们的位置。\n\nDrush 命令文件必须遵循特定的命名模式。文件名以命令文件的名称开头，以`.drush.inc`结尾。命令文件的名称极其重要，因为它用于组成\
  \ Drush 将在各个点调用的函数名称，以便给命令文件定义命令和其他 Drush 钩子的机会。在这方面，Drush 与 Drupal 非常相似。本节将描述创建自己的\
  \ Drush 命令所需的 Drush 命令文件的不同职责。\n\n#### Drush 命令钩子\n\nDrush 命令文件的主要入口点是`hook_drush_command`。因此，如果命令文件的名称为`sandwich`，则它必须有一个名为`sandwich_drush_command`的函数，该函数声明它提供的所有命令。`drush_command`钩子与\
  \ Drupal 中的菜单钩子非常相似；它应返回一个描述其命令的关联数组。示例 sandwich 命令文件的`drush_command`钩子在 [清单 26-26]\
  \ 中给出；它定义了一个名为\"make-me-a-sandwich\"的命令。\n\n***清单 26-26.** Sandwich 命令文件的 hook_drush_command\
  \ 实现*\n\n```php\n/**\n * Implementation of hook_drush_command().\n *\n * In this\
  \ hook, you specify which commands your\n * drush module makes available, what it\
  \ does, and\n * description.\n *\n * Notice how this structure closely resembles\
  \ how\n * you define menu hooks.\n *\n * @See drush_parse_command() for a list of\
  \ recognized keys.\n *\n * @return\n *   An associative array describing your command(s).\n\
  \ */\nfunction sandwich_drush_command() {\n  $items = array();\n\n  $items['make-me-a-sandwich']\
  \ = array(\n    'description' => \"Makes a delicious sandwich.\",\n    'arguments'\
  \ => array(\n      'filling' => 'The type of the sandwich (turkey, cheese, etc.)',\n\
  \    ),\n    'options' => array(\n      '--spreads' => 'Comma delimited list of\
  \ spreads (e.g. mayonnaise, mustard)',\n    ),\n    'examples' => array(\n     \
  \ 'drush mmas turkey --spreads=ketchup,mustard' => 'Make a terrible-tasting sandwich\
  \ that is lacking in pickles.',\n    ),\n    'aliases' => array('mmas'),\n    'bootstrap'\
  \ => DRUSH_BOOTSTRAP_DRUSH, // No bootstrap at all.\n  );\n  return $items;\n}\n\
  ```\n\n`description`、`arguments`、`options`和`examples`项仅用于显示命令的帮助文本，对实际操作没有影响。但是，始终包含这些项非常重要，以便新用户可以了解如何使用您的命令。此外，未来版本的\
  \ Drush 可能会解析`options`项，并拒绝未在命令或全局选项列表中定义的命令行选项，因此请确保在命令定义中保持完整性。不过，不带参数或选项的命令可以从定义中省略这些项。\n\
  \n`aliases`项为命令名称提供了替代的较短形式。[清单 26-26] 中的示例命令可以通过`drush make-me-a-sandwich`或`drush\
  \ mmas`执行。通过在数组中放置多个项，可以包含多个别名。\n\n\n\n#### Drush 命令开发指南\n\n##### 引导级别（Bootstrap\
  \ Levels）\n\n`bootstrap` 项规定了 Drush 命令如何与指定的 Drupal 站点交互（如果存在可用站点）。`DRUSH_BOOTSTRAP_DRUSH`\
  \ 意味着 Drush 应初始化自身并停止进一步操作。在此模式下，Drush 命令无法调用任何 Drupal 代码，因为 Drupal 站点不会被引导，也不会加载任何\
  \ Drupal 代码。相反，`DRUSH_BOOTSTRAP_DRUPAL_LOGIN` 意味着 Drush 应完全引导所选 Drupal 站点并登录默认用户。`DRUSH_BOOTSTRAP_DRUPAL_LOGIN`\
  \ 是未明确指定所需引导级别的命令的默认引导级别。还有其他引导选项；例如，可以引导到 Drupal 根目录但不选择任何特定站点。任何尝试初始化 Drupal 的引导级别在初始化失败时都会中止并报错。特殊的例外是\
  \ `DRUSH_BOOTSTRAP_MAX`，它将尝试将当前站点引导到尽可能远的级别，但如果遇到任何问题，将停止引导并继续执行 Drush 命令。这使得 Drush\
  \ 命令可以在没有 Drupal 站点的情况下快速运行，或者在存在 Drupal 站点时提供额外的信息或功能。例如，`pm-releases` 命令会在选择了\
  \ Drupal 站点时告诉你安装的模块版本，否则将显示可用的版本而不包含此信息。\n\n命令记录中还有其他项，此处未全部展示；它们将在后续部分中解释。另外，命令\
  \ `drush docs-commands` 包含一个表格，列出了所有可用项及其功能摘要。\n\n##### 提供命令实现函数\n\n默认情况下，Drush\
  \ 会根据命令名称和命令文件名组合出要调用的函数名。默认的命令实现由连接 `drush`、命令文件名和命令完整名称组成。每项之间用下划线（`_`）分隔；命令名称中的任何短划线也会被替换为下划线。由于\
  \ Drush 命令通常以它们所在的命令文件名为前缀，因此默认实现名称会通过将相邻的命令文件名实例替换为单个实例来简化。例如，命令 `sql-sync` 的 Drush\
  \ 命令记录定义在名为 `sql` 的命令文件中（完整文件名为 `sql.drush.inc`）。默认的实现函数名由连接“drush”、“sql”和“sql-sync”组成\
  \ `drush_sql_sql_sync`，然后简化为 `drush_sql_sync`。Drush 将调用指定的函数，将所有的命令行参数转换为函数参数。因此，实现\
  \ `sql-sync` 的函数看起来像这样：\n\n```\nfunction drush_sql_sync($source = NULL, $destination\
  \ = NULL) {\n  $source_settings = drush_sitealias_get_record($source);\n  $destination_settings\
  \ = drush_sitealias_get_record($destination);\n  // Implementation of sql-sync continues…\n\
  }\n```\n\n如你所见，本质上 Drush 命令就是普通的 PHP 函数。这使得将 Drush 脚本转换为 Drush 命令非常容易：只需在代码周围包裹一个函数定义并定义\
  \ Drush 命令钩子即可。Drush 提供了比这更多的控制能力，但这是基础知识。在接下来的部分中，我将继续探索 Drush 命令的更多功能。\n\n#####\
  \ 返回数组以向其他 Drush 脚本传递结构化数据\n\n在某些情况下，Drush 命令或脚本可能使用复杂的数据结构（如关联数组）来渲染输出。这些数据结构并不总是容易以适合\
  \ `drush_print_pipe` 输出的形式表示；即使可以，调用 Drush 命令的 PHP 脚本也需要花费大量精力来解析文本输出并重建原始数据结构。Drush\
  \ 使得将这些结构原封不动地传递给调用者变得容易。如果命令的主要钩子函数返回一个结果，那么返回的对象将被放置在 `drush_backend_invoke` 返回的结果结构的“object”项中。Drush\
  \ 在内部几处使用了这一机制；例如，Drush 函数 `sql-conf` 返回包含数据库连接信息的关联数组；如前所述，`sql-sync` 命令使用此机制来获取远程\
  \ Drupal 站点的数据库信息。\n\n##### 使用回调项手动指定命令函数\n\n也可以在命令结构中提供 `callback` 项；如果存在，回调将取代默认实现。建议尽可能使用默认实现函数名，并且仅在命令可以由现有函数实现时才提供自己的回调函数名。例如，大多数\
  \ Drush 主题函数都是通过使用 `drush_print_file` 向用户显示现有文件来实现的。主题命令 `docs-readme` 的命令记录可以在列表\
  \ 26–27 中找到。\n\n***列表 26–27.** 使用回调项通过现有函数实现 Drush 命令*\n\n```\n$items['docs-readme']\
  \ = array(\n  'description' => dt('README.txt'),\n  'hidden' => TRUE,\n  'topic'\
  \ => TRUE,\n  'bootstrap' => DRUSH_BOOTSTRAP_DRUSH,\n  'callback' => 'drush_print_file',\n\
  \  'callback arguments' => array(DRUSH_BASE_PATH . '/README.txt'),\n);\n```\n\n\
  项 `hidden` 和 `topic` 是 Drush 主题命令特有的。`hidden` 意味着该命令不会出现在 Drush 帮助列表中，尽管它可以通过命令行或通过\
  \ `drush_dispatch` 编程方式执行。`topic` 项将导致该命令在用户运行 `drush topic` 命令时出现在主题列表中。\n\n之前提到过\
  \ `callback` 项；它指示 Drush 调用函数 `drush_print_file`，而不是通常使用的函数名，即 `drush_docs_readme`。`callback\
  \ arguments` 项将被附加到用户在命令行指定的参数前面。由于函数 `drush_print_file` 只接受一个参数，这意味着命令 `docs-readme`\
  \ 将始终导致调用 `drush_print_file(DRUSH_BASE_PATH . '/README.txt')`，从而显示 `README.txt`\
  \ 文件。\n\n##### 将命令实现放在单独的文件中\n\n如果 Drush 命令的实现特别庞大，可以将其放在单独的文件中。在 `drush_invoke`\
  \ 调用命令钩子之前，它首先会检查该命令是否存在单独的 `.inc` 文件。文件名通过将命令名称按短划线拆分、反转顺序、并在末尾添加“.inc”来组成。例如，命令\
  \ `sql-sync` 实现在名为 `sync.sql.inc` 的文件中。\n\n\n\n#### Drush 帮助钩子\n\nDrush 帮助钩子是可选的，无需强制实现。如果需要，可以在此处放置较长的命令描述。不过，如果命令记录中\
  \ description 项的简短描述已经足够，则无需提供更长的形式。当实现该钩子时，Drush 帮助钩子的代码如清单 26-28 所示。\n\n***清单\
  \ 26-28.** Drush 帮助钩子*\n\n```\nfunction sandwich_drush_help($section) {\n  switch\
  \ ($section) {\n    case 'drush:make-me-a-sandwich':\n      return dt(\"该命令将按照您喜欢的口味制作一份美味的三明治。\"\
  );\n    case 'meta:sandwich:title':\n      return dt(\"三明治命令\");\n    case 'meta:sandwich:summary':\n\
  \      return dt(\"自动化您的三明治制作工作流程。\");\n  }\n}\n```\n\n除了提供更长的命令描述外，帮助钩子还可以指定用于格式化\
  \ Drush 帮助输出的元数据值。可用的元数据项是 `meta:COMMANDFILE:title` 和 `meta:COMMANDFILE:summary`。这些项用于将命令文件中定义的所有命令作为一个组进行描述。您会在运行\
  \ `drush help --filter` 时看到它们，该命令允许用户只显示某个命令分组的帮助信息（见清单 26-29）。\n\n***清单 26-29**.\
  \ 仅显示三明治命令文件的帮助信息*\n\n```\n$ drush help --filter --include=examples\n选择帮助类别：\n [0]\
  \  :  取消\n [1]  :  核心 Drush 命令\n [2]  :  字段命令：操作 Drupal 7+ 字段。\n [3]  :  项目管理器命令：下载、启用、检查并更新您的模块和主题。\n\
  \ [4]  :  SQL 命令：检查并修改您的 Drupal 数据库。\n [5]  :  三明治命令：自动化您的三明治制作工作流程。\n [6]  :  用户命令：添加、修改和删除用户。\n\
  5\n三明治命令: (sandwich)\n  make-me-a-sandwich  制作一份美味的三明治。\n  (mmas)\n$ drush help\
  \ make-me-a-sandwich --include=examples\n该命令将按照您喜欢的口味制作一份美味的三明治。\n\n示例：\n  drush\
  \ mmas turkey              制作一份缺少泡菜的难吃三明治。\n  --spreads=ketchup,mustard\n\n参数：\n\
  \  filling                        三明治类型（火鸡、奶酪等）\n\n选项：\n  --spreads            \
  \          逗号分隔的涂抹酱列表（例如 mayonnaise, mustard）\n\n别名：mmas\n```\n\nDrush 帮助钩子还有之前提到的次要用途。如果在调用\
  \ `drush_set_error` 时未提供第二个参数（消息字符串），该函数将使用 Drush 帮助钩子来查找错误消息。这些帮助消息以 `\"error:\"\
  ` 开头，而非 `\"drush:\"`，但除此之外，其工作机制相同。\n\n#### 修改 Drush 命令行为\n\n当 Drush 执行命令时，在其主实现函数执行之前，它实际上会经历一系列阶段，并且在命令完成后还会继续进行一个阶段。如果在此过程中任何地方出现错误，Drush\
  \ 还提供了一个回滚钩子，某些命令会使用它来在出现问题时将状态恢复原状。表 26-2 总结了这些钩子的工作方式。\n\n***表 26-2**. 回滚钩子描述*\n\
  \n| **钩子名称** | **函数名称** | **描述** |\n| --- | --- | --- |\n| 初始化 (Init) | `drush_HOOK_init`\
  \ | init 函数在任何其他阶段开始之前被调用。如果需要，init 阶段允许加载额外的命令文件，通常通过调用 `drush_bootstrap_max` 实现。关于此用法的实用内容在“修改其他命令”部分讨论。\
  \ |\n| 验证 (Validate) | `drush_COMMANDFILE_HOOK_validate` | validate 函数被调用来确认命令是否可以运行。它可能执行初始化，但不应该改变任何持久化对象的状态。\
  \ |\n| 命令前 (Pre-command) | `drush_COMMANDFILE_pre_HOOK` | 在主命令钩子之前调用。 |\n| 命令 (Command)\
  \ | `drush_COMMANDFILE_HOOK` | 主命令钩子，应为命令提供主要实现。 |\n| 命令后 (Post-command) | `drush_COMMANDFILE_post_HOOK`\
  \ | 在主命令钩子之后调用。 |\n| 回滚 (Rollback) | `[*]_` 回滚 | 如果 Drush 命令分发序列中的任何函数调用了 `drush_set_error`，那么任何先前已成功完成且未引发错误的命令都可以参与回滚阶段。回滚函数的创建方式是在其要恢复的函数的末尾添加\
  \ `_rollback`。例如，如果函数 `drush_pm_updatecode` 失败，则将调用函数 `drush_pm_updatecode_rollback`。\
  \ |\n\n在所有情况下，函数名称中的字符串 `HOOK` 都会被替换为正在执行的命令的名称，而 `COMMANDFILE` 则会被替换为定义该命令钩子的命令文件的名称；这与之前解释的完全相同。但请注意，不仅仅是定义命令的命令文件参与命令分发过程；*每个*命令文件都有机会钩入用户运行的任何命令。例如，devel\
  \ 模块有一个名为 `devel.drush.inc` 的 Drush 命令文件。devel 命令文件通过以下钩子接入 Drush 的 `pm-enable`\
  \ 命令：\n\n```\nfunction drush_devel_post_pm_enable() {\n  $modules = func_get_args();\n\
  \  if (in_array('devel', $modules)) {\n    drush_devel_download();\n  }\n}\n```\n\
  \n每次 Drush 的 `pm-enable` 命令完成执行且未调用 `drush_set_error` 时，都会调用此代码。然后，devel 模块会检查自身是否是被启用模块之一；如果是，则调用\
  \ `drush_devel_download`，该函数会下载 devel 模块运行所需的外部库。这对于具有外部依赖关系的其他模块来说是一个有用的模式。如果成功启用模块需要用到外部代码，那么您可以尝试接入\
  \ `pre_pm_enable` 钩子。\n\n如您所见，Drush 命令很容易被接入，并且有许多情况下这样做很有用。不过，钩子函数名称的构造算法有时可能显得有些神秘。要查看所有钩子函数名称的完整列表，请使用\
  \ `--debug --show-invoke` 选项运行您想要接入的命令。这将导致 Drush 打印出所有可能参与命令分发过程的函数名称列表。已经定义的函数会用\
  \ `\"[*]\"` 标记。这种机制是快速获取可用于您命令文件的函数名称列表的好方法；只需将其与 `grep` 结合使用即可。例如，如果您想创建一个名为 `mycommand`\
  \ 的命令文件，并希望接入 Drush 的 status 命令，请执行以下操作：\n\n\n\n`$ touch $HOME/.drush/mycommand.drush.inc`\n\
  `$ drush status --debug --show-invoke 2>&1 | grep --color=auto mycommand`\n`drush_mycommand_core_status_validate`\n\
  `drush_mycommand_pre_core_status`\n`drush_mycommand_core_status`\n`drush_mycommand_post_core_status`\n\
  \n修饰符`2>&1`可能对你来说不太熟悉。`2>`告诉 shell 重定向命令的标准错误输出，而`&1`表示应将其重定向到标准输出。默认情况下，Drush 会将所有通知（包括`--show-invoke`输出）发送到标准错误；你需要将其重定向到标准输出，以便用`grep`进行过滤。`--color=auto`告诉`grep`以红色高亮显示匹配项，使其突出；这是许多\
  \ Linux 发行版上的默认设置。从该输出中，你可以看到需要实现的函数名称，以便挂接到`status`命令的验证、前置、后置或主钩子。\n\n除了前面描述的命令钩子之外，Drush\
  \ 还定义了其他钩子，任何 Drush 命令文件都可以挂接到这些钩子。Drush 使用`drush_command_invoke_all`和`drush_command_invoke_all_ref`函数来实现此功能；这两个函数的行为方式相同，区别在于后者通过引用传递其第一个参数，允许钩子函数根据需要修改它。正如你所想象的，后者更有用，并且更常用于定义钩子。例如，Drush\
  \ 函数`drush_print_help`（用于显示单个 Drush 命令的帮助文本）通过如下方式调用`drush_help_alter`钩子：\n\n`drush_command_invoke_all_ref('drush_help_alter',\
  \ $command);`\n\n这使所有 Drush 命令文件都有机会更改`$command`记录，以添加额外的文本、选项或示例。通过这种方式，使用前置或后置钩子更改\
  \ Drush 命令行为的命令文件，也可以更改该命令的帮助文本以记录调整。Drush 也出于自身目的使用帮助更改钩子；`topic_drush_help_alter`会修改那些声明包含主题的命令，并将主题描述复制到命令帮助中，这样信息就不必在每一个引用到一个或多个主题的命令中重复了。`topic_drush_help_alter`的实现如清单\
  \ 26–30 所示。\n\n***清单 26–30.** `topic_drush_help_alter`\n\n```\nfunction topic_drush_help_alter($command)\
  \ {\n  $implemented = drush_get_commands();\n  foreach ($command['topics'] as $topic_name)\
  \ {\n    // We have a related topic. Inject into the $command so the topic displays.\n\
  \    $command['sections']['topic_section'] = dt('Topics');\n    $command['topic_section'][$topic_name]\
  \ = dt($implemented[$topic_name]['description']);\n  }\n}\n```\n\n你的 Drush 命令文件可以使用类似技术来挂接到此钩子和其他\
  \ Drush API。要查看可用钩子的完整列表，请使用命令`drush topic docs-api`查看 Drush API 文档。\n\n### 总结\n\
  \n在本章中，你使用 Drush 简化和自动化了许多常见的 Drupal 站点维护任务，包括下载和启用模块、应用代码更新、在远程系统之间复制站点、检查站点状态以及清除\
  \ Drupal 缓存。你还快速了解了 Drush 脚本编写和 Drush 命令创建，并研究了一些更有用的 Drush API 和实用函数，以帮助你快速开始编写专门针对站点需求的代码。\n\
  \nDrush 还有更多的命令和选项，超出此处介绍的范畴；幸运的是，有大量关于 Drush 的优秀文档，并且 Drush 的大多数功能都非常易于使用。以下信息来源是了解\
  \ Drush 更多信息的非常有用的途径：\n\n- Drush 文件夹中的`README.txt`文件涵盖了基本安装和配置。\n- `drush help`命令将列出所有可用的\
  \ Drush 命令。\n- `drush topic`命令将显示关于不同 Drush 相关主题的文档。\n- Drush 主页[`http://drush.ws`](http://drush.ws)包含所有与\
  \ Drush 相关的主题信息，以及 Drush 常见问题解答、API 参考和重要 Drush 资源列表。\n- Drush 问题队列[`http://drupal.org/project/issues/drush`](http://drupal.org/project/issues/drush)包含当前\
  \ Drush 版本开发过程中最新的信息。\n\n有了这些知识，你会发现花费在 GUI 管理页面上的时间更少，而有更多的时间用来完成实际工作。一旦你开始定期使用\
  \ Drush，你会好奇没有它的日子是怎么过的。Drush 的力量掌握在你的手中；去吧，去编写脚本。\n\n## 第 27 章\n\n![images](img/squ.jpg)\n\
  \n## 扩展 Drupal\n\n**作者：Károly Négyesi**\n\n要定义扩展，让我们看看一个小咖啡馆。刚开业时，因为咖啡馆很小，店主什么都做：她接单、准备饮品、收款并交换咖啡。过了一段时间，咖啡馆红火起来，于是店主雇了一名咖啡师和一名服务员。现在，服务员负责接单和收款。咖啡师拿到订单，准备饮品，然后将其交给顾客。你在这里应该注意到的是，当一个人做所有事情时，钱和饮品的交换是同时发生的。但现在，顾客先交钱，然后只**最终**得到饮品。先交钱后喝咖啡是否存在风险？如果突然发生火灾，顾客会付了钱却什么也没得到。然而，实际上没有人真的在意这种可能性；他们宁愿承担这一极小风险，以便更快地喝到咖啡。通过分离“收款”和“提供咖啡”这两个动作，咖啡馆可以更快地服务更多顾客。它可以雇用任意数量的咖啡师和任意数量的收银员，以更好地适应客流。这就是扩展：以适应客流的方式，使得更多顾客不会减缓流程。\n\
  \n但请注意，增加咖啡师并不会缩短付款和收到饮品之间的时间。店主确保总有一个空闲的咖啡师，但你仍然需要等他准备你的饮品。然而，如果咖啡馆雇佣了能更快制作咖啡的熟练红色机器人，这将有助于缩短等待时间。这就是性能：Web\
  \ 应用程序从接收请求到完成服务所花费的时间。\n\n性能很重要，因为人们倾向于放弃速度慢的网站；扩展使网站在流量大时能够正常运转，但扩展本身不会让网站变快。是性能让它变快。然而，如果你有足够多的访客，即使最快的网站最终也不得不使一些访客在开始处理其请求之前等待。\n\
  \n既然我已经定义了扩展和性能，接下来我将花本章的剩余部分告诉你为什么应该关心它们。然后，我将讨论 Drupal 7 可用的一些扩展选项。讨论将主要集中在数据库上，因为数据库对于扩展\
  \ Drupal 至关重要。Drupal 并不总是像人们希望的那样具有可扩展性，但我将讨论的更改可以使 Drupal 的扩展效果大大提升。\n\n\n\n###\
  \ 你需要关注扩展性吗？\n\n在刚开始构建网站时，处理更多流量通常并非你的核心关注点。能否获得任何流量，才是大多数人更关心的事。毕竟，只有拥有大规模成功网站的人，才需要为流量操心。没有一个网站是从数百万用户起步的。然而，随着时间的推移，你或许真的能达到甚至超越这个数字。如果你正在积极推广你的网站，那就更有理由为增长做规划了。即便你只获取了互联网总流量的一个固定比例，也可能迎来惊喜；新设备，甚至新*类型*的设备，让越来越多的人花越来越多的时间上网浏览。当成功来临时，你打算怎么办？你的网站能适应吗？\n\
  \n如果你的网站无法适应访客数量的增长，那就准备好迎接诸多麻烦：本应意味着成功的局面，反而变成了令用户沮丧的体验——无论是新访客还是老粉丝，都在等待页面加载，甚至可能根本收不到网站的任何响应。更糟糕的是，网站代码的编写方式往往导致增加额外硬件也于事无补；在这种情况下，网站通常需要从头开始重建。这当然不可能一蹴而就，而且它通常发生在企业忙于其他事务——也就是增长——的时候。简单来说，更多流量很可能意味着更多潜在业务，因此，在公司试图通过必要的扩张来应对新需求的同时，却突然需要处理网站的重大重构。在此期间，网站可能每天都会崩溃。公司和组织实际上是在艰难维持运转，而不是去实现那看似近在咫尺的成功。这是一个需要避免的情景。\n\
  \n但还有另一个陷阱：在网站生命周期的初始阶段就过度痴迷于扩展性，以至于占用了开发功能所需的宝贵资源。Drupal 的模块化特性一直为这些问题提供了解决方案，而\
  \ Drupal 7 在这方面达到了新的高度。\n\n### 缓存\n\n缓存是指临时存储一些已处理的数据。它可以是结构化数据，也可以是 HTML 格式的文本字符串。虽然提供缓存数据比从多个数据库表中检索和处理数据更快，但缓存数据实际上是不可编辑的，因此无法将其处理为其他格式。正因如此，原始数据需要保留在数据库中。所以，你现在有了不止一份数据副本，原始数据和缓存就可能变得不同步。在这种情况下，缓存数据就是“过时”的。有时候这并无大碍；如果你每天只发布几篇文章，那么原创内容发布后几分钟内匿名用户看不到新内容可能也没什么关系。这是关于扩展性的另一个重要教训：实践胜于理论。扩展性总是涉及权衡取舍；问题仅仅在于，对于一个给定的网站，哪些权衡是可以接受的。\n\
  \n![images](img/square.jpg) **提示** 请仔细注意“对于一个给定的网站”这个说法。扩展性没有万能药，没有单一的解决方案能应对所有扩展挑战。扩展性总是因网站而异，尽管某些实践方法适用于许多类似的网站。\n\
  \nDrupal 可以利用缓存来存储匿名访客的整个页面，即纯粹的 HTML。在 `admin/config/development/performance` 处启用此功能非常简单，即使是最简单的共享主机也能工作。请注意，它只对匿名用户生效，但通常很大一部分流量正是来自匿名用户。默认情况下，提交新内容会清除此缓存，但可以设置一个最小生存期。如前所述，这完全取决于具体网站。\n\
  \n![images](img/square.jpg) **提示** 另一个适用于共享主机且比内置页面缓存更快的选项是 Boost 模块（`drupal.org/project/boost`）。此模块可以为匿名访客提供页面服务，完全绕过\
  \ PHP。\n\n让我们看看开发者如何利用缓存来存储慢速查询的结果。假设你有一个非常慢的函数叫 `very_slow_find()`。以下是使用缓存的方法：\n\
  \n```\n$cache = cache_get('very_slow');\nif ($cache) {\n  $very_slow_result = $cache->data;\n\
  }\nelse {\n  // 执行这个非常慢的查询。\n  $very_slow_result = very_slow_find();\n  cache_set('very_slow',\
  \ $very_slow_result);\n}\n```\n\n首先尝试检索缓存。如果命中，则使用存储的数据；如果缓存未命中，则执行查询并存储其结果。这样，这个非常慢的查询就很少需要执行了，但请注意之前关于过时缓存的警告。在这个例子中，`very_slow`\
  \ 是缓存 ID (cid) 或缓存键，而 `$very_slow_result` 是你存储的数据。\n\n缓存在 Drupal 中被广泛应用，并存储在不同的缓存箱（bin）中。虽然将所有内容都存放在一个大堆里是可行的，但将它们分离成\
  \ Drupal 所称的缓存箱有两个优势：必要时可以单独清空某个缓存箱的内容以避免数据过时，并且可以为每个缓存箱设置不同的存储机制来存储数据。（我将在本章稍后部分介绍一些可用存储机制的示例）。在使用\
  \ `cache_get`、`cache_set` 以及 Drupal 缓存 API 提供的其他函数时，你无需担心底层使用的是哪种存储机制。这就是可插拔子系统如此有用的原因：你可以选择不同的存储机制，而无需修改任何代码。\n\
  \n默认情况下，Drupal 使用数据库来存储缓存数据——并非因为这是最佳方式，而是因为 Drupal 知道数据库是现成的。幸运的是，还有其他选择。首先，你将看到一个与辅助开发关系更密切的示例，并展示如何配置可插拔子系统；然后，你将看到一些性能和扩展性解决方案。\n\
  \n\n\n#### 在开发期间禁用缓存\n\n出于开发目的，我推荐最简单的缓存实现：不使用缓存。有一种缓存实现相当于一个黑洞：缓存写入和清除不执行任何操作，读取始终失败。Drupal\
  \ 在安装期间会使用这种伪缓存，因为此时尚无可用信息表明数据可以存储在哪里。这种伪缓存在开发过程中也非常有用。但有一个注意事项：多步骤（以及由此产生的 AJAX）表单需要一个可用的缓存，因此当所有缓存都以这种方式被黑洞化时，它们将无法工作。要使用\
  \ Drupal 自身的伪缓存来绕过其缓存机制，请将以下三行代码添加到 `settings.php` 文件中，该文件位于您站点的 `/sites` 文件夹内；通常它位于（相对于\
  \ Drupal 安装根目录）`/sites/default/settings.php` 路径下。\n\n```\n$conf['cache_backends'][]\
  \ = 'includes/cache-install.inc';\n$conf['cache_class_cache_form'] = 'DrupalDatabaseCache';\n\
  $conf['cache_default_class'] = 'DrupalFakeCache';\n```\n\n通过这样做，像主题注册表这样的复杂数据结构将在每次页面加载时重建（添加类和菜单项仍然需要在\
  \ `admin/config/development/performance` 页面上显式清除缓存）。这会显著降低网站速度，但简化了开发者的工作，因为对代码的修改会立即反映在\
  \ Drupal 的行为中。\n\n`settings.php` 文件中的 `$conf` 数组是指定 Drupal 配置的核心位置。虽然某些配置选项有用户界面且将其状态存储在数据库中，但由于选项过多，无法为每个选项都提供用户界面，而且大多数没有用户界面的选项对于典型用户来说并非必需。使用\
  \ `$conf` 而非用户界面的另一个原因是，某些配置在数据库可用之前是必需的。缓存就是一个兼具这两种情况的例子：它既不是用户需要通过用户界面设置的内容（大多数用户永远不需要设置），也可以在数据库加载之前使用。大多数人使用默认的缓存实现就很好，但缓存也可以在数据库可用之前使用。然而，由于数据库尚不可用，缓存的设置比通常情况要复杂一些；您需要指定文件（在\
  \ `$conf['cache_backends']` 中），而不仅仅是指定要使用的类（如在 `$conf['cache_default_class']` 中）。对于其他设置，大多数情况下仅指定类就足够了，因为\
  \ Drupal 可以从数据库中读取包含该类的文件的位置。\n\n#### memcached\n\n从现在开始介绍的解决方案将无法在共享主机上运行。您需要能够控制您的环境，才能实现良好的性能和可扩展性。\n\
  \n`memcached` 是一个独立的程序，它将缓存数据存储在内存中，并允许通过网络访问这些数据。作为一个独立的程序，这并不罕见；Drupal 使用的数据库（如\
  \ MySQL）也是这样的应用程序。`memcached` 的显著特点是它仅将数据存储在内存中，这使得它非常非常快。使用这个程序代替数据库进行缓存可以极大地提升\
  \ Drupal 的性能。而且不仅仅适用于 Drupal——这个解决方案非常成熟，实际上已被用于几乎所有大型网站。\n\n请注意，`memcached` 不仅仅是一个性能解决方案，而且还是一个扩展性非常好、非常简单的解决方案：您只需在需要数量的服务器上启动相应数量的实例，并配置\
  \ Drupal 使用它们即可。`memcached` 无需进行任何设置，因为各个 `memcached` 实例不需要知道彼此的存在。与所有实例通信的是 Drupal。这与\
  \ MySQL 有很大不同，在 MySQL 中需要显式配置主从复制。\n\n`memcached` 的拼图包含三个部分：应用程序本身、一个 PHP 扩展和一个\
  \ Drupal 模块。`memcached` 可在 `memcached.org` 获取。其安装和配置在该网站上有详细说明。如前所述，您需要添加一个 PHP\
  \ 扩展以允许 PHP 与 `memcached` 通信。有两个扩展，名称容易混淆，分别是 \"memcache\" 和 \"memcached\"。即使是专家，对于哪个更好也存在不同意见。我谨慎地推荐较新的\
  \ \"memcached\" 扩展。可以通过以下命令安装 PHP 扩展：\n\n`pecl install memcached`\n\n您也可以通过特定于操作系统的方式进行安装，例如在\
  \ Debian 或 Ubuntu 上：\n\n`apt-get install php5-memcached`\n\n第三点，也是最后一点，您可以通过安装 Memcache\
  \ 模块（`drupal.org/project/memcache`）来让 Drupal 使用 `memcached`。该模块的项目页面有详尽的文档，我在此不再赘述。\n\
  \n#### Varnish\n\n可扩展性工具集中的另一个重要部分是 Varnish。Varnish 是一个用于存储和提供完整页面的外部程序。正常的页面缓存需要一个请求到达您的\
  \ Web 服务器，然后服务器引导 Drupal 启动，加载页面，之后 Drupal 发送响应。Boost 模块提供了一种更快的解决方案，因为现在请求只需到达您的\
  \ Web 服务器，而无需启动 Drupal。Varnish 则更快，因为它自己处理请求。这是一个非常、非常快速且具有大规模可扩展性的解决方案，用于提供匿名页面服务。它的座右铭是“Varnish\
  \ 让网站飞起来”，并且它确实做到了名符其实。该应用程序位于 [`www.varnish-cache.org/`](http://www.varnish-cache.org/)，Drupal\
  \ 集成模块位于 `drupal.org/project/varnish`。\n\n\n\n### 关于数据库\n\n到目前为止，你已经了解了如何配置一些可插拔子系统，并简要回顾了快速提供匿名页面服务的各种解决方案。仅通过采用目前已列出的解决方案，你就可以让网站表现良好（得益于\
  \ `memcached`），并且能够为匿名访客提供良好的扩展能力（得益于 `Varnish`）。然而，如今社交网站风靡一时，它们需要为登录用户提供服务。这就变得更具挑战性了；尽管\
  \ `memcached` 确实能提升一些性能，但仍有许多问题需要克服。你需要退一步，从整体上了解网站如何运行、存储和检索数据，以及会遇到的问题，还有那些能解决多个看似不相关问题的相对较新的解决方案。\n\
  \n从高层次来看，大多数网站都执行相同的基本操作：收集数据（用户/管理员通过浏览器中的表单输入数据，或从其他网站聚合数据），将其存储在数据库中，然后向用户展示这些数据。展示和修改数据的操作通常被称为创建、读取、更新和删除（简称\
  \ `CRUD`）。典型的网站会使用某种 SQL 数据库来执行这些操作。\n\n你很快就会看到，SQL，尤其是目前广泛使用的 SQL 实现（包括 `MySQL`/`MariaDB`/`Drizzle`、`PostgreSQL`、`Oracle`\
  \ 和微软的 `SQL Server`），并不总是最适合网站所面临的许多问题。但如果 SQL 并非最优解，为什么它还如此普及？同样，如果它如此普及且能正常工作，那么另寻他路真的明智吗？简而言之，人们一直使用这些\
  \ SQL 数据库，所以有什么好大惊小怪的呢？\n\n问得好。让我们看看这个“一直”到底有多久。目前大多数数据库的根源可追溯到七十年代末。诚然，像 `MySQL`\
  \ 或 `PostgreSQL` 这样的数据库程序，可能已经不再包含 `UNIREG`（`MySQL` 的前身）或 `Postgres`，甚至 `INGRES`（`PostgreSQL`\
  \ 的前身）的代码。这就像亚伯拉罕·林肯曾用过的斧头的传说一样：一个家族为了纪念历史而自豪地使用它，几个世纪以来，斧柄换了五次，斧头换了三次。但 SQL 数据库设计时期的心态以及由此产生的局限性，却不像代码替换那样容易消除。亚伯拉罕·林肯的斧头，终究还是一把斧头。\n\
  \n自这些数据库问世以来，CPU 速度、可用内存和可用磁盘空间都增长了一百万倍。请注意，磁盘速度并未跟上。尽管任务量也在增长，但很少有任务增长了百万倍。最后，操作系统也变得更加复杂。\n\
  \n所有这些都意味着，一些此前无法想象的新设计决策是必要的，并且现在也很有意义。由于磁盘空间充裕，而磁盘速度成为制约因素，你可以专注于让数据库变得更快，而不是更小。在廉价存储如此丰富的时代，牺牲磁盘空间来换取性能看起来是一项极好的投资。可以假设整个数据库都能装入内存；如果不能，操作系统会处理这个问题。这些设计决策影响的不仅仅是数据库：例如，`Varnish`\
  \ 就采用了这些现代编程范式，这也是它速度如此之快的原因之一。\n\n**内存的记忆**\n\n1980 年第一块个人电脑硬盘，舒加特技术 `ST-506`，容量为\
  \ 5MB，体积与今天的 DVD 驱动器相当，售价 1500 美元。因此，以 1980 年的美元计算，1GB 的成本为 30 万美元；按现在的美元换算，接近一百万美元。如今，最快的硬盘可以存储\
  \ 300GB，成本不到 300 美元（因此 1GB 的成本不到 1 美元），并且大小与典型笔记本电脑中的硬盘相当。较慢的硬盘容量可达 3000GB（3TB），目前硬盘每\
  \ GB 的最低成本约为 0.04 美分，有些 2TB 的硬盘售价仅为 80 美元。\n\n然而，并非所有方面都发生了如此巨大的变化：`ST-506` 的寻道时间为\
  \ 170 毫秒，1981 年的 `ST-412` 寻道时间为 85 毫秒，而如今普通硬盘的寻道时间为 8-10 毫秒，绝对最快的硬盘寻道时间也仅为 3 毫秒——增长还不到一百倍。（寻道时间是指驱动器定位到数据存储位置所需的时间。）定位之后，`ST-506`\
  \ 每秒大约能读取半兆字节，而如今典型硬盘每秒可能能读取略高于 100 兆字节——仅仅加快了 200 倍。\n\n闪存驱动器通过消除寻道时间并将原始读取速度提高约一倍，在一定程度上改善了这种情况。但这些新设备仍有很长的路要走：它们的可靠性尚无法与硬盘相比，而且速度仍比主存储器慢大约一百倍。\n\
  \n1980 年，个人电脑的最大内存为 64KB，成本约为 400 美元，每兆字节成本为 6200 美元（按 1980 年美元计算）。如今，64GB（容量是当时的百万倍）的服务器内存成本不到\
  \ 2000 美元，每兆字节成本约为 3 美分。价格大约是当时的五十万分之一。\n\n1980 年最快的微处理器每秒可执行 1-2 百万条指令（Intel `iAPX\
  \ 432`、Motorola `68000`）。如今，速度记录已超过万亿次浮点运算（IBM `POWER7`）——是当时的百万倍。当时普及型处理器的售价为 200-350\
  \ 美元，现在仍然在这个价位。\n\n除了在磁盘空间和内存变得廉价且充裕之前所做的设计决策外，SQL 的基本原理也需要我们进行审慎审视。SQL 基于具有列的表。例如，你可能有一个个人资料表，其中包含用于名字和姓氏的列。这意味着每个个人资料都会有一个名字和一个姓氏——恰好各一个。即使局限于西方文化，也很容易找到这种僵化结构崩溃的例子。例如，当希拉里·黛安·罗德姆·克林顿想要注册时会发生什么？或者那些将网络昵称作为合法姓名，因此只有一个名字的人呢？为了更好的存储，你可能还需要一个个人资料名字表，该表包含一个个人资料\
  \ ID 和一个名字列，从而可以存储任意数量的名字。你很快就会看到这种方法的缺点。在 Drupal 7 中，你可以轻松地将“名字”设置为多值文本字段，但尽管 Drupal\
  \ 为我们隐藏了这种丑陋之处，但这并不意味着它不存在。\n\n虽然已知名字会带来这样的问题，但几乎每种数据类型都不难找到问题。例如，如果你要描述汽车，那么你会有一个名为\
  \ `car` 的表，一个名为 `horsepower` 的列用于存储数字，一个名为 `transmission steps` 的列同样存储数字，还有一个名为\
  \ `color` 的列用于存储字符串。毕竟，汽车有一台具有固定马力的发动机，对吧？（嗯，不完全是；有些汽车既有汽油发动机又有电动马达，它们的马力额定值当然不同，记住，你只能输入一个数字。）至于传动步数，无级变速器就不能很好地存储为一个数字。至于颜色，那更是不胜枚举：有非常成功的双色小型车，也有能让你的汽车变色的温变涂料。这个问题可以通过存储比单个字符串或数字更复杂的数据结构来解决。\n\
  \n所有这一切的重点是，你无法用 SQL 将所有数据存储在一个表中。为什么这如此重要？让我们看看数据库是如何查找数据来回答这个问题的。\n\n\n好的，作为一名高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n#### 索引\n\n你如何在烹饪书中找到食谱？当然是查找索引。虽然按字母顺序排列食谱有所帮助，但你能记住那道加了香肠和牛油果的美味沙拉的名字吗？即使你记得，烹饪书通常也按其他主题（如季节或场合）排序，因此即使知道确切的食谱名称也帮不上大忙。那么，让我们建立一个基于食材的索引，其中包含该食材出现的页码，如下所示：\n\
  \n```\n牛油果\n 40, 60, 233\n西班牙香肠\n 50, 60, 155\n```\n\n这有些帮助，但要找到任何东西，你都需要浏览列出的每一个食谱，因为完全没有关于那些页面上有什么的信息。让我们为每个食材创建一个按字母顺序排列的索引，然后在每个食材下再按名称排序，如下所示：\n\
  \n```\n牛油果\n 鳄梨酱\n   40\n 玉米饼汤\n   233\n 凯撒风味温香肠沙拉\n   60\n西班牙香肠\n 黑豆香肠卷饼\n   50\n\
  \ 墨西哥风味炒蛋\n   155\n 凯撒风味温香肠沙拉\n   60\n```\n\n虽然这个索引很有用，但它仅在您按食材或食材和名称搜索时才有用。如果您想列出包含某种食材的食谱，并按食谱名称排序，它也很方便。但是，如果您想按名称搜索，它就变得完全没用了。例如，如果您想找到“墨西哥风味炒蛋”，您需要先浏览牛油果食谱，然后是培根食谱，再然后是香肠食谱——这比直接翻阅整本书好不到哪去。\n\
  \n回想一下，您开始浏览烹饪书是为了寻找一道同时含有牛油果和西班牙香肠的食谱。您如何创建一个能让这种搜索简单快速的索引？如果您以食谱名称开始索引，那么您需要遍历每一个食谱来找到它们，所以这不是一个好主意。如果您像第一个索引那样做，您可以轻松找到所有含牛油果的食谱以及所有含西班牙香肠的食谱。假设有\
  \ 1000 个含牛油果的食谱和 1000 个含西班牙香肠的食谱，但只有一个同时包含两者。您需要比较 2000 个数字才能找到这一个。为了使此操作快速，您实际上需要一个如下所示的索引：\n\
  \n```\n牛油果\n 培根\n   30, 37, 48\n 西班牙香肠\n   60\n培根\n 牛油果\n   30, 37, 48\n西班牙香肠\n\
  \   70\n```\n\n这简直糟透了。这不仅仅是因为存储需求会相当高，更重要的是，在现实世界中，数据是变化的，维护这样的东西很快就会变得不可持续。假设平均每个食谱只有八种食材；您可以组成\
  \ 8*7 = 56 个配对，因此每次更改都需要更新 56 个索引条目！（即使你不同时存储 `牛油果-培根` 和 `培根-牛油果`，仅仅减半也解决不了任何问题，实际上在查询时还会引发几个问题，因为食材-名称索引不能反向使用。）这正是\
  \ SQL 存储和索引数据的方式，也正是使用 SQL 进行扩展时面临的问题：你无法在大多数跨多个表的查询中使用索引——而且由于 SQL 的僵化性，你不得不使用多个表。让我们看一个\
  \ Drupal 的例子！\n\n在 Drupal 中，节点上有评论。节点存储在一个表（`Node`）中，由于一个节点上可以有多个评论，因此评论存储在单独的表中（`Comment`）。如果您想显示最近被评论的十个“页面”节点，那么您会面临类似的问题：如果您在创建日期上有索引，您可以获得一个按创建日期排序的评论列表及其所属的节点；如果您在节点类型上有索引，您可以获得一个“页面”节点的列表。但是，假设最近\
  \ 200,000 条评论都在“故事”节点上，而您有 50,000 个“页面”，那么您要么需要先遍历 200,000 条评论来发现它们都不是页面，要么需要遍历所有\
  \ 50,000 个页面来找到每个页面的最新评论。这当然不快。\n\n这个例子可以通过在评论表中存储节点类型来轻松解决，因为节点类型不会改变。但是，如果您想同时处理节点变更信息和评论，那么您将被迫在评论表中存储节点变更信息，而编辑一个节点将触发对评论表中数百行的更新。这种做法称为反规范化，并且被广泛使用。然而，这应该引起警觉：您正在使用的系统是什么样的，以至于只有抛弃其基本理论（规范化）才能使其运行？稍后我将展示这个问题的非常好的一种解决方案，但让我们先继续列出\
  \ SQL 的问题。\n\n#### SQL 中的 NULL\n\n`NULL` 是一种奇妙的结构，它违背了传统逻辑；它的用法是矛盾的，甚至在不同数据库之间都不一致。`NULL`\
  \ 用于表示某些数据缺失或无效，并且永远不等于任何其他值，但它既不小于也不大于任何值。无论你对它做什么操作，结果都会是 `NULL`。你需要一个特殊的 `IS\
  \ NULL` 运算符来检测 `NULL`，如下所示：\n\n```\nmysql> SELECT 0 > NULL, 0 = NULL, 0 < NULL,\
  \ 0 IS NULL, NULL IS NULL;\n+----------+----------+----------+-----------+--------------+\n\
  | 0 > NULL | 0 = NULL | 0 < NULL | 0 IS NULL | NULL IS NULL |\n+----------+----------+----------+-----------+--------------+\n\
  |     NULL |     NULL |     NULL |         0 |            1 |\n+----------+----------+----------+-----------+--------------+\n\
  ```\n\n这被称为三值逻辑。一个语句不再是真或假，它可以是 `NULL`。这导致了关于 `NULL` 列的许多奇怪问题。Drupal（请注意，并非有意为之）没有很多\
  \ `NULL` 列，这纯属运气好，避免了大部分这种疯狂行为。唉，但这并不一致，有时您还是被迫陷入了 `NULL` 的困境。\n\n`NULL` 的问题还不仅仅是违背常识的三值逻辑，例如：\n\
  \n```sql\nCREATE TABLE test1 (a int, b int);\nCREATE TABLE test2 (a int, b int);\n\
  INSERT INTO test1 (a, b) VALUES (1, 0);\nINSERT INTO test2 (a, b) VALUES (NULL,\
  \ 1);\nSELECT test1.a test1_a, test1.b test1_b, test2.a test2_a, test2.b test2_b\n\
  FROM test1\nLEFT JOIN test2 ON test1.a=test2.a\nWHERE test2.a IS NULL;\n+---------+---------+---------+---------+\n\
  | test1_a | test1_b | test2_a | test2_b |\n+---------+---------+---------+---------+\n\
  |       1 |       0 |    NULL |    NULL |\n+---------+---------+---------+---------+\n\
  ```\n\n当然，`test2` 中并没有这样一行（`NULL`, `NULL`）。但是，`LEFT JOIN` 使用它来显示所谓反连接的结果。这些用于在第一个表中`SELECT`那些在第二个表中未找到匹配项的行。\n\
  \n现在，如果 `1 = NULL` 为真，它就会找到你插入到 `test2` 中的那一行。但它没有那样做。记住，`1 = NULL` 既不是真也不是假；它只是\
  \ `NULL`。但是，仅从结果来看，这一点是绝对不明显的；毕竟，结果包含一个 `test2_a` 为 `NULL` 的行，而且 `JOIN` 不是规定了 `test1.a=test2.a`\
  \ 吗？是的，确实如此，但在这个特定的例子中，`JOIN` 部分不需要为真。结果包含了由 `NULL` 指示的缺失数据，这与 `JOIN` 完全无关。如果你觉得这令人困惑，确实如此。你不仅需要接受三值逻辑，还需要为\
  \ `LEFT JOIN` 做出例外处理。\n\n在我展示这些问题的答案之前，还要介绍一个数据库架构细节。当前的 SQL 实现都专注于事务（这个术语来自金融交易，但它可以指代数据库执行的任何工作单元）。你很快就会看到，这种专注的效果与网站用户的期望背道而驰——因为网站用户的期望与银行用户的期望是不同的。\n\
  \n\n\n#### ACID 与 BASE 之间的一道鸿沟\n\n事务的典型例子是向他人转账。这是一个非常复杂的过程，但最终你期望自己的余额会减少所转的金额，而收款人的余额会增加相应金额（扣除手续费后）。你还期望，一旦银行确认“你已转出资金”，这笔钱就确实被转出了，无论实际转账过程需要多久（所谓的`SWIFT`转账耗时如此之长，简直荒谬）。另一个期望是，如果钱从你的账户中消失，它就会出现在对方的账户中，无论银行的计算机系统发生什么状况。你当然不希望因为电脑崩溃，自己的钱就凭空消失。为了让事务能够满足这些期望，数据库需要具备一组特性——它们通常被缩写为`ACID`：\n\
  \n*   *原子性*：事务要么完全成功，要么完全不发生。\n*   *一致性*：数据库在事务之间处于一致状态。例如，如果一条记录引用了另一条记录，而在事务结束时该引用无效，那么整个事务必须回滚。\n\
  *   *隔离性*：事务无法看到其他事务尚未完成时更改的数据。\n*   *持久性*：一旦数据库系统通知用户事务成功，数据就永远不会丢失。\n\n另一方面，大多数网络应用则需要一组完全不同的特性，恰如其分地命名为`BASE`：\n\
  \n*   *基本可用*：用户有一个天真的期望，当他们用浏览器访问一个网页时，总能显示一些信息。即使你所访问的系统某些部分宕机，你仍期望这一点能实现。这听起来简单，实则不然；在很多系统中，只要一台服务器宕机，整个系统就会瘫痪。\n\
  *   *可扩展*：增加更多服务器就能服务更多用户。与其试图打造一个单一的巨大服务器，增加服务器数量更具未来适应性，通常也更便宜。再次强调，这是用户的期望：信息不仅要显示，而且要快速显示。（注意，这个用户期望不仅要求可扩展性，还要求性能。）\n\
  *   *最终一致性*：数据最终在其所有复制到的位置都可用即可（如上一要点所述，你可以拥有多个副本）。用户的期望是，快速呈现的信息能保持一定的时效性。当你在`Craigslist`发布一则广告时，它不会立即出现在列表和搜索结果中，这通常不是什么大问题。但如果一则广告需要好几天才能出现，那就成问题了；没人会愿意使用这样的网站。\n\
  \n关于最后一点，如果你拥有`ACID`特性列表中所述的那种一致性系统，那么它自然也满足“最终一致性”，因为它遵循了一个更强的要求：数据立即对所有副本可用。（稍后我会详细讨论这一点。）\n\
  \n如果能有一个数据库系统同时具备`ACID`和`BASE`的特性，那将是极好的，但遗憾的是，这实际上是不可能的。请记住，`BASE`本质上意味着一个由大量服务器组成的系统。如果你强制要求所有写入操作都强一致，那么每次写入都需要发送到所有服务器，并且你必须等待它们全部完成并回传确认信息。现在，如果你的服务器分布在全球各地的数据中心，那么网络问题就在所难免。假设一条跨大西洋的链路中断了——这被称为网络*分区*。如果你想要一致性，那么整个系统就必须随同那条跨大西洋链路一起宕机——即使其他所有服务器仍在运行——因为欧洲的写入无法到达美国，反之亦然，各部分的数据就会不一致。你必须放弃一些东西：要么放弃`BASE`中的“可用性”（系统通过宕机来达成一致性），要么放弃`ACID`中的“一致性”（系统保持运行，但处于不一致状态）。换句话说，在一致性、可用性和分区容忍性（`CAP`）三者之间，你只能选择两个，无法三者兼顾。到目前为止，我只定义了数据库的一致性，现在是时候给出更通用的定义了：在任何时间点，无论哪台服务器响应请求，所有服务器都将提供相同的答案。如上所述，可用性意味着即使某些服务器宕机，整个系统也不会瘫痪。最后，分区容忍性意味着两台服务器之间的某些通信可能丢失，但系统仍能正常工作。请注意，这两个标准是多么“软性”，但当你想让它们与一致性共存时，却会带来一个硬性问题。\n\
  \n我刚才已经说明了`CAP`的三个部分无法同时共存，而我可以证明任意两者都可以轻松共存。如果你能确保网络各部分永不故障，那么实现一致性和可用性就不是问题。尽管这听起来不太可能，但被\
  \ 60 多个谷歌项目使用的`BigTable`实际上就是这样一个系统。如果你放弃可用性，那么另外两个要求就容易满足了：只需关闭服务器，即使网络部分发生故障，数据也能保持一致。最后，如果你不在乎一致性，那么你完全可以不将写入操作从一台服务器复制到另一台——这样的系统当然不会在意网络分区（因为它根本不使用网络），而只要你访问到一台正常工作的服务器，它就会给出某种应答。虽然后两个例子比较极端，并没有描述一个有用的系统，但关键在于，再次强调：虽然一致性、可用性和分区容忍性无法同时共存，但其中任意两者都可以。\n\
  \n再次回想一下咖啡店的故事：为了能够雇佣更多咖啡师（以扩展规模），你必须接受顾客会在短时间内既没钱也没咖啡（最终而非立即一致）。而人们甚至对网络应用也接受了这一点。如果你的评论需要一点时间（哪怕是几分钟）才能让全世界看到，那也没关系。当然，你期望评论的发布者能立即看到，或者至少在数据发送到服务器并收到回复后就看到。但对于其他人来说，通过互联网加载网页本身就需要一些时间，因此，服务器是在用户按下“发送”按钮之前还是之后显示那条新评论，对那些刚刚开始加载页面的人来说，区别不大。更重要的是，无论同时有多少人在浏览（可扩展性），网页始终具有响应能力（可用性）。\n\
  \n因此，虽然`SQL`数据库主要遵循`ACID`规范，但以`BASE`为核心的数据库则更适合网络应用。除此之外，以下数据库充分考虑了硬件和操作系统能力的巨大变化，从而更好地服务于这些用途。最早基于这些原则构建的数据库之一是`CouchDB`，它于\
  \ 2005 年首次发布。`Cassandra`于 2008 年向公众发布，而`MongoDB`则于 2009 年首次发布。\n\n同样是在 2009 年，这些新的非关系型数据库系统获得了“NoSQL”这个颇为朗朗上口的绰号。当然，这只是一个流行词，因为用`SQL`来驱动一个不符合`ACID`规范的数据库是完全可能的（实际上，`MySQL`使用`SQL`超过十年，却一直不符合`ACID`规范），但这类数据库的特性集与`SQL`所针对的工作方式大相径庭，以至于尝试这样做毫无意义。例如，这些数据库都没有提供`JOIN`表的能力。\n\
  \n由于`MongoDB`最适合许多`Drupal`任务，接下来我将详细讨论它。\n\n\n\n### MongoDB\n\nMongoDB 的入门非常简单：只需在浏览器中打开\
  \ `try.mongodb.org` 即可。该网站提供教程，让你无需下载任何东西就能体验数据库。如果你想在自己电脑上使用，可以从 `mongodb.org/downloads`\
  \ 下载，并很快完成安装和运行；无需编写复杂的配置文件。Drupal 的集成项目位于 `drupal.org/project/mongodb`。\n\n尽管 Drupal\
  \ 7 的大部分开发工作早于 MongoDB，但 MongoDB 与 Drupal 7 的契合度却出奇地好。MongoDB 是一款专为 Web 设计的数据库，因此它与全球最优秀的网站制作软件——Drupal\
  \ 如此匹配，也就不足为奇了。\n\n基本上，MongoDB 存储的是 JSON 编码的文档（实际差异很小）。一个文档大致相当于 SQL 中的一条记录。任意数量的文档构成一个集合，这大致相当于\
  \ SQL 中的一张表。最后，数据库包含集合，就像 MySQL 数据库包含表一样。\n\n虽然 MySQL 表只能包含固定记录，但单个 MongoDB 集合可以存储任意类型的文档，例如：\n\
  \n```\n{ title: 'first document', length: 255 },\n{ name: 'John Doe', weight: 20\
  \ }\n```\n\n等等。任何格式都可以。没有 `CREATE TABLE` 命令，因为一个文档可能与下一个文档截然不同。\n\n还记得在 SQL 中存储名字时遇到的问题吗？在这里完全不是问题！\n\
  \n```\ndb.people.insert({ name: ['Juan', 'Carlos', 'Alfonso', 'Víctor', 'María',\
  \ 'de', 'Borbón',\n'y', 'Borbón-Dos', 'Sicilias'], title: 'King of Spain'})\n```\n\
  \n如果你想获取名为 Carlos 的人员文档列表，可以运行 `db.people.find({name: 'Carlos'})`。它将找到西班牙国王，无论 Carlos\
  \ 在名字列表中的哪个位置。\n\n此外，属性的类型远不止数字或字符串。\n\n```\ndb.test.insert({\n    'title': 'This\
  \ is an example',\n    'body': 'This can be a very long string. The whole document\
  \ is limited to a number of megabytes.',\n    'votes': 56,\n    'options':\n   \
  \ {\n        'sticky': true,\n        'promoted': false,\n    },\n    'comments':\
  \ [\n        {\n            'title': 'first comment',\n            'author': 'joe',\n\
  \            'published': true,\n        },\n        {\n            'title': 'first\
  \ comment',\n            'author': 'harry',\n            'homepage': 'http://example.com',\n\
  \            'published': false,\n        }\n    ]\n});\n```\n\n因此，一个文档包含属性（在前面的示例中为\
  \ title、body 等），这些属性可以拥有各种类型的值，例如字符串（title）、数字（votes）、布尔值（options.sticky）、数组（comments）和更多对象（也称为子文档，例如\
  \ options）。文档的复杂程度没有限制。但是，对文档大小有限制（很长一段时间是 4MB；目前是 16MB，但计划增加到 32MB）；对于大多数网页来说，这个限制不会造成实际问题。沿用这个例子，一篇帖子能有多少条评论？可以存下几千条。如果这还不够，正文（永远不会被查询）可以单独存储。\n\
  \n因此，与 SQL 表相比，主要优势在于无需提前指定模式，实际上是没有固定模式，而且值可以是复杂结构。\n\n以下是针对之前展示的文档的一些更有趣的 `find`\
  \ 命令：\n\n```\ndb.test.find({title: /^This/});\ndb.test.find({'options.sticky': true});\n\
  db.test.find({'comments.author': 'joe'});\n```\n\n如你所见，`find` 命令使用与 `insert` 相同的\
  \ JSON 文档。展示的第一个 `find` 命令使用正则表达式来查找标题以\"This\"开头的帖子。第二个命令展示了在对象内部搜索是多么容易。第三个命令表明对象数组也同样容易。还可以为所有这些查询创建索引。\n\
  \n如果你查看 Drupal 7 中带有字段的实体，它实际上是一个包含数组的对象。你可以将它们整体存储并索引到 MongoDB 中。而这正是最重要的：在 SQL\
  \ 中，虽然你可以将具有相同结构（例如，相同类型的节点）的实体存储在一个表中，但如果你需要跨这些实体进行查询（例如，显示用户收藏的所有最新内容，无论它们是文章还是照片），那么你就无法对该查询建立索引。请记住，要使这样的查询快速，你需要进行反规范化；换句话说，将你需要一起查询的数据副本保存在一个表中。这很难维护，升级也很慢，因为每条数据都有太多副本。在\
  \ MongoDB 中，你可以轻松地进行这种跨内容类型的查询，因为所有节点都可以位于一张表中，你只需在'favorite'和'created'上创建一个索引就万事俱备了。\n\
  \n总之，SQL 无法存储复杂结构。虽然 MongoDB 不是解决这个问题的唯一方案，但与 SQL 使用多张表和反规范化的方法相比，它实现和维护起来要简单得多。这个问题在\
  \ Drupal 6 的 CCK 中就存在，但在 Drupal 7 的实体和字段 API 中成为了核心问题。\n\n要将 MongoDB 用作默认的字段存储引擎，请将\n\
  \n```\n$conf['field_storage_default'] = 'mongodb_field_storage';\n```\n\n添加到 `settings.php`（位于\
  \ `sites/default` 或相关的站点目录）中。如果你通过代码创建字段，那么设置字段数组的 `'storage'` 键也可以。UI 不提供此选择，因此如果你仅使用\
  \ UI，则无法按字段选择存储。\n\nMongoDB 不仅仅是一个非常好的字段存储引擎，尽管这可能是它最棒的地方。但它还能解决其他问题。同样，它不是唯一的解决方案，但却是一个非常出色的方案。\n\
  \n首先，让我们看看一些与写入操作相关的更多特性。让我们像这样增加测试文档中的投票数：\n\n```\no = db.test.findOne({nid: 12345678});\n\
  o.votes++;\ndb.test.save(o);\n```\n\n虽然这段代码能工作，但它很丑陋，并且容易受到竞态条件的影响。竞态条件是开发人员的噩梦，因为它们极难重现，却可能导致神秘的系统故障。让我们看一个例子。当两个用户试图投票时，按所列顺序可能发生以下情况：\n\
  \n用户 A 运行 `o = db.test.findOne({nid: 12345678});` -- 票数为 56。\n用户 A 运行 `o.votes++`\n\
  用户 B 运行 `o = db.test.findOne({nid: 12345678});` -- 票数为 56。\n用户 A 运行 `db.test.save(o);`\
  \ 将票数设为 57。\n用户 B 运行 `o.votes++`\n用户 B 运行 `db.test.save(o);` 将票数设为 57。\n\n而在 MongoDB\
  \ 中，你可以这样做：\n\n```\ndb.test.update({nid: 12345678}, {$inc : { votes : 1 }});\n```\n\
  \n*   用户 A 运行此命令，票数加 1 变为 57\n*   用户 B 运行此命令，票数加 1 变为 58\n\n这是一个原子操作。没有因竞态条件导致错误的可能性。请注意，`update`\
  \ 也使用 JSON 文档进行操作；这里展示了像 `$inc` 这样的特殊更新操作符，但语法仍然相同。\n\n你也可以指定一个多文档更新：\n\n```\ndb.test.update({nid:\
  \ {'$in': [123, 456]}}, {$inc : { votes : 1 }}, {multiple:1});\n```\n\n虽然单个文档的更新是原子性的（无竞态条件），但多文档更新不是原子性的。之前我列举事务属性时提到，在事务上下文中，原子性意味着要么所有文档都更新，要么都不更新。但这里不是这种情况，因为\
  \ MongoDB 中没有事务：一个文档的更新可能会失败，但对其他成功更新的文档没有影响。MongoDB 还缺乏事务的另一种能力，即隔离性：当一个文档已经对每个客户端完成更新时，其他文档可能仍然保留着旧值。\n\
  \n\n\n`原子级每文档增量操作`使 MongoDB 成为存储各种统计数据的理想选择。例如，你可能想要存储并显示某个节点的浏览次数。首先，在节点中添加一个名为`'views'`的数值字段。接下来，你将看到一段小脚本，它接收一个节点\
  \ ID 作为参数，并将`views`字段的值加 1。请注意，该脚本会输出与 Drupal 相同的 HTTP 头信息，以防止浏览器和代理服务器缓存内容，最后输出一个\
  \ 1x1 像素的透明 GIF 图像。\n\n```\n<?php\nif (!empty($_GET['nid']) && $_GET['nid'] == (int)\
  \ $_GET['nid']) {\n  define('DRUPAL_ROOT', getcwd());\n  require_once DRUPAL_ROOT\
  \ . '/includes/bootstrap.inc';\n  drupal_bootstrap(DRUPAL_BOOTSTRAP_CONFIGURATION);\n\
  \n  require_once DRUPAL_ROOT . '/sites/all/modules/mongodb/mongodb.module';\n  $find\
  \ = array('_id' => (int) $_GET['nid']);\n  $update = array('$inc' => array('views.value'\
  \ => 1));\n  mongodb_collection('fields_current', 'node')->update($find, $update);\n\
  }\n\nheader('Content-type: image/gif'); header('Content-length: 43');\nheader(\"\
  Last-Modified: \" . gmdate(\"D, d M Y H:i:s\") . \" GMT\");\nheader(\"Expires: Sun,\
  \ 19 Nov 1978 05:00:00 GMT\");\nheader(\"Cache-Control: must-revalidate\");\nprintf('%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c%c'\n\
  , 71, 73, 70, 56, 57, 97, 1, 0, 1, 0, 128, 0, 0, 0, 0, 0, 0, 0, 0, 33, 249, 4, 1,\
  \ 0, 0, 0, 0,\n44, 0, 0, 0, 0, 1, 0, 1, 0, 0, 2, 2, 68, 1, 0, 59);\n```\n\n现在你只需将其保存为\
  \ Drupal 根目录下的 `stats.php`，并在 `node.tpl.php` 中添加一个 `<img src=\"<?php print base_path()\
  \ . 'stats.php?nid=' . $node->nid; ?>\"/>` 标签。通过这种方式统计节点浏览次数，即使页面由缓存或 Varnish 提供服务，该浏览次数也会被记录下来。\n\
  \n这会拖垮网站性能吗？这取决于具体情况。每次有人加载页面时，确实都会触发一次 PHP 请求，这可能可以接受，也可能无法接受。对于大多数网站来说，这没问题。如果网站能正常运行，MongoDB\
  \ 就不会造成问题。鉴于 MongoDB 在内存中操作数据库，并偶尔写回磁盘，写入操作要快得多，因为它们只需要在内存中进行。此外，它会尽力原地更新值，这样就不需要没必要地更新索引。\n\
  \n2011 年的新特性是，即使使用单台服务器，也能保证写入不丢失。MongoDB 之前最大的诟病之一就是，因为它只是偶尔写回磁盘，如果服务器崩溃，数据可能会丢失。以前通过在应用程序中等待写入复制到另一台服务器来缓解此问题，希望两台服务器不会同时崩溃。但现在，如果使用\
  \ `–dur` 选项启动 `mongod`，写入数据就不会丢失。\n\n#### 监视器（Watchdog）、会话（Session）和队列（Queue）\n\n\
  Drupal 还有其他写入量很大的区域：监视器和会话。会话子系统用于保持用户登录状态；因此它需要在每次页面加载时进行写入。MongoDB 的高速写入使这不再是一个问题。一旦你运行了\
  \ `mongod` 并安装了 Drupal 模块，只需将\n\n```\n$conf['session_inc'] = DRUPAL_ROOT\n.  '/sites/all/modules/mongodb/mongodb_session/mongodb_session.inc';\n\
  ```\n\n添加到 `settings.php`（位于 `sites/default` 或相关的站点目录）中，MongoDB 就会接管会话，从而再次提升网站速度。\n\
  \n监视器之所以麻烦，是因为如果由于某种原因产生大量错误消息（例如大规模蠕虫爆发，试图获取不存在的 URL），SQL 表可能会膨胀到唯一可行的办法就是彻底清空它（`TRUNCATE`）。删除旧行可能跟不上写入洪流，而且写入速度本身也比较慢。传统的解决方案是使用\
  \ `syslog`，但这只是一个文本文件，查询起来不太方便。使用 MongoDB，你可以指定某个集合只保留最后 N 个文档，然后自动从头开始覆盖最旧的消息，这样消息数量永远不会超过指定值，查询起来既简单又方便。此外，Drupal\
  \ 的监视器实现会将不同的消息放入不同的集合，因此每种消息记录的数量都不会超过指定值。例如，“评论已创建”消息不会被 PHP 错误消息挤掉。要使用此功能，请启用\
  \ `mongodb_watchdog` 模块并禁用 `dblog` 模块。\n\n最后，Drupal 7 有一个消息队列，也可以用 MongoDB 实现。队列有很多种，但如果你已经为字段存储、监视器和会话部署了\
  \ MongoDB，那么仅凭 MongoDB 的写入速度，在这里用它替代 SQL 就非常方便。只需将\n\n```\n$conf['queue_default_class']\
  \ = 'MongoDBQueue';\n```\n\n添加到 `settings.php` 中就完成了。你已经了解了如何将 MongoDB 用作字段存储引擎、存储会话数据、记录监视器消息以及作为队列机制。它也可以用作缓存，但为此目的，memcache\
  \ 通常更好（因为它具有很强的可扩展性）。\n\n#### MongoDB 中的空值\n\n到目前为止，你已经看到 MongoDB 如何解决 SQL 的一些问题。让我们看看它是否能改善\
  \ SQL 之前讨论过的关于 NULL 的怪异行为（在此过程中，你将了解更多关于 MongoDB 的知识，并看到更多关于 MongoDB 查询的示例）。\n\n\
  MongoDB 处理 NULL 的方式比 SQL 更合理一些，但它也肯定有自己的 NULL 特例。以下 `find` 查询完全有效，表明 NULL 值不需要特殊运算符：\n\
  \n```\ndb.test.find({something:null}) ;\n```\n\n这将查找 `something` 字段值为 NULL 的文档。非常简单。NULL\
  \ 本身是一种类型，比较不同类型的值总是返回 false，因为 MongoDB 是强类型语言，永远不会为你进行类型转换。因此，将数字与 NULL 比较总是 false，将数字与字符串比较也是如此。这其实不是问题——只是你需要知道的一点。稍后会给出一个示例。至少\
  \ MongoDB 没有采用三值逻辑；比较结果只能是 true 或 false，永远不会是 NULL。\n\n然而，关于 NULL 有一个需要注意的地方：**不存在的字段值被视为\
  \ NULL**。\n\n```\n> db.test.drop()\n> db.test.insert({a:1});\n> db.test.insert({something:null});\n\
  > db.test.insert({something:1});   \n> db.test.find({something:null});\n{ \"a\"\
  \ : 1 }\n{ \"something\" : null }\n```\n\n要真正找到你想要的内容，可以这样做：\n\n```\n> db.test.find({something:{$in:\
  \ [null], $exists:true}});\n{ \"something\" : null }\n```\n\n这里使用的新运算符是 `$in` 和\
  \ `$exists`。下面是比较 NULL 和 1 的示例：\n\n```\n> db.test.find({something: {$gte: null }});\n\
  { \"a\" : 1 }\n{ \"something\" : null }\n```\n\n再一次，第一个文档不包含 `something` 属性，因此在比较时匹配了。第二个文档包含\
  \ `something: NULL` 键值对，而操作是“大于等于”（`$gte`），所以也匹配了。你还有一个 `something` 值为 1 的文档，但它不会匹配——NULL\
  \ 不等于零。\n\n### 总结\n\n如你所见，在网站早期阶段考虑扩展问题并不总是优先事项。然而，早做准备、防患于未然总是有益的。本章讨论了为什么你*应该*尽早关注扩展问题，以及\
  \ Drupal 7 中可用于解决扩展问题的技术。\n\n重点放在数据库上，因为它们在 Drupal 的扩展中绝对不可或缺。当然，缓存等机制也很有用，因此我们也对此进行了探讨。总而言之，本章的修改将有助于你的\
  \ Drupal 站点朝着有效扩展的方向迈进。\n\n![images](img/square.jpg)  \n**提示** 通过 `dgd7.org/scale`\
  \ 获取不定期的更新、讨论和资源，保持与时俱进。\n\n## 第 28 章\n\n![images](img/squ.jpg)\n\n\n\n"
- "# 用语义佐料为你的内容添味\n\n**作者：斯特凡·科洛斯基**\n\n过去，搜索引擎不得不猜测页面的哪些部分需要展示，才能让你的网站在搜索结果中显得相关且吸引人。如今，Drupal\
  \ 为你提供了工具，让你能清晰地表达内容所承载的含义，从而帮助网络上的其他应用真正理解你的网站，并以潜在实用且吸引人的方式重用你的内容（参见图 28-1）。\n\
  \n![images](img/2801.jpg)\n\n***图 28-1.** Drupal 提供了清晰表达内容的工具。*\n\n得益于这张食谱页面使用的语义标记，它会在谷歌搜索“泰式芒果沙拉”时显示出来，并附带图片和网站用户给出的评分。当你的网页以机器可理解的方式提供信息时，谷歌可以在搜索结果页（SERP）的呈现中，将选定的信息片段（例如图片和评分）置于优先位置。\n\
  \n借助 Drupal 7，你可以轻松地为页面添加语义标记。通过网站用户界面实现这一方法，将在 RDF UI 部分中介绍。然而，日益发展的语义网所带来的挑战与前景更为深远，而\
  \ Drupal 7 将在帮助你驾驭并构建这个信息丰富的未来方面发挥重要作用。\n\n### 信息过载\n\n网络上公开可访问的页面超过 200 亿个，此外还有\
  \ 9000 亿个*深度页面*^(1)（即受密码保护的页面或搜索后生成的动态页面）。如果将连接到网络的所有个人电脑、数据服务器及其他设备计算在内，在线存储容量估计超过\
  \ 600 艾字节（即 6000 亿千兆字节）。加之存储成本低廉，以及越来越多的用户加入网络，我们人类每天处理的信息量正在飞速增长。关键在于，如果没有机器的帮助，我们将无法消化这种信息过载。\n\
  \n_________\n\n¹ LLRX，“Deep Web Research 2007”，[`www.llrx.com/features/deepweb2007.htm`](http://www.llrx.com/features/deepweb2007.htm)，2006\
  \ 年。\n\n但我们现在不就已经在使用机器上网了吗？确实如此，但我们并未充分发挥它们的能力；要理解大多数网页的结构和内容，仍然需要人类读者。像谷歌、雅虎和必应这类搜索引擎，不断抓取网络上的页面，并将其镜像到它们的服务器群中，以便为终端用户提供极快的搜索结果。但这其中存在一个问题。所有搜索引擎能访问的只是\
  \ HTML 页面或 PDF 文件中的纯文本。RSS 信息源虽然以 XML 形式提供了更结构化的信息，但仅限于标题、日期和内容；它无法表达项目类型（新闻、博客文章、用户资料、待售商品、活动），也无法表达评论数量、图片或价格。\n\
  \n对人类大脑来说，识别页面上各类信息片段并猜测正在阅读的信息类型（文本、日期或图片）相当简单。同样，判断页面各元素之间的关系及其所指内容（这是撰写页面的作者姓名，还是页面的主题？）也是如此。但对于机器而言，这些任务要困难得多，因为它们缺乏像我们人类在日常生活中的那种推断上下文线索的能力。\n\
  \n换句话说，访问网站的机器主要看到的是链接到其他页面或图片的纯文本。专家们必须运行许多复杂的算法，试图逆向工程还原页面构建的过程。一个非常简单但资源密集的例子是，通过正则表达式搜索由斜杠分隔的数字来查找页面中的日期。面对像`08/07/10`这样的日期，当连英国读者和美国读者都会以不同方式解读时，机器又怎能判断它是\
  \ 7 月 8 日还是 8 月 7 日呢？机器需要一种清晰、无歧义的方式来解读这类信息。\n\n词语也是如此。当机器遇到“苹果”这个词时，它会推断出什么？英语中有许多词汇都具有多重含义和微妙差别。语义网是一套旨在解决这些问题的工具和标准，它通过在现有网络之上添加一层语义来实现。重要的是要理解，语义网并非试图取代现有网络，而是为内容添加供机器理解上下文的线索，就像是网络厨师添加香料来调和内容，使其对机器来说更美味、更有意义。\n\
  \n\n\n语义网多年来在实际应用中产生了越来越大的影响，最近还被网络巨头们采用。在所有语义网标准中，`RDFa`（`RDF in attributes`）是应用最广泛的一个。2008\
  \ 年，雅虎的`Search Monkey`率先支持了启用`RDFa`的页面。一年后，谷歌推出了富摘要（`Rich Snippets`）功能。2010 年 4\
  \ 月，Facebook 宣布将`RDFa`作为开放图谱协议（`Open Graph protocol`）的一部分，此后该协议已被部署在数百万个网页上。你可能在不知不觉中浏览过由`RDFa`增强的网站：如白宫、奥莱利、百思买、《纽约时报》。此外，大多数`Drupal\
  \ 7`网站也在此列。\n\n### 资源描述框架（THE RESOURCE DESCRIPTION FRAMEWORK）\n\n资源描述框架（`RDF`）是一套用于信息建模的\
  \ W3C 规范。在`RDF`中，每条信息或断言都包含主语、谓语和宾语，类似于自然语言中的基本句子。将这些断言组合起来，就能对多种事物进行知识建模。以苹果派的食谱为例：它需要\
  \ 30 分钟准备，并且有 25 条评价。在`RDF`中，每个断言都遵循主语-谓语-宾语的相同结构，因此上述句子可以这样表达：\n\n```\n[recipe]\
  \ - [name] – \"Apple pie\"\n[recipe] - [preparation_time] –\"30 min\"\n[recipe]\
  \ - [number_reviews] – \"25\"\n```\n\n这种用于断言基本信息元素的主语-谓语-宾语模式，在`RDF`术语中有时被称为*三元组*（*triple*）。谓语通常被称为*谓词*（*predicate*）或*属性*（*property*）。为了确保网络上的互操作性，重复使用相同的谓语至关重要，这样当其他人阅读这个食谱时，他们就能理解数字\
  \ 25 代表什么。在自然语言中，这是通过约定所用词语的共同含义来实现的。对于机器而言，在`RDF`中则通过使用`URI`来实现。关联数据（Linked Data）²\
  \ 最佳实践鼓励使用`HTTP URI`，因为它们为机器和人类 alike 提供了一种查询谓语含义的方法。如果你不确定某个谓语的含义，可以直接将其粘贴到浏览器中以了解更多信息。这个过程被称为“顺藤摸瓜”（following\
  \ your nose），机器也可以用它来发现`URI`背后的含义。这类似于在字典中查找一个单词。\n\n这些`RDF`中的“字典”被称为*本体*（*ontologies*）、*词汇表*（*vocabularies*）或*模式*（*schemas*）。它们包含针对特定主题的`URI`定义集。一个流行的例子是“朋友的朋友”（`FOAF`）³\
  \ 词汇表，其中包含描述人物及其朋友的术语。这为机器学习和推理新知识提供了激动人心的可能性，例如，发现来自不同词汇表的两个谓语是否实际上是同义词，或者某个特定谓语是否附带一组额外的断言。例如，在`RDF`语句中使用`foaf:img`意味着主语是一个人，宾语是一张图片。\n\
  \n请注意`foaf:img`这种简写符号，它用于指代`FOAF`词汇表中的`img`谓语。这种符号是*CURIE 语法*⁴（紧凑型`URI`），有助于避免使用完整`URI`，因为完整`URI`往往冗长且容易出错。`CURIE`总是在特定上下文中使用，其中分号前的`prefix`绑定到词汇表的命名空间。以`foaf:img`为例，`foaf`前缀绑定到`FOAF`命名空间`http://xmlns.com/foaf/0.1/`，如`FOAF`词汇表规范所定义。`foaf:img`的完整`URI`（即指向`img`术语的`URI`）是命名空间与术语的拼接：`http://xmlns.com/foaf/0.1/img`。\n\
  \n让我们再看一个`RDF`有用的例子：网页元数据。以下内容描述了一个网页的标题、创建日期和一个主题：\n\n```\n<http://example.org/home.html>\
  \    dc:title      \"Joe's homepage\"\n<http://example.org/home.html>    dc:created\
  \    \"Dec 1, 2005\"\n<http://example.org/home.html>    dc:subject    \"London\"\
  \n```\n\n注意这里的新前缀：`dc`。在该示例的上下文中，`dc`指代都柏林核心（`Dublin Core`），这是一个用于描述物理资源（如图书）以及数字项目（如视频、文本文件或网页文档）的词汇表。`dc`前缀通常绑定到命名空间`http://purl.org/dc/terms/`。\n\
  \n最后一条语句的宾语是一个字符串。`RDF`的另一个特性是允许宾语是一个`URI`，因此最后一条语句可以写成：\n\n```\n<http://example.org/home.html>\
  \    dc:subject    <http://dbpedia.org/resource/London_Ontario>\n```\n\n使用`URI`而非字符串的好处是避免了纯文本字符串可能带来的歧义。其次，该`URI`还能提供该城市（伦敦，安大略省）的坐标、一些图片、各种统计数据，以及比单纯一个字符串所能表达的更多信息。\n\
  \n请注意，`RDF`中的知识表示非常通用，并不绑定任何特定的语法。这意味着你可以将`RDF`嵌入到多种语言中，例如`HTML`、`JSON`、`XML`、`RSS`和`Atom`。\n\
  \n沿用自然语言的类比，相同的信息可以用多种不同的方式表达：想法和概念可以作为词语（用英语、法语等）或图表（白板风格或古埃及象形文字）来表达。类似地，一张照片可以保存为`jpg`文件、`png`文件，或者打印在纸上；所有这些媒介都承载着照片中本质上相同的信息。通常，你会选择最适合你和接收方进行沟通的媒介或语言：如果你在和西班牙朋友聊天，你可能会说西班牙语；如果双方都习惯英语，你可能会选择英语。同样地，`RDF`提供了多种格式来表达或*序列化*（*serialize*）相同的信息。在网页上下文中，`RDFa`是最合适的语法，因为它通过添加一层薄薄的属性，提供了一种直接在`HTML`中嵌入`RDF`的方式。\n\
  \n_________\n\n² W3C, “Linked Data,” `www.w3.org/DesignIssues/LinkedData`, 2006.\n\
  \n³ XMLNS, “FOAF Vocabulary Specification 0.98”, `http://xmlns.com/foaf/spec/`,\
  \ 2010\n\n⁴ W3C, “CURIE Syntax 1.0: A syntax for expressing Compact URIs,” `www.w3.org/TR/curie/`,\
  \ 2010.\n\n#### 我们是如何走到这一步的？（How Did We Get There?）\n\n任何数据源都倾向于在互联网上公开，以便能够根据网站许可进行共享、重用，并与其他数据融合。像`Drupal`这样的内容管理系统帮助人们在线制作内容。无论是通过自建网站、软件即服务（`SaaS`），还是免费平台（如\
  \ Facebook、Twitter、MySpace 或 Gmail），普通网络用户都有多种方式在线生产内容。\n\n从 Twitter 上的 140 字更新，到四段的博客文章，再到一百页的\
  \ PDF 文档，所有这些信息片段都以某种形式出现在网络上。有些是公开的；有些则位于防火墙或密码保护之后。这些内容中的大部分最终以`HTML`形式呈现，但也存在其他格式，如文本文件、PDF\
  \ 文档和图片。其中一些数据直接来自用户上传到网络的内容（内容、想法、思考），但围绕这些用户输入，还存在大量元数据，例如输入日期、页面访问次数或页面收到的评论数量。\n\
  \n随着 Mozilla Firefox 和 Google Chrome 等浏览器的广泛采用，浏览网络并为网络做出贡献变得非常容易；这些浏览器现在可用于台式机、笔记本电脑、平板电脑和移动设备等多种平台。电子邮件客户端是另一种在网络上发布内容的方式；邮件列表就是一个很好的例子。\n\
  \n\n\n#### 去中心化数据空间\n\n当蒂姆·伯纳斯-李爵士于 1990 年创建万维网时，他设想了一个全球分布式信息空间，在这个空间中，每个人都可以自由地谈论任何事物，而无需应对繁复的官僚程序、企业政策或任何形式的集中控制权威。最重要的是，这个信息空间将对每个人保持自由和开放：你可能需要向本地互联网服务提供商（ISP）付费才能接入这个信息空间，但一旦连接上，你就可以自由地做你想做的事。每个用户都可以拥有自己的数据空间，可以声明自己认为正确的内容，与世界分享自己的观点，并与其他人的数据空间建立链接，无论同意与否。\n\
  \n像 Drupal 这样的 Web 应用使互联网用户能够构建自己的数据空间、创建内容，并将其链接到其他数据空间。所有这些数据空间的集合就是我们通常所说的 Web，它建立在自\
  \ 20 世纪 60 年代以来不断发展完善的互联网基础设施之上。\n\n#### 在全球 Web 规模上链接数据\n\n在深入探讨 Drupal 和 RDF 的细节之前，理解语义网的另一个方面以及它如何让你超越网站边界来定位信息至关重要。大多数应用程序使用外键的概念来存储数据，这使得它们能够寻址数据库中的每个数据项，并轻松跨表查找与每个数据项相关的数据。这在封闭系统中运行良好，因为很容易对这些外键施加约束，例如确保每个标识符唯一。但这在全球范围内行不通，因为\
  \ Web 上的每个站点并不依赖集中式权威机构来分配标识符。\n\n虽然我在个人网站上的用户 ID 是 1，但这并不意味着我在 Web 上的所有站点都有相同的用户\
  \ ID。在`drupal.org`上，我的用户 ID 是 52142，而在`groups.drupal.org`上则是 3258。同样，我在`identi.ca`上的用户名是\"\
  scor\"，但在 Twitter 上这个用户名已被占用，所以我不得不选择\"scorlosquet\"作为用户名。关键在于，在像万维网这样完全分布式的系统中，谈论纯粹的\
  \ ID 或用户名毫无意义，充其量只会造成歧义！\n\n为了解决这个问题，RDF 使用 URI（统一资源标识符）来命名和定位互联网上的资源。URI 看起来很像\
  \ URL，以`http://`或`https://`开头。因此，RDF 不会用整数来指代用户，而是会使用类似`http://drupal.org/user/52142`的字符串。这样一来，我们就能声明诸如`http://drupal.org/user/52142`和`http://groups.drupal.org/user/3258`是同一个人的两个用户资料页面。借助\
  \ URI，每个网站都可以拥有自己专属的命名空间，并根据需要创建任意数量的资源，而无需征询任何人的意见。Drupal 通常会为每个用户分配一个 ID，并将其 URI\
  \ 构建为`http://站点名称/user/{用户 ID}`；节点、分类术语等也是如此。这个路径可以使用 URL 别名进行自定义；Drupal 会确保每个 URL\
  \ 别名都指向你网站上的唯一资源，从而避免任何歧义。\n\n既然你已经看到了 URI 的重要性，就可以继续了解它们在哪些场景下有用。你已经明白，如果没有某种命名空间（例如所属网站），用户名在\
  \ Web 上是毫无意义的。除了这个用例之外，请思考在谈论概念时出现的歧义问题，例如给一篇博客文章打上\"apple\"标签。你又回到了使用字符串来标识一个可能带来歧义的概念，就像用户名的情况一样，这也是\
  \ RDF 可以帮助你解决的问题。你可以将自己的概念托管在自己的命名空间上，但对于像\"name\"或世界上所有国家这样的通用概念，使用某种公认的集中式存储库则更有意义。\n\
  \n维基百科^(5)包含了关于物体、概念、名人、城市、国家、组织等海量信息。每个条目在维基百科上都有一个 URI，用于显示关于该主题的一些信息。谈论\"apple\"\
  可能指水果，也可能指公司。如果你改用 URI，就能轻松消除任何歧义；`http://en.wikipedia.org/wiki/Apple`是指水果，而`http://en.wikipedia.org/wiki/Apple_Inc`则描述公司。对于能够根据上下文理解其意涵的人类来说，这种区分可能并非必要，但对于机器而言却至关重要。使用相同标识符的网站越多，机器就越容易进行交叉引用，从而推断出一组帖子是否在谈论同一个主题。\n\
  \n_________\n\n⁵ 维基百科（`http://en.wikipedia.org/`）是一个在线多语种百科全书，拥有超过一千七百万篇文章。Dbpedia（`http://dbpedia.org/`）是一个独立项目，旨在从维基百科中提取结构化信息，并以\
  \ RDF 格式在线提供。借助 DBpedia，可以对维基百科内容运行复杂查询，并更容易地在 RDF 应用程序中重用这些数据。\n\n#### 你明白我的意思吗？\n\
  \nDrupal 提供了一个用户友好的界面来生成 HTML。在提交数据时，Drupal 通常会将其存储在数据库中，然后进行处理以生成 HTML 输出。Drupal\
  \ 确切知道应从哪些表和列中提取数据；在构建页面时，它知道页面的标题、创建日期和主要内容对应什么。它知道节点的当前版本，并能从正确的数据库记录中提取。然而，一旦将页面组合成\
  \ HTML，所有这些结构都丢失了；实际数据被恰当地布局在页面上，并针对人眼进行格式化，但语义已经丢失。\n\n早期的 HTML 版本并非设计用于向机器显式表达这种结构。但设想一下，如果\
  \ HTML 标签提供了一种方式来指定标签包含的数据类型，以及该数据与页面上或 Web 其他页面上其他信息片段之间的关系呢？这正是万维网联盟工作组在 2008\
  \ 年 10 月发布的\"RDFa in XHTML\"W3C 推荐标准^(6)中所解决的问题。\n\n\n\n#### RDFa，或者说如何为 HTML 添加语义\n\
  \n从 Web 开发者的角度来看，RDFa 不过是一些 XHTML 属性，可以添加到网页中，以明确声明 HTML 标签中所含数据的语义（参见图 28-2）。RDFa\
  \ 标记不会改变页面在 Web 浏览器中的渲染方式；对用户而言，页面看起来完全一样。然而，对于任何能够读取页面的 RDFa 软件来说，差异是显而易见的，因为它能够理解语义标记。\n\
  \nWeb 浏览器随后可以根据页面包含的数据类型增强用户体验：例如，一些浏览器扩展可以根据页面中包含的 RDFa 标记提供额外的功能。搜索引擎通常也会充分利用这些数据，因为这使它们能够更好地理解当前信息，并在搜索结果中相应地显示；提取页面的标题、日期和图片变得很容易，这可以极大地改善在搜索结果中的可见性，并有助于特定网站的搜索引擎优化（SEO）。价格、评分和评论数量也是能够为电子商务网站带来更多流量的相关元素。雅虎报告称，由于使用了\
  \ RDFa，点击率提升了高达 15%（[`www.slideshare.net/NickCox/ses-chicago-2009-searchmonkey`](http://www.slideshare.net/NickCox/ses-chicago-2009-searchmonkey)）。\n\
  \n_________\n\n⁶ W3C，“RDFa in XHTML: Syntax and Processing”，[`www.w3.org/TR/rdfa-syntax/`](http://www.w3.org/TR/rdfa-syntax/)，2008\
  \ 年。\n\n![images](img/2802.jpg)\n\n***图 28-2.** 通过向现有的 HTML 标签添加几个简单的 XHTML 属性，RDFa\
  \ 用机器可读的提示丰富了网页的内容。*\n\nRDFa 处理模型依赖于一种 DOM 遍历技术，其中每个 DOM 元素都会被访问，从文档对象开始，以递归方式遍历到每个子元素。通过一些基本示例最能说明\
  \ RDFa。请记住，RDFa 的全部意义在于向现有的 XHTML 标记添加属性。首先，需要对 XHTML 模板的顶部进行一些调整，使其符合 RDFa 规范。\n\
  \n```\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML+RDFa 1.0//EN\"\n  \"http://www.w3.org/MarkUp/DTD/xhtml-rdfa-1.dtd\"\
  >\n<html xml:lang=\"en\" version=\"XHTML+RDFa 1.0\" dir=\"ltr\">\n<head profile=\"\
  http://www.w3.org/1999/xhtml/vocab\">\n```\n\n其次，让我们设置一些前缀，以便可以使用在 RDF 部分讨论过的 CURIE\
  \ 语法。这是在 HTML 标签中使用特定语法完成的。对于 FOAF，它将是：\n\n```\nxmlns:foaf=http://xmlns.com/foaf/0.1/\n\
  ```\n\nDrupal 7 负责处理上述所有内容，并包含一组常用的命名空间。模块可以声明额外的前缀和命名空间。\n\n现在，你已经准备好开始在 HTML 文档中使用\
  \ RDFa 标记了。为了表示 HTML 中的属性，我们将它们前面加上一个`@`符号。RDFa 属性包括`@about`、`@content`、`@datatype`、`@href`、`@property`、`@rel`、`@rev`、`@resource`、`@src`和`@typeof`。每个\
  \ RDFa 属性都会影响如何根据 HTML 文档的结构和内容构建 RDF 语句。你可能认识其中一些属性（如`rel`、`href`或`src`），你很快就会看到它们在\
  \ RDFa 中扮演的角色，以及 RDFa 如何重用现有的属性值。\n\n属性`@property`、`@rel`和`@rev`指定了 RDF 语句的谓语（动词）。要理解它们是如何工作的，最好查看以下示例：\n\
  \n```\n<h1 property=\"dc:title\">Joe's homepage</h1>\n<div rel=\"sioc:has_creator\"\
  ><a href=\"/user/9\">John Smith</a></div>\n```\n\n`dc:title`和`sioc:has_creator`是两个不同的\
  \ RDF 谓语，分别指定了页面的标题和作者。在第一个示例中，`@property`强制 RDF 语句的宾语是一个字符串。在第二个示例中，使用`@rel`代替`@property`，以强制语句的宾语是一个指向作者页面的\
  \ URI；换句话说，它是一个资源，而不是一个简单的字符串。这样做允许标记包含比仅用字符串多得多的关于作者的信息。作者资源不仅可以包含他的名字，还可以包含他的简介以及他其他文章的链接，从而实现内容发现。\n\
  \n对 RDFa 的详尽描述超出了本章的范围，因此请查阅[`www.w3.org/TR/xhtml-rdfa-primer/`](http://www.w3.org/TR/xhtml-rdfa-primer/)上的\
  \ RDFa 入门指南，以更详细地了解 RDFa 标记是如何被处理的。另请参阅发表在 *A List Apart Magazine* 上的这些关于 RDFa 的优秀文章：\n\
  \n```\nwww.alistapart.com/articles/introduction-to-rdfa/\nwww.alistapart.com/articles/introduction-to-rdfa-ii/\n\
  ```\n\n#### RDFa、微格式和微数据\n\nRDFa 并不是为 HTML 添加语义的唯一语法。微格式（`microformats.org`）是第一种被\
  \ Web 开发者社区广泛采用的语法。然而，微格式从未被标准化，并且由于其设计，其词汇表（如 hCard、vCard 等）的开发是集中的，并且局限于一个组织。另一方面，由于\
  \ RDF 的性质，RDFa 可以自由扩展：外部词汇表可以组合起来，并且在需要时可以构建自定义的特定领域词汇表。RDFa 还受益于过去十年间在语义网栈上投入的所有工作。许多工具可用于解析、存储和查询\
  \ RDF 数据。其中最著名的是`SPARQL`（[`en.wikipedia.org/wiki/SPARQL`](http://en.wikipedia.org/wiki/SPARQL)），这是一种类似于关系数据库的`SQL`的\
  \ RDF 查询语言，允许对来自任何 RDF 源的联合数据运行查询。\n\n自 2008 年起，RDFa 已成为 W3C 标准，并被许多知名的 Web 公司采用，如\
  \ Google、Facebook、BBC 和百思买。雅虎最近的调查显示，RDFa 在 2010 年呈爆炸式增长，是增长最快的数据标记格式（[`http://tripletalk.wordpress.com/2011/01/25/rdfa-deployment-across-the-web`](http://tripletalk.wordpress.com/2011/01/25/rdfa-deployment-across-the-web)）。微数据（[`www.whatwg.org/specs/web-apps/current-work/multipage/links.html#microdata`](http://www.whatwg.org/specs/web-apps/current-work/multipage/links.html#microdata)）是\
  \ HTML5 规范的一部分，是一种新的语法，在撰写本文时仍在开发中。微数据与 RDFa 的共同点比与微格式更多，例如都使用 URI 来实现可扩展性。在 Drupal\
  \ 7 的开发阶段，微数据和 HTML5 都还太新，而更为成熟的 RDFa 标准则更有前景，并且更适合 Drupal 原生的 XHTML 输出。虽然 RDFa\
  \ 1.0 版仅适用于 XHTML 标记，但即将推出的 RDFa 1.1 将允许在 XHTML5 和 HTML5 中使用 RDFa。请参阅[`http://dev.w3.org/html5/rdfa/`](http://dev.w3.org/html5/rdfa/)上的\
  \ HTML+RDFa 1.1 草案文档。RDFa 1.1 还吸收了微格式和微数据社区的反馈，从而实现了更简单的语法和更多的用例。鉴于 RDFa 1.1 向后兼容\
  \ Drupal 7 的 RDFa 1.0 标记，预计不久将在 Drupal 7 上看到支持 RDFa 的 HTML5 页面。请加入[`http://groups.drupal.org/html5`](http://groups.drupal.org/html5)上关于\
  \ Drupal 中 HTML5 的讨论。\n\n\n\n#### Drupal 7 与语义网\n\n在浏览 Drupal 7 的模块目录时，你可能已经注意到一个\
  \ `rdf` 文件夹，或者在管理界面的 `Modules` 页面上看到过它。如果你安装了标准版配置文件，该模块可能已经启用（参见 图 28-3）。\n\n![images](img/2803.jpg)\n\
  \n**图 28-3.** 通过访问网站管理部分的 `Modules` 页面，确保 `RDF` 模块已启用。\n\n`RDF` 模块的所有工作都在后台进行。实际上，它不包含任何用户界面，仅提供供其他模块使用的\
  \ API（很像 `Field` 模块）。核心中的许多模块都利用了 `RDF` 模块，包括 `Node`、`Comment`、`User`、`Taxonomy`、`Forum`、`Blog`\
  \ 和 `Tracker`。\n\n`RDF` 模块主要做两件事：用 `RDF` 映射（将 Drupal 字段关联到单个或多个 RDF 术语）描述 Drupal\
  \ 站点的数据结构，然后将这些映射以 RDFa 属性的形式插入到 `HTML` 输出中。`RDF` 模块利用了 Drupal 7 引入的实体、包和字段的新概念。下面我们将仔细看看这些\
  \ RDF 映射的生命周期。\n\n从较高层面看，像 `node` 这样的实体类型具有一组属性（例如 `title` 或 `date`），这些属性可以映射到 RDF\
  \ 属性。当这些值在 `HTML` 中输出时，该 RDF 属性会被添加到 `HTML` 中，以便从外部角度查看此 `HTML` 的代理仍能理解数据的来源和意义。一个非常简单的示例：标题为“我的比利时之旅”的节点将被输出到\
  \ `HTML` 中：\n\n```\n<h2 property=\"dc:title\">我的比利时之旅</h2>\n```\n\n注意添加到包装标签 `h2`\
  \ 上的额外 `property` 属性，它清晰地标明了节点的标题。除了实体类型的属性外，还存在一种针对实体实际类型的特殊映射。从 Drupal 的角度来看，这听起来可能有些多余，但请记住，RDF\
  \ 映射的作用是帮助那些对你网站内部结构一无所知的外部应用程序。\n\n实体类型是另一个会丢失且无法在 `HTML` 中明确显示的信息元素，但 `RDF` 模块提供了通过\
  \ RDF 映射结构的 `rdftype` 键解决此问题的机会（参见 清单 28-1）。这种 RDF 类型映射会以 RDFa 形式相应地出现在页面中。\n\n\
  **清单 28-1.** 在 `user.module` 中定义的用户实体类型的 RDF 映射结构\n\n```\n/**\n * 实现 hook_rdf_mapping()。\n\
  \ */\nfunction user_rdf_mapping() {\n  return array(\n    array(\n      'type' =>\
  \ 'user',\n      'bundle' => RDF_DEFAULT_BUNDLE,\n      'mapping' => array(\n  \
  \      'rdftype' => array('sioc:UserAccount'),\n        'name' => array(\n     \
  \     'predicates' => array('foaf:name'),\n        ),\n        'homepage' => array(\n\
  \          'predicates' => array('foaf:page'),\n          'type' => 'rel',\n   \
  \     ),\n      ),\n    ),\n  );\n}\n```\n\nRDF 映射生命周期的第二层发生在内容类型和其他包上（参见 第 18 章）。实体类型本身永远不会被实例化；它们首先经过一层特化，成为包，此时可以获得其他可选特性，例如修订版本、评论、分类法，以及最重要的字段。一个属性集较小的实体类型，可以根据站点管理员的需求，通过一组可定制的字段进行扩展。字段可以通过\
  \ Drupal 7 核心自带的字段用户界面附加到包上。\n\n也可以通过编程方式实现同样的功能，例如在 Drupal 7 的标准版配置文件中就是这样。节点是理解包概念的理想用例：当使用标准版配置文件安装\
  \ Drupal 7 时，你会发现两个预定义的内容类型：`Article` 和 `Basic Page`，它们只是节点实体类型的两个包。虽然这两种内容类型共享一些属性（如\
  \ `title` 和 `date`），但它们的字段集合不同。例如，`Basic Page` 包含一个标题和一个正文，而 `Article` 则附带一些额外的字段：标签和图片。每个包都会继承其父实体类型的\
  \ RDF 映射结构。\n\n这在节点的情况下非常方便，因为某些属性是所有包共有的且不易改变（例如 `title` 和 `date`）。与为每个实体定义 RDF\
  \ 映射的方式类似，也可以在必要时为每个包定义 RDF 映射。大多数情况下，由于每个包继承了实体类型的 RDF 映射结构，只需为特定于包的字段指定 RDF 映射即可，如\
  \ 清单 28-2 所示。请注意，这里仅需指定特定字段的 RDF 映射。\n\n**清单 28-2.** 标准安装配置文件中为 Article 包指定的 RDF\
  \ 映射结构\n\n```\narray(\n  'type' => 'node',\n  'bundle' => 'article',\n  'mapping'\
  \ => array(\n    'field_image' => array(\n      'predicates' => array('og:image',\
  \ 'rdfs:seeAlso'),\n      'type' => 'rel',\n    ),\n    'field_tags' => array(\n\
  \      'predicates' => array('dc:subject'),\n      'type' => 'rel',\n    ),\n  ),\n\
  )\n```\n\n请注意，包和实体类型的 RDF 映射结构是相似的，唯一的区别是：影响实体类型的 RDF 映射结构必须将 `RDF_DEFAULT_BUNDLE`\
  \ 指定为包键的值。相比之下，针对包的 RDF 映射结构应明确声明该映射是针对哪个包的。\n\n\n好的，作为高级文档工程师和翻译员，我将严格按照您的要求，完成以下翻译任务。\n\
  \n\n#### 理解 RDF 映射的结构\n\nRDF 映射是一个嵌套的关联数组，用于定义 Drupal 内部属性与有意义的 RDF 谓词之间的关系。这些谓词旨在被外部应用程序理解并与之互操作。一个映射结构包含三个必需的键。`type`\
  \ 和 `bundle` 键分别指代实体类型和 RDF 映射所属的 *bundle*。第三个键是 `mapping`，它列出了应映射到 RDF 的 Drupal\
  \ 属性。\n\n除了之前描述的特殊的 `rdftype` 键之外，其他键要么指代 Drupal 自定义属性（`title`、`date`、`author`），要么指代由核心\
  \ Field 模块定义的字段。每个项目都包含一个数组，在 `predicates` 键中列出了此属性的 RDF 谓词。当处理字符串值（例如节点的标题，或代码清单\
  \ 28-1 中用户的名称）时，这样做就足够了。但是，当处理引用带有 URI 的其他资源（链接、图像或另一个实体）的属性时，开发者应该为映射元素指定一个 `type`。此类型指明了两个资源之间相对于所使用的\
  \ RDF 谓词的关系方向。\n\n在大多数情况下，`type =>rel` 是必需的；`rel` 关系表示父 HTML 元素是主语。例如：\n\n```\n\
  <div>Lora is interested in <a rel=\"foaf:interest\" href=\"http://drupal.org\">Drupal</a></div>\n\
  ```\n\n声明了用户 Lora 对 Drupal 感兴趣。\n\n当需要反向关系时，可以使用 `rev` 值，如下所示：\n\n```\n<div about=\"\
  http://drupal.org\">Drupal is interesting to <a rev=\"foaf:interest\" href=\"user/5\"\
  >Lora</a></div>\n```\n\n这种方向上的细微差别继承自基于有向图的 RDF 模型。通常，使用 `rel` 类型会更简单；很少有开发者需要使用反向类型。因此，您只需要记住为任何非字符串链接使用\
  \ `rel` 类型。\n\n回到代码清单 28-2，Drupal 7 标准安装配置文件将 `article` bundle 的 `field_image` 映射到\
  \ `og:image` RDF 谓词。换句话说，它通过 `og:image` 有向关系将每个文章节点链接到其图像。此关系会自动以 RDFa 的形式反映在页面的\
  \ HTML 输出中，清晰地帮助任何应用程序（例如搜索引擎）理解哪些图像与文章相关联。同样的情况也适用于 `field_tags` 字段映射元素，它通过 `dc:subject`\
  \ 谓词在文章与其涵盖的主题之间建立了明确的语义关系。一旦这些关系在 RDF 映射结构中建立起来，RDF 模块将负责将它们添加到 HTML 标记中需要的位置；开发者无需担心\
  \ RDFa 元素的放置问题。\n\n##### 使用 RDF 映射结构\n\nDrupal 开发者基本上有两种选择来处理 RDF 映射。鼓励创建自己实体类型和\
  \ bundle 的模块开发者使用 `hook_rdf_mapping()` 来将 RDF 谓词与其属性关联起来。Drupal 核心模块（即 Node、User、Comment\
  \ 和 Taxonomy）可作为参考。\n\n其次，为了保持 Drupal 的可扩展性和灵活性传统，RDF 模块还提供了 API 函数来修改模块定义的 RDF\
  \ 映射。标准安装配置文件正是使用这些函数，在通过 Field API 创建图像和标签字段并将其附加到 `article` bundle 后，立即为这些字段添加\
  \ RDF 映射。所有使用这些 CRUD 函数定义的 RDF 映射都存储在数据库中。CRUD 函数 `rdf_mapping_load()`、`rdf_mapping_save()`\
  \ 和 `rdf_mapping_delete()` 可用于指定新 bundle 和字段的 RDF 映射，以及修改已保存到数据库（在模块安装时保存）且不通过 CRUD\
  \ API 无法修改的现有 RDF 映射。代码清单 28-3 是一个修改 `article` 内容类型某些映射的示例。请注意，只需要指定要更改的字段的 RDF\
  \ 映射。\n\n**代码清单 28-3.** 修改某些 RDF 映射的 PHP 代码示例\n\n```\n$article_rdf_mappings = array(\n\
  \  'type' => 'node',\n  'bundle' => 'article',\n  'mapping' => array(\n    'field_image'\
  \ => array(\n      'predicates' => array('og:image', 'rdfs:seeAlso'),\n      'type'\
  \ => 'rel',\n    ),\n    'field_tags' => array(\n      'predicates' => array('dc:subject'),\n\
  \      'type' => 'rel',\n    ),\n  ),\n);\nrdf_mapping_save($article_rdf_mappings);\n\
  ```\n\n##### Drupal 7 中的 RDF 词汇表\n\n正如您之前所见，网络上已经存在许多模式，其中一些被搜索引擎等应用程序很好地理解。Drupal\
  \ 7 使用的主要词汇表如下：\n\n*   **都柏林核心** 适用于通用文档、新闻文章或出版日期等在线媒体。参见 [`http://dublincore.org/documents/dcmi-terms/`](http://dublincore.org/documents/dcmi-terms/)\
  \ 上的都柏林核心规范。\n*   **朋友的朋友 (FOAF)** 描述了人与人之间的关系，以及他们的姓名、地址、照片、位置，以及他们的社交网络属性，如电子邮件、主页、OpenID\
  \ 或兴趣爱好。FOAF 还包含一些更广泛的术语来定义文档、组织、群组及其成员以及项目。参见 [`http://xmlns.com/foaf/spec/`](http://xmlns.com/foaf/spec/)\
  \ 上的 FOAF 规范。\n*   **语义互联在线社区 (SIOC)** 用于对在线创建的内容与创建这些内容的用户之间的联系进行建模。它可以描述多种讨论渠道，例如论坛、博客、投票和一般新闻。参见\
  \ [`http://rdfs.org/sioc/spec/`](http://rdfs.org/sioc/spec/) 上的 SIOC 规范。\n*   **简单知识组织系统\
  \ (SKOS)** 专门用于表示和共享知识组织系统，如叙词表、分类法、主题词系统和分类方案。它非常适合 Drupal 的分类法，无论是用于受控词汇表还是自由标签。参见\
  \ [`www.w3.org/TR/skos-reference/`](http://www.w3.org/TR/skos-reference/) 上的 SKOS\
  \ 规范。\n\n图 28-4 描绘了这些词汇表在 Drupal 7 中的原生使用方式。\n\n![images](img/2804.jpg)\n\n**图 28-4.**\
  \ Drupal 7 中定义的默认 RDF 映射\n\n模块可以通过实现 `hook_rdf_namespaces()` 来添加新的命名空间及其关联的前缀。代码清单\
  \ 28-4 中的代码片段将 WGS84 地理定位命名空间添加到 Drupal，该命名空间将与 HTML 输出中由其他模块定义的其他命名空间一起序列化。然后，在使用\
  \ WGS84 地理定位词汇表定义 RDF 映射时，可以使用前缀 `geo`。\n\n**代码清单 28-4.** `user.module` 中定义的用户实体类型的\
  \ RDF 映射结构\n\n```\nfunction mymodule_rdf_namespaces() {\n  return array(\n    'geo'\
  \  => 'http://www.w3.org/2003/01/geo/wgs84_pos#',\n  );\n}\n```\n\n\n\n### 使用贡献模块在\
  \ Drupal 核心之外应用 RDF\n\n前面章节仅介绍了 Drupal 7 核心 API 支持的功能，但贡献模块还提供了更多功能。以下是一些扩展 Drupal\
  \ 7 RDF 能力的贡献项目。这些项目发展迅速，请查阅其项目页面上的最新说明以获取最新信息。\n\n`RDF Extensions` 项目（下载地址：[`http://drupal.org/project/rdfx`](http://drupal.org/project/rdfx)）提供了一套实用模块，可直接与\
  \ Drupal 7 核心 RDF 模块交互。偏好使用用户界面而非编写代码的网站管理员，可通过`RDF UI`模块修改 RDF 映射，如图 28–5 所示。该软件包还提供更多\
  \ RDF 序列化格式，如 RDF/XML、N-Triples 和 Turtle。\n\n![images](img/2805.jpg)\n\n**图 28–5.**\
  \ `RDF Extensions` 用户界面允许网站管理员无需编写代码即可编辑 RDF 映射。\n\n`SPARQL` 项目可通过索引所有 RDF 数据，将你的\
  \ Drupal 网站转变为 SPARQL 端点。网站管理员还可以注册其他模块可用的外部端点来获取数据。`SPARQL` 软件包还公开了一个 API，供其他模块即时运行\
  \ SPARQL 查询，而无需担心在本地设置 SPARQL 端点。下载`SPARQL`请访问 [`drupal.org/project/sparql`](http://drupal.org/project/sparql)。\n\
  \n`SPARQL Views` 是一个针对`Views 3`的查询插件，允许你将 SPARQL 端点的数据导入`Views`。下载`SPARQL Views`请访问\
  \ [`http://drupal.org/project/sparql_views`](http://drupal.org/project/sparql_views)。\n\
  \n`Examples` 项目包含一个展示 RDF 映射示例的模块。下载`Examples`请访问 `http://drupal.org/project/examples`。\n\
  \n### 本章小结\n\n在本章中，你学习了资源描述框架，这是一个抽象数据模型，用于描述信息并以主语-谓语-宾语表达式的形式对 Web 资源进行陈述。你还了解了如何将\
  \ RDF 直接嵌入 XHTML 和 HTML5 中，以注解其包含的信息片段，从而使机器更容易理解手头的内容，这反过来帮助互联网用户找到他们需要的信息。\n\n\
  你已看到 Drupal 7 如何通过 RDF 映射在其内部数据建模中使用 RDF，以及这些结构化信息如何在 HTML 渲染过程中呈现。许多 RDF 映射已针对通用内容类型默认设置；例如，博客和文章包含作者、标签和评论。更复杂或特定领域的网站可以利用\
  \ Drupal 的 RDF 映射 API 来添加新的词汇表，并为其数据选择合适的映射。\n\n![images](img/square.jpg) **提示**\
  \ 语义网技术正热门。请让你的机器访问 `dgd7.org/semantic`，以了解 Drupal 社区对新技术发展的看法。\n\n## 第 29 章\n\n\
  ![images](img/squ.jpg)\n\n## 菜单系统与 Drupal 路径\n\n**作者：Robert Douglass**\n\n一个通用且易于理解的架构为广泛的社区参与奠定了基础，Drupal\
  \ 的菜单系统就是例证——它负责将 Drupal 网站上的路径与网站向访问者返回的内容关联起来。\n\n开放的设计使得 Drupal 内部简单且可扩展的架构转化为社区层面的高度参与。\n\
  \n本章将探讨促成 Drupal 开放性和灵活性的特性之一。它是一个调度器，负责接收传入的 Drupal 路径并将其映射到回调函数。在此过程中，它会解决所有访问控制问题，并加载所需的数据对象。Drupal\
  \ 将此称为菜单系统，因为这些路径也可用于构建网站的可见导航结构（即菜单）。^(1)\n\n每个 Web 应用程序都会以某种方式解决 URL 调度和访问控制问题，因此菜单系统本身的存在并非开创性。菜单系统的精妙之处在于其低入门门槛，以及它能够深入到代码库的每个角落，修改、扩展或替换已有内容的能力。\n\
  \n### 通过示例理解 Drupal 菜单系统\n\nDrupal 开发人员的一个典型入门任务是集成一些现有代码，并使其输出在 Drupal 网站上下文中显示。此任务的要求包括：Drupal\
  \ 应用程序需完全加载（包括用户认证和数据库连接），包含输出的页面需有自己的 Drupal 路径，并且该页面需在 Drupal 网站的可见导航中可用。\n\n\
  代码清单 29–1 展示了在 XHTML 页面上下文中显示一条离谱消息所需的代码。它位于一个名为`outrageous`的假设模块中，并满足了上述三个要求。\n\
  \n__________\n\n¹ 当前的菜单系统首次在 Drupal 6 中添加，由 Károly Négyesi 在 Peter Wolanin 的协助下构思并实现。此后许多人也为其做出了贡献。\n\
  \n**代码清单 29–1.** *一条离谱的消息*\n\n```php\n<?php\n\nfunction outrageous_menu() {\n  $items['outrageous']\
  \ = array(\n    'title' => 'Outrageous message',\n    'access callback' => TRUE,\n\
  \    'page callback' => 'outrageous_message',\n  );\n\n  return $items;\n}\n\nfunction\
  \ outrageous_message() {\n  // 创建一条离谱的消息。基于 Gill Davies 的一句引言。\n  // t() 是一个包装函数，允许文本本地化。\n\
  \  $message = t('A teddy bear is a cuddle with four paws on the end.');\n\n  //\
  \ 获取格式化日期。\n  $time = date('M d, Y');\n\n  $page = array(\n    '#markup' => \"$time:\
  \ $message\",\n  );\n\n  return $page;\n}\n```\n\n![images](img/2901.jpg)\n\n**图\
  \ 29–1.** 代码清单 29–1 中的代码定义了一个路径`outrageous`，该路径在一个完全启动的 Drupal 应用程序中显示一条离谱消息。在主导航菜单中创建了一个链接，用于访问`outrageous`页面。\n\
  \n在代码清单 29–1 中，第一个函数`outrageous_menu()`定义了页面的路径、页面标题、访问条件以及将生成页面内容的回调函数。所有这些都以一个简单的\
  \ PHP 数组形式呈现。第二个函数`outrageous_message()`生成如图 29–1 所示的内容区域中显示的输出。\n\n这段代码位于一个名为`outrageous.module`的文件所代表的模块中。`outrageous_menu()`函数是核心\
  \ Drupal 钩子`hook_menu()`的一个实现。^(2) 命名约定规定：如果你的模块名为`outrageous`，而钩子通常被称为`hook_menu`，那么函数名`outrageous_menu()`就是要被调用的函数。每当\
  \ Drupal 构建用于将 Drupal 路径调度到回调函数的数据库菜单路由表时，`hook_menu()`的实现就会被调用。基于“模块名”加“钩子名”的命名约定来调用函数的模式在\
  \ Drupal 中被广泛使用。\n\n__________\n\n² 有关 Drupal 钩子的更多信息，请参阅 `api.drupal.org/api/group/hooks`。特别是关于\
  \ `hook_menu` 的更多信息，请参见 `api.drupal.org/api/function/hook_menu/6`。\n\n**DRUPAL 的钩子**\n\
  \n代码清单 29–1 引入了钩子的概念。钩子是 Drupal 运行的基础，而菜单钩子仅仅是编写 Drupal 模块的开发人员可用的众多钩子之一。\n\n\n\n\
  #### Drupal 钩子与菜单系统\n\n本质上，钩子是 Drupal 与其模块之间的一种契约，规定了在页面执行的特定节点，将以特定参数调用某些函数。这些函数的命名遵循一种约定，即使用模块名和钩子名动态生成要调用的\
  \ PHP 函数名称。清单 29–1 中的模块定义在 `outrageous.module` 文件中，因此 Drupal 知道其模块名为 `outrageous`。当页面执行到需要调用某个钩子的节点时，Drupal\
  \ 会获取 `outrageous` 以及所有其他已启用的模块，并对每个模块调用 `outrageous_hookname()`。因此，在编译菜单路由器表时，Drupal\
  \ 会调用 `hook_menu`，而 `outrageous_menu()` 就是被调用的函数之一。\n\n整个机制得益于 PHP 能够在运行时感知其可用的函数。PHP\
  \ 函数 `function_exists($function_name)` 使得 Drupal 能够在页面执行过程中，在实际调用某个函数之前检查该函数是否存在。\n\
  \n所有进入 Drupal 的请求都指向一个单一的入口点，即位于 Drupal 基础目录下的 `index.php` 文件。然而，在示例或许多 Drupal 站点上这一点并不明显，因为\
  \ Web 服务器会在后台不断重写传入的 URL，使其指向 `index.php`。因此，`http://example.com` 这样的 URL 会被重写为\
  \ `http://example.com/index.php`。URL 的其余部分被称为 Drupal 路径。它也会被重写，所以 `http://example.com/outrageous`\
  \ 在内部会被表示为 `http://example.com/index.php?q=outrageous`。Drupal 将 `q` 参数称为路径，在此例中路径就是\
  \ `outrageous`。\n\n根据清单 29–1 中的代码，`http://example.com/outrageous` 这个 URL 会映射到内部路径\
  \ `outrageous`，并根据数组键 `$items['outrageous']` 匹配到 `outrageous_menu()` 函数中定义的菜单项。一旦调度器将传入路径匹配到菜单路由器表中的相应条目，就会寻找一个回调函数。在此例中，该函数在\
  \ `$items` 数组中通过键 `'page callback'` 定义，并将调用 `outrageous_message()` 函数。\n\n`$items`\
  \ 数组还定义了一个将在页面上显示的标题。这里的标题是一个硬编码字符串，但后面的示例会展示如何通过回调动态生成标题。\n\n对此菜单路由器项的访问权限通过键 `'access\
  \ callback'` 设置。该键的值可以是布尔值（此例中 `TRUE` 表示所有人都有权限），也可以是一个必须返回布尔值的回调函数名。\n\n你可以在图 29–1\
  \ 中看到，站点导航菜单中出现了一个可见的导航项。虽然此处未涉及，但此导航项及其他导航项目都可以通过 Drupal 的管理界面进行配置、重命名、隐藏或移动。网站的最终决定权在于站点管理员，而非开发者。\n\
  \n以下是从 URL 到 Drupal 页面的所有步骤，按顺序列出：\n\n1.  `http://example.com/outrageous` 被重写为 `http://example.com/index.php?q=outrageous`。\n\
  2.  `q` 参数 `outrageous` 被识别为 Drupal 路径。\n3.  基于该路径，选择最初由示例代码中 `$items['outrageous']`\
  \ 定义、现已在运行时从数据库加载的菜单路由器项来处理此页面回调。\n4.  根据菜单路由器的 `'access callback'` 项进行访问检查。其值为\
  \ `TRUE`，因此允许访问。\n5.  页面标题根据菜单路由器的 `'title'` 项设置。标题现在是“Outrageous message”。\n6.\
  \  调用页面回调参数中指定的函数 `outrageous_message`。该函数定义了此特定页面内容区域中显示的内容。\n7.  Drupal 使用表示层和应用程序的配置构建页面的其余部分。这就是图\
  \ 29–1 中的徽标、导航菜单和阴影区域的来源。\n\n![images](img/2902.jpg)\n\n**图 29–2.** 处理从 URL 到页面输出的请求\n\
  \n刚接触 Drupal 的 Web 开发人员通常能立即理解此示例的精髓，并体验到能够自由编写代码且让代码在 Drupal 中适时包含并执行的满足感。所需的不过是一个简单的\
  \ PHP 数组和一些生成输出的代码。第一个入门障碍已被克服，并且 Drupal 已被扩展。\n\n### 菜单路由器项\n\nDrupal 数据库中的表之一是\
  \ `menu_router` 表。在清单 29–1 中，你已经看到菜单路由器项由路径及描述路径行为的元数据组成。所有已安装并启用的模块中的所有菜单路由器项定义都会存储在该\
  \ `menu_router` 数据库表中。\n\n#### 无限路径\n\n在清单 29–1 中，Drupal 路径是 `outrageous`。菜单系统的一个实用特性是此路径是开放式的。相同的回调定义也将匹配并处理路径\
  \ `outrageous/dog/friend`。路径会根据斜杠被拆分成多个段，而每个超出 `outrageous` 的段都将作为参数传递给回调函数。在清单\
  \ 29–2 中，回调函数已被重写以接受并使用两个参数。如果没有参数，其工作方式与图 29–1 中相同。\n\n**清单 29–2.** 来自 Drupal 路径中包含两个参数的\
  \ Outrageous Message：`http://localhost/outrageous/dog/friend`\n\n```\n/**\n * 现在带有参数，默认值为消息的原始版本。\n\
  \ */\nfunction outrageous_message($animal = 'teddy bear', $noun = 'cuddle') {\n\
  \  // 创建一个离谱的消息模板。基于 Gill Davies 的一句话。\n  $message = 'A %animal is a %noun with\
  \ four paws on the end.';\n\n  // 将 %animal 和 %noun 占位符替换为 $animal 和 $noun 参数。\n\
  \  // t() 包装器不仅允许本地化，还执行了占位符替换。\n  // t() 还保证了 $animal 和 $noun 是纯文本，从而防范 XSS 攻击。\n\
  \  $message = t($message, array('%animal' => $animal, '%noun' => $noun));  \n\n\
  \  // 获取格式化后的日期。\n  $time = date('M d, Y');\n\n  $page = array(\n    '#markup' =>\
  \ \"$time: $message\",\n  );\n\n  return $page;\n}\n```\n\n![images](img/2903.jpg)\n\
  \n**图 29–3.** 消息由 Drupal 路径中的路径段组合而成。\n\n\n\n#### 路径的结构\n\n在某些情况下，能够向回调函数传递任意参数是可以接受的，但通常需要更细致和精确的方法。Drupal\
  \ 中的一个典型模式是使用数据对象的主键标识符来引用它们（在 Drupal 术语中称为实体）。Drupal 中内容的主要对象类型称为节点（node），这只是对文章、博客帖子、图片或日历事件等内容的通用术语。节点具有整数类型的主键标识符。表\
  \ 29–1 中的路径都对节点编号 42 执行了不同的操作。\n\n**表 29–1.** 各种节点路径及其操作\n\n| **路径** | **操作** |\n\
  | --- | --- |\n| `node/42` | 加载并显示节点 #42 |\n| `node/42/edit` | 加载并显示节点 #42 的编辑表单\
  \ |\n| `node/42/revisions` | 显示节点 #42 的修订历史 |\n\n一种模式逐渐显现：\n\n`node + id + action`\n\
  \n在上述每个案例中，路径的第二段表示主键 id，第三段指定操作（而 `node/42` 隐含有“查看”操作）。人们可能会倾向于在单个回调函数中处理这种模式，如\
  \ 清单 29–3 所示。\n\n**清单 29–3.** 不推荐：错误处理节点路径的方式\n\n```\n/**\n * $arg1 对应整数 id。\n *\
  \ $arg2 对应操作。\n */\nfunction node_callback($arg1, $arg2) {\n  // 如果 $arg1 是整数，则用它来加载节点。\n\
  \  if (is_numeric($arg1)) {\n    $node = node_load($arg1);\n  }\n\n  // 如果节点存在，则继续处理。\n\
  \  if ($node) {\n    if ($arg2 == 'edit') ...\n\n    if ($arg2 == 'revisions') ...\n\
  \  }\n}\n```\n\n这种方法有很多缺点：\n\n*   **难以扩展。** 如果你以后想编写一个处理 `node/42/send` 的模块怎么办？如果所有\
  \ `node/integer/action` 类型的路径都由一个函数处理，你就不得不修改该函数或完全替换它。\n*   所有的 `if {…}` 语句使代码变得杂乱。\n\
  *   当你考虑到 Drupal 也能处理的这个路径：`node/add`，整个情况会变得更加复杂。\n\n此路径会显示一个页面，其中包含用于添加新内容的链接。现在，第二个段根本不是整数，因此显然我们需要一种方法来区分路径中所有不同的可能性。\n\
  \n菜单系统非常优雅地处理了这种广泛的动态路径。使用通配符表示法不仅简化了动态路径的处理，也简化了加载公共对象的工作。请参考 清单 29–4 中的 `hook_menu`\
  \ 实现。\n\n**清单 29–4.** 推荐：Drupal 如何处理节点路径\n\n```\n/**\n * 实现 hook_menu()。\n */\n\
  function node_menu() {\n  $items['node/add'] = array(\n    'title' => '添加内容',\n\
  \    'page callback' => 'node_add_page',\n    'access callback' => '_node_add_access',\n\
  \  );\n$items['node/%node'] = array(\n    'title callback' => 'node_page_title',\n\
  \    'title arguments' => array(1),\n    'page callback' => 'node_page_view',\n\
  \    'page arguments' => array(1),\n    'access callback' => 'node_access',\n  \
  \  'access arguments' => array('view', 1),\n  );\n\n  $items['node/%node/edit']\
  \ = array(\n    'title' => '编辑',\n    'page callback' => 'node_page_edit',\n   \
  \ 'page arguments' => array(1),\n  );\n\n  return $items;\n}\n```\n\n这是处理前述节点路径的\
  \ Drupal 实际实现的一个略微简化的版本。原始代码可以在 Drupal 的 `node.module` 文件中找到，根据命名约定，每当 Drupal 需要构建菜单路由表时，就会调用\
  \ `node_menu()`^(3) 函数。\n\n#### 回调函数\n\n这里有几个需要注意的地方。第一个条目映射到路径 `'node/add'`，它使用\
  \ `node_page_add()` 回调来生成一个页面，该页面显示向系统添加各种内容的链接。然而，要访问此页面，用户必须拥有正确的访问权限。用户是否拥有正确的访问权限由函数\
  \ `_node_add_access()` 决定，这由 `'access callback'` 键指定。在 清单 29–1 中，这一项是 `'access callback'\
  \ => TRUE`，这只是表示所有人都可以访问的简写形式。现在，在 清单 29–4 中，有一个将访问控制交给专用回调函数的示例。\n\n![images](img/square.jpg)\
  \ **7 版新特性** Drupal 7 新增了一些元素来修改菜单项的行为。可以定义“delivery callback”让一个自定义函数处理渲染；通常使用默认值\
  \ `drupal_deliver_html_page` 即可。当用你自己的函数替换默认函数时，你需要确保替换函数能处理原函数负责的所有情况。交付回调函数处理访问拒绝、未找到、网站离线以及内容渲染等情况。另一个新元素\
  \ context，允许菜单项被用作上下文链接（参见 第 24 章 的示例）。很少使用的“theme callback”和“theme arguments”元素允许你提供一个函数，以便在该菜单项的页面加载时指定一个不同的主题。有关完整列表及简要说明，请阅读\
  \ API 介绍。^(4)\n\n__________\n\n³ Drupal 的 `node_menu()` 函数：`api.drupal.org/api/drupal/modules--node--node.module/function/node_menu/7`\n\
  \n⁴ `api.drupal.org/api/drupal/modules--system--system.api.php/function/hook_menu/7`\n\
  \n![images](img/2904.jpg)\n\n**图 29–4.** 路径 `node/add` 指向一个页面，其中列出了可以创建的各种内容类型。此页面上的内容由函数\
  \ `node_add_page()` 生成。\n\n菜单路由项 `'node/%node'` 包含一个通配符段 `%node`，它会匹配该段中的任何内容。这个条目会匹配路径\
  \ `node/42`、`node/foo` 等。虽然它通常也会匹配 `node/add`，但在这个例子中不会，因为有一个菜单路由项精确定义了 `node/add`，而精确匹配的优先级高于通配符匹配。\n\
  \n\n\n##### 加载函数\n\n每当菜单系统将传入的 Drupal 路径与一个以 `%node` 这样的标记表示的通配符段匹配时，它就会尝试调用一个特殊的加载函数，以自动加载一个对象供后续的回调函数使用。具体的加载函数由命名约定决定；当百分号后面跟着一个字符串（例如\
  \ `%foo`）时，系统会寻找一个名为 `foo_load()` 的加载函数。`%node` 对应的加载函数是 `node_load()`。因此，路径 `node/42`\
  \ 会调用函数 `node_load(42)`，并将匹配到的整数作为参数传入。其结果是一个完全加载并构建好的 `$node` 对象，其主标识符为 42。这个对象随后可作为参数供各种回调函数使用。在清单\
  \ 29–4 中，它被传递给了负责为当前请求生成内容输出的页面回调函数。在清单 29–5 中，请查看 `'node/%node'` 项对应的页面回调键。\n\n\
  **清单 29–5.** `node/%node` 菜单路由项的详细信息\n\n```\n$items['node/%node'] = array(\n...\n\
  \  'page callback' => 'node_page_view',\n  'page arguments' => array(1),\n...\n\
  );\n```\n\n这些键指示菜单系统使用 `node_page_view()` 作为主页面回调函数，并传入一个参数。该参数通过 `'page arguments'`\
  \ 键来指定，其数组包含了应作为参数的路径段。在此示例中为 `array(1)`，所以应使用路径段 1。路径段编号从零开始，因此 `array(1)` 指的是路径中的\
  \ `%node` 部分。如前所述，这是一个完全加载并构建好的 `$node` 对象，而这个对象将被传入回调函数。对于路径 `node/42` 所执行的代码，功能上等价于以下代码片段：\n\
  \n```\n// 使用参数 42 调用 node 的 _load 函数。\n$node = node_load(42);\n// 使用构建好的 $node 对象调用页面回调函数。\n\
  return node_page_view($node);\n```\n\n让我们再看一下 `'node/%node'` 菜单路由的完整定义，如清单 29–6\
  \ 所示。\n\n**清单 29–6.** `node/%node` 菜单路由项\n\n```\n$items['node/%node'] = array(\n\
  \  'title callback' => 'node_page_title',\n  'title arguments' => array(1),\n  'page\
  \ callback' => 'node_page_view',\n  'page arguments' => array(1),\n  'access callback'\
  \ => 'node_access',\n  'access arguments' => array('view', 1),\n);\n```\n\n在清单 29–1\
  \ 中，我们的菜单路由项有一个 `'title'` 键，标题在其中直接设置。而 `'node/%node'` 菜单路由项则使用了 `'title callback'`\
  \ 和 `'title arguments'` 键作为替代。这些键允许动态设置页面的标题。负责设置标题的回调函数是 `node_page_title()`，并且与\
  \ `node_page_view()` 一样，它也接收同一个已加载的 `$node` 对象，正如 `'title arguments' => array(1)`\
  \ 所指定的那样。通过这种方式，页面的标题可以利用 `$node` 对象中的动态信息来生成。\n\n同样地，该菜单路由项的访问回调函数也接收一些参数，其中之一就是动态加载的\
  \ `$node` 对象。根据 `'access callback'` 和 `'access arguments'` 键，系统将执行类似于以下代码片段的操作，以判断发起请求的用户是否有权访问\
  \ `'node/4711'` 路径：\n\n```\n// 段 1 被传入 %node 的加载函数。\n$node = node_load(4711);\n\
  // 加载的 $node 对象被传入访问回调函数。\nreturn node_access('view', $node);\n```\n\n`'node/%node'`\
  \ 菜单路由项是一个极好的例子，展示了如何通过一个相对简单的元数据数组，将回调函数及其参数进行关联，从而串联起大量的功能。菜单系统负责处理数据对象的加载以及回调函数的调用，以设置页面标题、检查当前用户是否有权访问该路径，并生成页面内容。\n\
  \n开发者通过菜单路由项的定义向系统描述应该发生什么，但所有这一切究竟是如何最终实现的，则在幕后处理。这种方式——使用数据数组来描述期望的行为——相比于直接编写几行代码来加载并显示节点，其优势将在后面讨论\
  \ `hook_menu_alter` 时体现出来。开发者能够重新连接菜单路由项（甚至包括 Drupal 核心中描述的那些），这对于让贡献模块有机会在需要时改变任何事物至关重要。请记住，即使是最异想天开的想法，“通过贡献模块实现”也必须是一个可行的选择。\n\
  \n\n\n#### 适配度\n\n当一个路径能够被多个菜单路由项匹配时，会发生什么？如何选择真正匹配的那一项？哪一个项最适合处理给定的请求？考虑路径 `node/12345/edit`。该路径可以被以下来自\
  \ 清单 29-4 的两个菜单路由项同时匹配：\n\n`$items['node/%node']`\n`$items['node/%node/edit']`\n\
  \n`node/%node` 项被认为是 `node/%node/edit` 的祖先，因为它们除了最后一个段 `edit` 之外，其余部分完全相同。在搜索用于处理路径的菜单路由项时，Drupal\
  \ 首先计算该路径所有可能的祖先。以下是 `node/12345/edit` 的完整理论祖先列表：\n\n`node/12345/edit`\n`node/12345/%`\n\
  `node/%/edit`\n`node/%/%`\n`node/12345`\n`node/%`\n`Node`\n\n通配符段会被简化，并以占位符 `%`\
  \ 表示。并不能保证这些菜单路由项中的任何一个实际已被定义，但通过生成祖先列表，Drupal 至少知道要查找哪些路由项。这大致转化为如下 SQL：\n\n```sql\n\
  SELECT * FROM menu_router\n  WHERE path IN\n  ('node/12345/edit',\n  'node/12345/%',\n\
  \  'node/%/edit',\n  'node/12345',\n 'node/%',\n 'node')\n```\n\n这将找到所有可以处理请求的可能的菜单路由项，但哪一项是处理\
  \ `node/12345/edit` 的最佳选择呢？这里就引入了适配度的概念。任何菜单路由项路径都会被按段拆分，并转换为一系列 `1` 或 `0`。明确的段（例如\
  \ `node` 或 `edit`）变为 `1`，而通配符变为 `0`。由此得到的 `1` 和 `0` 字符串随后被解释为一个二进制整数，用以计算该菜单路由项的适配度。将这些规则应用于\
  \ `node/12345/edit` 路径的祖先，就得到了 表 29-2 中的列表。\n\n**表 29-2.** Drupal 路径祖先与适配度。来自 `drupal.org/node/109134`\n\
  \n| **路径** | **十进制适配度** | **二进制适配度** |\n| --- | --- | --- |\n| node/12345/edit |\
  \ 7 | 111 |\n| node/12345/% | 6 | 110 |\n| node/%/edit | 5 | 101 |\n| node/%/% |\
  \ 4 | 100 |\n| node/12345 | 3 | 11 |\n| node/% | 2 | 10 |\n| Node | 1 | 1 |\n\n\
  菜单路由数据库表中始终会连同任何路径一起保存十进制适配度值。如下面的 SQL 查询所示，适配度用于对路径进行排序。在任何一组菜单路由项中，具有最高适配度的项将被用来处理给定的请求。因此，由\
  \ `node/12345/edit` 实际生成的 SQL 变为：\n\n```sql\nSELECT * FROM menu_router\n  WHERE\
  \ path IN\n    ('node/12345/edit',\n    'node/12345/%',\n    'node/%/edit',\n  \
  \  'node/12345',\n    'node/%',\n    'node')\n  ORDER BY fit DESC\n  LIMIT 0, 1\n\
  ```\n\n恰好会从实际路径的祖先中选出一个项——即适配度最高的那个。如果查询 `menu_router` 表没有产生任何结果，则会生成一个 404 未找到页面。对于\
  \ Drupal 模块开发者而言，通常无需理解适配度是如何计算的，但正是菜单系统的这个方面使其成为一种优美的架构。\n\n希望这个解构 Drupal 菜单路由路径的练习，能展示出一些可供开发者用于*扩展*\
  \ Drupal 应用程序的工具。在 Drupal 应用程序内部定义新路径、将它们连接到回调函数、预加载对象以及管理访问权限的能力，足以让您添加几乎任何新功能。在下一节中，我将向您展示如何使用\
  \ `hook_menu_alter` 来*修改*现有功能。\n\n#### 修改现有路由项\n\n到目前为止的示例都集中在扩展 Drupal 上。那么如何修改或替换现有功能呢？开发者如何在不改动\
  \ Drupal 核心代码本身的情况下改变其核心行为？Drupal 将其整个菜单路由完全暴露给任何模块，以便其进行更改。实现这一点的机制称为 `hook_menu_alter`。模块可以实现自己的\
  \ `hook_menu_alter` 函数，并简单地更改任何已定义的菜单路由项。\n\n让我们回到本章的第一个例子，那个离谱消息。如果有人为开发离谱消息提出了一个自定义实现，但不想或无法说服离谱模块的维护者相信新实现更好，他可以实现自己的模块，以改变离谱消息的生成方式（见\
  \ 清单 29-7）。\n\n**清单 29-7.** 离谱模块回顾\n\n```php\n<?php\n\nfunction outrageous_menu()\
  \ {\n  $items['outrageous'] = array(\n    'title' => '离谱消息',\n    'access callback'\
  \ => TRUE,\n    'page callback' => 'outrageous_message',\n  );\n\n  return $items;\n\
  }\n\nfunction outrageous_message() {\n  // 创建一条离谱消息。基于 Gill Davies 的一句名言。\n  //\
  \ t() 是一个允许文本本地化的包装器。\n  $message = t('泰迪熊是一个长着四肢的抱抱玩具。');\n\n  // 获取格式化日期。\n  $time\
  \ = date('Y 年 m 月 d 日');\n\n  $page = array(\n    '#markup' => \"$time: $message\"\
  ,\n  );\n\n  return $page;\n}\n```\n\n清单 29-8 中的 `moreoutrageous_menu_alter()` 函数遵循模块名\
  \ + 钩子名的命名约定实现了 `hook_menu_alter`，它接收以 `$items` 数组形式呈现的整个菜单路由项表。\n\n**清单 29-8.**\
  \ 更离谱模块\n\n```php\n<?php\nfunction moreoutrageous_menu_alter(&$items) {\n  // 更改路径\
  \ 'outrageous' 的回调函数。\n  $items['outrageous']['page callback'] = 'moreoutrageous_message';\n\
  }\n\nfunction moreoutrageous_message() {\n  // Károly Négyesi 的劲爆（误）引。\n  $message\
  \ = t('我是一台将橙汁转化为 Drupal 补丁的机器。');\n\n  // 获取格式化日期。\n  $time = date('Y 年 m 月 d 日');\n\
  $page = array(\n    '#markup' => \"$time: $message\",\n  );\n\n  return $page;\n\
  }\n```\n\n`$items` 数组是所有已启用模块中所有 `hook_menu` 实现返回的所有菜单路由项的总和。由于该数组是通过引用传递的，对其进行的任何更改都将持续存在，超出函数的范围。这段代码更改了在离谱模块的\
  \ `outrageous_menu()` 函数中指定的 `'page callback'` 值，并指定该值应改由更离谱模块中的 `moreoutrageous_message()`\
  \ 函数处理。\n\n![images](img/2905.jpg)\n\n**图 29-5.** 更离谱的消息，多亏了 hook_menu_alter\n\n\
  构建菜单路由表是一个相对成本较高的操作。首先调用 `hook_menu`，这会检查所有模块是否实现了相关函数。一旦收集了所有模块的菜单路由项并将其拼接成一个大型数组后，就会调用\
  \ `hook_menu_alter`，为每个模块提供更改该数组的机会。幸运的是，这并不是在每个页面请求时都会执行。只有当 Drupal 应用程序的基本状态发生变化时，才会重建菜单路由表。例如，安装新模块、定义新内容类型或创建新的内容视图。一旦所有菜单路由项的最终数组构建完成，它就会被持久化存储到\
  \ `menu_router` 数据库表中。后续的页面请求可以查询此表来查找回调函数和路由项，直到下一次需要完全重建的时刻到来。\n\n\n\n### 摘要\n\
  \n菜单系统是一款能够提供强大控制力与丰富可能性的工具。它易于掌握，具备不同技能和能力的开发者都能高效使用。它并非扩展或修改 Drupal 的唯一工具。如果你的目标是修改表单，或扩展节点、内容类型的定义与行为，还有其他工具可供选择。将这些工具结合使用，可以在避免修改核心代码的前提下，增强和改变\
  \ Drupal 的核心功能与行为。正是由于拥抱了这种对开放、可访问架构的需求，Drupal 才得以拥有数量庞大的社区参与，成为成千上万人和组织的平台选择，并让数千名开发者成为开源贡献者。\n\
  \n"
