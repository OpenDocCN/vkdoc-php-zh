  trans: "\n输出：`Both are equal.`  \n原因：**宇宙飞船运算符**（PHP7+ 中可用）在 `$a < $b` 时返回 `-1`，`$a`\
    \ 等于 `$b` 时返回 `0`，`$a > $b` 时返回 `1`。所示的 `if` 语句用于判断宇宙飞船运算符返回的状态，并显示相应的结果。此处展示了使用\
    \ `if/else/elseif` 结构来判断一系列可能的值。更多示例将在后续章节中展示。\n\n**逻辑运算符**允许你在条件语句中提出多个问题。让我们看几个例子：\n\
    \n1.\n```\n输出：Some or all of us are equal.\n原因：或运算符的两侧均为真。如果**或运算符**的任一侧或两侧为真，则整个表达式为真。\n\
    *注意：符号 || 也可以用来代替 or。*\n```\n\n2.\n```\n输出：All of us are equal.\n原因：使用**与运算符**时，表达式的两侧必须都为真，整个表达式才为真。在这个例子中，两侧都为真。\n\
    *注意：符号 && 也可以用来代替 and。*\n```\n\n3.\n```\n输出：Someone is not equal.\n原因：使用**异或运算符**（xor）时，表达式中只能有一侧为真。在这个例子中，两侧都为真，因此结果为假。如果这是一个或语句，结果将为真。\n\
    ```\n\n4.\n```\n输出：Everyone is equal.\n原因：**非表达式**（!）将结果取反。这个异或（xor）因为两侧都为真而返回假。但是，非操作将结果反转为真。\n\
    ```\n\n**问号运算符**是条件 `if-then-else` 语句的一种简洁编码形式。\n\n```\n输出：They are equal.\n原因：如果比较结果为真，则执行放在\
    \ `?` 和 `:` 之间的语句。如果结果为假，则执行放在 `:` 和 `;` 之间的语句。由于比较语句左侧有一个 `print` 命令，所以比较结果会被打印出来。`$a`\
    \ 和 `$b` 值相同；因此，显示第一个字符串。\n```\n\n```\n$a <=> $b ? \"They are equal\" : \"$a is\
    \ greater than $b\" : \"$b is greater than $a\";\n?>\n```\n\n输出：`36 is greater\
    \ than 24.`  \n原因：在 PHP 7.5+ 中，你还可以使用**太空船运算符**来评估相等（`0`）、大于（`-1`）和小于（`1`）。这种比较方式非常简洁高效，用于判断值是否相等，或者哪个更大。由于\
    \ `$a` 大于 `$b`，因此显示两个冒号（`:`）之间的语句。如果 `$a` 小于 `$b`，则显示最后一个冒号和分号之间的语句。否则，当值相等时，显示问号（`?`）和第一个冒号之间的语句。\n\
    \n让我们看一下 PHP 8 中一些无效的比较以及产生的错误信息。\n\n1.\n```\n\"ten\" > \"eleven\";\n```\n结果：错误：\"\
    Unsupported type string for comparison\"。\n\n2.\n```\n\"eleven\" > 10;\n```\n\
    结果：错误：\"Operator type mismatch string and int for comparison\"。\n\n3.\n```\n\"\
    ten\" == 10;\n```\n结果：错误：\"Operator type mismatch string and int for comparison\"\
    。\n\n4.\n```\n\"120\" > \"99.9\";\n```\n结果：错误：\"Unsupported type string for comparison\"\
    。\n\n5.\n```\n\"120\"  \"99.9\";\n```\n结果：错误：\"Unsupported type string for comparison\"\
    。\n\n**switch 语句**可用于在判断变量中的值时，消除嵌套的 `if-then-else` 语句。\n\n```\nswitch (value\
    \ to compare) {\ncase value:\n// code to execute if true\nbreak;\ncase value;\n\
    // code to execute if true\nbreak;\ndefault:\n// code to execute if there are\
    \ no matches\nbreak;\n}\n```\n\n`switch` 语句的结构要求在每种可能情况的末尾使用 `break` 命令（`break;`）。在每个\
    \ case 的头部，比较值之后使用冒号（`:`）。\n\n```\n输出：Number was not found.\n原因：值 36 没有被任何 case\
    \ 语句捕获到。PHP 会在可能的情况下进行类型转换。在这个例子中，它会比较字符串中的值与提供的数字。由于没有匹配项，程序流程会进入 default 语句。default\
    \ 语句的作用类似于 else 语句；它会捕获所有剩余的可能性。在所有 case 结构中包含一个 default 语句是一个好习惯，用于处理意外值，而不是可能导致异常情况的发生。\n\
    ```\n\n**动手实践**\n\n1. 创建一个程序，使用条件语句来判断字符串中包含的颜色。如果颜色是绿色，则显示\"I love the earth\"\
    。如果颜色是蓝色，则显示\"The sky is beautiful\"。如果颜色是黄色或橙色，则显示\"I love sunsets\"。对于任何其他颜色，显示\"\
    selectedcolor is my favorite color\"。将 selectedcolor 替换为所选的颜色。提示：你可以将变量放在字符串内部。\n\
    2. 使用 switch 语句完成第 1 题。\n3. 创建一个程序，判断给定的数字是偶数还是奇数。如果是偶数，则计算其平方（2 次幂）并显示。如果是奇数，则计算其立方（3\
    \ 次幂）并显示。\n\n## 函数\n\n除了 PHP 自带或易于导入的数千个内置函数供你使用之外，你还可以创建自己的函数。\n\n```\nfunction\
    \ function_Name(attribute1, attribute2, ...) {\n// code goes here\n}\nfunction_name(attribute,\
    \ attribute, ...);\n// next statement after function has completed\n```\n\n这里展示了函数的一般格式。`function`\
    \ 关键字是小写的。你为函数提供的名称使用与变量几乎相同的格式，但不需要包含 `$`。变量或值可以作为参数在括号中传递给函数。所有代码都放在花括号 `{}`\
    \ 之间。使用函数名并传递任何必需的属性来调用函数。当函数被调用时，程序的执行会跳转到该函数。所有代码执行完毕后，程序流程会跳转到函数调用之后的指令。\n\n\
    让我们看一些例子：\n\n1.\n```\n输出：Hello\n原因：没有值被传递到函数中。但是，print 语句被执行了。\n```\n函数也可以放在代码的底部。但是，要保持一致。要么将你的函数放在代码的顶部，要么放在底部。函数也可以包含在一个单独的文件中，然后导入到主\
    \ PHP 程序中。我们很快就会看到这个例子。\n\n2.\n```\n输出：Hello\n原因：这个例子完成了相同的任务。但是，它允许用户传递要显示的值，从而增加了一些灵活性。注意，调用函数时，字符串在括号内传递。该字符串将落入变量\
    \ `$value` 中（它根据传递的位置决定值去往何处）。函数中的 `print` 语句随后使用变量 `$value` 来显示信息。这个函数实际上可以显示几乎任何传递进来的内容（包括数字），即使它被命名为\
    \ `display_hello`。\n```\n\n3.\n```\n输出：Your first name is James.\nYour first name\
    \ is Jackie.\nYour last name is Jones.\n原因：前面的 `display_names` 函数接受两个值（`$first_name`，`$last_name`）。但是它也为第二个参数提供了一个默认值。在第一次调用函数时，\"\
    James\" 将传入 `$first_name`。由于没有传入第二个参数，`$last_name` 将包含 \"none\"。将会显示 \"Your first\
    \ name is James\"。`if` 语句会判断第二个值未被传递，因此不会尝试显示 `$last_name`。在第二次调用中，两个值都被传递了。\"\
    Jackie\" 将传入 `$first_name`。\"Jones\" 将传入 `$last_name`。该函数将显示 \"Your first name\
    \ is Jackie\" 和 \"Your last name is Jones\"。\n```\n"
- fmt: "```php\nOutput: 26\n```\n\n**Why:** In the `addtwo` example, two numerical\
