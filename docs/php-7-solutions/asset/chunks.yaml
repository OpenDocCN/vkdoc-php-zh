- fmt: "## Caution\n\nIf you forget to unlock the file before closing it, it remains\
    \ locked to other users and processes, even if you can open it yourself.\n\n##\
    \ Preventing overwriting an Existing File\n\nUnlike other write modes, `x` mode\
    \ won’t open an existing file. It only creates a new file ready for writing. If\
    \ a file of the same name already exists, `fopen()` returns `false`, preventing\
    \ you from overwriting it. The processing code in `fopen_exclusive.php` looks\
    \ like this:\n\n```\n// create a file ready for writing only if it doesn't already\
    \ exist\n// error control operator prevents error message from being displayed\n\
    if ($file = @ fopen('C:/private/once_only.txt', 'x')) {\n    // write the contents\n\
    \    fwrite($file, $_POST['contents']);\n    // close the file\n    fclose($file);\n\
    } else {\n    $error = 'File already exists, and cannot be overwritten.';\n}\n\
    ```\n\nAttempting to write to an existing file in `x` mode generates a series\
    \ of PHP error messages. Wrapping the write and close operations in a conditional\
    \ statement deals with most of them, but `fopen()` still generates a warning.\
    \ The error control operator (`@`) in front of `fopen()` suppresses the warning.\n\
    \nLoad `fopen_exclusive.php` into a browser, type some text, and click Write to\
    \ file. The content should be written to `once_only.txt` in your target folder.\
    \ If you try it again, the message stored in `$error` is displayed above the form.\n\
    \n## Combined Read/Write Operations with `fopen()`\n\nBy adding a plus sign (`+`)\
    \ after any of the previous modes, the file is opened for both reading and writing.\
    \ You can perform as many read or write operations as you like—and in any order—until\
    \ the file is closed. The difference between the combined modes is as follows:\n\
    \n- `r+`: The file must already exist; a new one will not be automatically created.\
    \ The internal pointer is placed at the beginning, ready for reading existing\
    \ content.\n- `w+`: Existing content is deleted, so there is nothing to read when\
    \ the file is first opened.\n- `a+`: The file is opened with the internal pointer\
    \ at the end, ready to append new material, so the pointer needs to be moved back\
    \ before anything can be read.\n- `c+`: The file is opened with the internal pointer\
    \ at the beginning.\n- `x+`: Always creates a new file, so there’s nothing to\
    \ read when the file is first opened.\n\nReading is done with `fread()` or `fgets()`\
    \ and writing with `fwrite()`, exactly the same as before. What’s important is\
    \ to understand the position of the internal pointer.\n\n## Moving the Internal\
    \ Pointer\n\nReading and writing operations always start wherever the internal\
    \ pointer happens to be, so you normally want it to be at the beginning of the\
    \ file for reading and at the end of the file for writing.\n\nTo move the pointer\
    \ to the beginning, pass the file reference to `rewind()` like this:\n\n```\n\
    rewind($file);\n```\n\nTo move the pointer to the end of a file, use `fseek()`\
    \ like this:\n\n```\nfseek($file, 0, SEEK_END);\n```\n\nYou can also use `fseek()`\
    \ to move the internal pointer to a specific position or relative to its current\
    \ position. For details, see [`https://secure.php.net/manual/en/function.fseek.php`](https://secure.php.net/manual/en/function.fseek.php).\n\
    \n## Tip\n\nIn append mode (`a` or `a+`), content is always written to the end\
    \ of the file regardless of the pointer’s current position.\n\n## Exploring the\
    \ File System\n\nPHP’s file system functions can also open directories (folders)\
    \ and inspect their contents. From the web developer’s point of view, practical\
    \ uses of the file system functions include building drop-down menus that display\
    \ the contents of a folder and creating a script that prompts a user to download\
    \ a file, such as an image or PDF document.\n\n## Inspecting a folder with `scandir()`\n\
    \nThe `scandir()` function returns an array consisting of the files and folders\
    \ within a specified folder. Just pass the path name of the folder (directory)\
    \ as a string to `scandir()` and store the result in a variable like this:\n\n\
    ```\n$files = scandir('../images');\n```"
