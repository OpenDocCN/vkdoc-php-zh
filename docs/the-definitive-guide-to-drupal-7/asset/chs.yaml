  ></span>项目 4</li>\n  <li class=\"ui-state-default\"><span class=\"ui-icon ui-icon-arrowthick-2-n-s\"\
  ></span>项目 5</li>\n  <li class=\"ui-state-default\"><span class=\"ui-icon ui-icon-arrowthick-2-n-s\"\
  ></span>项目 6</li>\n  <li class=\"ui-state-default\"><span class=\"ui-icon ui-icon-arrowthick-2-n-s\"\
