    `__destruct()`\n |\n  Called when object has no references left.\n |\n\n`__call($name,\
    \ $array)`\n |\n  Called when invoking inaccessible methods in an object context.\n\
    \ |\n\n`__callStatic($name, $array)`\n |\n  Called when invoking inaccessible\
    \ methods in a static context.\n |\n\n`__get($name)`\n |\n  Called when reading\
    \ data from inaccessible properties.\n |\n\n`__set($name, $value)`\n |\n  Called\
    \ when writing data to inaccessible properties.\n |\n\n`__isset($string)`\n |\n\
    \  Called when `isset` or `empty` is used on\ninaccessible properties.\n |\n\n\
    `__unset($string)`\n |\n  Called when `unset` is used on\ninaccessible properties.\n\
    \ |\n\nIn addition to these, there are six more magic methods that, like the\n\
    others, can be implemented in classes to provide certain\nfunctionalities.\n\n\
    Table 22-2.\n\nMore Magic Methods\n\nName\n |\n  Description\n |\n\n| --- | ---\
    \ | --- | --- | --- |\n\n`__toString()`\n |\n  Called for object to string conversions.\n\
    \ |\n\n`__invoke(...)`\n |\n  Called for object to function conversions.\n |\n\
    \n`__sleep()`\n |\n  Called by `serialize`. Performs\ncleanup tasks and returns\
    \ an array of variables to be serialized.\n |\n\n`__wakeup()`\n |\n  Called by\
    \ `unserialize` to\nreconstruct the object.\n |\n\n`__set_state($array)`\n |\n\
    \  Called by `var_export`. The\nmethod must be static and its argument contains\
    \ the exported properties.\n |\n\n`__clone()`\n |\n  Called after object has been\
    \ cloned.\n |\n\n_ToString\n\nWhen an object is used in a context where a string\
    \ is expected, the PHP\nengine searches for a method named `__toString` to\nretrieve\
    \ a string representation of the object.\n\n```\nclass MyClass\n{\npublic function\
    \ __toString()\n{\nreturn 'Instance of ' . __CLASS__;\n}\n}\n$obj = new MyClass();\n\
    echo $obj; // \"Instance of MyClass\"\n```\n\nIt is not possible to define how\
    \ an object will behave when evaluated as\ntypes other than string.\n\n_Invoke\n\
    \nThe `__invoke`\nmethod allows an object to be treated as a function. Arguments\
    \ provided\nwhen the object is called are used as the `__invoke` function’s\n\
    arguments.\n\n```\nclass MyClass\n{\npublic function __invoke($arg)\n{\necho $arg;\n\
    }\n}\n$obj = new MyClass();\n$obj('Test'); // \"Test\"\n```\n\nObject Serialization\n\
    \nSerialization is the process of converting data into a string format.\nThis\
    \ is useful for storing objects in databases or files. In PHP, the\nbuilt-in `serialize`\
    \ function\nperforms this object-to-string conversion and `unserialize` converts\n\
    the string back into the original object. The `serialize` function\nhandles all\
    \ types, except for the resource type, which is used to hold\ndatabase connections\
    \ and file handlers, for example. Consider the\nfollowing simple database class.\n\
    \n```\nclass MyConnection\n{\npublic $link, $server, $user, $pass;\npublic function\
    \ connect()\n{\n$this->link = mysql_connect($this->server,\n$this->user,\n$this->pass);\n\
    }\n}\n```\n\nWhen this class is serialized, the database connection is lost and\
    \ the\n`$link` resource\ntype variable holding the connection is stored as null.\n\
    \n```\n$obj = new MyConnection();\n// ...\n$bin = serialize($obj);   // serialize\
    \ object\n$obj = unserialize($bin); // restore object\n```\n\nTo get greater control\
    \ over how object data is serialized and\nunserialized, the `__sleep` and `__wakeup`\
    \ methods may\nbe implemented by this class.\n\n_Sleep\n\nThe `__sleep`\nmethod\
    \ is called by `serialize` and needs\nto return an array containing the properties\
    \ that will be serialized.\nThis array must not include private or protected properties\
    \ because\n`serialize` is\nnot able to access them. The method may also perform\
    \ cleanup tasks\nbefore the serialization occurs, such as committing any pending\
    \ data to\nstorage mediums."
