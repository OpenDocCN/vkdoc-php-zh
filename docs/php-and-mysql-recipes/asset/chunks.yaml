    function ascending();


    function decendding();


    function shuffle();


    }


    class records implements sort {


    private $data = array();


    function add($title) {


    $this->data[] = $title;


    }


    function ascending() {


    sort($this->data);


    }


    function decendding () {


    rsort($this->data);


    }


    function shuffle() {


    shuffle($this->data);


    }


    function get() {


    return $this->data;


    }


    }


