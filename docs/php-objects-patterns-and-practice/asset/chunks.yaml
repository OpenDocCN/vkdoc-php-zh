    \ closed.\n```\n\n## 开始一个项目\n\n现在，我已经有了一个远程 Git 服务器，并且可以从我的本地帐户访问它，是时候将我正在开发的工作添加到位于\
    \ `/var/git/megaquiz` 的仓库中了。\n\n在开始之前，我会仔细检查我的文件和目录，并删除可能找到的任何临时项目。未做此检查是一个常见的麻烦。需要注意的临时项目包括自动生成的文件，例如\
    \ composer 包、构建目录、安装程序日志等。\n\n> **注意**\n> 你可以通过在仓库中放置一个名为 `.gitignore` 的文件来指定要忽略的文件和模式。在\
    \ Linux 系统上，`man gitignore` 命令应提供文件名通配符的示例，你可以修改这些示例以排除构建过程、编辑器和 IDE 创建的各种锁文件和临时目录。本文也可在\
    \ [`http://git-scm.com/docs/gitignore`](http://git-scm.com/docs/gitignore) 在线获取。\n\
    \n在进一步操作之前，我应该向 Git 注册我的身份——这有助于追踪仓库中谁做了什么：\n\n```\n$ git config --global user.name\
    \ \"matt z\"\n$ git config --global user.email \"matt@getinstance.com\"\n```\n\
    \n现在我已经建立了个人详细信息，并确保我的项目是干净的，我可以设置它并将其代码推送到服务器：\n\n```\n$ cd megaquiz\n$ git init\n\
    Initialized empty Git repository in /home/mattz/work/megaquiz/.git/\n```\n\n现在是时候添加我的文件了：\n\
    \n```\n$ git add .\n```\n\nGit 现在正在跟踪 `megaquiz` 下的所有文件和目录。被跟踪的文件可以处于三种状态：未修改、已修改或已暂存。你可以通过运行命令\
    \ `git status` 来检查：\n\n```\n$ git status\nOn branch master\nInitial commit\nChanges\
    \ to be committed:\n(use \"git rm --cached ...\" to unstage)\nnew file:   command/Command.php\n\
    new file:   command/CommandContext.php\nnew file:   command/FeedbackCommand.php\n\
    new file:   command/LoginCommand.php\nnew file:   main.php\nnew file:   quizobjects/User.php\n\
    new file:   quiztools/AccessManager.php\nnew file:   quiztools/ReceiverFactory.php\n\
    ```\n\n得益于我之前的 `git add` 命令，我所有的文件都已暂存，准备提交。我现在可以继续执行 `commit` 命令：\n\n```\n$ git\
    \ commit -m 'my first commit'\n[master (root-commit) f147d21] my first commit\n\
    8 files changed, 235 insertions(+)\ncreate mode 100755 command/Command.php\ncreate\
    \ mode 100755 command/CommandContext.php\ncreate mode 100755 command/FeedbackCommand.php\n\
    create mode 100755 command/LoginCommand.php\ncreate mode 100755 main.php\ncreate\
    \ mode 100755 quizobjects/User.php\ncreate mode 100755 quiztools/AccessManager.php\n\
    create mode 100644 quiztools/ReceiverFactory.php\n```\n\n我通过 `-m` 标志添加了一条消息。如果我省略了它，Git\
    \ 将启动一个编辑器，我可以用它来添加我的检入消息。\n\n如果你习惯于 CVS 和 Subversion 等版本控制系统，你可能会认为我们已经完成了。尽管我可以愉快地从这里继续编辑、添加、提交和分支，但如果我想使用中央仓库共享此代码，我还需要考虑一个额外的阶段。正如我们将在本章后面看到的，Git\
    \ 允许我们管理多个项目分支。得益于这个特性，我可以为每个版本维护一个分支，但同时也将我的高风险尖端开发安全地隔离在生产代码之外。当我们开始时，Git 会建立一个名为\
    \ `master` 的单一分支。我可以用命令 `git branch` 确认我的分支状态：\n\n```\n$ git branch -a\n* master\n\
    ```\n\n`-a` 标志指定 Git 应该向我们展示所有分支（默认是省略远程分支）。输出显示了 `master` 分支。\n\n事实上，我还没有做任何事情来关联我的本地仓库和远程服务器。是时候纠正这一点了：\n\
    \n```\n$ git remote add origin git@poppch17.vagrant.internal:/var/git/megaquiz\n\
    ```\n\n考虑到它完成的工作，这个命令出奇地安静。实际上，它相当于告诉 Git “将昵称 `origin` 与给定的服务器位置关联起来。此外，在本地分支\
    \ `master` 和远程等效分支之间建立一个跟踪关系。”\n\n为了确认所有这些，我向 Git 检查远程句柄 `origin` 是否已建立：\n\n```\n\
    $ git remote -v\norigin git@poppch17.vagrant.internal:/var/git/megaquiz (fetch)\n\
    origin git@poppch17.vagrant.internal:/var/git/megaquiz (push)\n```\n\n当然，如果你使用了像\
    \ GitHub 这样的服务，你会使用与你等效的 `git remote add` 步骤，如图 17-2 所示。对我来说，这看起来像这样：\n\n```\n\
    $ git remote add origin git@github.com:popp5/megaquiz.git\n```\n\n然而，我仍然没有向我的\
    \ Git 服务器发送任何实际文件，所以这是我的下一步：\n\n```\n$ git push origin master\nCounting objects:\
    \ 12, done.\nDelta compression using up to 2 threads.\nCompressing objects: 100%\
    \ (9/9), done.\nWriting objects: 100% (12/12), 2.65 KiB, done.\nTotal 12 (delta\
    \ 1), reused 0 (delta 0)\nTo git@poppch17.vagrant.internal:/var/git/megaquiz\n\
    * [new branch]      master -> master\n```\n\n现在我可以再次运行 `git branch` 命令来确认 `master`\
    \ 分支的远程版本已经出现：\n\n```\n$ git branch -a\n* master\nremotes/origin/master\n```\n\
    \n> **注意**\n> 我已经建立了一个所谓的跟踪分支。这是一个与远程分支相关联的本地分支。\n\n## 克隆仓库\n\n为了本章的目的，我虚构了一位名叫\
    \ Bob 的团队成员。Bob 和我一起在 MegaQuiz 项目上工作。自然，他想要自己的一份代码。我已经将他的公钥添加到了 Git 服务器，所以他可以开始了。在平行的\
    \ GitHub 世界中，我邀请了 Bob 加入我的项目，他已经将自己的公钥添加到了他的帐户。效果是一样的；Bob 可以使用命令 `git clone` 获取仓库：\n\
    \n```\n$ git clone git@github.com:popp5/megaquiz.git\nremote: Counting objects:\
    \ 14, done.\nremote: Compressing objects: 100% (12/12), done.\nremote: Total 14\
    \ (delta 1), reused 14 (delta 1), pack-reused 0\nReceiving objects: 100% (14/14),\
    \ done.\nResolving deltas: 100% (1/1), done.\n```\n\n现在，我们俩都可以在本地进行开发，并在准备好后，互相分享我们的代码。\n\
    \n## 更新与提交\n\nBob 当然是一位出色且有才华的伙伴。除了一点，一个常见且非常烦人的特质：他无法不去动别人的代码。\n\nBob 聪明且好奇，很容易被闪亮的新开发方向所兴奋，并且他非常渴望帮助优化新代码。结果，无论我走到哪里，我似乎都能看到\
    \ Bob 的手笔。Bob 在我的文档中加了东西，他还实现了一个我在喝咖啡时提到的想法。我可能不得不干掉 Bob。然而，在此期间，我必须处理这样一个事实：我正开发的代码需要与\
    \ Bob 的输入合并。\n\n这里有一个名为 `quizobjects/User.php` 的文件。目前，它只包含最简单的骨架：\n\n```\nnamespace\
    \ popp\\ch17\\megaquiz\\quizobjects;\nclass User\n{\n}\n```\n\n我决定添加一些文档。我首先在我的版本文件中添加一个文件注释：\n\
    \n```\nnamespace popp\\ch17\\megaquiz\\quizobjects;\n/**\n* @license   http://www.example.com\
    \ Borsetshire Open License\n* @package  quizobjects\n*/\nclass User\n{\n}\n```\n\
    \n记住文件可以处于三种状态：未修改、已修改和已暂存。`User.php` 文件现在已经从未修改变为已修改。我可以使用 `git status` 命令看到这一点：\n\
    \n```\n$ git status\nOn branch master\nYour branch is up-to-date with 'origin/master'.\n\
    Changes not staged for commit:\n  (use \"git add <file>...\" to update what will\
    \ be committed)\n  (use \"git checkout -- <file>...\" to discard changes in working\
    \ directory)\nmodified:   quizobjects/User.php\nno changes added to commit (use\
    \ \"git add\" and/or \"git commit -a\")\n```\n\n`User.php` 已被修改，但尚未暂存以进行提交。我可以使用\
    \ `git add` 命令更改此状态：\n\n```\n$ git add quizobjects/User.php\n$ git status\nOn\
    \ branch master\nYour branch is up-to-date with 'origin/master'.\nChanges to be\
    \ committed:\n  (use \"git reset HEAD <file>...\" to unstage)\nmodified:   quizobjects/User.php\n\
    ```\n\n现在我准备提交：\n\n```\n$ git commit -m'added documentation' quizobjects/User.php\n\
    [master 97472c4] added documentation\n1 file changed, 5 insertions(+)\n```\n\n\
    Git 提交只影响我的本地仓库。如果我相信世界已经准备好接受我的更改，我必须将我的代码推送到远程仓库：\n\n```\n$ git push origin\
    \ master\nCounting objects: 6, done.\nDelta compression using up to 4 threads.\n\
    Compressing objects: 100% (5/5), done.\nWriting objects: 100% (6/6), 670 bytes\
    \ | 0 bytes/s, done.\nTotal 6 (delta 2), reused 0 (delta 0)\nTo git@github.com:popp5/megaquiz.git\n\
    \   715fc2f..04d75b4  master -> master\n```\n\n与此同时，Bob 在自己的沙盒中工作，一如既往地热心，并且他创建了一个类注释：\n\
    \n```\nnamespace popp\\ch17\\megaquiz\\quizobjects;\n/**\n* @package  quizobjects\n\
    */\nclass User\n{\n}\n```\n\n现在轮到 Bob 执行 `add`、`commit` 和 `push` 了。因为这部分的添加和提交通常一起运行，Git\
    \ 允许你将它们合并到一个命令中：\n\n```\n$ git commit -a -m'my great documentation'\n[master\
    \ 161c6c5] my great documentation\n1 files changed, 4 insertions(+), 0 deletions(-)\n\
    ```\n\n所以我们现在有两个不同的 `User.php` 版本。一个是我刚刚推送到远程仓库的版本，另一个是 Bob 的版本，已提交但尚未推送。让我们看看当\
    \ Bob 尝试将他的本地版本推送到远程仓库时会发生什么：\n\n```\n$ git push origin master\nTo git@github.com:popp5/megaquiz.git\n\
    \ ! [rejected]        master -> master (non-fast-forward)\nerror: failed to push\
    \ some refs to 'git@github.com:popp5/megaquiz.git'\nTo prevent you from losing\
    \ history, non-fast-forward updates were rejected\nMerge the remote changes before\
    \ pushing again.  See the 'Note about\nfast-forwards' section of 'git push --help'\
    \ for details.\n```\n\n如你所见，如果有更新需要应用，Git 不会让你推送。Bob 必须首先拉取我的 `User.php` 文件版本：\n\
    \n```\n$ git pull origin master\nremote: Counting objects: 6, done.\nremote: Compressing\
    \ objects: 100% (3/3), done.\nremote: Total 6 (delta 2), reused 6 (delta 2), pack-reused\
    \ 0\nUnpacking objects: 100% (6/6), done.\nFrom github.com:popp5/megaquiz\n *\
    \ branch            master     -> FETCH_HEAD\nAuto-merging quizobjects/User.php\n\
    CONFLICT (content): Merge conflict in quizobjects/User.php\nAutomatic merge failed;\
    \ fix conflicts and then commit the result.\n```\n\n只要更改不重叠，Git 会乐意地将来自两个源的数据合并到同一个文件中。Git\
    \ 无法处理影响相同行的更改。它如何决定哪个优先？是仓库覆盖 Bob 的更改，还是反过来？是让两个更改共存？哪个应该放在前面？Git 别无选择，只能报告冲突，让\
    \ Bob 解决问题。\n\n这是 Bob 打开文件时看到的：\n\n```\nnamespace popp\\ch17\\megaquiz\\quizobjects;\n\
    /**\n<<<<<<< HEAD\n* @package  quizobjects\n=======\n* @license   http://www.example.com\
    \ Borsetshire Open License\n* @package  quizobjects\n>>>>>>> 04d75b41c8d972438bd803042f1117e12d2869eb\n\
    */\nclass User\n{\n}\n```\n\nGit 包含了 Bob 的注释和冲突的更改，以及告诉他每个部分来源的元数据。冲突信息由一行等号分隔。Bob\
    \ 的输入由一行小于号后跟 \"HEAD\" 表示。远程更改包含在分界线的另一侧。\n\n现在 Bob 已经识别出冲突，他可以编辑文件以解决冲突：\n\n\
    ```\nnamespace popp\\ch17\\megaquiz\\quizobjects;\n/**\n* @license   http://www.example.com\
    \ Borsetshire Open License\n* @package   quizobjects\n*/\nclass User\n{\n}\n```\n\
    \n接下来，Bob 通过暂存文件来解决冲突：\n\n```\n$ git add quizobjects/User.php\n$ git commit -m'documentation\
    \ merged'\n[master 89e5e46] documentation merged\n```\n\n现在，终于，他可以推送到远程仓库了：\n\n\
    ```\n$ git push origin master\n```\n\n## 添加和删除文件与目录\n\n项目在开发过程中会改变形态。版本控制软件必须考虑到这一点，允许用户添加新文件并删除那些会碍事的无用文件。\n\
    \n### 添加文件\n\n你已经多次看到 `add` 子命令了。我在项目设置期间使用它将我的代码添加到空的 `megaquiz` 仓库，随后，用于暂存文件以进行提交。通过对未跟踪的文件或目录运行\
    \ `git add`，你要求 Git 跟踪它——并将其暂存以进行提交。这里我向项目添加了一个名为 `Question.php` 的文档：\n\n```\n\
    $ touch quizobjects/Question.php\n$ git add quizobjects/Question.php\n```\n\n\
    在现实场景中，我可能会首先向 `Question.php` 添加一些内容。这里，我仅限于使用标准的 `touch` 命令创建一个空文件。一旦我添加了一个文档，我仍然必须调用\
    \ `commit` 子命令来完成添加：\n\n```\n$ git commit -m'initial checkin'\n[master 02cf67c]\
    \ initial checkin\n1 file changed, 0 insertions(+), 0 deletions(-)\ncreate mode\
    \ 100644 quizobjects/Question.php\n```\n\n`Question.php` 现在已经在本地仓库中了。\n\n### 删除文件\n\
    \n如果我发现自己过于草率并且需要删除该文档，那么了解到我可以使用名为 `rm` 的子命令也就不足为奇了：\n\n```\n$ git rm quizobjects/Question.php\n\
    rm 'quizobjects/Question.php'\n`\n\n同样，需要执行一次 `commit` 来完成这项工作。像往常一样，我可以通过运行 `git\
    \ status` 来确认：\n\n```\n$ git status\nOn branch master\nYour branch is ahead of\
    \ 'origin/master' by 1 commit.\n  (use \"git push\" to publish your local commits)\n\
    Changes to be committed:\n  (use \"git reset HEAD <file>...\" to unstage)\ndeleted:\
    \    quizobjects/Question.php\n$ git commit -m'removed Question'\n[master fd4d64e]\
    \ removed Question\n1 file changed, 0 insertions(+), 0 deletions(-)\ndelete mode\
    \ 100644 quizobjects/Question.php\n```\n\n### 添加目录\n\n你也可以使用 `add` 和 `rm` 来添加和删除目录。假设\
    \ Bob 想创建一个新目录：\n\n```\n$ mkdir resources\n$ touch resources/blah.gif\n$ git add\
    \ resources/\n$ git status\nOn branch master\nYour branch is ahead of 'origin/master'\
    \ by 2 commits.\n  (use \"git push\" to publish your local commits)\nChanges to\
    \ be committed:\n  (use \"git reset HEAD <file>...\" to unstage)\nnew file:  \
    \ resources/blah.gif\n```\n\n注意 `resources` 的内容是如何自动添加到仓库的。现在 Bob 可以像往常一样提交，然后将全部内容推送到远程仓库。\n\
    \n### 删除目录\n\n正如你所料，你可以使用 `rm` 子命令来删除目录。然而，在这种情况下，我必须通过向子命令传递 `-r` 标志来告知 Git 我希望它删除目录的内容。在这里，我强烈反对\
    \ Bob 添加 `resources` 目录的决定：\n\n```\n$ git rm -r resources/\nrm 'resources/blah.gif'\n\
    ```\n\n## 标记发布版本\n\n一切顺利的话，项目最终会达到一个就绪状态，你会想要发布或部署它。每当你进行发布时，都应该在仓库中留下一个书签，这样你就可以随时重新访问该版本的代码。正如你所料，你可以使用\
    \ `git tag` 命令在代码中创建一个标签：\n\n```\n$ git tag -a 'version1.0' -m 'release 1.0'\n\
    ```\n\n你可以通过运行不带参数的 `git tag` 来查看与你的仓库关联的标签：\n\n```\n$ git tag\nversion1.0\n```\n\
    \n到目前为止，我们一直在本地操作。为了将标签放到远程仓库上，我们必须对 `git push` 子命令使用 `--tags` 标志：\n\n```\n$ git\
    \ push origin --tags\nCounting objects: 1, done.\nWriting objects: 100% (1/1),\
    \ 168 bytes | 0 bytes/s, done.\nTotal 1 (delta 0), reused 0 (delta 0)\nTo git@github.com:popp5/megaquiz.git\n\
    \ * [new tag]         version1.0 -> version1.0\n```\n\n使用 `--tags` 标志会导致所有本地标签被推送到远程仓库。\n\
    \n当然，你在 GitHub 仓库上执行的任何操作都可以在该网站上被追踪。你可以在图 17-4 中看到我的发布标签。\n\n![A314621_5_En_17_Fig4_HTML.jpg](img/A314621_5_En_17_Fig4_HTML.jpg)\n\
    \n*图 17-4. 在 GitHub 上查看标签*\n\n一旦你可以用标签为代码添加书签，就很自然地会想知道如何重新访问旧版本。然而，要做到这一点，你应该首先花些时间研究分支——这是\
    \ Git 特别擅长的事情。\n\n## 分支项目\n\n一旦我的项目发布，我就可以把它打包收好，然后去做些新的事情，对吧？毕竟，它写得如此优雅，不可能有\
    \ bug，更不用说它的规格如此详尽，没有一个用户可能要求任何新功能了！\n\n与此同时，回到现实世界，我必须在至少两个层面上继续使用代码库。大概现在快到收到\
    \ bug 报告的时候了，而版本 1.2.0 的功能愿望清单将因对精彩新功能的需求而膨胀。我该如何协调这些力量？我需要修复报告的 bug，同时我也需要推进主要开发。我可以在开发过程中修复\
    \ bug，并在下一个版本稳定后一次性发布所有内容。但是这样一来，用户可能需要等待很长时间才能看到任何问题得到解决。这显然是不可接受的。另一方面，我可以边开发边发布。在这种情况下，我有发布破损代码的风险。显然，我的开发需要两条线索。我将继续向项目的主分支（通常称为主干）添加新的、有风险的功能，但我现在应该为我的新版本创建一个分支，在这个分支上我只能添加错误修复。\n\
    \n> **注意**\n> 这种管理分支的方式绝非唯一的方法。开发者们不断地争论组织分支和管理发布与错误修复的最佳方式。最流行的方法之一是 git-flow（在\
    \ [`http://danielkummer.github.io/git-flow-cheatsheet/`](http://danielkummer.github.io/git-flow-cheatsheet/)\
    \ 上有简洁的描述）。在这种实践中，`master` 是发布分支。新代码放在 `develop` 分支上，并在发布时合并到 `master`。每个活跃的开发单元都有自己的功能分支，在稳定后合并到\
    \ `develop`。\n\n我可以使用 `git checkout` 命令创建并切换到一个新分支。首先，让我们快速查看一下我的分支状态：\n\n```\n\
    $ git branch -a\n* master\nremotes/origin/master\n```\n\n如你所见，我有一个单一的分支：`master`，以及它的远程等效分支。现在，我将创建并切换到一个新分支：\n\
    \n```\n$ git checkout -b megaquiz-branch1.0\nSwitched to a new branch 'megaquiz-branch1.0'\n\
    ```\n\n为了跟踪我对分支的使用，我将使用一个特定的文件作为示例：`command/FeedbackCommand.php`。看来我创建 bug 修复分支的时间刚刚好。用户开始报告他们无法使用系统中的反馈机制。我找到了这个\
    \ bug：\n\n```\n//...\n$result = $msgSystem->despatch($email, $msg, $topic);\n\
    if (! $user) {\n$this->context->setError($msgSystem->getError());\n//...\n```\n\
    \n实际上，我应该测试 `$result` 而不是 `$user`。以下是我的编辑：\n\n```\n//...\n$result = $msgSystem->dispatch($email,\
    \ $msg, $topic);\nif (! $result) {\n$this->context->setError($msgSystem->getError());\n\
    //...\n```\n\n因为我在分支 `megaquiz-branch1.0` 上工作，我可以提交这个更改：\n\n```\n$ git add command/FeedbackCommand.php\n\
    $ git commit -m'bugfix'\n[megaquiz-branch1.0 d69dfc1] bugfix\n1 file changed,\
    \ 1 insertion(+), 1 deletion(-)\n```\n\n当然，这个提交是本地的。我需要使用 `git push` 命令将这个分支放到远程仓库上：\n\
    \n```\n$ git push origin megaquiz-branch1.0\nCounting objects: 4, done.\nDelta\
    \ compression using up to 4 threads.\nCompressing objects: 100% (4/4), done.\n\
    Writing objects: 100% (4/4), 440 bytes | 0 bytes/s, done.\nTotal 4 (delta 2),\
    \ reused 0 (delta 0)\nTo git@github.com:popp5/megaquiz.git\n * [new branch]  \
    \    megaquiz-branch1.0 -> megaquiz-branch1.0\n```\n\n那 Bob 呢？他不可避免地会想要参与进来并修复一些\
    \ bug。首先，他调用了 `git pull`，它会友好地告诉他关于新分支（以及我最近的其他活动）的信息：\n\n```\n$ git pull\nremote:\
    \ Counting objects: 11, done.\nremote: Compressing objects: 100% (7/7), done.\n\
    remote: Total 11 (delta 4), reused 11 (delta 4), pack-reused 0\nUnpacking objects:\
    \ 100% (11/11), done.\nFrom github.com:popp5/megaquiz\n   f6ab532..cf120a4  master\
    \     -> origin/master\n * [new branch]      megaquiz-branch1.0 -> origin/megaquiz-branch1.0\n\
    \ * [new tag]         version1.0 -> version1.0\nUpdating f6ab532..cf120a4\nFast-forward\n\
    \ 0 files changed, 0 insertions(+), 0 deletions(-)\n delete mode 100644 resources/blah.gif\n\
    ```\n\n现在 Bob 可以切换到一个会跟踪远程分支的本地分支了：\n\n```\n$ git checkout megaquiz-branch1.0\n\
    Branch megaquiz-branch1.0 set up to track remote branch megaquiz-branch1.0 from\
    \ origin.\nSwitched to a new branch 'megaquiz-branch1.0'\n```\n\nBob 现在可以开始工作了。他可以添加并提交他自己的修复；当他推送时，这些修复将会出现在远程分支上。\n\
    \n与此同时，我想要在主干上添加一些尖端增强功能——也就是我的 `master` 分支。让我们从我的本地仓库的角度再看一下我的分支状态：\n\n```\n\
    $ git branch -a\n* master\n  megaquiz-branch1.0\nremotes/origin/master\nremotes/origin/megaquiz-branch1.0\n\
    ```\n\n我可以通过调用 `git checkout` 来切换到一个已有的分支：\n\n```\n$ git checkout master\nSwitched\
    \ to branch 'master'\nYour branch is up-to-date with 'origin/master'.\n```\n\n\
    现在当我查看 `command/FeedbackCommand.php` 时，我发现我的 bug 修复神奇地消失了。当然，它仍然存储在 `megaquiz-branch1.0`\
    \ 下。稍后，我可以将这个修复合并到 `master` 分支，所以不用担心。相反，我可以专注于添加新代码：\n\n```\nclass FeedbackCommand\
    \ extends Command\n{\n    public function execute(CommandContext $context)\n \
    \   {\n        // new development\n        // goes here\n        $msgSystem =\
    \ ReceiverFactory::getMessageSystem();\n        $email = $context->get('email');\n\
    \        // ...\n```\n\n我在这里所做的只是添加一个注释来模拟向代码中添加内容。我现在可以提交并推送这个：\n\n```\n$ git\
    \ commit -am'new development on master'\n$ git push origin master\n```\n\n所以我现在有了并行分支。当然，迟早我会希望我的\
    \ master 分支能够受益于我在 `megaquiz-branch1.0` 上提交的 bug 修复。\n\n我可以在命令行上做到这一点，但首先让我们暂停一下，看看\
    \ GitHub 和 BitBucket 等类似服务支持的一项功能。拉取请求（通常缩写为 PR）允许我在合并分支之前请求代码审查。所以在 `megaquiz-branch1.0`\
    \ 合并到 `master` 之前，我可以请 Bob 检查我的工作。正如你在图 17-5 中看到的，GitHub 检测到了这个分支，并给了我创建拉取请求的机会。\n\
    \n![A314621_5_En_17_Fig5_HTML.jpg](img/A314621_5_En_17_Fig5_HTML.jpg)\n\n*图 17-5.\
    \ GitHub 使创建拉取请求变得容易*\n\n我点击按钮并在提交拉取请求前添加了一条评论。你可以在图 17-6 中看到结果。\n\n![A314621_5_En_17_Fig6_HTML.jpg](img/A314621_5_En_17_Fig6_HTML.jpg)\n\
    \n*图 17-6. 创建拉取请求*\n\n现在 Bob 可以检查我的更改并添加他可能有的任何评论。GitHub 向他精确地显示了更改了什么。你可以在图 17-7\
    \ 中看到 Bob 的评论。\n\n![A314621_5_En_17_Fig7_HTML.jpg](img/A314621_5_En_17_Fig7_HTML.jpg)\n\
    \n*图 17-7. 拉取请求所涵盖的更改*\n\n一旦 Bob 批准了我的拉取请求，我可以直接从浏览器合并，或者我可以返回命令行。这非常简单。Git 提供了一个名为\
    \ `merge` 的子命令：\n\n```\n$ git checkout master\nAlready on 'master'\nYour branch\
    \ is up-to-date with 'origin/master'.\n```\n\n事实上，我已经在 master 分支上了——但确认一下也无妨。现在我来执行实际的合并操作：\n\
    \n```\n$ git merge megaquiz-branch1.0\nAuto-merging command/FeedbackCommand.php\n\
    Merge made by the 'recursive' strategy.\n command/FeedbackCommand.php | 2 +-\n\
    \ 1 file changed, 1 insertion(+), 1 deletion(-)\n```\n\n> **注意**\n> 合并还是不合并？这个选择并不总是像看起来那么简单。例如，在某些情况下，你的错误修复可能是一种临时工作，会被主干上更彻底的重构所取代，或者由于规范的变化而不再适用。这必然是一个需要根据判断做出的决定。然而，在我工作过的大多数团队中，都倾向于尽可能地合并到主干，同时将分支上的工作保持在最低限度。对我们来说，新功能通常出现在主干上，并通过“尽早发布，经常发布”的策略快速到达用户手中。\n\
    \n现在，当我查看主干中的 `FeedbackCommand` 版本时，我确认所有更改都已合并：\n\n```\npublic function execute(CommandContext\
    \ $context)\n{\n    // new development\n    // goes here\n    $msgSystem = ReceiverFactory::getMessageSystem();\n\
    \    $email = $context->get('email');\n    $msg = $context->get('pass');\n   \
    \ $topic = $context->get('topic');\n    $result = $msgSystem->despatch($email,\
    \ $msg, $topic);\n    if (! $result) {\n        $this->context->setError($msgSystem->getError());\n\
    \        return false;\n    }\n```\n\n`execute()` 方法现在既包含了我模拟的主干开发内容，也包含了 bug\
    \ 修复。\n\n当我第一次“发布” MegaQuiz 1.0 版本时，我创建了一个分支，这就是我们一直在处理的那个。但请记住，我在那个阶段也创建了一个标签。我当时承诺会向你展示如何访问这个标签。事实上，你已经看到了如何访问。你可以基于该标签创建一个本地分支，方式与\
    \ Bob 建立他的本地版 bug 修复分支完全相同。区别在于这个新分支是全新的。它不跟踪任何现有的远程分支：\n\n```\n$ git checkout\
    \ -b new-version1.0-branch version1.0\nSwitched to a new branch 'new-version1.0-branch'\n\
    ```\n\n但是，我现在有了这个新分支，我可以像你之前看到的那样推送它并分享它。\n\n## 总结\n\nGit 包含了数量庞大的工具，每一个都有令人望而生畏的选项和功能范围。我只能在现有的篇幅内提供一个简短的介绍。尽管如此，即使你只使用我在本章中介绍的功能，你也应该能在自己的工作中看到好处，无论是通过防止数据丢失，还是通过改进协作工作。\n\
    \n在本章中，我们简要介绍了 Git 的基础知识。我简要地看了一下配置，然后导入了一个项目。我检出了、提交了并更新了代码，然后向你展示了如何标记和导出一个版本。我以对分支的简要介绍结束了本章，展示了它们在项目中维护并发开发和错误修复分支方面的实用性。\n\
    \n有一个问题我在一定程度上忽略了。我们确立了开发者应该检出自己项目版本的准则。然而，总的来说，项目是不会原地运行的。为了测试他们的更改，开发者需要在本地部署代码。有时，这就像复制几个目录一样简单。但更常见的是，部署必须处理一系列配置问题。在下一章中，我们将研究一些自动化此过程的技术。\n\
    \n# 18. 使用 PHPUnit 进行测试\n\n系统中每个组件的持续平稳运行都依赖于其同层组件的操作和接口的一致性。因此，从定义上讲，开发会破坏系统。当你改进你的类和包时，你必须记住修改任何与它们一起工作的代码。对于某些更改，这可能会产生连锁反应，影响距离你最初更改的代码很远的组件。敏锐的警惕和对系统依赖关系的百科全书式的了解有助于解决这个问题。当然，尽管这些是优秀的品质，但系统很快就会变得过于复杂，以至于无法轻易预测所有不期望的影响，尤其是因为系统通常结合了多个开发者的工作。为了解决这个问题，定期测试每个组件是一个好主意。当然，这是一个重复且复杂的任务；因此，它非常适合自动化。\n\
    \n在 PHP 程序员可用的测试解决方案中，PHPUnit 可能是最普遍的，当然也是功能最全的工具。在本章中，你将学到以下关于 PHPUnit 的知识：\n\
    \n* **安装：** 使用 PEAR 安装 PHPUnit\n* **编写测试：** 创建测试用例并使用断言方法\n* **处理异常：** 确认失败的策略\n\
    * **运行多个测试：** 将测试收集到测试套件中\n* **构建断言逻辑：** 使用约束\n* **模拟组件：** 模拟对象和桩模块\n* **测试 Web\
    \ 应用程序：** 使用和不使用额外工具进行测试\n\n## 功能测试和单元测试\n\n在任何项目中，测试都是必不可少的。即使你没有将这个过程正式化，你必定也发现自己已经形成了一套非正式的操作列表，用它们来全面检验你的系统。这个过程很快就会变得令人厌倦，这可能导致你对项目持一种听天由命的态度。\n\
    \n一种测试方法从项目的接口开始，模拟用户可能使用系统的各种方式。当手动测试时，这可能是你会采用的方式，尽管有各种框架用于自动化这个过程。这些功能测试有时被称为验收测试，因为成功执行的一系列操作可以用作项目阶段签收的标准。使用这种方法，你通常将系统视为一个黑盒——你的测试会刻意忽略那些协作构成被测试系统的隐藏组件。\n\
    \n功能测试从外部进行操作，而单元测试则从内部向外进行。单元测试倾向于关注类，测试方法被分组到测试用例中。每个测试用例对一个类进行严格的检验，检查每个方法是否按预期执行，并且是否按预期失败。目标是尽可能在脱离其更广泛上下文的隔离环境中测试每个组件。这通常会为你提供一个发人深省的结论，让你了解解耦系统各部分的使命是否成功。\n\
    \n测试可以作为构建过程的一部分运行，直接从命令行运行，甚至通过网页运行。在本章中，我将重点介绍命令行。\n\n单元测试是确保系统设计质量的好方法。测试揭示了类和函数的职责。一些程序员甚至提倡测试优先的方法。他们说，你应该在开始编写类之前就编写测试。这确立了类的用途，确保了清晰的接口以及简短、集中的方法。就个人而言，我从未追求过这种纯度的水平——这不符合我的编码风格。尽管如此，我尝试在进行编码的同时编写测试。维护一个测试框架为我提供了重构代码所需的安全感。我可以拆除并替换整个包，因为我知道我很有可能会在系统其他地方捕获到意外的错误。\n\
    \n## 手动测试\n\n在上一节中，我说测试在每个项目中都是必不可少的。我本可以这样说：测试在每个项目中都是不可避免的。我们都会测试。可悲的是，我们经常丢弃这些出色的工作。\n\
    \n那么，让我们创建一些类来测试。这是一个存储和检索用户信息的类。为了演示起见，它生成数组，而不是你通常期望使用的 `User` 对象：\n\n```php\n\
    //\n```"
