- fmt: 'Instead of the `$number=(integer)trim(fgets(STDIN))` statement, you can use
    an explicit assignment to the `$number` variable: for example, `$number=5` or
    `$number=15`.


    Another example of using the conditional statement is shown in Listing [3-2](#613529_1_En_3_Chapter.xhtml#PC8).
    It uses a complex condition (it contains logical operators) and an alternative
    form of the conditional statement syntax.


    ```

    Listing 3-2

    The Alternative Form of the Conditional Statement Syntax

    ```


    When the program is run, the user is prompted to enter a prime number between
    `1` and `5`. If the user enters the number `2`, `3`, or `5`, the message `You
    are correct!` appears. If any other number is entered, the message `You are wrong!`
    appears. The following shows what the program’s output looks like if the user
    enters a prime number from the specified range (the entered value is marked in
    bold).


    ```

    The output of the program (from Listing 3-2)

    Enter a prime number from 1 to 5: 3

    You are correct!

    ```


    If a number other than `2`, `3`, or `5` is entered, the result is as follows.


    ```

    The output of the program (from Listing 3-2)

    Enter a prime number from 1 to 5: 4

    You are wrong!

    ```


    You can use nested conditional statements to check several conditions sequentially.
    But it is better to use a modification of the conditional statement with the `elseif`
    blocks. The following shows the syntax for calling such a conditional statement.


    ```

    if(condition){

    # commands

    }

    elseif(condition){

    # commands

    }

    elseif(condition){

    # commands

    }

    else{

    # commands

    }

    ```


    Two `elseif` blocks are used here, but in principle, you can use as many `elseif`
    blocks as you like. Let’s discuss how the conditional statement is executed. First,
    the condition after the `if` keyword is checked, and if the condition is true,
    the corresponding block of commands is executed. If the condition is false, the
    condition in the `elseif` block is checked. If that condition is true, the commands
    from the corresponding `elseif` block are executed. If the condition is false,
    the condition in the next `elseif` block is checked, and so on. The commands in
    the `else` block are executed if all the checked conditions are false. The `else`
    block is optional.


    The following is an alternative syntax for calling the conditional statement with
    the `elseif` blocks.


    ```

    if(condition):

    # commands

    elseif(condition):

    # commands

    elseif(condition):

    # commands

    else:

    # commands

    endif;

    ```


    Namely, curly braces are not used, a colon is placed at the beginning of the blocks,
    and the entire structure ends with the `endif` keyword (followed by a semicolon).


    Let’s look at an example program that solves an equation of the form *Ax* = *B*.
    Depending on the values of the parameters *A* and *B*, there three options are
    possible. The first case is if *A* ≠ 0, so the equation has a single solution
    *x* = *B*/*A*. The second case is if both parameters are zero, that is, *A* =
    0 and *B* = 0. If so, then the solution of the equation is any number. Finally,
    and this is the third case, if *A* = 0 and *B* ≠ 0, then the equation has no solutions.
    All these cases are tracked using the conditional statement in the program shown
    in Listing [3-3](#613529_1_En_3_Chapter.xhtml#PC13).


    ```

    Listing 3-3

    Solving the Equation

    ```


    The user is prompted to enter the parameters of the equation, and after that,
    the result is calculated. Much depends on what values are entered. The following
    is the result of the program execution if the equation has a single solution (the
    values entered by the user are marked in bold).


    ```

    The output of the program (from Listing 3-3)

    Solving the equation Ax=B

    A = 5.0

    B = 12.6

    x = 2.52

    ```


    The following is the result of the program execution when both parameters are
    set to zero.


    ```

    The output of the program (from Listing 3-3)

    Solving the equation Ax=B

    A = 0

    B = 0

    The solution is any number

    ```


    There may be no solutions at all.


    ```

    The output of the program (from Listing 3-3)

    Solving the equation Ax=B

    A = 0

    B = 1

    There are no solutions

    ```


    In the program, the user enters the values for the `$A` and `$B` variables. You
    use the instruction `(double)` to cast to the `double` type. The search for a
    solution is performed using the conditional statement. First, the `$A!=0` condition
    is checked (the value of the `$A` variable is not `0`). If so, the `$x=$B/$A`
    command calculates the value for the root of the equation, which is displayed
    in the console.


    If the `$A!=0` condition is false (that is, the value of the `$A` variable is
    `0`), the `$B==0` condition in the `elseif` block is checked. The truth of this
    condition (considering the falsity of the `$A!=0` condition) means that any number
    can be a solution.


    Finally, the equation has no solutions if the `$B==0` condition is also false.
    The `else` block of the conditional statement handles this situation.'
