    \ => \"{partial\",\n                    \"closer\" => \"}\",\n               \
    \     \"handler\" => \"_partial\"\n                ),\n                \"include\"\
    \ => array(\n                    \"opener\" => \"{include\",\n               \
    \     \"closer\" => \"}\",\n                    \"handler\" => \"_include\"\n\
