    </div>\n```\n\n**227**\n\n注意，在清单 13-9 和 13-10 中，`Form`帮助器的`URL`选项被设置为`Calendar`插件的`Events`控制器的路径。这不仅使插件能够正常工作，还使插件更具可移植性。通过在创建表单时指定路径，插件将指向自身，而不会意外搜索周围`Cake`应用程序中的控制器或模型来保存表单数据。\n\
    \n启动`Add`和`Edit`操作以确保它们运行正常。此外，向数据库中添加一些测试事件，以便在构建`Index`和`View`操作时使用。你应该会看到类似于图\
    \ 13-1 的屏幕。\n\n**图 13-1.** *编辑已保存的事件。注意，这里应用的是博客应用程序中的默认布局，而不是 Calendar 插件中的布局。*\n\
    \n**228**\n\n## 构建索引操作\n\n通常，`Index`操作是最容易构建的，因为它通常显示数据库中的记录列表。然而，这个插件需要显示某种形式的日历。由于日历年份的不一致性，生成日历比简单地遍历记录列表要复杂得多。`Index`操作必须创建一个表，表中的行对应月份中的每周，并显示每周的每一天；同时，该操作必须查找给定日期的所有事件，并将其插入到单元格中。不仅是`Index`操作，`View`操作也会生成日历。由于视图中涉及大量计算，这听起来是构建帮助器函数的绝佳时机。\n\
    \n### 日历帮助器\n\n在`app/plugins/calendar/views`目录中，创建一个名为`helpers`的新文件夹，并在其中创建一个名为`calendar.php`的新文件。该文件将包含几个自定义的帮助器函数，这些函数主要根据传递给它的参数渲染月份视图。在`Index`和`View`操作中，我们将设置这些参数，然后将它们传递给这个帮助器，而不是在每个视图文件中渲染日历。因为我打算在视图中执行逻辑，所以最好通过使用帮助器而不是元素来组织`Calendar`插件。请记住，帮助器用于在视图中执行逻辑，而元素用于制作基本显示或**视图模板**，供多个视图使用。\n\
    \n渲染月份将分为两步。首先，帮助器函数将遍历月份中的每周，其次，遍历每周。根据月份和年份的不同，月份的第一天会有所变化，因此帮助器必须创建一些变量来确定月份的第一天是星期几，然后还要确定周末。在`Calendar`帮助器中，我们首先插入清单\
    \ 13-12 中所示的代码。\n\n**清单 13-12.** *初始化一些变量，供* `app/plugins/calendar/views/helpers/calendar.php`\
    \ *帮助器使用*\n\n```\n<?\nclass CalendarHelper extends Helper {\n\n    var $helpers\
    \ = array('Html');\n\n    function render($events=array(), $month=null, $year=null)\
    \ {\n        //初始化此函数的变量\n        $firstdate = mktime(0, 0, 0, $month, 1, $year);\n\
    \        $lastdate = mktime(0, 0, 0, $month+1, 0, $year);\n        $firstday =\
    \ strftime(\"%a\", $firstdate);\n        $day = 1;\n        $days_array = array(\n\
    \            1=>'周日', 2=>'周一', 3=>'周二', 4=>'周三', 5=>'周四', 6=>'周五', 7=>'周六',\n\
    \            8=>'周日', 9=>'周一', 10=>'周二', 11=>'周三', 12=>'周四', 13=>'周五', 14=>'周六',\n\
    \            15=>'周日', 16=>'周一', 17=>'周二', 18=>'周三', 19=>'周四', 20=>'周五', 21=>'周六',\n\
    \            22=>'周日', 23=>'周一', 24=>'周二', 25=>'周三', 26=>'周四', 27=>'周五', 28=>'周六',\n\
    \            29=>'周日', 30=>'周一', 31=>'周二', 32=>'周三', 33=>'周四', 34=>'周五', 35=>'周六',\n\
    \            36=>'周日', 37=>'周一', 38=>'周二', 39=>'周三', 40=>'周四', 41=>'周五', 42=>'周六'\n\
    \        );\n```\n\n**229-230**\n"
- fmt: "# 排版后的文本\n\n`Listing 13-12` 中的第 7 行使用 `mktime()` 函数将一个 Unix 时间戳赋值给变量 `$firstdate`。注意，变量\
    \ `$month` 和 `$year` 用于将时间戳作为月份和年份值传递。这里也使用了该月的第一天。该月的最后一天也设置为一个时间戳，并赋值给 `$lastdate`。这一步稍微复杂一些：本质上，`mktime()`\
    \ 被告知提供下个月第零天的时间戳，这相当于当前月份的最后一天。由于每个月的天数不同，这比尝试指定每个月要方便得多（例如，二月的最后一天是 28 号，闰年除外；三月的最后一天是\
    \ 30 号；但四月的最后一天是 31 号，以此类推）。现在，有了指定月份的第一天和最后一天的时间戳，辅助函数可以遍历天数的差异，并为每一天创建一个表格单元格。\n\
    \n一周中各天的布局不会改变；换句话说，对应星期日的单元格将始终是其所在行的第一个单元格，每一行代表一周。关键在于让月份中的日期（这些日期会随月份和年份变化）出现在正确的星期几上。第\
    \ 11–18 行是 `$days_array` 数组，它是一个静态的星期几集合，将按在日历中出现的顺序排列。该数组用于确保辅助函数在遍历月份中的天数时，能在与表格单元格相同的时间点在周末处中断。\n\
    \n第 10 行包含变量 `$day`，此处将其设置为 `1`。该值代表迭代中的当前日期。每次为月份中的某一天渲染一个表格单元格时，都会调用 `$day`\
    \ 变量来显示该日期；然后该值将递增 `1` 以表示下一天，以此类推。\n\n第 9 行是让迭代从正确的星期几开始的关键。它使用 `strftime()`\
    \ 函数获取时间戳 `$firstdate` 所在星期几的三字母表示。稍后，该值将与 `$days_array` 的值进行比较，以确保第一个日期被放置在正确的单元格中。\n\
    \n## 渲染月份的第一周\n\n让我们将 `Listing 13-13` 放入 `Calendar` 辅助函数中，开始迭代。\n\n**Listing 13-13.**\
    \ *开始月份表格并遍历月份的第一周*\n```\n19 $out = '<table class=\"calendar\" cellspacing=\"\
    0\">';\n20 $out .= $this->Html->tableHeaders(array('Sun','Mon','Tue','Wed','Thu',\n\
    'Fri','Sat'));\n21 /*** WEEK ONE ***/\n$out .= '<tr>';\nfor ($i=1; $i<=7; $i++)\
    \ {\n    if ($day<=1 && $firstday != $days_array[$i]) {\n        $out .= '<td>&nbsp;</td>';\n\
    \    } else {\n        $out .= '<td>'.$day.'<br/>';\n        $out .= $this->events($month,$day,$year,$events);\n\
    \        $out .= '</td>';\n        $day++;\n    }\n}\n$out .= '</tr>';\n```\n\n\
    在整个函数的其余部分中，变量 `$out` 将被分配所有要在视图中渲染的输出数据。注意，`Listing 13-13` 中的第 19 行实例化了这个变量，并且之后每次使用\
    \ `$out` 时，新值都会追加到其现有内容之后。第 19 行开始一个新的表格，第 20 行使用 `HTML` 辅助函数来编写表格的标题单元格。注意，这些标题单元格包含文本，用于告知用户哪一列代表一周中的哪一天。\n\
    \n第 22–33 行是遍历第一周的第一次迭代。注意，这次迭代以一个表格行元素（`<tr>`）开始，并以结束该行的闭合标签结束。第 23 行开始一个循环，用于处理该行中的每个单元格，`1`\
    \ 代表第一个单元格（即星期日），`7` 代表最后一个单元格（即星期六）。第 24 行检查月份第一天落在哪里。如果 `$day` 小于或等于 `1`（换句话说，如果在迭代的这个点上，`$day`\
    \ 被设置为该月的第一个日期），并且 `$firstday` 时间戳不等于当前日期（由 `$days_array` 指定），那么该元素将显示一个空白单元格。否则，它将创建一个表格单元格，其中显示值\
    \ `$day` 以及存储在数据库中当天的事件。这样的单元格由第 27–30 行创建。当显示一天时，下一天将成为 `$day` 的新值，因此第 30 行将\
    \ `$day` 增加 `1`。\n\n注意，第 28 行使用了一个辅助函数 `$calendar->events()`，该函数尚未创建。这个函数将遍历 `$events`\
    \ 数组，该数组将是 `Events` 控制器的结果。这些结果来自在数据库中为关联事件执行 `find` 请求，并在 `Listing 13-12` 的第\
    \ 5 行传递给辅助函数。对于该数组中与 `Listing 13-13` 中第一周迭代的当前日、月、年相匹配的每个事件，`$calendar->events()`\
    \ 函数将返回并在当前日期单元格中显示。由于遍历 `$events` 数组的这个操作会在其他周重复，最好将其编写为另一个辅助函数，而不是重复编写相同的操作。稍后我们将构建\
    \ `$calendar->events()` 函数。目前，`$out` 变量被设置为向视图传递一个新表格，其中包含表示该月第一周的一行以及在该周数据库中查找到的任何事件。\n\
    \n## 渲染第二周和第三周\n\n与渲染月份的第一周类似，现在让我们用 `Listing 13-14` 将第二周和第三周添加到辅助函数中。\n\n**Listing\
    \ 13-14.** *Calendar 辅助函数中的第二周和第三周*\n```\n35 /*** WEEK TWO ***/\n$out .= '<tr>';\n\
    37 for ($i=8; $i<=14; $i++) {\n    $out .= '<td>'.$day.'<br/>';\n    $out .= $this->events($month,$day,$year,$events);\n\
    \    $out .= '</td>';\n    $day++;\n}\n$out .= '</tr>';\n/*** WEEK THREE ***/\n\
    $out .= '<tr>';\n47 for ($i=15; $i<=21; $i++) {\n    $out .= '<td>'.$day.'<br/>';\n\
    \    $out .= $this->events($month,$day,$year,$events);\n    $out .= '</td>';\n\
    \    $day++;\n}\n$out .= '</tr>';\n```\n\n因为第二周和第三周的每个单元格都必须包含一个日期（换句话说，没有月份在这些周有起始日期或结束日期），所以无需检查\
    \ `$day` 的当前值。`$i` 的值上一次由第一周的循环设置，因此第二周的循环以 `8` 到 `14` 之间的值开始。第二周和第三周的其余部分与第一周循环中发生的事情非常相似。\n\
    \n## 渲染第四周\n\n根据年份不同，有些月份可能在第四周结束。因此，对于第四周，检查结束日期是必要的。请参阅 `Listing 13-15` 了解第四周的循环，并将其粘贴到辅助函数中。\n\
    \n**Listing 13-15.** *第四周*\n```\n/*** WEEK FOUR ***/\n$out .= '<tr>';\n57 for\
    \ ($i=22; $i<=28; $i++) {\n    if (strftime(\"%d\",$lastdate) < $day) {\n    \
    \    $out .= '<td>&nbsp;</td>';\n    } else {\n        $out .= '<td>'.$day.'<br/>';\n\
    \        $out .= $this->events($month,$day,$year,$events);\n        $out .= '</td>';\n\
    \        $day++;\n    }\n}\n$out .= '</tr>';\n```\n\n第四周与其他周类似，除了 `Listing 13-15`\
    \ 的第 58–59 行。第 58 行检查保存在 `$lastdate` 中的时间戳是否小于 `$day` 的值。如果是，它将输出一个空白单元格（第 59\
    \ 行）。\n\n## 渲染第五周和第六周"
  raw: 'Line 7 in Listing 13-12 uses the mktime() function to assign a Unix timestamp
    to the variable $firstdate. Notice that variables named $month and $year are used
    to pass the timestamp as month and year values. The first day of the month is
    used here as well. The last date of the month is also set as a timestamp and assigned
    to $lastdate. This one is a little bit more complicated: essentially, mktime()
    is told to provide the timestamp for the following month’s day zero, which is
    the same as the current month’s last day. Because each month has a different number
    of days, this is much handier than trying to specify each month (for example,
    the last day of February is the 28th except on leap years, the last day of March
    is the 30th, but the last day of April is the 31st, and so on). Now with timestamps
    for the first day of a given month and the last day figured out, the helper can
    iterate through the difference in days and create a table cell for each one.


    The layout of the days of the week will not change; in other words, the cells
    for Sunday will always be the first ones of their respective rows, and each row
    will represent a week. The trick is to get the dates of the month, which do change
    from month to month and year to year, to appear in the correct day of the week.
    Lines 11–18 are the $days_array array, which is a static set of days of the week
    as they will appear in the calendar. This array will be used to make sure that
    the helper’s iteration of the days in the month breaks on the weekend at the same
    time the table cells do.


    Line 10 contains the $day variable, which here is set to 1\. This value represents
    the current day in the iteration. Each time a table cell is rendered for a day
    of the month, the $day variable will be called to display the date; then the value
    will increase by 1 for the next day, and so on.


    Line 9 is key to getting the iteration started on the right day of the week. It
    uses the strftime() function to get a three-letter representation of the day of
    the week the timestamp $firstdate lands on. Later, this value will be compared
    with the $days_array values to make sure the first date is placed in the correct
    cell.


    **Rendering the First Week of the Month**


    Let’s begin the iteration by placing Listing 13-13 into the Calendar helper.


    **Listing 13-13.** *Starting the Month Table and Iterating Through the First Week
    of the Month* 19 $out = ''<table class="calendar" cellspacing="0">''; 20 $out
    .= $this->Html->tableHeaders(array(''Sun'',''Mon'',''Tue'',''Wed'',''Thu'',➥


    ''Fri'',''Sat''));


    21 /*** WEEK ONE ***/


    $out .= ''<tr>'';


    for ($i=1; $i<=7; $i++) {


    if ($day<=1 && $firstday != $days_array[$i]) {


    $out .= ''<td>&nbsp;</td>'';


    } else {


