- fmt: '# Objectives


    After completing this chapter, you will be able to


    - Understand how operating systems make programming easier

    - Understand how PHP works with Apache and MySQL/MariaDB to create dynamic web
    pages

    - Install a PHP test environment

    - Determine if the test environment is working properly

    - Create a simple PHP program

    - Execute and test a simple PHP program


    Welcome to the world of programming! Whether you have never attempted to write
    a program before or you have been creating programs for a while, we hope that
    this book will help you to understand the basics of program development. Every
    minute of your life has been surrounded by computers. From the monitors in the
    delivery room the moment you were born to the coffee maker that brewed your dark
    roast this morning (assuming you like coffee), computers and programs attempt
    to make our lives easier. Your interest in programming might have grown due to
    your ability to shine in the gaming world, from using social media applications,
    or, maybe, from watching entrepreneurs on TV pitch their inventions in an attempt
    to create a successful business. No matter the reason, you are here to discover
    how to create programs in the PHP language and, more importantly, determine if
    programming is something you want to do.


    The IT (information technology) industry provides unlimited potential for you
    to be creative and a true pioneer. There is no limit to what you can design and
    create. Your creation could help save the planet or make life easier for a disabled
    person. It is truly up to you to determine what you will invent. You can choose
    to work for a large multinational corporation, a small startup, or venture out
    on your own. As your career progresses, you can change your path as many times
    as you need. You might start with a larger company to build up experience, slide
    into a startup once you discover your expertise, and finally develop your own
    application which will pave your way to retirement. The IT industry provides you
    the freedom to determine your path.


    So, let’s begin this adventure. Since we assume you want to start programming
    as quickly as possible (that is why you bought this book, right?), let’s briefly
    cover some groundwork, so we can all start from the same level of understanding.


    Here we go! First and foremost, "Computers are dumb." What? But they provide us
    with so many amazing tools, how can they be dumb? To keep it simple, computers
    only know two things, 0 and 1. This is based on the idea that a circuit either
    has electricity (1) or it does not (0). This is the basic building block of how
    computer *hardware* and *software* is designed. Hardware is what we commonly think
    of when someone mentions a computer. The physical components, such as the keyboard,
    screen, circuits, memory chips, and other internal components. The software is
    the actual programs (applications) that communicate with the hardware. Every computer
    has an *operating system* which provides the ability for an application (and possibly
    a human) to communicate with the hardware. The operating system is like a language
    interpreter; it converts the information it receives (from an application or human)
    into the language the computer understands. Just like a human interpreter can
    convert English to Spanish.


    A *program* is usually defined as a set of code that accomplishes a task. An *application*
    (app) can be many programs, types of hardware, and even people working together
    to accomplish the task. However, don’t get hung up on these definitions, because
    in the real world we tend to use these two words interchangeably. As you will
    note, we have already done so in this book. The application software is usually
    not designed to directly communicate with the hardware of the computer. It talks
    to the operating system, which then talks to the hardware.


    As an example, think about the applications you use. When you want to print something
    from an application, a print window appears, giving you options for your task.
    If you were then to open up another application on your computer and print from
    that application, the same print window appears. Where did that come from? The
    operating system. Operating systems include coding for common tasks that applications
    request. These modules include blocks of code and the *interface* (graphical window)
    when required. An application uses an *API* (*application programming interface*)
    call when using one of these tools. An API is simply a line of code that tells
    the operating system what block of code to execute and what parameters (information)
    to use when executing the code.


    The print API might request the operating system place the requested document
    into the *print queue*. The print queue is a list of documents waiting to be printed.
    Not only can the operating system talk to the printer, but the printer can also
    talk to the operating system. It actually sends a special signal (*interrupt*)
    back to the operating system letting it know when a print job is complete (or
    if there is a problem, such as out of paper). The operating system, once a print
    job is complete, will remove that job from the queue and send the next job to
    the printer.


    We have greatly simplified the actual process. For example, when the requests
    are sent back and forth between the operating system and the printer, the instructions
    (language) are converted back and forth from what the operating system understands
    to what the printer understands. Where does this conversion happen? With the help
    of a little application called the *print driver*. Actually, we could dig into
    this even deeper, but the point is that the application, the operating system,
    and the hardware (including the printer) work together to accomplish tasks. Hardware
    is worthless without software (except maybe as a doorstop), and software can’t
    exist without hardware (except maybe in our imagination).


    Remember, we stated that computers only know 0 and 1. So how do they accomplish
    so much if that is all they know? As we know, computers have the ability to store
    information. They can store this information in the *memory*, on an *internal
    storage device* (*hard drive*, *chip*), or even on an *external server* (the cloud).
    Information that is stored by a computer is stored as a series of 0s and 1s. A
    *bit* is a single 0 or 1. A *byte* is a series of multiple 0s and 1s. The size
    (number of 0s and 1s) of a byte might vary depending on the computer (..., 32,
    64, 128, ...), but it accomplishes the same task of either storing information
    or executing a task. A *word size* is the number of bits that can be stored within
    a computer at one location (in memory or a storage device) or executed at one
    time. The larger the word size, the more information that can be saved or executed
    at one time. Computers with larger word sizes process information faster.'
