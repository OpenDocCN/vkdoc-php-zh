  trans: "```php\n$title = \"Building and processing HTML forms with PHP\";\n$pageData->content\
    \ = \"will soon show a navigation...\";\n$pageData->content .= \"...and a form\
    \ here\";\nrequire \"templates/pagewithcss.php\";\necho $page;\n?>\n```\n\n**清单\
    \ 3-1** `index.php`\n\n### 亲自查看\n\n要检查所有内容是否已正确输入，请保存`index.php`文件，然后使用浏览器导航至`http://localhost/ch3/index.php`。预期的输出如图\
    \ 3-4 所示。\n\n![图 3-4](img/323857_3_En_3_Fig4_HTML.jpg)\n\n**图 3-4** `index.php`的输出\n\
    \n**练习**：虽然没有禅师用棍子督促你，但请尝试回答以下问题。你的答案将表明你目前所学到的内容。如有疑问，可查阅第 2 章寻求解释。\n\n*   `include_once`的作用是什么？\n\
    *   `$pageData->title`如何更改生成的 HTML 页面的`<title>`？\n*   `.=`的含义是什么？其技术名称是什么？\n*\
    \   当我们`echo $page`时会发生什么？\n\n### 创建动态导航\n\n我们将创建两个不同的表单。因此，我们需要一个站点菜单来在这些表单之间导航。让我们创建一个新文件`ch3/views/navigation.php`，内容如下。\n\
    \n```php\n<?php\n$nav = <<< NAV\n<nav>\n<a href=\"index.php?page=search\">在必应上搜索</a>\n\
    <a href=\"index.php?page=quiz\">动态测验</a>\n</nav>\nNAV;\n?>\n```\n\n**清单 3-2**\
    \ `navigation.php`\n\n请注意，我们用于导航的代码与第 2 章中使用的代码非常相似。我们只更改了页面以及导航中要显示的字符串。现在，让我们添加在索引文件中显示此导航所需的代码。\n\
    \n```php\n<?php\n$title = \"Building and processing HTML forms with PHP\";\n$pageData->content\
    \ = $nav;\n$pageData->content .= \"...and a form here\";\nrequire \"templates/pagewithcss.php\"\
    ;\necho $page;\n?>\n```\n\n**清单 3-3** `indexwithnavigation.php`\n\n输出目前还不太美观。但我们正在取得进展。现在，通过使用与第\
    \ 2 章所学的类似的代码，我们有了一个带有导航的新索引页面。\n\n![图 3-5](img/323857_3_En_3_Fig5_HTML.jpg)\n\
    \n**图 3-5** `indexwithnavigation.php`的输出\n\n### 为表单创建页面视图\n\n我们可以沿用第 2 章的命名约定，因为它为动态网站提供了稳固的代码架构。这种组织和命名页面视图的方式可以为我们构建动态站点提供思维框架。当我们内化了这个框架后，就会知道需要为站点开发哪些文件。我们无需每次新建站点时都重新设计一个良好的动态架构。\n\
    \n前一节中描述的导航包含指向名为*search*和*quiz*页面的链接。因此，我们必须在`views`文件夹中创建两个新的 PHP 文件。\n\n| Href\
    \ | url variable | view file |\n| --- | --- | --- |\n| `index.php?page = search`\
    \ | `page = search` | `views/search.php` |\n| `index.php?page = quiz` | `page\
    \ = quiz` | `views/quiz.php` |\n\n让我们按如下方式创建这两个新文件。\n\n```php\n<?php\n// views/search.php\n\
    $info = \"<h1>在必应上搜索</h1>\";\n$info .= \"<p>使用一个简单的表单搜索网络。</p>\";\n?>\n```\n\n\
    **清单 3-4** `search.php`\n\n```php\n<?php\n// views/quiz.php\n$info = \"<h1>动态测验</h1>\"\
    ;\n$info .= \"<p>通过测验测试你的知识。</p>\";\n?>\n```\n\n**清单 3-5** `quiz.php`\n\n代码非常简单。但足以帮助我们开始测试导航。\n\
    \n### 在索引页面上显示页面视图\n\n为了在请求时显示这些页面视图，我们需要编写几行额外的代码，这些代码几乎与我们在第 2 章的索引文件中编写的代码相同。与第\
    \ 2 章项目相比，唯一的变化是使用了 quiz 和 search 视图。专业的程序员会形成一种编码风格，并坚持使用这种风格，以提高可靠性、安全性和代码开发效率。\n\
    \n```php\n<?php\n$title = \"Building and processing HTML forms with PHP\";\n$pageData->content\
    \ = $nav;\n$pageData->content .= \"...and a form here\";\n$navigationIsClicked\
    \ = isset($_GET['page']);\nif ($navigationIsClicked ) {\n    $fileToLoad = $_GET['page'];\n\
    } else {\n    $fileToLoad = \"search\";\n}\ninclude_once \"views/$fileToLoad.php\"\
    ;\n$pageData->content .= $info;\nrequire \"templates/pagewithcss.php\";\necho\
    \ $page;\n?>\n```\n\n**清单 3-6** `indexwithclass.php`\n\n现在，该页面将加载用户请求的任何视图。如果没有点击任何导航项，它将显示`views/search.php`。我们可以通过在浏览器中加载`http://localhost/ch3/indexwithclass.php`来测试代码。\n\
    \n![图 3-6](img/323857_3_En_3_Fig6_HTML.jpg)\n\n**图 3-6** `indexwithclass.php`的输出\n\
    \n### 程序设计及逻辑\n\n重用代码是一个好主意，因为这能使程序员更快、更可靠、更安全地开发解决方案。如果你在一个经过良好测试的项目中拥有可用的脚本，那么你可以信任它们在其它项目中也能发挥相同的作用。因此，代码重用可以减少调试时间并加快开发速度。\n\
    \n总会有一些部分不容易重用，比如导航。但是，如果你养成了在不同项目中以大致相同的方式创建动态导航的习惯，你将能够快速且轻松地开发新的动态导航。因此，当你无法按原样重用代码时，你仍然可以重用那些已经过测试且可靠代码背后的原理。\n\
    \n### 一个简单的搜索表单\n\nHTML 表单使用`<form>`元素创建。还有一些其他专门为表单设计的 HTML 元素。其中最基本的一个可能是`<input>`元素，用于接受用户输入的值。让我们创建一个简单的表单，如下所示。\n\
    \n```php\n<?php\n$info = \"<h1>在必应上搜索</h1>\";\n$info .= \"<form action=\\\"http://www.bing.com/search\\\
    \" method=\\\"get\\\">\";\n$info .= \"<input type=\\\"text\\\" name=\\\"q\\\"\
    \ />\";\n$info .= \"<input type=\\\"submit\\\" value=\\\"搜索\\\" />\";\n$info .=\
    \ \"</form>\";\n?>\n```\n\n**清单 3-7** `simplesearch.php`\n\n**注意**：导航文件（`simplenavigation.php`）和索引文件（`simpleindex.php`）也已更新以使用此简单搜索表单。请花些时间查看这些文件的更改。\n\
    \n让我们通过从`simpleindex.php`调用新的搜索表单来测试它。\n\n![图 3-7](img/323857_3_En_3_Fig7_HTML.jpg)\n\
    \n**图 3-7** `simpleindex.php`的输出\n\n我们可以在文本字段中输入一个搜索字符串，然后点击按钮。浏览器将加载`bing.com`，因为表单标签中的\
    \ action 设置将通过 get 命令将信息传递给必应搜索引擎。必应会对我们输入的任何内容执行搜索。如果我们输入*cats*并点击搜索按钮，那么“cats”将被传递给必应。传递“cats”后，必应的\
    \ URL 将包含`www.bing.com/search?q=cats`。正如我们之前所述，搜索引擎通过 get 方法接受信息，以避免在完成搜索时使用额外的服务器内存。因此，必应期望一个\
    \ URL 变量，而我们提供了它。请注意，必应使用变量`q`来存储搜索信息。清单 3-7 显示，此变量是通过简单搜索表单中的文本框创建的。\n\n**注意**：使用表单时，点击“提交”按钮将导致任何\
    \ GET 或 POST 变量被发送到 action 参数中列出的 web 服务器上的应用程序。然后，该应用程序可以检索该信息以供其使用。该应用程序将在 web\
    \ 服务器内执行，执行结果将发送到用户的浏览器进行显示。在我们的示例中，浏览器将显示必应对 cats 的搜索结果。\n```"
- fmt: "# The `<input>` Element and Some Common Types\n\nDid you notice that `<input\
    \ type=\"text\" />` displays as a single-line text field and that `<input type=\"\
    submit\"/>` displays as a Submit button? There are many possible values for the\
    \ input `type` attribute. In this book, we will see a small handful of input types.\
    \ Once you can work with those, you should have no problems learning how to use\
    \ the remaining input types.\n\n# Understanding the `method` Attribute\n\nSo far,\
    \ we have only seen variables that could be seen in the URL, in the browser’s\
    \ address bar. This kind of URL variable is encoded using the HTTP method `GET`.\
    \ We have used such variables to create a dynamic navigation and a form that can\
    \ perform a search at [`www.bing.com`](http://www.bing.com). Any URL variable\
    \ encoded with `GET` is limited to relatively few characters. The exact number\
    \ varies from browser to browser. Because `GET` variables are evident from the\
    \ URL, pages can be bookmarked and linked. Therefore, `GET` variables are perfectly\
    \ suited for site navigation or in any situation in which server memory usage\
    \ must be limited, such as websites with a lot of traffic. Too much dependence\
    \ on the use of server memory can cause the server to quickly run out of memory\
    \ and shut down. Not something you want to happen when your site is busy!\n\n\
    # Named PHP Functions\n\nPerhaps one of the most powerful features of a programming\
    \ language is the ability to define and execute functions. A *function* is a named\
    \ block of code we declare within our scripts that we can call at any time.\n\n\
    ## Program Design and Logic\n\nMany new programmers assume that program code is\
    \ executed from the top of the program, one instruction after the other, to the\
    \ bottom of the program. However, this is not the case. Programs have many instructions\
    \ that cause the flow to go a different path. For example, the `if` statement\
    \ that we introduced in Chapter [2](#323857_3_En_2_Chapter.xhtml) will make a\
    \ choice whether to execute the code within the first set of brackets or execute\
    \ the code after an `else` statement. We say that the code jumps to the `else`\
    \ structure or jumps over the `else` structure depending on whether the conditional\
    \ statement was true or false.\n\nThe page object we have been using in our examples\
    \ resides within its own location in memory. The program jumps to the page object\
    \ whenever we use it and jumps back to the next instruction in the main code afterward.\
    \ Functions cause a similar flow change. The program jumps to the function when\
    \ called, executes the code within the function, and then returns to the main\
    \ code afterward. We will soon discover other instructions that change our program\
    \ flow.\n\n## The Basic Syntax for Named Functions\n\nLet’s take a first look\
    \ into the basics of named functions in PHP.\n\n```\nfunction functionName ()\
    \ {\n//function body\n}\n```\n\nThe syntax format of a function requires that\
    \ we first declare the function using the `function` keyword and then create a\
    \ function name to uniquely identify the function. Function names can contain\
    \ any alphanumeric characters and underscores, but they must not start with a\
    \ number. The function name is followed with a set of parentheses and a code block\
    \ delimited by curly braces.\n\n### Program Design and Logic\n\nWhile we have\
    \ the freedom to create function names in almost any format we choose, the goal\
    \ is to create a program that is easy to read and understand. With this in mind,\
    \ one standard way to declare function names is to use an action verb and a subject,\
    \ such as `getFirstName`. By declaring functions using this standard, it is clear\
    \ that this function will bring back the first name, without us having to look\
    \ at the actual code. It is also common to use camel hump (first word lowercase,\
    \ all other words uppercase). Some programmers will separate the words with an\
    \ underscore, such as `get_First_Name`. Determine your own style and use it consistently\
    \ throughout your programs.\n\nLet’s create a new PHP file which contains a function\
    \ within our `ch3` folder.\n\n```\n<?php\nfunction getParagraph() {\n    echo\
    \ \"<p>This paragraph came from a function</p>\";\n}\n?>\nListing 3-8\ntestfunction.php\n\
    ```\n\nIf we load `http://localhost/ch3/testfunction.php` into our browser, we\
    \ will see no output. Many beginners would expect to see an output from the preceding\
    \ code. But functions don’t always behave as beginners assume. The code inside\
    \ the function body will not be executed until the function name is explicitly\
    \ *called*. We can add a function call in the new file `testfunction.php` to execute\
    \ the code as follows.\n\n```\n<?php\nfunction getParagraph() {\n    echo \"<p>This\
    \ paragraph came from a function</p>\";\n}\ngetParagraph();\n?>\nListing 3-9\n\
    calltestfunction.php\n```\n\nIf we run this new file in a browser, we will see\
    \ the expected output.\n\n![](images/323857_3_En_3_Chapter/323857_3_En_3_Fig8_HTML.jpg)\n\
    \nThis window represents the result of the return test function when the code\
    \ is executed in the program.\n\n**Figure 3-8** Output of `calltestfunction.php`\n\
    \nA really interesting feature of functions is that they can be reused very easily.\
    \ Simply call a function twice, and it runs twice. Let’s do it.\n\n```\n<?php\n\
    function getParagraph() {\n    echo \"<p>This paragraph came from a function</p>\"\
    ;\n}\ngetParagraph();\ngetParagraph();\n?>\nListing 3-10\ncalltwicetestfunction.php\n\
    ```\n\nYou can probably correctly guess that the code will output two `<p>` elements,\
    \ each with the same text: `This paragraph came from a function`. What is more\
    \ important is that we can see the difference between *function declarations*\
    \ and *function calls*. The example has two distinct function calls.\n\nThis function\
    \ isn’t very flexible. It can only do one thing, i.e., output that one string.\
    \ When we create functions, we should consider all possible uses for the function.\
    \ Instead of making a beginning programmer’s mistake of using `echo` to output\
    \ the string within the function, a better choice is to “return” the string and\
    \ allow the code that called the function the decision on how to use the string\
    \ returned. Let’s adjust our example.\n\n```\n<?php\nfunction getParagraph() {\n\
    \    return \"<p>This paragraph came from a function</p>\";\n}\n$output = getParagraph();\n\
    $output .= \"Just some heading\";\n$output .= getParagraph();\necho $output;\n\
    echo getParagraph();\n?>\nListing 3-11\nreturntestfunction.php\n```\n\nLet’s look\
    \ at the output when we run this.\n\n![](images/323857_3_En_3_Chapter/323857_3_En_3_Fig9_HTML.jpg)\n\
    \nThis page reflects the function of return test imports the characteristic into\
    \ the authentic program to hold the original code for the output string.\n\n**Figure\
    \ 3-9** Output from `returntestfunction.php`\n\nNow this is much, much better!\
    \ Why? Let’s take a look.\n\n```\nreturn \"This paragraph came from a function\"\
    ;\n```\n\nThe function `return` statement passes the string provided back to the\
    \ instruction that called the function. This then allows that instruction to determine\
    \ how to use the string.\n\n```\n$output = getParagraph();\n```\n\nWe can create\
    \ a variable to hold the string.\n\n```\n$output .= getParagraph();\n```\n\nWe\
    \ can append the string passed to the existing contents of a string variable.\n\
    \n```\necho getParagraph();\n```\n\nOr we can simply `echo` out the string to\
    \ the user. We have a lot more flexibility!\n\n### Program Design and Logic\n\n\
    Experienced programmers rarely `echo` out information (strings) directly in a\
    \ function. It is much better to use a `return` statement. This provides a much\
    \ more useful function that can be used in many ways, as seen earlier. Useful\
    \ functions can be placed in libraries. This allows the function to be used by\
    \ other programs. These programs can use the function in the manner that works\
    \ best for their needs.\n\n**Exercise**: Adjust the previous example by placing\
    \ the function into a library file. Then import the function into the original\
    \ program. Keep the original code for the `$output` string. Run the program. The\
    \ output should be the same as Figure [3-9](#323857_3_En_3_Chapter.xhtml#Fig9).\
    \ However, now you have a function that can be used in any program!\n\n# Using\
    \ Function Arguments for Increased Flexibility\n\nThis function is still not as\
    \ flexible as it could be. So, let’s improve the `function getParagraph()` with\
    \ a *function argument*."
