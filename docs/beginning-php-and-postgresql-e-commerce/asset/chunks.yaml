    \ %H:%M:%S', strtotime($this->mStartDate));\n```\n\n> **注意** 请查阅 [`www.php.net/strtotime`](http://www.php.net/strtotime)\
    \ 了解 `strtotime` 函数支持的输入格式，以及 [`www.php.net/strftime`](http://www.php.net/strftime)\
