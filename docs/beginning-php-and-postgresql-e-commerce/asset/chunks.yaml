    **How It Works: The Business Tier Search Method**


    The main purpose of the FlagStopWords method is to analyze which words will and
    will not be used for searching.


    The full-text feature of PostgreSQL automatically filters the words that are less
    than four letters by default, and you don’t interfere with this behavior in the
    business tier. However, you need to find out which words will be ignored by PostgreSQL
    so you can inform the visitor.


    The Search method of the business tier is called from the presentation tier with
    the following parameters (notice all of them except the first one are the same
    as the parameters of the data tier Search method):


    • $searchString contains the search string entered by the visitor.


    • $allWords is “on” for all-words searches.


    • $pageNo represents the page of products being requested.


    • $rHowManyPages represents the number of pages.


    The method returns the results to the presentation tier in an associative array.


    **Implementing the Presentation Tier**


    The catalog-searching feature has two separate interface elements that you need
    to implement:


    • A componentized template named search_box, whose role is to provide the means
    to enter the search string for the visitor (refer to Figure 5-1).


    • A componentized template named search_results, which displays the products matching
    the search criteria (refer to Figure 5-2).


    You’ll create the two componentized templates in two separate exercises.


    **Creating the Search Box**


    Follow the steps in the exercise to build the search_box componentized template,
    and integrate it into HatShop.


