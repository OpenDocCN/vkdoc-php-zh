    \ Cookie 不同，会话数据存储在服务器上。\n\n## 启动会话\n\n要开始会话，使用`session_start()`函数。此函数必须在向网页发送任何输出之前出现。\n\
    \n```\n<?php session_start(); ?>\n```\n\n`session_start()`函数会在客户端计算机上设置一个 Cookie，其中包含用于将客户端与会话关联的\
    \ ID。如果客户端已有正在进行的会话，该函数将恢复该会话，而不是启动新会话。\n\n## 会话数组\n\n会话启动后，可以使用`$_SESSION`数组存储和检索会话数据。例如，可以通过以下代码存储页面浏览次数。第一次浏览页面时，将会话元素初始化为\
    \ 1。\n\n```\nif(isset($_SESSION['views']))\n  $_SESSION['views'] += 1;\nelse\n\
    \  $_SESSION['views'] = 1;\n```\n\n只要在页面顶部调用了`session_start()`，就可以从域中的任何页面检索此元素。\n\
    \n```\necho 'Views: ' . $_SESSION['views'];\n```\n\n## 删除会话\n\n会话保证持续到用户离开网站。此时垃圾回收器可以自由删除该会话。要手动删除会话变量，可以使用`unset()`函数；要删除所有会话变量，可以使用`session_destroy()`函数。\n\
    \n```\nunset($_SESSION['views']); // 销毁会话变量\nsession_destroy();         // 销毁会话\n\
    ```\n\n---\n\n# 第 26 章 命名空间\n\n命名空间提供了一种避免命名冲突并将命名空间成员组织成层次结构的方法。任何代码都可以包含在命名空间中，但只有四种代码结构受影响：类、接口、函数和常量。\n\
    \n## 创建命名空间\n\n未包含在命名空间中的代码结构属于全局命名空间。\n\n```\n// 全局代码/命名空间\nclass MyClass {}\n\
    ```\n\n要将代码结构分配到其他命名空间，需要定义`namespace`指令。`namespace`指令下方的代码结构将属于该命名空间。命名空间的命名约定为全小写。\n\
    \n```\nnamespace my;\n\n// 属于 my 命名空间\nclass MyClass {}\n```\n\n包含命名空间代码的脚本文件必须在文件顶部、任何其他\
    \ PHP 或 HTML 代码之前声明命名空间。\n\n```\n<?php\nnamespace my;\nclass MyClass {}\n?>\n\
    <html><body></body></html>\n```\n\n## 嵌套命名空间\n\n命名空间可以嵌套任意多层，以进一步定义命名空间层次结构。与\
    \ Windows 中的目录和文件类似，命名空间及其成员使用反斜杠字符分隔。\n\n```\nnamespace my\\sub;\nclass MyClass\
    \ {} // my\\sub\\MyClass\n```\n\n## 替代语法\n\n或者，命名空间可以使用其他编程语言中常用的花括号语法定义。与常规语法一样，命名空间外不能存在任何文本或代码。\n\
    \n```\n<?php\nnamespace my\n{\n  class MyClass {}\n?>\n<html><body></body></html>\n\
    <?php }?>\n```\n\n可以在同一文件中声明多个命名空间，尽管这被认为不是良好的编码实践。如果要将全局代码与命名空间代码结合使用，则必须使用花括号语法。全局代码被包含在无名称的命名空间块中。\n\
    \n```\n// 命名空间代码\nnamespace my\n{\n  const PI = 3.14;\n}\n\n// 全局代码\nnamespace\n\
    {\n  echo my\\PI; // \"3.14\"\n}\n```\n\n与其他 PHP 结构不同，同一个命名空间可以在多个文件中定义。这允许将命名空间内容拆分到多个文件中。\n\
    \n## 引用命名空间\n\n命名空间成员可以通过三种方式引用：完全限定名称、限定名称和未限定名称。完全限定名称始终可以使用。它由全局前缀运算符（`\\`）后跟命名空间路径和成员组成。全局前缀运算符表示路径相对于全局命名空间。\n\
    \n```\nnamespace my\n{\n  class MyClass {}\n}\n\nnamespace other\n{\n  // 完全限定名称\n\
    \  $obj = new \\my\\MyClass();\n}\n```\n"
- fmt: "合格名称包括命名空间路径，但不包含全局前缀运算符。因此，它只能用于在当前命名空间层级以下定义的成员。\n\n```php\nnamespace my\n\
    {\n  class MyClass {}\n}\n\nnamespace\n{\n  // 合格名称\n  $obj = new my\\MyClass();\n\
    }\n```\n\n单独使用成员名称，即非限定名称，只能在定义该成员的命名空间内使用。\n\n```php\nnamespace my\n{\n  class\
    \ MyClass {}\n\n  // 非限定名称\n  $obj = new MyClass();\n}\n```\n\n非限定类名和接口名只会解析到当前命名空间。相反，如果非限定函数或常量在当前命名空间中不存在，则会尝试解析到同名的全局函数或常量。\n\
    \n```php\nnamespace\n{\n  function myPrint() { echo 'global'; }\n}\nnamespace\
    \ my\n{\n  // 回退到全局命名空间\n  myPrint(); // \"global\"\n}\n```\n\n或者，可以使用全局前缀运算符显式引用全局成员。如果命名空间中包含同名函数，则需要这样做。\n\
    \n```php\nnamespace my\n{\n  function myPrint() { echo 'my'; }\n\n  // 从全局命名空间调用函数\n\
      \\myPrint(); // \"global\"\n  myPrint();  // \"my\"\n}\n```\n\n**命名空间别名**\n\n\
    可以创建别名来缩短限定名称，从而提高源代码的可读性。类、接口和命名空间的名称可以缩短，但不支持函数和常量别名。别名通过`use`指令定义，该指令必须直接放置在命名空间名称之后。\n\
    \n```php\nnamespace my;\nclass MyClass {}\n\nnamespace foo;\nuse my\\MyClass as\
    \ MyAlias;\n$obj = new MyAlias();\n```\n\n使用括号语法时，任何`use`指令都放在左花括号之前。\n\n```php\n\
    namespace foo;\nuse my\\MyClass as MyAlias;\n{\n  $obj = new MyAlias();\n}\n```\n\
    \n可以省略`as`子句，以成员当前名称导入。\n\n```php\nnamespace foo;\n\n// 等同于 my\\MyClass as MyClass\n\
    use \\my\\MyClass;\n$obj = new MyClass();\n```\n\n不支持批量导入另一个命名空间的成员。但是，存在一个语法快捷方式，可以在同一个`use`语句中导入多个成员。\n\
    \n```php\nnamespace foo;\nuse my\\Class1 as C1, my\\Class2 as C2;\n```\n\n请记住，别名仅适用于定义它们的脚本文件。因此，导入的文件不会继承父文件的别名。\n\
    \n**`namespace` 关键字**\n\n`namespace`关键字可以用作一个常量，其值为当前命名空间，在全局代码中则为空字符串。它可以用来显式引用当前命名空间。\n\
    \n```php\nnamespace my\\name\n{\n  function myPrint() { echo 'Hi'; }\n}\nnamespace\
    \ my\n{\n  namespace\\name\\myPrint(); // \"Hi\"\n  name\\myPrint();          \
    \ // 同上\n}\n```\n\n**命名空间指南**\n\n随着 Web 应用程序中涉及的组件数量增加，名称冲突的可能性也随之增加。一种解决方案是使用组件名称作为名称的前缀。然而，这会产生长名称，从而降低源代码的可读性。因此，PHP\
    \ 5.3 引入了命名空间，允许开发人员将每个组件的代码分组到独立的命名容器中。\n\n**第 27 章**\n\n![image](images/frontdot.jpg)\n\
    \n**引用**\n\n引用是一种别名，它允许两个不同的变量写入同一个值。可以对引用执行三种操作：按引用赋值、按引用传递和按引用返回。\n\n**按引用赋值**\n\
    \n通过将 &（&）符号放在要绑定的变量前面来分配引用。\n\n```php\n$x = 5;\n$r = &$x; // r 是 x 的引用\n$s =&\
    \ $x; // 替代语法\n```\n\n然后，该引用成为该变量的别名，并且可以像原始变量一样使用。\n\n```php\n$r = 10; // 为 $r/$x\
    \ 赋值\necho $x; // \"10\"\n```\n\n**按引用传递**\n\n在 PHP 中，函数参数默认通过值传递。这意味着传递的是变量的本地副本，因此如果修改了副本，则不会影响原始变量。"
  raw: 'The qualified name includes the namespace path, but not the global prefix
    operator. It can therefore only be used if the wanted member is defined in a namespace
    below the current namespace in the hierarchy.


    ```

    namespace my

    {

      class MyClass {}

    }


    namespace

    {

      // Qualified name

      $obj = new my\MyClass();

    }

    ```


    The member name alone, or unqualified name, may only be used within the namespace
    that defines the member.


    ```

    namespace my

    {

      class MyClass {}


    // Unqualified name

      $obj = new MyClass();

    }

    ```


    Unqualified class and interface names will only resolve to the current namespace.
    In contrast, if an unqualified function or constant does not exist in the current
    namespace, they will try to resolve to any global function or constant by the
    same name.


    ```

    namespace

    {

      function myPrint() { echo ''global''; }

    }

    namespace my

    {

      // Falls back to global namespace

      myPrint(); // "global"

    }

    ```


    Alternatively, the global prefix operator can be used to explicitly refer to the
    global member. This would be necessary if the namespace contained a function with
    the same name.


    ```

    namespace my

    {

      function myPrint() { echo ''my''; }


    // Call function from global namespace

      \myPrint(); // "global"

      myPrint();  // "my"

    }

    ```


    Namespace aliases


    Aliases can be created to shorten qualified names in order to improve the readability
    of the source code. The names for classes, interfaces and namespaces can be shortened,
    whereas function and constant aliases are not supported. An alias is defined with
    a use directive, which must be placed directly after the namespace name.


    ```

    namespace my;

    class MyClass {}


    namespace foo;

    use my\MyClass as MyAlias;

    $obj = new MyAlias();

    ```


    With the bracketed syntax, any use directives are placed before the opening curly
    bracket.


    ```

    namespace foo;

    use my\MyClass as MyAlias;

    {

      $obj = new MyAlias();

    }

    ```


    The as clause may optionally be left out to import the member under its current
    name.


    ```

    namespace foo;


    // Same as my\MyClass as MyClass

    use \my\MyClass;

    $obj = new MyClass();

    ```


    It is not possible to mass-import the members of another namespace. However, there
    is a syntactical shortcut for importing multiple members in the same use statement.


    ```

    namespace foo;

    use my\Class1 as C1, my\Class2 as C2;

    ```


    Keep in mind that aliases only apply to the script file that defines them. An
    imported file will therefore not inherit the parent file’s aliases.


    Namespace keyword


    The `namespace` keyword can be used as a constant that will evaluate to the current
    namespace, or an empty string in global code. It may be used to explicitly refer
    to the current namespace.


    ```

    namespace my\name

    {

      function myPrint() { echo ''Hi''; }

    }

    namespace my

    {

      namespace\name\myPrint(); // "Hi"

      name\myPrint();           // same as above

    }

    ```


    Namespace guideline


    As the number of components involved in a web application grow, so too increases
    the potential for name clashes. One solution for this is to prefix names with
    the name of the component. However, this creates long names which reduce the readability
    of the source code. For this reason PHP 5.3 introduced namespaces, which allow
    developers to group code for each component into separate named containers.


    CHAPTER 27


    ![image](images/frontdot.jpg)


    References


    A reference is an alias which allows two different variables to write to the same
    value. There are three operations that can be performed with references: assign
    by reference, pass by reference and return by reference.


    Assign by reference


    A reference is assigned by placing an ampersand (`&`) before the variable that
    is to be bound.


    ```

    $x = 5;

    $r = &$x; // r is a reference to x

    $s =& $x; // alternative syntax

    ```


    The reference then becomes an alias for that variable and can be used exactly
    as if it was the original variable.


    ```

    $r = 10; // assign value to $r/$x

    echo $x; // "10"

    ```


    Pass by reference


    In PHP, function arguments are by default passed by value. This means that a local
    copy of the variable is passed, so if the copy is changed it will not affect the
    original variable.'
