  trans: '

    # 搭建开发环境


    搭建一个可用的*开发环境*起初可能会令人望而生畏，尤其是对于绝对的初学者而言。不过，开发者们已经创建了许多类型的软件包，这些软件包可以一键安装我们所需的一切，并采用默认设置。我们不再需要进入配置文件来手动连接各个环境组件（除非我们想这么做）。环境会自动为我们整合好。为了能够跟随本书中的项目进行实践，我们需要拥有一个包含*Apache*（*Web
    服务器*）、PHP 和 *MySQL/MariaDB*（*数据库*）的可用的开发（测试）环境。出于速度和安全性考虑，在本地（单台机器上，而非服务器）进行测试总是更理想的选择。这样既能保护正在进行的工作免受开放互联网上黑客的攻击，又能减少上传文件到*Web
    服务器*所花费的时间。它让你在将程序部署到线上环境之前，能够进行彻底测试并确保其安全性。


    PHP 是一种功能强大的*脚本语言*，可以独立运行。然而，仅靠 PHP 本身并不足以构建动态网站应用程序。要使用 PHP 开发网站，我们需要一个知道如何处理
    PHP 脚本的 Web 服务器。Apache 是一个免费的 Web 服务器，一旦安装在计算机上，它就能让开发者们在本地测试 PHP 脚本；这使得它成为本地开发环境中不可或缺的一部分。Apache
    是与 PHP 结合使用的最流行的 Web 服务器。


    此外，Web 应用程序还需要存储信息。可以开发 PHP 代码将这些信息存储在数据库中，以便能够快速、轻松地进行修改。这是 PHP 应用程序与*HTML*网站之间的显著区别。纯
    HTML 的网站无法存储信息。这正是像 MySQL 这样的*关系型数据库管理系统*发挥作用的地方。本书中的许多示例都使用 MySQL/MariaDB 数据库系统来存储信息。


    > **注意**：无需深入细节，MySQL 和 MariaDB 是非常相似的系统。当 Oracle 收购 MySQL 后，一些开发者希望确保仍有一个免费版本的
    MySQL 存在（尽管在本书出版时 Oracle 确实仍提供免费版本）。MariaDB 正是这种合作努力的成果。他们确保使用任一数据库系统创建程序时，无需更改任何代码。你甚至会发现，有些软件包在使用“MySQL”这个术语时，实际上指代的却是
    MariaDB 数据库。


    ## 什么是 PHP？PHP 是如何工作的？


    PHP 是一种通用脚本语言，最初由拉斯马斯·勒德尔夫（Rasmus Lerdorf）于 1995 年构思。勒德尔夫创建 PHP 是为了满足在创建*万维网*页面时，需要一种简单方法来处理数据的需求。


    > **注意**：PHP 诞生于拉斯马斯·勒德尔夫想要创建一个能记录其在线简历访问次数的脚本的愿望。由于他创建的脚本大受欢迎，勒德尔夫继续开发了这种语言。随着时间的推移，其他开发者也加入了他一起开发该软件。如今，PHP
    是最流行的脚本语言之一。


    PHP 最初代表 *Personal Home Page*（个人主页），并以免费、*开源*项目的形式发布。随着时间的推移，这种语言经过重新设计以满足用户的需求。1997
    年，PHP 更名为 PHP: *Hypertext Preprocessor*（超文本预处理器），也就是现在众所周知的名称。在撰写本书时，PHP 8.1.1
    是当前稳定版本。许多服务器上仍在使用旧版本的 PHP。然而，这些旧版本可能不够安全。PHP 8 对该语言进行了许多强大的改进，提高了可用性、速度和安全性。本书中提供的所有代码均可使用
    PHP 8（或更高版本）运行。部分代码也适用于之前的版本。我们建议您安装并使用最新的可用版本。


    HTML 在页面下载后由用户计算机上的*浏览器*解析。浏览器根据 HTML 和 CSS 提供的代码决定如何展示信息。由于 PHP 代码（与 HTML 不同）保留在远程
    Web 服务器上，因此浏览器无法处理 PHP 代码。PHP 由连接到 Web 服务器（如 Apache）的*PHP 解释器*进行处理。PHP 代码执行的结果（而不是
    PHP 代码本身）会被包含在文档（网页）中，然后再发送给用户浏览器进行解释。因为 PHP 是在服务器上处理的，所以它是一种*服务器端脚本语言*。


    **练习**：寻找一家使用 PHP 的公司。访问他们的网站。查看网站主页的源代码。你可以通过浏览器中的“查看源代码”选项来查看代码。你找到 PHP 代码了吗？答案是没有。为什么？因为你的浏览器显示的是
    PHP 代码被 Web 服务器处理后的结果。你可以看到 HTML、CSS 和 JavaScript 代码，但看不到任何 PHP 代码。在哪里能看到 PHP
    代码呢？如果你有访问权限，可以在服务器本身上查看它。


    使用 PHP，你可以创建动态网页（能够根据条件变化的网页）。例如：当你登录自己的 Facebook 账户时，可以看到你的内容。当你登录另一个 Facebook
    账户时，你会看到不同的内容。我们加载的是相同的资源（`www.facebook.com`）和代码，但为我们动态地提供了不同的内容。这对于纯 HTML 网页来说是不可能的，因为它们是*静态*的，意味着它们不能改变。每个用户都会看到完全相同的
    HTML 页面。在本书中，我们很快就会探索更多动态网页的例子。


    PHP 是一种解释型语言，这对 PHP 程序员来说是另一个巨大优势。许多编程语言要求你在运行之前将文件*编译*成*机器码*，这可能是一个耗时的过程。每次修改代码都无需编译，这意味着你可以更快地编辑和测试代码。然而，这也可能导致
    PHP 在线上环境中比编译型程序运行得更慢。编译型程序已经是服务器可以直接运行的机器级程序。脚本程序（如 PHP）必须先被解释才能运行。使用 PHP 8，这一劣势已被消除。PHP
    8 包含一个 *JIT（即时）**编译器*，可用于为线上站点编译 PHP 代码。这消除了延迟。


    > **注意**：在初步测试代码时，我们首先关心的是消除所有语法和逻辑错误。在此阶段，我们可以使用原始的解释模式来测试 PHP。在消除错误后，对于高负载的
    Web 应用程序，我们可以使用 JIT 编译器来加速线上环境中的 PHP 应用。由于这是一本面向初学者的书，我们大部分的测试将使用 PHP 的解释模式，以节省调试的时间和精力。


    因为 PHP 是一种服务器端语言，运行 PHP 脚本需要一个服务器。在本地开发环境中开发 PHP 项目意味着我们需要在本地机器上安装一个服务器。本书中的示例依赖
    Apache Web 服务器来交付我们的网页，因为它是与 PHP 结合使用的最流行的服务器。

    '
- fmt: '### Apache and What It Does


    `Apache` hosts just under 40% of all websites that exist as of the release of
    this book. `Apache` is an open source server that runs on virtually all available
    operating systems. `Apache` is a community-driven project, with many developers
    contributing to its progress. `Apache`’s open source roots also means that the
    software is available free of charge, which probably contributes heavily to `Apache`’s
    overwhelming popularity relative to its competitors.


    On the Apache HTTP Server Project website (`http://httpd.apache.org`), `Apache
    HTTP Server` is described as “an effort to develop and maintain an open-source
    HTTP server for modern operating systems including UNIX and Windows NT. The goal
    of this project is to provide a secure, efficient, and extensible server that
    provides HTTP services in sync with the current HTTP standards.” The Apache Project
    provides billions of free lines of open source code for anyone to use.


    As with all web servers, `Apache` accepts an *HTTP request* and serves an *HTTP
    response*. When you enter a URL (`www.apress.com`) into your browser, the browser
    transforms the information into an HTTP request. This information is sent to the
    web server (`Apache`). The server determines what has been requested (access to
    the Apress website). It then creates an HTTP response which includes the information
    requested (the main page for Apress) and sends that information back to the browser.
    While the server is creating the response, the web server sends any noncompiled
    PHP code to the PHP processor to be interpreted. All the PHP code is then executed,
    and the results are included in the response along with any `HTML`, `CSS`, or
    `JavaScript`. Along with displaying the results of the PHP code, the user’s browser
    will interpret the `HTML`, `CSS`, and `JavaScript` code to format the web page
    requested within the browser.


    ### Storing Info with MySQL/MariaDB


    `MySQL` and `MariaDB` are relational database management systems (*RDBMS*). Essentially,
    this means that they allow users to store information in a table-based structure,
    using rows and columns to organize different pieces of data. There are many other
    relational database management systems and *nonrelational systems* (such as *NoSQL
    databases*). Since `MySQL`/`MariaDB` is one of the most popular RDBMS systems,
    many examples in this book rely on them to store relational data.


    Now that we are familiar with the tools that we need, let’s get the ball rolling
    by installing these tools.


    **Exercise**: Before starting the installation process, visit the PHP (`php.org`),
    Apache (`apache.org`), and MySQL (`mysql.com`) websites. What are the current
    stable releases of each? When determining which software package to install, look
    for one that has the most recent versions available.


    ## Installing PHP, Apache, and MySQL/MariaDB


    One of the biggest hurdles for new programmers is starting. In the past, before
    you could write your first line of PHP, you had to download `Apache`, `PHP`, and
    `MySQL`/`MariaDB`, separately, then fight through installation instructions that
    are full of technical jargon you might not understand yet. This experience left
    many developers feeling unsure of themselves, doubting whether they’ve installed
    the required software correctly. Just trying to get each tool to communicate with
    the other was a major hassle requiring changing settings within the setup files
    that you had little knowledge or understanding about what the files accomplished.


    This hurdle kept many new programmers from learning programming for months, even
