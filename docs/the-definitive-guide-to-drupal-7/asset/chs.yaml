- '# 第 36 章


  ![images](img/squ.jpg)


  ## 现在你入行了：用 Drupal 谋生


  **作者：Allie Micka**


  你已经准备好单打独斗，成为下一个 Drupal 摇滚明星了！对于有经验的 Drupal 开发者来说，外面有大量的工作机会，而这本书已经为你提供了开始所需的**技术基础**。要谋生，你只需要找到愿意付钱让你干活的人。然后你完成工作，拿到报酬。就这么简单！


  然而，许多新的 Drupal 开发者发现自己因错误估算而陷入困境，当事情变得复杂时感到准备不足。在最初的几个项目中，许多 Drupal 开发者觉得自己几乎挣不到什么钱，勉强维持，而他们的客户或经理则越来越失望，因为
  Drupal 网站的承诺似乎并未实现。


  我们想要防止这种情况，这意味着我们要精心规划，让所有应该参与流程的人都参与进来，并共同努力，使每个项目都成为下一个 Drupal 成功故事。当你利用 Drupal
  的优势并借助社区力量时，你甚至可能发现自己正在成为 Drupal 本身的贡献成员。


  ### 构建 Drupal 网站：新技术的新规则


  Drupal 开箱即用地引入了大量功能，并允许经验丰富的管理员用最少的精力完成大量工作。这种强大和灵活性常常被误解为“Drupal 可以不费吹灰之力完成我需要的一切。”也许这么说听起来很愚蠢，但我们都有可能陷入过度假设的陷阱。而当夸大的期望与开发者的经验不足相碰撞时，结果可能是灾难性的。


  相比之下，一个成功的 Drupal 项目是客户和开发者之间的协作，让每个人都能专注于自己的优势。通过认识到这种协作并计划为共同目标共同努力，一个有经验的 Drupal
  开发者 *确实* 可以事半功倍，构建一个能多年良好运行的解决方案。


  #### “我讨厌 Drupal”：可能出现的问题


  弄清楚自己需要学习什么，并全心投入去搞明白，这需要很大的毅力。我的日常工作包括帮助开发者和网站所有者成为能自给自足的 Drupal 用户。我们的许多客户刚刚起步，希望一开始就走在正确的道路上，而另一些客户则正在提升技能以应对具有挑战性的新任务。不幸的是，我们也遇到许多
  Drupal 用户，他们一开口就说：“我讨厌 Drupal。”


  我们从那些感觉自己手头有个 Drupal 烂摊子的开发者和网站所有者那里都听到了这种观点。这是一个预算超支、工期延误、过度设计的谜团，就是不听使唤。这种失望有一些常见的主题，例如：


  *   Drupal 很复杂

  *   Drupal 网站升级和维护成本高

  *   我找不到从哪里获得支持

  *   Drupal 开发者收费高

  *   我的开发者消失了！


  开发者和客户遇到的这些令人沮丧的情况源于将旧有的假设应用于新技术。他们发现自己是在与 Drupal 对抗，而不是利用其优势。有时情况实在太糟，一个经验不足的开发者，面对期望值很高的客户，会切换到逃避模式并退出。


  让我们尽力避免这种情况！


  #### 理解 Drupal


  当你带着对 Drupal 开箱即用功能以及在此基础上构建所需条件的清晰理解来着手一个 Drupal 项目时，就更容易驾驭 Drupal 的力量。避免项目问题丛生的第一步就是培养这种理解，这样你才能在客户做出一些危险假设时看到警示信号。




  '
- '# Drupal 与“完工”


  如果你要在院子里建一道篱笆，第一步会是测量尺寸并选择材料。你可以根据前几段篱笆的安装情况估算出整个工期，或者，更妙的做法是，请一位专业的篱笆安装工，根据挖掘所需数量的桩子和完成项目所需的时间，给出更准确的估算。你的专业安装工经验越丰富，就越能灵巧地避开岩石地面或煤气管道等障碍物。最终的结果很可能会与你开工前脑海中的构想相符。


  从历史上看，软件和网页开发也可以通过类似的机制来预测。从一个空白领域开始，一份需求清单呈现出一系列有待完成的部分。你选择你的材料——或者说编程语言——然后开始一个接一个地编写函数、一个接一个地创建文件、一页接一页地构建页面，直到功能与需求相匹配。用这种方式工作当然是可预测的，但成本也可能高得多，更加重复，而且最终产品不会随着新技术的出现而改变。


  多年来，开发人员创建了旨在减少重复工作的编程库、方法论和框架。Drupal 可以被视为一个框架，其目标之一就是将代码重复减少到零。将篱笆的类比延伸到 Drupal
  项目，它可能看起来像是出自《杰森一家》这样的未来主义节目（假设他们有院子需要围起来！）。只需按下一个按钮，一个神奇的机器人篱笆就在你眼前展开，几秒钟内就大功告成了！真的是这样吗？


  ## “完工”意味着什么？


  Drupal 让你通过点击和指向就能实现新功能。而且，因为有如此多的人使用和支持 Drupal，它很可能已经经过了社区的测试，能够很好地满足你的需求。然而，现有的功能可能并不完全符合客户脑海中构想的特定形象。例如，当客户说“我想在我的网站上建一个论坛”时，他脑海中浮现的是一个他在某个以论坛为中心的网站上用过的论坛。他想象的是邮件通知、每条评论的质量评分，以及当你输入“:)”时自动出现的可爱表情符号。


  他的开发人员听到“我想在我的网站上建一个论坛”时，她记起 Drupal 在其核心发行版中就包含了一个论坛模块。由于无需研究或下载任何模块，她估计给网站添加一个论坛只需要一个小时。但客户看到这个努力的成果后大失所望。“我的表情符号呢？”他喊道！


  虽然仍然有可能交付符合客户期望的东西，但这将需要*长得多*的时间，远超预算的一小时，并且需要更多的模块、配置更改或自定义主题。必须有人为这个时间买单。也许开发人员最终会以最低工资标准在一个固定报价的项目中工作，或者客户可能会承担这些变更的费用，但他的预算期望就此破灭。修正问题的过程建立在失望之上，每个人都开始认为
  Drupal 并不像宣传的那么好。


  ## “完工”是什么样子？


  想象一下，如果你带着一张你最爱的菜肴的照片走进一家知名餐厅，坚持要求厨师做出与照片一模一样的食物，会发生什么。拒绝厨师的专业烹饪技能，只会增加不必要的复杂性，最终你很可能吃到一份味道平平的饭菜。这就是当设计期望由缺乏
  Drupal 经验的图形设计师或业务分析师设定时会发生的情况。客户可能会迷恋上那些呈现了与 Drupal 开箱即用功能不同的特定设计、布局或工作流程的模型。最终后果可能是一个代价高昂的定制项目。


  这是否意味着 Drupal 是通用的、乏味的或不灵活的？完全不是！你总是可以通过重新设计主题或重构开箱即用的功能来“调味”，以满足你的目标。然而，当你可能同样好地——甚至更好地——利用现有功能并在此基础上构建来达成目标时，你却可能为了追求一个特定的心理构想而投入大量时间和金钱。


  Drupal 永远不会像从头开始构建那样具有可预测性，但这是一件好事。你可以利用成千上万与你目标一致的人的经验和业绩记录，并受益于那些你自己永远想不出的创意。


  '
- '# 内容需要管理


  当一个网站可以被视为一项模块化的工作成果时，在“网站管理员”和“客户”之间划清界限是很容易的。我们可以收集各种文档和文件中的内容，将其发布到网站上，设计一些有吸引力的图形，并在准备上线时获得客户的批准。客户的角色被局限在提供文档和确认内容看起来是否正确上。


  Drupal 最大的优势在于，它允许客户成为贡献编辑、内容管理者，甚至网站管理员，只受限于他熟悉细节的时间和意愿。伴随这些新职务而来的是新的技能和责任，这些在网站上线前就已经开始发挥作用。如果这些角色在上线后很重要，那么承担这些角色的人在开发周期中也很重要。这与旧的工作方式相比是一个相当大的变化。


  对网站拥有控制权是件好事，因为它意味着可以拥有最新的内容，并且无需聘请开发人员就能自主进行更改。虽然 Drupal 的每个新版本都变得越来越容易使用，但你不能指望在不学习至少一点知识的情况下就能完全掌控。不幸的是，开发人员常常忘记考虑客户的学习曲线。他们并不总是考虑到建立知识基础所需的时间，也不将保持网站平稳运行所需的上线后支持包含在内。这可能会让客户感到被蒙在鼓里，对
  Drupal 产生反感，而不是拥抱他们新获得的能力。


  '
- '# “现在我要聘请摇滚明星式的人才了？”


  我们经常听到 Drupal 采用“构建块”方法来构建网站。一位经验丰富的 Drupal 开发人员可以通过点击和指向获得成功，无需打开文本编辑器就能开发复杂的业务应用。这有明显的好处：几乎任何人都可以达到这个技能水平，包括那些对特定领域或业务流程有深入了解的人。


  最大的秘密在于知道该指向哪里以及点击什么。应该下载哪些模块？*何时*才应该打开文本编辑器？你不能只是启用一个像宣传那样工作的模块；你常常需要将一整套模块编织在一起，仅仅是为了执行一个简单的任务。这个想法对于新用户来说是陌生且令人生畏的，包括那些会犯很多新手错误并制造出一些昂贵
  Drupal 烂摊子的新开发人员。


  经验丰富的 Drupal 专家要价可能很高，但这通常是因为他们投入了大量时间分享最佳实践和改进 Drupal 本身。我见过无数项目，一个训练有素的 Drupal
  开发人员能够在几周内开发出一个应用，取代了之前耗资数百万美元构建的现有解决方案。


  这同样适用于大大小小的项目。即使只是咨询一个可靠的 Drupal 指南几个小时，也能避免很多麻烦，同时帮助你看到那些你无法想象的可能性。幸运的是，从宝贵的建议中获益变得越来越容易。随着更多的书籍、更多的培训材料，以及以发行版形式存在的各种“预封装知识”，找到你的道路变得更加轻松。




  ### Drupal 会做你不在意的事


  当截止日期临近时，你很容易忽视一个事实：在大多数情况下，你将在很长一段时间内负责项目的维护与照料。在积累了 Drupal 难以理解、定制成本高、需要特殊培训才能操作等印象后，许多开发者和网站管理员纷纷转向自己的
  DIY 框架和自定义解决方案。


  考虑到这一点，Drupal 社区正致力于将更多听起来稀奇古怪的技术纳入其中，这或许听起来更像是一种负担而非福音。但所有技术在变得重要之前，听起来都稀奇古怪。在
  RSS 成为共享内容的重要方式之前，Drupal 网站已经提供 RSS 提要好几年了。凭借结构良好的内容和漂亮的 URL，Drupal 在 SEO 流行之前就已经实现了
  SEO。形式与内容的清晰分离，使得许多 Drupal 网站能够轻松且低成本地在手机技术领域运作。当下一项重要的网络技术崭露头角时，你是想用它，还是追赶它？


  ### 在 Drupal 基础上构建


  大多数 Drupal 事故都源于这样一个事实：Drupal 的一些最大优势实际上也是弱点。作为开发者，我们应对客户形成的态度负责，因此培养积极且具有前瞻性的思维方式至关重要。在每个项目中，通过专注于短期目标、长期成果，并考虑到所有参与者的需求，有助于正确设定预期。


  #### 从目标开始


  任何开发者或客户可能犯的最大错误是，在没有充分预先规划或研究的情况下，就臆测什么是可能的。每一个“Drupal 烂摊子”背后，都有一个项目在未明确认识实际步骤的情况下就确定了成本、功能和时间表。避免这种情况的方法是，在你有机会坐下来进行目标设定会议之前，暂缓讨论技术、时间表和策略。


  目标设定讨论的主要目的是确定成功的标准。尽量不涉及功能描述、功能列表或与现有网站的对比。相反，要紧紧抓住利益相关者对网站的目标。


  目标是：


  *   清晰描述性的短语，例如 `拓展读者群`、`提升销售额`、`降低生产成本`，甚至`赶在假期季上线`

  *   非功能性的描述，例如`拥有一个论坛`

  *   可通过统计数据、销售数字或其他可追踪机制来衡量

  *   按优先级排列。成本、时间表和功能可以是目标，但你应该明确各自的优先级，并认识到你不可能总是拥有一切。


  在决定时间、范围和成本这“铁三角”之前，开发者会结合客户陈述的目标和可用资源来制定一个可行的计划。让开发者在目标设定阶段就参与进来非常重要，而不是等到所有战术决策都已做出之后。因为
  Drupal 提供了众多工具，一位经验丰富的 Drupal 向导能够将技术选择与所述目标相匹配。这比试图将某个需求硬塞进 Drupal 网站要经济得多。最重要的是，开发者可以提出那些*听起来*困难且昂贵，但对
  Drupal 来说实际上相当简单的解决方案。


  #### 认可并支持不同参与者


  为网站添加博客是一项小小的技术成就，但生成定期且有见解的博文可能是一项全职工作。如果你的博客作者遇到障碍，或者觉得他们没有接受足够的培训和支持，他们可能没有信心发布新内容。如果你在规划阶段确定的目标是培育社区，那么一个良好的
  Drupal 实施也可能会无法满足该目标。


  相比之下，作者或网站所有者对 Drupal 了解得越多，就越能更好地贡献想法或以适合 Drupal 的方式表达自己的需求。作为人与技术之间的联络人，你的工作是帮助那些能够贡献内容的人理解他们在其中的定位。在可能的情况下，这些人应该成为规划、开发和上线后策略的一部分：


  *   提供一些与你客户网站类似的实际项目功能演示，让参与者看到他们的需求如何转化为 Drupal 的概念。

  *   作为目标设定过程的一部分，要考虑可能与最终结果交互的每个人的意见。

  *   制定一个能反映所有参与者在项目上投入的时间和意愿的计划。

  *   确保每个需要贡献的人都能腾出持续参与所需的时间和资源，从而避免瓶颈。

  *   如果合适，考虑让参与者也参与到实施过程中。例如，让内容管理员协助创建作为导入过程一部分的新板块，或者让内容作者在上线前练习编辑帖子。


  如果这样做显得过度了呢？成功的关键不是让人们参加他们不想上的课程，而是了解有哪些人力资源可用，以及如何将这些资源应用于项目目标。了解参与者时间有限，或参与讨论、培训和持续内容管理的意愿有限，同样有价值。只要不与既定目标冲突，适当减少他们的参与度也完全没有问题。


  #### 做出可持续的选择


  一路走来，我们了解到修改核心是不好的，而通过补丁和反馈来支持模块则是好的。为什么要花费额外的时间？因为坚持常见的最佳实践可以确保网站稳定运行，不会有意外状况，并且能由该开发者或任何其他合格的
  Drupal 开发者长期维护。


  自定义代码和变通方案虽然常常为了快速交付而必要，但却会增加成本，并最终突显出一个事实：原始开发者不知道如何在不影响长期维护的情况下完成项目。这在一定程度上是人们指责
  Drupal 不灵活且维护成本高昂的原因。


  假设你从目标导向的角度来处理问题，你的技术选择如何影响项目的既定目标？也许一个快速的“黑科技”能帮你赶在假期季上线，但这可能会阻碍升级到 Drupal 8，或长期推高网站维护成本。采用那种“黑科技”并不总是错误的选择！但通过询问你的客户，是否可以用短期工作来换取长期投资回报，你就是在让他们帮助决定哪个更重要。


  然而，在为了短期结果而牺牲长期可持续性之前，第一步是要确保确实没有更好的方法。在进行“黑科技”操作之前，可以通过 IRC 提问，在 `drupal.org` 上发布论坛问题，通过搜索博文来研究你能找到的信息，或者咨询在该情况下可能更有经验的人。


  我们没有理由不去利用 Drupal 社区提供的丰富资源。学习他人如何做事，并分享我们一路学到的东西，这能帮助我们所有人更好地完成工作。但是，基于缺乏研究的糟糕判断对任何人都没有好处。




  ### 理解社区经济


  当 Drupal 或某个模块缺少某项功能时，**任何人**都可以支持该功能的添加。这通常意味着向模块维护者支付费用以添加该功能，这对 Drupal 非常有益，并能确保该功能按你的时间表完成。如果无法做到这一点，你也可以通过在
  `drupal.org` 上提供清晰的请求文档、在问题队列中回答问题并测试补丁来节省维护者的时间，或者贡献你自己的代码，从而取得很大进展。


  这正是让 Drupal 令人惊叹的地方，因为每一份小小的贡献都会影响到一个日益庞大的用户群体。如果一个模块有 100 个用户，那么每次修复、功能改进或文档编写都能立即影响这
  100 人，并且可能使该模块对另外 100 人变得有用。下一轮的改进现在将影响到 200 人，进一步扩大了潜在贡献者的群体。Drupal 可以免费下载，却又极其强大，因为每一份微小的努力都会被成倍放大。


  忘记这些可能性存在，会让你觉得某些功能就是有缺陷或缺失的，而且毫无补救办法。浏览 `Drupal.org` 上的问题队列，常常会发现诸如“这个什么时候能准备好？”或“为什么没人修复这个问题？”之类的问题。问问你自己，如果有人要求你在没有报酬的情况下，按他人的目标和时间表工作，你会作何反应，你就会意识到抱怨是一种效率极低的解决问题方式。


  无论你是期望通过使用 Drupal 来完成项目并获得报酬，还是计划依靠 Drupal 网站来降低成本或增加收入，支持其开发者并为 Drupal 健康长远的未来做出贡献，都是一项成本效益极高的投资。


  ### 考虑长期支持与成长


  虽然听起来很老套，但启动一个 Drupal 项目并非开发项目的终点，而是开启一个蓬勃发展的在线资源的起点。根据网站的目标，可能需要培育一个活跃的用户社区、添加新功能，以及由内容管理者提供新的信息和资源。如果没人懂得如何培育社区、添加功能或提供新资源，这一切都会失败。


  对于一个每日与 Drupal 打交道并以此为生的开发者来说，当客户不能直接上手运营网站时，会是一个令人失望的意外。在交付网站时加入一次非正式的培训课程会有所帮助，这能让客户感觉更自在，并为他们提供一个提出“愚蠢”问题的安全空间。根据网站贡献者的技能和需求，培训课程可能持续数小时，甚至一周或更长时间。同时，请确保你已做好安排，以便在出现新问题时处理咨询和提供额外支持。


  ## 确保你的成功


  理解 Drupal 项目的需求，并从目标导向的角度来对待它，是成为快乐的 Drupaler 的第一步，无论你选择用它做什么。没有什么比陷入一个预算超支、工期延误或无法交付的项目更糟糕的了。防止这种情况意味着要留出你所需的资源来仔细规划，并确保在需要时能获得帮助。


  如果你已经参与了本地或线上的 Drupal 社区，你就已经成功了一半。在对待每个项目时，投入时间、深思熟虑并尊重那些走在你前面的人，这将有助于确保你推动自己的项目、职业生涯，甚至可能是
  Drupal 本身向前发展。


  ### 建立流程


  作为一名 Drupal 专业人士，你处理的每个项目都建立在你利用 Drupal 的灵活性、社区支持和持续成长来取得成功的专业知识之上。将你的发现记录为一个定义清晰的流程，可以提供一套可重复的行动计划，当你向他人介绍这种新思维方式时，可以用它来帮助他们找到方向。


  有些开发者定义了非常严格的流程。在开始之前，他们会制定一份不可变的功能列表，并确定具体的成本、检查日期和里程碑。在项目开始之前，客户就能清楚地了解项目将包含哪些内容、大致的样子以及将花费多少钱。这对于小型项目效果很好，因为对每个人来说都是可预测的，并且更容易让客户理解和接受。


  另一些开发者则更喜欢敏捷流程，在这种流程中，会设定里程碑和检查会议，并且始终有根据新发现进行调整的选择。当参与者众多或存在其他难以预测结果的变量时，这种流程效果很好。它也有可能交付比最初设想的更好的产品。这需要愿意为了最佳结果而放弃清晰的前期规划。


  你个人流程的具体细节取决于你的最佳工作方式、你项目的性质、客户的期望以及你在自己试错过程中获得的领悟。只要每个人都清楚地理解期望——并且这些期望正在得到满足，你的流程是死板还是松散并不重要。


  当你是新手时，很容易忘记 Drupal 有多么令人困惑，但文档化的流程可以帮助客户和协作者感觉他们站在坚实的基础上，参与到项目中，并在工作中清楚地了解接下来要做什么。实现这一目标的技巧包括：


  *   **以项目目标为始终：** 在项目开始时安排一次目标导向的规划会议，并在整个项目过程中安排检查，以确保这些目标得到体现。只要所有人都同意新的参数，重新确定目标的优先级（例如，为了一个杀手级功能而推迟发布日）也是可以的。

  *   **让你的客户参与进来：** 这其实很有挑战性，因为我们很容易想当然地认为客户明白我们在说什么。确保有定期的会议或碰头会，如果项目足够大，可以安排一个项目经理来负责组织这些会议。最重要的是，确保每个人都拥有适当的知识基础，从而感觉他们能够做出明智的决策或适当地参与其中。

  *   **做出可持续的选择：** 当客户请求添加功能或要求变更时，我们很容易为了追求他们“要求”的东西，而忘记他们真正“需要”的是什么。如果他们想要做出的改变会使未来难以维护，那就回到既定的目标上，确保你们的想法一致。如果不一致，请相应地沟通。

  *   **融入一些社区参与：** 如果你需要进行变更或“破解”，务必在 `drupal.org` 上提交问题，以便其他人也能从你的发现中受益，并且你所做的任何改进也能反馈到这些工具中。这会提升你的
  Drupal 功德，并支持你所依赖工具的持续可维护性。

  *   **包含一个上线后计划：** 如果你不想长期负责后续的支持和培训，请确保你与能够承担此角色的人合作。如果你确实计划留下来，就创建一个预付金协议或维护计划。思考新技术如何能服务于他们的目标，并考虑制定一个长期的升级策略。你的客户会欣赏这种前瞻性的态度。


  在过程中不断调整和改进。每个项目完成后，花点时间诚实地评估哪些做得很好，以及下次哪些地方可以改进。如果合适，让你的客户参与进来，并让所有参与项目开发的人都参与其中。




