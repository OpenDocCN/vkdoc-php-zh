    \n## PHP 解决方案 13-8：在搜索中使用 PDO 预处理语句（Using a PDO Prepared Statement in a search）\n\
    \n该 PHP 解决方案展示了如何将用户从搜索表单提交的值嵌入到带有 PDO 预处理语句的`SELECT`查询中。它使用了与 PHP 解决方案 13-7 中\
    \ MySQLi 版本相同的搜索表单。\n\n1.  从`ch13`文件夹复制`pdo_prepared_01.php`并将其保存到`pdo`文件夹中，命名为`pdo_prepared.php`。\n\
    2.  在`DOCTYPE`声明上方的 PHP 代码块中添加以下代码：\n\n```php\nif (isset($_GET['go'])) {\n   \
    \ require_once '../includes/connection.php';\n    require_once '../includes/utility_funcs.php';\n\
    \    $conn = dbConnect('read', 'pdo');\n    $sql = 'SELECT image_id, filename,\
    \ caption FROM images\n    WHERE caption LIKE :search';\n    $stmt = $conn->prepare($sql);\n\
    \    $stmt->bindValue(':search', '%' . $_GET['search'] . '%');\n    $stmt->execute();\n\
    \    $error = $stmt->errorInfo()[2];\n    if (!$error) {\n        $stmt->bindColumn('image_id',\
    \ $image_id);\n        $stmt->bindColumn('filename', $filename);\n        $stmt->bindColumn(3,\
    \ $caption);\n        $numRows = $stmt->rowCount();\n    }\n}\n```\n\n当表单被提交时，此代码包含连接文件并创建一个\
    \ `PDO` 只读连接。预处理语句使用`:search`作为命名参数，代替用户提交的值。\n\n`%`通配符在绑定到预处理语句的同时与搜索词连接。因此，这里使用了`bindValue()`而不是`bindParam()`。\n\
    \n在语句执行后，调用语句的`errorInfo()`方法，查看是否生成了错误信息并存储在`$errorInfo[2]`中。\n```"
- fmt: "如果没有问题，结果会通过`bindColumn()`方法绑定到`$image_id`、`$filename`和`$caption`。前两个使用列名，但`caption`列通过其在`SELECT`查询中的位置（从1开始计数）来引用。\n\
    \n3. 显示结果的代码与PHP Solution 13-7中的步骤6和7完全相同。你可以在`ch13`文件夹中的`pdo_prepared_02.php`中查看完整的代码。\n\
    \n## PHP Solution 13-9: 调试PDO预处理语句\n\n有时，数据库查询不会产生预期的结果。当这种情况发生时，查看脚本实际发送到数据库服务器的内容会很有帮助。对于MySQLi，没有简单的方法来检查预处理语句插入到SQL查询中的值。但对于PDO，这非常容易——前提是你的服务器运行的是PHP\
    \ 7.2或更高版本。\n\n1. 继续使用上一个PHP解决方案中的`pdo_prepared.php`。或者，将`ch13`文件夹中的`pdo_prepared_02.php`复制到`pdo`文件夹，并将其重命名为`pdo_prepared.php`。\n\
    \n2. 修改结束的`</table>`标签后的代码，如下所示：\n\n```\n    ';\n    $stmt->debugDumpParams();\n\
    \    echo '';\n    }\n    ?>\n    ```\n\n这会插入一对`<pre>`标签，使`PDOStatement`对象的`debugDumpParams()`方法的输出更易读。\n\
    \n3. 保存文件，在浏览器中加载它，并执行搜索。除了搜索结果之外，你应该会看到类似以下截图的输出：\n\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figp_HTML.jpg](images/332054_4_En_13_Chapter/332054_4_En_13_Figp_HTML.jpg)\n\
    \nSQL查询显示了两次。第一次显示的是PHP代码中的查询——在本例中，包括命名参数`:search`。第二次显示的是实际发送到数据库服务器的值。\n\n\
    在本例中，搜索\"fount\"返回了一个以\"Fountains\"开头的标题。如果这是你期望的结果，那没问题。但假设你只想要精确匹配，看到`%`通配符就能解释这个意外结果，从而更容易调试那些未产生预期结果的预处理语句问题。\n\
    \n你可以将代码与`ch13`文件夹中的`pdo_prepared_03.php`进行比较。\n\n> **注意**\n> 在调用`debugDumpParams()`之前，务必先调用`execute()`方法。PHP\
    \ 7.2之前的版本只显示带有匿名或命名参数的预处理语句。\n\n## PHP Solution 13-10: 通过用户输入更改列选项\n\n此PHP解决方案演示如何通过用户输入更改`SELECT`查询中的SQL关键字名称。SQL关键字不能用引号括起来，因此使用预处理语句不起作用。相反，你需要确保用户输入与预期值的数组匹配。如果找不到匹配项，则使用默认值。该技术对MySQLi和PDO相同。\n\
    \n1. 从`ch13`文件夹中复制`mysqli_order_01.php`或`pdo_order_01.php`，并将其保存到`mysqli`或`pdo`文件夹中。两个版本都从`images`表中选择所有记录，并在表格中显示结果。页面还包含一个表单，允许用户选择用于按升序或降序排列结果的列名。在初始状态下，表单处于非活动状态。页面默认按`image_id`升序显示详细信息，如下所示：\n\
    \n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figq_HTML.jpg](images/332054_4_En_13_Chapter/332054_4_En_13_Figq_HTML.jpg)\n\
    \n1. 修改`DOCTYPE`声明上方PHP块中的代码，如下所示（以下清单显示的是PDO版本，但以粗体突出显示的更改对于MySQLi是相同的）：\n\n\
    ```\n    require_once '../includes/connection.php';\n    require_once '../includes/utility_funcs.php';\n\
    \    // connect to database\n    $conn = dbConnect('read', 'pdo');\n    // set\
    \ default values\n    $col = 'image_id';\n    $dir = 'ASC';\n    // create arrays\
    \ of permitted values\n    $columns = ['image_id', 'filename', 'caption'];\n \
    \   $direction = ['ASC', 'DESC'];\n    // if the form has been submitted, use\
    \ only expected values\n    if (isset($_GET['column']) && in_array($_GET['column'],\
    \ $columns)) {\n    $col = $_GET['column'];\n    }\n    if (isset($_GET['direction'])\
    \ && in_array($_GET['direction'], $direction)) {\n    $dir = $_GET['direction'];\n\
    \    }\n    // prepare the SQL query using sanitized variables\n    $sql = \"\
    SELECT * FROM images\n    ORDER BY $col $dir\";\n    // submit the query and capture\
    \ the result\n    $result = $conn->query($sql);\n    $error = $conn->errorInfo()[2];\n\
    \    ```\n\n新代码定义了两个变量`$col`和`$dir`，它们直接嵌入到`SELECT`查询中。由于它们已分配了默认值，当页面首次加载时，查询会按`image_id`列升序显示结果。\n\
    \n然后，两个数组`$columns`和`$direction`定义了允许的值：列名以及`ASC`和`DESC`关键字。条件语句使用这些数组来检查`$_GET`数组中的`column`和`direction`。提交的值仅在与`$columns`和`$direction`数组中的值匹配时，才会重新赋值给`$col`和`$dir`。这可以防止任何尝试向SQL查询注入非法值的行为。\n\
    \n2. 编辑下拉菜单中的`<option>`标签，使其显示`$col`和`$dir`的选中值，如下所示：\n\n```\n\n>image_id\n\n\
    >filename\n\n>caption\n\n>Ascending\n\n>Descending\n\n```\n\n3. 保存页面并在浏览器中测试。你可以通过选择下拉菜单中的值并点击`Change`来更改显示的排序顺序。但是，如果你尝试通过查询字符串注入非法值，页面将使用`$col`和`$dir`的默认值，以按`image_id`升序显示结果。\n\
    \n你可以对照`ch13`文件夹中的`mysqli_order_02.php`和`pdo_order_02.php`来检查你的代码。\n\n## 章节回顾\n\
    \nPHP 7提供了两种与MySQL通信的方法：\n\n*   **MySQL改进版 (MySQLi) 扩展**：建议所有新的MySQL项目使用它。它比从PHP\
    \ 7中移除的原始MySQL扩展效率更高。它具有预处理语句的附加安全性，并且与MariaDB完全兼容。\n*   **PHP数据对象 (PDO) 抽象层，它是数据库中立的**：这是我首选的与数据库通信的方法。它不仅数据库中立，而且具有为预处理语句使用命名参数的优势，使代码更易于阅读和理解。此外，在PHP\
    \ 7.2及更高版本中调试预处理语句非常简单。尽管代码是数据库中立的，但PDO需要为所选数据库安装正确的驱动程序。MySQL的驱动程序与MariaDB完全兼容，并且通常已安装。其他驱动程序不太常见。但是，如果安装了正确的驱动程序，只需更改连接字符串中的数据源名称\
    \ (DSN)，即可从一个数据库切换到另一个数据库。"
