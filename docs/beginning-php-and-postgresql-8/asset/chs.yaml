  将表单数据传递给函数的过程与传递任何其他变量的过程完全相同；你只需将提交的表单数据作为函数参数传递即可。假设你希望在前一个示例中引入一些服务器端验证，使用自定义函数来检查电子邮件地址的语法有效性。清单
  13-1 展示了修改后的脚本。


  **清单 13-1.** *在函数中验证表单数据*


  ```php

  <?php


  // Function used to check email syntax


  function validate_email($email)


  {


  // Create the syntactical validation regular expression


  $regexp = "^([_a-z0-9-]+)(\.[_a-z0-9-]+)*@([a-z0-9-]+)


  (\.[a-z0-9-]+)*(\.[a-z]{2,6})$";


  // Validate the syntax


  if (eregi($regexp, $email)) return 1;


  else return 0;


  }


  // Has the form been submitted?


  if (isset($_POST[''submit'']))


  {


  echo "Hi ".$_POST[''name'']."!<br />";


  if (validate_email($_POST[''email'']))


  echo "The address ".$_POST[''email'']." is valid!"; else


