    ```"
  raw: '• We can only use one-dimensional configuration arrays. This is due our parsePhp()
    function needing to predefine $settings so that the configuration files have an
    array in which to store their data.


    • It requires more code than is strictly necessary. All we are really interested
    in are the keys and values, not the PHP syntax surrounding them.


    ■ **Note** CakePHP and CodeIgniter use associative arrays for most of their configuration.


    INI Files


    The INI (**ini**tialization) file format is the standard format for configuration
    files in the Windows operating system.


    It is simple to change, and relatively simple to parse. Fortunately for us, PHP
    also comes with a handy parse_ini_file() function that will greatly simplify the
    creation of our settings parser. We should try to create a parser that will allow
    us to use dot notation for our keys/values. Listing 4-4 shows an example INI file.


    ***Listing 4-4.*** Example INI Configuration File


    database.default.type = mysql


    database.default.host = localhost


    database.default.username = username


    database.default.password = password


    database.default.port = 3306


    database.default.schema = prophpmvc


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 4 ■ CONFIGURATION


    ■ **Note** INI configuration files aren’t handled in the same way as PHP files,
    at least not in Apache. If a user tries to access an INI file, it will probably
    not be modified and the user could have access to sensitive configuration settings
    such as username and passwords. You should always take steps to deny access to
    these files, and it would be best to even store them outside of a web-accessible
    directory.


    Our configuration class will be the first factory class we create. We want to
    be able to extend it in the future with many different kinds of configuration
    possibilities, but (keeping our goals in mind) we will only be creating one driver.
    Let’s first look at the factory class, as shown in Listing 4-5.


    ***Listing 4-5.*** Configuration Factory Class


    namespace Framework


    {


    use Framework\Base as Base;


    use Framework\Configuration as Configuration;


    use Framework\Configuration\Exception as Exception;


    class Configuration extends Base


    {


    /**


    * @readwrite


    */


    protected $_type;


    /**


    * @readwrite


    */


    protected $_options;


    protected function _getExceptionForImplementation($method)


    {


    return new Exception\Implementation("{$method} method not implemented");


    }


    public function initialize()


    {


    if (!$this->type)


    {


    throw new Exception\Argument("Invalid type");


    }


    switch ($this->type)


    {


    case "ini":


    {


    return new Configuration\Driver\Ini($this->options);


    break;


    }


    default:


    {


    throw new Exception\Argument("Invalid type");


    break;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 4 ■ CONFIGURATION


    }


    }


    }


    }


    }


    The Configuration factory class is also the first time we will use the getters/setters
    we created with the Base class. Both $_type and $_options can be read from and
    written to. If you refer back to the Base __construct() method, you will see that
    it takes the keys/values given in the first argument, and sets whatever protected
    properties it can find. If your initialization array had an options key, the protected
    $_options property would contain that value.


    We first check to see that the $_type property value is not empty, as there is
    no sense trying to create a class instance if we don’t know how to determine the
    class required. Next, we use a switch statement and the return value of $this->type,
    to select and instantiate the correct class type.


    Because we will only support the "ini" type (for now), we throw ConfigurationExceptionArgument
    if the required type is not "ini". If the required type is "ini", we return a
    new instance, passing the instance the options supplied to the Configuration __construct()
    method. As you can see in Listing 4-6, the Configuration class is quite simple
    to use.


    ***Listing 4-6.*** Creating a Configuration Object Using the Factory


    $configuration = new Framework\Configuration(array(


    "type" => "ini"


    ));


    $configuration = $configuration->initialize();'
