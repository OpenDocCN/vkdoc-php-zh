    \ and click Register. You\n    should see the following error messages:\n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Figh_HTML.jpg](images/332054_4_En_11_Chapter/332054_4_En_11_Figh_HTML.jpg)\n\
    \nTry a variety of tests to make sure your validation code is\n    working.\n\n\
