- fmt: '# Chapter 5


    Chapter 5 will introduce to you the `Bake` script, a handy console program that
    runs much like the `scaffold` but supplies you with editable code from which you
    can expand your application. You’ll improve the blog and adjust the views to bring
    it more in line with a production-level `Cake` application. As always, I recommend
    you practice using the table associations a few times with other scenarios, bringing
    in the parameters for each association, and customizing the association to get
    a feel for the models and good database design. The quicker you can take an application
    from zero to running the `scaffold` with advanced table associations, the more
    comfortable you’ll feel with the MVC structure and the fundamental process Cake
    applications follow.


    ## Table Associations Exercise


    You may have noticed that I left the comments table out of the tutorial for this
    chapter. This was to allow you to try building a “has many” relationship for the
    posts and comments tables on your own. In this exercise, associate comments with
    posts by using the appropriate relationship, and test the association using the
    `scaffold`. Be sure to check for errors by running the controller from both ends
    of the association.


    ## Summary


    Cake uses naming conventions to simplify building an application. By adhering
    to the “convention over configuration” paradigm, Cake provides you not only with
    dozens of useful functions and code-cutting methods but also with an overall method
    for organizing the resources the application will use. How to name models, views,
    and controllers, as well as several other Cake resources such as helpers, elements,
    and components, is an essential aspect of learning Cake. Not only will you need
    to structure your application following Cake’s conventions, but how you design
    the database also matters for taking advantage of the framework. Database normalization
    is key to designing a schema that best fits Cake’s conventions and is essential
    for working with the models correctly. When you use the various relationships
    in your database (one-to-one, one-to-many, and many-to-many), Cake is able to
    do much of the difficult work in mapping the data and making them available in
    the application.


    # Chapter 5: Creating Simple Views and Baking in the Console


    So far, you’ve really only used the scaffolding feature. Although scaffolding
    can help test associations and get your database working well with Cake, it does
    not give you much control over design, and the scaffolding does not go beyond
    simple CRUD operations either. To get into the individual form elements or to
    change how you want the list view to display the results, you must manually create
    and edit the views themselves.


    Fortunately, Cake comes with some handy console scripts that can help you generate
    those views, as well as perform other important development tasks. In this chapter,
    I’ll introduce the `Bake` script, which will essentially run like the scaffold
    and analyze the database but then provide code to edit. From there you can include
    your custom logic and add improved actions that go beyond simple CRUD operations.
    First, let’s change the views a little bit for your blog application.


    **Note**: All the view files I’ll use in this book will run PHP shorthand for
    the `echo()` function. Your server setup may or may not support this method. If
    not, be sure to use the longer string `<?php echo();?>` instead of my shorthand
    `<?= ;?>`. Because the `echo` command is so common for view files, Cake does come
    with an `echo` convenience function that cuts down on characters. Use `e()` to
    echo and `pr()` for the `print_r()` function if you prefer the Cake convenience
    functions. Or, you can talk with your hosting provider to make PHP shorthand tags
    available and stick with the examples as written.


    ## Introducing Layouts'
