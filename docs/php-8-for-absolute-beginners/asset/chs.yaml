  \ 函数 `json_encode()`。一旦数据被转换为 JSON 格式，我们就可以使用 PHP 函数 `file_put_contents()` 将 JSON\
  \ 格式数据的完整内容复制到一个文件中。相当快速且高效！\n\n**注意**\n\n关于 `file_put_contents()` 的更多信息，请访问 [`www.php.net/manual/en/function.file-put-contents`](http://www.php.net/manual/en/function.file-put-contents)。\n\
  \n```\n$rows();\nforeach($rows as $row) {\nif($row[0]==\"Last Name\") {\ncontinue;\n\
