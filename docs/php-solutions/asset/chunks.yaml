    # 下一步怎么走？


    本书涵盖了海量的知识点。如果你已经掌握了这里介绍的所有技巧，那么你正在迈向中级 PHP 开发者的道路上，再稍加努力，就能进入高级阶段。如果你觉得学起来有些吃力，别担心。重新翻阅前面的章节吧。你练习得越多，它就会变得越简单。


    你可能会想：“我怎么可能记住所有这些内容？”其实不必如此。查资料没什么好丢脸的。请把 PHP 在线手册（[`http://php.net/manual/en/`](http://php.net/manual/en/)）加入书签并经常使用。它会持续更新，并且包含大量有用的示例。在每个页面右上角的搜索框中输入函数名称，就能直接跳转到该函数的完整说明。即使你记不住准确的函数名，手册也会带你到一个页面，推荐最可能的候选函数。大多数页面都提供了实际示例，展示该函数或类是如何使用的。


    让动态网页设计变得简单的，并非是对 PHP 函数和类百科全书式的记忆，而是扎实掌握条件语句、循环以及其他结构如何控制脚本流程。一旦你能以“如果发生这种情况，接下来应该发生什么？”的思维来构思你的项目，你就成了自己游戏的主宰。我经常查阅
    PHP 在线手册。对我来说，它就像一本字典。大多数时候，我只是想确认参数的顺序是否正确，但经常会有某个内容吸引我的注意，为我打开新的视野。我可能不会立刻使用那个知识，但会把它记在脑海深处以备将来之用，并在需要核实细节时再次查阅。


    MySQL 在线手册（[`http://dev.mysql.com/doc/refman/5.6/en/index.html`](http://dev.mysql.com/doc/refman/5.6/en/index.html)）同样实用。MariaDB
    的文档在 [`https://mariadb.com/kb/en/`](https://mariadb.com/kb/en/)。让 PHP 和数据库在线手册成为你的朋友，你的知识就会突飞猛进。

