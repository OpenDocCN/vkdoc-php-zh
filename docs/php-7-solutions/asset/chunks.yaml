    \nHopefully, you have got the hint by now—you need an `if` statement (see\n  \
    \  “Making decisions” in Chapter [3](#332054_4_En_3_Chapter.xhtml)) in each `<a>`\
    \ tag. Line 2\n    needs to look like this:\n\n```\n    >Home\n    ```\n\nThe\
    \ other links should be amended in a similar way. But how does\n    `$currentPage`\n\
    \    get its value? You need to find out the filename of the current\n    page.\n\
    \n2.  Leave `menu.php`\n    to one side for the moment and create a new PHP page\
    \ called `get_filename.php`.\n    Insert the following code (alternatively, use\
    \ `get_filename.php` in\n    the `ch05`\n    folder):\n\n```\n    <? php echo\
    \ $_SERVER['SCRIPT_FILENAME'];\n    ```\n\n3.  Save  `get_filename.php`\n    \
    \ and view it in a browser. On a Windows system, you should see\n    something\
    \ like the following screenshot. (The version in the `ch05` folder contains\n\
    \    the code for this step and the next, together with text indicating which\n\
    \    is which.)\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Figa_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Figa_HTML.jpg)\n\
    \nOn macOS, you should see something like this:\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Figb_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Figb_HTML.jpg)\n\
    \n`$_SERVER['SCRIPT_FILENAME']`\n    comes from one of PHP’s built-in superglobal\
    \ arrays, and\n    it always gives you the absolute file path for the current\
    \ page. What\n    you need now is a way of extracting just the filename."
  trans: "\n4.  重新加载页面。如图 5-3 所示，密码仍然隐藏在源代码中。尽管包含文件没有 `.php` 文件扩展名，但其内容已与 `index.php`\
