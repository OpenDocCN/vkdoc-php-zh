  \n本书采用无酸纸印刷\n\n**关于作者**\n\n\n  \n大卫·鲍尔斯（David Powers）撰写了一系列极为成功的网络开发书籍和视频培训课程，尤其专注于\
  \ PHP 和网络标准，包括 lynda.com 在线培训库中的《PHP 入门》与《PHP 代码诊所》。作为一名专业作家，他涉足电子媒体领域已超过 40 年，最初在\
  \ BBC 广播和电视台工作，近年则专注于互联网领域。他清晰的写作风格不仅在英语世界备受推崇——他的多部著作已被翻译成西班牙语、波兰语、中文等多种语言。大卫原本对计算机只有轻微兴趣，但这一切在\
  \ 1987 年几乎一夜之间转变为热忱：当时他被派驻日本担任 BBC 驻东京记者。由于楼道里没有企业 IT 部门，他被迫自学如何亲手修理所有设备。在不摆弄电脑内部构造的时候，他便为\
  \ BBC 电视和广播报道日本泡沫经济的兴起与崩溃。离开 BBC 独立工作后，他曾参与多个项目，包括为一家国际咨询公司的日本客户开发在线双语经济政治分析数据库。此外，他还在牛津布鲁克斯大学教授研究生级别的网络媒体课程。\n\
  \n不敲键盘写书或构思 PHP 及其他编程语言的新用法时，大卫最爱去他钟爱的寿司餐厅。他还翻译过多部日本戏剧。\n\n## 关于技术审校者\n\n保罗·米尔本（Paul\
  \ Milbourne）已在华盛顿-巴尔的摩大都会区担任软件开发人员超过十年。他的职业旅程让他有机会与华盛顿红皮队、巴尔的摩乌鸦队、Zynga 游戏公司等众多客户合作。\n\
  \n大多数情况下，保罗凭借处理突发问题和应对边缘案例而成就了体面的事业。这段经历使他通过多个行业和平台接触到开发的方方面面。\n\n保罗还曾是一名厨师，一位热忱的音乐家，同时也是一名活跃的视觉艺术家。\n\
  \n"
- "# 引言\n\n当《PHP 解决方案》第一版出版时，我曾担心副标题“动态网页设计轻而易举”显得过于雄心勃勃。即便是第三版，我仍然有些不安，担心不切实际地提高读者的期望。PHP\
  \ 并不难，但也不像速成蛋糕粉那样：加水搅拌即可。每个网站都各不相同，因此不可能抓来一个脚本，粘贴到网页中就指望它能运行。我的目标是帮助那些对编程所知甚少甚至一无所知的网页设计师，让他们获得信心，能够深入代码并根据自身需求进行调整。\n\
  \n事实上，这本书自 2006 年首次出版以来一直广受欢迎，这表明许多读者接受了这一挑战。波士顿 PHP 社区的成员便大量参与其中：他们将第二版作为三系列 PHP\
  \ Percolate（面向初学者的虚拟自学小组）的教材。数百人报名每周研读一章。这套方法对他们有效，因此我希望它同样对你也有效。\n\n## 新版内容\n\n\
  来自 PHP Percolate 参与者及其他读者的一个宝贵反馈是：当我粗略讲解某段高级代码，仅解释其功能而非运作原理时，会令他们感到失望。这个遗漏在本版中已得到纠正。偶尔，我会指出你可能想跳过详细解释，但如果你对某种技术的工作原理感到好奇，相关内容就在那里。因此，第\
  \ 3 章的参考部分已扩展，涵盖了诸如可变变量等深奥内容。不，这不是笔误；“可变变量”是 PHP 中的一个真实概念，而且相当实用。\n\n本版内容已更新至 2014\
  \ 年 8 月发布的 PHP 5.6。由于主机服务商通常升级其所提供 PHP 版本的速度较慢，我已将本书代码的最低版本设为 PHP 5.4。PHP 5.4 做出了一些重要变更，引入了简化的数组语法，并移除了对安全模式和“魔术引号”的支持。除了更新代码，我还逐行修订了每一章，澄清了解释。同时，我消除了一些错误——希望没有引入新的错误。\n\
  \n最大的变化在于第 6 章和第 8 章中用于上传文件和创建图像缩略图的自定义类。它们现在使用命名空间来避免与其他第三方代码的命名冲突。更重要的是，类定义已被大规模重写以提高效率。另一个重要变化是在第\
  \ 9 章和第 17 章中使用新的密码哈希函数。这些函数直到 PHP 5.5 才引入，但你可以在 PHP 5.4 中通过将`password_compat`库包含在脚本中来模拟它们。关于如何获取该库（仅由一个文件组成）的详细信息，请参见第\
  \ 9 章。\n\n有关数据库操作的章节已重新组织，使其更易理解。我还加强了对预处理语句的解释，同时使用了 MySQL 改进版（MySQLi）和数据库无关的 PHP\
  \ 数据对象（PDO）。某些 Linux 发行版现已安装 MariaDB 作为 MySQL 的直接替代品。为避免不必要地重复，我通常只提及 MySQL，但本书中的所有\
  \ PHP 解决方案同样适用于 MariaDB。\n\n## 本书的组织结构\n\n每一章都会引导你完成一个项目中的一系列阶段，每个阶段都建立在前一个阶段的基础之上。通过逐章学习，你将全面了解各部分如何整合在一起。之后，你可以参考个别阶段来重温某项特定技术。虽然本书并非参考手册，但第\
  \ 3 章是 PHP 语法入门，某些章节也包含简短参考部分——尤其是第 7 章（文件读写）、第 9 章（会话）、第 10 章（MySQL/MariaDB 数据类型）、第\
  \ 11 章（PHP 预处理语句）、第 13 章（四个基本 SQL 命令）以及第 14 章（处理日期和时间）。\n\n那么，“简单”到底有多简单？我已尽力为你铺平道路，但并没有神奇药水。这需要你付出一些努力。不要试图一次性完成所有内容。循序渐进地为你的网站添加动态功能。理解它们如何运作，你的努力将获得丰厚回报。将\
  \ PHP 和 MySQL/MariaDB 加入你的技能库，将使你能够构建提供更丰富内容和交互式用户体验的网站。  \n\n\n\n"
- '# 使用示例文件


  本书所需的所有文件均可从 Apress 网站下载，网址为 [`www.apress.com/9781484206362`](http://www.apress.com/9781484206362)。请确保选择《PHP
  解决方案：动态网页设计轻松入门（第三版）》的下载链接。该版本的代码与前两版有所不同。


  请按照第 2 章所述，搭建 PHP 开发环境。解压文件，将 `phpsols` 文件夹及其所有内容复制到 Web 服务器的文档根目录下。各章节的代码位于以章节名称命名的文件夹中：`ch01`、`ch02`，依此类推。请遵循每个
  PHP 解决方案中的说明，将相关文件复制到网站根目录或指定的工作文件夹中。


  当某一页面在章节内经历多次修改时，我会对不同的版本进行编号，例如：`index_01.php`、`index_02.php` 等。复制带有编号的文件时，请移除文件名中的下划线和编号，因此
  `index_01.php` 应变为 `index.php`。如果你使用像 Dreamweaver 这类在移动文件时会提示更新链接的程序，请不要更新它们。文件中的链接设计为在目标文件夹中时能正确关联相应的图片和样式表。我这样做是为了让你能使用文件比较工具，将自己的文件与我的文件进行比对。


  如果你没有文件比较工具，我强烈建议你安装一个。它能在你试图找出自己版本与我的版本之间的差异时，为你省去数小时的挠头苦思。在数十行代码中，一个遗漏的分号或拼错的变量可能很难被发现。Windows
  用户可从 [`http://winmerge.org/`](http://winmerge.org/) 免费下载 WinMerge。我使用的是 Beyond Compare（[`www.scootersoftware.com`](http://www.scootersoftware.com/)），该工具现已支持
  Windows、Mac OS X 和 Linux 平台。它虽非免费，但功能卓越且价格合理。Mac 上的 BBEdit 内置了文件比较工具。或者，你也可以使用 TextWrangler
  中的文件比较功能，该软件可从 [`www.barebones.com/products/textwrangler/`](http://www.barebones.com/products/textwrangler/)
  免费下载。


  '
- '# 排版约定


  为使本书尽可能清晰易懂，全书采用以下文本约定：


  * 重要的单词或概念通常在首次出现时以**粗体**突出显示。

  * 代码以`等宽字体`呈现。

  * 新增或更改的代码通常以**粗体**`等宽字体`呈现。

  * 伪代码和变量输入以*斜体*`等宽字体`书写。

  * 菜单命令以“菜单 ➤ 子菜单 ➤ 子菜单”的形式书写。

  * 当我想提请你的注意时，会像这样突出显示：


  啊哈，别说我没警告过你。


  '
- '# 致谢


  撰写《PHP 解决方案》的初衷源于 Chris Mills，他是我在 Apress/friends of ED 共事多年的编辑，现任 Mozilla 公司高级技术文档撰写人，也是
  Web 标准的热情倡导者。Chris 希望摒弃那种孤立解决方案的“菜谱式”编写模式，因为这种模式让读者对所涉及技术的实际用途知之甚少。本书能出版至第三版，足以证明当初这个想法是多么出色。谢谢你，Chris。


  担任第二版和第三版编辑的 Ben Renow-Clarke 是 Chris 的继任者，他效仿 Chris，给予我充分的自由来按照自己的想法雕琢本书，但他总是能设身处地站在读者的角度，当某个解释不够清晰或某个章节结构混乱时，及时将我的思路引导到正确的方向。


  我也非常感谢我的技术审阅者们：第一版的 Samuel Wright，第二版的 Kristian Besley 和 Jason Nadon，以及本版的 Paul
  Milbourne。每个版本都建立在前一版本的基础之上，因此前一版本审阅者的想法和建议在本版中得以延续。


  若无 Apress 出版链中每一位成员的勤勉协助，要完成这样一本书是不可能的。我在此向他们所有人表示感谢。


  最重要的是，我要感谢众多读者，是你们让本书取得了如此成功。欢迎加入俱乐部。我希望你们喜欢本书，并发现它在使用 PHP 构建动态网站时卓有成效。




  '
