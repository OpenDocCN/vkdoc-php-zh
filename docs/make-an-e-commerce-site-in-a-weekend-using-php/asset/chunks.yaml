- fmt: '# Installing the LAMP Server


    LAMP stands for Linux, Apache, MySQL, and PHP. It is a group of open source software
    products used to run a web server on a Linux machine. The following are the steps
    to install LAMP:


    **Install Apache.** To install Apache, open a terminal and type the following
    commands:

    ```

    sudo apt-get install apache2

    ```

    To check if Apache is installed, open the browser and point at the address `http://localhost/`.
    If the page displays the text, "It works!", Apache was installed successfully.


    **Install MySQL.** To install MySQL, open a terminal and type the following commands:

    ```

    sudo apt-get install mysql-server

    ```

    You will be prompted to set the root''s password. If your computer does not prompt
    you, type the following commands to set the root''s password:

    ```

    mysql -u root

    mysql> SET PASSWORD FOR ''root''@''localhost'' = PASSWORD(''yourpassword'');

    ```

    To install the `phpMyAdmin` tool, type the following command into the terminal:

    ```

    sudo apt-get install libapache2-mod-auth-mysql php5-mysql phpmyadmin

    ```

    Once MySQL is installed, you can activate it with the following command:

    ```

    sudo mysql_install_db

    ```


    **Install PHP.** To install PHP, open a terminal and type the following commands:

    ```

    sudo apt-get install php5 libapache2-mod-php5 php5-mcrypt

    ```

    Answer "yes" to the prompted questions and PHP will install itself.


    After successful installation of WampServer or LAMP, you can go ahead and start
    either of them. I am using WampServer in this book, but the procedure is common
    for both the servers.


    # Starting the Server


    To use the WampServer, you need to start it. So, either double-click its icon
    from the desktop or follow these steps:


    - Open the Start screen.

    - From the list of tiles displayed on the Start screen, locate WampServer. If
    you don''t find the WampServer in the list of apps and programs, type the text
    "WAMP" on the blank space of the screen.

    - A search box will appear and will list all the apps matching the typed text.

    - Click on the WampServer icon shown in the resulting list.


    After starting the WampServer, an icon appears in the task bar, as shown in Figure
    [1-21](#A978-1-4842-1672-9_1_Chapter.html#Fig21).


    ![A978-1-4842-1672-9_1_Fig21_HTML.jpg](A978-1-4842-1672-9_1_Fig21_HTML.jpg)


    *Figure 1-21. WampServer icon displayed in task bar*


    When the WampServer icon is red, it means no services on it are currently running.
    When it is orange, it means the WampServer is started, but not all of its services
    are running. When it''s green, that means the WampServer is started and all its
    services are running correctly. To start the server, click on its icon and select
    the **Start All Services** option from the menu that pops up (see Figure [1-22](#A978-1-4842-1672-9_1_Chapter.html#Fig22)).


    ![A978-1-4842-1672-9_1_Fig22_HTML.jpg](A978-1-4842-1672-9_1_Fig22_HTML.jpg)


    *Figure 1-22. WampServer popup menu*


    As the server starts up, it will go from red to orange to green. The WampServer
    can conflict with the default Skype settings, IIS server, and other servers. If
    you see that all of the WampServer services are not running (i.e., its icon remains
    orange even after starting it), you need to stop your IIS server, quit Skype,
    and then restart your WampServer.


    If the WampServer icon changes to green, it means the server is successfully set
    up and is fully functioning. You can also verify this by launching a browser and
    pointing it at the `http://localhost` address. If you get the screen that shows
    the server configuration, Apache version, PHP version, etc. (see Figure [1-23](#A978-1-4842-1672-9_1_Chapter.html#Fig23)),
    along with the loaded extensions, it means the WampServer is successfully installed
    and is running.


    ![A978-1-4842-1672-9_1_Fig23_HTML.jpg](A978-1-4842-1672-9_1_Fig23_HTML.jpg)


    *Figure 1-23. Browser showing server configuration on successful installation
    of WampServer*


    Congratulations, your WampServer is installed successfully. It also means that
    Apache, MySQL, and PHP are successfully installed on your machine.


    By default, WampServer does not set a password for MySQL''s root user. To implement
    security and to avoid unauthorized access, you need to set a password for MySQL''s
    root user and create other users if required. So, let''s proceed to configure
    the MySQL server.


    # Configuring MySQL


    You will be using `phpMyAdmin` for configuring the MySQL server. `phpMyAdmin`
    is a software tool written in PHP, used to administer MySQL over the web. You
    can easily manage MySQL databases, tables, indexes, users, etc. through `phpMyAdmin`''s
    graphical user interface. To invoke `phpMyAdmin`, click the WampServer icon and
    select the `phpMyAdmin` option.


    `phpMyAdmin` will open up, as shown in Figure [1-24](#A978-1-4842-1672-9_1_Chapter.html#Fig24).
    The screen shows recent databases in the left pane. At the top right, you will
    find buttons to manage databases, SQL, users, etc. The middle pane shows the drop-down
    list that enables you to define the MySQL connection. You will also find the drop-down
    lists to change the default language, theme, font size, and other settings.


    ![A978-1-4842-1672-9_1_Fig24_HTML.jpg](A978-1-4842-1672-9_1_Fig24_HTML.jpg)


    *Figure 1-24. First screen on launching the phpMyAdmin tool*


    To configure root''s password, you need to access the user table that is found
    in the `mysql` database found in the left pane. The `+` (plus symbol) on the `mysql`
    database node indicates that currently it is in collapsed mode. To expand the
    node, click on its `+` symbol. The `mysql` database node will expand showing all
    the tables that exist inside it. Click the `user` table to display the number
    of rows within it (see Figure [1-25](#A978-1-4842-1672-9_1_Chapter.html#Fig25)).
    You can see that the `user` table contains the following four users by default:


    - User `root` for Host, `127.0.0.1`—Represents the root user for localhost without
    resolved IP for IPv4.

    - User `root` for Host, `::1`—Represents the root user for localhost without resolved
    IP for IPv6.

    - User `root` for Host, `localhost`—Represents the root user for localhost with
    resolved IP.

    - User `anonymous` for host, `localhost`—Represents the anonymous user with resolved
    IP.


    ![A978-1-4842-1672-9_1_Fig25_HTML.jpg](A978-1-4842-1672-9_1_Fig25_HTML.jpg)


    *Figure 1-25. Screen showing rows of user table*


    These users have empty passwords by default. The root usernames are superuser
    accounts that have all privileges but having empty passwords makes the MySQL server
    quite vulnerable to unauthorized access. So, the first task is to provide passwords
    to all these root accounts and either delete the anonymous user or provide a password
    for that user account too.


    To provide passwords to the root users, click on the **Edit** icon on the respective
    row to edit its content. The row will open and show the three text boxes—Host,
    User, and Password. Enter the password in the **Password** column (see Figure
    [1-26](#A978-1-4842-1672-9_1_Chapter.html#Fig26)). If you want to encrypt the
    password (instead of saving it in the plain text format), select the `PASSWORD`
    option from the **Function** combo box. After entering the password, click the
    **Go** button at the bottom to save the changes.


    ![A978-1-4842-1672-9_1_Fig26_HTML.jpg](A978-1-4842-1672-9_1_Fig26_HTML.jpg)


    *Figure 1-26. Changing the root password of MySQL server*


    Once the password is set for all the root users, your MySQL server becomes quite
    secure from unauthorized access. Let''s learn about the different database tables
    that will be required in your e-commerce site next.'
