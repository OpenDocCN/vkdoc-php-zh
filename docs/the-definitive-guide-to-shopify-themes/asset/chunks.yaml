    clients will want the ability to customize everything, even if there’s no realistic
    prospect of it changing.)


    #### Settings for “Multi-Use” Themes


    A variation of the “one-off” theme is a “multi-use” theme, where you’re designing
    and building a theme for a specific client, but where that theme will be used
    on multiple Shopify stores. The common use cases for this type of theme are clients
    running multiple Shopify stores to service different regions (e.g., US versus
    Australia) or different customer segments (e.g., retail versus wholesale).


    Unless the differences between regions or customer segments are so vast that a
    completely different design is required, it’s very useful to have a single codebase
    driving all variations of a particular theme, with the settings on each individual
    store determining the final look and functionality for that region or target customer.


    As an example of this approach in the wild, you can compare the retail and wholesale
    versions of the Colonna Coffee Shopify stores in Figure [8-2](#A437216_1_En_8_Chapter.html#Fig2).


    ![A437216_1_En_8_Fig2_HTML.jpg](A437216_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    The home page of the Colonna Coffee retail page (left) and the Colonna Coffee
    wholesale page (right). Both sites are driven by the exact same theme code


    Both stores use the same theme, and the `settings_schema.json` file contains an
    option for `store_type` (set to either `retail` or `wholesale`) that the template
    files themselves can read and use to display different content depending on the
    result.


    Other examples of theme settings commonly used for “multi-use” themes include:


    *   Whether to activate theme features based on the legal requirements of the
    region serviced (e.g., age verification or cookie warnings)

    *   Order minimums for wholesale sites

    *   Primary brand colors to distinguish retail from wholesale


    Again, the best way to work out what needs to go into the theme settings is by
    having a discussion with the client and understanding their needs.


    #### Settings for “Distributed” Themes


    At the other end of the spectrum to the narrow focus of a “one-off” theme for
    a specific client is a “distributed” theme—one that could be used by a multitude
    of businesses you have no direct connection to. This comes with the most number
    of headaches when it comes to theme settings.


    Users are going to want much more flexibility and control, including being able
    to configure colors, fonts, and layout settings. There also needs to be more flexibility
    in the integrations your settings support—for example, your newsletter widget
    may now require settings that support the use of MailChimp, Campaign Monitor,
    and InfusionSoft instead of just a single provider.


    The best advice I can offer is to start with some opinionated choices (this limited
    range of fonts, these mailing list providers, these layout options) and expand
    them only in case of repeated customer feedback, as each addition to your list
    of theme options results in a factorial increase in the number of things for you
    to test.'
