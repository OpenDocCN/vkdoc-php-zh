  text\" name=\"name\">\n电子邮件：<input type=\"text\" name=\"email\">\n<input type=\"\
  submit\">\n</form>\n</body>\n</html>\n```\n\n当你运行 HTML 表单时，它将如图 9-1 所示。\n\n![](img/514068_1_En_9_Fig1_HTML.jpg)\n\
  \n**图 9-1** HTML 表单网页\n\n现在你需要编写一些 PHP 代码，以便在将 `姓名` 和 `电子邮件` 的值发送到服务器之前，简单验证它们。\n\
  \n假设你希望 `姓名` 的 HTML 值是必需的，并且它只能包含字母和空格。`电子邮件` 值也是必需的，并且必须包含一个有效的电子邮件地址（包括 `@` 和\
  \ `.` 作为典型的电子邮件格式字符）。\n\n让我们从之前的 HTML 网页开始，并添加一些 PHP 验证代码。创建一个名为 `form-action.php`\
