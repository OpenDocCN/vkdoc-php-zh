    }

    }

    ```


    `foreach` 循环会处理 `$searchNode` 中的每一行。它使用 PHP 方法 `getAttribute` 将下一行带有 `ID` XML
    属性的内容放入属性 `$valueID` 中。一旦放入 `$valueID`，这个属性中的值（`dog`、`selectbox` 或 `breeds`）就会与
    `$this->app` 进行比较。（`app` 属性在构造函数中已加载了一个值。）如果在 XML 文件中找到了该 `ID`，`getElementsByTagName`
    会继续搜索下一行包含 `location` XML 标签的内容。然后，`return` 行会获取 location 标签中的值（文件名及其位置），并将其返回给调用此方法的程序。`break`
    语句用于提前跳出循环，因为在前一行代码中已经返回了所需的值。如果 XML 文件不存在，该方法的 `else` 部分（如例 5-10 所示）将返回 `FALSE`。


