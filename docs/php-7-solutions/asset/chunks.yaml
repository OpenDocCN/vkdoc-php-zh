    \ following code just before the method’s closing curly brace:\n\n```\nif ($renameDuplicates)\
    \ {\n    $name = $this->newName ?? $file['name'];\n    if (file_exists($this->destination\
    \ . $name)) {\n        // rename file\n        $basename = pathinfo($name, PATHINFO_FILENAME);\n\
    \        $extension = pathinfo($name, PATHINFO_EXTENSION);\n        $this->newName\
    \ = $basename . '_' . time() . \".$extension\";\n    }\n}\n```\n\nThe conditional\
    \ statement checks whether `$renameDuplicates` is `true` or `false`. The code\
    \ inside the braces is executed only if it’s `true`.\n\nThe first line of code\
    \ inside the conditional block uses the null coalescing operator to set the value\
    \ of `$name`. This is the same technique used in the `moveFile()` method. If the\
    \ `$newName` property has a value, that value is assigned to `$name`. Otherwise,\
    \ the original name is used.\n\nWe can then check whether a file with the same\
