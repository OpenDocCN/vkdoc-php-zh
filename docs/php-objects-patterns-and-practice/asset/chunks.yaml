    below, and then look in more detail at practical autoload recommendations and
    tools in Chapters [15](#A314621_5_En_15_Chapter.html) and [16](#A314621_5_En_16_Chapter.html).


    The examples you have seen so far have occasionally specified a fixed relationship
    the requiring and required files:


    ```

    require_once(__DIR__ . ''/../useful/Outputter.php'');

    ```


    This works quite nicely, except that it hardcodes the relationship between files.
    There must always be a `useful` directory alongside the calling class’s containing
    directory.


    Perhaps the worst approach is the tortuous relative path:


    ```

    require_once(''../../projectlib/business/User.php'');

    ```


    This is problematic because the path specified here is not relative to the file
    that contains this `require_once` statement, but to a configured calling context
    (often, but not always, the current working directory). Paths like this are a
    recipe for confusion (and in my experience almost always a sign that a system
    will need considerable improvement in other areas, too).


    You could use an absolute path, of course:


    ```

    require_once(''/home/john/projectlib/business/User.php'');

    ```


    This will work for a single instance—but it’s brittle. By specifying paths in
    this much detail, you freeze the library file into a particular context. Whenever
    you install the project on a new server, all `require` statements will need changing
    to account for a new file path. This can make libraries hard to relocate and impractical
    to share among projects without making copies. In either case, you lose the package
    idea in all the additional directories. Is it the `business` package, or is it
    the `projectlib/business` package?


    If you must manually include files in your code, the neatest approach is to decouple
    the invoking code from the library:


    ```

    business/User.php

    ```


    The preceding snippet can be referenced from anywhere on a system. You can do
    this with the include path. This is a list of directories that PHP searches when
    attempting to require a file. You can add to this list by altering the `include_path`
    directive. `include_path` is usually set in PHP’s central configuration file,
    `php.ini`. It defines a list of directories separated by colons on Unix-like systems
    and semicolons on Windows systems:


    ```

    include_path = ".:/usr/local/lib/php-libraries"

    ```


    If you’re using Apache, you can also set `include_path` in the server application’s
    configuration file (usually called `httpd.conf`) or a per-directory Apache configuration
    file (usually called `.htaccess`) with this syntax:


    ```

    php_value  include_path  value    .:/usr/local/lib/php-libraries

    ```


    Note


    `.htaccess` files are particularly useful in web space provided by some hosting
    companies, which provide very limited access to the server environment.


    When you use a filesystem function such as `fopen()` or `require()` with a nonabsolute
    path that does not exist relative to the current working directory, the directories
    in the include path are searched automatically, beginning with the first in the
    list (in the case of `fopen()`, you must include a flag in its argument list to
    enable this feature). When the target file is encountered, the search ends, and
    the file function completes its task.


    So by placing a package directory in an include directory, you need only refer
    to packages and files in your `require()` statements.


    ```

    require_once("business/User.php");

    ```


    You may need to add a directory to the `include_path` so that you can maintain
    your own library directory. To do this, you can edit the `php.ini` file (remember
    that, for the PHP server module, you will need to restart your server for the
    changes to take effect).


    If you do not have the privileges necessary to work with the `php.ini` file, you
    can set the include path from within your scripts using the `set_include_path()`
    function. `set_include_path()` accepts an include path (as it would appear in
    `php.ini`) and changes the `include_path` setting for the current process only.
    The `php.ini` file probably already defines a useful value for `include_path`,
    so rather than overwrite it, you can access it using the `get_include_path()`
    function and append your own directory. Here’s how you can add a directory to
    the current include path:


    ```

    set_include_path(get_include_path() . PATH_SEPARATOR . "/home/john/phplib/");

    ```


    The `PATH_SEPARATOR` constant will resolve to a colon on a Unix system and a semicolon
    on a Windows platform. So, for reasons of portability, its use is considered best
    practice.'
  trans: '

    #### 包含路径


    在组织组件时，需要牢记两个视角。第一个视角已经讨论过，即文件和目录在文件系统中的存放位置。但还应考虑组件之间的互相访问方式。到目前为止，本节对包含路径的问题只是浅尝辄止。当包含一个文件时，可以使用当前工作目录的相对路径或文件系统上的绝对路径来引用它。


    **注意：** 理解包含路径的工作方式以及引入文件所涉及的问题固然重要，但同样要记住，许多现代系统不再在类级别依赖 `require` 语句。相反，它们结合使用了自动加载和命名空间。我将在下面介绍自动加载，然后在第
    15 章和第 16 章中更详细地探讨实用的自动加载建议和工具。


    到目前为止，你看到的示例偶尔会指定请求文件与被请求文件之间的固定关系：


    ```

    require_once(__DIR__ . ''/../useful/Outputter.php'');

    ```


    这种写法虽然可以正常工作，但硬编码了文件之间的关系。调用类所在的目录旁必须始终存在一个 `useful` 目录。


    最糟糕的做法或许是曲折的相对路径：


    ```

    require_once(''../../projectlib/business/User.php'');

    ```


    这样做是有问题的，因为此处指定的路径并非相对于包含此 `require_once` 语句的文件，而是相对于已配置的调用上下文（通常（但并非总是）是当前工作目录）。像这样的路径是制造混乱的根源（根据我的经验，这几乎总是一个信号，表明系统在其他方面也需要大幅改进）。


    当然，你也可以使用绝对路径：


    ```

    require_once(''/home/john/projectlib/business/User.php'');

    ```


    这在单个实例上可以工作——但它很脆弱。通过如此详细地指定路径，你将库文件冻结在特定的上下文中。每当将项目安装到新服务器时，所有 `require` 语句都需要修改以适应新的文件路径。这使得库难以迁移，并且如果不复制副本，项目之间共享库也不现实。在这两种情况下，你都会在众多附加目录中丢失包的概念。这到底是
    `business` 包，还是 `projectlib/business` 包？


    如果必须手动在代码中包含文件，最简洁的方法是将调用代码与库解耦：


    ```

    business/User.php

    ```


    上述代码片段可以从系统上的任何位置引用。你可以通过包含路径来实现这一点。包含路径是一个目录列表，当试图引入文件时，PHP 会搜索这些目录。你可以通过修改 `include_path`
    指令来向此列表添加目录。`include_path` 通常在 PHP 的中央配置文件 `php.ini` 中设置。它定义了一个目录列表，在类 Unix 系统上用冒号分隔，在
    Windows 系统上用分号分隔：


    ```

    include_path = ".:/usr/local/lib/php-libraries"

    ```


    如果你使用 Apache，还可以在服务器应用程序的配置文件（通常称为 `httpd.conf`）或按目录的 Apache 配置文件（通常称为 `.htaccess`）中使用以下语法设置
    `include_path`：


    ```

    php_value  include_path  value    .:/usr/local/lib/php-libraries

    ```


    **注意：** `.htaccess` 文件在某些托管公司提供的网络空间中特别有用，这些公司对服务器环境的访问权限非常有限。


    当你对当前工作目录中不存在的非绝对路径使用像 `fopen()` 或 `require()` 这样的文件系统函数时，会自动搜索包含路径中的目录，从列表中的第一个目录开始（对于
    `fopen()`，你必须在参数列表中包含一个标志才能启用此功能）。当找到目标文件时，搜索结束，并且文件函数完成任务。


    因此，通过将包目录放在包含目录中，你只需在 `require()` 语句中引用包和文件即可：


    ```

    require_once("business/User.php");

    ```


    你可能需要将一个目录添加到 `include_path`，以便维护自己的库目录。为此，可以编辑 `php.ini` 文件（请记住，对于 PHP 服务器模块，你需要重启服务器才能使更改生效）。


    如果你没有操作 `php.ini` 文件所需的权限，可以使用 `set_include_path()` 函数从脚本内部设置包含路径。`set_include_path()`
    接受一个包含路径（如同在 `php.ini` 中出现的那样），并且仅更改当前进程的 `include_path` 设置。`php.ini` 文件可能已经为
    `include_path` 定义了一个有用的值，因此与其覆盖它，不如使用 `get_include_path()` 函数访问它，并附加你自己的目录。以下是将目录添加到当前包含路径的方法：


    ```

    set_include_path(get_include_path() . PATH_SEPARATOR . "/home/john/phplib/");

    ```


    `PATH_SEPARATOR` 常量在 Unix 系统上解析为冒号，在 Windows 平台上解析为分号。因此，出于可移植性的原因，使用它被认为是最佳实践。

    '
- fmt: '### Autoload


    Although it''s neat to use `require_once` in conjunction with the include path,
    many developers are doing away with require statements altogether at a high level
    and relying instead on autoload.


    To do this, you should organize your classes so that each sits in its own file.
    Each class file should bear a fixed relationship to the name of the class it contains,
    so you might define a `ShopProduct` class in a file named `ShopProduct.php` with
    directories corresponding to elements of the class''s namespace.


    PHP 5 introduced autoload functionality to help automate the inclusion of class
    files. The default support is pretty basic but still useful. It can be invoked
    by calling a function named `spl_autoload_register()` with no arguments. If autoload
    functionality has been activated in this way, a special function named `spl_autoload()`
    will be invoked whenever an attempt is made to instantiate an unknown class. The
    `spl_autoload()` function will be passed the name of the class, and it will attempt
    to use this name (converted to lower case), together with a file extension (`php`
    or `inc` by default) to include the relevant class file.


    Here''s a simple example:


    ```

    spl_autoload_register();

    $writer = new Writer();

    ```


    Assuming I have not already included a file containing a `Writer` object, this
    instantiation looks bound to fail. However, because I have set up autoloading,
    PHP will attempt to include a file named `writer.php` or `writer.inc`, and will
    then try the instantiation a second time. If one of these files exists, and contains
    a class named `Writer`, then all will be well.


    This default behavior supports namespaces, substituting directory names for each
    package:


    ```

    spl_autoload_register();

    $writer = new util\Writer();

    ```


    The preceding code will find a file named `writer.php` (note the lowercase name)
    in a directory named `util`.


    What if I happen to name my class files case-dependently? That is, what if I name
    them with the capital letters preserved? If I had placed the `Writer` class in
    a file named `Writer.php`, then the default implementation would have failed to
    find it.


    Luckily, I can register my own custom function to handle different sets of conventions.
    In order to take advantage of this, I must pass a reference to a custom function
    to `spl_autoload_register()`. My autoload function should require a single argument.
    Then, if the PHP engine encounters an attempt to instantiate an unknown class,
    it will invoke this function, passing it the unknown class name as a string. It
    is up to the autoload function to define a strategy for locating and then including
    the missing class file. Once the autoload function has been invoked, PHP will
    attempt to instantiate the class once again.


    Here''s a simple autoload function, together with a class to load:


    ```

    // listing 05.13

    class Blah

    {

    public function wave()

    {

    print "saying hi from root";

    }

    }

    // listing 05.14

    $basic = function ($classname) {

    $file = __DIR__ . "/" . "{$classname}.php";

    if (file_exists($file)) {

    require_once($file);

    }

    };

    \spl_autoload_register($basic);

    $blah = new Blah();

    $blah->wave();

    ```


    Having failed to instantiate `Blah` initially, the PHP engine will see that I
    have registered an autoload function with `spl_register_function()` and pass it
    the string `"Blah"`. My implementation simply attempts to include the file `Blah.php`.
    This will only work, of course, if the file is in the same directory as the file
    in which the autoload function was declared. In a real-world example, I would
    have to combine include path configuration with my autoload logic (this is precisely
    what Composer''s autoload implementation does).


    If I want to provide old school support, I might automate PEAR package includes:


    ```

    // listing 05.15

    class util_Blah

    {

    public function wave()

    {

    print "saying hi from underscore file";

    }

    }

    // listing 05.16

    $underscores = function ($classname) {

    $path = str_replace(''_'', DIRECTORY_SEPARATOR, $classname);

    $path = __DIR__ . "/$path";

    if (file_exists("{$path}.php")) {

    require_once("{$path}.php");

    }

    };

    \spl_autoload_register($underscores);

    $blah = new util_Blah();

    $blah->wave();

    ```


    As you can see, the autoload function matches underscores in the supplied `$classname`
    and replaces each with the `DIRECTORY_SEPARATOR` character (`/` on Unix systems).
    I attempt to include the class file (`util/Blah.php`). If the class file exists,
    and the class it contains has been named correctly, the object should be instantiated
    without an error. Of course, this does require the programmer to observe a naming
    convention that forbids the underscore character in a class name, except where
    it divides up packages.


    What about namespaces? We''ve seen that the default autoload functionality supports
    namespaces. But if we override that default, it''s up to us to provide namespace
    support. This is just a matter matching and replacing backslash characters:


    ```

    // listing 05.17

    namespace util;

    class LocalPath

    {

    public function wave()

    {

    print "hello from ".get_class();

    }

    }

    // listing 05.18

    $namespaces = function ($path) {

    if (preg_match(''/\\\\/'', $path)) {

    $path = str_replace(''\\'', DIRECTORY_SEPARATOR, $path);

    }

    if (file_exists("{$path}.php")) {

    require_once("{$path}.php");

    }

    };

    \spl_autoload_register($namespaces);

    $obj = new util\LocalPath();

    $obj->wave();

    ```


    The value that is passed to the autoload function is always normalized to a fully
    qualified name, without a leading backslash, so there is no need to worry about
    aliasing or relative namespaces at the point of instantiation.


    What if I wanted to support both PEAR-style class names and namespaces? I could
    combine my autoload implementations into a single custom function. Or, I could
    use the fact that `spl_autoload_register()` stacks its autoload functions:


    ```

    // listing 05.19

    \spl_autoload_register($namespaces);

    \spl_autoload_register($underscores);

    $blah = new util_Blah();

    $blah->wave();

    $obj = new util\LocalPath();

    $obj->wave();

    ```


    When it encounters an unknown class, the PHP engine will invoke the autoload functions
    in turn, stopping when instantiation is possible, or when the all options have
    been exhausted.


    There is obviously an overhead to this kind of stacking, so why does PHP support
    it? In a real world project, you''d likely combine the namespace and underscore
    strategies into a single function. However, components in large systems and in
    third-party libraries may need to register their own autoload mechanisms. Stacking
    allows multiple parts of a system to register autoload strategies independently,
    without overwriting one another. In fact, a library that only needs an autoload
    mechanism briefly can pass the name of its custom autoload function (or a reference
    to it, if the function is anonymous) to `spl_autoload_unregister()` to clean up
    after itself!


    **Note**


    PHP supports `__autoload()`, a less powerful mechanism for managing automatic
    file includes. If you provide an implementation of the `__autoload()` function,
    PHP will call your function when it fails to locate a class. However, because
    this approach only supports a single autoload function without stacking, it may
    be deprecated in future versions of PHP. See [http://www.php.net/spl_autoload_register](http://www.php.net/spl_autoload_register)
    for more details.'
  raw: '### Autoload


    Although it’s neat to use `require_once` in conjunction with the include path,
    many developers are doing away with require statements altogether at a high level
    and relying instead on autoload.


    To do this, you should organize your classes so that each sits in its own file.
    Each class file should bear a fixed relationship to the name of the class it contains,
    so you might define a `ShopProduct` class in a file named `ShopProduct.php` with
    directories corresponding to elements of the class’s namespace.


    PHP 5 introduced autoload functionality to help automate the inclusion of class
    files. The default support is pretty basic but still useful. It can be invoked
    by calling a function named `spl_autoload_register()` with no arguments. If autoload
    functionality has been activated in this way, a special function named `spl_autoload()`
    will be invoked whenever an attempt is made to instantiate an unknown class. The
    `spl_autoload()` function will be passed the name of the class, and it will attempt
    to use this name (converted to lower case), together with a file extension (php
    or inc by default) to include the relevant class file.


    Here’s a simple example:


    ```

    spl_autoload_register();

    $writer = new Writer();

    ```


    Assuming I have not already included a file containing a `Writer` object, this
    instantiation looks bound to fail. However, because I have set up autoloading,
    PHP will attempt to include a file named `writer.php` or `writer.inc`, and will
    then try the instantiation a second time. If one of these files exists, and contains
    a class named `Writer`, then all will be well.


    This default behavior supports namespaces, substituting directory names for each
    package:


    ```

    spl_autoload_register();

    $writer = new util\Writer();

    ```


    The preceding code will find a file named `writer.php` (note the lowercase name)
    in a directory named `util`.


    What if I happen to name my class files case-dependently? That is, what if I name
    them with the capital letters preserved? If I had placed the `Writer` class in
    a file named `Writer.php`, then the default implementation would have failed to
    find it.


    Luckily, I can register my own custom function to handle different sets of conventions.
    In order to take advantage of this, I must pass a reference to a custom function
    to `spl_autoload_register()`. My autoload function should require a single argument.
    Then, if the PHP engine encounters an attempt to instantiate an unknown class,
    it will invoke this function, passing it the unknown class name as a string. It
    is up to the autoload function to define a strategy for locating and then including
    the missing class file. Once the autoload function has been invoked, PHP will
    attempt to instantiate the class once again.


    Here’s a simple autoload function, together with a class to load:


    ```

    // listing 05.13

    class Blah

    {

    public function wave()

    {

    print "saying hi from root";

    }

    }

    // listing 05.14

    $basic = function ($classname) {

    $file = __DIR__ . "/" . "{$classname}.php";

    if (file_exists($file)) {

    require_once($file);

    }

    };

    \spl_autoload_register($basic);

    $blah = new Blah();

    $blah->wave();

    ```


    Having failed to instantiate `Blah` initially, the PHP engine will see that I
    have registered an autoload function with `spl_register_function()` and pass it
    the string, `"Blah"`. My implementation simply attempts to include the file `Blah.php`.
    This will only work, of course, if the file is in the same directory as the file
    in which the autoload function was declared. In a real-world example, I would
    have to combine include path configuration with my autoload logic (this is precisely
    what Composer’s autoload implementation does).


    If I want to provide old school support, I might automate PEAR package includes:


    ```

    // listing 05.15

    class util_Blah

    {

    public function wave()

    {

    print "saying hi from underscore file";

    }

    }

    // listing 05.16

    $underscores = function ($classname) {

    $path = str_replace(''_'', DIRECTORY_SEPARATOR, $classname);

    $path = __DIR__ . "/$path";

    if (file_exists("{$path}.php")) {

    require_once("{$path}.php");

    }

    };

    \spl_autoload_register($underscores);

    $blah = new util_Blah();

    $blah->wave();

    ```


    As you can see, the autoload function matches underscores in the supplied `$classname`
    and replaces each with the `DIRECTORY_SEPARATOR` character (`/` on Unix systems).
    I attempt to include the class file (`util/Blah.php`). If the class file exists,
    and the class it contains has been named correctly, the object should be instantiated
    without an error. Of course, this does require the programmer to observe a naming
    convention that forbids the underscore character in a class name, except where
    it divides up packages.


    What about namespaces? We’ve seen that the default autoload functionality supports
    namespaces. But if we override that default, it’s up to us to provide namespace
    support. This is just a matter matching and replacing backslash characters:


    ```

    // listing 05.17

    namespace util;

    class LocalPath

    {

    public function wave()

    {

    print "hello from ".get_class();

    }

    }

    // listing 05.18

    $namespaces = function ($path) {

    if (preg_match(''/\\\\/'', $path)) {

    $path = str_replace(''\\'', DIRECTORY_SEPARATOR, $path);

    }

    if (file_exists("{$path}.php")) {

    require_once("{$path}.php");

    }

    };

    \spl_autoload_register($namespaces);

    $obj = new util\LocalPath();

    $obj->wave();

    ```


    The value that is passed to the autoload function is always normalized to a fully
    qualified name, without a leading backslash, so there is no need to worry about
    aliasing or relative namespaces at the point of instantiation.


    What if I wanted to support both PEAR-style class names and namespaces? I could
    combine my autoload implementations into a single custom function. Or, I could
    use the fact that `spl_autoload_register()` stacks its autoload functions :


    ```

    // listing 05.19

    \spl_autoload_register($namespaces);

    \spl_autoload_register($underscores);

    $blah = new util_Blah();

    $blah->wave();

    $obj = new util\LocalPath();

    $obj->wave();

    ```


    When it encounters an unknown class, the PHP engine will invoke the autoload functions
    in turn, stopping when instantiation is possible, or when the all options have
    been exhausted.


    There is obviously an overhead to this kind of stacking, so why does PHP support
    it? In a real world project, you’d likely combine the namespace and underscore
    strategies into a single function. However, components in large systems and in
    third-party libraries may need to register their own autoload mechanisms . Stacking
    allows multiple parts of a system to register autoload strategies independently,
    without overwriting one another. In fact, a library that only needs an autoload
    mechanism briefly can pass the name of its custom autoload function (or a reference
    to it, if the function is anonymous) to `spl_autoload_unregister()` to clean up
    after itself!


    Note


    PHP supports __autoload(), a less powerful mechanism for managing automatic file
    includes. If you provide an implementation of the __autoload() function, PHP will
    call your function when it fails to locate a class. However, because this approach
    only supports [`http://www.php.net/spl_autoload_register`](http://www.php.net/spl_autoload_register)
    , a single autoload function without stacking, it may be deprecated in future
    versions of PHP.'
  trans: '

    ### 自动加载


    虽然在引入路径中使用 `require_once` 很简洁，但许多开发者已经彻底摆脱了高层次的 require 语句，转而依赖自动加载。


    为此，你应该组织好你的类，让每个类都位于独立的文件中。每个类文件应与其所包含的类名保持固定关系，因此你可以在名为 `ShopProduct.php` 的文件中定义一个
    `ShopProduct` 类，并根据类命名空间的元素使用相应的目录。


    PHP 5 引入了自动加载功能，以帮助自动引入类文件。默认支持相当基础，但仍然有用。它可以通过调用不带参数的 `spl_autoload_register()`
    函数来启用。如果以这种方式启用了自动加载功能，那么当尝试实例化一个未知类时，一个名为 `spl_autoload()` 的特殊函数将被调用。`spl_autoload()`
    函数将接收类名，并尝试使用该类名（转换为小写）以及文件扩展名（默认为 `php` 或 `inc`）来引入相应的类文件。


    下面是一个简单的例子：


    ```

    spl_autoload_register();

    $writer = new Writer();

    ```


    假设我还没有引入包含 `Writer` 对象的文件，这个实例化看起来注定会失败。然而，因为我设置了自动加载，PHP 将尝试引入名为 `writer.php`
    或 `writer.inc` 的文件，然后再次尝试实例化。如果这些文件之一存在，并且包含一个名为 `Writer` 的类，那么一切都会正常。


    这种默认行为支持命名空间，用目录名替换每个包：


    ```

    spl_autoload_register();

    $writer = new util\Writer();

    ```


    上述代码将在名为 `util` 的目录中查找名为 `writer.php`（注意使用小写名称）的文件。


    如果我不巧以区分大小写的方式命名了类文件呢？也就是说，如果我保留了类名中的大写字母，那么默认实现将无法找到它。


    幸运的是，我可以注册自己的自定义函数来处理不同的约定集。为了利用这一点，我必须将自定义函数的引用传递给 `spl_autoload_register()`。我的自动加载函数应接受一个参数。然后，当
    PHP 引擎遇到尝试实例化未知类时，它将调用此函数，并将未知类名作为字符串传递给它。自动加载函数负责定义定位并引入缺失类文件的策略。一旦自动加载函数被调用，PHP
    将再次尝试实例化该类。


    下面是一个简单的自动加载函数，以及一个要加载的类：


    ```

    // listing 05.13

    class Blah

    {

    public function wave()

    {

    print "saying hi from root";

    }

    }

    // listing 05.14

    $basic = function ($classname) {

    $file = __DIR__ . "/" . "{$classname}.php";

    if (file_exists($file)) {

    require_once($file);

    }

    };

    \spl_autoload_register($basic);

    $blah = new Blah();

    $blah->wave();

    ```


    初始实例化 `Blah` 失败后，PHP 引擎将发现我已经用 `spl_register_function()` 注册了一个自动加载函数，并将字符串 `"Blah"`
    传递给它。我的实现只是尝试引入 `Blah.php` 文件。当然，这仅在文件与声明自动加载函数的文件位于同一目录时才能生效。在实际示例中，我必须将包含路径配置与自动加载逻辑结合起来（这正是
    Composer 自动加载实现所做的）。


    如果我想提供旧式的支持，我可能会自动化 PEAR 包的引入：


    ```

    // listing 05.15

    class util_Blah

    {

    public function wave()

    {

    print "saying hi from underscore file";

    }

    }

    // listing 05.16

    $underscores = function ($classname) {

    $path = str_replace(''_'', DIRECTORY_SEPARATOR, $classname);

    $path = __DIR__ . "/$path";

    if (file_exists("{$path}.php")) {

    require_once("{$path}.php");

    }

    };

    \spl_autoload_register($underscores);

    $blah = new util_Blah();

    $blah->wave();

    ```


    如你所见，自动加载函数匹配提供的 `$classname` 中的下划线，并将每个下划线替换为 `DIRECTORY_SEPARATOR` 字符（Unix 系统上为
    `/`）。我尝试引入类文件（`util/Blah.php`）。如果类文件存在，并且其中包含的类正确命名，则对象应无错误地实例化。当然，这确实要求程序员遵守命名约定，禁止在类名中使用下划线字符，除非用于分隔包。


    命名空间呢？我们已经看到默认的自动加载功能支持命名空间。但如果我们覆盖了默认设置，就需要自己提供命名空间支持。这只需匹配并替换反斜杠字符：


    ```

    // listing 05.17

    namespace util;

    class LocalPath

    {

    public function wave()

    {

    print "hello from ".get_class();

    }

    }

    // listing 05.18

    $namespaces = function ($path) {

    if (preg_match(''/\\\\/'', $path)) {

    $path = str_replace(''\\'', DIRECTORY_SEPARATOR, $path);

    }

    if (file_exists("{$path}.php")) {

    require_once("{$path}.php");

    }

    };

    \spl_autoload_register($namespaces);

    $obj = new util\LocalPath();

    $obj->wave();

    ```


    传递给自动加载函数的值始终规范化为完全限定名称，没有前导反斜杠，因此在实例化时无需担心别名或相对命名空间。


    如果我想同时支持 PEAR 风格的类名和命名空间呢？我可以将自动加载实现合并到一个自定义函数中。或者，我可以利用 `spl_autoload_register()`
    会堆叠其自动加载函数这一特性：


    ```

    // listing 05.19

    \spl_autoload_register($namespaces);

    \spl_autoload_register($underscores);

    $blah = new util_Blah();

    $blah->wave();

    $obj = new util\LocalPath();

    $obj->wave();

    ```


    当遇到未知类时，PHP 引擎将依次调用自动加载函数，直到实例化成功或所有选项都已用尽。


    显然，这种堆叠方式会有一定开销，那么 PHP 为什么支持它呢？在实际项目中，你可能会将命名空间和下划线策略合并到一个函数中。然而，大型系统和第三方库中的组件可能需要注册自己的自动加载机制。堆叠允许系统的多个部分独立注册自动加载策略，而不会相互覆盖。事实上，一个只需要短暂自动加载机制的库，可以在完成后将自定义自动加载函数的名称（如果是匿名函数，则传递其引用）传递给
    `spl_autoload_unregister()`，以清理自身！


    **注意**


    PHP 支持 `__autoload()`，这是一种功能较弱的自动文件包含管理机制。如果你提供了 `__autoload()` 函数的实现，PHP 在找不到类时会调用你的函数。然而，由于这种方法只支持单个自动加载函数且无法堆叠，它可能会在未来的
    PHP 版本中被弃用。更多详情请参见 [`www.php.net/spl_autoload_register`](http://www.php.net/spl_autoload_register)。

