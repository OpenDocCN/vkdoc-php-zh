- fmt: '# A Trait


    A trait is a group of methods that can be inserted into classes. They were added
    in PHP 5.4 to enable greater code reuse without the added complexity that comes
    from allowing multiple inheritance. Traits are defined with the `trait` keyword,
    followed by a name and a code block. The naming convention is the same as for
    classes, with each word initially capitalized. The code block may only contain
    static and instance methods.


    ```

    trait PrintFunctionality

    {

    public function myPrint() { echo ''Hello''; }

    }

    ```


    Classes that need the functionality that a trait provides can include it with
    the `use` keyword, followed by the trait’s name. The trait’s methods then behave
    as if they were directly defined in that class.


    ```

    class MyClass

    {

    // Insert trait methods

    use PrintFunctionality;

    }

    $o = new MyClass();

    $o->myPrint(); // "Hello"

    ```


    A class may use multiple traits by placing them in a comma-separated list. Similarly,
    a trait may be composed from one or more other traits.


    ## Inheritance and Traits


    Trait methods override inherited methods. Likewise, methods defined in the class
    override methods inserted by a trait.


    ```

    class MyParent

    {

    public function myPrint() { echo ''Base''; }

    }

    class MyChild extends MyParent

    {

    // Overrides inherited method

    use PrintFunctionality;

    // Overrides trait inserted method

    public function myPrint() { echo ''Child''; }

    }

    $o = new MyChild();

    $o->myPrint(); // "Child"

    ```


    ## Trait Guidelines


    Single inheritance sometimes forces the developer to make a choice between code
    reuse and a conceptually clean class hierarchy. To achieve greater code reuse,
    methods can be moved near the root of the class hierarchy, but then classes start
    to have methods that they do not need, which reduces the understandability and
    maintainability of the code. On the other hand, enforcing conceptual cleanliness
    in the class hierarchy often leads to code duplication, which may cause inconsistencies.
    Traits provide a way to avoid this shortcoming with single inheritance, which
    enables code reuse that is independent of the class hierarchy.


    # Importing Files


    The same code often needs to be called on multiple pages. This can be done by
    first placing the code inside a separate file and then including that file using
    the `include` statement. This statement takes all the text in the specified file
    and includes it in the script, as if the code had been copied to that location.
    Just like `echo`, `include` is a special language construct and not a function,
    so parentheses should not be used.


    When a file is included, parsing changes to HTML mode at the beginning of the
    target file and resumes PHP mode again at the end. For this reason, any code inside
    the included file that needs to be executed as PHP code must be enclosed within
    PHP tags.


    ## Include Path


    An `include` file can either be specified with a relative path, an absolute path,
    or without a path. A relative file path is relative to the importing file’s directory.
    An absolute file path includes the full file path.


    ```

    // Relative path

    include ''myfolder\myfile.php'';

    // Absolute path

    include ''C:\xampp\htdocs\myfile.php'';

    ```


    When a relative path or no path is specified, `include` first searches for the
    file in the current working directory, which defaults to the directory of the
    importing script. If the file is not found there, `include` checks the folders
    specified by the `include_path` [¹](#A317139_2_En_17_Chapter.html#Fn1) directive
    defined in `php.ini` before failing.


    ```

    // No path

    include ''myfile.php'';

    ```


    In addition to `include`, there are three other language constructs available
    for importing the content of one file into another: `require`, `include_once`,
    and `require_once`.


    ## Require


    The `require` construct includes and evaluates the specified file. It is identical
    to `include`, except in how it handles failure. When a file import fails, `require`
    halts the script with an error; whereas `include` only issues a warning. An import
    may fail either because the file is not found or because the user running the
    web server does not have read access to it.


    ```

    require ''myfile.php''; // halt on error

    ```


    Generally, it is best to use `require` for any complex PHP application or CMS
    site. That way, the application does not attempt to run when a key file is missing.
    For less critical code segments and simple PHP web sites, `include` may suffice,
    in which case PHP shows the output, even if the included file is missing.


    ## Include_once


    The `include_once` statement behaves like `include`, except that if the specified
    file has already been included, it is not included again.


    ```

    include_once ''myfile.php''; // include only once

    ```


    ## Require_once


    The `require_once` statement works like `require`, but it does not import a file
    if it has already been imported.


    ```

    require_once ''myfile.php''; // require only once

    ```


    The `include_once` and `require_once` statements may be used instead of `include`
    and `require` in cases where the same file might be imported more than once during
    a particular execution of a script. This avoids errors caused by function and
    class redefinitions, for example.


    ## Return


    It is possible to execute a `return` statement inside an imported file. This stops
    the execution and returns to the script that called the file import.


    If a return value is specified, the import statement evaluates to that value,
    just like a normal function.


    ## Autoload


    For large web applications, the number of includes required in every script may
    be substantial. This can be avoided by defining an `__autoload` function. This
    function is automatically invoked when an undefined class or interface is used
    to try to load that definition. It takes one parameter, which is the name of the
    class or interface that PHP is looking for.


    ```

    function __autoload($class_name)

    {

    include $class_name . ''.php'';

    }

    // Attempt to auto include MyClass.php

    $obj = new MyClass();

    ```


    A good coding practice to follow when writing object-oriented applications is
    to have one source file for every class definition, and to name the file according
    to the class name. Following this convention, the `__autoload` function is able
    to load the class—provided that it is in the same folder as the script file that
    needed it.


    If the file is located in a subfolder, the class name can include underscore characters
    to symbolize this. The underscore characters then need to be converted into directory
    separators in the `__autoload` function.


    ## Footnotes


    [`http://www.php.net/manual/en/ini.core.php#ini.include-path`](http://www.php.net/manual/en/ini.core.php#ini.include-path)


    # Type Declarations


    Type declarations allow a function to declare the expected types of their parameters
    and return value. This permits the PHP engine to enforce that the specified types
    are used.


    ## Argument Type Declarations


    Early versions of PHP relied exclusively on proper documentation of functions
    for developers to know what arguments a function accepts. To allow for functions
    that are more robust, PHP 5 began to introduce argument type declarations, permitting
    the type of a function parameter to be specified. Valid types for type declarations
    are shown in Table 18-1, along with the PHP version in which these types were
    added.


    **Table 18-1.** Type Declarations


    | Name | Description | Version |

    | --- | --- | --- |

    | class name | Argument must be an object or a child of this class. | PHP 5.0
    |

    | interface name | Argument must be an object implementing this interface. | PHP
    5.0 |

    | `array` | Argument must be an array. | PHP 5.1 |

    | `callable` | Argument must be callable as a function. | PHP 5.4 |

    | `bool` | Argument must be a Boolean value. | PHP 7.0 |'
