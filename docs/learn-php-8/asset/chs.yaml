  ;\n// 向用户显示消息\n$date = date('m.d.Y h:i:s');\n$errormessage = $t->getMessage();\n\
  $eMessage = $date . \" | User Error | \" . $errormessage . \"\\n\";\nerror_log($eMessage,3,ERROR_LOG);\
  \ // 将消息写入错误日志文件\nerror_log(\"Date/Time: $date - Serious System Problems with Dog\
  \ Application. Check error log for details\", 1, \"noone@helpme.com\", \"Subject:\
  \ Dog Application Error \\nFrom: System Log \" . \"\\r\\n\");\n// 通过邮件通知相关人员系统出现问题\n\
  }\ncatch (Error $e)\n{\necho \"The system is currently unavailable. Please try again\
  \ later.\";\n// 向用户显示消息\n$date = date('m.d.Y h:i:s');\n$errormessage = $e->getMessage();\n\
  $eMessage = $date . \" | Fatal System Error | \" . $errormessage . \"\\n\";\nerror_log($eMessage,3,ERROR_LOG);\
  \ // 将消息写入错误日志文件\nerror_log(\"Date/Time: $date - Serious System Problems with Dog\
  \ Application. Check error log for details\", 1, \"noone@helpme.com\", \"Subject:\
  \ Dog Application Error \\nFrom: System Log \" . \"\\r\\n\");\n// 通过邮件通知相关人员系统出现问题\n\
  }\n示例 6-7\n包含异常记录和邮件功能的 dog_interface.php 文件\n```\n\n\n在示例 6-7 代码的顶部，创建了常量`USER_ERROR_LOG`和`ERROR_LOG`，用于指定日志文件的名称和位置。将可能变化的常量（如税率）放在代码顶部，便于负责维护应用程序的程序员快速修改。如前所述，日志文件的位置必须位于允许应用程序写入访问的文件夹中。建议将日志文件集中存放在一个公共文件夹内，与其他日志文件一起，方便数据中心人员（或系统分析师）访问。\n\
  \n其他代码更改位于`catch`块中。`setException catch`块将`setException`类生成的错误消息返回给用户。此消息告知用户哪些属性（`Name`、`Breed`、`Color`和`Weight`）未更新。导致此异常的错误可能来自用户，也可能是在信息从客户端机器传输到服务器时发生损坏。这些消息仅提供关于属性要求的信息，用户本应已知晓这些要求。`catch`块还向用户错误日志写入类似的消息。用户错误并非需要分析师立即处理的紧急错误。然而，跟踪用户问题的趋势可以提示可能需要进行哪些更改，以确保用户获得最佳应用体验。\n\
  \n`Throwable`和`Error catch`块捕获所有非用户生成的异常。由这些异常引起的消息可能会泄露破坏应用程序安全性的信息。因此，应向用户显示一条通用消息（例如`\"\
  The system is currently unavailable. Please try again later.\"`）。有关异常的详细信息（如错误消息、文件位置、引发异常的代码行）应放入错误日志以供进一步分析。大多数由这些`catch`块捕获的异常会导致应用程序停止运行。因此，必须通知相关人员正在发生的问题。`catch`块是向支持人员发送电子邮件以提醒他们任何问题的好位置。\n\
  \n既然我们已经在内建了异常处理和错误处理机制，我们可以编辑`php.ini`文件来关闭向用户显示错误报告的设置。但是，我们应该等到所有开发和测试完成后再进行此操作。在`php.ini`文件中找到`\"\
  display_errors = On\"`这一行。如果我们将此设置更改为`\"display_errors = Off\"`，大多数错误消息将不会显示给用户。此更改不会影响程序通过`echo`或`print`方法（包括在任何`catch`块中）发送回用户的任何消息。此更改将使开发者在系统出现问题时，能更好地控制显示给用户的错误消息类型。\n\
  \n#### 操作指南\n\n1.  下载本节的代码。创建一个或使用一个现有的 HTML 页面，该页面不检查用户输入错误。运行程序，输入可能导致用户错误的名称、品种、体重和颜色值。停止程序并打开用户错误日志文件的内容。错误是否出现在文件中？如果没有，请检查包含日志文件的文件夹的安全性，确保其允许对日志文件的写入访问。确认程序已捕获用户错误后，尝试引发其他系统错误。提示：在`dog`应用程序的\
  \ XML 文件中将文件名更改为不存在的名称。检查错误日志以确定错误是否已写入文件。您是否能够引发任何未被任一日志文件捕获的错误？如果是，是否有办法捕获这些错误？\n\
  \n#### 读取日志文件和文本文件\n\n在上一节中，我们发现`error_log`方法仅用一行代码就能写入日志文件。如果日志文件不存在，它会创建该文件。它将以追加方式（添加到文件末尾）将传递给它的任何消息写入文件内容，然后关闭文件。如果您要创建自己的日志记录流程，则需要多行代码。\n\
  \n```php\n$logFile = fopen(\"error_log.log\", \"a\");\n$eMessage = $e->getMessage();\n\
  fwrite($logFile, $eMessage);\nfclose($logFile);\n```\n\n`fopen`方法也会在文件不存在时创建它。参数`\"\
  a\"`表示写入文件的内容应被追加。参数`\"w\"`表示文件中的任何内容都将丢失（被覆盖）。然后，`fwrite`方法会将第二个参数（`$eMessage`）中的字符串放入由第一个参数（`$logFile`）指定的文件中。`$logFile`是一个指向文本文件位置的指针。`fclose`方法关闭文本文件。\n\
  *有关写入文本文件的更多信息，请访问 w3schools：[www.w3schools.com/php/php_file_create.asp](http://www.w3schools.com/php/php_file_create.asp)*。\n\
  \n由于日志文件是基于文本的文件，您可以使用类似的逻辑来创建自己的应用程序，以打开日志文件并读取其内容。\n\n```php\n$logFile = fopen(\"\
  error_log.log\", \"r\");\necho fgets($logFile);\nfclose($logFile);\n```\n\n这段代码将打开日志文件，读取文件中的第一行（通过`fgets`方法），然后关闭文件。然而，文件中很可能有多行内容。我们必须能够循环遍历并显示文件中的每一行。我们可以使用这里显示的`while`循环来实现。\n\
  \n```php\n$logFile = fopen(\"error_log.log\", \"r\");\nwhile(!feof($logFile))\n\
  {\necho fgets($logFile) . \"\";\n}\nfclose($logFile);\n```\n\n`while`循环会在条件语句为`TRUE`时持续循环。一旦条件语句变为`FALSE`，代码将退出循环并跳转到循环结束后的下一条代码行。在此示例中，`error_log`文件以只读方式打开（`\"\
  r\"`）。`while`循环检查日志文件的文件末尾指示器（`feof`），以确定是否已到达文件末尾。如果`feof`返回`TRUE`，则表示已到达文件末尾。当未到达文件末尾时，循环必须继续。要使条件语句在仍有待读取记录时产生`TRUE`，我们必须反转逻辑，使得在还有记录时`feof`产生`TRUE`，在没有记录时产生`FALSE`。我们可以通过使用`!`运算符来实现这一点。`!`运算符是一个`NOT`运算符，它可以反转结果。`NOT\
  \ TRUE`是`FALSE`，而`NOT FALSE`是`TRUE`。因此，`!feof`运算符现在会在有更多记录时产生`TRUE`，在没有更多记录时产生`FALSE`。循环与`fgets`方法结合，将显示文件中的每条记录。显示完每条记录后，将使用`fclose`关闭文件。\n\
  *有关读取文本文件的更多信息，请访问 w3schools：[www.w3schools.com/php/php_file_open.asp](http://www.w3schools.com/php/php_file_open.asp)*。\n\
  *有关`while`循环的更多信息，请访问 w3schools：[www.w3schools.com/php/php_looping.asp](http://www.w3schools.com/php/php_looping.asp)*。\n\
  \n前面示例产生的输出相当简单：\n\n```\n06.06.2020 03:00:55 | User Error | This is the error\n\
  ```\n\n这并不能比直接在文本编辑器中打开日志文件提供更好的查看体验。我们可以结合使用 HTML 表格、`explode`方法和数组来生成更好的输出。我们可以使用`explode`方法将日志文件中的每一行放入一个二维数组中。这个二维数组将拥有与\
  \ HTML 表格一样的行和列。\n\n```php\n$dogs = array\n(\narray(\"Sammy\",\"Lab\",18,\"Yellow\"\
  ),\narray(\"Spot\",\"Mixed\",14,\"Mixed\"),\narray(\"Princess\",\"Chihuahua\",4,\"\
  White\"),\narray(\"Max\",\"Boxer\",35,\"Brown\")\n);\n```\n\n\n\n二维数组是行信息的集合。每一**行**在每个位置（**列**）上都有共同的信息。在前面的示例中，所有狗的名字都在位置\
  \ 0，狗的品种在位置 1，狗的重量在位置 2，狗的颜色在位置 3。这与表格中的位置直接关联。\n\n有关多维数组的更多信息，请访问 [www.w3schools.com/php/php_arrays_multidimensional.asp](http://www.w3schools.com/php/php_arrays_multidimensional.asp)。\n\
  \n```\nSammy | Lab | 18 | Yellow |\nSpot | Mixed | 14 | Mixed |\nPrincess | Chihuahua\
  \ | 4 | White |\nMax | Boxer | 35 | Brown |\n```\n\n表格和二维数组中的每个位置都通过列和行来引用。在此表中，`Sammy`\
  \ 位于位置 `(0,0)`，`Yellow` 位于位置 `(0,3)`，`Max` 位于位置 `(3,0)`，`Brown` 位于位置 `(3,3)`。第一个位置是列，第二个位置是行。在\
  \ PHP 中，`[]` 用于定义数组的下标（位置）。\n\n```\necho $dogs[0][0]; // displays Sammy\necho $dogs[0][3];\
  \ // displays Yellow\necho $dogs[3][0]; // displays Max\necho $dogs[3][3]; // displays\
  \ Brown\n```\n\n现在我们可以调整循环，将日志内容放入一个二维数组中。然而，我们不知道数组的大小，因此无法使用之前展示的格式。如果开发者不使用 PHP，这可能会让他们感到非常头疼。但\
  \ PHP 允许我们动态创建数组，就像它允许我们在需要时创建变量（属性）一样。\n\n```\n$logFile = fopen(\"error_log.log\"\
  , \"r\");\n$row_Count = 0;\nwhile(!feof($logFile))\n{\nprint_r ($error_Array[$row_Count]\
  \ = explode(' | ', fgets($logFile)));\n$row_Count++;\n}\nfclose($logFile);\n```\n\
  \n在此示例的循环中，`explode` 方法通过 `|` 字符（实际上是空格、`|` 和空格）来拆分从文本文件读入的行。它将拆分后的每个字符串放入 `$error_Array`\
  \ 中由 `$row_Count` 值指示的行中。第一次循环时，日志文件的第一行被放入 `$error_Array[0]`（数组的第一行）。由于 `explode`\
  \ 命令对字符串进行了拆分，因此会为每一部分创建相应的列。\n\n如果文件的第一行包含：\n\n```\nA general error | stuff | more\
  \ stuff\n```\n\n那么数组的第一行将包含：\n\n```\n$error_Array[0][0] = \"A general error\"\n\
  $error_Array[0][1] = \"stuff\";\n$error_Array[0][2] = \"more stuff\";\n```\n\n我们可以通过示例中展示的\
  \ `print_r` 命令来验证这一点。`print_r` 会以下列格式显示数组的内容：\n\n```\nArray ( [0] => A general error\
  \ [1] => stuff [2] => more stuff )\n```\n\n这种格式验证了字符串的每一部分都被正确放入了数组的对应位置。`$row_count`\
  \ 在循环继续前会递增 1。这样会将文件的下一行放入数组的下一个位置（如果是文件的第二行，则放入 `$error_Array[1]`）。当然，我们不会使用 `print_r`\
  \ 向用户展示结果（因为它不太美观）。\n\n不过，它是一个很好的工具，可以帮助我们确保程序正确地将所有内容放入了数组中。我们可以在循环中添加代码来构建一个表格。\n\
  \n```\n$logFile = fopen(\"Errors.log\", \"r\");\n$row_Count = 0;\necho \"<table>\"\
  ;\nwhile(!feof($logFile))\n{      echo \"<tr>\";\n$error_Array[$row_Count] = explode('\
  \ | ', fgets($logFile));\n$displayString = \"\";\nfor($I=0; $I < 3; $I++)\n{   \
  \        $displayString = $displayString . \"<td>\" . $error_Array[$row_Count][$I]\
  \ . \"</td>\";\n}\necho $displayString;\necho \"</tr>\";\n$row_Count++;\n}\necho\
  \ \"</table>\";\nfclose($logFile);\n```\n\n一个 `echo` 语句被放置在 `while` 循环之前，用于打开 HTML\
  \ 表格。另一个 `echo` 语句（`echo \"<tr>\"`）位于 `while` 循环内部，用于创建表格的一行。\n*有关* *for* *循环的更多信息，请访问*\
  \ [www.w3schools.com/php/php_looping_for.asp](http://www.w3schools.com/php/php_looping_for.asp)*。*\n\
  同样，在 `while` 循环中，我们创建了一个 `for` 循环来遍历该行的每一列。由于我们知道有四列，因此 `for` 循环是一个很好的选择。当我们确切知道循环次数时，会使用\
  \ `for` 循环。`for` 循环的第一个参数（在 `;` 之前）初始化计数变量（`$I=0`）。此变量（`$I`）用于计数每次循环。第二个参数（`$I <\
  \ 3`）包含一个比较，用于确定逻辑流是否将停留在循环中。如果比较结果为 `TRUE`，循环将继续；如果为 `FALSE`，逻辑流将跳转到循环后的第一个语句（`echo\
  \ \"</tr>\"`）。第三个参数（`$I++`）可以递增或递减计数变量。`for` 循环通过将所需信息集中在一行代码中，帮助程序员记住要初始化变量、检查条件并递增变量。\n\
  `for` 循环中的 `echo` 语句使用 `$row_Count` 和 `$I` 变量从当前行的每一列中提取信息。第一次进入循环时，`$row_Count`\
  \ 为 0。`echo` 语句将显示 `$errorArray[0][0]` 的内容。随着 `for` 循环的继续，将依次显示 `$errorArray[0][1]`、`$errorArray[0][2]`\
  \ 和 `$errorArray[0][3]` 的内容。每个值都通过 `<td>` 和 `</td>` 标签放入表格的一个单元格中。`for` 循环完成后，流程跳转到循环下方，关闭该行（`echo\
  \ </tr>`）。然后递增 `row_Count` 变量。如果还有更多行（文件中有更多记录），`while` 循环将继续处理下一行，直到文件中没有更多记录为止。当流程跳出\
  \ `while` 循环后，表格被关闭（`echo \"</table>\"`）。然后关闭文件。\n\n文本（日志）文件是顺序文件。当添加（追加）项目时，它们会被添加到列表的底部。您可能希望对信息进行排序，将最新的记录排在前面。这只需对代码进行轻微修改即可实现。\n\
  \n```\n$logFile = fopen(\"Errors.log\", \"r\");\n$row_Count = 0;\nwhile(!feof($logFile))\n\
  {\n$error_Array[$row_Count] = explode(' | ', fgets($logFile));\n$row_Count++;\n\
  }\n$row_Count--;\nfclose($logFile);\necho \"<table>\";\nfor ($J=$row_Count; $J >=\
  \ 0; $J--)\n{      echo \"<tr>\";\n$displayString = \"\";\nfor($I=0; $I < 3; $I++)\n\
  {           $displayString = $displayString . \"<td>\" . $error_Array[$J][$I] .\
  \ \"</td>\";\n}\necho $displayString;\necho \"</tr>\";\n}\necho \"</table>\";\n\
  ```\n\n`while` 循环现在会将记录加载到数组中，并记录数组中项目的数量。在循环结束且文件关闭后，一个 `for` 循环会以相反的顺序遍历数组，以输出表格中的行。计数器变量\
  \ `$J` 从数组的总行数（`$row_Count`）开始。在循环开始前从 `$row_Count` 中减去 1，因为它在 `while` 循环中获取最后一条记录后递增了一次，这使得计数多了一个。然后每次循环对\
  \ `$J` 进行递减（`$J--`），直到其值小于零。内部的 `for` 循环（`for($I=0;$I<3;$I++)`）没有改变，因为它仍然需要遍历行的每一列来显示信息。\n\
  通过将记录加载到数组中，我们可以在需要时对其进行修改。假设我们想要删除日志中的一条记录。只要我们知道了要删除的行号，就可以从数组中移除该记录。然后，我们可以用剩余的记录重新填充文件。\n\
  \n\n\n首先，我们对已完成的`echo`代码做一处微调，在待删除记录旁添加一个链接。接着，我们将新增一个`delete`方法，把显示代码移至`display`方法中（以便随时调用），并创建一个`saveChanges`方法用于更新日志文件。\n\
  \n```\n\";\necho \" table { border: 2px solid #5c744d;}  \";\necho \"\";\necho \"\
  日志文件: \" . ERROR_LOG . \"\";\necho \"日期/时间错误类型错误消息\";\nfor ($J=$row_Count; $J >=\
  \ 0; $J--) {\necho \"删除\";\nfor($I=0; $I  \" . $error_Array[$J][$I] . \"  \";\n\
  }\necho \"\";\n}\necho \"\";\necho \"\";\n} // 主程序段\nconst ERROR_LOG = \"Errors.log\"\
  ;\n$logFile = fopen(ERROR_LOG, \"r\");\n$row_Count = 0;\nwhile(!feof($logFile))\n\
  {\n$error_Array[$row_Count] = explode(' | ', fgets($logFile));\n$row_Count++;\n\
  }\nfclose($logFile);\nif(isset($_GET['rn']))\n{\ndeleteRecord($_GET['rn'], $row_Count,\
  \ $error_Array);\nsaveChanges($row_Count,$error_Array,ERROR_LOG);\n}\ndisplayRecords($row_Count,$error_Array);\n\
  ?>\n```\n\n示例 6-8 `readerrorlog.php`文件\n\n![../images/394210_2_En_6_Chapter/394210_2_En_6_Fig2_HTML.jpg](img/394210_2_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2 包含用户错误的`readerrorlog.php`文件\n\n在示例 6-8 中，`displayRecords`方法包含了之前展示的大部分代码。新增了一些\
  \ CSS 代码，使显示效果更专业。同时，每条记录都附带了一个 HTML `href`链接。该链接会重新调用程序，并传递用户想要删除的记录编号。位于“主程序段”（首先执行的代码行）中的代码集创建了一个常量`ERROR_LOG`，用于定义日志文件的位置和名称。文件的打开和数组的加载方式与之前相同。\n\
  \n数组加载完毕后，程序会检查是否由某条记录的删除链接所调用。如果通过 HTTP `GET`传递了某个值，程序就会调用`deleteRecord`方法。`deleteRecord`方法执行完毕后，程序接着调用`saveChanges`方法。无论程序是否接收到值，它都会执行最后一条语句，即调用`displayRecords`方法。\n\
  \n- **程序说明**——`deleteRecords`方法的方法头（`function deleteRecord($recordNumber, &$row_Count,\
  \ &$error_Array)`）使用了按引用传递而非按值传递，以便在方法中更新`$row_Count`和`$error_Array`。默认情况下，传入方法的参数不能被该方法修改（按值传递）。`&`表示该参数是按引用传递的，这允许参数的值被修改。`deleteRecords`可以调整数组的行数（`$row_Count`）以及数组本身的信息（`$error_Array`）。\n\
  - 按值传递是将参数中包含的内容（数据）传入方法。按引用传递是将参数的内存地址传入方法，这使得方法可以修改参数在内存中的值。\n\n`deleteRecords`方法接受待删除的记录编号作为其参数之一。数组中任何位于此记录编号之上的位置保持不变。任何位于此记录之下的位置都必须向上移动一位。例如，如果一个数组有十个位置（0–9），并且要删除第五个位置（4），那么位置\
  \ 5–9 必须变成位置 4–8。在下面的示例中，对于待删除的`$recordNumber`之后的任何记录，位置`$J+1`被放入位置 J：\n\n![../images/394210_2_En_6_Chapter/394210_2_En_6_Figa_HTML.jpg](img/394210_2_En_6_Figa_HTML.jpg)\n\
  \n数组的最后一个位置不再需要了。数组的最后一个位置被释放（使用`unset`）。这将告知操作系统，该内存空间不再需要。操作系统会调用其垃圾回收器来释放该内存位置。在后续章节讨论关联数组时，我们会发现完成此任务的更简单方法。数组重新配置后，会调用`saveChanges`方法替换日志文件中的记录。显示的代码与本章前面的示例非常相似，只有一个例外。`fopen`方法使用了参数`\"\
  w\"`。`\"w\"`参数会清除文件中已存在的所有内容，并用当前写入文件的内容替换它。在此示例中，文件将被更新（替换）为排除了已删除记录的新记录集。每次调用程序时（无论是否删除了记录），都会调用`displayRecords`方法。此方法显示日志文件的内容。\n\
  \n- **编程说明**——检索在整个程序中都会用到的数据的程序，通常在代码的初始阶段检索信息，并将其放入数据结构（数组、列表或数据集）中。当数据在程序中被更新时，数据结构中的信息也会被更新。数据处理完成后，信息会被送回原始位置（文本文件或数据库）。更新文本文件或数据库通常在程序的最后阶段之一完成。用户退出程序的过程会提供一个事件，指示应保存更新后的数据。\n\
