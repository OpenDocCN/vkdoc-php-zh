  返回结果为：\n\n```\n邮箱中有 3 封邮件\n```\n\n单独使用 `imap_headers()` 并不是非常有用。毕竟，你可以使用 `imap_num_msg()`\
  \ 函数检索邮件总数。通常情况下，你会将此函数与另一个能够解析检索到的每个数组条目的函数结合使用。接下来，将使用 `imap_headerinfo()` 函数进行演示。\n\
  \n##### imap_headerinfo()\n\n`object imap_headerinfo(resource *msg_stream*, int\
  \ *msg_number* [, int *fromlength*`）\n\n\n\n`imap_headerinfo()` 函数检索与指定邮箱中消息 `msg_number`\
  \ 相关的大量信息，该邮箱由 `msg_stream` 指定。还可提供三个可选参数：`fromlength`，表示应检索的 `from` 属性的最大字符数；`subjectlength`，表示应检索的\
  \ `subject` 属性的最大字符数；以及 `defaulthost`，目前是一个占位符，没有实际用途。\n\n每条消息共返回 29 个对象属性：\n\n\
  - `Answered`：消息是否已回复？如果已回复，该属性为 `A`，否则为空。\n- `bccaddress`：一个字符串，包含在 `Bcc` 标头中找到的所有信息，最多\
  \ 1024 个字符。\n- `bcc[]`：一个对象数组，包含与消息 `Bcc` 标头相关的项。每个对象包含以下属性：\n  - `adl`：称为“at-domain”或源路由，此属性已被弃用，很少使用（如果曾经使用过的话）。\n\
  \  - `host`：指定电子邮件地址的主机部分。例如，如果地址是 `gilmore@example.com`，则 `host` 设置为 `example.com`。\n\
  \  - `mailbox`：指定电子邮件地址的用户名部分。例如，如果地址是 `ceo@example.com`，则 `mailbox` 属性设置为 `ceo`。\n\
  \  - `personal`：指定电子邮件地址的“友好名称”。例如，发件人标头可能显示为 `Jason Gilmore <gilmore@example.com>`。在这种情况下，`personal`\
  \ 属性设置为 `Jason Gilmore`。\n- `ccaddress`：一个字符串，包含在 `Cc` 标头中找到的所有信息，最多 1024 个字符。\n\
  - `cc[]`：一个对象数组，包含与消息 `Cc` 标头相关的项。每个对象包含与 `bcc[]` 总结中介绍的相同属性。\n- `date`：发送方邮件客户端标头中找到的日期。请注意，此日期可能很容易出错或完全伪造。您可能更希望依赖\
  \ `udate` 来获得更准确的消息接收时间范围。\n- `deleted`：消息是否已标记为删除？如果已删除，此属性为 `D`，否则为空。\n- `draft`：此消息是否为草稿格式？如果是草稿，此属性为\
  \ `X`，否则为空。\n- `fetchfrom`：发件人标头，不超过 `fromlength` 个字符。\n- `fetchsubject`：主题标头，不超过\
  \ `subjectlength` 个字符。\n- `followup_to`：此属性用于防止当消息发送给列表时，发件人的消息被发送给用户。请注意，此属性不是标准的，并非所有邮件代理都支持。\n\
  - `flagged`：此消息是否已标记？如果已标记，此属性为 `F`，否则为空。\n- `fromaddress`：一个字符串，包含在 `From` 标头中找到的所有信息，最多\
  \ 1024 个字符。\n- `from[]`：一个对象数组，包含与消息 `From` 标头相关的项。每个对象包含与 `bcc[]` 总结中介绍的相同属性。\n\
  - `in_reply_to`：如果由 `msg_number` 标识的消息是对另一条消息的回复，此属性指定标识原始消息的 `Message-ID` 标头。\n\
  - `message_id`：一个唯一标识消息的字符串。以下是一个示例消息标识符：\n\n```\n<1C0CCEE45B00E74D8FBBB1AE6A472E85012C696E>@wjgilmore.com\n\
  ```\n\n- `newsgroups`：消息已发送到的新闻组。\n- `recent`：此消息是否为新消息？如果消息是新的且已查看，此属性为 `R`；如果是新的且未查看，则为\
  \ `N`；否则为空。\n- `reply_toaddress`：一个字符串，包含在 `Reply-To` 标头中找到的所有信息，最多 1024 个字符。\n\
  - `reply_to`：一个对象数组，包含与 `Reply-To` 标头相关的项。每个对象包含与 `bcc[]` 总结中介绍的相同属性。\n- `return_path`：一个字符串，包含在\
  \ `Return-path` 标头中找到的所有信息，最多 1024 个字符。\n\n\n\n• `return_path[]`：一个对象数组，包含与邮件 `Return-path`\
  \ 标头相关的项目。每个对象由 `bcc[]` 摘要中介绍的相同属性组成。\n\n• `subject`：邮件主题。\n\n• `senderaddress`：一个字符串，包含\
  \ `Sender` 标头中的所有信息，最多 1,024 个字符。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 18](img/index-400_1.png)\n\n"
- "# 第 16 章 ■ 网络通信\n\n**381**\n\n• `sender`：一个对象数组，包含与邮件 `Sender` 标头相关的项目。每个对象由 `bcc[]`\
  \ 摘要中介绍的相同属性组成。\n\n• `toaddress`：一个字符串，包含 `To` 标头中的所有信息，最多 1,024 个字符。\n\n• `to[]`：一个对象数组，包含与邮件\
  \ `To` 标头相关的项目。每个对象由 `bcc[]` 摘要中介绍的相同属性组成。\n\n• `udate`：邮件被服务器接收的日期，格式为 Unix 时间戳。\n\
  \n• `unseen`：表示邮件是否已被阅读。如果邮件未读且非最新，则此属性为 `U`，否则为空。\n\n请考虑以下示例：\n\n```php\n<?php\n\
  // 指定邮箱并建立连接\n$mailserver = \"{mail.example.com:143/imap/notls}INBOX/Staff/CEO\"\
  ;\n$ms = imap_open($mailserver,\"jason\",\"mypswd\");\n\n// 获取邮件头信息\n$headers =\
