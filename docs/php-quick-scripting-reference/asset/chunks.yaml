    \ `$_COOKIE` 数组。\n\n## 安全问题\n\n任何用户提供的数据都可能被篡改，因此在被使用前应该进行验证和清理。验证是指你确保数据在数据类型、范围和内容方面符合你的预期形式。例如，以下代码验证了一个电子邮件地址。\n\
    \n```\nif(!filter_var($_POST['email'], FILTER_VALIDATE_EMAIL))\n  echo \"Invalid\
    \ email address\";\n```\n\n清理是指禁用用户输入中潜在的恶意代码。这是通过根据输入将要被使用的语言规则转义代码来完成的。例如，如果数据将被发送到数据库，则需要使用\
    \ `mysql_real_escape_string` 函数对其进行清理，以禁用任何嵌入的 SQL 代码。\n\n```\n// 为数据库使用进行清理\n\
