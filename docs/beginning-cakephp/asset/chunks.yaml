    but you cannot enter a URL to call only a model or a view. Cake’s dispatcher will
    funnel all requests through the Controller object, so you must place other objects
    in the way to intercept the default actions that object will perform when called.
    If you enter a URL and the dispatcher cannot find a controller object that matches
    the name in that URL, then the Controller object, by default, is set to display
    an error message. Knowing these default behaviors and knowing where you can intercept
    them and install your own methods are what coding in Cake is all about.


    In the model, for example, each time a record is saved to the database, certain
    functions are executed. You can intercept this default behavior by entering the
    beforeSave() function in the model with some of your own logic. This intercepts
    the default save() function the Model object uses to insert records into the database
    and allows you to check the data against your own custom parameters before saving
    them.


    As the dispatcher resolves URLs, it will look to files named appropriately, and
    otherwise it will return errors. When controller actions are run, the Controller
    object looks for specific view files stored in the appropriate area for the controller
    to execute properly. Throughout the entire Cake application, certain conventions
    are at work. In a way, the main content of this book is to spell out all these
    conventions and how to work with them to produce web applications. First I’ll
    describe how to name files and how to name class objects in these files appropriately.
    By placing files in the correct areas with correct names and containing correct
    class names, Cake will know that you are intercepting its default operations and
    will execute your custom objects instead. The more objects you extend from Cake’s
    default objects, the more elaborate the application.


    **Naming Conventions**


    Simply put, if you don’t name your files correctly, Cake won’t be able to piece
    the different parts of the application together and will supply you with error
    messages. Each element of the site must follow certain naming conventions so that
    when Cake looks for a needed resource, it can find it and run it.


    You probably noticed in Chapter 3 that you gave certain names to the model and
    controller files to make the to-do list application work. I explained that these
    files have to match up with the table in the database and contain some typical
    naming schemes when entering PHP code. What if you needed some more elaborate
    naming schemes to meet the demands of your project? The following are the basic
    rules for naming files in Cake and how to incorporate more complex names into
    your Cake application for more custom needs.


    **Naming Controllers**


    Each controller name must match a database table name. If you decide to create
    controllers with names other than tables of the database, you should actually
    not create a controller but use a component instead (you’ll learn more about components
    in Chapter 11). The names of database tables as well as controllers are lowercase
    and in plural form. For example, a table containing records for orders in a shopping
    cart application would be named orders. The controller file takes the name of
    the table it matches and appends an underscore and the word controller, and it
    is a PHP file, so it will carry the .php extension. Thus, the Orders controller
    would be named orders_controller.php and would be stored in the app/controllers
    folder.


