    Getting PHP to run on Windows is almost as easy. Please note that PHP no longer
    supports older versions of Windows (XP/2003 etc.). The first step is to install
    a web server: IIS or Apache. These days there is not much difference in performance
    or features between the two. If you are going to deploy the PHP scripts on IIS
    on a Windows server it’s recommended to do the development on a similar platform.
    The same goes for Apache deployments.


    When developing on Windows and deploying on Linux it is important to note a few
    key differences between the two operating systems. First of all, file names on
    Windows are case insensitive. If your script refers to a file called MyFile.php
    but the actual file name is myfile.php, it will work on Windows but break when
    you deploy to the Linux platform. Secondly there is the matter of directory separator.
    This is a slash (/) on Linux and Unix environments and a backslash (\) on windows.
    PHP can use both when referencing local files but always use slashes in URL''s.
    It is recommended to always use the slash as a directory separator on Windows
    because there is no need to escape that character when it''s written as part of
    a double quoted string.


    ![Image 5](index-43_1.jpg)


    CHAPTER 1 ■ INSTALLATION AND CONFIGURATION


    To install Internet Information Services (IIS version 7 or later) on a Windows
    10 system, launch the control panel and click on “Programs and Features.” In the
    left bar there is a link to “Turn Windows features on or off.” This will bring
    up a window with Windows Features. Simply enable the option for Internet Information
    Services and click on the Ok button, as shown in the image below.


    Make sure to expand the World Wide Web Services folder, then expand Application
    Development Features and select the CGI option.


    ![Image 6](index-44_1.jpg)


    CHAPTER 1 ■ INSTALLATION AND CONFIGURATION


    This will install the web server, the CGI module needed for PHP, and the management
    tools. Be aware that other processes (like Skype and Plex) installed on the computer
    might already be using the default web port (80). If that is the case you can
    either disable these services or use a different port for the web server.


    Using different ports for each web site you are working on will allow you to host
    multiple sites. It will also allow concurrent use of Apache and IIS on the same
    system.


    It is possible to have multiple web sites (on the same server) share a single
    port. Using different host names for each web site does that. These host names
    can be managed locally in a hosts file. This file is located in c:\Windows\System32\Drivers\etc
    on a Windows system and in /etc on a Mac or Linux system.'
  trans: "\n# `php -m`\n\n[PHP 模块]\n\n`bz2`  \n`calendar`  \n`Core`  \n`ctype`  \n\
