    \ PHP 脚本运行时存在。它们通过美元符号后跟一个名称来标识。变量名可以以字母（a-z 或 A-Z）或下划线开头。之后的任何字符可以是数字、字母或任何从\
    \ 127 到 255（0x7f – 0xff）的 ASCII 字符。名称的字符数没有限制。\n\n变量名是大小写敏感的，因此`$var`、`$Var`和`$VAR`将是三个不同的变量。\n\
    \nPHP 是一种松散类型的语言，变量可以根据计算或操作的结果改变类型。如果整数值增加到超过最大值，它将被转换为浮点值。如果整数用作字符串操作的一部分，它将被转换为字符串。\n\
    \n使用美元符号来指定变量，这使得变量和函数可以使用相同的名称，例如内置函数`date()`和变量`$date`。语句`$date = date('c');`将生成一个根据\
    \ ISO 8601 标准格式化的当前日期字符串。\n\nPHP 有一组预定义变量，这些变量根据 PHP 的版本、Web 服务器的类型、配置、HTTP 请求的类型等因素而可用。这些预定义变量的完整列表可以在在线\
    \ PHP 手册中找到：[`php.net/manual/en/reserved.variables.php`](http://php.net/manual/en/reserved.variables.php)。这些变量通常包含有关环境、传递给脚本的参数等信息。\n"
- fmt: '# Variables in PHP


    It is not necessary to perform any special declaration of variables before using
    them; simply define it by writing the dollar sign followed by the name when it''s
    needed. Variables can be used in an `assign` statement or it can be part of a
    statement or calculation. If no value has been assigned to the variable when it''s
    used in a statement the system might produce a notice. This depends on the configuration
    of `error_reporting` in `php.ini`. This does not happen when assigning a value
    to a new variable but if a value is used without getting a value assigned the
    notice will be issued and a default value will be used. This can be an empty string
    or an integer with the value 0 depending on the context the variable is used in.


    ## Recipe 10-1. Converting Variable Type


    ### Problem


    In a loosely typed language like PHP there is no way to define a variable to be
    of a specific type. The result of the calculation determines the actual type used.


    ### Solution


    Overwriting the variable with a new value or casting the values to a different
    type can help the programmer control the specific type a variable has.


    © Frank M. Kromann 2016


    F.M. Kromann, *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_10


    CHAPTER 10 ■ VARIABLES


    ### How it Works


    A variable does not have a strict type and the type of any variable can be changed
    at any time during execution simply by assigning it a value of a different type
    or by casting to a new type. In the following example the variable `$a` is assigned
    an integer value of 5 and then a string value. The reference to the integer value
    is lost when a new value is assigned and the memory used by the integer is released.
    The variable `$b` is also assigned an integer value of 5 and then it''s converted
    to a string and assigned back to itself.


    ```php

    <?php


    // 10_1.php


    $a = 5;


    $a = "Some string";


    $b = 5;


    $b = (string)$b;

    ```


    PHP will try to convert any variable value to best match the context the variable
    is used in. If the variable is a string and it''s used in a math operation it
    will be converted to a numeric value before the math operation is applied. This
    might lead to the value of 0 if the string can''t be converted to a numeric value.
    The conversion of the variable type is only temporary and it does not affect the
    variable itself. It is necessary to allow the comparison or calculation to become
    meaningful.


    In the following example two variables (integer and string) are compared. This
    will be done by converting the string `"10"` to the integer value 10 before the
    two are compared.


    ```php

    <?php


    // 10_2.php


    $a = 5;


    $b = "10";


    if ($b > $a) {


    echo ''$b is greater than $a'';


    }

    ```


    ## Recipe 10-2. Allocating Memory


    ### Problem


    When variables are defined and assigned values the system will handle all memory
    allocation needed based on the type and size of data. It will also allocate memory
    as needed when the variable changes size. The limit on available memory is handled
    by the configuration option `memory_limit` in `php.ini`. If the memory exceeds
    the maximum allowed size a fatal error will be thrown and the execution will stop.
    For performance reasons it''s recommended to keep this configuration to a low
    value but large enough to be able to handle the memory needed for any requests
    to the web site.


    Using many variables or storing large sets of data in arrays or strings might
    cause memory overflow. In these cases it is convenient to get rid of unused variables
    and release the memory used by them.


    ### Solution


    In most cases it''s not necessary to get rid of variables or free memory. All
    references to them are removed automatically when the script ends and all memory
    used will be released back to the system. With PHP''s primary usage being to generate
    responses to HTTP requests the script should not be running for more than a few
    seconds or even a few hundred milliseconds. If the script works on large datasets
    it can help on memory consumption to remove references to variables that are no
    longer needed for the execution of the script before assigning values to new variables.
    This will help the memory usage to stay under the configured limit.


    CHAPTER 10 ■ VARIABLES


    ### How it Works


    If the script is used to serve dynamic content to the web browser the script usually
    terminates fast and in most cases it''s not necessary to perform cleanup even
    for large datasets. In some cases the memory limit will not make it possible to
    keep large amounts of data in memory and it might be necessary to process the
    data in batches. If the script is executed from the command line or as a cron
    job it might run for a long time and process large amounts of data. In those cases
    it''s always good to be conservative and free up unused resources.


    Releasing memory is done by assigning a `null` value to the variable or by using
    the `unset()` function.


    ```php

    <?php


    // 10_3.php


    $a = array("abc", "def", "ghi");


    $a = null;


    $a = array("abc", "def", "ghi");


    unset($a);

    ```


    Both methods will get rid of the data and free the memory and if `isset()`, `empty()`,
    or `is_null()` is used to check the variable they will all give the same result
    and that would be `false`, `true`, and `true`. The next example shows the use
    of the three functions on a variable that''s assigned a `null` value or unset
    with the `unset()` function.


    ```php

    <?php


    // 10_4.php


    $a = 5;


    $a = null;


    var_dump(isset($a));


    var_dump(empty($a));


    var_dump(is_null($a));


    unset($a);


    var_dump(isset($a));


    var_dump(empty($a));


    var_dump(is_null($a));

    ```


    will produce the following output:


    ```

    bool(false)


    bool(true)


    bool(true)


    bool(false)


    bool(true)


    bool(true)

    ```


    The result is shown with line breaks as when the code is executed with the CLI
    version of PHP. Adding the header for Content-Type and setting it to `text/plain`
    will give the same result in a browser.


    CHAPTER 10 ■ VARIABLES


    ## Recipe 10-3. Determining Memory Use


    ### Problem


    Working on large sets of data or when debugging the use of system resources, it''s
    advantages to know how much memory the script is using.


    ### Solution


    PHP has a couple of built-in functions to check the actual memory use of the current
    script. These are called `memory_get_usage()` and `memory_get_peak_usage()`. The
    functions return the values in bytes used. To get kb, Mb, and Gb, etc., these
    results must be divided with a multiple of 1024 (2 to the power of 10). The first
    function returns the current memory usage and the second one returns the maximum
    usage during execution. Both functions will return the memory usage in bytes.


    ### How it Works


    The following example shows how an array grows from empty to holding 100 elements
    and how memory usage is increased and decreased when elements are added and removed.


    ```php

    <?php


    // 10_5.php


    $a = array();


    for ($i = 0; $i < 100; $i++) {


    $a[] = "This is a short string";


    echo "Memory usage for $i elements = " . memory_get_usage() . "\n";


    }


    while (($i = sizeof($a))) {


    echo "Memory usage for $i elements = " . memory_get_usage() . "\n"; unset($a[$i
    - 1]);


    }


    echo "Maximum memory usage = " . memory_get_peak_usage() . "\n";

    ```


    This script produces a fairly long amount of output. Below is a listing of the
    first few lines.


    ```

    Memory usage for 0 elements = 352736


    Memory usage for 1 elements = 352768


    Memory usage for 2 elements = 352768


    Memory usage for 3 elements = 352768


    Memory usage for 4 elements = 352768


    Memory usage for 5 elements = 352768


    Memory usage for 6 elements = 352768


    Memory usage for 7 elements = 352768


    Memory usage for 8 elements = 353088


    Memory usage for 9 elements = 353088


    Memory usage for 10 elements = 353088


    Memory usage for 11 elements = 353088


    Memory usage for 12 elements = 353088

    ```'
