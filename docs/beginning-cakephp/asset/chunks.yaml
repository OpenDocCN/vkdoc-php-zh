- fmt: "# `adodb-[drivername]`\n\n`ADOdb` interface wrapper\n\nPHP 4\n\n# `pear-[drivername]`\n\
    \n`PEAR::DB` wrapper\n\nPHP 4\n\nTo get an idea of how these DataSources work\
    \ with their respective systems, you can open the files themselves. The `cake/libs/model/datasources/dbo`\
    \ folder stores the DataSource files that Cake uses when you change the `driver`\
    \ parameter to one of those listed in Table 14-2.\n\nShould you set `driver` to\
    \ something other than what is stored in this directory, you would need to manually\
    \ provide the DataSource code for Cake to work. When building a custom DataSource,\
    \ which I’ll describe in this chapter, consulting these built-in DataSources can\
    \ sometimes be helpful. In them are great examples of how to preserve the model\
    \ layer; all the models behave the same regardless of the DataSource being used.\n\
    \n## Building a Custom DataSource\n\nWriting a custom DataSource requires a little\
    \ more than writing other resources in Cake. You may be used to the usual routine\
    \ of creating Cake files—first, create a new file with the appropriate file name\
    \ and in the appropriate location; second, type the correct class name in the\
    \ file; last, add to the file your customizations and methods. With DataSources,\
    \ however, a couple of additional tasks are required to get them working in your\
    \ application.\n\nYou’ll need to define the DataSource in the application’s database\
    \ configuration file: `app/config/database.php`. Then you’ll need to define the\
    \ DataSource in the model that calls it.\n\nTo walk you through writing a custom\
    \ DataSource, let’s build an XML DataSource for the blog application. This DataSource\
    \ will open an XML file that is formatted to include stories for the blog and\
    \ will prepare the file’s contents for inclusion in the database. In a more ambitious\
    \ (theoretical) project, this process could be amplified to include saving all\
    \ the blog’s information; you could bypass using a database altogether in favor\
    \ of writing everything as XML to a file. Here, though, the DataSource will remain\
    \ simpler and allow for simple updates. For instance, you may want to write your\
    \ blog posts in an external editor and not directly to the database through a\
    \ web browser. In your word processor you could export the posts as XML files\
    \ and then import them to the blog with the XML DataSource in this chapter. Whatever\
    \ the case, building the XML DataSource will at least demonstrate how to extend\
    \ the capabilities of the model and how to customize a DataSource in the first\
    \ place.\n\n### Creating the DataSource File\n\nDataSources are stored in the\
    \ `app/models/datasources` folder and are named in lowercase with `_source.php`\
    \ appended to the end. To give the DataSource a title with more than one word,\
    \ be sure to use the underscore character as a separator in the file name.\n\n\
    Create the XML DataSource file, and open it for editing: `app/models/datasources/xml_source.php`.\
    \ The DataSource must be set up as a class object extending the `DataSource` object.\
    \ Copy the contents of Listing 14-2 to the new `app/models/datasources/xml_source.php`\
    \ file.\n\n**Listing 14-2.** *The XML DataSource Class*\n\n```\n<?\nclass XmlSource\
    \ extends DataSource {\n    var $description = 'XML DataSource';\n}\n?>\n```\n\
    \nLine 3 of Listing 14-2 contains the `$description` variable. Use this variable\
    \ to provide a one-line description of the DataSource.\n\n### Starting with a\
    \ Minimum Skeleton\n\nDataSources differ from other resources in that they require\
    \ several functions to be present, even if those functions do not contain any\
    \ logic. Without this “skeleton” of basic functions, the model class will encounter\
    \ errors. After line 3 of the `xml_source.php` file, paste Listing 14-3, which\
    \ contains the necessary DataSource functions.\n\n**Listing 14-3.** *The Main\
    \ Skeleton for DataSource Files*\n\n```\nfunction __construct($config=null) {\n\
    \    parent::__construct($config);\n    $this->connected = $this->connect();\n\
    \    return $config;\n}\n```"
