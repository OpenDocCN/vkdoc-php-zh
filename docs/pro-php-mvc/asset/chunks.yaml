    Questions


    1\. Why should we have both methods of defining routes if our framework could
    just either infer all the routes, or we could define all the required routes?


    2\. Are there easier ways to define Route instances?


    Answers


    3\. The main reason is flexibility. There are many instances in which inferred
    routes are insufficient, and we do not want the hassle of defining all the simple
    routes ourselves.


    4\. We cannot use configuration files for this sort of thing, as we have not yet
    defined a configuration file standard that allows for the kinds of data structures
    we use to define routes. There are easier ways to define a large batch of routes,
    which you will see in Chapter 17.


    Exercises


    5\. Routes are very application-dependent. There might be times when you need
    to specify different kinds of routes than those we have demonstrated in this chapter.


    Try creating a Route subclass that lets you name routes and then redirect to other
    named routes.


    6\. Defining many routes at the same time can become quite a tangled mess of code.


    Try simplifying the creation of ten Router\Route\Simple instances.


