- fmt: "# Dates and Times\n\nAgain, the solution for this is to treat dates that shouldn’t\
    \ have a time part, like birthdays, as dates in the same time zone no matter where\
    \ the user is entering or displaying the dates from. Using the UTC time zone for\
    \ this is easy, but in fact it could be any time zone as long as it does not change\
    \ between input and output.\n\n## Chapter 5 ■ Dates and Times\n\nThe `DateTime`\
    \ classes can also be used in a more procedural style by the use of the aliased\
    \ function names: `date_create_immutable()` is an alias for `DateTimeImmutable::__construct()`.\
    \ I like the object-oriented approach better and I think the names are a bit cleaner.\
    \ To see the full list of `DateTime` functions, go to [http://php.net/manual/en/ref.datetime.php](http://php.net/manual/en/ref.datetime.php).\n\
    \n## Recipe 5-8: Storing Date and Time Values\n\n### Problem\nUsing integers or\
    \ UNIX timestamps to represent time and date values makes it easy to work with\
    \ and store. If I create the database schema, I tend to simply use an integer\
    \ or long integer column to store the exact values I use in my PHP scripts. That\
    \ way, I only need to convert to a string when showing dates and times to the\
    \ user and convert from strings when receiving input from the user.\n\nIf you\
    \ are working on a database where the schema includes native datetime or timestamp\
    \ columns, you might be able to select the value as an integer and use PHP for\
    \ formatting, or you might have to retrieve the textual value of the column and\
    \ perform the conversion in PHP.\n\n### Solution\nThe MySQL datetime column expects\
    \ the string to be formatted as a 4-digit year, 2-digit month and day, and 2 digits\
    \ for hour, minute, and seconds. The time format should be 24 hours. The equivalent\
    \ formatting string looks like this: `date(\"Y-m-d H:i:s\")`.\n\n### How It Works\n\
    If we create a simple table with a single datetime column:\n\n```sql\ncreate table\
    \ date_time (\n    ts datetime\n);\n```\n\nWe can then create a simple PHP script\
    \ that can populate the database with random dates between 1970 and now.\n\n```php\n\
    <?php\n// 5_21.php\n\n$now = time();\n$dates = [];\n\nfor ($i = 0; $i < 100; $i++)\
    \ {\n    $dates[] = mt_rand(0, $now);\n}\n\n$con = mysqli_connect(\"127.0.0.1\"\
    , \"root\", \"seecret\", \"book\");\nforeach ($dates as $d) {\n    $date = date(\"\
    Y-m-d H:i:s\", $d);\n    mysqli_query($con, \"insert into date_time (ts) values\
    \ ('{$date}');\");\n}\n\nmysqli_close($con);\n```\n\n### Chapter 5 ■ Dates and\
    \ Times\n\nIf we want to read the same values from the database and convert them\
    \ into UNIX timestamps using PHP, it would look something like this.\n\n```php\n\
    <?php\n// 5_22.php\n\n$now = time();\n$dates = [];\n\nfor ($i = 0; $i < 100; $i++)\
    \ {\n    $dates[] = mt_rand(0, $now);\n}\n\n$con = mysqli_connect(\"127.0.0.1\"\
    , \"root\", \"secret\", \"book\");\n$rs = mysqli_query($con, \"select * from date_time\"\
    );\n\nwhile ($row = mysqli_fetch_row($rs)) {\n    $dates[] = strtotime($row[0]);\n\
    }\n\nmysqli_free_result($rs);\nmysqli_close($con);\n\nprint_r($dates);\n```\n\n\
    ## Recipe 5-9: Calculating Elapsed Time\n\n### Problem\nAlthough PHP has many\
    \ ways of converting a timestamp to a string representation, it does not have\
    \ a way to show elapsed time.\n\n### Solution\nIn order to get the elapsed time\
    \ between two timestamps, you simply subtract them from each other. This will\
    \ give the number of seconds between the two timestamps. Using the `date` function,\
    \ it’s possible to create a nice representation of hours, minutes, and seconds\
    \ between the two timestamps. If the elapsed time were longer than 24 hours, we\
    \ would also need to account for days, weeks, months, and years. Using simple\
    \ math makes it possible to calculate these values. A day is 86400 seconds long,\
    \ and a week is 7 times that, but months are not all the same length and years\
    \ do vary a bit in length, too. So for those, we will have to settle for averages\
    \ of 30 days or 365 days when the calculations are made.\n\nInstead of trying\
    \ to convert the number of seconds to its equivalent months, days, hours, etc.,\
    \ it’s a bit easier to use the `DateTime()` class to create two objects from the\
    \ timestamps and then calculate the diff and use the `DateInterval::format()`\
    \ method to represent the elapsed time.\n\n### How It Works"
  raw: 'Again the solution for this is to treat dates that shouldn’t have a time part,
    like birthdays, as dates in the same time zone no matter where the user is entering
    or displaying the dates from. Using the UTC time zone for this is easy but in
    fact it could be any time zone as long as it does not change between input and
    output.


    CHAPTER 5 ■ DATES AND TIMES


    The DateTime classes can also be used in a more procedural style by the use of
    the aliased function names: date_create_immutable() is an alias for DateTimeImmutable::__construct()
    . I like the object-oriented approach better and I think the names are a bit cleaner.
    To see the full list of DateTime functions go


    [to http://php.net/manual/en/ref.datetime.php](http://php.net/manual/en/ref.datetime.php)
    .


    Recipe 5-8\. Storing Date and Time Values


    Problem


    Using integers or UNIX timestamps to represent time and date values makes it easy
    to work with and store . If I create the database schema I tend to simply use
    an integer or long integer column to store the exact values I use in my PHP scripts.
    That way I only need to convert to a string when showing dates and times to the
    user and convert from strings when receiving input from the user.


    If you are working on a database where the schema includes native datetime or
    timestamp columns you might be able to select the value as an integer and use
    PHP for formatting or you might have to retrieve the textual value of the column
    and perform the conversion in PHP.


    Solution


    The MySQL datetime column expects the string to be formatted as a 4-digit year,
    2-digit month and day, and 2 digits for hour, minute, and seconds. The time format
    should be 24 hours. The equivalent formatting string looks like this: date("Y-m-d
    H:i:s") .


    How it Works


    If we create a simple table with a single datetime column:


    create table date_time (


    ts datetime;


    );


    We can then create a simple PHP script that can populate the database with random
    dates between 1970 and now.


    <?php


    // 5_21.php


    $now = time();


    $dates = [];


    for ($i = 0; $i<100; $i++) {


    $dates[] = mt_rand(0, $now);


    }


    $con = mysqli_connect("127.0.0.1", "root", "seecret", "book"); foreach($dates
    as $d) {


    $date = date("Y-m-d H:i:s", $d);


    mysqli_query($con, "insert into date_time (ts) values (''{$date}'');");


    }


    mysqli_close($con);


    CHAPTER 5 ■ DATES AND TIMES


    If we want to read the same values from the database and convert them into UNIX
    timestamps using PHP it would look something like this.


    <?php


    // 5_22.php


    $now = time();


    $dates = [];


    for ($i = 0; $i<100; $i++) {


    $dates[] = mt_rand(0, $now);


    }


    $con = mysqli_connect("127.0.0.1", "root", "secret", "book"); $rs = mysqli_query($con,
    "select * from date_time");


    while ($row = mysqli_fetch_row($rs)) {


    $dates[] = strtotime($row[0]);


    }


    mysqli_free_result($rs);


    mysqli_close($con);


    print_r($dates);


    Recipe 5-9\. Calculating Elapsed Time


    Problem


    Although PHP has many ways of converting a timestamp to a string representation
    it does not have a way to show elapsed time.


    Solution


    In order to get the elapsed time between two timestamps you simply subtract them
    from each other. This will give the number of seconds between the two timestamps.
    Using the date function it’s possible to create a nice representation of hours,
    minutes, and seconds between the two timestamps. If the elapsed time were longer
    than 24 hours we would also need to account for days, weeks, months, and years.
    Using simple math makes it possible to calculate these values. A day is 86400
    seconds long and a week is 7 times that but months are not all the same length
    and years do vary a bit in length, too, so for those we will have to settle for
    averages of 30 days or 365 days when the calculations are made.


    Instead of trying to convert the number of seconds to its equivalent months, days,
    hours, etc., it’s a bit easier to use the DateTime() class to create two objects
    from the timestamps and then calculate the diff and use the DateInterval::format()
    method to represent the elapsed time.


    How it Works'
  trans: "\n# 日期与时间\n\n同样，解决方法是像对待生日这类不应包含时间部分的日期一样，无论用户从何处输入或显示这些日期，都将其视为同一时区的日期。为此使用\
    \ UTC 时区虽然简单，但实际上只要保证输入和输出时该时区不发生变化，任何时区都可以。\n\n## 第 5 章 ■ 日期与时间\n\n`DateTime`\
    \ 类也可以通过使用别名函数以更过程化的风格来操作：`date_create_immutable()` 是 `DateTimeImmutable::__construct()`\
    \ 的别名。我更喜欢面向对象的方式，并且觉得这些命名更清晰。要查看 `DateTime` 函数的完整列表，请访问 [`php.net/manual/en/ref.datetime.php`](http://php.net/manual/en/ref.datetime.php)。\n\
    \n## 技巧 5-8：存储日期与时间值\n\n### 问题\n使用整数或 UNIX 时间戳来表示时间和日期值，便于操作和存储。如果我创建数据库模式，我倾向于直接使用整数或长整型列来存储我在\
    \ PHP 脚本中使用的确切值。这样，我只需要在向用户显示日期和时间时将其转换为字符串，并在接收用户输入时从字符串进行转换。\n\n如果你使用的数据库模式包含原生的\
    \ datetime 或 timestamp 列，你可能能够将值作为整数选取并用 PHP 进行格式化，也可能需要检索该列的文本值并在 PHP 中执行转换。\n\
    \n### 解决方案\nMySQL 的 datetime 列期望字符串格式为：4 位年份、2 位月份和日期，以及 2 位小时、分钟和秒。时间格式应为 24\
    \ 小时制。对应的格式化字符串如下：`date(\"Y-m-d H:i:s\")`。\n\n### 工作原理\n如果我们创建一个包含单个 datetime\
    \ 列的简单表：\n\n```sql\ncreate table date_time (\n    ts datetime\n);\n```\n\n然后我们可以创建一个简单的\
    \ PHP 脚本，用 1970 年至今之间的随机日期填充数据库。\n\n```php\n<?php\n// 5_21.php\n\n$now = time();\n\
    $dates = [];\n\nfor ($i = 0; $i < 100; $i++) {\n    $dates[] = mt_rand(0, $now);\n\
    }\n\n$con = mysqli_connect(\"127.0.0.1\", \"root\", \"seecret\", \"book\");\n\
    foreach ($dates as $d) {\n    $date = date(\"Y-m-d H:i:s\", $d);\n    mysqli_query($con,\
    \ \"insert into date_time (ts) values ('{$date}');\");\n}\n\nmysqli_close($con);\n\
    ```\n\n### 第 5 章 ■ 日期与时间\n\n如果我们想从数据库中读取相同的值并使用 PHP 将其转换为 UNIX 时间戳，代码会类似这样。\n\n\
    ```php\n<?php\n// 5_22.php\n\n$now = time();\n$dates = [];\n\nfor ($i = 0; $i\
    \ < 100; $i++) {\n    $dates[] = mt_rand(0, $now);\n}\n\n$con = mysqli_connect(\"\
    127.0.0.1\", \"root\", \"secret\", \"book\");\n$rs = mysqli_query($con, \"select\
    \ * from date_time\");\n\nwhile ($row = mysqli_fetch_row($rs)) {\n    $dates[]\
    \ = strtotime($row[0]);\n}\n\nmysqli_free_result($rs);\nmysqli_close($con);\n\n\
    print_r($dates);\n```\n\n## 技巧 5-9：计算流逝时间\n\n### 问题\n虽然 PHP 有很多将时间戳转换为字符串表示的方法，但它没有直接显示流逝时间的功能。\n\
    \n### 解决方案\n要获取两个时间戳之间的流逝时间，只需将它们相减即可。这将得到两个时间戳之间的秒数。使用 `date` 函数，可以用小时、分钟和秒的形式很好地表示两个时间戳之间的间隔。如果流逝时间超过\
    \ 24 小时，我们还需要考虑天、周、月和年。通过简单的数学计算可以得出这些值。一天有 86400 秒，一周是它的 7 倍，但月份长度并不相同，年份长度也会稍有变化。因此，在计算时，我们只能取平均值，即每月\
    \ 30 天或每年 365 天。\n\n与其尝试将秒数转换为等效的月、天、小时等，不如使用 `DateTime()` 类来创建两个时间戳对象，然后计算差值，并使用\
    \ `DateInterval::format()` 方法来表示流逝时间。\n\n### 工作原理\n"
- fmt: '在本示例中，我们使用`strtotime()`函数生成两个事件的时间戳。


    ```php

    <?php


    // 5_23.php


    $ts1 = strtotime("2000-06-15 20:30:00");


    $ts2 = strtotime("2005-03-18 14:15:30");


    ```


    第5章 ■ 日期和时间


    ```php

    $d1 = new DateTime();


    $d1->setTimestamp($ts1);


    echo $d1->format("Y-m-d H:i:s") . "\n";


    $d2 = new DateTime();


    $d2->setTimestamp($ts2);


    echo $d2->format("Y-m-d H:i:s") . "\n";


    $diff = $d1->diff($d2);


    echo $diff->format("Years: %y, Months: %m, days: %d %H:%I:%S") . "\n";

    ```


    脚本输出是一个字符串，其格式符合格式字符串的规则，其中所有以`%`开头的格式字符都会被替换为时间差中的对应值。


    ```

    Years: 4, Months: 9, days: 2 17:45:30

    ```


    `strtotime()`函数也可用于计算相对日期/时间偏移。该函数支持GNU日期语法（[http://php.net/manual/en/datetime.formats.php](http://php.net/manual/en/datetime.formats.php)）。这是一个非常复杂的系统，允许我们从当前时间或固定时间戳向前或向后移动若干天、周、月。


    以下示例展示了它的几种用法：


    ```php

    <?php


    // 5_24.php


    date_default_timezone_set("America/Los_Angeles");


    // 计算当前时间起3周后的时间戳


    $ts = strtotime("+3 weeks");


    echo date("Y/m/d h:i:s a", $ts) . "\n";


    // 计算当前时间起5天前的时间戳


    $ts = strtotime("-5 days");


    echo date("Y/m/d h:i:s a", $ts) . "\n";


    // 计算给定日期后3个月零11点30分的时间戳


    $ref = mktime(0, 0, 0, 12, 15, 2012);


    $ts = strtotime("11:30 + 3 month", $ref);


    echo date("Y/m/d h:i:s a", $ts) . "\n";

    ```


    此示例使用了`America/Los_Angeles`时区，输出结果如下：


    ```

    2016/04/27 12:25:41 pm


    2016/04/01 12:25:41 pm


    2013/03/15 11:30:00 am

    ```


    ## 第6章 字符串


    字符串是PHP中基本的变量类型之一。它们通常用于构建PHP脚本的输出，作为对HTTP请求的响应。


    字符串是一系列字符，每个字符被定义为单个字节，序数值范围为0到255。单字节的限制使得字符串无法原生支持Unicode。


    `mb_string`扩展使得在PHP中处理Unicode（多字节字符串）成为可能，但这些字符串不能使用原生变量类型和原生字符串操作函数来处理。


    在32位系统上，PHP字符串最长可达2GB。这要求PHP配置足够的内存来处理这种大小的变量。从PHP 7开始，所有整数都提供真正的64位支持，使得字符串（以及文件）的大小可以远超过之前的2GB限制。


    字符串以内存块和长度形式存储，这保证了二进制安全。二进制安全的字符串可以包含一个或多个空字节，而不会导致字符串部分内容丢失。


    ### 6-1. 创建字符串


    #### 问题


    字符串可以通过多种方式创建：使用单引号或双引号定义的值进行赋值，或者使用众多返回字符串的函数的返回值。


    #### 解决方案


    `str_repeat()`和`str_pad()`是两种可用于生成字符串的函数。前者通过重复一个或多个字符的模式多次生成字符串。后者则将一个特定字符串作为填充添加到另一个字符串的前面或后面，以创建特定长度的字符串。


    对于给定的字符串，可以改变字符顺序，使用相同的字符生成一个随机顺序的新字符串。`str_shuffle()`函数的作用类似于`array_shuffle()`；它会获取所有元素并将其随机排列。


    #### 实现原理


    在第一个示例中，我们包含时间的字符串。由于两个时间的位数不同，两个字符串的总长度也不同。为了使两个字符串打印时数字对齐，我们需要用空格或零填充这两个字符串。


