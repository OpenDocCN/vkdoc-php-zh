    \ 表访问权限的类。我们将继续使用这个类来保持对该表的单一访问点。\n\n```\n$href  = \"index.php?page=blog&id=$entry->entry_id\"\
    ;\n```\n\n记住，`entry_id` 是通过我们之前创建的 `fetchObject()` 方法，通过 URL 调用传递给索引页（博客控制器）的。我们可以访问这个值来检索数据库中请求的记录。因此，我们可以声明一个方法，该方法将\
    \ `entry_id` 作为参数（当前存储在 `id` 属性中），并返回一个包含相应博客条目所有内容的 `StdClass` 对象。\n\n```\npublic\
    \ function getEntry( $id ) {\n$sql = \"SELECT entry_id, title, entry_text, date_created\n\
    FROM blog_entry\nWHERE entry_id = ?\";\n$statement = $this->db->prepare( $sql\
    \ );\n$data = array( $id );\ntry{\n$statement->execute( $data );\n} catch (Exception\
    \ $e) {\n$exceptionMessage = \"You tried to run this sql: $sql \nException: $e\"\
    ;\ntrigger_error($exceptionMessage );\n}\n$model = $statement->fetchObject();\n\
    return $model;\n}\n清单 7-18\nNewest_Blog_Entry_Table.class.php 的部分代码\n```\n\n我们可以将此方法放在类中\
    \ `getAllEntries()` 方法的上方。现在我们有了两个访问条目的方法：一个提取所有条目，一个提取特定条目。这个新方法与 `getAllEntries()`\
    \ 方法非常相似。\n\n```\n$sql = \"SELECT entry_id, title, entry_text, date_created\n\
    FROM blog_entry\nWHERE entry_id = ?\";\n```\n\nSQL 字符串与 `getAllEntries()` 中创建的几乎相同，只是\
    \ `WHERE` 子句会将选择限制为仅一条具有正确 `entry_id` 的记录。\n\n```\n$statement = $this->db->prepare(\
    \ $sql );\n```\n\n`prepare()` 方法将 SQL 字符串转换为 `PDOStatement` 对象。\n\n```\n$data\
    \ = array( $id );\n```\n\n声明一个数组来保存 `$id` 中的值，该值将被填充为 `entry_id`。\n\n```\n$statement->execute(\
    \ $data );\n```\n\n`execute()` 方法将用 `$id` 中的值替换占位符（`?`），并尝试检索请求的记录。\n\n```\n$model\
    \ = $statement->fetchObject();\n```\n\n`fetchObject()` 方法将尝试从返回的表中检索第一行数据。`return`\
    \ 方法将把创建的 `StdClass` 对象传递给博客控制器。由于我们只从数据库表中检索一条记录，因此无需包含循环。\n\n### 安全编程\n\n为什么我们使用预处理语句？`$id`\
    \ 来自 URL 变量，因此可以被篡改；应将其视为不安全。恶意黑客可能会尝试更改变量中的值并进行 SQL 注入攻击。预处理语句可以阻止任何此类尝试。\n\n\
    现在，我们准备为用户选择的特定条目创建视图。\n\n## 创建博客视图\n\n同样，我们为单个条目创建的代码将与为查看所有条目创建的代码类似。\n\n```\n\
    详细博客\";\n//$entry 中可用的属性：entry_id, title, entry_text, date_created\n$info .= \"\
    \n$entryData->title\n$entryData->date_created\n$entryData->entry_text\n\";\n?>\n\
    清单 7-19\nentry-html.php\n```\n\n```\n$info .= \"\n$entryData->title\n$entryData->date_created\n\
    $entryData->entry_text\n\";\n```\n\n`$info` 通过检索单个条目的标题、创建日期和条目文本来填充。这个过程类似于检索所有博客条目的方法，只是我们不需要循环。本质很熟悉：将存储在\
    \ `StdClass` 对象中的一些数据与预定义的 HTML 结构合并。视图需要一个存储在名为 `$entryData` 的变量中的 `StdClass`\
    \ 对象。因此，前几行代码会检查 `$entryData` 的可用性。如果未找到，代码将触发自定义错误。请记住，在生产环境中，如果出现问题，我们将显示一条更友好、面向用户的消息。不过，在开发过程中，这为我们提供了纠正问题所需的信息。\n\
    \n## 显示条目\n\n我们已经有了模型；我们也有了视图。最后一步是更新博客控制器。它负责从模型中提取条目数据，将其与条目视图共享，并将生成的 HTML\
    \ 字符串返回给 `index` 控制器，在那里进行显示。\n\n```\ngetEntry( $entryId );\ninclude_once \"views/entry-html.php\"\
    ;\n//代码更改结束\n} else {\n$entries = $entryTable->getAllEntries();\ninclude_once\
    \ \"views/new-list-entries-html.php\";\n}\n?>\n清单 7-20\nnewblog.php\n```\n\n```\n\
    $isEntryClicked = isset( $_GET['id'] );\n```\n\n如果用户点击了*更多详情*链接，`id` 将填充在用于调用索引页的\
    \ URL 中。`isset()` 将向 `$isEntryClicked` 返回一个真值。\n\n```\nif ($isEntryClicked ) {\n\
    $entryId = $_GET['id'];\n//新代码从这里开始\n$entryData = $entryTable->getEntry( $entryId\
    \ );\ninclude_once \"views/entry-html.php\";\n```\n\n如果点击了，则使用 `$_GET` 从 URL 中获取\
    \ `id`。然后将此值传递给 `getEntry()` 方法。然后包含条目视图以显示检索到的单个条目。如果链接未被点击，则执行 if 语句的 else 部分，显示所有条目。\n\
    \n> **注意**\n> `list-entries-html.php` 已更新，现在调用 `newindex.php` 而不是 `index.php`。它现在被命名为\
    \ `new-list-entries-html.php`。`index.php` 现在也已更新，包含 `newblog.php` 而不是 `blog.php`。它现在被命名为\
    \ `newindex.php`。\n\n我们现在可以通过在浏览器中加载 `newindex.php` 并点击*阅读更多*链接来测试程序。\n\n![](img/323857_3_En_7_Fig5_HTML.jpg)\n\
    \n此详细博客反映了新博客创建时，它包含了与主机创建博客相关的所有信息。\n\n**图 7-5** 在 `newindex.php` 中点击*阅读更多*链接的结果"
- fmt: "Again, we could use some CSS, but we do now have a functional blog which allows\
    \ users to select more information. It includes both administrative abilities\
    \ (adding new blog entries) and normal user abilities. Now would be an enjoyable\
    \ time to celebrate our progress! We have come a long way since the first chapter.\
    \ But…\n\n**Exercise**: Update the project, by adding code similar to previously\
    \ seen in this chapter, to use the same CSS style sheet to professionally design\
    \ the display of all the entries and the detailed display of an individual entry.\
    \ Add CSS to the style sheet which will display all current views in a similar\
    \ professional user-friendly design.\n\n### Code Smell: Duplicate Code\n\nCan\
    \ you smell it? There is a bad smell coming from our code. It is one of those\
    \ classic code smells every coder knows about. It is one of those things you should\
    \ learn to avoid, as your proficiency with code grows.\n\n> **Note**  \n> Find\
    \ a long list of typical code smells at [`http://en.wikipedia.org/wiki/Code_smell`](http://en.wikipedia.org/wiki/Code_smell).\n\
    \nDuplicate code is *when identical or similar code exists in multiple places*.\
    \ Do you already know where to find the smell? It is in `models/Newest_Blog_Entry_Table.class.php`.\
    \ Here is an example:\n\n```\n//partial code for models/Blog_Entry_Table.class.php\n\
    public function getEntry( $id ) {\n$sql = \"SELECT entry_id, title, entry_text,\
    \ date_created\nFROM blog_entry\nWHERE entry_id = ?\";\n$statement = $this->db->prepare(\
    \ $sql );\n$data = array( $id );\ntry{\n$statement->execute( $data );\n} catch\
    \ (Exception $e) {\n$exceptionMessage = \"You tried to run this sql: $sql \nException:\
    \ $e\";\ntrigger_error($exceptionMessage );\n}\n$model = $statement->fetchObject();\n\
    return $model;\n}\n```\n\nThere are a couple of other similar methods in the `Newest_Blog_Entry_Table`\
    \ class. They all `prepare()` a `PDOStatement` and `try()` to `execute()` it.\
    \ In all three methods, we can find many lines of code that are nearly identical.\
    \ That is bad!\n\n### Staying DRY with Curly\n\nDuplicate code is bad for a number\
    \ of reasons. One is that it is not efficient; we are simply using more lines\
    \ than necessary. The code is unnecessarily long. Longer code can invariably cause\
    \ more potential errors. Less code means fewer chances for errors. Another reason\
    \ duplicate code is bad is that it complicates the maintenance of the program\
    \ over time. It is highly likely, over time, that the code will need to be updated.\
    \ If the code is identical or remarkably similar code in multiple different methods,\
    \ changes might need to occur in all of those methods. We always should create\
    \ code that is as easy as possible to maintain.\n\nWe can place the duplicate\
    \ code in a separate method, so any change to the code can be made in one place.\
    \ Each method can then call the new method. This decreases maintenance time and\
    \ increases reliability.\n\nIt is really just another case of coding by Curly’s\
    \ law or at least a variant of Curly’s law. Curly’s original law was: *Do one\
    \ thing*. This particular variant should be: *Do one thing once*. There is another\
    \ geek expression for it: staying DRY. *DRY* is an acronym that means “don’t repeat\
    \ yourself.”\n\n### Refactoring with Curly\n\n*Refactoring* is the process of\
    \ changing code without changing what it does. It is a big deal for coders. We\
    \ should refactor our code whenever we realize the project requirements have outgrown\
    \ the code architecture, or, in other words, when the code architecture does not\
    \ support the features your project needs in a beautiful way. Simply, when we\
    \ discover duplicate logic in multiple places, it needs to be fixed.\n\nIt is\
    \ time to refactor the `Newest_Blog_Entry_Table` class, so it becomes DRIER. Let\
    \ us begin by encapsulating the code that prepares an SQL statement into a separate\
    \ method.\n\n```\n//$sql argument must be an SQL string\n//$data must be an array\
    \ of dynamic data to use in the SQL\nprivate function executeSQL ( $sql, $data)\
    \ {\n//create a PDOStatement object\n$statement = $this->db->prepare( $sql );\n\
    try{\n//use the dynamic data and run the query\n$statement->execute( $data );\n\
    } catch (Exception $e) {\n$exceptionMessage = \"You tried to run this sql: $sql\
    \ \nException: $e\";\ntrigger_error($exceptionMessage);\n}\n//return the PDOStatement\
    \ object\nreturn $statement;\n}\npublic function executeSQL ( $sql, $data) {\n\
    ```\n\nThis new method accepts the prepared statement in `$sql` and the array\
    \ of data to be placed into the prepared statement when called from another program\
    \ or method. It then uses this information in the same manner that we discovered\
    \ in the other methods contained within the Blog Entry class.\n\nWith the new\
    \ method declared, we can refactor one of the existing methods to use the new\
    \ method.\n\n```\npublic function getEntry( $id ){\n$sql = \"SELECT entry_id,\
    \ title, entry_text, date_created\nFROM blog_entry\nWHERE entry_id = ?\";\n$data\
    \ = array($id);\n//call the new DRY method\n$statement = $this->executeSQL($sql,\
    \ $data);\n$model = $statement->fetchObject();\nreturn $model;\n}\nListing 7-21\n\
    getEntry Method of Updated_Blog_Entry_Table.class.php\n```\n\nThe new `executeSQL()`\
    \ method makes the `getEntry()` method a little shorter. The code is also easier\
    \ to follow as it only creates the prepared statement, and the array, then it\
    \ calls the `executeSQL` method. It then fetches the results and returns them.\n\
    \nThere is a little syntactical detail to notice. See how we used the `$this`\
    \ keyword when one method calls another method declared in the same class? It\
    \ is not really different from using `$this` to get to a property. In both cases,\
    \ `$this` is an object’s reference to itself. It is the object-oriented way of\
    \ saying “my.”\n\nLet us refactor the `saveEntry()` method.\n\n```\npublic function\
    \ saveEntry ( $title, $entry ) {\n$entrySQL = \"INSERT INTO blog_entry ( title,\
    \ entry_text )\nVALUES ( ?, ?)\";\n$formData = array($title, $entry);\n//changes\
    \ start here\n//$this is the object's way of saying 'my'\n//so $this->makeStatement\
    \ calls makeStatement of Blog_Entry_Table\n$entryStatement = $this->executeSQL(\
    \ $entrySQL, $formData );\n//end of changes\n}\nListing 7-22\nsaveEntry of Updated_Blog_Entry_Table.class.php\n\
    ```\n\nFinally, let us refactor the `getAllEntries()` method.\n\n```\npublic function\
    \ getAllEntries () {\n$sql = \"SELECT entry_id, title, SUBSTRING(entry_text, 1,\
    \ 150) AS intro  FROM blog_entry\";\n$statement = $this->executeSQL($sql);\nreturn\
    \ $statement;\n}\nListing 7-23\ngetAllEntries of Updated_Blog_Entry_Table.class.php\n\
    ```\n\nWe have a slight problem here. We only need the SQL string and not the\
    \ array to retrieve all the records because we are not using a prepared statement.\
    \ However, when we call the `executeSQL()`, it requires two arguments. We only\
    \ want to pass one.\n\nSometimes, we want to call `executeSQL()` with one argument,\
    \ and sometimes we want to call it with two arguments. The second argument needs\
    \ to be optional. Luckily, PHP has a very easy way to make an argument optional.\
    \ We simply declare the argument with a default value, which will be used if nothing\
    \ is passed. Let us update the `executeSQL` method to allow this.\n\n```\nprivate\
    \ function executeSQL ( $sql, $data = NULL ){\n//end of code changes\n$statement\
    \ = $this->db->prepare( $sql );\ntry{\n$statement->execute( $data );\n} catch\
    \ (Exception $e){\n$exceptionMessage = \"You tried to run this sql: $sql \nException:\
    \ $e\";\ntrigger_error($exceptionMessage );\n}\nreturn $statement;\n}\nListing\
    \ 7-24\nexecuteSQL of Updated_Blog_Entry_Table.class.php\n```\n\nIn the preceding\
    \ code, the argument `$data` gets a default value of `NULL`. So, if `executeSQL()`\
    \ is called without a second argument, the created `PDOStatement` object will\
    \ execute with `NULL`. No dynamic values will replace placeholders in the prepared\
    \ statement. And that is exactly what we want, because there are no placeholders\
    \ in the SQL for this statement."
