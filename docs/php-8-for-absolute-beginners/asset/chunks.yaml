  trans: '

    # 理解主键（PRIMARY KEY）


    `poll_id` 属性右侧有一个可见的键图标。此外，它还在屏幕底部以 `PRIMARY` 键名列出。这表明 `poll_id` 现在是 `poll` 实体的主键。当一个属性被声明为主键时，它必须包含唯一的值。因此，无论
    `poll` 表最终包含多少行数据，都不能存在两个相同的 `poll_id` 值。


    假设我们有一行数据的 `poll_id` 为 1。如果我们再尝试插入另一行 `poll_id` 也为 1 的数据，新行将显示一条错误信息。主键用于明确标识一行数据。举个例子，想想有多少个叫“约翰·史密斯”的人。我们不能将姓名作为唯一标识符。然而，我们可以给每个约翰·史密斯分配一个唯一的
    ID，以确定我们要查找的是哪一个。


    实际上，我们可以在 MySQL/MariaDB 中创建没有主键的表，但这样的表属于特殊情况。大多数时候，你会希望创建带有主键的表，因为如果你无法唯一标识每个条目，数据就不是真正有用的。


    我们现在知道 `poll` 表的创建方式要求主键 `poll_id` 必须有一个唯一的值。`poll_id` 属性被声明为 `NOT NULL`，这意味着
    `poll_id` 不接受空值（null 基本上等同于没有输入任何内容）。`poll_id` 属性必须始终包含一个整数值。`poll_id` 属性不能留空。


    # 理解自增（AUTO_INCREMENT）


    那么 `poll_id` 的自增设置是怎么回事呢？它是一个简单但强大的工具：`poll` 表中的第一行数据将获得一个 `poll_id` 值为 1。下一行将自动获得
    `poll_id` 值为 2。再下一行将获得 `poll_id` 值为 3，以此类推。`poll_id` 的值会自动递增！这是一种确保每一行都能被唯一值标识的好方法。


    # INSERT 语句


    表创建好了，我们就可以开始存储数据了。`poll` 表中的每一个新条目都将作为单独的一行存储。为简单起见，我们可以先插入一行数据。


    ```

    INSERT INTO poll (

    poll_question

    ) VALUES (

    "Is PHP hard fun?"

    )

    ```


    这条 SQL 语句会向名为 `poll` 的表中插入一行新数据。它将为 `poll_question` 列（或属性）声明一个值。更具体地说，`poll_question`
    列将获得值 *Is PHP hard fun?* 还记得 `poll` 表总共有四个属性或列吗？剩下的列 `poll_id`、`yes` 和 `no` 将被创建并赋予默认值。`poll_id`
    将获得值 1，而 `yes` 和 `no` 都将获得值 0。


    我们可以按照创建表时的相同方式来执行这条 SQL 语句。首先，在 phpMyAdmin 控制面板中选择 `playground` 数据库。然后，点击 SQL
    选项卡并输入上述 SQL 语句。最后，点击“执行”（Go）来运行输入的 SQL 语句。系统随后会指示已插入一行。


    或者，我们可以从控制面板中选择该数据库。然后点击菜单中的“插入”（insert）。系统会提供文本字段供我们输入数据。然后，我们可以在 `poll_question`
    文本框中输入“Is PHP hard fun?”。接着，点击屏幕底部的“执行”（Go）按钮。这将生成一条类似于之前给出的 SQL 语句。系统还会包含之前未显示的默认值。要执行生成的语句，请点击屏幕底部的“执行”（Go）按钮。


    如果要为多个列（属性）插入值，INSERT 语句的语法会略有不同。


    ```

    INSERT INTO `poll` (`poll_id`, `poll_question`, `yes`, `no`) VALUES (NULL, ''"Is
    PHP hard fun?" '', ''0'', ''0'');

    ```


    如图所示，我们可以在第一组括号中指定属性（例如 `yes`），然后在第二组括号中指定其对应的值（`0`）。位置必须一一对应。`yes` 处于第三位，其值也处于第三位。对于列出的每个属性，都必须有一个关联的值。请记住，未列出的任何属性，如果在表中定义了默认值，都将被赋予默认值。请注意，在这个例子中，`poll_id`
    被设置为 `NULL`。这个设置对于任何自增属性都是必需的。`NULL` 设置（记住，我们设置了不允许 `NULL` 的限制）将被拒绝，从而促使系统通过递增上一个数字来生成一个新的数字。还有其他格式可用于插入数据。不过，我们将使用这种格式，因为我们可以清楚地看到哪个值与哪个属性相关联。


    # SELECT 语句


    一旦我们向 `poll` 表中插入了一行数据，能够看到新行显示出来就太好了。要从数据库表中检索数据，我们将使用 SQL 的 `SELECT` 语句。


    ```

    SELECT column_name, column_name FROM table_name

    ```


    `SELECT` 关键字用于检索数据。`FROM` 关键字指定要从中检索信息的数据库表。`SELECT` 语句返回一个包含所有检索数据的临时表。这个临时表将具有紧随
    `SELECT` 关键字之后指定的确切属性。


    ```

    SELECT poll_id, poll_question, yes, no FROM poll

    ```


    然后我们可以像之前提到的那样，将此语句粘贴到 SQL 文本框中，以产生所需的结果。


    ![](img/323857_3_En_6_Fig7_HTML.jpg)


    一张 phpMyAdmin 应用程序的图片，显示了 `poll` 表的 SQL 查询结果。


    **图 6-7** 插入了一行数据的 poll 表


    表中有一行数据。它的 `poll_id` 为 1，并有一个 `poll_question`。`yes` 和 `no` 列分别为 1 和 0。


    # 安全编程


    或者，我们可以使用 `*` 符号来请求显示所有字段。


    ```

    SELECT * FROM poll

    ```


    虽然这种格式创建起来肯定快捷简单，但它可能导致潜在的安全漏洞。请记住，将创建一个包含 `SELECT` 语句返回的所有属性的临时表。这个表可能会被黑客访问到。只暴露那些完成当前任务所必需的列。我们可以使用
    `*` 符号来快速测试数据是否已存储。但我们不应该在最终产品中使用它。


    目前来看，数据似乎并不多，但这就是在网站上显示一个站点投票所需的所有数据了。网站将显示投票问题。网站访问者可以通过 HTML 表单提交他们的回答。可能的选项是
    *yes*（是）或 *no*（否）。网站访问者的所有回答随后将存储在 `yes` 或 `no` 字段中。因此，只需一点点数学计算，我们就能计算出相对的回答数量，并显示类似以下的信息：*79%
    的网站访问者认为 PHP 既难又有趣*。


    **练习**：使用 phpMyAdmin，执行代码来完成以下操作。你可以在不编写代码的情况下完成此任务，但本练习旨在帮助你练习 SQL 编码技能。首先，创建一个名为
    Students 的数据库。在该数据库中，创建一个 student 表。在表中，创建以下属性（字段）：StudentID、Name、Address、City、State、Zip
    code 和 Major。填充至少三行信息。然后使用 `SELECT` 语句显示这些信息。


    # UPDATE 语句


    你可能已经猜到，`poll` 表中的 `yes` 或 `no` 值每次在网站访问者提交回答时都会发生变化。我们需要另一条 SQL 语句来进行这些更改。假设一个网站用户刚刚同意
    PHP 很难学。我们需要生成一条 SQL 语句来将 `yes` 属性的存储值增加 1。

