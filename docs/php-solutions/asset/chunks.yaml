- fmt: "### Connecting with PDO\n\n`PDO` requires a slightly different approach. The\
    \ most important difference is that `PDO` throws an exception if the connection\
    \ fails. If you don’t catch the exception, the debugging information displays\
    \ all the connection details, including your username and password. Consequently,\
    \ you need to wrap the code in a `try` block and catch the exception to prevent\
    \ sensitive information from being displayed.\n\nThe first argument to the `PDO`\
    \ constructor method is a data source name (DSN). This is a string that consists\
    \ of the PDO driver name followed by a colon, followed by PDO driver-specific\
    \ connection details.\n\nTo connect to MySQL or MariaDB, the DSN needs to be in\
    \ the following format:\n\n`'mysql:host=hostname;dbname=databaseName'`\n\nIf your\
    \ database server is using a nonstandard port, the DSN should also contain the\
    \ port number, like this:\n\n`'mysql:host=hostname;port=portNumber;dbname=databaseName'`\n\
    \nAfter the DSN, you pass the username and password to the `PDO()` constructor\
    \ method. So the code to connect to the `phpsols` database looks like this:\n\n\
    ```php\ntry {\n    $conn = new PDO(\"mysql:host=$hostname;dbname=phpsols\", $username,\
    \ $password);\n} catch (PDOException $e) {\n    echo $e->getMessage();\n}\n```\n\
    \nUsing `echo` to display the message generated by the exception is acceptable\
    \ during testing, but when you deploy the script on a live website, you need to\
    \ redirect the user to an error page, as described in PHP Solution 4-8.\n\n**Tip**\n\
    \nThe DSN is the only part of the PHP code that you need to change in order to\
    \ connect to a different database system. All the remaining PDO code is completely\
    \ database-neutral. Details of how to create the DSN for PostgreSQL, Microsoft\
    \ SQL Server, SQLite, and other database systems can be found at [`http://php.net/manual/en/pdo.drivers.php`](http://php.net/manual/en/pdo.drivers.php).\n\
    \n### PHP Solution 11-1: Making a reusable database connector\n\nConnecting to\
    \ a database is a routine chore that needs to be performed in every page from\
    \ now on. This PHP solution creates a simple function stored in an external file\
    \ that connects to the database. It’s designed mainly for testing the different\
    \ MySQLi and PDO scripts in the remaining chapters without the need to retype\
    \ the connection details each time or to switch between different connection files.\n\
    \nCreate a file called `connection.php` in the `includes` folder and insert the\
    \ following code (there’s a copy of the completed script in the `ch11` folder):\n\
    \n```php\n<?php\nfunction dbConnect($usertype, $connectionType = 'mysqli') {\n\
    \    $host = 'localhost';\n    $db = 'phpsols';\n    if ($usertype == 'read')\
    \ {\n        $user = 'psread';\n        $pwd = 'K1y0mi$u';\n    } elseif ($usertype\
    \ == 'write') {\n        $user = 'pswrite';\n        $pwd = '0Ch@Nom1$u';\n  \
    \  } else {\n        exit('Unrecognized user');\n    }\n    // Connection code\
    \ goes here\n}\n```\n\nReplace the `Connection code goes here` comment with the\
    \ following:\n\n*   The function takes two arguments: the user type and the connection\
    \ type. The second argument defaults to `mysqli`. If you want to concentrate on\
    \ using PDO, set the default value of the second argument to `pdo`.\n*   The first\
    \ two lines inside the function store the names of the host server and the database\
    \ that you want to connect to.\n*   The conditional statement checks the value\
    \ of the first argument and switches between the `psread` and `pswrite` username\
    \ and password as appropriate. If the user account is unrecognized, the `exit()`\
    \ function halts the script and displays `Unrecognized user`.\n\n```php\nif ($connectionType\
    \ == 'mysqli') {\n    $conn = @ new mysqli($host, $user, $pwd, $db);\n    if ($conn->connect_error)\
    \ {\n        exit($conn->connect_error);\n    }\n    return $conn;\n} else {\n\
    \    try {\n        return new PDO(\"mysql:host=$host;dbname=$db\", $user, $pwd);\n\
    \    } catch (PDOException $e) {\n        echo $e->getMessage();\n    }\n}\n```\n\
    \n*   If the second argument is set to `mysqli`, a MySQLi connection object called\
    \ `$conn` is created. The error control operator (`@`) prevents the constructor\
    \ method from displaying error messages. If the connection fails, the reason is\
    \ stored in the object’s `connect_error` property. If it’s empty, it’s treated\
    \ as `false`, so the next line is skipped, and the `$conn` object is returned.\
    \ But if there’s a problem, `exit()` displays the value of `connect_error` and\
    \ brings the script to a halt.\n*   Otherwise, the function returns a PDO connection\
    \ object. There’s no need to use the error control operator with the `PDO` constructor\
    \ because it throws a `PDOException` if there’s a problem. The `catch` block uses\
    \ the exception’s `getMessage()` method to display the cause of the problem.\n\
    \n**Tip**\n\nIf your database server uses a nonstandard port, don’t forget to\
    \ add the port number as the fifth argument to the `mysqli()` constructor and\
    \ to include it in the PDO DSN, as described in the preceding sections. This isn’t\
    \ necessary if the database uses a socket connection, which is common on Mac OS\
    \ X and Linux.\n\nCreate a file called `connection_test.php` in the `phpsols`\
    \ site root folder and insert the following code:\n\n```php\n<?php\nrequire_once\
    \ './includes/connection.php';\nif ($conn = dbConnect('read')) {\n    echo 'Connection\
    \ successful';\n}\n```\n\nThis includes the connection script, and tests it with\
    \ the `psread` user account and MySQLi.\n\nSave the page and load it in a browser.\
    \ If you see `Connection successful`, all is well. If you get an error message,\
    \ consult the troubleshooting hints in the next section.\n\nTest the connection\
    \ with the `pswrite` user and MySQLi:\n\n```php\nif ($conn = dbConnect('write'))\
    \ {\n    echo 'Connection successful';\n}\n```\n\nTest both user accounts with\
    \ PDO by adding `'pdo'` as the second argument to `dbConnect()`.\n\nAssuming all\
    \ went well, you’re ready to start interacting with the `phpsols` database. If\
    \ you ran into problems, check out the next section.\n\n### Troubleshooting database\
    \ connection problems\n\nThe most common cause of failure when connecting to a\
    \ database is getting the username or password wrong. Passwords and usernames\
    \ are case-sensitive. Check the spelling carefully. For example, the following\
    \ screenshot shows what happens if you change `psread` to `Psread`.\n\n![A978-1-4842-0635-5_11_Figb_HTML.jpg](A978-1-4842-0635-5_11_Figb_HTML.jpg)\n\
    \nAccess has been denied because there’s no such user. The initial cap in the\
    \ username makes all the difference. But even if the username is right, you may\
    \ get the same error message, like this:\n\n![A978-1-4842-0635-5_11_Figc_HTML.jpg](A978-1-4842-0635-5_11_Figc_HTML.jpg)\n\
    \nThis totally confuses many people. The error message confirms that you’re using\
    \ a password. So why is access denied? It’s the wrong password, that’s why.\n\n\
    If the error message says `using password: NO`, it means you’ve forgotten to supply\
    \ the password. The phrase `using password` is a clue that the problem is related\
    \ to login credentials.\n\nWhen the phrase is missing, it indicates a different\
    \ problem, as shown in the next screenshot.\n\n![A978-1-4842-0635-5_11_Figd_HTML.jpg](A978-1-4842-0635-5_11_Figd_HTML.jpg)\n\
    \nThe problem here is that the name of the database is incorrect. If you misspell\
    \ the host, you’ll get a message that no such host is known.\n\nThe screenshots\
    \ in this section were generated by MySQLi. PDO generates the same messages, but\
    \ includes error numbers and codes as well."
  raw: '### Connecting with PDO


    PDO requires a slightly different approach. The most important difference is that
    PDO throws an exception if the connection fails. If you don’t catch the exception,
    the debugging information displays all the connection details, including your
    username and password. Consequently, you need to wrap the code in a `try` block
    and catch the exception to prevent sensitive information from being displayed.


    The first argument to the `PDO` constructor method is a data source name (DSN).
    This is a string that consists of the PDO driver name followed by a colon, followed
    by PDO driver-specific connection details.


    To connect to MySQL or MariaDB, the DSN needs to be in the following format:


    `''mysql:host=` `hostname` `;dbname=` `databaseName` `''`


    If your database server is using a nonstandard port, the DSN should also contain
    the port number, like this:


    `''mysql:host=` `hostname` `;port=` `portNumber` `;dbname=` `databaseName` `''`


    After the DSN, you pass the username and password to the `PDO()` constructor method.
    So the code to connect to the `phpsols` database looks like this:


    `try {`


    `$conn = new PDO("mysql:host=$hostname;dbname=phpsols", $username, $password);`


    `} catch (PDOException $e) {`


    `echo $e->getMessage();`


    `}`


    Using `echo` to display the message generated by the exception is acceptable during
    testing, but when you deploy the script on a live website, you need to redirect
    the user to an error page, as described in PHP Solution 4-8.


    Tip


    The DSN is the only part of the PHP code that you need to change in order to connect
    to a different database system. All the remaining PDO code is completely database-neutral.
    Details of how to create the DSN for PostgreSQL, Microsoft SQL Server, SQLite,
    and other database systems can be found at [`http://php.net/manual/en/pdo.drivers.php`](http://php.net/manual/en/pdo.drivers.php)
    .


    ### PHP Solution 11-1: Making a reusable database connector


    Connecting to a database is a routine chore that needs to be performed in every
    page from now on. This PHP solution creates a simple function stored in an external
    file that connects to the database. It’s designed mainly for testing the different
    MySQLi and PDO scripts in the remaining chapters without the need to retype the
    connection details each time or to switch between different connection files.


    Create a file called `connection.php` in the `includes` folder and insert the
    following code (there’s a copy of the completed script in the `ch11` folder):
     


    `<?php`


    `function dbConnect($usertype, $connectionType = ''mysqli'') {`


    `$host = ''localhost'';`


    `$db = ''phpsols'';`


    `if ($usertype  == ''read'') {`


    `$user = ''psread'';`


    `$pwd = ''K1y0mi$u'';`


    `} elseif ($usertype == ''write'') {`


    `$user = ''pswrite'';`


    `$pwd = ''0Ch@Nom1$u'';`


    `} else {`


    `exit(''Unrecognized user'');`


    `}`


    `// Connection code goes here`


    `}`


    Replace the `Connection code goes here` comment with the following:  


    *   The function takes two arguments: the user type and the connection type. The
    second argument defaults to `mysqli`. If you want to concentrate on using PDO,
    set the default value of the second argument to `pdo`.

    *   The first two lines inside the function store the names of the host server
    and the database that you want to connect to.

    *   The conditional statement checks the value of the first argument and switches
    between the `psread` and `pswrite` username and password as appropriate. If the
    user account is unrecognized, the `exit()` function halts the script and displays
    Unrecognized user.


    `if ($connectionType == ''mysqli'') {`


    `$conn = @ new mysqli($host, $user, $pwd, $db);`


    `if ($conn->connect_error) {`


    `exit($conn->connect_error);`


    `}`


    `return $conn;`


    `} else {`


    `try {`


    `return new PDO("mysql:host=$host;dbname=$db", $user, $pwd);`


    `} catch (PDOException $e) {`


    `echo $e->getMessage();`


    `}`


    `}`


    *   If the second argument is set to `mysqli`, a MySQLi connection object called
    `$conn` is created. The error control operator (`@`) prevents the constructor
    method from displaying error messages. If the connection fails, the reason is
    stored in the object’s `connect_error` property. If it’s empty, it’s treated as
    `false`, so the next line is skipped, and the `$conn` object is returned. But
    if there’s a problem, `exit()` displays the value of `connect_error` and brings
    the script to a halt.

    *   Otherwise, the function returns a PDO connection object. There’s no need to
    use the error control operator with the `PDO` constructor because it throws a
    `PDOException` if there’s a problem. The `catch` block uses the exception’s `getMessage()`
    method to display the cause of the problem.


    Tip


    If your database server uses a nonstandard port, don’t forget to add the port
    number as the fifth argument to the `mysqli()` constructor and to include it in
    the PDO DSN, as described in the preceding sections. This isn’t necessary if the
    database uses a socket connection, which is common on Mac OS X and Linux.


    Create a file called `connection_test.php` in the `phpsols` site root folder and
    insert the following code:  


    `<?php`


    `require_once ''./includes/connection.php'';`


    `if ($conn = dbConnect(''read'')) {`


    `echo ''Connection successful'';`


    `}`


    This includes the connection script, and tests it with the `psread` user account
    and MySQLi.


    Save the page and load it in a browser. If you see Connection successful, all
    is well. If you get an error message, consult the troubleshooting hints in the
    next section.   Test the connection with the `pswrite` user and MySQLi:  


    `if ($conn = dbConnect(''` `write` `'')) {`


    `echo ''Connection successful'';`


    `}`


    Test both user accounts with PDO by adding `''pdo''` as the second argument to
    `dbConnect()`.   Assuming all went well, you’re ready to start interacting with
    the `phpsols` database. If you ran into problems, check out the next section.


    #### Troubleshooting database connection problems


    The most common cause of failure when connecting to a database is getting the
    username or password wrong. Passwords and usernames are case-sensitive. Check
    the spelling carefully. For example, the following screenshot shows what happens
    if you change `psread` to `Psread`.


    ![A978-1-4842-0635-5_11_Figb_HTML.jpg](A978-1-4842-0635-5_11_Figb_HTML.jpg)


    Access has been denied because there’s no such user. The initial cap in the username
    makes all the difference. But even if the username is right, you may get the same
    error message, like this:


    ![A978-1-4842-0635-5_11_Figc_HTML.jpg](A978-1-4842-0635-5_11_Figc_HTML.jpg)


    This totally confuses many people. The error message confirms that you’re using
    a password. So why is access denied? It’s the wrong password, that’s why.


    If the error message says using password: NO, it means you’ve forgotten to supply
    the password. The phrase using password is a clue that the problem is related
    to login credentials.


    When the phrase is missing, it indicates a different problem, as shown in the
    next screenshot.


    ![A978-1-4842-0635-5_11_Figd_HTML.jpg](A978-1-4842-0635-5_11_Figd_HTML.jpg)


    The problem here is that the name of the database is incorrect. If you misspell
    the host, you’ll get a message that no such host is known.


    The screenshots in this section were generated by MySQLi. PDO generates the same
    messages, but includes error numbers and codes as well.'
  trans: "\n### 连接 PDO\n\n`PDO` 的使用方式略有不同。最重要的区别在于，如果连接失败，`PDO` 会抛出异常。如果不捕获这个异常，调试信息会显示所有连接细节，包括你的用户名和密码。因此，你需要将代码包裹在`try`块中并捕获异常，以防止敏感信息被泄露。\n\
    \n`PDO` 构造方法的第一个参数是数据源名称（DSN）。它是一个字符串，由 PDO 驱动名称、冒号以及 PDO 驱动特定的连接细节组成。\n\n要连接\
    \ MySQL 或 MariaDB，DSN 需要采用以下格式：\n\n`'mysql:host=hostname;dbname=databaseName'`\n\
    \n如果你的数据库服务器使用了非标准端口，DSN 还应包含端口号，如下所示：\n\n`'mysql:host=hostname;port=portNumber;dbname=databaseName'`\n\
    \n在 DSN 之后，你需要将用户名和密码传递给 `PDO()` 构造方法。因此，连接到 `phpsols` 数据库的代码如下所示：\n\n```php\n\
    try {\n    $conn = new PDO(\"mysql:host=$hostname;dbname=phpsols\", $username,\
    \ $password);\n} catch (PDOException $e) {\n    echo $e->getMessage();\n}\n```\n\
    \n在测试期间，使用 `echo` 显示异常生成的消息是可以接受的，但当你将脚本部署到线上网站时，需要将用户重定向到一个错误页面，如 PHP 解决方案 4-8\
    \ 所述。\n\n**提示**\n\n要连接到不同的数据库系统，PHP 代码中唯一需要修改的部分就是 DSN。其余所有 PDO 代码都是完全与数据库无关的。有关如何为\
    \ PostgreSQL、Microsoft SQL Server、SQLite 以及其他数据库系统创建 DSN 的详细信息，请参阅 [`http://php.net/manual/en/pdo.drivers.php`](http://php.net/manual/en/pdo.drivers.php)。\n\
    \n### PHP 解决方案 11-1：创建可复用的数据库连接器\n\n连接数据库是一项常规工作，从现在开始，每个页面都需要执行此操作。本 PHP 解决方案创建了一个存储在外部文件中的简单函数，用于连接数据库。它主要是为了方便在后续章节中测试不同的\
    \ MySQLi 和 PDO 脚本，而无需每次重新输入连接细节或在不同的连接文件之间切换。\n\n在 `includes` 文件夹中创建一个名为 `connection.php`\
    \ 的文件，并插入以下代码（`ch11` 文件夹中有一个完整的脚本副本）：\n\n```php\n<?php\nfunction dbConnect($usertype,\
    \ $connectionType = 'mysqli') {\n    $host = 'localhost';\n    $db = 'phpsols';\n\
    \    if ($usertype == 'read') {\n        $user = 'psread';\n        $pwd = 'K1y0mi$u';\n\
    \    } elseif ($usertype == 'write') {\n        $user = 'pswrite';\n        $pwd\
    \ = '0Ch@Nom1$u';\n    } else {\n        exit('Unrecognized user');\n    }\n \
    \   // 连接代码写在这里\n}\n```\n\n将 `连接代码写在这里` 注释替换为以下代码：\n\n*   该函数接受两个参数：用户类型和连接类型。第二个参数默认为\
    \ `mysqli`。如果你希望专注于使用 PDO，可以将第二个参数的默认值设置为 `pdo`。\n*   函数内部的前两行存储了要连接的主机服务器和数据库名称。\n\
    *   条件语句检查第一个参数的值，并在 `psread` 和 `pswrite` 用户名及密码之间进行切换。如果用户账户无法识别，`exit()` 函数会停止脚本并显示\
    \ `Unrecognized user`。\n\n```php\nif ($connectionType == 'mysqli') {\n    $conn\
    \ = @ new mysqli($host, $user, $pwd, $db);\n    if ($conn->connect_error) {\n\
    \        exit($conn->connect_error);\n    }\n    return $conn;\n} else {\n   \
    \ try {\n        return new PDO(\"mysql:host=$host;dbname=$db\", $user, $pwd);\n\
    \    } catch (PDOException $e) {\n        echo $e->getMessage();\n    }\n}\n```\n\
    \n*   如果第二个参数设置为 `mysqli`，则会创建一个名为 `$conn` 的 MySQLi 连接对象。错误控制运算符（`@`）可以防止构造方法显示错误消息。如果连接失败，原因会存储在对象的\
    \ `connect_error` 属性中。如果该属性为空，则被视为 `false`，因此会跳过下一行，并返回 `$conn` 对象。但如果出现问题，`exit()`\
    \ 会显示 `connect_error` 的值并终止脚本。\n*   否则，该函数返回一个 PDO 连接对象。无需对 `PDO` 构造方法使用错误控制运算符，因为如果有问题，它会抛出\
    \ `PDOException`。`catch` 块使用异常的 `getMessage()` 方法来显示问题的原因。\n\n**提示**\n\n如果你的数据库服务器使用了非标准端口，请不要忘记将端口号作为第五个参数添加到\
    \ `mysqli()` 构造方法中，并将其包含在 PDO 的 DSN 中，如前几节所述。如果数据库使用套接字连接（这在 Mac OS X 和 Linux\
    \ 上很常见），则无需此操作。\n\n在 `phpsols` 站点根文件夹中创建一个名为 `connection_test.php` 的文件，并插入以下代码：\n\
    \n```php\n<?php\nrequire_once './includes/connection.php';\nif ($conn = dbConnect('read'))\
    \ {\n    echo 'Connection successful';\n}\n```\n\n这将包含连接脚本，并使用 `psread` 用户账户和\
    \ MySQLi 进行测试。\n\n保存页面并在浏览器中加载。如果你看到 `Connection successful`，则一切正常。如果收到错误消息，请参阅下一节的故障排除提示。\n\
    \n使用 `pswrite` 用户和 MySQLi 测试连接：\n\n```php\nif ($conn = dbConnect('write')) {\n\
    \    echo 'Connection successful';\n}\n```\n\n通过向 `dbConnect()` 添加第二个参数 `'pdo'`，使用\
    \ PDO 测试两个用户账户。\n\n假设一切顺利，你就可以开始与 `phpsols` 数据库进行交互了。如果遇到问题，请查看下一节。\n\n### 数据库连接问题故障排除\n\
    \n连接数据库失败最常见的原因是用户名或密码错误。密码和用户名区分大小写。请仔细检查拼写。例如，以下截图展示了如果将 `psread` 改为 `Psread`\
    \ 会发生什么。\n\n![A978-1-4842-0635-5_11_Figb_HTML.jpg](img/A978-1-4842-0635-5_11_Figb_HTML.jpg)\n\
    \n访问被拒绝，因为没有这样的用户。用户名开头的字母大小写至关重要。但即使用户名正确，你也可能会收到类似的错误消息，如下所示：\n\n![A978-1-4842-0635-5_11_Figc_HTML.jpg](img/A978-1-4842-0635-5_11_Figc_HTML.jpg)\n\
    \n这让很多人感到困惑。错误消息确认你正在使用密码。那么为什么访问会被拒绝呢？这是因为密码错误。\n\n如果错误消息显示 `using password:\
    \ NO`，表示你忘记提供密码了。`using password` 这个短语是提示问题与登录凭据相关。\n\n当该短语缺失时，则表明是另一个问题，如下图所示。\n\
    \n![A978-1-4842-0635-5_11_Figd_HTML.jpg](img/A978-1-4842-0635-5_11_Figd_HTML.jpg)\n\
    \n这里的问题是数据库名称不正确。如果你拼错了主机，你会收到一条消息，提示没有这样的主机。\n\n本节中的截图由 MySQLi 生成。PDO 会生成相同的消息，但还会包含错误编号和代码。\n"
- fmt: "### Querying the database and displaying the results\n\nBefore you attempt\
    \ to display the results of a database query, it’s a good idea to find out how\
    \ many results there are. If there aren’t any results, you’ll have nothing to\
    \ display. It’s also necessary for creating a navigation system for paging through\
    \ a long set of results (you’ll learn how to do that in the next chapter). In\
    \ user authentication (covered in [Chapter 17](#A978-1-4842-0635-5_17_Chapter.html)),\
    \ no results when searching for a username and password mean that the login should\
    \ fail.\n\n`MySQLi` and `PDO` use different approaches to counting and displaying\
    \ results. The next two PHP solutions show how to do it with `MySQLi`. For `PDO`,\
    \ skip ahead to PHP Solution 11-4.\n\n#### PHP Solution 11-2: Counting records\
    \ in a result set (MySQLi)\n\nThis PHP solution shows how to submit an SQL query\
    \ that selects all the records in the `images` table and stores the result in\
    \ a `MySQLi_Result` object. The object’s `num_rows` property contains the number\
    \ of records retrieved by the query.\n\nCreate a new folder called `mysqli` in\
    \ the `phpsols` site root, then create a new file called `mysqli.php` inside the\
    \ folder. The page will eventually be used to display a table, so it should have\
    \ a `DOCTYPE` declaration and an HTML skeleton. Include the connection file in\
    \ a PHP block above the `DOCTYPE` declaration, and connect to the `phpsols` database\
    \ using the account with read-only privileges like this:\n\n`require_once '../includes/connection.php';`\n\
    \n`$conn = dbConnect('read');`\n\nNext, prepare the SQL query. Add this code immediately\
    \ after the previous step (but before the closing PHP tag):\n\n`$sql = 'SELECT\
    \ * FROM images';`\n\nThis means “select everything from the `images` table.”\
    \ The asterisk (`*`) is shorthand for “all columns.”\n\nNow execute the query\
    \ by calling the `query()` method on the connection object and passing the SQL\
    \ query as an argument, like this:\n\n`$result = $conn->query($sql);`\n\nThe result\
    \ is stored in a variable, which I have imaginatively named `$result`.\n\nIf there’s\
    \ a problem, `$result` will be `false`. To find out what the problem is, we need\
    \ get the error message, which is stored as the `error` property of the `mysqli`\
    \ connection object. Add the following conditional statement after the previous\
    \ line:\n\n```php\nif (!$result) {\n    $error = $conn->error;\n}\n```\n\nAssuming\
    \ there’s no problem, `$result` now holds a `MySQLi_Result` object, which has\
    \ a property called `num_rows`. To get the number of records found by the query,\
    \ add an `else` block to the conditional statement and assign the value to a variable,\
    \ like this:\n\n```php\nif (!$result) {\n    $error = $conn->error;\n} else {\n\
    \    $numRows = $result->num_rows;\n}\n```\n\nYou can now display the result in\
    \ the body of the page like this:\n\n```php\n<?php\nif (isset($error)) {\n   \
    \ echo \"<p>$error</p>\";\n} else {\n    echo \"<p>A total of $numRows records\
    \ were found.</p>\";\n}\n?>\n```\n\nSave `mysqli.php` and load it into a browser.\
    \ You should see the following result:\n\n- If there’s a problem, `$error` will\
    \ have been set, so it’s displayed. Otherwise, the `else` block shows the number\
    \ of records found. Both strings embed variables, so they’re enclosed in double\
    \ quotes.\n\n![A978-1-4842-0635-5_11_Fige_HTML.jpg](A978-1-4842-0635-5_11_Fige_HTML.jpg)\n\
    \nCheck your code, if necessary, with `mysqli_01.php` in the `ch11` folder.\n\n\
    #### PHP Solution 11-3: Displaying the images table using MySQLi\n\nThe most common\
    \ way to display the results of a `SELECT` query is to use a loop to extract one\
    \ row from the result set at a time. `MySQLi_Result` has a method called `fetch_assoc()`\
    \ that retrieves the current row as an associative array ready for display in\
    \ the webpage. Each element in the array is named after the corresponding column\
    \ in the table.\n\nThis PHP solution shows how to loop through a `MySQLi_Result`\
    \ object to display the results of a `SELECT` query. Continue using the file from\
    \ PHP Solution 11-2.\n\nRemove the closing curly brace at the end of the `else`\
    \ block in the body of the page (it should be around line 25). Although most of\
    \ the code to display the `images` table is HTML, it needs to be inside the `else`\
    \ block. Insert a blank line after the closing PHP tag and add the closing brace\
    \ on the next line in a separate PHP block. The revised code should look like\
    \ this:\n\n```php\n} else {\n    echo \"<p>A total of $numRows records were found.</p>\"\
    ;\n?>\n<?php } ?>\n```\n\nAdd the following table between the two PHP blocks in\
    \ the main body of `mysqli.php` so that it’s controlled by the `else` block. The\
    \ reason for doing this is to prevent errors if the SQL query fails. The PHP code\
    \ that displays the result set is highlighted in bold.\n\n```php\n<table>\n  \
    \  <tr>\n        <th>image_id</th>\n        <th>filename</th>\n        <th>caption</th>\n\
    \    </tr>\n    <?php while ($row = $result->fetch_assoc()) { ?>\n    <tr>\n \
    \       <td><?= $row['image_id']; ?></td>\n        <td><?= $row['filename']; ?></td>\n\
    \        <td><?= $row['caption']; ?></td>\n    </tr>\n    <?php } ?>\n</table>\n\
    ```\n\nThe `while` loop iterates through the database result, using the `fetch_assoc()`\
    \ method to extract each record into `$row`. Each element of `$row` is displayed\
    \ in a table cell. The loop continues until `fetch_assoc()` comes to the end of\
    \ the result set.\n\nSave `mysqli.php` and view it in a browser. You should see\
    \ the contents of the `images` table displayed as shown in the following screenshot:\n\
    \n![A978-1-4842-0635-5_11_Figf_HTML.jpg](A978-1-4842-0635-5_11_Figf_HTML.jpg)\n\
    \nYou can compare your code, if necessary, with `mysql_02.php` in the `ch11` folder.\n\
    \n#### MySQLi connection crib sheet\n\nTable [11-1](#A978-1-4842-0635-5_11_Chapter.html#Tab1)\
    \ summarizes the basic details of connection and database queries for `MySQLi`.\n\
    \n**Table 11-1.** Connection to MySQL/MariaDB with the MySQL Improved object-oriented\
    \ interface\n\n| Action | Usage | Comments |\n| --- | --- | --- |\n| Connect |\
    \ `$conn = new mysqli($h,$u,$p,$d);` | All arguments optional; first four always\
    \ needed in practice: hostname, username, password, database name. Creates connection\
    \ object. |\n| Choose DB | `$conn->select_db('dbName');` | Use to select a different\
    \ database. |\n| Submit query | `$result = $conn->query($sql);` | Returns result\
    \ object. |\n| Count results | `$numRows = $result->num_rows;` | Returns number\
    \ of rows in result object. |\n| Extract record | `$row = $result->fetch_assoc();`\
    \ | Extracts current row from result object as associative array. |\n| Extract\
    \ record | `$row = $result->fetch_row();` | Extracts current row from result object\
    \ as indexed (numbered) array. |"
  raw: '### Querying the database and displaying the results


    Before you attempt to display the results of a database query, it’s a good idea
    to find out how many results there are. If there aren’t any results, you’ll have
    nothing to display. It’s also necessary for creating a navigation system for paging
    through a long set of results (you’ll learn how to do that in the next chapter).
    In user authentication (covered in [Chapter 17](#A978-1-4842-0635-5_17_Chapter.html)),
    no results when searching for a username and password mean that the login should
    fail.


    MySQLi and PDO use different approaches to counting and displaying results. The
    next two PHP solutions show how to do it with MySQLi. For PDO, skip ahead to PHP
    Solution 11-4.


    #### PHP Solution 11-2: Counting records in a result set (MySQLi)


    This PHP solution shows how to submit an SQL query that selects all the records
    in the `images` table and stores the result in a `MySQLi_Result` object. The object’s
    `num_rows` property contains the number of records retrieved by the query.


    Create a new folder called `mysqli` in the `phpsols` site root, then create a
    new file called `mysqli.php` inside the folder. The page will eventually be used
    to display a table, so it should have a `DOCTYPE` declaration and an HTML skeleton.
      Include the connection file in a PHP block above the `DOCTYPE` declaration,
    and connect to the `phpsols` database using the account with read-only privileges
    like this:  


    `require_once ''../includes/connection.php'';`


    `$conn = dbConnect(''read'');`


    Next, prepare the SQL query. Add this code immediately after the previous step
    (but before the closing PHP tag):  


    `$sql = ''SELECT * FROM images'';`


    This means “select everything from the `images` table.” The asterisk (`*`) is
    shorthand for “all columns.”


    Now execute the query by calling the `query()` method on the connection object
    and passing the SQL query as an argument, like this:  


    `$result = $conn->query($sql);`


    The result is stored in a variable, which I have imaginatively named `$result`.


    If there’s a problem, `$result` will be `false`. To find out what the problem
    is, we need get the error message, which is stored as the `error` property of
    the `mysqli` connection object. Add the following conditional statement after
    the previous line:  


    `if (!$result) {`


    `$error = $conn->error;`


    `}`


    Assuming there’s no problem, `$result` now holds a `MySQLi_Result` object, which
    has a property called `num_rows`. To get the number of records found by the query,
    add an `else` block to the conditional statement and assign the value to a variable,
    like this:  


    `if (!$result) {`


    `$error = $conn->error;`


    `}` `else {`


    `$numRows = $result->num_rows;`


    `}`


    You can now display the result in the body of the page like this:  


    `<?php`


    `if (isset($error)) {`


    `echo "<p>$error</p>";`


    `} else {`


    `echo "<p>A total of $numRows records were found.</p>";`


    `}`


    `?>`


    Save `mysqli.php` and load it into a browser. You should see the following result:
     


    *   If there’s a problem, `$error` will have been set, so it’s displayed. Otherwise,
    the `else` block shows the number of records found. Both strings embed variables,
    so they’re enclosed in double quotes.


    ![A978-1-4842-0635-5_11_Fige_HTML.jpg](A978-1-4842-0635-5_11_Fige_HTML.jpg)


    Check your code, if necessary, with `mysqli_01.php` in the `ch11` folder.


    #### PHP Solution 11-3: Displaying the images table using MySQLi


    The most common way to display the results of a `SELECT` query is to use a loop
    to extract one row from the result set at a time. `MySQLi_Result` has a method
    called `fetch_assoc()` that retrieves the current row as an associative array
    ready for display in the webpage. Each element in the array is named after the
    corresponding column in the table.


    This PHP solution shows how to loop through a `MySQLi_Result` object to display
    the results of a `SELECT` query. Continue using the file from PHP Solution 11-2.


    Remove the closing curly brace at the end of the `else` block in the body of the
    page (it should be around line 25). Although most of the code to display the `images`
    table is HTML, it needs to be inside the `else` block.   Insert a blank line after
    the closing PHP tag and add the closing brace on the next line in a separate PHP
    block. The revised code should look like this:  


    `} else {`


    `echo "<p>A total of $numRows records were found.</p>";`


    `?>`


    `<?php } ?>`


    `</body>`


    Add the following table between the two PHP blocks in the main body of `mysqli.php`
    so that it’s controlled by the `else` block. The reason for doing this is to prevent
    errors if the SQL query fails. The PHP code that displays the result set is highlighted
    in bold.  


    `<table>`


    `<tr>`


    `<th>image_id</th>`


    `<th>filename</th>`


    `<th>caption</th>`


    `</tr>`


    `<?php while ($row = $result->fetch_assoc()) { ?>`


    `<tr>`


    `<td>` `<?= $row[''image_id'']; ?>` `</td>`


    `<td>` `<?= $row[''filename'']; ?>` `</td>`


    `<td>` `<?= $row[''caption'']; ?>` `</td>`


    `</tr>`


    `<?php } ?>`


    `</table>`


    The `while` loop iterates through the database result, using the `fetch_assoc()`
    method to extract each record into `$row`. Each element of `$row` is displayed
    in a table cell. The loop continues until `fetch_assoc()` comes to the end of
    the result set.


    Save `mysqli.php` and view it in a browser. You should see the contents of the
    `images` table displayed as shown in the following screenshot:  


    ![A978-1-4842-0635-5_11_Figf_HTML.jpg](A978-1-4842-0635-5_11_Figf_HTML.jpg)


    You can compare your code, if necessary, with `mysql_02.php` in the `ch11` folder.


    #### MySQLi connection crib sheet


    Table [11-1](#A978-1-4842-0635-5_11_Chapter.html#Tab1) summarizes the basic details
    of connection and database queries for MySQLi.


    Table 11-1.


    Connection to MySQL/MariaDB with the MySQL Improved object-oriented interface


    | Action | Usage | Comments |

    | --- | --- | --- |

    | Connect | `$conn = new mysqli($h,$u,$p,$d);` | All arguments optional; first
    four always needed in practice: hostname, username, password, database name. Creates
    connection object. |

    | Choose DB | `$conn->select_db(''dbName'');` | Use to select a different database.
    |

    | Submit query | `$result = $conn->query($sql);` | Returns result object. |

    | Count results | `$numRows = $result->num_rows;` | Returns number of rows in
    result object. |

    | Extract record | `$row = $result->fetch_assoc();` | Extracts current row from
    result object as associative array. |

    | Extract record | `$row = $result->fetch_row();` | Extracts current row from
    result object as indexed (numbered) array. |'
  trans: "\n### 查询数据库并显示结果\n\n在尝试显示数据库查询结果之前，最好先确定结果的数量。如果没有结果，你就无从显示。此外，在为长结果集创建分页导航系统时，也需要知道结果数量（你将在下一章学习如何实现）。在用户身份验证中（详见第\
    \ 17 章），如果搜索用户名和密码时没有结果，则意味着登录应该失败。\n\n`MySQLi` 和 `PDO` 在计数和显示结果时使用了不同的方法。接下来的两个\
    \ PHP 解决方案展示了如何使用 `MySQLi` 实现。至于 `PDO`，请直接跳到 PHP 解决方案 11-4。\n\n#### PHP 解决方案 11-2：统计结果集中的记录数（MySQLi）\n\
    \n本 PHP 解决方案演示如何提交一条 SQL 查询，该查询选择 `images` 表中的所有记录，并将结果存储在 `MySQLi_Result` 对象中。该对象的\
    \ `num_rows` 属性包含查询检索到的记录数。\n\n在 `phpsols` 站点根目录下创建一个名为 `mysqli` 的新文件夹，然后在该文件夹内创建一个名为\
    \ `mysqli.php` 的新文件。该页面最终将用于显示表格，因此它应包含 `DOCTYPE` 声明和 HTML 骨架。在 `DOCTYPE` 声明上方的\
    \ PHP 代码块中包含连接文件，并使用只读权限的账户连接到 `phpsols` 数据库，如下所示：\n\n`require_once '../includes/connection.php';`\n\
    \n`$conn = dbConnect('read');`\n\n接下来，准备 SQL 查询。在上一步之后（但在关闭 PHP 标签之前）立即添加此代码：\n\
    \n`$sql = 'SELECT * FROM images';`\n\n这表示“从 `images` 表中选择所有数据”。星号（`*`）是“所有列”的简写。\n\
    \n现在，通过调用连接对象的 `query()` 方法并将 SQL 查询作为参数传递来执行查询，如下所示：\n\n`$result = $conn->query($sql);`\n\
    \n结果存储在一个变量中，我将其命名为 `$result`。\n\n如果出现问题，`$result` 将为 `false`。要找出问题所在，我们需要获取错误消息，该消息存储在\
    \ `mysqli` 连接对象的 `error` 属性中。在前一行之后添加以下条件语句：\n\n```php\nif (!$result) {\n    $error\
    \ = $conn->error;\n}\n```\n\n假设没有问题，`$result` 现在持有一个 `MySQLi_Result` 对象，它有一个名为\
    \ `num_rows` 的属性。要获取查询找到的记录数，请在条件语句中添加一个 `else` 块，并将该值赋给一个变量，如下所示：\n\n```php\n\
    if (!$result) {\n    $error = $conn->error;\n} else {\n    $numRows = $result->num_rows;\n\
    }\n```\n\n你现在可以在页面主体中像这样显示结果：\n\n```php\n<?php\nif (isset($error)) {\n    echo\
    \ \"<p>$error</p>\";\n} else {\n    echo \"<p>A total of $numRows records were\
    \ found.</p>\";\n}\n?>\n```\n\n保存 `mysqli.php` 并在浏览器中加载它。你应该会看到以下结果：\n\n- 如果出现问题，`$error`\
    \ 将被设置，因此会显示出来。否则，`else` 块会显示找到的记录数。这两个字符串都嵌入了变量，因此它们用双引号括起来。\n\n![A978-1-4842-0635-5_11_Fige_HTML.jpg](img/A978-1-4842-0635-5_11_Fige_HTML.jpg)\n\
    \n如有必要，请与 `ch11` 文件夹中的 `mysqli_01.php` 核对你的代码。\n\n#### PHP 解决方案 11-3：使用 MySQLi\
    \ 显示 images 表\n\n显示 `SELECT` 查询结果的最常见方法是使用循环一次从结果集中提取一行。`MySQLi_Result` 有一个名为\
    \ `fetch_assoc()` 的方法，它将当前行作为关联数组检索出来，以便在网页中显示。数组中的每个元素都以表中相应列的名称命名。\n\n本 PHP\
    \ 解决方案演示如何循环遍历 `MySQLi_Result` 对象以显示 `SELECT` 查询的结果。继续使用 PHP 解决方案 11-2 中的文件。\n\
    \n删除页面主体中 `else` 块末尾的右花括号（大约在第 25 行）。虽然显示 `images` 表的代码大部分是 HTML，但它需要位于 `else`\
    \ 块内部。在闭合的 PHP 标签后插入一个空行，并在下一行的单独 PHP 块中添加右花括号。修改后的代码应如下所示：\n\n```php\n} else\
    \ {\n    echo \"<p>A total of $numRows records were found.</p>\";\n?>\n<?php }\
    \ ?>\n```\n\n在 `mysqli.php` 主体中的两个 PHP 块之间添加以下表格，使其受 `else` 块控制。这样做的目的是防止 SQL\
    \ 查询失败时出现错误。显示结果集的 PHP 代码以粗体突出显示。\n\n```php\n<table>\n    <tr>\n        <th>image_id</th>\n\
    \        <th>filename</th>\n        <th>caption</th>\n    </tr>\n    <?php while\
    \ ($row = $result->fetch_assoc()) { ?>\n    <tr>\n        <td><?= $row['image_id'];\
    \ ?></td>\n        <td><?= $row['filename']; ?></td>\n        <td><?= $row['caption'];\
    \ ?></td>\n    </tr>\n    <?php } ?>\n</table>\n```\n\n`while` 循环遍历数据库结果，使用 `fetch_assoc()`\
    \ 方法将每条记录提取到 `$row` 中。`$row` 的每个元素都显示在一个表格单元格中。循环持续进行，直到 `fetch_assoc()` 到达结果集的末尾。\n\
    \n保存 `mysqli.php` 并在浏览器中查看。你应该会看到 `images` 表的内容显示出来，如下面的屏幕截图所示：\n\n![A978-1-4842-0635-5_11_Figf_HTML.jpg](img/A978-1-4842-0635-5_11_Figf_HTML.jpg)\n\
    \n如有必要，你可以将你的代码与 `ch11` 文件夹中的 `mysql_02.php` 进行比较。\n\n#### MySQLi 连接备忘单\n\n表 11-1\
    \ 总结了 `MySQLi` 连接和数据库查询的基本细节。\n\n**表 11-1.** 使用 MySQL 改进版面向对象接口连接到 MySQL/MariaDB\n\
    \n| 操作 | 用法 | 注释 |\n| --- | --- | --- |\n| 连接 | `$conn = new mysqli($h,$u,$p,$d);`\
    \ | 所有参数均为可选；实践中始终需要前四个参数：主机名、用户名、密码、数据库名。创建连接对象。 |\n| 选择数据库 | `$conn->select_db('dbName');`\
    \ | 用于选择不同的数据库。 |\n| 提交查询 | `$result = $conn->query($sql);` | 返回结果对象。 |\n| 统计结果\
    \ | `$numRows = $result->num_rows;` | 返回结果对象中的行数。 |\n| 提取记录 | `$row = $result->fetch_assoc();`\
    \ | 将当前行作为关联数组从结果对象中提取出来。 |\n| 提取记录 | `$row = $result->fetch_row();` | 将当前行作为索引（编号）数组从结果对象中提取出来。\
    \ |\n"
- fmt: "### PHP Solution 11-4: Counting records in a result set (PDO)\n\nPDO doesn’t\
    \ have a direct equivalent to the MySQLi `num_rows` property. With most databases\
    \ you need to execute an SQL query to count the number of items in the table and\
    \ then fetch the result. However, the PDO `rowCount()` method fulfills a dual\
    \ purpose with both MySQL and MariaDB. Normally, it reports only the number of\
    \ rows affected by inserting, updating, or deleting records, but with MySQL and\
    \ MariaDB, it also reports the number of records found by a `SELECT` query.\n\n\
    Create a new folder called `pdo` in the `phpsols` site. Then create a file called\
    \ `pdo.php` in the folder you have just created. The page will eventually be used\
    \ to display a table, so it should have a `DOCTYPE` declaration and an HTML skeleton.\
    \ Include the connection file in a PHP block above the `DOCTYPE` declaration,\
    \ then create a PDO connection to the `phpsols` database using the read-only account,\
    \ like this:\n\n```\nrequire_once '../includes/connection.php';\n$conn = dbConnect('read',\
    \ 'pdo');\n```\n\nNext, prepare the SQL query:\n\n```\n$sql = 'SELECT * FROM images';\n\
    ```\n\nNow execute the query and store the result in a variable, like this:\n\n\
    - This means “select every record in the `images` table.” The asterisk (`*`) is\
    \ shorthand for “all columns.”\n\n```\n$result = $conn->query($sql);\n```\n\n\
    To check if there’s a problem with the query, you can get an array of error messages\
    \ from the database using the connection object’s `errorInfo()` method. The third\
    \ element of the array is created only if something goes wrong. Add the following\
    \ code to the script:\n\n```\n$errorInfo = $conn->errorInfo();\nif (isset($errorInfo[2]))\
    \ {\n    $error = $errorInfo[2];\n}\n```\n\nTo get the number of rows in the result\
    \ set, create an `else` block and call the `rowCount()` method on the `$result`\
    \ object, like this:\n\n- The array generated by `$conn->errorInfo()` is stored\
    \ as `$errorInfo`, so you can tell if anything went wrong by using `isset()` to\
    \ check whether `$errorInfo[2]` has been defined. If it has, the error message\
