  \ null;\n}\nif ($user->getPass() == $pass) {\nreturn true;\n}\n$this->store->notifyPasswordFailure($mail);\n\
  return false;\n}\n```\n\n看到我如何破坏这个方法了吗？就目前而言，`validateUser()`将始终返回`false`。\n\n以下是应该因此出错的测试。它在`test/util/ValidatorTest.php`中：\n\
