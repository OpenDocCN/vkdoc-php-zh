  \n![](img/00058.png)\n\n### 显示产品列表\n\n无论是在主网页上还是在浏览某个分类时，都应该显示一些产品，而不是“在这里放置产品列表”的文本。这里你将创建\
  \ `products_list` 组件化模板，它能够显示包含产品详细信息的列表。当有大量产品需要浏览时，会显示导航链接（见图 4-11）。\n\n**图 4-11.**\
  \ *带分页功能的* `products_list` *组件化模板*\n\n该组件化模板将用于网站内的多个位置。在主页面，它会显示目录中的产品（请记住，即那些\
  \ `display` 字段设置为 1 或 3 的产品）。当访客选择某个特定部门时，`products_list` 组件化模板会显示该部门的特色产品。最后，当访客点击某个分类时，该组件化模板会显示该分类下的所有产品。由于数据库的实现方式，你可以将产品在其所属的部门中设定为特色产品，但不在主页上展示，反之亦然。如果某个产品属于多个部门，它将会在每个所属部门的主页上显示。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\n\n## 第 4 章：创建产品目录：第二部分\n\
  \n组件化模板在分析查询字符串后决定显示哪些产品。如果查询字符串中同时包含 `DepartmentID` 和 `CategoryID` 参数，则表示应列出该类别下的产品。如果仅包含\
  \ `DepartmentID`，则访问者正在浏览某个部门，因此应显示该部门的特色产品。如果没有 `DepartmentID`，则访问者位于主页，因此应显示目录中的特色产品。\n\
  \n要将 `products_list` 组件化模板与首页集成，你需要创建一个额外的模板文件（`first_page_contents.tpl`），该文件将在后续步骤中实现。\n\
  \n在接下来的练习中创建好 `products_list` 后，你将能够按部门和按类别浏览产品。随后，你将了解如何将产品添加到主网页中。\n\n## 练习：创建\
