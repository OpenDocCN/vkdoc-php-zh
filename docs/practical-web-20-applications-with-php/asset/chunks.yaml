    Use* *(EmailLogger.php)*


    protected function _write($event)


    {


    $this->_events[] = $this->_formatter->format($event);


    }


    Finally, we implement the shutdown() method. As mentioned, this method is called
    automatically when the request ends. Our objective in this method is to generate
    an e-mail subject and body and then send the message using Zend_Mail. Obviously,
    if there are no log messages, then we don’t want to send an e-mail at all, which
    is why the code checks whether $this->_events is empty before creating the e-mail.


    Listing 14-3 shows the code for shutdown(). You may want to use different text
    for the subject and body than what I’ve listed here. I have simply included the
    number of messages in the subject and then joined the messages to make up the
    body.


    ■**Note** The default formatter puts a line feed after each message, so by joining
    on an empty string, each message will appear on a new line.


    **Listing 14-3.** *Sending the Log Message E-mail in shutdown() (EmailLogger.php)*
    public function shutdown()


    {


    if (count($this->_events) == 0)


    return;


    $subject = sprintf(''Web site log messages (%d)'',


    count($this->_events));


    $mail = new Zend_Mail();


    $mail->addTo($this->_email)


    ->setSubject($subject)


    ->setBodyText(join('''', $this->_events))


    ->send();


    }


    }


    ?>


