    Recipe 12-9\. The HTTPS Protocol


    Problem


    The traditional protocol used to communicate between browser and web server is
    the HTTP protocol. This protocol sends all data in either direction in clear text.
    This allows proxy servers and other technologies to intercept and possibly change
    the content. How can this be avoided?


    Solution


    The HTTPS protocol uses encryption of the data in both directions. The encryption
    is based on a pair of encryption keys installed on the server. The web server
    handles all the encryption and decryption and for most PHP scripts there are no
    special things to take care of or do differently. The PHP script can use $_


    SERVER[''REQUEST_SCHEME''] to determine the actual scheme used. This can be useful
    when creating rewrite responses or links to other parts of the site.


    How it Works


    HTTPS works like HTTP as far as creating a connection to the server. HTTP uses
    port 80 as the standard TCP


    port and HTTPS uses 443\. It is possible to use any other port, but if nonstandard
    ports are used they must be specified explicitly as part of the URL.


    When the socket connection is established the server will send the public key
    to the browser. The browser will use this key to encrypt the request and to decrypt
    the responses. By having the request and response encrypted it is no longer possible
    for proxies and others to know what’s going on, with the exception of the fact
    there is a connection between the browser and server.


    A redirect that matches the scheme used to formulate the request could look like
    this: header("Location: " . $_SERVER[''REQUEST_SCHEME''] .


    "://" . $_SERVER[''SERVER_NAME''] . "/some/new/document"; Or if the request came
    in on HTTP and you wanted to force the request to use HTTPS:


    <?php


    // 12_12.php


    if ($_SERVER[''REQUEST_SCHEME''] == ''http'') {


    header("Location: https://{$_SERVER[''SERVER_NAME'']}" .


    $_SERVER[''REQUEST_URI'']);


    exit;


    }


