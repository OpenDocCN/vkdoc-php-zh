- fmt: "```php\nif((isset($_POST['table'])) and (isset($_POST['database'])) and\n\
    (isset($_POST['titles'])) and (isset($_POST['title']))){\n// Database\n$columns\
    \ = $_POST['table'];\n$database = $_POST['database'];\n$Label = $_POST['titles'];\n\
    $RangeLabel = $_POST['title'];\nrequire_once \"models/accessData.class.php\";\n\
    $dataObject =  new accessData();\n$Data = $dataObject->returnDatabaseData($database,\
    \ $columns, $Label, $RangeLabel);\nrequire_once \"views/googleDashboard.php\"\
    ;\n$info .= displayDashboard($Data, $RangeLabel, $Label);\n}\nListing 10-23\n\
    Partial Listing of Column.php\n```\n\nIf the database, table, numeric column,\
    \ and another column (as verified by the `if` statement) have all been determined,\
    \ the program can finish the process of displaying the dashboard. All four of\
    \ these values are placed into corresponding variables. An instance of the `accessData()`\
    \ class is created. Then all the variables are passed into the `returndatabaseData()`\
    \ function. This function will return a two-column array with the information\
    \ requested. Now that the table has been created, the `googleDashboard.php` program\
    \ will be included. This program includes the function `displayDashboard()` which\
    \ will use the array (`$Data`) and the column names (`$Rangelabel`, `$label`)\
    \ to create the dashboard.\n\n```php\nelse if((isset($_POST['filename'])) and\
    \ (isset($_POST['numeric_Title'])) and ($_POST['all_Columns']) and ($_POST['numeric_Name']))\
    \ {\n//Excel\n$file = $_POST['filename'];\n$numeric_Column = $_POST['numeric_Title'];\n\
    $numeric_Name = $_POST['numeric_Name'];\n$columns = $_POST['all_Columns'];\n$columns_Info\
    \ = explode(',',$columns);\nrequire_once \"models/accessData.class.php\";\n$dataObject\
    \ =  new accessData();\n$Data = $dataObject->returnExcelData($file, $columns_Info[0],\
    \ $numeric_Column);\nrequire_once \"views/googleDashboard.php\";\n$info .= displayDashboard($Data,\
    \ $numeric_Name, $columns_Info[1]);\n}\nListing 10-24\nPartial Listing of Column.php\n\
    ```\n\nIf any of the nondatabase types are selected, similar logic is used to\
    \ prepare for the display of the dashboard. The file name, numeric column name,\
    \ numeric column number, and the column information for the other column are stored\
    \ in variables. The information for the other column is transformed into an array\
    \ using `explode()`. An instance of the `accessData()` class is created. The file\
    \ name, numeric column name, and the other column name are all passed into the\
    \ `returnExcelData()` function. This function will return a two-dimensional array\
    \ containing the requested information. The `Dashboard.php` file is then imported.\
    \ The `displayDashboard()` function is called, passing the array data (`$Data`),\
    \ the name of the numeric column, and the name of the other column. This will\
    \ display our dashboard.\n\nIt is finally time to display our dashboard! The code\
    \ used to prepare our dashboard is a mixture of PHP, HTML, and JavaScript. To\
    \ allow the learner ability to relate this example to other Google Dashboard examples,\
    \ we borrowed code directly from the Google Charts website, with a few modifications.\n\
    \n> **Note**  \n> This exercise provides us practice in preparing data for display\
    \ within graphical charts. The code, up until this point, is not actually dependent\
    \ on using Google Charts for the actual display of information. The programmer\
    \ (you) can modify this code to prepare data for any charting tool available.\
    \ Google Charts is not designed for displaying large amounts of data (thousands\
    \ of records). The actual data is uploaded into the Google Charts API (application\
    \ programming interface) on the Google website. Thus, you would not want the inefficiency\
    \ of trying to upload thousands of records. Also, because the data is sent to\
    \ Google, we must consider security risks. If this data is intended to be public\
    \ information (or not secure information), then Google Charts is a good choice.\
    \ If the information needs to be secure, then another application should be used.\n\
    \n```javascript\n// Load the Visualization API and the controls package.\ngoogle.charts.load('current',\
    \ {'packages':['corechart', 'controls']});\n// Set a callback to run when the\
    \ Google Visualization API is loaded.\ngoogle.charts.setOnLoadCallback(drawDashboard);\n\
    // Callback that creates and populates a data table,\n// instantiates a dashboard,\
    \ a range slider, and charts,\n// passes in the data and draws it.\nfunction drawDashboard()\
    \ {\nvar data = new google.visualization.DataTable();\n// Add columns\ndata.addColumn('string','\"\
    \ . $Label . \"');\ndata.addColumn('number','\" . $RangeLabel . \"');\n\";\nListing\
    \ 10-25\nPartial Listing of googleDashboard.php\n```\n\nWe can now complete the\
    \ requirements to display our dashboard. First, we will import the Google Charts\
    \ JavaScript Loader code, which is an *AJAX API*. AJAX is a JavaScript code which\
    \ provides asynchronous display of information within a web page. It allows portions\
    \ of the page to be updated, without having to reload the complete web page (like\
    \ we have been doing up until now). This allows the program to change chart information\
    \ without affecting the rest of the page. Next, we call the Google Visualization\
    \ API, with parameters that indicate which items will be displayed using AJAX.\
    \ In this example, we include the charts and the controls. The `OnLoadCallback()`\
    \ function redraws the dashboard every time an attempt is made to reload the page.\
    \ The function `drawDashboard()` is a JavaScript function which creates the `DataTable`\
    \ from the array and sets the parameters for the dashboard, slider, and charts.\
    \ An instance of the `DataTable` (`data`) is created. Then the `$RangeLabel` variable\
    \ (passed into the PHP function (`displayDashBoard()`) containing the numeric\
    \ column name, which is added to the data table as a `'number'` column. The other\
    \ column name (`$Label`) is also passed into the PHP function, as a `'string'`\
    \ column.\n\n```php\n$info .=\"data.addRows([\";\n$count = 0;\nforeach($Data as\
    \ $row) {\nif($count == 0) { $count++; continue; }\n$info .= \"['\" . $row[0]\
    \ . \"',\" . $row[1] . \"],\";\n$count++;\n}\n$info .= \"]);\n// Create a dashboard.\n\
    var dashboard = new google.visualization.Dashboard(\ndocument.getElementById('dashboard_div'));\n\
    Listing 10-26\nPartial Listing of googleDashBoard.php\n```\n\nOnce the columns\
    \ are defined, then we use PHP to `\"addRows\"` to our data table by pulling the\
    \ information from the `$Data` array (passed into the PHP function). Once we have\
    \ established the data table, we can complete the dashboard, controls, and charts\
    \ information. We create an instance of the dashboard (`dashboard`) and define\
    \ where it will exist in the web page (inside the HTML `div` tag identified as\
    \ `'dashboard_div'`).\n\n```javascript\n// Create a range slider , passing some\
