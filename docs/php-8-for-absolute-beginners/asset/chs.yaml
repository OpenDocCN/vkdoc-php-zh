  \n### 准备用于显示图片的函数\n\n让我们更新图库文件，声明一个简单的函数，该函数仅返回一个 HTML 字符串，其中包含一个带有单个 `<li>` 的 `<ul>`。此更改是朝着网站能够显示给定文件夹（目录）中包含的所有图片迈出的一步。\n\
  \n\n\n```php\n$out .= \"图片画廊\";\n$out .= \"\";\n$out .= \"我将很快列出所有图像\";\n$out .=\
  \ \"\";\nreturn $out;\n}\n//函数调用\n$info = showImages();\n?>\n代码清单 4-5\nshowgallery.php\n\
  ```\n\n请注意函数 `showImages()` 中的变量 `$out` 如何通过*增量拼接*在数行代码中逐渐累积内容。最终，当 HTML 字符串构建完成后，变量\
  \ `$out` 的内容被返回到调用该函数的代码行。\n\n```php\n$info = showImages();\n```\n\n生成的字符串通过 `$info`\
  \ 变量返回到 `index.php`，在那里它将被添加到 `$pageData` 对象中，与页面模板合并，并输出到浏览器。\n\n## 迭代\n\n希望函数、变量和增量拼接的概念正在逐渐明朗。由于我们将要使用多张图片，我们需要花些时间来理解**迭代**：重复使用同一段代码多次。\n\
  \n### While 循环\n\n让我们从 *while* *循环*开始。只要条件为真，`while` 循环就会重复执行同一个代码块。其基本语法是：\n\n\
  ```php\nwhile ( $condition ) {\n    // 在此处重复代码\n}\n```\n\n`while` 循环在语法上与 `if` 语句非常相似。如果条件为\
  \ `true`，则后续代码块中的代码将重复执行，直到条件变为 `false`。以下示例用于说明这一概念。\n\n```php\n<?php\n$number\
  \ = 1;\nwhile ( $number < 5 ) {\n    echo \"<p>这是第 $number 行。</p>\\n\";\n    $number\
  \ = $number + 1;\n}\n?>\n代码清单 4-6\nwhileloop.php\n```\n\n```php\nwhile ( $number\
  \ < 5 ) {\n```\n\n![whileloop.php 的输出](img/323857_3_En_4_Fig4_HTML.jpg)\n\n该图片反映了程序员在使用不同循环向网站上传图片后的窗口视图。\n\
  \n**图 4-4** whileloop.php 的输出\n\n该代码块重复执行了四次。这是因为 while 语句括号内声明的条件所致。它检查 `$number`\
  \ 是否小于五。循环首次执行时，`$number` 被设置为 1。\n\n```php\n$number = $number + 1;\n```\n\n每次代码块运行时，`$number`\
  \ 都会增加 1。当 `while` 循环重复四次后，*计数变量* `$number` 的值为 5。因为五不小于五，所以 `while` 循环终止，第五行不会被输出。\n\
  \n> **注意：** 如果程序员忘记递增用于计数的变量会发生什么？如果变量不递增，其值就不会改变。循环会继续将表达式评估为 true，因为 1 的值不会改变，而且它仍然小于五。这会造成一个*死循环*。这是一个常见错误，尤其是对于初学者来说。务必反复检查是否记得包含了计数变量的递增。\n\
  \n### For 循环\n\n作为一名新程序员，我们希望尽可能多地获得提示，以便成功创建迭代所需的任何代码。While 循环是一个很适合在条件发生变化前持续迭代的通用循环。然而，*for\
  \ 循环*专门针对已知循环次数的情况而设计。\n\n```php\n<?php\nfor ( $number = 1; $number < 5 ; $number++\
  \ ) {\n    echo \"<p>这是第 $number 行。</p>\\n\";\n}\n?>\n代码清单 4-7\nforloop.php\n```\n\
  \n如我们所见，要实现与 while 循环相同的结果，for 循环所需的代码行数更少。\n\n```php\nfor ( $number = 1; $number\
  \ < 5 ; $number++ ) {\n```\n\n计数变量 `$number` 被初始化为 1，与数字 5 进行比较，并在同一个程序语句中递增。实际上，for\
  \ 循环会在循环开始时自动执行第一个位置（第一个分号前）的语句一次。然后，每当循环到达顶部时（包括首次进入循环时），它会执行第二个位置（两个分号之间）的代码。每当循环到达底部时，它会执行第三个位置（最后一个分号和右括号之间）的代码。换句话说，for\
  \ 循环产生的结果与 while 循环相同。然而，它有助于提醒我们创建计数变量、为其赋予初始值、进行比较，以及——最重要的——每次递增它。\n\n\n\n在继续之前，我们对上一个示例做了一处改动：增加了一种自增数值的方式。在\
  \ `for` 语句中，我们使用 `++` 来递增 `$number`，而不是 `$number = $number + 1`。实际上，有多种方法可以递增数值。\n\
  \n```\n$number = $number + 1;\n$number++;\n$number += 1;\n```\n\n上述所有语句都会将变量加一。但请注意，每种方式都是在变量被使用后才进行递增。什么意思呢？\n\
  \n```\n$number = 1;\necho $number++;\necho $number;\n```\n\n上述语句中，第一个 `echo` 会输出值\
  \ 1，第二个 `echo` 输出值 2。因为 `$number++` 是在第一次输出之后才执行递增操作。\n\n```\n$number = 1;\necho\
  \ ++$number;\necho $number;\n```\n\n如果将 `++` 符号移到左边，变量会在被使用前递增。因此，第一个 `echo` 语句会显示\
  \ 2，第二个显示 3。\n\n在 `for` 语句中，我们也可以将递增操作改为使用前进行。由于我们实际并未使用该值（例如用 `echo` 显示），因此在这个\
  \ `for` 循环示例中，结果不会发生任何变化。大多数情况下，先递增还是后递增并没有区别，但正如我们刚发现的，我们应当谨慎，确保能得到预期的结果。\n\n```\n\
  $number = 2;\necho $number--;\necho --$number;\n```\n\n我们还可以使用 `--` 来递减变量。其过程相同：如果符号在右侧，则在变量使用后递减；如果在左侧，则在变量使用前递减。在这个示例中，第一个\
  \ `echo` 会显示 2，第二个显示 0。0？你是不是以为是 1？第一次 `echo` 后，值递减为 1。然后，在第二次 `echo` 显示结果之前，值再次递减为\
  \ 0。\n\n**练习**：调整 `for` 循环示例，使其循环十次。然后调整循环，使其仅显示奇数。提示：将递增改为每次加二。最后，查阅 [`www.php.net`](http://www.php.net)\
  \ 上 `continue` 和 `break` 语句的用法。如何跳过值为 4 的情况，但继续循环？如果计数变量值为 6，如何提前退出循环？\n\n现在我们回到构建图片库的工作。\n\
