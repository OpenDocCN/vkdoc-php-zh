  trans: '

    ### 添加英雄图像部分


    如果你还记得，在本书的第 4 章中，当你设计和实现页面布局的页眉和页脚元素时，你第一次接触到了“部分”。我们即将为首页构建的动态部分将以完全相同的方式实现——唯一的区别在于，这些新部分将由商店店主在
    Shopify 后台选择和插入，而不是通过主题中其他地方的`{% section %}` Liquid 标签显式包含。


    你可以先添加一个用于展示“英雄图像”的部分，这是一种常见的设计元素，用于吸引访问首页用户的注意力并传达一些关于你品牌的信息。我们还会在该元素顶部添加一句标语，以及一个包含行动号召的按钮。所有这些元素（使用的图像、文本内容和目标
    URL）都将由商店店主配置。


    为此，我们首先在主题中创建一个新的 Liquid 文件`sections/hero.liquid`，并插入代码清单 6-2 的内容。


    ```

    {% schema %}

    {

    "name": "英雄图像",

    "settings": [

    {

    "id": "image",

    "type": "image_picker",

    "label": "英雄图像"

    },

    {

    "id": "title",

    "type": "text",

    "label": "标题"

    },

    {

    "id": "label",

    "type": "text",

    "label": "按钮文本"

    },

    {

    "id": "href",

    "type": "url",

    "label": "按钮链接"

    }

    ],

    "presets": [

    {

    "name": "英雄图像",

    "category": "图像"

    }

    ]

    }

    {% endschema %}


    {{ section.settings.title | escape }}

    {{ section.settings.label | escape }}


    代码清单 6-2

    sections/hero.liquid 文件内容

    ```


    希望这里没有太多你不熟悉的内容。与页眉和页脚部分一样，我们有一个包含 JSON 的`{% schema %}`标签，用于定义英雄图像部分的可配置属性。这些可配置设置随后在文件底部被使用，以输出用于渲染包含图像和文本元素的`<div>`元素的
    HTML。


    如果我们把这个部分上传到开发商店并刷新首页，页面不会有任何变化。这是因为要显示英雄图像，它需要先被添加到 Shopify 后台的“自定义主题”页面中的首页上。如果你导航到后台的主题定制器（如果你忘了在哪里，请参阅第
    4 章），你会看到现在在左侧边栏的“页面内容”部分中有一个“添加部分”选项。点击它，你将可以选择添加一个“英雄图像”部分，并可以用图像、文本和链接对其进行配置（见图
    6-4）。


    ![A437216_1_En_6_Fig4_HTML.jpg](img/A437216_1_En_6_Fig4_HTML.jpg)


    图 6-4


    在配置和添加英雄图像部分之前（左）和之后（右）的 Shopify 后台主题定制器


    与第 4 章中实现的“静态”页眉和页脚部分不同，这些动态的首页部分可以被多次使用，并且可以独立配置或根据需要重新排列。与静态部分一样，它们也支持使用块（blocks），这意味着我们可以让商店店主对每个部分中显示的内容拥有大量控制权。


    现在，我们将再添加几个动态部分，以便实现图 6-3 中草拟的首页布局。首先，我们将添加一个“特色产品”部分（见代码清单 6-3），文件名为`sections/featured-products.liquid`。当添加至首页时，该部分会要求商店店主从其商店中选择一个产品系列，并显示该系列中的前四个产品。我们还将添加一个“特色系列”部分（见代码清单
    6-4），文件名为`sections/featured-collections.liquid`。该部分将以类似于特色产品部分的方式显示一系列产品系列，但与其显示预设数量的系列不同，我们将使用块来允许商店店主精确选择他们想要显示多少个系列。


    ```

    {% schema %}

    {

    "name": "特色产品",

    "settings": [

    {

    "id": "title",

    "type": "text",

    "label": "部分标题",

    "info": "默认使用系列标题。"

    },

    {

    "id": "collection",

    "type": "collection",

    "label": "产品系列"

    }

    ],

    "presets": [

    {

    "name": "特色产品",

    "category": "特色"

    }

    ]

    }

    {% endschema %}

    {%- assign collection = collections[section.settings.collection] -%}


    {{ section.settings.title | default: collection.title | escape }}

    {%- for product in collection.products limit: 4 -%}

    {%- include ''product'' with product -%}

    {%- endfor -%}


    代码清单 6-3

    首页上的动态“特色产品”部分

    ```


    ```

    {% schema %}

    {

    "name": "特色系列",

    "max_blocks": 4,

    "settings": [

    {

    "id": "title",

    "type": "text",

    "label": "部分标题"

    }

    ],

    "blocks": [

    {

    "type": "collection",

    "name": "产品系列",

    "settings": [

    {

    "id": "collection",

    "type": "collection",

    "label": "产品系列"

    }

    ]

    }

    ],

    "presets": [

    {

    "name": "特色系列",

    "category": "特色"

    }

    ]

    }

    {% endschema %}


    {{ section.settings.title | escape }}

    {%- for block in section.blocks -%}

    {%- if block.type == ''collection'' -%}

    {%- include ''collection'' with collections[block.settings.collection] -%}

    {%- endif -%}

    {%- endfor -%}


    代码清单 6-4

    首页上的动态“特色系列”部分

    ```


    有了这些新的部分，我们在主题定制器的“添加部分”选项下就能看到一些额外的选择，并且可以配置这两个新部分来实现图 6-3 中期望的布局，如图 6-5 所示。


    ![A437216_1_En_6_Fig5_HTML.jpg](img/A437216_1_En_6_Fig5_HTML.jpg)


    图 6-5


    在 Shopify 主题定制器中配置特色产品部分（左）和特色系列部分（右）


    仅凭这几个简单的部分，我们就赋予了商店店主对首页布局和显示内容的巨大控制权，同时确保每个独立的部分都与整体主题设计保持一致。如图 6-6 所示，商店店主可以使用同一部分类型的多个实例来构建适合其品牌和产品系列的首页。


    ![A437216_1_En_6_Fig6_HTML.jpg](img/A437216_1_En_6_Fig6_HTML.jpg)


    图 6-6


    使用我们刚刚实现的部分构建的几种不同的首页布局示例


    ## 产品系列页面


    在完成了产品页面和首页的设计与实现之后，我们现在可以着手设计和实现主题的产品系列页面了。这些页面（也称为“分类页面”）会展示特定系列中包含的所有产品列表，以便顾客可以一次性浏览大量产品，然后再深入了解他们感兴趣的商品。


    所有 Shopify 商店都带有一个默认的“全部”系列（通过`/collections/all`访问），其中包含 Shopify 商店在线渠道中列出的所有产品。此外，Shopify
    还在`/collections`提供了一个产品系列列表页面，用于展示所有可用的产品系列。该系列列表页面通过`templates/list-collections.liquid`进行渲染。


    **提示**


    在某些情况下，你可能不希望“全部”系列实际列出所有可供购买的产品。例如，你可能有一系列产品，其中包含一个“隐藏”的产品类型，该类型只能通过产品 URL 访问的用户才能看到。在这种情况下，你可以通过在
    Shopify 后台创建一个新系列，并确保其系列句柄设置为“all”，来覆盖默认的“全部”系列。然后，你可以根据需要为该默认系列配置任何规则，例如“产品类型不是隐藏的”。

