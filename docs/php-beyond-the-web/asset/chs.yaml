  \ 和 puppet 包/模块。 |\n|   |   |\n|   | ***主站*** : [`github.com/jordansissel/fpm`](https://github.com/jordansissel/fpm)\
  \ |\n|   |   |\n|   | ***安装信息*** : [`github.com/jordansissel/fpm#get-with-the-download`](https://github.com/jordansissel/fpm#get-with-the-download)\
  \ |\n|   |   |\n|   | ***主要文档*** : [`github.com/jordansissel/fpm/wiki`](https://github.com/jordansissel/fpm/wiki)\
  \ |\n\n### 10.6 控制（PHP）环境\n\n当你在自己的服务器或个人电脑上部署脚本时，你可以控制它们所处的环境。然而，如果你更广泛地分发你的软件，你会突然发现外部机器上的环境因素可能导致你的\
  \ PHP 脚本行为异常甚至完全停止工作。你需要考虑的一些 PHP 特定环境因素包括：\n\n*   **已安装的 PHP 版本**：检查当前版本（在脚本中使用\
  \ `phpversion()`）以确保你的脚本兼容。考虑在你的安装程序中一并部署 PHP，如果这样做，将其安装到非标准位置，使用非标准名称，并且不设置 `php`\
  \ 环境变量可能是有益的，以避免与任何现有版本混淆。\n*   **已安装的扩展版本**：与上面的主 PHP 安装类似，你可以使用 `phpversion('extension_name')`\
  \ 检查关键扩展的版本并据此采取行动。\n*   **`php.ini` 设置**：这些设置很可能与你机器上的设置不同。理想情况下，你应该提供自己的自定义 `php.ini`\
  \ 文件并使用它（例如，调用 `php --php-ini my-php.ini myfile.php`，见第 2 章）以确保所有设置都符合你的要求。或者，你也可以在脚本中使用\
  \ `ini_set()` 设置重要设置，但请注意，现有的 `php.ini` 文件可以禁用此功能。\n*   **常见路径的位置**：Linux 上的系统临时目录通常是\
  \ `/tmp`。但并非总是如此。尽可能使用像 `sys_get_temp_dir()` 和 `get_env('PATH')` 这样的函数来查找系统上的相关文件夹，或者至少允许用户在配置文件中指定它们。\n\
  \n你还需要检查你可能拥有的任何其他非 PHP 依赖项，评估是否有适当级别的硬件资源（内存、磁盘空间）可用，并检查所需的任何网络/互联网连接。\n\n| ![](img/image00249.gif)\
  \ | ***3v4l.org*** |\n|   |   |\n|   | 网络服务，允许你点击一个按钮，在 100 多个 PHP 版本（包括 HHVM）中测试代码块。有助于确定你的代码可以支持哪些\
  \ PHP 版本。 |\n|   |   |\n|   | ***主站*** : [`3v4l.org/`](http://3v4l.org/) |\n\n###\
  \ 10.7 使用插件扩展你的应用程序\n\n在你自己的网站或软件上工作时，如果需要额外的功能，你通常会直接将其添加到软件中。当你分发软件时，允许用户提供他们自己的额外功能通常很有用，特别是那些只与他们特定需求相关的功能。通常的做法是通过插件/扩展/附加组件类型系统来实现。实现插件的方法有千千万万种，下面\
  \ Anthony Ferrara 的文章概述了一些常见的插件设计模式以及如何在 PHP 中实现它们的示例。你也可以实现一个 API（应用程序编程接口），就像对网站那样，使用本书前面概述的方法之一（网络守护进程、共享内存、消息队列等）与“插件”进程进行通信。\n\
  \n| ![信息](img/image00248.jpeg) | **延伸阅读**“Handling Plugins In PHP”，作者 Anthony Ferrara\
  \ [`blog.ircmaxell.com/2012/03/handling-plugins-in-php.html`](http://blog.ircmaxell.com/2012/03/handling-plugins-in-php.html)“Build\
  \ APIs You Won’t Hate”，作者 Phil Sturgeon\n[`leanpub.com/build-apis-you-wont-hate`](https://leanpub.com/build-apis-you-wont-hate?a=0_YKAEBrn4BvyagDZlmBZy&subID=b)\
  \ |\n\n\n\n### 10.8 文档\n\n理想情况下，你的应用程序将非常易于使用，以至于用户无需任何文档，对吧？等你笑完，我们继续。你可能熟悉在 Web\
  \ 项目中提供最终用户文档和支持信息，但一个典型的软件项目需要的远不止这些。你还需要安装和升级文档、系统管理员信息、许可文档等等。如果你允许/鼓励用户修改代码，你可能甚至需要包含代码文档以及架构/设计文档。\n\
  \n你应该致力于在两个地方提供所有文档：在线版本和随软件一同发布的版本。随软件发布的副本允许用户在无法连接互联网，或者当你网站宕机（甚至你的公司倒闭...）时仍然可以访问。在线文档则提供了一个易于更新的来源，用于修正错误或补充信息，同时也允许潜在的用户/客户在不下载/购买软件的情况下进行评估。\n\
  \n最后，当你的软件广泛分发时，全面且高质量的文檔可以减少你收到的技术/用户支持请求数量。这通常能为你节省的时间远超撰写文档所花费的时间。\n\n| ![信息](img/image00248.jpeg)\
  \ | **延伸阅读** 维基百科上的软件文档 [`en.wikipedia.org/wiki/Software_documentation`](http://en.wikipedia.org/wiki/Software_documentation)\
  \ |\n\n### 10.9 许可与法律\n\n| ![警告](img/image00251.jpeg) |\n\n### 警告\n\n注意：以下以及本书其他地方提供的所有法律信息可能不正确，取决于您所在的司法管辖区，并且仅由非法律专业背景的作者在撰写时相信其为正确。这些信息仅供概述您可能希望针对特定项目考虑的主题。请务必咨询合格的法律专业人士以获取法律建议。睡前切勿喝咖啡。\n\
  \n如果你从 Web 开发环境转向（例如）桌面软件开发，那么花点时间思考一下在新编程模式下，特别是在进行商业编程时，许可和法律责任的后果与差异是值得的。在 Web\
  \ 上，你的“产品”通常是网站内容，而不是 `PHP` 脚本本身。销售软件则颠倒了这种情况，你精心打磨的 `PHP` 代码成为可销售的商品，而输出则属于最终用户。\n\
  \n法律适用于用 `PHP` 编写的软件，就像适用于任何其他语言编写的软件一样，因此本书不会探讨一般的法律问题。\n\n然而，有一个特定于 `PHP` 这类脚本软件的法律问题，那就是解释器本身的发布。每个\
  \ `PHP` 脚本都需要 `PHP` 二进制文件才能运行（假设你没有使用 `HipHop` 或类似工具编译代码），而大多数系统默认并未安装 `PHP`。幸运的是，`PHP`\
  \ 本身采用了一个宽松的、经过开源促进会（OSI）认证的许可证，被富有想象地命名为 `PHP 许可证`。除极少数限制外，你可以自由地将 `PHP` 代码库和编译好的二进制文件与你的应用程序一起发布。如果你选择对其进行修改或更改，那么值得检查一下该许可证（一份易于阅读、用简明英语写成的\
  \ 68 行文档），以确保你仍然合规。如果你完全不修改它们，那就放心使用吧！商业发布也没问题，对收费或将其与付费软件捆绑没有任何限制。\n\n另一个重要点是，该许可证仅涵盖\
  \ `PHP` 本身，而不包括你编写的任何 `PHP` 脚本，因此你可以根据你认为合适的任何许可证发布这些脚本。\n\n你还应该记住，`PHP` 是按“原样”提供的，因此在保修基础上，如果\
  \ `PHP` 中的错误给你或你的客户造成问题，你几乎无法（或者很可能无法）追索。同样，当你在产品中部署 `PHP` 时，`PHP` 团队也不会为你承担可能导致的专利侵权责任（在允许软件专利的国家）。然而，这些缺点在大多数编程语言中都很常见，无论是商业语言还是开源语言。\n\
  \n如果你希望避免自己发布 `PHP` 的问题，请记住，大多数带有软件仓库的现代操作系统都可以通过点击几下或一行代码来安装 `PHP`。如果你在 Linux 上以\
  \ `.deb` 或 `.rpm` 包的形式发布软件，你可以简单地将 `PHP` 列为必需的依赖项，让用户的包管理器为你处理它。\n\n与所有软件一样，你（不幸地）需要考虑所有相关法律，包括但不限于：版权、专利、商标、数据保护、贸易标准、消费者保护，以及你所在领域的任何监管要求。我们将把它留给读者（或他们的法律代表！）作为练习。\n\
