- fmt: "# Global Variables\n\nEarlier, you dealt with functions and used *local* variables\
    \ in them. Local variables are created in the body of a function (by assigning\
    \ a value to the variable) and exist while the function is operating. After executing\
    \ the function, the local variables are removed from memory. The next time the\
    \ function is called, local variables are created again, and everything repeats.\
    \ The situation is illustrated in the program in Listing [6-4](#613529_1_En_6_Chapter.xhtml#PC7).\n\
    \n```\nListing 6-4\nLocal Variables\n```\n\nThe following are the results of executing\
    \ the program.\n\n```\nThe output of the program (from Listing 6-4)\nThe local\
    \ variable $A = 100\nThe global variable $A = 200\n```\n\nYou use the `show()`\
    \ function, which creates a local variable `$A` with the value `100` in its body\
    \ and displays the variable’s value in the output window. Before calling the function,\
    \ you use the `$A=200` command to create the `$A` global variable with the value\
    \ `200`. When the `show()` function is called, the value `100` is displayed, while\
    \ the value of the global variable does not change. The explanation is simple:\
    \ the variable created when the `show()` function is called has nothing to do\
    \ with the `$A` global variable.\n\nOn the other hand, there are situations when,\
    \ in a function, it is necessary to perform operations on a variable declared\
    \ outside the function—that is, with a *global* variable. If so, then in the function,\
    \ you should indicate that the variable is global. To do that, you use the `global`\
    \ keyword, after which you put the name of the global variable. An example of\
    \ using global variables in a function is shown in Listing [6-5](#613529_1_En_6_Chapter.xhtml#PC9).\n\
    \n```\nListing 6-5\nGlobal Variables\n```\n\nThe program’s output is as follows.\n\
    \n```\nThe output of the program (from Listing 6-5)\n[1] In the function: $A =\
    \ 100\n[2] In the function: $A = 200\nThe variable $A = 200\n```\n\nIn the function’s\
    \ body, the `global $A` command declares that the `$A` variable is global. Next,\
    \ the variable’s value is displayed, the value `200` is assigned to it, and then\
    \ the value is checked again.\n\nIn the program, the `$A` variable is assigned\
    \ the value `100`. Then, you call the `show()` function and, after calling it,\
    \ check the value of the `$A` variable. All operations are performed with the\
    \ same `$A` global variable.\n\n> **Note**\n> The programming style, which implies\
    \ using global variables in functions, should not be called very successful. The\
    \ corresponding global variable is an \"external factor\" when a function is called.\
    \ That does not fit well with functional programming principles, according to\
    \ which the passed to the function arguments must determine its result.\n\n| Details\
    \ |\n| --- |\n| A built-in `$GLOBALS` array contains all global variables available\
    \ in the program. The array is accessible anywhere in the program and does not\
    \ need to be declared in any way. |\n\n## Static Variables\n\nQuite interesting\
    \ is the concept of *static variables*. Such a variable is declared with the `static`\
    \ keyword. It is not removed from memory after the function is terminated, and\
    \ the same variable is used for each subsequent function call. The program in\
    \ Listing [6-6](#613529_1_En_6_Chapter.xhtml#PC11) shows how static variables\
    \ can be used.\n\n```\n \",calc(),\"\\n\";\n}\n?>\nListing 6-6\nStatic Variables\n\
    ```\n\nThe result of the program execution may seem a little unexpected.\n\n```\n\
    The output of the program (from Listing 6-6)\n[1] calc() -> 100\n[2] calc() ->\
    \ 200\n[3] calc() -> 300\n[4] calc() -> 400\n[5] calc() -> 500\n```\n\nBriefly,\
    \ everything is simple. You have the `calc()` function that is called with no\
    \ arguments. The first time the function is called, the result is `100`. The second\
    \ time the function is called, the result is `200`. The third time, the function\
    \ returns `300`, and so on. Thus, you use the same instruction but get a new (predicted)\
    \ result each time. To understand why that happens, let’s analyze the code of\
    \ the `calc()` function.\n\nIn the function’s body, the `static $value=0` command\
    \ creates the static variable `$value` with the value `0`. Then, with the `$value+=100`\
    \ command, that value is incremented by `100` and returned as the result of the\
    \ function.\n\nLet’s see what happens when the function is called for the first\
    \ time. It’s simple: the `$value` variable is created, it gets the value `100`\
    \ after all, and the function returns the result. That completes the execution\
    \ of the function. If the `$value` variable were normal (not a static one), then\
    \ it would be removed from memory, and the next time the function is called, everything\
    \ would start with creating the new variable `$value`. But the variable is static.\
    \ Therefore, the variable is not deleted from memory after the function is terminated.\n\
    \nMoreover, the next time the `calc()` function is called, it is the variable\
    \ that is used, and with the value that the variable had at the last function\
    \ call. That value is incremented by `100` and returned as the result. It turns\
    \ out that each time the `calc()` function is called, the value of the `$value`\
    \ variable is increased by `100`. Therefore, the function returns a new value\
    \ each time.\n\n| Details |\n| --- |\n| The command that initializes the static\
    \ variable `$value` with the zero value is executed only once, the first time\
    \ the function is called. It is also worth mentioning that the `$value` variable\
    \ (despite being static) is available only in the function’s body. |"
