    The final drawing functions in this recipe are `ImageArc()` and `ImagePolygon()`,
    and as the name indicates these functions will draw an arch and a polygon. The
    center coordinates – width, height, and start and stop angles as well as a color
    describe the arc. Drawing an arch with 360 degrees between a start and stop angle
    will draw an ellipse.


    ```php

    // 8_18.php

    $img = ImageCreateTrueColor(50, 50);

    ImageFill($img, 0, 0, 0xffffff);

    ImageFilledArc($img, 5, 25, 70, 70, -45, 45, 0xFF0000, IMG_ARC_PIE);

    $f = $_GET[''f''] ?: ''gif'';

    switch (strtolower($f)) {

    case ''jpg'' :

    case ''jpeg'' :

    header(''Content-Type: image/jpeg'');

    ImageJPEG($img);

    break;

    case ''png'' :

    header(''Content-Type: image/png'');

    ImagePNG($img);

    break;

    default :

    header(''Content-Type: image/gif'');

    ImageGIF($img);

    break;

    }

    ImageDestroy($img);

    ```


    Note how the width and height is wider than the width and height of the image.
    The width and height represent the size of the ellipse if it was drawn from 0
    to 360 degrees.


    The last parameter called style determines how the object is drawn. This is a
    bitmapped value with four different options. `IMG_ARC_PIE` will draw a rounded
    arch and `IMG_ARC_CHORD` will connect the two points from the start to end angle
    with a straight line. These two values are mutually exclusive. The last two options
    are `IMG_ARC_NOFILL` (make it an outline) and `IMG_ARC_EDGED` (connect the point
    at the starting and ending angle to the center).


    ![Image 23](index-221_1.jpg)


    # CHAPTER 8 ■ DYNAMIC IMAGING


    The `ImageFilledArc()` and `ImageFilledPolygon()` take the same parameters but
    will fill the object entirely with the drawing color.


    So far we have seen how to draw objects described with a number of integer or
    float values. The `ImagePolygon()` function is a bit different because it works
    on an arbitrary number of points or coordinates.


    The coordinates are passed to the function as an array of integer values. Two
    integer values are needed for each point. The function needs at least three points
    to create a polygon. The last side of the polygon, the one that connects the last
    point to the first is handled automatically. No need to add the starting point
    as the last point of the array.


    ```php

    // 8_19.php

    $img = ImageCreateTrueColor(50, 50);

    ImageFill($img, 0, 0, 0xffffff);

    $points = [

    10, 10,

    45, 5,

    25, 25,

    45, 45,

    10, 40

    ];

    ImagePolygon($img, $points, sizeof($points) / 2, 0xFF0000);

    $f = $_GET[''f''] ?: ''gif'';

    switch (strtolower($f)) {

    case ''jpg'' :

    case ''jpeg'' :

    header(''Content-Type: image/jpeg'');

    ImageJPEG($img);

    break;

    case ''png'' :

    header(''Content-Type: image/png'');

    ImagePNG($img);

    break;

    default :

    header(''Content-Type: image/gif'');

    ImageGIF($img);

    break;

    }

    ImageDestroy($img);

    ```


