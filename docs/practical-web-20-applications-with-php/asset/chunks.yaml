    A Dynamic Image Gallery


    **S**o far, theweb application we have developedrestricts users to onlypublishing
    text-based information in their blogs. While we have allowed users a degree of
    control by permitting a limited subset of HTML to be used (including the use of
    the <img> tag), users are still unable to upload their own images. In this chapter,
    we will extend the functionality of our blogging system to allow users to upload
    one or more photos to each of their blog posts.


    While this may sound like a fairly trivial process, there are a number of different
    issues to consider, such as these:


    • **Storage of images.** We must store the images on the server and link them
    to blog posts.


    • **Sending images to browsers.** When a user views posts with images in them,
    we must send the images. This includes dealing with correct MIME headers as well
    as caching images in the user’s browser.


    • **Dynamic image sizing.** Since users will upload different sizes and types
    of images, we must manipulate the images for a consistent layout.


    We will simplify the process of image publishing by predetermining the layout
    of images within a blog post, although users will also have the ability to link
    to their images via the WYSIWYG editor we implemented in Chapter 7.


    One extra feature we will add will allow users to change the order in which their
    photos appear on a page. We will use Scriptaculous to provide a simple interface
    for reordering images, and we will use Ajax to save the order of the images. This
    will be similar to the example in Chapter 5.


    The steps we will cover in this chapter are as follows:


    **1.** Adding an image-upload form to the blog post preview page.


    **2.** Adding a new controller action to output uploaded images.


    **3.** Displaying images on blog posts.


    **4.** Displaying a thumbnail on the blog index for each post with images.


    **5.** Allowing users to reorder and delete images from each blog post.


