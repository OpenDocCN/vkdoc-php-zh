    the employee that is his or her boss (in this scenario the big boss would probably
    reference itself).'
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，对给定的英文文本进行翻译。\n\n\n现在你已经知道自己想要存储哪些数据了，我们来思考一下这三个部分是如何相互关联的。除了知道两个表中的记录*以某种方式*关联之外，你还需要了解它们之间的*关系类型*。现在，我们来仔细看看两个表之间可能存在的不同关联方式。\n\
    \n## 关系型数据与表关系\n\n为了继续探索关系型数据库的世界，让我们进一步分析到目前为止一直讨论的三个逻辑表。为了方便起见，现在给它们命名：包含产品的表是\
    \ `product`，包含类别的表是 `category`，最后一个是我们的老朋友 `department`。这并不意外！幸运的是，这些表实现了表之间最常用的关系类型，即**一对多**和**多对多**关系，因此你有机会学习它们。\n\
    \n> **注意：** 这两种关系类型存在一些变体，以及不太流行的一对一关系。在一对一关系中，一个表中的每一行都恰好匹配另一个表中的一行。\n>\n> 例如，在一个允许将患者分配到床位的数据库中，你希望患者和床位之间是一对一关系！数据库系统不支持强制执行这种关系，因为你必须同时在两个表中添加匹配的记录。\n\
    >\n> 此外，具有一对一关系的两个表可以连接成一个表。\n\n## 一对多关系\n\n当一个表中的一条记录可以与相关表中的多条记录相关联，但反之不成立时，就形成了一对多关系。在我们的案例中，这发生在\
    \ `department` – `category` 关系上。一个特定的部门可以包含任意数量的类别，但每个类别仅属于*唯一一个*部门。图 4-2 更好地展示了部门与类别之间的一对多关系。\n\
    \n另一个常见的一对多关系场景是 `order` – `order_details` 表，其中 `order` 包含订单的一般详细信息（如日期、总金额等），而\
    \ `order_details` 包含与订单相关的产品。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XCH04.qxd 10/31/06 10:01 PM 第 110 页\n\n**110**\n\n第 4 章 ■ 创建产品目录：第二部分\n\n\
    **department 表**\n\n**category 表**\n\n贝雷帽  \n鸭舌帽  \n帽子和贝雷帽  \n圣诞帽  \n节日  \n万圣节帽\
    \  \n化装帽  \n圣帕特里克节帽  \n戏剧帽  \n军帽\n\n**图 4-2.** *部门与类别之间的一对多关系*\n\n在数据库中，一对多关系是通过在关系的*多*方表中添加一个额外的列来实现的，该列引用了关系*一*方表中\
    \ ID 列。简单来说，在 `category` 表中，会有一个额外的列（称为 `department_id`），用于存储该类别所属部门的 ID。\n\n\
    稍后，在学习多对多关系和 `FOREIGN KEY` 约束之后，你将开始在数据库中实现这一关系。\n\n## 多对多关系\n\n另一种常见的关系类型是多对多关系。当关系双方表中的记录都可以在另一方表中有多条匹配记录时，就形成了这种关系。在我们的场景中，这发生在\
    \ `product` 和 `category` 表之间，因为我们知道一个产品可以存在于多个类别中（*一个*产品 – *多个*类别），同时一个类别也可以有多个产品（*一个*类别\
    \ – *多个*产品）。\n\n之所以会出现这种情况，是因为我们之前决定一个产品可以属于多个类别。如果一个产品只能属于一个类别，那么就会形成另一个一对多关系，就像部门与类别之间的关系一样（一个类别不能属于多个部门）。\n\
    \n如果你用图片来表示这种关系，就像之前图 4-2 所示，但这次使用通用名称，你会得到类似于图 4-3 所示的内容。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XCH04.qxd 10/31/06 10:01 PM 第 111 页\n\n第 4 章 ■ 创建产品目录：第二部分 **111**\n\n**category**\
    \ 表\n\n**product** 表\n\n产品 1  \n类别 1  \n产品 2  \n类别 2  \n产品 3  \n类别 3  \n产品 4 \
    \ \n产品 5\n\n**图 4-3.** *类别与产品之间的多对多关系*\n\n虽然在逻辑上多对多关系发生在两个表之间，但数据库（包括 PostgreSQL\
    \ 数据库）无法仅使用两个表在物理上实现这种关系，因此我们通过添加第三个表来“作弊”。这个第三个表称为**连接表**（也称为*链接表*或*关联表*），配合两个一对多关系，有助于实现多对多关系。连接表用于关联产品和类别，不限制一个类别可以有多少个产品，也不限制一个产品可以添加到多少个类别中。图\
    \ 4-4 展示了连接表的作用。\n\n**category** 表\n\n**Junction** 表\n\n**product** 表\n\n类别 1\
    \  \n产品 1  \n类别 1  \n产品 1  \n类别 1  \n产品 2  \n类别 2  \n产品 2  \n类别 1  \n产品 3  \n\
    产品 3  \n类别 2  \n产品 3\n\n**图 4-4.** *类别与产品之间的多对多关系*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XCH04.qxd 10/31/06 10:01 PM 第 112 页\n\n**112**\n\n第 4 章 ■ 创建产品目录：第二部分\n\n\
    注意，连接表中的每条记录都将一个类别与一个产品连接起来。你可以在连接表中拥有任意数量的记录，将任何类别与任何产品连接起来。\n\n这个链接表包含两个字段，每个字段分别引用两个链接表之一的主键。在我们的案例中，连接表将包含两个字段：`category_id`\
    \ 字段和 `product_id` 字段。\n\n连接表中的每条记录都包含一个 `(product_id, category_id)` 对，用于将特定的产品与特定的类别关联起来。通过向\
    \ `product_category` 表中添加更多记录，你可以将一个产品关联到更多类别，或将一个类别关联到更多产品，从而有效地实现多对多关系。\n\n\
    由于多对多关系是使用一个第三个表来建立链接表之间的连接，因此无需像我们在 `category` 表中添加 `department_id` 来实现一对多关系那样，向相关表中添加额外的字段。\n\
    \n连接表没有明确的命名约定。大多数情况下，将两个链接表的名称连接起来即可——在本例中，连接表被命名为 `product_category`。\n\n##\
    \ 使用 FOREIGN KEY 约束强制表关系\n\n可以使用 `FOREIGN KEY` 约束（简称*外键*）在数据库中物理地强制执行表之间的关系。\n\
    \n你在前一章已经学习了 `PRIMARY KEY` 和 `UNIQUE` 约束。我们之所以在那里介绍它们，是因为它们适用于作为独立实体的表。而外键则发生在两个表之间：定义外键的表（*引用表*）和外键引用的表（*被引用表*）。\n\
    \n> **提示：** 实际上，引用表和被引用表可以是同一个表。这在实际中不常见，但也并非罕见。例如，你可以有一个员工表，其中每个员工都引用其上级（在此场景中，大老板可能会引用自己）。\n"
- fmt: "# 外键（Foreign Key）\n\n**外键**是一个列或列的组合，用于强制两个表之间的数据链接（通常表示一对多关系）。外键既用作确保数据完整性的一种方法，也用于建立表之间的关系。\n\
    \n为了强制数据库完整性，外键与其他类型的约束一样，会应用某些限制。与将限制应用于单个表的`PRIMARY KEY`和`UNIQUE`约束不同，`FOREIGN\
    \ KEY`约束将限制应用于引用表和被引用表。例如，如果通过`FOREIGN KEY`约束强制`department`和`category`表之间的一对多关系，数据库将把此关系作为其完整性的一部分包含在内。它不允许您向不存在的部门添加类别，也不允许您删除存在属于它的类别的部门。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n`648XCH04.qxd 10/31/06 10:01\
    \ PM Page 113`\n\n**第4章 ■ 创建产品目录：第二部分 113**\n\n您现在了解了外键的一般理论。在以下练习中，您将通过创建并填充以下表来实践您所学到的关于表关系的新理论：\n\
    \n- `category`\n- `product`\n- `product_category`\n\n## 添加类别\n\n创建`category`表的过程与您在第二章中创建的`department`表基本相同。`category`表将有四个字段，如表4-1所述。\n\
    \n**表4-1.** *设计* `category` *表*\n\n| **字段名** | **数据类型** | **描述** |\n|------------|--------------|--------------------------------------------------------------------------------------------------|\n\
    | `category_id` | `SERIAL` | 一个表示类别唯一ID的整数。它是表的主键。 |\n| `department_id` | `INTEGER`\
    \ | 一个表示类别所属部门的整数。不允许为`NULL`。 |\n| `name` | `VARCHAR(50)` | 存储类别名称。不允许为`NULL`。\
    \ |\n| `description` | `VARCHAR(1000)` | 存储类别描述。允许为`NULL`。 |\n\n有两种方法可以创建`category`表并填充它。要么从Apress网站（http://www.apress.com/）的源代码/下载部分执行SQL脚本，要么按照以下练习中的步骤操作。\n\
    \n### 练习：创建`category`表\n\n1. 启动pgAdmin III，并连接到`hatshop`数据库。\n2. 选择 **工具 ➤ 查询工具**。\n\
    3. 输入以下代码：\n\n   ```sql\n   -- 创建 category 表\n   CREATE TABLE category\n   (\n\
    \       category_id SERIAL NOT NULL,\n       department_id INTEGER NOT NULL,\n\
    \       name VARCHAR(50) NOT NULL,\n       description VARCHAR(1000),\n      \
    \ CONSTRAINT pk_category_id PRIMARY KEY (category_id),\n       CONSTRAINT fk_department_id\
    \ FOREIGN KEY (department_id) REFERENCES department (department_id)\n       ON\
    \ UPDATE RESTRICT ON DELETE RESTRICT\n   );\n   ```\n\n   [www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n   ![](images/00017.png)\n\n   `648XCH04.qxd 10/31/06 10:01 PM Page 114`\n\n\
    \   **114 第4章 ■ 创建产品目录：第二部分**\n\n4. 通过选择 **查询 ➤ 执行** 或按F5键执行查询。结果如图4-5所示。\n\n\
    \   **图4-5.** *使用pgAdmin III创建* `category` *表*\n\n   > **提示** 执行此命令时，数据库将自动创建一个名为`category_category_id_seq`的序列，该序列将为`category_id`字段生成值。此外，您从第三章中了解到，将在主键列上创建一个索引。\n\
    \n## 工作原理：一对多关系\n\n好的，您已经创建并强制了`category`和`department`表之间的关系。但它是如何工作的，以及它如何影响您的操作？让我们研究一下如何实现这种关系。\n\
    \n在`category`表中，除了主键以及通常的`category_id`、`name`和`description`列之外，您还添加了一个`department_id`列。此列存储类别所属部门的ID。因为`category`表中的`department_id`字段不允许`NULL`，所以您必须为每个类别提供一个部门。此外，由于外键关系，数据库不允许您指定一个不存在的部门。\n\
    \n外键的行为由用于创建它的命令决定，在我们的例子中：\n\n```sql\nCONSTRAINT fk_department_id FOREIGN KEY\
    \ (department_id) REFERENCES department (department_id)\nON UPDATE RESTRICT ON\
    \ DELETE RESTRICT\n```\n\n可以指示约束对更新和删除操作采取不同的行为。在这里，两种情况下的行为都是`RESTRICT`。让我们看看替代方案：\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n`648XCH04.qxd 10/31/06 10:01\
    \ PM Page 115`\n\n**第4章 ■ 创建产品目录：第二部分 115**\n\n- **`RESTRICT`（类似于`NO ACTION`）：**\
    \ 这可能是最重要的选项。它告诉PostgreSQL确保涉及关系中的表的数据库操作不会破坏该关系。当设置此选项时，PostgreSQL不允许您向不存在的部门添加类别，也不允许您删除具有相关类别的部门。\n\
    - **`CASCADE`**：执行自动数据更改以维护数据完整性。例如，更改现有部门的ID将导致更改传播到`category`表，以保持类别-部门关联的完整性。这样，即使您更改了部门的ID，其类别仍将属于它。此选项很危险，因为当删除一个部门时，PostgreSQL会自动删除该部门的所有相关类别。这是一个敏感的选项，请非常小心。您不会在HatShop项目中使用它。\n\
    - **`SET NULL`**：当父表被更新或删除时，将外键字段设置为`NULL`。\n- **`SET DEFAULT`**：当父表被更新或删除时，将外键字段设置为其默认值。\n\
    \n在一对多关系（以及隐式的`FOREIGN KEY`约束）中，您链接来自两个不同表的两个列。其中一个列是主键，它定义了关系的“一”方。在我们的例子中，`department_id`是`department`表的主键，因此`department`是连接到多个`category`的那一方。主键必须位于“一”方以确保其唯一性——如果无法确保部门ID是唯一的，则类别无法链接到部门。您必须确保没有两个部门具有相同的ID；否则，这种关系就没有太大意义。\n\
    \n您可以在http://techdocs.postgresql.org/techdocs/hackingreferentialintegrity.php找到一篇关于PostgreSQL参照完整性的非常好的文章。\n\
    \n现在您已经创建了`category`表，可以用一些数据填充它。我们还将尝试添加会破坏您在`department`和`category`表之间建立的关系的数据。\n\
    \n我们将添加到`category`表的示例数据如表4-2所示。\n\n**表4-2.** *设计* `category` *表*\n\n| `category_id`\
    \ | `department_id` | `name` | `description` |\n|----------------|-----------------|---------------------------------|-----------------------------------------------------------|\n\
    | 1 | 1 | Christmas Hats | Enjoy browsing our collection of Christmas hats! |\n\
    | 2 | 1 | Halloween Hats | Find the hat you’ll wear this Halloween! |\n| 3 | 1\
    \ | St. Patrick’s Day Hats | Try one of these beautiful hats on St. Patrick’s\
    \ Day! |\n| 4 | 2 | Berets | An amazing collection of berets from all around the\
    \ world! |\n| 5 | 2 | Driving Caps | Be an original driver! Buy a driver’s hat\
    \ today! |\n| 6 | 2 | Theatrical Hats | Going to a costume party? Try one of these\
    \ hats to complete your costume! |\n| 7 | 3 | Military Hats | This collection\
    \ contains the most realistic replicas of military hats! |\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n`648XCH04.qxd 10/31/06 10:01 PM Page 116`\n\n**116 第4章 ■ 创建产品目录：第二部分**\n\n###\
    \ 练习：添加类别"
  raw: 'A **foreign key** is a column or combination of columns used to enforce a
    link between data in two tables (usually representing a One-to-Many relationship).
    Foreign keys are used both as a method of ensuring data integrity and to establish
    a relationship between tables.


    To enforce database integrity, the foreign keys, like the other types of constraints,
    apply certain restrictions. Unlike PRIMARY KEY and UNIQUE constraints that apply
    restrictions to a single table, the FOREIGN KEY constraint applies restrictions
    on both the referencing and referenced tables. For example, if you enforce the
    One-to-Many relationship between the department and category tables by using a
    FOREIGN KEY constraint, the database will include this relationship as part of
    its integrity. It will not allow you to add a category to a nonexistent department,
    nor will it allow you to delete a department if there are categories that belong
    to it.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH04.qxd 10/31/06 10:01 PM Page 113


    C H A P T E R 4 ■ C R E AT I N G T H E P R O D U C T C ATA L O G : PA RT I I **113**


    You now know the general theory of foreign keys. In the following exercises, you’ll
    put into practice the new theory you learned on table relationships by creating
    and populating these tables:


    • category


    • product


    • product_category


    **Adding Categories**


    The process of creating the category table is pretty much the same as for the
    department table you created in Chapter 2\. The category table will have four
    fields, described in Table 4-1.


    **Table 4-1.** *Designing the* category *Table* **Field Name**


    **Data Type**


    **Description**


    category_id


    SERIAL


    An integer that represents the unique ID for the


    category. It is the primary key of the table.


    department_id


    INTEGER


    An integer that represents the department the


    category belongs to. It doesn’t allow NULLs.


    name


    VARCHAR(50)


    Stores the category name. It does not allow


    NULLs.


    description


    VARCHAR(1000)


    Stores the category description. It allows NULLs.


    There are two ways to create the category table and populate it. Either execute
    the SQL


    scripts from the Source Code/Download section of the Apress web site (http://www.apress.com/)
    or follow the steps in the following exercise.


    **Exercise: Creating the category Table**


    **1.** Start pgAdmin III, and connect to the hatshop database.


    **2.** Select Tools ➤ Query Tool.


    **3.** Enter the following code:


    -- Create category table


    CREATE TABLE category


    (


    category_id SERIAL NOT NULL,


    department_id INTEGER NOT NULL,


    name VARCHAR(50) NOT NULL,


    description VARCHAR(1000),


    CONSTRAINT pk_category_id PRIMARY KEY (category_id),


    CONSTRAINT fk_department_id FOREIGN KEY (department_id) REFERENCES department
    (department_id)


    ON UPDATE RESTRICT ON DELETE RESTRICT


    );


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00017.png)


    648XCH04.qxd 10/31/06 10:01 PM Page 114


    **114**


    C H A P T E R 4 ■ C R E AT I N G T H E P R O D U C T C ATA L O G : PA RT I I **4.**
    Execute the query by selecting Query ➤ Execute, or by pressing F5\. The results
    can be seen in Figure 4-5.


    **Figure 4-5.** *Creating the* category *table using pgAdmin III*


    ■**Tip** When executing this command, the database will automatically create a
    sequence named category_category_id_seq that will generate the values for the
    category_id field. Also, as you know from Chapter 3, an index will be created
    on the primary key column.


    **How It Works: The One-to-Many Relationship**


    Okay, so you created and then enforced a relationship between the category and
    department tables. But how does it work, and how does it affect your life? Let’s
    study how you implemented this relationship.


    In the category table, apart from the primary key and the usual category_id, name,
    column, and description columns, you added a department_id column. This column
    stores the ID of the department the category belongs to. Because the department_id
    field in category doesn’t allow NULLs, you must supply a department for each category.
    Furthermore, because of the foreign key relationship, the database won’t allow
    you to specify a nonexistent department.


    The foreign key’s behavior is dictated by the command used to create it, which
    in our case is CONSTRAINT fk_department_id FOREIGN KEY (department_id) REFERENCES
    department (department_id)


    ON UPDATE RESTRICT ON DELETE RESTRICT


    The constraint can be instructed to act differently on update and delete operations.
    Here, in both cases the behavior is RESTRICT. Let’s see the alternatives:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH04.qxd 10/31/06 10:01 PM Page 115


    C H A P T E R 4 ■ C R E AT I N G T H E P R O D U C T C ATA L O G : PA RT I I **115**


    • **RESTRICT (similar to NO ACTION):** This is probably the most important of
    the options. It tells PostgreSQL


    to make sure that database operations on the tables involved in the relationship
    don’t break the relationship.


    When this option is set, PostgreSQL won’t allow you to add categories to nonexistent
    departments or delete departments that have related categories.


    • **CASCADE**: Performs automatic data changes to maintain the data integrity.
    For example, changing the ID of an existing department would cause the change
    to propagate to the category table to keep the category-department associations
    intact. This way, even after you change the ID of the department, its categories
    would still belong to it. This option is dangerous because when deleting a department,
    PostgreSQL automatically deletes all the department’s related categories. This
    is a sensitive option, so be very careful with it. You won’t use it in the HatShop
    project.


    • **SET NULL**: Sets the foreign key field to NULL when the parent is updated
    or deleted.


    • **SET DEFAULT**: Sets the foreign key field to its default value when the parent
    is updated or deleted.


    In the One-to-Many relationship (and implicitly the FOREIGN KEY constraint), you
    link two columns from two different tables. One of these columns is a primary
    key, and it defines the One part of the relationship. In our case, department_id
    is the primary key of department, so department is the one that connects to many
    categories. A primary key must be on the One part to ensure that it’s unique—a
    category can’t be linked to a department if you can’t be sure that the department
    ID is unique. You must ensure that no two departments have the same ID; otherwise,
    the relationship wouldn’t make much sense.


    You’ll find a very nice article on referential integrity with PostgreSQL at http://techdocs.postgresql.org/


    techdocs/hackingreferentialintegrity.php.


    Now that you’ve created the category table, you can populate it with some data.
    We’ll also try to add data that would break the relationship that you established
    between the department and category tables.


    The sample data that we’ll add to the category table is shown in Table 4-2.


    **Table 4-2.** *Designing the* category *Table* category_id


    department_id


    name


