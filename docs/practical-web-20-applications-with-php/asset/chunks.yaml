    **Creating a Print-Only Style Sheet**


    Many web sites offer a “print this page” link on their pages. Traditionally, this
    will link to another page on the site that repeats the content while stripping
    out all of the elements that have no relevance when printed (such as site navigation
    or a search form). By using print-only style sheets, we can mimic this behavior
    without the need for a secondary page of the same content. All we need to do is
    define styles for the print media type, as we saw earlier.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch06CMP2 11/13/07 7:56 PM Page 199


    C H A P T E R 6 ■ S T Y L I N G T H E W E B A P P L I C AT I O N


    **199**


    Before we do this, we should at least compare the two methods: using a secondary
    page as opposed to using a print style sheet. The advantages of using a print
    style sheet are as follows:


    • The user doesn’t need to navigate to another page in order to print content.


    • You, as the developer, don’t need to code in extra functionality to serve a
    stripped-down page (you will have to create a style sheet for this page anyway).


    • The server does not have to serve an extra page, reducing server load and bandwidth
    use.


    • Your web site statistics will be more accurate (although this isn’t much of
    a problem, since you could always filter these extra entries out).


    On the other hand, the advantages of using a secondary print page instead of a
    print style sheets are as follows:


    • It will make more sense to users, as they will be able to see that the content
    is indeed stripped down.


    • Users are more used to this method.


    • Users might want to print the page exactly as it appears on screen, but a print
    style sheet won’t allow them to do this (unless they use an advanced tool, which
    will allow them to block certain style sheets).


    • Users probably won’t rely on there being a print style sheet, because most developers
    don’t provide one.


    Note that the advantages of using secondary print pages stem from the fact that
    people are more used to using them. Ultimately, you must decide how you want to
    do this; since this is a book on Web 2.0 development, we will follow the CSS standard
    and implement code as it was intended. After all, adhering to standards was one
    of the aspects of Web 2.0 I defined in Chapter 1.


    Modifying the Screen Style Sheet


    There are essentially two key things we want to do in creating a print style sheet
    for our web application. The first is to hide elements that don’t need to be printed,
    which in this case means the navigation and left and right columns. The second
    is to add a header that will be printed on all pages.


    Typically, web browsers will strip out background colors and images when printing
    pages (users can generally change this setting, but most won’t). To deal with
    this, we will place a printer-friendly image in our HTML. This forces the browser
    to print the logo; however, we must then alter the screen style sheet so this
    image isn’t normally displayed on the screen.


    Listing 6-12 shows how we can add the printer-friendly logo to the header.tpl
    template.


    **Listing 6-12.** *Including a Printer-Friendly Logo in the Header Template (header.tpl)*


