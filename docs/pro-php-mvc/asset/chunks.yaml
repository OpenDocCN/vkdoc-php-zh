  raw: 'The include construct should instruct the template parser to fetch the contents
    of the tracking.html file (within the default application view folder) and place
    its contents directly into the template (to be processed with the main template).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ SEARCH


    Similarly, the partial construct should instruct the template parser to make a
    GET request to the provided URL, and place the results into the main template.
    While the include construct will return executable (subtemplate) code to the main
    template, the partial construct should return only the string results of a GET


    request to the main template.


    The set construct should instruct the template parser to take the data, contained
    within the opening/closing tags, and store it. This storage should be shared between
    all parsed templates, and any template should be able to retrieve the data stored.
    The append/prepend constructs are similar to the set construct, but they will
    not replace the data stored in a key. The prepend construct will insert the provided
    data before anything already stored in the same key, while the append construct
    will place the provided data after anything already stored in the same key.


    Finally, the yield construct will return any data stored, for that key, in the
    shared storage area.


    Extended Implementation


    We begin our extended template implementation by adding a few new protected properties
    to our implementation subclass. We also need to adjust the language map, which
    defines that grammar of our template language. Take a look at Listing 15-2 to
    see how we accomplish this.


    ***Listing 15-2.*** The Template\Implementation\Extended Class


    namespace Framework\Template\Implementation


    {


    use Framework\Request as Request;


    use Framework\Registry as Registry;


    use Framework\Template as Template;


    use Framework\StringMethods as StringMethods;


    use Framework\RequestMethods as RequestMethods;


    class Extended extends Standard


    {


