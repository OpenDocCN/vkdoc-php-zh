    **135**


    • parameters: The form data that is included in the request, regardless of whether
    it is a get or post request. Prototype can accept a wide variety of data formats
    here (such as a string you have already encoded, or simply a hash). It will convert
    the data into the required format to complete the request.


    The following is an example of an options hash that can be used for a Prototype
    Ajax request:


    <script type="text/javascript">


    var options = {


    method : ''post'',


    parameters : ''action=save&id=1234''


    };


    </script>


    And here is an example of getting the value of a text input field from the existing
    page and including it in the options hash:


    <input type="text" id="my-input" />


    <script type="text/javascript">


    function createOptions()


    {


    var options = {


    method : ''post'',


    parameters : ''action=save&id=1234'',


    postBody : ''someValue='' + $(''my-input'').getValue()


    };


    }


    </script>


    In this example, the getValue() function retrieves a form element’s value. This
    is a function added to form elements by Prototype so their values can be retrieved
    regardless of their type (whether textarea, checkbox, radio, or other type).


    **Ajax Callback Functions**


    For all Ajax requests you make with Prototype, there are a number of callback
    functions that can be defined. Each specified callback function will be called
    automatically at appropriate stages of the Ajax request lifecycle.


    ■**Note** You can perform Ajax requests without specifying any event callbacks;
    however, it will not be possible to use the returned result if you don’t define
    any callbacks. Sometimes you may not care about the response data, but most of
    the time you will.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


