- fmt: 'After making configuration changes, hitting “Apply” will redeploy your application
    with the given changes, which may take several minutes. If you have any problems
    with your running application, you can go to the “Logs” section and download and
    view the most recent log messages.


    # 11. Using the Google Cloud Platform


    Now that you have experience with multiple cloud providers, I hope that you are
    realizing that the basic components of clouds don’t really change all that much
    from provider to provider. Each one may call something different, may have a little
    different process for setting something up, or may have a few additional abilities
    or limitations compared to someone else. However, at their core, the basics of
    IaaS cloud hosting are pretty similar from provider to provider. This is itself
    an advantage of IaaS. It means that if you want to migrate from one IaaS to another,
    it is actually a fairly straightforward process. It may take planning and execution
    time, but, since the nodes themselves are under your control, you can make the
    environments pretty identical to each other.


    The next provider we are going to take a look at is the Google Cloud Platform
    (GCP). GCP is the new kid on the block, having been established in 2008 (Linode
    started in 2003, and AWS came online in 2006). GCP is very similar to AWS, although
    it is a bit more cumbersome to configure. You can get started with GCP by signing
    up at [`https://cloud.google.com`](https://cloud.google.com).


    ![../images/487291_1_En_11_Chapter/487291_1_En_11_Fig1_HTML.jpg](images/487291_1_En_11_Chapter/487291_1_En_11_Fig1_HTML.jpg)


    Figure 11-1 The GCP Welcome Screen


    ## 11.1 Setting Up Your Template Node


    The first thing to know about GCP is that everything is organized into “Projects.”
    Each project is kind of like its own account, each with their own resources, services,
    and so on, but all accessible within the same login. When you log in to the Google
    Cloud Platform, it should look something like Figure [11-1](#487291_1_En_11_Chapter.xhtml#Fig1).
    Notice on the top bar, next to the text “Google Cloud Platform,” it lists the
    name of your current project. You can click the current project to change projects
    or create a new one. For this example, I am going to create a new project called
    `Book Examples Project`.


    The left-hand side of the screen lists the GCP services. To create a new machine,
    go to the “Compute” section of the services, click “Compute Engine,” and then
    click “VM Instances.” GCP calls its machines (or nodes, as Linode calls them)
    “VM Instances.” To create a new machine, click the “Create Instance” button. That
    will bring up a screen similar to Figure [11-2](#487291_1_En_11_Chapter.xhtml#Fig2)


    We will call our machine `template-node` and choose the smallest machine type
    (`f1-micro` in this case). For the boot disk, we will choose CentOS 7. As you
    scroll down, there is a “Firewall” section. Make sure that “Allow HTTP Traffic”
    and “Allow HTTPS Traffic” are both enabled. The rest of the defaults you can leave
    alone. When everything is set, click “Create” and GCP will create a new machine
    for you, and return you to the VM Listing screen.


    ![../images/487291_1_En_11_Chapter/487291_1_En_11_Fig2_HTML.jpg](images/487291_1_En_11_Chapter/487291_1_En_11_Fig2_HTML.jpg)


    Figure 11-2 Creating a GCP VM Instance


    When the machine is created, you can log in using the “Connect” option. In the
    drop-down menu in the “Connect” column, choose “Open in Browser Window,” and it
    will give you an `ssh` session in your browser.


    This installation of CentOS is very similar to the Linode installation, except
    that (a) it doesn’t include `nano` (which you can fix with a simple `yum install
    -y nano`), and (b) it autocreates a user for you and logs you in as that user.
    You can easily switch to root by running the command:


    ```

    sudo su -

    ```


    From that point, you can install `nano` and perform all of the configuration steps
    outlined in Chapters [3](#487291_1_En_3_Chapter.xhtml) and [4](#487291_1_En_4_Chapter.xhtml)
    essentially identically.


    ![../images/487291_1_En_11_Chapter/487291_1_En_11_Figa_HTML.jpg](images/487291_1_En_11_Chapter/487291_1_En_11_Figa_HTML.jpg)


    ### Public VS. Private IP Addresses


    One interesting difference between GCP and Linode is that, on Linode, your node’s
    public IP address is physically attached to your node. That is, when you issue
    `ip addr show`, it shows the public IP address. When you add a private IP address,
    it adds that private IP address to your node.


    However, in GCP, your node *starts out* with both a private address and a public
    address. However, the private address is the only one that is physically mapped
    to the device. The public IP address is configured on the networking equipment
    to forward those requests to your machine.


    Therefore, on all your configurations on your machine, you will use the private
    IP address that comes on your box. Additionally, you don’t have to worry about
    only listening on your private IP address, because that’s really all you have
    anyway. The GCP networking controls what services can get to your box from outside
    (this is why you checked the HTTP and HTTPS boxes when setting up your VM Instances—to
    tell GCP to route these types of requests to your private IP address).


    Basically, unless otherwise specified, everything in GCP is restricted to the
    local network.


    ## 11.2 Setting Up Your Database Server for Remote Access


    In order to use our `template-node` as a database server, we will need to prepare
    the box for remote access to our database. To do that, we need to do the following:


    1.  Modify `/var/lib/pgsql/data/postgresql.conf` and set `listen_addresses=''*''`.
    We don’t *have* to set it to the private IP address specifically, because that
    is the only IP address we have anyway, and it won’t be accessible from the Internet
    unless we configure GCP to allow it. Restart PostgreSQL with `systemctl restart
    postgresql` so that the changes take effect.


    2.  Change the firewall so that we allow connections to the PostgreSQL server.
    This will be the commands `firewall-cmd --add-port 5432/tcp` and the same command
    with the `--permanent` flag attached.


    3.  Modify the PHP code `getReadOnlyConnection()` and `getReadWriteConnection()`
    so that they connect to the correct private IP address.


    Now the server is ready to be used by a load-balanced cluster.'
