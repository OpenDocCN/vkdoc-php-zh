    \ 则成为 `Rectangle` 的子类。除了自己的成员之外，`Square` 还获得了 `Rectangle` 中所有可访问（非私有）的成员，包括任何构造函数。\n\
    \n```php\n// 父类（基类）\nclass Rectangle\n{\n  public $x, $y;\n  function __construct($a,\
    \ $b)\n  {\n    $this->x = $a;\n    $this->y = $b;\n  }\n}\n\n// 子类（派生类）\nclass\
    \ Square extends Rectangle {}\n```\n\n当创建 `Square` 的实例时，现在必须指定两个参数，因为 `Square`\
    \ 继承了 `Rectangle` 的构造函数。\n\n```php\n$s = new Square(5,10);\n```\n\n从 `Rectangle`\
    \ 继承的属性也可以从 `Square` 对象中访问。\n\n```php\n$s->x = 5; $s->y = 10;\n```\n\nPHP 中的一个类只能继承自一个父类，并且父类必须在脚本文件中先于子类定义。\n\
    \n### 覆盖成员\n\n子类中的成员可以重新定义其父类中的成员，以提供新的实现。要覆盖一个继承来的成员，只需使用相同的名称重新声明它即可。如下所示，`Square`\
    \ 构造函数覆盖了 `Rectangle` 中的构造函数。\n\n```php\nclass Square extends Rectangle\n{\n \
    \ function __construct($a)\n  {\n    $this->x = $a;\n    $this->y = $a;\n  }\n\
    }\n```\n\n使用这个新的构造函数，只需要一个参数来创建 `Square`。\n\n```php\n$s = new Square(5);\n```\n\
    \n因为继承自 `Rectangle` 的构造函数被覆盖了，所以在创建 `Square` 对象时，`Rectangle` 的构造函数将不再被调用。如有必要，由开发者负责去调用父类的构造函数。这可以通过在调用前面加上\
    \ `parent` 关键字和双冒号来实现。双冒号被称为作用域解析运算符（`::`）。\n\n```php\nclass Square extends Rectangle\n\
    {\n  function __construct($a)\n  {\n    parent::__construct($a,$a);\n  }\n}\n\
    ```\n"
- fmt: "# `parent` Keyword\n\nThe `parent` keyword is an alias for the parent’s class\
    \ name, which may alternatively be used. In PHP, it is possible to access overridden\
    \ members that are any number of levels deep in the inheritance hierarchy using\
    \ this notation.\n\n```\nclass Square extends Rectangle\n{\n  function __construct($a)\n\
    \  {\n    Rectangle::__construct($a,$a);\n  }\n}\n```\n\nLike constructors, the\
    \ parent destructor will not be called implicitly if it is overridden. It too\
    \ would have to be explicitly called with `parent::__destruct()` from the child\
    \ destructor.\n\n# Final Keyword\n\nTo stop a child class from overriding a method\
    \ it can be defined as `final`. A class itself can also be defined as `final`\
    \ to prevent any class from extending it.\n\n```\nfinal class NotExtendable\n\
    {\n  final function notOverridable() {}\n}\n```\n\n# `instanceof` Operator\n\n\
    As a safety precaution, you can test to see whether an object can be cast to a\
    \ specific class by using the `instanceof` operator. This operator returns `true`\
    \ if the left side object can be cast into the right side type without causing\
    \ an error. This is `true` when the object is an instance of, or inherits from,\
    \ the right side class.\n\n```\n$s = new Square(5);\n$s instanceof Square;   \
    \ // true\n$s instanceof Rectangle; // true\n```\n\n# Chapter 11: Access Levels\n\
    \n![image](images/frontdot.jpg)\n\nEvery class member has an accessibility level\
    \ that determines where the member will be visible. There are three of them available\
    \ in PHP: `public`, `protected` and `private`.\n\n```\nclass MyClass\n{\n  public\
    \    $myPublic;    // unrestricted access\n  protected $myProtected; // enclosing\
    \ or child class\n  private   $myPrivate;   // enclosing class only\n}\n```\n\n\
    ## Private Access\n\nAll members regardless of access level are accessible in\
    \ the class in which they are declared, the enclosing class. This is the only\
    \ place where a private member can be accessed.\n\n```\nclass MyClass\n{\n  public\
    \    $myPublic    = 'public';\n  protected $myProtected = 'protected';\n  private\
    \   $myPrivate   = 'private';\n\nfunction test()\n  {\n    echo $this->myPublic;\
    \    // allowed\n    echo $this->myProtected; // allowed\n    echo $this->myPrivate;\
    \   // allowed\n  }\n}\n```\n\nUnlike properties, methods do not have to have\
    \ an explicit access level specified. They will default to `public` access unless\
    \ set to another level.\n\n## Protected Access\n\nA protected member can be accessed\
    \ from inside of child or parent classes as well as from within the enclosing\
    \ class.\n\n```\nclass MyChild extends MyClass\n{\n  function test()\n  {\n\n\
    echo $this->myPublic;    // allowed\n    echo $this->myProtected; // allowed\n\
    \    echo $this->myPrivate;   // inaccessible\n  }\n}\n```\n\n## Public Access\n\
    \nPublic members have unrestricted access. In addition to anywhere a protected\
    \ member can be accessed, a public member can also be reached through an object\
    \ variable.\n\n```\n$m = new MyClass();\necho $m->myPublic;    // allowed\necho\
    \ $m->myProtected; // inaccessible\necho $m->myPrivate;   // inaccessible\n```\n\
    \n## `var` Keyword\n\nBefore PHP 5 the `var` keyword was used to declare properties.\
    \ In order to maintain backward compatibility this keyword is still usable and\
    \ gives `public` access just as the `public` modifier.\n\n```\nclass MyVars\n\
    {\n  var $x, $y; // deprecated property declaration\n}\n```\n\n## Object Access\n\
    \nIn PHP, objects of the same class have access to each other’s private and protected\
    \ members. This behavior is different from many other programming languages where\
    \ such access is not allowed.\n\n```\nclass MyClass\n{\n  private $myPrivate;\n\
    \nfunction setPrivate($obj, $val) {\n    $obj->myPrivate = $val; // set private\
    \ property\n  }\n}\n$a = new MyClass();\n$b = new MyClass();\n$a->setPrivate($b,\
    \ 10);\n```\n\n## Access Level Guideline\n\nAs a guideline, when choosing an access\
    \ level it is generally best to use the most restrictive level possible. This\
    \ is because the more places a member can be accessed the more places it can be\
    \ accessed incorrectly, which makes the code harder to debug. Using restrictive\
    \ access levels will also make it easier to modify the class without breaking\
    \ the code for any other developers using that class.\n\n# Chapter 12"
  raw: 'The `parent` keyword is an alias for the parent’s class name, which may alternatively
    be used. In PHP, it is possible to access overridden members that are any number
    of levels deep in the inheritance hierarchy using this notation.


    ```

    class Square extends Rectangle

    {

      function __construct($a)

      {

        Rectangle::__construct($a,$a);

      }

    }

    ```


    Like constructors, the parent destructor will not be called implicitly if it is
    overridden. It too would have to be explicitly called with `parent::__destruct()`
    from the child destructor.


    Final keyword


    To stop a child class from overriding a method it can be defined as final. A class
    itself can also be defined as final to prevent any class from extending it.


    ```

    final class NotExtendable

    {

      final function notOverridable() {}

    }

    ```


    Instanceof operator


    As a safety precaution, you can test to see whether an object can be cast to a
    specific class by using the `instanceof` operator. This operator returns `true`
    if the left side object can be cast into the right side type without causing an
    error. This is `true` when the object is an instance of, or inherits from, the
    right side class.


    ```

    $s = new Square(5);

    $s instanceof Square;    // true

    $s instanceof Rectangle; // true

    ```


    CHAPTER 11


    ![image](images/frontdot.jpg)


    Access Levels


    Every class member has an accessibility level that determines where the member
    will be visible. There are three of them available in PHP: public, protected and
    private.


    ```

    class MyClass

    {

      public    $myPublic;    // unrestricted access

      protected $myProtected; // enclosing or child class

      private   $myPrivate;   // enclosing class only

    }

    ```


    Private access


    All members regardless of access level are accessible in the class in which they
    are declared, the enclosing class. This is the only place where a private member
    can be accessed.


    ```

    class MyClass

    {

      public    $myPublic    = ''public'';

      protected $myProtected = ''protected'';

      private   $myPrivate   = ''private'';


    function test()

      {

        echo $this->myPublic;    // allowed

        echo $this->myProtected; // allowed

        echo $this->myPrivate;   // allowed

      }

    }

    ```


    Unlike properties, methods do not have to have an explicit access level specified.
    They will default to public access unless set to another level.


    Protected access


    A protected member can be accessed from inside of child or parent classes as well
    as from within the enclosing class.


    ```

    class MyChild extends MyClass

    {

      function test()

      {


    echo $this->myPublic;    // allowed

        echo $this->myProtected; // allowed

        echo $this->myPrivate;   // inaccessible

      }

    }

    ```


    Public access


    Public members have unrestricted access. In addition to anywhere a protected member
    can be accessed, a public member can also be reached through an object variable.


    ```

    $m = new MyClass();

    echo $m->myPublic;    // allowed

    echo $m->myProtected; // inaccessible

    echo $m->myPrivate;   // inaccessible

    ```


    Var keyword


    Before PHP 5 the `var` keyword was used to declare properties. In order to maintain
    backward compatibility this keyword is still usable and gives public access just
    as the `public` modifier.


    ```

    class MyVars

    {

      var $x, $y; // deprecated property declaration

    }

    ```


    Object access


    In PHP, objects of the same class have access to each other’s private and protected
    members. This behavior is different from many other programming languages where
    such access is not allowed.


    ```

    class MyClass

    {

      private $myPrivate;


    function setPrivate($obj, $val) {

        $obj->myPrivate = $val; // set private property

      }

    }

    $a = new MyClass();

    $b = new MyClass();

    $a->setPrivate($b, 10);

    ```


    Access level guideline


    As a guideline, when choosing an access level it is generally best to use the
    most restrictive level possible. This is because the more places a member can
    be accessed the more places it can be accessed incorrectly, which makes the code
    harder to debug. Using restrictive access levels will also make it easier to modify
    the class without breaking the code for any other developers using that class.


    CHAPTER 12'
  trans: "\n# `parent` 关键字\n\n`parent` 关键字是父类类名的别名，可用于替代父类名称。在 PHP 中，可以使用这种表示法访问继承层次结构中任意深度的被重写成员。\n\
    \n```\nclass Square extends Rectangle\n{\n  function __construct($a)\n  {\n  \
    \  Rectangle::__construct($a,$a);\n  }\n}\n```\n\n与构造函数类似，如果父类析构函数被子类重写，则不会隐式调用。同样需要在子类析构函数中通过\
    \ `parent::__destruct()` 显式调用。\n\n# Final 关键字\n\n为了阻止子类重写某个方法，可将其定义为 `final`。类本身也可以定义为\
    \ `final`，以防止任何类对其进行扩展。\n\n```\nfinal class NotExtendable\n{\n  final function\
    \ notOverridable() {}\n}\n```\n\n# `instanceof` 运算符\n\n作为安全防范措施，你可以使用 `instanceof`\
    \ 运算符测试对象是否能被强制转换为特定类。如果左侧对象能转换为右侧类型且不会引发错误，则该运算符返回 `true`。当对象是右侧类的实例或继承自右侧类时，结果为\
    \ `true`。\n\n```\n$s = new Square(5);\n$s instanceof Square;    // true\n$s instanceof\
    \ Rectangle; // true\n```\n\n# 第 11 章：访问级别\n\n![image](img/frontdot.jpg)\n\n每个类成员都有一个可见性级别，决定了该成员在哪些位置可以被访问。PHP\
    \ 中有三种可见性级别：`public`、`protected` 和 `private`。\n\n```\nclass MyClass\n{\n  public\
    \    $myPublic;    // 无限制访问\n  protected $myProtected; // 所属类或子类\n  private  \
    \ $myPrivate;   // 仅所属类\n}\n```\n\n## Private 访问\n\n所有成员（无论其访问级别如何）都可以在其声明所在的类（即所属类）中访问。这是私有成员唯一能被访问的位置。\n\
    \n```\nclass MyClass\n{\n  public    $myPublic    = 'public';\n  protected $myProtected\
    \ = 'protected';\n  private   $myPrivate   = 'private';\n\nfunction test()\n \
    \ {\n    echo $this->myPublic;    // 允许\n    echo $this->myProtected; // 允许\n\
    \    echo $this->myPrivate;   // 允许\n  }\n}\n```\n\n与属性不同，方法不需要显式指定访问级别。除非设置为其他级别，否则默认访问级别为\
    \ `public`。\n\n## Protected 访问\n\n受保护成员可以在子类、父类以及所属类内部访问。\n\n```\nclass MyChild\
    \ extends MyClass\n{\n  function test()\n  {\n\necho $this->myPublic;    // 允许\n\
    \    echo $this->myProtected; // 允许\n    echo $this->myPrivate;   // 不可访问\n  }\n\
    }\n```\n\n## Public 访问\n\n公共成员拥有无限制的访问权限。除了受保护成员可被访问的位置外，公共成员还可以通过对象变量进行访问。\n\n\
    ```\n$m = new MyClass();\necho $m->myPublic;    // 允许\necho $m->myProtected; //\
    \ 不可访问\necho $m->myPrivate;   // 不可访问\n```\n\n## `var` 关键字\n\n在 PHP 5 之前，`var`\
    \ 关键字用于声明属性。为了保持向后兼容性，该关键字现在仍可使用，并且与 `public` 修饰符一样，赋予属性 `public` 访问级别。\n\n```\n\
    class MyVars\n{\n  var $x, $y; // 已弃用的属性声明方式\n}\n```\n\n## 对象访问\n\n在 PHP 中，同一个类的对象可以互相访问彼此的私有成员和受保护成员。这一行为与许多不允许此类访问的编程语言不同。\n\
    \n```\nclass MyClass\n{\n  private $myPrivate;\n\nfunction setPrivate($obj, $val)\
    \ {\n    $obj->myPrivate = $val; // 设置私有属性\n  }\n}\n$a = new MyClass();\n$b =\
    \ new MyClass();\n$a->setPrivate($b, 10);\n```\n\n## 访问级别指南\n\n作为指导原则，在选择访问级别时，通常应尽可能使用限制性最强的级别。这是因为成员可被访问的位置越多，其被错误访问的可能性就越大，从而增加代码调试难度。使用限制性的访问级别还能让你更轻松地修改类，而不会破坏使用该类的其他开发者的代码。\n\
    \n# 第 12 章\n"
- fmt: "# Static\n\n`static`关键字用于声明无需创建类实例即可访问的属性和方法。静态（类）成员只存在一份副本，属于类本身；而实例（非静态）成员则为每个新对象创建新的副本。\n\
    \n```\nclass MyCircle\n{\n  // Instance members (one per object)\n  public $r\
    \ = 10;\n  function getArea() {}\n\n// Static/class members (only one copy)\n\
    \  static $pi = 3.14;\n  static function newArea($a) {}\n}\n```\n\n静态方法不能使用实例成员，因为这些方法不属于任何实例。但它们可以使用其他静态成员。\n\
    \n## 引用静态成员\n\n与实例成员不同，静态成员不能使用单箭头运算符（`->`）访问。相反，要在类内部引用静态成员，必须使用`self`关键字后跟作用域解析运算符（`::`）作为前缀。`self`关键字是类名的别名，因此也可以直接使用实际的类名。\n\
    \n```\nstatic function newArea($a)\n{\n  return self::$pi * $a * $a;     // ok\n\
    \  return MyCircle::$pi * $a * $a; // alternative\n}\n```\n\n同样的语法也用于从实例方法中访问静态成员。请注意，与静态方法不同，实例方法可以同时使用静态成员和实例成员。\n\
    \n```\nfunction getArea()\n{\n  return self::newArea($this->$r);\n}\n```\n\n要从类外部访问静态成员，需要使用类名后跟作用域解析运算符（`::`）。\n\
    \n```\nclass MyCircle\n{\n  static $pi = 3.14;\n\nstatic function newArea($a)\n\
    \  {\n    return self::$pi * $a * $a;\n  }\n}\n\necho MyCircle::$pi;         //\
    \ \"3.14\"\necho MyCircle::newArea(10); // \"314\"\n```\n\n静态成员的优势在于，无需创建类的实例即可使用它们。因此，如果方法独立于实例变量执行通用功能，应将其声明为静态。同样，如果变量只需要一个实例，则应将属性声明为静态。\n\
    \n## 静态变量\n\n可以将局部变量声明为静态，以使函数记住其值。这种静态变量只存在于局部函数的作用域内，但在函数结束后不会丢失其值。例如，这可用于统计函数被调用的次数。\n\
    \n```\nfunction add()\n{\n  static $val = 0;\n  echo $val++;\n}\n\nadd(); // \"\
    0\"\nadd(); // \"1\"\nadd(); // \"2\"\n```\n\n静态变量被赋予的初始值只会被设置一次。请记住，静态属性和静态变量只能使用常量进行初始化，而不能使用表达式（例如另一个变量或函数返回值）。\n\
    \n## 后期静态绑定\n\n如前所述，`self`关键字是所在类的类名的别名。这意味着即使从子类的上下文中调用，该关键字也将引用其所在类。\n\n```\n\
    class MyParent\n{\n  protected static $val = 'parent';\n\npublic static function\
    \ getVal()\n  {\n    return self::$val;\n  }\n}\n\nclass MyChild extends MyParent\n\
    {\n  protected static $val = 'child';\n}\n\necho MyChild::getVal(); // \"parent\"\
    \n```\n\n要使类引用解析为实际的调用类，需要使用`static`关键字代替`self`关键字。此特性称为后期静态绑定，从 PHP 5.3 开始引入。\n\
    \n```\nclass MyParent\n{\n  protected static $val = 'parent';\n\npublic static\
    \ function getLateBindingVal()\n  {\n    return static::$val;\n  }\n}\n\nclass\
    \ MyChild extends MyParent\n{\n  protected static $val = 'child';\n}\n\necho MyChild::getLateBindingVal();\
    \ // \"child\"\n```\n\n# 第十三章\n\n# Constants\n\n常量是一种值在脚本中无法改变的变量。因此，该值必须在创建常量时同时赋值。PHP\
    \ 提供了两种创建常量的方法：`const`修饰符和`define`函数。\n\n## Const\n\n`const`修饰符用于创建类常量。与常规属性不同，类常量不需要指定访问级别，因为它们始终是公开可见的。它们也不使用美元符号解析令牌（`$`）。常量的命名约定是全大写，单词之间用下划线分隔。\n\
    \n```\nclass MyCircle\n{\n  const PI = 3.14;\n}\n```\n\n常量在创建时必须赋值。与静态属性一样，常量只能使用常量值进行初始化，而不能使用表达式。类常量的引用方式与静态属性相同，只是它们不使用美元符号。\n\
    \n```\necho MyCircle::PI; // \"3.14\"\n```\n\n`const`修饰符不能应用于局部变量或参数。但是，从 PHP\
    \ 5.3 开始，`const`可用于创建全局常量。此类常量在全局作用域中定义，可以在脚本中的任何位置访问。\n\n```\nconst PI = 3.14;\n\
    echo PI; // \"3.14\"\n```\n\n## Define\n\n`define`函数可以创建全局和局部常量，但不能创建类常量。该函数的第一个参数是常量的名称，第二个参数是其值。\n\
    \n```\ndefine('DEBUG', 1);\n```\n\n就像使用`const`创建的常量一样，`define`创建的常量在使用时也不带美元符号，并且其值不能被修改。\n\
    \n```\necho DEBUG; // \"1\"\n```\n\n与`const`创建的常量类似，`define`的值可以是任何标量数据类型：整数、浮点数、字符串或布尔值。但是，与`const`不同，`define`函数允许在赋值中使用表达式，例如变量或数学表达式的结果。\n\
    \n```\ndefine('ONE', 1);     // 1\ndefine('TWO', ONE+1); // 2\n```\n\n常量默认区分大小写。但是，`define`函数接受第三个可选参数，将其设置为`true`可以创建不区分大小写的常量。\n\
    \n```\ndefine('DEBUG', 1, true);\necho debug; // \"1\"\n```\n\n要检查常量是否已存在，可以使用`defined`函数。此函数适用于使用`const`和`define`创建的常量。\n\
    \n```\nif (!defined('PI'))\n  define('PI', 3.14);\n```\n\n## Const 和 Define\n\n\
    `const`修饰符创建一个编译时常量，因此编译器会将所有使用该常量的地方替换为其值。相比之下，`define`创建一个运行时常量，该常量直到运行时才被设置。这就是为什么`define`常量可以被赋予表达式的值，而`const`要求在编译时就已知常量的值。\n\
    \n```\nconst PI = 3.14;         // compile-time constant\ndefine('BIT_2', 1 <<\
    \ 2); // run-time constant\n```\n\n只有`const`可以用于类常量，只有`define`可以用于局部常量。然而，在创建全局常量时，`const`和`define`都允许。在这种情况下，通常优先使用`const`。因为`const`是一种语言结构，比作为函数的`define`更易读。编译时常量也比运行时常量稍快。唯一的例外是当需要条件定义常量，或需要表达式的值时，此时必须使用`define`。\n\
    \n## 常量使用指南\n\n通常，如果变量的值不需要更改，最好创建常量而不是变量。这可以确保这些变量不会在脚本中的任何地方被意外更改，从而有助于防止错误。\n\
    \n## 魔术常量\n\nPHP 提供了八个预定义常量。这些被称为魔术常量，因为它们的值会根据使用位置而变化。\n\n| 名称 | 描述 |\n| ---\
    \ | --- |\n| `__LINE__` | 文件中的当前行号。 |\n| `__FILE__` | 文件的完整路径和文件名。 |\n| `__DIR__`\
    \ | 文件所在的目录。 |\n| `__FUNCTION__` | 函数名称。 |\n| `__CLASS__` | 类名（包括命名空间）。 |\n| `__TRAIT__`\
    \ | Trait 名称（包括命名空间）。 |\n| `__METHOD__` | 类的方法名。 |\n| `__NAMESPACE__` | 当前命名空间。\
    \ |"
  raw: '![image](images/frontdot.jpg)


    Static


    The `static` keyword can be used to declare properties and methods that can be
    accessed without having to create an instance of the class. Static (class) members
    only exist in one copy, which belongs to the class itself, whereas instance (non-static)
    members are created as new copies for each new object.


    ```

    class MyCircle

    {

      // Instance members (one per object)

      public $r = 10;

      function getArea() {}


    // Static/class members (only one copy)

      static $pi = 3.14;

      static function newArea($a) {}

    }

    ```


    Static methods cannot use instance members since these methods are not part of
    an instance. They can however use other static members.


    Referencing static members


    Unlike instance members, static members are not accessed using the single arrow
    operator (`->`). Instead, in order to reference static members inside a class
    the member must be prefixed with the `self` keyword followed by the scope resolution
    operator (`::`). The `self` keyword is an alias for the class name, so alternatively
    the actual name of the class can be used.


    ```

    static function newArea($a)

    {

      return self::$pi * $a * $a;     // ok

      return MyCircle::$pi * $a * $a; // alternative

    }

    ```


    This same syntax is used to access static members from an instance method. Note
    that in contrast to static methods, instance methods can use both static and instance
    members.


    ```

    function getArea()

    {

      return self::newArea($this->$r);

    }

    ```


    To access static members from outside the class the name of the class needs to
    be used followed by the scope resolution operator (`::`).


    ```

    class MyCircle

    {

      static $pi = 3.14;


    static function newArea($a)

      {

        return self::$pi * $a * $a;

      }

    }


    echo MyCircle::$pi;         // "3.14"

    echo MyCircle::newArea(10); // "314"

    ```


    The advantage of static members can be seen here in that they can be used without
    having to create an instance of the class. Methods should therefore be declared
    static if they perform a generic function independently of instance variables.
    Likewise, properties should be declared static if there is only need for a single
    instance of the variable.


    Static variables


    Local variables can be declared static to make the function remember its value.
    Such a static variable only exists in the local function’s scope, but it does
    not lose its value when the function ends. This can for example be used to count
    the number of times a function is called.


    ```

    function add()

    {

      static $val = 0;

      echo $val++;

    }


    add(); // "0"

    add(); // "1"

    add(); // "2"

    ```


    The initial value that a static variable is given will only be set once. Keep
    in mind that static properties and static variables may only be initialized with
    a constant and not with an expression, such as another variable or a function
    return value.


    Late static bindings


    As mentioned before, the `self` keyword is an alias for the class name of the
    enclosing class. This means that the keyword will refer to its enclosing class
    even when it is called from the context of a child class.


    ```

    class MyParent

    {

      protected static $val = ''parent'';


    public static function getVal()

      {

        return self::$val;

      }

    }


    class MyChild extends MyParent

    {

      protected static $val = ''child'';

    }


    echo MyChild::getVal(); // "parent"

    ```


    To get the class reference to evaluate to the actual calling class, the `static`
    keyword needs to be used instead of the `self` keyword. This feature is called
    late static bindings and was added in PHP 5.3.


    ```

    class MyParent

    {

      protected static $val = ''parent'';


    public static function getLateBindingVal()

      {

        return static::$val;

      }

    }


    class MyChild extends MyParent

    {

      protected static $val = ''child'';

    }


    echo MyChild::getLateBindingVal(); // "child"

    ```


    CHAPTER 13


    ![image](images/frontdot.jpg)


    Constants


    A constant is a variable with a value that cannot be changed in the script. Such
    a value must therefore be assigned at the same time as the constant is created.
    PHP provides two methods for creating constants: the `const` modifier and the
    `define` function.


    Const


    The `const` modifier is used to create class constants. Unlike regular properties,
    class constants do not have an access level specified, as they are always publicly
    visible. They also do not use the dollar sign parser token (`$`). The naming convention
    for constants is all-uppercase, with underscores separating each word.


    ```

    class MyCircle

    {

      const PI = 3.14;

    }

    ```


    Constants must be assigned a value when they are created. Like static properties,
    a constant may only be initialized with a constant value and not with an expression.
    Class constants are referenced in the same way as static properties, except that
    they do not use the dollar sign.


    ```

    echo MyCircle::PI; // "3.14"

    ```


    The `const` modifier may not be applied to local variables or parameters. However,
    as of PHP 5.3 `const` can be used to create global constants. Such a constant
    is defined in the global scope and can be accessed anywhere in the script.


    ```

    const PI = 3.14;

    echo PI; // "3.14"

    ```


    Define


    The `define` function can create both global and local constants, but not class
    constants. The first argument to this function is the constant’s name and the
    second is its value.


    ```

    define(''DEBUG'', 1);

    ```


    Just as constants created with `const`, define constants are used without the
    dollar sign and their value cannot be modified.


    ```

    echo DEBUG; // "1"

    ```


    Like constants created with const, the value for define may be any scalar data
    type: integer, float, string or bool. However, unlike const the define function
    allows an expression to be used in the assignment, such as a variable or the result
    of a mathematical expression.


    ```

    define(''ONE'', 1);     // 1

    define(''TWO'', ONE+1); // 2

    ```


    Constant are case-sensitive by default. However, the `define` function takes a
    third optional argument which may be set to true to create a case-insensitive
    constant.


    ```

    define(''DEBUG'', 1, true);

    echo debug; // "1"

    ```


    To check whether a constant already exists the `defined` function can be used.
    This function works both for constants created with `const` and `define`.


    ```

    if (!defined(''PI''))

      define(''PI'', 3.14);

    ```


    Const and define


    The `const` modifier creates a compile-time constant and so the compiler will
    replace all usage of the constant with its value. In contrast, `define` creates
    a run-time constant which is not set until run-time. This is the reason why define
    constants may be assigned with expressional values, whereas `const` requires constant
    values which are known at compile-time.


    ```

    const PI = 3.14;         // compile-time constant

    define(''BIT_2'', 1 << 2); // run-time constant

    ```


    Only `const` may be used for class constants and only `define` for local constants.
    However, when creating global constants both `const` and `define` are allowed.
    In these circumstances using `const` is generally preferable. Because `const`
    is a language construct it reads better than `define` which is a function. Compile-time
    constants are also slightly faster than run-time constants. The only exception
    is when the constant is conditionally defined, or an expressional value is required,
    in which case `define` must be used.


    Constant guideline


    In general, it is a good idea to create constants instead of variables if their
    values do not need to be changed. This ensures that the variables will not be
    changed anywhere in the script by mistake, which in turn helps to prevent bugs.


    Magic constants


    PHP provides eight predefined constants. These are called magic constants as their
    values change depending on where they are used.


    | Name | Description |

    | --- | --- |

    | __LINE__ | Current line number of the file. |

    | __FILE__ | Full path and filename of the file. |

    | __DIR__ | Directory of the file. |

    | __FUNCTION__ | Function name. |

    | __CLASS__ | Class name including namespace. |

    | __TRAIT__ | Trait name including namespace. |

    | __METHOD__ | Class method name. |

    | __NAMESPACE__ | Current namespace. |'
  trans: "\n# Static\n\n`static`关键字用于声明无需创建类实例即可访问的属性和方法。静态（类）成员只存在一份副本，属于类本身；而实例（非静态）成员则为每个新对象创建新的副本。\n\
    \n```\nclass MyCircle\n{\n  // 实例成员（每个对象一份）\n  public $r = 10;\n  function getArea()\
    \ {}\n\n// 静态/类成员（只有一份副本）\n  static $pi = 3.14;\n  static function newArea($a)\
    \ {}\n}\n```\n\n静态方法不能使用实例成员，因为这些方法不属于任何实例。但它们可以使用其他静态成员。\n\n## 引用静态成员\n\n与实例成员不同，静态成员不能使用单箭头运算符（`->`）访问。相反，要在类内部引用静态成员，必须使用`self`关键字后跟作用域解析运算符（`::`）作为前缀。`self`关键字是类名的别名，因此也可以直接使用实际的类名。\n\
    \n```\nstatic function newArea($a)\n{\n  return self::$pi * $a * $a;     // 正确\n\
    \  return MyCircle::$pi * $a * $a; // 替代写法\n}\n```\n\n同样的语法也用于从实例方法中访问静态成员。请注意，与静态方法不同，实例方法可以同时使用静态成员和实例成员。\n\
    \n```\nfunction getArea()\n{\n  return self::newArea($this->$r);\n}\n```\n\n要从类外部访问静态成员，需要使用类名后跟作用域解析运算符（`::`）。\n\
    \n```\nclass MyCircle\n{\n  static $pi = 3.14;\n\nstatic function newArea($a)\n\
    \  {\n    return self::$pi * $a * $a;\n  }\n}\n\necho MyCircle::$pi;         //\
    \ \"3.14\"\necho MyCircle::newArea(10); // \"314\"\n```\n\n静态成员的优势在于，无需创建类的实例即可使用它们。因此，如果方法独立于实例变量执行通用功能，应将其声明为静态。同样，如果变量只需要一个实例，则应将属性声明为静态。\n\
    \n## 静态变量\n\n可以将局部变量声明为静态，以使函数记住其值。这种静态变量只存在于局部函数的作用域内，但在函数结束后不会丢失其值。例如，这可用于统计函数被调用的次数。\n\
    \n```\nfunction add()\n{\n  static $val = 0;\n  echo $val++;\n}\n\nadd(); // \"\
    0\"\nadd(); // \"1\"\nadd(); // \"2\"\n```\n\n静态变量被赋予的初始值只会被设置一次。请记住，静态属性和静态变量只能使用常量进行初始化，而不能使用表达式（例如另一个变量或函数返回值）。\n\
    \n## 后期静态绑定\n\n如前所述，`self`关键字是所在类的类名的别名。这意味着即使从子类的上下文中调用，该关键字也将引用其所在类。\n\n```\n\
    class MyParent\n{\n  protected static $val = 'parent';\n\npublic static function\
    \ getVal()\n  {\n    return self::$val;\n  }\n}\n\nclass MyChild extends MyParent\n\
    {\n  protected static $val = 'child';\n}\n\necho MyChild::getVal(); // \"parent\"\
    \n```\n\n要使类引用解析为实际的调用类，需要使用`static`关键字代替`self`关键字。此特性称为后期静态绑定，从 PHP 5.3 开始引入。\n\
    \n```\nclass MyParent\n{\n  protected static $val = 'parent';\n\npublic static\
    \ function getLateBindingVal()\n  {\n    return static::$val;\n  }\n}\n\nclass\
    \ MyChild extends MyParent\n{\n  protected static $val = 'child';\n}\n\necho MyChild::getLateBindingVal();\
    \ // \"child\"\n```\n\n# 第十三章\n\n# Constants\n\n常量是一种值在脚本中无法改变的变量。因此，该值必须在创建常量时同时赋值。PHP\
    \ 提供了两种创建常量的方法：`const`修饰符和`define`函数。\n\n## Const\n\n`const`修饰符用于创建类常量。与常规属性不同，类常量不需要指定访问级别，因为它们始终是公开可见的。它们也不使用美元符号解析令牌（`$`）。常量的命名约定是全大写，单词之间用下划线分隔。\n\
    \n```\nclass MyCircle\n{\n  const PI = 3.14;\n}\n```\n\n常量在创建时必须赋值。与静态属性一样，常量只能使用常量值进行初始化，而不能使用表达式。类常量的引用方式与静态属性相同，只是它们不使用美元符号。\n\
    \n```\necho MyCircle::PI; // \"3.14\"\n```\n\n`const`修饰符不能应用于局部变量或参数。但是，从 PHP\
    \ 5.3 开始，`const`可用于创建全局常量。此类常量在全局作用域中定义，可以在脚本中的任何位置访问。\n\n```\nconst PI = 3.14;\n\
    echo PI; // \"3.14\"\n```\n\n## Define\n\n`define`函数可以创建全局和局部常量，但不能创建类常量。该函数的第一个参数是常量的名称，第二个参数是其值。\n\
    \n```\ndefine('DEBUG', 1);\n```\n\n就像使用`const`创建的常量一样，`define`创建的常量在使用时也不带美元符号，并且其值不能被修改。\n\
    \n```\necho DEBUG; // \"1\"\n```\n\n与`const`创建的常量类似，`define`的值可以是任何标量数据类型：整数、浮点数、字符串或布尔值。但是，与`const`不同，`define`函数允许在赋值中使用表达式，例如变量或数学表达式的结果。\n\
    \n```\ndefine('ONE', 1);     // 1\ndefine('TWO', ONE+1); // 2\n```\n\n常量默认区分大小写。但是，`define`函数接受第三个可选参数，将其设置为`true`可以创建不区分大小写的常量。\n\
    \n```\ndefine('DEBUG', 1, true);\necho debug; // \"1\"\n```\n\n要检查常量是否已存在，可以使用`defined`函数。此函数适用于使用`const`和`define`创建的常量。\n\
    \n```\nif (!defined('PI'))\n  define('PI', 3.14);\n```\n\n## Const 和 Define\n\n\
    `const`修饰符创建一个编译时常量，因此编译器会将所有使用该常量的地方替换为其值。相比之下，`define`创建一个运行时常量，该常量直到运行时才被设置。这就是为什么`define`常量可以被赋予表达式的值，而`const`要求在编译时就已知常量的值。\n\
    \n```\nconst PI = 3.14;         // 编译时常量\ndefine('BIT_2', 1 << 2); // 运行时常量\n\
    ```\n\n只有`const`可以用于类常量，只有`define`可以用于局部常量。然而，在创建全局常量时，`const`和`define`都允许。在这种情况下，通常优先使用`const`。因为`const`是一种语言结构，比作为函数的`define`更易读。编译时常量也比运行时常量稍快。唯一的例外是当需要条件定义常量，或需要表达式的值时，此时必须使用`define`。\n\
    \n## 常量使用指南\n\n通常，如果变量的值不需要更改，最好创建常量而不是变量。这可以确保这些变量不会在脚本中的任何地方被意外更改，从而有助于防止错误。\n\
    \n## 魔术常量\n\nPHP 提供了八个预定义常量。这些被称为魔术常量，因为它们的值会根据使用位置而变化。\n\n| 名称 | 描述 |\n| ---\
    \ | --- |\n| `__LINE__` | 文件中的当前行号。 |\n| `__FILE__` | 文件的完整路径和文件名。 |\n| `__DIR__`\
    \ | 文件所在的目录。 |\n| `__FUNCTION__` | 函数名称。 |\n| `__CLASS__` | 类名（包括命名空间）。 |\n| `__TRAIT__`\
    \ | Trait 名称（包括命名空间）。 |\n| `__METHOD__` | 类的方法名。 |\n| `__NAMESPACE__` | 当前命名空间。\
    \ |\n"
- fmt: "# Magic Constants\n\nMagic constants are especially useful for debugging purposes.\
    \ For example, the value of `__LINE__` depends on the line on which it appears\
    \ in the script.\n\n```\nif(!isset($var))\n{\n  echo '$var not set on line ' .\
    \ __LINE__;\n}\n```\n\n# Chapter 14\n\n![image](images/frontdot.jpg)\n\n## Interface\n\
    \nAn interface specifies methods that classes using the interface must implement.\
    \ They are defined with the `interface` keyword followed by a name and a code\
    \ block. Their naming convention is to start with a small \"i\" and then to have\
    \ each word initially capitalized.\n\n```\ninterface iMyInterface {}\n```\n\n\
    ### Interface Signatures\n\nThe code block for an interface can contain signatures\
    \ for instance methods. These methods cannot have any implementations. Instead,\
    \ their bodies are replaced by semicolons. Interface methods must always be public.\n\
    \n```\ninterface iMyInterface\n{\n  public function myMethod();\n}\n```\n\nAdditionally,\
    \ interfaces may define constants. These interface constants behave just as class\
    \ constants, except that they cannot be overridden.\n\n```\ninterface iMyInterface\n\
    {\n  const PI = 3.14;\n}\n```\n\nAn interface may not inherit from a class, but\
    \ it may inherit from another interface, which effectively combines the interfaces\
    \ into one.\n\n```\ninterface i1 {}\ninterface i2 extends i1 {}\n```\n\n### Interface\
    \ Example\n\nThe example below shows an interface called `iComparable`, which\
    \ has a single method named `Compare`. Note that this method makes use of type\
    \ hinting to make sure that the method is called with the correct type. This functionality\
    \ will be covered in a later chapter.\n\n```\ninterface iComparable\n{\n  public\
    \ function compare(iComparable $o);\n}\n```\n\nThe `Circle` class implements this\
    \ interface, by using the `implements` keyword after the class name followed by\
    \ the interface name. If the class also has an `extends` clause, the `implements`\
    \ clause needs to be placed after it. Bear in mind that although a class can only\
    \ inherit from one parent class it may implement any number of interfaces, by\
    \ specifying them in a comma separated list.\n\n```\nclass Circle implements iComparable\n\
    {\n  public $r;\n}\n```\n\nBecause `Circle` implements `iComparable` it must define\
    \ the `compare()` method. For this class the method will return the difference\
    \ between the circle radiuses. The implemented method must be public, in addition\
    \ to having the same signature as the method defined in the interface. It may\
    \ also have more parameters, as long as they are optional.\n\n```\nclass Circle\
    \ implements iComparable\n{\n  public $r;\n\n  public function compare(iComparable\
    \ $o)\n  {\n    return $this->r - $o->r;\n  }\n}\n```\n\n### Interface Usages\n\
    \nInterfaces allow for multiple inheritance of class design without the complications\
    \ associated with allowing multiple inheritance of functionality. The main benefit\
    \ of requiring a specific class design can be seen with the `iComparable` interface,\
    \ which defines a specific functionality that classes can share. It allows developers\
    \ to use interface members without having to know the actual type of a class.\
    \ To illustrate, the example below shows a simple method that takes two `iComparable`\
    \ objects and returns the largest one.\n\n```\nfunction largest(iComparable $a,\
    \ iComparable $b)\n{\n  return ($a->compare($b) > 0) ? $a : $b;\n}\n```\n\nThis\
    \ method will work for any two objects of the same type that implement the `iComparable`\
    \ interface. It will work regardless of what type the objects are since the method\
    \ only uses the functionality exposed through that interface.\n\n### Interface\
    \ Guideline\n\nAn interface provides a design for a class without any implementation.\
    \ It is a contract by which classes that implement it agree to provide certain\
    \ functionality. This has two benefits. First, it provides a way to make sure\
    \ developers implement certain methods. Second, because these classes are guaranteed\
    \ to have certain methods, they can be used even without knowing the class's actual\
    \ type, which allows the code to be more flexible.\n\n# Chapter 15\n\n![image](images/frontdot.jpg)\n\
    \n## Abstract\n\nAn abstract class provides a partial implementation that other\
    \ classes can build upon. When a class is declared as abstract it means that the\
    \ class can contain incomplete methods that must be implemented in child classes,\
    \ in addition to normal class members.\n\n### Abstract Methods\n\nIn an abstract\
    \ class any method can be declared abstract. These methods are then left unimplemented\
    \ and only their signatures are specified, while their code blocks are replaced\
    \ by semicolons.\n\n```\nabstract class Shape\n{\n  abstract public function myAbstract();\n\
    }\n```\n\n### Abstract Example\n\nTo give an example, the class below has two\
    \ properties and an abstract method.\n\n```\nabstract class Shape\n{\n  private\
    \ $x = 100, $y = 100;\n  abstract public function getArea();\n}\n```\n\nIf a class\
    \ inherits from this abstract class it is then forced to override the abstract\
    \ method. The method signature must match, except for the access level which can\
    \ be made less restricted.\n\n```\nclass Rectangle extends Shape\n{\n  public\
    \ function getArea()\n  {\n    return $this->x * $this->y;\n  }\n}\n```\n\nIt\
    \ is not possible to instantiate an abstract class. They serve only as parents\
    \ for other classes, partly dictating their implementation.\n\n```\n$s = new Shape();\
    \ // compile-time error\n```\n\nHowever, an abstract class may inherit from a\
    \ non-abstract (concrete) class.\n\n```\nclass NonAbstract {}\nabstract class\
    \ MyAbstract extends NonAbstract {}\n```\n\n### Abstract Classes and Interfaces\n\
    \nAbstract classes are in many ways similar to interfaces. They can both define\
    \ member signatures that the deriving classes must implement, and neither one\
    \ of them can be instantiated. The key differences are first that the abstract\
    \ class can contain non-abstract members, while the interface cannot. Second,\
    \ a class can implement any number of interfaces but only inherit from one class,\
    \ abstract or not.\n\n```\n// Defines default functionality and definitions\n\
    abstract class Shape\n{\n  public $x = 100, $y = 100;\n  abstract public function\
    \ getArea();\n}\n// Class is a Shape\nclass Rectangle extends Shape { /*...*/\
    \ }\n\n// Defines a specific functionality\ninterface iComparable\n{\n  function\
    \ compare();\n}\n// Class can be compared\nclass MyClass implements iComparable\
