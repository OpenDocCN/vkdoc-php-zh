    ## Split the code in several files


    So far, we have written only short scripts of less than 100 lines. Once you work
    on larger projects that are partly made up of tens of thousands of lines of code,
    it can soon become confusing within a file. It makes more sense, for example,
    to outsource function collections in another `.php` file and integrate them into
    our main project file.


    So, we create two files:


    `functions_accounting.php`


    ```php

    <?php


    function toNetto($amount, $vat_percent = 20) {


    $amount_netto = $amount / (100 + $vat_percent) * 100; return $amount_netto;


    }


    function toBrutto($amount, $vat_percent = 20) {


    $amount_brutto = $amount * (100 + $vat_percent) / 100; return $amount_brutto;


    }


    ?>

    ```


    `vat_calculator.php`


    ```php

    <?php


    include "functions_accounting.php";


    $price_austria = 1256;


    $price_netto = toNetto($price_austria);


    $price_germany = toBrutto($price_netto, 19);


    echo $price_germany;


    ?>

    ```


    If, for example, in addition to our `vat_calculator.php`, the file `functions_accounting.php`
    are located in the folder `functions`, we would have to specify it with the following:


    ```php

    <?php


    include "functions/functions_accounting.php";

    $price_austria = 1256;


    $price_netto = toNetto($price_austria);


    $price_germany = toBrutto($price_netto, 19);


    echo $price_germany;


    ?>

    ```


    You could also specify full absolute paths on the server, such as the following:


    ```php

    <?php


    include "/var/www/web1/html/functions/functions_accounting.php";


    ?>

    ```


    However, if you do this, the path may never change and you may have problems when
    you transfer your script to a different server.


