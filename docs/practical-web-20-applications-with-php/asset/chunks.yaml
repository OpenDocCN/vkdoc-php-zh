    ## CHAPTER 8 ■ EXTENDING THE BLOG MANAGER


    The first thing I usually like to do is go through and clean out the unnecessary
    files in the distribution. I will leave all these items for now, but you may consider
    deleting the following:


    *   Loader classes for other languages (the `fckeditor.*` files in the main directory,
    aside from the `fckeditor_php5.php` file, which we will use shortly).

    *   The file browser and upload connectors that aren’t being used. These can be
    found within the `./htdocs/js/fckeditor/editor/filemanager` directory.


    ### Configuring FCKeditor


    Next we must configure the way FCKeditor works. We do this by modifying `fckconfig.js`
    in the main directory. Most of the settings we won’t need to touch, but we will
    need to customize the toolbars and then disable the connectors that are enabled
    by default.


    First we’ll define a new toolbar that contains only buttons for the list of tags
    we defined in Chapter 7. These tags are `<a>`, `<img>`, `<b>`, `<strong>`, `<em>`,
    `<i>`, `<ul>`, `<li>`, `<ol>`, `<p>`, and `<br>`.


    On line 94 in `fckconfig.js` a toolbar called `Default` is defined, which contains
    a wide range of buttons, which is directly followed by a simpler toolbar called
    `Basic`. We will leave these two toolbars in this file and define a new toolbar
    called `phpweb20` that is a combination of these toolbars. The primary reason
    for leaving them in is to use them as a reference for the other buttons that can
    be added.


    Listing 8-23 shows the JavaScript array we use to create a new toolbar. This can
    be placed in `fckconfig.js` directly after the other toolbars. Note that the `''-''`
    element renders a separator in the toolbar.


    **Listing 8-23.** *The Custom FCKeditor Toolbar (fckconfig.js)*


    ```

    FCKConfig.ToolbarSets["phpweb20"] = [


    [''Bold'',''Italic'',''-'',''OrderedList'',''UnorderedList'',''-'',


    ''Link'',''Unlink'',''-'',''Image'']


    ];

    ```


    > **Note** Technically speaking, Listing 8-23 actually defines a *toolbar set*,
    not a toolbar. In other words, one or more toolbars makes up a toolbar set. This
    code creates an array of arrays, where the internal arrays are the actual toolbars.


    The only other change we need to make in this configuration file is to disable
    the file manager and upload connectors, since we aren’t allowing users to upload
    files. Disabling them removes the respective options from the user interface.


    Listing 8-24 shows the new lines for `fckconfig.js`, all of which set the listed
    values to `false`. You can find at the bottom of the `fckconfig.js` file where
    each of these variables is defined as `true` and update them accordingly.


    **Listing 8-24.** *Disabling the File Browser and Upload Connectors (fckconfig.js)*


    ```

    FCKConfig.LinkBrowser = false;

    FCKConfig.ImageBrowser = false;

    FCKConfig.FlashBrowser = false;

    FCKConfig.LinkUpload = false;

    FCKConfig.ImageUpload = false;

    FCKConfig.FlashUpload = false;

    ```


    ### Loading FCKeditor in the Blog Editing Page


    Finally, we need to load the editor in the blog post’s editing form. First we
    will write a Smarty plug-in that outputs HTML code to load. There is a PHP class
    bundled with FCKeditor to facilitate the generation of the HTML.


    The FCKeditor class is located in the `fckeditor_php5.php` file in the main FCKeditor
    directory (`./htdocs/js/fckeditor`). To keep our own code organized, we will copy
    this class to the application include directory. Additionally, we will rename
    the file to `FCKeditor.php` to be consistent with our application file naming.
    This also means it can be autoloaded with `Zend_Loader`.


    ```

    # cd /var/www/phpweb20/htdocs/js/fckeditor

