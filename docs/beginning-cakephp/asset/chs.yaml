  **开始学习 CakePHP：**


  `Beginning`


  **从新手到专家**


  亲爱的读者，


  `Beginning`


  快速开发框架不久之前才出现，最终为网络开发世界带来了其他软件系统早已长期享用的高效工具。如果你像我一样，大概还记得自己曾仔细研读所有能找到的在线文档，试图学习这些构建网站的新方法，结果却发现它们都要求你学习另一种你以前没使用过的编程语言。或者你可能遇到了不少死胡同，因为教程或术语让你感到困惑。


  `Cak`


  `CakePHP`


  随着网络框架日益流行，我所想要的是用自己已经学会并热爱的语言 `PHP` 构建的框架，它能提供我在其他平台上读到的所有功能。我还希望有人能用简单的语言告诉我如何开始以及从哪里开始。我找到了
  `CakePHP`——这是最强大、最简洁、设计最精良的可用 `PHP` 框架——现在构建网站从未如此美好。


  本书将为你提供一个良好的开端，开始使用 `CakePHP`。你将学习从哪里开始，`Cake` 提供了哪些工具，以及如何快速地为你的应用程序编写方法。`Cake`
  拥有令人印象深刻的一系列辅助函数和核心方法，使得数据处理、表单处理、`Ajax` 请求处理、文件上传、`XML` 解析以及其他与网络相关的任务变得更加易于管理。我将解释这些任务中的每一项以及其他任务，并说明如何使用
  `Cake` 来完成它们。我的目标是让学习这个极好的框架变得轻松而激动人心，并为你提供一种简单的方法，让你能够走上使用 `CakePHP` 创建网站的正确道路。


