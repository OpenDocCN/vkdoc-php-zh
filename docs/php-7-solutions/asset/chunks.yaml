- fmt: "# Chapter 11: User Authentication and Password Storage\n\nChapter 11 showed\
    \ you the principles of user authentication and sessions to password protect parts\
    \ of your web site, but the login scripts all relied on usernames and passwords\
    \ stored in a CSV file. Keeping user details in a database is both more secure\
    \ and more efficient. Instead of just storing a list of usernames and passwords,\
    \ a database can store other details, such as first name, family name, email address,\
    \ and so on. Databases also give you the option of using either hashing (one-way\
    \ and irreversible) or encryption (two-way). In the first section of this chapter,\
    \ we’ll examine the difference between the two. Then you’ll create registration\
    \ and login scripts for both types of storage.\n\nThis chapter covers:\n\n*  \
    \ Deciding how to store passwords\n*   Using one-way password hashing for user\
    \ registration and login\n*   Using two-way encryption for user registration and\
    \ login\n*   Decrypting passwords\n\n## Choosing a Password Storage Method\n\n\
    The PHP solutions in Chapter 11 use password hashing—once a password has been\
    \ hashed, there’s no way of reversing the process. This is both an advantage and\
    \ a disadvantage. It offers the user greater security because passwords stored\
    \ this way remain secret. However, there’s no way of reissuing a lost password,\
    \ since not even the site administrator can decrypt it. The only solution is to\
    \ reset it.\n\nThe alternative is to use secret-key encryption. This is a two-way,\
    \ reversible process that relies on a pair of functions: one to encrypt the password\
    \ and another to convert it back to plain text, making it easy to reissue passwords\
    \ to forgetful users. Two-way encryption uses a secret key that is passed to both\
    \ functions to perform the conversion. The key is simply a string that you make\
    \ up yourself. Obviously, to keep the data secure, the key needs to be sufficiently\
    \ difficult to guess and should never be stored in the database. However, you\
    \ need to embed the key in your registration and login scripts—either directly\
    \ or through an include file—so if your scripts are ever exposed, your security\
    \ is blown wide apart.\n\nMySQL and MariaDB offer a number of two-way encryption\
    \ functions, but `AES_ENCRYPT()` is considered the most secure. It uses the Advanced\
    \ Encryption Standard with a 128-bit key length (AES-128) approved by the US government\
    \ for the protection of classified material up to the SECRET level (TOP SECRET\
    \ material requires AES-192 or AES-256).\n\nBoth hashing and secret-key encryption\
    \ have advantages and disadvantages. Many security experts recommend that passwords\
    \ should be changed frequently. So, forcing a user to change a forgotten password\
    \ because it can’t be decrypted could be regarded as a good security measure.\
    \ On the other hand, users are likely to be frustrated by the need to deal with\
    \ a new password each time they forget the existing one. I’ll leave it to you\
    \ to decide which approach is best suited to your circumstances, and I’ll concentrate\
    \ solely on the technical implementation.\n\n## Using Password Hashing\n\nIn the\
    \ interests of keeping things simple, I’m going to use the same basic forms as\
    \ in Chapter 11, so only the username and hashed password are stored in the database.\n\
    \n### Creating a Table to Store Users’ Details\n\nIn phpMyAdmin, create a new\
    \ table called `users` in the `phpsols` database. The table needs three columns\
    \ with the settings listed in Table 19-1.\n\n**Table 19-1. Settings for the users\
    \ table**\n\n| Name | Type | Length/Values | Attributes | Null | Index | A_I |\n\
    |------|------|---------------|------------|------|-------|-----|\n| `user_id`\
    \ | `INT` | | `UNSIGNED` | Deselected | `PRIMARY` | Selected |\n| `username` |\
    \ `VARCHAR` | `15` | | Deselected | `UNIQUE` | |\n| `pwd` | `VARCHAR` | `255`\
    \ | | Deselected | | |\n\nTo ensure no one can register the same username as one\
    \ that’s already in use, the `username` column is given a `UNIQUE` index. The\
    \ `pwd` column, which is for the password, allows a string of up to 255 characters\
    \ to be stored. This is much longer than the 60 characters required by the default\
    \ hashing algorithm used by `password_hash()`. But the `PASSWORD_DEFAULT` constant\
    \ is designed to change over time as new and stronger algorithms are added to\
    \ PHP. So, the recommended size is 255 characters.\n\n### Registering New Users\
    \ in the Database\n\nTo register users in the database, you need to create a registration\
    \ form that asks for a username and password. The `username` column has been defined\
    \ with a `UNIQUE` index, so the database will return an error if anyone attempts\
    \ to register the same username as an existing one. In addition to validating\
    \ the user input, the processing script needs to detect the error and advise the\
    \ user to choose a different username.\n\n#### PHP Solution 19-1: Creating a User\
    \ Registration Form\n\nThis PHP solution shows how to adapt the registration script\
    \ from Chapter 11 to work with MySQL or MariaDB. It uses the `CheckPassword` class\
    \ from PHP Solution 11-3 and `register_user_csv.php` from PHP Solution 11-4.\n\
    \nIf necessary, copy `CheckPassword.php` from the `ch19/PhpSolutions/Authenticate`\
    \ folder to the `PhpSolutions/Authenticate` folder in the `phpsols-4e` site root,\
    \ and copy `register_user_csv.php` from the `ch19` folder to the `includes` folder.\
    \ You should also read the instructions in PHP Solutions 11-3 and 11-4 to understand\
    \ how the original scripts work.\n\n1.  Copy `register_db.php` from the `ch19`\
    \ folder to a new folder called `authenticate` in the `phpsols-4e` site root.\
    \ The page contains the same basic user registration form as in Chapter 11, with\
    \ a text input field for the username, a password field, another password field\
    \ for confirmation, and a button to submit the data, as shown in the following\
    \ screenshot:\n\n    ![../images/332054_4_En_19_Chapter/332054_4_En_19_Figa_HTML.jpg](images/332054_4_En_19_Chapter/332054_4_En_19_Figa_HTML.jpg)\n\
    \n2.  Add the following code in a PHP block above the `DOCTYPE` declaration:\n\
    \n    ```\n    if (isset($_POST['register'])) {\n        $username = trim($_POST['username']);\n\
    \        $password = trim($_POST['pwd']);\n        $retyped = trim($_POST['conf_pwd']);\n\
    \        require_once '../includes/register_user_mysqli.php';\n    }\n    ```\n\
    \n    This is very similar to the code in PHP Solution 11-4. If the form has been\
    \ submitted, the user input is stripped of leading and trailing whitespace and\
    \ assigned to simple variables. Then an external file called `register_user_mysqli.php`\
    \ is included. If you plan to use PDO, name the include file `register_user_pdo.php`\
    \ instead.\n\n3.  The file that processes the user input is based on `register_user_csv.php`,\
    \ which you created in Chapter 11. Make a copy of your original file and save\
    \ it in the `includes` folder as `register_user_mysqli.php` or `register_user_pdo.php`.\n\
    \n4.  In the file you have just copied and renamed, locate the conditional statement\
    \ that begins like this (around line 23):\n\n    ```\n    if (!$errors) {\n  \
    \      // hash password using default algorithm\n        $password = password_hash($password,\
    \ PASSWORD_DEFAULT);\n    ```\n\n5.  Delete the rest of the code inside the conditional\
    \ statement. The conditional statement should now look like this:\n\n    ```\n\
    \    if (!$errors) {\n        // hash password using default algorithm\n     \
    \   $password = password_hash($password, PASSWORD_DEFAULT);\n    }\n    ```\n\n\
    6.  The code that inserts the user’s details in the database goes inside the conditional\
    \ statement. Begin by including the database connection file and creating a connection\
    \ with read and write privileges."
