    column. So each `author_id` in the table on the right of Figure [10-3](#A978-1-4842-0635-5_10_Chapter.html#Fig3)
    is used only once.

    *   When used as a foreign key, there can be multiple references to the same value.
    So `32` appears several times in the `author_id` column in the table on the left.


