    该程序创建并执行对三个数组的简单操作。第一个数组通过`$A=array()`语句创建。该数组为空，其引用写入`$A`变量。若要检查数组的内容，使用`print_r()`函数，其参数是一个引用数组的变量。


    | 详情 |

    | --- |

    | 要在文本中显示美元符号`$`，请使用组合`\$`。如果你尝试使用`print()`函数或`echo`语句显示数组的内容，将出现文本`Array`。因此，最好使用`print_r()`函数显示数组。输出区域中数组的内容表示如下：出现单词`Array`，后跟（括号内）数组元素的键/索引和值，格式为`[index]
    => value`。 |


    检查数组后，你会发现该数组确实是空的。但是，你可以向数组添加元素：命令`$A[0]="Red"`、`$A[1]="Yellow"`和`$A[2]="Green"`。这些命令意味着你将索引为`0`的元素`"Red"`、索引为`1`的元素`"Yellow"`和索引为`2`的元素`"Green"`添加到`$A`数组。在这里，要引用数组元素，你需指定数组名称后跟方括号中的索引。使用`print_r()`函数显示数组内容后，你确认元素已添加到数组中。


    | 详情 |

    | --- |

    | 如果为不存在的数组元素赋值，则该元素会被添加到数组中。如果你为已存在的元素赋值，则该元素会更改其值。在这种情况下，数组是空的。通过为数组元素赋值，你将元素添加到数组中。而且，不需要先创建数组。只需为数组元素赋值即可。在这种情况下，数组会自动创建。
    |


    命令`$B=array(100,200,300)`创建一个包含三个整数元素的数组，其值分别为`100`、`200`和`300`。创建的数组的元素值作为参数传递给`array()`函数。元素的索引会自动定义，分别为`0`、`1`和`2`。`$B`数组的内容首先使用`print_r()`函数显示，然后使用`for`循环语句显示，在其中你显式地遍历数组的元素。元素通过存储在`$k`变量中的索引进行遍历。`count()`函数确定数组中元素的数量。你还看到索引从零开始，最后一个元素的索引比元素数量少一。


    ![](images/613529_1_En_4_Chapter/613529_1_En_4_Figb_HTML.jpg)一个 i 符号的图示。注意


    除了`count()`函数，你还可以使用`sizeof()`函数来确定数组的大小。'
  raw: "## Summary\n\n*   The `if` statement allows you to execute different blocks\
    \ of commands depending on the truth or falsity of some condition. The condition\
    \ is specified in parentheses after the `if` keyword, followed by the commands\
    \ to be executed when the condition is true. Commands executed when the condition\
    \ is false are placed in the `else` block.\n\n*   The `while` loop statement allows\
    \ you to execute a block of commands repeatedly. Commands are executed while the\
    \ condition specified after the `while` keyword is true.\n\n*   The `do-while`\
    \ statement differs from the `while` statement as follows. In the `do-while` statement,\
    \ the block of commands is executed first, and then the condition is checked,\
    \ while execution of the `while` statement begins with checking the condition.\n\
    \n*   The `for` loop statement has a more complex syntax than the `while` and\
    \ `do-while` statements, but it is pretty convenient to use, and its capabilities\
    \ are not inferior to those of other loop statements.\n\n*   The `break` instruction\
    \ allows you to terminate the execution of a loop statement. The `continue` instruction\
    \ is used to terminate the current iteration (without terminating the loop statement\
    \ execution).\n\n*   The `switch` statement allows you to execute different blocks\
    \ of commands depending on the value of some expression. It contains `case` blocks\
    \ with control values. If the value of the checked expression matches the control\
    \ value, the commands in the corresponding `case` block are executed. The commands\
    \ in the optional `default` block are executed if no matches are found.\n\n* \
    \  The `goto` statement allows you to jump to a particular place marked with a\
    \ label in the program. The label is specified after the `goto` keyword. To mark\
    \ a place in a program with a label, put the label name followed by a colon.\n\
    \n*   PHP 8 introduces the `match` selection statement. The statement allows you\
    \ to check the value of some expression and returns a result depending on that\
    \ value. In a certain sense, the `match` selection statement can be interpreted\
    \ as a symbiosis of the `switch` selection statement and the ternary operator.\n\
    \n# 4. Arrays\n\n> *—This is such a toy—puzzles.*\n\n> *—She’s broken!*\n\n> *—That’s\
    \ the point, Alf. You have to collect it.*\n\n> *—What’s that? I didn’t break\
    \ it!*\n> \n> —*ALF* (TV series)\n\nAn array is generally a set or group of values\
    \ united by a common name. Arrays are usually used when there are many values,\
    \ and creating a separate variable for each is impossible. If so, a common name\
    \ is used for the entire set of values, and specific values (array elements) are\
    \ identified using an index or indexes. In the “classic” version, the indexes\
    \ are integers. In PHP, integers and strings can be used as indexes. In that case,\
    \ the term *key* may be used instead of *index*. An array with string keys is\
    \ usually called an *associative array*.\n\n![](images/613529_1_En_4_Chapter/613529_1_En_4_Figa_HTML.jpg)An\
    \ illustration of an i symbol.Note\n\nAbout the terminology, there are a lot of\
    \ possible terms. For example, the term list is sometimes used along with the\
    \ term array. Instead of the *associative array*, the term *dictionary* or *table*\
    \ is used. Let’s name all arrays (integer indexes and string keys) as arrays.\
    \ A *list* is an array with integer indexes. The index is interpreted as a particular\
    \ case of an integer key.\n\nNext, let’s consider some cases of creating and using\
    \ arrays.\n\n## Getting Familiar with Arrays\n\nAn array in PHP can be created\
    \ differently, and all methods are acceptable. Let’s examine the main and simplest\
    \ possibilities and other tricks for creating and using arrays. You do that step\
    \ by step as you solve problems.\n\nSo, you can create an array using the `array()`\
    \ function. If that function is called without arguments, an empty array is created.\
    \ If you pass arguments to the `array()` function, they determine the values of\
    \ the array elements. If so, element indexes are integers, and indexing begins\
    \ from zero. Also, there are other ways to create arrays. A small example that\
    \ creates arrays is shown in Listing [4-1](#613529_1_En_4_Chapter.xhtml#PC1).\n\
    \n```\nListing 4-1.\nCreating an Array\n```\n\nThe result of the program’s execution\
    \ is as follows.\n\n```\nThe output of the program (from Listing 4-1)\nArray $A:\n\
    Array\n(\n)\nArray $A:\nArray\n(\n[0] => Red\n[1] => Yellow\n[2] => Green\n)\n\
    Array $B:\nArray\n(\n[0] => 100\n[1] => 200\n[2] => 300\n)\n$B = [ 100 200 300\
    \ ]\nArray $C:\nArray\n(\n[0] => First\n[1] => 2\n[2] => 3.3\n)\n```\n\nThe program\
    \ creates and performs simple operations on three arrays. The first array is created\
    \ with the `$A=array()` statement. The array is empty, and a reference to it is\
    \ written to the `$A` variable. To check the contents of an array, you use the\
    \ `print_r()` function, whose argument is a variable that refers to the array.\n\
    \n| Details |\n| --- |\n| To display the dollar symbol `$` in text, use the combination\
    \ `\\$`.If you try to display the contents of an array using the `print()` function\
    \ or the `echo` statement, the text `Array` appears. Therefore, it is better to\
    \ use the `print_r()` function to display the array. The contents of the array\
    \ in the output area are represented as follows: the word `Array` appears followed\
    \ (in parentheses) by the keys/indexes and values of the array elements in the\
    \ `[index] => value` format. |\n\nAfter checking the array, you see that the array\
    \ is indeed empty. However, you can add elements to the array: the `$A[0]=\"Red\"\
    `, `$A[1]=\"Yellow\"`, and `$A[2]=\"Green\"` commands. The commands mean that\
    \ you add the `\"Red\"` element with the `0` index, the `\"Yellow\"` element with\
    \ the `1` index, and the `\"Green\"` element with the `2` index to the `$A` array.\
    \ Here, to refer to an element of an array, you specify the name of the array\
    \ followed by the index in square brackets. Having displayed the array’s contents\
    \ using the `print_r()` function, you ensure that the elements were added to the\
    \ array.\n\n| Details |\n| --- |\n| If a value is assigned to the array element\
    \ that does not exist, then the element is added to the array. If you assign a\
    \ value to an already existing element, then that element changes its value. In\
    \ this case, the array is empty. By assigning values to the elements of the array,\
    \ you add elements to the array. Moreover, there was no need to create the array\
