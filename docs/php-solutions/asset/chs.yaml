  注意


  MySQL 有三个默认数据库：`information_schema`，一个只读的虚拟数据库，包含同一服务器上所有其他数据库的详细信息；`mysql`，包含所有用户帐户和权限的详细信息；以及
  `test`，它是空的。除非您确定自己在做什么，否则永远不应直接编辑 `mysql` 数据库。


