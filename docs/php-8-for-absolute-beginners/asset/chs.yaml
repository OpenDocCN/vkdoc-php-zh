  \n终于到了显示仪表盘的时候了！用于准备仪表盘的代码是 PHP、HTML 和 JavaScript 的混合体。为了让学习者能够将此示例与其他 Google 仪表盘示例联系起来，我们直接借用了\
  \ Google Charts 网站的代码，并做了一些修改。\n\n> **注意**  \n> 本练习旨在让我们练习为在图表中显示而准备数据。截止目前，代码实际上并不依赖于使用\
  \ Google Charts 来实际显示信息。程序员（您）可以修改此代码，为任何可用的图表工具准备数据。Google Charts 并非为显示大量数据（数千条记录）而设计。实际数据会上传到\
  \ Google 网站上的 Google Charts API（应用程序编程接口）中。因此，您不应尝试上传数千条记录，因为这样效率低下。此外，由于数据会被发送到\
  \ Google，我们必须考虑安全风险。如果这些数据旨在成为公开信息（或非敏感信息），那么 Google Charts 是一个不错的选择。如果需要保护信息的机密性，则应使用其他应用程序。\n\
  \n```javascript\n// 加载可视化 API 和控制包。\ngoogle.charts.load('current', {'packages':['corechart',\
  \ 'controls']});\n// 设置一个回调函数，在 Google 可视化 API 加载完成后运行。\ngoogle.charts.setOnLoadCallback(drawDashboard);\n\
  // 回调函数，用于创建并填充数据表，\n// 实例化仪表盘、范围滑块和图表，\n// 传入数据并绘制它。\nfunction drawDashboard()\
  \ {\nvar data = new google.visualization.DataTable();\n// 添加列\ndata.addColumn('string','\"\
  \ . $Label . \"');\ndata.addColumn('number','\" . $RangeLabel . \"');\n\";\n代码清单\
  \ 10-25\ngoogleDashboard.php 部分代码\n```\n\n现在，我们可以完成显示仪表盘所需的条件了。首先，我们将导入 Google Charts\
  \ JavaScript 加载代码，这是一个 *AJAX API*。AJAX 是一种 JavaScript 代码，可在网页内提供信息的异步显示。它允许更新页面的部分内容，而无需重新加载整个网页（就像我们之前一直在做的那样）。这使得程序能够在不影响页面其余部分的情况下更改图表信息。接下来，我们调用\
  \ Google 可视化 API，并传入参数以指明哪些项目将使用 AJAX 显示。在本例中，我们包含了图表和控件。每次尝试重新加载页面时，`OnLoadCallback()`\
  \ 函数都会重新绘制仪表盘。`drawDashboard()` 是一个 JavaScript 函数，它从数组中创建 `DataTable`，并为仪表盘、滑块和图表设置参数。创建\
  \ `DataTable`（`data`）的实例。然后是将包含数值列名的 `$RangeLabel` 变量（已传入 PHP 函数 `displayDashBoard()`）作为\
