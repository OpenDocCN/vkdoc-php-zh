- fmt: '### PHP 4 and the Quiet Revolution


    If PHP 4 was yet another groundbreaking step for the language, most of the core
    changes took place beneath the surface. The Zend Engine (its name derived from
    Zeev and Andi) was written from scratch to power the language. The Zend Engine
    is one of the main components that drive PHP. Any PHP function you might care
    to call is in fact part of the high-level extensions layer. These do the busy
    work they were named for, like talking to database APIs or juggling strings for
    you. Beneath that, the Zend Engine manages memory, delegates control to other
    components, and translates the familiar PHP syntax you work with every day into
    runnable bytecode. It is the Zend Engine that we have to thank for core language
    features like classes.


    From our objective perspective, the fact that PHP 4 made it possible to override
    parent methods and access them from child classes was a major benefit.


    A major drawback remained, however. Assigning an object to a variable, passing
    it to a function, or returning it from a method resulted in a copy being made.
    Consider an assignment like this:


    ```

    $my_obj = new User(''bob'');

    $other = $my_obj;

    ```


    This resulted in the existence of two `User` objects rather than two references
    to the same `User` object. In most object-oriented languages, you would expect
    assignment by reference rather than by value. This means that you would pass and
    assign handles that point to objects rather than copy the objects themselves.
    The default pass-by-value behavior resulted in many obscure bugs as programmers
    unwittingly modified objects in one part of a script, expecting the changes to
    be seen via references elsewhere. Throughout this book, you will see many examples
    in which I maintain multiple references to the same object.


    Luckily, there was a way of enforcing pass-by-reference, but it meant remembering
    to use a clumsy construction.


    Here’s how you would assign by reference:


    ```

    $other =& $my_obj;

    // $other and $my_obj point to same object

    ```


    This enforces pass by reference:


    ```

    function setSchool(& $school)

    {

    // $school is now a reference to not a copy of passed object

    }

    ```


    And here is return by reference:


    ```

    function & getSchool()

    {

    // returning a reference not a copy

    return $this->school;

    }

    ```


    Although this worked fine, it was easy to forget to add the ampersand (`&`), and
    that meant it was all too easy for bugs to creep into object-oriented code. These
    were particularly hard to track down, because they rarely caused any reported
    errors, just plausible but broken behavior.


    Coverage of syntax in general, and objects in particular, was extended in the
    PHP manual, and object-oriented coding began to bubble up to the mainstream. Objects
    in PHP were not uncontroversial (then, as now, no doubt), and threads like “Do
    I need objects?” were common flame-bait in mailing lists. Indeed, the Zend site
    played host to articles that encouraged object-oriented programming side-by-side
    with others that sounded a warning note. Pass-by-reference issues and controversy
    notwithstanding, many coders just got on and peppered their code with ampersand
    characters. Object-oriented PHP grew in popularity. Zeev Suraski wrote this in
    an article for DevX.com ( [`http://www.devx.com/webdev/Article/10007/0/page/1`](http://www.devx.com/webdev/Article/10007/0/page/1)
    ):


    > One of the biggest twists in PHP’s history was that despite the very limited
    functionality, and despite a host of problems and limitations, object-oriented
    programming in PHP thrived and became the most popular paradigm for the growing
    numbers of off-the-shelf PHP applications. This trend, which was mostly unexpected,
    caught PHP in a suboptimal situation. It became apparent that objects were not
    behaving like objects in other OO languages, and were instead behaving like [associative]
    arrays.


    As noted in the previous chapter, interest in object-oriented design became obvious
    in sites and articles online. PHP’s official software repository, PEAR, itself
    embraced object-oriented programming. With hindsight, it’s easy to think of PHP’s
    adoption of object-oriented support as a reluctant capitulation to an inevitable
    force. It’s important to remember that, although object-oriented programming has
    been around since the 1960s, it really gained ground in the mid-1990s. Java, the
    great popularizer, was not released until 1995. A superset of C, a procedural
    language, C++ has been around since 1979. After a long evolution, it arguably
    made the leap to the big time during the 1990s. Perl 5 was released in 1994, another
    revolution within a formerly procedural language that made it possible for its
    users to think in objects (although some argue that Perl’s object-oriented support
    also felt like something of an afterthought). For a small procedural language,
    PHP developed its object support remarkably fast, showing a real responsiveness
    to the requirements of its users.


    ### Change Embraced : PHP 5


    PHP 5 represented an explicit endorsement of objects and object-oriented programming.
    That is not to say that objects were the only way to work with PHP (this book
    does not say that either, by the way). Objects were, however, recognized as a
    powerful and important means for developing enterprise systems, and PHP fully
    supported them in its core design.


    Arguably, one significant effect of the enhancements in PHP 5 was the adoption
    of the language by larger Internet companies. Both Yahoo! and Facebook, for example,
    started using PHP extensively within their platforms. With version 5, PHP became
    one of the standard languages for development and enterprise on the internet.


    Objects had moved from afterthought to language driver. Perhaps the most important
    change was the default pass-by-reference behavior which replaced the evils of
    object copying. That was only the beginning, however. Throughout this book, and
    particularly in this part of it, we will encounter many more enhancements, including
    private and protected methods and properties, the `static` keyword, namespaces,
    type hints (now called type declarations), and exceptions. PHP 5 was around for
    a long time (about twelve years), and important new features were released incrementally.


    PHP 5.3, for example, brought namespaces. These let you create a named scope for
    classes and functions, so that you are less likely to run into duplicate names
    as you include libraries and expand your system. They also rescue you from ugly
    but necessary naming conventions such as this:


    ```

    class megaquiz_util_Conf

    {

    }

    ```


    Class names such as this are one way of preventing clashes between packages, but
    they can make for tortuous code.


    We have also seen support for closures, generators, traits, and late static bindings.'
