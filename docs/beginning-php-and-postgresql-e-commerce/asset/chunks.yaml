    **HowManyPages**


    As you know, our product catalog will display a fixed number of products in every
    page. When a catalog page contains more than an established number of products,
    we display navigation controls that allow the visitor to browse back and forth
    through the subpages of products. You can see the navigation controls in Figure
    3-2 in Chapter 3 or later in this chapter in Figure 4-11.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH04.qxd 10/31/06 10:01 PM Page 138


    **138**


    C H A P T E R 4 ■ C R E AT I N G T H E P R O D U C T C ATA L O G : PA RT I I When
    displaying the navigation controls, you need to calculate the number of subpages
    of products you have for a given catalog page; for this, we’re creating the HowManyPages
    helper method.


    This method receives as argument a SELECT query that counts the total number of
    products of the catalog page ($countSql) and returns the number of subpages. This
    will be done by simply dividing the total number of products by the number of
    products to be displayed in a subpage of products; this latter number is configurable
    through the PRODUCTS_PER_PAGE constant in include/config.php.


    To improve the performance when the visitor browses back and forth through the
    subpages, after we calculate the number of subpages for the first time, we’re
    saving it to the visitor’s session. This way, the SQL query received as parameter
    won’t need to be executed more than once on a single visit to a catalog page.


    This method is called from the other data tier methods (GetProductsInCategory,
    GetProductsOnDepartment, GetProductsOnCatalog), which we’ll cover next.


    Add HowManyPages to the Catalog class.


    /* Calculates how many pages of products could be filled by the number of products
    returned by the $countSql query */


    private static function HowManyPages($countSql, $countSqlParams)


    {


    // Create a hash for the sql query


    $queryHashCode = md5($countSql . var_export($countSqlParams, true));


    // Verify if we have the query results in cache


    if (isset ($_SESSION[''last_count_hash'']) &&


    isset ($_SESSION[''how_many_pages'']) &&


    $_SESSION[''last_count_hash''] === $queryHashCode)


    {


    // Retrieve the the cached value


    $how_many_pages = $_SESSION[''how_many_pages''];


    }


    else


    {


    // Execute the query


    $prepared = DatabaseHandler::Prepare($countSql);


    $items_count = DatabaseHandler::GetOne($prepared, $countSqlParams);


    // Calculate the number of pages


    $how_many_pages = ceil($items_count / PRODUCTS_PER_PAGE);


    // Save the query and its count result in the session


    $_SESSION[''last_count_hash''] = $queryHashCode;


    $_SESSION[''how_many_pages''] = $how_many_pages;


    }


    // Return the number of pages


    return $how_many_pages;


    }


