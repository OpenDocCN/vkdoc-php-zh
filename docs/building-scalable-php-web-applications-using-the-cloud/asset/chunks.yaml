    # 10.1 使用 Amazon Lightsail


    虽然本书大部分内容都聚焦于在 Linode 上托管你的应用，但由于许多云托管服务都基于 AWS，我认为研究一下 AWS 上的一些托管选项是值得的。


    AWS 的一个问题就在于其选项数量庞大。可用的选项数量之多，实际上使得管理变得相当困难。


    举个例子，有一次我在一个团队里工作，需要访问日志。经过大量搜索，我们终于找到了授予日志文件访问权限的选项。然而，结果证明，*查看*日志文件的权限，与*检索*日志文件所需的权限竟然是*不同*的。因此，虽然我有*查看*日志文件的权限，但我实际上并没有获取它们的权限。最终，他们放弃了这种细粒度控制，直接让我成为了管理员。这并不是说
    AWS 没有这种能力，只是尝试管理它所花费的时间和精力，可能和你通过其他不那么“自动化”的方式节省下来的差不多。拥有过多的选择并试图满足所有人的需求，很容易让你淹没在没人有时间也没机会去掌握的选项和设置中。


    有太多细粒度的控制，每个都有各自的问题、特性和缺陷。AWS“支持”的不同平台和系统数量非常庞大。然而，我发现这些支持通常存在很大的漏洞。虽然这些问题可以解决，但那些变通方法有时让我希望一开始就全部手动完成。


    亚马逊首次涉足云托管领域的服务称为 EC2——弹性计算云。与 AWS 的大部分服务一样，这是一个非常灵活的云托管选项。然而，它也存在许多 AWS 服务固有的问题：要成功设置和使用它确实非常复杂。不仅设置复杂，其*定价*也复杂得离谱。他们不仅按计算时间收费，还按硬件
    I/O 请求收费。没错，他们会跟踪硬盘访问次数*并据此向你收费*。


    为了更好地与 Linode 和 DigitalOcean 等更易于使用的服务竞争，AWS 推出了 Amazon Lightsail。Lightsail 的功能集和定价结构与我们在
    Linode 上看到的非常相似。你可以从同一个包含 CloudFront 和 S3 的 AWS 管理控制台访问 Lightsail。只需搜索 Lightsail，其仪表盘界面应类似图
    10-1。


    就我们的目的而言，需要注意 Lightsail 和 Linode 之间有几个细微差别：


    1.  Lightsail 实例默认通过公钥连接，而不是密码，并且会连接到一个普通用户，而不是以 `root` 身份连接。

    2.  Lightsail 的 CentOS 发行版预装软件包与 Linode 的略有不同。


    ![../images/487291_1_En_10_Chapter/487291_1_En_10_Fig1_HTML.jpg](img/487291_1_En_10_Fig1_HTML.jpg)


    图 10-1 Amazon Lightsail 的初始仪表盘


    3.  所有 Lightsail 实例都会自动添加到亚马逊的私有网络中。实际上，当你在实例上时，你看到的*唯一* IP 地址就是私有网络地址。你获得的外部
    IP 会被路由到那个内部 IP 地址。

    4.  Lightsail 实例的备份需要手动创建。

    5.  Lightsail 有一个独立的数据库服务，如果你不想自己管理数据库服务器，可以使用该服务。


    要启动并设置一个新实例，请单击“创建实例”按钮。这将带你进入一个类似图 10-2 的界面。


    在这里，你需要选择托管节点的数据中心（实例位置）。这与 Linode 略有不同，因为 AWS 既有数据中心，又有*可用区*。在 AWS 中，数据中心被组织成多个可用区。这些区可以轻松地共享资源以实现负载均衡，但每个可用区都有独立的电力和外部互联网连接线路。本质上，它们表现得像是在同一个数据中心，但不同可用区中的服务器不太可能受到同一事件（例如断电或断网）的影响。因此，例如，你可以将主数据库放在一个可用区，副本数据库放在另一个可用区。这样，如果你的主数据库所在的可用区宕机了，副本（因为它位于不同的可用区）就可以被提升并充当主数据库。


    ![../images/487291_1_En_10_Chapter/487291_1_En_10_Fig2_HTML.jpg](img/487291_1_En_10_Fig2_HTML.jpg)


    图 10-2 创建 Lightsail 实例


    我们要选择的平台是“Linux/Unix”。然后，选择“仅操作系统”（其他选项允许使用针对特定任务的预配置服务器）。之后，选择“CentOS”。向下滚动，你可以忽略大多数其他问题，然后选择你想要的节点规格。然后，为了标识你的实例，像我们之前做的那样，将其命名为
    `template-node`。单击“创建实例”来创建机器。


    AWS 创建你的机器可能需要一些时间。创建完成后，你可以单击该机器，然后会看到一个类似图 10-3 的仪表盘。要登录，只需单击标有“使用 SSH 连接”的按钮。这将打开一个终端窗口，你将作为
    `centos` 用户连接到该节点。


    你可以使用这个 `centos` 用户来代替本书示例中的 `fred` 用户。或者，你也可以在需要时创建 `fred` 用户。不过，你仍然需要以 `root`
    身份使用该实例来进行配置。要以 `root` 身份登录，只需执行以下命令：


    ```

    sudo su -

    ```


    ![../images/487291_1_En_10_Chapter/487291_1_En_10_Fig3_HTML.jpg](img/487291_1_En_10_Fig3_HTML.jpg)


    图 10-3 Lightsail 节点仪表盘


    现在，你的会话将以 `root` 用户身份运行。


    Lightsail 节点预装的软件包与 Linode 节点略有不同。要使你的 Lightsail 节点与 Linode 系统的起始点相似，请执行以下命令：


    ```

    yum install -y nano

    yum install -y firewalld

    systemctl start firewalld

    systemctl enable firewalld

    ```


    从这一点开始，你可以基本按照第 3 章和第 4 章中的节点设置说明操作，步骤基本相同。


    在第 5 章中，从备份创建新实例的机制略有不同。在 Lightsail 中，备份是使用“快照”功能创建的。你只需转到节点的“快照”选项卡，为你的快照命名，然后创建它。一旦创建完成，你就可以从该快照创建一个新节点，如图
    10-4 所示。负载均衡器可以在主界面中的“网络”选项卡下从 Lightsail 创建。


    ![../images/487291_1_En_10_Chapter/487291_1_En_10_Fig4_HTML.jpg](img/487291_1_En_10_Fig4_HTML.jpg)


    图 10-4 从快照创建节点


    此后，关于如何创建云服务的其余信息没有变化，因为后续内容都围绕节点本身的操作展开。

    '
- fmt: '## 10.2 Hosting on Elastic Beanstalk


    While most of this book has been focused on Infrastructure-as-a-Service (IaaS)
    clouds, I did want to spend at least some time introducing a Platform-as-a-Service
    (PaaS) cloud. AWS has a PaaS cloud called “Elastic Beanstalk” which runs a variety
    of different application types, one of which is PHP.


    A PaaS cloud takes away all of the system administration work from cloud computing.
    The problem, though, is that most advanced cloud systems wind up requiring some
    amount of system administration anyway. It’s not that a PaaS system is unusable
    when you have strange configuration requirements, but rather the amount of effort
    to configure your PaaS system correctly, maintainably, and in sync with what your
    platform provider is also doing winds up being more than if you had just taken
    full control like you do with an IaaS cloud. In any case, in this section, we
    will go over what it takes to get our application up and running with Elastic
    Beanstalk.


    In a PaaS system, we have no control over the machines. Therefore, we can’t designate
    a particular machine as a database server, a job server, and so on. Instead, each
    application can be scaled up or down across as many machines as the PaaS system
    wishes. This generally means that the PaaS system will manage the database.


    For AWS, this means using their relational database service—RDS. Connecting the
    application to RDS is pretty straightforward. Elastic Beanstalk will set up environment
    variables for all of the connection information, and we just have to program our
    app to read them.


    In order to do this, we just have to change `common.php` and replace the `getReadOnlyConnection()`
    and `getReadWriteConnection()` functions. Both of those functions should look
    like Figure [10-5](#487291_1_En_10_Chapter.xhtml#Fig5).


    ![../images/487291_1_En_10_Chapter/487291_1_En_10_Fig5_HTML.png](images/487291_1_En_10_Chapter/487291_1_En_10_Fig5_HTML.png)


    **Figure 10-5** Accessing a Database with RDS


    This will put together a connection string based on the environment variables
    that RDS sends in.


    Second, since you will not have direct access to the database, we need a PHP script
    which will create the database tables for us. Create a file called `createdb.php`
    that has the following code in it.


    ![../images/487291_1_En_10_Chapter/487291_1_En_10_Fig6_HTML.png](images/487291_1_En_10_Chapter/487291_1_En_10_Fig6_HTML.png)


    **Figure 10-6** Creating a Database with RDS


    Note that, since we don’t have a specific server, these changes are being made
    to a local copy of the application on our personal computer’s hard drive. Once
    those changes have been made, you are ready to get started.


    To start with Elastic Beanstalk (EB), go back to the AWS management console and
    search for “Elastic Beanstalk.” On the dashboard, click the button titled “Create
    New Application.” Give it a name, and click “Create.”


    On EB, applications can be compartmentalized into “environments.” Environments
    can be used for all sorts of things, including having staging vs. production environments,
    having different groups of servers for different tasks, and having fast switching
    between different versions of your application. For our purposes, we will only
    have one environment. Therefore, click the button to create a new environment.
    It will ask you what type of environment to create. We want a “Web Server Environment.”


    The next screen is a configuration screen, as shown in Figure [10-7](#487291_1_En_10_Chapter.xhtml#Fig7).
    You can name your environment if you want, but the only important setting on that
    screen is to select a “Preconfigured Platform.” We, obviously, want “PHP.” By
    default, it will load a sample application. That is what we want for now. Click
    “Create Environment” to finish the process.


    ![../images/487291_1_En_10_Chapter/487291_1_En_10_Fig7_HTML.jpg](images/487291_1_En_10_Chapter/487291_1_En_10_Fig7_HTML.jpg)


    **Figure 10-7** Creating a New Environment


    Once created, you will have a dashboard that looks like Figure [10-8](#487291_1_En_10_Chapter.xhtml#Fig8).
    In the “Overview” section, it gives the basic health of the app, the version,
    and the platform. Under “Recent Events,” it lists all of the actions that the
    system has recently undergone. Note that *everything* in EB winds up taking a
    lot longer than you might think, but “Recent Events” helps you keep tabs on it
    and gives you something to watch while you wait. On the left side, the three areas
    we will concentrate on are “Dashboard” (where we are now), “Configuration” (how
    the app is set up), and “Logs.”


    ![../images/487291_1_En_10_Chapter/487291_1_En_10_Fig8_HTML.jpg](images/487291_1_En_10_Chapter/487291_1_En_10_Fig8_HTML.jpg)


    **Figure 10-8** EB Environment Dashboard


    Since we started with a sample application, you can already load up the sample
    application in your web browser. On the dashboard, it has a link to your application’s
    URL. You can click it, and it will take you to the sample application.


    Before we upload our application, we need to first set up the database. To do
    this, go to the “Configuration” section, and then go to the “Database” and click
    “Modify.” This will allow you to create an RDS instance for your application.
    Set the “Engine” to be `postgres`, give it a username and password (be sure to
    write these down!), and then click “Apply.” When the health status comes back
    as a checkmark (which can take 10–20 minutes), you are ready to upload your application.


    To upload your application, zip up all of your files together into a single zip
    archive. Then, on the dashboard, click the button that says “Upload and Deploy.”
    Choose the zip file from your hard drive, give the version a name (the specific
    name doesn’t matter), and then click “Deploy.” The health status will change to
    a refresh spinner, and it will deploy your application. When the spinner changes
    back to a checkmark, your application is deployed!


    However, we’re not quite done yet. When you click the link, it will give you a
    “Forbidden” message. This is because we don’t have an `index.php` file (though
    you can add one if you wish). However, we need to create our database, so we need
    to first navigate to the `createdb.php` file to create the database (just add
    `/createdb.php` to the end of the URL in your browser and hit enter). This should
    bring you a blank page, which is fine.


    Now, if you change the URL to go to `list.php`, everything should be in working
    order!


    There are now many things that you can do with your application to make it scalable.
    These are all available from the “Configuration” tab of your environment. By default,
    EB creates environments that are single server. To upgrade it to a load-balanced
    application, just go into the “Capacity” section and change the “Environment Type”
    to “Load Balanced.” This will give you a lot of options that you can play with.
    The most simple (and most important) is the “minimum” and “maximum” number of
    instances. Set the minimum to `2` to make sure that it starts up at least two
    machines for you. Click “Apply,” wait a few minutes, and your application is now
    load balanced.


    Other changes you can make include:


    * Under “Instances,” you can change the size of each individual instance.

    * Under “Load Balancer,” you can change a lot of variables, including the balancing
    mechanisms.

    * Under “Rolling Updates and Deployments,” you can change the deployment policy
    to eliminate downtime during updates (the “Immutable” option is the best for production,
    but it takes a long time to perform updates).

    * Under “Software,” you can set environment variables and web server configuration
    options.

    * Under “Database,” you can change the size of your database. You can also click
    the “Endpoint” link to take you to the RDS management console for additional database
    management utilities.'
