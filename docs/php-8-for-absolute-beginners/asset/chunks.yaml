- fmt: "```php\n$out .= \"Image Gallery\";\n$out .= \"\";\n$out .= \"I will soon list\
    \ all images\";\n$out .= \"\";\nreturn $out;\n}\n//function call\n$info = showImages();\n\
    ?>\nListing 4-5\nshowgallery.php\n```\n\nSee how the variable `$out` inside the\
    \ function `showImages()` gradually gets increased content over several lines\
    \ of code, using *incremental concatenation*. In the end, when the HTML string\
    \ is complete, the content of the variable `$out` is returned to the line of code\
    \ that calls the function.\n\n```php\n$info = showImages();\n```\n\nThe generated\
    \ string is returned to `index.php`, via the `$info` variable, where it will be\
    \ added to the `$pageData` object, merged with the page template, and echoed to\
    \ the browser.\n\n# Iteration\n\nHopefully, function, variables, and incremental\
    \ concatenation are slowly beginning to make sense. Since we will be using multiple\
    \ images, we need to take some time to understand **iteration**: repeating the\
    \ use of the same code several times.\n\n## While Loop\n\nLet us begin with *while*\
    \ *loops*. `while` loops will repeat the same code block, as long as a condition\
    \ is true. The basic syntax is:\n\n```php\nwhile ( $condition ) {\n    // repeat\
    \ code here\n}\n```\n\nA `while` loop is syntactically quite similar to an `if`\
    \ statement. If the condition holds `true`, the code in the subsequent code block\
    \ will repeat until the condition becomes `false`. Here is an example to illustrate\
    \ the concept.\n\n```php\n<?php\n$number = 1;\nwhile ( $number < 5 ) {\n    echo\
    \ \"<p>This is line number $number.</p>\\n\";\n    $number = $number + 1;\n}\n\
    ?>\nListing 4-6\nwhileloop.php\n```\n\n```php\nwhile ( $number < 5 ) {\n```\n\n\
    ![Output from whileloop.php](images/323857_3_En_4_Chapter/323857_3_En_4_Fig4_HTML.jpg)\n\
    \nThe image reflects how the programmer sees the window after uploading images\
    \ to the website with different loops.\n\n**Figure 4-4** Output from whileloop.php\n\
    \nThe code block is repeated four times. That is because of the condition declared\
    \ inside the parentheses of the while statement. It looks at `$number` to determine\
    \ if it is smaller than five. The first time the loop executes, the `$number`\
    \ is set to one.\n\n```php\n$number = $number + 1;\n```\n\nEvery time the code\
    \ block runs, `$number` is increased by one. The *counting variable* `$number`\
    \ has a value of 5 when the `while` loop has repeated four times. Because five\
    \ is not smaller than five, the `while` loop terminates, and a fifth line is never\
    \ echoed.\n\n> **Note:** What happens if the programmer forgets to increment the\
    \ variable used to count loops? If the variable is not incremented, it does not\
    \ change. The loop would continue to evaluate the expression as true, because\
    \ the value of one does not change and it still is less than five. This creates\
    \ an *infinite loop*. This is a common mistake, especially for beginning programmers.\
    \ Always double-check that you remembered to include incrementing the counting\
    \ variable.\n\n## For Loop\n\nAs a new programmer, we want to be reminded, as\
    \ much as possible, of any code required to successfully create iterations. While\
    \ loops are a great general loop for any time we need to iterate until a condition\
    \ changes. However, a *for loop* is designed specifically for situations in which\
    \ we know how many times we want to loop.\n\n```php\n<?php\nfor ( $number = 1;\
    \ $number < 5 ; $number++ ) {\n    echo \"<p>This is line number $number.</p>\\\
    n\";\n}\n?>\nListing 4-7\nforloop.php\n```\n\nAs we can see, the for loop takes\
    \ less lines of code than the while loop to accomplish the same result.\n\n```php\n\
    for ( $number = 1; $number < 5 ; $number++ ) {\n```\n\nThe counting variable `$number`\
    \ is initialized to one, compared to the number five, and incremented in the same\
    \ program statement. Actually, for loops automatically execute statements in the\
    \ first position (before the first semicolon) once at the beginning of the loop.\
    \ They then execute the code in the second position (between the semicolons) whenever\
    \ they reach the top of the loop (including the first time entering the loop).\
    \ The code in the third position (between the last semicolon and the parentheses)\
    \ is executed whenever they reach the bottom of the loop. In other words, the\
    \ for loop produces the same result as the while loop. However, it helps remind\
    \ us to create a counting variable, to give it an initial value, to compare it,\
    \ and most importantly to increment it every time."
