- "# 第 1 章：启动电子商务网站\n\n`648XCH01.qxd` 10/4/06 6:16 PM 第 5 页\n\n**5**\n\n……发送更新和新闻。更复杂的网站可以自动分析客户的购买习惯，从而向客户推荐可能感兴趣的其他商品。\n\
  \n电子商务的另一个相关优势是，让用户浏览而不购买并不会产生实际成本。事实上，尽可能吸引人们频繁访问网站本身就具有价值。你应该考虑在网站中加入纯粹为了促使人们定期访问的功能；例如，你可以加入社区功能，如论坛或与你所售商品相关的免费内容。\n\
  \n## 降低订单履行成本\n\n一个构建良好的电子商务网站的运营成本将远低于同等的线下业务。\n\n在传统商业模式下，员工必须将订单输入公司的订单处理系统。而通过电子商务，客户可以替你完成这一操作——网站与订单处理之间的接口可以实现无缝衔接。\n\
  \n当然，当你的电子商务网站建成并运行后，实际接收订单的成本将趋近于零——你无需支付收银员、助理、保安的工资，也无需在繁华的购物中心支付租金。\n\n如果你的商业理念切实可行，并且网站执行到位，你便可以在无需巨额投资的情况下获得这些好处。关键在于始终关注最根本的盈利问题：你的网站，或其任何特定功能，是否真的能帮你获得更多客户、让客户花费更多，或者降低成本从而提升利润率？\n\
  \n现在，是时候介绍本书将用作示例的网站了，看看所有这些原则如何与我们自己的商店相关联。\n\n## 让我们赚钱吧\n\n我们将要建立一个销售帽子的电子商务商店。在我们参与过的所有电子商务项目中，始终需要在“打造一个深受所有人喜爱的出色网站”和“在预算有限的情况下创建一个能盈利的网站”之间做出权衡。通常，我倾向于前者，打造一个令人惊艳的网站，但我总是庆幸自己的雄心能被实际的业务需求所约束。如果你是为自己设计并构建网站，且自己就是客户，那么你将面临一个挑战——在保持对项目热情的同时，使自己的视角切合实际。\n\
  \n本书将向你展示一种合乎逻辑的方式，来构建一个能实现盈利目标的电子商务网站。然而，在设计你自己的网站时，你需要仔细思考你的客户究竟是谁，他们需要什么，他们希望如何下单，以及他们最有可能购买什么。最重要的是，你需要思考他们最初将如何找到你的网站。在开始构思或设计网站之前，尤其是在开始编程之前，你应该考虑以下几点：\n\
  \n- **获取客户**：你最初将如何吸引访客来到网站？\n- **提供产品**：你将提供什么产品，以及你期望客户如何购买？他们会批量购买吗？他们会频繁重复下单吗？他们在访问前是否清楚自己想要什么，还是希望获得灵感？这些因素将影响你如何组织产品目录和搜索功能，以及你采用何种订单流程。如果人们喜欢浏览，购物车功能就很棒。如果人们确切知道自己想要什么，那么他们可能更喜欢类似订单表格的形式。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n`648XCH01.qxd` 10/4/06 7:16\
  \ PM 第 6 页\n\n**6**\n\n## 处理订单\n\n**处理订单**：你将如何把客户的订单转化为准备邮寄的包裹？\n\n这里主要考虑的是找到一种高效的方式来处理付款并将订单交付给管理库存或仓库的人员。你将如何让客户相信你有能力保护他们的数据并按时交付他们购买的商品？\n\
  \n\n  \n**服务客户**：客户是否需要您提供的产品附带额外的帮助？您是否需要提供保修、服务合同或其他支持服务？\n\n**吸引客户回流**：您将如何吸引客户再次访问网站？他们是否只会在购物时访问网站，还是会有线上浏览的潜在顾客？您的产品是否为消耗品，并且您能否预测客户何时需要新品？\n\
  \n回答完这些问题后，您就可以开始设计网站了，因为您清楚自己是在为客户设计，而不仅仅是凭一时灵感行事。确定这些问题的答案也有助于确保您的设计覆盖所有关键领域，避免出现重大遗漏，否则后期修复将是一场噩梦。\n\
  \n本书中的示例网站刻意采用了通用方法，向您展示最常见的电子商务技术。然而，要真正在竞争中脱颖而出，您不需要花哨的功能或 Flash 动画——您只需要比任何人都更了解、吸引并服务好客户。在您着手设计和搭建网站之前，请先思考这一点。\n\
  \n**风险与威胁**\n\n以上种种可能会让人觉得电子商务不可能失败。然而，现在需要冷静下来，意识到即使是精心策划的计划也常常会出错。一些风险尤其与电子商务公司相关，例如：\n\
  \n-   黑客攻击\n-   信用卡诈骗\n-   硬件故障\n-   不可靠的运输服务\n-   软件错误\n-   法律变更\n\n您无法消除这些风险，但可以尝试去了解它们，并保护自己免受其害。本书开发的软件在一定程度上解决了这些问题，但许多风险与网站本身关系不大。\n\
  \n保护网站免遭多种风险的重要方法是做好备份。您知道备份很重要。但如果您跟我一样，到了下班时间，节省五分钟早点回家似乎更重要。但当您有一个实时网站时，这就容不得选择了。\n\
  \n本书没有过多讨论电子商务的法律层面，因为我们是程序员，不是律师。然而，如果您要搭建的电子商务网站远不止在线旧货甩卖，那么在您的业务上线之前，就需要研究这些问题。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH01.qxd 10/4/06 6:16\
  \ PM Page 7\n\n第 1 章 ■ 电子商务网站起步\n\n**7**\n\n既然谈到了风险和威胁，有一个问题可能会严重损害您的电子商务网站，那就是不可靠的订单履行。这是一本编程书籍，侧重于向客户展示产品并将订单传达给网站所有者。流程中必不可少的一环是产品交付，要做到这一点，您需要在开店之前建立一个良好的物流网络。如果您的商店无法交付商品，客户就不会再回来，也不会向朋友推荐。\n\
  \n**提示** Webmonkey 提供了一个优秀的通用电子商务教程，涵盖了税务、运输以及您在设计网站时会遇到的许多问题，网址为 `http://www.webmonkey.com/webmonkey/e-business/building/tutorials/tutorial3.html`。在开始设计网站之前，请先查看此教程。\n\
  \n**为商业而设计**\n\n搭建电子商务网站需要大量投资。如果您分阶段设计网站，就可以减少初始投资，从而在想法不成功时降低损失。您可以根据早期阶段的结果来评估是否值得添加额外功能，甚至用网站的收入来资助未来的开发。退一步说，计划分阶段搭建网站意味着您可以比将每个可能的功能都塞进第一个版本更早地让网站上线上线并接收订单。\n\
  \n即使完成了最初计划的阶段，事情也可能不会就此结束。在规划大型软件项目时，重要的是以易于未来非计划性增长的方式进行设计。在第 2 章中，我们将开始处理搭建电子商务网站的技术细节，您将学习如何设计网站架构以实现长期开发灵活性。\n\
  \n如果您是为客户搭建网站，他们会希望看到自己的选择是开放的。分阶段规划网站（或任何其他软件）将有助于客户在跟您合作时感到安心。他们将能看到您正在完成工作，并且如果出于任何原因他们觉得不想继续投资开发，可以在任一阶段结束时决定终止项目。\n\
  \n**第一阶段：建立网站**\n\n第 2 章到第 7 章专注于为网站建立基本框架并上线产品目录。我们将首先构建基本的网站架构，并决定应用程序的不同部分如何协同工作。然后，我们将产品目录构建到该架构中。您将学习如何：\n\
  \n-   设计一个用于存储产品目录的数据库，包含部门、分类和产品\n-   编写`SQL`（结构化查询语言）和`PHP`（超文本预处理器）代码来访问这些数据，使产品目录正常运行\n\
  -   提供产品搜索引擎\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH01.qxd\
  \ 10/4/06 6:16 PM Page 8\n\n**8**\n\n第 1 章 ■ 电子商务网站起步\n\n-   通过 PayPal Website Payments\
  \ Standard 接收付款\n-   为网站管理员提供一个网站私有区域，以便他们在线管理目录\n\n构建完这个目录后，您将看到如何通过将其与 PayPal\
  \ 的购物车和订单处理系统集成来销售产品，该系统将为您处理信用卡交易，并通过电子邮件将订单详细信息发送给您。这些订单将手动处理，但在电子商务网站的早期阶段，处理订单所花费的时间将少于开发自动化系统所需的时间。\n\
  \n**第二阶段：创建您自己的购物车**\n\n使用 PayPal 的购物车是可以的，而且非常简单，但这确实意味着您会失去很多优势。例如，您无法控制 PayPal\
  \ 购物车的外观和感觉，而如果您使用自己的购物车，则可以使其成为网站不可或缺的一部分。这是一个显著的优势，但与其他优势相比，这只是表面上的。例如，有了自己的购物车，您可以将完整的订单作为订单处理过程的一部分存储在数据库中，然后利用这些数据了解客户。通过额外的工作，您还可以将购物篮和结账页面作为销售更多产品的平台。您是否经常被本地商店结账区附近的冲动消费所诱惑？嗯，冲动购物在电子商务中同样有效。拥有自己的购物车和结账页面，您可以选择在结账时提供来自购物车的低价特惠。您甚至可以根据购物车的内容进行分析并给出建议。\n\
  \n第 8 章到第 10 章向您展示如何：\n\n-   构建您自己的购物车\n-   将完整订单传递给 PayPal 进行信用卡处理\n-   创建订单管理页面\n\
  -   实现产品推荐系统\n\n再次强调，在第二阶段结束时，我们的网站将完全可运行。如果您愿意，可以保持现状，或在现有的基于 PayPal 的支付系统中添加功能。但当网站发展壮大后，您将希望自己开始处理订单和信用卡。在这部分，事情会变得复杂，您需要认真且谨慎地对待网站的安全性。\n\
  \n**第三阶段：处理订单与添加功能**\n\n\n\n"
- '# 电子商务的核心


  电子商务的核心——也是它真正区别于其他 Web 开发项目的地方——在于处理订单和信用卡。`PayPal`帮助我们推迟了这一点，但有很多充分的理由说明，最终你还是会想与`PayPal`分道扬镳：


  **成本**：`PayPal`并不昂贵，但它提供的额外服务终究需要以某种方式支付。


  转向更简单的信用卡处理服务可能意味着更低的交易成本（尽管这不是铁律），虽然开发自己的系统显然会带来前期投入。


  **自由度**：`PayPal`有一套相当严格的条款和条件，并且仅适用于有限数量国家的居民。通过自行承担更多的信用卡处理责任，你可以更好地控制网站的工作方式。一个明显的例子是，你可以接受使用地区性的支付方式，例如在英国常见的`Switch`借记卡。


  **集成度**：如果你使用自己的系统处理交易和订单，你可以根据自己的需求将商店和仓库的整合做到任何程度。你甚至可以自动联系第三方供应商，让供应商直接将商品发货给客户。


  **信息**：当你全权处理整个订单时，你可以记录并整理交易中涉及的所有信息——然后将其用于营销和研究目的。


  通过将订单处理与仓库、履行中心或供应商集成，你可以显著降低成本。这可能会减少履行中心对员工的需求，或者让业务在无需增加人手的情况下增长。


  获取客户信息可以反哺整个流程，为你提供关于如何增加销售额的宝贵信息。最简单的方式是，你可以通过电子邮件向客户发送特别优惠，或者通过新闻简报保持联系。你还可以分析购买模式，并利用这些数据来制定有针对性的营销活动。


  ## 第三阶段


  在第三阶段，你将学习如何：


  -   构建一个客户账户模块，以便客户每次下单时都能登录并调取其详细信息

  -   允许客户添加产品评论

  -   使用`XML Web Services`将`Amazon.com`的产品集成到你的网站中

  -   使用`SSL`（安全套接层）建立安全连接，确保用户在互联网上传输的数据得到加密

  -   使用`DataCash`和`Authorize.net`处理信用卡收费

  -   将信用卡号码安全地存储在数据库中


  这第三阶段是所有阶段中最复杂的一个，需要艰苦细致的工作。然而，到第三阶段结束时，你将拥有一个包含可搜索产品目录、购物车、安全结账和完整订单处理系统的电子商务网站。


  ## HatShop


  正如我们之前所说，我们将建立一个名为`HatShop`的在线商店（不出所料，它将销售帽子）。图 1-1 展示了`HatShop`在开发第二阶段某个时刻的外观。


  ![图 1-1](img/00150.png)


  **图 1-1**：`HatShop`在第二阶段的开发情况


  > **提示**：你可以在 `http://www.cristiandarie.ro/php-postgresql-ecommerce/` 找到`HatShop`在线版本的链接。非常感谢
  Hats in the Belfry (`http://www.hatsinthebelfry.com`) 的朋友们，他们允许我们使用他们的一些产品来填充我们的虚拟`HatShop`商店。


  就本书而言，我们假设该客户已经是一家邮购公司，并拥有良好的客户网络。这家公司并非行业新手，它希望这个网站能让现有客户更方便、更愉快地购物——目标是最终促成他们购买更多商品。


  知道了这一点，我建议采用分阶段开发，因为：


  -   公司最初不太可能获得海量订单——我们应该尽可能降低建站初期成本。

  -   公司习惯于手动处理邮购订单，因此手动处理由`PayPal`邮件发送的订单不会带来太多新问题。

  -   公司不想把所有资金都投入到一个庞大的电子商务网站上，结果却发现人们实际上还是更喜欢邮购！或者，它可能在第一阶段后发现网站完全满足了它的需求，没有必要进一步扩展。无论哪种情况，我希望提供较低的初始成本能让我的投标更具优势。（这也可能意味着我能在总价上定得更高。）


  因为这家公司已经是邮购业务，它很可能已经拥有一个商户账户并可以处理信用卡。因此，对于这家公司来说，尽快进入第三阶段是最好的，这样它就能享受到优惠的卡片处理费率。


  ## 总结


  在本章中，我们看到了真实而充满竞争的商业世界中电子商务的一些原则，其中重要的是聚焦短期收入并降低风险。我们探讨了电子商务网站盈利的三个基本原因：


  -   获取更多客户

  -   让客户花费更多

  -   降低订单履行成本


  我们将这些原则应用到了一个三阶段计划中，该计划在每个阶段都交付一个可用的站点，并将在本书中持续扩展。


  至此，你已经向帽子店的老板们提交了你的计划。在下一章中，你将戴上你的程序员的帽子，开始设计和构建这个网站（当然，前提是你拿到了合同）。


  ---


  ## 第 2 章：奠定基础


  既然你已经说服了客户，让他们相信你能创建一个很棒的网站来辅助他们的业务，那么是时候停止庆祝，开始思考如何将你许下的所有承诺付诸实践了。像往常一样，当你在纸上写下必须满足的技术要求时，一切似乎开始变得比最初预想的要复杂一些。


  > **注意**：请注意，本章及下一章内容较为密集，如果你对`PHP`或`PostgreSQL`没有太多经验，可能会觉得颇具挑战性。诸如《Beginning PHP
  and PostgreSQL 8: From Novice to Professional》（Apress, 2006）之类的书籍，能在你构建第一个电子商务网站方面提供很好的准备。我们强烈建议你始终遵循一个高效的项目管理方法，以最大程度地确保项目在预算内按时成功。大多数项目管理理论都隐含地要求你和你的客户签署一份包含即将创建项目细节的初始需求/规范文档。你可以在创建解决方案时使用此文档作为指南；如果客户在开发开始后提出新的需求或要求更改，它还能让你有依据收取额外费用。更多详情请参阅附录
  B。





