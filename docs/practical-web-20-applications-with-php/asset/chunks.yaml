    The class constructor is where we define roles, resources, and permissions. In
    Listing 3-5


    we first make the administrator role inherit from the member role. This means
    that any permission given to members is also given to administrators. Additionally,
    we can then give the administrator role privileges on its own to access the admin
    area.


    Next, we set up the default permissions (that is, permissions that apply to all
    roles). These allow access to everything except for the account and admin resources.
    Obviously, a guest needs the chance to authenticate themselves and become a privileged
    user, so we must open up access to the login and fetchpassword privileges. Additionally,
    if they are not yet registered, we need to grant them access to register and registercomplete
    (a helper action used to confirm registration to a user).


    Once a guest becomes authenticated (thereby becoming either a member or an administrator),
    they need to be able to access the account resource. Since the administrator role
    inherits from the member role, permitting members access to the account resource
    also gives access to administrators.


    Finally, we open up the admin areas to administrators only. In other words, guests
    and members cannot access this area.


    Now, let’s take a look at the preDispatch() method, which takes the user request
    as an argument. First, we set up the role and resource so the ACL check will work
    correctly. If the resource is not found, we set the $resource variable to null,
    which means the default permission will be used for the given role. Based on the
    way we have set this up (that is, allowing access to everything), this effectively
    means the ACL check will return true. If the role is not found, we use the guest
    role instead.


    ■**Note** We are accessing the user_type property of the identity stored with
    Zend_Auth. We haven’t yet looked at storing this property with the identity when
    performing a login, but we will cover this in Chapter 4, when we implement the
    login action to our account controller.


    Finally, we call isAllowed() to determine whether the $role role has access to
    the $privilege privilege of resource $resource. If this returns true, we do nothing
    and let the front controller dispatch loop continue. If this returns false, we
    reroute the dispatcher to execute the login action of the account controller.
    In other words, when an unprivileged user tries to do something they are not allowed
    to do, they will be redirected to a login screen.


    ■**Note** One side effect of this behavior is that if a member tries to access
    the admin area, they will be shown a login screen, even though they are already
    logged in. You could modify the code to show the login screen if no identity is
    found in $auth, but show a different screen if the user is logged in but has insufficient
    privileges.


