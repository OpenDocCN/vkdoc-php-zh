- fmt: "### 排版后内容\n\nThis allows us to delegate a task typically involved with the\
    \ data of our application to the model where data (or business logic) should dwell.\n\
    \n### Goals\n\n- We need to extend our `Model` class to include methods of posted\
    \ form data validation, and to apply this validation before allowing rows to be\
    \ added, updated, or deleted.\n- We need to create the action and view for the\
    \ settings page.\n\n### Validation\n\nGetting validation right can be a tricky\
    \ thing, particularly when the aim of MVC is to allow for good separation of concerns.\
    \ Validation is connected to a number of unrelated components, mainly data types\
    \ and views. The basic function of validation is to secure user input, but that\
    \ has to come from somewhere (such as views/form data). That data has to relate\
    \ to predefined data structures (such as database table fields), and validation\
    \ needs to facilitate feedback to the user in such a way that they know what was\
    \ wrong with the data they submitted.\n\nBecause we already have a fairly extensive\
    \ ORM library, which we have contained in our model layer, we will be adding validation\
    \ logic to the model layer. What we want to do is be able to define not only our\
    \ database fields (at a model level), but also the validation through which their\
    \ data must pass. Consider the example model shown in Listing 16-1.\n\n**Listing\
    \ 16-1.** Validating the Model\n\n```\nclass User extends Shared\\Model\n{\n \
    \   /**\n     * @column\n     * @readwrite\n     * @primary\n     * @type autonumber\n\
    \     */\n    protected $_id;\n\n    /**\n     * @column\n     * @readwrite\n\
    \     * @type text\n     * @length 100\n     *\n     * @validate required, alpha,\
    \ min(3), max(32)\n     * @label first name\n     */\n    protected $_first;\n\
    \n    /**\n     * @column\n     * @readwrite\n     * @type text\n     * @length\
    \ 100\n     *\n     * @validate required, alpha, min(3), max(32)\n     * @label\
    \ last name\n     */\n    protected $_last;\n\n    /**\n     * @column\n     *\
    \ @readwrite\n     * @type text\n     * @length 100\n     * @index\n     *\n \
    \    * @validate required, max(100)\n     * @label email address\n     */\n  \
    \  protected $_email;\n\n    /**\n     * @column\n     * @readwrite\n     * @type\
    \ text\n     * @length 100\n     * @index\n     *\n     * @validate required,\
    \ min(8), max(32)\n     * @label password\n     */\n    protected $_password;\n\
    }\n```\n\nWe added two new metadata fields: `@validate` and `@label`. It would\
    \ be ideal if these fields could be used to (1) define the validation that should\
    \ be performed on the contained data, and (2) customize the validation error message\
    \ that could be presented to the user. In order for us to achieve these two requirements,\
    \ we need to modify the `Model` class.\n\n> **Note** Validation is a common requirement\
    \ of web applications, so we can safely add it to the framework codebase. If the\
    \ requirements were application-specific, we would consider creating a shared\
    \ application library.\n\nThe first change we need to make to the `Model` class\
    \ is to add a map of validation methods and messages, as shown in Listing 16-2.\n\
    \n**Listing 16-2.** Validation Map\n\n```\n/**\n * @read\n */\nprotected $_validators\
    \ = array(\n    \"required\" => array(\n        \"handler\" => \"_validateRequired\"\
    ,\n        \"message\" => \"The {0} field is required\"\n    ),\n    \"alpha\"\
    \ => array(\n        \"handler\" => \"_validateAlpha\",\n        \"message\" =>\
    \ \"The {0} field can only contain letters\"\n    ),\n    \"numeric\" => array(\n\
    \        \"handler\" => \"_validateNumeric\",\n        \"message\" => \"The {0}\
    \ field can only contain numbers\"\n    ),\n    \"alphanumeric\" => array(\n \
    \       \"handler\" => \"_validateAlphaNumeric\",\n        \"message\" => \"The\
    \ {0} field can only contain letters and numbers\"\n    ),\n    \"max\" => array(\n\
    \        \"handler\" => \"_validateMax\",\n        \"message\" => \"The {0} field\
    \ must contain less than {2} characters\"\n    ),\n    \"min\" => array(\n   \
    \     \"handler\" => \"_validateMin\",\n        \"message\" => \"The {0} field\
    \ must contain more than {2} characters\"\n    )\n);\n\n/**\n * @read\n */\nprotected\
    \ $_errors = array();\n```\n\nThe `$_validators` array will be used by the `Model`\
    \ class to determine the appropriate validation methods to perform (based on metadata).\
    \ To illustrate this, a metadata flag resembling `@validate required` would lead\
    \ to the execution of the `_validateRequired()` method (on the `Model` class),\
    \ and present the error \"The {0} field is required.\" We will be substituting\
    \ `{0}` with a proper value in a bit."
