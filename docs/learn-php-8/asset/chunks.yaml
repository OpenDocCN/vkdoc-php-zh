    \ equivalent to an `if/then` statement\n\n12.  The break statement does which\
    \ of the following?\n\n1.  Ends execution of the `for`, `foreach`, `do-while`,\
    \ and/or\n        `switch`\n        structure(s)\n\n2.  Executes the `for`, `foreach`,\
    \ `do-while`, and/or\n        `switch`\n        structure(s)\n\n3.  Ensures the\
    \ execution of `for`, `foreach`, `do-while`, and/or\n        `switch`\n      \
    \  structure(s)\n\n4.  Breaks the `for`, `foreach`, `do-while`, and/or\n     \
    \   `switch`\n        structure(s) before they are executed\n\n13.  Using the\
    \ `getAttribute` will do\n    which of the following?\n\n1.  Return the value\
    \ of the attribute\n\n2.  Print a list of data\n\n3.  Load a new HTML page\n\n\
    4.  None of these\n\n14.  Which function converts HTML tags into their entities\
    \ versions?\n\n1.  `strlen`\n\n2.  `htmlentities`\n\n3.  `explode`\n\n4.  `getAttribute`\n\
    \n15.  Which is a commonly used function to find the length of a string?\n\n1.\
    \  `strlen`\n\n2.  `getLength`\n\n3.  String concatenation\n\n4.  `__toString`\n\
    \n**True/False**\n\n1.  The `count`\n    function returns the number of elements\
    \ in an array.\n\n2.  When using an array, the index must not exceed the size\
    \ of the\n    array.\n\n3.  A subscript is the name given to position where the\
    \ item currently\n    exists in the array and is usually contained in `[]`.\n\n\
    4.  A *private* function is an event in PHP to network for a\n    job.\n\n5. \
    \ One purpose of `exit` is to end the\n    program.\n\n6.  The `getElementsByTagName`\n\
    \    searches for occurrences that correspond to a specific XML tag.\n\n7.  `get_declared_classes`\n\
    \    returns an array of all classes that currently exist in a program in\n  \
    \  order from first to last.\n\n8.  Dependency injection allows the program client\
    \ to enter a block of\n    code to know the implementation of the block of code\
    \ it will be\n    using.\n\n**Short Answer/Essay**\n\n1.  Why should you validate\
    \ user input both within the interface tier and\n    business rules tier?\n\n\
    2.  Why should input received in the business rules tier be filtered?\n    What\
    \ are the different ways you can filter the information?\n\n3.  Explain how you\
    \ can reduce errors from user input by the type of HTML\n    objects (such as\
    \ radio buttons) used to accept information.\n\n4.  What causes the example code\
    \ shown in the dependency injection\n    section of this chapter inefficient?\
    \ How does this code help a developer\n    with version changes to the application?\n\
    \n**Projects**\n\n1.  Create an application that registers a runner for the local\
    \ 5K road\n    race. The interface should accept all necessary personal information\n\
    \    (name, address, gender, age, and T-shirt size). Whenever possible, use\n\
    \    HTML objects that restrict input (such a select object for T-shirt size\n\
    \    and state). Validate all information in the interface tier using both\n \
    \   HTML5 and JavaScript. If the information is valid, pass the information\n\
    \    to the business rules tier. The business rules tier will validate the\n \
    \   information received and filter out any harmful information. Once all\n  \
    \  information has been accepted, the program will display the cost of\n    entering\
    \ the race ($25). Any shirts over XL will add an additional\n    charge of $2\\\
    . Any runner 65 or older will be charged $5 less.\n\n2.  Develop the application\
    \ described in #1 to use dependency injection\n    to allow the developer to change\
    \ file name and locations without\n    requiring code changes to the application\
    \ itself.\n\n**Term Project**\n\n1.  Update the Chapter [4](#394210_2_En_4_Chapter.xhtml)\
    \ Term Project to validate all\n    information as it is entered into an HTML\
    \ form (via HTML as shown in\n    Chapter [5](#394210_2_En_5_Chapter.xhtml)) in\
    \ the interface tier. After the\n    information is validated, it is passed to\
    \ the business rules tier. The\n    business rules tier will validate the information\
    \ received and filter\n    out any harmful information. Once the information is\
    \ accepted (and\n    stored in the properties), the application will display all\
    \ fields of\n    the product stored in the warehouse of the ABC Computer Parts\
    \ Company.\n    The interface tier and the business rules tier must be separated\
    \ using\n    dependency injection (via an XML file), as shown. Your completed\
    \ project\n    should use logic similar to the examples shown in this chapter.\n\
    \n6. Handling and Logging\nExceptions\n\n*The education of a man is never completed\
    \ until he\ndies.—*Robert *E.* Lee *(as quoted in* Peter*'s\nQuotations: Ideas\
    \ for Our Time (1977) by* Laurence J. Peter*, p.\n175)*\n\nChapter Objectives/Student\
    \ Learning Outcomes\n\nAfter completing this chapter, the student will be able\
    \ to\n\n*   Explain the difference between errors and exceptions\n\n*   Create\
    \ a PHP program that can handle general exceptions\n\n*   Create a PHP program\
    \ that can create, raise, and handle user\n    exceptions\n\n*   Explain and use\
    \ a `switch` and/or\n    embedded `if/else`\n    statement\n\n*   Create a PHP\
    \ program that uses the `while` loop and/or the\n    `for`\n    loop\n\n*   Create\
    \ a program that reads/updates a text file using a\n    two-dimensional array\n\
    \n*   Create a PHP program that logs exceptions and emails support\n    personnel"
  trans: "\n### 多项选择题\n\n3.  在数组中搜索一个值\n4.  以上都不是\n\n8.  PHP 方法 `count` 将返回数组的哪一个属性？\n\
    \    1.  `last_position`（最后位置）\n    2.  `subscript`（下标）\n    3.  `size`（大小）\n\
    \    4.  以上都不是\n\n9.  哪个方法会产生一个可用于引用数组最后位置的变量？\n    1.  `$last_position=count($class_array)\
    \ - 1;`\n    2.  `$class_array=$last_position(count - 1);`\n    3.  `$count=$last_position\
    \ - 1($class_array);`\n    4.  `$last_position=$class_array -1 (count);`\n\n10.\
    \ `exit` 命令执行以下哪项操作？\n    1.  自动将用户引导至新页面\n    2.  如果程序未从正确的 HTML 页面调用，则关闭程序\n\
    \    3.  关闭你的电脑\n    4.  以上都不是\n\n11. 关于 `foreach` 命令，哪项描述不正确？\n    1.  仅适用于数组和对象\n\
    \    2.  用于解析数组中的每个键/值对\n    3.  可以通过引用进行迭代\n    4.  等同于 `if/then` 语句\n\n12. `break`\
    \ 语句执行以下哪项操作？\n    1.  结束 `for`、`foreach`、`do-while` 和/或 `switch` 结构的执行\n    2.\
    \  执行 `for`、`foreach`、`do-while` 和/或 `switch` 结构\n    3.  确保执行 `for`、`foreach`、`do-while`\
    \ 和/或 `switch` 结构\n    4.  在 `for`、`foreach`、`do-while` 和/或 `switch` 结构执行之前中断它们\n\
    \n13. 使用 `getAttribute` 将执行以下哪项操作？\n    1.  返回属性的值\n    2.  打印数据列表\n    3.  加载新的\
    \ HTML 页面\n    4.  以上都不是\n\n14. 哪个函数将 HTML 标签转换为其实体版本？\n    1.  `strlen`\n   \
    \ 2.  `htmlentities`\n    3.  `explode`\n    4.  `getAttribute`\n\n15. 哪个是常用于查找字符串长度的函数？\n\
    \    1.  `strlen`\n    2.  `getLength`\n    3.  字符串连接\n    4.  `__toString`\n\n\
    ### 判断题\n\n1.  `count` 函数返回数组中元素的数量。\n2.  使用数组时，索引不得超过数组的大小。\n3.  下标是指定项目当前在数组中所处位置的名称，通常包含在\
    \ `[]` 中。\n4.  `private` 函数是 PHP 中用于网络求职的一个事件。\n5.  `exit` 的一个用途是结束程序。\n6.  `getElementsByTagName`\
    \ 搜索与特定 XML 标签匹配的出现项。\n7.  `get_declared_classes` 按从第一个到最后一个的顺序返回程序中当前存在的所有类组成的数组。\n\
    8.  依赖注入允许程序客户端进入一个代码块，以了解它将使用的该代码块的实现。\n\n### 简答题/论述题\n\n1.  为什么你应该同时在界面层和业务规则层中验证用户输入？\n\
    2.  为什么业务规则层接收到的输入需要被过滤？你可以通过哪些不同方式过滤这些信息？\n3.  解释如何使用用于接收信息的 HTML 对象类型（例如单选按钮）来减少用户输入错误。\n\
    4.  是什么导致本章依赖注入部分中展示的示例代码效率低下？这段代码如何帮助开发人员应对应用程序的版本变更？\n\n### 项目\n\n1.  创建一个为当地\
    \ 5 公里公路赛注册跑者的应用程序。界面应接受所有必要的个人信息（姓名、地址、性别、年龄和 T 恤尺码）。尽可能使用限制输入的 HTML 对象（例如，用于\
    \ T 恤尺码和州的 select 对象）。在界面层使用 HTML5 和 JavaScript 验证所有信息。如果信息有效，则将信息传递到业务规则层。业务规则层将验证接收到的信息并过滤掉任何有害信息。一旦所有信息被接收，程序将显示参赛费用（$25）。任何超过\
    \ XL 尺码的衬衫将额外收取 $2 费用。任何 65 岁或以上的跑者将少收取 $5 费用。\n2.  开发问题 #1 中描述的应用程序，以使用依赖注入来允许开发人员更改文件名和位置，而无需修改应用程序本身的代码。\n\
    \n### 学期项目\n\n1.  更新第 4 章的学期项目，以验证在界面层输入到 HTML 表单中的所有信息（按照第 5 章中通过 HTML 所示的方式）。信息验证通过后，将其传递到业务规则层。业务规则层将验证接收到的信息并过滤掉任何有害信息。一旦信息被接收（并存储在属性中），应用程序将显示存储在\
    \ ABC 电脑零件公司仓库中的产品的所有字段。界面层和业务规则层必须使用依赖注入（通过 XML 文件）分离，如图所示。你完成的项目应使用与本示例类似的逻辑。\n\
    \n## 6. 异常处理与日志记录\n\n*一个人的教育永无止境，直到他去世。* ——罗伯特·E·李（引自劳伦斯·J·彼得所著《彼得的语录：我们这个时代的想法》（1977\
    \ 年），第 175 页）\n\n### 本章目标/学生学习成果\n\n完成本章后，学生将能够：\n\n*   解释错误与异常之间的区别\n*   创建一个能够处理一般异常的\
    \ PHP 程序\n*   创建一个能够创建、引发和处理用户自定义异常的 PHP 程序\n*   解释并使用 `switch` 和/或嵌入式 `if/else`\
    \ 语句\n*   创建一个使用 `while` 循环和/或 `for` 循环的 PHP 程序\n*   创建一个使用二维数组读取/更新文本文件的程序\n\
    *   创建一个能够记录异常并向支持人员发送邮件的 PHP 程序\n"
- fmt: "# Handling Exceptions\n\nAs a programmer, you want to do everything possible\
    \ to ensure that your program will not crash. Anyone using your application will\
    \ get a bad taste in their mouths if they have to deal with system crashes. You\
    \ have probably dealt with this situation too. As a user, you may have chosen\
    \ one application over another because of bad reviews. Once an application has\
    \ been determined to be “buggy,” it is difficult to convince customers to use\
    \ the product, even if newer versions have corrected some or all of the problems.\
    \ An application must be created to handle every possible unanticipated event.\n\
    \nA program must look at each scenario and decide if it can continue or if it\
    \ must shut down. There will always be a possibility that the application cannot\
    \ continue to operate due to an unexpected event. Properly developed programs\
    \ will let the user know that there is a problem without the program crashing.\
    \ Users are more likely to understand when an application asks them to “try again\
    \ later” (assuming the problem is fixed before they return to the web site).\n\
    \n## Errors\n\n`Errors` are program events that are handled by the system that\
    \ cause the program to shut down. In some cases, the system can shut down the\
    \ program and display an error message. Some errors immediately cause the program\
    \ to crash (such as the server itself crashing). Errors are usually events beyond\
    \ the control of the program and not directly caused by code (or lack of code)\
    \ in the program. For example, insufficient memory will cause application errors.\n\
    \n## Exceptions\n\n`Exceptions` are events that are not part of the normal flow\
    \ of the program logic. All exceptions should be handled by the program. Exceptions\
    \ can be “raised” when the application anticipates a problem (a missing file)\
    \ or when the user does something out of the ordinary (tries to enter invalid\
    \ information). The program should “catch” all the exceptions. It can then examine\
    \ the exception and determine if it can be corrected, ignored, or if the application\
    \ must shut down. If a program does not catch exceptions, the system will display\
    \ the exception message and then shut down the application.\n\nPHP produces a\
    \ mixture of errors and exceptions depending on the circumstances. Before PHP\
    \ 5, exception handling did not exist. Thus, some older PHP commands produced\
    \ errors (which shut down the program) instead of exceptions. Since PHP 7 exception\
    \ handling is the “rule.” Errors can be handled with exception handling techniques.\
    \ If exceptions are not handled with program code, the program will halt as if\
    \ it were a fatal error.\n\nAny time an application is dependent on something\
    \ external, it is probable that at some point that action will not take place.\
    \ For example, in the `Dog` application, the user is expected to enter the proper\
    \ information. The application must anticipate that not all users will enter correct\
    \ information. The application is also dependent on several files existing on\
    \ server (`dog_interface`, `dog_container`, `dog_applications`, and `get_breeds`).\
    \ If any of these files are missing, the application cannot continue to function\
    \ properly.\n\nMost object-oriented programming languages use a standard format\
    \ for handing exceptions. The current version of PHP also uses this approach.\
    \ As you explore PHP examples on the Internet, you will discover existing PHP\
    \ code that does not use this standard format. The standard approach uses the\
    \ `try-catch` block.\n\n```php\ntry {\n// code that might cause an exception\n\
    }\ncatch(Throwable $t) {\n// PHP 7+ format for catching all exceptions. Will not\
    \ capture pre PHP 7 problems.\n}\ncatch(Error $e) {\n// PHP 7+ capture and handle\
    \ errors. Will not capture errors that cannot recover such as\n// server memory\
    \ errors\n}\ncatch(Exception $e) {\n// code that will capture PHP 5+ exceptions.\
    \ Not included in book examples\n}\n```\n\nAny code that could cause an exception\
    \ should be included in the `try` block. In addition, you may also want to consider\
    \ placing other conditions (such as math calculations) in the `try` block.\n\n\
    ```php\ntry {\n$result = $firstNumber / $secondNumber;\n}\ncatch(Throwable $t)\
    \ {\n// code that executes if there is an exception\n$t->getMessage();\n}\ncatch(Error\
    \ $e) {\n// PHP 7+ capture and handle errors\n$e->getMessage();\n}\n```\n\nThis\
    \ example might produce an exception if `$secondNumber` contains a zero (dividing\
    \ by zero). If the exception occurs, the code will jump to the Throwable `catch`\
    \ block. Any code in the block will then be executed. The statement `$t->getMessage();`\
    \ will display any system message related to the exception (in this case a message\
    \ about the attempt to divide by zero). However, you do not have to use the system\
    \ message; you can use `echo` or `print` to display messages to the users.\n\n\
    ```php\ntry {\n$result = $firstNumber /$secondNumber;\n}\ncatch(Throwable $t)\
    \ {\necho \"You entered zero for the second number.\nYour entry must be greater\
    \ than zero\";\n}\n```\n\nHowever, there is a problem with these examples. If\
    \ you were trying to catch more than one type of exception in the `try` block,\
    \ all exceptions would go into the one `catch` block. Any exception would display\
    \ the same message.\n\nThere are a couple of different ways you can handle this.\n\
    \nOne way is by throwing your own exception instead of having the system throw\
    \ it.\n\n- **Programming note**—In addition to `getMessage` method, the `Exception`\
    \ and `Error` objects include:\n  - `getCode()`—Displays the code causing the\
    \ exception\n  - `getFile()`—Displays the file name containing code that threw\
    \ the exception\n  - `getLine()`—Displays the line number that threw the exception\n\
    \  - `getTrace()` and `getTraceAsString()`—Display backtrace (exception flow through\
    \ the program) information\n  - In some circumstances, it might be appropriate\
    \ to display the `Exception` or `Error` message to the users. However, the other\
    \ methods should only be used for debugging or log entries. Providing code information\
    \ to the users is usually unnecessary and is a breach of security.\n\n```php\n\
    try {\nif ($secondNumber == 0)\n{ throw new Exception(\"Zero Exception\"); }\n\
    else { $result = $firstnumber / $secondnumber; }\n// other code with exceptions\n\
    }\ncatch(Exception $e) {\nswitch ($e->getMessage()) {\ncase \"Zero Exception\"\
    :\necho \"The value of second number must be greater than zero\";\nbreak;\ncase\
    \ \"Some other exception\":\necho \"You did something else wrong\";\nbreak;\n\
    }\n}\ncatch(Throwable $t) {\necho $t->getMessage();\n}\n```\n\nIn this example,\
    \ a `switch` statement was used in the `catch` block to look at possible exception\
    \ messages. A `switch` statement accomplishes the same task as an embedded `if`\
    \ statement. You could have used:\n\n```php\nIf($e->getMessage == \"Zero Exception\"\
    )\n{ echo \"The value of second number must be greater than zero\"; }\nelse if($e->getMessage\
    \ == \"Some other exception\")\n{ echo \"You did something else wrong\"; }\n```\n\
    \nFor some, the `switch` statement is easier to understand when looking at multiple\
    \ possible values for the same property (variable) or the result of executing\
    \ a method (as in this example). The default section of the `switch` statement\
    \ (or the last `else` statement in the embedded `if` statement) catches anything\
    \ you did not anticipate.\n\nAs stated earlier, it is very important that you\
    \ handle all exceptions and errors. By including the default code, you are able\
    \ to handle exceptions and errors you may have never anticipated. Notice that\
    \ each `case` section must include a `break` as the last statement. This keeps\
    \ the code from following through into the next `case` statement.\n\nAnother way\
    \ you can handle multiple exceptions is to create your own exceptions, throw them,\
    \ and then catch them. You will need to create a class for your own exception."
