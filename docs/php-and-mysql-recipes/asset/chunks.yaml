  trans: "\n要在 SOAP 服务器中使用此类，需要定义一个`SoapServer`类的实例。`SoapServer`类的构造函数接受两个参数：第一个是\
    \ WSDL，第二个是要使用的选项数组。将 WSDL 设为`null`可以省略它，第二个参数中最基本的选项是服务器 API 端点的 URI。在此示例中，SOAP\
    \ 服务器将在本地主机上运行，因此服务器配置如下所示：\n\n```php\n// 14_13.php\n\ninclude \"./14_12.php\"\
    ;\n\n$server = new SoapServer(null, ['uri' => 'http://localhost/14_13.php']);\n\
    $server->setClass('Math');\n$server->handle();\n```\n\n最后两个方法调用用于将`Math`类添加到服务器，暴露其公共函数，并启动服务器。\n\
    \n下一步是创建一个能够使用这些 API 的客户端。由于该文件没有 WSDL 定义，客户端必须事先了解可用的 API。\n\n```php\n// 14_14.php\n\
    \n$client = new SoapClient(null, array(\n    'location' => \"http://localhost/14_13.php\"\
    ,\n    'uri' => \"http://localhost/14_13.php\",\n    'trace' => 1\n));\n\necho\
    \ $return = $client->__soapCall(\"Add\", array(5, 2)) . \"\\n\";\necho $return\
    \ = $client->__soapCall(\"Subtract\", array(5, 2)) . \"\\n\";\necho $return =\
    \ $client->__soapCall(\"Multiply\", array(5, 2)) . \"\\n\";\n```\n\n`SoapClient()`类遵循与`SoapServer()`相同的机制，可以搭配或不搭配\
    \ WSDL 文件使用。但如果没有 WSDL 文件，则必须传入端点的 location 和 uri。\n\n创建 WSDL 文件可能有些繁琐，但这是值得的，因为它能使客户端代码更简洁、更易读。作为上述`Math`服务的示例，我们可以创建一个\
    \ WSDL 文件，定义每个过程调用的输入和输出，并将它们绑定到一个服务中：\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\" ?>\n<definitions name=\"Math\"\n             targetNamespace=\"http://localhost/math.wsdl\"\
    \n>\n\n  <message name=\"addRequest\">\n    <part name=\"i\" type=\"xsd:int\"\
    />\n    <part name=\"j\" type=\"xsd:int\"/>\n  </message>\n  <message name=\"\
    addResponse\">\n    <part name=\"Result\" type=\"xsd:int\"/>\n  </message>\n\n\
    \  <message name=\"subtractRequest\">\n    <part name=\"i\" type=\"xsd:int\"/>\n\
    \    <part name=\"j\" type=\"xsd:int\"/>\n  </message>\n  <message name=\"subtractResponse\"\
    >\n    <part name=\"Result\" type=\"xsd:int\"/>\n  </message>\n\n  <message name=\"\
    multiplyRequest\">\n    <part name=\"i\" type=\"xsd:int\"/>\n    <part name=\"\
    j\" type=\"xsd:int\"/>\n  </message>\n  <message name=\"multiplyResponse\">\n\
    \    <part name=\"Result\" type=\"xsd:int\"/>\n  </message>\n\n  <portType name=\"\
    MathPortType\">\n    <operation name=\"Add\">\n      <input message=\"tns:addRequest\"\
    />\n      <output message=\"tns:addResponse\"/>\n    </operation>\n    <operation\
    \ name=\"Subtract\">\n      <input message=\"tns:subtractRequest\"/>\n      <output\
    \ message=\"tns:subtractResponse\"/>\n    </operation>\n    <operation name=\"\
    Multiply\">\n      <input message=\"tns:multiplyRequest\"/>\n      <output message=\"\
    tns:multiplyResponse\"/>\n    </operation>\n  </portType>\n\n  <binding name=\"\
    MathBinding\" type=\"tns:MathPortType\">\n    <soap:binding style=\"rpc\"\n  \
