    \   设计数据库表结构\n*   使用PHP与MySQL/MariaDB数据库进行安全交互"
  raw: "foreach loops work well with arrays. The preceding example loops\nthrough\
    \ the one-dimensional numerical array ($class_array) shown in\nprevious examples\
    \ and displays each value. $value represents the current\nvalue that the loop\
    \ is looking at in the array. foreach loops do not\nrequire the programmer to\
    \ create code that checks for the end of the\narray. This eliminates any possibility\
    \ that an “out of bounds” error\nmessage could occur. Also, foreach loops automatically\
    \ skip over any\npositions in the array that have not yet been declared. This\
    \ eliminates\nany possible “null value” messages being displayed when it loops\
    \ through\nthe array.\n\nThere are lots of php functions available to work with\
    \ arrays. Let us\ntake a moment to look at a couple of examples. *array_merge*\
    \ can\nbe used to add the contents of one or more arrays to the end of any\nexisting\
    \ array or to an array that has been defined but does not\ncurrently contain any\
    \ values.\n\n```\n\nThe $color2 array is merged to the end of the $color1 array,\
    \ and the\nresult is placed into the new $result array. The original arrays do\
    \ not\nchange. The print_r function is a handy tool that will display the\ncontents\
    \ of the array $result as follows.\n\n```\nArray\n(\n[0] => red\n[1] => green\n\
    [2] => blue\n[3] => yellow\n)\n```\n\nYou can also use the \n*spread operator*\
    \  to merge two arrays together.\n\n```\n\nThe spread operator (…) allows you\
    \ to place one array inside of another\narray at any location. The *var_dump*\
    \ function is a great tool to\ndiscover what is inside of any array and the data\
    \ type for the position\nin the array. It provides more details than the print_f\
    \ function. The\n$cars array now contains\n\n```\narray(5) {\n[0]=>\nstring(5)\
    \ \"civic\"\n[1]=>\nstring(5) \"smart\"\n[2]=>\nstring(5) \"falcon\"\n[3]=>\n\
    string(7) \"mustang\"\n[4]=>\nstring(5) \"tuson\"\n}\n```\n\nEnums\n\nEnumerations\
    \ (enums)\n   are a\ncollection of a type with a fixed number of possible values.\
    \ As an\nexample, let us define a Food enum with certain allowed food types.\n\
    \n```\nenum Food {\ncase: Hotdog;\ncase: Fish;\ncase: Steak;\ncase: Salad;\n}\n\
    ```\n\nOnce declared, you can use enums as type hints to restrict the values\n\
    accepted or returned from a function.\n\n```\nfunction eating( Food $type)\n{\n\
    echo \"I like $type\";\n}\n```\n\nTo pass a value or return a value, you must\
    \ include the enum and its\nvalue )with (::) or it will produce an error.\nFor\
    \ more information on enums, visit [`www.zend.com/blog/php-8-1`](http://www.zend.com/blog/php-8-1)\
    \ .\n\nSummary\nAs we stated in the beginning of the chapter, the goal was to\n\
    introduce you to the basic structure of the language. We have reviewed\nthe use\
    \ and creation of functions, conditional statements, and\nvariables. We do not\
    \ expect you to be a php expert, yet. There are\nplenty more chapters ahead which\
    \ will build your knowledge. Now that you\nhave a general understanding, we are\
    \ ready to explore the use of\ndatabases. We will soon use this knowledge to build\
    \ a blogging\nsystem.\n\nProjects\n\n1.  Create a numerical array which contains\
    \ the information about your\n    house or apartment including number of bedrooms,\
    \ number of bathrooms,\n    and the street address. Use one of the looping structures\
    \ to output the\n    information in a well-formatted table. Hint: You can use\
    \ HTML and CSS\n    code within print or echo statements to create your table.\n\
    \n2.  Complete #1 using an associative array.\n\n3.  Change #1 to include a two-dimensional\
    \ array which will include all\n    houses on your street or apartments in your\
    \ complex. To output the\n    information, you will need two embedded loops. You\
    \ can either skim ahead\n    in the book to discover examples or research “displaying\
    \ a php\n    two-dimensional array” in your favorite search engine on the Web.\n\
    \nPart II\n\n6. Databases, MVC, and Data\nObjects\n\nObjectives\n\nAfter completing\
