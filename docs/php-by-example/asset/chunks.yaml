  trans: "\n最后，另一种测试 PHP 代码的方法是将相应文件托管在外部服务器上。这是最可靠的测试方式，但它有一个明显的缺点，因为并不是每个人都有这样的条件。不过总的来说，思路很简单：将文件上传到服务器，然后用浏览器打开它。图\
    \ 1-24 显示了一个浏览器窗口，其中打开了地址为 [`www.vasilev.com.ua/php/hi.php`](http://www.vasilev.com.ua/php/hi.php)\
    \ 的文档。\n\n![](img/613529_1_En_1_Fig24_HTML.jpg)\n\n一张浏览器页面的截图，显示了来自地址 `www.vasilev.com.ua/php/hi.php`\
    \ 的 `hi.php` 程序的输出结果。标题为“第一个程序”。输出内容显示为 `Hello, PHP!`。\n\n图 1-24\n\n在浏览器窗口中打开了页面\
    \ [`www.vasilev.com.ua/php/hi.php`](https://www.vasilev.com.ua/php/hi.php)\n\n\
    使用外部服务器的另一个不便之处在于，你需要修改一个不在本地计算机上的文件。\n\n![](img/613529_1_En_1_Figh_HTML.jpg)\
    \ 信息图标。**注意**\n\n在众多提供的选项中，必须选择一种。原则上，使用 PHP 解释器从命令行运行程序代码是一个完全可以接受的选项。它适用于测试除最后一章之外所有章节中的示例。要查看\
    \ PHP 脚本的结果，你必须使用本地服务器模式。\n\n## 总结\n\n- 接下来的章节将讨论 PHP 语言的特性。这些章节中涉及的代码功能可以在解释器模式下测试。为此，请将程序保存为扩展名为\
    \ `.php` 的文件，然后在命令行中执行相应的指令。\n\n- 开发 PHP 项目的一个好选择是 NetBeans 开发环境。它允许你创建项目，既可以在解释器模式下测试，也可以使用本地服务器进行测试。\n\
    \n- 要测试程序在服务器模式下的执行正确性，可以使用以下模板（将 PHP 代码放在 `<?php` 和 `?>` 指令之间的代码块中）。\n\n  ```\n\
    \  // 页面标题\n  ```\n\n# 2. 变量与数据类型\n\n> *我们不能把这些东西丢掉。它们是我们的一部分。*\n> \n> —*《家有阿福》*（电视剧）\n\
    \n通常情况下，程序都要处理数据。而数据需要存放在某个地方。如果你处理的是小块信息，变量是存储它们的好地方，这也是本章的重点。本章还讨论了程序中用到的主要数据类型，以及使用变量执行的基本操作。\n\
    \n## 变量入门\n\n在其“经典”意义上，变量是一块命名的内存区域，可以通过名称来访问它，以读取内存中的值或向其中写入新值。在 PHP 中，创建变量非常简单：你只需要给变量赋值即可。换句话说，当给变量赋值时，该变量就出现在程序中了。\n\
    \nPHP 中有一条规则：变量的名称以 `$` 符号开头（这个符号是变量名的一部分）。要为一个变量赋值，你需要指定变量名，然后加上赋值运算符（等号 `=`\
    \ ），最后是该变量的值。例如，命令 `$number = 123` 将整数值 `123` 赋给变量 `$number`，命令 `$text = \"Hello,\
    \ PHP\"` 将文本值 `\"Hello, PHP\"` 赋给变量 `$text`。\n\n![](img/613529_1_En_2_Figa_HTML.jpg)\
    \ 信息图标。**注意**\n\n在 PHP 中，不存在所谓的变量类型。变量本身没有类型。但是变量所引用的值是有类型的。在程序执行的不同阶段，同一个变量可以引用不同类型的值。\n\
    \n首先，让我们来看一个使用变量的简单示例——代码清单 2-1。\n\n```\n代码清单 2-1\n创建一个变量\n```\n\n程序执行的结果如下：\n\
    \n```\n程序输出结果（来自代码清单 2-1）\n变量 $number 的值为 123\n```\n\n在该程序中，你还会遇到 PHP 允许的三种注释类型。\n\
    \n![](img/613529_1_En_2_Figb_HTML.jpg) 信息图标。**注意**\n\n注释是程序中的文本，它是写给程序员看的，在程序执行时会被忽略。换句话说，注释用于解释命令的用途，但不会影响程序的执行。\n\
    \n有单行注释。单行注释以双斜杠 `//` 或 `#` 字符开头。`//` 或 `#` 字符右侧的所有内容都是注释。除了单行注释，还有多行注释。这种注释可以跨越多行。多行注释以\
    \ `/*` 开头，以 `*/` 结尾。这两个字符之间的所有内容都是注释。该程序使用了所有三种注释类型，尽管并没有这个必要。\n\n除了注释之外，程序中还有几条值得注意的命令。第一条是\
    \ `$number = 123` 指令，它创建了值为 `123` 的变量 `$number`。此外，还有两条用于在终端中显示消息的命令。虽然两条命令都使用了\
    \ `print()` 函数，但它们有所不同。\n\n![](img/613529_1_En_2_Figc_HTML.jpg) 信息图标。**注意**\n\n\
    这次，你在没有使用括号的情况下向 `print()` 函数传递了一个参数。\n\n这两个命令的区别如下：在第一种情况下，要显示的文本被括在单引号中。在第二种情况下，文本被括在双引号中。原则上，在这两种情况下，你得到的是文本。这意味着单引号和双引号是创建文本的两种不同方式。它们几乎等同。但也有一些差异存在。在这个例子中，两个文本值（`'The\
    \ variable $number: '` 和 `\"the value $number\"`）都包含了变量 `$number` 的名称。因此，如果变量名出现在用单引号括起来的文本中，那么在终端显示文本时，将显示变量名本身。如果变量名被放在用双引号括起来的文本中，那么在输出窗口中显示时，会将其值替换进去，而不是显示变量名。因此，在执行\
    \ `print 'The variable $number: '` 命令时，屏幕上显示的就是单引号中的文本。但执行 `print \"the value\
    \ $number\"` 命令时，文本中的变量名 `$number` 会被其值 `123` 替换。\n\n![](img/613529_1_En_2_Figd_HTML.jpg)\
    \ 信息图标。**注意**\n\n调用 `print()` 函数的结果是，该函数接收的参数的值会显示在输出窗口中。但输出区域中不会有换行符。因此，在讨论的这个程序中，两条消息会依次显示，位于同一行。\n\
    \n值得注意的是，PHP 中的许多常见任务可以通过不同方式完成。例如，有几种注释类型、几种创建文本字面量的方法、几种显示消息的指令，这个列表还不完整。这种情况在\
    \ PHP 中很典型。从这个意义上说，PHP 语言非常便利和“舒适”，如果这样的定义适用于一门编程语言的话。\n\n| 详细信息 |\n| --- |\n\
    | 除了变量，你还可以使用常量。常量与变量的不同之处在于，常量的值不能更改。要创建一个常量，请使用 `define()` 函数，该函数的第一个参数是常量的名称，第二个参数是常量的值。常量名称中不使用美元符号\
    \ `$`。常量名称通常由大写字母组成。例如，命令 `define(\"NUMBER\", 123)` 定义了值为 `123` 的常量 `NUMBER`。你可以使用\
    \ `defined()` 函数检查具有特定名称的常量是否存在。该函数的参数是常量的名称（放在引号中）。 |\n"
- fmt: '## Basic Data Types


    As noted, variables have no type. Nevertheless, the value referred to by a variable
    has a type. You can use the `gettype()` function to determine the value type that
    the variable refers to. The variable is passed as an argument to the function.
    The result of the function is a text with the name of the type. In particular,
    integer numbers are of the `integer` type. Real numbers (floating point numbers)
    are of the `double` type. Text is of the `string` type. There is also the `boolean`
    type (logical values `true` or `false`), `array` (an array), `object` (an object),
    `resource` (a reference to an external resource), and `NULL` (which means no value
    for the variable). A small example that illustrates the situation is shown in
    Listing [2-2](#613529_1_En_2_Chapter.xhtml#PC3).


    ```

    <?php

    $value=123;

    echo $value," => type ",gettype($value),"\n";

    // A text:

    $value="text";

    echo $value," => type ",gettype($value),"\n";

    // A real number:

    $value=12.3;

    echo $value," => type ",gettype($value),"\n";

    // The null reference:

    echo $VALUE," => type ",gettype($VALUE),"\n";

    ?>

    Listing 2-2

    The Type of Value

    ```


    The result of the program execution is as follows.


    ```

    The output of the program (from Listing 2-2)

    123 => type integer

    text => type string

    12.3 => type double

    => type NULL

    ```


    ![](images/613529_1_En_2_Chapter/613529_1_En_2_Figp_HTML.gif)A bell icon. **The
    PHP 8 Standard**


    When using PHP 8 and higher, you get a warning about the unknown variable `$VALUE`,
    which appears between the `type` and `NULL` tokens.


    Here, you deal with a simple program. The `$value` variable gets consequently
    different values, and its type is determined for each value. To determine the
    type, use the `gettype()` function, the argument of which is the `$value` variable.


    ![](images/613529_1_En_2_Chapter/613529_1_En_2_Fige_HTML.jpg)An information icon.Note


    The last command is remarkable. It uses the `$VALUE` variable. That is far from
    being the same as the `$value` variable since variable names are case-sensitive
    (it matters whether the variable name contains capitalized letters or small ones).
    Therefore, `$value` and `$VALUE` are different variables.


    To display values, an instruction based on the `echo` keyword is used. To the
    right of the instruction, comma-separated values are listed. They are displayed
    in the output area. In particular, these are the current value of the `$value`
    variable, the `" => type "` string, the name for the value type of the `$value`
    variable, which is calculated by the `gettype($value)` statement, and the escape
    sequence `"\n"`.


    | Details |

    | --- |

    | The `\n` instruction is a so-called escape sequence. If such an instruction
    is placed in a text enclosed in double quotes (this is important!), a line break
    is performed at the appropriate place when the text is displayed. Therefore, one
    should “print” the text `"\n"` to break a line. The `\n` escape sequence is not
    the only one in PHP. For example, the `\t` instruction inserts a tab character
    into a text. |


    The last statement `echo $VALUE," => type ",gettype($VALUE),"\n"` requires special
    explanation. As noted, PHP interprets uppercase and lowercase letters in the variable
    names (as opposed to the function names) as different characters. Therefore, the
    `$VALUE` variable has nothing to do with the `$value` variable.


    In the preceding statement, try to display the value of the `$VALUE` variable
    in the output area, although the value has not been assigned yet to the variable.
    The variable has no value; in other words, the value of the variable is the `NULL`
    reference. That confirms the call of the `gettype()` function with `$VALUE` as
    an argument. When trying to display the value of the `$VALUE` variable, since
    it is missing, nothing is displayed in the output area. In this sense, the PHP
    language is more than “liberal” when a variable has no value.


    ![](images/613529_1_En_2_Chapter/613529_1_En_2_Figf_HTML.jpg)An information icon.Note


    There are quite a few functions designed to manipulate data types. An example
    is the `settype()` function used to apply a type. The `get_class()` function allows
    you to determine the class of an object. You can check the existence of a function
    using the `function_exists()` function. The existence of a method is checked using
    the `method_exists()` function. You can check if a variable refers to a callable
    object using the `is_callable()` function. There is a group of functions that
    allow you to check if data belongs to a specific type: `is_array()` (whether the
    variable refers to an array), `is_bool()` (whether the variable refers to a boolean
    value), `is_float()` (whether the variable refers to a real number), `is_int()`
    (whether the variable refers to an integer), `is_null()` (whether the value of
    the variable is the null reference), `is_numeric()` (whether the variable refers
    to a number or a string with a text representation of a number), `is_object()`
    (whether the variable refers to an object), `is_resource()` (whether the variable
    refers to a resource), `is_scalar()` (whether the variable refers to a scalar
    value), `is_string()` (whether the variable refers to a text).


    | Details |

    | --- |

    | In addition to using the `settype()` function to change the type of a value
    explicitly, you can use the `(type_name)` instruction (a type name in parentheses)
    that precedes the value whose type is to be converted. For example, the `(int)`
    or `(integer)` instructions are used to cast to the integer type, the `(bool)`
    and `(boolean)` instructions are used to cast to the boolean type, the `(string)`
    instruction is used to cast to the text type, and the cast of a value to the real
    numeric type can be performed with the `(float)`, `(double)`, or `(real)` instructions
    (the last instruction has been deprecated in PHP 8). Also, there are other options.
    |'
  raw: "## Basic Data Types\n\nAs noted, variables have no type. Nevertheless, the\
    \ value referred to by a variable has a type. You can use the `gettype()` function\
    \ to determine the value type that the variable refers to. The variable is passed\
    \ as an argument to the function. The result of the function is a text with the\
    \ name of the type. In particular, integer numbers are of the `integer` type.\
    \ Real numbers (floating point numbers) are of the `double` type. Text is of the\
    \ `string` type. There is also the `boolean` type (logical values `true` or `false`),\
    \ `array` (an array), `object` (an object), `resource` (a reference to an external\
    \ resource), and `NULL` (which means no value for the variable). A small example\
    \ that illustrates the situation is shown in Listing [2-2](#613529_1_En_2_Chapter.xhtml#PC3).\n\
    \n```\n type \",gettype($value),\"\\n\";\n// A text:\n$value=\"text\";\necho $value,\"\
    \ => type \",gettype($value),\"\\n\";\n// A real number:\n$value=12.3;\necho $value,\"\
    \ => type \",gettype($value),\"\\n\";\n// The null reference:\necho $VALUE,\"\
    \ => type \",gettype($VALUE),\"\\n\";\n?>\nListing 2-2\nThe Type of Value\n```\n\
    \nThe result of the program execution is as follows.\n\n```\nThe output of the\
    \ program (from Listing 2-2)\n123 => type integer\ntext => type string\n12.3 =>\
    \ type double\n=> type NULL\n```\n\n![](images/613529_1_En_2_Chapter/613529_1_En_2_Figp_HTML.gif)A\
    \ bell icon. **The PHP 8 Standard**\n\nWhen using PHP 8 and higher, you get a\
    \ warning about the unknown variable `$VALUE`, which appears between the `type`\
    \ and `NULL` tokens.\n\nHere, you deal with a simple program. The `$value` variable\
    \ gets consequently different values, and its type is determined for each value.\
    \ To determine the type, use the `gettype()` function, the argument of which is\
    \ the `$value` variable.\n\n![](images/613529_1_En_2_Chapter/613529_1_En_2_Fige_HTML.jpg)An\
    \ information icon.Note\n\nThe last command is remarkable. It uses the `$VALUE`\
    \ variable. That is far from being the same as the `$value` variable since variable\
    \ names are case-sensitive (it matters whether the variable name contains capitalized\
    \ letters or small ones). Therefore, `$value` and `$VALUE` are different variables.\n\
    \nTo display values, an instruction based on the `echo` keyword is used. To the\
    \ right of the instruction, comma-separated values are listed. They are displayed\
    \ in the output area. In particular, these are the current value of the `$value`\
    \ variable, the `\" => type \"` string, the name for the value type of the `$value`\
    \ variable, which is calculated by the `gettype($value)` statement, and the escape\
    \ sequence `\"\\n\"`.\n\n| Details |\n| --- |\n| The `\\n` instruction is a so-called\
    \ escape sequence. If such an instruction is placed in a text enclosed in double\
    \ quotes (this is important!), a line break is performed at the appropriate place\
    \ when the text is displayed. Therefore, one should “print” the text `\"\\n\"\
    ` to break a line. The `\\n` escape sequence is not the only one in PHP. For example,\
    \ the `\\t` instruction inserts a tab character into a text. |\n\nThe last statement\
    \ `echo $VALUE,\" => type \",gettype($VALUE),\"\\n\"` requires special explanation.\
    \ As noted, PHP interprets uppercase and lowercase letters in the variable names\
    \ (as opposed to the function names) as different characters. Therefore, the `$VALUE`\
    \ variable has nothing to do with the `$value` variable.\n\nIn the preceding statement,\
    \ try to display the value of the `$VALUE` variable in the output area, although\
    \ the value has not been assigned yet to the variable. The variable has no value;\
    \ in other words, the value of the variable is the `NULL` reference. That confirms\
    \ the call of the `gettype()` function with `$VALUE` as an argument. When trying\
    \ to display the value of the `$VALUE` variable, since it is missing, nothing\
    \ is displayed in the output area. In this sense, the PHP language is more than\
    \ “liberal” when a variable has no value.\n\n![](images/613529_1_En_2_Chapter/613529_1_En_2_Figf_HTML.jpg)An\
    \ information icon.Note\n\nThere are quite a few functions designed to manipulate\
    \ data types. An example is the `settype()` function used to apply a type. The\
    \ `get_class()` function allows you to determine the class of an object. You can\
    \ check the existence of a function using the `function_exists()` function. The\
    \ existence of a method is checked using the `method_exists()` function. You can\
    \ check if a variable refers to a callable object using the `is_callable()` function.\
    \ There is a group of functions that allow you to check if data belongs to a specific\
    \ type: `is_array()` (whether the variable refers to an array), `is_bool()` (whether\
    \ the variable refers to a boolean value), `is_float()` (whether the variable\
    \ refers to a real number), `is_int()` (whether the variable refers to an integer),\
    \ `is_null()` (whether the value of the variable is the null reference), `is_numeric()`\
    \ (whether the variable refers to a number or a string with a text representation\
    \ of a number), `is_object()` (whether the variable refers to an object), `is_resource()`\
    \ (whether the variable refers to a resource), `is_scalar()` (whether the variable\
    \ refers to a scalar value), `is_string()` (whether the variable refers to a text).\n\
    \n| Details |\n| --- |\n| In addition to using the `settype()` function to change\
    \ the type of a value explicitly, you can use the `(type_name)` instruction (a\
    \ type name in parentheses) that precedes the value whose type is to be converted.\
    \ For example, the `(int)` or `(integer)` instructions are used to cast to the\
    \ integer type, the `(bool)` and `(boolean)` instructions are used to cast to\
    \ the boolean type, the `(string)` instruction is used to cast to the text type,\
    \ and the cast of a value to the real numeric type can be performed with the `(float)`,\
    \ `(double)`, or `(real)` instructions (the last instruction has been deprecated\
    \ in PHP 8). Also, there are other options. |"
  trans: '

    ## 基本数据类型


    如前所述，变量本身没有类型。然而，变量所引用的值是有类型的。你可以使用 `gettype()` 函数来确定变量所引用的值类型。变量作为参数传递给该函数。函数的返回值是一个包含类型名称的文本。具体来说，整数是
    `integer` 类型，实数（浮点数）是 `double` 类型，文本是 `string` 类型。此外还有 `boolean` 类型（逻辑值 `true`
    或 `false`）、`array`（数组）、`object`（对象）、`resource`（对外部资源的引用）以及 `NULL`（表示变量没有值）。以下是一个说明这种情况的小示例，如代码清单
    2-2 所示。


    ```

    <?php

    $value=123;

    echo $value," => type ",gettype($value),"\n";

    // 一个文本:

    $value="text";

    echo $value," => type ",gettype($value),"\n";

    // 一个实数:

    $value=12.3;

    echo $value," => type ",gettype($value),"\n";

    // 空引用:

    echo $VALUE," => type ",gettype($VALUE),"\n";

    ?>

    代码清单 2-2

    值的类型

    ```


    程序执行结果如下。


    ```

    程序的输出（来自代码清单 2-2）

    123 => type integer

    text => type string

    12.3 => type double

    => type NULL

    ```


    ![](img/613529_1_En_2_Figp_HTML.gif)一个铃铛图标。**PHP 8 标准**


    当使用 PHP 8 及更高版本时，关于未知变量 `$VALUE` 会有一条警告信息，该变量出现在 `type` 和 `NULL` 标记之间。


    这里你面对的是一个简单程序。`$value` 变量先后被赋以不同的值，并且为每个值确定其类型。要确定类型，请使用 `gettype()` 函数，其参数就是变量
    `$value`。


    ![](img/613529_1_En_2_Fige_HTML.jpg)一个信息图标。注意


    最后一条命令值得注意。它使用了 `$VALUE` 变量。这与变量 `$value` 完全不同，因为变量名是区分大小写的（变量名中使用大写字母还是小写字母很重要）。因此，`$value`
    和 `$VALUE` 是不同的变量。


    为了显示值，使用了基于 `echo` 关键字的指令。在该指令右侧，列出了用逗号分隔的值，它们将在输出区域中被显示。具体来说，这些值分别是 `$value`
    变量的当前值、字符串 `" => type "`、由 `gettype($value)` 语句计算得出的 `$value` 变量值类型的名称，以及转义序列
    `"\n"`。


    | 详细信息 |

    | --- |

    | `\n` 指令是一种所谓的转义序列。如果这样的指令被放在一个用双引号括起来的文本中（这很重要！），那么在显示文本时，会在相应位置执行换行。因此，应该“打印”文本
    `"\n"` 来换行。`\n` 转义序列并非 PHP 中唯一的转义序列。例如，`\t` 指令会在文本中插入一个制表符。 |


    最后一条语句 `echo $VALUE," => type ",gettype($VALUE),"\n"` 需要特别解释。如前所述，PHP 将变量名中的大写字母和小写字母解释为不同的字符（这与函数名不同）。因此，`$VALUE`
    变量与 `$value` 变量毫无关系。


    在前面的语句中，试图在输出区域显示 `$VALUE` 变量的值，尽管该变量尚未被赋值。该变量没有值；换句话说，该变量的值是 `NULL` 引用。这证实了以
    `$VALUE` 作为参数调用 `gettype()` 函数的结果。当试图显示 `$VALUE` 变量的值时，由于它不存在，输出区域中不会显示任何内容。从这个意义上说，PHP
    语言对于变量没有值的情况是相当“宽松”的。


    ![](img/613529_1_En_2_Figf_HTML.jpg)一个信息图标。注意


    有不少函数是专门用来操作数据类型的。例如，`settype()` 函数用于设置类型。`get_class()` 函数允许你确定对象的类。你可以使用 `function_exists()`
    函数检查某个函数是否存在。使用 `method_exists()` 函数可以检查某个方法是否存在。你可以使用 `is_callable()` 函数检查一个变量是否引用了可调用对象。还有一组函数允许你检查数据是否属于特定类型：`is_array()`（变量是否引用数组）、`is_bool()`（变量是否引用布尔值）、`is_float()`（变量是否引用实数）、`is_int()`（变量是否引用整数）、`is_null()`（变量的值是否为空引用）、`is_numeric()`（变量是否引用数字或包含数字文本表示的字符串）、`is_object()`（变量是否引用对象）、`is_resource()`（变量是否引用资源）、`is_scalar()`（变量是否引用标量值）、`is_string()`（变量是否引用文本）。


    | 详细信息 |

    | --- |

    | 除了使用 `settype()` 函数显式改变值的类型之外，你还可以使用 `(type_name)` 指令（括号中的类型名称），将其放在要转换类型的值之前。例如，`(int)`
    或 `(integer)` 指令用于强制转换为整数类型，`(bool)` 和 `(boolean)` 指令用于强制转换为布尔类型，`(string)` 指令用于强制转换为文本类型，而将值强制转换为实数类型可以使用
    `(float)`、`(double)` 或 `(real)` 指令（最后一条指令在 PHP 8 中已被弃用）。此外，还有其他选项。 |

    '
- fmt: '# 算术运算


    可以对不同类型变量和值执行一些基本运算。传统上，所有运算可分为算术运算、逻辑运算、比较运算和位运算。让我们也探讨文本运算、赋值运算和三目运算符。


    | 详细信息 |

    | --- |

    | 有时，你需要检查某个变量是否被赋值。在这种情况下，可以使用`isset()`函数（待检查的变量名作为函数参数传入）。要删除变量，使用`unset()`函数。
    |


    值得一提的是，算术运算符`+`、`-`、`*`和`/`分别用于计算两个数的和、差、积和商。使用`**`运算符（或`pow()`函数）进行幂运算。`%`运算符计算除法的余数。


    除了这些二元运算符，还可以使用一元递增`++`和递减`--`运算符。此外，它们有前缀和后缀两种形式。


    | 详细信息 |

    | --- |

    | 二元运算符有两个操作数。一元运算符有一个操作数。递增和递减运算符的前缀形式和后缀形式的区别在于运算符是放在操作数之前（前缀形式）还是放在操作数之后（后缀形式）。
    |


    关于对操作数的"作用"，后缀形式和前缀形式是等价的。递增运算符`++`将操作数的值增加1，递减运算符`--`将操作数的值减少1。例如，如果`$number`变量的值是`100`，则执行`$number++`语句后，该变量的值将为`101`。如果使用`++$number`代替`$number++`语句，结果也是一样的：`$number`变量获得新值`101`。然而，后缀形式和前缀形式之间存在差异。使用递增/递减运算符后缀形式的表达式的值是操作数的"旧"值（应用运算符之前的值）。使用递增/递减运算符前缀形式的表达式的值是操作数的"新"值（应用运算符后计算出的值）。


    | 详细信息 |

    | --- |

    | 假设存在命令`$A=100`和`$B=100`。执行`$a=$A++`和`$b=++$B`命令后，`$a`的值为`100`，而`$b`、`$A`和`$B`的值均为`101`。这是因为在执行`$A++`和`++$B`语句后，`$A`和`$B`变量都增加了1（并得到值`101`），但`$A++`表达式的值为`100`，而`++$B`表达式的值为`101`。因此，`$a`变量的值为`100`，`$b`变量的值为`101`。
    |


    算术运算的示例汇总在清单[2-3](#613529_1_En_2_Chapter.xhtml#PC5)中。


    ```

    清单 2-3

    算术运算

    ```


    程序执行结果如下。


    ```

    程序输出（来自清单 2-3）

    [1] $A = 5

    [2] $B = 3

    [3] $A + $B = 8

    [4] $A - $B = 2

    [5] $A * $B = 15

    [6] $A / $B = 1.6666666666667

    [7] $A ** $B = 125

    [8] $A % $B = 2

    [9] $A = 6

    [10] $B = 2

    ```


    这里一切都很简单，相信程序执行结果无需注释。


    # 比较运算


    除了算术运算，还有比较运算。这些运算通过以下运算符实现：`<`（*小于*）、`<=`（*小于或等于*）、`>`（*大于*）、`>=`（*大于或等于*）、`==`（*等于*）、`!=`（*不等于*）、`===`（*全等于*）、`!==`（*不全等于*）以及`<=>`比较运算符。列表中的大多数运算符都是传统的，易于理解。可能例外的是`<=>`运算符、*等于/不等于*运算符以及*全等于/不全等于*运算符。


    需要注意的是，当使用运算符（包括比较运算符）处理不同类型的操作数时，会自动进行类型转换。这意味着为了执行语句，会应用某些算法来自动转换语句中操作数的值。使用`==`和`!=`运算符时，比较涉及自动类型转换。例如，如果使用`==`运算符比较布尔值`true`和整数值`1`，会得到`true`。原因是非零值被解释为`true`，零值被解释为`false`。因此，不仅`true==1`语句返回`true`，而且`true==2`、`true==-10`和`false==0`也都返回`true`。


    | 详细信息 |

    | --- |

    | 如果尝试打印布尔值`true`，会打印出值`1`。此外，布尔值`false`根本不显示。取而代之的是打印空文本（即不含字符的文本）。 |


    但还有更奇特的情况。例如，`123=="123"`语句中比较数字`123`和文本`"123"`是否相等，返回`true`。这是因为这里涉及自动将数字的文本表示`"123"`转换为整数值`123`。


    所描述的比较模式可能方便也可能不方便，这取决于要解决问题的上下文。如果希望比较不涉及自动类型转换，则应使用`===`和`!==`运算符。例如，`true===1`、`false===0`和`123==="123"`表达式都返回`false`。


    ![](images/613529_1_En_2_Chapter/613529_1_En_2_Figq_HTML.gif)一个铃铛图标。**PHP 8 标准**


    在PHP 8中，值的比较规则有所改变。主要创新是空文本值不再被解释为等于零。例如，在PHP 8中，`0==""`表达式的值为`false`，而在PHP的早期版本中，`0==""`表达式的值为`true`。


    关于比较运算`<=>`，其执行方式如下。假设有一个类似`$A<=>$B`的表达式。如果`$A`的值小于`$B`的值，则此表达式的结果为`-1`。如果`$A`变量的值大于`$B`变量的值，则`$A<=>$B`表达式的计算结果为`1`。最后，如果`$A`和`$B`变量的值相同，则`$A<=>$B`表达式的值为`0`。


    | 详细信息 |

    | --- |

    | `$A<=>$B`形式的运算可以理解为返回`$A`和`$B`值之差的符号。此外，请记住该运算涉及自动类型转换。因此，例如，`"123"<=>123`表达式的结果为`0`，因为文本`"123"`被自动转换为数字`123`。相应地，`"123"<=>12`的值为`1`。`true<=>123`表达式的值为`0`，因为非零整数值`123`被自动转换为布尔值`true`。
    |'
  raw: '## The Arithmetic Operations


    Some basic operations can be performed on variables and values of different types.
    Conventionally, all operations can be divided into arithmetic, logical, comparison,
    and bitwise. Let’s also examine operations with text, assignment operations, and
    the ternary operator.


    | Details |

    | --- |

    | Sometimes, you need to check if a value is assigned to some variable. In that
    case, you can use the `isset()` function (the name of the variable to check is
    passed as a function argument). To remove a variable, use the `unset()` function.
    |


    It is worth mentioning that the arithmetic operators `+`, `-`, `*`, and `/` are
    used to calculate the sum, difference, product, and quotient of two numbers, respectively.
    You use the `**` operator (or the `pow()` function) to exponentiate. The `%` operator
    calculates the remainder of a division.


    In addition to these binary operators, you can use the unary increment `++` and
    decrement `--` operators. Moreover, they have the prefix and the postfix form.


    | Details |

    | --- |

    | Binary operators have two operands. Unary operators have one operand. The prefix
    and postfix forms of the increment and decrement operators differ in whether the
    operator is placed before the operand (the prefix form) or after the operand (the
    postfix form). |


    Regarding “action” on the operand, the postfix and prefix forms are equivalent.
    The increment operator `++` increases the value of the operand by one, and the
    decrement operator `--` decreases the value of the operand by one. For example,
    if the value of the `$number` variable is `100`, then after executing the `$number++`
    statement, the variable’s value will be `101`. The result will be the same if
    you use `++$number` instead of the `$number++` statement: the `$number` variable
    gets the new value `101`. However, there is a difference between the postfix and
    prefix forms. The value of the expression with the postfix form of the increment/decrement
    operator is the “old” (which was before applying the operator) value of the operand.
    The value of the expression with the prefix form of the increment/decrement operator
    is the “new” (calculated after applying the operator) value of the operand.


    | Details |

    | --- |

    | Let’s say there are commands `$A=100` and `$B=100`. After executing the `$a=$A++`
    and `$b=++$B` commands, `$a` has the value `100`, and `$b`, `$A`, and `$B` have
    the value `101`. That is because after executing the `$A++` and `++$B` statements,
    the `$A` and `$B` variables increase their values by one (and get the value `101`),
    but the value of the `$A++` expression is `100`, and the value of the `++$B` expression
    is `101`. So, the `$a` variable gets `100` as its value, and `$b` gets `101` as
    its value. |


    Examples of arithmetic operations are collected in Listing [2-3](#613529_1_En_2_Chapter.xhtml#PC5).


    ```

    Listing 2-3

    The Arithmetic Operations

    ```


    The result of the program execution is as follows.


    ```

    The output of the program (from Listing 2-3)

    [1] $A = 5

    [2] $B = 3

    [3] $A + $B = 8

    [4] $A - $B = 2

    [5] $A * $B = 15

    [6] $A / $B = 1.6666666666667

    [7] $A ** $B = 125

    [8] $A % $B = 2

    [9] $A = 6

    [10] $B = 2

    ```


    Here, everything is quite simple, and it is believed that the result of the program
    execution does not require comments.


    ## The Comparison Operations


    In addition to the arithmetic operations, there are also the comparison operations.
    Those operations are implemented through the following operators: `<` (*less than*),
    `<=` (*less than or equal to*), `>` (*greater than*), `>=` (*greater than or equal
    to*), `==` (*equal to*), `!=` (*not equal to*), `===` (*identically equal to*),
    `!==` (*identically not equal to*), and the `<=>` comparison operator. Most of
    the operators in the list are traditional and easy to understand. Maybe the exceptions
    are the `<=>` operator, *equal/not equal to* operators, and *identically equal/identically
    not equal to* operators.


    It is important to know that when using the operators (including comparison ones)
    with operands of different types, automatic type conversion is performed. That
    means that to execute a statement, certain algorithms are automatically applied
    to transform the values of the operands in the statement. With the `==` and `!=`
    operators, the comparison involves automatic type conversion. For example, you
    get `true` if you use the `==` operator to compare the boolean value `true` and
    the integer value `1` (the `true==1` statement). The reason is that non-zero values
    are interpreted as `true`, and zero values are interpreted as `false`. Therefore,
    not only the `true==1` statement gives `true` but also the `true==2`, `true==-10`,
    and `false==0` statements.


    | Details |

    | --- |

    | If you try to print the boolean value `true`, the `1` value is printed. Moreover,
    the boolean value `false` is not displayed at all. Instead of this value, the
    empty text is printed (that is, the text without characters). |


    But there are also more exotic options. For example, the `123=="123"` statement,
    where you compare the `123` number and the `"123"` text for equality, gives `true`.
    That is because, here, the automatic conversion of the textual representation
    of the number `"123"` into the integer value `123` comes into play.


    The comparison mode described may or may not be convenient. It depends on the
    context of the problem being solved. If you want the comparison to be performed
    without automatic type conversion, the `===` and `!==` operators should be used.
    For example, the `true===1`, `false===0`, and `123==="123"` expressions give `false`.


    ![](images/613529_1_En_2_Chapter/613529_1_En_2_Figq_HTML.gif)A bell icon. **The
    PHP 8 Standard**


    In PHP 8, the rules for comparing values have changed somewhat. The main innovation
    is that an empty text value is not interpreted as equal to zero. For example,
    in PHP 8, the value of the `0==""` expression is `false`, while the value of the
    `0==""` expression in previous versions of PHP is `true`.


    Regarding the comparison operation `<=>`, it is performed as follows. Let’s say
    you have an expression like `$A<=>$B`. The result of such an expression is `-1`,
    provided that the value of `$A` is less than that of `$B`. If the value of the
    `$A` variable is greater than that of the `$B` variable, then the `$A<=>$B` expression
    evaluates to `1`. Finally, if the `$A` and `$B` variables have the same value,
    the `$A<=>$B` expression gives the value `0`.


    | Details |

    | --- |

    | An operation of the form `$A<=>$B` can be thought of as one that returns the
    sign of the difference between the values of `$A` and `$B`. Moreover, keep in
    mind that the operation involves automatic type casting. Therefore, for example,
    the `"123"<=>123` expression gives `0` since the text `"123"` is automatically
    converted to the number `123`. Accordingly, the value of `"123"<=>12` equals `1`.
    The `true<=>123` expression has the value `0` because the non-zero integer value
    `123` is automatically converted to the boolean value `true`. |'
