    9063Ch07CMP2 11/13/07 8:06 PM Page 220


    **220**


    C H A P T E R 7 ■ B U I L D I N G T H E B L O G G I N G S YS T E M


    expand the data stored for blog posts in the future without requiring significant
    changes to the code or the database table. This is important, because in later
    chapters we will be expanding upon the blog functionality, and there will be extra
    data to be stored for each post.


    Let’s now take a look at the SQL required to create these tables in MySQL. The
    table definitions can be found in the schema-mysql.sql file (in the /var/www/phpweb20
    directory). The equivalent definitions for PostgreSQL can be found in the schema-pgsql.sql
    file. Listing 7-1


    shows the SQL used to create the blog_posts and blog_posts_profile tables.


    **Listing 7-1.** *SQL to Create the blog_posts Table in MySQL (schema-mysql.sql)*
    create table blog_posts (


    post_id serial not null,


    user_id bigint unsigned not null,


    url varchar(255) not null,


    ts_created datetime not null,


    status varchar(10) not null,


    primary key (post_id),


    foreign key (user_id) references users (user_id)


    ) type = InnoDB;


    create index blog_posts_url on blog_posts (url);


    create table blog_posts_profile (


    post_id bigint unsigned not null,


    profile_key varchar(255) not null,


    profile_value text not null,


    primary key (post_id, profile_key),


    foreign key (post_id) references blog_posts (post_id)


    ) type = InnoDB;


    In blog_posts we link (using a foreign key constraint) to the users table, as
    each post will belong to a single user. We also store a timestamp of the creation
    date. This is the field we will primarily be sorting on when displaying blog posts,
    since a blog is essentially a journal that is organized by the date of each post.


    We will use the url field to store a permanent link for the post, generated dynamically
    based on the title of the post. Additionally, since we will be using this field
    to load blog posts (as you will see in Chapter 9), we create an index on this
    field in the database to speed up SQL


    select queries that use this field.


    The other field of interest here is the status field, which we will use to indicate
