    name, address, city, state, country, ZIP code, and phone number) from the `customers`
    table. This information is displayed on the screen. The shipping information is
    also displayed. Visitors can get the product’s delivery using the address that
    was already provided while creating the account or they can provide new shipping
    information. After supplying the shipping information, the visitor can click on
    the Supply Payment Information button to pay for the products.


    ![A978-1-4842-1672-9_4_Fig10_HTML.jpg](A978-1-4842-1672-9_4_Fig10_HTML.jpg)


    Figure 4-10.


    Entering shipping information for the products


    You have now come to the stage in your web site where you want the users to pay
    for their items. In the next section, you’ll learn about the different payment
    modes.'
