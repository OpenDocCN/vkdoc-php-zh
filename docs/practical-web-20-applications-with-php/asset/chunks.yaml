    **Using the Model-View-Controller Pattern**


    The Model-View-Controller (MVC) design pattern is a commonly used method of designing
    web applications. In simple terms, it separates the presentation of the application
    from the underlying application logic.


    The three parts of the pattern work as follows:


    • **Model:** This represents the application logic. It performs the “hard work”
    of the application, such as interacting with the database, processing credit card
    transactions, or sending e-mails to users.


    • **View:** The *view* represents the user interface. In the case of our application,
    this will typically be HTML code. We will be using the Smarty Template Engine
    to manage the view aspect of our application.


