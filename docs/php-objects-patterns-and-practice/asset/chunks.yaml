  trans: '

    ## 后期静态绑定：`static`关键字


    既然你已经了解了抽象类、特质和接口，是时候短暂回顾一下静态方法了。你知道静态方法可以用作工厂，一种生成其所属类实例的方式。如果你和我一样是个懒惰的程序员，你可能会对下面这个例子中的重复代码感到厌烦：


    ```

    // listing 04.45

    abstract class DomainObject

    {

    }

    // listing 04.46

    class User extends DomainObject

    {

    public static function create(): User

    {

    return new User();

    }

    }

    // listing 04.47

    class Document extends DomainObject

    {

    public static function create(): Document

    {

    return new Document();

    }

    }

    ```


    我创建了一个名为 `DomainObject` 的超类。当然，在实际项目中，它会包含其子类共有的功能。然后我创建了两个子类：`User` 和 `Document`。我希望我的具体类拥有静态的
    `create()` 方法。


    既然构造函数已经能完成创建对象的工作，为什么还要使用静态工厂方法呢？在第 12 章，我将描述一种名为“标识映射”的模式。只有当具有相同区分特征的对象尚未被管理时，标识映射组件才会生成并管理新对象；如果目标对象已存在，则返回该对象。像
    `create()` 这样的工厂方法会是此类组件的一个良好客户。


    这段代码运行良好，但存在着令人厌烦的重复。我不希望为我创建的每个 `DomainObject` 子类都编写这样的模板代码。因此，我尝试将 `create()`
    方法上移到超类：


    ```

    // listing 04.48

    abstract class DomainObject

    {

    public static function create(): DomainObject

    {

    return new self();

    }

    }

    // listing 04.49

    class User extends DomainObject

    {

    }

    // listing 04.50

    class Document extends DomainObject

    {

    }

    // listing 04.51

    Document::create();

    ```


    嗯，这看起来很简洁。我现在把通用代码放在了同一个地方，并且使用了 `self` 来引用当前类。但我对 `self` 关键字做了一个假设。实际上，它对于类的作用方式与
    `$this` 对于对象的作用方式并不完全相同。`self` 并不指代调用时的上下文；它指代的是定义时的上下文。因此，如果我运行前面的例子，我会得到如下结果：


    ```

    Error: Cannot instantiate abstract class popp\ch04\batch06\DomainObject

    ```


    所以 `self` 解析为 `DomainObject`，即定义 `create()` 方法的地方，而不是 `Document`，即调用该方法时的类。在 PHP
    5.3 之前，这是一个严重的限制，催生了许多相当笨拙的解决方案。PHP 5.3 引入了一个名为“后期静态绑定”的概念。这一特性最明显的体现就是 `static`
    关键字。`static` 与 `self` 类似，区别在于它指代的是调用时的类，而不是定义时的类。在这种情况下，这意味着调用 `Document::create()`
    会生成一个新的 `Document` 对象，而不会试图去实例化一个 `DomainObject` 对象——那注定会失败。


    所以现在我可以利用静态上下文中的继承关系了：


    ```

    abstract class DomainObject

    {

    public static function create(): DomainObject

    {

    return new static();

    }

    }

    class User extends DomainObject

    {

    }

    class Document extends DomainObject

    {

    }

    print_r(Document::create());

    Document Object

    (

    )

    ```


    `static` 关键字不仅可用于实例化。与 `self` 和 `parent` 一样，`static` 也可以用作静态方法调用的标识符，即使是在非静态上下文中也是如此。假设我想为我的
    `DomainObject` 类引入“分组”的概念。默认情况下，在我的新分类中，所有类都属于“default”类别，但我希望能为继承体系中的某些分支覆盖这一设置：


    ```

    // listing 04.52

    abstract class DomainObject

    {

    private $group;

    public function __construct()

    {

    $this->group = static::getGroup();

    }

    public static function create(): DomainObject

    {

    return new static();

    }

    public static function getGroup(): string

    {

    return "default";

    }

    }

    // listing 04.53

    class User extends DomainObject

    {

    }

    // listing 04.54

    class Document extends DomainObject

    {

    public static function getGroup(): string

    {

    return "document";

    }

    }

    // listing 04.55

    class SpreadSheet extends Document

    {

    }

    // listing 04.56

    print_r(User::create());

    print_r(SpreadSheet::create());

    ```


    我在 `DomainObject` 类中引入了一个构造函数。它使用 `static` 关键字来调用一个静态方法：`getGroup()`。`DomainObject`
    提供了默认实现，但 `Document` 覆盖了它。我还创建了一个新类 `SpreadSheet`，它继承自 `Document`。以下是输出结果：


    ```

    popp\ch04\batch07\User Object

    (

    [group:popp\ch04\batch07\DomainObject:private] => default

    )

    popp\ch04\batch07\SpreadSheet Object

    (

    [group:popp\ch04\batch07\DomainObject:private] => document

    )

    ```


    对于 `User` 类，不需要做什么巧妙的事。`DomainObject` 构造函数调用了 `getGroup()` 并且在其自身找到了该方法。然而，对于
    `SpreadSheet`，查找是从被调用的类 `SpreadSheet` 本身开始的。它没有提供实现，因此调用了 `Document` 类中的 `getGroup()`
    方法。在 PHP 5.3 和后期静态绑定出现之前，我在这里会被迫使用 `self` 关键字，那只能在 `DomainObject` 类中查找 `getGroup()`。

    '
- fmt: '# Handling Errors


    Things go wrong. Files are misplaced, database servers are left uninitialized,
    URLs are changed, XML files are mangled, permissions are poorly set, disk quotas
    are exceeded. The list goes on and on. In the fight to anticipate every problem,
    a simple method can sometimes sink under the weight of its own error-handling
    code.


    Here is a simple `Conf` class that stores, retrieves, and sets data in an XML
    configuration file:


    ```

    // listing 04.57

    class Conf

    {

    private $file;

    private $xml;

    private $lastmatch;

    public function __construct(string $file)

    {

    $this->file = $file;

    $this->xml = simplexml:load_file($file);

    }

    public function write()

    {

    file_put_contents($this->file, $this->xml->asXML());

    }

    public function get(string $str)

    {

    $matches = $this->xml->xpath("/conf/item[@name=\"$str\"]");

    if (count($matches)) {

    $this->lastmatch = $matches[0];

    return (string)$matches[0];

    }

    return null;

    }

    public function set(string $key, string $value)

    {

    if (! is_null($this->get($key))) {

    $this->lastmatch[0]=$value;

    return;

    }

    $conf = $this->xml->conf;

    $this->xml->addChild(''item'', $value)->addAttribute(''name'', $key);

    }

    }

    ```


    The `Conf` class uses the `SimpleXml` extension to access name value pairs. Here’s
    the kind of format with which it is designed to work:


    ```

    <conf>

    <item name="user">bob</item>

    <item name="pass">newpass</item>

    <item name="host">localhost</item>

    </conf>

    ```


    The `Conf` class’s constructor accepts a file path, which it passes to `simplexml:load_file()`.
    It stores the resulting `SimpleXmlElement` object in a property called `$xml`.
    The `get()` method uses XPath to locate an `item` element with the given `name`
    attribute, returning its value. `set()` either changes the value of an existing
    item or creates a new one. Finally, the `write()` method saves the new configuration
    data back to the file.


    Like much example code, the `Conf` class is highly simplified. In particular,
    it has no strategy for handling nonexistent or unwriteable files. It is also optimistic
    in outlook. It assumes that the XML document will be well-formed and will contain
    the expected elements.


    Testing for these error conditions is relatively trivial, but I must still decide
    how to respond to them should they arise. There are generally two options.


    First, I could end execution. This is simple but drastic. My humble class would
    then take responsibility for bringing an entire script crashing down around it.
    Although methods such as `__construct()` and `write()` are well placed to detect
    errors, they do not have the information to decide how to handle them.


    Rather than handle the error in my class, then, I could return an error flag of
    some kind. This could be a Boolean or an integer value such as `0` or `-1`. Some
    classes will also set an error string or flag, so that the client code can request
    more information after a failure.


    Many PEAR packages combine these two approaches by returning an error object (an
    instance of `PEAR_Error`), which acts both as notification that an error has occurred
    and contains the error message within it. This approach is now deprecated, but
    plenty of classes have not been upgraded, not least because client code often
    depends on the old behavior.


    The problem here is that you pollute your return value. You have to rely on the
    client coder to test for the return type every time your error-prone method is
    called. This can be risky. Trust no one!


    When you return an error value to calling code, there is no guarantee that the
    client will be any better equipped than your method to decide how to handle the
    error. If this is the case, then the problem begins all over again. The client
    method will have to determine how to respond to the error condition, maybe even
    implementing a different error-reporting strategy.


    ## Exceptions


    PHP 5 introduced exceptions to PHP, a radically different way of handling error
    conditions. Different for PHP, that is. You will find them hauntingly familiar
    if you have Java or C++ experience. Exceptions address all of the issues that
    I have raised so far in this section.


    An exception is a special object instantiated from the built-in `Exception` class
    (or from a derived class). Objects of type `Exception` are designed to hold and
    report error information.


    The `Exception` class constructor accepts two optional arguments, a message string
    and an error code. The class provides some useful methods for analyzing error
    conditions. These are described in Table [4-1](#A314621_5_En_4_Chapter.html#Tab1).


    Table 4-1. The Exception Class’s Public Methods


    | Method | Description |

    | --- | --- |

    | `getMessage()` | Get the message string that was passed to the constructor |

    | `getCode()` | Get the code integer that was passed to the constructor |

    | `getFile()` | Get the file in which the exception was generated |

    | `getLine()` | Get the line number at which the exception was generated |

    | `getPrevious()` | Get a nested Exception object |

    | `getTrace()` | Get a multidimensional array tracing the method calls that led
    to the exception, including method, class, file, and argument data |

    | `getTraceAsString()` | Get a string version of the data returned by `getTrace()`
    |

    | `__toString()` | Called automatically when the `Exception` object is used in
    string context. Returns a string describing the exception details |


    The `Exception` class is fantastically useful for providing error notification
    and debugging information (the `getTrace()` and `getTraceAsString()` methods are
    particularly helpful in this regard). In fact, it is almost identical to the `PEAR_Error`
    class that was discussed earlier. There is much more to an exception than the
    information it holds, though.


    ### Throwing an Exception


    The `throw` keyword is used in conjunction with an `Exception` object. It halts
    execution of the current method and passes responsibility for handling the error
    back to the calling code. Here I amend the `__construct()` method to use the `throw`
    statement:


    ```

    // listing 04.58

    public function __construct(string $file)

    {

    $this->file = $file;

    if (! file_exists($file)) {

    throw new \Exception("file ''$file'' does not exist");

    }

    $this->xml = simplexml:load_file($file);

    }

    ```


    The `write()` method can use a similar construct:


    ```

    // listing 04.59

    public function write()

    {

    if (! is_writeable($this->file)) {

    throw new \Exception("file ''{$this->file}'' is not writeable");

    }

    file_put_contents($this->file, $this->xml->asXML());

    }

    ```


    The `__construct()` and `write()` methods can now check diligently for file errors
    as they do their work, but they let code more fitted for the purpose decide how
    to respond to any errors detected.


    So how does client code know how to handle an exception when thrown? When you
    invoke a method that may throw an exception, you can wrap your call in a `try`
    clause. A `try` clause is made up of the `try` keyword followed by braces. The
    `try` clause must be followed by at least one `catch` clause in which you can
    handle any error, like this:


    ```

    // listing 04.60

    try {

    $conf = new Conf(__DIR__ . "/conf01.xml");

    print "user: " . $conf->get(''user'') . "\n";

    print "host: " . $conf->get(''host'') . "\n";

    $conf->set("pass", "newpass");

    $conf->write();

    } catch (\Exception $e) {

    die($e->__toString());

    }

    ```


    As you can see, the `catch` clause superficially resembles a method declaration.
    When an exception is thrown, the `catch` clause in the invoking scope is called.
    The `Exception` object is automatically passed in as the argument variable.


    Just as execution is halted within the throwing method when an exception is thrown,
    so it is within the `try` clause—control passes directly to the `catch` clause.'
