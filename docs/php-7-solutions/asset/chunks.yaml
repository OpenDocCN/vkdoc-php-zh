  trans: "\n# 条件语句与数据库查询\n\n## 用于图片选择的条件语句\n\n条件语句会检查当前的 `image_id` 是否与 `articles`\
    \ 表中已存储的相同。如果是，则向 `<option>` 标签中插入 `selected`，从而在下拉菜单中显示正确的值。\n\n请确保不要遗漏以下代码行中的第三个字符：\n\
    \n```\n    ?>>\n```\n\n它是 `<option>` 标签的闭尖括号，位于两个 PHP 标签之间。\n\n## 保存并测试页面\n\n\
    3. 保存页面并在浏览器中加载。你应被自动重定向至 `blog_list_pdo.php`。选择任一 `EDIT` 链接，并确保你的页面显示如图 17-4\
    \ 所示。查看浏览器源代码视图，确认 `<option>` 标签的 `value` 属性包含每张图片的主键。\n\n4. 最后一步是将 `image_id`\
    \ 添加到 `UPDATE` 查询中。当博客条目未关联图片时，需要在 `image_id` 列中插入 `null`。这需要更改将值绑定到预处理语句中匿名占位符的方式。你不再需要将值以数组形式传递给\
    \ `execute()` 方法，而应使用 `bindValue()` 和 `bindParam()`。修改后的代码如下所示：\n\n```\n    //\
    \ 如果表单已提交，则更新记录\n    if (isset($_POST['update'])) {\n    // 准备更新查询\n    $sql =\
    \ 'UPDATE blog SET image_id = ?, title = ?, article = ?\n    WHERE article_id\
    \ = ?';\n    $stmt = $conn->prepare($sql);\n    if (empty($_POST['image_id']))\
    \ {\n    $stmt->bindValue(1, NULL, PDO::PARAM_NULL);\n    } else {\n    $stmt->bindParam(1,\
    \ $_POST['image_id'], PDO::PARAM_INT);\n    }\n    $stmt->bindParam(2, $_POST['title'],\
    \ PDO::PARAM_STR);\n    $stmt->bindParam(3, $_POST['article'], PDO::PARAM_STR);\n\
    \    $stmt->bindParam(4, $_POST['article_id'], PDO::PARAM_INT);\n    // 执行查询\n\
    \    $done = $stmt->execute();\n    }\n```\n\n这些值通过从 1 开始计数的数字绑定到匿名占位符，以标识它们应应用于哪个占位符。条件语句检查\
    \ `$_POST['image_id']` 是否为空。如果为空，`bindValue()` 将值设置为 `null`，使用关键字 `NULL` 作为第二个参数，并使用\
    \ PDO 常量作为第三个参数。如第 13 章的\"在 PDO 预处理语句中嵌入变量\"所述，当绑定的值不是变量时，你需要使用 `bindValue()`。\n\
    \n其余值都是变量，因此使用 `bindParam()` 进行绑定。我对其余的值使用了整数和字符串的 PDO 常量。这并非严格必要，但能使代码更清晰。\n\n\
    最后，`execute()` 方法括号内的值数组已被移除。\n\n5. 再次测试页面，从下拉菜单中选择一个文件名，然后单击 `Update Entry`。你可以通过刷新\
    \ phpMyAdmin 中的 `Browse` 或者选择同一篇文章进行更新，来验证外键是否已插入到 `articles` 表中。此时，下拉菜单中应显示正确的文件名。\n\
    \n如有必要，可将你的代码与 `ch17` 文件夹中的 `blog_update_pdo_04.php` 进行对照。\n\n## 从多张表中选取记录\n\n\
    在 `SELECT` 查询中有多种方式可以关联表，但最常见的是列出以 `INNER JOIN` 分隔的表名。单凭 `INNER JOIN` 会产生所有可能的行组合（即笛卡尔积）。要仅选择相关的值，你需要指定主键/外键关系。例如，要从\
    \ `blog` 和 `images` 表中选取文章及其相关图片，你可以使用 `WHERE` 子句，如下所示：\n\n```\nSELECT title,\
    \ article, filename, caption\nFROM blog INNER JOIN images\nWHERE blog.image_id\
    \ = images.image_id\n```\n\n`title` 和 `article` 列仅存在于 `blog` 表中。同样，`filename`\
    \ 和 `caption` 仅存在于 `images` 表中。它们是明确的，无需限定。然而，`image_id` 存在于两张表中，因此你需要为每个引用加上表名和一个点作为前缀。\n\
    \n多年以来，一种常见的做法是使用逗号代替 `INNER JOIN`，如下所示：\n\n```\nSELECT title, article, filename,\
    \ caption\nFROM blog, images\nWHERE blog.image_id = images.image_id\n```\n\n>\
    \ **注意事项**：由于自 MySQL 5.0.12 以来对连接处理方式的更改，使用逗号连接表可能导致 SQL 语法错误。请改用 `INNER JOIN`。\n\
    \n除了 `WHERE` 子句，你也可以使用 `ON`，如下所示：\n\n```\nSELECT title, article, filename, caption\n\
    FROM blog INNER JOIN images ON blog.image_id = images.image_id\n```\n\n当两列名称相同时，可以使用以下语法，这也是我个人的偏好：\n\
    \n```\nSELECT title, article, filename, caption\nFROM blog INNER JOIN images USING\
    \ (image_id)\n```\n\n> **注意**：`USING` 后的列名必须放在括号内。\n\n## PHP 解决方案 17-4：构建详情页面\n\
    \n本 PHP 解决方案展示了如何连接 `blog` 和 `images` 表，以显示所选文章及其关联图片。MySQLi 和 PDO 的代码几乎相同，因此本方案涵盖了两种方式。\n\
    \n1. 将 `ch17` 文件夹中的 `details_01.php` 复制到 `phpsols-4e` 站点根目录，并重命名为 `details.php`。如果编辑环境提示更新链接，请勿操作。确保\
    \ `footer.php` 和 `menu.php` 位于 `includes` 文件夹中，然后在浏览器中加载该页面。它应显示如图 17-5 所示。\n\n\
