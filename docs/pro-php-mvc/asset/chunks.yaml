    **第23章**


    **CodeIgniter：MVC**


    我们面对CodeIgniter有许多工作要做。它确实为我们提供了控制器、模型和视图来构建社交网络所需的所有功能，但它们只不过是空容器。


    我们已经习惯于在模型中使用ORM，但CodeIgniter并未提供任何此类功能。我们也习惯于在控制器中自动加载类，但CodeIgniter却要求我们自己加载类。我们习惯于在视图中使用丰富的模板语言，但CodeIgniter只提供了一个功能有限的模板解析器，甚至还鼓励直接在视图模板中使用PHP。


    目标


    • 我们需要认识到，在构建示例应用程序的控制器、模型和视图时，我们的框架与CodeIgniter之间的差异。


    • 我们需要为用户、好友、文件和消息创建模型。


    • 我们需要创建相应的视图和控制器。


