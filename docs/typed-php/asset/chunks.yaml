    5  * Documentation:  https://help.ubuntu.com/

    6 Welcome to your Vagrant-built virtual machine.

    7 Last login: Tue May 27 11:16:05 2014 from 10.0.2.2


    9 vagrant@precise64:~$

    ```


    You can also check the installed version of PHP (and that the CLI was installed
    correctly) with:


    ```

    1 $ php -v


    3 PHP 5.5.12-2+deb.sury.org~precise+1 (cli) (built: May 12 2014 13:46:35)

    4 Copyright (c) 1997-2014 The PHP Group

    5 Zend Engine v2.5.0, Copyright (c) 1998-2014 Zend Technologies

    6     with Zend OPcache v7.0.4-dev, Copyright (c) 1999-2014, by Zend Technologies

    ```


    #### Vagrant Commands


    There are a few Vagrant commands you’re likely to use often:


    ```

    1 $ vagrant up

    ```


    This command will start the Vagrant virtual machine, and run any outstanding provisioning.
    That means the first time you run this command, it will take longer boot (depending
    on the complexity of your provisioning scripts).


    ```

    1 $ vagrant halt

    ```


    This command will shut the virtual machine down. It will try to gracefully shut
    the machine down.


    ```

    1 $ vagrant destroy

    ```


    This command will remove the virtual machine and clean up settings applied when
    it was created. If you break something inside the visual machine, and you want
    to *reset* it to the default state, you’ll want to run this command followed by
    `vagrant up`.


    ```

    1 $ vagrant ssh

    ```


    This command will take you inside the virtual machine, just as if you were connecting
    to a remote server. Inside the virtual machine, you can run any of the commands
    usually supported by the guest operating system, including executing PHP scripts
    against the packages installed on the virtual machine.


    [http://phansible.com](http://phansible.com) is the brain-child of [Erika Heidi](https://twitter.com/erikaheidi).
    She is also the author of [Vagrant Cookbook](https://leanpub.com/vagrantcookbook).
    I highly recommend reading this book, if you have any questions or simply want
    to know more about Vagrant!'
  trans: '

    ### Vagrant + Phansible


    我们要使用的许多库都需要一些特殊的安装步骤。为了避免针对每个操作系统编写冗长的指南，我们将改用 `Vagrant` 来搭建开发环境。


    `Vagrant`（如果你还没听说过的话）是一个用于管理虚拟机的程序化接口。如果你曾经设置过虚拟机、安装过操作系统和开发工具，就会知道这需要花费多少时间。而这个过程可以通过
    `Vagrant` 实现自动化。


    `Vagrant` 依赖于底层的虚拟化提供商和配置管理工具。我们将使用 `VirtualBox` 作为虚拟化提供商，并使用 `Ansible` 作为配置管理工具。


    #### 安装


    要安装 `VirtualBox`，请访问 [`www.virtualbox.org/wiki/Downloads`](https://www.virtualbox.org/wiki/Downloads)
    并下载适用于你操作系统的安装程序。


    ![](img/virtualbox-download.png) ![](img/virtualbox-install.png)


    下载并安装 `VirtualBox` 后，你就可以安装 `Vagrant` 了。访问 [`www.vagrantup.com/downloads.html`](http://www.vagrantup.com/downloads.html)
    并下载适用于你操作系统的安装程序。


    ![](img/vagrant-download.png) ![](img/vagrant-install.png)


    我们还需要安装 `Ansible`，以便使用 playbooks 来配置虚拟机。访问 [`docs.ansible.com/intro_installation.html`](http://docs.ansible.com/intro_installation.html)
    并下载适用于你操作系统的安装程序。


    ![](img/ansible-download.png)


    #### 配置


    配置（Provisioning）不过是指一组指令，告诉 `Vagrant` 为你安装哪些依赖项。`Vagrant` 有多种配置工具，但我们只会用到 `Ansible`。


    我们将使用 [`phansible.com`](http://phansible.com) 来完成大部分繁重的工作。


    ![](img/phansible.png)


    设置以下选项：


    1.  操作系统：`Ubuntu Precise Pangolin 64`

    2.  Web 服务器：`Nginx + PHP5-FPM`

    3.  PHP：`5.5`

    4.  Composer：`启用`

    5.  PHP 模块：`php-pear php5-cli php5-common`


    点击“Generate”后，你将开始下载一个压缩文件。将其解压到一个工作目录中，然后启动终端。


    这些文件是指令文件（使用 Ansible 特定的 YAML 语法），描述了 `Vagrant` 必须自动安装哪些依赖项。为了让 `PHP` 环境正常运行，你无需修改它们，但欢迎你熟悉一下它们的功能。


    要启动虚拟机，请运行以下命令：


    ```

    $ vagrant up

    ```


    在设置虚拟机的过程中，可能会要求你提供管理员密码。这将允许设置 `NFS` 共享文件夹。


    虚拟机初始化后，你可以通过以下命令登录：


    ```

    $ vagrant ssh

    ```


    你还可以通过以下命令检查已安装的 `PHP` 版本（并确认 `CLI` 已正确安装）：


    ```

    $ php -v

    ```


    #### Vagrant 命令


    有几个你可能会经常用到的 `Vagrant` 命令：


    ```

    $ vagrant up

    ```


    此命令将启动 `Vagrant` 虚拟机，并运行任何未完成的配置。这意味着第一次运行此命令时，启动时间会更长（取决于配置脚本的复杂程度）。


    ```

    $ vagrant halt

    ```


    此命令将关闭虚拟机。它会尝试优雅地关闭机器。


    ```

    $ vagrant destroy

    ```


    此命令将移除虚拟机并清除创建时应用的设置。如果你在虚拟机内部弄坏了某些东西，并希望将其重置为默认状态，你需要先运行此命令，然后运行 `vagrant up`。


    ```

    $ vagrant ssh

    ```


    此命令将带你进入虚拟机内部，就像你连接到一个远程服务器一样。在虚拟机内部，你可以运行客户操作系统通常支持的任何命令，包括针对虚拟机上安装的软件包执行 `PHP`
    脚本。


    [`phansible.com`](http://phansible.com) 是 [Erika Heidi](https://twitter.com/erikaheidi)
    的杰作。她也是《Vagrant Cookbook》([Vagrant Cookbook](https://leanpub.com/vagrantcookbook))的作者。如果你有任何疑问，或者只是想了解更多关于
    `Vagrant` 的知识，我强烈推荐阅读这本书！

