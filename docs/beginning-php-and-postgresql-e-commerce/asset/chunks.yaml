- fmt: "```sql\nCREATE FUNCTION catalog_count_products_in_category(INTEGER) RETURNS\
    \ INTEGER LANGUAGE plpgsql AS $$\n\nDECLARE\ninCategoryId ALIAS FOR $1;\noutCategoriesCount\
    \ INTEGER;\n\nBEGIN\nSELECT INTO outCategoriesCount\ncount(*)\nFROM product p\n\
    INNER JOIN product_category pc\nON p.product_id = pc.product_id\nWHERE pc.category_id\
    \ = inCategoryId;\nRETURN outCategoriesCount;\n\nEND;\n\n$$;\n```\n\n`catalog_get_products_in_category`\
    \ 函数返回属于特定类别的产品。要获取产品列表，需要像本章前面所述的那样连接 `product` 和 `product_category` 表，同时还会对产品描述进行截断处理。\n\
    \n该函数接收四个参数：\n\n- `inCategoryID`：表示我们为其返回产品的类别 ID。\n- `inShortProductDescriptionLength`：表示产品描述允许的最大长度。如果描述超过此值，将被截断，并在末尾添加“...”。请注意，这仅在显示产品列表时使用；在产品详情页面，描述不会被截断。\n\
    - `inProductsPerPage`：表示我们网站上每个目录页面可显示的最大产品数量。如果类别中的产品总数大于此数值，则仅返回包含 `inProductsPerPage`\
    \ 个产品的一页。\n- `inStartItem`：表示要返回的第一个产品的索引。当使用分页且每页显示 4 个产品时，如果访问者访问第二页产品，`inStartItem`\
    \ 将为 5，`inProductsPerPage` 将为 4。使用这些值，`catalog_get_products_in_category` 函数将返回从第五个到第九个的产品。\n\
    \n```\n-- Create product_list type\nCREATE TYPE product_list AS\n(\n    product_id\
    \ INTEGER,\n    name VARCHAR(50),\n    description VARCHAR(1000),\n    price NUMERIC(10,\
    \ 2),\n    discounted_price NUMERIC(10, 2),\n    thumbnail VARCHAR(150)\n);\n\n\
    -- Create catalog_get_products_in_category function\nCREATE FUNCTION catalog_get_products_in_category(\n\
    \    INTEGER, INTEGER, INTEGER, INTEGER)\nRETURNS SETOF product_list LANGUAGE\
    \ plpgsql AS $$\nDECLARE\n    inCategoryId ALIAS FOR $1;\n    inShortProductDescriptionLength\
    \ ALIAS FOR $2;\n    inProductsPerPage ALIAS FOR $3;\n    inStartItem ALIAS FOR\
    \ $4;\n    outProductListRow product_list;\nBEGIN\n    FOR outProductListRow IN\n\
    \        SELECT p.product_id, p.name, p.description, p.price, p.discounted_price,\
    \ p.thumbnail\n        FROM product p\n        INNER JOIN product_category pc\n\
    \            ON p.product_id = pc.product_id\n        WHERE pc.category_id = inCategoryId\n\
    \        ORDER BY p.product_id\n        LIMIT inProductsPerPage\n        OFFSET\
    \ inStartItem\n    LOOP\n        IF char_length(outProductListRow.description)\
    \ >\n           inShortProductDescriptionLength THEN\n            outProductListRow.description\
    \ :=\n                substring(outProductListRow.description, 1,\n          \
    \      inShortProductDescriptionLength) || '...';\n        END IF;\n        RETURN\
    \ NEXT outProductListRow;\n    END LOOP;\nEND;\n$$;\n```\n\n`catalog_count_products_on_department`\
    \ 函数计算在指定部门页面上显示的产品数量。请注意，部门的页面上不会列出该部门的所有产品，而仅列出 `display` 值为 2（部门促销产品）或 3（部门及目录促销产品）的产品。\n\
    \n```\n-- Create catalog_count_products_on_department function\nCREATE FUNCTION\
    \ catalog_count_products_on_department(INTEGER)\nRETURNS INTEGER LANGUAGE plpgsql\
    \ AS $$\nDECLARE\n    inDepartmentId ALIAS FOR $1;\n    outProductsOnDepartmentCount\
    \ INTEGER;\nBEGIN\n    SELECT DISTINCT INTO outProductsOnDepartmentCount\n   \
    \     count(*)\n    FROM product p\n    INNER JOIN product_category pc\n     \
    \   ON p.product_id = pc.product_id\n    INNER JOIN category c\n        ON pc.category_id\
    \ = c.category_id\n    WHERE (p.display = 2 OR p.display = 3)\n        AND c.department_id\
    \ = inDepartmentId;\n    RETURN outProductsOnDepartmentCount;\nEND;\n$$;\n```"
  raw: 'CREATE FUNCTION catalog_count_products_in_category(INTEGER) RETURNS INTEGER
    LANGUAGE plpgsql AS $$


    DECLARE


    inCategoryId ALIAS FOR $1;


    outCategoriesCount INTEGER;


    BEGIN


    SELECT INTO outCategoriesCount


    count(*)


    FROM product p


    INNER JOIN product_category pc


    ON p.product_id = pc.product_id


    WHERE pc.category_id = inCategoryId;


    RETURN outCategoriesCount;


    END;


