    We will now create a new r[oute to match a URL scheme of http://phpweb20/user/](http://phpweb20/user)


    *username*/ *action*. Since this route will only be used for the UserController
    class we will be implementing shortly, we will hard-code the controller name (user),
    while the username and action values will be determined dynamically. If the action
    isn’t specified in the URL (as in the URL [http://phpweb20/user/ *username*),
    the action will default to](http://phpweb20/user/username) index, just as it has
    previously.


    The route we will use is user/:username/:action/*. Since we are only using this
    route for UserController, we don’t include :controller in the string. When instantiating
    Zend_


    Controller_Router_Route, the first argument is this string, while the second argument
    is an array that specifies the default parameters for the request. Since we know
    the controller for this request is user, we can specify this. We can also specify
    index as the default action. Therefore, the code we use to create this new route
    is as follows:


    $route = new Zend_Controller_Router_Route(


    ''user/:username/:action/*'',


    array(''controller'' => ''user'',


    ''action'' => ''index'')


    );


    Injecting the Route into the Router


    Once the route has been created, it must be injected into the router so subsequent
    user requests will be matched against the route (in addition to any existing routes).


    The route is added by calling the addRoute() method on the Zend_Controller router,
    which can be accessed from the front controller by calling getRouter(). The first
    argument to addRoute() is a unique name to identify the route—it does not actually
    affect the behavior of the route.


    Listing 9-4 shows the code we will add to ./htdocs/index.php in order to create
    this route.


    The route should be added just prior to dispatching the request with $controller->dispatch().


