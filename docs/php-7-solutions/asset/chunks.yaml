  trans: '

    如果 `username` 和 `password` 都匹配，脚本会创建一个名为 `$_SESSION[''authenticated'']` 的变量，并将其赋值为
    20 世纪 70 年代一支伟大民谣摇滚乐队的名字。这两件事（除了杰思罗·塔尔的音乐）并没有什么神奇之处；变量名和其值都是我随意选择的。唯一重要的是创建了一个会话变量。一旦找到匹配项，会话
    ID 就会被重新生成，并且 `break` 会退出循环。


    3. 如果登录成功，`header()` 函数需要将用户重定向到存储在 `$redirect` 中的 URL，然后退出脚本。否则，需要生成一条错误消息，告知用户登录失败。完整的脚本如下所示：


    ```

    <?php

    if (!file_exists($userlist) || !is_readable($userlist)) {

    $error = ''登录功能不可用。请稍后再试。'';

    } else {

    $file = fopen($userlist, ''r'');

    while (!feof($file)) {

    $data = fgetcsv($file);

    // 如果第一个元素为空则忽略

    if (empty($data[0])) {

    continue;

    }

    // 如果用户名和密码匹配，创建会话变量，

    // 重新生成会话 ID，并跳出循环

    if ($data[0] == $username && password_verify($password, $data[1])) {

    $_SESSION[''authenticated''] = ''Jethro Tull'';

    session_regenerate_id();

    break;

    }

    }

    fclose($file);

    // 如果会话变量已设置，则进行重定向

    if (isset($_SESSION[''authenticated''])) {

    header("Location: $redirect");

    exit;

    } else {

    $error = ''用户名或密码无效。'';

    }

    }

    ?>

    ```


    4. 在 `login.php` 中，紧跟在开始的 `<body>` 标签之后添加以下简短的代码块，以显示任何错误消息：


    ```

    <?php

    if (isset($error)) {

    echo "<p>$error</p>";

    }

    ?>

