    # Updating, Deleting, and Inserting in the Business Rules Tier


    We are getting very close to completing the ABC Canine Shelter Reservation System.
    A few changes need to be made to the `Dog` class to determine why the class was
    called (`insert`, `delete`, or `update`). Then the information can be passed to
    the correct method in the `dog_data` class. As mentioned, no changes will be needed
    to the `dog_data` class, as the methods for `insert`, `update`, and `delete` already
    exist. Also, the `Dog` class must retrieve all the dog records from `dog_data`
    to send to the `dog_interface`.


    ```

    <?php declare(strict_types=1);

    class Dog

    {

    // ------------------------------ Properties ------------------------------

    private int $dog_weight = 0;

    private string $dog_breed = "no breed";

    private string $dog_color = "no color";

    private string $dog_name = "no name";

    private string $error_message = "??";

    private $breedxml = "";

    private bool $insert = FALSE;

    private $index = -1;

    ```


    At the top of the `Dog` class properties, `$insert` and `$index` are created to
    hold the values passed from the `properties_array` by the `dog_interface` program.
    `$index` is initially set to `-1`, indicating the default of assuming that the
    user either selected NEW or did not select a dog from the dogs list box (in `lab.php`).


    ```

    if((is_bool($properties_array[5])) && ($properties_array[6] > -1))

    { // confirms true or false and valid index or takes default

    $this->insert = $properties_array[5];

    $this->index = $properties_array[6];

    }

    $this->change_dog_data("Insert/Update");

    }

    if(is_numeric($properties_array))

    {   // confirms valid index do not delete if not valid

    $this->index = $properties_array;

    $this->change_dog_data("Delete");

    }

    ```


    In the constructor, after the dog values (`dog_name`, `dog_breed`, `dog_weight`,
    and `dog_color`) have been validated, the insert and index values also need to
    be validated. The `if` statement shown uses the PHP method `is_bool` to determine
    if the value in `$properties_array[5]` is `TRUE` or `FALSE`. `$properties_array[5]`
    is the location of the value from the `insert` property. (It is set to `TRUE`
    if it is an insert and set to `FALSE` if it is an `Update`.) The `if` statement
    also determines if the value in `$properties_array[6]` is greater than `-1`. A
    value greater than `-1` indicates an update or deletion. A value of `-1` indicates
    an insertion request. If valid, the values are placed into `$this->insert` and
    `$this->index`. Then the `private` method called `change_dog_data` is called passing
    in “Insert/Update”.


    The next `if` statement uses the PHP method `is_numeric` to determine if `$properties_array`
    is not actually an array and that it contains a number. If this is true, the index
    of the dog to be removed has been passed. If this is the case, then `$property_array`
    (containing the index to be deleted) is placed in `$this->index` and the `private`
    method called `change_dog_data` is called passing in “Delete”.


    ```

    private function change_dog_data($type)

    {

    if ( file_exists("e8dog_container.php")) {

    require_once("e8dog_container.php");

    // use Chapter 5 container w exception handling

    } else {

    throw new Exception("Dog container file missing or corrupt");

    }

    $container = new dog_container("dogdata"); // sets the tag name to look for in
    XML file

    $properties_array = array("dogdata"); // not used but must be passed into create_object

    $dog_data = $container->create_object($properties_array); // creates dog_data
    object

    ```


    The new `change_dog_data` method (called in the previous code) will use code very
    similar to the `display_dog_data` method shown in a previous chapter. First, the
    method verifies that the `dog_container` exists. If the container exists, an instance
    of the container (`$container`) is created passing `"dogdata"` which tells the
    container that this request will be using the dogs XML file. Next, `$properties_array`
    is created with a simple array containing `"dogdata"`. This array will not actually
    be used. However, the `dog_data` class requires that something be passed into
    the constructor. An instance of `dog_data` (`$dog_data`) is now created using
    the `create_object` method of the container.


    ```

    $method_array = get_class_methods($dog_data);

    $last_position = count($method_array) - 1;

    $method_name = $method_array[$last_position];

    ```


    As seen in previous code, the `change_dog_data` method uses the PHP `get_class_methods`
    to create an array of methods contained in the `dog_data` object (`$dog_data`).
    The last method in `dog_data` is the `processRecords` method, which uses a `case`
    statement to call the correct private method.


    ```

    if (($this->index > -1) && ($type == "Delete"))

    {

    $record_Array = $this->index;

    $dog_data->$method_name("Delete",$record_Array);

    }

    ```


    If the index is greater than `-1` and the type is `"Delete"`, then the `change_dog_data`
    method calls the `processRecords` method of the `dog_data` object and passes `"Delete"`
    and the index to be deleted.


    ```

    else if (($this->index == -1) && ($type == "Insert/Update"))

    {

    $record_Array = array(array(''dog_name''=>"$this->dog_name", ''dog_weight''=>"$this->dog_weight",
    ''dog_color''=>"$this->dog_color", ''dog_breed''=>"$this->dog_breed"));

    $dog_data->$method_name("Insert",$record_Array);

    }

    ```


    If the index is `-1` and the type is `"Insert/Update"`, then the user has requested
    an “insert”. An array is created containing all the dog properties (`dog_name`,
    `dog_weight`, `dog_color`, and `dog_breed`). Then “Insert” and the array are passed
    into the `processRecords` method of the `dog_object`.


    ```

    else if ($type == "Insert/Update")

    {

    $record_Array = array($this->index => array(''dog_name''=>"$this->dog_name",

    ''dog_weight''=>"$this->dog_weight", ''dog_color''=>"$this->dog_color",

    ''dog_breed''=>"$this->dog_breed"));

    $dog_data->$method_name("Update",$record_Array);

    }

    $dog_data = NULL;

    }

    ```


    If the index is not `-1` and the type is `"Insert/Update"`, then the user has
    requested an update of information. The same array as shown with an `insert` is
    created, with one exception. The index of the array (`array($this->index =>`)
    is set to the index of the record to be updated. The array and “Update” are then
    passed to the `processRecords` method of the `dog_data` object. After the record
    has been inserted, updated, or deleted, the `dog_data` object (`$dog_data`) is
    set to `NULL`. As stated in previous chapters, the `dog_data` object first updates
    the associate array, which contains each dog’s information. When the destructor
    of the `dog_data` object is called, the information is then updated to the `dog_data`
    XML file. Setting `$dog_data` to `NULL` releases the `dog_data` object, which
    calls its destructor.


    That completes all the changes to the business rules tier. Let us put it all together.'
