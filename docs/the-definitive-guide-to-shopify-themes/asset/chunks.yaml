    \nISBN 978-1-4842-2640-7  \n电子书 ISBN 978-1-4842-2641-4  \n[`doi.org/10.1007/978-1-4842-2641-4`](https://doi.org/10.1007/978-1-4842-2641-4)\n\
    \n美国国会图书馆控制编号：2017952538\n\n© 加文·巴拉德 2017\n\n本作品受版权保护。出版商保留所有权利，涉及材料的全部或部分内容，具体包括翻译、重印、插图复用、朗诵、广播、微缩胶片复制或其他任何物理形式的复制、信息存储与检索的传输、电子改编、计算机软件，或目前已知及未来开发的任何类似或不同方法。\n\
    \n本书中可能出现商标名称、标识和图像。对于商标名称、标识或图像的每次出现，我们未使用商标符号，仅在编辑性用途中为商标所有者利益使用这些名称、标识和图像，无意侵犯商标权。本书中使用商品名称、商标、服务标记及类似术语，即使未经标识，也不应被视为对它们是否受专有权利保护的立场表达。\n\
    \n尽管本书中的建议和信息在出版时被认为是真实准确的，但作者、编辑和出版商均不对可能存在的任何错误或遗漏承担法律责任。出版商对本书所载内容不作任何明示或暗示的担保。\n\
    \n本书采用无酸纸印刷。\n\n通过 Springer Science+Business Media New York 在全球图书贸易中发行，地址：233\
    \ Spring Street, 6th Floor, New York, NY 10013。电话：1-800-SPRINGER，传真：(201) 348-4505，电子邮箱：orders-ny@springer-sbm.com，或访问\
    \ www.springeronline.com。\n\nApress Media, LLC 是一家加利福尼亚有限责任公司，其唯一成员（所有者）是 Springer\
    \ Science + Business Media Finance Inc (SSBM Finance Inc)。SSBM Finance Inc 是一家特拉华州公司。\n\
    \n谨以此书献给我的家人和朋友，无论他们身处 Shopify 世界内外。\n\n## 引言\n\n早在 2005 年，当加拿大几位朋友想在线销售滑雪板却找不到合适的电子商务平台时，Shopify\
    \ 应运而生。\n\n自那时起，Shopify 的功能、使用其服务的商家数量以及整个电子商务世界都取得了长足发展。截至本书撰写时，该平台为 175 个国家超过\
    \ 50 万家企业的在线商店提供支持，其中 2500 家是使用较新“企业级”产品 Shopify Plus 的高销量商家。2016 年，Shopify 处理了总计\
    \ 154 亿美元的交易，是前一年总额的两倍。\n\n许多人将 Shopify 的成功归因于其托管性质、不断扩展的功能范围，以及与 Facebook、Twitter\
    \ 和 Amazon 等大公司的合作关系。在我看来，支撑 Shopify 发展的最关键且常被忽视的因素之一是其合作伙伴生态系统——这是一个由开发者、设计师、营销人员和专家组成的广泛群体，他们与\
    \ Shopify 商家合作，帮助商家在平台上成长并取得成功。由于我自己就是这些合作伙伴之一，我猜这一观点听起来有些自利，但我认为任何以任何身份与 Shopify\
    \ 合作过的人都必须承认，至少合作伙伴生态系统是一项重要资产。\n\n合作伙伴帮助商家迁移到 Shopify，构建他们的商店，定制主题，并配置众多可用应用程序。他们还在\
    \ Shopify 官方商店开发并销售主题和应用程序，在平台之上谋生并建立业务。\n\n我最初于 2008 年（Shopify 发展早期）以探索者的身份接触\
    \ Shopify。当时功能集有限；API 没有文档说明，商家设置店铺时可选择的默认主题也谈不上设计奖项。要让一切正常运行，往往需要反复试验、纠错，并对 Liquid\
    \ 代码感到头疼。尽管如此，在易用性方面，它当时远超其他任何平台，而且该公司似乎致力于改进的某种特质使其足够有趣，值得我继续关注（当时的 Shopify CEO\
    \ Tobi——至今仍担任此职——经常直接在合作伙伴论坛中回应问题，并说“刚刚推出一些代码来修复这个问题！”）。\n\n坚持下去被证明是一个明智的决定——2013\
    \ 年，我得以转型为全职 Shopify 自由职业者；2015 年，我创立了 Disco，这是一家帮助 Shopify 商家成长和改善业务的工作室。在那段时间里，我参与过大小型商店的项目，从零开始构建主题和应用程序，编写并发布了开源库，并与\
    \ Shopify 合作举办演讲、研讨会和在线课程。最重要的是，我有机会结识众多出色的合作伙伴和“Shopify 人”，通过商家的视角发现电子商务世界，并与来自世界各地的各类人士交朋友。\n\
    \n本书旨在分享这段经历教会我的一些东西。\n\n## 为何撰写本书？\n\n没有任何单一资源能让人掌握关于 Shopify 主题所需的每一个具体知识。在线商业世界有太多的边缘情况和奇妙的特性，一个“一站式商店”无法兑现这样的承诺。\n\
    \n幸运的是，对于面临学习基础知识或处理新需求的 Shopify 开发者来说，手头已有相当丰富的信息资源。Shopify 官方的主题和 Liquid 文档专业且详尽，他们经常在官方合作伙伴博客上发布详细的“操作指南”。Shopify\
    \ 合作伙伴自己也常通过博客文章和代码示例填补空白，而对于仍在寻找答案的人，官方 Shopify 论坛或非官方 Slack 群组中有活跃的社区成员愿意提供帮助。\n\
    \n那么，为何还要增加一个声音呢？\n\n尽管已有如此广泛的信息存在，我长久以来一直感觉缺少某样东西——某样能让新手 Shopify 主题开发者将所有零散知识串联成一个完整叙述的东西。在本书中，我试图通过涵盖高层主题设计原则和实用编码技能，并尽可能使用案例研究和实例将两者结合起来，来填补这一空白。\n\
    \n这里的目标并非复制现有文档，或为你作为主题开发者可能面临的每一种设想场景提供逐步的机械学习方法。相反，通过阅读本书，你应该能更深入地理解 Shopify\
    \ 主题的工作原理，在面对新情况时如何依赖主题设计的基本原则，以及如何提升工作流程以交付专业的最终产品。"
- fmt: "# Who This Book Is For\n\nThis book assumes that you have a working knowledge\
    \ of the fundamentals of web design and development—HTML, CSS, and JavaScript.\
    \ It does not assume any prior knowledge of Shopify development (we’ll kick things\
    \ off with a Shopify primer in Chapter 1).  \nDevelopers with some Shopify experience\
    \ may find some of the earlier material straightforward, but will derive value\
    \ from the coverage of topics such as workflow automation, development best practices,\
    \ and deeper dives into the architecture and design principles of Shopify themes.\
    \  \nVeteran Shopify developers are likely to get something out of the material\
    \ as well—whether it’s an introduction to advanced theme deployment techniques,\
    \ taking performance optimization to a new level, or simply getting a different\
    \ perspective on theme development.\n\n# Structure of This Book\n\nThis book is\
    \ broken into 11 chapters. Each one tackles a different idea or component of Shopify\
    \ theme development, and while their contents are somewhat independent, they do\
    \ follow an overall chronological order. This is especially true for Chapters\
    \ 4 through 7, which together walk through the process of building an entire Shopify\
    \ theme from scratch.  \nI would therefore recommend working through the book\
    \ in order the first time around, and then coming back to specific chapters and\
    \ sections as needed for reference.  \nThroughout the book, I use code snippets\
    \ to demonstrate concepts and specific techniques. For space reasons, many of\
    \ these listings are truncated to show only the more important parts—the full\
    \ versions of these are available in the resources repository on GitHub, located\
    \ at `https://github.com/Apress/definitive-guide-to-shopify-themes`. A second\
    \ GitHub repository, `https://github.com/gavinballard/defguide-theme`, tracks\
    \ the full source code development for the example theme begun in the exercises\
    \ in Chapter 4 and built on in the remaining chapter exercises.\n\n# Beyond the\
    \ Book\n\nAs I mentioned, there are several places to go to find help if you find\
    \ yourself stuck or want to learn more about a topic. Outside of the standard\
    \ Google search, you can search through the official Shopify forums (`https://ecommerce.shopify.com/forums`),\
    \ check out the official theme documentation (`https://help.shopify.com/themes`),\
    \ or browse through posts on the Partner Blog (`https://www.shopify.com/partners/blog`).\
    \  \nThere’s also a growing number of Shopify-focused communities being built\
    \ on a range of social platforms, including Slack, Reddit, and Facebook.  \nIf\
    \ you have any specific questions about the material in this book, or you would\
    \ like to report errata, you can contact me directly at `gavin@gavinballard.com`.\
    \  \nOn with the show!\n\n# Acknowledgments\n\nAs I will rave to any and all who\
    \ care to listen, Shopify’s “secret sauce” doesn’t lie in its code but in its\
    \ ecosystem—the employees, experts, and partners who work together to “make commerce\
    \ better for everyone.” It’s a cheesy sentiment but genuine—I would never have\
