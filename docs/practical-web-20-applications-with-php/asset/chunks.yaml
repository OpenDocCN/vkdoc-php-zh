    **538**


    C H A P T E R 1 4 ■ D E P L OY M E N T A N D M A I N T E N A N C E


    Now if you try [to access http://phpweb20/admin, y](http://phpweb20/admin)ou will
    be denied access unless your user type is administrator.


    **Application Deployment**


    We’ll now look at the process of deploying our web application to a live server.
    So far, we have presumed that all development has taken place on a dedicated development
    server and that the users of the application don’t have access to this server.


    A typical setup for how versions of web applications are managed involves three
    types of servers:


    • **Development server.** This is where new code is created and tested. The application
    may be working sometimes, while it may be completely broken at others. It is typically
    accessed only by the developers and testers.


    • **Staging server.** Once the new version of the web application is complete,
    it is deployed to the staging server. This server is configured identically to
    the production server (the same operating system and versions of Apache and PHP
    and other such software). This application will be fully functional, yet its data
    may be static and stale (it is typically not a backup or a mirror server). It
    is typically accessed by developers and testers (and perhaps the client who has
    commissioned you to develop the application in order to approve changes). Deploying
    on the staging server provides a good opportunity to determine any “gotchas” that
    may arise while deploying to the production server.


    • **Production server.** Once everything appears to be functioning correctly on
    the staging server, the new application version can also be deployed to the production
    server. This is the server that the real world sees, which contains the live database
    and up-to-date data.


    In reality, the average web developer’s process will not include the staging server
    since the development server can often double as the staging server. In the following
    sections, we will assume we are dealing only with a development and a production
    server to simplify matters.


    **Different Configurations for Different Servers**


    Before deploying the web application files to a production server, we must cater
    to different servers requiring different configurations. The reason for this is
    that we should be able to deploy all files to the production server and have them
    all ready to go straightaway without then having to modify the production configuration
    file.


    For example, in your development environment the database server will probably
    be the same physical machine as your web server (meaning your PHP will connect
    to a server on


    “localhost”). In a production environment, this may not be the case. Many web
    hosts will separate their database servers from their web servers. Because of
    this, you may require different database connection settings. To deal with this,
    we add a new section to the settings.ini file of our application.


    When we created the settings file in Chapter 2, all configuration strings were
    within a section called development, which was denoted in square brackets as follows:


    [development]


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch14CMP2 11/13/07 8:20 PM Page 539


    C H A P T E R 1 4 ■ D E P L OY M E N T A N D M A I N T E N A N C E


    **539**


    We can define more sections in this file in the same manner. So if we wanted to
    have different settings for production, we would include the following line:


    [production]


    You would then define the settings for production following this line. The only
    problem with this, though, is that some settings may be identical for both development
    and production. To help with this, Zend_Config allows inheritance in configuration
    files.


    In other words, for the production settings we can use all development settings
    and then override each one as required. We do this by defining the new section
    as follows:


    [production : development]


    Returning to the earlier example of using a different hostname for the database
    server in production, we could use the following configuration file:


    [development]


    database.type = pdo_mysql


    database.hostname = localhost


    database.username = phpweb20


    database.password = myPassword


    database.database = phpweb20


    ; other development settings here


    **[production : development]**


    **database.hostname = 192.168.0.123**


    In this code, all settings (such as database username and password) used for development
    will also be used in production except for the hostname, which has been overridden.


    Listing 14-19 shows the code you should add to the settings.ini file. Even if
    you don’t intend on changing any settings, you will need to add this line for
    the code following this to work.


    **Listing 14-19.** *Defining the Production Settings Section (settings.ini)*


    [development]


    ; other development settings here


    **[production : development]**


    Telling the Bootstrap Which Configuration to Use


    Once the configuration section for the production server has been created, we
    must change the bootstrap file so it loads the correct section. So far we have
    hard-coded the bootstrap to use the development section. The question is, how
    does the code know which section to load?


    To do this we must add some detection mechanism into the bootstrap.


