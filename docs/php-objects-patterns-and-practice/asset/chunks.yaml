- fmt: '### Consequences


    Notice that the creator classes mirror the product hierarchy. This is a common
    consequence of the Factory Method pattern and disliked by some as a special kind
    of code duplication. Another issue is the possibility that the pattern could encourage
    unnecessary subclassing. If your only reason for subclassing a creator is to deploy
    the Factory Method pattern, you may need to think again (that’s why I introduced
    the header and footer constraints to the example here).


    I have focused only on appointments in my example. If I extend it somewhat to
    include to-do items and contacts, I face a new problem. I need a structure that
    will handle sets of related implementations at one time. The Factory Method pattern
    is often used with the Abstract Factory pattern, as you will see in the next section.


    ## Abstract Factory Pattern


    In large applications, you may need factories that produce related sets of classes.
    The Abstract Factory pattern addresses this problem.


    ### The Problem


    Let’s look again at the organizer example. I manage encoding in two formats, `BloggsCal`
    and `MegaCal`. I can grow this structure horizontally by adding more encoding
    formats, but how can I grow vertically, adding encoders for different types of
    PIM objects? In fact, I have been working toward this pattern already.


    In Figure [9-6](#A314621_5_En_9_Chapter.html#Fig6), you can see the parallel families
    with which I will want to work. These are appointments (`Appt`), things to do
    (`Ttd`), and contacts (`Contact`).


    ![A314621_5_En_9_Fig6_HTML.gif](A314621_5_En_9_Fig6_HTML.gif)


    Figure 9-6. Three product families


    The `BloggsCal` classes are unrelated to one another by inheritance (although
    they could implement a common interface), but they are functionally parallel.
    If the system is currently working with `BloggsTtdEncoder`, it should also be
    working with `BloggsContactEncoder`.


    To see how I enforce this, you can begin with the interface, as I did with the
    Factory Method pattern (see Figure [9-7](#A314621_5_En_9_Chapter.html#Fig7)).


    ![A314621_5_En_9_Fig7_HTML.gif](A314621_5_En_9_Fig7_HTML.gif)


    Figure 9-7. An abstract creator and its abstract products


    ### Implementation


    The abstract `CommsManager` class defines the interface for generating each of
    the three products (`ApptEncoder`, `TtdEncoder`, and `ContactEncoder`). You need
    to implement a concrete creator in order to actually generate the concrete products
    for a particular family. I illustrate that for the `BloggsCal` format in Figure
    [9-8](#A314621_5_En_9_Chapter.html#Fig8).


    ![A314621_5_En_9_Fig8_HTML.gif](A314621_5_En_9_Fig8_HTML.gif)


    Figure 9-8. Adding a concrete creator and some concrete products


    Here is a code version of `CommsManager` and `BloggsCommsManager`:


    ```

    // listing 09.25

    abstract class CommsManager

    {

    abstract public function getHeaderText(): string;

    abstract public function getApptEncoder(): ApptEncoder;

    abstract public function getTtdEncoder(): TtdEncoder;

    abstract public function getContactEncoder(): ContactEncoder;

    abstract public function getFooterText(): string;

    }

    // listing 09.26

    class BloggsCommsManager extends CommsManager

    {

    public function getHeaderText(): string

    {

    return "BloggsCal header\n";

    }

    public function getApptEncoder(): ApptEncoder

    {

    return new BloggsApptEncoder();

    }

    public function getTtdEncoder(): TtdEncoder

    {

    return new BloggsTtdEncoder();

    }

    public function getContactEncoder(): ContactEncoder

    {

    return new BloggsContactEncoder();

    }

    public function getFooterText(): string

    {

    return "BloggsCal footer\n";

    }

    }

    ```


    Notice that I use the Factory Method pattern in this example. `getContactEncoder()`
    is abstract in `CommsManager` and implemented in `BloggsCommsManager`. Design
    patterns tend to work together in this way, one pattern creating the context that
    lends itself to another. In Figure [9-9](#A314621_5_En_9_Chapter.html#Fig9), I
    add support for the `MegaCal` format.


    ![A314621_5_En_9_Fig9_HTML.gif](A314621_5_En_9_Fig9_HTML.gif)


    Figure 9-9. Adding concrete creators and some concrete products


    ### Consequences


    So, let’s look at what this pattern buys:


    * First, I decouple my system from the details of implementation. I can add or
    remove any number of encoding formats in my example without causing a knock-on
    effect.

    * I enforce the grouping of functionally related elements of my system. So, by
    using `BloggsCommsManager`, I am guaranteed that I will work only with `BloggsCal`-related
    classes.

    * Adding new products can be a pain. Not only do I have to create concrete implementations
    of the new product, but I also have to amend the abstract creator and every one
    of its concrete implementers in order to support it.


    Many implementations of the Abstract Factory pattern use the Factory Method pattern.
    This may be because most examples are written in Java or C++. PHP, however, does
    not have to enforce a return type for a method (though it now can), which affords
    us some flexibility that we might leverage.


    Rather than create separate methods for each Factory Method, you can create a
    single `make()` method that uses a flag argument to determine which object to
    return:


    ```

    // listing 09.27

    interface Encoder

    {

    public function encode(): string;

    }

    // listing 09.28

    abstract class CommsManager

    {

    const APPT    = 1;

    const TTD     = 2;

    const CONTACT = 3;

    abstract public function getHeaderText(): string;

    abstract public function make(int $flag_int): Encoder;

    abstract public function getFooterText(): string;

    }

    // listing 09.29

    class BloggsCommsManager extends CommsManager

    {

    public function getHeaderText(): string

    {

    return "BloggsCal header\n";

    }

    public function make(int $flag_int): Encoder

    {

    switch ($flag_int) {

    case self::APPT:

    return new BloggsApptEncoder();

    case self::CONTACT:

    return new BloggsContactEncoder();

    case self::TTD:

    return new BloggsTtdEncoder();

    }

    }

    public function getFooterText(): string

    {

    return "BloggsCal footer\n";

    }

    }

    ```


    As you can see, I have made the class interface more compact. I’ve done this at
    a considerable cost, though. In using a factory method, I define a clear interface
    and force all concrete factory objects to honor it. In using a single `make()`
    method, I must remember to support all product objects in all the concrete creators.
    I also introduce parallel conditionals, as each concrete creator must implement
    the same flag tests. A client class cannot be certain that concrete creators generate
    all the products because the internals of `make()` are a matter of choice in each
    case.


    On the other hand, I can build more flexible creators. The base creator class
    can provide a `make()` method that guarantees a default implementation of each
    product family. Concrete children could then modify this behavior selectively.
    It would be up to implementing creator classes to call the default `make()` method
    after providing their own implementation.


    You will see another variation on the Abstract Factory pattern in the next section.


    ## Prototype


    The emergence of parallel inheritance hierarchies can be a problem with the Factory
    Method pattern. This is a kind of coupling that makes some programmers uncomfortable.
    Every time you add a product family, you are forced to create an associated concrete
    creator (the `BloggsCal` encoders are matched by `BloggsCommsManager`, for example).
    In a system that grows fast enough to encompass many products, maintaining this
    kind of relationship can quickly become tiresome.


    One way of avoiding this dependency is to use PHP’s `clone` keyword to duplicate
    existing concrete products. The concrete product classes themselves then become
    the basis of their own generation. This is the Prototype pattern. It enables you
    to replace inheritance with composition. This in turn promotes runtime flexibility
    and reduces the number of classes you must create.'
