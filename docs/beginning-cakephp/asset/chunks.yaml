- fmt: "### 重新排版后的 Markdown 文档\n\nLine 2 of Listing 13-20 may look a little confusing,\
    \ but actually it is just a typical find request for the model. It uses the `Set::extract()`\
    \ function to clean up the array for the helper. I’ve opted to use this to demonstrate\
    \ one method for cleaning up arrays. Recall that Cake automatically formats model\
    \ results into arrays that follow a specific structure. To simplify the code in\
    \ the `$calendar->events()` function, you can use `Set::extract` to take the results\
    \ from the `find()` function and remove the `CalendarEvent` key from the array.\
    \ For example, if the find returned two events, the result array would by default\
    \ be formatted something like this:\n\n```\n$events = Array(\n    [0] => Array(\n\
    \            [CalendarEvent]=> Array(\n                    [id] => 1\n       \
    \             [name] => Test Event 1\n                    [date] => 2008-12-25\
    \ 01:00:01\n                    [details] => Merry Christmas\n            )\n\
    \    ),\n    [1] => Array(\n            [CalendarEvent] => Array(\n          \
    \          [id] => 2\n                    [name] => Test Event 2\n           \
    \         [date] => 2009-01-01 01:00:00\n                    [details] => And\
    \ a happy new year\n            )\n    )\n);\n```\n\nIf you passed this same result\
    \ set through `Set::extract()` with the following command: `$events = Set::extract($events,'{n}.CalendarEvent');`\
    \  \nthen the resulting array would be formatted like this:\n\n```\n$events =\
    \ Array(\n    [0] => Array(\n            [id] => 1\n            [name] => Test\
    \ Event 1\n            [date] => 2008-12-25 01:01:00\n            [details] =>\
    \ Merry Christmas\n    ),\n    [1] => Array(\n            [id] => 2\n        \
    \    [name] => Test Event 2\n            [date] => 2009-01-01 01:00:00\n     \
    \       [details] => Happy New Year\n    )\n);\n```\n\nSimply put, `Set::extract()`\
    \ cleans arrays by reformatting the array. Here in the Calendar plugin, this method\
    \ of invoking `Set::extract()` makes looping through the `$events` array a little\
    \ easier. More than anything, be advised that `Set::extract()` is available in\
    \ your Cake applications or plugins and can help clean up nested arrays. Alternatively,\
    \ in many cases, you would have to produce your own loops to sift through nested\
    \ arrays.\n\nLine 2 also uses some SQL syntax to search the `date` field. Notice\
    \ that the query searches for events that match the current month and year. By\
    \ wrapping `MONTH()` around the field name, Cake knows to run the right SQL query\
    \ for datetime fields. In other words, by providing an integer representing the\
    \ current month, the model will search the database for a matching month in the\
    \ `date` field without needing a full datetime string. Wrapping `YEAR()` also\
    \ works to find the correct year in the `date` field. The result set will be limited\
    \ to just those events that occur this month and year.\n\nLine 3 sends the results\
    \ as the `$events` array in the view. In the `app/plugins/calendar/views/events/index.ctp`\
    \ file, you can now use the `$calendar->render()` function to take this array\
    \ and place its contents in the calendar with one string of code. First, make\
    \ sure the Events controller has access to the Calendar plugin by including it\
    \ in the `$helpers` class array near the top of the controller:\n\n```\nvar $helpers\
    \ = array('Calendar');\n```\n\nNext, create the `app/plugins/calendar/views/events/index.ctp`\
    \ file, and paste Listing 13-21.\n\n**Listing 13-21.** *Contents of the Index\
    \ View*\n\n```\n<h2><?=date('M').' '.date('Y');?></h2>\n<?=$calendar->render($events,date('m'),date('Y'));?>\n\
    ```\n\nLaunch the event’s Index action in the browser, and you should see a calendar\
    \ rendered with any test events you may have saved for that month (see Figure\
    \ 13-2). Remember that this calendar is displayed in the *surrounding application’s*\
    \ layout, not its own layout. Therefore, if you want to change the styles for\
    \ the calendar, you will need to edit the application’s styles, not the plugin’s\
    \ styles. Of course, you could build into the plugin a layout with its own styles,\
    \ but this could get in the way of another application’s views should you distribute\
    \ the plugin. It’s better to stick to the surrounding application’s layouts and\
    \ style sheets than to force the plugin to look a certain way regardless of its\
    \ parent application.\n\n![Image 43](index-260_1.jpg)\n\n**Figure 13-2.** *The*\
    \ `$calendar->render()` *function at work with the Index action view*\n\n### Building\
    \ the View Action\n\nMost of the work for the View action was done while building\
    \ the Index action. Where this action differs from the Index action is that it\
    \ bases its calendar on passed month and year values. The same process of formatting\
    \ the calendar around the result set from the Calendar Events database occurs\
    \ in the View action as well, so the `$calendar->render()` function is referenced\
    \ all the same. Listing 13-22 contains the View action to be added to the `app/plugins/calendar/controllers/events_controller.php`\
    \ file.\n\n**Listing 13-22.** *The View Action for the Events Controller*\n\n\
    ```\nfunction view($month=null,$year=null) {\n    if (!$month || !$year || !is_numeric($month)\
    \ || !is_numeric($year)) {\n        $month = date('m');\n        $year = date('Y');\n\
    \    }\n    if ($month > 12 || $month < 1) {\n        $month = date('m');\n  \
    \  }\n    $events = Set::extract($this->CalendarEvent->find('all',array(\n   \
    \     'conditions'=>array('MONTH(CalendarEvent.date)'=>$month,'YEAR(CalendarEvent.\n\
    \        date)'=>$year))),'{n}.CalendarEvent');\n    $this->set(compact('events','month','year'));\n\
    }\n```\n\nNotice that line 1 includes passed parameters that will come from the\
    \ URL representing a month and year. Lines 2–5 check to make sure these values\
    \ exist; if not, it defaults to the current month and year. Line 6 makes sure\
    \ that the provided month value is between 1 and 12; if not, it sets `$month`\
    \ to the current month. Line 9 is identical to Listing 13-20’s line 2 except that\
    \ it uses `$month` and `$year` instead of the current month and year. Line 7 also\
    \ differs from Listing 13-20’s line 3 in that it passes along `$month` and `$year`\
    \ to the view.\n\nThe corresponding view will also be similar to the Index view.\
    \ Create the `app/plugins/calendar/views/events/view.ctp` file, and paste Listing\
    \ 13-23. This will complete the plugin and allow the parent application to provide\
    \ calendar views by requesting plugin actions or pointing links to the plugin.\n\
    \n**Listing 13-23.** *The View Action’s View*\n\n```\n<h2><?=date('M',mktime(0,0,0,$month,1,$year)).'\
    \ '.$year;?></h2>\n<?=$calendar->render($events,$month,$year);?>\n```\n\nLaunch\
    \ the View action by providing a month and a year as parameters, and check for\
    \ test events to appear in the correct dates. You should be able to enter any\
    \ integer for the month and year, and the plugin will render a calendar for those\
    \ values (see Figure 13-3).\n\n![Image 44](index-262_1.jpg)\n\n**Figure 13-3.**\
    \ *The Calendar plugin using the View action to render a calendar for January,\
    \ 2025*\n\n### Summary\n\nPlugins are like mini-Cake applications that you can\
    \ bring into any other Cake application. They are useful as third-party resources\
    \ like Pseudocoder’s Ajax Chat plugin but can also help with in-house applications\
    \ that may need to use the same processes in several Cake projects. I explained\
    \ how to build a custom plugin by writing the Calendar plugin, which renders calendars\
    \ for any Cake application based on an events database table. This plugin uses\
    \ controllers, models, views, and helpers to create a simple calendar view and\
    \ can extend other Cake applications to handle calendar processes. The next chapter\
    \ will discuss how to extend one of the most challenging but also efficient aspects\
    \ of web application development: data handling. Using behaviors and DataSources,\
    \ you will be able to connect your Cake applications to new data sources and work\
    \ with data more efficiently.\n\n## CHAPTER 14\n\n# DataSources and Behaviors"
