- fmt: 'It turns out that the `$code` field of the object is private, so you cannot
    perform operations directly with it outside the class code. But you can access
    the field using public methods. In particular, use public methods to read the
    field’s value and assign a value to the field.


    ## Special Methods


    There is a group of methods that solve “special” tasks. The names of those methods
    begin with a double underscore. Let’s explore them next.


    > **Note:** As you might guess, the `__construct()` and `__destruct()` methods
    (the constructor and the destructor) are also special ones.


    Let’s start with the `__toString()` method. That method is called automatically
    every time an object is in the place where a string should be. Examples are when
    the object is concatenated with a string using the dot operator or when the object
    is passed as an argument to the `print()` function or to the `echo` statement.
    Let’s look at the example in Listing [7-8](#613529_1_En_7_Chapter.xhtml#PC19).


    ```php

    <?php

    class MyClass{

    public $name;

    public $code;

    function __construct($name,$code){

    $this->name=$name;

    $this->code=$code;

    }

    // The __toString() method:

    public function __toString(){

    $txt="The fields of the object:\n";

    $txt.="The field \$name = $this->name\n";

    $txt.="The field \$code = $this->code\n";

    return $txt;

    }

    }

    // Creates an object of the class:

    $obj=new MyClass("Object",123);

    // Explicitly calls the method __toString():

    echo "Call the method __toString() explicitly:\n";

    echo $obj->__toString();

    // Implicitly calls the method __toString():

    echo "Call the method __toString() implicitly:\n";

    echo $obj;

    $text=$obj."The program is over";

    print($text);

    ?>

    ```


    The result of the program execution is as follows.


    ```

    The output of the program (from Listing 7-8)

    Call the method __toString() explicitly:

    The fields of the object:

    The field $name = Object

    The field $code = 123

    Call the method __toString() implicitly:

    The fields of the object:

    The field $name = Object

    The field $code = 123

    The fields of the object:

    The field $name = Object

    The field $code = 123

    The program is over

    ```


    The program describes the `MyClass` class, which has two fields (`$name` and `$code`).
    The class also has a constructor with two arguments that define the values of
    the fields. In addition, it describes the `__toString()` method. The method has
    no arguments and returns a string as a result. The string is formed in several
    steps and contains information about the values of the object’s fields.


    Based on the `MyClass` class, you create the `$obj` object. In the `$obj->__toString()`
    statement, the `__toString()` method is called explicitly, like an ordinary method.
    But when the `echo $obj` instruction is executed, the `__toString()` method is
    called automatically from the `$obj` object, and the result of the method replaces
    the reference to that object. The method is also called implicitly when the `$text=$obj."The
    program is over"` command is executed. There, you concatenate the object with
    a string. That operation is performed as follows: the `__toString()` method is
    called from the `$obj` object, and the string result of the method is concatenated
    with the second string operand.


    > **The PHP 8 Standard:** In PHP 8, if the `__toString()` method is declared in
    a class, then that class automatically implements the `Stringable` interface.
    Interfaces are discussed later.


    Let’s explore three more special methods: `__set()`, `__get()`, and `__call()`.
    They are used when referring to members of a class. Namely, the `__call()` method
    is called if a call is made to the non-existing object method.


    **Details**


    If a method is called from an object and the object does not have such a method,
    then the `__call()` method is automatically called from the object. The first
    argument of the `__call()` method is the name of the non-existing method. The
    second argument of the `__call()` method is an array whose elements are the arguments
    passed to the non-existing method.


    Listing [7-9](#613529_1_En_7_Chapter.xhtml#PC21) is an example of using the `__call()`
    method.


    ```php

    <?php

    class MyClass{

    function show($txt){

    echo $txt,"\n";

    }

    function __call($name,$args){

    if(strlen($name)>5){

    echo "The arguments: ",sizeof($args),"\n";

    echo "The $name() method does not exist!\n";

    }else{

    for($k=0;$k<sizeof($args);$k++){

    echo "[",($k+1),"] ",$args[$k],"\n";

    }

    }

    }

    }

    $obj=new MyClass();

    // Calls the existing method:

    $obj->show("The MyClass class");

    // Calls the non-existing methods:

    $obj->display("Alpha");

    $obj->hello("Bravo","Charlie","Delta");

    ?>

    ```


    The following is the result of the program execution.


    ```

    The output of the program (from Listing 7-9)

    The MyClass class

    The arguments: 1

    The display() method does not exist!

    [1] Bravo

    [2] Charlie

    [3] Delta

    ```


    The program uses the `MyClass` class, which describes the ordinary `show()` method
    with one argument. When the method is called, the value of the argument passed
    to the method is displayed. You need that method to show that the presence of
    the `__call()` method does not affect the operation of ordinary methods in a class.


    The special `__call()` method is declared with two arguments. The first argument
    `$name` means the name of the method that is called from the object and which
    the object does not have. The second argument, `$args`, is an array with the arguments
    passed to the non-existing called method.


    You use a conditional statement in the method’s body that tests the `strlen($name)>5`
    condition. The condition is true if the name of the called (non-existing) method
    consists of more than five characters. If so, `echo "The arguments: ",sizeof($args),"\n"`
    displays a message informing about the count of arguments passed to the method.
    `echo "The $name() method does not exist!\n"` displays a message stating that
    the method does not exist.


    If the `strlen($name)>5` condition is false and the name of the called method
    has no more than `5` characters, a loop statement is launched that iterates over
    the elements of the `$args` array (the arguments passed to the non-existing method)
    and displays their values.


    **Details**


    The `sizeof()` function is used to calculate the size of an array. The length
    of a string is calculated using the `strlen()` function.


    Based on the `MyClass` class, create the `$obj` object. If you call the existing
    `show()` method from that object, everything happens as it should, without surprises.


    The `$obj->display("Alpha")` command calls the non-existing `display()` method
    with the `"Alpha"` argument from the `$obj` object. The name of the method consists
    of more than five characters. So, when the `__call()` method is automatically
    called, it displays the message that the method does not exist, and it also contains
    information about the number of arguments passed to the method (in this case,
    there is one argument).


    The other non-existing method is called by the `$obj->hello("Bravo","Charlie","Delta")`
    instruction. The method name is now five characters long, so the automatically
    called `__call()` method displays the list of arguments passed to the method `hello()`.


    The `__set()` and `__get()` methods are automatically called when accessing the
    non-existing fields of an object. In particular, the `__set()` method is called
    if you try to assign a value to the field that does not exist. The arguments of
    the method `__set()` are the name of the field to which the value is assigned
    and the assigned value itself.


    **Details**


    By default, if the non-existing field of an object is assigned a value, then such
    a field is added to the object. If the `__set()` method is defined in the class,
    then when a value is assigned to an inaccessible (non-existing or private) field,
    the `__set()` method is automatically called.'
