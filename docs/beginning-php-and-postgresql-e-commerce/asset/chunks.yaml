    When executing the GetResponse() function to perform an AUTH_ONLY transaction,
    the response will contain a transaction ID. If the authorization is successful,
    we can then use this transaction ID to perform a PRIOR_AUTH_CAPTURE transaction,
    which effectively takes the money from the customer’s account.


    As explained earlier, the response from Authorize.net comes in the form of a string
    that contains values delimited by a configurable character, which in our case
    is the pipe character (|). To read a particular value from the string, we transform
    the string into an array using the explode() PHP function (http://www.php.net/manual/


    en/function.explode.php):


    $auth_only_response = $request->GetResponse();


    $_SESSION[''auth_only_response''] = $auth_only_response;


    **$auth_only_response = explode(''|'', $auth_only_response);** After this piece
    of code executes, $auth_only_response will contain an array whose elements are
    the values that were delimited by the pipe character in the original string. From
    this array, we’re interested in the seventh element, which, according to the Authorize.net
    documentation, is the transaction ID. (Read the Gateway Response API details from
    http://www.authorize.net/support/AIM_guide.pdf for the complete details about
    the Authorize.net response.)


    // Read the transaction ID, which will be necessary for taking the payment $ref_trans_id
    = $auth_only_response[6];


    ■**Note** The $auth_only_response array created by explode() is zero-based, so
    $auth_only_response[6] represents the seventh element of the array.


    The code that takes the money using this transaction ID is straightforward. Because
    the transaction has already been authorized, we only need to specify the transaction
    ID received after authorization to complete the transaction:


    // Capture


