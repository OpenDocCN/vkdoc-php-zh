    If you want to use these and other API’s to fetch data for your web site it’s
    recommended to build a caching system around each API call. This will prevent
    your site from calling the API each time a user accesses your site. First of all
    the data is only updated once an hour or even less often, and secondly it’s always
    faster to fetch content from the local server than it is to run queries over the
    Internet to remote servers.


    The SimpleXML parser used here could be replaced with the DOM parser, but that
    would require more code but at the same time also provide more features. The SimpleXML
    parser is just that: Simple.


    Recipe 14-2\. Generating XML Response


    Problem


    The previous recipe was focusing on parsing XML documents into a structure that
    can be used within PHP and where the elements can be accessed by a known path
    or by iterating over a SimpleXMLElement object. That is useful when the PHP script
    consumes data that’s already in XML format. When the server is generating the
    XML response for other clients to consume we need a set of tools that can convert
    PHP arrays and other values to a XML document.


    Solution


    The SimpleXMLElement class can still be used, but instead of starting with a XML
    document we start with an empty instance of the SimpleXMLElement class. We can
    then use the methods addChild() and addAttribute() to build the XML object and
    finally we can use the method asXML() to convert the object to a XML string.


    How it Works


    This example starts with a list of planets. Each planet has a couple of parameters
    that describe the distance from the sun, the type of planet, number of moons,
    and the average surface temperature.


