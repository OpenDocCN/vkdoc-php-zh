    if (isset ($_GET['ProductID']))\n    $pageContentsCell = 'product.tpl';\n```\n\
    \n**7.** 将以下样式添加到 `hatshop.css` 文件中：\n\n```\n.words\n{\n    color: #ff0000;\n\
    }\n```\n\n**8.** 在你常用的浏览器中加载项目，并输入 `yankee`，以获得类似图 5-3 的输出结果。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00173.png)\n\n648XCH05.qxd 10/31/06 10:04 PM 第 187 页\n\n第 5 章 ■ 搜索目录\n\
    \n**187**\n\n**图 5-3.** *HatShop 搜索结果页示例*\n\n### 工作原理：可搜索的产品目录\n\n恭喜，你现在拥有一个可搜索的产品目录了！虽然编写了不少代码，但代码本身并不复杂，对吧？\n\
    \n因为你大量使用了现有的代码，并在已有的架构基础上添加了部分功能，所以整个过程没有出现意外。产品列表依然由你之前构建的 `products_list` 模板来显示，该模板现已更新，能够识别查询字符串中的搜索元素。在这种情况下，它会使用业务层的\
    \ `Search` 方法获取供访客查看的产品列表。\n\n业务层的 `Search` 方法返回一个 `SearchResults` 对象，该对象除了包含返回的产品列表外，还包含用于搜索的词语列表以及被忽略的词语列表（即长度小于预定义字符数的词语）。这些详细信息会展示给访客。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH05.qxd 10/31/06 10:04\
    \ PM 第 188 页\n\n**188**\n\n第 5 章 ■ 搜索目录\n\n### 总结\n\n在本章中，你利用 PostgreSQL 的全文搜索功能实现了\
    \ HatShop 的搜索功能。该搜索机制与现有的网站结构以及第 4 章中构建的分页功能实现了很好的集成。本章学到的、最有趣的新知识点是关于如何使用 PostgreSQL\
    \ 执行全文搜索。这也是业务层首次拥有独立功能，而不仅仅是简单地在数据层和表示层之间传递数据。\n\n在第 6 章中，你将学习如何使用 PayPal 销售产品。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH06.qxd 10/31/06 10:06\
    \ PM 第 189 页\n\n第 6 章\n\n## 使用 PayPal 收款\n\n让我们开始赚钱吧！你的电子商务网站需要一个向客户收款的方式。对于成熟企业而言，首选的解决方案是开设商户账户，但许多小企业会选择更易于实现的方案，这样他们就不必自己处理信用卡或支付信息。\n\
    \n许多公司和网站可以帮助那些没有资源处理信用卡和电汇交易的个人或小企业。这些公司可以用来作为在线商家与其客户之间的支付中介。许多此类支付处理公司相对较新，处理个人财务信息也非常敏感。此外，快速在互联网上搜索，就会发现几乎所有这类公司都既有满意的客户报告，也有不满意的客户报告。基于这些原因，我们不推荐任何特定的第三方公司。\n\
    \n相反，本章会列出目前提供这些服务的一些公司，然后通过 PayPal 演示它们提供的部分功能。你将学习如何在开发的前两个阶段将 PayPal 集成到 HatShop\
    \ 中。在本章中，你将：\n\n- 学习如何创建一个新的 PayPal 网站支付标准版账户。\n- 学习如何在开发的第 1 阶段集成 PayPal，在此阶段你需要购物车和自定义结账机制。\n\
    - 学习如何在开发的第 2 阶段集成 PayPal，在此阶段你已拥有自己的购物车，因此你需要直接引导访客进入支付页面。\n"
- fmt: '# Understanding Internet Payment Service Providers


    ## Considering Internet Payment Service Providers


    Take a look at this list of Internet Payment Service Provider web sites. This
    is a diverse group, each having its advantages. Some of the providers transfer
    money person to person, and payments need to be verified manually; others offer
    sophisticated integration with your web site.


    Some work anywhere on the globe, whereas others work only for a single country.


    The following list is not complete. You can find many other such companies by
    doing a Google search on “Internet Payment Service Providers.”


    - **2Checkout:** http://www.2checkout.com

    - **AnyPay:** http://www.anypay.com

    - **CCNow:** http://www.ccnow.com

    - **Electronic Transfer:** http://www.electronictransfer.com

    - **Moneybookers:** http://www.moneybookers.com

    - **MultiCards:** http://www.multicards.com

    - **Pay By Web:** http://www.paybyweb.com

    - **Paymate:** https://www.paymate.com.au

    - **PayPal:** http://www.paypal.com

    - **PaySystems:** http://www.paysystems.com

    - **ProPay:** http://www.propay.com

    - **QuickPayPro:** http://www.quickpaypro.com

    - **WorldPay:** http://www.worldpay.com


    Apart from being popular, PayPal offers services that fit very well into our web
    site for the first two stages of development. PayPal is available in a number
    of countries—the most up-to-date list can be found at http://www.paypal.com.


    For the first stage of development (the current stage)—where you only have a searchable
    product catalog—and with only a few lines of HTML code, PayPal enables you to
    add a shopping cart with checkout functionality. For the second stage of development,
    in which you will implement your own shopping cart, PayPal has a feature called
    Single Item Purchases that can be used to send the visitor directly to a payment
    page without the intermediate shopping cart.


    You’ll use this feature of PayPal in Chapter 9.


    For a summary of the features provided by PayPal, point your browser to http://www.paypal.com
    and click the Merchant Tools link. That page contains a few other useful links
    that will show you the main features available from PayPal.


    ## Getting Started with PayPal


    Probably the best description of this service is the one found on its web site:
    “PayPal is an account-based system that lets anyone with an email address securely
    send and receive online payments using their credit card or bank account.”


    Instead of paying the client directly, the visitor pays PayPal using a credit
    card or bank account. The client then uses its PayPal account to get the money
    received from the customers. At the time of writing, no cost is involved in creating
    a new PayPal account, and the service is free for the buyer. The fees involved
    when receiving money are shown at http://www.paypal.com/cgi-bin/webscr?cmd=_display-fees-outside.


    > **Note** This chapter is not a PayPal manual but a quick guide to using PayPal.
    For any complex queries about the services provided, visit PayPal (http://www.paypal.com)
    or the Internet Payment Service Provider you decide to use. Also, you can buy
    components that make it easier to interact with these systems, or use free ones
    such as ComponentOne PayPal eCommerce for ASP.NET by ComponentOne (http://www.componentone.com).


    ### PayPal Links and Resources


    Check out these resources when you need more information than this short chapter
    provides:


    - **Website Payments Standard Integration Guide:** Contains information previously
    contained in separate manuals, such as the Shopping Cart manual and the Instant
    Payments Notification manual. Get it at https://www.paypal.com/en_US/pdf/PP_WebsitePaymentsStandard_IntegrationGuide.pdf.

    - **The PayPal Developer Network:** The official resource for PayPal developers,
    which you can access at https://www.paypal.com/pdn.

    - **PayPalDev:** According to the site, this is an independent forum for PayPal
    developers. Access it at http://www.paypaldev.org/. You’ll also find numerous
    links to various PayPal resources.


    In the following exercise, you’ll create a new PayPal account, and then integrate
    it with HatShop. (The steps to create a PayPal account are also described in more
    detail in the PayPal manuals mentioned earlier.)


    ### Exercise: Creating the PayPal Account


    To create your PayPal account, follow these steps:


    1. Browse to http://www.paypal.com using your favorite web browser.

    2. Click the Sign Up link.

    3. PayPal supports three account types: Personal, Premier, and Business. To receive
    credit card payments, you need to open a Premier or Business account. Choose your
    country from the combo box, and click Continue.

    4. Complete all of the requested information, and you will receive an email asking
    you to revisit the PayPal site to confirm the details you have entered.


    ### How It Works: The PayPal Account


    After the PayPal account is set up, the email address you provided will be your
    PayPal ID.


    A lot of functionality is available within the PayPal service—because the site
    is easy to use and many of the functions are self-explanatory, we won’t describe
    everything here. Remember that these sites are there for your business, so they’re
    more than happy to assist with any of your queries.


    Now let’s see how you can actually use the new account for the web site.


    ## Integrating the PayPal Shopping Cart and Checkout


    In the first stage of development (the current stage), you need to integrate the
    shopping cart and checkout functionality from PayPal. In the second stage of development,
    after you create your own shopping cart, you’ll only need to rely on PayPal’s
    checkout mechanism.


    To accept payments, you need to add two important elements to the user interface
    part of the site: Add to Cart buttons for each product and a View Cart button
    somewhere on the page.


    PayPal makes adding these buttons a piece of cake.


    The functionality of those buttons is performed by secure links to the PayPal
    web site. For example, the following form represents the Add to Cart button for
    a product named “Black Puritan Hat” that costs $74.99:


    ```html

    <form target="paypal" action="https://www.paypal.com/cgi-bin/webscr"

    method="post">

    <input type="hidden" name="cmd" value="_cart" />

    <input type="hidden" name="business" value="youremail@example.com" />

    <input type="hidden" name="item_name" value="Black Puritan Hat" />

    <input type="hidden" name="amount" value="74.99" />

    <input type="hidden" name="currency" value="USD" />

    <input type="hidden" name="add" value="1" />

    <input type="hidden" name="return" value="www.example.com" />

    <input type="hidden" name="cancel_return" value="www.example.com" />

    <input type="submit" name="submit" value="Add to Cart" />

    </form>

    ```


    The fields are predefined, and their names are self-explanatory. The most important
    is `business`, which must be the email address you used when you registered the
    PayPal account (the email address that will receive the money). Consult PayPal’s
    Website Payments Standard Integration Guide for more details.


    > **Tip** Although we won’t use them for our site, it’s good to know that PayPal
    provides button generators based on certain data you provide (product name, product
    price), giving you an HTML code block similar to the one shown previously. Click
    the Developers link at the bottom of the first page, and then click PayPal Solutions
    in the menu on the left to find the button generators.'
