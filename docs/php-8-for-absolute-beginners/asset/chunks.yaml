    # 创建导航项


    本网站将有两个主页面视图：一个用于显示图库，另一个用于显示表单以便用户上传新图片。由于我们知道需要这两个页面视图，我们可以准备一个包含两个导航项的站点导航。让我们在
    `views` 文件夹中创建一个新文件，命名为 `navigation.php`。


    ```

    图库

    上传新图片


    ";

