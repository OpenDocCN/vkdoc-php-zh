- fmt: "`Let’s see how to customize the `Home` controller to display a stream of messages\
    \ from friends, as shown in Listing 17–15.\n\n**Listing 17–15.** Message stream\n\
    \n```\npublic function index()\n{\n    $user = $this->getUser();\n    $view =\
    \ $this->getActionView();\n\n    if ($user)\n    {\n        $friends = Friend::all(array(\n\
    \            \"user = ?\" => $user->id,\n            \"live = ?\" => true,\n \
    \           \"deleted = ?\" => false\n        ), array(\"friend\"));\n\n     \
    \   $ids = array();\n        foreach($friends as $friend)\n        {\n       \
    \     $ids[] = $friend->friend;\n        }\n\n        $messages = Message::all(array(\n\
    \            \"user in ?\" => $ids,\n            \"live = ?\" => true,\n     \
    \       \"deleted = ?\" => false\n        ), array(\n            \"*\",\n    \
    \        \"(SELECT CONCAT(first, \\\" \\\", last) FROM user WHERE user.id = message.user)\"\
    \n            => \"user_name\"\n        ), \"created\", \"asc\");\n\n        $view->set(\"\
    messages\", $messages);\n    }\n}\n```\n\nIn order to get relevant messages, our\
    \ modified `index()` action first needs to get all the linking rows. We then fetch\
    \ all the messages linked to those users, after flattening the friend rows into\
    \ a single-dimensional array of friend IDs. Finally, we assign the messages to\
    \ the action view. The view markup is also quite simple, as you can see in Listing\
    \ 17–16.\n\n**Listing 17–16.** `application/views/home/index.html`\n\n```\n<h1>Home</h1>\n\
    {if isset($messages)}\n{foreach $message in $messages}\n{echo $message->body}<br\
    \ />\n{/foreach}\n{/if}\n```\n\nIt’s good that we have a way for users to see\
    \ their friends’ messages, but we also need to allow them to share their own messages.\
    \ The first step is a new action on the `Messages` controller, as shown in Listing\
    \ 17–17.\n\n**Listing 17–17.** `application/controllers/messages.php`\n\n```\n\
    use Shared\\Controller as Controller;\nuse Framework\\RequestMethods as RequestMethods;\n\
    \nclass Messages extends Controller\n{\n    public function add()\n    {\n   \
    \     $user = $this->getUser();\n\n        if (RequestMethods::post(\"share\"\
    ))\n        {\n            $message = new Message(array(\n                \"body\"\
    \ => RequestMethods::post(\"body\"),\n                \"message\" => RequestMethods::post(\"\
    message\"),\n                \"user\" => $user->id\n            ));\n\n      \
