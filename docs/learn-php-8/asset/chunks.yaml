    # PHP、AJAX 与 CSS——Web 应用程序


    `PHP` 和 `AJAX`（异步 JavaScript 和 XML）能够很好地协同工作。`AJAX` 提供了在不重新加载整个页面的情况下动态更改网页部分内容的能力。大多数网页都有相对于用户交互保持不变的静态区域（菜单、页眉和页脚）。当用户与页面交互（点击按钮）时，这些网页区域无需发生变化。`AJAX`
    可以让您开发一个容器（在以下示例中，容器位于 `div` 标签之间），用于显示托管在 web 服务器上的程序输出，而不会干扰整个网页。这样一来，当用户交互（点击按钮）的结果仍在处理中时，用户就可以先查看网页上的内容（菜单、页眉和页脚）。如果程序因某种原因运行缓慢、挂起或丢失，页面的其余部分仍能正常工作。您在显示某个页面时可能遇到过这种情况：因为要一次性加载大量信息（大量广告）而导致页面挂起，并且页面无法正常运行，因为它必须完全加载后才能使用。


    `AJAX` 还允许您在不对网页造成干扰的情况下，修改 web 服务器上 `PHP` 应用程序的内容。这样您就可以在用户不知情的情况下更新应用程序代码。


    让我们来看一个示例。


    ```

    function getXMLHttp(){

    var xmlHttp;

    try

    {

    xmlHttp = new XMLHttpRequest();

    }

    catch(e)

    {

    // 对于老旧的 Internet Explorer 用户，实现方式与其他浏览器不同

    try

    {

    xmlHttp = new ActiveXObject("Msxml2.XMLHTTP");

    }

    catch(e)

    {

    try

    {

    xmlHttp = new ActiveXObject("Microsoft.XMLHTTP");

    }

    catch(e)

    {

    alert("浏览器版本太老？请立即升级，以便使用 AJAX！")

    return false;

    }

    }

    }

    return xmlHttp;

    }

    function AjaxRequest()

    {

    var xmlHttp = getXMLHttp();

    xmlHttp.onreadystatechange = function()

    {

    if(xmlHttp.readyState == 4)

    {

    HandleResponse(xmlHttp.responseText);

    }

    }

    xmlHttp.open("GET", "myfirstprogram.php", true);

    // 将名称替换为任何 PHP 程序

    xmlHttp.send(null);

    }

    function HandleResponse(response)

    {

    document.getElementById(''AjaxResponse'').innerHTML = response;

    }

    示例 2-1

    AJAX_Example_JavaScript.js

    ```


    > **注意：** 代码示例文件包含在 Apress 网站上。您可以直接复制并使用这些示例，无需任何修改。我们已尽一切努力确保本书中展示的代码是正确的。印刷错误可能会影响所展示的代码（例如大小写被调整，括号被替换为尖括号）。网站上提供的所有代码均功能正常。


    - **JavaScript** — 一种脚本语言，使网页能够实现交互。使用 JavaScript，网页可以对用户在文本框中输入信息和/或点击按钮做出反应。如果您需要复习
    JavaScript 或需要更多示例，请查看 YouTube 上提供的众多免费 JavaScript AJAX 视频。


    如果您不了解 JavaScript，不必过于纠结于该程序的细节。让我们只看几个关键点。`AJAX` 使用 HTTP GET 来请求一个程序，类似于浏览器请求一个页面。在这个示例中，`XMLHttpRequest`
    类（存在于 JavaScript 库中）的一个实例被命名为 `XmlHttp`。然后使用该对象打开对 `myfirstprogram.php` 的请求（就像打开一根管道）。接着，该对象的
    `send` 方法发送请求（将水推入管道）。如果文件内容被正确返回，文件的输出将被放置在 HTML 网页上 ID 为 `AjaxResponse` 的 `div`
    标签之间。如果浏览器无法处理 AJAX 通信，则会显示一个警告框，建议用户升级浏览器。尽管不太可能有人还在使用无法解释 AJAX 代码的浏览器，但您仍然应该处理所有可能性。


    ```

