    \ the number of characters in an array"
  raw: "If the `$dog_app` value  is not passed into the\nclass, the `else`\nstatement\
    \ is executed. It is assumed that the user wants to create a\n`getBreeds`\nobject.\
    \ An instance of the `dog_container` is\ncreated (`$container`) and it\npasses\
    \ the value `selectbox`. (If the\nobject cannot be created, `\"System Error #4\"\
    `\nwill display.) The words “selectbox” are passed into the array `$properties_array`\n\
    (Note: The `array` keyword must be\nused, or we would be creating a property not\
    \ an array.) The container\nobject (`$container`) will then\ncall the `create_object`\n\
    (passing the `$properties_array` to\ncreate an instance of the `getBreeds` class\n\
    (`$lab`). If the\n`getBreeds`\nobject is successfully created (`$lab !=FALSE`),\
    \ we\nthen need to find the location of the `get_breeds.xml` file\n(which contains\
    \ the list of breeds). So, we reset the app property (by\ncalling `set_app`) in\
    \ the\ncontainer to “breeds”. This tells the container program we are a `getBreeds`\
    \ object, not\na `dog` object.\nWe then use the `get_dog_application`\nmethod\
    \  of the\ncontainer to find the location of the breeds XML file.\n*For more information\
    \ on arrays, visit* [*www.php.net/manual/en/function.array.php*](http://www.php.net/manual/en/function.array.php)*.*\n\
    The PHP method `get_class_methods`\n is used to create an array of methods contained\
    \ in `getBreeds`. Since the\n`get_select`\nmethod is the only method (besides\
    \ the constructor), it is also the last\nmethod in the array. Its name is pulled\
    \ from the array and then it is\ncalled using the property `$method_name ($result\
    \ = $dog_data->$method_name($dog_app)`). This allows the `getBreed` class to be\n\
    completely independent of the `dog_interface`. The\ndeveloper can change the name\
    \ of the `get_select` method and\neverything would still work (as long as it is\
    \ the last method in the\nclass). This provides a complete split between the interface\
    \ tier and\nthe business rules tier.\nThe location of the XML file is passed into\
    \ the `get_select` method of\nthe `getBreeds`\nobject (`$lab`),\nwhich uses the\
    \ XML file for the data to create the select list box. The\ncode for the select\
    \ list box is dropped into `$result`. If the code\ndid get dropped into `$result`,\
    \ the code is\ndisplayed (`print $result`) back into the HTML form for the user\
    \ to select a breed.\nIf the file name was not valid, an error message (`print\
    \ \"System Error #3\"`) will display instead of the select box.\n\nThe only other\
    \ changes required are two slight changes to the `lab.html` and `get_breeds.js`\
    \ files.\n\n```\nfunction AjaxRequest($value)\n```\n\nIn the `get_breed.js`\n\
    file , the\nfunction header for the `AjaxRequest` method\nhas been changed to\
    \ pass the actual file being called (this was not a\nrequirement of this design,\
    \ but it allows this file to be used for any\nprogram that is called via AJAX).\n\
    \n```\nxmlHttp.open(\"GET\", $value, true);\n```\n\nIn addition, the `open` statement\
    \ has\nbeen adjusted to use `$value` instead of a\nfile name.\n\nIn the `lab.html`\n\
    program, there are a couple of additional changes.\n\n```\nAjaxRequest('dog_interface.php');\n\
    ```\n\nThe call to the JavaScript function now passes the file name, which has\n\
    also been changed to the `dog_interface.php`\nfile.\n\n```\nFinally, the action\
    \ tag (in both form tag locations) for the HTML\nform has been changed to call\
    \ the `dog_interface.php`\nprogram.\nNotice that, now, whenever we want to use\
    \ the `Dog` application we\ncall the interface first. Then the interface determines\
    \ what we want to\naccomplish (get the breeds select box or process the properties\
    \ for the\ndog you are creating).\nWe must communicate to all of our classes through\
    \ the interface. The\ninterface, in turn, must create any required objects by\
    \ using the\ncontainer (except, of course, for the container itself). This follows\n\
    the concepts of tier design.\nYou will not see any different output than previously\
    \ seen (unless\nyou have some system errors). However, now you can easily change\
    \ file\nnames and locations (via the XML file) in the application without\nchanging\
    \ any program code! In a later chapter we will look at the\nability to preload\
    \ our most used files to improve the efficiently of the\nprogram.\n\nDo It\n\n\
    1.  Download the files for this section from the book’s web site. Change\n   \
    \ the file names for the `get_breeds.xml`\n    file , the `get_breeds.php` file,\n\
    \    and the `dog.php`\n    file. Try to run the program via the `lab.html` file.\
    \ The\n    select box will not display and the program will not run. Now go to\
    \ the\n    `dog_applications.xml`\n    file and change the data in the XML file\
    \ to the new file names you just\n    created. Go back to your `lab.html` file\
    \ (reload\n    it). You should now see the select box. Fill in and select the\n\
    \    information and click the Submit button. The application should now\n   \
    \ work.\n\nChapter Terms\n\nValidate |\n `validator` Method |\n\n| --- | --- |\
    \ --- | --- | --- |\n\nJavaScript Hide/Show |\n HTML `onSubmit` |\n\nForm Validation\
    \ |\n JavaScript Alert Box |\n\nHTML Passing “Form” |\n JavaScript Dot Notation\
    \ |\n\nJavaScript `if`\nStatements |\n JavaScript le`n`gth\nMethod |\n\n`&& AND`\
    \ |\n `&#124;&#124; OR` |\n\nRegular Expression |\n JavaScript `match`\nMethod\
    \ |\n\nFilter/Filtering |\n `isset` |\n\n`$_POST` |\n `str_ireplace` |\n\n`Stripslashes`\
    \ |\n `htmlentities` |\n\n`strip_tags` |\n `$__SERVER` |\n\n`exit` |\n `else`\
    \ |\n\nHTML Select List |\n XML |\n\nXML Data Format |\n XML Parent-Child |\n\n\
    `foreach` Loop |\n HTML Radio Buttons |\n\n`private` Function |\n `stristr` |\n\
    \nDependency Injection |\n `function_exists` |\n\n`break` Statement |\n `method`\
    \ Signature |\n\n`getElementsByTagName` |\n `getAttribute` |\n\n`array` |\n `array\
    \ subscript` |\n\n`get_declared_classes` |\n `Count` |\n\nSize of an Array |\n\
