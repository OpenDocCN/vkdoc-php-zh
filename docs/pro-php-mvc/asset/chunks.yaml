  trans: "\n# 清单 19-13：同步 Apache/PHP 执行\n\n```\necho \"正在打开文件...\";\n\n$contents =\
    \ file_get_contents(\"/路径/到/某个/文件.txt\");\n\necho \"获取内容：\" . $contents;\n```\n\
    \n第一条语句几乎会立即执行。其含义简单明了：输出一个字符串的内容。但第二条语句则稍微复杂一些。它要求服务器打开一个文件，并将文件内容赋值给一个变量。在编程术语中，这被称为*瓶颈*。服务器在定位文件时必须暂停执行，必须先打开文件并读取其内容，之后才能恢复执行。\n\
    \n这会产生两个影响：\n- 第二个 `echo` 语句必须等到第二条语句完成才会执行。\n- 在 PHP/Apache 中，所有代码的执行行为都类似。\n\
    \n现在，让我们考虑一下诸如 JavaScript/Node.JS 这类异步语言/平台。在异步语言/平台中，代码虽然也是以线性方式执行，但执行过程可以被挂起（在状态变化后，稍后再继续执行）。换句话说，服务器会持续执行，直到遇到一个潜在的瓶颈点。它会转而处理其他任务，直到需要返回处理当前的“请求”。请参考清单\
    \ 19-14 所示的例子。\n\n## 清单 19-14：异步 Node.JS/JavaScript 执行\n\n```\nvar fs = require(\"\
    fs\");\n\nconsole.log(\"正在打开文件...\");\n\nfs.readFile(\"/路径/到/某个/文件.txt\", function(error,\
    \ data)\n{\n    if (!error)\n    {\n        console.log(\"获取内容：\" + data);\n \
    \   }\n});\n```\n\n这个例子与上一个例子基本上做的是相同的事情，但有一个主要区别。我们首先输出一个字符串的内容，并请求服务器读取文件的内容。同时，我们还提供了一个函数（或回调），服务器在恢复执行后会执行它。第二个输出语句（`console.log`）仍然需要等待文件读取完成，但服务器在获取文件时并不会暂停执行。这意味着服务器可以继续处理其他请求，直到当前这个请求能够恢复执行（在文件读取完成后）。\n\
    \n**注意**：我特意小心翼翼地不仅指明了语言，还指明了这些语言所运行的“服务器”。这是因为存在其他“服务器”，它们可能会模糊同步/异步之间的界限。例如，有`nginx`（用于\
    \ PHP），甚至有可能创建出阻塞/暂停执行的 JavaScript（至少在客户端是这样）。关键在于理解其中的区别。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第 19 章：扩展\n\n理解这一点对我们有什么帮助？首先，它将有助于解释为什么当 PHP 执行阻塞代码时，事情会卡住。阻塞代码可以是像循环一样简单的事情，也可以是像连接到\
    \ TCP 服务器一样复杂的事情。虽然可以模拟 PHP 代码的异步执行，但它永远是同步的，无论执行速度有多快，或者并行处理多少个请求。\n\n在像 JavaScript\
    \ 这样的语言中，可以通过传递函数（或回调）来克服这个问题，这些函数将在密集操作完成后被执行。PHP 5.3 也支持回调，但考虑到该语言本身并非设计为非阻塞的，因此它们几乎没那么有用。\n\
    \n那么，如果回调对我们来说不是避免阻塞代码的有效方法，我们为什么还要使用它们呢？\n\n剩下的一种用途是观察状态变化，并通知监听器这些事件。你可以想象这会有多么有用。请看清单\
    \ 19-15 中的演示。\n\n## 清单 19-15：监听新状态\n\n```\naddEvent(\"状态.已发生改变\", function($message)\
    \ {\n    echo \"状态变为：\" . $message;\n});\n\nfireEvent(\"状态.已发生改变\", array(\"新状态\"\
    ));\nfireEvent(\"状态.已发生改变\", array(\"另一个新状态\"));\n```\n\n我们正在处理一个大型框架，甚至可能是一个大型应用程序。有些时候，了解状态何时发生变化至关重要，而这正是我们使用观察者模式的绝佳机会。\n\
    \n```\n代码\n```\n"
- fmt: '理解事件的作用只是成功的一半。我们需要构建一个类来管理事件监听器并触发事件。请看清单 19-16 中的这个类。


    **清单 19-16.** `Events`类


    ```php

    namespace Framework

    {


    class Events

    {


    private static $_callbacks = array();


    private function __construct()

    {


    // do nothing


    }


    private function __clone()

    {


    // do nothing


    }


    public static function add($type, $callback)

    {


    if (empty(self::$_callbacks[$type]))


    {


    self::$_callbacks[$type] = array();


    }


    self::$_callbacks[$type][] = $callback;


    }


    public static function fire($type, $parameters = null)

    {


    if (!empty(self::$_callbacks[$type]))


    {


    foreach (self::$_callbacks[$type] as $callback)


    {


    call_user_func_array($callback, $parameters);


    }


    }


    }


    public static function remove($type, $callback)

    {


    if (!empty(self::$_callbacks[$type]))


    {


    foreach (self::$_callbacks[$type] as $i = > $found)


    {


    if ($callback == $found)


    {


    unset(self::$_callbacks[$type][$i]);


    }


    }


    }


    }


    }


    }

    ```


    这个类看起来与`Registry`类非常相似，但将它们分开更好。`add()`方法将提供的`$callback`添加到`$_callbacks`数组中，以便在发生任何`$type`事件时执行它。


    `fire()`方法用于发射/触发一个事件。如果你提供了一个可选的`$parameters`数组，该数组将对所有被执行的回调可用。`remove()`方法只是简单地从`$_callbacks`数组中移除存储的`$callback`。它需要一个对要移除的原始回调的引用。让我们看看如何使用这个新类来监听和触发事件，如清单
    19-17 所示。


    **清单 19-17.** 使用`Events`类


    ```php

    use Framework\Events as Events;


    Events::add("the.state.changed", function($message) {


    echo "state changed to: " . $message;


    });


    Events::fire("the.state.changed", array("new state"));


    Events::fire("the.state.changed", array("another new state"));

    ```


    这与我们之前的例子几乎完全匹配。数组元素的顺序直接映射到回调参数的顺序。如果你提供了四个数组元素，那么回调中就会有四个参数。


    现在我们应该借此机会向我们的框架添加一些事件，以便其他开发者可以为我们的框架类创建监听器。我们将一起创建前两个事件。这些事件将被称为`framework.controller.destruct.before`和`framework.controller.destruct.after`。此方法应尽可能晚地在`__destruct()`方法中触发，其形式如清单
    19-18 所示。


    **清单 19-18.** 修改后的`Controller`类


    ```php

    namespace Framework

    {


    use Framework\Events as Events;


    class Controller extends Base

    {


    /**

    * @read

    */


    protected $_name;


    protected function getName()

    {


    if (empty($this- >_name))

    {


    $this- >_name = get_class($this);


    }


    return $this- >_name;


    }


    public function __destruct()

    {


    Events::fire("framework.controller.destruct.before", array($this- >name));


    $this- >render();


    Events::fire("framework.controller.destruct.after", array($this- >name));


    }


    }


    }

    ```


    新事件将在模板渲染前后被触发，并且回调将获得当前控制器的名称。如果没有监听器等待此事件，则不会发生任何事情（也不会产生错误消息）。


    我们还应该看到一个有用的方式，其中一个新事件可以帮到我们。如果你回想一下我们创建的`Shared\Controller`类（在第 15 章中），你可能记得我们连接到了数据库，但从未断开连接。我们实际上在每个请求上都打开了一个数据库连接，但从未关闭任何连接。通过在模板渲染后关闭连接，可以提高效率，如清单
    19-19 所示。


    **清单 19-19.** 修改后的`Shared\Controller`类


    ```php

    namespace Shared

    {


    use Framework\Events as Events;


    use Framework\Registry as Registry;

    ```'
