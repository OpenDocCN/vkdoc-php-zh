    CHAPTER 8 ■ TEmPlATEs


    The code in Listing 8-4 shows what is called a grammar/language map. It is a list
    of language tags for our template dialect, so that the parser can know what the
    different types of template tags are, and how to parse them. We can see that our
    default template dialect only has three types of tags: print, script and statement.


    Print tags are the most basic tags in our parser; they are simply used to add
    variable data to the output of the template parser. You can think of them like
    PHP echo statements.


    Script tags are used to execute arbitrary PHP scripts. While the use of these
    tags is not ideal, they are there for any instances where you need to execute
    PHP scripts inline. You can think of them like the opening and closing < ?php
    ... ? > tags.


    Statement tags are used for all the control structures we want our templates to
    support. They include a variety of subtypes, such as if, foreach, and else. They
    also include macro (or function) and literal (cdata-esque) statement subtypes.


    Each tag has an opener and closer string, which tells the parser how it should
    treat the beginning and end of each segment. Each tag (and subtype) has handler
    string, which tells the parser which internal function to call when it needs to
    evaluate the corresponding tag (or subtype).'
