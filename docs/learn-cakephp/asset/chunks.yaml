    `$records` 数组包含一条样本记录，但你可以根据需要添加任意多条。使用这种方法，你可以在应用程序数据库中还没有任何数据之前——甚至在你完全没有数据库之前——就开始编写单元测试。这在开发的早期阶段测试数据库结构变更时非常有用。


