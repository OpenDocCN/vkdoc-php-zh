    \ 64 位和 32 位版本的 PHP 之间使用序列化数据可能导致溢出，因为整数在 64 位版本中可以存储更大的值。\n\n序列化数据可以写入数据库或文件，并在之后检索出来。\n\
    \n```php\n<?php\n\n// 4_30.php\n\n$a = array(\n\n'apple',\n\n'orange',\n\n'banana',\n\
    \n'animal' => 'horse',\n\n'vechicle' => 'truck'\n\n);\n\nfile_put_contents('serialize.dat',\
    \ serialize($a));\n```\n\n在这个例子中，我们将序列化数组写入一个名为`serialize.dat`的文件。在接下来的例子中，读取该文件，进行反序列化，并使用`print_r()`函数打印结果。\n\
    \n```php\n<?php\n\n// 4_31.php\n\n$a = unserialize(file_get_contents('serialize.dat'));\n\
    \nprint_r($a);\n```\n\n输出如下所示：\n\n```\nArray\n(\n    [0] => apple\n    [1] =>\
    \ orange\n    [2] => banana\n    [animal] => horse\n    [vechicle] => truck\n\
    )\n```\n\n## 第五章 日期和时间\n\nPHP 没有专门用于存储日期或时间值的变量类型。相反，使用整数来表示自 1970 年 1 月 1 日（也称为纪元）之前或之后的秒数。当日期和时间被视为单个值时，它们被称为时间戳。使用整数可以轻松计算两个时间戳之间的差异，因为可以应用普通数学运算。\n\
    \n### 配方 5-1：处理时区\n\n#### 问题\n\nPHP 中所有的日期和时间函数都假设时间戳是协调世界时（UTC）。\n\n有必要配置 PHP\
    \ 使用特定的时区，以转换所有日期值的输入和输出，使它们按正确顺序显示。\n\n#### 解决方案\n\nPHP 可以通过`php.ini`文件中的设置进行配置。该设置名为`date.timezone`，允许的值包括诸如`CET`（中欧时间）和`PST`（太平洋标准时间）等名称。此外，您还可以按区域和城市进行配置，例如`America/Los_Angeles`或`Europe/Amsterdam`。有关支持时区的完整列表，请参阅\
    \ [`php.net/manual/en/timezones.php`](http://php.net/manual/en/timezones.php)。\n\
    \n当网站用户都是本地用户且共享同一时区时，为 Web 服务器配置单个时区效果很好。如果用户来自不同的时区，则有必要能够为每个用户定义时区。这可以通过定义一个偏好设置来实现，用户可以在其中选择时区，并在使用任何日期函数之前使用`date_default_timezone_set()`函数设置当前时区。匿名用户没有定义的偏好，他们将看到的所有日期/时间值都假定为服务器定义的时区。\n\
    \n如果在调用日期/时间函数时未定义时区，系统将打印警告并回退到 UTC 时区。\n\n```\nWarning: date(): It is not safe\
    \ to rely on the system's time zone settings. You are\n*required* to use the date.timezone\
    \ setting or the date_default_timezone_set() function.\n```\n"
- fmt: '# In case you used any of those methods and you are still getting this warning,
    you most likely misspelled the time zone identifier. We selected the time zone
    `''UTC''` for now, but please set `date.timezone` to select your time zone.


    © Frank M. Kromann 2016


    F.M. Kromann, *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_5


    # CHAPTER 5 ■ DATES AND TIMES


    In older versions of PHP the warnings might vary or no warning is given at all.
    Anyone using versions older than PHP 5.3 is strongly encouraged to upgrade for
    both security and performance reasons and to get the benefit of all the new functionality.


    ## How it Works


    The easy way to ensure a time zone is configured is by setting the `date.timezone`
    value in `php.ini`.


    Remember to restart the web server when you make changes to `php.ini`. Setting
    the time zone programmatically makes it possible to overwrite the value in `php.ini`
    when needed.


    ```php

    <?php


    // 5_1.php


    $ts = time();


    echo date("Y m d H:i:s", $ts) . "\n";


    date_default_timezone_set("UTC");


    echo date("Y m d H:i:s", $ts) . "\n";

    ```


    With `date.timezone` defined to `America/Los_Angeles` this code will produce output
    that looks like this: `2015 03 25 11:36:12`


    `2015 03 25 18:36:12`


    If the output is shown in a browser the whitespace generated by `"\n"` is not
    shown as a line break. Either use HTML (`<br/>`) or add a header to set the content
    type to `text/plain`.


    The time difference shows as 7 hours although the normal difference between UTC
    time and the time in Los Angeles is 8 hours. This is caused by daylight savings
    time in Los Angeles. Daylight savings time never applies to UTC.


    In the example above the `date` function is passed two variables. The first one
    is the format string and the second is a timestamp. The second parameter is optional
    and if it’s not passed the `date` function will use the current time when generating
    the string.


    ## Recipe 5-2. Creating a Timestamp


    ### Problem


    Timestamps are useful when ordering data. They do not have the sorting problems
    as date time strings do where the ordering depends on the format of the string.
    In Europe the dates are typically formatted as day, month, and year; and in the
    United States it’s common to use month, day, and year. An easy is to use a format
    of year, month, and day. This will provide a way to sort correctly by date but
    that does not present well.


    ### Solution


    There are a number of ways to create a timestamp in PHP. The simplest way is to
    use the `time()` function to return the timestamp for the current date and time.
    If you need to get a timestamp for a specific date and time you can use the `mktime()`
    function. This function takes a number of parameters. All the parameters are optional
    and can be left out from the right. Any parameter that is left out will be set
    to the current value based on the system time and the selected time zone. The
    parameters are Hour, Minute, Second, Month, Day, Year, and Is DST, which indicates
    whether or not daylight savings time should be taken into account.


    ### How it Works


    Having the date and time split up into individual parts is not always practical
    so for those instances there are a couple of functions that can help. The function
    `strtotime()` creates a timestamp based on parsing of a string. The function works
    without a specific format. This makes it difficult to interpret `03 01 2015` as
    it can mean both March 1st and January 3rd depending on where in the world you
    are. The `strtotime()` function also allows more creative strings to be passed
    in like `"+1 month"`, which will take the current day and time and add 1 month,
    or `"January 5th 2015 + 15 weeks"`, or `"first Monday of April 2016"`.


    In the next example we look at the various ways of creating timestamps.


    ```php

    <?php


    // 5_2.PHP


    // Get timestamp for current day and time

    $ts = time();

    echo $ts . "\n";

    echo date("M j Y H:i:s", $ts) . "\n";


    // Get timestamp for March 1st 2015 at 00:00:00

    $ts = mktime(0, 0, 0, 3, 1, 2015);

    echo $ts . "\n";

    echo date("M j Y H:i:s", $ts) . "\n";


    // Use strtotime() to get a timestamp for a specific day time

    $ts = strtotime("first Monday of April 2016");

    echo $ts . "\n";

    echo date("M j Y H:i:s", $ts) . "\n";

    ```


    In these three examples the time portion is defaulting to `00:00:00` for the last
    two dates. This is because no time value is specified as part of the string. The
    sample first prints the integer value of each timestamp and then converts it back
    to a string value with the `date()` function.


    `Mar 25 2015 14:06:40`


    `Mar 1 2015 00:00:00`


    `Apr 4 2016 00:00:00`


    Although Epoc is set to start on January 1st, 1970, it is still possible to use
    timestamps that represent dates before that. This is done with the use of negative
    values for the timestamp. On older versions of PHP for Windows this was not possible.
    It was fixed in PHP 5.1.


    On a 32-bit system the range of the timestamp goes from `-2147483648` to `2147483647`
    these values correspond to the dates `1901/12/13 20:45:51` and `2038/01/19 03:14:08`.
    On a 64-bit system the corresponding values are `-292277022657/01/27 08:29:52`
    and `292277026596/12/04 03:30:07`.


    ## Recipe 5-3. Working with Dates


    ### Problem


    Using timestamps to store date values can cause some undesired results when the
    data is used across multiple time zones.


    This happens for birthdays and other dates like that. If you create a web site
    where users from all over the world can enter their birthdate and you store that
    as an integer timestamp and then use the `date()` function with a different user’s
    time zone, you might get wrong dates.


    ### Solution


    There are two special versions of `mktime()` and `date()` that ignore the time
    zone and always operates on UTC values. These are called `gmmktime()` and `gmdate()`.
    These are convenient when you want to store date values as timestamps.


    ### How it Works


    In this example we have a user who enters his birthday as October 10th, 1980,
    using the time zone of `Europe/Copenhagen`. A second user looks at the birthday
    from the `America/Los_Angeles` time zone.


    ```php

    <?php


    // 5_3.php


    // User 1 born on October 10th 1980 in Copenhagen Denmark

    date_default_timezone_set("Europe/Copenhagen");

    $dob = mktime(0, 0, 0, 10, 10, 1980);


    // User 2 looks at the birthday from Los Angeles

    date_default_timezone_set("America/Los_Angeles");

    echo date("M j Y", $dob). "\n";

    ```


    It now looks like the birthday is on October 9th. If we replace the `date()` and
    `mktime()` functions with the `gmdate()` and `gmmktime()` this problem will go
    away.


    ```php

    <?php


    // 5_4.php


    // User 1 born on October 10th 1980 in Copenhagen Denmark

    date_default_timezone_set("Europe/Copenhagen");

    $dob = gmmktime(0, 0, 0, 10, 10, 1980);


    // User 2 looks at the birthday from Los Angeles

    date_default_timezone_set("America/Los_Angeles");

    echo gmdate("M j Y", $dob). "\n";

    ```


    Not all months include the same number of data and PHP provides a quick way to
    verify if the combination of day, month, and year corresponds to a valid date.
    This function is called `checkdata()` and it takes three parameters: month, day,
    and year. The function returns `true` if the parameters correspond to a valid
    date and returns `false` otherwise.


    ## Recipe 5-4. Displaying Timestamps


    ### Problem


    Dates and times are used in many different ways around the world. Using an integer
    to represent a UNIX timestamp for any date, time, or date/time value makes it
    easy to sort and calculate date and time differences but they are not very practical
    for showing actual dates.


    ### Solution


    The `date()` functions is used to convert a UNIX timestamp into a readable sting
    format based an a formatting string with a long range of options. In addition
    to the `date()` function that uses English names for months and weekdays the function
    `strftime()` provides the same functionality but uses the settings for `setlocale()`
    to provide names, and the formatting strings are slightly different than the values
    used for the `date()` function.


    ### How it Works'
