  \n从下一章开始，您将通过开发专业的订单处理管道，进一步扩展客户订购系统。\n\n## 第十三章\n\n实现订单管道：第一部分\n\n您的电子商务应用程序正逐步完善。已添加客户账户功能，并正在跟踪客户地址和信用卡信息——这些信息已安全存储。然而，目前您并未使用这些信息，而是将处理责任委托给\
  \ PayPal。\n\n在本章及下一章中，您将构建自己的订单处理管道，处理信用卡授权、库存检查、配送、邮件通知等事务。我们将把信用卡处理的具体细节留到第 15\
  \ 章讨论，但本章将展示此流程在整个架构中的位置。\n\n对于电子商务网站而言，订单管道功能是一项极其有用的能力。订单管道功能让您能够跟踪订单在流程每个阶段的状态，并提供审计信息，以便后续参考或在订单处理出现问题时进行追溯。所有这些操作都无需依赖第三方会计系统，这也有助于降低成本。本章第一部分将讨论什么是订单管道，以及适用于\
  \ HatShop 应用的具体细节。\n\n本章主体部分将构建订单管道系统，这还需要对当前工作方式进行少量修改，并对正在使用的数据库进行一些补充。然而，本章中的代码并不比您已经使用的代码复杂多少。真正的挑战在于系统的设计。\n\
  \n\n\n# 什么是订单管道？\n\n任何商业交易，无论是在街边商店、互联网上还是其他任何场所，都需要完成多个相关任务才能被视为完结。\n\n例如，你不能简单地从时装精品店拿走一件衣服（不付钱）就说你已经买下了它——付款是任何购买行为中不可或缺的一部分。此外，只有当执行的每个任务都成功完成时，交易才算成功。例如，如果客户的信用卡被拒绝，那么就无法从其卡中扣款，因此购买也无法完成。\n\
  \n交易中的任务序列通常被视为一个管道。在这个比喻中，订单从管道的一端进入，完成时从另一端出来。在此过程中，它们必须通过几个管道段，每个管道段负责一个特定任务或一组相关任务。如果任何一个管道段未能完成，订单就会“卡住”，可能需要外部干预才能继续在管道中前进，或者可能会被完全取消。\n\
  \n例如，图 13-1 所示的简单管道适用于实体店的交易。\n\n**图 13-1.** *实体店的交易流程*\n\n最后一个管道段可能是可选的，可能涉及诸如礼品包装等额外任务。支付阶段也可能采用多种操作方式之一，因为客户可以使用现金、信用卡、礼品券等方式付款。\n\
  \n当你考虑电子商务购买时，管道会变得更长，但实际上并不会更复杂。\n\n## 设计订单管道\n\n在 HatShop 电子商务应用中，管道将如图 13-2 所示。\n\
  \n**图 13-2.** *HatShop 订单管道*\n\n这些管道段执行的任务如下：\n\n- **客户通知：** 向客户发送一封电子邮件通知，说明订单处理已开始，并确认要发送的商品和收货地址。\n\
  - **信用卡授权：** 检查用于购买的信用卡，并预留订单总金额（但此阶段不进行实际扣款）。\n- **库存检查：** 向供应商发送一封电子邮件，列出已订购的商品。当供应商确认有货时，处理继续。\n\
  - **支付：** 使用之前预留的资金完成信用卡交易。\n- **发货：** 向供应商发送一封电子邮件，确认已收取订购商品的款项。当供应商确认货物已发出时，处理继续。\n\
  - **客户通知：** 发送一封电子邮件通知客户订单已发货，并感谢客户使用 HatShop 网站。\n\n> **注意：** 在实现方面，正如你稍后将看到的，实际阶段比这更多，因为库存检查和发货阶段实际上由两个管道段组成——一个用于发送电子邮件，另一个用于等待确认。\n\
  \n随着订单流经该管道，条目会被添加到一个名为 `audit` 的新数据库表中。可以检查这些条目以了解订单发生了什么情况，并且在出现问题时，它们是识别问题的绝佳方式。`orders`\
  \ 表中的每个条目也会被标记一个状态，以标识它已到达管道的哪个点。\n\n为了处理管道，你将创建代表每个阶段的类。这些类执行所需的处理，然后修改 `orders`\
  \ 表中订单的状态以推动订单前进。你还需要一个协调类（或处理器），它可以在任何订单上被调用，并执行相应的管道阶段类。该处理器在订单下达时调用一次，在正常操作中还会再调用两次——一次用于库存确认，一次用于发货确认。\n\
  \n为了简化工作，你还需要定义一个所有管道阶段类都支持的公共接口。这使得订单处理器类能够以标准方式访问每个阶段。\n\n你还将在订单处理器类中定义几个实用函数，并公开几个公共属性，这些属性将由管道阶段根据需求使用。例如，订单\
  \ ID 应可被所有管道阶段访问，因此为了减少代码重复，你将把这些信息放在订单处理器类中。\n\n现在，让我们进入具体细节。你将在 `business` 文件夹中创建多个文件，其中包含所有新类，并将从\
  \ HatShop 中引用它们。你要创建的新文件如下：\n\n- `OrderProcessor`：用于处理订单的主类。\n- `IPipelineSection`：管道段的接口定义。\n\
  - `PsInitialNotification`、`PsCheckFunds`、`PsCheckStock`、`PsStockOk`、`PsTakePayment`、`PsShipGoods`、`PsShipOk`、`PsFinalNotification`：管道段类。我们将在第\
  \ 14 章中创建这些类；这里我们将使用一个虚拟类（`PsDummy`）代替。\n\n由订单处理器协调的订单在管道中的进度与之前展示的管道相关（见图 13-3）。\n\
  \n**图 13-3.** *管道处理流程*\n\n此图表显示的过程分为三个部分：\n\n- 客户下达订单。\n- 供应商确认库存。\n- 供应商确认发货。\n\
  \n第一阶段如下：\n\n1. 当客户确认订单时，`presentation/smarty_plugins/function.load_checkout_info.php`\
  \ 在数据库中创建订单并调用 `OrderProcessor` 开始订单处理。\n2. `OrderProcessor` 检测到订单为新建状态，并调用 `PsInitialNotification`。\n\
  3. `PsInitialNotification` 向客户发送一封确认订单的电子邮件，并推进订单阶段。它还指示 `OrderProcessor` 继续处理。\n\
  4. `OrderProcessor` 检测到新的订单状态，并调用 `PsCheckFunds`。\n\n\n\n# 订单处理管道实现\n\n**5.** `PsCheckFunds`\
  \ 检查客户信用卡上是否有可用资金，如果资金可用，则存储完成交易所需的详细信息。若此步骤成功，订单阶段前进，并通知 `OrderProcessor` 继续处理。\n\
  \n**6.** `OrderProcessor` 检测到新的订单状态并调用 `PsCheckStock`。\n\n**7.** `PsCheckStock`\
  \ 向供应商发送电子邮件，列出所订购的商品，指示供应商通过管理部分的 `ORDERS ADMIN` 进行确认，并推进订单状态。\n\n**8.** `OrderProcessor`\
  \ 终止。\n\n第二阶段如下：\n\n**1.** 当供应商登录到订单管理页面确认库存可用时，`presentation/smarty_plugins/function.load_admin_order_details.php`\
  \ 调用 `OrderProcessor` 继续订单处理。\n\n**2.** `OrderProcessor` 检测到新的订单状态并调用 `PsStockOk`。\n\
  \n**3.** `PsStockOk` 推进订单状态并通知 `OrderProcessor` 继续处理。\n\n**4.** `OrderProcessor`\
  \ 检测到新的订单状态并调用 `PsTakePayment`。\n\n**5.** `PsTakePayment` 使用之前由 `PsCheckFunds` 存储的交易详细信息完成交易，然后推进订单状态，并通知\
  \ `OrderProcessor` 继续处理。\n\n**6.** `OrderProcessor` 检测到新的订单状态并调用 `PsShipGoods`。\n\
  \n**7.** `PsShipGoods` 向供应商发送电子邮件，确认所订购的商品，指示供应商将这些商品发货给客户，并推进订单状态。\n\n**8.** `OrderProcessor`\
  \ 终止。\n\n第三阶段如下：\n\n**1.** 当供应商确认货物已发货时，`presentation/smarty_plugins/function.load_admin_order_details.php`\
  \ 调用 `OrderProcessor` 继续订单处理。\n\n**2.** `OrderProcessor` 检测到新的订单状态并调用 `PsShipOk`。\n\
  \n**3.** `PsShipOk` 将发货日期录入数据库，推进订单状态，并通知 `OrderProcessor` 继续处理。\n\n**4.** `OrderProcessor`\
  \ 检测到新的订单状态并调用 `PsFinalNotification`。\n\n**5.** `PsFinalNotification` 向客户发送电子邮件确认订单已发货，并推进订单阶段。\n\
  \n**6.** `OrderProcessor` 终止。\n\n如果在管道处理的任何环节出现问题（例如信用卡被拒绝），则会向管理员发送电子邮件。管理员随后拥有所有必要的信息来检查发生了什么，与相关客户联系，并在必要时取消或替换订单。\n\
  \n这一过程中的任何环节都不特别复杂；只是需要大量代码来实现这一切！\n\n## 准备工作\n\n在开始构建上述组件之前，您需要对 `HatShop` 数据库和\
  \ Web 应用程序进行一些修改。\n\n在订单处理过程中，管道最重要的功能之一是维护最新的审计跟踪。该审计跟踪的实现涉及向名为 `audit` 的新数据库表中添加记录。我们将在以下练习中添加\
  \ `audit` 表。\n\n要实现刚才描述的功能，您还需要向 `hatshop` 数据库中添加一个名为 `orders_create_audit` 的新函数。`orders_create_audit`\
  \ 函数向 `audit` 表中添加一条条目。\n\n我们还将创建 `OrderProcessor` 类（负责将订单移过管道的类），该类包含大量代码。但是，您可以简单开始，并根据需要逐步构建附加功能。首先，您将创建一个具有以下功能的\
  \ `OrderProcessor` 类版本：\n\n- 动态选择支持 `IPipelineSection` 接口的管道部分\n- 添加基本的审计数据\n- 提供对当前订单详细信息的访问\n\
  - 提供对当前订单客户的访问\n- 提供对管理员邮件的访问\n- 在出错时向管理员发送邮件\n\n\n\n你将创建一个名为`PsDummy`的单一管道部分，它将使用其中的一些功能。\n\
  \n`PsDummy`在本书本章的代码中用于替代实际的管道部分类，你将在下一章中实现这些类。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
