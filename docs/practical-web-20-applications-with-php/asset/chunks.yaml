    Now that we’ve created the users table, we have something to authenticate against
    using Zend_Auth. Before we get to that, though, we must understand exactly how
    Zend_Auth works.


    First, we must understand the terminology Zend_Auth uses. The unique information
    that identifies a user is referred to as their *identity*. After a user successfully
    authenticates, we store their identity in a PHP session so we can identify them
    in subsequent page requests.


