    \ interfaces, and data storage. The application design\n    must be three-tier\
    \ (interface, business rules, and data). Your final\n    design should look similar\
    \ to the examples shown in this chapter.\n\n3. The Basics: PHP 8 Syntax\n\n*Yes,\
    \ I am a terrible coder, but I am probably still better than\nyou :)*\n\n—Rasmus\
    \ Lerdorf\n\nChapter Objectives/Student Learning Outcomes\n\nAfter completing\
    \ this chapter, the student will be able to\n\n*   Create a simple, error-free\
    \ PHP program\n\n*   Understand the use and value of conditional statements\n\n\
    *   Understand the use and value of for, while, and foreach\n    loops\n\n*  \
    \ Understand the use and value of functions\n\n*   Understand the use and value\
    \ of arrays\n\nThe Basic Syntax\n\nIn the next chapter, we will begin exploring\
    \ modular programming.\nHowever, before we start that discussion, let us do a\
    \ quick review of\nsome of the basic components of the PHP language. Our goal\
    \ is not to\nteach you every structure used in PHP. The goal is to give you enough\n\
    knowledge to begin PHP programming. We will add additional PHP abilities\nin the\
    \ remaining chapters. If you find difficulty with any of the\nfollowing topics,\
    \ you may want to review many of the free tutorials on the web,\nincluding [`www.w3schools.com/php/default.asp`](http://www.w3schools.com/php/default.asp).\n\
    \n```\n\nAs stated earlier, all PHP code must be placed between the <?php and\n\
    ?> tags. The web\nserver first looks at the file ending (.php) for an indication\
    \ of the\nexistence of php code. Once it determines its existence, it uses the\n\
    tags to point the location of the code.\n\n```\n I love Green Tomatoes\n\nMy partner\
    \ hates Green Tomatoes\n\n```\n\nOutside of the tags, a PHP file can contain HTML,\
    \ CSS, and/or\nJavaScript code. As shown earlier, php code can be scattered into\n\
    different areas of the file (web page) by simply using the opening and\nclosing\
    \ tags. However, each time this occurs, it requires sending the\ncode to the PHP\
    \ interpreter for processing. So, do not get too carried\naway with the thrill\
    \ of doing so.\n\n**Comments**\n can be created using // (as shown previously).\
    \ Comments are not\nexecuted. However, they are very important. Good programming\
    \ provides\ncomments so others can understand any complicated code. Gone are the\n\
    days in which only one person maintains a program. Anyone that supports\ncode\
    \ you created will really appreciate the effort you put forth in\nproviding comments.\n\
    \n```\n\nMany organizations keep track of change management within the program\
    \ by\nproviding details on who created the program, when it was created, and\n\
    any changes that have occurred. Comments can also provide a list of the\ninputs\
    \ and outputs of the program and a description of the program\nitself. Additionally,\
    \ similar descriptions are provided for functions\n(methods or procedures) which\
    \ have been created within the program.\n\n```\nAll executable code must include\
    \ a semicolon at the end of the\nstatement. As a standard, adopt the policy that\
    \ any **text strings**\n (such as Hello World earlier) should be included in double\
    \ (“”)\nquotes. PHP does allow some exceptions to the rule (such as using single\n\
    quotes in some instances), but you will seldom run into a problem if you\nare\
    \ consistent in providing them.\n\nPHP provides a large amount of **functions**\n\
    \ (blocks of code) available to the programmer. The functions\ncontain well-tested\
    \ efficient code. Whenever possible, a smart\nprogrammer will use existing functions\
    \ to save time and to reduce\nprogramming errors. All PHP functions should begin\
    \ with a lowercase\nletter (as in the function print). In the following example,\
    \ the string\n“Hello World” is passed into a function named “myFunction”. We will\n\
    explore a lot of **PHP functions** throughout this book.\nLater in this chapter,\
    \ we will see additional examples on how a\nprogrammer can create their own functions."
  trans: "\n1.  项目可行性评估\n\n2.  代码创建与错误修正\n\n3.  项目逻辑数据流确定\n\n4.  对已实现应用进行重新评估以寻找可能的改进方案\n\
    \n11. 为什么必须验证你的代码？\n\n1.  确定你所用浏览器的功能\n2.  确保你的信息正确且安全\n3.  确保你的代码仅包含 JavaScript\
    \ 和 HTML5\n4.  检查你的浏览器能否运行你的代码\n\n12. 引用外部层叠样式表的正确 HTML 语法是什么？\n\n1.  `<stylesheet>my_style_sheet.css</stylesheet>`\n\
    2.  `<link rel=\"stylesheet\" type=\"text/css\" href=\"my_style_sheet.css\">`\n\
    3.  `<style src=\"my_style_sheet.css\">`\n4.  以上都不是\n\n13. 哪个层次用于存储和检索数据？\n\n\
    1.  表示层\n2.  数据层\n3.  应用层\n4.  以上都不是\n\n14. SQL 代表什么？\n\n1.  结构化提问语言\n2.  结构化查询语言\n\
    3.  强提问语言\n\n15. 数据集类似于\n\n1.  一段数据\n2.  两个单词的组合\n3.  表格或电子表格\n4.  以上都不是\n\n**判断对错**\n\
    \n1.  WSDL 代表 Web 服务描述语言。\n2.  AJAX 用于创建更具交互性的应用。\n3.  AJAX 能够在无需重新加载整个页面的情况下动态更改网页的某些部分。\n\
    4.  使用 HTTP GET 函数时，URL 必须放在引号内。\n5.  服务是由 Web 服务器提供的一种功能。\n6.  设计步骤是在分析步骤成功完成后进行的。\n\
    7.  MVC（模型-视图-控制器）是一种软件工程师（包括 PHP 应用设计师）使用的设计模式，通过控制器在视图和模型之间进行通信。\n8.  规划和信息收集是\
    \ PDLC 的一部分。\n9.  依赖注入允许程序客户端输入一段代码，以了解它将使用的代码块的实现方式。\n10. 对象是已经编译好、供应用程序内部使用的代码块。\n\
    11. HTML 代表超文本标记语言。\n12. 方法签名包括方法名称以及其参数的数量、类型和顺序。\n13. 数据集不是在三层架构中各层之间发送数据时使用的多种格式之一。\n\
    \n**简答/论述题**\n\n1.  请用自己的语言简要描述 PDLC 中的每个步骤。\n2.  你认为为什么使用 PHP 开发 PC 应用程序的情况有所减少？\n\
    3.  创建使用 AJAX 的网页有哪些优势？\n\n**项目实践**\n\n1.  使用本章所演示的 PDLC 步骤，为智能手机和移动设备应用设计逻辑，该应用允许水表抄表员输入完整地址和水表读数。该应用应验证信息，并将有效信息发送到\
    \ MySQL 数据库。如果信息无效，则应向用户显示一条消息，指出问题所在。\n2.  调整本章中的 AJAX 示例（代码可在本书网站上获取），以显示一份迷你版的个人简历。\n\
    3.  调整 `Hello World`（示例 `[2-6]`，`callmyself.php`）程序，以显示你所在学院或大学的名称、地址和主要电话号码。\n\
    \n**期末项目**\n\n1.  利用你在第 `[1]` 章期末项目任务中确定的信息，以及本章展示的设计技术，为 ABC 计算机配件库存管理系统开发一个逻辑设计。该设计应包含所有可能的程序、接口和数据存储。应用设计必须是三层架构（接口层、业务逻辑层和数据层）。你的最终设计应类似于本章中展示的示例。\n\
    \n## 3. 基础篇：PHP 8 语法\n\n*是的，我是一个糟糕的程序员，但可能仍然比你好 ：)*\n——拉斯马斯·勒德尔夫\n\n**章节目标/学生学习成果**\n\
    \n完成本章学习后，学生将能够：\n\n*   创建简单、无错误的 PHP 程序\n*   理解条件语句的用途和价值\n*   理解 for、while 和\
    \ foreach 循环的用途和价值\n*   理解函数的用途和价值\n*   理解数组的用途和价值\n\n**基本语法**\n\n在下一章中，我们将开始探索模块化编程。然而，在开始讨论之前，让我们快速回顾一下\
    \ PHP 语言的一些基本组成部分。我们的目标并非教会你 PHP 中使用的每一种结构，而是为你提供足够的知识来开始 PHP 编程。在后续章节中，我们还会增加更多的\
    \ PHP 技能。如果你在以下任何一个主题上遇到困难，你可能需要回顾一下网络上的许多免费教程，包括 [`www.w3schools.com/php/default.asp`](http://www.w3schools.com/php/default.asp)。\n\
    \n```\n如前所述，所有 PHP 代码都必须放在 <?php 和 ?> 标签之间。Web 服务器首先会查看文件扩展名 (.php) 以判断是否包含 PHP\
    \ 代码。一旦确认存在，它就会利用这些标签来定位代码的位置。\n```\n\n```\n 我热爱绿番茄\n\n我的搭档讨厌绿番茄\n```\n\n在标签外部，PHP\
    \ 文件可以包含 HTML、CSS 和/或 JavaScript 代码。如前所述，只需使用开始和结束标签，就可以将 PHP 代码分散到文件（网页）的不同区域。然而，每次这样做都需要将代码发送给\
    \ PHP 解释器进行处理。所以，不要过于沉迷于这样做所带来的快感。\n\n可以使用 `//`（如前所示）创建**注释**。注释不会被执行，但它们非常重要。良好的编程习惯是提供注释，以便其他人能够理解任何复杂的代码。那种仅由一人维护程序的时代已经一去不复返了。任何维护你创建的代码的人，都会非常感激你为提供注释所付出的努力。\n\
    \n```\n许多组织通过在程序中记录变更管理细节（如创建者、创建时间以及发生的任何更改）来跟踪变更。注释还可以提供程序的输入输出列表以及程序本身的描述。此外，对于程序中创建的函数（方法或过程），也应提供类似的描述。\n\
    ```\n\n所有可执行代码必须在语句末尾包含一个分号。作为标准，建议任何文本字符串（例如之前的 Hello World）都应放在双引号 `(\"\")`\
    \ 内。PHP 允许一些例外情况（例如在某些情况下使用单引号），但如果你保持一致地使用双引号，就很少会遇到问题。\n\nPHP 提供了大量可供程序员使用的函数（代码块）。这些函数包含经过充分测试的高效代码。只要可能，聪明的程序员都会使用现有函数来节省时间并减少编程错误。所有\
    \ PHP 函数应以小写字母开头（例如函数 `print`）。在以下示例中，字符串 `\"Hello World\"` 被传递给一个名为 `\"myFunction\"\
    ` 的函数。本书将探讨大量 PHP 函数。在本章后面部分，我们将看到更多关于程序员如何创建自己函数的示例。\n"
- fmt: "# Variables\n\n**Variables** temporarily store information in memory. In most\
    \ cases, PHP does not require you to declare a **data type** when using a variable.\
    \ A *data type* describes the data that you plan on storing, such as strings (text),\
    \ integers (whole numbers), or floating-point numbers (decimals). This information\
    \ is used by the operating system to determine the amount of space required to\
    \ store the information.\n\nSince PHP 7, the developers have provided the option\
    \ to declare data types in many situations. It is a good idea to declare data\
    \ types when you want to limit the type of data to be stored in memory. Remember\
    \ PHP will do **data type conversion** (such as converting a string `\"10\"` to\
    \ a numeric `10`) unless you stop it. We will provide more examples soon. But\
    \ first, let us look at the standard way to declare variables in PHP.\n\nIn PHP,\
    \ you usually do not even need to declare a variable separately before using it.\
    \ When declaring variables or functions, the developer can use many styles. The\
    \ most common is **camel case**. In camel case the first word is lowercase, and\
    \ the remaining words have a capitalized first letter, such as `addIt`. However,\
    \ other styles are acceptable, such as:\n\n```php\n$first_number = 0;\n$second_Number\
    \ = 1;\n$number1 = 12;\n```\n\nThe key is to be consistent within your code with\
    \ whatever style you choose. There is really no advantage as to which format is\
    \ better. Although, plenty of programmers will be happy to tell you their opinion!\
    \ In my opinion, you should use meaningful names such as `total_Sales`. Some also\
    \ include the data type in the name, such as `int_Total_Sales`. In large programs\
    \ it will be much easier to keep track of variable usage with a good naming convention.\n\
    \n*Variables must always include the `$` as the first character and other alphanumeric\
    \ characters to complete the name. You can also include the underscore (`_`).\
    \ However, no other special symbols or spaces are allowed.*\n\nIn the following\
    \ example, a variable (`$result`) will hold whatever is returned by a function\
    \ called `addIt`. Since we have not declared a data type, this variable could\
    \ hold a numerical result, a string result, or some other possible format. As\
    \ a programmer, we might want this flexibility. For example, if the function is\
    \ able to produce a result, we return the result. If it is not able to return\
    \ a result, we can return a string (`\"Invalid Result\"`) or we could pass back\
    \ `NULL` (which indicates no result, different than passing a zero).\n\nSince\
    \ this function accepts two parameters (`12`, `13`), we assume it will add the\
    \ numbers together and return the result. The `print` statement will then display\
    \ whatever is contained in the variable.\n\n> **Note**  \n> While most examples\
    \ in this book use the `print` statement to display information, the `echo` statement\
    \ is also very commonly used.\n\nIf we have not declared data types to limit what\
    \ is passed into the function (see below), then it is possible that the following\
    \ examples will also produce good results with other types of information passed.\
    \ However, there could be something within the function that will not properly\
    \ execute when information that is not expected is passed. A good programmer always\
    \ creates code that avoids any possible error situation caused by invalid data\
    \ being saved or passed into a function. Every situation must be considered, even\
    \ ones the programmer may consider as illogical or next to impossible.\n\nIf we\
    \ want to restrict what information to accept or use, we could declare data types.\
    \ We will explore a few examples soon. For now, by default, remember the data\
    \ type of a variable is determined the first time a variable is used.\n\n1. The\
    \ data type is string (characters).\n\n```php\n$myValue = \"Help\";\n```\n\n2.\
    \ The data type is set to an **integer** (whole numbers).\n\n```php\n$myValue\
    \ = 123;\n```\n\n3. Two integers added together produce an integer which is then\
    \ stored into the variable.\n\n```php\n$myValue = 123 + 456;\n// Result: $myValue\
    \ now contains 579\n```\n\n4. Two **floating-point numbers** added together produce\
    \ a floating-point number stored in the variable.\n\n```php\n$myValue = 123.123\
    \ + 123.456;\n// Result: $myValue now contains 246.579\n```\n\n5. A floating-point\
    \ number added to an integer will produce a floating-point number.\n\n```php\n\
    $myValue = 123.233 + 12;\n// Result: $myValue now contains 135.233\n```\n\n6.\
    \ An attempt to add a number to a string number will be successful, if the string\
    \ can be converted to a number. Adding the values together will produce results\
    \ similar to the preceding examples.\n\n```php\n$myValue = 123 + \"456\";\n//\
    \ Result: $myValue now contains 579\n```\n\nThe **string concatenation character**\
    \ (`.`) can be used to merge the two strings together. The result then can be\
    \ placed in the variable (which you guessed it now contains a string). In the\
    \ following example, the existing two strings are merged together to create a\
    \ new string stored in `$myValue`.\n\n```php\n$myValue = \"Help\" . \" me!\";\n\
    // Result: $myValue now contains \"Help me!\"\n```\n\n1. When merging a string\
    \ and integer, PHP will convert the integer to a string (`123`) to allow it to\
    \ be concatenated with the other string (`Help`) to produce a string `\"Help 123\"\
    ` which will be placed into the variable.\n\n```php\n$myValue = \"Help \" . 123;\n\
    // Result: $myValue now contains \"Help 123\"\n```\n\n2. As shown in Chapter 1,\
    \ when a merger is attempted with a string and two values (which in this case\
    \ are to be added together), PHP will first do the calculation and then convert\
    \ the result to a string.\n\n```php\n$num1 = 1;\n$num2 = 2;\n$myValue = \"Help\
    \ \" . $num1 + $num2;\n// Result: $myValue now contains \"Help 3\"\n```\n\n*(Example\
    \ 2 will produce an error message if attempted in any version of the language\
    \ before PHP 7.5.)*\n\n## Data Type Hints\n\nIn PHP 7, data type hints were introduced.\
    \ This allows the developer the ability to limit the type of data that can be\
    \ passed into or out of a function or an object.\n\nIn the preceding example,\
    \ the function limits `$value` to only contain **Boolean** (`true`/`false`) type\
    \ values. It also limits the value returned to be Boolean.\n\n> **Note**  \n>\
    \ `true` is not a string, it is a Boolean value. Thus, it does not require quotes.\n\
    \nBoth of the preceding statements could be valid when calling the `myFunction`\
    \ function. If there is no value passed, then the variable `$value` is set to\
    \ the **default value**, which is `null`. **Null** indicates that the variable\
    \ is empty. However, we could also pass a Boolean value (`true`) which would be\
    \ used instead of `null`.\n\nIn order for the data type enforcement to take place,\
    \ the following statement must be the first statement in the PHP code:\n\n```php\n\
    <?php declare(strict_types=1);\n```\n\nIf the **strict type** statement is not\
    \ included, PHP will try to convert data types when possible, which might cause\
    \ the function or object to accept invalid data, which will either cause invalid\
    \ results or, worse yet, cause the program to throw an exception (error condition).\
    \ We will look at additional examples when we look at functions, arrays, and objects.\n\
    \n## Arithmetic Operators\n\nArithmetic operations work in a similar way to mathematics.\
    \ The exception is that the calculation is done on the right side of the **assignment\
    \ operator** (right side of the `=` sign) and the result is placed into the variable,\
    \ function, or other object on the left side of the expression. PHP already includes\
    \ many functions to produce results seen on a calculator.\n\n```\nFor more information\
    \ on available math functions, visit www.php.net/manual/en/ref.math.php.\n```\n\
    \nPHP allows you to use parentheses `()` to change the order in which values are\
    \ calculated. Otherwise, for numerical values, the language usually follows a\
    \ mathematical **order of operations**. This order is similar to normal mathematics\
    \ but does have a few differences. We will see some of these as we explore the\
    \ remainder of the book.\n\n```\nFor more information on order of operations,\
    \ visit www.php.net/manual/en/language.operators.precedence.php.\n```\n\nLet us\
    \ look at some examples:"
  raw: "```\n**Variables**\n temporarily store information in memory. In most cases,\
    \ PHP does\nnot require you to declare a **data type** when using a\nvariable.\n\
    *A* *data\ntype*  *describes the data that you plan on storing, such\nas strings\
    \ (text), integers (whole numbers), or floating-point numbers\n(decimals). This\
    \ information is used by the operating system to\ndetermine the amount of space\
    \ required to store the\ninformation.*\nSince PHP 7, the developers have provided\
    \ the option to declare data\ntypes in many situations. It is a good idea to declare\
    \ data types when\nyou want to limit the type of data to be stored in memory.\
    \ Remember PHP\nwill do **data type\nconversion**  (such as converting a string\
    \ “10” to a\nnumeric 10) unless you stop it. We will provide more examples soon.\
    \ But\nfirst, let us look at the standard way to declare variables in PHP.\n\n\
    In PHP, you usually do not even need to declare a variable separately\nbefore\
