    Routes


    **O**ut of the box, Cake intercepts all URLs and maps them to their appropriate
    controllers and actions. This is a wonderful aspect of the framework that improves
    the speed of developing applications. Rather than having long strings of passed
    variables in the URL or creating dozens of individual scripts to handle every
    function in the application, Cake’s routing system manages all the requests, as
    you saw in previous chapters. But what about customizing the routing scheme? Or
    what if you want to generate non-HTML files such as PDFs, RSS


    feeds, or some kind of XML output? And what about search engine optimization?
    For these purposes, Cake’s routing features will remove the headache of mapping
    URLs, handling dynamic requests, and customizing the paths and URL structure of
    the application.


    Almost all the main routing action will take place in the app/config/routes.php
    file. All the routes and their configurations are stored in this file and use
    a specific syntax. A few default routes, which serve to handle the main URLs,
    are already written to the routes.php file. By default, Cake parses the passed
    values listed between slashes and derives a path to controllers and actions as
    well as passing parameters to those actions. By using magic variables, arguments,
    extensions, parameters, and other features, you can fully manipulate the routes
    to fit your application and still maintain the MVC structure.


    ■**Caution** Remember that the routes.php page is cascading, meaning that the
    order of routes matters.


    If Cake resolves a URL with one route, it will immediate end there and not proceed
    to check other routes down the page. Although this generally doesn’t affect the
    overall application, it can make a difference if you are working with more complex
    routes that occur in the same controller or action.


    **The Basic Route**


    As you can see in the default routes.php configuration file, the basic route is
    called as the Router::connect() function with a path as well as an array storing
