    \ HTML 语法如下：\n\n```\n<input type=\"text\" name=\"text\" />\n```\n\n`name` 属性的值会导致在\
    \ `$_POST`（或 `$_GET`）数组中创建一个具有相同值的索引，用户输入的值可以在该索引处访问。\n\n一种特殊的文本输入类型称为密码。这将在用户键入时替换输入的内容，防止他人从旁窥视。\n\
    \n```\n<input type=\"password\" name=\"password\" />\n```\n\n每个字符通常被替换为星号 `*`。请注意，表单上的内容仍以明文传输，除非客户端和服务器之间使用了加密连接。不需要加密将空表单从服务器发送到客户端的\
    \ `GET` 请求，但将数据发送回服务器的 `POST` 请求应该加密以保护密码。\n"
- fmt: "某些类型的输入不适合自由文本输入字段。如果表单包含是/否问题或其他类似情况（用户可从有限的值集合中选择一个选项），建议使用单选按钮或下拉列表。当选项较多时（例如州列表），下拉列表非常有用，因为表单所需的总空间被缩减为单行。以下几行展示了一个名为“agree”的变量的输入结构。用户有两个选项可供选择。只有被选中的值（如果有）才会作为表单的一部分提交。由于这两个输入具有相同的名称，且浏览器只允许用户选择其中一个值，因此服务器只需检查该变量。\n\
    \n<input type=\"radio\" name=\"agree\" value=\"0\" />否\n\n<input type=\"radio\"\
    \ name=\"agree\" value=\"1\" />是\n\n创建下拉列表稍微复杂一些。需要两个HTML标签。外层标签称为`select`，内层标签称为`option`。内层标签可根据需要重复多次。\n\
    \n<select name=\"state\">\n\n<option value=\"AL\">Alabama</option>\n\n<option\
    \ value=\"AK\">Alaska</option>\n\n<option value=\"AZ\">Arizona</option>\n\n<option\
    \ value=\"AR\">Arkansas</option>\n\n<option value=\"CA\">California</option>\n\
    \n...\n\n<option value=\"WY\">Wyoming</option>\n\n</select>\n\n此元素将在`$_POST`变量上创建一个名为`state`的索引。它仅包含选中的值，在本例中是州的两位字母代码。\n\
    \n单选按钮和下拉列表的共同点是，它们可以显示更易读的选项版本，并仅向服务器发送一个简短的值。\n\n如果用户应能选择多个值，表单可以包含复选框或多选列表。\n\
    \n为了使复选框正常工作，需要为每个选项使用唯一的名称，或使用一个能使PHP创建值数组的名称。上述是/否示例可以用单个复选框实现。\n\n<input type=\"\
    checkbox\" name=\"agree\" value=\"1\" />我同意\n\n提交表单时，仅当复选框被选中时，`'agree'`变量才有值。PHP脚本必须检查`$_POST`中是否存在`agree`索引。如果未定义，则表示该值未被选中。\n\
    \n创建一个包含用户编程技能选择的表单如下所示：\n\n<input type=\"checkbox\" name=\"skill[]\" value=\"\
    1\" />PHP\n\n<input type=\"checkbox\" name=\"skill[]\" value=\"2\" />JavaScript\n\
    \n<input type=\"checkbox\" name=\"skill[]\" value=\"4\" />C/C++\n\n<input type=\"\
    checkbox\" name=\"skill[]\" value=\"8\" />Java\n\n如果提交表单时未选中任何值，`$_POST`数组将不会包含名为`'skill'`的索引。如果选中一个或多个值，该变量将是一个包含所选值的数组。选择PHP和JavaScript将在`$_POST`中创建以下内容。\n\
    \n```\nArray (\n    [skill] => Array\n        (\n            [0] => 1\n      \
    \      [1] => 2\n        )\n)\n```\n\n示例中的可能值被选为整数中单个位的值。这样，这些值可以通过按位或运算组合成一个整数值，该值可以存储在数据库的单个列中。\n\
    \n同样的示例可以用多选列表创建：\n\n<select multiple name=\"skill[]\">\n\n<option value=\"1\"\
    >PHP</option>\n\n<option value=\"2\">JavaScript</option>\n\n<option value=\"4\"\
    >C/C++</option>\n\n<option value=\"8\">Java</option>\n\n</select>\n\n这将在`$_POST`数组中产生与复选框相同的内容。用户需要按住Ctrl（Windows）或Cmd（Mac）才能选择多个值。\n\
    \n如果名称末尾缺少方括号`[]`，PHP会将这些值视为一个，并且只包含列表中最后选中的选项的值。\n\n在HTML 5中，引入了几个新的输入选项。新类型如下所示：\n\
    \n**类型** | **描述**\n---|---\nColor | 允许从颜色选择器中选择颜色值\nDate | 用于输入月、日、年的日期选择器控件\n\
    datetime-local | 用于同时输入日期和时间的控件"
  raw: 'Some types of input do not work well with free text input fields. If the form
    contains yes/no questions or other similar situations with a limited set of values
    where the user can select one of the options it’s recommended to use radio button
    or drop-down lists. Drop-down lists are useful when there are many options, like
    a list of states as the total space needed for the form is reduced to a single
    line. The next few lines show an input structure for a variable called “agree.”
    There are two options for the user to select. Only the selected value (if any)
    will be submitted as part of the form. Because the two inputs have the same name
    and the browser only allows the user to select one of the values the server only
    needs to check on variables.


    <input type="radio" name="agree" value="0" />No


    <input type="radio" name="agree" value="1" />Yes Creating a drop-down lost is
    a bit more involved. Two html tags are needed. The other tag is called select
    and the inner tag is called option. The inner tag can be repeated as many times
    as needed.


    <select name="state">


    <option value="AL">Alabama</option>


    <option value="AK">Alaska</option>


    <option value="AZ">Arizona</option>


    <option value="AR">Arkansas</option>


    <option value="CA">California</option>


    ...


    <option value="WY">Wyoming</option>


    </state>


    This element will create an index called state on the $_POST variable. It will
    contain only the selected value, in this case a two-letter code for the state.


    Common for both radio buttons and drop-down lists are the fact that they can show
    a more readable version of the selection and simply send a short value back to
    the server.


    If the user should have the option to select more than one value the form can
    contain check boxes or multiselect lists .


    For check boxes to work it is necessary to name them with unique names for each
    option or use a name that will cause PHP to create an array of values. The yes/no
    example from above could be implemented with a single check box.


    <input type="checkbox" name="agree" value="1" />I Agree Submitting the form will
    only contain a value for the ‘agree’ variable if the value is checked. The PHP


    script will have to check if the index agree exists on $_POST. If it’s undefined
    that means the value was not selected.


    Creating a form that contains the selection of a user’s programming skills could
    look like this:


    <input type="checkbox" name="skill[]" value="1" />PHP


    <input type="checkbox" name="skill[]" value="2" />JavaScript


    <input type="checkbox" name="skill[]" value="4" />C/C++


    <input type="checkbox" name="skill[]" value="8" />Java If none of the values are
    selected when the form is submitted the $_POST array will not have an index called
    ‘skill’. If one or more values are selected the variable will be an array of the
    selected values. Selecting PHP and JavaScript will create this content in $_POST
    .


    CHAPTER 13 ■ CREATING AND USING FORMS


    Array (


    [skill] => Array


    (


    [0] => 1


    [1] => 2


    )


    )


    The possible values in the example are chosen to be the values of a single bit
    in an integer. That way the values can be ORed (bitwise disjunction) together
    to create an integer value that can be stored in a single column in a database.


    The same example can be created with a multiselect list :


    <select multiple name="skill[]">


    <option value="1">PHP</option>


    <option value="2">JavaScript</option>


    <option value="4">C/C++</option>


    <option value="8">Java</option>


    </select>


    This will produce the same content in the $_POST array as the check boxes. The
    user will have to hold down Ctrl (Windows) or Cmd (Mac) to select more than one
    value.


    If the name is missing the square brackets [] at the end PHP will treat the values
    as one and it will only contain the value of the last selected option from the
    list.


    In HTML 5 there were a couple of new input options introduced. The new types are
    listed here: **Type**


    **Description**


    Color


    Allows selecting of a color value from a color picker


    Date


    A date selector control for entering month, day, and year


    datetime-local


    A control for entering both date and time'
