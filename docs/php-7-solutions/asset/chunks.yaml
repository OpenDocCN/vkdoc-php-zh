    \ { ?>\n    Your session has expired. Please log in again.\n\n    ```\n\n    The\
    \ message is shown if the URL contains a parameter called `expired` in a query\
    \ string.\n\n3.  Open `menu.php`, cut the code in the PHP block above the `DOCTYPE`\
    \ declaration, and paste it into a new blank file.\n\n4.  Save the file as `session_timeout.php`\
    \ in the `includes` folder, then edit the code like this:\n\n    ```\n     $_SESSION['start']\
    \ + $timelimit) {\n    // if timelimit has expired, destroy session and redirect\n\
    \    $_SESSION = [];\n    // invalidate the session cookie\n    if (isset($_COOKIE[session_name()]))\
    \ {\n    setcookie(session_name(), \", time()-86400, '/');\n    }\n    // end\
    \ session and redirect with query string\n    session_destroy();\n    header(\"\
    Location: {$redirect}?expired=yes\");\n    exit;\n    } else {\n    // if it's\
    \ got this far, it's OK, so update start time\n    $_SESSION['start'] = time();\n\
    \    }\n    ```\n\n    The inline comments explain what is going on, and you should\
    \ recognize most of the `elseif` clause from PHP Solution 11-5. PHP measures time\
