    \n| Details |\n| --- |\n| Instead of the `$number=(int)trim(fgets(STDIN))` statement,\
    \ which reads the value for the `$number` variable from the console, you could\
    \ use the `$number=123` or `$number=124` statement, which explicitly assigns the\
    \ value to the `$number` variable. |\n\nThe `$word=($number%2==0)?\"even\":\"\
    odd\"` command assigns the `($number%2==0)?\"even\":\"odd\"` expression (based\
    \ on the ternary operator) to the `$word` variable. If the `$number%2==0` condition\
    \ is true (which means that the remainder of dividing the `$number` variable by\
    \ `2` is zero), then the `$word` variable gets the text `\"even\"`. If the `$number%2==0`\
    \ condition is false, then the `$word` variable gets the text `\"odd\"`. The value\
    \ of the `$word` variable is used when displaying the test result.\n\n## Summary\n\
    \n*   A variable is a named block of memory that allows you to refer to that block\
    \ of memory by name. If you want to create a variable in PHP, it is enough to\
    \ assign a value to the variable. The variable name begins with the `$` character.\n\
    \n*   A variable does not have a type, but the value that the variable refers\
    \ to has a type. The main types include `integer` (integer numbers), `double`\
    \ (real numbers), `string` (text), `boolean` (boolean values), `array` (an array),\
    \ and `object` (an object). You can obtain the type of value a variable refers\
    \ to using the `gettype()` function.\n\n*   For explicit type conversion, you\
    \ can use the `settype()` function or specify the final type in parentheses before\
    \ the converted value. PHP also has an automatic type conversion system.\n\n*\
    \   Basic operations use arithmetic, logical, bitwise, and comparison operators.\
    \ The *dot* operator is used to concatenate strings.\n\n*   The assignment operator\
    \ returns a value that is the same as the variable’s value (to which the value\
    \ is being assigned). There exist simplified forms of assignment operators.\n\n\
    *   The ternary operator returns a value that depends on a specific condition\
    \ that can be true or false.\n\n*   The `fgets()` function can read data from\
    \ the console.\n\n# 3. The Control Statements\n\n> *I was sitting quietly, peacefully.\
    \ Then I got hungry. Further, as if in a fog.*\n> \n> —*ALF* (TV series)\n\nThis\
    \ chapter discusses control statements, which are instructions designed to create\
    \ branch points in a program and instructions to repeat statement blocks. In other\
    \ words, it covers the conditional, loop, and selection statements."
