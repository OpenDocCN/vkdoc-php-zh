- '# 关于作者


  **米凯尔·奥尔森**是一位专业的网络创业者、程序员和作家。他在芬兰一家研发公司工作，专门从事软件开发。业余时间，他撰写书籍并创建网站，总结自己各个兴趣领域。他写的书侧重于以最高效的方式教授课程，只解释相关且实用的内容，避免任何不必要的重复或理论。


  '
- '# 关于技术审校者


  **杰米·鲁姆博**多年来一直以自由职业者的身份专业地编写代码，作为业余爱好者编写代码的时间则更长。他是三本关于 PHP 框架 CodeIgniter 的书籍的作者，是一位备受尊敬且经验丰富的开源贡献者，并就各种技术相关主题举办讲座和研讨会。他的作品曾刊登在《.net》杂志等行业期刊上，并为小型企业和全球慈善机构开发过项目。他热衷于在推特
  @jamierumbelow 上谈论政治和编程。


  '
- '# 引言


  PHP 是一种服务器端编程语言，用于创建动态网站和交互式 Web 应用程序。PHP 这个缩写最初代表“Personal Home Page”（个人主页），但随着其功能的增强，它变为了“PHP：Hypertext
  Preprocessor”（PHP：超文本预处理器）。这个递归缩写的由来是因为它接收 PHP 代码作为输入，并生成 HTML 作为输出。这意味着用户无需安装任何软件即可查看
  PHP 生成的网页。唯一的要求是 Web 服务器上安装了 PHP 以解释脚本。


  与 HTML 网站相比，PHP 网站是动态生成的。网站不是由大量静态 HTML 文件组成，而可能仅由少数模板文件构成。模板文件仅使用 PHP 代码描述网站的结构，而网页内容则从数据库中提取，样式格式来自层叠样式表（CSS）。这提供了一个灵活的网站，允许多个位置进行全站范围的更改，使网站易于设计、维护和更新新内容。


  使用 PHP 创建网站时，通常使用内容管理系统（CMS）。CMS 提供了一个完全集成的网站开发平台，包括后端和前端。前端是访问者到达网站时看到的界面，而后端是管理员配置、更新和管理网站的地方。后端还允许
  Web 开发人员更改模板文件和修改插件，以更广泛地自定义网站的功能和结构。免费且基于 PHP 的 CMS 解决方案示例包括 WordPress、Joomla、ModX
  和 Drupal，其中 WordPress 最受欢迎，占据了超过一半的 CMS 市场份额。


  PHP 的第一个版本由拉斯姆斯·勒多夫创建并于 1995 年发布。自那时起，PHP 已从一个简单的脚本语言演变为功能齐全的 Web 编程语言。官方实现现由 PHP
  小组发布，截至撰写本文时，PHP 5.5 是最新版本。该语言可以免费使用并且是开源的，允许开发人员扩展它以用于自己的目的或为其开发做出贡献。


  PHP 是当今使用的最流行的服务器端编程语言。与其他服务器端技术（如 ASP.NET、Java、Ruby 和 Perl）相比，它拥有不断增长的 75% 市场份额。PHP
  被广泛采用的原因之一是其平台独立性。它可以安装在所有主要的 Web 服务器和操作系统上，并与任何主要的数据库系统一起使用。PHP 的另一个强大特性是其基于 C
  和 Perl 的简单易用的语法，新手易于学习，同时为专业程序员提供许多高级功能。


  '
- '# 第 1 章：使用 PHP


  ![image](img/frontdot.jpg)


  要开始使用 PHP 进行开发，请创建一个扩展名为 `.php` 的纯文本文件，并在您选择的编辑器中打开它——例如记事本、JEdit、Dreamweaver、Netbeans
  或 PHPEclipse。这个 PHP 文件可以包含任何 HTML 以及 PHP 脚本代码。首先将以下标准 HTML 元素输入到文档中。


  ```

  <html>

   <head><title>PHP 测试</title></head>

   <body></body>

  </html>

  ```


  ## 嵌入 PHP


  PHP 代码可以通过四种不同方式中的任何一种嵌入到 Web 文档中的任何位置。标准表示法是使用 "`<?php`" 和 "`?>`" 分隔代码。这称为 PHP
  代码块，或简称为 PHP 块。


  ```

  <?php ... ?>

  ```


  在 PHP 块内部，引擎处于 PHP 模式，而在块外部，引擎处于 HTML 模式。在 PHP 模式下，所有内容都将由 PHP 引擎解析（执行），而在 HTML
  模式下，所有内容都将发送到生成的网页而不执行任何操作。


  切换到 PHP 模式的第二种表示法是第一种的简写版本，其中省略了 "php" 部分。虽然这种表示法更短，但如果 PHP 代码需要可移植，则首选较长的表示法。这是因为对短分隔符的支持可以在
  `php.ini` 配置文件中禁用。


  ```

  <? ... ?>

  ```


  第三种替代方法是将 PHP 代码嵌入到带有 "php" 语言属性的 HTML `script` 元素中。这种替代方法始终可用，但很少使用。


  ```

  <script language="php">...</script>

  ```


  您可能遇到的另一种样式是脚本嵌入在 ASP 标签之间。这种样式默认是禁用的，但可以从 PHP 配置文件中启用。


  ```

  <% ... %>

  ```


  如果脚本文件以 PHP 模式结束，则可以省略文件中的最后一个结束标签。


  ```

  <?php ... ?>

  <?php ...

  ```


  ## 输出文本


  在 PHP 中打印文本是通过输入 `echo` 或 `print` 后跟输出内容来完成的。每个语句必须以分号（`;`）结尾，以便与其他语句分隔。PHP 块中最后一个语句的分号是可选的。


  ```

  <?php

    echo  "Hello World";

    print "Hello World"

  ?>

  ```


  也可以使用 "`<?=`" 开始分隔符生成输出。从 PHP 5.4 起，即使禁用了短 PHP 分隔符，此语法也是有效的。


  ```

  <?= "Hello World" ?>

  <? echo "Hello World" ?>

  ```


  请记住，只有当文本输出位于 HTML `<body>` 元素内时，它才会在网页上可见。


  ```

  <html>

   <head><title>PHP 测试</title></head>

  <body>

   <?php echo "Hello World"; ?>

  </body>

  </html>

  ```


  ## 安装 Web 服务器


  要在浏览器中查看 PHP 代码，代码首先必须在安装了 PHP 模块的 Web 服务器上进行解析。设置 PHP 环境的一个简单方法是下载并安装名为 XAMPP 的流行
  Apache Web 服务器发行版，该发行版预装了 PHP、Perl 和 MySQL。这将允许您在您自己的计算机上尝试 PHP。


  安装 Web 服务器后，将浏览器指向 "`http://localhost`" 以确保服务器在线。它应该显示 `index.php` 文件，在 Windows
  机器上，该文件默认位于 `C:\xampp\htdocs\index.php`。`htdocs` 是 Apache Web 服务器查找要提供给您的域提供的文件的文件夹。


  ## Hello World




  '
- "# 接上篇\n\n一个简单的“Hello World”PHP 网页文档看起来应该是这样的。\n\n```\n<html>\n <head><title>PHP\
  \ Test</title></head>\n <body>\n  <?php echo \"Hello World\"; ?>\n </body>\n</html>\n\
  ```\n\n要查看此 PHP 文件解析成 HTML 后的效果，请将其保存到 Web 服务器的 `htdocs` 文件夹（服务器的根目录）中，文件名如 `mypage.php`。然后，在浏览器中访问其路径，对于本地\
  \ Web 服务器，该路径为 `http://localhost/mypage.php`。\n\n当请求这个 PHP 网页时，脚本会在服务器上被解析，并仅作为\
  \ HTML 发送到浏览器。如果查看网站的源代码，你将看不到任何生成页面的服务器端代码，只能看到 HTML 输出。\n\n## 编译与解析\n\nPHP 是一种解释型语言，而非编译型语言。每当有访客访问\
  \ PHP 网站时，PHP 引擎会将代码编译并解析成 HTML，然后发送给访客。这样做的主要优点是代码可以轻松修改，而无需重新编译和重新部署网站。主要缺点是在运行时编译代码需要更多的服务器资源。\n\
  \n对于一个小型网站来说，服务器资源不足通常不是问题。与其他因素（如执行数据库查询所需的时间）相比，编译 PHP 脚本所需的时间也微不足道。然而，对于一个流量很大的大型\
  \ Web 应用程序，编译 PHP 文件所带来的服务器负载可能是显著的。对于此类网站，可以通过预编译 PHP 代码来消除脚本编译开销。例如，可以使用 `eAccelerator`\
  \ 来实现，它会将 PHP 脚本以其编译状态缓存起来。\n\n一个仅提供静态内容（对所有访客相同）的网站还有另一种可能性，即缓存完全生成的 HTML 页面。这样既能拥有动态站点的维护便利性，又能兼得静态站点的速度。此类缓存工具之一是\
  \ WordPress CMS 的 `W3 Total Cache` 插件。\n\n## 注释\n\n注释用于在代码中插入备注，对脚本的解析没有影响。PHP 有两种标准的\
  \ C++ 注释符号：单行注释（`//`）和多行注释（`/* */`）。Perl 注释符号（`#`）也可以用于单行注释。\n\n```\n<?php\n  //\
  \ 单行注释\n  #  单行注释\n  /* 多行\n     注释 */\n?>\n```\n\n与 HTML 一样，空白字符（如空格、制表符和注释）通常会被\
  \ PHP 引擎忽略。这让你在格式化代码时拥有很大的自由度。\n\n- `http://www.php.net/manual/en/configuration.file.php`\n\
  - `http://www.apachefriends.org/en/xampp.html`\n- `http://www.eaccelerator.net`\n\
  - `http://wordpress.org/extend/plugins/w3-total-cache`\n\n"
- '# 第二章：变量


  ![image](img/frontdot.jpg)


  变量用于存储数据，例如数字或字符串，以便在脚本中多次使用。


  ## 定义变量


  变量以美元符号（`$`）开头，后跟一个*标识符*，即变量的名称。变量命名的一个常见惯例是，除第一个单词外，每个单词的首字母大写。


  ```

  $myVar;

  ```


  可以使用等号或赋值运算符（`=`）为变量赋值。此时变量被称为*已定义*或*已初始化*。


  ```

  $myVar = 10;

  ```


  一旦变量被定义，就可以通过引用变量名来使用它。例如，可以使用 `echo` 后跟变量名将变量的值打印到网页上。


  ```

  echo $myVar; // "10"

  ```


  请记住，变量名是区分大小写的。PHP 中的名称可以包含下划线和数字，但不能以数字开头。它们也不能包含空格或特殊字符，并且不能是保留关键字。


  ## 数据类型


  PHP 是一种松散类型语言。这意味着变量可以存储的数据类型没有指定。相反，变量的数据类型会自动改变，以容纳其被赋予的值。


  ```

  $myVar = 1;   // 整型

  $myVar = 1.5; // 浮点型

  ```


  此外，变量的值会根据其使用的上下文进行不同的求值。


  ```

  // 浮点型被求值为字符串类型

  echo $myVar; // "1.5"

  ```


  由于这些隐式类型转换，了解变量的底层类型并不总是必要的。然而，理解 PHP 在后台处理的数据类型仍然很重要。以下表格列出了这九种类型。


  | 数据类型 | 类别 | 描述 |

  | --- | --- | --- |

  | `int` | 标量 | 整数 |

  | `float` | 标量 | 浮点数 |

  | `bool` | 标量 | 布尔值 |

  | `string` | 标量 | 字符序列 |

  | `array` | 复合 | 值的集合 |

  | `object` | 复合 | 用户自定义数据类型 |

  | `resource` | 特殊 | 外部资源 |

  | `callable` | 特殊 | 函数或方法 |

  | `null` | 特殊 | 无值 |


  ### 整型


  整数是整数。它们可以用十进制（基数为 10）、十六进制（基数为 16）、八进制（基数为 8）或二进制（基数为 2）表示法指定。十六进制数前加 `0x`，八进制数前加
  `0`，二进制数前加 `0b`。


  ```

  $myInt = 1234; // 十进制数

  $myInt = 0b10; // 二进制数（十进制 2）

  $myInt = 0123; // 八进制数（十进制 83）

  $myInt = 0x1A; // 十六进制数（十进制 26）

  ```


  PHP 中的整数始终是有符号的，因此可以存储正数和负数。整数的大小取决于系统的字长，因此在 32 位系统上，最大可存储值为 `2^(32-1)`。如果 PHP
  遇到更大的值，则会被解释为 `float`。


  ### 浮点型


  `float` 或浮点型可以存储实数。这些值可以使用十进制或科学计数法来赋值。


  ```

  $myFloat = 1.234;

  $myFloat = 3e2; // 3*10² = 300

  ```


  `float` 的精度取决于平台。通常使用 64 位 IEEE 格式，该格式可以容纳大约 14 位十进制数字，最大十进制值为 `1.8x10³⁰⁸`。


  ### 布尔型


  `bool` 类型可以存储一个布尔值，即只能为 `true` 或 `false` 的值。这些值使用 `true` 和 `false` 关键字指定。


  ```

  $myBool = true;

  ```


  ### 空类型


  不区分大小写的常量 `null` 用于表示没有值的变量。这样的变量被认为是特殊的 `null` 数据类型。


  ```

  $myNull = null; // 变量被设置为 null

  ```


  与其他值一样，`null` 值会根据其所在的上下文进行不同的求值。如果作为 `bool` 求值，则变为 `false`；如果作为数字，则变为零（`0`）；如果作为字符串，则变为空字符串（`""`）。


  ```

  $myInt = $myNull + 0;      // 数值上下文 (0)

  $myBool = $myNull == true; // 布尔上下文 (false)

  echo $myNull;              // 字符串上下文 ("")

  ```


  ### 默认值


  在 PHP 中，可以使用未赋值的变量。这种未定义的变量会自动创建，其值为 `null`。


  ```

  echo $myUndefined; // 变量被设置为 null

  ```


  尽管允许这种行为，但最好在使用变量之前对其进行定义，即使只是将其设置为 `null`。作为提醒，当使用未定义的变量时，PHP 会发出一个错误通知。根据 PHP
  的错误报告设置，此消息可能会显示，也可能不会显示。


  ```

  Notice: Undefined variable: myUndefined in

  C:\xampp\htdocs\mypage.php on line 10

  ```


  '
- '# 第三章：运算符


  ![image](img/frontdot.jpg)


  运算符用于对值进行操作。它们可以分为五种类型：算术运算符、赋值运算符、比较运算符、逻辑运算符和位运算符。


  ## 算术运算符



  ```markdown


  ## 算术运算符


  算术运算符包括四种基本算术运算，以及用于获取除法余数的取模运算符（`%`）。


  ```

  $x = 4 + 2; // 6 // 加法

  $x = 4 - 2; // 2 // 减法

  $x = 4 * 2; // 8 // 乘法

  $x = 4 / 2; // 2 // 除法

  $x = 4 % 2; // 0 // 取模（除法余数）

  ```


  ## 赋值运算符


  第二组是赋值运算符。最重要的是赋值运算符（`=`）本身，它将一个值赋给一个变量。


  ## 复合赋值运算符


  赋值运算符和算术运算符的一个常见用法是对一个变量进行操作，然后将结果保存回同一个变量。这些操作可以通过复合赋值运算符来简化。


  ```

  $x = 0;

  $x += 5; // $x = $x+5;

  $x -= 5; // $x = $x-5;

  $x *= 5; // $x = $x*5;

  $x /= 5; // $x = $x/5;

  $x %= 5; // $x = $x%5;

  ```


  ## 递增和递减运算符


  另一个常见操作是将变量递增或递减 1。这可以通过递增（`++`）和递减（`--`）运算符来简化。


  ```

  $x++; // $x += 1;

  $x--; // $x -= 1;

  ```


  这两个运算符都可以放在变量的前面或后面。


  ```

  $x++; // 后置递增

  $x--; // 后置递减

  ++$x; // 前置递增

  --$x; // 前置递减

  ```


  无论使用哪种方式，对变量的结果都是相同的。区别在于，后置运算符在修改变量之前返回原始值，而前置运算符先修改变量，然后返回值。


  ```

  $x = 5; $y = $x++; // $x=6, $y=5

  $x = 5; $y = ++$x; // $x=6, $y=6

  ```


  ## 比较运算符


  比较运算符比较两个值并返回 `true` 或 `false`。它们主要用于指定条件，这些条件是指计算结果为 `true` 或 `false` 的表达式。


  ```

  $x = (2 == 3);  // false // 等于

  $x = (2 != 3);  // true  // 不等于

  $x = (2 <> 3);  // true  // 不等于（另一种写法）

  $x = (2 === 3); // false // 全等于

  $x = (2 !== 3); // true  // 不全等于

  $x = (2 > 3);   // false // 大于

  $x = (2 < 3);   // true  // 小于

  $x = (2 >= 3);  // false // 大于或等于

  $x = (2 <= 3);  // true  // 小于或等于

  ```


  全等运算符（`===`）用于比较操作数的值和数据类型。如果两个操作数的值相同且类型相同，则返回 `true`。同样，不全等运算符（`!==`）如果操作数的值不相同或类型不相同，则返回
  `true`。换句话说，相等运算符会执行类型转换，而全等运算符则不会。


  ```

  $x = (1 ==  "1"); // true  （值相同）

  $x = (1 === "1"); // false （类型不同）

  ```


  ## 逻辑运算符


  逻辑运算符通常与比较运算符一起使用。逻辑与（`&&`）如果左侧和右侧都为真，则计算结果为 `true`，逻辑或（`||`）如果左侧或右侧为真，则计算结果为 `true`。逻辑非（`!`）运算符用于反转布尔结果。请注意，对于“逻辑与”和“逻辑或”，如果结果已由左侧确定，则不会计算运算符的右侧。


  ```

  $x = (true && false); // false // 逻辑与

  $x = (true || false); // true  // 逻辑或

  $x = !(true);         // false // 逻辑非

  ```


  ## 位运算符


  位运算符可以操作数字的二进制位。例如，异或运算符（`^`）会打开运算符一侧设置的位，但不会打开两侧都设置的位。


  ```

  $x = 5 & 4;  // 101 & 100 = 100 (4) // 按位与

  $x = 5 | 4;  // 101 | 100 = 101 (5) // 按位或

  $x = 5 ^ 4;  // 101 ^ 100 = 001 (1) // 按位异或（exclusive or）

  $x = 4 << 1; // 100 << 1  =1000 (8) // 左移

  $x = 4 >> 1; // 100 >> 1  =  10 (2) // 右移

  $x = ~4;     // ~00000100 = 11111011 (-5) // 按位取反

  ```


  这些位运算符与算术运算符一样，也有简写的赋值运算符。


  ```

  $x=5; $x &= 4;  // 101 & 100 = 100 (4) // 按位与赋值

  $x=5; $x |= 4;  // 101 | 100 = 101 (5) // 按位或赋值

  $x=5; $x ^= 4;  // 101 ^ 100 = 001 (1) // 按位异或赋值

  $x=5; $x <<= 1; // 101 << 1  =1010 (10)// 左移赋值

  $x=5; $x >>= 1; // 101 >> 1  =  10 (2) // 右移赋值

  ```


  ## 运算符优先级


  在 PHP 中，表达式通常从左到右计算。然而，当一个表达式包含多个运算符时，这些运算符的优先级决定了它们被计算的顺序。


  ![image](img/Table3-1.jpg)


  例如，逻辑与（`&&`）的绑定优先级低于关系运算符，而关系运算符的绑定优先级又低于算术运算符。


  ```

  $x = 2+3 > 1*4 && 5/5 == 1; // true

  ```


  为了更清晰，可以使用括号来指定表达式的哪一部分将被首先计算。括号在所有运算符中优先级最高。


  ```

  $x = ((2+3) > (1*4)) && ((5/5) == 1); // true

  ```


  ## 额外的逻辑运算符


  在优先级表中，请特别注意最后三个运算符：`and`、`or` 和 `xor`。`and` 和 `or` 运算符的工作方式与逻辑运算符 `&&` 和 `||` 相同。唯一的区别是它们的优先级较低。


  ```

  // 等同于：$a = (true && false);

  $a = true && false; // $a 为 false


  // 等同于：($a = true) and false;

  $a = true and false; // $a 为 true

  ```


  `xor` 运算符是位运算符 `^` 的布尔版本。如果只有一个操作数为真，则计算结果为 `true`。


  ```

  $a = (true xor true); // false

  ```


  # 第四章


  ![image](img/frontdot.jpg)


  # 字符串


  字符串是可以存储在变量中的一系列字符。在 PHP 中，字符串通常由单引号分隔。


  ```

  $a = ''Hello'';

  ```


  ## 字符串连接


  PHP 有两个字符串运算符。点号（`.`）被称为连接运算符，它将两个字符串合并为一个。它还有一个配套的赋值运算符（`.=`），它将右侧字符串追加到左侧字符串变量。


  ```

  $b = $a . '' World''; // Hello World

  $a .= '' World'';     // Hello World

  ```


  ## 分隔字符串


  PHP 字符串可以用四种不同的方式分隔。有两种单行表示法：双引号（`" "`）和单引号（`'' ''`）。它们之间的区别在于，变量在单引号字符串中不会被解析，而在双引号字符串中则会被解析。


  ```

  $c = ''World'';

  echo "Hello $c"; // "Hello World"

  echo ''Hello $c''; // "Hello $c"

  ```


  单引号字符串通常更受青睐，除非需要解析变量，主要是因为字符串解析会带来非常小的性能开销。然而，双引号字符串被认为更易于阅读，这使得选择更多是出于个人偏好。


  除了单引号和双引号字符串外，还有两种多行表示法：heredoc 和 nowdoc。这些表示法主要用于包含较大的文本块。


  ### Heredoc 字符串


  heredoc 语法由 `<<<` 运算符后跟一个标识符和一个换行符组成。然后包含字符串，接着是一个包含该标识符的换行符以关闭字符串。与双引号字符串一样，变量在
  heredoc 字符串内部会被解析。


  ```

  $s = <<<LABEL

  Heredoc（可解析）

  LABEL;

  ```


  ### Nowdoc 字符串


  nowdoc 字符串的语法与 heredoc 字符串相同，只是初始标识符用单引号括起来。变量不会在 nowdoc 字符串内部被解析。


  ```

  $s = <<<''LABEL''

  Nowdoc（不可解析）

  LABEL;

  ```


  ## 转义字符


  转义字符用于编写特殊字符，例如反斜杠或双引号。PHP 中可用的转义字符表如下所示。


  ![image](img/Table4-1.jpg)


  例如，换行符在文本中用转义字符 `\n` 表示。


  ```

  $s = "Hello\nWorld";

  ```


  请注意，此字符不同于 `<br>` HTML 标签，后者在网页上创建换行。


  ```

  echo "Hello<br>World";

  ```


  ```



  当使用单引号或 `nowdoc` 定界符时，唯一可用的转义字符是反斜杠（`\\`）和单引号（`\''`）。


  ```

  $s = ''It\''s''; // "It''s"

  ```


  仅在单引号之前或字符串末尾才需要转义反斜杠。


  ### 字符引用


  字符串中的字符可以通过在字符串变量后的方括号中指定所需字符的索引（从零开始）来引用。这既可用于访问单个字符，也可用于修改单个字符。


  ```

  $s = ''Hello'';

  $s[0] = ''J'';

  echo $s; // "Jello"

  ```


  `strlen`函数用于获取字符串参数的长度。例如，这可用于修改字符串的最后一个字符。


  ```

  $s[strlen($s)-1] = ''y'';

  echo $s; // "Jelly"

  ```


  ### 字符串比较


  比较两个字符串的方法是直接使用等于运算符。这不会像某些其他语言那样比较内存地址。


  ```

  $a = ''test'';

  $b = ''test'';

  $c = ($a == $b); // true

  ```


  ## 第五章


  ![image](img/frontdot.jpg)


  ## 数组


  数组用于在单个变量中存储一组值。PHP 中的数组由键值对组成。键可以是整数（数值数组）、字符串（关联数组）或两者的组合（混合数组）。值可以是任何数据类型。


  ## 数值数组


  数值数组使用数字索引存储数组中的每个元素。使用`array`构造函数创建数组。此构造函数接受一个值列表，这些值被分配给数组的元素。


  ```

  $a = array(1,2,3);

  ```


  从 PHP 5.4 开始，可以使用更短的语法，其中数组构造函数被方括号取代。


  ```

  $a = [1,2,3];

  ```


  创建数组后，可以通过将所需元素的索引放在方括号中来引用其元素。请注意，索引从零开始。


  ```

  $a[0] = 1;

  $a[1] = 2;

  $a[2] = 3;

  ```


  数组中元素的数量是自动处理的。向数组添加新元素就像为其赋值一样简单。


  ```

  $a[3] = 4;

  ```


  也可以省略索引，将值添加到数组的末尾。如果变量尚未包含数组，此语法也会构造一个新数组。


  ```

  $a[] = 5; // $a[4]

  ```


  要检索数组中元素的值，请在方括号内指定该元素的索引。


  ```

  echo "$a[0] $a[1] $a[2] $a[3]"; // "1 2 3 4"

  ```


  ## 关联数组


  在关联数组中，键是字符串而不是数字索引，这为元素赋予了名称而不是数字。创建数组时，使用双箭头运算符（`=>`）来指示哪个键对应哪个值。


  ```

  $b = array(''one'' => ''a'', ''two'' => ''b'', ''three'' => ''c'');

  ```


  关联数组中的元素使用元素名称进行引用。它们不能使用数字索引引用。


  ```

  $b[''one'']   = ''a'';

  $b[''two'']   = ''b'';

  $b[''three''] = ''c'';


  echo $b[''one''] . $b[''two''] . $b[''three'']; // "abc"

  ```


  双箭头运算符也可以与数值数组一起使用，以决定值将放置在哪个元素中。


  ```

  $c = array(0 => 0, 1 => 1, 2 => 2);

  ```


  并非所有键都必须指定。如果键未指定，则该值将被分配给跟随先前使用的最大整数键之后的元素。


  ```

  $e = array(5 => 5, 6);

  ```


  ## 混合数组


  PHP 不区分关联数组和数值数组，因此每种数组的元素可以组合在同一个数组中。


  ```

  $d = array(0 => 1, ''foo'' => ''bar'');

  ```


  只需确保使用相同的键访问元素即可。


  ```

  echo $d[0] . $d[''foo'']; // "1bar"

  ```


  ## 多维数组


  多维数组是包含其他数组的数组。例如，可以按以下方式构建二维数组。


  ```

  $a = array(array(''00'', ''01''), array(''10'', ''11''));

  ```


  创建后，可以使用两组方括号修改元素。


  ```

  $a[0][0] = ''00'';

  $a[0][1] = ''01'';

  $a[1][0] = ''10'';

  $a[1][1] = ''11'';

  ```


  它们也以相同的方式被访问。


  ```

  echo $a[0][0] . $a[0][1] . $a[1][0] . $a[1][1];

  ```




  ### 键可以被赋予一个字符串名称，从而构成多维关联数组，也称为哈希表。


  ```

  $b = array(''one'' => array(''00'', ''01''));

  echo $b[''one''][0] . $b[''one''][1]; // "0001"

  ```


  通过添加额外的方括号对，多维数组可以拥有两个以上的维度。


  ```

  $c[][][][] = "0000"; // 四维数组

  ```


  '
- '# 第 6 章


  ![图片](img/frontdot.jpg)


  ## 条件语句


  条件语句用于根据不同的条件执行不同的代码块。


  ## If 语句


  只有当括号内的条件计算结果为 `true` 时，`if` 语句才会执行。该条件可以包含任何比较运算符和逻辑运算符。在 PHP 中，条件不必是布尔表达式。


  ```

  if ($x == 1) {

    echo "x is 1";

  }

  ```


  为了测试其他条件，`if` 语句可以通过任意数量的 `elseif` 子句进行扩展。只有当之前的所有条件均为假时，才会测试每个额外的条件。


  ```

  elseif ($x == 2) {

    echo "x is 2";

  }

  ```


  `if` 语句最后可以有一个 `else` 子句，如果之前的所有条件均为假，则会执行该子句。


  ```

  else {

    echo "x is something else";

  }

  ```


  至于花括号，如果只需要有条件地执行单个语句，则可以省略它们。


  ```

  if ($x == 1)

    echo "x is 1";

  elseif ($x == 2)

    echo "x is 2";

  else

    echo "x is something else";

  ```


  ## Switch 语句


  `switch` 语句检查一个整数、浮点数或字符串与一系列 `case` 标签之间的相等性。然后将执行流程传递给匹配的 case。该语句可以包含任意数量的 `case`
  子句，并且可以以一个 `default` 标签结尾，用于处理所有其他情况。


  ```

  switch ($x)

  {

    case 1: echo "x is 1"; break;

    case 2: echo "x is 2";  break;

    default: echo "x is something else";

  }

  ```


  请注意，每个 `case` 标签后的语句不需要用花括号括起来。相反，语句以 `break` 关键字结束，以便跳出 switch。如果没有 `break`，执行流程将会"穿透"到下一个
  case。如果多个 case 需要以相同方式求值，这会很有用。


  ## 替代语法


  PHP 为条件语句提供了替代语法。在这种语法中，`if` 语句的开始花括号被替换为冒号，结束花括号被移除，最后一个结束花括号被 `endif` 关键字替换。


  ```

  if ($x == 1):     echo "x is 1";

  elseif ($x == 2): echo "x is 2";

  else:             echo "x is something else";

  endif;

  ```


  类似地，`switch` 语句也有替代语法，它使用 `endswitch` 关键字来终止该语句。


  ```

  switch ($x):

    case 1:  echo "x is 1"; break;

    case 2:  echo "x is 2";  break;

    default: echo "x is something else";

  endswitch;

  ```


  对于较长的条件语句，替代语法通常更可取，因为这样可以更容易地看出这些语句在哪里结束。


  ## 混合模式


  在代码块的中间可以切换回 HTML 模式。这提供了另一种编写向网页输出文本的条件语句的方式。


  ```

  <?php if ($x == 1) { ?>

    This will show if $x is 1.

  <?php } else { ?>

    Otherwise this will show.

  <?php } ?>

  ```


  也可以使用替代语法来实现此目的，以使代码更清晰。


  ```

  <?php if ($x == 1): ?>

    This will show if $x is 1.

  <?php else: ?>

    Otherwise this will show.

  <?php endif; ?>

  ```


  在输出 HTML 和文本时，特别是输出较大块时，通常更倾向于使用这种编码风格，因为它更容易区分 PHP 代码和网页上出现的 HTML 内容。


  ## 三元运算符


  除了 `if` 和 `switch` 语句之外，还有三元运算符（`?:`）。此运算符可以替代单个 `if/else` 子句。该运算符接受三个表达式。如果第一个表达式计算结果为
  `true`，则返回第二个表达式；如果为 `false`，则返回第三个表达式。


  ```

  // 三元运算符表达式

  $y = ($x == 1) ? 1 : 2;

  ```




  在 PHP 中，此运算符不仅可以作为表达式使用，还可以用作语句。


  ```

  // 三元运算符语句

  ($x == 1) ? $y = 1 : $y = 2;

  ```


  编程术语*表达式*（*expression*）指的是可求值的代码，而*语句*（*statement*）则是以分号或右花括号结尾的代码段。


  '
- "# 第 7 章\n\n![image](img/frontdot.jpg)\n\n## 循环\n\nPHP 中有四种循环结构。它们用于多次执行特定的代码块。与条件判断中的\
  \ `if` 语句一样，如果代码块中只有一条语句，则循环的花括号可以省略。\n\n## While 循环\n\n`while` 循环仅在条件为 true 时执行代码块，并且只要条件保持为\
  \ true 就会继续循环。请注意，条件仅在每次迭代（循环）开始时检查。\n\n```\n$i = 0;\nwhile ($i < 10) { echo $i++;\
  \ } // 0-9\n```\n\n## Do-while 循环\n\n`do-while` 循环的工作方式与 `while` 循环相同，区别在于它在代码块执行之后检查条件。因此，它至少会执行一次代码块。请记住，此循环以分号结尾。\n\
  \n```\n$i = 0;\ndo { echo $i++; } while ($i < 10); // 0-9\n```\n\n## For 循环\n\n\
  `for` 循环用于按特定次数执行代码块。它使用三个参数。第一个参数初始化一个计数器，并在循环开始前始终执行一次。第二个参数包含循环的条件，在每次迭代前检查。第三个参数包含计数器的增量，在每次迭代结束时执行。\n\
  \n```\nfor ($i = 0; $i < 10; $i++) { echo $i; } // 0-9\n```\n\n`for` 循环有多种变体，因为其中任何一个参数都可以省略。例如，如果省略第一个和第三个参数，它的行为与\
  \ `while` 循环相同。\n\n```\nfor (;$i < 10;) { echo $i++; }\n```\n\n第一个和第三个参数也可以使用逗号运算符（`,`）拆分为多个语句。\n\
  \n```\nfor ($i = 0, $x = 9; $i < 10; $i++, $x--) {\n  echo $x; // 9-0\n}\n```\n\n\
  `sizeof` 函数用于获取数组中的元素数量。结合 `for` 循环，它可以用来遍历数字索引数组。\n\n```\n$a = array(1,2,3);\n\n\
  for($i = 0; $i < sizeof($a); $i++) {\n  echo $a[$i]; // \"123\"\n}\n```\n\n如果不需要跟踪迭代次数，`foreach`\
  \ 循环提供了更简洁的语法。遍历关联数组时也必须使用此循环。\n\n## Foreach 循环\n\n`foreach` 循环提供了一种遍历数组的简便方法。在每次迭代中，数组中的下一个元素被赋值给指定的变量（迭代器），并且循环会持续执行，直到遍历完整个数组。\n\
  \n```\n$a = array (1,2,3);\n\nforeach ($a as $v) {\n  echo $v; // \"123\"\n}\n```\n\
  \n`foreach` 循环有一个扩展用法，通过添加一个键变量，后跟双箭头运算符（`=>`），再放到迭代器前面，来同时获取键名或索引。\n\n```\n$a =\
  \ array ('one' => 1, 'two' => 2, 'three' => 3);\n\nforeach ($a as $k => $v) {\n\
  \  echo \"$k => $v <br>\";\n}\n```\n\n## 替代语法\n\n与条件语句一样，循环中的花括号可以重写为替代语法，使用冒号和\
  \ `endwhile`、`endfor` 或 `endforeach` 关键字之一。\n\n```\nwhile ($i < 10): echo $i++;\
  \ endwhile;\n\nfor ($i = 0; $i < 10; $i++): echo $i; endfor;\n\nforeach ($a as $v):\
  \ echo $v; endforeach;\n```\n\n这样做的主要好处是提高了可读性，尤其是在处理较长的循环时。\n\n## Break\n\n有两个特殊关键字可以在循环内部使用——`break`\
  \ 和 `continue`。`break` 关键字用于结束循环结构的执行。\n\n```\nfor (;;) { break; } // end for\n\
  ```\n\n它可以接受一个数值参数，用于指定要跳出多少层嵌套的循环结构。\n\n```\n$i = 0;\nwhile ($i++ < 10)\n{\n  for\
  \ (;;) { break 2; } // end for and while\n}\n```\n\n## Continue\n\n`continue` 关键字可用于任何循环语句中，以跳过当前循环的剩余部分，并继续执行下一次迭代的开头。\n\
  \n\n\n```\nwhile ($i++ < 10) { continue; } // 开始下一次迭代\n```\n\n该关键字可以接受一个参数，用于指定它应该跳过多少层外部循环的末尾。\n\
  \n```\n$i = 0;\nwhile ($i++ < 10)\n{\n  for (;;) { continue 2; } // 开始下一次 while\
  \ 迭代\n}\n```\n\n与许多其他语言不同，`continue` 语句同样适用于 `switch` 语句，其行为与 `break` 相同。因此，要从 `switch`\
  \ 内部跳过一次迭代，需要使用 `continue 2`。\n\n```\n$i = 0;\nwhile ($i++ < 10)\n{\n  switch ($i)\n\
  \  {\n    case 1: continue 2; // 开始下一次 while 迭代\n  }\n}\n```\n\nGoto\n\nPHP 5.3\
  \ 中引入的第三个跳转语句是 `goto`，它可以跳转到指定的标签。标签是一个名称后跟一个冒号（`:`）。\n\n```\ngoto myLabel; // 跳转到标签处\n\
  myLabel:      // 标签声明\n```\n\n目标标签必须位于同一个脚本文件和作用域内。因此，`goto` 不能用于跳入循环结构中，只能跳出。\n\
  \n```\nloop:\nwhile (!$finished)\n{\n  // ...\n  if ($try_again) goto loop; // 重新开始循环\n\
  }\n```\n\n通常，最好避免使用 `goto` 语句，因为它往往会使执行流程难以追踪。\n\n"
- '# 第 8 章


