  query($sql) as $row) { ?>\n\n```\n\n5.  保存页面并在浏览器中查看。它应该看起来像 PHP 解决方案 13-3 中的截图。你可以将代码与\
  \ `ch13` 文件夹中的 `pdo_02.php` 进行比较。\n\n## PDO 连接速查表\n\n表 13-2 总结了使用 PDO 进行连接和数据库查询的基本细节。某些命令将在后续章节中使用，但此处一并列出以便参考。\n\
  \n**表 13-2.** 使用 PDO 进行数据库连接\n\n| 操作 | 用法 | 说明 |\n| --- | --- | --- |\n| 连接 | `$conn\
  \ = new PDO($DSN,$u,$p);` | 实际使用时需要三个参数：数据源名称 (DSN)、用户名、密码。必须包裹在 `try/catch` 代码块中。\
  \ |\n| 提交 `SELECT` 查询 | `$result = $conn->query($sql);` | 以 `PDOStatement` 对象的形式返回结果。\
  \ |\n| 提取记录 | `foreach($conn->query($sql) as $row) {` | 一次操作中提交 `SELECT` 查询并将当前行作为关联数组获取。\
  \ |\n| 统计结果数 | `$numRows = $result->rowCount()` | 在 MySQL/MariaDB 中，返回 `SELECT`\
  \ 查询的结果数量。大多数其他数据库不支持。 |\n| 获取单个结果 | `$item = $result->fetchColumn();` | 获取结果第一列的第一条记录。要获取其他列的结果，请将列号（从\
  \ 0 开始计数）作为参数传入。 |\n| 获取下一条记录 | `$row = $result->fetch();` | 从结果集中将下一行作为关联数组获取。\
  \ |\n| 释放数据库资源 | `$result->closeCursor();` | 释放连接以允许执行新查询。 |\n| 提交非 `SELECT` 查询\
  \ | `$affected = $conn->exec($sql);` | 虽然 `query()` 可用于非 `SELECT` 查询，但 `exec()`\
  \ 会返回受影响的行数。 |\n\n## 使用 SQL 与数据库交互\n\n正如你刚看到的，PHP 负责连接数据库、发送查询并接收结果，但查询本身需要用 SQL\
  \ 编写。尽管 SQL 是一种通用标准，但它有许多方言。包括 MySQL 在内的每个数据库供应商都对标准语言进行了扩展。这些扩展提高了效率和功能性，但通常与其他数据库不兼容。本书中的\
  \ SQL 适用于 MySQL 5.1 或更高版本以及 MariaDB，但不一定适用于 Microsoft SQL Server、Oracle 或其他数据库。\n\
  \n### 编写 SQL 查询\n\nSQL 语法规则不多，而且都很简单。\n\n#### SQL 关键字不区分大小写\n\n从 `images` 表中检索所有记录的查询如下所示：\n\
  \n```\nSELECT * FROM images\n```\n\n大写的单词是 SQL 关键字。这纯粹是一种约定俗成的写法。以下写法都是正确的：\n\n\
  ```\nSELECT * FROM images\nselect * from images\nSeLEcT * fRoM images\n```\n\n虽然\
  \ SQL 关键字不区分大小写，但这*不*适用于数据库列名。使用大写字母作为关键字的优点在于能使 SQL 查询更易于阅读。你可以自由选择最适合自己的风格，但最后一种类似勒索信的风格最好避免使用。\n\
  \n#### 空格会被忽略\n\n这允许你将 SQL 查询分散在多行以提高可读性。唯一*不允许*存在空格的地方是函数名和左括号之间。以下写法会报错：\n\n```\n\
  SELECT COUNT (*) FROM images  /* 错误示例 */\n```\n\n空格需要像这样去掉：\n\n```\nSELECT COUNT(*)\
  \ FROM images  /* 正确 */\n```\n\n你可能已从这些示例中猜到，可以通过将注释放在 `/*` 和 `*/` 之间来为 SQL 查询添加注释。\n\
  \n#### 字符串必须加引号\n\n在 SQL 查询中，所有字符串都必须加引号。使用单引号还是双引号无关紧要，只要成对匹配即可。不过，通常最好使用 MySQLi\
  \ 或 PDO 的预处理语句，本章稍后将对此进行说明。\n\n#### 处理数字\n\n一般来说，数字不应加引号，因为引号内的任何内容都是字符串。但是，MySQL\
  \ 接受用引号括起来的数字，并将其视为等效的数字。请务必注意区分真正的数字和由数字组成的其他数据类型。例如，日期由数字组成，但应括在引号中并存储在日期相关的列类型中。同样，电话号码应括在引号中并存储在文本相关的列类型中。\n\
  \n#### 注意\n\nSQL 查询通常以分号结尾，这是指示数据库执行查询的指令。在使用 PHP 时，必须从 SQL 中省略分号。因此，本书中独立的 SQL\
  \ 示例在呈现时都不带结束分号。\n\n## 优化 SELECT 查询检索的数据\n\n到目前为止，你运行过的唯一 SQL 查询是从 `images` 表中检索所有记录。大多数情况下，你需要更有选择性。\n\
  \n### 选择特定列\n\n使用星号选择所有列是一种便捷的快捷方式，但通常应只指定所需的列。在 `SELECT` 关键字之后列出列名，并用逗号分隔。例如，此查询仅选择每条记录的\
  \ `filename` 和 `caption` 字段：\n\n```\nSELECT filename, caption FROM images\n```\n\
  \n你可以在 `ch13` 文件夹中的 `mysqli_03.php` 和 `pdo_03.php` 中测试这一点。\n\n### 更改结果排序顺序\n\n要控制排序顺序，请添加一个\
  \ `ORDER BY` 子句，其中按优先级顺序包含一个或多个列名。多个列名用逗号分隔。以下查询按字母顺序对 `images` 表中的标题进行排序（代码位于 `mysqli_04.php`\
  \ 和 `pdo_04.php` 中）：\n\n```\n$sql = 'SELECT * FROM images ORDER BY caption';\n```\n\
  \n**注意**\n此处的分号是 PHP 语句的一部分，不是 SQL 查询的一部分。\n\n上述查询产生如下输出：\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figg_HTML.jpg](img/332054_4_En_13_Figg_HTML.jpg)\n\
  \n要反转排序顺序，请像这样添加 `DESC`（表示“降序”）关键字（`mysqli_05.php` 和 `pdo_05.php` 中有示例）：\n\n```\n\
  $sql = 'SELECT * FROM images ORDER BY caption DESC';\n```\n\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figh_HTML.jpg](img/332054_4_En_13_Figh_HTML.jpg)\n\
  \n还有一个 `ASC`（表示“升序”）关键字。它是默认的排序顺序，因此通常省略。\n\n然而，当同一表中的列以不同顺序排序时，指定 `ASC` 可以提高清晰度。例如，如果你每天发布多篇文章，可以使用以下查询按字母顺序显示标题，但按发布日期排序，最新的在前：\n\
  \n```\nSELECT * FROM articles\nORDER BY published DESC, title ASC\n```\n\n### 搜索特定值\n\
  \n要搜索特定值，请在 `SELECT` 查询中添加一个 `WHERE` 子句。`WHERE` 子句跟在表名之后。例如，`mysqli_06.php` 和 `pdo_06.php`\
  \ 中的查询如下所示：\n\n```\n$sql = 'SELECT * FROM images\nWHERE image_id = 6';\n```\n\n\
  **注意**\nSQL 使用一个等号来测试相等性，这与 PHP 使用两个等号不同。\n\n\n\n它会产生如下结果：  \n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figi_HTML.jpg](img/332054_4_En_13_Figi_HTML.jpg)\n\
  \n除了测试相等性外，`WHERE` 子句还可以使用比较运算符，例如大于（`>`）和小于（`<`）。这里不一一列举所有选项，我将在需要时再介绍其他运算符。第 15\
  \ 章对四个主要的 SQL 命令：`SELECT`、`INSERT`、`UPDATE` 和 `DELETE` 进行了全面总结，其中包含与 `WHERE` 一起使用的主要比较运算符列表。\n\
  \n如果与 `ORDER BY` 结合使用，`WHERE` 子句必须放在前面。例如（代码位于 `mysqli_07.php` 和 `pdo_07.php` 中）：\n\
  \n```\n$sql = 'SELECT * FROM images\nWHERE image_id > 5\nORDER BY caption DESC';\n\
  ```\n\n这会选择 `image_id` 大于 5 的三张图片，并按说明文字的降序对它们进行排序。\n\n## 使用通配符搜索文本\n\n在 SQL 中，百分号（`%`）是一个通配符，可以匹配任何内容或不匹配任何内容。它与\
  \ `LIKE` 关键字一起在 `WHERE` 子句中使用。\n\n位于 `mysqli_08.php` 和 `pdo_08.php` 中的查询语句如下：\n\n\
  ```\n$sql = 'SELECT * FROM images\nWHERE caption LIKE \"%Kyoto%\"';\n```\n\n它会搜索\
  \ `images` 表中所有 `caption` 列包含“Kyoto”的记录，并产生如下结果：  \n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figj_HTML.jpg](img/332054_4_En_13_Figj_HTML.jpg)\n\
  \n如上截图所示，它会从 `images` 表的八条记录中找到六条。所有说明文字都以“Kyoto”结尾，因此结尾处的通配符未匹配任何内容，而开头的通配符则匹配了每条说明文字的其余部分。如果省略开头的通配符（`\"\
  Kyoto%\"`），查询将搜索以“Kyoto”开头的说明文字。但没有一条记录以“Kyoto”开头，因此搜索不会返回任何结果。\n\n位于 `mysqli_09.php`\
  \ 和 `pdo_09.php` 中的查询语句如下：\n\n```\n$sql = 'SELECT * FROM images\nWHERE caption LIKE\
  \ \"%maiko%\"';\n```\n\n它会产生如下结果：  \n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figk_HTML.jpg](img/332054_4_En_13_Figk_HTML.jpg)\n\
  \n查询中“maiko”全部是小写字母，但查询也能找到首字母大写的记录。使用 `LIKE` 的搜索是不区分大小写的。\n\n要执行区分大小写的搜索，需要添加 `BINARY`\
  \ 关键字，如下所示（代码位于 `mysqli_10.php` 和 `pdo_10.php` 中）：\n\n```\n$sql = 'SELECT * FROM\
  \ images\nWHERE caption LIKE BINARY \"%maiko%\"';\n```\n\n到目前为止，您看到的所有示例都是硬编码的，但大多数情况下，SQL\
  \ 查询中使用的值需要来自用户输入。如果不加注意，这会使您面临一种称为 **SQL 注入** 的恶意利用风险。本章的其余部分将解释这种危险以及如何避免它。\n\n\
  ## 理解 SQL 注入的危险\n\n**SQL 注入** 与我在第 6 章中告诫过您的电子邮件头注入非常相似。注入攻击试图在 SQL 查询中插入虚假条件，以试图暴露或破坏您的数据。以下查询的含义应该很容易理解：\n\
  \n```\nSELECT * FROM users WHERE username = 'xyz' AND pwd = 'abc'\n```\n\n这是登录应用程序的基本模式。如果查询找到一条\
  \ `username` 为 `xyz` 且 `pwd` 为 `abc` 的记录，则表明提交了正确的用户名和密码组合，因此登录成功。攻击者所需要做的只是像这样注入一个额外条件：\n\
  \n```\nSELECT * FROM users WHERE username = 'xyz' AND pwd = 'abc' OR 1 = 1\n```\n\
  \n`OR` 意味着只需要其中一个条件为真，因此即使没有正确的用户名和密码，登录也会成功。SQL 注入依赖于当部分查询源自变量或用户输入时，引号和其他控制字符未被正确转义。\n\
  \n根据具体情况，您可以采用几种策略来防止 SQL 注入：\n\n*   如果变量是整数（例如，记录的主键），请使用 `is_numeric()` 和 `(int)`\
  \ 转型运算符来确保将其插入查询是安全的。\n*   使用**预准备语句**。在预准备语句中，SQL 查询中的占位符代表来自用户输入的值。PHP 代码会自动将字符串包裹在引号中，并转义嵌入的引号和其他控制字符。MySQLi\
  \ 和 PDO 的语法不同。\n*   前述策略均不适用于列名，因为列名不能加引号。要将变量用作列名，请创建一个可接受值的数组，并在将其插入查询之前检查提交的值是否在该数组中。\n\
  \n让我们来看一下这些技术的每一种用法。\n\n**注意**  \n我没有将 MySQLi 的 `real_escape_string()` 或 PDO 的 `quote()`\
  \ 方法列为防止 SQL 注入的技术，因为两者都不能提供万无一失的保护。请使用预准备语句将用户输入的值嵌入到 SQL 查询中。\n\n## PHP 解决方案 13-6：将用户输入的整数插入查询\n\
  \n该 PHP 解决方案演示了如何在将用户输入的值插入 SQL 查询之前，对其进行清理以确保该值只包含整数。该技术对于 MySQLi 和 PDO 是相同的。\n\
  \n1.  将 `ch13` 文件夹中的 `mysqli_integer_01.php` 或 `pdo_integer_01.php` 复制到 `mysqli`\
  \ 或 `pdo` 文件夹，并从文件名中删除 `_01`。每个文件都包含一个从 `images` 表中选择 `image_id` 和 `filename` 列的\
  \ SQL 查询。在页面的主体部分，有一个包含下拉菜单的表单，该菜单由一个循环填充，该循环遍历 SQL 查询的结果。MySQLi 版本如下所示：\n\n   \
  \ ```\n    <?php while ($row = $result->fetch_assoc()) { ?>\n        <option value=\"\
  <?= $row['image_id'] ?>\" <?php if ($_GET['image_id'] == $row['image_id']) echo\
  \ 'selected' ?>>\n            <?= $row['filename'] ?>\n        </option>\n    <?php\
  \ } ?>\n    ```\n\n表单使用 `get` 方法，并将 `image_id` 分配给 `<option>` 标签的 `value` 属性。如果\
  \ `$_GET['image_id']` 的值与 `$row['image_id']` 的值相同，则当前的 `image_id` 与通过页面查询字符串传递的相同，因此会将\
  \ `selected` 属性添加到开头的 `<option>` 标签中。`$row['filename']` 的值被插入在开头的 `<option>` 和结尾的\
  \ `</option>` 标签之间。\n\nPDO 版本除了使用 PDO 的 `fetch()` 方法直接在 `foreach` 循环中运行查询这一点不同外，其他完全相同。\n\
  \n如果在浏览器中加载该页面，您会看到一个列出 `images` 文件夹中文件的下拉菜单，如下所示：  \n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figl_HTML.jpg](img/332054_4_En_13_Figl_HTML.jpg)\n\
  \n2.  在结束的 `</form>` 标签之后立即插入以下代码。除了其中一行之外，该代码对于 MySQLi 和 PDO 是相同的。\n\n    ```\n\
  \    <?php\n    if (isset($_GET['image_id'])) {\n        $image_id = (int) $_GET['image_id'];\n\
  \        $error = ($image_id == 0) ? true : false;\n        if (!$error) {\n   \
  \         $sql = \"SELECT filename, caption FROM images WHERE image_id = $image_id\"\
  ;\n            $result = $conn->query($sql);\n            $row = $result->fetch_assoc();\n\
  \            ?>\n            <h2><?= $row['caption'] ?></h2>\n            <img src=\"\
  images/<?= $row['filename'] ?>\" alt=\"<?= $row['caption'] ?>\">\n            <?php\n\
  \        } else {\n            echo 'Image not found';\n        }\n    }\n    ?>\n\
  \    ```\n\n条件语句检查 `image_id` 是否已通过 `$_GET` 数组发送。如果已发送，则使用 `(int)` 转型运算符将其赋值给 `$image_id`。使用转型运算符有两个目的：它可以防止通过提交浮点数来尝试探测脚本的错误消息，并将非数值转换为\
  \ 0。\n\n下一行使用三元运算符，根据 `$image_id` 是否为 0 将 `$error` 设置为 `true` 或 `false`。\n\n如果 `$error`\
  \ 为 `false`，脚本将查询数据库并显示选中的图片和说明文字。由于您知道 `$image_id` 是一个整数，因此可以直接将其插入 SQL 查询中，这是安全的。因为它是一个数字，所以不需要用引号包裹，但赋值给\
  \ `$sql` 的字符串需要使用双引号，以确保 `$image_id` 的值被插入到查询中。\n\n\n\n"
- "# 文档排版结果\n\n新查询通过 `query()` 方法提交给 MySQL，并将结果存储在 `$row` 中。最后，使用 `$row['filename']`\
  \ 和 `$row['caption']` 在页面中显示图像及其说明文字。\n\n然而，如果 `$error` 为 `true`，则最后的条件语句会显示“未找到图像”。\n\
  \n**提示** 我选择使用单独的条件语句来显示“未找到图像”，是因为计划稍后检查另一个错误，并希望两个错误共享同一条错误信息。\n\n2. 如果你使用的是 PDO\
  \ 版本，请找到这一行：\n\n```\n$row = $result->fetch_assoc();\n```\n\n将其修改为：\n\n```\n$row\
  \ = $result->fetch();\n```\n\n3. 保存页面并加载到浏览器中。页面首次加载时，仅显示下拉菜单。\n\n4. 从下拉菜单中选择一个文件名，然后点击`Display`。你选择的图像应该会显示出来，如下面的截图所示：\n\
  \n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figm_HTML.jpg](img/332054_4_En_13_Figm_HTML.jpg)\n\
  \n如果遇到问题，请对照 `ch13` 文件夹中的 `mysqli_integer_02.php` 或 `pdo_integer_02.php` 检查你的代码。\n\
  \n5. 在浏览器中编辑查询字符串，将 `image_id` 的值改为一个字符串。你应该会看到“未找到图像”。但是，如果该字符串以 1 到 8 之间的数字开头，你将看到与该数字对应的图像和说明文字。\n\
  \n6. 尝试输入一个介于 1.0 到 8.9 之间的浮点数。对应的图像会正常显示。\n\n7. 尝试输入一个超出 1 到 8 范围的值。不会显示任何错误信息，因为查询本身没有问题。它只是查找一个不存在的值。在这个例子中，这无关紧要。你只会看到一个破损的图像图标。但通常情况下，你应该使用\
  \ MySQLi 的 `num_rows` 属性或 PDO 的 `rowCount()` 方法来检查查询返回的行数。\n\nMySQLi 的代码修改如下：\n\n\
  ```\n$result = $conn->query($sql);\nif ($result->num_rows) {\n    $row = $result->fetch_assoc();\n\
  \    ?>\n    \">\n\n$error = true;\n    }\n}\nif ($error) {\n    echo 'Image not\
  \ found';\n}\n} ?>\n```\n\n对于 PDO，使用 `$result->rowCount()` 代替 `$result->num_rows`。\n\
  \n如果查询未返回任何行，PHP 会将 0 隐式视为 `false`，因此条件失败，转而执行 `else` 子句，将 `$error` 设为 `true`。\n\
  \n显示“未找到图像”的条件语句本可以移入 `else` 块中，但此脚本包含多个嵌套条件。将其分开处理能让脚本更容易阅读，并便于理解条件逻辑。\n\n8. 再次测试页面。当你从下拉菜单中选择一张图像时，它会像之前一样正常显示。但如果你尝试在查询字符串中输入一个超出范围的值，则会看到以下信息：\n\
  \n![../images/332054_4_En_13_Chapter/332054_4_En_13_Fign_HTML.jpg](img/332054_4_En_13_Fign_HTML.jpg)\n\
  \n修改后的代码位于 `ch13` 文件夹中的 `mysqli_integer_03.php` 和 `pdo_integer_03.php` 文件。\n\n##\
  \ 使用预处理语句处理用户输入\n\nMySQLi 和 PDO 都支持预处理语句，这提供了重要的安全特性。预处理语句是一种 SQL 查询模板，它为每个可变的值包含一个占位符。这不仅使在\
  \ PHP 代码中嵌入变量更加容易，而且还能防止 SQL 注入攻击，因为在执行查询之前，引号和其他字符会自动被转义。\n\n使用预处理语句的其他优势在于，当同一查询被多次使用时，效率更高。此外，你还可以将\
  \ `SELECT` 查询中每个列的结果绑定到命名变量，从而更容易显示输出。\n\nMySQLi 和 PDO 都使用问号作为匿名占位符，如下所示：\n\n```\n\
  $sql = 'SELECT image_id, filename, caption FROM images WHERE caption LIKE ?';\n\
  ```\n\nPDO 还支持使用命名占位符。命名占位符以冒号开头，后跟标识符，如下所示：\n\n```\n$sql = 'SELECT image_id, filename,\
  \ caption FROM images WHERE caption LIKE :search';\n```\n\n**注意** 占位符不需要用引号包裹，即使它们代表的值是字符串也是如此。这使得构建\
  \ SQL 查询变得容易得多，因为无需担心单引号和双引号的正确组合。\n\n占位符仅能用于列值。它们不能用于 SQL 查询的其他部分，例如列名或运算符。这是因为包含非数字字符的值在执行\
  \ SQL 时会自动转义并用引号包裹。列名和运算符不能用引号包裹。\n\n与直接提交查询相比，预处理语句需要稍多的代码，但占位符使 SQL 的读写更容易，且过程更安全。\n\
  \nMySQLi 和 PDO 的语法不同，因此以下部分将分别介绍它们。\n\n## 在 MySQLi 预处理语句中嵌入变量\n\n使用 MySQLi 预处理语句涉及多个阶段。\n\
  \n### 初始化语句\n\n要初始化预处理语句，请在数据库连接上调用 `stmt_init()` 方法并将其存储在一个变量中，如下所示：\n\n```\n$stmt\
  \ = $conn->stmt_init();\n```\n\n### 准备语句\n\n然后，将 SQL 查询传递给语句的 `prepare()` 方法。这会检查你是否在错误的位置使用了问号占位符，并确保所有内容整合后，该查询是有效的\
  \ SQL。\n\n如果存在任何错误，`prepare()` 方法会返回 `false`，因此通常会将后续步骤包含在条件语句中，以确保仅在所有内容正常时才运行。\n\
  \n可以通过语句的 `error` 属性访问错误信息。\n\n### 将值绑定到占位符\n\n将问号替换为变量中实际值的过程在技术上称为**绑定参数**。正是这一步保护你的数据库免受\
  \ SQL 注入攻击。\n\n按照变量插入 SQL 查询的相同顺序，将变量传递给语句的 `bind_param()` 方法，同时传递第一个参数来指定每个变量的数据类型，顺序同样与变量一致。数据类型必须由以下四个字符之一指定：\n\
  \n- `b`：二进制（如图像、Word 文档或 PDF 文件）\n- `d`：双精度（浮点数）\n- `i`：整数（整数）\n- `s`：字符串（文本）\n\n\
  传递给 `bind_param()` 的变量数量必须与问号占位符的数量完全一致。例如，要传递单个字符串值，可以使用：\n\n```\n$stmt->bind_param('s',\
  \ $_GET['words']);\n```\n\n要传递两个值，`SELECT` 查询需要两个问号作为占位符，并且两个变量都需要通过 `bind_param()`\
  \ 绑定，如下所示：\n\n```\n$sql = 'SELECT * FROM products WHERE price < ? AND type = ?';\n\
  $stmt = $conn->stmt_init();\n$stmt->prepare($sql);\n$stmt->bind_param('ds', $_GET['price'],\
  \ $_GET['type']);\n```\n\n`bind_param()` 的第一个参数 `'ds'` 指定 `$_GET['price']` 为浮点数，`$_GET['type']`\
  \ 为字符串。\n\n### 执行语句\n\n一旦语句被准备并且值被绑定到占位符，就调用语句的 `execute()` 方法。然后可以从语句对象中获取 `SELECT`\
  \ 查询的结果。对于其他类型的查询，此步骤即为过程的终点。\n\n### 绑定结果（可选）\n\n或者，你可以使用 `bind_result()` 方法将 `SELECT`\
  \ 查询的结果绑定到变量。这避免了提取每一行后，再以 `$row['column_name']` 的形式访问结果的麻烦。\n\n\n\n为了绑定结果，你必须在`SELECT`查询中具体地命名每一列。按相同顺序列出你想使用的变量，并将它们作为参数传递给`bind_result()`。例如，假设你的\
  \ SQL 看起来像这样：\n\n```php\n$sql = 'SELECT image_id, filename, caption FROM images\
  \ WHERE caption LIKE ?';\n```\n\n要绑定查询的结果，请使用以下代码：\n\n```php\n$stmt->bind_result($image_id,\
  \ $filename, $caption);\n```\n\n这允许你直接以`$image_id`、`$filename`和`$caption`的形式访问结果。\n\
  \n**存储结果（可选）**\n\n当你对`SELECT`查询使用预处理语句时，结果是无缓冲的。这意味着它们会保留在数据库服务器上，直到你获取它们。这样做的优点是需要更少的内存，特别是在结果集包含大量行的情况下。然而，无缓冲结果施加了以下限制：\n\
  \n*   一旦结果被获取，它们就不再存储在内存中。因此，你不能重复使用同一个结果集。\n*   在所有结果被获取或清除之前，你不能在同一数据库连接上运行另一个查询。\n\
  *   你不能使用`num_rows`属性来找出结果集中有多少行。\n*   你不能使用`data_seek()`来移动到结果集中的特定行。\n\n为了避免这些限制，你可以选择使用语句的`store_result()`方法来存储结果集。但是，如果你只是想立即显示结果而不在以后重用，则无需先存储它。\n\
  \n> **注意**\n> 要清除无缓冲结果，请调用语句的`free_result()`方法。\n\n**获取结果**\n\n要循环遍历已经通过预处理语句执行的`SELECT`查询的结果，请使用`fetch()`方法。如果你已将结果绑定到变量，请像这样操作：\n\
  \n```php\nwhile ($stmt->fetch()) {\n    // 显示每一行的绑定变量\n}\n```\n\n如果你没有将结果绑定到变量，请使用`$row\
  \ = $stmt->fetch()`并将每个变量作为`$row['column_name']`访问。\n\n**关闭语句**\n\n当你完成预处理语句的使用后，`close()`方法会释放使用的内存。\n\
  \n**PHP 解决方案 13-7：在搜索中使用 MySQLi 预处理语句**\n\n此 PHP 解决方案展示了如何将 MySQLi 准备好的语句与`SELECT`查询一起使用；它还演示了将结果绑定到命名变量。\n\
  \n1.  从`ch13`文件夹复制`mysqli_prepared_01.php`，并将其保存到`mysqli`文件夹中，名称为`mysqli_prepared.php`。该文件包含一个搜索表单和一个用于显示结果的表格。\n\
  \n2.  在`DOCTYPE`声明上方的 PHP 代码块中，创建一个条件语句以包含`connection.php`和`utility_funcs.php`，并在提交搜索表单时创建一个只读连接。代码如下所示：\n\
  \n```php\nif (isset($_GET['go'])) {\n    require_once '../includes/connection.php';\n\
  \    require_once '../includes/utility_funcs.php';\n    $conn = dbConnect('read');\n\
  }\n```\n\n3.  接下来，在条件语句内部添加 SQL 查询。该查询需要命名你要从`images`表中检索的三列。使用问号作为搜索词的占位符，如下所示：\n\
  \n```php\n$sql = 'SELECT image_id, filename, caption FROM images\nWHERE caption\
  \ LIKE ?';\n```\n\n4.  在将用户提交的搜索词传递给`bind_param()`方法之前，你需要向其中添加通配符并将其分配给一个新变量，如下所示：\n\
  \n```php\n$searchterm = '%'. $_GET['search'] .'%';\n```\n\n5.  你现在可以创建预处理语句。`DOCTYPE`声明上方的\
  \ PHP 块中的完成代码如下所示：\n\n```php\nif (isset($_GET['go'])) {\n    require_once '../includes/connection.inc.php';\n\
  \    $conn = dbConnect('read');\n    $sql = 'SELECT image_id, filename, caption\
  \ FROM images\n    WHERE caption LIKE ?';\n    $searchterm = '%'. $_GET['search']\
  \ .'%';\n    $stmt = $conn->stmt_init();\n    if ($stmt->prepare($sql)) {\n    \
  \    $stmt->bind_param('s', $searchterm);\n        $stmt->execute();\n        $stmt->bind_result($image_id,\
  \ $filename, $caption);\n        $stmt->store_result();\n        $numRows = $stmt->num_rows;\n\
  \    } else {\n        $error = $stmt->error;\n    }\n}\n```\n\n这将初始化预处理语句并将其分配给`$stmt`。然后，\
  \ SQL 查询被传递给`prepare()`方法，该方法检查查询语法的有效性。如果语法有问题，`else`块会将错误消息分配给`$error`。如果语法没有错误，则执行条件语句内的其余脚本。\n\
  \n条件语句内的第一行将`$searchterm`绑定到`SELECT`查询，替换问号占位符。第一个参数告诉预处理语句将其视为字符串。\n\n执行预处理语句后，下一行将`SELECT`查询的结果绑定到`$image_id`、`$filename`和`$caption`。这些变量需要与查询中的顺序相同。我已将变量命名为它们所代表的列，但你可以使用任何你想要的变量。\n\
  \n然后存储结果。请注意，你只需调用语句对象的`store_result()`方法即可存储结果。与使用`query()`不同，你不需要将`store_result()`的返回值分配给变量。如果你这样做，它只是`true`或`false`，具体取决于结果是否成功存储。\n\
  \n最后，从语句对象的`num_rows`属性获取查询检索到的行数，并将其存储在`$numRows`中。\n\n6.  在开始的`<body>`标签之后添加一个条件语句，以便在发生问题时显示错误消息：\n\
  \n```php\n<?php if (isset($error)) {\n    echo \"<p>$error</p>\";\n} ?>\n```\n\n\
  7.  在搜索表单之后添加以下代码以显示结果：\n\n```php\n<?php if (isset($numRows)) { ?>\n    <h2>Number\
  \ of results for \"<?= $_GET['search'] ?>\": <?= $numRows ?></h2>\n    <?php if\
  \ ($numRows) { ?>\n        <table>\n            <tr>\n                <th>image_id</th>\n\
  \                <th>filename</th>\n                <th>caption</th>\n         \
  \   </tr>\n            <?php while ($stmt->fetch()) { ?>\n                <tr>\n\
  \                    <td><?= $image_id ?></td>\n                    <td><?= $filename\
  \ ?></td>\n                    <td><?= $caption ?></td>\n                </tr>\n\
  \            <?php } ?>\n        </table>\n    <?php } ?>\n<?php } ?>\n```\n\n第一个条件语句包裹着段落和表格，防止它们在`$numRows`不存在时显示（当页面首次加载时会发生这种情况）。如果表单已提交，则会设置`$numRows`，因此会重新显示搜索词，并且`$numRows`的值会报告匹配的数量。\n\
  \n如果查询没有返回结果，`$numRows`为 0，它被视为`false`，因此表格不会显示。如果`$numRows`包含任何非零值，则会显示表格。显示结果的`while`循环调用预处理语句的`fetch()`方法。无需将当前记录存储为`$row`，因为每列的值已绑定到`$image_id`、`$filename`和`$caption`。\n\
  \n8.  保存页面并将其加载到浏览器中。在搜索字段中输入一些文本，然后单击`Search`。结果数量将与包含搜索词的所有标题一起显示，如以下屏幕截图所示：\n\
  \n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figo_HTML.jpg](img/332054_4_En_13_Figo_HTML.jpg)\n\
  \n你可以将你的代码与`ch13`文件夹中的`mysqli_prepared_02.php`进行比较。\n\n**在 PDO 预处理语句中嵌入变量**\n\n\
  PDO 预处理语句提供匿名和命名占位符两种选择。\n\n**使用匿名占位符**\n\n匿名占位符的使用方式与 MySQLi 完全相同，都使用问号：\n\n```php\n\
  $sql = 'SELECT image_id, filename, caption FROM images WHERE caption LIKE ?';\n\
  ```\n\n**使用命名占位符**\n\n命名占位符以冒号开头，像这样：\n\n\n```sql\n$sql = 'SELECT image_id, filename,\
  \ caption FROM images WHERE caption LIKE :search';\n```\n\n使用命名占位符（named placeholders）使代码更易于理解，特别是当你选择基于包含要嵌入\
  \ SQL 的值的变量名时。\n\n### 准备语句（Preparing the statement）\n\n准备和初始化语句在一个步骤中完成（与需要两个步骤的\
  \ MySQLi 不同）。你将带有占位符的 SQL 直接传递给连接对象的`prepare()`方法，该方法返回准备好的语句，如下所示：\n\n```php\n\
  $stmt = $conn->prepare($sql);\n```\n\n### 将值绑定到占位符（Binding values to the placeholders）\n\
  \n有几种不同的方法可以将值绑定到占位符。使用匿名占位符时，最简单的方法是创建一个与占位符顺序相同的值数组，然后将该数组传递给语句的`execute()`方法。即使只有一个占位符，也必须使用数组。例如，要将`$searchterm`绑定到一个匿名占位符，你必须用方括号将它括起来，如下所示：\n\
  \n```php\n$stmt->execute([$searchterm]);\n```\n\n你也可以类似地将值绑定到命名占位符，但传递给`execute()`方法的参数必须是一个关联数组，使用命名占位符作为每个值的键。因此，以下代码将`$searchterm`绑定到`:search`命名占位符：\n\
  \n```php\n$stmt->execute([':search' => $searchterm]);\n```\n\n或者，你可以使用语句的`bindParam()`和`bindValue()`方法在调用`execute()`方法之前绑定值。当与匿名占位符一起使用时，这两个方法的第一个参数是一个数字（从\
  \ 1 开始计数），表示占位符在 SQL 中的位置。对于命名占位符，第一个参数是作为字符串的命名占位符。第二个参数是你要插入到查询中的值。\n\n然而，这两种方法之间有一个微妙的区别：\n\
  \n*   使用`bindParam()`时，第二个参数*必须*是一个变量。它不能是字符串、数字或任何其他类型的表达式。\n*   使用`bindValue()`时，第二个参数应该是一个字符串、数字或表达式。但它也可以是一个变量。\n\
  \n由于`bindValue()`接受任何类型的值，`bindParam()`可能显得多余。区别在于，传递给`bindValue()`的参数的值必须是已知的，因为它绑定的是实际值，而`bindParam()`只绑定变量。因此，该值可以在之后赋值给变量。\n\
  \n为了说明区别，我们使用“使用命名占位符”中的`SELECT`查询。`:search`占位符跟在`LIKE`关键字之后，因此该值需要与通配符组合。试图执行以下操作会产生错误：\n\
  \n```php\n// 这不会生效\n$stmt->bindParam(':search', '%'. $_GET['search'] .'%');\n```\n\
  \n你无法使用`bindParam()`将通配符连接到变量上。通配符需要在变量作为参数传递之前添加，如下所示：\n\n```php\n$searchterm =\
  \ '%'. $_GET['search'] .'%';\n$stmt->bindParam(':search', $searchterm);\n```\n\n\
  或者，你可以将表达式构建为`bindValue()`的参数。\n\n```php\n// 这会生效\n$stmt->bindValue(':search', '%'.\
  \ $_GET['search'] .'%');\n```\n\n`bindParam()`和`bindValue()`方法接受一个可选的第三个参数：一个指定数据类型的常量。主要的常量如下：\n\
  \n*   `PDO::PARAM_INT`：整数（整型）\n*   `PDO::PARAM_LOB`：二进制（如：图像、Word 文档或 PDF 文件）\n\
  *   `PDO::PARAM_STR`：字符串（文本）\n*   `PDO::PARAM_BOOL`：布尔值（真或假）\n*   `PDO::PARAM_NULL`：空值\n\
  \n`PDO::PARAM_NULL`在你想将数据库列的值设置为`null`时非常有用。例如，如果主键是自动递增的，你需要在插入新记录时传递`null`作为值。以下是使用`bindValue()`将名为`:id`的命名参数设置为`null`的方法：\n\
  \n```php\n$stmt->bindValue(':id', NULL, PDO::PARAM_NULL);\n```\n\n注意：没有一个用于浮点数的\
  \ PDO 常量。\n\n### 执行语句（Executing the statement）\n\n如果你使用`bindParam()`或`bindValue()`将值绑定到占位符，你只需调用不带参数的`execute()`方法：\n\
  \n```php\n$stmt->execute();\n```\n\n否则，按上一节所述传递一个值数组。在这两种情况下，查询的结果都存储在`$stmt`中。\n\
  \n错误信息的访问方式与 PDO 连接相同。但是，不是在连接对象上调用`errorInfo()`方法，而是在 PDO 语句对象上使用它，如下所示：\n\n```php\n\
  $error = $stmt->errorInfo()[2];\n```\n\n如果没有错误，`$error`将为`null`。否则，它将包含一个描述问题的字符串。\n\
  \n### （可选）绑定结果（Binding the results (optional)）\n\n要将`SELECT`查询的结果绑定到变量，每个列需要使用`bindColumn()`方法单独绑定，该方法接受两个参数。第一个参数可以是列的名称，也可以是从\
  \ 1 开始计数的列编号。该编号来自`SELECT`查询中的列位置，而不是其在数据库表中的显示顺序。因此，要将我们一直使用的 SQL 示例中的`filename`列的结果绑定到`$filename`，以下两种方式都是可以接受的：\n\
  \n```php\n$stmt->bindColumn('filename', $filename);\n$stmt->bindColumn(2, $filename);\n\
  ```\n\n因为每个列是单独绑定的，所以不需要绑定所有列。然而，这样做会更方便，因为它避免了将`fetch()`方法的结果赋值给数组。\n\n### 获取结果（Fetching\
  \ the result）\n\n要获取`SELECT`查询的结果，请调用语句的`fetch()`方法。如果你使用了`bindColumn()`将输出绑定到变量，你可以直接使用这些变量。否则，它将返回一个当前行的数组，该数组既可以通过列名索引，也可以通过从\
  \ 0 开始的列编号索引。\n\n注意：你可以通过向 PDO 的`fetch()`方法传递一个常量作为参数来控制其输出类型。请参阅[`https://php.net/manual/en/pdostatement.fetch.php`](https://php.net/manual/en/pdostatement.fetch.php)。\n\
  \n## PHP 解决方案 13-8：在搜索中使用 PDO 预处理语句（Using a PDO Prepared Statement in a search）\n\
  \n该 PHP 解决方案展示了如何将用户从搜索表单提交的值嵌入到带有 PDO 预处理语句的`SELECT`查询中。它使用了与 PHP 解决方案 13-7 中 MySQLi\
  \ 版本相同的搜索表单。\n\n1.  从`ch13`文件夹复制`pdo_prepared_01.php`并将其保存到`pdo`文件夹中，命名为`pdo_prepared.php`。\n\
  2.  在`DOCTYPE`声明上方的 PHP 代码块中添加以下代码：\n\n```php\nif (isset($_GET['go'])) {\n    require_once\
  \ '../includes/connection.php';\n    require_once '../includes/utility_funcs.php';\n\
  \    $conn = dbConnect('read', 'pdo');\n    $sql = 'SELECT image_id, filename, caption\
  \ FROM images\n    WHERE caption LIKE :search';\n    $stmt = $conn->prepare($sql);\n\
  \    $stmt->bindValue(':search', '%' . $_GET['search'] . '%');\n    $stmt->execute();\n\
  \    $error = $stmt->errorInfo()[2];\n    if (!$error) {\n        $stmt->bindColumn('image_id',\
  \ $image_id);\n        $stmt->bindColumn('filename', $filename);\n        $stmt->bindColumn(3,\
  \ $caption);\n        $numRows = $stmt->rowCount();\n    }\n}\n```\n\n当表单被提交时，此代码包含连接文件并创建一个\
  \ `PDO` 只读连接。预处理语句使用`:search`作为命名参数，代替用户提交的值。\n\n`%`通配符在绑定到预处理语句的同时与搜索词连接。因此，这里使用了`bindValue()`而不是`bindParam()`。\n\
  \n在语句执行后，调用语句的`errorInfo()`方法，查看是否生成了错误信息并存储在`$errorInfo[2]`中。\n```\n\n\n如果没有问题，结果会通过`bindColumn()`方法绑定到`$image_id`、`$filename`和`$caption`。前两个使用列名，但`caption`列通过其在`SELECT`查询中的位置（从\
  \ 1 开始计数）来引用。\n\n3. 显示结果的代码与 PHP Solution 13-7 中的步骤 6 和 7 完全相同。你可以在`ch13`文件夹中的`pdo_prepared_02.php`中查看完整的代码。\n\
  \n## PHP Solution 13-9: 调试 PDO 预处理语句\n\n有时，数据库查询不会产生预期的结果。当这种情况发生时，查看脚本实际发送到数据库服务器的内容会很有帮助。对于\
  \ MySQLi，没有简单的方法来检查预处理语句插入到 SQL 查询中的值。但对于 PDO，这非常容易——前提是你的服务器运行的是 PHP 7.2 或更高版本。\n\
  \n1. 继续使用上一个 PHP 解决方案中的`pdo_prepared.php`。或者，将`ch13`文件夹中的`pdo_prepared_02.php`复制到`pdo`文件夹，并将其重命名为`pdo_prepared.php`。\n\
  \n2. 修改结束的`</table>`标签后的代码，如下所示：\n\n```\n    ';\n    $stmt->debugDumpParams();\n\
  \    echo '';\n    }\n    ?>\n    ```\n\n这会插入一对`<pre>`标签，使`PDOStatement`对象的`debugDumpParams()`方法的输出更易读。\n\
  \n3. 保存文件，在浏览器中加载它，并执行搜索。除了搜索结果之外，你应该会看到类似以下截图的输出：\n\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figp_HTML.jpg](img/332054_4_En_13_Figp_HTML.jpg)\n\
  \nSQL 查询显示了两次。第一次显示的是 PHP 代码中的查询——在本例中，包括命名参数`:search`。第二次显示的是实际发送到数据库服务器的值。\n\n\
  在本例中，搜索\"fount\"返回了一个以\"Fountains\"开头的标题。如果这是你期望的结果，那没问题。但假设你只想要精确匹配，看到`%`通配符就能解释这个意外结果，从而更容易调试那些未产生预期结果的预处理语句问题。\n\
  \n你可以将代码与`ch13`文件夹中的`pdo_prepared_03.php`进行比较。\n\n> **注意**\n> 在调用`debugDumpParams()`之前，务必先调用`execute()`方法。PHP\
  \ 7.2 之前的版本只显示带有匿名或命名参数的预处理语句。\n\n## PHP Solution 13-10: 通过用户输入更改列选项\n\n此 PHP 解决方案演示如何通过用户输入更改`SELECT`查询中的\
  \ SQL 关键字名称。SQL 关键字不能用引号括起来，因此使用预处理语句不起作用。相反，你需要确保用户输入与预期值的数组匹配。如果找不到匹配项，则使用默认值。该技术对\
  \ MySQLi 和 PDO 相同。\n\n1. 从`ch13`文件夹中复制`mysqli_order_01.php`或`pdo_order_01.php`，并将其保存到`mysqli`或`pdo`文件夹中。两个版本都从`images`表中选择所有记录，并在表格中显示结果。页面还包含一个表单，允许用户选择用于按升序或降序排列结果的列名。在初始状态下，表单处于非活动状态。页面默认按`image_id`升序显示详细信息，如下所示：\n\
  \n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figq_HTML.jpg](img/332054_4_En_13_Figq_HTML.jpg)\n\
  \n1. 修改`DOCTYPE`声明上方 PHP 块中的代码，如下所示（以下清单显示的是 PDO 版本，但以**粗体**突出显示的更改对于 MySQLi 是相同的）：\n\
  \n```\n    require_once '../includes/connection.php';\n    require_once '../includes/utility_funcs.php';\n\
  \    // connect to database\n    $conn = dbConnect('read', 'pdo');\n    // set default\
  \ values\n    $col = 'image_id';\n    $dir = 'ASC';\n    // create arrays of permitted\
  \ values\n    $columns = ['image_id', 'filename', 'caption'];\n    $direction =\
  \ ['ASC', 'DESC'];\n    // if the form has been submitted, use only expected values\n\
  \    if (isset($_GET['column']) && in_array($_GET['column'], $columns)) {\n    $col\
  \ = $_GET['column'];\n    }\n    if (isset($_GET['direction']) && in_array($_GET['direction'],\
  \ $direction)) {\n    $dir = $_GET['direction'];\n    }\n    // prepare the SQL\
  \ query using sanitized variables\n    $sql = \"SELECT * FROM images\n    ORDER\
  \ BY $col $dir\";\n    // submit the query and capture the result\n    $result =\
  \ $conn->query($sql);\n    $error = $conn->errorInfo()[2];\n    ```\n\n新代码定义了两个变量`$col`和`$dir`，它们直接嵌入到`SELECT`查询中。由于它们已分配了默认值，当页面首次加载时，查询会按`image_id`列升序显示结果。\n\
  \n然后，两个数组`$columns`和`$direction`定义了允许的值：列名以及`ASC`和`DESC`关键字。条件语句使用这些数组来检查`$_GET`数组中的`column`和`direction`。提交的值仅在与`$columns`和`$direction`数组中的值匹配时，才会重新赋值给`$col`和`$dir`。这可以防止任何尝试向\
  \ SQL 查询注入非法值的行为。\n\n2. 编辑下拉菜单中的`<option>`标签，使其显示`$col`和`$dir`的选中值，如下所示：\n\n```\n\
  \n>image_id\n\n>filename\n\n>caption\n\n>Ascending\n\n>Descending\n\n```\n\n3. 保存页面并在浏览器中测试。你可以通过选择下拉菜单中的值并点击`Change`来更改显示的排序顺序。但是，如果你尝试通过查询字符串注入非法值，页面将使用`$col`和`$dir`的默认值，以按`image_id`升序显示结果。\n\
  \n你可以对照`ch13`文件夹中的`mysqli_order_02.php`和`pdo_order_02.php`来检查你的代码。\n\n## 章节回顾\n\n\
  PHP 7 提供了两种与 MySQL 通信的方法：\n\n*   **MySQL 改进版 (MySQLi) 扩展**：建议所有新的 MySQL 项目使用它。它比从\
  \ PHP 7 中移除的原始 MySQL 扩展效率更高。它具有预处理语句的附加安全性，并且与 MariaDB 完全兼容。\n*   **PHP 数据对象 (PDO)\
  \ 抽象层，它是数据库中立的**：这是我首选的与数据库通信的方法。它不仅数据库中立，而且具有为预处理语句使用命名参数的优势，使代码更易于阅读和理解。此外，在 PHP\
  \ 7.2 及更高版本中调试预处理语句非常简单。尽管代码是数据库中立的，但 PDO 需要为所选数据库安装正确的驱动程序。MySQL 的驱动程序与 MariaDB\
  \ 完全兼容，并且通常已安装。其他驱动程序不太常见。但是，如果安装了正确的驱动程序，只需更改连接字符串中的数据源名称 (DSN)，即可从一个数据库切换到另一个数据库。\n\
  \n\n\n# 14. 创建动态相册\n\n尽管 PHP 能与数据库通信并存储结果，但查询仍需使用 SQL 编写——这是查询关系型数据库的标准语言。本章展示了如何通过`SELECT`语句检索数据库表中的信息，利用`WHERE`子句细化搜索条件，并使用`ORDER\
  \ BY`改变排序顺序。你还学习了几种防止 SQL 注入的查询保护技术，包括使用占位符替代直接嵌入变量的预处理语句。\n\n在下一章中，你将通过创建在线相册将所学知识付诸实践。\n\
  \n上一章主要侧重于以文本形式提取`images`表的内容。本章将在此基础上发展，构建图 14-1 所示的迷你相册。\n\n![../images/332054_4_En_14_Chapter/332054_4_En_14_Fig1_HTML.jpg](img/332054_4_En_14_Fig1_HTML.jpg)\n\
  \n*图 14-1. 该迷你相册通过从数据库提取信息驱动*\n\n该相册还展示了一些你可能会想引入文本驱动页面的炫酷功能。例如，左侧的缩略图网格每行显示两张图片。只需修改两个数字，你就可以随心所欲地调整网格的列数和行数。点击任意缩略图会替换主图像和说明文字。虽然重新加载的是同一页面，但使用的技术完全相同——在线商品目录正是通过这种技术跳转至包含更多产品详情的页面。缩略图网格底部的“下一页”链接可显示下一组照片，其原理与你浏览长串搜索结果时翻页的技术完全一致。这个相册绝非徒有虚表……本章涵盖以下内容：\n\
  \n- 理解为何将图像存储在数据库中并非良策，以及应采用的替代方案\n- 规划动态相册的布局\n- 在表格行中显示固定数量的结果\n- 限制每次检索的记录数量\n\
  - 对长串结果进行分页浏览\n\n## 为何不将图像存储在数据库？\n\n`images`表包含文件名和说明文字，但不包含图像本身。尽管你可以将二进制对象（如图像）存储在数据库中，但我并不打算这样做，原因很简单——这通常弊大于利。主要问题如下：\n\
  \n- 若不单独存储文本信息，则无法对图像进行索引或搜索。\n- 图像通常体积较大，会膨胀表的大小。如果数据库存储空间有限，你可能会面临空间不足的风险。\n-\
  \ 若频繁删除图像，表碎片化会影响性能。\n- 从数据库检索图像需将图像传递给独立脚本，这会拖慢网页显示速度。\n\n更高效的做法是将图像存储在你的网站普通文件夹中，并使用数据库存储图像的相关信息。你只需要两样东西：文件名和可同时用作`alt`文本的说明文字。一些开发者会将图像的完整路径存入数据库，但我认为仅存储文件名能提供更大的灵活性。`images`文件夹的路径将被嵌入\
  \ HTML 中。无需存储图像的宽度和高度。正如你在第 5 章和第 10 章中看到的，你可以使用 PHP 的`getimagesize()`函数动态生成这些信息。\n\
  \n## 规划相册\n\n我发现设计数据库驱动网站的最佳方式是从静态页面开始，并用占位符文本和图像填充内容。然后创建 CSS 样式规则，使页面达到理想效果，最后将每个占位符元素替换为\
  \ PHP 代码。每次替换后，我都会在浏览器中检查页面，确保一切正常。\n\n图 14-2 展示了我制作的静态相册模型，并标出了需要转换为动态代码的元素。这些图像与第\
  \ 5 章中随机图像生成器使用的图像相同，且尺寸各不相同。我尝试过缩放图像来创建缩略图，但觉得结果过于杂乱，因此将缩略图设为标准尺寸（80 × 54 像素）。此外，为了方便起见，我为每个缩略图赋予了与大版本相同的文件名，并将它们存储在`images`文件夹下一个名为`thumbs`的子文件夹中。\n\
  \n![../images/332054_4_En_14_Chapter/332054_4_En_14_Fig2_HTML.jpg](img/332054_4_En_14_Fig2_HTML.jpg)\n\
  \n*图 14-2. 明确将静态相册转换为动态相册所需完成的工作*\n\n在上一章中，显示`images`表的内容很简单。你创建了一个单行表格，每个字段的内容放在单独的表格单元格中。通过循环遍历结果集，每条记录都显示在独立行中，模拟了数据库表的列结构。但这次，缩略图网格的两列结构不再与数据库结构匹配。在创建下一行之前，你需要计数一行中已插入的缩略图数量。\n\
  \n确定需要完成的工作后，我删除了缩略图 2 到 6 以及导航链接的代码。以下代码清单显示了`gallery.php`中`<main>`元素剩余的内容，其中需要转换为\
  \ PHP 代码的元素以粗体突出显示（你可以在`ch14`文件夹的`gallery_01.php`中找到该代码）：\n\n```\n日本映像\n正在显示 1 到\
  \ 6 项，共 8 项\n\n京都龙安寺的水钵\n```\n\n## 将相册元素转换为 PHP\n\n在显示相册内容之前，你需要连接到`phpsols`数据库并检索`images`表中存储的所有记录。执行此操作的步骤与上一章相同，使用以下简单的\
  \ SQL 查询：\n\n```\nSELECT filename, caption FROM images\n```\n\n然后，你可以使用第一条记录来显示第一张图像及其关联的说明文字和缩略图。你不需要`image_id`。\n\
  \n### PHP 解决方案 14-1：显示第一张图像\n\n如果你在第 5 章中设置了 Japan Journey 网站，可以直接使用原始的`gallery.php`。或者，从`ch14`文件夹复制`gallery_01.php`，并将其保存到`phpsols-4e`站点根目录下，命名为`gallery.php`。你还需要将`title.php`、`menu.php`和`footer.php`复制到`phpsols-4e`站点的`includes`文件夹中。如果你的编辑程序询问是否要更新文件中的链接，请选择不更新。\n\
  \n1. 在浏览器中加载`gallery.php`，确保其正确显示。页面主要部分应如图 14-3 所示，包含一张缩略图及其同图的大尺寸版本。\n\n![../images/332054_4_En_14_Chapter/332054_4_En_14_Fig3_HTML.jpg](img/332054_4_En_14_Fig3_HTML.jpg)\n\
  \n*图 14-3. 静态相册的简化版本，准备进行转换*\n\n2. 相册依赖于数据库连接，因此请包含`connection.php`，创建到`phpsols`数据库的只读连接，并定义\
  \ SQL 查询。在`gallery.php`中`DOCTYPE`声明上方的关闭 PHP 标签之前添加以下代码（新代码以粗体突出显示）：\n\n\n\n```php\n\
  include './includes/title.php';\nrequire_once './includes/connection.php';\nrequire_once\
  \ './includes/utility_funcs.php';\n$conn = dbConnect('read');\n$sql = 'SELECT filename,\
  \ caption FROM images';\n```\n\n如果使用 PDO，请将 `'pdo'` 作为第二个参数传递给 `dbConnect()`。\n\n\
  3.  提交查询并从结果中提取第一条记录的代码取决于你使用的连接方法。对于 MySQLi，请使用以下代码：\n\n```php\n// 提交查询\n$result\
  \ = $conn->query($sql);\nif (!$result) {\n    $error = $conn->error;\n} else {\n\
  \    // 将第一条记录提取为数组\n    $row = $result->fetch_assoc();\n}\n```\n\n对于 PDO，请使用以下代码：\n\
  \n```php\n// 提交查询\n$result = $conn->query($sql);\n// 获取所有错误信息\n$error = $conn->errorInfo()[2];\n\
  if (!$error) {\n    // 将第一条记录提取为数组\n    $row = $result->fetch();\n}\n```\n\n要在页面加载时显示第一张图片，你需要在创建最终将显示缩略图网格的循环之前，先检索第一个结果。MySQLi\
  \ 和 PDO 的代码都会提交查询、提取第一条记录，并将其存储在 `$row` 中。\n\n4.  现在，第一条记录图片的详细信息已存储为 `$row['filename']`\
  \ 和 `$row['caption']`。除了文件名和说明外，你还需要大图的尺寸，以便在页面主体中显示。在提取第一个结果的代码之后，立即在 `else` 代码块中添加以下代码：\n\
  \n```php\n// 获取主图的名称和说明\n$mainImage = safe($row['filename']);\n$caption = safe($row['caption']);\n\
  // 获取主图的尺寸\n$imageSize = getimagesize('images/'.$mainImage)[3];\n```\n\n数据库中的文本值通过上一章定义的\
  \ `safe()` 函数进行清洗。\n\n如第 10 章所述，`getimagesize()` 返回一个数组，其第四个元素包含一个字符串，该字符串包含图片的宽度和高度，可用于插入到\
  \ `<img>` 标签中。我们只对第四个元素感兴趣，因此可以使用第 7 章介绍的数组解引用技术。在 `getimagesize()` 的右括号后添加 `[3]`\
  \ 将只返回数组的第四个元素，并将其赋给 `$imageSize`。\n\n5.  现在，你可以利用这些信息动态显示缩略图、主图和说明。主图和缩略图名称相同，但你最终需要通过遍历整个结果集来显示所有缩略图。因此，放在表格单元格中的动态代码需要引用当前记录——换句话说，是\
  \ `$row['filename']` 和 `$row['caption']`，而不是 `$mainImage` 和 `$caption`。它们还需要通过传递给\
  \ `safe()` 函数进行清洗。稍后你会明白我为什么将第一条记录的值赋给了单独的变量。请像这样修改表格中的代码：\n\n```html\n\" alt=''\
  \ width='80' height='54'>\n```\n\n6.  如果查询出现问题，你需要检查 `$error` 是否等于 `true`，并阻止画廊的显示。在\
  \ `<h2>` Japan 图片标题之后，立即添加一个包含以下条件语句的 PHP 块：\n\n```php\n<?= $error ?>\n<?php } else\
  \ { ?>\n```\n\n**提示** 尽管步骤 3 中 PDO 版本的脚本为 `$error` 赋了值，但你可以在此处使用 `isset($error)`，因为如果查询成功执行，其值为\
  \ `null`。向 `isset()` 传递 `null` 会返回 `false`。\n\n7.  在结束的 `</main>` 标签之前（大约第 55 行）插入一个新行，并添加一个包含\
  \ `else` 块右花括号的 PHP 块：\n\n```php\n<?php } ?>\n```\n\n8.  保存 `gallery.php` 并在浏览器中查看。它看起来应该与图\
  \ 14-3 相同。唯一的区别是缩略图及其 `alt` 文本是动态生成的。你可以通过查看源代码来验证这一点。原始的静态版本有一个空的 `alt` 属性，但如下面的截图所示，它现在包含了第一条记录的说明：\n\
  \n![../images/332054_4_En_14_Chapter/332054_4_En_14_Figa_HTML.jpg](img/332054_4_En_14_Figa_HTML.jpg)\n\
  \n如果出现问题，请确保图片的 `src` 属性中静态文本和动态生成的文本之间没有间隙。同时检查你是否使用了与数据库所创建连接类型对应的正确代码。你可以将代码与\
  \ `ch14` 文件夹中的 `gallery_mysqli_02.php` 或 `gallery_pdo_02.php` 进行对照。\n\n1.  确认你已成功从数据库获取详细信息后，就可以转换主图的代码。像这样修改它（新代码以粗体显示）：\n\
  \n```php\n\" alt='' >\n```\n\n`$mainImage` 和 `$caption` 不需要传递给 `safe()` 函数，因为它们已经在步骤\
  \ 4 中被清洗过了。\n\n`$imageSize` 会插入一个包含主图正确 `width` 和 `height` 属性的字符串。\n\n2.  再次测试页面。它看起来应该与图\
  \ 14-3 相同，但图片和说明是从数据库动态提取的，并且 `getimagesize()` 正在计算主图的正确尺寸。你可以将代码与 `ch14` 文件夹中的\
  \ `gallery_mysqli_03.php` 或 `gallery_pdo_03.php` 进行对照。\n\n## 构建动态元素\n\n转换静态页面后的第一个任务是显示所有缩略图，然后构建动态链接，以便能够显示任何被点击的缩略图的大图版本。显示所有缩略图很容易——只需遍历它们即可（我们稍后会研究如何将它们以两行一组的格式显示）。激活每个缩略图的链接则需要多考虑一些。你需要一种方法来告诉页面要显示哪张大图。\n\
  \n### 通过查询字符串传递信息\n\n在上一节中，你使用 `$mainImage` 来标识大图，因此你需要一种在每次点击缩略图时改变其值的方法。解决方案是将图片的文件名添加到链接\
  \ URL 末尾的查询字符串中，如下所示：\n\n```html\n<a href='gallery.php?image=filename.jpg'>\n```\n\
  \n然后，你可以检查 `$_GET` 数组是否包含一个名为 `image` 的元素。如果包含，则更改 `$mainImage` 的值。如果不包含，则保持 `$mainImage`\
  \ 为结果集中第一条记录的文件名。\n\n### PHP 解决方案 14-2：激活缩略图\n\n继续使用上一节中的同一个文件。或者，将 `gallery_mysqli_03.php`\
  \ 或 `gallery_pdo_03.php` 复制到 `phpsols-4e` 站点根目录，并将其保存为 `gallery.php`。\n\n1.  找到包裹缩略图的链接的起始\
  \ `<a>` 标签。它看起来像这样：\n\n```php\n<?php\n```\n\n将其更改为：\n\n```php\n<?php\necho \"<a\
  \ href='gallery.php?image={$row['filename']}'>\";\n```\n\n这会在 `href` 属性的末尾添加一个查询字符串，将当前文件名赋给一个名为\
  \ `image` 的变量。确保 `?image=` 周围没有空格至关重要。\n\n2.  保存页面并在浏览器中加载。将鼠标指针悬停在缩略图上，并检查状态栏中显示的\
  \ URL。它应该如下所示：\n\n```\nhttp://localhost/phpsols-4e/gallery.php?image=basin.jpg\n\
  ```\n\n如果状态栏中没有显示任何内容，请点击缩略图。页面不应改变，但地址栏中的 URL 现在应该包含查询字符串。检查 URL 或查询字符串中是否有间隙。\n\
  \n\n\n3.  要显示所有缩略图，你需要将表格单元格包裹在一个循环中。在关于重复行的 HTML 注释后插入一个新行，并创建一个`do... while`循环的前半部分，如下所示（有关不同类型循环的详细信息，请参见第\
  \ 4 章）：\n\n4.  结果集中第一条记录的详细信息已经获取，因此获取后续记录的代码需要放在结束的`</td>`标签之后。在结束的`</td>`和`</tr>`标签之间留出一些空间，并插入以下代码。对于不同的数据库连接方法，代码略有不同。\n\
  \n    对于 MySQLi，请使用以下代码：\n\n    ```\n    <?php $row = $result->fetch_assoc()); ?>\n\
  \    ```\n\n    对于 PDO，请使用以下代码：\n\n    ```\n    <?php $row = $result->fetch());\
  \ ?>\n    ```\n\n    这会获取结果集中的下一行，并将循环送回顶部。由于`$row['filename']`和`$row['caption']`的值不同，下一个缩略图及其关联的`alt`文本将被插入到一个新的表格单元格中。查询字符串也会用新的文件名进行更新。\n\
  \n5.  保存页面并在浏览器中测试。现在你应该能看到所有八个缩略图在画廊顶部排成一行，如下面的截图所示。\n\n    ![../images/332054_4_En_14_Chapter/332054_4_En_14_Figb_HTML.jpg](img/332054_4_En_14_Figb_HTML.jpg)\n\
  \n    将鼠标指针悬停在每个缩略图上，你应该能看到查询字符串显示文件名。你可以对照`gallery_mysqli_04.php`或`gallery_pdo_04.php`检查你的代码。\n\
  \n6.  点击缩略图仍然没有任何反应，因此你需要创建改变主图像及其关联说明文的逻辑。在`DOCTYPE`声明上方的代码块中找到以下代码段：\n\n    ```\n\
  \    // 获取主图像的文件名和说明文\n    $mainImage = safe($row['filename']);\n    $caption =\
  \ safe($row['caption']);\n    ```\n\n    高亮定义`$caption`的那一行并将其剪切到剪贴板。将另一行包裹在如下条件语句中：\n\
  \n    ```\n    // 获取主图像的文件名\n    if (isset($_GET['image'])) {\n        $mainImage\
  \ = safe($_GET['image']);\n    } else {\n        $mainImage = safe($row['filename']);\n\
  \    }\n    ```\n\n    `$_GET`数组包含通过查询字符串传递的值，因此如果设置了（定义了）`$_GET['image']`，它会从查询字符串中获取文件名并将其存储为`$mainImage`。如果`$_GET['image']`不存在，则像之前一样从结果集中的第一条记录中获取值。\n\
  \n7.  最后，你需要获取主图像的说明文。它不再每次都相同，因此你需要将其移动到`thumbs`表中显示缩略图的循环中。它应紧跟在循环的左花括号之后（大约第\
  \ 48 行）。将光标定位在花括号之后并插入几行，然后粘贴你在上一步中剪切的说明文定义。你需要让说明文与主图像匹配，因此如果当前记录的文件名与`$mainImage`相同，那就是你要找的。将刚刚粘贴的代码包裹在如下条件语句中：\n\
  \n8.  保存页面并在浏览器中重新加载。这次，当你点击一个缩略图时，主图像和说明文将会改变。不用担心某些图像和说明文被页脚遮挡。当缩略图移动到主图像的左侧时，这种情况会自动修正。\n\
  \n    **注意** 像这样通过查询字符串传递信息是使用 PHP 和数据库结果的一个重要方面。虽然表单信息通常通过`$_POST`数组传递，但`$_GET`数组经常用于传递你想要显示、更新或删除的记录详情。它也常用于搜索，因为查询字符串可以轻松地添加书签。\n\
  \n9.  在这种情况下没有 SQL 注入的危险。但是，如果有人改变了通过查询字符串传递的文件名的值，并且`display_errors`处于开启状态，那么在找不到图像时你将会看到难看的错误消息。在调用`getimagesize()`之前，让我们先检查图像是否存在。将其包裹在如下条件语句中：\n\
  \n    ```\n    if (file_exists('images/'.$mainImage)) {\n        // 获取主图像的尺寸\n \
  \       $imageSize = getimagesize('images/'.$mainImage)[3];\n    } else {\n    \
  \    $error = 'Image not found.';\n    }\n    ```\n\n10. 尝试将查询字符串中`image`的值改为除存在文件之外的任何值。当你加载页面时，应该会看到`Image\
  \ not found`。\n\n    如有必要，请对照`gallery_mysqli_05.php`或`gallery_pdo_05.php`检查你的代码。\n\
  \n## 创建多列表格\n\n只有八张图像时，画廊顶部单行缩略图的显示效果还不算太差。然而，能够通过使用一个循环动态构建表格是非常有用的，该循环在移动到下一行之前，会在当前行中插入指定数量的表格单元格。这是通过记录已经插入了多少个单元格来实现的。当一行达到限制时，代码需要为当前行插入一个结束标签，并且如果还有更多缩略图，还需要为下一行插入一个开始标签。使其易于实现的是取模运算符`%`，它返回除法的余数。\n\
  \n其工作原理如下。假设每行需要两个单元格。插入第一个单元格后，计数器设置为`1`。如果用取模运算符将`1`除以`2`（`1 % 2`），结果是`1`。当插入下一个单元格时，计数器增加到`2`。`2\
  \ % 2`的结果是`0`。下一个单元格产生这个计算：`3 % 2`，结果是`1`；但第四个单元格产生`4 % 2`，结果又是`0`。因此，每次计算结果为`0`时，你就知道——更准确地说，PHP\
  \ 知道——到达了一行的末尾。\n\n那么，如何知道是否还有剩余的行呢？通过将插入关闭和开启`<tr>`标签的代码放在循环的顶部，必须始终至少剩下一张图像。然而，循环第一次运行时，余数也是`0`，所以问题在于你需要等到至少显示了一张图像后才能插入这些标签。呼……让我们试一试。\n\
  \n## PHP 解法 14-3：水平和垂直循环\n\n这个 PHP 解法展示了如何控制循环，以便在表格中显示特定数量的列。列数通过设置一个常量来控制。继续使用上一节中的文件。或者，使用`gallery_mysqli_05.php`或`gallery_pdo_05.php`。\n\
  \n1.  你可能会在稍后阶段决定改变表格中的列数，因此在脚本顶部创建一个常量是个好主意，这样便于查找，而不是将数字深埋在代码中。在创建数据库连接之前插入以下代码：\n\
  \n    ```\n    // 定义表格中的列数\n    define('COLS', 2);\n    ```\n\n    **常量**与变量类似，不同之处在于其值不能被脚本的其他部分更改。你可以通过`define()`函数创建常量，该函数接受两个参数：常量的名称（例如`COLS`）和它的值。按照惯例，常量总是大写且区分大小写。与变量不同，它们不以美元符号开头。\n\
  \n2.  你需要在循环外部初始化单元格计数器。同时创建一个指示是否为第一行的变量。在你刚刚定义的常量之后立即添加以下代码：\n\n    ```\n    define('COLS',\
  \ 2);\n    // 初始化水平循环的变量\n    $pos = 0;\n    $firstRow = true;\n    ```\n\n\n\n\
  ### 3. 用于统计列数的代码需要放在显示缩略图的循环开始处的 PHP 代码块内。请按如下方式修改代码：\n\n```\n    ';\n    }\n  \
  \  // 循环开始时，此值不再为 true\n    $firstRow = false;\n    ?>\n```\n\n由于递增运算符（`++`）位于 `$pos`\
  \ 之后，其值在被 `1` 递增之前先被列数除。循环首次运行时余数为 `0`，但 `$firstRow` 为 `true`，因此条件语句不成立。然而，在条件语句之后，`$firstRow`\
  \ 被重置为 `false`。在后续循环迭代中，每当余数为 `0` 时，条件语句会关闭当前表格行并开始新的一行。\n\n### 4. 如果没有更多记录了，你需要检查表格底部是否存在未完成的行。在现有的\
  \ `do...while` 循环之后添加一个 `while` 循环。在 MySQLi 版本中，代码如下所示：\n\n```\n    fetch_assoc());\n\
  \    while ($pos++ % COLS) {\n        echo '&nbsp;';\n    }\n    ?>\n```\n\n新代码在\
  \ PDO 版本中完全相同。唯一的区别在于前一行使用的是 `$result->fetch()` 而不是 `$result->fetch_assoc()`。\n\n\
  第二个循环会持续递增 `$pos`，只要 `$pos++ % COLS` 产生余数（被解释为 `true`），就会插入一个空单元格。\n\n**注意** 这个第二个循环并非嵌套在第一个循环内部。它只在第一个循环结束后才运行。\n\
  \n### 5. 保存页面并在浏览器中重新加载。画廊顶部单行的缩略图现在应该整齐地两两排列，如图 14-4 所示。\n\n![../images/332054_4_En_14_Chapter/332054_4_En_14_Fig4_HTML.jpg](img/332054_4_En_14_Fig4_HTML.jpg)\n\
  \n**图 14-4.** 缩略图现在排列成整齐的列\n\n尝试更改 `COLS` 的值并重新加载页面。由于页面仅为两列设计，主图像可能会发生偏移，但你可以看到通过仅更改一个数字就能轻松控制每行的单元格数量。你可以将代码与\
  \ `gallery_mysqli_06.php` 或 `gallery_pdo_06.php` 进行对照。\n\n## 对长记录集进行分页\n\n八张缩略图的网格在画廊中相当合适，但如果你有\
  \ 28 张或 48 张呢？答案是限制每页显示的结果数量，然后构建一个导航系统，让你可以在结果集中前后翻页。你在使用搜索引擎时已经无数次见过这种技术；现在你将学习如何自己构建它。该任务可以分为以下两个阶段：\n\
  \n1.  选择要显示的子记录集\n2.  创建用于翻页浏览子集的导航链接\n\n尽管这两个阶段都需要应用一些条件逻辑，但实现起来相对容易。保持冷静，你就能轻松掌握。\n\
  \n## 选择子记录集\n\n限制每页的结果数量很简单——只需在 SQL 查询中添加 `LIMIT` 关键字，如下所示：\n\n```\nSELECT filename,\
  \ caption FROM images LIMIT startPosition, maximum\n```\n\n`LIMIT` 关键字后面可以跟一个或两个数字。如果只使用一个数字，它设置的是要检索的最大记录数。这很有用，但不适用于分页系统。为此，你需要使用两个数字：第一个数字指示从哪条记录开始，第二个数字规定要检索的最大记录数。MySQL\
  \ 从 0 开始计数记录，因此要显示前六张图片，你需要以下 SQL：\n\n```\nSELECT filename, caption FROM images\
  \ LIMIT 0, 6\n```\n\n要显示下一组，SQL 需要更改为：\n\n```\nSELECT filename, caption FROM images\
  \ LIMIT 6, 6\n```\n\n`images` 表中只有八条记录，但第二个数字只是一个最大值，因此这会检索第 7 和第 8 条记录。\n\n要构建导航系统，你需要一种生成这些数字的方法。第二个数字从不改变，所以我们定义一个名为\
  \ `SHOWMAX` 的常量。生成第一个数字（称之为 `$startRecord`）也非常容易。从 0 开始为页面编号，并将第二个数字乘以当前页码。因此，如果你将当前页面称为\
  \ `$curPage`，公式如下：\n\n```\n$startRecord = $curPage * SHOWMAX;\n```\n\n而对于 SQL，则变成：\n\
  \n```\nSELECT filename, caption FROM images LIMIT $startRecord, SHOWMAX\n```\n\n\
  如果 `$curPage` 为 0，则 `$startRecord` 也为 0（0 × 6），但当 `$curPage` 增加到 1 时，`$startRecord`\
  \ 变为 6（1 × 6），依此类推。\n\n由于 `images` 表中只有八条记录，你需要一种找出总记录数的方法，以防止导航系统检索到空结果集。在上一章中，你使用了\
  \ MySQLi 的 `num_rows` 属性和 PDO 的 `rowCount()`。然而，这次这行不通，因为你想知道的是总记录数，而不是*当前*结果集中的记录数。答案是使用\
  \ SQL 的 `COUNT()` 函数，如下所示：\n\n```\nSELECT COUNT(*) FROM images\n```\n\n当与星号结合使用时，`COUNT()`\
  \ 会获取表中的总记录数。因此，要构建导航系统，你需要同时运行两个 SQL 查询：一个用于查找总记录数，另一个用于检索所需的子集。这些是简单查询，因此结果几乎是即时的。\n\
  \n稍后我会处理导航链接。让我们先从限制第一页上的缩略图数量开始。\n\n## PHP 解法 14-4：显示子记录集\n\n本 PHP 解法展示了如何选择子记录集，为创建用于更长记录集翻页的导航系统做准备。它还演示了如何显示当前选择的编号以及总记录数。\n\
  \n继续使用之前的同一个文件。或者，使用 `gallery_mysqli_06.php` 或 `gallery_pdo_06.php`。\n\n### 1. 定义\
  \ `SHOWMAX` 和用于查找表中总记录数的 SQL 查询。按如下方式修改页面顶部的代码（新代码以粗体显示）：\n\n```\n    // 初始化水平循环变量\n\
  \    $pos = 0;\n    $firstRow = true;\n    // 设置最大记录数\n    define('SHOWMAX', 6);\n\
  \    $conn = dbConnect('read');\n    // 准备获取总记录数的 SQL\n    $getTotal = 'SELECT COUNT(*)\
  \ FROM images';\n```\n\n### 2. 现在你需要运行新的 SQL 查询。该代码紧接在上一步的代码之后，但根据 MySQL 连接类型的不同而有所不同。对于\
  \ MySQLi，使用以下代码：\n\n```\n    // 提交查询并将结果存储为 $totalPix\n    $total = $conn->query($getTotal);\n\
  \    $totalPix = $total->fetch_row()[0];\n```\n\n这会提交查询，然后使用 `fetch_row()` 方法，该方法从\
  \ `MySQLi_Result` 对象中获取单行作为索引数组。结果中只有一列，因此我们可以通过在调用 `fetch_row()` 后添加方括号 `[0]` 来使用数组解引用获取\
  \ `images` 表中的总记录数。\n\n对于 PDO，使用以下代码：\n\n```\n    // 提交查询并将结果存储为 $totalPix\n   \
  \ $total = $conn->query($getTotal);\n    $totalPix = $total->fetchColumn();\n```\n\
  \n这会提交查询，然后使用 `fetchColumn()` 获取单个结果，并将其存储在 `$totalPix` 中。\n\n### 3. 接下来，设置 `$curPage`\
  \ 的值。你稍后创建的导航链接将通过查询字符串传递所需页面的值，因此你需要检查 `curPage` 是否在 `$_GET` 数组中。如果是，则使用该值，但在其前面加上\
  \ `(int)` 类型转换运算符以确保它是一个整数。否则，将当前页面设置为 0。在上一步的代码之后立即插入以下代码：\n\n\n```php\n// 设置当前页\n\
  $curPage = (isset($_GET['curPage'])) ? (int) $_GET['curPage'] : 0;\n```\n\n4.  现在你已经具备了计算起始行和构建\
  \ SQL 查询以检索记录子集所需的所有信息。紧接上一步的代码之后，添加以下代码：\n\n```php\n// 计算子集的起始行\n$startRow = $curPage\
  \ * SHOWMAX;\n```\n\n5.  但这里存在一个问题。`$curPage` 的值来自查询字符串。如果有人在浏览器地址栏中手动修改了这个数字，`$startRow`\
  \ 可能会大于数据库中的记录数。如果 `$startRow` 的值超过了 `$totalPix`，则需要将 `$startRow` 和 `$curPage` 都重置为\
  \ `0`。在上一步代码之后添加这个条件语句：\n\n```php\nif ($startRow > $totalPix) {\n    $startRow =\
  \ 0;\n    $curPage = 0;\n}\n```\n\n6.  原始的 SQL 查询现在应该位于下一行。按如下方式修改它：\n\n```php\n\
  // 准备 SQL 以检索图像详情子集\n$sql = \"SELECT filename, caption FROM images LIMIT $startRow,\"\
  \ . SHOWMAX;\n```\n\n这次我使用了双引号，因为我想让 PHP 处理 `$startRow`。与变量不同，常量在双引号字符串内不会被处理。因此，`SHOWMAX`\
  \ 通过连接运算符（句点）被附加到 SQL 查询的末尾。闭合引号内的逗号是 SQL 的一部分，用于分隔 `LIMIT` 子句的两个参数。\n\n7.  保存页面并在浏览器中重新加载。你应该只会看到六个缩略图，而不是八个，如图\
  \ 14-5 所示。\n\n![../images/332054_4_En_14_Chapter/332054_4_En_14_Fig5_HTML.jpg](img/332054_4_En_14_Fig5_HTML.jpg)\n\
  \n**图 14-5.** 缩略图的数量受 `SHOWMAX` 常量的限制\n\n更改 `SHOWMAX` 的值可以查看不同数量的缩略图。\n\n8.  缩略图网格上方的文本没有更新，因为它仍然是硬编码的，所以让我们来解决这个问题。在页面主体中找到以下代码行：\n\
  \n```\nDisplaying 1 to 6 of 8\n```\n\n将其替换为：\n\n```php\nDisplaying \n```\n\n我们逐行分析这段代码。`$startRow`\
  \ 的值是基于零的，因此你需要加 1 来得到更友好的数字。所以，`$startRow+1` 在第一页显示为 1，在第二页显示为 7。\n\n在第二行中，将 `$startRow+1`\
  \ 与记录总数进行比较。如果它更小，意味着当前页正在显示一个记录范围，因此第三行会显示两边带空格的文本“to”。\n\n然后，你需要计算出范围的最大编号，因此一个嵌套的\
  \ `if ... else` 条件语句将起始行的值与页面要显示的最大记录数相加。如果结果小于记录总数，则 `$startRow+SHOWMAX` 给出页面上最后一条记录的编号。但如果结果等于或大于总数，则改为显示\
  \ `$totalPix`。\n\n最后，退出两个条件语句，并显示“of”后跟记录总数。\n\n9.  保存页面并在浏览器中重新加载。你仍然只会得到第一批缩略图子集，但当你修改\
  \ `SHOWMAX` 的值时，应该会看到第二个数字动态变化。如有必要，请对照 `gallery_mysqli_07.php` 或 `gallery_pdo_07.php`\
  \ 检查你的代码。\n\n## 浏览记录子集\n\n正如我在上一节第 3 步中提到的，所需页面的值通过查询字符串传递给 PHP 脚本。页面首次加载时，没有查询字符串，因此\
  \ `$curPage` 的值被设置为 `0`。虽然点击缩略图显示不同图像时会生成查询字符串，但它只包含主图像的文件名，因此原始缩略图子集保持不变。要显示下一个子集，你需要创建一个将\
  \ `$curPage` 的值增加 `1` 的链接。相应地，要返回到上一个子集，你需要另一个将 `$curPage` 的值减少 `1` 的链接。这很简单，但你还需要确保只在存在有效子集可浏览时才显示这些链接。例如，在第一页上显示后退链接没有意义，因为不存在上一个子集。同样，你也不应该在显示最后一个子集的页面上显示前进链接，因为没有内容可浏览。\n\
  \n这两个问题都可以通过使用条件语句轻松解决。还有最后一点需要注意。你还必须在点击缩略图时生成的查询字符串中包含当前页的值。如果不这样做，`$curPage`\
  \ 会自动重置为 `0`，并显示第一批缩略图，而不是当前子集。\n\n## PHP 解决方案 14-5：创建导航链接\n\n此 PHP 解决方案演示了如何创建导航链接，以在每个记录子集中前后翻页。继续使用之前的同一文件进行操作。或者，使用\
  \ `gallery_mysqli_07.php` 或 `gallery_pdo_07.php`。\n\n![../images/332054_4_En_14_Chapter/332054_4_En_14_Fig6_HTML.jpg](img/332054_4_En_14_Fig6_HTML.jpg)\n\
  \n**图 14-6.** 页面导航系统现已完成\n\n1.  我已经将导航链接放置在缩略图表格底部的额外行中。在占位注释和闭合的 `</table>` 标签之间插入此代码：\n\
  \n```php\n<?php\nif ($curPage > 0) {\n    echo '<a href=\"' . $_SERVER['PHP_SELF']\
  \ . '?curPage=' . ($curPage-1) . '\">< Prev</a>';\n} else {\n    // 否则将单元格留空\n \
  \   echo '&nbsp;';\n}\n?>\n\n<?php\nif ($startRow+SHOWMAX < $totalPix) {\n    for\
  \ ($i = 0; $i < SHOWMAX; $i++) {\n        echo '<td>&nbsp;</td>';\n    }\n    echo\
  \ '<td><a href=\"' . $_SERVER['PHP_SELF'] . '?curPage=' . ($curPage+1) . '\">Next\
  \ ></a></td>';\n} else {\n    // 否则将单元格留空\n    echo '&nbsp;';\n}\n?>\n```\n\n看起来有很多代码，但这段代码可以分为三个部分：第一部分在\
  \ `$curPage` 大于 `0` 时创建一个后退链接；第二部分在列数超过两列时用空单元格填充表格的最后一行；第三部分使用与之前相同的公式（`$startRow+SHOWMAX\
  \ < $totalPix`）来确定是否显示前进链接。\n\n确保链接中引号的组合正确。另一点需要注意的是，`$curPage-1` 和 `$curPage+1`\
  \ 的计算被括在括号中，以避免数字后的句点被误解为小数点。这里的句点用作连接运算符，用于连接查询字符串的各个部分。\n\n2.  现在，你需要将当前页的值添加到缩略图周围的链接的查询字符串中。找到这段代码（大约在第\
  \ 95 行）：\n\n```php\n<a href=\"<?php echo $_SERVER['PHP_SELF'] . '?image=' . $row['filename'];\
  \ ?>\">\n```\n\n将其修改为：\n\n```php\n<a href=\"<?php echo $_SERVER['PHP_SELF'] . '?image='\
  \ . $row['filename'] . '&amp;curPage=' . $curPage; ?>\">\n```\n\n你希望在单击缩略图时显示相同的子集，因此只需通过查询字符串传递\
  \ `$curPage` 的当前值即可。\n\n### 警告\n\n所有代码*必须*位于同一行，且 PHP 结束标签与 `&amp;` 之间不能有空格。这段代码用于创建\
  \ URL 和查询字符串，其中不能包含空格。\n\n\n3. 保存页面并进行测试。点击`Next`链接，应该会看到剩余的子集缩略图，如图 14-6 所示。由于没有更多图片需要显示，`Next`链接会消失，但缩略图网格左下角会出现一个`Prev`链接。图库顶部的记录计数器现在会反映当前显示的缩略图范围，如果你点击正确的缩略图，同一子集会保留在屏幕上，同时显示相应的大图。大功告成！\n\
  \n你可以对照`gallery_mysqli_08.php`或`gallery_pdo_08.php`检查代码。\n\n## 章节回顾\n\n仅用几页的篇幅，你就将一份枯燥的文件名列表转变为一个动态的在线图库，并配备了页面导航系统。所需做的只是为每张主要图片创建缩略图，将两张图片上传至相应的文件夹，并将文件名和说明文字添加到数据库的`images`表中。只要数据库与`images`和`thumbs`文件夹的内容保持同步，你便拥有一个动态图库。不仅如此，你还学会了如何选择记录子集、通过查询字符串链接到相关信息，以及构建页面导航系统。\n\
  \n使用 PHP 的次数越多，你就越能意识到，技能不在于记住大量晦涩函数的使用方法，而在于理清实现 PHP 达成目标的逻辑。这本质上是一个“如果这样，就那样做；如果那样，就做不同的事”的问题。一旦你能预见到某种情况可能出现的各种结果，通常就能构建出处理它的代码。\n\
  \n到目前为止，你一直专注于从简单的数据库表中提取记录。在下一章中，我将向你展示如何插入、更新和删除数据。\n\n## 15. 管理内容\n\n虽然你可以使用\
  \ phpMyAdmin 进行许多数据库管理操作，但你或许希望设置一些区域，让客户可以登录更新某些数据，而无需授予他们对数据库的完全控制权。为此，你需要构建自己的表单，并创建定制化的内容管理系统。\n\
  \n每个内容管理系统的核心通常是所谓的 CRUD 循环——创建(Create)、读取(Read)、更新(Update)和删除(Delete)——它仅使用四个 SQL\
  \ 命令：`INSERT`、`SELECT`、`UPDATE`和`DELETE`。为了演示基本的 SQL 命令，本章将向你展示如何为名为`blog`的表构建一个简单的内容管理系统。即使你不想构建自己的内容管理系统，本章涵盖的这四个命令对于几乎所有基于数据库驱动的页面（如用户登录、用户注册、搜索表单、搜索结果等）来说也是必不可少的。\n\
  \n在本章中，你将学习以下内容：\n\n-   在数据库表中插入新记录\n-   显示现有记录的列表\n-   更新现有记录\n-   在删除记录前请求确认\n\
  \n### 设置内容管理系统\n\n管理数据库表中的内容涉及四个阶段，我通常将其分配给四个独立但相互关联的页面：分别用于插入、更新和删除记录，以及一个现有记录列表。记录列表有两个用途：识别数据库中存储的内容，更重要的是，通过查询字符串传递记录的主键，链接到更新和删除脚本。\n\
  \n`blog`表包含一系列要在 Japan Journey 网站中显示的标题和文章内容，如图 15-1 所示。为简单起见，该表仅包含五列：`article_id`（主键）、`title`、`article`、`created`和`updated`。\n\
  \n![../images/332054_4_En_15_Chapter/332054_4_En_15_Fig1_HTML.jpg](img/332054_4_En_15_Fig1_HTML.jpg)\n\
  \n*图 15-1. Japan Journey 网站中`blog`表的内容*\n\n### 创建博客数据库表\n\n如果你只想直接学习内容管理页面，可以从`ch15`文件夹导入`blog.sql`中的表结构和数据。打开\
  \ phpMyAdmin，选择`phpsols`数据库，按照第 12 章的方法导入该表。该 SQL 文件会创建表并用四篇短文填充它。\n\n如果你想从头开始自行创建所有内容，请打开\
  \ phpMyAdmin，选择`phpsols`数据库，如果未选中，请点击`Structure`标签页。在`Create table`部分，在`Name`字段中输入**blog**，在`Number\
  \ of columns`字段中输入**5**。然后点击`Go`。使用以下截图和表 15-1 中显示的设置。\n\n![../images/332054_4_En_15_Chapter/332054_4_En_15_Figa_HTML.jpg](img/332054_4_En_15_Figa_HTML.jpg)\n\
  \n*表 15-1. `blog`表的列定义*\n\n| 字段 | 类型 | 长度/值 | 默认值 | 属性 | 空值 | 索引 | A_I |\n| ---\
  \ | --- | --- | --- | --- | --- | --- | --- |\n| `article_id` | `INT` |  |  | `UNSIGNED`\
  \ | 取消选中 | `PRIMARY` | 选中 |\n| `title` | `VARCHAR` | `255` |  |  | 取消选中 |  |  |\n\
  | `article` | `TEXT` |  |  |  | 取消选中 |  |  |\n| `created` | `TIMESTAMP` |  | `CURRENT_TIMESTAMP`\
  \ |  | 取消选中 |  |  |\n| `updated` | `TIMESTAMP` |  | `CURRENT_TIMESTAMP` | `on update\
  \ CURRENT_TIMESTAMP` | 取消选中 |  |  |\n\n`created`和`updated`列的默认值设置为`CURRENT_TIMESTAMP`。因此，在首次输入记录时，这两列获得相同的值。`updated`列的`Attributes`设置为`on\
  \ update CURRENT_TIMESTAMP`。这意味着每当对记录进行更改时，它都会被更新。为了跟踪记录最初创建的时间，`created`列中的值永远不会被更新。\n\
  \n### 创建基本的插入和更新表单\n\nSQL 通过提供独立的命令来区分插入和更新记录。`INSERT`仅用于创建全新记录。一旦记录被插入，任何更改都必须使用`UPDATE`。由于这涉及到相同的字段，因此可以使用同一页面执行这两种操作。但这会使\
  \ PHP 代码更复杂，所以我更喜欢先为插入页面创建 HTML，将其另存为更新页面，然后分别编写代码。\n\n插入页面中的表单只需要两个输入字段：标题和文章。其余三列（主键和两个时间戳）的内容会自动处理。插入表单的代码如下所示：\n\
  \n```html\n<form method=\"post\" action=\"blog_insert_mysqli.php\">\n    <p>\n \
  \       <label for=\"title\">标题:</label>\n        <input type=\"text\" name=\"title\"\
  \ id=\"title\">\n    </p>\n    <p>\n        <label for=\"article\">文章:</label>\n\
  \        <textarea name=\"article\" id=\"article\" cols=\"60\" rows=\"10\"></textarea>\n\
  \    </p>\n    <p>\n        <input type=\"submit\" name=\"insert\" value=\"插入新条目\"\
  >\n    </p>\n</form>\n```\n\n该表单使用`post`方法。你可以在`ch15`文件夹中的`blog_insert_mysqli_01.php`和`blog_insert_pdo_01.php`文件中找到完整代码。内容管理表单已使用`styles`文件夹中的`admin.css`进行了基本样式设置。在浏览器中查看时，表单如下所示：\n\
  \n![../images/332054_4_En_15_Chapter/332054_4_En_15_Figb_HTML.jpg](img/332054_4_En_15_Figb_HTML.jpg)\n\
  \n更新表单除了标题和提交按钮外完全相同。按钮代码如下所示（完整代码在`blog_update_mysqli_01.php`和`blog_update_pdo_01.php`中）：\n\
  \n```html\n<input type=\"submit\" name=\"update\" value=\"更新条目\">\n```\n\n我已将标题和文章输入字段命名为与`blog`表中列名相同的名称。这有助于稍后在编写\
  \ PHP 和 SQL 代码时跟踪变量。\n\n\n\n# 提示\n作为一项安全措施，一些开发者建议使用与数据库列名不同的名称，因为任何人都可以通过查看表单的源代码看到输入字段的名称。使用不同的名称会增加入侵数据库的难度。在网站需要密码保护的部分，这无需担忧。但对于可公开访问的表单（例如用于用户注册或登录的表单），你或许应该考虑这一思路。\n\
  \n## 插入新记录\n\n向表中插入新记录的基本 SQL 语句如下：\n\n```\nINSERT [INTO] table_name (column_names)\n\
  VALUES (values)\n```\n\n`INTO` 位于方括号中，表示它是可选的。它的存在纯粹是为了让 SQL 读起来更像人类语言。列名可以按任何顺序排列，但第二组括号中的值必须与其对应的列顺序一致。尽管\
  \ MySQLi 和 PDO 的代码非常相似，但为了避免混淆，我将分别介绍它们。\n\n> **注意** 本章中的许多脚本使用了一种称为“设置标志（setting\
  \ a flag）”的技术。`flag` 是一个布尔变量，初始化为 `true` 或 `false`，用于检查某事是否发生。例如，如果 `$OK` 初始设置为\
  \ `false`，并且仅在数据库查询成功执行时才重置为 `true`，那么它就可以用作控制另一个代码块的条件。\n\n## PHP 解决方案 15-1：使用\
  \ MySQLi 插入新记录\n\n本 PHP 解决方案展示了如何使用 MySQLi 预处理语句向 `blog` 表插入新记录。使用预处理语句可以避免引用转义和控制字符的问题。它还能保护你的数据库免受\
  \ SQL 注入攻击（参见第 13 章）。\n\n1. 在 `phpsols-4e` 站点根目录下创建一个名为 `admin` 的文件夹。从 `ch15` 文件夹复制\
  \ `blog_insert_mysqli_01.php`，并将其在新文件夹中保存为 `blog_insert_mysqli.php`。\n\n2. 插入新记录的代码应仅在表单已提交时运行，因此它被包裹在一个条件语句中，该语句检查\
  \ `$_POST` 数组中提交按钮的 `name` 属性（`insert`）。将以下代码放在 `DOCTYPE` 声明之上：\n\n   ```\n   在包含连接函数之后，代码将\
  \ `$OK` 设置为 `false`。仅当没有错误时，它才会被重置为 `true`。末尾的五条注释勾勒出我们将要填写的剩余步骤。\n   ```\n\n3.\
  \ 以具有读写权限的用户身份创建数据库连接，初始化预处理语句，并编写带有占位符的 SQL，这些占位符将用于存放从用户输入中获取的数据，如下所示：\n\n   ```\n\
  \   // 创建数据库连接\n   $conn = dbConnect('write');\n   // 初始化预处理语句\n   $stmt = $conn->stmt_init();\n\
  \   // 创建 SQL\n   $sql = 'INSERT INTO blog (title, article)\n   VALUES(?, ?)';\n\
  \   ```\n\n   将从 `$_POST['title']` 和 `$_POST['article']` 获取的值由问号占位符表示。其他列将自动填充。`article_id`\
  \ 列是主键，使用 `AUTO_INCREMENT`，而 `created` 和 `updated` 列的默认值是 `CURRENT_TIMESTAMP`。\n\
  \n   > **注意** 此处的代码顺序与第 13 章略有不同。该脚本将在第 17 章进一步扩展以运行一系列 SQL 查询，因此预处理语句被首先初始化。\n\n\
  4. 下一步是将问号替换为变量中的值——这个过程称为**绑定参数**。插入以下代码：\n\n   ```\n   if ($stmt->prepare($sql))\
  \ {\n   // 绑定参数并执行语句\n   $stmt->bind_param('ss', $_POST['title'], $_POST['article']);\n\
  \   $stmt->execute();\n   if ($stmt->affected_rows > 0) {\n   $OK = true;\n   }\n\
  \   }\n   ```\n\n   这部分代码用于保护数据库免受 SQL 注入攻击。将变量按照希望插入 SQL 查询的顺序传递给 `bind_param()`\
  \ 方法，同时第一个参数指定每个变量的数据类型，同样按照与变量相同的顺序。两者都是字符串，因此这个参数是 `'ss'`。\n\n   一旦值绑定到占位符，就调用\
  \ `execute()` 方法。\n\n   `affected_rows` 属性记录了 `INSERT`、`UPDATE` 或 `DELETE` 查询影响的行数。\n\
  \n   > **注意** 如果查询触发了 MySQL 错误，`affected_rows` 返回 −1。与某些编程语言不同，PHP 将 −1 视为 `true`。因此，你需要检查\
  \ `affected_rows` 是否大于零，以确保查询成功。如果大于零，`$OK` 将被重置为 `true`。\n\n5. 最后，将页面重定向到现有记录列表，或显示任何错误消息。在上一步之后添加此代码：\n\
  \n   ```\n   // 重定向（如果成功）或显示错误\n   if ($OK) {\n   header('Location:\n   http://localhost/phpsols-4e/admin/blog_list_mysqli.php');\n\
  \   exit;\n   } else {\n   $error = $stmt->error;\n   }\n   }\n   ?>\n   ```\n\n\
  6. 在页面的主体中添加以下代码块，以便在插入操作失败时显示错误消息：\n\n   ```\n   插入新博客条目\n   <?php\n   if (isset($error))\
  \ {\n   echo \"<p>错误：$error</p>\";\n   }\n   ?>\n   ```\n\n   完整代码位于 `ch15` 文件夹中的\
  \ `blog_insert_mysqli_02.php`。\n\n至此，插入页面就完成了。但在测试之前，请先创建 `blog_list_mysqli.php`，该文件将在\
  \ PHP 解决方案 15-3 中介绍。\n\n> **注意** 为了专注于与数据库交互的代码，本章中的脚本并未对用户输入进行验证。在实际应用中，你应该使用第\
  \ 6 章中描述的技术来检查表单提交的数据，并在检测到错误时重新显示。\n\n## PHP 解决方案 15-2：使用 PDO 插入新记录\n\n本 PHP 解决方案展示了如何使用\
  \ PDO 预处理语句向 `blog` 表插入新记录。如果尚未创建，请在 `phpsols-4e` 站点根目录下创建一个名为 `admin` 的文件夹。\n\n\
  1. 将 `blog_insert_pdo_01.php` 复制到 `admin` 文件夹，并保存为 `blog_insert_pdo.php`。\n\n2.\
  \ 插入新记录的代码应仅在表单已提交时运行，因此它被包裹在一个条件语句中，该语句检查 `$_POST` 数组中提交按钮的 `name` 属性（`insert`）。将以下代码放在\
  \ `DOCTYPE` 声明之上的 PHP 代码块中：\n\n   ```\n   if (isset($_POST['insert'])) {\n   require_once\
  \ '../includes/connection.php';\n   // 初始化标志\n   $OK = false;\n   // 创建数据库连接\n \
  \  // 创建 SQL\n   // 准备语句\n   // 绑定参数并执行语句\n   // 重定向（如果成功）或显示错误\n   }\n   ```\n\n\
  \   在包含连接函数之后，代码将 `$OK` 设置为 `false`。仅当没有错误时，它才会被重置为 `true`。末尾的五条注释勾勒出剩余的步骤。\n\n\
  3. 以具有读写权限的用户身份创建 PDO 数据库连接，并构建 SQL 语句，如下所示：\n\n   ```\n   // 创建数据库连接\n   $conn\
  \ = dbConnect('write', 'pdo');\n   // 创建 SQL\n   $sql = 'INSERT INTO blog (title,\
  \ article)\n   VALUES(:title, :article)';\n   ```\n\n   将从变量获取的值由命名占位符表示，这些占位符由列名前加冒号组成（`:title`\
  \ 和 `:article`）。其他列的值将由数据库生成。`article_id` 主键会自动递增，而 `created` 和 `updated` 列的默认值设置为\
  \ `CURRENT_TIMESTAMP`。\n\n\n\n4. 下一步是初始化预处理语句，并将变量中的值绑定到占位符——这一过程称为**绑定参数**。添加以下代码：\n\
  \n```\n// 准备语句\n$stmt = $conn->prepare($sql);\n// 绑定参数并执行语句\n$stmt->bindParam(':title',\
  \ $_POST['title'], PDO::PARAM_STR);\n$stmt->bindParam(':article', $_POST['article'],\
  \ PDO::PARAM_STR);\n// 执行并获取受影响的行数\n$stmt->execute();\n$OK = $stmt->rowCount();\n\
  ```\n\n首先，将 SQL 查询传递给数据库连接对象（`$conn`）的 `prepare()` 方法，并将语句的引用存储为变量（`$stmt`）。\n\n\
  接着，将变量中的值绑定到预处理语句中的占位符，然后 `execute()` 方法执行查询。\n\n当与 `INSERT`、`UPDATE` 或 `DELETE`\
  \ 查询一起使用时，PDO 的 `rowCount()` 方法会报告查询影响的行数。如果记录插入成功，`$OK` 的值为 `1`，PHP 将其视为 `true`。否则，值为\
  \ `0`，被视为 `false`。\n\n5. 最后，将页面重定向到现有记录列表，或显示错误信息。在上一步之后添加以下代码：\n\n```\n// 如果成功则重定向，否则显示错误\n\
  if ($OK) {\n    header('Location: http://localhost/phpsols-4e/admin/blog_list_pdo.php');\n\
  \    exit;\n} else {\n    $error = $stmt->errorInfo()[2];\n}\n}\n?>\n```\n\n如果存在错误信息，它会被存储在由\
  \ `$stmt->errorInfo()` 返回的数组的第三个元素中，并通过数组解引用进行访问。\n\n6. 在页面的主体中添加一个 PHP 代码块，用于显示任何错误信息：\n\
  \n```\n<?php\nif (isset($error)) {\n    echo \"<p>错误：$error</p>\";\n}\n?>\n```\n\
  \n完整的代码位于 `ch15` 文件夹中的 `blog_insert_pdo_02.php` 文件中。\n\n至此，插入页面已完成，但在测试之前，请先创建接下来要描述的\
  \ `blog_list_pdo.php`。\n\n### 链接到更新和删除页面\n\n在更新或删除记录之前，需要先找到其主键。一个实用的方法是查询数据库，选择所有记录。你可以利用此查询结果显示所有记录的列表，并附带指向更新和删除页面的链接。通过在每个链接的查询字符串中添加\
  \ `article_id` 的值，你可以自动识别要更新或删除的记录。如图 15-2 所示，浏览器状态栏（左下角）中显示的 URL 将文章 `Trainee Geishas\
  \ Go Shopping` 的 `article_id` 标识为 2。\n\n![../images/332054_4_En_15_Chapter/332054_4_En_15_Fig2_HTML.jpg](img/332054_4_En_15_Fig2_HTML.jpg)\n\
  \n**图 15-2.** 编辑和删除链接的查询字符串中包含记录的主键\n\n更新页面利用此信息显示正确的记录以供更新。删除链接中也会向删除页面传递相同的信息。\n\
  \n要创建这样的列表，你需要从一个包含两行以及所需列数（再加上两列用于编辑和删除链接）的 HTML 表格开始。第一行用于列标题。第二行包裹在一个 PHP 循环中，用于显示所有结果。`ch15`\
  \ 文件夹中 `blog_list_mysqli_01.php` 的表格如下所示（`blog_list_pdo_01.php` 中的版本相同，只是最后两个表格单元格中的链接指向的是\
  \ PDO 版本的更新和删除页面）：\n\n```\n<table>\n  <tr>\n    <th>创建日期</th>\n    <th>标题</th>\n\
  \    <th>&nbsp;</th>\n    <th>&nbsp;</th>\n  </tr>\n  <tr>\n    <td>编辑</td>\n  \
  \  <td>删除</td>\n  </tr>\n</table>\n```\n\n### PHP 解决方案 15-3：创建指向更新和删除页面的链接\n\n本\
  \ PHP 解决方案展示了如何通过显示所有记录的列表并链接到更新和删除页面，来创建管理 `blog` 表中记录的页面。MySQLi 和 PDO 版本之间只有细微差别，因此本说明将同时涵盖两者。\n\
  \n将 `blog_list_mysqli_01.php` 或 `blog_list_pdo_01.php` 复制到 `admin` 文件夹，并根据你计划使用的连接方式，将其保存为\
  \ `blog_list_mysqli.php` 或 `blog_list_pdo.php`。不同版本会链接到相应的插入、更新和删除文件。\n\n1. 你需要连接到数据库并创建\
  \ SQL 查询。在 `DOCTYPE` 声明上方的 PHP 代码块中添加以下代码：\n\n```\nrequire_once '../includes/connection.php';\n\
  require_once '../includes/utility_funcs.php';\n// 创建数据库连接\n$conn = dbConnect('read');\n\
  $sql = 'SELECT * FROM blog ORDER BY created DESC';\n```\n\n如果你使用 PDO，请将 `'pdo'`\
  \ 作为第二个参数添加到 `dbConnect()` 中。\n\n2. 在结束 PHP 标签之前添加以下代码来提交查询。\n\n对于 MySQLi，使用以下代码：\n\
  \n```\n$result = $conn->query($sql);\nif (!$result) {\n    $error = $conn->error;\n\
  }\n```\n\n对于 PDO，使用以下代码：\n\n```\n$result = $conn->query($sql);\n$error = $conn->errorInfo()[2];\n\
  ```\n\n3. 在表格之前添加一个条件语句来显示任何错误信息，并将表格包裹在 `else` 代码块中。表格前的代码如下所示：\n\n```\n<?php\n\
  if (isset($error)) {\n    echo \"<p>$error</p>\";\n} else { ?>\n```\n\n闭合的大括号应放在\
  \ `</table>` 标签之后的独立 PHP 代码块中。\n\n4. 现在，你需要将第二行表格包裹在一个循环中，并从结果集中检索每条记录。以下代码位于第一行的结束\
  \ `</tr>` 标签和第二行的开始 `<tr>` 标签之间。\n\n对于 MySQLi，使用以下代码：\n\n```\n<?php while ($row\
  \ = $result->fetch_assoc()) { ?>\n```\n\n对于 PDO，使用以下代码：\n\n```\n<?php while ($row\
  \ = $result->fetch()) { ?>\n```\n\n这与前一章中的内容相同，因此无需解释。\n\n5. 在第二行的前两个单元格中显示当前记录的\
  \ `created` 和 `title` 字段，如下所示：\n\n```\n<td><?= $row['created'] ?></td>\n<td><?=\
  \ safe($row['title']) ?></td>\n```\n\n`created` 列存储的是 `TIMESTAMP` 数据类型，这是一种固定格式，因此不需要过滤。但是\
  \ `title` 列是文本相关的，因此需要传递给第 13 章中定义的 `safe()` 函数。\n\n6. 在接下来的两个单元格中，将当前记录的 `article_id`\
  \ 字段的查询字符串和值添加到两个 URL 中，如下所示（尽管链接不同，但高亮显示的代码对于 PDO 版本是相同的）：\n\n```\n<td><a href=\"\
  blog_update_mysqli.php?article_id=<?= $row['article_id'] ?>\">编辑</a></td>\n<td><a\
  \ href=\"blog_delete_mysqli.php?article_id=<?= $row['article_id'] ?>\">删除</a></td>\n\
