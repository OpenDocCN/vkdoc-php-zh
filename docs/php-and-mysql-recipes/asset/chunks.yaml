- fmt: '# PHP字符串处理函数示例


    由于我们只想要两个位置之间的内容，我们计算从第一个位置加上字符串长度开始的子串，并将子串的长度计为两个位置之间的差值，这里我们减去2。


    获取存储在字符串中的文件名的扩展名，以确定文件可能包含的内容类型，可以通过类似的方式实现。


    ```

    <?php


    // 6_19.php


    $filename = "myfile.txt";


    $ext = substr($filename, -3);


    echo "Extension = {$ext}\n";

    ```


    在这种情况下，子串的起始位置设置为`-3`。这意味着从字符串末尾开始数3个字符，并且没有提供长度参数，因此该函数将返回字符串的其余部分。这个示例只适用于长度为3个字符的扩展名。如果我们希望能够获取不同文件类型的扩展名，我们可以使用`strrpos()`来获取最后一个`.`出现的位置，并将其作为子串的起始点。我们需要将起始点加1来调整，因为句点不应包含在扩展名字符串中。


    ```

    <?php


    // 6_20.php


    $filename = "myfile.txt";


    $p = strrpos($filename, ''.'');


    $ext = substr($filename, $p + 1);


    echo "Extension = {$ext}\n";

    ```


    此示例计算了文件名扩展名部分的起始点，但并非所有文件名都有扩展名部分。在这种情况下，`strrpos()`将返回`null`。为了解决这个问题，我们可以将其转换成一个函数，同时检查`.`的位置是否有效。


    ```

    <?php


    // 6_21.php


    function GetExtension($filename) {


    $ext = null;


    $p = strrpos($filename, ''.'');


    if ($p !== false) {


    $ext = substr($filename, $p + 1);


    }


    return $ext;


    }


    $filename = "myfile.txt";


    echo "Extension of {$filename} is " . GetExtension($filename) . "\n"; $filename
    = "myfile.info";


    echo "Extension of {$filename} is " . GetExtension($filename) . "\n"; 136


    CHAPTER 6 ■ STRINGS


    $filename = "myfile";


    echo "Extension of {$filename} is " . GetExtension($filename) . "\n"; $filename
    = ".cvsignore";


    echo "Extension of {$filename} is " . GetExtension($filename) . "\n";

    ```


    请注意，检查有效位置是通过`$p !== false`完成的。这是因为当搜索到的字符出现在字符串的第一个位置时，其值为`0`，简单的比较会得到`0 == false`，但在比较类型和值时，`0
    !== false`。


    该示例的输出如下所示：


    ```

    Extension of myfile.txt is txt

    Extension of myfile.info is info

    Extension of myfile is

    Extension of .cvsignore is cvsignore

    ```


    ## Recipe 6-10. 显示HTML实体


    ### 问题


    当字符串用于存储HTML代码，并且您希望显示代码而不是让浏览器渲染代码时，您需要将某些字符转换为HTML实体。


    ### 解决方案


    处理此问题的简单方法是使用`str_replace()`将`<`替换为`&lt;`，将`>`替换为`&gt;`。这需要两次函数调用。相反，我们可以使用`htmlspecialchars()`。此函数会将`&`、`''`、`"`、`<`和`>`转换为对应的HTML实体。字符串可能包含其他具有关联命名实体的子串。为了转换所有这些实体，您必须使用`htmlentities()`函数。


    这两个函数都将要转换的字符串作为第一个参数，后面跟着三个可选参数，用于定义如何进行替换。有关这些参数的详细信息，请参阅PHP手册：


    [http://php.net/manual/en/function.htmlentities.php](http://php.net/manual/en/function.htmlentities.php)


    ### 工作原理


    每当您的网站允许用户输入文本值，这些值存储在数据库中，并随后呈现给同一用户或其他用户时，您可能希望阻止用户输入HTML内容，这些内容会被浏览器解析并渲染为HTML，而不是用户实际输入的内容。如果您在博客页面上有一个评论部分，用户可能会在评论中输入一个图像标签。如果您不对此输入进行处理，当向用户显示时，该图像将作为评论的一部分显示出来，因为图像标签可以引用服务器上或任何连接到互联网的其他服务器上的任何URL。


    您可以在将值插入数据库之前或向用户显示之前调用`htmlentities()`，但不要两次都调用它。


    ```

    <?php


    // 6_22.php


    $input = ''This is my comment <img src="https://example.com/image.jpg" />''; echo
    htmlentities($input);

    ```


    此脚本的原始输出将显示以下内容：


    ```

    This is my comment &lt;img src=&quot;https://example.com/image.jpg&quot; /&gt;

    ```


    当发送到浏览器时，这将显示为文本，而不会被解释为图像标签。将字符串转换回有效的HTML字符串可以使用`html_entity_decode()`函数完成。


    如果您在命令行上运行此脚本，输出将如下所示：


    ```

    This is my comment &lt;img src=&quot;https://example.com/image.jpg&quot; /&gt;

    ```


    如果您在浏览器中查看此输出，它将完全按照用户输入的样子显示，并且图像不会显示出来。


    如果不采取任何预防措施，用户可以插入可能执行JavaScript或从其他站点加载脚本文件的`<script>`标签。在下一个示例中，我们使用`strip_tags()`函数从输入中删除所有标签。


    ```

    <?php


    // 6_23.php


    $input = <<<HEREDOC


    Comment


    <script src="https://example.com/script.js"></script>


    <script>


    MyFunction();


    </script>


    <img src="https://example.com/image.jpg" />


    This is my opinion about that!


    HEREDOC;


    $i = strip_tags($input);


    echo $i;

    ```


    尽管所有标签都被删除了，但该函数会保留标签之间的内容，浏览器能够将输出渲染为纯文本。输出将如下所示：


    ```

    Comment

    MyFunction();

    This is my opinion about that!

    ```


    请注意，所有换行符都被保留了，因为只删除了字符串中的标签部分。为了不创建无效的HTML，在将字符串发送到浏览器之前，您可能仍然希望对字符串运行`htmlentities()`。


    ## Recipe 6-11. 为文件生成哈希值


    ### 问题


    当创建一个资产管理系统，其中不同类型和大小的文件存储在文件系统上，并且您希望确保所有文件都是唯一的时，您可以将文件名作为键。然而，这将允许用户仅重命名文件并再次存储，从而导致同一文件被保存两次。


    ### 解决方案


    解决方案是生成文件内容的哈希值。有多个不同的函数可以做到这一点。最简单（可能也是最古老）的方法是使用`md5()`函数，它根据字符串的内容返回一个32字节的字符串；如果使用`md5_file()`，则根据文件内容返回。更全面的哈希算法可以通过`sha1()`和`sha1_file()`获得。这些函数生成一个40字节的字符串。从PHP
    5.1.2版本开始，哈希扩展默认包含在PHP中。此扩展提供了大量哈希算法，包括`md2`、`md5`、`sha1`、`sha256`、`sha512`以及更多。


    ### 工作原理


    在引入哈希扩展之前，PHP使用独立的函数如`md5()`和`sha1()`来生成哈希值，但通过`hash()`函数，可以使用单个函数生成多种不同的哈希值。`hash()`和`hash_file()`函数接受两个或三个参数。第一个参数是哈希算法的名称，第二个参数是要从中创建哈希的字符串或文件，最后一个可选参数指定函数是返回二进制数据还是返回小写十六进制来表示数据。'
