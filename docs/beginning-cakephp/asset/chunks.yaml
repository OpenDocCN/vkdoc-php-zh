- fmt: '# Including and Using Vendors in CakePHP


    Simply put, including vendors is a mechanism to give you the flexibility to pull
    outside resources into your application without being limited by the framework;
    but Cake, as a framework, cannot assume to manage the limitations of the vendor.
    Therefore, the number of functions and methods provided by Cake to support vendors
    really goes only so far as including them in the application. From there, getting
    the vendor to work will require understanding the specific construction of the
    vendor itself and how it will react with Cake.


    Furthermore, naming conventions, patterns, and the MVC structure cannot be expected
    to extend into vendors. If you needed to perform controller logic, you ought to
    write the code in a controller or component, not in a vendor. I once spoke with
    a beginning Cake developer who tried to get around learning Cake’s functions and
    structure by writing everything as vendor files and pulling in only one or two
    Cake resources. This not only defeated the purpose of using Cake in the first
    place but also resulted in more time being wasted debugging vendor files.


    Should you want to distribute a resource you built in Cake, you’ll probably want
    to keep it the way it is and not release it as a vendor. In other words, if what
    you have written is a helper class, then make it available to other developers
    as such; they will better understand what you have in mind with the script, and
    more important, they will know how to use it in their applications. Vendor includes
    are best for libraries or other scripts that were developed independently of CakePHP
    for use in a wide variety of applications.


    ## Unidirectional Scripting


    Another important point about vendors is that Cake supports them unidirectionally.
    The vendor file itself cannot use Cake helper functions, class objects, or other
    resources. Trying to pull, say, the Ajax helper into a vendor would be more problematic
    and would require a lot of retooling to pull it off. The problems associated with
    this are apparent; forcing the vendor to change its behavior cancels out the utility
    of using Cake. A lot can be said for vendors, simply because so often beginners
    to Cake think in terms of include files and not the other way around. So, remember—Cake
    can use the functionality of a vendor, but the vendor cannot use the functionality
    of Cake. Vendor data flows in one direction, not back and forth.


    ## Installing a Third-Party Script


    Now that I’ve covered the basics of installing a vendor, let’s use a third-party
    script in your blog application. Rather than build a wiki engine from scratch,
    let’s choose one of the many open source text-parsing engines: Textile.


    First, obtain a copy of Textile, which is available at [http://textile.thresholdstate.com](http://textile.thresholdstate.com).


    In this tutorial, I’ll be using version 2.0. Once you have downloaded the file
    and decompressed it, you’ll find the main engine file named `classTextile.php`.
    Place this file in the `app/vendors` folder for the blog application.


    ### Including Textile


    Make the `classTextile.php` file contents available to the `Posts` controller
    by using the `App::import()` function for including vendors (see Listing 12-3).
    Be sure to place this line before the `Posts` controller class instantiation line.
    Since the file name is not all lowercase, you must specify the file name in the
    parameters array.


    **Listing 12-3.** *Including Textile As a Vendor*


    ```php

    <?

    App::import(''Vendor'',''textile'',array(''file''=>''classTextile.php''));

    class PostsController extends AppController {

    …

    ```


    Now that Textile is included in the `Posts` controller, the view can use its functions
    to parse the post content. Vendors included in the controller will be available
    in the view, so you need to add nothing else in the controller. Now, because everything
    will depend on the vendor itself and because Cake cannot provide conventions for
    third-party scripts, this process may need to change depending on what vendor
    is being used. Textile itself comes into play when any kind of text needs to be
    rendered in the browser following a wiki-style parser. Thus, this vendor in practice
    would be executed in the view as the view renders the contents provided by the
    database.


    ### Instantiating and Running Textile


    In the `app/views/posts/view.ctp` file, start a new instance of the `Textile`
    class by inserting Listing 12-4 into line 1.


    **Listing 12-4.** *Starting a New Textile Class*


    ```php

    <? $textile = new Textile();?>

    ```


    Thanks to the `Posts` controller and Listing 12-4, the class object functions
    in `classTextile.php` are now available for use in the view. Textile has the `TextileThis()`
    function to filter the final text through its engine and parse out its own unique
    wiki-style commands.


    Line 6 now contains the post’s article content as passed in the `$post[''Post''][''content'']`
    variable. Let’s run this variable through Textile’s `TextileThis()` function by
    substituting the following line for line 6:


    ```php

    <?=$textile->TextileThis($post[''Post''][''content'']);?>

    ```


    ### Writing Posts with Textile


    Now that Textile is running in your application, you can use its syntax when writing
    blog posts to easily add some text-formatting touches. Since Textile works on
    final output, you don’t have to rework anything in the other Add or Edit actions;
    simply adhere to the syntax when entering text, and all should appear correctly.


    To test your implementation of Textile, try adding some content in a blog post
    using some of Textile’s wiki commands. For example, placing underscores around
    a word will result in the `<em>` tag being wrapped around the word, and so forth.


    ## Using Other Frameworks with CakePHP


    Perhaps one of the most complicated aspects of using a PHP framework is working
    it into a large enterprise-level application that runs on multiple frameworks.
    You may be familiar with some of the other web frameworks out there; you may even
    have experimented with a few of them before trying Cake. The question of how to
    implement another framework with Cake is sometimes the most important concern
    of all.


    Because you can’t assume that these frameworks are entirely compatible with Cake,
    conventions for using them have not been arranged or included in the core. To
    bring them into the application, you must tackle the project on an individual
    basis; each framework will have very different methods of working by itself and
    will certainly require a unique set of parameters and methods to work with Cake.


    ### Zend Framework


    One of the most popular PHP frameworks is Zend Framework ([http://framework.zend.com](http://framework.zend.com)).
    You may need to take advantage of its functions for your web applications. To
    do so, you must use Zend Framework (Zend, or ZF for short) as a vendor in the
    Cake application.


    **ZEND OR ZF?**


    There are some nuances when referring to Zend Framework. The *company* that created
    the framework is called Zend, and the official title of the *framework* is Zend
    Framework. On its site and elsewhere, the framework is often referred to as ZF
    to avoid confusion with the company name. In this section, however, I prefer to
    avoid the acronym, so I’ll stick with Zend to refer both to the company and to
    the framework. Be advised that when reading up on Zend Framework on the Web, you
    may need to be more specific than just using the company name.'
