- fmt: '# Cake 的 MVC 结构


    `Cake` 采用常见的 `MVC` 结构设计。这意味着框架将不同的流程拆分为独立的区域（参见第1章的“模型-视图-控制器”部分）。在 `app` 文件夹中，你会看到程序模型、控制器和视图对应的文件夹。目前应用是空的，因此这些文件夹内不会有任何文件。随着你构建应用程序，你将创建与应用功能相对应的模型、视图和控制器。


    从某种角度来看，这些框架组件之间相互通信。例如，假设应用程序需要执行用户登录流程。它会将用户带到一个显示两个字段（用户名和密码字段）的屏幕。这个显示界面（实际的
    `HTML`）会包含在存储在 `app/views` 文件夹某处的视图文件中。当用户填写登录信息并点击提交时，表单会在其中一个控制器中被处理。此时，控制器需要判断给定的用户名和密码是否与数据库中的匹配。因此，控制器会询问其对应的模型，提交的值是否与数据库中的记录匹配。模型返回
    `true` 或 `false` 响应，控制器据此决定是返回登录屏幕并显示错误消息，还是允许用户访问站点的其他区域。


    以下是 `MVC` 结构中的登录流程（参见图3-1）：


    1. 客户端输入用户名和密码，然后提交表单。

    2. 包含表单的视图将表单数据传递给控制器进行处理。

    3. 控制器向模型发送查找请求，询问提交的信息是否与数据库中的内容匹配。

    4. 模型生成查询并在数据库中执行。


    ![Image 17](index-40_1.jpg)


    ![Image 18](index-40_2.jpg)


    ![Image 19](index-40_3.jpg)


    ![Image 20](index-40_4.jpg)


    5. 根据第4步的响应，模型向控制器返回 `true` 或 `false` 结果。

    6. 控制器处理结果并获取适当的视图发送给客户端（成功界面或错误消息）。

    7. 最终的输出视图显示给客户端。


    **图3-1.** *MVC 结构中的登录流程图*


    `MVC` 结构非常有用，因为它允许你将网站的不同流程分离开来。例如，当需要更改或添加新的表单字段时，你只需找到相应的视图文件并做出修改。你无需在 `PHP`
    输出函数或脚本中筛选，就知道所有视图都包含在 `views` 文件夹中。控制器和模型也是如此。某些功能在整个应用程序中可用，无需任何 `include` 包含。在非
    `MVC` 应用程序中，管理所有包含文件或库的路径会随着程序增长而变得困难；在这方面，`MVC` 架构有助于保持应用程序更灵活。表3-1解释了模型、视图和控制器分别处理什么；这些文件在
    `Cake` 中的存储位置；以及文件的命名方式。


    **表3-1.** *MVC 结构区域*


    | 区域 | 处理流程类型 | 文件名称及在应用程序中的位置 |

    |------|-------------|------------------------------|

    | 模型 | 处理所有数据库功能 | `app/models/{模型名称}.php` |

    | 视图 | 处理表示层和显示（包括 Ajax 输出） | `app/views/{控制器名称}/{视图名称}.ctp` |

    | 控制器 | 处理所有逻辑和请求 | `app/controllers/{控制器名称}_controller.php` |


    ## 待办事项列表的 MVC 布局


    首要任务是理解 `MVC` 结构如何满足应用程序的具体需求。对于你要构建的通用待办事项列表应用程序，你需要在整个 `MVC` 结构中安排特定的流程。


    待办事项列表应用程序将包含客户端想要完成的事项。每个事项都有一个描述或标题、截止日期、优先级级别，以及一个表示是否完成的真/假字段。因此，在 `MVC` 结构中，你将把这些流程拆分为各自的元素。首先，你将创建一个控制器来处理客户端想要保存的事项。其次，你将创建一个模型来从数据库获取事项并管理所有其他数据处理流程。接下来，你将让
    `Cake` 生成视图，允许客户端列出、编辑、删除和创建新事项。就这么简单。


    在开始将事项保存到数据库之前，必须首先创建数据库表及其字段。通常，在设计应用程序时，创建顺序大致如下：


    1. 设计并创建数据库。

    2. 创建模型。

    3. 创建控制器。

    4. 创建并调整视图。


    你的 `localhost` 根目录下已经有一个名为 `first_app` 的文件夹，其中运行着 `Cake 1.2`。让我们将此文件夹重命名为 `todo`
    并构建数据库。你应该能够通过输入 `http://localhost/todo` 来启动待办事项列表应用程序。


    ## 设计并创建数据库


    在考虑如何设计数据库时，首先需要了解你正在构建的应用程序。大多数程序员喜欢绘制用例或流程图，逐步说明用户将如何与程序交互以及应用程序将如何响应他们的输入。我已经讨论了应用程序如何在
    `MVC` 结构下工作；下一步是将此结构转换为数据库模式，使其能与 `Cake` 正确配合。


    **注意：** 如果你尚未完成，请确保已创建一个用于此应用程序的数据库，并将配置参数填入 `app/config/database.php` 文件中。


    在数据库中创建一个表，并将其命名为 `items`（确保使用小写）。然后为该表添加表3-2中所示的字段。


    **表3-2.** *待办事项列表应用程序的表结构*


    | 字段名 | 字段类型 | 长度 | 其他参数 |

    |--------|---------|------|---------|

    | `id` | `int` | | 设置为 `unsigned`；设置为主键，并设为 `auto_increment`。 |

    | `name` | `varchar` | | |

    | `date` | `datetime` | | |

    | `priority` | `int` | | |

    | `completed` | `tinyint` | | |


    为每条记录赋予一个唯一的 `id` 值对于 `Cake` 正常运行至关重要。这个应用程序很简单，所以即使不创建设置为 `auto_increment` 的
    `id` 字段也可能运行。但一个好的实践是确保数据库中的所有记录都可以通过一个唯一的值来标识，并且该字段名为 `id`，因为这样 `Cake` 就可以围绕你的表自动生成脚手架，而无需你编写任何代码。一旦你开始创建关联表，那么包含
    `id` 字段将是强制性的。


    **注意：** 在指定如何设计数据库模式时，我将为你提供 MySQL 转储表创建代码，而不是逐一介绍每个字段及其类型和值（例如 `id int(11) unsigned
    NOT NULL auto_increment`）。


    ## 创建模型


    既然数据库中有了一个表，`Cake` 需要一个模型文件与该表通信并为应用程序获取结果。在 `app/models` 目录中，创建一个名为 `item.php`
    的新文件。'
  raw: 'Cake is designed using the common MVC structure. What this means is that the
    framework splits apart different processes into separate areas (see “Model-View-Controller”
    in Chapter 1). In the app folder, you will notice a folder for the program’s models,
    a folder for controllers, and a folder for views. Right now the application is
    bare, so you won’t find any files inside these folders. As you build the application,
    you’ll create the necessary models, views, and controllers that correspond to
    the functions of the application.


    In a way, these pieces of the framework talk to each other. Say, for example,
    that the application needs to run a user login process. It takes the user to a
    screen that displays two fields: a username field and a password field. This display,
    the actual HTML, would be contained inside a view file stored somewhere in the
    app/views folder. When the user fills out the login information and clicks Submit,
    the form gets processed in one of the controllers. At this point, the controller
    needs to find out whether the given username and password match in the database.
    So, the controller will talk to its corresponding model asking whether the supplied
    values match a record in the database. The model replies with a true or false
    response, and from there the controller decides either to return to the login
    screen and display an error message or to allow the user access to another area
    of the site.


    The following is the login process in the MVC structure (see Figure 3-1): **1.**
    The client enters a username and password and then submits the form.


    **2.** The view that contains the form passes the form data to the controller
    for processing.


    **3.** The controller sends a find request to the model asking whether the submitted
    information matches anything in the database.


    **4.** The model generates the query and runs it through the database.


    **17**


    ![Image 17](index-40_1.jpg)


    ![Image 18](index-40_2.jpg)


    ![Image 19](index-40_3.jpg)


    ![Image 20](index-40_4.jpg)


