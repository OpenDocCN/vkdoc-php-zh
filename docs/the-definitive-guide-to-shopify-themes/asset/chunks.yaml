  raw: '#### Adding a Store Pickup Selector in the Checkout


    It’s quite common to offer a “local pickup” shipping option to customers who live
    in the same country or state as a merchant’s physical retail outlets. This is
    usually done by adding a Store Pickup option in Shopify’s shipping settings, restricted
    to a specific geographical location (see Figure [7-7](#A437216_1_En_7_Chapter.html#Fig7)).


    ![A437216_1_En_7_Fig7_HTML.jpg](A437216_1_En_7_Fig7_HTML.jpg)


    Figure 7-7


    A store pickup shipping option as configured in the Shopify Admin (left); and
    the resulting shipping options presented to a customer during checkout (right)


    While this approach works for simple use cases, a merchant with multiple pickup
    locations can run into complications. Let’s assume that your example store has
    multiple physical locations in several major Australian cities—Melbourne, Sydney,
    and Brisbane. While we could create a separate shipping option for each pickup
    location and restrict them by state, we would start to overwhelm the customer
    with options during the checkout process (see Figure [7-8](#A437216_1_En_7_Chapter.html#Fig8)).


    ![A437216_1_En_7_Fig8_HTML.jpg](A437216_1_En_7_Fig8_HTML.jpg)


    Figure 7-8


    With multiple physical locations available for pickup, the configuration gets
    harder to manage and the checkout process gets more complex for customers


    With access to the `checkout.liquid` template on a Shopify Plus store, we can
    tackle this problem with some custom JavaScript. The approach will be to:


    1.  Set up a single shipping zone, called Store Pickup, in the Shopify Admin.
     

    2.  Add some custom JavaScript to detect when a customer selects the Store Pickup
    shipping option, and when that occurs, render a custom dropdown element allowing
    the customer to select which specific store they’d like to pick up their order
    from.  

    3.  Pass the selected option as a cart attribute when the customer proceeds to
    the next step, which will store their selection against their final order .  


    You can view the code changes needed to implement this functionality in the example
    theme repository (while the code isn’t that complex, it would take up a bit too
    much space to list it here). You can see the result in the checkout in Figure
    [7-9](#A437216_1_En_7_Chapter.html#Fig9).


    ![A437216_1_En_7_Fig9_HTML.jpg](A437216_1_En_7_Fig9_HTML.jpg)


    Figure 7-9


    The checkout customization is now in place


    With the checkout customization in place, a customer now sees a single Store Pickup
    option during checkout (left). Selecting that option displays a second form input
    allowing a customer to select a specific pickup location (right), which then appears
    in the Additional Details section of the Order Detail page inside the Shopify
    Admin.


    ## Content Pages


    You’ve now learned about the most crucial components of a customer’s journey on
    a Shopify site—the home, collection, product, cart and checkout pages. There aren’t
    the only pages present on a Shopify store—most stores will also contain “content”
    pages for things like the FAQs, about pages, contact forms, return policies, and
    the like. Many stores will also have blog content, whether for content marketing
    and SEO purposes or to document the release of new products.


    While these pages are important for all stores, I’m not going to cover them in
    too much detail here. The principles and techniques we’ve applied to build the
    home, product, and collection pages can be used for page, blog, and article templates
    alike. Usually, most of the work with these pages involves assembling the content
    itself and building a design around it. Things like Liquid variables and filters,
    alternate page templates, and theme sections and settings are all accessible from
    within these templates, giving you a high degree of flexibility in the functionality
    and layouts you can implement.


    You can check out the example theme repository for how I’ve implemented simple
    examples for page, blog, and article templates.


    ## Summary


    This chapter covered the design and implementation of the final steps of a customer’s
    journey to purchase something from the store. You’ve learned how to put together
    an editable cart page that includes some additional functionality like shipping
    estimates and upsells.


    The chapter also covered the Shopify checkout and some of its limitations when
    it comes to customization. It touched briefly on how some of those limitations
    can be overcome for Shopify Plus merchants before wrapping up with a discussion
    of “other” content pages on your Shopify store.


    Footnotes [1](#A437216_1_En_7_Chapter.html#Fn1_source)


    [`https://baymard.com/lists/cart-abandonment-rate`](https://baymard.com/lists/cart-abandonment-rate)


      [2](#A437216_1_En_7_Chapter.html#Fn2_source)


    [`https://help.shopify.com/themes/development/getting-started/using-ajax-api.`](https://help.shopify.com/themes/development/getting-started/using-ajax-api.)


    # 8. Theme Settings and Going Global


    Whatever the situation, end users of your Shopify theme are almost always going
    to require some level of theme customization. To avoid forcing merchants to run
    to a developer every time something needs to change on their stores, Shopify themes
    provide for per-store configuration via a couple of different features—theme settings
    and locales.


    For themes developed on behalf of clients, using these features to add a certain
    level of DIY customizability will save you plenty of valuable time in “five-minute
    fix” customer support. For themes you’re selling to multiple clients, it’s absolutely
    essential that end users be able to modify a wide range of theme aspects so that
    they can “own” their theme and customize it in a way that matches their brand.'
  trans: "\n#### 在结账流程中添加门店自提选择器\n\n为与商家实体零售店位于同一国家或地区的顾客提供“本地自提”配送选项是相当常见的做法。通常，这通过在\
    \ Shopify 配送设置中添加一个“门店自提”选项来实现，并限制在特定的地理位置（见图 7-7）。\n\n![A437216_1_En_7_Fig7_HTML.jpg](img/A437216_1_En_7_Fig7_HTML.jpg)\n\
    \n图 7-7\n\n在 Shopify 后台中配置的门店自提配送选项（左）；以及结账时向顾客展示的最终配送选项（右）\n\n虽然这种方法适用于简单的场景，但对于拥有多个自提点的商家来说，可能会遇到复杂情况。假设你的示例商店在澳大利亚的几个主要城市——墨尔本、悉尼和布里斯班——都设有实体店。虽然我们可以为每个自提点创建独立的配送选项，并按州进行限制，但这会导致在结账过程中选项过多，让顾客感到不知所措（见图\
    \ 7-8）。\n\n![A437216_1_En_7_Fig8_HTML.jpg](img/A437216_1_En_7_Fig8_HTML.jpg)\n\
    \n图 7-8\n\n当有多个实体自提点时，配置变得难以管理，结账流程对顾客来说也更加复杂\n\n借助 Shopify Plus 商店对 `checkout.liquid`\
    \ 模板的访问权限，我们可以通过一些自定义 JavaScript 来解决这个问题。具体方法如下：\n\n1.  在 Shopify 后台中设置一个名为“门店自提”的单一配送区域。\n\
    2.  添加一些自定义 JavaScript，用于检测顾客何时选择了“门店自提”配送选项。当该选项被选中时，渲染一个自定义下拉元素，让顾客可以选择他们想从哪个具体门店提货。\n\
    3.  当顾客进入下一步时，将所选选项作为购物车属性传递，从而将该选择与最终订单关联起来。\n\n你可以在示例主题仓库中查看实现此功能所需的代码变更（虽然代码不算复杂，但在此列出会占用过多篇幅）。你可以在图\
    \ 7-9 的结账页面中看到结果。\n\n![A437216_1_En_7_Fig9_HTML.jpg](img/A437216_1_En_7_Fig9_HTML.jpg)\n\
    \n图 7-9\n\n结账自定义功能现已就位\n\n有了结账自定义功能后，顾客在结账时首先会看到一个单一的“门店自提”选项（左）。选择该选项后，会显示第二个表单输入，允许顾客选择具体的自提地点（右），随后该信息会出现在\
    \ Shopify 后台订单详情页的“其他详细信息”部分。\n\n## 内容页面\n\n现在你已经了解了顾客在 Shopify 网站上最关键的几个环节——首页、商品系列页、产品页、购物车页和结账页。但这些并非\
    \ Shopify 商店仅有的页面——大多数商店还会包含“内容”页面，用于存放常见问题解答、关于我们、联系表单、退货政策等内容。许多商店还会有博客内容，无论是用于内容营销和搜索引擎优化，还是用于记录新产品的发布。\n\
    \n虽然这些页面对所有商店都很重要，但我不会在此详细展开介绍。我们用于构建首页、产品页和商品系列页的原则和技术，同样适用于页面、博客和文章模板。通常，处理这些页面的主要工作在于组织内容本身，并围绕内容构建设计。诸如\
    \ Liquid 变量和过滤器、替代页面模板、主题区段和设置等功能，在这些模板中均可使用，这为你实现功能和布局提供了高度的灵活性。\n\n你可以查看示例主题仓库，了解我是如何为页面、博客和文章模板实现简单示例的。\n\
    \n## 总结\n\n本章涵盖了顾客从商店购买商品旅程中最后几步的设计与实现。你学习了如何构建一个可编辑的购物车页面，该页面包含运费估算和追加销售等额外功能。\n\
    \n本章还讨论了 Shopify 结账流程及其在自定义方面的一些限制。在结束本章之前，我们简要介绍了 Shopify Plus 商家如何克服其中一些限制，并讨论了\
    \ Shopify 商店中的“其他”内容页面。\n\n## 脚注\n\n1  \n[`https://baymard.com/lists/cart-abandonment-rate`](https://baymard.com/lists/cart-abandonment-rate)\n\
    \n2  \n[`https://help.shopify.com/themes/development/getting-started/using-ajax-api`](https://help.shopify.com/themes/development/getting-started/using-ajax-api)\n\
    \n# 8. 主题设置与全球化\n\n无论何种情况，Shopify 主题的最终用户通常都需要一定程度的主题自定义。为了避免每次商店需要变更时都让商家去找开发者，Shopify\
    \ 主题通过两种不同的功能——主题设置和区域设置——提供按商店进行配置的能力。\n\n对于为客户开发的主题，使用这些功能添加一定程度的自助自定义能力，将为你节省大量宝贵的“五分钟修复”式客户支持时间。对于你销售给多个客户的主题来说，最终用户能够修改主题的多个方面至关重要，这样他们才能“拥有”自己的主题，并以符合其品牌的方式进行自定义。\n"
- fmt: '## Theme Settings


    As you saw back in the Chapter [1](#A437216_1_En_1_Chapter.html) in the section
    “Anatomy of a Shopify Theme,” the configurable aspects of your themes are specified
    via a special JSON format, either in the `config/settings_schema.json` file (for
    global settings applied across the entire theme) or inside a `{% schema %}` Liquid
    tag inside a section file (for section-specific settings). A simple example of
    a global settings file is shown in Listing [8-1](#A437216_1_En_8_Chapter.html#Par4),
    with the corresponding UI displayed to the Shopify admin end user in Figure [8-1](#A437216_1_En_8_Chapter.html#Fig1).
    Note that you can add Markdown-style reference markup to provide links to further
    information and avoid information overload inside the theme editor.


    ![A437216_1_En_8_Fig1_HTML.jpg](A437216_1_En_8_Fig1_HTML.jpg)


    **Figure 8-1** The result of the simple checkbox setting from Listing [8-1](#A437216_1_En_8_Chapter.html#Par4)
    in the Shopify Admin interface


    ```

    {

    "type": "checkbox",

    "id": "favicon_enable",

    "label": "Use [custom icon](https://en.wikipedia.org/wiki/Favicon)"

    }

    ```


    **Listing 8-1** Settings in JSON Format for a Simple Checkbox Setting


    The settings JSON format and all the possible setting input types are well-covered
    by Shopify’s online documentation,[¹](#A437216_1_En_8_Chapter.html#Fn1) so I won’t
    recap them in full here. (Shopify also adds new input types on a semi-regular
    basis, so it’s worth checking in with the most up-to-date source regularly.) This
    chapter focuses on a discussion of when it makes sense to use theme settings,
    an exploration of use cases, and some practical tips on how to use those settings
    in your themes.


    > **Caution**

    > Also residing in the `/config` directory of your theme alongside `settings_schema.json`
    is a file called `settings_data.json`. This file contains the currently chosen
    settings for a theme on a specific store instance. Try to avoid editing this file
    directly as part of your development process and make sure it’s ignored in any
    revision control or automated upload processes you may be using. Failure to do
    so can often lead to developers accidentally overriding a storeowner’s carefully
    configured settings.


    ### What Should Be Made a Setting?


    Choosing whether to make something configurable by a storeowner via a theme setting
    will often be dependent on who the theme is being built for.


    #### Settings for “One-Off” Themes


    Themes being built for a specific client on a specific store (“one-off” themes)
    tend to have a pretty narrow focus when it comes to theme settings.


    Given that you’ve presumably designed and built the site in close collaboration
    with the client, it’s unlikely that key design elements like fonts, brand colors,
    and graphical elements will be changing frequently. The list of third-party services
    that the theme may need to integrate with (a mailing list provider, for example)
    is likely predefined, or at least under your control.


    I therefore find that the sorts of settings added for one-off themes are time-sensitive
    feature flags or values—for example, a setting to toggle a site-wide banner with
    a custom message about an ongoing sale or holiday shipping delays, or which products
    should be featured on a key content page.


    As part of the theme design process, I’ll talk to the client to try to understand
    what parts of the site are likely to be time-sensitive in this manner and plan
    my setting accordingly. As a general principle, if you’re unsure about whether
    something needs to be turned into a theme setting, avoid doing so until the client
    has asked for it to be changed a couple of times. (I find that given free reign,
    clients will want the ability to customize everything, even if there’s no realistic
    prospect of it changing.)


    #### Settings for “Multi-Use” Themes


    A variation of the “one-off” theme is a “multi-use” theme, where you’re designing
    and building a theme for a specific client, but where that theme will be used
    on multiple Shopify stores. The common use cases for this type of theme are clients
    running multiple Shopify stores to service different regions (e.g., US versus
    Australia) or different customer segments (e.g., retail versus wholesale).


    Unless the differences between regions or customer segments are so vast that a
    completely different design is required, it’s very useful to have a single codebase
    driving all variations of a particular theme, with the settings on each individual
    store determining the final look and functionality for that region or target customer.


    As an example of this approach in the wild, you can compare the retail and wholesale
    versions of the Colonna Coffee Shopify stores in Figure [8-2](#A437216_1_En_8_Chapter.html#Fig2).


    ![A437216_1_En_8_Fig2_HTML.jpg](A437216_1_En_8_Fig2_HTML.jpg)


    **Figure 8-2** The home page of the Colonna Coffee retail page (left) and the
    Colonna Coffee wholesale page (right). Both sites are driven by the exact same
    theme code


    Both stores use the same theme, and the `settings_schema.json` file contains an
    option for `store_type` (set to either `retail` or `wholesale`) that the template
    files themselves can read and use to display different content depending on the
    result.


    Other examples of theme settings commonly used for “multi-use” themes include:


    * Whether to activate theme features based on the legal requirements of the region
    serviced (e.g., age verification or cookie warnings)

    * Order minimums for wholesale sites

    * Primary brand colors to distinguish retail from wholesale


    Again, the best way to work out what needs to go into the theme settings is by
    having a discussion with the client and understanding their needs.


    #### Settings for “Distributed” Themes


    At the other end of the spectrum to the narrow focus of a “one-off” theme for
    a specific client is a “distributed” theme—one that could be used by a multitude
    of businesses you have no direct connection to. This comes with the most number
    of headaches when it comes to theme settings.


    Users are going to want much more flexibility and control, including being able
    to configure colors, fonts, and layout settings. There also needs to be more flexibility
    in the integrations your settings support—for example, your newsletter widget
    may now require settings that support the use of MailChimp, Campaign Monitor,
    and InfusionSoft instead of just a single provider.


    The best advice I can offer is to start with some opinionated choices (this limited
    range of fonts, these mailing list providers, these layout options) and expand
    them only in case of repeated customer feedback, as each addition to your list
    of theme options results in a factorial increase in the number of things for you
    to test.'
