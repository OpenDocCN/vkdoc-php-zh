  trans: "\n`check()` 方法包含三个条件语句。第一个使用 `preg_match()` 和正则表达式，搜索密码中两个或更多连续空白字符。第二个条件语句使用另一个正则表达式检查密码开头或结尾的空格，而第三个条件语句使用\
    \ `strlen()`，该函数返回字符串长度，并将结果与 `$minChars` 进行比较。\n\n如果密码未通过任何这些测试，`$errors` 属性至少包含一个元素，PHP\
    \ 将其视为 `true`。`check()` 方法中的最后一行使用 `$errors` 属性作为三元运算符的条件。如果发现任何错误，`check()` 方法返回\
    \ `false`，表示密码验证失败。否则返回 `true`。（如果需要复习三元运算符的工作原理，请参阅第 4 章的“使用三元运算符”部分。）\n\n`getErrors()`\
    \ 公有方法只是返回错误消息的数组。\n\n3. 保存 `CheckPassword.php` 并切换到 `register.php`。\n4. 在 `register.php`\
