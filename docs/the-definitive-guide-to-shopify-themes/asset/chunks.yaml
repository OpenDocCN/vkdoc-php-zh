  trans: "\n### 针对不同场景的设计\n\n尽管我们尚未全部接入云端，但过去几年中，普通西方消费者的互联网连接水平确实有所提升；连接方式也日益多样化——无论是在家中使用传统台式机/笔记本，在移动中通过五花八门的移动设备，还是通过集成消息应用或联网冰箱等新兴平台。\n\
    \n其中任何一种都可能与电子商务商店相关，具体取决于商家及其典型客户。作为 Shopify 主题设计师，你需要开始考虑客户在访问商店时可能遇到的各种使用场景以及他们所处的具体情境。\n\
    \n请注意，我强调的焦点是“针对不同场景的设计”，而不仅仅是不同设备。这是因为，重要的不仅是思考客户可能使用哪些设备，还要考虑他们何时使用、以及希望达成什么目标。\n\
    \n以一位访问服装精品店首页的访客为例：\n\n*   他们是在工作日午休时，用办公桌上的台式机浏览系列商品、寻找时尚灵感吗？\n*   他们是在当晚坐在沙发上，边喝红酒边用手机，冲动购买白天看到的那件衬衫吗？\n\
    *   还是他们同样在用手机，但正值交通高峰，正拼命想在商店关门前找到离自己最近的门店位置？\n\n通常情况下，投入时间和精力去构建一个能同时优化所有场景的网站是不可能的，但优秀的设计师会花时间识别这些不同的潜在使用场景，并与客户协作确定其优先级。\n\
    \n## 开发原则\n\n一旦你走出设计阶段，开始主题的开发，有几件事值得牢记，以便让交付成果既健壮又易于维护。\n\n优先考虑这些原则并不总是那么容易，尤其是当我们面临截止日期，或试图向客户证明多花些时间合理时。它们确实往往需要在前期多投入一点时间，但根据我的经验，从长远来看，它们带来的回报远超成本。\n\
    \n### 保持简单\n\n你的主题中概念和代码越简单，编写和维护起来就越容易。就代码而言，这意味着：\n\n*   将包含的 `Liquid` 代码片段数量控制在最小，以简化代码的逻辑模型\n\
    *   将巧妙的 `Liquid` 单行代码拆解为更小、更易于理解的步骤\n*   在驱动动态逻辑时，优先使用 HTML 和 `Liquid`，而非 JavaScript\n\
    *   识别那些定义在不同位置但服务于相同目的的页面或组件，并考虑将它们合并为一个\n\n**注意**\n\n那些允许将源码拆分成小而逻辑组件的开发实践对此大有裨益。你在第\
    \ 2 章（“工具与工作流”）中看到了一些例子，并在第 11 章（“协作式主题开发”）中会遇到更多。\n\n此外，专注于利用 Shopify 的内置功能和概念（如集合、产品、链接列表和标签），而不是尝试自行开发，也会有所帮助。理解\
    \ `Liquid` 和 Shopify 的局限性，并在这些界限内工作，可以减少头痛问题，比起用巧妙的 hack 绕开它们要省心得多。\n\n与此相关，我会尽可能避免为常见的电子商务功能依赖\
    \ Shopify 应用。不仅使用应用会产生持续的经济成本，许多应用还要求复杂的 `Liquid` 代码修改和额外的 JavaScript，这增加了心智和性能负担。许多\
    \ Shopify 应用是编写良好、健壮的软件，不会干扰商店的主题或其他应用——但也有很多不是，这可能在后续引发各种问题。\n\n举个例子，我经常看到商家和开发者依赖某个应用来实现简单的追加销售功能，比如“如果客户购物车中有产品\
    \ A，则建议他们添加产品 B”。虽然有多个应用能处理这种情况及更复杂的场景，但大多数应用依赖 JavaScript 来检查和调整购物车（这意味着需要加载额外的脚本文件，并为用户带来延迟），在某些情况下，还会强制用户刷新整个页面。相比之下，请看列表\
    \ 3-1 中的 `Liquid` 代码片段，它基于客户购物车的当前内容显示一条可配置的追加销售消息，简洁明了。\n\n```\n{%- unless settings.upsell_trigger_product\
    \ == blank or settings.upsell_target_product == blank -%}\n{%- assign has_trigger_product\
    \ = false -%}\n{%- assign has_target_product = false -%}\n{%- comment -%}\n遍历当前购物车中的商品，检查我们是否有触发产品\n\
    但还没有目标产品。\n{%- endcomment -%}\n{%- for item in cart.items -%}\n{%- if item.product\
    \ == settings.upsell_trigger_product -%}\n{%- assign has_trigger_product = true\
    \ -%}\n{%- endif -%}\n{%- if item.product == settings.upsell_target_product -%}\n\
    {%- assign has_target_product = true -%}\n{%- endif -%}\n{%- endfor -%}\n{%- if\
    \ has_trigger_product and !has_target_product -%}\n\n何不 \n添加一件 {{ settings.upsell_target_product.title\
    \ }}？\n\n{%- endif -%}\n{%- endunless -%}\n```\n**列表 3-1**  \n购物车页面上一个简单的、可配置追加销售消息的\
    \ `Liquid` 实现\n\n### 利用渐进增强\n\n作为网页设计师，我们通常希望利用浏览器提供的最前沿、最酷的功能。然而，确保不把部分访客群体排除在外非常重要——尤其是在\
    \ Shopify 主题的背景下，这种排除会直接转化为金钱损失。\n\n渐进增强是一种以“自下而上”方式设计网站的做法——从能为能力最基础的设备（例如，一台不支持\
    \ JavaScript、图形支持有限的黑白 Kindle 浏览器）正常工作的内容开始，然后当更高级的功能可用时，“渐进地”加以利用（比如 JavaScript！CSS3！推送通知！彩色！）。\n\
    \n采用这种方法在开发阶段并不一定需要更多精力，而且它有助于我们避免出现整个潜在客户群体被剥夺购买机会的情况。（这方面的高调失败案例令人警醒——例如，访问\
    \ `Nike.com` 的访客会看到一个黑屏，除非他们的浏览器支持特定的 CSS 功能；更过分的是，在很长一段时间里，沃尔玛的“加入购物车”按钮甚至对没有启用\
    \ JavaScript 的用户根本不显示！）²\n\n**注意**\n\n在本书的实践部分中，我们将对我们开发的所有代码采用渐进增强的方法，重点关注无障碍支持，并确保你的主题为没有\
    \ JavaScript 的用户提供可靠的后备体验——这是电子商务商店最关心的两个问题。\n"
- fmt: "# Document Things\n\nA big mistake beginning Shopify theme developers make\
    \ (that I was guilty of myself, in spades) is focusing too much on the initial\
    \ delivery of a Shopify site and not enough on everything that comes after a successful\
    \ launch.\n\nIf everything goes to plan and the site using your theme sticks around,\
    \ then new seasons, product lines, competitors, and industry trends will demand\
    \ iteration and wholesale changes. Whether it’s yourself or another developer\
    \ tasked with making those changes, properly documenting code, processes and architecture\
    \ can make everyone’s life that much easier.\n\nFor code, this means taking the\
    \ time to cleanly structure your `Liquid`, `JavaScript`, and stylesheets and add\
    \ thorough, meaningful comments to them.\n\nCompare the Liquid snippet in Listing\
    \ 3-2 with the snippet in Listing 3-3, both of which do the same thing. How much\
    \ extra time and energy would you need to spend mentally untangling what the first\
    \ example is doing compared with the second? How confident would you be making\
    \ changes to each of them?\n\n```\n{%- assign p1s = -1 -%}{%- assign p2s = -1\
    \ -%}{%- assign p3s = -1 -%}{%- assign p4s = -1 -%}\n{%- for cp in collections.all.products\
    \ -%}\n{%- unless cp.id == product.id -%}\n{%- assign cp_score = 0 -%}\n{%- for\
    \ tag in product.tags -%}{%- for rt in cp.tags -%}\n{%- if tag == rt -%}\n{%-\
    \ assign cp_score = cp_score | plus: 1 -%}\n{%- endif -%}\n{%- endfor -%}{%- endfor\
    \ -%}\n{%- if cp_score > p1s -%}{%- assign p1s = cp_score -%}{%- assign p1h =\
    \ cp.handle -%}\n{%- elsif cp_score > p2s -%}{%- assign p2s = cp_score -%}{%-\
    \ assign p2h = cp.handle -%}\n{%- elsif cp_score > p3s -%}{%- assign p3s = cp_score\
    \ -%}{%- assign p3h = cp.handle -%}\n{%- elsif cp_score > p4s -%}{%- assign p4s\
    \ = cp_score -%}{%- assign p4h = cp.handle -%}\n{%- endif -%}\n{%- endunless -%}\n\
    {%- endfor -%}\n\n{%- for rp in collections.all.products -%}{%- if rp.handle ==\
    \ p1h or rp.handle == p2h or rp.handle == p3h or rp.handle == p4h -%}\n{%- include\
    \ 'product' with rp -%}\n{%- endif -%}{%- endfor -%}\n\nListing 3-2\nA Difficult-to-Parse\
    \ Liquid Snippet for Calculating Related Products\n```\n\n```\n{%- comment -%}\n\
    Calculated related products using similar tags as a simple scoring system.\n{%-\
    \ endcomment -%}\n{%- assign product_1_score = -1 -%}\n{%- assign product_2_score\
    \ = -1 -%}\n{%- assign product_3_score = -1 -%}\n{%- assign product_4_score =\
    \ -1 -%}\n{%- for current_product in collections.all.products -%}\n{%- unless\
    \ current_product.id == product.id -%}\n{%- assign current_product_score = 0 -%}\n\
    {%- for tag in product.tags -%}\n{%- for related-tag in current_product.tags -%}\n\
    {%- if tag == related-tag -%}\n{%- assign current_product_score = current_product_score\
    \ | plus: 1 -%}\n{%- endif -%}\n{%- endfor -%}\n{%- endfor -%}\n{%- if current_product_score\
    \ > product_1_score -%}\n{%- assign product_1_score = current_product_score -%}\n\
    {%- assign product_1_handle = current_product.handle -%}\n{%- elsif current_product_score\
    \ > product_2_score -%}\n{%- assign product_2_score = current_product_score -%}\n\
    {%- assign product_2_handle = current_product.handle -%}\n{%- elsif current_product_score\
    \ > product_3_score -%}\n{%- assign product_3_score = current_product_score -%}\n\
    {%- assign product_3_handle = current_product.handle -%}\n{%- elsif current_product_score\
    \ > product_4_score -%}\n{%- assign product_4_score = current_product_score -%}\n\
    {%- assign product_4_handle = current_product.handle -%}\n{%- endif -%}\n{%- endunless\
    \ -%}\n{%- endfor -%}\n\n{%- for related-product in collections.all.products -%}\n\
    {%- if related-product.handle == product_1_handle or related-product.handle ==\
    \ product_2_handle or related-product.handle == product_3_handle or related-product.handle\
    \ == product_4_handle -%}\n\n{%- include 'product' with related-product -%}\n\n\
    {%- endif -%}\n{%- endfor -%}\n\nListing 3-3\nA Liquid Snippet Doing the Same\
    \ Job as Listing 3-2, but in a Much More Maintainable Fashion\n```\n\nGood documentation\
    \ doesn’t only have to be in code, either. Some other things that can help are:\n\
    \n- Documenting the concepts and architecture of your theme in a `README` file\
    \ in your source code.\n- Writing a “getting started” guide for others with step-by-step\
    \ instructions on setting up a development environment, walking through any non-standard\
    \ aspects of your theme and highlighting any “gotchas.”\n- Providing clients and\
    \ store owners with a “content management guide,” with instructions on how they\
    \ can manage various aspects of their Shopify theme without relying on a developer.\
    \ Following the principle of “show, don’t tell,” I often like to record short\
    \ screencasts for this purpose.\n\n# Use Defensive and Modular Programming\n\n\
    Programming defensively means that we try to make as few assumptions as possible\
    \ in our code and handle failure gracefully. In the context of Shopify themes:\n\
    \n- Avoid writing code that fails if a DOM element is not present on the page\
    \ or if a specific Liquid template isn’t being used. Other third-party code, apps,\
    \ or developers may have adjusted the theme.\n- When assigning variables in your\
    \ Liquid code, try to use unique variable names to avoid overriding common names\
    \ that other code may rely on (e.g., use `{% assign first_related_product ...\
    \ %}` instead of `{% assign product ... %}`).\n- For JavaScript, don’t assume\
    \ the presence of jQuery or other libraries if they aren’t directly under your\
    \ control. Fall back to loading them yourself from within your script if you must,\
    \ but avoid writing code that loads eight different versions of jQuery (yes, I’ve\
    \ seen it happen).\n- Also for JavaScript, avoid writing code that requires a\
    \ specific order of execution or that needs to be executed at the top of the page.\
    \ Doing this not only avoids a lot of common functional problems with your code,\
    \ but will also make it much easier to build performant themes (see Chapter 10).\n\
    \nWith modular programming, we try to break our theme down into small, independent\
    \ components with a single logical function. This reduces the amount of knowledge\
    \ we need to keep in our head at one time to a minimum, and makes changing the\
    \ code easier. It also lets us re-use those components elsewhere in the theme\
    \ with a minimum of fuss.\n\nAs a practical example of this, consider Figure 3-1,\
    \ a product page in a Shopify theme that handles dynamic shipping destinations,\
    \ currencies, and variant options.\n\n![A437216_1_En_3_Fig1_HTML.jpg](A437216_1_En_3_Fig1_HTML.jpg)\n\
    \nFigure 3-1  \nA Shopify product page with several dynamic page elements outlined\n\
    \nWhen the destination country, customer currency, or a product option is changed\
    \ by the customer, various page updates might need to be made (the feature image,\
    \ the customer support number in the header, the displayed price, etc.). We could\
    \ handle this with one large callback function in JavaScript that managed updating\
    \ everything on the page, but a neater solution is to break down each of the boxes\
    \ on the page into their own independent component that listens for relevant events\
    \ and focuses only on updating itself.\n\nThis approach allows us to write small\
    \ bits of code like Listing 3-4, which handles updating the displayed price element\
    \ whenever the selected variant or currency changes.\n\n```\n$(document).on('variant.changed\
    \ currency.changed', function(e, variant, currency) {\nvar formattedPrice = Currency.format(variant.price,\
    \ currency);\n$('[data-variant-price]').text(formattedPrice);\n});\nListing 3-4\n\
    A Modularized JavaScript Function for the Product Page in Figure 3-1\n```\n\n\
    If you ever want to change the way that the displayed price is rendered, you can\
    \ do that in this snippet of code without worrying about affecting anything else.\
    \ Likewise, if you want to change the way the `variant changed` or `currency changed`\
    \ events are triggered, you can do that without having to know anything about\
    \ the implementation of this price component."
  raw: '### Document Things


    A big mistake beginning Shopify theme developers make (that I was guilty of myself,
    in spades) is focusing too much on the initial delivery of a Shopify site and
    not enough on everything that comes after a successful launch.


    If everything goes to plan and the site using your theme sticks around, then new
    seasons, product lines, competitors, and industry trends will demand iteration
    and wholesale changes. Whether it’s yourself or another developer tasked with
    making those changes, properly documenting code, processes and architecture can
    make everyone’s life that much easier.


    For code, this means taking the time to cleanly structure your Liquid, JavaScript,
    and stylesheets and add thorough, meaningful comments to them.


    Compare the Liquid snippet in Listing [3-2](#A437216_1_En_3_Chapter.html#Par49)
    with the snippet in Listing [3-3](#A437216_1_En_3_Chapter.html#Par50), both of
    which do the same thing. How much extra time and energy would you need to spend
    mentally untangling what the first example is doing compared with the second?
    How confident would you be making changes to each of them?


    ```

    {%- assign p1s = -1 -%}{%- assign p2s = -1 -%}{%- assign p3s = -1 -%}{%- assign
    p4s = -1 -%}

    {%- for cp in collections.all.products -%}

    {%- unless cp.id == product.id -%}

    {%- assign cp_score = 0 -%}

    {%- for tag in product.tags -%}{%- for rt in cp.tags -%}

    {%- if tag == rt -%}

    {%- assign cp_score = cp_score | plus: 1 -%}

    {%- endif -%}

    {%- endfor -%}{%- endfor -%}

    {%- if cp_score > p1s -%}{%- assign p1s = cp_score -%}{%- assign p1h = cp.handle
    -%}

    {%- elsif cp_score > p2s -%}{%- assign p2s = cp_score -%}{%- assign p2h = cp.handle
    -%}

    {%- elsif cp_score > p3s -%}{%- assign p3s = cp_score -%}{%- assign p3h = cp.handle
    -%}

    {%- elsif cp_score > p4s -%}{%- assign p4s = cp_score -%}{%- assign p4h = cp.handle
    -%}

    {%- endif -%}

    {%- endunless -%}

    {%- endfor -%}


    {%- for rp in collections.all.products -%}{%- if rp.handle == p1h or rp.handle
    == p2h or rp.handle == p3h or rp.handle == p4h -%}

    {%- include ''product'' with rp -%}

    {%- endif -%}{%- endfor -%}


    Listing 3-2

    A Difficult-to-Parse Liquid Snippet for Calculating Related Products

    ```


    ```

    {%- comment -%}

    Calculated related products using similar tags as a simple scoring system.

    {%- endcomment -%}

    {%- assign product_1_score = -1 -%}

    {%- assign product_2_score = -1 -%}

    {%- assign product_3_score = -1 -%}

    {%- assign product_4_score = -1 -%}

    {%- for current_product in collections.all.products -%}

    {%- unless current_product.id == product.id -%}

    {%- assign current_product_score = 0 -%}

    {%- for tag in product.tags -%}

    {%- for related-tag in current_product.tags -%}

    {%- if tag == related-tag -%}

    {%- assign current_product_score = current_product_score | plus: 1 -%}

    {%- endif -%}

    {%- endfor -%}

    {%- endfor -%}

    {%- if current_product_score > product_1_score -%}

    {%- assign product_1_score = current_product_score -%}

    {%- assign product_1_handle = current_product.handle -%}

    {%- elsif current_product_score > product_2_score -%}

    {%- assign product_2_score = current_product_score -%}

    {%- assign product_2_handle = current_product.handle -%}

    {%- elsif current_product_score > product_3_score -%}

    {%- assign product_3_score = current_product_score -%}

    {%- assign product_3_handle = current_product.handle -%}

    {%- elsif current_product_score > product_4_score -%}

    {%- assign product_4_score = current_product_score -%}

    {%- assign product_4_handle = current_product.handle -%}

    {%- endif -%}

    {%- endunless -%}

    {%- endfor -%}


    {%- for related-product in collections.all.products -%}

    {%- if related-product.handle == product_1_handle or related-product.handle ==
    product_2_handle or related-product.handle == product_3_handle or related-product.handle
    == product_4_handle -%}


    {%- include ''product'' with related-product -%}


    {%- endif -%}

    {%- endfor -%}


    Listing 3-3

    A Liquid Snippet Doing the Same Job as Listing 3-2, but in a Much More Maintainable
    Fashion

    ```


    Good documentation doesn’t only have to be in code, either. Some other things
    that can help are:


    *   Documenting the concepts and architecture of your theme in a README file in
    your source code.

    *   Writing a "getting started" guide for others with step-by-step instructions
    on setting up a development environment, walking through any non-standard aspects
    of your theme and highlighting any “gotchas.”

    *   Providing clients and store owners with a “content management guide,” with
    instructions on how they can manage various aspects of their Shopify theme without
    relying on a developer. Following the principle of “show, don’t tell,” I often
    like to record short screencasts for this purpose.


    ### Use Defensive and Modular Programming


    Programming defensively means that we try to make as few assumptions as possible
    in our code and handle failure gracefully. In the context of Shopify themes:


    *   Avoid writing code that fails if a DOM element is not present on the page
    or if a specific Liquid template isn’t being used. Other third-party code, apps,
    or developers may have adjusted the theme.

    *   When assigning variables in your Liquid code, try to use unique variable names
    to avoid overriding common names that other code may rely on (e.g., use `{% assign
    first_related_product ... %}` instead of `{% assign product ... %}`).

    *   For JavaScript, don’t assume the presence of jQuery or other libraries if
    they aren’t directly under your control. Fall back to loading them yourself from
    within your script if you must, but avoid writing code that loads eight different
    versions of jQuery (yes, I’ve seen it happen).

    *   Also for JavaScript, avoid writing code that requires a specific order of
    execution or that needs to be executed at the top of the page. Doing this not
    only avoids a lot of common functional problems with your code, but will also
    make it much easier to build performant themes (see Chapter [10](#A437216_1_En_10_Chapter.html)).


    With modular programming, we try to break our theme down into small, independent
    components with a single logical function. This reduces the amount of knowledge
    we need to keep in our head at one time to a minimum, and makes changing the code
    easier. It also lets us re-use those components elsewhere in the theme with a
    minimum of fuss .


    As a practical example of this, consider Figure [3-1](#A437216_1_En_3_Chapter.html#Fig1),
    a product page in a Shopify theme that handles dynamic shipping destinations,
    currencies, and variant options.


    ![A437216_1_En_3_Fig1_HTML.jpg](A437216_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    A Shopify product page with several dynamic page elements outlined


    When the destination country, customer currency, or a product option is changed
    by the customer, various page updates might need to be made (the feature image,
    the customer support number in the header, the displayed price, etc.). We could
    handle this with one large callback function in JavaScript that managed updating
    everything on the page, but a neater solution is to break down each of the boxes
    on the page into their own independent component that listens for relevant events
    and focuses only on updating itself.


    This approach allows us to write small bits of code like Listing [3-4](#A437216_1_En_3_Chapter.html#Par64),
    which handles updating the displayed price element whenever the selected variant
    or currency changes.


    ```

    $(document).on(''variant.changed currency.changed'', function(e, variant, currency)
    {

    var formattedPrice = Currency.format(variant.price, currency);

    $(''[data-variant-price]'').text(formattedPrice);

    });

    Listing 3-4

    A Modularized JavaScript Function for the Product Page in Figure 3-1

    ```


    If you ever want to change the way that the displayed price is rendered, you can
    do that in this snippet of code without worrying about affecting anything else.
    Likewise, if you want to change the way the `variant changed` or `currency changed`
    events are triggered, you can do that without having to know anything about the
    implementation of this price component.'
  trans: "\n# 文档化工作\n\n初入 Shopify 主题开发的开发者常犯的一个错误（我自己也曾深陷其中）是过度关注 Shopify 网站的上线交付，而忽略了成功上线之后的维护工作。\n\
    \n如果一切顺利，使用你主题的网站持续运营，那么新的季节、产品线、竞争对手和行业趋势都将要求对主题进行迭代和大规模修改。无论是你本人还是其他开发者负责这些修改，对代码、流程和架构进行恰当的文档化记录，都能让每个人的工作轻松得多。\n\
    \n对于代码而言，这意味着要花时间清晰地组织你的 `Liquid`、`JavaScript` 和样式表，并为它们添加详尽且有意义的注释。\n\n比较清单 3-2\
    \ 和清单 3-3 中的 Liquid 代码片段，两者功能相同。与第二个示例相比，你需要花费多少额外的时间和精力来理清第一个示例在做什么？你对修改这两个代码片段中的哪一个更有信心？\n\
    \n```\n{%- assign p1s = -1 -%}{%- assign p2s = -1 -%}{%- assign p3s = -1 -%}{%-\
    \ assign p4s = -1 -%}\n{%- for cp in collections.all.products -%}\n{%- unless\
    \ cp.id == product.id -%}\n{%- assign cp_score = 0 -%}\n{%- for tag in product.tags\
    \ -%}{%- for rt in cp.tags -%}\n{%- if tag == rt -%}\n{%- assign cp_score = cp_score\
    \ | plus: 1 -%}\n{%- endif -%}\n{%- endfor -%}{%- endfor -%}\n{%- if cp_score\
    \ > p1s -%}{%- assign p1s = cp_score -%}{%- assign p1h = cp.handle -%}\n{%- elsif\
