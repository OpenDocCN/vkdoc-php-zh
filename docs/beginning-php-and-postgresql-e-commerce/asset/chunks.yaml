    # Names and Descriptions


    The text entered by the visitor can be searched for in several ways:


    **Exact-match search:** If the visitor enters a search string composed of more
    words, this would be searched in the catalog as it is, without splitting the words
    and searching for them separately.


    **All-words search:** The search string entered by the visitor is split into words,
    causing a search for products that contain every word entered by the visitor.
    This is like the exact-match search in that it still searches for all the entered
    words, but this time the order of the words is no longer important.


    **Any-words search:** At least one of the words of the search string must find
    a matching product.


    This simple classification isn’t by any means complete. The search engine can
    be as complex as the one offered by modern search engines, which provides many
    options and features and shows a ranked list of results, or as simple as searching
    the database for the exact string provided by the visitor.


    `HatShop` will support the any-words and all-words search modes. This decision
    leads to the visual design of the search feature (see Figure 5-1).


    **Figure 5-1.** *The design of the search feature*


    The text box is there, as expected, along with a check box that allows the visitor
    to choose between an all-words search and an any-words search.


    Another decision you need to make here is the way in which the search results
    are displayed. How should the search results page look? You want to display, after
    all, a list of products that match the search criteria.


    The simplest solution to display the search results would be to reuse the `products_list`
    componentized template you built in the previous chapter. A sample search page
    will look like Figure 5-2.


    **Figure 5-2.** *Sample search results*


    You can also see in the figure that the site employs paging. If there are a lot
    of search results, you’ll only present a fixed (but configurable) number of products
    per page and allow the visitor to browse through the pages using Previous and
    Next links.


    Let’s begin implementing the functionality, by starting, as usual, with the data
    tier.


    ## Teaching the Database to Search Itself


    You have two main options to implement searching in the database:


    - Implement searching using `WHERE` and `LIKE`.

    - Search using the `tsearch2` module.


    Let’s analyze these options.


    ### Searching Using WHERE and LIKE


    The straightforward solution, frequently used to implement searching, consists
    of using `LIKE` in the `WHERE` clause of the `SELECT` statement. Let’s take a
    look at a simple example that will return the products that have the word "war"
    somewhere in their description:


    ```sql

    SELECT name FROM product WHERE description LIKE ''%war%''

    ```


    The `LIKE` operator matches parts of strings, and the percent wildcard (`%`) is
    used to specify any string of zero or more characters. That’s why in the previous
    example, the pattern `%war%` matches all records whose `description` column has
    the word "war" somewhere in it. This search is case-insensitive.


    If you want to retrieve all the products that contain the word "war" somewhere
    in the product’s name or description, the query will look like this:


    ```sql

    SELECT name FROM product

    WHERE description LIKE ''%war%'' OR name LIKE ''%war%'';

    ```


    This method of searching has three important drawbacks:


    **Speed:** Because we need to search for text somewhere inside the `description`
    and `name` fields, the entire database must be searched on each query. This can
    significantly slow down the overall performance of `HatShop` when database searches
    are performed, especially if you have a large number of products in the database.


    **Quality of search results:** This method doesn’t make it easy for you to implement
    various advanced features, such as returning the matching products sorted by search
    relevance.


    **Advanced search features:** These include searching using the Boolean operators
    (`AND`, `OR`) and searching for inflected forms of words, such as plurals and
    various verb tenses, or words located in close proximity.


    So how can you do better searches that implement these features? If you have a
    large database that needs to be searched frequently, how can you search this database
    without killing your server?


    The answer is using PostgreSQL’s `tsearch2` module.


    ### Searching Using the PostgreSQL tsearch2 Module


    `tsearch2` is the search module we’ll be using to implement our site’s search
    feature. This module ships with PostgreSQL, and it allows performing advanced
    searches of your database by using special search indexes. Read Appendix A for
    installation instructions.


    There are two aspects to consider when building the data tier part of a catalog
    search feature:


    - Preparing the database to be searched

    - Using SQL to search the database


    #### Creating Data Structures That Enable Searching


    In our scenario, the table that we’ll use for searches is `product`, because that’s
    what our visitors will be looking for. To make the table searchable using the
    `tsearch2` module, you need to prepare the table to be searched in three steps:


    1. Add a new field to the `product` table, which will hold the *search vectors*.
    A search vector is a string that contains a prepared (searchable) version of the
    data you want to be searched (such as product names and descriptions). In our
    case, the command will look like this (don’t execute it now, we’ll take care of
    this using an exercise):


    ```sql

    ALTER TABLE product ADD COLUMN search_vector tsvector;

    ```


    2. Update the `product` table by adding a `gist` index on the newly added field.
    `gist` is the engine that performs the actual searches, and it is an implementation
    of the Berkeley Generalized Search Tree (find more details about `gist` at <http://gist.cs.berkeley.edu/>).
    The command for adding a `gist` index on the `product` table is:


    ```sql

    CREATE INDEX idx_search_vector ON product USING gist(search_vector);

    ```


    3. Populate the `search_vector` field of `product` with the search vectors. These
    search vectors are lists of the words to be searchable for each product. For `HatShop`,
    we’ll consider the words that appear in the product’s name and the product’s description,
    giving more relevance to those appearing in the name. This way, if more products
    match a particular search string, those with matches in the name will be shown
    at the top of the results list. At this step, we also filter the so-called *stop-words*
    (also called noise words), which aren’t relevant for searches, such as "the,"
    "or," "in," and so on.


    The following command sets the search vector for each product using the `to_tsvector`
    function (which creates the search vector) and `setweight` (used to give higher
    relevance to the words in the name):


    ```sql

    UPDATE product

    SET search_vector =

    setweight(to_tsvector(name), ''A'') || to_tsvector(description);

    ```


    The `''A''` parameter of `setweight` gives highest relevance to words appearing
    in the product’s name. For detailed information about how these functions work,
    refer to *The `tsearch2` Reference* at <http://www.sai.msu.su/~megera/postgres/gist/tsearch/V2/docs/tsearch2-ref.html>.
    You can find a `tsearch2` guide at <http://rhodesmill.org/brandon/projects/tsearch2-guide.html>
    and an excellent article at <http://www.devx.com/opensource/Article/21674>.


    For an example, see Table 5-1, which shows the search vector for the Santa Jester
    Hat.'
