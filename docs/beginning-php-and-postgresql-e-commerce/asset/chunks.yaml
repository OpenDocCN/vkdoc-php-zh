- fmt: "# The Main Web Page Structure\n\nThe main web page contains three major sections.\
    \ There are two table cells that you’ll fill with componentized templates—one\
    \ for the list of departments and one for the page contents—in the following chapters.\n\
    \nNotice the departments list placed on the left side, the header at the top,\
    \ and the contents cell filled with information regarding the first page. As previously\
    \ mentioned, this contents cell is the only one that changes while browsing the\
    \ site; the other two cells will look exactly the same no matter what page is\
    \ visited. This implementation eases your life as a programmer and keeps a consistent\
    \ look and feel for the web site.\n\n## Understanding the Smarty Template\n\n\
    Before you move on, it’s important to understand how the Smarty template works.\
    \ Everything starts from `index.php`, so you need to take a close look at it.\
    \ Here’s the code again:\n\n```php\n<?php\n\n// Load Smarty library and config\
    \ files\n\nrequire_once 'include/app_top.php';\n\n// Load Smarty template file\n\
    \n$page = new Page();\n\n// Display the page\n\n$page->display('index.tpl');\n\
    \n?>\n```\n\nAt this moment, this file has very simple functionality. First, it\
    \ loads `app_top.php`, which sets some global variables, and then it loads the\
    \ Smarty template file, which will generate the actual HTML content when a client\
    \ requests `index.php`.\n\n## Creating and Configuring a Smarty Page\n\nThe standard\
    \ way to create and configure a Smarty page is shown in the following code snippet:\n\
    \n```php\n<?php\n\n// Load the Smarty library\n\nrequire_once SMARTY_DIR . 'Smarty.class.php';\n\
    \n// Create a new instance of the Smarty class\n\n$smarty = new Smarty();\n\n\
    $smarty->template_dir = TEMPLATE_DIR;\n\n$smarty->compile_dir = COMPILE_DIR;\n\
    \n$smarty->config_dir = CONFIG_DIR;\n\n?>\n```\n\n### The Page Class\n\nIn HatShop,\
    \ we created a class named `Page` that inherits from `Smarty`, which contains\
    \ the initialization procedure in its constructor. This makes working with Smarty\
    \ templates easier. Here’s again the code of the `Page` class:\n\n```php\nclass\
    \ Page extends Smarty\n{\n\n    // Class constructor\n\n    public function __construct()\n\
    \    {\n\n        // Call Smarty's constructor\n\n        parent::Smarty();\n\n\
    \        // Change the default template directories\n\n        $this->template_dir\
    \ = TEMPLATE_DIR;\n\n        $this->compile_dir = COMPILE_DIR;\n\n        $this->config_dir\
    \ = CONFIG_DIR;\n\n    }\n\n}\n```\n\n> **Note:** The notion of constructor is\
    \ specific to object-oriented programming terminology. The constructor of a class\
    \ is a special method that executes automatically when an instance of that class\
    \ is created. In PHP, the constructor of a class is called `__construct()`. Writing\
    \ that code in the constructor of the `Page` class guarantees that it gets executed\
    \ automatically when a new instance of `Page` is created.\n\n## The Smarty Template\
    \ File\n\nThe Smarty template file (`index.tpl`), except for a few details, contains\
    \ simple HTML code. Those details are worth analyzing. In `index.tpl`, before\
    \ the HTML code begins, the configuration file `site.conf` is loaded.\n\n```\n\
    {* smarty *}\n{config_load file=\"site.conf\"}\n```\n\n> **Tip:** Smarty comments\
    \ are enclosed between `{*` and `*}` marks.\n\n### Site Configuration Variables\n\
    \nAt this moment, the only variable set inside the `site.conf` file is `site_title`,\
    \ which contains the name of the web site. The value of this variable is used\
    \ to generate the title of the page in the HTML code:\n\n```html\n<!DOCTYPE html\
    \ PUBLIC \"-//W3C//DTD XHTML 1.1//EN\"\n\"http://www.w3.org/TR/xhtml11/DTD/xhtml11.dtd\"\
    >\n<html>\n<head>\n<title>{#site_title#}</title>\n<link href=\"hatshop.css\" type=\"\
    text/css\" rel=\"stylesheet\" />\n</head>\n```\n\nVariables that are loaded from\
    \ the config files are referenced by enclosing them within hash marks (`#`), or\
    \ with the smarty variable `$smarty.config`, as in:\n\n```html\n<head>\n<title>{$smarty.config.site_title}</title>\n\
    </head>\n```\n\nWe loaded the `site.conf` config file using `{config_load file=\"\
    site.conf\"}` and accessed the `site_title` variable with `{#site_title#}`, which\
    \ you’ll use whenever you need to obtain the site title.\n\nIf you want to change\
    \ the site title, all you have to do is edit `site.conf`."
