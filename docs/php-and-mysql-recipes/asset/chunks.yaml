- fmt: "# Trait Works as a Copy and Paste Function at Compile Time\n\n`Trait` works\
    \ as a copy and paste function at compile time. That means a copy of the `trait`\
    \ is inserted in all places where it’s used as if the code was written the exact\
    \ same way in all places. If the trait is used in classes used in the static context\
    \ the notion of copying the code will act slightly different from static object\
    \ declared from the same base class. If member variables or functions are declared\
    \ as `static` and used in two different classes they will become different instances.\
    \ This is only the case when the classes are used in the static context. The next\
    \ two examples show the difference between extending a base class and using a\
    \ `trait` to define a member variable.\n\nCHAPTER 2 ■ CLASSES AND OBJECTS\n\n\
    ```php\n// 2_31.php\n\nclass A {\n\n    public static $var;\n\n}\n\nclass B extends\
