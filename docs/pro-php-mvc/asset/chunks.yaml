    With our sample application progressing nicely along, we once again need to turn
    our attention back to the topic of testing. What you are likely to find is that
    testing abstract code is much easier than testing application logic.


    What’s more, the tests we need to perform require a level of interaction that’s
    difficult to simulate through code.


    Goals


    • We need to test the format of various input forms.


    • We need to test the results of various user interactions with these forms.


    One of the many ways in which we can test the validity of forms is by checking
    for certain elements within the returned body of HTML. To do this, we need to
    utilize our Request class (for making various HTTP requests to pages within our
    application) and we need to evaluate the HTML returned by the Request class to
    determine whether certain fields are provided for input.


    These two goals can be achieved using the functions shown in Listing 21-1.


    ***Listing 21-1.*** Testing with Request


    $get = function($url)


    {


    $request = new Framework\Request();


    return $request- > get("http://".$_SERVER["HTTP_HOST"]."/{$url}");


    };


    $has = function($html, $fields)


    {


    foreach ($fields as $field)


    {


    if (!stristr($html, "name = \"{$field}\""))


    {


    return false;


    }


    }


    return true;


    };


    The first function simply creates a new Request instance and makes a GET request
    to a path within our localhost. If you set up your sample application to run under
    a different host name, be sure to adjust this function accordingly.


