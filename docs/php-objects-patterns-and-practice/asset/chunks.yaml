    ### 总结


    在本章中，我汇集了你在前几章中看到的许多工具，并通过 Jenkins 将它们粘合在一起。我准备了一个用于持续集成的小项目，应用了一系列工具，包括 PHPUnit（用于测试和代码覆盖率）、PHP_CodeSniffer、phpDocumentor
    和 Git。然后，我设置了 Jenkins，并向你展示了如何向系统添加一个项目。我让系统接受考验，最后，向你展示了如何扩展 Jenkins，以便它可以通过电子邮件提醒你，并测试构建和安装。


    ## 22. 对象、模式、实践


    从对象基础到设计模式原则，再到工具和技术，本书一直聚焦于一个目标：成功的 PHP 项目。


    在本章中，我将回顾书中涵盖的一些主题和观点：


    *   **PHP 和对象**：PHP 如何继续增强其对面向对象编程的支持，以及如何利用这些特性

    *   **对象与设计**：总结一些面向对象设计原则

    *   **模式**：它们的酷炫之处

    *   **模式原则**：回顾构成许多模式基础的面向对象指导原则

    *   **工作中的工具**：重新审视我所描述的工具，并了解一些我尚未提及的工具


    ### 对象


    正如你在第 2 章中所看到的，很长一段时间里，对象在 PHP 世界中几乎是事后才考虑的事情。在 PHP 3 中，支持是非常初级的，对象几乎不比花哨的关联数组强多少。尽管对于
    PHP 4 的对象爱好者来说，情况有了根本性的改善，但仍然存在重大问题。其中至少包括，默认情况下，对象是通过引用赋值和传递的。


    PHP 5 的引入最终将对象推到了舞台中央。你仍然可以在不声明类的情况下使用 PHP 编程，但该语言最终为面向对象设计进行了优化。PHP 7 进一步完善了这一点，引入了期待已久的特性，如标量类型声明和返回类型声明。可能是出于向后兼容的原因，一些流行的框架本质上仍然是过程式的（尤其是
    WordPress）；然而，总的来说，今天大多数新的 PHP 项目都是面向对象的。


    在第 3、4 和 5 章中，我详细介绍了 PHP 的面向对象支持。以下是 PHP 自版本 5 以来引入的一些新特性：反射、异常、私有和保护方法和属性、`__toString()`方法、`static`修饰符、抽象类和方法、final
    方法和属性、接口、迭代器、拦截器方法、类型声明、`const`修饰符、引用传递、`__clone()`、`__construct()`方法、后期静态绑定、命名空间和匿名类。这个不完整列表的冗长程度揭示了
    PHP 的未来与面向对象编程紧密相连的程度。


    Zend Engine 2 和 PHP 5 使面向对象设计成为 PHP 项目的核心，向新一批开发者开放了该语言，并为现有爱好者开辟了新的可能性。


    在第 6 章中，我探讨了对象可以为项目设计带来的好处。由于对象和设计是本书的核心主题之一，因此值得详细回顾一些结论。


    #### 选择


    没有法律规定你只能使用类和对象进行开发。设计良好的面向对象代码提供了一个干净的接口，可以从任何客户端代码（无论是过程式的还是面向对象的）访问。即使你无意编写对象（如果你还在读这本书，这不太可能），你也很可能会发现自己在使用它们，哪怕只是作为
    Composer 包的客户端。


    #### 封装与委托


    对象各司其职，在幕后完成分配给它们的任务。它们提供一个接口，通过该接口传递请求和结果。任何不需要暴露的数据以及实现的具体细节都隐藏在幕后。


    这赋予了面向对象和过程式项目不同的形态。面向对象项目中的控制器通常出奇地简洁，仅包含少量获取对象的实例化和将数据从一组调用传递到另一组的调用。


    另一方面，过程式项目往往更具干预性。控制逻辑更大程度地深入到实现中，引用变量、衡量返回值，并根据情况在不同的操作路径上切换。


    #### 解耦

