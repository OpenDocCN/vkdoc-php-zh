  raw: 'Duplication throughout the community is kept to a minimum, so expect to be
    directed to a thread or blog post that someone has already used to address the
    same topic when asking a question or requesting support. You will also probably
    sense a feeling of perfectionism in the community. What I mean by that is this—the
    Cake Software Foundation, which manages Cake’s development, could have easily
    taken shortcuts when developing the framework. Compared to other frameworks, Cake
    would already be considered a version 3.0 or 4.0, but it’s currently at 1.2\.
    This is due more to really tightening up the framework rather than cooking up
    something fast that could perform a large plethora of methods. The result of this
    strategy is that Cake really is more robust, mature, and well written than it
    otherwise would be, and you can count on it maintaining its robustness as it takes
    on more fancy methods. I, by no means, am diminishing the large quantity of built-in
    methods that rival any other framework’s functions; I’m merely pointing out that
    one of Cake’s key advantages is its architecture, or, in other words, its methodology—which
    has been very carefully designed and tested.


    Perhaps Cake’s most competitive feature is its find methods for data handling.
    In this book, I’ve explained how to use the find() model function to easily fetch
    database records without writing SQL or other data source queries. By setting
    find conditions and other parameters effectively, you cut down on the amount of
    looping and matching thanks to how the model neatly returns result sets. CodeIgniter,
    unfortunately, comes with basic database helper functions that require you to
    still write most of the queries in SQL. Symfony uses rather complicated criteria
    syntax to set find conditions in the model layer that only mar-ginally improve
    upon PHP’s database functions. And Zend Framework relies almost entirely on your
    knowledge of SQL syntax to use its database adapter classes. Because Cake’s find
    methods are designed independently of a data source, they don’t have to follow
    a specific query language, which makes running finds through the model much easier.


    **CodeIgniter**


    CodeIgniter’s community is relatively small when compared to CakePHP but does
    have a good support network online. Its user guide ([www.codeigniter.com/user_guide)](http://www.codeigniter.com/user_guide)
    is well designed and has a nice layout for navigating through the table of contents.
    Many of the concepts used by Cake are also used by CodeIgniter, such as the MVC
    structure, helpers, routing, scaffolding, and caching. The support network is
    great, with a forum that boasts more than 66,000 topics and more than 400,000
    posts. However, a lot of the topics there aren’t directly related to code development
    issues like Cake’s discussion group. In a sense, CodeIgniter’s forums and wiki
    are more like combining Cake’s discussion group, Bakery, and CakeForge. The number
    of web sites built on CodeIgniter is smaller than that for Cake, but CodeIgniter
    is off to a good start and will likely become a more popular framework in the
    future.


    2\. When compared to other frameworks using Google’s Trend History tool ([www.google.com/trends).
    Of](http://www.google.com/trends)


    the PHP frameworks, CakePHP is searched the most.


    09775appBfinal 7/1/08 9:35 PM Page 292


    **292**


    A P P E N D I X B ■ H O W C A K E P H P C O M PA R E S W I T H OT H E R F R A
    M E W O R K S


    Starting a CodeIgniter application takes less time than setting up a Cake application;
    however, some configuration methods that come preinstalled with Cake are left
    out with CodeIgniter. For example, setting up routes to behave like they do in
    Cake will require that you manually write an .htaccess file to pass paths through
    a similar routing engine. By default, CodeIgniter is more lightweight than Cake,
    which is one of its chief selling points.


    However, as you expand your CodeIgniter application, expect to have to perform
    an extra step here or there to achieve the same functionality you get from Cake.


    The MVC structure in CodeIgniter is similar to Cake’s. Because of this, the general
    process of creating models, views, and controllers is nearly identical to what
    you learn when building Cake applications. Aside from minor differences in passing
    data around the application and naming conventions, running CodeIgniter is largely
    the same experience as in Cake. However, where Cake wins is with its powerful
    core classes, helpers, routes, and data-handling methods.


    The available resources and built-in functionality are more robust in Cake and,
    frankly, more cohesive. In other words, Cake developers will probably think they
    have taken a step backward when fully immersing themselves in CodeIgniter, though
    they will undoubtedly think they are in familiar territory. That’s not to say
    that CodeIgniter isn’t already a fabulous framework; it’s just that it separates
    methods into its several resources less effectively than Cake. In a nutshell,
    the Cake paradigm is more about making the model fat and spreading out the various
    methods; CodeIgniter makes for very large controllers.


    **Symfony**


    Symfony entered the PHP frameworks arena early on and has remained popular. Its
    community is also large with developers groups, forums, a chat room, a wiki, and
    more. All of the main links to these various online groups and sites are available
    on Symfony’s community web page ([www.symfony-project.com/community](http://www.symfony-project.com/community)).


    Symfony actually is much different from CakePHP in its approach. In this book,
    I showed how to create a Cake project by renaming a folder and placing it on your
    server or localhost. In Symfony, you learn important commands that you run through
    a Symfony console script, much like using Bake. You can install Symfony manually
    by downloading a packaged file and configuring its files to work with your server,
    or you can use PEAR to have an installation script handle most of the work for
    you. I find that getting Symfony to work correctly generally requires more time
    than Cake, simply because so many steps are required for both the server and the
    console to work right with the whole framework. But once these configurations
    are in place, starting a new Symfony application is as simple as entering a one-line
    command.


    After you have successfully begun a Symfony application, you will need to initialize
    your data source connections using the command line as well as perform other setup
    tasks. Generating the scaffolding is also done in the console, but the final result
    is similar to Cake’s scaffolding. Building models is primarily done using YAML-based
    configurations together with the symfony console script. If you prefer YAML to
    JSON or XML for configuring your database schema, then Symfony will probably suit
    you well. Cake really doesn’t compare in this regard because its methods for connecting
    to a data source don’t involve the command line (even though you can use Bake
    to write your database.php configuration file and build models).


    09775appBfinal 7/1/08 9:35 PM Page 293


    A P P E N D I X B ■ H O W C A K E P H P C O M PA R E S W I T H OT H E R F R A
    M E W O R K S


    **293**


    When extending the Symfony application to take on more methods, many of the same
    concepts that make Cake effective are used. The learning curve is steeper when
    going from Cake to Symfony, mainly because the benefits Symfony offers are usually
    found in its command-line interface. However, Symfony users shouldn’t find learning
    Cake all that difficult. It may take some getting used to running fewer commands
    in the console, but on the whole, you shouldn’t have to perform any more steps
    to build your Cake applications than you would expect for a Symfony application.


    **Zend Framework**'
