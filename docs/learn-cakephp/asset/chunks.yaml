- fmt: '### A More Complex Mock Example


    Mocks can be as simple as in the previous example or more complex, as your test
    requires. Keep in mind that too complex mocks will make the test less readable,
    so a better practice is to use simpler mocks and have more test methods to test
    different situations. Anyway, here is a more complex mock example:


    ```

    1  $model = $this->getMockForModel(''Categories'', [''hasPostsCount'']);

    2  $model->expects($this->any())

    3      ->method(''hasPostsCount'')

    4      ->with($this->logicalOr(5, 10, $this->anything()))

    5      ->will(

    6          $this->returnCallback(

    7              function ($param) {

    8                  if ($param == 5) {

    9                      return [5, 10, 15];

    10                  } elseif ($param == 10) {

    11                      return [10, 20, 30];

    12                  } else {

    13                      return false;

    14                  }

    15              }

    16          )

    17      );

    18  $model->expects($this->any())

    19      ->method(''hasPostsCount'')

    20      ->will($this->returnValue(null));

    21  $this->assertEquals([5, 10, 15],$model->hasPostsCount(5));

    22  $this->assertEquals([10, 20, 30], $model->hasPostsCount(10));

    23  $this->assertEquals(false, $model->hasPostsCount(1));

    ```


    I think this example is straightforward enough. If the `model` calls


    *   `hasPostsCount(5)`, it will return `[5, 10, 15]`

    *   `hasPostsCount(10)`, it will return `[10, 20, 30]`

    *   `hasPostsCount(any other value`), it will return `false`.


    Remember: We actually do not have the `hasPostsCount()` method in our `Categories`
    table class. So, with mocking, we can use methods before we even write them.


    Check the PHPUnit Manual (`www.phpunit.de/manual/3.0/en/api.html`) for the complete
    list of `expects` methods.


    ### Mocking Core PHP Functions


    Sometimes, though rarely, we have to mock core PHP functions, for example, to
    test file uploads, handling streams, time and date, etc. So, it is useful when
    the code depends on something that we do not have with tests.


    Let’s look at an example. In our blog app, we want to build up a CSV import functionality
    with which the user can upload tags, as manually creating a lot of them can be
    boring.


    Add the following lines to the end of your `/tests/TestCase/Model/Table/TagsTableTest.php`
    file.


    ```

    1  public function testProcessFile()

    2  {

    3      $actual = $this->Tags->processFile(''noFile'');

    4      $this->assertTrue($actual);

    5  }

    ```


    Perhaps we should create the `processFile` method itself. Add the following to
    the `/src/Model/Table/TagsTable.php` file:


    ```

    1  public function processFile($file)

    2  {

    3      if (is_uploaded_file($file)) {

    4          //process the file

    5          return true;

    6      }

    7      return false;

    8  }

    ```


    This method does not do anything with the file, as file processing is not part
    of the discussion topic now. The only interesting part is that we call the `is_uploaded_file`
    PHP core function.


    Let’s run the test.


    ```

    vendor/bin/phpunit --filter testProcessFile tests/TestCase/Model/Table/TagsTableTest.php

    ```


    Not a great surprise. The test fails, as we did not upload anything (see Figure
    [10-1](#A337704_2_En_10_Chapter.html#Fig1)). And the thing is, we do not want
    to upload anything at all, as we want to test the file processing, not the file
    uploading. So, what we want is for `is_uploaded_file` to return `true`, despite
    the fact that we do not upload a file.


    ![A337704_2_En_10_Fig1_HTML.jpg](A337704_2_En_10_Fig1_HTML.jpg)


    Figure 10-1. Failed test of the core PHP function


    PHP namespaces allow us to re-declare or overwrite PHP core functions exclusively
    for that namespace, so that we don’t pollute other parts of the code.


    ![A337704_2_En_10_Figb_HTML.jpg](A337704_2_En_10_Figb_HTML.jpg) The following
    solution is just a workaround. Having more namespaces in a single file is a bad
    practice.


    Add the following lines to the beginning of your `TagsTableTest.php` file:


    ```

    1  <?php

    2  namespace {

    3      // This allows us to configure the behavior of the "global mock"

    4      $mockIsUploadedFile = false;

    5  }

    ```


    At line 4, we create a variable, `$mockIsUploadedFile`, for the global namespace.
    We use this variable to switch between the PHP core `is_uploaded_file` function
    and its corresponding redefined namespace variant.


    ```

    7  namespace App\Model\Table {

    8      function is_uploaded_file()

    9      {

    10          global $mockIsUploadedFile;

    11          if ($mockIsUploadedFile === true) {

    12              return true;

    13          } else {

    14              return call_user_func_array(

    15                  ''\is_uploaded_file'',

    16                  func_get_args()

    17              );

    18          }

    19      }

    20  }

    ```


    At line 8, we re-declare the `is_uploaded_file` function for the `\App\Model\Table`
    namespace. If `$mockIsUploadedFile` is `true`, we just return `true` as a mocked
    result; otherwise, we call PHP’s core `is_uploaded_file` function.


    The last thing that we have to do in this file is to replace the original namespace
    simple declaration with a curly bracket syntax.


    At line 22, we have the following simple declaration:


    ```

    22  namespace App\Test\TestCase\Model\Table;

    ```


    This should be changed to curly bracket declaration, as follows:


    ```

    22  namespace App\Test\TestCase\Model\Table {

    ```


    Perhaps this means that we should add a closing curly bracket at the end of the
    file—and indent everything in this namespace one level.


    At this point, our test should run successfully and yield a green bar.


    ### Summary


    In this chapter, the concept of mocks was introduced. You learned how to mock
    session and request data and model methods. An example of mocking a core PHP function
    was provided, and you learned when to use it.


    ### Controller Tests 2


    ![A337704_2_En_11_Figa_HTML.jpg](A337704_2_En_11_Figa_HTML.jpg)


