  trans: "\n# 排版后的文档\n\n当用户忘记密码时，此程序需要设置安全问题。\n\n需要添加额外的字段，例如姓名、电子邮件和地址。\n\n## `login.php`\n\
    \n此程序需要能够为忘记密码但记得安全问题答案的用户创建临时密码。\n\n## 总体\n\n- 你需要考虑将更多程序（文件）名称移至 XML 文件中，以便于版本变更。\n\
    - 你需要考虑为新的用户 ID 添加访问和审批级别。\n\n一旦系统稳定并准备好上线，你可以考虑预加载主文件。此功能在 PHP 7.4 中实现，并将提高应用程序的速度。为了进行预加载，你需要创建一个单独的\
    \ PHP 程序，该程序在每次服务器重新加载时运行。此外，任何预加载的文件只能在服务器重启时进行更改。因此，只有稳定的文件才应被预加载。预加载大大减少了 PHP\
    \ 代码重新编译的必要性。文件首次使用时会被编译，然后以编译后的格式保留在服务器内存中供后续所有使用。未预加载的文件每次加载到服务器内存时都会被编译。\n\n\
    有关预加载 PHP 文件的示例和更多说明，请访问 [`wiki.php.net/rfc/preload`](https://wiki.php.net/rfc/preload)。\n\
    \n## 章节术语\n\n`$_SERVER['HTTP_REFERER']` | HTML 按钮 | `split` | `var` | JSON 对象\
    \ | `JSON.parse` | `getElementsByName` | HTML 列表框 | `selectedIndex` | `value`\
    \ | 点符号格式 | `checked` 属性 | `is_bool` | `img` | `float: top` | `text-align: center`\
    \ | 四层应用\n\n## 章节问题与项目\n\n### 选择题\n\n1. 哪种 JavaScript 方法可以实现与 PHP 方法 `explode`\
    \ 类似的功能？\n   1. `explode`\n   2. `slice`\n   3. `split`\n   4. 以上都不是\n\n2. 哪种\
    \ JavaScript 方法可以实现与 PHP 方法 `json_decode` 类似的功能？\n   1. `JSON.scan`\n   2. `JSON.parse`\n\
    \   3. `JSON.decode`\n   4. 以上都不是\n\n3. JSON 对象类似于哪种 PHP 对象？\n   1. 数组\n   2.\
    \ 多维数组\n   3. 关联数组\n   4. 以上都不是\n\n4. HTML 按钮可以用来做什么？\n   1. 可用于调用 JavaScript\
    \ 方法\n   2. 可以提交表单\n   3. 可以显示表单\n   4. 以上全部\n\n5. `private` 关键字用于在 PHP 中创建私有对象。JavaScript\
    \ 中使用什么关键字来实现相同功能？\n   1. `private`\n   2. 不需要额外关键字；它们默认是私有的\n   3. `var`\n  \
    \ 4. 以上都不是\n\n### 判断题\n\n1. JavaScript 常用于检索和使用从其他编程语言传递的数据。\n2. CSS 代码 `display:`\
    \ 表单用于显示已对用户隐藏的表单。\n3. CSS 代码 `p {float: top}` 会导致所有段落标签中的内容浮动到浏览器窗口顶部。\n4. `getElementsByName`\
    \ 可用于从一组单选按钮中创建数组。\n5. `is_numeric` 可用于判断一个对象是否不是数组。\n\n### 简答题/论述题\n\n1. 解释为什么以及如何通过最初向用户隐藏表单来迫使他们从列表框中进行选择。\n\
    2. 解释 ABC 犬类收容所预约系统中每个程序如何使用 -1 来表示插入请求。\n3. 解释四层应用程序的每一层。\n4. 将 ABC 犬类收容所预约系统转换为猫类收容所预约系统需要进行哪些更改？\n\
    5. 举例说明在 ABC 犬类收容所预约系统中持续重用的三个算法（代码块）。\n\n### 项目\n\n1. 回到本章标题为“限制/建议”的部分，再次查看列表。从本章下载完整代码，并修复其中一项（或多项）限制。确保在所有适用文件中修复该限制。\n\
    \n### 学期项目\n"
