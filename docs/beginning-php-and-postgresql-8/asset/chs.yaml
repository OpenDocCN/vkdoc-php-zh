- '# 使用已安装的 PEAR 包


  使用已安装的 PEAR 包很简单。您需要做的只是使用 `include` 或更推荐使用的 `require` 将包的内容提供给您的脚本。请看下面的示例，其中包含并使用
  PEAR `DB` 包：


  ```

  <?php

  // 使 PEAR DB 包可用于脚本

  require_once("DB.php");

  // 连接到数据库

  $db = DB::connect("mysql://jason:secret@localhost/book");

  ...

  ?>

  ```


  请记住，您需要将 PEAR 基础目录添加到您的 `include_path` 指令中；否则，将会出现类似如下的错误：


  ```

  Fatal error: Class ''DB'' not found in /home/www/htdocs/book/11/Roman.php on line
  9

  ```


  眼尖的读者可能已经在前面示例中注意到，`require_once` 语句直接引用了 `DB.php` 文件，而在之前涉及 `Numbers_Roman` 包的示例中，还引用了一个目录：`require_once("Numbers/Roman.php");`


  引用目录是因为 `Numbers_Roman` 包属于 `Numbers` 类别，这意味着为了便于组织，会创建一个相应的层级目录，将 `Roman.php` 放置在名为
  `Numbers` 的目录中。您只需查看包名即可确定包在层级中的位置。每个下划线表示层级中的另一级，因此在 `Numbers_Roman` 的情况下，它就是 `Numbers/Roman.php`。对于
  `DB` 的情况，则只是 `DB.php`。


  > **注：** 有关 `include_path` 指令的更多信息，请参见第 2 章。


  #### 升级包


  所有 PEAR 包都必须得到积极维护，并且大多数都处于常规的开发状态。也就是说，为了利用最新的增强功能和错误修复，您应该定期检查是否有新的包版本可用。执行此操作的通用语法如下：


  ```

  %>pear upgrade [package name]

  ```


  例如，有时您需要升级负责管理包环境的 PEAR 包本身。这可以通过以下命令完成：


  ```

  %>pear upgrade pear

  ```


  如果您的版本与最新版本一致，您将看到类似如下的消息：


  ```

  Package ''PEAR-1.3.3.1'' already installed, skipping

  ```


  如果由于某种原因，您的版本高于 PEAR 仓库中的版本（例如，您在官方更新到 PEAR 之前手动从作者网站下载了一个包），您将看到类似这样的消息：


  ```

  Package ''PEAR'' version ''1.3.3.2'' is installed and 1.3.3.1 is

  > requested ''1.3.0'', skipping

  ```


  否则，升级应自动进行。完成后，您将看到类似如下的消息：


  ```

  downloading PEAR-1.3.3.1.tgz ...

  Starting to download PEAR-1.3.3.1.tgz (106,079 bytes)

  ........................done: 106,079 bytes

  upgrade ok: PEAR 1.3.3.1

  ```


  ##### 升级所有包


  自然，您可能希望升级服务器上的所有包，那么为什么不同时完成此任务呢？使用 `upgrade-all` 命令可以轻松实现这一点，执行方法如下：


  ```

  %>pear upgrade-all

  ```


  虽然可能性不大，但未来的某个包版本可能与以前的版本不兼容。也就是说，不建议使用此命令，除非您非常清楚升级每个包所带来的后果。


  #### 卸载包


  如果您已经完成了对某个 PEAR 包的试验，决定使用其他解决方案，或者不再需要该包，则应将其从系统中卸载。使用 `uninstall` 命令可以轻松完成此操作。通用语法如下：


  ```

  %>pear uninstall [options] package name

  ```


  例如，要卸载 `Numbers_Roman` 包，请执行以下命令：


  ```

  %>pear uninstall Numbers_Roman

  ```


  由于这些选项很少使用，您可以通过执行以下命令自行进行进一步研究：


  ```

  %>pear help uninstall

  ```


  #### 降级包


  没有通过包管理器直接降级包的简便方法。要执行降级操作，请通过 PEAR 网站 (http://pear.php.net) 下载所需版本（该版本将被封装为 TGZ
  格式），卸载当前已安装的包，然后使用前面“安装包”一节中提供的说明安装下载的包。


  ### 总结


  PEAR 可以成为快速创建 PHP 应用程序的重要催化剂。希望本章能让您相信这个仓库可以节省大量时间。您了解了 PEAR 包管理器，以及如何管理和使用包。后续章节将适时介绍更多包，向您展示这些包如何真正加快开发速度并增强应用程序的能力。


  ***


  '
- '# 第 12 章：日期和时间


  **时**间问题在编程的几乎每一个方面都扮演着重要角色，并且对于以用户感兴趣的方式呈现数据至关重要。教程是什么时候发布的？特定产品的定价信息是最新的吗？办公室助理是什么时候登录会计系统的？企业网站在一天中的哪个时段访问流量最大？这些以及其他无数与时间相关的问题会定期出现，使得恰当处理此类问题对于编程工作的成功至关重要。


  本章介绍 PHP 强大的日期和时间操作能力。在提供一些关于 Unix 如何处理日期和时间值的初步信息后，您将学习 PHP 日期和时间库中几个更常用的函数。接下来，我们将进行一场日期功夫的较量，您将学习如何组合使用这些日期函数以产生致命（好吧，是有用的）组合，年轻的学徒。我们还将使用命名恰当的
  PEAR 包 `Calendar` 创建网格日历。最后，将介绍自 PHP 5.1 起可用的、大幅改进的日期和时间操作函数。


  ### Unix 时间戳


  将我们世界中常常不一致的方面适配到编程环境的严格约束中可能是一件繁琐的事情。在处理日期和时间时，此类问题尤其突出。例如，假设您需要计算两个时间点之间的天数差，但日期是以“2005
  年 7 月 4 日下午 3:45”和“2005 年 12 月 7 日 18:17”这种格式提供的。可以想象，如何通过编程方式做到这一点将是一项艰巨的任务。您需要的是一个标准格式，一种关于所有日期和时间将如何呈现的某种约定。最好，信息能以某种数字格式提供，例如
  `20050704154500` 和 `20051207181700`。以这种方式格式化的日期和时间值通常被称为 *时间戳 (timestamps)*。


  然而，即使这种改进的情况也有其问题。例如，这个提议的解决方案仍然无法解决时区、夏令时造成的时间调整，或文化日期格式差异所带来的挑战。我们需要的是根据单一标准时间进行标准化，并设计一种无关的格式，以便能够轻松转换为任何所需的格式。比如用时来表示时间值，并将所有时间都建立在协调世界时
  (UTC) 的基础上，怎么样？实际上，早期的 Unix 开发团队采用了这一策略，使用 1970 年 1 月 1 日 00:00:00 UTC 作为所有日期测量的基准。




  '
- '# 日期与时间处理


  这些日期通常被称为 **Unix 纪元**（Unix epoch）。因此，前一个例子中格式不一致的日期实际上将被表示为 `1120491900` 和 `1133979420`。


  ■**注意** 你可能会疑惑，能否处理 Unix 纪元（1970 年 1 月 1 日 00:00:00 UTC）之前的日期？实际上是可以的，至少在使用基于 Unix
  的系统时如此。在 Windows 上，由于整数溢出问题，如果你尝试将此章节中面向时间戳的函数与纪元定义之前的日期一起使用，将会发生错误。


  ### PHP 的日期与时间库


  即使是最简单的 PHP 应用程序，也往往至少会用到几个 PHP 的日期和时间相关函数。无论是验证日期、以特定格式格式化时间戳，还是将人类可读的日期值转换为其对应的时间戳，这些函数在处理原本相当复杂的任务时都能发挥巨大作用。


  #### `checkdate()`


  `boolean checkdate (int month, int day, int year)`


  虽然大多数读者都能清晰地记得小学时学过的“三十天的是九月”这首童谣¹，但恐怕很少有人（包括在座各位）能完整背诵它。


  幸运的是，`checkdate()` 函数能很好地完成日期验证任务：如果由 `month`、`day` 和 `year` 指定的日期有效，则返回 `TRUE`，否则返回
  `FALSE`。让我们看几个例子：


  ```php

  echo checkdate(4, 31, 2005);

  // 返回 false


  echo checkdate(03, 29, 2004);

  // 返回 true，因为 2004 年是闰年


  echo checkdate(03, 29, 2005);

  // 返回 false，因为 2005 年不是闰年

  ```


  ##### `date()`


  `string date (string format [, int timestamp])`


  `date()` 函数根据 `format` 指定的指令，返回当前时间和/或日期的字符串表示形式。表 12-1 列出了几乎所有可用的 `date()` 格式参数。在此我们决定不包含
  Swatch 互联网时间² 的参数，敬请谅解。


  如果包含可选的 `timestamp` 参数（以 Unix 时间戳格式表示），`date()` 将根据该参数生成日期字符串。`timestamp` 参数必须符合
  GNU 日期语法规则。如果未提供 `timestamp`，则会使用当前的 Unix 时间戳。


  **表 12-1.** `date()` 函数的格式参数


  | 参数 | 描述 | 示例 |

  |------|------|------|

  | `a` | 小写的上午和下午 | `am` 或 `pm` |

  | `A` | 大写的上午和下午 | `AM` 或 `PM` |

  | `d` | 月份中的第几天，带前导零 | `01` 到 `31` |

  | `D` | 三字母文本表示的星期几 | `Mon` 到 `Sun` |

  | `F` | 月份的完整文本表示 | `January` 到 `December` |

  | `g` | 12 小时制的小时，不带前导零 | `1` 到 `12` |

  | `G` | 24 小时制的小时，不带前导零 | `1` 到 `24` |

  | `h` | 12 小时制的小时，带前导零 | `01` 到 `24` |

  | `H` | 24 小时制的小时，带前导零 | `01` 到 `24` |

  | `i` | 分钟，带前导零 | `01` 到 `60` |

  | `I` | 夏令时 | `0` 表示否，`1` 表示是 |

  | `j` | 月份中的第几天，不带前导零 | `1` 到 `31` |

  | `l` | 星期几的文本表示 | `Monday` 到 `Sunday` |

  | `L` | 闰年 | `0` 表示否，`1` 表示是 |

  | `m` | 月份的数字表示，带前导零 | `01` 到 `12` |

  | `M` | 三字母文本表示的月份 | `Jan` 到 `Dec` |

  | `n` | 月份的数字表示，不带前导零 | `1` 到 `12` |

  | `O` | 与格林威治标准时间（GMT）的差值 | `-0500` |

  | `r` | 根据 RFC 2822 格式化的日期 | `Tue, 19 Apr 2005 22:37:00 -0500` |

  | `s` | 秒，带前导零 | `01` 到 `59` |

  | `S` | 日期的序数后缀 | `st`、`nd`、`rd`、`th` |


  ---


  ¹ “三十天的是九月，四月、六月和十一月；二月独自有二十八，其余都是三十一，除了闰年，那时二月的日子是二十九。”


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ² Swatch 互联网时间是一种时间计量系统。



  ```markdown

