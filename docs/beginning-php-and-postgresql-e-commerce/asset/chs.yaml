  \ `department.tpl` 模板文件。否则（例如在首页时），则使用空白模板文件（你将在创建首页内容单元的模板时更改此设置）。以下是 `index.php`\
  \ 中为 `$pageContentsCell` 赋值的代码：\n\n```php\n// 定义页面内容的模板文件\n$pageContentsCell = 'blank.tpl';\n\
  \n// 如果访问部门页面，则加载部门详情\nif (isset($_GET['DepartmentID']))\n{\n    $pageContentsCell\
