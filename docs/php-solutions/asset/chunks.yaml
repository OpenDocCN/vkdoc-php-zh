  trans: "\n#### PHP 方案 4-4：根据文件名自动生成页面标题\n\n既然你已经知道如何获取当前页面的文件名，那么自动生成每个页面的 `<title>`\
    \ 标签内容也会很有用。本方案使用 `basename()` 提取文件名，然后利用 PHP 字符串函数格式化名称，以便插入到 `<title>` 标签中。\n\
    \n此方法仅适用于文件名能体现页面内容的场景，但由于这是一种良好的实践，所以其实算不上限制。虽然以下步骤使用的是 Japan Journey 网站，但你可以在任何页面上尝试。\n\
    \n创建一个名为 `title.php` 的新 PHP 文件，并将其保存在 `includes` 文件夹中。删除脚本编辑器自动插入的代码，然后输入以下代码：\n\
    \n```\n<?php\n$title = basename($_SERVER['SCRIPT_FILENAME'], '.php');\n```\n\n\
    **提示：** 由于该文件仅包含 PHP 代码，请勿在末尾添加 PHP 结束标签。当同一文件中 PHP 代码后无其他内容时，结束标签是可选的。省略该标签有助于避免包含文件中常见的“headers\
    \ already sent（标头已发送）”错误。你将在 PHP 方案 4-8 中了解更多关于此错误的信息。\n\nPHP 方案 4-3 中使用的 `basename()`\
    \ 函数有一个可选的第二个参数：一个字符串，包含前面带点号的文件扩展名。添加第二个参数可以提取文件名并去除其扩展名。因此，这段代码会找到当前页面的文件名，去除\
    \ `.php` 扩展名，并将结果赋值给变量 `$title`。\n\n打开 `contact.php`，并在 `DOCTYPE` 上方输入以下代码来引入\
    \ `title.php`：\n\n```\n<?php include './includes/title.php'; ?>\n```\n\n像这样修改\
    \ `<title>` 标签：\n\n```\n<title>Japan Journey <?php echo \"&#8212;{$title}\"; ?></title>\n\
    ```\n\n这里使用 `echo` 显示 `—`（长破折号的数字实体）后跟 `$title` 的值。由于字符串被双引号括起来，PHP 会显示 `$title`\
    \ 的值。变量 `$title` 被花括号括起来，因为长破折号和 `$title` 之间没有空格。虽然并非总是必要，但在双引号字符串中使用变量且没有空格时，将变量括在花括号内是一个好习惯。这可以使变量对开发者和\
    \ PHP 引擎都更清晰。\n\n我没有使用 `echo` 的简写形式（`<?=`），因为我们稍后会向此代码块添加更多脚本。\n\n你的页面开头几行应如下所示：\n\
    \n![A978-1-4842-0635-5_4_Figc_HTML.jpg](img/A978-1-4842-0635-5_4_Figc_HTML.jpg)\n\
    \n**注意：** 通常情况下，网页中 `DOCTYPE` 声明之前不应有任何内容。但这不适用于 PHP 代码，只要它不向浏览器发送任何输出即可。`title.php`\
    \ 中的代码仅给 `$title` 赋值，因此 `DOCTYPE` 声明仍然是浏览器看到的第一个输出。\n\n看起来不错，但如果你希望标题中来自文件名的部分首字母大写怎么办？PHP\
    \ 有一个简洁的小函数 `ucfirst()`，正是用于此目的（一旦你意识到 `uc` 代表“大写”，就很容易记住这个名字）。在第 2 步的代码中添加另一行，如下所示：\n\
    \n![A978-1-4842-0635-5_4_Fig6_HTML.jpg](img/A978-1-4842-0635-5_4_Fig6_HTML.jpg)\n\
    \n图 4-6. 提取文件名后，即可动态生成页面标题\n\n保存两个页面，然后在浏览器中加载 `contact.php`。不带 `.php` 扩展名的文件名已添加到浏览器标签页中，如图\
    \ 4-6 所示。\n\n```\n<?php\n$title = basename($_SERVER['SCRIPT_FILENAME'], '.php');\n\
    $title = ucfirst($title);\n```\n\n如果你是编程新手，这看起来可能令人困惑，但一旦分析起来其实很简单：PHP 标签后的第一行代码获取文件名，去掉末尾的\
    \ `.php`，并将其存储为 `$title`。下一行获取 `$title` 的值，将其传递给 `ucfirst()` 来大写首字母，然后将结果存回 `$title`。因此，如果文件名是\
    \ `contact.php`，`$title` 初始值为 `contact`，但在执行下一行后，它变成了 `Contact`。\n\n**提示：** 你可以通过将这两行合并为一行来缩短代码，如下所示：\n\
    \n```\n$title = ucfirst(basename($_SERVER['SCRIPT_FILENAME'], '.php'));\n```\n\
    \n当像这样嵌套函数时，PHP 会先处理最内层的函数，并将结果传递给外层函数。这使代码更短，但可读性较差。\n\n这种技术的一个缺点是文件名只包含一个单词——至少应该是这样。URL\
    \ 中不允许有空格，这就是大多数网页设计软件将空格替换为 `%20` 的原因，这在 URL 中看起来既丑陋又不专业。你可以通过使用下划线来解决这个问题。\n\
    \n将 `contact.php` 的文件名更改为 `contact_us.php`。\n\n像这样修改 `title.php` 中的代码：\n\n```\n\
    <?php\n$title = basename($_SERVER['SCRIPT_FILENAME'], '.php');\n$title = str_replace('_',\
    \ ' ', $title);\n$title = ucwords($title);\n```\n\n中间一行使用名为 `str_replace()` 的函数来查找每个下划线并将其替换为空格。该函数接受三个参数：要查找的字符、替换字符以及要修改的字符串。\n\
    \n**提示：** 你也可以使用 `str_replace()` 来删除字符，方法是将空字符串（一对中间没有任何内容的引号）作为第二个参数。这会将第一个参数中的字符串替换为空，从而有效地删除它。\n\
    \n最后一行动态生成代码使用了与 `ucfirst()` 相关的函数 `ucwords()`，该函数会将每个单词的首字母大写。\n\n![A978-1-4842-0635-5_4_Fig8_HTML.jpg](img/A978-1-4842-0635-5_4_Fig8_HTML.jpg)\n\
    \n图 4-8. 从 `index.php` 生成页面标题会产生不理想的结果\n\n保存 `title.php`，然后在浏览器中加载重命名后的 `contact_us.php`。图\
    \ 4-7 显示了结果。（Google Chrome 会截断标签页中的标题，但你可以通过工具提示看到完整标题。）\n\n![A978-1-4842-0635-5_4_Fig7_HTML.jpg](img/A978-1-4842-0635-5_4_Fig7_HTML.jpg)\n\
    \n图 4-7. 下划线已被移除，并且两个单词都首字母大写\n\n将文件名称改回 `contact.php`，然后重新加载文件到浏览器中。`title.php`\
    \ 中的脚本仍然有效。因为没有下划线需要替换，所以 `str_replace()` 会保持 `$title` 的值不变，而 `ucwords()` 会将首字母转换为大写，即使只有一个单词。\n\
    \n对 `index.php`、`blog.php` 和 `gallery.php` 重复步骤 3 和 4。\n\nJapan Journey 网站的主页名为\
    \ `index.php`。如图 4-8 所示，将当前方案应用于此页面似乎不太合适。\n\n有两种解决方案：要么不对此类页面应用此技术，要么使用条件语句（`if`\
    \ 语句）来处理特殊情况。例如，要显示 Home 而非 Index，可以像这样修改 `title.php` 中的代码：\n\n```\n<?php\n$title\
    \ = basename($_SERVER['SCRIPT_FILENAME'], '.php');\n$title = str_replace('_',\
    \ ' ', $title);\nif ($title == 'index') {\n    $title = 'home';\n}\n$title = ucwords($title);\n\
    ```\n\n条件语句的第一行使用两个等号来检查 `$title` 的值。下一行使用单个等号将新值赋给 `$title`。如果页面名称不是 `index.php`，花括号内的行将被忽略，`$title`\
    \ 保持其原始值。\n\n**提示：**\n"
- fmt: "PHP是区分大小写的，因此这个解决方案仅在`\"index\"`全为小写时才有效。要进行不区分大小写的比较，请将上述代码第四行修改为：\n\n```\n\
    if (strtolower($title) == 'index') {\n```\n\n函数`strtolower()`将字符串转换为小写（因此得名），常用于进行不区分大小写的比较。小写转换并非永久性的，因为`strtolower($title)`并未赋值给变量；它仅用于比较操作。要使更改永久生效，需要将结果赋值回变量，例如最后一行将`ucwords($title)`赋值回`$title`。\n\
    \n要将字符串转换为大写，请使用`strtoupper()`。\n\n返回`contact.php`，你将看到页面标题仍然从页面名称正确派生。\n\n![A978-1-4842-0635-5_4_Fig9_HTML.jpg](A978-1-4842-0635-5_4_Fig9_HTML.jpg)\n\
    \n图4-9\n\n条件语句将`index.php`上的标题更改为Home。保存`title.php`并在浏览器中重新加载`index.php`。页面标题现在看起来更自然，如图4-9所示。\n\
    \n最后还需要改进一点。`<title>`标签内的PHP代码依赖于变量`$title`的存在，如果包含文件出现问题，该变量将不会被设置。在尝试显示来自外部来源的变量内容之前，最好使用名为`isset()`的函数检查该变量是否存在。\n\
    \n将`echo`命令包裹在条件语句中并测试变量是否存在，如下所示：\n\n```\n<title>Japan Journey<?php if (isset($title))\
    \ { echo \"—{$title}\"; } ?></title>\n```\n\n如果`$title`不存在，则忽略其余代码，保留默认站点标题Japan\
    \ Journey。你需要将此更改应用到所有四个页面：`index.php`、`blog.php`、`gallery.php`和`contact.php`。\n\
    \n你可以将代码与`title.php`以及`ch04`文件夹中`index_03.php`、`blog_02.php`、`gallery_02.php`和`contact_02.php`的更新版本进行比对。\n\
    \n### 创建内容变化的页面\n\n到目前为止，我们已经使用PHP根据页面的文件名生成不同的输出。接下来的两个解决方案将生成独立于文件名变化的内容：一个在1月1日自动更新年份的版权声明，以及一个随机图像生成器。\n\
    \n#### PHP解决方案 4-5: 自动更新版权声明\n\n目前，`footer.php`中的版权声明仅包含静态HTML。此PHP解决方案将展示如何使用`date()`函数自动生成当前年份。代码还指定了版权起始年份，并使用条件语句判断当前年份是否不同。如果不同，则同时显示两个年份。\n\
    \n继续使用PHP解决方案4-4中的文件。或者，使用`ch04`文件夹中的`index_03.php`和`footer_01.php`，并移除文件名中的数字。如果使用`ch04`文件夹中的文件，请确保`includes`文件夹中有`title.php`和`menu.php`的副本。\n\
    \n打开`footer.php`。它包含以下HTML：\n\n```\n<footer>\n<p>&copy; 2006&ndash;2014 David\
    \ Powers</p>\n</footer>\n```\n\n日期之间的`&ndash;`是短破折号的字符实体。\n\n使用包含文件的优点在于，只需更改这一个文件即可更新整个网站的版权声明。然而，更高效的方法是自动增加年份，从而完全无需每年更新。\n\
    \nPHP的`date()`函数可以非常简洁地处理这个问题。将段落中的代码修改如下：\n\n```\n<p>&copy; 2006&ndash;<?php\
    \ echo date('Y'); ?> David Powers</p>\n```\n\n这将替换第二个日期，并使用四位数字显示当前年份。请确保向`date()`传递大写字母Y作为参数。\n\
    \n保存`footer.php`并在浏览器中加载`index.php`。页面底部的版权声明应看起来与之前相同——当然，除非你是在2015年或之后阅读本文，在这种情况下将显示当前年份。与大多数版权声明一样，这里涵盖了一个年份范围，表示网站首次上线的时间。由于第一个日期是过去的日期，可以硬编码。但如果你正在创建一个新网站，则只需要当前年份。直到1月1日才需要年份范围。\n\
    \n你不可能为了更新版权声明而中断新年狂欢。必须有更好的方法。多亏了PHP，你可以在新年前夜尽情狂欢。\n\n要显示年份范围，你需要知道起始年份和当前年份。如果两个年份相同，则仅显示当前年份；如果不同，则同时显示并用短破折号分隔。这是一个简单的`if...else`场景。将`footer.php`中的段落代码修改如下：\n\
    \n```\n<p>&copy;\n<?php\n$startYear = 2006;\n$thisYear = date('Y');\nif ($startYear\
    \ == $thisYear) {\n    echo $startYear;\n} else {\n    echo \"{$startYear}&ndash;{$thisYear}\"\
    ;\n}\n?>\nDavid Powers</p>\n```\n\n与PHP解决方案4-4一样，我在`else`子句中使用了花括号包裹变量，因为它们位于不含空格的双引号字符串中。\n\
    \n保存`footer.php`并在浏览器中重新加载`index.php`。版权声明应看起来与之前相同。将传递给`date()`函数的参数改为小写y，如下所示：\n\
    \n```\n$thisYear = date('y');\n```\n\n保存`footer.php`并点击浏览器的刷新按钮。第二个年份将仅显示最后两位数字，如下截图所示：\n\
    \n![A978-1-4842-0635-5_4_Figd_HTML.jpg](A978-1-4842-0635-5_4_Figd_HTML.jpg)\n\n\
    提示\n\n这应提醒你PHP是区分大小写的。对于`date()`函数，大写Y和小写y会产生不同的结果。忘记大小写敏感性是PHP中最常见的错误原因之一。\n\n\
    将传递给`date()`的参数改回大写Y。将`$startYear`的值设置为当前年份并重新加载页面。这次，你应该只看到当前年份显示。你现在拥有了一个全自动的版权声明。完成后的代码位于`ch04`文件夹中的`footer_02.php`。"
  raw: 'PHP is case-sensitive, so this solution works only if “index” is all lowercase.
    To do a case-insensitive comparison, change the fourth line of the preceding code
    like this:


    `if (` `strtolower(` `$title` `)` `== ''index'') {`


    The function `strtolower()` converts a string to lowercase—hence its name—and
    is frequently used to make case-insensitive comparisons. The conversion to lowercase
    is not permanent, because `strtolower($title)` isn’t assigned to a variable; it’s
    only used to make the comparison. To make a change permanent, you need to assign
    the result back to a variable, as in the final line, when `ucwords($title)` is
    assigned back to `$title`.


    To convert a string to uppercase, use `strtoupper()`.


    Navigate back to `contact.php`, and you’ll see that the page title is still derived
    correctly from the page name.


    ![A978-1-4842-0635-5_4_Fig9_HTML.jpg](A978-1-4842-0635-5_4_Fig9_HTML.jpg)


    Figure 4-9.


    The conditional statement changes the title on index.php to Home Save `title.php`
    and reload `index.php` into a browser. The page title now looks more natural,
    as shown in Figure [4-9](#A978-1-4842-0635-5_4_Chapter.html#Fig9).


    There’s one final refinement you should make. The PHP code inside the `<title>`
    tag relies on the existence of the variable `$title`, which won’t be set if there’s
    a problem with the include file. Before attempting to display the contents of
    a variable that comes from an external source, it’s always a good idea to check
    that it exists, using a function called `isset()`.


    Wrap the `echo` command inside a conditional statement and test for the variable’s
    existence, like this:


    `<title>Japan Journey<?php` `if (isset($title)) {` `echo "—{$title}";` `}` `?>`


    `</title>`


    If `$title` doesn’t exist, the rest of the code is ignored, leaving the default
    site title, Japan Journey. You need to apply this change to all four pages: `index.php`,
    `blog.php`, `gallery.php`, and `contact.php`.


    You can check your code against `title.php` and updated versions of the other
    files in `index_03.php`, `blog_02.php`, `gallery_02.php`, and `contact_02.php`
    in the `ch04` folder.


    ### Creating Pages with Changing Content


    So far, you’ve used PHP to generate different output depending on the page’s filename.
    The next two solutions generate content that changes independently of the filename:
    a copyright notice that updates the year automatically on January 1 and a random
    image generator.


    #### PHP Solution 4-5: Automatically Updating a Copyright Notice


    At the moment, the copyright notice in `footer.php` contains only static HTML.
    This PHP solution shows how to use the `date()` function to generate the current
    year automatically. The code also specifies the first year of copyright and uses
    a conditional statement to determine whether the current year is different. If
    it is, both years are displayed.


    Continue working with the files from PHP Solution 4-4\. Alternatively, use `index_03.php`
    and `footer_01.php` from the `ch04` folder, and remove the numbers from the filenames.
    If using the files from the `ch04` folder, make sure you have copies of `title.php`
    and `menu.php` in the `includes` folder.


    Open `footer.php`. It contains the following HTML:  


    `<footer>`


    `<p>&copy; 2006&ndash;2014 David Powers</p>`


    `</footer>`


    The `&ndash;` between the dates is the character entity for an en dash.


    The advantage of using an include file is that you can update the copyright notice
    throughout the site by changing this one file. However, it would be much more
    efficient to increment the year automatically, doing away with the need for annual
    updates altogether.


    The PHP `date()` function takes care of this very neatly. Change the code in the
    paragraph like this:  


    `<p>&copy; 2006&ndash;` `<?php echo date(''Y''); ?>` `David Powers</p>`


    This replaces the second date and displays the current year using four digits.
    Make sure you pass an uppercase Y as the argument to `date()`.


    Save `footer.php` and load `index.php` into a browser. The copyright notice at
    the foot of the page should look the same as before—unless, of course, you’re
    reading this in 2015 or later, in which case the current year will be displayed.
      Like most copyright notices, this covers a range of years, indicating when a
    site was first launched. Since the first date is in the past, it can be hard-coded.
    But if you’re creating a new website, you need only the current year. The range
    of years isn’t needed until January 1.  


    You don’t want to have to break away from the New Year revelries just to update
    the copyright notice. There needs to be a better way. Thanks to PHP, you can party
    to your heart’s content on New Year’s Eve.


    To display a range of years, you need to know the start year and the current year.
    If both years are the same, display only the current year; if they’re different,
    display both with an en dash between them. It’s a simple `if. . .else`situation.
    Change the code in the paragraph in `footer.php` like this:


    `<p>&copy;`


    `<?php`


    `$startYear = 2006;`


    `$thisYear = date(''Y'');`


    `if ($startYear == $thisYear) {`


    `echo $startYear;`


    `} else {`


    `echo "{$startYear}` `&` `ndash;{$thisYear}";`


    `}`


    `?>`


    `David Powers</p>`


    As in PHP Solution 4-4, I’ve used curly braces around the variables in the `else`
    clause because they’re in a double-quoted string that contains no whitespace.


    Save `footer.php` and reload `index.php` in a browser. The copyright notice should
    look the same as before.   Change the argument passed to the `date()` function
    to a lowercase y, like this:  


    `$thisYear = date(''` `y` `'');`


    Save `footer.php` and click the Reload button in your browser. The second year
    is displayed using only the last two digits, as shown in the following screenshot:
     


    ![A978-1-4842-0635-5_4_Figd_HTML.jpg](A978-1-4842-0635-5_4_Figd_HTML.jpg)


    Tip


    This should serve as a reminder that PHP is case-sensitive. Uppercase Y and lowercase
    y produce different results with the `date()` function. Forgetting about case
    sensitivity is one of the most common causes of errors in PHP.


    Change the argument passed to `date()` back to an uppercase Y. Set the value of
    `$startYear` to the current year and reload the page. This time, you should see
    only the current year displayed.  


    You now have a fully automated copyright notice. The finished code is in `footer_02.php`
    in the `ch04` folder.'
