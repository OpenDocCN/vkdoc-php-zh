    C H A P T E R 8


    The Shopping Cart


    **W**elcome to thesecond stage of development! At this stage, you start improving
    and adding new features to the already existing, fully functional e-commerce site.


    So, what exactly can you improve? Well, the answer to this question isn’t hard
    to find if you take a quick look at the popular e-commerce sites on the web. They
    personalize the experience for the user, provide product recommendations, remember
    customers’ preferences, and boast many other features that make the site easy
    to remember and hard to leave without first purchasing something.


    In the first stage of development, you extensively relied on a third-party payment
    processor (PayPal) that supplied an integrated shopping cart, so you didn’t record
    any shopping cart or order info in the database. Right now, your site isn’t capable
    of displaying a list of “most wanted” products or any other information about
    the products that have been sold through the web site because, at this stage,
    you aren’t tracking the products sold. This makes it impossible to implement any
    of these improvements.


    Obviously, saving order information in the database is your first priority. In
    fact, most of the features you’ll want to implement next rely on having a record
    of the products sold. To achieve this functionality, in this chapter, you’ll implement
    a custom shopping cart, which will store data in the local hatshop database. This
    will provide you with more flexibility than the PayPal shopping cart over which
    you have no control and which cannot be easily saved into your database for further
    processing and analysis. With the custom shopping cart, when the visitor clicks
    the Add to Cart button for a product, the product is added to the visitor’s shopping
    cart. When the visitor clicks the View Cart button, a page like the one shown
    in Figure 8-1


    appears.


    **267**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00113.png)


    ![](images/00068.png)


