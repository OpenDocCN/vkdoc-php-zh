- fmt: "# 排版后的文本\n\n## MySQLi 实现\n\n1. 现有的 `SELECT` 查询用于检索待更新文章的详细信息，需要修改以包含外键 `image_id`，并将结果绑定到新的结果变量\
    \ `$image_id`。然后需要运行第二个 `SELECT` 查询来获取 `images` 表的详细信息。在此之前，需要调用预处理语句的 `free_result()`\
    \ 方法来释放数据库资源。将以下加粗显示的代码添加到现有脚本中：\n\n```\nif (isset($_GET['article_id']) && !$_POST)\
    \ {\n    // prepare SQL query\n    $sql = 'SELECT article_id, image_id, title,\
    \ article FROM blog\n    WHERE article_id = ?';\n    if ($stmt->prepare($sql))\
    \ {\n        // bind the query parameter\n        $stmt->bind_param('i', $_GET['article_id']);\n\
    \        // execute the query\n        $OK = $stmt->execute();\n        // bind\
    \ the results to variables and fetch\n        $stmt->bind_result($article_id,\
    \ $image_id, $title, $article);\n        $stmt->fetch();\n        // free the\
    \ database resources for the second query\n        $stmt->free_result();\n   \
    \ }\n}\n```\n\n可以在调用 `fetch()` 方法后立即释放结果，因为结果集中只有一条记录，且每列的值都已绑定到变量。\n\n2. 在表单内部，需要显示\
    \ `images` 表中存储的文件名。由于第二个 `SELECT` 语句不依赖于外部数据，使用 `query()` 方法比预处理语句更简单。在 `article`\
    \ 文本区域之后添加以下代码（所有代码都是新增的，但 PHP 部分以加粗显示以便参考）：\n\n```\nUploaded image:\n\nSelect\
    \ image\n    query($getImages);\n    while ($row = $images->fetch_assoc()) {\n\
    \    ?>\n    \"\n    >\n\n```\n\n第一个 `<option>` 标签硬编码了标签 `Select image`，其 `value`\
    \ 设置为空字符串。其余 `<option>` 标签由 `while` 循环填充，该循环将每条记录提取到名为 `$row` 的数组中。\n\n条件语句检查当前的\
    \ `image_id` 是否与 `articles` 表中已存储的相同。如果是，则在 `<option>` 标签中插入 `selected`，以便在下拉菜单中显示正确的值。\n\
    \n请确保不要遗漏以下代码行中的第三个字符：\n\n```\n?>>\n```\n\n它是 `<option>` 标签的右尖括号，夹在两个 PHP 标签之间。\n\
    \n3. 保存页面并在浏览器中加载。您应该会自动重定向到 `blog_list_mysqli.php`。选择一个 EDIT 链接，确保页面看起来像图 17-4。检查浏览器源代码视图，验证\
    \ `<option>` 标签的 `value` 属性是否包含每张图片的主键。\n\n**提示**：如果 `<select>` 菜单没有列出图片，则几乎可以确定是步骤\
    \ 2 中的 `SELECT` 查询存在错误。在调用 `query()` 方法后立即添加 `echo $conn->error;`，然后重新加载页面。您需要查看浏览器源代码才能看到错误信息。如果消息是“Commands\
    \ out of sync; you can’t run this command now”，问题在于步骤 1 中没有使用 `free_result()`\
    \ 释放数据库资源。\n\n4. 最后阶段是将 `image_id` 添加到 `UPDATE` 查询中。由于某些博客条目可能没有关联图片，您需要创建替代的预处理语句，如下所示：\n\
    \n```\n// if form has been submitted, update record\nif (isset($_POST ['update']))\
    \ {\n    // prepare update query\n    if (!empty($_POST['image_id'])) {\n    \
    \    $sql = 'UPDATE blog SET image_id = ?, title = ?, article = ?\n        WHERE\
    \ article_id = ?';\n        if ($stmt->prepare($sql)) {\n            $stmt->bind_param('issi',\
    \ $_POST['image_id'], $_POST['title'],\n            $_POST['article'], $_POST['article_id']);\n\
    \            $done = $stmt->execute();\n        }\n    } else {\n        $sql\
    \ = 'UPDATE blog SET image_id = NULL, title = ?, article = ?\n        WHERE article_id\
    \ = ?';\n        if ($stmt->prepare($sql)) {\n            $stmt->bind_param('ssi',\
    \ $_POST['title'], $_POST['article'],\n            $_POST['article_id']);\n  \
    \          $done = $stmt->execute();\n        }\n    }\n}\n```\n\n如果 `$_POST['image_id']`\
    \ 有值，则将其作为第一个参数（使用占位符问号）添加到 SQL 中。由于它必须是整数，在 `bind_param()` 的第一个参数开头添加 `i`。\n\n\
    但是，如果 `$_POST['image_id']` 没有值，则需要创建另一个预处理语句，将 SQL 查询中的 `image_id` 设置为 `NULL`。由于它具有显式值，因此不将其添加到\
    \ `bind_param()` 中。\n\n5. 再次测试页面，从下拉菜单中选择一个文件名，然后点击 `Update Entry`。您可以通过刷新 phpMyAdmin\
    \ 中的 `Browse`，或选择同一篇文章进行更新，来验证外键是否已插入到 `articles` 表中。这次，下拉菜单中应显示正确的文件名。\n\n如有必要，请对照\
    \ `ch17` 文件夹中的 `blog_update_mysqli_04.php` 检查您的代码。\n\n## PHP Solution 17-3: 添加图片外键\
    \ (PDO)\n\n此 PHP 解决方案使用 PDO 通过将所选图片的主键作为外键添加来更新 `blog` 表中的记录。与 MySQLi 的主要区别在于，PDO\
    \ 可以使用 `bindValue()` 方法将 `null` 值绑定到占位符。本说明将适配第 15 章的 `admin/blog_update_pdo.php`。使用您在第\
    \ 15 章中创建的版本。或者，将 `ch15` 文件夹中的 `blog_update_pdo_03.php` 复制到 `admin` 文件夹，并从文件名中删除\
    \ `_03`。\n\n1. 将 `image_id` 添加到检索待更新文章详细信息的 `SELECT` 查询中，并将结果绑定到 `$image_id`。这涉及重新编号作为第一个参数传递给\
    \ `bindColumn()` 的列，以对应 `$title` 和 `$article`。修订后的代码如下所示：\n\n```\nif (isset($_GET['article_id'])\
    \ && !$_POST) {\n    // prepare SQL query\n    $sql = 'SELECT article_id, image_id,\
    \ title, article FROM blog\n    WHERE article_id = ?';\n    $stmt = $conn->prepare($sql);\n\
    \    // pass the placeholder value to execute() as a single-element array\n  \
    \  $OK = $stmt->execute([$_GET['article_id']]);\n    // bind the results\n   \
    \ $stmt->bindColumn(1, $article_id);\n    $stmt->bindColumn(2, $image_id);\n \
    \   $stmt->bindColumn(3, $title);\n    $stmt->bindColumn(4, $article);\n    $stmt->fetch();\n\
    }\n```\n\n2. 在表单内部，需要显示 `images` 表中存储的文件名。由于第二个 `SELECT` 语句不依赖于外部数据，使用 `query()`\
    \ 方法比预处理语句更简单。在 `article` 文本区域之后添加以下代码（所有代码都是新增的，但 PHP 部分以加粗显示以便参考）：\n\n```\n\
    Uploaded image:\n\nSelect image\n    query($getImages) as $row) {\n    ?>\n  \
    \  \"\n    >\n\n```\n\n第一个 `<option>` 标签硬编码了标签 `Select image`，其 `value` 设置为空字符串。其余\
    \ `<option>` 标签由 `foreach` 循环填充，该循环执行 `$getImages SELECT` 查询并将每条记录提取到名为 `$row`\
    \ 的数组中。"
  raw: "1.  The existing `SELECT` query that\n    retrieves details of the article\
    \ to be updated needs to be amended so\n    that it includes the foreign key,\
    \ `image_id`, and the\n    result needs to be bound to a new result variable,\
    \ `$image_id`. You then\n    need to run a second `SELECT` query to get\n    the\
    \ details of the `images` table. Before\n    you can do so, you need to free the\
    \ database resources by calling the\n    prepared statement’s `free_result()`\n\
    \    method . Add the\n    following code highlighted in bold to the existing\
    \ script:\n\n```\n    if (isset($_GET['article_id']) && !$_POST) {\n    // prepare\
    \ SQL query\n    $sql = 'SELECT article_id, image_id, title, article FROM blog\n\
    \    WHERE article_id = ?';\n    if ($stmt->prepare($sql)) {\n    // bind the\
    \ query parameter\n    $stmt->bind_param('i', $_GET['article_id']);\n    // execute\
    \ the query\n    $OK = $stmt->execute();\n    // bind the results to variables\
    \ and fetch\n    $stmt->bind_result($article_id, $image_id, $title, $article);\n\
    \    $stmt->fetch();\n    // free the database resources for the second query\n\
    \    $stmt->free_result();\n    }\n    }\n    ```\n\nYou can free the result immediately\
    \ after calling the `fetch()` method  because there’s only\n    one record in\
    \ the result set, and the value in each column has been\n    bound to a variable.\n\
    \n2.  Inside the form, you need to display the filenames stored in the `images`\
    \ table. Since\n    the second `SELECT` statement\n    doesn’t rely on external\
    \ data, it’s simpler to use the `query()` method  instead of a prepared\n    statement.\
    \ Add the following code after the `article` text area\n    (it’s all new code,\
    \ but the PHP sections are highlighted in bold for\n    ease of reference):\n\n\
    ```\n    Uploaded image:\n\nSelect image\n    query($getImages);\n    while ($row\
    \ = $images->fetch_assoc()) {\n    ?>\n    \"\n    >\n\n```\n\nThe first `<option>`\
    \ tag is\n    hard-coded with the label `Select image`, and its\n    `value` is\
    \ set to\n    an empty string. The remaining `<option>` tags\n    are populated\
    \ by a `while` loop that\n    extracts each record to an array called `$row`.\n\
    \nA conditional statement checks whether the current `image_id` is the same\n\
    \    as the one already stored in the `articles` table. If it\n    is, `selected`\
    \ is\n    inserted into the `<option>` tag so\n    that it displays the correct\
    \ value in the drop-down menu.\n\nMake sure you don’t omit the third character\
    \ in the following\n    line:\n\n```\n    ?>>\n    ```\n\nIt’s the closing angle\
    \ bracket of the `<option>` tag,\n    sandwiched between two PHP tags.\n\n3. \
    \ Save the page and load it into a browser. You should be automatically\n    redirected\
    \ to `blog_list_mysqli.php`.\n    Select one of the EDIT links and make sure that\
    \ your page looks like\n    Figure [17-4](#332054_4_En_17_Chapter.xhtml#Fig4).\
    \ Check the\n    browser source code view to verify that the `value` attributes\
    \ of\n    the `<option>` tags\n    contain the primary key of each image.\n\n\
    **Tip** If the `<select>` menu\n    doesn’t list the images, there’s almost certainly\
    \ an error with the\n    `SELECT` query in\n    step 2\\. Add `echo $conn->error;`\
    \ immediately after the call to the `query()` method , and reload the page.\n\
    \    You’ll need to view the browser source code to see the error message. If\n\
    \    the message is “Commands out of sync; you can’t run this command now,”\n\
    \    the problem lies with failing to free the database resources with `free_result()`\
    \  in step 1.\n\n4.  The final stage is to add the `image_id` to the `UPDATE`\
    \ query. Because\n    some blog entries might not be associated with an image,\
    \ you need to\n    create alternative prepared statements, like this:\n\n```\n\
    \    // if form has been submitted, update record\n    if (isset($_POST ['update']))\
    \ {\n    // prepare update query\n    if (!empty($_POST['image_id'])) {\n    $sql\
    \ = 'UPDATE blog SET image_id = ?, title = ?, article = ?\n    WHERE article_id\
    \ = ?';\n    if ($stmt->prepare($sql)) {\n    $stmt->bind_param('issi', $_POST['image_id'],\
    \ $_POST['title'],\n    $_POST['article'], $_POST['article_id']);\n    $done =\
    \ $stmt->execute();\n    }\n    } else {\n    $sql = 'UPDATE blog SET image_id\
    \ = NULL, title = ?, article = ?\n    WHERE article_id = ?';\n    if ($stmt->prepare($sql))\
    \ {\n    $stmt->bind_param('ssi', $_POST['title'], $_POST['article'],\n    $_POST['article_id']);\n\
    \    $done = $stmt->execute();\n    }\n    }\n    }\n    ```\n\nIf `$_POST['image_id']`\n\
    \    has a value, you add it to the SQL as the first parameter with a\n    placeholder\
    \ question mark. Since it must be an integer, you add `i` to the beginning of\n\
    \    the first argument of \n    `bind_param()`\n    .\n\nHowever, if `$_POST['image_id']`\n\
    \    doesn’t contain a value, you need to create a different prepared\n    statement\
    \ to set the value of `image_id` to `NULL` in the SQL\n    query. Because it has\
    \ an explicit value, you don’t add it to `bind_param()`.\n\n5.  Test the page\
    \ again, select a filename from the drop-down menu, and\n    click `Update Entry`.\
    \ You can verify whether the foreign key has been inserted\n    into the `articles`\
    \ table by\n    refreshing `Browse` in phpMyAdmin\n    or by selecting the same\
    \ article for updating. This time, the correct\n    filename should be displayed\
    \ in the drop-down menu.\n\nCheck your code against `blog_update_mysqli_04.php`\n\
    \    in the `ch17`\n    folder, if necessary.\n\nPHP Solution 17-3: Adding the\
    \ image foreign key\n(PDO)\n\nThis PHP solution uses PDO to update records in\
    \ the `blog` table by adding\nthe primary key of a selected image as a foreign\
    \ key. The main\ndifference from MySQLi is that PDO can bind a `null` value to\
    \ a\nplaceholder using the `bindValue()`\nmethod . These\ninstructions adapt `admin/blog_update_pdo.php`\n\
    from Chapter [15](#332054_4_En_15_Chapter.xhtml). Use the version that you created\n\
    in Chapter [15](#332054_4_En_15_Chapter.xhtml). Alternatively, copy `blog_update_pdo_03.php`\n\
    from the `ch15`\nfolder to the `admin` folder and\nremove `_03` from\nthe filename.\n\
    \n1.  Add `image_id` to\n    the `SELECT`\n    query that retrieves details of\
    \ the article to be updated, and bind the\n    result to `$image_id`. This\n \
    \   involves renumbering the columns passed as the first argument to  `bindColumn()`\
    \ \n    for `$title` and\n    `$article`. The\n    revised code looks like this:\n\
    \n```\n    if (isset($_GET['article_id']) && !$_POST) {\n    // prepare SQL query\n\
    \    $sql = 'SELECT article_id, image_id, title, article FROM blog\n    WHERE\
    \ article_id = ?';\n    $stmt = $conn->prepare($sql);\n    // pass the placeholder\
    \ value to execute() as a single-element array\n    $OK = $stmt->execute([$_GET['article_id']]);\n\
    \    // bind the results\n    $stmt->bindColumn(1, $article_id);\n    $stmt->bindColumn(2,\
    \ $image_id);\n    $stmt->bindColumn(3, $title);\n    $stmt->bindColumn(4, $article);\n\
    \    $stmt->fetch();\n    }\n    ```\n\n2.  Inside the form, you need to display\
    \ the filenames stored in the `images` table. Since\n    the second `SELECT` statement\n\
    \    doesn’t rely on external data, it’s simpler to use the `query()` method \
    \ instead of a prepared\n    statement. Add the following code after the `article`\
    \ text area\n    (it’s all new code, but the PHP sections are highlighted in bold\
    \ for\n    ease of reference):\n\n```\n    Uploaded image:\n\nSelect image\n \
    \   query($getImages) as $row) {\n    ?>\n    \"\n    >\n\n```\n\nThe first `<option>`\
    \ tag is\n    hard-coded with the label `Select image`, and its\n    `value` is\
    \ set to\n    an empty string. The remaining `<option>` tags\n    are populated\
    \ by a `foreach` loop that\n    executes the `$getImages SELECT`\n    query and\
    \ extracts each record to an array called `$row`."
