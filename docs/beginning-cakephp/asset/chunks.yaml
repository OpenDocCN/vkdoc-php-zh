    **Beginning CakePHP:**


    `Beginning`


    **From Novice to Professional**


    Dear Reader,


    `Beginning`


    Rapid development frameworks surfaced not long ago, finally bringing to the web
    development world the effective tools other software systems have enjoyed for
    a long time. If you are like me, you can probably recall poring over all the online
    documentation you could find trying to learn these new methods for building web
    sites, only to find they all required that you learn another programming language
    with which you hadn''t previously worked. Or you probably found several dead ends
    where the tutorials or terminology confused you.


    `Cak`


    `CakePHP`


    As web frameworks became increasingly popular, what I wanted was a framework in
    `PHP`, the language I had already learned and loved, that could deliver all that
    I was reading about in these other platforms. And I wanted someone to tell me
    in simple terms how and where to start. I found `CakePHP`—the most robust, cleanest,
    well-designed `PHP` framework available—and now building web sites has never been
    better.


    This book provides you with a good start to `CakePHP`. You will learn where to
    begin, what tools `Cake` provides, and how to rapidly write methods into your
    application. `Cake` comes with an impressive collection of helper functions and
    core methods that make data handling, form processing, `Ajax` request handling,
    file uploading, `XML` parsing, and other web-related tasks much easier to manage.
    I explain each of these and other tasks and how to use `Cake` to accomplish them.
    My aim is to make learning this fantastic framework easy and exciting and to provide
    you with a simple approach that gets you started on the right path to creating
    web sites with `CakePHP`.


    David Golding


    *Learn where to begin, what tools Cake provides, and how*


    *to rapidly write methods into your Web applications*


