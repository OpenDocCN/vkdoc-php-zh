  trans: "\n# 第 9 章：处理客户订单\n\n## `orders` 表和 `order_detail` 表\n\n**提示：** 到目前为止，我们一直保持表名使用单数形式（`shopping_cart`、`department`\
    \ 等）的命名规范。然而，此处我们对 `orders` 表做了例外处理，因为 `order` 同时也是 SQL 关键字。为方便本书撰写，我们更倾向于打破命名规范以避免编写\
    \ SQL 代码时产生混淆。一般来说，将 SQL 关键字用作对象名称并非良好实践。\n\n这两个表通过 `order_id` 字段上的 `FOREIGN KEY`\
    \ 约束实现了一对多关系。一对多关系是 `orders` 表与 `order_detail` 表之间常见的实现方式。`order_detail` 表包含属于同一订单的多条记录。你可以回顾第\
    \ 4 章，其中对表关系进行了更详细的说明。\n\n你将在以下练习中实现这两个表。\n\n### 练习：向数据库添加 `orders` 和 `order_detail`\
    \ 表\n\n1. 加载 pgAdmin III，并连接到 `hatshop` 数据库。\n\n2. 点击 **工具** ➤ **查询工具**（或点击工具栏上的\
    \ **SQL** 按钮）。此时应会出现一个新的查询窗口。\n\n3. 使用查询工具执行以下代码，该代码将在你的 `hatshop` 数据库中创建 `orders`\
    \ 表：\n\n   ```sql\n   -- 创建 orders 表\n   CREATE TABLE orders\n   (\n       order_id\
    \ SERIAL NOT NULL,\n       total_amount NUMERIC(10,2) NOT NULL DEFAULT 0.00,\n\
    \       created_on TIMESTAMP NOT NULL,\n       shipped_on TIMESTAMP,\n       status\
    \ INTEGER NOT NULL DEFAULT 0,\n       comments VARCHAR(255),\n       customer_name\
    \ VARCHAR(50),\n       shipping_address VARCHAR(255),\n       customer_email VARCHAR(50),\n\
    \       CONSTRAINT pk_order_id PRIMARY KEY (order_id)\n   );\n   ```\n\n4. 使用查询工具执行以下代码，该代码将在你的\
    \ `hatshop` 数据库中创建 `order_detail` 表：\n\n   ```sql\n   -- 创建 order_detail 表\n \
    \  CREATE TABLE order_detail\n   (\n       order_id INTEGER NOT NULL,\n      \
    \ product_id INTEGER NOT NULL,\n       product_name VARCHAR(50) NOT NULL,\n  \
    \     quantity INTEGER NOT NULL,\n       unit_cost NUMERIC(10, 2) NOT NULL,\n\
    \       CONSTRAINT pk_order_id_product_id PRIMARY KEY (order_id, product_id),\n\
    \       CONSTRAINT fk_order_id FOREIGN KEY (order_id) REFERENCES orders (order_id)\n\
    \       ON UPDATE RESTRICT ON DELETE RESTRICT\n   );\n   ```\n\n## 工作原理：数据表\n\n\
    既然你已经创建了这两个表，让我们更仔细地看看它们的结构和关系。\n\n### `orders` 表\n\n`orders` 表包含两类信息：订单本身的数据（前六个字段）和创建该订单的客户数据（最后三个字段）。\n\
    \n另一种方案是将客户信息存储在一个名为 `customer` 的独立表中，并在 `orders` 表中仅存储 `customer_id` 值。不过，存储客户数据并非当前开发阶段的目标之一。在这个阶段，我们倾向于保持简单，因为谁下的订单并不重要，重要的是哪些产品已被售出。你将在第\
    \ 11 章中处理创建独立的 `customer` 表。\n\n像 PayPal 这样的第三方支付处理商会存储并管理完整的客户信息，因此无需在你的数据库中也存储这些信息。我们添加了\
    \ `customer_name`、`shipping_address` 和 `customer_email` 字段作为可选字段，如果管理员能够方便地掌握这些信息以便处理特定（或全部）订单，则可以自行填写。\n\
