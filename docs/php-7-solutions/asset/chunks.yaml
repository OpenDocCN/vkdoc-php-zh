    \ filename, caption FROM images LIMIT $startRow,\" . SHOWMAX;\n```\n\n这次我使用了双引号，因为我想让\
    \ PHP 处理 `$startRow`。与变量不同，常量在双引号字符串内不会被处理。因此，`SHOWMAX` 通过连接运算符（句点）被附加到 SQL 查询的末尾。闭合引号内的逗号是\
    \ SQL 的一部分，用于分隔 `LIMIT` 子句的两个参数。\n\n7.  保存页面并在浏览器中重新加载。你应该只会看到六个缩略图，而不是八个，如图 14-5\
    \ 所示。\n\n![../images/332054_4_En_14_Chapter/332054_4_En_14_Fig5_HTML.jpg](img/332054_4_En_14_Fig5_HTML.jpg)\n\
    \n**图 14-5.** 缩略图的数量受 `SHOWMAX` 常量的限制\n\n更改 `SHOWMAX` 的值可以查看不同数量的缩略图。\n\n8.  缩略图网格上方的文本没有更新，因为它仍然是硬编码的，所以让我们来解决这个问题。在页面主体中找到以下代码行：\n\
    \n```\nDisplaying 1 to 6 of 8\n```\n\n将其替换为：\n\n```php\nDisplaying \n```\n\n我们逐行分析这段代码。`$startRow`\
    \ 的值是基于零的，因此你需要加 1 来得到更友好的数字。所以，`$startRow+1` 在第一页显示为 1，在第二页显示为 7。\n\n在第二行中，将\
    \ `$startRow+1` 与记录总数进行比较。如果它更小，意味着当前页正在显示一个记录范围，因此第三行会显示两边带空格的文本“to”。\n\n然后，你需要计算出范围的最大编号，因此一个嵌套的\
    \ `if ... else` 条件语句将起始行的值与页面要显示的最大记录数相加。如果结果小于记录总数，则 `$startRow+SHOWMAX` 给出页面上最后一条记录的编号。但如果结果等于或大于总数，则改为显示\
    \ `$totalPix`。\n\n最后，退出两个条件语句，并显示“of”后跟记录总数。\n\n9.  保存页面并在浏览器中重新加载。你仍然只会得到第一批缩略图子集，但当你修改\
    \ `SHOWMAX` 的值时，应该会看到第二个数字动态变化。如有必要，请对照 `gallery_mysqli_07.php` 或 `gallery_pdo_07.php`\
    \ 检查你的代码。\n\n## 浏览记录子集\n\n正如我在上一节第 3 步中提到的，所需页面的值通过查询字符串传递给 PHP 脚本。页面首次加载时，没有查询字符串，因此\
    \ `$curPage` 的值被设置为 `0`。虽然点击缩略图显示不同图像时会生成查询字符串，但它只包含主图像的文件名，因此原始缩略图子集保持不变。要显示下一个子集，你需要创建一个将\
    \ `$curPage` 的值增加 `1` 的链接。相应地，要返回到上一个子集，你需要另一个将 `$curPage` 的值减少 `1` 的链接。这很简单，但你还需要确保只在存在有效子集可浏览时才显示这些链接。例如，在第一页上显示后退链接没有意义，因为不存在上一个子集。同样，你也不应该在显示最后一个子集的页面上显示前进链接，因为没有内容可浏览。\n\
    \n这两个问题都可以通过使用条件语句轻松解决。还有最后一点需要注意。你还必须在点击缩略图时生成的查询字符串中包含当前页的值。如果不这样做，`$curPage`\
    \ 会自动重置为 `0`，并显示第一批缩略图，而不是当前子集。\n\n## PHP 解决方案 14-5：创建导航链接\n\n此 PHP 解决方案演示了如何创建导航链接，以在每个记录子集中前后翻页。继续使用之前的同一文件进行操作。或者，使用\
    \ `gallery_mysqli_07.php` 或 `gallery_pdo_07.php`。\n\n![../images/332054_4_En_14_Chapter/332054_4_En_14_Fig6_HTML.jpg](img/332054_4_En_14_Fig6_HTML.jpg)\n\
    \n**图 14-6.** 页面导航系统现已完成\n\n1.  我已经将导航链接放置在缩略图表格底部的额外行中。在占位注释和闭合的 `</table>` 标签之间插入此代码：\n\
    \n```php\n<?php\nif ($curPage > 0) {\n    echo '<a href=\"' . $_SERVER['PHP_SELF']\
    \ . '?curPage=' . ($curPage-1) . '\">< Prev</a>';\n} else {\n    // 否则将单元格留空\n\
    \    echo '&nbsp;';\n}\n?>\n\n<?php\nif ($startRow+SHOWMAX < $totalPix) {\n  \
    \  for ($i = 0; $i < SHOWMAX; $i++) {\n        echo '<td>&nbsp;</td>';\n    }\n\
    \    echo '<td><a href=\"' . $_SERVER['PHP_SELF'] . '?curPage=' . ($curPage+1)\
    \ . '\">Next ></a></td>';\n} else {\n    // 否则将单元格留空\n    echo '&nbsp;';\n}\n\
    ?>\n```\n\n看起来有很多代码，但这段代码可以分为三个部分：第一部分在 `$curPage` 大于 `0` 时创建一个后退链接；第二部分在列数超过两列时用空单元格填充表格的最后一行；第三部分使用与之前相同的公式（`$startRow+SHOWMAX\
    \ < $totalPix`）来确定是否显示前进链接。\n\n确保链接中引号的组合正确。另一点需要注意的是，`$curPage-1` 和 `$curPage+1`\
    \ 的计算被括在括号中，以避免数字后的句点被误解为小数点。这里的句点用作连接运算符，用于连接查询字符串的各个部分。\n\n2.  现在，你需要将当前页的值添加到缩略图周围的链接的查询字符串中。找到这段代码（大约在第\
    \ 95 行）：\n\n```php\n<a href=\"<?php echo $_SERVER['PHP_SELF'] . '?image=' . $row['filename'];\
    \ ?>\">\n```\n\n将其修改为：\n\n```php\n<a href=\"<?php echo $_SERVER['PHP_SELF'] .\
    \ '?image=' . $row['filename'] . '&amp;curPage=' . $curPage; ?>\">\n```\n\n你希望在单击缩略图时显示相同的子集，因此只需通过查询字符串传递\
    \ `$curPage` 的当前值即可。\n\n### 警告\n\n所有代码*必须*位于同一行，且 PHP 结束标签与 `&amp;` 之间不能有空格。这段代码用于创建\
    \ URL 和查询字符串，其中不能包含空格。"
- fmt: "3. Save the page and test it. Click the `Next` link, and you should see the\
    \ remaining subset of thumbnails, as shown in Figure [14-6](#332054_4_En_14_Chapter.xhtml#Fig6).\
    \ There are no more images to be displayed, so the `Next` link disappears, but\
    \ there’s a `Prev` link at the bottom left of the thumbnail grid. The record counter\
    \ at the top of the gallery now reflects the range of thumbnails being displayed,\
    \ and if you click the right thumbnail, the same subset remains onscreen while\
    \ displaying the appropriate large image. You’re done!\n\nYou can check your code\
    \ against `gallery_mysqli_08.php` or `gallery_pdo_08.php`.\n\n## Chapter Review\n\
    \nIn just a few pages, you have turned a boring list of filenames into a dynamic\
    \ online gallery, complete with a page navigation system. All that’s necessary\
    \ is to create a thumbnail for each major image, upload both images to the appropriate\
    \ folders, and add the filename and a caption to the `images` table in the database.\
    \ As long as the database is kept up to date with the contents of the `images`\
    \ and `thumbs` folders, you have a dynamic gallery. Not only that, you’ve learned\
    \ how to select subsets of records, link to related information through a query\
    \ string, and build a page navigation system.\n\nThe more you use PHP, the more\
    \ you realize that the skill doesn’t lie so much in remembering how to use lots\
    \ of obscure functions but in working out the logic needed to get PHP to do what\
    \ you want. It’s a question of if this, do that; if something else, do something\
    \ different. Once you can anticipate the likely eventualities of a situation,\
    \ you can normally build the code to handle it.\n\nSo far, you’ve concentrated\
    \ on extracting records from a simple database table. In the next chapter, I’ll\
    \ show you how to insert, update, and delete material.\n\n## 15. Managing Content\n\
    \nAlthough you can use phpMyAdmin for a lot of database administration, you might\
    \ want to set up areas where clients can log in to update some data without giving\
    \ them full rein of your database. To do so, you need to build your own forms\
    \ and create customized content management systems.\n\nAt the heart of every content\
    \ management system lies what is sometimes called the CRUD cycle—Create, Read,\
    \ Update, and Delete—which utilizes just four SQL commands: `INSERT`, `SELECT`,\
    \ `UPDATE`, and `DELETE`. To demonstrate the basic SQL commands, this chapter\
    \ shows you how to build a simple content management system for a table called\
    \ `blog`. Even if you don’t want to build your own content management system,\
    \ the four commands covered in this chapter are essential for just about any database-driven\
    \ page, such as user login, user registration, search form, search results, and\
    \ so on.\n\nIn this chapter, you’ll learn about the following:\n\n- Inserting\
    \ new records in a database table\n- Displaying a list of existing records\n-\
    \ Updating existing records\n- Asking for confirmation before a record is deleted\n\
    \n### Setting Up a Content Management System\n\nManaging the content in a database\
    \ table involves four stages, which I normally assign to four separate but interlinked\
    \ pages: one each for inserting, updating, and deleting records, plus a list of\
    \ existing records. The list of records serves two purposes: to identify what’s\
    \ stored in the database and, more important, to link to the update and delete\
    \ scripts by passing the record’s primary key through a query string.\n\nThe `blog`\
    \ table contains a series of titles and text articles to be displayed in the Japan\
    \ Journey site, as shown in Figure [15-1](#332054_4_En_15_Chapter.xhtml#Fig1).\
    \ In the interests of keeping things simple, the table contains just five columns:\
    \ `article_id` (primary key), `title`, `article`, `created`, and `updated`.\n\n\
    ![../images/332054_4_En_15_Chapter/332054_4_En_15_Fig1_HTML.jpg](images/332054_4_En_15_Chapter/332054_4_En_15_Fig1_HTML.jpg)\n\
    \n*Figure 15-1. The contents of the `blog` table displayed in the Japan Journey\
    \ web site*\n\n### Creating the Blog Database Table\n\nIf you just want to get\
    \ on with studying the content management pages, import the table structure and\
    \ data from `blog.sql` from the `ch15` folder. Open phpMyAdmin, select the `phpsols`\
    \ database, and import the table in the same way as in Chapter [12](#332054_4_En_12_Chapter.xhtml).\
    \ The SQL file creates the table and populates it with four short articles.\n\n\
    If you would prefer to create everything yourself from scratch, open phpMyAdmin,\
    \ select the `phpsols` database, and click the `Structure` tab if it’s not already\
    \ selected. In the `Create table` section, type **blog** in the `Name` field and\
    \ **5** in the `Number of columns` field. Then click `Go`. Use the settings shown\
    \ in the following screenshot and Table [15-1](#332054_4_En_15_Chapter.xhtml#Tab1).\n\
    \n![../images/332054_4_En_15_Chapter/332054_4_En_15_Figa_HTML.jpg](images/332054_4_En_15_Chapter/332054_4_En_15_Figa_HTML.jpg)\n\
    \n*Table 15-1. Column definitions for the `blog` table*\n\n| Field | Type | Length/Values\
    \ | Default | Attributes | Null | Index | A_I |\n| --- | --- | --- | --- | ---\
    \ | --- | --- | --- |\n| `article_id` | `INT` |  |  | `UNSIGNED` | Deselected\
    \ | `PRIMARY` | Selected |\n| `title` | `VARCHAR` | `255` |  |  | Deselected |\
    \  |  |\n| `article` | `TEXT` |  |  |  | Deselected |  |  |\n| `created` | `TIMESTAMP`\
    \ |  | `CURRENT_TIMESTAMP` |  | Deselected |  |  |\n| `updated` | `TIMESTAMP`\
    \ |  | `CURRENT_TIMESTAMP` | `on update CURRENT_TIMESTAMP` | Deselected |  | \
    \ |\n\nThe default value of the `created` and `updated` columns is set to `CURRENT_TIMESTAMP`.\
    \ So, both columns get the same value when a record is first entered. The `Attributes`\
    \ column for `updated` is set to `on update CURRENT_TIMESTAMP`. This means it\
    \ will be updated whenever a change is made to a record. To keep track of when\
    \ a record was originally created, the value in the `created` column is never\
    \ updated.\n\n### Creating the Basic Insert and Update Form\n\nSQL makes an important\
    \ distinction between inserting and updating records by providing separate commands.\
    \ `INSERT` is used only for creating a brand-new record. Once a record has been\
    \ inserted, any changes must be made with `UPDATE`. Since this involves working\
    \ with identical fields, it is possible to use the same page for both operations.\
    \ However, this makes the PHP more complex, so I prefer to create the HTML for\
    \ the insert page first, save a copy as the update page, and then code them separately.\n\
    \nThe form in the insert page needs just two input fields: for the title and the\
    \ article. The contents of the remaining three columns (the primary key and the\
    \ two timestamps) are handled automatically. The code for the insert form looks\
    \ like this:\n\n```html\n<form method=\"post\" action=\"blog_insert_mysqli.php\"\
    >\n    <p>\n        <label for=\"title\">Title:</label>\n        <input type=\"\
    text\" name=\"title\" id=\"title\">\n    </p>\n    <p>\n        <label for=\"\
    article\">Article:</label>\n        <textarea name=\"article\" id=\"article\"\
    \ cols=\"60\" rows=\"10\"></textarea>\n    </p>\n    <p>\n        <input type=\"\
    submit\" name=\"insert\" value=\"Insert New Entry\">\n    </p>\n</form>\n```\n\
    \nThe form uses the `post` method. You can find the full code in `blog_insert_mysqli_01.php`\
    \ and `blog_insert_pdo_01.php` in the `ch15` folder. The content management forms\
    \ have been given some basic styling with `admin.css`, which is in the `styles`\
    \ folder. When viewed in a browser, the form looks like this:\n\n![../images/332054_4_En_15_Chapter/332054_4_En_15_Figb_HTML.jpg](images/332054_4_En_15_Chapter/332054_4_En_15_Figb_HTML.jpg)\n\
    \nThe update form is identical except for the heading and Submit button. The button\
    \ code looks like this (the full code is in `blog_update_mysqli_01.php` and `blog_update_pdo_01.php`):\n\
    \n```html\n<input type=\"submit\" name=\"update\" value=\"Update Entry\">\n```\n\
    \nI’ve given the title and article input fields the same names as the columns\
    \ in the `blog` table. This makes it easier to keep track of variables when coding\
    \ the PHP and SQL later."
