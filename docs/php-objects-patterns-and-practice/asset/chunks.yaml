  raw: '## Problems and Solutions in Generating Objects


    Object creation can be a weak point in object-oriented design. In the previous
    chapter, you saw the principle, “Code to an interface, not to an implementation.”
    To this end, you are encouraged to work with abstract supertypes in your classes.
    This makes code more flexible, allowing you to use objects instantiated from different
    concrete subclasses at runtime. This has the side effect that object instantiation
    is deferred.


    Here’s a class that accepts a name string and instantiates a particular object:


    ```

    // listing 09.01

    abstract class Employee

    {

    protected $name;

    public function __construct(string $name)

    {

    $this->name = $name;

    }

    abstract public function fire();

    }

    // listing 09.02

    class Minion extends Employee

    {

    public function fire()

    {

    print "{$this->name}: I''ll clear my desk\n";

    }

    }

    // listing 09.03

    class NastyBoss

    {

    private $employees = [];

    public function addEmployee(string $employeeName)

    {

    $this->employees[] = new Minion($employeeName);

    }

    public function projectFails()

    {

    if (count($this->employees) > 0) {

    $emp = array_pop($this->employees);

    $emp->fire();

    }

    }

    }

    // listing 09.04

    $boss = new NastyBoss();

    $boss->addEmployee("harry");

    $boss->addEmployee("bob");

    $boss->addEmployee("mary");

    $boss->projectFails();

    mary: I''ll clear my desk

    ```


    As you can see, I define an abstract base class, `Employee`, with a downtrodden
    implementation, `Minion`. Given a name string, the `NastyBoss::` `addEmployee()`
    method instantiates a new `Minion` object. Whenever a `NastyBoss` object runs
    into trouble (via the `NastyBoss::projectFails()` method), it looks for a `Minion`
    to fire.


    By instantiating a `Minion` object directly in the `NastyBoss` class, we limit
    flexibility. If a `NastyBoss` object could work with any instance of the `Employee`
    type, we could make our code amenable to variation at runtime as we add more `Employee`
    specializations. You should find the polymorphism in Figure [9-1](#A314621_5_En_9_Chapter.html#Fig1)
    familiar.


    ![A314621_5_En_9_Fig1_HTML.gif](A314621_5_En_9_Fig1_HTML.gif)


    Figure 9-1.


    Working with an abstract type enables polymorphism


    If the `NastyBoss` class does not instantiate a `Minion` object, where does it
    come from? Authors often duck out of this problem by constraining an argument
    type in a method declaration, and then conveniently omitting to show the instantiation
    in anything other than a test context:


    ```

    // listing 09.05

    class NastyBoss

    {

    private $employees = [];

    public function addEmployee(Employee $employee)

    {

    $this->employees[] = $employee;

    }

    public function projectFails()

    {

    if (count($this->employees)) {

    $emp = array_pop($this->employees);

    $emp->fire();

    }

    }

    }

    // listing 09.06

    // new Employee class...

    class CluedUp extends Employee

    {

    public function fire()

    {

    print "{$this->name}: I''ll call my lawyer\n";

    }

    }

    // listing 09.07

    $boss = new NastyBoss();

    $boss->addEmployee(new Minion("harry"));

    $boss->addEmployee(new CluedUp("bob"));

    $boss->addEmployee(new Minion("mary"));

    $boss->projectFails();

    $boss->projectFails();

    $boss->projectFails();

    mary: I''ll clear my desk

    bob: I''ll call my lawyer

    harry: I''ll clear my desk

    ```


    Although this version of the `NastyBoss` class works with the `Employee` type,
    and therefore benefits from polymorphism, I still haven’t defined a strategy for
    object creation. Instantiating objects is a dirty business, but it has to be done.
    This chapter is about classes and objects that work with concrete classes, so
    that the rest of your classes do not have to.


    If there is a principle to be found here, it is “delegate object instantiation
    .” I did this implicitly in the previous example by demanding that an `Employee`
    object be passed to the `NastyBoss::addEmployee()` method. I could, however, equally
    delegate to a separate class or method that takes responsibility for generating
    `Employee` objects. Here I add a static method to the `Employee` class that implements
    a strategy for object creation:


    ```

    // listing 09.08

    abstract class Employee

    {

    protected $name;

    private static $types = [''Minion'', ''CluedUp'', ''WellConnected''];

    public static function recruit(string $name)

    {

    $num = rand(1, count(self::$types)) - 1;

    $class = __NAMESPACE__ . "\\".self::$types[$num];

    return new $class($name);

    }

    public function __construct(string $name)

    {

    $this->name = $name;

    }

    abstract public function fire();

    }

    // listing 09.09

    // new Employee class...

    class WellConnected extends Employee

    {

    public function fire()

    {

    print "{$this->name}: I''ll call my dad\n";

    }

    }

    ```


    As you can see, this takes a name string and uses it to instantiate a particular
    `Employee` subtype at random. I can now delegate the details of instantiation
    to the `Employee` class’s `recruit()` method :


    ```

    // listing 09.10

    $boss = new NastyBoss();

    $boss->addEmployee(Employee::recruit("harry"));

    $boss->addEmployee(Employee::recruit("bob"));

    $boss->addEmployee(Employee::recruit("mary"));

    ```


    You saw a simple example of such a class in Chapter [4](#A314621_5_En_4_Chapter.html).
    I placed a static method in the `ShopProduct` class called `getInstance()`.


    Note


    I use the term “factory” frequently in this chapter. A factory is a class or method
    with responsibility for generating objects.


    `getInstance()` is responsible for generating the correct `ShopProduct` subclass
    based on a database query. The `ShopProduct` class, therefore, has a dual role.
    It defines the `ShopProduct` type, but it also acts as a factory for concrete
    `ShopProduct` objects:


    ```

    public static function getInstance(int $id, PDO $pdo): ShopProduct

    {

    $stmt = $pdo->prepare("select * from products where id=?");

    $result = $stmt->execute([$id]);

    $row = $stmt->fetch();

    if (empty($row)) {

    return null;

    }

    if ($row[''type''] == "book") {

    // instantiate a BookProduct object

    } elseif ($row[''type''] == "cd") {

    // instantiate a CdProduct object

    } else {

    // instantiate a ShopProduct object

    }

    $product->setId($row[''id'']);

    $product->setDiscount($row[''discount'']);

    return $product;

    }

    ```


    The `getInstance()` method uses a large `if/else` statement to determine which
    subclass to instantiate. Conditionals like this are quite common in factory code.
    Although you should attempt to excise large conditional statements from your projects,
    doing so often has the effect of pushing the conditional back to the moment at
    which an object is generated. This is not generally a serious problem because
    you remove parallel conditionals from your code in pushing the decision-making
    back to this point.


    In this chapter, then, I will examine some of the key Gang of Four patterns for
    generating objects.'
