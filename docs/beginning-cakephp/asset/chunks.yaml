  trans: '

    # 安全组件


    `Security`组件提供了加强 Web 应用程序安全性并避免漏洞的方法。与`Auth`组件配合使用时，`Security`可以提供额外的机制来检查用户身份验证，并能根据用户与应用程序的交互方式显示更复杂的错误信息。你可以要求特定操作仅在
    SSL 安全请求下执行，或通过此组件对字符串进行哈希处理。通过坚持使用安全的方法构建应用程序，并运行`Security`组件来保护网站，你可以更有效地阻止未经授权的入侵或其他攻击。


    ## 工具类


    如前所述，组件服务于控制器根据自身动作和流程可能需要的特定目的或功能。组件自身使用或在 Cake 核心库中使用的其他类函数，可以执行更多可在控制器或自定义组件中使用的功能。这些函数存放在工具类中，并通过`App::import()`函数在应用程序的任何位置访问。Cake
    中提供了几个内置工具类，但假设不会分发第三方工具，因为这些类深藏在核心库内部，且原则上不应对应用程序进行修改。若要创建自己的工具类，你需要创建第三方供应商文件，并通过`App::import()`将它们引入应用程序（详见第
    12 章，了解 Cake 供应商的概念及如何在 Cake 应用程序中安装它们）。通常，只有当你尝试将第三方软件整合到应用程序中时，才需要自行编写工具类；否则，解决方案通常在于构建
    Cake 的资源文件之一，如辅助器或组件。


    ### 配置


    `Configure`工具负责存储全局变量。这类变量通常存储在核心配置文件中，并可在整个 Cake 应用程序中访问。


    #### 读取和写入全局变量


    正如你在核心配置文件中看到的，常量或全局变量通过`Configure::write()`函数设置。第一个参数是变量名，第二个参数是赋予的值。


    ```

    Configure::write(''Site.title'',''My Favorite Web Site'');

    ```


    要读取这些全局变量，只需像这样使用`Configure::read()`函数：`$title = Configure::read(''Site.title'');`


    `Configure::read()`函数可以在控制器、模型或视图中调用。


    ### 文件与文件夹


    `File`和`Folder`工具在服务器上读写文件或列出文件夹内容文件名时特别有用。它们还可用于设置文件夹和文件权限，或删除文件和文件夹。与`Configure`工具不同，`File`和`Folder`工具必须通过`App::import()`函数导入到使用它们的控制器或模型中，并通过实例化一个新的类对象来使用。


    要使`File`和`Folder`工具正常工作，必须提供服务器上文件或文件夹的路径。如清单 11-10 所示，你可以对代表文件的这个对象执行多项操作。以下各节列出了其中一些操作。


    **清单 11-10.** *导入工具并实例化类对象*


    ```

    App::import(''Core'',''File'');

    $file =& new File(''path/to/file'');

    ```


    #### 读取文件


    `read()`函数提取文件内容：


    ```

    $contents = $file->read();

    ```


    #### 创建新文件


    如果为实际不存在的文件实例化了`File`对象，你可以使用`create()`函数在服务器上创建一个新的空白文件：


    ```

    $file->create();

    ```


    #### 写入文件


    `write()`函数将内容写入文件。

    '
- fmt: '`$file->write($filedata);`


    By default, the method the `write()` function uses is the PHP `w` type. The `w`
    type overwrites content previously in the file. Other methods used in PHP''s `fwrite()`
    function can be provided as a second parameter. For example, the `a` parameter
    allows contents to be appended to the file:


    ```php

    $file->write($filedata, ''a'');

    ```


    ## Changing File and Folder Permissions


    Using the `Folder` utility, you can run `chmod` commands on files and folders.
    The `Folder` utility is instantiated like the `File` utility:


    ```php

    App::import(''Core'', ''Folder'');

    $folder =& new Folder();

    ```


    The new `$folder` object can have its permissions changed with the `chmod()` function:
    `$folder->chmod(''/path/to/folder'', 0777);`


    Other permissions values can be used as well. The `chmod()` function can also
    apply permissions recursively by using the `recursive` parameter. One last feature
    of this function is the `exceptions` parameter; if there are any files or folders
    that should not receive the permissions, they can be skipped by specifying their
    names in an array.


    ```php

    $folder->chmod(''/path/to/folder'', 0777, true, array(''nested_1'', ''nested_3''));

    ```


    ## Reading Folder Contents


    When the `Folder` utility is instantiated, a path can be provided:


    ```php

    $folder =& new Folder(''/path/to/folder'');

    ```


    This utility can return an array containing the contents of this folder by using
    the `read()` function:


    ```php

    $folder->read();

    ```


    ## Reading Folder Trees


    To get an array of nested directories or trees with the files in each directory,
    just use the `tree()` function like so:


    ```php

    $folder->tree();

    ```


    ## Copying, Creating, and Deleting Folders


    You can copy a folder''s contents to another area on the server with the `Folder::copy()`
    function. Notice that this function requires an array with some parameters included:


    ```php

    $folder->copy(array(''to'' => ''/path/to/new/folder''));

    ```


    Of course, the `$folder` object represents the current folder.


    Creating new folders is done just like the `File` utility, with the `Folder::create()`
    function. The second parameter sets the permissions value for the new folder:


    ```php

    $folder->create(''/path/for/new/folder'', 0755);

    ```


    Deleting folders is also easy. Just run the `delete()` function, and Cake will
    remove the directory, if its permissions allow this:


    ```php

    $folder->delete(''/folder/to/be/deleted'');

    ```


    ## Calculating the Folder Size


    To find the current folder''s file size in bytes, just run the `dirsize()` function:


    ```php

    $folder->dirsize();

    ```


    ## Finding Files in a Folder


    Searching for files by their file name can be tricky, but not with the `Folder`
    utility. To search in a folder, just provide the `find()` function with a regular
    expression, and it will return an array of all matching files in the current directory:


    ```php

    $results = $folder->find(''title(.*).pdf'');

    ```


    ## HTTP Socket


    When running HTTP requests or constructing headers, the `HTTP Socket` utility
    comes in handy. Like the other utilities (getting the hang of this?), it''s imported
    in the controller or model with `App::import()`.


    ```php

    App::import(''Core'', ''HttpSocket'');

    $http =& new HttpSocket();

    ```


    ### Making HTTP Requests


    One of the most useful features of the `HTTP Socket` utility is its request handling.
    Not to be confused with the `RequestHandler` component, `HTTP Socket` can perform
    the nitty-gritty of HTTP requests such as GET and POST.


    To run a POST with the `HTTP Socket` utility, first create an array that contains
    the post variables. The keys in the array correspond with the `name` attribute
    in HTML input elements, and the values match the `value` attribute.


    ```php

    $post = array(''username'' => ''cakeuser'', ''password'' => ''somehashedpassword'');

    ```


    Then, using the `HttpSocket::post()` function, pass the array to a specific URL:


    ```php

    $result = $http->post(''http://domain.com/'', $post);

    ```


    A successful POST will return `true`; an unsuccessful one will return `false`.'
