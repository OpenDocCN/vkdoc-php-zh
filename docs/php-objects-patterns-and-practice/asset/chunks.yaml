- fmt: "`popp\\ch05\\batch04\\util`命名空间被导入，并隐式别名为`util`。请注意，我并没有以反斜杠开头。`use`的参数是从全局空间搜索的，而不是从当前命名空间。如果我不想引用任何命名空间，我可以直接导入`Debug`类：\n\
    \n```\nnamespace main;\nuse popp\\ch05\\batch04\\util\\Debug;\nDebug::helloWorld();\n\
    ```\n\n这是最常用的约定。但如果调用命名空间中已经存在一个`Debug`类会怎样？下面是这样一个类：\n\n```\n// listing 05.08\n\
    namespace popp\\ch05\\batch04;\nclass Debug\n{\n    public static function helloWorld()\n\
    \    {\n        print \"hello from popp\\\\ch05\\\\batch04\\\\Debug\\n\";\n  \
    \  }\n}\n```\n\n以下是来自`popp\\ch05\\batch04`命名空间的一些调用代码，它引用了两个`Debug`类：\n\n```\n\
    namespace popp\\ch05\\batch04;\nuse popp\\ch05\\batch04\\util\\Debug;\nuse popp\\\
    ch05\\batch04\\Debug;\nDebug::helloWorld();\n```\n\n正如您所料，这会导致一个致命错误：\n\n```\n\
    PHP Fatal error:  Cannot use popp\\ch05\\batch04\\Debug as Debug because the name\
    \ is already in use in...\n```\n\n所以，我似乎又回到了原点，遇到了类名冲突的问题。幸运的是，这个问题有解决办法。我可以显式地指定别名：\n\
    \n```\nnamespace main;\nuse popp\\ch05\\batch04\\Debug as coreDebug;\ncoreDebug::helloWorld();\n\
    ```\n\n通过使用`use`的`as`子句，我能够将`Debug`别名改为`coreDebug`。\n\n如果你在某个命名空间中编写代码，并希望访问位于全局（非命名空间）空间中的类，你只需在类名前面加一个反斜杠。下面是一个在全局空间中声明的类：\n\
    \n```\n// listing 05.09\nclass Lister\n{\n    public static function helloWorld()\n\
    \    {\n        print \"hello from global\\n\";\n    }\n}\n```\n\n以下是一些带命名空间的代码：\n\
    \n```\n// listing 05.10\nnamespace popp\\ch05\\batch04\\util;\nclass Lister\n\
    {\n    public static function helloWorld()\n    {\n        print \"hello from\
    \ \" . __NAMESPACE__ . \"\\n\";\n    }\n}\n// listing 05.11\nnamespace popp\\\
    ch05\\batch04;\nLister::helloWorld();  // access local\n\\Lister::helloWorld();\
    \ // access global\n```\n\n命名空间代码声明了自己的`Lister`类。同一命名空间中的客户端代码使用非限定名称来访问本地版本。用单个反斜杠限定的名称用于访问全局空间中的类。\n\
    \n以下是前面代码片段的输出：\n\n```\nhello from popp\\ch05\\batch04\\util\nhello from global\n\
    ```\n\n这很值得展示，因为它演示了`__NAMESPACE__`常量的操作。它会输出当前命名空间，并且在调试中很有用。\n\n你可以使用你已经见过的语法在同一个文件中声明多个命名空间。你也可以使用另一种语法，该语法将大括号与`namespace`关键字一起使用：\n\
    \n```\n// listing 05.12\nnamespace com\\getinstance\\util {\n    class Debug\n\
    \    {\n        public static function helloWorld()\n        {\n            print\
    \ \"hello from Debug\\n\";\n        }\n    }\n}\nnamespace other {\n    \\com\\\
    getinstance\\util\\Debug::helloWorld();\n}\n```\n\n如果你必须在同一个文件中组合多个命名空间，那么这是推荐的做法。然而，通常的最佳实践是按文件定义命名空间。\n\
    \n注意\n\n你不能在同一个文件中同时使用大括号和行内命名空间语法。你必须选择一种并全程使用它。\n\n### 使用文件系统模拟包\n\n无论你使用哪个版本的PHP，你都应该使用文件系统来组织类，这提供了一种包结构。例如，你可以创建`util`和`business`目录，并使用`require_once()`语句包含类文件，如下所示：\n\
    \n```\nrequire_once('business/Customer.php');\nrequire_once('util/WebTools.php');\n\
    ```\n\n你也可以使用`include_once()`，效果相同。`include()`和`require()`语句之间唯一的区别在于它们对错误的处理方式。使用`require()`调用的文件在遇到错误时会导致整个进程崩溃。通过`include()`调用遇到的相同错误只会生成一个警告并结束被包含文件的执行，让调用代码继续运行。这使得`require()`和`require_once()`成为包含库文件的安全选择，而`include()`和`include_once()`则适用于模板等操作。\n\
    \n注意\n\n`require()`和`require_once()`实际上是语句，而不是函数。这意味着在使用它们时可以省略括号。就个人而言，我仍然喜欢使用括号，但如果你也这样做，就要准备好忍受那些急于指出你错误的人的说教。\n\
    \n图 [5-1](#A314621_5_En_5_Chapter.html#Fig1) 从Nautilus文件管理器的角度展示了`util`和`business`包。\n\
    \n![A314621_5_En_5_Fig1_HTML.jpg](A314621_5_En_5_Fig1_HTML.jpg)\n\n图 5-1.\n\n\
    使用文件系统组织的PHP包\n\n注意\n\n`require_once()`接受一个文件的路径，并将其包含进来，在当前脚本中进行评估。只有当其目标尚未在其他地方被包含时，该函数才会纳入它。这种一次性方法在访问库代码时特别有用，因为它可以防止类或函数的意外重复定义。当同一个文件在单个进程中被脚本的不同部分使用`require()`或`include()`等函数包含时，就可能发生这种重复定义。\n\
    \n习惯上，推荐使用`require()`和`require_once()`，而不是类似的`include()`和`include_once()`函数。这是因为在通过`require()`函数访问的文件中遇到致命错误会使整个脚本崩溃。而通过`include()`函数访问的文件中遇到的相同错误会导致被包含文件停止执行，但只会在调用脚本中生成一个警告。前者更激烈的行为更为安全。\n\
    \n与`require()`相比，使用`require_once()`会带来一些性能开销。如果你需要为系统榨取每一毫秒的性能，你可能需要考虑改用`require()`。像通常情况一样，这是效率与便利性之间的权衡。\n\
    \n就PHP而言，这种结构并没有什么特别之处。你只是将库脚本放置在不同的目录中。它确实有助于清晰的组织，并且可以与命名空间或命名约定并行使用。\n\n###\
    \ PEAR风格的命名\n\n在命名空间引入之前，开发人员被迫依靠约定来避免类名冲突。正如我们所见，最常见的就是由PEAR开发者维护的伪命名空间。\n\n\
    注意\n\nPEAR代表PHP扩展与应用库（PHP Extension and Application Repository）。它是一个官方维护的包和工具档案库，用于扩展PHP的功能。核心PEAR包包含在PHP发行版中，其他包则可以通过一个简单的命令行工具添加。你可以在\
    \ [`http://pear.php.net`](http://pear.php.net) 浏览PEAR包。\n\nPEAR使用文件系统来定义其包，正如我所描述的那样。在引入命名空间之前，每个类都根据其包路径进行命名，每个目录名用下划线字符分隔。\n\
    \n例如，PEAR包含一个名为`XML`的包，它有一个`RPC`子包。`RPC`包包含一个名为`Server.php`的文件。`Server.php`中定义的类并不像你预期的那样叫做`Server`。没有命名空间，这个类迟早会与PEAR项目或用户代码中其他地方的另一个`Server`类发生冲突。相反，这个类被命名为`XML_RPC_Server`。这种方法导致类名不够美观。然而，它确实使代码易于阅读，因为类名总是描述其自身的上下文。"
  raw: 'The `popp\ch05\batch04\util` namespace is imported and implicitly aliased
    to `util`. Notice that I didn’t begin with a leading backslash character. The
    argument to `use` is searched from global space and not from the current namespace.
    If I don’t want to reference a namespace at all, I can import the `Debug` class
    itself:


    ```

    namespace main;

    use popp\ch05\batch04\util\Debug;

    Debug::helloWorld();

    ```


    This is the convention that is most often used. But what would happen if I already
    had a `Debug` class in the calling namespace? Here is such a class:


    ```

    // listing 05.08

    namespace popp\ch05\batch04;

    class Debug

    {

    public static function helloWorld()

    {

    print "hello from popp\\ch05\\batch04\\Debug\n";

    }

    }

    ```


    And here is some calling code from the `popp\ch05\batch04` namespace which references
    both `Debug` classes:


    ```

    namespace popp\ch05\batch04;

    use popp\ch05\batch04\util\Debug;

    use popp\ch05\batch04\Debug;

    Debug::helloWorld();

    ```


    As you might expect, this causes a fatal error:


    ```

    PHP Fatal error:  Cannot use popp\ch05\batch04\Debug as Debug because the name
    is already in use in...

    ```


    So I seem to have come full circle, arriving back at class name collisions. Luckily,
    there’s an answer for this problem. I can make my alias explicit :


    ```

    namespace main;

    use popp\ch05\batch04\Debug as coreDebug;

    coreDebug::helloWorld();

    ```


    By using the `as` clause to `use`, I am able to change the `Debug` alias to `coreDebug`.


    If you are writing code in a namespace, and you want to access a class that resides
    in global (non-namespaced) space, you can simply precede the name with a backslash.
    Here’s a class declared in global space :


    ```

    // listing 05.09

    class Lister

    {

    public static function helloWorld()

    {

    print "hello from global\n";

    }

    }

    ```


    And here’s some namespaced code:


    ```

    // listing 05.10

    namespace popp\ch05\batch04\util;

    class Lister

    {

    public static function helloWorld()

    {

    print "hello from " . __NAMESPACE__ . "\n";

    }

    }

    // listing 05.11

    namespace popp\ch05\batch04;

    Lister::helloWorld();  // access local

    \Lister::helloWorld(); // access global

    ```


    The namespaced code declares its own `Lister` class. The client code, in the same
    namespace, uses an unqualified name to access the local version. A name qualified
    with a single backslash accesses a class in global space.


    Here’s the output from the previous fragment:


    ```

    hello from popp\ch05\batch04\util

    hello from global

    ```


    It’s worth showing because it demonstrates the operation of the `__NAMESPACE__`
    constant . This will output the current namespace, and it’s useful in debugging.


    You can declare more than one namespace in the same file using the syntax you
    have already seen. You can also use an alternative syntax that uses braces with
    the namespace keyword:


    ```

    // listing 05.12

    namespace com\getinstance\util {

    class Debug

    {

    public static function helloWorld()

    {

    print "hello from Debug\n";

    }

    }

    }

    namespace other {

    \com\getinstance\util\Debug::helloWorld();

    }

    ```


    If you must combine multiple namespaces in the same file, then this is the recommended
    practice. Usually, however, it’s considered best practice to define namespaces
    on a per-file basis.


    Note


    You can’t use both the brace and line namespace syntaxes in the same file. You
    must choose one and stick to it throughout.


    #### Using the File System to Simulate Packages


    Whichever version of PHP you use, you should organize classes using the file system,
    which affords a kind of package structure. For example, you might create `util`
    and `business` directories and include class files with the `require_once()` statement,
    like this:


    ```

    require_once(''business/Customer.php'');

    require_once(''util/WebTools.php'');

    ```


    You could also use `include_once()` with the same effect. The only difference
    between the `include()` and `require()` statements lies in their handling of errors.
    A file invoked using `require()` will bring down your entire process when you
    meet an error. The same error encountered via a call to `include()` will merely
    generate a warning and end execution of the included file, leaving the calling
    code to continue. This makes `require()` and `require_once()` the safe choice
    for including library files, and `include()` and `include_once()` useful for operations
    like templating.


    Note


    `require()` and `require_once()` are actually statements, not functions. This
    means that you can omit the brackets when using them. Personally, I prefer to
    use brackets anyway, but if you follow suit, be prepared to be bored by pedants
    eager to explain your mistake.


    Figure [5-1](#A314621_5_En_5_Chapter.html#Fig1) shows the `util` and `business`
    packages from the point of view of the Nautilus file manager.


    ![A314621_5_En_5_Fig1_HTML.jpg](A314621_5_En_5_Fig1_HTML.jpg)


    Figure 5-1.


    PHP packages organized using the file system Note


    `require_once()` accepts a path to a file and includes it evaluated in the current
    script. The function will only incorporate its target if it has not already been
    incorporated elsewhere. This one-shot approach is particularly useful when accessing
    library code because it prevents the accidental redefinition of classes and functions.
    This can happen when the same file is included by different parts of your script
    in a single process using a function like `require()` or `include()`.


    It is customary to use `require()` and `require_once()` in preference to the similar
    `include()` and `include_once()` functions. This is because a fatal error encountered
    in a file accessed with the `require()` functions takes down the entire script.
    The same error encountered in a file accessed using the `include()` functions
    will cause the execution of the included file to cease, but will only generate
    a warning in the calling script. The former, more drastic behavior, is safer.


    There is an overhead associated with the use of `require_once()` when compared
    with `require().` If you need to squeeze every last millisecond out of your system,
    you may like to consider using `require()` instead. As is so often the case, this
    is a tradeoff between efficiency and convenience.


    As far as PHP is concerned, there is nothing special about this structure. You
    are simply placing library scripts in different directories. It does lend itself
    to clean organization, and can be used in parallel with either namespaces or a
    naming convention.


    #### Naming the PEAR Way


    Back before namespaces were introduced, developers were forced to resort to conventions
    in order to avoid class name collisions. The most common of these, as we have
    seen, was the fake namespacing maintained by PEAR developers.


    Note


    PEAR stands for the PHP Extension and Application Repository . It is an officially
    maintained archive of packages and tools that add to PHP’s functionality. Core
    PEAR packages are included in the PHP distribution, and others can be added using
    a simple command-line tool. You can browse the PEAR packages at [`http://pear.php.net`](http://pear.php.net)
    .


    PEAR uses the file system to define its packages as I have described. Before namespaces
    were introduced, every class was named according to its package path, with each
    directory name separated by an underscore character.


    For example, PEAR includes a package called XML, which has an RPC subpackage.
    The RPC package contains a file called `Server.php`. The class defined inside
    `Server.php` is not called `Server`, as you might expect. Without namespaces,
    that would sooner or later clash with another `Server` class elsewhere in the
    PEAR project or in a user’s code. Instead, the class is named `XML_RPC_Server`.
    This approach made for unattractive class names. It did, however, make code easy
    to read because a class name always described its own context.'
