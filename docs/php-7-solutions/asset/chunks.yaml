    \n2.  Save `contact.php` and test\n    the form by leaving all fields blank and\
    \ clicking Send message. You’ll\n    see the original error message. Test it again\
    \ by entering a value that\n    isn’t an email address in the Email field or by\
    \ entering two email\n    addresses. You should see the invalid message.\n\nYou\
    \ can check your code with `contact_06.php` and\n    `includes/processmail_03.php`\n\
    \    in the `ch06`\n    folder.\n\nPHP Solution 6-6: Building the message body\
    \ and\nsending the mail\n\nMany PHP tutorials show how to build the message body\
    \ manually like\nthis:\n\n```\n$message = \"Name: $name\\r\\n\\r\\n\";\n$message\
    \ .= \"Email: $email\\r\\n\\r\\n\";\n$message .= \"Comments: $comments\";\n```\n\
    \nThis adds labels to identify which field the input comes from and\ninserts two\
    \ carriage returns and newline characters between each one.\nThis is fine for\
    \ a small number of fields, but it soon becomes tedious\nwith more fields. As\
    \ long as you give your form fields meaningful `name` attributes, you\ncan build\
    \ the message body automatically with a `foreach` loop, which\nis the approach\
    \ taken in this PHP solution.\n\nContinue working with the same files as before.\
    \ Alternatively, use `contact_06.php` and\n`includes/processmail_03.php`\nfrom\
    \ the `ch06`\nfolder.\n\n1.  Add the following code at the bottom of the script\
    \ in `processmail.php`:\n\n```\n    $mailSent = false;\n    ```\n\nThis initializes\
    \ a variable to redirect to a thank you page after the\n    mail has been sent.\
    \ It needs to be set to `false` until you know\n    the `mail()`\n    function\
    \ has succeeded.\n\n2.  Now add the code that builds the message immediately after:\n\
    \n```\n    // go ahead only if not suspect, all required fields OK, and no errors\n\
    \    if (!$suspect && !$missing && !$errors) {\n    // initialize the $message\
    \ variable\n    $message = \";\n    // loop through the $expected array\n    foreach($expected\
    \ as $item) {\n    // assign the value of the current item to $val\n    if (isset($$item)\
    \ && !empty($$item)) {\n    $val = $$item;\n    } else {\n    // if it has no\
    \ value, assign 'Not selected'\n    $val = 'Not selected';\n    }\n    // if an\
    \ array, expand as comma-separated string\n    if (is_array($val)) {\n    $val\
    \ = implode(', ', $val);\n    }\n    // replace underscores in the label with\
    \ spaces\n    $item = str_replace('_', ' ', $item);\n    // add label and value\
    \ to the message body\n    $message .= ucfirst($item).\": $val\\r\\n\\r\\n\";\n\
    \    }\n    // limit line length to 70 characters\n    $message = wordwrap($message,\
    \ 70);\n    // format headers as a single string\n    $headers = implode(\"\\\
    r\\n\", $headers);\n    $mailSent = true;\n    }\n    ```\n\nThis block of code\
    \ begins by checking that `$suspect`, `$missing`, and `$errors` are all `false`.\
    \ If they are,\n    it builds the message body by looping through the `$expected`\
    \ array,\n    storing the result in `$message` as a series\n    of label/value\
    \ pairs.\n\nThe key to how it works lies in the following conditional statement:\n\
    \n```\n    if (isset($$item) && !empty($$item)) {\n    $val = $$item;\n    }\n\
    \    ```\n\nThis is another example of using a variable variable (see “Creating\
    \ new\n    variables dynamically” in Chapter [4](#332054_4_En_4_Chapter.xhtml)).\
    \ Each time the loop runs, `$item` contains the\n    value of the current element\
    \ in the `$expected` array. The\n    first element is `name`, so `$$item` dynamically\n\
    \    creates a variable called `$name`. In effect, the\n    conditional statement\
    \ becomes this:\n\n```\n    if (isset($name) && !empty($name)) {\n    $val = $name;\n\
    \    }\n    ```\n\nOn the next pass, `$$item` creates a\n    variable called `$email`,\
    \ and so\n    on.\n\nCaution\nThis script builds the message body only from items\
    \ in the `$expected` array. You\nmust list the names of all form fields in the\
    \ `$expected` array for\nit to work."
  trans: "\n# PHP 方案 6-5：添加邮件头并自动设置回复地址\n\n本 PHP 方案为邮件添加了三个邮件头：`From`（发件人）、`Content-Type`（将编码设置为\
    \ UTF-8）和 `Reply-To`（回复地址）。在将用户邮箱地址添加到最终的邮件头之前，它使用了一个 PHP 内置过滤器来验证提交的值是否符合有效邮箱地址的格式。\n\
    \n继续使用之前相同的页面进行处理。或者，你也可以使用 `ch06` 文件夹中的 `contact_05.php` 和 `includes/processmail_02.php`\
    \ 文件。\n\n1. 邮件头通常针对特定的网站或页面，因此 `From` 和 `Content-Type` 邮件头将被添加到 `contact.php`\
    \ 的脚本中。在页面顶部的 PHP 代码块中，就在引入 `processmail.php` 之前，添加以下代码：\n\n```\n    $required\
    \ = ['name', 'comments', 'email'];\n    // 创建额外的邮件头\n    $headers[] = 'From: Japan\
    \ Journey';\n    $headers[] = 'Content-Type: text/plain; charset=utf-8';\n   \
    \ require './includes/processmail.php';\n```\n\n2. 验证邮箱地址的目的是确保其格式有效，但该字段可能为空，因为你可以决定不将其设为必填项，或者用户直接忽略了它。如果该字段为必填但为空，它将被添加到\
    \ `$missing` 数组中，并且你在 PHP 方案 6-2 中添加的警告信息将会显示。如果该字段不为空，但输入无效，则需要显示不同的提示信息。\n\n\
    切换到 `processmail.php`，并在脚本底部添加以下代码：\n\n```\n    // 验证用户的邮箱\n    if (!$suspect\
    \ && !empty($email)) {\n    $validemail = filter_input(INPUT_POST, 'email', FILTER_VALIDATE_EMAIL);\n\
    \    if ($validemail) {\n    $headers[] = \"Reply-To: $validemail\";\n    } else\
    \ {\n    $errors['email'] = true;\n    }\n    }\n```\n\n这段代码首先检查是否没有发现可疑内容（`$suspect`\
    \ 为假），并且 `email` 字段不为空。这两个条件前面都使用了逻辑非运算符，因此当 `$suspect` 和 `empty($email)` 都为 `false`\
    \ 时，它们返回 `true`。你在 PHP 方案 6-2 中添加的 `foreach` 循环会将 `$_POST` 数组中的所有预期元素赋值给更简单的变量，因此\
    \ `$email` 的值与 `$_POST['email']` 相同。\n\n下一行使用 `filter_input()` 来验证邮箱地址。第一个参数是一个\
    \ PHP 常量 `INPUT_POST`，指定该值必须来自 `$_POST` 数组。第二个参数是你要测试的元素名称。最后一个参数是另一个 PHP 常量，指定你要检查该元素是否符合有效的邮箱格式。\n\
    \n如果被测试的值有效，`filter_input()` 函数会返回该值；否则返回 `false`。因此，如果用户提交的值看起来像是一个有效的邮箱地址，`$validemail`\
    \ 会包含该地址；如果格式无效，`$validemail` 则为 `false`。`FILTER_VALIDATE_EMAIL` 常量只接受单个邮箱地址，因此任何尝试插入多个邮箱地址的行为都会被拒绝。\n\
    \n> **注意**\n> `FILTER_VALIDATE_EMAIL` 仅检查格式，并不验证该地址是否真实存在。\n\n如果 `$validemail`\
    \ 不为 `false`，则可以安全地将其加入到 `Reply-To` 邮件头中。但如果 `$validemail` 为 `false`，则将 `$errors['email']`\
    \ 添加到 `$errors` 数组中。\n\n1. 现在，你需要修改 `contact.php` 中 `email` 字段的 `<label>` 标签，代码如下：\n\
    \n```\n    Email:\n\nPlease enter your email address\n\nInvalid email address\n\
    \n```\n\n这为第一个条件语句添加了一个 `elseif` 子句，并在邮箱地址验证失败时显示不同的警告信息。\n\n2. 保存 `contact.php`，通过留空所有字段并点击“发送消息”来测试表单。你会看到原来的错误信息。再次测试，在“Email”字段中输入一个不是邮箱地址的值，或者输入两个邮箱地址。你应该会看到无效邮箱的提示信息。\n\
    \n你可以使用 `ch06` 文件夹中的 `contact_06.php` 和 `includes/processmail_03.php` 来检查你的代码。\n\
    \n# PHP 方案 6-6：构建邮件正文并发送邮件\n\n许多 PHP 教程展示了如何像这样手动构建邮件正文：\n\n```\n$message = \"\
    Name: $name\\r\\n\\r\\n\";\n$message .= \"Email: $email\\r\\n\\r\\n\";\n$message\
    \ .= \"Comments: $comments\";\n```\n\n这为每个字段的输入添加了标签来标识来源，并在每项之间插入了两个回车换行符。对于字段数量较少的情况，这没问题，但随着字段增多，很快就会变得繁琐。只要你为表单字段赋予了有意义的\
    \ `name` 属性，就可以使用 `foreach` 循环自动构建邮件正文，这也是本 PHP 方案采用的方法。\n\n继续使用之前相同的文件进行处理。或者，使用\
    \ `ch06` 文件夹中的 `contact_06.php` 和 `includes/processmail_03.php` 文件。\n\n1. 在 `processmail.php`\
    \ 脚本的底部添加以下代码：\n\n```\n    $mailSent = false;\n```\n\n这会初始化一个变量，用于在邮件发送成功后重定向到感谢页面。在你知道\
    \ `mail()` 函数成功执行之前，需要将其设置为 `false`。\n\n2. 现在，立即在其后添加构建邮件正文的代码：\n\n```\n    //\
    \ 仅当无可疑内容、无缺失必填字段且无错误时继续执行\n    if (!$suspect && !$missing && !$errors) {\n  \
    \  // 初始化 $message 变量\n    $message = \";\n    // 遍历 $expected 数组\n    foreach($expected\
    \ as $item) {\n    // 将当前项的值赋给 $val\n    if (isset($$item) && !empty($$item))\
    \ {\n    $val = $$item;\n    } else {\n    // 如果没有值，则赋值为 'Not selected'\n    $val\
    \ = 'Not selected';\n    }\n    // 如果是数组，则展开为逗号分隔的字符串\n    if (is_array($val))\
    \ {\n    $val = implode(', ', $val);\n    }\n    // 将标签中的下划线替换为空格\n    $item =\
    \ str_replace('_', ' ', $item);\n    // 将标签和值添加到邮件正文\n    $message .= ucfirst($item).\"\
    : $val\\r\\n\\r\\n\";\n    }\n    // 限制每行长度为 70 个字符\n    $message = wordwrap($message,\
    \ 70);\n    // 将邮件头格式化为单个字符串\n    $headers = implode(\"\\r\\n\", $headers);\n\
    \    $mailSent = true;\n    }\n```\n\n这段代码首先检查 `$suspect`、`$missing` 和 `$errors`\
    \ 是否都为 `false`。如果是，则通过遍历 `$expected` 数组来构建邮件正文，并将结果以一系列标签/值对的形式存储在 `$message`\
    \ 中。\n\n其工作原理的关键在于以下条件语句：\n\n```\n    if (isset($$item) && !empty($$item)) {\n\
    \    $val = $$item;\n    }\n```\n\n这是使用可变变量的另一个例子（参见第 4 章的“动态创建新变量”）。每次循环运行时，`$item`\
    \ 都包含 `$expected` 数组中当前元素的值。第一个元素是 `name`，因此 `$$item` 动态创建了一个名为 `$name` 的变量。实际上，这个条件语句等同于：\n\
    \n```\n    if (isset($name) && !empty($name)) {\n    $val = $name;\n    }\n```\n\
    \n在下一轮循环中，`$$item` 创建了一个名为 `$email` 的变量，以此类推。\n\n> **警告**\n> 此脚本仅从 `$expected`\
    \ 数组中的元素构建邮件正文。为了使其正常工作，你必须将所有表单字段的名称都列在 `$expected` 数组中。\n"
- fmt: "If a field not specified as required is left empty, its value is set to \"\
    Not selected.\" The code also processes values from multiple-choice elements,\
    \ such as check-box groups and `<select>` lists, which are transmitted as subarrays\
    \ of the `$_POST` array. The `implode()` function converts the subarrays into\
    \ comma-separated strings. Each label is derived from the input field's `name`\
    \ attribute in the current element of the `$expected` array. The first argument\
    \ to `str_replace()` is an underscore. If an underscore is found in the `name`\
    \ attribute, it's replaced by the second argument, a string consisting of a single\
    \ space. The first letter is then set to uppercase by `ucfirst()`. Notice that\
    \ the third argument to `str_replace()` is `$item` (with a single dollar sign),\
    \ so this time it's an ordinary variable, not a variable variable. It contains\
    \ the current value from the `$expected` array. After the message body has been\
    \ combined into a single string, the `wordwrap()` function limits the line length\
    \ to 70 characters. The headers are formatted as a single string with a carriage\
    \ return and newline character between each one using the `implode()` function.\n\
    \nThe code that sends the email still needs to be added, but for testing purposes,\
    \ `$mailSent` is set to `true`.\n\n1.  Save `processmail.php`. Locate this code\
    \ block at the bottom of `contact.php`:\n\n    Change it to this:\n\n    This\
    \ checks that the form has been submitted and the mail is ready to send. It then\
    \ displays the values in `$message` and `$headers`. Both values are passed to\
    \ `htmlentities()` to ensure they display correctly in the browser.\n\n2.  Save\
    \ `contact.php`, and test the form by entering your name, email address, and a\
    \ brief comment. When you click Send message, you should see the message body\
    \ and headers displayed at the bottom of the page, as shown in Figure [6-8](#332054_4_En_6_Chapter.xhtml#Fig8).\n\
    \n    ![../images/332054_4_En_6_Chapter/332054_4_En_6_Fig8_HTML.jpg](images/332054_4_En_6_Chapter/332054_4_En_6_Fig8_HTML.jpg)\n\
    \n    Figure 6-8. Verifying that the message body and headers are correctly formed\n\
    \n    Assuming the message body and headers display correctly at the bottom of\
    \ the page, you're ready to add the code to send the email. If necessary, check\
    \ your code against `contact_07.php` and `includes/processmail_04.php` in the\
    \ `ch06` folder.\n\n3.  In `processmail.php`, add the code to send the mail. Locate\
    \ the following line:\n\n    ```\n    $mailSent = true;\n    ```\n\n    Change\
    \ it to this:\n\n    ```\n    $mailSent = mail($to, $subject, $message, $headers);\n\
    \    if (!$mailSent) {\n        $errors['mailfail'] = true;\n    }\n    ```\n\n\
    \    This passes the destination address, subject line, message body, and headers\
    \ to the `mail()` function, which returns `true` if it succeeds in handing the\
    \ email to the web server's mail transport agent (MTA). If it fails, `$mailSent`\
    \ is set to `false`, and the conditional statement adds an element to the `$errors`\
    \ array, allowing you to preserve the user's input when the form is redisplayed.\n\
    \n4.  In the PHP block at the top of `contact.php`, add the following conditional\
    \ statement immediately after the command that includes `processmail.php`:\n\n\
    \    ```\n    require './includes/processmail.php';\n    if ($mailSent) {\n  \
    \      header('Location: http://www.example.com/thank_you.php');\n        exit;\n\
    \    }\n    }\n    ?>\n    ```\n\n    You need to test this on your remote server,\
    \ so replace `www.example.com` with your own domain name. This checks if `$mailSent`\
    \ is `true`. If it is, the `header()` function redirects to `thank_you.php`, a\
    \ page acknowledging the message has been sent. The `exit` command on the following\
    \ line ensures the script is terminated after the page has been redirected.\n\n\
    \    There's a copy of `thank_you.php` in the `ch06` folder.\n\n5.  If `$mailSent`\
    \ is `false`, `contact.php` is redisplayed; you need to warn the user that the\
    \ message couldn't be sent. Edit the conditional statement just after the `<h2>`\
    \ heading, like this:\n\n    ```\n    Contact Us\n    Sorry, your mail could not\
    \ be sent. . . .\n    ```\n\n    The original and new conditions have been wrapped\
    \ in parentheses, so each pair is considered separately. The warning about the\
    \ message not being sent is displayed if the form has been submitted and suspect\
    \ phrases have been found, *or* if the form has been submitted and `$errors['mailfail']`\
    \ has been set.\n\n6.  Delete the code block (including the `<pre>` tags) that\
    \ displays the message body and headers at the bottom of `contact.php`.\n\n7.\
    \  Testing this locally is likely to result in the thank you page being shown,\
    \ but the email never arriving. This is because most testing environments don't\
    \ have an MTA. Even if you set one up, most mail servers reject mail from unrecognized\
    \ sources. Upload `contact.php` and all related files, including `processmail.php`\
    \ and `thank_you.php`, to your remote server and test the contact form there.\
    \ Don't forget that `processmail.php` needs to be in a subfolder called `includes`.\n\
    \n    You can check your code with `contact_08.php` and `includes/processmail_05.php`\
    \ in the `ch06` folder.\n\n### Troubleshooting `mail()`\nIt's important to understand\
    \ that `mail()` isn't an email program. PHP's responsibility ends as soon as it\
    \ passes the address, subject, message, and headers to the MTA. It has no way\
    \ of knowing if the email is delivered to its intended destination. Normally,\
    \ email arrives instantaneously, but network logjams can delay it by hours or\
    \ even a couple of days.\n\nIf you're redirected to the thank you page after sending\
    \ a message from `contact.php`, but nothing arrives in your inbox, check the following:\n\
    \n-   Has the message been caught by a spam filter?\n-   Have you checked the\
    \ destination address stored in `$to`? Try an alternative email address to see\
    \ if it makes a difference.\n-   Have you used a genuine address in the `From`\
    \ header? Using a fake or invalid address is likely to cause the mail to be rejected.\
    \ Use a valid address that belongs to the same domain as your web server.\n- \
    \  Check with your hosting company to see if the fifth argument to `mail()` is\
    \ required. If so, it should normally be a string composed of `-f` followed by\
    \ your email address. For example, `david@example.com` becomes `'-fdavid@example.com'`.\n\
    \nIf you still don't receive messages from `contact.php`, create a file with this\
    \ script:\n\n```\n<?php\nini_set('display_errors', '1');\n$mailSent = mail('you@example.com',\
    \ 'PHP mail test', 'This is a test email');\nif ($mailSent) {\n    echo 'Mail\
    \ sent';\n} else {\n    echo 'Failed';\n}\n```\n\nReplace `you@example.com` with\
    \ your own email address. Upload the file to your web site and load the page into\
    \ a browser.\n\nIf you see an error message about there being no `From` header,\
    \ add one as a fourth argument to the `mail()` function, like this:\n\n```\n$mailSent\
    \ = mail('you@example.com', 'PHP mail test', 'This is a test email',\n'From: me@example.com');\n\
    ```\n\nIt's usually a good idea to use a different address from the destination\
    \ address in the first argument.\n\nIf your hosting company requires the fifth\
    \ argument, adjust the code like this:\n\n```\n$mailSent = mail('you@example.com',\
    \ 'PHP mail test', 'This is a test email', null,\n'-fme@example.com');\n```"
