- fmt: "# The Operations with Strings\n\nWorking with text is a vast theme to discuss.\
    \ Here, let’s focus only on the basic operations with text and the features of\
    \ the text that you will need in the foreseeable future.\n\n> **Note:** An information\
    \ icon.  \n> You already know that text literals can be enclosed in single or\
    \ double quotes. In the latter case, if the text contains a variable’s name, its\
    \ value is substituted instead of its name. You can also insert escape sequences\
    \ into such text, consisting of a backslash `\\` and a character that defines\
    \ some operation. For example, `\\n` is a break-line instruction, and `\\t` is\
    \ a tab. You can use `\\\\`, `\\$`, `\\'`, and `\\\"` to insert backslash `\\\
    `, dollar sign `$`, single `'`, and double `\"` quotes, respectively.\n\nOne of\
    \ the basic operations often performed with text is the concatenation of strings.\
    \ In PHP, the concatenation of strings can be done by using the `.` operator “dot”.\
    \ For example, the result of the `\"Learning\"`.`\" PHP\"` expression is the string\
    \ `\"Learning PHP\"`. The same operation can be done with variables: the value\
    \ of an expression of the form `$A.$B` is the text calculated by combining the\
    \ text values of the `$A` and `$B` variables.\n\n| Details |\n| --- |\n| If the\
    \ `$A` and `$B` variables have non-text values, the `$A.$B` statement is calculated\
    \ by trying to convert those values to the text type and then concatenate them.\
    \ It is also worth mentioning that, unlike many other programming languages, PHP\
    \ does not use the `+` operator to concatenate text values. Moreover, applying\
    \ this operator to concatenate text values may lead to an error or unexpected\
    \ result. For example, the `\"1\"+\"2\"` expression does not give the text `\"\
    12\"`, as you might expect, but the numeric value `3`. The reason is that the\
    \ `+` operator is an arithmetic one, so the operands `\"1\"` and `\"2\"` are automatically\
    \ converted to the integers `1` and `2`, respectively. After that, the numbers\
    \ are added. Therefore, to get the text `\"12\"`, you should use the `\"1\".\"\
    2\"` statement. |\n\nAnother simple string operation is determining the length\
    \ of a string. In that case, use the `strlen()` function. You can compare strings\
    \ for equality/nonequality using the `==` and `!=` operators. But here, you should\
    \ remember automatic type casting. Therefore, using the `===` and `!==` operators\
    \ sometimes makes more sense.\n\n> **Note:** An information icon.  \n> You can\
    \ also use the `strcmp()` (the case-sensitive comparison) and `strcasecmp()` (the\
    \ case-insensitive comparison) functions to compare strings.\n\nThere are several\
    \ other essential operations performed with text. Among them, one of the main\
    \ ones is extracting a substring from a string. To do that, use the `substr()`\
    \ function. The function arguments are a string (from which the substring is extracted),\
    \ the index of the character from which the substring is extracted, and, if necessary,\
    \ the length of the substring. If you do not specify the last argument, the substring\
    \ is extracted to the end of the string.\n\nThe `str_replace()` function is used\
    \ to replace a substring in a string. The function replaces the substring specified\
    \ by the first argument with the substring specified by the second argument in\
    \ the string specified by the third argument.\n\n> **Note:** An information icon.\
    \  \n> You can access a single character in a string by specifying the character\
    \ index in square brackets after the text value. For example, if the `$A` variable\
    \ has a text value, then the `$A[$n]` expression is a reference to the character\
    \ with the `$n` index. Character indexing starts from zero.\n\n## Assigning Values\n\
    \nIn PHP, the assignment operator returns a value. That means an expression with\
    \ the assignment operator can be an operand in another expression. In particular,\
    \ the value of an expression of the form `variable=value` is the value of the\
    \ variable on the left side of the expression. For example, after executing the\
    \ `$A=($B=100)+1`, `$A` instruction has the value `101`, and `$B` has the value\
    \ `100`.\n\n| Details |\n| --- |\n| The `$A=($B=100)+1` command assigns the `($B=100)+1`\
    \ expression to the `$A` variable. That is the sum of two terms: `($B=100)` and\
    \ `1`. When the `$B=100` expression is evaluated, the `$B` variable gets the value\
    \ `100`, and the `($B=100)` expression has the same value. Therefore, the `$A`\
    \ variable is assigned the sum of `100` and `1`, that is, the number `101`. |\n\
    \nThere also exist simplified forms of assignment operators. They allow you to\
    \ simplify the process of executing assignment statements of the form `$A=$A`\
    \ ![](images/613529_1_En_2_Chapter/613529_1_En_2_Figr_HTML.gif) `$B`, where ![](images/613529_1_En_2_Chapter/613529_1_En_2_Figs_HTML.gif)\
    \ is a binary arithmetic or bitwise operator or the string concatenation operator.\
    \ So, instead of a statement like `$A=$A` ![](images/613529_1_En_2_Chapter/613529_1_En_2_Figt_HTML.gif)\
    \ `$B`, you can use the `$A` ![](images/613529_1_En_2_Chapter/613529_1_En_2_Figu_HTML.gif)`=\
    \ $B` instruction. For example, instead of the `$A=$A+$B` statement, you can use\
    \ the `$A+=$B` command, and the `$A.=$B` command is an analog to the `$A=$A.$B`\
    \ instruction."
  raw: '## The Operations with Strings


    Working with text is a vast theme to discuss. Here, let’s focus only on the basic
    operations with text and the features of the text that you will need in the foreseeable
    future.


    ![](images/613529_1_En_2_Chapter/613529_1_En_2_Figm_HTML.jpg)An information icon.Note


    You already know that text literals can be enclosed in single or double quotes.
    In the latter case, if the text contains a variable’s name, its value is substituted
    instead of its name. You can also insert escape sequences into such text, consisting
    of a backslash `\` and a character that defines some operation. For example, `\n`
    is a break-line instruction, and `\t` is a tab. You can use `\\`, `\$`, `\''`,
    and `\"` to insert backslash `\`, dollar sign `$`, single `''`, and double `"`
    quotes, respectively.


    One of the basic operations often performed with text is the concatenation of
    strings. In PHP, the concatenation of strings can be done by using the `.` operator
    “dot”. For example, the result of the `"Learning"``." PHP"` expression is the
    string `"Learning PHP"`. The same operation can be done with variables: the value
    of an expression of the form `$A.$B` is the text calculated by combining the text
    values of the `$A` and `$B` variables.


    | Details |

    | --- |

    | If the `$A` and `$B` variables have non-text values, the `$A.$B` statement is
    calculated by trying to convert those values to the text type and then concatenate
    them.It is also worth mentioning that, unlike many other programming languages,
    PHP does not use the `+` operator to concatenate text values. Moreover, applying
    this operator to concatenate text values may lead to an error or unexpected result.
    For example, the `"1"+"2"` expression does not give the text `"12"`, as you might
    expect, but the numeric value `3`. The reason is that the `+` operator is an arithmetic
    one, so the operands `"1"` and `"2"` are automatically converted to the integers
    `1` and `2,` respectively. After that, the numbers are added. Therefore, to get
    the text `"12"`, you should use the `"1"."2"` statement. |


    Another simple string operation is determining the length of a string. In that
    case, use the `strlen()` function. You can compare strings for equality/nonequality
    using the `==` and `!=` operators. But here, you should remember automatic type
    casting. Therefore, using the `===` and `!==` operators sometimes makes more sense.


    ![](images/613529_1_En_2_Chapter/613529_1_En_2_Fign_HTML.jpg)An information icon.Note


    You can also use the `strcmp()` (the case-sensitive comparison) and `strcasecmp()`
    (the case-insensitive comparison) functions to compare strings.


    There are several other essential operations performed with text. Among them,
    one of the main ones is extracting a substring from a string. To do that, use
    the `substr()` function. The function arguments are a string (from which the substring
    is extracted), the index of the character from which the substring is extracted,
    and, if necessary, the length of the substring. If you do not specify the last
    argument, the substring is extracted to the end of the string.


    The `str_replace()` function is used to replace a substring in a string. The function
    replaces the substring specified by the first argument with the substring specified
    by the second argument in the string specified by the third argument.


    ![](images/613529_1_En_2_Chapter/613529_1_En_2_Figo_HTML.jpg)An information icon.Note


    You can access a single character in a string by specifying the character index
    in square brackets after the text value. For example, if the `$A` variable has
    a text value, then the `$A[$n]` expression is a reference to the character with
    the `$n` index. Character indexing starts from zero.


    ## Assigning Values


    In PHP, the assignment operator returns a value. That means an expression with
    the assignment operator can be an operand in another expression. In particular,
    the value of an expression of the form `variable=value` is the value of the variable
    on the left side of the expression. For example, after executing the `$A=($B=100)+1`,
    `$A` instruction has the value `101`, and `$B` has the value `100`.


    | Details |

    | --- |

    | The `$A=($B=100)+1` command assigns the `($B=100)+1` expression to the `$A`
    variable. That is the sum of two terms: `($B=100)` and `1`. When the `$B=100`
    is expression evaluated, the `$B` variable gets the value `100`, and the `($B=100)`
    expression has the same value. Therefore, the `$A` variable is assigned the sum
    of `100` and `1`, that is, the number `101`. |


    There also exist simplified forms of assignment operators. They allow you to simplify
    the process of executing assignment statements of the form `$A=$A` ![](images/613529_1_En_2_Chapter/613529_1_En_2_Figr_HTML.gif)A
    bell icon. `$B`, where ![](images/613529_1_En_2_Chapter/613529_1_En_2_Figs_HTML.gif)A
    bell icon. is a binary arithmetic or bitwise operator or the string concatenation
    operator. So, instead of a statement like `$A=$A` ![](images/613529_1_En_2_Chapter/613529_1_En_2_Figt_HTML.gif)A
    bell icon. `$B`, you can use the `$A` ![](images/613529_1_En_2_Chapter/613529_1_En_2_Figu_HTML.gif)A
    bell icon.`= $B` instruction. For example, instead of the `$A=$A+$B` statement,
    you can use the `$A+=$B` command, and the `$A.=$B` command is an analog to the
    `$A=$A.$B` instruction.'
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n# 字符串操作\n\n处理文本是一个广泛的主题。在此，我们只关注文本的基本操作以及你在不久的将来会用到的文本特性。\n\
    \n> **注意：** 信息图标。  \n> 你已经知道文本字面量可以用单引号或双引号括起来。在后一种情况下，如果文本包含变量名，其值会替换变量名。你还可以在此类文本中插入转义序列，它们由反斜杠\
    \ `\\` 和定义某种操作的字符组成。例如，`\\n` 是换行指令，`\\t` 是制表符。你可以使用 `\\\\`、`\\$`、`\\'` 和 `\\\"\
    ` 分别插入反斜杠 `\\`、美元符号 `$`、单引号 `'` 和双引号 `\"`。\n\n经常对文本执行的基本操作之一是字符串连接。在 PHP 中，字符串连接可以通过使用\
    \ `.` 运算符（“点”）来完成。例如，表达式 `\"Learning\"`.`\" PHP\"` 的结果是字符串 `\"Learning PHP\"`。同样的操作也可以使用变量完成：形式为\
    \ `$A.$B` 的表达式的值，是将 `$A` 和 `$B` 变量的文本值合并计算出的文本。\n\n| 详情 |\n| --- |\n| 如果 `$A`\
    \ 和 `$B` 变量具有非文本值，则 `$A.$B` 语句会尝试将这些值转换为文本类型，然后再进行连接。另外值得一提的是，与许多其他编程语言不同，PHP\
    \ 不使用 `+` 运算符来连接文本值。此外，对此运算符应用连接文本值可能会导致错误或意外结果。例如，表达式 `\"1\"+\"2\"` 不会像你期望的那样产生文本\
    \ `\"12\"`，而是产生数值 `3`。原因是 `+` 运算符是一个算术运算符，因此操作数 `\"1\"` 和 `\"2\"` 会被自动转换为整数 `1`\
    \ 和 `2`。之后，这些数字相加。因此，要获得文本 `\"12\"`，你应该使用 `\"1\".\"2\"` 语句。 |\n\n另一个简单的字符串操作是确定字符串的长度。在这种情况下，使用\
    \ `strlen()` 函数。你可以使用 `==` 和 `!=` 运算符来比较字符串是否相等/不相等。但在这里，你应该记住自动类型转换。因此，使用 `===`\
    \ 和 `!==` 运算符有时更有意义。\n\n> **注意：** 信息图标。  \n> 你也可以使用 `strcmp()`（区分大小写的比较）和 `strcasecmp()`（不区分大小写的比较）函数来比较字符串。\n\
    \n还有几个其他重要的文本操作。其中，最主要的是从字符串中提取子字符串。为此，请使用 `substr()` 函数。该函数的参数是：一个字符串（从中提取子字符串）、子字符串起始字符的索引，以及（如果需要）子字符串的长度。如果你没有指定最后一个参数，子字符串将被提取到字符串的末尾。\n\
    \n`str_replace()` 函数用于在字符串中替换子字符串。该函数将第三个参数指定的字符串中，由第一个参数指定的子字符串替换为第二个参数指定的子字符串。\n\
    \n> **注意：** 信息图标。  \n> 你可以通过在文本值后面的方括号中指定字符索引来访问字符串中的单个字符。例如，如果 `$A` 变量有一个文本值，那么表达式\
    \ `$A[$n]` 是对索引为 `$n` 的字符的引用。字符索引从零开始。\n\n## 赋值\n\n在 PHP 中，赋值运算符会返回一个值。这意味着带有赋值运算符的表达式可以是另一个表达式中的操作数。特别是，形式为\
    \ `variable=value` 的表达式的值是表达式左侧变量的值。例如，执行 `$A=($B=100)+1` 指令后，`$A` 的值为 `101`，`$B`\
    \ 的值为 `100`。\n\n| 详情 |\n| --- |\n| `$A=($B=100)+1` 命令将表达式 `($B=100)+1` 赋值给变量 `$A`。这是两项之和：`($B=100)`\
    \ 和 `1`。当计算表达式 `$B=100` 时，变量 `$B` 获得值 `100`，而表达式 `($B=100)` 也具有相同的值。因此，变量 `$A`\
    \ 被赋值为 `100` 和 `1` 的和，即数字 `101`。 |\n\n还存在简化形式的赋值运算符。它们允许你简化执行形式为 `$A=$A` ![](img/613529_1_En_2_Figr_HTML.gif)\
    \ `$B` 的赋值语句的过程，其中 ![](img/613529_1_En_2_Figs_HTML.gif) 是二元算术或位运算符，或是字符串连接运算符。因此，你可以使用\
    \ `$A` ![](img/613529_1_En_2_Figu_HTML.gif)`= $B` 指令来代替诸如 `$A=$A` ![](img/613529_1_En_2_Figt_HTML.gif)\
    \ `$B` 之类的语句。例如，你可以使用 `$A+=$B` 命令代替 `$A=$A+$B` 语句，而 `$A.=$B` 命令是 `$A=$A.$B` 指令的等价形式。\n"
- fmt: "# The Ternary Operator\n\nOperators are usually unary (they have one operand)\
    \ or binary (they have two operands). But there is one operator that has three\
    \ operands. That operator is called the *ternary* one. In general, if you do not\
    \ focus on the terminology, you may consider it as a specific syntactic construction\
    \ that allows you to assign a value to a variable depending on a condition that\
    \ can be true or false. The syntax for the ternary operator is as follows.\n\n\
    ```\ncondition?value_1:value_2\n```\n\nFirst, place the condition (as usual, an\
    \ expression that returns a boolean value). Then enter a question mark (`?`),\
    \ the value returned if the condition is true, a colon (`:`), and the value returned\
    \ if the condition is false. The described construction can be assigned to a variable.\
    \ For example, after executing the `$number=($x<0)?-10:10` statement, `$number`\
    \ is set to `-10` if the value of `$x` is less than zero (if the condition `$x<0`\
    \ is true), and `10` otherwise (if the condition `$x<0` is false). A simple example\
    \ that uses the ternary operator is shown in Listing [2-4](#613529_1_En_2_Chapter.xhtml#PC11).\n\
    \n```\nListing 2-4\nThe Ternary Operator\n```\n\nThe program is simple, but it\
    \ contains some notable instructions. First, the `$number=(int)trim(fgets(STDIN))`\
    \ statement reads the integer value entered by the user from the keyboard and\
    \ writes it to the `$number` variable. Then, using the ternary operator, the `$number`\
    \ variable is tested for even/odd, and depending on the test result, the `$word`\
    \ variable is assigned the value `\"even\"` or `\"odd\"`. The test result is displayed\
    \ on the screen.\n\nWhen you run the program, you are prompted to enter a number.\
    \ The program is waiting for the user input. The user enters a number and presses\
    \ the Enter key. After that, another message appears, which contains information\
    \ about whether the number is even or odd. Depending on the value entered by the\
    \ user (highlighted in bold), the result of the program execution can be as follows\
    \ (an odd number is entered).\n\n```\nThe output of the program (from Listing\
    \ 2-4)\nEnter a number: 123\nThis is an odd number\n```\n\nOr the result can be\
    \ as follows (an even number is entered).\n\n```\nThe output of the program (from\
    \ Listing 2-4)\nEnter a number: 124\nThis is an even number\n```\n\nNow, let’s\
    \ analyze the main statements. First, consider the `$number=(int)trim(fgets(STDIN))`\
    \ instruction. It is based on a call of the `fgets()` function, which reads a\
    \ string from the input stream. The function argument is the `STDIN` constant\
    \ identifier for the standard input stream (which, in this case, is associated\
    \ with the console). But the `fgets()` function reads any entered value as text,\
    \ and, in addition, the text can contain special escape sequences (like a break-line\
    \ instruction). To remove all “redundant” characters, use the `trim()` function.\
    \ It removes all leading and trailing spaces and special characters from the string\
    \ passed as an argument. Thus, if the user enters an integer, then the `trim(fgets(STDIN))`\
    \ expression contains the textual representation of that number. For example,\
    \ if the user enters the number `123`, then the value read (taking into account\
    \ the call to the `trim()` function) is `\"123\"`. Frankly speaking, accounting\
    \ for automatic type conversion, calculations could be performed even with that\
    \ value.\n\nNevertheless, for reliability, you convert the read text into a number.\
    \ To do that, place the `(int)` instruction before the entire expression. In addition\
    \ to the `settype()` function mentioned, that is another way to cast a type explicitly.\n\
    \n| Details |\n| --- |\n| Instead of the `$number=(int)trim(fgets(STDIN))` statement,\
    \ which reads the value for the `$number` variable from the console, you could\
    \ use the `$number=123` or `$number=124` statement, which explicitly assigns the\
    \ value to the `$number` variable. |\n\nThe `$word=($number%2==0)?\"even\":\"\
    odd\"` command assigns the `($number%2==0)?\"even\":\"odd\"` expression (based\
    \ on the ternary operator) to the `$word` variable. If the `$number%2==0` condition\
    \ is true (which means that the remainder of dividing the `$number` variable by\
    \ `2` is zero), then the `$word` variable gets the text `\"even\"`. If the `$number%2==0`\
    \ condition is false, then the `$word` variable gets the text `\"odd\"`. The value\
    \ of the `$word` variable is used when displaying the test result.\n\n## Summary\n\
    \n* A variable is a named block of memory that allows you to refer to that block\
    \ of memory by name. If you want to create a variable in PHP, it is enough to\
    \ assign a value to the variable. The variable name begins with the `$` character.\n\
    \n* A variable does not have a type, but the value that the variable refers to\
    \ has a type. The main types include `integer` (integer numbers), `double` (real\
    \ numbers), `string` (text), `boolean` (boolean values), `array` (an array), and\
    \ `object` (an object). You can obtain the type of value a variable refers to\
    \ using the `gettype()` function.\n\n* For explicit type conversion, you can use\
    \ the `settype()` function or specify the final type in parentheses before the\
    \ converted value. PHP also has an automatic type conversion system.\n\n* Basic\
    \ operations use arithmetic, logical, bitwise, and comparison operators. The *dot*\
    \ operator is used to concatenate strings.\n\n* The assignment operator returns\
    \ a value that is the same as the variable’s value (to which the value is being\
    \ assigned). There exist simplified forms of assignment operators.\n\n* The ternary\
    \ operator returns a value that depends on a specific condition that can be true\
    \ or false.\n\n* The `fgets()` function can read data from the console.\n\n# 3.\
    \ The Control Statements\n\n> *I was sitting quietly, peacefully. Then I got hungry.\
    \ Further, as if in a fog.*\n> \n> —*ALF* (TV series)\n\nThis chapter discusses\
    \ control statements, which are instructions designed to create branch points\
    \ in a program and instructions to repeat statement blocks. In other words, it\
    \ covers the conditional, loop, and selection statements."
