    **62**


    C H A P T E R 3 ■ C R E AT I N G T H E P R O D U C T C ATA L O G : PA RT I database.
    (Depending on whom you ask, the data store may or may not be considered an integral
    part of the three-tiered architecture.)


    These are the main steps you’ll take toward having your own dynamically generated
    departments list. Note that you start with the database and make your way to the
    presentation tier: **1.** Create the department table in the database. This table
    will store data regarding the store’s departments. Before adding this table, you’ll
    learn the basic concepts of working with relational databases.


    **2.** Write a PostgreSQL function named catalog_get_departments_list, which returns
    the IDs and names of the departments from the department table. PHP scripts will
    call this function to generate the departments list for your visitor. PostgreSQL
    functions are logically located in the data tier of your application. At this
    step, you’ll learn how to speak to your relational database using SQL.


    **3.** Create the DatabaseHandler class, which will be your helper class that
    performs common database interaction operations. DatabaseHandler is a wrapper
    class for some PDO functions and includes consistent error-handling techniques
    that deal with database-related errors.


    **4.** Create the business tier components of the departments list (the Catalog
    class and its GetDepartments method). You’ll see how to communicate with the database,
    through the DatabaseHandler helper class, to retrieve the necessary data.


    **5.** Implement the departments_list Smarty template and its Smarty plugin function,
    which build on the lower layers to generate a good-looking list of departments
    for your visitor. The Smarty plugin function file will also contain a helper class
    named DepartmentsList.


    So, let’s start by creating the department table.


    **Storing Catalog Information**


    The vast majority of web applications, e-commerce web sites being no exception,
    live around the data they manage. Analyzing and understanding the data you need
    to store and process is an essential step in successfully completing your project.


    The typical data storage solution for this kind of application is a relational
    database. However, this is not a requirement—you have the freedom to create your
    own data access layer and have whatever kind of data structures you want to support
    your application.


    ■**Note** In some particular cases, it may be preferable to store your data in
    plain text files or XML files instead of databases, but these solutions are generally
    not suited for applications such as HatShop, so we won’t cover them in this book.
    However, it’s good to know your options.


    Although this is not a book about databases or relational database design, you’ll
    learn all you need to know to understand the product catalog and make it work.


