    I have already discussed the power of the automated test. I kick off Part 4 with
    an introductory chapter that gives an overview of problems and solutions in this
    area.


    Many programmers are guilty of giving in to the impulse to do everything themselves.
    Composer, together with Packagist, its main repository, offers access to thousands
    of dependency managed packages that can be stitched into projects with ease. I
    look at the tradeoffs between implementing a feature yourself and deploying a
    Composer package.


    While I’m on the topic of Composer, I look at the installation mechanism that
    makes the deployment of a package as simple as a single command.


    Code is about collaboration. This fact can be rewarding. It can also be a complete
    nightmare. Git is a version control system that enables many programmers to work
    together on the same codebase without overwriting one another’s work. It lets
    you grab snapshots of your project at any stage in development, see who has made
    which changes, and split the project into mergeable branches. Git will save your
    project one day.


    When people and libraries collaborate, they often bring different conventions
    and styles to the party. While this is healthy, it can also undermine interoperability.
    Words like conform and comply give me the shivers, but it is undeniable that the
    creativity of the Internet is underpinned by standards. By obeying certain conventions,
    we are freed to play in an unimaginably vast sandbox. So, in a new chapter, I
    explore PHP standards, how they can help us , and how and why we should, yes,
    comply.


    Two facts seem inevitable. First, bugs often recur in the same region of code,
    making some work days an exercise in déjà vu. Second, often improvements break
    as much as, or more than, they fix. Automated testing can address both of these
    issues, providing an early warning system for problems in your code. I introduce
    PHPUnit, a powerful implementation of the so-called xUnit test platform designed
    first for Smalltalk but ported now to many languages, notably Java. I look in
    particular at PHPUnit’s features and more generally at the benefits, and some
    of the costs, of testing.


    Applications are messy. They may need files to be installed in nonstandard locations,
    or want to set up databases, or need to patch server configuration. In short,
    applications need stuff to be done during installation. Phing is a faithful port
    of a Java tool called Ant. Phing and Ant interpret a build file and process your
    source files in any way you tell them to. This usually means copying them from
    a source directory to various target locations around your system, but, as your
    needs get more complex, Phing scales effortlessly to meet them.


    Some companies enforce development platforms—but in many cases teams end up running
    an array of different operating systems. Contractors arrive wielding PC laptops
    (hello Paul Tregoing, fifth edition tech editor), some team members evangelize
    endlessly for their favorite Linux distro (that’s me and my Fedora), and many
    hold out for yet another sexy-looking PowerBook (the coffee bar and meeting room
    use of which doesn’t at all make you look like just another node in a hipster
    Borg army). All of these will run a LAMP stack with varying degrees of ease. Ideally,
    though, developers should run their code in environments that closely resemble
    the ultimate production system. I examine Vagrant, an application which uses virtualization
    so that team members can keep their idiosyncratic development platforms but run
    project code on a production-like system.


    Testing and build are all very well, but you have to install and run your tests,
    and keep on doing so in order to reap the benefits. It’s easy to become complacent
    and let things slide if you don’t automate your builds and tests. I look at some
    tools and techniques that are lumped together in the category “continuous integration”
    that will help you do just that.'
  trans: '

    ### 对象


    在第二部分的开始，我将简要回顾一下 PHP 与对象的历史，描绘它们如何从 PHP 3 中的事后考虑，转变为 PHP 5 中的核心特性。


    即使对对象知之甚少，你依然可以成为一名经验丰富且成功的 PHP 程序员。为此，我将从基本原理出发，解释对象、类和继承。即便在这个早期阶段，我也会探讨 PHP
    5 和 PHP 7 引入的一些对象增强功能。


    在奠定基础之后，我将更深入地探讨我们的主题，研究 PHP 更高级的面向对象特性。我还会用一章的篇幅来介绍 PHP 为了帮助你使用对象和类所提供的工具。


    然而，只知道如何声明一个类并使用它来实例化一个对象是不够的。你首先必须为你的系统选择正确的参与者，并决定它们之间交互的最佳方式。与关于对象工具和语法的生硬事实相比，这些选择更难描述和学习。我将以对
    PHP 面向对象设计的介绍来结束第二部分。


    ### 模式


    模式描述了软件设计中的一个问题，并提供了解决方案的核心。这里的“解决方案”并不意味着你在参考手册（尽管参考手册作为程序员的资源非常出色）中能找到的那种可直接复制粘贴的代码。相反，设计模式描述了一种可以用来解决问题的方法。可能会给出一个示例实现，但它远不及它所旨在阐述的概念重要。


    第三部分首先定义了设计模式并描述了它们的结构。我还将探讨它们受欢迎背后的一些原因。


    模式往往倾向于促进并遵循某些核心的设计原则。理解这些原则有助于分析模式的动机，并且可以有效地应用于所有编程。我将讨论其中一些原则。我还会研究统一建模语言（UML），它是一种描述类及其交互的平台无关方式。


    尽管本书并非模式目录，但我仍会研究一些最著名且最实用的模式。我将描述每种模式要解决的问题，分析其解决方案，并给出一个 PHP 中的实现示例。


    ### 实践


    即使是一个设计得再优雅的架构，如果管理不当也会失败。在第四部分，我将探讨可用于帮助你创建一个确保项目成功的框架的工具。如果本书其余部分是关于设计和编程的实践，那么第四部分则关乎管理代码的实践。我所研究的工具可以为项目形成一个支撑结构，帮助跟踪出现的错误，促进程序员之间的协作，并提供易于安装和代码清晰性的便利。


    我已经讨论过自动化测试的强大功能。我将以一个介绍性章节开启第四部分，概述该领域的问题和解决方案。


    许多程序员都有一种冲动，即凡事都自己动手，这通常是一种错误。`Composer` 及其主要仓库 `Packagist` 提供了对数千个依赖管理包（可以轻松地集成到项目中）的访问。我将审视自行实现某个功能与部署一个
    `Composer` 包之间的权衡。


    既然谈到了 `Composer`，我将介绍一种安装机制，它使得部署一个包就像执行单个命令一样简单。


    代码关乎协作。这一事实既可能带来收益，也可能变成一场彻头彻尾的噩梦。`Git` 是一个版本控制系统，它允许多个程序员在同一个代码库上协作，而不会相互覆盖彼此的工作。它让你能够在开发的任何阶段为你的项目拍摄快照，查看谁做了哪些更改，并将项目分割成可合并的分支。`Git`
    终有一天会拯救你的项目。


    当人和库进行协作时，他们常常会带来不同的约定和风格。虽然这很健康，但也可能破坏互操作性。像符合（conform）和遵从（comply）这样的词会让我不寒而栗，但不可否认的是，互联网的创造力正是建立在标准之上的。通过遵守某些约定，我们得以在一个难以想象的广阔沙盒中自由发挥。因此，在一个新章节中，我将探讨
    PHP 标准、它们如何帮助我们，以及我们应该如何以及为何要，是的，遵从标准。


    有两个事实似乎是不可避免的。首先，错误常常在同一段代码区域中重复出现，使得某些工作日像是一次“既视感”的练习。其次，改进常常会破坏与它们修复的同等或更多的东西。自动化测试可以同时解决这两个问题，为你的代码提供问题的早期预警系统。我将介绍
    `PHPUnit`，它是所谓的 xUnit 测试平台的一个强大实现，该平台最初为 Smalltalk 设计，但现已移植到多种语言，尤其是 Java。我将特别关注
    `PHPUnit` 的特性，并更广泛地讨论测试的益处以及一些代价。


    应用程序是杂乱的。它们可能需要将文件安装在非标准位置，或者想要设置数据库，亦或是需要修补服务器配置。简而言之，应用程序在安装过程中需要做一些事情。`Phing`
    是一个名为 `Ant` 的 Java 工具的忠实移植版。`Phing` 和 `Ant` 会解释一个构建文件，并按照你指示的任何方式处理你的源文件。这通常意味着将它们从源目录复制到系统周围的各种目标位置，但是，随着你的需求变得更加复杂，`Phing`
    能够毫不费力地扩展以满足这些需求。


    一些公司会强制执行开发平台——但在许多情况下，团队最终会运行各种不同的操作系统。承包商带着 PC 笔记本电脑来了（你好，Paul Tregoing，第五版技术编辑），一些团队成员喋喋不休地宣扬他们最喜欢的
    Linux 发行版（那是我和我的 Fedora），而许多人则坚持要另一台看起来很酷的 PowerBook（在咖啡吧和会议室使用它根本不会让你看起来像是潮人
    Borg 大军中的又一个节点）。所有这些系统都能以不同程度的易用性运行 LAMP 环境。然而，理想情况下，开发人员应该在与最终生产系统非常相似的环境中运行他们的代码。我将介绍
    `Vagrant`，这是一个利用虚拟化的应用程序，以便团队成员可以保留他们特有的开发平台，但在类似生产环境的系统上运行项目代码。


    测试和构建都很好，但你必须安装并运行你的测试，并且持续这样做才能获得收益。如果你不自动化你的构建和测试，很容易变得自满并让事情停滞不前。我将研究一些被归入“持续集成”这一类别的工具和技术，它们将帮助你做到这一点。'
- fmt: '# What’s New in the Fifth Edition


    `PHP` is a living language, and as such it’s under constant review and development.
    This new edition, too, has been reviewed and thoroughly updated to take account
    of changes and new opportunities. I cover new features such as anonymous classes,
    and the long-awaited scalar argument hints and return types. Examples use `PHP
    7` features where appropriate, so be aware that you will need to run code against
    the `PHP 7` interpreter—or be ready to do some work to downgrade.


    In previous editions, I included a chapter on the `PEAR` package repository. `Composer`
    and the `Packagist` repository are plainly now the standard for `PHP` development,
    and I have rewritten the chapter accordingly.


    It seems that I’ve switched my version control coverage for every other edition
    or so of this book. I’m glad to say that I’m sticking with `Git` this time round.
    I have, however, spent some more time looking at `Git` repositories like `GitHub`
    since these are increasingly used by developers.


    I include a new chapter on the previously mentioned `Vagrant`.


    In another new chapter, I examine `PHP` Standards. Since I endorse the value of
    complying with a style guide, I have reworked every code example in the book to
    meet the `PSR-1` and `PSR-2` standards. This was a much bigger commitment than
    I realized, and tech editor Paul Tregoing has worked valiantly to keep me honest.


    ## Summary


    This is a book about object-oriented design and programming. It is also about
    tools for managing a `PHP` codebase from collaboration through to deployment.


    These two themes address the same problem from different but complementary angles.
    The primary aim is to build systems that achieve their objectives and lend themselves
    well to collaborative development.


    A secondary goal lies in the aesthetics of software systems. As programmers, we
    build machines that have shape and action. We invest many hours of our working
    day, and many days of our lives, writing these shapes into being. We want the
    tools we build, whether individual classes and objects, software components, or
    end products, to form an elegant whole. The process of version control, testing,
    documentation, and build does more than support this objective: it is part of
    the shape we want to achieve. Just as we want clean and clever code, we want a
    codebase that is designed well for developers and users alike. The mechanics of
    sharing, reading, and deploying the project should be as important as the code
    itself.


    # 2. PHP and Objects


    Objects were not always a key part of the `PHP` project. In fact, they were once
    described as an afterthought by `PHP`’s designers.


    As afterthoughts go, this one has proved remarkably resilient. In this chapter,
    I introduce this book’s coverage of objects by summarizing the development of
    `PHP`’s object-oriented features.


    We will look at the following:


    - `PHP/FI 2.0`: PHP, but not as we know it

    - `PHP 3`: Objects make their first appearance

    - `PHP 4`: Object-oriented programming grows up

    - `PHP 5`: Objects at the heart of the language

    - `PHP 7`: Closing the gap


    ## The Accidental Success of PHP Objects


    With `PHP`’s extensive object support and so many object-oriented `PHP` libraries
    and applications in circulation, the rise of the object in `PHP` may seem like
    the culmination of a natural and inevitable process. In fact, nothing could be
    further from the truth.


    ### In the Beginning: PHP/FI


    The genesis of `PHP` as we know it today lies with two tools developed by Rasmus
    Lerdorf using `Perl`. `PHP` stood for Personal Homepage Tools. `FI` stood for
    Form Interpreter. Together, they comprised macros for sending `SQL` statements
    to databases, processing forms, and flow control.


    These tools were rewritten in `C` and combined under the name `PHP/FI 2.0`. The
    language at this stage looked different from the syntax we recognize today, but
    not that different. There was support for variables, associative arrays, and functions.
    Objects, however, were not even on the horizon.


    ### Syntactic Sugar: PHP 3


    In fact, even as `PHP 3` was in the planning stage, objects were off the agenda.
    The principal architects of `PHP 3` were Zeev Suraski and Andi Gutmans. `PHP 3`
    was a complete rewrite of `PHP/FI 2.0`, but objects were not deemed a necessary
    part of the new syntax.


    According to Zeev Suraski, support for classes was added almost as an afterthought
    (on 27 August 1997, to be precise). Classes and objects were actually just another
    way to define and access associative arrays.


    Of course, the addition of methods and inheritance made classes much more than
    glorified associative arrays, but there were still severe limitations on what
    you might do with your classes. In particular, you could not access a parent class’s
    overridden methods (don’t worry if you don’t know what this means yet; I will
    explain later). Another disadvantage that I will examine in the next section was
    the less than optimal way that objects were passed around in `PHP` scripts.


    That objects were a marginal issue at this time is underlined by their lack of
    prominence in official documentation. The manual devoted one sentence and a code
    example to objects. The example did not illustrate inheritance or properties.'
  raw: '### What’s New in the Fifth Edition


    PHP is a living language, and as such it’s under constant review and development.
    This new edition, too, has been reviewed and thoroughly updated to take account
    of changes and new opportunities. I cover new features such as anonymous classes,
    and the long-awaited scalar argument hints and return types. Examples use PHP
    7 features where appropriate, so be aware that you will need to run code against
    the PHP 7 interpreter—or be ready to do some work to downgrade.


    In previous editions, I included a chapter on the PEAR package repository. Composer
    and the Packagist repository are plainly now the standard for PHP development,
    and I have rewritten the chapter accordingly.


    It seems that I’ve switched my version control coverage for every other edition
    or so of this book. I’m glad to say that I’m sticking with Git this time round.
    I have, however, spent some more time looking at Git repositories like GitHub
    since these are increasingly used by developers.


    I include a new chapter on the previously mentioned Vagrant.


    In another new chapter, I examine PHP Standards. Since I endorse the value of
    complying with a style guide, I have reworked every code example in the book to
    meet the PSR-1 and PSR-2 standards. This was a much bigger commitment than I realized,
    and tech editor Paul Tregoing has worked valiantly to keep me honest.


    ## Summary


    This is a book about object-oriented design and programming. It is also about
    tools for managing a PHP codebase from collaboration through to deployment.


    These two themes address the same problem from different but complementary angles.
    The primary aim is to build systems that achieve their objectives and lend themselves
    well to collaborative development.


    A secondary goal lies in the aesthetics of software systems. As programmers, we
    build machines that have shape and action. We invest many hours of our working
    day, and many days of our lives, writing these shapes into being. We want the
    tools we build, whether individual classes and objects, software components, or
    end products, to form an elegant whole. The process of version control, testing,
    documentation, and build does more than support this objective: it is part of
    the shape we want to achieve. Just as we want clean and clever code, we want a
    codebase that is designed well for developers and users alike. The mechanics of
    sharing, reading, and deploying the project should be as important as the code
    itself.


    # 2. PHP and Objects


    Objects were not always a key part of the PHP project. In fact, they were once
    described as an afterthought by PHP’s designers.


    As afterthoughts go, this one has proved remarkably resilient. In this chapter,
    I introduce this book’s coverage of objects by summarizing the development of
    PHP’s object-oriented features.


    We will look at the following:


    *   PHP/FI 2.0: PHP, but not as we know it

    *   PHP 3: Objects make their first appearance

    *   PHP 4: Object-oriented programming grows up

    *   PHP 5: Objects at the heart of the language

    *   PHP 7: Closing the gap


    ## The Accidental Success of PHP Objects


    With PHP’s extensive object support and so many object-oriented PHP libraries
    and applications in circulation, the rise of the object in PHP may seem like the
    culmination of a natural and inevitable process. In fact, nothing could be further
    from the truth.


    ### In the Beginning: PHP/FI


    The genesis of PHP as we know it today lies with two tools developed by Rasmus
    Lerdorf using Perl. PHP stood for Personal Homepage Tools. FI stood for Form Interpreter.
    Together, they comprised macros for sending SQL statements to databases, processing
    forms, and flow control.


    These tools were rewritten in C and combined under the name PHP/FI 2.0. The language
    at this stage looked different from the syntax we recognize today, but not that
    different. There was support for variables, associative arrays, and functions.
    Objects, however, were not even on the horizon.


    ### Syntactic Sugar: PHP 3


    In fact, even as PHP 3 was in the planning stage, objects were off the agenda.
    The principal architects of PHP 3 were Zeev Suraski and Andi Gutmans . PHP 3 was
    a complete rewrite of PHP/FI 2.0, but objects were not deemed a necessary part
    of the new syntax.


    According to Zeev Suraski, support for classes was added almost as an afterthought
    (on 27 August 1997, to be precise). Classes and objects were actually just another
    way to define and access associative arrays.


    Of course, the addition of methods and inheritance made classes much more than
    glorified associative arrays, but there were still severe limitations on what
    you might do with your classes. In particular, you could not access a parent class’s
    overridden methods (don’t worry if you don’t know what this means yet; I will
    explain later). Another disadvantage that I will examine in the next section was
    the less than optimal way that objects were passed around in PHP scripts.


    That objects were a marginal issue at this time is underlined by their lack of
    prominence in official documentation. The manual devoted one sentence and a code
    example to objects. The example did not illustrate inheritance or properties.'
  trans: '

    # 第五版新增内容


    `PHP` 是一门不断演进的编程语言，因此它始终处于持续的审查与开发之中。本新版也经过了审查和全面更新，以反映语言的变化和新的可能性。我涵盖了匿名类等新特性，以及期待已久的标量参数类型提示和返回类型声明。示例中适当采用了
    `PHP 7` 的特性，因此请注意，你需要使用 `PHP 7` 解释器运行代码——或者准备好做一些降级处理工作。


    在之前的版本中，我包含了一章关于 `PEAR` 包仓库的内容。如今，`Composer` 和 `Packagist` 仓库显然已成为 `PHP` 开发的标准，因此我相应重写了这一章。


    似乎本书每隔一个版本我就会切换一次版本控制内容。很高兴这次我坚持使用 `Git`。不过，由于像 `GitHub` 这样的 `Git` 仓库越来越多地被开发者使用，我花了一些更多时间来探讨它们。


    我新增了一章关于前面提到的 `Vagrant` 的内容。


    在另一新增章节中，我探讨了 `PHP` 标准。由于我赞同遵循风格指南的价值，我对书中每个代码示例都进行了重新编写，使其符合 `PSR-1` 和 `PSR-2`
    标准。这项工作所投入的精力远超我的预期，技术编辑 Paul Tregoing 在不懈地监督下保持了内容的准确性。


    ## 总结


    这是一本关于面向对象设计与编程的书。它同时也涉及从协作到部署管理 `PHP` 代码库的工具。


    这两个主题从不同却又互补的角度解决了同一个问题。主要目标是构建既能实现目标，又适合协作开发的系统。


    次要目标则在于软件系统的美学。作为程序员，我们构建具有形态和行为的机器。我们投入工作中的许多小时，乃至生命中的许多天，来将这些形态编写出来。我们希望构建的工具——无论是单个类与对象、软件组件，还是最终产品——都能构成一个优雅的整体。版本控制、测试、文档和构建的过程不仅支持这一目标：它本身就是我们想要达成的形态的一部分。正如我们追求简洁优雅的代码，我们也希望代码库对开发者和用户都设计良好。共享、阅读和部署项目的机制应与代码本身同样重要。


    # 2. PHP 与对象


    对象并非一直是 `PHP` 项目的关键部分。事实上，它们曾被 `PHP` 的设计者描述为“事后补充”。


    不过，作为事后补充，这一特性却展现出非凡的持久力。在本章中，我将通过总结 `PHP` 面向对象特性的发展历程来介绍本书对对象的探讨。


    我们将涉及以下内容：


    - `PHP/FI 2.0`：PHP，但并非我们所熟知的样子

    - `PHP 3`：对象首次登场

    - `PHP 4`：面向对象编程逐渐成熟

    - `PHP 5`：对象成为语言的核心

    - `PHP 7`：缩小差距


    ## PHP 对象的意外成功


    鉴于 `PHP` 拥有广泛的对象支持，以及众多面向对象的 `PHP` 库和应用在流通，对象在 `PHP` 中的崛起似乎是一个自然且必然过程的顶点。然而，事实远非如此。


    ### 最初：PHP/FI


    我们今天所熟知的 `PHP` 起源于 Rasmus Lerdorf 用 `Perl` 开发的两个工具。`PHP` 代表“个人主页工具”（Personal Homepage
    Tools）。`FI` 代表“表单解释器”（Form Interpreter）。它们共同构成了用于向数据库发送 `SQL` 语句、处理表单以及实现流程控制的宏。


    这些工具后来用 `C` 重写，并合并命名为 `PHP/FI 2.0`。这一阶段的语言与我们今天所识别的语法看起来不同，但差别不大。它支持变量、关联数组和函数。然而，对象甚至还没有进入视线。


    ### 语法糖：PHP 3


    事实上，即使在 `PHP 3` 规划阶段，对象也未被列入议程。`PHP 3` 的主要架构师是 Zeev Suraski 和 Andi Gutmans。`PHP
    3` 是对 `PHP/FI 2.0` 的完全重写，但对象并未被视为新语法中必要的一部分。


    据 Zeev Suraski 称，对类的支持几乎是作为事后补充才加入的（准确地说，是在 1997 年 8 月 27 日）。类和对象实际上只是定义和访问关联数组的另一种方式。


    当然，方法和继承的加入使得类不仅仅是美化了的关联数组，但你能对类进行的操作仍然存在严重限制。特别是，你无法访问父类中被覆盖的方法（如果你还不明白这意味着什么，不必担心；我会在后面解释）。下一节中我将探讨的另一个不利因素是，`PHP`
    脚本中对象传递方式的低效。


    对象在当时只是一个边缘问题，这一点在官方文档中它们缺乏突出地位得到了强调。手册只用了一句话和一个代码示例来介绍对象。该示例并未说明继承或属性。

