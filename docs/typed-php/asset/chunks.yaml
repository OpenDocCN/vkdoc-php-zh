    \ 实现\n  *   Zephir 实现\n  *   JavaScript 实现\n\n## 引言\n\n### 为何写这本书\n\n在花费了大量时间致力于构建能够简化处理字符串、数字、数组等操作方法的库之后，我决定写这本书。它们被称为标量类型，因为\
    \ PHP 对待它们的方式与对象不同。它们没有属性，也没有方法。\n\nPHP 有着悠久的历史，并且在网络世界中占据着主导地位。尽管存在语言上的不一致性和困难（尤其是在涉及这些标量类型时），它仍然取得了巨大的成就。比雅尼·斯特劳斯特鲁普曾说过：“只有两种编程语言：人们抱怨的和没人用的。”\
    \ PHP 是一种*每个人*都在使用的语言，但这通常被视为忽略其糟粕、完成工作的好理由。\n\n我完全支持把事情做成，为此，我许多年来一直使用纯粹的 PHP。在一个面向对象库和框架的生态系统中，PHP\
    \ 的过程式风格总是困扰着我。所以我决定更深入地研究如何在 PHP 之上构建一个更强大的类型系统。\n\n这就是本书的目标。我们将研究如何使用*标准* PHP\
    \ 库，如何使用用户层面的库，以及如何使用扩展和交叉编译器。所有这些努力都是为了创建一套可复用的工具，来统一并简化 PHP 的标量类型。\n"
- fmt: '### Who This Book Is For


    This book assumes you have working knowledge of `PHP`. That means you understand
    the basics of programming, and have already employed them to write `PHP` code.


    You don’t need to know how to set up a `PHP` stack - we will cover how that can
    easily be done (using `VirtualBox`, `Vagrant` and `Phansible`).


    You also need to have an open mind. Many of the concepts covered by this book
    are experimental and hardly any of them are commonplace. That’s not to say that
    you can’t use these techniques in production applications, but it’s up to you
    to decide if your architecture will benefit from third-party extensions (in addition
    to `PHP` core).


    Finally, you should have access to a decent Internet connection. The examples
    in this book work best inside a `Vagrant` virtual machine. If you’re unfamiliar
    with the term, don’t worry. We’ll talk about it later, but it’s basically software
    that installs development environments. That installation happens often and benefits
    from a fast connection.


    ### Procedural / Object Oriented


    `Procedural` and `Object Oriented` are different programming styles which approach
    program execution in different ways. It’s good to understand how they work, and
    how they define the state of scalar types.


    #### Procedural Programming


    `Procedural Programming` describes a top-down approach to program execution. That
    is, procedural programs consist of a list of steps for the interpreter to take
    (from top to bottom).


    In pseudo-code, a Procedural image resize program may resemble:


    1.  start execution

    2.  then store a file reference returned by a `open_file` function

    3.  then store a modified image returned by a `resize_image` function

    4.  then close the open file

    5.  then store a file reference returned by a `open_file` function

    6.  then write the modified image data to the second open file

    7.  then close the open file

    8.  then empty the modified image variable

    9.  end execution


    `Procedural` programs can call on functions (as described in the example) and
    can define functions. The currently executing line position can be modified by
    things like looping constructs and `goto`-like constructs, but for the most part
    the program is framed in a set of instructions.


    #### Object Oriented Programming


    `Object Oriented Programming` describes program execution as the interaction and
    description of entities (or objects). These objects can have any combination of
    properties (another name for owned variables) and methods (another name for owned
    functions).


    The code within these owned functions are still executed from top to bottom, but
    the main idea is that the program depends on inter-object communication for its
    coherence.


    In pseudo-code, an Object-Oriented image resize program may resemble:


    1.  start execution

    2.  then create a file object

    3.  then create an image resize object

    4.  then pass the file object to the image resize object

    5.  then create another file object

    6.  then write the result of the image resize object’s `resize` method to the
    second file object

    7.  then close the second file object

    8.  then destroy the second file object

    9.  then destroy the image resize object

    10. then destroy the first file object

    11. end execution


    #### Which is the best?


    …is the wrong question to ask. Both have their strengths and weaknesses. `Object-Oriented
    Programming` mostly leads to more code than `Procedural Programming`. `Object-oriented
    Programming` lends itself to better separation between concerns. Stated another
    way - it’s easier to think of objects and their behaviours than to think of the
    whole flow of a program.


    Ultimately, `Procedural` code can be as clean as `Object-Oriented` code.


    “Sometimes, the elegant implementation is just a function. Not a method. Not a
    class. Not a framework. Just a function.” - John Carmack


    #### Which is PHP?


    `PHP` is very procedural. That’s how Rasmus built it (back in the proverbial day)
    and that’s how it has mostly stayed. This is apparent when it comes to how scalar
    variables are handled and manipulated. The `PHP` types are not objects. They don’t
    have methods or properties. If you want to do something to a `PHP` scalar variable
    (`string`, `int`, `float`, `bool`…), you pass it to a function.


    Before `PHP 5.3`, there were no namespaces. As a result - all of these type-specific
    methods were added to the global namespace. They are available everywhere, and
    (as we’ve seen) they are inconsistent.


    This makes scalar type code ugly code.'
  raw: '### Who This Book Is For


    This book assumes you have working knowledge of PHP. That means you understand
    the basics of programming, and have already employed them to write PHP code.


    You don’t need to know how to set up a PHP stack - we will cover how that can
    easily be done (using VirtualBox, Vagrant and Phansible).


    You also need to have an open mind. Many of the concepts, covered by this book,
    are experimental and hardly any of them are commonplace. That’s not to say that
    you can’t use these techniques in production applications, but it’s up to you
    to decide if your architecture will benefit from third-party extensions (in addition
    to PHP core).


    Finally, you should have access to a decent Internet connection. The examples
    in this book work best inside a Vagrant virtual machine. If you’re unfamiliar
    with the term, don’t worry. We’ll talk about it later, but it’s basically software
    that installed development environments. That installation happens often and benefits
    from a fast connection.


    ### Procedural / Object Oriented


    Procedural and Object Oriented are different programming styles which approach
    program execution in different ways. It’s good to understand how they work, and
    how they define the state of scalar types.


    #### Procedural Programming


    Procedural Programming describes a top-down approach to program execution. That
    is; Procedural programs consist of a list of steps for the interpreter to take
    (from top to bottom).


    In pseudo-code, a Procedural image resize program may resemble:


    1.  start execution

    2.  then store a file reference returned by a `open_file` function

    3.  then store a modified image returned by a `resize_image` function

    4.  then close the open file

    5.  then store a file reference returned by a `open_file` function

    6.  then write the modified image data to the second open file

    7.  then close the open file

    8.  then empty the modified image variable

    9.  end execution


    Procedural programs can call on functions (as described in the example) and can
    define functions. The currently executing line position can be modified by things
    like looping constructs and goto-like constructs, but for the most part the program
    is framed in a set of instructions.


    #### Object Oriented Programming


    Object Oriented Programming describes program execution as the interaction and
    description of entities (or objects). These objects can have any combination of
    properties (another name for owned variables) and methods (another name for owned
    functions).


    The code within these owned functions are still executed from top to bottom, but
    the main idea is that the program depends on inter-object communication for it’s
    coherence.


    In pseudo-code, an Object-Oriented image resize program may resemble:


    1.  start execution

    2.  then create a file object

    3.  then create an image resize object

    4.  then pass the file object to the image resize object

    5.  then create another file object

    6.  then write the result of the image resize object’s `resize` method to the
    second file object

    7.  then close the second file object

    8.  then destroy the second file object

    9.  then destroy the image resize object

    10.  then destroy the first file object

    11.  end execution


    #### Which is the best?


    …is the wrong question to ask. Both have their strengths and weaknesses. Object-Oriented
    Programming mostly leads to more code than Procedural Programming. Object-oriented
    Programming lends itself to better separation between concerns. Stated another
    way - it’s easier to think of objects and their behaviours than to think of the
    whole flow of a program.


    Ultimately, Procedural code can be as clean as Object-Oriented code.


    “Sometimes, the elegant implementation is just a function. Not a method. Not a
    class. Not a framework. Just a function.” - John Carmack


    #### Which is PHP?


    PHP is very procedural. That’s how Rasmus built it (back in the proverbial day)
    and that’s how it has mostly stayed. This is apparent, when it comes to how scalar
    variables are handled and manipulated. The PHP types are not objects. They don’t
    have methods or properties. If you want to do something to a PHP scalar variable
    (string, int, float, bool…), you pass it to a function.


    Before PHP 5.3, there were no namespaces. As a result - all of these type-specific
    methods were added to the global namespace. They are available everywhere, and
    (as we’ve seen) they are inconsistent.


    This makes scalar type code ugly code.'
  trans: '

    ### 目标读者


    本书假定你具备 `PHP` 的实用知识。这意味着你了解编程基础，并且已经运用这些知识编写过 `PHP` 代码。


    你不需要知道如何搭建 `PHP` 运行环境——我们会介绍如何轻松完成这项任务（使用 `VirtualBox`、`Vagrant` 和 `Phansible`）。


    你还需要保持开放的心态。本书涉及的许多概念都处于实验阶段，几乎没有哪个是普遍采用的。这并非说你不能在生产应用中使用这些技术，而是需要你自行判断你的架构是否会从第三方扩展（除了
    `PHP` 核心之外）中受益。


    最后，你需要有畅通的网络连接。本书中的示例在 `Vagrant` 虚拟机中运行效果最佳。如果你不熟悉这个术语，不必担心。我们稍后会讨论它，但它本质上是一种用于安装开发环境的软件。这种安装经常发生，因此需要高速网络连接。


    ### 过程式 / 面向对象


    **过程式**和**面向对象**是两种不同的编程风格，它们以不同的方式处理程序执行。了解它们的工作原理以及它们如何定义标量类型的状态是很有益的。


    #### 过程式编程


    **过程式编程**描述了一种自上而下的程序执行方法。也就是说，过程式程序由解释器需要执行的一系列步骤（从上到下）组成。


    用伪代码表示，一个过程式图像缩放程序可能如下所示：


    1.  开始执行

    2.  然后存储由 `open_file` 函数返回的文件引用

    3.  然后存储由 `resize_image` 函数返回的修改后的图像

    4.  然后关闭打开的文件

    5.  然后存储由 `open_file` 函数返回的文件引用

    6.  然后将修改后的图像数据写入第二个打开的文件

    7.  然后关闭打开的文件

    8.  然后清空修改后的图像变量

    9.  结束执行


    **过程式**程序可以调用函数（如示例所述）并可以定义函数。当前执行行的位置可以通过循环结构和类似 `goto` 的结构进行修改，但在大多数情况下，程序是由一组指令构成的框架。


    #### 面向对象编程


    **面向对象编程**将程序执行描述为实体（或对象）的交互和描述。这些对象可以拥有属性（即拥有的变量的另一种叫法）和方法（即拥有的函数的另一种叫法）的任意组合。


    这些拥有函数内部的代码仍然是从上到下执行的，但主要思想在于程序依赖于对象间的通信来维持其连贯性。


    用伪代码表示，一个面向对象的图像缩放程序可能如下所示：


    1.  开始执行

    2.  然后创建一个文件对象

    3.  然后创建一个图像缩放对象

    4.  然后将文件对象传递给图像缩放对象

    5.  然后创建另一个文件对象

    6.  然后将图像缩放对象的 `resize` 方法的结果写入第二个文件对象

    7.  然后关闭第二个文件对象

    8.  然后销毁第二个文件对象

    9.  然后销毁图像缩放对象

    10. 然后销毁第一个文件对象

    11. 结束执行


    #### 哪种最好？


    ……问这个问题本身就不对。两者各有优缺点。**面向对象编程**通常比**过程式编程**产生更多的代码。**面向对象编程**有助于更好地实现关注点分离。换句话说——思考对象及其行为比思考整个程序的流程更容易。


    最终，**过程式**代码可以和**面向对象**代码一样整洁。


    “有时，优雅的实现就是一个函数。不是一个方法。不是一个类。不是一个框架。仅仅是一个函数。”——约翰·卡马克


    #### PHP 是哪种？


    `PHP` 非常过程式。这是拉斯马斯当初构建它的方式（在那个众所周知的年代），并且这种方式在很大程度上延续至今。这一点在标量变量如何处理和操作时表现得尤为明显。`PHP`
    类型不是对象。它们没有方法或属性。如果你想对 `PHP` 标量变量（`string`、`int`、`float`、`bool`……）进行操作，你需要将其传递给一个函数。


    在 `PHP 5.3` 之前，没有命名空间。因此——所有这些类型特定的方法都被添加到了全局命名空间中。它们随处可用，并且（正如我们所看到的）它们是不一致的。


    这使得标量类型的代码变得丑陋。

    '
- fmt: "### Native Function Inconsistencies\n\nPHP is often decried because of the\
    \ inconsistencies in the native functions. PHP is often praised because of the\
    \ quality of the documentation. These are related! The documentation has evolved\
    \ so well because native PHP functions are inconsistent.\n\nThis section is going\
    \ to make me sound like a PHP-hater. That couldn’t be further from the truth!\
    \ I love PHP and I’m committed to using it and helping others use it. To know\
    \ what we’re building, we have to know what we’re trying to avoid building. That’s\
    \ the point of what’s to follow.\n\n#### Sporadic Underscores\n\n- `parse_str`\n\
    - `printf`\n- `str_pad`\n- `strcmp`\n- `strip_tags`\n- `stripslashes`\n\nThese\
    \ functions are described at [http://php.net/manual/en/ref.strings.php](http://php.net/manual/en/ref.strings.php)\n\
    \nThe full list contains 98 functions, 30 of which use one or more underscores.\
    \ Sometimes functions clearly composed of multiple full words (like `setlocale`)\
    \ don’t have underscores. Sometimes functions which do almost exactly the same\
    \ things (`strlen` vs. `str_word_count`) are handled differently.\n\n#### Sporadic\
    \ Abbreviation\n\n- `addslashes`\n- `chr`\n- `htmlentities`\n- `lcfirst`\n- `number_format`\n\
    - `stroll`\n\nMost of the string functions use abbreviations of some kind. Applied\
    \ consistently, this wouldn’t be a problem. However, the inclusion of a few non-abbreviated\
    \ functions makes the string API difficult to memorise, which often means a round-trip\
    \ to the documentation.\n\n#### Inconsistent Argument Order\n\n- `array_key_exists($needle,\
    \ $haystack)`\n- `stripos($haystack , $needle)`\n\nThe natural order of arguments\
    \ differs depending on whether you are working with array functions or string\
    \ functions. Rasmus explains this as a result of keeping as close to the underlying\
    \ C libraries as possible. The problem with this explanation is that it means\
    \ nothing to developers who have never worked with C, and just want to work with\
    \ PHP.\n\nIt’s helpful to remember that the array methods are needle/haystack\
    \ and the string methods are haystack/needle.\n\n#### Regular Expression / Strings\n\
    \n- `preg_filter`\n- `str_replace`\n- `preg_match`\n- `strstr`\n- `preg_split`\n\
    - `explode`\n\nIn PHP, Regular Expressions are represented as strings but handled\
    \ with a completely different set of functions. That’s just strange. While I can\
    \ accept that Regular Expressions have a similar representation to strings, and\
    \ that the functions they are given to (in the C libraries) expect to work with\
    \ strings, developers shouldn’t need to account for this.\n\nPHP assumes a string\
    \ is a Regular Expression, if it starts and ends with recognisable delimiters.\
    \ You can learn more about that at [http://www.php.net/manual/en/regexp.reference.delimiters.php](http://www.php.net/manual/en/regexp.reference.delimiters.php).\n\
    \nAlternatively, Regular Expressions should have their own representation which\
    \ clearly separates them from strings. An example of a language which already\
    \ has this, is JavaScript:\n\n```\n1 \"abc\".replace(\"b\", \"123\"); // \"abc\"\
    \ becomes \"a123c\"\n2 \"def\".replace(/[e]/, \"456\"); // \"def\" becomes \"\
    d456f\"\n```\n\nThese languages make clear the distinction between strings and\
    \ Regular Expressions.\n\n#### Nouns / Verbs\n\n- `echo`\n- `htmlentities`\n-\
    \ `lcfirst`\n- `md5`\n- `parse_str`\n- `soundedex`\n\nSome of the native functions\
    \ are verbs (like `echo` and `parse_str`) while others are nouns (like `htmlentities`\
    \ and `soundex`). This makes it tricky to reason about what the method is doing.\n\
    \n#### Strange Return Values\n\nMany of the native functions return multiple types.\
    \ In the case of `strstr` a string is returned if it is matched, else the function\
    \ returns false.\n\nIn contrast to this, the `preg_match` function returns 1 if\
    \ the pattern is found, 0 if it is not and false if an error occurred. This makes\
    \ for a slew of type checking before any of the return values can be used for\
    \ their intended purpose.\n\n### Conclusion\n\nPHP is a great language.\n\nBut\
    \ if you’ve worked much with PHP, you will either have grown to ignore the sad\
    \ state of PHP’s scalar type handling, or been frustrated at the lack of good\
    \ alternatives.\n\nAnd for most small-to-medium sized projects, adding a revised\
    \ type-system is unnecessary. Yet if you learned how to make (or even just use)\
    \ a well-built type system, wouldn’t it make sense to use it in large projects?\
    \ Or in any projects you cared enough about?\n\nThis area of PHP often chases\
    \ developers into prettier languages. Don’t be one of those developers! Learn\
    \ how to write cleaner code, by using a clean abstraction.\n\n## Structure\n\n\
    ### Boxing\n\nBoxing is a term given to the practice of wrapping (enclosing) data\
    \ within a class, so that behaviour can be added to the wrapped data. Let’s look\
    \ at an example:\n\n```\n 1 <?php\n\n 3 class StringBox\n 4 {\n 5   /**\n 6  \
    \  * @var string\n 7    */\n 8   protected $data;\n\n10   /**\n11    * @param\
    \ string $data\n12    */\n13   public function __construct($data)\n14   {\n15\
    \     $this->data = $data;\n16   }\n\n18   /**\n19    * @return string\n20   \
    \ */\n21   public function toString()\n22   {\n23     return (string) $this->data;\n\
    24   }\n\n26   /**\n27    * @return string\n28    */\n29   public function toUpperCase()\n\
    30   {\n31     return strtoupper($this->data);\n32   }\n\n34   /**\n35    * @return\
    \ string\n36    */\n37   public function toLowerCase()\n38   {\n39     return\
    \ strtolower($this->data);\n40   }\n\n42   /**\n43    * @param string $needle\n\
    44    * @param mixed  $offset\n45    *\n46    * @return int\n47    */\n48   public\
    \ function getIndexOf($needle, $offset = null)\n49   {\n50     $index = strpos($this->data,\
    \ $needle, $offset);\n\n52     if ($index === false) {\n53       return -1;\n\
    54     }\n\n56     return $index;\n57   }\n58 }\n\n60 $box = new StringBox(\"\
    Hello World\");\n\n62 print $box->toString();          // \"hello world\"\n63\
    \ print $box->toUpperCase();       // \"HELLO WORLD\"\n64 print $box->toLowerCase();\
    \       // \"hello world\"\n65 print $box->getIndexOf(\"foo\");   // -1\n66 print\
    \ $box->getIndexOf(\"World\"); // 6\n```\n\nThis approach is fully supported by\
    \ PHP, without any additional extensions or dependencies. It’s a simple concept,\
    \ if you think about it. You’re using protected properties and exposing a public\
    \ API for setting them, getting them and manipulating them.\n\nThe difficulty\
    \ with it is that it leads to a lot more code than just using the native functions.\
    \ You need to define wrappers. You need to define setters and getters. You have\
    \ to use them every time you want to put *native* types in and get *native* types\
    \ out. What do I mean by that last statement?\n\n```\n1 $helloBox = new StringBox(\"\
    Hello\");\n2 $worldBox = new StringBox(\"World\");\n\n4 $helloWorldBox = new StringBox(\n\
    5   $helloBox->toString() . \" \" . $worldBox->toString()\n6 );\n```\n\nThis quickly\
    \ becomes unwieldy. It’s also more memory intensive, and slower than just using\
    \ the native functions and types.\n\nPHP allows the use of a method called `__toString`.\
    \ When a class defines this method (to return a string), and an instance of the\
    \ class is used in an operation that expects a string; the `__toString` method\
    \ is automatically called.\n\nThis isn’t enough for us to simulate an extensible\
    \ type system, or this would be a short book.\n\n### Resolving Types\n\nPHP is\
    \ a weakly typed language. That is, variables can be declared without specifying\
    \ a type. Their type can be changed at any point. They can be coerced into different\
    \ types on demand.\n\nIf we want to implement stronger type-handling, we need\
    \ to be able to identify the type of a variable. PHP provides a number of functions\
    \ which help with this, but they have a few issues to overcome…"
