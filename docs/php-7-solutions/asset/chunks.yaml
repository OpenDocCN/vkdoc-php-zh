    \nPHP Solution 13-9: Debugging a PDO Prepared\nStatement\n\nOccasionally, a database\
    \ query doesn’t produce the result you expect.\nWhen that happens, it’s useful\
    \ to see exactly what your script sent to\nthe database server. With MySQLi, there\
    \ isn’t a simple way to examine\nthe values inserted into an SQL query by a prepared\
    \ statement. But with\nPDO, it couldn’t be easier—provided your server is running\
    \ PHP 7.2 or\nlater.\n\n1.  Continue using `pdo_prepared.php` from\n    the previous\
    \ PHP solution. Alternatively, copy `pdo_prepared_02.php`\n    from the `ch13`\n\
    \    folder to the `pdo` folder, and\n    rename it `pdo_prepared.php`.\n\n2.\
    \  Amend the code after the closing `</table>` tag\n    like this:\n\n```\n  \
    \  ';\n    $stmt->debugDumpParams();\n    echo '';\n    }\n    ?>\n    ```\n\n\
    This inserts a pair of `<pre>` tags to\n    make the output of the call to the\
    \ `debugDumpParams()`\n    method of the `PDOStatement` object\n    more readable.\n\
    \n3.  Save the file, load it into a browser, and conduct a search. In\n    addition\
    \ to the results of the search, you should see output similar to\n    the following\
