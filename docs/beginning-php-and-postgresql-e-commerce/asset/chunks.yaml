  raw: 'Another issue related to security concerns storing user passwords. It isn’t
    a good idea to store user passwords in your database in plain text because this
    information is a potential target for attack. Instead, you should store what is
    known as the **hash** of the password. A hash is a unique string that represents
    the password but cannot be converted back into the password itself. To validate
    the password entered by the user, then, you simply need to generate a hash for
    the password entered and compare it with the hash stored in your database. If
    the hashes match, then the passwords entered match as well, so you can be sure
    that the customer is gen-uine.


    This leads to another important task—you need to supply a way for new users to
    register.


    The result of registration is to add a new customer to your database, including
    username and password hash information.


    To implement this scheme in your application, you’ll complete the following tasks:


    • Create two new database tables, the first called customer to hold customer details,
    and the second called shipping_region, which stores possible shipping regions
    that a customer can reside in.


    • Implement the associated methods in data and business tiers that add, modify,
    and retrieve information from customer and shipping_region.


