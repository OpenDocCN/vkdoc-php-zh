    document.api.submit()\">提交</button>\n\n<pre id=\"response\">\n$response_text\n\
    </pre>\n\n</body>\n</html>\nHEREDOC;\n\n# 第 15 章 ■ 使用 JSON 进行数据交换\n\n请注意 JavaScript\
    \ 部分中的美元符号已被转义。美元符号用作 `jQuery()` 函数的简写 `$()`，也出现在某些变量名中，但由于 PHP 会在 `HEREDOC` 块中进行变量替换，这些未在\
    \ PHP 作用域中定义的变量将被替换为空字符串。\n\n表单包含了用于输入 URL、方法、响应显示方式以及单个参数的键/值的字段。如果需要更多参数，用户可以点击\
    \ `添加参数` 按钮，表单将会扩展。\n\n当表单提交后，PHP 端会根据提交的数据创建一个 HTTP 请求，并在 HTML 文档的预格式化区域显示来自\
    \ API 调用的响应。\n\n## 配方 15-6. API 身份验证\n\n### 问题\n\n对 API 的用户进行身份验证的最佳方式是什么？\n\n\
    ### 解决方案\n\n首先，在调用 API 时你绝不应该以明文形式发送用户名和密码，并且也绝不应该将任何身份验证参数包含在 URI 中，因为这些参数会被服务器记录。这些信息应始终作为请求头或请求体的一部分发送。\n\
    \nAPI 提供者通常会为每个用户发放一个应用密钥或其他唯一标识。这通常是某种哈希值，无法关联到特定的用户账户。有些网站还会提供一个密钥代码，用于生成请求的哈希值，但该密钥代码不应随请求一起发送。服务器知道这个密钥，可以在服务器端生成哈希值，并与请求中包含的哈希值进行比较。如果两者匹配，服务器就可以假定请求者就是其所声称的身份。\n\
    \n哈希运算可以使用部分请求参数进行，但也可以包含诸如请求者的公网 IP 或用户代理字符串等信息，只要客户端和服务器使用相同的数据集来创建哈希值即可。\n\
    ```"
- fmt: '某些 API 要求客户端在每个请求上都进行身份验证，但服务器也可以在响应中包含一个会话令牌，来自同一客户端且包含该会话令牌的任何后续请求都将被视为有效。服务器可能会使用请求中的额外参数（如用户代理字符串和
    IP 地址）来验证会话令牌。如果这些参数在请求之间发生变化，服务器将使会话失效。


    ### 工作原理


    有多种生成应用密钥和机密（App Keys and Secrets）的方法。应用密钥可以通过对与账户相关的某些数据进行 SHA256 哈希运算来生成。


    ```php

    <?php


    $appkey = hash(''sha256'', $email . $first_name, $date);

    ```


    在这个例子中，拼接电子邮件地址、名字和某个日期表示形式会创建一个字符串，然后用该字符串生成一个哈希值。这个哈希值随后会与账户一起存储。


    对账户中用户唯一的不同值进行哈希运算可以生成一个机密，该机密仅由服务器和客户端知晓，并且永远不会作为请求的一部分被包含。


    ```php

    <?php


    $secret = hash(''sha1'', $account_id . $email);

    ```


    在服务器端，应用密钥和机密将作为附加的账户信息保存。一个好的做法是，在生成机密时，只在网页上显示一次，以防止多次显示。如果用户忘记了机密，则应生成一个新的。


    客户端和服务器之间必须就如何生成哈希值达成一致。这可以通过将所有参数作为字符串，加上机密，然后对该字符串生成哈希值来实现。该哈希值随后作为附加参数添加到请求中。在服务器端，除了哈希值之外的所有参数将被组合成类似的字符串，并使用应用密钥在数据库中查找机密，从而生成哈希值以验证提供的哈希值。


    下一个示例展示了客户端如何使用包含 `$appkey` 和 `$secret` 变量的包含文件。


    确保包含文件存储在 Web 根目录之外，以防止从浏览器访问它。


    ```php

    <?php


    // 15_7.php


    require "api_credentials.inc";


    $params = [


    "appkey=$appkey",


    "article=1"


    ];


    $hash = hash(''sha256'', implode("", $params) . $secret);


    $params[''hash''] = $hash;


    $options = array(''http'' =>


    array(


    ''method'' => "POST",


    ''content'' => implode("&", $params)


    )


    );


    $context = stream_context_create($options);


    $response = file_get_contents("http://example.com/articels", false, $context);

    ```


    如果 API 调用的服务器端由 PHP 脚本处理，其处理请求的方式如下：


    ```php

    <?php


    // 16_8.php


    $params = [


    "appkey={$_POST[''appkey'']}",


    "article={$_POST[''article'']}"


    ];


    $secret = GetSecret($_POST[''appkey'']);


    $hash = hash(''sha256'', implode("", $params) . $secret);


    if ($hash == $_POST[''hash'']) {


    // Request is allowed


    }


    else {


    // Error – the hash did not match


    }

    ```


    `GetSecret()` 函数调用应执行数据库查找，以根据提供的应用密钥获取机密的数值。


    ## 第 16 章 使用 MySQL 数据库


    数据库在 Web 应用程序中扮演着重要角色，这些应用程序的内容不断变化，并根据用户的偏好、位置或其他参数进行提供。数据库也用于以博客评论、创建账户时的个人信息等形式从用户那里收集信息。


    PHP 以一组函数的形式支持多种不同类型的数据库，用于连接、执行查询以及获取数据库中表和列的信息。其中一些数据库扩展是过程式的，而另一些则提供了面向对象的接口。名为
    MySQL 的开源数据库是与 PHP 一起使用最广泛的数据库，Facebook、Twitter 和 Wikipedia 等大小公司都在使用它。该扩展在大多数发行版中默认提供。


    `mysql` 扩展已被弃用，并由 `mysqli` 扩展取代。其中的 `I` 代表 Improved（改进版）。


    从 PHP 7 开始，不再提供 `mysql` 扩展。'
  raw: 'Some API’s require the client to authenticate on every request, but the server
    can also include a session token with the response and any subsequent requests
    from the same client that include the session token will be considered valid.
    The server might use additional parameters from the request like the user agent
    string and IP address to validate the session token. If any of these are changed
    from one request to another the server will invalidate the session.


    How it Works


    There are many ways to generate app keys and secrets. The app key could be generated
    as a sha256 hash of some of the data associated with the account.


    <?php


    $appkey = hash(''sha256'', $email . $first_name, $date);


    In this example concatenating the e-mail address, first name, and some representation
    of a data creates a string that is then used to create a hash value from. The
    hash value is then stored with the account.


    Hashing different account values that are unique to the user can generate a secret
    that will only be known by the server and the client and never included as part
    of the request.


    <?php


    $secret = hash(''sha1'', $account_id . $email);


    CHAPTER 15 ■ DATA EXCHANGE WITH JSON


    On the server side the app key and secret will be saved as additional account
    information. It is a god practice if the secret is generated on a web page to
    prevent showing of this element more than once, when it is generated. If the user
    forgets the secret a new one should be generated.


    Between the client and the server there must be an agreement on how to generate
    the hash. This can be by taking all the parameters as a string, adding the secret
    and then create a hash of the string. The hash value is then added as an additional
    parameter to the request. On the server side all parameters except the hash will
    be combined to similar string and the app key is used to do a database lookup
    for the secret so a hash can be created to validate again the provided hash.


    The next example shows who a client can use an include file with the $appkey and
    $secret variables.


    Make sure the include file is stored outside of the web root to prevent accessing
    it from a browser.


    <?php


    // 15_7.php


    require "api_credentials.inc";


    $params = [


    "appkey=$appkey",


    "article=1"


    ];


    $hash = hash(''sha256'', implode("", $params) . $secret);


    $params[''hash''] = $hash;


    $options = array(''http'' =>


    array(


    ''method'' => "POST",


    ''content'' => implode("&", $params)


    )


    );


    $context = stream_context_create($options);


    $response = file_get_contents("http://example.com/articels", false, $context);
    If the server side of the API call is process by a PHP script it would process
    the request like this:


    <?php


    // 16_8.php


    $params = [


    "appkey={$_POST[''appkey'']}",


    "article={$_POST[''article'']}"


    ];


    $secret = GetSecret($_POST[''appkey'']);


    $hash = hash(''sha256'', implode("", $params) . $secret);


    if ($hash == $_POST[''hash'']) {


    // Request is allowed


    }


    else {


    // Error – the hash did not match


    }


    The GetSecret() function call should perform a database lookup to get the secret
    value based on the provided appkey.


    **CHAPTER 16**


    **Using MySQL Databases**


    Databases play an important role in web applications where content is constantly
    changing and being served according to users’ preferences, location, or other
    parameters. Databases are also used to collect information from the users in the
    form of comments to a blog, personal information when accounts are created, etc.


    PHP provides support for many different types of databases in the form of a set
    of functions to connect, perform queries, and get information about tables and
    columns in the database. Some of the database extensions are procedural and some
    offer an object-oriented interface. The open source database called MySQL is the
    most used database with PHP and both small and large companies like Facebook,
    Twitter, and Wikipedia use it. The extension is provided by default with most
    distributions.


    The mysql extension is deprecated and replaced by the mysqli extension. The I
    stands for Improved.


    From PHP 7 the mysql extension is no longer provided.'
