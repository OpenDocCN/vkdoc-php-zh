    1\. Both the files() and thumbnails() actions rely on file I/O. How can we make
    these methods more efficient?


    2\. We did not actually change the structure of the Imagine classes. Wouldn’t
    it be better (for our application) if we were to rewrite the Imagine classes so
    that they comply with our organizational system?


    3\. Should we be creating our thumbnails() action (and similar) to accept different
    $width/$height parameters?


    4\. PHP might not be built to be nonblocking, but is it possible to write all
    of our classes/


    functions as nonblocking to avoid the problem of synchronous execution?


    5\. We built a class that handles callbacks, but do any common PHP functions support
    callbacks as a means of delayed execution of code?


    6\. Given that the Events class looks quite similar to the Registry class, is
    there any reason why we didn’t simply use the Registry class to store the callbacks?


    Answers


    1\. The obvious answer is to use caching wherever possible. This could mean caching
    the response to font requests that have a consistent font face/user agent combination.
    It could mean caching the contents of an existing thumbnail after the first time
    it is read.


    2\. Given unlimited time and energy, it would often be preferable to rewrite libraries
    to match a consistent theme or structure. In this case, we simply had to make
    do with the existing structure. It came with some odd trade-offs (like the position
    of the autoloader function) but we were able to use Imagine without very much
    fuss.


    3\. Yes, we should. It was not important to this lesson, though.


    4\. While it might be possible to build all the classes/functions with callbacks,
    it does not avoid synchronous execution of code. There will still be aspects of
    PHP that are block (e.g., file I/O, databases, loops, etc.). This is not because
    we are unable to use callbacks, but rather that each request is handled on a single
    thread. We can allow more threads to be used, or even run multiple PHP servers
    on a load balancer, but none of these really solve the problem.


    5\. PHP has had the concept of callbacks for a while now. They weren’t always
    as elegant (often times strings referring to function names), but the idea of
    passing a reference to another body of executable code is not uncommon in PHP.


    6\. We did not use the Registry class, purely to keep the events isolated from
    everything else. The moment we start sharing the same storage space, we need to
    start worrying about naming schemes, which would complicate our events system
    needlessly.'
