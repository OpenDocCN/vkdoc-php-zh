    Setting the Global Styles


    In addition to setting styles for specific containers or areas on a page, we must
    also define a set of global styles. They are called *global* styles because each
    selector applies to every occurrence in a page of its respective element(s).


    The following code sets the heading style, the text font and size, and the style
    for links.


    Take the img style as an example. Every time an image is used in the page, it
    will have no border—even if it is hyperlinked. Each global style can be overridden
    on a case-by-case basis.


    body {


    color : #333;


    background : #fafafa;


    font-family : Verdana, Arial, Helvetica, sans-serif;


    font-size : 0.75em;


    }


    h1 { font-size : 1.7em; margin-top : 0; }


    h2 { font-size : 1.5em; }


    h3 { font-size : 1.3em; }


    h4 { font-size : 1.1em; }


    h5 { font-size : 1.0em; }


    h1, h2, h3, h4, h5 { font-family : Georgia, serif; color : #f22; }


    img { border : 0; }


    form { margin : 0; }


    a { color : #f22; background : none; text-decoration : underline; }


    a:hover { color : #fff; background : #f22; text-decoration : none; }


    In this code, we set the base font size to 0.75em. While the specific value used
    here isn’t important, the fact that we use ems is. A single unit of em (1 em)
    is the width of the “m”


    character in the current font family and size. In other words, you could interpret
    a font-size directive inside the body as saying “set the font size to 75 percent
    of the browser’s default size.”


    Using ems allows the browser to scale fonts as required (most noticeably when
    a user selects


    “increase font size” or “decrease font size” in their browser).


    ■**Note** We could also use ems instead of pixels for other measurements in the
    style sheet, such as for the column widths or border sizes. However, I have chosen
    not to in order to have more precise control over the on-screen layout.


