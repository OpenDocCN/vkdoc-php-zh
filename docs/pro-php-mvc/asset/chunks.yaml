    \n## Chapter 8\n\n## Templates\n\nAt the heart of MVC is separation of concerns,\
    \ and nowhere in our framework is that more important than between the view and\
    \ the controller. Typically, when one thinks about the front end (or client side)\
    \ of an application, they think of HTML, CSS, and JavaScript. Throw in server-side\
    \ interaction, and an unavoidable portion of PHP enters the picture.\n\nWhat’s\
    \ worse is we will often need to work with data, supplied to us by the controller,\
    \ using PHP directly in our views. Many people have tried solving this problem\
    \ with template languages (and parsers). It might not make a whole lot of sense—substituting\
    \ PHP for yet another intermediary dialect—but there are advantages. Whether or\
    \ not you choose to use template parsing in your framework, it remains a good\
    \ exercise in the kind of analytical thinking required to build your own framework.\n\
    \n### Goals\n\n- We need to define a dialect on which to base our template parser.\
    \ A dialect is simply another word for the grammar or commands by which a template\
