    1. 创建一个包含 `Student` 类的 PHP 程序，该类具有以下属性：`student_id`、`student_name`、`student_address`、`student_state`、`student_zip`
    和 `student_age`。该程序为每个属性包含 `get` 和 `set` 方法。验证传递给每个属性的数据的正确类型和大小。该程序还允许每个属性通过构造函数来设置值。创建一个该类的实例，并通过构造函数传递属性。使用
    `set` 方法更改其中两个属性。使用 `get` 方法显示这些属性。


    2. 创建一个用于跟踪杂货店库存的 PHP 程序。每个 `item`（`class`）包括一个商品编号、描述、尺寸、售价、过道、数量和价格。在条目被接受之前，必须验证每个字段的正确信息。商品编号范围从
    00000 到 99999。商店有 16 个过道（00–15）。商店中没有商品价格超过 1000 美元。所有条目通过构造函数或 `set` 方法进行编码。在所有条目被正确接受后，程序将生成一个条目报告（使用
    `get` 方法）。


    **学期项目**


    1. 使用第 2 章期末项目的设计，创建一个 PHP 程序，该程序将为输入 ABC 计算机零件公司的仓库库存项目提供界面。PHP 类必须验证从每个字段传递的信息内容（通过
    `set` 方法），以确保没有发生损坏。每个属性必须在类中存在 `Set` 和 `Get` 方法。构造函数应使用 `set` 方法来填充属性。同时创建一个界面程序，该程序将创建一个类的实例并测试填充属性的能力。测试程序应生成一个已入库项目的报告（类似于本章中所示的输出）。创建的文件应使用与本章示例中所示的逻辑相似的逻辑。


    5. 安全用户界面


    *所有伟大的想法对于那些失败者来说都像坏主意。用一个已知的失败者来测试一个新想法总是好的，以确保他们不喜欢它。 — 迪尔伯特，1997 年 11 月 18
    日 (http://dilbert.com/strips/comic/1997-11-18/)*


    **章节目标/学生学习成果**


    完成本章后，学生将能够：


    *   解释为什么必须在界面和业务规则层验证用户输入

    *   解释为什么必须在业务规则层过滤用户输入

    *   使用 HTML5 代码验证用户输入

    *   使用 PHP `if` 语句（条件语句）验证和过滤输入

    *   使用 `foreach` 循环从 XML 文件动态创建 HTML 选择框

    *   使用简单数组进行过滤和验证

    *   将简单数组传递给方法（函数）


    **安全的用户交互**


    在第 2 章中，`Hello World` 示例包含了用户交互（点击提交按钮）来调用 PHP 程序。本章将使用 HTML web 表单来接受用户的信息，然后将这些信息传递给
    PHP 程序。


    *不要信任你的用户！* 你必须为你的用户在 web 表单中输入的任何类型的信息做好准备。你还必须确保在每次接受信息进入你的程序之前对其进行验证和保护。你必须记住，用户可能会选择不允许
    JavaScript 在其浏览器中运行。因此，你的程序不能依赖 JavaScript 代码来进行输入验证。你必须能够处理以下场景：


    1.  如果用户使用的是支持 HTML5 的浏览器，你可以在将输入发送到 web 服务器上的 PHP 程序之前，使用 HTML5 和/或 JavaScript
    验证所有输入。这将减少客户端机器和服务器之间的信息传递。信息在验证通过之前不会被传递。

    2.  如果用户使用的浏览器不具备 HTML5 能力，用户输入仍然可以由 web 服务器上的 PHP 程序进行验证。


    最好使用第一种方法进行初始验证。这将在信息发送到服务器之前，大部分时间验证正确信息。第二种方法会导致更多的服务器调用，因为信息必须发送到服务器进行验证，然后任何错误消息必须发送回浏览器供用户更正。


    即使你使用方法#1 验证了信息，当 PHP 程序在 web 服务器上接收到信息时，数据也必须再次进行评估。即使用户可能发送了有效信息，数据包嗅探程序也可以将有效信息更改为有害信息。


    **HTML5 表单验证**


    当构建 HTML5 表单时，你可以验证用户输入的信息。如前所述，这将减少客户端机器和服务器之间的流量。安全的程序会限制接受用户文本输入的对象数量（如文本框）。在可能的情况下，向用户提供一个有效选项列表以供选择要安全得多。请记住，尚未实现
    HTML5 技术（或全部 HTML5）的浏览器会将这些对象（如文本框）视为普通的非验证对象。框中的信息将被接受而不进行任何验证。然而，服务器上的 PHP 程序也会验证数据。


    *   *安全性和性能——安全编程只是保护你信息完整过程的一部分。文件、目录、服务器、网络和数据库也必须得到适当的保护。此外，任何高度重要的信息（如信用卡号）必须通过安全通道（HTTPS）发送以进一步保护信息。用户
    ID 和密码应进行哈希处理（加密），以使数据包嗅探软件难以获取。*


    我们将继续第 4 章的示例，通过更新 `Dog` 类来接受用户为我们属性输入的信息。`Dog` 类已经具备了安全性；我们不需要对其进行额外的安全更新。


    ```

    Dog 对象


    Dog 对象创建器


    请填写所有字段。请注意信息的所需格式。

    您的狗的名字（最多 20 个字符，仅限字母）


    您的狗的品种（最多 35 个字符，仅限字母）


    您的狗的颜色（最多 15 个字符，仅限字母）


    您的狗的体重（仅限数字）


    示例 5-1

    带有一些验证的 lab.html 文件

    ```


    ![../images/394210_2_En_5_Chapter/394210_2_En_5_Fig1_HTML.jpg](img/394210_2_En_5_Fig1_HTML.jpg)


    **图 5-1**

    lab.html 文件


    在示例 5-1 中，`dog_name`、`dog_breed` 和 `dog_color` 文本框将字段长度设置为与第 4 章中 `Dog` 类验证的相同最大值。它们还使用
    HTML5 `pattern` 属性（[a-zA-Z]）来只允许字母字符。`title` 属性用于在输入错误信息时向用户显示错误。`dog_weight`
    文本框使用 `number` 输入类型，这自动限制了输入。`min` 和 `max` 参数也被设置，以将狗的体重限制在 1 到 120 磅之间。如前所述，如果浏览器没有完全实现
