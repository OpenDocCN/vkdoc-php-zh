    使用 `date()` 函数及所示的格式获取当前时间和日期。然后将此信息追加到一个包含消息的字符串中。接着使用 `error_log()` 函数将该字符串放入错误日志文件中。你可以通过在
    `completeadmin.php` 中引发一个 `exception` 来测试此功能，然后在文本编辑器中打开 `error-log.log` 文件，会发现消息已被保存。


    **注意：** 有关 PHP 错误日志的更多信息，请访问 [`www.php.net/manual/en/function.error-log.php`](http://www.php.net/manual/en/function.error-log.php)。


    使用 try/catch 块以及错误日志记录，能够确保系统为实际应用做好充分准备。此时是邀请用户进行 Beta 测试以全面检查系统漏洞和可用性的好时机。以下文件已修改为可访问新版本：`completeeditor.php`、`completeimages.php`、`completeentries.php`、`complete-editor-html.php`、`complete-entries-html.php`、`complete-images-html.php`。现在，我们可以通过将
    `completeadmin.php` 放入浏览器中来测试系统的身份验证和所有其他功能，从而完成最终测试。


    ## 练习


    1.  除非你已经这样做，否则在程序发布前，菜单仍需要完善。CSS 文件 `newblog.css` 包含一些可供使用的代码，或者你也可以创建自己的代码。为菜单添加使用新
    CSS 的能力。

    2.  尝试在不登录的情况下访问系统中的其他文件。某些文件只会显示空白页面；另一些则会显示因文件缺失而引发的异常。虽然程序更安全了，但更好的做法是，每当用户试图访问需要管理员权限的页面时，都会重定向到登录页面。使用
    `completeadmin.php` 中的部分代码在每个页面上检查登录状态，如果用户未登录，则将其重定向到登录页面。


    ## 总结


    这一章很长。我们涵盖了很多内容，多到无法在此一一列举。但我们学到的一些最重要的新技能包括：用于隐私保护的单向加密、用于有状态记忆的会话（session），以及有效限制对博客管理模块的访问。我希望你会认同实现一个登录系统是非常有收获的。如前所述，这个博客已准备好进行
    Beta 测试。让你的伴侣或朋友来测试一下这个系统。它并不完美，但已接近完善。无论测试者发现什么潜在问题，都要花时间修复它们。请记住，PHP 程序不仅能管理网站。在最后一章中，我们将偏离创建网站的主题，转而探讨如何创建数据仪表盘以及跳棋游戏的逻辑。


    ## 项目


    1.  运用本章及前几章的设计实践，更新第 7 章中的学生注册系统。增加一个要求：用户必须先登录系统才能访问学生记录。

    2.  更新博客应用程序，使其具备密码找回功能。程序应要求用户验证其用户 ID 或密码。验证通过后，用户将可以访问修改密码的表单。如果想要更大的挑战，学习
    PHP 如何发送电子邮件。让系统向用户发送一封包含临时密码的邮件。然后要求用户在更改密码前输入该临时密码。

    3.  更新博客应用程序，使其能够删除系统中未使用的管理员用户 ID。

    4.  更新博客应用程序的管理员用户验证系统，将登录尝试次数限制为四次。四次之后，系统应在十分钟内拒绝来自同一用户 ID 的所有尝试。这可以通过创建另一个会话变量来实现，该变量在四次尝试失败后记录上次尝试时间。十分钟后清除该变量。这是
    IT 行业中常见的授权要求。


    # 10. 数据仪表盘与游戏


    ## 目标


    完成本章后，你将能够：


    *   将数据从一种数据类型转换为另一种数据类型

    *   使用 PHP 函数 `json_encode()` 创建 JSON 数据

    *   使用 PHP 函数 `fputcsv()` 创建 CSV 数据

    *   使用 SQL 语句确定数据库名称、表名和列名

    *   使用 SQL 语句判断某列的值是否为数字

    *   将数据库表转换为 PHP 数组

    *   使用 PHP 函数 `fopen()` 读写文件

    *   使用 PHP 函数 `fgetcsv()` 将 CSV 文件转换为数组

    *   使用 PHP 函数 `file_get_contents()` 一次性检索文件的所有内容

    *   使用 PHP 函数 `json_decode()` 将 JSON 文件转换为数组

    *   使用开源类 `SIMPLEXLSX` 从 Microsoft Excel 电子表格中读取数据到数组

    *   使用 PHP 函数 `explode()` 根据分隔符将字符串拆分为数组

    *   使用 PHP 函数 `is_numeric()` 判断一个值是否包含数字

    *   使用 PHP 函数 `is_string()` 判断一个值是否为字符串

    *   使用 PHP `continue` 语句跳过循环的一次迭代

    *   根据 PHP 数组创建 *Google 数据表*（Google Data Table）

    *   使用 JavaScript 和 *Google 图表库*（Google Charts Library）创建数据仪表盘

    *   使用二维数组创建跳棋游戏的逻辑

    *   使用 `switch` 控制结构根据单个变量确定多种结果


    在这最后一章中，我们将探讨 PHP 除控制标准网站交互性之外还能完成的其他任务。尽管 PHP 并非以*数据分析*和游戏开发工具而闻名，但我们将证明它完全可以用于此目的。让我们先简要了解一下数据分析，并探索如何显示仪表盘及相关图表。

