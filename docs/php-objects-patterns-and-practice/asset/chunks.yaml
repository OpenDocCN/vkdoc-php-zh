    ### PHP 7 : Closing the Gap


    Programmers are a demanding lot. For many lovers of design patterns, there were
    two key features that PHP still lacked. These were scalar type declarations and
    enforced return types. With PHP 5 it was possible to enforce the type of an argument
    passed to a function or method, so long as you only needed to require an object,
    an array, or later, callable code. Scalar values (like integers, strings, and
    floats) could not be enforced at all. Furthermore, if you wanted to declare a
    method or a function’s return type, you were altogether out of luck.


    As you will see, object-oriented design often uses a method declaration as a kind
    of contract. The method demands certain inputs and, reciprocally, it promises
    to give you a particular type of data back. PHP 5 programmers were forced to rely
    on comments, convention, and manual type checking to maintain contracts of this
    kind in many cases. Developers and commentators often complained about this. Here
    is a quote from the previous edition of this book:


    > …there is still no commitment to provide support for hinted return types. This
    would allow you to declare in a method or function’s declaration the object type
    that it returns. This would then be enforced by the PHP engine. Hinted return
    types would further improve PHP’s support for pattern principles (principles such
    as “code to an interface, not an implementation”). I hope one day to revise this
    book to cover that feature!


    I’m pleased to write that the day has come! PHP 7 introduced scalar type declarations
    (previously known as type hints) and return type declarations, and you’ll see
    them used plenty in this edition.


    PHP 7 also provided other nice-to-haves, including anonymous classes and some
    namespace enhancements.


    ## Advocacy and Agnosticism : The Object Debate


    Objects and object-oriented design seem to stir passions on both sides of the
    enthusiasm divide. Many excellent programmers have produced excellent code for
    years without using objects, and PHP continues to be a superb platform for procedural
    web programming.


    This book naturally displays an object-oriented bias throughout, a bias that reflects
    my object-infected outlook. Because this book is a celebration of objects, and
    an introduction to object-oriented design, it is inevitable that the emphasis
    is unashamedly object-oriented. Nothing in this book is intended, however, to
    suggest that objects are the one true path to coding success with PHP.


    Whether a developer chose to work with PHP as an object-oriented language was
    once a matter of preference. This is still true to the extent that one can create
    perfectly acceptable working systems using functions and global code. Some great
    tools (e.g., WordPress) are still procedural in their underlying architecture
    (though even these may make extensive use of objects these days). It is, however,
    becoming increasingly hard to work as a PHP programmer without using and understanding
    PHP’s support for objects, not least because the third party libraries you are
    likely to rely upon in your projects will themselves likely be object-oriented.


    Still, as you read, it is worth bearing in mind the famous Perl motto, “There’s
    more than one way to do it.” This is especially true of smaller scripts, where
    quickly getting a working example up and running is more important than building
    a structure that will scale well into a larger system (scratch projects of this
    sort are often known as “spikes”).


    Code is a flexible medium. The trick is to know when your quick proof of concept
    is becoming the root of a larger development, and to call a halt before lasting
    design decisions are made for you by the sheer weight of your code. Now that you
    have decided to take a design-oriented approach to your growing project, I hope
    that this book provides the help that you need to get started building object-oriented
    architectures.


    ## Summary


    This short chapter placed objects in their context in the PHP language. The future
    for PHP is very much bound up with object-oriented design. In the next few chapters,
    I take a snapshot of PHP’s current support for object features, and introduce
    some design issues.


    # 3. Object Basics


    Objects and classes lie at the heart of this book and, since the introduction
    of PHP 5 over a decade ago, they have lain at the heart of PHP, too. In this chapter,
    I lay down the groundwork for more in-depth coverage of objects and design by
    examining PHP’s core object-oriented features. If you are new to object-oriented
    programming, you should read this chapter carefully.


    This chapter will cover the following topics:


    - Classes and objects: Declaring classes and instantiating objects

    - Constructor methods: Automating the setup of your objects

    - Primitive and class types: Why type matters

    - Inheritance: Why we need inheritance and how to use it

    - Visibility: Streamlining your object interfaces and protecting your methods
    and properties from meddling


    ## Classes and Objects


    The first barrier to understanding object-oriented programming is the strange
    and wonderful relationship between the class and the object. For many people,
    it is this relationship that represents the first moment of revelation, the first
    flash of object-oriented excitement. So let’s not skimp on the fundamentals.


    ### A First Class


    Classes are often described in terms of objects. This is interesting, because
    objects are often described in terms of classes. This circularity can make the
    first steps in object-oriented programming hard going. Because it’s classes that
    shape objects, we should begin by defining a class.


    In short, a class is a code template used to generate one or more objects. You
    declare a class with the `class` keyword and an arbitrary class name. Class names
    can be any combination of numbers and letters, although they must not begin with
    a number. The code associated with a class must be enclosed within braces. Here
    I combine these elements to build a class:


    ```

    // listing 03.01

    class ShopProduct

    {

    // class body

    }

    ```


    The `ShopProduct` class in the example is already a legal class, although it is
    not terribly useful yet. I have done something quite significant, however. I have
    defined a type; that is, I have created a category of data that I can use in my
    scripts. The power of this should become clearer as you work through the chapter.

