  ## 章节回顾


  如果你在开始阅读本书时对 PHP 知之甚少或一无所知，那么你已不再是初学者阵营的一员，而是正在以多种有用的方式利用 PHP 的强大功能。希望到了现在，你已经开始意识到相同或类似的技术会反复出现。你不应只是复制代码，而应开始识别那些可以根据自己需求进行调整的技术，并进行独立实验。


  本书的其余部分将继续巩固你的知识，但引入了一个新的因素：MySQL 关系数据库（及其替代品 MariaDB），这将把你的 PHP 技能提升到一个更高的水平。下一章将介绍
  MySQL，并向你展示如何为后续章节设置它。


  '
- '# 10. 数据库入门


  动态网站与数据库结合后具有全新的意义。从数据库提取内容使你能以静态网站不可能（即使并非完全不可能）的方式呈现材料。脑海中浮现的例子包括在线商店（如[Amazon.com](http://amazon.com/)）、新闻网站（如
  BBC 的[www.bbcnews.com](http://www.bbcnews.com/)）以及包括 Google 和 Yahoo!在内的大型搜索引擎。数据库技术使得这些网站能够呈现成千上万甚至数百万个独特的页面。即使你的雄心壮志远不及此，一个数据库也可以以相对较少的努力增加你网站的丰富内容。


  PHP 支持所有主流数据库，包括 Microsoft SQL Server、Oracle 和 PostgreSQL，但它最常与开源数据库 MySQL 结合使用。根据
  DB-Engines（[`db-engines.com/en/ranking`](http://db-engines.com/en/ranking)）的数据，截至
  2014 年底，MySQL 排名为使用第二广泛的数据库。然而，围绕 MySQL 的未来存在争议，Google 和 Wikimedia 已放弃 MySQL 转而支持
  MariaDB（[`mariadb.org/`](https://mariadb.org/)）。几个领先的 Linux 发行版也已用 MariaDB 取代了 MySQL。本章首先简要讨论这两个数据库之间竞争的影响。


  在本章中，你将学习以下内容：


  *   数据库如何存储信息

  *   选择图形界面与数据库交互

  *   创建用户帐户

  *   使用适当的数据类型定义数据库表

  *   备份数据并将其传输到另一台服务器



  好的，作为一名高级文档工程师和翻译员，我将严格遵守您提供的注意事项和示例，将给定的英文文本翻译成中文。



  ## 你应该选择哪个数据库？


  在本节的第一版和第二版中，对于选择哪个数据库是毫无疑问的。`MariaDB` 要么不存在，要么用户群极小，而 `MySQL` 则提供了以下优势：


  *   **成本**：MySQL 社区版在开源 GPL 许可证下是免费的（[`www.gnu.org/licenses/old-licenses/gpl-2.0.html`](http://www.gnu.org/licenses/old-licenses/gpl-2.0.html)）。

  *   **功能强大**：MySQL 被 NASA、白宫、戴姆勒克莱斯勒和 BBC 新闻等领先机构使用。它功能丰富且速度快。

  *   **广泛可用**：MySQL 是最流行的开源数据库。大多数托管公司都会自动提供 MySQL 与 PHP 的组合。

  *   **跨平台兼容性**：MySQL 可在 Windows、Mac OS X 和 Linux 上运行。当数据库从一个系统转移到另一个系统时，无需进行转换。

  *   **开源**：社区版的代码和功能与商业版本完全相同。


  MySQL 最初由瑞典的 MySQL AB 开发，但该公司于 2008 年被 Sun Microsystems 收购。两年后，Sun 被主要的商业数据库供应商甲骨文收购。许多人认为这威胁到了
  MySQL 作为免费开源数据库的持续生存。然而，甲骨文公司公开表示“MySQL 是甲骨文完整、开放和集成战略中不可或缺的一部分。”这并没有给 MySQL 的原始创建者之一
  Michael “Monty” Widenius 留下深刻印象，他指责甲骨文从 MySQL 中移除功能，并且在修复安全漏洞方面行动迟缓。


  由于 MySQL 代码是开源的，Widenius 将其复刻出来创建了 MariaDB，它被描述为“MySQL 的增强型、可直接替代的版本。”最初，MariaDB
  遵循与 MySQL 相同的版本号，因此 MariaDB 5.1 是 MySQL 5.1 的替代品。这种情况一直持续到版本 5.5。此后，MariaDB 跃升至版本
  10.0。进行此更改是为了明确 MySQL 5.6 中的某些功能将不会导入到 MariaDB 中。


  **提示**

  MySQL 的官方发音是“my-ess-queue-ell”。


  ### MariaDB 和 MySQL 的兼容性


  尽管 MariaDB 10.0 和 MySQL 5.6 之间存在分歧，但这两个数据库系统实际上是可互换的。MariaDB 的可执行文件使用与 MySQL 相同的名称（Mac
  OS X 和 Linux 上为 `mysqld`，Windows 上为 `mysqld.exe`）。主要的权限表也叫做 `mysql`，并且默认存储引擎标识为
  `InnoDB`，尽管它实际上是 `InnoDB` 的一个名为 `Percona XtraDB` 的复刻版本。


  就本书中的代码而言，使用 MariaDB 还是 MySQL 应该没有区别。MariaDB 理解所有 MySQL 特有的 PHP 代码。我将在后续章节中使用的 MySQL
  图形界面 `phpMyAdmin` 也支持它。


  我没有水晶球来预测 MariaDB 和 MySQL 之间的竞争在未来几年将如何发展。在撰写本文时，MariaDB 在 DB-Engines 每月调查中排名第 27
  位，其分数仅为 MySQL 的一小部分。但随着像谷歌和维基媒体这样的大公司迁移到 MariaDB，这种情况可能会迅速改变。尽管如此，为了使本书更具可读性，我决定坚持使用当前的市场领导者
  MySQL。除非我特别提到 MariaDB，否则您应假定所有对 MySQL 的引用同样适用于 MariaDB。


  **注意**

  本书中的所有代码已在当前稳定版本的 MySQL (5.6) 和 MariaDB (10.0) 上测试通过。这些代码也应在两者的 5.1 至 5.5 版本中运行。


  ## 数据库如何存储信息


  关系型数据库（如 MySQL）中的所有数据都存储在表中，这与电子表格的存储方式非常相似，信息按行和列组织。图 10-1 显示了您将在本章后面构建的数据库表，该表显示在
  `phpMyAdmin` 中。


  ![A978-1-4842-0635-5_10_Fig1_HTML.jpg](img/A978-1-4842-0635-5_10_Fig1_HTML.jpg)


  **图 10-1.** 数据库表像电子表格一样按行和列存储信息


  每列都有一个名称（`image_id`、`filename` 和 `caption`），指明其存储的内容。


  行没有标签，但第一列（`image_id`）包含一个称为主键的唯一值，用于标识与该行关联的数据。每行包含一条相关数据的独立记录。


  行和列相交、存储数据的位置称为字段。例如，图 10-1 中第三条记录的 `caption` 字段包含值“京都的金阁寺”，该记录的主键是 3。


  **注意**

  术语“字段”和“列”经常互换使用，尤其是在旧版本的 `phpMyAdmin` 中。一个字段为单个记录保存一条信息，而一个列则为所有记录保存相同的字段。


  ### 主键如何工作


  尽管图 10-1 显示 `image_id` 是从 1 到 8 的连续序列，但它们不是行号。图 10-2 显示了按字母顺序排序标题后的同一张表。在图 10-1
  中突出显示的字段已移动到第七行，但它仍然具有相同的 `image_id` 和 `filename`。


  ![A978-1-4842-0635-5_10_Fig2_HTML.jpg](img/A978-1-4842-0635-5_10_Fig2_HTML.jpg)


  **图 10-2.** 即使表格按不同顺序排序，主键也能标识该行


  虽然主键很少显示，但它能标识记录及其存储的所有数据。一旦您知道记录的主键，就可以更新、删除它，或者用它来在单独的页面中显示数据。不用担心如何找到主键，使用结构化查询语言
  (SQL) 可以轻松完成，这是与所有主流数据库通信的标准方式。要记住的重要事情是，为每条记录分配一个主键。


  **提示**

  有些人将 SQL 发音为“sequel”。其他人则将其拼读为“ess-queue-ell”。


  - 主键不必是数字，但它必须是唯一的。

  - 社会保险号、员工 ID 或产品编号是很好的主键。它们可能由数字、字母和其他字符组成，但始终是唯一的。

  - MySQL 可以自动为您生成一个主键。

  - 一旦主键被分配，它永远不应重复，也永远不应更改。


  由于主键必须是唯一的，MySQL 在删除记录时通常不会重用该编号。这会在序列中留下空洞。甚至不要考虑重新编号。序列中的间隙根本不重要。主键的目的是标识记录，而通过更改数字来填补间隙，您将使数据库的完整性面临严重风险。


  **提示**

  有些人希望删除序列中的间隙，以便跟踪表中的记录数。这是不必要的，您将在下一章中发现这一点。




  ### 使用主键和外键关联表


  与电子表格不同，大多数数据库将数据存储在多个较小的表中，而非一个庞大的表中。这可以避免数据重复和不一致。假设你正在构建一个收藏名言的数据库。与其每次都输入作者姓名，更高效的做法是将作者姓名放在一个单独的表中，并在每条名言中存储对作者主键的引用。如图
  10-3 所示，左侧表中由`author_id 32`标识的每一条记录都是威廉·莎士比亚的名言。


  ![A978-1-4842-0635-5_10_Fig3_HTML.jpg](img/A978-1-4842-0635-5_10_Fig3_HTML.jpg)


  图 10-3. 外键用于关联存储在不同表中的信息


  由于姓名只存储在一个位置，这确保了它始终拼写正确。如果确实出现了拼写错误，只需更正一处，就能确保更改反映在整个数据库中。


  将一个表的主键存储在另一个表中称为创建外键。使用外键关联不同表中的信息是关系型数据库最强大的特性之一。在早期阶段这可能难以理解，因此我们将先处理单个表，直到第
  15 章和第 16 章再详细讨论外键。同时，请牢记以下几点：


  * 当值用作表的主键时，在该列中必须唯一。因此，图 10-3 右侧表中的每个`author_id`只使用一次。

  * 当值用作外键时，同一值可以有多个引用。因此，`32`在左侧表的`author_id`列中出现了多次。


  **提示**


  只要`author_id`在其作为主键的表中保持唯一，就能确定它始终指向同一个人。


  ### 将信息分解为小块


  你可能已经注意到，图 10-3 右侧的表为每位作者的名和姓分别设置了单独的列。这是关系型数据库的一条重要原则：将复杂信息分解为其组成部分，并将每个部分分开存储。


  决定将此过程进行到何种程度并不总是容易的。除了名和姓，你可能还需要为称谓（先生、夫人、女士、博士等）以及中间名或姓名首字母设置单独的列。地址最好分解为街道、城镇、县、州、邮政编码等。虽然将信息分解成小块可能有些麻烦，但你可以随时使用
  SQL 和/或 PHP 将它们重新组合起来。然而，一旦记录数量超过几十条，试图将存储在单个字段中的复杂信息分离出来将是一项重大工程。


  ### 良好数据库设计的检查点


  设计数据库没有唯一正确的途径——每个数据库都各不相同。不过，以下指南应能指引你正确的方向：


  * 为表中的每条记录赋予一个唯一标识符（主键）。

  * 将每组相关数据放入其自身的表中。

  * 通过将一个表的主键用作其他表中的外键来交叉引用相关信息。

  * 在每个字段中仅存储一条信息。

  * 保持 DRY（不要重复自己）。


  在早期阶段，你很可能会犯下后来才感到后悔的设计错误。尝试预见未来的需求，并使表结构具有灵活性。你可以随时添加新表以应对新的需求。


  理论就讲到这里。接下来我们将通过为第 4 章和第 5 章中的日本之旅网站构建一个数据库，来进行更实际的练习。


