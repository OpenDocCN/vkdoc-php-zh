    \n如果你只想查找特定类型的文件呢？那就轮到另一个迭代器出场了……\n\n### 使用 `RegexIterator` 限制文件类型\n\n`RegexIterator`\
    \ 充当另一个迭代器的包装器，使用正则表达式作为搜索模式来过滤其内容。假设你想在 `ch07` 文件夹中查找文本文件和 CSV 文件。用于搜索 `.txt`\
    \ 和 `.csv` 文件扩展名的正则表达式如下所示：\n\n```\n'/\\.(?:txt|csv)$/i'\n```\n\n这个正则表达式以不区分大小写的方式匹配这两种文件扩展名。`iterator_05.php`\
    \ 中的代码如下所示：\n\n```\n$files = new FilesystemIterator('.');\n$files = new RegexIterator($files,\
    \ '/\\.(?:txt|csv)$/i');\nforeach ($files as $file) {\n    echo $file->getFilename()\
    \ . '<br>';\n}\n```\n\n第一行将一个点传递给 `FilesystemIterator` 构造函数，这会告诉它检查当前文件夹。\n\n\
    然后，原始的 `$files` 对象作为第一个参数传递给 `RegexIterator` 构造函数，正则表达式作为第二个参数，过滤后的集合被重新赋值给 `$files`。在\
    \ `foreach` 循环内部，`getFilename()` 方法检索文件的名称。结果如下：\n\n![A978-1-4842-0635-5_7_Figk_HTML.jpg](img/A978-1-4842-0635-5_7_Figk_HTML.jpg)\n\
    \n现在只列出了文本文件和 CSV 文件。所有的 PHP 文件都被忽略了。\n\n> **提示**\n> 随着你阅读本书的深入，你会看到我会频繁使用正则表达式。它们是值得添加到你的技能库中的有用工具。\n\
    \n我想到了这个阶段，你可能会想知道这是否可以用于任何实际的用途。让我们来构建一个文件夹内图片的下拉菜单。\n"
- fmt: "# PHP Solution 7-3: Building a Drop-Down Menu of Files\n\nWhen you work with\
    \ a database, you often need a list of images or other files in a particular folder.\
    \ For instance, you may want to associate a photo with a product detail page.\
    \ Although you can type the name of the image into a text field, you need to make\
    \ sure that the image is there and that you spell its name correctly. Get PHP\
    \ to do the hard work by building a drop-down menu automatically. It’s always\
    \ up-to-date, and there’s no danger of misspelling the name.\n\nCreate a PHP page\
    \ called `imagelist.php` in the `filesystem` folder. Alternatively, use `imagelist_01.php`\
    \ in the `ch07` folder. Create a form inside `imagelist.php` and insert a `<select>`\
    \ element with just one `<option>`, like this (the code is already in `imagelist_01.php`):\n\
    \n```\n<form method=\"post\" action=\"\">\n<select name=\"pix\" id=\"pix\">\n\
    <option value=\"\">Select an image</option>\n</select>\n</form>\n```\n\nThis `<option>`\
    \ is the only static element in the drop-down menu.\n\nAmend the `<select>` element\
    \ in the form like this:\n\n```\n<select name=\"pix\" id=\"pix\">\n<option value=\"\
    \">Select an image</option>\n<?php\n$files = new FilesystemIterator('../images');\n\
    $images = new RegexIterator($files, '/\\.(?:jpg|png|gif)$/i');\nforeach ($images\
    \ as $image) {\n$filename = $image->getFilename();\n?>\n<option value=\"<?= $filename;\
    \ ?>\"><?= $filename; ?></option>\n<?php } ?>\n</select>\n```\n\nMake sure that\
    \ the path to the `images` folder is correct for your site’s folder structure.\
    \ The regex used as the second argument to the `RegexIterator` constructor matches\
    \ case-insensitive files with the filename extensions `.jpg`, `.png`, and `.gif`.\n\
    \nThe `foreach` loop simply gets the filename of the current image and inserts\
    \ it into the `<option>` element.\n\nSave `imagelist.php` and load it into a browser.\
    \ You should see a drop-down menu listing all the images in your `images` folder,\
    \ as shown in Figure 7-2.\n\n![A978-1-4842-0635-5_7_Fig2_HTML.jpg](A978-1-4842-0635-5_7_Fig2_HTML.jpg)\n\
    \n**Figure 7-2.** PHP makes light work of creating a drop-down menu of images\
    \ in a specific folder\n\nWhen incorporated into an online form, the filename\
    \ of the selected image appears in the `$_POST` array and is identified by the\
    \ `name` attribute of the `<select>` element — in this case, `$_POST['pix']`.\
    \ That’s all there is to it!\n\nYou can compare your code with `imagelist_02.php`\
    \ in the `ch07` folder.\n\n# PHP Solution 7-4: Creating a Generic File Selector\n\
    \nThe previous PHP solution relies on an understanding of regular expressions.\
    \ Adapting it to work with other filename extensions isn’t difficult, but you\
    \ need to be careful that you don’t accidentally delete a vital character. Unless\
    \ regexes are your specialty, it’s probably easier to wrap the code in a function\
    \ that can be used to inspect a specific folder and create an array of filenames\
    \ of specific types. For example, you might want to create an array of PDF document\
    \ filenames or one that contains both PDFs and Word documents. Here’s how you\
    \ do it.\n\nCreate a new file called `buildlist.php` in the `filesystem` folder.\
    \ The file will contain only PHP code, so delete any HTML inserted by your editing\
    \ program. Add the following code to the file:\n\n```\nfunction buildFileList($dir,\
    \ $extensions) {\n    if (!is_dir($dir) || !is_readable($dir)) {\n        return\
    \ false;\n    } else {\n        if (is_array($extensions)) {\n            $extensions\
    \ = implode('|', $extensions);\n        }\n    }\n}\n```\n\nThis defines a function\
    \ called `buildFileList()`, which takes two arguments:\n\n* `$dir`: The path to\
    \ the folder from which you want to get the list of filenames.\n* `$extensions`:\
    \ This can be either a string containing a single filename extension or an array\
    \ of filename extensions. To keep the code simple, the filename extensions should\
    \ not include a leading period.\n\nThe function begins by checking whether `$dir`\
    \ is a folder and is readable. If it isn’t, the function returns `false`, and\
    \ no more code is executed.\n\nIf `$dir` is okay, the `else` block is executed.\
    \ It also begins with a conditional statement that checks whether `$extensions`\
    \ is an array. If it is, it’s passed to `implode()`, which joins the array elements\
    \ with a vertical pipe (`|`) between each one. A vertical pipe is used in regexes\
    \ to indicate alternative values. Let’s say the following array is passed to the\
    \ function as the second argument:\n\n`['jpg', 'png', 'gif']`\n\nThe conditional\
    \ statement converts it to `jpg|png|gif`. So, this looks for `jpg`, or `png`,\
    \ or `gif`. However, if the argument is a string, it remains untouched.\n\nYou\
    \ can now build the regex search pattern and pass both arguments to the `FilesystemIterator`\
    \ and `RegexIterator`, like this:\n\n```\nfunction buildFileList($dir, $extensions)\
    \ {\n    if (!is_dir($dir) || !is_readable($dir)) {\n        return false;\n \
    \   } else {\n        if (is_array($extensions)) {\n            $extensions =\
    \ implode('|', $extensions);\n        }\n        $pattern = \"/\\.(?:{$extensions})$/i\"\
    ;\n        $folder = new FilesystemIterator($dir);\n        $files = new RegexIterator($folder,\
    \ $pattern);\n    }\n}\n```\n\nThe regex pattern is built using a string in double\
    \ quotes and wrapping `$extensions` in curly braces to make sure it’s interpreted\
    \ correctly by the PHP engine. Take care when copying the code. It’s not exactly\
    \ easy to read.\n\nThe final section of the code extracts the filenames to build\
    \ an array, which is sorted and then returned. The finished function definition\
    \ looks like this:\n\n```\nfunction buildFileList($dir, $extensions) {\n    if\
    \ (!is_dir($dir) || !is_readable($dir)) {\n        return false;\n    } else {\n\
    \        if (is_array($extensions)) {\n            $extensions = implode('|',\
    \ $extensions);\n        }\n        $pattern = \"/\\.(?:{$extensions})$/i\";\n\
    \        $folder = new FilesystemIterator($dir);\n        $files = new RegexIterator($folder,\
    \ $pattern);\n        $filenames = [];\n        foreach ($files as $file) {\n\
    \            $filenames[] = $file->getFilename();\n        }\n        natcasesort($filenames);\n\
    \        return $filenames;\n    }\n}\n```\n\nThis initializes an array and uses\
    \ a `foreach` loop to assign the filenames to it with the `getFilename()` method.\
    \ Finally, the array is passed to `natcasesort()`, which sorts it in a natural,\
    \ case-insensitive order. What \"natural\" means is that strings that contain\
    \ numbers are sorted in the same way as a person would. For example, a computer\
    \ normally sorts `img12.jpg` before `img2.jpg`, because the 1 in 12 is lower than\
    \ 2. Using `natcasesort()` results in `img2.jpg` preceding `img12.jpg`.\n\nTo\
    \ use the function, use as arguments the path to the folder and the filename extensions\
    \ of the files you want to find. For example, you could get all Word and PDF documents\
    \ from a folder like this:\n\n`$docs = buildFileList('folder_name', ['doc', 'docx',\
    \ 'pdf']);`\n\nThe code for the `buildFileList()` function is in `buildlist.php`\
    \ in the `ch07` folder."
  raw: '#### PHP Solution 7-3: Building a Drop-Down Menu of Files


    When you work with a database, you often need a list of images or other files
    in a particular folder. For instance, you may want to associate a photo with a
    product detail page. Although you can type the name of the image into a text field,
    you need to make sure that the image is there and that you spell its name correctly.
    Get PHP to do the hard work by building a drop-down menu automatically. It’s always
    up-to-date, and there’s no danger of misspelling the name.


    Create a PHP page called `imagelist.php` in the `filesystem` folder. Alternatively,
    use `imagelist_01.php` in the `ch07` folder.   Create a form inside `imagelist.php`
    and insert a `<select>` element with just one `<option>`, like this (the code
    is already in `imagelist_01.php`):  


    `<form method="post" action="">`


    `<select name="pix" id="pix">`


    `<option value="">Select an image</option>`


    `</select>`


    `</form>`


    This `<option>` is the only static element in the drop-down menu.


    Amend the `<select>` element in the form like this:  


    `<select name="pix" id="pix">`


    `<option value="">Select an image</option>`


    `<?php`


    `$files = new FilesystemIterator(''../images'');`


    `$images = new RegexIterator($files, ''/\.(?:jpg|png|gif)$/i'');`


    `foreach ($images as $image) {`


    `$filename = $image->getFilename();`


    `?>`


    `<option value="<?= $filename; ?>"><?= $filename; ?></option>`


    `<?php } ?>`


    `</select>`


    Make sure that the path to the `images` folder is correct for your site’s folder
    structure. The regex used as the second argument to the `RegexIterator` constructor
    matches case-insensitive files with the filename extensions `.jpg`, `.png`, and
    `.gif`.


    The `foreach` loop simply gets the filename of the current image and inserts it
    into the `<option>` element.


    Save `imagelist.php` and load it into a browser. You should see a drop-down menu
    listing all the images in your `images` folder, as shown in Figure [7-2](#A978-1-4842-0635-5_7_Chapter.html#Fig2).


    ![A978-1-4842-0635-5_7_Fig2_HTML.jpg](A978-1-4842-0635-5_7_Fig2_HTML.jpg)


    Figure 7-2.


    PHP makes light work of creating a drop-down menu of images in a specific folder


    When incorporated into an online form, the filename of the selected image appears
    in the `$_POST` array and is identified by the `name` attribute of the `<select>`
    element—in this case, `$_POST[''pix'']`. That’s all there is to it!


    You can compare your code with `imagelist_02.php` in the `ch07` folder.


    #### PHP Solution 7-4: Creating a Generic File Selector


    The previous PHP solution relies on an understanding of regular expressions. Adapting
    it to work with other filename extensions isn’t difficult, but you need to be
    careful that you don’t accidentally delete a vital character. Unless regexes are
    your specialty, it’s probably easier to wrap the code in a function that can be
    used to inspect a specific folder and create an array of filenames of specific
    types. For example, you might want to create an array of PDF document filenames
    or one that contains both PDFs and Word documents. Here’s how you do it.


    Create a new file called `buildlist.php` in the `filesystem` folder. The file
    will contain only PHP code, so delete any HTML inserted by your editing program.
      Add the following code to the file:


    `function buildFileList($dir, $extensions) {`


    `if (!is_dir($dir) || !is_readable($dir)) {`


    `return false;`


    `} else {`


    `if (is_array($extensions)) {`


    `$extensions = implode(''|'', $extensions);`


    `}`


    `}`


    `}`


    This defines a function called `buildFileList()`, which takes two arguments:


    *   `$dir`: The path to the folder from which you want to get the list of filenames.

    *   `$extensions`: This can be either a string containing a single filename extension
    or an array of filename extensions. To keep the code simple, the filename extensions
    should not include a leading period.


    The function begins by checking whether `$dir` is a folder and is readable. If
    it isn’t, the function returns `false`, and no more code is executed.


    If `$dir` is okay, the `else` block is executed. It also begins with a conditional
    statement that checks whether `$extensions` is an array. If it is, it’s passed
    to `implode()`, which joins the array elements with a vertical pipe (`|`) between
    each one. A vertical pipe is used in regexes to indicate alternative values. Let’s
    say the following array is passed to the function as the second argument:


    `[''jpg'', ''png'', ''gif'']`


    The conditional statement converts it to `jpg|png|gif`. So, this looks for `jpg`,
    or `png`, or `gif`. However, if the argument is a string, it remains untouched.


    You can now build the regex search pattern and pass both arguments to the `FilesystemIterator`
    and `RegexIterator`, like this:


    `function buildFileList($dir, $extensions) {`


    `if (!is_dir($dir) || !is_readable($dir)) {`


    `return false;`


    `} else {`


    `if (is_array($extensions)) {`


    `$extensions = implode(''|'', $extensions);`


    `}`


    `$pattern = "/\.(?:{$extensions})$/i";`


    `$folder = new FilesystemIterator($dir);`


    `$files = new RegexIterator($folder, $pattern);`


    `}`


    `}`


    The regex pattern is built using a string in double quotes and wrapping `$extensions`
    in curly braces to make sure it’s interpreted correctly by the PHP engine. Take
    care when copying the code. It’s not exactly easy to read.


    The final section of the code extracts the filenames to build an array, which
    is sorted and then returned. The finished function definition looks like this:


    `function buildFileList($dir, $extensions) {`


    `if (!is_dir($dir) || !is_readable($dir)) {`


    `return false;`


    `} else {`


    `if (is_array($extensions)) {`


    `$extensions = implode(''|'', $extensions);`


    `}`


    `$pattern = "/\.(?:{$extensions})$/i";`


    `$folder = new FilesystemIterator($dir);`


    `$files = new RegexIterator($folder, $pattern);`


    `$filenames = [];`


    `foreach ($files as $file) {`


    `$filenames[] = $file->getFilename();`


    `}`


    `natcasesort($filenames);`


    `return $filenames;`


    `}`


    `}`


    This initializes an array and uses a `foreach` loop to assign the filenames to
    it with the `getFilename()` method. Finally, the array is passed to `natcasesort()`,
    which sorts it in a natural, case-insensitive order. What “natural” means is that
    strings that contain numbers are sorted in the same way as a person would. For
    example, a computer normally sorts `img12.jpg` before `img2.jpg`, because the
    1 in 12 is lower than 2\. Using `natcasesort()` results in `img2.jpg` preceding
    `img12.jpg`.


    To use the function, use as arguments the path to the folder and the filename
    extensions of the files you want to find. For example, you could get all Word
    and PDF documents from a folder like this:


    `$docs = buildFileList(''folder_name'', [''doc'', ''docx'', ''pdf'']);`


    The code for the `buildFileList()` function is in `buildlist.php` in the `ch07`
    folder.'
  trans: "\n# PHP 解决方案 7-3：构建文件下拉菜单\n\n在处理数据库时，您经常需要获取特定文件夹中的图片或其它文件列表。例如，您可能希望为商品详情页面关联一张照片。虽然您可以在文本字段中手动输入图片名称，但必须确保图片存在且名称拼写正确。让\
    \ PHP 通过自动构建下拉菜单来完成这项艰巨任务。菜单始终保持最新状态，且绝无拼写错误的风险。\n\n在 `filesystem` 文件夹中创建一个名为\
    \ `imagelist.php` 的 PHP 页面。或者，使用 `ch07` 文件夹中的 `imagelist_01.php`。在 `imagelist.php`\
    \ 内创建一个表单，并插入一个仅包含一个 `<option>` 的 `<select>` 元素，如下所示（该代码已包含在 `imagelist_01.php`\
    \ 中）：\n\n```\n<form method=\"post\" action=\"\">\n<select name=\"pix\" id=\"pix\"\
    >\n<option value=\"\">选择一张图片</option>\n</select>\n</form>\n```\n\n这个 `<option>`\
    \ 是下拉菜单中唯一的静态元素。\n\n按如下方式修改表单中的 `<select>` 元素：\n\n```\n<select name=\"pix\" id=\"\
    pix\">\n<option value=\"\">选择一张图片</option>\n<?php\n$files = new FilesystemIterator('../images');\n\
    $images = new RegexIterator($files, '/\\.(?:jpg|png|gif)$/i');\nforeach ($images\
    \ as $image) {\n$filename = $image->getFilename();\n?>\n<option value=\"<?= $filename;\
    \ ?>\"><?= $filename; ?></option>\n<?php } ?>\n</select>\n```\n\n请确保 `images`\
    \ 文件夹的路径与您站点的文件夹结构相匹配。作为 `RegexIterator` 构造函数的第二个参数的正则表达式，用于不区分大小写地匹配文件扩展名为 `.jpg`、`.png`\
    \ 和 `.gif` 的文件。\n\n`foreach` 循环仅获取当前图片的文件名，并将其插入到 `<option>` 元素中。\n\n保存 `imagelist.php`\
    \ 并在浏览器中加载。您应该会看到一个下拉菜单，列出了 `images` 文件夹中的所有图片，如图 7-2 所示。\n\n![A978-1-4842-0635-5_7_Fig2_HTML.jpg](img/A978-1-4842-0635-5_7_Fig2_HTML.jpg)\n\
    \n**图 7-2.** PHP 轻松创建指定文件夹中图片的下拉菜单\n\n当融入在线表单后，所选图片的文件名会出现在 `$_POST` 数组中，并通过 `<select>`\
    \ 元素的 `name` 属性进行标识——在本例中为 `$_POST['pix']`。就是这么简单！\n\n您可以将您的代码与 `ch07` 文件夹中的 `imagelist_02.php`\
    \ 进行比较。\n\n# PHP 解决方案 7-4：创建通用文件选择器\n\n前面的 PHP 解决方案依赖于对正则表达式的理解。将其调整为适用于其他文件扩展名并不困难，但您需要小心，以免意外删除关键字符。除非正则表达式是您的专长，否则将代码包装在一个函数中可能更简单，该函数可用于检查特定文件夹并创建特定类型文件名的数组。例如，您可能想创建一个\
    \ PDF 文档文件名的数组，或者一个同时包含 PDF 和 Word 文档的数组。操作方法如下。\n\n在 `filesystem` 文件夹中创建一个名为\
    \ `buildlist.php` 的新文件。该文件将只包含 PHP 代码，因此请删除编辑程序插入的任何 HTML。将以下代码添加到文件中：\n\n```\n\
    function buildFileList($dir, $extensions) {\n    if (!is_dir($dir) || !is_readable($dir))\
    \ {\n        return false;\n    } else {\n        if (is_array($extensions)) {\n\
    \            $extensions = implode('|', $extensions);\n        }\n    }\n}\n```\n\
    \n这里定义了一个名为 `buildFileList()` 的函数，它接收两个参数：\n\n*   `$dir`：您希望从中获取文件名列表的文件夹路径。\n\
    *   `$extensions`：可以是一个包含单个文件扩展名的字符串，也可以是一个文件扩展名数组。为保持代码简洁，文件扩展名不应包含前导句点。\n\n\
    该函数首先检查 `$dir` 是否是一个文件夹并且是否可读。如果不是，函数返回 `false`，并且不再执行后续代码。\n\n如果 `$dir` 没问题，则执行\
    \ `else` 代码块。它同样以一个条件语句开始，检查 `$extensions` 是否是一个数组。如果是，则将数组传递给 `implode()`，该函数将数组元素用竖线（`|`）连接起来。竖线在正则表达式中用于表示“或”关系。假设以下数组作为第二个参数传递给函数：\n\
    \n`['jpg', 'png', 'gif']`\n\n条件语句会将其转换为 `jpg|png|gif`。因此，这将查找 `jpg`、`png` 或 `gif`。然而，如果参数是一个字符串，则保持不变。\n\
    \n现在您可以构建正则表达式搜索模式，并将两个参数传递给 `FilesystemIterator` 和 `RegexIterator`，如下所示：\n\n\
    ```\nfunction buildFileList($dir, $extensions) {\n    if (!is_dir($dir) || !is_readable($dir))\
    \ {\n        return false;\n    } else {\n        if (is_array($extensions)) {\n\
    \            $extensions = implode('|', $extensions);\n        }\n        $pattern\
    \ = \"/\\.(?:{$extensions})$/i\";\n        $folder = new FilesystemIterator($dir);\n\
    \        $files = new RegexIterator($folder, $pattern);\n    }\n}\n```\n\n正则表达式模式是通过使用双引号字符串构建的，并将\
    \ `$extensions` 包裹在花括号中，以确保 PHP 引擎能正确解析它。复制代码时请小心。它确实不太容易阅读。\n\n代码的最后一部分提取文件名以构建一个数组，该数组经过排序后被返回。完成的函数定义如下所示：\n\
    \n```\nfunction buildFileList($dir, $extensions) {\n    if (!is_dir($dir) || !is_readable($dir))\
    \ {\n        return false;\n    } else {\n        if (is_array($extensions)) {\n\
    \            $extensions = implode('|', $extensions);\n        }\n        $pattern\
    \ = \"/\\.(?:{$extensions})$/i\";\n        $folder = new FilesystemIterator($dir);\n\
    \        $files = new RegexIterator($folder, $pattern);\n        $filenames =\
    \ [];\n        foreach ($files as $file) {\n            $filenames[] = $file->getFilename();\n\
    \        }\n        natcasesort($filenames);\n        return $filenames;\n   \
    \ }\n}\n```\n\n这段代码初始化了一个数组，并使用 `foreach` 循环通过 `getFilename()` 方法将文件名赋值给该数组。最后，将数组传递给\
    \ `natcasesort()`，该函数以自然、不区分大小写的顺序对其进行排序。所谓“自然”排序，是指包含数字的字符串会按照人类习惯的方式排序。例如，计算机通常会将\
    \ `img12.jpg` 排在 `img2.jpg` 之前，因为 12 中的 1 小于 2。而使用 `natcasesort()` 则会使 `img2.jpg`\
    \ 排在 `img12.jpg` 之前。\n\n要使用该函数，将文件夹路径和您想要查找的文件的扩展名作为参数传入。例如，您可以像这样从文件夹中获取所有 Word\
    \ 和 PDF 文档：\n\n`$docs = buildFileList('文件夹名称', ['doc', 'docx', 'pdf']);`\n\n`buildFileList()`\
    \ 函数的代码位于 `ch07` 文件夹的 `buildlist.php` 中。\n"
- fmt: "# Accessing Remote Files\n\nReading, writing, and inspecting files on your\
    \ local computer or on your own website is useful. But `allow_url_fopen` also\
    \ gives you access to publicly available documents anywhere on the Internet. You\
    \ can’t directly include files from other servers—not unless `allow_url_include`\
    \ is on—but you can read the content, save it to a variable, and manipulate it\
    \ with PHP functions before incorporating it in your own pages or saving the information\
    \ to a database. You can also write to documents on a remote server as long as\
    \ the owner sets the appropriate permissions.\n\nA word of caution is in order\
    \ here. When extracting material from remote sources for inclusion in your own\
    \ pages, there’s a potential security risk. For example, a remote page might contain\
    \ malicious scripts embedded in `<script>` tags or hyperlinks. Unless the remote\
    \ page supplies data in a known format from a trusted source—such as product details\
    \ from the Amazon.com database, weather information from a government meteorological\
    \ office, or a newsfeed from a newspaper or broadcaster—sanitize the content by\
    \ passing it to `htmlentities()` (see PHP Solution 5-2). As well as converting\
    \ double quotes to `&quot;`, `htmlentities()` converts `<` to `&lt;` and `>` to\
    \ `&gt;`. This displays tags in plain text, rather than treating them as HTML.\n\
    \nIf you want to permit some HTML tags, use the `strip_tags()` function instead.\
    \ If you pass a string to `strip_tags()`, it returns the string with all HTML\
    \ tags and comments stripped out. It also removes PHP tags. A second, optional\
    \ argument is a list of tags that you want preserved. For example, the following\
    \ strips out all tags except paragraphs and first- and second-level headings:\n\
    \n`$stripped = strip_tags($original, '<p><h1><h2>');`\n\n**Tip**  \nFor an in-depth\
    \ discussion of security issues, see *Pro PHP Security, 2nd Edition* by Chris\
    \ Snyder and Michael Southwell (Apress, 2010, ISBN: 978-1-4302-3318-3).\n\n##\
    \ Consuming News and Other RSS Feeds\n\nSome of the most useful remote sources\
    \ of information that you might want to incorporate in your sites come from RSS\
    \ feeds. RSS stands for Really Simple Syndication, and it’s a dialect of XML.\
    \ XML is similar to HTML in that it uses tags to mark up content. Instead of defining\
    \ paragraphs, headings, and images, XML tags are used to organize data in a predictable\
    \ hierarchy. XML is written in plain text, so it’s frequently used to share information\
    \ between computers that might be running on different operating systems.\n\n\
    Figure [7-3](#A978-1-4842-0635-5_7_Chapter.html#Fig3) shows the typical structure\
    \ of an RSS 2.0 feed. The whole document is wrapped in a pair of `<rss>` tags.\
    \ This is the root element, similar to the `<html>` tags of a webpage. The rest\
    \ of the document is wrapped in a pair of `<channel>` tags, which always contain\
    \ the following three elements that describe the RSS feed: `<title>`, `<description>`,\
    \ and `<link>`.\n\n![A978-1-4842-0635-5_7_Fig3_HTML.jpg](A978-1-4842-0635-5_7_Fig3_HTML.jpg)\n\
    **Figure 7-3.** The main contents of an RSS feed are in the item elements\n\n\
    In addition to the three required elements, the `<channel>` can contain many other\
    \ elements, but the interesting material is to be found in the `<item>` elements.\
    \ In the case of a news feed, this is where the individual news items can be found.\
    \ If you’re looking at the RSS feed from a blog, the `<item>` elements normally\
    \ contain summaries of the blog posts.\n\nEach `<item>` element can contain several\
    \ elements, but those shown in Figure [7-3](#A978-1-4842-0635-5_7_Chapter.html#Fig3)\
    \ are the most common, and usually the most interesting:\n\n- `<title>`: The title\
    \ of the item\n- `<link>`: The URL of the item\n- `<pubDate>`: Date of publication\n\
    - `<description>`: Summary of the item\n\nThis predictable format makes it easy\
    \ to extract the information from an RSS feed using SimpleXML.\n\n**Note**  \n\
    You can find the full RSS specification at [`www.rssboard.org/rss-specification`](http://www.rssboard.org/rss-specification).\
    \ Unlike most technical specifications, it’s written in plain language and is\
    \ easy to read.\n\n## Using SimpleXML\n\nAs long as you know the structure of\
    \ an XML document, SimpleXML does what it says on the tin: it makes extracting\
    \ information from XML simple. The first step is to pass the URL of the XML document\
    \ to `simplexml_load_file()`. You can also load a local XML file by passing the\
    \ path as an argument. For example, this gets the world news feed from the BBC:\n\
    \n```\n$feed = simplexml_load_file('http://feeds.bbci.co.uk/news/world/rss.xml');\n\
    ```\n\nThis creates an instance of the `SimpleXMLElement` class. All the elements\
    \ in the feed can now be accessed as properties of the `$feed` object by using\
    \ the names of the elements. With an RSS feed, the `<item>` elements can be accessed\
    \ as `$feed->channel->item`.\n\nTo display the `<title>` of each `<item>`, create\
    \ a `foreach` loop like this:\n\n```\nforeach ($feed->channel->item as $item)\
    \ {\n    echo $item->title . '<br>';\n}\n```\n\nIf you compare this with Figure\
    \ [7-3](#A978-1-4842-0635-5_7_Chapter.html#Fig3), you can see that you access\
    \ elements by chaining the element names with the `->` operator until you reach\
    \ the target. Since there are multiple `<item>` elements, you need to use a loop\
    \ to tunnel further down. Alternatively, use array notation, like this:\n\n`$feed->channel->item[2]->title`\n\
    \nThis gets the `<title>` of the third `<item>` element. Unless you want only\
    \ a specific value, it’s simpler to use a loop.\n\nWith that background out of\
    \ the way, let’s use SimpleXML to display the contents of a news feed."
  raw: '## Accessing Remote Files


    Reading, writing, and inspecting files on your local computer or on your own website
    is useful. But `allow_url_fopen` also gives you access to publicly available documents
    anywhere on the Internet. You can’t directly include files from other servers—not
    unless `allow_url_include` is on—but you can read the content, save it to a variable,
    and manipulate it with PHP functions before incorporating it in your own pages
    or saving the information to a database. You can also write to documents on a
    remote server as long as the owner sets the appropriate permissions.


    A word of caution is in order here. When extracting material from remote sources
    for inclusion in your own pages, there’s a potential security risk. For example,
    a remote page might contain malicious scripts embedded in `<script>` tags or hyperlinks.
    Unless the remote page supplies data in a known format from a trusted source—such
    as product details from the Amazon.com database, weather information from a government
    meteorological office, or a newsfeed from a newspaper or broadcaster—sanitize
    the content by passing it to `htmlentities()` (see PHP Solution 5-2). As well
    as converting double quotes to `&quot;`, `htmlentities()` converts `<` to `&lt;`
    and `>` to `&gt;`. This displays tags in plain text, rather than treating them
    as HTML.


    If you want to permit some HTML tags, use the `strip_tags()` function instead.
    If you pass a string to `strip_tags()`, it returns the string with all HTML tags
    and comments stripped out. It also removes PHP tags. A second, optional argument
    is a list of tags that you want preserved. For example, the following strips out
    all tags except paragraphs and first- and second-level headings:


    `$stripped = strip_tags($original, ''<p><h1><h2>'');`


    Tip


    For an in-depth discussion of security issues, see Pro PHP Security, 2nd Edition
    by Chris Snyder and Michael Southwell (Apress, 2010, ISBN: 978-1-4302-3318-3).


    ### Consuming News and Other RSS Feeds


    Some of the most useful remote sources of information that you might want to incorporate
    in your sites come from RSS feeds. RSS stands for Really Simple Syndication, and
    it’s a dialect of XML. XML is similar to HTML in that it uses tags to mark up
    content. Instead of defining paragraphs, headings, and images, XML tags are used
    to organize data in a predictable hierarchy. XML is written in plain text, so
    it’s frequently used to share information between computers that might be running
    on different operating systems.


    Figure [7-3](#A978-1-4842-0635-5_7_Chapter.html#Fig3) shows the typical structure
    of an RSS 2.0 feed. The whole document is wrapped in a pair of `<rss>` tags. This
    is the root element, similar to the `<html>` tags of a webpage. The rest of the
    document is wrapped in a pair of `<channel>` tags, which always contain the following
    three elements that describe the RSS feed: `<title>`, `<description>`, and `<link>`.


    ![A978-1-4842-0635-5_7_Fig3_HTML.jpg](A978-1-4842-0635-5_7_Fig3_HTML.jpg)


    Figure 7-3.


    The main contents of an RSS feed are in the item elements


    In addition to the three required elements, the `<channel>` can contain many other
    elements, but the interesting material is to be found in the `<item>` elements.
    In the case of a news feed, this is where the individual news items can be found.
    If you’re looking at the RSS feed from a blog, the `<item>` elements normally
    contain summaries of the blog posts.


    Each `<item>` element can contain several elements, but those shown in Figure
    [7-3](#A978-1-4842-0635-5_7_Chapter.html#Fig3) are the most common, and usually
    the most interesting:


    *   `<title>`: The title of the item

    *   `<link>`: The URL of the item

    *   `<pubDate>`: Date of publication

    *   `<description>`: Summary of the item


    This predictable format makes it easy to extract the information from an RSS feed
    using SimpleXML.


    Note


    You can find the full RSS specification at [`www.rssboard.org/rss-specification`](http://www.rssboard.org/rss-specification)
    . Unlike most technical specifications, it’s written in plain language and is
    easy to read.


    ### Using SimpleXML


    As long as you know the structure of an XML document, SimpleXML does what it says
    on the tin: it makes extracting information from XML simple. The first step is
    to pass the URL of the XML document to `simplexml_load_file()`. You can also load
    a local XML file by passing the path as an argument. For example, this gets the
    world news feed from the BBC:


    `$feed = simplexml_load_file(''` [`http://feeds.bbci.co.uk/news/world/rss.xml`](http://feeds.bbci.co.uk/news/world/rss.xml)
    `'');`


    This creates an instance of the `SimpleXMLElement` class. All the elements in
    the feed can now be accessed as properties of the `$feed` object by using the
    names of the elements. With an RSS feed, the `<item>` elements can be accessed
    as `$feed->channel->item`.


    To display the `<title>` of each `<item>`, create a `foreach` loop like this:


    `foreach ($feed->channel->item as $item) {`


    `echo $item->title . ''<br>'';`


    `}`


    If you compare this with Figure [7-3](#A978-1-4842-0635-5_7_Chapter.html#Fig3),
    you can see that you access elements by chaining the element names with the `->`
    operator until you reach the target. Since there are multiple `<item>` elements,
    you need to use a loop to tunnel further down. Alternatively, use array notation,
    like this:


    `$feed->channel->item[2]->title`


    This gets the `<title>` of the third `<item>` element. Unless you want only a
    specific value, it’s simpler to use a loop.


    With that background out of the way, let’s use SimpleXML to display the contents
    of a news feed.'
  trans: "\n# 访问远程文件\n\n在本地计算机或自有网站上读取、写入和检查文件非常有用。但 `allow_url_fopen` 也能让你访问互联网上任何位置的公开文档。你不能直接包含来自其他服务器的文件——除非开启了\
    \ `allow_url_include`——但你可以读取其内容，保存到变量中，并在将其整合到你自己的页面或保存信息到数据库之前，使用 PHP 函数进行处理。只要远程服务器的所有者设置了适当的权限，你还可以向远程服务器上的文档写入内容。\n\
    \n在此需要提醒一句。从远程来源提取内容整合到自己的页面时，存在潜在的安全风险。例如，远程页面可能包含嵌入在 `<script>` 标签或超链接中的恶意脚本。除非远程页面以已知格式从受信任的来源提供数据（例如\
    \ Amazon.com 数据库中的产品详情、政府气象局提供的天气信息、或报纸或广播公司提供的新闻源），否则应通过将内容传递给 `htmlentities()`\
    \ 函数（参见 PHP 方案 5-2）进行清理。`htmlentities()` 不仅会将双引号转换为 `&quot;`，还会将 `<` 转换为 `&lt;`，将\
    \ `>` 转换为 `&gt;`。这样会将标签显示为纯文本，而不是将其作为 HTML 处理。\n\n如果你希望允许某些 HTML 标签，可以使用 `strip_tags()`\
    \ 函数。向 `strip_tags()` 传递一个字符串时，它会返回移除了所有 HTML 标签和注释的字符串。它还会移除 PHP 标签。第二个可选参数是一个列表，用于指定你想要保留的标签。例如，以下代码会剥离除段落、一级标题和二级标题之外的所有标签：\n\
    \n`$stripped = strip_tags($original, '<p><h1><h2>');`\n\n**提示**  \n关于安全问题的深入讨论，请参阅\
    \ Chris Snyder 和 Michael Southwell 合著的《Pro PHP Security, 2nd Edition》（Apress,\
    \ 2010, ISBN: 978-1-4302-3318-3）。\n\n## 消费新闻及其他 RSS 源\n\n你可能希望在网站中整合的一些最有用的远程信息来源来自\
    \ RSS 源。RSS 代表 Really Simple Syndication（真正简易聚合），它是 XML 的一种方言。XML 与 HTML 类似，都使用标签来标记内容。不同之处在于，XML\
    \ 标签用于以可预测的层次结构组织数据，而不是定义段落、标题和图像。XML 以纯文本编写，因此经常用于在可能运行不同操作系统的计算机之间共享信息。\n\n\
    图 7-3 展示了典型的 RSS 2.0 源结构。整个文档由一对 `<rss>` 标签包裹。这是根元素，类似于网页中的 `<html>` 标签。文档的其余部分由一对\
    \ `<channel>` 标签包裹，其中始终包含描述 RSS 源的以下三个元素：`<title>`、`<description>` 和 `<link>`。\n\
    \n![A978-1-4842-0635-5_7_Fig3_HTML.jpg](img/A978-1-4842-0635-5_7_Fig3_HTML.jpg)\n\
    **图 7-3.** RSS 源的主要内容位于 item 元素中\n\n除了这三个必需的元表外，`<channel>` 还可以包含许多其他元素，但有趣的内容要在\
    \ `<item>` 元素中寻找。以新闻源为例，这里就是各个新闻条目所在之处。如果你查看的是博客的 RSS 源，`<item>` 元素通常包含博文的摘要。\n\
    \n每个 `<item>` 元素可以包含多个子元素，但图 7-3 中显示的是最常见，通常也是最有趣的：\n\n- `<title>`：条目的标题\n- `<link>`：条目的\
    \ URL\n- `<pubDate>`：发布日期\n- `<description>`：条目的摘要\n\n这种可预测的格式使得使用 SimpleXML 从\
    \ RSS 源中提取信息变得容易。\n\n**注意**  \n你可以在 [`www.rssboard.org/rss-specification`](http://www.rssboard.org/rss-specification)\
    \ 找到完整的 RSS 规范。与大多数技术规范不同，它用平实的语言写成，易于阅读。\n\n## 使用 SimpleXML\n\n只要你了解 XML 文档的结构，SimpleXML\
    \ 就能做到名副其实：它让从 XML 中提取信息变得简单。第一步是将 XML 文档的 URL 传递给 `simplexml_load_file()`。你也可以通过将路径作为参数传递来加载本地\
    \ XML 文件。例如，以下代码从 BBC 获取世界新闻源：\n\n```\n$feed = simplexml_load_file('http://feeds.bbci.co.uk/news/world/rss.xml');\n\
    ```\n\n这会创建 `SimpleXMLElement` 类的一个实例。现在，源中的所有元素都可以作为 `$feed` 对象的属性，通过元素名称来访问。对于\
    \ RSS 源，`<item>` 元素可以像 `$feed->channel->item` 这样访问。\n\n要显示每个 `<item>` 的 `<title>`，可以创建一个如下的\
    \ `foreach` 循环：\n\n```\nforeach ($feed->channel->item as $item) {\n    echo $item->title\
    \ . '<br>';\n}\n```\n\n如果你将此与图 7-3 进行比较，你会看到你通过使用 `->` 运算符链接元素名称来访问元素，直到到达目标。由于有多个\
    \ `<item>` 元素，你需要使用循环来进一步深入。或者，也可以使用数组表示法，如下所示：\n\n`$feed->channel->item[2]->title`\n\
    \n这会获取第三个 `<item>` 元素的 `<title>`。除非你只想要一个特定的值，否则使用循环更简单。\n\n有了这些背景知识，接下来让我们使用\
    \ SimpleXML 来显示新闻源的内容。\n"
- fmt: "## PHP Solution 7-5: Consuming an RSS news feed\n\nThis PHP solution shows\
    \ how to extract the information from a live news feed using `SimpleXML` and then\
    \ display it in a webpage. It also shows how to format the `<pubDate>` element\
    \ to a more user-friendly format and how to limit the number of items displayed\
    \ using the `LimitIterator` class.\n\nCreate a new page called `newsfeed.php`\
    \ in the `filesystem` folder. This page will contain a mixture of PHP and HTML.\
    \ The news feed chosen for this PHP solution is BBC World News. A condition of\
    \ using most news feeds is that you acknowledge the source. So add \"The Latest\
    \ from BBC News\" formatted as an `<h1>` heading at the top of the page.\n\n**Note:**\
    \ For the terms and conditions of using a BBC news feed on your own site, see\
    \ [`www.bbc.co.uk/news/10628494#mysite`](http://www.bbc.co.uk/news/10628494#mysite)\
    \ and [`www.bbc.co.uk/terms/additional_rss.shtml`](http://www.bbc.co.uk/terms/additional_rss.shtml).\n\
    \nCreate a PHP block below the heading and add the following code to load the\
    \ feed:\n\n```php\n$url = 'http://feeds.bbci.co.uk/news/world/rss.xml';\n$feed\
    \ = simplexml_load_file($url);\n```\n\nUse a `foreach` loop to access the `<item>`\
    \ elements and display the `<title>` of each one:\n\n```php\nforeach ($feed->channel->item\
    \ as $item) {\n    echo $item->title . '<br>';\n}\n```\n\nThe normal feed often\
    \ contains 50 or more items. That's fine for a news site, but you probably want\
    \ a shorter selection in your own site. Use another SPL iterator to select a specific\
    \ range of items. Amend the code like this:\n\n![A978-1-4842-0635-5_7_Fig4_HTML.jpg](A978-1-4842-0635-5_7_Fig4_HTML.jpg)\n\
    \n**Figure 7-4.** The news feed contains a large number of items\n\nSave `newsfeed.php`\
    \ and load the page in a browser. You should see a long list of news items similar\
    \ to Figure [7-4](#A978-1-4842-0635-5_7_Chapter.html#Fig4).\n\n```php\n$url =\
    \ 'http://feeds.bbci.co.uk/news/world/rss.xml';\n$feed = simplexml_load_file($url,\
    \ 'SimpleXMLIterator');\n$filtered = new LimitIterator($feed->channel->item, 0,\
    \ 4);\nforeach ($filtered as $item) {\n    echo $item->title . '<br>';\n}\n```\n\
    \nTo use `SimpleXML` with an SPL iterator, you need to supply the name of the\
    \ `SimpleXMLIterator` class as the second argument to `simplexml_load_file()`.\
    \ You can then pass the `SimpleXML` element you want to affect to an iterator\
    \ constructor.\n\nIn this case, `$feed->channel->item` is passed to the `LimitIterator`\
    \ constructor. The `LimitIterator` takes three arguments: the object you want\
    \ to limit, the starting point (counting from 0), and the number of times you\
    \ want the loop to run. This code starts at the first item and limits the number\
    \ of items to four.\n\nThe `foreach` loop now loops over the `$filtered` result.\
    \ If you test the page again, you'll see just four titles, as shown in Figure\
    \ [7-5](#A978-1-4842-0635-5_7_Chapter.html#Fig5). Don't be surprised if the selection\
    \ of headlines is different from before. The BBC News website is updated every\
    \ minute.\n\nNow that you have limited the number of items, amend the `foreach`\
    \ loop to wrap the `<title>` elements in a link to the original article, then\
    \ display the `<pubDate>` and `<description>` items. The loop looks like this:\n\
    \n![A978-1-4842-0635-5_7_Fig5_HTML.jpg](A978-1-4842-0635-5_7_Fig5_HTML.jpg)\n\n\
    **Figure 7-5.** The `LimitIterator` restricts the number of items displayed\n\n\
    ```php\nforeach ($filtered as $item) { ?>\n    <h2><a href=\"<?= $item->link;\
    \ ?>\"><?= $item->title; ?></a></h2>\n    <p class=\"datetime\"><?php echo $item->pubDate;\
    \ ?></p>\n    <p><?php echo $item->description; ?></p>\n<?php } ?>\n```\n\nSave\
    \ the page and test it again. The links take you directly to the relevant news\
    \ story on the BBC website. The news feed is now functional, but the `<pubDate>`\
    \ format follows the format laid down in the RSS specification, as shown in the\
    \ next screenshot:\n\n![A978-1-4842-0635-5_7_Figl_HTML.jpg](A978-1-4842-0635-5_7_Figl_HTML.jpg)\n\
    \nTo format the date and time in a more user-friendly way, pass `$item->pubDate`\
    \ to the `DateTime` class constructor, then use the `DateTime format()` method\
    \ to display it. Change the code in the `foreach` loop, like this:\n\n```php\n\
    <p class=\"datetime\"><?php $date = new DateTime($item->pubDate);\necho $date->format('M\
    \ j, Y, g:ia'); ?></p>\n```\n\nThis reformats the date as below:\n\n![A978-1-4842-0635-5_7_Figm_HTML.jpg](A978-1-4842-0635-5_7_Figm_HTML.jpg)\n\
    \nThe mysterious PHP formatting strings for dates are explained in [Chapter 14](#A978-1-4842-0635-5_14_Chapter.html).\n\
    \nThat looks a lot better, but the time is still expressed in GMT (London time).\
    \ If most of your site's visitors live on the east coast of the United States,\
    \ you probably want to show the local time. That's no problem with a `DateTime`\
    \ object. Use the `setTimezone()` method to change to New York time. You can even\
    \ automate the display of EDT (Eastern Daylight Time) or EST (Eastern Standard\
    \ Time) depending on whether daylight saving time is in operation. Amend the code\
    \ like this:\n\n```php\n<p class=\"datetime\"><?php $date = new DateTime($item->pubDate);\n\
    $date->setTimezone(new DateTimeZone('America/New_York'));\n$offset = $date->getOffset();\n\
    $timezone = ($offset == -14400) ? ' EDT' : ' EST';\necho $date->format('M j, Y,\
    \ g:ia') . $timezone; ?></p>\n```\n\nTo create a `DateTimeZone` object, pass to\
    \ it as an argument one of the time zones listed at [`http://php.net/manual/en/timezones.php`](http://php.net/manual/en/timezones.php).\
    \ This is the only place that the `DateTimeZone` object is needed, so it has been\
    \ created directly as the argument to the `setTimezone()` method.\n\nThere isn't\
    \ a dedicated method that tells you whether daylight saving time is in operation,\
    \ but the `getOffset()` method returns the number of seconds the time is offset\
    \ from Coordinated Universal Time (UTC). The following line determines whether\
    \ to display EDT or EST:\n\n```php\n$timezone = ($offset == -14400) ? ' EDT' :\
    \ ' EST';\n```\n\nThis uses the value of `$offset` with the ternary operator.\
    \ In summer, New York is four hours behind UTC (–14440 seconds). So, if `$offset`\
    \ is –14400, the condition equates to `true`, and EDT is assigned to `$timezone`.\
    \ Otherwise, EST is used.\n\nFinally, the value of `$timezone` is concatenated\
    \ to the formatted time. The string used for `$timezone` has a leading space to\
    \ separate the time zone from the time. When the page is loaded, the time is adjusted\
    \ to the east coast of the United States, like this:\n\n![A978-1-4842-0635-5_7_Fign_HTML.jpg](A978-1-4842-0635-5_7_Fign_HTML.jpg)\n\
    \n![A978-1-4842-0635-5_7_Fig6_HTML.jpg](A978-1-4842-0635-5_7_Fig6_HTML.jpg)\n\n\
    **Figure 7-6.** The live news feed requires only a dozen lines of PHP code\n\n\
    All the page needs now is smartening up with CSS. Figure [7-6](#A978-1-4842-0635-5_7_Chapter.html#Fig6)\
    \ shows the finished news feed styled with `newsfeed.css` in the `styles` folder.\n\
    \n**Tip:** If you have a subscription to the lynda.com Online Training Library,\
    \ you can learn more about SPL and SimpleXML in my course \"Up and Running with\
    \ the Standard PHP Library\" ([`www.lynda.com/PHP-tutorials/Up-Running-Standard-PHP-Library/175038-2.html`](http://www.lynda.com/PHP-tutorials/Up-Running-Standard-PHP-Library/175038-2.html)).\n\
    \nAlthough I have used the BBC news feed for this PHP solution, it should work\
    \ with any RSS 2.0 feed. For example, you can try it locally with [`http://rss.cnn.com/rss/edition.rss`](http://rss.cnn.com/rss/edition.rss).\
    \ Using a CNN news feed in a public website requires permission from CNN. Always\
    \ check with the copyright holder for terms and conditions before incorporating\
    \ a feed into a website."
