- fmt: "# The Logical Operations\n\nThe logical operators are designed to perform\
    \ operations on values of the boolean type (here, you also must keep in mind automatic\
    \ type casting). To perform the logical operations, you use the binary operators\
    \ `&&` (*logical and*) and `||` (*logical or*), as well as the unary *logical\
    \ negation* operator `!`.\n\nThe value of an expression of the form `$A&&$B` is\
    \ `true` if the operands `$A` and `$B`, accounting for automatic type casting,\
    \ both are equal to `true`. If at least one of the operands is `false` (or is\
    \ interpreted after automatic type casting as one with the `false` value), then\
    \ the `$A&&$B` expression gives `false`.\n\n> **Note:** An information icon. \
    \ \n> Simply speaking, the `$A&&$B` expression is `true` only if both operands\
    \ `$A` and `$B` in the expression are `true`.\n\nThe value of an expression of\
    \ the form `$A||$B` is `true` if at least one of the operands `$A` or `$B` is\
    \ `true` or its value is cast to `true` due to automatic type casting. If both\
    \ operands are `false`, then the value of the entire expression is `false`.\n\n\
    > **Note:** It turns out that the value of the `$A||$B` expression is `true` if\
    \ at least one of the operands in the expression is `true`.\n\nIt is worth mentioning\
    \ that expressions based on the operators `&&` and `||` are calculated from left\
    \ to right according to the simplified scheme. Namely, if it is possible to determine\
    \ the result of the entire expression after evaluating the first operand, then\
    \ the second operand is not evaluated.\n\n| Details |\n| --- |\n| If in an expression\
    \ of the form `$A&&$B`, the first operand `$A` turns out to be `false`, then the\
    \ value of the entire expression is equal to `false`, regardless of the value\
    \ of the second operand `$B`. In an expression of the form `$A||$B`, if the first\
    \ operand `$A` is `true`, the value of the entire expression is `true`, regardless\
    \ of the second operand `$B` value. Therefore, in these cases, the value of the\
    \ second operand is not calculated. |\n\nThe logical negation operator `!` is\
    \ a unary one. The value of an expression of the form `!$A` is `true` if the value\
    \ of the operand `$A` is `false` (or is converted to `false` due to automatic\
    \ type conversion). If the value of the operand `$A` is `true` (or is reduced\
    \ to that value), then the `!$A` expression is `false`.\n\n| Details |\n| ---\
    \ |\n| There exist \"twins\" for the operators `&&` and `||`. They are, respectively,\
    \ the `and` and `or` operators. These operators have lower precedence than the\
    \ `&&` and `||` operators. In some cases, it could be convenient to use them.\
    \ |\n\n# The Bitwise Operations\n\nThe bitwise operations are performed at the\
    \ level of the binary (bitwise) representation of a number. Therefore, to understand\
    \ the consequences of performing such operations, it is necessary to have at least\
    \ an elementary idea of how numbers are encoded in the binary system.\n\n| Details\
    \ |\n| --- |\n| In the binary representation, a number is written as a sequence\
    \ of zeros and ones. Formally, that can be represented as `a_n a_{n-1} ... a_2\
    \ a_1 a_0`, where the parameters `a[0]`, `a[1]`, ..., `a[n]` can take the value\
    \ 0 or 1. To convert a positive number from the binary to the decimal system,\
    \ you can use the formula `a_n a_{n-1} ... a_2 a_1 a_0 = a_0 * 2^0 + a_1 * 2^1\
    \ + a_2 * 2^2 + ... + a_{n-1} * 2^{n-1} + a_n * 2^n`. |\n\nLet’s take a look at\
    \ the basic bitwise operators, starting with the *bitwise and* operator `&`. Suppose\
    \ an expression like `$A&$B` is evaluated. Its result is a number. The binary\
    \ code of that number is calculated following such a rule. The binary codes of\
    \ the operands `$A` and `$B` are compared. Namely, in those binary codes, the\
    \ corresponding bits are compared. The comparison result gives a bit for the expression\
    \ value number.\n\n| Details |\n| --- |\n| A computer uses a certain fixed count\
    \ of bits to remember a number. Therefore, whatever the values are, they are implemented\
    \ by the same count of bits, and there is a one-to-one correspondence between\
    \ those bits. |\n\nWith the `&` operator, you get bit `1` if both bits being compared\
    \ are `1`. If at least one bit is `0`, the result is a zero bit. For example,\
    \ the value of the `13&21` expression is the number `5`. The explanation is as\
    \ follows. The binary code of the number `21` is `10101`. The binary code of the\
    \ number `13` is `01101`. The result of the `13&21` expression is calculated in\
    \ such a way: the codes `01101` and `10101` are compared bit by bit, and if two\
    \ bits are `1`, then the output is `1`. In all other cases (if at least one bit\
    \ is `1`), you get `0` as the output.\n\n```\n& 01101\n```\n\nAs a result, you\
    \ get the `00101` code, which corresponds to the number `5`.\n\n> **Note:** The\
    \ binary representation of numbers used only five positions (bits). All other\
    \ (previous) bits are assumed to be zero.\n\nUsing the *bitwise operator or* `|`\
    \ when comparing bits in numbers, you get `1` if at least one of the bits is `1`.\
    \ In other words, the result of an expression like `$A|$B` is a number whose binary\
    \ code is obtained by comparing the binary codes of the numbers `$A` and `$B`.\
    \ In the number you get, a bit at a particular position is `1` if at least one\
    \ of the compared bits at the same position in `$A` and `$B` is `1`. If both compared\
    \ bits are `0`, the result is a bit with the value `0`. Thus, the result of the\
    \ `13|21` expression is `29` (the binary code `11101`).\n\n```\n| 01101\n```\n\
    \nThe *bitwise exclusive or* operator `^` is different from the *bitwise or* `|`\
    \ in that the output is `1` if one and only one of the bits being compared is\
    \ `1`. In all other cases (two bits are `1` or two bits are `0`), the result is\
    \ a bit with the value `0`. For example, the result of the `13^21` expression\
    \ is calculated as follows.\n\n```\n^ 01101\n```\n\nThe code `11000` corresponds\
    \ to `24`. That is the value of the `13^21` expression.\n\nThe *bitwise inversion*\
    \ operator `~` is a unary one. The result of an expression of the form `~$A` is\
    \ a number whose binary code is obtained from the code of the number `$A` by replacing\
    \ zeros with ones and ones with zeros. In that case, the code of the number `$A`\
    \ does not change, and a new value is calculated."
  raw: '## The Logical Operations


    The logical operators are designed to perform operations on values of the boolean
    type (here, you also must keep in mind automatic type casting). To perform the
    logical operations, you use the binary operators `&&` (*logical and*) and `||`
    (*logical or*), as well as the unary *logical negation* operator `!`.


    The value of an expression of the form `$A&&$B` is `true` if the operands `$A`
    and `$B`, accounting for automatic type casting, both are equal to `true`. If
    at least one of the operands is `false` (or is interpreted after automatic type
    casting as one with the `false` value), then the `$A&&$B` expression gives `false`.


    ![](images/613529_1_En_2_Chapter/613529_1_En_2_Figg_HTML.jpg)An information icon.Note


    Simply speaking, the `$A&&$B` expression is `true` only if both operands `$A`
    and `$B` in the expression are `true`.


    The value of an expression of the form `$A||$B` is `true` if at least one of the
    operands `$A` or `$B` is `true` or its value is cast to `true` due to automatic
    type casting. If both operands are `false`, then the value of the entire expression
    is `false`.


    ![](images/613529_1_En_2_Chapter/613529_1_En_2_Figh_HTML.jpg)An information icon.Note


    It turns out that the value of the `$A||$B` expression is `true` if at least one
    of the operands in the expression is `true`.


    It is worth mentioning that expressions based on the operators `&&` and `||` are
    calculated from left to right according to the simplified scheme. Namely, if it
    is possible to determine the result of the entire expression after evaluating
    the first operand, then the second operand is not evaluated.


    | Details |

    | --- |

    | If in an expression of the form `$A&&$B`, the first operand `$A` turns out to
    be `false`, then the value of the entire expression is equal to `false`, regardless
    of the value of the second operand `$B`.In an expression of the form `$A&#124;&#124;$B`,
    if the first operand `$A` is `true`, the value of the entire expression is `true`,
    regardless of the second operand `$B` value. Therefore, in these cases, the value
    of the second operand is not calculated. |


    The logical negation operator `!` is a unary one. The value of an expression of
    the form `!$A` is `true` if the value of the operand `$A` is `false` (or is converted
    to `false` due to automatic type conversion). If the value of the operand `$A`
    is `true` (or is reduced to that value), then the`!$A` expression is `false`.


    | Details |

    | --- |

    | There exist “twins” for the operators `&&` and `&#124;&#124;`. They are, respectively,
    the `and` and `or` operators. These operators have lower precedence than the `&&`
    and `&#124;&#124;` operators. In some cases, it could be convenient to use them.
    |


    ## The Bitwise Operations


    The bitwise operations are performed at the level of the binary (bitwise) representation
    of a number. Therefore, to understand the consequences of performing such operations,
    it is necessary to have at least an elementary idea of how numbers are encoded
    in the binary system.


    | Details |

    | --- |

    | In the binary representation, a number is written as a sequence of zeros and
    ones. Formally, that can be represented as ![$$ \underset{\_}{a_n{a}_{n-1}\dots
    {a}_2{a}_1{a}_0} $$](images/613529_1_En_2_Chapter/613529_1_En_2_Chapter_TeX_IEq1.png),
    where the parameters *a*[0], *a*[1], ..., *a*[*n*] can take the value 0 or 1.To
    convert a positive number from the binary to the decimal system, you can use the
    formula ![$$ \underset{\_}{a_n{a}_{n-1}\dots {a}_2{a}_1{a}_0}={a}_0{2}^0+{a}_1{2}^1+{a}_2{2}^2+\dots
    +{a}_{n-1}{2}^{n-1}+{a}_n{2}^n $$](images/613529_1_En_2_Chapter/613529_1_En_2_Chapter_TeX_IEq2.png).
    |


    Let’s take a look at the basic bitwise operators, starting with the *bitwise and*
    operator `&`. Suppose an expression like `$A&$B` is evaluated. Its result is a
    number. The binary code of that number is calculated following such a rule. The
    binary codes of the operands `$A` and `$B` are compared. Namely, in those binary
    codes, the corresponding bits are compared. The comparison result gives a bit
    for the expression value number.


    | Details |

    | --- |

    | A computer uses a certain fixed count of bits to remember a number. Therefore,
    whatever the values are, they are implemented by the same count of bits, and there
    is a one-to-one correspondence between those bits. |


    With the `&` operator, you get bit `1` if both bits being compared are `1`. If
    at least one bit is `0`, the result is a zero bit. For example, the value of the
    `13&21` expression is the number `5`. The explanation is as follows. The binary
    code of the number `21` is `10101`. The binary code of the number `13` is `01101`.
    The result of the `13&21` expression is calculated in such a way: the codes `01101`
    and `10101` are compared bit by bit, and if two bits are `1`, then the output
    is `1`. In all other cases (if at least one bit is `1`), you get `0` as the output.


    ```

    & 01101


    ```


    As a result, you get the `00101` code, which corresponds to the number `5`.


    ![](images/613529_1_En_2_Chapter/613529_1_En_2_Figi_HTML.jpg)An information icon.Note


    The binary representation of numbers used only five positions (bits). All other
    (previous) bits are assumed to be zero.


    Using the *bitwise operator or* `|` when comparing bits in numbers, you get `1`
    if at least one of the bits is `1`. In other words, the result of an expression
    like `$A|$B` is a number whose binary code is obtained by comparing the binary
    codes of the numbers `$A` and `$B`. In the number you get, a bit at a particular
    position is `1` if at least one of the compared bits at the same position in `$A`
    and `$B` is `1`. If both compared bits are `0`, the result is a bit with the value
    `0`. Thus, the result of the `13|21` expression is `29` (the binary code `11101`).


    ```

    | 01101


    ```


    The *bitwise exclusive or* operator `^` is different from the *bitwise or* `|`
    in that the output is `1` if one and only one of the bits being compared is `1`.
    In all other cases (two bits are `1` or two bits are `0`), the result is a bit
    with the value `0`. For example, the result of the `13^21` expression is calculated
    as follows.


    ```

    ^ 01101


    ```


    The code `11000` corresponds to `24`. That is the value of the `13^21` expression.


    The *bitwise inversion* operator `~` is a unary one. The result of an expression
    of the form `~$A` is a number whose binary code is obtained from the code of the
    number `$A` by replacing zeros with ones and ones with zeros. In that case, the
    code of the number `$A` does not change, and a new value is calculated.


    ![](images/613529_1_En_2_Chapter/613529_1_En_2_Figj_HTML.jpg)An information icon.Note'
  trans: "\n# 逻辑运算\n\n逻辑运算符旨在对布尔类型的值执行运算（这里，你还必须牢记自动类型转换）。要执行逻辑运算，需要使用二元运算符 `&&`（*逻辑与*）和\
    \ `||`（*逻辑或*），以及一元运算符 *逻辑非* `!`。\n\n形式为 `$A&&$B` 的表达式的值为 `true`，前提是操作数 `$A` 和\
    \ `$B`（考虑自动类型转换后）均为 `true`。如果至少有一个操作数为 `false`（或在自动类型转换后被解释为 `false` 值），那么 `$A&&$B`\
    \ 表达式的结果为 `false`。\n\n> **注意：** 信息图标。  \n> 简单来说，表达式 `$A&&$B` 仅在两个操作数 `$A` 和 `$B`\
    \ 都为 `true` 时才为 `true`。\n\n形式为 `$A||$B` 的表达式的值为 `true`，前提是操作数 `$A` 或 `$B` 中至少有一个为\
    \ `true`，或者其值由于自动类型转换被转换为 `true`。如果两个操作数都为 `false`，则整个表达式的值为 `false`。\n\n> **注意：**\
    \ 由此可见，只要表达式中的操作数至少有一个为 `true`，`$A||$B` 表达式的值即为 `true`。\n\n值得一提的是，基于运算符 `&&` 和\
    \ `||` 的表达式是按照简化方案从左到右计算的。也就是说，如果在计算第一个操作数后就能确定整个表达式的结果，那么第二个操作数将不再计算。\n\n| 详细信息\
    \ |\n| --- |\n| 如果在形如 `$A&&$B` 的表达式中，第一个操作数 `$A` 为 `false`，那么无论第二个操作数 `$B` 的值如何，整个表达式的值都为\
    \ `false`。在形如 `$A||$B` 的表达式中，如果第一个操作数 `$A` 为 `true`，那么无论第二个操作数 `$B` 的值如何，整个表达式的值都为\
    \ `true`。因此，在这些情况下，不会计算第二个操作数的值。 |\n\n逻辑非运算符 `!` 是一元运算符。形如 `!$A` 的表达式的值为 `true`，前提是操作数\
    \ `$A` 的值为 `false`（或由于自动类型转换被转换为 `false`）。如果操作数 `$A` 的值为 `true`（或被归为该值），那么 `!$A`\
    \ 表达式的结果为 `false`。\n\n| 详细信息 |\n| --- |\n| 运算符 `&&` 和 `||` 有其“孪生兄弟”，分别是 `and`\
    \ 和 `or` 运算符。这些运算符的优先级低于 `&&` 和 `||` 运算符。在某些情况下，使用它们可能更方便。 |\n\n# 位运算\n\n位运算是在数字的二进制（按位）表示级别上执行的。因此，要理解执行此类运算的后果，至少需要对数字如何在二进制系统中编码有基本的了解。\n\
    \n| 详细信息 |\n| --- |\n| 在二进制表示中，数字被写成一串由零和一组成的序列。形式上，可以表示为 `a_n a_{n-1} ... a_2\
    \ a_1 a_0`，其中参数 `a[0]`、`a[1]`、……、`a[n]` 的取值可以是 0 或 1。要将正数从二进制转换为十进制，可以使用公式 `a_n\
    \ a_{n-1} ... a_2 a_1 a_0 = a_0 * 2⁰ + a_1 * 2¹ + a_2 * 2² + ... + a_{n-1} * 2^{n-1}\
    \ + a_n * 2^n`。 |\n\n让我们来看看基本的位运算符，从*按位与*运算符 `&` 开始。假设要计算像 `$A&$B` 这样的表达式，其结果是一个数字。该数字的二进制码按照以下规则计算：比较操作数\
    \ `$A` 和 `$B` 的二进制码，具体来说，比较这些二进制码中对应的位。比较结果为表达式值的数字生成一个位。\n\n| 详细信息 |\n| --- |\n\
    | 计算机使用固定数量的位来存储数字。因此，无论值是什么，它们都是由相同数量的位来实现的，并且这些位之间存在一一对应关系。 |\n\n使用 `&` 运算符时，如果被比较的两个位都是\
    \ `1`，则得到位 `1`。如果至少有一个位是 `0`，则结果位为 `0`。例如，表达式 `13&21` 的值是数字 `5`。解释如下：数字 `21` 的二进制码是\
    \ `10101`。数字 `13` 的二进制码是 `01101`。表达式 `13&21` 的结果是这样计算的：将码 `01101` 和 `10101` 逐位比较，如果两个位都是\
    \ `1`，则输出 `1`。在所有其他情况下（如果至少有一个位是 `1`），则输出 `0`。\n\n```\n& 01101\n```\n\n最终得到码 `00101`，它对应于数字\
    \ `5`。\n\n> **注意：** 数字的二进制表示仅使用了五个位置（位）。所有其他（更高位的）位都假定为零。\n\n使用*按位或*运算符 `|` 比较数字中的位时，如果至少有一个位是\
    \ `1`，则得到 `1`。换句话说，像 `$A|$B` 这样的表达式的结果是一个数字，其二进制码是通过比较数字 `$A` 和 `$B` 的二进制码得到的。在得到的数字中，如果\
    \ `$A` 和 `$B` 中相同位置的被比较位至少有一个是 `1`，则该位置的位为 `1`。如果两个被比较位都是 `0`，则结果位为 `0`。因此，表达式\
    \ `13|21` 的结果是 `29`（二进制码 `11101`）。\n\n```\n| 01101\n```\n\n*按位异或*运算符 `^` 与*按位或*\
    \ `|` 的不同之处在于：当且仅当被比较的两个位中有一个是 `1` 时，输出才为 `1`。在所有其他情况下（两个位都是 `1` 或两个位都是 `0`），结果位为\
    \ `0`。例如，表达式 `13²¹` 的结果计算如下。\n\n```\n^ 01101\n```\n\n码 `11000` 对应于 `24`，这就是表达式\
    \ `13²¹` 的值。\n\n*按位取反*运算符 `~` 是一元运算符。形如 `~$A` 的表达式的结果是一个数字，其二进制码是通过将数字 `$A` 的码中的零替换为一、一替换为零而得到的。在这种情况下，数字\
    \ `$A` 的码本身不变，而是计算出新的值。\n"
- fmt: 'As you will see later, the value of the `~$A` expression is the number `-($A+1)`.
    For example, the value of the `~5` expression is the number `-6`.


    The *bitwise shift operations* (when the bit representation of a number is shifted
    several positions to the right or left) are performed using the `<<` (*shift to
    the left*) and `>>` (*shift to the right*) operators. The value of an expression
    of the form `$A<<$n` is a number whose binary code is obtained by shifting the
    binary code of the number `$A` by `$n` positions to the left. The left bits are
    lost, and the right bits are filled with zeros. The value of an expression of
    the form `$A>>$n` is a number whose binary code is obtained from the binary code
    of the number `$A` by shifting `$n` positions to the right. The right bits are
    lost, and the left bits are filled with the sign bit’s value (the first bit, which
    is `0` for positive numbers and `1` for negative numbers).


    | Details |

    | --- |

    | Coding negative numbers has its peculiarities. To understand the coding principle,
    imagine that numbers are stored using 8 bits. Let’s say you have some code. For
    example, let it be the code `00010011` (number `19`). Let’s perform a bitwise
    inversion of that code (replace `1` with `0` and `0` with `1`). You get the code
    `11101100`. Now, add these two codes. The addition rules in the binary system
    are simple: `0+0=0`, `1+0=1`, `0+1=1`, and `1+1=10`. The last statement is `2+2=4`,
    but only written in the binary code. So, if you add the codes `00010011` and `11101100`,
    you get the code `11111111`, consisting of ones.Next, add one (the code `00000001`)
    to that code. You get `100000000`. But here, you must remember that you are dealing
    with a computer, assuming it stores numbers using 8 bits. But there are nine digits
    in the code `100000000`. Therefore, there is simply no bit at the beginning of
    the number to remember the `1`, which is lost. You get the code `00000000`, which
    consists of zeros. That number is `0`.The result will be the same if you take
    a different source code and a different number of bits to remember the number.
    What did you get? If you take some positive number `$X`, invert its code (the
    `~$X` expression), add these codes, and then add `1`, you get `0` as a result.
    In other words, whatever the value of `$X` is, there is the relation `$X+(~$X)+1=0`.
    It is easy to see that the `(~$X)+1` expression can be identified with the code
    of the number `-$X` (the number opposite to the value of `$X`).Thus, if you need
    to get the binary code of a negative number, you should take the code of the opposite
    positive number, invert that code, and add `1`. The first bit in the binary code
    of a number is used to determine a sign: for positive numbers, that bit is `0`,
    and for negative numbers, that bit is `1`.The binary representation is converted
    to a decimal value for positive numbers according to the standard mathematical
    rules.If you need to convert the binary code of a negative number into decimal
    representation, then you should follow these next steps. First, you invert the
    code. Then add `1` to it. The resulting value is converted to decimal representation
    according to the rules applied for positive numbers. The last step is to place
    a minus sign before the calculated number. |


    Let’s assume that 8 bits are used to write numbers. Then, the result of the `41<<1`
    expression is the number `82`. The explanation is as follows. The code of the
    number `41` is `00101001`. After shifting by one position to the left, you get
    the code `01010010`, corresponding to `82`. If you shift the code `00101001` by
    two positions to the left (the `41<<2` statement), you get the code `10100100`.
    Here, the first sign bit is `1`. Therefore, the number is negative. You perform
    a bitwise inversion to determine that number and get the code `01011011`. Then
    you add `1` and get the code `01011100`. That is the code for the number `92`.
    So, the result of the `41<<2` expression is the number `-92` with the code `10100100`.
    The result of the `41<<3` expression is the number `72` with the code `01001000`.


    ![](images/613529_1_En_2_Chapter/613529_1_En_2_Figk_HTML.jpg)An information icon.


    Note


    It is important to understand that such results will be if exactly 8 bits are
    used to store numbers. If the count of bits is different (for example, 32), then
    the result of the `41<<1` is `82` expression, the value of the `41<<2` expression
    is `164`, and when calculating the value of the `41<<3` expression, you get `328`.


    When the `41>>1` expression is evaluated, the code `00101001` of the number `41`
    is shifted by one position to the right, which gives the code `00010100`. It corresponds
    to the number `20`. The `41>>2` expression value is `10` with the binary code
    `00001010`. The result of the `-69>>2` expression is the number `-18`. Here, you
    should consider that the code of the number `-69` (when encoded using 8 bits)
    is `10111011`. Shifting it by two positions to the right, you get the code `11101110`.
    That is the code of the number `-18`.


    ![](images/613529_1_En_2_Chapter/613529_1_En_2_Figl_HTML.jpg)An information icon.


    Note


    Once again, all these calculations are given for the case if the number is stored
    using 8 bits. A different count of bits means different (in general) results.'
