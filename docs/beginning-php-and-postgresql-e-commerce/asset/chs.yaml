  \ 4-8 所示。\n\n**工作原理：products_list 组件化模板**  \n由于产品列表的大部分功能已经在数据层和业务层实现，因此这个任务相当简单。Smarty\
  \ 设计模板文件（`products_list.tpl`）包含了显示产品时的布局，而其模板插件文件（`function.load_products_list.php`）则负责获取要显示的正确产品列表。\n\
  \n`function.load_products_list.php` 中的构造函数（`ProductsList` 类）创建了一个业务层对象（`Catalog`）的新实例，并从查询字符串中获取\
  \ `DepartmentID`、`CategoryID` 和 `PageNo`，同时将它们转换为整型作为安全措施。这些值用于决定显示哪些产品：\n\n```php\n\
  // 类构造函数\npublic function __construct()\n{\n  // 从查询字符串中获取 DepartmentID，并转换为整型\n\
  \  if (isset ($_GET['DepartmentID']))\n    $this->_mDepartmentId = (int)$_GET['DepartmentID'];\n\
