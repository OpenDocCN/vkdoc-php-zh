    **Microformats**


    Microformats are a series of specifications for adding a consistent structure
    to certain kinds of data that appear on web pages. For example, whenever you needed
    to list the contact details for a person on a page in your web site (such as their
    name, e-mail address, and phone number), you would structure the HTML code used
    to output these contact details according to the appropriate microformat.


    In this particular case (of displaying contact details), you would use the hCard
    microformat (the microformats adaptation of the vCard standard). There are several
    published microformats (see [http://microformats.org/wiki/](http://microformats.org/wiki)
    for a more comprehensive list) that can be used:


    • **hCard.** Used for representing people or organizations (based on the vCard
    standard)


    • **hCalendar.** Used for representing events and calendars (based on the iCalendar
    standard)


    • **hAtom.** Used to represent data just as an Atom feed would


    Although this may give the impression of being restrictive in how you structure
    your code, it is in fact not restrictive at all. Microformats are used by applying
    certain class names or HTML attributes to the HTML code you are already creating.


    **An Example of Using Microformats**


    To demonstrate this, I’ll use hCard as an example. If I wanted to list my contact
    details without using microformats on a web page, I might use the HTML snippet
    in Listing 10-27\. Figure 10-4


    after the listing shows how this HTML would be rendered in Firefox.


    **Listing 10-27.** *Showing Contact Details on a Web Page Without Using Microformats*
    *(listing-10-27.html)*


    <strong>Quentin Zervaas</strong>


    <br />


    [Email: <a href="mailto:foo@example.com">foo@example.com</a>](mailto:foo@example.com)


    <br />


    Phone: (123) 1234-5678


    Technically speaking, although we want the name to stand out from the e-mail address
    and phone number, we shouldn’t necessarily be using <strong> to do so. Good markup
    practice would have you label each element in the address details and apply formatting
    in CSS


    accordingly.


    This is where microformats step in. To make the contact details use the hCard
    microformat, it is simply a matter of adding structure and applying the correct
    class names. You can find the hCard specification at [http://microformats.org/wiki/hcard
    (although y](http://microformats.org/wiki/hcard)ou may find


    [the guide at http://microformatique.com/?page_id=134 easier to understand).](http://microformatique.com/?page_id=134)


    According to this document, it would have us change the HTML in Listing 10-27
    to that of Listing 10-28\. I have included the full HTML document in this listing,
    including the CSS


    required to make this HTML render the same as Listing 10-27.


