  \n> **注意**\n> 会话通常会在用户的计算机上设置一个用户密钥，它看起来像一串很长的字符，例如`234hjg5hg34g5hj23g532hjg34hjg5k4`。例如，当在另一个页面上打开一个会话时，它会扫描计算机以查找用户密钥。如果匹配，它将访问该会话；如果不匹配，它将启动一个新会话。\n\
