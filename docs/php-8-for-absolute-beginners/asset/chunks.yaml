- fmt: '# Creating Navigation Items


    This site will have two main page views: one for displaying the gallery and one
    to show a form to allow users to upload new images. Because we know we will need
    these two page views, we can prepare a site navigation with two navigation items.
    Let us create a new file in the `views` folder and call it `navigation.php`.


    ```

    Gallery

    Upload new image


    ";

    ?>

    Listing 4-1

    navigation.php

    ```


    # Creating Two Dummy Page View Files


    It is always a clever idea to start small when coding something new. Let us prepare
    two separate page views: one for the gallery and one for the upload form. Each
    page view will be generated and returned from separate files. So, we create two
    files inside the `views` folder.


    ```

    Upload New Images";

    ?>

    Listing 4-3

    upload.php

    ```


    ```

    Images Gallery";

    ?>

    Listing 4-2

    gallery.php

    ```


    # Creating the Index File


    As mentioned earlier, every site has an index page. This is the default page that
    is displayed in a browser when the user enters a URL (such as [`www.google.com`](http://www.google.com)).
    As the main door to the site, it is important that the page be clean, clear, reliable,
    and attractive. Our first version of the index page will display a functional,
    dynamic navigation linking to two quite simple page views.


    ```

    setTitle("Dynamic image gallery");

    $pageData->setContent($nav);

    $navigationIsClicked = isset($_GET[''page'']);

    if ( $navigationIsClicked ) {

    $fileToLoad = $_GET[''page''];

    } else {

    $fileToLoad = "gallery";

    }

    include_once "views/$fileToLoad.php";

    $pageData->appendContent($info);

    require "templates/page.php";

    echo $page;

    ?>

    Listing 4-4

    index.php

    ```


    As we can see, the index page is similar to the last version in Chapter [3](#323857_3_En_3_Chapter.xhtml).
    Reusing code speeds creation time and increases reliability at the same time.
    The `Page_Data` class and the page file are not shown because, at this point,
    we have made no changes from the previous versions.


    # Time to Test


    All code so far has been just like that we have been working on in the first few
    chapters. In total, we have very few lines of code, but this code is enough to
    perform an initial test. When we are working with code, it is recommended that
    we write a little code, test it, and then write a little more.


    While frequently testing progress, we will be able to identify errors in their
    infancy. An error is much easier to find in fewer lines of code. It only takes
    a few moments to test our progress. Let us make it a habit to test often and catch
    errors as early as possible.


    As mentioned before, a good programmer plans for the unexpected to occur. When
    testing programs, make a valid attempt to try and break the code. See if you can
    cause the code to produce errors. If errors are produced, adjust the code so it
    will gracefully handle the unexpected. Let us test the code and look at the results.


    ![](images/323857_3_En_4_Chapter/323857_3_En_4_Fig3_HTML.jpg)


    An image represents how the window is visible to the programmer for uploading
    new images to the website.


    **Figure 4-3** `index.php` view after clicking Upload new image


    ![](images/323857_3_En_4_Chapter/323857_3_En_4_Fig2_HTML.jpg)


    A window represents how the screen is visible to the programmer when they are
    trying to see images on the website.


    **Figure 4-2** Default view for `index.php`


    **Exercise**: Try to break the current code. Make changes to the `Page Data` class
    which will cause the upload pages to not display properly. **Hint**: Change the
    values checked within the `if` statements. At least one `if` statement currently
    needs to be adjusted to allow all information to be properly displayed. Can you
    find it? Remember the class is designed to display default values if it does not
    validate information passed.


    # Preparing a Function for Displaying Images


    Let us update the gallery file to declare a short function that simply returns
    an HTML string including a `<ul>` with one `<li>`. This change is a step toward
    the site’s ability to display all images that are contained within a given folder
    (directory).'
