  trans: "\n# 第 4 章：文件命名与数据库设计\n\n要将这些关系构建到模型中，首先需要在 `app/models/post.php` 中创建 `Post`\
    \ 模型。代码清单 4-4 包含了该模型的代码，用于为其分配与 `User` 模型的“属于”关系。\n\n**代码清单 4-4.** `Post` 模型\n\
    \n```\n1 <?\n2 class Post extends AppModel {\n3   var $name = 'Post';\n4   var\
    \ $belongsTo = array('User');\n5 }\n6 ?>\n```\n\n代码清单 4-4 的第 4 行展示了如何在 Cake 中建立“属于”关系。你只需要将参与关系的模型数组赋值给当前模型即可。Cake\
    \ 用于构建“属于”关系的类对象变量是 `var $belongsTo` 属性。\n\n在任何 Cake 应用中，“属于”关系都是通过遵循第 4 行的代码来建立的。你可以通过将它们包含在数组语法中来添加关系。\n\
    \n## `className` 参数\n\n`$belongsTo` 设置中可能包含的一个键是 `className`。简单来说，`className`\
    \ 就是当前模型所属的模型。在本例中，它会被设置为 `User`，即用户表模型的类名。如果你决定放弃 Cake 的模型命名约定，或者由于复杂原因需要给模型命名而不符合\
    \ Cake 标准约定，那么你就需要在此设置中指定该名称；否则，Cake 将无法自行关联该关联。\n\n## `foreignKey` 参数\n\n此键用于设置相关模型中的外键。此设置对于指定多个“属于”关系非常有用。\n\
    \n## `conditions` 参数\n\n此键包含一个用于过滤相关模型记录的 SQL 字符串。通常，它包含针对某个字段的等于/不等于 SQL 语句（例如，`Post.published\
    \ = 1`）。\n\n## `fields` 参数\n\n默认情况下，Cake 会返回关联表中的所有字段。在本例中，将获取与当前文章相关联的 `User`\
    \ 记录的所有字段，并使 `Post` 模型可用。你可以通过使用 `fields` 键来限制这一点。\n\n你可以通过将这些键作为数组分配给 `$belongsTo`\
    \ 数组中的每个项来设置自己的值。代码清单 4-5 显示了带有所有键的 `Post`“属于”关系。\n\n**代码清单 4-5.** 分配给 `Post::User`\
    \ 关系的 BelongsTo 键\n\n```\nvar $belongsTo = array(\n  'User'=>array(\n    'className'=>'User',\n\
    \    'foreignKey'=>'user_id',\n    'conditions'=>null,\n    'fields'=>null\n \
    \ )\n);\n```\n\n## “拥有一个”\n\n每个具有关联映射的关系都必须在两个方向上进行指定。换句话说，仅仅说明文章属于用户是不够的。你还必须在\
    \ `User` 模型中指定用户如何与其他表关联。在这种情况下，一个用户将“拥有多个”文章。\n\n有三种可能的关系——“拥有一个”、“拥有多个”以及“拥有并属于多个”。我将首先讨论“拥有一个”关联。\n\
    \n这种关系正是一对一关系。在为用户分配配置文件的应用程序中，例如社交网络网站，会用到“拥有一个”关系。每个用户拥有一个配置文件，而一个配置文件只属于一个用户。\n\
    \n要建立“拥有一个”关系，你需要像之前在 `Post` 模型中对 `$belongsTo` 所做的那样设置 `$hasOne` 属性（参见代码清单 4-6）。\n\
    \n**代码清单 4-6.** 在 `User` 模型中设置“拥有一个”关系的 `$hasOne` 属性字符串\n\n```\nvar $hasOne =\
    \ array('Post');\n```\n\n### `className` 参数\n\n对于“拥有一个”关系，`className` 应始终设置为包含指向当前模型的\
    \ `belongsTo` 属性的模型。\n\n### `foreignKey`、`conditions` 和 `fields` 参数\n\n这些与“属于”关系的\
    \ `foreignKey`、`conditions` 和 `fields` 参数类似。设置它们可以增加对“拥有一个”关系的更具体控制。\n\n### `dependent`\
    \ 参数\n\n在删除“拥有一个”关系中的记录时，你可能希望删除关联的两方。例如，当一个用户拥有一个配置文件且该用户被删除时，你可能希望关联的配置也被删除。在这种情况下，`dependent`\
    \ 键允许你轻松实现这一点。默认情况下，它被设置为 `false`。将 `dependent` 设置为 `true`，则当通过关联模型执行删除操作时，将删除两个表中的记录。\n\
    \n在你正在构建的博客中，不需要使用“拥有一个”关系。我们将利用 Cake 中的另一个重要关系：“拥有多个”。\n\n## “拥有多个”\n\n你已经创建了\
    \ `Post` 模型；现在是时候创建 `User` 模型了。在 `app/models` 目录中创建 `User` 模型，并输入代码清单 4-7 中所示的代码。\n\
    \n**代码清单 4-7.** `User` 模型\n\n```\n1 <?\n2 class User extends AppModel {\n3   var\
    \ $name = 'User';\n4   var $hasMany = array('Post');\n5 }\n6 ?>\n```\n\n对于你的博客，每个用户将拥有多篇文章。即使一个用户只发布了一篇文章，你仍然希望该关系能够为每个用户保存多篇文章。通过告知\
    \ `User` 模型有多个文章记录与其关联，并通过在 `Post` 模型中用 `belongsTo` 属性完成关系，Cake 现在可以将两者链接在一起。\n\
    \n为了获得更多控制，你可能需要为“拥有多个”关系输入更多参数。\n\n### `className`、`foreignKey`、`conditions`\
    \ 和 `fields` 参数\n\n这些参数指定了与前面“属于”关系中所述相同的内容。\n\n### `dependent` 参数\n\n此设置的行为类似于对“拥有一个”关系的描述。在“拥有多个”关系中，将\
    \ `dependent` 设置为 `true` 将递归工作。换句话说，如果你在 `User` 模型中将 `$hasMany` 属性设置为 `dependent=>true`，那么每当一个用户被删除时，该用户的所有文章也都会被删除。\n\
    \n### `order` 参数\n\n你可以通过在此参数中输入 SQL 语法来控制关联记录的排序顺序。例如，在 `User` 模型中，你可以将 `order`\
    \ 设置为 `Post.datetime ASC`，它将按日期和时间升序对所有关联的文章进行排序。\n\n### `limit` 参数\n\n某些数据库请求可能会返回大量关联记录。你可能希望限制返回的记录数量以减少服务器加载时间。你可以通过将此参数设置为一个值来实现，该值表示\
    \ Cake 将从数据库中获取的最大关联记录数。\n\n### `finderQuery` 参数\n\n要生成更定制化的结果，你可以在 `finderQuery`\
    \ 键中输入一个 SQL 字符串，当查询关联记录时将运行它。只有在你的应用程序需要高度数据库定制化时，你才真正需要使用此选项。大多数情况下，使用 Cake\
    \ 内置的模型函数就能很好地工作。\n\n“拥有多个”关系对于帮助设计有效的数据库极为有用。如果你打算在应用程序中为一系列将存储在数据库中的选项添加一个选择菜单，那么“拥有多个”关系可以帮助你做到这一点，而无需在\
    \ HTML 中编写静态列表。相反，你可以构建一个表来存储这些选项，并通过模型使用“拥有多个”关系来关联它们。然后，无论功能蔓延或从列表中添加/删除选项发生什么情况，你都可以放心，应用程序不会崩溃并且能够处理这些变化。它是基于数据库构建的，而不是基于静态表单，这意味着应用程序是动态的并且可以轻松更改。\n\
    \n## 测试关联\n"
- fmt: '### Testing Database Associations with Scaffolding


    An easy way to test the associations in your database is to use the scaffolding
    feature. You have already created the `Post` and `User` models; now let’s see
    how those associations hold up. You will need to create controllers to run the
    scaffold.


    Create the `posts_controller.php` file in the `app/controllers` directory, and
    insert the code shown in Listing 4-8.


    **Listing 4-8.** *The Posts Controller File*


    ```

    1 <?

    2 class PostsController extends AppController {

    3     var $name = ''Posts'';

    4     var $scaffold;

    5 }

    6 ?>

    ```


    To test the `User` model, you will also want to build a scaffold around the `users`
    table.


    To do this, create the file `app/controllers/users_controller.php` and insert
    the code shown in Listing 4-9.


    **Listing 4-9.** *The Users Controller File*


    ```

    1 <?

    2 class UsersController extends AppController {

    3     var $name = ''Users'';

    4     var $scaffold;

    5 }

    6 ?>

    ```


    Let’s add a couple of test users to the `users` table by launching the Users controller
    and clicking the Add link. My screen when doing this appears in Figure 4-1; yours
    should be similar.


    ![Image 23](index-68_1.jpg)


    **Figure 4-1.** *Adding a test user to the database using Cake’s scaffolding*


    Now that there are a couple of users in the database, you can test whether those
    users get associated with the `posts` table. Launch the Posts controller, and
    click Add to insert a new post. If the association is working right, you should
    see a select menu that is populated with associated records in the `users` table;
    Figure 4-2 shows how this menu appears on the New Post screen.


    If the association weren’t working correctly, you’d see an empty input text box
    rather than a select menu for the user. That would indicate that Cake is asking
    you to fill in the `user_id` field with your own variable data. Notice that when
    you save the post, the list screen for the Posts controller displays the name
    of the user, not an ID number. This is another indication that Cake is picking
    up the association properly.


    ![Image 24](index-69_1.jpg)


    **Figure 4-2.** *The User menu is populated with actual records from the* users
    *table.*


    ### Conventions for Establishing Table Associations


    As mentioned earlier, you can manually set the foreign key for the relationship.
    In other words, you can name the fields that store the associated ID however you
    want. However, Cake does have some naming conventions for working with table associations
    that make it possible to leave out the `foreignKey` parameter and other settings,
    thus reducing the amount of code to build associations.


    I have already mentioned that table names in the database ought to be pluralized.
    For a “has one” or “has many” relationship, you will need to enter a field that
    will store the associated record’s ID value. This field’s name follows a naming
    convention, specifically that it must be named after the model from which the
    ID comes. You must also append an underscore and `id` to the field name for Cake
    to recognize this as the associated foreign key. Notice that when you created
    the `posts` table, you followed this convention when adding the `user_id` field.
    By doing so, you could leave out the `foreignKey` parameter when setting the `$belongsTo`
    and `$hasMany` attributes. With the tables being named properly as well as the
    foreign keys, Cake automatically found the associations and made them available
    in the scaffolding. No specific code was necessary.


    ### “Has and Belongs to Many”


    The final association Cake can recognize for database table relationships is the
    “has and belongs to many” relationship. This relationship is powerful but also
    a little difficult to master.'
