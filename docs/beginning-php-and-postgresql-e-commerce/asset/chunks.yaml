    ''Find the hat you''''ll wear this Halloween!'');


    INSERT INTO category (category_id, department_id, name, description) VALUES (3,
    1, ''St. Patrick''''s Day Hats'',


    ''Try one of these beautiful hats on St. Patrick''''s Day!''); INSERT INTO category
    (category_id, department_id, name, description) VALUES (4, 2, ''Berets'',


    ''An amazing collection of berets from all around the world!''); INSERT INTO category
    (category_id, department_id, name, description) VALUES (5, 2, ''Driving Caps'',


