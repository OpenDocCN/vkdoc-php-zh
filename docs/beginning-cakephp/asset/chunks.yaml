    ## Rendering Event Details


    Notice that Listing 13-6, which contains the SQL for creating the Calendar Events
    table, calls for a field named `details`. This is so that when an event appears
    in the calendar, the user can click it, and more details will be provided. So
    far, the `$calendar->render()` function has taken care of rendering the calendar
    and displaying events matching each day of a given month.


    However, the details saved for each event must be provided by the helper, which
    has not been written yet. Next, close out the month table now that the iterations
    through each week have been written in the function; then output the contents
    of the `details` field for each event using Listing 13-17.


    **Listing 13-17.** *Rendering Event Details*


    ```

    $out .= ''</table>'';


    /*** RENDER EVENT DETAILS ***/


    104 if (isset($this->Details)) {


    foreach ($this->Details as $id=>$detail) {


    106 $out .= ''<div id="event_details_''.$id.''" style="display: none➥

    ;" class="_cal_event_detail">'';

    107 $out .= ''<b>''.$detail[''name''].''</b>''; 108 $out .= ''<p>''.date(''g:i
    a'',strtotime($detail[''date''])).''</p>''; 109


    $out .= ''<p>''.$detail[''details''].''</p>'';

    110 $out .= ''</div>'';


    }

    }

    ```


    Listing 13-17 uses a class attribute that hasn’t been specified yet called `$this->Details`.
    This is because the `$calendar->events()` function, which was used to fetch matching
    events in the `$events` array earlier, will also pull the contents of `details`
    for any matching records and place them into the `$this->Details` array. Listing
    13-17 then loops through the `details` array and outputs a `<div>` element for
    each set after the calendar. Notice that line 106 assigns the unique `$id` value
    to the `<div>` element’s ID and uses the `style` attribute to hide the whole element.
    In the link provided for each event in the calendar, later you’ll use this `$id`
    value to display the matching hidden `<div>`, thus displaying the details for
    the event when clicked.


    The rest of this loop prepares the contents of the `details` array to be readable
    in the view.


    All that’s left for the `$calendar->render()` function is to output the contents
    of the `$out` variable. See Listing 13-18 for how to close out this function.


    **Listing 13-18.** *Closing Out the* `$calendar->render()` *Function*


    ```

    113 return $this->output($out);

    }

    ```


    Before setting up the `$calendar->events()` function, the class variable `$Details`
    must be defined in the helper class. Scroll up toward the top, and insert the
    following line after the `$helpers` array definition:


    ```

    var $Details = array();

    ```


