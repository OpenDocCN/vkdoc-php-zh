    **Combining Zend_Auth, Zend_Acl, and Zend_**


    **Controller_Front**


    The next step in developing our web application is to integrate the Zend_Auth
    and Zend_Acl components. In this section, we will change the behavior of the application
    controller (that is, the instance of Zend_Controller_Front), to check permissions
    using Zend_Acl prior to dispatching a user’s request. When checking permissions,
    we will use the identity stored with Zend_Auth to determine the role of the current
    user.


    To control permissions, we will treat each controller as a resource, and treat
    the action handlers in these controllers as the permissions associated with the
    resource. For instance, later in this chapter we will create the AccountController.php
    file, which is used to control everything relating to user accounts (such as logging
    in, logging out, fetching passwords, and updating user details). The AccountController
    controller will be the resource for Zend_Acl, while the privileges associated
