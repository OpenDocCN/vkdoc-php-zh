    DataCash and Authorize.net


    In this chapter, we’ll demonstrate implementing credit card transactions with
    two online services: DataCash and Authorize.net.


    DataCash is a UK-based credit card gateway organization. You’ll need a UK merchant
    bank account if you want to use it in your final application. However, you don’t
    have to worry about this for now: it’s very easy to get access to a rather useful
    test account—you don’t even need a merchant bank account.


    Authorize.net, as mentioned on its official web site at http://www.authorize.net,


    “provides Internet Protocol (IP) payment gateway services that enable merchants
    to authorize, settle and manage credit card or electronic check transactions anytime,
    anywhere.” In other words, Authorize.net also offers the services that you need
    to process the credit cards yourself when someone buys one of your hats.


    The important point to remember is that the techniques covered in this chapter
    apply to every credit card gateway. The specifics might change slightly if you
    switch to a different organization, but you’ll have done most of the hard work
    already.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH15.qxd 11/15/06 6:21 PM Page 507


    C H A P T E R 1 5 ■ C R E D I T C A R D T R A N S A C T I O N S


    **507**


    As you’ll see later in this chapter, both Authorize.net and DataCash let you perform
    test transactions using so-called “magic” credit card numbers (supplied separately
    by Authorize.net and DataCash), which will accept or decline transactions without
    performing any actual financial transactions. This is fantastic for development
    purposes because you don’t want to use your own credit cards for testing!


    ■**Note** The authors of this book are in no way affiliated with Authorize.net
    or DataCash.


    **Understanding Credit Card Transactions**


    Whichever gateway you use, the basic principles of credit card transactions are
    the same. First, the sort of transactions you’ll be dealing with in an e-commerce
    web site are known as Card Not Present (CNP) transactions, which means you don’t
    have the credit card in front of you, and you can’t verify the customer signature.
    This isn’t a problem; after all you’ve probably been performing CNP transactions
    for some time now online, over the phone, by mail, and so on.


    It’s just something to be aware of should you see the CNP acronym.


    Several advanced services are offered by various gateways, including cardholder
    address verification, security code checking, fraud screening, and so on. Each
    of these adds an additional layer of complexity to your credit card processing,
    and we’re not covering those details here. Rather, this chapter provides a starting
    point from which you can add these services if required. Whether to choose these
    optional extra services depends on how much money is passing through your system
    and the trade-off between the costs of implementing the services and the potential
    costs if something goes wrong that could have been prevented by these extra services.
    If you are interested in these services, the “customer service representative”


    mentioned previously will be happy to explain things.


    You can perform several types of transactions, including **Authorization:** Checks
    card for adequate funds and performs deduction.


    **Pre-authorization:** Checks cards for funds and allocates them if available,
    but doesn’t deduct them immediately.


    **Fulfillment:** Completes a pre-authorization transaction, deducting the funds
    already allocated.


    **Refund:** Refunds a completed transaction or simply puts money on a credit card.


    Again, the specifics vary, but these are the basic types.


    In this chapter, you’ll use the pre/fulfill model, which means you don’t take
    payment until just before you instruct your supplier to ship goods. This has been
    hinted at previously by the structure of the pipeline you created in the previous
    chapter.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


