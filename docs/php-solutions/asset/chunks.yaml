    Take the `SELECT` query from PHP Solution 15-4 and remove the condition that searches
    for a specific article, which leaves this:


    `SELECT title, article, DATE_FORMAT(updated, ''%W, %M %D, %Y'') AS updated, filename,
    caption`


    `FROM blog INNER JOIN images USING (image_id)`


    If you run this query in the SQL tab of phpMyAdmin, it produces the result shown
    in Figure [15-9](#A978-1-4842-0635-5_15_Chapter.html#Fig9).


    ![A978-1-4842-0635-5_15_Fig9_HTML.jpg](A978-1-4842-0635-5_15_Fig9_HTML.jpg)


    Figure 15-9.


    INNER JOIN finds only records that have a match in both tables


    With `INNER JOIN`, the `SELECT` query succeeds in finding only those records where
    there’s a complete match. One of the articles doesn’t have an image associated
