    \ lowercase, and the remaining\nwords have a capitalized first letter, such as\
    \ addIt. However, other\nstyles are acceptable, such as\n\n```\n$first_number\
    \ = 0;\n$second_Number = 1;\n$number1 = 12;\n```\n\nThe key is to be consistent\
    \ within your code with whatever style you\nchoose. There is really no advantage\
    \ as to which format is better.\nAlthough, plenty of programmers will be happy\
    \ to tell you their opinion!\nIn my opinion, you should use meaningful names such\
    \ as “total_Sales”.\nSome also include the data type in the name, such as “int_Total_Sales”.\
    \ In\nlarge programs it will be much easier to keep track of variable usage\n\
    with a good naming convention.\n*Variables must always include the $ as the first\
    \ character and\nother alphanumeric characters to complete the name. You can also\
    \ include\nthe underscore (_). However, no other special symbols or spaces are\n\
    allowed.*\nIn the following example, a variable ($result) will hold whatever is\n\
    returned by a function called addIt. Since we have not\ndeclared a data type,\
    \ this variable could hold a numerical result, a\nstring result, or some other\
    \ possible format. As a programmer, we might\nwant this flexibility. For example,\
    \ if the function is able to produce a\nresult, we return the result. If it is\
    \ not able to return a result, we\ncan return a string (“Invalid Result”) or we\
    \ could pass back NULL (which\nindicates no result, different than passing a zero).\n\
    Since this function accepts two parameters (12, 13), we assume it\nwill add the\
    \ numbers together and return the result. The print statement will\nthen display\
    \ whatever is contained in the variable.\n\nNote\n\nWhile most examples in this\
    \ book use the print statement to display\ninformation, the echo statement is\
    \ also very commonly used.\n\n```\n\nIf we have not declared data types to limit\
    \ what is passed into the\nfunction (see below), then it is possible that the\
    \ following examples\nwill also produce good results with other types of information\
    \ passed.\nHowever, there could be something within the function that will not\n\
    properly execute when information that is not expected is passed. A good\nprogrammer\
    \ always creates code that avoids any possible error situation\ncaused by invalid\
    \ data being saved or passed into a function. Every\nsituation must be considered,\
    \ even ones the programmer may consider as\nillogical or next to impossible.\n\
    \nIf we want to restrict what information to accept or use, we could\ndeclare\
    \ data types. We will explore a few examples soon. For now, by\ndefault, remember\
