    You can use curly braces instead of square brackets when referring to array elements,
    but in PHP 8, such syntax raises an error.


    If you want to change the value of an array element, you just assign a new value
    to the element. As noted earlier, if the element to which a value is assigned
    does not exist in the array, such an element is created. You also know how to
    iterate over the elements of an array using the `foreach` loop statement. All
    these have been discussed. However, that is not a complete list of operations
    that can be performed with arrays. Next, let’s examine some of the most relevant
    issues. Let’s start with array assignments.


