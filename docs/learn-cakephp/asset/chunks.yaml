    ## 测试 JSON 响应


    JSON（JavaScript Object Notation）是一种标准格式，使用人类可读的文本传输由属性-值对组成的数据对象。JSON 是一种与语言无关的数据格式。它最初是为
    JavaScript 创建的，但许多编程语言都能生成和解析 `JSON-format` 数据。JSON 文件扩展名是 `.json`。


    以下是一个 JSON 字符串示例：


    ```

    {

    "name": "rrd",

    "isAlive": true,

    "age": 40,

    "phoneNumbers": [

    {

    "type": "home",

    "number": "987 654 3210"

    },

    {

    "type": "mobile",

    "number": "123 456 7890"

    }

    ],

    "children": [],

    "spouse": "syj"

    }

    ```


