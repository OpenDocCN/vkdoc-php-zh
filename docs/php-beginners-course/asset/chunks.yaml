    echo $myText;

    $myText = strtolower($myText);

    echo "<br />";

    echo $myText;

    ?>

    ```


    输出：


    ```

    I am learning to program PHP

    i am learning to program php

    ```


    ## `strtoupper()`


    此函数返回给定字符串的大写形式：


