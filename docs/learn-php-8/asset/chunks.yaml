    实现此功能的代码行与之前在 `dog_interface` 中看到的相同；我们创建 `dog_container`，找到 `dogdata` 文件的位置，并创建一个
    `dog_data` 类的实例。唯一的区别是传入 `"dogdata"` 作为搜索参数。使用 PHP 函数 `get_class_methods` 创建 `dog_data`
    类中的方法列表。该类中的最后一个方法是 `processRecords`。该方法的名称被提取出来并赋值给 `$method_name`。然后构建 `record_Array`
    以传递给 `processRecords`。调用该方法，传入 `"Insert"` 和 `record_Array`。最后，将 `dog_data` 对象设置为
    `NULL`，这会触发析构函数保存数据。


    这实现了完全的*依赖注入*。`dog` 对象在代码确定之前，并不知道 `dog_data` 类的名称、`dog_data` 类的位置，以及要调用的方法的名称。这就在数据层和业务规则层之间建立了完全的分离，符合三层设计的要求。


