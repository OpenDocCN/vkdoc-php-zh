  raw: '## Who This Book Is For


    This book assumes that you have a working knowledge of the fundamentals of web
    design and development—HTML, CSS, and JavaScript. It does not assume any prior
    knowledge of Shopify development (we’ll kick things off with a Shopify primer
    in Chapter [1](#A437216_1_En_1_Chapter.html) ).


    Developers with some Shopify experience may find some of the earlier material
    straightforward, but will derive value from the coverage of topics such as workflow
    automation, development best practices, and deeper dives into the architecture
    and design principles of Shopify themes.


    Veteran Shopify developers are likely to get something out of the material as
    well—whether it’s an introduction to advanced theme deployment techniques, taking
    performance optimization to a new level, or simply getting a different perspective
    on theme development.


    ## Structure of This Book


    This book is broken into 11 chapters. Each one tackles a different idea or component
    of Shopify theme development, and while their contents are somewhat independent,
    they do follow an overall chronological order. This is especially true for Chapters
    [4](#A437216_1_En_4_Chapter.html) through [7](#A437216_1_En_7_Chapter.html) ,
    which together walk through the process of building an entire Shopify theme from
    scratch.


    I would therefore recommend working through the book in order the first time around,
    and then coming back to specific chapters and sections as needed for reference.


    Throughout the book, I use code snippets to demonstrate concepts and specific
    techniques. For space reasons, many of these listings are truncated to show only
    the more important parts—the full versions of these are available in the resources
    repository on GitHub, located at [`https://github.com/Apress/definitive-guide-to-shopify-themes`](https://github.com/Apress/definitive-guide-to-shopify-themes)
    . A second GitHub repository, [`https://github.com/gavinballard/defguide-theme`](https://github.com/gavinballard/defguide-theme)
    , tracks the full source code development for the example theme begun in the exercises
    in Chapter [4](#A437216_1_En_4_Chapter.html) and built on in the remaining chapter
    exercises.


    ## Beyond the Book


    As I mentioned, there are several places to go to find help if you find yourself
    stuck or want to learn more about a topic. Outside of the standard Google search,
    you can search through the official Shopify forums ( [`https://ecommerce.shopify.com/forums`](https://ecommerce.shopify.com/forums)
    ), check out the official theme documentation ( [`https://help.shopify.com/themes`](https://help.shopify.com/themes)
    ), or browse through posts on the Partner Blog ( [`https://www.shopify.com/partners/blog`](https://www.shopify.com/partners/blog)
    ).


    There’s also a growing number of Shopify-focused communities being built on a
    range of social platforms, including Slack, Reddit, and Facebook.


    If you have any specific questions about the material in this book, or you would
    like to report errata, you can contact me directly at `gavin@gavinballard.com`
    .


    On with the show!


    Acknowledgments


    As I will rave to any and all who care to listen, Shopify’s “secret sauce” doesn’t
    lie in its code but in its ecosystem—the employees, experts, and partners who
    work together to “make commerce better for everyone.” It’s a cheesy sentiment
    but genuine—I would never have been able to write this book or do the work I enjoy
    without help from the people listed here.


    To the many Shopifolk and Shopify Partners I’ve crossed paths with over the years,
    thank you for your time and generosity—whether answering forum posts, helping
    with blog articles, diving in to obscure Liquid problems, or collaborating on
    new and exciting projects. There are too many of you to mention, but a special
    shout-out to Carson Shold, Jason Bowman, Courtney Symons, and Rhys Furner from
    Shopify, and Jessica Claesson, Galen King, Stewart Knapman, Mack Johnson, Chris
    Pointer, Kurt Elster, Justin Metros, Rick Davies, Dave Lazar, Cal Wilson, Alex
    O’Byrne, and Piers Thorogood from the Partner community for help with an earlier
    version of the book (and general Shopify awesomeness).


    Special thanks need to go to Scott Hay at One Inch Round for being the best first
    client one could ask for; Louise Corrigan and Nancy Chen at Apress for their patience
    and persistence in getting the book over the line; and of course the inimitable
    Keir Whitaker at Shopify.


    Finally, my eternal gratitude to my colleagues at Disco, my family, and my friends
    for their support.'
  trans: "\n# 本书读者对象\n\n本书假定您已掌握网页设计与开发的基础知识——包括 HTML、CSS 和 JavaScript。书中不要求您具备任何\
    \ Shopify 开发经验（我们将在第 1 章通过 Shopify 入门指南开启旅程）。  \n有一定 Shopify 经验的开发者可能会觉得前期内容较为简单，但能从工作流自动化、开发最佳实践以及对\
    \ Shopify 主题架构与设计原则的深入探讨中获得价值。  \n资深 Shopify 开发者也同样能从中获益——无论是了解高级主题部署技术、将性能优化提升至新高度，还是获得主题开发的全新视角。\n\
    \n# 本书结构\n\n本书共分为 11 个章节。每章探讨 Shopify 主题开发的不同概念或组件，内容虽相对独立，但整体遵循时间顺序。第 4 章至第 7\
    \ 章尤为突出，这四章连贯地演示了从零构建完整 Shopify 主题的全过程。  \n因此，我建议您首次阅读时按章节顺序通读，之后可根据需要回头查阅特定章节。\
    \  \n书中使用代码片段演示概念与具体技术。受篇幅限制，许多代码段仅截取关键部分——完整版本可访问 GitHub 资源仓库`https://github.com/Apress/definitive-guide-to-shopify-themes`获取。另一个\
    \ GitHub 仓库`https://github.com/gavinballard/defguide-theme`则记录了从第 4 章练习开始构建、并在后续章节练习中不断完善的示例主题的完整源码。\n\
    \n# 延伸阅读\n\n如您遇到困难或希望深入了解某主题，除常规 Google 搜索外，还可通过以下渠道寻求帮助：查询官方 Shopify 论坛（`https://ecommerce.shopify.com/forums`）、查阅官方主题文档（`https://help.shopify.com/themes`），或浏览合作伙伴博客（`https://www.shopify.com/partners/blog`）上的文章。\
    \  \n此外，在 Slack、Reddit 和 Facebook 等社交平台上，专注于 Shopify 的社区也在不断壮大。  \n如果您对本书内容有任何疑问或需勘误，可直接通过邮箱`gavin@gavinballard.com`与我联系。\
    \  \n好戏开场了！\n\n# 致谢\n\n正如我会对所有愿意倾听的人热情宣扬的那样，Shopify 的“秘制配方”并非在于其代码，而在于其生态系统——那些齐心协力“让商业惠及每个人”的员工、专家和合作伙伴。这听起来有些矫情，但确是肺腑之言——没有以下各位的帮助，我绝不可能完成本书或从事我所热爱的工作。\
    \  \n感谢多年来与我相遇的众多 Shopify 员工与合作伙伴，感谢你们的时间与慷慨——无论是回答论坛问题、协助撰写博文、深入解决晦涩的 Liquid\
    \ 问题，还是合作开展激动人心的新项目。你们人数众多，无法一一列举，但特别感谢 Shopify 的 Carson Shold、Jason Bowman、Courtney\
    \ Symons 和 Rhys Furner，以及合作伙伴社区的 Jessica Claesson、Galen King、Stewart Knapman、Mack\
    \ Johnson、Chris Pointer、Kurt Elster、Justin Metros、Rick Davies、Dave Lazar、Cal Wilson、Alex\
    \ O'Byrne 和 Piers Thorogood，感谢你们对本书早期版本的支持（以及你们在 Shopify 领域的卓越贡献）。  \n特别感谢 One\
    \ Inch Round 的 Scott Hay，他是我梦寐以求的首位客户；感谢 Apress 的 Louise Corrigan 和 Nancy Chen，她们的耐心与坚持促使本书最终成稿；当然还有\
    \ Shopify 无与伦比的 Keir Whitaker。  \n最后，衷心感谢我在 Disco 的同事们、我的家人以及朋友们给予我的支持。\n"
