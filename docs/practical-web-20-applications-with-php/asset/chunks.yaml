    logins (using different priority levels) is that a successful login typically
    indicates “normal operation,” while a failed login may indicate that somebody
    is trying to gain unauthorized access to an account. Being able to filter the
    log easily by the message type helps you easily identify potential problems that
    have occurred or are occurring. In Chapter 14 we will look at how to make use
    of this log file.


