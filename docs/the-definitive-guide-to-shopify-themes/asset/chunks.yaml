    *   Compare the current product to all other products on the store and “score”
    them based on the number of tags and collections they share with the current product.
    Products with a higher score are considered closely related to the current product.
    The implementation of this approach is a little more involved but it can yield
    better results than the first method.


    For the example theme, we’re going to implement a Liquid snippet (`snippets/related-products.liquid`
    in the theme’s directory) that supports three of these approaches to display a
    list of up to four related products on the page. When included on the product
    page, it will:


    1.  Check if the product has a “related products” metafield defined. If so, it
    will use that to render the first four products listed in that metafield.  

    2.  If no “related products” metafield is defined, then it will check to see if
    a collection with the same handle as the product (but with `–related` on the end)
    exists. If so, it will render the first four products in that collection.  

    3.  If neither a metafield or a collection exists, then it will fall back to finding
    a collection the current product is member of and render the first four products
    in that collection.


    This approach gives us a basic way of automatically finding related products on
    every product page, while giving the storeowner the option of creating a collection
    or metafield to override the default behavior if they need more control. An outline
    of the the snippet’s logic is given in Listing [5-3](#A437216_1_En_5_Chapter.html#Par80)
    (it’s truncated for brevity; the full version is available in the example theme
    repository). Listing [5-4](#A437216_1_En_5_Chapter.html#Par81) shows how to include
    the snippet inside `product.liquid`. Finally, Figure [5-11](#A437216_1_En_5_Chapter.html#Fig11)
    shows the result of implementation in the browser .


    ![A437216_1_En_5_Fig11_HTML.jpg](A437216_1_En_5_Fig11_HTML.jpg)


    Figure 5-11


    The Recommended Accessories section on the Canon site is a good example of upselling
    through related products (left). Zen Pencil’s “You May Also Like…” section suggests
    alternative posters as a substitute to the current selection (right)


    ```

    {%- assign RELATED_PRODUCTS_LIMIT = 4 -%}

    {%- if product.metafields.theme.related_products != blank -%}

    {%- assign related_product_handles = product.metafields.theme.related_products
    | split: '','' -%}

    {%- for related_product_handle in related_product_handles -%}

    ... render products from metafield...

    {%- endfor -%}

    {%- else -%}

    {%- assign related_collection_handle = product.handle | append: ''-related'' -%}

    {%- assign related_collection = collections[related_collection_handle] -%}

    {%- if related_collection and related_collection.products.size > 0 %}

    {%- for related_product in related_collection.products limit: RELATED_PRODUCTS_LIMIT
    -%}

    ... render products from collection...

    {%- endfor -%}

    {%- else -%}

    {%- assign related_collection = nil -%}

    {%- for collection in product.collections -%}

    {%- unless collection.handle == ''all'' -%}

    {%- if related_collection == blank or collection.products.size > related_collection.products.size
    -%}

    {%- assign related_collection = collection -%}

    {%- if related_collection.products.size > 5 -%}

    {%- break -%}

    {%- endif -%}

    {%- endif -%}

    {%- endunless -%}

    {%- endfor -%}

    {%- for related_product in related_collection.products limit: RELATED_PRODUCTS_LIMIT
    -%}

    ... render products from collection...

    {%- endfor -%}

    {%- endif -%}

    {%- endif -%}

    Listing 5-3

    The Logic Outline for a related-products.liquid Liquid Snippet

    ```


    ![A437216_1_En_5_Fig12_HTML.jpg](A437216_1_En_5_Fig12_HTML.jpg)


    Figure 5-12


    The result of adding the related product snippet at the bottom of the example
    theme’s product page


    ```


    ...


    ...


    You may also like

    {%- include ''related-products'' -%}


    Listing 5-4

    Inclusion of Related Products Liquid Snippet at the Bottom of templates/product.liquid

    ```


    ## Improving the Product Page


    Congratulations! The desktop version of your product page has now fully implemented
    your planned layout design from Figure [5-4](#A437216_1_En_5_Chapter.html#Fig4).
    You have a simple, but fully-functional, product page that customers can use to
    view your products, select a desired product variant, and add that selection to
    their carts. Because this page is so simple, it’s very quick to load and doesn’t
    require any JavaScript to function.


    For the rest of this chapter, we’ll be walking through the implementation of common
    features that theme designers might add to this starting point.'
  trans: '

    ### Shopify 上的推荐商品


    Shopify 并没有为管理推荐商品列表提供任何明确的内置支持，尽管有很多 Shopify 应用可以提供此功能（在 Shopify 应用商店中搜索“product
    recommendations”）。


    虽然这些应用可以做一些非常巧妙的事情，例如使用销售数据算法生成推荐，或为个别访客量身定制推荐，但我更倾向于在求助应用之前，先尝试用 Shopify 的“原生”概念和一些自定义的
    Liquid 代码来解决问题。这不仅能降低经营店铺的持续成本，还能减少应用相互干扰、破坏店铺功能或对性能产生负面影响的风险。虽然应用可能提供稍多一些的功能，但在许多情况下，基于主题的解决方案对于商家的需求来说已经足够好了。


    我们可以通过几种方式使用 Shopify 的内置功能来优雅地实现相关和替代产品功能。首先，我们可以允许店主为其店铺中的每款产品手动指定一个推荐商品列表，然后在产品模板中显示该列表。店主可以通过以下两种方法之一来实现此指定：


    -   在产品上设置一个包含相关产品标识符列表的元字段。你将在本章后面了解更多关于元字段的内容；现在，你只需要知道它们允许店主在产品和其他 Shopify
    对象上存储自定义信息。这些信息可以在 Liquid 中检索，并用于渲染相关产品列表。

    -   使用命名约定，创建一个与产品 URL（标识符）匹配的集合，然后用所需的相关产品填充该集合。例如，如果产品的标识符是 `foraker-canvas-coat`，店主可以创建一个标识符为
    `foraker-canvas-coat-related` 的集合。Liquid 代码可以计算出当前产品相关产品集合的预期名称，检查它是否存在，如果存在则显示这些产品。


    手动指定推荐商品的优点在于，它让店主能够对产品列表中显示的产品进行精细控制，但其缺点是创建和维护起来非常耗时。作为替代方案，我们可以使用一些 Liquid
    逻辑来自动计算相关产品列表。同样，我们有两种可能的策略：


    -   找到一个当前产品所属的非通用集合，并认为该集合中的其他产品是“相关的”。这可能是一种简单的方法，但在许多情况下都能产生足够好的结果。

    -   将当前产品与商店中的所有其他产品进行比较，并根据它们与当前产品共享的标签和集合数量来“评分”。得分较高的产品被认为与当前产品密切相关。这种方法的实现稍微复杂一些，但可能比第一种方法产生更好的结果。


    对于示例主题，我们将实现一个 Liquid 片段（`snippets/related-products.liquid`，位于主题目录中），该片段支持这三种方法，用于在页面上显示最多四个相关产品的列表。当在产品页面上引用时，它将：


    1.  检查产品是否定义了“related_products”元字段。如果是，它将使用该元字段来渲染其中列出的前四个产品。

    2.  如果没有定义“related_products”元字段，那么它将检查是否存在一个与产品具有相同标识符（但末尾带有 `-related`）的集合。如果存在，它将渲染该集合中的前四个产品。

    3.  如果既没有元字段也没有集合存在，那么它将回退到寻找当前产品所属的一个集合，并渲染该集合中的前四个产品。


    这种方法为我们提供了一种基本方式，可以在每个产品页面上自动查找相关产品，同时让店主可以选择创建集合或元字段来覆盖默认行为，如果他们需要更多控制的话。该片段逻辑的概要如代码清单
    5-3 所示（为简洁起见进行了删节；完整版本可在示例主题仓库中找到）。代码清单 5-4 展示了如何在 `product.liquid` 中包含该片段。最后，图
    5-11 展示了在浏览器中实现的结果。


    ![A437216_1_En_5_Fig11_HTML.jpg](img/A437216_1_En_5_Fig11_HTML.jpg)


    图 5-11


    佳能网站上的“推荐配件”部分是通过相关产品进行追加销售的绝佳示例（左图）。Zen Pencil 的“您可能也喜欢…”部分则建议了替代海报作为当前选择的替代品（右图）


    ```

    {%- assign RELATED_PRODUCTS_LIMIT = 4 -%}

    {%- if product.metafields.theme.related_products != blank -%}

    {%- assign related_product_handles = product.metafields.theme.related_products
    | split: '','' -%}

    {%- for related_product_handle in related_product_handles -%}

    ... 从元字段渲染产品...

    {%- endfor -%}

    {%- else -%}

    {%- assign related_collection_handle = product.handle | append: ''-related'' -%}

    {%- assign related_collection = collections[related_collection_handle] -%}

    {%- if related_collection and related_collection.products.size > 0 %}

    {%- for related_product in related_collection.products limit: RELATED_PRODUCTS_LIMIT
    -%}

    ... 从集合渲染产品...

    {%- endfor -%}

    {%- else -%}

    {%- assign related_collection = nil -%}

    {%- for collection in product.collections -%}

    {%- unless collection.handle == ''all'' -%}

    {%- if related_collection == blank or collection.products.size > related_collection.products.size
    -%}

    {%- assign related_collection = collection -%}

    {%- if related_collection.products.size > 5 -%}

    {%- break -%}

    {%- endif -%}

    {%- endif -%}

    {%- endunless -%}

    {%- endfor -%}

    {%- for related_product in related_collection.products limit: RELATED_PRODUCTS_LIMIT
    -%}

    ... 从集合渲染产品...

    {%- endfor -%}

    {%- endif -%}

    {%- endif -%}

    代码清单 5-3

    related-products.liquid Liquid 片段的逻辑概要

    ```


    ![A437216_1_En_5_Fig12_HTML.jpg](img/A437216_1_En_5_Fig12_HTML.jpg)


    图 5-12


    将相关产品片段添加到示例主题产品页面底部的结果


    ```


    ...


    ...


    您可能也喜欢

    {%- include ''related-products'' -%}


    代码清单 5-4

    在 templates/product.liquid 底部包含相关产品 Liquid 片段

    ```


    ## 改进产品页面


    恭喜！你的产品页面的桌面版现在已经完全实现了你在图 5-4 中计划的布局设计。你拥有了一个简单但功能齐全的产品页面，客户可以使用它来浏览你的产品、选择所需的产品变体，并将该选择添加到购物车。由于这个页面非常简洁，它加载速度很快，并且无需任何
    JavaScript 即可运行。


    在本章的剩余部分，我们将逐步实现主题设计者可能在此起点上添加的一些常见功能。

