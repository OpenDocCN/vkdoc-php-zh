    代码清单 4-1

    navigation.php

    ```


    # 创建两个虚拟页面视图文件


    在编写新代码时，从小处着手总是一个明智的主意。让我们准备两个独立的页面视图：一个用于图库，另一个用于上传表单。每个页面视图都将从单独的文件中生成并返回。因此，我们在
    `views` 文件夹中创建两个文件。


    ```

    上传新图片";

    ?>

    代码清单 4-3

    upload.php

    ```


    ```

    图片图库";

    ?>

    代码清单 4-2

    gallery.php

    ```


    # 创建索引文件


    如前所述，每个网站都有一个索引页面。当用户输入 URL（例如 [`www.google.com`](http://www.google.com)）时，这是浏览器中显示的默认页面。作为网站的主要入口，页面必须简洁、清晰、可靠且具有吸引力，这一点很重要。我们索引页面的第一个版本将显示一个功能性的动态导航，链接到两个非常简单的页面视图。


    ```

    setTitle("动态图片图库");

    $pageData->setContent($nav);

    $navigationIsClicked = isset($_GET[''page'']);

    if ( $navigationIsClicked ) {

    $fileToLoad = $_GET[''page''];

    } else {

    $fileToLoad = "gallery";

    }

    include_once "views/$fileToLoad.php";

    $pageData->appendContent($info);

    require "templates/page.php";

    echo $page;

    ?>

    代码清单 4-4

    index.php

    ```


    正如我们所见，索引页面与第 3 章的最后一个版本类似。重用代码可以加快创建时间，同时提高可靠性。`Page_Data` 类和页面文件没有显示，因为到目前为止，我们没有对之前的版本进行任何更改。


    # 测试时间


    到目前为止的所有代码都与我们在前几章中使用的代码类似。总共只有几行代码，但这些代码足以进行初步测试。在处理代码时，建议我们先写一点代码，进行测试，然后再写更多代码。


    通过频繁测试进度，我们能够在错误初期就发现它们。在较少的代码行中查找错误要容易得多。测试进度只需要一点时间。让我们养成经常测试并尽早捕获错误的习惯。


    如前所述，优秀的程序员会为意外情况做好准备。在测试程序时，要努力尝试破坏代码。看看是否能导致代码产生错误。如果产生了错误，调整代码使其能够优雅地处理意外情况。让我们测试代码并查看结果。


    ![](img/323857_3_En_4_Fig3_HTML.jpg)


    此图展示了程序员向网站上传新图片时窗口的显示效果。


    **图 4-3** 点击“上传新图片”后的 `index.php` 视图


    ![](img/323857_3_En_4_Fig2_HTML.jpg)


    此图展示了程序员尝试查看网站图片时屏幕的显示效果。


    **图 4-2** `index.php` 的默认视图


    **练习**：尝试破坏当前代码。对 `Page Data` 类进行更改，导致上传页面无法正常显示。**提示**：更改 `if` 语句中检查的值。目前至少有一个
    `if` 语句需要调整，以使所有信息都能正确显示。你能找到它吗？请记住，如果无法验证传入的信息，该类将显示默认值。


    # 准备用于显示图片的函数


    让我们更新图库文件，声明一个简单的函数，该函数仅返回一个 HTML 字符串，其中包含一个带有单个 `<li>` 的 `<ul>`。此更改是朝着网站能够显示给定文件夹（目录）中包含的所有图片迈出的一步。

