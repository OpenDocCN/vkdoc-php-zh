  \ 会截断由 `pad_string` 定义的模式。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n\
  ### 字符与单词计数\n\n确定给定字符串中的总字符数或单词数通常非常有用。尽管 PHP 强大的字符串解析能力早已使这项任务变得简单，但最近新增的两个函数将此过程形式化了。这两个函数都在本节中介绍。\n\
