  ### 如有疑问，请在提问前先搜索


  到 2006 年，Drupal 已具备在自由开源软件世界乃至整个网站开发领域扮演重要角色的定位。但严格来说，OSL 所提供的物理基础设施并非确保 Drupal
  这类实体具备足够扩展性以茁壮发展的唯一基础设施类型；社区基础设施本身同样至关重要。


  下一节将概述社区基础设施中重要组成部分——Drupal 协会——的成立过程。这个过程历时漫长，在围绕协会应取何种形式展开研究与辩论的同时，Drupal 社区内部也在发生其他令人振奋的活动；不过，深入探究协会的诞生过程在多层面都具有启示意义。不仅协会章程中确立的框架界定了
  Drupal 的发展方式（以及谁有权影响这种发展），观察社区构建这一框架的过程同样耐人寻味。


  就像服务器崩溃前数月，Drupal 社区已在讨论新基础设施需求，直到崩溃使获取设施成为刻不容缓的首要任务；关于组建某种能处理 Drupal 财务事务的非营利实体的讨论，也已酝酿了一段时间。


  ![images](img/3504.jpg)


  ***图 35-4.** （玩笑式的？）2004 年除夕预测，由时任`drupal.org`服务器维护者 Kjartan Mannes 发布*


  严肃地说，大家都很清楚，任何建立的架构都将对 Drupal 社区（乃至软件本身）产生深远的经济、法律和文化影响。正如 Steven Peck 在 2005 年
  6 月 29 日`drupal.org`论坛回复中对一位担忧 Drupal 缺乏大规模募资计划的用户所言："正在讨论中。好事多磨。"^(21)


  服务器崩溃几天后，Dries 于 2005 年 7 月 14 日在`drupal.org`宣布将全部募资所得移交给 OSL，这又引发了关于基金会问题的新一轮公开辩论。对于人们担忧
  1 万美元中没有任何部分用于建立某种基金会，他们得到（礼貌程度不一的）保证：


  1.  确实已为创建非营利实体预留了资金，形式为承诺的配套资金（在需要时提供）。

  2.  将全部服务器捐款转交给第三方（该第三方恰好不像 Dries 那样拥有非营利身份）是明智之举，因为第三方会将资金用于服务器和托管——这正是捐赠者期望资金用途所在；而当募集的捐款存放在私人账户时，财务责任问题可能变得模糊，无论这个私人个体多么值得信赖和敬业。

  3.  与此事利益攸关的 Drupal 社区成员已在着手处理这个复杂问题，进行细致广泛的研究，并将继续努力直至达成满意的解决方案。


  换言之，资金并非主要问题。Advomatic、CivicSpaceLabs、Google 和 Packt Publishing 承诺的未公开金额足以覆盖成本；主要问题在于任务的复杂程度。要推进工作，Drupal
  社区必须就它需要和想要（或许更重要的是，不需要和不想要）什么样的基金会达成内部共识。正如 Chris Messina（factoryjoe）在 2005 年 7
  月 14 日`drupal.org`评论"关于 Drupal 基金会"中指出的，除了"评估各类法律服务提供商"外，另一个优先事项是"向广大开源社区征求想法、意见及其他有益见解，以找到正确做法——如果没必要，我们才不会重新发明轮子！"^(22)


  2005 年波特兰 DrupalCon（8 月 1 日至 5 日与俄勒冈州波特兰的 O''Reilly 开源大会同期举行的免费会议）提供了圆桌讨论的场所，讨论有关
  Drupal 基金会的需求、期望和顾虑。OSCON 本身则提供了向其他 FOSS 基金会创建者取经的机会。Boris Mann 在`drupal.org`新闻与公告栏发布的帖子"2005
  年波特兰 DrupalCon：Drupal 基金会会议"总结了会议要点：


  "需求示例包括：


  *   接收和发放资金的能力

  *   持有资产（如服务器和其他硬件）

  *   跟踪资金及其使用情况的簿记能力


  小组关于 Drupal 基金会目标的部分想法：


  *   吸引更多用户和开发者

  *   为相关项目提供服务器基础设施

  *   管理知识产权（商标、版权、许可等）

  *   资助开发者聚会"^(23)


