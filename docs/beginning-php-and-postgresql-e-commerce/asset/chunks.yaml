  trans: "  \n**服务客户**：客户是否需要您提供的产品附带额外的帮助？您是否需要提供保修、服务合同或其他支持服务？\n\n**吸引客户回流**：您将如何吸引客户再次访问网站？他们是否只会在购物时访问网站，还是会有线上浏览的潜在顾客？您的产品是否为消耗品，并且您能否预测客户何时需要新品？\n\
    \n回答完这些问题后，您就可以开始设计网站了，因为您清楚自己是在为客户设计，而不仅仅是凭一时灵感行事。确定这些问题的答案也有助于确保您的设计覆盖所有关键领域，避免出现重大遗漏，否则后期修复将是一场噩梦。\n\
    \n本书中的示例网站刻意采用了通用方法，向您展示最常见的电子商务技术。然而，要真正在竞争中脱颖而出，您不需要花哨的功能或 Flash 动画——您只需要比任何人都更了解、吸引并服务好客户。在您着手设计和搭建网站之前，请先思考这一点。\n\
    \n**风险与威胁**\n\n以上种种可能会让人觉得电子商务不可能失败。然而，现在需要冷静下来，意识到即使是精心策划的计划也常常会出错。一些风险尤其与电子商务公司相关，例如：\n\
    \n-   黑客攻击\n-   信用卡诈骗\n-   硬件故障\n-   不可靠的运输服务\n-   软件错误\n-   法律变更\n\n您无法消除这些风险，但可以尝试去了解它们，并保护自己免受其害。本书开发的软件在一定程度上解决了这些问题，但许多风险与网站本身关系不大。\n\
    \n保护网站免遭多种风险的重要方法是做好备份。您知道备份很重要。但如果您跟我一样，到了下班时间，节省五分钟早点回家似乎更重要。但当您有一个实时网站时，这就容不得选择了。\n\
    \n本书没有过多讨论电子商务的法律层面，因为我们是程序员，不是律师。然而，如果您要搭建的电子商务网站远不止在线旧货甩卖，那么在您的业务上线之前，就需要研究这些问题。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH01.qxd 10/4/06 6:16\
    \ PM Page 7\n\n第 1 章 ■ 电子商务网站起步\n\n**7**\n\n既然谈到了风险和威胁，有一个问题可能会严重损害您的电子商务网站，那就是不可靠的订单履行。这是一本编程书籍，侧重于向客户展示产品并将订单传达给网站所有者。流程中必不可少的一环是产品交付，要做到这一点，您需要在开店之前建立一个良好的物流网络。如果您的商店无法交付商品，客户就不会再回来，也不会向朋友推荐。\n\
    \n**提示** Webmonkey 提供了一个优秀的通用电子商务教程，涵盖了税务、运输以及您在设计网站时会遇到的许多问题，网址为 `http://www.webmonkey.com/webmonkey/e-business/building/tutorials/tutorial3.html`。在开始设计网站之前，请先查看此教程。\n\
    \n**为商业而设计**\n\n搭建电子商务网站需要大量投资。如果您分阶段设计网站，就可以减少初始投资，从而在想法不成功时降低损失。您可以根据早期阶段的结果来评估是否值得添加额外功能，甚至用网站的收入来资助未来的开发。退一步说，计划分阶段搭建网站意味着您可以比将每个可能的功能都塞进第一个版本更早地让网站上线上线并接收订单。\n\
    \n即使完成了最初计划的阶段，事情也可能不会就此结束。在规划大型软件项目时，重要的是以易于未来非计划性增长的方式进行设计。在第 2 章中，我们将开始处理搭建电子商务网站的技术细节，您将学习如何设计网站架构以实现长期开发灵活性。\n\
    \n如果您是为客户搭建网站，他们会希望看到自己的选择是开放的。分阶段规划网站（或任何其他软件）将有助于客户在跟您合作时感到安心。他们将能看到您正在完成工作，并且如果出于任何原因他们觉得不想继续投资开发，可以在任一阶段结束时决定终止项目。\n\
    \n**第一阶段：建立网站**\n\n第 2 章到第 7 章专注于为网站建立基本框架并上线产品目录。我们将首先构建基本的网站架构，并决定应用程序的不同部分如何协同工作。然后，我们将产品目录构建到该架构中。您将学习如何：\n\
    \n-   设计一个用于存储产品目录的数据库，包含部门、分类和产品\n-   编写`SQL`（结构化查询语言）和`PHP`（超文本预处理器）代码来访问这些数据，使产品目录正常运行\n\
    -   提供产品搜索引擎\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH01.qxd\
    \ 10/4/06 6:16 PM Page 8\n\n**8**\n\n第 1 章 ■ 电子商务网站起步\n\n-   通过 PayPal Website\
    \ Payments Standard 接收付款\n-   为网站管理员提供一个网站私有区域，以便他们在线管理目录\n\n构建完这个目录后，您将看到如何通过将其与\
    \ PayPal 的购物车和订单处理系统集成来销售产品，该系统将为您处理信用卡交易，并通过电子邮件将订单详细信息发送给您。这些订单将手动处理，但在电子商务网站的早期阶段，处理订单所花费的时间将少于开发自动化系统所需的时间。\n\
    \n**第二阶段：创建您自己的购物车**\n\n使用 PayPal 的购物车是可以的，而且非常简单，但这确实意味着您会失去很多优势。例如，您无法控制 PayPal\
    \ 购物车的外观和感觉，而如果您使用自己的购物车，则可以使其成为网站不可或缺的一部分。这是一个显著的优势，但与其他优势相比，这只是表面上的。例如，有了自己的购物车，您可以将完整的订单作为订单处理过程的一部分存储在数据库中，然后利用这些数据了解客户。通过额外的工作，您还可以将购物篮和结账页面作为销售更多产品的平台。您是否经常被本地商店结账区附近的冲动消费所诱惑？嗯，冲动购物在电子商务中同样有效。拥有自己的购物车和结账页面，您可以选择在结账时提供来自购物车的低价特惠。您甚至可以根据购物车的内容进行分析并给出建议。\n\
    \n第 8 章到第 10 章向您展示如何：\n\n-   构建您自己的购物车\n-   将完整订单传递给 PayPal 进行信用卡处理\n-   创建订单管理页面\n\
    -   实现产品推荐系统\n\n再次强调，在第二阶段结束时，我们的网站将完全可运行。如果您愿意，可以保持现状，或在现有的基于 PayPal 的支付系统中添加功能。但当网站发展壮大后，您将希望自己开始处理订单和信用卡。在这部分，事情会变得复杂，您需要认真且谨慎地对待网站的安全性。\n\
    \n**第三阶段：处理订单与添加功能**\n"
- fmt: '# The Core of E-Commerce


    The core of e-commerce—and the bit that really separates it from other web-development
    projects—is handling orders and credit cards. `PayPal` has helped us put this
    off, but there are many good reasons why—eventually—you’ll want to part company
    with `PayPal`:


    **Cost**: `PayPal` is not expensive, but the extra services it offers must be
    paid for somehow.


    Moving to a simpler credit card processing service can mean lower transaction
    costs (this is not a rule though), although developing your own system will obviously
    incur upfront costs.


    **Freedom**: `PayPal` has a fairly strict set of terms and conditions and is designed
    for residents of a limited number of countries. By taking on more of the credit
    card processing responsibility yourself, you can better control the way your site
    works. As an obvious example, you can accept payment using regional methods such
    as the `Switch` debit cards common in the United Kingdom.


    **Integration**: If you deal with transactions and orders using your own system,
    you can integrate your store and your warehouse to whatever extent you require.
    You could even automatically contact a third-party supplier and have the supplier
    ship the goods straight to the customer.


    **Information**: When you handle the whole order yourself, you can record and
    collate all the information involved in the transaction—and then use it for marketing
    and research purposes.


    By integrating the order processing with the warehouse, fulfillment center, or
    suppliers, you can reduce costs significantly. This might reduce the need for
    staff in the fulfillment center or allow the business to grow without requiring
    additional staff.


    Acquiring information about customers can feed back into the whole process, giving
    you valuable information about how to sell more. At its simplest, you could email
    customers with special offers or just keep in touch with a newsletter. You also
    could analyze buying patterns and use that data to formulate targeted marketing
    campaigns.


    ## Phase III


    During Phase III, you will learn how to:


    - Build a customer accounts module so that customers can log in and retrieve their
    details every time they make an order

    - Allow customers to add product reviews

    - Integrate `Amazon.com` products into your web site using `XML Web Services`

    - Establish secure connections using `SSL` (Secure Socket Layer) so that data
    sent by users is encrypted on its travels across the Internet

    - Charge credit cards using `DataCash` and `Authorize.net`

    - Store credit card numbers securely in a database


    This third phase is the most involved of all of them and requires some hard and
    careful work. By the end of Phase III, however, you will have an e-commerce site
    with a searchable product catalog, shopping cart, secure check out, and complete
    order-processing system.


    ## HatShop


    As we said earlier, we’re going to build an online shop called `HatShop` (which
    will sell, surprisingly enough, hats). Figure 1-1 shows how `HatShop` will look
    at some point during the second stage of development.


    ![Figure 1-1](images/00150.png)


    **Figure 1-1**: `HatShop` during Phase II of development


    > **Tip**: You can find a link to an online version of `HatShop` at `http://www.cristiandarie.ro/php-postgresql-ecommerce/`.
    Many thanks go to the folks at Hats in the Belfry (`http://www.hatsinthebelfry.com`)
    who allowed us to use some of their products to populate our virtual `HatShop`
    store.


    For the purposes of this book, we’ll assume that the client already exists as
    a mail-order company and has a good network of customers. The company is not completely
    new to the business, and wants the site to make it easier and more enjoyable for
    its existing customers to buy—with the goal that they’ll end up buying more.


    Knowing this, I suggest the phased development because:


    - The company is unlikely to get massive orders initially—we should keep the initial
    cost of building the web site down as much as possible.

    - The company is accustomed to manually processing mail orders, so manually processing
    orders emailed by `PayPal` will not introduce many new problems.

    - The company doesn’t want to invest all of its money in a massive e-commerce
    site, only to find that people actually prefer mail order after all! Or it might
    find that, after Phase I, the site does exactly what it wants, and there’s no
    point in expanding it further. Either way, I hope that offering a lower initial
    cost gives my bid the edge. (It might also mean I can get away with a higher total
    price.)


    Because this company is already a mail-order business, it probably already has
    a merchant account and can process credit cards. Therefore, moving on to Phase
    III as soon as possible would be best for this company so it can benefit from
    the preferential card-processing rates.


    ## Summary


    In this chapter, we’ve seen some of the principles of e-commerce in the real,
    hostile world where it’s important to focus on short-term revenue and keeping
    risks down. We’ve looked at the three basic reasons an e-commerce site can make
    money:


    - Acquiring more customers

    - Making customers spend more

    - Reducing the costs of fulfilling orders


    We’ve applied those principles to a three-phase plan that provides a deliverable,
    usable site at each stage and continues to expand throughout the book.


    At this point, you’ve presented your plan to the owners of the hat shop. In the
    next chapter, you’ll put on your programming hat and start to design and build
    the web site (assuming you get the contract, of course).


    ---


    # Chapter 2: Laying Out the Foundations


    Now that you’ve convinced the client that you can create a cool web site to complement
    his or her activity, it’s time to stop celebrating and start thinking about how
    to put into practice all the promises you’ve made. As usual, when you lay down
    on paper the technical requirements you must meet, everything starts to seem a
    bit more complicated than initially anticipated.


    > **Note**: Be warned that this and the next are dense chapters, and you may found
    them pretty challenging if you don’t have much experience with `PHP` or `PostgreSQL`.
    Books such as *Beginning PHP and PostgreSQL 8: From Novice to Professional* (Apress,
    2006) do a good job at preparing you to build your first e-commerce web site.
    We strongly recommend that you consistently follow an efficient project-management
    methodology to maximize the chances of the project’s success, on budget and on
    time. Most project-management theories imply that you and your client have signed
    an initial requirements/specifications document containing the details of the
    project you’re about to create. You can use this document as a guide while creating
    the solution; it also allows you to charge extra in case the client brings new
    requirements or requests changes after development has started. See Appendix B
    for more details.'
