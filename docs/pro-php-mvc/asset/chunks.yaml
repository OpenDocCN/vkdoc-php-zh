    ## 引言


    ### 本书面向的读者


    本书同时适用于新手和老手开发者。它的设计是先讲解基础内容，再涉及高级主题。这意味着经验丰富的开发者可能会觉得某些部分（例如解释设计模式的部分）是老生常谈。如果你属于这种情况，可以自由地跳过，直接阅读更具挑战性的内容。


    如果你对面向对象编程、框架构建或 PHP 本身尚不熟悉，我建议你通读全书，并在阅读间歇通过编写代码来回顾所学内容。


    ### 本书不会教授的内容


    本书不会教您 PHP。它假定您已具备 PHP 基础知识，并且至少能够熟练地搭建 PHP 网站。如果您是 PHP 新手，甚至从未使用过它，我建议您阅读 W.
    Jason Gilmore（Apress，2010）所著的 *Beginning PHP 5 and MySQL*（www.apress.com/9781893115514），这本书能让您对
    PHP 有出色的理解。


    本书不会教您如何成为 CodeIgniter、Zend Framework 或 CakePHP 的专家。虽然本书会讨论并使用这些框架，但使用它们的目的是为了说明它们的方法与我们构建自有框架的方法之间的差异。


    因此，有许多方式可以更高效地使用它们，或者遵循其各自社区和文档推荐的风格。本书使用它们的目的纯粹是为了说明问题。


    ### 本书将教授的内容


    如果你对学习如何更好地使用面向对象编程、构建框架或设计清晰一致的 API 感到好奇，那么你会喜欢这本书。


    如果你对流行的 MVC 框架（如后续章节中演示的那些）是如何构建的，或者它们为何选择了某些开发路径感到好奇，那么你会喜欢这本书。


    如果你想成为一名更好的程序员，那么我希望你会发现这本书的价值无可估量。


    ### 源代码


    本书中的每一行代码都与归档文件（可从配套网站下载）中的代码保持一致。


    尽管已尽力确保代码在语法上是正确的（因此可以直接在您的代码编辑器中运行），但有时为了缩短较长的代码清单，可能会省略一些依赖项。在这种情况下，请放心，被省略的代码已在之前章节或同一章节的前面页面中解释和创建过。


    如有疑问，或在执行源代码时遇到问题，请参考源代码归档文件。


    ---


    ## 第 1 章：MVC 简介


    软件开发并不是一个新概念。据说，埃达·洛夫莱斯在 19 世纪中期为分析机（查尔斯·巴贝奇设计的第一台机械计算机原型）编写了第一个计算机程序。


    从那时起已经过去了很长时间，软件开发已发展成为可以说对人类发展贡献最大的领域之一。


    设计优秀的软件很难。它需要考虑到你需要构建的应用程序的方方面面，并且由于需要足够具体以满足当前需求从而完成工作，同时又要足够通用以应对未来的问题，这使得事情变得更加复杂。许多经验丰富的开发者都遇到过这些问题，随着时间的推移，一些通用的模式已经浮现出来，有助于解决这些问题。


    结构建筑师克里斯托弗·亚历山大首次以可以应用于软件开发的方式描述了模式。他说：“每个模式都描述了我们环境中反复出现的一个问题，然后描述了该问题解决方案的核心，这样你就可以无数次地使用这个解决方案，而不会两次都以完全相同的方式去做。”他可能是在谈论房屋或城市，但他的话抓住了我们在考虑如何为
    Web 应用程序构建一个稳固、安全且可复用的框架时意图的精髓。


    ### 什么是 MVC？


    MVC（模型-视图-控制器）是一种软件设计模式，它围绕三种主要组件类型在编程语言（如 PHP）中的相互连接而构建，通常重点关注面向对象编程（OOP）的软件范式。这三种组件类型被松散地称为模型、视图和控制器。让我们分别讨论它们，然后看看它们是如何组合在一起的。


    模型是存放应用程序所有业务逻辑的地方。业务逻辑可以是任何特定于应用程序如何存储数据，或使用第三方服务以满足其业务需求的内容。如果应用程序需要访问数据库中的信息，执行该操作的代码将存放在模型中。例如，如果需要获取股票数据或发布关于新产品的推文，这些代码也将存放在模型中。


    视图是存放应用程序所有用户界面元素的地方。这可以包括我们的 HTML 标记、CSS 样式表和 JavaScript 文件。用户看到或与之交互的任何内容都可以存放在视图中，有时用户看到的内容实际上是同一个请求中许多不同视图的组合。

