- fmt: "# Exercise: Creating the `search_box` Componentized Template\n\n## 1. Create\
    \ a new template file named `search_box.tpl` in the `presentation/templates` folder,\
    \ and add the following code to it:\n\n```\n{* search_box.tpl *}\n{load_search_box\
    \ assign=\"search_box\"}\n{* Start search box *}\n<div class=\"left_box\" id=\"\
    search_box\">\n<p>Search the Catalog</p>\n<form action={\"index.php\"|prepare_link:\"\
    http\"}>\n<input maxlength=\"100\" id=\"Search\" name=\"Search\"\nvalue=\"{$search_box->mSearchString}\"\
    \ size=\"23\" />\n<input type=\"submit\" value=\"Go!\" /><br />\n<input type=\"\
    checkbox\" id=\"AllWords\" name=\"AllWords\"\n{if $search_box->mAllWords == \"\
    on\" } checked=\"checked\" {/if}/> Search for all words\n</form>\n</div>\n{* End\
    \ search box *}\n```\n\n## 2. Create a new Smarty function plugin file named `function.load_search_box.php`\
    \ in the `presentation/smarty_plugins` folder with the following code in it:\n\
    \n```\n<?php\n// Plugin functions inside plugin files must be named: smarty_type_name\n\
    function smarty_function_load_search_box($params, $smarty)\n{\n  // Create SearchBox\
    \ object\n  $search_box = new SearchBox();\n  // Assign template variable\n  $smarty->assign($params['assign'],\
    \ $search_box);\n}\n\n// Manages the search box\nclass SearchBox\n{\n  // Public\
    \ variables for the smarty template\n  public $mSearchString = '';\n  public $mAllWords\
    \ = 'off';\n\n  // Class constructor\n  public function __construct()\n  {\n \
    \   if (isset ($_GET['Search']))\n      $this->mSearchString = $_GET['Search'];\n\
    \n    if (isset ($_GET['AllWords']))\n      $this->mAllWords = $_GET['AllWords'];\n\
    \  }\n}\n?>\n```\n\n## 3. Add the following styles needed in the `search_box`\
    \ template file to the `hatshop.css` file:\n\n```\n#search_box\n{\n  border: 1px\
    \ solid #0583b5;\n}\n#search_box p\n{\n  background: #0583b5;\n}\nform\n{\n  margin:\
    \ 2px;\n}\ninput\n{\n  font-family: tahoma, verdana, arial;\n  font-size: 11px;\n\
    }\n```\n\n## 4. Modify the `index.tpl` file to load the newly created template\
    \ file:\n\n```\n...\n{include file=\"departments_list.tpl\"}\n{include file=\"\
    $categoriesCell\"}\n{include file=\"search_box.tpl\"}\n...\n```\n\n## 5. Load\
    \ your project in a browser, and you'll see the search box resting nicely in its\
    \ place (refer to Figure 5-1).\n\n## How It Works: The `search_box` Componentized\
    \ Template\n\nBy now, you’re used to the way we use function plugins in conjunction\
    \ with Smarty templates. In this case, we use the plugin to maintain the state\
    \ of the search box after performing a search. When the page is reloaded after\
    \ clicking the Go! button, we want to keep the entered string in the text box\
    \ and also maintain the state of the `AllWords` check box.\n\nThe `load_search_box`\
    \ function plugin simply saves the values of the `Search` and `AllWords` query\
    \ string parameters, while checking to make sure these parameters actually exist\
    \ in the query string. These values are then used in the `search_box.tpl` Smarty\
    \ template to recreate the previous state.\n\nNote that we could have implemented\
    \ this functionality by reading the values of the `Search` and `AllWords` query\
    \ string parameters using `$smarty.get.Search` and `$smarty.get.AllWords` instead\
    \ of a plugin. However, having a plugin gives you more control over the process\
    \ and also avoids generating warnings in case the mentioned parameters don’t exist\
    \ in the query string.\n\n## Displaying the Search Results\n\nIn the next exercise,\
    \ you’ll create the componentized template that displays the search results.\n\
    \nTo make your life easier, you can reuse the `product_list` componentized template\
    \ to display the actual list of products. This is the componentized template that\
    \ we have used so far to list products for the main page, for departments, and\
    \ for categories. Of course, if you want to have the search results displayed\
    \ in another format, you must create another user control."
