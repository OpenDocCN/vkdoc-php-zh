  trans: '

    ### 在 `Date()` 和 `DateTime` 类之间做选择


    在显示日期时，使用 `DateTime` 类总是需要两步操作。你必须先实例化对象，然后才能调用 `format()` 方法。而使用 `date()` 函数，一步就能完成。由于它们使用相同的格式字符，因此在处理当前日期和/或时间时，`date()`
    无疑更胜一筹。


    对于显示当前日期、时间或年份等简单任务，请使用 `date()`。而 `DateTime` 类的真正优势在于，它可以使用表 14-5 列出的方法处理与日期相关的计算和时区。


    表 14-5. 主要的 `DateTime` 方法


    | 方法 | 参数 | 描述 |

    | --- | --- | --- |

    | `format()` | 格式字符串 | 使用表 14-4 中的格式字符格式化日期/时间。 |

    | `setDate()` | 年，月，日 | 更改日期。参数应用逗号分隔。超出允许范围的月份或天数会累加到结果日期中，如正文所述。 |

    | `setTime()` | 小时，分钟，秒 | 重置时间。参数是用逗号分隔的值。秒是可选的。超出允许范围的值会累加到结果日期/时间中。 |

    | `modify()` | 相对日期字符串 | 使用相对表达式更改日期/时间，例如 ''+2 weeks''。 |

    | `getTimestamp()` | 无 | 返回日期/时间的 Unix 时间戳。 |

    | `setTimestamp()` | Unix 时间戳 | 根据 Unix 时间戳设置日期/时间。 |

    | `setTimezone()` | `DateTimeZone` 对象 | 更改时区。 |

    | `getTimezone()` | 无 | 返回一个表示 `DateTime` 对象时区的 `DateTimeZone` 对象。 |

    | `getOffset()` | 无 | 返回与 UTC 的时区偏移量，以秒为单位。 |

    | `add()` | `DateInterval` 对象 | 将日期/时间增加指定时段。 |

    | `sub()` | `DateInterval` 对象 | 从日期/时间中减去指定时段。 |

    | `diff()` | `DateTime` 对象，布尔值 | 返回一个 `DateInterval` 对象，表示当前 `DateTime` 对象与作为参数传入的对象之间的差值。将可选的第二个参数设为
    `true`，可以将负值转换为其正值。 |


    使用带有超出范围值的 `setDate()` 和 `setTime()` 时，超出部分会累加到结果日期或时间中。例如，将月份设为 14 会将日期设置为下一年的二月。将小时设为
    26 会导致下一天的凌晨 2 点。


    `setDate()` 有一个有用的技巧：通过将月份值设为下一个月，并将日期设为 0，可以将日期设置为任意月份的最后一天。`setDate.php` 中的代码演示了这一点，分别以
    2015 年 2 月和 2016 年（闰年）2 月的最后一天为例。


    ```

    <?php


    $format = ''F j, Y'';


    $date = new DateTime();


    $date->setDate(2015, 3, 0);


    ?>

    ```


    ```

    <p>非闰年：<?= $date->format($format); ?>。</p>


    <p>闰年：<?php $date->setDate(2016, 3, 0);


    echo $date->format($format); ?>。</p>

    ```


    上述示例将产生以下输出：


    ![A978-1-4842-0635-5_14_Figc_HTML.jpg](img/A978-1-4842-0635-5_14_Figc_HTML.jpg)


    ### 使用相对日期处理溢出问题


    `modify()` 方法接受一个相对日期字符串，这可能会产生意想不到的结果。例如，如果你向一个表示 2011 年 1 月 31 日的 `DateTime`
    对象添加一个月，得到的结果值不是 2 月的最后一天，而是 3 月 3 日。


    这是因为在原始日期上加一个月会得到 2 月 31 日，但在非闰年中，二月只有 28 天。于是，超出范围的值会累加到月份中，得到 3 月 3 日。如果你随后从同一个
    `DateTime` 对象中减去一个月，你会回到 2 月 3 日，而不是原始起始日期。`date_modify_01.php` 中的代码说明了这一点，如图
    14-9 所示。


    ```

    <?php


    $format = ''F j, Y'';


    $date = new DateTime(''January 31, 2015'');


    ?>

    ```


    ```

    <p>原始日期：<?= $date->format($format); ?>。</p>


    <p>加一个月：<?php


    $date->modify(''+1 month'');


    echo $date->format($format);


    $date->modify(''-1 month'');


    ?>


    <p>减一个月：<?= $date->format($format); ?>

    ```


    ![A978-1-4842-0635-5_14_Fig9_HTML.jpg](img/A978-1-4842-0635-5_14_Fig9_HTML.jpg)


    图 14-9. 加减月数可能导致意外结果


    避免此问题的方法是在相对表达式中使用 `''last day of''`，如下所示（代码在 `date_modify_02.php` 中）：


    ```

    <?php


    $format = ''F j, Y'';


    $date = new DateTime(''January 31, 2015'');


    ?>

    ```


    ```

    <p>原始日期：<?= $date->format($format); ?>。</p>


    <p>加一个月：<?php


    $date->modify(''last day of +1 month'');


    echo $date->format($format);


    $date->modify(''last day of -1 month'');


    ?>


    <p>减一个月：<?= $date->format($format); ?>

    ```


    如图 14-10 所示，现在产生了期望的结果。


    ![A978-1-4842-0635-5_14_Fig10_HTML.jpg](img/A978-1-4842-0635-5_14_Fig10_HTML.jpg)


    图 14-10. 在相对表达式中使用 ''last day of'' 消除了该问题

    '
- fmt: '### Using the `DateTimeZone` Class


    A `DateTime` object automatically uses the web server’s default time zone unless
    you have reset the time zone using one of the methods described earlier. However,
    you can set the time zone of individual `DateTime` objects either through the
    optional second argument of the constructor or by using the `setTimezone()` method.
    In both cases, the argument must be a `DateTimeZone` object.


    To create a `DateTimeZone` object, pass one of the supported time zones listed
    at [`http://php.net/manual/en/timezones.php`](http://php.net/manual/en/timezones.php)
    as an argument to the constructor like this:


    `$UK = new DateTimeZone(''Europe/London'');`


    `$USeast = new DateTimeZone(''America/New_York'');`


    `$Hawaii = new DateTimeZone(''Pacific/Honolulu'');`


    When checking the list of supported time zones, it’s important to realize that
    they’re based on geographic regions and cities rather than on official time zones.
    This is because PHP automatically takes daylight saving time into account. Arizona,
    which doesn’t use daylight saving time, is covered by `America/Phoenix`.


    The organization of time zones into geographic regions produces some surprises.
    America doesn’t mean the United States of America, but the continents of North
    and South America and the Caribbean. As a result, Honolulu is not listed in America,
    but as a Pacific time zone. Europe also means the European continent, including
    the British Isles but excluding other islands. So, Reykjavik and Madeira are listed
    as Atlantic time zones, and the Norwegian island of Longyearbyen has the exclusive
    privilege of being the only Arctic time zone.


    The code in `timezones.php` creates `DateTimeZone` objects for London, New York,
    and Honolulu, and then initializes a `DateTime` object using the first one, like
    this:


    `$now = new DateTime(''now'', $UK);`


    After displaying the date and time using `echo` and the `format()` method, the
    time zone is changed using the `setTimezone()` method, like this:


    `$now->setTimezone($USeast);`


    The next time `$now` is displayed, it shows the date and time in New York. Finally,
    `setTimezone()` is used again to change the time zone to Honolulu, producing the
    following output:


    ![A978-1-4842-0635-5_14_Figd_HTML.jpg](A978-1-4842-0635-5_14_Figd_HTML.jpg)


    To find the time zone of your server, you can either check `php.ini` or use the
    `getTimezone()` method with a `DateTime` object. The `getTimezone()` method returns
    a `DateTimeZone` object, not a string containing the time zone. To get the value
    of the time zone, you need to use the `DateTimeZone` object’s `getName()` method,
    like this (the code is in `timezone_display.php`):


    `$now = new DateTime();`


    `$timezone = $now->getTimezone();`


    `echo $timezone->getName();`


    The `DateTimeZone` class has several other methods that expose information about
    a time zone. For the sake of completeness, they’re listed in Table [14-6](#A978-1-4842-0635-5_14_Chapter.html#Tab6),
    but the main use of the `DateTimeZone` class is to set the time zone for `DateTime`
    objects.


    **Table 14-6.** DateTimeZone methods


    | Method | Arguments | Description |

    | --- | --- | --- |

    | `getLocation()` | None | Returns an associative array containing the country
    code, latitude, longitude, and comments about the time zone. |

    | `getName()` | None | Returns a string containing the geographic area and city
    of the time zone. |

    | `getOffset()` | `DateTime` object | Calculates the offset from UTC (in seconds)
    of the `DateTime` object passed as an argument. |

    | `getTransitions()` | Start, end | Returns a multidimensional array containing
    historical and future dates and times of switching to and from daylight saving
    time. Accepts two timestamps as optional arguments to limit the range of results.
    |

    | `listAbbreviations()` | None | Generates a large multidimensional array containing
    the UTC offsets and names of time zones supported by PHP. |

    | `listIdentifiers()` | `DateTimeZone` constant, country code | Returns an array
    of all PHP time zone identifiers, such as `Europe/London`, `America/New_York`,
    and so on. Accepts two optional arguments to limit the range of results. Use as
    the first argument one of the `DateTimeZone` constants listed at [`http://php.net/manual/en/class.datetimezone.php`](http://php.net/manual/en/class.datetimezone.php).
    If the first argument is `DateTimeZone::PER_COUNTRY`, a two-letter country code
    can be used as the second argument. |


    The last two methods in Table [14-6](#A978-1-4842-0635-5_14_Chapter.html#Tab6)
    are static methods. Call them directly on the class by using the scope resolution
    operator, like this:


    ```

    $abbreviations = DateTimeZone::listAbbreviations();

    ```'
  raw: '#### Using the DateTimeZone Class


    A `DateTime` object automatically uses the web server’s default time zone unless
    you have reset the time zone using one of the methods described earlier. However,
    you can set the time zone of individual `DateTime` objects either through the
    optional second argument of the constructor or by using the `setTimezone()` method.
    In both cases, the argument must be a `DateTimeZone` object.


    To create a `DateTimeZone` object, pass one of the supported time zones listed
    at [`http://php.net/manual/en/timezones.php`](http://php.net/manual/en/timezones.php)
    as an argument to the constructor like this:


    `$UK = new DateTimeZone(''Europe/London'');`


    `$USeast = new DateTimeZone(''America/New_York'');`


    `$Hawaii = new DateTimeZone(''Pacific/Honolulu'');`


    When checking the list of supported time zones, it’s important to realize that
    they’re based on geographic regions and cities rather than on official time zones.
    This is because PHP automatically takes daylight saving time into account. Arizona,
    which doesn’t use daylight saving time, is covered by `America/Phoenix`.


    The organization of time zones into geographic regions produces some surprises.
    America doesn’t mean the United States of America, but the continents of North
    and South America and the Caribbean. As a result, Honolulu is not listed in America,
    but as a Pacific time zone. Europe also means the European continent, including
    the British Isles but excluding other islands. So, Reykjavik and Madeira are listed
    as Atlantic time zones, and the Norwegian island of Longyearbyen has the exclusive
    privilege of being the only Arctic time zone.


    The code in `timezones.php` creates `DateTimeZone` objects for London, New York,
    and Honolulu, and then initializes a `DateTime` object using the first one, like
    this:


    `$now = new DateTime(''now'', $UK);`


    After displaying the date and time using `echo` and the `format()` method, the
    time zone is changed using the `setTimezone()` method, like this:


    `$now->setTimezone($USeast);`


    The next time `$now` is displayed, it shows the date and time in New York. Finally,
    `setTimezone()` is used again to change the time zone to Honolulu, producing the
    following output:


    ![A978-1-4842-0635-5_14_Figd_HTML.jpg](A978-1-4842-0635-5_14_Figd_HTML.jpg)


    To find the time zone of your server, you can either check `php.ini` or use the
    `getTimezone()` method with a `DateTime` object. The `getTimezone()` method returns
    a `DateTimeZone` object, not a string containing the time zone. To get the value
    of the time zone, you need to use the `DateTimeZone` object’s `getName()` method,
    like this (the code is in `timezone_display.php`):


    `$now = new DateTime();`


    `$timezone = $now->getTimezone();`


    `echo $timezone->getName();`


    The `DateTimeZone` class has several other methods that expose information about
    a time zone. For the sake of completeness, they’re listed in Table [14-6](#A978-1-4842-0635-5_14_Chapter.html#Tab6),
    but the main use of the `DateTimeZone` class is to set the time zone for `DateTime`
    objects.


    Table 14-6.


    DateTimeZone methods


    | Method | Arguments | Description |

    | --- | --- | --- |

    | `getLocation()` | None | Returns an associative array containing the country
    code, latitude, longitude, and comments about the time zone. |

    | `getName()` | None | Returns a string containing the geographic area and city
    of the time zone. |

    | `getOffset()` | `DateTime` object | Calculates the offset from UTC (in seconds)
    of the `DateTime` object passed as an argument. |

    | `getTransitions()` | Start, end | Returns a multidimensional array containing
    historical and future dates and times of switching to and from daylight saving
    time. Accepts two timestamps as optional arguments to limit the range of results.
    |

    | `listAbbreviations()` | None | Generates a large multidimensional array containing
    the UTC offsets and names of time zones supported by PHP. |

    | `listIdentifiers()` | `DateTimeZone` constant, country code | Returns an array
    of all PHP time zone identifiers, such as Europe/London, America/New_York, and
    so on. Accepts two optional arguments to limit the range of results. Use as the
    first argument one of the `DateTimeZone` constants listed at [`http://php.net/manual/en/class.datetimezone.php`](http://php.net/manual/en/class.datetimezone.php)
    . If the first argument is `DateTimeZone::PER_COUNTRY`, a two-letter country code
    can be used as the second argument. |


    The last two methods in Table [14-6](#A978-1-4842-0635-5_14_Chapter.html#Tab6)
    are static methods. Call them directly on the class by using the scope resolution
    operator, like this:


    `$abbreviations = DateTimeZone::listAbbreviations();`'
  trans: '

    ### 使用 `DateTimeZone` 类


    `DateTime` 对象会自动使用 Web 服务器的默认时区，除非你已使用前述方法之一重置了时区。不过，你可以通过构造函数的可选第二个参数或使用 `setTimezone()`
    方法来设置单个 `DateTime` 对象的时区。这两种情况下，参数都必须是一个 `DateTimeZone` 对象。


    要创建 `DateTimeZone` 对象，请将 [`http://php.net/manual/en/timezones.php`](http://php.net/manual/en/timezones.php)
    中列出的受支持时区之一作为参数传递给构造函数，如下所示：


    `$UK = new DateTimeZone(''Europe/London'');`


    `$USeast = new DateTimeZone(''America/New_York'');`


    `$Hawaii = new DateTimeZone(''Pacific/Honolulu'');`


    在查看受支持的时区列表时，必须意识到这些时区是基于地理区域和城市，而非官方时区名称。这是因为 PHP 会自动考虑夏令时。例如，不使用夏令时的亚利桑那州由 `America/Phoenix`
    覆盖。


    按地理区域组织时区会带来一些意想不到的情况。`America` 并非指美利坚合众国，而是指南北美洲及加勒比地区。因此，檀香山不列在 `America` 下，而是作为一个太平洋时区。`Europe`
    同样指欧洲大陆，包括不列颠群岛，但不包括其他岛屿。因此，雷克雅未克和马德拉被列为大西洋时区，而挪威的朗伊尔城则独享作为唯一北极时区的特权。


    `timezones.php` 中的代码为伦敦、纽约和檀香山创建了 `DateTimeZone` 对象，然后使用第一个时区初始化了一个 `DateTime`
    对象，如下所示：


    `$now = new DateTime(''now'', $UK);`


    使用 `echo` 和 `format()` 方法显示日期和时间后，通过 `setTimezone()` 方法更改时区，如下所示：


    `$now->setTimezone($USeast);`


    下次显示 `$now` 时，它将显示纽约的日期和时间。最后，再次使用 `setTimezone()` 将时区更改为檀香山，产生以下输出：


    ![A978-1-4842-0635-5_14_Figd_HTML.jpg](img/A978-1-4842-0635-5_14_Figd_HTML.jpg)


    要查找服务器的时区，你可以检查 `php.ini`，或对 `DateTime` 对象使用 `getTimezone()` 方法。`getTimezone()`
    方法返回一个 `DateTimeZone` 对象，而非包含时区名称的字符串。要获取时区的值，你需要使用 `DateTimeZone` 对象的 `getName()`
    方法，如下所示（代码位于 `timezone_display.php` 中）：


    `$now = new DateTime();`


    `$timezone = $now->getTimezone();`


    `echo $timezone->getName();`


    `DateTimeZone` 类还有其他几个方法可以公开有关时区的信息。为了完整性，这些方法列在表 14-6 中，但 `DateTimeZone` 类的主要用途是为
    `DateTime` 对象设置时区。


    **表 14-6.** DateTimeZone 方法


    | 方法 | 参数 | 描述 |

    | --- | --- | --- |

    | `getLocation()` | 无 | 返回一个关联数组，包含国家代码、纬度、经度以及关于该时区的说明。 |

    | `getName()` | 无 | 返回一个字符串，包含该时区的地理区域和城市。 |

    | `getOffset()` | `DateTime` 对象 | 计算作为参数传入的 `DateTime` 对象相对于 UTC 的偏移量（以秒为单位）。
    |

    | `getTransitions()` | 开始，结束 | 返回一个多维数组，包含历史及未来进出夏令时的日期和时间。接受两个可选的时间戳参数来限制结果范围。
    |

    | `listAbbreviations()` | 无 | 生成一个大型多维数组，包含 PHP 支持的时区的 UTC 偏移量和名称。 |

    | `listIdentifiers()` | `DateTimeZone` 常量，国家代码 | 返回一个包含所有 PHP 时区标识符的数组，例如 `Europe/London`、`America/New_York`
    等。接受两个可选参数来限制结果范围。使用 [`http://php.net/manual/en/class.datetimezone.php`](http://php.net/manual/en/class.datetimezone.php)
    中列出的 `DateTimeZone` 常量之一作为第一个参数。如果第一个参数是 `DateTimeZone::PER_COUNTRY`，则可以使用两个字母的国家代码作为第二个参数。
    |


    表 14-6 中的最后两个方法是静态方法。通过使用范围解析操作符直接在类上调用它们，如下所示：


    ```

    $abbreviations = DateTimeZone::listAbbreviations();

    ```

