    # 7.3 配置应用程序以利用主/副本复制


    应用程序本身已构建为能够利用只读副本。如果你还记得，我们实际上有*两个*连接函数：`getReadWriteConnection()` 和 `getReadOnlyConnection()`。目前，它们都指向同一台服务器。要使用我们新的只读副本，我们只需更改
    `getReadOnlyConnection()` 函数中的连接信息，它将把所有只读连接转移到副本服务器上。


    我们只需要将 `getReadOnlyConnection()` 函数中的 `host` 参数更改为指向 `DB.REPLICA.PRIVATE.IP`。


    完成此操作后，我们只需重新部署代码。和往常一样，我们可以通过部署到 `template_node` 然后从中重新创建 `webnode` 服务器，或者单独部署到每台服务器来实现。


    # 7.4 添加更多 PostgreSQL 副本服务器


    如果分离单个副本服务器未能提供你所需的性能提升，你实际上可以根据需要拥有任意数量的副本服务器。你可以通过复制模板节点并重复第 7.2 节中的步骤，或者直接复制副本服务器来实现这一点。


    复制副本服务器并不像复制 Web 节点那样自动化，但它可以省去一些步骤。为此，你首先需要在当前的 `dbreplica` 节点上启用备份，然后从 `dbreplica`
    的备份中创建新的副本实例。创建每个副本实例后，你需要通过 `ssh` 登录到新的副本服务器，并将 `/var/lib/pgsql/data/postgresql.conf`
    中的 `listen_addresses` 值设置为其自身的私有 IP 地址，因为默认情况下它会设置为 `dbreplica` 的地址。完成此操作后，你需要使用
    `systemctl restart postgresql` 重启 PostgreSQL。


    创建了多个数据库副本后，你需要修改代码以利用这些数据库。如果我们能为副本数据库创建一个负载均衡器，然后将所有应用程序代码指向该负载均衡器，那将非常理想。遗憾的是，Linode
    目前无法创建*内部*负载均衡器（即仅接受私有网络请求的负载均衡器），因此我们必须提供自己的负载分配机制。我们将在应用程序代码中通过随机选择服务器来模拟此功能。由于我们没有负载均衡器，我们必须在应用程序代码中硬编码服务器列表，并且添加新的副本服务器也需要修改应用程序代码并重新将代码推送至所有
    Web 服务器。


    为了理解应用程序代码将如何修改，假设我们现在有三个副本服务器，其私有 IP 地址分别为 `DB.REPLICA.PRIVATE.IP`、`DB.REPLICA2.PRIVATE.IP`
    和 `DB.REPLICA3.PRIVATE.IP`。为了让我们的只读连接在这些服务器之间循环，我们将根据图 7-2 重写 `getReadOnlyConnection()`
    函数。


    一旦这段代码部署到我们的集群中，所有只读请求将像图 7-3 所示那样在多个副本服务器之间进行负载均衡。这意味着我们唯一的瓶颈将是读写数据库请求。大多数应用程序仍然以只读请求为主，因此读写请求存在瓶颈通常不会造成问题。


    ![../images/487291_1_En_7_Chapter/487291_1_En_7_Fig3_HTML.jpg](img/487291_1_En_7_Fig3_HTML.jpg)


    图 7-3


    多副本数据库配置示意图


    ![../images/487291_1_En_7_Chapter/487291_1_En_7_Fig2_HTML.png](img/487291_1_En_7_Fig2_HTML.png)


    图 7-2


    连接到一组副本服务器


    # 7.5 跨数据中心复制


    对于非常大的应用程序，有时你需要比单个数据中心所能提供的更好的地理覆盖范围。此外，超关键的应用程序可能需要多个数据中心带来的可靠性，这样即使一个数据中心发生故障，应用程序也能至少部分继续运行。


    创建此类设置较为复杂，因此本书不会像介绍其他架构那样提供逐步方法。然而，以下是实现此功能所需执行的基本步骤：


    1.  更改 `dbmaster`，将其 `listen_address` 设置为 `*`。由于它将接收来自其他数据中心的请求，因此它也必须监听公共 IP
    地址。


    2.  为 `dbmaster` 设置防火墙，以防止未经授权的第三方访问。


    3.  使用 SSL 加密你的 PostgreSQL 连接（请参阅后面如何启用此功能）。


    4.  在新数据中心部署一个“主副本”，该副本将是 `dbmaster` 的副本，但如果你需要，它也可以作为该网络上其他副本的主节点。这仍然是只读的，但它是一个可以流式传输到其他副本的副本。


    5.  在新数据中心部署一份你的 Web 应用程序副本，该副本使用 `dbmaster` 的公共 IP 地址进行读写连接，并使用本地副本的私有 IP 地址列表进行只读连接。


    流程结束时，你的集群架构应该类似于图 7-4。


    随着你的部署变得越来越复杂，对自动化部署处理的需求也会增加。有关自动部署的更多信息，请参见第 12 章。


    ![../images/487291_1_En_7_Chapter/487291_1_En_7_Fig4_HTML.jpg](img/487291_1_En_7_Fig4_HTML.jpg)


    图 7-4


    多站点架构示意图


    如果你需要在本地设置中对数据库进行读写访问，配置将变得更加困难，因为你现在必须管理系统之间的同步方式以及它们之间的网络连接中断时的应对策略。在这种情况下，你通常会将本地（非共享）数据和全局（共享）数据分离到*独立的*数据库实例中。对于非共享数据，你需要在每个位置设置一个主数据库。对于共享数据，你需要按照类似图
    7-4 的方式进行设置。


    ## 在 PostgreSQL 上启用加密


    要在 PostgreSQL 上启用加密，你需要以 root 用户身份进入 `/var/lib/pgsql/data` 目录。然后，你需要编辑 `postgresql.conf`
    并添加以下行：


    ```

    ssl = on

    ```


    接下来，你需要生成一个 SSL 密钥和自签名证书。在同一目录下，执行以下命令（全部在一行内）：


    ```

    openssl req -nodes -new -x509 -keyout server.key -out server.crt

    ```


    这将要求你填写一份简短的表格，该表格将被编码到你的证书中。然后，你需要设置生成文件的权限：


    ```

    chown postgres:postgres server.key server.crt

    chmod 600 server.key

    ```


    此时如果你重启数据库，服务器将*允许* SSL 连接，但不会*要求*使用 SSL。要强制使用 SSL 连接，你可以将 `pg_hba.conf` 中的任意或所有
    `host` 行改为 `hostssl`。


    完成所有更改后，你可以使用以下命令重启数据库：


    ```

    systemctl restart postgresql

    ```

    '
- fmt: '# 7.6 Sharding Your Data


    Another option for database scalability is data *sharding*. Database sharding
    is relatively simple in concept—it just means that you partition your data in
    such a way that not all of the data relies on the same database system.


    For instance, you could shard your data so that all customers whose names start
    with “A” and “B” are in one database, all customers whose names start with “C”
    and “D” are in another, and so forth. You can partition the data on whatever method
    you prefer, as long as the system can easily determine which database it needs
    to query. The primary point is that rather than everything being managed by the
    same database system, the data itself is split out to different database systems.


    In such systems, usually either the application takes care of sharding or there
    is a middle layer that handles handing off connections to the appropriate databases.
    Some newer tools have been developed, such as `pg_shard`, which aims to operate
    seamlessly as a database plugin.


    In any case, sharding brings with it a whole set of data management and data integrity
    issues. One of the points of databases was to ensure consistency of data. Sharding,
    essentially, removes many of the protections that were offered by databases in
    order to achieve scale. Therefore, it is important to be sure you know why you
    want to shard and how you want to shard in order to minimize risk.


    For instance, if you sharded customers to different databases, you should also
    shard related records as well, so the customer is serviced by a single database,
    and so that their records are managed together as well. Imagine if you had to
    restore records from a backup, but some related records were on a different database
    system!


    Sharding is a lot of work, takes a lot of planning, and is heavily dependent on
    the specifics of your usage and workload, so it is hard to speak of it in generalities.
    Nonetheless, if you are looking for more ways to scale your database, sharding
    is definitely an option. Sharding also can work in conjunction with other methods,
    such as master-replica replication or multimaster replication, but again, it requires
    a lot of extra love, care, and management to make it work well.


    Sharding is easier if your login groups don’t share any data. For instance, let’s
    say that you built an e-mail marketing system. Different customers rarely share
    any data on such a system. Therefore, it is no problem to keep their records completely
    separate.


    You could potentially run several entirely independent clouds, each one with a
    different set of customers. Logins from customers A, B, C, and D would get shuffled
    into Cloud 1, logins from customers E, F, G, and H would get shuffled into Cloud
    2, and so forth. If these clouds are all managed completely separately, such a
    setup would also allow for some level of disaster mitigation, as you would be
    unlikely to have a complete outage of all datacenters at the same time.


    # 8. Using a Content Delivery Network


    So far, the focus of our scalability efforts for our cloud application has been
    the serving of dynamic content (i.e., content pulled from database queries). However,
    for many sites, dynamic content is actually the smallest part of their system.
    In fact, on any web site, most of the requests are not even for your dynamic content,
    they are for your static content—your images, stylesheets, and JavaScript. Therefore,
    when looking at ways to scale your application in the cloud, it is important not
    to forget to also scale your static assets.


    You can scale your static assets by creating more front-end web servers, since
    they are usually the ones to serve static assets anyway. However, this can get
    more expensive (you have to keep more servers online) and harder to manage (more
    nodes equals more management).


    Scaling static assets is actually much easier than scaling dynamic assets, since
    you don’t have to worry as much about what happens when they change. Therefore,
    there are services that are built specifically for scaling static assets. A service
    which scales your static asset delivery is known as a “Content Delivery Network,”
    also known as a CDN.


    ## 8.1 How Does a CDN Work?


    The way most CDNs work is that they have a *globally* distributed network of content
    servers. Let’s say that you have a 10MB image that you want to be served by a
    CDN. Normally, if that user asked your server for the image, then your server’s
    processing time and bandwidth would be stuck sending that 10MB image. If the user
    lived on the other side of the ocean, that is an additional problem, as your server
    will waste a lot of resources managing a slow and noisy connection.


    What a CDN allows you to do is to redirect your users to the URL of the image
    at the CDN. The CDN, the first time it sees the URL, usually doesn’t know anything
    about the image, but it has rules that tell it how to find the original image
    on your service. From that point on, after the CDN grabs the image the first time,
    every other time someone asks for that image, the CDN will manage delivering the
    image to the users without going through your servers at all.


    Additionally, most CDNs have servers located in many different physical localities.
    These locations are known as “Points of Presence” (PoPs), and the servers there
    are often referred to as “edge servers” (because of this, CDNs are often referred
    to as “edge caches”). Using edge servers at a variety of PoPs allows a CDN to
    not only provide scalability through a large number of servers, edge servers allows
    a CDN to provide servers that are *in close physical proximity* to the user. This
    greatly speeds up your user’s experience if they can get a lot of the data from
    nearby servers, rather than having to cross oceans to retrieve the data.


    CDNs provide essentially infinite scale for serving static assets—for any big-name
    CDN, you don’t have to worry about overrunning their network. As long as the asset
    isn’t changing, the CDN will be perfectly able to handle any number of requests
    for that asset.


    Usually, the primary cost for a CDN is the bandwidth. However, many CDNs have
    lower bandwidth costs than cloud servers do. Now, with Linode, you would have
    to have an extremely active site to outrun your included bandwidth. Nonetheless,
    if you did, you would pay slightly less for the bandwidth if it was provided by
    a CDN. In any case, even when you have plenty of included bandwidth with your
    server, the benefits of improved scalability with CDNs are usually worth their
    small price, as you don’t need to be continually running servers to deal with
    traffic that may or may not show up. You only have to pay for the bandwidth that
    you actually use.'
