  trans: '

    `// 拆分为单词数组`

    ```

    $words = explode('' '', $words);

    ```

    `// 提取前九个数组元素`

    ```

    $first_line = array_slice($words, 0, 9);

    ```

    `// 连接前九个元素并显示`

    ```

    echo implode('' '', $first_line);

    ```


    这段代码将 `sonnet.txt` 的内容存储在名为 `$sonnet` 的变量中，然后将其传递给 `str_replace()` 函数，该函数将回车符和换行符替换为空格，并将结果存储为
    `$words`。


    **注意**


    关于 `"\r\n"` 的解释，请参阅第 3 章中的“在双引号内使用转义序列”。该文本文件是在 Windows 系统中创建的，因此换行符由回车符和换行符表示。Mac
    OS X 和 Linux 系统上创建的文件仅使用换行符（`"\n"`）。


    随后，`$words` 被传递给 `explode()` 函数。这个名称听起来有些骇人的函数，能将字符串“炸开”并转换为数组。它使用第一个参数来确定在何处断开字符串。这里使用了空格，因此文本文件的内容被拆分为一个单词数组。


    接着，单词数组被传递给 `array_slice()` 函数，该函数从数组中截取一段，起始位置由第二个参数指定，第三个参数指定截取的长度。PHP 从 0 开始计数数组，因此这一操作提取了前九个单词。


    最后，`implode()` 执行与 `explode()` 相反的操作，它将数组的元素连接起来，并在每个元素之间插入第一个参数。结果通过 `echo` 显示，产生如下输出：


    ![A978-1-4842-0635-5_7_Figc_HTML.jpg](img/A978-1-4842-0635-5_7_Figc_HTML.jpg)


    现在，脚本不再显示整个文件内容，而是只显示第一行。完整的字符串仍然存储在 `$sonnet` 中。


    然而，如果你想逐行处理每个行，使用 `file()` 函数会更简单，它会将文件的每一行读入一个数组。要显示 `sonnet.txt` 的第一行，之前的代码可以简化为这样（参见
    `get_contents_05.php`）：


    ```

    $sonnet = file(''C:/private/sonnet.txt'');

    echo $sonnet[0];

    ```


    事实上，如果你不需要完整的数组，可以在调用 `file()` 函数后，直接在方括号中添加索引号来访问某一行。以下代码显示了十四行诗的第十一行（参见 `get_contents_06.php`）：


    ```

    echo file(''C:/private/sonnet.txt'')[10];

    ```


    ![A978-1-4842-0635-5_7_Figd_HTML.jpg](img/A978-1-4842-0635-5_7_Figd_HTML.jpg)


    **注意**


    像这样直接访问作为函数返回结果的数组元素，是一种称为“数组解引用”的技术。该技术从 PHP 5.4 版本开始引入。`get_contents_06.php`
    中的代码在较旧版本的 PHP 中无法运行。


    在我们刚刚探讨的三个函数中，`readfile()` 可能用处最小。它只是读取文件内容并直接将其输出到缓冲中。你无法操作文件内容或从中提取信息。不过，`readfile()`
    的一个实际用途是强制下载文件，本章后面会看到。


    另外两个函数 `file_get_contents()` 和 `file()` 则更有用，因为你可以将内容捕获到一个变量中，以便重新格式化或提取信息。它们的唯一区别在于：`file_get_contents()`
    将内容读入一个单一的字符串，而 `file()` 生成一个数组，其中每个元素对应文件中的一行。


    **提示**


    `file()` 函数会在每个数组元素的末尾保留换行符。如果你想去除换行符，可以将常量 `FILE_IGNORE_NEW_LINES` 作为第二个参数传递给该函数。你还可以通过使用
    `FILE_SKIP_EMPTY_LINES` 作为第二个参数来跳过空行。要同时去除换行符并跳过空行，可以用竖线分隔这两个常量，像这样：`FILE_IGNORE_NEW_LINES
    | FILE_SKIP_EMPTY_LINES`。


    尽管我们仅使用本地文本文件测试了 `file_get_contents()` 和 `file()`，但它们也可以检索其他域上公开文件的内容。这使得它们对于访问其他网页上的信息非常有用，尽管提取信息通常需要对字符串函数和文档对象模型（DOM）有扎实的理解。


    `file_get_contents()` 和 `file()` 的缺点是它们会将整个文件读入内存。对于非常大的文件，使用每次只处理文件一部分的函数会更可取。接下来我们将讨论这些函数。

