    most common tasks are to mark a placed order as either verified or canceled, and
    to mark a verified order as completed when the shipment is dispatched. Take a
    look at Figure 9-5 (shown earlier) to see the admin_order_details template in
    action.


    The site administrator marks an order as verified when the payment for that order
    is confirmed by PayPal and marks the order as completed when the order is assembled,
    addressed, and mailed to the purchaser. The administrator can mark an order as
    canceled if, for example, PayPal does not confirm the payment in a reasonable
    amount of time (the exact meaning of


    “reasonable” is up to the administrator).


    The other buttons—Edit, Update, and Cancel—allow the administrator to manually
    edit any of the details of an order. When the Edit button is clicked, the select
    box and the text boxes become editable.'
