    ## Chapter 14 ■ Deployment and Maintenance


    **535**


    **Tip** Many web sites take advantage of 404 errors by attempting to do something
    useful with the requested URI, such as performing a search. For example, if you
    try to access the PHP web site at [http://php.net](http://php.net) but specify
    an invalid URL, the site will automatically perform a search based on the terms
    in the request. If it finds a single exact match, it redirects you directly to
    the page, while if multiple results are found, it notifies you that an error occurred
    and then provides links to each page found in the search.


    This is especially useful for a quick lookup on PHP functions. For example, if
    you go to [http://php.net/mysql_query](http://php.net/mysql_query), the 404 handler
    on the site triggers a search for *mysql_query*, which results in the manual page
    for the `mysql_query()` function being displayed.


    ## Web Site Administration


    As mentioned in Chapter 1, an administration area is an important part of any
    web site. This special part of the site is what allows the people who run the
    site to control application data or modify how the site operates.


    Because of the work potentially involved in developing this area and the fact
    it doesn’t present any new concepts that we haven’t already covered in this book,
    we won’t actually develop the admin area here. Instead, I will list some ideas
    for functionality you may want to implement as well as provide a starting point
    for the admin area. Additionally, I have included various administrator functions
    in the downloadable application source code.


    ### Administrator Section Features


    The features that you may want to include in your application’s administration
    area are listed next. These features are based on the functionality we have implemented
    in this book, although obviously if you decide to add new features to the application,
    you may need to add extra functionality here to manage the data belonging to the
    new feature.


    #### User Management


    This area is arguably the most important section that can be implemented, because
    it allows you to easily see who is accessing the application. Typically in the
    user management area, you will use the following features:


    - Searching for existing users or browsing the user list.

    - Updating a user’s details (such as their username or password). Additionally,
    you should have an option to choose the user’s type. This allows you to nominate
    users as administrators who can then access the administrator area.

    - Contacting users. This may be by way of sending a periodical newsletter to all
    users.


    **Note** Be sure to give users the choice of whether they receive bulk e-mails
    that are sent. You can do this by adding a new setting to their user account (refer
    to the “Controlling User Settings” section of Chapter 9 for an example of how
    to implement new user settings).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch14CMP2 11/13/07 8:20 PM Page 536


    **536**


    #### Chapter 14 ■ Deployment and Maintenance


    - Deleting users. Typically you won’t want to delete users from your database
    but on occasion you may need to do so.


    **Note** Before implementing delete functionality, you need to decide exactly
    how you want to deal with the deleted data. For example, if a User A leaves a
    comment on User B’s blog (assuming you have implemented a commenting system),
    then you typically won’t want to delete that comment even if you want to delete
    User A. Database foreign key constraints will prevent you from deleting the user
    record before all linked comments are deleted. As such, you must either not delete
    the user record (perhaps disabling the account instead) or update the comment
    so it is not linked against the user account.


    #### Blog Post Management


    In addition to being able to manage user accounts, it may be of use to be able
    to manage user posts. Typically you won’t need to create new blog posts, but you
    may need to edit or delete a post containing offensive content.


    Specifically, you would need almost identical functionality to the blog management
    functionality for normal users, which may include the following:


    - Editing or deleting blog posts and comments associated with posts

    - Browsing uploaded images and deleting offensive images if required

    - Notifying users if any of their content has been changed (including telling
    them the reason why)


    #### Auditing Application Logs


    Earlier in this chapter we looked at some ways to use the application logs. In
    addition to searching the logs on the command line, you may want to add a web
    interface to search and browse the application log.


    Some of the capabilities of log viewing may include the following:


    - View log entries between two dates (or for a predefined period, such as “this
    week” or “last month”).

    - Filter by the priority of the log entry (that is, whether it is a critical message,
    information, or otherwise). See Chapter 2 for a discussion of the priority levels.

    - Search for specific entries (such as for invalid logins).


    Note that we are writing log entries to a filesystem file. With `Zend_Log` it
    is possible to record log entries to a database instead. You may find it easier
    to filter entries in a database rather than in a file.


    ### Implementing Administration


    Now that I’ve covered some of the features you may want to use in the administration
    area, I’ll list some implementation notes to help you get started.


