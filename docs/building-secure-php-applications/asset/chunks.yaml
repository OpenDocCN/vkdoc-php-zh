  trans: '

    ### 遵循安全最佳实践


    正确的输入清理是安全网页应用开发中的基本最佳实践。遵循这些最佳实践可确保您的应用程序符合行业标准和安全规范。


    ### 长期维护与安全保障


    在应用程序架构中制定健壮的输入清理策略，能够简化维护工作并便于未来的安全更新。这为应对不断演变的安全威胁奠定了更易维护、更安全的基础。


    输入清理是网页应用安全（包括 PHP 应用）的基石。它有助于防范多种安全威胁，包括 SQL 注入、XSS、CSRF、数据篡改以及与文件相关的漏洞。在 PHP
    应用程序中纳入严格的输入验证与清理实践，对于保护数据、用户以及整体网页应用安全至关重要。


    以下是在 PHP 中清理输入的几种技术。


    ### 去除 HTML 标签


    我们可以使用 `strip_tags()` 函数来移除用户输入中的 HTML 和 PHP 标签。这通过消除任何潜在有害的 HTML 或脚本标签，有助于防范跨站脚本（XSS）攻击。想象我们在做一个三明治，`strip_tags()`
    就像在吃之前去掉任何危险或有害的成分。


    ```

    $cleanedInput = strip_tags($_POST[''user_input'']);

    ```


    ### 过滤特殊字符


    我们可以使用带 `FILTER_SANITIZE_STRING` 过滤器的 `filter_var()` 函数来移除或转义输入中的特殊字符。这就像一个特殊的清洁器，在吃之前把食物上任何脏东西都擦洗干净。


    ```

    $cleanedInput = filter_var($_POST[''user_input''], FILTER_SANITIZE_STRING);

    ```


    ### 使用 `htmlspecialchars()` 进行输出转义


    虽然严格来说这不属于输入清理，但必须提到的是，在 HTML 中显示用户生成的内容时，应使用 `htmlspecialchars()`。该函数会转义特殊字符以防止
    XSS 攻击。这就像在把食物放到盘子里之前，用干净的纸把它包起来，确保安全和卫生。


    ```

    echo htmlspecialchars($_POST[''user_input''], ENT_QUOTES, ''UTF-8'');

    ```


    ### 使用预处理语句防止 SQL 注入


    在处理数据库查询中的用户输入时，应使用预处理语句（例如使用 PDO 或 MySQLi）。这些语句会自动转义和清理输入数据，以防止 SQL 注入。这就像拥有一个带独立隔间的特殊餐盒，食物不会混在一起造成混乱。


    ```

    $stmt = $pdo->prepare("INSERT INTO users (username) VALUES (:username)");

    $stmt->bindParam('':username'', $_POST[''username'']);

    $stmt->execute();

    ```


    ### 安全处理文件上传


    当用户上传文件时，清理和验证文件名及扩展名至关重要，以防止目录遍历或任意文件执行。想象一下，我们允许朋友带玩具来一起玩，但我们会检查确认他们只带安全的玩具。


    ```

    $allowedExtensions = [''jpg'', ''png'', ''gif''];

    $fileExtension = pathinfo($_FILES[''file''][''name''], PATHINFO_EXTENSION);

    $fileExtension = strtolower($fileExtension); // 确保为小写

    if (!in_array($fileExtension, $allowedExtensions)) {

    // 无效的文件类型

    }

    ```


    ### 过滤用户生成的 URL


    如果应用程序允许用户输入 URL，我们可以使用带 `FILTER_VALIDATE_URL` 过滤器的 `filter_var()` 函数，确保 URL 格式有效。这就像确认朋友给我们的地址是真实可去的地方。


    ```

    $cleanedURL = filter_var($_POST[''url''], FILTER_VALIDATE_URL);

    if ($cleanedURL === false) {

    // 无效的 URL

    }

    ```


    ### 删除或转义控制字符


    我们可以使用正则表达式来删除或转义用户输入中的控制字符。这就像从画作中去掉任何奇怪的符号，确保画面干净清晰。


    ```

    $cleanedInput = preg_replace(''/[[:cntrl:]]/'', '''', $_POST[''user_input'']);

    ```


    ## 安全处理会话和 Cookie


    在深入探讨会话和 Cookie 的安全方面之前，我们先尝试理解它们在 PHP 网页应用上下文中的内部工作原理。


    Cookie 和会话是网页应用中的基本概念，有助于维护用户状态并实现个性化体验。让我们来理解它们。


    ### Cookie


    想象 Cookie 是当您访问网站时，网站存储在您计算机上的一些小信息片段。这些 Cookie 就像网站留在您计算机上的小纸条，可以包含各种细节，例如您的偏好或添加到购物车中的物品。


    *   示例 1：将 Cookie 想象成您访问在线商店时使用的购物清单。您在清单上添加物品，当您再次返回商店时，清单仍然存在，显示您想要购买的物品。这与
    Cookie 存储您的偏好并使您在网站上保持“登录状态”的方式类似。


    *   示例 2：当您访问新闻网站时，它会记住您是否更喜欢先看体育新闻还是商业新闻。这就像网站说“哦，这个人更喜欢体育新闻”，然后向您展示相关内容。这是通过存储您偏好的
    Cookie 实现的。

    '
- fmt: '### Sessions


    Sessions are like virtual rooms where a website keeps track of your activities
    while you’re using it. They help the website remember who you are and what you’re
    doing as you click around. Sessions are temporary and exist only while you’re
    on the website.


    - **Example 1**: Imagine you’re at a library and you’re reading a book. The librarian
    gives you a special card, and as long as you have that card, you can keep reading
    and picking up where you left off. That card is like your session, allowing the
    website to remember what you’re doing while you’re on the site.


    - **Example 2**: Suppose you’re using an online banking website. When you log
    in, the website creates a session for you. It keeps track of your account balance,
    recent transactions, and other information as you move from one page to another.
    This makes it easy for you to manage your finances without having to log in again
    each time.


    Cookies are like little notes websites leave on your computer to remember your
    preferences and actions over a more extended period, even after you leave the
    site. Sessions are like temporary rooms websites create to keep track of what
    you’re doing while you’re actively using the site. Together, cookies and sessions
    help make your web experience more personalized and efficient.


    ![](images/609480_1_En_2_Chapter/609480_1_En_2_Fig7_HTML.jpg)


    Figure 2-7 – Request-response cycle showing the use of cookies and session


    Below are a few steps happening in Figure 2-7:


    1. User (U) initiates an HTTP request.

    2. Browser (B) forwards the request to the Web Server (WS).

    3. The Web Server (WS) routes the request to the PHP Application (PHP).

    4. In the case of a new user or an expired session, the PHP application starts
    a new session using `session_start()`. This function generates a unique session
    ID (e.g., `PHPSESSID`) and creates a server-side data structure to store session
    data.

    5. The web server responds by setting a session ID cookie named `PHPSESSID` in
    the user’s browser. This cookie holds the unique session ID, allowing the server
    to associate the user’s requests with their session.

    6. The `PHPSESSID` value is a unique identifier, which could be something like
    `57fcb0843d4d7269c69b450f7f2c7853`.

    7. For an existing user with an active session, the browser sends the `PHPSESSID`
    cookie with the user’s request. The PHP Application (PHP) uses this session ID
    to retrieve the user’s session data.

    8. To fetch additional user data, the PHP application communicates with the Database
    (DB) using SQL queries. The session ID is typically passed as a parameter to identify
    the user’s session data in the database.

    9. The database responds with the requested user data, such as user preferences,
    shopping cart items, or login status.

    10. The PHP application generates a response based on the user’s session data
    and the requested page or action.

    11. The web server sends the response back to the user’s browser.


    For setting and managing sessions, PHP provides several functions:


    1. `session_start()`: This function initializes a new session or resumes an existing
    session.

    2. `session_id()`: You can use this function to get or set the current session
    ID.

    3. `setcookie()`: This function is used to set cookies, including the `PHPSESSID`
    session cookie.

    4. `$_SESSION`: A superglobal array that stores session variables and their values.
    You can use this array to store and retrieve data specific to a user’s session.


    Now that we have refreshed the basics, let’s touch upon the secure ways to handle
    both cookies and sessions. We’ll start with sessions.


    #### Handling Sessions Securely


    **Regenerating Session ID**


    A session ID is a unique identifier assigned to a user’s session when they visit
    a website. It is typically stored as a cookie or in the URL. The session ID helps
    the server recognize a user and associate their requests with their specific session.
    Regenerating a session ID means generating a new, unique session ID and associating
    it with the user’s session data.'
