  CivicSpace 开发经理，后从协会成立之日起至今每年担任 Drupal 协会董事会成员，最初担任筹款人，后任业务发展总监。


  现在我们将时间快进近一整年，来到 2006 年 6 月 25 日至 30 日。尽管一个问题搁置这么久似乎耗时颇长，但请记住，Drupal 从未停止发展；那些讨论基金会方案的人同样有日常工作要做、有代码要写、有漏洞要修复、有会议要组织和参加（至少对
  Dries 而言，还有未婚妻要娶）^(25)。




