    \ as the processing script.\n\n3.  Create a new file called `authenticate_mysqli.php`\
    \ or `authenticate_pdo.php` and save it in the `includes` folder. The file will\
    \ contain only PHP script, so strip out any HTML markup.\n\n4.  Include the database\
    \ connection file, create a connection to the database with the read-only account,\
    \ and use a prepared statement to fetch the user's details.\n\nFor MySQLi use\
    \ the following code:\n\n```php\n$stmt = $conn->stmt_init();\n$stmt->prepare($sql);\n\
    // bind the input parameter\n$stmt->bind_param('s', $username);\n$stmt->execute();\n\
    // bind the result, using a new variable for the password\n$stmt->bind_result($storedPwd);\n\
    $stmt->fetch();\n```\n\nThis is such a straightforward `SELECT` query that I haven't\
    \ used a conditional statement when passing it to the MySQLi `prepare()` method.\
    \ The username is a string, so the first argument to `bind_param()` is `'s'`.\
    \ If a match is found, the result is bound to `$storedPwd`. You need to use a\
    \ new variable for the stored password to avoid overwriting the password submitted\
    \ by the user.\n\nAfter the statement has been executed, the `fetch()` method\
    \ gets the result.\n\nFor PDO, use the following code instead:\n\n```php\n$stmt\
    \ = $conn->prepare($sql);\n// pass the input parameter as a single-element array\n\
    $stmt->execute([$username]);\n$storedPwd = $stmt->fetchColumn();\n```\n\nThis\
    \ code does the same as the MySQLi version does, but uses PDO syntax. The username\
    \ is passed to the `execute()` method as a single-element array. Because there's\
    \ only one column in the result, `fetchColumn()` returns the value and assigns\
    \ it to `$storedPwd`.\n\n5.  Once you have retrieved the username's password,\
    \ all you need to do is to pass the submitted and stored versions to `password_verify()`.\
    \ If `password_verify()` returns `true`, create the session variables to indicate\
