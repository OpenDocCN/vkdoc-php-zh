    data from the parts is transparently available via the whole. The Composite pattern
    makes such operations and queries transparent to the client. Trees are easy to
    traverse (as we shall see in the next chapter). It is easy to add new component
    types to Composite structures.


    On the downside, Composites rely on the similarity of their parts. As soon as
    we introduce complex rules as to which composite object can hold which set of
    components, our code can become hard to manage. Composites do not lend themselves
    well to storage in relational databases, but are well suited to XML persistence.


    ## The Decorator Pattern


    While the Composite pattern helps us to create a flexible representation of aggregated
    components, the Decorator pattern uses a similar structure to help us to modify
    the functionality of concrete components. Once again, the key to this pattern
    lies in the importance of composition at runtime. Inheritance is a neat way of
    building on characteristics laid down by a parent class. This neatness can lead
    you to hard-code variation into your inheritance hierarchies, often causing inflexibility.


    ### The Problem


    Building all your functionality into an inheritance structure can result in an
    explosion of classes in a system. Even worse, as you try to apply similar modifications
    to different branches of your inheritance tree, you are likely to see duplication
    emerge.


    Let’s return to our game. Here, I define a `Tile` class and a derived type:


    ```

    // listing 10.17

    abstract class Tile

    {

    abstract public function getWealthFactor(): int;

    }

    // listing 10.18

    class Plains extends Tile

    {

    private $wealthfactor = 2;

    public function getWealthFactor(): int

    {

    return $this->wealthfactor;

    }

    }

    ```


    A tile represents a square on which my units might be found. Each tile has certain
    characteristics. In this example, I have defined a `getWealthFactor()` method
    that affects the revenue a particular square might generate if owned by a player.
    As you can see, `Plains` objects have a wealth factor of 2\. Obviously, tiles
    manage other data. They might also hold a reference to image information, so that
    the board can be drawn. Once again, I’ll keep things simple here.


    I need to modify the behavior of the `Plains` object to handle the effects of
    natural resources and human abuse. I wish to model the occurrence of diamonds
    on the landscape, and the damage caused by pollution. One approach might be to
    inherit from the `Plains` object :


    ```

    // listing 10.19

    class DiamondPlains extends Plains

    {

    public function getWealthFactor(): int

    {

    return parent::getWealthFactor() + 2;

    }

    }

    // listing 10.20

    class PollutedPlains extends Plains

    {

    public function getWealthFactor(): int

    {

    return parent::getWealthFactor() - 4;

    }

    }

    ```


    I can now acquire a polluted tile very easily:


    ```

    // listing 10.21

    $tile = new PollutedPlains();

    print $tile->getWealthFactor();

    ```


    You can see the class diagram for this example in Figure [10-3](#A314621_5_En_10_Chapter.html#Fig3).


    ![A314621_5_En_10_Fig3_HTML.gif](A314621_5_En_10_Fig3_HTML.gif)


    Figure 10-3.


    Building variation into an inheritance tree


    This structure is obviously inflexible. I can get plains with diamonds. I can
    get polluted plains. But can I get them both? Clearly not, unless I am willing
    to perpetrate the horror that is `PollutedDiamondPlains`. This situation can only
    get worse when I introduce the `Forest` class, which can also have diamonds and
    pollution.


    This is an extreme example, of course, but the point is made. Relying entirely
    on inheritance to define your functionality can lead to a multiplicity of classes
    and a tendency toward duplication.


    Let’s take a more commonplace example at this point. Serious web applications
    often have to perform a range of actions on a request before a task is initiated
    to form a response. You might need to authenticate the user, for example, and
    to log the request. Perhaps you should process the request to build a data structure
    from raw input. Finally, you must perform your core processing. You are presented
    with the same problem.


    You can extend the functionality of a base `ProcessRequest` class with additional
    processing in a derived `LogRequest` class, in a `StructureRequest` class, and
    in an `AuthenticateRequest` class. You can see this class hierarchy in Figure
    [10-4](#A314621_5_En_10_Chapter.html#Fig4).


    ![A314621_5_En_10_Fig4_HTML.gif](A314621_5_En_10_Fig4_HTML.gif)


    Figure 10-4.


    More hard-coded variations


    What happens, though, when you need to perform logging and authentication, but
    not data preparation? Do you create a `LogAndAuthenticateProcessor` class? Clearly,
    it is time to find a more flexible solution.'
