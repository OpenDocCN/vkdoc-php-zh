    ## About the Authors


    **CRISTIAN DARIE** is a software engineer with experience in a wide range of modern
    technologies, and he is the author of numerous technical books. Cristian is studying
    distributed application architectures for his PhD and is getting involved with
    various commercial and research projects. When not planning to buy Google, he
    enjoys his bit of social life. If you want to say “hi,” you can reach Cristian
    through his personal web site at `http://www.cristiandarie.ro`.


    **EMILIAN BALANESCU** is a programmer experienced in many technologies, such as
    PHP, Java, .NET, AJAX, PostgreSQL, MySQL, and MS SQL Server. He currently works
    as a Fault Handling Engineer at AccessNET International. You can reach Emilian
    at `http://www.emilianbalanescu.ro`.


    **MIHAI BUCICA** started programming and competing in programming contests (winning
    many of them) at age 12. With a bachelor''s degree in computer science from the
    Automatic Control and Computers Faculty of the Politehnica University of Bucharest,
    Romania, Mihai works on building communication software with various electronic
    markets. Even after working with a multitude of languages and technologies, Mihai''s
    programming language of choice remains C++, and he loves the LGPL world. Mihai
    also co-authored *Beginning PHP 5 and MySQL E-Commerce.* He can be contacted through
    his personal web site, `http://www.valentinbucica.ro`.


