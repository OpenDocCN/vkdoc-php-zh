    In the previous section, we covered the code used to manage the list of items.
    We will now look at processor.php, the script responsible for handling Ajax requests
    and interfacing with the functions in items.php.


    As mentioned earlier, there are two different Ajax requests to handle. The first
    is the load action, which returns the list of items as XML. This action is handled
    by calling the getItems() function, and then looping over the returned items and
    generating XML based on the data.


    The second action is save, which is triggered after the user changes the order
    of the sortable list. This action results in a call to the processItemsOrder()
    function we just looked at.


