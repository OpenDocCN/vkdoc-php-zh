    and `setDepth()` . These can be used to store and retrieve the depth of a unit
    in a tree. `setDepth()` is invoked by the unit’s parent when it adds it to the
    tree from `CompositeUnit::addUnit()`:


    ```

    // listing 11.40

    abstract class CompositeUnit extends Unit

