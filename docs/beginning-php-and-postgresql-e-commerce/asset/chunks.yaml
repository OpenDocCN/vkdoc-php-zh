- fmt: "Now that you have a new class that performs credit card transactions, all\
    \ you need to do is integrate its functionality into the order pipeline you built\
    \ in the previous chapters. To fully integrate `DataCash` with `HatShop`, you'll\
    \ need to update the existing `PsCheckFunds` and `PsTakePayments` classes.\n\n\
    You need to modify the pipeline section classes that deal with credit card transactions.\
    \ We've already included the infrastructure for storing and retrieving authentication\
    \ codes and reference information, via the `OrderProcessor.SetOrderAuthCodeAndReference`\
    \ method.\n\n## Exercise: Implementing the Order Pipeline Classes\n\n**1.** First\
    \ modify `business/ps_check_funds.php` to work with `DataCash`:\n\n```php\n<?php\n\
    \nclass PsCheckFunds implements IPipelineSection\n{\n  public function Process($processor)\n\
    \  {\n    // Audit\n    $processor->CreateAudit('PsCheckFunds started.', 20100);\n\
    \n    $order_total_cost = $processor->mOrderInfo['total_amount'];\n    $order_total_cost\
    \ += $processor->mOrderInfo['shipping_cost'];\n    $order_total_cost +=\n    \
    \  round((float)$order_total_cost *\n        (float)$processor->mOrderInfo['tax_percentage'],\
    \ 2) / 100.00;\n\n    $request = new DataCashRequest(DATACASH_URL);\n    $request->MakeXmlPre(DATACASH_CLIENT,\
    \ DATACASH_PASSWORD,\n      $processor->mOrderInfo['order_id'] + 1000006,\n  \
    \    $order_total_cost, 'GBP', 'pre',\n      $processor->mCustomerInfo['credit_card']->CardNumber,\n\
    \      $processor->mCustomerInfo['credit_card']->ExpiryDate,\n      $processor->mCustomerInfo['credit_card']->IssueDate,\n\
    \      $processor->mCustomerInfo['credit_card']->IssueNumber);\n\n    $responseXml\
    \ = $request->GetResponse();\n    $xml = simplexml_load_string($responseXml);\n\
    \n    if ($xml->status == 1)\n    {\n      $processor->SetAuthCodeAndReference(\n\
    \        $xml->merchantreference, $xml->datacash_reference);\n\n      // Audit\n\
    \      $processor->CreateAudit('Funds available for purchase.', 20102);\n\n  \
