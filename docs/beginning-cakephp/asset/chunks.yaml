    ## Custom Routes Exercise


    This chapter explored some of the methods for building custom routes in Cake.
    For this exercise, construct a route that will display blog posts by their date
    and ID. Providing the correct route configuration is only half the problem; be
    sure to rebuild the `View` action to run the lookup correctly. Also build the
    admin route to handle editing and adding blog posts. You have completed the exercise
    correctly if posts are editable by accessing `http://localhost/blog/admin/posts/edit/{id}`
    rather than with the standard path to edit and add.


    ## Summary


    Rewriting URLs for the application is made much easier by editing Cake’s routing
    configuration file. Not only can you make URLs friendlier with the `app/config/routes.php`
    file, but you can even set up reverse routes, or routes that are dynamically mapped
    by the dispatcher; just use verbose linking syntax when creating links, and Cake
    will automatically change all URL strings for any controllers and actions you
    specify. The router also includes an admin routing feature with which you can
    attach a prefix to any action name and view file, and Cake will map URLs containing
    the prefix to these files. This is useful for distinguishing between CRUD actions
    that should be accessed only by an administrator and those that are available
    to a public user. For applications that create output as non-HTML files, the dispatcher
    can parse extensions. For instance, in this chapter I described how to use Cake
    to generate an RSS feed as an `.rss` file. When a URL containing the `.rss` extension
    is entered, the router detects this extension and maps the request accordingly.
    Now that you understand how to customize URLs and other paths in Cake, it’s time
    to explore more of Cake’s advanced features. In Chapter 11, I’ll explain components
    and utilities, which can dramatically enhance your Cake application and cut down
    on several web-related tasks.


    ---


    # Chapter 11: Components and Utilities


    **C**ake uses helpers to extend the functionality of views. By placing several
    view functions in helpers, not only do your views remain light but the application
    is better organized. There is no precise method for how to organize functions
    in a helper other than keeping order and maintaining consistency in the application.
    Helpers are to the view what components and utilities are to the controller. In
    a way, you could think of components as “controller helpers.”


    ## Why Use Components?


    But you may ask, why have components when there’s an `AppController`? Shouldn’t
    the `AppController` hold all the functions used by multiple controllers? Yes and
    no. The `AppController` does hold more generalized actions, or actions that more
    than one controller will use. Rather than employ the `requestAction()` function
    to allow a controller to access a function in another controller, you could just
    place the function in the `AppController` and scale it to be brought across the
    application into multiple controllers.


    Consider the actions in the `AppController` like you consider display elements
    in the layout; parts of the view that you want to be visible across all views.
    Multiple views should be placed in a layout, and in a similar way, actions that
    will be used across controllers should be placed in the `AppController`. However,
    there are still helpers for the views that are used for *specific* display output
    tasks. The `$html->link()` helper function, for example, can be used only in the
    view because it generates HTML output, but being repeated throughout multiple
    views, it makes sense to house this function in a helper file rather than in the
    layout or in the controller. Components serve a similar purpose in Cake applications
    in the sense that they house specific functions that the controller or multiple
    controllers can use.


    For example, consider the built-in components in Cake. Some of these are the `Auth`,
    `Session`, and `RequestHandler` components. Their functions all serve to specifically
    help the controller perform actions relating to their specific method; actions
    in the authentication component all have to do with helping the controller manage
    user authentication processes, and so forth. In a sense, helpers are *portable
    view functions* in that they can be distributed and pulled into any Cake application
    and work in a specific way to enhance and simplify the processes the views may
    need. Similarly, components are *portable controller functions* that serve a specific
    purpose and can be distributed to any controller in any Cake application.


    ## Using Components


    All components are stored in the `app/controllers/components` directory and are
    pulled into the controller like helpers, with the `$components` array. Like other
    parameters, components must be camel-cased and separated in the array by commas.
    Built-in components as well as custom ones must be included in the `$components`
    array to work in the controller, and like helpers, the `AppController` can include
    components for use in any or all controllers. See Listing 11-1.


    **Listing 11-1.** *Including Components in the Controller with the $components
    Array*

    ```

    var $components = array(''Session'',''RequestHandler'');

    ```


    Once a component is included in the controller, the controller references its
    functions by using the `$this` identifier. Remember to specify the component like
    you do with models: `$this` followed by the camel-cased name of the component
    and the function in use. Listing 11-2.


    **Listing 11-2.** *Running a Component Function in the Controller*

    ```

    $user = $this->Session->read(''User'');

    ```


    Components are not intended to work directly with the database, so the component
    does not do much more than return a variable, a string, or an array for the controller
    to use. If database calls are necessary, the controller using the component ought
    to run these calls through the model and provide the component with the necessary
    data. This does not mean that the components are limited to logic tests or reformatting
    forwarded data; like the `Session` and `Cookie` components, functions here can
    write to outside files or process images, and so forth.


    Besides allowing for custom components, Cake comes with several built-in components
    and utilities. Before building your own components, let’s first examine what Cake
    has to offer and explore how these component functions might improve an application.'
