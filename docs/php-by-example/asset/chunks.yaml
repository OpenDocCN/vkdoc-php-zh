    字段的值（方法体中的 `return $this->code` 语句）。`set()` 方法有一个参数（记为 `$code`），其设计目的是为调用该方法的对象的
    `$code` 字段赋值。方法体中的 `$this->code=$code` 指令完成了此任务。


    该类有一个带一个参数的构造函数，用于在创建对象时传入，该参数决定了对象 `$code` 字段的值。这是通过调用 `set()` 方法实现的。但关键点在于，构造函数使用了
    `private` 关键字描述。也就是说，它是私有的。因此，你不能在类代码外部使用 `new` 指令来创建对象。那么如何创建对象呢？为此，你创建了公共静态方法
    `create()`。该方法有一个参数（记为 `$code`）。该参数定义了同名对象字段的值，而该方法最终返回对该对象的引用。对象本身由方法体中的 `new
    self($code)` 语句创建。该表达式的结果是对所创建对象的引用。该方法返回的正是这个引用。`self` 关键字用于标识方法被调用的类。


    由于无法按常规方式创建对象，你使用 `$obj=MyClass::create(100)` 命令创建了一个 `MyClass` 类的对象。所创建对象的 `$code`
    字段被赋值为 `100`。然而，由于 `$code` 字段是私有的，你无法直接访问它。如果你想获取该字段的值，请使用 `$obj->get()` 指令，该指令会从
    `$obj` 对象调用公共的 `get()` 方法。要为对象的字段赋值，请调用 `set()` 方法，就像用 `$obj->set(200)` 命令所做的那样。


    > **注意：** 一个中心带有字母 i 的圆形图标。

