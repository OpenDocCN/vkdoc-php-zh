- fmt: 'Remember, Cake‘s framework follows the MVC method: models, views, and controllers.
    So far, you’ve become familiar with the model and the controller. Views are separated
    from the mix to provide for easier handling of output. Cake organizes all the
    views in the `app/views` folder.


    The `views` folder contains the following directories:


    *   `elements`

    *   `errors`

    *   `helpers`

    *   `layouts`

    *   `pages`

    *   `scaffolds`


    The `layouts` folder contains any overall layout files that are wrapped around
    your application. You can intercept Cake’s default layout for scaffolds, error
    pages, and any other views by creating your own default layout. Placing a file
    named `default.ctp` into the `layouts` folder tells Cake to apply this layout
    instead of its own default scaffolding layout. Because it is a layout file, all
    the surrounding HTML will be applied to all the output.


    ## Writing the `default.ctp` File


    Create `app/views/layouts/default.ctp`, and place inside it your own HTML/CSS
    code.


    Listing 5-1 shows a basic (and boring) HTML layout to demonstrate how layouts
    work.


    **Listing 5-1.** *A Simple Default Layout*


    ```

    <html>

    <head>

    <title>My Cake Blog Application</title>

    <?=$html->css(‘styles’);?>

    </head>

    <body>

    <div id="container">

    <div id="content">

    <?=$content_for_layout;?>

    </div>

    </div>

    </body>

    </html>

    ```


    Most of this is basic HTML code that displays a title called “My Cake Blog Application”
    in the browser window but does little else. Line 4 of Listing 5-1 is a bit of
    Cake helper code that will automatically pull in the CSS file named `styles.css`
    (you’ll create this file in a second).


    Line 9 of Listing 5-1 is the key to any layout file in Cake. It’s the string that
    tells Cake where to put all the views. When you launch any controller that hasn’t
    specified another layout file, by default Cake will now swap out `$content_for_layout`
    with whatever output you’ve generated through your controllers, models, and views.


    ## Creating a Style Sheet for the Layout


    Public files, or files such as images, JavaScript files, and style sheets that
    you make available to the general web user are stored in the `app/webroot` folder.
    By default, this folder contains placeholders for CSS files, scripts, images,
    and other public resources. In a production setup, `app/webroot` will typically
    serve as the document root. In any case, Cake will internally reference this directory
    when linking to style sheets, images, JavaScript files, or other public resource
    files.


    Line 4 of Listing 5-1 is Cake helper code that assembles some HTML for you, in
    this case, a link to a CSS file. This line is pulling the `css()` function from
    the HTML helper, which is part of Cake’s core libraries and is passing the parameter
    `styles` to the function. The HTML helper’s `css()` function knows to look for
    a `styles.css` file in the `app/webroot/css` folder and generate the `<link rel="stylesheet"
    type="text/css" href="/css/styles.css" />` tag for the layout.


    By using the HTML helper to build this link, not only is the amount of code entered
    by hand reduced, but you also ensure that wherever you may run the Cake application,
    the link will not be broken from inconsistent server setups. Cake comes with many
    more helpers. Using them can dramatically reduce the amount of code in the application,
    especially in views and layouts.


    As of yet, there is no `styles.css` file in the `app/webroot/css` directory. Create
    that file, but leave it blank. You should get a rather simple view for the blog
    application (see Figure 5-1).


    **Figure 5-1.** *A blank style sheet and simple default layout replaces the scaffolding
    layout and styles.*


    ![Image 27](index-79_1.png)

    ![Image 28](index-80_1.png)'
