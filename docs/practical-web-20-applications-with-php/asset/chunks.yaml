    Zend_Registry::set('logger', $logger);\n\n$logger->debug('Test');\n\n// ... other\
    \ bootstrap code\n?>\n```\n\nNow, load `http://phpweb20` in your browser and then\
    \ check the contents of `debug.log`. You will see something like this:"
