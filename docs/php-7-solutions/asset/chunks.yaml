  trans: "\n### 3. 保存并在浏览器中重新加载页面。\n根据你最后一次更新 `blog` 表中项目的时间，你可能看到的是空，也可能是有限范围内的项目。如有需要，可将时间间隔类型改为\
    \ `DAY` 或 `HOUR` 来测试时间限制是否生效。\n\n### 4. 打开 `blog_list_mysqli.php` 或 `blog_list_pdo.php`，选择一个未显示在\
    \ `blog.php` 中的项目并编辑它。\n重新加载 `blog.php`。你刚刚更新的项目现在应已显示。\n\n你可以将自己的代码与 `ch16` 文件夹中的\
    \ `blog_limit_mysqli.php` 和 `blog_limit_pdo.php` 进行比较。\n\n---\n\n## 向 MySQL 插入日期\n\
    \nMySQL 要求日期格式必须为 `YYYY-MM-DD`，这对于允许用户输入日期的在线表单来说是个头疼的问题。正如你在第 15 章所见，可以通过使用 `TIMESTAMP`\
    \ 列来自动插入当前日期和时间。你也可以使用 MySQL 的 `NOW()` 函数在 `DATE` 或 `DATETIME` 列中插入当前日期。只有当你需要其他日期时才会出现问题。\n\
    \n从理论上讲，HTML5 的 `date` 输入类型本应解决这个问题。支持日期输入字段的浏览器通常会在字段获得焦点时显示日期选择器，并以本地格式插入日期。`ch16`\
    \ 文件夹中的 `date_test.php` 有一个示例。图 16-5 展示了 Google Chrome 如何在我的电脑上以正确的欧洲格式显示日期；但表单提交时，该值会被转换为\
    \ ISO 格式。不幸的是，即使到 2019 年初，当前使用的浏览器中仍有超过 10% 不支持 `date` 输入字段。它们会将其视为纯文本输入。\n\n\
    ![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig5_HTML.jpg](img/332054_4_En_16_Fig5_HTML.jpg)\n\
    \n**图 16-5.** HTML5 日期输入字段以本地格式显示日期，但以 ISO 格式提交日期。\n\n因此，使用单个输入字段输入日期，依赖于用户能遵循固定的日期输入模式，例如\
    \ `MM/DD/YYYY`。如果每个人都遵循，你可以使用 `explode()` 函数来重新排列日期各部分，如下所示：\n\n```php\nif (isset($_POST['theDate']))\
    \ {\n    $date = explode('/', $_POST['theDate']);\n    $mysqlFormat = \"$date[2]-$date[0]-$date[1]\"\
    ;\n}\n```\n\n如果有人偏离了格式，你的数据库中就会出现无效日期。因此，从在线表单收集日期最可靠的方法仍然是使用独立的月份、日期和年份输入字段。\n\
    \n---\n\n## PHP 解决方案 16-4：为 MySQL 输入验证和格式化日期\n\n此 PHP 解决方案专注于检查日期的有效性并将其转换为 MySQL\
    \ 格式。它被设计用于集成到你自己的插入或更新表单中。\n\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig7_HTML.jpg](img/332054_4_En_16_Fig7_HTML.jpg)\n\
    \n**图 16-7.** 日期已被验证并转换为 ISO 格式。\n\n### 1. 执行所有检查的代码是 `utility_funcs.php` 中的一个自定义函数。它看起来像这样：\n\
    \n```php\nfunction convertDateToISO($month, $day, $year) {\n    $month = trim($month);\n\
    \    $day = trim($day);\n    $year = trim($year);\n    $result[0] = false;\n \
    \   if (empty($month) || empty($day) || empty($year)) {\n        $result[1] =\
    \ '请填写所有字段';\n    } elseif (!is_numeric($month) || !is_numeric($day) ||\n    \
    \          !is_numeric($year)) {\n        $result[1] = '请仅使用数字';\n    } elseif\
    \ (($month < 1 || $month > 12) || ($day < 1 || $day > 31) ||\n              ($year\
    \ < 1000 || $year > 9999)) {\n        $result[1] = '请使用正确范围内的数字';\n    } elseif\
    \ (!checkdate($month, $day, $year)) {\n        $result[1] = '您输入了无效日期';\n    }\
    \ else {\n        $result[0] = true;\n        $result[1] = sprintf('%d-%02d-%02d',\
    \ $year, $month, $day);\n    }\n    return $result;\n}\n```\n\n该函数接受三个参数：月份、日期和年份，这三个参数都应为数字。前三行代码会去除输入内容两端的空白字符，接下来的一行初始化了一个名为\
    \ `$result` 的数组的第一个元素。如果输入未通过验证，数组的第一个元素为 `false`，第二个元素包含错误消息。如果通过验证，`$result`\
    \ 的第一个元素为 `true`，第二个元素包含格式化后的日期，可用于插入 MySQL。\n\n这一系列条件语句检查输入值是否为空或非数字。第三个测试检查数字是否在可接受的范围内。年份的范围由\
    \ MySQL 的合法范围决定。万一你需要超出此范围的年份，则必须选择不同的列类型来存储数据。\n\n通过使用一系列 `elseif` 子句，这段代码在遇到第一个错误时便停止测试。尽管表单已预填充值，但并不能保证输入一定来自你的表单。它可能来自自动化脚本，这就是为什么这些检查是必要的。\n\
    \n如果输入通过了前三个测试，它就会接受 PHP 函数 `checkdate()` 的检查，该函数足够智能，能识别闰年并避免如 9 月 31 日这样的错误。\n\
    \n最后，如果输入通过了所有这些测试，它会被使用 `sprintf()` 函数重新构建为正确的格式，以便插入 MySQL。此函数的第一个参数是一个格式化字符串，其中\
    \ `%d` 代表整数，`%02d` 代表一个两位整数，若有必要会在前面补零。连字符按字面处理。接下来的三个参数是要插入到格式化字符串中的值。这会生成 ISO\
    \ 格式的日期，月份和日期都带有前导零。\n\n**注意** 有关 `sprintf()` 的详细信息，请参见 [`www.php.net/manual/en/function.sprintf.php`](http://www.php.net/manual/en/function.sprintf.php)。\n\
    \n### 2. 为了测试，请将此代码添加到页面主体中表单的正下方：\n\n```php\nif (isset($_POST['convert'])) {\n\
    \    $converted = convertDateToISO($_POST['month'], $_POST['day'],\n         \
    \                         $_POST['year']);\n    if ($converted[0]) {\n       \
    \ echo '有效日期：' . $converted[1];\n    } else {\n        echo '错误：' . $converted[1]\
    \ . '';\n        echo '输入内容为：' . $months[$_POST['month']-1] . ' ' .\n        \
    \     safe($_POST['day']) . ', ' . safe($_POST['year']);\n    }\n}\n```\n\n这段代码检查表单是否已提交。如果已提交，它将表单值传递给\
    \ `convertDateToISO()` 函数，并将结果保存在 `$converted` 中。\n\n如果日期有效，`$converted[0]` 为\
    \ `true`，格式化的日期在 `$converted[1]` 中。如果日期无法转换为 ISO 格式，`else` 块会显示存储在 `$converted[1]`\
    \ 中的错误消息以及原始输入内容。为了正确显示月份的值，从 `$_POST['month']` 的值中减去 1，并将结果用作 `$months` 数组的键。`$_POST['day']`\
    \ 和 `$_POST['year']` 的值被传递给 `safe()` 函数，以防表单被用于远程利用。\n\n### 3. 保存页面，输入日期并点击“转换”进行测试。\n\
    如果日期有效，你应该会看到它被转换为 ISO 格式，如图 16-7 所示。\n\n### 4. 创建一个名为 `date_converter.php` 的页面，并插入一个包含以下代码的表单（或使用\
    \ `ch16` 文件夹中的 `date_converter_01.php`）：\n\n```html\n<form>\n    月份：<input type=\"\
    text\" name=\"month\"><br>\n    日期：<input type=\"text\" name=\"day\"><br>\n  \
    \  年份：<input type=\"text\" name=\"year\"><br>\n    <input type=\"submit\" name=\"\
    convert\" value=\"转换\">\n</form>\n```\n"
- fmt: "This creates a drop-down menu called `month` and two input fields called `day`\
    \ and `year`. The drop-down menu doesn’t have any values at the moment, but it\
    \ will be populated by a PHP loop. The `day` and `year` fields use the HTML5 `number`\
    \ type and `required` attribute. The `day` field also has the `max` and `min`\
    \ attributes so as to restrict the range to between 1 and 31\\. Browsers that\
    \ support the new HTML5 form elements display number steppers alongside the fields\
    \ and restrict the type and range of input. Other browsers render them as ordinary\
    \ text input fields. For the benefit of older browsers, both have `maxlength`\
    \ attributes that limit the number of characters accepted.\n\n2.  Amend the section\
    \ that builds the drop-down menu, like this:\n\n```\n\"\n    >\n```\n\nThis creates\
    \ an array of month names and uses the `date()` function to find the number of\
    \ the current month (the meaning of the argument passed to `date()` is explained\
    \ later in this chapter).\n\nA `for` loop then populates the menu’s `<option>`\
    \ tags. I have set the initial value of `$i` to `1`, because I want to use it\
    \ for the value of the month. Inside the loop, the conditional statement checks\
    \ two sets of conditions, both of which are enclosed in parentheses to ensure\
    \ they’re evaluated in the correct sequence. The first set checks that the `$_POST`\
    \ array is empty and the values of `$i` and `$thisMonth` are the same. But if\
    \ the form has been submitted, `$_POST['month']` will have been set, so the alternative\
    \ set of conditions checks whether `$i` is the same as `$_POST['month']`. As a\
    \ result, when the form is first loaded, `selected` is inserted into the `<option>`\
    \ tag for the current month. But if the form has already been submitted, the month\
    \ selected by the user is displayed again.\n\nThe name of the month is displayed\
    \ between the `<option>` tags by drawing it from the `$months` array. Because\
    \ indexed arrays begin at 0, you need to subtract 1 from the value of `$i` to\
    \ get the right month.\n\n3.  Also populate the fields for the day and year with\
    \ the current date or the value selected after the form has been submitted:\n\n\
    ```\n    Date:\n    \">\n    Year:\n    \">\n    ```\n\n4.  Save the page and\
    \ test it in a browser. It should display the current date and look similar to\
    \ Figure [16-6](#332054_4_En_16_Chapter.xhtml#Fig6).\n\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig6_HTML.jpg](images/332054_4_En_16_Chapter/332054_4_En_16_Fig6_HTML.jpg)\n\
    \nFigure 16-6.\n\nUsing separate input fields for date parts helps eliminate errors\n\
    \nIf you test the input fields, in most browsers the Date field should accept\
    \ no more than two characters, and the Year field a maximum of four. Even though\
    \ this reduces the possibility of mistakes, you still need to validate the input\
    \ and format the date correctly.\n\nIf you enter an invalid date, you should see\
    \ an appropriate message instead (see Figure [16-8](#332054_4_En_16_Chapter.xhtml#Fig8)).\n\
    \n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig8_HTML.jpg](images/332054_4_En_16_Chapter/332054_4_En_16_Fig8_HTML.jpg)\n\
    \nFigure 16-8.\nThe `convertDateToISO()` function rejects invalid dates\n\nYou\
    \ can compare your code with `date_converter_02.php` in the `ch16` folder.\n\n\
    When creating a form for a table that requires a date from user input, add three\
    \ fields for month, day, and year in the same way as in `date_converter.php`.\
    \ Before inserting the form input into the database, include `utility_funcs.php`\
    \ (or wherever you decide to store the function), and use the `convertDateToISO()`\
    \ function to validate the date and format it for insertion into the database:\n\
    \n```\nrequire_once 'utility_funcs.php';\n$converted = convertDateToMySQL($_POST['month'],\
    \ $_POST['day'], $_POST['year']);\nif ($converted[0]) {\n$date = $converted[1];\n\
    } else {\n$errors[] = $converted[1];\n}\n```\n\nIf your `$errors` array has any\
    \ elements, abandon the insert or update process and display the errors. Otherwise,\
    \ `$date` is safe to insert in the SQL query.\n\n**Note**\nThe rest of this chapter\
    \ is devoted to handling dates in PHP. It’s an important but complex subject.\
    \ I suggest that you skim through each section to familiarize yourself with PHP’s\
    \ date-handling functionality and return to this section when you need to implement\
    \ a particular feature.\n\n## Working with Dates in PHP\n\nPHP, in common with\
    \ other computer languages, handles the complexities of dates and time by calculating\
    \ in seconds from the Unix Epoch, midnight UTC (Coordinated Universal Time) on\
    \ January 1, 1970\\. In the past, this involved tedious calculations to convert\
    \ to and from seconds when trying to set a date in the past or future, such as\
    \ when membership expires, or when working with different time zones. However,\
    \ that’s no longer necessary, thanks to the introduction of the `DateTime`, `DateTimeZone`,\
    \ `DateInterval`, and `DatePeriod` classes in PHP 5.\n\nThe range of available\
    \ dates depends on how PHP has been compiled. The `DateTime` and related classes\
    \ store date and time information internally as a 64-bit number, making it possible\
    \ to represent dates from about 292 billion years in the past to the same number\
    \ of years in the future. However, if PHP is compiled on a 32-bit processor, the\
    \ functions in the second half of Table [16-3](#332054_4_En_16_Chapter.xhtml#Tab3)\
    \ are restricted to a range of approximately 1901 to January 2038.\n\nTable [16-3](#332054_4_En_16_Chapter.xhtml#Tab3)\
    \ summarizes the main date- and time-related classes and functions in PHP.\n\n\
    **Table 16-3.** PHP date- and time-related classes and functions\n\n| Name | Arguments\
    \ | Description |\n| :--- | :--- | :--- |\n| **Class** | | |\n| `DateTime` | Date\
    \ string, `DateTimeZone` object | Creates a time zone–sensitive object containing\
    \ date and/or time information that can be used for date and time calculations.\
    \ |\n| `DateTimeImmutable` | Same as `DateTime` | The same as `DateTime`, but\
    \ changing any value returns a new object, leaving the original unmodified. |\n\
    | `DateTimeZone` | Time zone string | Stores time zone information for use with\
    \ `DateTime` objects. |\n| `DateInterval` | Interval specification | Represents\
    \ a fixed amount of time in years, months, hours, etc. |\n| `DatePeriod` | Start,\
    \ interval, end/recurrence, options | Calculates recurring dates over a set period\
    \ or number of recurrences. |\n| **Function** | | |\n| `time()` | None | Generates\
    \ a Unix timestamp for the current date and time. |\n| `mktime()` | Hour, minute,\
    \ second, month, date, year | Generates a Unix timestamp for the specified date/time.\
    \ |\n| `strtotime()` | Date string, timestamp | Attempts to generate a Unix timestamp\
    \ from an English textual description, such as “next Tuesday.” The returned value\
    \ is relative to the second argument, if supplied. |\n| `date()` | Format string,\
    \ timestamp | Formats a date in English using the specifiers listed in Table [16-4](#332054_4_En_16_Chapter.xhtml#Tab4).\
    \ If the second argument is omitted, the current date and time are used. |\n|\
    \ `strftime()` | Format string, timestamp | Same as `date()`, but uses the language\
    \ specified by the system locale. |\n\n### Setting the Default Time Zone\n\nAll\
    \ date and time information in PHP is stored according to the server’s default\
    \ time zone setting. It’s common for web servers to be located in a different\
    \ time zone from your target audience, so it’s useful to know how to change the\
    \ default.\n\nThe server’s default time zone should normally be set in the `date.timezone`\
    \ directive in `php.ini`, but if your hosting company forgets to do so, or you\
    \ want to use a different time zone, you need to set it yourself.\n\nIf your hosting\
    \ company gives you control over your own version of `php.ini`, change the value\
    \ of `date.timezone` there. That way, it’s automatically set for all your scripts."
