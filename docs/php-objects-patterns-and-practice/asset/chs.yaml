  \nZend: [`http://www.zen`](http://www.zen)`d.com`\n\n## 附录 B：一个简单的解析器\n\n第 11 章讨论的解释器模式并未涵盖解析。没有解析器的解释器是非常不完整的，除非你说服用户编写\
  \ PHP 代码来调用该解释器！有一些第三方解析器可用于配合解释器模式，这在实际项目中可能是最佳选择。然而，本附录介绍了一个简单的面向对象解析器，旨在配合第 11\
  \ 章中构建的 MarkLogic 解释器一起工作。请注意，这些示例仅用于概念验证，不适合在实际场景中使用。\n\n**注意**\n\n该解析器代码的接口和整体结构基于\
  \ Steven Metsker 的《用 Java 构建解析器》（Addison-Wesley Professional, 2001）。然而，极度简化的实现责任在我，任何错误都应归咎于我。Steven\
  \ 慷慨允许我使用他最初的概念。\n\n### 扫描器\n\n要解析一条语句，首先必须将其分解为一组单词和字符（称为词法单元）。以下类使用多个正则表达式来定义词法单元。它还提供了一个便捷的结果栈，我将在本节后面使用它。以下是\
  \ `Scanner` 类：\n\n\n```php\n// 清单 24.01\nclass Scanner\n{\n// 令牌类型\nconst WORD \
  \        = 1;\nconst QUOTE        = 2;\nconst APOS         = 3;\nconst WHITESPACE\
  \   = 6;\nconst EOL          = 8;\nconst CHAR         = 9;\nconst EOF          =\
  \ 0;\nconst SOF          = -1;\nprotected $line_no    = 1;\nprotected $char_no \
  \   = 0;\nprotected $token      = null;\nprotected $token_type = -1;\n// Reader\
  \ 提供对原始字符数据的访问。Context 存储\n// 结果数据\npublic function __construct(Reader $r, Context\
  \ $context)\n{\n$this->r = $r;\n$this->context = $context;\n}\npublic function getContext():\
  \ Context\n{\nreturn $this->context;\n}\n// 跳过所有空白字符\npublic function eatWhiteSpace():\
  \ int\n{\n$ret = 0;\nif ($this->token_type != self::WHITESPACE &&\n$this->token_type\
  \ != self::EOL\n) {\nreturn $ret;\n}\nwhile ($this->nextToken() == self::WHITESPACE\
  \ ||\n$this->token_type == self::EOL\n) {\n$ret++;\n}\nreturn $ret;\n}\n// 获取令牌的字符串表示形式\n\
  // 可以是当前令牌，也可以是 $int 参数表示的令牌\npublic function getTypeString(int $int = -1): string\n\
  {\nif ($int < 0) {\n$int = $this->tokenType();\n}\nif ($int < 0) {\nreturn '';\n\
  }\n$resolve = [\nself::WORD =>      'WORD',\nself::QUOTE =>      'QUOTE',\nself::APOS\
  \ =>       'APOS',\nself::WHITESPACE => 'WHITESPACE',\nself::EOL =>        'EOL',\n\
  self::CHAR =>       'CHAR',\nself::EOF =>        'EOF'\n];\nreturn $resolve[$int];\n\
  }\n// 当前令牌类型（用整数表示）\npublic function tokenType(): int\n{\nreturn $this->token_type;\n\
  }\n// 获取当前令牌的内容\npublic function token()\n{\nreturn $this->token;\n}\n// 如果当前令牌是一个单词则返回\
  \ true\npublic function isWord(): bool\n{\nreturn ($this->token_type == self::WORD);\n\
  }\n// 如果当前令牌是一个引号字符则返回 true\npublic function isQuote(): bool\n{\nreturn ($this->token_type\
  \ == self::APOS || $this->token_type == self::QUOTE);\n}\n// 源文件当前行号\npublic function\
  \ lineNo(): int\n{\nreturn $this->line_no;\n}\n// 源文件当前字符位置\npublic function charNo():\
  \ int\n{\nreturn $this->char_no;\n}\n// 克隆此对象\npublic function __clone()\n{\n$this->r\
  \ = clone($this->r);\n}\n// 移动到源文件中的下一个令牌。设置当前\n// 令牌，并跟踪行号和字符位置\npublic function\
  \ nextToken(): int\n{\n$this->token = null;\n$type;\nwhile (! is_bool($char = $this->getChar()))\
  \ {\nif ($this->isEolChar($char)) {\n$this->token = $this->manageEolChars($char);\n\
  $this->line_no++;\n$this->char_no = 0;\n$type = self::EOL;\nreturn ($this->token_type\
  \ = self::EOL);\n} elseif ($this->isWordChar($char)) {\n$this->token = $this->eatWordChars($char);\n\
  $type = self::WORD;\n} elseif ($this->isSpaceChar($char)) {\n$this->token = $char;\n\
  $type = self::WHITESPACE;\n} elseif ($char == \"'\") {\n$this->token = $char;\n\
  $type = self::APOS;\n} elseif ($char == '\"') {\n$this->token = $char;\n$type =\
  \ self::QUOTE;\n} else {\n$type = self::CHAR;\n$this->token = $char;\n}\n$this->char_no\
  \ += strlen($this->token());\nreturn ($this->token_type = $type);\n}\nreturn ($this->token_type\
  \ = self::EOF);\n}\n// 返回下一个令牌的令牌类型和令牌内容（数组形式）\npublic function peekToken(): array\n\
  {\n$state = $this->getState();\n$type = $this->nextToken();\n$token = $this->token();\n\
  $this->setState($state);\nreturn [$type, $token];\n}\n// 获取一个 ScannerState 对象，用于存储解析器在\n\
  // 源文件中的当前位置，以及当前令牌的相关数据\npublic function getState(): ScannerState\n{\n$state =\
  \ new ScannerState();\n$state->line_no      = $this->line_no;\n$state->char_no \
  \     = $this->char_no;\n$state->token        = $this->token;\n$state->token_type\
  \   = $this->token_type;\n$state->r            = clone($this->r);\n$state->context\
  \      = clone($this->context);\nreturn $state;\n}\n// 使用 ScannerState 对象恢复扫描器的\n\
  // 状态\npublic function setState(ScannerState $state)\n{\n$this->line_no      = $state->line_no;\n\
  $this->char_no      = $state->char_no;\n$this->token        = $state->token;\n$this->token_type\
  \   = $state->token_type;\n$this->r            = $state->r;\n$this->context    \
  \  = $state->context;\n}\n// 从源文件获取下一个字符\n// 如果没有剩余字符则返回布尔值\nprivate function getChar()\n\
  {\nreturn $this->r->getChar();\n}\n// 获取所有连续单词字符，直到字符不再属于单词字符为止\nprivate function\
  \ eatWordChars(string $char): string\n{\n$val = $char;\nwhile ($this->isWordChar($char\
  \ = $this->getChar())) {\n$val .= $char;\n}\nif ($char) {\n$this->pushBackChar();\n\
  }\nreturn $val;\n}\n// 获取所有连续空白字符，直到字符不再属于空白字符为止\nprivate function eatSpaceChars(string\
  \ $char): string\n{\n$val = $char;\nwhile ($this->isSpaceChar($char = $this->getChar()))\
  \ {\n$val .= $char;\n}\n$this->pushBackChar();\nreturn $val;\n}\n// 在源文件中回退一个字符\n\
  private function pushBackChar()\n{\n$this->r->pushBackChar();\n}\n// 参数是否为单词字符\n\
  private function isWordChar($char): bool\n{\nif (is_bool($char)) {\nreturn false;\n\
  }\nreturn (preg_match(\"/[A-Za-z0-9_\\-]/\", $char) === 1);\n}\n// 参数是否为空白字符\nprivate\
  \ function isSpaceChar($char): bool\n{\nreturn (preg_match(\"/\\t| /\", $char) ===\
  \ 1);\n}\n// 参数是否为换行字符\nprivate function isEolChar($char): bool\n{\n$check = preg_match(\"\
  /\\n|\\r/\", $char);\nreturn ($check === 1);\n}\n// 处理 \\n、\\r 或 \\r\\n 换行符\nprivate\
  \ function manageEolChars(string $char): string\n{\nif ($char == \"\\r\") {\n$next_char=$this->getChar();\n\
  if ($next_char == \"\\n\") {\nreturn \"{$char}{$next_char}\";\n} else {\n$this->pushBackChar();\n\
  }\n}\nreturn $char;\n}\npublic function getPos(): int\n{\nreturn $this->r->getPos();\n\
  }\n}\n// 清单 24.02\nclass ScannerState\n{\npublic $line_no;\npublic $char_no;\npublic\
  \ $token;\npublic $token_type;\npublic $r;\n}\n```\n\n好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n首先，我为感兴趣的标记设置常量。我将匹配字符、单词、空白和引号字符。我在专用于每种标记的方法中测试这些类型：`isWordChar()`、`isSpaceChar()`\
  \ 等等。这个类的核心是 `nextToken()` 方法。它尝试匹配给定字符串中的下一个标记。`Scanner` 存储一个 `Context` 对象。`Parser`\
  \ 对象在遍历目标文本时使用它来共享结果。\n\n请注意，还有第二个类：`ScannerState`。`Scanner` 的设计使得 `Parser` 对象可以保存状态、进行尝试，并在发现走入死胡同时进行恢复。`getState()`\
  \ 方法填充并返回一个 `ScannerState` 对象。`setState()` 使用 `ScannerState` 对象在需要时恢复状态。\n\n以下是\
  \ `Context` 类：\n\n```\n// listing 24.03\nclass Context\n{\npublic $resultstack =\
  \ [];\npublic function pushResult($mixed)\n{\narray_push($this->resultstack, $mixed);\n\
  }\npublic function popResult()\n{\nreturn array_pop($this->resultstack);\n}\npublic\
  \ function resultCount(): int\n{\nreturn count($this->resultstack);\n}\npublic function\
  \ peekResult()\n{\nif (empty($this->resultstack)) {\nthrow new Exception(\"empty\
  \ resultstack\");\n}\nreturn $this->resultstack[count($this->resultstack) -1];\n\
  }\n}\n```\n\n如您所见，这只是一个简单的栈，一个方便解析器使用的通知板。它执行的工作类似于解释器模式中使用的上下文类，但并非同一个类。\n\n请注意，`Scanner`\
  \ 本身并不直接处理文件或字符串。相反，它需要一个 `Reader` 对象。这使我能够轻松地切换不同的数据源。以下是 `Reader` 接口及其一个实现 `StringReader`：\n\
  \n```\n// listing 24.04\ninterface Reader\n{\npublic function getChar();\npublic\
  \ function getPos(): int;\npublic function pushBackChar();\n}\n// listing 24.05\n\
  class StringReader implements Reader\n{\nprivate $in;\nprivate $pos;\npublic function\
  \ __construct($in)\n{\n$this->in = $in;\n$this->pos = 0;\n}\npublic function getChar()\n\
  {\nif ($this->pos >= strlen($this->in)) {\nreturn false;\n}\n$char = substr($this->in,\
  \ $this->pos, 1);\n$this->pos++;\nreturn $char;\n}\npublic function getPos(): int\n\
  {\nreturn $this->pos;\n}\npublic function pushBackChar()\n{\n$this->pos--;\n}\n\
  public function string()\n{\nreturn $this->in;\n}\n}\n```\n\n它只是每次从一个字符串中读取一个字符。当然，我可以轻松地提供一个基于文件的版本。\n\
  \n也许了解 `Scanner` 如何被使用的最佳方式就是实际使用它。以下是一些将示例语句分解为标记的代码：\n\n```\n// listing 24.06\n\
  $context = new Context();\n$user_in = \"\\$input equals '4' or \\$input equals 'four'\"\
  ;\n$reader = new StringReader($user_in);\n$scanner = new Scanner($reader, $context);\n\
  while ($scanner->nextToken() != Scanner::EOF) {\nprint $scanner->token();\nprint\
  \ \"   {$scanner->charNo()}\";\nprint \"   {$scanner->getTypeString()}\\n\";\n}\n\
  ```\n\n我初始化了一个 `Scanner` 对象，然后通过重复调用 `nextToken()` 来遍历给定字符串中的标记。`token()` 方法返回当前匹配到的输入部分。`char_no()`\
  \ 告诉我当前在字符串中的位置，而 `getTypeString()` 返回表示当前标记的常量标志的字符串版本。输出应如下所示：\n\n```\n$     \
  \  1       CHAR\ninput   6       WORD\n7       WHITESPACE\nequals  13      WORD\n\
  14      WHITESPACE\n'       15      APOS\n4       16      WORD\n'       17     \
  \ APOS\n18      WHITESPACE\nor      20      WORD\n21      WHITESPACE\n$       22\
  \      CHAR\ninput   27      WORD\n28      WHITESPACE\nequals  34      WORD\n35\
  \      WHITESPACE\n'       36      APOS\nfour    40      WORD\n'       41      APOS\n\
  ```\n\n当然，我可以匹配比这更细粒度的标记，但这对于我的目的来说已经足够好了。分解字符串是容易的部分。如何用代码构建一个语法呢？\n\n## 解析器\n\n\
  一种方法是构建一个 `Parser` 对象的树。以下是我将要使用的抽象 `Parser` 类：\n\n```\n// listing 24.07\nabstract\
  \ class Parser\n{\nconst GIP_RESPECTSPACE = 1;\nprotected $respectSpace = false;\n\
  protected static $debug = false;\nprotected $discard = false;\nprotected $name;\n\
  private static $count=0;\npublic function __construct(string $name = null, $options\
  \ = [])\n{\nif (is_null($name)) {\nself::$count++;\n$this->name = get_class($this)\
  \ . \" (\" . self::$count . \")\";\n} else {\n$this->name = $name;\n}\nif (isset($options[self::GIP_RESPECTSPACE]))\
  \ {\n$this->respectSpace=true;\n}\n}\nprotected function next(Scanner $scanner)\n\
  {\n$scanner->nextToken();\nif (! $this->respectSpace) {\n$scanner->eatWhiteSpace();\n\
  }\n}\npublic function spaceSignificant(bool $bool)\n{\n$this->respectSpace = $bool;\n\
  }\npublic static function setDebug(bool $bool)\n{\nself::$debug = $bool;\n}\npublic\
  \ function setHandler(Handler $handler)\n{\n$this->handler = $handler;\n}\nfinal\
  \ public function scan(Scanner $scanner): bool\n{\nif ($scanner->tokenType() ==\
  \ Scanner::SOF) {\n$scanner->nextToken();\n}\n$ret = $this->doScan($scanner);\n\
  if ($ret && ! $this->discard && $this->term()) {\n$this->push($scanner);\n}\nif\
  \ ($ret) {\n$this->invokeHandler($scanner);\n}\nif ($this->term() && $ret) {\n$this->next($scanner);\n\
  }\n$this->report(\"::scan returning $ret\");\nreturn $ret;\n}\npublic function discard()\n\
  {\n$this->discard = true;\n}\nabstract public function trigger(Scanner $scanner):\
  \ bool;\npublic function term(): bool\n{\nreturn true;\n}\nprotected function invokeHandler(Scanner\
  \ $scanner)\n{\nif (! empty($this->handler)) {\n$this->report(\"calling handler:\
  \ \" . get_class($this->handler));\n$this->handler->handleMatch($this, $scanner);\n\
  }\n}\nprotected function report($msg)\n{\nif (self::$debug) {\nprint \"name}> \"\
  \ . get_class($this) . \": $msg\\n\";\n}\n}\nprotected function push(Scanner $scanner)\n\
  {\n$context = $scanner->getContext();\n$context->pushResult($scanner->token());\n\
  }\nabstract protected function doScan(Scanner $scan): bool;\n}\n```\n\n这个类的起点是 `scan()`\
  \ 方法。大部分逻辑都位于此处。`scan()` 接收一个 `Scanner` 对象作为参数。`Parser` 做的第一件事是委托给具体的子类，调用抽象方法 `doScan()`。`doScan()`\
  \ 返回 `true` 或 `false`；您将在本节的后面看到一个具体的例子。\n\n如果 `doScan()` 报告成功，并且其他一些条件也满足，那么解析的结果会被推送到\
  \ `Context` 对象的结果栈中。`Scanner` 对象持有 `Context`，而 `Parser` 对象使用这个 `Context` 来通信结果。成功解析的实际推送发生在\
  \ `Parser::push()` 方法中：\n\n```\nprotected function push(Scanner $scanner)\n{\n$context\
  \ = $scanner->getContext();\n$context->pushResult($scanner->token());\n}\n```\n\n\
  除了解析失败之外，还有两个条件可能会阻止结果被推送到扫描器的栈中。首先，客户端代码可以通过调用 `discard()` 方法来请求解析器丢弃一个成功的匹配。这会将一个名为\
  \ `$discard` 的属性切换为 `true`。其次，只有终端解析器（即不是由其他解析器组成的解析器）才应将结果推送到它们的栈中。组合解析器（`CollectionParser`\
  \ 的实例，下文中常称为集合解析器）将让它们成功的子解析器推送结果。我使用 `term()` 方法来测试一个解析器是否是终端的，该方法在集合解析器中被重写为返回\
  \ `false`。\n\n如果具体的解析器在其匹配中成功，那么我会调用另一个方法：`invokeHandler()`。该方法被传递了 `Scanner` 对象。如果一个\
  \ `Handler`（即实现了 `Handler` 接口的对象）已经通过 `setHandler()` 方法附加到了 `Parser` 上，那么它的 `handleMatch()`\
  \ 方法就会在此处被调用。我使用处理器来让一个成功的语法实际执行一些操作，您稍后将看到这一点。\n\n\n\n在`scan()`方法中，我调用`Scanner`对象（通过`next()`方法）来推进其位置，即调用它的`nextToken()`和`eatWhiteSpace()`方法。最后，我返回由`doScan()`提供的值。\n\
  \n除了`doScan()`，注意抽象方法`trigger()`。该方法用于决定解析器是否应尝试匹配。如果`trigger()`返回`false`，则解析条件不满足。让我们看一个具体的终端解析器——`Parser`。`CharacterParse`用于匹配特定字符：\n\
  \n```php\n// listing 24.08\nclass CharacterParse extends Parser\n{\nprivate $char;\n\
  public function __construct($char, $name = null, $options = null)\n{\nparent::__construct($name,\
  \ $options);\n$this->char = $char;\n}\npublic function trigger(Scanner $scanner):\
  \ bool\n{\nreturn ($scanner->token() == $this->char);\n}\nprotected function doScan(Scanner\
  \ $scanner): bool\n{\nreturn ($this->trigger($scanner));\n}\n}\n```\n\n构造函数接受一个待匹配字符和一个可选的解析器名称（用于调试）。`trigger()`方法仅检查扫描器是否指向与目标字符匹配的字符令牌。由于不需要进一步扫描，`doScan()`方法直接调用`trigger()`。\n\
  \n如您所见，终端匹配相对简单。现在来看集合解析器。首先定义一个通用父类，然后创建具体示例：\n\n```php\n// listing 24.09\nabstract\
  \ class CollectionParse extends Parser\n{\nprotected $parsers = [];\npublic function\
  \ add(Parser $p): Parser\n{\nif (is_null($p)) {\nthrow new Exception(\"argument\
  \ is null\");\n}\n$this->parsers[]= $p;\nreturn $p;\n}\npublic function term():\
  \ bool\n{\nreturn false;\n}\n}\n// listing 24.10\nclass SequenceParse extends CollectionParse\n\
  {\npublic function trigger(Scanner $scanner): bool\n{\nif (empty($this->parsers))\
  \ {\nreturn false;\n}\nreturn $this->parsers[0]->trigger($scanner);\n}\nprotected\
  \ function doScan(Scanner $scanner): bool\n{\n$start_state = $scanner->getState();\n\
  foreach ($this->parsers as $parser) {\nif (! ($parser->trigger($scanner) && $parser->scan($scanner)))\
  \ {\n$scanner->setState($start_state);\nreturn false;\n}\n}\nreturn true;\n}\n}\n\
  ```\n\n抽象类`CollectionParse`实现了用于聚合`Parser`对象的`add()`方法，并覆盖`term()`使其返回`false`。\n\
  \n`SequenceParse::trigger()`方法仅测试其包含的第一个子`Parser`，并调用其`trigger()`方法。调用方`Parser`会先调用`CollectionParse::trigger()`以判断是否值得调用`CollectionParse::scan()`。如果调用`CollectionParse::scan()`，则会执行`doScan()`，并依次调用所有`Parser`子对象的`trigger()`和`scan()`方法。任何一次失败都会导致`CollectionParse::doScan()`报告失败。\n\
  \n解析的一个问题在于需要尝试不同的可能性。一个`SequenceParse`对象在其每个聚合解析器中可能包含一个完整的解析器树。这些解析器会将`Scanner`向前推进一个或多个令牌，并将结果注册到`Context`对象中。如果`Parser`列表中的最后一个子元素返回`false`，那么`SequenceParse`该如何处理由更早成功匹配的子元素留在`Context`中的结果？序列是“全有或全无”的，因此除了回滚`Context`对象和`Scanner`的状态外别无选择。我通过在`doScan()`开始时保存状态，并在失败返回`false`之前调用`setState()`来实现这一点。当然，如果返回`true`，则无需回滚。\n\
  \n为完整起见，以下是其余所有`Parser`类：\n\n```php\n// listing 24.11\nclass RepetitionParse extends\
  \ CollectionParse\n{\nprivate $min;\nprivate $max;\npublic function __construct($min\
  \ = 0, $max = 0, $name = null, $options = null)\n{\nparent::__construct($name, $options);\n\
  if ($max  0) {\nthrow new Exception(\n\"maximum ( $max ) larger than minimum ( $min\
  \ )\"\n);\n}\n$this->min = $min;\n$this->max = $max;\n}\npublic function trigger(Scanner\
  \ $scanner): bool\n{\nreturn true;\n}\nprotected function doScan(Scanner $scanner):\
  \ bool\n{\n$start_state = $scanner->getState();\nif (empty($this->parsers)) {\n\
  return true;\n}\n$parser = $this->parsers[0];\n$count = 0;\nwhile (true) {\nif ($this->max\
  \ > 0 && $count >= $this->max) {\nreturn true;\n}\nif (! $parser->trigger($scanner))\
  \ {\nif ($this->min == 0 || $count >= $this->min) {\nreturn true;\n} else {\n$scanner->setState($start_state);\n\
  return false;\n}\n}\nif (! $parser->scan($scanner)) {\nif ($this->min == 0 || $count\
  \ >= $this->min) {\nreturn true;\n} else {\n$scanner->setState($start_state);\n\
  return false;\n}\n}\n$count++;\n}\nreturn true;\n}\n}\n// 此解析器匹配两个子解析器中的任意一个\n//\
  \ listing 24.12\nclass AlternationParse extends CollectionParse\n{\npublic function\
  \ trigger(Scanner $scanner): bool\n{\nforeach ($this->parsers as $parser) {\nif\
  \ ($parser->trigger($scanner)) {\nreturn true;\n}\n}\nreturn false;\n}\nprotected\
  \ function doScan(Scanner $scanner): bool\n{\n$type = $scanner->tokenType();\nforeach\
  \ ($this->parsers as $parser) {\n$start_state = $scanner->getState();\nif ($type\
  \ == $parser->trigger($scanner) && $parser->scan($scanner)) {\nreturn true;\n}\n\
  }\n$scanner->setState($start_state);\nreturn false;\n}\n}\n// 此终端解析器匹配字符串字面量\n//\
  \ listing 24.13\nclass StringLiteralParse extends Parser\n{\npublic function trigger(Scanner\
  \ $scanner): bool\n{\nreturn (\n$scanner->tokenType() == Scanner::APOS ||\n$scanner->tokenType()\
  \ == Scanner::QUOTE\n);\n}\nprotected function push(Scanner $scanner)\n{\nreturn;\n\
  }\nprotected function doScan(Scanner $scanner): bool\n{\n$quotechar = $scanner->tokenType();\n\
  $ret = false;\n$string = \"\";\nwhile ($token = $scanner->nextToken()) {\nif ($token\
  \ == $quotechar) {\n$ret = true;\nbreak;\n}\n$string .= $scanner->token();\n}\n\
  if ($string && ! $this->discard) {\n$scanner->getContext()->pushResult($string);\n\
  }\nreturn $ret;\n}\n}\n// 此终端解析器匹配单词令牌\n// listing 24.14\nclass WordParse extends\
  \ Parser\n{\npublic function __construct($word = null, $name = null, $options =\
  \ [])\n{\nparent::__construct($name, $options);\n$this->word = $word;\n}\npublic\
  \ function trigger(Scanner $scanner): bool\n{\nif ($scanner->tokenType() != Scanner::WORD)\
  \ {\nreturn false;\n}\nif (is_null($this->word)) {\nreturn true;\n}\nreturn ($this->word\
  \ == $scanner->token());\n}\nprotected function doScan(Scanner $scanner): bool\n\
  {\nreturn ($this->trigger($scanner));\n}\n}\n```\n\n通过组合终端和非终端`Parser`对象，可以构建一个相当复杂的解析器。您可以在图\
  \ 24-1 中看到此示例使用的所有`Parser`类。\n\n![A314621_5_En_24_Fig1_HTML.jpg](img/A314621_5_En_24_Fig1_HTML.jpg)\n\
  \n图 24-1. Parser 类\n\n这种组合模式设计的理念是，客户端可以用接近 EBNF 记法的代码构建语法。表 24-1 展示了这些类与 EBNF 片段之间的对应关系。\n\
  \n表 24-1. 组合解析器与 EBNF\n\n| 类 | EBNF 示例 | 描述 |\n|---|---|---|\n| `AlternationParse`\
  \ | `orExpr &#124; andExpr` | 匹配其中一个 |\n| `SequenceParse` | `'and' operand` | 列表（所有项按顺序匹配）\
  \ |\n| `RepetitionParse` | `( eqExpr )*` | 零个或多个匹配 |\n\n现在来构建一些客户端代码以实现迷你语言。提醒一下，以下是第\
  \ 11 章中介绍的 EBNF 片段：\n\n\n\n以下是根据您的要求排版后的 Markdown 文档：\n\n```\nexpr     = operand\
  \ { orExpr | andExpr }\noperand  = ( '(' expr ')' | ? 字符串字面量 ? | variable ) { eqExpr\
  \ }\norExpr   = 'or' operand\nandExpr  = 'and' operand\neqExpr   = 'equals' operand\n\
  variable = '$' , ? 单词 ?\n```\n\n这个简单的类根据这段片段构建语法，并执行它：\n\n```php\n// listing 24.15\n\
  class MarkParse\n{\nprivate $expression;\nprivate $operand;\nprivate $interpreter;\n\
  private $context;\npublic function __construct($statement)\n{\n$this->compile($statement);\n\
  }\npublic function evaluate($input)\n{\n$icontext = new InterpreterContext();\n\
  $prefab = new VariableExpression('input', $input);\n// 向 Context 添加 input 变量\n$prefab->interpret($icontext);\n\
  $this->interpreter->interpret($icontext);\n$result = $icontext->lookup($this->interpreter);\n\
  return $result;\n}\npublic function compile($statementStr)\n{\n// 构建解析树\n$context\
  \ = new Context();\n$scanner = new Scanner(new StringReader($statementStr), $context);\n\
  $statement = $this->expression();\n$scanresult = $statement->scan($scanner);\nif\
  \ (! $scanresult || $scanner->tokenType() != Scanner::EOF) {\n$msg  = \"\";\n$msg\
  \ .= \" line: {$scanner->line_no()} \";\n$msg .= \" char: {$scanner->char_no()}\"\
  ;\n$msg .= \" token: {$scanner->token()}\\n\";\nthrow new Exception($msg);\n}\n\
  $this->interpreter = $scanner->getContext()->popResult();\n}\npublic function expression():\
  \ Parser\n{\nif (! isset($this->expression)) {\n$this->expression = new SequenceParse();\n\
  $this->expression->add($this->operand());\n$bools = new RepetitionParse();\n$whichbool\
  \ = new AlternationParse();\n$whichbool->add($this->orExpr());\n$whichbool->add($this->andExpr());\n\
  $bools->add($whichbool);\n$this->expression->add($bools);\n}\nreturn $this->expression;\n\
  }\npublic function orExpr(): Parser\n{\n$or = new SequenceParse();\n$or->add(new\
  \ WordParse('or'))->discard();\n$or->add($this->operand());\n$or->setHandler(new\
  \ BooleanOrHandler());\nreturn $or;\n}\npublic function andExpr(): Parser\n{\n$and\
  \ = new SequenceParse();\n$and->add(new WordParse('and'))->discard();\n$and->add($this->operand());\n\
  $and->setHandler(new BooleanAndHandler());\nreturn $and;\n}\npublic function operand():\
  \ Parser\n{\nif (! isset($this->operand)) {\n$this->operand = new SequenceParse();\n\
  $comp = new AlternationParse();\n$exp = new SequenceParse();\n$exp->add(new CharacterParse('('))->discard();\n\
  $exp->add($this->expression());\n$exp->add(new CharacterParse(')'))->discard();\n\
  $comp->add($exp);\n$comp->add(new StringLiteralParse())\n->setHandler(new StringLiteralHandler());\n\
  $comp->add($this->variable());\n$this->operand->add($comp);\n$this->operand->add(new\
  \ RepetitionParse())->add($this->eqExpr());\n}\nreturn $this->operand;\n}\npublic\
  \ function eqExpr(): Parser\n{\n$equals = new SequenceParse();\n$equals->add(new\
  \ WordParse('equals'))->discard();\n$equals->add($this->operand());\n$equals->setHandler(new\
  \ EqualsHandler());\nreturn $equals;\n}\npublic function variable(): Parser\n{\n\
  $variable = new SequenceParse();\n$variable->add(new CharacterParse('$'))->discard();\n\
  $variable->add(new WordParse());\n$variable->setHandler(new VariableHandler());\n\
  return $variable;\n}\n}\n```\n\n这个类看似复杂，但实际上它只是在构建前面已经定义好的语法。大多数方法都与产生式名称（即 EBNF\
  \ 中每条产生式行开头的名称，例如 `eqExpr` 和 `andExpr`）类似。如果查看 `expression()` 方法，您会发现它构建的规则与之前 EBNF\
  \ 中定义的规则相同：\n\n```php\n// expr     = operand { orExpr | andExpr }\npublic function\
  \ expression()\n{\nif (! isset($this->expression)) {\n$this->expression = new SequenceParse();\n\
  $this->expression->add($this->operand());\n$bools = new RepetitionParse();\n$whichbool\
  \ = new AlternationParse();\n$whichbool->add($this->orExpr());\n$whichbool->add($this->andExpr());\n\
  $bools->add($whichbool);\n$this->expression->add($bools);\n}\nreturn $this->expression;\n\
  }\n```\n\n在代码和 EBNF 表示法中，我定义了一个序列，该序列包含一个对 `operand` 的引用，后跟零个或多个 `orExpr` 与 `andExpr`\
  \ 之间的交替实例。请注意，我将此方法返回的 `Parser` 存储在一个属性变量中。这是为了防止无限循环，因为从 `expression()` 调用的方法本身也会引用\
  \ `expression()`。\n\n唯一执行了超出构建语法范围操作的方法是 `compile()` 和 `evaluate()`。`compile()`\
  \ 可以直接调用，也可以通过构造函数自动调用，构造函数接受一条语句字符串，并使用它创建一个 `Scanner` 对象。它调用 `expression()` 方法，该方法返回一个由构成语法的\
  \ `Parser` 对象组成的树。然后它调用 `Parser::scan()`，并将 `Scanner` 对象传递给它。如果原始代码无法解析，`compile()`\
  \ 方法会抛出一个异常。否则，它会检索编译结果，该结果作为 `Scanner` 对象的 `Context` 存在。您很快就会看到，这应该是一个 `Expression`\
  \ 对象。此结果存储在一个名为 `$interpreter` 的属性中。\n\n`evaluate()` 方法使一个值对 `Expression` 树可用。它通过预定义一个名为\
  \ `input` 的 `VariableExpression` 对象，并将其注册到随后传递给主 `Expression` 对象的 `Context` 对象中来实现这一点。与\
  \ PHP 中的 `$_REQUEST` 等变量一样，这个 `$input` 变量始终对 MarkLogic 编码器可用。\n\n注意\n\n有关 `VariableExpression`\
  \ 类的更多信息，请参见第 11 章，该类是解释器模式示例的一部分。\n\n`evaluate()` 方法调用 `Expression::interpret()`\
  \ 方法来生成最终结果。请记住，您需要从 `Context` 对象中检索解释器结果。\n\n到目前为止，您已经了解了如何解析文本以及如何构建语法。您还在第 11\
  \ 章中了解了如何使用解释器模式来组合 `Expression` 对象并处理查询。然而，您还没有看到如何将这两个过程联系起来。如何从解析树得到解释器？答案在于可以使用\
  \ `Parser::setHandler()` 与 `Parser` 对象关联的 `Handler` 对象。让我们看看管理变量的方法。我在 `variable()`\
  \ 方法中将一个 `VariableHandler` 与 `Parser` 关联起来：\n\n```php\n$variable->setHandler(new\
  \ VariableHandler());\n```\n\n这是 `Handler` 接口：\n\n```php\n// listing 24.16\ninterface\
  \ Handler\n{\npublic function handleMatch(\nParser $parser,\nScanner $scanner\n\
  );\n}\n```\n\n这是 `VariableHandler`：\n\n```php\n// listing 24.17\nclass VariableHandler\
  \ implements Handler\n{\npublic function handleMatch(Parser $parser, Scanner $scanner)\n\
  {\n$varname = $scanner->getContext()->popResult();\n$scanner->getContext()->pushResult(new\
  \ VariableExpression($varname));\n}\n}\n```\n\n如果与 `VariableHandler` 关联的 `Parser`\
  \ 在一次扫描操作中匹配成功，则调用 `handleMatch()`。根据定义，栈上的最后一个项目将是变量的名称。我将其移除，并用一个同名的新 `VariableExpression`\
  \ 对象替换。创建 `EqualsExpression` 对象、`LiteralExpression` 对象等也采用了类似的原理。\n\n以下是其余的处理程序：\n\
  \n\n```php\n// 清单 24.18\nclass StringLiteralHandler implements Handler\n{\npublic\
  \ function handleMatch(Parser $parser, Scanner $scanner)\n{\n$value = $scanner->getContext()->popResult();\n\
  $scanner->getContext()->pushResult(new LiteralExpression($value));\n}\n}\n// 清单\
  \ 24.19\nclass EqualsHandler implements Handler\n{\npublic function handleMatch(Parser\
  \ $parser, Scanner $scanner)\n{\n$comp1 = $scanner->getContext()->popResult();\n\
  $comp2 = $scanner->getContext()->popResult();\n$scanner->getContext()->pushResult(new\
  \ EqualsExpression($comp1, $comp2));\n}\n}\n// 清单 24.20\nclass BooleanOrHandler\
  \ implements Handler\n{\npublic function handleMatch(Parser $parser, Scanner $scanner)\n\
  {\n$comp1 = $scanner->getContext()->popResult();\n$comp2 = $scanner->getContext()->popResult();\n\
  $scanner->getContext()->pushResult(new BooleanOrExpression($comp1, $comp2));\n}\n\
  }\n// 清单 24.21\nclass BooleanAndHandler implements Handler\n{\npublic function handleMatch(Parser\
  \ $parser, Scanner $scanner)\n{\n$comp1 = $scanner->getContext()->popResult();\n\
  $comp2 = $scanner->getContext()->popResult();\n$scanner->getContext()->pushResult(new\
  \ BooleanAndExpression($comp1, $comp2));\n}\n}\n```\n\n请记住，你还需要手头有第 11 章的**解释器模式**示例，然后你可以像这样使用\
  \ `MarkParse` 类：\n\n```\n$input      = 'five';\n$statement = \"( \\$input equals\
  \ 'five')\";\n$engine = new MarkParse($statement);\n$result = $engine->evaluate($input);\n\
  print \"input: $input evaluating: $statement\\n\";\nif ($result) {\nprint \"true!\\\
  n\";\n} else {\nprint \"false!\\n\";\n}\n```\n\n这应该会输出以下结果：\n\n```\ninput: five\
  \ evaluating: ( $input equals 'five')\ntrue!\n```\n\n## 索引\n\n### A\n\n- 抽象工厂模式（Abstract\
