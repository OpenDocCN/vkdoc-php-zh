    ■**Note** The AllowOverride directive in the Apache configuration we created earlier
    allows us to change the configuration within a .htaccess file.


    **Listing 2-3.** *Routing All Web Site Requests Through the index.php File (.htaccess)*
    RewriteEngine on


    RewriteCond %{SCRIPT_FILENAME} !-f


    RewriteCond %{SCRIPT_FILENAME} !-d


    RewriteRule ^(.*)$ index.php/$1


    The first line in Listing 2-3 enables mod_rewrite for the directory in which .htaccess
    is located (including subdirectories).


    The second and third lines set up conditions for rewriting the request to index.php.
    The second line says “if the requested file doesn’t correspond to a file relative
    to the web root then use the rewrite rule,” while the third line says the same
    thing but for nonexistent directories.


    The final line is then executed if either of the conditions is satisfied. The
    requested filename is made available to index.php by adding it to the request
    string.


