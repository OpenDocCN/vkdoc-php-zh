- fmt: "### Creating delete scripts with foreign-key constraints\n\nChoosing the values\
    \ for `ON DELETE` in InnoDB tables depends on the nature of the relationship between\
    \ tables. In the case of the `phpsols` database, it’s not only safe but desirable\
    \ to set the option to `CASCADE` for both columns in the `article2cat` cross-reference\
    \ table. If a record is deleted in either the `blog` or `categories` parent tables,\
    \ the related values need to be deleted in the cross-reference table.\n\nThe relationship\
    \ between the `images` and `blog` tables is different. If you delete a record\
    \ from the `images` table, you probably don’t want to delete related articles\
    \ in the `blog` table. In that case, `SET NULL` is an appropriate choice. When\
    \ a record is deleted from the `images` table, the foreign key in related articles\
    \ is set to `NULL`, but the articles remain intact.\n\nOn the other hand, if images\
    \ are vital to the understanding of articles, select `RESTRICT`. Any attempt to\
    \ delete an image that still has related articles is automatically halted.\n\n\
    These considerations affect how you handle deletion scripts. When the foreign-key\
    \ constraint is set to `CASCADE` or `SET NULL`, you don’t need to do anything\
    \ special. You can use a simple `DELETE` query and leave the rest to the database.\n\
    \nHowever, if the foreign-key constraint is set to `RESTRICT`, the `DELETE` query\
    \ will fail. To display an appropriate error message, use the `errno` property\
    \ of a MySQLi statement object. The MySQL error code for a query that fails as\
    \ a result of a foreign-key constraint is `1451`. After calling the `execute()`\
    \ method, you can check for errors in MySQLi as follows:\n\n```\n$stmt->execute();\n\
    if ($stmt->affected_rows > 0) {\n    $deleted = true;\n} else {\n    $deleted\
    \ = false;\n    if ($stmt->errno == 1451) {\n        $error = 'That record has\
    \ dependent files in a child table, and cannot be deleted.';\n    } else {\n \
    \       $error = 'There was a problem deleting the record.';\n    }\n}\n```\n\n\
    If you are using PDO, use the `errorCode()` method. The code for a query that\
    \ fails as a result of a foreign-key constraint is `HY000`. After checking the\
    \ number of affected rows, you can check the error code with a PDO prepared statement,\
    \ like this:\n\n```\n$deleted = $stmt->rowCount();\nif (!$deleted) {\n    if ($stmt->errorCode()\
    \ == 'HY000') {\n        $error = 'That record has dependent files in a child\
    \ table, and cannot be deleted.';\n    } else {\n        $error = 'There was a\
    \ problem deleting the record.';\n    }\n}\n```\n\nThe technique is the same if\
    \ you use the PDO `exec()` method, which returns the number of affected rows with\
    \ a non-`SELECT` query. When using `exec()`, the `errorCode()` method is called\
    \ on the database connection.\n\n```\n$deleted = $conn->exec($sql);\nif (!$deleted)\
    \ {\n    if ($conn->errorCode() == 'HY000') {\n        $error = 'That record has\
    \ dependent files in a child table, and cannot be deleted.';\n    } else {\n \
    \       $error = 'There was a problem deleting the record.';\n    }\n}\n```\n\n\
    ### Creating delete scripts without foreign-key constraints\n\nIf you can’t use\
    \ InnoDB tables, you need to build the same logic into your own delete scripts.\
    \ To achieve the same effect as `ON DELETE CASCADE`, run two consecutive `DELETE`\
    \ queries, like this:\n\n```\n$sql = 'DELETE FROM article2cat WHERE article_id\
    \ = ?';\n$stmt->prepare($sql);\n$stmt->bind_param('i', $_POST['article_id']);\n\
    $stmt->execute();\n\n$sql = 'DELETE FROM blog WHERE article_id = ?';\n$stmt->prepare($sql);\n\
    $stmt->bind_param('i', $_POST['article_id']);\n$stmt->execute();\n```\n\nTo achieve\
    \ the same effect as `ON DELETE SET NULL`, run an `UPDATE` query combined with\
    \ a `DELETE` query, like this:\n\n```\n$sql = 'UPDATE blog SET image_id = NULL\
    \ WHERE image_id = ?';\n$stmt->prepare($sql);\n$stmt->bind_param('i', $_POST['image_id']);\n\
    $stmt->execute();\n\n$sql = 'DELETE FROM images WHERE image_id = ?';\n$stmt->prepare($sql);\n\
    $stmt->bind_param('i', $_POST['image_id']);\n$stmt->execute();\n```\n\nTo achieve\
    \ the same effect as `ON DELETE RESTRICT`, you need to run a `SELECT` query to\
    \ find if there are dependent records before continuing with the `DELETE` query,\
    \ like this:\n\n```\n$sql = 'SELECT image_id FROM blog WHERE image_id = ?';\n\
    $stmt->prepare($sql);\n$stmt->bind_param('i', $_POST['image_id']);\n$stmt->execute();\n\
    // store result to find out how many rows it contains\n$stmt->store_result();\n\
    // if num_rows is not 0, there are dependent records\nif ($stmt->num_rows) {\n\
    \    $error = 'That record has dependent files in a child table, and cannot be\
    \ deleted.';\n} else {\n    $sql = 'DELETE FROM images WHERE image_id = ?';\n\
    \    $stmt->prepare($sql);\n    $stmt->bind_param('i', $_POST['image_id']);\n\
    \    $stmt->execute();\n}\n```\n\n## Chapter Review\n\nOnce you have learned the\
    \ basic SQL and the PHP commands necessary to communicate with a database, working\
    \ with single tables is very easy. Linking tables through foreign keys, however,\
    \ can be quite challenging. The power of a relational database comes from its\
    \ sheer flexibility. The problem is that this infinite flexibility means there\
    \ is no single “right” way of doing things.\n\nDon't let this put you off, though.\
    \ Your instinct may be to stick with single tables, but down that route lies even\
    \ greater complexity. The key to making it easy to work with databases is to limit\
    \ your ambitions in the early stages. Build simple structures like the one in\
    \ this chapter, experiment with them, and get to know how they work. Add tables\
    \ and foreign-key links gradually. People with a lot of experience working with\
    \ databases say they frequently spend more than half the development time just\
    \ thinking about the table structure. After that, the coding is the easy bit!\n\
    \nIn the final chapter, we move back to working with a single table, addressing\
    \ the important subject of user authentication with a database and how to handle\
    \ encrypted passwords.\n\n# 17. Authenticating Users with a Database\n\nChapter\
    \ 9 showed you the principles of user authentication and sessions to password\
    \ protect parts of your website, but the login scripts all relied on usernames\
    \ and passwords stored in a CSV file. Keeping user details in a database is both\
    \ more secure and more efficient. Instead of just storing a list of usernames\
    \ and passwords, a database can store other details, such as first name, family\
    \ name, email address, and so on. Databases also give you the option of using\
    \ either one- or two-way encryption. In the first section of this chapter, we’ll\
    \ examine the difference between the two. Then you’ll create registration and\
    \ login scripts for both types of encryption.\n\nWhat this chapter covers:\n\n\
    *   Deciding how to encrypt passwords\n*   Using one-way encryption for user registration\
    \ and login\n*   Using two-way encryption for user registration and login\n* \
    \  Decrypting passwords"
