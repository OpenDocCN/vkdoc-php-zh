    **The To-Do List’s MVC Layout**


    The first order of business is to understand how the MVC structure will work with
    the specific needs of the application. For the general to-do list application
    that you’ll build, you will need to arrange certain processes throughout the MVC
    structure.


    The to-do list application will have items that the client will want to complete.
    For each item there will be a description or title, a due date, a priority level,
    and a true/false field for whether the item is completed. So, in the MVC structure,
    you will split the processes into their respective elements. First, you’ll create
    a controller for the items the client will want to save.


    Second, you’ll create a model that will fetch items from the database and manage
    any other data-handling processes. Next, you will have Cake generate the views
    that will allow the client to list, edit, delete, and create new items. That’s
    all there is to it.


    Before you can begin saving items in the database, you must first create the database
    tables and fields. In general, when designing an application, the order of creation
    goes something like this:


    **1.** Design and create the database.


    **2.** Create models.


    **3.** Create controllers.


    **4.** Create and adjust views.


    You already have a folder in your localhost root named first_app that has Cake
    1.2 running. Let’s rename this folder to todo and build the database. You should
    be able to launch the to-do list application by typing [**http://localhost/todo**.](http://localhost/todo)


    **Designing and Creating the Database**


    In thinking about how the database should be designed, first you need to know
    something about the application you’re building. Most programmers like to sketch
    use cases or flowcharts that explain step-by-step how the user will interact with
    the program and how the application will react to their inputs. I have already
    discussed how the application will work under an MVC structure; translating this
    into the schema so that the database works correctly with Cake is the next step.


    ■**Note** If you haven’t already done so, make sure you have created a database
    to be used with this application and put the configuration parameters into the
    app/config/database.php file.


    Create a table in the database and name it items (be sure to use lowercase). Then
    give the table the fields shown in Table 3-2.


