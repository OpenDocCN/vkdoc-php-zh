  \ `EDIT` 链接来验证你的更改是否已生效。如有必要，可以对照 `blog_update_pdo_03.php` 和 `blog_list_pdo_03.php`\
  \ 检查代码。\n\n---\n\n## 删除记录\n\n删除数据库中的记录与更新记录类似。基本的 `DELETE` 命令如下所示：\n\n```\nDELETE\
  \ FROM table_name WHERE condition\n```\n\n`DELETE` 命令可能危险的地方在于它是最终性的。一旦删除了一条记录，就没有回头路了——它将永久消失。没有回收站或垃圾桶可以把它找回来。更糟糕的是，`WHERE`\
  \ 子句是可选的。如果你省略它，表中的每一条记录都将不可挽回地被送入网络湮灭。因此，最好显示待删除记录的详细信息，并让用户确认或取消操作（参见图 15-4）。\n\
  \n![../images/332054_4_En_15_Chapter/332054_4_En_15_Fig4_HTML.jpg](img/332054_4_En_15_Fig4_HTML.jpg)\n\
  \n图 15-4。删除记录不可逆，因此在继续之前获取确认\n\n构建和编写删除页面的脚本与更新页面几乎相同，因此我不会给出逐步说明。不过，以下是主要要点：\n\n\
  -   检索所选记录的详细信息。\n-   显示足够的信息（例如标题），以便用户确认选择了正确的记录。\n-   为 `Confirm Deletion` 和\
  \ `Cancel` 按钮设置不同的 `name` 属性，并使用 `isset()` 配合每个 `name` 属性来控制执行的操作。\n-   不要将整个表单包裹在\
  \ `else` 代码块中，而是使用条件语句来隐藏 `Confirm Deletion` 按钮和隐藏字段。\n\n以下是每种方法执行删除操作的代码。\n\n###\
  \ 对于 MySQLi：\n\n```\nif (isset($_POST['delete'])) {\n$sql = 'DELETE FROM blog WHERE\
  \ article_id = ?';\nif ($stmt->prepare($sql)) {\n$stmt->bind_param('i', $_POST['article_id']);\n\
  $stmt->execute();\nif ($stmt->affected_rows > 0) {;\n$deleted = true;\n} else {\n\
  $error = 'There was a problem deleting the record.';\n}\n}\n}\n```\n\n### 对于 PDO：\n\
  \n\n\n```\nif (isset($_POST['delete'])) {\n$sql = 'DELETE FROM blog WHERE article_id\
  \ = ?';\n$stmt = $conn->prepare($sql);\n$stmt->execute([$_POST['article_id']]);\n\
  // 获取受影响的行数\n$deleted = $stmt->rowCount();\nif (!$deleted) {\n$error = '删除记录时出现问题。';\n\
  $error .= $stmt->errorInfo()[2];\n}\n}\n```\n\n你可以在 `ch15` 文件夹中的 `blog_delete_mysqli.php`\
  \ 和 `blog_delete_pdo.php` 文件中找到完整的代码。要测试删除脚本，请将相应的文件复制到 `admin` 文件夹。\n\n## 回顾四个基本的\
  \ SQL 命令\n\n现在你已经了解了 `SELECT`、`INSERT`、`UPDATE` 和 `DELETE` 的实际应用，让我们回顾一下 MySQL 和\
  \ MariaDB 的基本语法。这并不是一个详尽的列表，而是集中于最重要的选项，包括一些尚未涉及的。\n\n我使用了与 MySQL 在线手册 [`dev.mysql.com/doc/refman/8.0/en/`](https://dev.mysql.com/doc/refman/8.0/en/)\
  \ 相同的排版约定（你也可以参考该手册）：\n\n*   大写内容均为 SQL 命令。\n*   方括号内的表达式为可选。\n*   小写斜体表示变量输入。\n\
  *   竖线（`|`）分隔备选项。\n\n尽管某些表达式是可选的，但它们必须按列出的顺序出现。例如，在 `SELECT` 查询中，`WHERE`、`ORDER\
  \ BY` 和 `LIMIT` 都是可选的，但 `LIMIT` 永远不能出现在 `WHERE` 或 `ORDER BY` 之前。\n\n### SELECT\n\
  \n`SELECT` 用于从一个或多个表中检索记录。其基本语法如下：\n\n```\nSELECT [DISTINCT] select_list\nFROM table_list\n\
  [WHERE where_expression]\n[ORDER BY col_name | formula] [ASC | DESC]\n[LIMIT [skip_count,]\
  \ show_count]\n```\n\n`DISTINCT` 选项告诉数据库你想要从结果中消除重复的行。*select_list* 是一个以逗号分隔的列名列表，用于指定你想要包含在结果中的列。要检索所有列，请使用星号（`*`）。如果同一个列名在多个表中使用，则必须使用\
  \ *table_name.column_name* 的语法来明确引用。第 17 章和第 18 章详细解释了如何处理多个表。*table_list* 是一个以逗号分隔的表名列表，结果将从这些表中提取。所有你想要包含在结果中的表*必须*被列出。\n\
  \n`WHERE` 子句指定搜索条件，例如：\n\n```\nWHERE quotations.family_name = authors.family_name\n\
  WHERE article_id = 2\n```\n\n`WHERE` 表达式可以使用比较、算术、逻辑和模式匹配运算符。最重要的运算符列在表 15-2 中。\n\
  \n**表 15-2. MySQL `WHERE` 表达式中使用的主要运算符**\n\n**比较** | | **算术** | |\n--- | --- | ---\
  \ | --- | --- | --- | --- | --- |\n`<` | 小于 | `+` | 加法 |\n`<=` | 小于或等于 | `-` | 减法\
  \ |\n`=` | 等于 | `*` | 乘法 |\n`!=` | 不等于 | `/` | 除法 |\n`<>` | 不等于 | `DIV` | 整数除法 |\n\
  `>` | 大于 | `%` | 取模 |\n`>=` | 大于或等于 | |\n`IN()` | 包含在列表中 | |\n`BETWEEN` *min* `AND`\
  \ *max* | 介于（包含两个值）之间 | |\n\n**逻辑** | | **模式匹配** | |\n--- | --- | --- | --- |\n\
  `AND` | 逻辑与 | `LIKE` | 不区分大小写的匹配 |\n`&&` | 逻辑与 | `NOT LIKE` | 不区分大小写的不匹配 |\n`OR`\
  \ | 逻辑或 | `LIKE BINARY` | 区分大小写的匹配 |\n`||` | 逻辑或（最好避免使用） | `NOT LIKE BINARY` | 区分大小写的不匹配\
  \ |\n\n在表示“不等于”的两个运算符中，`<>` 是标准 SQL。并非所有数据库都支持 `!=`。\n\n`DIV` 是取模运算符的对应项。它产生除法结果为一个不带小数部分的整数，而取模只产生余数。\n\
  \n```\n5 / 2        /* 结果 2.5 */\n5 DIV 2      /* 结果 2  */\n5 % 2        /* 结果 1\
  \  */\n```\n\n我建议你避免使用 `||`，因为在标准 SQL 中它实际上被用作字符串连接运算符。通过不在 MySQL 中使用它，如果你未来使用其他关系型数据库，可以避免混淆。对于字符串连接，MySQL\
  \ 使用 `CONCAT()` 函数（参见 [`dev.mysql.com/doc/refman/8.0/en/string-functions.html#function_concat`](https://dev.mysql.com/doc/refman/8.0/en/string-functions.html%2523function_concat)\
  \ ）。`IN()` 评估括号内以逗号分隔的值列表，如果找到一个或多个值，则返回 `true`。尽管 `BETWEEN` 通常与数字一起使用，但它也适用于字符串。例如，`BETWEEN\
  \ 'a' AND 'd'` 对于 *a*、*b*、*c* 和 *d*（但不包括其大写形式）返回 `true`。`IN()` 和 `BETWEEN` 都可以在前面加上\
  \ `NOT` 来执行相反的比较。\n\n`LIKE`、`NOT LIKE` 以及相关的 `BINARY` 运算符用于文本搜索，并与以下两个通配符结合使用：\n\
  \n*   `%`：匹配任何字符序列（包括无字符）\n*   `_`（下划线）：恰好匹配一个字符\n\n因此，以下 `WHERE` 子句匹配 Dennis、Denise\
  \ 等，但不匹配 Aiden：\n\n```\nWHERE first_name LIKE 'den%'\n```\n\n要匹配 Aiden，请在搜索模式的前面加上\
  \ `%`。由于 `%` 匹配任何字符序列（包括无字符），因此 `'%den%'` 仍然匹配 Dennis 和 Denise。要搜索字面上的百分号或下划线，请在其前面加上反斜杠（`\\\
  %` 或 `\\_`）。条件从左到右进行求值，但如果你希望一组条件被一起考虑，可以将它们分组在括号中。\n\n`ORDER BY` 指定结果的排序顺序。这可以指定为单个列、以逗号分隔的列列表或一个表达式（例如\
  \ `RAND()`），该表达式用于随机化顺序。默认排序顺序为升序（a–z，0–9），但你可以指定 `DESC`（降序）来颠倒顺序。\n\n`LIMIT` 后跟一个数字，规定了要返回的最大记录数。如果给出了两个由逗号分隔的数字，第一个数字告诉数据库要跳过多少行（参见第\
  \ 14 章中的“选择记录子集”）。更多关于 `SELECT` 的详细信息，请参见 [`dev.mysql.com/doc/refman/8.0/en/select.html`](https://dev.mysql.com/doc/refman/8.0/en/select.html)。\n\
  \n### INSERT\n\n`INSERT` 命令用于向数据库添加新记录。一般语法如下：\n\n```\nINSERT [INTO] table_name\
  \ (column_names)\nVALUES (values)\n```\n\n`INTO` 是一个可选词；它只是让命令读起来更像人类语言。列名和值都是逗号分隔的列表，并且两者必须顺序相同。因此，要将纽约（暴风雪）、底特律（烟雾）和檀香山（晴天）的天气预报插入到一个天气数据库中，你可以这样操作：\n\
  \n```\nINSERT INTO forecast (new_york, detroit, honolulu)\nVALUES ('blizzard', 'smog',\
  \ 'sunny')\n```\n\n这样设计语法的原因是为了允许你一次插入多条记录。每条后续记录放在一组单独的括号中，每组之间用逗号分隔：\n\n```\n\
  INSERT numbers (x,y)\nVALUES (10,20),(20,30),(30,40),(40,50)\n```\n\n你将在第 18 章中使用这种多记录插入语法。任何在\
  \ `INSERT` 查询中省略的列都将被设置为其默认值。*切记，对于设置为* `AUTO_INCREMENT` *的列，绝不要为其主键设置显式值*；只需在 `INSERT`\
  \ 语句中省略该列名即可。更多详情，请参见 [`dev.mysql.com/doc/refman/8.0/en/insert.html`](https://dev.mysql.com/doc/refman/8.0/en/insert.html)。\n\
  \n### UPDATE\n\n此命令用于更改现有记录。基本语法如下所示：\n\n```\nUPDATE table_name\nSET col_name =\
  \ value [, col_name = value]\n[WHERE where_expression]\n```\n\n`WHERE` 表达式告诉 MySQL\
  \ 你想要更新哪条或哪些记录（或者在以下示例的情况下，或许只是梦想）：\n\n\n\n```sql\nUPDATE sales SET q4_2019 = 25000\n\
  WHERE title = 'PHP 7 Solutions, Fourth Edition'\n```\n\n有关`UPDATE`的更多详情，请参阅 [`https://dev.mysql.com/doc/refman/8.0/en/update.html`](https://dev.mysql.com/doc/refman/8.0/en/update.html)。\n\
  \n## `DELETE`\n\n`DELETE`可用于删除单条记录、多条记录或整个表的内容。从单个表中删除数据的一般语法如下：\n\n```sql\nDELETE\
  \ FROM table_name [WHERE where_expression]\n```\n\n尽管`phpMyAdmin`在删除记录前会提示您确认，但数据库会立即执行删除操作。`DELETE`是完全无情的——数据一旦被删除，就永久消失了。以下查询将删除`subscribers`表中`expiry_date`已过期日期的所有记录：\n\
  \n```sql\nDELETE FROM subscribers\nWHERE expiry_date < NOW()\n```\n\n更多详情，请参阅 [`https://dev.mysql.com/doc/refman/8.0/en/delete.html`](https://dev.mysql.com/doc/refman/8.0/en/delete.html)。\n\
  \n### 警告\n虽然`WHERE`子句在`UPDATE`和`DELETE`中都是可选的，但您应该意识到，如果省略了`WHERE`，整个表都会受到影响。这意味着，不小心遗漏这两个命令中的任何一个，都可能导致每条记录完全相同——或者被完全删除。\n\
  \n## 安全与错误消息\n在使用 PHP 和数据库开发网站时，显示错误消息至关重要，以便在出现问题时调试代码。然而，原始的错误消息在正式网站上看起来不专业。它们还可能向潜在攻击者泄露有关数据库结构的线索。因此，在将脚本部署到互联网上之前，您应该将数据库生成的错误消息替换为中立的消息，例如“抱歉，数据库不可用。”\n\
  \n## 章节回顾\n使用数据库进行内容管理涉及插入、选择、更新和删除记录。每条记录的主键在更新和删除过程中起着至关重要的作用。大多数情况下，当记录首次创建时，主键由数据库自动生成。之后，查找记录的主键只需使用`SELECT`查询，方法是显示所有记录的列表或根据您了解的关于记录的信息（如标题或文章中的词语）进行搜索。`MySQLi`和`PDO`预处理语句通过消除确保引号和特殊字符正确转义的需要，使得数据库查询更加安全。如果在脚本中使用不同变量重复相同查询，它们还能加速应用程序。脚本无需每次都验证`SQL`，只需使用占位符验证一次即可。\n\
  尽管本章集中于内容管理，但相同的基本技术适用于大多数与数据库的交互。当然，`SQL`和`PHP`远不止于此。在下一章中，我将解决一些最常见的问题，例如仅显示长文本字段的第一句话或处理日期。然后，在第\
  \ 17 章中，我们将探讨如何在数据库中处理多个表。\n\n## 16. 格式化文本和日期\n\n上一章还有一些未完成的任务。第 15 章的图 15-1 显示了`blog`表中的内容，只显示了每篇文章的前两句话，并提供了一个链接查看全文。但是，我没有向您展示这是如何实现的。从较长的文本开头提取较短的文本片段有几种方法。有些方法相当粗糙，通常会在末尾留下一个断词。在本章中，您将学习如何提取完整的句子。\n\
  另一个未完成的任务是，`blog_list_mysqli.php`和`blog_list_pdo.php`中的完整文章列表以原始状态显示`MySQL`时间戳，这不太优雅。您需要重新格式化日期以使其更友好。处理日期可能是一个大麻烦，因为`MySQL`和`MariaDB`以与`PHP`完全不同的方式存储日期。本章将指导您完成在`PHP/MySQL`环境中存储和显示日期的难题。您还将了解`PHP`的日期和时间特性，这些特性使复杂的日期计算（例如查找每个月的第二个星期二）变得轻而易举。\n\
  \n在本章中，您将学习以下内容：\n\n*   提取较长文本项的第一部分\n*   在`SQL`查询中使用别名\n*   将数据库检索到的文本显示为段落\n*\
  \   使用`MySQL`格式化日期\n*   基于时间条件选择记录\n*   使用`PHP`的`DateTime`、`DateTimeZone`、`DateInterval`和`DatePeriod`类\n\
  \n## 显示文本摘录\n有许多方法可以从较长的文本中提取前几行或前几个字符。有时您只需要前 20 或 30 个字符来标识一个项目。其他时候，最好显示完整的句子或段落。\n\
  \n### 提取固定数量的字符\n您可以使用`PHP`的`substr()`函数或`SQL`查询中的`LEFT()`函数从文本开头提取固定数量的字符。\n\n\
  > **注意**\n> 以下示例将文本传递给第 13 章中定义的`safe()`函数。此函数通过将和号、双引号和尖括号转换为其`HTML`字符实体等价物来净化来自外部源的文本，但防止现有实体被双重编码。该函数定义包含在`utility_funcs.php`文件中。\n\
  \n### 使用`PHP Substr()`函数\n\n`substr()`函数从较长的字符串中提取一个子串。它接受三个参数：要从中提取子串的字符串、起始点（从\
  \ 0 开始计数）以及要提取的字符数。以下代码显示`$row['article']`的前 100 个字符：\n\n```php\necho safe(substr($row['article'],\
  \ 0, 100));\n```\n\n原始字符串保持不变。如果省略第三个参数，`substr()`将提取到字符串末尾的所有内容。这只有在您选择非 0 的起始点时才有意义。\n\
  \n### 在`SQL`查询中使用`LEFT()`函数\n\n`LEFT()`函数从列的开头提取字符。它接受两个参数：列名和要提取的字符数。以下查询从`blog`表的`article`列中检索`article_id`、`title`和前\
  \ 100 个字符：\n\n```sql\nSELECT article_id, title, LEFT(article, 100)\nFROM blog ORDER\
  \ BY created DESC\n```\n\n每当您像这样在`SQL`查询中使用函数时，该列名在结果集中将不再显示为`article`，而是显示为`LEFT(article,\
  \ 100)`。因此，使用`AS`关键字为受影响的列分配**别名**是一个好主意。您可以将列的原始名称重新指定为别名，或者使用描述性名称，如以下示例所示（代码位于`ch16`文件夹中的`blog_left_mysqli.php`和`blog_left_pdo.php`中）：\n\
  \n```sql\nSELECT article_id, title, LEFT(article, 100) AS first100\nFROM blog ORDER\
  \ BY created DESC\n```\n\n\n\n# 处理数据库记录\n\n如果以 `$row` 的形式逐条处理记录，提取的内容保存在 `$row['first100']`\
  \ 中。要同时获取前 100 个字符和完整文章，只需在查询语句中包含两者即可，如下所示：\n\n```\nSELECT article_id, title, LEFT(article,\
  \ 100) AS first100, article\nFROM blog ORDER BY created DESC\n```\n\n提取固定数量的字符会产生粗糙的结果，如图\
  \ 16-1 所示。\n\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig1_HTML.jpg](img/332054_4_En_16_Fig1_HTML.jpg)\n\
  \n**图 16-1.** 从文章中选取前 100 个字符会将许多单词截断\n\n## 在完整单词处结束摘要\n\n要在完整单词处结束摘要，你需要找到最后一个空格，并以此确定子字符串的长度。因此，如果你希望摘要最多为\
  \ 100 个字符，请先使用前面任一种方法，并将结果存储在 `$extract` 中。然后你可以使用 PHP 字符串函数 `strrpos()` 和 `substr()`\
  \ 找到最后一个空格，并按如下方式结束摘要（代码位于 `blog_word_mysqli.php` 和 `blog_word_pdo.php` 中）：\n\n\
  ```\n$extract = $row['first100'];\n// 查找摘要中最后一个空格的位置\n$lastSpace = strrpos($extract,\
  \ ' ');\n// 使用 $lastSpace 设置新摘要的长度并添加 ...\necho safe(substr($extract, 0, $lastSpace))\
  \ . '... ';\n```\n\n这样会生成更优雅的结果，如图 16-2 所示。它使用了 `strrpos()` 函数，该函数用于查找某个字符或子字符串在另一个字符串中最后一次出现的位置。由于你需要查找的是空格，第二个参数是一对引号，中间包含一个空格。结果存储在\
  \ `$lastSpace` 中，并作为第三个参数传递给 `substr()`，从而在完整单词处结束摘要。最后，添加一个包含三个点和一个空格的字符串，并使用连接运算符（点号）将这两部分连接起来。\n\
  \n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig2_HTML.jpg](img/332054_4_En_16_Fig2_HTML.jpg)\n\
  \n**图 16-2.** 在完整单词处结束摘要能产生更优雅的结果\n\n> **注意：** 不要将用于获取字符或子字符串最后位置的 `strrpos()` 与用于获取首次出现位置的\
  \ `strpos()` 混淆。多出的 \"r\" 代表 \"reverse\"（反向）——`strrpos()` 从字符串末尾开始搜索。\n\n## 提取第一段\n\
  \n假设你在输入数据库中的文本时，使用回车键或换行键来表示新段落，那么这一操作非常简单。只需获取全文，使用 `strpos()` 找到第一个换行符，然后使用 `substr()`\
  \ 提取到该位置为止的第一段文本。\n\n以下 SQL 查询用于 `blog_para_mysqli.php` 和 `blog_para_pdo.php`：\n\
  \n```\nSELECT article_id, title, article\nFROM blog ORDER BY created DESC\n```\n\
  \n以下代码用于显示 `article` 的第一段：\n\n```php\necho safe(substr($row['article'], 0, strpos($row['article'],\
  \ PHP_EOL)));\n```\n\n我们来分解一下，单独看看第三个参数：\n\n```\nstrpos($row['article'], PHP_EOL)\n\
  ```\n\n这行代码使用 `PHP_EOL` 常量以跨平台的方式定位 `$row['article']` 中的第一个行尾字符（参见第 7 章“使用 `fopen()`\
  \ 追加内容”）。你可以将代码重写为：\n\n```\n$newLine = strpos($row['article'], PHP_EOL);\necho safe(substr($row['article'],\
  \ 0, $newLine));\n```\n\n两段代码完成的功能完全相同，但 PHP 允许你将一个函数嵌套作为另一个函数的参数传递。只要嵌套函数返回有效结果，你就可以频繁使用这种快捷方式。使用\
  \ `PHP_EOL` 常量消除了处理 Linux、macOS 和 Windows 在插入换行时使用不同字符的问题。\n\n## 显示段落\n\n既然我们谈到了段落，很多初学者会对从数据库检索到的所有文本都显示为一个连续块、段落之间没有分隔而感到困惑。HTML\
  \ 会忽略空白字符，包括换行符。要让存储在数据库中的文本以段落形式显示，你有以下选择：\n\n- 将文本存储为 HTML。\n- 将换行符转换为 `<br/>`\
  \ 标签。\n- 创建自定义函数，用段落标签替换换行符。\n\n### 将数据库记录存储为 HTML\n\n第一种选择涉及在内容管理表单中安装 HTML 编辑器，例如\
  \ CKEditor（[`ckeditor.com/`](https://ckeditor.com/)）或 TinyMCE（[www.tiny.cloud/](http://www.tiny.cloud/)）。在插入或更新文本时对其进行标记。HTML\
  \ 存储在数据库中，文本会按预期方式显示。安装这类编辑器超出了本书的讨论范围。\n\n> **注意：** 如果将文本作为 HTML 存储在数据库中，则不能使用\
  \ `safe()` 函数来显示它，因为 HTML 标签会作为文本的一部分显示。相反，应使用 `strip_tags()` 并指定哪些标签是允许的（参见第 7\
  \ 章“访问远程文件”和 [www.php.net/manual/en/function.strip-tags.php](http://www.php.net/manual/en/function.strip-tags.php)）。\n\
  \n### 将换行符转换为 `<br/>` 标签\n\n最简单的做法是在显示文本之前将其传递给 `nl2br()` 函数，如下所示：\n\n```\necho\
  \ nl2br(safe($row['article']));\n```\n\n瞧！——段落出现了。好吧，其实并非如此。`nl2br()` 函数将换行符转换为\
  \ `<br/>` 标签（结束斜杠是为了与 XHTML 兼容，在 HTML5 中也有效）。结果你得到的是伪段落。这是一种快速但粗糙的解决方案，并不理想。\n\n\
  > **提示：** 使用 `nl2br()` 并非最佳方案。但如果决定使用它，必须在将文本传递给 `nl2br()` 之前对其进行净化。否则，`<br />`\
  \ 标签的尖括号会被转换为 HTML 字符实体，导致它们作为文本显示，而不是作为底层 HTML 中的标签。\n\n### 创建插入 `<p>` 标签的函数\n\n\
  要将从数据库中检索到的文本显示为真正的段落，请将数据库结果包裹在一对段落标签中，然后使用 `preg_replace()` 函数将连续的换行符转换为一个结束 `</p>`\
  \ 标签，紧接着是一个开始 `<p>` 标签，如下所示：\n\n```php\necho \"<p>\\n\" . preg_replace('/[\\r\\\
  n]+/', \"</p>\\n<p>\\n\", safe($row['article'])) . \"</p>\\n\";\n```\n\n用作第一个参数的正则表达式匹配一个或多个回车符和/或换行符。你不能在此处使用\
  \ `PHP_EOL` 常量，因为你需要匹配所有连续的换行符，并将它们替换为一对段落标签。这对 `<p>` 标签放在双引号内，使用 `\\n` 在它们之间添加一个换行符，以便使\
  \ HTML 代码更易于阅读。\n\n记住正则表达式的模式可能比较困难，因此你可以轻松地将其转换为自定义函数，如下所示：\n\n```php\nfunction\
  \ convertToParas($text) {\n    $text = trim($text);\n    $text = htmlspecialchars($text,\
  \ ENT_COMPAT|ENT_HTML5, 'UTF-8', false);\n    return '<p>' . preg_replace('/[\\\
  r\\n]+/', \"</p>\\n<p>\", $text) . \"</p>\\n\";\n}\n```\n\n该函数从文本的开头和结尾去除空白字符（包括换行符），然后通过将文本传递给包含四个参数的\
  \ `htmlspecialchars()` 函数进行净化。函数内部的第二行代码与第 13 章中定义的 `safe()` 函数中的代码相同。最后一行在开头添加\
  \ `<p>` 标签，将内部的连续换行符序列替换为结束和开始标签，并在末尾附加一个结束 `</p>` 标签和一个换行符。\n\n然后你可以像这样使用该函数：\n\
  \n```php\necho convertToParas($row['article']);\n```\n\n该函数定义的代码位于 `ch16` 文件夹中更新版的\
  \ `utility_funcs.php` 文件中。你可以在 `blog_ptags_mysqli.php` 和 `blog_ptags_pdo.php` 中看到它的用法。\n\
  \n\n\n注意  \n尽管`utility_funcs.php`的更新版本同时包含了`safe()`和`convertToParas()`函数定义，我决定不在`convertToParas()`内部调用`safe()`，因为这会产生潜在的不稳定依赖。如果在未来某个阶段你决定采用不同的文本清理方式并删除了`safe()`函数定义，调用`convertToParas()`时将触发致命错误，因为它依赖的正是已不存在的自定义函数。\n\
  \n## 提取完整句子\n\nPHP 没有句子的概念。统计句号意味着你会忽略所有以感叹号或问号结尾的句子，还会面临在小数点处断句或在句号后截断闭合引号的风险。为解决这些问题，我设计了一个名为`getFirst()`的\
  \ PHP 函数，它能识别正常句子末尾的标点符号：\n\n*   句号、问号或感叹号\n*   可选地后接单引号或双引号\n*   后接一个或多个空格\n\n\
  `getFirst()`函数接受两个参数：你要从中提取第一部分的文本，以及要提取的句子数量。第二个参数是可选的；如果未提供，函数默认提取前两个句子。代码如下（位于`utility_funcs.php`中）：\n\
  \n```\nfunction getFirst($text, $number=2) {\n    // 使用正则表达式拆分为句子\n    $sentences\
  \ = preg_split('/([.?!][\"\\']?\\s)/', $text, $number+1,\n        PREG_SPLIT_DELIM_CAPTURE);\n\
  \    if (count($sentences) > $number * 2) {\n        $remainder = array_pop($sentences);\n\
  \    } else {\n        $remainder = '';\n    }\n    $result = [];\n    $result[0]\
  \ = implode('', $sentences);\n    $result[1] = $remainder;\n    return $result;\n\
  }\n```\n\n此函数返回包含两个元素的数组：提取的句子和剩余的文本。你可以使用第二个元素创建指向全文页面的链接。\n\n加粗的那一行使用正则表达式识别每个句子的结尾——句号、问号或感叹号，可选地后接双引号或单引号及一个空格。这作为第一个参数传递给`preg_split()`，该函数使用正则表达式将文本拆分为数组。第二个参数是目标文本。第三个参数决定文本拆分的最大块数，这里设为比要提取的句子数量多一。通常情况下，`preg_split()`会丢弃正则表达式匹配到的字符，但使用`PREG_SPLIT_DELIM_CAPTURE`作为第四个参数，并结合正则表达式中的一对捕获括号，能将它们保留为独立的数组元素。换句话说，`$sentences`数组的元素交替出现句子文本和标点及空格，如下所示：\n\
  \n```\n$sentences[0] = '\"Hello, world';\n$sentences[1] = '!\" ';\n```\n\n事先无法知道目标文本中有多少句子，因此需要判断提取所需数量的句子后是否还有剩余内容。条件语句使用`count()`确定`$sentences`数组中的元素数量，并将结果与`$number`乘以\
  \ 2 进行比较（因为每个句子对应数组中的两个元素）。如果还有更多文本，`array_pop()`会移除`$sentences`数组的最后一个元素并将其赋值给`$remainder`。如果没有剩余文本，`$remainder`则为空字符串。函数的最后阶段使用`implode()`（以空字符串作为第一个参数）将提取的句子拼接起来，然后返回包含提取文本和剩余内容的双元素数组。\n\
  \n如果你觉得这段解释难以理解，别担心。这段代码相当高级，构建该函数经过大量实验，并且多年来我逐步改进它。\n\n## PHP 方案 16-1：显示文章的前两个句子\n\
  \n本 PHP 方案展示如何使用前述的`getFirst()`函数显示`blog`表中每篇文章的摘要。如果你在本书前面创建了 Japan Journey 站点，请使用`blog.php`。或者，使用`ch16`文件夹中的`blog_01.php`，并将其另存为`phpsols-4e`站点根目录下的`blog.php`。你还需要`includes`文件夹中的`footer.php`、`menu.php`、`title.php`和`connection.php`。如果`includes`文件夹中尚未包含这些文件，`ch16`文件夹中有它们的副本。\n\
  \n1.  将`utility_funcs.php`的更新版本从`ch16`文件夹复制到`includes`文件夹，并在`blog.php`的`DOCTYPE`声明上方的\
  \ PHP 代码块中引入它。同时引入`connection.php`并创建数据库连接。此页面需要只读权限，因此使用`read`作为传递给`dbConnect()`的参数，如下所示：\n\
  \n```\n    require_once './includes/connection.php';\n    require_once './includes/utility_funcs.php';\n\
  \    // 创建数据库连接\n    $conn = dbConnect('read');\n    ```\n\n    如果你使用 PDO，请在`dbConnect()`中添加`'pdo'`作为第二个参数。\n\
  \n2.  准备一个 SQL 查询，检索`blog`表中的所有记录，然后提交查询，如下所示：\n\n```\n    $sql = 'SELECT * FROM\
  \ blog ORDER BY created DESC';\n    $result = $conn->query($sql);\n    ```\n\n3.\
  \  添加检查数据库错误的代码。\n\n    对于 MySQLi，使用以下代码：\n\n```\n    if (!$result) {\n        $error\
  \ = $conn->error;\n    }\n    ```\n\n    对于 PDO，调用`errorInfo()`方法并检查第三个数组元素是否存在，如下所示：\n\
  \n```\n    $errorInfo = $conn->errorInfo();\n    if (isset($errorInfo[2])) {\n \
  \       $error = $errorInfo[2];\n    }\n    ```\n\n4.  删除页面`<main>`元素内的所有静态 HTML，并添加代码以在查询出现问题时显示错误消息：\n\
  \n```\n    $error\";\n    } else {\n    }\n    ?>\n\n```\n\n5.  在`else`块内创建一个循环以显示结果：\n\
  \n```\n    while ($row = $result->fetch_assoc()) {\n        echo \"{$row['title']}\"\
  ;\n        $extract = getFirst($row['article']);\n        echo '' . safe($extract[0]);\n\
  \        if ($extract[1]) {\n            echo '\n            <a href=\"details.php?article_id='\
  \ . $row['article_id'] . '\">More</a>';\n        }\n        echo '';\n    }\n  \
  \  ```\n\n    对于 PDO，代码相同，但这一行除外：\n\n```\n    while ($row = $result->fetch_assoc())\
  \ {\n    ```\n\n    将其替换为：\n\n```\n    while ($row = $result->fetch()) {\n    ```\n\
  \n    `getFirst()`函数处理`$row['article']`并将结果存储在`$extract`中。`$extract[0]`中的前两个句子会立即显示。如果`$extract[1]`包含内容，则表示还有更多要显示的内容。因此`if`块内的代码会显示一个指向`details.php`的链接，链接中带有文章主键的查询字符串。\n\
  \n6.  保存页面并在浏览器中测试。你应该会看到每篇文章的前两个句子如图 16-3 所示。\n\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig3_HTML.jpg](img/332054_4_En_16_Fig3_HTML.jpg)\n\
  \n图 16-3. 前两个句子已从较长的文本中干净地提取出来\n\n7.  通过向`getFirst()`添加数字作为第二个参数来测试函数，如下所示：\n\n\
  ```\n$extract = getFirst($row['article'], 3);\n```\n\n这将显示前三个句子。如果增加的数字等于或超过文章中的句子数量，则不会显示“More”链接。\
  \  \n你可以将你的代码与`ch16`文件夹中的`blog_mysqli.php`和`blog_pdo.php`进行比较。  \n我们将在第 17 章中介绍`details.php`。在此之前，让我们先处理动态网站中日期使用这个雷区。\n\
  \n\n\n# 一起来约会吧\n\n日期和时间对现代生活如此重要，以至于我们很少停下来思考它们有多复杂。每分钟有 60 秒，每小时有 60 分钟，但每天有 24\
  \ 小时。月份的天数在 28 到 31 天之间变化，而一年要么是 365 天，要么是 366 天。混乱还不止于此，因为 7 月 4 日对美国或日本人来说是 7/4，但对欧洲人来说是\
  \ 4 月 7 日。更令人困惑的是，PHP 处理日期的方式与 MySQL 不同。是时候拨乱反正了……\n\n> **备注**：MariaDB 处理日期的方式相同。为避免不必要的重复，我将仅提及\
  \ MySQL。\n\n## MySQL 如何处理日期\n\n在 MySQL 中，日期和时间始终按从大到小的降序表示：年、月、日、时、分、秒。小时始终使用 24\
  \ 小时制，午夜表示为`00:00:00`。即使这对你来说似乎不熟悉，但这也是国际标准化组织（ISO）推荐的标准。MySQL 允许在单位之间的分隔符方面有相当大的灵活性（任何标点符号都可以接受），但顺序是确定的，不可更改。如果你尝试以年、月、日以外的任何格式存储日期，MySQL\
  \ 会在数据库中插入 `0000-00-00`。\n\n稍后我会回过头来讨论如何向 MySQL 插入日期，因为最好使用 PHP 来验证和格式化它们。首先，让我们看看日期存储在\
  \ MySQL 后，你可以用它做些什么。MySQL 有许多日期和时间函数，在 [`https://dev.mysql.com/doc/refman/8.0/en/date-and-time-functions.html`](https://dev.mysql.com/doc/refman/8.0/en/date-and-time-functions.html)\
  \ 上有列表和示例。最有用的函数之一是 `DATE_FORMAT()`，它名副其实。\n\n### 在 `SELECT` 查询中使用 `DATE_FORMAT()`\
  \ 格式化日期\n\n`DATE_FORMAT()` 的语法如下：\n\n```\nDATE_FORMAT(date, format)\n```\n\n通常，*date*\
  \ 是要格式化的表列，而 *format* 是由格式化说明符和你希望包含的任何其他文本组成的字符串。表 16-1 列出了最常见的说明符，所有这些说明符都区分大小写。\n\
  \n**表 16-1. 常用的 MySQL 日期格式说明符**\n\n| 时间段 | 说明符 | 描述 | 示例 |\n| --- | --- | --- |\
  \ --- |\n| 年 | `%Y` | 四位数字格式 | 2014 |\n| | `%y` | 两位数字格式 | 14 |\n| 月 | `%M` | 完整名称\
  \ | January, September |\n| | `%b` | 缩写名称，三个字母 | Jan, Sep |\n| | `%m` | 带前导零的数字\
  \ | 01, 09 |\n| | `%c` | 不带前导零的数字 | 1, 9 |\n| 月中日 | `%d` | 带前导零 | 01, 25 |\n| |\
  \ `%e` | 不带前导零 | 1, 25 |\n| | `%D` | 带英文文本后缀 | 1st, 25th |\n| 工作日名称 | `%W` | 完整文本\
  \ | Monday, Thursday |\n| | `%a` | 缩写名称，三个字母 | Mon, Thu |\n| 小时 | `%H` | 带前导零的 24\
  \ 小时制 | 01, 23 |\n| | `%k` | 不带前导零的 24 小时制 | 1, 23 |\n| | `%h` | 带前导零的 12 小时制 |\
  \ 01, 11 |\n| | `%l` (小写“L”) | 不带前导零的 12 小时制 | 1, 11 |\n| 分钟 | `%i` | 带前导零 | 05,\
  \ 25 |\n| 秒 | `%S` | 带前导零 | 08, 45 |\n| 上午/下午 | `%p` | | |\n\n如前所述，在 SQL 查询中使用函数时，需要使用\
  \ `AS` 关键字将结果赋给一个别名。参考表 16-1，你可以将 `blog` 表中 `created` 列的日期格式化为常见的美国样式，并赋给一个别名，如下所示：\n\
  \n```\nDATE_FORMAT(created, '%c/%e/%Y') AS date_created\n```\n\n要以欧洲样式格式化相同的日期，请反转前两个说明符，如下所示：\n\
  \n```\nDATE_FORMAT(created, '%e/%c/%Y') AS date_created\n```\n\n> **提示**：使用 `DATE_FORMAT()`\
  \ 时，不要使用原始列名作为别名，因为值会被转换为字符串，这会严重扰乱排序顺序。选择不同的别名，并使用原始列名对结果进行排序。\n\n### PHP 解法 16-2：格式化\
  \ MySQL 日期或时间戳\n\n此 PHP 解法对第 15 章博客条目管理页面中的日期进行格式化。\n\n1. 在 `admin` 文件夹中打开 `blog_list_mysqli.php`\
  \ 或 `blog_list_pdo.php`，并找到 SQL 查询。它看起来像这样：\n\n   ![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig4_HTML.jpg](img/332054_4_En_16_Fig4_HTML.jpg)\n\
  \n   **图 16-4.** MySQL 时间戳现在已格式整齐\n\n2. 如下所示进行修改：\n\n   ```sql\n   $sql = 'SELECT\
  \ article_id, title,\n   DATE_FORMAT(created, \"%a, %b %D, %Y\") AS date_created\n\
  \   FROM blog ORDER BY created DESC';\n   ```\n\n   我在整个 SQL 查询周围使用了单引号，因此 `DATE_FORMAT()`\
  \ 内部的格式字符串需要使用双引号。\n\n   确保 `DATE_FORMAT()` 的左括号前没有空格。\n\n   格式字符串以 `%a` 开头，它显示工作日名称的前三个字母。如果使用原始列名作为别名，`ORDER\
  \ BY` 子句将按反向字母顺序对日期排序：Wed、Thu、Sun，等等。使用不同的别名可以确保日期仍按时间顺序排列。\n\n3. 在页面正文的第一个表格单元格中，将\
  \ `$row['created']` 更改为 `$row['date_created']`，以匹配 SQL 查询中的别名。\n\n4. 保存页面并将其加载到浏览器中。现在日期应格式化如图\
  \ 16-4 所示。尝试使用其他说明符以满足你的偏好。\n\n```sql\n$sql = 'SELECT * FROM blog ORDER BY created\
  \ DESC';\n```\n\n`blog_list_mysqli.php` 和 `blog_list_pdo.php` 的更新版本位于 `ch16` 文件夹中。\n\
  \n## 日期的加减运算\n\n处理日期时，添加或减去特定时间段通常很有用。例如，你可能希望显示过去 7 天内添加到数据库的项目，或者停止显示超过 3 个月未更新的文章。MySQL\
  \ 通过 `DATE_ADD()` 和 `DATE_SUB()` 使这变得简单。这两个函数分别有同义词 `ADDDATE()` 和 `SUBDATE()`。\n\
  \n它们的基本语法相同，如下所示：\n\n```\nDATE_ADD(date, INTERVAL value interval_type)\n```\n\n\
  使用这些函数时，*date* 可以是包含要更改日期的列、包含特定日期（采用 `YYYY-MM-DD` 格式）的字符串，或 MySQL 函数（如 `NOW()`）。`INTERVAL`\
  \ 是一个关键字，后跟一个值和一个间隔类型，表 16-2 列出了最常见的间隔类型。\n\n**表 16-2. `DATE_ADD()` 和 `DATE_SUB()`\
  \ 最常用的间隔类型**\n\n| 间隔类型 | 含义 | 值格式 |\n| --- | --- | --- |\n| `DAY` | 天数 | 数字 |\n\
  | `DAY_HOUR` | 天和小时 | 以 `'DD hh'` 格式呈现的字符串 |\n| `WEEK` | 周数 | 数字 |\n| `MONTH` |\
  \ 月数 | 数字 |\n| `QUARTER` | 季度数 | 数字 |\n| `YEAR` | 年数 | 数字 |\n| `YEAR_MONTH` | 年和月\
  \ | 以 `'YY-MM'` 格式呈现的字符串 |\n\n间隔类型是常量，因此不要在 `DAY`、`WEEK` 等末尾添加“S”使其变为复数。\n\n这些函数最有用的应用之一是仅显示表中最近的项目。\n\
  \n### PHP 解法 16-3：显示过去一周内更新的项目\n\n此 PHP 解法展示了如何根据特定时间间隔限制数据库结果的显示。使用 PHP 解法 16-1\
  \ 中的 `blog.php`。\n\n1. 在 `blog.php` 中找到 SQL 查询。它看起来像这样：\n\n   ```sql\n   $sql =\
  \ 'SELECT * FROM blog ORDER BY created DESC';\n   ```\n\n2. 如下所示进行修改：\n\n   ```sql\n\
  \   $sql = 'SELECT * FROM blog\n   WHERE updated > DATE_SUB(NOW(), INTERVAL 1 WEEK)\n\
  \   ORDER BY created DESC';\n   ```\n\n   这将告诉 MySQL，你只想要过去一周内更新过的项目。\n\n\n\n###\
  \ 3. 保存并在浏览器中重新加载页面。\n根据你最后一次更新 `blog` 表中项目的时间，你可能看到的是空，也可能是有限范围内的项目。如有需要，可将时间间隔类型改为\
  \ `DAY` 或 `HOUR` 来测试时间限制是否生效。\n\n### 4. 打开 `blog_list_mysqli.php` 或 `blog_list_pdo.php`，选择一个未显示在\
  \ `blog.php` 中的项目并编辑它。\n重新加载 `blog.php`。你刚刚更新的项目现在应已显示。\n\n你可以将自己的代码与 `ch16` 文件夹中的\
  \ `blog_limit_mysqli.php` 和 `blog_limit_pdo.php` 进行比较。\n\n---\n\n## 向 MySQL 插入日期\n\
  \nMySQL 要求日期格式必须为 `YYYY-MM-DD`，这对于允许用户输入日期的在线表单来说是个头疼的问题。正如你在第 15 章所见，可以通过使用 `TIMESTAMP`\
  \ 列来自动插入当前日期和时间。你也可以使用 MySQL 的 `NOW()` 函数在 `DATE` 或 `DATETIME` 列中插入当前日期。只有当你需要其他日期时才会出现问题。\n\
  \n从理论上讲，HTML5 的 `date` 输入类型本应解决这个问题。支持日期输入字段的浏览器通常会在字段获得焦点时显示日期选择器，并以本地格式插入日期。`ch16`\
  \ 文件夹中的 `date_test.php` 有一个示例。图 16-5 展示了 Google Chrome 如何在我的电脑上以正确的欧洲格式显示日期；但表单提交时，该值会被转换为\
  \ ISO 格式。不幸的是，即使到 2019 年初，当前使用的浏览器中仍有超过 10% 不支持 `date` 输入字段。它们会将其视为纯文本输入。\n\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig5_HTML.jpg](img/332054_4_En_16_Fig5_HTML.jpg)\n\
  \n**图 16-5.** HTML5 日期输入字段以本地格式显示日期，但以 ISO 格式提交日期。\n\n因此，使用单个输入字段输入日期，依赖于用户能遵循固定的日期输入模式，例如\
  \ `MM/DD/YYYY`。如果每个人都遵循，你可以使用 `explode()` 函数来重新排列日期各部分，如下所示：\n\n```php\nif (isset($_POST['theDate']))\
  \ {\n    $date = explode('/', $_POST['theDate']);\n    $mysqlFormat = \"$date[2]-$date[0]-$date[1]\"\
  ;\n}\n```\n\n如果有人偏离了格式，你的数据库中就会出现无效日期。因此，从在线表单收集日期最可靠的方法仍然是使用独立的月份、日期和年份输入字段。\n\n\
  ---\n\n## PHP 解决方案 16-4：为 MySQL 输入验证和格式化日期\n\n此 PHP 解决方案专注于检查日期的有效性并将其转换为 MySQL\
  \ 格式。它被设计用于集成到你自己的插入或更新表单中。\n\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig7_HTML.jpg](img/332054_4_En_16_Fig7_HTML.jpg)\n\
  \n**图 16-7.** 日期已被验证并转换为 ISO 格式。\n\n### 1. 执行所有检查的代码是 `utility_funcs.php` 中的一个自定义函数。它看起来像这样：\n\
  \n```php\nfunction convertDateToISO($month, $day, $year) {\n    $month = trim($month);\n\
  \    $day = trim($day);\n    $year = trim($year);\n    $result[0] = false;\n   \
  \ if (empty($month) || empty($day) || empty($year)) {\n        $result[1] = '请填写所有字段';\n\
  \    } elseif (!is_numeric($month) || !is_numeric($day) ||\n              !is_numeric($year))\
  \ {\n        $result[1] = '请仅使用数字';\n    } elseif (($month < 1 || $month > 12) ||\
  \ ($day < 1 || $day > 31) ||\n              ($year < 1000 || $year > 9999)) {\n\
  \        $result[1] = '请使用正确范围内的数字';\n    } elseif (!checkdate($month, $day, $year))\
  \ {\n        $result[1] = '您输入了无效日期';\n    } else {\n        $result[0] = true;\n\
  \        $result[1] = sprintf('%d-%02d-%02d', $year, $month, $day);\n    }\n   \
  \ return $result;\n}\n```\n\n该函数接受三个参数：月份、日期和年份，这三个参数都应为数字。前三行代码会去除输入内容两端的空白字符，接下来的一行初始化了一个名为\
  \ `$result` 的数组的第一个元素。如果输入未通过验证，数组的第一个元素为 `false`，第二个元素包含错误消息。如果通过验证，`$result` 的第一个元素为\
  \ `true`，第二个元素包含格式化后的日期，可用于插入 MySQL。\n\n这一系列条件语句检查输入值是否为空或非数字。第三个测试检查数字是否在可接受的范围内。年份的范围由\
  \ MySQL 的合法范围决定。万一你需要超出此范围的年份，则必须选择不同的列类型来存储数据。\n\n通过使用一系列 `elseif` 子句，这段代码在遇到第一个错误时便停止测试。尽管表单已预填充值，但并不能保证输入一定来自你的表单。它可能来自自动化脚本，这就是为什么这些检查是必要的。\n\
  \n如果输入通过了前三个测试，它就会接受 PHP 函数 `checkdate()` 的检查，该函数足够智能，能识别闰年并避免如 9 月 31 日这样的错误。\n\
  \n最后，如果输入通过了所有这些测试，它会被使用 `sprintf()` 函数重新构建为正确的格式，以便插入 MySQL。此函数的第一个参数是一个格式化字符串，其中\
  \ `%d` 代表整数，`%02d` 代表一个两位整数，若有必要会在前面补零。连字符按字面处理。接下来的三个参数是要插入到格式化字符串中的值。这会生成 ISO\
  \ 格式的日期，月份和日期都带有前导零。\n\n**注意** 有关 `sprintf()` 的详细信息，请参见 [`www.php.net/manual/en/function.sprintf.php`](http://www.php.net/manual/en/function.sprintf.php)。\n\
  \n### 2. 为了测试，请将此代码添加到页面主体中表单的正下方：\n\n```php\nif (isset($_POST['convert'])) {\n\
  \    $converted = convertDateToISO($_POST['month'], $_POST['day'],\n           \
  \                       $_POST['year']);\n    if ($converted[0]) {\n        echo\
  \ '有效日期：' . $converted[1];\n    } else {\n        echo '错误：' . $converted[1] . '';\n\
  \        echo '输入内容为：' . $months[$_POST['month']-1] . ' ' .\n             safe($_POST['day'])\
  \ . ', ' . safe($_POST['year']);\n    }\n}\n```\n\n这段代码检查表单是否已提交。如果已提交，它将表单值传递给\
  \ `convertDateToISO()` 函数，并将结果保存在 `$converted` 中。\n\n如果日期有效，`$converted[0]` 为 `true`，格式化的日期在\
  \ `$converted[1]` 中。如果日期无法转换为 ISO 格式，`else` 块会显示存储在 `$converted[1]` 中的错误消息以及原始输入内容。为了正确显示月份的值，从\
  \ `$_POST['month']` 的值中减去 1，并将结果用作 `$months` 数组的键。`$_POST['day']` 和 `$_POST['year']`\
  \ 的值被传递给 `safe()` 函数，以防表单被用于远程利用。\n\n### 3. 保存页面，输入日期并点击“转换”进行测试。\n如果日期有效，你应该会看到它被转换为\
  \ ISO 格式，如图 16-7 所示。\n\n### 4. 创建一个名为 `date_converter.php` 的页面，并插入一个包含以下代码的表单（或使用\
  \ `ch16` 文件夹中的 `date_converter_01.php`）：\n\n```html\n<form>\n    月份：<input type=\"\
  text\" name=\"month\"><br>\n    日期：<input type=\"text\" name=\"day\"><br>\n    年份：<input\
  \ type=\"text\" name=\"year\"><br>\n    <input type=\"submit\" name=\"convert\"\
  \ value=\"转换\">\n</form>\n```\n\n\n\n这会创建一个名为`month`的下拉菜单，以及两个名为`day`和`year`的输入字段。该下拉菜单目前没有任何值，但稍后会用\
  \ PHP 循环来填充。`day`和`year`字段使用了 HTML5 的`number`类型和`required`属性。`day`字段还包含`max`和`min`属性，以便将范围限制在\
  \ 1 到 31 之间。支持新 HTML5 表单元素的浏览器会在字段旁边显示数字步进器，并限制输入的类型和范围。其他浏览器则会将其渲染为普通的文本输入字段。为了兼容旧版浏览器，这两个字段都设置了`maxlength`属性，以限制可接受的字符数。\n\
  \n2. 修改构建下拉菜单的部分，如下所示：\n\n```\n\"\n    >\n```\n\n这会创建一个月份名称数组，并使用`date()`函数来查找当前月份的编号（传递给`date()`的参数含义将在本章后面解释）。\n\
  \n随后，一个`for`循环来填充菜单的`<option>`标签。我将`$i`的初始值设为`1`，因为我打算用它来表示月份的值。在循环内部，条件语句检查两组条件，这两组条件都用括号括起来，以确保它们以正确的顺序被求值。第一组检查`$_POST`数组是否为空，并且`$i`和`$thisMonth`的值是否相同。但如果表单已提交，`$_POST['month']`的值就会被设置，因此另一组条件检查`$i`是否与`$_POST['month']`相同。结果就是，首次加载表单时，`selected`会被插入到当前月份的`<option>`标签中。但如果表单已经提交，则会再次显示用户选择的月份。\n\
  \n月份名称通过从`$months`数组中提取，并显示在`<option>`标签之间。由于索引数组从 0 开始，你需要从`$i`的值中减 1 才能得到正确的月份。\n\
  \n3. 同样地，用当前日期或表单提交后选中的值来填充日和年的字段：\n\n```\n    Date:\n    \">\n    Year:\n    \"\
  >\n    ```\n\n4. 保存页面并在浏览器中测试。它应该会显示当前日期，并且看起来类似于图 16-6。\n\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig6_HTML.jpg](img/332054_4_En_16_Fig6_HTML.jpg)\n\
  \n图 16-6.\n为日期部分使用独立的输入字段有助于消除错误\n\n如果你测试这些输入字段，在大多数浏览器中，Date 字段应最多接受两个字符，Year 字段最多接受四个字符。尽管这降低了出错的概率，但你仍然需要验证输入并正确格式化日期。\n\
  \n如果你输入了无效的日期，你应该会看到一条相应的错误消息（见图 16-8）。\n\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig8_HTML.jpg](img/332054_4_En_16_Fig8_HTML.jpg)\n\
  \n图 16-8.\n`convertDateToISO()`函数会拒绝无效日期\n\n你可以将自己的代码与 `ch16` 文件夹中的 `date_converter_02.php`\
  \ 进行比较。\n\n当为需要用户输入日期的表创建表单时，请按照与 `date_converter.php` 中相同的方式，添加月份、日期和年份三个字段。在将表单输入插入数据库之前，引入\
  \ `utility_funcs.php`（或你决定存储该函数的任何位置）文件，并使用 `convertDateToISO()` 函数验证日期并格式化，以便插入数据库：\n\
  \n```\nrequire_once 'utility_funcs.php';\n$converted = convertDateToMySQL($_POST['month'],\
  \ $_POST['day'], $_POST['year']);\nif ($converted[0]) {\n$date = $converted[1];\n\
  } else {\n$errors[] = $converted[1];\n}\n```\n\n如果你的`$errors`数组包含任何元素，请中止插入或更新过程并显示错误。否则，`$date`即可安全地用于\
  \ SQL 查询。\n\n**注意**\n本章的其余部分专门讲述如何在 PHP 中处理日期。这是一个重要但复杂的话题。我建议你快速浏览每一节，以便熟悉 PHP\
  \ 的日期处理功能，当你需要实现某个特定功能时再回到本节进行查阅。\n\n## 在 PHP 中处理日期\n\n与其他计算机语言一样，PHP 通过从 Unix 纪元（1970\
  \ 年 1 月 1 日午夜 UTC，协调世界时）开始以秒为单位进行计算，来处理日期和时间的复杂性。在过去，当尝试设置过去或未来的日期（例如会员过期时），或者处理不同时区时，这涉及到繁琐的秒数和日期的相互转换计算。然而，由于\
  \ PHP 5 中引入了`DateTime`、`DateTimeZone`、`DateInterval`和`DatePeriod`类，这已不再是必需的操作。\n\
  \n可用的日期范围取决于 PHP 的编译方式。`DateTime`及相关类在内部以 64 位数字存储日期和时间信息，这使得能够表示大约从过去 2920 亿年到未来同样年份的日期。但是，如果\
  \ PHP 是在 32 位处理器上编译的，则表 16-3 后半部分中函数的范围将被限制在大约 1901 年至 2038 年 1 月之间。\n\n表 16-3 总结了\
  \ PHP 中主要的日期和时间相关的类及函数。\n\n**表 16-3.** PHP 日期和时间相关的类与函数\n\n| 名称 | 参数 | 描述 |\n| :---\
  \ | :--- | :--- |\n| **类** | | |\n| `DateTime` | 日期字符串，`DateTimeZone`对象 | 创建一个对时区敏感的对象，包含可用于日期和时间计算的日期和/或时间信息。\
  \ |\n| `DateTimeImmutable` | 同 `DateTime` | 与`DateTime`相同，但更改任何值都会返回一个新对象，原始对象保持不变。\
  \ |\n| `DateTimeZone` | 时区字符串 | 存储时区信息，供`DateTime`对象使用。 |\n| `DateInterval` | 间隔说明\
  \ | 表示一个固定的时间段（年、月、小时等）。 |\n| `DatePeriod` | 开始时间，间隔，结束时间/重复次数，选项 | 计算一段时间内或一定重复次数内的循环日期。\
  \ |\n| **函数** | | |\n| `time()` | 无 | 生成当前日期和时间的 Unix 时间戳。 |\n| `mktime()` | 小时，分钟，秒，月，日，年\
  \ | 为指定的日期/时间生成 Unix 时间戳。 |\n| `strtotime()` | 日期字符串，时间戳 | 尝试从英文文本描述（例如“next Tuesday”）生成\
  \ Unix 时间戳。返回的值相对于第二个参数（如果提供）。 |\n| `date()` | 格式字符串，时间戳 | 使用表 16-4 中列出的说明符格式化英文日期。如果省略第二个参数，则使用当前日期和时间。\
  \ |\n| `strftime()` | 格式字符串，时间戳 | 与`date()`相同，但使用系统区域设置指定的语言。 |\n\n### 设置默认时区\n\n\
  PHP 中的所有日期和时间信息都根据服务器的默认时区设置进行存储。Web 服务器与目标受众位于不同时区是很常见的，因此了解如何更改默认设置非常有用。\n\n服务器的默认时区通常应该在\
  \ `php.ini` 的 `date.timezone` 指令中设置，但如果你的托管服务提供商忘记设置，或者你想使用不同的时区，则需要自行设置。\n\n如果你的托管服务提供商允许你控制自己的\
  \ `php.ini` 版本，请在其中更改 `date.timezone` 的值。这样，该设置就会自动应用于你所有的脚本。\n\n\n\n如果你的服务器支持`.htaccess`或`.user.ini`文件，你可以通过在站点根目录添加相应的命令来更改时区。对于`.htaccess`，请使用以下内容：\n\
  \n```\nphp_value date.timezone 'timezone'\n```\n\n对于`.user.ini`，命令如下所示：\n\n```\n\
  date.timezone=timezone\n```\n\n将`timezone`替换为适合你所在位置的正确设置。你可以在[`www.php.net/manual/en/timezones.php`](http://www.php.net/manual/en/timezones.php)找到有效的时区完整列表。\n\
  \n如果以上选项均不可用，请在任何使用日期或时间函数的脚本开头添加以下内容（将`timezone`替换为适当的值）：\n\n```\nini_set('date.timezone',\
  \ 'timezone');\n```\n\n## 创建 DateTime 对象\n\n要创建一个`DateTime`对象，只需使用`new`关键字后跟`DateTime()`，如下所示：\n\
  \n```\n$now = new DateTime();\n```\n\n这会创建一个对象，表示根据 Web 服务器时钟和默认时区设置的当前日期和时间。\n\n\
  `DateTime()`构造函数还接受两个可选参数：一个包含日期和/或时间的字符串，以及一个`DateTimeZone`对象。第一个参数的日期/时间字符串可以是[`www.php.net/manual/en/datetime.formats.php`](http://www.php.net/manual/en/datetime.formats.php)列出的任何格式。与仅接受一种格式的\
  \ MySQL 不同，PHP 走向了另一个极端。例如，要为 2019 年圣诞节创建一个`DateTime`对象，以下所有格式都是有效的：\n\n```\n'12/25/2019'\n\
  '25-12-2019'\n'25 Dec 2019'\n'Dec 25 2019'\n'25-XII-2019'\n'25.12.2019'\n'2019/12/25'\n\
  '2019-12-25'\n'December 25th, 2019'\n```\n\n这不是一个详尽的列表，仅是一些有效格式的示例。潜在的混淆点在于分隔符的使用。例如，正斜杠允许用于美式日期（`12/25/2019`）和\
  \ ISO 日期（`2019/12/25`），但在欧洲顺序表示日期或月份使用罗马数字时则不允许。要以欧洲顺序表示日期，分隔符必须是点、制表符或破折号。日期也可以使用相对表达式指定，例如“下周三”、“明天”或“上周一”。然而，这也存在混淆的可能性。有些人用“下周三”表示“下周的星期三”，而\
  \ PHP 按字面意思解释：如果今天是星期二，“下周三”指的是第二天。\n\n你不能单独使用`echo`来显示`DateTime`对象中存储的值。除了`echo`，你还需要使用`format()`方法告诉\
  \ PHP 如何格式化输出。\n\n## 在 PHP 中格式化日期\n\n`DateTime`类的`format()`方法使用与`date()`函数相同的格式字符。虽然这保证了连续性，但格式字符通常难以记忆，并且背后似乎没有明显的逻辑依据。表\
  \ 16-4 列出了最有用的日期和时间格式字符。\n\n`DateTime`类和`date()`函数仅以英文显示星期和月份的名称，但`strftime()`函数使用服务器区域设置指定的语言。因此，如果服务器的区域设置为西班牙语，`DateTime`对象和`date()`显示为\
  \ Saturday，而`strftime()`显示为 sábado。除了`DateTime`类和`date()`函数都使用的格式字符外，表 16-4 还列出了`strftime()`使用的等效字符。并非所有格式在`strftime()`中都有等效项。\n\
  \n**表 16-4. 主要的日期和时间格式字符**\n\n| 单位 | DateTime/date() | strftime() | 描述 | 示例 |\n\
  | --- | --- | --- | --- | --- |\n| 日 | `d` | `%d` | 带前导零的月份中的日数 | 01 到 31 |\n| \
  \    | `j` | `%e`* | 不带前导零的月份中的日数 | 1 到 31 |\n|     | `S` |            | 月份的英文序数后缀\
  \ | st, nd, rd 或 th |\n|     | `D` | `%a` | 星期名称的前三个字母 | Sun, Tue |\n\n\n\n| `l`（小写字母\
  \ L） | `%A` | 星期几的全名 | Sunday, Tuesday |\n| Month（月份） | `m` | `%m` | 带前导零的月份数字 |\
  \ 01 到 12 |\n| | `n` | | 不带前导零的月份数字 | 1 到 12 |\n| `M` | `%b` | 月份名称的前三个字母 | Jan,\
  \ Jul |\n| `F` | `%B` | 月份的全名 | January, July |\n| Year（年份） | `Y` | `%Y` | 四位数字显示的年份\
  \ | 2014 |\n| `y` | `%y` | 两位数字显示的年份 | 14 |\n| Hour（小时） | `g` | | 12 小时制，不带前导零 |\
  \ 1 到 12 |\n| `h` | `%I` | 12 小时制，带前导零 | 01 到 12 |\n| `G` | | 24 小时制，不带前导零 | 0 到\
  \ 23 |\n| `H` | `%H` | 24 小时制，带前导零 | 01 到 23 |\n| Minutes（分钟） | `i` | `%M` | 必要时带前导零的分钟数\
  \ | 00 到 59 |\n| Seconds（秒） | `s` | `%S` | 必要时带前导零的秒数 | 00 到 59 |\n| AM/PM（上午/下午）\
  \ | `a` | | 小写 | am |\n| AM/PM（上午/下午） | `A` | `%p` | 大写 | PM |\n\n**注意：** Windows\
  \ 系统不支持 `%e`。\n\n你可以将这些格式字符与标点符号结合使用，根据自己的偏好，在网页中显示当前日期。\n\n要格式化一个 `DateTime` 对象，可以向\
  \ `format()` 方法传递一个格式字符串作为参数，如下所示（代码位于 `ch16` 文件夹中的 `date_format_01.php`）：\n\n```\n\
  现在是 format('g.ia') ?>，今天是 format('l, F jS, Y') ?>\n2019 年的圣诞节是 format('l') ?>\n\
  ```\n\n在这个示例中，创建了两个 `DateTime` 对象：一个用于当前日期和时间，另一个用于 2019 年 12 月 25 日。使用表 16-4 中的格式字符，从这两个对象中提取出不同的日期部分，生成了如下截图所示的输出：\n\
  ![../images/332054_4_En_16_Chapter/332054_4_En_16_Figa_HTML.jpg](img/332054_4_En_16_Figa_HTML.jpg)\n\
  \n`date_format_02.php` 中的代码通过使用 `date()` 和 `strtotime()` 函数生成了相同的输出，如下所示：\n\n```\n\
  现在是 \n2019 年的圣诞节是 \n```\n\n第一行使用 `strtotime()` 为 2019 年 12 月 25 日创建了一个时间戳。无需为当前日期和时间创建时间戳，因为当没有第二个参数时，`date()`\
  \ 函数默认使用当前日期和时间。\n\n如果圣诞日的时间戳在脚本的其他地方没有用到，则第一行可以省略，对 `date()` 的最后一次调用可以重写如下（参见 `date_format_03.php`）：\n\
  \n```\ndate('l', strtotime('12/25/2019'))\n```\n\n## 从自定义格式创建 DateTime 对象\n\n你可以使用表\
  \ 16-4 中的格式字符，为 `DateTime` 对象指定一个自定义输入格式。创建该对象时，不是使用 `new` 关键字，而是使用 `createFromFormat()`\
  \ 静态方法，如下所示：\n\n```\n$date = DateTime::createFromFormat(format_string, input_date,\
  \ timezone);\n```\n\n第三个参数 *timezone* 是可选的。如果包含该参数，它应该是一个 `DateTimeZone` 对象。\n\n\
  **静态方法**属于整个类，而不是某个特定的对象。调用静态方法时，需要使用类名，后跟作用域解析运算符（双冒号）和方法名。\n\n> **提示**\n> 在内部，作用域解析运算符被称为\
  \ `PAAMAYIM_NEKUDOTAYIM`，这是希伯来语，意为 \"双冒号\"。为什么是希伯来语？驱动 PHP 的 Zend 引擎最初由 Zeev Suraski\
  \ 和 Andi Gutmans 在以色列理工学院就读时开发。除了能在极客知识问答中得分外，了解 `PAAMAYIM_NEKUDOTAYIM` 的含义还能在你看到\
  \ PHP 错误信息中出现它时，省去你绞尽脑汁的烦恼。\n\n例如，你可以使用 `createFromFormat()` 方法来接受使用欧洲日期格式（日、月、年，用斜杠分隔）的日期，如下所示（代码位于\
  \ `date_format_04.php`）：\n\n```\n$xmas2019 = DateTime::createFromFormat('d/m/Y',\
  \ '25/12/2019');\necho $xmas2019->format('l, jS F Y');\n```\n\n这将产生以下输出：\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Figb_HTML.jpg](img/332054_4_En_16_Figb_HTML.jpg)\n\
  \n> **警告**\n> 尝试使用 25/12/2014 作为 `DateTime` 构造函数的输入会触发致命错误，因为不支持 `DD/MM/YYYY` 格式。如果你想使用\
  \ `DateTime` 构造函数不支持的格式，则必须使用 `createFromFormat()` 静态方法。\n\n尽管 `createFromFormat()`\
  \ 方法很有用，但它只能在你确保日期始终是特定格式的情况下使用。\n\n## 在 date() 和 DateTime 类之间进行选择\n\n在显示日期时，使用\
  \ `DateTime` 类始终是一个两步过程。你需要在调用 `format()` 方法之前实例化该对象。而使用 `date()` 函数，则只需一步就能完成。由于它们使用相同的格式字符，在处理当前日期和/或时间时，`date()`\
  \ 函数显然更胜一筹。\n\n对于显示当前日期、时间或年份等简单任务，请使用 `date()`。而 `DateTime` 类的真正优势在于处理与日期相关的计算和时区时，可使用表\
  \ 16-5 中列出的方法。\n\n**表 16-5.** 主要的 `DateTime` 方法\n\n| 方法 | 参数 | 描述 |\n| --- | ---\
  \ | --- |\n| `format()` | 格式字符串 | 使用表 16-4 中的格式字符来格式化日期/时间。 |\n| `setDate()` | 年、月、日\
  \ | 更改日期。参数应用逗号分隔。超出允许范围的月份或天数将累加到生成的日期中，如正文所述。 |\n| `setTime()` | 小时、分钟、秒 | 重置时间。参数为逗号分隔的值。秒是可选的。超出允许范围的值将累加到生成的日期/时间中。\
  \ |\n| `modify()` | 相对日期字符串 | 使用相对表达式（例如 `'+2 weeks'`）更改日期/时间。 |\n| `getTimestamp()`\
  \ | 无 | 返回日期/时间的 Unix 时间戳。 |\n| `setTimestamp()` | Unix 时间戳 | 根据 Unix 时间戳设置日期/时间。\
  \ |\n| `setTimezone()` | `DateTimeZone` 对象 | 更改时区。 |\n| `getTimezone()` | 无 | 返回代表\
  \ `DateTime` 对象时区的 `DateTimeZone` 对象。 |\n| `getOffset()` | 无 | 返回与 UTC 的时区偏移量，以秒为单位。\
  \ |\n| `add()` | `DateInterval` 对象 | 按设定时间段增加日期/时间。 |\n| `sub()` | `DateInterval`\
  \ 对象 | 从日期/时间中减去设定时间段。 |\n| `diff()` | `DateTime` 对象，布尔值 | 返回一个 `DateInterval` 对象，表示当前\
  \ `DateTime` 对象与作为参数传入的 `DateTime` 对象之间的差值。使用可选的第二个参数 `true` 会将负值转换为正数。 |\n\n使用\
  \ `setDate()` 和 `setTime()` 添加超出范围的值会导致溢出值累加到结果日期或时间中。例如，使用 14 作为月份会将日期设置为下一年的二月。将小时设置为\
  \ 26 会导致结果为次日凌晨 2 点。\n\n`setDate()` 有一个有用的技巧：通过将月份值设置为下一个月，并将日期设置为 0，你就可以将日期设置为任何月份的最后一天。`setDate.php`\
  \ 中的代码通过显示 2019 年和 2020 年（闰年）二月的最后一天来演示这一点：\n\n```\nsetDate(2019, 3, 0);\n?>\n非闰年：format($format)\
  \ ?>。\n闰年：setDate(2020, 3, 0);\necho $date->format($format); ?>。\n```\n\n前面的示例产生以下输出：\n\
  ![../images/332054_4_En_16_Chapter/332054_4_En_16_Figc_HTML.jpg](img/332054_4_En_16_Figc_HTML.jpg)\n\
  \n\n\n### 使用相对日期处理溢出问题\n\n`modify()` 方法接受一个相对日期字符串，这可能会产生意外结果。例如，如果你向一个表示 2019 年\
  \ 1 月 31 日的`DateTime`对象增加一个月，结果值不会是二月的最后一天，而是 3 月 3 日。\n\n发生这种情况是因为，在原日期上增加一个月得到的是\
  \ 2 月 31 日，但在非闰年中二月只有 28 天。因此，超出范围的值会累加到月份上，最终得到 3 月 3 日。如果随后从同一个`DateTime`对象减去一个月，你会回到\
  \ 2 月 3 日，而不是原始的起始日期。`date_modify_01.php` 中的代码说明了这一点，如图 16-9 所示。\n\n![图 16-9](img/332054_4_En_16_Fig9_HTML.jpg)\n\
  \n**图 16-9.** 增加和减少月份可能导致意外结果\n\n```\n原始日期: format($format) ?>.\n增加一个月: modify('+1\
  \ month');\necho $date->format($format);\n$date->modify('-1 month');\n?>\n减少一个月:\
  \ format($format) ?>\n```\n\n避免此问题的方法是在相对表达式中使用`'last day of'`，如下所示（代码在 `date_modify_02.php`）：\n\
  \n```\n原始日期: format($format) ?>.\n增加一个月: modify('last day of +1 month');\necho $date->format($format);\n\
  $date->modify('last day of -1 month');\n?>\n减少一个月: format($format) ?>\n```\n\n如图\
  \ 16-10 所示，这样做现在得到了期望的结果。\n\n![图 16-10](img/332054_4_En_16_Fig10_HTML.jpg)\n\n**图\
  \ 16-10.** 在相对表达式中使用`'last day of'`解决了问题\n\n### 使用 `DateTimeZone` 类\n\n除非你已使用前面描述的方法之一重置了时区，否则`DateTime`对象会自动使用\
  \ Web 服务器的默认时区。但是，你可以通过构造函数的可选第二个参数或使用`setTimezone()`方法来设置单个`DateTime`对象的时区。在这两种情况下，参数都必须是一个`DateTimeZone`对象。\n\
  \n要创建一个`DateTimeZone`对象，需将`www.php.net/manual/en/timezones.php`列出的一个受支持的时区作为参数传递给构造函数，如下所示：\n\
  \n```\n$UK = new DateTimeZone('Europe/London');\n$USeast = new DateTimeZone('America/New_York');\n\
  $Hawaii = new DateTimeZone('Pacific/Honolulu');\n```\n\n查看受支持时区列表时，务必认识到它们是基于地理区域和城市，而非官方时区。这是因为\
  \ PHP 会自动考虑夏令时。亚利桑那州不使用夏令时，它被覆盖在`America/Phoenix`之下。将时区按地理区域组织会带来一些意外。`America`\
  \ 并非指美国，而是指南北美洲和加勒比地区的大陆。因此，火奴鲁鲁并不在`America`之下，而是作为太平洋时区列出。`Europe` 也指的是欧洲大陆，包括不列颠群岛，但排除其他岛屿。因此，雷克雅未克和马德拉群岛被列为大西洋时区，而位于挪威斯瓦尔巴群岛上的朗伊尔城则独享作为唯一一个北极时区的特权。\n\
  \n`timezones.php`中的代码为伦敦、纽约和火奴鲁鲁创建了`DateTimeZone`对象，然后使用第一个对象初始化一个`DateTime`对象，如下所示：\n\
  \n```\n$now = new DateTime('now', $UK);\n```\n\n在使用`echo`和`format()`方法显示日期和时间后，通过`setTimezone()`方法更改时区，如下所示：\n\
  \n```\n$now->setTimezone($USeast);\n```\n\n下次显示`$now`时，它会显示纽约的日期和时间。最后，再次使用`setTimezone()`将时区更改为火奴鲁鲁，输出如下：\n\
  \n![输出](img/332054_4_En_16_Figd_HTML.jpg)\n\n**注意：** 时区转换的准确性取决于 PHP 中编译的时区数据库是否为最新。欧盟计划从\
  \ 2021 年起废除夏令时，但成员国将有权自由选择永久采用标准时间还是夏令时。如果某些服务器没有更新，这很可能会导致时间不正确。\n\n要查找服务器的时区，你可以检查`php.ini`，或者对`DateTime`对象使用`getTimezone()`方法。`getTimezone()`方法返回的是一个`DateTimeZone`对象，而不是包含时区的字符串。要获取时区的值，你需要使用`DateTimeZone`对象的`getName()`方法，如下所示（代码在\
  \ `timezone_display.php`）：\n\n```\n$now = new DateTime();\n$timezone = $now->getTimezone();\n\
  echo $timezone->getName();\n```\n\n`DateTimeZone`类还有其他几个方法，用于公开时区的相关信息。为完整起见，它们被列在表\
  \ 16-6 中，但`DateTimeZone`类的主要用途是设置`DateTime`对象的时区。\n\n**表 16-6.** `DateTimeZone`\
  \ 方法\n\n| 方法 | 参数 | 描述 |\n| --- | --- | --- |\n| `getLocation()` | 无 | 返回一个关联数组，包含国家代码、纬度、经度以及关于该时区的注释。\
  \ |\n| `getName()` | 无 | 返回一个包含该时区地理区域和城市的字符串。 |\n| `getOffset()` | `DateTime` 对象\
  \ | 计算作为参数传递的`DateTime`对象与 UTC 的偏移量（以秒为单位）。 |\n| `getTransitions()` | 开始，结束 | 返回一个多维数组，包含夏令时启用和禁用的历史及未来日期和时间。接受两个可选的时间戳参数来限制结果范围。\
  \ |\n| `listAbbreviations()` | 无 | 生成一个大的多维数组，包含 PHP 支持的时区的 UTC 偏移量和名称。 |\n| `listIdentifiers()`\
  \ | `DateTimeZone` 常量，国家代码 | 返回一个包含所有 PHP 时区标识符（例如`Europe/London`、`America/New_York`等）的数组。接受两个可选参数来限制结果范围。第一个参数使用`www.php.net/manual/en/class.datetimezone.php`列出的`DateTimeZone`常量之一。如果第一个参数是`DateTimeZone::PER_COUNTRY`，则可以使用两个字母的国家代码作为第二个参数。\
  \ |\n\n表 16-6 中的最后两个方法是静态方法。使用范围解析运算符直接在类上调用它们，如下所示：\n\n```\n$abbreviations = DateTimeZone::listAbbreviations();\n\
  ```\n\n### 使用 `DateInterval` 类添加和减去固定时间段\n\n`DateInterval`类用于指定要使用`add()`和`sub()`方法对`DateTime`对象增加或减去的时段。`diff()`方法也使用它，该方法返回一个`DateInterval`对象。起初使用`DateInterval`类可能会感觉有点奇怪，但它实际上相对容易理解。\n\
  \n要创建一个`DateInterval`对象，需要向构造函数传递一个指定间隔长度的字符串；该字符串必须按照 ISO 8601 标准格式化。该字符串始终以字母`P`（代表期间）开头，后跟一个或多个整数与字母（称为**期间指示符**）组成的对。如果间隔包含小时、分钟或秒，则时间元素前面需要加上字母`T`。表\
  \ 16-7 列出了有效的期间指示符。\n\n表 16-7. `DateInterval` 类使用的 ISO 8601 周期标识符\n\n| 周期标识符 | 含义\
  \                     |\n| :--------- | :----------------------- |\n| `Y`      \
  \  | 年                       |\n| `M`        | 月                       |\n| `W`\
  \        | 周——不能与天数组合       |\n| `D`        | 天——不能与周数组合       |\n| `H`        |\
  \ 小时                     |\n| `M`        | 分钟                     |\n| `S`     \
  \   | 秒                       |\n\n以下示例应阐明如何指定时间间隔：\n\n```\n$interval1 = new DateInterval('P2Y');\
  \           // 2 years\n$interval2 = new DateInterval('P5W');           // 5 weeks\n\
  $interval3 = new DateInterval('P37D');          // 5 weeks 2 days\n$interval4 =\
  \ new DateInterval('PT6H20M');       // 6 hours 20 minutes\n$interval5 = new DateInterval('P1Y2DT3H5M50S');\
  \ // 1 year 2 days 3 hours 5 min 50 sec\n```\n\n请注意，`$interval3` 需要指定总天数，因为周会自动转换为天，因此在同一个时间间隔定义中不能组合使用\
  \ `W` 和 `D`。\n\n要将 `DateInterval` 对象与 `DateTime` 类的 `add()` 或 `sub()` 方法一起使用，请将该对象作为参数传递。例如，这将为\
  \ 2019 年圣诞节的日期增加 12 天：\n\n```\n$xmas2019 = new DateTime('12/25/2019');\n$interval\
  \ = new DateInterval('P12D');\n$xmas2019->add($interval);\n```\n\n如果不需要重复使用此间隔，你可以直接将\
  \ `DateInterval` 构造函数作为参数传递给 `add()`，如下所示：\n\n```\n$xmas2019 = new DateTime('12/25/2019');\n\
  $xmas2019->add(new DateInterval('P12D'));\n```\n\n此计算的结果在 `date_interval_01.php`\
  \ 中演示，并产生以下输出：\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fige_HTML.jpg](img/332054_4_En_16_Fige_HTML.jpg)\n\
  \n使用表 16-7 中列出的周期标识符的替代方法是使用静态的 `createFromDateString()` 方法，该方法接受一个英文的相对日期字符串作为参数，方式与\
  \ `strtotime()` 相同。使用 `createFromDateString()`，前面的示例可以重写如下（代码在 `date_interval_02.php`\
  \ 中）：\n\n```\n$xmas2014 = new DateTime('12/25/2014');\n$xmas2014->add(DateInterval::createFromDateString('+12\
  \ days'));\n```\n\n这会得到完全相同的结果。\n\n**小心**\n使用 `DateInterval` 加减月份的效果与前面描述的一致。如果结果日期超出了范围，则会增加额外的天数。例如，在\
  \ 1 月 31 日上加一个月，结果会是 3 月 3 日或 2 日，具体取决于是否是闰年。要获取该月的最后一天，请使用前面在“使用相对日期处理溢出”中描述的技术。\n\
  \n### 使用 `diff()` 方法查找两个日期之间的差异\n\n要查找两个日期之间的差异，请为两个日期分别创建一个 `DateTime` 对象，然后将第二个对象作为参数传递给第一个对象的\
  \ `diff()` 方法。结果将作为一个 `DateInterval` 对象返回。要从 `DateInterval` 对象中提取结果，你需要使用该对象的 `format()`\
  \ 方法，该方法使用表 16-8 中列出的格式字符。这些字符与 `DateTime` 类使用的格式字符不同。幸运的是，其中大部分都很容易记住。\n\n表 16-8.\
  \ `DateInterval format()` 方法使用的格式字符\n\n| 格式字符 | 描述                             \
  \  | 示例        |\n| :------- | :--------------------------------- | :----------\
  \ |\n| `%Y`     | 年，至少两位，必要时前导零         | 12, 01      |\n| `%y`     | 年，无前导零   \
  \                    | 12, 1       |\n| `%M`     | 月，带前导零                      \
  \ | 02, 11      |\n| `%m`     | 月，无前导零                       | 2, 11       |\n|\
  \ `%D`     | 日，带前导零                       | 03, 24      |\n| `%d`     | 日，无前导零 \
  \                      | 3, 24       |\n| `%a`     | 总天数                       \
  \      | 15, 231     |\n| `%H`     | 小时，带前导零                     | 03, 23      |\n\
  | `%h`     | 小时，无前导零                     | 3, 23       |\n| `%I`     | 分钟，带前导零 \
  \                    | 05, 59      |\n| `%i`     | 分钟，无前导零                     |\
  \ 5, 59       |\n| `%S`     | 秒，带前导零                       | 05, 59      |\n| `%s`\
  \     | 秒，无前导零                       | 5, 59       |\n| `%R`     | 负数显示负号，正数显示正号\
  \         | -, +        |\n| `%r`     | 负数显示负号，正数不显示符号       | -           |\n|\
  \ `%%`     | 百分号                             | %           |\n\n`date_interval_03.php`\
  \ 中的以下示例展示了如何使用 `diff()` 获取当前日期与美国《独立宣言》签署日期之间的差异，并使用 `format()` 方法显示结果：\n\n```\n\
  diff($independence);\necho $interval->format('%Y years %m months %d days'); ?>\n\
  since American Declaration of Independence.\n```\n\n如果将 `date_interval_03.php` 加载到浏览器中，您应该会看到类似于以下截图的内容（当然，实际时间段会有所不同）。\n\
  ![../images/332054_4_En_16_Chapter/332054_4_En_16_Figf_HTML.jpg](img/332054_4_En_16_Figf_HTML.jpg)\n\
  格式字符遵循逻辑模式。大写字符始终产生至少两位数字，必要时带有前导零。小写字符没有前导零。\n\n**小心**\n除了表示总天数的 `%a` 之外，其他格式字符仅表示整个时间间隔的特定部分。例如，如果将格式字符串更改为\
  \ `$interval->format('%m months')`，它将只显示自上个 7 月 4 日以来经过的整月数。它不会显示自 1776 年 7 月 4\
  \ 日以来的总月数。\n\n### 使用 `DatePeriod` 类计算重复日期\n\n由于 `DatePeriod` 类的出现，计算重复日期（例如每个月的第二个星期二）现在变得异常简单。它与\
  \ `DateInterval` 协同工作。\n\n`DatePeriod` 构造函数比较特殊，因为它可以以三种不同的方式接受参数。创建 `DatePeriod`\
  \ 对象的第一种方法是提供以下参数：\n\n-   一个表示开始日期的 `DateTime` 对象\n-   一个表示重复间隔的 `DateInterval`\
  \ 对象\n-   一个表示重复次数的整数\n-   `DatePeriod::EXCLUDE_START_DATE` 常量（可选）\n\n创建 `DatePeriod`\
  \ 对象后，您可以在 `foreach` 循环中使用 `DateTime` 的 `format()` 方法来显示重复日期。\n\n`date_interval_04.php`\
  \ 中的代码显示 2019 年每个月的第二个星期二：\n\n```\n$start = new DateTime('12/31/2018');\n$interval\
  \ = DateInterval::createFromDateString('second Tuesday of next month');\n$period\
  \ = new DatePeriod($start, $interval, 12, DatePeriod::EXCLUDE_START_DATE);\nforeach\
  \ ($period as $date) {\necho $date->format('l, F jS, Y') . '';\n}\n```\n\n它产生的输出如图\
  \ 16-11 所示。\n\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig11_HTML.jpg](img/332054_4_En_16_Fig11_HTML.jpg)\n\
  \n**图 16-11.** 使用 `DatePeriod` 类计算重复日期异常简单\n\nPHP 代码的第一行将开始日期设置为 2018 年 12 月 31\
  \ 日。下一行使用 `DateInterval` 的静态方法 `createFromDateString()` 将间隔设置为下个月的第二个星期二。这两个值与表示重复次数的整数\
  \ 12 以及常量 `DatePeriod::EXCLUDE_START_DATE` 一起传递给 `DatePeriod` 构造函数。该常量的名称不言自明。最后，一个\
  \ `foreach` 循环使用 `DateTime` 的 `format()` 方法显示结果日期。\n\n创建 `DatePeriod` 对象的第二种方法是用一个表示结束日期的\
  \ `DateTime` 对象替换第三个参数中的重复次数。`date_interval_05.php` 中的代码已按如下方式修改：\n\n```\n$start\
  \ = new DateTime('12/31/2018');\n$interval = DateInterval::createFromDateString('second\
  \ Tuesday of next month');\n$end = new DateTime('12/31/2019');\n$period = new DatePeriod($start,\
  \ $interval, $end, DatePeriod::EXCLUDE_START_DATE);\nforeach ($period as $date)\
  \ {\necho $date->format('l, F jS, Y') . '';\n}\n```\n\n这将产生与图 16-11 完全相同的输出。\n\n\
  \n你可以使用 ISO 8601 重复时间间隔标准（[`https://en.wikipedia.org/wiki/ISO_8601#Repeating_intervals`](https://en.wikipedia.org/wiki/ISO_8601%2523Repeating_intervals)）来创建一个\
  \ `DatePeriod` 对象。这种方式不太直观，主要是因为需要以正确的格式构造一个字符串，其格式如下：\n\n```\nRn/YYYY-MM-DDTHH:MM:SStz/Pinterval\n\
  ```\n\n`R`*n* 是字母 `R` 后跟重复次数；*tz* 是相对于 UTC 的时区偏移量（或 `Z` 表示 UTC，如以下示例所示）；`P`*interval*\
  \ 使用与 `DateInterval` 类相同的格式。`date_interval_06.php` 中的代码展示了如何使用 ISO 8601 重复间隔的 `DatePeriod`。代码如下：\n\
  \n```\n$period = new DatePeriod('R4/2019-07-10T00:00:00Z/P10D');\nforeach ($period\
  \ as $date) {\n    echo $date->format('l, F j, Y') . '';\n}\n```\n\nISO 重复间隔设置了从\
  \ 2019 年 7 月 10 日 UTC 时间午夜开始、间隔为 10 天的四次重复。重复次数是在原始日期之后进行的，因此上述示例产生了五个日期，如以下输出所示。\n\
  ![../images/332054_4_En_16_Chapter/332054_4_En_16_Figg_HTML.jpg](img/332054_4_En_16_Figg_HTML.jpg)\n\
  \n## 章节回顾\n\n本章的很大一部分内容都致力于介绍 PHP 5 中引入的强大日期和时间类。我没有介绍 `DateTimeImmutable` 类，因为除了一个方面之外，它在其他所有方面都与\
  \ `DateTime` 相同。`DateTimeImmutable` 对象从不修改自身。相反，它总是返回一个包含修改后值的新对象。如果你有一个不会变化的日期（例如某人的出生日期），这会非常有用。对此类对象使用\
  \ `setDate()` 或 `add()` 方法会返回一个新对象，从而在保留原始细节的同时，为更新后的细节（如入职日期、结婚日期、退休年龄等）提供一个新对象。\n\
  \n你可能并不每天都用到日期和时间相关的类，但它们非常有用。MySQL 的日期和时间函数也使得根据时间条件格式化日期和执行查询变得容易。\n\n日期最大的问题或许在于决定是使用\
  \ SQL 还是 PHP 来处理格式化和/或计算。PHP 的 `DateTime` 类的一个有用特性是，其构造函数接受以 ISO 格式存储的日期，因此你可以使用数据库中未格式化的日期或时间戳来创建\
  \ `DateTime` 对象。但是，除非你需要执行进一步的计算，否则在 `SELECT` 查询中使用 `DATE_FORMAT()` 函数会更高效。\n\n\
  本章还为你提供了三个用于格式化文本和日期的函数。在下一章中，你将学习如何在多个数据库表中存储和检索相关信息。\n\n## 17. 从多个表中提取数据\n\n正如我在第\
  \ 13 章中所解释的，关系型数据库的主要优势之一是能够通过使用一个表中的主键作为另一个表中的外键来链接不同表中的数据。`phpsols` 数据库有两个表：`images`\
  \ 和 `blog`。现在是时候添加更多表并进行连接了，这样你就可以为博客条目分配类别，并将图像与单个文章关联起来。\n\n你实际上并不需要物理连接多个表，而是通过\
  \ SQL 来实现连接。通常，你可以通过识别主键和外键之间的直接关系来连接表。然而，在某些情况下，关系更为复杂，需要通过第三个表作为另外两个表之间的交叉引用来实现。\n\
  \n在本章中，你将学习如何建立表之间的关系，以及如何将一个表中的主键作为外键插入到另一个表中。尽管从概念上听起来很困难，但实际上相当简单——你使用数据库查询在第一个表中查找主键，保存结果，然后在另一个查询中使用该结果将其插入到第二个表中。\n\
  \n具体来说，你将了解以下内容：\n\n*   理解不同类型的表关系\n*   使用交叉引用表实现多对多关系\n*   修改表结构以添加新列或索引\n*   将主键作为外键存储在另一个表中\n\
  *   使用 `INNER JOIN` 和 `LEFT JOIN` 链接表\n\n### 理解表关系\n\n最简单的关系类型是**一对一**（通常表示为 **1:1**）。这种类型的关系常见于包含仅供特定人员查看信息的数据库中。例如，公司通常将员工的薪资和其他机密信息存储在一个表中，该表与更广泛可访问的员工列表分开。将每个员工记录的主键作为外键存储在薪资表中，就在这两个表之间建立了直接关系，从而允许财务部门查看全部信息，同时限制其他人只能查看公共信息。\n\
  \n`phpsols` 数据库中没有任何机密信息，但你可能会在 `images` 表中的单个照片与 `blog` 表中的一篇文章之间创建一对一关系，如图 17-1\
  \ 所示。\n\n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig1_HTML.jpg](img/332054_4_En_17_Fig1_HTML.jpg)\n\
  \n**图 17-1.** 一对一关系将一个记录直接链接到另一个记录\n\n这是在两个表之间创建关系的最简单方法，但并不理想。随着更多文章的加入，关系的性质很可能会发生变化。图\
  \ 17-1 中与第一篇文章关联的照片显示的是漂浮在水面上的枫叶，因此它可能适合用来图解一篇关于季节变换或秋色的文章。清澈的水、竹制水舀和竹管也暗示了其他可以用这张照片来阐释的主题。因此，你很可能会遇到同一张照片被用于多篇文章的情况，即**一对多**（或\
  \ **1:n**）关系，如图 17-2 所示。\n\n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig2_HTML.jpg](img/332054_4_En_17_Fig2_HTML.jpg)\n\
  \n**图 17-2.** 一对多关系将一个记录链接到多个其他记录\n\n\n\n# 关系数据库中的表关联与外部键\n\n## 主键、外键与关系类型\n\n正如你已经了解到的，主键必须是唯一的。因此，在`1:n`关系中，你需要将关系`1`方表中的主键（**主表**或**父表**）作为外键存储在关系`n`方表（**从表**或**子表**）中。在这种情况下，`images`表中的`image_id`需要作为外键存储在`blog`表中。\n\
  \n关于`1:n`关系，需要理解的重要一点是：它实际上也是一系列`1:1`关系的集合。从右向左阅读图 17-2，每篇文章都与一张图片存在一对一的关系。如果没有这种一对一关系，你将无法确定哪张图片与特定文章相关联。\n\
  \n## 多对多关系\n\n如果希望每篇文章关联多张图片，该怎么办？你可以在`blog`表中创建多个列来存储外键，但这很快就会变得难以管理。你可能从`image1`、`image2`和`image3`开始，但如果大多数文章只有一张图片，那么大部分时候两列都是冗余的。而且，你是否要为那篇需要四张图片的特殊文章再添加一列呢？\n\
  \n当需要处理**多对多**（或`n:m`）关系时，你需要采用不同的方法。`images`和`blog`表中的记录不足以演示`n:m`关系，但你可以添加一个`categories`表来标记单篇文章。大多数文章可能属于多个分类，而每个分类又可能与多篇文章相关联。\n\
  \n解决复杂关系的方法是使用**交叉引用表**（有时称为**链接表**），它建立了相关记录之间的一系列一对一关系。这是一个特殊的表，只包含两列，且这两列都被声明为联合主键。图\
  \ 17-3 展示了其工作原理。交叉引用表中的每条记录都存储了`blog`表和`categories`表中单篇文章与分类之间的关系细节。要查找所有属于`Kyoto`分类的文章，你在`categories`表中将`cat_id\
  \ 1`与交叉引用表中的`cat_id 1`进行匹配，从而确定`blog`表中`article_id`为`2`、`3`和`4`的记录与`Kyoto`相关联。\n\
  \n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig3_HTML.jpg](img/332054_4_En_17_Fig3_HTML.jpg)\n\
  \n**图 17-3.** 交叉引用表将多对多关系分解为`1:1`关系\n\n## 引用完整性\n\n通过外键建立表之间的关系，对你更新和删除记录的方式有重要影响。如果不小心，就会产生断开的链接。确保依赖关系不被破坏，这被称为维护**引用完整性**。我们将在下一章讨论这个重要主题。首先，让我们专注于检索存储在通过外键关系连接的独立表中的信息。\n\
  \n## 将图片链接到文章\n\n为了演示如何操作多个表，让我们从图 17-1 和图 17-2 中概述的简单场景开始：这些关系可以通过将一个表（父表）的主键作为外键存储在第二个表（子表或从表）中来解析为`1:1`关系。这需要在子表中添加一个额外的列来存储外键。\n\
  \n### 修改现有表结构\n\n理想情况下，你应该在填充数据之前设计好数据库结构。然而，关系型数据库（如 MySQL）足够灵活，允许你在表已经包含记录时添加、删除或修改列。要将图片关联到`phpsols`数据库中的单篇文章，你需要在`blog`表中添加一个额外的列来存储`image_id`作为外键。\n\
  \n## PHP 解决方案 17-1：向表中添加额外列\n\n本 PHP 解决方案演示了如何使用 phpMyAdmin 向现有表添加额外列。假设你已经在第 15\
  \ 章中在`phpsols`数据库中创建了`blog`表。\n\n1. 在 phpMyAdmin 中，选择`phpsols`数据库，然后点击`blog`表的`Structure`链接。\n\
  \n2. 在`blog`表结构下方，有一个表单允许你添加额外列。你只需要添加一列，因此`Add column(s)`文本框中的默认值是可以的。通常的做法是将外键放在表的主键之后，所以从下拉菜单中选择`after\
  \ article_id`，如下面的截图所示。然后点击`Go`。\n\n![../images/332054_4_En_17_Chapter/332054_4_En_17_Figa_HTML.jpg](img/332054_4_En_17_Figa_HTML.jpg)\n\
  \n3. 这将打开定义列属性的屏幕。请使用以下设置：\n\n*   名称：`image_id`\n*   类型：`INT`\n*   属性：`UNSIGNED`\n\
  *   Null：已选中\n*   索引：`INDEX`（在弹出模态对话框中无需命名）\n\n*不要*选中`A_I`（`AUTO_INCREMENT`）复选框。你不需要`image_id`自动递增。其值将从`images`表中插入。\n\
  \n`Null`复选框已被选中，因为并非所有文章都会关联图片。点击`Save`。\n\n4. 选择`Structure`选项卡，检查`blog`表结构现在是否如下所示：\n\
  \n![../images/332054_4_En_17_Chapter/332054_4_En_17_Figb_HTML.jpg](img/332054_4_En_17_Figb_HTML.jpg)\n\
  \n5. 如果点击屏幕左上角的`Browse`选项卡，你会看到每条记录中`image_id`的值都是 NULL。现在的挑战是如何在不手动查找编号的情况下插入正确的外键。我们将在下一步解决这个问题。\n\
  \n## 向表中插入外键\n\n向另一个表插入外键的基本原理相当简单：你查询数据库，找到要链接到另一个表的记录的主键。然后，你可以使用`INSERT`或`UPDATE`查询将外键添加到目标记录中。\n\
  \n为演示基本原理，你将改编第 15 章中的更新表单，添加一个下拉菜单，列出`images`表中已注册的图片（见图 17-4）。\n\n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig4_HTML.jpg](img/332054_4_En_17_Fig4_HTML.jpg)\n\
  \n**图 17-4.** 动态生成的下拉菜单插入正确的外键\n\n该菜单由一个循环动态生成，该循环显示`SELECT`查询的结果。每张图片的主键存储在`<option>`标签的`value`属性中。当表单提交时，选中的值会被合并到`UPDATE`查询中作为外键。\n\
  \n## PHP 解决方案 17-2：添加 image 外键（MySQLi）\n\n本 PHP 解决方案演示了如何通过向`blog`表更新记录来添加选中图片的主键作为外键。它改编自第\
  \ 15 章中的`admin/blog_update_mysqli.php`。请使用你在第 15 章中创建的版本。或者，将`ch15`文件夹中的`blog_update_mysqli_03.php`复制到`admin`文件夹，并从文件名中移除`_03`。\n\
  \n\n\n# 排版后的文本\n\n## MySQLi 实现\n\n1. 现有的 `SELECT` 查询用于检索待更新文章的详细信息，需要修改以包含外键 `image_id`，并将结果绑定到新的结果变量\
  \ `$image_id`。然后需要运行第二个 `SELECT` 查询来获取 `images` 表的详细信息。在此之前，需要调用预处理语句的 `free_result()`\
  \ 方法来释放数据库资源。将以下加粗显示的代码添加到现有脚本中：\n\n```\nif (isset($_GET['article_id']) && !$_POST)\
  \ {\n    // prepare SQL query\n    $sql = 'SELECT article_id, image_id, title, article\
  \ FROM blog\n    WHERE article_id = ?';\n    if ($stmt->prepare($sql)) {\n     \
  \   // bind the query parameter\n        $stmt->bind_param('i', $_GET['article_id']);\n\
  \        // execute the query\n        $OK = $stmt->execute();\n        // bind\
  \ the results to variables and fetch\n        $stmt->bind_result($article_id, $image_id,\
  \ $title, $article);\n        $stmt->fetch();\n        // free the database resources\
  \ for the second query\n        $stmt->free_result();\n    }\n}\n```\n\n可以在调用 `fetch()`\
  \ 方法后立即释放结果，因为结果集中只有一条记录，且每列的值都已绑定到变量。\n\n2. 在表单内部，需要显示 `images` 表中存储的文件名。由于第二个\
  \ `SELECT` 语句不依赖于外部数据，使用 `query()` 方法比预处理语句更简单。在 `article` 文本区域之后添加以下代码（所有代码都是新增的，但\
  \ PHP 部分以加粗显示以便参考）：\n\n```\nUploaded image:\n\nSelect image\n    query($getImages);\n\
  \    while ($row = $images->fetch_assoc()) {\n    ?>\n    \"\n    >\n\n```\n\n第一个\
  \ `<option>` 标签硬编码了标签 `Select image`，其 `value` 设置为空字符串。其余 `<option>` 标签由 `while`\
  \ 循环填充，该循环将每条记录提取到名为 `$row` 的数组中。\n\n条件语句检查当前的 `image_id` 是否与 `articles` 表中已存储的相同。如果是，则在\
  \ `<option>` 标签中插入 `selected`，以便在下拉菜单中显示正确的值。\n\n请确保不要遗漏以下代码行中的第三个字符：\n\n```\n?>>\n\
  ```\n\n它是 `<option>` 标签的右尖括号，夹在两个 PHP 标签之间。\n\n3. 保存页面并在浏览器中加载。您应该会自动重定向到 `blog_list_mysqli.php`。选择一个\
  \ **EDIT** 链接，确保页面看起来像图 17-4。检查浏览器源代码视图，验证 `<option>` 标签的 `value` 属性是否包含每张图片的主键。\n\
  \n**提示**：如果 `<select>` 菜单没有列出图片，则几乎可以确定是步骤 2 中的 `SELECT` 查询存在错误。在调用 `query()` 方法后立即添加\
  \ `echo $conn->error;`，然后重新加载页面。您需要查看浏览器源代码才能看到错误信息。如果消息是“Commands out of sync;\
  \ you can’t run this command now”，问题在于步骤 1 中没有使用 `free_result()` 释放数据库资源。\n\n4.\
  \ 最后阶段是将 `image_id` 添加到 `UPDATE` 查询中。由于某些博客条目可能没有关联图片，您需要创建替代的预处理语句，如下所示：\n\n```\n\
  // if form has been submitted, update record\nif (isset($_POST ['update'])) {\n\
  \    // prepare update query\n    if (!empty($_POST['image_id'])) {\n        $sql\
  \ = 'UPDATE blog SET image_id = ?, title = ?, article = ?\n        WHERE article_id\
  \ = ?';\n        if ($stmt->prepare($sql)) {\n            $stmt->bind_param('issi',\
  \ $_POST['image_id'], $_POST['title'],\n            $_POST['article'], $_POST['article_id']);\n\
  \            $done = $stmt->execute();\n        }\n    } else {\n        $sql =\
  \ 'UPDATE blog SET image_id = NULL, title = ?, article = ?\n        WHERE article_id\
  \ = ?';\n        if ($stmt->prepare($sql)) {\n            $stmt->bind_param('ssi',\
  \ $_POST['title'], $_POST['article'],\n            $_POST['article_id']);\n    \
  \        $done = $stmt->execute();\n        }\n    }\n}\n```\n\n如果 `$_POST['image_id']`\
  \ 有值，则将其作为第一个参数（使用占位符问号）添加到 SQL 中。由于它必须是整数，在 `bind_param()` 的第一个参数开头添加 `i`。\n\n\
  但是，如果 `$_POST['image_id']` 没有值，则需要创建另一个预处理语句，将 SQL 查询中的 `image_id` 设置为 `NULL`。由于它具有显式值，因此不将其添加到\
  \ `bind_param()` 中。\n\n5. 再次测试页面，从下拉菜单中选择一个文件名，然后点击 `Update Entry`。您可以通过刷新 phpMyAdmin\
  \ 中的 `Browse`，或选择同一篇文章进行更新，来验证外键是否已插入到 `articles` 表中。这次，下拉菜单中应显示正确的文件名。\n\n如有必要，请对照\
  \ `ch17` 文件夹中的 `blog_update_mysqli_04.php` 检查您的代码。\n\n## PHP Solution 17-3: 添加图片外键\
  \ (PDO)\n\n此 PHP 解决方案使用 PDO 通过将所选图片的主键作为外键添加来更新 `blog` 表中的记录。与 MySQLi 的主要区别在于，PDO\
  \ 可以使用 `bindValue()` 方法将 `null` 值绑定到占位符。本说明将适配第 15 章的 `admin/blog_update_pdo.php`。使用您在第\
  \ 15 章中创建的版本。或者，将 `ch15` 文件夹中的 `blog_update_pdo_03.php` 复制到 `admin` 文件夹，并从文件名中删除\
  \ `_03`。\n\n1. 将 `image_id` 添加到检索待更新文章详细信息的 `SELECT` 查询中，并将结果绑定到 `$image_id`。这涉及重新编号作为第一个参数传递给\
  \ `bindColumn()` 的列，以对应 `$title` 和 `$article`。修订后的代码如下所示：\n\n```\nif (isset($_GET['article_id'])\
  \ && !$_POST) {\n    // prepare SQL query\n    $sql = 'SELECT article_id, image_id,\
  \ title, article FROM blog\n    WHERE article_id = ?';\n    $stmt = $conn->prepare($sql);\n\
  \    // pass the placeholder value to execute() as a single-element array\n    $OK\
  \ = $stmt->execute([$_GET['article_id']]);\n    // bind the results\n    $stmt->bindColumn(1,\
  \ $article_id);\n    $stmt->bindColumn(2, $image_id);\n    $stmt->bindColumn(3,\
  \ $title);\n    $stmt->bindColumn(4, $article);\n    $stmt->fetch();\n}\n```\n\n\
  2. 在表单内部，需要显示 `images` 表中存储的文件名。由于第二个 `SELECT` 语句不依赖于外部数据，使用 `query()` 方法比预处理语句更简单。在\
  \ `article` 文本区域之后添加以下代码（所有代码都是新增的，但 PHP 部分以加粗显示以便参考）：\n\n```\nUploaded image:\n\
  \nSelect image\n    query($getImages) as $row) {\n    ?>\n    \"\n    >\n\n```\n\
  \n第一个 `<option>` 标签硬编码了标签 `Select image`，其 `value` 设置为空字符串。其余 `<option>` 标签由 `foreach`\
  \ 循环填充，该循环执行 `$getImages SELECT` 查询并将每条记录提取到名为 `$row` 的数组中。\n\n\n\n# 条件语句与数据库查询\n\
  \n## 用于图片选择的条件语句\n\n条件语句会检查当前的 `image_id` 是否与 `articles` 表中已存储的相同。如果是，则向 `<option>`\
  \ 标签中插入 `selected`，从而在下拉菜单中显示正确的值。\n\n请确保不要遗漏以下代码行中的第三个字符：\n\n```\n    ?>>\n```\n\
  \n它是 `<option>` 标签的闭尖括号，位于两个 PHP 标签之间。\n\n## 保存并测试页面\n\n3. 保存页面并在浏览器中加载。你应被自动重定向至\
  \ `blog_list_pdo.php`。选择任一 `EDIT` 链接，并确保你的页面显示如图 17-4 所示。查看浏览器源代码视图，确认 `<option>`\
  \ 标签的 `value` 属性包含每张图片的主键。\n\n4. 最后一步是将 `image_id` 添加到 `UPDATE` 查询中。当博客条目未关联图片时，需要在\
  \ `image_id` 列中插入 `null`。这需要更改将值绑定到预处理语句中匿名占位符的方式。你不再需要将值以数组形式传递给 `execute()` 方法，而应使用\
  \ `bindValue()` 和 `bindParam()`。修改后的代码如下所示：\n\n```\n    // 如果表单已提交，则更新记录\n    if\
  \ (isset($_POST['update'])) {\n    // 准备更新查询\n    $sql = 'UPDATE blog SET image_id\
  \ = ?, title = ?, article = ?\n    WHERE article_id = ?';\n    $stmt = $conn->prepare($sql);\n\
  \    if (empty($_POST['image_id'])) {\n    $stmt->bindValue(1, NULL, PDO::PARAM_NULL);\n\
  \    } else {\n    $stmt->bindParam(1, $_POST['image_id'], PDO::PARAM_INT);\n  \
  \  }\n    $stmt->bindParam(2, $_POST['title'], PDO::PARAM_STR);\n    $stmt->bindParam(3,\
  \ $_POST['article'], PDO::PARAM_STR);\n    $stmt->bindParam(4, $_POST['article_id'],\
  \ PDO::PARAM_INT);\n    // 执行查询\n    $done = $stmt->execute();\n    }\n```\n\n这些值通过从\
  \ 1 开始计数的数字绑定到匿名占位符，以标识它们应应用于哪个占位符。条件语句检查 `$_POST['image_id']` 是否为空。如果为空，`bindValue()`\
  \ 将值设置为 `null`，使用关键字 `NULL` 作为第二个参数，并使用 PDO 常量作为第三个参数。如第 13 章的\"在 PDO 预处理语句中嵌入变量\"\
  所述，当绑定的值不是变量时，你需要使用 `bindValue()`。\n\n其余值都是变量，因此使用 `bindParam()` 进行绑定。我对其余的值使用了整数和字符串的\
  \ PDO 常量。这并非严格必要，但能使代码更清晰。\n\n最后，`execute()` 方法括号内的值数组已被移除。\n\n5. 再次测试页面，从下拉菜单中选择一个文件名，然后单击\
  \ `Update Entry`。你可以通过刷新 phpMyAdmin 中的 `Browse` 或者选择同一篇文章进行更新，来验证外键是否已插入到 `articles`\
  \ 表中。此时，下拉菜单中应显示正确的文件名。\n\n如有必要，可将你的代码与 `ch17` 文件夹中的 `blog_update_pdo_04.php` 进行对照。\n\
  \n## 从多张表中选取记录\n\n在 `SELECT` 查询中有多种方式可以关联表，但最常见的是列出以 `INNER JOIN` 分隔的表名。单凭 `INNER\
  \ JOIN` 会产生所有可能的行组合（即笛卡尔积）。要仅选择相关的值，你需要指定主键/外键关系。例如，要从 `blog` 和 `images` 表中选取文章及其相关图片，你可以使用\
  \ `WHERE` 子句，如下所示：\n\n```\nSELECT title, article, filename, caption\nFROM blog INNER\
  \ JOIN images\nWHERE blog.image_id = images.image_id\n```\n\n`title` 和 `article`\
  \ 列仅存在于 `blog` 表中。同样，`filename` 和 `caption` 仅存在于 `images` 表中。它们是明确的，无需限定。然而，`image_id`\
  \ 存在于两张表中，因此你需要为每个引用加上表名和一个点作为前缀。\n\n多年以来，一种常见的做法是使用逗号代替 `INNER JOIN`，如下所示：\n\n\
  ```\nSELECT title, article, filename, caption\nFROM blog, images\nWHERE blog.image_id\
  \ = images.image_id\n```\n\n> **注意事项**：由于自 MySQL 5.0.12 以来对连接处理方式的更改，使用逗号连接表可能导致\
  \ SQL 语法错误。请改用 `INNER JOIN`。\n\n除了 `WHERE` 子句，你也可以使用 `ON`，如下所示：\n\n```\nSELECT title,\
  \ article, filename, caption\nFROM blog INNER JOIN images ON blog.image_id = images.image_id\n\
  ```\n\n当两列名称相同时，可以使用以下语法，这也是我个人的偏好：\n\n```\nSELECT title, article, filename, caption\n\
  FROM blog INNER JOIN images USING (image_id)\n```\n\n> **注意**：`USING` 后的列名必须放在括号内。\n\
  \n## PHP 解决方案 17-4：构建详情页面\n\n本 PHP 解决方案展示了如何连接 `blog` 和 `images` 表，以显示所选文章及其关联图片。MySQLi\
  \ 和 PDO 的代码几乎相同，因此本方案涵盖了两种方式。\n\n1. 将 `ch17` 文件夹中的 `details_01.php` 复制到 `phpsols-4e`\
  \ 站点根目录，并重命名为 `details.php`。如果编辑环境提示更新链接，请勿操作。确保 `footer.php` 和 `menu.php` 位于 `includes`\
  \ 文件夹中，然后在浏览器中加载该页面。它应显示如图 17-5 所示。\n\n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig5_HTML.jpg](img/332054_4_En_17_Fig5_HTML.jpg)\n\
  \n*图 17-5. 详情页面包含占位图片和文本*\n\n2. 在浏览器中加载 `blog_list_mysqli.php` 或 `blog_list_pdo.php`，并通过分配指定的图片文件名来更新以下三篇文章：\n\
  \n   * Basin of Contentment：`basin.jpg`\n   * Tiny Restaurants Crowded Together：`menu.jpg`\n\
  \   * Trainee Geishas Go Shopping：`maiko.jpg`\n\n3. 导航至 phpMyAdmin 中的 `blog` 表，单击\
  \ `Browse` 选项卡，检查外键是否已注册。至少有一篇文章的 `image_id` 值应为 `NULL`，如图 17-6 所示。\n\n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig6_HTML.jpg](img/332054_4_En_17_Fig6_HTML.jpg)\n\
  \n*图 17-6. 未关联图片的文章的外键被设置为 NULL*\n\n4. 在尝试显示图片之前，我们需要确保图片来自预期的位置，并且它确实是一张图片。在 `details.php`\
  \ 顶部创建一个变量，用于存储图片目录的相对路径（包含尾部斜杠），如下所示：\n\n```\n    // 图片目录的相对路径\n    $imageDir =\
  \ './images/';\n```\n\n5. 接下来，包含上一章的 `utility_funcs.php`（如有必要，将其从 `ch16` 文件夹复制到\
  \ `includes` 文件夹）。然后包含数据库连接文件，创建一个只读连接，并在 `DOCTYPE` 声明之前的 PHP 代码块中准备 SQL 查询，如下所示。\n\
  \n\n\n```php\nrequire_once './includes/utility_funcs.php';\nrequire_once './includes/connection.php';\n\
  // 连接数据库\n$conn = dbConnect('read');  // 如需则添加 'pdo'\n// 检查查询字符串中的 article_id\n\
  if (isset($_GET['article_id']) && is_numeric($_GET['article_id'])) {\n    $article_id\
  \ = (int) $_GET['article_id'];\n} else {\n    $article_id = 0;\n}\n$sql = \"SELECT\
  \ title, article, DATE_FORMAT(updated, '%W, %M %D, %Y') AS updated, filename, caption\n\
  \        FROM blog INNER JOIN images USING (image_id)\n        WHERE blog.article_id\
  \ = $article_id\";\n$result = $conn->query($sql);\n$row = $result->fetch_assoc();\
  \  // 若使用 PDO 则改用 $result->fetch();\n```\n\n代码检查`URL`查询字符串中的`article_id`。如果它存在且是数字，则通过`(int)`类型转换运算符将其赋给`$article_id`，以确保其为整数。否则，将`$article_id`设为`0`。你也可以选择一篇默认文章，但暂时先保留为`0`，因为我想说明一个重点。\n\
  \n`SELECT`查询从`blog`表中检索`title`、`article`和`updated`列，并从`images`表中检索`filename`和`caption`列。`updated`的值使用`DATE_FORMAT()`函数和别名进行格式化，如第\
  \ 16 章所述。由于只检索一条记录，使用原始列名作为别名不会对排序顺序造成问题。\n\n使用`INNER JOIN`和`USING`子句连接两个表，该子句匹配两个表中`image_id`列的值。`WHERE`子句选择由`$article_id`标识的文章。由于`$article_id`的数据类型已检查过，因此在查询中使用它是安全的。无需使用预处理语句。\n\
  \n请注意，查询被包裹在双引号中，以便解析`$article_id`的值。为避免与外层引号冲突，传递给`DATE_FORMAT()`的格式字符串参数使用单引号。\n\
  \n6.  现在我们已经查询了数据库，可以检查图像。为了确保它在预期位置，将`$row['filename']`的值传递给`basename()`函数，并将结果与图像目录的相对路径拼接。然后我们可以检查文件是否存在且可读。如果是，则使用`getimagesize()`获取其宽度和高度。在上一步插入的代码之后立即添加以下代码：\n\
  \n```php\nif ($row && !empty($row['filename'])) {\n    $image = $imageDir . basename($row['filename']);\n\
  \    if (file_exists($image) && is_readable($image)) {\n        $imageSize = getimagesize($image)[3];\n\
  \    }\n}\n```\n\n如第 10 章的 PHP Solution 10-1 所述，`getimagesize()`返回一个包含图像信息的数组，其中索引\
  \ 3 包含一个字符串，该字符串包含正确的宽度和高度属性，可直接插入`<img>`标签。这里，我们使用数组解引用将其直接赋值给`$imageSize`。\n\n\
  7.  其余代码在页面主体中显示 SQL 查询的结果。像这样替换`<h2>`标签中的占位文本：\n\n如果`SELECT`查询未找到结果，`$row`将为空，PHP\
  \ 会将其解释为`false`。因此，这段代码显示标题，如果结果集为空，则显示“未找到记录”。\n\n8.  像这样替换占位日期：\n\n9.  在日期段落之后立即有一个包含占位图像的`<figure>`元素。并非所有文章都关联了图像，因此需要将`<figure>`包裹在一个检查`$imageSize`是否包含值的条件语句中。像这样修改`<figure>`：\n\
  \n```html\n<figure>\n<img src=\"<?= $image; ?>\" alt=\"<?= $row['caption']; ?>\"\
  >\n</figure>\n```\n\n10. 最后，你需要显示文章。删除占位文本的段落，并在上一步最后一个代码块的结束花括号和结束 PHP 标签之间添加以下代码：\n\
  \n```php\necho convertToParas($row['article']);\n```\n\n这使用了`utility_funcs.php`中的`convertToParas()`函数，将博客条目包裹在`<p>`标签中，并将换行符序列替换为闭合和开放标签（参见第\
  \ 16 章的“显示段落”一节）。\n\n11. 保存页面，并在浏览器中加载`blog.php`。点击某个通过外键分配了图像的文章的`更多`链接。你应该会看到`details.php`显示完整的文章和图像，布局如图\
  \ 17-7 所示。\n\n如有必要，请对照`ch17`文件夹中的`details_mysqli_01.php`或`details_pdo_01.php`检查你的代码。\n\
  \n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig7_HTML.jpg](img/332054_4_En_17_Fig7_HTML.jpg)\n\
  \n**图 17-7.** 详情页从一张表中提取文章，从另一张表中提取图像。\n\n12. 点击返回`blog.php`的链接，测试其他项目。每个关联了图像的文章都应正确显示。点击没有图像的文章的`更多`链接。这次你应该会看到如图\
  \ 17-8 所示的结果。\n\n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig8_HTML.jpg](img/332054_4_En_17_Fig8_HTML.jpg)\n\
  \n**图 17-8.** 缺少关联图像导致 SELECT 查询失败。\n\n你知道文章在数据库中，否则`blog.php`中就不会显示前两句。要理解这种突然“消失”的原因，请参考图\
  \ 17-6。对于没有关联图像的记录，`image_id`的值为`NULL`。由于`images`表中的所有记录都有主键，`USING`子句无法找到匹配项。下一节将解释如何处理这种情况。\n\
  \n### 查找没有匹配外键的记录\n\n从 PHP Solution 17-4 中取出`SELECT`查询，并移除搜索特定文章的条件，剩下如下：\n\n```sql\n\
  SELECT title, article, DATE_FORMAT(updated, '%W, %M %D, %Y') AS updated, filename,\
  \ caption\nFROM blog INNER JOIN images USING (image_id)\n```\n\n如果在 phpMyAdmin 的\
  \ SQL 选项卡中运行此查询，将产生如图 17-9 所示的结果。\n\n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig9_HTML.jpg](img/332054_4_En_17_Fig9_HTML.jpg)\n\
  \n**图 17-9.** INNER JOIN 仅能找到在两个表中都匹配的记录。\n\n使用`INNER JOIN`时，`SELECT`查询只能成功找到完全匹配的记录。其中一篇文章没有关联图像，因此`articles`表中`image_id`的值为`NULL`，这与`images`表中的任何内容都不匹配。\n\
  \n在这种情况下，你需要使用`LEFT JOIN`而不是`INNER JOIN`。使用`LEFT JOIN`，结果包括在左表中有匹配但在右表中没有匹配的记录。左和右指的是执行连接时的顺序。像这样重写`SELECT`查询：\n\
  \n```sql\nSELECT title, article, DATE_FORMAT(updated, '%W, %M %D, %Y') AS updated,\
  \ filename, caption\nFROM blog LEFT JOIN images USING (image_id)\n```\n\n在 phpMyAdmin\
  \ 中运行时，你将获得全部四篇文章，如图 17-10 所示。\n\n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig10_HTML.jpg](img/332054_4_En_17_Fig10_HTML.jpg)\n\
  \n**图 17-10.** LEFT JOIN 包含在右表中没有匹配的记录。\n\n如你所见，右表（`images`）中的空字段显示为`NULL`。\n\n\n\
  \n若两个表中的列名不同，请使用 `ON`，如下所示：\n\n```\nFROM table_1 LEFT JOIN table_2 ON table_1.col_name\
  \ = table_2.col_name\n```\n\n现在，你可以像这样重写 `details.php` 中的 SQL 查询：\n\n```\n$sql =\
  \ \"SELECT title, article, DATE_FORMAT(updated, '%W, %M %D, %Y') AS updated,\nfilename,\
  \ caption\nFROM blog LEFT JOIN images USING (image_id)\nWHERE blog.article_id =\
  \ $article_id\";\n```\n\n如果你点击「**More**」链接查看没有关联图片的文章，现在应该可以看到文章正常显示，如图 17-11 所示。其他文章也应能正常显示。完成的代码位于\
  \ `details_mysqli_02.php` 和 `details_pdo_02.php` 中。\n\n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig11_HTML.jpg](img/332054_4_En_17_Fig11_HTML.jpg)\n\
  \n图 17-11. `LEFT JOIN` 也能检索没有匹配外键的文章\n\n## 创建智能链接\n\n`details.php` 底部的链接直接返回到 `blog.php`。当\
  \ `blog` 表中只有四条记录时这没问题，但一旦数据库中开始有更多记录，你就需要构建一个导航系统，正如我在第 14 章中展示的那样。导航系统的问题在于，你需要一种方法将访问者返回到他们之前所在的同一结果集位置。\n\
  \n### PHP 解决方案 17-5：返回到导航系统中的同一位置\n\n此 PHP 解决方案检查访问者来自内部链接还是外部链接。如果来源页面在同一网站内，则链接会将访问者返回到同一位置。如果来源页面是外部网站，或者服务器不支持必要的超全局变量，则脚本会替换为一个标准链接。此方案在\
  \ `details.php` 的上下文中展示，但可用于任何页面。\n\n该代码不依赖于数据库，因此对 MySQLi 和 PDO 来说都是相同的。\n\n1.\
  \  找到 `details.php` 主体部分中的返回链接，它看起来像这样：\n\n    ```\n    <a href=\"blog.php\">回到博客</a>\n\
  \    ```\n\n2.  将光标紧贴在第一个引号的右侧，并插入以下用粗体突出显示的代码：\n\n    ```\n    <a href=\"<?php\n\
  \    if (isset($_SERVER['HTTP_REFERER']) && isset($_SERVER['HTTP_HOST'])) {\n  \
  \      $url = parse_url($_SERVER['HTTP_REFERER']);\n        if ($url['host'] ==\
  \ $_SERVER['HTTP_HOST']) {\n            echo $_SERVER['HTTP_REFERER'];\n       \
  \ } else {\n            echo 'blog.php';\n        }\n    } else {\n        echo\
  \ 'blog.php';\n    }\n    ?>\">回到博客</a>\n    ```\n\n`$_SERVER['HTTP_REFERER']` 和\
  \ `$_SERVER['HTTP_HOST']` 是超全局变量，分别包含来源页面的 URL 和当前主机名。你需要使用 `isset()` 检查它们是否存在，因为并非所有服务器都支持它们。此外，浏览器可能会屏蔽来源页面的\
  \ URL。\n\n`parse_url()` 函数会创建一个数组，其中包含 URL 的每一部分，因此 `$url['host']` 包含主机名。如果它与 `$_SERVER['HTTP_HOST']`\
  \ 匹配，说明访问者来自内部链接，因此内部链接的完整 URL 会被插入到 `href` 属性中。这包括任何查询字符串，因此该链接会将访问者送回导航系统中的同一位置。否则，会创建一个指向目标页面的普通链接。\n\
  \n完成的代码位于 `ch17` 文件夹中的 `details_mysqli_03.php` 和 `details_pdo_3.php`。\n\n## 章节回顾\n\
  \n使用 `INNER JOIN` 和 `LEFT JOIN` 从多个表中检索信息相对简单。成功处理多个表的关键在于构建它们之间的关系，使得复杂关系始终可以解析为\
  \ `1:1`，必要时可以通过交叉引用（或链接）表来实现。下一章将继续探索多表操作，展示在插入、更新和删除记录时如何处理外键关系。\n\n## 18. 管理多个数据库表\n\
  \n前一章向你展示了如何使用 `INNER JOIN` 和 `LEFT JOIN` 检索存储在多个表中的信息。你还学习了如何通过向子表添加额外列并逐个更新每条记录来插入外键，从而链接现有表。然而，大多数情况下，你需要同时在两个表中插入数据。这带来一个挑战，因为\
  \ `INSERT` 命令一次只能操作一个表。你需要按正确的顺序处理插入操作，从父表开始，以便能够获取新记录的主键，并同时将其与其他详细信息一起插入子表。在更新和删除记录时也需要考虑类似的问题。涉及的代码并不复杂，但在编写脚本时，你需要清晰地记住事件的顺序。\n\
  \n本章将指导你完成在 `blog` 表中插入新文章的过程，可选地选择一张相关图片或上传一张新图片，并将文章分配到一个或多个类别，所有这些都在一个操作中完成。然后，你将构建脚本来更新和删除文章，同时不破坏相关表的参照完整性。\n\
  \n你还将学习使用事务批量处理多个查询，如果批次中的任何部分失败，则将数据库回滚到其原始状态，以及外键约束，它控制当你尝试删除另一个表中仍然存在外键关系的记录时会发生什么。并非所有数据库都支持事务和外键约束，因此检查你的远程服务器是否支持非常重要。本章还解释了如果你的服务器不支持外键约束，你可以采取哪些措施来维护数据的完整性。\n\
  \n具体来说，你将学习以下内容：\n\n-   在相关表中插入、更新和删除记录\n-   在记录创建后立即查找其主键\n-   将多个查询作为单个批次处理，并在任何部分失败时回滚\n\
  -   转换表的存储引擎\n-   在 InnoDB 表之间建立外键约束\n\n### 维护参照完整性\n\n对于单个表，无论你更新一条记录多少次或删除多少条记录，对其他记录的影响为零。一旦你将一条记录的主键作为外键存储在另一个表中，你就创建了一个需要管理的依赖关系。例如，图\
  \ 18-1 展示了 `blog` 表中的第二篇文章（“见习艺伎去购物”）通过 `article2cat` 交叉引用表链接到了「**Kyoto**」和「**People**」类别。\n\
  \n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig1_HTML.jpg](img/332054_4_En_18_Fig1_HTML.jpg)\n\
  \n图 18-1. 你需要管理外键关系以避免孤立记录\n\n如果你删除了这篇文章，但未删除交叉引用表中 `article_id 2` 的条目，那么查找「**Kyoto**」或「**People**」类别中所有文章的查询将尝试匹配\
  \ `blog` 表中不存在的记录。同样，如果你决定删除某个类别，但未删除交叉引用表中匹配的记录，那么查找与某篇文章关联的类别的查询将尝试匹配一个不存在的类别。\n\
  \n用不了多久，你的数据库中就会充斥着孤立记录。幸运的是，维护参照完整性并不困难。SQL 通过建立称为外键约束的规则来实现这一点，这些规则告诉数据库，当你更新或删除一条在另一张表中有依赖记录的记录时应该怎么做。\n\
  \n\n\n# 支持事务与外键约束\n\n`InnoDB`（MySQL 5.5 及之后版本的默认存储引擎）支持事务和外键约束。MariaDB 中对应的存储引擎是`Percona\
  \ XtraDB`，但它自识别为`InnoDB`，功能完全相同。即使远程服务器运行最新版 MySQL 或 MariaDB，也无法保证支持`InnoDB`，因为托管服务商可能已禁用它。\n\
  \n如果服务器运行旧版 MySQL，默认存储引擎为`MyISAM`，它不支持事务或外键约束。不过你仍有可能使用`InnoDB`，因为它自 4.0 版本起就已成为\
  \ MySQL 的组成部分。将`MyISAM`表转换为`InnoDB`非常简单，只需几秒钟。\n\n如果无法使用`InnoDB`，则需要通过 PHP 脚本构建必要的规则来维护引用完整性。本章将介绍这两种方法。\n\
  \n> **注意**：`MyISAM`表的优势在于速度极快。它们占用磁盘空间更少，非常适合存储不常变动的大量数据。但由于`MyISAM`引擎已不再积极开发，不建议在新项目中使用。\n\
  \n## PHP 解决方案 18-1：检查是否支持 InnoDB\n\n本 PHP 解决方案介绍如何检查远程服务器是否支持`InnoDB`存储引擎。\n\n1.\
  \ 如果托管服务商提供 phpMyAdmin 管理数据库，请登录远程服务器的 phpMyAdmin，点击屏幕顶部的`引擎`标签页（如果可用）。这将显示类似图 18-2\
  \ 的存储引擎列表。\n\n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig2_HTML.jpg](img/332054_4_En_18_Fig2_HTML.jpg)\n\
  \n**图 18-2.** 通过 phpMyAdmin 检查存储引擎支持\n\n> **注意**：图 18-2 中`InnoDB`的描述指向了`Percona\
  \ XtraDB`。该截图取自 MariaDB 服务器。在 MySQL 服务器上你可能会看到不同的存储引擎列表，但 MySQL 和 MariaDB 通常都会提供至少`InnoDB`和`MyISAM`。`Aria`存储引擎是\
  \ MariaDB 对`MyISAM`的改进版本。由于本书不涉及 MySQL 以外的内容，因此不介绍`Aria`——它既不支持事务也不支持外键约束。\n\n2.\
  \ 列表显示所有存储引擎，包括不支持的引擎。不支持或禁用的存储引擎会呈灰色显示。如果不确定`InnoDB`的状态，请点击其名称。\n\n3. 如果不支持`InnoDB`，会看到相应提示。反之，如果看到类似图\
  \ 18-3 的变量列表，则说明支持——`InnoDB`已启用。\n\n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig3_HTML.jpg](img/332054_4_En_18_Fig3_HTML.jpg)\n\
  \n**图 18-3.** 确认`InnoDB`受支持\n\n4. 如果 phpMyAdmin 中没有`引擎`标签页，请选择数据库中的任意表，点击屏幕右上角的`操作`标签页。在`表选项`部分，点击`存储引擎`字段右侧的下拉箭头查看可用选项（见图\
  \ 18-4）。如果`InnoDB`出现在列表中，则表示支持。\n\n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig4_HTML.jpg](img/332054_4_En_18_Fig4_HTML.jpg)\n\
  \n**图 18-4.** 表选项中列出了可用的存储引擎\n\n5. 如果上述方法均无法确定，请打开`ch18`文件夹中的`storage_engines.php`。修改前三行，填入远程服务器数据库的主机名、用户名和密码。\n\
  \n6. 将`storage_engines.php`上传到网站并在浏览器中加载该页面。你将看到存储引擎列表及其支持级别，如图 18-5 所示。某些情况下，`NO`会显示为`DISABLED`。\n\
  \n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig5_HTML.jpg](img/332054_4_En_18_Fig5_HTML.jpg)\n\
  \n**图 18-5.** `storage_engines.php`中的 SQL 查询报告了哪些引擎受支持\n\n如图 18-5 所示，典型安装支持多个存储引擎。令人惊讶的是，你可以在同一个数据库中使用不同的存储引擎。事实上，官方建议这样做。即使远程服务器支持`InnoDB`，对于不需要事务或外键关系的表，使用`MyISAM`或`Aria`通常更高效。对于需要事务或外键关系的表，则使用`InnoDB`。\n\
  \n本章稍后将介绍如何将表转换为`InnoDB`。在此之前，我们先看看如何在不依赖存储引擎的情况下建立和使用外键关系。\n\n## 向多张表插入记录\n\n`INSERT`查询每次只能向一张表插入数据。因此，处理多张表时，需要精心规划插入脚本，确保所有信息都被存储，并建立正确的外键关系。\n\
  \n上一章中的 PHP 解决方案 17-2（MySQLi）和 17-3（PDO）演示了如何为数据库中已存在的图片添加正确的外键。但在插入新的博客文章时，需要能够选择现有图片、上传新图片，或者选择不使用图片。这意味着处理脚本需要检查是否选择了或上传了图片，并据此执行相应命令。此外，为博客文章分配零个或多个分类会增加脚本需要做出的决策数量。图\
  \ 18-6 展示了决策链。\n\n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig6_HTML.png](img/332054_4_En_18_Fig6_HTML.png)\n\
  \n**图 18-6.** 插入带图片和分类的博客文章时的决策链\n\n页面首次加载时，表单尚未提交，因此页面仅显示插入表单。通过查询数据库，插入表单中会列出所有现有图片和分类，方法与\
  \ PHP 解决方案 17-2 和 17-3 中更新表单处理图片的方式相同。\n\n表单提交后，处理脚本将执行以下步骤：\n\n1. 如果上传了图片，则处理上传，将图片详情存储到`images`表，并获取新记录的主键。\n\
  2. 如果未上传图片，但选择了现有图片，则通过`$_POST`数组提交的值获取其外键。\n3. 无论哪种情况，新博客文章都会被插入`blog`表，同时将图片的主键作为外键。但如果既未上传也未选择现有图片，则文章插入`blog`表时不带外键。\n\
  4. 最后，脚本检查是否选择了任何分类。如果已选择，则获取新文章的主键，并与所选分类的主键组合后插入`article2cat`表。\n\n如果在任何阶段出现问题，脚本需要放弃后续过程，并重新显示用户的输入。该脚本较长，因此我将分若干小节介绍。第一步是创建`article2cat`交叉引用表。\n\
  \n## 创建交叉引用表\n\n\n\n在处理数据库中的多对多关系时，需要构建一个类似图 18-1 所示的交叉引用表。交叉引用表仅由两列组成，这两列联合声明为表的主键（称为复合主键）。\n\
  \n观察图 18-7 可以看到，`article_id`和`cat_id`列中都多次包含相同的数字——这种情况在主键中是不可接受的，主键必须唯一。然而，在复合主键中，是两个值的组合具有唯一性。前两个组合`1,3`和`2,1`在表中没有其他重复，其他组合也是如此。\n\
  \n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig7_HTML.jpg](img/332054_4_En_18_Fig7_HTML.jpg)\n\
  \n**图 18-7.** 在交叉引用表中，两列共同构成复合主键\n\n**设置 categories 和交叉引用表**\n\n在`ch18`文件夹中，可以找到`categories.sql`，其中包含用于创建`categories`表和交叉引用表`article2cat`的\
  \ SQL 语句，以及一些示例数据。在 phpMyAdmin 中，选择`phpsols`数据库，然后使用`Import`选项卡加载`categories.sql`来创建表和数据。表\
  \ 18-1 和 18-2 列出了表的设置。两个数据库表都只有两列。\n\n**表 18-2.** `article2cat`交叉引用表的设置\n\n| Name\
  \ | Type | Length/Values | Attributes | Null | Index | A_I |\n| --- | --- | ---\
  \ | --- | --- | --- | --- |\n| `article_id` | `INT` | | `UNSIGNED` | 未选中 | `PRIMARY`\
  \ | |\n| `cat_id` | `INT` | | `UNSIGNED` | 未选中 | `PRIMARY` | |\n\n**表 18-1.** `categories`表的设置\n\
  \n| Name | Type | Length/Values | Attributes | Null | Index | A_I |\n| --- | ---\
  \ | --- | --- | --- | --- | --- |\n| `cat_id` | `INT` | | `UNSIGNED` | 未选中 | `PRIMARY`\
  \ | 选中 |\n| `category` | `VARCHAR` | 20 | | 未选中 | | |\n\n关于交叉引用表定义的重要一点是，两列都设置为主键，并且两列的`A_I`（`AUTO_INCREMENT`）复选框都没有被选中。\n\
  \n**警告**\n要创建复合主键，必须同时将两列都声明为主键。如果错误地只声明一列为主键，数据库会阻止稍后添加第二列。必须从单列中删除主键索引，然后将其重新应用到两列上。两列的组合被视为主键。\n\
  \n**获取上传图片的文件名**\n该脚本使用了第 6 章中的`Upload`类，但该类需要稍作调整，因为上传文件的文件名会被合并到`$messages`属性中。\n\
  \n**PHP 解决方案 18-2：改进 Upload 类**\n\n本 PHP 解决方案通过创建一个新的受保护属性来存储成功上传文件的名称，并提供一个公共方法来获取文件名数组，从而调整了第\
  \ 9 章中的`Upload`类。\n\n1.  打开`PhpSolutions/File`文件夹中的`Upload.php`。或者，从`ch18/PhpSolutions/File`文件夹复制`Upload.php`，并将其保存到`phpsols-4e`站点根目录下的`PhpSolutions/File`中。\n\
  \n2.  在文件顶部的属性列表中添加以下行：\n\n```php\nprotected $filenames = [];\n```\n\n这会将一个名为`$filenames`的受保护属性初始化为空数组。\n\
  \n3.  修改`moveFile()`方法，如果文件上传成功，则将修改后的文件名添加到`$filenames`属性中。新代码已加粗显示。\n\n```php\n\
  protected function moveFile($file) {\n    $filename = $this->newName ?? $file['name'];\n\
  \    $success = move_uploaded_file($file['tmp_name'], $this->destination . $filename);\n\
  \    if ($success) {\n        // add the amended filename to the array of uploaded\
  \ files\n        $this->filenames[] = $filename;\n        $result = $file['name']\
  \ . ' was uploaded successfully';\n        if (!is_null($this->newName)) {\n   \
  \         $result .= ', and was renamed ' . $this->newName;\n        }\n       \
  \ $this->messages[] = $result;\n    } else {\n        $this->messages[] = 'Could\
  \ not upload ' . $file['name'];\n    }\n}\n```\n\n仅当文件成功移动到目标文件夹时，其名称才会被添加到`$filenames`数组中。\n\
  \n4.  添加一个公共方法，用于返回存储在`$filenames`属性中的值。代码如下：\n\n```php\npublic function getFilenames()\
  \ {\n    return $this->filenames;\n}\n```\n\n在类定义中放置这段代码的位置无关紧要，但通常的做法是将所有公共方法放在一起。\n\
  \n5.  保存`Upload.php`。如果需要检查代码，请将其与`ch18/PhpSolutions/File`文件夹中的`Upload_01.php`进行比较。\n\
  \n**调整插入表单以处理多个表**\n\n您在第 15 章中为博客文章创建的插入表单已经包含了将大部分详细信息插入`blog`表所需的代码。与其从头开始，不如调整现有页面。目前，该页面只包含用于标题的文本输入字段和用于文章的文本区域。\n\
