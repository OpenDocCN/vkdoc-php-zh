    \n```html\n<body>\n    <ul>\n        <li><a href=\"index.php\">首页</a></li>\n \
    \       <li><a href=\"blog.php\">博客</a></li>\n        <li><a href=\"gallery.php\"\
    >画廊</a></li>\n        <li><a href=\"contact.php\">联系</a></li>\n    </ul>\n</body>\n\
    ```\n\n指示当前页面的样式由第 2 行突出显示的 `id=\"here\"` 控制。你需要 PHP 来插入 `id=\"here\"`：如果当前页面是\
    \ `blog.php`，则插入到 `blog.php <a>` 标签中；如果是 `gallery.php`，则插入到 `gallery.php <a>`\
    \ 标签中；如果是 `contact.php`，则插入到 `contact.php <a>` 标签中。\n\n希望你现在已经得到了提示——你需要在每个 `<a>`\
    \ 标签中使用一个 `if` 语句（参见第 3 章的“做出决策”）。第 2 行需要看起来像这样：\n\n```html\n<li><a href=\"blog.php\"\
    >首页</a></li>\n```\n\n其他链接也应该以类似方式修改。但是 `$currentPage` 的值是如何得到的呢？你需要找出当前页面的文件名。\n\
    \n2.  暂时将 `menu.php` 放在一边，创建一个名为 `get_filename.php` 的新 PHP 页面。插入以下代码（或者使用 `ch05`\
    \ 文件夹中的 `get_filename.php`）：\n\n```php\n<?php echo $_SERVER['SCRIPT_FILENAME'];\
    \ ?>\n```\n\n3.  保存 `get_filename.php` 并在浏览器中查看。在 Windows 系统上，你应该看到类似以下截图的内容。（`ch05`\
    \ 文件夹中的版本包含此步骤和下一步骤的代码，以及指示各自内容的文本。）\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Figa_HTML.jpg](img/332054_4_En_5_Figa_HTML.jpg)\n\
    \n在 macOS 上，你应该看到类似这样的内容：\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Figb_HTML.jpg](img/332054_4_En_5_Figb_HTML.jpg)\n\
    \n`$_SERVER['SCRIPT_FILENAME']` 来自 PHP 内置的超全局数组之一，它始终提供当前页面的绝对文件路径。你现在需要的是提取出文件名的方法。\n"
- fmt: "4.  Amend the code in the previous step like this:\n\n```\n<?php echo basename($_SERVER['SCRIPT_FILENAME']);\n\
    ```\n\n5.  Save `get_filename.php` and click the Reload button in your browser.\
    \ You should now see just the filename: `get_filename.php`.\n\nThe built-in PHP\
    \ function `basename()` takes a file path as an argument and extracts the filename.\
    \ So there you have it—a way of finding the filename of the current page.\n\n\
    6.  Amend the code in `menu.php` like this (the changes are highlighted in bold):\n\
    \n```\n>Home\n>Blog\n>Gallery\n>Contact\n```\n\n**Tip**\nI used double quotes\
    \ around `here`, so I wrapped the string `'id=\"here\"'` in single quotes. It’s\
    \ easier to read than `\"id=\\\"here\\\"\"`.\n\n1.  Save `menu.php` and load `index.php`\
    \ into a browser. The menu should look no different from before. Use the menu\
    \ to navigate to other pages. This time, as shown in Figure [5-5](#332054_4_En_5_Chapter.xhtml#Fig5),\
    \ the border alongside the current page should be white, indicating your location\
    \ within the site. If you inspect the page’s source view in the browser, you’ll\
    \ see that the `here` ID has been automatically inserted into the correct link.\n\
    \n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig5_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Fig5_HTML.jpg)\n\
    \n**Figure 5-5.** Conditional code in the include file produces different output\
    \ for each page.\n\n2.  If necessary, compare your code with `menu_02.php` in\
    \ the `ch05` folder.\n\n## PHP Solution 5-4: Automating a Page’s Title from Its\
    \ Filename\n\nThis solution uses `basename()` to extract the filename and then\
    \ uses PHP string functions to format the name ready for insertion in the `<title>`\
    \ tag. It works only with filenames that tell you something about the page’s contents,\
    \ but that’s a good practice anyway.\n\n1.  Create a new PHP file called `title.php`\
    \ and save it in the `includes` folder.\n\n2.  Strip out any code inserted by\
    \ your script editor and type in the following code:\n\n```\n<?php $title = basename($_SERVER['SCRIPT_FILENAME'],\
    \ '.php');\n```\n\n**Tip**\nDon’t add a closing PHP tag at the end. It’s optional\
    \ when nothing follows the PHP code in the same file. Omitting the closing tag\
    \ helps avoid a common error with include files known as “headers already sent.”\
    \ You’ll learn more about this error in PHP Solution 5-9.\n\nThe `basename()`\
    \ function used in PHP Solution 5-3 takes an optional second argument: a string\
    \ containing the filename extension preceded by a leading period. Adding the second\
    \ argument strips the extension from the filename. So, this code extracts the\
    \ filename, strips the `.php` extension, and assigns the result to a variable\
    \ called `$title`.\n\n1.  Open `contact.php` and include `title.php` by typing\
    \ this above the `DOCTYPE`:\n\n**Note**\nNormally, nothing should precede the\
    \ `DOCTYPE` declaration in a web page. However, this doesn’t apply to PHP code,\
    \ if it doesn’t send any output to the browser. The code in `title.php` only assigns\
    \ a value to `$title`, so the `DOCTYPE` declaration remains the first output the\
    \ browser sees.\n\n1.  Amend the `<title>` tag like this:\n\n```\nJapan Journey\
    \ \n```\n\nNotice there’s a space before the opening shorthand PHP tag. Without\
    \ it, the value of `$title` would butt up against “Journey.”\n\n2.  Save both\
    \ pages and load `contact.php` into a browser. The filename without the `.php`\
    \ extension has been added to the browser tab, as shown in Figure [5-6](#332054_4_En_5_Chapter.xhtml#Fig6).\n\
    \n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig6_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Fig6_HTML.jpg)\n\
    \n**Figure 5-6.** Once you extract the filename, you can generate the page title\
    \ dynamically.\n\n3.  What if you prefer an initial capital letter for the part\
    \ of the title derived from the filename? PHP has a neat little function called\
    \ `ucfirst()`, which does exactly that (`uc` stands for “uppercase”). Add another\
    \ line to the code in step 2, like this:\n\n```\n<?php\n$title = basename($_SERVER['SCRIPT_FILENAME'],\
    \ '.php');\n$title = ucfirst($title);\n```\n\nThis might look confusing if you’re\
    \ new to programming, so let’s examine what’s going on here. The first line of\
    \ code after the PHP tag gets the filename, strips `.php` off the end, and stores\
    \ it as `$title`. The next line passes the value of `$title` to `ucfirst()` to\
    \ capitalize the first letter and stores the result back in `$title`. So, if the\
    \ filename is `contact.php`, `$title` starts out as `contact`, but by the end\
    \ of the following line, it has become `Contact`.\n\n**Tip**\nYou can shorten\
    \ the code by combining both lines into one, like this: `$title = ucfirst(basename($_SERVER['SCRIPT_FILENAME'],\
    \ '.php'));`. When you nest functions like this, PHP processes the innermost one\
    \ first and passes the result to the outer function. It makes your code shorter,\
    \ but it’s not so easy to read.\n\n1.  A drawback with this technique is that\
    \ filenames consist of only one word—at least they should. Spaces are not allowed\
    \ in URLs, which is why some web design software or the browser replaces spaces\
    \ with `%20`, which looks ugly and unprofessional in a URL. You can get around\
    \ this problem by using an underscore.\n\nChange the filename of `contact.php`\
    \ to `contact_us.php`.\n\n2.  Amend the code in `title.php` like this:\n\n```\n\
    <?php\n$title = basename($_SERVER['SCRIPT_FILENAME'], '.php');\n$title = str_replace('_',\
    \ ' ', $title);\n$title = ucwords($title);\n```\n\nThe middle line uses a function\
    \ called `str_replace()` to look for every underscore and replace it with a space.\
    \ The function takes three arguments: the character(s) you want to replace, the\
    \ replacement character(s), and the string you want to change.\n\n**Tip**\nYou\
    \ can also use `str_replace()` to remove character(s) by using an empty string\
    \ (a pair of quotes with nothing between them) as the second argument. This replaces\
    \ the string in the first argument with nothing, effectively removing it.\n\n\
    Instead of `ucfirst()`, the final line of code uses the related function `ucwords()`,\
    \ which gives each word an initial cap.\n\n1.  Save `title.php` and load the renamed\
    \ `contact_us.php` into a browser. Figure [5-7](#332054_4_En_5_Chapter.xhtml#Fig7)\
    \ shows the result.\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig7_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Fig7_HTML.jpg)\n\
    \n**Figure 5-7.** The underscore has been removed, and both words have been given\
    \ initial caps.\n\n2.  Change the name of the file back to `contact.php` and reload\
    \ the file into a browser. The script in `title.php` still works. There are no\
    \ underscores to replace, so `str_replace()` leaves the value of `$title` untouched,\
    \ and `ucwords()` converts the first letter to uppercase, even though there’s\
    \ only one word.\n\n3.  Repeat steps 3 and 4 with `index.php`, `blog.php`, and\
    \ `gallery.php`.\n\n4.  The home page of the Japan Journey site is called `index.php`.\
    \ As Figure [5-8](#332054_4_En_5_Chapter.xhtml#Fig8) shows, applying the current\
    \ solution to this page doesn’t seem quite right.\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig8_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Fig8_HTML.jpg)\n\
    \n**Figure 5-8.** Generating the page title from `index.php` produces an unsatisfactory\
    \ result.\n\nThere are two solutions: either don’t apply this technique to such\
    \ pages or use a conditional statement (an `if` statement) to handle special cases.\
    \ For instance, to display Home instead of Index, amend the code in `title.php`\
    \ like this:\n\n```\n<?php\n$title = basename($_SERVER['SCRIPT_FILENAME'], '.php');\n\
    $title = str_replace('_', ' ', $title);\nif ($title == 'index') {\n    $title\
    \ = 'home';\n}\n$title = ucwords($title);\n```"
