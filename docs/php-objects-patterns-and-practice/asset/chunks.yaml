- fmt: '# Subclassing Exception


    You can create classes that extend the `Exception` class as you would with any
    user-defined class. There are two reasons why you might want to do this. First,
    you can extend the class’s functionality. Second, the fact that a derived class
    defines a new class type can aid error handling in itself.


    You can, in fact, define as many `catch` clauses as you need for a `try` statement.
    The particular `catch` clause invoked will depend on the type of the thrown exception
    and the class type hint in the argument list. Here are some simple classes that
    extend `Exception`:


    ```php

    // listing 04.61

    class XmlException extends \Exception

    {

    private $error;

    public function __construct(\LibXmlError $error)

    {

    $shortfile = basename($error->file);

    $msg = "[{$shortfile}, line {$error->line}, col {$error->column}] {$error->message}";

    $this->error = $error;

    parent::__construct($msg, $error->code);

    }

    public function getLibXmlError()

    {

    return $this->error;

    }

    }

    // listing 04.62

    class FileException extends \Exception

    {

    }

    // listing 04.63

    class ConfException extends \Exception

    {

    }

    ```


    The `LibXmlError` class is generated behind the scenes when `SimpleXml` encounters
    a broken XML file. It has `$message` and `$code` properties, and it resembles
    the `Exception` class. I take advantage of this similarity and use the `LibXmlError`
    object in the `XmlException` class. The `FileException` and `ConfException` classes
    do nothing more than subclass `Exception`. I can now use these classes in my code
    and amend both `__construct()` and `write()`:


    ```php

    // listing 04.64

    // Conf class...

    function __construct(string $file)

    {

    $this->file = $file;

    if (! file_exists($file)) {

    throw new FileException("file ''$file'' does not exist");

    }

    $this->xml = simplexml:load_file($file, null, LIBXML_NOERROR);

    if (! is_object($this->xml)) {

    throw new XmlException(libxml:get_last_error());

    }

    $matches = $this->xml->xpath("/conf");

    if (! count($matches)) {

    throw new ConfException("could not find root element: conf");

    }

    }

    function write()

    {

    if (! is_writeable($this->file)) {

    throw new FileException("file ''{$this->file}'' is not writeable");

    }

    file_put_contents($this->file, $this->xml->asXML());

    }

    ```


    `__construct()` throws either an `XmlException`, a `FileException`, or a `ConfException`,
    depending on the kind of error it encounters. Note that I pass the option flag
    `LIBXML_NOERROR` to `simplexml:load_file()`. This suppresses warnings, leaving
    me free to handle them with my `XmlException` class after the fact. If I encounter
    a malformed XML file, I know that an error has occurred because `simplexml:load_file()`
    won’t have returned an object. I can then access the error using `libxml:get_last_error()`.


    The `write()` method throws a `FileException` if the `$file` property points to
    an unwritable entity.


    So, I have established that `__construct()` might throw one of three possible
    exceptions. How can I take advantage of this? Here’s some code that instantiates
    a `Conf` object:


    ```php

    // listing 04.65

    public static function init()

    {

    try {

    $conf = new Conf(__DIR__."/conf.broken.xml");

    print "user: " . $conf->get(''user'') . "\n";

    print "host: " . $conf->get(''host'') . "\n";

    $conf->set("pass", "newpass");

    $conf->write();

    } catch (FileException $e) {

    // permissions issue or non-existent file

    } catch (XmlException $e) {

    // broken xml

    } catch (ConfException $e) {

    // wrong kind of XML file

    } catch (\Exception $e) {

    // backstop: should not be called

    }

    }

    ```


    I provide a `catch` clause for each class type. The clause invoked depends on
    the exception type thrown. The first to match will be executed, so remember to
    place the most generic type at the end and the most specialized at the start.
    For example, if you were to place the `catch` clause for `Exception` ahead of
    the clause for `XmlException` and `ConfException`, neither of these would ever
    be invoked. This is because both of these classes belong to the `Exception` type,
    and would therefore match the first clause.


    The first `catch` clause (`FileException`) is invoked if there is a problem with
    the configuration file (if the file is nonexistent or unwriteable). The second
    clause (`XmlException`) is invoked if an error occurs in parsing the XML file
    (e.g., if an element is not closed). The third clause (`ConfException`) is invoked
    if a valid XML file does not contain the expected root `conf` element. The final
    clause (`Exception`) should not be reached because my methods only generate the
    three exceptions, which are explicitly handled. It is often a good idea to have
    a “backstop” clause like this, in case you add new exceptions to the code during
    development.


    **Note**: If you do provide a “backstop” catch clause, you should ensure that
    you actually do something about the exception in most instances—failing silently
    can cause bugs which are hard to diagnose.


    The benefit of these fine-grained `catch` clauses is that they allow you to apply
    different recovery or failure mechanisms to different errors. For example, you
    may decide to end execution, log the error and continue, or explicitly rethrow
    an error:


    ```php

    try {

    //...

    } catch ( FileException $e ) {

    throw $e;

    }

    ```


    Another trick you can play here is to throw a new exception that wraps the current
    one. This allows you to stake a claim to the error and add your own contextual
    information, while retaining the data encapsulated by the exception you have caught.
    You can read more about this technique in Chapter [15](#A314621_5_En_15_Chapter.html).


    So what happens if an exception is not caught by client code? It is implicitly
    rethrown, and the client’s own calling code is given the opportunity to catch
    it. This process continues either until the exception is caught or until it can
    no longer be thrown. At this point, a fatal error occurs. Here’s what would happen
    if I did not catch one of the exceptions in my example:


    ```

    PHP Fatal error:  Uncaught exception ''FileException'' with message

    ''file ''nonexistent/not_there.xml'' does not exist'' in ...

    ```


    So, when you throw an exception, you force the client to take responsibility for
    handling it. This is not an abdication of responsibility. An exception should
    be thrown when a method has detected an error, but does not have the contextual
    information to be able to handle it intelligently. The `write()` method in my
    example knows when the attempt to write will fail, and it knows why, but it does
    not know what to do about it. This is as it should be. If I were to make the `Conf`
    class more knowledgeable than it currently is, it would lose focus and become
    less reusable.'
  raw: '#### Subclassing Exception


    You can create classes that extend the `Exception` class as you would with any
    user-defined class. There are two reasons why you might want to do this. First,
    you can extend the class’s functionality. Second, the fact that a derived class
    defines a new class type can aid error handling in itself.


    You can, in fact, define as many `catch` clauses as you need for a `try` statement.
    The particular `catch` clause invoked will depend on the type of the thrown exception
    and the class type hint in the argument list. Here are some simple classes that
    extend `Exception`:


    ```

    // listing 04.61

    class XmlException extends \Exception

    {

    private $error;

    public function __construct(\LibXmlError $error)

    {

    $shortfile = basename($error->file);

    $msg = "[{$shortfile}, line {$error->line}, col {$error->column}] {$error->message}";

    $this->error = $error;

    parent::__construct($msg, $error->code);

    }

    public function getLibXmlError()

    {

    return $this->error;

    }

    }

    // listing 04.62

    class FileException extends \Exception

    {

    }

    // listing 04.63

    class ConfException extends \Exception

    {

    }

    ```


    The `LibXmlError` class is generated behind the scenes when `SimpleXml` encounters
    a broken XML file. It has `$message` and `$code` properties, and it resembles
    the `Exception` class. I take advantage of this similarity and use the `LibXmlError`
    object in the `XmlException` class. The `FileException` and `ConfException` classes
    do nothing more than subclass `Exception`. I can now use these classes in my code
    and amend both `__construct()` and `write()`:


