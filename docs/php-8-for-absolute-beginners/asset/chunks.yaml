    \ database\nfrom the menu at the left side of the phpMyAdmin control panel\n.\n\
    \n```\nCREATE TABLE blog_entry (\nentry_id INT NOT NULL AUTO_INCREMENT,\ntitle\
    \ VARCHAR( 150 ),\nentry_text TEXT,\ndate_created TIMESTAMP DEFAULT CURRENT_TIMESTAMP,\n\
    PRIMARY KEY ( entry_id )\n)\n```\n\nWe can enter the preceding code in the SQL\
    \ window. Alternatively, we\ncan use the create table text boxes provided by phpMyAdmin\
    \ after\nselecting the database. If you choose to enter the values using the text\n\
    boxes, make sure all information entered is the same as what is provided\nin the\
    \ preceding code.\nThe `title`\nattribute has a new data type: `VARCHAR(150)`.\
    \ As a\nconsequence, any title must contain `CHAR`acters of `VAR`iable length.\
    \ Blog\nentry titles can be a string of characters between 0 and 150 characters\n\
    long. If we insert a title that is 151 characters long, only the first\n150 characters\
    \ would be saved in the `blog_entry` table. The\ndatabase has ensured that our\
    \ value entered is valid before it is\nsaved.\nThe `date_created`\nattribute is\
    \ also declared with a new data type: `TIMESTAMP`. A `TIMESTAMP` holds\nprecise\
    \ information about a moment in time. It stores *year*,\n*month*, *day*, *hour*,\
    \ *minute*, and\n*second* as YYYY-MM-DD HH:MM:SS.\nWe have already discussed using\
    \ default values in our MySQL tables.\nHere, it is used again for the `date_created`\n\
    attribute. When a new entry is inserted for the first time,\nMySQL/MariaDB will\
    \ automatically store the current `TIMESTAMP` based on\nthe server’s clock. The\
    \ server clock will be based on the time zone in\nwhich the server is located.\n\
    \nPlanning the PHP Scripts\nOur next logical step is to create  a blog entry\n\
    editor, so that we can create new blog entries. This blog entry editor\nis only\
    \ meant for the blog author. Ordinary site visitors will not be\nable to create\
    \ new entries. Normal site visitors should simply see the\nblog entries, without\
    \ being able to edit existing entries or create new\nones.\nOne approach to such\
    \ a task is to create two main site entrances:\n`index.php` for\nregular visitors\
    \ and `admin.php`. In MVC\nterminology, `index.php` and `admin.php` will both\n\
    be  *front\ncontrollers* . In a later chapter, we will learn how to\nrestrict\
    \ access to `admin.php`, with a\nlogin.\nThe admin page will list all blog entries,\
    \ and provide access to the\nentry editor, to create new entries and edit or delete\
    \ existing entries.\nThis will require separate views: one for listing all entries\
    \ and one\nfor showing the editor.\n\nThe program `admin.php` will\ndisplay an\
