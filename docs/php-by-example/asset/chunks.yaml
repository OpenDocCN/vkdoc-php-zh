    operator returns a result). The `print("$a $b")` command displays the values of
    these variables in the console. Assume that the `$a` variable contains the last
    but one number in the sequence, and the `$b` variable contains the last calculated
    value in the sequence. The calculation process is implemented using the loop statement.
    There, the `$k` variable runs from `3` (because the first two numbers are already
    known) to the value of the `$n` variable (the count of numbers to be calculated
    in the sequence). In the body of the loop statement, the `$b=$a+$b` and `$a=$b-$a`
    commands calculate a new number in the sequence.


    | Details |

    | --- |

    | Let’s discuss how to calculate the numbers. Suppose that `$a` and `$b` contain
    respectively the last but one and the last number in the Fibonacci sequence. Let’s
    formally denote the value of the `$a` variable as ∆ and the value of the `$b`
    variable as □. You need to do the "next step": the `$b` variable should contain
    the value ∆+□, and the `$a` variable should contain the value □.After executing
    the `$b=$a+$b` command, `$b` contains the value ∆+□, and `$a` contains the original
    value ∆. To write the value □ to the `$a` variable, you need to execute the `$a=$b-$a`
    command. |


    After the next number in the sequence is calculated and saved to the `$b` variable,
    the `print(" ".$b)` command displays it in the console.


    ![](images/613529_1_En_3_Chapter/613529_1_En_3_Figm_HTML.jpg)An information icon.Note


    It is worth mentioning that the distribution of commands in the blocks of the
    `for` loop statement is somewhat arbitrary. For example, commands from the body
    of the loop statement can be moved to the third block, and commands from the third
    block can be moved to the main body of the loop statement as long as the commands
    are executed in the same order.'
