- fmt: '# 关系数据库中的表关联与外部键


    ## 主键、外键与关系类型


    正如你已经了解到的，主键必须是唯一的。因此，在`1:n`关系中，你需要将关系`1`方表中的主键（**主表**或**父表**）作为外键存储在关系`n`方表（**从表**或**子表**）中。在这种情况下，`images`表中的`image_id`需要作为外键存储在`blog`表中。


    关于`1:n`关系，需要理解的重要一点是：它实际上也是一系列`1:1`关系的集合。从右向左阅读图[17-2](#332054_4_En_17_Chapter.xhtml#Fig2)，每篇文章都与一张图片存在一对一的关系。如果没有这种一对一关系，你将无法确定哪张图片与特定文章相关联。


    ## 多对多关系


    如果希望每篇文章关联多张图片，该怎么办？你可以在`blog`表中创建多个列来存储外键，但这很快就会变得难以管理。你可能从`image1`、`image2`和`image3`开始，但如果大多数文章只有一张图片，那么大部分时候两列都是冗余的。而且，你是否要为那篇需要四张图片的特殊文章再添加一列呢？


    当需要处理**多对多**（或`n:m`）关系时，你需要采用不同的方法。`images`和`blog`表中的记录不足以演示`n:m`关系，但你可以添加一个`categories`表来标记单篇文章。大多数文章可能属于多个分类，而每个分类又可能与多篇文章相关联。


    解决复杂关系的方法是使用**交叉引用表**（有时称为**链接表**），它建立了相关记录之间的一系列一对一关系。这是一个特殊的表，只包含两列，且这两列都被声明为联合主键。图[17-3](#332054_4_En_17_Chapter.xhtml#Fig3)展示了其工作原理。交叉引用表中的每条记录都存储了`blog`表和`categories`表中单篇文章与分类之间的关系细节。要查找所有属于`Kyoto`分类的文章，你在`categories`表中将`cat_id
    1`与交叉引用表中的`cat_id 1`进行匹配，从而确定`blog`表中`article_id`为`2`、`3`和`4`的记录与`Kyoto`相关联。


    ![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig3_HTML.jpg](images/332054_4_En_17_Chapter/332054_4_En_17_Fig3_HTML.jpg)


    **图 17-3.** 交叉引用表将多对多关系分解为`1:1`关系


    ## 引用完整性


    通过外键建立表之间的关系，对你更新和删除记录的方式有重要影响。如果不小心，就会产生断开的链接。确保依赖关系不被破坏，这被称为维护**引用完整性**。我们将在下一章讨论这个重要主题。首先，让我们专注于检索存储在通过外键关系连接的独立表中的信息。


    ## 将图片链接到文章


    为了演示如何操作多个表，让我们从图[17-1](#332054_4_En_17_Chapter.xhtml#Fig1)和图[17-2](#332054_4_En_17_Chapter.xhtml#Fig2)中概述的简单场景开始：这些关系可以通过将一个表（父表）的主键作为外键存储在第二个表（子表或从表）中来解析为`1:1`关系。这需要在子表中添加一个额外的列来存储外键。


    ### 修改现有表结构


    理想情况下，你应该在填充数据之前设计好数据库结构。然而，关系型数据库（如MySQL）足够灵活，允许你在表已经包含记录时添加、删除或修改列。要将图片关联到`phpsols`数据库中的单篇文章，你需要在`blog`表中添加一个额外的列来存储`image_id`作为外键。


    ## PHP 解决方案 17-1：向表中添加额外列


    本 PHP 解决方案演示了如何使用 phpMyAdmin 向现有表添加额外列。假设你已经在第[15](#332054_4_En_15_Chapter.xhtml)章中在`phpsols`数据库中创建了`blog`表。


    1. 在 phpMyAdmin 中，选择`phpsols`数据库，然后点击`blog`表的`Structure`链接。


    2. 在`blog`表结构下方，有一个表单允许你添加额外列。你只需要添加一列，因此`Add column(s)`文本框中的默认值是可以的。通常的做法是将外键放在表的主键之后，所以从下拉菜单中选择`after
    article_id`，如下面的截图所示。然后点击`Go`。


    ![../images/332054_4_En_17_Chapter/332054_4_En_17_Figa_HTML.jpg](images/332054_4_En_17_Chapter/332054_4_En_17_Figa_HTML.jpg)


    3. 这将打开定义列属性的屏幕。请使用以下设置：


    *   名称：`image_id`

    *   类型：`INT`

    *   属性：`UNSIGNED`

    *   Null：已选中

    *   索引：`INDEX`（在弹出模态对话框中无需命名）


    *不要*选中`A_I`（`AUTO_INCREMENT`）复选框。你不需要`image_id`自动递增。其值将从`images`表中插入。


    `Null`复选框已被选中，因为并非所有文章都会关联图片。点击`Save`。


    4. 选择`Structure`选项卡，检查`blog`表结构现在是否如下所示：


    ![../images/332054_4_En_17_Chapter/332054_4_En_17_Figb_HTML.jpg](images/332054_4_En_17_Chapter/332054_4_En_17_Figb_HTML.jpg)


    5. 如果点击屏幕左上角的`Browse`选项卡，你会看到每条记录中`image_id`的值都是NULL。现在的挑战是如何在不手动查找编号的情况下插入正确的外键。我们将在下一步解决这个问题。


    ## 向表中插入外键


    向另一个表插入外键的基本原理相当简单：你查询数据库，找到要链接到另一个表的记录的主键。然后，你可以使用`INSERT`或`UPDATE`查询将外键添加到目标记录中。


    为演示基本原理，你将改编第[15](#332054_4_En_15_Chapter.xhtml)章中的更新表单，添加一个下拉菜单，列出`images`表中已注册的图片（见图[17-4](#332054_4_En_17_Chapter.xhtml#Fig4)）。


    ![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig4_HTML.jpg](images/332054_4_En_17_Chapter/332054_4_En_17_Fig4_HTML.jpg)


    **图 17-4.** 动态生成的下拉菜单插入正确的外键


    该菜单由一个循环动态生成，该循环显示`SELECT`查询的结果。每张图片的主键存储在`<option>`标签的`value`属性中。当表单提交时，选中的值会被合并到`UPDATE`查询中作为外键。


    ## PHP 解决方案 17-2：添加 image 外键（MySQLi）


    本 PHP 解决方案演示了如何通过向`blog`表更新记录来添加选中图片的主键作为外键。它改编自第[15](#332054_4_En_15_Chapter.xhtml)章中的`admin/blog_update_mysqli.php`。请使用你在第[15](#332054_4_En_15_Chapter.xhtml)章中创建的版本。或者，将`ch15`文件夹中的`blog_update_mysqli_03.php`复制到`admin`文件夹，并从文件名中移除`_03`。'
  raw: "As you have already learned, a primary key must be unique. So, in a\n`1:n`\n\
    relationship, you store the primary key from the table on the `1` side of the\n\
    relationship (the **primary** or **parent\ntable** )\nas a foreign key in the\
    \ table on the `n` side (the\n**secondary** or **child table** ). In this case,\
    \ the\n`image_id` from\nthe `images`\ntable needs to be stored as a foreign key\
    \ in the `blog` table. What’s\nimportant to understand about a `1:n` relationship\
    \ is\nthat it’s also a collection of `1:1` relationships.\nReading Figure [17-2](#332054_4_En_17_Chapter.xhtml#Fig2)\
    \ from right to\nleft, each article has a relationship with a single image. Without\
    \ this\none-on-one relationship, you wouldn’t be able to identify which image\
    \ is\nassociated with a particular article.\nWhat happens if you want to associate\
    \ more than one image to each\narticle? You could create several columns in the\
    \ `blog` table to hold\nthe foreign keys, but this rapidly becomes unwieldy. You\
    \ might start off\nwith `image1`,\n`image2`, and\n`image3`, but if\nmost articles\
    \ have only one image, two columns are redundant much of the\ntime. And are you\
    \ going add an extra column for that extra-special\narticle that requires four\
    \ images?\nWhen faced with the need to accommodate  **many-to-many**\n (or **n:m**)\
    \ relationships, you need a different\napproach. The `images` and `blog` tables\
    \ don’t\ncontain sufficient records to demonstrate `n:m` relationships,\nbut you\
    \ could add a `categories` table to\ntag individual articles. Most articles are\
    \ likely to belong to multiple\ncategories, and each category will be related\
    \ with several articles.\n\nThe way to resolve complex relationships is through\
    \ a  **cross-reference\ntable**  (sometimes called a  **linking table**\n), which\
    \ establishes a series of one-to-one relationships between\nrelated records. This\
    \ is a special table containing just two columns,\nboth of which are declared\
    \ a joint primary key. Figure [17-3](#332054_4_En_17_Chapter.xhtml#Fig3) shows\
    \ how this\nworks. Each record in the cross-reference table stores details of\
    \ the\nrelationship between individual articles in the `blog` and `categories`\
    \ tables. To\nfind all articles that belong to the `Kyoto` category, you\nmatch\
    \ `cat_id 1`\nin the `categories` table with\n`cat_id 1` in the\ncross-reference\
    \ table. This identifies the records in the `blog` table with the\n`article_id\
    \ 2`,\n`3`, and `4` as being associated\nwith `Kyoto`.\n\n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig3_HTML.jpg](images/332054_4_En_17_Chapter/332054_4_En_17_Fig3_HTML.jpg)\n\
    \nFigure 17-3.\nA cross-reference table resolves many-to-many relationships as\n\
    1:1\n\nEstablishing relationships between tables through foreign keys has\nimportant\
    \ implications for how you update and delete records. If you’re\nnot careful,\
    \ you end up with broken links. Ensuring that dependencies\naren’t broken is known\
    \ as maintaining  **referential\nintegrity** . We’ll tackle this important subject\
    \ in the\nnext chapter. First, let’s concentrate on retrieving information stored\n\
    in separate tables linked through a foreign-key relationship.\n\nLinking an Image\
    \ to an Article\nTo demonstrate how to work with multiple tables, let’s begin\
    \ with the\nstraightforward scenarios outlined in Figures [17-1](#332054_4_En_17_Chapter.xhtml#Fig1)\
    \ and [17-2](#332054_4_En_17_Chapter.xhtml#Fig2): relations\nthat can be resolved\
    \ as `1:1` through the\nstorage of the primary key from one table (the parent\
    \ table) as a\nforeign key in a second table (the child or dependent table). This\n\
    involves adding an extra column in the child table to store the foreign\nkey.\n\
    \nAltering the structure of an Existing table\nIdeally, you should design your\
    \ database structure before populating\nit with data. However, relational databases,\
    \ such as\nMySQL, are flexible enough to let you add, remove, or change columns\
    \ in\ntables even when they already contain records. To associate an image\nwith\
    \ individual articles in the `phpsols` database, you\nneed to add an extra column\
    \ to the `blog` table to store\n`image_id` as a\nforeign key.\n\nPHP Solution\
    \ 17-1: Adding an Extra column to\na Table\n\nThis PHP solution shows how to add\
    \ an extra column to an existing\ntable using phpMyAdmin. It assumes that you\
    \ created the `blog` table in the\n`phpsols`\ndatabase in Chapter [15](#332054_4_En_15_Chapter.xhtml).\n\
    \n1.  In phpMyAdmin, select the `phpsols` database and\n    click the `Structure`\
    \ link for\n    the `blog`\n    table.\n\n2.  Below the `blog` table structure\n\
    \    is a form that allows you to add extra columns. You want to add only one\n\
    \    column, so the default value in the `Add column(s)` text\n    box is fine.\
    \ It’s normal practice to put foreign keys immediately after\n    the table’s\
    \ primary key, so select `after article_id` from\n    the drop-down menu, as shown\
    \ in the following screenshot. Then click\n    `Go`.\n\n![../images/332054_4_En_17_Chapter/332054_4_En_17_Figa_HTML.jpg](images/332054_4_En_17_Chapter/332054_4_En_17_Figa_HTML.jpg)\n\
    \n3.  This opens the screen for you to define column attributes. Use the\n   \
    \ following settings:\n\n*   Name: `image_id`\n\n*   Type: `INT`\n\n*   Attributes:\
    \ `UNSIGNED`\n\n*   Null: Selected\n\n*   Index: `INDEX` (there’s no\n       \
    \ need to give it a name in the modal dialog that pops up)\n\nDo *not* select\
    \ the `A_I` (`AUTO_INCREMENT`) check\n    box. You don’t want `image_id` to be\n\
    \    incremented automatically. Its value will be inserted from the `images` table.\n\
    \nThe `Null`\n    check box has been selected because not all articles will be\
    \ associated\n    with an image. Click `Save`.\n\n4.  Select the `Structure` tab\
    \ and\n    check that the `blog` table structure\n    now looks like this:\n\n\
    ![../images/332054_4_En_17_Chapter/332054_4_En_17_Figb_HTML.jpg](images/332054_4_En_17_Chapter/332054_4_En_17_Figb_HTML.jpg)\n\
    \n1.  If you click the `Browse` tab at the top\n    left of the screen, you will\
    \ see that the value of `image_id` is NULL in\n    each record. The challenge\
    \ now is to insert the correct foreign keys\n    without the need to look up the\
    \ numbers manually. We’ll tackle that\n    next.\n\nInserting a Foreign Key in\
    \ a table\nThe basic principle behind\ninserting a foreign key in another table\
    \ is quite simple: you query the\ndatabase to find the primary key of the record\
    \ that you want to link to\nthe other table. You can then use an `INSERT` or `UPDATE`\
    \ query to add\nthe foreign key to the target record.\n\nTo demonstrate the basic\
    \ principle, you’ll adapt the update form from\nChapter [15](#332054_4_En_15_Chapter.xhtml)\
    \ to add a drop-down menu that\nlists images already registered in the images\
    \ table (see Figure [17-4](#332054_4_En_17_Chapter.xhtml#Fig4)).\n\n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig4_HTML.jpg](images/332054_4_En_17_Chapter/332054_4_En_17_Fig4_HTML.jpg)\n\
    \nFigure 17-4.\nA dynamically generated drop-down menu inserts the appropriate\n\
    foreign key\n\nThe menu is dynamically generated by a loop that displays the results\n\
    of a `SELECT`\nquery. Each image’s primary key is stored in the `value` attribute\
    \ of\nthe `<option>` tag.\nWhen the form is submitted, the selected value is incorporated\
    \ into the\n`UPDATE` query as\nthe foreign key.\n\nPHP Solution 17-2: Adding the\
    \ image Foreign Key\n(MySQLi)\n\nThis PHP solution shows how to update records\
    \ in the `blog` table  by adding the primary\nkey of a selected image as a foreign\
    \ key. It adapts `admin/blog_update_mysqli.php`\nfrom Chapter [15](#332054_4_En_15_Chapter.xhtml).\
    \ Use the version that you created\nin Chapter [15](#332054_4_En_15_Chapter.xhtml).\
    \ Alternatively, copy `blog_update_mysqli_03.php`\nfrom the `ch15`\nfolder to\
    \ the `admin` folder and\nremove `_03` from\nthe filename."
