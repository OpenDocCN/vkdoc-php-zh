  \ $col['column_type'];\n            }\n            $rs1->close();\n        }\n \
  \       $rs->close();\n        print_r($this->schema);\n    }\n}\n\n$music = new\
  \ music();\n```\n\n`addArtist()` 和 `addAlbum()` 方法也被重构，以使用通用的模式定义。\n\n```php\nif\
  \ (sizeof($columns)) {\n    $sql = \"update $table set \" . implode(\", \", $columns)\
  \ .\n           \" where id = $id;\";\n    $this->Query($sql);\n}\n}\n\nfunction\
  \ updateArtist($id, $data = []) {\n    $this->update(\"artist\", $this->schema['artist'],\
  \ $id, $data);\n}\n\nfunction updateAlbum($id, $data = []) {\n    $this->update(\"\
  album\", $this->schema['album'], $id, $data);\n}\n\nprivate function deleteRow($table,\
  \ $id) {\n    $sql = \"delete from $table where id = \" . (int)$id . \";\";\n  \
  \  $this->Query($sql);\n}\n\nfunction deleteArtist($id) {\n    $sql = \"update album\
  \ set artist_id=NULL where id = \" . (int)$id . \";\";\n    $this->Query($sql);\n\
  \    $this->deleteRow(\"artist\", $id);\n}\n\nfunction deleteAlbum($id) {\n    $this->deleteRow(\"\
  album\", $id);\n}\n\nfunction getArtists() {\n    $artists = [];\n    $sql = \"\
  select * from artist\";\n    $result = $this->Query($sql);\n    if ($result) {\n\
  \        while($row = $result->fetch_assoc()) {\n            $artists[] = $row;\n\
  \        }\n        $result->close();\n    }\n    return $artists;\n}\n\nfunction\
  \ getAlbums($artist_id = null) {\n    $albums = [];\n    if ($artist_id) {\n   \
  \     $sql = \"select album.id, artist_id, artist_name, title from album, artist\
  \ where album.artist_id=artist.id and artist_id=$artist_id\";\n    } else {\n  \
  \      $sql = \"select album.id, artist_id, artist_name, title from album left outer\
  \ join artist on (album.artist_id=artist.id)\";\n    }\n    $result = $this->Query($sql);\n\
  \    if ($result) {\n        while($row = $result->fetch_assoc()) {\n          \
  \  $albums[] = $row;\n        }\n        $result->close();\n    }\n    return $albums;\n\
  }\n```\n\n\n\n"
