  raw: "Another solution is to precede each method (from the `Iterator` interface)\n\
    with the `#[\\ReturnTypeWillChange]`\nattribute.\nLet’s create the `Fibonacci`\
    \ class that\nimplements the `Iterator` interface.\nAn object of the class is\
    \ designed to generate a sequence of the\nFibonacci numbers (the first two numbers\
    \ are equal to one, and each next\nis equal to the sum of the previous two). The\
    \ class has the private\n`$last` and `$previous` fields that\nare supposed to\
    \ store the last and last but one number in the sequence.\nThe private field `$key`\
    \ is used to store\nthe key of the generated number. The `$max` field contains\n\
    the value that determines how many numbers are generated in the\nsequence.\nThe\
    \ constructor has a single argument that specifies the value of the\n`$max` field.\
    \ The\n`rewind()` method is called in the\nbody of the constructor. When the method\
    \ is called, the `$key`, `$previous`, and `$last` fields are\nassigned values.\n\
    When called, the `current()` method returns the\nvalue of the `$previous` field.\
    \ The\n`key()` method returns the\nvalue of the `$key` field.\nWhen the `next()`\
    \ method is called, due\nto the `++$this->key`\nstatement, the value of the `$key`\
    \ field is\nincremented by one. Next, the `$this->last+=$this->previous`\nand\
    \ `$this->previous=$this->last-$this->previous`\ncommands calculate the next number\
    \ in the sequence and update the values\nof the `$previous` and `$last` fields,\n\
    respectively.\n\nThe `valid()`\nmethod is used\n(automatically) to check that\
    \ the iterator is ready to generate a value.\nThe `$this->key<=$this->max`\ncondition\
    \ is checked in the method’s body. It is true if the current\nnumber key does\
    \ not exceed the maximum value set for the sequence. If\nso, the method returns\
    \ `true`. Otherwise, it\nreturns `false`.\n\nDetails |\n\n| --- | --- | --- |\n\
    \nYou need the `valid()` method\nto determine when the iteration of the elements\
    \ in the loop statement\nends. |\n\nIn addition to the “required” methods from\
    \ the `Iterator` interface,\nyou describe an “additional” `resize()` method for\
    \ changing the\nvalue of the `$max` field in an\nalready created iterator object.\n\
    An iterator object is created with the `$fibs=new Fibonacci(10)` command. The\
    \ object is designed to generate ten\nnumbers in the Fibonacci sequence. That\
    \ happens when you pass the `$fibs` iterator object\nto the `foreach`\nstatement.\n\
    The iterator object created can be\nused multiple times. To do that, it is enough\
    \ to put it to its original\nstate using the `rewind()` method.\nMoreover, you\
    \ can change the number of values generated by the iterator.\nSo, after executing\
    \ the `$fibs->resize(15)`\ncommand, the iterator object generates 15 numbers from\
    \ the sequence,\nwhich is confirmed by the program output.\n\nSummary\n\n*   An\
    \ iterator is an object\n    of a class that implements the `Iterator` interface.\n\
    \    Iterators are used to emulate sequences, and, in particular, they are\n \
    \   used in the `foreach` loop\n    statements.\n\n*   If you create a class and\
    \ implement methods of the `Iterator` interface in\n    that class, then an class\
    \ object can be used as a collection iterator in\n    the `foreach`\n    loop\
    \ statement.\n\n*   You can create functions that return a generator object as\
    \ a\n    result. A generator is an object of the `Generator` class that\n    implements\
    \ the `Iterator` interface.\n    To add a value to the list for generation, use\
    \ the `yield` statement\n    followed by the corresponding value.\n\n*   The `current()`\
    \ method is used to get\n    the current value of an iterator. To shift to the\
    \ next value to\n    generate, use the `next()` method. The `rewind()` method\
    \ puts an iterator\n    into the state to generate the first value. You can get\
    \ the key of the\n    generated element using the `key()` method. You can use\
    \ the\n    `valid()` method to check if an\n    iterator is ready.\n\n12. Using\
    \ PHP\n\n*Why must you needlessly complicate everything?*\n\n—*ALF* (TV series)\n\
    \nUnlike most other popular languages, PHP is not used “on its own.” It\nis used\
    \ “in a context.” PHP was developed for creating web programs or\nscripts. Accordingly,\
    \ PHP is designed for web programming. Next, let’s\nlook at some simple tasks\
    \ and situations that explain how PHP code can\nbe used in web development.\n\n\
    A Script in an HTML Document\nPerhaps the most straightforward situation is when\
    \ PHP code is\nincluded in a document with HTML markup. This approach is useful\
    \ when\nyou need to generate content for an HTML document automatically.\n\nTHE\
    \ HTML BASICS\n\nHTML (the acronym from the *Hypertext Markup Language*) is\n\
    used to create web pages. That is, in fact, plain text with unique\nmarkers or\
    \ descriptors, also called *tags*. Those tags are for\nthe browser that displays\
    \ the corresponding document. Namely, the tags\nare instructions for the browser\
    \ to display the actual text in the\ndocument.\n\nLet’s explore how to create\
