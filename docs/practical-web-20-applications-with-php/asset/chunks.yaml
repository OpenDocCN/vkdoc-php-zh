    **Summary**


    In this chapter, we primarily focused on creating a public page for each user
    that has registered in our web application. In order to create friendly URLs for
    user pages, we looked at how to create new request routes for Zend_Controller_Front.
    This meant that not only does each user have a short and simple URL for their
    home page, but each post within their blog has a short and simple URL also.


    Prior to doing this, we gave registered users the ability to customize various
    account settings. This was done in a manner that easily scales, since new settings
    can be added with only minor changes to code and no changes to the database. We
    also looked at how to set default account settings.


    After creating user home pages, we then implemented the application home page
    functionality. On this page we included posts that were recently submitted by
    all users who chose to have a public blog (using the settings-management system
    we implemented).


    In the next chapter, we will continue to expand the blog by implementing a number
    of Web 2.0 features, including adding tags to blog posts, formatting HTML using
    microformats, and creating web feeds for user blogs.


