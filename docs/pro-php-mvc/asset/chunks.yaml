    2. We began our time with Zend Framework by using the Command Line Interface to\
    \ create a project, yet most of the work we’ve done has been without the help\
    \ of the CLI. Why might this be?\n\n**Answers**\n\n1. Zend Framework (1.11) uses\
    \ underscores as namespace separators where PHP 5.3 namespaces are separated by\
    \ backslash characters. Zend Framework’s class libraries aren’t technically namespaced\
    \ in that they are all in the global namespace. Conflicts aren't likely to occur,\
    \ though, as Zend Framework’s class names tend to be verbose.\n2. While the CLI\
    \ provides a lot of helpful functionality, learning a framework has to be done\
