    ## 30. 异常处理


    PHP 5 引入了异常，这是一种内建机制，用于在程序失败发生的上下文中处理这些失败。与通常需要由开发者修复的错误不同，异常是由脚本处理的。它们代表一种非正常的运行时情况，这种情况应该被作为可能性提前预见，并且脚本应该能够自行处理。


    ### try-catch 语句


    要处理一个异常，必须使用 `try-catch` 语句将其捕获。该语句由一个 `try` 块（包含可能引发异常的代码）和一个或多个 `catch` 子句组成。


    ```php

    try

    {

    $div = invert(0);

    }

    catch (LogicException $e) {}

    ```


    如果 `try` 块成功执行，程序将继续在 `try-catch` 语句之后运行。然而，如果发生异常，执行流程将传递给第一个能够处理该异常类型的 `catch`
    块。


    ### 抛出异常


    当函数遇到无法恢复的情况时，它可以生成一个异常来向调用者表明函数执行失败。这是通过使用 `throw` 关键字，后面跟一个 `Exception` 类或其子类（如
    `LogicException`）的新实例来实现的。¹


    ```php

    function invert($x)

    {

    if ($x == 0)

    throw new LogicException(''除零错误'');

    return 1 / $x;

    }

    ```


    ### Catch 块


    在前面的例子中，`catch` 块被设置为处理内建的 `LogicException` 类型。如果 `try` 块中的代码可能抛出更多类型的异常，可以使用多个
    `catch` 块，从而以不同方式处理不同的异常。


    ```php

    catch (LogicException $e) {}

    catch (RuntimeException $e) {}

    // ...

    ```


    要捕获更具体的异常，需要将 `catch` 块放在更通用的异常之前。例如，`LogicException` 继承自 `Exception`，因此需要先捕获
    `LogicException`。


    ```php

    catch (LogicException $e) {}

    catch (Exception $e) {}

    ```


    `catch` 子句定义了一个异常对象。该对象可用于获取关于异常的更多信息，例如使用 `getMessage` 方法获取异常的描述。


    ```php

    catch (LogicException $e)

    {

    echo $e->getMessage(); // "除零错误"

    }

    ```


    ### Finally 块


    PHP 5.5 引入了 `finally` 块，它可以作为 `try-catch` 语句的最后一个子句添加。该块用于释放 `try` 块中分配的资源。无论是否发生异常，它都会执行。


    ```php

    $resource = myopen();

    try { myuse($resource); }

    catch(Exception $e) {}

    finally { myfree($resource); }

    ```


    ### 重新抛出异常


    有时异常无法在首次捕获的地方处理。这时可以使用 `throw` 关键字后跟异常对象将其重新抛出。


    ```php

    try { $div = invert(0); }

    catch (LogicException $e) { throw $e; }

    ```


    随后，异常会沿着调用栈向上传播，直到被另一个 `try-catch` 语句捕获。如果异常始终没有被捕获，且未定义未捕获异常处理器，它就会变成一个 `E_ERROR`
    级别的错误，从而终止脚本。


    ### 未捕获异常处理器


    `set_exception_handler` 函数允许捕获任何未被捕获的异常。它接受一个参数，即针对此类事件触发的回调函数。


    ```php

    set_exception_handler(''myException'');

    ```


    该回调函数只需要一个参数，即被抛出的异常对象。


    ```php

    function myException($e)

    {

    $file = ''exceptionlog.txt'';

    file_put_contents($file,$e->getMessage(),FILE_APPEND);

    require_once(''my_error_page.php'');

    exit;

    }

    ```'
- fmt: 'Because this exception handler is called outside the context where the exception
    occurred, recovering from the exception would be difficult. Instead, this example
    handler writes the exception to a log file and displays an error page. To stop
    further execution of the script, the built-in `exit` construct is used. It is
    synonymous with the `die` construct and optionally takes a string argument that
    is printed before the script is halted.


    ## Errors and Exceptions


    Whereas exceptions are thrown with the intention of being handled by the script,
    errors are generated to inform the developer that there is a mistake in the code.
    When it comes to problems that occur at run-time, the exception mechanism is generally
    considered superior. However, since it was not introduced until PHP 5, all internal
    functions still use the error mechanism. For user-defined functions, the developer
    is free to choose either mechanism. Keep in mind that errors cannot be caught
    by `try-catch` statements. Likewise, exceptions do not trigger error handlers.


    ## Footnotes


    [`http://www.php.net/manual/en/spl.exceptions.php`](http://www.php.net/manual/en/spl.exceptions.php)


    ## 31. Assertions


    Assert is a debugging feature that can be used during development to ensure that
    a condition is always true. Any expression can be asserted, as long as it evaluates
    to either `true` or `false`.


    ```

    // Make sure $myVar is set

    assert(isset($myVar));

    ```


    Code assertions like this help validate that there are no execution paths that
    break the specified assumption. If this occurs, a warning showing the file and
    line number of the assertion is displayed, which makes it easy to locate and fix
    the mistake in the code.


    ```

    Warning: assert(): Assertion failed in C:\xampp\htdocs\mypage.php on line 3

    ```


    A description of the assertion may be included, which is displayed if the assertion
    fails. Support for this second parameter was added in PHP 5.4.8.


    ```

    assert(isset($myVar), ''$myVar not set'');

    ```


    As of PHP 7, the second parameter can also be an exception object to be thrown
    if the assertion fails. By default, an `AssertionError` is thrown when an assertion
    fails.


    ```

    assert(false, new AssertionError(''Assert failed''));

    ```


    ### Assert Performance


    Assertions can be turned off using the `assert_options` function by setting the
    `ASSERT_ACTIVE` option to zero. This means that assertions do not need to be removed
    from the code after debugging is finished and the development code becomes production
    code.


    ```

    // Disable assertions

    assert_options(ASSERT_ACTIVE, 0);

    ```


    A condition passed to an assertion is always evaluated, even if assertions are
    turned off. To avoid this extra overhead in production code, the condition can
    be passed as a string instead, which is then evaluated by `assert`.


    ```

    assert(''isset($myVar)'');

    ```


    Passing the condition as a string has the added benefit of including the string
    in the warning shown when the assertion fails.


    ```

    Warning: assert(): Assertion "isset($myVar)" failed in C:\xampp\htdocs\mypage.php
    on line 3

    ```


    In PHP 7, `assert` became a language construct, as opposed to a function, allowing
    for zero performance loss from including assertions in production code. The way
    to skip assertions completely in PHP 7 is to set the `zend.assertions` configuration
    directive to `-1` in the `php.ini` configuration file.


