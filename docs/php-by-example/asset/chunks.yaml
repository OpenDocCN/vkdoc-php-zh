    使用`echo power(3,4)`、`echo power(1.5,2.7)`和`echo power("2","10.1")`命令测试创建的函数。虽然这看起来有些奇怪，但三个命令都能正常运行，尽管传递给`power()`函数的参数类型与声明的类型不匹配。原因是默认情况下会启用自动类型转换。例如，第二个参数必须是整数类型。如果传入一个实数作为第二个参数，该实数的小数部分会被自动丢弃。如果传入一个包含数字的字符串作为参数，则该字符串会被转换为数字格式，以此类推。


    ![](img/613529_1_En_5_Figq_HTML.gif)铃铛图标。**PHP 8 标准**


    在 PHP 8 以上的版本中，执行`echo power(1.5,2.7)`和`echo power("2","10.1")`命令时会收到一个警告，提示从浮点数（浮点字符串）到整数的隐式转换已被弃用，因为这会导致精度丢失。


    如果你对这种代码执行结果不满意，可以切换到严格类型模式。为此，需要在程序中添加`declare(strict_types=1)`语句。


    ![](img/613529_1_En_5_Figh_HTML.jpg)包含字母 i 的信息图标。注意


    在上述程序中，该指令是一个注释（该行以`#`符号开头）。如果你想切换到严格类型模式，请删除相应行开头的`#`符号。


    如果这样做了，那么三条用于测试`power()`函数的指令中只有第一条能正确执行。尝试执行另外两条会导致错误。


    | 详情 |

    | --- |

    | 在`power(3,4)`语句中，第一个参数是整数，尽管相应的参数被声明为实数。在这种情况下，整数值会自动扩展为实数类型。值得注意的是，从数学角度来看，整数集是实数集的一个子集。
    |


    ![](img/613529_1_En_5_Figr_HTML.gif)铃铛图标。**PHP 8 标准**


    PHP 8 引入了定义联合类型的能力。在这种情况下，类型之间用竖线`|`作为分隔符列出。例如，表达式`int|string|double`表示相应的变量（函数参数或返回值）可以是`int`、`string`或`double`类型。


    此外，PHP 8 还引入了`mixed`类型，这是最广泛的联合类型。


    ## 参数传递机制


    来看看清单 5-4 中的程序。


    ```

    Listing 5-4

    按值传递参数

    ```


    以下是程序执行的结果。


    ```

    程序输出（来自清单 5-4）

    $A = 100 and $B = 200

    输入：参数 100 和 200

    输出：参数 200 和 100

    $A = 100 and $B = 200

    ```


    你在程序中创建了带有两个参数的`swap()`函数。调用该函数时，它会显示传递给函数的参数。然后，你尝试更改参数的值（第一个参数被赋值为第二个参数的值，第二个参数被赋值为第一个参数的值），并再次检查它们的值。


    使用了两个变量，`$A`和`$B`，其值分别为`100`和`200`。首先，检查这些变量的值。然后，将变量作为参数传递给`swap()`函数（使用`swap($A,$B)`命令）。接着，再次检查这些变量的值。


    程序的输出是什么？正如你所见，`$A`和`$B`变量没有改变它们的值。然而，在`swap()`函数体内对参数的第二次检查显示，参数的值被交换了。这到底意味着什么，又该如何理解这种情况？其实，一切都非常简单。你应该考虑到，当参数传递给函数时，函数获取的是传递给函数的变量的副本。换句话说，在执行`swap($A,$B)`命令时，传递给`swap()`函数的不是`$A`和`$B`变量本身，而是它们的副本。因此，在执行`swap()`函数的代码时，变量的副本交换了值。当函数执行完毕，参数的副本会从内存中移除，而`$A`和`$B`变量仍然保持它们先前的值。这种将参数传递给函数的机制是默认的，称为按值传递参数。除了按值传递参数，还可以按引用传递参数。在这种情况下，传递给函数的是参数的“原件”而不是副本。如果你想按引用传递参数，应该在函数声明中的参数名称前加上`&`指令。对先前程序的修改版，但这次是按引用将参数传递给`swap()`函数，如清单
    5-5 所示。


    ```

    Listing 5-5

    按引用传递参数

    ```


