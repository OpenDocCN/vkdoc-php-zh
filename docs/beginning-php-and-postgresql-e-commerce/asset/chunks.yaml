    \ 函数\n    CREATE FUNCTION catalog_flag_stop_words(TEXT[])\n    RETURNS SETOF SMALLINT\
    \ LANGUAGE plpgsql AS $$\n    DECLARE\n        inWords ALIAS FOR $1;\n       \
    \ outFlag SMALLINT;\n        query TEXT;\n    BEGIN\n        FOR i IN array_lower(inWords,\
    \ 1)..array_upper(inWords, 1) LOOP\n            SELECT INTO query\n          \
    \      to_tsquery(inWords[i]);\n            IF query = '' THEN\n             \
    \   outFlag := 1;\n            ELSE\n                outFlag := 0;\n         \
    \   END IF;\n            RETURN NEXT outFlag;\n        END LOOP;\n    END;\n \
    \   $$;\n    ```\n\n5.  使用查询工具执行以下代码，该代码将在您的 `hatshop` 数据库中创建 `catalog_count_search_result`\
    \ 函数：\n\n    ```sql\n    -- 函数返回与搜索字符串匹配的产品数量\n    CREATE FUNCTION catalog_count_search_result(TEXT[],\
    \ VARCHAR(3))\n    RETURNS INTEGER LANGUAGE plpgsql AS $$\n    DECLARE\n     \
    \   -- inWords 是一个数组，包含用户搜索字符串中的单词\n        inWords ALIAS FOR $1;\n        --\
    \ inAllWords 对于“全部词”搜索为 'on'\n        -- 对于“任意词”搜索为 'off'\n        inAllWords\
    \ ALIAS FOR $2;\n        outSearchResultCount INTEGER;\n        query TEXT;\n\
    \        search_operator VARCHAR(1);\n    BEGIN\n        -- 将查询初始化为空字符串\n    \
    \    query := '';\n        -- 确定在准备搜索字符串时要使用的运算符\n        IF inAllWords = 'on'\
