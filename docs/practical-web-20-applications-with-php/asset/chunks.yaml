    We then just need to add a rule to the screen media-type section of the style
    sheet that hides this logo when the user views the page in their browser.


    We also need to add rules to the print media-type section of the style sheet to
    hide the elements that we don’t want to print (the side columns and the navigation).
    The following code shows how this is achieved (ignoring the remainder of the style
    sheet for now).


    @media screen {


    #header img { display : none; }


    }


    @media print {


    #nav, #left-container, #right-container { display : none; }


    }


