    **90**


    C H A P T E R 7 ■ W O R K I N G W I T H C O N T R O L L E R S A N D M O D E L
    S


    • Articles that run through a wiki processor that turns content into HTML elements


    • Reader comments with community voting


    • Routes that create date-friendly URLs


    • An admin area where the site administrator can add stories


    • User management for multiple authors


    • Category sorting for organizing posts dynamically


    • A sitewide menu system for navigating through categories and articles Features
    such as these will not be too difficult to produce but will make full use of all
    the controllers, models, and views. In this tutorial, you’ll approach one feature
    at a time and build it into the application. Along the way, I’ll continue to explain
    important concepts for developing in Cake. First I’ll discuss controller actions
    in general, and then I’ll show how to build some custom actions.


    **Working with Actions**


    You have already built and worked with actions in Cake. In the following extensive
    blog application, you will build a host of actions, each for a specific function
    in the site. Rules for developing actions follow the pattern of typical PHP functions.


    In Listing 7-1, I’ve created a basic controller action named foo. Notice that
    it follows the typical function syntax in PHP. Controller actions behave somewhat
    differently from typical PHP functions, however. For instance, when the action
    is launched by Cake, it will also automatically render a corresponding view or
    produce an error. Only if the action is called by another action in the application
    will it be capable of returning a value without displaying a view.


    **Listing 7-1.** *A Basic Controller Action*


    function foo($bar = null) {


    $this->set(''output'',$bar);


    }


    **Using Variables in Actions**


    Passed function variables can be initiated and receive default values by naming
    and setting variables in the parentheses of the action. These variables are available
    throughout the action.


    Global variables, however, to be used by all actions in a controller can be created
    within the controller class as class attributes:


    var $myVar = ''Variable value'';


    Now, in any of the controller actions, I could use the $myVar attribute by placing
    $this-> before it:


    09775ch07final 7/1/08 9:46 PM Page 91


    C H A P T E R 7 ■ W O R K I N G W I T H C O N T R O L L E R S A N D M O D E L
    S


    **91**


    function foo($bar = null) {


    $bar = $this->myVar;


    $this->set(''output'',$bar);


    }


    Be sure when creating your own class attributes that they don’t conflict with
    other Cake properties like $scaffold or $helpers.


    Other local variables can be called within the action as in other PHP scripts:
    function foo() {


    $bar = ''hello world'';


    $this->set(''output'',$bar);


    }


    **Requesting Actions**


    In your Posts controller, suppose you needed to fetch a list of tags from the
    Tags controller.


    Conventionally, you do this through the model, especially since what you are trying
    to accomplish is a database query of some kind. But to illustrate how controller
    actions can talk to one another, let’s run this query through the controllers
    instead of the models.


    In the Posts controller in one of the actions, I could pass along a list of tags
    to the view by using the set() and requestAction() functions, like so:


    $this->set(''tags'',$this->requestAction(''/tags/getList''));


    The requestAction() function is pointing to the Tags controller’s getList() action,
    which hasn’t been produced yet. For the $tags variable in the Posts controller’s
    view to be formatted with data, the getList() action in the Tags controller will
    need to run a return of some data, *not* point to the view (which it will do by
    default). If you leave out a return in the getList() action, then the Tags controller
    will by default try to render a view in the app/views/tags directory named getlist.ctp.


    So, for this to work properly, the getList() action will need to look something
    like this: function getList() {


    return $this->Tag->find(''list'');


    }


    Sometimes there is just no way around using the requestAction() function. Most
    of the time, however, you should be able to use a component, model, or other element
    to navigate your code. When needing to launch another action with its views and
    everything else, use the redirect() function instead of requestAction(). Requesting
    actions as opposed to redirecting is reserved for performing logic in another
    controller and pulling its results to the current controller, not for simply launching
    another action elsewhere in the application. In short, the redirect() function
    causes another browser request and changes the URL, while requestAction() works
    internally to launch specific actions.


