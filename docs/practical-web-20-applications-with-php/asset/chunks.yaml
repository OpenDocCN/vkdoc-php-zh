    **Listing 8-3.** *The First Third of the GetPosts() Function (BlogPost.php)*


    <?php


    class DatabaseObject_BlogPost extends DatabaseObject


    {


    // ... other code


    **public static function GetPosts($db, $options = array())**


    **{**


    **// initialize the options**


    **$defaults = array(**


    **''offset'' => 0,**


    **''limit'' => 0,**


    **''order'' => ''p.ts_created''**


    **);**


    **foreach ($defaults as $k => $v) {**


    **$options[$k] = array_key_exists($k, $options) ? $options[$k] : $v;**


    **}**


    **$select = self::_GetBaseQuery($db, $options);**


    **// set the fields to select**


    **$select->from(null, ''p.*'');**


    **// set the offset, limit, and ordering of results**


    **if ($options[''limit''] > 0)**


    **$select->limit($options[''limit''], $options[''offset'']);**


    **$select->order($options[''order'']);**


    ■**Note** Using Zend_Db_Select helps make queries that work on different database
    servers. For example, MySQL uses LIMIT x, y or LIMIT y OFFSET x to limit the returned
    results, while PostgreSQL uses OFFSET x LIMIT y (where x is the offset and y is
    the limit).


    The next step is to perform the database query and build an array of DatabaseObject_


    BlogPost objects that we can return. We use the $db->fetchAll() method to retrieve
    all the database data and write it to an array. Since a single instance of the
    DatabaseObject subclass (such as DatabaseObject_BlogPost) corresponds to a single
    database record, we need multiple instances of this class: one for each row returned
    from the SQL we have just created.


    To help us create this array, we use the static BuildMultiple() helper method
    of DatabaseObject. We pass the name of the class (DatabaseObject_BlogPost, which
    we can use __CLASS__ to dynamically generate) to this method as well as the data
    we’re using to build the array of objects. Listing 8-4 shows this process. The
    key of each element in the array corresponds to its post_id value.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


