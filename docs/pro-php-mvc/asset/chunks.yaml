  raw: 'Whereas frameworks like CodeIgniter strive to be lightweight, favoring just
    the essentials, Zend Framework includes libraries that help developers utilize
    a wide range of third-party services and APIs.


    ■ **Note** You can download Zend Framework a[t http://framework.zend.com.](http://framework.zend.com)
    You can also learn more about Zend a[t http://zend.com.](http://zend.com)


    CakePHP


    CakePHP is arguably the most popular of the three frameworks. Unlike the previous
    two frameworks, it is not governed by any one corporate entity. It has a large
    community and is widely adopted.


    It favors convention over configuration, which means a lot of the finer details
    are assumed and automated.


    This is apparent in every area of the framework, and you will often find yourself
    wondering how CakePHP is doing something you didn’t ask it to do, both good and
    bad. This means you can develop an application quickly, but also that you might
    have a hard time when you need to make very specific changes.


    This is even seen in the code-generation command-line tool: Bake. Within minutes,
    it can generate a working application, just by following command-line prompts
    and filling in the blanks with default parameters and behaviors.


    ■ **Note** You can download CakePHP at [http://cakephp.org](http://cakephp.org).


    Design Patterns


    We will be focusing on the MVC design pattern, and in order to achieve it, we
    will need to use other simpler design patterns for the libraries on which the
    framework is built. The design patterns we will review can often be applied to
    procedural development, but we will be looking at them in the context of object-oriented
    programming.


    This means we will be dealing with classes (blueprints containing properties and
    performing functions), and how they interact with each other. If you are unfamiliar
    with some of the concepts that follow, you might want to refer to a language primer,
    or reference site.


    ■ **Note** If you would like to know more about object-oriented programming, or
    any of the other keywords/concepts that follow, you can read more a[t http://en.wikipedia.org/wiki/Object-oriented_programming](http://en.wikipedia.org/wiki/Object-oriented_programming).


    Singleton


    When we build OOP software, we deal with many classes. While it is ideal to design
    these classes in such a way that many instances can be active simultaneously,
    there will be times when we only practically need one instance of a class, for
    a specific purpose or context.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 1 ■ InTRoduCTIon To MVC


    Singleton is a design pattern that ensures a class can have only one instance
    at a time. A traditional Singleton class maintains one instance of itself in an
    internal static property, and cannot be instantiated (or cloned) in the usual
    way that a non-Singleton class can. Singletons have a special instance accessor
    method, which returns the internal instance property, or creates a new instance
    to return and store. See Figure [1-2.](#index_split_000.html#p10)


    MySingleton class


    Does an instance exist Yes


    No


    Get an instance


    Return the instance


    Create an instance


    ***Figure 1-2.** The Singleton process*


    ■ **Note** You can read more about the Singleton a[t http://en.wikipedia.org/wiki/Singleton_pattern.](http://en.wikipedia.org/wiki/Singleton_pattern)


    Registry


    A Registry is a class that can store and return instances of standard classes.
    Think of it like a team manager that brings players off the playing field and
    sends new ones in as required. We use Registry classes to manage a finite amount
    of class instances, so that we don’t need to keep on reinstantiating classes that
    the Registry already contains instances of.


    Another way to think of a Registry class is that it helps us to treat normal classes
    like Singletons, without having to make those normal classes Singletons. We might
    find ourselves in a situation where we need two instances of a class. Perhaps
    we need to connect to two separate databases, but we don’t want to keep on connecting
    to them, so we use a Registry. See Figure [1-3.](#index_split_000.html#p10)


    MyRegistry class


    Get an instance


    Check the instance storage


    yes


    no


    Does an instance exist?


    Return the instance


    Create an instance


    Store the instance


    ***Figure 1-3.** The Registry process*


    ■ **Note** You can read more about the Registry pattern at [http://blog.fedecarg.com/2007/10/26/](http://blog.fedecarg.com/2007/10/26/registry-pattern-or-dependency-injection-container)


    [registry-pattern-or-dependency-injection-container.](http://blog.fedecarg.com/2007/10/26/registry-pattern-or-dependency-injection-container)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 1 ■ InTRoduCTIon To MVC


    Factory


    A Factory is a class that provides a singular interface for creating any number
    of instances, without actually needing to specify the type of class the instances
    should be. A Factory will choose which class to instantiate based on input or
    internal logic.


    Factories are useful when we need to perform database work, but could be dealing
    with any number of different database drivers. We use a Factory class to give
    us the correct driver class, ensuring that all of our drivers conform to a standard
    interface. See Figure [1-4.](#index_split_000.html#p11)


    MyFactory class


    Get an instance


    Determine the correct class


    Create an instance


    Return the instance


    ***Figure 1-4.** The Factory process*


    ■ **Note** You can read more about the Factory pattern at [http://en.wikipedia.org/wiki/](http://en.wikipedia.org/wiki/%0aFactory_method_pattern.)


    [Factory_method_pattern.](http://en.wikipedia.org/wiki/%0aFactory_method_pattern.)


    Observer


    The Observer pattern describes a structure in which there are senders and receivers.
    When something changes in the state of a sender, it sends a message to the receivers
    associated with it, usually by calling one of their functions.


    The most practical uses of this pattern are to implement event-based (asynchronous)
    software, and to facilitate loose coupling in classes only related by changes
    in application state. See Figure [1-5](#index_split_000.html#p11).


    MyEvents class (sender)


    Receiver 1


    Maintain list of receivers


    Receiver 2


    Has the state changed?


    Receiver 1


    Notify receivers


    Receiver 2


    ***Figure 1-5.** The Observer process*


    **Note**


    ■


    You can read more about the observer pattern a[t http://en.wikipedia.org/wiki/Observer_pattern.](http://en.wikipedia.org/wiki/Observer_pattern)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 1 ■ InTRoduCTIon To MVC


    Creating Our Own Framework


    You might be wondering why we would even need to create our own framework, when
    there are already so many good choices out there. The reason for this is so that
    we can gain an understanding of the underlying principles of MVC.


    As we learn more about these principles, we will grow in our understanding of
    why the excellent MVC


    frameworks currently available do things the way they do. We are not learning
    how to create an application in Zend Framework, or in CakePHP. We are learning
    how MVC works, and by extension, how these frameworks have built upon (or deviated
    from) the way in which we would expect an MVC framework to be built.


    Our goal isn’t to add to the list of frameworks readily available for production
    use. Our goal is to learn how and why these frameworks do what they do, so that
    we can make informed decisions when it comes to selecting a framework for our
    next big project.


    ■ **Note** You are welcome to use the framework we build in a production environment,
    but I would caution against it unless you are prepared to invest a lot of time
    in the security and stability requirements of your framework, as these popular
    frameworks have taken years to do.


    Goals'
  trans: '


    像`CodeIgniter`这类框架力求轻量，仅保留核心功能，而`Zend Framework`则包含了帮助开发者使用多种第三方服务和 API 的库。


    > **注意** 你可以在[`framework.zend.com`](http://framework.zend.com)下载`Zend Framework`。你也可以在[`zend.com`](http://zend.com)了解`Zend`的更多信息。


    ## `CakePHP`


    `CakePHP`可以说是这三个框架中最受欢迎的。与前两个框架不同，它不受任何单一企业实体的管辖。它拥有庞大的社区，并被广泛采用。


    它更倾向于约定优于配置，这意味着许多细节会被预设并自动化。


    这一点在框架的各个方面都显而易见，你常常会惊讶于`CakePHP`自动执行了你并未要求的事情，这其中既有好处也有坏处。这意味着你可以快速开发应用程序，但当你需要进行非常具体的修改时，也可能会遇到困难。


    这一点甚至体现在其代码生成命令行工具`Bake`上。只需遵循命令行提示，并使用默认参数和行为填空，它就能在几分钟内生成一个可运行的应用程序。


    > **注意** 你可以在[`cakephp.org`](http://cakephp.org)下载`CakePHP`。


    ## `设计模式`


    我们将重点探讨 MVC 设计模式。为了实现它，我们需要在构建框架的库中使用其他更简单的设计模式。我们即将回顾的设计模式通常可以应用于过程式开发，但我们将从面向对象编程的角度来审视它们。


    这意味着我们将处理类（包含属性和执行功能的蓝图）以及它们之间的相互交互。如果你对后续某些概念不熟悉，可能需要查阅语言入门指南或参考网站。


    > **注意** 如果你想了解更多关于面向对象编程或后续的其他关键词/概念，可以在[`en.wikipedia.org/wiki/Object-oriented_programming`](http://en.wikipedia.org/wiki/Object-oriented_programming)上阅读更多信息。


    ### `单例模式`


    在构建面向对象软件时，我们会处理许多类。虽然理想情况下，设计这些类时应允许多个实例同时激活，但有时，出于特定目的或上下文，我们实际上只需要一个类的实例。


    `单例模式`是一种确保一个类在同一时间只能有一个实例的设计模式。传统的`单例`类在内部静态属性中维护自身的唯一实例，并且不能像非单例类那样以常规方式进行实例化（或克隆）。`单例`类有一个特殊的实例访问方法，该方法返回内部实例属性，或者创建一个新实例来返回和存储。参见图
    1-2。


    **`图 1-2.`** *`单例模式流程`*


    > **注意** 你可以在[`en.wikipedia.org/wiki/Singleton_pattern`](http://en.wikipedia.org/wiki/Singleton_pattern)上阅读更多关于`单例模式`的信息。


    ### `注册表模式`


    `注册表`是一个可以存储并返回标准类实例的类。可以把它想象成一个团队经理，他可以将球员从场上替换下来，并根据需要派上新球员。我们使用`注册表`类来管理有限数量的类实例，这样我们就不需要重复实例化`注册表`中已包含实例的类。


    `注册表`类的另一种理解方式是，它帮助我们将普通类当作`单例`来对待，而无需将这些普通类变成`单例`。我们可能会遇到需要两个类实例的情况。例如，我们需要连接两个独立的数据库，但又不想重复建立连接，这时就可以使用`注册表`。参见图
    1-3。


    **`图 1-3.`** *`注册表模式流程`*


    > **注意** 你可以在[`blog.fedecarg.com/2007/10/26/registry-pattern-or-dependency-injection-container`](http://blog.fedecarg.com/2007/10/26/registry-pattern-or-dependency-injection-container)上阅读更多关于`注册表`模式的信息。


    ### `工厂模式`


    `工厂`是一个提供单一接口用于创建任意数量实例的类，而无需实际指定实例应属于哪个类。`工厂`会根据输入或内部逻辑来选择要实例化的类。


    当我们需要执行数据库操作，但又可能要处理多个不同的数据库驱动时，`工厂`模式非常有用。我们使用`工厂`类来获取正确的驱动类，从而确保所有驱动都符合标准接口。参见图
    1-4。


    **`图 1-4.`** *`工厂模式流程`*


    > **注意** 你可以在[`en.wikipedia.org/wiki/Factory_method_pattern`](http://en.wikipedia.org/wiki/Factory_method_pattern)上阅读更多关于`工厂`模式的信息。


    ### `观察者模式`


    `观察者`模式描述了一种由发送者和接收者组成的结构。当发送者的状态发生变化时，它会向与之关联的接收者发送消息，通常通过调用接收者某个函数来实现。


    此模式最实用的用途是实现基于事件（异步）的软件，并促进仅通过应用程序状态变化相关联的类之间的松散耦合。参见图 1-5。


    **`图 1-5.`** *`观察者模式流程`*


    > **注意** 你可以在[`en.wikipedia.org/wiki/Observer_pattern`](http://en.wikipedia.org/wiki/Observer_pattern)上阅读更多关于`观察者`模式的信息。


    ## `创建我们自己的框架`


    你可能会想，既然市面上已经有这么多优秀的选择，我们为什么还需要创建自己的框架。其原因在于，这样我们才能理解 MVC 的基本原理。


    随着我们对这些原理的深入了解，我们就能更好地理解现有的优秀 MVC 框架为何采用当前的做法。我们学习的目标不是在`Zend Framework`或`CakePHP`中创建应用程序，而是学习
    MVC 的工作原理，并由此理解这些框架是如何在我们期望的 MVC 框架构建方式基础上进行构建（或偏离）的。


    我们的目标不是为可投入生产使用的框架列表再添一员。我们的目标是学习这些框架“做了什么”以及“为什么这么做”，以便在为我们下一个大项目选择框架时，能够做出明智的决策。


    > **注意** 欢迎你将我们构建的框架用于生产环境，但我建议你谨慎行事，除非你准备投入大量时间来满足框架的安全性和稳定性要求，因为那些流行的框架也是花费了多年时间才达到的。


    ### `目标`'
- fmt: '# 排版后的内容


    I have already mentioned our first goal, which is to learn. Above all else, our
    framework should teach us the core concepts that no `MVC` framework can do without.
    We will do this first by looking at some basic components, and later we will create
    an actual application upon these components. The important thing is that the core
    concepts of our framework should remain the same no matter what applications we
    build with it.


    This will naturally inspire the second goal, which is to create a framework that
    is easy to configure, and makes the least assumptions possible about the applications
    we will build with it. This will be seen in both the application configuration
    later, as well as the underlying system code. We should try to only enable the
    configuration options where they make sense.


    Our last goal is to create an abstract platform, capable enough of executing in
    many different environments, but focused only on those we can expect in our testing
    environment. To phrase it differently, I want us to allow for any color but start
    by painting it blue. This means we should create the infrastructure to be able
    to interface with many different kinds of databases, but to begin with, we will
    write only one database driver. It means we should create the infrastructure to
    be able store cache in a variety of places, but only be concerned with the first
    type we will deal with.


    I want to get us in the mindset of dealing with the root of the problem, and all
    the ways in which we can solve it. I want us to learn what a true `MVC` framework
    should look like. I want us to strive for ways in which we can allow flexibility
    when it makes the most sense, and predictability when it makes the most sense.
    I want us to be concerned with all of this, while dealing with as few concrete
    cases as possible. When we have a good handle on everything, we can begin to branch
    out into multiple environments and services, but until then, we have our three
    goals.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Chapter 2


    ## Foundation


    We will begin our framework by looking at some foundational (`OOP`-focused) code
    on which the core components will be based. The first thing we will look at is
    how to execute code that is spread over multiple files.


    We will also look at what to do when we encounter errors. Finally, we will create
    a convenient means of sorting and retrieving class metadata.


    ### Goals


    * We need to develop a means to load classes automatically. Classes should be
    located based on their names, and these names should translate into a folder hierarchy.

    * We need to understand and define custom `Exception` subclasses, so that we can
    handle the most common types of errors that could occur.

    * We should also define a system of static classes that include utility methods
    for a number of data types.

    * We should also develop a means to identify the structure (and intended use)
    of our framework classes that depends on the use of special code comments.


    ### Autoloading


    Because we are going to be writing a lot of code, it is safe to assume that we
    would want to structure the code clearly, to avoid confusion as the amount of
    code increases. There are a few ways in which we could do this, and one of them
    is keeping separate chunks of code in separate files. A problem that arises from
    this approach to code structure is that we will need to reference these external
    chunks of code from a single point of entry.


    Requests to a web server tend to be routed to a single file in the server''s webroot
    directory. For example, `Apache` web servers are usually configured to route default
    requests to `index.php`. We can keep all our framework code in this single file,
    or we can split it into multiple files and reference them from within `index.php`.
    `PHP` provides four basic statements for us to include external scripts within
    the program flow. These are shown in Listing 2-1.


    ***Listing 2-1.*** The Four Basic `require/include` Functions


    ```

    include("events.php");

    include_once("inflection.php");

    require("flash.php");

    ```'
