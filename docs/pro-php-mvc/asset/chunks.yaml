    **Routing**


    Routing is what happens when an application determines which controllers and actions
    are executed based on the URL requested. Simply put, it is how the framework gets
    fr[om http://localhost/users/list.html](http://localhost/users/list.html) to the
    Users controller and the list() action.


    Goals


    • We need to understand what routes are and how they work.


    • We need to build the different kinds of routes.


    • We need to build the Router class that will manage these routes.


    Defining Routes


    Some routes can be inferred from the structure of the application. If the Router
    class sees that you have an Articles controller with a search() method, it can
    sometimes assume that the URL [http://localhost/](http://localhost/articles/search.html)


    [articles/search.html](http://localhost/articles/search.html) should require the
    execution Articles- > search(); however, sometimes we need to define routes that
    aren’t as easy to assume. After we’ve built our Router class, we should be able
    to define routes in the manner demonstrated in Listing 7-1.


