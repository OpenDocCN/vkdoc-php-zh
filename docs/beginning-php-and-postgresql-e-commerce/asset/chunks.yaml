  trans: "\n# 练习：创建组件化模板 `search_box`\n\n## 1. 在 `presentation/templates` 文件夹中新建一个名为\
    \ `search_box.tpl` 的模板文件，并向其中添加以下代码：\n\n```\n{* search_box.tpl *}\n{load_search_box\
    \ assign=\"search_box\"}\n{* 搜索框开始 *}\n<div class=\"left_box\" id=\"search_box\"\
    >\n<p>搜索目录</p>\n<form action={\"index.php\"|prepare_link:\"http\"}>\n<input maxlength=\"\
    100\" id=\"Search\" name=\"Search\"\nvalue=\"{$search_box->mSearchString}\" size=\"\
    23\" />\n<input type=\"submit\" value=\"搜索!\" /><br />\n<input type=\"checkbox\"\
    \ id=\"AllWords\" name=\"AllWords\"\n{if $search_box->mAllWords == \"on\" } checked=\"\
    checked\" {/if}/> 搜索所有单词\n</form>\n</div>\n{* 搜索框结束 *}\n```\n\n## 2. 在 `presentation/smarty_plugins`\
    \ 文件夹中新建一个名为 `function.load_search_box.php` 的 Smarty 函数插件文件，并包含以下代码：\n\n```\n\
    <?php\n// 插件文件中的插件函数必须命名为：smarty_type_name\nfunction smarty_function_load_search_box($params,\
    \ $smarty)\n{\n  // 创建 SearchBox 对象\n  $search_box = new SearchBox();\n  // 分配模板变量\n\
    \  $smarty->assign($params['assign'], $search_box);\n}\n\n// 管理搜索框\nclass SearchBox\n\
    {\n  // Smarty 模板的公共变量\n  public $mSearchString = '';\n  public $mAllWords = 'off';\n\
    \n  // 类构造函数\n  public function __construct()\n  {\n    if (isset ($_GET['Search']))\n\
    \      $this->mSearchString = $_GET['Search'];\n\n    if (isset ($_GET['AllWords']))\n\
    \      $this->mAllWords = $_GET['AllWords'];\n  }\n}\n?>\n```\n\n## 3. 将 `search_box`\
    \ 模板文件所需的以下样式添加到 `hatshop.css` 文件中：\n\n```\n#search_box\n{\n  border: 1px solid\
    \ #0583b5;\n}\n#search_box p\n{\n  background: #0583b5;\n}\nform\n{\n  margin:\
    \ 2px;\n}\ninput\n{\n  font-family: tahoma, verdana, arial;\n  font-size: 11px;\n\
    }\n```\n\n## 4. 修改 `index.tpl` 文件以加载新创建的模板文件：\n\n```\n...\n{include file=\"departments_list.tpl\"\
    }\n{include file=\"$categoriesCell\"}\n{include file=\"search_box.tpl\"}\n...\n\
    ```\n\n## 5. 在浏览器中加载你的项目，你会看到搜索框完美地放置在它该在的位置（参见图 5-1）。\n\n## 工作原理：组件化模板 `search_box`\n\
    \n到目前为止，你应该已经熟悉了我们如何将函数插件与 Smarty 模板结合使用。在本例中，我们使用插件来维护执行搜索后搜索框的状态。当点击“搜索！”按钮重新加载页面时，我们希望保留文本框中输入的字符串，同时保持\
    \ `AllWords` 复选框的状态。\n\n`load_search_box` 函数插件只是保存了 `Search` 和 `AllWords` 查询字符串参数的值，同时检查这些参数是否确实存在于查询字符串中。这些值随后在\
    \ `search_box.tpl` Smarty 模板中被用于恢复之前的状态。\n\n请注意，我们本可以通过使用 `$smarty.get.Search`\
    \ 和 `$smarty.get.AllWords` 读取 `Search` 和 `AllWords` 查询字符串参数的值来实现此功能，而无需使用插件。然而，使用插件能让你更好地控制整个流程，并且还能避免在提及的参数不存在于查询字符串中时生成警告。\n\
    \n## 显示搜索结果\n\n在下一个练习中，你将创建用于显示搜索结果的组件化模板。\n\n为了简化工作，你可以重用 `product_list` 组件化模板来显示实际的产品列表。这正是我们迄今为止用于主页、部门和类别产品列表的组件化模板。当然，如果你希望以其他格式显示搜索结果，则必须创建另一个用户控件。\n"
- fmt: "You’ll need to modify the `templates-logic` file of the products list (`products_list.php`)\
    \ to recognize when it’s being called to display search results, so it calls the\
    \ correct method of the business tier to get the list of products.\n\nLet’s create\
    \ the `search_result` template and update the `templates-logic` file of the `products_list`\
    \ componentized template in the following exercise.\n\n## Exercise: Creating the\
    \ `search_results` Componentized Template\n\n**1.** Create a new template file\
    \ in the `presentation/templates` directory named `search_results.tpl`, and add\
    \ the following to it:\n\n```\n{* search_results.tpl *}\n\n<p class=\"title\"\
    >Search results</p>\n\n<br />\n\n{include file=\"products_list.tpl\"}\n```\n\n\
    **2.** Modify the `presentation/smarty_plugins/function.load_products_list.php`\
    \ file by adding the following lines at the end of the constructor method of the\
    \ `ProductList` class (`__construct`):\n\n```\n// Get search details from query\
    \ string\nif (isset ($_GET['Search']))\n    $this->mSearchString = $_GET['Search'];\n\
    \n// Get all_words from query string\nif (isset ($_GET['AllWords']))\n    $this->mAllWords\
    \ = $_GET['AllWords'];\n```\n\n**3.** Add the `$mSearchResultsTitle`, `$mSearch`,\
    \ `$mAllWords`, and `$mSearchString` members to the `ProductsList` class, located\
    \ in the same file:\n\n```\nclass ProductsList\n{\n    // Public variables to\
    \ be read from Smarty template\n    public $mProducts;\n    public $mPageNo;\n\
    \    public $mrHowManyPages;\n    public $mNextLink;\n    public $mPreviousLink;\n\
    \    public $mSearchResultsTitle;\n    public $mSearch = '';\n    public $mAllWords\
    \ = 'off';\n    public $mSearchString;\n\n    // Private members\n    private\
    \ $_mDepartmentId;\n    private $_mCategoryId;\n```\n\n**4.** Modify the `init`\
    \ method in `ProductsList` class like this:\n\n```\npublic function init()\n{\n\
    \    /* If searching the catalog, get the list of products by calling\n      \
    \ the Search busines tier method */\n    if (isset ($this->mSearchString))\n \
    \   {\n        // Get search results\n        $search_results = Catalog::Search($this->mSearchString,\n\
    \                                          $this->mAllWords,\n               \
    \                           $this->mPageNo,\n                                \
    \          $this->mrHowManyPages);\n\n        // Get the list of products\n  \
    \      $this->mProducts = $search_results['products'];\n\n        // Build the\
    \ title for the list of products\n        if (count($search_results['accepted_words'])\
    \ > 0)\n            $this->mSearchResultsTitle =\n                'Products containing\
    \ <font class=\"words\">'\n                . ($this->mAllWords == 'on' ? 'all'\
    \ : 'any') . '</font>'\n                . ' of these words: <font class=\"words\"\
    >'\n                . implode(', ', $search_results['accepted_words']) .\n   \
    \             '</font><br />';\n\n        if (count($search_results['ignored_words'])\
    \ > 0)\n            $this->mSearchResultsTitle .=\n                'Ignored words:\
    \ <font class=\"words\">'\n                . implode(', ', $search_results['ignored_words'])\
    \ .\n                '</font><br />';\n\n        if (!(count($search_results['products'])\
    \ > 0))\n            $this->mSearchResultsTitle .=\n                'Your search\
    \ generated no results.<br />';\n    }\n\n    /* If browsing a category, get the\
