  \ if 语句控制。\n\n## HTTP 是无状态的\n\n超文本传输协议（HTTP）是互联网上大量数据通信的基础。它是*无状态的*，这意味着它将每个新请求视为一个独立的事务。在实际应用中，这意味着每次新请求时，所有的\
  \ PHP 变量和对象都会从头开始创建。\n\n这给我们带来了一些影响。当我们提交登录表单时，就是发起了一个 HTTP 请求。PHP 会运行，`$admin`\
  \ 对象会记住我们已登录。如果我们尝试点击一个条目，这将发起一个新的 HTTP 请求，因此会创建一个新的 `$admin` 对象。PHP 不会记住我们刚刚登录过，因为新的\
  \ HTTP 请求被视为一个独立的、分离的事务。之前的 HTTP 请求被完全遗忘。\n\n## 超全局变量：$_SESSION\n\n这种无状态的 HTTP 对我们的登录功能来说是个坏消息。无论我们登录多少次，PHP\
  \ 都会在每个新请求中将其忘记。这非常不实用，当然，也有解决方案：在请求之间形成持久状态。我们需要一种方法强制 PHP 记住某个特定用户已登录。PHP 的 `session`\
  \ 可以完成这个任务。\n\n当 PHP 会话启动时，访问用户的浏览器会被分配一个唯一的识别号：一个*会话 ID*。服务器会在服务器端（默认情况下）创建一个小的临时文件。我们应用程序需要在请求之间记住的任何信息都可以存储在这个文件中。PHP\
  \ 会话的持续时间可以在 `php.ini` 文件中配置。\n\n> **注意**：更多信息请阅读 [`www.php.net/manual/en/intro.session.php`](http://www.php.net/manual/en/intro.session.php)。\n\
  \nPHP 提供了一个超全局变量来创建会话。现在，是时候认识一下 `$_SESSION` 了。\n\n## 使用会话保持状态\n\n要使用会话，我们必须启动一个会话。有了会话之后，我们可以创建一个*会话变量*，这是一个值具有*状态性*的变量，意味着它的值可以在\
  \ HTTP 请求之间持久存在。\n\n让我们使用一个会话变量来记住我们的登录状态。\n\n```\n<?php\n//用于 models/Admin_User.class.php\
  \ 的完整代码\nclass Admin_User {\n//声明一个新方法，一个构造函数\npublic function __construct(){\n\
  //启动一个会话\nsession_start();\n}\npublic function isLoggedIn(){\n$sessionIsSet = isset(\
  \ $_SESSION['logged_in'] );\nif ( $sessionIsSet ) {\n$out = $_SESSION['logged_in'];\n\
  } else {\n$out = false;\n}\nreturn $out;\n}\npublic function login () {\n//将会话变量\
  \ ['logged_in'] 设置为 true\n$_SESSION['logged_in'] = true;\n}\npublic function logout\
  \ () {\n//将会话变量 ['logged_in'] 设置为 false\n$_SESSION['logged_in'] = false;\n}\n}\n\
  public function __construct(){\n//启动一个会话\nsession_start();\n}\n代码清单 9-23\nAdmin_User.class.php\n\
  ```\n\n当创建 `Admin_User` 的实例时，构造函数会启动一个会话。\n\n```\npublic function isLoggedIn(){\n\
  $sessionIsSet = isset( $_SESSION['logged_in'] );\nif ( $sessionIsSet ) {\n$out =\
  \ $_SESSION['logged_in'];\n} else {\n$out = false;\n}\nreturn $out;\n}\n```\n\n\
  `isLoggedIn()` 函数判断会话变量是否已创建。如果已创建，则将其内容放入 `$out`。如果未创建（未登录），则将 `false` 存储到 `$out`\
  \ 中。然后返回 `$out`。\n\n\n\n```php\npublic function login () {\n// 将会话变量 ['logged_in']\
  \ 设置为 true\n$_SESSION['logged_in'] = true;\n}\npublic function logout () {\n// 将会话变量\
  \ ['logged_in'] 设置为 false\n$_SESSION['logged_in'] = false;\n}\n```\n\n`login()`\
  \ 函数会将会话变量的内容设置为 `true`。`logout()` 函数会将会话变量的内容设置为 `false`。\n\n## 退出登录\n\n为已登录用户提供退出登录选项是一种惯例，也是一个好主意：我们不想让管理员一直处于登录状态而无法退出。如果管理员需要离开电脑去冲杯咖啡怎么办？我们可不希望管理模块暴露在外。让我们创建一个用于退出登录的新视图。\n\
