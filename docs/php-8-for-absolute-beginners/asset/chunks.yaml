    \ 在后\n$formData = array($title, $entry);\n```\n\n3.  将包含动态数据的数组作为参数传递给`execute()`方法。\n\
    \n```php\n// 将$formData 作为参数传递给 execute\n$entryStatement->execute($formData);\n\
    ```\n\n当语句执行时，数组中的值将被插入到占位符所在的位置。插入的信息不会允许任何 SQL 注入。\n\n```php\n} catch (Exception\
    \ $e) {\n    $msg = \"You tried to run this sql: $entrySQL Exception: $e\";\n\
    \    trigger_error($msg);\n}\n```\n\n如果发生异常，代码将触发一个错误，显示导致异常的 SQL 字符串以及对异常的更详细信息。在生产环境中，我们不想向用户显示所有这些信息，但这是一个帮助我们在开发过程中调试任何问题的好方法。\n\
    \n# 处理管理表单输入并保存条目\n\n创建了`Blog_Entry_Table`类后，我们可以继续开发。逻辑上的下一步是处理从编辑器表单接收的输入，并使用`Blog_Entry_Table`对象将新的博客条目保存到数据库中。让我们更新编辑器控制器。\n\
    \n```php\n<?php\n# newesteditor.php\n\ninclude_once \"models/Blog_Entry_Table.class.php\"\
    ;\n$entryTable = new Blog_Entry_Table($db);\n\nif (isset($_POST['buttonClicked']))\
    \ {\n    $buttonClicked = $_POST['buttonClicked'];\n\n    if ($buttonClicked ===\
    \ 'save') {\n        // 从编辑器表单获取标题和条目数据\n        $title = $_POST['title'];\n \
    \       $entry = $_POST['entry'];\n        // 保存新条目\n        $entryTable->saveEntry($title,\
    \ $entry);\n    }\n}\n\ninclude_once \"views/admin/insert-editor-html.php\";\n\
    ?>\n```\n\n```php\ninclude_once \"models/Blog_Entry_Table.class.php\";\n$entryTable\
    \ = new Blog_Entry_Table($db);\n```\n\n类被包含进来，数据库连接被传递到构造函数中。\n\n```php\nif ($buttonClicked\
    \ === 'save') {\n    // 从编辑器表单获取标题和条目数据\n    $title = $_POST['title'];\n    $entry\
    \ = $_POST['entry'];\n    // 保存新条目\n    $entryTable->saveEntry($title, $entry);\n\
    }\n```\n\n```"
- fmt: "If the `save` button is clicked, the title and entry are retrieved and passed\
    \ to the `saveEntry` method to insert them into the database.\n\n**Note:** The\
    \ following programs have been updated to link to the newest versions. All code\
    \ changes are minor. The `insertadminWithNavigation.php` front controller also\
    \ now includes an `include_once` statement to insert the `database.php` program.\
    \ (`insert-editor-html.php`, `insert-admin-navigation.php`, `insertadminWithNavigation.php`)\n\
    \nWe can now test the insert process by executing the `insertadminWithNavigation.php`\
    \ program in our browser. Then we can click the `Editor` menu item, enter some\
    \ test data, and click the save button. The information will now be properly placed\
    \ into the `blog_entry` table in the database. The form will automatically clear\
    \ all data, which is a common indication to the user that the data was inserted.\
    \ You can browse the content of the `blog_entry` table using the phpMyAdmin control\
    \ panel.\n\n**Exercise:** Use either the code provided or the code you have developed\
    \ and do a complete test on the current system. Try to break the system. Enter\
    \ in SQL information and see if you can hack the program. Did you find any weaknesses?\n\
    \n## User View: Getting Data for All Blog Entries\n\nLet’s now provide the ability\
    \ for our users to see the blog entries. We are switching from what the administrator\
    \ will see (which eventually will be controlled with a userid and password) to\
    \ what the user will see. Thus, we will create a different entrance (front controller)\
    \ for the user, which does not require a userid and password, a different model,\
    \ and a different view. We can use a stripped-down version of the administrator’s\
    \ front controller for the user controller.\n\n```\nsetTitle(\"PHP/MySQL blog\
    \ demo\");\ninclude_once \"models/database.php\";\ninclude_once \"controllers/blog.php\"\
    ;\n$pageData->setContent($info);\ninclude_once \"views/page.php\";\necho $page;\n\
    ?>\nListing 7-14\nindex.php\n```\n\nAs we can see, currently, there is no need\
    \ for navigation, as the user only has permission to view blog entries. The same\
    \ `Page_Data` class, `database.php`, and `page.php` scripts are used. Since there\
    \ is no menu, the determination of what menu item was selected is not currently\
    \ needed. Of course, the controller and view are changed to the user versions.\n\
    \nLet us work on the changes required in the `blog_entry` class. We will show\
    \ a list of all blog entries found in the database. Let us display the `title`,\
    \ the first 150 characters of the `entry_text`, and a *Read more* link for each\
    \ of the blog entries.\n\nLet us start by creating a new method to retrieve the\
    \ blog entries from the `blog_entry` table.\n\n```\n//declare a new method inside\
    \ the Blog_Entry_Table class\npublic function getAllEntries () {\n$sql = \"SELECT\
    \ entry_id, title,\nSUBSTRING(entry_text, 1, 150) AS intro\nFROM blog_entry\"\
    ;\n$statement = $this->db->prepare( $sql );\ntry {\n$statement->execute();\n}\
    \ catch ( Exception $e ) {\n$exceptionMessage = \"You tried to run this sql: $sql\
    \ \nException: $e\";\ntrigger_error($exceptionMessage);\n}\nreturn $statement;\n\
    }\nListing 7-15\nPartial Listing of New_Blog_Entry_Table.class.php\n```\n\nThis\
    \ method will be placed right before the `saveEntries` method within the class.\
    \ This method has a similar format to the previous `saveEntry` method. There are\
    \ a few minor changes, such as retrieving the information, instead of inserting\
    \ it.\n\nThe `getAllEntries()` method will return a `PDOStatement` object, through\
    \ which we can get access to all blog entries, one at a time. The statement involves\
    \ some SQL we have not seen before, so it might be a bit tricky to understand\
    \ initially. Let us go through it step by step.\n\n### Using an SQL SUBSTRING\
    \ Clause\n\n```\n$sql = \"SELECT entry_id, title,\nSUBSTRING(entry_text, 1, 150)\
    \ AS intro\nFROM blog_entry\";\n```\n\nThe first thing to notice is that the `SELECT`\
    \ statement selects three columns – `entry_id`, `title`, and `entry_text` – from\
    \ the `blog_entry` table. But we are not selecting everything from the `entry_text`\
    \ column. We are only selecting the first 150 characters. We can accomplish this\
    \ with the SQL `SUBSTRING()` function. The general syntax for the `SUBSTRING()`\
    \ function is as follows:\n\n```\nSUBSTRING( string, start position, length )\n\
    ```\n\nThe `SUBSTRING()` returns the part of a string requested: a substring.\
    \ The string argument indicates which partial string to return. As you might guess,\
    \ the `start` position argument indicates at which position to start the substring.\
    \ The `length` argument specifies how long a substring to return. Thus, in the\
    \ `SELECT` statement, we are selecting the first 150 characters from the string\
    \ found in the `entry_text` field.\n\n### Using an SQL Alias\n\nIn SQL statements,\
    \ we can use an alias to rename a table or a column. In the SQL used to select\
    \ all blog entries, we have named the substring result `intro`. It was not necessary\
    \ to rename it, but it provides us with a straightforward way to access the information\
    \ in the substring.\n\n## Preparing a User View for All Blog Entries\n\nIt is\
    \ time to create a user view. This view will list all blog entries. The number\
    \ of blog entries is likely to change, so it would be a bad idea to create a view\
    \ for a specific number of entries. The view should automatically change to accommodate\
    \ however many – or few – blog entries are found in the database. We will iterate\
    \ over blog entries by using a loop.\n\n```\n element\n$info = \"Blog Entries\"\
    ;\n$info .= \"\";\n//loop through all $entries from the database\n//remember each\
    \ one row temporarily as $entry\n//$entry will be a StdClass object with entry_id,\
    \ title and intro\nwhile ( $entry = $entries->fetchObject() ) {\n$href  = \"index.php?page=blog&id=$entry->entry_id\"\
    ;\n//create an  for each of the entries\n$info .= \"\n$entry->title\n$entry->intro\n\
    Read more\n\n\";\n}\n//end the \n$info .= \"\";\n?>\nListing 7-16\nlist-entries-html.php\n\
    ```\n\n```\n$entriesFound = isset( $entries );\nif ( $entriesFound === false )\
    \ {\ntrigger_error( 'views/list-entries-html.php needs $entries' );\n}\n```\n\n\
    `$entries` will contain the blog entries contained in the database. If they are\
    \ missing, an error will be raised to indicate the problem. In production, this\
    \ will need to be replaced with an informative statement to the user that there\
    \ are not currently any blogs.\n\n```\nwhile ( $entry = $entries->fetchObject()\
    \ ) {\n$href  = \"index.php?page=blog&id=$entry->entry_id\";\n//create an  for\
    \ each of the entries\n$info .= \"\n$entry->title\n$entry->intro\nRead more\n\n\
    \";\n}\n```\n\nThe `while` loop first attempts to fetch the next object (entry\
    \ from the database table) and places it in `$entry`. The `while` loop considers\
    \ a successful fetch as a `true` status. If the fetch is not successful (there\
    \ are no more records), a `false` value is placed into `$entry` and the loop will\
    \ stop. As long as the status is `true`, the loop will dynamically create an `<li>`\
    \ element for however many rows are in the `blog_entry` database table. If there\
    \ is one blog entry in the database, there will be one `<li>`. If there are ten\
    \ blog entries in your database, there will be ten `<li>` elements.\n\nThe `$href`\
    \ variable contains a link which will recall the index page, passing the two attributes\
    \ – `page` which is set to `blog` and `id` which is set to the `entry_id` contained\
    \ in the record in the database table. This information will be used if the user\
    \ wants to read more of the blog entry. In addition to the `title` and the `intro`\
    \ (substring) being displayed, the actual `href` link is provided, allowing the\
    \ user to click `Read more` for the complete blog entry.\n\n## Hooking Up the\
    \ User View and User Model\n\nThe last step is to hook up the user view with the\
    \ data from the user model. It does not take much code, but it will produce a\
    \ simple display of our entries."
