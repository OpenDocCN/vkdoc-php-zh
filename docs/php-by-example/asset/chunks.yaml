    ## A Loop over an Array


    You have examined a case where the index is used the for loop statement to iterate
    array elements. The inconvenience of that approach is that the indexes must form
    an ordered sequence. But that may not be the case. Therefore, another loop statement
    is usually used. It is called `foreach`. Its syntax is as follows.


    ```

    foreach(array as key=>value){

    # commands

    }

    ```


    The `foreach` keyword is followed by a special “construct” in parentheses. First
    comes the array name, the `as` keyword, and then the `key=>value` expression.
    The keys and values are realized by employing variables. The body of the loop
    statement contains statements enclosed in curly braces.


    The `foreach` loop statement is executed as follows. The elements are iterated
    sequentially in the array specified in the `foreach` statement. The commands in
    the body of the loop statement are executed for each element of the array. The
    variable specified as a key in the `key=>value` statement gets the value of the
    element’s key, and the variable specified as a value gets the element’s value.


    An alternative syntax uses a colon instead of the opening curly brace and the
    `endforeach` keyword (and a semicolon) instead of the closing curly brace.


    ```

    foreach(array as key=>value):

    # commands

    endforeach;

    ```


    Listing [4-3](#613529_1_En_4_Chapter.xhtml#PC7) illustrates the `foreach` loop
    statement in practice.


    ```

    100,"Y"=>200,"Z"=>300];

    // Iterating over the array elements:

    foreach($A as $k=>$v){

    echo "Key ",$k," -> value ",$v,"\n";

    }

    ?>

    Listing 4-3

    Iterating over Elements in an Array

    ```


    The following shows the result of the program’s execution.


    ```

    The output of the program (from Listing 4-3)

    Key X -> value 100

    Key Y -> value 200

    Key Z -> value 300

    ```


    In this case, everything is quite simple. First, with the `$A=["X"=>100,"Y"=>200,"Z"=>300]`
    instruction, you create an array. Then, use the loop statement. After the `foreach`
    keyword, the parentheses contain the `$A as $k=>$v` construction. It means that
    the elements of the `$A` array are iterated, and the `$k` variable gets the keys
    of the elements; meanwhile, the `$v` variable gets the values of the elements.
    There is only one command, `echo "Key ",$k," -> value ",$v,"\n"`, in the body
    of the loop statement, which displays the `"Key"` string, the value of the `$k`
    key of the element, the `" -> value "` string, the value `$v` of the element,
    and the break-line escape sequence (the `"\n"` instruction).


    | Details |

    | --- |

    | For the first loop, `$k` is set to `"X"`, and `$v` is set to `100`. For the
    second loop, `$k` is set to `"Y"`, and `$v` is set to `200`. For the third loop,
    `$k` is set to `"Z"`, and `$v` is set to `300`. |


    Another example of using the `foreach` statement (in its alternative form) is
    shown in Listing [4-4](#613529_1_En_4_Chapter.xhtml#PC9).


    ```

    100,"Two hundred",300];

    print("Array \$A:\n");

    print_r($A);

    // Iterates over the elements in the array:

    foreach($A as $k=>$v):

    print("\$A[$k] = $v");

    // Checks the element type:

    if(gettype($v)=="string"){

    print(" - delete\n");

    // Deletes the element from the array:

    unset($A[$k]);

    }else{

    print(" - remain\n");

    }

    endforeach;

    print("Array \$A:\n");

    print_r($A);

    ?>

