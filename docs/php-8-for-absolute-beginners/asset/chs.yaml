  \ ?,\nentry_text = ?\nWHERE entry_id = ?\";\n$data = array( $title, $entry, $id\
  \ );\n$statement = $this->executeSQL( $sql, $data) ;\nreturn $statement;\n}\n代码清单\
  \ 8-7\nNewest_Blog_Entry_Table.class.php 的部分代码\n```\n\n此函数的逻辑和 SQL 的基本结构应该很熟悉。我们在更新投票时曾使用过更新\
  \ SQL 语句。不过，这里我们使用了预处理语句来将更改写入数据库表记录，以确保任何 SQL 注入尝试都会失败。现在我们可以更新代码，使其在用户点击保存按钮时调用此方法。保存按钮将同时处理新条目的插入和已有条目的更新。\n\
  \n### 控制器：插入还是更新？\n\n当用户点击保存时，显示的条目要么插入数据库，要么更新数据库。采取何种操作取决于条目编辑器表单中显示的是哪个条目。\n\n\
