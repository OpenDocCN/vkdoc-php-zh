    该脚本使访问者能够执行以下任务：\n\n*   通过从顶部菜单中选择任何商品类别，向购物车添加更多产品。\n*   修改购物车中任何商品的数量。\n*  \
    \ 从购物车中删除某件商品或清空整个购物车。\n"
