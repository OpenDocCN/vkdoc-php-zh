    <?=$html->image(''/img/gallery/title.jpg'');?>


    Like other helper functions, HTML attributes can be passed through this function
    using the attributes array. For example, the following:


    <?=$html->image(''title.jpg'',array(''alt''=>''My Homepage'',''class''=>''title'');?>
    outputs the following:


    <img src="/blog/img/title.jpg" alt="My Homepage" class="title" /> link


    Using the $html->link() function helps with maintaining consistent links and also
    is a convenience wrapper for the common <a> tag. This function outputs an <a>
    anchor tag.


    **link( title[string], url[mixed], attributes[array], confirmMessage[string],**
    ➥


    **escapeTitle[bool] )**


    title: The content to be linked; may include HTML tags, but the escapeTitle parameter
    must be set to false to display correctly.


    url = null: If an array, this will cause the link to point to controllers and
    actions; as a path relative to Cake, it will be parsed as an internal link; as
    an absolute URL, it will be passed as it is.


    attributes: The parameter through which to pass HTML attributes to be included
    with the tag.


    confirmMessage = false: When set, this message will be displayed in a JavaScript
    alert dialog box; if the user proceeds, the link will be activated.


    escapeTitle = true: By default, any symbols will be escaped for HTML; when set
    to false, the string supplied in title will be passed along as entered.


    This function is rather simple: provide the content to be linked, and tell Cake
    where to send the user when clicked. I discussed basic inline links with the $html->link()
    function when I showed how to bake some views. These are simple enough—linking
    the string “Add a Post” to the Posts Add action is done with the following code:


    <?=$html->link(''Add a Post'',''/posts/add'');?>


    09775ch09final 7/1/08 9:49 PM Page 144


    **144**


    C H A P T E R 9 ■ H E L P E R S


    But you can use an alternate method for producing this same link by entering an
    array in the url parameter, like so:


    <?=$html->link(''Add a Post'',array(''controller''=>''posts'',''action''=>''add''));?>
    Of course, entering an absolute URL into the url parameter will send the user
    off site:


    [<?=$html->link(''Check out the Bakery'',''http://bakery.cakephp.org'');?>](http://bakery.cakephp.org'');?)


    You can include a confirmation message to be displayed as a JavaScript alert dialog
    box by entering a string in the confirmMessage parameter. For instance, say you
    wanted to alert the user before deleting records from the database. You could
    do this by entering the confirm message in the $html->link() function:


    <?=$html->link(''Delete'',''/posts/delete/''.$post[''Post''][''id''],null,''Are
    you sure➥


    you want to delete this post?'');?>


    When this is clicked, a box will appear asking the user “Are you sure you want
    to delete this post?” If the user clicks Proceed, then the link will be activated.


    You can include HTML tags in this function by setting the escapeTitle parameter
    to false. Even other helper functions that output HTML can be included in the
    title parameter, like so:


    <?=$html->link($html->image(''title.jpg''),''/'',null,null,false);?> meta


    $html->meta() outputs <meta> tags, which can be used for specifying a site description
    or other <meta> tags. It can also output <link> tags for RSS feeds and a site
    favicon.


    **meta( type[string], url[mixed], attributes[array], inline[bool] )** type = null:
    The type of <meta> tag to be produced; this can be set to any string, but some
    built-in strings are also available (rss, atom, icon, keywords, and description).'
