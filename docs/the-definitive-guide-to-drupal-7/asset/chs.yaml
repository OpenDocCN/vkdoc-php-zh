  ## 前言


  市面上有许多 Drupal 书籍，它们都在争相获取你辛苦挣来的钱。从网站构建到主题开发再到模块开发，各种书籍专注于你可能感兴趣的 Drupal 各个领域。


  而这本书则是独一无二的。它的目标是向你展示 Drupal 的方方面面，而且在许多情况下，这些内容正是来自那些亲手创建它们的专家。无论是 Drupal 的经验还是兴趣，本书都有适合所有层次读者的内容。


  本书从入门材料开始，教你如何快速搭建并运行一个简单的网站，以及如何利用 Drupal 一些最受欢迎的贡献模块来扩展它。书中还有章节介绍如何通过初级和高级主题化以及
  jQuery 进行前端开发，让你的 Drupal 网站看起来不再像一个典型的 Drupal 网站。你将学习如何通过模块开发来定制 Drupal，以满足那些超越庞大贡献项目库所能提供的用例，以及如何将
  Drupal 6 模块移植到 Drupal 7，并添加自动化测试来确保你的代码持续正常工作。对于极客们来说，书中还提供了关于如何从命令行使用 Drupal、将其与
  Git 配合使用、以及管理服务器部署和性能的信息。此外，甚至还有关于更广泛主题的内容，这些主题远远超出了 Drupal 本身，例如项目管理、为你的网站创建文档以及用户体验。


  全书贯穿了来自一线的实践建议和经验教训，这些内容来自 Drupal 社区中那些最杰出、最聪明、最具创新精神的全明星阵容。作为 Drupal 7 的共同维护者，看到这庞大的工作得以整合，我感到无比激动。向
  Benjamin 和整个编写团队致敬！


  Angela Byron (webchick)

  *Drupal 7 维护者*




