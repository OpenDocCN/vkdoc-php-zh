- fmt: '### CHOOSING A SERVER


    Linode categorizes their servers by (a) the kind of workload they will be serving
    and (b) how much RAM the server comes with. The workload types are “Nanode” (super-small
    and super-cheap instances), “Standard” (balanced CPU/RAM), “Dedicated CPU,” and
    “High Memory” (there is also “GPU,” but those are for a completely different type
    of cloud computing than is considered here).


    Under each workload, the servers are named by the amount of RAM they ship with.
    A “Linode 4GB” comes with, you guessed it, 4 gigabytes of RAM. It will also specify
    how many virtual CPUs and how much disk space it comes with as well. Generally,
    the amount of memory goes up faster than the number of cores, which makes sense
    considering the fact that memory is often a much stronger limiting factor than
    CPU power. They also each have differing amounts of disk space, but I consider
    the disk space a minor consideration, since Chapter 8 will show how to set up
    a service with infinite available disk space.


    When choosing a production server, for reasons that will become more clear going
    forward, I usually choose a fairly large size for databases (since they are harder
    to replicate) and low to midrange sizes for web servers (since I can easily add
    capacity by adding more servers).


    ## 3.2 Logging In and Looking Around


    So, you have a machine, but where is it and how do you access it?


    Click the “Networking” tab on your dashboard. It should look something like Figure
    3-3. Under “Access” there is an area titled “SSH Access.” This has the command
    you need to type into your command line in order to log in. Use the password you
    created for the node to log in.


    ![../images/487291_1_En_3_Chapter/487291_1_En_3_Fig3_HTML.jpg](images/487291_1_En_3_Chapter/487291_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    The Networking Tab


    ### COMMAND LINE? WHAT IS THAT?


    The command line is the old-school way of accessing computers. Long before there
    were pretty graphical interfaces, people interacted with their computers by typing.
    For many things, *especially* for system administration–related tasks, the command
    line remains the best way to manage systems.


    If you don’t have any experience with the command line, don’t worry! This book
    doesn’t assume that you have expertise in this area, and will walk you through
    each step. If you are just trying to figure out how to *get to* the command line,
    here is what you do in each major operating system:


    * **Windows 10**: Windows actually has *two* command-line systems. The older “Command
    Prompt” (`cmd.exe`) and the newer PowerShell. Just click the Windows icon and
    type `PowerShell` to get started. You will need at least the April 2018 update
    in order to run the commands here without further setup.


    * **MacOS X**: Every Mac comes with an application called “Terminal.” You can
    find it with Spotlight search, or you can go to “Applications,” then “Utilities,”
    and find it there. I would suggest that you add it to your Dock, as you will probably
    use it a lot.


    * **Linux**: Every Linux distribution has a command-line program installed, usually
    named “Terminal” or “Bash Prompt” or something along those lines.


    When you start the command line for the first time, it will show you some text,
    followed by a blinking cursor. Now you are ready to start typing commands!


    In case you are new to Linux, `ssh` is an incredibly handy tool that allows for
    a remote, secure connection to your server’s command line. That is, you can `ssh`
    into your machine, and it works just as if you were logged in to the console.
    Additionally, the connection is encrypted, so you don’t have to worry about anyone
    eavesdropping on you or stealing your password. `ssh` is installed by default
    on every major operating system, so you should already have it installed. If you
    are using an old version of Windows, you may have to download a separate `ssh`
    application, such as `PuTTY`, which can be freely downloaded from [`www.putty.org`](http://www.putty.org).


    To log in to your machine, simply open up a command line and type in the command
    listed under the “SSH Access” section. It should say something like `ssh root@MY.IP.ADDRESS.HERE`,
    where `MY.IP.ADDRESS.HERE` is the IP address of your Linode. Because `ssh` has
    not seen this computer before, it will likely warn you that the authenticity of
    the host can’t be established, and ask whether or not you want to continue connecting.
    Just answer `yes`. It will only ask you this the first time, as `ssh` will remember
    the remote computer. Then, for the password, put in the password that you set
    when setting up your machine. Figure 3-4 shows what this will likely look like.


    ![../images/487291_1_En_3_Chapter/487291_1_En_3_Fig4_HTML.png](images/487291_1_En_3_Chapter/487291_1_En_3_Fig4_HTML.png)


    Figure 3-4


    Logging In from the Command Line


    You are now logged into your machine!


    That final line is known as the “command prompt.” It gives basic information about
    the current state of your session. `root` is your username. This is the name of
    the administrative user on Linux. `li1125-199` (or whatever is after the `@` symbol)
    is the name of your machine. Finally, `~` tells you what directory you are in
    (for newer programmers, “directory” is the old term for “folder”). `~` signifies
    the user’s “home” directory.


    If you are unfamiliar with Linux, there are several commands that are helpful
    to know.'
