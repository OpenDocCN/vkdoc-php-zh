- fmt: "### Theme Setting Guidelines\n\nThe key to writing good settings for your\
    \ themes is to think hard about the needs of your end users. Naturally, you’re\
    \ going to have to exercise your own judgment, but some general guidelines I suggest\
    \ are:\n\n- If your theme incorporates them, always make the following available\
    \ as theme settings:\n  - Any API keys used by JavaScript libraries (e.g., Instagram\
    \ client keys)\n  - All key images, including background images, site logos, and\
    \ the favicon\n  - On/off toggle switches for “additional” theme features like\
    \ newsletter popups or countdown timers\n- Avoid “god settings”—theme settings\
    \ that affect a wide range of aspects of your site (the retail/wholesale theme\
    \ setting used for the Colonna Coffee stores probably falls under this category—mea\
    \ culpa!). Having a single setting that drives major changes across the site makes\
    \ it harder to reason about the state of your theme or isolate feature change.\
    \ If possible, break these down into more focused settings that control individual\
    \ behaviors.\n- Avoid specifying lists directly in theme settings, and instead\
    \ leverage Shopify’s built-in concepts like navigation menus, collections, and\
    \ blogs. Having a single setting that points to a flexibly-sized collection (e.g.,\
    \ “Featured products”) is much simpler than having many settings, each pointing\
    \ to a specific product.\n- Almost without exception, any configurable text content\
    \ displayed to customers should be configurable via a store’s language files (we’ll\
    \ discuss these in a little bit) rather than via a theme setting. This gives storeowners\
    \ a single point of control for all theme text content and avoids missed translations\
    \ or text changes.\n\n### Using Settings in Your Themes\n\nWithin your theme’s\
    \ Liquid code, settings can be used just like any other variable, as per Listing\
    \ [8-2](#A437216_1_En_8_Chapter.html#Par34).\n\n```liquid\n{% if settings.display_site_banner\
    \ %}\n{% include 'site-banner' %}\n{% endif %}\n```\n\n#### The Iteration Pattern\n\
    \nIt’s common to have a group of settings you’d like repeated a few times. For\
    \ example, if your theme has an image carousel on the home page, you might want\
    \ users to be able to configure the image, caption, and link for each slide. The\
    \ naïve approach (shown in Listing [8-3](#A437216_1_En_8_Chapter.html#Par36))\
    \ is to repeat your HTML logic once for each repeated element. A better approach\
    \ (shown in Listing [8-4](#A437216_1_En_8_Chapter.html#Par37)) is to dynamically\
    \ iterate over setting values.\n\n```liquid\n{% if settings.show_slide_1 %}\n\
    \  {{ settings.caption_slide_1 | escape }}\n{% endif %}\n{% if settings.show_slide_2\
    \ %}\n  {{ settings.caption_slide_2 | escape }}\n{% endif %}\n{% if settings.show_slide_3\
    \ %}\n  {{ settings.caption_slide_3 | escape }}\n{% endif %}\n```\n\n```liquid\n\
    {% for i in (1..3) %}\n{% capture setting_slide_show %}show_slide_{{i}}{% endcapture\
    \ %}\n{% capture setting_slide_image %}image_slide_{{i}}.png{% endcapture %}\n\
    {% capture setting_slide_title %}caption_slide_{{i}}{% endcapture %}\n{% if settings[setting_slide_show]\
    \ %}\n  {{ settings[setting_slide_title] | escape }}\n{% endif %}\n{% endfor %}\n\
    ```\n\nNot only is this code shorter to write, it’s easy to scale when you want\
    \ to add more than three slides. It also means that you need to update the HTML\
    \ rendered for each slide in only one place.\n\n#### Using Settings with Preprocessed\
    \ Files\n\nIf you have JavaScript or stylesheet files in your `assets` directory,\
    \ Shopify will run them through the Liquid parser before serving them if they\
    \ have a `.liquid` extension at the end of their filename, as shown in Listing\
    \ [8-5](#A437216_1_En_8_Chapter.html#Par40).\n\n```css\n/* assets/styles.css.liquid\
    \ */\nbody {\n  background-color: {{ settings.body_background_color }};\n}\n```\n\
    \nThis is fine when you’re working with simple resources directly in the `assets`\
    \ directory, but often you’ll want to do some preprocessing (such as LESS/SCSS\
    \ compilation, or JavaScript concatenation and minification) before the final\
    \ file is added to `assets`. In those situations, you need to worry about how\
    \ your preprocessor will interact with the Liquid syntax you have in your asset\
    \ files.\n\nTo work around these limitations, you’ll need to either extract your\
    \ settings-controllable style or JavaScript settings into your main Liquid templates,\
    \ or write your SCSS and JavaScript in a way that passes the muster of any preprocessing\
    \ tools and Liquid. Stewart Knapman of Lucid Design breaks down the problem for\
    \ SCSS files in his post “Escaping Liquid in SCSS”[²](#A437216_1_En_8_Chapter.html#Fn2)\
    \ and provides some example workarounds such as Listing [8-6](#A437216_1_En_8_Chapter.html#Par44).\n\
    \n```scss\n/* assets/styles.scss.liquid */\nbody {\n  /* {% if settings.background-image\
    \ %} */\n  background: url(#{'{{ settings.background-image | asset_url }}'}) center\
    \ no-repeat;\n  /* {% else %} */\n  background: whitesmoke;\n  /* {% endif %}\
    \ */\n}\n```\n\nThe approach Stewart outlines here—wrapping Liquid in comments—is\
    \ generally applicable to other forms of preprocessing such as Less and JavaScript.\n\
    \n> **Note**\n> SVG files in the `assets` directory with a `.liquid` extension\
    \ will also be processed by Liquid and can therefore use theme settings.\n\n####\
    \ The Default Filter\n\nWhen your theme is installed for the first time, it’s\
    \ possible that several of your settings won’t have initial values. To handle\
    \ those cases, it’s a good idea to use a default value in your Liquid templates\
    \ to prevent generating invalid HTML or CSS. For example, if you make your body\
    \ background color a theme setting, you might do something like Listing [8-7](#A437216_1_En_8_Chapter.html#Par49).\n\
    \nNote that you can also specify default values for settings inside your `settings_schema.json`—e.g.,\
    \ with `default: 'white'`. In general, I recommend setting a default in both places\
    \ to avoid edge cases where no value is set.\n\n```css\n/* assets/styles.css.liquid\
    \ */\nbody {\n  background-color: {{ settings.body_background_color | default:\
    \ 'white' }};\n}\n```\n\n## Going Global\n\nTo say that Ecommerce is a global\
    \ affair is stating the obvious, but I have a word count to reach so I’ll state\
    \ it anyway. For theme developers, this means that our work needs to have out-of-the-box\
    \ support for a variety of different regions, languages, and currencies.\n\n###\
    \ The Difference Between i18n and l16n\n\nDo you know how long it took me to realize\
    \ that “i18n” was an abbreviation (technically, a numeronym) for internationalization?\
    \ Well, I won’t tell you exactly, because it’s embarrassing. Suffice it to say\
    \ it was a little while in to my professional software development career before\
    \ I started digging in to how to make the software and web sites I was building\
    \ accessible to folks without English as a first language.\n\nSo, as a quick refresher:\n\
    \n- `i18n` is shorthand for internationalization (there are 18 abbreviated letters,\
    \ hence the 18) and refers to the process of making software (including web sites)\
    \ capable of supporting multiple locales.\n- `l16n` is shorthand for localization\
    \ and refers to the actual implementation of a locale in to a software product\
    \ that supports `i18n`.\n\nFor clarity, in the context of Shopify themes:\n\n\
    - `i18n` is the process of making your theme support multiple locales using the\
    \ `| t` translation filter.\n- `l16n` is the process of creating a specific language\
    \ translation (e.g., Swedish) for your theme."
