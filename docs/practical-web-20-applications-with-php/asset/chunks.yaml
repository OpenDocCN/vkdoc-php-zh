    Now we create a new Smarty plug-in called `wysiwyg`, which we can call in our
    template using `{wysiwyg}`. Listing 8-25 shows the contents of `function.wysiwyg.php`,
    which we store in `./include/Templater/plugins`.


    **Listing 8-25.** A Smarty Plug-in to Create the FCKeditor in a Template (function.wysiwyg.php)


    ```

    <?php


    function smarty_function_wysiwyg($params, $smarty)


    {


    $name = '''';


    $value = '''';


    if (isset($params[''name'']))


    $name = $params[''name''];


    if (isset($params[''value'']))


    $value = $params[''value''];


    $fckeditor = new FCKeditor($name);


    $fckeditor->BasePath = ''/js/fckeditor/'';


    $fckeditor->ToolbarSet = ''phpweb20'';


    $fckeditor->Value = $value;


    return $fckeditor->CreateHtml();


    }


    ?>

    ```


    When we call this Smarty function in the template, we provide two arguments: the
    `name` parameter and the `value` parameter. The `name` parameter defines the name
    of the form element the user''s HTML is submitted in. The `value` parameter sets
    the default value to be shown in the WYSIWYG editor.


    After initializing these parameters, we instantiate the `FCKeditor` class. Next
    we must tell the `$fckeditor` object where the editor code is stored relative
    to the web root (we stored it in `http://phpweb20/js/fckeditor`). Next we must
    tell it to use the new toolbar we just created (`phpweb20`) rather than the default
    toolbar (`Default`). We then pass in the default value to the class. Finally,
    we call the `CreateHtml()` method to generate the FCKeditor HTML code, and we
    return it to the template.


    **Note:** You can also set the width and height of the editor. By default, a width
    of 100 percent and a height of 200 pixels are used. To change the height to 300
    pixels, you would use `$fckeditor->Height = 300;`.


    The only thing left to do now is to call `{wysiwyg}` in the `edit.tpl` template
    in the `./templates/blogmanager` directory. Listing 8-26 shows the changes we
