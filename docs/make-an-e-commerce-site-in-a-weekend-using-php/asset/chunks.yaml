    由于本章使用了 JavaScript，因此需要对其进行简要介绍。\n\nJavaScript 是一种编程语言，用于通过实现动态页面和执行验证检查来扩展网站的功能。JavaScript\
    \ 的一些特性包括：\n\n*   它是一种轻量级的、解释型编程语言。\n*   它通常在客户端机器上执行，因此消耗更少的服务器资源，并避免了过多的服务器流量。\n\
