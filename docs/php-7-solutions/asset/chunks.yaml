    \ argument. If multiple\narguments are passed to the callback, `array_map()` returns\n\
    an indexed array.\n\n1.  The code in `array_map_01.php`\n    shows a simple example\
    \ of using `array_map()` to double\n    numbers in an array using an anonymous\
    \ callback function. The code looks\n    like this:\n\n```\n    $numbers = [2,\
    \ 4, 7];\n    $doubled = array_map(function ($num) {\n    return $num * 2;\n \
    \   }, $numbers);\n    echo '';\n    print_r($numbers);\n    print_r($doubled);\n\
    \    echo '';\n    ```\n\nAs the following screenshot shows, the values in the\
    \ original `$numbers` array are\n    unchanged. The `$doubled` array\n    contains\
    \ the results returned by the callback.\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figf_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figf_HTML.jpg)\n\
    \n2.  The next example in array_map_02.php uses a defined function to modify\n\
    \    an associative array:\n\n```\n    $book = [\n    'author' => 'David Powers',\n\
    \    'title' => 'PHP 7 Solutions'\n    ];\n    $modified = array_map('modify',\
    \ $book);\n    function modify($val) {\n    return strtoupper($val);\n    }\n\
    \    echo '';\n    print_r($book);\n    print_r($modified);\n    echo '';\n  \
    \  ```\n\nAs the following screenshot shows, the array keys are preserved in\n\
    \    the modified array:\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figg_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figg_HTML.jpg)\n\
    \n3.  The code in `array_map_03.php` has\n    been modified to demonstrate how\
    \ to pass multiple arguments to the\n    callback function:\n\n```\n    $descriptions\
    \ = ['British', 'the fourth edition'];\n    $modified = array_map('modify', $book,\
    \ $descriptions);\n    function modify($val, $description) {\n    return \"$val\
    \ is $description.\";\n    }\n    ```\n\nA second parameter, `$description`, has\n\
    \    been added to the\n    `modify()`\n    function. The values to be passed\
    \ as arguments to the callback are\n    stored in an array called `$descriptions`,\
    \ which\n    is passed as the third argument to `array_map()`. This\n    produces\
    \ the following result:\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figh_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figh_HTML.jpg)\n\
    \nNotice that the array keys have not been preserved in the modified\n    array.\
    \ Passing multiple arguments to the callback results in an indexed\n    array.\n\
    \n4.  The third and subsequent arguments passed to `array_map()`  must contain\
    \ the same\n    number of elements as the array being modified. The code in `array_map_04.php`\n\
    \    shows what happens if an argument contains too few elements. It looks\n \
    \   like this:\n\n```\n    $descriptions = ['British', 'the fourth edition'];\n\
    \    $label = ['Description'];\n    $modified = array_map('modify', $book, $descriptions,\
    \ $label);\n    function modify($val, $description, $label) {\n    return \"$label:\
    \ $val is $description.\";\n    }\n    ```\n\nThere’s only one element in the\
    \ `$label` array; but as\n    the following screenshot shows, this doesn’t result\
    \ in the same value\n    being reused.\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figi_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figi_HTML.jpg)\n\
    \nWhen an array passed as an argument to `array_map()` has fewer\n    elements\
    \ than the first array (the one being modified), the shorter\n    array is filled\
    \ with empty elements. Consequently, the label is omitted\n    from the second\
    \ element in the modified array; but PHP doesn’t trigger\n    an error.\n\nMerging\
    \ Arrays\nPHP offers several different ways of combining the elements of two or\n\
    more arrays; but they don’t always produce the same result.\nUnderstanding how\
    \ each method works will avoid mistakes and\nconfusion.\n\nUsing the Array Union\
    \ Operator\n\nThe simplest way to merge arrays is with the array\nunion operator,\
    \ a plus sign (`+`). However, the\nresults aren’t what you might expect. The code\
    \ in `merge_01.php` in the\n`ch08` folder\ndemonstrates what happens when you\
    \ use the array union operator on two\nindexed arrays:\n\n```\n$first = ['PHP',\
    \ 'JavaScript'];\n$second = ['Java', 'R', 'Python'];\n$languages = $first + $second;\n\
    echo '';\nprint_r($languages);\necho '';\n```\n\nRunning this script produces\
    \ the following output:\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figj_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figj_HTML.jpg)\n\
    Instead of five elements, the resulting\narray contains just three. This is because\
    \ the array union operator\ndoesn’t concatenate the second array onto the end\
    \ of the first one. With\nan indexed array, it ignores elements in the second\
    \ array that have the\nsame index as elements in the first. In this example, Java\
    \ and R in the\nsecond array have the same indices (0 and 1) as PHP and JavaScript,\
    \ so\nthey’re ignored. Only Python has an index (2) that doesn’t exist in the\n\
    first array, so it’s added to the merged array.\n\nThe array union operator treats\
    \ associative arrays similarly. The code\nin `merge_02.php`\ncontains two associative\
    \ arrays like this:\n\n```\n$first = ['PHP' => 'Rasmus Lerdorf', 'JavaScript'\
    \ => 'Brendan Eich'];\n$second = ['Java' => 'James Gosling', 'R' => 'Ross Ihaka',\
    \ 'Python' => 'Guido van Rossum'];\n$lead_developers = $first + $second;\n```\n\
    \nBoth arrays contain a unique set of keys, so the resulting array\ncontains every\
    \ element with its associated key, as the following\nscreenshot shows:\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figk_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figk_HTML.jpg)\n\
    \nHowever, when there’s a duplicate key, the array union operator ignores\nthe\
    \ element in the second array, as demonstrated by the code in `merge_03.php`:\n\
    \n```\n$first = ['PHP' => 'Rasmus Lerdorf', 'JavaScript' => 'Brendan Eich', 'R'\
    \ => 'Robert Gentleman'];\n$second = ['Java' => 'James Gosling', 'R' => 'Ross\
    \ Ihaka', 'Python' => 'Guido van Rossum'];\n$lead_developers = $first + $second;\n\
    ```\n\nAs the following screenshot shows, only Robert\nGentleman is credited as\
    \ lead developer of R. Ross Ihaka in the second\narray is ignored because he shares\
    \ a duplicate key.\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figl_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figl_HTML.jpg)\n\
    Ignoring duplicate indices or keys isn’t always what you want, so PHP\noffers\
    \ a couple of functions designed to produce a fully merged array of\nall elements.\n\
    \nUsing array_merge() and array_merge_recursive()\nThe functions  `array_merge()`\
    \ \nand  `array_merge_recursive()`\n   concatenate two or\nmore arrays to create\
    \ a new array. The difference between them lies in\nthe way they treat duplicate\
    \ values in associative arrays.\n\nWith indexed arrays, `array_merge()`\nautomatically\
    \ renumbers each element’s index and includes every value,\nincluding duplicates.\
    \ This is demonstrated by the following code in\n`merge_04.php`:\n\n```\n$first\
    \ = ['PHP', 'JavaScript', 'R'];\n$second = ['Java', 'R', 'Python', 'PHP'];\n$languages\
    \ = array_merge($first, $second);\n```"
  trans: "\n# PHP 解决方案 8-3：使用 `array_map()` 修改数组元素\n\n通过引用将数组值传递给 `foreach` 循环或 `array_walk()`\
    \ 会修改原始数组。这通常正是你想要的。然而，如果你想保留原始数组，可以考虑使用 `array_map()`。它会将回调函数应用于每个数组元素，并返回一个包含已修改元素的新数组。`array_map()`\
    \ 的第一个参数是回调函数，可以是匿名函数或已定义函数的名称。第二个参数是要修改其元素的数组。\n\n如果回调函数接受多个参数，则每个参数的值必须按照回调函数要求的相同顺序以数组形式传递给\
    \ `array_map()`。即使你想为后续参数每次都使用相同的值，也必须将其作为一个与正在修改的数组具有相同元素数量的数组传递给 `array_map()`。\n\
    \n对于关联数组，只有当回调函数接受单个参数时，`array_map()` 才会保留键名。如果向回调函数传递多个参数，`array_map()` 会返回一个索引数组。\n\
    \n1. `array_map_01.php` 中的代码展示了一个使用 `array_map()` 的简单示例，该示例通过匿名回调函数将数组中的数字翻倍。代码如下所示：\n\
    \n```php\n$numbers = [2, 4, 7];\n$doubled = array_map(function ($num) {\n    return\
    \ $num * 2;\n}, $numbers);\necho '';\nprint_r($numbers);\nprint_r($doubled);\n\
    echo '';\n```\n\n如下面的截图所示，原始 `$numbers` 数组中的值保持不变。`$doubled` 数组包含回调函数返回的结果。\n\n\
    ![../images/332054_4_En_8_Chapter/332054_4_En_8_Figf_HTML.jpg](img/332054_4_En_8_Figf_HTML.jpg)\n\
    \n2. `array_map_02.php` 中的下一个示例使用一个已定义的函数来修改关联数组：\n\n```php\n$book = [\n    'author'\
    \ => 'David Powers',\n    'title' => 'PHP 7 Solutions'\n];\n$modified = array_map('modify',\
    \ $book);\nfunction modify($val) {\n    return strtoupper($val);\n}\necho '';\n\
    print_r($book);\nprint_r($modified);\necho '';\n```\n\n如下面的截图所示，修改后的数组保留了数组的键名：\n\
    \n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figg_HTML.jpg](img/332054_4_En_8_Figg_HTML.jpg)\n\
    \n3. `array_map_03.php` 中的代码已被修改，以演示如何向回调函数传递多个参数：\n\n```php\n$descriptions =\
    \ ['British', 'the fourth edition'];\n$modified = array_map('modify', $book, $descriptions);\n\
    function modify($val, $description) {\n    return \"$val is $description.\";\n\
    }\n```\n\n`modify()` 函数中添加了第二个参数 `$description`。作为参数传递给回调函数的值存储在一个名为 `$descriptions`\
    \ 的数组中，该数组作为第三个参数传递给 `array_map()`。这将产生以下结果：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figh_HTML.jpg](img/332054_4_En_8_Figh_HTML.jpg)\n\
    \n注意，修改后的数组中没有保留数组键名。向回调函数传递多个参数会生成一个索引数组。\n\n4. 传递给 `array_map()` 的第三个及后续参数必须包含与正在修改的数组相同数量的元素。`array_map_04.php`\
    \ 中的代码展示了如果某个参数包含的元素过少会发生什么。代码如下所示：\n\n```php\n$descriptions = ['British', 'the\
    \ fourth edition'];\n$label = ['Description'];\n$modified = array_map('modify',\
    \ $book, $descriptions, $label);\nfunction modify($val, $description, $label)\
    \ {\n    return \"$label: $val is $description.\";\n}\n```\n\n`$label` 数组中只有一个元素；但如下面的截图所示，这并不会导致相同的值被重复使用。\n\
    \n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figi_HTML.jpg](img/332054_4_En_8_Figi_HTML.jpg)\n\
    \n当作为参数传递给 `array_map()` 的数组元素数量少于第一个数组（即正在修改的那个数组）时，较短的数组会用空元素填充。因此，修改后数组中的第二个元素缺少了标签；但\
    \ PHP 不会触发错误。\n\n# 合并数组\n\nPHP 提供了几种不同的方式来组合两个或多个数组的元素；但它们并不总是产生相同的结果。理解每种方法的工作原理可以避免错误和混淆。\n\
    \n## 使用数组联合运算符\n\n合并数组最简单的方法是使用数组联合运算符，即加号（`+`）。然而，结果可能并非你所预期。`ch08` 文件夹中 `merge_01.php`\
    \ 的代码演示了在索引数组上使用数组联合运算符时会发生什么：\n\n```php\n$first = ['PHP', 'JavaScript'];\n$second\
    \ = ['Java', 'R', 'Python'];\n$languages = $first + $second;\necho '';\nprint_r($languages);\n\
    echo '';\n```\n\n运行此脚本会产生以下输出：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figj_HTML.jpg](img/332054_4_En_8_Figj_HTML.jpg)\n\
    \n结果数组不是包含五个元素，而是仅包含三个。这是因为数组联合运算符不会将第二个数组连接到第一个数组的末尾。对于索引数组，它会忽略第二个数组中与第一个数组元素具有相同索引的元素。在此示例中，第二个数组中的\
    \ Java 和 R 与 PHP 和 JavaScript 具有相同的索引（0 和 1），因此它们被忽略。只有 Python 有一个在第一个数组中不存在的索引（2），所以它被添加到合并后的数组中。\n\
    \n数组联合运算符对关联数组的处理方式类似。`merge_02.php` 中的代码包含两个关联数组，如下所示：\n\n```php\n$first = ['PHP'\
    \ => 'Rasmus Lerdorf', 'JavaScript' => 'Brendan Eich'];\n$second = ['Java' =>\
    \ 'James Gosling', 'R' => 'Ross Ihaka', 'Python' => 'Guido van Rossum'];\n$lead_developers\
    \ = $first + $second;\n```\n\n两个数组都包含一组唯一的键名，因此结果数组包含每个元素及其关联的键名，如下面的截图所示：\n\n\
    ![../images/332054_4_En_8_Chapter/332054_4_En_8_Figk_HTML.jpg](img/332054_4_En_8_Figk_HTML.jpg)\n\
    \n然而，当存在重复键名时，数组联合运算符会忽略第二个数组中的元素，如 `merge_03.php` 中的代码所示：\n\n```php\n$first =\
    \ ['PHP' => 'Rasmus Lerdorf', 'JavaScript' => 'Brendan Eich', 'R' => 'Robert Gentleman'];\n\
    $second = ['Java' => 'James Gosling', 'R' => 'Ross Ihaka', 'Python' => 'Guido\
    \ van Rossum'];\n$lead_developers = $first + $second;\n```\n\n如下面的截图所示，只有 Robert\
    \ Gentleman 被记为 R 语言的首席开发者。第二个数组中的 Ross Ihaka 因为共享了一个重复键名而被忽略。\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figl_HTML.jpg](img/332054_4_En_8_Figl_HTML.jpg)\n\
    \n忽略重复索引或键名并不总是你想要的，因此 PHP 提供了一些旨在生成所有元素完全合并数组的函数。\n\n## 使用 `array_merge()` 和\
    \ `array_merge_recursive()`\n\n函数 `array_merge()` 和 `array_merge_recursive()`\
    \ 连接两个或多个数组以创建一个新数组。它们之间的区别在于处理关联数组中重复值的方式。\n\n对于索引数组，`array_merge()` 会自动重新编号每个元素的索引，并包含所有值，包括重复值。`merge_04.php`\
    \ 中的以下代码演示了这一点：\n\n```php\n$first = ['PHP', 'JavaScript', 'R'];\n$second = ['Java',\
    \ 'R', 'Python', 'PHP'];\n$languages = array_merge($first, $second);\n```\n"
- fmt: "如下所示，输入文本需要像这样：\n\n如下所示，索引是连续编号的，重复的值（PHP 和 R）会保留在结果数组中：\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figm_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figm_HTML.jpg)\n\
    \n对于关联数组，`array_merge()`的行为取决于是否存在重复的数组键。当没有重复时，`array_merge()`拼接关联数组的方式与使用数组联合运算符完全相同。您可以通过运行`merge_05.php`中的代码来验证这一点。\n\
    \n然而，存在重复键时，只会保留最后一个重复值。这在`merge_06.php`的以下代码中得到了演示：\n\n```\n$first = ['PHP' =>\
    \ 'Rasmus Lerdorf', 'JavaScript' => 'Brendan Eich', 'R' => 'Robert Gentleman'];\n\
    $second = ['Java' => 'James Gosling', 'R' => 'Ross Ihaka', 'Python' => 'Guido\
    \ van Rossum'];\n$lead_developers = array_merge($first, $second);\n```\n\n如下所示，第二个数组中R的值（Ross\
    \ Ihaka）会覆盖第一个数组中的值（Robert Gentleman）：\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fign_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Fign_HTML.jpg)\n\
    \n**注意**  \n数组的合并顺序与数组联合运算符不同。数组联合运算符保留第一个重复值，而`array_merge()`保留最后一个重复值。\n\n要保留重复键的值，需要使用`array_merge_recursive()`。`merge_07.php`中的代码合并了相同的数组，如下所示：\n\
    \n```\n$lead_developers = array_merge_recursive($first, $second);\n```\n\n如下所示，重复键的值被合并到一个索引子数组中：\n\
    ![../images/332054_4_En_8_Chapter/332054_4_En_8_Figo_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figo_HTML.jpg)\n\
    Robert Gentleman 的名字被存储在新数组中，即`$lead_developers['R'][0]`。\n\n**注意**  \n数组联合运算符、`array_merge()`和`array_merge_recursive()`可应用于两个以上的数组。关于重复键和值的规则相同。对于`array_merge()`，始终保留最后一个重复值。\n\
    \n## 将两个索引数组合并为关联数组\n\n`array_combine()`函数将两个索引数组合并成一个关联数组，它使用第一个数组作为键，第二个数组作为值。两个数组必须具有相同数量的值，否则函数返回`false`并触发警告。\n\
    \n以下`array_combine.php`中的简单示例展示了其工作原理：\n\n```\n$colors = ['red', 'amber', 'green'];\n\
    $actions = ['stop', 'caution', 'go'];\n$signals = array_combine($colors, $actions);\n\
    // $signals 为 ['red' => 'stop', 'amber' => 'caution', 'green' => 'go']\n```\n\n\
    **提示**  \n请参见 PHP 解决方案 7-2 “从 CSV 文件中提取数据”，了解`array_combine()`的实际应用。\n\n## 比较数组\n\
    \n表 [8-1](#332054_4_En_8_Chapter.xhtml#Tab1) 列出了可用于查找数组差异或交集的 PHP 核心函数。表中的所有函数都接受两个或更多数组作为参数。如果使用回调函数进行比较，则回调函数应作为传递给函数的最后一个参数。\n\
    \n**表 8-1.** 用于比较数组的 PHP 函数\n\n| 函数 | 描述 |\n| --- | --- |\n| `array_diff()` |\
    \ 将第一个数组与一个或多个其他数组进行比较。返回第一个数组中存在而其他数组中不存在的值数组。 |\n| `array_diff_assoc()` | 类似于`array_diff()`，但在比较中同时使用数组键和值。\
    \ |\n| `array_diff_key()` | 类似于`array_diff()`，但基于键而非值进行比较。 |\n| `array_diff_uassoc()`\
    \ | 与`array_diff_assoc()`相同，但使用用户提供的回调函数来比较键。 |\n| `array_diff_ukey()` | 与`array_diff_key()`相同，但使用用户提供的回调函数来比较键。\
    \ |\n| `array_intersect()` | 比较两个或多个数组。返回一个包含第一个数组中所有在其他数组中也存在的值的数组。键会被保留。 |\n\
    | `array_intersect_assoc()` | 类似于`array_intersect()`，但在比较中同时使用数组键和值。 |\n| `array_intersect_key()`\
    \ | 返回一个包含第一个数组中所有键在其他数组中也存在的条目。 |\n| `array_intersect_uassoc()` | 与`array_intersect_assoc()`相同，但使用用户提供的回调函数来比较键。\
    \ |\n| `array_intersect_ukey()` | 与`array_intersect_key()`相同，但使用用户提供的回调函数来比较键。\
    \ |\n\n我不会详细介绍每个函数，但让我们通过比较以下两个数组，看看`array_diff_assoc()`和`array_diff_key()`返回的不同结果：\n\
    \n```\n$first = [\n'PHP' => 'Rasmus Lerdorf',\n'JavaScript' => 'Brendan Eich',\n\
    'R' => 'Robert Gentleman'];\n$second = [\n'Java' => 'James Gosling',\n'R' => 'Ross\
    \ Ihaka',\n'Python' => 'Guido van Rossum'];\n$diff = array_diff_assoc($first,\
    \ $second); // $diff 等同于 $first\n```\n\n`array_diff_assoc()`会同时检查键和值，返回存在于第一个数组但不存在于其他数组中的元素。在此示例中，尽管两个数组都包含键R，但第一个数组中的所有三个元素都被返回，这是因为分配给R的值不同。\n\
    \n```\n$diff = array_diff_key($first, $second);\n// $diff 为 ['PHP' => 'Rasmus\
    \ Lerdorf','JavaScript' => 'Brendan Eich']\n```\n\n然而，`array_diff_key()`只检查键，忽略值。结果，它返回第一个数组的前两个元素，但不返回第三个，因为R作为键存在于第二个数组中。分配给R的值不同这一事实无关紧要。\n\
