    shipping_address_line1 varchar(255),

    shipping_address_line2 varchar(255),

    shipping_city varchar(50),

    shipping_state varchar(50),

    shipping_country varchar(50),

    shipping_zipcode varchar(10),

    primary key (order_no)

    );

    create table orders_details (

    order_no int(6) not null,

    item_code varchar(20) not null,

    item_name varchar(100) not null,

    quantity SMALLINT not null,

    price DECIMAL(7,2)

    );

    create table payment_details (

    order_no int(6) not null,

    order_date date,

    amount_paid DECIMAL(7,2),

    email_address varchar(50),

    customer_name varchar(50),

    payment_type varchar(20),

    name_on_card varchar(30),

    card_number varchar(20),

    expiration_date varchar(10)

    );

    ```


    You need to just run this script to create the database and tables. Follow the
    next steps to do so.


    ### Steps to Run the MySQL Script


    To run the SQL script, you need to open the MySQL console. So, click the WampServer
    icon in the task bar and select the MySQL->MySQL console option from the menu
    that pops up.


    You will be asked to enter the user root’s password. After entering the password,
    you will be greeted with the `mysql>` prompt in the MySQL console window, as shown
    in Figure [1-27](#A978-1-4842-1672-9_1_Chapter.html#Fig27).


    ![A978-1-4842-1672-9_1_Fig27_HTML.jpg](A978-1-4842-1672-9_1_Fig27_HTML.jpg)


    Figure 1-27. MySQL console window for running SQL commands/scripts


    To execute a SQL script, you need to use the `source` command. The syntax for
    the `source` command is:


    `source [path] sqlscript.sql`


    Assuming the `creatingtables.sql` file is placed in the `D:` drive, you can execute
    it using the following command:


    `source D:\\creatingtables.sql`


    The SQL commands in the `creatingtables.sql` file will execute and will create
    the `shopping` database and the tables discussed previously. For each successful
    execution of SQL command, you get the Query OK output, as shown in Figure [1-28](#A978-1-4842-1672-9_1_Chapter.html#Fig28).


    * The `show databases` command, when executed, displays the existing databases
    in the MySQL server. The `shopping` database confirms that the `shopping` database
    is successfully created.

    * The `use` command makes the specified database the active or current database.
    The `use shopping` SQL command makes the `shopping` database active.

    * The `show tables` command, when executed, displays all the tables that exist
    in the currently active database. You can see that all the seven database tables
    are successfully created in the `shopping` database.


    ![A978-1-4842-1672-9_1_Fig28_HTML.jpg](A978-1-4842-1672-9_1_Fig28_HTML.jpg)


    Figure 1-28. Executing SQL script for creating the shopping database and its tables


    After the successful creation of database and its tables, you need to fill in
    some dummy product information in the `products` and `productsfeatures` tables.
    To do so, you need to execute another SQL script provided with this book, called
    `insertingrows.sql`. This is done in exactly the same was as for the `creatingtables.sql`
    script.


