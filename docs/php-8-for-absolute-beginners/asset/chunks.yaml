    \ is raised. If the userid and/or password is not valid, a\ndifferent exception\
    \ is raised. We will handle these exceptions soon.\n\n```\nprivate function checkAvailable\
    \ (string $email, string $userid) : bool {\n$sql = \"SELECT email FROM admin WHERE\
