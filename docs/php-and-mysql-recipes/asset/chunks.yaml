    ```


    ![Image 9](index-47_1.jpg)


    In most cases it''s also necessary to install the redistribution libraries provided
    by Microsoft. It is important to install the right version of these but you can
    install them all and some of them might be installed already from other programs
    and tools installed on the system. The links to the different versions can be
    found in the left pane on the site [http://windows.php.net](http://windows.php.net).'
