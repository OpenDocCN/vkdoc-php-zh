  trans: "\n| `l`（小写字母 L） | `%A` | 星期几的全名 | Sunday, Tuesday |\n| Month（月份） | `m` |\
    \ `%m` | 带前导零的月份数字 | 01 到 12 |\n| | `n` | | 不带前导零的月份数字 | 1 到 12 |\n| `M` | `%b`\
    \ | 月份名称的前三个字母 | Jan, Jul |\n| `F` | `%B` | 月份的全名 | January, July |\n| Year（年份）\
    \ | `Y` | `%Y` | 四位数字显示的年份 | 2014 |\n| `y` | `%y` | 两位数字显示的年份 | 14 |\n| Hour（小时）\
    \ | `g` | | 12 小时制，不带前导零 | 1 到 12 |\n| `h` | `%I` | 12 小时制，带前导零 | 01 到 12 |\n\
    | `G` | | 24 小时制，不带前导零 | 0 到 23 |\n| `H` | `%H` | 24 小时制，带前导零 | 01 到 23 |\n| Minutes（分钟）\
    \ | `i` | `%M` | 必要时带前导零的分钟数 | 00 到 59 |\n| Seconds（秒） | `s` | `%S` | 必要时带前导零的秒数\
    \ | 00 到 59 |\n| AM/PM（上午/下午） | `a` | | 小写 | am |\n| AM/PM（上午/下午） | `A` | `%p`\
    \ | 大写 | PM |\n\n**注意：** Windows 系统不支持 `%e`。\n\n你可以将这些格式字符与标点符号结合使用，根据自己的偏好，在网页中显示当前日期。\n\
    \n要格式化一个 `DateTime` 对象，可以向 `format()` 方法传递一个格式字符串作为参数，如下所示（代码位于 `ch16` 文件夹中的 `date_format_01.php`）：\n\
    \n```\n现在是 format('g.ia') ?>，今天是 format('l, F jS, Y') ?>\n2019 年的圣诞节是 format('l')\
    \ ?>\n```\n\n在这个示例中，创建了两个 `DateTime` 对象：一个用于当前日期和时间，另一个用于 2019 年 12 月 25 日。使用表\
    \ 16-4 中的格式字符，从这两个对象中提取出不同的日期部分，生成了如下截图所示的输出：\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Figa_HTML.jpg](img/332054_4_En_16_Figa_HTML.jpg)\n\
    \n`date_format_02.php` 中的代码通过使用 `date()` 和 `strtotime()` 函数生成了相同的输出，如下所示：\n\n\
    ```\n现在是 \n2019 年的圣诞节是 \n```\n\n第一行使用 `strtotime()` 为 2019 年 12 月 25 日创建了一个时间戳。无需为当前日期和时间创建时间戳，因为当没有第二个参数时，`date()`\
    \ 函数默认使用当前日期和时间。\n\n如果圣诞日的时间戳在脚本的其他地方没有用到，则第一行可以省略，对 `date()` 的最后一次调用可以重写如下（参见\
    \ `date_format_03.php`）：\n\n```\ndate('l', strtotime('12/25/2019'))\n```\n\n##\
    \ 从自定义格式创建 DateTime 对象\n\n你可以使用表 16-4 中的格式字符，为 `DateTime` 对象指定一个自定义输入格式。创建该对象时，不是使用\
    \ `new` 关键字，而是使用 `createFromFormat()` 静态方法，如下所示：\n\n```\n$date = DateTime::createFromFormat(format_string,\
    \ input_date, timezone);\n```\n\n第三个参数 *timezone* 是可选的。如果包含该参数，它应该是一个 `DateTimeZone`\
    \ 对象。\n\n**静态方法**属于整个类，而不是某个特定的对象。调用静态方法时，需要使用类名，后跟作用域解析运算符（双冒号）和方法名。\n\n> **提示**\n\
    > 在内部，作用域解析运算符被称为 `PAAMAYIM_NEKUDOTAYIM`，这是希伯来语，意为 \"双冒号\"。为什么是希伯来语？驱动 PHP 的 Zend\
    \ 引擎最初由 Zeev Suraski 和 Andi Gutmans 在以色列理工学院就读时开发。除了能在极客知识问答中得分外，了解 `PAAMAYIM_NEKUDOTAYIM`\
    \ 的含义还能在你看到 PHP 错误信息中出现它时，省去你绞尽脑汁的烦恼。\n\n例如，你可以使用 `createFromFormat()` 方法来接受使用欧洲日期格式（日、月、年，用斜杠分隔）的日期，如下所示（代码位于\
    \ `date_format_04.php`）：\n\n```\n$xmas2019 = DateTime::createFromFormat('d/m/Y',\
    \ '25/12/2019');\necho $xmas2019->format('l, jS F Y');\n```\n\n这将产生以下输出：\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Figb_HTML.jpg](img/332054_4_En_16_Figb_HTML.jpg)\n\
    \n> **警告**\n> 尝试使用 25/12/2014 作为 `DateTime` 构造函数的输入会触发致命错误，因为不支持 `DD/MM/YYYY`\
    \ 格式。如果你想使用 `DateTime` 构造函数不支持的格式，则必须使用 `createFromFormat()` 静态方法。\n\n尽管 `createFromFormat()`\
    \ 方法很有用，但它只能在你确保日期始终是特定格式的情况下使用。\n\n## 在 date() 和 DateTime 类之间进行选择\n\n在显示日期时，使用\
    \ `DateTime` 类始终是一个两步过程。你需要在调用 `format()` 方法之前实例化该对象。而使用 `date()` 函数，则只需一步就能完成。由于它们使用相同的格式字符，在处理当前日期和/或时间时，`date()`\
    \ 函数显然更胜一筹。\n\n对于显示当前日期、时间或年份等简单任务，请使用 `date()`。而 `DateTime` 类的真正优势在于处理与日期相关的计算和时区时，可使用表\
    \ 16-5 中列出的方法。\n\n**表 16-5.** 主要的 `DateTime` 方法\n\n| 方法 | 参数 | 描述 |\n| --- | ---\
    \ | --- |\n| `format()` | 格式字符串 | 使用表 16-4 中的格式字符来格式化日期/时间。 |\n| `setDate()` |\
    \ 年、月、日 | 更改日期。参数应用逗号分隔。超出允许范围的月份或天数将累加到生成的日期中，如正文所述。 |\n| `setTime()` | 小时、分钟、秒\
    \ | 重置时间。参数为逗号分隔的值。秒是可选的。超出允许范围的值将累加到生成的日期/时间中。 |\n| `modify()` | 相对日期字符串 | 使用相对表达式（例如\
    \ `'+2 weeks'`）更改日期/时间。 |\n| `getTimestamp()` | 无 | 返回日期/时间的 Unix 时间戳。 |\n| `setTimestamp()`\
    \ | Unix 时间戳 | 根据 Unix 时间戳设置日期/时间。 |\n| `setTimezone()` | `DateTimeZone` 对象 |\
    \ 更改时区。 |\n| `getTimezone()` | 无 | 返回代表 `DateTime` 对象时区的 `DateTimeZone` 对象。 |\n\
    | `getOffset()` | 无 | 返回与 UTC 的时区偏移量，以秒为单位。 |\n| `add()` | `DateInterval` 对象 |\
    \ 按设定时间段增加日期/时间。 |\n| `sub()` | `DateInterval` 对象 | 从日期/时间中减去设定时间段。 |\n| `diff()`\
    \ | `DateTime` 对象，布尔值 | 返回一个 `DateInterval` 对象，表示当前 `DateTime` 对象与作为参数传入的 `DateTime`\
    \ 对象之间的差值。使用可选的第二个参数 `true` 会将负值转换为正数。 |\n\n使用 `setDate()` 和 `setTime()` 添加超出范围的值会导致溢出值累加到结果日期或时间中。例如，使用\
    \ 14 作为月份会将日期设置为下一年的二月。将小时设置为 26 会导致结果为次日凌晨 2 点。\n\n`setDate()` 有一个有用的技巧：通过将月份值设置为下一个月，并将日期设置为\
    \ 0，你就可以将日期设置为任何月份的最后一天。`setDate.php` 中的代码通过显示 2019 年和 2020 年（闰年）二月的最后一天来演示这一点：\n\
    \n```\nsetDate(2019, 3, 0);\n?>\n非闰年：format($format) ?>。\n闰年：setDate(2020, 3,\
    \ 0);\necho $date->format($format); ?>。\n```\n\n前面的示例产生以下输出：\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Figc_HTML.jpg](img/332054_4_En_16_Figc_HTML.jpg)\n"
- fmt: '### Handling Overflows with Relative Dates


    The `modify()` method accepts a relative date string, which can produce unexpected
    results. For example, if you add one month to a `DateTime` object that represents
    January 31, 2019, the resulting value is not the last day of February, but March
    3.


    This happens because adding one month to the original date results in February
    31, but February has only 28 days in a non-leap year. So, the out-of-range value
    is added to the month, resulting in March 3. If you subsequently subtract one
    month from the same `DateTime` object, it brings you back to February 3, not to
    the original starting date. The code in `date_modify_01.php` illustrates this
    point, as Figure 16-9 shows.


    ![Figure 16-9](images/332054_4_En_16_Chapter/332054_4_En_16_Fig9_HTML.jpg)


    **Figure 16-9.** Adding and subtracting months can lead to unexpected results


    ```

    Original date: format($format) ?>.

    Add one month: modify(''+1 month'');

    echo $date->format($format);

    $date->modify(''-1 month'');

    ?>

    Subtract one month: format($format) ?>

    ```


    The way to avoid this problem is to use `''last day of''` in the relative expression,
    like this (the code is in `date_modify_02.php`):


    ```

    Original date: format($format) ?>.

    Add one month: modify(''last day of +1 month'');

    echo $date->format($format);

    $date->modify(''last day of -1 month'');

    ?>

    Subtract one month: format($format) ?>

    ```


    As Figure 16-10 shows, this now produces the desired result.


    ![Figure 16-10](images/332054_4_En_16_Chapter/332054_4_En_16_Fig10_HTML.jpg)


    **Figure 16-10.** Using ‘last day of’ in the relative expression eliminates the
    problem


    ### Using the `DateTimeZone` Class


    A `DateTime` object automatically uses the web server’s default time zone unless
    you have reset the time zone using one of the methods described earlier. However,
    you can set the time zone of individual `DateTime` objects either through the
    optional second argument of the constructor or by using the `setTimezone()` method.
    In both cases, the argument must be a `DateTimeZone` object.


    To create a `DateTimeZone` object, pass one of the supported time zones listed
    at `www.php.net/manual/en/timezones.php` as an argument to the constructor like
    this:


    ```

    $UK = new DateTimeZone(''Europe/London'');

    $USeast = new DateTimeZone(''America/New_York'');

    $Hawaii = new DateTimeZone(''Pacific/Honolulu'');

    ```


    When checking the list of supported time zones, it’s important to realize that
    they’re based on geographic regions and cities rather than on official time zones.
    This is because PHP automatically takes daylight saving time into account. Arizona,
    which doesn’t use daylight saving time, is covered by `America/Phoenix`. The organization
    of time zones into geographic regions produces some surprises. America doesn’t
    mean the United States, but the continents of North and South America and the
    Caribbean. As a result, Honolulu is not listed in America, but as a Pacific time
    zone. Europe also means the European continent, including the British Isles but
    excluding other islands. So, Reykjavik and Madeira are listed as Atlantic time
    zones, and Longyearbyen on the Norwegian island of Svalbard has the exclusive
    privilege of being the only Arctic time zone.


    The code in `timezones.php` creates `DateTimeZone` objects for London, New York,
    and Honolulu and then initializes a `DateTime` object using the first one, like
    this:


    ```

    $now = new DateTime(''now'', $UK);

    ```


    After displaying the date and time using `echo` and the `format()` method, the
    time zone is changed using the `setTimezone()` method, like this:


    ```

    $now->setTimezone($USeast);

    ```


    The next time `$now` is displayed, it shows the date and time in New York. Finally,
    `setTimezone()` is used again to change the time zone to Honolulu, producing the
    following output:


    ![Output](images/332054_4_En_16_Chapter/332054_4_En_16_Figd_HTML.jpg)


    **Caution:** The accuracy of time zone conversions depends on the time zone database
    compiled into PHP being up to date. The European Union plans to abolish daylight
    saving time from 2021, but member countries will have the freedom to choose whether
    to remain on permanent standard time or summer time. This is likely to produce
    the incorrect time on some servers if they are not updated.


    To find the time zone of your server, you can either check `php.ini` or use the
    `getTimezone()` method with a `DateTime` object. The `getTimezone()` method returns
    a `DateTimeZone` object, not a string containing the time zone. To get the value
    of the time zone, you need to use the `DateTimeZone` object’s `getName()` method,
    like this (the code is in `timezone_display.php`):


    ```

    $now = new DateTime();

    $timezone = $now->getTimezone();

    echo $timezone->getName();

    ```


    The `DateTimeZone` class has several other methods that expose information about
    a time zone. For the sake of completeness, they’re listed in Table 16-6, but the
    main use of the `DateTimeZone` class is to set the time zone for `DateTime` objects.


    **Table 16-6.** `DateTimeZone` methods


    | Method | Arguments | Description |

    | --- | --- | --- |

    | `getLocation()` | None | Returns an associative array containing the country
    code, latitude, longitude, and comments about the time zone. |

    | `getName()` | None | Returns a string containing the geographic area and city
    of the time zone. |

    | `getOffset()` | `DateTime` object | Calculates the offset from UTC (in seconds)
    of the `DateTime` object passed as an argument. |

    | `getTransitions()` | Start, end | Returns a multidimensional array containing
    historical and future dates and times of switching to and from daylight saving
    time. Accepts two timestamps as optional arguments to limit the range of results.
    |

    | `listAbbreviations()` | None | Generates a large multidimensional array containing
    the UTC offsets and names of time zones supported by PHP. |

    | `listIdentifiers()` | `DateTimeZone` constant, country code | Returns an array
    of all PHP time zone identifiers, such as `Europe/London`, `America/New_York`,
    and so on. Accepts two optional arguments to limit the range of results. Use as
    the first argument one of the `DateTimeZone` constants listed at `www.php.net/manual/en/class.datetimezone.php`.
    If the first argument is `DateTimeZone::PER_COUNTRY`, a two-letter country code
    can be used as the second argument. |


    The last two methods in Table 16-6 are static methods. Call them directly on the
    class by using the scope resolution operator, like this:


    ```

    $abbreviations = DateTimeZone::listAbbreviations();

    ```


    ### Adding and Subtracting Set Periods with the `DateInterval` Class


    The `DateInterval` class is used to specify the period to be added or subtracted
    from a `DateTime` object using the `add()` and `sub()` methods. It’s also used
    by the `diff()` method, which returns a `DateInterval` object. Using the `DateInterval`
    class feels rather odd to begin with, but it’s relatively simple to understand.


    To create a `DateInterval` object, you need to pass to the constructor a string
    that specifies the length of the interval; this string must be formatted according
    to the ISO 8601 standard. The string always begins with the letter `P` (for period),
    followed by one or more pairs of integers and letters known as **period designators**.
    If the interval includes hours, minutes, or seconds, the time element is preceded
    by the letter `T`. Table 16-7 lists the valid period designators.'
