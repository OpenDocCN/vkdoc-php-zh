  trans: "\n## 6.2 在应用中实现缓存\n\n我们将要实现的缓存架构如图 6-1 所示，这既是因为它更容易实现，也是因为从长远来看它更易于管理。我们的做法是，在\
    \ `template_node` 机器上执行配置变更，然后简单地关闭现有的 `webnodeX` 主机，并用从 `template_node` 复制的新主机替换它们。这比遍历每台服务器并逐一修改配置要容易得多（也更不容易出错）。\n\
    \n我们需要做的第一件事是安装缓存服务。我们将使用 `memcached` 作为缓存服务，因为它易于运行、访问和管理。要以 root 身份安装 `memcached`\
    \ 并启动它，只需输入以下命令：\n\n```\nyum install -y memcached\nsystemctl enable memcached\n\
    systemctl start memcached\n```\n\n你还需要 `memcached` 的 PHP 扩展。这些扩展需要编译，因此我们需要安装一些额外的扩展（同样以\
    \ root 身份）。\n\n![../images/487291_1_En_6_Chapter/487291_1_En_6_Fig3_HTML.png](img/487291_1_En_6_Fig3_HTML.png)\n\
    \n图 6-3\n\nMemcache 连接函数\n\n```\nyum install -y libmemcached\nyum install -y php74-php-pecl-memcached\n\
    ```\n\n不要忘记 `memcached` 末尾的“d”，因为还有另一个名为 `memcache` 的扩展，它无法实现我们想要的功能。请注意，这也会在\
    \ PHP 中启用该扩展。它会为我们自动完成此操作，但如果你需要调整 PHP 端的配置，配置文件位于目录 `/etc/opt/remi/php74/php.d`\
    \ 中。\n\n现在，我们需要重启 PHP-FPM 进程以使用新的 PHP 扩展：\n\n```\nsystemctl restart php74-php-fpm\n\
    ```\n\n接下来，我们需要修改我们的应用，以创建到本地 `memcached` 服务的连接。因此，请将图 6-3 中的代码添加到 `common.php`\
    \ 中。代码中提到的数字 `11211` 是 `memcached` 默认监听的端口。\n\n你的代码应该按照以下方式使用缓存：\n\n1.  创建一个缓存键，用于在缓存中唯一标识该信息。\n\
    2.  检查该信息是否已存在于缓存中。如果存在，则直接使用。\n3.  如果该信息尚不存在于缓存中，则通过较慢的方式（即执行数据库查询）获取信息。\n\n\
    \    ![../images/487291_1_En_6_Chapter/487291_1_En_6_Fig4_HTML.png](img/487291_1_En_6_Fig4_HTML.png)\n\
    \n    图 6-4\n\n    重写 `list.php` 以使用缓存\n\n4.  获取该信息后，使用该键将其存储在缓存中，并设置一个未来的过期时间（在本例中，我们将过期时间设置为从设定时起\
    \ 10 秒）。\n\n接下来，我们将更新 `list.php` 函数以使用缓存。图 6-4 展示了如何重写 `list.php` 来使用缓存。这只是脚本中将查询结果存储在\
    \ `$result` 中的顶部部分。实际的 HTML 输出代码保持不变。\n\n## 6.3 重建集群镜像\n\n现在，我们需要将此部署到我们的集群中。为此，我们首先需要为\
    \ `template_node` 制作另一个快照备份，然后对集群中的每个 `webnodeX` 服务器执行以下步骤：\n\n1.  进入节点均衡器，从配置中移除该\
    \ `webnodeX` 服务器。\n2.  关闭并删除该 `webnodeX` 服务器（可以在节点屏幕的“设置”选项卡中执行删除操作）。\n3.  基于我们的\
    \ `template_node` 备份，在其位置创建一个新的 `webnodeX` 服务器（名称相同）。（务必添加一个私有 IP）。如有必要，请将其启动。\n\
    4.  将新的 `webnodeX` 服务器添加到节点均衡器配置中。\n\n对于生产系统而言，这并不是进行代码或系统更新的最佳方式。我们将在第 12 章中介绍其他方法。这种方法只是简单地移除所有\
    \ `webnodeX` 服务器，并用新服务器替换它们。这是一个相当干净的机制，不过你需要缓慢执行此操作，以确保在重建服务器映像期间你的网站保持在线。\n\n\
    ## 6.4 测试我们的缓存架构\n\n一旦你的新云集群启动并运行，就可以测试新架构并查看我们是否获得了性能提升。\n\n在此设置中，我对单个服务器和负载均衡的集群都运行了\
    \ ApacheBench。由于不再受数据库瓶颈的限制，单个服务器每秒能够处理超过 800 个请求！\n\n此外，由于没有数据库瓶颈，性能几乎可以线性扩展。线性扩展意味着每增加一台服务器，你都能获得相同的性能提升。在这种情况下，单台服务器的性能是\
    \ 800 请求/秒，两台服务器大约达到 1,500 请求/秒，而三台服务器时，我们能够持续处理超过 2,300 请求/秒！\n\n请注意，如果你没有看到类似的性能提升，请检查你的均衡器配置，确保你没有在某个时候开启会话粘性，因为这会将你的\
    \ ApacheBench 会话限制在单个服务器上。此外，在“设置”选项卡中，也要确保“客户端连接限流”没有开启。\n\n图 6-5 显示了在整个集群上运行\
    \ ApacheBench 的输出。\n\n那么，我们学到的是：缓存不仅提高了应用的速度，还改善了应用的*可扩展性*。因为我们只需在缓存过期时访问数据库，所以数据库的速度现在相对不那么重要了。事实上，即使我们再次提高数据库的速度（就像我们在第\
    \ 5 章末尾所做的那样），它对我们的整体效率影响也相对较小，仅仅是因为它很少被使用。\n\n另一方面，如果你实际使用该应用，你会发现发布留言板条目后，它不会立即在网站上显示。事实上，如果你快速刷新页面，你可能会发现它出现后又消失，具体取决于你所在的服务器何时刷新其缓存。\n\
    \n这可以通过多种方式缓解。首先，你可以减少数据被缓存的时间。在此基准测试中，缓存 1 秒还是 10 秒差别很小。因此，仅将缓存过期行更改为以下内容（即将过期时间设置为\
    \ `1` 秒而不是 `10` 秒），将使应用快速刷新，而不会显著影响我们正在测试的这些大负载下的性能：\n\n```\n$expiration_seconds\
    \ = 1;\n```\n\n![../images/487291_1_En_6_Chapter/487291_1_En_6_Fig5_HTML.png](img/487291_1_En_6_Fig5_HTML.png)\n\
    \n图 6-5\n\n已配置缓存的 ApacheBench 输出\n\n更进一步，如果你将会话绑定到特定服务器，你实际上可以告诉服务器在特定事件发生时清除单个键甚至整个缓存。因此，在\
    \ `create.php` 的末尾，我们可以添加以下行来清除该服务器上的列表缓存：\n\n```\n$cache = getCache();\n$cache->delete(\"\
    entrylist\");\n```\n\n或者，如果应用足够复杂，需要删除大量键，则代码可以简单地使用 `$cache->flush();` 来完全清除整个缓存。\n\
    \n总之，正如你所见，缓存架构可能会使你的应用稍微复杂且难以管理，但由于其通常能带来显著且戏剧性的性能和可扩展性提升，因此通常是值得的。\n"
- fmt: "### ![../images/487291_1_En_6_Chapter/487291_1_En_6_Figa_HTML.jpg](images/487291_1_En_6_Chapter/487291_1_En_6_Figa_HTML.jpg)\
    \ CACHE DEBUGGING TIPS\n\nCaches, while hugely beneficial, bring in their own\
    \ set of problems. In order to better debug web pages, it is best if you always\
    \ have a set of parameters that you can pass to the application to get it to turn\
    \ off caching. For instance, in many of my own applications, passing in a `no_cache=1`\
    \ in the URL will turn off caching. This is usually the first place I go to when\
    \ problems are reported.\n\nHere are some signs that you might be running into\
    \ caching problems, and what to do about them:\n\n- **Problem**: Your application\
    \ is putting out old content, even though newer content is in the database.\n\
    \  \n  **Diagnosis**: The cache is holding on to stale content.\n  \n  **Solutions**:\
    \ Expire your content sooner, or provide additional cache key information to let\
    \ the cache know when you need new data.\n\n- **Problem**: Your application is\
    \ spitting out inappropriate data given the parameters.\n  \n  **Diagnosis**:\
    \ This often happens when your cache key is not specific enough. For instance,\
    \ if content was coming out in the wrong language, that might mean that you need\
    \ to attach the current language as part of the cache key.\n  \n  **Solutions**:\
    \ Add more parameters to your cache key to make sure you truly identify each piece\
    \ of unique content with a unique key, or you may decide that this content it\
    \ too specific to be cached.\n\n- **Problem**: The same page is spitting out different\
    \ content on each reload.\n  \n  **Diagnosis**: The cache has different content\
    \ on each server depending on when it was accessed.\n  \n  **Solutions**: There\
    \ are several ways to fix this. You can (a) decrease the amount of time until\
    \ expiration, (b) increase the \"stickiness\" on the load balancer to be sure\
    \ that the same person is always hitting the same server (and thus the same cache),\
    \ (c) utilize a global (or synchronized) cache instead of a local cache, and (d)\
    \ add additional cache key parameters to better coordinate what data a user gets\
    \ from the cache.\n\n- **Problem**: The cache is not speeding up your application\
    \ as much as you thought.\n  \n  **Diagnosis**: Either you are never hitting your\
    \ cache or you are not caching the right things.\n  \n  **Solutions**: As there\
    \ are many ways this can go wrong, there are many ways to fix it. Often this occurs\
    \ when each user is accessing a different set of data, and therefore nothing winds\
    \ up being pulled from the cache. This can be fixed by increasing the cache size\
    \ and/or intelligently preloading the cache with data that is likely to be accessed.\
    \ You may need to increase the expiration time of your data as well. However,\
    \ it could be that you are having to do a lot of postprocessing of the data, and\
    \ this is taking longer than the actual query.\n\n# 7. Database Replication\n\n\
    Some things simply cannot be cached. Ad hoc reports, up-to-the-second changes,\
    \ and sites where access patterns are spread across a large number of unrelated\
    \ pages are all difficult to optimize using caching. For workloads like this,\
    \ you can deploy a bigger database server, but eventually even those run into\
    \ limits.\n\nTherefore, many application architectures include database replication,\
    \ where there is more than one database server serving out requests.\n\n## 7.1\
    \ Types of Database Replication\n\nThere are many types of database replication\
    \ depending on your needs. The basic types of replication include:\n\n- **Failover\
    \ Replication**: In this configuration, the replicated servers do not help with\
    \ the load, but they do make sure that if the primary database server goes down,\
    \ there is a database with up-to-date information ready to take over.\n\n- **Master/Replica\
    \ Replication**: In this configuration, the master database is the only one with\
    \ read/write access. The replica servers receive data as it is recorded on the\
    \ master (or shortly thereafter), but are read-only copies of the master database.\
