    CHAPTER 15 ■ SEARCH


    $file = trim($tree["raw"]);


    $path = $this- > getDefaultPath();


    $content = file_get_contents(APP_PATH."/{$path}/{$file}");


    $template- > parse($content);


    $index = $this- > _index++;


    return "function anon_{$index}(\$_data){


    ".$template- > getCode()."


    };\$_text[] = anon_{$index}(\$_data);";


