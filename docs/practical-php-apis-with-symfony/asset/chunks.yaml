  raw: '### Triggering the Event


    So far, we have created the subscriber and created a service where we will place
    the code to send the notification. Now we have to trigger the event after a backgrounded
    operation finishes. We will place this code in the OperationMessageHandler.


    ```

    use App\Api\Collection\OperationCollection;

    use App\Api\Operation\OperationRequiresUserInterface;

    use App\EventSubscriber\Event\OperationPerformedEvent;

    use Symfony\Component\EventDispatcher\EventDispatcherInterface;

    use Symfony\Component\Messenger\Attribute\AsMessageHandler;

    #[AsMessageHandler]

    class OperationMessageHandler

    {

    public function __construct(

    private readonly OperationCollection $operationCollection,

    private readonly EventDispatcherInterface $eventDispatcher,

    private readonly EntityManagerInterface $em

    ){ }

    public function __invoke(OperationMessage $message): void

    {

    $apiOperation = $this->operationCollection->getOperation($message->operation);

    $user = null;

    if($message->user && $apiOperation->handler instanceof  OperationRequiresUserInterface)
    {

    $user = $this->em->getRepository(User::class)->findOneByEmail($message->user);

    $apiOperation->handler->setUser($user);

    }

    $apiOutput = $apiOperation->handler->perform($message->operationInput);

    $this->eventDispatcher->dispatch(

    new OperationPerformedEvent($apiOperation->metadata, $message->operationInput,
    $apiOutput->data, $user),

    );

    }

    }

    ```


    We have injected the Symfony event dispatcher service and, after getting the operation
    result, we use the **dispatch** method to trigger the event. After triggered,
    the OperationSubscriber will detect the fired event and will react to it. We have
    also initialized the user with the null value to avoid a “non-defined variable”
    error when passing it to the event constructor.


    ### Conclusion


    To finish this chapter, we have learned how to dispatch an event after a background
    operation finishes so that we can notify the user. In the next chapter, we will
    implement the necessary mechanisms so that an endpoint can only execute operations
    related to its context.


    # 4. Context-Specific Operations


    Throughout the previous chapters, we have learned the following:


    *   How to create an endpoint that is capable of processing operations based on
    the request payload content


    *   How to secure our endpoint and operations


    *   How to execute operations in the background


    In this chapter, we will delve into the process of encapsulating an endpoint within
    a specific context, ensuring that it can only execute the operations defined for
    that context. This approach not only enhances the security and clarity of our
    API but also facilitates the management of multiple controllers by promoting a
    clear separation of concerns. By doing so, we can streamline our codebase, making
    it easier to maintain and extend as our application evolves.


    It is essential to clarify that we should not conflate the protection of operations,
    which ensures that only specific roles can execute them, as discussed in Chapter
    [2](#663561_1_En_2_Chapter.xhtml), with the concept of contextualizing endpoints.
    Role-based access control is primarily concerned with user permissions, while
    contextualization limits the operations available to an endpoint based on its
    designated context. This distinction promotes a more organized and maintainable
    code structure. Both strategies can be effectively combined to enhance security.
    For example, a “Payment” context could permit only payment-related operations,
    with certain operations restricted to specific roles, thereby ensuring that sensitive
    actions are performed only by authorized users.


    ## Section 1\. Contextualizing an Endpoint


    In this section, we are going to build the necessary elements to be able to wrap
    a endpoint with a context.


    ### The Context Enumeration


    To start, we are going to create an enumeration for holding the contexts and the
    operations related to those contexts.


    ```

    enum Context

    {

    case inventoryManagement;

    case payment;

    case orderManagement;

    public function getAllowedOperations()

    {

    match($this) {

    self::inventoryManagement => [

    ''AddInventoryItem'',

    ''UpdateInventoryItem'',

    ''RemoveInventoryItem'',

    ''ListInventoryItems''

    ],

    self::payment => [

    ''SendPayment'',

    ''RefundPayment'',

    ''ChargePayment''

    ],

    self::orderManagement => [

    ''CreateOrder'',

    ''UpdateOrder'',

    ''CancelOrder''

    ]

    };

    }

    }

    ```


    The above enumeration contains the following cases:


    *   **inventoryManagement**: Represents the context for the inventory management-related
    operations.


    *   **payment**: Represents the context for the payment-related operations.


    *   **orderManagement**: Represents the context for the order management operations.


    The **getAllowedOperations** method returns an array holding the context-allowed
    operations.


    ### The OperationContext Attribute


    In this section, we are going to create the attribute by which we will wrap an
    endpoint with a context.


    ```

    use App\Api\Context;

    #[\Attribute(\Attribute::TARGET_METHOD)]

    class OperationContext

    {

    public function __construct(

    public readonly Context $context

    ){ }

    }

    ```


    As you can see, the **OperationContext** attribute constructor receives a *Context*
    enumeration as a parameter. This allows us to simply specify the context, as we
    are going to see in the next section.


    ### Wrapping an Endpoint with a Context


    In this section, we are going to use the **OperationContext** attribute to specify
    the operation-oriented endpoint context.


    ```

    #[Route(''/inventory-management/operation'', name: ''api_inventory_management_operation'',
    methods: [''POST''])]

    #[OperationContext(Context::inventoryManagement)]

    public function inventoryManagementOperationsAction(#[MapRequestPayload] ApiInput
    $apiInput): JsonResponse

    {

    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);

    return new JsonResponse($apiOutput->data, $apiOutput->code);

    }

    #[Route(''/payment/operation'', name: ''api_payment_operation'', methods: [''POST''])]

    #[OperationContext(Context::payment)]

    public function paymentOperationsAction(#[MapRequestPayload] ApiInput $apiInput):
    JsonResponse

    {

    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);

    return new JsonResponse($apiOutput->data, $apiOutput->code);

    }

    #[Route(''/order-management/operation'', name: ''api_order_management_operation'',
    methods: [''POST''])]

    #[OperationContext(Context::orderManagement)]

    public function orderManagementOperationsAction(#[MapRequestPayload] ApiInput
    $apiInput): JsonResponse

    {

    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);

    return new JsonResponse($apiOutput->data, $apiOutput->code);

    }

    ```


    As you can see, we have used the **OperationContext** attribute to specify that
    each endpoint can only execute its context-allowed operations.


    ### Conclusion


    In this section, we have created a PHP enumeration that centralizes the allowable
    operations for a specific context, and we have implemented an **OperationContext**
    attribute to specify the operations that can be executed within a controller.
    Finally, we have created three different endpoints (one for each context) and
    we have wrapped them with the **OperationContext** attribute passing to its constructor
    the corresponding context.


    In the next section, we will create a dedicated subscriber to listen to the Symfony
    [KernelController​](https://symfony.com/doc/current/reference/events.html%2523kernel-controller)
    event. The subscriber will have to determine whether the requested operation execution
    can be performed by the endpoint.


    ## Section 2\. Detecting Endpoints in a Context Specified


    We need a way to detect that a request has been routed to a context-specified
    endpoint so that we can check if the operation to execute is allowed. To achieve
    this, let’s rely on the Symfony [controller kernel event](https://symfony.com/doc/6.4/reference/events.html%2523kernel-controller).'
