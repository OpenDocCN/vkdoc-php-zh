    请仔细检查这三个文件（`.js`、`.css` 和 `.html`），确保文件名与调用它们的链接完全一致（一字不差）。如果所有文件都正确链接，`ajaxdemo.html`
    文件将首先显示，如图 2-1 所示。


    ![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig1_HTML.jpg](img/394210_2_En_2_Fig1_HTML.jpg)


    图 2-1

    `ajaxdemo.html`


    如果你的代码无法运行，请仔细检查文件名（确保它们没有 `.txt` 后缀）。如果你看到的是空白页面，则说明存在问题。请检查代码中是否有多余字符。是否遗漏了
    `;`、`{`、`(` 或其他代码符号？如果收到错误消息，请将其粘贴到浏览器中，寻找可能的解决方案。如果没有看到错误消息，请查看 Apache 和 PHP
    的日志（参见第 1 章）以确定其他可能的问题。


    如果没有语法错误（或文件名/位置错误），当用户点击按钮时，页面将使用 AJAX 请求 `myfirstprogram.php` 文件，并会在 `div` 标签之间显示程序执行的结果。在本例中，将显示
    `Hello World`。


    ![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig2_HTML.jpg](img/394210_2_En_2_Fig2_HTML.jpg)


