    \ copies of each of the properties `($dog_size`, `$dog_breed`, `$dog_color`, and\
    \ `$dog_name`) are\ncreated for each instance of a class. This allows you to change\
    \ what is\nin the properties for that instance (`$lab`) without\nchanging the\
    \ properties for other.\n\n```\n$lab->display_properties();\n```\n\nOnce the instance\
    \ is created, you can then access any methods by using\nthe object name\n(`$lab`)\
    \ and the\nmethod name (`display_properties`).\n\n```\ndisplay_properties();\n\
