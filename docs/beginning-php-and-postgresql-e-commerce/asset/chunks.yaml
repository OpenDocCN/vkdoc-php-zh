    <span class=\"price\">\n{else}\n<span class=\"old_price\">\n{/if}\n${$product->mProduct.price}\n\
    </span>\n\n{if $product->mProduct.discounted_price != 0}\n<span class=\"price\"\
    >\n${$product->mProduct.discounted_price}\n</span>\n{/if}\n\n<br /><br />\n\n\
    <input type=\"button\" value=\"Continue Shopping\"\nonclick=\"window.location='{$product->mPageLink|prepare_link:\"\
    http\"}';\" />\n\n**4.** Load the web site, and click on the picture or name of\
    \ any product. You should be forwarded to its details page. Figure 4-12 shows\
    \ an example details page.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00094.png)\n\n648XCH04.qxd 10/31/06 10:01 PM Page 166\n\n**166**\
    \ C H A P T E R 4 ■ C R E AT I N G T H E P R O D U C T C ATA L O G : PA RT I I\n\
    \n**Figure 4-12.** *Product details for the Confederate Slouch Hat*\n\n**How It\
    \ Works: The product Componentized Template**\n\nIt all starts in `index.php`,\
    \ which loads the `product.tpl` Smarty template in case `ProductID` appears in\
    \ the query string:\n\n```\n// Load product details page if visiting a product\n\
    if (isset ($_GET['ProductID']))\n    $pageContentsCell = 'product.tpl';\n```\n\
    \nThe Smarty template gets the needed information through the members of the `Product`\
    \ class, which is made available to the template by the function plugin it loads:\n\
    \n```\n{load_product assign=\"product\"}\n```\n\nThe `Product` class gets the\
    \ necessary data at its turn by calling the `GetProductDetails` method from the\
    \ business tier class `Catalog`.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XCH04.qxd 10/31/06 10:01 PM Page 167\n\nC H A P T E R 4 ■ C R E AT I N G\
    \ T H E P R O D U C T C ATA L O G : PA RT I I **167**\n\n**Summary**\n\nYou’ve\
    \ done a lot of work in this chapter. You finished building the product catalog\
    \ by implementing the necessary logic in the data, business, and presentation\
    \ tiers. On the way, you learned about many new theory issues, including:\n\n\
    - Relational data and the types of relationships that can occur between tables\n\
    - How to obtain data from multiple tables in a single result set using `JOIN`,\
    \ and how to filter the results using `WHERE`\n- How to display the list of categories\
    \ and products depending on what page the visitor is browsing\n- How to display\
    \ a product details page, and implement the Continue Shopping functionality\n\
    - How to implement paging in the products list when browsing pages containing\
    \ many products\n\nChapter 5 will be at least as exciting as this one because\
    \ you’ll learn how to add search functionality to your web site!\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XCH04.qxd 10/31/06 10:01 PM Page 168\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XCH05.qxd 10/31/06 10:04 PM Page 169\n\n# C H A P T E R 5\n\n# Searching\
    \ the Catalog\n\n**“W**hat are you looking for?” There are no places where you’ll\
    \ hear this question more frequently than in both brick-and-mortar stores and\
    \ e-commerce stores. Like any other quality web store around, your HatShop will\
    \ allow visitors to search through the product catalog.\n\nYou’ll see how easy\
    \ it is to add new functionality to a working site by integrating the new components\
    \ into the existing architecture.\n\nIn this chapter, you will:\n\n- Analyze the\
    \ various ways in which the product catalog can be searched.\n- Implement a custom\
    \ search engine that works with PostgreSQL.\n- Write the data and business tiers\
    \ for the searching feature.\n- Build the user interface for the catalog search\
    \ feature using Smarty componentized templates.\n\n**Choosing How to Search the\
    \ Catalog**\n\nAs always, there are a few things you need to think about before\
    \ starting to code. When designing a new feature, you should always begin by analyzing\
    \ that feature from the final user’s perspective.\n\nFor the visual part, you’ll\
    \ use a text box in which the visitor can enter one or more words to search for.\
    \ In HatShop, the words entered by the visitor will be searched for in the products’"
