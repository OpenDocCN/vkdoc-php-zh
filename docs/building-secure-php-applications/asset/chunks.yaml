    \n### 使用预编译语句（数据库查询）\n\n与数据库交互时，使用预编译语句或参数化查询以防止 SQL 注入（这是 XSS 的一种形式）。这确保用户输入被视为数据而非可执行代码。\n\
    \n使用 PDO 进行预编译语句的示例：\n\n```php\n$pdo = new PDO(\"mysql:host=localhost;dbname=mydb\"\
    , $username, $password);\n$stmt = $pdo->prepare(\"SELECT * FROM users WHERE username\
    \ = :username\");\n$stmt->execute(['username' => $userInput]);\n```\n\n### 避免动态生成\
    \ JavaScript\n\n避免通过将用户输入与脚本代码拼接来动态生成 JavaScript。应使用 JSON 进行数据交换，并避免将用户生成的数据渲染为\
