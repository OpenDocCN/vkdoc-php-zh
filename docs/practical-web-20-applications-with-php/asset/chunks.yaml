    **The UserController Class**


    The next thing we will do is create a new controller for Zend_Controller_Front
    to display the public page. We will call it UserController. In this class, we
    will implement three main actions:


    • indexAction(): This method will be used to generate the home page for each user,
    accessible from [http://phpweb20/user/ *username*. On this page](http://phpweb20/user/username),
    we will list the most recent posts on the given user’s blog. The number of posts
    to be shown is controlled by the num_posts setting we added in the previous section.


    • archiveAction(): This method will be used to generate a list of all posts for
    a single month (which I refer to as a monthly archive). The output will be basically
    the same as that of indexAction(). By default, the current month will be selected.


