  trans: '

    ### ![../images/487291_1_En_5_Chapter/487291_1_En_5_Figd_HTML.jpg](img/487291_1_En_5_Figd_HTML.jpg)
    其他节点负载均衡器选项


    节点负载均衡器有很多可用的选项。以下是一些重要选项的说明。


    **端口**：这是节点负载均衡器需要转发的 TCP 端口。通常为 `80`（HTTP）或 `443`（HTTPS）。我们的示例将使用 `80` 端口。


    **协议**：这是您希望服务器处理请求转发的方式。如果将协议设置为 TCP，那么负载均衡器唯一做的事情就是将连接转发给您。如果设置为 HTTP 或 HTTPS，那么服务器实际上会为您处理连接中的某些部分。本书将使用
    HTTP。HTTPS 为安全站点提供了额外的增强，因为负载均衡器会为您处理 SSL 连接，从而显著减轻服务器的负载（您还需要将证书和密钥信息上传到负载均衡器进行处理）。使用
    HTTPS 时，您可能希望负载均衡器上的端口与机器上的端口不同。对于 HTTPS，您应该将负载均衡器设置为连接到服务器上未加密的 `80` 端口。如果您希望由自己的机器（而不是负载均衡器）来处理
    HTTPS，那么只需选择 TCP（而非 HTTPS）作为协议即可。由于获取和安装证书会带来额外的复杂性，本书中的示例将选择 `80` 端口和 HTTP 进行负载均衡。


    **算法**：这是负载均衡器确定将请求转发到哪台服务器的方式。轮询是默认算法，并且应该工作良好。


    **会话粘性**：此选项决定给定用户在建立初始连接后是否应继续连接到同一台 Web 服务器。只有当您的 Web 服务器上存储了会话信息时，此选项才重要。试想一下，如果您的
    Web 服务器保存了重要的会话信息，但下一个请求却发到了另一台服务器！因此，此选项允许您配置是否以及如何将客户端与服务器匹配。我们的应用程序没有会话信息，因此应将其设置为“无”。如果您的应用程序使用本地会话信息（或本地缓存，正如我们将在
    6.1 节中看到的那样），我会选择 HTTP Cookie 方法，因为它不会像“表”方法那样干扰您的负载测试。由于所有请求都来自同一个 IP 地址，“表”方法只会将您的整个负载测试定向到单个服务器，而不是分散开来，从而让您的负载均衡看起来毫无帮助。


    **主动健康检查**：此选项允许您指定一个 URL，让负载均衡器访问该 URL 以检查 Web 服务器的状态。您可以配置负载均衡器仅检查 HTTP 状态，或者也检查响应正文中是否包含特定字符串。


    **后端节点：权重**：此选项设置节点负载均衡器对该服务器的偏好。权重越高，该服务器获得的连接数越多。


    **后端节点：模式**：此选项设置节点在负载均衡器中的模式。“接受”用于正常操作。“拒绝”本质上是关闭此节点，这意味着负载均衡器将不再向该节点发送任何请求。但是，如果您开启了会话粘性，您可能不希望直接从“接受”切换到“拒绝”。“排空”告诉负载均衡器仅接受那些在该节点上有会话的客户端的连接。“备份”表示仅当所有其他节点都宕机时才接受连接。


    一旦您将所有 Web 节点添加到节点负载均衡器，您现在就可以通过访问节点负载均衡器本身的 IP 地址来查看您的集群，节点负载均衡器会将您的请求转发到集群中的某台机器。您可以通过单击主菜单中的“节点负载均衡器”来找到您的节点负载均衡器的
    IP 地址。IP 地址将列在列表中您的负载均衡器旁边。它也会列在节点负载均衡器“摘要”屏幕的右侧。'
- fmt: '## 5.7 Measuring Scalability


    The simple web application we have developed does not benefit too much from the
    architecture presented here. Our web application is pretty much just a simple
    shell for a few database queries. Therefore, simply adding front-end boxes won''t
    help the fact that our application is database limited. Separating the database
    from the web servers will give us some boost, as it allows the database server
    to focus on only database connections. However, at the core, everything we do
    in this app is just a thin wrapper around database queries.


    But how do we *measure* the amount of scalability our app has? One common, simple
    tool for measuring the scalability of an app is ApacheBench. ApacheBench is standard
    on Macintosh and most Linux distributions. For our case, we can actually run ApacheBench
    from our `template_node` server to test the rest of our cluster.


    To do this, log in to your `template_node` server as either `root` or `fred`.
    To run a simple ApacheBench session, just type:


    ```

    ab http://BALANCER.IP.ADDRESS.HERE/list.php

    ```


    Obviously, replace `BALANCER.IP.ADDRESS.HERE` with the IP address of your load
    balancer.


    This will send a single request to the load balancer and document the amount of
    time that it took to process. The output will look something like Figure [5-6](#487291_1_En_5_Chapter.xhtml#Fig6).


    Since this only benchmarked a single request, there is not much interesting information
    in it. It says that the request took 9.674ms (milliseconds), and, extrapolating
    that out, it estimates that we can serve up to 103.37 requests per second.


    Now, ApacheBench has several options that allow us to exercise servers more fully.
    The `-n` option tells ApacheBench how many requests to make (we did 1 by default).
    The `-c` option tells ApacheBench how many concurrent (i.e., simultaneous) connections
    to make. Without `-c`, ApacheBench will just run one request at a time. However,
    if you add `-c 50`, ApacheBench will always keep 50 active requests with the web
    server.


    Therefore, to exercise the cluster, I did the following:


    ```

    ab -c 50 -n 1000 http://BALANCER.IP.ADDRESS.HERE/list.php

    ```


    This sends a total of 1,000 requests, making sure there are always 50 active at
    a time. This gave the results shown in Figure [5-7](#487291_1_En_5_Chapter.xhtml#Fig7).


    This says that with 50 concurrent requests, our *average* time per request falls
    to 5.136ms, but the time for *each* request grows to 256.822ms. This is not really
    a problem, as the average time per request is the most important for capacity
    planning. We are also told that, at this pace, our servers can handle up to 194.69
    requests per second.


    ![../images/487291_1_En_5_Chapter/487291_1_En_5_Fig7_HTML.png](images/487291_1_En_5_Chapter/487291_1_En_5_Fig7_HTML.png)


    Figure 5-7


    ApacheBench Results for 1,000 Requests


    ![../images/487291_1_En_5_Chapter/487291_1_En_5_Fig6_HTML.png](images/487291_1_En_5_Chapter/487291_1_En_5_Fig6_HTML.png)


    Figure 5-6


    Example Output of ApacheBench for a Single Request


    This sounds great, except that when you measure it against a single machine (which
    you can do by replacing the IP address with one of the IP addresses of your machines),
    you get close to the same results. The load balancer can handle a little higher
    pressure when the number of concurrent requests skyrockets, but overall they both
    essentially have the same results. This is because our app is almost entirely
    just a shell for the database. Therefore, this number reflects the maximum capacity
    of our database server. To see that this is true, you can temporarily resize your
    database server to a larger machine.


    To resize your `dbmaster` server, go to the `dbmaster`''s dashboard, click the
    "Resize" tab, and choose a new plan (I chose Linode 4GB). Now click "Resize this
    Linode Now." After a few minutes of downtime, your Linode will be resized, and
    it will keep its IP address! Once it is done resizing, it will boot up and you
    will now have a resized server!


    You can now run ApacheBench on this configuration and see that resizing the database
    server gives you a huge advantage over your previous configuration. After doing
    this experiment, I have resized `dbmaster` back to a Nanode 1GB so that we can
    better see the effects of the architectures described in the following chapters.


    If the application were not so database-heavy, we should already see some scaling
    benefits with this architecture. However, even with a database bottleneck, Chapter
    [6](#487291_1_En_6_Chapter.xhtml) will look at improvements to the architecture
    which will give dramatically better scaling abilities. The goal here is simply
    to see how the architecture works and how to set it up on Linode.


    It is also good to see that just because you can add nodes to a system doesn''t
    make it automatically scalable.


    # 6. Improving Scalability with Caching


    This chapter will cover several adjustments to the basic two-tier architectures
    described in the previous chapter.'
