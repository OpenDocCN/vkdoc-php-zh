  '
- "# 类\n\n类（class）是用于创建对象的模板。要定义一个类，需要使用`class`关键字，后跟一个名称和一个代码块。类的命名约定是混合大小写（mixed\
  \ case），意味着每个单词的首字母应该大写。\n\n```\nclass MyRectangle {}\n```\n\n类的主体可以包含属性（properties）和方法（methods）。属性是保存对象状态的变量，而方法是定义对象可以做什么的函数。在其它语言中，属性也被称为字段或成员变量。在\
  \ PHP 中，它们需要显式指定访问级别。下面使用了`public`访问级别，它允许对属性进行无限制的访问。\n\n```\nclass MyRectangle\n\
  {\npublic $x, $y;\nfunction newArea($a, $b) { return $a * $b; }\n}\n```\n\n要从类内部访问成员，需要使用`$this`伪变量（pseudo\
  \ variable）和单箭头运算符（`->`）。`$this`变量是对当前类实例的引用，只能在对象上下文中使用。没有它，`$x`和`$y`只会被视为局部变量。\n\
  \n```\nclass MyRectangle\n{\npublic $x, $y;\nfunction newArea($a, $b)\n{\nreturn\
  \ $a * $b;\n}\nfunction getArea()\n{\nreturn $this->newArea($this->x, $this->y);\n\
  }\n}\n```\n\n### 实例化对象\n\n要从包含类的封闭类外部使用其成员，必须首先创建该类的一个对象。这是使用`new`关键字完成的，它会创建一个新的对象或实例。\n\
  \n```\n$r = new MyRectangle(); // 对象已实例化\n```\n\n该对象包含自己的一套属性，这些属性可以保存与该类其他实例不同的值。与函数一样，即使类的定义出现在脚本文件中的更下方，也可以创建该类的对象。\n\
  \n```\n$r = new MyDummy(); // 允许\nclass MyDummy {};\n```\n\n### 访问对象成员\n\n要访问属于某个对象的成员，需要使用单箭头运算符（`->`）。它可以用来调用方法或给属性赋值。\n\
  \n```\n$r->x = 5;\n$r->y = 10;\n$r->getArea(); // 50\n```\n\n初始化属性的另一种方法是使用初始属性值。\n\
  \n### 初始属性值\n\n如果属性需要有一个初始值，一个简洁的方法是在声明属性的同时进行赋值。这个初始值会在对象创建时被设置。此类赋值必须是一个常量表达式。例如，它不能是一个变量或数学表达式。\n\
  \n```\nclass MyRectangle\n{\npublic $x = 5, $y = 10;\n}\n```\n\n### 构造函数\n\n一个类可以有一个构造函数（constructor），这是一种用于初始化（构造）对象的特殊方法。该方法提供了一种初始化属性的方式，这种方式不限于常量表达式。在\
  \ PHP 中，构造函数以两个下划线开头，后跟单词`construct`。像这样的方法被称为魔术方法（magic methods）。\n\n```\nclass\
  \ MyRectangle\n{\npublic $x, $y;\nfunction __construct()\n{\n$this->x = 5;\n$this->y\
  \ = 10;\necho \"已构造\";\n}\n}\n```\n\n当创建该类的新实例时，构造函数被调用，在此示例中，它将属性设置为指定的值。请注意，任何初始属性值都在构造函数运行之前被设置。\n\
  \n```\n$r = new MyRectangle(); // 输出 \"已构造\"\n```\n\n由于此构造函数不接受任何参数，因此括号可以省略。\n\n\
  ```\n$r = new MyRectangle; // 输出 \"已构造\"\n```\n\n就像任何其他方法一样，构造函数可以有一个参数列表。它可以用来将属性值设置为创建对象时传入的参数。\n\
  \n```\nclass MyRectangle\n{\npublic $x, $y;\nfunction __construct($x, $y)\n{\n$this->x\
  \ = $x;\n$this->y = $y;\n}\n}\n$r = new MyRectangle(5,10);\n```\n\n### 析构函数\n\n\
  除了构造函数，类也可以有一个析构函数（destructor）。这个魔术方法以两个下划线开头，后跟单词`destruct`。当没有对对象的更多引用时，在对象被 PHP\
  \ 垃圾回收器销毁之前，会调用析构函数。\n\n```\nclass MyRectangle\n{\n// ...\nfunction __destruct()\
  \ { echo \"已析构\"; }\n}\n```\n\n\n```markdown\n\n为了测试析构函数，可以使用`unset`函数手动移除对象的所有引用。\n\
  \n```\nunset($r); // \"Destructed\"\n```\n\n请注意，PHP 5 中完全重写了对象模型。因此，类的许多特性（如析构函数）在该语言的早期版本中无法使用。\n\
  \n## 大小写敏感性\n\n虽然变量名是大小写敏感的，但 PHP 中的类名（以及函数名、关键字和`echo`等内置结构）是大小写不敏感的。这意味着名为`MyClass`的类也可以被引用为`myclass`或`MYCLASS`。\n\
  \n```\nclass MyClass {}\n$o1 = new myclass(); // ok\n$o2 = new MYCLASS(); // ok\n\
  ```\n\n### 对象比较\n\n当对对象使用“等于”运算符（`==`）时，如果这些对象是同一个类的实例，并且它们的属性具有相同的值和类型，则这些对象被认为是相等的。相比之下，严格“等于”运算符（`===`）仅在变量引用同一个类的同一个实例时才返回`true`。\n\
  \n```\nclass Flag\n{\npublic $flag = true;\n}\n$a = new Flag();\n$b = new Flag();\n\
  $c = ($a == $b);  // true (相同值)\n$d = ($a === $b); // false (不同实例)\n```\n\n### 匿名类\n\
  \n对匿名类的支持是在 PHP 7 中引入的。当只需要一个一次性的对象时，此类可以替代命名类。\n\n```\n$obj = new class {};\n```\n\
  \n匿名类的实现以及从它创建的对象与命名类没有区别；例如，它们可以像任何命名类一样使用构造函数。\n\n```\n$o = new class('Hi')\n\
  {\npublic $x;\npublic function __construct($a)\n{\n$this->x = $a;\n}\n};\necho $o->x;\
  \ // \"Hi\";\n```\n\n## Closure 对象\n\nPHP 中的匿名函数也是闭包，因为它们能够捕获函数作用域之外的上下文。除了变量之外，此上下文还可以是对象的作用域。这会创建一个所谓的闭包对象，它可以访问该对象的属性。对象闭包是通过`bindTo`方法创建的。此方法接受两个参数：闭包所绑定的对象以及与它关联的类作用域。要访问非公开成员（`private`或`protected`），必须将类名或对象名指定为第二个参数。\n\
  \n```\nclass C { private $x = 'Hi'; }\n$getC = function() { return $this->x; };\n\
  $getX = $getC->bindTo(new C, 'C');\necho $getX(); // \"Hi\"\n```\n\n此示例使用了两个闭包。第一个闭包`$getC`定义了获取属性的方法。第二个闭包`$getX`是`$getC`的副本，对象和类作用域已绑定到它。PHP\
  \ 7 通过提供一种简写方式简化了这一点——一种在同一操作中临时绑定然后调用闭包的、性能更好的方式。\n\n```\n// PHP 7+ 代码\n$getX =\
  \ function() { return $this->x; };\necho $getX->call(new C); // \"Hi\"\n```\n\n\
  ## 10. 继承\n\n继承允许一个类获取另一个类的成员。在下面的例子中，`Square`类继承自`Rectangle`，这是由`extends`关键字指定的。`Rectangle`成为`Square`的父类，而`Square`则成为`Rectangle`的子类。除了自己的成员外，`Square`还获得了`Rectangle`中所有可访问（非`private`）的成员，包括任何构造函数。\n\
  \n```\n// 父类（基类）\nclass Rectangle\n{\npublic $x, $y;\nfunction __construct($a, $b)\n\
  {\n$this->x = $a;\n$this->y = $b;\n}\n}\n// 子类（派生类）\nclass Square extends Rectangle\
  \ {}\n```\n\n创建`Square`实例时，现在必须指定两个参数，因为`Square`继承了`Rectangle`的构造函数。\n\n```\n$s\
  \ = new Square(5,10);\n```\n\n从`Rectangle`继承的属性也可以从`Square`对象访问。\n\n```\n$s->x =\
  \ 5; $s->y = 10;\n```\n\nPHP 中的一个类只能继承自一个父类，并且父类必须在脚本文件中的子类之前定义。\n\n### 覆盖成员\n\n\
  子类中的成员可以重新定义其父类中的成员，以赋予其新的实现。要覆盖继承的成员，只需使用相同的名称重新声明它即可。如下所示，`Square`构造函数覆盖了`Rectangle`中的构造函数。\n\
  \n```\nclass Square extends Rectangle\n{\nfunction __construct($a)\n{\n$this->x\
  \ = $a;\n$this->y = $a;\n}\n}\n```\n\n使用这个新的构造函数，只需一个参数即可创建`Square`。\n\n```\n$s\
  \ = new Square(5);\n```\n\n因为`Rectangle`的继承构造函数被覆盖了，所以创建`Square`对象时不再调用`Rectangle`的构造函数。如有必要，由开发者决定是否调用父构造函数。这是通过在调用前加上`parent`关键字和双冒号来完成的。双冒号被称为作用域解析运算符（`::`）。\n\
  \n```\nclass Square extends Rectangle\n{\nfunction __construct($a)\n{\nparent::__construct($a,$a);\n\
  }\n}\n```\n\n`parent`关键字是父类名的别名，也可以直接使用父类名。在 PHP 中，可以使用这种表示法访问继承层次结构中任意深度的被覆盖成员。\n\
  \n```\nclass Square extends Rectangle\n{\nfunction __construct($a)\n{\nRectangle::__construct($a,$a);\n\
  }\n}\n```\n\n与构造函数类似，如果父析构函数被覆盖，它也不会被隐式调用。同样，必须从子析构函数中显式调用`parent::__destruct()`。\n\
  \n## Final 关键字\n\n为了阻止子类覆盖某个方法，可以将该方法定义为`final`。类本身也可以定义为`final`，以防止任何类扩展它。\n\n\
  ```\nfinal class NotExtendable\n{\nfinal function notOverridable() {}\n}\n```\n\n\
  ## Instanceof 运算符\n\n作为安全预防措施，您可以使用`instanceof`运算符测试对象是否可以转换为特定类。如果左侧对象可以转换为右侧`type`而不引发错误，则此运算符返回`true`。当对象是右侧类的实例或继承自右侧类时，情况就是如此。\n\
  \n```\n$s = new Square(5);\n$s instanceof Square;    // true\n$s instanceof Rectangle;\
  \ // true\n```\n\n## 11. 访问级别\n\n每个类成员都有一个可访问性级别，决定了该成员在何处可见。PHP 中有三种可用的访问级别：`public`、`protected`和`private`。\n\
  \n```\nclass MyClass\n{\npublic    $myPublic;    // 无限制访问\nprotected $myProtected;\
  \ // 封闭类或子类\nprivate   $myPrivate;   // 仅封闭类\n}\n```\n\n### Private 访问\n\n无论访问级别如何，所有成员都可以在声明它们的类（封闭类）中访问。这是唯一可以访问私有成员的地方。\n\
  \n```\nclass MyClass\n{\npublic    $myPublic    = 'public';\nprotected $myProtected\
  \ = 'protected';\nprivate   $myPrivate   = 'private';\nfunction test()\n{\necho\
  \ $this->myPublic;    // 允许\necho $this->myProtected; // 允许\necho $this->myPrivate;\
  \   // 允许\n}\n}\n```\n\n与属性不同，方法不必指定显式的访问级别。除非设置为其他级别，否则它们默认为`public`访问。\n\n###\
  \ Protected 访问\n\n受保护成员可以从子类或父类内部以及从封闭类内部访问。\n\n```\nclass MyChild extends MyClass\n\
  {\nfunction test()\n{\necho $this->myPublic;    // 允许\necho $this->myProtected;\
  \ // 允许\necho $this->myPrivate;   // 不可访问\n}\n}\n```\n\n### Public 访问\n\n公共成员具有无限制的访问权限。除了可以访问受保护成员的任何地方之外，公共成员还可以通过对象变量访问。\n\
  \n```\n$m = new MyClass();\necho $m->myPublic;    // 允许\necho $m->myProtected; //\
  \ 不可访问\necho $m->myPrivate;   // 不可访问\n```\n\n## Var 关键字\n\n在 PHP 5 之前，`var`关键字用于声明属性。为了保持向后兼容性，此关键字仍然可用，并且提供`public`访问，就像`public`修饰符一样。\n\
  \n```\n\n```php\nclass MyVars\n{\n    var $x, $y; // 已弃用的属性声明\n}\n```\n\n### 对象访问\n\
  \n在 PHP 中，同一个类的对象可以访问彼此的私有（private）和受保护（protected）成员。这种行为与许多其他不允许此类访问的编程语言不同。\n\n\
  ```php\nclass MyClass\n{\n    private $myPrivate;\n\n    function setPrivate($obj,\
  \ $val) {\n        $obj->myPrivate = $val; // 设置私有属性\n    }\n}\n\n$a = new MyClass();\n\
  $b = new MyClass();\n$a->setPrivate($b, 10);\n```\n\n### 访问级别指南\n\n作为一项指南，在选择访问级别时，通常最好使用限制最严格的级别。这是因为成员可被访问的位置越多，其被错误访问的位置就越多，从而使代码更难调试。使用严格的访问级别也使得修改类时更不易破坏使用该类的其他开发者的代码。\n\
  \n## 静态（Static）\n\n`static` 关键字可用于声明无需创建类实例即可访问的属性和方法。静态（类）成员只存在一份副本，归属于类本身；而实例（非静态）成员则为每个新对象创建新的副本。\n\
  \n```php\nclass MyCircle\n{\n    // 实例成员（每个对象一份）\n    public $r = 10;\n    function\
  \ getArea() {}\n\n    // 静态/类成员（仅一份副本）\n    static $pi = 3.14;\n    static function\
  \ newArea($a) {}\n}\n```\n\n静态方法不能使用实例成员，因为这些方法不属于某个实例。但它们可以使用其他静态成员。\n\n### 引用静态成员\n\
  \n与实例成员不同，静态成员不使用单箭头运算符（`->`）进行访问。相反，要在类内部引用静态成员，必须在成员前加上 `self` 关键字，后跟范围解析运算符（`::`）。`self`\
  \ 关键字是类名的别名，因此也可以直接使用类的实际名称。\n\n```php\nstatic function newArea($a)\n{\n    return\
  \ self::$pi * $a * $a;     // 正确\n    return MyCircle::$pi * $a * $a; // 替代写法\n\
  }\n```\n\n从实例方法访问静态成员时也使用相同的语法。请注意，与静态方法不同，实例方法可以同时使用静态成员和实例成员。\n\n```php\nfunction\
  \ getArea()\n{\n    return self::newArea($this->$r);\n}\n```\n\n要从类外部访问静态成员，需要使用类名，后跟范围解析运算符（`::`）。\n\
  \n```php\nclass MyCircle\n{\n    static $pi = 3.14;\n    static function newArea($a)\n\
  \    {\n        return self::$pi * $a * $a;\n    }\n}\n\necho MyCircle::$pi;   \
  \      // 输出 \"3.14\"\necho MyCircle::newArea(10); // 输出 \"314\"\n```\n\n这里可以体现静态成员的优势：无需创建类的实例即可使用它们。因此，如果方法独立于实例变量执行通用功能，则应声明为静态。同样，如果变量只需要一个实例，则属性应声明为静态。\n\
  \n### 静态变量\n\n局部变量可以声明为静态，以使函数记住其值。这种静态变量仅存在于局部函数的作用域内，但在函数结束时不会丢失其值。例如，这可用于统计函数被调用的次数。\n\
  \n```php\nfunction add()\n{\n    static $val = 0;\n    echo $val++;\n}\n\nadd();\
  \ // 输出 \"0\"\nadd(); // 输出 \"1\"\nadd(); // 输出 \"2\"\n```\n\n静态变量的初始值仅设置一次。请记住，静态属性和静态变量只能使用常量进行初始化，而不能使用表达式（例如另一个变量或函数返回值）。\n\
  \n### 后期静态绑定\n\n如前所述，`self` 关键字是所在类名的别名。这意味着，即使从子类的上下文中调用，该关键字也指向其所在的类。\n\n```php\n\
  class MyParent\n{\n    protected static $val = 'parent';\n    public static function\
  \ getVal()\n    {\n        return self::$val;\n    }\n}\n\nclass MyChild extends\
  \ MyParent\n{\n    protected static $val = 'child';\n}\n\necho MyChild::getVal();\
  \ // 输出 \"parent\"\n```\n\n要获得对实际调用类的引用，需要使用 `static` 关键字代替 `self` 关键字。此特性称为**后期静态绑定**，自\
  \ PHP 5.3 起引入。\n\n```php\nclass MyParent\n{\n    protected static $val = 'parent';\n\
  \    public static function getLateBindingVal()\n    {\n        return static::$val;\n\
  \    }\n}\n\nclass MyChild extends MyParent\n{\n    protected static $val = 'child';\n\
  }\n\necho MyChild::getLateBindingVal(); // 输出 \"child\"\n```\n\n## 常量\n\n常量是一种其值不能被脚本改变的变量。因此，此类值必须在创建常量时同时赋值。PHP\
  \ 提供了两种创建常量的方法：`const` 修饰符和 `define` 函数。\n\n### Const\n\n`const` 修饰符用于创建类常量。与常规属性不同，类常量不需要指定访问级别，因为它们始终是公开可见的。它们也不使用美元符号解析器标记（`$`）。常量的命名约定是全大写，单词之间用下划线分隔。\n\
  \n```php\nclass MyCircle\n{\n    const PI = 3.14;\n}\n```\n\n常量在创建时必须赋值。与静态属性一样，常量只能使用常量值进行初始化，而不能使用表达式。类常量的引用方式与静态属性相同，只是它们不使用美元符号。\n\
  \n```php\necho MyCircle::PI; // 输出 \"3.14\"\n```\n\n`const` 修饰符不能应用于局部变量或参数。但是，自\
  \ PHP 5.3 起，`const` 可用于创建全局常量。此类常量在全局作用域中定义，可以在脚本的任何位置访问。\n\n```php\nconst PI =\
  \ 3.14;\necho PI; // 输出 \"3.14\"\n```\n\n### Define\n\n`define` 函数可以创建全局常量和局部常量，但不能创建类常量。该函数的第一个参数是常量名，第二个参数是其值。\n\
  \n```php\ndefine('DEBUG', 1);\n```\n\n就像使用 `const` 创建的常量一样，`define` 常量使用时也不带美元符号，且其值不能修改。\n\
  \n```php\necho DEBUG; // 输出 \"1\"\n```\n\n与 `const` 创建的常量一样，`define` 的值可以是任何标量数据类型：整数、浮点数、字符串或布尔值。但是，与\
  \ `const` 不同，`define` 函数允许在赋值中使用表达式，例如变量或数学表达式的结果。\n\n```php\ndefine('ONE', 1);\
  \      // 1\ndefine('TWO', ONE+1);  // 2\n```\n\n常量默认区分大小写。然而，`define` 函数接受第三个可选参数，可将其设置为\
  \ `true` 以创建不区分大小写的常量。\n\n```php\ndefine('DEBUG', 1, true);\necho debug; // 输出 \"\
  1\"\n```\n\n要检查常量是否已存在，可使用 `defined` 函数。此函数适用于使用 `const` 或 `define` 创建的常量。\n\n```php\n\
  if (!defined('PI'))\n    define('PI', 3.14);\n```\n\nPHP 7 支持使用 `define` 函数创建常量数组。自\
  \ PHP 5.6 起，就已支持使用 `const` 创建常量数组。\n\n```php\nconst CA = [1, 2, 3];    // PHP 5.6\
  \ 或更高版本\ndefine('DA', [1, 2, 3]); // PHP 7 或更高版本\n```\n\n### Const 与 define 的比较\n\
  \n`const` 修饰符创建的是编译时常量，因此编译器会将对常量的所有引用替换为其值。相反，`define` 创建的是运行时常量，直到运行时才被设置。这就是为什么\
  \ `define` 常量可以用表达式的值赋值，而 `const` 要求使用在编译时已知的常量值。\n\n```php\nconst PI = 3.14;  \
  \ // 编译时常量\ndefine('E', 2.72); // 运行时常量\n```\n\n\n\n类常量只能使用 `const`，局部常量只能使用 `define`。然而，在创建全局常量时，`const`\
  \ 和 `define` 均被允许。在这种情况下，通常优先使用 `const`，因为编译时常量比运行时常量略快。主要的例外情况是当常量需要条件定义，或者需要表达式值时，此时必须使用\
  \ `define`。\n\n## 常量使用指南\n\n通常，如果变量的值无需更改，创建常量比创建变量更佳。这能确保变量不会在脚本中的任何位置被意外修改，从而有助于防止错误。\n\
  \n### 魔术常量\n\nPHP 提供了八个预定义常量，如表 13-1 所示。这些常量被称为魔术常量，因为它们的值会随使用位置的不同而变化。\n\n**表 13-1.\
  \ 魔术常量**\n\n| 名称 | 描述 |\n| --- | --- |\n| `__LINE__` | 文件中的当前行号。 |\n| `__FILE__`\
  \ | 文件的完整路径和文件名。 |\n| `__DIR__` | 文件所在的目录。 |\n| `__FUNCTION__` | 函数名称。 |\n| `__CLASS__`\
  \ | 包含命名空间的类名。 |\n| `__TRAIT__` | 包含命名空间的 trait 名称。 |\n| `__METHOD__` | 类方法名。 |\n\
  | `__NAMESPACE__` | 当前命名空间。 |\n\n魔术常量对于调试特别有用。例如，`__LINE__` 的值取决于它在脚本中出现的位置。\n\n\
  ```\nif(!isset($var))\n{\necho '$var not set on line ' . __LINE__;\n}\n```\n\n"
- '# 14. 接口


  接口规定了使用该接口的类必须实现的方法。它们使用 `interface` 关键字定义，后跟名称和代码块。其命名约定是以小写 `i` 开头，然后每个单词首字母大写。


  ```

  interface iMyInterface {}

  ```


  ### 接口签名


  接口的代码块可以包含实例方法的签名。这些方法不能有任何实现。相反，它们的方法体被分号替代。接口方法必须始终是公开的。


  ```

  interface iMyInterface

  {

  public function myMethod();

  }

  ```


  此外，接口可以定义常量。这些接口常量的行为与类常量相同，只是它们不能被覆盖。


  ```

  interface iMyInterface

  {

  const PI = 3.14;

  }

  ```


  接口不能继承自类，但它可以继承自另一个接口，这实际上是将多个接口合并为一个。


  ```

  interface i1 {}

  interface i2 extends i1 {}

  ```


  ### 接口示例


  以下示例展示了一个名为 `iComparable` 的接口，它只有一个名为 `Compare` 的方法。请注意，此方法使用了类型提示来确保以正确的类型调用该方法。此功能将在后续章节中介绍。


  ```

  interface iComparable

  {

  public function compare(iComparable $o);

  }

  ```


  `Circle` 类通过在类名后使用 `implements` 关键字并跟上接口名称来实现此接口。如果该类还有 `extends` 子句，则 `implements`
  子句需要放在其后。请记住，尽管一个类只能继承自一个父类，但它可以通过指定逗号分隔的列表来实现任意数量的接口。


  ```

  class Circle implements iComparable

  {

  public $r;

  }

  ```


  由于 `Circle` 实现了 `iComparable`，它必须定义 `compare()` 方法。对于此类，该方法返回圆半径之间的差值。实现的方法必须是公开的，并且与接口中定义的方法具有相同的签名。它也可以有更多参数，只要它们是可选的即可。


  ```

  class Circle implements iComparable

  {

  public $r;

  public function compare(iComparable $o)

  {

  return $this->r - $o->r;

  }

  }

  ```


  ## 接口的使用


  接口允许类设计的多重继承，而不会出现功能多重继承所带来的复杂性。要求特定类设计的主要好处可以从 `iComparable` 接口看出，它定义了一个类可以共享的特定功能。它允许开发者在不了解类的实际类型的情况下使用接口成员。为了说明这一点，以下示例展示了一个简单的方法，它接受两个
  `iComparable` 对象并返回较大的那个。


  ```

  function largest(iComparable $a, iComparable $b)

  {

  return ($a->compare($b) > 0) ? $a : $b;

  }

  ```


  此方法适用于任何实现了 `iComparable` 接口的相同类型的两个对象。无论对象是什么类型，该方法都能工作，因为它只使用了通过该接口暴露的功能。


  ### 接口指南


  接口为类提供了设计规范，而不包含任何实现。它是一个契约，实现它的类同意提供特定的功能。这有两个好处。首先，它提供了一种确保开发者实现特定方法的方式。其次，由于这些类保证拥有特定方法，因此即使在不知道类实际类型的情况下也能使用它们，这使得代码更加灵活。


  '
- '# 15. 抽象


  抽象类提供了一个部分实现，其他类可以在此基础上构建。当一个类被声明为抽象时，意味着该类除包含正常的类成员外，还可能包含必须在子类中实现的不完整方法。


  ### 抽象方法


  在抽象类中，任何方法都可以被声明为抽象。这些方法随后保持未实现状态，仅指定它们的签名，而它们的代码块被分号替代。


  ```

  abstract class Shape

  {

  abstract public function myAbstract();

  }

  ```


  ### 抽象示例


  举例来说，以下类有两个属性和一个抽象方法。


  ```

  abstract class Shape

  {

  private $x = 100, $y = 100;

  abstract public function getArea();

  }

  ```


  如果一个类继承自此抽象类，则它必须重写该抽象方法。方法签名必须匹配，但访问级别可以放宽限制。


  ```

  class Rectangle extends Shape

  {

  public function getArea()

  {

  return $this->x * $this->y;

  }

  }

  ```


  不能实例化抽象类。它们仅作为其他类的父类，部分地规定了它们的实现。


  ```

  $s = new Shape(); // 编译时错误

  ```


  然而，抽象类可以继承自非抽象（具体）类。


  ```

  class NonAbstract {}

  abstract class MyAbstract extends NonAbstract {}

  ```


  ### 抽象类与接口


  抽象类在许多方面与接口相似。它们都可以定义派生类必须实现的成员签名，并且两者都不能被实例化。主要区别在于：首先，抽象类可以包含非抽象成员，而接口不能。其次，一个类可以实现任意数量的接口，但只能继承自一个类（无论是否抽象）。


  ```

  // 定义默认功能和定义

  abstract class Shape

  {

  public $x = 100, $y = 100;

  abstract public function getArea();

  }

  // 类是一个形状

  class Rectangle extends Shape { /*...*/ }

  // 定义特定功能

  interface iComparable

  {

  function compare();

  }

  // 类可以进行比较

  class MyClass implements iComparable { /*...*/ }

  ```


  ### 抽象指南


  抽象类提供了一个部分实现的基类，它规定了子类必须如何行为。当子类共享一些相似性，但在其他实现上存在差异并且需要子类自行定义时，抽象类最为有用。与接口类似，抽象类是面向对象编程中非常有用的结构，有助于开发者遵循良好的编码标准。


  '
- '# 16. Traits





  '
- '# 特质


  特质是一组可以插入到类中的方法。它于 PHP 5.4 引入，旨在实现更高的代码复用性，同时避免多重继承带来的复杂性。特质使用 `trait` 关键字定义，后跟名称和代码块。其命名规范与类相同，每个单词首字母大写。代码块只能包含静态方法和实例方法。


  ```

  trait PrintFunctionality

  {

  public function myPrint() { echo ''Hello''; }

  }

  ```


  需要特质功能的类可以通过 `use` 关键字引入该特质，后跟特质名称。特质中的方法随后会像直接定义在该类中一样工作。


  ```

  class MyClass

  {

  // 插入特质方法

  use PrintFunctionality;

  }

  $o = new MyClass();

  $o->myPrint(); // 输出 "Hello"

  ```


  一个类可以使用多个特质，只需将它们放在逗号分隔的列表中。同样地，一个特质也可以由一个或多个其他特质组合而成。


  ## 继承与特质


  特质方法会覆盖继承的方法。同样，类中定义的方法会覆盖由特质插入的方法。


  ```

  class MyParent

  {

  public function myPrint() { echo ''Base''; }

  }

  class MyChild extends MyParent

  {

  // 覆盖继承的方法

  use PrintFunctionality;

  // 覆盖特质插入的方法

  public function myPrint() { echo ''Child''; }

  }

  $o = new MyChild();

  $o->myPrint(); // 输出 "Child"

  ```


  ## 特质使用指南


  单继承有时会迫使开发者在代码复用和概念清晰的类层次结构之间做出选择。为了获得更高的代码复用性，方法可以移动到类层次结构的根部，但这会导致类开始包含它们不需要的方法，从而降低代码的可理解性和可维护性。另一方面，强制保持类层次结构的清晰性往往会导致代码重复，这可能引发不一致性。特质提供了一种避免单继承这一缺陷的方法，它能实现独立于类层次结构的代码复用。


  '
- '# 导入文件


  相同的代码通常需要在多个页面中调用。这可以通过将代码放在一个单独的文件中，然后使用 `include` 语句包含该文件来实现。该语句会获取指定文件中的所有文本，并将其包含到脚本中，就像代码被复制到该位置一样。与
  `echo` 类似，`include` 是一种特殊的语言结构，而非函数，因此不应使用括号。


  当包含一个文件时，解析模式会在目标文件的起始处切换到 HTML 模式，并在文件末尾恢复为 PHP 模式。因此，被包含文件中需要作为 PHP 代码执行的任何代码都必须包含在
  PHP 标签内。


  ### 包含路径


  `include` 文件可以通过相对路径、绝对路径或不带路径的方式指定。相对文件路径是相对于导入文件所在的目录。绝对文件路径则包含完整的文件路径。


  ```

  // 相对路径

  include ''myfolder\myfile.php'';

  // 绝对路径

  include ''C:\xampp\htdocs\myfile.php'';

  ```


  当指定了相对路径或未指定路径时，`include` 会首先在当前工作目录中搜索文件，当前工作目录默认为导入脚本所在的目录。如果文件未找到，`include` 会在失败前检查
  `php.ini` 中 `include_path` 指令 ¹ 指定的文件夹。


  ```

  // 无路径

  include ''myfile.php'';

  ```


  除了 `include`，还有三种其他语言结构可用于将一个文件的内容导入另一个文件：`require`、`include_once` 和 `require_once`。


  ## Require


  `require` 结构包含并评估指定文件。它与 `include` 相同，区别在于处理失败的方式。当文件导入失败时，`require` 会以错误方式终止脚本；而
  `include` 仅发出警告。导入失败可能是因为文件未找到，或者运行 Web 服务器的用户没有该文件的读取权限。


  ```

  require ''myfile.php''; // 出错时终止

  ```


  通常，对于任何复杂的 PHP 应用或 CMS 站点，最好使用 `require`。这样，当关键文件缺失时，应用程序不会尝试运行。对于不太关键的代码段和简单的 PHP
  网站，`include` 可能就足够了，在这种情况下，即使包含的文件缺失，PHP 仍会显示输出。


  ## Include_once


  `include_once` 语句的行为类似于 `include`，但如果指定文件已经被包含过，则不会再次包含。


  ```

  include_once ''myfile.php''; // 仅包含一次

  ```


  ## Require_once


  `require_once` 语句与 `require` 类似，但如果文件已经被导入，则不会再次导入。


  ```

  require_once ''myfile.php''; // 仅要求一次

  ```


  在脚本的特定执行过程中，如果同一文件可能被导入多次，可以使用 `include_once` 和 `require_once` 语句替代 `include` 和
  `require`。例如，这可以避免由函数和类重复定义引起的错误。


  ## Return


  可以在已导入的文件中执行 `return` 语句。这会停止执行并返回到调用文件导入的脚本。


  如果指定了返回值，导入语句会像普通函数一样，计算得出该值。


  ## 自动加载


  对于大型 Web 应用，每个脚本中所需的包含文件数量可能相当可观。可以通过定义 `__autoload` 函数来避免这种情况。当使用未定义的类或接口时，该函数会自动被调用，以尝试加载该定义。它接受一个参数，即
  PHP 正在查找的类或接口的名称。


  ```

  function __autoload($class_name)

  {

  include $class_name . ''.php'';

  }

  // 尝试自动包含 MyClass.php

  $obj = new MyClass();

  ```


  编写面向对象应用时，一个好的编码实践是每个类定义对应一个源文件，并根据类名命名文件。遵循此约定，只要文件与需要它的脚本文件位于同一文件夹，`__autoload`
  函数就能加载该类。


  如果文件位于子文件夹中，类名可以包含下划线字符来表示。然后需要在 `__autoload` 函数中将下划线字符转换为目录分隔符。


  ## 脚注


  [`http://www.php.net/manual/en/ini.core.php#ini.include-path`](http://www.php.net/manual/en/ini.core.php#ini.include-path)


  '
- '# 类型声明


  类型声明允许函数声明其参数和返回值的预期类型。这使得 PHP 引擎能够强制使用指定的类型。


  ### 参数类型声明


  早期的 PHP 版本完全依赖函数的正确文档，让开发者了解函数接受哪些参数。为了实现更健壮的函数，PHP 5 开始引入参数类型声明，允许指定函数参数的类型。类型声明的有效类型如表
  18-1 所示，同时列出了这些类型被添加的 PHP 版本。


  **表 18-1.** 类型声明


  | 名称 | 描述 | 版本 |

  | --- | --- | --- |

  | 类名 | 参数必须是该类的对象或其子类。 | PHP 5.0 |

  | 接口名 | 参数必须是实现该接口的对象。 | PHP 5.0 |

  | `array` | 参数必须是数组。 | PHP 5.1 |

  | `callable` | 参数必须可作为函数调用。 | PHP 5.4 |

  | `bool` | 参数必须是布尔值。 | PHP 7.0 |




  '
- "# 类型声明\n\n- `float`  \n  参数必须是浮点数。  \n  *PHP 7.0*\n\n- `int`  \n  参数必须是整数。  \n\
  \  *PHP 7.0*\n\n- `string`  \n  参数必须是字符串。  \n  *PHP 7.0*\n\n类型声明通过在函数签名中为参数添加类型前缀来设置。以下是使用\
  \ PHP 5.1 引入的`array`伪类型的示例：\n\n```php\nfunction myPrint(array $a)\n{\n    foreach\
  \ ($a as $v) { echo $v; }\n}\nmyPrint( array(1,2,3) ); // \"123\"\n```\n\n不满足类型提示会导致致命错误。这为开发者提供了一种快速检测使用无效参数的方法。\n\
  \n```php\nmyPrint('Test'); // error\n```\n\n`callable`伪类型是在 PHP 5.4 中添加的。使用此类型提示时，参数必须是可调用的函数、方法或对象。诸如`echo`之类的语言结构是不允许的，但可以使用匿名函数，如下例所示：\n\
  \n```php\nfunction myCall(callable $callback, $data)\n{\n    $callback($data);\n\
  }\n$say = function($s) { echo $s; };\nmyCall( $say, 'Hi' ); // \"Hi\";\n```\n\n\
  要将方法作为`callback`函数传递，对象和方法名称需要作为一个数组组合在一起。\n\n```php\nclass MyClass {\n    function\
  \ myCallback($s) {\n        echo $s;\n    }\n}\n$o = new MyClass();\nmyCall( array($o,\
  \ 'myCallback'), 'Hi' ); // \"Hi\"\n```\n\n包括`bool`、`int`、`float`和`string`在内的标量类型的类型声明是在\
  \ PHP 7 中添加的。以下是使用`bool`类型的简单示例：\n\n```php\nfunction isTrue(bool $b)\n{\n    return\
  \ ($b === true);\n}\necho isTrue(true);  // \"1\"\necho isTrue(false); // \"\"\n\
  ```\n\n对于依赖特定类型参数的函数来说，使用类型声明是一个好主意。这样，如果此函数被错误地传递了不正确类型的参数，它会立即触发错误。如果没有类型声明，函数可能会静默失败，从而使得错误更难被发现。\n\
  \n### 返回类型声明\n\nPHP 7 中添加了对返回类型声明的支持，作为防止意外返回值的一种方式。返回类型在参数列表之后声明。允许的类型与参数类型声明相同。\n\
  \n```php\nfunction f(): array {\n    return [];\n}\n```\n\n当与接口一起使用时，类型声明强制实现类匹配相同的类型声明。\n\
  \n```php\ninterface I {\n    static function myArray(array $a): array;\n}\nclass\
  \ C implements I {\n    static function myArray(array $a): array {\n        return\
  \ $a;\n    }\n}\n```\n\n### 严格类型\n\nPHP 的默认行为是尝试将不正确的标量值转换为预期的类型。例如，期望字符串的函数仍然可以使用整数参数调用，因为整数可以转换为字符串。\n\
  \n```php\nfunction showString(string $s) {\n    echo $s;\n}\nshowString(5); // \"\
  5\"\n```\n\n通过在特定源文件中将以下声明作为该文件的第一条语句，可以启用强类型检查。\n\n```php\ndeclare(strict_types=1);\n\
  ```\n\n这会影响标量类型的参数和返回类型声明，这些声明必须与函数中声明的确切类型一致。\n\n```php\nshowString(5); // Fatal\
  \ error: Uncaught TypeError\n```\n\n"
- "# 19. 类型转换\n\nPHP 会根据使用上下文自动转换变量的数据类型。因此，通常不需要显式类型转换。尽管如此，可以通过执行显式类型转换来更改变量或表达式的类型。\n\
  \n## 显式转换\n\n显式转换通过在要计算的变量或值之前将所需的数据类型放在括号中来执行。在以下示例中，显式转换强制将`bool`变量作为`int`进行评估。\n\
  \n```php\n$myBool = false;\n$myInt = (int)$myBool; // 0\n```\n\n当`bool`变量作为输出发送到页面时，可以看到显式转换的一种用途。由于自动类型转换，`false`值会变成空字符串；因此它不会被显示。通过首先将其转换为整数，`false`值会显示为`0`。\n\
  \n\n```php\necho $myBool;      // \"\"\necho (int)$myBool; // \"0\"\n```\n\n允许的强制类型转换参见表\
  \ 19-1。\n\n表 19-1. 允许的类型转换\n\n| 名称 | 描述 |\n| --- | --- |\n| `(int)`, `(integer)`\
  \ | 强制转换为 `int` |\n| `(bool)`, `(boolean)` | 强制转换为 `bool` |\n| `(float)`, `(double)`,\
  \ `(real)` | 强制转换为 `float` |\n| `(string)` | 强制转换为 `string` |\n| `(array)` | 强制转换为\
  \ `array` |\n| `(object)` | 强制转换为 `object` |\n| `(unset)` | 强制转换为 `null` |\n\n举例来说，数组类型转换会将标量类型转换为包含单个元素的数组。其功能与使用数组构造函数相同。\n\
  \n```php\n$myInt = 10;\n$myArr = (array)$myInt;\n$myArr = array($myInt); // 同上\n\
  echo $myArr[0]; // \"10\"\n```\n\n如果将 `int` 等标量类型强制转换为对象，它将成为内置 `stdClass` 类的一个实例。该变量的值存储在此类的一个名为\
  \ `scalar` 的属性中。\n\n```php\n$myObj = (object)$myInt;\necho $myObj->scalar; // \"\
  10\"\n```\n\n`(unset)` 强制转换会使变量求值为 `null`。尽管其名称如此，但它实际上并不会取消设置该变量。这种强制转换只是为了完整性而存在，因为\
  \ `null` 被认为是一种数据类型。\n\n```php\n$myNull = (unset)$myInt;\n$myNull = null; // 同上\n\
  ```\n\n## Settype（设置类型）\n\n显式强制转换不会改变其前面变量的类型，只会改变该变量在该表达式中的求值方式。要更改变量的类型，可以使用 `settype`\
  \ 函数，该函数接受两个参数。第一个是要转换的变量，第二个是以字符串形式给出的数据类型。\n\n```php\n$myVar = 1.2;\nsettype($myVar,\
  \ 'int'); // 将变量转换为 int\n```\n\n或者，也可以将显式强制转换的结果存回同一个变量来执行类型转换。\n\n```php\n$myVar\
  \ = 1.2;\n$myVar = (int)$myVar; // 1\n```\n\n## Gettype（获取类型）\n\n与 `settype` 相关的是\
  \ `gettype` 函数，它返回所提供参数的数据类型，返回结果为人类可读的字符串。\n\n```php\n$myBool = true;\necho gettype($myBool);\
  \ // \"boolean\"\n```\n\n## 20. 变量测试\n\n作为一种以 Web 为中心的编程语言，在 PHP 中处理用户提供的数据是很常见的。在使用这些数据之前，需要对其进行测试，以确认数据存在且有效。PHP\
  \ 提供了许多可用于此目的的内置结构。\n\n### Isset\n\n`isset` 语言结构在变量存在且已被赋予 `null` 以外的值时返回 `true`。\n\
  \n```php\nisset($a); // false\n$a = 10;\nisset($a); // true\n$a = null;\nisset($a);\
  \ // false\n```\n\n### Empty\n\n`empty` 结构检查指定变量是否具有空值（例如 `null`、`0`、`false` 或空字符串），如果是，则返回\
  \ `true`。如果变量不存在，它也会返回 `true`。\n\n```php\nempty($b); // true\n$b = false;\nempty($b);\
  \ // true\n```\n\n### Is_null\n\n`is_null` 结构可用于测试变量是否被设置为 `null`。\n\n```php\n$c\
  \ = null;\nis_null($c); // true\n$c = 10;\nis_null($c); // false\n```\n\n如果变量不存在，`is_null`\
  \ 也会返回 `true`，但会伴随一个错误通知，因为它不应该与未初始化的变量一起使用。\n\n```php\nis_null($d); // true (未定义变量通知)\n\
  ```\n\n与 `null` 进行严格相等检查在功能上等同于使用 `is_null` 结构。通常更倾向于使用 `===` 运算符，因为它更具可读性，并且由于不涉及函数调用的开销，速度稍快。\n\
  \n```php\n$c = null;\n$c === null; // true\n```\n\n### Unset\n\n另一个值得了解的语言结构是 `unset`，它从当前作用域中删除一个变量。\n\
  \n```php\n$e = 10;\nunset($e); // 删除 $e\n```\n\n当使用 `global` 关键字在函数中访问全局变量时，这段代码实际上会在\
  \ `$GLOBALS` 数组中创建一个指向全局变量的本地引用。因此，尝试在函数中 `unset` 一个全局变量只会删除这个本地引用。要从函数作用域中删除全局变量，必须直接对\
  \ `$GLOBALS` 数组执行 `unset`。\n\n```php\nfunction myUnset()\n{\n    // Make $o a reference\
  \ to $GLOBALS['o']\n    global $o;\n    // Remove the reference variable\n    unset($o);\n\
  \    // Remove the global variable\n    unset($GLOBALS['o']);\n}\n```\n\n取消设置变量（`unset`）与将变量设置为\
  \ `null` 略有不同。当变量被设置为 `null` 时，变量仍然存在，但其持有的变量内容立即被释放。相反，取消设置变量会删除变量，但内存仍被视为正在使用，直到垃圾回收器将其清除。抛开性能问题不谈，建议使用\
  \ `unset`，因为它能使代码的意图更清晰。\n\n```php\n$var = null; // 释放内存\nunset($var); // 删除变量\n\
  ```\n\n请记住，大多数情况下无需手动取消设置变量，因为 PHP 垃圾回收器会在变量超出作用域时自动删除它们。然而，如果服务器执行内存密集型任务，手动取消设置这些变量可以让服务器在耗尽内存之前处理更多的并发请求。\n\
  \n## Null 合并运算符\n\nNull 合并运算符（`??`）是在 PHP 7 中新增的，作为常见使用 `isset` 的三元运算的快捷方式。如果第一个操作数存在且不为\
  \ `null`，则返回该操作数；否则返回第二个操作数。\n\n```php\n$x = null;\n$name = $x ?? 'unknown'; //\
  \ \"unknown\"\n```\n\n该语句等价于以下使用 `isset` 结构的三元运算：\n\n```php\n$name = isset($x) ?\
  \ $x : 'unknown';\n```\n\n## 确定类型\n\nPHP 有几个用于确定变量类型的有用函数。这些函数可以在表 20-1 中查看。\n\n\
  **表 20-1. 用于确定变量类型的函数**\n\n| 名称                                 | 描述           \
  \                |\n| ------------------------------------ | ------------------------------\
  \ |\n| `is_array()`                         | 如果变量是数组，则为 `true`。    |\n| `is_bool()`\
  \                          | 如果变量是布尔值，则为 `true`。   |\n| `is_callable()`        \
  \              | 如果变量可以作为函数调用，则为 `true`。 |\n| `is_float()`, `is_double()`, `is_real()`\
  \ | 如果变量是浮点数，则为 `true`。  |\n| `is_int()`, `is_integer()`, `is_long()` | 如果变量是整数，则为\
  \ `true`。    |\n| `is_null()`                          | 如果变量被设置为 `null`，则为 `true`。\
  \ |\n| `is_numeric()`                       | 如果变量是数字或数字字符串，则为 `true`。 |\n| `is_scalar()`\
  \                        | 如果变量是整数、浮点数、字符串或布尔值，则为 `true`。 |\n| `is_object()`   \
  \                     | 如果变量是对象，则为 `true`。     |\n| `is_resource()`            \
  \          | 如果变量是资源，则为 `true`。     |\n| `is_string()`                        |\
  \ 如果变量是字符串，则为 `true`。   |\n\n举例来说，`is_numeric` 函数如果参数包含数字或可以计算为数字的字符串，则返回 `true`。\n\
  \n```php\nis_numeric(10.5);   // true  (float)\nis_numeric('33');   // true  (numeric\
  \ string)\nis_numeric('text'); // false (non-numeric string)\n```\n\n### 变量信息\n\n\
  PHP 有三个内置函数用于检索变量信息：`print_r`、`var_dump` 和 `var_export`。`print_r` 函数以人类可读的方式显示变量的值，对调试非常有用。\n\
  \n```php\n$a = array('one', 'two', 'three');\nprint_r($a);\n```\n\n上述代码将产生以下输出：\n\
  \n```\nArray ( [0] => one [1] => two [2] => three )\n```\n\n与 `print_r` 类似的是 `var_dump`，它除了显示值之外，还显示数据类型和大小。调用\
  \ `var_dump($a)` 会显示以下输出：\n\n```\narray(3) {\n  [0]=> string(3) \"one\"\n  [1]=>\
  \ string(3) \"two\"\n  [2]=> string(5) \"three\"\n}\n```\n\n最后，还有 `var_export` 函数，它以可以作为\
  \ PHP 代码使用的样式打印变量信息。以下显示了 `var_export($a)` 的输出。注意最后一个元素后面的尾部逗号，这是允许的。\n\n```\narray\
  \ (\n  0 => 'one',\n  1 => 'two',\n  2 => 'three',\n)\n```\n\n`var_export` 函数与 `print_r`\
  \ 一样，接受一个可选的布尔类型第二个参数。当设置为 `true` 时，该函数返回输出而不是打印它。这使得 `var_export` 有更多用途，例如与 `eval`\
  \ 语言结构结合使用。该结构接受一个字符串参数并将其作为 PHP 代码进行求值。\n\n\n```php\neval('$b = ' . var_export($a,\
  \ true) . ';');\n```\n\n使用`eval`执行任意代码是一项强大的功能，应当谨慎使用。若未经适当验证，不应将其用于执行任何用户提供的数据，因为这会带来安全风险。不鼓励使用`eval`的另一个原因是，与`goto`类似，它会使代码执行流程难以追踪，从而增加调试难度。\n\
  \n## 重载\n\nPHP 中的重载提供了在运行时添加对象成员的能力。这是通过让类实现重载方法`__get`、`__set`、`__call`和`__callStatic`来实现的。请记住，PHP\
  \ 中重载的含义与其他许多语言不同。\n\n### 属性重载\n\n`__get`和`__set`方法为实现 getter 和 setter 方法提供了一种便捷方式，这些方法通常用于安全地读写属性。当使用的属性不可访问时（无论是在类中未定义，还是因当前作用域限制导致不可用），这些重载方法就会被调用。在以下示例中，`__set`方法将所有不可访问的属性添加到`$data`数组中，而`__get`则安全地检索这些元素。\n\
  \n```php\nclass MyProperties\n{\n    private $data = array();\n    public function\
  \ __set($name, $value)\n    {\n        $this->data[$name] = $value;\n    }\n   \
  \ public function __get($name)\n    {\n        if (array_key_exists($name, $this->data))\n\
  \            return $this->data[$name];\n    }\n}\n```\n\n当为不可访问的属性赋值时，会调用`__set`方法，其参数为属性名称和值。同样，当访问不可访问的属性时，会调用`__get`方法，参数为属性名称。\n\
  \n```php\n$obj = new MyProperties();\n$obj->a = 1;  // 调用 __set\necho $obj->a; //\
  \ 调用 __get\n```\n\n### 方法重载\n\n有两种方法用于处理对类中不可访问方法的调用：`__call`和`__callStatic`。`__call`方法用于实例方法的调用。\n\
  \n```php\nclass MyClass\n{\n    public function __call($name, $args)\n    {\n  \
  \      echo \"Calling $name $args[0]\";\n    }\n}\n// 输出: \"Calling myTest in object\
  \ context\"\n(new MyClass())->myTest('in object context');\n```\n\n`__call`的第一个参数是被调用方法的名称，第二个参数是一个包含传递给该方法参数的数值数组。这些参数对于`__callStatic`方法也是相同的，后者用于处理对不可访问静态方法的调用。\n\
  \n```php\nclass MyClass\n{\n    public static function __callStatic($name, $args)\n\
  \    {\n        echo \"Calling $name $args[0]\";\n    }\n}\n// 输出: \"Calling myTest\
  \ in static context\"\nMyClass::myTest('in static context');\n```\n\n### Isset 和\
  \ Unset 重载\n\n内置的结构`isset`、`empty`和`unset`仅适用于显式定义的属性，而非重载属性。通过重载`__isset`和`__unset`方法，可以为类添加此功能。\n\
  \n```php\nclass MyClass\n{\n    private $data = array();\n    public function __set($name,\
  \ $value) {\n        $this->data[$name] = $value;\n    }\n    public function __get($name)\
  \ {\n        if (array_key_exists($name, $this->data))\n            return $this->data[$name];\n\
  \    }\n    public function __isset($name) {\n        return isset($this->data[$name]);\n\
  \    }\n    public function __unset($name) {\n        unset( $this->data[$name]\
  \ );\n    }\n}\n```\n\n当对不可访问的属性调用`isset`时，会调用`__isset`方法。\n\n```php\n$obj = new\
  \ MyClass();\n$obj->name = \"Joe\";\nisset($obj->name); // true\nisset($obj->age);\
  \  // false\n```\n\n当对不可访问的属性调用`unset`时，`__unset`方法会处理该调用。\n\n```php\nunset($obj->name);\
  \ // 删除属性\nisset($obj->name); // false\n```\n\n`empty`结构仅当同时实现了`__isset`和`__get`时才适用于重载属性。如果`__isset`返回\
  \ false，则`empty`结构返回`true`。反之，如果`__isset`返回 true，则`empty`会通过`__get`检索该属性，并判断其是否具有被视为空的值。\n\
  \n```php\nempty($obj->name); // false\nempty($obj->age);  // true\n```\n\n\n\n"
- "# 22. 魔术方法\n\nPHP 引擎内部会调用类中实现的若干方法，这些方法被称为**魔术方法**，识别它们很容易，因为其名称均以两个下划线开头。表 22-1\
  \ 列出了目前已讨论过的魔术方法。\n\n表 22-1. 魔术方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `__construct(...)`\
  \ | 创建新实例时调用。 |\n| `__destruct()` | 对象不再被引用时调用。 |\n| `__call($name, $array)` | 在对象上下文中调用不可访问的方法时调用。\
  \ |\n| `__callStatic($name, $array)` | 在静态上下文中调用不可访问的方法时调用。 |\n| `__get($name)`\
  \ | 读取不可访问属性数据时调用。 |\n| `__set($name, $value)` | 写入不可访问属性数据时调用。 |\n| `__isset($string)`\
  \ | 对不可访问属性使用 `isset` 或 `empty` 时调用。 |\n| `__unset($string)` | 对不可访问属性使用 `unset`\
  \ 时调用。 |\n\n除此之外还有六个魔术方法，与其他方法一样，它们可以在类中实现以提供特定功能。\n\n表 22-2. 更多魔术方法\n\n| 名称 | 描述\
  \ |\n| --- | --- |\n| `__toString()` | 对象转换为字符串时调用。 |\n| `__invoke(...)` | 对象转换为函数时调用。\
  \ |\n| `__sleep()` | 由 `serialize` 调用。执行清理任务并返回一个待序列化的变量数组。 |\n| `__wakeup()` |\
  \ 由 `unserialize` 调用，用于重建对象。 |\n| `__set_state($array)` | 由 `var_export` 调用。该方法必须为静态方法，其参数包含导出的属性。\
  \ |\n| `__clone()` | 对象被克隆后调用。 |\n\n## `__toString`\n\n当对象在需要字符串的上下文中使用时，PHP 引擎会查找名为\
  \ `__toString` 的方法，以获取对象的字符串表示形式。\n\n```\nclass MyClass\n{\npublic function __toString()\n\
  {\nreturn 'Instance of ' . __CLASS__;\n}\n}\n$obj = new MyClass();\necho $obj; //\
  \ 输出 \"Instance of MyClass\"\n```\n\n除字符串类型外，无法定义对象在评估为其他类型时的行为。\n\n## `__invoke`\n\
  \n`__invoke` 方法允许将对象当作函数来使用。调用对象时提供的参数会作为 `__invoke` 函数的参数。\n\n```\nclass MyClass\n\
  {\npublic function __invoke($arg)\n{\necho $arg;\n}\n}\n$obj = new MyClass();\n\
  $obj('Test'); // 输出 \"Test\"\n```\n\n### 对象序列化\n\n序列化是将数据转换为字符串格式的过程。这对于在数据库或文件中存储对象非常有用。在\
  \ PHP 中，内置的 `serialize` 函数执行此对象到字符串的转换，而 `unserialize` 则将字符串还原为原始对象。`serialize`\
  \ 函数可处理所有类型，但不包括资源类型（用于保存数据库连接和文件句柄等）。请考虑以下简单的数据库类。\n\n```\nclass MyConnection\n\
  {\npublic $link, $server, $user, $pass;\npublic function connect()\n{\n$this->link\
  \ = mysql_connect($this->server,\n$this->user,\n$this->pass);\n}\n}\n```\n\n当此类被序列化时，数据库连接会丢失，并且保存连接的\
  \ `$link` 资源类型变量会存储为 null。\n\n```\n$obj = new MyConnection();\n// ...\n$bin = serialize($obj);\
  \   // 序列化对象\n$obj = unserialize($bin); // 还原对象\n```\n\n为了更精细地控制对象数据的序列化和反序列化方式，该类可以实现\
  \ `__sleep` 和 `__wakeup` 方法。\n\n### `__sleep`\n\n`__sleep` 方法由 `serialize` 调用，需要返回一个包含将被序列化的属性的数组。此数组不得包含私有或受保护的属性，因为\
  \ `serialize` 无法访问它们。该方法还可以在序列化发生前执行清理任务，例如将待处理数据提交到存储介质。\n\n\n\n```php\npublic\
  \ function __sleep()\n{\n    return array('server', 'user', 'pass');\n}\n```\n\n\
  请注意，这些属性以字符串形式返回给`serialize`。其中`$link`资源类型的指针未包含在数组中，因为它无法被序列化。为了重新建立数据库连接，可以使用`__wakeup`方法。\n\
  \n### Wakeup\n\n对序列化后的对象调用`unserialize`会调用`__wakeup`方法来恢复该对象。该方法不接受参数，也无需返回值。它用于重新建立资源类型的变量，以及执行对象反序列化后可能需要的其他初始化任务。在本例中，它重新建立了\
  \ MySQL 数据库连接。\n\n```php\npublic function __wakeup()\n{\n    if(isset($this->server,\
  \ $this->user, $this->$pass))\n        $this->connect();\n}\n```\n\n请注意，这里用多个参数调用了`isset`结构，在这种情况下，只有当所有参数都已设置时，它才会返回`true`。\n\
  \n### Set State\n\n`var_export`函数会检索可用作有效 PHP 代码的变量信息。下面这个例子展示了该函数用于一个对象时的用法。\n\n\
  ```php\nclass Fruit\n{\n    public $name = 'Lemon';\n}\n$export = var_export(new\
  \ Fruit(), true);\n```\n\n由于对象是一种复杂类型，没有通用的语法来构造它及其成员。相反，`var_export`会生成以下字符串。\n\
  \n```php\nFruit::__set_state(array( 'name' => 'Lemon', ))\n```\n\n为了构造对象，该字符串依赖于为该对象定义的静态`__set_state`方法。如所示，`__set_state`方法接受一个关联数组，其中包含对象每个属性的键值对，包括私有和受保护的成员。\n\
  \n```php\nstatic function __set_state(array $array)\n{\n    $tmp = new Fruit();\n\
  \    $tmp->name = $array['name'];\n    return $tmp;\n}\n```\n\n在`Fruit`类中定义此方法后，现在可以使用`eval`结构解析导出的字符串，以创建一个相同的对象。\n\
  \n```php\neval('$MyFruit = ' . $export . ';');\n```\n\n### Object Cloning\n\n将对象赋值给变量只会创建对该对象的新引用。要复制对象，可以使用`clone`运算符。\n\
  \n```php\nclass Fruit {}\n$f1 = new Fruit();\n$f2 = $f1;       // 复制对象引用\n$f3 =\
  \ clone $f1; // 复制对象\n```\n\n克隆对象时，其属性会被复制到新对象。然而，它可能包含的任何子对象不会被克隆，因此它们在副本之间是共享的。这就是`__clone`方法的用途。该方法在克隆完成后，于克隆出的副本上被调用。它可用于克隆任何子对象。\n\
  \n```php\nclass Apple {}\nclass FruitBasket\n{\n    public $apple;\n    function\
  \ __construct() { $apple = new Apple(); }\n    function __clone()\n    {\n     \
  \   $this->apple = clone $this->apple;\n    }\n}\n```\n\n## 23. 用户输入\n\n当 HTML 表单提交到\
  \ PHP 页面时，这些数据对该脚本来说就变得可用。\n\n### HTML 表单\n\nHTML 表单有两个必需的属性：`action`和`method`。`action`属性指定表单数据提交到的脚本。例如，以下表单将名为`myString`的输入属性提交到`mypage.php`脚本文件。\n\
  \n表单元素的另一个必需属性指定发送方法，可以是 GET 或 POST。\n\n### 使用 POST 发送\n\n如果使用 POST 方法发送表单，数据可以通过`$_POST`数组获取。属性的名称是该关联数组中的键。通过\
  \ POST 方法发送的数据在页面的 URL 上不可见，但这同时也意味着页面状态无法通过例如收藏页面等方式来保存。\n\n```php\necho $_POST['myString'];\n\
  ```\n\n### 使用 GET 发送\n\nPOST 的替代方法是使用 GET 方法发送表单数据，并通过`$_GET`数组检索。变量随后会显示在地址栏中，这实际上会在页面被收藏并重新访问时保持页面状态。\n\
  \n```php\necho $_GET['myString'];\n```\n\n由于数据包含在地址栏中，变量不仅可以通过 HTML 表单传递，还可以通过 HTML\
  \ 链接传递。然后可以使用`$_GET`数组相应地更改页面状态。这提供了一种将变量从一个页面传递到另一个页面的方法。\n\n```\n<a href=\"mypage.php?myString=Foo+Bar\"\
  >链接</a>\n```\n\n### 请求数组\n\n如果不在乎数据是使用 POST 还是 GET 方法发送的，可以使用`$_REQUEST`数组。该数组通常包含`$_GET`和`$_POST`数组，但也可能包含`$_COOKIE`数组。\n\
  \n```php\necho $_REQUEST['myString']; // \"Foo Bar\"\n```\n\n`$_REQUEST`数组的内容可以在\
  \ PHP 配置文件中设置¹，并且因 PHP 发行版而异。出于安全考虑，通常不包含`$_COOKIE`数组。\n\n### 安全问题\n\n任何用户提供的数据都可能被篡改；因此，在使用前应对其进行验证和清理。验证意味着要确保数据在数据类型、范围和内容方面符合预期形式。例如，以下代码验证电子邮件地址。\n\
  \n```php\nif(!filter_var($_POST['email'], FILTER_VALIDATE_EMAIL))\n    echo \"无效的电子邮件地址\"\
  ;\n```\n\n清理是指禁用用户输入中潜在的恶意代码。这是通过根据将要使用输入的语言规则对代码进行转义来完成的。例如，如果数据要发送到数据库，则需要使用`mysql_real_escape_string`函数进行清理，以禁用任何嵌入的\
  \ SQL 代码。\n\n```php\n// 为数据库使用进行清理\n$name = mysql_real_escape_string($_POST['name']);\n\
  // 执行 SQL 命令\n$sql = \"SELECT * FROM users WHERE user='\" . $name . \"'\";\n$result\
  \ = mysql_query($sql);\n```\n\n当用户提供的数据作为文本输出到网页时，应使用`htmlspecialchars`函数。它会禁用任何\
  \ HTML 标记，以便用户输入得以显示但不会被解释执行。\n\n```php\n// 为网页使用进行清理\necho htmlspecialchars($_POST['comment']);\n\
  ```\n\n### 提交数组\n\n通过在表单中的变量名后添加数组方括号，可以将表单数据分组到数组中。这适用于所有表单输入元素，包括`<input>`、`<select>`和`<textarea>`。\n\
  \n这些元素也可以被赋予它们自己的数组键。\n\n```html\n<input type=\"text\" name=\"myArr[0]\" />\n<input\
  \ type=\"text\" name=\"myArr[1]\" />\n<input type=\"text\" name=\"myArr[name]\"\
  \ />\n```\n\n提交后，该数组即可在脚本中使用。\n\n```php\n$val1 = $_POST['myArr'][0];\n$val2 = $_POST['myArr'][1];\n\
  $name = $_POST['myArr']['name'];\n```\n\n表单的`<select>`元素具有一个属性，允许从列表中选择多个项目。\n\n\
  ```html\n<select name=\"myArr[]\" multiple>\n    <option value=\"apple\">苹果</option>\n\
  \    <option value=\"orange\">橘子</option>\n    <option value=\"pear\">梨</option>\n\
  </select>\n```\n\n当在表单中包含此多选元素时，数组方括号对于在脚本中检索所选值来说变得必不可少。\n\n```php\nforeach ($_POST['myArr']\
  \ as $item)\n    echo $item . ' '; // 例如 \"苹果 橘子 梨\"\n```\n\n### 文件上传\n\nHTML 表单提供了一种文件输入类型，允许将文件上传到服务器。要使文件上传起作用，表单的可选`enctype`属性必须设置为`\"\
  multipart/form-data\"`，如下例所示。\n\n关于上传文件的信息存储在`$_FILES`数组中。该关联数组的键见表 23-1。\n\n**表\
  \ 23-1. `$_FILES`数组的键**\n\n| 名称        | 描述                   |\n|-------------|----------------------|\n\
  | `name`      | 上传文件的原始名称。     |\n| `tmp_name`  | 服务器上临时副本的路径。 |\n| `type`     \
  \ | 文件的 MIME 类型。      |\n| `size`      | 文件大小（以字节为单位）。|\n| `error`     | 错误代码。 \
  \            |\n\n接收到的文件仅临时存储在服务器上。如果脚本未保存它，它将被删除。以下展示了一个如何保存文件的简单示例。该示例检查错误代码以确保文件成功接收，如果是，则将文件移出临时文件夹进行保存。在实践中，你可能还需要检查文件大小和类型以决定是否保留该文件。\n\
  \n\n```php\n$dest = 'upload\\\\' . basename($_FILES['myfile']['name']);\n$file =\
  \ $_FILES['myfile']['tmp_name'];\n$err  = $_FILES['myfile']['error'];\nif($err ==\
  \ 0 && move_uploaded_file($file, $dest))\necho '文件成功上传';\n```\n\n这个例子中出现了两个新函数。`move_uploaded_file`\
  \ 函数会检查第一个参数是否为有效的上传文件，如果是，则将其移动到第二个参数指定的路径并重命名为该文件名。指定的文件夹必须已存在，若函数成功移动文件，则返回 `true`。另一个新函数是\
  \ `basename`。它返回路径中的文件名部分，包含文件扩展名。\n\n## 超全局变量（Superglobals）\n\n如本章所示，PHP 内置了若干关联数组，用于为\
  \ PHP 脚本提供外部数据。这些数组被称为超全局变量，因为它们可在所有作用域中自动生效。PHP 共有九个超全局变量，表 23-2 对每个变量进行了简要说明。\n\
  \n**表 23-2.** 超全局变量\n\n| 名称 | 描述 |\n| --- | --- |\n| `$GLOBALS` | 包含所有全局变量，包括其他超全局变量。\
  \ |\n| `$_GET` | 包含通过 HTTP GET 请求发送的变量。 |\n| `$_POST` | 包含通过 HTTP POST 请求发送的变量。\
  \ |\n| `$_FILES` | 包含通过 HTTP POST 文件上传发送的变量。 |\n| `$_COOKIE` | 包含通过 HTTP Cookie\
  \ 发送的变量。 |\n| `$_SESSION` | 包含存储在用户会话中的变量。 |\n| `$_REQUEST` | 包含 `$_GET`、`$_POST`\
  \ 以及可能包含的 `$_COOKIE` 变量。 |\n| `$_SERVER` | 包含关于 Web 服务器及其收到的请求的信息。 |\n| `$_ENV`\
  \ | 包含由 Web 服务器设置的所有环境变量。 |\n\n变量 `$_GET`、`$_POST`、`$_COOKIE`、`$_SERVER` 和 `$_ENV`\
  \ 的内容包含在 `phpinfo` 函数生成的输出中。该函数还会显示 PHP 配置文件 `php.ini` 的常规设置以及关于 PHP 的其他信息。\n\n\
  ```php\nphpinfo(); // 显示 PHP 信息\n```\n\n## 脚注\n\n[`http://www.php.net/manual/en/ini.core.php#ini.request-order`](http://www.php.net/manual/en/ini.core.php#ini.request-order)\n\
  \n## 24. Cookie\n\nCookie 是保存在客户端计算机上的一个小文件，可用于存储与该用户相关的数据。\n\n### 创建 Cookie\n\n\
  要创建 Cookie，可使用 `setcookie` 函数。该函数必须在向浏览器发送任何输出之前调用。它有三个必选参数，分别包含 Cookie 的名称、值和过期时间。\n\
  \n```php\nsetcookie(\"lastvisit\", date(\"H:i:s\"), time() + 60*60);\n```\n\n这里的值由\
  \ `date` 函数设置，该函数根据指定的格式字符串返回格式化后的时间字符串。过期时间以秒为单位，通常相对于通过 `time` 函数获取的当前时间（秒数）进行设置。在这个例子中，Cookie\
  \ 在一小时后过期。\n\n### Cookie 数组\n\n一旦为用户设置了 Cookie，该 Cookie 将在用户下次浏览页面时发送过来；随后可通过 `$_COOKIE`\
  \ 数组访问它。\n\n```php\nif (isset($_COOKIE['lastvisit']))\necho \"上次访问时间：\" . $_COOKIE['lastvisit'];\n\
  ```\n\n### 删除 Cookie\n\n可以通过重新创建相同的 Cookie 并设置一个旧的过期时间来手动删除 Cookie。当浏览器关闭时，该 Cookie\
  \ 会被移除。\n\n```php\nsetcookie(\"lastvisit\", 0, 0);\n```\n\n## 25. 会话（Sessions）\n\
  \n会话提供了一种让变量在多个网页间保持可访问性的方法。与 Cookie 不同，会话数据存储在服务器上。\n\n### 启动会话\n\n要开始一个会话，可使用\
  \ `session_start` 函数。该函数必须在向网页发送任何输出之前出现。\n\n`session_start` 函数会在客户端计算机上设置一个 Cookie，其中包含一个用于将客户端与会话关联的\
  \ ID。如果客户端已有进行中的会话，该函数会恢复该会话，而不是启动新会话。\n\n### 会话数组\n\n会话启动后，可使用 `$_SESSION` 数组来存储和检索会话数据。例如，以下代码用于存储页面浏览次数。第一次浏览页面时，会话元素被初始化为\
  \ 1。\n\n```php\nif(isset($_SESSION['views']))\n$_SESSION['views'] += 1;\nelse\n\
  $_SESSION['views'] = 1;\n```\n\n只要在页面的顶部调用了 `session_start`，就可以从该域中的任何页面检索此元素。\n\
  \n```php\necho '浏览次数：' . $_SESSION['views'];\n```\n\n### 删除会话\n\n会话会一直持续到用户离开网站；之后，垃圾回收器可以自由删除该会话。若要手动删除会话变量，可使用\
  \ `unset` 函数。若要删除所有会话变量，可使用 `session_destroy` 函数。\n\n```php\nunset($_SESSION['views']);\
  \ // 销毁会话变量\nsession_destroy();         // 销毁会话\n```\n\n## 26. 命名空间（Namespaces）\n\
  \n命名空间提供了一种避免命名冲突并将命名空间成员组织成层级结构的方法。任何代码都可以包含在命名空间中，但只有四种代码结构会受到影响：类、接口、函数和常量。\n\
  \n### 创建命名空间\n\n未包含在命名空间中的代码结构属于全局命名空间。\n\n```php\n// 全局代码/命名空间\nclass MyClass {}\n\
  ```\n\n要将代码结构分配到另一个命名空间，需定义一个 `namespace` 指令。该指令下方的代码结构都属于该命名空间。命名空间的命名约定是全部使用小写。\n\
  \n```php\nnamespace my;\n// 属于 my 命名空间\nclass MyClass {}\n```\n\n包含命名空间代码的脚本文件必须在文件最顶部、其他任何代码、标记或空白之前声明命名空间。`declare`\
  \ 语句是此规则的例外，因为它必须放在命名空间声明之前。\n\n### 嵌套命名空间\n\n命名空间可以嵌套任意多层，以进一步定义命名空间的层级结构。类似于 Windows\
  \ 中的目录和文件，命名空间及其成员之间用反斜杠字符分隔。\n\n```php\nnamespace my\\sub; class MyClass {} //\
  \ my\\sub\\MyClass\n```\n\n### 替代语法\n\n另外，命名空间也可以使用其他编程语言中常用的大括号语法来定义。与常规语法一样，命名空间外部不能存在任何文本或代码。\n\
  \n可以在同一个文件中声明多个命名空间，但这不被视为良好的编码实践。如果全局代码要与命名空间代码结合使用，则必须使用大括号语法。此时，全局代码被包裹在一个未命名的命名空间块中。\n\
  \n```php\n// 命名空间代码\nnamespace my\n{\nconst PI = 3.14;\n}\n// 全局代码\nnamespace\n\
  {\necho my\\PI; // \"3.14\"\n}\n```\n\n与其他 PHP 结构不同，同一个命名空间可以在多个文件中定义。这允许将命名空间成员分散到多个文件中。\n\
  \n### 引用命名空间\n\n命名空间成员可以通过三种方式引用：完全限定名称、限定名称和未限定名称。完全限定名称始终可以使用。它由全局前缀运算符（`\\`）开头，后跟命名空间路径和成员名称。全局前缀运算符表示该路径相对于全局命名空间。\n\
  \n```php\nnamespace my\n{\nclass MyClass {}\n}\nnamespace other\n{\n// 完全限定名称\n\
  $obj = new \\my\\MyClass();\n}\n```\n\n限定名称包含命名空间路径，但不包含全局前缀运算符。因此，只有当所需成员在当前命名空间层级结构的下级命名空间中定义时，才能使用限定名称。\n\
  \n```php\nnamespace my\n{\nclass MyClass {}\n}\nnamespace\n{\n// 限定名称\n$obj = new\
  \ my\\MyClass();\n}\n```\n\n仅使用成员名称，即未限定名称，只能在定义该成员的命名空间内部使用。\n\n```php\nnamespace\
  \ my\n{\nclass MyClass {}\n// 未限定名称\n$obj = new MyClass();\n}\n```\n\n\n"
- '# 命名空间与引用


  未限定的类名和接口名仅解析到当前命名空间。相比之下，如果一个未限定的函数或常量在当前命名空间中不存在，它们将尝试解析为同名的全局函数或常量。


  ```php

  namespace

  {

  function myPrint() { echo ''global''; } }

  namespace my

  {

  // 回退到全局命名空间

  myPrint(); // "global"

  }

  ```


  另外，可以使用全局前缀操作符显式地引用全局成员。如果当前命名空间包含一个同名函数时，这是必要的。


  ```php

  namespace my

  {

  function myPrint() { echo ''local''; }

  \myPrint(); // "global"

  myPrint();  // "local"

  }

  ```


  ### 命名空间别名


  别名缩短了限定名称，以提高源代码的可读性。类名、接口名和命名空间名都可以被缩短。别名通过`use`指令定义，该指令必须放在文件最顶层作用域的命名空间名称之后。


  ```php

  namespace my;

  class MyClass {}

  namespace foo;

  use my\MyClass as MyAlias;

  $obj = new MyAlias();

  ```


  使用括号语法时，任何`use`指令都放在最顶层作用域的开头花括号之后。


  ```php

  namespace foo;

  {

  use my\MyClass as MyAlias;

  $obj = new MyAlias();

  }

  ```


  `as`子句可以省略，此时成员以其当前名称被导入。


  ```php

  namespace foo; use \my\MyClass;

  $obj = new MyClass();

  ```


  不可能一次批量导入另一个命名空间的所有成员。然而，有一个语法快捷方式可以在同一个`use`语句中导入多个成员。


  ```php

  namespace foo;

  use my\Class1 as C1, my\Class2 as C2;

  ```


  PHP 7 进一步简化了此语法，允许`use`声明在花括号内分组。


  ```php

  namespace foo; use my\{ Class1 as C1, Class2 as C2 };

  ```


  除了类、接口和命名空间之外，PHP 5.6 扩展了`use`结构以支持函数和常量别名。它们分别通过`use function`和`use const`结构导入。


  ```php

  namespace my\space {

  const C = 5;

  function f() {}

  }

  namespace {

  use const my\space\C;

  use function my\space\f;

  }

  ```


  请记住，别名仅适用于定义它们的脚本文件。因此，被导入的文件不会继承父文件的别名。


  ### 命名空间关键字


  `namespace`关键字可以作为一个常量使用，其值为当前命名空间，或者在全局代码中为空字符串。它可以用来显式地引用当前命名空间。


  ```php

  namespace my\name

  {

  function myPrint() { echo ''Hi''; }

  }

  namespace my

  {

  namespace\name\myPrint(); // "Hi"

  name\myPrint();           // "Hi"

  }

  ```


  ### 命名空间指南


  随着 Web 应用程序中涉及的组件数量增长，名称冲突的可能性也在增加。一个解决方案是用组件名作为名称的前缀。然而，这会产生很长的名称，降低了源代码的可读性。因此，PHP
  5.3 引入了命名空间，它允许开发者为每个组件将代码分组到独立命名的容器中。


  '
- '# 27. 引用


  引用是一种别名，允许两个不同的变量写入同一个值。使用引用可以执行三种操作：引用赋值、引用传递和引用返回。


  ### 引用赋值


  通过在要绑定的变量前放置一个与号（`&`）来分配引用。


  ```php

  $x = 5;

  $r = &$x; // r 是 x 的引用

  $s =& $x; // 另一种语法

  ```


  该引用随后成为该变量的别名，可以像原始变量一样使用。


  ```php

  $r = 10; // 给 $r/$x 赋值

  echo $x; // "10"

  ```


  ### 引用传递


  在 PHP 中，函数参数默认是按值传递的。这意味着传递的是变量的一个本地副本；因此如果副本被修改，不会影响原始变量。


  ```php

  function myFunc($x) { $x .= '' World''; }

  $x = ''Hello'';

  myFunc($x); // 传递 x 的值

  echo $x;    // "Hello"

  ```




  为了允许函数修改参数，必须通过引用传递参数。这通过在函数定义中在参数名称前添加一个与符号（`&`）来实现。


  ```

  function myFunc(&$x) { $x .= '' World''; }

  $x = ''Hello'';

  myFunc($x); // reference to x is passed

  echo $x;    // "Hello World"

  ```


  默认情况下，对象变量也是按值传递的。然而，实际传递的是指向对象数据的指针，而不是数据本身。因此，对对象成员的修改会影响原始对象，但使用赋值运算符替换对象变量只会创建一个局部变量。


  ```

  class MyClass { public $x = 1; }

  function modifyVal($o)

  {

  $o->x = 5;

  $o = new MyClass(); // new local object

  }

  $o = new MyClass();

  modifyVal($o);        // pointer to object is passed

  echo $o->x;           // "5"

  ```


  相比之下，当对象变量通过引用传递时，不仅可以更改其属性，还可以替换整个对象，并且更改会传播回原始对象变量。


  ```

  class MyClass { public $x = 1; }

  function modifyRef(&$o)

  {

  $o->x = 5;

  $o = new MyClass(); // new object

  }

  $o = new MyClass();

  modifyRef($o);        // reference to object is passed

  echo $o->x;           // "1"

  ```


  ### 通过引用返回


  可以通过让函数返回引用来将变量从函数中赋值为引用。返回引用的语法是在函数名称前放置与符号（`&`）。与按引用传递相反，在调用函数以绑定引用时也需要使用与符号。


  ```

  class MyClass

  {

  public $val = 10;

  function &getVal()

  {

  return $this->val;

  }

  }

  $obj = new MyClass();

  $myVal = &$obj->getVal();

  ```


  请记住，不应仅仅为了性能原因而使用引用，因为 PHP 引擎会自行处理此类优化。只有在需要引用类型的行为时才使用引用。


  ## 28. 高级变量


  除了作为数据的容器，PHP 变量还具有本章将探讨的其他特性。这些是不常用但值得了解的特性。


  ### 花括号语法


  可以通过将变量名括在花括号中显式指定它。这被称为花括号或复杂语法。为了说明，以下代码输出了该变量，即使它出现在一个单词的中间。


  ```

  $fruit = ''Apple'';

  echo "Two {$fruit}s"; // "Two Apples"

  ```


  更重要的是，花括号语法对于从表达式构造变量名很有用。考虑以下代码，它使用花括号语法为三个变量构造名称。


  ```

  for ($i = 1; $i <= 3; $i++)

  ${''x''.$i} = $i;

  echo "$x1 $x2 $x3"; // "1 2 3"

  ```


  这里需要花括号语法，因为需要计算表达式以形成有效的变量名。如果表达式只有一个变量，则不需要花括号。


  ```

  for ($i = ''a''; $i <= ''c''; $i++)

  $$i = $i;

  echo "$a $b $c"; // "a b c"

  ```


  这种语法在 PHP 中被称为可变变量。


  ### 可变变量名


  可变变量是其名称可以通过代码更改的变量。例如，考虑以下常规变量。


  ```

  $a = ''foo'';

  ```


  通过在其前面放置额外的美元符号，可以将此变量的值用作变量名。


  ```

  $$a = ''bar'';

  ```


  `$a`的值（即`foo`）现在成为`$$a`变量的替代名称。


  ```

  echo $foo; // "bar"

  echo $$a;  // "bar"

  ```


  这种用法的一个示例是从数组生成变量。


  ```

  $arr = array(''a'' => ''Foo'', ''b'' => ''Bar'');

  foreach ($arr as $key => $value)

  {

  $$key = $value;

  }

  echo "$a $b"; // "Foo Bar"

  ```


  ### 可变函数名


  通过在变量后放置括号，其值会被评估为函数的名称。


  ```

  function myPrint($s) { echo $s; }

  $func = ''myPrint'';

  $func(''Hello''); // "Hello"

  ```


  此行为不适用于内置语言结构，例如`echo`。



  ```php

  echo(''Hello'');  // "Hello"

  $func = ''echo'';

  $func(''Hello''); // error

  ```


  ### 变量类名


  与变量函数名类似，也可以通过字符串变量来引用类。此功能在 PHP 5.3 中引入。


  ```php

  class MyClass {}

  $classname = ''MyClass'';

  $obj = new $classname();

  ```


  通过字符串和字符串变量访问代码实体的机制同样适用于类或实例的成员。


  ```php

  class MyClass

  {

  public $myProperty = 10;

  }

  $obj = new MyClass();

  echo $obj->{''myProperty''}; // "10"

  ```


  ## 29. 错误处理


  错误是代码中需要开发者修复的失误。当 PHP 中发生错误时，默认行为是在浏览器中显示错误信息。该信息包含文件名、行号和错误描述，以帮助开发者纠正问题。


  虽然编译错误和解析错误通常易于发现和修复，但运行时错误可能更难找到，因为它们可能只在特定情况下发生，且原因超出开发者的控制。考虑以下尝试使用 `fopen` 函数打开文件进行读取的代码。


  ```php

  $handle = fopen(''myfile.txt'', ''r'');

  ```


  它依赖于所请求文件始终存在的假设。如果由于任何原因文件不存在或无法访问，该函数将生成一个错误。


  ```

  Warning: fopen(myfile.txt):

  failed to open stream: No such file or directory in C:\xampp\htdocs\mypage.php on
  line 2

  ```


  一旦检测到错误，就应予以纠正，即使它只在异常情况下发生。


  ### 纠正错误


  有两种方法可以纠正这个错误。第一种方法是在尝试打开文件之前检查文件是否可读。PHP 提供了方便的 `is_readable` 函数来完成此任务，如果指定文件存在且可读，则返回
  `true`。


  ```php

  if (is_readable(''myfile.txt''))

  $handle = fopen(''myfile.txt'', ''r'');

  ```


  第二种方法是使用错误控制运算符（`@`）。当将其置于表达式之前时，它会抑制该表达式可能生成的任何错误消息。两种方法都能消除警告。


  ```php

  $handle = @fopen(''myfile.txt'', ''r'');

  ```


  要确定文件是否成功打开，需要检查返回值。查阅文档¹可知，`fopen` 在出错时返回 `false`。


  ```php

  if ($handle === false)

  {

  echo ''File not found.'';

  }

  ```


  如果情况并非如此，则可以使用 `fread` 函数读取文件内容。该函数从第一个参数给定的文件句柄中读取第二个参数指定的字节数。


  ```php

  else

  {

  // 读取整个文件的内容

  $content = fread($handle, filesize(''myfile.txt''));

  // 关闭文件句柄

  fclose($handle);

  }

  ```


  当不再需要文件句柄时，最好使用 `fclose` 将其关闭；尽管 PHP 也会在脚本执行完毕后自动关闭文件。


  ### 错误级别


  PHP 提供了几个内置常量来描述不同的错误级别。表 29-1 列出了一些较重要的常量。


  **表 29-1.** 错误级别


  | 名称 | 描述 |

  | --- | --- |

  | `E_ERROR` | 致命的运行时错误。执行被中止。 |

  | `E_WARNING` | 非致命的运行时错误。 |

  | `E_NOTICE` | 关于可能错误的运行时通知。 |

  | `E_USER_ERROR` | 用户生成的致命错误。 |

  | `E_USER_WARNING` | 用户生成的非致命警告。 |

  | `E_USER_NOTICE` | 用户生成的通知。 |

  | `E_COMPILE_ERROR` | 致命的编译时错误。 |

  | `E_PARSE` | 编译时解析错误。 |

  | `E_STRICT` | 为确保向前兼容性而建议的更改。 |

  | `E_ALL` | 所有错误，PHP 5.4 之前的版本中排除 `E_STRICT`。 |


  其中前三个级别表示由 PHP 引擎生成的运行时错误。以下是一些会触发这些错误的操作示例。




  ```php

  // E_NOTICE – 使用未赋值的变量

  $a = $x;

  // E_WARNING – 缺少文件

  $b = fopen(''missing.txt'', ''r'');

  // E_ERROR – 缺少函数

  $c = missing();

  ```


  ### 错误处理环境


  PHP 提供了几个配置指令来设置错误处理环境。`error_reporting` 函数用于设置 PHP 通过内部错误处理器报告哪些错误。错误级别常量具有位掩码值，这使得它们可以通过按位运算符进行组合与相减，如下所示。


  ```php

  error_reporting(E_ALL | ∼E_NOTICE); // 所有错误，但排除 E_NOTICE

  ```


  也可以在 `php.ini` 中永久更改错误报告级别。`php.ini` 中的默认值因服务器而异，但对于 XAMPP 服务器，其默认设置为显示所有错误消息。在开发过程中这是一个良好的设置，并且可以通过在脚本开头放置以下代码行以编程方式进行设置。请注意，这里添加了
  `E_STRICT`，因为直到 PHP 5.4，该错误级别才被包含在 `E_ALL` 中。


  ```php

  // 开发期间

  error_reporting(E_ALL | E_STRICT);

  ```


  当 Web 应用上线后，应隐藏原始错误消息，不向用户显示。这可通过 `display_errors` 指令实现。该指令决定内部错误处理器是否将错误信息打印到网页上。默认值是打印错误，但当网站处于生产环境时，最好隐藏任何潜在的原始错误消息。


  ```php

  // 生产环境期间

  ini_set(''display_errors'',''0'');

  ```


  另一个与错误处理环境相关的指令是 `log_errors`。它决定错误消息是否记录到服务器的错误日志中。该指令默认是禁用的，但在开发过程中启用它以追踪错误是一个好习惯。


  ```php

  // 开发期间

  ini_set(''log_errors'',''1'');

  ```


  `ini_set` 函数用于设置配置选项的值。或者，这些选项也可以在 `php.ini` 配置文件中永久设置，而非在脚本文件中设置。


  ### 自定义错误处理器


  内部错误处理器可以被自定义错误处理器覆盖。这是处理错误的首选方法，因为它允许你将原始错误抽象化，向终端用户展示友好、自定义的错误消息。


  自定义错误处理器通过 `set_error_handler` 函数定义。该函数接受两个参数：一个在错误发生时被调用的回调函数，以及可选的、该函数处理的错误级别。


  ```php

  set_error_handler(''myError'', E_ALL | E_STRICT);

  ```


  如果未指定错误级别，错误处理器将被设置为处理所有错误，包括 `E_STRICT`。但是，用户自定义的错误处理器实际上只能处理运行时错误，并且只能是除 `E_ERROR`
  之外的运行时错误。请记住，对 `error_reporting` 设置的更改不会影响自定义错误处理器，只会影响内部错误处理器。


  回调函数需要两个参数：错误级别和错误描述。可选参数包括文件名、行号以及错误上下文（一个包含错误触发作用域内所有变量的数组）。


  ```php

  function myError($errlvl, $errdesc, $errfile, $errline)

  {

  switch($errlvl)

  {

  case E_USER_ERROR:

  error_log("Error: $errdesc", 1, ''me@example.com'');

  require_once(''my_error_page.php'');

  return true;

  }

  return false;

  }

  ```


  这个示例函数处理 `E_USER_ERROR` 级别的错误。当此类错误发生时，会向指定地址发送一封电子邮件，并显示一个自定义错误页面。对于其他错误，通过从函数返回
  `false`，使其由内部错误处理器处理。


  ### 触发错误


  PHP 提供了 `trigger_error` 函数用于触发错误。它有一个必需的参数——错误消息，以及一个可选的第二个参数来指定错误级别。错误级别必须是三个 `E_USER`
  级别之一，其中 `E_USER_NOTICE` 是默认级别。



  ```php

  if( !isset($myVar) )

  trigger_error(''$myVar 未设置''); // E_USER_NOTICE

  ```


  当你设置了自定义错误处理器时，触发错误非常有用，这样可以将自定义错误和 PHP 引发的错误进行统一处理。


  脚注


  [`http://www.php.net/manual/en/function.fopen.php`](http://www.php.net/manual/en/function.fopen.php)


  ## 30. 异常处理


  PHP 5 引入了异常，这是一种内建机制，用于在程序失败发生的上下文中处理这些失败。与通常需要由开发者修复的错误不同，异常是由脚本处理的。它们代表一种非正常的运行时情况，这种情况应该被作为可能性提前预见，并且脚本应该能够自行处理。


  ### try-catch 语句


  要处理一个异常，必须使用 `try-catch` 语句将其捕获。该语句由一个 `try` 块（包含可能引发异常的代码）和一个或多个 `catch` 子句组成。


  ```php

  try

  {

  $div = invert(0);

  }

  catch (LogicException $e) {}

  ```


  如果 `try` 块成功执行，程序将继续在 `try-catch` 语句之后运行。然而，如果发生异常，执行流程将传递给第一个能够处理该异常类型的 `catch`
  块。


  ### 抛出异常


  当函数遇到无法恢复的情况时，它可以生成一个异常来向调用者表明函数执行失败。这是通过使用 `throw` 关键字，后面跟一个 `Exception` 类或其子类（如
  `LogicException`）的新实例来实现的。¹


  ```php

  function invert($x)

  {

  if ($x == 0)

  throw new LogicException(''除零错误'');

  return 1 / $x;

  }

  ```


  ### Catch 块


  在前面的例子中，`catch` 块被设置为处理内建的 `LogicException` 类型。如果 `try` 块中的代码可能抛出更多类型的异常，可以使用多个
  `catch` 块，从而以不同方式处理不同的异常。


  ```php

  catch (LogicException $e) {}

  catch (RuntimeException $e) {}

  // ...

  ```


  要捕获更具体的异常，需要将 `catch` 块放在更通用的异常之前。例如，`LogicException` 继承自 `Exception`，因此需要先捕获 `LogicException`。


  ```php

  catch (LogicException $e) {}

  catch (Exception $e) {}

  ```


  `catch` 子句定义了一个异常对象。该对象可用于获取关于异常的更多信息，例如使用 `getMessage` 方法获取异常的描述。


  ```php

  catch (LogicException $e)

  {

  echo $e->getMessage(); // "除零错误"

  }

  ```


  ### Finally 块


  PHP 5.5 引入了 `finally` 块，它可以作为 `try-catch` 语句的最后一个子句添加。该块用于释放 `try` 块中分配的资源。无论是否发生异常，它都会执行。


  ```php

  $resource = myopen();

  try { myuse($resource); }

  catch(Exception $e) {}

  finally { myfree($resource); }

  ```


  ### 重新抛出异常


  有时异常无法在首次捕获的地方处理。这时可以使用 `throw` 关键字后跟异常对象将其重新抛出。


  ```php

  try { $div = invert(0); }

  catch (LogicException $e) { throw $e; }

  ```


  随后，异常会沿着调用栈向上传播，直到被另一个 `try-catch` 语句捕获。如果异常始终没有被捕获，且未定义未捕获异常处理器，它就会变成一个 `E_ERROR`
  级别的错误，从而终止脚本。


  ### 未捕获异常处理器


  `set_exception_handler` 函数允许捕获任何未被捕获的异常。它接受一个参数，即针对此类事件触发的回调函数。


  ```php

  set_exception_handler(''myException'');

  ```


  该回调函数只需要一个参数，即被抛出的异常对象。


  ```php

  function myException($e)

  {

  $file = ''exceptionlog.txt'';

  file_put_contents($file,$e->getMessage(),FILE_APPEND);

  require_once(''my_error_page.php'');

  exit;

  }

  ```



  由于此异常处理程序是在异常发生的上下文之外调用的，因此从异常中恢复会很困难。相反，此示例处理程序将异常写入日志文件并显示一个错误页面。为了停止脚本的进一步执行，使用了内置的
  `exit` 结构。它与 `die` 结构同义，并且可以附带一个字符串参数，该字符串会在脚本终止前被打印出来。


  ### 错误与异常


  异常是被有意抛出以供脚本处理的，而错误则是为了通知开发者代码中存在错误。对于运行时发生的问题，异常机制通常被认为更优越。然而，由于它直到 PHP 5 才被引入，所有内部函数仍然使用错误机制。对于用户定义的函数，开发者可以自由选择任意一种机制。请记住，错误不能被
  `try-catch` 语句捕获。同样，异常也不会触发错误处理程序。


