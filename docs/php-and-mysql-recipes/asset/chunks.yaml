    \ PHP 5.1.0 开始，可以将长度参数设置为 `0`。但这会导致读取速度变慢，因为函数将逐个字节读取，直到遇到换行符或文件末尾。\n\n## 第 7\
    \ 章 ■ 文件与目录\n\n从示例 `7_21` 创建的 `fruits.csv` 文件中读取数据的代码如下所示：\n\n```php\n// 7_22.php\n\
