  在本章结束时，您将拥有一个功能完整的购物车，但访客还无法对其中的商品下订单。您将在下一章中添加此功能，届时将实现一个自定义结账流程——“继续结账”按钮。当访客点击此按钮时，购物车中的产品将作为单独的订单保存到数据库中，访客将被重定向到一个付款页面。如果您在开发的第一阶段集成了
  PayPal 购物车，从下一章开始，PayPal 将仅用于处理付款，您将不再依赖其购物车。


  具体来说，在本章中，您将学习如何：


  - 设计购物车

  - 添加新的数据库表以存储购物车记录

  - 创建与新表一起使用的数据层函数

  - 实现业务层方法

  - 实现“添加到购物车”和“查看购物车”按钮（如果您在 PayPal 章节中已经实现了它们，则使其与新购物车协同工作）

  - 实现自定义购物车的表示层部分


