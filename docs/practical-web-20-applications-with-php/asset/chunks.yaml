    **3**


    We will be using the Zend Framework’s Zend_DB class to handle the database abstraction.


    This is essentially an interface to the PDO extension for PHP 5\. We will cover
    the installation of all required software in Chapter 2.


    ■**Note** In this book, all “database code” (i.e., PHP code that interacts with
    the database) will be self-contained within its relevant class or function. This
    means that if you want to use a different database abstraction layer (such as
    PEAR DB, ADOdb, or your own custom layer), it will be fairly straightforward to
    implement in place of Zend_Db.


    **Web Site Templates**


    One of the reasons PHP has become so popular is that you can easily include PHP
    code directly within the HTML code you want to output. This makes developing simple
    and small web applications very easy; however, this typically doesn’t scale well.
    When an application grows large, it becomes difficult either to add new functionality
    within a bunch of HTML


    markup or to change the site design by sifting through the PHP code.


    To deal with this, we aim to separate our *application logic* from our *display
    logic*. Essentially, this means the code that does the hard work (such as processing
    forms, reading data from the database, or checking user permissions) is performed
    in one place, while the HTML


    that will be output to the end user is stored in its own template file.


    In Chapter 2 we will look at Model-View-Controller (MVC), which is a design pattern
    specifically describing this separation of application and display logic. We will
    be using the Smarty Template Engine to manage the display of templates, as this
    is a very popular and powerful template engine (Smarty will essentially make up
    the “view” portion of MVC, as we will see in Chapter 2).


