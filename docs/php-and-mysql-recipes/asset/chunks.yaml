- fmt: "This function will work on regular files and symbolic links to other files.\
    \ If the file is a symlink only the link will be removed and the original file\
    \ will still exist. See section 7-7 for more information on symbolic links.\n\n\
    ## Recipe 7-5. File Properties\n\n### Problem\nBesides the name and content of\
    \ a file there are other properties that could be useful to the developer and\
    \ possibly the end user. Knowing the size of a file, when it was created or last\
    \ changed could help determine if the file contains new information.\n\n### Solution\n\
    The functions `filesize()`, `filectime()`, `filemtime()`, and `fileatime()` provide\
    \ information about size, create time, modify time, and access time. The `stat()`\
    \ function can provide more detailed information about the file as it returns\
    \ an array of values that includes device number, inode, file size, ctime, mtime,\
    \ atime, and block size and number of blocks. In addition to these it’s also possible\
    \ to use `file_exists()`, `is_readable()`, `is_dir()`, `is_file()`, `is_link()`\
    \ to determine if the file is a directory, plain file, or a symbolic link.\n\n\
    All the functions mentioned above take a single argument, which is the name of\
    \ the file, including a relative or absolute path. These functions do not work\
    \ on a file handle returned by the `fopen()` function. The `fstat()` function\
    \ can be used to get the file information from a file handle. This function takes\
    \ a file handle and not a file name as the parameter.\n\nMany of the functions\
    \ that provide information about files in the file system is cached in order to\
    \ boost performance of these calls by not having to call the underlying system\
    \ calls each time the function is called on the same file. In order to clear the\
    \ cache you can call the `clearstatcache()` function. If the same file is checked\
    \ multiple times during a single execution it is necessary to call the `clearstatcache()`\
    \ function between each check.\n\n### How it Works\nThe functions `filesize()`,\
    \ `filectime()`, `filemtime()`, and `fileatime()` all return integer values. The\
    \ UNIX timestamps from the create, modify, and access times can be converted to\
    \ human readable values with the `date()` function as shown in the next example.\
    \ When using the `date()` function it's important to specify a time zone. This\
    \ can be done in `php.ini` or with the use of the `date_default_timezone_set()`\
    \ function. If no time zone is found the system will print a warning and use UTC.\n\
    \n```\n<?php\n// 7_11.php\ndate_default_timezone_set(\"America/Los_Angeles\");\n\
    clearstatcache();\n$file = \"7_11.php\";\necho \"File Size: \" . filesize($file)\
    \ . \"\\n\";\necho \"Created : \" . date(\"Y-m-d H:i:s\", filectime($file)) .\
    \ \"\\n\";\necho \"Modified : \" . date(\"Y-m-d H:i:s\", filemtime($file)) . \"\
    \\n\";\necho \"Accessed : \" . date(\"Y-m-d H:i:s\", fileatime($file)) . \"\\\
    n\";\n?>\n```\n\nThe output will look like this:\n```\nFile Size: 354\nCreated\
    \ : 2016-04-10 11:30:46\nModified : 2016-04-10 11:30:46\nAccessed : 2016-04-10\
    \ 11:31:19\n```\n\nOn some UNIX/Linux platforms it's possible to configure the\
    \ system to ignore the updates of access time. This is usually done to increase\
    \ performance. In this case the function `fileatime()` is of little use.\n\nYou\
    \ can also use the `stat()` function to get similar data with a single function\
    \ call.\n\n```\n<?php\n// 7_12.php\ndate_default_timezone_set(\"America/Los_Angeles\"\
    );\nclearstatcache();\n$file = \"7_11.php\";\n$stat = stat($file);\nprint_r($stat);\n\
    ?>\n```\n\nThe output from this script will look like this:\n```\nArray\n(\n \
    \   [0] => 16777220\n    [1] => 145615535\n    [2] => 33188\n    [3] => 1\n  \
    \  [4] => 502\n    [5] => 20\n    [6] => 0\n    [7] => 356\n    [8] => 1454365742\n\
    \    [9] => 1454361413\n    [10] => 1454361413\n    [11] => 4096\n    [12] =>\
    \ 8\n    [dev] => 16777220\n    [ino] => 145615535\n    [mode] => 33188\n    [nlink]\
    \ => 1\n    [uid] => 502\n    [gid] => 20\n    [rdev] => 0\n    [size] => 356\n\
    \    [atime] => 1454365742\n    [mtime] => 1454361413\n    [ctime] => 1454361413\n\
    \    [blksize] => 4096\n    [blocks] => 8\n)\n```\n\nNote how the data is duplicated.\
    \ The `stat()` function returns the values as a combined index with numerical\
    \ and name values for the same data.\n\n## Recipe 7-6. Permissions\n\n### Problem"
