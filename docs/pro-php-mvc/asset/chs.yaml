  \    {\n        $html = $get(\"login.html\");\n        $status = $has($html, array(\n\
  \            \"email\",\n            \"password\",\n            \"login\"\n    \
  \    ));\n        return $status;\n    },\n    \"登录表单包含所需字段\",\n    \"表单/用户\"\n\
  );\n\nFramework\\Test::add(\n    function() use ($get, $has)\n    {\n        $html\
  \ = $get(\"search.html\");\n        $status = $has($html, array(\n            \"\
  query\",\n            \"order\",\n            \"direction\",\n            \"page\"\
  ,\n            \"limit\",\n            \"search\"\n        ));\n        return $status;\n\
  \    },\n    \"搜索表单包含所需字段\",\n    \"表单/用户\"\n);\n```\n\n第一个测试获取 `register.html`\
  \ 表单的 HTML，并对照字段列表进行检查，以确保它们存在。第二个和第三个测试分别对 `login.html` 和 `search.html` 表单执行类似的检查。\n\
  \n我们需要测试的第二件事是示例应用中各种用户交互的结果。为此，我们需要再添加一个函数，如代码清单 21-3 所示。\n\n**代码清单 21-3.** 测试\
  \ POST 请求\n\n```php\n$post = function($url, $data)\n{\n    $reques = new Framework\\\
  Request();\n    return $request->post(\"http://\".$_SERVER[\"HTTP_HOST\"].\"/{$url}\"\
  , $data);\n};\n```\n\n这个函数与 `$get` 函数非常相似，但执行的是带有提供数据的 `POST` 请求。\n\n我们在代码清单 21-4\
  \ 所示的测试中使用此函数。\n\n**代码清单 21-4.** 测试表单提交\n\n```php\nFramework\\Test::add(\n    function()\
  \ use ($post)\n    {\n        $html = $post(\n            \"register.html\",\n \
  \           array(\n                \"first\" => \"Hello\",\n                \"\
