  \n#### Get 方法\n\n在之前的示例中，我们创建了一个 `get_properties` 方法来同时返回多个属性。这是一个有效且实用的方法。不过，更常见的做法是为每个\
  \ `set` 方法都配上一个 `get` 方法。这样一来，类的属性就同时具备了**写入**（`set` 方法）和**读取**（`get` 方法）能力。在某些情况下，你可能只想提供\
  \ `get` 方法而不提供 `set` 方法（使属性成为只读）。反之，我们也可以（尽管很少这样做）只提供 `set` 方法而不提供 `get` 方法（使属性成为只写）。\n\
  \n实际上，`get` 方法比 `set` 方法要容易编写得多。因为你在读取数据而非更新数据，所以无需对数据进行验证。\n\n```php\nfunction\
