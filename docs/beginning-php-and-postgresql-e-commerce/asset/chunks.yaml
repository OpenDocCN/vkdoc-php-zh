- fmt: '# CHAPTER 12 ■ STORING CUSTOMER ORDERS


    ## Implementing Tax and Shipping Charges


    As expected, you need to make several modifications to `HatShop` to enable the
    tax and shipping schemes outlined previously. You have two more database tables
    to add, `tax` and `shipping`, as well as modifications to make to the `orders`
    table. You’ll need to add new database functions and make some modifications to
    existing ones. Some of the business tier classes need modifications to account
    for these changes, and the presentation tier must include a method for users to
    select a shipping method (the taxing scheme is selected automatically).


    So, let’s get started.


    ## Database Modifications


    In this section, you’ll add the new tables and modify the `orders` table and database
    functions.


    ### Exercise: Adding the Database Structures


    1. Load `pgAdmin III`, and connect to the `hatshop` database.


    2. Click Tools ➤ Query tool (or click the SQL button on the toolbar). A new query
    window should appear.


    3. Use the query tool to execute this code, which adds the `shipping` table to
    your `hatshop` database:


    ```sql

    -- Create shipping table

    CREATE TABLE shipping

    (

    shipping_id SERIAL NOT NULL,

    shipping_type VARCHAR(100) NOT NULL,

    shipping_cost NUMERIC(10, 2) NOT NULL,

    shipping_region_id INTEGER NOT NULL,

    CONSTRAINT pk_shipping_id PRIMARY KEY (shipping_id), CONSTRAINT fk_shipping_region_id
    FOREIGN KEY (shipping_region_id) REFERENCES shipping_region (shipping_region_id)

    ON UPDATE RESTRICT ON DELETE RESTRICT

    );

    ```


    4. Use the query tool to execute this code, which populates the `shipping` table
    from your `hatshop` database:


    ```sql

    -- Populate shipping table

    INSERT INTO shipping (shipping_id, shipping_type,

    shipping_cost, shipping_region_id)

    VALUES(1, ''Next Day Delivery ($20)'', 20.00, 2);

    INSERT INTO shipping (shipping_id, shipping_type,

    shipping_cost, shipping_region_id)

    VALUES(2, ''3-4 Days ($10)'', 10.00, 2);

    INSERT INTO shipping (shipping_id, shipping_type,

    shipping_cost, shipping_region_id)

    VALUES(3, ''7 Days ($5)'', 5.00, 2);

    INSERT INTO shipping (shipping_id, shipping_type,

    shipping_cost, shipping_region_id)

    VALUES(4, ''By air (7 days, $25)'', 25.00, 3);

    INSERT INTO shipping (shipping_id, shipping_type,

    shipping_cost, shipping_region_id)

    VALUES(5, ''By sea (28 days, $10)'', 10.00, 3);

    INSERT INTO shipping (shipping_id, shipping_type,

    shipping_cost, shipping_region_id)

    VALUES(6, ''By air (10 days, $35)'', 35.00, 4);

    INSERT INTO shipping (shipping_id, shipping_type,

    shipping_cost, shipping_region_id)

    VALUES(7, ''By sea (28 days, $30)'', 30.00, 4);

    ```


    5. Use the query tool to execute this code, which adds the `tax` table to your
    `hatshop` database:


    ```sql

    -- Create tax table

    CREATE TABLE tax

    (

    tax_id SERIAL NOT NULL,

    tax_type VARCHAR(100) NOT NULL,

    tax_percentage NUMERIC(10, 2) NOT NULL,

    CONSTRAINT pk_tax_id PRIMARY KEY (tax_id)

    );

    ```


    6. Use the query tool to execute this code, which populates the `tax` table from
    your `hatshop` database:


    ```sql

    -- Populate tax table

    INSERT INTO tax (tax_id, tax_type, tax_percentage)

    VALUES(1, ''Sales Tax at 8.5%'', 8.50);

    INSERT INTO tax (tax_id, tax_type, tax_percentage)

    VALUES(2, ''No Tax'', 0.00);

    ```


    7. Execute this code, which adds the `shipping_id` column and a new constraint
    to the `orders` table from your `hatshop` database:


    ```sql

    -- Adding a new field named shipping_id to orders table

    ALTER TABLE orders ADD COLUMN shipping_id INTEGER;

    -- Adding a new foreign key constraint to orders table

    ALTER TABLE orders

    ADD CONSTRAINT fk_shipping_id FOREIGN KEY (shipping_id) REFERENCES shipping (shipping_id)

    ON UPDATE RESTRICT ON DELETE RESTRICT;

    ```


    8. Use the query tool to execute this code, which adds the `tax_id` column and
    a new constraint to the `orders` table from your `hatshop` database:


    ```sql

    -- Adding a new field named tax_id to orders table

    ```'
