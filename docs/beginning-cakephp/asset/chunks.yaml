    ## The RSS Helper


    The RSS helper creates standards-compliant RSS feeds. See Table 9-9 for a list
    of RSS helper functions. To include this helper in the application, use the following:
    `var $helpers = array(''Rss'');`


    **Table 9-9.** *RSS Helper Functions*


    | Function | Description |

    | --- | --- |

    | `$rss->channel()` | Returns the `<channel>` element |

    | `$rss->document()` | Returns an RSS document contained in `<rss>` tags |

    | `$rss->item()` | Converts an array to an RSS element |

    | `$rss->items()` | Converts an array of data using an optional callback; maps
    the array to a set of RSS tags |

    | `$rss->time()` | Converts a specified time stamp in any format to an RSS time
    specification |


    ## The Session Helper


    The Session helper displays session information as provided by its component and
    controller. It displays flash messages, errors, and reading session data with
    convenience functions listed in Table 9-10. To include this helper in the application,
    use this: `var $helpers = array(''Session'');`


    **Table 9-10.** *Session Helper Functions*


    | Function | Description |

    | --- | --- |

    | `$session->activate()` | Turns on session handling if the `app/config/core.php`
    file’s `Session.start` attribute is set to `false` |

    | `$session->check()` | Returns `true` if a session key is set |

    | `$session->error()` | Returns the last error encountered in the session |

    | `$session->flash()` | Renders messages set with the Session component `setFlash()`
    function |

    | `$session->id()` | Returns the session ID |

    | `$session->read()` | Returns all values stored in a given session key |

    | `$session->valid()` | Returns whether a session key is available in the view
    |

    | `$session->write()` | Overrides the Session component `write()` function; should
    not be used in a view but may be called in other helper functions |


    ## The Text Helper


    When dealing with text, tasks such as truncating and highlighting can require
    complicated regular expressions or tedious PHP operations. The Text helper condenses
    some of these common web text methods into helper functions. See Table 9-11 for
    a list of Text helper functions.


    To include this helper in the application, use this: `var $helpers = array(''Text'');`


    **Table 9-11.** *Text Helper Functions*


    | Function | Description |

    | --- | --- |

    | `$text->autoLink()` | Converts all links and e-mail addresses into HTML links
    |

    | `$text->autoLinkEmails()` | Provides an e-mail link for given text |

    | `$text->autoLinkUrls()` | Finds text beginning with `http://` or `ftp://` and
    wraps a link tag around it |

    | `$text->excerpt()` | |'
