- fmt: '程序执行的结果与之前的情况相同。然而，执行算法略有变化。主要有两个变化。首先，生成异常时显示的消息与异常对象相关联。此消息可以通过`getMessage()`方法检索。其次，你将两个`catch`块合并为一个，通过将`AnyNumberException|NoRootsException`表达式指定为要处理的异常类（异常类名称由`|`运算符分隔）。这样一个块处理`AnyNumberException`和`NoRootsException`异常。另外，使用两个连续放置的条件语句（以简化形式，带有组合条件）代替了嵌套的条件语句。


    详情 |


    | --- | --- | --- |


    条件`$A==0&$B==0`为真，当`$A==0`和`$B==0`两个条件都为真时。条件`$A==0&$B!=0`为真，当`$A==0`和`$B!=0`两个条件都为真时。|


    ## Nested try-catch Constructions and the finally Block


    `try-catch`构造可以嵌套。如果在内部`try-catch`构造中抛出的异常未被其处理，则该异常会被传递给外部`try-catch`构造进行处理。此外，`try-catch`构造可以包含`finally`块，无论是否抛出异常，该块中的命令都会执行。这种情况在代码清单[10-6](#613529_1_En_10_Chapter.xhtml#PC17)中有示例。


    ```

    Listing 10-6

    Nested try-catch Constructions

    ```


    在此程序中，提示用户输入颜色名称，根据输入的值，程序显示特定消息。

    为了响应不同的情况，使用抛出和处理异常。程序创建了四个自定义异常类：`RedException`、`GreenException`、`BlueException`和`OtherException`。每个类都继承`Exception`类，并定义为空体。

    用户输入的颜色名称被写入`$color`变量。

    首先，字符串中的字符被转换为小写，这通过`strtolower()`函数实现。接下来是包含内部`try-catch-finally`构造的外部`try`块。在内部`try`块中，执行`switch`语句，检查`$color`变量的值。如果变量值为`"red"`，则抛出`RedException`类的异常。`"green"`值抛出`GreenException`类的异常。如果变量值为`"blue"`，则抛出`BlueException`异常。在所有其他情况下，抛出`OtherException`类的异常。

    在内部`try-catch-finally`构造中，处理`RedException`、`GreenException`和`BlueException`类的异常。`OtherException`类的异常在外部`try-catch`构造中处理。

    让我们讨论代码是如何执行的。首先，读取用户输入的字符串并写入`$color`变量，然后在`switch`语句中检查变量的值。结果，抛出了四个异常类中的一个。如果是`RedException`、`GreenException`或`BlueException`类的异常，则在内部`try-catch-finally`构造的某个`catch`块中处理。然后，执行`finally`块，以及`finally`块之后的`echo
    "You have a good taste\n"`指令。外部`catch`块被忽略，并执行最后一条指令`echo "The program is over\n"`。

    如果抛出了`OtherException`类的异常，它不会被内部`catch`块捕获，而是传递给外部`catch`块进行处理。但在那之前，`finally`块会被执行。


    程序执行的结果取决于用户输入的值（用户输入的值以粗体标记）。颜色名称中的字符大小写无关紧要。具体来说，结果可能如下所示。


    ```

    The output of the program (from Listing 10-6)

    Your favorite color: Red

    Red is beautiful

    Thank you for the answer

    You have a good taste

    The program is over

    ```


    结果也可能是这样。


    ```

    The output of the program (from Listing 10-6)

    Your favorite color: green

    Green is wonderful

    Thank you for the answer

    You have a good taste

    The program is over

    ```


    也可能如下所示。


    ```

    The output of the program (from Listing 10-6)

    Your favorite color: BLUE

    Blue is stylish

    Thank you for the answer

    You have a good taste

    The program is over

    ```


    或者可能如下所示。


    ```

    The output of the program (from Listing 10-6)

    Your favorite color: yellow

    Thank you for the answer

    I don''t know this color

    The program is over

    ```


    再次强调，有两件事值得一提。第一，如果内部`try-catch`构造没有处理异常，该异常会被传递给外部`try-catch`构造进行处理。第二，`finally`块中的代码总是会执行，无论是抛出异常还是没有抛出异常的情况下。


    ## Rethrowing an Exception


    异常可以在被抛出后再次抛出。在这种情况下，同一个异常对象会被多次使用。让我们再次考虑一个求解线性方程的问题，作为使用这种方法的示例。程序如代码清单[10-7](#613529_1_En_10_Chapter.xhtml#PC22)所示。


    ```

    Listing 10-7

    Rethrowing Exceptions

    ```


    程序执行的结果与代码清单[10-4](#613529_1_En_10_Chapter.xhtml#PC11)相同。但代码值得分析。


    你使用了异常类`MyException`。读取`$A`和`$B`变量的值后，执行受控代码块。它包含内部`try`块，如果条件`$A==0`为真，则抛出`MyException`类的异常。如果条件为假，则执行`$x=$B/$A`和`echo
    "The root is \$x = $x\n"`语句。第一条语句计算方程的根。第二条语句显示计算结果。如果抛出异常，这些语句不会执行。如果抛出异常，则在内部`catch`块中处理。处理基于检查条件`$B==0`。如果条件为假，则执行`echo
    "There are no roots\n"`指令。如果条件为真，则`throw $e`命令重新抛出之前抛出的异常。这里，`$e`表示传递给内部`catch`块进行处理的异常对象。这次异常被外部catch块捕获并处理。特别地，外部catch块中执行`echo
    "Any number is a root\n"`命令。最后执行的命令是`echo "The problem is solved\n"`。


    详情 |


    | --- | --- | --- |


    事实证明，如果方程的一个参数为零，则会抛出自定义类异常。如果在处理此异常时，发现第二个参数也为零，则会重新抛出异常。重新抛出异常意味着你正在使用之前抛出的异常对象。|


    ## The Functions for Handling Errors


    在程序执行过程中发生的错误通常不是致命的，不会导致程序终止。这种情况下的典型外部效果是错误或警告消息。不同的技术和方案允许你适当地响应此类情况。但即使错误是致命的，并且未在程序中被捕获（使用`try-catch`构造），你仍然可以“对抗”它。


    详情 |


