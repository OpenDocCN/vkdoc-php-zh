    Controller


    The final piece of the bootstrapping puzzle is not strictly about bootstrapping
    or our framework. It is actually about how each controller will render views.
    Let me demystify this topic by saying that this code belongs equally within the
    realms of application and framework code.


    If we refer back to the three goals of our framework, we will remember that the
    second is to create a framework that is easy to use, and makes few assumptions
    about the applications we will use it to create. There are, however, times when
    these two statements counter each other. A very practical example is that of view
    rendering.


    We can assume that all of our application’s actions will elicit a response. Moreover,
    this response should be in a form that conveys itself to the application’s users.
    This can take the form of HTML, or JavaScript (JSON), or XML, and so on. The point
    is that all (or near as makes no difference) of our actions will require output,
    which is likely to occur in the form of views.


    For this reason, the MVC paradigm is an excellent choice for a framework. We are
    expecting many controllers/actions and each will require a significant level of
    view rendering. We have good separation here, but we also have a lot of repeated
    behavior. If each action should output to a view, we either need to render a view
    within the body of each action (method), or we need to hook it into a common point
    in the framework’s execution so that it becomes standard behavior.


    At this point, we could choose to create an application-specific Controller subclass,
    from which all of our application’s controllers will inherit the view-rendering
    behavior, or we can make the decision to incorporate this commonplace behavior
    in the default Controller class. I think, at this stage, it would be best simply
    to modify the Controller class.


