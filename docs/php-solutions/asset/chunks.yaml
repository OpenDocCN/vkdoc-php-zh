- fmt: '保存页面并在浏览器中加载。页面首次加载时，只显示下拉菜单。从下拉菜单中选择一个文件名，然后点击“Display”。您选择的图像应显示出来，如下面的截图所示：


    ![A978-1-4842-0635-5_11_Figm_HTML.jpg](A978-1-4842-0635-5_11_Figm_HTML.jpg)


    - 像这样修改 MySQLi 的代码：


    在浏览器中编辑查询字符串，将 `image_id` 的值改为一个字符串，或以数字开头的字符串。您应该会看到 `basin.jpg`，其 `image_id`
    为 1。尝试一个介于 1.0 和 8.9 之间的浮点数。相关图像会正常显示。尝试一个超出 1 到 8 范围的数字。由于查询本身没有问题，因此不会显示错误消息。它只是在寻找一个不存在的值。在这个示例中，这无关紧要，但通常情况下，您应该使用
    MySQLi 的 `num_rows` 属性或 PDO 的 `rowCount()` 方法来检查查询返回的行数。


