    ### 递归


    有一种定义函数的方法值得特别关注，那就是递归。在这种情况下，函数被声明为调用自身。这可以通过在函数体中放置一条调用同一函数（通常使用不同的参数）的命令来实现。代码清单
    5-9 是一个使用递归定义多个函数的程序。


    ```

    代码清单 5-9

    递归

    ```


    以下是程序输出。


    ```

    程序的输出（来自代码清单 5-9）

    5! = 120

    1+2+...+5 = 15

    2 的 5 次方：32

    ```


    该程序使用递归来定义计算数字阶乘、自然数求和以及计算数字幂的函数。


    阶乘由 `factorial()` 函数计算，该函数接受一个参数（记为 `$n`）。函数体仅包含一个条件语句，其中检查了 `$n==0` 条件。如果条件为真，则函数返回
    `1` 作为结果（根据定义，`0` 的阶乘等于 `1`）。否则，函数的值通过 `$n*factorial($n-1)` 表达式计算，在该表达式中，函数调用自身，但参数比原始参数的值少一。


    | 详情 |

    | --- |

    | 在这种情况下，考虑某个数字 *n* 的阶乘是数字 *n* 与数字 (*n* − 1) 的阶乘的乘积，即 *n*! = *n* · (*n* − 1)!。
    |


    调用函数时会发生什么？如果使用零参数调用函数，结果为 `1`。假设参数为非零值，例如 `5`。那么结果计算为数字 `5` 与使用参数 `4` 调用函数的结果的乘积。当使用参数
    `4` 调用函数时，计算数字 `4` 与使用参数 `3` 调用函数的结果的乘积。当使用参数 `3` 调用函数时，计算数字 `3` 与使用参数 `2` 调用函数的结果的乘积，以此类推。当使用参数
    `0` 调用函数时，调用链结束。之后，一切“收束”：顺序计算各个表达式的值，直到获得使用参数 `5` 调用函数的结果。


    ![](img/613529_1_En_5_Figo_HTML.jpg)一个带有字母 ''i'' 的信息图标。注意


    为了代码的清晰和简洁，条件语句中没有使用花括号，虽然这不是很好的实践。


    用于计算数字总和的 `sum()` 函数也接受一个参数 `$n`，在计算结果时，会检查条件语句中的 `$n==0` 条件。如果条件为真，结果为零（零项之和视为零）。如果条件为假，结果通过
    `$n+sum($n-1)` 表达式计算。


    | 详情 |

    | --- |

    | 从 1 到 *n* 的数字之和可以看作是数字 *n* 与从 1 到 (*n* − 1) 的数字之和的总和。 |


    用于计算数字幂的 `power()` 函数有两个参数：`$x`（要计算幂的数字）和 `$n`（幂指数）。如果幂指数为零（`$n==0` 条件为真），则结果为
    `1`（数字的 `0` 次幂为 `1`）。否则，结果通过将 `$x` 参数的值与使用参数 `$x` 和 `$n-1` 调用 `power()` 函数的结果相乘来计算（`$x*power($x,$n-1)`
    表达式）。


    | 详情 |

    | --- |

    | 在定义函数时，考虑到了明显的递推关系 *x*^( *n*) = *x* · *x*^( *n* − 1)。 |


    除了描述函数，该程序还包含一些命令，用于检查使用递归调用函数的正确性。希望它们不需要注释。


    ### `eval()` 函数


    PHP 中有许多值得注意的特性。不过，让我们重点介绍 `eval()` 函数（更准确地说，是一个语法结构）。它允许你计算作为字符串参数传递的表达式。例如，如果你将字符串
    `''$number=2*3+4;''` 作为参数传递给 `eval()` 函数，则 `10` 会被写入变量 `$number`。该结果是通过计算 `2*3+4`
    表达式获得的。


    | 详情 |

    | --- |

    | 首先，使用 `eval()` 语法结构的命令非常危险——以至于相应的代码可能会被防病毒软件拦截（在这种情况下，你需要“请求”防病毒软件将其设为例外）。潜在危险的原因是
    `eval()` 允许你执行之前未知的代码，这可能影响整个系统的安全性。因此，不应过度使用 `eval()` 结构。其次，将字符串传递给 `eval()`
    时使用的是单引号还是双引号很重要。该字符串必须包含有效的 PHP 指令（包括命令末尾的分号）。你还应记住，在双引号中，它们的值会替换变量名。因此，例如，命令
    `eval(''$number=2*3+4;'')` 的一个替代方案是命令 `eval("\$number=2*3+4;")`。在后者中，使用 `\$` 指令将
    `$` 字符包含在字符串中。两种情况下结果相同。 |


    代码清单 5-10 是使用 `eval()` 函数的示例。


    ```

    代码清单 5-10

    使用 eval()

    ```


    程序执行的结果可能如下所示（用户输入以粗体标记）。


    ```

    程序的输出（来自代码清单 5-10）

    $ 的语句：$x=$A+$B;

    $x = 25

    ```


    程序很小。它使用了两个字符串变量 `$first=''$A=2*3+4;''` 和 `$second="\$B=2*\$A-5;"`。这些变量包含文本，当执行
    `eval($first)` 和 `eval($second)` 指令时，这些文本对应的命令会被执行。


    | 详情 |

    | --- |

    | 也就是说，`$A=2*3+4` 和 `$B=2*$A-5` 这些命令确实被执行了，结果 `$A` 被设置为 `10`，`$B` 被设置为 `15`。 |


    然后，读取用户输入的表达式，并将其作为参数传递给 `eval()`（`eval(trim(fgets(STDIN)))` 命令）。用户必须输入一条为变量 `$x`
    赋值的命令。该命令会被执行，因为相应的文本作为参数传递给了 `eval()`。之后，使用命令 `echo "\$x = $x\n"` 检查变量 `$x` 的值。


    | 详情 |

    | --- |

    | 上述是当用户输入表达式 `$x=$A+$B;` 时程序的输出。该表达式被读取（经过 `trim()` 函数转换后）为文本 `''$x=$A+$B;''`，并作为参数传递给
    `eval()`。结果，命令 `$x=$A+$B` 被执行，变量 `$x` 被设置为 `25`。 |

