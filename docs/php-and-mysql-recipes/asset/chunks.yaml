- fmt: "If the file system where PHP is used is shared with multiple users or files\
    \ are shared among different processes for file exchange, it can be necessary\
    \ to use file permissions to control what actions can be taken on a file.\n\n\
    ## Solution\n\nPHP was born on a Linux platform and uses the POSIX system for\
    \ file permissions. The POSIX system uses three bits to indicate execute (1),\
    \ read (2), and write (4) access, and access can be defined for the owner, the\
    \ group, and everyone else. It is customary to represent the access as an octal\
    \ number with three digits. In PHP, we add a `0` in front of the three digits\
    \ to indicate that the number is octal and not decimal. The permission `0755`\
    \ means execute, read, and write access for the owner, and execute and read permission\
    \ for the group as well as everyone else.\n\nThe functions that are used to set\
    \ access are `chown()` for setting the owner, `chgrp()` for setting the group,\
    \ and `chmod()` for setting the permissions. These functions are similar to the\
    \ command-line functions with the same names, although the PHP functions do not\
    \ have an option to set the permission recursively.\n\n## How it Works\n\nWhen\
    \ creating files with `file_put_contents()` or `fopen()`/`fwrite()` functions,\
    \ the default behavior is to set the owner and group to the same as the user who\
    \ ran the script, and the default access mode is set to read/write for the owner\
    \ and to read for the group and others. In order to change the mode so only the\
    \ user can read and write, you can do something like this:\n\n```php\n<?php\n\
    // 7_13.php\nfile_put_contents('private.txt', 'The content of this file is private');\n\
    chmod('private.txt', 0600);\n```\n\nAnd the result would be a file with permission\
    \ like this:\n```\n-rw------- 1 kromannf staff 35 Feb 1 14:16 private.txt\n```\n\
    \nSimilarly, `chown()` and `chgrp()` can be used to change the owner and the group\
    \ for a file or directory.\n\nNote that only super users are allowed to change\
    \ owner and group on files. These functions are most commonly used by shell scripts\
    \ used by install processes or other long running processes.\n\nIn order to create\
    \ files and directories, the user running the PHP script must have write permissions\
    \ to the folder where the file is created. On web installations, the write access\
    \ is often removed on files and directories to prevent the web site from making\
    \ changes to its own code. If the web site contains a feature to upload images\
    \ and other files, the directory where these files are uploaded to must have the\
    \ write permission set.\n\n## Recipe 7-7\\. Symbolic Links\n\n### Problem\n\n\
    Symbolic links are often used on Linux and Unix file systems to have the same\
    \ file in multiple locations without using disk space for each file. If you open\
    \ and read from a symbolic link, you will actually open the file that is linked\
    \ to it in a different location. The same is the case for the write operation.\n\
    \n### Solution\n\nThe function `is_link()` will return `true` if the filename\
    \ passed as the parameter is in fact a link to a file or directory. You can use\
    \ `is_dir()` and `is_file()` to test if the link points to a directory or a file.\
    \ PHP can also create and remove symbolic links with the functions `link()` (hard\
    \ link) and `symlink()` (soft link).\n\nThe difference between hard and soft links\
    \ is in the way the links are created. For hard links, the link is directly to\
    \ the inode (the data portion of the file), and for soft links, the link is to\
    \ a different file name that internally links to an inode.\n\nSoft links are used\
    \ when the link is to a file on a different file system or when you want to link\
    \ a directory. Hard links are used for files on the same file system, and they\
    \ have the advantage of being able to move the original file to a different location\
    \ without breaking the links. Soft links can’t do that, as the link is to a file\
    \ that could be (re)moved.\n\nIf you use the `stat()` function on a symbolic link,\
    \ you will get the information about the original file. To get information about\
    \ the link, you will have to use the `lstat()` function.\n\nLinks are removed\
    \ with the `unlink()` function. If the path specified is a link or symbolic link,\
    \ only the link will be removed. If the path is the last hard link that points\
    \ to the data section or it’s a real file, the file will be removed.\n\n### How\
    \ it Works\n\nFiles that are stored outside the document root and its subdirectories\
    \ are not accessible to the user through the browser and web server. If for some\
    \ reason you want to make one of these files available for download, you can create\
    \ a symlink to the file and use that to generate a URL that can be downloaded.\
    \ This only works if the web server is configured to follow symlinks. For Apache,\
    \ that looks like this:\n\n```\n<Directory path/to/documentroot\">\n    Options\
    \ FollowSymLinks\n    AllowOverride None\n    Require all granted\n</Directory>\n\
    ```\n\nThe code to create a symlink and make it available for download would look\
    \ something like this:\n\n```php\n<?php\n// 7_14.php\n// Perform some access control\
    \ here\n$token = sha1(random_bytes(50));\nlink('../data/bigfile.tgz', $token);\n\
    header(\"Location: $token\");\n```\n\nThis code generates a random string of bytes\
    \ and then creates a `sha1` hash of that string. This is done to make it difficult\
    \ for other users to guess the actual string and still make it possible for the\
    \ user to download the file without reading it into memory in PHP. This method\
    \ has a couple of flaws and should not be used in real life. First of all, the\
    \ symbolic links are never removed by the script. A cleanup script that runs periodically\
    \ could solve this. But as long as the symbolic link exists, it is possible for\
    \ any user who knows the URL to download the file, as there is no longer any validation\
    \ or access control.\n\nA better solution to this problem is to use a PHP script\
    \ to read the file and send it directly to the client instead of redirecting to\
    \ a symbolic link. This option does also have problems, especially with large\
    \ files that exceed the memory limitation of the PHP configuration.\n\nUsing an\
    \ extension to the Apache web server called `mod_xsendfile` solves this problem\
    \ much better. The basic functionality allows Apache to download files in a predefined\
    \ location outside of the document root, but only if a specific header is set\
    \ before the download begins. Because the files are stored outside the web root,\
    \ they can't be accessed directly with a request from a browser or other client.\
    \ The files are accessed through a PHP script that can validate if the user is\
    \ allowed to download the file and, if so, tell Apache through the header that\
    \ it is OK to download the file. The `Xsendfile` extension must be configured\
    \ with the directories where these downloads can take place from. The advantage\
    \ of this extension is to allow the PHP script to terminate and release resources\
    \ while Apache reads the file from disk and sends the data to the client.\n\n\
    The `Xsendfile` extension can be downloaded from this website: [https://tn123.org/mod_xsendfile/](https://tn123.org/mod_xsendfile/)\n\
    \nWith this extension installed and configured in Apache, it's possible to download\
    \ large files without affecting security or exceeding the memory limits of PHP.\n\
    \n```php\n<?php\n// 7_15.php\n// Perform access control here\nheader(\"X-Sendfile:\
    \ ../data/some_file.tgz\");\n```\n\nIf you are using NginX, you can do the same\
    \ thing without any special extensions.\n\n```php\n<?php\n// 7_16.php\n// Perform\
    \ access control here\nheader(\"X-Accel-Redirect: ../data/some_file.tgz\");\n\
    ```\n\nIf you create an application that can be deployed on both Apache and NginX\
    \ platforms, you can create code that checks the type of server before selecting\
    \ the right header.\n\n```php\n<?php\n// 7_17.php\n// Perform access control here\n\
    if (stristr($_SERVER[\"SERVER_SOFTWARE\"], 'nginx')) {\n    header(\"X-Accel-Redirect:\
    \ ../data/some_file.tgz\");\n} else if (stristr($_SERVER[\"SERVER_SOFTWARE\"],\
    \ 'apache')) {\n    header(\"X-Sendfile: ../data/some_file.tgz\");\n}\n```"
  raw: 'If the file system where PHP is used is shared with multiple users or files
    are shared among different processes for file exchange, it can be necessary to
    use file permissions to control what actions can be taken on a file.


    Solution


    PHP was born on a Linux platform and uses the POSIX system for file permissions.
    The POSIX system uses three bits to indicate execute (1) read (2) and write (4)
    access and access can be defined for the owner, the group and everyone else. It
    is customary to represent the access as an octal number with three digits. In
    PHP


    we add a 0 in front of the three digits to indicate that the number is octal and
    not decimal. The permission 0755 means execute, read, and write access for the
    owner and to execute and read permission for the group as well as everyone else.


    The functions that are used to set access are chown() for setting the owner, chgrp()
    for setting the group, and chmod() for setting the permissions. These functions
    are similar to the command-line functions with the same names although the PHP
    functions do not have an option to set the permission recursively.


    How it Works


    When creating files with file_put_contents() or fopen()/fwrite() functions the
    default behavior is to set the owner and group to the same as the user who ran
    the script, and the default access mode is set to read/


    write for the owner and to read for the group and others. In order to change the
    mode so only the user can read and write you can do something like this:


    <?php


    // 7_13.php


    file_put_contents(''private.txt'', ''The content of this file is private''); chmod(''private.txt,
    0600);


    CHAPTER 7 ■ FILES AND DIRECTORIES


    And the result would be a file with permission like this:


    -rw------- 1 kromannf staff 35 Feb 1 14:16 private.txt


    Similarly the chown() and chgrp() can be used to change the owner and the group
    for a file or directory.


    Note that only super users are allowed to change owner and group on files. These
    functions are most commonly used by shell scripts used by install processes or
    other long running processes.


    In order to create files and directories the user running the PHP script must
    have write permissions to the folder where the file is created. On web installations
    the write access is often removed on files and directories to prevent the web
    site from making changes to its own code. If the web site contains a feature to
    upload images and other files the directory where these files are uploaded to
    must have the write permission set.


    Recipe 7-7\. Symbolic Links


    Problem


    Symbolic links are often used on Linux and Unix file systems to have the same
    file in multiple locations without using disk space for each file. If you open
    and read from a symbolic link, you will actually open the file that is linked
    to it in a different location. The same is the case for the write operation.


    Solution


    The function as_link() will return true if the filename passed as the parameter
    is in fact a link to a file or directory. You can use is_dir() and is_file() to
    test if the link points to a directory or a file. PHP can also create and remove
    symbolic links with the functions link() (hard link) and symlink() (soft link).


    The difference between hard and soft links is in the way the links are created.
    For hard links the links is directly to the inode (the data portion of the file)
    and for soft links the link is to a different file name that internally links
    to an inode.


    Soft links are used when the link is to a file on a different file system or when
    you want to link a directory. Hard links are used for files on the same file system
    and they have the advantage of being able to move the original file to a different
    location without breaking the links. Soft links can’t do that as the link is to
    a file that could be (re)moved.


    If you use the stat() function on a symbolic link you will get the information
    about the original file. To get information about the link you will have to use
    the lstat() function.


    Links are removed with the unlink() function. If the path specified is a link
    or symbolic link, only the link will be removed. If the path is the last hard
    link that points to the data section or it’s a real file, the file will be removed.


    How it Works


    Files that are stored outside the document root and its subdirectories are not
    accessible to the user through the browser and web server. If for some reason
    you want to make one of these files available for download you can create a symlink
    to the file and use that to generate a URL that can be downloaded. This only works
    only if the web server is configured to follow symlinks. For apache that looks
    like this:


    <Directory path/to/documentroot">


    Options FollowSymLinks


    AllowOverride None


    Require all granted


    </Directory>


    CHAPTER 7 ■ FILES AND DIRECTORIES


    The code to create a symlink and make it available for download would look something
    like this:


    <?php


    // 7_14.php


    // Perform some access control here


    $token = sha1(random_bytes(50));


    link(''../data/bigfile.tgz'', $token);


    header("Location: $token);


    This code generates a random string of bytes and then creates a sha1 hash of that
    string. This is done to make it difficult for other users to guess the actual
    string and still make it possible for the user to download file without reading
    it into memory in PHP. This method has a couple of flaws and should not be used
    in real life. First of all the symbolic links are never removed by the script.
    A cleanup script that runs periodically could solve this. But as long as the symbolic
    link exists it is possible for any user, who knows the URL, to download the file
    as there is no longer any validation or access control.


    A better solution to this problem is to use a PHP script to read the file and
    send it directly to the client instead of redirecting to a symbolic link. This
    option does also have problems, especially with large files that exceed the memory
    limitation of the PHP configuration.


    Using an extension to the Apache web server called mod_xsendfile solves this problem
    much better.


    The basic functionality allows Apache to download files in a predefined location
    outside of the document root, but only if a specific header is set before the
    download is set. Because the files are stored outside the web root they can''t
    be accessed directly with a request from a browser or other client. The files
    are accessed through a PHP script that can validate if the user is allowed to
    download the file and if so tell Apache, through the header, that it is Ok to
    download the file. The Xsendfile extension must be configured with the directories
    where these downloads can take place from. The advantage of this extension is
    to allow the PHP script to terminate and release resources while Apache reads
    the file from disk and send the data to the client.


    The Xsendfile extension can be downloaded fr[om this website: https://tn123.org/mod_xsendfile/](https://tn123.org/mod_xsendfile/)


    With this extension installed and configured in Apache it''s possible to download
    large files without affecting security or exceeding the memory limits of PHP.


    <?php


    // 7_15.php


    // Perform access control here


    header("X-Sendfile: ../data/some_file.tgz");


    If you are using NginX you can do the same thing without any special extensions.


    <?php


    // 7_16.php


    // Perform access control here


    header("X-Accel-Redirect: ../data/some_file.tgz");


    If you create an application that can be deployed on both Apache and NginX platforms
    you can create code that checks the type of server before selecting the right
    header.


    CHAPTER 7 ■ FILES AND DIRECTORIES


    <?php


    // 7_17.php


    // Perform access control here


    if (stristr($_SERVER["SERVER_SOFTWARE"], ''nginx'')) {


    header("X-Accel-Redirect: ../data/some_file.tgz");


    else if (stristr($_SERVER["SERVER_SOFTWARE"], ''apache'')) {


    header("X-Sendfile: ../data/some_file.tgz");


    }'
  trans: "\n如果 PHP 运行所在文件系统与多个用户共享，或者不同进程之间通过文件进行交换，则可能有必要使用文件权限来控制可以对文件执行的操作。\n\n\
    ## 解决方案\n\nPHP 诞生于 Linux 平台，并使用 POSIX 系统来管理文件权限。POSIX 系统使用三个位来表示执行（1）、读取（2）和写入（4）权限，并且可以为文件所有者、用户组和其他用户分别定义这些权限。通常用三位八进制数来表示这些权限。在\
    \ PHP 中，我们在三位数前面加上一个 `0`，以表明该数字是八进制而非十进制。权限 `0755` 表示文件所有者拥有执行、读取和写入权限，而用户组和其他用户拥有执行和读取权限。\n\
    \n用于设置访问权限的函数包括：设置所有者的 `chown()`、设置用户组的 `chgrp()` 以及设置权限的 `chmod()`。这些函数的用法与同名的命令行函数类似，不过\
    \ PHP 函数没有递归设置权限的选项。\n\n## 工作原理\n\n当使用 `file_put_contents()` 或 `fopen()`/`fwrite()`\
    \ 函数创建文件时，默认行为是将文件所有者和用户组设置为运行脚本的用户，默认的访问模式为所有者可读写，用户组和其他用户可读。为了更改模式，使得只有用户可以读写，可以这样做：\n\
    \n```php\n<?php\n// 7_13.php\nfile_put_contents('private.txt', 'The content of\
    \ this file is private');\nchmod('private.txt', 0600);\n```\n\n执行结果会得到一个权限如下的文件：\n\
    ```\n-rw------- 1 kromannf staff 35 Feb 1 14:16 private.txt\n```\n\n类似地，可以使用 `chown()`\
    \ 和 `chgrp()` 来更改文件或目录的所有者和用户组。\n\n请注意，只有超级用户才被允许更改文件的所有者和用户组。这些函数最常被安装进程或其他长时间运行进程所使用的\
    \ shell 脚本调用。\n\n为了创建文件和目录，运行 PHP 脚本的用户必须对创建文件的文件夹拥有写入权限。在 Web 安装中，通常会对文件和目录移除写入权限，以防止网站修改自身的代码。如果网站包含上传图片和其他文件的功能，那么这些文件上传到的目录必须具有写入权限。\n\
    \n## 方案 7-7\\. 符号链接\n\n### 问题\n\n符号链接在 Linux 和 Unix 文件系统中经常被使用，它允许同一个文件存在于多个位置，而无需为每个文件占用磁盘空间。如果你通过一个符号链接打开并读取文件，实际上你是在打开一个位于其他位置、被该链接指向的文件。写入操作也是如此。\n\
    \n### 解决方案\n\n如果传递给 `is_link()` 函数的文件名实际上是一个指向文件或目录的链接，则该函数返回 `true`。你可以使用 `is_dir()`\
    \ 和 `is_file()` 来检查链接指向的是目录还是文件。PHP 还可以通过 `link()`（硬链接）和 `symlink()`（软链接）函数来创建和删除符号链接。\n\
    \n硬链接和软链接的区别在于链接的创建方式。对于硬链接，链接直接指向 inode（文件的数据部分）；而对于软链接，链接指向的是另一个文件名，该文件名内部又指向一个\
    \ inode。\n\n当链接指向另一个文件系统上的文件，或者想要链接一个目录时，会使用软链接。硬链接用于同一文件系统上的文件，其优点是可以将原始文件移动到不同位置而不会破坏链接。软链接则无法做到这一点，因为它的链接目标可能被移动或删除。\n\
    \n如果在符号链接上使用 `stat()` 函数，你将获得关于原始文件的信息。要获取关于链接本身的信息，你必须使用 `lstat()` 函数。\n\n链接通过\
    \ `unlink()` 函数来删除。如果指定的路径是一个链接或符号链接，则只会删除该链接。如果该路径是最后一个指向数据区的硬链接，或者是一个真实文件，则该文件会被删除。\n\
    \n### 工作原理\n\n存储在文档根目录及其子目录之外的文件，用户无法通过浏览器和 Web 服务器直接访问。如果出于某种原因，你想让这些文件中的某个可供下载，你可以创建一个指向该文件的符号链接，并使用这个链接生成一个可下载的\
    \ URL。这仅在 Web 服务器配置为允许跟随符号链接时才有效。对于 Apache，配置如下所示：\n\n```\n<Directory path/to/documentroot\"\
    >\n    Options FollowSymLinks\n    AllowOverride None\n    Require all granted\n\
    </Directory>\n```\n\n创建符号链接并使其可供下载的代码如下所示：\n\n```php\n<?php\n// 7_14.php\n// 在此处执行一些访问控制\n\
    $token = sha1(random_bytes(50));\nlink('../data/bigfile.tgz', $token);\nheader(\"\
    Location: $token\");\n```\n\n这段代码生成一个随机的字节字符串，然后为该字符串创建 `sha1` 哈希值。这样做是为了让其他用户难以猜测实际的字符串，同时仍然允许用户下载文件，而无需在\
    \ PHP 中将文件读入内存。这个方法有几个缺陷，不应在实际环境中使用。首先，脚本从未删除这些符号链接。一个定期运行的清理脚本可以解决这个问题。但只要符号链接存在，任何知道该\
    \ URL 的用户都有可能下载该文件，因为这里不再有任何验证或访问控制。\n\n解决此问题的一个更好的方法是使用 PHP 脚本读取文件，并将其直接发送给客户端，而不是重定向到符号链接。这个选项也存在问题，特别是对于超过\
    \ PHP 配置内存限制的大型文件。\n\n使用 Apache Web 服务器的一个名为 `mod_xsendfile` 的扩展可以更好地解决这个问题。其基本功能是，允许\
    \ Apache 从一个预定义的、文档根目录之外的位置下载文件，但前提是在下载开始前设置了特定的头部。由于文件存储在 Web 根目录之外，因此无法通过浏览器或其他客户端的请求直接访问。这些文件通过一个\
    \ PHP 脚本进行访问，该脚本可以验证用户是否有权下载该文件，如果有权，则通过头部告诉 Apache 可以下载该文件。`Xsendfile` 扩展必须通过配置来指定允许进行这些下载的目录。此扩展的优点是，允许\
    \ PHP 脚本终止并释放资源，同时 Apache 从磁盘读取文件并将数据发送给客户端。\n\n`Xsendfile` 扩展可以从这个网站下载：[`tn123.org/mod_xsendfile/`](https://tn123.org/mod_xsendfile/)\n\
    \n在 Apache 中安装并配置此扩展后，就可以在不影响安全性或超出 PHP 内存限制的情况下下载大文件。\n\n```php\n<?php\n// 7_15.php\n\
    // 在此处执行访问控制\nheader(\"X-Sendfile: ../data/some_file.tgz\");\n```\n\n如果你使用的是 NginX，则无需任何特殊扩展即可实现相同的功能。\n\
    \n```php\n<?php\n// 7_16.php\n// 在此处执行访问控制\nheader(\"X-Accel-Redirect: ../data/some_file.tgz\"\
    );\n```\n\n如果你创建一个可以部署在 Apache 和 NginX 两种平台上的应用程序，可以编写代码来检查服务器类型，然后选择正确的头部。\n\n\
    ```php\n<?php\n// 7_17.php\n// 在此处执行访问控制\nif (stristr($_SERVER[\"SERVER_SOFTWARE\"\
    ], 'nginx')) {\n    header(\"X-Accel-Redirect: ../data/some_file.tgz\");\n} else\
    \ if (stristr($_SERVER[\"SERVER_SOFTWARE\"], 'apache')) {\n    header(\"X-Sendfile:\
    \ ../data/some_file.tgz\");\n}\n```\n"
- fmt: '# After setting the `X-` header the PHP code can end and the web server will
    take over and provide the selected file to the user. If the file is missing or
    the server is missing the configuration the web server will report a `404 – file
    not found` status code.


    ## Recipe 7-8. Directories


    ### Problem


    As we have seen already there is not much difference between a file and a directory
    on the file system. They are both identified with a relative or absolute path.
    Most of the functions used to get status or check for specific types all works
    on both files and directories but how can we create, move, and delete directories?


    ### Solution


    Creating a directory is done with `mkdir()` function. This function takes up to
    four parameters where the first is the relative or absolute path to the new directory
    and the second is the file permissions or mode in the same format as the `chmod()`
    function described earlier. The third parameter is a Boolean flag that indicates
    recursive functionality. This can be used to create nested directories. Instead
    of calling `mkdir()` multiple times you can supply a path and if the recursive
    flag is set the function will create all the directories not already exiting in
    the specified path. The forth parameter is the context and it’s only used when
    the function is used with streams.


    To remove a directory you will use the `rmdir()` function. Make sure the directory
    is empty before calling this function.


    ### How it Works


    In most cases web sites does not have a need to create new directories. It''s
    designed to serve content already located on the server. If you are building a
    system that can be used to exchange files between users or allow users to upload
    images you might want to create a directory for each user. That way it''s easy
    to keep track of where the files come from and you do not end up with one user
    overwriting other users’ files. Your application could even allow the user to
    create directories to group files.


    A simple script to create a directory could look like this:


    ```php

    <?php


    // 7_18.php


    // Perform access control here


    mkdir(''MyFiolder'', 0700);

    ```


    Creating all the directories needed to complete a full path would look like this:


    ```php

    <?php


    // 7_19.php


    // Perform access control here


    mkdir(''path/to/MyFiolder'', 0700, true);

    ```


    In this example the third parameter indicates that the system should create all
    the directories, if they are missing. This script will first create a directory
    called `path` next to the location of the script, after that a directory inside
    `path` called `to`, and finally the directory `MyFolder` inside the `to` directory.
    All three directories will have the permissions `rwx` for the owner and no permissions
    for group or other users.


    Running the script twice will generate a warning the second time. This is because
    the final directory called `''MyFolder''` already exists. Running the script when
    only the directories `''path''` and `''path/to''` exists will not generate any
    warnings.


    ## Recipe 7-9. CSV Files


    ### Problem


    If you are working with large datasets it might be useful to export the data to
    a format that can be read by programs like Microsoft Excel or you might receive
    data from other systems using the comma separated values (CSV) format. There is
    a need to be able to create or parse CSV files with PHP based on parameters provided
    by the user to filter data, etc.


    ### Solution


    The functions `fgetcsv()` and `fputcsv()` are used to read or write CSV files.
    These functions work on file handles created by the `fopen()` function and require
    the file to be opened in the correct read or write mode before reading or writing.


    ### How it Works


    Creating a `.csv` file from an array of data, like a result set from a database
    query where each row contains the same number of columns could look something
    like this:


    ```php

