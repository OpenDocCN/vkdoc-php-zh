    # 参数默认值


    你可以为函数的参数设置默认值。当调用函数时，如果你没有为某个参数指定值，就会使用该默认值。


    要为参数设置默认值，你需要在函数声明的参数名称后面加上赋值运算符和该默认值。带有默认值的参数必须放在函数声明中参数列表的末尾。


    > **注意：** 换句话说，先描述没有默认值的参数，再描述带有默认值的参数。


    清单 5-6 是一个程序，其中的函数（部分或全部）参数具有默认值。


    ```

    Listing 5-6

    参数默认值

    ```


    以下是程序的输出。


    ```

    程序的输出（来自清单 5-6）

    第一个参数：Alpha

    第二个参数：Bravo

    第一个参数：A

    第二个参数：Bravo

    第一个参数：A

    第二个参数：B

    第一个数字：100

    第二个数字：200

    第三个数字：300

    第一个数字：1

    第二个数字：2

    第三个数字：300

    第一个数字：1

    第二个数字：2

    第三个数字：3

    ```


    该程序使用了两个函数：带有两个参数的 `show()` 和带有三个参数的 `display()`。`show()` 函数的两个参数都有默认值。`display()`
    函数的最后两个参数有默认值。你每次调用这些函数时，会传入不同数量的参数。


    当执行 `show()` 命令时，`show()` 函数的两个参数都使用默认值。换句话说，该命令的执行效果就如同第一个参数是 `"Alpha"`，第二个参数是
    `"Bravo"`。


    `show("A")` 命令意味着第一个参数使用值 `"A"`，第二个参数使用默认值 `"Bravo"`。最后，`show("A","B")` 语句意味着值
    `"A"` 作为第一个参数传入，值 `"B"` 作为第二个参数传入函数。


    `display()` 函数也出现类似的情况。唯一的区别在于，由于第一个参数没有默认值，因此第一个参数必须始终指定。所以，当你运行 `display(100)`
    命令时，参数的值分别是 `100`、`200` 和 `300`。`display(1,2)` 命令意味着第一个参数的值为 `1`，第二个参数的值为 `2`，第三个参数为默认值
    `300`。当执行 `display(1,2,3)` 命令时，所有函数参数都显式指定，其值分别为 `1`、`2` 和 `3`。


    # 可变数量参数


    PHP 的一个特性是：在调用函数时，你可以传入比函数声明中指定数量更多的参数，而不会产生任何灾难性后果。例如，如果一个函数被描述为有两个参数，而你在调用该函数时传入了五个参数，那么最后三个参数将被忽略。


    函数的这个特性可以用来创建接受可变数量参数的函数。这意味着，一个函数可以用任意数量的参数调用，并且所有这些参数都会在函数内部被处理。


    > **注意：** 你正在处理函数参数的默认值。这使得在调用函数时可以指定不同数量的参数（少于函数描述中指示的数量）。但在这种情况下，被处理的参数数量仅限于函数描述中指定的那些。与此相反，你希望无论调用函数时传入多少参数，所有参数都能被处理。


    还值得一提的是，声明带有可变数量参数的函数有几种模式。你可以将其中一种称为“旧”模式，另一种称为“新”模式（自 PHP 5.6 起可用）。让我们来探讨一下这两种模式。


    为了处理传递给函数的参数，需要以某种方式访问它们。此外，你还希望处理那些未在函数声明参数列表中提及的参数。你可以使用 `func_get_args()` 函数获取传递给函数的参数列表。`func_get_args()`
    函数没有参数，它返回一个列表（数组），其中包含传递给调用 `func_get_args()` 函数的那个函数的所有参数。


    | 详细信息 |

    | --- |

    | 函数 `func_num_args()` 和 `func_get_arg()` 也可能很有用。第一个函数返回传递的参数数量（指的是在其函数体内调用 `func_num_args()`
    的那个函数的参数）。第二个函数返回具有特定索引（`func_get_arg()` 函数的参数）的参数值（调用 `func_get_arg()` 函数的那个函数的参数）。
    |


    清单 5-7 是一个程序，它使用了接受可变数量参数的函数。


    ```

    Listing 5-7

    可变数量参数

    ```


    程序执行的结果如下。


    ```

    程序的输出（来自清单 5-7）

    [1] 总和：20

    [2] 总和：0

    [3] 总和：25

    参数总数：7

    整数类型的参数：3

    参数总数：1

    搜索结束

    参数总数：7

    字符串类型的参数：2

    ```


    程序中声明了两个函数。`sum()` 函数声明时没有参数，而 `count_type()` 函数有一个参数。但实际上，这些函数的代码提供了对所有传递给它们的参数的处理。


    > **注意：** `sum()` 函数可以用任意数量的参数调用，包括零个参数。调用 `count_type()` 函数时，必须至少传入一个参数。

