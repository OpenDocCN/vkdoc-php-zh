    A N D M A N A G E M E N T


    **49**


    • profile_value: This is the actual profile value. If the profile_key value is
    email, this column would hold the actual e-mail address.


    ■**Tip** We use the text field type for profile_value because this allows us to
    store a large amount of data if required. There is no difference in performance
    between the varchar and text types in MySQL and PostgreSQL. In fact, MySQL internally
    creates a varchar field as the smallest possible text field based on the specified
    precision.


    Listing 3-2 shows the MySQL table definition for users_profile. We will implement
    code to manage user profiles later in this chapter.


    **Listing 3-2.** *SQL Used to Create the users_profile Table in MySQL (schema-mysql.sql)*
    create table users_profile (


    user_id bigint unsigned not null,


    profile_key varchar(255) not null,


    profile_value text not null,


    primary key (user_id, profile_key),


    foreign key (user_id) references users (user_id)


    ) type = InnoDB;


    As mentioned previously, the serial column type (used for the user_id column in
    Listing 3-1) is an alias for an auto-incrementing unsigned bigint column. Since
    the user_id column in this table refers back to the users table, we manually use
    the bigint unsigned type because we don’t want this column to auto-increment.


    We use the user_id and profile_key columns as the primary key for the users_profile
    table, as no profile values can be repeated for each user. However, a user can
    have several different profile values.


    ■**Note** If you’re using PostgreSQL, the int data type is used for user_id, as
    this is what the PostgreSQL


    serial type uses. Once again, the PostgreSQL version of the table can be found
    in schema-pgsql.sql.


