- fmt: "You could return a complete HTML page (even with JavaScript and links) back\
    \ to the device (browser) that requested the PHP program to execute. Example [2-5](#394210_2_En_2_Chapter.xhtml#PC6)\
    \ would create a complete dynamic HTML page from within PHP code. The output created\
    \ can even contain links to CSS files and embedded CSS tags for formatting. However,\
    \ I urge caution on embedding CSS tags that depend on the container being a certain\
    \ size. As the developer, you do not know what type of device will display the\
    \ result (PC, smart phone, tablet, or pad). It would be better to provide multiple\
    \ CSS files (as shown previously) to format the output for different devices.\n\
    \nIn the previous examples, we have separated the initial interface (HTML and\
    \ JavaScript) from the PHP program. You could actually place the HTML (to display\
    \ the initial web page) and PHP code in the same file.\n\nYou can create a PHP\
    \ file that will determine whether the user has ever requested the page before.\
    \ If they have not, or the browser has timed them out, then the PHP program could\
    \ display an initial HTML page for the user to interact (such as clicking a button).\
    \ The same program could then call itself again to determine if the button has\
    \ been clicked and return a response.\n\nLet us look at a different version of\
    \ the `Hello World` program to do just that.\n\n- *For a more in-depth demonstration\
    \ of PHP `if` statements, view the PHP manual at* [www.php.net/manual/en/control-structures.if.php](http://www.php.net/manual/en/control-structures.if.php)*.*\n\
    \n```\n Hello World \";\n}\nelse\n{\nprint \"PHP Example\";\nprint \"\";\nprint\
    \ \"\";\nprint \"\";\nprint \"\";\n}\n?>\nExample 2-6\nThe callmyself.php file\n\
    ```\n\nThis program includes a simple `if` conditional statement to determine\
    \ if the user has clicked the submit button.\n\nThe format of the `if` statement\
    \ is as follows:\n\n```\nif (conditional statement)\n{\n// code to execute if\
    \ the conditional statement is true\n}\nelse\n{\n// code to execute if the conditional\
    \ statement is false\n}\n```\n\nA conditional statement usually compares two values\
    \ to determine if they are the same or different or calls a method which returns\
    \ a `true` or `false` value. We will look at functions returning values in a moment.\
    \ Let us look at a quick example of the first type.\n\nConditional statements\
    \ use a comparison operator (`==`, `<`, `>`, `<=`, and `>=`) to determine if the\
    \ statement is `true` or `false`.\n\n```\nIf ( a > b)\n{\nprint \"it's A!\";\n\
    }\nelse\n{\nprint \"it's B!\";\n}\n```\n\nIn this example, the values in properties\
    \ `a` and `b` are compared. If `a` is greater than `b`, then \"it's A!\" is displayed.\
    \ Otherwise, \"it's B!\" is displayed. PHP does some type conversion when it determines\
    \ that it might be necessary. For example, assume `a = \"5\"`, and `b = 6`. PHP\
    \ would convert the value in `a` from a string 5 to a number 5 so it can do the\
    \ comparison. Many languages do not do this and will display an error if you try\
    \ to compare strings and numbers. If you do not want this conversion to occur,\
    \ you can use some special comparison operators. For example, you can use three\
    \ `=` signs to see if values are exactly the same (`a === b`) instead of two.\
    \ We will discuss comparison operators in more detail in Chapter [3](#394210_2_En_3_Chapter.xhtml).\n\
    \n- *Security and performance* — *Whenever possible, use* `===` *instead of* `==`.\
    \ This will assure that you get exactly what you expect.\n\nIn Example [2-6](#394210_2_En_2_Chapter.xhtml#PC7),\
    \ the `if` statement calls a method (`isset`). `$_POST` tries to retrieve the\
    \ property (`'submitbutton'`) and its value (\"`Find Hello World`!\") from the\
    \ HTML form, which used HTTP POST to pass the information (you could have used\
    \ `$_GET` and HTTP GET). `isset` will return a `false` or `true` back to the `if`\
    \ statement, depending on whether or not `$_POST` could retrieve the property\
    \ (and its contents). The `true` or `false` will cause the `if` statement to determine\
    \ which block of code to execute.\n\nAs mentioned in Chapter [1](#394210_2_En_1_Chapter.xhtml),\
    \ an object (such as a button) within an HTML form will produce a property and\
    \ value combination based on the object's name and whatever is contained in the\
    \ value statement of that object. This is even true for submit buttons that have\
    \ been given a name (`id`) and value (as in Example [2-6](#394210_2_En_2_Chapter.xhtml#PC7)).\n\
    \nThe first time the program is called from the browser, the button has not been\
    \ clicked. So, there is no `submitbutton` variable created. A `false` is returned\
    \ by the `isset` method. The code jumps to the `else` section and executes the\
    \ `print` statements that display the HTML form and submit button (as in Figure\
    \ [2-3](#394210_2_En_2_Chapter.xhtml#Fig3)).\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig3_HTML.jpg](images/394210_2_En_2_Chapter/394210_2_En_2_Fig3_HTML.jpg)\n\
    \n**Figure 2-3** callmyself.php before the button is clicked\n\nWhen the user\
    \ clicks the button, the program calls itself (look at the `action` parameter\
    \ of the `form` tag). This time, since the user has clicked the button, there\
    \ is a `submitbutton` property and a value (`'Find Hello World!'`) for that variable.\
    \ The program determines that the variable is \"set\" (has a value in it) and\
    \ returns a `true`. The `if` statement then executes the one line of code between\
    \ the `if` and `else` statements. `Hello World` is then displayed. The PHP program\
    \ handled all the functionality of the application without using any existing\
    \ static HTML page.\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig4_HTML.jpg](images/394210_2_En_2_Chapter/394210_2_En_2_Fig4_HTML.jpg)\n\
    \n**Figure 2-4** callmyself.php after the button is clicked\n\nThe advantage of\
    \ this technique is that all code can be contained in one file. Thus, all changes\
    \ occur in one place. The disadvantage of this technique is that all code is in\
    \ one file. The more complicate the code, the \"messier\" it can become. One way\
    \ to clean up the code would be to move the code into functions contained within\
    \ other PHP libraries (we will look at this later). The additional disadvantage\
    \ is that the file name cannot be changed without affecting the users. If you\
    \ changed the file name to `mynewprogram.php`, you would need to inform all your\
    \ users of the new name (and maybe location). The previous examples using AJAX\
    \ allowed you to change the file name within the HTML code page but did not require\
    \ you to change the actual name of the HTML page that the user would request.\n\
    \n### Do It\n\n1. Find the `callmyself.php` file on the Apress web site. Download\
    \ the file to your Apache `projects` folder. Change and add `print` statements\
    \ to display your complete name, the term, and your major. Test your program.\
    \ Did your program run successfully? If not, why not?"
