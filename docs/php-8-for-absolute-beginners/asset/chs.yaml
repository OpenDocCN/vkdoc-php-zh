  \n![](img/323857_3_En_8_Fig2_HTML.jpg)\n\n此对话框反映了主持人点击编辑器创建新博客时的界面，该对话框包含标题栏和条目栏。\n\
  \n**图 8-2** 通过`admin.php`调用`neweditor.php`并选择一个博客后的输出结果\n\n### 处理条目删除\n\n模型将逻辑上包含用于从数据库中删除条目数据的代码。视图已经有一个“删除”按钮，因此无需更改。控制器也必须更新，以便在用户点击“删除”按钮时执行代码。\n\
  \n#### 从数据库中删除条目\n\n要删除`blog_entry`表中的一行数据，我们需要创建更多的 SQL。让我们花一分钟思考一下。我们应该在哪里编写删除条目的代码？用于删除`blog_entry`表中条目的\
  \ PHP 代码属于`Blog_Entry_Table`类——我们访问数据库表的单一网关。我们将创建一个新方法来完成此任务。\n\n\n```php\n// models/New_Blog_Entry_Table.class.php\
  \ 的部分代码\n// 在 Blog_Entry_Table 类中声明新方法\npublic function deleteEntry ( $id ) {\n\
  $sql = \"DELETE FROM blog_entry WHERE entry_id = ?\";\n$data = array( $id );\n$statement\
  \ = $this->executeSQL( $sql, $data );\n}\n代码清单 8-5\nNew_Blog_Entry_Table.class.php\
  \ 的部分代码\n```\n\n此方法中的代码应该看起来很熟悉。它使用了与 `Blog_Entry_Table` 中其他方法相同的逻辑。唯一的区别在于 SQL\
  \ 语句。\n\n从数据库中删除数据是最终操作，无法撤销！务必避免误删任何内容。数据库表在设计上很合理：每条记录都有主键。这意味着只要拥有某条记录的主键，就能唯一标识该记录。因此，我们也能通过\
  \ `entry_id` 确定要删除的记录。\n\n### 响应删除请求\n\n编辑器模型已准备好删除条目，现在需要更新控制器中的代码，以判断删除按钮是否被点击。如果删除按钮被点击，控制器应调用模型来删除相关条目。\n\
  \n```php\n// views/admin/editor-html.php 的部分代码\n// 两个按钮，同一名称，不同值\n```\n\n点击编辑器表单中的任意提交按钮，都会生成一个名为\
  \ `action` 的 URL 变量。如果点击保存按钮，`action` 的值为 `save`；如果点击删除按钮，`action` 的值为 `delete`。基于此，我们更新编辑器程序。\n\
  \n```php\nsaveEntry( $title, $entry );\n} else if ($buttonClicked === 'delete' )\
  \ {\n$entryTable->deleteEntry( $id );\n}\n}\n$entryRequested = isset( $_GET['id']\
  \ );\n// 创建新的 if 语句\nif ( $entryRequested ) {\n$id = $_GET['id'];\n// 加载已有条目的模型\n\
  $entryData = $entryTable->getEntry( $id );\n$entryData->entry_id = $id;\n}\ninclude_once\
  \ \"views/admin/new-editor-html.php\";\n?>\n代码清单 8-6\nnewesteditor.php\n```\n\n\
  实际上只需要进行少量修改。\n\n```php\n$id = $_POST['id'];\n```\n\n将隐藏字段 `id` 的值存入 `$id`。\n\n\
  ```php\n} else if ($buttonClicked === 'delete' ) {\n$entryTable->deleteEntry( $id\
  \ );\n}\n```\n\n添加了一个 `else if` 语句，用于检查是否点击了删除按钮。如果是，则将 `$id` 值传递给新增的 `deleteEntry()`\
  \ 方法。\n\n> **注意**  \n> 以下程序已更新，以调用新版本的 `newesteditor.php` 和 `New_Blog_Entry_Table.php`：\
  \  \n> `new-entries-html.php`、`newestentries.php`、`newadmin.php`、`newest-editor-html.php`、`newest-admin-navigation.php`。\n\
  \n我们可以再次暂停，测试对模型、控制器和视图的更新。在浏览器中输入 `http://localhost/ch8/blog/newadmin.php?page=newestentries`\
