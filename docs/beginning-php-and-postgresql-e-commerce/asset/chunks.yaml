    除了可由表示层本地处理的事件（如简单的输入数据验证等）之外，其他调用均由表示层发出。例如，如果访问者正在执行产品搜索，表示层会调用业务层并告知：“请将与搜索条件匹配的产品发回给我。”几乎总是如此，业务层需要调用数据层来获取信息，才能响应表示层的请求。


    **数据层**（有时也称为*数据库层*）负责管理应用程序的数据，并在收到请求时将其发送给业务层。对于 `HatShop` 电子商务网站，你需要存储关于产品（包括其类别和部门）、用户、购物车等数据。几乎每个客户端请求最终都会导致数据层被询问以获取信息（除非之前检索到的数据已在业务层或表示层缓存），因此拥有一个快速的数据库系统至关重要。在第
    3 章和第 4 章中，你将学习如何设计数据库以达到最佳性能。


    这些层纯粹是逻辑上的——对每一层的物理位置没有限制。理论上，你可以自由地将整个应用程序及其所有层放在一台服务器上，或者如果应用程序允许，也可以将每一层放在不同的机器上。第
    17 章将解释如何使用 `XML Web Services` 集成其他网站的功能。`XML Web Services` 允许跨多个服务器轻松集成功能。


    三层架构模型中一个重要的约束是，信息必须在各层之间按顺序流动。表示层只能访问业务层，绝不能直接访问数据层。业务层是中间的“大脑”，负责与其他层通信，并处理和协调所有信息流。如果表示层直接访问数据层，就破坏了三层架构编程的规则。在实现三层架构时，你必须保持一致并遵守其规则，才能获得益处。


    图 2-1 简要展示了在实现三层架构的应用程序中数据传递的方式。


