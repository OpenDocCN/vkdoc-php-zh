  \n### 开发网站所需的软件\n\n由于您将使用 PHP 开发此电子商务网站，因此需要以下三种软件产品来运行 PHP 脚本：\n\n- **Apache 网络服务器**\
  \ — 用于在本地机器上运行和调试 PHP 脚本的本地网络服务器。\n- **PHP 解释器** — 用于解释 PHP 代码。Apache 网络服务器使用 PHP\
  \ 解释器来解释 PHP 代码并生成 HTML 代码。\n- **MySQL** — 与 PHP 最流行的数据库系统，用于存储用户输入的数据以供日后参考。\n\n\
  您不必单独安装这些产品，可以安装 WampServer 或 XAMPP 服务器。这些服务器会同时在您的机器上安装所有三种产品：Apache、PHP 和 MySQL。接下来，您将学习如何安装\
  \ WampServer。\n\n> **注意**  \n> WampServer 为 Apache、MySQL 和 PHP 数据库提供了 Windows 网络开发环境。\n\
