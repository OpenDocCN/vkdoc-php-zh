- fmt: "```sql\n-- Joining multiple instances of a single table is just like joining\
    \ different data tables, which contain the same data.\n\n-- You join two instances\
    \ of `order_detail`—called `od1` and `od2`—on their `order_id` fields, while filtering\
    \ the `product_id` value in `od1` for the ID of the product you’re looking for.\
    \ This way, you’ll get in the `od2` side of the relationship all the products\
    \ that were ordered in the orders that contain the product you’re looking for.\n\
    \n-- The SQL code that retrieves all the products that were ordered together with\
    \ the product identified by a `product_id` of 4 is:\n\nSELECT od2.product_id\n\
    FROM order_detail od1\nJOIN order_detail od2\nON od1.order_id = od2.order_id\n\
    WHERE od1.product_id = 4;\n\n-- This code returns a long list of products, which\
    \ includes the product with the `product_id` of 4, such as this one:\nproduct_id\n\
    \n-- Starting from this list of results, you need to get the products that are\
    \ most frequently bought along with this product. The first problem with this\
    \ list of products is that it includes the product with the `product_id` of 4\\\
    . To eliminate it from the list (because, of course, you can’t put it in the recommendations\
    \ list), you simply add one more rule to the `WHERE` clause:\n\nSELECT od2.product_id\n\
    FROM order_detail od1\nJOIN order_detail od2\nON od1.order_id = od2.order_id\n\
    WHERE od1.product_id = 4 AND od2.product_id != 4;\n\n-- Not surprisingly, you\
    \ get a list of products that is similar to the previous one, except it doesn’t\
    \ contain the product with a `product_id` of 4 any more:\nproduct_id\n\n-- Now\
    \ the list of returned products is much shorter, but it contains multiple entries\
    \ for the products that were ordered more than once in the orders that contain\
    \ the product identifier 4.\n\n-- To get the most relevant recommendations, you\
    \ need to see which products appear more frequently in this list. You do this\
    \ by grouping the results of the previous query by `product_id` and sorting in\
    \ descending order by how many times each product appears in the list (this number\
    \ is given by the `rank` calculated column in the following code snippet):\n\n\
    SELECT od2.product_id, COUNT(od2.product_id) AS rank\nFROM order_detail od1\n\
    JOIN order_detail od2\nON od1.order_id = od2.order_id\nWHERE od1.product_id =\
    \ 4 AND od2.product_id != 4\nGROUP BY od2.product_id\nORDER BY rank DESC;\n\n\
    -- This query now returns a list such as the following:\nproduct_id rank\n----------\
    \ ----\n10 3\n5 2\n43 2\n23 1\n25 1\n28 1\n12 1\n14 1\n\n-- If you don’t need\
    \ the `rank` to be returned, you can rewrite this query by using the `COUNT` aggregate\
    \ function directly in the `ORDER BY` clause. You can also use the `LIMIT` keyword\
    \ to specify how many records you’re interested in. If you want the top five products\
    \ of the list, this query does the trick:\n\nSELECT od2.product_id\nFROM order_detail\
    \ od1\nJOIN order_detail od2\nON od1.order_id = od2.order_id\nWHERE od1.product_id\
    \ = 4 AND od2.product_id != 4\nGROUP BY od2.product_id\nORDER BY COUNT(od2.product_id)\
    \ DESC\nLIMIT 5;\n\n-- The results of this query are:\nproduct_id\n\n-- Because\
    \ this list of numbers doesn’t make much sense to the human eye, you’ll also want\
    \ to know the name and the description of the recommended products. The following\
    \ query does exactly this by querying the `product` table for the IDs returned\
    \ by the previous query (the description isn’t requested because of space reasons):\n\
    \nSELECT product_id, name\nFROM product\nWHERE product_id IN\n(\n  SELECT od2.product_id\n\
    \  FROM order_detail od1\n  JOIN order_detail od2 ON od1.order_id = od2.order_id\n\
    \  WHERE od1.product_id = 4 AND od2.product_id != 4\n  GROUP BY od2.product_id\n\
    \  ORDER BY COUNT(od2.product_id) DESC\n  LIMIT 5\n);\n```"
