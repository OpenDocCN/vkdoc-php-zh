  raw: "```\n// listing 15.17\n// index.php\nrequire_once(\"vendor/autoload.php\"\
    );\nuse popp\\library\\LibraryCatalogue;\n// will be found under mylib/\nuse popp\\\
    library\\inventory\\Book;\n// will be found under additional/\nuse popp\\library\\\
    inventory\\Ebook;\n$catalogue = new LibraryCatalogue();\n$catalogue->addBook(new\
    \ Book());\n$catalogue->addBook(new Ebook());\n```\n\nNote\n\nYou must use Composer\
    \ to generate the autoload file, `vendor/autoload.php`,\nand this file must be\
    \ included in some way before you gain access to the\nlogic you have declared\
    \ in `composer.json`. You\ncan do this by running the command `composer install`.\
    \ You\ncan learn more about Composer in Chapter [15](#A314621_5_En_15_Chapter.html).\n\
    \nRemember the rule about side effects? A PHP file should declare classes,\ninterfaces,\
    \ functions, and the like; or, it should perform an action.\nHowever, it should\
    \ not do both. This script falls into the taking action\ncategory. Crucially,\
    \ it calls `require_once()` to\ninclude the autoload code generated using the\
    \ configuration in the `composer.json` file.\nThanks to this, all the classes\
    \ are located, despite the fact that `Ebook` has been placed\nin an entirely separate\
    \ base directory from the rest.\n\nWhy would I want to maintain two separate directories\
    \ for the same core\nnamespace? One possible reason is for unit tests that you\
    \ want to keep\nseparate from production code. You may also manage plug-ins and\n\
    extensions that will not ship with every version of your system.\n\nNote\n\nBe\
    \ sure to keep an eye on all the PSR standards at [`http://www.php-fig.org/psr/`](http://www.php-fig.org/psr/)\
    \ . This is a fast moving area, and you’ll likely find\nthat standards relevant\
    \ to you are on their way.\n\nSummary\n\nIn this chapter, I wrestled a little\
    \ with the possibility that standards\nare less than fantastically exciting—and\
    \ then made a case for their\npower. Standards get integration issues out of our\
    \ way, so that we can\nget on and do amazing things. I looked at PSR-1 and PSR-2,\
    \ the standards\nfor basic coding and for wider coding style. Next, I went on\
    \ to discuss\nPSR-4, the standard for autoloaders. Finally, I worked through a\n\
    Composer-based example that showed PSR-4 compliant autoloading in\npractice.\n\
    \n16. PHP Using and Creating Components\nwith Composer\n\nProgrammers aspire to\
    \ produce reusable code. This is one of the great\ngoals in object-oriented coding.\
    \ We like to abstract useful\nfunctionality from the messiness of specific context,\
    \ turning a\nparticular solution into a tool that can be used again and again.\
    \ To\ncome at this from another angle, if programmers love the reusable, they\n\
    hate duplication. By creating libraries that can be reapplied,\nprogrammers avoid\
    \ the need to implement similar solutions across\nmultiple projects.\n\nEven if\
    \ we avoid duplication in our own code, though, there is a wider\nissue. For every\
    \ tool you create, how many other programmers have\nimplemented the same solution?\
    \ This is wasted effort on an epic scale:\nwouldn’t it be much more sensible for\
    \ programmers to collaborate and to\nfocus their energies on making a single tool\
    \ better, rather than\nproducing hundreds of variations on a theme?\n\nIn order\
    \ to do this, we need to get our hands on existing libraries. But\nthen the packages\
    \ we need will likely require other libraries in order\nto do their work. So we\
    \ need a tool which can handle downloading and\ninstalling packages, as well as\
    \ manage their dependencies. That is where\nComposer comes in; it does all this,\
    \ and more besides.\n\nThis chapter will cover several key issues:\n\n*   Installation:\
    \ Downloading and\n    setting up Composer\n\n*   Requirements: Using `composer.json`\
    \ to get\n    packages\n\n*   Versions: Specifying versions so\n    as to get\
    \ the latest code without breaking your system\n\n*   Packagist: Configuring your\
    \ code\n    for public access\n\n*   Private repositories: Leveraging\n    Composer\
    \ using a private repository\n\nWhat Is Composer?\n\nStrictly speaking, Composer\
    \ is a dependency manager, rather than a\npackage manger. This, it seems, is because\
    \ it handles component\nrelationships on a local basis, rather than centrally\
    \ as Yum and Apt do.\nIf you think that this is an overly fine distinction, you\
    \ could be\nright. However we define it, Composer allows you to specify packages.\
    \ It\ndownloads them to a local directory (`vendor`), finds and\ndownloads all\
    \ dependencies, and then makes all this code available to\nyour project via an\
    \ autoloader.\n\nAs always, we need to begin by getting the tool.\n\nInstalling\
    \ Composer\n\nYou can download Composer at [`https://getcomposer.org/download/`](https://getcomposer.org/download/)\
    \ . You will find an installer mechanism there, but the\nphar file should suit\
    \ most purposes:\n\n```\n$ wget https://getcomposer.org/download/1.2.0/composer.phar\
    \ .\n$ chmod 755 composer.phar\n$ sudo mv composer.phar /usr/bin/composer\n```\n\
    \nI download the archive and run `chmod` to ensure that\nit is executable. Then\
    \ I copy it into a central location so that I can\nrun it easily from anywhere\
    \ in my system. Now I can test the command:\n\n```\n$ composer --version\nComposer\
    \ version 1.2.0 2016-07-19 01:28:52\n```\n\nInstalling a (Set of) Package(s)\n\
    \nWhy did I do that funky bit with the brackets? Because packages\ninevitably\
    \ beget packages—sometimes a lot of packages.\n\nLet’s begin with a library that\
    \ stands alone, though. Imagine that we’re\nbuilding an application which needs\
    \ to communicate with Twitter. A\nlittle bit of research leads me to the `abraham/twitteroath`\n\
    package. In order to install this, I need to generate a JSON file named\n`composer.json`,\n\
    and then define a `require` element:\n\n```\n{\n\"require\": {\n\"abraham/twitteroauth\"\
    : \"0.6.*\"\n}\n}\n```\n\nI begin with a directory that is empty apart from the\
    \ `composer.json` file.\nOnce I run a Composer command, though, we’ll see a change:\n\
    \n```\n$ composer install\nLoading composer repositories with package information\n\
    Updating dependencies (including require-dev)\n- Installing abraham/twitteroauth\
    \ (0.6.4)\nDownloading: 100%\nWriting lock file\nGenerating autoload files\n```\n\
    \nSo what has been generated? Let’s take a look:\n\n```\n$ ls\ncomposer.json \
    \ composer.lock  vendor\n```\n\nComposer installs packages into `vendor/`. It\
    \ also\ngenerates a file named `composer.lock`. This\nspecifies the exact versions\
    \ of all packages installed. If you’re using\nversion control, you should commit\
    \ this file. If another developer runs\n`composer install` with a `composer.lock`\
    \ file\npresent, package versions will be installed on her system exactly as\n\
    specified. In this way, the team can stay in sync with one another, and\nyou can\
    \ be sure that your production environment exactly matches the\ndevelopment and\
    \ test environments. You can override the lockfile by\nrunning this snippet:\n\
    \n```\ncomposer update\n```\n\nThis will generate a new lock file. Typically,\
    \ you will run this to keep\ncurrent with new package versions (if you are using\
    \ wildcards, as I\nhave, or ranges).\n\nInstalling a Package from the Command\
    \ Line\n\nAs you have seen, I can create the `composer` `.json` file using an\n\
    editor. But you can also have Composer do it for you. This is\nparticularly useful\
    \ if you need to kick off with a single package. When\nyou invoke `composer require`\
    \ on the command line, Composer will download the specified\npackage and install\
    \ it into `vendor/` for you. It\nwill also generate a `composer.json` file,\n\
    which you can then edit and extend:\n\n```\n$ composer require abraham/twitteroauth\n\
    Using version ^0.6.4 for abraham/twitteroauth\n./composer.json has been created\n\
    Loading composer repositories with package information\nUpdating dependencies\
    \ (including require-dev)\n- Installing abraham/twitteroauth (0.6.4)\nLoading\
    \ from cache\nWriting lock file\nGenerating autoload files\n```\n\nVersions"
