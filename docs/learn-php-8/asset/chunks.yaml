    if the user has clicked the submit button.\n\nThe format of the `if` statement\
    \ is as\nfollows:\n\n```\nif (conditional statement)\n{\n// code to execute if\
    \ the conditional statement is true\n}\nelse\n{\n// code to execute if the conditional\
    \ statement is false\n}\n```\n\nA conditional\nstatement usually compares two\
    \ values to determine if they are\nthe same or different or calls a method which\
    \ returns a `true` or `false` value. We will\nlook at functions returning values\
    \ in a moment. Let us look at a quick\nexample of the first type.\n\nConditional\
    \ statements use a comparison operator `(==`, `<`, `>`, `<=`, and `>=`) to determine\n\
    if the statement is `true` or `false`.\n\n```\nIf ( a > b)\n{\nprint \"it's A!\"\
    ;\n}\nelse\n{\nprint \"it's B!\";\n}\n```\n\nIn this example, the values in properties\
    \ `a` and `b` are compared. If\n`a` is greater\nthan `b`, then\n“it’s A!” is displayed.\
    \ Otherwise, “it’s B!” is displayed. PHP does some\ntype conversion when it determines\
    \ that it might be necessary. For\nexample, assume `a = \"5\"`, and `b = 6`. PHP\
    \ would convert the value in `a` from a string 5 to\na number 5 so it can do the\
    \ comparison. Many languages do not do this\nand will display an error if you\
    \ try to compare strings and numbers. If\nyou do not want this conversion to occur,\
    \ you can use some special\ncomparison operators. For example, you can use three\
    \ `=` signs to see if\nvalues are exactly the same (`a === b`) instead of\ntwo.\
    \ We will discuss comparison operators in more detail in Chapter\n[3](#394210_2_En_3_Chapter.xhtml).\n\
    \n*   *Security and performance* *—Whenever possible,\n    use* *===* *instead\
    \ of* *==. This will assure that\n    you get exactly what you expect.*\n\nIn\
    \ Example [2-6](#394210_2_En_2_Chapter.xhtml#PC7), the `if` statement calls a\n\
    method (`isset`).\n`$_POST`  tries to retrieve the\nproperty (`'submitbutton'`)\
    \ and\nits value (“`Find Hello World`!”) from the HTML form, which used HTTP POST\
    \ to pass the\ninformation (you could have used `$_GET` and HTTP GET).\n`isset`\
    \ will\nreturn a `false`\nor `true` back to\nthe `if`\nstatement, depending on\
    \ whether or not `$_POST` could retrieve\nthe property (and its contents). The\
    \ `true` or `false` will cause the\n`if` statement to\ndetermine which block of\
    \ code to execute.\nAs mentioned in Chapter [1](#394210_2_En_1_Chapter.xhtml),\
    \ an object (such as a button)\nwithin an HTML form will produce a property and\
    \ value combination based\non the object’s name and whatever is contained in the\
    \ value statement of\nthat object. This is even true for submit buttons that have\
    \ been given a\nname (`id`) and\nvalue (as in Example [2-6](#394210_2_En_2_Chapter.xhtml#PC7)).\n\
    \nThe first time the program is called from the browser, the button has\nnot been\
    \ clicked. So, there is no `submitbutton` variable\ncreated. A `false` is returned\
    \ by\nthe `isset`\nmethod. The code jumps to the `else` section and\nexecutes\
    \ the `print` statements that\ndisplay the HTML form and submit button (as in\
    \ Figure\n[2-3](#394210_2_En_2_Chapter.xhtml#Fig3)).\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig3_HTML.jpg](images/394210_2_En_2_Chapter/394210_2_En_2_Fig3_HTML.jpg)\n\
    \nFigure 2-3\ncallmyself.php before the button is clicked\n\nWhen the user clicks\
    \ the button, the program calls itself (look at the\n`action`\nparameter of the\
    \ `form` tag). This time,\nsince the user has clicked the button, there is a submitbutton\
    \ property\nand a value (`'Find Hello World!'`) for that variable. The program\
    \ determines that the\nvariable is “set” (has a value in it) and returns a `true`.\
    \ The `if` statement then\nexecutes the one line of code between the `if` and\
    \ `else` statements.\n`Hello World` is\nthen displayed. The PHP program handled\
    \ all the functionality of the\napplication without using any existing static\
    \ HTML page.\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig4_HTML.jpg](images/394210_2_En_2_Chapter/394210_2_En_2_Fig4_HTML.jpg)\n\
    \nFigure 2-4\ncallmyself.php after the button is clicked\n\nThe advantage of this\
    \ technique is that all code can be contained in\none file. Thus, all changes\
    \ occur in one place. The disadvantage of this\ntechnique is that all code is\
    \ in one file. The more complicate the code,\nthe “messier” it can become. One\
    \ way to clean up the code would be to\nmove the code into functions contained\
    \ within other PHP libraries (we\nwill look at this later). The additional disadvantage\
    \ is that the file\nname cannot be changed without affecting the users. If you\
    \ changed the\nfile name to `mynewprogram.php`, you\nwould need to inform all\
    \ your users of the new name (and maybe\nlocation). The previous examples using\
    \ AJAX allowed you to change the\nfile name within the HTML code page but did\
    \ not require you to change\nthe actual name of the HTML page that the user would\
    \ request.\n\nDo It\n\n1.  Find the `callmyself.php` file\n    on the Apress web\
    \ site. Download the file to your Apache `projects` folder.\n    Change and add\
    \ `print` statements to\n    display your complete name, the term, and your major.\
    \ Test your program.\n    Did your program run successfully? If not, why not?"
  trans: "\n你可以将一个完整的 HTML 页面（甚至包含 JavaScript 和链接）返回给请求执行 PHP 程序的设备（浏览器）。示例 2-5 展示了一段在\
    \ PHP 代码中创建完整动态 HTML 页面的方法。生成的输出甚至可以包含 CSS 文件的链接，以及用于格式化的内嵌 CSS 标签。不过，我强烈建议你谨慎使用那些依赖容器特定尺寸的内嵌\
    \ CSS 标签。作为开发者，你无法预知哪种设备会显示结果（PC、智能手机、平板还是 iPad）。更好的做法是提供多个 CSS 文件（如前文所示），以便根据不同设备对输出结果进行格式化。\n\
    \n在前面的示例中，我们将初始界面（HTML 和 JavaScript）与 PHP 程序分离开来。实际上，你可以将 HTML（用于显示初始网页）和 PHP\
    \ 代码放在同一个文件中。\n\n你可以创建一个 PHP 文件，用于判断用户之前是否请求过该页面。如果用户从未请求过，或者浏览器会话已超时，那么 PHP 程序可以显示一个用于用户交互（例如点击按钮）的初始\
    \ HTML 页面。然后，同一个程序可以再次调用自身，以判断按钮是否被点击，并返回相应的响应。\n\n我们来看一个不同版本的`Hello World`程序来实现这一功能。\n\
    \n- *如需深入了解 PHP `if` 语句的演示，请查看 PHP 手册*：[www.php.net/manual/en/control-structures.if.php](http://www.php.net/manual/en/control-structures.if.php)*。*\n\
    \n```\n Hello World \";\n}\nelse\n{\nprint \"PHP Example\";\nprint \"\";\nprint\
    \ \"\";\nprint \"\";\nprint \"\";\n}\n?>\n示例 2-6\ncallmyself.php 文件\n```\n\n该程序包含一个简单的`if`条件语句，用于判断用户是否点击了提交按钮。\n\
    \n`if`语句的格式如下：\n\n```\nif (条件语句)\n{\n// 如果条件语句为真，则执行的代码\n}\nelse\n{\n// 如果条件语句为假，则执行的代码\n\
    }\n```\n\n条件语句通常比较两个值，判断它们是否相同或不同，或者调用一个返回`true`或`false`值的方法。稍后我们会讨论返回值的方法。现在，先来看一个第一种类型的简单示例。\n\
    \n条件语句使用比较运算符（`==`、`<`、`>`、`<=` 和 `>=`）来判断语句是`true`还是`false`。\n\n```\nIf ( a >\
    \ b)\n{\nprint \"这是 A！\";\n}\nelse\n{\nprint \"这是 B！\";\n}\n```\n\n在这个示例中，比较了变量`a`和`b`中的值。如果`a`大于`b`，则显示“这是\
    \ A！”。否则，显示“这是 B！”。PHP 在判断可能有必要时，会进行一些类型转换。例如，假设`a = \"5\"`，而`b = 6`。PHP 会将`a`中的字符串\
    \ 5 转换为数字 5，以便进行比较。许多语言不会这样做，如果你试图比较字符串和数字，它们会显示错误。如果你不希望进行这种转换，可以使用一些特殊的比较运算符。例如，你可以使用三个等号（`a\
    \ === b`）来判断两个值是否绝对相等，而不是使用两个等号。我们将在第 3 章中更详细地讨论比较运算符。\n\n- *安全性与性能* — *尽可能使用*\
    \ `===` *代替* `==`。这将确保你得到完全符合预期的结果。\n\n在示例 2-6 中，`if`语句调用了一个方法（`isset`）。`$_POST`尝试从\
    \ HTML 表单中检索属性（`'submitbutton'`）及其值（`\"查找 Hello World！\"`），该表单使用了 HTTP POST 方法来传递信息（你也可以使用`$_GET`和\
    \ HTTP GET）。`isset`方法会根据`$_POST`能否检索到该属性（及其内容），向`if`语句返回`false`或`true`。这个`true`或`false`结果将决定`if`语句执行哪段代码块。\n\
    \n正如第 1 章所述，HTML 表单中的对象（例如按钮）会根据对象的名称以及该对象 value 语句中包含的内容，生成一个属性与值的组合。这对于已被指定名称（`id`）和值（如示例\
    \ 2-6 所示）的提交按钮也同样适用。\n\n当程序首次被浏览器调用时，按钮尚未被点击。因此，没有创建`submitbutton`变量。`isset`方法返回`false`。程序跳转到`else`部分，执行用于显示\
    \ HTML 表单和提交按钮的`print`语句（如图 2-3 所示）。\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig3_HTML.jpg](img/394210_2_En_2_Fig3_HTML.jpg)\n\
    \n**图 2-3** 按钮点击前的 callmyself.php\n\n当用户点击按钮时，程序会调用自身（查看`form`标签中的`action`参数）。这次，由于用户点击了按钮，因此存在一个`submitbutton`属性及变量值（`'查找\
    \ Hello World！'`）。程序判断该变量“已设置”（包含一个值），并返回`true`。于是，`if`语句执行`if`和`else`语句之间的那一行代码。随后显示`Hello\
    \ World`。这个 PHP 程序处理了应用程序的所有功能，而未使用任何现有的静态 HTML 页面。\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig4_HTML.jpg](img/394210_2_En_2_Fig4_HTML.jpg)\n\
    \n**图 2-4** 按钮点击后的 callmyself.php\n\n这种技术的优点在于所有代码都可以包含在一个文件中。因此，所有更改都在一个地方完成。这种技术的缺点也在于所有代码都在一个文件中。代码越复杂，就越容易变得“混乱”。整理代码的一种方法是把代码移到其他\
    \ PHP 库所包含的函数中（我们稍后会讨论这一点）。另一个缺点是，在不能影响用户的前提下更改文件名。如果你将文件名更改为`mynewprogram.php`，则需要通知所有用户新的名称（以及可能更改的位置）。之前使用\
    \ AJAX 的示例允许你在 HTML 代码页面中更改文件名，但不需要更改用户请求的 HTML 页面的实际名称。\n\n### 动手实践\n\n1. 在 Apress\
    \ 网站上找到`callmyself.php`文件。将文件下载到你的 Apache `projects`文件夹中。修改并添加`print`语句，以显示你的完整姓名、学期和专业。测试你的程序。你的程序是否成功运行？如果没有，原因是什么？\n"
- fmt: '# PHP Three-Tier Architecture


    Most of this chapter has been discovering the different platforms (or containers)
    that can “host” PHP applications. We have found that PHP can display its output
    in almost any container (PC, smart phone/mobile device, or browser). The ease
    at which PHP can interact with JavaScript, HTML, and CSS has provided this flexibility.
    Today, almost any platform has the ability to interact with the Internet (and
    those that do not will sometime in the future). Any platform that can interact
    with the Internet can also interact with a PHP application.


    This independence (or flexibility) of the interface demonstrates a logical separation
    of the platform or host of the interface from other “tiers” (parts) of the application.
    This leads into a discussion of the three-tier architecture and the logical design
    of PHP applications. The larger the application, the more likely the application
    will need to be broken into modules. Also, it is more likely that these modules
    could reside on different servers (or web servers). Larger applications likely
    will require multiple programmers writing code at the same time. These programmers
    may even use different languages to create the program modules.


    Building a large application is not much different than assembling a car. The
    individual components of the car (body, wheels, electronics, and engine) are assembled
    individually first. Each completed component is then placed inside the chassis
    of the car. The components are then connected (hoses, wires, and belts) to other
    components. When completed, all components of the car work together. If a component
    breaks, it can be replaced without causing replacement or changes to any other
    component in the car.


    The idea of modular (or component) programming is based on the methodology of
    blocks of code that can be created individually to be assembled with other modules
    to produce a working application. The modules can be modified or replaced without
    requiring changes to other modules. This methodology has been around for a while.
    Even today, many programs are not modular because smaller programs can work efficiently
    without being broken into modules. However, as these applications expand into
    larger applications, they become more difficult to update or maintain. A change
    requires updating the complete application rather than just a module. At some
    point, an expanding application that has not been created with modules has to
    be redesigned from the ground up into modules for better maintenance and reliability.


    As discussed in Chapter [1](#394210_2_En_1_Chapter.xhtml), a search engine can
    display a web page interface in a browser on the user’s PC. Once the user enters
    the search request, the information can be transmitted across the Internet to
    a remote server (we don’t know where), which executes a search application (we
    don’t know what programming language was used to create it). The application then
    searches a database (we do not know what DBMS or where it is located) for the
    requested information. The results are sent back to the application, which in
    turn, sends the information back to the browser (via the web server) on the user’s
    PC.


    ![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig5_HTML.jpg](images/394210_2_En_2_Chapter/394210_2_En_2_Fig5_HTML.jpg)


    **Figure 2-5** Three-tier modular application design


    The flow of information in this process causes the design of this type of web
    application to naturally fall into (at least) three tiers (modules): interface
    tier, business rules tier, and data tier. One advantage of breaking code into
    different tiers is the ability to reuse tiers with multiple applications. For
    example, our search engine could use the same business rules tier and data tier
    for multiple devices while using a different interface (PC app or smart phone
    app). Distinct tiers can also be updated without affecting other tiers. The smart
    phone app interface could be updated to use the latest features of the newest
    operating system without changes to the business rules or data tiers. Code within
    the business rules tier could be updated to fix logical bugs without requiring
    changes to the interface or data tiers. Let us take a look at what typically occurs
    in each tier.


    - **Modular three-tier applications** – design, programming—three-tier design
    provides the ability to create programs that can be separated into an interface
    tier, business rules tier, and data tier. The interface tier contains all graphics
    and program code related to displaying information to the user. The business rules
    tier does not contain an interface. However, it processes any information submitted
    from the interface tier and can then submit information to the data tier to be
    stored. The data tier is the primary storage location for the application, which
    may include the use of a database. Each tier can be independently changed and
    built (compiled) without affecting the other tiers.


    ## Do It


    1. What is the name of the three tiers of modular design?

    2. How is modular design similar to designing a building?

    3. How does modular programming make coding more efficient?


    ## Interface Tier


    ![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig6_HTML.jpg](images/394210_2_En_2_Chapter/394210_2_En_2_Fig6_HTML.jpg)


    **Figure 2-6** Interface tier


    The interface tier (IT) displays information and provides the user the ability
    to interact with the application. Most interfaces provide a graphical user interface
    (GUI), which allows the user an attractive way to view information and interaction
    with the application. GUI interfaces provide common objects, including text boxes
    and buttons, which help the user to quickly adapt to new applications. In addition,
    pictures, images, icons, video, and sound can often be included to keep the user’s
    interest. Menus and other navigation objects are also commonly included to help
    the user move through the application successfully.


    - **Objects** – Objects are blocks of code that have already been compiled for
    use within an application. Objects contain methods and properties. Methods (or
    functions) are blocks of code that accomplish a task (such as placing items in
    a list box). Properties (or variables) are characteristics of an object that can
    be changed (such as a background color). Objects are usually well tested and error
    free. By reusing existing objects, the programmer can quickly create more reliable
    programs.


    This tier will display information using objects (such as labels and picture boxes)
    or scripting code (such as the `ajaxdemo.html` example in this chapter). The tier
    will also accept information from the user through interactive objects (such as
    text boxes and buttons). Static information can be provided from within the tier
    (via menus, logos, or footers). Dynamic information is usually provided to the
    tier from the business rules tier (such as the output from `myfirstprogram.php`
    shown in this chapter).'
