    **8.** Execute the following command:


    openssl x509 -in hatshop.csr -out hatshop.crt -req -signkey hatshop.key -days
    365


    **9.** Create a directory in the Apache folder named C:\Apache2\conf\ssl, and
    move hatshop.key and hatshop.crt to it.


    **10.** Open C:\Apache2\conf\httpd.conf, and uncomment the following lines: LoadModule
    ssl_module modules/mod_ssl.so


    Include conf/extra/httpd-ssl.conf


    **11.** Open C:\Apache2\conf\extra\httpd-ssl.conf, find SSLCertificateFile c:/Apache2/conf/server.crt


    and change it to


