    We need to add the namespace for Imagine to the autoloader so that it will recognize
    classes prefixed with Imagine, from within the library/Imagine directory, when
    instantiated by our application. We can now use Imagine classes to modify uploaded
    files, which we will do in a new protected method, and by modifying the profileAction()
    method in the Users controller, as shown in Listing 28-7.


    ***Listing 28-7.*** Using Imagine in the profileAction() Method


    class UsersController extends Zend_Controller_Action


    {


    protected function _thumbnail($file)


    {


    $path = dirname(APPLICATION_PATH)."/public/uploads";


    $width = 64;


    $height = 64;


    $name = $file->name;


    $filename = pathinfo($name, PATHINFO_FILENAME);


    $extension = pathinfo($name, PATHINFO_EXTENSION);


    if ($filename && $extension)


    {


    $thumbnail = "{$filename}-{$width}x{$height}.{$extension}";


    if (!file_exists("{$path}/{$thumbnail}"))


    {


    $imagine = new Imagine\Gd\Imagine();


    $size = new Imagine\Image\Box($width, $height);


    $mode = Imagine\Image\ImageInterface::THUMBNAIL_OUTBOUND;


