  \    $result = DatabaseHandler::Prepare($sql);\n    // 执行查询并返回结果\n    return DatabaseHandler::GetRow($result,\
  \ $params);\n}\n\n// 获取属于特定订单的产品\npublic static function GetOrderDetails($orderId)\n\
  {\n    // 构建 SQL 查询语句\n    $sql = 'SELECT * FROM orders_get_order_details(:order_id);';\n\
