    Advanced Variables


    In addition to being a container for data, PHP variables have some other features
    that will be examined in this chapter. These are features that are not commonly
    used but are good to know about.


    Curly syntax


    A variable name can be explicitly specified by enclosing it in curly brackets.
    This is known as curly or complex syntax. To illustrate, the following code will
    output the variable even though it appears in the middle of a word.


    ```

    $fruit = ''Apple'';

    echo "Two {$fruit}s"; // "Two Apples"

    ```


    More importantly, the curly syntax is useful for forming variable names out of
    expressions. Consider the following code which uses the curly syntax to construct
    names for three variables.


    ```

    for ($i = 1; $i <= 3; $i++)

      ${''x''.$i} = $i;


    echo "$x1 $x2 $x3"; // "1 2 3"

    ```


    The curly syntax is required here because the expression needs to be evaluated
    in order to form a valid variable name. If the expression has only a single variable
    the curly brackets are not needed.


    ```

    for ($i = ''a''; $i <= ''c''; $i++)

      $$i = $i;


    echo "$a $b $c"; // "a b c"

    ```


    This syntax is known as a variable variable in PHP.


    Variable variable names


    A variable variable is a variable whose name can be changed through code. As an
    example, consider the following regular variable.


    ```

    $a = ''foo'';

    ```


    This variable’s value can be used as a variable name, by placing an additional
    dollar sign before it.


    ```

    $$a = ''bar'';

    ```


    The value of `$a`, which is "foo", now becomes an alternative name for the variable
    `$$a`.


    ```

    echo $foo; // "bar"

    echo $$a;  // "bar"

    ```


    An example usage for this would be to generate variables from an array.


    ```

    $arr = array(''a'' => ''Foo'', ''b'' => ''Bar'');


    foreach ($arr as $key => $value)

    {

      $$key = $value;

    }


    echo "$a $b"; // "Foo Bar"

    ```


    Variable function names


    By placing parentheses after a variable its value will be evaluated as the name
    for a function.'
