    这个特定的插件通过在视图中调用其辅助函数来运行。由于插件不仅需要辅助函数才能工作，还包含了必要的控制器和模型，但由于插件设计方式，你甚至不会注意到这些。


    让我们在你的应用程序中构建一个聊天动作。在 `Posts` 控制器中，创建 `chat()` 动作，并使其视图正常工作（`app/views/posts/chat.ctp`）。访问此动作时，视图应显示一个空白页面，可能顶部带有一个标题，因此动作本身无需更多内容。


    `Ajax Chat` 插件需要自己的辅助函数，该辅助函数必须像其他任何辅助函数一样对控制器可用，因此请将其与 `Ajax` 辅助函数一起包含在 `helpers`
    数组中：`var $helpers = array(''Ajax'',''chat/AjaxChat'');`


    最后一步是在视图中用一个简单的命令调用 `Ajax Chat` 辅助函数：`$ajaxChat->generate(''chatroom'');`


    现在，当你在 `Posts` 控制器中启动 `Chat` 动作时，`Ajax Chat` 插件应自动在页面上启动一个 Ajax 聊天室。毫不夸张地说，仅凭几行代码和一个
    SQL 查询，你就能在自己的博客中启动一个迷你应用。


    ## 创建自定义插件


    无论你是将 Cake 插件作为项目的附加组件使用，还是希望通过分发自己的迷你应用为 Cake 社区做贡献，你都需要在此基础上对插件进行自定义。要开始编写自定义插件，请创建一个以插件全小写名称命名的文件夹。所有控制器、模型和视图都将存储在此文件夹内。所有插件都需要两个额外的文件：`{plugin}_app_controller.php`
    和 `{plugin}_app_model.php` 文件，其中 `{plugin}` 是插件的全小写名称。这些文件将包含允许 Cake 使用插件其余资源的类名和扩展名，因此正确命名这些文件对于插件正常运行至关重要。


    基础插件将包含一个 `App` 控制器；一个 `App` 模型；以及用于控制器、模型和视图的文件夹。其组织结构模仿了 Cake 应用程序的整体结构，因此任何插件辅助函数都将存储在插件的
    `views/helpers` 目录中，依此类推（请参见代码清单 13-2）。务必将 `{plugin}` 替换为插件名称。


    **代码清单 13-2.** *基础插件文件结构*


    ```

    {plugin root}/

    {plugin}_app_controller.php

    {plugin}_app_model.php

    controllers/

    {controller name}_controller.php

    models/

    views/

    ```


    ### 插件元素的命名约定


    代码清单 13-2 展示了插件根目录内的基础文件结构。插件元素的命名约定与其他 Cake 资源的标准命名约定略有不同。表 13-1 说明了如何命名插件元素。


    **表 13-1.** *插件元素的命名约定*


    | **类型** | **文件名** | **类** | **继承自** | **示例** |

    | --- | --- | --- | --- | --- |

    | App 控制器 | `{plugin}_app_controller.php` | `PluginAppController` | `AppController`
    | `CalendarAppController` 继承自 `AppController` |

    | App 模型 | `{plugin}_app_model.php` | `PluginAppModel` | `AppModel` | `CalendarAppModel`
    继承自 `AppModel` |

    | 控制器 | 同应用程序标准 | 同应用程序标准 | `PluginAppController` | `EventsController` 继承自 `CalendarAppController`
    |

    | 模型 | 同应用程序标准 | 同应用程序标准 | `PluginAppModel` | `Event` 继承自 `CalendarAppModel` |

    | 辅助函数 | 同应用程序标准 | 同应用程序标准 | `Helper` | `CalendarHelper` 继承自 `Helper` |

    | 组件 | 同应用程序标准 | 同应用程序标准 | `Object` | `CalendarComponent` 继承自 `Object` |

    | 行为 | 同应用程序标准 | 同应用程序标准 | `ModelBehavior` | `MonthBehavior` 继承自 `ModelBehavior`
    |

    | 数据源 | 同应用程序标准 | 同应用程序标准 | `DataSource` | `CalSource` 继承自 `DataSource` |

    '
- fmt: "# Plugin Naming Conventions and Usage\n\nIndividual view files do not change\
    \ naming conventions in plugins. In other words, they are named just like standard\
    \ Cake view files. The Events views, for example, would be stored in the `app/plugins/calendar/views/events`\
    \ folder. Individual plugin views are then named after the action: `index.ctp`,\
    \ and so forth.\n\nNot only do some file names for plugins need to be adjusted\
    \ to work properly; so do the class names in the files. For the plugin not to\
    \ conflict with the surrounding Cake application file names and class names, the\
    \ naming conventions and syntax must be slightly adjusted.\n\nInstead of naming\
    \ the class `AppController`, for instance, the class name will need to be prepended\
    \ with the name of the plugin. A plugin named Calendar would need to have its\
    \ class names named after the plugin. For example, the App controller would be\
    \ named `CalendarAppController`, and the App model would be named `CalendarAppModel`.\
    \ Other elements used by the plugin should have their class names adjusted depending\
    \ on what type of element they are.\n\nControllers and models extend the plugin’s\
    \ App controller and App model, respectively (see Listing 13-3). Thus, the class\
    \ name must reflect this extension when the plugin classes are instantiated.\n\
    \n**Listing 13-3.** *An Example of a Plugin Controller Extending the App Controller*\n\
    \n```\n<?\nclass EventsController extends CalendarAppController {\n    var $name\
    \ = 'Events';\n    var $uses = array('Event');\n}\n?>\n```\n\nNotice that line\
    \ 4 of Listing 13-3 shows the plugin controller using the `$uses` class attribute\
    \ to specify the corresponding model. Though Cake should automatically pick up\
    \ the appropriate models and views, consistently setting the `$uses` array will\
    \ allow the plugin to be more portable and reduces the risk of the plugin controller\
    \ conflicting with the surrounding application’s namespaces.\n\nLike the plugin\
    \ controller, the plugin model extends the App model and has its naming syntax\
    \ adjusted to work as a plugin (see Listing 13-4).\n\n**Listing 13-4.** *An Example\
    \ of a Plugin Model Extending the App Model*\n\n```\n<?\nclass EventModel extends\
    \ CalendarAppModel {\n    var $name = 'Event';\n}\n?>\n```\n\nHelpers, components,\
    \ behaviors, and DataSources may also be used as part of a plugin. Their naming\
    \ conventions generally remain the same as when used as elements of a Cake application\
    \ and not as plugin elements. Refer to Table 13-1 for information on how to name\
    \ other plugin classes and what objects they extend.\n\n## Running Plugin Actions\n\
    \nOnce a plugin is installed in your Cake application, you may access its actions\
    \ by adding the plugin name plus the action and parameters to the URL. The Events\
    \ controller used in Listing 13-3 could be called in the blog application with\
    \ the following URL:\n\n`http://localhost/blog/calendar/events`\n\nOf course,\
    \ the action and parameters also follow:\n\n`http://localhost/blog/calendar/events/view/01/2009`\n\
    \nControllers in the surrounding Cake application can run a plugin’s controller\
    \ actions using the `requestAction()` function:\n\n```php\n$events = $this->requestAction(array('controller'=>'CalendarEvents','action'=>'getEvents'));\n\
    ```\n\n## Using Plugin Layouts\n\nBy default, the plugin will use the default\
    \ layout in the surrounding application’s `app/views/layouts` directory. Specifying\
    \ a layout stored in the plugin is simple: just use the `$layout` class variable\
    \ in either the action or the controller. Be sure to add the plugin name to the\
    \ layout setting. Listing 13-5 gives an example of how to do this.\n\n**Listing\
    \ 13-5.** *Using a Plugin Layout in the Plugin Controller*\n\n```\n<?\nclass EventsController\
    \ extends CalendarAppController {\n    var $name = 'Events';\n    var $layout\
    \ = 'Calendar.default';\n}\n?>\n```"
