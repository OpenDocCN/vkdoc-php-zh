  \        }\n        default:\n        {\n            throw new Exception\\Argument(\"\
  无效类型\");\n            break;\n        }\n    }\n}\n```\n\n工厂类以我们最近添加到 `Cache` 和\
  \ `Configuration` 中的自动配置功能开始。\n\n\"sever\" 驱动程序是我们唯一会创建的，它将以 `Session\\Driver\\\
  Server` 的实例形式返回。`Session\\Driver` 类实际上与 `Cache\\Driver` 和 `Configuration\\Driver`\
  \ 类完全相同。\n\n如**代码清单 14-10** 所示，服务器驱动程序也相当简单。\n\n***代码清单 14-10.*** `Session\\Driver\\\
  Server` 类\n\n```php\nnamespace Framework\\Session\\Driver\n{\n    use Framework\\\
  Session as Session;\n\n    class Server extends Session\\Driver\n    {\n       \
  \ /**\n         * @readwrite\n         */\n        protected $_prefix = \"app_\"\
  ;\n\n        public function __construct($options = array())\n        {\n      \
  \      parent::__construct($options);\n            session_start();\n        }\n\
  \n        public function get($key, $default = null)\n        {\n            $prefix\
  \ = $this->getPrefix();\n            if (isset($_SESSION[$prefix.$key]))\n     \
  \       {\n                return $_SESSION[$prefix.$key];\n            }\n    \
  \        return $default;\n        }\n\n        public function set($key, $value)\n\
  \        {\n            $prefix = $this->getPrefix();\n            $_SESSION[$prefix.$key]\
  \ = $value;\n            return $this;\n        }\n\n        public function erase($key)\n\
  \        {\n            $prefix = $this->getPrefix();\n            unset($_SESSION[$prefix.$key]);\n\
  \            return $this;\n        }\n\n        public function __destruct()\n\
  \        {\n            session_commit();\n        }\n    }\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
