    }


    Our database connection instance is now protected against external interference.
    Our class will also give some useful information about how interaction with the
    $instance property is handled, which is helpful for other developers.


    Like their names suggest, getters/setters are methods that get or set something.
    They are usually instance methods, and are considered best practice when allowing
    external access to internal variables. They commonly follow the pattern getProperty()/setProperty(),
    where Property can be any noun. Let us see what our Car class would look like
    with getters/setters, as shown in Listing 3-4.


    ***Listing 3-4.*** Simple Getters/Setters


    class Car


    {


    protected $_color;


    protected $_model;


    public function getColor()


    {


    return $this->_color;


    }


    public function setColor($color)


    {


    $this->_color = $color;


    return $this;


    }


    public function getModel()


    {


    return $this->_model;


    }


    public function setModel($model)


    {


    $this->_model = $model;


    return $this;


    }


    }


    $car = new Car();


    $car->setColor("blue");


    $car->setModel("b-class");


    There are a few important things to notice here. The first is that we actually
    need to create the getter/setter methods ourselves. Some other languages do this
    automatically, or with much less code, but there is no native getters/setters
    support in PHP.


