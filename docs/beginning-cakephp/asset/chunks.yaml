    **99**


    In the app/views/layouts/flash.ctp file, the variable passed through the previous
    setFlash() function will be available as $story, which behaves like passed variables
    in view files through the set() controller function.


    The key parameter in setFlash() makes it possible to have flash messages appear
    in different areas of the layout. For instance, the app/views/layouts/default.ctp
    file could contain two flash() functions differentiated by the key:


    <div id="top">


    <? $session->flash(''top'');?>


    </div>


    <div id="bottom">


    <? $session->flash(''bottom'');?>


    </div>


    Now when the controller fires a flash message with setFlash(), you can specify
    where you want the message to appear. Using the key in a flash message like this:
    $this->Session->setFlash(''Invalid post.'',null,null,''bottom'');


    tells the Session component to match the message with the flash() function with
    the parameter set to bottom.


    Line 3 of Listing 7-5 needs to display a basic flash message only in the event
    of an error, so I won’t add any more parameters to the setFlash() function. But
    you can, of course, make the message say anything you want. Simply change the
    first parameter to your own error message.


    **The redirect() Function**


    Line 4 of Listing 7-5 redirects the user in the event of an error. You can do
    this by using the redirect() controller function. The available parameters for
    redirect() are listed in Table 7-5.


    **Table 7-5.** *Parameters, in Order, Available in the* redirect() *Controller
    Function* **Name**


    **Type**


    **Default Value**


    **Explanation**


    url


    Mixed


    null


    A string or array pointing to another site or location in the


    application.


    status


    Integer


    null


    The HTTP status code, if desired (for example, 404 or 500


    error codes).


    exit


    Boolean


    true


    If true, the PHP exit() function will be called after the


    redirect.


    ■**Caution** If the exit parameter in this function is set to false, Cake will
    continue to execute code in the controller following the redirect. Only when the
    exit parameter is set to true, meaning the PHP exit() function is called and thus
    terminating script execution, will all other processes be stopped after the redirect.


    This may have unintended consequences since the user’s browser will request a
    new page but an old script may continue to run.


