    \n我们费心将实例方法包装在静态方法中的原因是，我们创建了一个上下文，其中模型实例等同于数据库记录。在此上下文中，多记录操作作为类方法更有意义。\n\n`first()`方法与`all()`方法类似，它也是受保护实例方法的简单静态包装器。`_first()`方法仅返回第一个匹配的记录，如代码清单10-15所示。\n\
