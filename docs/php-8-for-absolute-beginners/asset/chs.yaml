  \n\n### 注意事项\n当用户单击浏览按钮时，HTML 会弹出一个熟悉的文件上传窗口。该窗口实际上是通过向用户操作系统发送一个隐藏的*API（应用程序编程接口）调用*来打开的。这保证了用户体验的一致性。此外，仅允许上传\
  \ JPEG 图片的限制是通过 API 调用作为参数传递的，该参数设置为仅显示 JPEG 格式的文件。\n\n### `php.ini`\n我们需要检查或调整`php.ini`文件中的几个设置，以允许并限制文件上传。`php.ini`文件包含所有初始化设置，每当\
  \ PHP 程序被解释时都会访问这些设置。根据您选择安装的 Apache/PHP/MySQL 软件包，该文件的位置会有所不同。但是，它与其他 PHP 文件位于同一位置。如果您安装了\
  \ XAMPP，它位于 XAMPP 文件夹下的 PHP 文件夹中。您可以使用任何文本编辑器（如记事本或 Notepad++）查看和编辑此文件。但是，如果您确实进行了更改，请先制作一个备份副本，以防出错。为了使更改生效，必须停止并重新启动\
  \ Apache 服务器。\n\n> **注意：** 可以通过在一个简单的 PHP 程序中显示（`echo`）PHP 函数`php_ini_loaded_file()`来发现`php.ini`文件的位置。\n\
  \n```\n;;;;;;;;;;;;;;;;\n; File Uploads ;\n;;;;;;;;;;;;;;;;\n; Whether to allow\
  \ HTTP file uploads.\n; http://php.net/file-uploads\nfile_uploads=On\n; Temporary\
  \ directory for HTTP uploaded files (will use system default if not\n; specified).\n\
  ; http://php.net/upload-tmp-dir\nupload_tmp_dir=\"C:\\xampp8.1.1\\tmp\"\n; Maximum\
  \ allowed size for uploaded files.\n; http://php.net/upload-max-filesize\nupload_max_filesize=40M\n\
  ; Maximum number of files that can be uploaded via a single request\nmax_file_uploads=20\n\
  ```\n\n在`php.ini`文件中，我们需要确保`file_upload`设置为`On`。我们还可以指定一个不同的位置来临时保存上传的文件（如果我们选择这样做）。我们可以调整允许上传的最大文件大小以及单个请求中允许上传的最大文件数量。应仔细考虑应使用哪些限制。我们应该始终假设会有人试图通过大量文件上传来淹没我们的服务器，从而使其崩溃。\n\
  \n### `$_FILES`\n当文件上传到 PHP 时，与文件相关的元数据会存储在一个关联数组中。这个超全局数组被命名为`$_FILES`。该数组包含有关上传文件的几个重要方面。\n\
  \n```\nArray (\n[image-data] => Array (\n[name] => alberte-lea.jpg\n[type] => image/jpeg\n\
  [tmp_name] => /Applications/XAMPP/xamppfiles/temp/phpYPcBjK\n[error] => 0\n[size]\
  \ => 119090\n)\n)\n```\n\n`name`和`type`是自解释的。`tmp_name`是文件上传后的临时名称。如果文件太大（根据`php.ini`中的设置），则此项将设置为`\"\
  none\"`。错误代码为`0`或`UPLOAD_ERR_OK`表示文件上传成功。`size`是文件的字节数。其他可能的错误消息如下所列。\n\n```\nUPLOAD_ERR_OK\
  \ = 文件上传成功\nUPLOAD_ERR_INI_SIZE = 文件太大，无法上传\nUPLOAD_ERR_FORM_SIZE = 文件太大，无法上传\n\
  UPLOAD_ERR_PARTIAL = 文件仅部分上传\nUPLOAD_ERR_NO_FILE = 没有上传文件\nUPLOAD_ERR_NO_TMP_DIR\
  \ = 服务器上缺少临时目录\nUPLOAD_ERR_CANT_WRITE = 无法将文件保存到磁盘\nUPLOAD_ERR_EXTENSION = 文件扩展名无效\n\
  ```\n\n### 安全编程\n黑客可以操纵`$_FILES`关联数组的内容。唯一的例外是`tmp_name`不能被更改。因此，在使用此数组中的信息时，我们需要对其进行验证。\n\
  \n在移动文件之前，我们可以创建一个函数来验证文件及其大小。\n\n```\n<?php\nfunction checkFile($tmpName, $variableName)\
  \ {\n    $valid_File_Types = array('image/jpeg' => 'jpg');\n    $max_Size = 40 *\
  \ 1024 * 1024;\n    // 40MB must be the same size or less than the setting in php.ini\n\
  \    $errorStatus = false;\n    if (!isset($_FILES[$variableName])) {\n        //\
  \ error $_FILE does not exist\n        $errorStatus = true;\n    } else {\n    \
  \    $info = finfo_open(FILEINFO_MIME_TYPE);\n        if (!$info) {\n          \
  \  // error Can't open finfo using mime type\n            $errorStatus = true;\n\
  \        } else {\n            $mime_type = finfo_file($info, $tmpName);\n     \
  \       if (!in_array($mime_type, array_keys($valid_File_Types))) {\n          \
  \      // error invalid file type\n                $errorStatus = true;\n      \
  \      } else {\n                if (filesize($_FILES[$variableName]['tmp_name'])\
  \ > $max_Size) {\n                    // error file size too big\n             \
  \       $errorStatus = true;\n                }\n                finfo_close($info);\n\
  \            }\n        }\n    }\n    return $errorStatus;\n}\n// Code below used\
  \ for testing only\n$variableName = 'image-data';\n$tmp = $_FILES['image-data']['tmp_name'];\n\
  if (!checkFile($tmp, $variableName)) {\n    echo \"文件有效\";\n} else {\n    echo \"\
  文件无效\";\n}\n?>\n```\n\n**清单 4-12：`checkFile.php`**\n\n哇，很多新代码。但让我们一步一步地分解它，看看发生了什么。\n\
  \n```\n$valid_File_Types = array('image/jpeg' => 'jpg');\n$max_Size = 40 * 1024\
  \ * 1024;\n// 40MB must be the same size or less than the setting in php.ini\n$errorStatus\
  \ = false;\n```\n\n`$valid_File_Types`是包含我们可接受文件类型的数组。目前，只有一个条目，但我们可以轻松添加其他文件类型。`$max_Size`是我们允许的单个文件的最大大小。这必须等于或小于`php.ini`文件中存储的值。`$errorStatus`被设置为`false`，默认情况下表示我们正在上传的文件没有问题。\n\
  \n```\nif (!isset($_FILES[$variableName])) {\n    // error $_FILE does not exist\n\
  \    $errorStatus = true;\n```\n\n如果从 HTML 表单传递的变量名（`image_data`）在`$_FILES`数组中不存在，我们将错误状态设置为`true`。这可能表明数组被篡改了。\n\
  \n```\n$info = finfo_open(FILEINFO_MIME_TYPE);\nif (!$info) {\n    // error Can't\
  \ open finfo using mime type\n    $errorStatus = true;\n```\n\n如果`$info`未设置，则当我们尝试使用`finfo`查看\
  \ MIME 类型时发生了问题。这并不表示我们上传的文件有问题，而是表明我们遇到了其他问题。\n\n```\n$mime_type = finfo_file($info,\
  \ $tmpName);\nif (!in_array($mime_type, array_keys($valid_File_Types))) {\n    //\
  \ error invalid file type\n    $errorStatus = true;\n```\n\n如果*MIME 类型*（文件后缀）与`$valid_File_Types`数组中的任何一个不匹配，则将错误状态设置为`true`。\n\
  \n```\nif (filesize($_FILES[$variableName]['tmp_name']) > $max_Size) {\n    // error\
  \ file size too big\n    $errorStatus = true;\n```\n\n如果上传的临时文件的大小大于我们允许的最大值，则错误状态设置为`true`。\n\
  \n```\nreturn $errorStatus;\n}\n$variableName = 'image-data';\n$tmp = $_FILES['image-data']['tmp_name'];\n\
  if (!checkFile($tmp, $variableName)) {\n    echo \"文件有效\";\n} else {\n    echo \"\
  文件无效\";\n}\n```\n\n> **注意：**您可以使用`ch4`文件夹下`views`文件夹中的`testUploadForm.php`运行此程序。\n\
  \n错误状态会返回给调用它的程序。在这个测试中，我们在函数下方直接调用了它，并设置了变量名，从当文件通过 HTML 表单上传时创建的`$_FILES`数组中获取了文件的临时名称。然后将此信息传递到函数中。如果函数返回`false`，则表示一切正常。如果返回`true`，则说明有问题。\n\
  \n现在我们有了验证上传文件的能力，我们可以通过将文件从临时位置移动来完成上传过程。\n\n### 使用 PHP 上传文件\n当文件最初被上传时，它会被放置在服务器上的一个临时目录中，并使用一个临时名称，如数组中的`tmp_name`值所示。请记住，这个位置是在`php.ini`文件中确定的，并且可以通过更新`php.ini`并重启\
  \ Apache 来更改。要永久存储文件，我们必须将其从临时位置移动到一个永久位置。\n\n\n```php\nmove_uploaded_file( $fileName,\
  \ $destination );\n```\n\n函数 `move_uploaded_files()` 将完成此任务。它接受两个参数：第一个参数 `$fileName`\
  \ 应包含有效的临时文件名（位于 `$_FILES` 关联数组的 `tmp_name` 中），第二个参数 `$destination` 是永久存储文件的文件夹。该位置必须存在且可写。如果文件保存成功，函数\
  \ `move_uploaded_file()` 将返回 `TRUE`，否则返回 `FALSE`。\n\n## 规划上传器类\n\n在作为 PHP 或全栈开发者的职业生涯中，您将多次编写文件上传代码。编写可重用的上传代码是一个明智的主意。对象易于重用，因此让我们规划一个可随时重用的上传类。\n\
  \n### UML\n\n统一建模语言（UML）提供了规划类组织方式的简单图表。基本设计如下所示：\n\n![](img/323857_3_En_4_Fig8_HTML.jpg)\n\
  \n该图反映了基本的统一建模语言，包含类名、属性和方法。\n\n**图 4-8** 基本 UML 图\n\n请记住，类名的首字母始终大写。如果类名是复合词，每个附加单词的首字母也应大写。我们也可以选择用下划线分隔每个单词。如果类与主程序分开存放，则包含类的文件名应与类名相同。\n\
  \n> **注意：** UML 是 \"Unified Modeling Language\"（统一建模语言）的首字母缩写。该语言为记录代码提供了标准语法。UML\
  \ 不仅仅包含类图。有关 UML 的更多信息，请访问 [`www.uml.org`](http://www.uml.org)。\n\n### 上传器类需求\n\n\
  如前所述，我们需要将表单接收的文件数据从临时目录移动到永久位置。因此，该类需要一个属性来存储文件元数据，以及一个用于保存文件的方法。该方法需要一个文件名，因此我们创建一个\
  \ `$filename` 属性。我们还需要将文件保存到某处，因此创建一个存储位置的属性 `$destination` 和一个保存方法。现在可以开始规划新类的定义。\n\
  \n![](img/323857_3_En_4_Fig9_HTML.jpg)\n\n该图展示了统一建模语言的上传器类图。\n\n**图 4-9** `Uploader`\
  \ 类的 UML 图\n\n有了规划和 UML 类图，编写类定义就变得容易了。让我们创建一个新文件 `classes/Uploader.class.php`，内容如下：\n\
  \n```php\n<?php\nclass Uploader {\n    public $filename;\n    public $fileData;\n\
  \    public $destination;\n\n    public function saveIn( $folder ) {\n        $this->destination\
  \ = $folder;\n    }\n\n    public function save() {\n        // 此处尚无代码\n    }\n\
  }\n?>\n```\n\n**清单 4-13** `Uploader.class.php`\n\n上述代码声明了一个类，包含类名和用花括号分隔的类代码块。类内部声明了三个属性和两个方法。当我们已经创建了\
  \ UML 类图时，创建类会容易得多。属性 `destination` 将在调用 `saveIn` 方法时获取其值。属性 `filename` 和 `fileData`\
  \ 当前没有任何值。我们可以从超全局数组 `$_FILES` 中检索 `filename` 和 `fileData` 的值。如果在创建新的 `Uploader`\
  \ 对象时它们能自动获取值，那么它们的值就能反映当时要上传的文件。\n\n### 魔术方法 `__construct()`\n\n正好可以使用 `__construct()`\
  \ 构造方法来完成此任务。它仅在每次使用 `new` 关键字创建新的 `Uploader` 对象时运行一次。请记住，方法名前有两个下划线字符。让我们为 `Uploader`\
  \ 声明一个构造方法，以便在创建新的 `Uploader` 对象时，`filename` 和 `fileData` 属性能从 `$_FILES` 获取值。\n\n\
  ```php\n<?php\nclass Uploader {\n    public $filename;\n    public $fileData;\n\
  \    public $destination;\n\n    public function __construct( $key ) {\n       \
  \ $this->filename = $_FILES[$key]['name'];\n        $this->fileData = $_FILES[$key]['tmp_name'];\n\
  \    }\n\n    public function saveIn( $folder ) {\n        $this->destination =\
  \ $folder;\n    }\n\n    public function save() {\n        // 此处尚无代码\n    }\n}\n\
  ?>\n```\n\n**清单 4-14** `ImageUploader.class.php`\n\n请记住，我们必须知道用于上传文件的 `<input type=\"\
  file\">` 元素的 `name` 属性。正如我们之前发现的，我们需要 `name` 属性来访问 `$_FILES` 中的所有文件数据。在上述代码中，构造方法使用\
  \ `$key` 作为参数。`$key` 值将用于将 `name` 属性值传递给构造方法。这样，构造方法就能访问上传文件的所有元数据。\n\n### 保存上传的文件\n\
  \n`Uploader` 类已接近完成。我们需要完成保存新文件的方法，并验证要上传的文件是否有效。请记住，始终要为意外情况做好准备。在执行文件上传时，我们可能会遇到一个常见问题：目标文件夹可能不可写。我们可以在代码中为此做好准备。\n\
  \n```php\n<?php\nclass ImagesUploader {\n    public $filename;\n    public $fileData;\n\
  \    public $destination;\n    public $keyValue;\n\n    public function __construct(\
  \ $key ) {\n        $this->keyValue = $key;\n        $this->filename = $_FILES[$key]['name'];\n\
  \        $this->fileData = $_FILES[$key]['tmp_name'];\n    }\n\n    public function\
  \ saveIn( $folder ) {\n        $this->destination = $folder;\n    }\n\n    public\
  \ function save() {\n        $variableName = $this->keyValue;\n        $tmp = $_FILES[$this->keyValue]['tmp_name'];\n\
  \        $folderIsWriteAble = is_writable( $this->destination );\n        $notValid\
  \ = checkImageFile($tmp, $variableName);\n        if( !$notValid and $folderIsWriteAble)\
  \ {\n            $name = \"$this->destination/$this->filename\";\n            $success\
  \ = move_uploaded_file( $this->fileData, $name );\n        } else {\n          \
  \  $success = false;\n        }\n        return $success;\n    }\n}\n?>\n```\n\n\
  **清单 4-15** `ImagesUploader.class.php`\n\n让我们看一下这些更改：\n\n```php\nrequire_once \"\
  views/checkImageFile.php\";\n```\n\n先前用于检查图像有效性的函数已稍作修改，删除了函数调用，现在该调用将在 `ImagesUploader`\
  \ 类的 `save` 方法中执行。包含验证方法的新文件名是 `checkImageFile.php`。\n\n```php\n$variableName =\
  \ $this->keyValue;\n$tmp = $_FILES[$this->keyValue]['tmp_name'];\n$folderIsWriteAble\
  \ = is_writable( $this->destination );\n$notValid = checkImageFile($tmp, $variableName);\n\
  if( !$notValid and $folderIsWriteAble) {\n    $name = \"$this->destination/$this->filename\"\
  ;\n    $success = move_uploaded_file( $this->fileData, $name );\n```\n\n变量 `$variableName`\
  \ 和 `$tmp` 在 `save` 方法中设置，其值与原始检查文件方法中设置的值相同。同时，使用 PHP 的 `is_writable` 函数来确定文件将要移动到的目录是否可写。如果文件通过验证且目录可写，则\
  \ `if` 语句产生 `true` 结果，文件被移动到永久位置。\n\n```php\n} else {\n    $success = false;\n}\n\
  return $success;\n```\n\n如果出现问题，则执行 `if` 语句的 `else` 部分。我们将 `$success` 设置为 `false`，表示出现问题，并将\
  \ `$success` 的值（`true` 或 `false`）返回给调用程序。\n\n### 使用上传器类\n\n现在我们可以有效使用 `Uploader`\
  \ 类来上传文件了。代码量不大，因为大部分代码都写在 `Uploader` 类内部。\n\n```php\n<?php\nfunction upload() {\n\
  \    $uploader = new ImagesUploader( \"image-data\" );\n    $uploader->saveIn(\"\
  imgs\");\n    $fileUploaded = $uploader->save();\n    if ( $fileUploaded ) {\n \
  \       $out = \"新文件已上传到图片库\";\n    } else {\n        $out = \"出现错误\";\n    }\n\
  \    return $out;\n}\n$info = upload();\n?>\n```\n\n**清单 4-16** `imagesUpload.php`\n\
  \n> **注意：** 以下文件已进行了微小调整以访问当前版本：`ImagesUploader.class.php`、`imageslistnavigation.php`、`imageslistindex.php`、`imagesUploadForm.php`。请花些时间查看发布商提供的这些文件的更改。\n\
  \n\n# 上传函数会引入上传类，然后创建一个上传器实例（`$uploader` 对象），并传入保存图片信息的属性名。该属性名已在 HTML 上传表单中设置。永久文件存储位置（`imgs`）也会传入\
  \ `saveIn` 方法并存储在对象中。接着调用 `$uploader` 的 `save` 函数，该函数会验证图片并检查文件夹（`imgs`）是否可写。如果文件成功移动，`$out`\
  \ 会被设置为“新文件已上传到图片库”。如果文件因验证失败或文件夹不可写而未能移动，则会将“文件上传到图片库时出现错误”的消息传递给 `$out`。`$out`\
  \ 被返回并赋值给 `$info`，从而在页面上显示。\n\n使用 `imageslistindex.php` 测试程序。该程序应允许上传任何不超过大小限制的\
  \ JPEG 文件。\n\n**练习**：可以在这些最终程序中添加哪些内容以使其更安全？逐个检查每个程序，并利用已掌握的知识提供更安全的程序。如何限制上传到最终目录的所有文件的总大小？添加代码以实现此限制。这也有助于降低成功发动\
  \ DOS 攻击的可能性。此外，请访问 [`www.php.net`](http://www.php.net) 了解如何创建常量。常量一旦初始创建后便无法更改。修改程序，将任何在赋予初始值后不再变化的变量改为常量。常量确实为创建安全程序提供了另一种工具。\n\
  \n这很酷吧？我们拥有一个完全动态的图片库，用户可以通过网站上传自己的图片。虽然这还算不上是 `flickr.com`，但我们希望您会认同，您已经开始真正使用\
  \ PHP 来创造有趣且实用的东西了。\n\n## 单一职责原则\n\n我们希望您能赞叹 `Uploader` 类定义的优雅之处。它的规划和编写聚焦于单一目标：上传文件。它所拥有的属性和方法仅用于完成这一任务。属性全部与要上传的文件相关，方法则全部与上传有效文件相关。\n\
  \n*单一职责原则*是面向对象编程中的常用原则。该原则规定，一个类应为单一目的而编写。类的所有属性和方法都应直接与该单一目的相关。该类应仅有一个需要变更的理由。\n\
  \n例如：`Uploader` 类只有一个变更的理由。如果你希望用它来上传不同的文件，它就会改变。单一职责原则是代码中一个值得追求的完美理念。这其实是“柯里定律”的再次体现，只是这次应用在了面向对象编程中。\n\
  \n> **注意**\n>\n> 你可以在 [`http://en.wikipedia.org/wiki/Single_responsibility_principle`](http://en.wikipedia.org/wiki/Single_responsibility_principle)\
  \ 阅读更多关于单一职责原则的内容。\n\n## 总结\n\n在本章中，我们了解了如何利用对象和对象方法创建一个动态图片库。我们还用属性和方法声明了一个自定义类定义。我们学习了几种类型的循环，并发现\
  \ `foreach` 循环专门用于访问数组中的信息，尤其是我们可能不知道实际大小的数组。\n\n目前，我们已经编写了两个类定义：`Uploader` 和 `Page_Data`。我们才刚刚开始学习类和对象。在本书的后续章节中，我们将接触到更多类和对象。在未来的页面中，有大量的示例和解释等着你，所以请坚持下去。学习需要时间，而我们才刚刚开始。\n\
