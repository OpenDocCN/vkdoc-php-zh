- fmt: "确认可以从命令行检查覆盖率后，我需要将此功能添加到构建文档中。\n\n我已创建一个名为`citest`的新任务。该任务的大部分内容是对您已经见过的`test`任务的复现。\n\
    \n我首先创建一个`reports`目录，并在其中创建一个`coverage`子目录。\n\n我使用`coverage-setup`任务为`coverage`功能提供配置信息。我通过`database`属性指定原始覆盖率数据的存储位置。嵌套的`fileset`元素定义了需要进行覆盖率分析的文件。\n\
    \n我在`phpunit`任务中添加了两个`formatter`元素。类型为`xml`的`formatter`将生成一个名为`testreport.xml`的文件，其中包含测试结果。`clover`格式化器将生成覆盖率信息，格式也为XML。最后，在`citest`目标中，我部署了`coverage-report`任务。该任务会获取已有的覆盖率信息，生成一个新的XML文件，然后输出一个HTML报告。\n\
    \n**注意**\n\n`CoverageReportTask`元素的文档位于[`https://www.phing.info/docs/guide/stable/CoverageReportTask.html`](https://www.phing.info/docs/guide/stable/CoverageReportTask.html)。\n\
    \n**编码标准**\n\n我在第16章详细讨论了编码标准。虽然个人风格被共享标准限制可能令人不快，但这可以使项目更易于整个团队协作。因此，许多团队会强制执行一套标准。然而，仅靠人工检查很难执行，所以自动化此过程是有意义的。\n\
    \n我将再次使用`Composer`。这次我将配置它来安装`PHP_CodeSniffer`：\n\n```\n\"require-dev\": {\n\"\
    phing/phing\": \"2.*\",\n\"phpunit/phpunit\": \"5.4.*\",\n\"phpdocumentor/phpdocumentor\"\
    : \"2.*\",\n\"squizlabs/php_codesniffer\": \"2.*\"\n}\n```\n\n现在，我将把`PSR2`编码标准应用于我的代码：\n\
    \n```\n$ vendor/bin/phpcs—standard=PSR2 src/util/Validator.php\nFILE: /var/poppch21/src/util/Validator.php\n\
    \nFOUND 6 ERRORS AFFECTING 4 LINES\n\n 8 | ERROR | [x] Opening brace of a class\
    \ must be on the line after\n   |       |     the definition\n11 | ERROR | [ ]\
    \ Visibility must be declared on method \"__construct\"\n11 | ERROR | [x] Opening\
    \ brace should be on a new line\n15 | ERROR | [ ] Visibility must be declared\
    \ on method\n   |       |     \"validateUser\"\n15 | ERROR | [x] Opening brace\
    \ should be on a new line\n26 | ERROR | [x] Function closing brace must go on\
    \ the next line\n   |       |     following the body; found 1 blank lines before\n\
    \   |       |     brace\n\nPHPCBF CAN FIX THE 4 MARKED SNIFF VIOLATIONS AUTOMATICALLY\n\
    \nTime: 358ms; Memory: 4Mb\n```\n\n显然，我需要稍微清理一下我的代码！\n\n自动化工具的好处之一是其非个人性。如果你的团队决定强制执行一套编码约定，可以说，由一个没有幽默感的脚本纠正你的风格，总比一个同样没有幽默感的同事来做同样的事情要好。\n\
    \n正如您现在可能预料到的，我想向我的构建文件中添加一个`CodeSniffer`目标：\n\n`phpcodesniffer`任务将为我完成这项工作。我使用`standard`属性来指定`PSR2`规则。我使用嵌套的`fileset`元素定义要检查的文件。我定义了一个`formatter`元素，其`type`属性为`checkstyle`。这将在`reports`目录中生成一个XML文件。\n\
    \n因此，我拥有许多可以用来监控项目的实用工具。当然，如果我独自一人，即使有了方便的`Phing`构建文件，我很快也会对运行它们失去兴趣。事实上，我可能会回归到旧有的集成阶段思路，只在接近发布时才拿出这些工具，到那时它们作为预警系统的有效性已经无关紧要了。我需要的是一个持续集成（CI）服务器来为我运行这些工具。\n\
    \n`Jenkins`（原名`Hudson`）是一个开源持续集成服务器。虽然它是用`Java`编写的，但`Jenkins`很容易与`PHP`工具一起使用。这是因为持续集成服务器独立于它所构建的项目，负责启动并监控各种命令的结果。`Jenkins`还能很好地与`PHP`集成，因为它设计为支持插件，并且有一个非常活跃的开发者社区致力于扩展服务器的核心功能。\n\
    \n**注意**\n\n为什么选择`Jenkins`？`Jenkins`非常易于使用和扩展。它已经很成熟，并且拥有活跃的用户社区。它是免费且开源的。支持与`PHP`集成的插件（包括您能想到的大多数构建和测试工具）都是可用的。然而，市面上有很多CI服务器解决方案。本书的先前版本侧重于`CruiseControl`（[`http://cruisecontrol.sourceforge.net/`](http://cruisecontrol.sourceforge.net/)），它仍然是一个不错的选择。\n\
    \n**安装 Jenkins**\n\n`Jenkins`是一个`Java`系统，因此您需要安装`Java`。具体安装方法因系统而异。在`Fedora`发行版上，您可能会这样做：\n\
    \n```\n$ yum install java-1.7.0\n```\n\n或者，您可以直接从[`www.java.com`](http://www.java.com)获取`Java`。\n\
    \n您可以通过在命令行中运行它来确认是否已安装`Java`：\n\n```\n$ java -version\njava version \"1.7.0_101\"\
    \nOpenJDK Runtime Environment (rhel-2.6.6.4.el6_8-x86_64 u101-b00)\nOpenJDK 64-Bit\
    \ Server VM (build 24.95-b01, mixed mode)\n```\n\n您可以从项目主页[`http://jenkins-ci.org/`](http://jenkins-ci.org/)获取`Jenkins`。它可以通过`Java\
    \ Web Archive`（`WAR`）文件安装，或者主页上也提供了适用于大多数发行版的本地软件包链接。我将使用`Fedora`的安装选项：\n\n```\n\
    $ wget -O /etc/yum.repos.d/jenkins.repo http://pkg.jenkins-ci.org/redhat/jenkins.repo\n\
    $ rpm --import http://pkg.jenkins-ci.org/redhat/jenkins-ci.org.key\n$ yum install\
    \ jenkins\n```\n\n`Jenkins`网站为大多数发行版提供了安装说明。\n\n安装`Jenkins`后，您可以直接通过`Java`像这样运行它：\n\
    \n```\n$ sudo java -jar /usr/lib/jenkins/jenkins.war\n```\n\n但是，如果这样做，您以后可能会遇到问题。最好使用启动脚本，它将以`jenkins`用户身份运行`Jenkins`。以`Fedora`为例，您可以像这样启动`Jenkins`：\n\
    \n```\n$ service jenkins start\n```\n\n您还可以在[`https://wiki.jenkins-ci.org/display/JENKINS/JenkinsLinuxStartupScript`](https://wiki.jenkins-ci.org/display/JENKINS/JenkinsLinuxStartupScript)找到一个通用的启动脚本。\n\
    \n默认情况下，`Jenkins`运行在`8080`端口，因此您可以通过启动浏览器并访问`http://yourhost:8080/`来检查是否准备就绪。您应该会看到图21-2所示的屏幕。\n\
    \n图21-2中的说明非常清晰。我从`/var/lib/jenkins/secrets/initialAdminPassword`获取密码，并将其输入到提供的框中。然后我面临一个选择：安装流行的插件还是自己选择？我选择了最流行的插件，我知道这将使我获得对`Git`等功能支持。如果您想要一个精简的系统，您可能只选择您需要的插件。之后，在完成安装前，需要创建一个用户名和密码。\n\
    \n**安装 Jenkins 插件**\n\n`Jenkins`高度可定制，为了与我本章描述的功能集成，我需要相当多的插件。在`Jenkins`的Web界面中，我点击`Manage\
    \ Jenkins`，然后点击`Manage Plugins`。在`Available`选项卡下，我找到了一个很长的列表。我勾选了所有希望添加到`Jenkins`的插件对应的`Install`列中的复选框。\n\
    \n表21-1描述了我将要使用的插件。\n\n**表 21-1. 一些 Jenkins 插件**\n\n| 插件 | 描述 |\n| :--- | :---\
    \ |\n| | |"
  raw: "Having confirmed that I can check coverage from the command line, I need\n\
    to add this functionality to my build document:\n\nI have created a new task named\
    \ `citest`. Much of it is\na reproduction of the `test` task you have\nalready\
    \ seen.\n\nI start by creating a `reports` directory and\na `coverage`\nsubdirectory.\n\
    \nI use the `coverage-setup` task\nto provide configuration information for the\
    \ `coverage` feature. I\nspecify where raw coverage data should be stored using\
    \ the `database` attribute.\nThe nested `fileset` element\ndefines the files that\
    \ should be subject to coverage analysis.\n\nI have added two `formatter` elements\
    \ to\nthe `phpunit`\ntask. The `formatter` of type\n`xml` will\ngenerate a file\
    \ named `testreport.xml` `,` which will contain\nthe test results. The `clover\
    \ formatter` will\ngenerate coverage information, also in XML format. Finally,\
    \ in the `citest` target, I\ndeploy the `coverage-report` task.\nThis takes existing\
    \ coverage information, generates a new XML file, and\nthen outputs an HTML report.\n\
    \nNote\n\nThe `CoverageReportTask`\nelement is documented at [ `https://www.phing.info/docs/guide/stable/CoverageReportTask.html`\n\
    ](https://www.phing.info/docs/guide/stable/CoverageReportTask.html) `.`\n\nCoding\
    \ Standards\n\nI discussed coding standards at length in Chapter [16](#A314621_5_En_16_Chapter.html).\
    \ Although it can be annoying to\nhave your individual style cramped by a shared\
    \ standard, it can make a\nproject easier to work with for the wider team. For\
    \ that reason, many\nteams enforce a standard. It’s hard to enforce this by eye,\
    \ however, so\nit makes sense to automate the process.\n\nOnce again, I will use\
    \ Composer. This time I’ll be configuring it to\ninstall PHP_CodeSniffer :\n\n\
    ```\n\"require-dev\": {\n\"phing/phing\": \"2.*\",\n\"phpunit/phpunit\": \"5.4.*\"\
    ,\n\"phpdocumentor/phpdocumentor\": \"2.*\",\n\"squizlabs/php_codesniffer\": \"\
    2.*\"\n}\n```\n\nNow I will apply the PSR2 coding standard to my code:\n\n```\n\
    $ vendor/bin/phpcs—standard=PSR2 src/util/Validator.php\nFILE: /var/poppch21/src/util/Validator.php\n\
    \nFOUND 6 ERRORS AFFECTING 4 LINES\n\n8 | ERROR | [x] Opening brace of a class\
    \ must be on the line after\n|       |     the definition\n11 | ERROR | [ ] Visibility\
    \ must be declared on method \"__construct\"\n11 | ERROR | [x] Opening brace should\
    \ be on a new line\n15 | ERROR | [ ] Visibility must be declared on method\n|\
    \       |     \"validateUser\"\n15 | ERROR | [x] Opening brace should be on a\
    \ new line\n26 | ERROR | [x] Function closing brace must go on the next line\n\
    |       |     following the body; found 1 blank lines before\n|       |     brace\n\
    \nPHPCBF CAN FIX THE 4 MARKED SNIFF VIOLATIONS AUTOMATICALLY\n\nTime: 358ms; Memory:\
    \ 4Mb\n```\n\nClearly, I need to clean up my code a little!\n\nOne benefit of\
    \ an automated tool is its impersonal nature. If your team\ndoes decide to impose\
    \ a set of coding conventions, it’s arguably better\nhaving a humorless script\
    \ correcting your style than a humorless\ncoworker doing the same thing.\n\nAs\
    \ you might expect by now, I would like to add a `CodeSniffer` target to\nmy build\
    \ file:\n\nThe `phpcodesniffer` task\nwill do this job for me. I use the `standard`\
    \ attribute to\nspecify `PSR2`\nrules. I define the files to check using the nested\
    \ `fileset` element. I\ndefine a `formatter` element\nwith a `checkstyle type`\
    \ attribute. This will generate an XML file in the `reports` directory.\n\nSo\
    \ I have a lot of useful tools that I can use to monitor my project. Of\ncourse,\
    \ left to myself I’d soon lose interest in running them, even with\nmy useful\
    \ Phing build file. In fact, I’d probably revert to the old idea\nof an integration\
    \ phase, and pull out the tools only when I’m close to a\nrelease, by which time\
    \ their effectiveness as early-warning systems will\nbe irrelevant. What I need\
    \ is a CI server to run the tools for me.\n\nJenkins (formerly named Hudson) is\
    \ an open source-continuous integration\nserver. Although it is written in Java,\
    \ Jenkins is easy to use with PHP\ntools. That’s because the continuous-integration\
    \ server stands outside\nof the projects it builds, kicking off and monitoring\
    \ the results of\nvarious commands. Jenkins also integrates well with PHP because\
    \ it is\ndesigned to support plug-ins, and there is a highly active developer\n\
    community working to extend the server’s core functionality.\n\nNote\n\nWhy Jenkins?\
    \ Jenkins is very easy to use and extend. It is well\nestablished, and it has\
    \ an active user community. It’s free and open\nsource. Plug-ins that support\
    \ integration with PHP (and that includes\nmost build and test tools you might\
    \ think of) are available. There are\nmany CI server solutions out there, however.\
    \ A previous version of this\nbook focused on CruiseControl ( [`http://cruisecontrol.sourceforge.net/`](http://cruisecontrol.sourceforge.net/)\
    \ ), and this remains a good option.\n\nInstalling Jenkins\n\nJenkins is a Java\
    \ system, so you will need to have Java installed. How\nyou go about this will\
    \ vary from system to system. On a Fedora\ndistribution you might do something\
    \ like this:\n\n```\n$ yum install java-1.7.0\n```\n\nOtherwise, you can get Java\
    \ directly from [`www.java.com`](http://www.java.com) .\n\nYou can confirm that\
    \ you have Java by running it from the command line:\n\n```\n$ java -version\n\
    java version \"1.7.0_101\"\nOpenJDK Runtime Environment (rhel-2.6.6.4.el6_8-x86_64\
    \ u101-b00)\nOpenJDK 64-Bit Server VM (build 24.95-b01, mixed mode)\n```\n\nYou\
    \ can get Jenkins from the project homepage at [`http://jenkins-ci.org/`](http://jenkins-ci.org/)\
    \ . It can be installed via a Java Web Archive (`WAR`) file, or there\nare native\
    \ packages for most distributions, all linked from the\nhomepage. I will use the\
    \ Fedora option:\n\n```\n$ wget -O /etc/yum.repos.d/jenkins.repo http://pkg.jenkins-ci.org/redhat/jenkins.repo\n\
    $ rpm --import http://pkg.jenkins-ci.org/redhat/jenkins-ci.org.key\n$ yum install\
    \ jenkins\n```\n\nThe Jenkins site provides installation instructions for most\n\
    distributions.\n\nOnce Jenkins is installed you could run it directly via Java\
    \ like this:\n\n```\n$ sudo java -jar /usr/lib/jenkins/jenkins.war\n```\n\nHowever,\
    \ you may run in to trouble later on if you do this. It’s almost\ncertainly better\
    \ to use a startup script, which will run Jenkins as the\n`jenkins` user.\nIn\
    \ the case of Fedora, you can start Jenkins like this:\n\n```\n$ service jenkins\
    \ start\n```\n\nYou can also find a generic startup script at [`https://wiki.jenkins-ci.org/display/JENKINS/JenkinsLinuxStartupScript`](https://wiki.jenkins-ci.org/display/JENKINS/JenkinsLinuxStartupScript)\
    \ .\n\nBy default, Jenkins runs on port 8080, so you can find out whether\nyou’re\
    \ ready to proceed by firing up your browser and visiting `http://yourhost:8080/`.\n\
    You should see something like the screen in Figure [21-2](#A314621_5_En_21_Chapter.html#Fig2).\n\
    \nThe instructions in Figure [21-2](#A314621_5_En_21_Chapter.html#Fig2) are pretty\n\
    self-explanatory. I grab the password from `/var/lib/jenkins/secrets/initialAdminPassword`\n\
    and enter it into the box provided. Then I’m presented with a choice:\ninstall\
    \ with popular plug-ins or pick my own? I opt for the most popular\nplug-ins,\
    \ which I know will get me support for Git among other things.\nIf you want a\
    \ slim system, you might choose to select only those\nplug-ins you need. After\
    \ that it’s time to create a user name and\npassword before finishing up installation.\n\
    \nInstalling Jenkins Plug-ins\n\nJenkins is highly customizable, and I will need\
    \ quite a few plug-ins to\nintegrate with the features I have described so far\
    \ in this chapter.\nFrom within the Jenkins web interface, I click on `Manage\
    \ Jenkins` and\nthen `Manage Plugins`. Beneath the `Available` tab, I find\na\
    \ long list. I select the checkboxes in the `Install` column for\nall plug-ins\
    \ that I wish to add to Jenkins.\n\nTable [21-1](#A314621_5_En_21_Chapter.html#Tab1)\
    \ describes the\nplug-ins that I will be using.\n\nTable 21-1.\n\nSome Jenkins\
    \ Plug-ins\n\nPlug-in\n |\n  Description\n |"
