  trans: "\n# 提示\n\n类内部函数（方法）定义的顺序无关紧要，只要它们位于包裹该类的花括号内即可。不过，我个人倾向于将所有 `public` 方法放在顶部，而\
    \ `protected` 方法放在底部。\n\n1.  如果文件通过了一系列测试，`upload()` 方法中的条件语句会将文件传递给另一个名为 `moveFile()`\
    \ 的内部方法，该方法本质上是 PHP 方案 9-1 中使用的 `move_uploaded_file()` 函数的包装器。代码如下：\n\n```\nprotected\
    \ function moveFile($file) {\n    $success = move_uploaded_file($file['tmp_name'],\n\
    \    $this->destination . $file['name']);\n    if ($success) {\n        $result\
    \ = $file['name'] . ' was uploaded successfully';\n        $this->messages[] =\
    \ $result;\n    } else {\n        $this->messages[] = 'Could not upload ' . $file['name'];\n\
    \    }\n}\n```\n\n如果上传成功，`move_uploaded_file()` 返回 `true`。否则，返回 `false`。通过将返回值存储在\
    \ `$success` 中，相应的消息会被存入 `$messages` 数组。如果 `$success` 为 `true`，消息首先赋值给 `$result`；而失败时，则直接赋值给\
    \ `$messages` 数组。这是因为，如果文件需要重命名，后续会向成功消息中添加更多信息。\n\n2.  由于 `$messages` 是一个受保护的属性，你需要创建一个公共方法来获取数组的内容。\n\
    \n```\npublic function getMessages() {\n    return $this->messages;\n}\n```\n\n\
    这简单返回了 `$messages` 数组的内容。既然它只是做这个，为什么不一开始就将该数组设为公共呢？公共属性可以在类定义之外被访问和修改。保护 `$messages`\
    \ 确保了数组内容不会被更改，因此你知道消息是由该类生成的。对于这样的消息，这似乎不算什么大事，但当你开始处理更复杂的脚本或在团队中工作时，这一点就变得非常重要。\n\
    \n3.  保存 `Upload.php` 并切换到 `file_upload.php`。\n\n4.  在 `file_upload.php` 的顶部，在\
