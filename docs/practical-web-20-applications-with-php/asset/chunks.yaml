    **Filtering Submitted HTML**


    In this application, we allow anybody that signs up (using the registration form
    created earlier) to submit their own content. Because of this, we need to protect
    against malicious users whose goal is to attack the web site or its users. This
    is crucial to ensuring the security of web applications such as this one, where
    any user can submit data. In situations where only trusted users will be submitting
    data, filtering data is not as critical, but when anybody can sign up, it is extremely
    important.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch07CMP2 11/13/07 8:06 PM Page 244


    **244**


    C H A P T E R 7 ■ B U I L D I N G T H E B L O G G I N G S YS T E M


    The primary thing we want to protect against is a malicious user submitting JavaScript
    in one of their posts, which is then executed by another user who views their
    blog. There are several common ways a malicious user might try to inject JavaScript
    code into their postings:


    • **Inserting** <script> **tags into the submitted data.** A script tag can either
    load an external JavaScript file (by specifying the src attribute), or it can
    contain any number of commands inline that perform malicious actions.


    • **Adding DOM event handlers to other nonmalicious tags.** Manipulating other
    tags, such as hyperlinks or images, to include JavaScript can be just as effective
    as using


    <script> tags directly. An example would be adding a mouseover event to an image,
    such as <img src="/some-image.jpg" onmouseover="doSomethingEvil()" />.


    ■**Note** This hasn’t been a problem in earlier user-submitted data we have processed
    because we have passed it to the sanitize() method of FormProcessor, which strips
    all tags from the data. Additionally, when we have outputted this data, we have
    used the Smarty escape modifier, which means that even if an HTML tag such as
    <script> were to get through our processing, it would be output to screen as


    &lt;script&gt;, meaning that any code included would not be treated as JavaScript
    by the browser.


    Why Filter Embedded JavaScript?


    You may wonder what it matters if a user manages to inject JavaScript code into
    one of their posts. After all, how bad could it possibly be if somebody makes
    a pop-up window appear on somebody else’s screen?


    ■**Note** Making a pop-up window appear is one of the simplest and least harmful
    attacks that can be achieved.


    The biggest problem occurs when another authenticated user views the malicious
    post.


    Some examples of the damage that could occur are as follows:


    • The JavaScript could dynamically send the user’s cookies to some third-party
    web site.


    This could potentially allow the malicious user to hijack the victim’s session,
    since session IDs are usually stored in cookies. The malicious user could then
    masquerade as an authenticated user on the web site. This is known as a cross-site
    scripting (XSS) attack.


    • The JavaScript could submit a form or visit some other URL on the current web
    site that deletes a post in the victim’s blog, or that updates their password.
    This is called a cross-site request forgery (CSRF) attack.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


