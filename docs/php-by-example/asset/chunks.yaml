    最后，`action`属性定义了处理表单数据的脚本。程序执行后生成的 HTML 代码被发送回浏览器。在此示例中，`action`属性的值为文本`"listing12_03.php"`。这意味着表单数据被传递给`listing12_03.php`文件中编写的程序进行处理。


