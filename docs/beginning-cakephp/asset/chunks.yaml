    \n**Listing 5-2.** *Sample CSS Code for the Default Layout*\n\n```\n* { font-family:\
    \ \"Lucida Grande\",Lucida,sans-serif; }\n\nth {\n  font-size: 14px;\n  font-weight:\
    \ bold;\n  background-color: #e1e1e1;\n  border-bottom: 1px solid #ccc;\n  padding:\
    \ 10px;\n}\n\ndiv.actions ul {\n  list-style-type: none;\n}\n```\n\nRefresh the\
    \ Posts controller, and you should get some new styles in the display (see Figure\
    \ 5-2).\n\n**Figure 5-2.** *The new styles are reflected in all views.*\n\nYou\
    \ can see that by placing your own styles into the default layout, you can fully\
    \ edit the design surrounding your application’s output. Any views that are rendered,\
    \ if they follow the default layout, will also be rendered using the same style\
    \ sheet, so there’s no need to duplicate styles or designs.\n\nReturn to the `app/views/layouts/default.ctp`\
    \ file, and change line 4 to the following:\n\n```\n<?=$html->css('cake.generic');?>\n\
    ```\n\nWhen you refresh the Posts controller screen, you’ll notice that Cake’s\
    \ styles have been implemented without the scaffolding’s default titles and such.\
    \ With these style changes, the scaffolding is still generating the individual\
    \ CRUD operation views but now without Cake’s built-in layouts.\n\n## Creating\
    \ Individual Views\n\nWhat do you do if you want to manipulate the views directly?\
    \ For example, say you wanted to get rid of the title at the top that reads “Posts”\
    \ and replace it with “Blog Posts.” This is where individual views come in.\n\n\
    Yes, the scaffolding is a nice feature that makes testing code quick and painless,\
    \ especially if all you want to do is play around with the database to make sure\
    \ it’s working right. But it can’t possibly read your mind, and it can create\
    \ only some generic views. Adding or subtracting from the application output will\
    \ require you to manually build such output. No worries—this, too, is made much\
    \ easier through the use of the framework.\n\n## Adding Actions to the Controller\n\
    \nTo break out of the scaffold, you can delete the `$scaffold` attribute in the\
    \ controller, or you can intercept the scaffold by adding your own actions instead.\
    \ Scaffolded actions are specifically named `index()`, `add()`, `edit()`, `view()`,\
    \ and `delete()`. Inserting an action into the controller bearing any of these\
    \ names will replace the scaffold for that one action. So, leave the `$scaffold`\
    \ attribute for all CRUD operations you don’t want to code, and generate actions\
    \ for those you do.\n\nThe first, and simplest, action to add is the Index action.\
    \ All this operation will need to do is fetch all the posts in the database and\
    \ make them available in the view. The view will then display all the posts as\
    \ a list. Insert Listing 5-3 into the Posts controller after the `$scaffold` attribute.\n\
    \n**Listing 5-3.** *The Index Action in the Posts Controller*\n\n```\nfunction\
    \ index() {\n  $this->set('posts',$this->Post->find('all'));\n}\n```\n\nEntering\
    \ the action into the controller is only half the process. Should you launch the\
    \ Posts controller, it would display an error message because the controller would\
    \ send for the view file and there is no Index action view available yet. The\
    \ next step is to create the corresponding action view by following Cake’s conventions.\
    \ The file will need to be placed in the `app/views/posts` directory and be named\
    \ after the action. Create the necessary posts folder, and place the `index.ctp`\
    \ file in it. Then paste the view code from Listing 5-4 into this file.\n\n**Listing\
    \ 5-4.** *The Index View in the* `app/views/posts` *Folder*\n\n```\n<h2>Blog Posts</h2>\n\
    <table cellpadding=\"0\" cellspacing=\"0\">\n<tr>\n  <th>ID</th>\n  <th>Name</th>\n\
    \  <th>Date</th>\n  <th>Content</th>\n  <th>User</th>\n  <th>Actions</th>\n</tr>\n\
    <? foreach($posts as $post): ?>\n```"
