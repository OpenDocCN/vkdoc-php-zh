  \ 所示的亚马逊集成功能。\n\n以下链接通过 REST 方式对亚马逊图书进行“超级帽子”关键词搜索，并返回按销量排序的前 10 个商品数据：`http://webservices.amazon.com/onca/xml?Service=AWSECommerceService`\n\
