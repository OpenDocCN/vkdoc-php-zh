    \ Framework`的所有路由都是命名的。\n\n如果你尝试访问这些新路由中的任何一个，将会看到错误。这是因为我们还没有创建相应的控制器、动作等。在第27章中，我们将创建大多数这些路由正常运行所需的控制器、模型和视图。\n\
