    \ recurring dates, such as the second Tuesday of each month, is now remarkably\
    \ easy thanks to the `DatePeriod` class. It works in conjunction with a `DateInterval`.\n\
    \nThe `DatePeriod` constructor is unusual in that it accepts arguments in three\
