    \n```php\necho \"$host, $database, $user\\n\";\n```\n\n使用 `extract()` 结构可以简化此操作。\n\
    \n```php\n<?php\n\n// 10_33.php\n\n$a = [\n    'host' => 'localhost',\n    'database'\
    \ => 'mydb',\n    'user' => 'user'\n];\n\nextract($a, EXTR_PREFIX_SAME, 'prefix');\n\
    \necho \"$host, $database, $user\\n\";\n```\n\n输出结果如下：\n\n```\nlocalhost, mydb,\
    \ user\n```\n\n## 技巧 10-14：遍历数组的值\n\n### 问题\n\n处理数组时，程序通常需要对数组中的每一行执行相同的操作。例如，从数据库查询中获取结果集，并将其转换为用于展示的\
    \ HTML 结构。\n\n### 解决方案\n\n有多种方法可以访问数组中的元素。如果元素以整数作为索引，并且已知起始值，则可以使用 `for( ;; )`\
    \ 或 `while()` 循环。如果索引中存在空隙，或者使用字符串值作为键，则可以使用 `each()` 或 `foreach()` 语言结构来遍历数组。\n\
    \n### 实现原理\n\n`each()` 结构将数组作为参数，并返回当前内部索引指针所指向的元素。同时，它还会将内部索引指针递增到下一个元素。这在遍历数组元素时非常有用。\n\
    \n```php\n<?php\n\n// 10_34.php\n\n$a = [10, 15, 20, 25];\n\nwhile ($b = each($a))\
    \ {\n    echo $b . \"\\n\";\n}\n```\n\n使用 `foreach()` 结构可以写得更简洁一些：\n\n```php\n\
    <?php\n\n// 10_35.php\n\n$a = [10, 15, 20, 25];\n\nforeach($a as $b) {\n    echo\
    \ $b . \"\\n\";\n}\n```\n\n如果在多个 `foreach()` 语句中使用了同一个数组，则无需调用 `reset()` 函数。而使用\
    \ `each()` 时，则必须在多次遍历之间调用 `reset()`。\n\n还有另外一些语言结构值得注意。它们与变量无关，但对程序流程非常重要。\n\n\
    `include()` 结构会包含指定文件的内容（如果该文件存在）；否则会打印一条警告消息。`require()` 语句的工作方式与 `include()`\
    \ 类似，但如果文件缺失，它会抛出一个致命错误并停止执行。当代码库不断增长，并且需要在多个脚本中使用相同的代码时，这两个结构都很有用。这些结构还有一种变体，称为\
    \ `include_once()` 和 `require_once()`，如果同一个文件被包含多次，它们不会抛出错误；由于文件已经加载，它会被简单地跳过。通常，建议编写只包含一次文件，并且只包含实际使用到的文件的代码。这将提供最佳性能。\n\
    \n## 技巧 10-15：生成输出\n\n### 问题\n\n生成输出是 PHP 的一个关键功能，因为它最常用于根据数据库查询和其他资源动态生成 HTML（或其他与网页相关的文档）。\n\
    \n### 解决方案\n\nPHP 实现了一些语言结构：`echo()`、`print()` 和 `die()`。前两个仅用于输出，最后一个函数会打印传入参数的内容，然后停止脚本执行。\n\
    \n尽管这些语言结构看起来都像函数，但它们可以带括号使用，也可以不带括号使用。\n\n### 实现原理\n\n编写 `echo \"a\";` 和 `echo(\"\
    a\");` 会产生相同的结果。此外，`echo` 可以处理任意数量的参数，这些参数用逗号分隔，无需先将它们拼接成一个字符串。\n\n```php\n<?php\n\
    \n// 2_36.php\n\n$a = 'value 1';\n$b = 'value 2';\n\n// 这将输出 $a 和 $b\necho $a,\
    \ $b, \"\\n\";\n\n// 这将拼接 $a 和 $b 并输出结果\nprint $a . $b . \"\\n\";\n```\n\n# 第\
    \ 11 章：函数\n\n函数是将多次使用的代码组织成便捷结构的一种方式。这是减少代码重复和提高可重用性的绝佳方法。PHP 中有超过 1000 个内置函数，用户自定义函数可以在主脚本或包含文件中声明，由脚本开发者负责确保在调用函数之前包含了正确的文件。\n\
    \n## 技巧 11-1：调用函数\n\n### 问题\n"
- fmt: "# Chapter 11: Functions\n\nIn Chapter 2 we discussed the use of classes to\
    \ build objects of data (member variables) and functionality (methods). Using\
    \ a class to instantiate an object and then call one of the methods might be too\
    \ complicated when there is a way to simply wrap the logic into a single function\
    \ that works more or less like any of the functions that are built into the language.\n\
    \nOne major difference between classes and functions is the ability to declare\
    \ members as `public`, `protected`, or `private`. This does not exist for functions,\
    \ with the exception of functions in functions as described later in this chapter.\n\
    \nFunctions can define variables that are only available within the function,\
    \ almost like private member variables as described in the recipe about function\
    \ scope.\n\n## Solution\n\nThe simplest form of a function is defined with the\
    \ keyword `function` followed by a function name and a set of parentheses and\
    \ a set of curly brackets for the function definition.\n\n```\nfunction DeleteRows()\
    \ {}\n```\n\nFunction names are case insensitive. A function that is declared\
    \ as `MyFunc()` can be called as `myfunc()`; or `MYFUNC()`; but it is recommended\
    \ to use the same case as used in the function definition. To make this function\
    \ do something we need to write the logic between the curly brackets. The code\
    \ in a function follows the exact same structure as any PHP script. Any function\
    \ that is callable outside of the function is also available inside the function.\
    \ This is true for both built-in functions and user-defined functions.\n\nFunctions\
    \ can be called as a statement or as the right side of a calculation, assuming\
    \ the function has a return value.\n\nThere are a few examples of language constructs\
    \ that look like functions. The most basic is the `array()` construct that is\
    \ used to define a variable of the array type. This is used as the right side\
    \ of an assignment.\n\nThe `list()` construct is used to take an array and split\
    \ its elements into individual variables. The `list()` construct is used on the\
    \ left side of an assignment.\n\n© Frank M. Kromann 2016\n\nF.M. Kromann, *PHP\
    \ and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_11\n\n## How it Works\n\n\
    In this example we have a function that can delete all rows in a specific table.\
    \ The function does not have any parameters as input and it does not return any\
    \ values.\n\n```\n<?php\n// 11_1.php\nfunction DeleteRows() {\n    $con = mysqli_connect('host',\
    \ 'user', 'secret');\n    if ($con) {\n        mysqli_select_db($con, 'mydb');\n\
    \        mysqli_query($con, \"delete from mytable;\");\n        mysqli_close($con);\n\
    \    }\n    else {\n        echo \"No database connection\";\n    }\n}\n// Call\
    \ the function\nDeleteRows();\n```\n\nIf overall the script doesn’t have to do\
    \ anything else it’s not really needed to wrap the delete operation in a function,\
    \ but if the delete function is being used in multiple scripts or there is logic\
    \ to check if the condition is right it will increase readability of the code\
    \ to have the logic for the delete operation in a separate function.\n\nIn that\
    \ case it’s important to use meaningful function names.\n\n## Recipe 11-2. Variable\
    \ Scope\n\n### Problem\n\nIn the previous example the `DeleteRows()` function\
    \ created a connection to the database before deleting the rows and the connection\
    \ was closed at the end of the function. If the script performs many operations\
    \ on the database there would be an impact on performance as the connect operation\
    \ is relatively expensive. If it’s possible to connect at the beginning of the\
    \ script and use the same connection in all database operations the connect operation\
    \ would only be performed once for the entire request.\n\nIt’s always a good idea\
    \ to minimize the number of database operations the script is performing in order\
    \ to get the best possible performance of the script.\n\n### Solution\n\nVariables\
    \ defined outside of a function are not directly accessible inside the function.\
    \ This is called scope.\n\nIn PHP there is the global scope that includes all\
    \ variables defined outside of any function. These can be accessed directly by\
    \ any code that is executed outside of any function."
