    in the `ch16` folder. The PDO version is found in `blog_update_pdo_06.php`.


    ### Preserving referential integrity on deletion


    In PHP Solution 16-5, there was no need to worry about referential integrity when
    you deleted records in the cross-reference table because the values stored in
    each record are foreign keys. Each record simply refers to the primary keys stored
    in the `blog` and `categories` tables. Referring to Figure [16-1](#A978-1-4842-0635-5_16_Chapter.html#Fig1)
