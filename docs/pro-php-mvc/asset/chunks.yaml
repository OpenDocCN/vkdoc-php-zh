  trans: "\n### 排版后内容\n\n这使我们能够将与应用程序数据相关的任务委托给模型，而数据（或业务逻辑）本应存在于该模型中。\n\n### 目标\n\
    \n-   我们需要扩展 `Model` 类，使其包含对已提交表单数据进行验证的方法，并在允许添加、更新或删除行之前应用此验证。\n-   我们需要为设置页面创建操作和视图。\n\
    \n### 验证\n\n正确处理验证可能是一件棘手的事情，尤其当 MVC 的目标是实现良好的关注点分离时。验证与多个不相关的组件相关联，主要包括数据类型和视图。验证的基本功能是保护用户输入，但输入必须来自某个地方（例如视图/表单数据）。这些数据必须与预定义的数据结构（例如数据库表字段）相关联，而验证需要以一种让用户知道自己提交的数据哪里有问题的方式，向他们提供反馈。\n\
    \n因为我们已经有了一套相当全面的 ORM 库，并且将其包含在我们的模型层中，所以我们将把验证逻辑添加到模型层。我们希望实现的是，不仅能够（在模型层面）定义数据库字段，还能定义字段数据必须通过的验证规则。请考虑清单\
    \ 16-1 所示的模型示例。\n\n**清单 16-1.** 验证模型\n\n```\nclass User extends Shared\\Model\n\
    {\n    /**\n     * @column\n     * @readwrite\n     * @primary\n     * @type autonumber\n\
    \     */\n    protected $_id;\n\n    /**\n     * @column\n     * @readwrite\n\
    \     * @type text\n     * @length 100\n     *\n     * @validate required, alpha,\
    \ min(3), max(32)\n     * @label first name\n     */\n    protected $_first;\n\
    \n    /**\n     * @column\n     * @readwrite\n     * @type text\n     * @length\
    \ 100\n     *\n     * @validate required, alpha, min(3), max(32)\n     * @label\
    \ last name\n     */\n    protected $_last;\n\n    /**\n     * @column\n     *\
    \ @readwrite\n     * @type text\n     * @length 100\n     * @index\n     *\n \
    \    * @validate required, max(100)\n     * @label email address\n     */\n  \
    \  protected $_email;\n\n    /**\n     * @column\n     * @readwrite\n     * @type\
    \ text\n     * @length 100\n     * @index\n     *\n     * @validate required,\
    \ min(8), max(32)\n     * @label password\n     */\n    protected $_password;\n\
    }\n```\n\n我们添加了两个新的元数据字段：`@validate` 和 `@label`。理想情况下，这些字段可用于：（1）定义应对包含的数据执行的验证规则；（2）自定义可呈现给用户的验证错误消息。为了实现这两个需求，我们需要修改\
    \ `Model` 类。\n\n> **注意** 验证是 Web 应用程序的常见需求，因此我们可以安全地将其添加到框架代码库中。如果需求是应用程序特定的，我们会考虑创建一个共享的应用程序库。\n\
    \n我们需要对 `Model` 类进行的第一个更改是添加一个验证方法和消息的映射表，如清单 16-2 所示。\n\n**清单 16-2.** 验证映射表\n\
    \n```\n/**\n * @read\n */\nprotected $_validators = array(\n    \"required\" =>\
    \ array(\n        \"handler\" => \"_validateRequired\",\n        \"message\" =>\
    \ \"The {0} field is required\"\n    ),\n    \"alpha\" => array(\n        \"handler\"\
    \ => \"_validateAlpha\",\n        \"message\" => \"The {0} field can only contain\
    \ letters\"\n    ),\n    \"numeric\" => array(\n        \"handler\" => \"_validateNumeric\"\
    ,\n        \"message\" => \"The {0} field can only contain numbers\"\n    ),\n\
    \    \"alphanumeric\" => array(\n        \"handler\" => \"_validateAlphaNumeric\"\
    ,\n        \"message\" => \"The {0} field can only contain letters and numbers\"\
    \n    ),\n    \"max\" => array(\n        \"handler\" => \"_validateMax\",\n  \
    \      \"message\" => \"The {0} field must contain less than {2} characters\"\n\
    \    ),\n    \"min\" => array(\n        \"handler\" => \"_validateMin\",\n   \
    \     \"message\" => \"The {0} field must contain more than {2} characters\"\n\
    \    )\n);\n\n/**\n * @read\n */\nprotected $_errors = array();\n```\n\n`Model`\
    \ 类将使用 `$_validators` 数组来确定要执行的适当验证方法（基于元数据）。为了说明这一点，一个类似于 `@validate required`\
    \ 的元数据标志将导致执行 `_validateRequired()` 方法（在 `Model` 类上），并显示错误消息“The {0} field is\
    \ required”。稍后我们会将 `{0}` 替换为合适的值。\n"
- fmt: "# Next, we need to create the validation methods defined in the `$_validators`\
    \ array, as demonstrated in Listing 16-3.\n\n## CHAPTER 16 ■ SETTingS\n\n**Listing\
    \ 16-3.** Validation Methods\n\n```\nprotected function _validateRequired($value)\n\
    {\n    return !empty($value);\n}\n \nprotected function _validateAlpha($value)\n\
    {\n    return StringMethods::match($value, \"#^([a-zA-Z]+)$#\");\n}\n \nprotected\
    \ function _validateNumeric($value)\n{\n    return StringMethods::match($value,\
    \ \"#^([0–9]+)$#\");\n}\n \nprotected function _validateAlphaNumeric($value)\n\
    {\n    return StringMethods::match($value, \"#^([a-zA-Z0-9]+)$#\");\n}\n \nprotected\
    \ function _validateMax($value, $number)\n{\n    return strlen($value) < = (int)\
    \ $number;\n}\n \nprotected function _validateMin($value, $number)\n{\n    return\
    \ strlen($value) > = (int) $number;\n}\n```\n\nThese validation methods are all\
    \ reasonably simple, each performing the required validation and returning `true`\
    \ for success or `false` for failure. We will want to remember this important\
    \ behavior when we add custom field validation, in later chapters.\n\nThe basic\
    \ functionality of the `validate()` method can be understood with the pseudocode\
    \ shown in Listing 16-4.\n\n**Listing 16-4.** How the `validate()` Method Functions\n\
    \n```\nfunction validate\n{\n    set error flag to false\n    for each column\n\
    \    {\n        if column must validate\n        {\n            for each condition\n\
    \            {\n                run condition validate method\n              \
    \  if validation failed\n                {\n                    make error message\
    \ and save to array\n                    set error flag to true\n            \
    \    }\n            }\n        }\n    }\n    return error flag\n}\n```\n\nThe\
    \ actual `validate()` method, shown in Listing 16-5, is essentially the same,\
    \ but with a few more details.\n\n**Listing 16-5.** The `validate()` Method\n\n\
    ```\npublic function validate()\n{\n    $this->_errors = array();\n    $columns\
    \ = $this->getColumns();\n \n    foreach ($columns as $column)\n    {\n      \
    \  if ($column[\"validate\"])\n        {\n            $error = false;\n      \
    \      $pattern = \"#[a-z] + \\(([a-zA-Z0-9, ]+)\\)#\";\n            $raw = $column[\"\
    raw\"];\n            $name = $column[\"name\"];\n            $validators = $column[\"\
    validate\"];\n            $label = $column[\"label\"];\n            $defined =\
    \ $this->getValidators();\n \n            foreach ($validators as $validator)\n\
    \            {\n                $function = $validator;\n                $arguments\
    \ = array(\n                    $this->$raw\n                );\n \n         \
    \       $match = StringMethods::match($validator, $pattern);\n \n            \
    \    if (count($match) > 0)\n                {\n                    $matches =\
    \ StringMethods::split($match[0], \",\\s*\");\n                    $arguments\
    \ = array_merge($arguments, $matches);\n                    $offset = StringMethods::indexOf($validator,\
    \ \"(\");\n                    $function = substr($validator, 0, $offset);\n \
    \               }\n \n                if (!isset($defined[$function]))\n     \
    \           {\n                    throw new Exception\\Validation(\"The {$function}\
    \ validator is not defined\");\n                }\n \n                $template\
    \ = $defined[$function];\n \n                if (!call_user_func_array(array($this,\
    \ $template[\"handler\"]), $arguments))\n                {\n                 \
    \   $replacements = array_merge(array(\n                        $label ? $label\
    \ : $raw\n                    ), $arguments);\n                    $message =\
    \ $template[\"message\"];\n \n                    foreach ($replacements as $i\
    \ => $replacement)\n                    {\n                        $message =\
    \ str_replace(\"{{$i}}\", $replacement, $message);\n                    }\n \n\
    \                    if (!isset($this->_errors[$name]))\n                    {\n\
    \                        $this->_errors[$name] = array();\n                  \
    \  }\n \n                    $this->_errors[$name][] = $message;\n           \
    \         $error = true;\n                }\n            }\n        }\n    }\n\
    \ \n    return !$error;\n}\n```\n\nThe `validate()` method begins by getting a\
    \ list of columns and iterating over that list. For each column, we determine\
    \ whether validation should occur. We then split the `@validate` metadata into\
    \ a list of validation conditions. If a condition has arguments (e.g., `max(100)`),\
    \ we extract the arguments.\n\nWe then run each validation method on the column\
    \ data and generate error messages for those validation conditions that failed.\
    \ We return a final `true`/`false` to indicate whether the complete validation\
    \ passed or failed.\n\nThis changes a few things in our controllers. First, we\
    \ no longer need to create separate validation logic in each action. The validation\
    \ logic is defined in our models and applies any time we call the `validate()`\
    \ method.\n\nLet us see how to modify the `register()` action, in our `Users`\
    \ controller, as demonstrated in Listing 16-6.\n\n**Listing 16-6.** The `register()`\
    \ Action\n\n```\npublic function register()\n{\n    $view = $this->getActionView();\n\
    \ \n    if (RequestMethods::post(\"register\"))\n    {\n        $user = new User(array(\n\
    ```"
