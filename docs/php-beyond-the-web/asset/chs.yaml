  \ |\n\n### 9.6 底层性能分析\n\n当你真正需要“深入了解”脚本的内部情况时，有时需要关注的不是你的代码在做什么，而是 PHP 本身在做什么。需要澄清的是，大多数人永远不需要通过这种方式来解决性能问题，不过看看\
  \ PHP 如何将你的代码转换为对其运行所在系统的调用，这本身是相当有趣且富有启发性的。PHP 本身是一个编译成二进制可执行文件的 C 程序，这意味着你可以使用诸如\
  \ `strace`（显示系统调用和信号）、`ltrace`（显示库调用）和 `gdb`（用于像 PHP 本身这样的 C 程序的调试器）之类的通用工具来查看其底层运行情况。如果你对此感兴趣，可以看看下面\
  \ Derick Rethans 的教程。作为 `Xdebug` 的作者，他可以说是 PHP 内部机制方面的专家。\n\n| ![信息图标](img/image00248.jpeg)\
  \ | **延伸阅读** |\n| --- | --- |\n| | Derick Rethans 撰写的 “What is PHP doing?” [`derickrethans.nl/what-is-php-doing.html`](http://derickrethans.nl/what-is-php-doing.html)\
  \ |\n\n\n\n### 9.7 性能分析——可能的结果\n\n性能分析可能揭示大量不同类型的性能问题。不过，以下是在分析 PHP 时发现的最常见问题类型，以及相应的解决策略：\n\
  \n- **数据库访问**：对数据库（以及任何其他外部服务）的调用通常是导致缓慢的根源。代码中的一行可能实际上调用了响应软件/服务中数千行代码。数据库性能本身就可以写一两本书来探讨，但改善数据库性能需要关注的方面包括：数据库索引与规范化、服务器负载、数据库缓存设置以及不当的\
  \ SQL 用法。你可以直接在 PHP 中绕过某些数据库问题，思考是否真的需要调用数据库。例如，能否缓存一些频繁请求的数据？能否将多个查询合并到一次请求中？能否在一次查询中请求更多数据，而非分多次查询？最初是否真的需要这些数据？\n\
  - **磁盘访问**：特别是对于大文件和网络驱动器中的文件，磁盘访问可能非常耗时。可能的解决方法包括：在 PHP（或 Memcached 及类似扩展）中缓存数据，一次性读取整个文件（以内存为代价）而非重复打开同一文件，使用本地磁盘（或在使用前缓存到本地）而非网络驱动器，使用更好的硬件（例如固态硬盘），或使用基于内存的驱动器（例如\
  \ `tmpfs`）。请注意，现代操作系统通常善于优化磁盘访问，并会执行一些内存缓存（尤其是针对磁盘写入和频繁访问文件的读取），因此某些优化可能无法带来预期的“加速”效果。请务必对你提出的解决方案进行性能分析！\n\
  - **循环**：循环内的重复计算和其他操作可能会在看似较少的代码行中迅速消耗时间。如果在循环体或控制结构中重复执行相同的计算（或部分计算），请将其移出循环，将结果存储在变量中供循环内使用。同时检查循环内调用的函数，看看函数中是否有任何内容可以被缓存、移除或以其他方式加速。函数常常假定自己只会被调用一两次，因此使用\
  \ `static` 变量来保留调用间的状态，有时可以加速被重复调用的函数。\n- **无明显原因和/或解决方法**：有时性能缓慢没有明确的单一原因，每处都稍慢，积少成多。同样，可能有明确的原因，但没有明确的解决方案，因为你的脚本正在执行某些本身就很耗时的操作，而这是实现所需结果的唯一途径。\n\
  \n在最后这种情况下，或许是时候寻找一些“银弹”了——即用于提升脚本速度的通用解决方案。\n\n| ![信息图标](img/image00248.jpeg) |\
  \ **延伸阅读** 一篇由 Stephan Soller 撰写的关于“PHP 中快速行迭代”基准测试的文章。特别值得注意的是底部的评论部分，详细说明了为什么磁盘缓存对作者的数据影响巨大，而对另一位评论者却没有如此效果。[`arkanis.de/weblog/2013-09-27-fast-line-iteration-in-php`](http://arkanis.de/weblog/2013-09-27-fast-line-iteration-in-php)\
  \ |\n\n### 9.8 银弹\n\n银弹是指你可以“抛向”脚本的“解决方案”，希望它们能在你不必过多思考缓慢原因的情况下提升速度。在我最初撰写本节时，“银弹”一词后面总是跟着一个问号。我把它去掉了，因为这会显得杂乱，但重点是，不存在保证有效的、通用的银弹来提升\
  \ PHP 性能。下面提到的每个所谓的“性能解决方案”都有缺点，并非适用于所有人，并且需要相当多的思考才能实施。尽管如此，它们可能有用，尤其是在你已尽最大努力手动优化脚本，且正在挑战\
  \ PHP 或现有硬件能力的极限时。\n\n### 9.9 银弹 #1——更好的硬件\n\n如果资金允许，购置一台更强大的服务器或桌面电脑通常能立竿见影地提升性能。在某些情况下，硬件成本低于开发人员的时间成本，因此无需过多考虑。然而，也有一些缺点，尤其是对于资金紧张的人来说：\n\
  \n- 你仍然需要进行一些性能分析，以确切了解你需要什么样的*新硬件*。你的脚本是处理器密集型吗？它消耗大量内存吗？它是否花费大量时间进行磁盘读写？或者以上所有情况都需要考虑？或者问题实际上在于外部访问，如网络或数据库访问？如果是那样，新硬件可能也无济于事。\n\
  - 产生的成本包括购买/租赁成本，以及可能增加的电力消耗成本、维护成本和折旧/更换成本。\n- 对于许多算法而言，增加硬件容量最终会遇到自然瓶颈，脚本性能不会随着硬件性能的提升而线性扩展。\n\
  \n### 9.10 银弹 #2——更新的 PHP 版本\n\n每个新版本的 PHP 通常都会在许多方面提升性能并减少资源消耗，因此升级到新版本的 PHP 通常能为你的脚本提供更大的空间。例如，在\
  \ `5.3` 和 `5.4` 版本之间的基准测试通常显示，常见脚本的性能提升在 `7%` 到 `31%` 之间，内存使用量改善在 `17%` 到 `50%`\
  \ 之间。升级还有其他好处，例如错误修复和新功能。然而，也有一些缺点：\n\n- 尽管通常向后兼容，但大多数版本发布意味着少量函数被弃用或完全移除，而其他函数的功能会被改变（有时是微妙的）。因此，在升级时你需要全面测试代码，并可能需要对代码库进行修改。\n\
  - 你使用的某些扩展（尤其是较旧、维护较少或较为生僻的扩展）可能不兼容新版本。这将要求你修改代码库或扩展本身的代码。\n\n\n\n### 9.11 银弹 #3\
  \ - 操作码缓存\n\n`Opcode` 缓存通过缓存 `PHP` 脚本运行时 `PHP` 二进制文件创建的可执行操作码来工作，并且（假设 `PHP` 脚本保持不变）在下次调用该脚本时使用相同的操作码，而不是每次都重新生成它们。这主要在脚本启动时提供性能提升。Web\
  \ 脚本是被重复调用的短脚本，在繁忙的网站上通常每秒调用多次。在这种情况下，操作码缓存可以为单个用户提供稍快的体验，并为整个服务器节省更多资源。诸如 `PHP\
  \ APC` 缓存之类的操作码缓存通常易于安装和配置，因此在大多数情况下，对于 Web 开发人员和服务器管理员来说，这是一个无需过多思考的选择，只需少量工作就能带来性能提升的银弹。\n\
  \n然而，它们对于离线应用程序并不总是那么有效。此类应用程序通常生命周期更长，因此启动性能的相对提升通常远低于短命的 Web 脚本。出于这个原因，`PHP` 的主要缓存系统并非为处理\
  \ `CLI-SAPI` 而编写，并且实际上仅在 Web 服务器模型下运行，在该模型下，许多请求由同一个 `PHP` 进程提供服务。您可以通过在 `php.ini`\
  \ 中设置 `apc.enable_cli` 来启用 `APC` 缓存以用于 `CLI-SAPI`，但这仅用于测试目的，并且通常不会为您的脚本带来任何好处，因为缓存会在每个进程运行结束时被销毁。因此，我们在此不讨论操作码缓存，但如果您在\
  \ Web 风格模型上运行，下面提供了进一步阅读的资料。\n\n| ![information](img/image00248.jpeg) | **进一步阅读**维基百科上的操作码缓存和相关软件列表\
  \ [`en.wikipedia.org/wiki/List_of_PHP_accelerators`](http://en.wikipedia.org/wiki/List_of_PHP_accelerators)Chris\
  \ Jones 撰写的“使用 PHP 5.5 的新 OPcache”[`blogs.oracle.com/opal/entry/using_php_5_5_s`](https://blogs.oracle.com/opal/entry/using_php_5_5_s)\
  \ |\n| --- | --- |\n\n### 9.12 银弹 #4 - 编译\n\n`PHP` 编译器已经存在一段时间了，通常是将 `PHP` 源代码转换为中间语言（例如\
  \ `C++`），然后使用该语言的通用编译器将其编译为机器可执行文件。这些编译后的文件通常比标准的解释代码执行速度更快，资源开销更低。早期的实现版本取得了一定的成功，但常常因未能覆盖所有\
  \ `PHP` 语法和函数、与常见 `PHP` 扩展不兼容以及高昂的许可限制而受阻。缺乏合适的编译工具也侧面印证了一个观点：`PHP` 实际上对于大多数用例来说性能已经足够，因此并不存在强大的市场。然而，一家对\
  \ `PHP` 有更高性能需求的公司已经开始改变这一局面。这家名为 Facebook 的知名社交网络公司，在过去几年中引入并开发了 `PHP HipHop` 编译器项目。\n\
  \nFacebook 界面的很大一部分最初是用 `PHP` 编写的，尽管此后各种子系统已改用低级语言编写，但 Facebook 的大部分遗留（和新）界面代码仍然是用\
  \ `PHP` 编写的。面对拥有近 10 亿用户（一个令人羡慕的问题）所带来的巨大扩展和性能挑战，同时仍然认识到使用 `PHP` 进行开发的好处并需要支持庞大的现有代码库，Facebook\
  \ 为 `HipHop` 项目投入了大量资源。该项目的首批成果已作为开源发布，包括 `HPHPc` 编译器和 `HPHPi`（`HPHPc` 的“开发者模式交互式”版本）。两者都是功能强大、可靠的生产就绪工具。尽管与所有编程活动一样，具体的性能提升将取决于您的\
  \ `PHP` 脚本具体尝试做什么，但各种基准测试表明，在实际使用中，`HipHop` 编译的二进制文件性能提升高达 600%。`HPHPc` 的工作方式与其他\
  \ `PHP` 编译器类似——它首先将您的代码转换为 `C++`，然后使用 `G++` 将该 `C++` 编译为可执行的二进制文件。\n\n无论您考虑使用哪种编译器（后面会列出更多），都有许多缺点需要考虑：\n\
  \n-   新的工具链和部署流程 - 现有编译器都不能直接替代标准 `PHP` 解释器，因此您需要投入时间学习使用该编译器并更新/更改您的构建流程。\n-  \
  \ 编译器的部署复杂 - `PHP` 编译器通常不像标准 `PHP` 二进制文件那样包含在软件仓库中，因此部署变得更加复杂，通常需要在每个开发/构建机器上自行编译编译器。\n\
  -   编译代码需要时间，尤其是在大型项目中 - 每次构建都会变慢，尽管使用 Facebook 程序套件中的 `HPHPi` 工具可以部分缓解这个问题。\n-\
  \   函数覆盖不全 - 所有当前可用的编译器，包括 `HPHP` 套件，都没有覆盖所有核心 `PHP` 函数，更不用说许多可用的扩展了。动态访问其他扩展的支持因编译器而异，并且通常不完善或根本不存在。因此，您需要确保您的代码受所选编译器支持，否则您可能需要重写或删除部分代码/功能。\n\
  -   默认情况下，您的用户无法访问源代码。对于专有软件，这可能是一个优势。但因此，如果您在项目中使用了其他开源代码，您可能需要（取决于许可要求）做出安排，向您的用户提供源代码或将其与可执行文件捆绑在一起。这也可能会阻止知识渊博的用户帮助您开发代码以及识别现有和潜在的\
  \ bug（及其修复方法）。\n\n由于（部分）这些缺点，Facebook 项目（自 2013 年初以来）已弃用 `HipHop` 编译器，转而采用基于 `JIT`\
  \ 的虚拟机，这将在下一节讨论。其他可用的编译器现在要么已经停止使用，要么尚未更新以支持最新的 `PHP` 版本，但它们可能对某些项目有用，因此我们在下面列出了主要的几个。\n\
  \n| ![information](img/image00248.jpeg) | **进一步阅读**针对 Drupal 的 HPHPc 基准测试 [`php.webtutor.pl/en/2011/05/17/drupal-hiphop-for-php-vs-apc-benchmark/`](http://php.webtutor.pl/en/2011/05/17/drupal-hiphop-for-php-vs-apc-benchmark/)phc\
  \ 编译器的开发者关于 PHP 编译器的一篇启发性文章 [`blog.paulbiggar.com/archive/a-rant-about-php-compilers-in-general-and-hiphop-in-particular/`](http://blog.paulbiggar.com/archive/a-rant-about-php-compilers-in-general-and-hiphop-in-particular/)\
  \ |\n| --- | --- |\n\n| ![](img/image00249.gif) | ***phc*** |\n| --- | --- |\n|\
  \   |   |\n|   | 一个支持插件的 `PHP` 开源编译器。支持 `PHP v5.2` 及更早版本。 |\n|   |   |\n|   | ***主网站***\
  \ : [`phpcompiler.org/`](http://phpcompiler.org/) |\n|   |   |\n|   | ***安装信息和主要文档***\
  \ : [`phpcompiler.org/documentation.html`](http://phpcompiler.org/documentation.html)\
