- fmt: '# CakePHP 命名规范与 MVC 结构


    `Cake` 会自动为 MVC 结构的每个部分组装对象。`Controller` 对象在被调用时会自动以特定方式运行，`Model` 对象也是如此。当你创建一个类对象的新实例并指定该实例是现有对象的扩展时，你就在
    PHP 中扩展了对象。例如，你可以创建自己的 `AppController` 对象作为 `Controller` 类对象的扩展，如下所示：`class AppController
    extends Controller {`。


    PHP 的语法要求你添加 `extends` 以及要扩展的类对象的名称，在本例中即 `Controller` 对象。因此，当 `AppController`
    对象被调用时，`Controller` 对象中包含的所有内容也会被调用。


    当 `Controller` 类对象被调用时，它会自动寻找 `Model` 和 `View` 来执行工作。你通过输入的 URL 具体选择要启动的 `Controller`，但你不能输入
    URL 来仅调用 `Model` 或 `View`。`Cake` 的 `Dispatcher` 会将所有请求引导至 `Controller` 对象，因此你必须放置其他对象来拦截该对象在被调用时执行的默认操作。如果你输入了一个
    URL，但 `Dispatcher` 找不到与该 URL 匹配的 `Controller` 对象，那么默认情况下 `Controller` 对象会设置为显示错误消息。了解这些默认行为以及知道在何处可以拦截它们并安装你自己的方法，正是
    Cake 编程的核心。


    例如，在 `Model` 中，每次将记录保存到数据库时，都会执行某些函数。你可以通过在此 `Model` 中插入带有自定义逻辑的 `beforeSave()`
    函数来拦截此默认行为。这会拦截 `Model` 对象用于将记录插入数据库的默认 `save()` 函数，并允许你在保存前根据自定义参数检查数据。


    当 `Dispatcher` 解析 URL 时，它会查找命名正确的文件，否则会返回错误。当 `Controller` action 运行时，`Controller`
    对象会查找存储在相应区域中的特定视图文件，以便 `Controller` 正确执行。在整个 Cake 应用程序中，某些约定始终在起作用。从某种意义上说，本书的主要内容是阐述所有这些约定以及如何使用它们来生成
    Web 应用程序。首先，我将描述如何命名文件以及如何在这些文件中适当地命名类对象。通过将文件放置在正确区域、使用正确名称并包含正确的类名，Cake 将知道你正在拦截其默认操作，并转而执行你的自定义对象。你从
    Cake 默认对象扩展出去的对象越多，应用程序就越复杂。


    ## 命名约定


    简而言之，如果你的文件命名不正确，Cake 将无法将应用程序的不同部分组合在一起，并会给出错误消息。站点的每个元素都必须遵循特定的命名约定，以便当 Cake
    寻找所需资源时，它能够找到并运行它。


    你可能在第 3 章中注意到了，你给模型和控制器文件赋予了特定的名称以使待办事项列表应用能够运行。我解释过，这些文件必须与数据库中的表匹配，并且在编写 PHP
    代码时需要遵循一些典型的命名方案。如果你需要更复杂的命名方案来满足项目的需求，该怎么办？以下是 Cake 中文件命名的基本规则，以及如何将更复杂的名称整合到你的
    Cake 应用程序中以满足自定义需求。


    ### 命名控制器


    每个控制器名称必须与数据库表名匹配。如果你决定创建名称与数据库表名不同的控制器，实际上不应创建控制器，而应使用组件（你将在第 11 章中了解更多关于组件的内容）。数据库表名和控制器名均为小写且使用复数形式。例如，一个购物车应用中包含订单记录的表应命名为
    `orders`。控制器文件的名称与其匹配的表名一致，附加下划线和单词 `controller`，并且它是一个 PHP 文件，因此会带有 `.php` 扩展名。因此，订单控制器应命名为
    `orders_controller.php`，并存储在 `app/controllers` 文件夹中。


    在控制器文件中，你需要扩展应用启动时 Cake 已调用的 `AppController` 对象。为此，另一个重要的约定在起作用。清单 4-1 展示了如何在文件中命名控制器类以及如何扩展
    `AppController` 对象。


    **清单 4-1.** *控制器内部*


    ```

    <?

    class RecordsController extends AppController {

    }

    ?>

    ```


    请注意，在清单 4-1 的第 2 行，我通过启动一个新类并将其命名为 `RecordsController` 来扩展了 `AppController` 对象。类名始终需要与控制器文件名匹配，并使用驼峰式大小写¹并包含单词
    `Controller`。例如，如果此控制器是针对 `orders` 表的，则第 2 行应包含类名 `OrdersController`，文件名则为 `orders_controller.php`。


    如果你遵循此约定，Cake 将能够将请求分派到正确的控制器并运行正确的 action。


