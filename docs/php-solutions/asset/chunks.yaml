    When using objects, wrap your main script in a block called `try` and put the
    error-handling code in a `catch` block. If an exception is thrown, the PHP engine
    abandons the code in the `try` block and executes only the code in the `catch`
    block. The advantage is that you can use the `catch` block to redirect the user
    to an error page rather than displaying an ugly error message onscreen—or a blank
    screen if the display of error messages is turned off, as it should be on a live
    website.


    Note


    The `try` and `catch` blocks must always be used as a pair. You can’t have one
    without the other.


    During the development stage, you should use the `catch` block to display the
    error message generated by the exception like this:


    `try {`


    `// main script goes here`


    `} catch (Exception $e) {`


    `echo $e->getMessage();`


    `}`


    This produces an error message that’s usually much easier to understand than the
    lengthy message generated by a recoverable error. In the case of the previous
    problem.” Although I advised you earlier to use example, it would output “Houston,
    we have a descriptive variable names, using `$e` for an exception is a common
    convention.


    Tip


    Congratulations if you’ve managed to read this far. You should now have sufficient
    knowledge to get started. The rest of this chapter goes into greater detail about
    individual aspects of writing PHP scripts. Rather than plowing straight on, I
    suggest you take a short break and then move on to the next chapter. Come back
    to the following reference section when you’ve gained some practical experience
    of working with PHP, as it will make much more sense then.


    ## PHP: A Quick Reference


    The following sections don’t attempt to cover every aspect of PHP syntax. For
    that, you should refer to the PHP documentation at [`http://php.net/manual/en/`](http://php.net/manual/en/)
    or check out a more detailed reference book, such as Beginning PHP and MySQL:
    From Novice to Professional, Fourth Edition by W. Jason Gilmore (Apress, 2010,
    ISBN: 978-1-4302-3114-1).


    ### Using PHP in an Existing Website


    There is no problem mixing `.html` and `.php` pages in the same website. However,
    PHP code will normally be processed only in files that have the `.php` filename
    extension, so it’s a good idea to give the same extension to all your pages, even
    if they don’t all contain dynamic features. That way, you have the flexibility
    to add PHP to pages without breaking existing links or losing search engine rankings.


    ### Data Types in PHP


    PHP is what’s known as a weakly typed language. In practice, this means that,
    unlike some other computer languages (e.g., Java or C#), PHP doesn’t care what
    type of data you store in a variable.


    Most of the time, this is very convenient, although you need to be careful with
    user input. You may expect a user to enter a number in a form, but PHP won’t object
    if it encounters a word instead. Checking user input carefully is one of the major
    themes of later chapters.


    Even though PHP is weakly typed, it uses the following eight data types:


    *   Integer: This is a whole number, such as 1, 25, 42, or 2006\. Integers must
    not contain any commas or other punctuation as thousand separators. You can also
    use hexadecimal numbers, which should be preceded by `0x` (e.g., `0xFFFFFF`, `0x000000`).

    *   Floating-point number: This is a number that contains a decimal point, such
    as 9.99, 98.6, or 2.1\. PHP does not support the use of the comma as the decimal
    point, as is common in many European countries. You must use a period. Like integers,
    floating-point numbers must not contain thousand-separators. (This type is also
    referred to as float or double.)

    *   String: A string is text of any length. It can be as short as zero characters
    (an empty string) and has no upper limit.

    *   Boolean: This type has only two values: `true` or `false`. However, PHP treats
    other values as implicitly true or false. See “The truth according to PHP” later
    in this chapter.

    *   Array: An array is a variable capable of storing multiple values, although
    it may contain none at all (an empty array). Arrays can hold any data type, including
    other arrays. An array of arrays is called a multidimensional array. See “Creating
    arrays” later in this chapter for details of how to populate an array with values.

    *   Object: An object is a sophisticated data type capable of storing and manipulating
    values. You’ll learn more about objects in [Chapter 6](#A978-1-4842-0635-5_6_Chapter.html).

    *   Resource: When PHP connects to an external data source, such as a file or
    database, it stores a reference to it as a resource.

    *   NULL: This is a special data type that indicates that a variable has no value.


    An important side effect of PHP’s weak typing is that if you enclose an integer
    or floating-point number in quotes, PHP automatically converts it from a string
    to a number, allowing you to perform calculations without the need for any special
    handling. This is different from JavaScript, and it can have unexpected consequences.
    When PHP sees the plus sign (`+`), it assumes you want to perform addition, and
    thus it tries to convert strings to integers or floating-point numbers, as in
    the following example (the code is in `data_conversion_01.php` in the `ch03` folder):


    `$fruit = ''2 apples'';`


    `$veg = '' 2 carrots'';`


    `echo $fruit + $veg;  // displays 4`


    PHP sees that both `$fruit` and `$veg` begin with a number, so it extracts the
    number and ignores the rest. However, if the string doesn’t begin with a number,
    PHP converts it to 0, as shown in this example (the code is in `data_conversion_02.php`):


    `$fruit = ''2 apples'';`


    `$veg = '' and 2 carrots'';`


    `echo $fruit + $veg;  // displays 2`


    Weak typing is a mixed blessing. It makes PHP very easy for beginners, but it
    means you often need to check that a variable contains the correct data type before
    using it.


    ### Doing Calculations with PHP


    PHP is highly adept at working with numbers and can perform a wide variety of
    calculations, from simple arithmetic to complex math. This reference section covers
    only the standard arithmetic operators. See [`http://php.net/manual/en/book.math.php`](http://php.net/manual/en/book.math.php)
    for details of the mathematical functions and constants supported by PHP.


    Note


    A constant is similar to a variable in that it uses a name to represent a value.
    However, the value of a constant, once defined, cannot be changed. All PHP predefined
    constants are in uppercase. Unlike variables, they do not begin with a dollar
    sign. For example, the constant for π (pi) is `M_PI`.'
  trans: "\n#### 处理异常\n\nPHP 5 引入了一种新的错误处理方式，与许多其他编程语言类似，称为异常。当问题发生时，许多内置类会自动抛出异常——即生成一种特殊类型的对象，其中包含错误原因和发生位置的详细信息。你也可以使用关键字\
    \ `throw` 抛出自定义异常，如下所示：\n\n```\nif (错误发生) {\n    throw new Exception('休斯顿，我们遇到问题了');\n\
    }\n```\n\n括号内的字符串用作错误消息。显然，在实际脚本中，你需要让消息更明确。当异常被抛出时，你应在另一个代码块中处理它，这个代码块被恰当地称为\
    \ `catch`。\n\n当使用对象时，将你的主脚本包裹在一个名为 `try` 的块中，并将错误处理代码放在 `catch` 块中。如果抛出异常，PHP\
    \ 引擎会放弃 `try` 块中的代码，并仅执行 `catch` 块中的代码。其优点是，你可以使用 `catch` 块将用户重定向到错误页面，而不是在屏幕上显示难看的错误消息——如果关闭了错误消息显示（在线网站应如此设置），则可能显示空白屏幕。\n\
    \n> **注意**：`try` 和 `catch` 块必须始终成对使用。不能只有一个而没有另一个。\n\n在开发阶段，你应该使用 `catch` 块来显示异常生成的错误消息，如下所示：\n\
    \n```\ntry {\n    // 主脚本写在这里\n} catch (Exception $e) {\n    echo $e->getMessage();\n\
    }\n```\n\n这会生成一条错误消息，通常比可恢复错误生成的长篇消息更容易理解。在前述问题的情况下，它会输出“休斯顿，我们遇到问题了”。虽然我之前建议使用描述性变量名，但在异常处理中使用\
