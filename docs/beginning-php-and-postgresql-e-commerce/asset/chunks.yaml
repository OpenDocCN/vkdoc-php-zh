  trans: "\n为了简化本节内容，您将为管理员和供应商提供一个单一页面。这可能并非在所有情况下都是理想的选择，因为您可能不希望将所有的订单详情和审计信息暴露给外部供应商。但是，出于演示目的，这可以减少您需要编写的代码量。您还将此页面的安全性与本书前面使用的基于管理员表单的安全性相结合，假设有权编辑站点数据的人员也有权管理订单。在更高级的设置中，您可以稍作修改，为不同类型的用户提供角色，并限制不同角色用户可用的功能。\n\
    \n**实现数据层**\n\n我们需要向 `hatshop` 数据库添加一个新的数据层函数 `orders_get_audit_trail`，并更新一个现有函数\
    \ `orders_update_order`，以考虑新的状态代码。\n\n使用 `pgAdmin III`，连接到 `hatshop` 数据库，并使用查询工具执行以下代码，该代码将在您的\
    \ `hatshop` 数据库中创建 `orders_update_order` 函数：\n\n```\n-- Update orders_update_order\
    \ function\n\nCREATE OR REPLACE FUNCTION orders_update_order(INTEGER, INTEGER,\
    \ VARCHAR(255), VARCHAR(50), VARCHAR(50))\n\nRETURNS VOID LANGUAGE plpgsql AS\
    \ $$\n\nDECLARE\n\ninOrderId ALIAS FOR $1;\n\ninStatus ALIAS FOR $2;\n\ninComments\
    \ ALIAS FOR $3;\n\ninAuthCode ALIAS FOR $4;\n\ninReference ALIAS FOR $5;\n\ncurrentDateShipped\
    \ TIMESTAMP;\n\nBEGIN\n\nSELECT INTO currentDateShipped\n\nshipped_on\n\nFROM\
    \ orders\n\nWHERE order_id = inOrderId;\n\nUPDATE orders\n\nSET status = inStatus,\
    \ comments = inComments,\n\nauth_code = inAuthCode, reference = inReference\n\n\
    WHERE order_id = inOrderId;\n\nIF inStatus < 7 AND currentDateShipped IS NOT NULL\
    \ THEN\n\nUPDATE orders SET shipped_on = NULL WHERE order_id = inOrderId; ELSEIF\
    \ inStatus > 6 AND currentDateShipped IS NULL THEN\n\nUPDATE orders SET shipped_on\
    \ = NOW() WHERE order_id = inOrderId; END IF;\n\nEND;\n\n$$;\n```\n\n然后，使用查询工具执行以下代码，该代码将在您的\
    \ `hatshop` 数据库中创建 `orders_get_audit_trail` 函数：\n\n```\n-- Create orders_get_audit_trail\
    \ function\n\nCREATE FUNCTION orders_get_audit_trail(INTEGER)\n\nRETURNS SETOF\
    \ audit LANGUAGE plpgsql AS $$\n\nDECLARE\n\ninOrderId ALIAS FOR $1;\n\noutAuditRow\
    \ audit;\n\nBEGIN\n\nFOR outAuditRow IN\n\nSELECT audit_id, order_id, created_on,\
    \ message, message_number FROM audit\n\nWHERE order_id = inOrderId\n\nLOOP\n\n\
    RETURN NEXT outAuditRow;\n\nEND LOOP;\n\nEND;\n\n$$;\n```\n\n**实现业务层**\n\n您还必须向\
    \ `business/orders.php` 中的 `Orders` 类添加一个新方法，以配合上一节中添加的新数据层函数。\n\n将 `GetAuditTrail`\
    \ 方法添加到 `business/orders.php` 的 `Orders` 类中，如下所示：\n\n```\n// Gets the audit table\
    \ entries associated with a specific order public static function GetAuditTrail($orderId)\n\
    {\n    // Build the SQL query\n    $sql = 'SELECT * FROM orders_get_audit_trail(:order_id);';\n\
    \n    // Build the parameters array\n    $params = array (':order_id' => $orderId);\n\
    \n    // Prepare the statement with PDO-specific functionality $result = DatabaseHandler::Prepare($sql);\n\
    \n    // Execute the query and return the results\n    return DatabaseHandler::GetAll($result,\
    \ $params);\n}\n```\n\n**实现表示层**\n\n您需要更新 `admin_order_details` 组合模板，该模板用于显示订单详情。在本书前面，此组合模板还包括测试订单流程的功能，但我们在此将其移除。取而代之的是，您将提供当订单卡在“等待库存确认”和“等待发货确认”阶段时，推动订单沿管线前进的能力。\n\
    \n现在，您还可以在另一个新表格中显示订单的所有审计信息。\n\n让我们看看您将要实现的目标，如图 14-7 所示。\n\n您可以将订单管理页面分为三个部分：\n\
    \n*   在第一部分，我们将“处理”按钮改为供应商的“确认”按钮。\n*   在第二部分，一个表格填充了订单中的商品数据。\n*   在第三部分，一个表格显示了订单的审计跟踪。\n\
    \n**图 14-7.** *新的订单详情管理页面* 您将在下一个练习中实现新功能。\n\n**练习：修改订单详情管理部分**\n\n**1.** 从 `presentation/templates/admin_order_details.tpl`\
    \ 中删除以下行：\n\n```\n{if $admin_order_details->mOrderProcessMessage}\n<strong>{$admin_order_details->mOrderProcessMessage}</strong>\n\
    <br /><br />\n{/if}\n```\n\n**2.** 同样在 `presentation/templates/admin_order_details.tpl`\
    \ 中，将“处理订单”按钮代码替换为突出显示的代码：\n\n```\n<input type=\"submit\" name=\"submitCancel\"\
    \ value=\"Cancel\"\n{if ! $admin_order_details->mEditEnabled}\ndisabled=\"disabled\"\
    \n{/if} />\n**{if $admin_order_details->mProcessButtonText}**\n**<input type=\"\
    submit\" name=\"submitProcessOrder\"**\n**value=\"{$admin_order_details->mProcessButtonText}\"\
    \ />**\n**{/if}**\n<br /><br />\n<span class=\"admin_page_text\">Order contains\
    \ these products:</span>\n<br /><br />\n```\n\n**3.** 在 `presentation/templates/admin_order_details.tpl`\
    \ 文件中，添加以下突出显示的代码：\n\n```\n{section name=cOrder loop=$admin_order_details->mOrderDetails}\n\
    <tr>\n<td>{$admin_order_details->mOrderDetails[cOrder].product_id}</td>\n<td>{$admin_order_details->mOrderDetails[cOrder].product_name}</td>\n\
    <td>{$admin_order_details->mOrderDetails[cOrder].quantity}</td>\n<td>${$admin_order_details->mOrderDetails[cOrder].unit_cost}</td>\n\
    <td>${$admin_order_details->mOrderDetails[cOrder].subtotal}</td>\n</tr>\n{/section}\n\
    </table>\n**<br /><br />**\n**<span class=\"admin_page_text\">Order audit trail:</span>**\n\
    **<br /><br />**\n**<table>**\n**<tr>**\n**<th>Audit ID</th>**\n**<th>Created\
    \ On</th>**\n**<th>Message Number</th>**\n**<th>Message</th>**\n**</tr>**\n**{section\
    \ name=cOrder loop=$admin_order_details->mAuditTrail}**\n**<tr>**\n**<td>{$admin_order_details->mAuditTrail[cOrder].audit_id}</td>**\n\
    **<td>{$admin_order_details->mAuditTrail[cOrder].created_on}</td>**\n**<td>{$admin_order_details->mAuditTrail[cOrder].message_number}</td>**\n\
    **<td>{$admin_order_details->mAuditTrail[cOrder].message}</td>**\n**</tr>**\n\
    **{/section}**\n**</table>**\n</form>\n```\n\n**4.** 打开 `presentation/smarty_plugins/function.load_admin_order_details.php`\
    \ 文件，并删除此处所示的 `AdminOrderDetails` 类的 `$mOrderProcessMessage` 成员的定义：\n\n```\npublic\
    \ $mOrderProcessMessage;\n```\n\n**5.** 同样在 `function.load_admin_order_details.php`\
    \ 文件中，向 `AdminOrderDetails` 类添加两个新成员：\n\n```\npublic $mProcessButtonText;\npublic\
    \ $mAuditTrail;\n```\n\n**6.** 在同一文件中，通过添加此处突出显示的代码来修改 `AdminOrderDetails` 类的\
    \ `init` 方法：\n\n```\nif (isset ($_GET['submitUpdate']))\n{\n    Orders::UpdateOrder($this->mOrderId,\
    \ $_GET['status'], $_GET['comments'], $_GET['authCode'], $_GET['reference']);\n\
    }\nif (isset ($_GET['submitProcessOrder']))\n{\n    $processor = new OrderProcessor($this->mOrderId);\n\
    \    **$processor->Process();**\n}\n```\n"
- fmt: "`$this->mOrderInfo = Orders::GetOrderInfo($this->mOrderId);`  \n`$this->mOrderDetails\
    \ = Orders::GetOrderDetails($this->mOrderId);`  \n`$this->mAuditTrail = Orders::GetAuditTrail($this->mOrderId);`\
    \  \n`$this->mCustomerInfo = Customer::Get($this->mOrderInfo['customer_id']);`\
    \  \n`$this->mTotalCost = $this->mOrderInfo['total_amount'];`\n\n```\n// Format\
    \ the values\n$this->mTotalCost = number_format($this->mTotalCost, 2, '.', '');\n\
    $this->mTaxCost = number_format($this->mTaxCost, 2, '.', '');\nif ($this->mOrderInfo['status']\
    \ == 3)\n    $this->mProcessButtonText = 'Confirm Stock for Order';\nelseif ($this->mOrderInfo['status']\
    \ == 6)\n    $this->mProcessButtonText = 'Confirm Shipment for Order';\n```\n\n\
    ```\n// Value which specifies whether to enable or disable edit mode\nif (isset\
    \ ($_GET['submitEdit']))\n    $this->mEditEnabled = true;\nelse\n    $this->mEditEnabled\
    \ = false;\n```\n\n6. Load HatShop, make a new order, and then load the order\
    \ details admin page to test the new changes.\n\n## How It Works: Order Details\
    \ Admin\n\nThe `init` method found in `AdminOrderDetails` advances the pipeline\
    \ to the next section if the Process button is clicked; the presence of this button\
    \ on the page depends on the value of the `mProcessButtonText` member.\n\nThis\
    \ value is set to \"Confirm Stock\" if the current pipeline section is 3 (awaiting\
    \ stock confirmation), or to \"Confirm Shipment\" if the current pipeline section\
    \ is 6 (awaiting shipment confirmation). If the current pipeline section is not\
    \ set to 3 or 6, it means that the order has been completed successfully, and\
    \ the button is not shown. The administrator can always check what happened to\
    \ the order by checking the audit trail that is displayed on the page.\n\nAll\
    \ that remains now is to check that everything is working properly. To do this,\
    \ use the web interface to place an order, and then check it out via the orders\
    \ details admin section. You should see that the order is awaiting confirmation\
    \ of stock, as shown earlier in Figure 14-7.\n\nClick the **Confirm Stock for\
    \ Order** button and the order is processed. Because this happens very quickly,\
    \ you are soon presented with the next stage, where the **Confirm Stock for Order**\
