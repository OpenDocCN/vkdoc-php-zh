  \ 和 `$row['caption']`。除了文件名和标题，我们还需要大图的尺寸，以便在页面主体中显示。请在获取首条结果的代码之后，立即在 `else` 代码块中添加以下代码：\n\
  \n```\n// 获取主图的名称和标题\n$mainImage = $row['filename'];\n$caption = $row['caption'];\n\
  // 获取主图尺寸\n$imageSize = getimagesize('images/'.$mainImage)[3];\n```\n\n如第 8 章所述，`getimagesize()`\
  \ 返回一个数组，其第四个元素包含可直接插入 `<img>` 标签的图片宽高字符串。我们只需要第四个元素，因此可使用第 7 章介绍的数组解引用技术。在 `getimagesize()`\
  \ 的右括号后添加 `[3]` 只返回数组的第四个元素，并赋值给 `$imageSize`。\n\n**注意：** 数组解引用需要 PHP 5.4 或更高版本。如果服务器运行旧版\
