- fmt: '#### Implementation


    Although the practical reality of Page Controller projects can become fiendish,
    the pattern is simple. Control is related to a view, or to a set of views. In
    the simplest case, this means that the control sits in the view itself, although
    it can be abstracted, especially when a view is closely linked with others (that
    is, when you might need to forward to different pages in different circumstances).


    Here is the simplest flavor of Page Controller:


    ```

    findAll();

    } catch (\Exception $e) {

    include(''error.php'');

    exit(0);

    }

    // default page follows

    ?>


    Venues


    Venues


    getName(); ?>


    ```


    This document has two elements to it. The view element handles display, while
    the controller element manages the request and invokes application logic. Even
    though view and controller inhabit the same page, they are rigidly separated.


    There is very little to this example (aside from the database work going on behind
    the scenes, of which you’ll find more in the next chapter). The PHP block at the
    top of the page attempts to get a list of `Venue` objects, which it stores in
    the `$venues` global variable.


    If an error occurs, the page delegates to a page called `error.php` by using `include()`,
    followed by `exit()` to kill any further processing on the current page. I could
    equally have used an HTTP forward. If no include takes place, then the HTML at
    the bottom of the page (the view) is shown.


    ![A314621_5_En_12_Fig8_HTML.gif](A314621_5_En_12_Fig8_HTML.gif)


    **Figure 12-8.** Page Controllers embedded in views


    This will do as a quick test, but a system of any size or complexity will probably
    need more support than that.


    The Page Controller code was previously implicitly separated from the view. Here,
    I make the break, starting with a rudimentary Page Controller base class:


    ```

    // listing 12.33

    abstract class PageController

    {

    abstract public function process();

    public function __construct()

    {

    $this->reg = Registry::instance();

    }

    public function init()

    {

    if (isset($_SERVER[''REQUEST_METHOD''])) {

    $request = new HttpRequest();

    } else {

    $request = new CliRequest();

    }

    $this->reg->setRequest($request);

    }

    public function forward(string $resource)

    {

    $request = $this->getRequest();

    $request->forward($resource);

    }

    public function render(string $resource, Request $request)

    {

    include($resource);

    }

    public function getRequest()

    {

    return $this->reg->getRequest();

    }

    }

    ```


    This class uses some of the tools that you have already looked at—in particular,
    the `Request` and `Registry` classes. The `PageController` class’s main roles
    are to provide access to a `Request` object and to manage the inclusion of views.
    This list of purposes would quickly grow in a real project as more child classes
    discover a need for common functionality.


    A child class could live inside the view, and thereby display it by default as
    before. Or, it could stand separate from the view. The latter approach is cleaner,
    I think, so that’s the path that I take. Here is a `PageController` that attempts
    to add a new venue to the system:


    ```

    // listing 12.34

    class AddVenueController extends PageController

    {

    public function process()

    {

    $request = $this->getRequest();

    try {

    $name = $request->getProperty(''venue_name'');

    if (is_null($request->getProperty(''submitted''))) {

    $request->addFeedback("choose a name for the venue");

    $this->render(__DIR__ . ''/view/add_venue.php'', $request);

    } elseif (is_null($name)) {

    $request->addFeedback("name is a required field");

    $this->render(__DIR__ . ''/view/add_venue.php'', $request);

    return;

    } else {

    // add to database

    $this->forward(''listvenues.php'');

    }

    } catch (Exception $e) {

    $this->render(__DIR__.''/view/error.php'', $request);

    }

    }

    }

    ```


    The `AddVenueController` class only implements the `process()` method. `process()`
    is responsible for checking the user’s submission. If the user has not submitted
    a form, or has completed the form incorrectly, the default view (`add_venue.php`)
    is included, providing feedback and presenting the form. If I successfully add
    a new user, then the method invokes `forward()` to send the user to the `ListVenues`
    page controller.


    Note the format I used for the view. I tend to differentiate view files from class
    files by using all lowercase file names in the former and camel case (running
    words together and using capital letters to show the boundaries) in the latter.


    You may have noticed that there is nothing within the `AddVenueController` class
    that causes it to be run. I could place runner code within the same file, but
    this would make testing difficult (because the very act of including the class
    would execute its methods). For this reason, I create a runner script for each
    page. Here is `addvenue.php`:


    ```

    // listing 12.35

    $addvenue = new AddVenueController();

    $addvenue->init();

    $addvenue->process();

    ```


    Here is the view associated with the `AddVenueController` class:


    ```


    Add Venue


    Add Venue


    getFeedbackString("");

    ?>


    ```


    As you can see, the view does nothing but display data and provide the mechanism
    for generating a new request. The request is made to the `PageController` (via
    the `/addvenue.php` runner), not back to the view. Remember, it is the `PageController`
    class that is responsible for processing requests.


    You can see an overview of this more complicated version of the Page Controller
    pattern in Figure 12-9.


    ![A314621_5_En_12_Fig9_HTML.gif](A314621_5_En_12_Fig9_HTML.gif)


    **Figure 12-9.** A Page Controller class hierarchy and its include relationships'
  raw: '#### Implementation


    Although the practical reality of Page Controller projects can become fiendish,
    the pattern is simple. Control is related to a view, or to a set of views. In
    the simplest case, this means that the control sits in the view itself, although
    it can be abstracted, especially when a view is closely linked with others (that
    is, when you might need to forward to different pages in different circumstances).


    Here is the simplest flavor of Page Controller:


    ```

    findAll();

    } catch (\Exception $e) {

    include(''error.php'');

    exit(0);

    }

    // default page follows

    ?>


    Venues


    Venues


    getName(); ?>


    ```


    This document has two elements to it. The view element handles display, while
    the controller element manages the request and invokes application logic. Even
    though view and controller inhabit the same page, they are rigidly separated.


    There is very little to this example (aside from the database work going on behind
    the scenes, of which you’ll find more in the next chapter). The PHP block at the
    top of the page attempts to get a list of `Venue` objects, which it stores in
    the `$venues` global variable.


    If an error occurs, the page delegates to a page called `error.php` by using `include()`,
    followed by `exit()` to kill any further processing on the current page. I could
    equally have used an HTTP forward. If no include takes place, then the HTML at
    the bottom of the page (the view) is shown.


    ![A314621_5_En_12_Fig8_HTML.gif](A314621_5_En_12_Fig8_HTML.gif)


    Figure 12-8.


    Page Controllers embedded in views


    This will do as a quick test, but a system of any size or complexity will probably
    need more support than that.


    The Page Controller code was previously implicitly separated from the view. Here,
    I make the break, starting with a rudimentary Page Controller base class :


    ```

    // listing 12.33

    abstract class PageController

    {

    abstract public function process();

    public function __construct()

    {

    $this->reg = Registry::instance();

    }

    public function init()

    {

    if (isset($_SERVER[''REQUEST_METHOD''])) {

    $request = new HttpRequest();

    } else {

    $request = new CliRequest();

    }

    $this->reg->setRequest($request);

    }

    public function forward(string $resource)

    {

    $request = $this->getRequest();

    $request->forward($resource);

    }

    public function render(string $resource, Request $request)

    {

    include($resource);

    }

    public function getRequest()

    {

    return $this->reg->getRequest();

    }

    }

    ```


    This class uses some of the tools that you have already looked at—in particular,
    the `Request` and `Registry` classes. The `PageController` class’s main roles
    are to provide access to a `Request` object and to manage the inclusion of views.
    This list of purposes would quickly grow in a real project as more child classes
    discover a need for common functionality.


    A child class could live inside the view, and thereby display it by default as
    before. Or, it could stand separate from the view. The latter approach is cleaner,
    I think, so that’s the path that I take. Here is a `PageController` that attempts
    to add a new venue to the system:


    ```

    // listing 12.34

    class AddVenueController extends PageController

    {

    public function process()

    {

    $request = $this->getRequest();

    try {

    $name = $request->getProperty(''venue_name'');

    if (is_null($request->getProperty(''submitted''))) {

    $request->addFeedback("choose a name for the venue");

    $this->render(__DIR__ . ''/view/add_venue.php'', $request);

    } elseif (is_null($name)) {

    $request->addFeedback("name is a required field");

    $this->render(__DIR__ . ''/view/add_venue.php'', $request);

    return;

    } else {

    // add to database

    $this->forward(''listvenues.php'');

    }

    } catch (Exception $e) {

    $this->render(__DIR__.''/view/error.php'', $request);

    }

    }

    }

    ```


    The `AddVenueController` class only implements the `process()` method . `process()`
    is responsible for checking the user’s submission. If the user has not submitted
    a form, or has completed the form incorrectly, the default view (`add_venue.php`)
    is included, providing feedback and presenting the form. If I successfully add
    a new user, then the method invokes `forward()` to send the user to the `ListVenues`
    page controller.


    Note the format I used for the view. I tend to differentiate view files from class
    files by using all lowercase file names in the former and camel case (running
    words together and using capital letters to show the boundaries) in the latter.


    You may have noticed that there is nothing within the `AddVenueController` class
    that causes it to be run. I could place runner code within the same file, but
    this would make testing difficult (because the very act of including the class
    would execute its methods). For this reason, I create a runner script for each
    page. Here is addvenue.php:


    ```

    // listing 12.35

    $addvenue = new AddVenueController();

    $addvenue->init();

    $addvenue->process();

    ```


    Here is the view associated with the `AddVenueController` class:


    ```


    Add Venue


    Add Venue


    getFeedbackString("");

    ?>


    ```


    As you can see, the view does nothing but display data and provide the mechanism
    for generating a new request. The request is made to the `PageController` (via
    the `/addvenue.php` runner), not back to the view. Remember, it is the `PageController`
    class that is responsible for processing requests.


    You can see an overview of this more complicated version of the Page Controller
    pattern in Figure [12-9](#A314621_5_En_12_Chapter.html#Fig9).


    ![A314621_5_En_12_Fig9_HTML.gif](A314621_5_En_12_Fig9_HTML.gif)


    Figure 12-9.


    A Page Controller class hierarchy and its include relationships'
  trans: '

    #### 实现


    尽管页面控制器项目的实际实现可能变得相当复杂，但其模式本身很简单。控制权与一个视图或一组视图相关联。在最简单的情况下，这意味着控制权位于视图本身，尽管它可以被抽象出来，尤其是当一个视图与其他视图紧密关联时（即，当你在不同情况下可能需要转发到不同页面时）。


    以下是页面控制器最简单的形式：


    ```

    findAll();

    } catch (\Exception $e) {

    include(''error.php'');

    exit(0);

    }

    // 默认页面跟在后面

    ?>


    场地


    场地


    getName(); ?>


    ```


    该文档包含两个元素。视图元素负责显示，而控制器元素管理请求并调用应用程序逻辑。即使视图和控制器位于同一页面，它们也是严格分离的。


    这个例子非常简单（除了后台的数据库操作外，你将在下一章中了解更多）。页面顶部的 PHP 代码块尝试获取一个 `Venue` 对象列表，并将其存储在 `$venues`
    全局变量中。


    如果发生错误，页面通过 `include()` 将处理委托给名为 `error.php` 的页面，然后使用 `exit()` 终止当前页面的任何进一步处理。我同样可以使用
    HTTP 转发。如果没有包含发生，则会显示页面底部的 HTML（视图）。


    ![A314621_5_En_12_Fig8_HTML.gif](img/A314621_5_En_12_Fig8_HTML.gif)


    **图 12-8.** 嵌入在视图中的页面控制器


    这可以作为快速测试，但任何具有规模或复杂性的系统可能需要比这更多的支持。


    页面控制器代码之前是隐式地与视图分离的。在这里，我从一个基本的页面控制器基类开始，明确地进行了分离：


    ```

    // 清单 12.33

    abstract class PageController

    {

    abstract public function process();

    public function __construct()

    {

    $this->reg = Registry::instance();

    }

    public function init()

    {

    if (isset($_SERVER[''REQUEST_METHOD''])) {

    $request = new HttpRequest();

    } else {

    $request = new CliRequest();

    }

    $this->reg->setRequest($request);

    }

    public function forward(string $resource)

    {

    $request = $this->getRequest();

    $request->forward($resource);

    }

    public function render(string $resource, Request $request)

    {

    include($resource);

    }

    public function getRequest()

    {

    return $this->reg->getRequest();

    }

    }

    ```


    这个类使用了一些你已经见过的工具——特别是 `Request` 和 `Registry` 类。`PageController` 类的主要作用是提供对 `Request`
    对象的访问，并管理视图的包含。在真实项目中，随着更多子类发现需要通用功能，这个用途列表会迅速增长。


    子类可以存在于视图内部，并像之前一样默认显示它。或者，它可以独立于视图。我认为后一种方法更清晰，所以我选择这条路径。下面是一个尝试向系统添加新场地的 `PageController`：


    ```

    // 清单 12.34

    class AddVenueController extends PageController

    {

    public function process()

    {

    $request = $this->getRequest();

    try {

    $name = $request->getProperty(''venue_name'');

    if (is_null($request->getProperty(''submitted''))) {

    $request->addFeedback("为场地选择一个名称");

    $this->render(__DIR__ . ''/view/add_venue.php'', $request);

    } elseif (is_null($name)) {

    $request->addFeedback("名称是必填字段");

    $this->render(__DIR__ . ''/view/add_venue.php'', $request);

    return;

    } else {

    // 添加到数据库

    $this->forward(''listvenues.php'');

    }

    } catch (Exception $e) {

    $this->render(__DIR__.''/view/error.php'', $request);

    }

    }

    }

    ```


    `AddVenueController` 类只实现了 `process()` 方法。`process()` 负责检查用户的提交。如果用户尚未提交表单，或表单填写不正确，则会包含默认视图
    (`add_venue.php`)，提供反馈并呈现表单。如果我成功添加了新用户，则该方法会调用 `forward()` 将用户发送到 `ListVenues`
    页面控制器。


    请注意我用于视图的格式。我倾向于通过使用全小写文件名来命名视图文件，而类文件则使用驼峰命名法（将单词连在一起，并使用大写字母表示边界），以区分它们。


    你可能已经注意到 `AddVenueController` 类内部没有任何东西会导致它被运行。我可以将运行代码放在同一个文件中，但这会使测试变得困难（因为仅仅包含该类就会执行其方法）。出于这个原因，我为每个页面创建了一个运行脚本。以下是
    `addvenue.php`：


    ```

    // 清单 12.35

    $addvenue = new AddVenueController();

    $addvenue->init();

    $addvenue->process();

    ```


    以下是与 `AddVenueController` 类关联的视图：


    ```


    添加场地


    添加场地


    getFeedbackString("");

    ?>


    ```


    正如你所看到的，视图除了显示数据和提供生成新请求的机制外，不做任何事情。请求是发送给 `PageController`（通过 `/addvenue.php`
    运行脚本）的，而不是返回到视图。请记住，负责处理请求的是 `PageController` 类。


    你可以在图 12-9 中看到这个更复杂版本的页面控制器模式的概览。


    ![A314621_5_En_12_Fig9_HTML.gif](img/A314621_5_En_12_Fig9_HTML.gif)


    **图 12-9.** 页面控制器类层次结构及其包含关系

    '
- fmt: '#### Consequences


    This approach has the great merit that it immediately makes sense to anyone with
    any web experience. I make a request for `venues.php`, and that is precisely what
    I get. Even an error is within the bounds of expectation, with “server error”
    and “page not found” pages an everyday reality.


    Things get a little more complicated if you separate the view from the page controller
    class, but the near one-to-one relationship between the participants is clear
    enough.


    A page controller includes its view once it has completed processing. In some
    circumstances, though, it forwards instead to another page controller. So, for
    example, when `AddVenue` successfully adds a venue, it no longer needs to display
    the addition form. Instead it delegates to `ListVenues`.


    This is handled within the `PageController` by the `forward()` method which, like
    the `ForwardViewComponent` we have already seen, simply calls `forward()` on the
    `Request`.


    Although a page controller class might delegate to `Command` objects, the benefit
    of doing so is not as marked as it is with Front Controller. Front Controller
    classes need to work out what the purpose of a request is; page controller classes
    already know this. The light request checking and logic layer calls that you would
    put in a `Command` sit just as easily in a page controller class, and you benefit
    from the fact that you do not need a mechanism to select your `Command` objects.


    Duplication can be a problem, but the use of a common superclass can factor away
    a lot of that. You can also save on setup time because you can avoid loading data
    that you won’t need in the current context. Of course, you could do that with
    Front Controller, too, but the process of discovering what is needed, and what
    is not, would be much more complicated.


    The real drawback to the pattern lies in situations where the paths through your
    views are complex—especially when the same view is used in different ways at different
    times (add and edit screens are a good example of this). You can find that you
    get tangled up in conditionals and state checking, and it becomes hard to get
    an overview of your system.


    It is not impossible to start with Page Controller and move toward the Front Controller
    pattern, however. This is especially true if you are using a `PageController`
    superclass. As a rule of thumb, if I estimate a system should take me less than
    a week or so to complete, and that it isn’t going to need more phases in the future,
    I would choose Page Controller and benefit from the fast turnaround. If I were
    building a large project that needs to grow over time and has complex view logic,
    I would go for a Front Controller every time.


    ### Template View and View Helper


    `Template View` is pretty much what you get by default in PHP, in that I can commingle
    presentation markup (HTML) and system code (native PHP). As I have said before,
    this is both a blessing and a curse because the ease with which these can be brought
    together represents a temptation to combine application and display logic in the
    same place—with potentially disastrous consequences.


    In PHP then, programming the view is largely a matter of restraint. If it isn’t
    strictly a matter of display, treat any code with the greatest suspicion.


    To this end, the View Helper pattern (Alur et al.) provides for a helper class
    that may be specific to a view or shared between multiple views to help with any
    tasks that require more than the smallest amount of code.


    #### The Problem


    These days it is becoming rarer to find SQL queries and other business logic embedded
    directly in display pages, but it still happens. I have covered this particular
    evil in great detail in previous chapters, so I’ll keep this brief.


    Web pages that contain too much code can be hard for web producers to work with,
    as presentation components become tangled up in loops and conditionals.


    Business logic in the presentation forces you to stick with that interface. You
    can’t switch in a new view easily without porting across a lot of application
    code, too.


    Systems that separate their views from their logic are also easier to test. This
    is because tests can be applied to the functionality of the logic layer in isolation
    of the noisy distractions of presentation.


    Security issues often appear in systems which embed logic in their presentation
    layer, too. In such systems, because database queries and code to handle user
    input tends to be scattered in with tables and forms and lists, it becomes hard
    to identify potential hazards.


    With many operations recurring from view to view, systems that embed application
    code in their templates tend to fall prey to duplication as the same code structures
    are pasted from page to page. Where this happens, bugs and maintenance nightmares
    surely follow.


    To prevent this from happening, you should handle application processing elsewhere
    and allow views to manage presentation only. This is often achieved by making
    views the passive recipients of data. Where a view does need to interrogate the
    system, it is a good idea to provide a View Helper object to do any involved work
    on the view’s behalf.'
