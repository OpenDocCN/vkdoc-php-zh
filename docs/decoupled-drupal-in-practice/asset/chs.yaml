  CouchDB 对象与 Drupal 等效项


  | CouchDB 对象 | Drupal 等效项 |

  | --- | --- |

  | 数据库 | 工作区 |

  | 文档 | 实体 |

  | 附件 | 文件附件 |

  | 本地文档 | 本地实体（复制日志实体） |


  CouchDB 规范建议所有期望 JSON 响应的请求都应包含以下两个标头。^(⁵⁹) 尽管如此，在接下来的章节中描述的许多请求，即使没有这些标头，也可以在 `RELAXed
  Web Services` 中执行。


