- fmt: '# 安装与配置


    ## 在 IIS 中启用 PHP


    最后一步是在 Web 服务器中启用 PHP。这与在 Linux 上的 Apache 中的操作方式类似。


    IIS 使用 FastCGI 接口在 IIS 和 PHP 之间进行通信。在 Linux 上，PHP 是作为 Web 服务器下的模块安装和加载的。


    首先，在 IIS 管理器的左侧窗格中点击`Default Web Site`，这将显示一个图标列表。然后双击名为`Handler Mappings`的图标，接着点击右侧窗格中的`Add
    Module Mapping`链接。这将打开一个包含四个输入框的输入对话框。第一个输入框用于定义请求路径。我们希望 PHP 解释器对所有以`.php`结尾的文件进行调用，因此该值应为`*.php`。


    下一个输入框是一个下拉菜单，包含多个可供选择的模块。请务必选择`FastCGIModule`，而不是`CGIModule`。Web 服务器与模块之间的接口不同，如果使用了错误的版本，请求将失败。在第三个输入框中，输入`php-cgi.exe`的路径（或使用浏览按钮定位该文件），最后为模块映射输入一个名称。如下面的屏幕截图所示，我选择了`PHP`。


    至此，IIS Web 服务器已配置为可以处理对 PHP 脚本的请求。重启 Web 服务器，并将之前使用的`phpinfo.php`文件放置在文档根目录（`c:\inetpub\wwwroot`）中。如果你想从其他计算机访问该服务器，则需要关闭防火墙，或为
    TCP 端口 8080（如果你使用的是该端口）添加一条规则。


    ![Image 10](index-48_1.jpg)


    示例脚本将生成如下输出：


    ## 使用 Apache Lounge 提供的二进制文件安装 Apache


    可以从 Apache Lounge 获取 Apache 的二进制文件。相关链接可以在 [http://windows.php.net](http://windows.php.net/)
    找到。下载与你的系统版本匹配的 zip 文件，并将内容解压到`C:\Apache24\`。该目录与`httpd.conf`文件中的配置相匹配。如果你选择安装在其他目录中，请更新`httpd.conf`文件以匹配该位置。


    默认配置也使用端口 80。为了同时运行 IIS 和 Apache，以及其他可能使用端口 80 的应用程序，有必要更改 Apache 的端口。在本示例中，我通过更新`c:\Apache24\conf\httpd.conf`中的以下行，将端口更改为
    8090：


    从：

    ```

    Listen 80

    ```

    改为：

    ```

    Listen 8090

    ```


    最后一步是使用以下命令启动 Web 服务器：


    ```

    C:\Apache24\bin\httpd.exe

    ```


    此命令用于创建服务器的单个实例。只有当该进程运行时，服务器才会运行。也可以安装一个服务，使其在计算机启动时自动启动。在启动命令中添加`-k install`参数即可实现：`C:\Apache24\bin\httpd.exe
    -k install`


    与之前一样，在浏览器中指向该服务器，即可测试 Web 服务器。此时 URL 为 `http://localhost:8090`。


    ## 配置 Apache 以支持 PHP 请求


    最后一步是配置服务器以支持 PHP 请求。这可以通过使用 PHP 线程安全版本附带的 Apache 模块来实现，也可以通过使用用于 IIS 服务器的 FastCGI
    接口来实现。


    ### 使用 Apache 模块进行配置


    进行以下更改：


    首先，创建一个名为`C:\Apache24\conf\extras\httpd-php.conf`的文件，并添加以下内容：


    ```

    #

    LoadModule php7_module "C:/PHP/php7apache2_4.dll"

    AddHandler application/x-httpd-php .php

    <IfModule php7_module>

    PHPIniDir "C:/PHP"

    </IfModule>

    ```


    然后，在`C:\Apache24\conf\httpd.conf`文件的末尾添加以下行：


    ```

    Include conf/extra/httpd-php.conf

    ```


    ![Image 11](index-50_1.jpg)


    启动 Apache 服务器后，它将支持 PHP 请求，并且`phpinfo()`的输出将如下所示：


    ### 使用 FastCGI 接口进行配置


    为了配置 Apache 使用 FastCGI 版本的 PHP，需要下载并安装一个额外的 Apache 模块，名为`mod_fcgid.so`。该文件应放置在`c:\Apache24\modules`中，并且
    PHP 的配置文件（`C:\Apache24\conf\extras\httpd-php.conf`）应更改为以下内容：


    ```

    #

    LoadModule fcgid_module modules/mod_fcgid.so

    FcgidInitialEnv PHPRC "C:/PHP"

    AddHandler fcgid-script .php

    FcgidWrapper "C:/PHP/php-cgi.exe" .php

    ```


    第一行也可以放在主配置文件（`C:\Apache24\conf\httpd.conf`）中。第二行指示 PHP 在`C:\PHP`中查找`php.ini`文件。第三行指示
    Apache 通过 FastCGI API 处理对`.php`文件的请求，最后一行指示 FastCGI 调用`php-cgi.exe`可执行文件。


    此外，还需要添加一个名为`ExecCGI`的选项，以允许 Apache 执行 CGI 脚本。这可以通过在主文件中更改`<Directory>`部分的`Options`来实现，将`Options
    Indexes FollowSymLinks`改为`Options ExecCGI Indexes FollowSymLinks`，或者对每个需要相同权限的虚拟主机进行类似的更改。


    如果我们在浏览器中加载`phpinfo.php`文件，输出将显示服务器正在使用 CGI/FastCGI 服务器 API，而不是 Apache2Handler。


    在 Apache 和 IIS 中使用 FastCGI 接口，可以在同一系统上安装多个版本的 PHP。创建多个指向同一文档根目录但使用不同 CGI 处理程序的虚拟主机，可以非常方便地使用不同版本的
    PHP 测试应用程序代码。


    ---


    ## 配方 1-2：配置 PHP


    ### 问题


    上一节的重点是安装 Web 服务器并对其进行基本配置，以便与 PHP 配合使用。PHP 有大量独立于 Web 服务器的配置选项。那么，配置 PHP 的最佳方法是什么？


    ### 解决方案


    基本配置通过一个名为`php.ini`的文件完成。该文件可以位于多个不同的位置，具体取决于 PHP 的编译和安装方式以及所安装的操作系统。此外，还可以根据执行
    PHP 脚本所使用的服务器 API，拥有不同的`php.ini`文件。这使得可以为 Web 服务器使用一个`php.ini`文件，而为作为 cron 作业或命令行执行脚本的
    CLI 版本 PHP 使用另一个不同的文件。


    在大多数 Linux 和 Mac OSX 系统上，`php.ini`文件的常见位置是`/etc/php.ini`，而在 Windows 上，通常将这些文件放在`C:\Windows`文件夹中，但也可以根据环境变量或其他配置选项将其放置在其他位置。


    如果只找到一个`php.ini`文件，它将用于所有服务器 API。有一种特殊的命名约定，可以为每个服务器 API 指定特定的文件。这些文件的名称可以通过将
    SAPI 的名称替换到`php-SAPI.ini`文件的名称中来实现。常见的 SAPI 名称包括`cli`、`apache`、`apache2handler`、`cgi-fcgi`、`isapi`等。


    `php.ini`中的某些设置可以在运行时设置或覆盖。这通过`ini_set()`函数完成。一些设置会影响资源和安全性，这些设置只能在主`php.ini`文件（系统管理员）中定义；其他设置可以在每个目录的基础上设置，还有一些可以由脚本在运行时设置（通过`ini_set()`）。


    通常的做法是为开发环境使用一种配置，为生产环境使用另一种配置。在开发环境中，通常希望将错误和警告直接显示在网页中；而在生产环境中，最好不显示任何可能暴露漏洞或仅仅使访问者感到困惑的错误或警告。


    如果服务器托管多个虚拟主机，则可能需要在 PHP 级别覆盖某些值。'
  raw: 'The final step is to enable PHP in the web server. This is similar to how
    it was done for Apache on Linux.


    IIS uses the FastCGI interface to communicate between IIS and PHP. On Linux, PHP
    was installed and loaded as a module under the web server.


    Start by clicking on the Default Web Site in the left pane of the IIS Manager.
    That will bring up a list of icons. Then double-click on the icon called Handler
    Mappings. Then click on the Add Module Mapping link in the right pane. This opens
    an input dialog with four input boxes. The first one is where the request path
    is defined. We want the PHP interpreter to be invoked on all files ending in .php
    so the value should be *.php.


    The next box is a drop-down with a number of different modules to choose from.
    Make sure to select the FastCGIModule and not the CGIModule. The interface between
    the web server and the module are different and the request will fail if the wrong
    version is used. In the third box enter the path to php-cgi.exe (or use the browse
    button to locate the file) and finally enter a name for the Module Mapping. I
    chose PHP as shown in the screen shot below.


    The IIS Web server is now configured to serve requests to PHP scripts. Restart
    the web server and place the same phpinfo.php file we used before in the document
    root (c:\inetpub\wwwroot). If you want to access the server from other computers
    you will have to turn the firewall off or add a rule for the TCP port 8080 (if
    that''s the one you used).


    ![Image 10](index-48_1.jpg)


    CHAPTER 1 ■ INSTALLATION AND CONFIGURATION


    The sample script will generate output like this:


    Apache can be installed with binaries provided by Apache Lounge . The links to
    these can be found on


    [http://windows.php.net . Do](http://windows.php.net/)wnload the zip file with
    the version that matches your system and unzip the contents to C:\Apache24\. This
    directory matches the configuration in the httpd.conf file. If you choose to install
    in a different directory, update the httpd.conf file to match the location.


    The default configuration is also using port 80\. In order to run both IIS and
    Apache and possible other applications working on port 80 it is necessary to change
    the port for Apache. In this example I change the port to 8090 by updating the
    line in c:\Apache24\conf\httpd.conf


    From


    Listen 80


    To


    Listen 8090


    CHAPTER 1 ■ INSTALLATION AND CONFIGURATION


    The final step is to start the web server with this command:


    C:\Apache24\bin\httpd.exe


    This command is useful to create a single instance of the server. The server will
    only be running as long as this process is running. It is also possible to install
    a service that starts automatically when the computer is started. Adding -k install
    as an argument to the start command does this: C:\Apache24\bin\httpd.exe -k install


    As before, pointing a browser to the server, it''s now possible to test the web
    server. In this case the URL


    is http://localhost:8090.


    The final step is to configure the server to support PHP requests. This can be
    done by using the Apache module that comes with the thread safe version of PHP
    or by using the FastCGI interface used for the IIS server.


    Configuring with the Apache module requires these changes:


    Start by creating a file called C:\Apache24\conf\extras\httpd-php.conf and add
    the following lines:


    #


    LoadModule php7_module "C:/PHP/php7apache2_4.dll"


    AddHandler application/x-httpd-php .php


    <IfModule php7_module>


    PHPIniDir "C:/PHP"


    </IfModule>


    Then add the following line to the end of C:\Apache24\conf\https.conf


    Include conf/extra/httpd-php.conf


    ![Image 11](index-50_1.jpg)


    CHAPTER 1 ■ INSTALLATION AND CONFIGURATION


    Starting the Apache server will now support PHP requests and the output from phpinfo()
    looks like this: In order to configure Apache to use the FastCGI version of PHP
    it is necessary to download and install an additional Apache module called mod_fcgid.so.
    This file should be placed in c:\Apache24\modules and the configuration file for
    PHP (C:\Apache24\conf\extras\httpd-php.conf ) should be changed to this:


    #


    LoadModule fcgid_module modules/mod_fcgid.so


    FcgidInitialEnv PHPRC "C:/PHP"


    AddHandler fcgid-script .php


    FcgidWrapper "C:/PHP/php-cgi.exe" .php


    The first line can also be placed in the main configuration file (C:\Apache24\conf\httpd.conf
    ). The second line instructs PHP to look for the php.ini file in C:\PHP. The third
    line instructs Apache to handle requests for .php files via the FastCGI API, and
    the last line instructs FastCGI to call the php-cgi.exe executable.


    CHAPTER 1 ■ INSTALLATION AND CONFIGURATION


    In addition it is necessary to add an option called ExecCGI to allow Apache to
    execute the CGI script.


    This is either done in the main file by changing the Options in the <Directory>
    section from “Options Indexes FollowSymLinks” to “Options ExecCGI Indexes FollowSymLinks”
    or by a similar change for each virtual host that needs the same permissions.


    If we load the phpinfo.php file in a browser the output will now show that the
    server is using the CGI/


    FastCGI server API instead of the Apache2Handler.


    Using the FastCGI interface in Apache and IIS makes it possible to install multiple
    versions of PHP on the same system. Creating multiple virtual hosts pointing to
    the same document root but utilizing different CGI handlers makes it very easy
    to test the application code with different versions of PHP.


    Recipe 1-2\. Configuring PHP


    Problem


    The focus in the previous section was to install and perform basic configuration
    of a web server to be used with PHP. There are a large number of configuration
    options for PHP that works independently of the web server. What is the best approach
    to configuring PHP?


    Solution


    The basic configuration is done through a file called php.ini. It can be located
    in a number of different places depending on how PHP is compiled and installed
    and which operating system of PHP it is installed on. In addition it''s possible
    to have different php.ini files based on which server API is used to execute the
    PHP


    script. This makes it possible to have one php.ini file that''s used by the web
    server and a different file that is used when the CLI version of PHP is used to
    execute a script as a cron job or command line.


    A common location of the php.ini file(s) is in /etc/php.ini on most Linux and
    Mac OSX systems, and on Windows it''s common to place these files in the C:\Windows
    folder but it can be placed in other locations based on environment variables
    or other configuration options.


    If php.ini is the only file that''s found it will be used by all server API''s.
    There is a special naming convention that makes it possible to have files specific
    to each server API. The name of each of these can be used as the replacement for
    ASPI in the name of the php-SAPI.ini file. Common names for SAPI''s are cli, apache,
    apache2handler, cgi-fcgi, isapi, and many more.


    Some of the settings in php.ini can be set or overwritten at runtime. This is
    done with the ini_set() function. Some settings have an impact on resources and
    security, and these can only be defined in the main php.ini file (system administrator),
    and others can be set in per directory bases and some can be set by the script
    at runtime ( ini_set() ).


    It is common practice to use one configuration for the development environment
    and another for the production environment. In the development environment it''s
    often helpful to get error and warnings shown directly in the web page, and in
    the production environment it''s preferred not to show any errors or warnings
    that might expose vulnerabilities or simply confuse the visitor.


    If the server is hosting multiple virtual hosts it can be necessary to overwrite
    certain values on the php.'
