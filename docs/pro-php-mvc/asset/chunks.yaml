    # 设置 Web 服务器


    看到这种情况，`Skype` 选择使用 `80` 端口作为默认通信端口，这样它就能绕过最严格的安全软件。问题是 `Apache` 或 `Skype`（但不能两者同时）可以使用
    `80` 端口。


    我们可以让 `Apache` 运行在不同的端口上，并不断更改浏览器地址栏以匹配，或者更改 `Skype` 设置。我建议更改 `Skype`！要让 `Skype`
    使用不同的端口，请转到 `Skype` ➤ `Options` ➤ `Advanced` ➤ `Connection` ➤ 并取消选中 "`Use port
    80 and 443 as alternatives...`"（见图 A-4）。现在重启 `Skype` 和 `WAMP`，问题应该可以解决。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 6](img/index-438_1.png)


    附录 A ■ 设置 Web 服务器


    ***Figure A-4.*** 让 Skype 离开 80 端口


    ## 配置 Apache/PHP


    我们需要在 `Apache` 和 `PHP` 中启用一些模块并更改一些设置。首先，启用所有需要的模块。再次左键单击 `WAMP` 图标，然后选择 `Apache`
    ➤ `Apache modules` ➤ `rewrite_module`。


    对 `cache_module`、`headers_module` 和 `expires_module` 重复此过程。每次启用一个模块，`WAMP` 都会重启服务器。然后，左键单击
    `WAMP` 图标，选择 `PHP` ➤ `PHP extensions` ➤ `php_memcache`。


    接下来，我们需要更新 `Apache` 的文档根目录，使其指向我们应用程序文件夹内的 `public` 文件夹。


    左键单击 `WAMP` 图标，选择 `Apache` ➤ `httpd.conf`。将找到默认路径（`c:/wamp/www`）的两个位置都更新为正确的路径，如图
    A-5 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 7](img/index-439_1.png)


    附录 A ■ 设置 Web 服务器


    ***Figure A-5.*** 设置正确的 DocumentRoot


    ## 步骤 2


    安装 `Memcached` 稍微不那么友好。访问 [`code.jellycan.com/memcached/`](http://www.code.jellycan.com/memcached/)
    并下载 32 位 Windows 二进制归档文件。下载后，将其解压到 `c:\memcached`（您可能需要创建此文件夹）。


    您需要指示 Windows 以管理员身份运行 `Memcached` 可执行文件。为此，右键单击可执行文件，转到 `Properties` ➤ `Compatibility`
    并选中 "`Run this program as an administrator`"（见图 A-6）。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 8](img/index-440_1.jpg)


    ![Image 9](img/index-440_2.png)


    附录 A ■ 设置 Web 服务器


    ***Figure A-6.*** 以管理员身份运行可执行文件


    接下来，打开命令提示符并输入以下命令，如图 A-7 所示：


    ***Figure A-7.*** 安装和启动 Memcached


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 10](img/index-441_1.png)


    附录 A ■ 设置 Web 服务器


    - `cd c:\memcached`

    - `memcached –d install`

    - `memcached –d start`


    ### 什么是 MSVCP71.dll？


    如果您看到有关类似名称缺失文件的错误，请不要惊慌。似乎微软遗漏了一些许多第三方软件包（例如 `Memcached`）经常使用的库。要安装这些缺失的库，请访问
    [`www.addictivetips.com/?attachment_id=38105`](http://www.addictivetips.com/?attachment_id=38105)
    并下载包含两个 `.dll` 文件的归档文件。


    下载后，将这些文件解压到 `c:\Windows\System32` 目录或 `c:\Windows\SysWOW64` 目录（取决于您运行的是 32 位还是
    64 位系统）。现在，`Memcached` 可执行文件应该可以按预期工作了。


    ## 步骤 3


    我们需要创建一个数据库用户和模式供框架使用。左键单击 `WAMP` 图标并选择 `phpMyAdmin`。此界面允许您直接与 `WAMP` 安装的 `MySQL`
    服务器交互。转到 `Databases` ➤ `Create new database`，并输入数据库名称（我选择了 `prophpmvc`），如图 A-8
    所示。


    ***Figure A-8.*** 创建数据库和模式


    接下来，转到 `Privileges` ➤ `Add a new User` 并填写用户名、密码和权限，如图 A-9 到 A-11 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 11](img/index-442_1.png)


    ![Image 12](img/index-442_2.png)


    附录 A ■ 设置 Web 服务器


    ***Figure A-9.*** 用户权限中心


    ***Figure A-10.*** 添加用户名和密码


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 13](img/index-443_1.png)


    附录 A ■ 设置 Web 服务器


    ***Figure A-11.*** 权限


    > **注意:** 请务必使用正确的数据库用户名、密码和模式更新单元测试。


    ## Linux


    在本节中，我们将介绍在 Ubuntu 11.10 中的安装过程。这些软件包的安装通常被称为 LAMP（**L**inux **A**pache **M**ySQL
    **P**HP）。虽然可能存在小的差异，但本节描述的方法应该适用于其他 Linux 发行版。


    ### 步骤 1


    通过输入 `sudo –s` 并提供 root 帐户密码切换到 root 用户帐户。后续命令需要 root 访问权限才能正确安装/配置。获得 root 访问权限后，输入以下命令，并在提示时输入
    `Y`：


    - `apt-get update`

    - `apt-get install tasksel`（见图 A-12）

    - `tasksel`


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 14](img/index-444_1.png)


    ![Image 15](img/index-444_2.png)


    附录 A ■ 设置 Web 服务器


    ***Figure A-12.*** 安装 tasksel


    从图 A-13 所示的选项列表中选择 LAMP 服务器。在安装的某个时刻，系统会要求您提供 `MySQL` 用户名和密码。我选择使用 `root/root`，因为它易于记忆并且适用于开发环境。


    ***Figure A-13.*** 选择要安装的软件包


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 16](img/index-445_1.png)


    ![Image 17](img/index-445_2.png)


    附录 A ■ 设置 Web 服务器


    ### 步骤 2


    与 `WAMP` 不同，`tasksel` 不会自动将 `phpMyAdmin` 与 LAMP 服务器软件包一起安装。


    要安装 `phpMyAdmin`，请输入命令 `apt-get install phpMyAdmin`。选择 `apache2`（见图 A-14），使用 `dbconfig-common`
    进行配置（见图 A-15），并提供您刚为 `MySQL` 设置的用户名/密码（见图 A-16）。


    ***Figure A-14.*** 将 phpMyAdmin 与 Apache 集成


    ***Figure A-15.*** 使用 dbconfig-common


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 18](img/index-446_1.png)


    附录 A ■ 设置 Web 服务器


    ***Figure A-16.*** 为 MySQL 提供用户名/密码


    设置完 `phpMyAdmin` 后，请随意为您的应用程序/单元测试创建 `prophpmvc` 数据库和用户名/密码。您可以按照与 Windows 7 完全相同的方式执行此操作，因为
    `phpMyAdmin` 在两者中的工作方式应类似。


    ### 步骤 3


    安装 `Memcached` 再简单不过了。只需输入命令 `apt-get install memcached php5-memcache`，并在提示时回答
    `Y`（见图 A-17）。安装完成后，`Apache2` 服务器（以及 `Memcached` 服务）将重启，并且 `Memcached` 将可供使用。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 19](img/index-447_1.png)


    附录 A ■ 设置 Web 服务器


    ***Figure A-17.*** 安装 Memcached


    ### 步骤 4


    在 Ubuntu 中，我们需要做的最后一件事是将文件的所有权设置为 `Apache2` 并设置正确的文档根目录。使用以下命令从同一文件夹内更改文件的所有权：`chown
    –R www-data:www-data *`


    接下来，输入 `vim /etc/apache2/sites-enabled/000-default`，并将显示 `DocumentRoot` 的行更改为应用程序目录
    `public` 文件夹的正确路径。我的路径是 `/var/www/public`，因此配置文件中的那一行应改为 `DocumentRoot /var/www/public`（见图
    A-18）。


    [www.it-ebooks.info](http://www.it-ebooks.info/)

