    # PHP 解决方案 15-3：添加图像外键（PDO）


    此 PHP 解决方案使用 PDO，通过将所选图像的主键作为外键添加到 `blog` 表中来更新记录。与 MySQLi 的主要区别在于，PDO 可以使用 `bindValue()`
    方法将 `null` 值绑定到占位符。以下说明改编自第 13 章的 `admin/blog_update_pdo.php`。请使用您在第 13 章中创建的版本。或者，将
    `ch13` 文件夹中的 `blog_update_pdo_03.php` 复制到 `admin` 文件夹，并从文件名中移除 `_03`。


    将 `image_id` 添加到用于检索待更新文章详情的 `SELECT` 查询中，并将结果绑定到 `$image_id`。这涉及到重新编号传递给 `bindColumn()`
    作为第一个参数的列，这些列对应 `$title` 和 `$article`。修改后的代码如下所示：


    ```

    if (isset($_GET[''article_id'']) && !$_POST) {


    // 准备 SQL 查询


    $sql = ''SELECT article_id, image_id, title, article FROM blog


    WHERE article_id = ?'';


    $stmt = $conn->prepare($sql);


    // 将占位符值作为单元素数组传递给 execute()


    $OK = $stmt->execute([$_GET[''article_id'']]);


    // 绑定结果


    $stmt->bindColumn(1, $article_id);


    $stmt->bindColumn(2, $image_id);


    $stmt->bindColumn(3, $title);


    $stmt->bindColumn(4, $article);


    $stmt->fetch();


    }

    ```


    在表单内部，你需要显示存储在 `images` 表中的文件名。由于第二个 `SELECT` 语句不依赖于外部数据，因此使用 `query()` 方法比预处理语句更简单。在
    `article` 文本区域之后添加以下代码（虽然这些都是新代码，但为方便参考，PHP 部分已用粗体突出显示）：


    ```

    <p>


    <label for="image_id">已上传的图像：</label>


    <select name="image_id" id="image_id">


    <option value="">选择图像</option>


    <?php


    // 获取图像列表


    $getImages = ''SELECT image_id, filename


    FROM images ORDER BY filename'';


    foreach ($conn->query($getImages) as $row) {


    ?>


    <option value="<?= $row[''image_id'']; ?>"


    <?php


    if ($row[''image_id''] == $image_id) {


    echo ''selected'';


    }


    ?> > <?= $row[''filename'']; ?></option>


    <?php } ?>


    </select>


    </p>

    ```


    第一个 `<option>` 标签是硬编码的，标签为 `选择图像`，其 `value` 设置为空字符串。其余的 `<option>` 标签由 `foreach`
    循环填充，该循环执行 `$getImages SELECT` 查询并将每条记录提取到一个名为 `$row` 的数组中。


    一个条件语句检查当前的 `image_id` 是否与 `articles` 表中已存储的相同。如果相同，则在 `<option>` 标签中插入 `selected`，以便在下拉菜单中显示正确的值。


    确保不要遗漏以下代码行中的第三个字符：


    ```

    ?> > <?= $row[''filename'']; ?></option>

    ```


    这是 `<option>` 标签的右尖括号，夹在两个 PHP 标签之间。


    保存页面并将其加载到浏览器中。您应该会自动重定向到 `blog_list_pdo.php`。选择其中一个 `EDIT` 链接，并确保您的页面看起来像图 15-4。检查浏览器源代码视图以验证
    `<option>` 标签的 value 属性是否包含每张图片的主键。


    最后一步是将 `image_id` 添加到 `UPDATE` 查询中。当博客条目未关联图像时，您需要在 `image_id` 列中输入 `null`。这涉及到更改将值绑定到预处理语句中匿名占位符的方式。您需要使用
    `bindValue()` 和 `bindParam()`，而不是将它们作为数组传递给 `execute()` 方法。修改后的代码如下所示：


    ```

    // 如果表单已提交，则更新记录


    if (isset($_POST[''update''])) {


    // 准备更新查询


    $sql = ''UPDATE blog SET image_id = ?, title = ?, article = ?


    WHERE article_id = ?'';


    $stmt = $conn->prepare($sql);


    if (empty($_POST[''image_id''])) {


    $stmt->bindValue(1, NULL, PDO::PARAM_NULL);


    } else {


    $stmt->bindParam(1, $_POST[''image_id''], PDO::PARAM_INT);


    }


    $stmt->bindParam(2, $_POST[''title''], PDO::PARAM_STR);


    $stmt->bindParam(3, $_POST[''article''], PDO::PARAM_STR);


    $stmt->bindParam(4, $_POST[''article_id''], PDO::PARAM_INT);


    // 执行查询


    $done = $stmt->execute();


    }

    ```


    值通过数字（从 1 开始计数）绑定到匿名占位符，以标识应应用于哪个占位符。一个条件语句检查 `$_POST[''image_id'']` 是否为空。如果为空，`bindValue()`
    将值设置为 `null`，使用关键字 `NULL` 作为第二个参数，并使用 PDO 常量作为第三个参数。如第 11 章中 “在 PDO 预处理语句中嵌入变量”
    所述，当绑定的值不是变量时，需要使用 `bindValue()`。


    其余值都是变量，因此使用 `bindParam()` 绑定。对于这些值，我使用了整数和字符串的 PDO 常量。这并非严格必要，但能使代码更清晰。


    最后，`execute()` 方法括号内的值数组已被移除。


    再次测试页面，从下拉菜单中选择一个文件名，然后点击 `更新条目`。您可以通过在 phpMyAdmin 中刷新 `浏览` 或选择同一篇文章进行更新来验证外键是否已插入到
    `articles` 表中。这次，下拉菜单中应显示正确的文件名。


    如有必要，请对照 `ch15` 文件夹中的 `blog_update_pdo_04.php` 检查您的代码。


    ## 从多个表中选取记录


    在 `SELECT` 查询中有几种链接表的方法，但最常见的是列出表名，并用 `INNER JOIN` 分隔。`INNER JOIN` 本身会产生行的所有可能组合（笛卡尔连接）。要仅选择相关值，你需要指定主键
    / 外键关系。例如，要从 `blog` 和 `images` 表中选择文章及其相关图像，你可以使用 `WHERE` 子句，如下所示：


    ```

    SELECT title, article, filename, caption


    FROM blog INNER JOIN images


    WHERE blog.image_id = images.image_id

    ```


    `title` 和 `article` 列仅存在于 `blog` 表中。同样，`filename` 和 `caption` 仅存在于 `images` 表中。它们是无歧义的，不需要限定。但是，`image_id`
    同时存在于两个表中，因此你需要为每个引用加上表名和一个句点作为前缀。


    多年来，常见做法是使用逗号代替 `INNER JOIN`，如下所示：


    ```

    SELECT title, article, filename, caption


    FROM blog, images


    WHERE blog.image_id = images.image_id

    ```


    > **注意：** 使用逗号连接表可能导致 SQL 语法错误，因为自 MySQL 5.0.12 以来连接的处理方式发生了变化。请改用 `INNER JOIN`。


    你可以使用 `ON` 来代替 `WHERE` 子句，如下所示：


    ```

    SELECT title, article, filename, caption


    FROM blog INNER JOIN images ON blog.image_id = images.image_id

    ```


    当两列名称相同时，你可以使用以下语法，这也是我个人偏好的方式：


    ```

    SELECT title, article, filename, caption


    FROM blog INNER JOIN images USING (image_id)

    ```


    > **注意：** `USING` 后面的列名必须放在括号中。

    '
- fmt: "# PHP Solution 15-4: Building the Details Page\n\nThis PHP solution shows\
    \ how to join the `blog` and `images` tables to display a selected article with\
    \ its associated photo. The code for MySQLi and PDO is almost identical, so this\
    \ solution covers both.\n\nCopy `details_01.php` from the `ch15` folder to the\
    \ `phpsols` site root and rename it `details.php`. Do not update the links if\
    \ your editing environment prompts you to do so. Make sure that `footer.php` and\
    \ `menu.php` are in the `includes` folder, and load the page in a browser. It\
    \ should look like Figure [15-5](#A978-1-4842-0635-5_15_Chapter.html#Fig5).\n\n\
    ![A978-1-4842-0635-5_15_Fig5_HTML.jpg](A978-1-4842-0635-5_15_Fig5_HTML.jpg)\n\n\
    Figure 15-5.\n\nThe details page contains a placeholder image and text. Load `blog_list_mysqli.php`\
    \ or `blog_list_pdo.php` into a browser and update the following three articles\
    \ by assigning the image filename as indicated:\n\n- Basin of Contentment: `basin.jpg`\n\
    - Tiny Restaurants Crowded Together: `menu.jpg`\n- Trainee Geishas Go Shopping:\
    \ `maiko.jpg`\n\nNavigate to the `blog` table in phpMyAdmin and click the `Browse`\
    \ tab to check that the foreign keys have been registered. At least one article\
    \ should have `NULL` as the value for `image_id`, as shown in Figure [15-6](#A978-1-4842-0635-5_15_Chapter.html#Fig6).\n\
    \n![A978-1-4842-0635-5_15_Fig6_HTML.jpg](A978-1-4842-0635-5_15_Fig6_HTML.jpg)\n\
    \nFigure 15-6.\n\nThe foreign key of the article not associated with an image\
    \ is set to `NULL`. In `details.php`, include `utility_funcs.php` from the previous\
    \ chapter (if necessary, copy it from the `ch14` folder to the `includes` folder).\
    \ Then include the database connection file, create a read-only connection, and\
    \ prepare the SQL query inside a PHP code block above the `DOCTYPE` declaration,\
    \ like this:\n\n```php\nrequire_once './includes/utility_funcs.php';\nrequire_once\
    \ './includes/connection.php';\n// connect to the database\n$conn = dbConnect('read');\
    \  // add 'pdo' if necessary\n// check for article_id in query string\nif (isset($_GET['article_id'])\
    \ && is_numeric($_GET['article_id'])) {\n    $article_id = (int) $_GET['article_id'];\n\
    } else {\n    $article_id = 0;\n}\n$sql = \"SELECT title, article,DATE_FORMAT(updated,\
    \ '%W, %M %D, %Y') AS updated,\n        filename, caption\n        FROM blog INNER\
    \ JOIN images USING (image_id)\n        WHERE blog.article_id = $article_id\"\
    ;\n$result = $conn->query($sql);\n$row = $result->fetch_assoc();  // for PDO use\
    \ $result->fetch();\n```\n\nThe code checks for `article_id` in the `URL` query\
    \ string. If it exists and is numeric, it's assigned to `$article_id` using the\
    \ `(int)` casting operator to make sure it's an integer. Otherwise, `$article_id`\
    \ is set to `0`. You could choose a default article instead, but leave it at `0`\
    \ for the moment because I want to illustrate an important point.\n\nThe `SELECT`\
    \ query retrieves the `title`, `article`, and `updated` columns from the `blog`\
    \ table, and the `filename` and `caption` columns from the `images` table. The\
    \ value of `updated` is formatted using the `DATE_FORMAT()` function and an alias,\
    \ as described in [Chapter 14](#A978-1-4842-0635-5_14_Chapter.html). Because only\
    \ one record is being retrieved, using the original column name as the alias doesn't\
    \ cause a problem with the sort order.\n\nThe tables are joined using `INNER JOIN`\
    \ and a `USING` clause that matches the values in the `image_id` columns in both\
    \ tables. The `WHERE` clause selects the article identified by `$article_id`.\
    \ Since the data type of `$article_id` has been checked, it's safe to use in the\
    \ query. There's no need to use a prepared statement.\n\nNote that the query is\
    \ wrapped in double quotes so that the value of `$article_id` is interpreted.\
    \ To avoid conflicts with the outer pair of quotes, single quotes are used around\
    \ the format string passed as an argument to `DATE_FORMAT()`.\n\nThe rest of the\
    \ code displays the results of the SQL query in the main body of the page. Replace\
    \ the placeholder text in the `<h2>` tags like this:\n\n```php\n<h2>\n<?php if\
    \ ($row) {\n    echo $row['title'];\n} else {\n    echo 'No record found';\n}\n\
    ?>\n</h2>\n```\n\nIf the `SELECT` query finds no results, `$row` will be empty,\
    \ which PHP interprets as `false`. So this displays the title, or \"No record\
    \ found\" if the result set is empty.\n\nReplace the placeholder date like this:\n\
    \n```php\n<p><?php if ($row) { echo $row['updated']; } ?></p>\n```\n\nImmediately\
    \ following the date paragraph is a `<figure>` element containing a placeholder\
    \ image. Not all articles are associated with an image, so the `<figure>` needs\
    \ to be wrapped in a conditional statement that also checks that `$row['filename']`\
    \ contains a value. Amend the `<figure>` like this:\n\n```php\n<?php\nif ($row\
    \ && !empty($row['filename'])) {\n    $filename = \"images/{$row['filename']}\"\
    ;\n    $imageSize = getimagesize($filename)[3];\n?>\n<figure>\n    <img src=\"\
    <?= $filename; ?>\" alt=\"<?= $row['caption']; ?>\" <?= $imageSize;?>>\n</figure>\n\
    <?php } ?>\n```\n\nThis uses code that was described in [Chapter 12](#A978-1-4842-0635-5_12_Chapter.html),\
    \ so I won't go into it again.\n\nFinally, you need to display the article. Delete\
    \ the paragraph of placeholder text, and add the following code between the closing\
    \ curly brace and closing PHP tag at the end of the final code block in the previous\
    \ step:\n\n```php\n<?php }\nif ($row) { echo convertToParas($row['article']);\
    \ }\n?>\n```\n\nThis uses the `convertToParas()` function in `utility_funcs.php`\
    \ to wrap the blog entry in `<p>` tags and replace sequences of newline characters\
    \ with closing and opening tags (see \"Displaying paragraphs\" in [Chapter 14](#A978-1-4842-0635-5_14_Chapter.html)).\n\
    \nSave the page and load `blog.php` into a browser. Click the `More` link for\
    \ an article that has an image assigned through a foreign key. You should see\
    \ `details.php` with the full article and image laid out as shown in Figure [15-7](#A978-1-4842-0635-5_15_Chapter.html#Fig7).\n\
    \nCheck your code, if necessary, with `details_mysqli_01.php` or `details_pdo_01.php`\
    \ in the `ch15` folder.\n\n![A978-1-4842-0635-5_15_Fig7_HTML.jpg](A978-1-4842-0635-5_15_Fig7_HTML.jpg)\n\
    \nFigure 15-7.\n\nThe details page pulls the article from one table and the image\
    \ from another. Click the link back to `blog.php` and test the other items. Each\
    \ article that has an image associated with it should display correctly. Click\
    \ the `More` link for the article that doesn't have an image. This time you should\
    \ see the result shown in Figure [15-8](#A978-1-4842-0635-5_15_Chapter.html#Fig8).\n\
    \n![A978-1-4842-0635-5_15_Fig8_HTML.jpg](A978-1-4842-0635-5_15_Fig8_HTML.jpg)\n\
    \nFigure 15-8.\n\nThe lack of an associated image causes the `SELECT` query to\
    \ fail.\n\nYou know that the article is in the database because the first two\
    \ sentences wouldn't be displayed in `blog.php` otherwise. To understand this\
    \ sudden \"disappearance,\" refer to Figure [15-6](#A978-1-4842-0635-5_15_Chapter.html#Fig6).\
    \ The value of `image_id` is `NULL` for the record that doesn't have an image\
    \ associated with it. Because all the records in the `images` table have a primary\
    \ key, the `USING` clause can't find a match. The next section explains how to\
    \ deal with this type of situation."
