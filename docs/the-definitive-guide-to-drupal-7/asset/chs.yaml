- '# 哦，原来你的名字是这么念的！


  在北美大陆上所有这些大规模且引人注目的活动发生七个月后，大西洋彼岸的 Drupal 迎来了一项传统，这一传统最终定义了其文化本身的特质，其意义与 2004 年的那些事件同样深远（尽管规模要私密得多）。


  ![images](img/square.jpg) **提示** 这少不了大量的啤酒和插排。


  2005 年 2 月 26 日，一个重要里程碑出现了：被广泛认为是首届 Drupal 会议的日子（尽管严格来说，首次独立的 `DrupalCon` 还要再过七个月才举行）。`FOSDEM`，即自由与开源开发者欧洲会议，是一项至今仍在比利时布鲁塞尔每年举办的活动，“由志愿者组织，旨在推广自由与开源软件的广泛使用”，并为开发者提供一个交流的场所。^(5)
  来自世界各地的 3000 到 3500 人参加了 `FOSDEM 2005`。除了安排的演讲者和以闪电演讲形式进行的简短项目演示外，`FOSDEM 2005`
  还设有十八个开发者讨论室，其中就包括 Drupal 的讨论室。^(6)


  然而，`DrupalCons` 并非上面提示所指的传统。真正重要的事件发生在 `FOSDEM` 前两日。


  2005 年 2 月 24 日至 25 日，即 `Drupal 4.5` 发布四个月后，Drupalistas 们聚集在比利时安特卫普，举行了首次官方 Drupal
  开发者冲刺活动。来自 11 个国家的 26 位 Drupal 开发者会面，共同协作（面对面地）解决冲刺组织者们认定在集会前需要集中精力处理的问题。大约 80%
  的开发者是从西欧以外地区赶来参加此次活动的，其中 12 人来自不同的洲。


  为了相聚而飞越重洋的传统由此诞生。


