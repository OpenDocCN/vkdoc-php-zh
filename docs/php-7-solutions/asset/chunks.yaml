    **注意** 在本书的示例文件中，我使用了 `0Ch@Nom1$u` 作为密码。MySQL 密码是区分大小写的。


    3.  在 `Login Information` 表格下方，是标有 `Database for user account`（用户账户数据库）和 `Global
    privileges`（全局权限）的区域。忽略这两部分。向下滚动到页面底部，点击 `Go` 按钮。


    4.  页面将确认用户已创建，并提供编辑用户权限的选项。点击 `Edit privileges` 上方的 `Database` 按钮：


    ![../images/332054_4_En_12_Chapter/332054_4_En_12_Figd_HTML.jpg](img/332054_4_En_12_Figd_HTML.jpg)


    1.  在 `Database-specific privileges`（数据库特定权限）下，从列表中选择 `phpsols`（如有必要，激活标有 `Add
    privileges on the following database(s)` 的下拉菜单），然后点击 `Go`。


    ![../images/332054_4_En_12_Chapter/332054_4_En_12_Fige_HTML.jpg](img/332054_4_En_12_Fige_HTML.jpg)


    注意 MySQL 有三个默认数据库：`information_schema`（一个只读的虚拟数据库，包含同一服务器上所有其他数据库的详细信息）；`mysql`（包含所有用户账户和权限的详细信息）；以及
    `test`（空的）。除非你确定自己在做什么，否则不应直接编辑 `mysql` 数据库。


    1.  下一个屏幕允许你仅为此用户设置对 `phpsols` 数据库的权限。你需要让 `pswrite` 拥有之前列出的全部四个权限，因此请勾选 `SELECT`、`INSERT`、`UPDATE`
    和 `DELETE` 旁边的复选框。


    如果将鼠标悬停在每个选项上，phpMyAdmin 会显示一个工具提示，描述该选项的用途，如图所示。选择这四个权限后，点击 `Go`。


    ![../images/332054_4_En_12_Chapter/332054_4_En_12_Figf_HTML.jpg](img/332054_4_En_12_Figf_HTML.jpg)


    警告 phpMyAdmin 的许多屏幕中有多个 `Go` 按钮。请始终点击包含你要设置的选项所在部分的底部或旁边的按钮。


    1.  phpMyAdmin 会确认 `pswrite` 用户账户的权限已更新；页面再次显示 `Database-specific privileges`
    表格，以便你进行任何修改。点击页面顶部的 `User accounts` 标签，返回 `User accounts overview`（用户账户概览）。


    2.  点击 `Add user account`（添加用户账户），重复步骤 3 到 8，创建第二个名为 `psread` 的用户账户。此用户的权限将受到更多限制，因此在执行步骤
    7 时，只需勾选 `SELECT` 选项。在示例文件中，`psread` 使用的密码是 `K1yoMizu^dera`。


    ## 创建数据库表


    现在你已有一个数据库和专用的用户账户，可以开始创建表了。让我们首先创建一个存储图片详细信息的表，如图 12-1 本章开头所示。在开始输入数据之前，你需要定义表结构。这包括确定以下内容：


    *   表的名称

    *   它将包含多少列

    *   每列的名称

    *   每列将存储什么类型的数据

    *   列是否必须在每个字段中都包含数据

    *   哪一列包含表的主键


    如果查看图 12-1，你会看到该表包含三列：`image_id`（主键）、`filename` 和 `caption`。由于它包含图片细节，因此“images”是一个适合用作表名的好名字。存储文件名而不存储说明没什么意义，因此每列都必须包含数据。太好了！除了数据类型，所有决策都已做出。我将在过程中解释数据类型。


    ### 定义 Images 表


    以下说明展示了如何在 phpMyAdmin 中定义表。如果你更愿意使用 Navicat 或其他 MySQL 用户界面，请使用表 12-1 中的设置。


    **表 12-1.** `images` 表的设置

