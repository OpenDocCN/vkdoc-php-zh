  trans: '

    # 使用搜索引擎回答以下问题


    1.  你在安装 XAMPP 或 easyPHP 时，或者刚尝试启动它们时，收到了以下错误。如何才能找到问题的解决方案？可能是什么原因导致了此错误？


    ```

    Internal Server Error


    The server encountered an internal error or misconfiguration and was unable to
    complete your request.


    Please contact the server administrator, you@example.com, and inform them of the
    time the error occurred, and anything you might have done that may have caused
    the error.


    More information about this error may be available in the server error log.

    ```


    2.  什么是 XAMPP 错误 #1130？如何修复此错误？


    3.  尝试使用 easyPHP（和 Apache）运行 PHP 程序时，收到以下错误。是什么导致了此错误？如何修复？


    ```

    Cannot load mcrypt extension. Please check your PHP configuration.

    ```


    4.  如果你之前还没有尝试过，请在个人机器上安装 easyPHP 或 XAMPP。安装过程中遇到问题了吗？如果有，遇到了什么问题？你是如何解决这些问题的？


    ## 测试你的环境


    现在你的指示灯都变绿了，对吧？一切都运行正常？希望如此。但你需要确认一下。最好的方法就是测试你的环境。


    ### 测试你的管理环境


    首先，我们需要测试服务器，看看管理页面能否正常显示。在 easyPHP 中，你可以执行以下任一操作：


    1.  右键单击 easyPHP 图标，然后选择**控制面板**（Dashboard）。

    2.  打开你最喜欢的浏览器，然后输入以下地址：


    `http://127.0.0.1:1111/index.php`


    如果因为端口冲突而不得不更改端口，你可能需要输入端口号，例如：


    `http://127.0.0.1:8080/index.php`


    你应该会看到一个类似于图 1-23 所示的界面。


    对于 XAMPP，打开你最喜欢的浏览器，然后输入以下地址：


    `http://127.0.0.1/dashboard/`


    如果因为端口冲突而不得不更改端口，那么你也必须包含此端口：


    `http://127.0.0.1:8080/dashboard/`


    如果 XAMPP 安装正确，你应该会看到一个类似于图 1-24 所示的界面。


    如果在此时你没有看到这个页面（或任何显示 XAMPP 的页面），那么说明出了问题。请检查以下内容：

    -   easyPHP 或 XAMPP 是否正在运行（已启动）？

    -   在 XAMPP 控制面板或 easyPHP 中，你是否看到了 Apache 的绿色指示灯或绿色阴影？如果没有，请尝试点击启动按钮或链接。

    -   如果 Apache 无法启动，你是否看到了错误信息？如果没有，请检查错误日志文件。对于 easyPHP，请打开控制面板（Dashboard），选择齿轮图标（**服务器配置**），然后选择**错误日志**按钮。对于
    XAMPP，请单击控制面板上 Apache 旁边的**日志**按钮，然后选择**错误日志**。

    -   如果你看到了绿色指示灯，但页面似乎卡住了，请尝试停止并重新启动 Apache。可能需要尝试几次才能将其唤醒。如果它持续挂起，请检查你的计算机设置。你的
    CPU 使用率是否已达到上限？


    你能确定问题所在吗？如果你有错误信息，请将其粘贴到你最常用的搜索引擎中，看看专家们对此有何看法。


    ### 动手实践


    1.  如果你之前还没有这样做过，请按照前面的说明测试你的环境。遇到任何问题了吗？如果有，出现了什么问题？你是如何解决这些问题的？


    ### 测试你的 PHP 环境


    希望现在一切顺利。你要么运气极佳、一帆风顺，要么已经成功解决了所有遇到的问题。但是，你仍需确认是否真的能在 Apache 中运行你自己的 PHP 程序。


    打开一个文本编辑器（不要用 Word，用记事本或 Notepad++ 就行），然后严格按照下面所示输入代码：'
- fmt: "\n\n使用\"文件\"菜单中的\"另存为\"选项，将文件类型更改为\"所有文件\"或`php`。输入文件名`myfirstprogram.php`，并将其保存在以下位置之一。\n\
    \n如果你使用的是 `easyPHP`，请将其保存到：\n\n```\nC:\\Program Files (x86)\\EasyPHP-Devserver-xxxx\\\
    eds-www\n```\n\n当然，你需要将版本名称（或程序文件名称）更改为你机器上使用的正确版本（位置）。在此位置下，创建一个名为`projects`的文件夹，然后将文件保存在该文件夹下。\n\
    \n如果你使用的是 `XAMPP`，首先进入`C:\\xampp\\htdocs`，并创建一个名为`projects`的文件夹。然后返回你的文本编辑器，选择\"\
    另存为\"（不要忘记将文件类型更改为\"所有文件\"或`php`），将文件命名为`myfirstprogram.php`，并将其保存到以下位置：\n\n```\n\
    C:\\xampp\\htdocs\\projects\n```\n\n如果你正确地将文件保存在 `easyPHP` 或 `XAMPP` 的位置，你可以尝试通过在浏览器地址栏中输入以下内容来运行你的程序：\n\
    \n```\nhttp://127.0.0.1/projects/myfirstprogram.php\n```\n\n如果你更改了端口，则将第一部分更改为`http://127.0.0.1:8080/`（将`8080`替换为你正在使用的正确端口）。你的程序应显示图\
    \ [1-26](#394210_2_En_1_Chapter.xhtml#Fig26) 中所示的消息。\n\n### 常见问题\n\n**未显示任何内容，出现\
    \ 404 错误：**\n\n1.  确保你完全按照所示输入了地址。\n2.  你的服务器可能挂起了。停止并重新启动它。\n3.  确保你将文件放在了正确的位置。\n\
    4.  确保你将文件保存为`.php`文件，而不是`.txt`文件。重新尝试\"另存为\"并重命名文件（确保文件类型是\"所有文件\"或`php`）。\n\
    5.  检查实际程序代码中的拼写错误。你是否记得使用分号（`;`）？修正任何错误并重新保存。如果服务器因某种原因未看到更改，你可能需要停止并重新启动服务器。你可以查看日志文件中的\
    \ PHP 日志文件，以查看代码中可能存在的任何错误。\n6.  查看 Apache 日志文件（参见之前常见问题中的说明）以查找错误。如果你无法修正这些错误，请复制错误信息并将其粘贴到搜索引擎中，看看其他人找到了什么解决方案。\n\
    \n**显示的是实际程序代码，而不是代码执行的结果：**\n\n1.  确保你将文件保存为`.php`文件，而不是`.txt`文件。重新尝试\"另存为\"\
    并重命名文件（确保文件类型是\"所有文件\"或`php`）。\n2.  你的 Apache 服务器或 PHP 可能未启动或已挂起。停止并重新启动 Apache。\n\
    3.  你是否忘记或在`<?php`或`?>`行中有拼写错误？\n4.  查看 Apache 日志文件（参见之前常见问题的说明）以查找错误。如果你无法修正这些错误，请复制错误信息并将其粘贴到搜索引擎中，看看其他人找到了什么解决方案。\n\
    \n**对于任何其他错误，** 请将其复制并粘贴到网络搜索引擎中，查看其他人发现了什么解决方案。\n\n### 动手实践\n\n1.  如果你尚未测试你的环境，请进行测试。测试成功了吗？你遇到了什么问题（如果有的话）？你是如何解决这些问题的？\n\
    \n### 别名（工作）目录\n\n在实际开发中，在 Web 服务器中创建*别名*目录是一种常见做法。别名目录是文件的\"虚假\"位置，它会欺骗你网站的用户，使其相信文件在一个位置，而实际上它在另一个位置。\n\
    \n为什么要使用别名目录？随着网站的发展，服务器上的文件位置可能必须更改。通过使用别名，你网站的用户将不知道文件的实际位置已更改。别名使你能够将文件存储在计算机（服务器）上的任何位置。如果你不使用别名，所有文件都必须存储在默认位置。默认位置是：\n\
    \n*   *EasyPHP*：`C:\\Program Files (x86)\\EasyPHP-Devserver-xxxx\\eds-www`\n \
    \   *   `（将 xxxx 替换为你开发服务器的当前版本）`\n*   *XAMPP*：`C:\\xampp\\htdocs\\`\n\n你可能需要考虑创建一个别名目录，尤其是当你希望将文件定位在\
    \ U 盘上时。在本书中，我们假设文件位于`projects`文件夹下的默认位置。\n\n*   *EasyPHP*：`C:\\Program Files\
    \ (x86)\\EasyPHP-Devserver-xxxx\\eds-www\\projects`\n*   *XAMPP*：`C:\\xampp\\\
    htdocs\\projects`\n\n这将使我们能够使用相同的 URL 测试程序，无论我们使用的是 `easyPHP` 还是 `XAMPP`。\n\n\
    ```\nhttp://127.0.0.1/projects/myfirstprogram.php\n```\n\n如果你确实创建了别名目录，只需记住将`projects`替换为你正在使用的任何别名名称。\n\
    \n在 `easyPHP` 中，可以从 Dashboard 屏幕创建别名目录。转到系统托盘（屏幕右下角），右键单击 `easyPHP` 图标，然后选择 Dashboard。在屏幕中间，找到\"\
    工作目录\"，然后单击右侧的\"添加工作目录\"。单击并按照说明操作。如果该目录尚不存在，系统将创建它。\n\n在 `XAMPP` 中，需要进行更多操作。通过双击图标打开系统面板。然后点击\
    \ Apache 右侧的 Config 按钮。从列表中选择`httpd-xampp`配置文件。在进行更改之前，请保存文件的备份副本。从文本编辑器菜单中选择\"\
    编辑\"，然后选择\"查找\"。搜索字符串`\"<IfModule alias_module>\"`。不要更改此部分中已列出的任何内容。但是，你可以为可执行文件添加位置（使用以下代码）。输入所需行后，停止并重新启动\
    \ Apache 以帮助它找到新的更改。\n\n```\nAlias /myfiles \"C:/Temp\"\n\n<Directory \"C:/Temp\"\
    >\n    Options Indexes FollowSymLinks MultiViews ExecCGI\n    AllowOverride All\n\
    \    Require all granted\n</Directory>\n\n```\n\n注意：\n\n> 此目录设置允许对目录具有完全的读写能力。我们将在后面的章节中讨论保护\"\
    在线\"网站目录安全的选项。\n\n此配置允许当用户在 URL 行中输入`myfiles`作为目录名时，`C:/Temp`目录中的任何 PHP 文件在 Apache\
    \ 中执行。所示的目录设置并未提供太多安全性。但是，这仅用于在测试机上进行测试。如果你处于在线环境，则需要加强`Directory`标签下的安全设置。要执行此目录中的文件，你需要在浏览器中输入\
    \ URL `http://127.0.0.1/myfiles`。如果你不包含文件名，Apache 将尝试查找`index.html`或`index.php`文件。如果两者都不存在，Apache\
    \ 将根据当前设置列出目录中的文件。这便于轻松访问文件进行测试。但是，在在线环境中这不是一个好主意。你可以通过添加文件名`http://127.0.0.1/myfiles/myfirstprogram.php`来请求非索引文件。如果你不得不更改端口号，请记住包含端口号：`http://127.0.0.1:8080/myfiles/myfirstprogram.php`。当然，目录必须存在，并且文件必须在浏览器中测试\
    \ URL 之前位于该目录中。\n\n### 动手实践\n\n1.  创建一个名为`myfiles`的别名文件夹，指向硬盘或闪存（可移动）驱动器上的一个现有位置。将你用于测试环境的`hello\
    \ world`程序放入该文件夹。尝试使用之前的说明从该文件夹运行程序。你成功了吗？如果没成功，你遇到了什么问题？你是如何解决这些问题的？\n\n### Notepad++、编辑器和代码测试器\n\
    \n创建 PHP 代码时，你不需要使用特定的编辑器或购买编辑器。你可以使用任何文本编辑器（甚至记事本）创建所有代码。但是，使用一个能高亮（着色）代码的编辑器确实有助于更容易地发现编码（语法）错误。"
