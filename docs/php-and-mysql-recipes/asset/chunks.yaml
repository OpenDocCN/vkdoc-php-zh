    \ 节。\n\n## 技巧 7-5. 文件属性\n\n### 问题\n除了文件名和内容之外，文件还有其他属性可能对开发人员甚至最终用户有用。了解文件的大小、创建时间或最后修改时间，有助于判断文件是否包含新信息。\n\
    \n### 解决方案\n`filesize()`、`filectime()`、`filemtime()` 和 `fileatime()` 函数提供了文件大小、创建时间、修改时间和访问时间的信息。`stat()`\
    \ 函数可以提供关于文件的更详细信息，因为它返回一个值数组，其中包含设备编号、inode、文件大小、ctime、mtime、atime、块大小和块数。除此之外，还可以使用\
    \ `file_exists()`、`is_readable()`、`is_dir()`、`is_file()`、`is_link()` 来判断文件是目录、普通文件还是符号链接。\n\
    \n上述所有函数都接受一个参数，即文件名，包含相对路径或绝对路径。这些函数不适用于由 `fopen()` 函数返回的文件句柄。`fstat()` 函数可用于从文件句柄获取文件信息。此函数接受文件句柄作为参数，而不是文件名。\n\
    \n许多提供文件系统中文件信息的函数会缓存其结果，以提高调用性能，避免每次对同一文件调用这些函数时都去执行底层系统调用。要清除此缓存，可以调用 `clearstatcache()`\
    \ 函数。如果在单次执行过程中多次检查同一个文件，则需要在每次检查之间调用 `clearstatcache()` 函数。\n\n### 工作原理\n`filesize()`、`filectime()`、`filemtime()`\
    \ 和 `fileatime()` 函数都返回整数值。从创建、修改和访问时间得出的 UNIX 时间戳可以通过 `date()` 函数转换为人类可读的数值，如下例所示。使用\
