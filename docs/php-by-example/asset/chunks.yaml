    ## 总结


    *   数组是由一个共同名称连接的值的集合。这些值通常可以是不同的类型。

    *   数组元素通过键或索引（在方括号内，位于数组名称之后）进行访问。键/索引可以是整数或字符串。

    *   有几种方法可以创建数组。具体来说，您可以给数组元素赋值，使用 `array()` 函数（语法结构），或者在方括号中列出数组元素的值。如果未明确指定键/索引，则会自动计算。

    *   您可以使用 `foreach` 循环语句来遍历数组的内容。它允许您访问数组元素的键和值。

    *   数组元素本身也可以是数组。在这种情况下，内部数组的元素通过使用多个键来访问。

    *   您可以对数组执行各种操作，包括赋值和比较相等/不相等。您还可以连接数组。

    *   存在专门用于处理数组的函数。


    # 5. 函数


    > *— 我注意到你花了很多时间修理东西，威利。*

    > *— 那是因为你花了很多时间弄坏东西，阿尔夫。*

    > *— 嗯，很高兴我们的爱好如此互补。*

    > —《阿尔夫》（电视剧）


    本章介绍函数，它在任何编程语言中都扮演着重要角色。PHP 语言也不例外。您将学习如何创建函数、如何使用函数，以及 PHP 语言中函数有哪些独特之处。


    ## 创建函数


    在程序中，经常需要多次执行相同的命令序列。将这样的命令写成一个独立的代码块，然后在需要时简单地放置一条指令来执行相应的命令块，是很方便的。概括来说，函数的使用就基于这一思想。


    函数是一个可以通过其名称调用的命名代码块。换句话说，您组建一个命令块，为该命令块指定一个名称，每当需要执行该命令块时，只需指定其名称即可。通常，您会使用命令来处理某些值或数据。如果打算在函数调用期间处理这些值，则应在调用函数时传递一个参数（或多个参数）。传统上，函数参数写在函数名称后面的括号中。如果有多个参数，则用逗号分隔。


    在调用函数之前，必须先声明（或创建）它。函数的描述意味着您必须定义在调用函数时执行哪些命令，以及对参数（如果有）执行哪些操作。那么，在 PHP 中如何定义函数呢？


    函数声明以 `function` 关键字开头，后跟函数名称和括号中的参数列表。参数类似于变量，并通过调用函数时传递给函数的值来标识。如果函数没有参数，则在函数的描述中，函数名称后面放置一对空括号。调用函数时执行的命令被放置在一对花括号括起来的代码块中。以下是通用的函数声明模板。


    ```

    function name(参数){

    // 命令

    }

    ```


    函数体中的命令可以引用函数参数，且函数参数被描述为变量名（参数名称以 `$` 符号开头）。当调用函数并传递参数时，其主体中描述的命令将被执行。在这种情况下，在代码中放置参数的位置将使用传递给函数的实际值。


    | 详细信息 |

    | --- |

    | 函数名称不区分大小写。换句话说，函数名称是使用大写字母还是小写字母都没有关系。例如，如果您有 `show()` 函数，那么它与 `SHOW()` 或 `Show()`
    函数相同。还值得一提的是，传统上，函数名称后面会指定一对空括号。这通常是为了将函数名称与变量名称区分开来。如您所知，在 PHP 中，变量名称的显著特征是名称开头的
    `$` 符号。尽管如此，这一传统仍然被保留。 |


    要调用函数，只需指定其名称和括号即可：如果函数没有参数则为空括号，如果有参数则附带参数值的列表。一个声明然后调用函数的小例子如清单 5-1 所示。


    ```

    清单 5-1

    初识函数

    ```


    以下是程序执行的结果。


    ```

    程序输出（来自清单 5-1）

    调用函数 show()

    参数类型：integer

    参数值：123

    调用函数 show()

    参数类型：string

    参数值：We learn PHP

    调用函数 show()

    参数类型：double

    参数值：2.5

    ```


    描述了一个简单的 `show()` 函数。它只有一个参数，名为 `$argument`。这意味着当您调用该函数时，应在函数名称后的括号中放入某个值（即函数参数）。


    ![](img/613529_1_En_5_Figa_HTML.jpg) 一个带有字母“i”的信息图标。


    > **注意：** 必须理解，函数的描述并不意味着立即执行其代码。为了使函数代码得到执行，必须调用该函数。

    '
- fmt: '您应该参考函数体中的代码来理解调用函数时发生的情况。在本例中，只有三条命令，每条都使用了`echo`语句。因此，每当您调用该函数时，输出窗口都会显示三条消息。第一条消息说明`show()`函数已被调用。第二条消息包含传递给该函数的参数类型信息。为了确定参数的类型，使用`gettype($argument)`指令来显式引用`$argument`参数。


    ![](images/613529_1_En_5_Chapter/613529_1_En_5_Figb_HTML.jpg)一个带有字母''i''的信息图标。


    注意


    在描述函数时，参数的类型和值是未知的。这些情况在函数被调用时才“显现”。现在，您可以简单描述需要使用函数参数做什么。


    另一条消息包含`$argument`参数的值信息。


    ![](images/613529_1_En_5_Chapter/613529_1_En_5_Figc_HTML.jpg)一个带有字母''i''的信息图标。


    注意


    在最后一条消息之后，使用两个`\n`指令执行了两次换行。这纯粹是为了美观，以便由不同函数调用显示的消息块之间用空行分隔。


    声明函数后，您使用三个不同的参数（一个整数、一个字符串和一个实数）调用它。为了说明函数名不区分大小写，每次使用不同大小写字母组合来指定函数名。具体来说，您用小写字母写函数名（`show(123)`命令），用大写字母写（`SHOW("We
    learn PHP")`命令），并且也在函数名中首字母大写（`Show(2.5)`命令）。在所有三种情况下，都调用了同一个`show()`函数。


    ![](images/613529_1_En_5_Chapter/613529_1_En_5_Figd_HTML.jpg)一个带有字母''i''的信息图标。


    注意


    让我们坚持一个简单的原则：按照函数的描述方式调用函数（即函数名）。


    ## 函数的结果


    函数可以返回一个结果。函数的结果是在函数执行完成后“保留下来”的值。如果函数返回一个结果，则调用函数的指令具有一个值，该值就是函数的结果。因此，例如，您可以将函数调用指令赋值给一个变量，或将其用作复杂语句中的操作数。为了理解包含函数调用指令的表达式的求值结果，您应该用表达式中相应函数返回的值替换这些指令。


    为了在函数描述中表明函数返回结果，您需要使用`return`指令，后跟函数返回的值。


    | 详情 |

    | --- |

    | 执行带有`return`语句的命令会终止函数的执行。函数代码中可以包含多个`return`指令（例如，在条件语句中），但只要其中一个被执行，函数执行就会终止。如果函数不返回结果，则可以使用`return`语句终止此类函数的执行，且无需指定返回值。通常，不返回结果的函数被解释为返回`null`引用。因此，原则上，对于此类函数，可以使用`return
    null`语句代替`return`指令（不带值）。 |


    清单[5-2](#613529_1_En_5_Chapter.xhtml#PC4)展示了一个使用多个返回结果的函数的程序。


    ```

    Listing 5-2

    A Function That Returns a Result

    ```


    以下是程序执行的结果。


    ```

    The output of the program (from Listing 5-2)

    Calculate 2 in the power 10: 1024

    10! = 3628800

    The number 10 is even

    The number 9 is odd

    ```


    程序中描述了三个函数。`factorial()`函数用于计算一个数字的阶乘。它的参数命名为`$n`。假定这是要计算阶乘的数字。


    ![](images/613529_1_En_5_Chapter/613529_1_En_5_Fige_HTML.jpg)一个带有字母''i''的信息图标。


    注意


    整数*n*的阶乘（记为*n*！）是从1到*n*（包括）的所有整数的乘积。也就是说，根据定义，*n*! = 1 · 2 · 3 · … · (*n* − 1)
    · *n*。


    您在函数体中使用初始值为`1`的局部变量`$s`。然后，执行一个循环语句。在那里，变量`$k`从`2`到`$n`（包括）取值。对于每次循环，执行命令`$s
    *= $k`。根据该命令，`$s`变量的当前值乘以`$k`变量的当前值。结果，在执行循环语句后，从`1`到`$n`的乘积存储在`$s`变量中。最后，通过`return
    $s`命令，将计算出的值作为`factorial()`函数的结果返回。


    | 详情 |

    | --- |

    | 函数体中的变量称为*局部变量*。它们是在函数体中首次赋值的。局部变量在函数代码执行期间存在，并且仅在函数体内可用。由此得出两个重要结论。首先，仅在函数体中引用局部变量才有意义。其次，您可以在不同函数中使用相同名称的局部变量；这些是不同的变量，因为它们具有不同的作用域。函数声明中指定的参数具有“局部变量的效力”。它们仅在函数体内可用。如果在不同函数的描述中为参数指定了相同的名称，则它们是彼此独立的不同变量。
    |'
  raw: 'You should refer to the code in the function’s body to understand what happens
    when a function is called. In this case, there are only three commands, each using
    the `echo` statement. So, three messages appear in the output window whenever
    you call the function. The first message states that the `show()` function has
    been called. The second message contains information about the type of argument
    passed to the function. To determine the type of the argument, the `gettype($argument)`
    instruction is used to explicitly refer to the `$argument` argument.


    ![](images/613529_1_En_5_Chapter/613529_1_En_5_Figb_HTML.jpg)An information icon
    with the letter ''i''.Note


    When the function is described, the type of the argument and its value are not
    known. Those circumstances “reveal” when the function is called. Now, you can
    simply describe what needs to be done with the function argument.


    Another message contains information about the value of the `$argument` argument.


    ![](images/613529_1_En_5_Chapter/613529_1_En_5_Figc_HTML.jpg)An information icon
    with the letter ''i''.Note


    After the last message, a line break is performed twice using two `\n` instructions.
    That is purely for aesthetic purposes so that message blocks displayed due to
    different function calls are separated by a blank line.


    After the function is declared, you call it with three different arguments (an
    integer, a string, and a real number). To illustrate the case-insensitivity of
    the function name, you specify each time the function name using a different combination
    of uppercase and lowercase letters. In particular, you write the name of the function
    in small letters (the `show(123)` command), in capital letters (the `SHOW("We
    learn PHP"`) command), and also indicate the first capital letter in the function
    name (the `Show(2.5)` command). In all three cases, the same `show()` function
    is called.


    ![](images/613529_1_En_5_Chapter/613529_1_En_5_Figd_HTML.jpg)An information icon
    with the letter ''i''.Note


    Let’s hold a simple principle: call a function according to how it is described
    (i.e., the name of the function).


    ## The Function Result


    A function can return a result. The result of a function is the value that remains
    “for memory” after the function has completed its execution. If a function returns
    a result, the instruction by which the function is called has a value, which is
    the result of the function. Therefore, you can, for example, assign a function
    call instruction to a variable or use it as an operand in a complex statement.
    To understand the result of an expression containing function call instructions,
    you should replace those instructions with the values returned by the corresponding
    functions in the expression.


    To show in the function description that the function returns a result, you use
    the `return` instruction followed by the value the function returns.


    | Details |

    | --- |

    | Executing a command with the `return` statement terminates the execution of
    the function. The function code can contain several `return` instructions (for
    example, in a conditional statement), but as soon as one of them is executed,
    the function execution is terminated.If a function does not return a result, then
    the `return` statement can be used to terminate the execution of such a function
    without specifying a return value. Generally, a function that does not return
    a result is interpreted as returning a `null` reference. Therefore, in principle,
    for such functions, instead of the `return` instruction (without a value), you
    can use the `return null` statement. |


    Listing [5-2](#613529_1_En_5_Chapter.xhtml#PC4) shows a program in which you use
    several functions that return a result.


    ```

    Listing 5-2

    A Function That Returns a Result

    ```


    The following is the result of the program execution.


    ```

    The output of the program (from Listing 5-2)

    Calculate 2 in the power 10: 1024

    10! = 3628800

    The number 10 is even

    The number 9 is odd

    ```


    Three functions are described in the program. The `factorial()` function is designed
    to calculate the factorial of a number. Its argument is named `$n`. It is assumed
    that that is the number for which the factorial is calculated.


    ![](images/613529_1_En_5_Chapter/613529_1_En_5_Fige_HTML.jpg)An information icon
    with the letter ''i''.Note


    The factorial of an integer number *n* (denoted as *n*!) is the product of all
    numbers from 1 to *n* inclusively. That is, by definition, *n* !  = 1 · 2 · 3 · … · (*n* − 1) · *n*.


    You use the local variable `$s` with the initial value `1` in the function’s body.
    Then, a loop statement is executed. There, the `$k` variable gets values from
    `2` to `$n` inclusively. For each loop, the `$s*=$k` command is executed. According
    to the command, the current value of the `$s` variable is multiplied by the current
    value of the `$k` variable. As a result, after executing the loop statement, the
    product of numbers from `1` to `$n` is stored in the `$s` variable. Finally, with
    the return `$s` command, the computed value is returned as the result of the `factorial()`
    function.


    | Details |

    | --- |

    | The variables in the body of a function are called *local variables*. They are
    the first assigned values in the function’s body. Local variables exist while
    the function code is executed and are available only in the function’s body. Two
    important conclusions follow from that. First, it makes sense to refer to a local
    variable only in the function body. Second, you can use local variables with the
    same names in different functions; these are different variables since they have
    different scopes.The arguments specified in the function declaration have the
    “power” of local variables. They are available only in the function’s body. If
    you specify the same names for the arguments in the description of different functions,
    they are different variables independent of each other. |'
