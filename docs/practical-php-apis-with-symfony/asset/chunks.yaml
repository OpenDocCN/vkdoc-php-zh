- fmt: '### `Array` Outputs As Operation Results


    In the previous section, we talked about operations that return the result data
    from the database. We specified that it would be better to create a concrete output
    instead of directly serializing database entities so that we can prevent persistence
    logic and infrastructure concerns from leaking into the presentation layer. Let’s
    imagine we are creating an operation to return the clients’ data stored in our
    database. We could name that operation: `GetClients`.


    Before creating the operation, we are going to create an output model for the
    client entity. Let’s imagine that we only want to return the name, the corporate
    email, the contact''s name, and contact phone.


    ```

    readonly class ClientOutput {

    public function __construct(

    public string $name,

    public string $email,

    public string $contactName,

    public string $contactPhone

    ){}

    }

    ```


    Now, we are ready to create the `GetClientsOperation` class:


    ```

    #[OperationMetadata(

    name: ''GetClients'',

    input: GetClientsInput::class

    )]

    class GetClientsOperation implements OperationInterface

    {

    public function __construct(

    private readonly EntityManagerInterface $em

    ){}

    /**

    * @param GetClientsInput $data

    */

    public function perform(mixed $data): ApiOutput

    {

    $clients = $this->em->getRepository(Client::class)->findAll();

    $clientsOutput = [];

    foreach($clients as $client) {

    $clientsOutput[] = new ClientOutput(

    $client->getName(),

    $client->getEmail(),

    $client->getContactName(),

    $client->getContactPhone()

    );

    }

    return new ApiOutput($clientsOutput, 200);

    }

    }

    ```


    As you can see in the code above, if changes are made to the `Client` entity,
    it will not affect the presentation layer, which will prevent certain types of
    errors, such as circular references during serialization.


    I would like to emphasize that the code responsible for looping through the clients
    and creating a `ClientOutput` for each one should be placed outside of the main
    operation, ideally in a separate service. By doing this, we can effectively decouple
    the functionality, enhancing maintainability and scalability. Since this is not
    a book about SOLID principles or how to create domain-oriented applications, we
    will not go into further detail on this aspect.


    ### Conclusion


    We have established the core elements of the operation-oriented APIs: operations
    and their associated metadata. In the next section, we’ll explore how to effectively
    discover and collect these defined operations, ensuring they are readily accessible
    within our API.


    ## Section 3\. Collecting and Discovering Operations


    We’ve established how to create individual API operations using the `OperationInterface`
    and the `OperationMetadata` attribute. Now, let’s explore how to build a service
    specifically designed to manage these operations. This service will:


    *   **Hold a Collection of Operations**: The service will act as a central repository,
    storing all the defined operations within your application.

    *   **Retrieve Operations by Name**: We will be able to efficiently retrieve a
    specific operation by its unique name within the service. This simplifies operation
    lookup and promotes code clarity.


    By creating this service, we will achieve a more organized and efficient way to
    manage and access API operations within the application.


    ### The Operation Collection


    First, we need to create a class for storing the operations collection.


    ```

    namespace App\Api\Collection;

    class OperationCollection

    {

    private array $operations;

    public function setOperations(array $operations): void

    {

    $this->operations = $operations;

    }

    public function getOperation(string $operation): ApiOperation

    {

    if(!isset($this->operations[$operation])){

    throw new NotFoundOperationException(sprintf(''Operation %s is not defined'',
    $operation));

    }

    return $this->operations[$operation];

    }

    }

    ```


    The operation collection is straightforward. It simply contains a setter to load
    the operations and a getter to get a concrete operation. If an operation does
    not exist, it throws a `NotFoundOperationException`.


    We will create this exception later. Now, we know that it is the exception that
    is thrown when an operation does not exist.


    The question now is: How are we going to load the operations array? The answer
    to this question is using a [Symfony service configurator](https://symfony.com/doc/current/service_container/configurators.html).
    These are special services that allow developers to decouple service logic from
    the service that provides the required configuration.


    Let’s take a look at the operation collection configurator:


    ### The Operation Configurator


    The operation configurator will hold the necessary code to fill the collection
    with the operations. It will wrap each operation using a class named `ApiOperation`
    which receives the operation handler and the operation metadata.


    ```

    namespace App\Api;

    use App\Api\Attribute\OperationMetadata;

    use App\Api\Operation\OperationInterface;

    readonly class ApiOperation {

    public function __construct(

    public OperationInterface $handler,

    public OperationMetadata  $metadata

    ){}

    }

    ```


    Now, let’s explore how the operation configurator works.


    ```

    namespace App\Api\Collection;

    use App\Api\ApiOperation;

    use App\Api\Attribute\OperationMetadata;

    use Symfony\Component\DependencyInjection\Attribute\TaggedIterator;

    class OperationCollectionConfigurator {

    public function __construct(

    #[TaggedIterator(''api.operation'')] private readonly iterable    $apiOperations

    ){}

    public function configure(OperationCollection $operationCollection): void

    {

    $operations = [];

    foreach ($this->apiOperations as $operation){

    $metadata = $this->readAttribute(OperationMetadata::class, $operation);

    $operations[$metadata->name] = new ApiOperation($operation, $metadata);

    }

    $operationCollection->setOperations($operations);

    }

    /**

    * @template T

    * @param class-string $attrClass

    * @return T|null

    */

    private function readAttribute(string $attrClass, object $object)

    {

    $reflectionClass = new \ReflectionClass($object);

    $attrs = $reflectionClass->getAttributes($attrClass);

    if(!empty($attrs)) {

    $attr = reset($attrs);

    return $attr->newInstance();

    }

    throw new \RuntimeException(sprintf(''Operation class %s has no metadata'', get_class($object)));

    }

    }

    ```


    The configurator service contains a little more code. Let’s start with the constructor.
    It injects a parameter flagged with the `TaggedIterator` attribute. This attribute
    loads the `$apiOperations` iterable with all the services tagged as `api.operation`,
    that is, all the operations.


    *   When we created the `OperationInterface`, we used the `AutoConfigure` attribute
    to tag all services which implemented such interface as `api.operation`.


    The private `readAttribute` method uses the PHP reflection capabilities to check
    whether the object passed as a second parameter is marked with the attribute specified
    with the first parameter. If so, it returns a new instance of the attribute; otherwise,
    it throws a PHP exception.


    The `configure` method loops the operations contained in the `$apiOperations`
    array. For each one, it gets the metadata using the `readAttribute` method and
    wraps the operation and its metadata into an `ApiOperation` object. After the
    loop ends, it sets the operations into the `OperationCollection` using the `setOperations`
    method.


    We must tell Symfony to use this configurator to configure the `OperationCollection`
    service. To achieve it, we have to define it in the services section on the `config/services.yaml`
    file.


    ```

    App\Api\Collection\OperationCollection:

    configurator: [''@App\Api\Collection\OperationCollectionConfigurator'', ''configure'']

    ```


    With the above configuration, Symfony knows that it must use the `OperationCollectionConfigurator`
    configure method to configure the `OperationCollection` service.'
