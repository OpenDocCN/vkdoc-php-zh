    that instead?”) instead of leaving them frustrated in a dead end.


    The needs of the user (clear navigation and page structure and fast page loads
    and response times) should be prioritized over the wants of the merchant (on-page
    advertising, reams of third-party tracking codes, and intrusive upsells).


    Try to avoid excluding users - make your themes accessible and in compliance with
    standards like WAI-ARIA ( [`https://www.w3.org/TR/wai-aria`](https://www.w3.org/TR/wai-aria)
    ). Not only is this considerate and maximizes the number of people able to buy
    things from your store, but a failure to do so can in some cases have legal ramifications.[¹](#A437216_1_En_3_Chapter.html#Fn1)


    There are a couple of nice things about championing the experience of the user
    like this when putting together a theme. First, it can help you focus your use
    cases and discussions around real people instead of platonic ideals. Second, caring
    deeply about your customers’ experiences pays dividends in other areas: fast,
    painless purchases encourage repeat business, motivate word-of-mouth referrals,
    and (as you’ll see in Chapter [9](#A437216_1_En_9_Chapter.html)) have a positive
    impact on search engine rankings.'
