- fmt: 'This particular plugin is run in the view by calling its helper functions.
    Because the plugin needs more than just the helper to work, the necessary controllers
    and models are included as well, but you won’t even notice those because of the
    way the plugin was designed.


    Let’s build a chat action in your application. In the `Posts` controller, create
    the `chat()` action, and get its view working (`app/views/posts/chat.ctp`). When
    accessing this action, the view should turn up a blank page with maybe a title
    at the top, so no more is necessary in the action itself.


    The `Ajax Chat` plugin requires its own helper that must be made available to
    the controller like any other helper, so include this in the `helpers` array along
    with the `Ajax` helper: `var $helpers = array(''Ajax'',''chat/AjaxChat'');`


    The last step is to call out the `Ajax Chat` helper in the view with a simple
    command: `$ajaxChat->generate(''chatroom'');`


    Now when you fire up the `Chat` action in the `Posts` controller, the `Ajax Chat`
    plugin should automatically launch an Ajax chat room on the page. Literally, with
    only a couple lines of code and a SQL query you were able to launch a mini-application
    inside your own blog.


    ## Creating Custom Plugins


    Whether you use Cake plugins as add-ons to your projects or you want to contribute
    to the Cake community by distributing your own mini-applications, you will need
    to customize the plugin beyond what I’ve already explained. To begin writing a
    custom plugin, create a folder named after the plugin in lowercase letters. All
    the controllers, models, and views will be stored inside this folder. All plugins
    will need to have two additional files: the `{plugin}_app_controller.php` and
    `{plugin}_app_model.php` files where `{plugin}` is the name of the plugin in lowercase
    letters. These files will contain the class names and extensions that allow Cake
    to utilize the rest of the plugin’s resources, so naming these files correctly
    is important for the plugin to function correctly.


    The basic plugin will contain an `App` controller; an `App` model; and folders
    for controllers, models, and views. The organization mimics the overall Cake application
    structure, so any plugin helpers will be stored in the plugin’s `views/helpers`
    directory, and so forth (see Listing 13-2). Be sure to replace `{plugin}` with
    the name of the plugin.


    **Listing 13-2.** *The Basic Plugin File Structure*


    ```

    {plugin root}/

    {plugin}_app_controller.php

    {plugin}_app_model.php

    controllers/

    {controller name}_controller.php

    models/

    views/

    ```


    ### Naming Convention for Plugin Elements


    Listing 13-2 shows the basic file structure inside the plugin’s root directory.
    The naming convention for plugin elements is slightly different from the standard
    convention for naming other Cake resources. Table 13-1 shows how to name plugin
    elements.


    **Table 13-1.** *Naming Conventions for Plugin Elements*


    | **Type** | **File Name** | **Class** | **Extends** | **Example** |

    | --- | --- | --- | --- | --- |

    | App controller | `{plugin}_app_controller.php` | `PluginAppController` | `AppController`
    | `CalendarAppController` extends `AppController` |

    | App model | `{plugin}_app_model.php` | `PluginAppModel` | `AppModel` | `CalendarAppModel`
    extends `AppModel` |

    | Controller | Same as application | Same as application | `PluginAppController`
    | `EventsController` extends `CalendarAppController` |

    | Model | Same as application | Same as application | `PluginAppModel` | `Event`
    extends `CalendarAppModel` |

    | Helper | Same as application | Same as application | `Helper` | `CalendarHelper`
    extends `Helper` |

    | Component | Same as application | Same as application | `Object` | `CalendarComponent`
    extends `Object` |

    | Behavior | Same as application | Same as application | `ModelBehavior` | `MonthBehavior`
    extends `ModelBehavior` |

    | DataSource | Same as application | Same as application | `DataSource` | `CalSource`
    extends `DataSource` |'
