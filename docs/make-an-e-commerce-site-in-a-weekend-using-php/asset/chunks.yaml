    \ and assigned to the `columnlist` variable through statement #2. Using a `while`\
    \ loop, a SQL query is created that accesses every column of the `products` table\
    \ and checks if the desired text is found in it (see statement #3). The SQL query\
    \ is executed and all the products that contain the searched text in any of the\
