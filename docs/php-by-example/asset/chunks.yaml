- fmt: 'Here, you deal with the `MyClass` class, which has the public `$code` field
    and the one-argument constructor. The constructor argument specifies the value
    of the field. Starting with PHP 8, combining the field declaration and field assignment
    can significantly reduce the code. Considering the innovations, the code could
    look like the following.


    ```

    class MyClass{

    function __construct(public $code){}

    }

    ```


    What has changed? First, there is no field declaration. Second, in the constructor,
    no command assigns a value to the field. Third, the `$code` argument is preceded
    by the `public` access level specifier in the constructor declaration. That means
    the class has the `$code` field with the `public` access level. It also means
    that the argument passed to the constructor is automatically assigned as a value
    to the field.


    Thus, if you specify an access level specifier for the argument in the description
    of the constructor argument, then that means the following.


    *   The class has the corresponding field.

    *   The constructor argument is assigned (automatically, no need to write a command)
    as a value to that field.


    Next, let’s analyze a small example.


    A bell icon. The PHP 8 Standard


    The code in Listing [7-12](#613529_1_En_7_Chapter.xhtml#PC29) runs only in PHP
    8.


    Listing [7-12](#613529_1_En_7_Chapter.xhtml#PC29) shows the class declaration
    with a constructor that defines two fields (one public and one private).


    ```

    code,"\n";

    echo "The field \$name = ",$this->name,"\n";

    }

    }

    // Creates an object:

    $obj=new MyClass(123,"MyClass");

    // Checks the fields:

    $obj->show();

    ?>

    Listing 7-12

    Defining Fields in the Constructor

    ```


    The result of the program execution is as follows.


    ```

    The output of the program (from Listing 7-12)

    The object is created: 123 and MyClass

    The field $code = 123

    The field $name = MyClass

    ```


    In the constructor of the `MyClass` class, the `$code` argument is declared with
    the `public` specifier, and the `$name` argument is declared with the `private`
    specifier. That means the class has the public field `$code` and the private field
    `$name`. The constructor’s first argument is assigned as a value to the `$code`
    field, and the constructor’s second argument specifies the value of the `$name`
    field. The constructor contains the `echo "The object is created: $code and $name\n"`
    command, which displays a message with information that the object is created
    and the values of the arguments passed to the constructor.


    Details


    | --- | --- | --- |


    Constructor arguments are named the same as class fields. In the constructor,
    the `$code` and `$name` instructions refer to the constructor’s arguments. You
    access the fields using the `$this->code` and `$this->name` instructions.


    The `show()` method is described in the `MyClass` class. When the method is called,
    it displays the `$code` and `$name` fields of the object from which the method
    is called. After the `MyClass` class is declared, use the `$obj=new MyClass(123,"MyClass")`
    command to create an object based on the class. After that, call the `show()`
    method from the object (the `$obj->show()` statement).


    A constructor can have both ordinary arguments and arguments that declare fields.
    An example similar to the previous one is shown in Listing [7-13](#613529_1_En_7_Chapter.xhtml#PC31).


    ```

    name=$name;

    echo "The object is created: $code and $name\n";

    }

    function show(){

    echo "The field \$code = ",$this->code,"\n";

    echo "The field \$name = ",$this->name,"\n";

    }

    }

    $obj=new MyClass(123,"MyClass");

    $obj->show();

    ?>

    Listing 7-13

    Ordinary Arguments and the Arguments That Declare Fields in the Constructor

    ```


    The second argument in the constructor of the `MyClass` class is a regular argument,
    and the private field of the same name in the class is traditionally declared.
    You also added the command that assigns the constructor’s second argument to the
    `$name` field. In all other aspects, the examples are similar. The result of the
    program execution is the same as in the previous case.


    # Summary


    *   Objects are created from classes and can contain fields and methods.

    *   The class declaration begins with the `class` keyword, followed by the class
    name and, in curly braces, the class description.

    *   The fields and methods declared in a class are called class members. Methods
    are described as ordinary functions. When describing fields, field values can
    be omitted.

    *   To determine the access level, you can use the keywords (access level specifiers)
    `private` (the private class member), `protected` (the protected class member),
    and `public` (the public class member). The absence of an access level specifier
    means the corresponding class member is public.

    *   To create an object based on a class, use the `new` instruction followed by
    the name of the class. The result of the corresponding expression is a reference
    to the created object. That reference is assigned as a value to an object variable.

    *   No copy of the object is created when assigning object variables, and the
    two variables refer to the same object. The assignment statement should contain
    the `clone` instructions to create a copy of the object.

    *   The constructor is a method automatically called when an object is created.
    It is named `__construct()` and can take arguments. If so, the constructor’s arguments
    are specified in the statement that creates an object in parentheses after the
    class name.

    *   The destructor is a method called automatically when an object is removed
    from memory. The destructor is named `__destruct()` and has no arguments.

    *   A class can contain static fields and methods. Such class members are declared
    with the `static` keyword. Static class members are not tied to any particular
    object and exist regardless of whether any objects of the corresponding class
    were created.

    *   To access the fields of an object, use the instructions of the `$object->field`
    form, and the `$` symbol is not indicated in the field name. A method from an
    object is called by a command like `$object->method(arguments)`. Access to static
    class members is performed in the `class::$field` and `class::method(arguments)`
    format.

    *   The `$this` keyword is used in a class as an identifier for the object from
    which the method is called. The `self` keyword is used in a class as the class
    identifier when accessing static fields and methods.

    *   There are special methods with a special purpose that are called automatically.
    The names of those methods begin with a double underscore. Among those methods
    are `__toString()` (automatically called to convert an object to a string), `__call()`
    (automatically called when trying to call the non-existing method), `__get()`
    (automatically called when trying to read the value of the inaccessible field),
    and `__set()` (automatically called when trying to assign a value to the unavailable
    field).

    *   Starting with PHP 8, you can combine argument descriptions and field declarations
    in the class constructor. In that case, an access level specifier is supplied
    for the argument that automatically creates the corresponding field and assigns
    a value based on the argument passed to the constructor.


    ## 8. Inheritance


    *It’s all very nice, but I didn’t get it!*


    —*ALF* (TV series)


    This chapter is devoted to such a critical OOP mechanism as inheritance. Along
    with encapsulation and polymorphism, inheritance is one of the three pillars on
    which the knowledge of OOP rests. Next, you learn how inheritance is implemented
    in PHP.'
