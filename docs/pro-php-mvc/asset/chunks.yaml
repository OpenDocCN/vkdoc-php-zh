    The clean() method removes all values considered empty() and returns the resultant
    array. The trim() method returns an array, which contains all the items of the
    initial array, after they have been trimmed of all whitespace.


    ■ **Note** We are not trying to re-create every built-in PHP function. Whenever
    your code can be achieved easily using built-in functions, make very sure your
    reasons for creating the method are worth the confusion and repetition involved.
