    **539**


    我们可以用同样的方式在该文件中定义更多段落。因此，如果我们想为生产环境设置不同的配置，我们会包括下面这行：


    ```

    [production]

    ```


    然后你将在这一行后面定义生产环境的设置。不过，这里唯一的问题是，某些设置对于开发和生产环境可能完全相同。为了帮助解决这个问题，`Zend_Config`允许在配置文件中进行继承。


    换句话说，对于生产环境的设置，我们可以使用所有开发环境的设置，然后根据需要覆盖每一个。我们通过如下方式定义新段落来实现：


    ```

    [production : development]

    ```


    回到之前在生产环境中为数据库服务器使用不同主机名的例子，我们可以使用以下配置文件：


    ```

    [development]


    database.type = pdo_mysql


    database.hostname = localhost


    database.username = phpweb20


    database.password = myPassword


    database.database = phpweb20


    ; other development settings here


    [production : development]


    database.hostname = 192.168.0.123

    ```


    在这段代码中，开发环境使用的所有设置（例如数据库用户名和密码）也将在生产环境中使用，但主机名`database.hostname`已被覆盖。


    清单 14-19 显示了你应该添加到`settings.ini`文件中的代码。即使你不打算更改任何设置，为了使后续的代码正常工作，你也需要添加这一行。


    **清单 14-19.** *定义生产环境设置段落（`settings.ini`）*


    ```

    [development]


    ; other development settings here


    [production : development]

    ```


    ### 告诉引导程序使用哪个配置


    一旦为生产服务器创建了配置段落，我们必须更改引导文件，以便它加载正确的段落。到目前为止，我们已经硬编码引导程序使用开发环境的段落。问题是，代码如何知道加载哪个段落？


    为此，我们必须向引导程序中添加一些检测机制。


