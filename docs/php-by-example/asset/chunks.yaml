    # 全局变量


    此前，你接触过函数，并在其中使用了*局部*变量。局部变量在函数体中创建（通过为变量赋值），并在函数运行期间存在。函数执行完毕后，局部变量会从内存中移除。下次调用该函数时，局部变量会再次创建，整个过程重复进行。程序清单
    6-4 中的程序展示了这一情形。


    ```

    程序清单 6-4

    局部变量

    ```


    以下是程序执行的结果。


    ```

    程序输出（来自程序清单 6-4）

    局部变量 $A = 100

    全局变量 $A = 200

    ```


    你使用了 `show()` 函数，该函数在其函数体中创建了一个值为 `100` 的局部变量 `$A`，并在输出窗口中显示该变量的值。在调用函数之前，你使用
    `$A=200` 命令创建了一个值为 `200` 的全局变量 `$A`。当调用 `show()` 函数时，显示的是值 `100`，而全局变量的值并未改变。原因很简单：调用
    `show()` 函数时创建的变量与全局变量 `$A` 毫无关系。


    另一方面，也存在需要在函数中对函数外部声明的变量（即*全局*变量）进行操作的情况。如果是这样，那么你需要在函数中指明该变量是全局变量。为此，你需要使用 `global`
    关键字，在其后跟上全局变量的名称。程序清单 6-5 展示了在函数中使用全局变量的示例。


    ```

    程序清单 6-5

    全局变量

    ```


    程序的输出如下。


    ```

    程序输出（来自程序清单 6-5）

    [1] 在函数中：$A = 100

    [2] 在函数中：$A = 200

    变量 $A = 200

    ```


    在函数体中，`global $A` 命令声明了 `$A` 变量是全局变量。接着，显示该变量的值，并将值 `200` 赋给它，然后再次检查该值。


    在程序中，给变量 `$A` 赋予了值 `100`。然后，你调用 `show()` 函数，并在调用后检查 `$A` 变量的值。所有操作都是针对同一个全局变量
    `$A` 进行的。


    > **注意**

    > 那种暗示在函数中使用全局变量的编程风格，并不能称之为非常成功。当函数被调用时，相应的全局变量是一个“外部因素”。这不太符合函数式编程的原则，根据这些原则，传递给函数的参数应当决定其结果。


    | 详情 |

    | --- |

    | 内置的 `$GLOBALS` 数组包含了程序中所有可用的全局变量。该数组在程序中的任何位置都可访问，并且无需以任何方式声明。 |


    ## 静态变量


    *静态变量*的概念相当有趣。这种变量使用 `static` 关键字声明。函数终止后，它不会从内存中移除，并且在每次后续函数调用中，都使用同一个变量。程序清单
    6-6 中的程序展示了如何使用静态变量。


    ```

    ",calc(),"\n";

    }

    ?>

    程序清单 6-6

    静态变量

    ```


    程序执行的结果可能看起来有点出乎意料。


    ```

    程序输出（来自程序清单 6-6）

    [1] calc() -> 100

    [2] calc() -> 200

    [3] calc() -> 300

    [4] calc() -> 400

    [5] calc() -> 500

    ```


    简单来说，一切都很明了。你有一个 `calc()` 函数，调用时不带任何参数。第一次调用该函数时，结果是 `100`。第二次调用时，结果是 `200`。第三次调用时，函数返回
    `300`，依此类推。因此，你使用相同的指令，但每次都得到一个新的（可预测的）结果。为了理解为什么会这样，我们来分析一下 `calc()` 函数的代码。


    在函数体中，`static $value=0` 命令创建了一个值为 `0` 的静态变量 `$value`。然后，通过 `$value+=100` 命令，该值增加
    `100`，并作为函数的结果返回。


    来看看第一次调用函数时发生了什么。很简单：`$value` 变量被创建，之后它获得值 `100`，然后函数返回结果。至此，函数的执行完成。如果 `$value`
    变量是普通的（非静态的），那么它会被从内存中移除，下次调用函数时，一切都会从创建新的 `$value` 变量开始。但该变量是静态的。因此，函数终止后，该变量不会从内存中删除。


    而且，下次调用 `calc()` 函数时，使用的就是这个变量，并且其值是上一次函数调用结束时所拥有的值。该值增加 `100` 后，作为结果返回。结果是，每次调用
    `calc()` 函数时，`$value` 变量的值都会增加 `100`。因此，每次函数都会返回一个新的值。


    | 详情 |

    | --- |

    | 用于将静态变量 `$value` 初始化为零值的命令仅执行一次，即第一次调用函数时。另外值得一提的是，`$value` 变量（尽管是静态的）仅在函数体内部可用。
    |

    '
- fmt: '# Multiline Strings


    From a practical point of view, strings are very important when using PHP. And
    often, you must deal with multiline strings. There are several ways to create
    them.


    To create a multiline string, you can use the following construction. The `<<<`
    instruction is followed by an identifier, and then a new line is entered. That
    is followed by text (without quotes) that can span multiple lines. The whole construction
    ends with the same identifier that begins, and a semicolon is placed at the very
    end. It must be the last instruction in the line with no additional characters.
    An example of using such a string is shown in Listing [6-7](#613529_1_En_6_Chapter.xhtml#PC13).


    ```

    Listing 6-7

    Getting Familiar with Multiline Strings

    ```


    The output of the program is as follows.


    ```

    The output of the program (from Listing 6-7)

    The mighty Dnieper roars and bellows,

    The wind in anger howls and raves,

    Down to the ground, it bends the willows,

    And mountain-high lifts up the waves.

    ```


    Here, the `$text` variable is assigned a rather complex expression, which begins
    with the `<<<` instruction followed by the `MYTEXT` identifier. (You determine
    the name of the identifier.) Then, the text follows, ending with the `MYTEXT`
    instruction and a semicolon.


    | Details |

    | --- |

    | The text indentation should be made relative to the position of the instruction
    that terminates the text value (in this case, the `MYTEXT` identifier). An error
    arises if the text is placed to the left of that instruction. |


    Notably, the name of the `$word` variable in the text fragment is used. As a result,
    the variable’s value is inserted instead of its name. That means the text behaves
    like a string literal enclosed in double quotes.


    There is another way to create a multiline string. It is similar to the previous
    one, but the initial identifier after the `<<<` instruction is enclosed in single
    quotes. An example of such a multiline string is shown in Listing [6-8](#613529_1_En_6_Chapter.xhtml#PC15).


    ```

    Listing 6-8

    Another Way to Create a Multiline String

    ```


    The following is the result of the program execution.


    ```

    The output of the program (from Listing 6-8)

    An example of programming code:

    $number=123;  // Creates a variable

    echo "\$number = ",$number,"\n";

    ```


    In this case, the `MYTEXT` identifier after the `<<<` instruction is enclosed
    in single quotes, and the text itself contains commands, including variable names.
    All the text content is displayed “as it is”—that is, it is similar to the situation
    when a string literal is enclosed in single quotes.


    ## Using Files


    Another important aspect of using PHP is related to operating with files. Let’s
    discuss the most common techniques for getting data from files and writing data
    to files.


    First of all, the file needs to be opened. To do that, you use the `fopen()` function.
    The function’s first argument is a string specifying the path to the file. The
    second argument is a string with special characters. That argument determines
    the access mode under which you use the file. Table [6-1](#613529_1_En_6_Chapter.xhtml#Tab1)
    lists and describes combinations for the second argument of the `fopen()` function.


    **Table 6-1** The Access Modes for Using Files


    | Instruction | Access Mode |

    | --- | --- |

    | `''r''` | The file is opened for reading. The pointer for reading is set at
    the beginning of the file. |

    | `''r+''` | The file is opened for reading and writing. The pointer for reading/writing
    is set at the beginning of the file. |

    | `''w''` | The file is opened for writing. The pointer for writing is set at
    the beginning of the file. The original contents of the file are deleted. If the
    file does not exist, it will be created. |

    | `''w+''` | The file is opened for reading and writing. The pointer for reading/writing
    is set at the beginning of the file. The original contents of the file are deleted.
    If the file does not exist, it will be created. |

    | `''a''` | The file is opened for writing only. The pointer for writing is set
    at the end of the file. If the file does not exist, it will be created. |

    | `''a+''` | The file is opened for reading and writing. The pointer for reading/writing
    is set at the end of the file. If the file does not exist, it will be created.
    |

    | `''x''` | The file is created for writing. The pointer for writing is set at
    the beginning of the file. If the file already exists, an error is raised. |

    | `''x+''` | The file is created and opened for reading and writing. The pointer
    for reading/writing is set at the beginning of the file. If the file already exists,
    an error is raised. |

    | `''c''` | The file is opened for writing only. If the file does not exist, it
    will be created. If the file already exists, then the contents of the file are
    not deleted. The pointer for writing is set at the beginning of the file. |

    | `''c+''` | The file is opened for reading and writing. The pointer for reading/writing
    is set at the beginning of the file. If the file does not exist, it will be created.
    If the file exists, its contents are not deleted. |


    As a result, the `fopen()` function returns a numeric identifier that can be used
    to access the opened file.


    | Details |

    | --- |

    | Data can be written and read in byte or character stream mode. As it is easy
    to understand from the name, operating with a byte stream implies that data is
    written and read byte by byte. If the stream is a character one, then reading
    and writing are performed character by character. The type of the stream (character
    or byte) is determined by the characters `b` (the byte stream) and `t` (the character
    stream), which are placed in the string after the instruction that specifies the
    file access mode. |


    There is a set of functions designed to work with files. The most important among
    them are the following. The `fgets()` function reads a line starting at the pointer
    in the file. The `fread()` function is used for byte reading. The `fwrite()` function
    allows you to write bytes. The `file()` function allows you to read a file into
    an array. You can use the `file_exists()` function to check if a file exists.
    The `is_readable()` function checks if a file is readable. The `feof()` function
    lets you know if the end of the file has been reached.


    | Details |

    | --- |

    | After operations with a file are completed, it is recommended to close the file.
    The `fclose()` function is used for that. In some cases, creating (for reading
    or writing) a file with a random name may be necessary (so no one gets unauthorized
    access to it by mistake). The `tmpfile()` function can be used for doing that.
    |'
