  \n**工作原理：购物车**\n\n购物车可执行的操作由 `include/config.php` 中定义的以下常量定义：`ADD_PRODUCT`、`REMOVE_PRODUCT`、`UPDATE_PRODUCTS_QUANTITIES`、`SAVE_PRODUCT_FOR_LATER`\
  \ 和 `MOVE_PRODUCT_TO_CART`。请注意，我们没有定义任何用于查看购物车的变量，因此如果 `CartAction` 没有取值或其值不等于任一操作变量，它将直接显示购物车内容。\n\
  \n除查看和更新购物车外，每个购物车操作都依赖于 `ProductID` 查询字符串参数（如果未设置则会引发错误）。如果满足相应条件，则会调用与访客操作对应的业务层方法。\n\
  \n**管理购物车**\n\n现在你已经完成了购物车的编写，还有两件事需要注意，都与管理问题有关。\n\n\n\n- 如何从目录中删除存在于购物车中的产品。\n\
  - 如何通过构建一个简单的购物车管理页面来统计或删除旧的购物车元素。这一点很重要，因为如果没有此功能，`shopping_cart` 表将持续增长，其中充满了旧的临时（且无用的）购物车。\n\
  \n## 删除存在于购物车中的产品\n\n目录管理页面允许您完全从目录中删除产品。\n\n在删除产品之前，您还应该删除其在访问者购物车中的出现记录。\n\n按照以下步骤更新\
  \ `hatshop` 数据库中的 `catalog_delete_product` 函数：\n\n**1.** 加载 pgAdmin III，并连接到 `hatshop`\
  \ 数据库。\n\n**2.** 点击“工具” ➤ “查询工具”（或点击工具栏上的 SQL 按钮）。此时应出现一个新的查询窗口。\n\n**3.** 使用查询工具执行以下代码，该代码会更新\
  \ `hatshop` 数据库中的 `catalog_delete_product` 函数：\n\n```sql\n-- Updates catalog_delete_product\
  \ function\n\nCREATE OR REPLACE FUNCTION catalog_delete_product(INTEGER) RETURNS\
  \ VOID LANGUAGE plpgsql AS $$\n\nDECLARE\n\ninProductId ALIAS FOR $1;\n\nBEGIN\n\
  \nDELETE FROM product_category WHERE product_id = inProductId;\nDELETE FROM shopping_cart\
  \ WHERE product_id = inProductId;\nDELETE FROM product WHERE product_id = inProductId;\n\
  \nEND;\n\n$$;\n```\n\n## 构建购物车管理页面\n\n关于购物车的第二个问题是，目前没有删除 `shopping_cart` 表中旧记录的机制。在一个高活动量的网站上，`shopping_cart`\
  \ 表可能会变得非常大。\n\n在当前版本的代码中，购物车 ID 在客户端浏览器中存储七天。因此，您可以假设任何在过去十天内未被更新的购物车都是无效的，并且可以被安全地移除。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00135.png)\n\n648XCH08.qxd\
  \ 10/31/06 10:07 PM Page 297\n\n在以下练习中，您将快速实现一个简单的购物车管理页面，管理员可以在该页面上查看有多少旧的购物车条目，并且可以选择删除它们。图\
  \ 8-5 展示了此页面。\n\n**图 8-5.** *管理购物车*\n\n您需要理解的最有趣的方面是用于删除所有在特定时间内未更新过的购物车的 SQL 逻辑。这并不像听起来那么简单——乍一看，您可能认为只需删除\
  \ `shopping_cart` 中 `added_on` 早于指定日期的所有记录即可。然而，此策略对于随时间修改的购物车（例如，访问者在过去三个月中每周向购物车添加商品）并不适用。如果对购物车的最后一次修改是最近的，则即使某些元素非常陈旧，也不应删除任何元素。换句话说，您应该要么删除购物车中的所有元素，要么一个都不删除。购物车的年龄由其最近修改或添加的产品的年龄决定。\n\
  \n话虽如此，请按照练习步骤实现新功能。\n\n### 练习：创建购物车管理页面\n\n**1.** 加载 pgAdmin III，并连接到 `hatshop`\
  \ 数据库。\n\n**2.** 将以下数据层函数添加到 `hatshop` 数据库：\n\n```sql\n-- Create shopping_cart_count_old_carts\
  \ function\n\nCREATE FUNCTION shopping_cart_count_old_carts(INTEGER)\n\nRETURNS\
  \ INTEGER LANGUAGE plpgsql AS $$\n\nDECLARE\n\ninDays ALIAS FOR $1;\n\noutOldShoppingCartsCount\
  \ INTEGER;\n\nBEGIN\n\nSELECT INTO outOldShoppingCartsCount\n\nCOUNT(cart_id)\n\n\
  FROM (SELECT cart_id\n\nFROM shopping_cart\n\nGROUP BY cart_id\n\nHAVING ((NOW()\
  \ - ('1'||' DAYS')::INTERVAL) >= MAX(added_on))) AS old_carts;\n\nRETURN outOldShoppingCartsCount;\n\
  \nEND;\n\n$$;\n```\n\n```sql\n-- Create shopping_cart_delete_old_carts function\n\
  ```\n\n\n\n```sql\nCREATE FUNCTION shopping_cart_delete_old_carts(INTEGER) RETURNS\
  \ VOID LANGUAGE plpgsql AS $$\n\nDECLARE\n  inDays ALIAS FOR $1;\nBEGIN\n  DELETE\
  \ FROM shopping_cart\n  WHERE cart_id IN\n    (SELECT cart_id\n     FROM shopping_cart\n\
  \     GROUP BY cart_id\n     HAVING ((NOW() - (inDays||' DAYS')::INTERVAL) >= MAX(added_on)));\n\
  END;\n$$;\n```\n\n**3.** 在 `business/shopping_cart.php` 中添加以下业务层方法：\n\n```php\n\
  // 统计旧购物车\npublic static function CountOldShoppingCarts($days)\n{\n  // 构建 SQL 查询\n\
  \  $sql = 'SELECT shopping_cart_count_old_carts(:days);';\n  // 构建参数数组\n  $params\
  \ = array (':days' => $days);\n  // 使用 PDO 特定功能准备语句\n  $result = DatabaseHandler::Prepare($sql);\n\
  \  // 执行查询并返回结果\n  return DatabaseHandler::GetOne($result, $params);\n}\n\n// 删除旧购物车\n\
  public static function DeleteOldShoppingCarts($days)\n{\n  // 构建 SQL 查询\n  $sql\
  \ = 'SELECT shopping_cart_delete_old_carts(:days);';\n  // 构建参数数组\n  $params = array\
  \ (':days' => $days);\n  // 使用 PDO 特定功能准备语句\n  $result = DatabaseHandler::Prepare($sql);\n\
  \  // 执行查询\n  return DatabaseHandler::Execute($result, $params);\n}\n```\n\n**4.**\
  \ 创建一个名为 `presentation/smarty_plugins/function.load_admin_cart.php` 的新文件，并向其中添加以下代码：\n\
