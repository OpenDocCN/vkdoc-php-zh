    Using PHP PDO for Database Operations


    Now you should learn the theory about how to put this in practice using PHP PDO.
    You’ll effectively write the code a bit later, when building the added functionality
    into the web site.


    As explained in Chapter 2, you won’t access PostgreSQL through PHP’s PostgreSQL-specific
    database functions but through a database abstraction layer (PHP PDO). The PDO


    classes permit accessing various data sources using the same API (Application
    Programming Interface), so you won’t need to change the PHP data access code or
    learn different data-access techniques when working with database systems other
    than PostgreSQL (but you might need to change the SQL code itself if the database
    you migrate to uses a different dialect). Using PHP PDO makes your life as a programmer
    easier in the long run.


    The important PHP PDO class you’ll work with is PDO, which provides methods for
    performing various database operations.


    ■**Note** In this book, you’ll learn about the PHP PDO functionality as used in
    HatShop. For more details about PHP PDO, see the PHP Manual documentation at http://www.php.net/manual/en/ref.pdo.php.


    The PDO class provides the functionality to connect to the PostgreSQL server and
    execute SQL queries. The function that opens a database connection is PDO’s constructor,
    which receives as parameters the connection string to the database server and
    an optional parameter that specifies whether the connection is a persistent connection.
    The connection string contains the data required to connect to the database server.
    You create a new PDO object like this: $dbh = new PDO(''pgsql:dbname='' . $db_name
    . '';host='' . $db_host, $db_user,


    $db_pass,


    array(PDO::ATTR_PERSISTENT => $persistent));


    ■**Note** The constructor of the PDO class returns an initialized database connection
    object (which is specific to the type of database you’re connecting to, such as
    pgsql) if the connection is successful; otherwise, an exception is thrown.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH03.qxd 11/8/06 9:45 AM Page 84


    **84**


    C H A P T E R 3 ■ C R E AT I N G T H E P R O D U C T C ATA L O G : PA RT I The
    previous code snippet shows the standard data you need to supply when connecting
    to a PostgreSQL server and uses five variables:


    • $db_user represents the username.


    • $db_pass represents the user’s password.


    • $db_host is the hostname of your PostgreSQL server.


    • $db_name is the name of the database you’re connecting to.


    • $persistent is true if we want to create a persistent database connection or
    false otherwise.


    To disconnect from the database, you need to make $dbh = null.


    The following code snippet demonstrates how to create, open, and then close a
    PostgreSQL database connection and also catch any exceptions that are thrown:
    try


    {


    // Open connection


    $dbh = new PDO(''pgsql:dbname='' . $db_name . '';host='' . $db_host, $db_user,
    $db_pass);


    // Close connection


    $dbh = null;


    }'
  trans: "\n另一种解决方案（也是在实现 HatShop 时你将采用的方案）可以描述如下：\n\n1. **打开** 数据库连接：在请求过程中首次需要访问数据库时建立连接。\n\
    \n2. **执行** 所有数据库函数（或 SQL 查询）：通过该连接进行，且不关闭连接。此处还需要处理可能出现的错误。\n\n3. **关闭** 数据库连接：当客户端请求处理完毕时关闭连接。\n\
    \n使用此方法，单个客户端请求（即用户每次访问网站新页面时）中发生的所有数据库操作都将通过同一个数据库连接进行，从而避免了每次需要从数据库获取数据时都打开和关闭连接。你仍将使用持久连接来提升为每个客户端请求打开新数据库连接的效率。\n\
    \n该解决方案就是你将在 HatShop 项目中用于数据访问的方法。\n\n## 使用 PHP PDO 进行数据库操作\n\n现在，你需要学习如何通过 PHP\
    \ PDO 将理论付诸实践。稍后在为网站构建附加功能时，你才会实际编写代码。\n\n如第 2 章所述，你不会通过 PHP 专用于 PostgreSQL 的数据库函数来访问\
    \ PostgreSQL，而是通过数据库抽象层（PHP PDO）进行访问。PDO 类允许使用相同的 API（应用程序编程接口）访问多种数据源，因此当使用非\
    \ PostgreSQL 的数据库系统时，你无需更改 PHP 数据访问代码，也无需学习不同的数据访问技术（但如果迁移后的数据库使用不同的 SQL 方言，则可能需要修改\
    \ SQL 代码本身）。从长远来看，使用 PHP PDO 能让你的程序员生活更轻松。\n\n你将使用的重要 PHP PDO 类是 `PDO`，它提供了执行各种数据库操作的方法。\n\
    \n> **注** 本书中，你将学习 HatShop 中使用的 PHP PDO 功能。关于 PHP PDO 的更多细节，请参阅 PHP 手册文档：http://www.php.net/manual/en/ref.pdo.php。\n\
    \n`PDO` 类提供了连接 PostgreSQL 服务器并执行 SQL 查询的功能。打开数据库连接的函数是 `PDO` 的构造函数，它接收两个参数：数据库服务器的连接字符串，以及一个可选参数，用于指定连接是否为持久连接。连接字符串包含连接数据库服务器所需的数据。创建新的\
    \ `PDO` 对象的方法如下：\n\n```\n$dbh = new PDO('pgsql:dbname=' . $db_name . ';host='\
    \ . $db_host, $db_user,\n$db_pass,\narray(PDO::ATTR_PERSISTENT => $persistent));\n\
    ```\n\n> **注** 如果连接成功，`PDO` 类的构造函数会返回一个初始化的数据库连接对象（该对象特定于你所连接的数据库类型，例如 `pgsql`）；否则会抛出异常。\n\
    \n上述代码片段展示了连接 PostgreSQL 服务器时需要提供的标准数据，并使用了五个变量：\n\n- `$db_user` 代表用户名。\n- `$db_pass`\
    \ 代表用户密码。\n- `$db_host` 是 PostgreSQL 服务器的主机名。\n- `$db_name` 是你所连接的数据库名称。\n- `$persistent`\
    \ 如需创建持久数据库连接则设为 `true`，否则设为 `false`。\n\n要断开数据库连接，你需要将 `$dbh` 设为 `null`。\n\n以下代码片段演示了如何创建、打开然后关闭\
    \ PostgreSQL 数据库连接，并捕获可能抛出的异常：\n\n```\ntry\n{\n    // 打开连接\n    $dbh = new PDO('pgsql:dbname='\
    \ . $db_name . ';host=' . $db_host, $db_user, $db_pass);\n\n    // 关闭连接\n    $dbh\
    \ = null;\n}\n```\n"
- fmt: "\n`catch (PDOException $e)`\n\n```\n{\n    echo 'Connection failed: ' . $e->getMessage();\n\
    }\n```\n\n`try`和`catch`关键字用于处理异常。\n\n## PHP 5 异常处理\n\n在第2章中，你实现了用于拦截和处理（并最终报告）HatShop站点中发生的错误的代码。**PHP错误**是你可以用来对PHP代码中发生的错误做出反应的标准机制。当PHP错误发生时，执行会停止；但是，你可以定义一个错误处理函数，该函数在终止执行之前被调用。你在第2章中添加了这样一个函数，在其中你尽可能多地获取有关错误的详细信息并将其记录下来以供将来参考。\n\
    \n有了这些详细信息，程序员可以修复代码以避免将来发生相同的错误。\n\nPHP 5与其他面向对象特性一起引入了一种处理运行时错误的新方法：异常。\n\n\
    异常代表了在代码中管理运行时错误的现代方式，并且比PHP错误更强大、更灵活。异常是面向对象模型的一个非常重要的部分，PHP 5引入了一个类似于其他面向对象语言（如Java和C#）的异常模型。然而，PHP中的异常与标准的PHP错误以一种奇怪的组合共存，你不能仅仅依赖异常来处理运行时问题。一些PHP扩展（如PDO）可以配置为生成异常来指示运行时发生的问题，而在其他情况下，你唯一的选择是处理标准PHP错误。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH03.qxd 11/8/06 9:45\
    \ AM Page 85\n\n### 第三章：创建产品目录：第一部分 85\n\n异常相对于错误的优势在于处理它们时提供的灵活性。当生成异常时，你可以本地处理它并让脚本继续正常执行，或者你可以将异常传递给另一个类进行进一步处理。使用异常，你的脚本不会像出现PHP错误时那样终止。当使用异常时，你将怀疑可能抛出异常的代码放在`try`块内，并在关联的`catch`块中处理潜在的异常：\n\
    \n```\ntry\n{\n    // 可能生成你想要处理的异常的代码\n}\ncatch (Exception $e)\n{\n    // 当生成异常时执行的代码\n\
    \    // （异常细节可通过 $e 对象访问）\n}\n```\n\n当`try`块中的任何代码生成异常时，执行会直接传递到`catch`块。除非`catch`块中的代码重新抛出异常，否则假定它已处理了该异常，并且脚本的执行会正常继续。这种灵活性允许你防止许多可能导致页面停止工作的原因，当你编写PHP代码时，你将体会到异常赋予你的强大功能！\n\
    \nPHP 5异常由`Exception`类表示，该类包含异常的详细信息。你可以使用`throw`关键字自己生成（抛出）异常。抛出的`Exception`对象会沿着调用栈传播，直到使用`catch`关键字拦截它。调用栈是正在执行的方法列表。因此，如果函数`A()`调用函数`B()`，而函数`B()`又调用函数`C()`，则调用栈将由这三个方法组成。在这种情况下，在函数`C()`中引发的异常可以在同一函数中处理，前提是有问题的代码位于`try-catch`块内。如果不是这种情况，异常会传播到方法`B()`，该方法有机会处理异常，依此类推。如果没有方法处理异常，则异常最终由PHP解释器拦截，它会将异常转换为PHP致命错误。\n\
    \n在我们的数据库处理代码中，我们将捕获PDO可能生成的潜在异常。\n\n虽然默认情况下不这样做，但可以指示PDO在执行SQL命令或打开数据库连接时出现问题的情况下生成异常，如下所示：\n\
    \n```\n// 创建一个新的 PDO 类实例\n$handler = new PDO( ... );\n\n// 配置 PDO 以抛出异常\nself::$_mHandler->setAttribute(PDO::ATTR_ERRMODE,\n\
    \                                PDO::ERRMODE_EXCEPTION);\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XCH03.qxd 11/8/06 9:45 AM Page 86\n\n### 86 第三章：创建产品目录：第一部分\n\n我们捕获这些异常，并将错误详细信息传递给你在第2章中编写的错误处理代码。以下代码片段显示了一个实现此功能的简短函数：\n\
    \n```\n// PDOStatement::fetch 的包装方法\npublic static function GetRow($statementHandler,\
    \ $params = null, $fetchStyle = PDO::FETCH_ASSOC)\n{\n    // 将返回值初始化为 null\n \
    \   $result = null;\n\n    // 尝试执行接收到的预处理语句\n    try\n    {\n        self::Execute($statementHandler,\
    \ $params);\n        $result = $statementHandler->fetch($fetchStyle);\n    }\n\
    \    catch(PDOException $e)\n    {\n        // 关闭数据库处理器并触发错误\n        self::Close();\n\
    \        trigger_error($e->getMessage(), E_USER_ERROR);\n    }\n\n    // 返回查询结果\n\
    \    return $result;\n}\n```\n\n## 使用连接发出命令\n\n打开连接后，你现在就达到了我们从一开始就追求的阶段：通过连接执行SQL命令。\n\
    \n你可以根据具体情况以多种方式执行命令。你想要执行的SQL查询是否返回任何数据？如果是，返回什么类型的数据以及以什么格式返回？我们将用于执行SQL查询的PDO方法有：\n\
    \n- `PDOStatement::execute`用于执行`INSERT`、`UPDATE`或`DELETE`查询。\n- `PDOStatement::fetch`用于从数据库中检索一行数据。\n\
    - `PDOStatement::fetchAll`用于从数据库中检索多行数据。\n- `PDO::prepare`准备要执行的SQL查询，创建一个所谓的*预处理语句*。\n\
    \n**预处理语句**是一个参数化的SQL查询，其参数值由参数标记（`?`）或命名变量（`:variable_name`）替换，如下例所示：\n- `$query1\
    \ = \"SELECT name FROM department WHERE department_id = ?\"`\n- `$query1 = \"\
    SELECT name FROM department WHERE department_id = :dept_id\"`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XCH03.qxd 11/8/06 9:45 AM Page 87\n\n### 第三章：创建产品目录：第一部分 87\n\n要执行预处理语句，你需要为执行查询的函数提供参数值，这些函数会为你构建完整的SQL查询。为了实现部门列表，你不需要使用参数，但你将在第4章中学习如何处理它们。\n\
    \n非预处理语句可以使用`PDO::exec`通过PDO执行，在这种情况下，你需要创建包含其参数的SQL查询字符串。在本书中，我们将始终使用预处理语句，因为它们带来了两个重要的好处：\n\
    \n- 参数值会被检查以防止注入攻击。\n- 使用预处理语句查询可能执行得更快，因为数据库服务器可以重用为预处理语句构建的访问计划。\n\n为了能够更多地重用数据库处理代码，并为数据库代码拥有集中的错误处理机制，我们不会从应用程序的业务层直接使用PDO方法。相反，我们将PDO功能包装到一个名为`DatabaseHandler`的类中，并将从业务层的其他类中使用这个类。\n\
    \n## 编写业务层代码\n\n好的，让我们编写一些代码！你将首先编写`DatabaseHandler`类，这将是一个支持类，包含其他业务层方法所需的通用功能。"
