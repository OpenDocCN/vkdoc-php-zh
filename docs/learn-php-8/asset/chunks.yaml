  trans: '

    我们必须调整 `get_breeds` 程序。`GetBreeds` 现在是一个类。我们还为 `GetBreeds` 构造函数创建了签名，使其接受一个数组。然而，正如你从这段代码中看到的，我们实际上会忽略传入数组的任何内容。这使我们能够在
    `dog_container` 中使用相同的方法来创建任何一个类的对象（或者实际上是任何接受数组的类的对象）。我们需要找到的就是类的名称（`dog` 或 `GetBreeds`），以便能够创建它的实例。


    ```

    function create_object($properties_array)

    {

    $dog_loc = $this->get_dog_application();

    if(($dog_loc == FALSE) || (!file_exists($dog_loc)))

    {

    return FALSE;

    }

    ```


    然后，`create_object` 方法会调用 `get_dog_application` 方法，并将返回的值（文件路径和文件名）存入 `$dog_loc`。如果
    `$dog_loc` 中的值为 FALSE 或者对应的文件不存在，该方法会向调用它的程序返回 `FALSE`。


    ```

    else

    {

    require_once($dog_loc);

    $class_array = get_declared_classes();

    $last_position = count($class_array) - 1;

    $class_name = $class_array[$last_position];

    $dog_object = new $class_name($properties_array);

    return $dog_object;

    } } }

    ?>

    ```


    如果路径和文件名有效，则会执行代码的 `else` 部分。`$dog_loc` 中的值被用于 `require_once` 语句（该语句会将文件内容拉取到此方法中）。我们现在必须确定文件中存在的类的名称（依赖注入要求我们不仅要发现文件名和文件路径，还要发现类名）。


    PHP 方法 `get_declared_classes` 会返回一个数组，其中包含程序中当前存在的所有类。这些类按照从先到后的顺序排列。因此，由于我们刚刚引入了一个包含类的文件（要么是
    `dog` 类，要么是 `get_breeds` 类），我们可以寻找所创建数组中的最后一个条目。我们将 `get_declared_classes` 创建的数组存入
    `$class_array`。现在我们可以确定数组的大小。PHP 方法 `count` 会返回数组的大小。请记住，数组的大小是数组中元素的数量，而不是最后一个位置的索引。如果一个数组的大小是
    10，那么实际的下标是 0 到 9，而不是 1 到 10。


    ```

    $last_position = count($class_array) - 1;

    ```


    *有关 `get_declared_classes` 的更多信息，请访问*

    [*www.php.net/manual/en/function.get-declared-classes.php*](http://www.php.net/manual/en/function.get-declared-classes.php)*。*


    考虑到这一点，这条语句会确定 `$class_array` 的大小，然后从大小中减去 1，并将该值存入 `$last_position`。因此，如果数组大小为
    10，数字 9 就会被存入 `$last_position`（因为数组下标是 0 到 9，而不是 10）。


    ```

    $class_name = $class_array[$last_position];

    ```


    然后，我们可以使用 `$last_position` 中的值从数组中取出最后创建的类，并将其存入 `$class_name`。如你所见，我们可以在 `[]`
    下标括号之间传递属性 `$last_position`，以向程序指示我们想要获取位于 `$last_position` 中位置上的值。这使我们能够从任意大小的数组中获取最后一个位置的信息（因为我们不确定
    `$class_array` 的大小）。


    现在我们可以创建该类的一个实例，因为我们已经将类名保存在 `$class_name` 中了。


    ```

    $dog_object = new $class_name($properties_array);

    ```


    这行代码现在将创建任何刚刚被引入（`require_once`）到程序中的类（其构造函数接受一个数组）的一个实例。该方法将创建 `dog` 类或 `getBreeds`
    类的一个实例。


    ```

    return $dog_object;

    ```


    最后，该对象（无论是 `dog` 对象还是 `getBreeds` 对象）被返回给调用此方法的程序。通过返回该对象，调用程序可以完全访问该对象及其属性和方法，即使它并没有实际创建这个对象（`dog_interface`
    可以使用该对象，尽管是 `dog_container` 创建了它）。


    对象在内存中的位置以类似的方式返回，就像上一个示例中数组的位置被传入构造函数一样。我们可以将其理解为新对象暂时被“包含”在 `dog_container`
    对象内部。然而，该对象会被返回（给 `dog_interface`）。


    *   *编程说明——什么？实际发生的情况是，`$dog_object` 在内存中的地址被传递给调用程序（`dog_interface`）。这使得调用程序以及
    `dog_container` 对象都能访问该对象。因此，内存中只有一份 `$dog_object` 的副本，但两个不同的程序块都可以使用它。如果其中一个块（`dog_container`
    或 `dog_interface`）关闭，另一个对象仍然可以访问它，直到它自身也关闭。然后，垃圾回收器会将 `$dog_object` 从内存中移除。*


    ```

