- fmt: '# MVC Improves Code Organization


    MVC improves upon the typical PHP flow and is an effective technique for making
    class objects available over the whole application. The main goal behind MVC is
    to make sure that each function of the application is written once and only once,
    thus streamlining code by reducing redundancy. `Cake` accomplishes this goal by
    not only providing the resources to make MVC possible but also by using a consistent
    method for where to store operations in the application. Simply naming your own
    files a certain way allows `Cake` to piece together the various resources without
    using any code specifications.


    MVC can vary depending on the framework with which you’re working, but generally
    it works as follows (see Figure 1-2):


    **1.** The client sends a page request to the application, either by typing a
    URL or by clicking a link of some kind. By convention, a typical URL is usually
    structured like this: `http://{Domain}.com/{Application}/{Controller}/{Action}/{Parameter
    1, etc.}`


    **2.** The dispatcher script parses the URL structure and determines which controller
    to execute. It also passes along any actions and parameters to the controller.


    **3.** The function in the controller may need to handle more data than just the
    parameters forwarded by the dispatcher. It will send database requests to the
    model script.


    **4.** The model script determines how to interact with the database using the
    requests submitted by the controller. It may run queries with the database and
    do all sorts of handy data-sorting instructions.


    **5.** Once the model has pulled any data from or sent data to the database, it
    returns its output to the controller.


    **6.** The controller processes the data and outputs to the view file.


    **7.** The view adds any design or display data to the controller output and sends
    its output to the client’s browser.


    ![Image 8](index-27_1.jpg)


    ![Image 9](index-27_2.jpg)


    ![Image 10](index-27_3.jpg)


    ![Image 11](index-27_4.jpg)


    ![Image 12](index-27_5.jpg)


    **Figure 1-2.** *How Cake makes use of the MVC structure*


    The benefit of using MVC to develop web sites is that repeated functions or tasks
    can be separated, thus allowing for quicker edits. It can even help in debugging.
    Say an error keeps occurring during the interaction with the database. Usually
    the problem will be somewhere in a model. Knowing that all database interactions
    occur in just one place makes it easier to solve problems.


    ## CRUD Operations and the Bake Script


    Almost all web sites use CRUD operations: create, read, update, and delete. A
    blog, for example, will need to create posts; users will need to be able to read
    each post; the author will likely want the ability to edit the post in the future
    or update the post; and the author will also want access for deleting posts.


    `Cake` makes these operations a breeze with its automated CRUD functions. Instead
    of writing each CRUD operation by hand, it has prebuilt classes that do it for
    you. `Cake` includes the `Bake` script, a handy command-line tool that generates
    editable CRUD code based on your database schema and customized parameters.


    ## Scaffolding


    Getting a web site off the ground is much easier with Cake’s scaffolding abilities.
    With just one simple line of code, you can call out Cake’s prebuilt scaffold to
    render views based on the database. In other words, it figures out how some standard
    interface views should work with your database and outputs the HTML forms, all
    without you having to write one bit of HTML.


    Although the scaffolding feature is not intended for full production views, it
    lets you begin testing logic and functions without wasting time building views
    or HTML output.


    ## Helpers


    `Cake` comes with standard HTML, Ajax, and JavaScript helpers that make creating
    views much easier. Your HTML output will be greatly facilitated by intuitive strings
    of helper code that render the markup for you. And getting Ajax to work, although
    a little tricky at first, is much easier and far more efficient than if you had
    to worry about DOM peculiarities. What’s more, you can download other helpers
    written by fellow Cake developers to boost the strength of the framework or even
    write your own to cut down on repetitive or clumsy markup.


    ## Customizable Elements


    You can customize each of Cake’s features to fit your application. For example,
    you can bring `FCKeditor`, the popular WYSIWYG editor for web browsers, into `Cake`
    as a plugin. Using customized helpers, you can bring all the functionality of
    `FCKeditor` into your `Cake` application and actually trim out extra lines of
    PHP code to get it working. Later, I’ll discuss other Cake elements such as components,
    helpers, and plugins, all of which can be customized by you for your specific
    needs or brought into your application as third-party resources from other developers.


    ## Large Community


    Should you need help down the road, a massive online community exists to provide
    it. In reality, the PHP community is the largest open source programming group
    on the Web, so if you need a quick workaround for a problem in `Cake`, someone
    somewhere will have some help for you, usually within minutes. Cake specialists
    have also established online forums, chat rooms, and blogs to help others improve
    and learn the framework. Compared to other PHP frameworks, this community is one
    of the largest on the Web.


    Code samples are a must for anyone getting involved in web development. PHP dominates
    this field, and `Cake` has a growing repository of code samples as well. If you
    are considering another framework, this fact just may tip the scales in favor
    of `Cake` if you are wanting to piggyback on someone else’s work.


    ## More Features


    `Cake` aims to simplify the development process for building web applications
    by providing an overall method for organizing the database and other resource
    files that cuts down on code. Although this general approach to web programming
    is itself a major feature `Cake` offers, its repository of other powerful resources
    such as built-in validation, access control lists (ACLs), data sanitization, security
    and session handling components, and view caching make `Cake` worth any serious
    developer’s time.


    ## Summary


    As a framework, `Cake` inverts the flow of control and provides you, the developer,
    with an effective method for extending your web application in less time. `Cake`
    is built in PHP and therefore allows you to take advantage of a web-based framework
    without having to learn or use another programming language. Other benefits to
    using `Cake` include its MVC structure, which separates resources and functions
    of the application; the `Bake` script, which automates CRUD scripting; the scaffolding
    features, which reduce basic view rendering into one line of code; the built-in
    helpers, which reduce HTML output operations into single-line call-outs; and the
    large and still growing Cake community.


    ---


    # PART 1


    Getting Started


    ---


    ## Installing and Running CakePHP


    One of Cake’s selling points is its ease of installation. At this point I could
    add a long tutorial explaining how to install `Cake` for every possible server
    configuration, but I won’t. `Cake` should be simple enough to install, and if
    you do experience trouble getting off the ground with it, chances are the problem
    lies in a more unduly complex server configuration. Appendix A addresses some
    of the choices beginners make in setting up a localhost environment in case you
    run into installation questions during this chapter. By and large, any troubles
    getting `Cake` to work are due to localhost issues, not enterprise server or web
    service provider setups.'
