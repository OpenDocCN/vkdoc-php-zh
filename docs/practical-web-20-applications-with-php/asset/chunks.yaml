    **Routing Requests to UserController**


    For all the other controllers we have created so far, the access URL has been
    in the format


    [http://phpweb20/ *controller*/ *action*; for example](http://phpweb20/controller/action),
    the edit action of the blogmanager contr[oller has a URL of http://phpweb20/blogmanager/edit.
    I](http://phpweb20/blogmanager/edit)f no action is specified, index is the default
    action used for a controller. So in the case of blogmanager, the index action
    can be


    [accessed using either http://phpweb20/blogmanager or](http://phpweb20/blogmanager)
    [http://phpweb20/blogmanager/index.](http://phpweb20/blogmanager/index)


    In UserController, we will be altering the way URLs work, since all actions in
    this controller will relate to a particular user. In order to specify the user,
    we will change the URL


    [scheme to be http://phpweb20/user/ *username*/ *action*. As y](http://phpweb20/user/username/action)ou
    can see, we have inserted the username between the controller name (user) and
    the action.


    To achieve this, we must modify the *router* for our front controller. The router—an
    instance of Zend_Controller_Router—is responsible for determining the controller
    and action that should handle a user’s request based on the request URL. When
    Zend_Controller_Front is instantiated in our bootstrap index.php file, a set of
    default routes is automatically created to route requests using the [http://phpweb20/
    *controller*/ *action* scheme](http://phpweb20/controller/action). We want to
    keep these routes intact for all other requests, but for the UserController we
    want an extra route. To do this, we must define the route, and then inject it
    into the front controller’s router.


    Creating a New Route


    To create a new route, there are three Zend_Controller classes that can be used
    (or you can develop your own). These are the existing classes:


    • Zend_Controller_Router_Route: This is the standard route used by Zend_Controller,
    allowing a combination of static and dynamic variables in a URL. A dynamic variable
    is indicated by preceding the variable name with a colon, such as :controller.
    The route we have used in this application so far has been /:controller/:action.
    For example, in


    [http://phpweb20/blogmanager/edit,](http://phpweb20/blogmanager/edit) blogmanager
    is assigned to the controller request variable, while edit is assigned to the
    action request variable.


    • Zend_Controller_Router_Route_Static: In some cases, the URL you want to use
    doesn’t require any dynamic variables, and you can use this static route type.
    For example, if y[ou wanted a URL such as http://phpweb20/sitemap, which inter](http://phpweb20/sitemap)nally
    was handled by a controller action called sitemapAction() in one of your controllers,
    you could route this URL accordingly, using /sitemap as the static route.


    • Zend_Controller_Router_Route_Regex: This type of route allows you to route URLs
    based on regular expression matches. For example, if you wanted to route all requests
    such as [http://phpweb20/ *1234* (wher](http://phpweb20/1234)e 1234 could be any
    number), you could match the route using /([0-9]+). When used in combination with
    the default routes, any request that didn’t match this regular expression would
    be routed using the normal


    /:controller/:action route.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


