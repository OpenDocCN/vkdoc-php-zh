- fmt: "1.  Create a PHP page called `imagelist.php` in the `filesystem` folder. Alternatively,\
    \ use `imagelist_01.php` in the `ch07` folder.\n\n2.  Create a form inside `imagelist.php`\
    \ and insert a `<select>` element with just one `<option>`, like this (the code\
    \ is already in `imagelist_01.php`):\n\n```\n<select name=\"pix\">\n    <option\
    \ value=\"\">Select an image</option>\n</select>\n```\n\nThis `<option>` is the\
    \ only static element in the drop-down menu.\n\n3.  Amend the `<select>` element\
    \ in the form like this:\n\n```\n<select name=\"pix\">\n    <option value=\"\"\
    >Select an image</option>\n    <?php\n    foreach ($files as $file) {\n      \
    \  ?>\n        <option value=\"<?php echo $file->getFilename(); ?>\"><?php echo\
    \ $file->getFilename(); ?></option>\n        <?php\n    }\n    ?>\n</select>\n\
    ```\n\nMake sure that the path to the `images` folder is correct for your site’s\
    \ folder structure. The regex used as the second argument to the `RegexIterator`\
    \ constructor matches case-insensitive files with the filename extensions `.jpg`,\
    \ `.png`, `.gif`, and `.webp`.\n\nThe `foreach` loop simply gets the filename\
    \ of the current image and inserts it into the `<option>` element.\n\nSave `imagelist.php`\
    \ and load it into a browser. You should see a drop-down menu listing all the\
    \ images in your `images` folder, as shown in Figure [7-2](#332054_4_En_7_Chapter.xhtml#Fig2).\n\
    \nWhen incorporated into an online form, the filename of the selected image appears\
    \ in the `$_POST` array and is identified by the `name` attribute of the `<select>`\
    \ element—in this case, `$_POST['pix']`. That’s all there is to it! You can compare\
    \ your code with `imagelist_02.php` in the `ch07` folder.\n\n## PHP Solution 7-4:\
    \ Creating a Generic File Selector\n\nThe previous PHP solution relies on an understanding\
    \ of regular expressions. Adapting it to work with other filename extensions isn’t\
    \ difficult, but you need to be careful that you don’t accidentally delete a vital\
    \ character. Unless regexes are your specialty, it’s probably easier to wrap the\
    \ code in a function that can be used to inspect a specific folder and create\
    \ an array of filenames of specific types. For example, you might want to create\
    \ an array of PDF document filenames or one that contains both PDFs and Word documents.\
    \ Here’s how you do it.\n\n1.  Create a new file called `buildlist.php` in the\
    \ `filesystem` folder. The file will contain only PHP code, so delete any HTML\
    \ inserted by your editing program.\n\n2.  Add the following code to the file:\n\
    \n```\nfunction buildFileList($dir, $extensions) {\n    if (!is_dir($dir) && !is_readable($dir))\
    \ {\n        return false;\n    } else {\n        if (is_array($extensions)) {\n\
    \            $extensions = implode('|', $extensions);\n        }\n    }\n}\n```\n\
    \nThis defines a function called `buildFileList()`, which takes two arguments:\n\
    \n*   `$dir`: The path to the folder from which you want to get the list of filenames.\n\
    *   `$extensions`: This can be either a string containing a single filename extension\
    \ or an array of filename extensions. To keep the code simple, the filename extensions\
    \ should not include a leading period.\n\nThe function begins by checking whether\
    \ `$dir` is a folder and is readable. If it isn’t, the function returns `false`,\
    \ and no more code is executed.\n\nIf `$dir` is okay, the `else` block is executed.\
    \ It also begins with a conditional statement that checks whether `$extensions`\
    \ is an array. If it is, it’s passed to `implode()`, which joins the array elements\
    \ with a vertical pipe (`|`) between each one. A vertical pipe is used in regexes\
    \ to indicate alternative values. Let’s say the following array is passed to the\
    \ function as the second argument:\n\n```\n['jpg', 'png', 'gif']\n```\n\nThe conditional\
    \ statement converts it to `jpg|png|gif`. So, this looks for `jpg`, or `png`,\
    \ or `gif`. However, if the argument is a string, it remains untouched.\n\n3.\
    \  You can now build the regex search pattern and pass both arguments to the `FilesystemIterator`\
    \ and `RegexIterator`, like this:\n\n```\nfunction buildFileList($dir, $extensions)\
    \ {\n    if (!is_dir($dir) && !is_readable($dir)) {\n        return false;\n \
    \   } else {\n        if (is_array($extensions)) {\n            $extensions =\
    \ implode('|', $extensions);\n        }\n        $pattern = \"/\\.(?:{$extensions})$/i\"\
    ;\n        $folder = new FilesystemIterator($dir);\n        $files = new RegexIterator($folder,\
    \ $pattern);\n    }\n}\n```\n\nThe regex pattern is built using a string in double\
    \ quotes and wrapping `$extensions` in curly braces to make sure it’s interpreted\
    \ correctly by the PHP engine. Take care when copying the code. It’s not exactly\
    \ easy to read.\n\n4.  The final section of the code extracts the filenames to\
    \ build an array, which is sorted and then returned. The finished function definition\
    \ looks like this:\n\n```\nfunction buildFileList($dir, $extensions) {\n    if\
    \ (!is_dir($dir) && !is_readable($dir)) {\n        return false;\n    } else {\n\
    \        if (is_array($extensions)) {\n            $extensions = implode('|',\
    \ $extensions);\n        }\n        $pattern = \"/\\.(?:{$extensions})$/i\";\n\
    \        $folder = new FilesystemIterator($dir);\n        $files = new RegexIterator($folder,\
    \ $pattern);\n        $filenames = [];\n        foreach ($files as $file) {\n\
    \            $filenames[] = $file->getFilename();\n        }\n        natcasesort($filenames);\n\
    \        return $filenames;\n    }\n}\n```\n\nThis initializes an array and uses\
    \ a `foreach` loop to assign the filenames to it with the `getFilename()` method.\
    \ Finally, the array is passed to `natcasesort()`, which sorts it in a natural,\
    \ case-insensitive order. What “natural” means is that strings that contain numbers\
    \ are sorted in the same way as a person would. For example, a computer normally\
    \ sorts `img12.jpg` before `img2.jpg`, because the 1 in 12 is lower than 2. Using\
    \ `natcasesort()` results in `img2.jpg` preceding `img12.jpg`.\n\n5.  To use the\
    \ function, use as arguments the path to the folder and the filename extensions\
    \ of the files you want to find. For example, you could get all Word and PDF documents\
    \ from a folder like this:\n\n```\n$docs = buildFileList('folder_name', ['doc',\
    \ 'docx', 'pdf']);\n```\n\nThe code for the `buildFileList()` function is in `buildlist.php`\
    \ in the `ch07` folder.\n\n## Accessing Remote Files\n\nReading, writing, and\
    \ inspecting files on your local computer or on your own web site are useful.\
    \ But `allow_url_fopen` also gives you access to publicly available documents\
    \ anywhere on the Internet. You can read the content, save it to a variable, and\
    \ manipulate it with PHP functions before incorporating it in your own pages or\
    \ saving the information to a database.\n\nA word of caution: when extracting\
    \ material from remote sources for inclusion in your own pages, there’s a security\
    \ risk. For example, a remote page might contain malicious scripts embedded in\
    \ `<script>` tags or hyperlinks.\n\nEven if the remote page supplies data in a\
    \ known format from a trusted source—such as product details from the [Amazon.​com](http://amazon.com)\
    \ database, weather information from a government meteorological office, or a\
    \ news feed from a newspaper or broadcaster—you should always sanitize the content\
    \ by passing it to `htmlentities()` (see PHP Solution 6-3). As well as converting\
    \ double quotes to `&quot;`, `htmlentities()` converts `<` to `&lt;` and `>` to\
    \ `&gt;`. This displays tags in plain text, rather than treating them as HTML.\n\
    \nIf you want to permit some HTML tags, use the `strip_tags()` function instead.\
    \ If you pass a string to `strip_tags()`, it returns the string with all HTML\
    \ tags and comments stripped out. It also removes PHP tags. A second, optional\
    \ argument is a list of tags that you want preserved. For example, the following\
    \ strips out all tags except paragraphs and first- and second-level headings:\n\
    \n```\n$stripped = strip_tags($original, '<p><h1><h2>');\n```"
