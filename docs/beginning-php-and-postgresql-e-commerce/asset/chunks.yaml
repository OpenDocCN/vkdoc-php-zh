    in “plain format” to your PostgreSQL server, so if the PostgreSQL server is on
    another network (which is quite unlikely, however), you must secure the connection
    between your web server and the PostgreSQL server by using SSL connections.


    This can be avoided by handling hashing in the PHP code, which also offers better
    portability because it doesn’t rely on PostgreSQL-specific functions. Remember
    that for the same portability reason, we chose to use PDO instead of using PHP
    PostgreSQL-specific functions.


    **Implementing the Encryption Functionality in the Business Tier** Encryption
    comes in many shapes and sizes and continues to be a hot topic. There is no definitive
    solution to encrypting data, although there is plenty of advice on the subject.
    In general, the two forms of encryption are


    **Symmetric encryption:** A single key is used both to encrypt and decrypt data.'
  trans: "\n`city` `VARCHAR(100)`,,\n\n`region` `VARCHAR(100)`,,\n\n`postal_code`\
    \ `VARCHAR(100)`,,\n\n`country` `VARCHAR(100)`,,\n\n`shipping_region_id` `INTEGER`\
    \ `NOT NULL` `DEFAULT 1`,,\n\n`day_phone` `VARCHAR(100)`,,\n\n`eve_phone` `VARCHAR(100)`,,\n\
    \n`mob_phone` `VARCHAR(100)`,,\n\n`CONSTRAINT pk_customer_id PRIMARY KEY (customer_id)`,\
    \ `CONSTRAINT fk_shipping_region_id FOREIGN KEY (shipping_region_id) REFERENCES\
    \ shipping_region (shipping_region_id)`\n\n`ON UPDATE RESTRICT ON DELETE RESTRICT`,\n\
    \n`CONSTRAINT uk_email UNIQUE (email)`\n\n);\n\n客户的信用卡信息将以加密格式存储，确保无人能够访问这些信息。但与密码不同，当订单处理流程需要时，你必须能够检索到信用卡信息，因此不能简单地使用哈希算法（哈希算法是单向的）。你将通过多个业务层类来实现信用卡数据加密功能，接下来将会看到这些类。\n\
    \n## 实现安全类\n\n到目前为止，以下两个领域需要安全功能：\n\n- 密码哈希\n- 信用卡加密\n\n这两项任务均由业务层类完成，这些类将保存在\
    \ `business` 目录下的以下文件中：\n\n- `password_hasher.php`：包含 `PasswordHasher` 类，其中包含静态方法\
    \ `Hash()`，用于返回所提供密码的哈希值。\n- `secure_card.php`：包含 `SecureCard` 类，代表一张信用卡。该类可以接收信用卡信息，并以加密格式提供访问。该类也可以接收加密的信用卡数据，并提供解密后的信息访问。\n\
    - `symmetric_crypt.php`：此文件中的 `SymmetricCrypt` 类被 `SecureCard` 用于加密和解密数据。这意味着，如果你需要更改加密方法，只需修改此处的代码，而无需改动\
    \ `SecureCard` 类。\n\n我们先来看哈希的代码，然后再看加密。\n\n## 在业务层中实现哈希功能\n\n哈希是一种获取表示对象的唯一值的方法。用于将源字节数组转换为哈希字节数组的算法各不相同。最常用的哈希算法是\
    \ MD5（消息摘要，所生成哈希代码的另一种称呼），它生成 128 位的哈希值。遗憾的是，许多攻击都是基于针对 MD5 哈希构建的词典。另一种流行的哈希算法是\
    \ SHA1（安全哈希算法），它生成 160 位的哈希值。普遍认为 SHA1 比 MD5 更安全（尽管速度较慢）。\n\n在 HatShop 的实现中，你将使用\
    \ SHA1，不过如果需要其他安全类型，也很容易更改。现在，你将在以下练习中实现 `PasswordHasher` 类。\n\n> **注意：** PHP\
    \ 默认不支持 `mhash` 和 `mcrypt`，这是本章用于哈希和加密的库。请参阅附录 A 了解如何启用对 `mhash` 和 `mcrypt` 的支持。\n\
    \n### 练习：实现 `PasswordHasher` 类\n\n要实现 `PasswordHasher` 类，请遵循以下步骤：\n\n**1.** 在\
    \ `include/config.php` 文件末尾添加以下行。这定义了一个随机值（你可以随意更改），用于在哈希之前添加到密码中。\n\n```php\n\
    // 用于哈希的随机值\ndefine('HASH_PREFIX', 'K1-');\n```\n\n**2.** 在 `business` 目录中创建一个名为\
    \ `password_hasher.php` 的新文件，并编写 `PasswordHasher` 类：\n\n```php\n<?php\nclass PasswordHasher\n\
    {\n    public static function Hash($password, $withPrefix = true)\n    {\n   \
    \     if ($withPrefix)\n            $hashed_password = sha1(HASH_PREFIX . $password);\n\
    \        else\n            $hashed_password = sha1($password);\n        return\
    \ $hashed_password;\n    }\n}\n?>\n```\n\n**3.** 接下来，编写一个简单的测试页面来测试 `PasswordHasher`\
    \ 类。在 `hatshop` 文件夹中创建一个名为 `test_hasher.php` 的新文件，并在其中包含以下代码：\n\n```php\n<?php\n\
    if (isset ($_GET['to_be_hashed']))\n{\n    require_once 'include/config.php';\n\
    \    require_once BUSINESS_DIR . 'password_hasher.php';\n    $original_string\
    \ = $_GET['to_be_hashed'];\n    echo '\"' . $original_string . '\" 的哈希值是 ' .\n\
    \        PasswordHasher::Hash($original_string, false);\n    echo '<br />';\n\
    \    echo '... 而 \"' . HASH_PREFIX . $original_string .\n        '\"（秘密前缀与密码连接）的哈希值是\
    \ ' .\n        PasswordHasher::Hash($original_string, true);\n}\n?>\n<br /><br\
    \ />\n<form action=\"test_hasher.php\">\n请输入您的密码：\n<input type=\"text\" name=\"\
    to_be_hashed\" /><br />\n<input type=\"submit\" value=\"计算哈希\" />\n</form>\n```\n\
    \n**4.** 在你喜欢的浏览器中加载 `test_hasher.php` 文件，输入要哈希的密码，并查看如图 11-1 所示的结果。\n\n**图 11-1.**\
    \ *测试密码哈希功能*\n\n### 工作原理：哈希功能\n\n`PasswordHasher` 类中的代码非常简单。默认情况下，静态 `Hash()`\
    \ 方法返回一个字符串的哈希值，该字符串由秘密前缀与密码连接而成。\n\n你可能会好奇秘密前缀的作用。正如你可能已经猜到的，这与安全性有关。如果你的数据库被盗，攻击者可能会尝试将哈希后的密码值与一个大型哈希值字典进行匹配，该字典看起来像这样：\n\
    \n```\nword1 .... sha1(word1)\nword2 .... sha1(word2)\n...\nword10000 .... sha1(word10000)\n\
    ```\n\n如果两个哈希值匹配，则意味着原始字符串（在本例中为客户密码）也匹配。\n\n在哈希之前将秘密前缀附加到密码中，可以降低对哈希密码数据库进行字典攻击的风险，因为被哈希的字符串（秘密前缀\
    \ + 密码）不太可能出现在大型的“密码-哈希值”对字典中。\n\n`test_hasher.php` 页面测试了你新创建的 `PasswordHasher`\
    \ 类。\n\n> **注意：** 你也可以通过使用 PostgreSQL 加密函数在数据库级别处理哈希。\n> 首先，你需要将加密函数添加到 PostgreSQL。Unix\
    \ 用户应查看 PostgreSQL 源码中的 `contrib/pgcrypto` 目录并按照说明操作（详细说明请参阅附录 A）。然后，例如，你可以执行以下\
    \ PostgreSQL 语句来查看 PostgreSQL SHA1 的实际效果：\n> ```sql\n> SELECT ENCODE(DIGEST('freedom',\
    \ 'sha1'), 'hex');\n> ```\n> 当然，当依赖 PostgreSQL 的哈希功能时，密码会以“明文格式”传输到你的 PostgreSQL\
    \ 服务器，因此如果 PostgreSQL 服务器位于另一个网络（尽管这种情况不太常见），你必须通过使用 SSL 连接来保护 Web 服务器和 PostgreSQL\
    \ 服务器之间的连接。\n> 这可以通过在 PHP 代码中处理哈希来避免，这也提供了更好的可移植性，因为它不依赖于 PostgreSQL 特有的函数。请记住，出于同样的可移植性原因，我们选择使用\
    \ PDO 而不是 PHP 的 PostgreSQL 特有函数。\n\n## 在业务层中实现加密功能\n\n加密以多种形式和样式存在，并且一直是一个热门话题。尽管关于这个主题有大量建议，但并没有一种确定的数据加密解决方案。一般来说，加密有两种形式：\n\
    \n**对称加密：** 使用单个密钥来加密和解密数据。"
- fmt: "# Asymmetric Encryption\n\n**Asymmetric encryption:** Separate keys are used\
    \ to encrypt and decrypt data. The encryption key is commonly known as the **public\
    \ key**, and anyone can use it to encrypt information. The decryption key is known\
    \ as the **private key** because it can only be used to decrypt data that has\
    \ been encrypted using the public key. The encryption key (public key) and the\
    \ decryption key (private key) are mathematically related and are always generated\
    \ in pairs. The public key and private key can’t be obtained one from another.\
    \ If you have a public key/private key pair, you can send the public key to parties\
    \ that need to encrypt information for you. You will be the only one who knows\
    \ the private key associated with that public key, thus the only one able to decrypt\
    \ the information.\n\nAlthough asymmetric encryption is more secure, it also requires\
    \ much more processing power. Symmetric encryption is faster but can be less secure\
    \ because both the encryptor and decryptor have knowledge of a single key. With\
    \ symmetric encryption, the encryptor needs to send the key to the decryptor.\
    \ With Internet communications, there is often no way of ensuring that this key\
    \ remains a secret from third parties when it is sent to the encryptor.\n\nAsymmetric\
    \ encryption gets around this by using key pairs. There is never a need for the\
    \ decryption key to be divulged, so it’s much more difficult for a third party\
    \ to break the encryption. Because it requires a lot more processing power, however,\
    \ the practical method of operation is to use asymmetric encryption to exchange\
    \ a symmetric key over the Internet, which is then used for symmetric encryption\
    \ safe in the knowledge that this key has not been exposed to third parties.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH11.qxd 11/17/06 3:37\
    \ PM Page 361\n\n## C H A P T E R 1 1 ■ M A N A G I N G C U S TO M E R D E TA\
    \ I L S\n\n**361**\n\nIn the HatShop application, things are much simpler than\
    \ with Internet communications. You just need to encrypt data for storage in the\
    \ database and decrypt it again when required, so you can use a symmetric encryption\
    \ algorithm.\n\n> **Note:** Behind the scenes, some asymmetric encryption is also\
    \ going on, however, because that is the method implemented by HTTPS communication.\n\
    \nAs with hashing, several algorithms can be used for both symmetric and asymmetric\
    \ encryption. PHP’s `mcrypt` library contains implementations of the most important\
    \ symmetric algorithms. No library in PHP deals with asymmetric encryption, but\
    \ if you ever need to do asymmetric encryption, you can use the PGP (Pretty Good\
    \ Privacy) family of software (for more information, see http://www.pgp.com) and\
    \ GnuPG (http://www.gnupg.org).\n\nTwo of the more commonly used asymmetric algorithms\
    \ are DSA (Digital Signature Algorithm) and RSA (Rivest-Shamir-Adleman, from the\
    \ names of its inventors, Ronald Rivest, Adi Shamir, and Leonard Adleman). Of\
    \ these, DSA can only be used to “sign” data so that its authenticity can be verified,\
    \ whereas RSA is more versatile (although slower than DSA when used to generate\
    \ digital signatures). DSA is the current standard for digital authentication\
    \ used by the U.S. government. Both the DSA and the RSA asymmetric algorithms\
    \ are implemented in the PGP family of software (PGP and GnuPG).\n\nSome popular\
    \ symmetric algorithms found in the `mcrypt` library are DES (Data Encryption\
    \ Standard), Triple DES (3DES), RC2 (Ron’s Code, or Rivest’s Cipher, depending\
    \ on who you ask, also from Ronald Rivest), and Rijndael (from the names of its\
    \ inventors, Joan Daemen and Vincent Rijmen).\n\n## DES AND RIJNDAEL\n\nDES has\
    \ been the standard for some time now, although this is gradually changing. It\
    \ uses a 64-bit key, however, in practice only 56 of these bits are used (8 bits\
    \ are “parity” bits), which are not strong enough to avoid being broken using\
    \ today’s computers.\n\nBoth Triple DES and RC2 are variations of DES. Triple\
    \ DES effectively encrypts data using three separate DES encryptions with three\
    \ keys totaling 168 bits when parity bits are subtracted. The RC2 variant can\
    \ have key lengths up to 128 bits (longer keys are also possible using RC3, RC4,\
    \ and so on), so it can be made weaker or stronger than DES depending on the key\
    \ size.\n\nRijndael is a completely separate encryption method and has now been\
    \ accepted as the new AES (Advanced Encryption Standard) standard (several competing\
    \ algorithms were considered before Rijndael was chosen). This standard is intended\
    \ to replace DES and is gradually becoming the most used (and secure) symmetric\
    \ encryption algorithm.\n\nThe tasks associated with encrypting and decrypting\
    \ data are a little more involved than hashing. The `mcrypt` functions are optimized\
    \ to work with raw data, so you have some work to do with data conversion. You\
    \ also have to define both a key and an initialization vector (IV) to perform\
    \ encryption and decryption. The IV is required due to the nature of encryption:\
    \ the data blocks are usually encrypted in sequence, and calculating the encrypted\
    \ values for one sequence of bits involves using some data from the preceding\
    \ sequence of bits. Because there are no such values at the start of encryption,\
    \ an IV is used instead. For AES encryption (`Rijndael_128`), the IV and the key\
    \ must be 32 bytes long.\n\n> **Note:** At http://en.wikipedia.org/wiki/Block_cipher_modes_of_operation,\
    \ you can learn more about the various modes of encryption.\n\nThe general steps\
    \ required for encrypting a string are as follows:\n\n1. Create a 32-byte random\
    \ IV.\n2. Convert the IV (which you keep as a hexadecimal string) into a byte\
    \ array.\n3. Encrypt the string using AES encryption by supplying the IV in byte\
    \ array format.\n4. Convert the resulting encrypted data from a byte array into\
    \ a hexadecimal string.\n\nDecryption follows a similar scheme:\n\n1. Convert\
    \ the IV (which you keep as a hexadecimal string) into a byte array (the same\
    \ with the encryption first step).\n2. Convert the string to decrypt into a byte\
    \ array.\n3. Decrypt the binary string from the previous step by supplying the\
    \ IV in a byte array.\n\nIn your code, you’ll use AES, but the code in the `SymmetricCrypt`\
    \ class can be modified to use any of the supported encryption algorithms.\n\n\
    ## Exercise: Implementing the SymmetricCrypt Class\n\nAdd a new file in the `business`\
    \ directory called `symmetric_crypt.php` with the following code in it:\n\n```php\n\
    <?php\n\nclass SymmetricCrypt\n{\n    // Encryption/decryption key\n    private\
    \ static $_msSecretKey = 'From Dusk Till Dawn';\n\n    // The initialization vector\n\
    \    private static $_msHexaIv = 'c7098adc8d6128b5d4b4f7b2fe7f7f05';\n\n    //\
    \ Use the Rijndael Encryption Algorithm\n    private static $_msCipherAlgorithm\
    \ = MCRYPT_RIJNDAEL_128;\n\n    /* Function encrypts plain-text string received\
    \ as parameter and returns the result in hexadecimal format */\n    public static\
    \ function Encrypt($plainString)\n    {\n        // Pack SymmetricCrypt::_msHexaIv\
    \ into a binary string\n        $binary_iv = pack('H*', self::$_msHexaIv);\n\n\
    \        // Encrypt $plainString\n        $binary_encrypted_string = mcrypt_encrypt(\n\
    \            self::$_msCipherAlgorithm,\n            self::$_msSecretKey,\n  \
    \          $plainString,\n            MCRYPT_MODE_CBC,\n            $binary_iv);\n\
    \n        // Convert $binary_encrypted_string to hexadecimal format\n        $hexa_encrypted_string\
    \ = bin2hex($binary_encrypted_string);\n\n        return $hexa_encrypted_string;\n\
    \    }\n\n    /* Function decrypts hexadecimal string received as parameter and\
    \ returns the result in hexadecimal format */\n    public static function Decrypt($encryptedString)\n\
    \    {\n        // Pack Symmetric::_msHexaIv into a binary string\n        $binary_iv\
    \ = pack('H*', self::$_msHexaIv);\n\n        // Convert string in hexadecimal\
    \ to byte array\n        $binary_encrypted_string = pack('H*', $encryptedString);\n\
    \    }\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH11.qxd\
    \ 11/17/06 3:37 PM Page 362\n\n## C H A P T E R 1 1 ■ M A N A G I N G C U S TO\
    \ M E R D E TA I L S\n\n**362**"
