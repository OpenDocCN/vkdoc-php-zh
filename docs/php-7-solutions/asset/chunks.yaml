    ini_set('session.cookie_lifetime', '600');\n```\n\nAlthough this is effective,\
    \ it has two drawbacks. First, the\nexpiration is set relative to the time on\
    \ the server, not the user’s\ncomputer. If the user’s computer clock is wrong,\
    \ the cookie might be out\nof date immediately, or it might persist much longer\
    \ than you\nanticipate. The other problem is that the user might be automatically\n\
    logged out without explanation. The next PHP solution offers an approach\nthat\
    \ is more user-friendly.\n\nPHP Solution 11-8: Ending a Session After a period\n\
    of inactivity\nThis PHP solution shows how to end a session if a user doesn’t\
    \ do\nanything within a specified period that triggers a page to load. When\n\
    the session first starts, typically when the user logs in, the current\ntime is\
    \ stored in a session variable. Each time the user loads a page,\nthe session\
    \ variable is compared with the current time. If the\ndifference is greater than\
    \ a predetermined limit, the session and its\nvariables are destroyed. Otherwise,\
    \ the variable is updated to the\ncurrent time.\n\nThese instructions assume you\
    \ have set up the login system in PHP\nSolutions 11-3 to 11-7.\n\n1.  You need\
    \ to store the current time after the user’s credentials have\n    been authenticated\
    \ but before the script redirects the user to the\n    restricted part of the\
    \ site. Locate the following section of code in\n    `authenticate.php`\n    (around\
    \ lines 14–18) and insert the new code highlighted in bold as\n    follows:\n\n\
    ```\n    if ($data[0] == $username && password_verify($password, $data[1])) {\n\
    \    $_SESSION['authenticated'] = 'Jethro Tull';\n    $_SESSION['start'] = time();\n\
    \    session_regenerate_id();\n    break;\n    }\n    ```\n\nThe `time()`\n  \
    \  function  returns\n    a current timestamp. By being stored in `$_SESSION['start']`,\n\
    \    it becomes available to every page that begins with `session_start()`.\n\n\
    2.  When a session times out, just dumping a user unceremoniously back at\n  \
    \  the login screen isn’t very friendly, so it’s a good idea to explain\n    what’s\
    \ happened. In `login.php`, add the\n    code highlighted in bold to the PHP block\
    \ immediately after the opening\n    `<body>`\n    tag (around lines 22–27):\n\
    \n```\n    $error\";\n    } elseif (isset($_GET['expired'])) { ?>\n    Your session\
    \ has expired. Please log in again.\n\n```\n\nThe message is shown if the URL\
    \ contains a parameter called `expired` in a query\n    string.\n\n3.  Open `menu.php`,\
    \ cut the\n    code in the PHP block above the `DOCTYPE` declaration,\n    and\
    \ paste it into a new blank file.\n\n4.  Save the file as `session_timeout.php`\n\
    \    in the `includes`\n    folder, then edit the code like this:\n\n```\n   \
    \  $_SESSION['start'] + $timelimit) {\n    // if timelimit has expired, destroy\
    \ session and redirect\n    $_SESSION = [];\n    // invalidate the session cookie\n\
    \    if (isset($_COOKIE[session_name()])) {\n    setcookie(session_name(), \"\
    , time()-86400, '/');\n    }\n    // end session and redirect with query string\n\
    \    session_destroy();\n    header(\"Location: {$redirect}?expired=yes\");\n\
    \    exit;\n    } else {\n    // if it's got this far, it's OK, so update start\
    \ time\n    $_SESSION['start'] = time();\n    }\n    ```\n\nThe inline comments\
    \ explain what is going on, and you should\n    recognize most of the `elseif`\
    \ clause from\n    PHP Solution 11-5\\. PHP measures time in seconds, and I’ve\
    \ set `$timelimit`  (in line 5) to a\n    ridiculously short 15 seconds purely\
    \ to demonstrate the effect. To set a\n    more reasonable limit of, say, 15 minutes,\
    \ change this later, like\n    this:\n\n```\n    $timelimit = 15 * 60; // 15 minutes\n\
    \    ```\n\nYou could, of course, set `$timelimit` to `900`, but why bother\n\
    \    when PHP can do the hard work for you?\n\nIf the sum of `$_SESSION['start']`\n\
    \    plus `$timelimit`\n    is less than the current time (stored as `$now`),\
    \ you end the\n    session and redirect the user to the login page. The line that\
    \ performs\n    the redirect adds a query string to the end of the URL, as follows:\n\
    \n```\n    http://localhost/phpsols-4e/sessions/login.php?expired=yes\n    ```\n\
    \nThe code in step 2 takes no notice of the value of `expired`; adding `yes` as\
    \ the value just\n    makes it look more user-friendly in the browser address\
    \ bar.\n\nIf the script gets as far as the final `else`, it means that\n    `$_SESSION['authenticated']`\n\
    \    has been set and that the time limit hasn’t been reached, so `$_SESSION['start']`\
    \ is\n    updated to the current time, and the page displays as normal.\n\n5.\
    \  Include `session_timeout.php`\n    above the `DOCTYPE` declaration\n    in\
    \ `menu.php`.\n    The include command should be the only code in the PHP block:\n\
    \n6.  Replace the code above the `DOCTYPE` declaration\n    in `secretpage.php`\
    \ in the\n    same way.\n\n7.  Save all the pages you have edited\n    and load\
    \ either `menu.php` or `secretpage.php` into a\n    browser. If the page displays,\
    \ click Log out. Then log back in and\n    navigate back and forth between `menu.php`\
    \ and `secretpage.php`. Once\n    you have verified that the links work, wait\
    \ 15 seconds or more and try\n    to navigate back to the other page. You should\
    \ be automatically logged\n    out and presented with the following screen:\n\n\
    ![../images/332054_4_En_11_Chapter/332054_4_En_11_Figk_HTML.jpg](images/332054_4_En_11_Chapter/332054_4_En_11_Figk_HTML.jpg)\n\
    \nIf necessary, check your code against `authenticate_02.php`,\n    `login_04.php`,\n\
    \    `session_timeout.php`,\n    `menu_05.php`,\n    and `secretpage_04.php` in\n\
    \    the `ch11`\n    folder.\n\nPassing Information through Multipage Forms\n\n\
    Variables passed through the `$_POST` and `$_GET` arrays have\nonly a fleeting\
    \ existence. Once they have been passed to a page, they’re\ngone, unless you save\
    \ their values in some way. The usual method of\npreserving information that’s\
    \ passed from one form to another is to\nextract its value from the `$_POST` array\
    \ and\nstore it in a hidden field in HTML, like this:\n\n```\n\">\n```"
  trans: "\n还有一个名为 `password_needs_rehash()` 的函数，用于检查哈希后的密码是否需要更新为当前标准。它设计用于用户登录网站时调用。以下代码假设提交的密码存储在\
    \ `$password` 中，加密后的密码存储在 `$encrypted` 中，并且你正在使用 PHP 默认的加密方法：\n\n```\nif (password_verify($password,\
    \ $hashed) {\nif (password_needs_rehash($hashed, PASSWORD_DEFAULT)) {\n$hashed\
    \ = password_hash($password, PASSWORD_DEFAULT);\n// 存储更新后的 $hashed 版本\n}\n}\n\
    ```\n\n关于每次用户登录时都执行此检查是否过度，存在争议。PHP 的策略是仅在完整版本发布时（例如 7.4.0 或 8.0.0）更改默认加密方式。唯一的例外是在当前默认加密方式中发现严重安全漏洞的紧急情况下。如果你紧跟\
    \ PHP 的发展动态，你可以创建一个脚本，在默认加密方式更改时，通过一次操作更新所有存储的密码。然而，在大多数服务器上，每次有人登录时使用 `password_needs_rehash()`\
    \ 的速度快得几乎无法察觉，并且将其添加到登录例程中以保持网站安全可能是值得的。\n\n## 设置会话时限\n\n默认情况下，PHP 将用户计算机上的会话\
    \ cookie 的生存期设置为 0，这会使会话保持活动状态，直到用户注销或关闭浏览器。你可以通过调用 `ini_set()` 函数更早地让会话超时，该函数允许你动态更改一些\
    \ PHP 配置指令。会话启动后，立即将指令 `session.cookie_lifetime` 作为第一个参数，并将一个包含你希望 cookie 保持活动状态的秒数的字符串作为第二个参数传递。例如，你可以将会话\
    \ cookie 的生存期限制为 10 分钟，如下所示：\n\n```\nsession_start();\nini_set('session.cookie_lifetime',\
    \ '600');\n```\n\n虽然这很有效，但它有两个缺点。首先，过期时间是相对于服务器时间设置的，而不是用户计算机的时间。如果用户计算机的时钟不正确，则\
    \ cookie 可能立即过期，或者其持久时间可能比你预期的长得多。另一个问题是用户可能会在没有解释的情况下被自动注销。下一个 PHP 解决方案提供了一种更友好的方法。\n\
    \n### PHP 方案 11-8：在不活动一段时间后结束会话\n\n此 PHP 方案展示了如果在指定时间内用户没有执行任何触发页面加载的操作，如何结束会话。当会话首次启动时（通常在用户登录时），当前时间存储在一个会话变量中。每次用户加载页面时，都会将会话变量与当前时间进行比较。如果差值超过预定限制，则会话及其变量将被销毁。否则，将该变量更新为当前时间。\n\
    \n这些说明假设你已经设置了 PHP 方案 11-3 至 11-7 中的登录系统。\n\n1.  你需要在用户凭据通过身份验证之后、但在脚本将用户重定向到网站的受限部分之前存储当前时间。在\
    \ `authenticate.php` 中找到以下代码段（大约在第 14-18 行），并插入如下以粗体突出显示的新代码：\n\n    ```\n   \
    \ if ($data[0] == $username && password_verify($password, $data[1])) {\n    $_SESSION['authenticated']\
    \ = 'Jethro Tull';\n    $_SESSION['start'] = time();\n    session_regenerate_id();\n\
    \    break;\n    }\n    ```\n\n    `time()` 函数返回当前时间戳。通过存储在 `$_SESSION['start']`\
    \ 中，它对于每个以 `session_start()` 开头的页面都可用。\n\n2.  当会话超时时，只是将用户毫不客气地丢回登录屏幕并不友好，因此解释发生了什么是个好主意。在\
    \ `login.php` 中，将以下以粗体突出显示的代码添加到 `<body>` 开始标签之后的 PHP 代码块中（大约在第 22-27 行）：\n\n\
    \    ```\n    $error\";\n    } elseif (isset($_GET['expired'])) { ?>\n    您的会话已过期。请重新登录。\n\
    \n    ```\n\n    如果 URL 的查询字符串中包含名为 `expired` 的参数，则会显示此消息。\n\n3.  打开 `menu.php`，剪切\
    \ `DOCTYPE` 声明上方 PHP 代码块中的代码，并将其粘贴到一个新的空白文件中。\n\n4.  将文件保存为 `includes` 文件夹中的 `session_timeout.php`，然后如下编辑代码：\n\
    \n    ```\n     $_SESSION['start'] + $timelimit) {\n    // 如果时间限制已过，销毁会话并重定向\n\
    \    $_SESSION = [];\n    // 使会话 cookie 失效\n    if (isset($_COOKIE[session_name()]))\
    \ {\n    setcookie(session_name(), \", time()-86400, '/');\n    }\n    // 结束会话并使用查询字符串重定向\n\
    \    session_destroy();\n    header(\"Location: {$redirect}?expired=yes\");\n\
    \    exit;\n    } else {\n    // 如果运行到这里，说明一切正常，因此更新开始时间\n    $_SESSION['start']\
    \ = time();\n    }\n    ```\n\n    行内注释解释了正在发生的事情，并且你应该能认出 PHP 方案 11-5 中的大部分 `elseif`\
    \ 子句。PHP 以秒为单位测量时间，为了纯粹演示效果，我将 `$timelimit`（在第 5 行）设置得非常短，仅为 15 秒。要设置更合理的限制，例如\
    \ 15 分钟，请稍后像这样更改：\n\n    ```\n    $timelimit = 15 * 60; // 15 分钟\n    ```\n\n\
    \    当然，你可以将 `$timelimit` 设置为 `900`，但既然 PHP 可以替你完成这项艰巨的工作，何必费心呢？\n\n    如果 `$_SESSION['start']`\
    \ 加上 `$timelimit` 的总和小于当前时间（存储为 `$now`），你将结束会话并将用户重定向到登录页面。执行重定向的行会在 URL 末尾添加一个查询字符串，如下所示：\n\
    \n    ```\n    http://localhost/phpsols-4e/sessions/login.php?expired=yes\n  \
    \  ```\n\n    步骤 2 中的代码不关心 `expired` 的值；添加 `yes` 作为值只是为了让它在浏览器地址栏中看起来更友好。\n\n\
    \    如果脚本执行到了最后的 `else`，这意味着 `$_SESSION['authenticated']` 已设置且时间限制尚未达到，因此 `$_SESSION['start']`\
    \ 更新为当前时间，并且页面正常显示。\n\n5.  在 `menu.php` 的 `DOCTYPE` 声明上方包含 `session_timeout.php`。该包含命令应是\
    \ PHP 代码块中唯一的代码：\n\n6.  以相同方式替换 `secretpage.php` 中 `DOCTYPE` 声明上方的代码。\n\n7.  保存你编辑的所有页面，并将\
    \ `menu.php` 或 `secretpage.php` 加载到浏览器中。如果页面显示，请单击“注销”。然后重新登录，并在 `menu.php` 和\
    \ `secretpage.php` 之间来回导航。确认链接正常工作后，等待 15 秒或更长时间，然后尝试导航回另一个页面。你应该会自动注销并看到以下屏幕：\n\
    \n![../images/332054_4_En_11_Chapter/332054_4_En_11_Figk_HTML.jpg](img/332054_4_En_11_Figk_HTML.jpg)\n\
    \n如有必要，请对照 `ch11` 文件夹中的 `authenticate_02.php`、`login_04.php`、`session_timeout.php`、`menu_05.php`\
    \ 和 `secretpage_04.php` 检查你的代码。\n\n## 通过多页表单传递信息\n\n通过 `$_POST` 和 `$_GET` 数组传递的变量只存在一瞬间。一旦它们被传递到页面，就会消失，除非你以某种方式保存它们的值。保存从一个表单传递到另一个表单的信息的常用方法是从\
    \ `$_POST` 数组中提取其值并将其存储在 HTML 的隐藏字段中，如下所示：\n\n```\n\">\n```\n"
- fmt: "# PHP Solution 11-9: Using Sessions for a Multipage Form\n\nAs their name\
    \ suggests, hidden fields are part of a form’s code, but nothing is displayed\
    \ onscreen. Hidden fields are fine for one or two items, but say you have a survey\
    \ that’s spread over four pages. If you have 10 items on a page, you need a total\
    \ of 60 hidden fields (10 on the second page, 20 on the third, and 30 on the fourth).\
    \ Session variables can save you all that coding. They can also make sure that\
    \ visitors always start on the right page of a multipage form.\n\nIn this PHP\
    \ solution you’ll build a script for use in multipage forms that gathers data\
    \ from the `$_POST` array and assigns it to session variables. The script automatically\
    \ redirects the user to the first page of the form if an attempt is made to access\
    \ any other part of the form first.\n\n1. Copy `multiple_01.php`, `multiple_02.php`,\
    \ `multiple_03.php`, and `multiple_04.php` from the `ch11` folder to the `sessions`\
    \ folder. The first three pages contain simple forms that ask for the user’s name,\
    \ age, and address. The `action` attribute of each `<form>` tag is set to the\
    \ current page, so the forms are self-processing, but they don’t yet contain any\
    \ processing script. The final page is where the data from the first three pages\
    \ will eventually be displayed.\n\n2. Add the following code in a PHP block above\
    \ the `DOCTYPE` declaration in `multiple_01.php`:\n\n```\nif (isset($_POST['next']))\
    \ {\n    session_start();\n    // set a variable to control access to other pages\n\
    \    $_SESSION['formStarted'] = true;\n    // set required fields\n    $required\
    \ = 'first_name';\n    $firstPage = 'multiple_01.php';\n    $nextPage = 'multiple_02.php';\n\
    \    $submit = 'next';\n    require_once '../includes/multiform.php';\n}\n```\n\
    \nThe `name` attribute of the Submit button is `next`, so the code in this block\
    \ runs only if the form has been submitted. It initiates a session and creates\
    \ a session variable that will be used to control access to the other form pages.\n\
    \nNext come four variables that will be used by the script that processes the\
    \ multipage form:\n\n- `$required`: This is an array of the `name` attributes\
    \ of required fields in the current page. If only one field is required, a string\
    \ can be used instead of an array. If no fields are required, it can be omitted.\n\
    - `$firstPage`: The filename of the first page of the form.\n- `$nextPage`: The\
    \ filename of the next page in the form.\n- `$submit`: The name of the Submit\
    \ button in the current page.\n\nFinally, the code includes the script that processes\
    \ the multipage form.\n\n3. Create a file called `multiform.php` in the `includes`\
    \ folder. Delete any HTML markup and insert the following code:\n\n```\n<?php\n\
    if (!isset($_SESSION)) {\n    session_start();\n}\n$filename = basename($_SERVER['SCRIPT_FILENAME']);\n\
    $current = 'http://' . $_SERVER['HTTP_HOST'] . $_SERVER['PHP_SELF'];\n```\n\n\
    Each page of the multipage form needs to call `session_start()`, but calling it\
    \ twice on the same page generates an error, so the conditional statement first\
    \ checks whether the `$_SESSION` superglobal variable is accessible. If it isn’t,\
    \ it initiates the session for the page.\n\nAfter the conditional statement, `$_SERVER['SCRIPT_FILENAME']`\
    \ is passed to the `basename()` function to extract the filename of the current\
    \ page. This is the same technique that you used in PHP Solution 5-3.\n\n`$_SERVER['SCRIPT_FILENAME']`\
    \ contains the path of the parent file, so when this script is included in `multiple_01.php`,\
    \ the value of `$filename` will be `multiple_01.php`, *not* `multiform.php`.\n\
    \nThe next line builds the URL for the current page from the string `http://`\
    \ and the values of `$_SERVER['HTTP_HOST']`, which contains the current domain\
    \ name, and `$_SERVER['PHP_SELF']`, which contains the path of the current file\
    \ minus the domain name. If you’re testing locally, when the first page of the\
    \ multipage form loads, `$current` is `http://localhost/phpsols-4e/sessions/multiple_01.php`.\n\
    \n4. Now that you have both the name of the current file and its URL, you can\
    \ use `str_replace()` to create the URLs for the first and next pages, like this:\n\
    \n```\n$redirectFirst = str_replace($filename, $firstPage, $current);\n$redirectNext\
    \ = str_replace($filename, $nextPage, $current);\n```\n\nThe first argument is\
    \ the string you want to replace, the second is the replacement string, and the\
    \ third is the target string. In step 2, you set `$firstPage` to `multiple_01.php`\
    \ and `$nextPage` to `multiple_02.php`. As a result, `$redirectFirst` becomes\
    \ `http://localhost/phpsols-4e/sessions/multiple_01.php`, and `$redirectNext`\
    \ is `http://localhost/phpsols-4e/sessions/multiple_02.php`.\n\n5. To prevent\
    \ users from accessing the multipage form without starting at the beginning, add\
    \ a conditional statement that checks the value of `$filename`. If it’s not the\
    \ same as the first page, and `$_SESSION['formStarted']` hasn’t been created,\
    \ the `header()` function redirects to the first page, like this:\n\n```\nif ($filename\
    \ != $firstPage && !isset($_SESSION['formStarted'])) {\n    header(\"Location:\
    \ $redirectFirst\");\n    exit;\n}\n```\n\n6. The rest of the script loops through\
    \ the `$_POST` array, checking for required fields that are blank and adding them\
    \ to a `$missing` array. If nothing is missing, the `header()` function redirects\
    \ the user to the next page of the multipage form. The complete script for `multiform.php`\
    \ looks like this:\n\n```\n     $value) {\n    // skip submit button\n    if ($key\
    \ == $submit) continue;\n    // strip whitespace if not an array\n    if (!is_array($value))\
    \ {\n        $value = trim($value);\n    }\n    // if empty and required, add\
    \ to $missing array\n    if (in_array($key, $required) && empty($value)) {\n \
    \       $missing[] = $key;\n        continue;\n    }\n    // otherwise, assign\
    \ to a session variable of the same name as $key\n    $_SESSION[$key] = $value;\n\
    }\n// if no required fields are missing, redirect to next page\nif (!$missing)\
    \ {\n    header(\"Location: $redirectNext\");\n    exit;\n}\n```\n\nThe code is\
    \ very similar to that used in Chapter 6 to process the feedback form, so the\
    \ inline comments should be sufficient to explain how it works. The conditional\
    \ statement wrapped around the new code uses `$_POST[$submit]` to check if the\
    \ form has been submitted. I have used a variable rather than hard-coding the\
    \ name of the Submit button to make the code more flexible. Although this script\
    \ is included in the first page only after the form has been submitted, it’s included\
    \ directly in the other pages, so it’s necessary to add the conditional statement\
    \ here.\n\nThe name and value of the Submit button are always included in the\
    \ `$_POST` array, so the `foreach` loop uses the `continue` keyword to skip to\
    \ the next item if the key is the same as the Submit button’s name. This avoids\
    \ adding the unwanted value to the `$_SESSION` array. See \"Breaking out of a\
    \ loop\" in Chapter 4 for a description of `continue`.\n\n7. Add the following\
    \ code in a PHP block above the `DOCTYPE` declaration in `multiple_02.php`:\n\n\
    ```\n$firstPage = 'multiple_01.php';\n$nextPage = 'multiple_03.php';\n$submit\
    \ = 'next';\nrequire_once '../includes/multiform.php';\n```"
