- fmt: "# Calling `unserialize` on the Serialized Object\n\nCalling `unserialize`\
    \ on the serialized object will invoke the `__wakeup` method in order to restore\
    \ the object. It accepts no arguments and does not need to return any value. It\
    \ is used for re-establishing resource-type variables and for performing other\
    \ initializing tasks that may need to be done after the object has been unserialized.\
    \ In this example, it reestablishes the MySQL database connection.\n\n```\npublic\
    \ function __wakeup()\n{\n  if(isset($this->server, $this->user, $this->pass))\n\
    \    $this->connect();\n}\n```\n\nNote that the `isset` construct is called here\
    \ with multiple arguments, in which case it will only return true if all parameters\
    \ are set.\n\n## Set State\n\nThe `var_export` function retrieves variable information\
    \ that is to be usable as valid PHP code. In the example below this function is\
    \ used on an object.\n\n```\nclass Fruit\n{\n  public $name = 'Lemon';\n}\n\n\
    $export = var_export(new Fruit(), true);\n```\n\nSince an object is a complex\
    \ type there is no generic syntax for constructing it along with its members.\
    \ Instead, `var_export` creates the following string.\n\n```\nFruit::__set_state(array(\
    \ 'name' => 'Lemon', ))\n```\n\nThis string relies on a static `__set_state` method\
    \ being defined for the object in order to construct it. As seen above, the `__set_state`\
    \ method takes an associative array containing key-value pairs of each of the\
    \ object’s properties, including private and protected members.\n\n```\nstatic\
    \ function __set_state(array $array)\n{\n  $tmp = new Fruit();\n  $tmp->name =\
    \ $array['name'];\n  return $tmp;\n}\n```\n\nWith this method defined in the `Fruit`\
    \ class the exported string can now be parsed with the `eval` construct to create\
    \ an identical object.\n\n```\neval('$MyFruit = ' . $export . ';');\n```\n\n##\
    \ Object Cloning\n\nAssigning an object to a variable will only create a new reference\
    \ to the same object. In order to copy an object, the `clone` operator can be\
    \ used.\n\n```\nclass Fruit {}\n\n$f1 = new Fruit();\n$f2 = $f1;       // copy\
    \ object reference\n$f3 = clone $f1; // copy object\n```\n\nWhen an object is\
    \ cloned its properties will be copied over to the new object. However, any child\
    \ objects it may contain will not be cloned, so they will be shared between the\
    \ copies. This is where the `__clone` method comes in. It will be called on the\
    \ cloned copy after the cloning is done and can be used to clone any child objects.\n\
    \n```\nclass Apple {}\n\nclass FruitBasket\n{\n  public $apple;\n\nfunction __construct()\
    \ { $apple = new Apple(); }\n\nfunction __clone()\n  {\n    $this->apple = clone\
    \ $this->apple;\n  }\n}\n```\n\n# CHAPTER 23\n\n![image](images/frontdot.jpg)\n\
    \n# User Input\n\nWhen an HTML form is submitted to a PHP page the data becomes\
    \ available to that script.\n\n## HTML Form\n\nAn HTML form has two required attributes:\
    \ `action` and `method`. The `action` attribute specified the script to which\
    \ the form data is passed. For example, the following form submits one input property\
    \ called `myString` to the script file `MyPage.php`.\n\n```\n<html>\n<body>\n\
    \  <form action=\"MyPage.php\" method=\"post\">\n    <input type=\"text\" name=\"\
    myString\" />\n    <input type=\"submit\" />\n  </form>\n</body>\n</html>\n```\n\
    \nThe other required attribute of the form element specifies the sending method,\
    \ which may be either `get` or `post`.\n\n## Sending with post\n\nIf the form\
    \ is sent using the `post` method the data will be available through the `$_POST`\
    \ array. The names of the properties will be the keys in that associative array.\
    \ Data sent with the `post` method is not visible on the URL of the page, but\
    \ this also means that the state of the page cannot be saved by, for example,\
    \ bookmarking the page.\n\n```\necho $_POST['myString'];\n```\n\n## Sending with\
    \ get\n\nThe alternative to `post` is to send the form data with the `get` method\
    \ and to retrieve it using the `$_GET` array. The variables are then displayed\
    \ in the address bar, which effectively maintains the state of the page if it\
    \ is bookmarked and revisited.\n\n```\necho $_GET['myString'];\n```\n\nBecause\
    \ the data is contained in the address bar this means that variables cannot only\
    \ be passed through HTML forms but also through HTML links. The `$_GET` array\
    \ can then be used to change the state of the page accordingly. This provides\
    \ one way of passing variables from one page to another.\n\n```\n<a href=\"MyPage.php?myString=Foo+Bar\"\
    >link</a>\n```\n\n## Request Array\n\nIf it does not matter whether the `post`\
    \ or `get` method was used to send the data the `$_REQUEST` array can be used.\
    \ This array typically contains the `$_GET` and `$_POST` arrays, but may also\
    \ contain the `$_COOKIE` array.\n\n```\necho $_REQUEST['myString']; // \"Foo Bar\"\
    \n```\n\nThe content of the `$_REQUEST` array can be set in the PHP configuration\
    \ file and varies between PHP distributions. Due to security concerns, the `$_COOKIE`\
    \ array is usually not included.\n\n## Security Concerns\n\nAny user-provided\
    \ data can be manipulated and should therefore be validated and sanitized before\
    \ being used. Validation means that you make sure the data is in the form you\
    \ expect, in terms of data type, range and content. For example, the following\
    \ code validates an email address.\n\n```\nif(!filter_var($_POST['email'], FILTER_VALIDATE_EMAIL))\n\
    \  echo \"Invalid email address\";\n```\n\nSanitizing is when you disable potentially\
    \ malicious code in the user input. This is done by escaping the code according\
    \ to the rules of the language where the input is to be used. For example, if\
    \ the data will be sent to a database it needs to be sanitized with the `mysql_real_escape_string`\
    \ function to disable any embedded SQL code.\n\n```\n// Sanitize for database\
    \ use\n$name = mysql_real_escape_string($_POST['name']);\n\n// Execute SQL command\n\
    $sql = \"SELECT * FROM users WHERE user='\" . $name . \"'\";\n$result = mysql_query($sql);\n\
    ```\n\nWhen user supplied data is to be output to the web page as text the `htmlspecialchars`\
    \ function should be used. It will disable any HTML markup so the user input is\
    \ displayed but not interpreted.\n\n```\n// Sanitize for web page use\necho htmlspecialchars($_POST['comment']);\n\
    ```\n\n## Submitting Arrays\n\nForm data can be grouped into arrays by including\
    \ array square brackets after the variable names in the form. This works for all\
    \ form input elements, including `<input>`, `<select>` and `<textarea>`.\n\n```\n\
    <input type=\"text\" name=\"myArr[]\" />\n<input type=\"text\" name=\"myArr[]\"\
    \ />\n```\n\nThe elements may also be assigned their own array keys.\n\n```\n\
    <input type=\"text\" name=\"myArr[name]\" />\n```\n\nOnce submitted, the array\
    \ will be available for use in the script.\n\n```\n$val1 = $_POST['myArr'][0];\n\
    $val2 = $_POST['myArr'][1];\n$name = $_POST['myArr']['name'];\n```\n\nThe form\
    \ `<select>` element has an attribute for allowing multiple items to be selected\
    \ from the list.\n\n```\n<select name=\"myArr[]\" size=\"3\" multiple=\"true\"\
    >\n  <option value=\"apple\">Apple</option>\n  <option value=\"orange\">Orange</option>\n\
    \  <option value=\"pear\">Pear</option>\n</select>\n```\n\nWhen this multi-select\
    \ element is included in a form, the array brackets become necessary for retrieving\
    \ the selected values in the script.\n\n```\nforeach ($_POST['myArr'] as $item)\n\
    \  echo $item . ' '; // ex \"apple orange pear\"\n```\n\n## File Uploading\n\n\
    The HTML form provides a file input type that allows files to be uploaded to the\
    \ server. For file uploading to work the form’s optional `enctype` attribute must\
    \ be set to `\"multipart/form-data\"`, as in the example below.\n\n```\n<form\
    \ action=\"MyPage.php\" method=\"post\"\n      enctype=\"multipart/form-data\"\
    >\n  <input name=\"myfile\" type=\"file\" />\n  <input type=\"submit\" value=\"\
    Upload\" />\n</form>\n```\n\nInformation about the uploaded file is stored in\
    \ the `$_FILES` array. The keys of this associative array are seen in the following\
    \ table.\n\n| Name | Description |\n| --- | --- |\n| name | Original name of uploaded\
    \ file. |\n| tmp_name | Path to temporary server copy. |\n| type | Mime type of\
    \ the file. |\n| size | File size in bytes. |\n| error | Error code. |"
  raw: 'Calling `unserialize` on the serialized object will invoke the `__wakeup`
    method in order to restore the object. It accepts no arguments and does not need
    to return any value. It is used for re-establishing resource-type variables and
    for performing other initializing tasks that may need to be done after the object
    has been unserialized. In this example, it reestablishes the MySQL database connection.


    ```

    public function __wakeup()

    {

      if(isset($this->server, $this->user, $this->pass))

        $this->connect();

    }

    ```


    Note that the `isset` construct is called here with multiple arguments, in which
    case it will only return true if all parameters are set.


    Set state


    The `var_export` function retrieves variable information that is to be usable
    as valid PHP code. In the example below this function is used on an object.


    ```

    class Fruit

    {

      public $name = ''Lemon'';

    }


    $export = var_export(new Fruit(), true);

    ```


    Since an object is a complex type there is no generic syntax for constructing
    it along with its members. Instead, `var_export` creates the following string.


    ```

    Fruit::__set_state(array( ''name'' => ''Lemon'', ))

    ```


    This string relies on a static `__set_state` method being defined for the object
    in order to construct it. As seen above, the `__set_state` method takes an associative
    array containing key-value pairs of each of the object’s properties, including
    private and protected members.


    ```

    static function __set_state(array $array)

    {

      $tmp = new Fruit();

      $tmp->name = $array[''name''];

      return $tmp;

    }

    ```


    With this method defined in the Fruit class the exported string can now be parsed
    with the `eval` construct to create an identical object.


    ```

    eval(''$MyFruit = '' . $export . '';'');

    ```


    Object cloning


    Assigning an object to a variable will only create a new reference to the same
    object. In order to copy an object, the `clone` operator can be used.


    ```

    class Fruit {}


    $f1 = new Fruit();

    $f2 = $f1;       // copy object reference

    $f3 = clone $f1; // copy object

    ```


    When an object is cloned its properties will be copied over to the new object.
    However, any child objects it may contain will not be cloned, so they will be
    shared between the copies. This is where the `__clone` method comes in. It will
    be called on the cloned copy after the cloning is done and can be used to clone
    any child objects.


    ```

    class Apple {}


    class FruitBasket

    {

      public $apple;


    function __construct() { $apple = new Apple(); }


    function __clone()

      {

        $this->apple = clone $this->apple;

      }

    }

    ```


    CHAPTER 23


    ![image](images/frontdot.jpg)


    User Input


    When an HTML form is submitted to a PHP page the data becomes available to that
    script.


    HTML form


    An HTML form has two required attributes: action and method. The action attribute
    specified the script to which the form data is passed. For example, the following
    form submits one input property called `myString` to the script file MyPage.php.


    ```

    <html>

    <body>

      <form action="MyPage.php" method="post">

        <input type="text" name="myString" />

        <input type="submit" />

      </form>

    </body>

    </html>

    ```


    The other required attribute of the form element specifies the sending method,
    which may be either get or post.


    Sending with post


    If the form is sent using the post method the data will be available through the
    `$_POST` array. The names of the properties will be the keys in that associative
    array. Data sent with the post method is not visible on the URL of the page, but
    this also means that the state of the page cannot be saved by, for example, bookmarking
    the page.


    ```

    echo $_POST[''myString''];

    ```


    Sending with get


    The alternative to post is to send the form data with the get method and to retrieve
    it using the `$_GET` array. The variables are then displayed in the address bar,
    which effectively maintains the state of the page if it is bookmarked and revisited.


    ```

    echo $_GET[''myString''];

    ```


    Because the data is contained in the address bar this means that variables cannot
    only be passed through HTML forms but also through HTML links. The `$_GET` array
    can then be used to change the state of the page accordingly. This provides one
    way of passing variables from one page to another.


    ```

    <a href="MyPage.php?myString=Foo+Bar">link</a>

    ```


    Request array


    If it does not matter whether the post or get method was used to send the data
    the  `$_REQUEST` array can be used. This array typically contains the `$_GET`
    and `$_POST` arrays, but may also contain the `$_COOKIE` array.


    ```

    echo $_REQUEST[''myString'']; // "Foo Bar"

    ```


    The content of the `$_REQUEST` array can be set in the PHP configuration file[¹](#9781430262831_Ch23.xhtml#Fn1)
    and varies between PHP distributions. Due to security concerns, the `$_COOKIE`
    array is usually not included.


    Security concerns


    Any user-provided data can be manipulated and should therefore be validated and
    sanitized before being used. Validation means that you make sure the data is in
    the form you expect, in terms of data type, range and content. For example, the
    following code validates an email address.


    ```

    if(!filter_var($_POST[''email''], FILTER_VALIDATE_EMAIL))

      echo "Invalid email address";

    ```


    Sanitizing is when you disable potentially malicious code in the user input. This
    is done by escaping the code according to the rules of the language where the
    input is to be used. For example, if the data will be sent to a database it needs
    to be sanitized with the `mysql_real_escape_string` function to disable any embedded
    SQL code.


    ```

    // Sanitize for database use

    $name = mysql_real_escape_string($_POST[''name'']);


    // Execute SQL command

    $sql = "SELECT * FROM users WHERE user=''" . $name . "''";

    $result = mysql_query($sql);

    ```


    When user supplied data is to be output to the web page as text the `htmlspecialchars`
    function should be used. It will disable any HTML markup so the user input is
    displayed but not interpreted.


    ```

    // Sanitize for web page use

    echo htmlspecialchars($_POST[''comment'']);

    ```


    Submitting arrays


    Form data can be grouped into arrays by including array square brackets after
    the variable names in the form. This works for all form input elements, including
    `<input>`, `<select>` and `<textarea>`.


    ```

    <input type="text" name="myArr[]" />

    <input type="text" name="myArr[]" />

    ```


    The elements may also be assigned their own array keys.


    ```

    <input type="text" name="myArr[name]" />

    ```


    Once submitted, the array will be available for use in the script.


    ```

    $val1 = $_POST[''myArr''][0];

    $val2 = $_POST[''myArr''][1];

    $name = $_POST[''myArr''][''name''];

    ```


    The form `<select>` element has an attribute for allowing multiple items to be
    selected from the list.


    ```

    <select name="myArr[]" size="3" multiple="true">

      <option value="apple">Apple</option>

      <option value="orange">Orange</option>

      <option value="pear">Pear</option>

    </select>

    ```


    When this multi-select element is included in a form, the array brackets become
    necessary for retrieving the selected values in the script.


    ```

    foreach ($_POST[''myArr''] as $item)

      echo $item . '' ''; // ex "apple orange pear"

    ```


    File uploading


    The HTML form provides a file input type that allows files to be uploaded to the
    server. For file uploading to work the form’s optional enctype attribute must
    be set to “multipart/form-data”, as in the example below.


    ```

    <form action="MyPage.php" method="post"

          enctype="multipart/form-data">

      <input name="myfile" type="file" />

      <input type="submit" value="Upload" />

    </form>

    ```


    Information about the uploaded file is stored in the `$_FILES` array. The keys
    of this associative array are seen in the following table.


    | Name | Description |

    | --- | --- |

    | name | Original name of uploaded file. |

    | tmp_name | Path to temporary server copy. |

    | type | Mime type of the file. |

    | size | File size in bytes. |

    | error | Error code. |'
