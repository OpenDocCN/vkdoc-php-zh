  trans: "\n# 案例研究\n\n**公司**：原子鱼苗孵化有限公司  \n**项目**：现场销售订单与佣金申请系统  \n**范围**：本系统需支持多种设备（移动端和\
    \ PC 端），方便现场销售代理、经理和薪酬人员轻松获取所需信息。系统将接收销售代理输入的信息，用于计算客户的采购成本、销售经理的销售业绩以及薪酬部门的佣金。项目第一阶段是开发该应用程序，用于接收销售代理信息、显示采购成本、计算佣金，并将信息存储到`MySQL`数据库中。平台测试成功后，将迁移至公司云平台并确保其安全性。\
    \  \n**输入（来自销售代理）**：销售代理编号、客户编号、订单编号、物品编号、数量及特殊需求  \n**输出**：（未来阶段可能确定更多信息）  \n\
    **存储至数据库**：除销售代理输入的信息外，还包括：佣金、销售总额\n\n目标是确定每一层中将要处理的信息类型、流程以及层与层之间的数据流。一旦确定，这些信息可用于开发一个通用的、空的层级结构，最终用于承载整个项目。\n\
    \n## 接口层\n\n公司要求系统支持多种设备访问。因此，我们必须考虑到除了笔记本电脑和 PC 之外，移动设备（平板电脑和智能手机）也将用于信息的输入和输出。我们可能决定为每种设备类型创建多个接口。通过三层设计，你可以设计一个系统，在共享业务规则层和数据层内容的同时，实现这种灵活性。\n\
    \n作为设计师和/或程序员，你必须确定将要输入的信息类型：多个字段（销售代理编号、客户编号、订单编号、物品编号和数量）都表明输入的是数字。你需要确定这些字段的大小，并验证只输入了数字信息。`金额`字段是唯一可能用于未来计算的字段。因此，所有其他字段可以保持文本格式。`金额`字段在将信息传递给业务规则层之前，需要转换为`Integer`（整数）格式。`特殊需求`字段是一个较大的字段，可以接受字母数字字符。数据库目前还不存在，因此我们必须根据公司政策或/和当前使用的纸质表单来确定字段大小。经过审查，已确定客户和销售代理的编号为\
    \ 8 个字符。订单编号和物品编号为 6 个字符。\n\n收集这些信息后，你现在可以设计接口层的顶层视图，如图 2-9 所示。\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig9_HTML.jpg](img/394210_2_En_2_Fig9_HTML.jpg)\n\
    \n图 2-9  \n原子鱼苗孵化有限公司销售与订单应用接口\n\n带有`+`的字段可由销售代理多次使用以输入所有信息。当创建实际数据集和数据表时，必须为这些条目提供多个列。\n\
    \n此外，还会存在一个（未图示的）额外表单，用于显示订单结果。此表单将显示所购物品的摘要和总成本。所有信息均可由销售代理输入、提交，并暂存于接口层（一个 cookie？），直到销售代理指示订单完成。然后，信息可被传输到业务规则层进行处理。之后，业务规则层可将信息返回，显示在第二个表单中。第二个表单可包含一个“批准”（或取消）按钮。一旦“批准”，信息便可传递到数据层进行存储。\n\
    \n## 业务规则层\n\n业务规则层将包含两个处理流程。一个流程将在销售代理点击“订单完成”按钮后，接收完整的订单（数据集/数据表）并计算总销售成本。然后，它会将此信息的摘要返回到第二个表单。另一个流程将在代理点击“批准”按钮时执行。该流程随后会计算佣金并创建一个数据集（现包含额外字段），以便传递到数据层。该信息随后将被传递以进行存储。\n\
    \n此外，为确保订单数据有效，需要一些方法来验证从接口层接收到的字段。传输的所有数据的安全性至关重要。任何在层之间移动的数据在处理前都必须通过安全验证。业务规则层的顶层视图如图\
    \ 2-10 所示。\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig10_HTML.jpg](img/394210_2_En_2_Fig10_HTML.jpg)\n\
    \n图 2-10  \n原子销售与订单应用业务规则层\n\n## 数据层\n\n在这种情形下，数据层仅用于存储由业务规则层提供的信息。该层将验证接收到的信息并将其存储到数据库中，如图\
    \ 2-11 所示。\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig11_HTML.jpg](img/394210_2_En_2_Fig11_HTML.jpg)\n\
    \n图 2-11  \n原子销售与订单应用数据层\n\n有许多工具可帮助完成设计过程。关键因素是设计者要在过程中包含所有重要信息。作为该示例的另一种做法，你可以将数据集的描述移出各层，放置在各层之间的数据流中，如图\
    \ 2-12 所示。\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig13a_HTML.jpg](img/394210_2_En_2_Fig13a_HTML.jpg)![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig13b_HTML.jpg](img/394210_2_En_2_Fig13b_HTML.jpg)\n\
    \n图 2-13  \n原子销售与订单应用三层模型\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig12_HTML.jpg](img/394210_2_En_2_Fig12_HTML.jpg)\n\
    \n图 2-12  \n替代三层模型\n\n## 动手练习\n\n1.  在什么时候必须将数字转换为数字形式（例如`Integer`）以便存储在数据库中？\n\
    2.  为什么使用数据集在层之间传递信息？\n3.  案例示例中遗漏或忽略了哪些内容？\n\n## MVC 与依赖注入\n\nMVC（模型-视图-控制器）是一种设计模式，软件工程师（包括\
    \ PHP 应用程序设计师）使用它通过控制器在视图和模型之间进行通信。*控制器*是一种软件，负责将用户的任何输入传输给模型。MVC 设计可以被认为是循环的，因为模型、控制器和视图之间能够相互通信。标准的三层模型是线性的：接口层要接收信息或向数据层传递信息，必须通过业务规则层。市场上有许多工具（如\
    \ Ruby on Rails）可以帮助软件工程师设计 MVC 应用程序。\n\n- 访问 [`rubyonrails.org/`](https://rubyonrails.org/)\
    \ 查看 MVC 应用程序的示例。\n"
- fmt: "MVC and component-based design can use `dependency injection`. Dependency\
    \ injection allows the program (client) that will use a block of code (such as\
    \ a class) while not know the actual implementation of the block of code. This\
    \ allows for independent development, updating, testing, and reusability of modules.\
    \ This is similar to the ability of the ignition of a car communicating with the\
    \ starter. The ignition has little knowledge of the starter component and how\
    \ it operates. It does not even know the brand of starter. The ignition merely\
    \ knows to send a signal (electricity) to the starter to tell it to operate. If\
    \ the starter is replaced, the ignition is unaware and unaffected by the change,\
    \ as long as the starter still operates when it receives the signal.\n\n## Chapter\
    \ Terms\n\n| Container | Platform |\n| --- | --- |\n| AJAX | HTTP GET |\n| `XMLHttpRequest`\
    \ | `document.getElementById` |\n| CSS | Conditional Statement |\n| If Statement\
    \ | Three-Tier Architecture |\n| Interface Tier | Business Rules Tier |\n| Data\
    \ Tier | Graphical User Interface (GUI) |\n| Objects | Verification Code |\n|\
    \ Events | Database Management System |\n| Servers | Application Servers |\n|\
    \ Web Servers | Service |\n| Dataset | JSON |\n| XML | SOAP |\n| WSDL | SQL |\n\
    | Microsoft Azure | PDLC |\n| Planning and Information Gathering | Analysis Step\
    \ |\n| Design Step | Implementation Step |\n| Evaluation Step | MVC (Model-View-Controller)\
    \ |\n| Dependency Injection | |\n\n## Chapter Questions and Projects\n\n### Multiple\
    \ Choice\n\n1.  The interface tier  \n    1.  Is the primary storage location\
    \ for the application, which may include the use of a database  \n    2.  Provides\
    \ common objects, including text boxes and buttons, that help the user quickly\
    \ adapt to new applications  \n    3.  Should be used for any accounting, mathematical\
    \ calculations, or processing of data related to the application  \n    4.  Displays\
    \ information and provides the user the ability to interact with the application\n\
    \n2.  A `service` is an application that  \n    1.  Can be manually started and\
    \ stopped when required  \n    2.  Does not have an interface  \n    3.  Resides\
    \ in the memory of a computer  \n    4.  All of the above\n\n3.  SOAP stands for\
    \  \n    1.  Security Object Access Protocol  \n    2.  Simple Object Access Process\
    \  \n    3.  Simple Object Access Protocol  \n    4.  None of the above\n\n4.\
    \  The five steps of PDLC are  \n    1.  Planning and Information Storing, Analysis,\
    \ Design, Implementation, and Evaluation  \n    2.  Planning and Information Gathering,\
    \ Analysis, Design, Implementation, and Evaluation  \n    3.  Planning and Information\
    \ Gathering, Analysis, Data, Implementation, and Evaluation  \n    4.  Planning\
    \ and Information Gathering, Analysis, Design, Observing, and Evaluation\n\n5.\
    \  The Web Service Description Language is used to  \n    1.  Describe calls to\
    \ the web server and the format of information sent and returned by the web service\
    \  \n    2.  Describe calls to the web service and the format of information accepted\
    \ by the web service  \n    3.  Describe the code being used in HTML documents\
    \  \n    4.  Describe calls to the web service and discard the information received\n\
    \n6.  CSS stands for  \n    1.  Cascading Static Styles  \n    2.  Cascading Style\
    \ Sheets  \n    3.  Cascading Script Sheets  \n    4.  Cache Style Scripts\n\n\
    7.  What type of code belongs between the `<script>......</script>` tags?  \n\
    \    1.  Java  \n    2.  HTML  \n    3.  Servlets  \n    4.  JavaScript\n\n8.\
    \  What is the three-tier architecture composed of?  \n    1.  GUI/tags/validation\
    \  \n    2.  Interface/business/data access  \n    3.  Objects/variables/SQL \
    \ \n    4.  JSPs/servlets/sockets\n\n9.  The best description for the Model View\
    \ Controller (MVC) is  \n    1.  An architectural pattern that divides a given\
    \ software application into three interconnected parts.  \n    2.  A programming\
    \ language used to validate and secure information in any browser.  \n    3. \
    \ A type of validator mainly used to check if the user entered the information\
    \ on the correct format  \n    4.  A type of method that is used to convert a\
    \ harmful code so it cannot be executed by the compiler.\n\n10.  What is performed\
    \ in the Analysis step?"
