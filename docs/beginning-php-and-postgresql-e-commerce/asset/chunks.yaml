    \n**工作原理：表示层的变更**\n\n这是一次漫长的练习，不是吗？然而，要充分利用这次练习，你还需要再进行几次练习来实现税费和运费功能。到那时，所有客户处理功能都将完成，剩下的就只是添加订单管道和信用卡支付处理支持了。\n\
    \n加载你的网站，确保你新添加的代码能正常工作，然后再继续添加税费和运费支持功能。\n\n## 处理税费和运费\n\n许多电子商务网站都具有的一个常见功能是增加税费和/或运费。显然，并非总是如此——例如，数字下载网站就无需收取运费，因为不涉及实体运输。然而，你很可能希望在订单中包含一种或另一种的附加费用。事实上，这可以非常简单，尽管并非总是如此。这实际上取决于你想把事情复杂化到什么程度。在本章中，我们将保持简单，为税费和运费提供基本但可扩展的功能。首先，让我们讨论一下相关问题。\n\
    \n### 税费问题\n\n税收和电子商务网站这个主题有着复杂的历史。早期，你通常可以蒙混过关。税收执行不力，许多网站干脆完全忽略税收。对于国际订单尤其如此，客户通常可以避免支付大部分时间的税款——除非订单被海关官员拦截！然后，随着越来越多的人开始了解电子商务网站，像美国国税局这样的税收机构意识到他们正在损失大量资金——或者至少没有收到他们应得的所有税款。随后，全球各地的各种组织都试图涉足这一收入流，引发了一系列行动。人们提出了一系列解决方案；一些解决方案实施了，但结果好坏参半。现在，情况变得稍微稳定了一些。\n\
    \n在考虑税收时，需要理解的关键概念是“关联”（nexus）。*关联*是指“在征税管辖区内有足够的存在，足以证明征税的合理性。” 实际上，这意味着在进行国际运输时，在大多数情况下，如果你的公司在目的地国家没有重要的存在，你可能无需对发生的情况负责。在某个国家内部（或者，例如，在欧盟内部）进行国内运输时，你可能需要负责。相关立法尚不明朗，我们当然也没有审查世界上每个国家的法律，但这个一般规则往往成立。\n\
    \n其他关键问题可以总结如下：\n\n-   税收取决于你的发货地点和收货地点。\n-   适用国家/地区的规则。\n-   你销售的产品类型很重要。\n\n\
    一些国家的情况比其他国家更简单。例如，在英国，你可以对适用的所有购买行为收取当前的增值税税率（某些类型的产品免税）。"
- fmt: '# 税务与发货问题


    豁免或按降低的税率征税），并对自己已尽力而为感到相对满意。如果你想更进一步，可以考虑设立离岸公司来运输你的商品（亚马逊这样做，你为什么不行呢？）。美国（以及其他国家）的税务系统要复杂得多。在美国境内，销售税不仅因州而异，而且常常在州内也有所不同。事实上，你唯一能确切知道该怎么做的时候，是将商品运送给与你企业位于同一税收区域的客户。在其他时候……老实说，我们的猜测和你的一样准。


    许多州意识到了这个问题，并且可能在你读到本文时已经解决了相关问题，但这远非确定。最近的估计（来自`http://www.offshore-e-com.com/`）显示，电子商务交易造成的税收损失每年在3亿到38亿美元之间；这一误差范围可能告诉你，官员们和我们一样对此感到困惑。人们呼吁提供一个“税收计算器”，通过输入源和目标邮政编码来获取税率，但据我们所知，目前还没有这样的服务。


    在本书中，你添加的税收方案尽可能简单。一个数据库表将包含可应用的各种税率的信息，而目前税率的选择取决于客户的发货区域。所有产品均被视为按同一税率征税。这确实还有很多不足之处，但至少税款会被计算和应用。你可以在以后将其替换为自己的系统。


    ## 发货问题


    发货比税务问题简单一些，尽管同样可以搞得复杂。因为从一家通过电子商务前端进行交易的公司发出订单，与从一家邮购公司发出订单非常相似，相关实践已经相当成熟且相对容易理解。可能会有新的处理方式供你使用，但总体原则是众所周知的。


    你可能在线上交易时代之前就与邮政服务机构有合作关系，在这种情况下，最好尽可能保持与“旧”方式相近的做法。然而，如果你刚刚起步或正在修订你的处理方式，那么你有很多选择可以考虑。


    最简单的选择是完全不担心运费，这在没有成本的情况下是有意义的，例如数字下载的情况。或者，你可以简单地将运费包含在产品的成本中。再或者，你可以对所有订购的商品或目的地收取统一费用。然而，其中一些选择可能导致客户多付或少付，这并不理想。


    另一个极端是，你需要考虑所有订购产品的重量和尺寸，并自行计算精确成本。这可以稍微简化，因为一些运输公司（包括`FedEx`等）提供了有用的API来帮助你。在某些情况下，你可以使用动态系统，根据多个因素（包括包裹重量和交货地点）来计算可用的发货选项（隔夜送达、三到四天等等）。然而，不同运输公司执行这些操作的具体方法可能差异很大，如果你需要，我们将由你来实施这样的解决方案。


    在本书中，我们将再次采取简单的路线。对于数据库中的每个发货区域，你将提供多个发货选项供用户选择，每个选项都有相应的成本。这个成本直接加到订单成本上。这就是为什么在第11章中，你包含了一个`shipping_region`表——它的用途很快会变得显而易见。


