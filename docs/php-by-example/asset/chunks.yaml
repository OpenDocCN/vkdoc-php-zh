- fmt: "一个文件可能描述多个命名空间（不过这不是最佳做法）。如果是这样，描述命名空间内容（包括`namespace`指令）的代码块会一个接一个地列出。也可以将同一个命名空间的代码包含在花括号内。让我们看一个小例子。清单`[9-10]`中的程序描述了`Alpha`和`Bravo`命名空间。\n\
    \n```\nListing 9-10\nThe Description of Two Namespaces\n```\n\n每个命名空间包含一个`show()`函数，该函数显示一条包含命名空间名称的消息。这些命名空间在清单`[9-11]`中被使用。\n\
    \n```\nListing 9-11\nUsing the Two Namespaces\n```\n\n使用`require_once \"listing09_10.php\"\
    `命令导入命名空间文件的内容后，使用`Alpha\\show()`和`Bravo\\show()`命令来调用不同命名空间中定义的函数。\n\n> **注意**\
    \  \n> 假设`Alpha`和`Bravo`命名空间是在`listing09_10.php`文件中描述的。\n\n下面是程序执行的结果。\n\n```\n\
    The output of the program (from Listing 9-11)\nThe namespace Alpha\nThe namespace\
    \ Bravo\n```\n\n使用命名空间时，可以创建别名。这时，需要使用`use`指令，后跟完整的命名空间工具引用。接着，放入`as`关键字和该工具的别名（对于函数，`use`关键字后还要跟`function`关键字）。清单`[9-12]`是`MyUtils`命名空间的代码，其中包含`show()`和`display()`函数以及`MyClass`类。\n\
    \n```\nListing 9-12\nOne More Namespace\n```\n\n该命名空间在清单`[9-13]`的程序中被使用。\n\n```\n\
    Listing 9-13\nCreating Aliases\n```\n\n程序的输出如下。\n\n```\nThe output of the program\
    \ (from Listing 9-13)\nThe function show()\nThe function display()\nAn object\
    \ of the class MyClass\n```\n\n从`listing09_12.php`文件导入命名空间内容后，你通过`use function\
    \ MyUtils\\show`、`use function MyUtils\\display as disp`和`use MyUtils\\MyClass\
    \ as MyClass`指令创建别名。对于`show()`函数，你没有指定`as`指令，因此别名就是函数名（不引用命名空间）。对于`display()`函数，别名是`disp()`。`MyClass`类的别名就是类名本身。\n\
    \n## 匿名类\n\n有些情况下，你需要一个类只基于它创建一个对象。在这种情况下，使用匿名类很方便。这意味着你在创建类的同时创建一个对象。相应的指令以`new`关键字开头，后跟`class`关键字以及花括号中的类描述。让我们看一个小例子来解释所描述的方法。程序如清单`[9-14]`所示。\n\
    \n```\n<?php\n// 创建匿名类对象：\n$obj = new class{\n    private $number;\n    // 获取字段值的方法：\n\
    \    public function get(){\n        return $this->number;\n    }\n    // 给字段赋值的方法：\n\
    \    public function set($number){\n        $this->number = $number;\n    }\n\
    };\n// 对对象的操作：\n$obj->set(100);\necho \"\\$number = \", $obj->get(), \"\\n\";\n\
    ?>\nListing 9-14\nAn Anonymous Class\n```\n\n程序执行的结果如下。\n\n```\nThe output of\
    \ the program (from Listing 9-14)\n$number = 100\n```\n\n在这种情况下，你借助以下指令创建了`$obj`对象（注释已删除）。\n\
    \n```\nnew class{\n    private $number;\n    public function get(){\n        return\
    \ $this->number;\n    }\n    public function set($number){\n        $this->number\
    \ = $number;\n    }\n}\n```\n\n这是一个可以描述类的表达式。区别在于你没有指定类名，并且出现了`new`指令。结果是，这个对象是基于该指令所描述的类创建的，但是这个类没有名字。\n\
    \n> **注意**  \n> 在整个结构末尾要加上分号，它作为创建对象的命令。\n\n## 总结\n\n* 抽象类用`abstract`关键字描述，并包含抽象方法。抽象方法没有实现，仅声明。抽象方法的声明也使用`abstract`关键字。除了抽象方法，抽象类还可以包含常规（非抽象）方法和字段。抽象类用于通过继承创建基于它们的子类。\n\
    \n* 接口就像一个“完全抽象”的类。接口没有字段（但可以有常量），并且其中只声明方法。接口用`interface`关键字描述。如果一个类实现了某个接口，该类必须实现接口中的每个方法。要在类中实现接口，在类描述中，需要在类名后放置`implements`关键字和要实现的接口名。如果一个类实现了多个接口，它们列在`implements`关键字后，用逗号分隔。\n\
    \n* 接口可以继承另一个接口。在这种情况下，使用`extends`关键字，就像在类继承中一样。\n\n* 一个类可以同时继承另一个类并实现多个接口。\n\n\
    * Trait 包含可以包含在类描述中的代码块。Trait 使用`trait`关键字描述。要将 trait 内容包含到类中，需要放置`use`指令，然后列出要包含在类中的\
    \ trait，并用逗号分隔。\n\n* 如果将接口名指定为函数参数类型，则可以将实现该接口的类对象作为参数传递给该函数。如果将类名（通常是抽象类）指定为参数类型，则可以将任何子类的对象作为参数传递。`instanceof`指令可用于检查对象或参数的类型。\n\
    \n* 要创建命名空间，使用`namespace`指令，后跟命名空间的名称。应将适当的文件导入到程序中以包含该命名空间。通过指定命名空间名称来访问命名空间中的工具。使用`as`指令创建别名。\n\
    \n* 当只需要基于一个类创建一个对象时，使用匿名类。在这种情况下，将一个表达式赋值给对象变量，该表达式以`new`和`class`关键字开头，后跟花括号中实际的类描述，基于该描述创建对象。\n\
    \n# 10. 错误处理\n\n*我有没有搞砸过什么？嗯，最近呢？*\n\n*—《ALF》电视剧*\n\n即使代码可靠且经过深思熟虑，也不可能总是保证其执行过程中不会发生错误。而原因往往是客观的。例如，用户可能输入了无效的值，或者程序可能找不到它需要运行的文件。在这种情况下，就需要进行错误处理，这也是本章要讨论的内容。"
  raw: "A single file may describe several namespaces (nevertheless, that is not\n\
    the best option). If so, the blocks describing the contents of the\nnamespaces\
    \ (including the `namespace`\ninstructions) are specified one after another. It\
    \ is also possible to\nenclose the code of the same namespace in curly braces.\
    \ Let’s look at a\nsmall example. The program in Listing [9-10](#613529_1_En_9_Chapter.xhtml#PC18)\
    \ describes the\n`Alpha` and `Bravo` namespaces.\n\n```\nListing 9-10\nThe Description\
    \ of Two Namespaces\n```\n\nEach namespace contains the `show()` function that\n\
    displays a message with the namespace name. The namespaces are used in\nListing\
    \ [9-11](#613529_1_En_9_Chapter.xhtml#PC19).\n\n```\nListing 9-11\nUsing the Two\
    \ Namespaces\n```\n\nAfter importing the contents of the namespace file with the\
    \ `require_once` `\"listing09_10.php\"`\ncommand, use the `Alpha\\show()` and\n\
    `Bravo\\show()`\ncommands to call the functions described in the different\nnamespaces.\n\
    \nA circular icon\nreads a letter i at the center.Note\n\nAssume that the `Alpha`\
    \ and `Bravo` namespaces are\ndescribed in the `listing09_10.php`\nfile.\n\nThe\
    \ following shows the result of the program execution.\n\n```\nThe output of the\
    \ program (from Listing 9-11)\nThe namespace Alpha\nThe namespace Bravo\n```\n\
    \nWhen working with namespaces, it is possible to create aliases. In that\ncase,\
    \ you involve the `use` instruction\nfollowed by the full namespace utility reference.\
    \ Next, you put the\n`as` keyword and\nthe alias for that utility (for functions,\
    \ the `use` keyword is also\nfollowed by the `function` keyword).\nListing [9-12](#613529_1_En_9_Chapter.xhtml#PC21)\
    \ is the code for\nthe `MyUtils` namespace with the\n`show()` and\n`display()`\n\
    functions and the `MyClass` class.\n\n```\nListing 9-12\nOne More Namespace\n\
    ```\n\nThe namespace is used in the program in Listing [9-13](#613529_1_En_9_Chapter.xhtml#PC22).\n\
    \n```\nListing 9-13\nCreating Aliases\n```\n\nThe output of the program is as\
    \ follows.\n\n```\nThe output of the program (from Listing 9-13)\nThe function\
    \ show()\nThe function display()\nAn object of the class MyClass\n```\n\nAfter\
    \ importing the contents of the namespace from the `listing09_12.php`\nfile, you\
    \ create aliases by the `use function MyUtils\\show`, `use function MyUtils\\\
    display as disp`, and `use MyUtils\\MyClass as MyClass` instructions. For the\
    \ `show()` function, you do not specify the\n`as` instruction\nso that the alias\
    \ is the function’s name (without referencing the\nnamespace). For the `display()`\
    \ function, the alias is\n`disp()`. The\nalias for the `MyClass` class is the\n\
    name of the class itself.\n\nAnonymous Classes\n\nThere are situations when you\
    \ need a class to create only a single\nobject based on it. In such cases, it\
    \ is convenient to use anonymous\nclasses. It means that you create an object\
    \ at the same time as you\ncreate a class. The corresponding instruction begins\
    \ with the `new` keyword, followed by the\n`class` keyword\nand the class description\
    \ in curly braces. Let’s look at a small example\nthat explains the described\
    \ approach. The program is shown in Listing\n[9-14](#613529_1_En_9_Chapter.xhtml#PC24).\n\
    \n```\nnumber;\n}\n// The method for assigning a value to the field:\npublic function\
    \ set($number){\n$this->number=$number;\n}\n};\n// Operations with the objects:\n\
    $obj->set(100);\necho \"\\$number = \",$obj->get(),\"\\n\";\n?>\nListing 9-14\n\
    An Anonymous Class\n```\n\nThe result of the program execution is as follows.\n\
    \n```\nThe output of the program (from Listing 9-14)\n$number = 100\n```\n\nIn\
    \ that case, you create the `$obj` object with the\nhelp of the following instructions\
    \ (the comments are deleted).\n\n```\nnew class{\nprivate $number;\npublic function\
    \ get(){\nreturn $this->number;\n}\npublic function set($number){\n$this->number=$number;\n\
    }\n}\n```\n\nThat is an expression that could be a description of the class. The\n\
    difference is that you do not specify the class name, and the `new` instruction\
    \ is\npresent. It turns out that the object is created based on the class\ndescribed\
    \ by the instruction, but the class just has no name.\n\nA circular icon\nreads\
    \ a letter i at the center.Note\n\nYou put a semicolon at the end of the entire\
    \ construction, which acts\nas a command to create an object.\n\nSummary\n\n*\
    \   An abstract\n    class is described with the `abstract` keyword and\n    contains\
    \ abstract methods. An abstract method is not described but only\n    declared.\
    \ The abstract method declaration also uses the `abstract` keyword. In\n    addition\
    \ to abstract methods, abstract classes may contain regular\n    (non-abstract)\
    \ methods and fields. Abstract classes are used to create\n    (by using inheritance)\
    \ child classes based on them.\n\n*   An interface is like a “totally abstract”\
    \ class. An interface has\n    no fields (but constants), and methods are only\
    \ declared in it. An\n    interface is described with the `interface` keyword.\
    \ If\n    an interface is implemented in a class, the class must describe each\n\
    \    method from the interface. To implement an interface in a class, in the\n\
    \    class description, you put the `implements` keyword\n    and the interface\
    \ name to be implemented after the class name. If a\n    class implements multiple\
    \ interfaces, they are listed after the `implements` keyword,\n    separated by\
    \ commas.\n\n*   An interface can inherit another interface. In that case, use\
    \ the\n    `extends` keyword\n    like in class inheritance.\n\n*   A class can\
    \ inherit another class and implement several\n    interfaces at the same time.\n\
    \n*   Traits contain blocks of code that can be included in the class\n    description.\
    \ Traits are described using the `trait` keyword. To\n    include the trait contents\
    \ into a class, you place the `use` instruction, then\n    list the traits to\
    \ be included in the class and separate them by\n    commas.\n\n*   If you specify\
    \ the interface name as a function argument type,\n    you can pass an object\
    \ of the class that implements the interface as an\n    argument to that function.\
    \ If you specify a class name (usually\n    abstract) as an argument type, you\
    \ can pass an object of any child class\n    as the argument. The `instanceof`\n\
    \    instruction can be used to check the type of an object or\n    argument.\n\
    \n*   To create a namespace, use the `namespace` instruction\n    followed by\
    \ the name of the namespace. An appropriate file should be\n    imported to include\
    \ the namespace in a program. Utilities from a\n    namespace are accessed by\
    \ specifying the namespace name. The `as` instruction is\n    used to create aliases.\n\
    \n*   An anonymous\n    class is used when you need only one object to be created\
    \ based\n    on the class. In that case, you assign an expression to the object\n\
    \    variable, and that expression starts with the `new` and `class` keywords\n\
    \    followed by the actual description of the class in curly braces, based\n\
    \    on which the object is created.\n\n10. Error Handling\n\n*Have I ever broken\
    \ anything? Well, lately?*\n\n—*ALF* (TV series)\n\nEven if the code is reliable\
    \ and well thought out, it is not always\npossible to guarantee that no errors\
    \ will occur during its execution.\nAnd the reasons are often objective. For example,\
    \ the user might enter\nan invalid value, or the program might not find the file\
    \ it needs to\nrun. In such cases, error handling is used, which is discussed\
    \ in this\nchapter."
