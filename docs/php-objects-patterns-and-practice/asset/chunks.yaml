- fmt: '# Vagrant


    What operating system does your team use? Some organizations mandate a particular
    combination of hardware and software, of course. Often, though, there will be
    a mix. One developer may have a development machine running Fedora. Another might
    swear by his MacBook, and a third may stick with his Windows box (he probably
    likes it for gaming).


    Chances are, the production system will run on something else entirely—CentOS,
    perhaps.


    It can be a pain getting a system to work across multiple platforms, and it can
    be a risk if none of those platforms resemble the production system. You really
    don’t want to discover issues related to the production OS after you’ve gone live.
    In practice, of course, you’ll likely deploy to a staging environment first. Even
    so, wouldn’t it be better to catch these problems early?


    `Vagrant` is a technology that uses virtualization to give all team members a
    development environment that is as close as possible to production. Getting up
    and running should be as simple as invoking a command or two and, best of all,
    everyone can stick with their favorite machines and distributions (I’m a Fedora
    guy, for the record).


    I cover `Vagrant` in Chapter [20](#A314621_5_En_20_Chapter.html).


    # Testing


    When you create a class, you are probably pretty sure that it works. You will,
    after all, have put it through its paces during development. You’ll also have
    run your system with the component in place, checking that it integrates well,
    and that your new functionality is available and performing as expected.


    Can you be sure that your class will carry on working as expected though? That
    might seem like a silly question. After all, you’ve checked your code once; why
    should it stop working arbitrarily? Well, of course it won’t; nothing happens
    arbitrarily, and if you never add another line of code to your system, you can
    probably breathe easy. If, on the other hand, your project is active, then it’s
    inevitable that your component’s context will change and highly likely that the
    component itself will be altered in any number of ways.


    Let’s look at these issues in turn. First, how can changing a component’s context
    introduce errors? Even in a system where components are nicely decoupled from
    one another, they remain interdependent. Objects used by your class return values,
    perform actions, and accept data. If any of these behaviors change, the effects
    on the operation of your class might cause the kind of error that’s easy to catch—the
    kind where your system falls over with a convenient error message that includes
    a file name and line number. Much more insidious, though, is the kind of change
    that does not cause an engine-level error, but nonetheless confuses your component.
    If your class makes an assumption based on another class’s data, a change in that
    data might cause it to make a wrong decision. Your class is now in error and without
    a change to a line of code.


    And it’s likely that you will go on altering the class you’ve just completed.
    Often, these changes will be minor and obvious—so minor, in fact, that you won’t
    feel the need to run through the careful checks you performed during development.
    You’ll have probably forgotten them all, anyhow, unless you kept them in some
    way (perhaps commented out at the bottom of your class file as I sometimes do).
    Small changes, though, have a way of causing large unintended consequences—consequences
    that might have been caught had you thought to put a test harness in place.


    A test harness is a set of automated tests that can be applied to your system
    as a whole or to its individual classes. Well deployed, a test harness helps you
    to prevent bugs from occurring and from recurring. A single change may cause a
    cascade of errors, and the test harness can help you to locate and eliminate these.
    This means you can make changes with some confidence that you are not breaking
    anything. It is quite satisfying to make an improvement to your system and then
    see a list of failed tests. These are all errors that might have been propagated
    within your system, but now it won’t have to suffer them.


    # Continuous Integration


    Have you ever made a schedule that made everything okay? You start with an assignment:
    code maybe, or a school project. It’s big and scary, and failure lurks. But you
    get out a sheet of paper, and you slice it up into manageable tasks. You determine
    the books to read and the components to write. Maybe you highlight the tasks in
    different colors. Individually, none of the tasks is actually that scary, it turns
    out. And gradually, as you plan, you conquer the deadline. As long as you do a
    little bit every day, you’ll be fine. You can relax.


    Sometimes, though, that schedule takes on a talismanic power. You hold it up like
    a shield, to protect yourself from doubt, and from the creeping fear that perhaps
    this time you’ll crash and burn. And it’s only after several weeks that you realize
    the schedule is not magic on its own. You actually have to do the work, too. By
    then, of course, lulled by the schedule’s reassuring power, you have let things
    slide. There’s nothing for it but to make a new schedule. This time it will be
    less reassuring.


    Testing and building are like that, too. You have to run your tests. You have
    to build your projects, and build them in fresh environments regularly; otherwise,
    the magic won’t work.


    And if writing tests is a pain, running them can be a chore, especially as they
    gain in complexity and failures interrupt your plans. Of course, if you were running
    them more often, you’d probably have fewer failures, and those you did have would
    stand a good chance of relating to new code that’s fresh in your mind.


    It’s easy to get comfortable in a sandbox. After all, you’ve got all your toys
    there: little scriptlets that make your life easy, development tools, and useful
    libraries. The trouble is, your project may be getting too comfortable in your
    sandbox, too. It may begin to rely on uncommitted code, or dependencies that you
    have left out of your build files. That means it’s broken anywhere else but where
    you work.


    The only answer is to build, build, and build again. And do it in a reasonably
    virgin environment each time.


    Of course, it’s all very well to advise this; it’s quite another matter to do
    it. Coders as a breed tend to like to code. They want to keep the meetings and
    the housekeeping to a minimum. That’s where Continuous Integration (CI) comes
    in. CI is both a practice and a set of tools to make the practice as easy as it
    possibly can be. Ideally, builds and tests should be entirely automatic, or at
    least launchable from a single command or click. Any problems will be tracked,
    and you will be notified before an issue becomes too serious. I will talk more
    about CI in Chapter [21](#A314621_5_En_21_Chapter.html).


    # Summary


    A developer’s aim is always to deliver a working system. Writing good code is
    an essential part of this aim’s fulfillment, but it is not the whole story.


    In this chapter, I introduced dependency management with `Composer` and `Packagist`.
    I also discussed two great aids to collaboration: `Vagrant` and version control.
    I covered why version control requires automated build, and I introduced `Phing`,
    a PHP implementation of `Ant`, a Java build tool. Finally, I discussed software
    testing and introduced CI, a set of tools to automate build and testing.


    # 15. PHP Standards


    Unless you are a lawyer or a health inspector, the topic of standards probably
    does not make your heart race. However, what standards help us achieve is worth
    getting excited about. Standards promote interoperability, and that gives us access
    to a vast array of compatible tools and framework components.


    This chapter will cover several important aspects of standards:


    - Why standards: What are standards and why they matter

    - PHP Standards Recommendations: Their origins and purpose

    - PSR-1: The Basic Coding Standard

    - PSR-2: The Coding Style Guide

    - PSR-4: Autoloading'
