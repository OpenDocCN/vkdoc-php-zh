    Recipe 2-3\. Writing an Abstract Class


    Problem


    PHP supports different types of classes that serve various purposes. These are
    called base, abstract, and interface classes. You want to use an abstract class
    definition to define functions that are common for one or more subclasses. Each
    subclass will define the specific behavior of each function but all classes that
    extend an abstract base class must implement all of the methods. When a class
    is defined as an abstract class it must contain at least one abstract function,
    and abstract classes cannot be instantiated directly, only through a class that
    extends the abstract class.


    Solution


    An abstract class cannot be instantiated as objects but serves the sole purpose
    of providing basic method definitions for derived classes, and it can include
    abstract methods that provide a method definition without any functionality or
    fully defined methods that can be overwritten or left as is. All the abstract
    methods must be declared and defined in full by the derived classes. Abstract
    classes are useful when building a system of classes that all have the same set
    of functionality but with different implementations. An example of this can be
    a set of database access classes. They all need connect, disconnect, and other
    functions but they all implement these in a slightly different way.


    By defining an abstract base class with all the common functions, any derived
    class will have to implement the exact same functions and thereby make it easier
    to switch between the databases by simply instantiating a different class.


    ■ **Note** To compare abstract classes with base classes, see Recipe 2-2 for details
    of using base classes.


