    \ {\nif (in_array($userid, $user)) {\n$hash = $user['password'];\nif(password_verify($password,$hash))\n\
    {\n$passed = TRUE;\n$valid_useridpasswords['user'][$I]['password'] = $newpassword;\n\
    $valid_useridpasswords['user'][$I]['datestamp'] = $datestamp;\n$valid_useridpasswords['user'][$I]['attempts']\
    \ = 0;\nsaveupfile($dog_data_xml,$valid_useridpasswords);\n// save changes before\
    \ header call\n$login_string = date('mdYhis') . \" | Password Changed | \" . $userid\
    \ . \"\\n\";\nerror_log($login_string,3,$user_log_file);\nheader(\"Location: e7login.php\"\
    );\n} }\n$I++;\n} }\n// drops to here if not valid password/userid or too many\
    \ attempts\nif (!$passed){\necho \"Invalid Userid/Password\";\n} } }\ncatch(Exception\
    \ $e) {\necho $e->getMessage();\n}\n?>\n```\n\n`用户名`必须包含八个或更多字符。密码必须至少包含一个数字、一个大写字母和一个小写字母，并且总长度至少为\
    \ 8 个字符。  \n`用户名`:   \n`旧密码`:   \n`新密码`:   \n`确认密码`:  \n\n```\nfunction check(input)\
    \ {\nif (input.value != document.getElementById('password').value) {\ninput.setCustomValidity('Password\
    \ Must be Matching.');\n} else {\n// input is valid -- reset the error message\n\
    input.setCustomValidity('');\n}\n}\n```\n\n## 示例 8-5  \n### `changepassword.php`\
    \ 文件\n\n除了已解释的 PHP 代码外，示例 8-5 还包含了 JavaScript 代码，用于验证新密码的格式是否正确以及新密码是否输入了两次。示例中未包含\
    \ PHP 代码中对正确用户 ID 和密码输入的验证。由于信息通过互联网从表单传输到 PHP 程序，因此也应在 PHP 程序中验证用户 ID 和密码。该编码留作本节练习。\n"
- fmt: "# JSON Data\nThe only changes needed for the change password program to work\
    \ with JSON data are indicated in the previous JSON sections of this chapter.\n\
    \n# MySQL Data\nThe `UPDATE` SQL statement needs to “set” the password property\
    \ in the same structure as the other fields that were changed in the previous\
    \ MySQL section.\n\n# Do It\n\n1. Copy the example files for this section from\
    \ the book’s web site. Adjust the change password program to include PHP code\
    \ that verifies the correct format of the user ID, password, and new password.\n\
    \n2. Copy the example files for this chapter from the book’s web site. Adjust\
    \ the registration program to check for a duplicate user ID before attempting\
    \ to insert a new user ID/password combination. Hint: This can be done using the\
    \ `in_array` method. If the user ID exists, display a message back to the users.\n\
    \n3. Copy the example files for this section from the book’s web site. Adjust\
    \ the programs necessary to require the users to also enter their name, phone,\
    \ and email when registering. Also make sure to change the other programs to keep\
    \ this information valid.\n\n# Chapter Terms\n\n| Authentication | Session |\n\
    | --- | --- |\n| `session_start` | `isset` |\n| Session properties | `$_SESSION`\
    \ |\n| Verification code | `.{8,}` |\n| `?=.*\\d` | `?=.*[A-Z]` |\n| `?=.*[a-z]`\
    \ | Header |\n| `array_keys` | `password_hash` |\n| `password_verify` | Nonregistered\
    \ users |\n| `$_SERVER['REMOTE_ADDR']` | Registration page |\n| `preg_match` |\
    \ `strlen` |\n| `file_get_contents` | `preg_quote` |\n| `preg_replace` | Expire\
    \ passwords |\n| Password sniffer programs | Limited number of attempts |\n| Timeout\
    \ period | `strtotime` |\n| SQL Injection | |\n\n# Chapter Questions and Projects\n\
    \n## Multiple Choice\n\n1. Authentication does which of the following?\n   1.\
    \ Provides security for an application\n   2. Verifies user IDs and passwords\n\
    \   3. Should use encrypted passwords\n   4. All of the above\n\n2. Sessions do\
    \ which of the following?\n   1. Are created using the `session_create` method\n\
    \   2. Allow the sharing of information between programs\n   3. Do not provide\
    \ any security benefits\n   4. All of the above\n\n3. Registration pages do which\
    \ of the following?\n   1. Allow the users to create their own user IDs and passwords\n\
    \   2. Can be used to gather information about the users\n   3. Should encrypt\
    \ the password before storing it\n   4. All of the above\n\n4. Verification code\
    \ does which of the following?\n   1. Uses `session_start` to attach the program\
    \ to a current session\n   2. Verifies that a user has logged in\n   3. Must be\
    \ attached only to programs in the interface tier\n   4. All of the above\n\n\
    5. Which of these describes SQL injection?\n   1. The process of using an SQL\
    \ statement to update a database\n   2. The process of inserting variables in\
    \ a SQL statement for flexibility\n   3. Causes data to be corrupted\n   4. All\
    \ of these\n\n## True/False\n\n1. MD5 is the most up-to-date and secure encryption\
    \ technique.\n\n2. `password_hash` should be used to create an encrypted password.\n\
    \n3. Users should be notified that they have exceeded the maximum number of attempts\
    \ to enter a correct user ID and password.\n\n4. An authentication system does\
    \ not need to timeout passwords and force its users to change their passwords\
    \ when they time out.\n\n5. `preg_replace` can be used with an encrypted password\
    \ to ensure that PHP does not interpret special characters as PHP commands.\n\n\
    ## Short Answer/Essay\n\n1. Explain the techniques that can be used to reduce\
    \ the chances that a password sniffing program can discover the correct user ID\
    \ and password combination.\n\n2. Explain how sessions work. Include an explanation\
    \ on how they can help secure an application with user ID and password authentication.\n\
    \n3. What is SQL injection? How can it be avoided?\n\n4. Why should passwords\
    \ be encrypted? Explore the Internet and discover the latest versions of encryption.\
    \ Does the most current version of PHP use the newest version of encryption?\n\
    \n## Projects\n\n1. Download log maintenance files from Chapter 6 or use your\
    \ own maintenance files that you created from Chapter 6. Use the techniques shown\
    \ in this chapter to secure these files with user ID and password authentication.\n\
    \n2. Download the files from this chapter. Update the files and programs so users\
    \ can request their passwords. A temporary password (new field in the XML file)\
    \ must randomly be created (use `rand`) and emailed to the users. The password\
    \ should have a quick expiration (one day or less). The user must be able to verify\
    \ other information entered via the registration page (security question, or other\
    \ personal info) to request the password. If the user signs in correctly with\
    \ the temporary password, the system should make the user change the password.\n\
    \n## Term Project\n\n1. Update the ABC Computer Parts Inventory application to\
    \ include user ID and password authentication as shown in this chapter. Be sure\
    \ to secure any log maintenance programs related to the application.\n\n# 9. Multifunctional\
    \ Interfaces\n\n*Hard work never killed anybody, but why take a chance.*\n\n—Edgar\
    \ Bergen (`http://coolfunnyquotes.com`)\n\n## Chapter Objectives/Student Learning\
    \ Outcomes\n\nAfter completing this chapter, the student will be able to\n\n*\
    \ Create a complete PHP application that deletes, updates, and inserts data\n\
    * Create a professional look to a completed application using CSS\n* Use JavaScript\
    \ to accept and manipulate data from another program\n* Secure all programs within\
    \ an application requiring user IDs/passwords\n* Populate HTML objects with values\
    \ from a JSON object\n* Create a PHP program that will use current password encryption\
    \ techniques\n\n## The Complete Application\n\nIn this chapter, we will complete\
    \ the development of the ABC Canine Shelter Reservation System. The current version\
    \ of the system allows the users to insert only one dog before requiring them\
    \ to log in again to insert additional dogs. Also, the system does not allow users\
    \ to update or delete dog information that exists in the system. We have already\
    \ completed most of the PHP code necessary to provide update and delete ability\
    \ in Chapter 7 (data objects). We now need to attach this portion of the data\
    \ object (`dog_data`) to the business rules tier (`dog`). In addition, we need\
    \ to make some changes to the interface tier (`dog_interface` and `lab`) to call\
    \ the `update` and `delete` methods and display the results. Most of the coding\
    \ needed (as you will soon see) will take place in the `lab.php` file. So, we\
    \ will start with those changes."
