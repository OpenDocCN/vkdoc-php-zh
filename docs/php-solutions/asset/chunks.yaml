  trans: "\n### 在数据表中插入外键\n\n在另一个数据表中插入外键的基本原理相当简单：你查询数据库以找到想要链接到另一条记录的主键，然后使用 `INSERT`\
    \ 或 `UPDATE` 查询将外键添加到目标记录中。\n\n为了演示这一基本原理，你将修改来自第 13 章的更新表单，增加一个下拉菜单，用于列出已在 `images`\
    \ 表中注册的图片（见图 15-4）。\n\n![A978-1-4842-0635-5_15_Fig4_HTML.jpg](img/A978-1-4842-0635-5_15_Fig4_HTML.jpg)\n\
    \n**图 15-4.** 动态生成的下拉菜单插入相应的外键\n\n该菜单通过一个循环动态生成，该循环显示 `SELECT` 查询的结果。每张图片的主键都存储在\
    \ `<option>` 标签的 `value` 属性中。提交表单后，所选值作为外键被合并到 `UPDATE` 查询中。\n\n#### PHP 解决方案\
    \ 15-2：添加图片外键（MySQLi）\n\n该 PHP 解决方案展示了如何通过将所选图片的主键作为外键添加，从而更新 `blog` 表中的记录。它改编自第\
    \ 13 章的 `admin/blog_update_mysqli.php`。请使用你在第 13 章中创建的版本。或者，将 `ch13` 文件夹中的 `blog_update_mysqli_03.php`\
    \ 复制到 `admin` 文件夹，并从文件名中删除 `_03`。\n\n现有的用于检索待更新文章详细信息的 `SELECT` 查询需要修改，以包含外键 `image_id`，并且结果需要绑定到一个新的结果变量\
    \ `$image_id` 上。接着，你需要运行第二个 `SELECT` 查询来获取 `images` 表的详细信息。在此之前，你需要通过调用预处理语句的\
    \ `free_result()` 方法来释放数据库资源。将以下以粗体突出显示的代码添加到现有脚本中：\n\n```\nif (isset($_GET['article_id'])\
    \ && !$_POST) {\n\n    // 准备 SQL 查询\n    $sql = 'SELECT article_id, image_id,\
    \ title, article FROM blog\n            WHERE article_id = ?';\n\n    if ($stmt->prepare($sql))\
    \ {\n        // 绑定查询参数\n        $stmt->bind_param('i', $_GET['article_id']);\n\
    \n        // 执行查询\n        $OK = $stmt->execute();\n\n        // 将结果绑定到变量并获取\n\
    \        $stmt->bind_result($article_id, $image_id, $title, $article);\n     \
    \   $stmt->fetch();\n\n        // 为第二个查询释放数据库资源\n        $stmt->free_result();\n\
    \    }\n}\n```\n\n你可以在调用 `fetch()` 方法后立即释放结果，因为结果集中只有一条记录，并且每列的值都已绑定到一个变量。\n\n\
    在表单内部，你需要显示存储在 `images` 表中的文件名。由于第二个 `SELECT` 语句不依赖外部数据，使用 `query()` 方法比使用预处理语句更简单。在\
    \ `article` 文本区域后添加以下代码（所有代码均为新增，但为了便于参考，PHP 部分以粗体突出显示）：\n\n```\n<p>\n    <label\
    \ for=\"image_id\">已上传的图片：</label>\n    <select name=\"image_id\" id=\"image_id\"\
    >\n        <option value=\"\">选择图片</option>\n        <?php\n        // 获取图片列表\n\
    \        $getImages = 'SELECT image_id, filename\n                      FROM images\
    \ ORDER BY filename';\n        $images = $conn->query($getImages);\n        while\
    \ ($row = $images->fetch_assoc()) {\n        ?>\n        <option value=\"<?= $row['image_id'];\
    \ ?>\"\n            <?php\n            if ($row['image_id'] == $image_id) {\n\
    \                echo 'selected';\n            }\n            ?>>  <?= $row['filename'];\
    \ ?></option>\n        <?php } ?>\n    </select>\n</p>\n```\n\n第一个 `<option>`\
    \ 标签是硬编码的，标签为 `选择图片`，其 `value` 设置为空字符串。其余的 `<option>` 标签通过一个 `while` 循环填充，该循环将每条记录提取到一个名为\
    \ `$row` 的数组中。\n\n一个条件语句检查当前的 `image_id` 是否与已存储在 `articles` 表中的相同。如果相同，则将 `selected`\
    \ 插入到 `<option>` 标签中，以便在下拉菜单中显示正确的值。\n\n确保不要遗漏以下行中的第三个字符：\n\n```\n?>>  <?= $row['filename'];\
    \ ?></option>\n```\n\n它是 `<option>` 标签的右尖括号，夹在两个 PHP 标签之间。\n\n保存页面并在浏览器中加载。你应自动被重定向到\
    \ `blog_list_mysqli.php`。选择其中一个 EDIT 链接，确保你的页面看起来像图 15-4。检查浏览器源代码视图，验证 `<option>`\
    \ 标签的 `value` 属性是否包含每张图片的主键。\n\n**提示：** 如果 `<select>` 菜单没有列出图片，那么几乎可以肯定是第 2 步中的\
    \ `SELECT` 查询有错误。在调用 `query()` 方法后立即添加 `echo $conn->error;`，然后重新加载页面。你需要查看浏览器源代码才能看到错误信息。如果消息是“Commands\
    \ out of sync; you can't run this command now”，问题在于未能在第 1 步中使用 `free_result()`\
    \ 释放数据库资源。\n\n最后阶段是将 `image_id` 添加到 `UPDATE` 查询中。由于某些博客条目可能没有关联图片，你需要创建备用的预处理语句，如下所示：\n\
    \n```\n// 如果表单已提交，则更新记录\nif (isset($_POST['update'])) {\n    // 准备更新查询\n    if\
    \ (!empty($_POST['image_id'])) {\n        $sql = 'UPDATE blog SET image_id = ?,\
    \ title = ?, article = ?\n                WHERE article_id = ?';\n        if ($stmt->prepare($sql))\
    \ {\n            $stmt->bind_param('issi', $_POST['image_id'], $_POST['title'],\n\
    \                              $_POST['article'], $_POST['article_id']);\n   \
    \         $done = $stmt->execute();\n        }\n    } else {\n        $sql = 'UPDATE\
    \ blog SET image_id = NULL, title = ?, article = ?\n                WHERE article_id\
    \ = ?';\n        if ($stmt->prepare($sql)) {\n            $stmt->bind_param('ssi',\
    \ $_POST['title'], $_POST['article'],\n                              $_POST['article_id']);\n\
    \            $done = $stmt->execute();\n        }\n    }\n}\n```\n\n如果 `$_POST['image_id']`\
    \ 有值，则将其作为第一个参数（带占位符问号）添加到 SQL 中。由于它必须是整数，因此在 `bind_param()` 的第一个参数开头添加了 `i`。\n\
    \n然而，如果 `$_POST['image_id']` 没有值，则需要创建不同的预处理语句，在 SQL 查询中将 `image_id` 的值设置为 `NULL`。由于它是显式值，因此不将其添加到\
    \ `bind_param()` 中。\n\n再次测试页面，从下拉菜单中选择一个文件名，然后点击 `更新条目`。你可以通过在 phpMyAdmin 中刷新\
    \ `浏览` 标签，或选择同一篇文章进行更新，来验证外键是否已插入到 `articles` 表中。这一次，下拉菜单中应显示正确的文件名。\n\n如有必要，请将你的代码与\
    \ `ch15` 文件夹中的 `blog_update_mysqli_04.php` 进行核对。\n"
- fmt: '# PHP Solution 15-3: Adding the Image Foreign Key (PDO)


    This PHP solution uses PDO to update records in the `blog` table by adding the
    primary key of a selected image as a foreign key. The main difference from MySQLi
    is that PDO can bind a `null` value to a placeholder using the `bindValue()` method.
    These instructions adapt `admin/blog_update_pdo.php` from [Chapter 13](#A978-1-4842-0635-5_13_Chapter.html).
    Use the version that you created in [Chapter 13](#A978-1-4842-0635-5_13_Chapter.html).
    Alternatively, copy `blog_update_pdo_03.php` from the `ch13` folder to the `admin`
    folder and remove `_03` from the filename.


    Add `image_id` to the `SELECT` query that retrieves details of the article to
    be updated, and bind the result to `$image_id`. This involves renumbering the
    columns passed as the first argument to `bindColumn()` for `$title` and `$article`.
    The revised code looks like this:


    ```

    if (isset($_GET[''article_id'']) && !$_POST) {


    // prepare SQL query


    $sql = ''SELECT article_id, image_id, title, article FROM blog


    WHERE article_id = ?'';


    $stmt = $conn->prepare($sql);


    // pass the placeholder value to execute() as a single-element array


    $OK = $stmt->execute([$_GET[''article_id'']]);


    // bind the results


    $stmt->bindColumn(1, $article_id);


    $stmt->bindColumn(2, $image_id);


    $stmt->bindColumn(3, $title);


    $stmt->bindColumn(4, $article);


    $stmt->fetch();


    }

    ```


    Inside the form, you need to display the filenames stored in the `images` table.
    Since the second `SELECT` statement doesn’t rely on external data, it’s simpler
    to use the `query()` method instead of a prepared statement. Add the following
    code after the `article` text area (it’s all new code, but the PHP sections are
    highlighted in bold for ease of reference):


    ```

    <p>


    <label for="image_id">Uploaded image:</label>


    <select name="image_id" id="image_id">


    <option value="">Select image</option>


    <?php


    // get the list images


    $getImages = ''SELECT image_id, filename


    FROM images ORDER BY filename'';


    foreach ($conn->query($getImages) as $row) {


    ?>


    <option value="<?= $row[''image_id'']; ?>"


    <?php


    if ($row[''image_id''] == $image_id) {


    echo ''selected'';


    }


    ?> > <?= $row[''filename'']; ?></option>


    <?php } ?>


    </select>


    </p>

    ```


    The first `<option>` tag is hard-coded with the label `Select image`, and its
    `value` is set to an empty string. The remaining `<option>` tags are populated
    by a `foreach` loop that executes the `$getImages SELECT` query and extracts each
    record to an array called `$row`.


    A conditional statement checks whether the current `image_id` is the same as the
    one already stored in the `articles` table. If it is, `selected` is inserted into
    the `<option>` tag so that it displays the correct value in the drop-down menu.


    Make sure you don’t omit the third character in the following line:


    ```

    ?> > <?= $row[''filename'']; ?></option>

    ```


    It’s the closing angle bracket of the `<option>` tag, sandwiched between two PHP
    tags.


    Save the page and load it into a browser. You should be automatically redirected
    to `blog_list_pdo.php`. Select one of the `EDIT` links, and make sure that your
    page looks like Figure [15-4](#A978-1-4842-0635-5_15_Chapter.html#Fig4). Check
    the browser source-code view to verify that the value attributes of the `<option>`
    tags contain the primary key of each image.


    The final stage is to add the `image_id` to the `UPDATE` query. When a blog entry
    isn’t associated with an image, you need to enter `null` in the `image_id` column.
    This involves changing the way the values are bound to the anonymous placeholders
    in the prepared statement. Instead of passing them as an array to the `execute()`
    method, you need to use `bindValue()` and `bindParam()`. The revised code looks
    like this:


    ```

    // if form has been submitted, update record


    if (isset($_POST[''update''])) {


    // prepare update query


    $sql = ''UPDATE blog SET image_id = ?, title = ?, article = ?


    WHERE article_id = ?'';


    $stmt = $conn->prepare($sql);


    if (empty($_POST[''image_id''])) {


    $stmt->bindValue(1, NULL, PDO::PARAM_NULL);


    } else {


    $stmt->bindParam(1, $_POST[''image_id''], PDO::PARAM_INT);


    }


    $stmt->bindParam(2, $_POST[''title''], PDO::PARAM_STR);


    $stmt->bindParam(3, $_POST[''article''], PDO::PARAM_STR);


    $stmt->bindParam(4, $_POST[''article_id''], PDO::PARAM_INT);


    // execute query


    $done = $stmt->execute();


    }

    ```


    The values are bound to the anonymous placeholders using numbers, counting from
    1, to identify which placeholder they should be applied to. A conditional statement
    checks whether `$_POST[''image_id'']` is empty. If it is, `bindValue()` sets the
    value to `null`, using the keyword `NULL` as the second argument and a PDO constant
    as the third argument. As explained in “Embedding variables in PDO prepared statements”
    in [Chapter 11](#A978-1-4842-0635-5_11_Chapter.html), you need to use `bindValue()`
    when the value being bound is anything other than a variable.


    The remaining values are all variables, so they’re bound using `bindParam()`.
    I’ve used the PDO constants for integer and string for the remaining values. This
    isn’t strictly necessary, but it makes the code clearer.


    Finally, the array of values has been removed from between the parentheses of
    the `execute()` method.


    Test the page again, select a filename from the drop-down menu, and click `Update
    Entry`. You can verify whether the foreign key has been inserted into the `articles`
    table by refreshing `Browse` in phpMyAdmin or by selecting the same article for
    updating. This time, the correct filename should be displayed in the drop-down
    menu.


    Check your code against `blog_update_pdo_04.php` in the `ch15` folder, if necessary.


    ## Selecting Records from Multiple Tables


    There are several ways to link tables in a `SELECT` query, but the most common
    is to list the table names, separated by `INNER JOIN`. On its own, `INNER JOIN`
    produces all possible combinations of rows (a Cartesian join). To select only
    related values, you need to specify the primary-key/foreign-key relationship.
    For example, to select articles and their related images from the `blog` and `images`
    tables, you can use a `WHERE` clause, like this:


    ```

    SELECT title, article, filename, caption


    FROM blog INNER JOIN images


    WHERE blog.image_id = images.image_id

    ```


    The `title` and `article` columns exist only in the `blog` table. Likewise, `filename`
    and `caption` exist only in the `images` table. They’re unambiguous and don’t
    need to be qualified. However, `image_id` exists in both tables, so you need to
    prefix each reference with the table name and a period.


    For many years, it was common practice to use a comma in place of `INNER JOIN`,
    like this:


    ```

    SELECT title, article, filename, caption


    FROM blog, images


    WHERE blog.image_id = images.image_id

    ```


    > **Caution:** Using a comma to join tables can result in SQL syntax errors because
    of changes made to the way joins are handled since MySQL 5.0.12. Use `INNER JOIN`
    instead.


    Instead of a `WHERE` clause, you can use `ON`, like this:


    ```

    SELECT title, article, filename, caption


    FROM blog INNER JOIN images ON blog.image_id = images.image_id

    ```


    When both columns have the same name, you can use the following syntax, which
    is my personal preference:


    ```

    SELECT title, article, filename, caption


    FROM blog INNER JOIN images USING (image_id)

    ```


    > **Note:** The column name after `USING` must be in parentheses.'
