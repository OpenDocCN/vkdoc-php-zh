- fmt: '# Phase I of Development


    ## Chapter 1: Starting an E-Commerce Site


    The good news is that the brand new shopping cart implemented in Chapter 8 looks
    good and is fully functional. The bad news is that it doesn’t allow the visitor
    to actually place an order, making it totally useless in the context of a production
    system. As you have probably already guessed, you’ll deal with that problem in
    this chapter, in two separate stages. In the first part of the chapter, you’ll
    implement the client-side part of the order-placing mechanism. In the second part
    of the chapter, you’ll implement a simple orders administration page where the
    site administrator can view and handle pending orders.


    ## Chapter 10: Product Recommendations


    One of the best advantages of an Internet store compared to a brick-and-mortar
    store is the capability to customize the web site for each visitor based on his
    or her preferences, or based on data gathered from other visitors with similar
    preferences. If your web site knows how to suggest additional products to your
    visitor in a clever way, he or she might end up buying more than initially planned.
    In Chapter 10, you’ll learn how to implement a dynamic product recommendation
    system.


    # Part 3: Phase III of Development


    ## Chapter 11: Managing Customer Details


    In the first two stages of development, you’ve built a basic (but functional)
    site and have hooked it into PayPal for taking payments and confirming orders.
    In the third section of the book, you’ll take things a little further. By cutting
    out PayPal from the ordering process, you can gain better control as well as reduce
    overhead. This isn’t as complicated as you might think, but you must be careful
    to do things right. Chapter 11 lays the groundwork by implementing a customer
    account system, as well as looking into the security aspects of exchanging and
    storing customer and credit card details.


    ## Chapter 12: Storing Customer Orders


    In this chapter, you’ll make the modifications required for customers to place
    orders that are associated with their user profiles. The main modification here
    is that the customer associated with an order will be identified by a new piece
    of information in the `orders` table, and much of the rest of the modifications
    will be made to use this information.


    Also in this chapter, you’ll take a look at dealing with another common feature
    of e-commerce sites: tax and shipping charges. Many options are available for
    implementing this functionality, but we’ll just examine a simple way of doing
    things and lay the groundwork for your own further development.


    ## Chapter 13: Implementing the Order Pipeline: Part I


    The HatShop e-commerce application is shaping up nicely. You’ve added customer
    account functionality, and you’re keeping track of customer addresses and credit
    card information, which is stored in a secure way. However, you’re not currently
    using this information—you’re delegating responsibility for this to PayPal. In
    this and the next chapter, you’ll build your own order-processing pipeline that
    deals with authorizing credit cards, stock checking, shipping, providing email
    notifications, and so on. We’ll leave the credit card processing specifics until
    Chapter 15, but we’ll show you where this process fits in before then.


    ## Chapter 14: Implementing the Order Pipeline: Part II


    In this chapter, you’ll add the required pipeline sections so that you can process
    orders from start to finish, although you won’t be adding full credit card transaction
    functionality until the next chapter. We’ll also look at the web administration
    of orders by modifying the order admin pages added earlier in the book to take
    into account the new order-processing system.


    ## Chapter 15: Credit Card Transactions


    The last thing you need to do before launching the e-commerce site is enable credit
    card processing. In this chapter, we’ll look at how you can build this into the
    pipeline you created in Chapters 13 and 14. You’ll see how to use two popular
    credit card gateways to do this: DataCash and Authorize.net. By the end of this
    chapter, HatShop will be a fully functioning, secure, and usable e-commerce application.


    ## Chapter 16: Product Reviews


    At this point, you have a complete and functional e-commerce web site. However,
    this doesn’t stop you from adding even more features to it, making it more useful
    and pleasant for visitors.


    By adding a product reviews system to your web site, you increase the chances
    that visitors will get back to your site, either to write a review for a product
    they bought or to see what other people think about that product.


    ## Chapter 17: Connecting to Web Services


    In the dynamic world of the Internet, sometimes it isn’t enough to just have an
    important web presence; you also need to interact with functionality provided
    by third parties to achieve your goals. So far in this book, you already saw how
    to integrate external functionality to process payments from your customers. In
    Chapter 17, you’ll learn how to use Amazon.com functionality from and through
    Web Services. A Web Service is exposed through a web interface using standard
    Internet protocols such as HTTP. The messages exchanged by the client and the
    server are encoded using an XML-based protocol named SOAP (Simple Object Access
    Protocol), or by using REST (Representational State Transfer). These messages
    are sent over HTTP.


    You’ll learn more about these technologies in this chapter.


    # Prerequisites


    The code in this book has been built and tested with PHP 5 and PostgreSQL 8. It
    will not work with PHP 4 or older versions. You’ll find detailed information about
    the required software in Appendix A.


    # Downloading the Code


    The code for this book can be downloaded in zip file format from the Source Code/Downloads
    section of the Apress web site (`http://www.apress.com`). You also can find the
    code, errata, and other resources related to the book on Cristian’s web site at
    `http://www.cristiandarie.ro/php-postgresql-ecommerce/`, or on Emilian’s web site
    at `http://www.emilianbalanescu.ro/beginning-php-postgresql-ecommerce/`.


    # Contacting the Authors


    You can contact the authors through their web sites, as follows:


    - Cristian Darie, `http://www.cristiandarie.ro`

    - Emilian Balanescu, `http://www.emilianbalanescu.ro`

    - Mihai Valentin Bucica, `http://www.valentinbucica.ro`


    # Part 1: Phase I of Development


    ## Chapter 1: Starting an E-Commerce Site


    The word “e-commerce” has had a remarkable fall from grace in the past few years.
    Just the idea of having an e-commerce web site was enough to get many businessmen
    salivating with anticipation. But now, it’s no longer enough to say, “e-commerce
    is the future—get online or get out of business.” You now need compelling, realistic,
    and specific reasons to take your business online.


    This book focuses on programming and associated disciplines, such as creating,
    accessing, and manipulating databases. But before we jump into that, we need to
    understand the business decisions that lead to the creation of an e-commerce site
    in the first place.


    If you want to build an e-commerce site today, you must answer some tough questions.


    The good news is that these questions do have answers, and we’re going to have
    a go at answering them in this chapter:


    - So many big e-commerce sites have failed. What can e-commerce possibly offer
    me in today’s tougher environment?'
