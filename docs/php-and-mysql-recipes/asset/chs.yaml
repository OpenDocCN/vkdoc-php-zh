- "# 第 16 章：使用 MySQL 数据库\n\n包含专辑的表中缺少一些信息。到目前为止，只添加了单个乐队的专辑，但如果要添加更多乐队呢？简单的解决方案是向\
  \ `album` 表中添加一个额外的字符列。这样每条记录都可以插入一个文本值。使用文本列可以为每条记录设置不同的值，即使是同一乐队也不例外。在这种情况下，我们可能会使用\
  \ \"The Beatles\"、\"Beatles\"、\"Beatles, The\" 以及许多其他组合。这可能会导致难以查找某个乐队的全部专辑。\n\n\
  为了解决这个问题，我们可以创建一个名为 `artist` 的新表，并将 `album` 表链接到该表。\n\n执行这些操作的 SQL 语句如下：\n\n```sql\n\
  create table artist (\n    id int auto_increment,\n    artist_name varchar(250)\
  \ not null,\n    description varchar(2000),\n    primary key(id)\n);\n```\n\n以及用来更新\
  \ `album` 表、添加一个允许链接到 `artist` 表的额外列的 SQL 语句：\n\n```sql\nalter table album add artist_id\
  \ int;\nalter table album add foreign key(artist_id) references artist(id);\n```\n\
  \n第一条语句更改了 `album` 表的列定义，第二条语句则在 `album` 和 `artist` 之间创建了一个外键关系。如果存在一个或多个专辑与该艺术家相关联，此关系将阻止删除该艺术家。\n\
