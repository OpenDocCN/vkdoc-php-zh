    public function upload($fieldname, $size = null, array $mime = null) {

    $uploaded = $_FILES[$fieldname];

    if (!is_null($size) && $size > 0) {

    $this->max = (int) $size;

    }

    if (!is_null($mime)) {

    $this->permitted = array_merge($this->permitted, $mime);

    }

    if ($this->checkFile($uploaded)) {

    $this->moveFile($uploaded);

    }

    }

    ```


    第一个条件语句检查 `$size` 是否为 `null` 并且大于 0。如果条件为 `true`，则 `(int)` 类型转换运算符（参见第 4 章表 4-1）将
    `$size` 转换为整数并赋值给 `$max` 属性。


    第二个条件语句检查 `$mime` 是否为 `null`。如果不是，则 `array_merge()` 函数会将新的 MIME 类型追加到 `$permitted`
    属性中已有的值后面。我假设应保留默认的图像类型。但是，如果你想阻止上传图像，可以像这样直接将 `$mime` 赋值给 `$permitted` 属性：


    ```

    if (!is_null($mime)) {

    $this->permitted = $mime;

    }

    ```


    3. 保存 `Upload.php` 并再次测试 `file_upload.php`。它应该会像之前一样继续上传小于 50 KB 的图像。


    4. 修改 `file_upload.php`，将最大允许大小更改为 3000 字节，如下所示（代码位于处理上传的条件语句之前）：


    ```

    $max = 3000;

    ```


    5. 你还需要在 `try` 块中将 `$max` 作为第二个参数传递给 `upload()` 方法，如下所示：


    ```

    $loader = new Upload($destination);

    $loader->upload(''image'', $max);

    $result = $loader->getMessages();

    ```


    6. 通过更改 `$max` 的值并将其作为第二个参数传递给 `upload()`，你会影响到表单隐藏字段中的 `MAX_FILE_SIZE` 以及类内部存储的最大值。


    7. 保存 `file_upload.php` 并再次测试。选择一个之前未用过的图像，或删除 `upload_test` 文件夹的内容。第一次尝试时，你可能只看到文件太大的消息。检查
    `upload_test` 文件夹以确认文件未被传输。


    再试一次。这次，你应该会看到类似于图 9-6 的结果。


    这是怎么回事？第一次可能没有看到关于允许文件类型的消息，原因是隐藏字段中 `MAX_FILE_SIZE` 的值在浏览器中重新加载表单之前不会被刷新。第二次出现错误消息是因为更新后的
    `MAX_FILE_SIZE` 阻止了文件上传。结果，`$_FILES` 数组的 `type` 元素为空。你需要调整 `checkFile()` 方法来解决这个问题。


    1. 在 `Upload.php` 中，修改 `checkFile()` 定义如下：


    ```

    protected function checkFile($file) {

    $accept = $this->getErrorLevel($file);

    $accept = $this->checkSize($file);

    if (!empty($file[''type'']) {

    $accept = $this->checkType($file);

    }

    return $accept;

    }

    ```


    如果文件大于表单隐藏字段中 `MAX_FILE_SIZE` 指定的限制，则不会上传任何内容，因此 `$_FILES` 数组的 `type` 元素为空。高亮显示的代码添加了一个新条件，仅当
    `$file[''type'']` 不为空时才调用 `checkType()` 方法。


    2. 保存类定义并再次测试 `file_upload.php`。这次你应该只会看到文件太大的消息。


    正如经常发生的那样，解决一个问题会引出另一个问题。用一个不在允许 MIME 类型数组中的大文件再次测试。该类不再警告文件类型错误。虽然我们可以检查文件扩展名，但无法保证扩展名与
    MIME 类型匹配，因此我们只能接受类型未被检查的事实。


    3. 将 `file_upload.php` 顶部的 `$max` 值重置为 `51200`。现在你应该能够上传最大 50 KB 大小的图像。如果第一次失败，那是因为
    `MAX_FILE_SIZE` 在表单中尚未刷新。


    4. 使用第三个参数测试 `upload()` 方法，指定不同的 MIME 类型，例如 PDF 文件，如下所示：


    ```

    $loader = new Upload($destination);

    $loader->upload(''image'', $max, [''application/pdf'']);

    $result = $loader->getMessages();

    ```


    目前，Upload 类一次只能处理单个文件，因此将新的 MIME 类型指定为数组可能看起来没有必要。然而，到本章结束时，该类将能够处理多个文件上传。


    5. 尝试上传一个 PDF 文件。只要它小于 50 KB，就应该能被上传。如有必要，将 `$max` 的值更改为一个适当大的数字。


    **提示**

    使用计算来设置 `$max` 的值。例如，`$max = 600 * 1024; // 600 KB`。


    你可以对照 `ch09/PhpSolutions/File` 文件夹中的 `Upload_03.php` 来检查你的类定义。`ch09` 文件夹中的 `file_upload_06.php`
    提供了一个更新版本的上传表单。


    到现在，我希望你已经理解了从专用于完成单一任务的函数（方法）构建 PHP 类的思路。修复关于图像不是允许类型的错误消息之所以变得更容易，是因为该消息只能来自
    `checkType()` 方法。方法定义中使用的大部分代码都依赖于 PHP 内置函数。一旦你学会哪些函数最适合当前任务，构建一个类——或任何其他 PHP
    脚本——就会变得容易得多。


    **PHP 解决方案 9-5：重命名重复文件**


    默认情况下，如果上传的文件与上传文件夹中已有的文件名相同，PHP 会覆盖现有文件。此 PHP 解决方案通过添加选项，在文件名冲突时，在文件扩展名前插入一个数字来改进
    Upload 类。它还会将文件名中的空格替换为下划线，因为空格有时会导致问题。


    继续使用之前 PHP 解决方案中的 `Upload.php` 进行操作。或者，使用 `ch09/PhpSolutions/File` 文件夹中的 `Upload_03.php`。


    1. 在 `Upload.php` 类定义顶部已有的属性中添加一个新的受保护属性：


    ```

    protected $newName;

    ```


    这将用于在文件名被更改时存储文件的新名称。


    2. 在 `upload()` 方法签名中添加第四个可选参数，以控制重复文件是否被覆盖，如下所示：


    ```

    public function upload($fieldname, $size = null, array $mime = null,

    $renameDuplicates = true) {

    ```


    这将重命名重复文件设置为默认行为。


    3. 我们需要在文件名通过 `checkFile()` 方法运行的其他测试之后检查它。将以下高亮显示的行添加到 `upload()` 方法中：


    ```

    public function upload($fieldname, $size = null, array $mime = null,

    $renameDuplicates = true) {

    $uploaded = $_FILES[$fieldname];

    if (!is_null($size) && $size > 0) {

    $this->max = (int) $size;

    }

    if (!is_null($mime)) {

    $this->permitted = array_merge($this->permitted, $mime);

    }

    if ($this->checkFile($uploaded)) {

    $this->checkName($uploaded, $renameDuplicates);

    $this->moveFile($uploaded);

    }

    }

    ```

