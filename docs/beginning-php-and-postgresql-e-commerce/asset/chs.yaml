  \n**实现数据层**\n\n我们需要向 `hatshop` 数据库添加一个新的数据层函数 `orders_get_audit_trail`，并更新一个现有函数\
  \ `orders_update_order`，以考虑新的状态代码。\n\n使用 `pgAdmin III`，连接到 `hatshop` 数据库，并使用查询工具执行以下代码，该代码将在您的\
  \ `hatshop` 数据库中创建 `orders_update_order` 函数：\n\n```\n-- Update orders_update_order\
  \ function\n\nCREATE OR REPLACE FUNCTION orders_update_order(INTEGER, INTEGER, VARCHAR(255),\
  \ VARCHAR(50), VARCHAR(50))\n\nRETURNS VOID LANGUAGE plpgsql AS $$\n\nDECLARE\n\n\
  inOrderId ALIAS FOR $1;\n\ninStatus ALIAS FOR $2;\n\ninComments ALIAS FOR $3;\n\n\
  inAuthCode ALIAS FOR $4;\n\ninReference ALIAS FOR $5;\n\ncurrentDateShipped TIMESTAMP;\n\
  \nBEGIN\n\nSELECT INTO currentDateShipped\n\nshipped_on\n\nFROM orders\n\nWHERE\
  \ order_id = inOrderId;\n\nUPDATE orders\n\nSET status = inStatus, comments = inComments,\n\
  \nauth_code = inAuthCode, reference = inReference\n\nWHERE order_id = inOrderId;\n\
  \nIF inStatus < 7 AND currentDateShipped IS NOT NULL THEN\n\nUPDATE orders SET shipped_on\
  \ = NULL WHERE order_id = inOrderId; ELSEIF inStatus > 6 AND currentDateShipped\
  \ IS NULL THEN\n\nUPDATE orders SET shipped_on = NOW() WHERE order_id = inOrderId;\
  \ END IF;\n\nEND;\n\n$$;\n```\n\n然后，使用查询工具执行以下代码，该代码将在您的 `hatshop` 数据库中创建 `orders_get_audit_trail`\
  \ 函数：\n\n```\n-- Create orders_get_audit_trail function\n\nCREATE FUNCTION orders_get_audit_trail(INTEGER)\n\
  \nRETURNS SETOF audit LANGUAGE plpgsql AS $$\n\nDECLARE\n\ninOrderId ALIAS FOR $1;\n\
  \noutAuditRow audit;\n\nBEGIN\n\nFOR outAuditRow IN\n\nSELECT audit_id, order_id,\
  \ created_on, message, message_number FROM audit\n\nWHERE order_id = inOrderId\n\
  \nLOOP\n\nRETURN NEXT outAuditRow;\n\nEND LOOP;\n\nEND;\n\n$$;\n```\n\n**实现业务层**\n\
  \n您还必须向 `business/orders.php` 中的 `Orders` 类添加一个新方法，以配合上一节中添加的新数据层函数。\n\n将 `GetAuditTrail`\
  \ 方法添加到 `business/orders.php` 的 `Orders` 类中，如下所示：\n\n```\n// Gets the audit table\
  \ entries associated with a specific order public static function GetAuditTrail($orderId)\n\
  {\n    // Build the SQL query\n    $sql = 'SELECT * FROM orders_get_audit_trail(:order_id);';\n\
  \n    // Build the parameters array\n    $params = array (':order_id' => $orderId);\n\
  \n    // Prepare the statement with PDO-specific functionality $result = DatabaseHandler::Prepare($sql);\n\
  \n    // Execute the query and return the results\n    return DatabaseHandler::GetAll($result,\
  \ $params);\n}\n```\n\n**实现表示层**\n\n您需要更新 `admin_order_details` 组合模板，该模板用于显示订单详情。在本书前面，此组合模板还包括测试订单流程的功能，但我们在此将其移除。取而代之的是，您将提供当订单卡在“等待库存确认”和“等待发货确认”阶段时，推动订单沿管线前进的能力。\n\
  \n现在，您还可以在另一个新表格中显示订单的所有审计信息。\n\n让我们看看您将要实现的目标，如图 14-7 所示。\n\n您可以将订单管理页面分为三个部分：\n\
