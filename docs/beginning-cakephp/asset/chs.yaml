  \ 5-7）。\n\n图 5-7. *Index 操作视图中的每条文章列表都包含更友好的日期字段。*\n\n### 考虑国际化\n\n您可能已经注意到，烘焙生成的视图中的一些文本字符串被包裹在\
  \ PHP 函数 `__()` 中。简单来说，这个函数是 Cake 为国际化网站轻松动态修改视图而提供的方法。Cake 可以将此函数包裹的内容本地化为用户的语言，但需要在应用程序的控制器和配置文件中进行其他设置。如果您的应用程序不需要国际化或本地化，则可以避免使用\
  \ `__()` 函数。\n\n### 使用命令加速烘焙\n\n一些基本命令可以使烘焙 Cake 资源更加便捷。只需在控制台中输入 `cake bake` 命令后跟上您需要烘焙的资源即可。示例如下：\n\
  \n```\n$ cake bake controller\n$ cake bake model\n$ cake bake view\n$ cake bake\
  \ project\n```\n\n如果您想跳过交互模式直接生成文件，还可以输入资源的名称：\n\n```\n$ cake bake controller tags\n\
  $ cake bake model comment\n```\n\n如果您的 Cake 控制台安装要求您指定 `-app` 参数以便 Bake 访问您的工作应用文件夹，请务必包含它：\n\
  \n```\n$ cake bake controller tags -app /serverroot/blog/app/\n```\n\n### 自定义视图\n\
  \nBake 脚本缩短了启动时间，让您可以快速获得脚手架视图。通过调整烘焙后的视图文件，您可以在其中添加自定义的元素和表单。本章中，您仅修改了 Index 操作视图，并学习了如何操作\
  \ Bake 脚本。第 6 章将详细讨论烘焙后的控制器和视图中的每一行代码，以及如何创建更高级的网页。您将分析其他的 CRUD 操作以及 Cake 如何与用户表单提交交互。Cake\
  \ 自带的 Form 和 HTML 辅助函数将使您能够更有效地管理表单字段和提交，所需代码比典型的 PHP 应用程序更少。\n\n在继续之前，请按照本章的“烘焙更多资源”练习，使用其他表来练习\
  \ Bake。\n\n### 烘焙更多资源\n\n在本章中，您烘焙了 Posts 控制器和一些脚手架视图。通过为 tags 和 comments 表生成控制器、模型和视图来掌握\
  \ Bake。请务必尝试其他 Bake 命令以提高开发速度，并探索数据库配置和项目功能。\n\n### 总结\n\nCake 中的布局是包裹应用程序的文件。当您创建默认布局文件时，您就拦截了\
  \ Cake 用于脚手架、错误页面和其他视图的默认布局。各个视图文件将在布局中 `$content_for_layout` 变量被回显的位置渲染，从而使您能够为多个视图创建共同的界面。\n\
  \n让应用程序快速启动的最快方法之一是使用 Cake 的脚手架和 Bake 功能。通过设置控制台与 Bake 配合使用，您可以使用简单的 shell 命令（有时仅需一行文本）生成自定义的操作和视图。正确使用\
  \ Bake 可以提供基本代码，让您能够通过 Web 界面创建、编辑、列出和查看数据库记录，从而加速开发。第 6 章将更深入地研究烘焙元素内部的工作原理，并解释如何在\
  \ Cake 中自定义视图。\n\n## 第 6 章：自定义视图\n```\n\n\n### 使用 Bake 生成视图和控制器操作可以快速启动应用程序开发。然而，最终你需要更定制化的代码来完善应用程序的功能集。为了让应用程序提供丰富的功能，用户不可避免地会以点击链接和\
  \ HTML 元素、提交表单数据或执行其他交互的形式进行一定程度的操作。当用户与应用程序交互时，他们会发出请求，这些请求会依次经过控制器和视图进行处理。本章将深入探讨这些请求序列，并介绍\
  \ Cake 中那些让你能更精细地控制用户体验的特性。\n\n### 处理用户交互\n\n一般来说，用户与 Cake 应用程序交互会产生三种类型的请求序列：\n\
  \n* 简单的页面请求序列\n* 表单提交序列\n* 异步（Ajax）请求序列\n\n视图及其与控制器和模型的交互方式会根据程序的具体流程而变化。当你需要在 Bake\
  \ 或脚手架生成的视图之外进行自定义时，必须牢记你正在构建的流程类型。\n\n### 一个简单的页面请求\n\n打开 `app/controllers/posts_controller.php`\
  \ 文件，滚动到 View 操作。代码应该类似于清单 6-1。\n\n**清单 6-1.** *Posts 控制器中的 View 操作*\n\n```\nfunction\
  \ view($id = null) {\n    if (!$id) {\n        $this->Session->setFlash(__('无效的文章。',\
  \ true));\n        $this->redirect(array('action'=>'index'));\n    }\n    $this->set('post',\
  \ $this->Post->read(null, $id));\n}\n```\n\n通常情况下——即便不是总是如此——请求流程会先分发到控制器。在这里，View\
  \ 操作由控制器处理，当流程终止时，会调用相应的视图文件。该操作的第一步是接收用户提供的任何参数。由于这是一个简单的页面请求序列，用户仅需提供一个或两个与数据库中某条记录匹配的变量——没有表单数据，没有复杂的逻辑测试，最多只包含几个参数。清单\
  \ 6-1 中的第 1 行通过函数变量 `$id` 接收用户提供的参数。此变量默认值为 `null`，但根据应用程序的需求，它完全可以改为一个数组或设定一个默认值。\n\
  \n在此操作中，会执行一个简单的逻辑测试：如果用户没有提供要从数据库中提取的文章的唯一 ID，则返回错误；否则，读取匹配的记录并将其内容作为变量传递给视图。这个测试在第\
  \ 2 到第 6 行执行。\n\n如果用户没有将 ID 值作为参数提供，则执行第 3 行。该行使用了 Cake 的 Session 组件，这是一个包含多个用于管理和处理会话的函数的组件类。Session\
  \ 组件不是显示一个呈现错误消息的 Flash 页面，而是向视图发送一段文本字符串，该字符串将在布局（layout）或单独的视图文件中显示。在这种情况下，该操作使用了\
  \ Session 组件的 `setFlash()` 函数。要发送的错误字符串设置为“无效的文章”。在 `app/views/layouts/default.ctp`\
  \ 文件中，你必须包含 `Session->setFlash()` 函数的另一端，它将接收该错误字符串并显示它。\n\n打开默认布局，在 `<body>` 元素内的某处插入清单\
  \ 6-2 中的代码行。\n\n**清单 6-2.** *显示 Session Flash 消息*\n\n```\n<? $session->flash();?>\n\
  ```\n\n现在，当识别到错误时，清单 6-1 中的第 4 行会将用户重定向到 Posts 控制器中的 Index 操作。因为你在默认布局中包含了 Session\
  \ 组件，第 3 行中指定的错误消息将会在页面中显示出来。\n\n清单 6-1 中的第 6 行使用 `set()` 函数将数据库中的信息传递给视图。该行还包含了一个模型函数\
  \ `read()`，它会查找与用户提供的 ID 相对应的记录并提取其数据。通过将这个模型函数赋值给 `set()` 函数中的视图变量 `post`，记录中的所有内容都可以在视图中使用。\n\
  \n简单的页面请求通常就像这个 View 操作一样工作。第一步是从用户的链接或 URL 中获取参数，并使其在操作中可用。第二步是检查提供的参数，如果参数为空，则提供错误消息。第三步是获取与请求相对应的数据项，并将它们传递给视图。现在，对于简单的页面请求，控制器的逻辑已经正常工作，你可以开始自定义视图了。\n\
  \n这个请求序列包含的内容远比我之前解释的代码要多得多。例如，该操作可以对参数执行更复杂的检查，或同时处理多个参数，运行多个数据库查询，然后将结果转发给视图。在某些情况下，你可能希望该操作不与视图交互，而是将数据转发给另一个操作。在这些情况下，Cake\
  \ 的行为就像一个典型的 PHP 脚本，只是在为用户生成显示内容时有所不同。使用 Cake 的函数和组件（就像 Bake 使用 Session 组件那样）来代替你自己编写的函数或代码，但通常控制器会像一个通用的\
  \ PHP 脚本一样运行。\n\n### 表单提交序列\n\n处理用户表单数据比简单的页面请求序列更进了一步。在这种场景下，将按顺序发生以下几件事：\n\n1.\
  \ 控制器操作被调用，并判断用户是否提交了任何表单数据。\n2. 如果没有表单数据，控制器则指示视图显示表单。如果是在编辑现有记录，控制器可能会执行数据库查找，以便在后续视图中预填充字段。\n\
  3. 用户填写表单并将其提交给控制器。\n4. 这一次，控制器在请求中找到了表单数据并处理这些数据。根据操作结果的不同，会渲染另一个视图，通常是一个反馈页面，提示用户提交成功或失败。\n\
  \n要理解 Cake 流程的内部机制，请打开 `app/controllers/posts_controller.php`，滚动到 Add 操作。代码应该类似于清单\
  \ 6-3。\n\n**清单 6-3.** *Posts 控制器中的 Add 操作*\n\n```\nfunction add() {\n    if (!empty($this->data))\
  \ {\n        $this->Post->create();\n        if ($this->Post->save($this->data))\
  \ {\n            $this->Session->setFlash(__('文章已保存', true));\n            $this->redirect(array('action'=>'index'));\n\
  \        } else {\n            $this->Session->setFlash(__('文章无法保存，请重试。', true));\n\
  \        }\n    }\n    $tags = $this->Post->Tag->find('list');\n    $users = $this->Post->User->find('list');\n\
  \    $this->set(compact('tags', 'users'));\n}\n```\n\nAdd 操作的行为与上述概要一致：在清单 6-3 的第\
  \ 2 行，它通过一个简单的逻辑测试检查是否有用户表单数据，如果有，则将数据保存到数据库；否则，向用户返回错误并渲染 Add 视图。\n\n#### `$this->data`\n\
  \nCake 会为你处理表单数据，并遵循约定。提交给控制器的所有表单字段都会自动格式化为一个数组，其命名约定决定了数据在数组中的存储位置。表单将始终按照 MVC\
  \ 结构进行解析和组织。例如，观察清单 6-4。\n\n**清单 6-4.** *一个简单的表单*\n\n```\n<?=$form->create('Posts');?>\n\
  <?=$form->input('name');?>\n<?=$form->input('content',array('type'=>'textarea','rows'=>4,'cols'=>40));?>\n\
  <?=$form->end('提交');?>\n```\n\n\n\n虽然尚未讨论，但清单 6-4 使用了`Form`辅助器，后续将更广泛地使用它。简而言之，`Form`辅助器会在视图中运行函数，决定如何显示一段\
  \ HTML 代码。`Form`辅助器中的`input()`函数非常有用，因为它接受提供的名称（对应数据库中的字段）并渲染一个 HTML `<input type=\"\
  text\"/>`元素，该元素包含所有适当的名称和值，以便 Cake 自动解析数据。如果你查看浏览器的页面源代码，此视图将输出以下内容：\n\n```html\n\
  <form method=\"post\" action=\"/blog/posts/add\">\n<input type=\"text\" name=\"\
  data[Post][name]\" id=\"PostName\"/>\n<textarea name=\"data[Post]\" cols=\"40\"\
  \ rows=\"4\" id=\"PostContent\"></textarea>\n<input type=\"submit\" value=\"Submit\"\
  />\n</form>\n```\n\n当用户填写表单并提交时，Cake 将表单数据放入`$this->data`数组中，如下所示：\n\n```\nArray\
  \ (\n    [Post] => Array (\n        [name] => Title Entered in the Name Field\n\
  \         => All the content provided in the <textarea> field.\n    )\n)\n```\n\n\
  当处理关联模型时，`$this->data`还可能包含这些字段。对于`Post`模型，您已经为博客构建了文章和标签之间的关联。如果操作正确，表单将把关联字段一并传递给`$this->data`，结果如下：\n\
  \n```\nArray (\n    [Post] => Array (\n        [name] => Title Entered in the Name\
  \ Field\n         => All the content provided in the <textarea> field.\n    )\n\
  \    [Tag] => Array (\n        [Tag] => Array (\n            [0] => 1\n        \
  \    [1] => 56\n        )\n    )\n)\n```\n\n在`$this->data['Tag']['Tag']`数组中，每个选中项的\
  \ ID 作为数组中的独立元素存在，因为`Tag`模型与`Post`模型是“拥有并属于多个”（hasAndBelongsToMany）的关系。\n\n用户表单提交可能会迅速变得更加复杂。同样在文章的添加操作中，还有一个日期时间字段。处理日期和时间可能会相当繁琐；区分月份、天数、分钟和小时可能是一场噩梦，因为每个单位都有其特定的数值范围（例如，一个月可能有\
  \ 30 天，另一个月有 31 天，而二月每四年在 28 天和 29 天之间变化）。\n\n与`Form`辅助器结合使用时，`$this->data`可以大幅减少处理日期和时间的代码。如果在视图中正确使用`Form`辅助器，Cake\
  \ 会解析包含日期和时间的表单，并将其放入`$this->data`数组中，如下所示：\n\n```\nArray (\n    [Post] => Array\
  \ (\n        [date] => Array (\n            [month] => 07\n            [day] =>\
  \ 04\n            [year] => 2008\n            [hour] => 12\n            [min] =>\
  \ 00\n            [meridian] => pm\n        )\n    )\n)\n```\n\n无论是在视图中还是控制器中，都可以像操作任何\
  \ PHP 数组一样，从`$this->data`中提取用户提交的数据。例如，通过检查`$this->data['Post']['date']['year']`的值可以轻松获取年份。或者，通过调用`$this->data['Post']['date']['meridian']`的值来获取上午/下午标识。考虑到在视图中，所有必要的日期和时间字段只需一行代码即可提供，Cake\
  \ 中的日期和时间处理就更加吸引人了：\n\n```php\n<?=$form->input('date');?>\n```\n\n回到清单 6-3 的第 2\
  \ 行，添加操作通过检查`$this->data`数组来判断用户是否提交了表单：如果数组为空，则用户未提交任何内容；如果不为空，则表示表单已提交，操作必须处理这些数据。\n\
  \n清单 6-3 的第 3-6 行在`$this->data`测试通过后，将数据保存到数据库。其余的操作行为类似简单的页面请求。如果未提供数据，操作会从`Tag`和`User`模型中提取一些关联数据，并将其传递给视图。\n\
  \n### 保存表单\n\n当`$this->data`按照 Cake 的约定（主要通过视图中实现`Form`辅助器来管理）进行格式化时，保存数据非常简单。Cake\
  \ 通过使用模型的`create()`和`save()`函数来执行保存操作。\n\n\n\n# 第 6 章 自定义视图\n\n**注意** *模型函数*（无论是在模型类中编写的函数，还是存储在模型文件中的自定义函数）与其他函数（例如控制器动作）之间的区别在于，它们始终通过模型执行。这意味着，要启动一个模型函数，必须始终通过模型类来执行。在本例中，`Post`模型保存数据，因此模型函数的名称为`$this->Post->save()`，而不仅仅是`$this->save()`。其他模型函数（如`read()`和`find()`）也将始终通过指定的模型以类似方式运行。因此，语法为`$this`后跟模型，后跟函数，函数的参数放在括号中。\n\
  \n`create()`函数在表中插入一条新记录。由于此模型函数来自指定的模型，它将插入到该模型中。在清单 6-3 的第 3 行，`create()`函数是从`Post`模型调用的，因此新行将插入到`posts`表中。在`create()`函数之后立即运行`save()`函数将把传递给保存的任何内容传播到新行中。清单\
  \ 6-3 中的第 4 行发送了预先格式化的`$this->data`数组。`save()`函数已经构建为可以解析并保存该数组，因此无需其他数据处理。\n\n\
  简而言之，添加新记录的第一步是使用`create()`模型函数创建新行，第二步是通过`save()`模型函数传递`$this->data`来保存它。烘焙的`Add`动作不仅通过检查过程中的错误来保存数据。您可以通过在`beforeSave()`模型动作中输入逻辑来拦截`save`函数。如果此动作返回`false`，则在控制器中（例如清单\
  \ 6-3 中的第 4 行），`save()`模型函数也会返回`false`。然后，控制器可以使用`Session`组件显示错误消息，或执行其他操作来响应模型中失败的保存。\n\
  \n通过设置模型 ID 变量来保存特定 ID 的表单数据，如下例所示：\n\n```\n$this->Post->id = $id;\n$this->Post->save($this->data);\n\
  ```\n\n这通常仅在更新记录时需要。创建新记录时，请使用`create()`模型函数。\n\n### 为编辑或更新填充表单字段\n\n表单提交序列还可能包括编辑数据库中的记录或之前保存的数据。在这种情况下，控制器需要比`Add`动作包含更多的操作。打开`app/controllers/posts_controller.php`文件并滚动到`Edit`动作。它应包含类似于清单\
  \ 6-5 的代码。\n\n**清单 6-5.** Posts 控制器中的 Edit 动作\n\n```php\nfunction edit($id = null)\
  \ {\n    if (!$id && empty($this->data)) {\n        $this->Session->setFlash(__('无效的文章\
  \ ID', true));\n        $this->redirect(array('action'=>'index'));\n    }\n    if\
  \ (!empty($this->data)) {\n        if ($this->Post->save($this->data)) {\n     \
  \       $this->Session->setFlash(__('文章已保存', true));\n            $this->redirect(array('action'=>'index'));\n\
  \        } else {\n            $this->Session->setFlash(__('文章无法保存，请重试。', true));\n\
  \        }\n    }\n    if (empty($this->data)) {\n        $this->data = $this->Post->read(null,\
  \ $id);\n    }\n    $tags = $this->Post->Tag->find('list');\n    $users = $this->Post->User->find('list');\n\
  \    $this->set(compact('tags','users'));\n}\n```\n\n这个动作大致是`Add`和`View`动作的组合。编辑既需要一个简单的页面请求（要编辑的记录或数据源），也需要一个表单提交过程，这些都包含在烘焙的`Edit`动作中。该动作执行三个逻辑测试。\n\
  \n第一，用户是否只提供了一个记录 ID？第二，用户是否提供了任何表单数据？第三，用户是否既未提供表单提交也未提供记录 ID？这些测试可以在三段代码中找到，分别是第\
  \ 2-5 行、第 6-13 行和第 14-16 行。\n\n注意，在第 15 行，`$this->data`等于`read()`模型动作的结果。换句话说，`read()`函数的结果遵循与控制器中表单提交相同的格式化规则。无论方向如何——是从数据库读取记录并在视图中提供，还是将表单数据从视图发送到控制器——Cake\
  \ 都会以相同的方式格式化数组。\n\n### 异步序列\n\n当用户通过网页发出请求，而服务器无需退出或刷新当前页面即可响应时，就会发生异步过程。换句话说，从用户的角度来看，请求由服务器在后台处理，不会干扰当前显示。通常，服务器只会更新特定的\
  \ HTML 元素，而不是整个网页。近年来，随着企业级网站更好地利用 JavaScript 和 XML，异步 HTTP 请求变得越来越流行。大多数开发人员将任何异步服务器响应称为*Ajax*操作，尽管\
  \ Ajax 最初是“异步 JavaScript 和 XML”的缩写。\n\n最近，出现了几个开源 Ajax 框架，使异步操作更易于管理。Cake 附带了一个`Ajax`助手，旨在促进异步用户序列。使用此类工具，无需重新加载整个网页即可与服务器交互，从未如此简单。简单的页面请求和表单提交序列可以在\
  \ Cake 中异步工作，但必须使用 JavaScript 方法来实现正确的 HTTP 响应。\n\n要使 Ajax 正常工作，必须通过 JavaScript\
  \ 操纵浏览器的默认行为。例如，当单击链接或表单按钮时，浏览器会自动同步发送 HTTP 请求，并等待服务器返回新的网页。此行为被 JavaScript 抑制；此示例中的表单按钮使用\
  \ JavaScript 发送 HTTP 请求，而无需浏览器刷新或等待新页面。JavaScript 还负责接收服务器的响应，并确定在何处显示用户请求的结果。由于\
  \ Ajax 依赖于 JavaScript，因此 Cake 中的异步序列始于视图文件。\n\n在视图中，发送或接收 Ajax 请求的任何 HTML 元素都必须包含正确的\
  \ JavaScript 代码。如果使用 Ajax 框架，布局通常会包含指向该框架库的链接。例如，Ajax 链接可能使用`onClick` HTML 属性，并包含遵循该框架方法的\
  \ JavaScript 代码，而不是使用同步的`href`属性。无论 Ajax 框架如何准备和处理异步过程，其使用的 URL 通常都会遵循 Cake 使用的模式。在视图文件中，Ajax\
  \ 表单或链接因此将指向控制器，就像同步表单和链接一样。\n\n然而，控制器确实需要执行略微不同的操作才能使 Ajax 在 Cake 中工作。假设所有 JavaScript\
  \ 都已就位，可以向 Cake 控制器发送异步请求。从这个意义上说，控制器的行为将与以典型方式发出请求时相同。但默认情况下，Cake 会根据正在运行的动作渲染相应的视图文件。`render()`函数可以拦截默认的视图渲染，并告诉\
  \ Cake 它必须异步运行。\n\n只需将`render()`函数放在动作中，通常在此处允许控制器终止并输出视图。确保在函数中包含`ajax`参数，以便 Cake\
  \ 知道异步渲染视图：\n\n```\n$this->render('add','ajax');\n```\n\n\n\n稍后，我们将介绍更高级的 Ajax 方法，这些方法需要在视图中进行大量编辑。目前，只需了解异步序列是\
  \ Cake 中的一个可选方案，并且其处理方式与其他两种响应几乎相同。\n\n### 编写单个视图文件\n\n有了控制器逻辑后，接下来，各个视图文件必须正确处理用户交互序列。打开\
  \ `app/views/posts/view.ctp` 文件。滚动到第 1–30 行；它们应该看起来像清单 6-6 中的代码。\n\n**清单 6-6.**\
  \ *视图操作视图文件，第 1–30 行*\n\n```php\n<div class=\"posts view\">\n<h2><?php __('Post');?></h2>\n\
  <dl><?php $i = 0; $class = ' class=\"altrow\"';?>\n<dt<?php if ($i % 2 == 0) echo\
  \ $class;?>><?php __('Id'); ?></dt>\n<dd<?php if ($i++ % 2 == 0) echo $class;?>>\n\
  <?php echo $post['Post']['id']; ?>\n&nbsp;\n</dd>\n<dt<?php if ($i % 2 == 0) echo\
  \ $class;?>><?php __('Name'); ?></dt>\n<dd<?php if ($i++ % 2 == 0) echo $class;?>>\n\
  <?php echo $post['Post']['name']; ?>\n&nbsp;\n</dd>\n<dt<?php if ($i % 2 == 0) echo\
  \ $class;?>><?php __('Date'); ?></dt>\n<dd<?php if ($i++ % 2 == 0) echo $class;?>>\n\
  <?php echo $post['Post']['date']; ?>\n&nbsp;\n</dd>\n<dt<?php if ($i % 2 == 0) echo\
  \ $class;?>><?php __('Content'); ?></dt>\n<dd<?php if ($i++ % 2 == 0) echo $class;?>>\n\
  <?php echo $post['Post']['content']; ?>\n&nbsp;\n</dd>\n<dt<?php if ($i % 2 == 0)\
  \ echo $class;?>><?php __('User'); ?></dt>\n<dd<?php if ($i++ % 2 == 0) echo $class;?>>\n\
  <?php echo $html->link($post['User']['name'],\narray('controller'=>'users', 'action'=>'view',\
  \ $post['User']['id'])); ?>\n&nbsp;\n</dd>\n</dl>\n</div>\n```\n\n简而言之，视图操作是一个简单的页面请求。用户请求显示特定记录，而此视图文件正是为了以有组织的方式完成此任务。这些行中渲染的大部分是\
  \ HTML。第 1 行创建一个新的 `<div>` 元素，第 30 行将其关闭。然而，这里有一些重要的 Cake 操作在起作用，它们与控制器提供的数据相对应。回顾清单\
  \ 6-1 的第 6 行，视图操作执行了一个 `read()` 模型函数，并使用 `set()` 函数将结果赋值给一个名为 `post` 的变量。该变量现在在视图文件中以\
  \ `$post` 的形式可用，并且可以根据你的需要在整个视图中显示。\n\nBake 为你提供了一系列环绕着 `$post` 变量实例的 HTML 标签，这些标签用于清晰地显示返回记录的内容。请注意，`$post`\
  \ 的格式类似于 `$this->data`。它包含一个以模型名为键的数组，每个键对应一个包含其各自表中字段的嵌套数组。注意第 26 行如何显示关联模型的数据。在本例中，帖子与用户相关联，当控制器执行\
  \ `read()` 函数时，它注意到了这种关联，并同时提供了相关的记录。所有这些数据都可在 `$post` 数组中找到。\n\n#### 使用调试函数\n\n\
  你经常需要查看这些数据数组的内容。Cake 的 `debug()` 函数提供了一个详细且格式清晰的指定数组视图。在此视图文件中，插入以下使用 `debug()`\
  \ 函数的行：\n\n```php\n<? debug($post);?>\n```\n\n当你刷新视图操作时，你应该会看到一个亮黄色的框，其中打印出了 `$post`\
  \ 变量的内容（参见图 6-1）。\n\n**图 6-1.** *`debug()` 函数显示 `$post` 变量的内容*\n\n每个模型在数组中以其名称作为键，并附加了相关的记录。Cake\
  \ 不仅提供了用户请求的帖子记录内容，还提供了来自关联模型的记录。假设你想通过帖子标题来显示分配给此博客帖子的用户名。你可以通过对正确的数组、键和值执行 `echo()`\
  \ 函数来实现：\n\n```php\n<h2><?=$post['User']['firstname'].' '.$post['User']['lastname'];?></h2>\n\
  ```\n\n`debug()` 函数能帮助你在开发过程中弄清楚视图中到底在传递什么。它可以用于任何数组。当然，也可以使用其他数组显示函数，例如 PHP 原生的\
  \ `print_r()` 函数或 Cake 的便捷函数 `pr()`。\n\n#### 从头开始自定义视图文件\n\nBake 为这个简单的页面请求提供了一个极好的起点。让我们从头开始简化视图，使其对网站访问者更具可读性。在你的博客应用程序中，这个视图将像其他博客或新闻网站一样，是一个简单的故事展示。你不需要显示诸如\
  \ ID 或作者 ID 之类的字段，尽管这些字段可能对构建指向其他操作或控制器的链接有用。\n\n编辑 `app/views/posts/view.ctp` 文件，删除\
  \ Bake 生成的代码，并插入清单 6-7 中的代码。\n\n**清单 6-7.** *简化后的视图*\n\n```php\n<h1><?=$post['Post']['name'];?></h1>\n\
  <p>作者: <?=$post['User']['firstname'];?> <?=$post['User']['lastname'];?></p>\n<p>发布日期:\
  \ <?=$post['Post']['date'];?></p>\n<hr/>\n<p><?=$post['Post']['content'];?></p>\n\
  ```\n\n清单 6-7 的代码非常简单，但从小处着手有助于你在后续开发中包含其他有用的功能。第 1 行将帖子标题显示为 `<h1>` 元素。第 2–3 行在单独的\
  \ `<p>` 标签中显示关联用户的姓名以及帖子日期。最后，第 5 行显示帖子的文本内容。`$post` 变量仍然包含你可以使用的其他数组数据，但视图中只调用了几个字段。\n\
  \n#### HTML 助手\n\n假设你希望帖子标题本身就是一个链接，以保持整个应用程序的一致性。在这种情况下，可以使用内置的 HTML 助手来为你生成适当的链接。将视图文件中的第\
  \ 1 行改为清单 6-8 中的内容。\n\n**清单 6-8.** *HTML 助手及其 `link()` 函数*\n\n```php\n<?=$html->link('<h1>'.$post['Post']['name'].'</h1>','/posts/view/'.$post['Post']['id'],null,null,false);?>\n\
  ```\n\n`link()` 函数中的每个参数都像其他 PHP 函数参数一样用逗号分隔。当需要时，你可以通过数组将自定义变量和设置传递给助手函数，它会返回一些\
  \ HTML 用于显示。你不需要使用每个参数，因此在这些情况下可以传入一个 `null` 值。在清单 6-8 中，你首先通过调用 `$html` 对象来调用 HTML\
  \ 助手中的 `link()` 函数。对于这个特定的助手，它的大多数函数都需要你执行一个 `echo()` 函数，这里你使用了简写操作符 `<?=` 而不是完整拼写出该函数。函数中的最后一个参数对应于\
  \ `link()` 函数的转义特性。在这种情况下，你将其设置为 `false`，以便该函数忽略将大于号和小于号转义为 HTML 实体。\n\nHTML 助手的\
  \ `link()` 函数的第一个参数是要显示的文本。第二个参数是 URL（遵循应用程序的路由），它将被放入链接中。请注意，你使用了 `$post` 变量来提供标题和当前\
  \ ID，以使此链接可操作并与用户的请求相对应。\n\n\n\n### 自定义视图\n\n对于简单的页面请求，除了显示所传递数组的内容之外，通常不需要更多操作。然而，表单提交流程则需要更详细的处理。如前所述，Cake\
  \ 提供了辅助此工作的助手函数。\n\n### 自定义 HTML 表单\n\n列表 6-4 描述了一个基础的 Cake 表单，它使用 `Form` 助手来渲染表单元素。\n\
  \n如何自定义这些功能，需要你对 `Form` 助手的工作方式有一致的理解和认识。\n\n打开 `app/views/posts/add.ctp` 文件。其内容应与列表\
  \ 6-9 中的烘焙代码一致。\n\n**列表 6-9.** *Posts 添加视图文件的烘焙内容*\n\n```\n<div class=\"posts form\"\
  >\n<?php echo $form->create('Post');?>\n<fieldset>\n<legend><?php __('Add Post');?></legend>\n\
  <?php\necho $form->input('name');\necho $form->input('date');\necho $form->input('content');\n\
  echo $form->input('user_id');\necho $form->input('Tag');\n?>\n</fieldset>\n<?php\
  \ echo $form->end('Submit');?>\n</div>\n<div class=\"actions\">\n<ul>\n<li><?php\
  \ echo $html->link(__('List Posts', true), array('action'=>'index'));?></li>\n<li><?php\
  \ echo $html->link(__('List Users', true), array('controller'=> 'users', 'action'=>'index'));\
  \ ?></li>\n<li><?php echo $html->link(__('New User', true), array('controller'=>\
  \ 'users', 'action'=>'add')); ?></li>\n<li><?php echo $html->link(__('List Tags',\
  \ true), array('controller'=> 'tags', 'action'=>'index')); ?></li>\n<li><?php echo\
  \ $html->link(__('New Tag', true), array('controller'=>'tags', 'action'=>'add'));\
  \ ?></li>\n</ul>\n</div>\n```\n\n第 15–23 行包含了指向各种操作的链接，这些链接都使用了 `HTML` 助手的 `link()`\
  \ 函数。第 2–13 行包含了表单及其字段，这些字段使操作得以实现。当应用程序在视图和控制器之间来回通信时，`Form` 助手会拦截所有被传递的数据，并分析每一条数据以决定它在表单中应该如何显示。只要\
  \ `$this->data` 与 Cake 的默认构造保持一致，`Form` 助手就能保持同步。有时，应用程序的设计可能需要一些额外的设置才能使 `Form`\
  \ 助手正常工作，但大多数情况下，它与 `$this->data` 协作得非常好，并能为你省去很多麻烦。告别那个老旧的 PHP `$_POST` 数组吧！\n\n\
  就像我们对 `View` 视图所做的那样，让我们从头重新构建 `Add` 视图。用列表 6-10 中的内容替换 `app/views/posts/add.ctp`\
  \ 文件的内容。\n\n**列表 6-10.** *Add 操作的极简代码*\n\n```\n<div class=\"posts form\">\n<?=$form->create('Post');?>\n\
  <fieldset>\n<legend>Add Post</legend>\n<?\ne($form->input('name'));\ne($form->input('date'));\n\
  e($form->input('content'));\ne($form->input('User'));\ne($form->input('Tag'));\n\
  ?>\n</fieldset>\n<?=$form->end('Submit');?>\n</div>\n```\n\n这段代码与 Bake 提供的代码类似，但它使用了\
  \ `e()` 便捷函数（与 `echo()` 相同），并去掉了操作链接。请注意，每个字段都使用了 `input()` 函数，并且 `Form` 助手会自动识别每个字段中包含的数据类型。对于关联模型，提供了模型名称（例如\
  \ `User` 和 `Tag`），`Form` 助手会假定该字段是一个关联关系，并基于此关系进行构建。这样，你会自动获得一个用于用户的单选下拉菜单和一个用于标签的多选下拉菜单。\n\
  \n要自定义表单元素，必须使用 `Form` 助手函数中提供的选项。一个例子是向 `input()` 函数添加一些参数。目前，`Tag` 输入元素是一个多选下拉菜单，其中包含\
  \ `$this->data` 数组中的标签列表。如果将其更改为多个复选框，通常需要编写多行 HTML 标签来渲染每个单独的复选框。使用 `Form` 助手，你可以通过一行代码来自定义表单以处理多个复选框（见列表\
  \ 6-11）。\n\n**列表 6-11.** *Form 助手的 `input()` 函数渲染多个复选框而非多选下拉菜单*\n\n```\necho $form->input('Tag',array('type'=>'select','multiple'=>'checkbox'));\n\
  ```\n\n`input()` 函数的第一个参数是模型名或当前模型的字段名。第二个参数是一个数组，包含多个作为键的选项及其具体的设置值作为值。注意，你已告诉\
  \ `Form` 助手使用 `$this->data` 数组中 `Tag` 键所存放的数据来渲染一个输入元素，并且该元素必须是 select 类型，但其多选选项应使用复选框而非默认样式。刷新\
  \ `Add` 操作，你应该会看到表单简化了，并带有自定义的复选框。无论 HTML 元素的类型如何，Cake 都会以相同的方式格式化数据，并且由于控制器已设置为保存从视图接收到的数据，因此\
  \ `Add` 操作会继续正常工作。\n\n### 使用其他助手\n\nCake 预装了多个助手：\n\n- Ajax\n- Cache\n- Form\n-\
  \ HTML\n- JavaScript\n- Number\n- Paginator\n- RSS\n- Session\n- Text\n- Time\n\
  - XML\n\n每个助手都包含多个函数，用于简化数据处理和内容显示。每个助手都将遵循相同的基本语法——在视图中作为一个变量可用的对象，加上其函数及其在括号中提供的参数。互联网上也有第三方助手可用，其中许多来自\
  \ Cake 的官方 Bakery (http://bakery.cakephp.org)。要使助手可用，除了 `HTML` 和 `Form` 助手之外，你必须在控制器中指定正在使用该助手。这通过使用相应助手的类名填充助手设置数组来实现：`var\
  \ $helpers = array('Ajax','Session','Time');`\n\n通过将这行字符串放置在调用 `var $name` 和 `var\
  \ $scaffold` 属性的位置附近，Cake 能够启动一个助手类对象的新实例，并使其在视图中可用。使用更多助手会为你增添定制方案的更多可能性。你对 Cake\
  \ 的助手越熟悉，在自定义视图时拥有的选项就越多。\n\n### 可读的日期和时间\n\n尝试使用 `Time` 助手来练习在视图中使用助手。记得先在控制器中设置\
  \ `$helpers` 属性以包含 `Time` 助手。然后在 Posts 的 `View` 视图中，使用 `nice()` 函数使 `$post['Post']['date']`\
  \ 值更具可读性。提示：你需要将变量传递给该函数才能使其正常工作。\n\n### 总结\n\n用户通常通过以下三种方式之一与你的 Cake 应用程序交互：发出一个简单的页面请求、提交某种表单、或异步发送页面或表单请求（也称为\
  \ Ajax 过程）。控制器和视图在 Cake 中协同工作来处理这些类型的序列。当自定义用户将与之交互的视图时，你也将在控制器中工作，以提供处理用户请求所需的逻辑。控制器将使用诸如\
  \ `set()` 和 `render()` 之类的函数来调用视图，并为其提供必要的参数和变量。标准化的数组（如 `$this->data`）使得处理用户表单数据变得更加容易，因为控制器会解析视图中渲染的数据，并通过模型运行它。本章解释了\
  \ Cake 如何格式化 `$this->data`，以及它与 `Form` 助手的交互。接下来将扩展控制器和模型的功能——第 7 章将描述如何自定义控制器和模型以执行更复杂的操作。\n\
  \n# 使用控制器和模型\n\n\n\n### CakePHP 中的单次操作\n\nCakePHP 中的单次操作通常会调用多个 MVC 元素，并同时在这些元素中运作。例如，在上一章中，你使用了\
  \ `Form` 辅助程序来接收来自控制器和模型获取的数据，并将用户表单数据发送给控制器进行处理。更改控制器中的内容会影响 `Form` 辅助程序的行为，这在操作\
  \ `$this->data` 等变量时尤为明显。\n\n当我在本章讨论开发控制器和模型的更高级方法时，请记住，可能需要对视图进行修改，才能使操作或自定义功能正常工作。例如，管理会话是一个集成度很高的过程，你可能需要在视图（创建登录屏幕和显示会话状态）、控制器（执行会话逻辑以确定会话的各个方面）和模型（将会话数据保存到数据库中）上花费同等的精力。换句话说，要将整个会话操作集成到应用程序中，意味着需要共同编辑和测试控制器中的操作、模型函数以及视图。\n\
  \n### 构建一个功能丰富的博客\n\n框架的经典教程通常是构建一个博客。在 CakePHP 的官方网站上，有一整套博客应用程序教程。然而，你需要的是对*发生了什么*进行透彻的解释，而不仅仅是*如何*构建程序的逐步指南。因此，本教程与其他教程的不同之处在于，我将系统地解释该应用程序中的每一行代码。你应该掌握的是这些概念，而不仅仅是步骤。掌握了这些概念，你就能深入理解\
  \ CakePHP 提供的许多功能，并学会如何将它们整合到你自己的定制应用程序中。\n\n你一直在处理的博客程序已经让你探索了 CakePHP 提供的脚手架、Bake\
  \ 和辅助程序功能。为了让博客更加强大，你需要同时处理模型、视图和控制器。既然你已经了解了各种起点和关键概念，那么是时候更详细地讨论应用程序构建了。让我们从控制器和模型开始，它们是任何\
  \ CakePHP 应用程序的命脉。\n\n你将构建的功能丰富的博客将包含以下高级特性：\n\n-   文章通过一个 wiki 处理器运行，将内容转换为 HTML\
  \ 元素\n-   读者评论及社区投票功能\n-   创建包含日期友好型 URL 的路由\n-   一个管理区域，网站管理员可以在此添加文章\n-   多作者的用户管理\n\
  -   用于动态组织帖子的分类排序\n-   一个全站菜单系统，用于浏览分类和文章\n\n诸如此类的功能实现起来不会太困难，但会充分利用所有的控制器、模型和视图。在本教程中，你将逐个实现这些功能，并将它们构建到应用程序中。在此过程中，我将继续解释在\
  \ CakePHP 中进行开发的重要概念。首先，我将讨论一般性的控制器操作，然后展示如何构建一些自定义操作。\n\n### 处理操作\n\n你已经在 CakePHP\
  \ 中构建并使用了操作。在接下来的功能丰富的博客应用程序中，你将构建一系列操作，每个操作对应网站中的一个特定功能。开发操作的规则遵循典型的 PHP 函数模式。\n\
  \n在清单 7-1 中，我创建了一个名为 `foo` 的基本控制器操作。请注意，它遵循了 PHP 中典型的函数语法。然而，控制器操作的行为与典型的 PHP 函数有些不同。例如，当该操作被\
  \ CakePHP 启动时，它会自动渲染一个相应的视图或产生一个错误。只有当该操作被应用程序中的另一个操作调用时，它才能在不显示视图的情况下返回一个值。\n\n\
  **清单 7-1.** *一个基本的控制器操作*\n\n```\nfunction foo($bar = null) {\n    $this->set('output',$bar);\n\
  }\n```\n\n#### 在操作中使用变量\n\n传递的函数变量可以通过在操作的括号中命名和设置变量来初始化并接收默认值。这些变量在整个操作中都是可用的。\n\
  \n然而，全局变量（供控制器中所有操作使用）可以在控制器类中作为类属性创建：\n\n```\nvar $myVar = 'Variable value';\n\
  ```\n\n现在，在任何控制器操作中，我都可以通过在 `$myVar` 属性前加上 `$this->` 来使用它：\n\n```\nfunction foo($bar\
  \ = null) {\n    $bar = $this->myVar;\n    $this->set('output',$bar);\n}\n```\n\n\
  在创建自己的类属性时，请确保它们不会与 `$scaffold` 或 `$helpers` 等其他 CakePHP 属性冲突。\n\n其他局部变量可以像在其他 PHP\
  \ 脚本中一样在操作中调用：\n\n```\nfunction foo() {\n    $bar = 'hello world';\n    $this->set('output',$bar);\n\
  }\n```\n\n### 请求操作\n\n在你的 `Posts` 控制器中，假设你需要从 `Tags` 控制器获取一个标签列表。按照惯例，你通过模型来执行此操作，特别是当你试图完成某种数据库查询时。但为了说明控制器操作之间如何相互通信，让我们通过控制器而不是模型来运行这个查询。\n\
  \n在 `Posts` 控制器的某个操作中，我可以使用 `set()` 和 `requestAction()` 函数将标签列表传递给视图，如下所示：\n\n```\n\
  $this->set('tags',$this->requestAction('/tags/getList'));\n```\n\n`requestAction()`\
  \ 函数指向 `Tags` 控制器的 `getList()` 操作，该操作尚未创建。为了使 `Posts` 控制器视图中的 `$tags` 变量能够被数据格式化，`Tags`\
  \ 控制器中的 `getList()` 操作需要返回一些数据，*而不是*指向视图（默认情况下它会这样做）。如果你在 `getList()` 操作中省略了返回值，那么\
  \ `Tags` 控制器默认会尝试渲染 `app/views/tags` 目录中名为 `getlist.ctp` 的视图。\n\n因此，为了使此功能正常工作，`getList()`\
  \ 操作需要类似以下这样：\n\n```\nfunction getList() {\n    return $this->Tag->find('list');\n\
  }\n```\n\n有时，确实无法绕过使用 `requestAction()` 函数。但在大多数情况下，你应该能够使用组件、模型或其他元素来导航你的代码。当需要启动另一个操作及其视图和其他所有内容时，请使用\
  \ `redirect()` 函数而不是 `requestAction()`。请求操作（与重定向相对）用于在另一个控制器中执行逻辑并将其结果拉取到当前控制器，而不是简单地在应用程序的其他地方启动另一个操作。简而言之，`redirect()`\
  \ 函数会触发另一个浏览器请求并更改 URL，而 `requestAction()` 则在内部工作以启动特定的操作。\n\n### 回调操作在控制器中的工作方式\n\
  \n控制器回调使得在启动操作之前或之后执行逻辑成为可能。例如，假设你在 `Posts` 控制器中启动了 `View` 操作。在控制器执行 `View` 操作之前，会检查某些回调中是否有任何内容。通过将代码放置在这些回调操作中，你可以在操作执行之前、执行之后或视图渲染之前，为任何及所有操作执行某些逻辑。假设你想限制对\
  \ `View` 操作的访问；你可以在一个回调操作中实现这一点。\n\n`beforeFilter`\n\n\n\n`beforeFilter()`回调动作在每个动作执行之前被调用。它的定义方式与其他动作相同，即作为一个\
  \ PHP 函数，并会中断所请求动作中的控制器逻辑处理。为了阻止用户访问网站的特定区域，`beforeFilter()`动作可以检查会话中的信息。\n\n清单\
  \ 7-2 中的这个特定回调示例确保对于`view`动作，用户必须已登录；否则，它会将用户重定向到登录动作（关于这些可能性的更多内容将在后文讨论）。这只是使用回调中断启动控制器中动作的一个例子。\n\
  \n**清单 7-2.** `beforeFilter()`回调动作\n```php\nfunction beforeFilter() {\n    if ($this->action\
  \ == 'view') {\n        if (!$this->Session->check('User')) {\n            $this->redirect('/users/login');\n\
  \        }\n    }\n}\n```\n\n#### `afterFilter`\n\n与`beforeFilter()`回调动作类似，`afterFilter()`在每个动作被调用后执行逻辑。\n\
  \n#### `beforeRender`\n\n这个回调动作在所请求动作的逻辑执行完毕之后、所有动作的视图输出渲染之前执行。与`beforeFilter()`和`afterFilter()`一样，可以通过使用`$this->action`变量使`beforeRender()`仅应用于特定动作。\n\
  \n### 为博客定制控制器\n\n目前，`Posts`控制器已包含由`Bake`提供的典型 CRUD 动作。\n\n用户在应用中看到的第一个界面将是此控制器的`index`动作（清单\
  \ 7-3）。我们来定制这个界面，使其列出五篇博客文章及其内容和作者信息。首先，你需要查看`index()`动作，并让它执行使`Index`视图正确显示所需的逻辑。\n\
  \n**清单 7-3.** `Posts`控制器中的`index`动作\n```php\nfunction index() {\n    $this->Post->recursive\
  \ = 0;\n    $this->set('posts', $this->paginate());\n}\n```\n\n### `recursive`属性\n\
  \n清单 7-3 的第 2 行将`Post`模型的`recursive`属性设置为`0`。这个属性影响 Cake 从表中获取数据的方式。请记住，文章与标签和用户是关联的。当`Post`模型执行查询以从数据库中获取文章时，它也会从`tags`和`users`表中获取关联的记录。`recursive`属性告诉模型在获取这些关联记录时应该探查多远。如果用户与另一个表有关联，并且`recursive`属性被设置为大于`1`的值，那么模型将不仅获取关联的用户记录，还会获取它们关联的表的记录。\n\
  \n在`index`动作中，`recursive`属性被设置为`0`，这意味着除了初始层级的关联之外，Cake 将忽略其他记录。表 7-1 列出了可能的`recursive`值及其结果。\n\
  \n**表 7-1.** 可能的`recursive`值\n\n| 值   | 结果                                     \
  \                    |\n| ---- | ------------------------------------------------------------\
  \ |\n| –1   | 仅返回当前模型，忽略所有关联                                 |\n| 0    | 返回当前模型及其所有者\
  \                                       |\n| 1    | 返回当前模型及其所有者，以及它们关联的模型      \
  \             |\n| 2    | 返回当前模型、其所有者、它们关联的模型，以及任何关联的模型的关联模型 |\n\n#### 分页\n\n清单\
  \ 7-3 的第 3 行使用了`paginate()`控制器函数。这使得`Paginator`助手能够简化列排序和多页数据的处理。本质上，`paginate()`函数执行了一个`find()`模型函数，但同时会分析结果并将一些重要的分页参数传递给视图。然后，在视图中，`Paginator`助手利用这些参数构建多页视图和列排序。如果在控制器中没有运行`paginate()`函数，`Paginator`助手会在视图中中断。如果分页是应用的一个重要元素，那就保留这里的`paginate()`函数。然而，对于这个博客，我将从视图中移除`Paginator`助手，因此`paginate()`函数也可以从`index`动作中移除。\n\
  \n### `find()`函数\n\n实际上，你可以通过使用`find()`函数代替`paginate()`来精简`index`动作的代码，如清单 7-4 所示。\n\
  \n**清单 7-4.** 修改后的`index`动作\n```php\nfunction index() {\n    $this->set('posts',\
  \ $this->Post->find('all'));\n}\n```\n\n请注意，第 2 行通过`Post`模型执行了模型函数`find()`。这个函数是\
  \ Cake 中最强大的功能之一。它允许你执行一系列重要的数据库查询，而无需构建任何 SQL 字符串。事实上，如果你将数据源切换为 SQL 之外的其他类型，`find()`函数仍然可以以该数据源的语法执行数据查询。`find()`动作的参数不仅仅包含查询字符串。使用这个函数，你可以对结果进行排序、限制返回的行数、设置`recursive`值等等。\n\
  \n`find()`函数的参数如表格 7-2 所示。一个使用了所有参数的`find()`操作看起来是这样的：\n```php\n$this->Post->find('all',\
  \ array(\n    'conditions' => array('User.id' => 1),\n    'fields' => 'Post.name',\n\
  \    'order' => 'Post.id ASC',\n    'limit' => 10,\n    'recursive' => 0\n));\n\
  ```\n\n在这个例子中，`Post`模型将执行一个查询，搜索所有与 ID 等于 1 的用户相关联的文章。它还会仅返回`name`字段，并按照文章 ID 的升序对结果数组进行排序。返回的数组最多包含十个结果，并且查询会从这十篇文章的第一批中获取数据。最后，`recursive`值被设置为`0`，强制查询仅提供`Post`模型数据及其所有者模型。\n\
  \n**表 7-2.** `find()`模型函数中可用的参数\n\n| 名称         | 默认值    | 详细信息                \
  \                                     |\n| ------------ | --------- | ------------------------------------------------------------\
  \ |\n| `type`       | `'first'` | 可以是`all`、`first`或`list`；决定要执行的查找操作类型       |\n\
  | `conditions` | `null`    | 包含查找条件的数组，以键值对形式                             |\n| `fields`\
  \     | `null`    | 指定从哪些字段检索数据的数组                                 |\n| `order`\
  \      | `null`    | 排序条件；用于指定按哪个字段对结果集排序；字段名后必须跟上`ASC`或`DESC` |\n| `page`     \
  \  | `null`    | 用于分页数据的页码                                           |\n| `limit`\
  \      | `null`    | 每页要计算的结果数量限制                                     |\n| `offset`\
  \     | `null`    | SQL 偏移值                                                    |\n\
  | `recursive`  |           | 关联模型的递归值；可以被`recursive`属性覆盖                  |\n\n\
  这个例子展示了在`find()`函数中标注参数的一种方式。简单来说，函数中的参数被存储在一个数组中，并跟随要执行的查找操作类型。另一种列出`find()`中参数的方式是这样的：`find(\
  \ type[string], parameters[array] )`\n\n换句话说，所有的`find`参数都存储在`parameters`数组中，而查找的类型（`all`、`first`或`list`）则通过`type`传入。\n\
  \n当不指定查找操作的类型时，`find()`默认会执行`first`类型。当你只需要获取结果集中的第一条记录，并且希望指定更复杂的条件时，可以使用另一种省略`type`参数的标注方法。在这种情况下，每个参数都直接写在`find()`的括号中，而不是像之前解释的那样放在`parameters`数组中。`find()`函数将按以下方式接受设置：\n\
  ```php\nfind( conditions[array], fields[mixed], order[string], recursive[int] )\n\
  ```\n如果我想获取整个表中的第一篇文章，但按日期排序，我可以这样使用`find()`：\n```php\n$this->Post->find(null, null,\
  \ 'date DESC');\n```\n\n\n\n### 操作查询条件\n\n在 `find()` 函数中操作这些参数，并使用这两种表示查询条件的方式，可以执行更复杂的数据库查询，并将数据集精确裁剪到所需结果。这省去了遍历数据的麻烦，只需提供一个包含特定条件的数组，模型就会返回已格式化好的数据集，供控制器和视图处理。\n\
  \n### 设置查询条件\n\n查询条件格式化为数组形式。键对应要搜索的字段，值表示要在该字段中查找的值。请注意，查询条件中提供的字段结构与典型的 SQL 查询字符串不同。关联模型（此处为\
  \ `User`）后跟句点和字段名，告诉 `find()` 函数通过关联模型（而不是 `Post` 模型）执行查询。换句话说，即在关联表中搜索名为 `id` 且值为\
  \ `1` 的字段。\n\n使用数组作为查询条件可能是构建查询的更高效方式。默认情况下，查询将搜索与数组中输入的值相等的字段。\n\n要搜索值不等于某个特定值的字段，只需在表达式前添加\
  \ `<>`：\n\n```\n$this->Post->find('all',array('conditions'=>array('User.id'=>'<>\
  \ 1')));\n```\n\nCake 会解析其他 SQL 表达式，包括 `LIKE`、`BETWEEN` 和 `REGEX`，但必须在运算符和值之间留一个空格。可以通过将字段名括在\
  \ SQL 的 `DATE()` 参数中来搜索日期或日期时间字段。\n\n### 设置多个条件\n\nCake 支持多个条件。通过使用数组来格式化条件，可以轻松管理多个搜索：\n\
  \n```\n$this->Post->find('all',array('conditions'=>array('User.id'=>1,'DATE(Post.date)'=>'CURDATE()')));\n\
  ```\n\n将条件合并到单个查询中的默认方式是使用 `AND` 布尔运算符。换句话说，上一个示例将告诉模型查找所有用户 ID 为 `1` *且* 发布日期为今天的帖子。\n\
  \n假设你需要使用 `OR` 运算符执行多条件查询。你可以通过将条件数组设置为键为 `or` 的数组的值来实现，如下所示：\n\n```\n$this->Post->find('all',array('conditions'=>array(\n\
  \  'or'=>array(\n    'User.id'=>1,'DATE(Post.date)'=>'CURDATE()'\n  )\n)));\n```\n\
  \n在此示例中，所有有效的 SQL 布尔运算都可以替代 `OR`。其中包括 `AND`、`OR`、`NOT` 或 `XOR`。\n\n你也可以让 Cake 搜索一个字段中的多个值。只需将一个包含所有可能搜索值的数组附加到字段键即可：\n\
  \n```\n$this->Post->find('all',array('conditions'=>array('User.id'=>array(1,2,5,10))));\n\
  ```\n\n### 显示最新帖子\n\n随着 `posts` 表的增长，`Index` 操作中当前 `find()` 函数返回的结果也会增加。为确保服务器负载不受影响，并且由于你只需要最新的五篇帖子，你可以自定义查询条件，只返回五条记录，而不是（可能）数百条。\n\
  \n最简单的方法是将 `limit` 设置为 `5`，并按创建日期降序 `order` 结果：\n\n```\n$this->Post->find('all',array('order'=>'date\
  \ DESC','limit'=>5,'recursive'=>0));\n```\n\n现在，`find()` 函数将获取所有 `Post` 记录及其所有者（此处为与帖子关联的\
  \ `User` 记录），按 `date` 字段排序（最新的在前），并将结果限制为五条。\n\n示例数据库在 `ID` 字段中设置了 `auto_increment`，这意味着\
  \ `ID` 字段不仅通过唯一值标识记录，还告诉我们创建的先后顺序。因为理论上管理员可以操作 `date` 字段，但不能操作 `ID` 字段，所以在某些情况下按\
  \ `ID` 排序可能比按 `date` 排序更有价值。不过，这由客户端或开发者自行决定。在本博客中，我们将相信分配给帖子的日期将决定该帖子在网站上的出现时间。\n\
  \n将新条件插入到清单 7-4 第 2 行的 `find()` 函数中，并用结果代码替换 `Index` 操作。\n\n### 调整索引视图\n\n`Index`\
  \ 视图也需要调整，即使只是为了将管理操作从用户可及范围内移除。\n\n进入 `app/views/posts/index.ctp` 文件并插入以下代码，也可以使用您自己的自定义视图代码，以更具故事性的形式显示内容：\n\
  \n```\n<? foreach($posts as $post): ?>\n<div class=\"story\">\n  <?=$html->link('<h1>'.$post['Post']['name'].'</h1>','/posts/view/'.$post['Post']['id'],null,null,false);?>\n\
  \  <p>\n    发布于 <?=date('Y 年 n 月 j 日, g:i a',strtotime($post['Post']['date']));?>\n\
  \  </p>\n  <p>\n    <b>作者：<?=$post['User']['firstname'];?> <?=$post['User']['lastname'];?></b>\n\
  \  </p>\n  <br/>\n  <p><?=$post['Post']['content'];?></p>\n</div>\n<? endforeach;\
  \ ?>\n```\n\n### 查看操作\n\n你刚刚完成的练习使用户可以点击索引视图中每篇帖子的标题，这将把他们带到该帖子的 `View` 操作。`View`\
  \ 操作应已包含清单 7-5 中所示的烘焙代码。\n\n**清单 7-5.** *帖子控制器中的查看操作*\n\n```\nfunction view($id\
  \ = null) {\n  if (!$id) {\n    $this->Session->setFlash(__('无效帖子。', true));\n \
  \   $this->redirect(array('action'=>'index'));\n  }\n  $this->set('post', $this->Post->read(null,\
  \ $id));\n}\n```\n\n清单 7-5 的第 6 行展示了 `read()` 函数的用法。这与我已讨论过的 `find()` 函数类似，但它确实有一些独特之处，对于简单的页面请求特别有用。\n\
  \n#### `read()` 函数\n\n简而言之，`read()` 函数读取特定记录的内容。它与 `find()` 的不同之处在于它不包含 `recursive`\
  \ 参数。有关 `read()` 模型函数中可用的参数，请参见表 7-3。\n\n**表 7-3.** `read()` 模型函数中可用的参数（按顺序）\n\n\
  | 名称   | 类型  | 默认值    | 说明                                                     |\n\
  | ------ | ----- | --------- | --------------------------------------------------------\
  \ |\n| fields | Mixed | `null`    | 单个字段名的字符串值或字段名数组                         |\n\
  | id     | 整数 | `null`    | 要读取的记录的 ID                                        |\n\
  \n`View` 操作对 `read()` 函数的使用非常适合当前任务；保持原样即可。清单 7-5 的第 3–4 行包含了通过 `Session` 组件设置错误消息以及发生错误时重定向用户的函数。\n\
  \n#### `setFlash()` 函数\n\n在第六章中，我讨论了 `setFlash()` 函数，但仅限于基本术语。该函数的作用不仅仅是显示错误消息。表\
  \ 7-4 列出了其参数。\n\n**表 7-4.** Session 组件中 `setFlash()` 函数可用的参数（按顺序）\n\n| 名称    | 类型\
  \   | 默认值     | 说明                                                         |\n|\
  \ ------- | ------ | ---------- | ------------------------------------------------------------\
  \ |\n| message | 字符串 | `null`     | 在布局的 `$session->flash()` 函数中可用的消息          \
  \     |\n| layout  | 字符串 | `default`  | 放置 flash 消息的布局；这可以将显示 flash 的 `<div>` 容器元素从默认切换为另一个自定义布局\
  \ |\n| params  | 数组   | `null`     | 作为视图变量传递给布局的参数                            \
  \     |\n| key     | 字符串 | `flash`    | 一种区分多种 flash 消息类型的方式，用于多个 flash 消息     \
  \  |\n\n默认情况下，布局中的 `$session->flash()` 函数在收到来自 `setFlash()` 函数的 flash 消息后，会将消息显示在标准化的\
  \ HTML 字符串内。\n\n\n\n`<div id=\"flashMessage\" class=\"message\">Invalid post.</div>`\
  \ 要自定义围绕 flash 消息的 HTML，你可以在 `app/views/layouts` 文件夹中添加一个新的布局文件，并在 `setFlash()`\
  \ 函数中设置 `layout` 参数。例如，你可以在 `layouts` 目录中创建一个名为 `flash.ctp` 的自定义 flash 布局，其中包含以下单行代码：\n\
  \n```\n<div class=”error_message”><?=$content_for_layout;?></div>\n```\n\n然后，在 `setFlash()`\
  \ 函数中，你可以像这样传递新的布局参数：`$this->Session->setFlash('Invalid Post.','flash');`\n\n当显示\
  \ flash 消息时，它*不会*替换视图的整个布局。新 flash 布局文件的全部内容将被放置在布局中 `$session->flash()` 函数出现的位置。然后，在\
  \ `flash.ctp` 文件中 `$content_for_layout` 出现的位置，将插入 flash 消息。设置 `layout` 参数允许完全自定义\
  \ flash 消息的显示方式，但这需要创建一个单独的布局文件来容纳那个自定义的 HTML。\n\n如果由于某种原因，flash 需要包含关于错误的更多细节，你可以通过将变量作为数组添加到函数的第三个参数中来传递给布局：\n\
  \n`$this->Session->setFlash(‘Invalid post.’,’flash’,array(‘story’=>$id));`\n\n在\
  \ `app/views/layouts/flash.ctp` 文件中，通过之前的 `setFlash()` 函数传递的变量将作为 `$story` 可用，其行为类似于通过控制器的\
  \ `set()` 函数在视图文件中传递的变量。\n\n`setFlash()` 中的 `key` 参数使得可以在布局的不同区域显示 flash 消息。例如，`app/views/layouts/default.ctp`\
  \ 文件可以包含两个由 `key` 区分的 `flash()` 函数：\n\n```\n<div id=”top”>\n<? $session->flash(‘top’);?>\n\
  </div>\n<div id=”bottom”>\n<? $session->flash(‘bottom’);?>\n</div>\n```\n\n现在，当控制器使用\
  \ `setFlash()` 触发 flash 消息时，你可以指定希望消息出现的位置。像这样在 flash 消息中使用 `key`：`$this->Session->setFlash('Invalid\
  \ post.',null,null,'bottom');`，会告诉 Session 组件将该消息与参数设置为 `bottom` 的 `flash()` 函数匹配。\n\
  \n清单 7-5 的第 3 行只需要在发生错误时显示一个基本的 flash 消息，所以我不会向 `setFlash()` 函数添加任何更多参数。但是，你当然可以让消息表达任何你想要的内容。只需将第一个参数更改为你自己的错误消息即可。\n\
  \n### `redirect()` 函数\n\n清单 7-5 的第 4 行在发生错误时重定向用户。你可以通过使用控制器的 `redirect()` 函数来实现这一点。`redirect()`\
  \ 的可用参数列在表 7-5 中。\n\n**表 7-5.** `redirect()` 控制器函数中可用的参数（按顺序）\n\n| 名称 | 类型 | 默认值\
  \ | 说明 |\n| :--- | :--- | :--- | :--- |\n| `url` | Mixed | `null` | 指向应用程序中另一个站点或位置的字符串或数组。\
  \ |\n| `status` | Integer | `null` | 如果需要，HTTP 状态码（例如，404 或 500 错误代码）。 |\n| `exit`\
  \ | Boolean | `true` | 如果为 `true`，重定向后将调用 PHP `exit()` 函数。 |\n\n■**注意** 如果此函数中的\
  \ `exit` 参数设置为 `false`，Cake 将继续执行重定向后控制器中的代码。只有当 `exit` 参数设置为 `true`（意味着调用了 PHP\
  \ `exit()` 函数，从而终止脚本执行）时，重定向后所有其他进程才会停止。这可能会产生意想不到的后果，因为用户的浏览器将请求一个新页面，但旧的脚本可能继续运行。\n\
  \n`redirect()` 函数的 `url` 参数可以设置为一个数组。注意在清单 7-5 的第 4 行中，数组的键和值对应于 Cake 应用程序中的位置。此函数中可用的键与\
  \ Cake 的路由器参数相对应。例如，数组 `array('controller'=>'users','action'=>'index')` 会将用户重定向到\
  \ Users 控制器的 Index 操作。\n\n`url` 参数也可以使用单个字符串。这些字符串遵循与 Web 浏览器中访问 Cake 应用程序区域时使用的相同\
  \ URL 结构。前面数组中显示的相同路径可以格式化为如下字符串：`'/users/index'`\n\n其他 Cake 函数可以帮助处理 `url` 参数。其中一个例子是\
  \ `referer()` 函数。通过在 `url` 参数中放置 `$this->referer()`，Cake 将重定向到当前操作的引用页面。\n\n`status`\
  \ 参数允许你传递一个 HTTP 状态码作为服务器响应的一部分。服务器最常见的错误响应之一是 404 Not Found 错误。有时你可能希望将 `redirect()`\
  \ 函数用于未解析的 URL。在这些情况下，在 `status` 参数中使用整数 404，允许应用程序像典型的 404 服务器响应一样响应错误。所有 HTTP\
  \ 状态码都是可用的。\n\n在清单 7-5 的第 4 行中，你假定用户从 Index 操作访问 View 操作，因此如果发生错误，你会将他们重定向回此操作。\n\
  \n### 自定义文章显示\n\n出于调整 Index 视图的相同原因，你需要调整 View 视图。你可能还想微调此视图以使文章更易于阅读。之前，你简化了这个视图。在这个练习中，尝试用自己的设计来装饰\
  \ View 视图。确保故事可读且布局良好。你甚至可以尝试使用 `app/webroot/css` 文件夹并添加你自己的样式。以下是一些起始的最小代码，属于 `app/views/posts/view.ctp`\
  \ 文件：\n\n```\n<?=$html->link(‘<h1>’.$post[‘Post’][‘name’].’</h1>’,’/posts/view/’.$post[‘Post’]➥\n\
  [‘id’],null,null,false);?>\n<p>Author: <?=$post[‘User’][‘firstname’];?> <?=$post[‘User’][‘lastname’];?></p>\n\
  <p>Date Published: <?=$post[‘Post’][‘date’];?></p>\n<hr/>\n<p><?=$post[‘Post’][‘content’];?></p>\n\
  ```\n\n### 为博客创建模型\n\nPosts 控制器中的 Add 和 Edit 操作使用重要的模型函数。你可以通过向模型中添加新函数来扩展这些操作与\
  \ Post 及相关模型的交互。在第 6 章中，你自定义了一些 CRUD 视图并学习了提交表单。现在你将查看模型函数并扩展它们。你将首先查看 Posts 控制器中的\
  \ Add 和 Edit 操作，检查它们的逻辑，并了解它们如何与扩展 Post 模型相关联。\n\n### Add 操作\n\nIndex 和 View 操作通过简单的数据库查询与模型交互。然而，要使\
  \ Add 操作正常工作，需要向模型发送数据。通过使用回调函数，如控制器的 `beforeFilter()` 和 `afterFilter()` 函数，你可以拦截数据库保存、运行数据验证检查等。让我们首先检查控制器中的\
  \ Add 操作。打开 `app/controllers/posts_controller.php` 文件，滚动到 Add 操作（参见清单 7-6）。\n\n\
  **清单 7-6.** *Posts 控制器中的 Add 操作*\n\n```\nfunction add() {\n if (!empty($this->data))\
  \ {\n $this->Post->create();\n if ($this->Post->save($this->data)) {\n $this->Session->setFlash(__(‘The\
  \ Post has been saved’, true));\n $this->redirect(array(‘action’=>’index’));\n }\
  \ else {\n $this->Session->setFlash(__(‘The Post could not be saved. Please, try\
  \ again.’,true));\n }\n}\n$tags = $this->Post->Tag->find(‘list’);\n$users = $this->Post->User->find(‘list’);\n\
  $this->set(compact(‘tags’, ‘users’));\n}\n```\n\n\n\n# 自定义控制器与模型\n\n本操作中的大部分逻辑与本章“自定义博客控制器”部分讨论的命令类似。不同之处在于它使用了模型函数。在第\
  \ 6 章中，我简要讨论了`save()`函数，现在我将更详细地解释这个模型函数。\n\n## `save()`函数\n\n如前所述，`save()`函数接受一个格式化数组（通常是自动格式化的`$this->data`数组），并将其值保存到数据库中匹配的字段中。\n\
  \n该函数还提供了一些其他参数，用于数据验证和指定数据将保存到哪些字段（请参见表 7-6）。\n\n**表 7-6.** `save()`模型函数中可用的参数（按顺序）\n\
  \n| 名称 | 类型 | 默认值 | 说明 |\n|------|------|--------|------|\n| `data` | `Array` |\
  \ `null` | 要保存到数据库的数据，按字段和值进行键控 |\n| `validate` | `Boolean` | `true` | 触发在相应模型中指定的数据验证\
  \ |\n| `fieldList` | `Array` | `null` | 允许写入数据的字段列表 |\n\n`save()`函数根据保存的成功与否返回`true`或`false`。\n\
  \n例如，当数据验证发生并未通过测试（如模型中指定的那样）时，模型将返回`false`。在控制器中，可以指定诸如闪存消息或对失败验证做出反应等其他方法。\n\n\
  请注意，清单 7-6 中的第 4 行已经用于处理`save()`函数的返回结果。换句话说，如果`save()`函数返回`true`，第 4 行会触发第 5-6\
  \ 行的执行。要运行验证测试，你不必使用控制器（实际上，你应该避免使用控制器），你可以在模型内部单独运行验证。\n\n### 数据验证\n\nWeb 开发中最繁琐的任务之一可能就是对用户提交的表单进行数据验证测试。这项任务如此繁琐的一个原因是，当你给用户一个开放式字段时，他们真的可以向应用程序提交任何内容。\n\
  \n应用程序如何知道如何处理用户可能提供的无数文本变体？与其陷入关于正则表达式的冗长而艰苦的讨论中，Cake 让你用更少的技术术语来解决这个问题。\n\n为用户提交的表单（如添加操作）设置数据验证的第一步是打开模型并开始定义验证规则。转到`app/models/post.php`文件。\n\
  \n它应该看起来像清单 7-7 中的代码。\n\n**清单 7-7.** Post 模型\n\n```php\n<?\nclass Post extends AppModel\
  \ {\n    var $name = 'Post';\n    var $belongsTo = array('User');\n    var $hasAndBelongsToMany\
  \ = array('Tag');\n}\n?>\n```\n\n你已经构建了与`User`和`Tag`模型的关联。通过在 5 行和 6 行之间插入一个新行，开始构建你的验证规则。\n\
  \n```php\nvar $validate = array();\n```\n\n到目前为止，`$validate`属性数组中还没有输入任何规则。要创建验证规则，只需将数组键控为对应于字段及其规则。如果在保存过程中任何规则未满足，模型将向控制器返回错误并退出保存过程。\n\
  \n`posts`表将接收`name`、`date`和`content`字段的数据，并将接收关联的`User`模型的 ID。你可以通过为每个字段提供一个键并在`$validate`数组中提供一个规则来验证为这些字段提供的数据类型。在这里，数据库中的字段类型将帮助你确定要存储的数据类型。`name`字段是一个标准的`varchar`字段，因此你可能希望验证此处存储的唯一字符是字母数字。只需将以下字符串添加到`$validate`数组中：`var\
  \ $validate = array('name'=>'alphaNumeric');`\n\n\n\n其他所有字段也可以沿用这种方法，根据其字段类型设置对应的验证规则，如下所示：\n\
  \n```\nvar $validate = array(\n    'name'=>'alphaNumeric',\n    'date'=>'date',\n\
  \    'content'=>null\n);\n```\n\n### 使用多重验证\n\n还存在更多验证可能性。你可能需要检查所提供字符串的长度，或者所使用的符号，甚至可能需要对单个字段应用多条规则。模型只需为每个字段扩展一个自己的数组，就能容纳更多选项。该数组中的每一项都将包含一个键，该键对应一个可用选项及其验证值。\n\
  \n### 必填字段\n\n要设置某个字段为必填，请使用`required`布尔选项：\n\n```\nvar $validate = array('name'=>array('required'=>true));\n\
  ```\n\n在这个例子中，如果用户为`name`提交了一个空值，那么模型在验证阶段就会失败。因此，控制器中的`save()`函数将返回`false`，告知控制器没有任何内容保存到数据库中。\n\
  \n关于这个参数，还有一点很重要：如果在数据数组中找不到该字段的索引，它也会持续判断验证失败。例如，`$this->data`是一个包含键和值的数组，这些键和值将被保存，如果待验证的字段名没有对应的键存在，`required`也会导致验证失败。\n\
  \n你可能以这样一种方式构建了数据库：某个字段可能需要保持为空，但如果数据数组中缺少该键，又不想触发验证失败响应。要实现这一点，请使用`allowEmpty`参数。通过将此参数设置为`false`，你基本上是在说“不允许此字段包含空字符，例如空格、制表符等”。需要注意的是，只有在数据数组中存在该字段对应的键时，`allowEmpty`参数才会在验证时被调用。\n\
  \n### 在验证时设置错误消息\n\n你可以自定义验证失败时的错误消息，供控制器使用和/或在视图中显示。通过`message`键来实现：\n\n```\nvar\
  \ $validate = array(\n    'name'=>array(\n        'rule'=>'alphaNumeric',\n    \
  \    'message'=>'帖子标题只能包含字母数字字符'\n    )\n);\n```\n\n要在视图中显示此错误消息，请确保包含表单辅助器的`error()`函数：\n\
  \n```\n<?=$form->input('name');\n<?=$form->error('name');\n```\n\n### 创建还是更新？\n\n\
  保存数据有两种可能：创建新记录或更新现有记录。有时你可能只需要在更新过程中进行验证，而在创建新记录时不需要，反之亦然。要区分需要验证的保存类型，请使用`on`参数：\n\
  \n```\nvar $validate = array(\n    'name'=>array(\n        'rule'=>'alphaNumeric',\n\
  \        'message'=>'帖子标题只能包含字母数字字符',\n        'on'=>'create'\n    )\n);\n```\n\n\
  `on`键的可用选项是`create`和`update`。\n\n### 使用内置验证规则\n\n有几个内置的验证规则，可以将某些数据检查过程简化为单个参数。表\
  \ 7-7 列出了可用的规则。\n\n**表 7-7.** *内置规则*\n\n| **值** | **规则** | **示例** |\n| ---------\
  \ | -------- | ----------- |\n| `alphaNumeric` | 字段必须仅包含字母和数字 | `'rule'=>'alphaNumeric'`\
  \ |\n| `between` | 字段长度必须在提供的值之间 | `'rule'=>array('between',10,20)` |\n| `blank`\
  \ | 字段必须为空或仅包含空白字符 | `'rule'=>'blank'` |\n| `cc` | 字段必须是有效的信用卡号 | `'rule'=>array('cc','fast')`\
  \ |\n| `comparison` | 字段的数值与提供的值进行比较 | `'rule'=>array('comparison','>=',21)` |\n\
  | `date` | 字段必须包含有效的日期字符串 | `'rule'=>'date'` |\n| `decimal` | 字段必须是有效的十进制数 | `'rule'=>'decimal'`\
  \ |\n| `email` | 字段必须是有效的电子邮件地址 | `'rule'=>'email'` |\n| `equalTo` | 字段必须等于提供的值\
  \ | `'rule'=>array('equalTo','www')` |\n| `extension` | 字段必须包含所提供的文件扩展名后缀 | `'rule'=>array('extension','jpg')`\
  \ |\n| `ip` | 字段必须是有效的 IPv4 地址 | `'rule'=>'ip'` |\n| `minLength` | | |\n\n\n\n#\
  \ 验证规则\n\n`Field` 的长度必须至少为\n\n`'rule'=>array('minLength',12)`\n\n提供的值\n\n`maxLength`\n\
  \n`Field` 的长度必须小于\n\n`'rule'=>array('maxLength',30)`\n\n提供的值\n\n`money`\n\n`Field`\
  \ 必须包含有效的货币\n\n`'rule'=>array('money','left')`\n\n金额\n\n`numeric`\n\n`Field` 必须是一个有效的数字\n\
  \n`'rule'=>'numeric'`\n\n`phone`\n\n`Field` 必须是一个有效的电话号码\n\n`'rule'=>array('phone',null,'us')`\n\
  \n`postal`\n\n`Field` 必须是有效的邮政编码\n\n`'rule'=>array('postal',null,'uk')`\n\n`range`\n\
  \n`Field` 必须在提供的值之间\n\n`'rule'=>array('range',0,100)`\n\n`ssn`\n\n`Field` 必须是一个有效的社会安全\n\
  \n`'rule'=>array('ssn',null,'us')`\n\n号码\n\n`url`\n\n`Field` 必须是一个有效的网址\n\n`'rule'=>'url'`\n\
  \n除了这些验证规则，您还可以选择指定自己的正则表达式来微调验证。例如，如果您的网站需要验证美国、加拿大和英国以外国家的邮政编码，您可以根据该国的邮政编码规则提供自己的正则表达式。其中一些表达式可以输入到参数数组中（例如\
  \ `postal`），但所有自定义验证都可以通过 `custom` 参数指定：\n\n`'rule'=>array('custom','/[a-z0-9]{12,}$/i')`\n\
  \n### 使用多规则\n\n每个字段可以有多个验证规则。只需遵循数组语法来扩展字段的规则，以包含多个规则。对于每个规则，您可以使用前面讨论过的验证参数。清单\
  \ 7-8 展示了您的 `Post` 模型，其中包含各种验证设置。\n\n**清单 7-8.** `Post` *模型的多种验证规则*\n\n```\nvar\
  \ $validate = array(\n'name'=>array(\n'alphaNumeric'=>array(\n'rule'=>'alphaNumeric',\n\
  'required'=>true,\n'message'=>'标题不能包含任何符号'\n),\n'maxLength'=>array(\n'rule'=>array('maxLength',80),\n\
  'message'=>'标题不得超过 80 个字符'\n)\n),\n'date'=>array(\n'rule'=>'date',\n'required'=>true,\n\
  'message'=>'您必须提供一个有效的日期'\n),\n'content'=>array(\n'required'=>true\n)\n);\n```\n\
  \n请注意，在清单 7-8 的第 3 行和第 8 行，为 `name` 字段分配了单独的规则。在此数组中使用多个规则而不是创建一个涵盖两条规则的自定义正则表达式的好处是，您传递给浏览器的错误消息可以特定于验证失败的原因。使用多个规则还允许您利用\
  \ Cake 的内置规则并节省时间。\n\n现在，请将清单 7-8 添加到 `Post` 模型中，放在模型关联之后。现在，表单提交过程包含了模型中的验证处理。您本可以在控制器中运行一些繁琐的验证逻辑，但这将超出\
  \ Cake 的 MVC 架构。通过在模型中进行数据验证，您可以访问更简洁的函数和方法。\n\n### 视图中的错误消息\n\n为了让用户看到清单 7-8 中第\
  \ 6、10 和 16 行使用的错误消息，您需要使用 `Form` 助手准备视图。通过在 `app/views/posts/add.ctp` 和 `edit.ctp`\
  \ 视图中使用 `error()` 函数来创建错误消息占位符。确保提供的参数与给定字段匹配，例如 `name` 字段对应 `$form->error('name')`。\n\
  \n### 编写自定义模型函数\n\n假设您想输入一个 URL，该 URL 不仅可以通过 ID 获取一篇文章，还可以获取给定年份的所有文章。这种类型的过程可能需要几行逻辑来运行查询，具体取决于用户提供的\
  \ URL。Cake 的初学者经常试图在控制器中执行此逻辑，导致整个应用程序中出现庞大的控制器。由于这是一个专门处理数据的过程，您应该在模型中运行此函数。\n\n\
  打开 `Post` 模型，并在刚刚添加的数据验证属性之后插入清单 7-9。\n\n**清单 7-9.** `Post` *模型中的自定义* `findByYear()`\
  \ *函数*\n\n```\nfunction findByYear($year=null) {\n$date = $year.'-01-01 00:00:00';\n\
  $end_date = $year.'-12-31 23:59:59';\nreturn $this->find('all',array('conditions'=>array('DATE(Post.date)'=>'\
  \ >'.$date,'DATE(Post.date)'=>'<'.$end_date)));\n}\n```\n\n在控制器中，您将使用此函数，以便传递用户提供的\
  \ `$year` 变量。清单 7-9 的第 2–3 行初始化了该年的开始和结束日期变量，这些变量将与数据库中的日期时间字段匹配。第 4 行执行查询并搜索所有其日期字段匹配\
  \ `$date` 和 `$end_date` 之间范围的记录。它还使用 `return` 将结果传递回控制器。\n\n此函数由模型持有，但模型本身不会执行该函数。控制器将执行它。因此，在\
  \ `Posts` 控制器中，插入一个名为 `read()` 的新操作。使用清单 7-10 来包含您刚刚创建的模型函数。\n\n**清单 7-10.** *Posts\
  \ 控制器中的 Read 操作*\n\n```\nfunction read($year=null) {\nif (!$year) {\n$this->Session->setFlash('请提供年份');\n\
  $this->redirect(array('action'=>'index'));\n}\n$this->set('posts',$this->Post->findByYear($year));\n\
  }\n```\n\n此逻辑大部分取自 `View` 操作，并使用 `Session` 组件和 `redirect()` 函数对 URL 中传递的 `$year`\
  \ 变量进行错误测试。第 6 行是您自定义模型函数的关键。请注意，该函数的调用方式类似于 `find()` 函数，只是它匹配您添加到 `Post` 模型的自定义函数。函数返回的结果通过使用\
  \ `set()` 函数直接传递给视图。\n\n现在，要测试您的新函数，您需要创建 `Read` 视图文件。创建此文件，并添加 `debug()` 函数来查看\
  \ `$posts` 变量的内容。通过在 URL 中提供年份来启动该操作，如下所示：\n\n[`localhost/posts/read/2008`](http://localhost/posts/read/2008)\n\
  \n您的结果应包含一个数组，类似于清单 7-11。\n\n**清单 7-11.** `findByYear()` *函数返回的单条记录数组*\n\n```\n\
  Array\n(\n[0] => Array\n(\n[Post] => Array\n(\n[id] => 1\n[name] => 1.2 版本中的新功能\n\
  [date] => 2008-01-01 00:00:00\n => 暂无内容。\n[user_id] => 1\n)\n[User] => Array\n(\n\
  [id] => 1\n[name] => spiderman\n[email] => spidey@hero.com\n[firstname] => 彼得\n\
  [lastname] => 帕克\n)\n[Tag] => Array\n(\n[0] => Array\n(\n[id] => 1\n[name] => cakephp\n\
  [longname] => CakePHP 框架\n[PostsTag] => Array\n(\n[id] => 1\n[post_id] => 1\n[tag_id]\
  \ => 1\n)\n)\n)\n)\n)\n```\n\n数据库中每个包含与给定年份匹配的日期值的记录现在都将出现在此视图中。您在这里完成了几个重要的事情。首先，您严格遵守了约定，将扩展逻辑放在\
  \ `Post` 模型的自定义函数中，而不是使用控制器。您还在正确的位置使用了变量，允许用户在 URL 中指定任何年份。应用程序可以动态处理提供的任何值，如果需要，您甚至可以在不影响控制器或视图的情况下扩展函数以对有效年份进行测试。\n\
  \n### 裁剪结果\n\n\n\n想象你对一个存储了数千条记录的大型数据库运行了与上一节相同的查询。所有关联的模型都会被拉入数组中，导致处理过程变得极其庞大。在早期阶段，你通常只处理少量的测试数据，因此不会注意到自定义代码可能给服务器带来的负载。但是，如果你在访问量极大的网站上部署这个应用呢？在搜索所有关联时，该应用很可能会使服务器过载。出于这个原因，Cake\
  \ 提供了一些函数，可以通过动态解除关联来帮助精简结果。\n\n#### `unbindModel()` 函数\n\n在代码清单 7-11 中，返回了多行代码来描述数组中的关联模型。请记住，这仅仅是一条记录。所有这些行不仅会乘以返回的记录数，还会乘以分配给每条记录的关联标签数量。\n\
  \n存在加载冗余数据的可能性，尤其是在对“多对多”关联执行查询时。\n\n模型函数 `unbindModel()` 允许你临时解除 Post 模型与 Tag 模型之间的“多对多”关系。在\
  \ Post 模型的 `findByYear()` 函数中，你可以在执行数据库查询之前运行此函数，结果将发生显著变化。代码清单 7-12 展示了如何将此函数插入到\
  \ `findByYear()` 函数中。\n\n**代码清单 7-12.** *使用 `unbindModel()` 函数精简结果并减轻服务器负载*\n\n\
  ```\nfunction findByYear($year=null) {\n\n$date = $year.'-01-01 00:00:00';\n\n$end_date\
  \ = $year.'-12-31 23:59:59';\n\n$this->unbindModel(array('hasAndBelongsToMany'=>array('Tag')));\
  \ 5\n\nreturn $this->find('all',array('conditions'=>array('DATE(Post.date)'=>➥\n\
  \n'>'.$date,'DATE(Post.date)'=>'<'.$end_date)));\n\n}\n```\n\n代码清单 7-12 中的第 4 行展示了如何使用\
  \ `unbindModel()` 函数来解除 `hasAndBelongsToMany` 关联。此函数的一个重要方面是它只运行一次；换句话说，一旦第 5 行执行了\
  \ `find()` 查询，该关联将在所有后续的模型函数中恢复。\n\n现在重新加载 Read 动作并查看生成的数组：\n\n```\nArray\n\n(\n\
  \n[0] => Array\n\n(\n\n[Post] => Array\n\n(\n\n[id] => 1\n\n[name] => New Functions\
  \ in 1.2\n\n[date] => 2008-01-01 00:00:00\n\n => No content yet.\n\n[user_id] =>\
  \ 1\n\n)\n\n[User] => Array\n\n(\n\n[id] => 1\n\n[name] => spiderman\n\n[email]\
  \ => spidey@hero.com\n\n[firstname] => Peter\n\n[lastname] => Parker\n\n)\n\n)\n\
  \n)\n```\n\n*在查询运行时*，整个 Tag 关联被排除在外，这意味着服务器减少了检索所有 Tag 模型关联记录所需的负载。你获得了一个更精简的数组，只包含所需内容，这呼应了\
  \ Cake 的哲学：应该减轻负担，而非增加负担。\n\n`unbindModel()` 函数接受两个数组：一个包含所有要解除的关联，另一个用于指定模型本身。请注意，代码清单\
  \ 7-12 的第 4 行有一个包含“多对多”关系的数组，并且此关系被分配了一个包含所有可能具有该关联的模型的数组。你可以通过扩展数组来指定要从当前模型中解除绑定的一个或多个模型。\n\
  \n#### `bindModel()` 函数\n\n正如 `unbindModel()` 函数可以帮助你动态解除关联一样，`bindModel()` 也允许你动态添加关联。同样，此函数仅对一次查询生效，然后不再影响后续的其他模型函数。\n\
  \n此函数遵循与 `unbindModel()` 函数相同的语法，并包含两个数组：一个用于要绑定到当前模型的关联，另一个用于要分配给该关联的模型。\n\n```\n\
  $this->bindModel(array('hasMany'=>array('Tag')));\n```\n\n### Read 视图\n\n目前，Read\
  \ 视图只包含 `debug()` 函数来显示 `$posts` 数组的内容。\n\n使用 Cake 的 HTML 助手以及其他自定义 HTML，创建一个视图来包裹此数组。\n\
  \n### 总结\n\nMVC 结构对某些人来说可能有些棘手，但你应该能轻松掌握 Cake 对此类架构的运用。你探索了如何向模型和控制器添加自定义函数以扩展应用，并了解了由生成的（baked）动作和视图带来的逻辑。在接下来的章节中，你将深入挖掘并利用你的博客应用做出一些成果。在此过程中，你将引入其他有用的内置助手，并且在第\
  \ 3 部分中，你将使用其他可自定义的领域来增强应用的威力。如果你认为自己已经掌握了在模型、视图和控制器中工作的要领，那么恭喜你——你已经克服了学习 Cake\
  \ 过程中最困难的部分。\n\n# 实现 Ajax 特性\n\n近年来，Ajax 已成为热门网站处理请求的一种更常见的方法。简而言之，Ajax 使用户无需等待页面加载或刷新即可与网站进行交互。通过以这种方式处理\
  \ HTTP 请求，网站的行为更像一个桌面应用程序。那些曾被认为在 Web 浏览器中不可能实现的方法，不仅改变了互联网的格局，也正在扭转软件开发的趋势。许多开发者称这种现象为“Web\
  \ 2.0”的兴起。然而，构建一个丰富的 Web 2.0 应用程序并非易事，通常需要大量的 JavaScript。\n\n借助 Cake 的帮助，你可以轻松地将常见的\
  \ Ajax 流程引入到应用程序中，并且所需的 JavaScript 量将被最小化。\n\n在本章中，你将使用 Ajax 助手为你功能强大的博客应用构建一个评论部分。用户将能够添加评论，并对其他用户的评论进行点赞或点踩，所有这些操作都无需等待页面重新加载或刷新。在此过程中，我将提及\
  \ Ajax 助手的各种可能性，并介绍一些超出该助手范围的 Ajax 方法。本章不会深入探讨 Ajax 提供的所有可能性（因为这本身就足以写成一本书），但会解释\
  \ Ajax 如何在 Cake 应用中工作，并为你打开通往其他更复杂方法的大门，你可以自行尝试。\n\n让我们首先探讨 Ajax 的工作原理，然后使用它来改进你的博客。\n\
  \n### Ajax 的工作原理\n\n在第 6 章中，我讨论了异步序列以及 Cake 如何使用 `render()` 函数在不加载整个页面的情况下拉取视图。在你的博客应用中，你将使用\
  \ Ajax 以这种方式管理评论提交，这意味着用户提交评论后，他们将看到评论立即发布到页面上。换句话说，评论表单将消失，评论文本将出现在任何先前发布的评论下方，而页面上的其他所有内容都将保持不变。图\
  \ 8-1 展示了 Ajax 如何在后台工作以将评论添加到特定帖子。\n\n![Image 35](img/index-136_1.jpg)\n\n![Image\
  \ 36](img/index-136_2.jpg)\n\n![Image 37](img/index-136_3.jpg)\n\n**图 8-1.** *异步提交评论的\
  \ Ajax 流程*\n\n此图看起来与 Cake 中的典型流程几乎相同。但它有几个重要方面不同：\n\n1. 在此步骤中，当表单提交给控制器时，是使用 Ajax\
  \ 助手完成的。这意味着表单数据由 JavaScript 函数收集，并传递给控制器，而不会改变浏览器的状态。\n\n\n\n**2.** 控制器像处理典型响应一样处理表单数据。它将数据发送至模型保存，并检查无效数据。\n\
  \n**3.** 模型将数据保存至数据库，并返回成功响应。\n\n**4.** 控制器并未正常显示视图，而是使用 `render()` 函数将输出作为 Ajax\
  \ 响应传递。视图文件被正常获取，但其内容会被渲染到等待中的 HTML 元素内。换句话说，Ajax 辅助函数会监测响应，并将返回的任何内容放入指定的 HTML\
  \ 元素内（例如 `<div>` 或 `<span>` 元素）。\n\n**5.** 视图被发送回客户端，借助 JavaScript，它会在页面内显示，而不会像普通\
  \ HTTP 响应那样替换整个页面。\n\n在博客应用中，用户会在几个表单字段中输入数据，然后点击“提交”。表单将在后台被传递，因为 Ajax 辅助函数会拦截\
  \ HTTP 请求，并借助 JavaScript 完成所有服务器端处理，而无需刷新页面。你将在网页内部渲染视图，而不是替换页面，因为你将告知 Ajax 辅助函数在服务器响应后更新页面的哪个位置。这个区域将是整个评论区，让你能够动态地将用户的评论添加到帖子其余评论中，而无需刷新浏览器。\n\
  \n### 使用 Ajax 框架\n\n就像 Cake 有助于减少运行脚本所需的 PHP 代码量一样，一些 Ajax 框架也能减少执行 Ajax 方法所需的 JavaScript\
  \ 代码量。这些框架很有价值，因为处理 Ajax 可能极其复杂。最好利用开源 Ajax 框架，而不是翻开那本 500 页的 JavaScript 入门书。\n\n\
  一些最流行的 Ajax 框架包括：\n\n-   Prototype（[www.prototypejs.org](http://www.prototypejs.org)）\n\
  -   jQuery（[www.jquery.com](http://www.jquery.com)）\n-   Adobe Spry（[`labs.adobe.com/technologies/spry`](http://labs.adobe.com/technologies/spry)）\n\
  -   MooTools（[www.mootools.net](http://www.mootools.net)）\n\n这些框架都可以在 Cake 中使用，但\
  \ Ajax 辅助函数目前仅支持 Prototype。稍后，我将使用 jQuery 在 Cake 中运行一些 Ajax 方法，但那样做将不会用到 Ajax 辅助函数。\n\
  \n### 使用 Ajax 辅助函数\n\nCake 标准配备了 Ajax 辅助函数——这是一套精巧的方法，用于简化你在视图中输入的代码，使 Ajax 请求能够正常运行。与其他辅助函数一样，它拥有超过十几个有用的函数（见表\
  \ 8-1），调用这些函数通常可以将一个流程简化为单个字符串。\n\n**表 8-1.** Ajax 辅助函数中的函数\n\n| 函数 | 描述 |\n| ---\
  \ | --- |\n| `afterRender()` | 在视图渲染后包含代码块 |\n| `autoComplete()` | 创建一个自动完成的文本字段\
  \ |\n| `div()` | 创建一个用于 Ajax 更新的 `<div>` 元素 |\n| `divEnd()` | 关闭一个 Ajax 化的 `<div>`\
  \ 元素 |\n| `drag()` | 创建一个可拖拽的元素；需要 Scriptaculous 动画库 |\n| `drop()` | 创建一个可放置的元素；需要\
  \ Scriptaculous |\n| `dropRemote()` | 创建一个区域，当可拖拽元素被放置到其上时触发 Ajax 响应 |\n| `editor()`\
  \ | 创建一个编辑器控件，当用户触发时，该控件会替换原有元素；需要 Scriptaculous |\n| `form()` | 创建一个表单元素，提交时在后台运行\
  \ |\n| `isAjax()` | 如果当前请求是 Prototype 更新，则返回 true |\n| `link()` | 创建一个链接以运行 Ajax\
  \ 调用 |\n| `observeField()` | 当被观察的字段发生变化时触发 Ajax 响应 |\n| `observeForm()` | 观察表单，并在其发生变化时触发\
  \ Ajax 响应 |\n| `remoteFunction()` | 创建要运行的 Ajax 函数，通常与 `link()` 事件结合使用 |\n| `remoteTimer()`\
  \ | 在指定的时间间隔触发 Ajax 响应 |\n| `slider()` | 创建一个滑块控件；需要 Scriptaculous |\n| `sortable()`\
  \ | 使列表或其他对象可排序；需要 Scriptaculous |\n| `submit()` | （原文中缺少函数描述） |\n\n\n\n### Ajax\
  \ 表单提交\n\n渲染一个触发 Ajax 表单提交的提交按钮。\n\n与所有其他助手一样，`Ajax` 助手必须通过在 `var $helpers` 数组中将其作为值包含来在控制器中初始化：\n\
  \n```\nvar $helpers = array('Html','Form','Ajax');\n```\n\n然后，在视图中，通过使用 `$ajax`\
  \ 对象调用 `Ajax` 助手函数。例如：\n\n```\n$ajax->submit();\n```\n\n当然，根据所使用的函数，会向该函数传递参数。\n\
  \n```\n$ajax->submit('Submit',array('url'=>'/comments/add','update'=>'comments_add'));\n\
  ```\n\n### 准备 Ajax 助手\n\n在使用 `Ajax` 助手之前，必须执行对该助手来说独一无二的一两个重要步骤。因为它依赖于 `Prototype`，必须确保在每个页面中包含了\
  \ `Prototype` JavaScript 文件。还需要使这些脚本对所有可能使用 `Ajax` 助手的视图可访问。\n\n#### 安装 Prototype\n\
  \n从 [www.prototypejs.org/download](http://www.prototypejs.org/download) 下载最新版本的\
  \ `Prototype`。你应该会得到一个类似 `prototype-1.x.x.x.js` 的 JavaScript 文件。将此文件放在 `app/webroot/js`\
  \ 文件夹中。现在整个应用程序都可以访问它了。要完成 `Prototype` 的安装，需要编辑默认布局。在 `app/views/layouts/default.ctp`\
  \ 文件的 `<head>` 标签之间某处，包含以下行：\n\n```\n$javascript->link(array('prototype'));\n```\n\
  \n这里，你正在使用 `JavaScript` 助手生成指向该 JavaScript 文件的链接。这些链接在网页中呈现为类似这样的内容以包含该脚本：\n\n```\n\
  <script type=\"text/javascript\" src=\"/js/prototype.js\"></script>\n```\n\n当然，`JavaScript`\
  \ 助手会自动生成指向 JavaScript 文件的正确 URL。\n\n#### 在应用程序控制器文件中包含 JavaScript 助手\n\n如果你刷新了应用程序，可能会注意到以下错误：`Undefined\
  \ variable: javascript [APP/views/layouts/default.ctp, line 5]`。\n\n只要助手未正确初始化，就会发生此错误。在这种情况下，你正尝试在布局文件中使用一个助手，并且由于默认布局旨在被所有控制器调用，因此你将需要在所有控制器中初始化\
  \ `JavaScript` 助手。\n\n有一种方法可以避免逐个进入每个控制器。通过创建你自己的 `App` 控制器文件，你可以将供所有控制器使用的函数放置在其中，从而减少冗余代码。然而，要做到这一点，需要使用一些约定，以便\
  \ Cake 能够识别 `App` 控制器。\n\n`App` 控制器的位置是 `app/app_controller.php`。像其他控制器一样，该文件必须包含适当的\
  \ PHP 代码来创建一个新的 `App` 控制器对象实例：\n\n```\n<?\nclass AppController extends Controller\
  \ {\n\n}\n?>\n```\n\n#### 使助手对整个应用程序可用\n\n在 `App` 控制器中，你也可以包含任何可能在任何或所有控制器中使用的助手。这就像在单个控制器中一样，通过在\
  \ `var $helpers` 属性数组中分配一个助手列表来完成。\n\n为了你的博客应用，让我们继续包含你将需要使用到的所有助手。将以下行插入到新的 `App`\
  \ 控制器的第 3 行：`var $helpers = array('Html','Form','Ajax','Javascript');`。\n\n默认布局文件中的\
  \ `$javascript->link()` 函数现在应该可以正常工作了。\n\n通常，当在布局中使用助手时，你应该使用 `App` 控制器来包含这些助手；这将使你不必在每个控制器中都进行助手的包含操作。\n\
  \n### 向博客添加评论\n\n在你能够使用 `Ajax` 助手处理用户评论之前，你需要创建数据库表来存储评论。在数据库中创建一个名为 `comments`\
  \ 的新表，并创建如清单 8-1 所示的字段。\n\n**清单 8-1.** *用于创建* `comments` *表的 SQL*\n\n```\nCREATE\
  \ TABLE `comments` (\n`id` int(11) unsigned NOT NULL auto_increment,\n`name` varchar(255)\
  \ default NULL,\n`content` text,\n`post_id` int(11) unsigned,\nPRIMARY KEY (`id`)\n\
  );\n```\n\n接下来，使用清单 8-2 中的代码创建 `Comment` 模型。\n\n**清单 8-2.** *`Comment` 模型*\n\n```\n\
  <?\nclass Comment extends AppModel {\nvar $name = 'Comment';\nvar $belongsTo = array('Post');\n\
  }\n?>\n```\n\n注意，此模型具有与 `Post` 模型的 `belongsTo` 关联。要绑定此关联，你将需要编辑 `Post` 模型以包含“has\
  \ many”关系。打开 `Post` 模型，并插入以下行以完成关联：`var $hasMany = array('Comment');`。\n\n为了稳妥起见，在\
  \ `app/controllers/comments_controller.php` 中创建 `Comments` 控制器，并粘贴清单 8-3 中的代码。\n\
  \n**清单 8-3.** *Comments 控制器*\n\n```\n<?\nclass CommentsController extends AppController\
  \ {\nvar $name = 'Comments';\n}\n?>\n```\n\n现在 `Comments` 控制器以及匹配的表和模型已准备好，可以在应用程序中使用了。现在，你可以通过在\
  \ `Posts` 视图和控制器中插入一些 `Ajax` 助手代码，将评论功能整合到博客中。\n\n### 在视图中集成 Ajax\n\n使用 `Ajax` 助手要求\
  \ `Prototype` 框架被包含在网页中。你已经通过将 `Prototype` 脚本安装在 `app/webroot/js` 文件夹中，并提供在 `app/views/layouts/default.ctp`\
  \ 文件中指向该文件的链接完成了此操作。你还已在 `App` 控制器中使该助手可用。现在，将 Ajax 集成到将要使用该助手的单个视图中就变得容易了。\n\n\
  #### 显示评论\n\n请记住，Ajax 输出将被插入到你选择的 HTML 元素中。你在视图中用于处理此输出的任何元素都是所有操作发生的地方。`<div>`\
  \ 和 `<span>` 元素分别适用于任何通用的块级或内联内容。让我们创建一个 `<div>` 来处理 `Posts` 视图中所有评论的 Ajax 输出。\n\
  \n打开 `app/views/posts/view.ctp`，在文件底部创建 `<div>` 作为 Ajax 处理的目标。\n\n在清单 8-4 中，我在第\
  \ 9 行为评论的迭代以及用于提交新评论的 Ajax 表单预留了空间。为了拉取相关联的评论并使其在此处可用，你将需要编辑 `Posts` 控制器中的 `View`\
  \ 操作。\n\n**清单 8-4.** *向 Posts 视图添加评论部分*\n```\n6\n<hr/>\n<h2>评论</h2>\n<div id=\"\
  comments\">\n</div>\n```\n\n清单 8-5 几乎与之前相同，只是我调整了第 6 行之后的几行。第 7 行获取请求的文章记录，第 8 行获取与当前文章相关联的评论。第\
  \ 9 行使用 `set()` 函数将这些变量传递给视图。\n\n**清单 8-5.** *调整后的 View 操作，为视图提供相关联的评论*\n```\n1\n\
  function view($id = null) {\nif (!$id) {\n$this->Session->setFlash('不合法的文章');\n\
  $this->redirect(array('action'=>'index'));\n}\n$post = $this->Post->read(null,$id);\n\
  $comments = $this->Post->Comment->find('all',array('conditions'=>array(\n'Post.id'=>$id)));\n\
  $this->set(compact('post','comments'));\n10 }\n```\n\n回到清单 8-4 的第 9 行，你现在可以插入一个循环来显示\
  \ `$comments` 数组的内容（参见清单 8-6）。\n\n**清单 8-6.** *Posts 视图中的评论循环*\n```\n<? foreach($comments\
  \ as $comment): ?>\n10 <div class=\"comment\">\n<p><b><?=$comment['Comment']['name'];?></b></p>\n\
  12 <p><?=$comment['Comment']['content'];?></p>\n13\n</div>\n<? endforeach;?>\n```\n\
  \n该循环遵循清单 8-5 第 8 行中 `find()` 结果的传统结构。\n\n\n\n注意`listing 8-6`处数组的格式包含了`Comment`键，对应`Comment`模型名称以及`name`和`content`键，与表中的字段匹配。我还在第\
  \ 10 行和第 13 行实例化了一个`<div>`元素，以便使用 CSS 进行更好的显示设计。\n\n在数据库中创建一些测试评论，然后刷新此文章页面。您应该会看到类似图\
  \ 8-2 的界面。\n\n![Image 38](img/index-142_1.jpg)\n\n09775ch08final 7/1/08 9:47 PM\
  \ Page 120\n\n**120**\n\n**第 8 章 ■ 实现 AJAX 特性**\n\n**图 8-2.** *评论现在显示在文章视图中*\n\n\
  ### 使用 Ajax 表单\n\n现在，在`app/views/posts/view.ctp`文件的第 14 行之后，您可以包含一个用于添加评论的表单。在这样做时，您将使用`Ajax`助手，以便当用户提交评论时，它能够更新`<div\
  \ id=\"comments\">`元素，而无需刷新整个屏幕。\n\n为了将 Ajax 功能融入此视图，请将清单 8-7 中显示的 Ajax 表单插入视图文件。\n\
  \n**清单 8-7.** *添加评论表单*\n\n```\n15 <?=$ajax->form('/comments/add','post',array('update'=>'comments'));?>\
  \ \n16 <?=$form->input('Comment.name');?>\n   <?=$form->input('Comment.content');?>\n\
  18 <?=$form->input('Comment.post_id',array('type'=>'hidden','value'=>➥\n   $post['Post']['id']));?>\n\
  19 <?=$form->end('Add Comment');?>\n```\n\n09775ch08final 7/1/08 9:47 PM Page 121\n\
  \n第 8 章 ■ 实现 AJAX 特性\n\n**121**\n\n清单 8-7 中的第 15 行为您完成了所有 Ajax 魔法。请注意，您在`$ajax->form()`函数中提供的参数告诉它首先将表单数据发送到`Comments`控制器中的`Add`操作。\n\
  \n第二个参数指定发送表单数据时使用的方法。当前设置为`post`，但如果需要，可以更改为`get`。\n\n第三个参数是选项数组，包含对应于函数中可能功能的键和值。在这里，您将值`comments`分配给了键`update`。\n\
  \n这意味着`$ajax->form()`将更新 ID 为`comments`的`<div>`元素。您已经在视图文件的第 8 行创建了`<div id=\"comments\"\
  >`。\n\n第 16-19 行的工作方式类似于典型的 Cake 表单元素；它们使用`Form`助手来创建与`comments`表中字段相对应的字段。请注意，我在字段名称中包含了模型名称（`Comment.`），以指定这些字段是`Comment`模型的一部分，而不是当前的`Post`模型。\n\
  \n第 16-19 行中唯一棘手的事情是在第 18 行如何将当前文章 ID 传递给`Comments`控制器。简单来说，您创建了一个隐藏的表单元素，其名称与`comments`表中的`post_id`字段相同，并将其值赋为`$post['Post']['id']`变量中的内容。\n\
  \n就是这样！当用户访问博客中的一篇文章时，他们将看到先前提交的评论列表，以及一组用于提交自己评论的表单字段。当用户点击“添加评论”时，表单将在后台提交。\n\n\
  此时，唯一的问题是——`Comments`控制器尚未准备好处理提交的表单。下一步是通过调整`Add`操作将 Ajax 功能融入此控制器中。\n\n### 将 Ajax\
  \ 融入控制器\n\n当前的`Comments`控制器仅包含`$name`属性。让我们为其添加`Add`操作，但要考虑到 Ajax（请参见清单 8-8）。\n\n\
  **清单 8-8.** *Comments 控制器中的 Add 操作*\n\n```\nfunction add() {\n    if (!empty($this->data))\
  \ {\n        $this->Comment->create();\n        if ($this->Comment->save($this->data))\
  \ {\n            $comments = $this->Comment->find('all',array('conditions'=>➥\n\
  \                array('post_id'=>$this->data['Comment']['post_id']),'recursive'=>-1));\n\
  \            $this->set(compact('comments'));\n            $this->render('add_success','ajax');\n\
  \        } else {\n            $this->render('add_failure','ajax');\n        }\n\
  \    }\n}\n```\n\n09775ch08final 7/1/08 9:47 PM Page 122\n\n**122**\n\n**第 8 章 ■\
  \ 实现 AJAX 特性**\n\n清单 8-8 的第 1-4 行与生成的`Add`操作完全相同：它们检查在已解析的`$this->data`数组中是否提供了数据，如果提供了数据，则会在数据库中创建一条新记录，并在模型中运行`save()`函数将数据插入新的数据库记录，然后检查模型返回的成功结果。当保存成功时，执行第\
  \ 5-7 行；仅当保存失败时，才调用第 9 行。（如果需要，您可以在模型中运行数据验证，控制器将准备好处理结果。）\n\n因此，假设提供的评论成功保存，那么您将希望获取数据库中的所有评论（包括新添加的那条），并将它们显示在`<div\
