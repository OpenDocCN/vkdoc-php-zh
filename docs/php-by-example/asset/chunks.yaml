    ## 私有字段与方法


    之前的示例使用了公共字段和方法。其“公有性”允许在类代码外部访问它们。然而，将字段或方法设为私有通常是合理且方便的。这样的类成员使用 `private` 关键字描述，并且只能在类代码内部访问。这能给我们带来什么？关键在于，类的私有成员更难以“非预期”的方式被使用。换句话说，如果一个字段或方法用于解决辅助性的常规任务，并且不打算面向“最终用户”，那么最好“隐藏”这样的字段或方法。清单
    7-7 说明了这种情况。


    ```

    code;

    }

    // 为字段赋值的方法：

    function set($code){

    $this->code=$code;

    }

    // 私有构造函数：

    private function __construct($code){

    $this->set($code);

    }

    // 用于创建对象的静态方法：

    static function create($code){

    return new self($code);

    }

    }

    // 创建一个对象：

    $obj=MyClass::create(100);

    // 检查字段：

    echo "字段: ",$obj->get(),"\n";

    // 为字段赋值：

    $obj->set(200);

    // 检查字段：

    echo "字段: ",$obj->get(),"\n";

    ?>

    清单 7-7

    类的私有成员

    ```


