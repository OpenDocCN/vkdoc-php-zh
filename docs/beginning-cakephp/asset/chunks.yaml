    **设计不良的数据库**


    雄心勃勃的 Web 应用程序无疑需要复杂的数据库设计。开发者常常试图将所有数据塞进一个字段，而不在表之间建立关联。或者，有些开发者不存储指向另一个表中记录的引用，而是编写脚本将信息写入文本字段。更糟的是，有些开发者在网站的
    HTML 中编写静态列表，并根据列表在应用程序中出现的位置手动更改列表。这些方法不仅使应用程序代码的更新更加繁琐且可移植性差，而且不符合 Cake 快速开发方法的范式。设计不良的数据库会对
    Cake 的快速开发特性产生不利影响，导致错误或死胡同，从而浪费时间，迫使你适应一个糟糕的数据库。


    **为什么良好的数据库设计很重要**


    Cake 的许多快速开发功能源于与数据库设计紧密相关的约定。良好的数据库设计不仅对脚手架功能或 Cake 控制台至关重要，它更是 Cake 数据处理的核心与基石。


    不同类型数据之间的交互将影响在整个应用程序中使用这些数据所需的时间。理论上，数据库应将数据分为相互协作的类别，而不是由 MVC 结构将操作的角色分离到不同的区域。


    Cake 的命名约定和模型函数依赖于数据库范式化的过程。范式化是一种设计关系型数据库表的技术，旨在最小化数据冗余并保护数据库免受结构性问题的影响。通过规范化数据库，你可以生成一个有效的模式，从而改进
    Cake 应用程序，并避免可能导致数据处理错误的数据异常。


    为了对比设计不良与良好的数据库设计，或者说，解释为什么数据库范式化如此重要，我将讨论一个社交网络应用程序的场景。对于为用户提供个人网页的网站，需要存储大量数据。一个设计不良的数据库会为每个用户的个人资料创建一个记录，并为个人资料中的每个项目设置一个字段：用户名、电子邮件地址、主页地址、喜爱的书籍1、喜爱的书籍2、图片、头像尺寸图片、标语、描述、朋友1、朋友2，等等。当通过
    URL 获取用户个人资料时，一个糟糕的数据库不会有任何类型的唯一 ID，因此记录会通过用户名来提取。


    这种场景是有问题的，因为字段数量是静态的。用户无法添加超过两本书或两个朋友，除非开发者手动添加更多字段。而且，随着开发者向应用程序添加更多功能，字段数量会迅速膨胀。大量的字段会使后端数据库维护变得令人沮丧。像`favorite_book_1`这样的字段名很笨拙，并且在处理数据时使得代码组织更加困难。此外，如果没有唯一标识符来区分个人资料记录，则存在用户名可能重复的可能性，从而破坏旨在获取用户个人资料的查询。理论上，如果没有记录的某种唯一标识符，该记录可能会永久丢失在数据库中而无法检索。


