    \n## Recipe 3-12. Working with Complex Numbers\n\n### Problem\n\nPHP and many\
    \ other programming languages do not handle complex numbers natively. Working\
    \ with and calculating impedance of electronic circuits require the use of complex\
    \ numbers.\n\n### Solution\n\nPHP does not support operator overloading and there\
    \ is no support for complex numbers, but it’s still possible to create objects\
    \ that can be used to handle the various operations of complex math.\n\n### How\
    \ it Works\n\nComplex numbers have two parts and they can be represented as an\
    \ object with a real and an imaginary part. They are often written as `r + i*j`\
    \ where `r` is the real part, `j` is the imaginary part, and `i` is the imaginary\
    \ number from taking the square root of -1. The following example implements addition,\
    \ subtraction, and a magic function to handle using the object in a string context.\n\
    \n```php\n<?php\n// 3_26.php\n\nclass Complex {\n    public $re;\n    public $im;\n\
    \n    function __construct($re, $im) {\n        $this->re = $re;\n        $this->im\
    \ = $im;\n    }\n\n    static function Add(Complex $c1, Complex $c2) {\n     \
    \   return new Complex($c1->re + $c2->re, $c1->im + $c2->im);\n    }\n\n    static\
    \ function Subtract(Complex $c1, Complex $c2) {\n        return new Complex($c1->re\
    \ - $c2->re, $c1->im - $c2->im);\n    }\n\n    function __toString() {\n     \
    \   return $this->re . \" + \" . $this->im . \"i\";\n    }\n}\n\n$c1 = new Complex(1,\
    \ -2);\n$c2 = new Complex(3, 5);\n$c3 = Complex::Add($c1, $c2);\n$c4 = Complex::Subtract($c2,\
    \ $c1);\n\necho \"$c1\\n$c2\\n\";\n```\n\n-1i  \n8i\n\nThis is a simple implementation\
    \ of complex math and it only implements addition and subtraction. For a more\
    \ complete implementation take a look at the PEAR module `Math_Complex` at [http://pear.php.net/package/Math_Complex/](http://pear.php.net/package/Math_Complex/).\n\
    \n## MATH EXTENSIONS\n\nBy installing the extensions GNU MP (`gmp`) and/or Binary\
    \ Calculator Math (`bcmath`) it will become possible to work on numbers larger\
    \ than the precision of the PHP version used. The numbers will be represented\
    \ as strings. The `gmp` extension is used for arbitrary length integers and `bcmath`\
    \ is used for arbitrary precision numbers.\n\n# CHAPTER 4  \n## Working with Arrays\n\
    \nArrays play a central role in PHP programming. Many functions return arrays\
    \ and they are often used to handle configuration. The basic array is a list of\
    \ key and value pairs where the key can be an integer or a string and the value\
    \ can be any variable type, including arrays.\n\n## Recipe 4-1. Creating Arrays\n\
    \n### Problem\n\nArrays are treated as a fundamental data type in PHP. There are\
    \ no functions to call or objects that must be instantiated to create variables\
    \ with array values.\n\n### Solution\n\nPHP uses the language construct `array()`\
    \ to create arrays. If you assign the value `array()` to a variable you create\
    \ an empty array or an array without any elements. It is also possible to include\
    \ a comma-separated list of `key => value` pairs between the parentheses to create\
    \ an array that’s already populated with values. If the keys are omitted from\
    \ the definition PHP will assign numerical values starting at 0 as the keys.\n\
    \nAs stated above, the keys can be either integers or strings. If other types\
    \ of keys are used PHP will perform an automatic type conversion. Floating point\
    \ and Boolean values will be converted to integers.\n\nThe `null` value will be\
    \ converted to the empty string and valid numerical strings like `\"7\"` will\
