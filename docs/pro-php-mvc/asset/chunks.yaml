    the latest version of MAMP & MAMP PRO. Extract the contents of the downloaded
    archive and run the appropriate installer (32-bit or 64-bit).


    The installer will place a MAMP folder within your Applications folder, and needs
    administrative privileges to do so. You will be prompted to provide an administrator
    password. When you open the MAMP application (which should now be in your Applications
    folder), you will easily be able to stop/start the servers, and view the landing
    page for your local web server (see Figure [A-19](#index_split_007.html#p449)).
    You can set the default ports to 80/3306 (see Figure [A.20](#index_split_007.html#p449)),
    as you would have them in Windows 7/Linux, and you can also select the appropriate
    version of PHP to run (you should select PHP 5.3+). Finally, you can also set
    the correct DocumentRoot folder from the Apache tab.


