- fmt: "# Chapter 16: Using MySQL Databases\n\nThe table that contains albums is missing\
    \ some information. So far only albums from a single band are added, but what\
    \ if additional bands are to be added? The simple solution is to add an extra\
    \ character column to the `album` table. This will allow insertion of a text value\
    \ with each record. Using a text column makes it possible to use different values\
    \ for each record, even if it’s the same band. In this case we could use \"The\
    \ Beatles,\" \"Beatles,\" \"Beatles, The,\" and many other combinations. This\
    \ could make it difficult to find all albums from a single band.\n\nTo solve this\
    \ problem we can create a new table called `artist` and link the `album` table\
    \ to this table.\n\nThe SQL to perform these actions looks like this:\n\n```sql\n\
    create table artist (\n    id int auto_increment,\n    artist_name varchar(250)\
    \ not null,\n    description varchar(2000),\n    primary key(id)\n);\n```\n\n\
    And the SQL to update the `album` table with an extra column that will allow linking\
    \ to the `artist` table:\n\n```sql\nalter table album add artist_id int;\nalter\
    \ table album add foreign key(artist_id) references artist(id);\n```\n\nThe first\
    \ statement changes the column definition for the `album` table and the second\
    \ creates a foreign key relation between `album` and `artist`. This relation will\
    \ prevent deletion of an artist if one or more albums exist with a link to that\
    \ artist.\n\nSo far only albums from The Beatles were created in the `albums`\
    \ table. We can then create them as an artist and link the albums to the new artist.\n\
    \n```sql\ninsert into artist (artist_name) values ('The Beatles');\nupdate album\
    \ set artist_id=1;\n```\n\nIn this case the first artist added will get the `id=1`\
    \ so the link will be made by setting `artist_id=1` for all rows in the `album`\
    \ table.\n\nWe can now expand the class to allow insertion of new artists and\
    \ albums and to return `artist_name` as part of the query.\n\n```php\n<?php\n\
    // 16_8.php\nini_set('display_errors', 1);\n\nclass music extends mysqli {\n \
    \   function __construct() {\n        parent::__construct('127.0.0.1', 'php',\
    \ 'secret', 'music');\n        if ($this->connect_error) {\n            die(\"\
    Unable to connect to music\\n\");\n        }\n    }\n\n    function addArtist($name,\
    \ $description = null) {\n        $n = $this->real_escape_string($name);\n   \
    \     if ($description) {\n            $d = $this->real_escape_string($description);\n\
    \            $sql = \"insert into artist (artist_name, description) values ('$n',\
    \ '$d')\";\n        } else {\n            $sql = \"insert into artist (artist_name)\
    \ values ('$n')\";\n        }\n        $this->Query($sql);\n        return $this->insert_id;\n\
    \    }\n\n    function getArtists() {\n        $artists = [];\n        $sql =\
    \ \"select * from artist\";\n        $result = $this->Query($sql);\n        if\
