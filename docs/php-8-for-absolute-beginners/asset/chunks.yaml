    Fortunately, the development community has responded to the frustration of beginning
    developers with many software packages that take all the pain out of setting up
    your development environment, whether you create applications for Windows, Mac,
    or Linux machines. These options include all-in-one solutions for setting up Apache,
    MySQL, and PHP. We refer to these packages as *LAMP* (Linux, Apache, MySQL/MariaDB,
    PHP), *WAMP* (Windows, Apache, MySQL/MariaDB, PHP), and *MAMP* (MacOS, Apache,
    MySQL/MariaDB, PHP) stacks.


    As of the end of 2021, some of the most popular and best packages included:


    * *AMPPS*: Provides LAMP, WAMP, and MAMP versions – `www.ampps.com`

    * *WAMPSERVER*: Provides only a WAMP version – `www.wampserver.com`

    * *XAMPP*: Provides LAMP, WAMP, and MAMP versions – `www.apachefriends.org`

    * *Neard*: Provides a WAMP-only version – `www.neard.io`

    * *WAMP.NET*: Provides a WAMP-only version – `www.wamp.net`

    * *EasyPHP*: Provides only a WAMP version – `www.easyphp.org`


    **Exercise**: Go to each of the preceding websites and explore what is included
