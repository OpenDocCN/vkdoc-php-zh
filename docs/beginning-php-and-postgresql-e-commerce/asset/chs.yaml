- "# 第 7 章 目录管理\n\n## 223\n\n## 练习：实现业务层\n\n现在是实现新方法的时候了。将以下代码添加到`business/catalog.php`文件中的`Catalog`类：\n\
  \n```php\n// Retrieves all departments with their descriptions\npublic static function\
  \ GetDepartmentsWithDescriptions()\n{\n  // Build the SQL query\n  $sql = 'SELECT\
  \ * FROM catalog_get_departments();';\n  // Prepare the statement with PDO-specific\
  \ functionality\n  $result = DatabaseHandler::Prepare($sql);\n  return DatabaseHandler::GetAll($result);\n\
  }\n\n// Updates department details\npublic static function UpdateDepartment($departmentId,\
  \ $departmentName, $departmentDescription)\n{\n  // Build the SQL query\n  $sql\
  \ = 'SELECT catalog_update_department(:department_id, :department_name,\n      \
  \    :department_description);';\n  // Build the parameters array\n  $params = array\
  \ (':department_id' => $departmentId,\n                   ':department_name' =>\
  \ $departmentName,\n                   ':department_description' => $departmentDescription);\n\
  \  // Prepare the statement with PDO-specific functionality\n  $result = DatabaseHandler::Prepare($sql);\n\
  \  // Execute the query\n  return DatabaseHandler::Execute($result, $params);\n\
  }\n\n// Deletes a department\npublic static function DeleteDepartment($departmentId)\n\
  {\n  // Build the SQL query\n  $sql = 'SELECT catalog_delete_department(:department_id);';\n\
  \  // Build the parameters array\n  $params = array (':department_id' => $departmentId);\n\
  \  // Prepare the statement with PDO-specific functionality\n  $result = DatabaseHandler::Prepare($sql);\n\
  \  // Execute the query and return the results\n  return DatabaseHandler::GetOne($result,\
