  trans: '

    # PHP 方案 4-1：将菜单和页脚移至包含文件


    我们将把图 4-1 所示的页面转换为使用包含文件。因为菜单和页脚出现在日本之旅网站的每个页面上，所以它们是包含文件的最佳候选。清单 4-1 显示了页面主体的代码，其中菜单和页脚以粗体突出显示。


    **清单 4-1.** `index.php` 的静态版本


    ```

    <header>

    <h1>日本之旅</h1>

    </header>

    <div id="wrapper">

    <ul id="nav">

    <li><a href="index.php" id="here">首页</a></li>

    <li><a href="blog.php">日志</a></li>

    <li><a href="gallery.php">画廊</a></li>

    <li><a href="contact.php">联系</a></li>

    </ul>

    <main>

    <h2>用 PHP 穿越日本之旅</h2>

    <p>使用 PHP 的好处之一……</p>

    <figure>

    <img src="images/water_basin.jpg" alt="龙安寺的水盆"

    width="350" height="237">

    <figcaption>龙安寺的水盆</figcaption>

    </figure>

    <p>Ut enim ad minim veniam, quis nostrud . . .</p>

    <p>Eu fugiat nulla pariatur. Ut labore et dolore . . .</p>

    <p>Sed do eiusmod tempor incididunt ullamco . . .</p>

    </main>

    <footer>

    <p>&copy; 2006&ndash;2014 大卫·鲍尔斯</p>

    </footer>

    </div>

    ```


    将 `ch04` 文件夹中的 `index_01.php` 复制到 `phpsols` 站点根目录，并重命名为 `index.php`。如果你使用的是 Dreamweaver
    等提供更新页面链接功能的程序，请勿更新它们。下载文件中的相对链接是正确的。通过在浏览器中加载 `index.php`，检查 CSS 和图片是否正常显示。它应该与图
    4-1 相同。


    将 `ch04` 文件夹中的 `blog.php`、`gallery.php` 和 `contact.php` 复制到你的站点根目录。这些页面目前还无法在浏览器中正确显示，因为所需的包含文件尚未创建。不过很快就会解决。


    在 `index.php` 中，选中清单 4-1 中以粗体显示的 `nav` 无序列表，然后将其剪切（Ctrl+X/Cmd+X）到你的计算机剪贴板。


    在 `includes` 文件夹中创建一个名为 `menu.php` 的新文件。删除编辑程序插入的任何代码；该文件必须完全空白。


    将剪贴板中的代码粘贴（Ctrl+V/Cmd+V）到 `menu.php` 中并保存文件。`menu.php` 的内容应如下所示：


    ```

    <ul id="nav">

    <li><a href="index.php" id="here">首页</a></li>

    <li><a href="blog.php">日志</a></li>

    <li><a href="gallery.php">画廊</a></li>

    <li><a href="contact.php">联系</a></li>

    </ul>

    ```


    不用担心你的新文件没有 `DOCTYPE` 声明或任何 `<html>`、`<head>` 或 `<body>` 标签。包含此文件内容的其他页面会提供这些元素。


    打开 `index.php`，在 `nav` 无序列表留下的空间中插入以下内容：


    ```

    <?php require ''./includes/menu.php''; ?>

    ```


    这使用了指向 `menu.php` 的文档相对路径。在路径开头使用 `./` 效率更高，因为它明确表示路径从当前文件夹开始。


    > **提示：** 我使用 `require` 命令是因为导航菜单至关重要。没有它，就无法在网站中导航。


    保存 `index.php` 并在浏览器中加载该页面。它应该与之前完全一样。尽管菜单和页面的其余部分来自不同的文件，但 PHP 在向浏览器发送任何输出之前会将它们合并。


    > **注意：** 别忘了 PHP 代码需要由 Web 服务器处理。如果你将文件存储在服务器文档根目录的子文件夹 `phpsols` 中，则应使用 URL
    `http://localhost/phpsols/index.php` 访问 `index.php`。如需查找服务器文档根目录的帮助，请参阅第 2 章中的“在哪里放置你的
    PHP 文件（Windows 和 Mac）”。


    对 `footer` 执行相同操作。剪切清单 4-1 中以粗体显示的行，并将其粘贴到 `includes` 文件夹中一个名为 `footer.php` 的空白文件中。然后在
    `<footer>` 留下的间隙中插入包含新文件的命令：


    ```

    <?php include ''./includes/footer.php''; ?>

    ```


    这次我使用了 `include` 而不是 `require`。`<footer>` 是页面的重要组成部分，但如果找不到包含文件，网站仍然可以使用。


    保存所有页面，并在浏览器中重新加载 `index.php`。它应该看起来与原始页面完全相同。如果你导航到网站中的其他页面，菜单和页脚应该会出现在每个页面上。包含文件中的代码现在正在为所有页面提供服务。


    为了证明菜单来自单个文件，请更改 `menu.php` 中“日志”链接的文本，如下所示：


    ```

    <li><a href="blog.php">博客</a></li>

    ```


    保存 `menu.php` 并重新加载网站。此更改会反映在所有页面上。你可以对照 `ch04` 文件夹中的 `index_02.php`、`menu_01.php`
    和 `footer_01.php` 检查你的代码。


    如图 4-2 所示，当前的代码存在一个问题。即使你离开首页导航到其他页面，指示当前所在页面的样式也不会改变（它由 `<a>` 标签中的 `here` ID
    控制）。


    ![A978-1-4842-0635-5_4_Fig2_HTML.jpg](img/A978-1-4842-0635-5_4_Fig2_HTML.jpg)


    **图 4-2.** 当前页面指示器仍指向首页


    幸运的是，通过一点 PHP 条件逻辑可以轻松解决这个问题。在此之前，我们先来看看 Web 服务器和 PHP 引擎如何处理包含文件。


    ## 为包含文件选择正确的文件扩展名


    正如你刚刚看到的，包含文件可以包含原始 HTML。当 PHP 引擎遇到包含命令时，它会在外部文件的开头停止处理 PHP，并在末尾继续处理。如果希望外部文件使用
    PHP 代码，则代码必须包含在 PHP 标签中。由于外部文件作为包含它的 PHP 文件的一部分进行处理，因此包含文件可以使用任何文件扩展名。


    一些开发者使用 `.inc` 作为文件扩展名，以明确表示该文件旨在被包含在另一个文件中。然而，大多数服务器将 `.inc` 文件视为纯文本。如果该文件包含敏感信息（例如数据库的用户名和密码），这会带来安全风险。如果该文件存储在网站根文件夹中，任何发现该文件名称的人只需在浏览器地址栏中键入
    URL，浏览器就会乖乖地显示所有秘密细节！


    另一方面，任何带有 `.php` 扩展名的文件都会在发送到浏览器之前自动发送给 PHP 引擎进行解析。只要你的秘密信息位于 PHP 代码块内且文件扩展名为
    `.php`，就不会被暴露。这就是为什么一些开发者使用 `.inc.php` 作为 PHP 包含文件的双重扩展名。`.inc` 部分提醒你这是一个包含文件，但服务器只关心末尾的
    `.php`，这确保了所有 PHP 代码都能被正确解析。


    在很长一段时间里，我遵循使用 `.inc.php` 作为包含文件扩展名的惯例。但由于我将所有包含文件存储在一个名为 `includes` 的单独文件夹中，我认为双重扩展名是多余的。现在我只使用
    `.php`。


    选择哪种命名约定由你决定，但单独使用 `.inc` 是安全性最低的。

    '
- fmt: '## PHP Solution 4-2: Testing the Security of Includes


    This solution demonstrates the difference between using `.inc` and `.php` (or
    `.inc.php`) as the filename extension for an include file. Use `index.php` and
    `menu.php` from the previous section. Alternatively, use `index_02.php` and `menu_01.php`
    from the `ch04` folder. If you use the download files, remove the `_02` and `_01`
    from the filenames before using them.


    Rename `menu.php` to `menu.inc` and edit `index.php` accordingly to include it:


    ```

    <?php require ''./includes/menu.inc''; ?>

    ```


    Load `index.php` into a browser. You should see no difference.


    Amend the code inside `menu.inc` to store a password inside a PHP variable, like
    this:


    ```

    <ul id="nav">

    <li><a href="index.php" id="here">Home</a></li>

    <?php $password = ''topSecret''; ?>

    <li><a href="blog.php">Blog</a></li>

    <li><a href="gallery.php">Gallery</a></li>

    <li><a href="contact.php">Contact</a></li>

    </ul>

    ```


    ![A978-1-4842-0635-5_4_Fig4_HTML.jpg](A978-1-4842-0635-5_4_Fig4_HTML.jpg)


    Figure 4-4. Loading `menu.inc` directly in a browser exposes the PHP code


    Now load `menu.inc` directly in the browser. Figure [4-4](#A978-1-4842-0635-5_4_Chapter.html#Fig4)
    shows what happens.


    ![A978-1-4842-0635-5_4_Fig3_HTML.jpg](A978-1-4842-0635-5_4_Fig3_HTML.jpg)


    Figure 4-3. There’s no output from the PHP code, so only the HTML is sent to the
    browser


    Reload the page. As Figure [4-3](#A978-1-4842-0635-5_4_Chapter.html#Fig3) shows,
    the password remains hidden in the source code. Although the include file doesn’t
    have a `.php` filename extension, its contents have been merged with `index.php`,
    so the PHP code is processed.


    Neither the server nor the browser knows how to deal with an `.inc` file, so the
    entire contents are displayed onscreen: raw HTML, your secret password, everything.


    Change the name of the include file to `menu.inc.php` and load it directly into
    your browser by adding `.php` to the end of the URL you used in the previous step.
    This time, you should see an unordered list of links. Inspect the browser’s source
    view. The PHP isn’t exposed.


    Change the name back to `menu.php` and test the include file by loading it directly
    in your browser and viewing the source code again.


    Remove the password PHP code you added to `menu.php` in step 3 and change the
    include command inside `index.php` back to its original setting, like this:


    ```

    <?php require ''./includes/menu.php''; ?>

    ```


    ## PHP Solution 4-3: Automatically Indicating the Current Page


    Now that you have seen the difference between using `.inc` and `.php` as filename
    extensions, let’s fix the problem with the menu not indicating the current page.
    The solution involves using PHP to find out the filename of the current page and
    then using conditional statements to insert an ID in the corresponding `<a>` tag.


    Continue working with the same files. Alternatively, use `index_02.php`, `contact.php`,
    `gallery.php`, `blog.php`, `menu_01.php`, and `footer_01.php` from the `ch04`
    folder, making sure to remove the `_01` and `_02` from any filenames.


    Open `menu.php`. The code currently looks like this:


    ```

    <ul id="nav">

    <li><a href="index.php" id="here">Home</a></li>

    <li><a href="blog.php">Blog</a></li>

    <li><a href="gallery.php">Gallery</a></li>

    <li><a href="contact.php">Contact</a></li>

    </ul>

    ```


    The style that indicates the current page is controlled by the `id="here"` highlighted
    in line 2. You need PHP to insert `id="here"` into the `blog.php <a>` tag if the
    current page is `blog.php`, into the `gallery.php <a>` tag if the page is `gallery.php`,
    and into the `contact.php <a>` tag if the page is `contact.php`.


    Hopefully, you have got the hint by now—you need an `if` statement (see "Making
    decisions" in [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html)) in each `<a>` tag.
    Line 2 needs to look like this:


    ```

    <li><a href="index.php" <?php if ($currentPage == ''index.php'') { echo ''id="here"'';
    } ?>>Home</a></li>

    ```


    The other links should be amended in a similar way. But how does `$currentPage`
    get its value? You need to find out the filename of the current page.


    Leave `menu.php` to one side for the moment and create a new PHP page called `get_filename.php`.
    Insert the following code between a pair of PHP tags (alternatively, use `get_filename.php`
    in the `ch04` folder):


    ```

    echo $_SERVER[''SCRIPT_FILENAME''];

    ```


    Save `get_filename.php` and view it in a browser. On a Windows system, you should
    see something like the following screenshot. (The version in the `ch04` folder
    contains the code for this step and the next, together with text indicating which
    is which.)


    ![A978-1-4842-0635-5_4_Figa_HTML.jpg](A978-1-4842-0635-5_4_Figa_HTML.jpg)


    On Mac OS X, you should see something similar to this:


    ![A978-1-4842-0635-5_4_Figb_HTML.jpg](A978-1-4842-0635-5_4_Figb_HTML.jpg)


    `$_SERVER[''SCRIPT_FILENAME'']` comes from one of PHP’s built-in superglobal arrays,
    and it always gives you the absolute file path for the current page. What you
    need now is a way of extracting just the filename.


    Amend the code in the previous step like this:


    ```

    echo basename($_SERVER[''SCRIPT_FILENAME'']);

    ```


    Save `get_filename.php` and click the Reload button in your browser. You should
    now see just the filename: `get_filename.php`.


    The built-in PHP function `basename()` takes a file path as an argument and extracts
    the filename. So there you have it—a way of finding the filename of the current
    page.


    Amend the code in `menu.php` like this (the changes are highlighted in bold):


    ```

    <?php $currentPage = basename($_SERVER[''SCRIPT_FILENAME'']); ?>

    <ul id="nav">

    <li><a href="index.php" <?php if ($currentPage == ''index.php'') { echo ''id="here"'';}
    ?>>Home</a></li>

    <li><a href="blog.php" <?php if ($currentPage == ''blog.php'') { echo ''id="here"'';}
    ?>>Blog</a></li>

    <li><a href="gallery.php" <?php if ($currentPage == ''gallery.php'') { echo ''id="here"'';}
    ?>>Gallery</a></li>

    <li><a href="contact.php" <?php if ($currentPage == ''contact.php'') { echo ''id="here"'';}
    ?>>Contact</a></li>

    </ul>

    ```


    **Caution:** Make sure you get the combination of single and double quotes correct.
    Although HTML makes quotes optional around the value of attributes, it’s considered
    best practice to use them. Since I used double quotes around `here`, I wrapped
    the string `''id="here"''` in single quotes. I could have written `"id=\"here\""`,
    but a mixture of single and double quotes is easier to read.


    If necessary, compare your code with `menu_02.php` in the `ch04` folder.


    ![A978-1-4842-0635-5_4_Fig5_HTML.jpg](A978-1-4842-0635-5_4_Fig5_HTML.jpg)


    Figure 4-5. Conditional code in the include file produces different output for
    each page


    Save `menu.php` and load `index.php` into a browser. The menu should look no different
    from before. Use the menu to navigate to other pages. This time, as shown in Figure
    [4-5](#A978-1-4842-0635-5_4_Chapter.html#Fig5), the border alongside the current
    page should be white, indicating your location within the site. If you inspect
    the page’s source view in the browser, you’ll see that the `here` ID has been
    automatically inserted into the correct link.'
