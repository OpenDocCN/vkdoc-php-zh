    the truncate modifier directly in our PHP code by first loading the modifier (using
    $smarty->_get_plugin_filepath() to retrieve the full path of the plug-in and then
    passing the plug-in type and name as the arguments) and then calling smarty_modifier_truncate()
    on the string.


    The final thing to note in this function is that the URLs and titles are escaped
    as required when adding elements to the $links array. This ensures that valid
