- "# 排版后的内容\n\n在一个几乎会被我们应用每个页面所包含的文件中，依赖某个变量的存在，这看起来可能有些奇怪。这是否意味着我们得不断从会话中取出序列化的用户记录，并将其赋值给视图？从某种角度来说，这正是我们需要做的。实现这一目标的方法是，通过修改\
  \ `__construct()` 方法，将检索和反序列化的逻辑添加到共享的 Controller 子类中，如代码清单 15-14 所示。\n\n**代码清单\
  \ 15-14.** 修改后的 `__construct()` 方法\n\n```\n/**\n * @readwrite\n */\nprotected $_user;\n\
  \npublic function __construct($options = array())\n{\n    parent::__construct($options);\n\
  \n    $database = \\Framework\\Registry::get(\"database\");\n    $database->connect();\n\
  \n    $session = \\Framework\\Registry::get(\"session\");\n    $user = unserialize($session->get(\"\
  user\", null));\n\n    $this->setUser($user);\n}\n```\n\n我们向 `Shared\\Controller`\
  \ 类添加了一个新属性。在 `__construct()` 方法中，设置好数据库之后，我们从会话中取出用户记录并对其进行反序列化。之后，我们设置控制器的 `$_user`\
  \ 属性，这样它就能有效地被每个应用控制器所使用。\n\n那么，我们如何将其赋值给视图呢？我们最初的框架 Controller 类有一个 `render` 方法，负责在布局视图和动作视图上执行渲染命令。我们可以重写这个方法，并向其中添加我们的用户逻辑，如代码清单\
  \ 15-15 所示。\n\n**代码清单 15-15.** 修改后的 `render()` 方法\n\n```\npublic function render()\n\
  {\n    if ($this->getUser())\n    {\n        if ($this->getActionView())\n     \
  \   {\n            $this->getActionView()->set(\"user\", $this->getUser());\n  \
  \      }\n\n        if ($this->getLayoutView())\n        {\n            $this->getLayoutView()->set(\"\
  user\", $this->getUser());\n        }\n    }\n\n    parent::render();\n}\n```\n\n\
  检查用户是否设置之后，我们将其赋值给布局视图和动作视图。这样它就能在这两个视图中使用。我们可以将其存储在共享存储中，但那样只会局限于获取整个对象。\n\n采用这种方法，我们可以访问会话用户对象的属性。\n\
  \n> **注意：** 除了确定导航中显示哪些链接之外，本章我们并没有大量使用用户会话。下一章创建用户设置页面时，它就会派上用场。\n\n现在，我们可以构建用于搜索的动作和视图了，如代码清单\
  \ 15-16 所示。\n\n**代码清单 15-16.** `search()` 动作\n\n```\npublic function search()\n\
  {\n    $view = $this->getActionView();\n\n    $query = RequestMethods::post(\"query\"\
  );\n    $order = RequestMethods::post(\"order\", \"modified\");\n    $direction\
  \ = RequestMethods::post(\"direction\", \"desc\");\n    $page = RequestMethods::post(\"\
  page\", 1);\n    $limit = RequestMethods::post(\"limit\", 10);\n\n    $count = 0;\n\
  \    $users = false;\n\n    if (RequestMethods::post(\"search\"))\n    {\n     \
  \   $where = array(\n            \"SOUNDEX(first) = SOUNDEX(?)\" => $query,\n  \
  \          \"live = ?\" => true,\n            \"deleted = ?\" => false\n       \
  \ );\n\n        $fields = array(\n            \"id\", \"first\", \"last\"\n    \
  \    );\n\n        $count = User::count($where);\n        $users = User::all($where,\
  \ $fields, $order, $direction, $limit, $page);\n    }\n\n    $view\n        ->set(\"\
  query\", $query)\n        ->set(\"order\", $order)\n        ->set(\"direction\"\
  , $direction)\n        ->set(\"page\", $page)\n        ->set(\"limit\", $limit)\n\
  \        ->set(\"count\", $count)\n        ->set(\"users\", $users);\n}\n```\n\n\
  `search()` 动作做了几件重要的事情。它首先设置一些默认值，这些默认值会被提交的表单字段数据覆盖。要记住，我们的搜索表单默认会带有一些字段，然后用之前提交的表单数据来填充这些字段。默认值需要是合理的，并且会用于第一次（以及后续的）查询。\n\
  \n如果有可用的已提交表单数据，它就会尝试根据查询条件从数据库中取出用户记录。我们实际上执行了两个查询：首先获取符合条件记录的总数，然后返回一个限制后的记录集（或页码）。\n\
  \n\n\n我们需要获取所有匹配行的计数，以便能够呈现准确的页码数，让用户能够浏览第一页之后的行。`search()`动作最后将我们操作的所有变量赋值给视图。\n\
  \n接下来，我们需要创建一个相当大的视图，它由两个主要部分组成。我们首先创建用于搜索用户行的表单字段，如**清单 15-17**所示。\n\n**清单 15-17.**\
  \ `application/views/users/search.html`（节选）\n\n```\n<h1>搜索</h1>\n\n<form method=\"\
  post\">\n\n<ol>\n\n<li>\n\n<label>\n\n查询：\n\n<input type=\"text\" name=\"query\"\
  \ value=\"{echo $query}\" />\n\n</label>\n\n</li>\n\n<li>\n\n<label>\n\n排序：\n\n\
  <select name=\"order\">\n\n<option {if $order == \"created\"}selected=\"selected\"\
  {/if} \n\nvalue=\"created\">创建时间</option>\n\n<option {if $order == \"modified\"\
  }selected=\"selected\"{/if} \n\nvalue=\"modified\">修改时间</option>\n\n<option {if\
  \ $order == \"first\"}selected=\"selected\"{/if} \n\nvalue=\"first\">名字</option>\n\
  \n<option {if $order == \"last\"}selected=\"selected\"{/if} \n\nvalue=\"last\"\
  >姓氏</option>\n\n</select>\n\n</label>\n\n</li>\n\n<li>\n\n<label>\n\n方向：\n\n<select\
  \ name=\"direction\">\n\n<option {if $direction == \"asc\"}selected=\"selected\"\
  {/if} \n\nvalue=\"asc\">升序</option>\n\n<option {if $direction == \"desc\"}selected=\"\
  selected\"{/if} \n\nvalue=\"desc\">降序</option>\n\n</select>\n\n</label>\n\n</li>\n\
  \n<li>\n\n<label>\n\n页数：\n\n<select name=\"page\">\n\n{if $count == 0}\n\n<option\
  \ value=\"1\">1</option>\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  第 15 章 ■ 搜索\n\n{/if}\n\n{else}\n\n{foreach $_page in range(1, ceil($count / $limit))}\n\
  \n<option {if $page == $_page}selected=\"selected\"{/if} \n\nvalue=\"{echo $_page}\"\
  >{echo $_page}</option>\n\n{/foreach}\n\n{/else}\n\n</select>\n\n</label>\n\n</li>\n\
  \n<li>\n\n<label>\n\n每页限制：\n\n<select name=\"limit\">\n\n<option {if $limit == \"\
  10\"}selected=\"selected\"{/if} value=\"10\">10</option>\n\n<option {if $limit ==\
  \ \"20\"}selected=\"selected\"{/if} value=\"20\">20</option>\n\n<option {if $limit\
  \ == \"30\"}selected=\"selected\"{/if} value=\"30\">30</option>\n\n</select>\n\n\
  </label>\n\n</li>\n\n<li>\n\n<input type=\"submit\" name=\"search\" value=\"搜索\"\
  \ />\n\n</li>\n\n</ol>\n\n</form>\n```\n\n首先你应该注意到，我们没有用任何条件语句来包裹表单。它应该始终可见（并且（如果可能的话）预先填充之前提交的数据）。我们可以用我们赋值的变量来填充字段，即使表单尚未提交，因为我们已经选择了合理的默认值。\n\
  \n`order`和`direction`字段相对容易理解——它们只是静态字段。如果任何选项匹配它们各自的提交字段，则默认选中它们。这有助于向用户指示之前选择了哪些选项。\n\
  \n`page`字段有点棘手。如果`$users`变量中没有用户行，那么此字段仅适用于后续查询，在这种情况下，进入第 1 页是唯一合理的操作。另一方面，如果有用户行，则需要考虑总共有多少匹配行，并渲染一个可能的页码列表。这是通过生成一个介于\
  \ 1 和总行数除以页面大小之间的页码范围来实现的。我们对这个数字向上取整，以处理列表末尾的不完整行集。`limit`字段是一个简单的、静态的页面大小列表。所有这些字段都会反馈到用户行的查询中。\n\
  \n我们还需要创建一个找到的用户行列表，如**清单 15-18**所示。\n\n**清单 15-18.** `application/views/users/search.html`（节选）\n\
