    Sometimes, there are pieces of code that actually don’t have any connection to
    the goal of the code or that don’t do anything at all. Obviously, you want to
    remove such code, but then you’d have to check that the bulk of the code still
    works. You can remove unwanted code snippets safely, if your code is covered by
    tests, as the tests will fail if you have removed something useful.


    At other times, you may know that your code is wrong but don’t want to spend the
    time to fix it. So, you just leave a comment in the code, such as `// TODO: it
    will break if $num = 0`. A failing test is much, much more clean.


    There is a famous saying: “If it ain’t broke, don’t fix it.” My hard-written code
    is working, what are you talking about? you may ask. Simply put, however, the
    saying is not true for software development. Refactoring is a very important part
    of development. By successfully refactoring your code, you will end up with the
    same results as you would without doing so, but your code will be reusable, maintainable,
    faster, cleaner, and better if you do.


    ### Getting Fast Feedback


    Fast feedback is important. Developers don’t have the time to click every link,
    push every button in every possible order, push the browser’s Back button multiple
    times, fill out forms with a variety of data (even with malicious data), or deploy
    new code and wait for clients’ feedback.


    I think Firebug ( [`https://getfirebug.com`](https://getfirebug.com) ) is a good
    example. I open the HTML tab and change something, and immediately I’ll see the
    result in the browser.


    There are other tools, for other languages, that give immediate feedback by actually
    running tests after every semicolon or file save. These are extremely powerful
    development tools. They are not available in PHP, but, regardless, tests are the
    best tools for this.


    ### Quality Code


    Tests run in isolation. So, by running a test, you are verifying a particular
    piece of code that does not depend on other pieces. But it is easy to violate
    the single responsibility principle. Tests add another viewpoint to our code-writing
    process. More on this can be found in Chapter [3](#A337704_2_En_3_Chapter.html).


    ### Use the Best of Your Brain


    Under pressure, even the most clever people (yes, even programmers) make stupid
    mistakes.


    Have you ever written something like `if(3 < 5)`? Never? You will, I promise.
    There is a good chance you might break something even with the most trivial code
    or code change. Are you always relaxed? Do you always have more than enough time
    to write your code? Is your boss always happy? Are your clients always patient?
    Do you always have a clear specification? Do your kids sleep all night? If not,
    you’ll make stupid mistakes. Tests help you to check your code in an easy way.


    ### Save Time and Money


    As I already mentioned, one way or another, you’ll test your code. But you can
    choose a way that is more effective. You can choose a way that will let you spend
    less time fixing bugs and refactoring and more time actually writing code. Saving
    time is fun—you can always spend that time watching the next episode of your favorite
    TV show—and saving time saves money.


    ## Summary


    In this chapter, you learned why we test, what unit testing is, and what the arguments
    against it are. From this, you learned that you can save time on maintaining code—as
    it can be as foreign after a few months as if it were written by someone else—and
    how tests help you to use the best of your brain.


    # 3. Clean Code


    ![A337704_2_En_3_Figa_HTML.jpg](A337704_2_En_3_Figa_HTML.jpg)


    Our APIs seem to have some communication problems


    Who cares about the code? If it runs, then it’s fine. Right? I don’t think so.


    There are several reasons why you should care about code quality.


    First, the quality of your code will determine the quality of the software. If
    you think you can have great software with messy code, you’re dreaming. Second,
    clean code saves time. You will spend more time reading your code more than you
    spend writing it. The other people in your team will also spend a good part of
    their time reading your code. And you will spend time reading other people’s code
    too. Clean code is easy to read, so clean code saves time. Third, your code is
    a reflection of yourself. If you don’t value quality in your code, you won’t get
    hired. Messy code means you don’t hold yourself, or your work, to a very high
    standard. Clients and employers demand quality.


    Clean code is maintainable. It is easy to read and easy to understand. That means
    it’s easy to use and easy to change. Clean code is straightforward.


    ## How to Write Clean Code


    Clean code doesn’t require loads of time. Writing clean code is a habit that requires
    some attention during writing and refactoring. Luckily, it’s a habit you can learn.


    Never forget: We write code for machines and for people. People are more important.


    Here are a few hints for how to write clean code. When you work in a team you
    should fix at least these options.'
