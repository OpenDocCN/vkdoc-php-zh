  - 第 19 章：在模块中使用 Drupal 的 API
- - '###'
  - 修改表单
- - '####'
  - '**注意** 表单 API 是 Drupal 中一个非常重要的 API。当人们可能期望有一个特殊的 API 让模块出于特定原因相互通信时，Drupal 有时会依赖其强大的表单
    API 来引入新功能。Node 模块通过实现一个表单修改钩子，基于内容类型增强了 Block 模块的区块可见性。在 `node.module` 中，函数 `node_form_block_admin_configure_alter()`
    是 `hook_form_FORM_ID_alter()` 的一个实现，其中 `block_admin_configure` 是所修改表单的 ID，符合那种表单模式。类似地，Open
    ID 模块使用 `openid_form_user_login_alter()` 或 `openid_form_user_login_block_alter()`（分别针对主
    `user_login` 表单或 `user_login_block` 表单）来修改登录表单。'
- - '###'
  - 使用 `t()` 和 `format_plural()` 进行本地化
- - '####'
  - '**注意** 用于翻译内容（网站用户所写的文字）的工具通常被称为*国际化（internationalization）*，并且不属于 Drupal 核心。Drupal
    中由管理员定义的文字的灰色地带（例如站点名称和标语；欢迎消息；以及菜单、某些分类法和内容类型名称等结构）也属于国际化的范畴，并且这也是翻译最难（呃，最有趣）的地方。在编写模块时，这些形式的翻译通常不是你需要关心的，你只需要关心本地化。在
    Drupal 的讨论甚至模块名称中，本地化常被缩写为 *l10n*，而国际化则被缩写为 *i18n*。（这些缩写来自每个单词的第一个字母和最后一个字母，以及中间字母的数量。）目前针对这两项任务的资源列表可以在
    `dgd7.org/translate` 找到。'
