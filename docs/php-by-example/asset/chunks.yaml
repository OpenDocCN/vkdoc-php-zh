  trans: '

    # 多行字符串


    从实际角度来看，字符串在 PHP 中非常重要。而且，你常常需要处理多行字符串。有多种方式可以创建它们。


    要创建多行字符串，可以使用以下结构。`<<<` 指令后跟一个标识符，然后换行。之后是文本（不带引号），可以跨越多行。整个结构以与开头相同的标识符结束，并在最后加上分号。它必须是该行中的最后一条指令，且不能包含任何额外字符。列表
    6-7 展示了使用此类字符串的示例。


    ```

    列表 6-7

    认识多行字符串

    ```


    程序的输出如下所示。


    ```

    程序的输出（来自列表 6-7）

    第聂伯河怒吼咆哮，

    狂风愤怒地呼啸怒吼，

    它将柳树吹弯到地面，

    并将波浪掀起如山高。

    ```


    这里，`$text` 变量被赋予了一个相当复杂的表达式，该表达式以 `<<<` 指令开头，后跟 `MYTEXT` 标识符（标识符名称由你决定）。然后，文本紧随其后，以
    `MYTEXT` 指令和分号结束。


    | 详细信息 |

    | --- |

    | 文本的缩进应相对于终止文本值的指令的位置（本例中为 `MYTEXT` 标识符）。如果将文本放置在该指令的左侧，则会产生错误。|


    值得注意的是，文本片段中使用了 `$word` 变量的名称。结果，变量的值会替换其名称。这意味着该文本的行为类似于用双引号括起来的字符串字面量。


    还有另一种创建多行字符串的方法。它类似于前一种方法，但 `<<<` 指令后的初始标识符需要用单引号括起来。列表 6-8 展示了此类多行字符串的示例。


    ```

    列表 6-8

    创建多行字符串的另一种方法

    ```


    以下是程序执行的结果。


    ```

    程序的输出（来自列表 6-8）

    编程代码示例：

    $number=123;  // 创建一个变量

    echo "\$number = ",$number,"\n";

    ```


    在这种情况下，`<<<` 指令后的 `MYTEXT` 标识符被单引号括起来，而文本本身包含命令，包括变量名。所有文本内容都“原样”显示——也就是说，它类似于字符串字面量被单引号括起来的情况。


    ## 使用文件


    使用 PHP 的另一个重要方面与文件操作有关。我们来讨论一下从文件获取数据和将数据写入文件的最常用技术。


    首先，需要打开文件。为此，可以使用 `fopen()` 函数。该函数的第一个参数是指定文件路径的字符串。第二个参数是包含特殊字符的字符串。该参数决定了使用文件的访问模式。表
    6-1 列出并描述了 `fopen()` 函数第二个参数的组合。


    **表 6-1** 使用文件的访问模式


    | 指令 | 访问模式 |

    | --- | --- |

    | `''r''` | 以只读方式打开文件。读取指针设置在文件开头。 |

    | `''r+''` | 以读写方式打开文件。读/写指针设置在文件开头。 |

    | `''w''` | 以写入方式打开文件。写入指针设置在文件开头。文件原有内容将被删除。如果文件不存在，则会创建它。 |

    | `''w+''` | 以读写方式打开文件。读/写指针设置在文件开头。文件原有内容将被删除。如果文件不存在，则会创建它。 |

    | `''a''` | 仅以写入方式打开文件。写入指针设置在文件末尾。如果文件不存在，则会创建它。 |

    | `''a+''` | 以读写方式打开文件。读/写指针设置在文件末尾。如果文件不存在，则会创建它。 |

    | `''x''` | 创建文件用于写入。写入指针设置在文件开头。如果文件已存在，则会引发错误。 |

    | `''x+''` | 创建文件并以读写方式打开。读/写指针设置在文件开头。如果文件已存在，则会引发错误。 |

    | `''c''` | 仅以写入方式打开文件。如果文件不存在，则会创建它。如果文件已存在，则不会删除其内容。写入指针设置在文件开头。 |

    | `''c+''` | 以读写方式打开文件。读/写指针设置在文件开头。如果文件不存在，则会创建它。如果文件已存在，则不会删除其内容。 |


    结果，`fopen()` 函数返回一个数字标识符，可用于访问已打开的文件。


    | 详细信息 |

    | --- |

    | 数据可以以字节流或字符流模式写入和读取。从名称上很容易理解，操作字节流意味着数据逐字节地写入和读取。如果流是字符流，则逐字符地进行读取和写入。流的类型（字符或字节）由字符
    `b`（字节流）和 `t`（字符流）决定，它们被放置在指定文件访问模式的指令之后的字符串中。|


    有一组专门用于处理文件的函数。其中最重要的是以下几个。`fgets()` 函数从文件中的指针位置开始读取一行。`fread()` 函数用于按字节读取。`fwrite()`
    函数允许写入字节。`file()` 函数允许将文件读取到数组中。可以使用 `file_exists()` 函数检查文件是否存在。`is_readable()`
    函数检查文件是否可读。`feof()` 函数让你知道是否已到达文件末尾。


    | 详细信息 |

    | --- |

    | 完成文件操作后，建议关闭文件。为此，使用 `fclose()` 函数。在某些情况下，可能需要创建一个带有随机名称的文件（用于读取或写入），以防止任何人意外地未授权访问。可以使用
    `tmpfile()` 函数来实现这一点。|

    '
- fmt: 'Listing [6-9](#613529_1_En_6_Chapter.xhtml#PC17) uses some of the functions
    discussed.


    ```

    Listing 6-9

    Reading a File Line by Line

    ```


    For this program to run successfully, there must be the `myfile.txt` file with
    some text in the `D:\books\php` folder. In this case, the contents of the text
    file are as follows.


    ```

    The mighty Dnieper roars and bellows,

    The wind in anger howls and raves,

    Down to the ground, it bends the willows,

    And mountain-high lifts up the waves.

    Taras Shevchenko

    ```


    The full path to the file is written to the `$path` variable. Then, the `$h=fopen($path,"rt")`
    command attempts to open the file, and if successful, the file identifier is written
    to the `$h` variable. Next, using that variable, you get access to the file. In
    particular, you read the contents of the file line by line and display the read
    string in the output area. Each line is preceded by its number in square brackets.
    The `$k` variable is used to count the lines.


    The second argument, `"rt"` passed to the `fopen()` function, means that the file
    is opened for reading only under the character stream mode.


    | Details |

    | --- |

    | An error arises if the file you are trying to open does not exist. In that case,
    instead of the `$h=fopen($path,"rt")` command, you can use a command like `$h=fopen($path,"rt")
    or die("File access error")`. Here, the `or` logical operator is used. It performs
    the logical or operation in a simplified form: the second operand, `die("File
    access error"),` is evaluated only if the first operand, `$h=fopen($path,"rt"),`
    has a value equal to `false`. If the file is opened successfully, the first operand
    is non-zero, which is equivalent to `true`. In that case, the second operand is
    not evaluated. If the file cannot be opened, then the second operand `die("File
    access error")` is evaluated, and as a result, a message about the error appears
    in the output area, and the code execution stops. |


    To read the file’s contents, you use the `while` loop statement. The condition
    is defined by the `!feof($h)` expression. The `feof()` function determines whether
    the end of the file whose identifier is passed as an argument to the function
    has been reached. Therefore, the `!feof($h)` expression is `true` if the end of
    the file has not been reached.


    Until the end of the file is reached, the `$line=fgets($h)` command writes the
    line read to the `$line` variable using the `fgets()` function. Then the `echo
    "[$k] ",$line` instruction displays the read line in the output area. Finally,
    the `$k++` command increments the counter variable `$k` value. That process is
    terminated as soon as the end of the file is reached. The `fclose($h)` command
    closes the file. The result of running the program is as follows.


    ```

    The output of the program (from Listing 6-9)

    [1] The mighty Dnieper roars and bellows,

    [2] The wind in anger howls and raves,

    [3] Down to the ground, it bends the willows,

    [4] And mountain-high lifts up the waves.

    [5] Taras Shevchenko

    ```


    Listing [6-10](#613529_1_En_6_Chapter.xhtml#PC20) shows how to write into a file
    in the program.


    ```

    Listing 6-10

    Writing into a File

    ```


    The result of the program execution could be as follows (the text entered by the
    user is marked in bold).


    ```

    The output of the program (from Listing 6-10)

    Writing into the file.

    Enter text. To terminate, enter exit:

    The mighty Dnieper roars and bellows,

    The wind in anger howls and raves,

    Down to the ground, it bends the willows,

    And mountain-high lifts up the waves.

    Taras Shevchenko

    exit

    The program is over.

    ```


    But the most important thing is that in the `D:\books\php` folder, there appears
    (if it was not there) the `mytext.txt` file with the following content.


    ```

    [1] The mighty Dnieper roars and bellows,

    [2] The wind in anger howls and raves,

    [3] Down to the ground, it bends the willows,

    [4] And mountain-high lifts up the waves.

    [5] Taras Shevchenko

    ```


    Let’s find out why that happens. Namely, let’s analyze the program. The `$path`
    variable, as in the previous case, stores the full path to the file where you
    intend to write the text. In particular, that is the `mytext.txt` file from the
    `D:\books\php` folder. You open the file using the `$h=fopen($path,"wt")` instruction.
    The second argument, `"wt"`, means the file is opened for writing under the character
    stream mode. Next, several messages are displayed, and then, with the help of
    the `$line=trim(fgets(STDIN))` command, you read the text entered by the user
    (in which all leading and trailing spaces and special characters are previously
    discarded). After that, the `while` loop statement is launched, in which the `$line!=="exit"`
    condition is checked. The condition is true if the user has not entered the text
    `"exit"`.


    > **Note**

    >

    > Thus, to terminate the input process, you must enter the word `exit`.


    The `fwrite($h,"[$k] ")` command writes the line number in square brackets into
    the file, after which the `fwrite($h,$line."\n")` command adds the read string
    into the file, supplemented by the instruction to move to a new line in the file.
    The `$k++` instruction changes the value of the counter variable `$k`, and then
    the `$line=trim(fgets(STDIN))` command reads the next line the user enters. Finally,
    you close the file using the `fclose($h)` instruction.'
