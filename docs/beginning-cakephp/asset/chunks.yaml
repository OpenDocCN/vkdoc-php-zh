    \ Cake 应用程序中使用数据源的练习。\n\n## 使用行为\n\n扩展模型的另一种方式是使用行为。行为为模型提供“规则”，就像你可以在邮件程序中为收件邮件设置规则一样。例如，你可能希望模型在更新数据库中的记录时，能即时对数据执行多种计算，不仅更新一条记录或几个关联记录，而是跨数据库执行一系列更新。使用行为，而不是在模型中构建所有必要的函数来管理这种更新，可以将重复性任务保留在单独的资源文件中，并通过允许多个模型访问更复杂的过程而不使其负担过重，从而使模型更加通用。Cake\
    \ 内置了四种行为：`ACL`、`Containable`、`Translate` 和 `Tree`。在本章中，我将解释如何使用 `Tree` 行为来改进博客对帖子的分类方式。创建自定义行为实际上比创建你自己的数据源更简单；理解内置行为的工作原理将使创建你自己的行为变得更加容易。\n\
    \n### 使用 Tree 行为对博客文章进行分类\n\n博客应用程序使用 `tags` 表来管理可应用于帖子的多个标签。\n\n如果你想创建标签的层级结构，或者某种“树状”数据结构呢？一个标签可以成为另一个标签的“父级”，一系列标签可以被指定为某个标签的“子级”。然后，一旦标签被分配给帖子，通过点击父级标签，该父标签及其子标签的所有相关帖子都将被列出给用户。这种处理层级数据的方法比构建多个关系数据库来管理层级关系更有效。幸运的是，Cake\
    \ 提供了 `Tree` 行为，它可以动态维护一棵数据树。\n\n#### 向 Tags 表插入所需字段\n\n使用 `Tree` 行为要求与该行为关联的数据库表按特定方式组织。在这种情况下，`tags`\
    \ 表需要包含一些额外的字段，以便 `Tree` 行为保存其自身参数。无论你在哪里使用 `Tree` 行为，请记住提供以下三个字段：\n\n- `parent_id`\n\
    - `lft`\n- `rght`\n\n左字段和右字段，即 `lft` 和 `rght`，由 `Tree` 行为用于组织节点在树中的位置。`parent_id`\
    \ 字段链接到表中作为当前记录父节点的记录的 ID。目前，`tags` 表不包含这些字段。为了准备让博客使用 `Tree` 行为，请按照清单 14-10 中的规范替换\
    \ `tags` 表。\n\n**清单 14-10.** *包含 Tree 行为所需字段的 Tags 表*\n\n```\nCREATE TABLE `tags`\
    \ (\n  `id` int(11) unsigned NOT NULL auto_increment,\n  `parent_id` int(11) unsigned\
    \ default NULL,\n  `lft` int(11) unsigned default NULL,\n  `rght` int(11) unsigned\
    \ default NULL,\n  `name` varchar(255) default NULL,\n  PRIMARY KEY (`id`)\n);\n\
    ```\n"
- fmt: "# 第14章 数据源与行为\n\n请注意，Listing 14-10 没有使用 `lft` 和 `rght` 作为 `left` 和 `right`\
    \ 字段的默认值；这些字段可以设置为你选择的任何名称，这里我选择了 `left` 和 `right`。稍后，在模型中调用 Tree 行为时，我将指定这些字段名称。\n\
    \n## 烘焙新的标签控制器和视图\n\n现在 `tags` 表已经包含了 Tree 行为正常运行所需的字段，接下来需要重新生成 Tags 控制器和视图。使用\
    \ Bake 创建一个新的控制器——确保*不要*使用管理路由、脚手架、附加组件或附加帮助器；*务必*确保使用会话并创建基本视图方法（`index`、`edit`、`add`、`view`）。新的\
    \ Tags 控制器应包含如 Listing 14-11 所示的代码，或非常相似的代码。\n\n**Listing 14-11.** *烘焙的 Tags 控制器*\n\
    \n```php\n<?php\n\nclass TagsController extends AppController {\n\n    var $name\
    \ = 'Tags';\n\n    var $helpers = array('Html', 'Form');\n\n    function index()\
    \ {\n        $this->Tag->recursive = 0;\n        $this->set('tags', $this->paginate());\n\
    \    }\n\n    function view($id = null) {\n        if (!$id) {\n            $this->Session->setFlash(__('Invalid\
    \ Tag.', true));\n            $this->redirect(array('action'=>'index'));\n   \
    \     }\n        $this->set('tag',$this->Tag->read(null,$id));\n    }\n\n    function\
    \ add() {\n        if (!empty($this->data)) {\n            $this->Tag->create();\n\
    \            if ($this->Tag->save($this->data)) {\n                $this->Session->setFlash(__('The\
    \ Tag has been saved', true));\n                $this->redirect(array('action'=>'index'));\n\
    \            } else {\n                $this->Session->setFlash(__('The Tag could\
    \ not be saved. Please, try again.', true));\n            }\n        }\n     \
    \   $posts = $this->Tag->Post->find('list');\n        $this->set(compact('posts'));\n\
    \    }\n\n    function edit($id = null) {\n        if (!$id && empty($this->data))\
    \ {\n            $this->Session->setFlash(__('Invalid Tag', true));\n        \
    \    $this->redirect(array('action'=>'index'));\n        }\n        if (!empty($this->data))\
    \ {\n            if ($this->Tag->save($this->data)) {\n                $this->Session->setFlash(__('The\
    \ Tag has been saved', true));\n                $this->redirect(array('action'=>'index'));\n\
    \            } else {\n                $this->Session->setFlash(__('The Tag could\
    \ not be saved. Please, try again.', true));\n            }\n        }\n     \
    \   if (empty($this->data)) {\n            $this->data = $this->Tag->read(null,\
    \ $id);\n        }\n        $posts = $this->Tag->Post->find('list');\n       \
    \ $this->set(compact('posts'));\n    }\n\n    function delete($id = null) {\n\
    \        if (!$id) {\n            $this->Session->setFlash(__('Invalid id for\
    \ Tag', true));\n            $this->redirect(array('action'=>'index'));\n    \
    \    }\n        if ($this->Tag->del($id)) {\n            $this->Session->setFlash(__('Tag\
    \ deleted', true));\n            $this->redirect(array('action'=>'index'));\n\
    \        }\n    }\n}\n?>\n```\n\n接下来，使用 Bake 为 Tags 控制器创建 Action 视图。最终应该会得到 `app/views/tags`\
    \ 文件夹，其中包含 `add.ctp`、`edit.ctp`、`index.ctp` 和 `view.ctp` 文件。Tags 控制器和视图正常工作后，博客就拥有了添加、编辑和删除标签的基本界面。Tag\
    \ 模型已经内置了\"多对多\"关系，因此标签也可以与特定的博客文章关联。这就是 Tree 行为将要发挥作用的地方——与其在应用程序中构建一个让用户点击标签并获取相关文章列表的机制，不如使用\
    \ Tree 行为。这样，当用户点击一个标签时，不仅会获得关联文章的列表，还会获得关联标签的文章列表。\n\n## 在模型中使用 Tree 行为\n\n数据库已准备好处理\
    \ Tree 行为，并且使用烘焙的控制器和视图后，现在可以在模型中调用该行为了。这是通过模型中的 `$actsAs` 属性完成的。\n\n打开 `app/models/tag.php`，在\
    \ `$hasAndBelongsToMany` 属性附近插入 `$actsAs` 属性。`$actsAs` 中设置的值对应所使用的行为；在本例中，`$actsAs`\
    \ 设置为 `Tree`。输入 `$actsAs` 属性后，您的 Tag 模型应如 Listing 14-12 所示。\n\n**Listing 14-12.**\
    \ *包含 Tree 行为的 Tag 模型*\n\n```php\n<?\nclass Tag extends AppModel {\n    var $name\
    \ = 'Tag';\n    var $actsAs = array('Tree'=>array(\n        'left'=>'left',\n\
    \        'right'=>'right'\n    ));\n    var $hasAndBelongsToMany = array('Post');\n\
    }\n?>\n```\n\nListing 14-12 中的第 5 行和第 6 行展示了我如何指定 `left` 和 `right` 字段名称。由于我没有使用默认名称\
    \ `lft` 和 `rght`，因此必须在第 4 行为 `Tree` 分配一个数组，并包含第 5-6 行所示的 `left` 和 `right` 参数。分配给这些参数的值对应\
    \ `tags` 表中 `left` 和 `right` 字段的字段名称，在本例中分别为 `left` 和 `right`。\n\n要将多个行为附加到模型，只需扩展\
    \ `$actsAs` 数组。例如，如果我想将一个自定义行为以及 Tree 行为附加到 Tag 模型，我会输入如下内容：\n\n```php\nvar $actsAs\
    \ = array('Tree','MyBehavior');\n```\n\n数组中的每个行为名称还可以包含一组参数，如 Listing 14-12 所示；只需为每个行为名称分配一个数组作为值：\n\
    \n```php\nvar $actsAs = array(\n    'Tree'=>array(\n        'left'=>'left',\n\
    \        'right'=>'right'\n    ),\n    'MyBehavior'=>array(\n        'recursive'=>1\n\
    \    )\n);\n```\n\n现在 `$actsAs` 属性已设置为 `Tree`，并且参数数组中已设置好 `left` 和 `right` 字段的适当字段名称后，模型中无需再做其他操作。所有\
    \ Tree 行为的函数都可以在控制器或模型中访问，这是下一步组织标签层次结构的任务。\n\n## 调整视图\n\n当 Bake 生成 Tags 视图时，它们包含了行为字段（`parent_id`、`left`\
    \ 和 `right`）。如果这些字段保留在表单提交中，可能会与 Tree 行为冲突，因此务必将它们从视图中移除。在每个烘焙视图中找到调用行为字段之一的 Form\
    \ 帮助器函数，并将其从文件中删除。最终应该只保留 `name` 字段，在某些情况下保留 `id` 字段。\n\n接下来，为了让标签具有父节点，Add 和\
    \ Edit 视图必须提供选择父 ID 的方式。为此，在 Add 和 Edit 视图中放置一个包含标签列表的选择菜单。要使此菜单正常工作，首先必须在控制器中生成标签列表，然后在视图中使用\
    \ Form 帮助器渲染选择菜单。打开 `app/controllers/tags_controller.php`，并在 Add 和 Edit 操作中添加以下代码行：\n\
    \n```php\n$tags = $this->Tag->find('list');\n```\n\n现在标签列表作为 `$tags` 数组可用，通过重写\
    \ `set()` 函数将变量传递给视图，以同时包含 `$posts` 和 `$tags`：\n\n```php\n$this->set(compact('posts','tags'));\n\
    ```\n\n在 Add 和 Edit 视图中，使用 Form 帮助器提供选择菜单。请记住，它需要一些额外的参数才能与控制器正确配合。Listing 14-13\
    \ 包含了渲染选择菜单的 `$form->input()` 函数。将 Listing 14-13 添加到 `app/views/tags/add.ctp`\
    \ 和 `app/views/tags/edit.ctp` 中，替换原先 Bake 生成的 `parent_id` 表单输入字段。\n\n**Listing\
    \ 14-13.** *Add 和 Edit 视图中的 parent_id 选择菜单*\n\n```php\necho $form->input('parent_id',array(\n\
    \    'label'=>'Parent Tag',\n    'type'=>'select',\n    'options'=>$tags,\n  \
    \  'empty'=>'- No Parent Tag -'\n));\n```\n\n请注意，在 Listing 14-13 的第 1 行，传递给 Form\
    \ 帮助器的字段名称是 `parent_id`，对应于 `tags` 表中的父 ID 字段。Listing 14-13 的其余部分包含参数，告诉 Form\
    \ 帮助器渲染选择菜单（第 3 行）。"
