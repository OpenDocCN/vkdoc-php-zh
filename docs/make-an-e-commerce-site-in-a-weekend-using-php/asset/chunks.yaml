    You will be using JavaScript to apply validation checks to the sign-up form. The
    PHP script, `validatesignup.php`, is shown in Listing [2-10](#A978-1-4842-1672-9_2_Chapter.html#FPar11).


    Listing 2-10\. Sign-Up Form for Creating a New Account (validatesignup.php)


