    \ after the if statement is executed whether the result is true or false\nif(statement\
    \ to compare) {\n// Executed if the comparison is true\n}\nelse {\n// Executed\
    \ if the comparison is false\n}\n// Code after the if/else statement executed\
    \ whether the result is true or false\n```\n\nThe basic structure of a conditional\
    \ statement is shown in the\npreceding. In the first example, the code inside\
    \ the if statement is\nonly executed if the statement is true. No additional code\
    \ is executed\nif the statement is false. In the second example, code is provided\
    \ after\nthe else statement to be executed if the statement is false. Embedded\n\
    if/else statements\n can also be used.\n\nLet us look at some examples using conditional\
