  raw: '# 13. Database Patterns


    Most web applications of any complexity handle persistence to a greater or lesser
    extent. Shops must recall their products and their customer records. Games must
    remember their players and the state of play. Social networking sites must keep
    track of your 238 friends and your unaccountable liking for boy-bands of the ’80s
    and ’90s. Whatever the application, the chances are it’s keeping score behind
    the scenes. In this chapter, I look at some patterns that can help.


    This chapter will cover the following:


    *   The Data Layer interface: Patterns that define the points of contact between
    the storage layer and the rest of the system

    *   Object watching: Keeping track of objects, avoiding duplicates, and automating
    save and insert operations

    *   Flexible queries: Allowing your client coders to construct queries without
    thinking about the underlying database

    *   Creating lists of found objects: Building iterable collections

    *   Managing your database components: The welcome return of the Abstract Factory
    pattern


    ## The Data Layer


    In discussions with clients, it’s usually the presentation layer that dominates.
    Fonts, colors, and ease of use are the primary topics of conversation. Among developers,
    it is often the database that looms large. It’s not the database itself that concerns
    us; we can trust that to do its job unless we’re very unlucky. No, it’s the mechanisms
    we use to translate the rows and columns of a database table into data structures
    that cause the problems. In this chapter, I look at code that can help with this
    process.


    Not everything presented here sits in the Data layer itself. Rather, I have grouped
    some of the patterns that help to solve persistence problems. All of these patterns
    are described by one or more of Clifton Nock, Martin Fowler, and Alur, et al.


    ## Data Mapper


    If you thought I glossed over the issue of saving and retrieving `Venue` objects
    from the database in the “Domain Model” section of Chapter [12](#A314621_5_En_12_Chapter.html),
    here is where you might find at least some answers. The Data Mapper pattern is
    described as a Data Access Object in a couple places. First, it’s covered by Alur
    et al. in Core J2EE Patterns: Best Practices and Design Strategies (Prentice Hall,
    2001). It’s also covered by Martin Fowler in Patterns of Enterprise Application
    Architecture (Addison-Wesley Professional, 2002). Note that Data Access Object
    is not an exact match to the Data Mapper pattern, as it generates data transfer
    objects; but since such objects are designed to become the real thing if you add
    water, the patterns are close enough).


    As you might imagine, a data mapper is a class that is responsible for handling
    the transition from database to object.


    ### The Problem


    Objects are not organized like tables in a relational database . As you know,
    database tables are grids made up of rows and columns. One row may relate to another
    in a different (or even the same) table by means of a foreign key. Objects, on
    the other hand, tend to relate to one another more organically. One object may
    contain another, and different data structures will organize the same objects
    in different ways, combining and recombining objects in new relationships at runtime.
    Relational databases are optimized to manage large amounts of tabular data, whereas
    classes and objects encapsulate smaller focused chunks of information.


    This disconnect between classes and relational databases is often described as
    the object-relational impedance mismatch (or simply impedance mismatch).


    So how do you make that transition? One answer is to give a class (or a set of
    classes) responsibility for just that problem, effectively hiding the database
    from the domain model and managing the inevitable rough edges of the translation.


    ### Implementation


    Although with careful programming, it may be possible to create a single `Mapper`
    class to service multiple objects, it is common to see an individual `Mapper`
    for a major class in the Domain Model.


    Figure [13-1](#A314621_5_En_13_Chapter.html#Fig1) shows three concrete `Mapper`
    classes and an abstract superclass.


    ![A314621_5_En_13_Fig1_HTML.gif](A314621_5_En_13_Fig1_HTML.gif)


    Figure 13-1.


    Mapper classes


    In fact, because the `Space` objects are effectively subordinate to `Venue` objects,
    it may be possible to factor the `SpaceMapper` class into `VenueMapper`. For the
    sake of these exercises, I’m going to keep them separate.


    As you can see, the classes present common operations for saving and loading data.
    The base class stores common functionality, delegating responsibility for handling
    object-specific operations to its children. Typically, these operations include
    actual object generation and constructing queries for database operations.


    The base class often performs housekeeping before or after an operation, which
    is why Template Method is used for explicit delegation (e.g., calls from concrete
    methods like `insert()` to abstract ones like `doInsert()`, etc.). Implementation
    determines which of the base class methods are made concrete in this way, as you
    will see later in the chapter.


    Here is a simplified version of a `Mapper` base class :


    ```

    // listing 13.01

    abstract class Mapper

    {

    protected $pdo;

    public function __construct()

    {

    $reg = Registry::instance();

    $this->pdo = $reg->getPdo();

    }

    public function find(int $id): DomainObject

    {

    $this->selectstmt()->execute([$id]);

    $row = $this->selectstmt()->fetch();

    $this->selectstmt()->closeCursor();

    if (! is_array($row)) {

    return null;

    }

    if (! isset($row[''id''])) {

    return null;

    }

    $object = $this->createObject($row);

    return $object;

    }

    public function createObject(array $raw): DomainObject

    {

    $obj = $this->doCreateObject($raw);

    return $obj;

    }

    public function insert(DomainObject $obj)

    {

    $this->doInsert($obj);

    }

    abstract public function update(DomainObject $object);

    abstract protected function doCreateObject(array $raw): DomainObject;

    abstract protected function doInsert(DomainObject $object);

    abstract protected function selectStmt(): \PDOStatement;

    abstract protected function targetClass(): string;

    }

    ```


    The constructor method uses a `Registry` to get a PDO object. A registry really
    shows its worth for classes like this. There isn’t always a sensible path from
    the control layer to a `Mapper` along which data can be passed. Another way of
    managing mapper creation would be to hand it off to the `Registry` class itself.
    Rather than instantiate it, the mapper would expect to be provided with a PDO
    object as a constructor argument:


    ```

    abstract class Mapper

    {

    protected $pdo;

    function __construct(\PDO $pdo)

    {

    $this->pdo = $pdo;

    }

    }

    ```


    Client code would acquire a new `VenueMapper` from `Registry` using a method such
    as `getVenueMapper()` . This would instantiate a mapper, generating the PDO object
    too. For subsequent requests, the method would return the cached mapper. Because
    it allows me to keep mappers ignorant of the complications of configuration (even
    with a registry as a facade), this latter approach is the one I usually opt for.


    Returning to the `Mapper` class, the `insert()` method does nothing but delegate
    to `doInsert()`. This is something that I would factor out in favor of an abstract
    `insert()` method, were it not for the fact that I know that the implementation
    used here will be useful here in due course.'
  trans: "\n# 13. 数据库模式\n\n大多数具有一定复杂度的网络应用都会在不同程度上处理数据持久化问题。商店必须记录其商品和客户信息；游戏必须记住玩家和游戏状态；社交网站必须追踪你那\
    \ 238 位朋友以及你对 80、90 年代男孩组合那种令人费解的喜爱。无论是什么应用，它很可能都在幕后进行着数据记录。在本章中，我将探讨一些有助于解决这类问题的模式。\n\
    \n本章将涵盖以下内容：\n\n*   数据层接口：定义存储层与系统其他部分之间接触点的模式\n*   对象监控：追踪对象、避免重复，以及自动化保存和插入操作\n\
    *   灵活查询：允许客户端开发者无需考虑底层数据库即可构建查询\n*   创建已发现对象列表：构建可迭代的集合\n*   管理数据库组件：抽象工厂模式的有益回归\n\
    \n## 数据层\n\n在与客户讨论时，通常占据主导地位的是表示层。字体、颜色和易用性是主要的讨论话题。而在开发者之间，数据库往往显得举足轻重。我们关心的并非数据库本身；除非运气极差，否则我们可以信任它能完成自己的工作。不，真正引发问题的是我们用来将数据库表的行列结构转换为数据结构的机制。在本章中，我将探讨一些能够帮助完成这一过程的代码。\n\
    \n这里介绍的内容并非全部位于数据层本身。更确切地说，我将一些有助于解决持久化问题的模式归为一组。所有这些模式都由 Clifton Nock、Martin\
    \ Fowler 以及 Alur 等人分别或共同描述过。\n\n## 数据映射器\n\n如果你认为我在第 12 章的“领域模型”部分对从数据库保存和检索`Venue`对象的问题轻描淡写，那么这里或许能找到一些答案。数据映射器模式在某些地方被称为数据访问对象。首先，它由\
    \ Alur 等人在《Core J2EE Patterns: Best Practices and Design Strategies》（Prentice\
    \ Hall, 2001）中提及。此外，Martin Fowler 在《Patterns of Enterprise Application Architecture》（Addison-Wesley\
    \ Professional, 2002）中也有涉及。请注意，数据访问对象与数据映射器模式并非完全一致，因为它会生成数据传输对象；但由于这些对象经过加工后即可成为真正的对象，因此这两种模式非常接近。\n\
    \n正如你可能想象的那样，数据映射器是一个负责处理从数据库到对象转换的类。\n\n### 问题\n\n对象的组织方式与关系型数据库中的表不同。如你所知，数据库表是由行和列组成的网格。一行可以通过外键与另一个（或同一个）表中的另一行相关联。相比之下，对象之间的关联方式更为有机。一个对象可能包含另一个对象，不同的数据结构会以不同的方式组织相同的对象，在运行时通过新的关系组合和重组对象。关系型数据库针对管理大量表格化数据进行了优化，而类和对象则封装了更小、更集中的信息块。\n\
    \n这种类与关系型数据库之间的脱节通常被称为对象关系阻抗不匹配（或简称为阻抗不匹配）。\n\n那么，如何进行转换呢？一个答案是将这一问题的责任赋予一个类（或一组类），从而有效地向领域模型隐藏数据库，并管理转换过程中不可避免的粗糙边缘。\n\
    \n### 实现\n\n尽管通过细致的编程，有可能创建一个单一的`Mapper`类来服务多个对象，但通常的做法是为领域模型中的主要类各自创建一个独立的`Mapper`。\n\
    \n图 13-1 显示了三个具体的`Mapper`类和一个抽象超类。\n\n![A314621_5_En_13_Fig1_HTML.gif](img/A314621_5_En_13_Fig1_HTML.gif)\n\
    \n图 13-1.\n\nMapper 类\n\n实际上，由于`Space`对象从属于`Venue`对象，因此可以将`SpaceMapper`类纳入`VenueMapper`中。为了本练习的目的，我将保持它们分离。\n\
    \n如图所示，这些类提供了保存和加载数据的常见操作。基类存储了通用功能，而将处理特定于对象操作的职责委托给其子类。通常，这些操作包括实际的对象生成以及为数据库操作构建查询。\n\
    \n基类通常在操作前后执行一些内务处理，这就是为什么使用模板方法进行显式委托（例如，从像`insert()`这样的具体方法调用到像`doInsert()`这样的抽象方法）。实现决定了基类中的哪些方法由此具体化，你将在本章后面看到这一点。\n\
    \n以下是一个简化的`Mapper`基类版本：\n\n```\n// 清单 13.01\nabstract class Mapper\n{\n    protected\
    \ $pdo;\n    public function __construct()\n    {\n        $reg = Registry::instance();\n\
    \        $this->pdo = $reg->getPdo();\n    }\n    public function find(int $id):\
    \ DomainObject\n    {\n        $this->selectstmt()->execute([$id]);\n        $row\
    \ = $this->selectstmt()->fetch();\n        $this->selectstmt()->closeCursor();\n\
    \        if (! is_array($row)) {\n            return null;\n        }\n      \
    \  if (! isset($row['id'])) {\n            return null;\n        }\n        $object\
    \ = $this->createObject($row);\n        return $object;\n    }\n    public function\
    \ createObject(array $raw): DomainObject\n    {\n        $obj = $this->doCreateObject($raw);\n\
    \        return $obj;\n    }\n    public function insert(DomainObject $obj)\n\
    \    {\n        $this->doInsert($obj);\n    }\n    abstract public function update(DomainObject\
    \ $object);\n    abstract protected function doCreateObject(array $raw): DomainObject;\n\
    \    abstract protected function doInsert(DomainObject $object);\n    abstract\
    \ protected function selectStmt(): \\PDOStatement;\n    abstract protected function\
    \ targetClass(): string;\n}\n```\n\n构造函数使用`Registry`来获取一个 PDO 对象。对于这样的类，注册表确实展示了其价值。从控制层到`Mapper`，并不总是存在一条可以传递数据的合理路径。另一种管理映射器创建的方式是将它交给`Registry`类本身。映射器不会实例化，而是期望在构造函数参数中提供一个\
    \ PDO 对象：\n\n```\nabstract class Mapper\n{\n    protected $pdo;\n    function\
    \ __construct(\\PDO $pdo)\n    {\n        $this->pdo = $pdo;\n    }\n}\n```\n\n\
    客户端代码会通过`Registry`的某个方法（例如`getVenueMapper()`）获取一个新的`VenueMapper`。这会实例化一个映射器，同时生成\
    \ PDO 对象。对于后续请求，该方法会返回缓存的映射器。由于这种方法允许映射器忽略配置的复杂性（即使使用注册表作为外观），因此我通常选择后者。\n\n回到`Mapper`类，`insert()`方法除了委托给`doInsert()`之外不做其他事情。如果不是因为我知道这里使用的实现将来会派上用场，我会将其抽象为一个`insert()`方法。\n"
- fmt: '`find()` 负责调用预处理语句（由实现子类提供）并获取行数据，最后通过调用`createObject()`完成。将数组转换为对象的具体细节因情况而异，因此实现由抽象方法`doCreateObject()`处理。同样地，`createObject()`似乎除了委托给子类实现外什么也没做；我很快会添加一些内务处理逻辑，使这种模板方法模式的使用变得值得。


    子类还将实现自定义方法，根据特定条件查找数据（例如，我需要定位属于`Venue`对象的`Space`对象）。


    你可以从子类的角度查看以下过程：


    ```

    // listing 13.02

    class VenueMapper extends Mapper

    {

    private $selectStmt;

    private $updateStmt;

    private $insertStmt;

    public function __construct()

    {

    parent::__construct();

    $this->selectStmt = $this->pdo->prepare(

    "SELECT * FROM venue WHERE id=?"

    );

    $this->updateStmt = $this->pdo->prepare(

    "UPDATE venue SET name=?, id=? WHERE id=?"

    );

    $this->insertStmt = $this->pdo->prepare(

    "INSERT INTO venue ( name ) VALUES( ? )"

    );

    }

    protected function targetClass(): string

    {

    return Venue::class;

    }

    public function getCollection(array $raw): Collection

    {

    return new VenueCollection($raw, $this);

    }

    protected function doCreateObject(array $raw): DomainObject

    {

    $obj = new Venue(

    (int)$raw[''id''],

    $raw[''name'']

    );

    return $obj;

    }

    protected function doInsert(DomainObject $object)

    {

    $values = [$object->getName()];

    $this->insertStmt->execute($values);

    $id = $this->pdo->lastInsertId();

    $object->setId((int)$id);

    }

    public function update(DomainObject $object)

    {

    $values = [

    $object->getName(),

    $object->getId(),

    $object->getId()

    ];

    $this->updateStmt->execute($values);

    }

    public function selectStmt(): \PDOStatement

    {

    return $this->selectStmt;

    }

    }

    ```


    同样地，这个类去掉了部分尚未添加的功能特性，但依然能完成其工作。构造函数准备了一些后续使用的SQL语句。


    父类`Mapper`实现了`find()`方法，该方法调用`selectStmt()`获取准备好的`SELECT`语句。假设一切顺利，`Mapper`会调用`VenueMapper::doCreateObject()`。在这里，我使用关联数组生成`Venue`对象。


    从客户端的角度来看，这个过程非常简单：


    ```

    // listing 13.03

    $mapper = new VenueMapper();

    $venue = $mapper->find(2);

    print_r($venue);

    ```


    调用`print_r()`是确认`find()`是否成功的快速方法。在我的系统中（假设`venue`表中存在ID为`2`的行），该代码片段的输出如下：


    ```

    popp\ch13\batch01\Venue Object

    (

    [name:popp\ch13\batch01\Venue:private] => The Likey Lounge

    [spaces:popp\ch13\batch01\Venue:private] =>

    [id:popp\ch13\batch01\DomainObject:private] => 2

    )

    ```


    `doInsert()`和`update()`方法逆转了`find()`建立的过程。它们各自接受一个`DomainObject`，从中提取行数据，并使用提取的信息调用`PDOStatement::execute()`。注意，`doInsert()`方法会为传入的对象设置ID。请记住，在PHP中对象通过引用传递，因此客户端代码会通过其自身的引用看到这一变化。


    另一件需要注意的事情是，`doInsert()`和`update()`并非真正类型安全。它们会无报错地接受任何`DomainObject`子类。如果传入了错误类型的对象，应执行`instanceof`测试并抛出`Exception`。


    以下是插入和更新的客户端视角：


    ```

    // listing 13.04

    $mapper = new VenueMapper();

    $venue = new Venue(-1, "The Likey Lounge");

    // add the object to the database

    $mapper->insert($venue);

    // find the object again – just to prove it works!

    $venue = $mapper->find($venue->getId());

    print_r($venue);

    // alter our object

    $venue->setName("The Bibble Beer Likey Lounge");

    // call update to enter the amended data

    $mapper->update($venue);

    // once again, go back to the database to prove it worked

    $venue = $mapper->find($venue->getId());

    print_r($venue);

    ```'
  raw: '`find()` is responsible for invoking a prepared statement (provided by an
    implementing child class) and acquiring row data. It finishes up by calling `createObject()`.
    The details of converting an array to an object will vary from case to case, of
    course, so the implementation is handled by the abstract `doCreateObject()` method
    . Once again, `createObject()` seems to do nothing but delegate to the child implementation;
    and once again, I’ll soon add the housekeeping that makes this use of the Template
    Method pattern worth the trouble.


    Child classes will also implement custom methods for finding data according to
    specific criteria (I will want to locate `Space` objects that belong to `Venue`
    objects, for example).


    You can take a look at the process from the child’s perspective here:


    ```

    // listing 13.02

    class VenueMapper extends Mapper

    {

    private $selectStmt;

    private $updateStmt;

    private $insertStmt;

    public function __construct()

    {

    parent::__construct();

    $this->selectStmt = $this->pdo->prepare(

    "SELECT * FROM venue WHERE id=?"

    );

    $this->updateStmt = $this->pdo->prepare(

    "UPDATE venue SET name=?, id=? WHERE id=?"

    );

    $this->insertStmt = $this->pdo->prepare(

    "INSERT INTO venue ( name ) VALUES( ? )"

    );

    }

    protected function targetClass(): string

    {

    return Venue::class;

    }

    public function getCollection(array $raw): Collection

    {

    return new VenueCollection($raw, $this);

    }

    protected function doCreateObject(array $raw): DomainObject

    {

    $obj = new Venue(

    (int)$raw[''id''],

    $raw[''name'']

    );

    return $obj;

    }

    protected function doInsert(DomainObject $object)

    {

    $values = [$object->getName()];

    $this->insertStmt->execute($values);

    $id = $this->pdo->lastInsertId();

    $object->setId((int)$id);

    }

    public function update(DomainObject $object)

    {

    $values = [

    $object->getName(),

    $object->getId(),

    $object->getId()

    ];

    $this->updateStmt->execute($values);

    }

    public function selectStmt(): \PDOStatement

    {

    return $this->selectStmt;

    }

    }

    ```


    Once again, this class is stripped of some of the goodies that are still to come.
    Nonetheless, it does its job. The constructor prepares some SQL statements for
    use later on.


    The parent `Mapper` class implements `find()`, which invokes `selectStmt()` to
    acquire the prepared `SELECT` statement. Assuming all goes well, `Mapper` invokes
    `VenueMapper::doCreateObject()`. It’s here that I use the associative array to
    generate a `Venue` object.


    From the point of view of the client, this process is simplicity itself:


    ```

    // listing 13.03

    $mapper = new VenueMapper();

    $venue = $mapper->find(2);

    print_r($venue);

    ```


    The call to `print_r()` is a quick way of confirming that `find()` was successful.
    In my system (where there is a row in the `venue` table with ID `2`), the output
    from this fragment is as follows:


    ```

    popp\ch13\batch01\Venue Object

    (

    [name:popp\ch13\batch01\Venue:private] => The Likey Lounge

    [spaces:popp\ch13\batch01\Venue:private] =>

    [id:popp\ch13\batch01\DomainObject:private] => 2

    )

    ```


    The `doInsert()` and `update()` methods reverse the process established by `find()`.
    Each accepts a `DomainObject`, extracts row data from it, and calls `PDOStatement::execute()`
    with the resulting information. Notice that the `doInsert()` method sets an ID
    on the provided object. Remember that objects are passed by reference in PHP,
    so the client code will see this change via its own reference.


    Another thing to note is that `doInsert()` and `update()` are not really type
    safe. They will accept any `DomainObject` subclass without complaint. You should
    perform an `instanceof` test and throw an `Exception` if the wrong object is passed.


    Once again, here is a client perspective on inserting and updating :


    ```

    // listing 13.04

    $mapper = new VenueMapper();

    $venue = new Venue(-1, "The Likey Lounge");

    // add the object to the database

    $mapper->insert($venue);

    // find the object again – just to prove it works!

    $venue = $mapper->find($venue->getId());

    print_r($venue);

    // alter our object

    $venue->setName("The Bibble Beer Likey Lounge");

    // call update to enter the amended data

    $mapper->update($venue);

    // once again, go back to the database to prove it worked

    $venue = $mapper->find($venue->getId());

    print_r($venue);

    ```'
