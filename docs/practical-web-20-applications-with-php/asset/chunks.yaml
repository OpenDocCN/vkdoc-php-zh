    \ before loading this virtual host.\n\nThere may be other directives you wish\
    \ to add to your configuration, but this is a pretty standard configuration. It\
    \ allows you to override configuration per directory as required with a `.htaccess`\
    \ file (because of the `AllowOverride` directive), and it tells the PHP module\
    \ where to look for included files. In this example, it will first look in the\
    \ current directory, then in the `/var/www/phpweb20/include` directory, then finally\
    \ in the PEAR library. Note that the specific location of PEAR may change depending\
    \ on your Linux distribution or operating system.\n\n# Note\nAs a general rule,\
    \ the PHP `register_globals` setting should be set to off. If this setting is\
    \ on, the form, URL, session, and cookie variables will be made into global variables,\
    \ which is generally a bad thing.\n\nThe problem is that for many years the default\
    \ was to have this setting enabled, so some web servers will have it enabled while\
    \ others won’t. All code in this book will work with `register_globals` turned\
    \ off, just as all code you develop should (unless there’s a particular reason\
    \ to do otherwise). The same applies to the `magic_quotes_gpc` setting, which\
    \ is used to automatically escape submitted data. While it is not necessarily\
    \ a bad thing in general, all the code we develop will escape data as required;\
    \ this setting should not be relied upon and is therefore disabled.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# Creating a Virtual Host in Windows\nCreating a virtual host in Windows is\
    \ similar to the process in the previous section, except that the paths must be\
    \ adjusted. Note also that the PHP `include_path` directive uses a semicolon as\
    \ the separator rather than a colon, since a colon is used to indicate a drive\
    \ label.\n\nListing 2-2 shows the Windows equivalent of Listing 2-1. Once again,\
    \ you will need to include it in the main web server configuration file, typically\
    \ found in `C:\\Program Files\\Apache Software Foundation\\Apache2.2\\conf\\httpd.conf`\
    \ on Windows.\n\n**Listing 2-2.** *Web Server Configuration for Apache on Windows\
    \ (httpd.conf )*\n\n```\n<VirtualHost *:80>\n  ServerName phpweb20\n  DocumentRoot\
    \ \"c:/www/phpweb20/htdocs\"\n  <Directory \"c:/www/phpweb20/htdocs\">\n    AllowOverride\
    \ None\n    Options All\n  </Directory>\n  php_value include_path \".;c:/www/phpweb20/include;c:/program\
    \ files/php/pear\"\n  php_value magic_quotes_gpc off\n  php_value register_globals\
    \ off\n</VirtualHost>\n```\n\n## Restarting Your Web Server\nAfter making changes\
    \ to your web server configuration, you must restart your web server. In Linux,\
    \ the typical way to do this is with the following command:\n\n```\n# apachectl\
    \ restart\n```\n\nIn Windows, you can restart Apache by going to Control Panel\
    \ ➤ Administrative Tools ➤ Services and selecting restart on the Apache2 service.\n\
    \nOnce your server has been restarted, you should be able to access [http://phpweb20](http://phpweb20)\
    \ directly in your browser (or by entering the server IP address directly, although\
    \ if you’re using a name-based virtual host system as described previously, this\
    \ will not show files from the application directory).\n\n## Setting Up the Database\n\
    The next thing we need to do is create the MySQL database that we will be using\
    \ in the web application. We will call this database `phpweb20`, and we will create\
    \ a user called `phpweb20` to access this database.\n\nTo create the database,\
    \ load the MySQL client program (`mysql`) and issue the `CREATE DATABASE` command\
    \ as shown here:\n\n```\n# mysql -u root\nWelcome to the MySQL monitor. Commands\
    \ end with ; or \\g.\nYour MySQL connection id is 1 to server version: 5.0.27-standard\n\
    \nmysql> CREATE DATABASE phpweb20;\nQuery OK, 1 row affected (0.00 sec)\n\nmysql>\
    \ use phpweb20\nDatabase changed\n```\n\nNext, we must create the `phpweb20` user\
    \ and assign a password to the account:\n\n```\nmysql> grant all on phpweb20.*\
    \ to phpweb20@localhost identified by 'myPassword';\nQuery OK, 0 rows affected\
    \ (0.01 sec)\n```\n\n# Warning\nI use the password `myPassword` for this book,\
    \ but if you plan on deploying this application and using it as a real-world site,\
    \ it is essential that you use a different password than the one created here,\
    \ as anybody who has read this book will be able to access your database if you\
    \ don’t.\n\nTo ensure that the database and user have been correctly created,\
    \ try exiting from the MySQL client and connecting using the new details. To do\
    \ so, type the following command and then enter your password when prompted:\n\
    \n```\n# mysql -u phpweb20 -p\n```"
