    \   ```\n\n6. 在项目根目录（`hatshop`）创建一个名为 `hatshop.css` 的文件，并编写以下代码：\n\n   ```\n \
    \  body\n   {\n   font-family: tahoma, verdana, arial;\n   font-size: 11px;\n\
