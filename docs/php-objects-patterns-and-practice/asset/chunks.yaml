- fmt: '### Implementation


    An identity map is simply an object whose task it is to keep track of all the
    objects in a system, and thereby help to ensure that nothing that should be one
    object becomes two.


    In fact, the `Identity Map` itself does not prevent this from happening in any
    active way. Its role is to manage information about objects. Here is a simple
    `Identity Map`:


    ```

    // listing 13.19

    class ObjectWatcher

    {

    private $all = [];

    private static $instance = null;

    private function __construct()

    {

    }

    public static function instance(): self

    {

    if (is_null(self::$instance)) {

    self::$instance = new ObjectWatcher();

    }

    return self::$instance;

    }

    public function globalKey(DomainObject $obj): string

    {

    $key = get_class($obj) . "." . $obj->getId();

    return $key;

    }

    public static function add(DomainObject $obj)

    {

    $inst = self::instance();

    $inst->all[$inst->globalKey($obj)] = $obj;

    }

    public static function exists($classname, $id)

    {

    $inst = self::instance();

    $key = "{$classname}.{$id}";

    if (isset($inst->all[$key])) {

    return $inst->all[$key];

    }

    return null;

    }

    }

    ```


    Figure [13-4](#A314621_5_En_13_Chapter.html#Fig4) shows how an `Identity Map`
    object might integrate with other classes you have seen.


    ![A314621_5_En_13_Fig4_HTML.gif](A314621_5_En_13_Fig4_HTML.gif)


    **Figure 13-4.** An Identity Map


    The main trick with an `Identity Map` is, pretty obviously, identifying objects.
    This means that you need to tag each object in some way. There are a number of
    different strategies you can take here. The database table key that all objects
    in the system already use is no good because the ID is not guaranteed to be unique
    across all tables.


    You could also use the database to maintain a global key table. Every time you
    created an object, you would iterate the key table’s running total and associate
    the global key with the object in its own row. The overhead of this is relatively
    slight, and it would be easy to do.


    As you can see, I have gone for an altogether simpler approach. I concatenate
    the name of the object’s class with its table ID. There cannot be two objects
    of type `popp\ch13\batch03\Event` with an ID of 4, so my key of `popp\ch13\batch03\Event.4`
    is safe enough for my purposes.


    The `globalKey()` method handles the details of this. The class provides an `add()`
    method for adding new objects. Each object is labeled with its unique key in an
    array property, `$all`.


    The `exists()` method accepts a class name and an `$id` rather than an object.
    I don’t want to have to instantiate an object to see whether or not it already
    exists! The method builds a key from this data and checks to see if it indexes
    an element in the `$all` property. If an object is found, a reference is duly
    returned.


    There is only one class where I work with the `ObjectWatcher` class in its role
    as an `Identity Map`. The `Mapper` class provides functionality for generating
    objects, so it makes sense to add the checking there:


    ```

    // listing 13.20

    // Mapper

    public function find(int $id): DomainObject

    {

    $old = $this->getFromMap($id);

    if (! is_null($old)) {

    return $old;

    }

    // work with db

    return $object;

    }

    abstract protected function targetClass(): string;

    private function getFromMap($id)

    {

    return ObjectWatcher::exists(

    $this->targetClass(),

    $id

    );

    }

    private function addToMap(DomainObject $obj)

    {

    ObjectWatcher::add($obj);

    }

    public function createObject($raw)

    {

    $old = $this->getFromMap($raw[''id'']);

    if (! is_null($old)) {

    return $old;

    }

    $obj = $this->doCreateObject($raw);

    $this->addToMap($obj);

    return $obj;

    }

    public function insert(DomainObject $obj)

    {

    $this->doInsert($obj);

    $this->addToMap($obj);

    }

    ```


    The class provides two convenience methods: `addToMap()` and `getFromMap()`. These
    save me the bother of remembering the full syntax of the static call to `ObjectWatcher`.
    More importantly, they call down to the child implementation (e.g., `VenueMapper`)
    to get the name of the class currently awaiting instantiation.


    This is achieved by calling `targetClass()`, an abstract method that is implemented
    by all concrete `Mapper` classes. It should return the name of the class that
    the `Mapper` is designed to generate. Here is the `SpaceMapper` class’s implementation
    of `targetClass()`:


    ```

    // listing 13.21

    // SpaceMapper

    protected function targetClass(): string

    {

    return Space::class;

    }

    ```


    Both `find()` and `createObject()` first check for an existing object by passing
    the object ID to `getFromMap()`. If an object is found, it is returned to the
    client and method execution ends. If, however, there is no version of this object
    in existence yet, object instantiation goes ahead. In `createObject()`, the new
    object is passed to `addToMap()` to prevent any clashes in the future.


    So why am I going through part of this process twice, with calls to `getFromMap()`
    in both `find()` and `createObject()`? The answer lies with `Collections`. When
    these generate objects, they do so by calling `createObject()`. I need to make
    sure that the row encapsulated by a `Collection` object is not stale, as well
    as to ensure that the latest version of the object is returned to the user.


    ### Consequences


    As long as you use the `Identity Map` in all contexts in which objects are generated
    from or added to the database, the possibility of duplicate objects in your process
    is practically zero.


    Of course, this only works within your process. Different processes will inevitably
    access versions of the same object at the same time. It is important to think
    through the possibilities for data corruption engendered by concurrent access.
    If there is a serious issue, you may need to consider a locking strategy. You
    might also consider storing objects in shared memory or using an external object
    caching system like Memcached. You can learn about Memcached at [`http://danga.com/memcached/`](http://danga.com/memcached/)
    and about PHP support for it at [`http://www.php.net/memcache`](http://www.php.net/memcache).


    ## Unit of Work


    When do you save your objects? Until I discovered the `Unit of Work` pattern (written
    up by David Rice in Martin Fowler’s Patterns of Enterprise Application Architecture),
    I sent out save orders from the Presentation layer upon completion of a command.
    This turned out to be an expensive design decision.


    The `Unit of Work` pattern helps you to save only those objects that need saving.


    ### The Problem


    One day, I echoed my SQL statements to the browser window to track down a problem
    and had a shock. I found that I was saving the same data over and over again in
    the same request. I had a neat system of composite commands, which meant that
    one command might trigger several others, and each one was cleaning up after itself.


    Not only was I saving the same object twice, I was saving objects that didn’t
    need saving.


    This problem, then, is similar in some ways to that addressed by `Identity Map`.
    That problem involved unnecessary object loading; this problem lies at the other
    end of the process. Just as these issues are complementary, so are the solutions.'
