    \ {\n    if ((string) $_GET['DepartmentID'] == AMAZON_DEPARTMENT_TITLE) {\n  \
    \      $pageContentsCell = 'amazon_products_list.tpl';\n    } else {\n       \
    \ $pageContentsCell = 'department.tpl';\n        $categoriesCell = 'categories_list.tpl';\n\
    \    }\n}\n```\n\n9. 在浏览器中加载 `index.php`，然后点击您新创建的 Amazon Super Hats 部门。\n"
- fmt: "# How It Works: Displaying Amazon.com Products in HatShop\n\nIn this exercise,\
    \ you simply updated `HatShop` to display Amazon.com products by employing the\
    \ techniques you studied in the first part of the chapter. The new functionality\
    \ isn’t especially complex, but the possibilities are exciting.\n\nTo change the\
    \ access method, modify the following in `include/config.php`:\n\n```\n// Amazon\
    \ E-Commerce Service\ndefine('AMAZON_METHOD', 'REST');\n//define('AMAZON_METHOD',\
    \ 'SOAP');\n```\n\nWhen `Buy From Amazon` links are clicked, Amazon.com associates\
    \ that customer and what he or she purchases to your Associate ID (which is mentioned\
    \ in the links). In the `init` method from the `AmazonProductsList` class, the\
    \ `GetProducts` method from the `Amazon` class is called to get the data to populate\
    \ the list of products. This data is read to build the Amazon links to the retrieved\
    \ products:\n\n```\npublic function init()\n{\n    $amazon = new Amazon();\n \
    \   $this->mProducts = $amazon->GetProducts();\n    for ($i = 0;$i < count($this->mProducts);\
    \ $i++)\n        $this->mProducts[$i]['link'] =\n            'http://www.amazon.com/exec/obidos/ASIN/'\
    \ .\n            $this->mProducts[$i]['asin'] .\n            '/ref=nosim/' . AMAZON_ASSOCIATES_ID;\n\
    }\n```\n\nHowever, you must know that Amazon offers many ways in which you can\
    \ allow your visitors to buy their products.\n\nIf you log in to the Associates\
    \ page, you’ll see a number of link types you can build and integrate into your\
    \ web site.\n\nPerhaps the most interesting and powerful is the possibility to\
    \ create and manage Amazon shopping carts from your PHP code by using the Amazon\
    \ API. If you’re really into integrating Amazon.com into your web site, you should\
    \ study the ECS documentation carefully and make the most of it.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XCH17a.qxd 11/22/06 5:42 AM Page 569\n\nC H AP T E R 1 7 ■ CO N NE C TI NG\
    \ TO WE B SE R V I CE S\n\n**569**\n\n## Summary\n\nIn this chapter, you learned\
    \ how to access Amazon E-Commerce Service using `REST` and `SOAP`. You will be\
    \ able to use the same techniques when accessing any kind of external functionality\
    \ exposed through these protocols.\n\nCongratulations, you have just finished\
    \ your journey into learning about building e-commerce web sites with PHP and\
    \ PostgreSQL. You have the knowledge to build your own customized solutions, perhaps\
    \ even more interesting and powerful than what we showed you in this book. We\
    \ hope you enjoyed reading this book, and we wish you good luck with your own\
    \ personal PHP and PostgreSQL projects!\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XCH17a.qxd 11/22/06 5:42 AM Page 570\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XAppA.qxd 11/19/06 1:45 PM Page 571\n\n# Appendix A: Installing Apache, PHP,\
    \ and PostgreSQL\n\nIn this appendix, you’ll learn how to install:\n\n- Apache\
    \ 2.2\n- PHP 5.1 and the extra modules required for this book\n- PostgreSQL 8.1\n\
    \nThese are the software versions this appendix has been tested with. You should,\
    \ however, install the latest version of all software packages, understanding\
    \ that the installation steps might slightly differ. We’ll discuss installation\
    \ under Windows and under Linux separately.\n\nThe `HatShop` application you’ll\
    \ develop in the book may work with older versions of the software too. It is\
    \ very important that the PHP version is PHP 5.0 or more recent; the code uses\
    \ OOP syntax that isn’t recognized by older versions of PHP.\n\nBecause highly\
    \ sensitive data such as credit card information must travel safely over the Web,\
    \ it’s critical to host your application on an SSL-powered web server. Also, the\
    \ PHP installation must have these modules installed: `CURL`, `mcrypt`, `mhash`,\
    \ `SOAP`, `PDO`, and `PDO` driver for PostgreSQL.\n\n## Preparing Your Windows\
    \ Playground\n\nIn this section, you’ll learn how to install Apache 2.2, PHP 5.1,\
    \ and PostgreSQL 8.1 on your development machine.\n\nIn Windows, installing an\
    \ SSL-enabled Apache is a little bit more complicated than installing Apache without\
    \ SSL. You can follow this book even if you don’t have an SSL-enabled Apache;\
    \ if you choose to do so, you can skip to the upcoming “Installing Apache (No\
    \ SSL)”."
