- fmt: "# Beginning PHP and PostgreSQL E-Commerce: From Novice to Professional\n\n\
    ![](cover.jpeg)\n\n![](images/00069.jpeg)\n\n![](images/00028.jpeg)\n\n![](images/00051.jpeg)\n\
    \n![](images/00065.jpeg)\n\n![](images/00085.jpeg)\n\nCYAN YELLOW MAGENTA BLACK\
    \ PANTONE 123 CV\n\nBOOKS FOR PROFESSIONALS BY PROFESSIONALS®\n\nTHE EXPERT’S\
    \ VOICE® IN OPEN SOURCE\n\n**Companion eBook Available**\n\nDear Reader,\n\nThe\
    \ PHP language and the PostgreSQL database have long offered an ideal blend of\
    \ practicality and power for both the novice and experienced programmer alike.\n\
    \nThis book shows you how to take advantage of this powerful duo to build a full-featured\
    \ e-commerce web site. Guiding you through the entire design and build process,\
    \ you’ll create a professionally developed application that allows for the ongoing\
    \ integration of new features in an organized manner.\n\nWith each chapter, you’ll\
    \ learn how to develop and deploy an online product catalog complete with a shopping\
    \ cart, checkout mechanism, product search, product recommendations, administrative\
    \ features, customer accounts, an order-management system, and more.\n\nYou’ll\
    \ also learn how to process electronic payments by integrating several popular\
    \ payment services, including PayPal, DataCash, and Authorize.net.\n\nWith each\
    \ new feature, you’ll be introduced to new challenges and theoretical concepts,\
    \ which are all thoroughly explained. Along the way, you will gain an intimate\
    \ understanding of every piece of code you write, which will enable you to build\
    \ your own powerful and flexible web sites efficiently and rapidly with PHP and\
    \ PostgreSQL.\n\nHave fun reading this book!\n\n*Cristian, Emilian, and Mihai*\n\
    \n---\n\nTHE APRESS ROADMAP\n\n- PHP 5 Objects, Patterns, and Practice\n- Beginning\
    \ PHP and PostgreSQL 8\n- Pro PHP\n- Beginning PostgreSQL, Pro PostgreSQL\n- Essential\
    \ PHP Tools: Modules, Extensions, and Accelerators\n\n**Companion eBook**  \n\
