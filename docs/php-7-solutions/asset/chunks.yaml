    \ Again,\n    use the same combination of uppercase and lowercase letters in the\n\
    \    filename. Then insert the following code:\n\n```\n    <?php\n    namespace\
    \ PhpSolutions\\File;\n    class Upload {\n    }\n    ```\n\nAll the remaining\
    \ code goes between the curly braces. This file will\n    contain only PHP code,\
    \ so you don’t need a closing PHP tag.\n\n4.  PHP classes hide their inner workings\
    \ by declaring some variables and\n    functions as protected. If you prefix a\
    \ variable or function with the\n    keyword `protected`, it can be\n    accessed\
    \ only inside the class  or a subclass.\n    This prevents values from being changed\
    \ accidentally.\n\nThe `Upload`\n    class needs protected variables for the following\
    \ items:\n\n*   Path to the upload folder\n\n*   Maximum file size\n\n*   Messages\
    \ to report the status of uploads\n\n*   Permitted MIME types\n\nCreate the variables\
    \ by adding them inside the curly braces, like this:\n\n```\n    class Upload\
    \ {\n    protected $destination;\n    protected $max = 51200;\n    protected $messages\
    \ = [];\n    protected $permitted = [\n    'image/gif',\n    'image/jpeg',\n \
    \   'image/pjpeg',\n    'image/png',\n    'image/webp'\n    ];\n    }\n    ```\n\
    \nThese properties can be accessed elsewhere in the class using `$this->`, which\n\
    \    refers to the current object. For example, inside the class definition,\n\
    \    you access `$destination` as `$this->destination`.\n\nNote\nWhen you first\
    \ declare a property inside a class, it begins with a\ndollar sign like any other\
    \ variable. However, you omit the dollar sign\nfrom the property name after the\
    \ -`>` operator.\n\nWith the exception of `$destination`, each\nprotected property\
    \ has been given a default value:\n\n*   `$max`\n    sets the maximum file size\
    \ to 50 KB (51200 bytes).\n\n*   `$messages` is an empty\n    array.\n\n*   `$permitted`\
    \ contains\n    an array of image MIME types.\n\nThe value of `$destination` will\
    \ be\n    set when an instance of the class is created. The other values will\
    \ be\n    controlled internally by the class, but you’ll also create functions\
    \ (or\n    **methods**, as they’re called in classes) to change the\n    values\
    \ of `$max`\n    and `$permitted`.\n\n1.  When you create an object, the class\
    \ definition file automatically\n    calls the class’s constructor method, which\
    \ initializes the object. The\n    constructor method for all classes is called\
    \ `__construct()` (with\n    two underscores). Unlike the properties you defined\
    \ in the previous\n    step, the constructor needs to be accessible outside the\
    \ class, so you\n    precede its definition with the `public`  keyword.\n\nNote\n\
    The `public`\nand `protected`\nkeywords control the **visibility** of properties\
    \ and\nmethods. Public properties and methods can be accessed anywhere.\nAttempting\
    \ to access protected properties or methods directly outside\nthe class definition\
    \ or a subclass triggers a fatal error.\n\nThe constructor for the `Upload` class\
    \ takes as\nan argument the path to the folder where you want to upload the file\
    \ and\nassigns it to `$destination`. Add the\nfollowing code after the list of\
    \ protected properties, making sure it’s\nbefore the closing curly brace of the\
    \ class definition:\n\n```\npublic function __construct($path) {\nif (is_dir($path)\
    \ && is_writable($path)) {\n$this->destination = rtrim($path, '/\\\\') . DIRECTORY_SEPARATOR;\n\
    } else {\nthrow new \\Exception(\"$path must be a valid,writable directory.\"\
    );\n}\n}\n```\n\nThe conditional statement inside the constructor passes `$path`\
    \ to the `is_dir()` and `is_writable()`\nfunctions, which check that the value\
    \ submitted is a valid directory\n(folder) that is writable. If it is, the `rtrim()`\
    \ function\nremoves any whitespace and slashes from the end of `$path`, and then\n\
    concatenates the correct directory separator for the operating system.\nThis ensures\
    \ that the path ends with a slash regardless of whether it’s\nadded by the user\
    \ when creating an `Upload` object. When\njust one argument is passed to `rtrim()`,\
    \ it removes\nonly whitespace. The second, optional argument is a string containing\n\
    all other characters to be stripped. Two backslashes are required to\nescape the\
    \ closing quote. The constructor throws an exception if the\nvalue passed to it\
    \ isn’t a valid, writable directory.\n\nNote\nClasses can define their own exceptions,\
    \ and because the Upload class\nis defined within a namespace, it’s ambiguous\
    \ whether the constructor\nshould use a custom exception or the `Exception` class\n\
    that’s a core part of PHP. To access core commands inside a namespace,\nyou prefix\
    \ them with a backslash. That’s why there’s a backslash in\nfront of Exception.\
    \ We’re using the core Exception class, not a custom\none.\n\n1.  Next, create\
    \ a public method called `upload()`. This will\n    initiate a series of tests\
    \ on the file before uploading it. Insert this\n    code immediately after the\
    \ constructor method that you defined in the\n    previous step:\n\n```\n    public\
    \ function upload($fieldname) {\n    $uploaded = $_FILES[$fieldname];\n    if\
    \ ($this->checkFile($uploaded)) {\n    $this->moveFile($uploaded);\n    }\n  \
    \  }\n    ```\n\nThe `upload()`\n    method takes a single argument, the name\
    \ of the file input field, and\n    uses it to assign the appropriate subarray\
    \ of `$_FILES` to `$uploaded`, which is\n    then passed to two methods that we’ll\
    \ define next.\n\nTip\n`$_FILES` is\none of PHP’s superglobal arrays, so it’s\
    \ available in all parts of a\nscript. That’s why there’s no need to pass it as\
    \ an argument to the\nclass constructor method.\n\n1.  The conditional statement\
    \ in the `upload()` method calls\n    `checkFile()`\n    using the `$this`\n \
    \   keyword. The `$this` keyword is also\n    used to call functions (methods)\
    \ defined within the class. For the time\n    being, we’ll assume that the file\
    \ is okay, so `checkFile()` will\n    simply return `true`. Add the\n    following\
    \ code to the class definition:\n\n```\n    protected function checkFile($file)\
    \ {\n    return true;\n    }\n    ```\n\nPreceding the definition with the `protected`\
    \ keyword\n    means this method can be accessed only inside the class. We’ll\
    \ return to\n    `checkFile()` in\n    PHP Solution 9-3 to add a series of tests\
    \ before uploading the file."
