    \ previously shown in bold:\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
    ?>\n<Request>\n    <Authentication>\n        <password>**DataCash password**</password>\n\
    \        <client>**DataCash client**</client>\n    </Authentication>\n    <Transaction>\n\
    \        <TxnDetails>\n            <merchantreference>**Unique reference number**</merchantreference>\n\
    \            <amount currency='Currency Type'>**Cash amount**</amount>\n     \
    \   </TxnDetails>\n        <CardTxn>\n            <method>**pre**</method>\n \
    \           <Card>\n                <pan>Credit card number</pan>\n          \
    \      <expirydate>Credit card expiry date</expirydate>\n            </Card>\n\
    \        </CardTxn>\n    </Transaction>\n</Request>\n```\n\n## Response to Pre-Authentication\
    \ Request\n\nThe response to a pre-authentication request includes the following\
    \ information:\n\n- A status code number indicating what happened; `1` if the\
    \ transaction was successful, or one of several other codes if something else\
    \ happens. For a complete list of return codes for a DataCash server, see https://testserver.datacash.com/software/returncodes.shtml.\n\
    - A reason for the status, which is basically a string explaining the status in\
    \ English. For a status of `1`, this string is `ACCEPTED`.\n- An authentication\
    \ code and a reference number that will be used to fulfill the transaction in\
    \ the fulfillment request stage (discussed next).\n- The time that the transaction\
    \ was processed.\n- The mode of the transaction, which is `TEST` when using the\
    \ test account.\n- Confirmation of the type of credit card used.\n- Confirmation\
    \ of the country that the credit card was issued in.\n- The authorization code\
    \ used by the bank (for reference only).\n\nThe XML for this is formatted as follows:\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<Response>\n    <status>Status\
    \ code</status>\n    <reason>Reason</reason>\n    <merchantreference>Authentication\
    \ code</merchantreference>\n    <datacash_reference>Reference number</datacash_reference>\n\
    \    <time>Time</time>\n    <mode>TEST</mode>\n    <CardTxn>\n        <card_scheme>Card\
    \ Type</card_scheme>\n        <country>Country</country>\n        <issuer>Card\
    \ issuing bank</issuer>\n        <authcode>Bank authorization code</authcode>\n\
    \    </CardTxn>\n</Response>\n```\n\n## Fulfillment Request\n\nFor a fulfillment\
    \ request, you need to send the following information:\n\n- DataCash username\
    \ (the DataCash Client)\n- DataCash password\n- The type of the transaction (for\
    \ fulfillment, the code `fulfil`)\n- The authentication code received earlier\n\
    - The reference number received earlier\n\nOptionally, you can include additional\
    \ information, such as a confirmation of the amount to be debited from the credit\
    \ card, although this isn’t really necessary.\n\nThis is formatted as follows:\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<Request>\n    <Authentication>\n\
    \        <password>DataCash password</password>\n        <client>DataCash client</client>\n\
    \    </Authentication>\n    <Transaction>\n        <HistoricTxn>\n           \
    \ <reference>Reference Number</reference>\n            <authcode>Authentication\
    \ code</authcode>\n            <method>fulfil</method>\n        </HistoricTxn>\n\
    \    </Transaction>\n</Request>\n```\n\n## Fulfillment Response\n\nThe response\
    \ to a fulfillment request includes the following information:\n\n- A status code\
    \ number indicating what happened; `1` if the transaction was successful, or one\
    \ of several other codes if something else happens. Again, for a complete list\
    \ of the codes, see https://testserver.datacash.com/software/returncodes.shtml.\n\
    - A reason for the status, which is basically a string explaining the status in\
    \ English. For a status of `1`, this string is `FULFILLED OK`.\n- Two copies of\
    \ the reference code for use by DataCash.\n- The time that the transaction was\
    \ processed.\n- The mode of the transaction, which is `TEST` when using the test\
    \ account.\n\nThe XML for this is formatted as follows:\n\n```xml\n<?xml version=\"\
    1.0\" encoding=\"utf-8\"?>\n<Response>\n    <status>Status code</status>\n   \
    \ <reason>Reason</reason>\n    <merchantreference>Reference Code</merchantreference>\n\
    </Response>\n```"
