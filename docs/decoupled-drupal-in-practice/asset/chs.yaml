  \ `language`，即节点的语言，应以 `LanguageId`（一个 GraphQL 模块提供的类型，要求语言代码为大写字母且不带引号；例如 `EN`、`FR`）形式提供。`language`\
  \ 参数默认为 `null`，因此是可选的。\n\n```\n{\n  nodeById(id: \"1\", language: EN) {\n    title\n\
  \  }\n}\n```\n\n正如我们所料，上述查询会生成以下响应。请注意，在此场景中，我们使用的是通过 Devel Generate 生成的内容（参见第 7\
  \ 章）。\n\n```\n{\n  \"data\": {\n    \"nodeById\": {\n      \"title\": \"At Autem\
  \ Hos Nostrud Saluto Voco\"\n    }\n  }\n}\n```\n\n如本例所示，我们可以深入节点以访问其中包含的字段，例如 `title`。尽管这些字段映射到它们对应的\
  \ Drupal 字段（正如我们在之前核心 REST 和 JSON API 的响应中看到的，例如 `status`、`changed`、`created` 等），但\
  \ GraphQL 模块也提供预格式化的字段，例如 `entityLabel`。考虑以下查询。\n\n```\n{\n  nodeById(id: \"1\"\
  ) {\n    entityLabel\n    changed\n    entityChanged\n  }\n}\n```\n\n此查询会生成以下响应，如图\
  \ 14-1 所示。如您所见，`changed` 返回的是 Unix 时间戳，这与我们目前为止介绍的其他 API 类似，要求我们在消费端处理日期；而 `entityChanged`\
  \ 则根据 Drupal 的默认日期格式化器为我们提供了日期。这是一个强大的结果，意味着我们可以同时利用来自 Drupal 的原始输出和格式化输出。\n\n![../images/468476_1_En_14_Chapter/468476_1_En_14_Fig1_HTML.jpg](img/468476_1_En_14_Fig1_HTML.jpg)\n\
  \n**图 14-1** GraphQL 模块允许我们指定需要来自 Drupal 的原始输出还是格式化输出。在此例中，`entityChanged` 已经过 Drupal\
  \ 的日期格式化器处理。\n\n```\n{\n  \"data\": {\n    \"nodeById\": {\n      \"entityLabel\"\
  : \"At Autem Hos Nostrud Saluto Voco\",\n      \"changed\": 1536169822,\n      \"\
  entityChanged\": \"2018-09-05T17:50:22+0000\"\n    }\n  }\n}\n```\n\n用户的检索操作方式大致相同。考虑以下示例，这是一个检索用户实体的查询，其字段遵循\
  \ GraphQL 模块中定义的 `User` 类型。\n\n```\n{\n  userById(id: \"2\") {\n    uid\n    name\n\
  \    mail\n  }\n}\n```\n\n此查询会生成以下响应。\n\n```\n{\n  \"data\": {\n    \"userById\"\
  : {\n      \"uid\": 2,\n      \"name\": \"chifrothaw\",\n      \"mail\": \"chifrothaw@example.com\"\
  \n    }\n  }\n}\n```\n\n我们还可以检索实体内部的关系。考虑以下示例查询，它获取一个节点实体及其作者。在此查询中，我们在第一级包含遵循 `Node`\
  \ 类型的字段，但由于 `entityOwner` 的类型是 `User`，我们必须使用 `User` 类型定义中的字段。我们还使用了别名（参见第 8 章）来改善构建我们消费端的开发人员的体验。\n\
  \n```\n{\n  entity: nodeById(id: \"2\") {\n    title: entityLabel\n    created:\
  \ entityCreated\n    author: entityOwner {\n      id: uid\n      name\n      email:\
  \ mail\n    }\n  }\n}\n```\n\n结果如下所示，如图 14-2 所示。\n\n![../images/468476_1_En_14_Chapter/468476_1_En_14_Fig2_HTML.jpg](img/468476_1_En_14_Fig2_HTML.jpg)\n\
  \n**图 14-2** 在此示例中，除了包含关于创建此实体的用户的信息外，我们还使用别名来改善消费端开发人员的体验。\n\n```\n{\n  \"data\"\
  : {\n    \"entity\": {\n      \"title\": \"Aliquip Quia\",\n      \"created\": \"\
  2018-09-05T17:50:22+0000\",\n      \"author\": {\n        \"id\": 1,\n        \"\
  name\": \"admin\",\n        \"email\": \"admin@example.com\"\n      }\n    }\n \
  \ }\n}\n```\n\n您可能已经注意到，虽然我们获得了关于实体的某些关键信息（例如何时创建或更改、由谁创建以及叫什么名称），但我们缺少其他信息，例如内容实体的实际主体。这是因为，虽然*主体*字段在\
  \ Article 和 Page 类型的节点中是必需的，但在 Drupal 的内容建模系统中，完全可以不包含*主体*字段。\n\n每当我们创建新的内容类型时，正如您可能从我们对\
  \ JSON API 的学习中回忆起的，该类型的所有内容实体都会被分配一个包。在 Drupal 对 GraphQL 的实现中，对于统管所有节点（不论其包）的总体\
  \ `Node` 类型，以及包含包特定信息（如*主体*字段）的独立 `NodeArticle` 和 `NodePage` 类型，两者之间存在明显区别。\n\n\
  考虑以下示例。在此场景中，我们使用一个片段来指定：只有当涉及的节点是文章时，才应检索其主体。\n\n```\n{\n  entity: nodeById(id:\
  \ \"2\") {\n    title: entityLabel\n    created: entityCreated\n    author: entityOwner\
  \ {\n      id: uid\n      name\n      email: mail\n    }\n    ...body\n  }\n}\n\n\
  fragment body on NodeArticle {\n  body {\n    value\n  }\n}\n```\n\n回想一下，我们也可以内联此片段，以避免重复编写字段名称。\n\
  \n```\n{\n  entity: nodeById(id: \"2\") {\n    title: entityLabel\n    created:\
  \ entityCreated\n    author: entityOwner {\n      id: uid\n      name\n      email:\
  \ mail\n    }\n    ... on NodeArticle {\n      body {\n        value\n      }\n\
  \    }\n  }\n}\n```\n\n此查询的结果如下，如图 14-3 所示。\n\n![../images/468476_1_En_14_Chapter/468476_1_En_14_Fig3_HTML.jpg](img/468476_1_En_14_Fig3_HTML.jpg)\n\
  \n**图 14-3** 我们可以根据所针对的特定包的值来内联一个片段。在此例中，只有当实体是文章时，主体才会包含在响应中。\n\n```\n{\n  \"data\"\
  : {\n    \"entity\": {\n      \"title\": \"Aliquip Quia\",\n      \"created\": \"\
  2018-09-05T17:50:22+0000\",\n      \"author\": {\n        \"id\": 1,\n        \"\
  name\": \"admin\",\n        \"email\": \"admin@example.com\"\n      },\n      \"\
  body\": {\n        \"value\": \"Abico ideo ratis scisco. Accumsan dignissim ea fere\
  \ in quadrum venio volutpat. Facilisis genitus ideo immitto jugis magna neque pecus\
  \ quae. Ad huic in jumentum meus nutus. Blandit nutus pecus ut. Aliquip commoveo\
  \ inhibeo metuo.\"\n      }\n    }\n  }\n}\n```\n\n### 注意\nDrupal 对 GraphQL 的实现提供了多种用于检索单个实体的查询，远不止本概述的范围，包括\
  \ `blockContentById`（自定义块内容）、`commentById`（评论）、`contactMessageById`（联系表单提交）、`fileById`（文件实体）、`shortcutById`（快捷方式）、`taxonomyTermById`（分类术语）和\
  \ `nodeRevisionById`（节点修订）。GraphiQL 的自动完成和文档功能可以帮助您探索这些查询中有哪些字段可用。\n\n\n\n### 获取实体集合\n\
  \n除了通过标识符检索单个实体的查询外，GraphQL 模块还提供了集合查询，可以对一系列实体执行任意操作，例如 `nodeQuery` 和 `userQuery`。请看以下示例。\n\
  \n```\n{\n  collection: nodeQuery(limit: 20) {\n    entities {\n      title: entityLabel\n\
  \    }\n  }\n}\n```\n\n该查询将返回包含 20 个实体的集合，如图 14-4 所示。\n\n![../images/468476_1_En_14_Chapter/468476_1_En_14_Fig4_HTML.jpg](img/468476_1_En_14_Fig4_HTML.jpg)\n\
  \n图 14-4\n\n在此查询中，我们检索了一个实体集合，但将响应限制为 20 个实体。\n\n在 GraphQL 的 Drupal 实现中，`nodeQuery`\
  \ 接受几个参数：`limit`，表示响应中包含的实体数量（默认为 10）；`offset`，表示在响应中包含某个实体之前要跳过的实体数量（默认为 0）；`sort`，指定实体的排序方式；`filter`，提供任意过滤器；以及\
  \ `revisions`，指定是否应包含修订版本。`revisions` 参数的默认值为 `DEFAULT`，表示加载当前修订版本；`ALL` 加载所有修订版本，`LATEST`\
  \ 仅加载最新修订版本（所有值均不带引号，因为它们遵循各自的类型定义）。\n\n为了同时检索这些实体的正文，我们可以使用以下查询，该查询深入到了每个包（bundle）的具体实现。在以下示例中，我们仅包含文章的正文。\n\
  \n```\n{\n  collection: nodeQuery(limit: 20) {\n    entities {\n      title: entityLabel\n\
  \      ... on NodeArticle {\n        body {\n          value\n        }\n      }\n\
  \    }\n  }\n}\n```\n\n截至目前，GraphQL 规范中还没有办法在单个片段中包含多种类型。这意味着要同时包含页面实体的正文，我们必须创建另一个引用\
  \ `NodePage` 的片段，如下面的示例查询所示。\n\n```\n{\n  collection: nodeQuery(limit: 20) {\n \
  \   entities {\n      title: entityLabel\n      ... on NodeArticle {\n        body\
  \ {\n          value\n        }\n      }\n      ... on NodePage {\n        body\
  \ {\n          value\n        }\n      }\n    }\n  }\n}\n```\n\n#### 对实体集合进行排序\n\
  \n请看以下示例，它获取了包含五个实体的集合（`limit`），跳过了集合中的前五个实体（`offset`），并按标题降序（`reverse`）排序（`sort`）。如您所见，`sort`\
  \ 参数接受一个包含另外两个字段的对象：`field`（用于排序的字段）和 `direction`（`ASC` 或 `DESC`，不带引号）。\n\n```\n\
  {\n  collection: nodeQuery(\n    limit: 5\n    offset: 5\n    sort: {\n      field:\
  \ \"title\"\n      direction: DESC\n    }\n  ) {\n    entities {\n      title: entityLabel\n\
  \    }\n  }\n}\n```\n\n响应包含以下对象，如图 14-5 所示，表明我们的请求已成功获取了所需的实体。\n\n![../images/468476_1_En_14_Chapter/468476_1_En_14_Fig5_HTML.jpg](img/468476_1_En_14_Fig5_HTML.jpg)\n\
  \n图 14-5\n\n在此示例查询中，我们请求了一个按标题降序排序的实体集合，仅显示五个实体，并跳过了前五个结果。\n\n```\n{\n  \"data\"\
  : {\n    \"collection\": {\n      \"entities\": [\n        {\n          \"title\"\
  : \"Imputo Qui Quia\"\n        },\n        {\n          \"title\": \"Genitus Hos\
  \ Metuo Meus Olim Suscipere\"\n        },\n        {\n          \"title\": \"Facilisis\"\
  \n        },\n        {\n          \"title\": \"Ea\"\n        },\n        {\n  \
  \        \"title\": \"Dignissim Facilisis Hendrerit Lucidus Refero\"\n        }\n\
  \      ]\n    }\n  }\n}\n```\n\n请注意，由于 `sort` 参数也可以接受一个对象数组，因此我们可以连续执行多重排序，如以下示例查询所示，该查询首先按标题排序，然后按上次更新时间戳排序，两者均为降序。\n\
  \n```\n{\n  collection: nodeQuery(\n    limit: 5\n    offset: 5\n    sort: [\n \
  \     {\n        field: \"title\"\n        direction: DESC\n      },\n      {\n\
  \        field: \"changed\"\n        direction: DESC\n      }\n    ]\n  ) {\n  \
  \  entities {\n      title: entityLabel\n    }\n  }\n}\n```\n\n##### 过滤实体集合\n\n\
  我们还可以通过使用 `filter` 参数来过滤结果，使得响应仅包含类型为 Article 的实体。`filter` 参数接受一个与 `sort` 参数结构相似的的对象。考虑以下示例，它仅获取文章类型的实体集合，将其限制为五个，并按标题升序排序。\n\
  \n```\n{\n  collection: nodeQuery(\n    filter: {\n      conditions: {\n       \
  \ field: \"type\"\n        value: \"article\"\n        operator: EQUAL\n      }\n\
  \    }\n    limit: 5\n    sort: {\n      field: \"title\"\n      direction: ASC\n\
  \    }\n  ) {\n    entities {\n      title: entityLabel\n    }\n  }\n}\n```\n\n\
  该查询产生以下响应，如图 14-6 所示。如果我们将过滤的类型改为 `page`，您会看到结果发生了变化，如图 14-7 所示，以供比较。\n\n![../images/468476_1_En_14_Chapter/468476_1_En_14_Fig7_HTML.jpg](img/468476_1_En_14_Fig7_HTML.jpg)\n\
  \n图 14-7\n\n在这个示例中，我们改为选择页面。请注意响应的差异。\n\n![../images/468476_1_En_14_Chapter/468476_1_En_14_Fig6_HTML.jpg](img/468476_1_En_14_Fig6_HTML.jpg)\n\
  \n图 14-6\n\n在此示例查询中，我们仅选择了文章，限制为五个，并按标题升序排序。\n\n```\n{\n  \"data\": {\n    \"collection\"\
  : {\n      \"entities\": [\n        {\n          \"title\": \"Abluo\"\n        },\n\
  \        {\n          \"title\": \"Ad Adipiscing Illum Iriure Lobortis\"\n     \
  \   },\n        {\n          \"title\": \"Ad Quadrum Typicus\"\n        },\n   \
  \     {\n          \"title\": \"Aliquip Quia\"\n        },\n        {\n        \
  \  \"title\": \"Aptent Enim Vicis Virtus Ymo\"\n        }\n      ]\n    }\n  }\n\
  }\n```\n\n表 14-1 列出了可用于条件的操作符。如您所见，该列表与第 12 章中 Drupal 的 JSON API 实现类似。\n\n**表 14-1**\
  \ GraphQL 过滤器操作符与定义\n\n| 操作符 | 定义 |\n| --- | --- |\n| `EQUAL` | 等于 |\n| `NOT_EQUAL`\
  \ | 不等于 |\n| `GREATER_THAN` | 大于 |\n| `GREATER_THAN_OR_EQUAL` | 大于或等于 |\n| `SMALLER_THAN`\
  \ | 小于 |\n| `SMALLER_THAN_OR_EQUAL` | 小于或等于 |\n| `IN` | 检查提供的值是否存在于数组中 |\n| `NOT_IN`\
  \ | 检查提供的值是否不存在于数组中 |\n| `LIKE` | 检查提供的值是否与提供的模式匹配 |\n| `NOT_LIKE` | 检查提供的值是否不与提供的模式匹配\
  \ |\n| `BETWEEN` | 检查提供的值是否在某个范围内 |\n| `NOT_BETWEEN` | 检查提供的值是否在某个范围之外 |\n| `IS_NULL`\
  \ | 为空 |\n| `IS_NOT_NULL` | 不为空 |\n\n对于熟悉第 12 章中介绍的 JSON API 过滤器操作符（如 `STARTS_WITH`\
  \ 和 `CONTAINS`）的用户来说，`LIKE` 和 `NOT_LIKE` 操作符可能不太熟悉。在 GraphQL 的 Drupal 实现中，这些操作符反映了典型\
  \ SQL 数据库中使用 `%` 和 `_` 作为通配符的模式。请考虑以下示例。\n\n- 模式 `X%` 匹配所有以字母 X 开头的值，而模式 `%X` 匹配以字母\
  \ X 结尾的值。\n- 模式 `%X%` 匹配在任何位置包含 X 的值，而 `X%Y` 匹配以 X 开头并以 Y 结尾的值。\n- 模式 `_X%` 匹配第二个位置是\
  \ X 的值，`X_%_%_%` 匹配以 X 开头且至少包含四个字符的值。\n\n与 JSON API（参见第 12 章）一样，我们也可以提供条件组来控制响应的显示方式。例如，考虑以下示例，它请求所有标题以大写字母\
  \ A 开头的页面。\n\n```\n{\n  collection: nodeQuery(\n    filter: {\n      conditions:\
  \ [\n        {\n          field: \"type\"\n          value: \"page\"\n         \
  \ operator: EQUAL\n        },\n        {\n          field: \"title\"\n         \
  \ value: \"A%\"\n          operator: LIKE\n        }\n      ]\n    }\n    limit:\
  \ 5,\n    sort: {\n      field: \"title\"\n      direction: ASC\n    }\n  ) {\n\
  \    entities {\n      title: entityLabel\n    }\n  }\n}\n```\n\n我们收到以下响应，如图 14-8\
  \ 所示。\n\n\n\n![../images/468476_1_En_14_Chapter/468476_1_En_14_Fig8_HTML.jpg](img/468476_1_En_14_Fig8_HTML.jpg)\n\
  \n图 14-8\n\n此处，我们使用两个条件：首先只选择页面，然后只选择那些标题以大写字母 A 开头的页面。\n\n```\n{\n\"data\": {\n\
  \"collection\": {\n\"entities\": [\n{\n\"title\": \"Acsi Amet Nutus Pala\"\n},\n\
  {\n\"title\": \"Ad Ipiscing Elit\"\n},\n{\n\"title\": \"At Autem Hos Nostrud Saluto\
  \ Voco\"\n}\n]\n}\n}\n}\n```\n\n### 使用条件组过滤实体集合\n\n与 Drupal 的 JSON API 实现类似，Drupal\
  \ 中的 GraphQL 模块也提供了用于复杂过滤的条件组。回顾第 12 章，*组*是由条件中的断言组成的逻辑集合，用于构成更大的条件组。如前所述，这些条件组可以嵌套使用，以构建具有高粒度级别的精细查询。关于条件、条件组和连接词的更全面解释，请参考第\
  \ 12 章。\n\n考虑一个场景：我们有几篇文章和页面，它们具有以下标题，代表通过 Devel Generate 生成的实体。\n\n- Ad Ipiscing\
  \ Elit (页面)\n- Ad Quadrum Typicus (文章)\n- Ad Adipiscing Illum Iriure Lobortis (文章)\n\
  - Aliquip Quia (文章)\n\n在下面的 GraphQL 查询示例中，我们创建了一个条件组，用于检查所选实体的标题是否以 `Ad` 或 `Aliquip`\
  \ 开头，而不检查该实体是否为文章。\n\n```\n{\ncollection: nodeQuery(\nfilter: {\ngroups: {\nconditions:\
  \ [\n{\nfield: \"title\"\nvalue: \"Ad%\"\noperator: LIKE\n},\n{\nfield: \"title\"\
  \nvalue: \"Aliquip%\"\noperator: LIKE\n}\n]\nconjunction: OR\n},\n},\nlimit: 5\n\
  sort: {\nfield: \"title\"\ndirection: ASC\n}\n) {\nentities {\ntitle: entityLabel\n\
  }\n}\n}\n```\n\n此查询的结果如下所示。请注意，我们的页面仍然出现在响应中。\n\n```\n{\n\"data\": {\n\"collection\"\
  : {\n\"entities\": [\n{\n\"title\": \"Ad Adipiscing Illum Iriure Lobortis\"\n},\n\
  {\n\"title\": \"Ad Ipiscing Elit\"\n},\n{\n\"title\": \"Ad Quadrum Typicus\"\n},\n\
  {\n\"title\": \"Aliquip Quia\"\n}\n]\n}\n}\n}\n```\n\n现在，我们在层级结构中包含另一个条件组，该条件组也与现有条件组以\
  \ `AND` 关系检查所选实体是否为文章。\n\n```\n{\ncollection: nodeQuery(\nfilter: {\ngroups: {\n\
  conditions: {\nfield: \"type\"\nvalue: \"article\"\noperator: EQUAL\n}\nconjunction:\
  \ AND\ngroups: {\nconditions: [\n{\nfield: \"title\"\nvalue: \"Ad%\"\noperator:\
  \ LIKE\n},\n{\nfield: \"title\"\nvalue: \"Aliquip%\"\noperator: LIKE\n}\n]\nconjunction:\
  \ OR\n}\n}\n}\nlimit: 5\nsort: {\nfield: \"title\"\ndirection: ASC\n}\n) {\nentities\
  \ {\ntitle: entityLabel\n}\n}\n}\n```\n\n此查询返回以下响应。请注意，页面实体现在已从响应中消失，这表明我们的条件组正在选择正确的实体。这如图\
  \ 14-9 所示。\n\n![../images/468476_1_En_14_Chapter/468476_1_En_14_Fig9_HTML.jpg](img/468476_1_En_14_Fig9_HTML.jpg)\n\
  \n图 14-9\n\n在此查询示例中，我们根据实体是否为文章以及标题是否以两个给定字符串之一开头进行过滤。\n\n```\n{\n\"data\": {\n\"\
  collection\": {\n\"entities\": [\n{\n\"title\": \"Ad Adipiscing Illum Iriure Lobortis\"\
  \n},\n{\n\"title\": \"Ad Quadrum Typicus\"\n},\n{\n\"title\": \"Aliquip Quia\"\n\
  }\n]\n}\n}\n}\n```\n\n这些条件组建立的层级结构可以在图 14-10 中看到，其结构与我们在之前探索 JSON API 条件组时在图 12-3\
  \ 中复制的结构相同。\n\n![../images/468476_1_En_14_Chapter/468476_1_En_14_Fig10_HTML.jpg](img/468476_1_En_14_Fig10_HTML.jpg)\n\
  \n图 14-10\n\n示例 GraphQL 查询建立的条件组层级结构\n\n### 注意\n\n虽然 Drupal 中 GraphQL 读取查询可用功能的全部范围远超本书的容量，但\
  \ GraphiQL 接口提供了一个强大的内省接口，它将模式文档与实时测试工具配对，可以加速上手过程。使用 GraphiQL 右上角的 `Docs` 链接来访问此接口。\n\
  \n## Drupal 中的 GraphQL 变更操作\n\n尽管内置的变更操作（写入查询）支持先前在 Drupal 的 GraphQL 实现中开箱即用，但 GraphQL\
  \ 模块的维护者后来移除了该功能，转而专注于稳定读取查询。为 Drupal 独特灵活的内容模型提供自动变更操作支持最具挑战性的难题之一是，变更操作需要考虑到每一个单独的包类型及其包含的每一个字段。\n\
  \n在 2018 年 1 月的一篇博客文章中，联合维护者 Philipp Melab 提供了额外的见解：“[S]一些实体结构增加了额外的复杂性：例如，仅尝试创建一个带有标题和正文值的文章，而同时启用了评论模块，就会导致约束冲突，因为评论字段需要一个空的评论列表。”\n\
  \n尽管在 Drupal 的 GraphQL 实现中提供变更操作支持的工作本可以处理好所有这些情况，但结果将是，在构建既读取又写入 Drupal 的消费者时，开发者体验会因\
  \ Drupal 特定的术语和考虑因素而变得负担过重。^((62))\n\n有一些关于在 Drupal 中提供 GraphQL 变更的参考资料，但它们已经过时了。我们不重复它们，而是在此结束我们对\
  \ Drupal 的 GraphQL 实现的考察。在撰写本文时，没有一种稳定的方法来编写随模块一起打包安装的自定义 GraphQL 变更操作。尽管如此，这是一个已经并将继续进行大量探索的领域。\n\
  \n### 注意\n\n有关在采用 `webonyx/graphql-php` 作为依赖项之前 GraphQL 变更操作如何工作的示例，请参阅 [`https://github.com/drupal-graphql/graphql-mutation`](https://github.com/drupal-graphql/graphql-mutation)\
  \ 和 [`https://github.com/drupal-graphql/graphql-examples`](https://github.com/drupal-graphql/graphql-examples)\
  \ 。请注意，这些代码库仅供参考并出于历史原因而提供。有关移除 GraphQL 变更操作支持的更多信息，请参阅 Philipp Melab 在 Amazee Labs\
  \ 的博客文章“扩展 GraphQL：第 3 部分 – 变更操作”，网址为 [`https://www.amazeelabs.com/en/blog/extending-graphql-part-3-mutations`](https://www.amazeelabs.com/en/blog/extending-graphql-part-3-mutations)\
  \ 。\n\n### 结论\n\n在本章中，我们介绍了 Drupal 对 GraphQL 的实现、如何检索单个实体和实体集合，以及为什么开箱即用的变更操作支持不可用。尽管\
  \ GraphQL 模块仅提供开箱即用的读取查询支持，但它仍然提供了可与 JSON API 和 RELAXed Web Services 模块相媲美的开发者体验，这得益于该规范对定制响应和模式内省的重视。\n\
  \n在第 4 部分中，我们将探讨 Drupal 解耦的应用生态系统，其中包括丰富多样的发行版、SDK 和参考应用程序。通过超越 Drupal 核心和贡献模块所提供的功能，我们涉足消费者及其开发者的关注领域。我们考察的问题包括：如何为解耦用例提供不同风格的\
  \ Drupal，以及如何通过可以加速构建过程的 SDK 和参考应用程序，让另一边的开发者生活变得更加简单。\n\n脚注 1\n\n\n\n"
- '# 第四部分：解耦式 Drupal 生态系统


  解耦式 Drupal 生态系统


  在第三部分中，我们不再描述 Web 服务，而是直接实现用于消费和操作 Drupal 内容的请求。这为我们开始审视如何用不同技术实际开发消费者应用程序奠定了合适的基础。然而，在转向该主题之前，我们将在本章中讨论蓬勃发展的解耦式
  Drupal 生态系统，其目标是简化将 Drupal 用作内容服务的过程，并加速消费者应用程序的开发。


  当 Drupal 8 发布时，许多 Drupal 开发者尚未设想将 Drupal 解耦。因此，通过典型设置流程生成的标准 Drupal 8 安装，其功能常常过于臃肿，无法高效地用作解耦式
  Drupal 后端。虽然站点维护人员可以禁用不需要的模块，但这一过程可能相当繁琐。然而，得益于 Drupal 发行版（即拥有不同模块和功能集的不同 Drupal
  变体）的使用，解耦式 Drupal 实践者已经开始采用 API 优先的发行版。这些 Drupal 版本针对解耦式 Drupal 用例进行了优化，具备预先启用的
  Web 服务、预配置的设置以及增强的用户界面等功能。


  得益于围绕 Contenta 的发展以及 Reservoir 等项目引起的兴趣，API 优先的发行版在未来几年内仍将是一个处于重大转型期的领域。当谈到 API
  优先发行版的理想功能集时，许多架构师尚未形成完整的愿望清单，但不同的方法表明了浓厚的兴趣。如果有朝一日，一个专门针对解耦式 Drupal 用例的安装配置文件进入
  Drupal 核心，它必定会从 Contenta、Reservoir 及其他项目中汲取大量灵感。


  此外，在无头 CMS 取得成功的所有主要原因中，最重要的或许就是软件开发工具包（SDK）和参考构建的普及，它们促进了开发者对消费者应用程序的开发。这些软件项目为非
  Drupal 实践者提供了一种“说”Drupal 语言并能快速上手构建其消费者的方法。虽然内容即服务平台将 SDK 和参考构建作为免费开源软件提供，但其平台的其余部分仍处于保密状态。近年来，Drupal
  坚定地采取了从头到尾（无论是单体式还是解耦式）均开源 CMS 的立场。Waterwheel 和 Contenta 生态系统中新出现的 SDK 和参考构建都表明市场对便捷消费
  Drupal 内容有着健康的需求。


  借助 SDK、参考构建以及以 `Contenta.js` 形式存在的中间件层，任何技术背景的开发者，无论是否接触过 Drupal，都能像使用任何 API 一样轻松消费和操作
  Drupal 内容。像 `Waterwheel.js` 这样的 SDK 旨在用于通用场景，而更为“演示就绪”的参考构建（如 Waterwheel 的 Ember
  和 React 应用程序以及 Contenta 的示例应用程序）可以给评估者带来更大的安心感。


  '
- "# 15. API 优先的发行版\n\n在 Drupal 术语中，*发行版*指的是 Drupal 的变体，它包含完整的 Drupal 核心以及其他项目，如主题、模块、库（用于前端资源）和安装配置文件。发行版可以是功能完善的，意味着它们是用于特定场景的全面解决方案；或者它们可以作为快速启动工具，帮助开发者和站点构建者迅速上手。^(⁶³)\n\
  \n### 注意\n\nDrupal 中一些常用的发行版包括：用于会议网站的会议组织发行版（COD）；用于社交社区、内部网和网络的 Open Social；以及用于出版网站的\
  \ Thunder。每个发行版的文档可在 Drupal.org 上获得，网址为 [`https://www.drupal.org/docs/8/distributions`](https://www.drupal.org/docs/8/distributions)。\n\
  \n近年来，解耦式 Drupal 架构的出现促使人们重新思考 Drupal 在这种环境中应该如何呈现和运行。对于许多构建 Drupal 消费者的开发者来说，学习\
  \ Drupal Web 服务的内部工作原理可能需要花费大量时间，令人望而却步。由于发行版是指定要安装哪些模块以及如何配置站点的最佳方式，因此它们是降低解耦式\
  \ Drupal 学习曲线的绝佳候选方案。\n\n这些 *API 优先的发行版* 是 Drupal 的变体，为解耦式 Drupal 用例提供专门的配置和模块集。在\
  \ 2017 年巴尔的摩 DrupalCon 期间的核心讨论中，由于解耦式 Drupal 存在多种最佳实践，且消费者开发者对 Drupal 缺乏认识，因此产生了对\
  \ API 优先发行版的需求。随后创建了一个 Drupal 核心想法议题，最终演变成了 Contenta。^(⁶⁴)\n\n在 2017 年期间，API 优先的发行版\
  \ Contenta 和 Reservoir 相继独立发布。2017 年晚些时候，Acquia 的 Lightning 发行版的一个变体 Headless Lightning\
  \ 采纳了 Reservoir 的大部分功能。随之而来，围绕着 Contenta 和 Reservoir 的生态系统也逐渐形成。2018 年，Lauri Eskola\
  \ 和我重新提出建议，希望 Drupal 核心能标配提供一个“Decoupled”（解耦）安装配置文件，这将大大减少对特定 API 优先发行版的需求。^(⁶⁵)\n\
  \n虽然 API 优先的发行版是内容生态系统的优秀后端——这些生态系统仅仅需要一个供消费的存储库而非完整网站——但它们对于后端需要同时扮演站点和存储库双重角色的解耦式\
  \ Drupal 架构来说并非理想之选（更多关于解耦式 Drupal 用例的内容，请参见第 4 章）。例如，Reservoir 显著限制了功能，其中许多限制是针对习惯于正常构建单体式\
  \ Drupal 站点的用户的。因此，当你构建的是消费存储库而非站点的应用程序时，应该使用 API 优先的发行版；而对于构建站点，你可以正常使用单体式 Drupal。\n\
  \n\n\n### Contenta\n\n`Contenta` 是 Drupal 社区中最常用的以 API 为首选的分发版，也是见证贡献者活动最多的项目。与下一节将要介绍的\
  \ `Reservoir` 类似，`Contenta` 的目标是为解耦式 Drupal 架构提供理想的内容存储库。尽管如此，`Contenta` 与 `Reservoir`\
  \ 的优先事项截然不同。\n\n`Contenta` 很大程度上保留了默认的管理界面，以给予 Drupal 开发者更熟悉的体验，但这也为 Drupal 新手开发者带来了复杂性。为缓解这一问题，`Contenta`\
  \ 为不太熟悉 Drupal 的开发者提供了一个快速安装流程，其中包含了最常用的必需模块和一套完整的默认内容。^(⁶⁶) 该分发版还包含了 `JSON API\
  \ Extras` 模块，该模块为 JSON API 增加了更多可配置性，例如为 JSON API 处理的路由提供别名（参见第 8 章）。\n\n`Contenta`\
  \ 的灵活性还允许消费端开发者在空白安装或包含已解决问题及 Umami 主题的演示安装之间进行选择。与 `Reservoir` 类似，`Contenta` 聚焦于\
  \ Drupal 为消费端应用开发者带来的最显著优势。使用 Drupal 作为底层基础，使得 `Contenta` 能够利用相同的开源软件许可证，并提供 Drupal\
  \ 核心中可用的相同内容建模工具。然而，`Contenta` 最受推崇的优势或许是其为开发者提供的大量参考构建，这是一个在第 16 章详述的生态系统。^(⁶⁷)\n\
  \n根据其作者的说法，`Contenta` 的使命有四个方面：\n\n- *对非 Drupal 用户友好*：`Contenta` 展现了一个简化的 Drupal\
  \ 管理后端视图，让不熟悉 Drupal 术语的用户能够使用可用的默认值来建模和创建内容。\n- *从第一分钟即可使用*：`Contenta` 自带大量演示内容，使得来自其他生态系统的开发者能够更快地评估解耦式\
  \ Drupal，并且能够恢复到干净状态。\n- *解耦式知识中心*：`Contenta` 网站包含一系列文章和资源，其中包括针对解耦式 Drupal 中困难概念的教程，例如\
  \ OAuth2 身份验证和 JSON API 查询操作。\n- *针对解耦用例功能完备*：`Contenta` 宣称其创建者在实施全功能解耦式 Drupal\
  \ 架构方面拥有丰富的实际经验，并强调其能够满足包括解耦式 Drupal 在内的需求，功能完备。\n\n### 注意\n\n提供 JSON API 实现的主要\
  \ `Contenta` 分发版可在 GitHub 上获取，地址为 [`https://github.com/contentacms/contenta_jsonapi`](https://github.com/contentacms/contenta_jsonapi)。`Contenta`\
  \ 网站位于 [`https://contentacms.org`](https://contentacms.org)。\n\n### 安装 Contenta\n\
  \n要安装 `Contenta` 用于本地开发，如图 15-1 所示，您可以执行以下快速安装命令，这需要您的机器上已安装 `Composer` 1.7 或更高版本。继续阅读有关生产环境中\
  \ `Contenta` 的安装说明。\n\n![../images/468476_1_En_15_Chapter/468476_1_En_15_Fig1_HTML.png](img/468476_1_En_15_Fig1_HTML.png)\n\
  \n图 15-1\n\n`Contenta` 的本地开发安装过程包含一个命令行界面，引导用户完成以下操作：\n\n```\n$ php -r \"readfile('https://raw.githubusercontent.com/contentacms/contenta_jsonapi/8.x-2.x/installer.sh');\"\
  \ > contentacms-quick-installer.sh\n$ chmod a+x contentacms-quick-installer.sh\n\
  $ ./contentacms-quick-installer.sh\n```\n\n要基于 `Composer` 的工作流或在生产环境中安装 `Contenta`，执行以下命令。此操作将额外下载\
  \ Drupal 核心之外的 `Contenta` 模块。\n\n```\n$ php -r \"readfile('https://raw.githubusercontent.com/contentacms/contenta_jsonapi_project/8.x-1.x/scripts/download.sh');\"\
  \ > download-contentacms.sh\n$ chmod a+x download-contentacms.sh\n$ ./download-contentacms.sh\
  \ /path/to/my-contenta\n```\n\n完成后，将 `.env.example` 文件复制为新的 `.env` 文件，并添加关于您的 Drupal\
  \ 站点和 MySQL 数据库的关键信息。文档还建议使用 `.env.local` 来存储敏感凭据，以便 `git` 等版本控制工具忽略它。请考虑以下 `.env`\
  \ 和 `.env.local` 文件示例。\n\n```\n# .env\nSITE_MAIL=admin@example.com\nACCOUNT_MAIL=admin@example.com\n\
  SITE_NAME='Contenta Test'\nACCOUNT_NAME=admin\nMYSQL_DATABASE=contenta\nMYSQL_HOSTNAME=localhost\n\
  MYSQL_PORT=3306\nMYSQL_USER=contenta\n# .env.local\nMYSQL_PASSWORD=contenta\nACCOUNT_PASS=admin\n\
  ```\n\n然后，您可以执行以下命令来运行安装脚本。\n\n```\n$ composer run-script install:with-mysql\n```\n\
  \n### 注意\n\n`Contenta` 的 Composer 安装程序可在 GitHub 上获取，地址为 [`https://github.com/contentacms/contenta_jsonapi_project`](https://github.com/contentacms/contenta_jsonapi_project)。\n\
  \n\n\n## 内容仓库\n\n本章讨论的第二个发行版是 Reservoir，这是一个用于解耦 Drupal 的实验性极简主义发行版。与 Contenta 类似，Reservoir\
  \ 的目标是为任何解耦式 Drupal 架构构建一个最优且通用的内容仓库，能够成功引导来自各种背景的开发人员（尤其是那些不熟悉 Drupal 界面的开发人员）上手，以便他们可以完成任何与内容管理或\
  \ API 消费相关的任务。\n\nReservoir 特别专注于将功能限制在以下几个主要领域：内容建模、内容管理、通过 API 公开内容以及内容 API 文档（图\
  \ 15-2）。因此，它主要用作一个轻量级的内容仓库，不包含典型的单体式 Drupal 功能。\n\n因此，与 Contenta 不同，Reservoir 有意移除了单体式\
  \ Drupal 功能的显著部分，包括面向用户的前端以及与内容仓库无关的模块（例如，断点、联系、区块）。无论好坏，Reservoir 也避免使用视图，因为假定消费者会更倾向于使用文档完善且广泛理解的\
  \ JSON API 响应，而不是采用一个具有学习曲线的陌生模块来处理仅涉及读取操作的功能。\n\n![../images/468476_1_En_15_Chapter/468476_1_En_15_Fig2_HTML.jpg](img/468476_1_En_15_Fig2_HTML.jpg)\n\
  \n图 15-2\n\nReservoir 并排展示了 HTML 格式和 JSON API 响应格式的内容呈现\n\n这些特点构成了 Reservoir 的极简主义导向，它视消费端应用开发人员为第一等公民：\n\
  \n-   **有主见的功能集**：与 Contenta 一样，Reservoir 对其功能集以及提供给消费端开发人员的模块非常有主见。Reservoir 支持\
  \ JSON API 和 Simple OAuth 模块，这意味着开发人员不再需要配置 REST 资源或研究认证方法。在未来的迭代中，Reservoir 计划包含\
  \ GraphQL 支持。\n\n-   **自动生成的 API 文档**：借助 Reservoir 开箱即附带的 OpenAPI 模块和 ReDoc JavaScript\
  \ 库（见图 15-3），当开发人员创建和修改内容模型时，Reservoir 会自动生成 API 文档。当您使用默认的 Drupal 界面浏览内容时，每个资源的\
  \ API 文档也会显示在右侧。得益于 OpenAPI，Reservoir 还为希望使用不同文档生成工具的开发人员提供了 OpenAPI（Swagger）描述。此后，Contenta\
  \ 也已采纳了所有这些功能。\n\n![../images/468476_1_En_15_Chapter/468476_1_En_15_Fig3_HTML.jpg](img/468476_1_En_15_Fig3_HTML.jpg)\n\
  \n图 15-3\n\n得益于 OpenAPI 和 ReDoc，Reservoir 自动生成 API 文档，并根据 Drupal 内容模型的变更进行调整\n\n\
  -   **优化的用户界面**：首次安装 Reservoir 时，一个欢迎导览（图 15-4）会迎接新用户，并概述 Reservoir 中可用的内容建模、内容管理和\
  \ API 预置功能。\n\n![../images/468476_1_En_15_Chapter/468476_1_En_15_Fig4_HTML.jpg](img/468476_1_En_15_Fig4_HTML.jpg)\n\
  \n图 15-4\n\n安装 Reservoir 时的欢迎屏幕还包括对其功能的引导式导览\n\n自 Contenta 和 Reservoir 发布以来，这两个项目已经显著趋同。Reservoir\
  \ 发布后，其维护者与 Contenta 团队合作引入了 API 文档和并排内容呈现功能，现在 Contenta 中也提供了这些功能。\n\n如今，Contenta\
  \ 和 Reservoir 最显著的区别在于它们的**优先级**。Reservoir 将功能精简到最核心的必要部分，并专注于一种极简主义方法，有利于那些完全不熟悉\
  \ Drupal 的开发人员。另一方面，Contenta 则走了一条中间路线，保留了熟悉的用户界面，让有 Drupal 经验的开发人员可以随意添加功能而无后顾之忧，并且仍然专注于向消费端应用交付内容。Contenta\
  \ 还使用了默认内容，以便达到更接近演示就绪的状态。\n\n### 注意\n\nReservoir 在 GitHub 上的地址是 [`https://github.com/acquia/reservoir`](https://github.com/acquia/reservoir)。此外，截至撰写本文时，作者\
  \ Wim Leers 提供了一个 alpha 版本的演示视频，可在 [`https://vimeo.com/222271467`](https://vimeo.com/222271467)\
  \ 观看。\n\n### 安装 Reservoir\n\n安装 Reservoir 最简单的方法是使用 Composer 项目模板（见图 15-5）并执行以下命令：\n\
  \n```\n$ composer create-project acquia/reservoir-project your-project-name --stability=alpha\n\
  ```\n\n接下来，在您的 Web 主机配置中，确保您的域名指向目录 `your-project-name/docroot`。然后，导航到该域名并正常安装 Reservoir。^(⁶⁸)\n\
  \n![../images/468476_1_En_15_Chapter/468476_1_En_15_Fig5_HTML.jpg](img/468476_1_En_15_Fig5_HTML.jpg)\n\
  \n图 15-5\n\n安装 Reservoir 的 Composer 项目模板\n\n### 注意\n\nReservoir Composer 安装程序在 GitHub\
  \ 上的地址是 [`https://github.com/acquia/reservoir-project`](https://github.com/acquia/reservoir-project)。\n\
  \n### 使用 Reservoir\n\n在安装过程中，Reservoir 会创建四项内容：一项示例内容（标题为“Hello world”）、三个示例用户（拥有三个不同的角色）以及一个代表消费端应用的\
  \ OAuth 2.0 客户端。当您准备好在生产环境中部署 Reservoir 时，需要删除这些演示数据，并用您自己的密钥替换 OAuth 2.0 公钥和私钥（有关\
  \ OAuth 2.0 的更多信息，请参见第 9 章）。此外，请确保您的 CORS 设置已正确配置（请参见第 7 章）。\n\n对于 Drupal 开发人员来说，Reservoir\
  \ 可能并非最佳选择，因为 Reservoir 公开的数据仅限于节点（内容）和节点类型（内容类型）。Reservoir 排除了许多熟悉的 Drupal 用户界面以及像视图和分类术语这样的功能。据作者称，这些限制简化了开发并增强了理解，从而降低了后续的维护成本。尽管\
  \ Reservoir 允许安装 Drupal 模块来引入新功能或自定义代码，但 Reservoir 的极简主义意味着有经验的 Drupal 开发人员可能会觉得\
  \ Contenta 更有吸引力。\n\n简而言之，Reservoir 强调简单性，但同时也受限于其极简主义导向的局限性。另一方面，Contenta 注重开箱即用的健壮性和完整性，但它保留了大部分复杂性，这可能会让\
  \ Drupal 新手感到困惑。\n\n### 注意\n\n围绕 Reservoir 还有一个不断扩展的生态系统，其中包括 `reservoir-docker`，一个在\
  \ GitHub 上可用的 Reservoir Docker 镜像，地址是 [`https://github.com/mattgrill/reservoir-docker`](https://github.com/mattgrill/reservoir-docker)；以及\
  \ `well`，一个基于 Reservoir 和 Acquia 的 BLT 项目的 Drupal 安装包，在 GitHub 上的地址是 [`https://github.com/damontgomery/well`](https://github.com/damontgomery/well)。\n\
  \n\n\n### Headless Lightning\n\nLightning 是 Acquia 开发的一款 Drupal 发行版，旨在通过集成各种实用模块，使之领先于\
  \ Drupal 核心，从而为内容编辑者和 Drupal 开发者提供开箱即用的更丰富体验。在其最初构想中，Lightning 只针对传统的单体 Drupal 站点和典型的\
  \ Drupal 用例，但此后其应用范围已扩展到包括分离式（解耦）Drupal 架构。\n\nLightning 提供的 API 优先功能，也作为 Headless\
  \ Lightning 中的一个子配置文件提供。Headless Lightning 是一个更轻量级的发行版，包含了 Reservoir 的所有 Web 服务模块及其简化的管理界面。Lightning\
  \ 和 Headless Lightning 都使用了 Content API 功能，这是 Lightning 对其所暴露的 JSON API 实现的称呼。^(⁶⁹)\n\
  \nHeadless Lightning 与 Reservoir 的许多目标一致，即：简化呈现给消费者开发者的用户界面，对内容仓库用户可能希望的功能提供建议，并避免阻碍内容编辑者和站点构建者的工作进展。^(⁷⁰)\n\
  \n事实上，Lightning 和 Headless Lightning 之间的这种区别，解决了关于 Contenta 和 Reservoir 的一个关键担忧，因为前述的\
  \ API 优先发行版仅针对内容仓库的用例进行了优化，而非站点和仓库的混合用例（参见第 4 章）。然而，在任何一种 API 优先发行版中，由于它们的架构差异，仍然无法在这两种用例之间优雅地切换。\n\
  \n### 注\n\nLightning 可在 GitHub 上获取，地址为：[`https://github.com/acquia/lightning`](https://github.com/acquia/lightning)。Headless\
  \ Lightning 可在 GitHub 上获取，地址为：[`https://github.com/acquia/headless-lightning`](https://github.com/acquia/headless-lightning)。\n\
  \n### 安装 Headless Lightning\n\n安装 Headless Lightning 的最简单方式是通过基于 Composer 的项目模板。\n\
  \n```\n$ composer create-project acquia/lightning-project:dev-headless --no-interaction\
  \ --stability=dev\n```\n\n此命令会创建一个名为 `lightning-project` 的目录，其中包含一个 `docroot` 文件夹。你可以通过在执行\
  \ `--no-interaction` 和 `--stability` 标志前添加一个额外的参数来自定义目录名称。\n\n```\n$ composer create-project\
  \ acquia/lightning-project:dev-headless your-project-name --no-interaction --stability=dev\n\
  ```\n\n在安装过程结束时，与 Reservoir 类似，虽然无需配置 REST 资源，但你需要配置 CORS 支持（参见第 7 章）和 OAuth 认证令牌（参见第\
  \ 9 章）。\n\n### 结论\n\n尽管 API 优先发行版仍然是解耦 Drupal 生态系统中一个不断成熟的部分，但对于不熟悉 Drupal 的开发者，以及那些希望为其应用寻找一个简化型内容仓库（而非功能完备的\
  \ CMS 作为后端）的开发者而言，它们至关重要。在过去几年中，Drupal 社区涌现了大量活动，创建了诸如 Contenta、Reservoir 和 Headless\
  \ Lightning 等发行版，它们都共享许多功能，但也突显了方法上的诸多差异。\n\n借助 API 优先发行版，那些原本永远不会考虑 Drupal 的开发者，可以利用一个更易访问、对新手更友好的界面，该界面将\
  \ API 文档和并排展示等组件置于核心位置。在下一章中，我们将深入探讨解耦 Drupal 生态系统的另一个极端——帮助开发者在客户端（消费者端）构建应用的入门工具包、SDK\
  \ 和参考构建。\n\n脚注 1 2 3 4 5 6 7 8\n\n## 软件开发工具包与参考构建\n\n如今，开发者正选择以仅在几年前还无法想象的新颖方式来使用\
  \ Drupal。因此，背景迥异的开发者们正以前所未有的方式应对 Drupal 的 Web 服务，以便为自己的应用提供内容。得益于 Drupal 8 核心中的\
  \ Web 服务，Drupal 已经能够很好地适应不同技术领域的各类消费者应用。然而，这里只有一个问题：不熟悉 Drupal 的开发者不知道如何使用它。\n\n\
  在本章中，我们将介绍解耦 Drupal 生态系统中一些超越典型 Web 服务的最基本工具——即 SDK 和参考构建，它们能够加速在 Drupal 自身技术之外的消费者应用开发（参见图\
  \ 16-1）。这使得那些可能从未发现或考虑过 Drupal 的开发者，无需采用整个单体系统就能尝试使用它。\n\n![../images/468476_1_En_16_Chapter/468476_1_En_16_Fig1_HTML.jpg](img/468476_1_En_16_Fig1_HTML.jpg)\n\
  \n**图 16-1** 此图展示了 API 优先发行版（参见第 15 章）、SDK 和参考应用在典型解耦 Drupal 架构中的位置\n\nSDK 的概念在\
  \ Web 开发和通用软件领域并非新事物，使用 SDK 将消费者应用与 API 桥接起来的想法同样不新鲜。如今，像 Contentful 和 Prismic 这样的专有型“内容即服务”解决方案，提供了免费且开源的\
  \ SDK，这些 SDK 能与它们自己的 Web 服务无缝协作，同时允许开发者使用自己选择的语言进行开发。尽管如此，这些 SDK 虽然是免费的，但需要订阅一个通常具有不透明\
  \ API 规范的专有平台。\n\n选择 Drupal 的主要动机之一是其免费且开源的性质。借助一个健壮的 SDK 生态系统，Drupal 能够有效地与 Contentful\
  \ 等服务相抗衡，成为市场上唯一端到端的 API 优先 CMS，尽管要在足够广泛的技术领域实现一套全面的 SDK 还有很长的路要走。从这个意义上说，虽然 SDK\
  \ 并非固有地绑定于典型的 Drupal 开发，但它们作为连接其他技术的桥梁，以及作为以 Drupal 为后盾的应用生态系统的一个组成部分，扮演着重要角色。\n\
  \n通常，解耦 Drupal 生态系统中的 SDK 旨在弥补许多初涉 Drupal 的开发者对其 Web 服务以及如何使用这些服务的认知不足。例如，`Waterwheel.js`（原名\
  \ Hydrant）和 `Waterwheel.swift`（原名 Drupal iOS SDK）分别帮助 JavaScript 和 Swift 开发者构建由\
  \ Drupal 驱动的应用。有了 SDK，开发者无需记住诸如不同基数（cardinality）的字段如何在 JSON 响应中暴露等细微差别。\n\n### Waterwheel\
  \ 生态系统\n\nWaterwheel 生态系统是由 Drupal 社区构建的一套新兴 SDK，旨在服务那些使用非 Drupal 技术开发应用的开发者。请允许我使用一个不完美的比喻：Waterwheel\
  \ 通过促进 Drupal 与不同技术之间低开销的通信，帮助开发者“说”Drupal 的语言。目前，有两个可用的 SDK，分别对应 JavaScript (ES6)\
  \ 和 Swift，此外还有一个 Ember 插件和一个 React 参考构建。\n\n### Waterwheel.js\n\n`Waterwheel.js`\
  \ 于 2016 年发布，是一个帮助库，旨在帮助 JavaScript 开发者消费和操作 Drupal 内容。\n\n\n\n### 注意\n\n`Waterwheel.js`\
  \ 可在 GitHub 的 [`https://github.com/acquia/waterwheel.js`](https://github.com/acquia/waterwheel.js)\
  \ 和 NPM 的 [`http://npmjs.org/package/waterwheel`](http://npmjs.org/package/waterwheel)\
  \ 上获取。此前，`Waterwheel.js` 还曾支持实体查询 API 模块（[`https://www.drupal.org/project/entityqueryapi`](https://www.drupal.org/project/entityqueryapi)）及其查询操作，但该模块现已被\
  \ JSON API 模块所取代（参见第 8 章和第 13 章）。\n\n虽然 `Waterwheel.js` 包含一个与 Drupal 完美契合的 HTTP\
  \ 客户端，但它特别灵活，开发者可以在服务器端使用它，在像 Ember 或 React 这样的框架的服务器端执行过程中，通过 Node.js 发起 API 调用。此外，你还可以在客户端使用\
  \ `Waterwheel.js`，在浏览器加载客户端包后执行异步请求。这意味着 `Waterwheel.js` 是*通用*的，其代码可以在客户端/服务器端边界之间共享。\n\
  \n由于 `Waterwheel.js` 的灵活性，Drupal 开发者还可以利用它，通过类似 AJAX 的交互或其他专门处理异步请求的 HTTP 客户端（如\
  \ `superagent` 或 `axios`），来增强现有单体 Drupal 站点的客户端体验。由于它旨在作为 JavaScript 框架的基础，因此对于完全解耦和渐进式解耦的\
  \ Drupal 用例来说都是最优选择。\n\n### 注意\n\n`superagent` 和 `axios` 库可分别在 NPM 的 [`https://www.npmjs.com/package/superagent`](https://www.npmjs.com/package/superagent)\
  \ 和 [`https://www.npmjs.com/package/axios`](https://www.npmjs.com/package/axios)\
  \ 上获取。\n\n由于 `Waterwheel.js` 是许多构建消费型应用的开发者最易入门的切入点，我们将在接下来的章节中更详细地探讨其功能。\n\n####\
  \ 安装与构建 Waterwheel.js\n\n安装 `Waterwheel.js` 最简单的方法是直接克隆 GitHub 仓库。\n\n```\n$ git\
  \ clone git@github.com:acquia/waterwheel.js.git\n```\n\n你也可以通过 HTTPS 克隆 GitHub 仓库。\n\
  \n```\n$ git clone https://github.com/acquia/waterwheel.js.git\n```\n\n要安装开发依赖项，例如\
  \ `axios` 和 `qs`（一个处理查询字符串的库），可以使用 `npm install` 这个简写命令来获取 `Waterwheel.js` 所需的库。\n\
  \n```\n$ npm i\n```\n\n要运行测试并检查覆盖率，请运行简写的测试命令。\n\n```\n$ npm t\n```\n\n最后，任何客户端\
  \ JavaScript 应用最关键的一步是生成一个包含所有依赖项的压缩版本的、可用于生产环境的包。以下命令在 `dist` 目录中创建一个包含 `Waterwheel.js`\
  \ 所有内置功能的单一包文件。\n\n```\n$ npm run build\n```\n\n#### 实例化 Waterwheel.js\n\n要在支持 ES6\
  \ 的 Node.js 服务器上创建 `Waterwheel.js` 的新实例，可以使用 `const` 关键字来引入 `Waterwheel` 模块。之后，你可以通过提供一个包含\
  \ Drupal 源 URI 和 OAuth 2.0 访问令牌的对象参数来实例化一个新的 `waterwheel`（有关 OAuth 2.0 的更多信息，请参见第\
  \ 9 章）。^(⁷¹)\n\n```\n// 在 Node.js 服务器上\nconst Waterwheel = require('waterwheel');\n\
  const waterwheel = new Waterwheel({\nbase: 'http://drupal-backend.dd:8083',\noauth:\
  \ {\ngrant_type: '授权类型',\nclient_id: '客户端 ID',\nclient_secret: '客户端密钥',\nusername:\
  \ '用户名',\npassword: '密码'\n}\n});\n```\n\n要使 `Waterwheel` 在支持 ES6 的浏览器中可用，你可以使用 `<script>`\
  \ 导入生成的包（参见上一节），并将其添加到 `window` 对象中。在渐进式解耦的场景中，你也可以使用 Drupal 资源库来包含客户端就绪的包。\n\n\
  ```\n// 在支持 ES6 的浏览器上\n// \nconst waterwheel = new window.Waterwheel({\nbase: 'http://drupal-backend.dd:8083',\n\
  oauth: {\ngrant_type: '授权类型',\nclient_id: '客户端 ID',\nclient_secret: '客户端密钥',\nusername:\
  \ '用户名',\npassword: '密码'\n}\n});\n```\n\n目前许多浏览器仍不支持 ES6，在这种情况下，你仍然可以在使用 ES5 定义全局变量\
  \ `waterwheel` 之前，通过传统的 `<script>` 标签引入客户端包。\n\n```\n// 在不支持 ES6 的浏览器上\n// \nvar\
  \ waterwheel = new window.Waterwheel({\nbase: 'http://drupal-backend.dd:8083',\n\
  oauth: {\ngrant_type: '授权类型',\nclient_id: '客户端 ID',\nclient_secret: '客户端密钥',\nusername:\
  \ '用户名',\npassword: '密码'\n}\n});\n```\n\n当你实例化 `Waterwheel` 时，还可以向参数对象提供其他属性，这些属性可能对你的\
  \ `Waterwheel` 驱动的消费型应用有用。例如，你可以提供一个 `timeout` 参数，指示在 `Waterwheel` 取消请求之前，请求可以空闲多长时间。以下是截至撰写本文时，直接从\
  \ `README` 中摘录的 `Waterwheel` 可选接受的其他可能属性列表。^(⁷²)\n\n*   `base`: Drupal 实例的基础路径。所有请求路径都将基于此路径构建。\n\
  *   `resources`: 一个 JSON 对象，表示 `waterwheel` 可用的资源（参见接下来的两节）。\n*   `oauth`: 一个包含获取和刷新\
  \ OAuth 承载令牌所需信息的对象。`Waterwheel` 推荐使用 Simple OAuth 模块（参见第 9 章）。\n    *   `grant_type`:\
  \ OAuth 2.0 授权类型。截至撰稿时，`password` 是唯一支持的值。\n    *   `client_id`: 你的客户端 ID。\n   \
  \ *   `client_secret`: 你的客户端密钥。\n    *   `username`: 用户的用户名。\n    *   `password`:\
  \ 用户的密码。\n*   `timeout`: 在取消 HTTP 请求之前，请求可以空闲的时间长度。\n*   `accessCheck`: 指示是否应使用身份验证。可能的值是\
  \ `true` 和 `false`。\n*   `jsonapiPrefix`: 如果你覆盖了 JSON API 的前缀，请在此处指定，`Waterwheel`\
  \ 将使用此值覆盖默认值 `jsonapi`。\n*   `validation`: 一个布尔值，默认为 `true`。如果设置为 `false`，每个请求都将忽略任何现有的\
  \ OAuth 信息，允许你在不进行任何身份验证的情况下发出请求。如果你有一个开放的 API，则无需使用 Simple OAuth 模块。\n\n\n\n###\
  \ 资源发现\n\n消费端应用的开发者常常面临一个挑战：如何实现客户端验证，使其能够模拟服务器端对收到的所有请求进行的验证。借助 OpenAPI 规范——该规范在\
  \ Drupal 中由 OpenAPI 模块（关于 OpenAPI（一种用于自文档化 API 的规范）的更多信息，请参阅第 24 章）表示——Waterwheel.js\
  \ 启用了一项名为*资源发现*的功能。\n\n具体来说，资源发现允许消费端应用理解 Drupal 的内容模式，并避免验证陷阱，而无需依赖与 Drupal 之间来回交互来获取验证源。这一点至关重要，因为\
  \ Drupal 的关键特性之一是内容建模的灵活性，这意味着可以随意添加或移除新的内容类型及其字段。\n\n由于消费端应用必然不了解 Drupal 用户在 CMS\
  \ 上如何对内容进行建模，并且开发者通常缺乏对 Drupal 中用于 Web 服务的实体序列化的全面理解，因此针对服务器端 Drupal 内容模式的客户端验证可能特别困难。消费端应用可能还希望向内容模型添加自己的元素，这些元素与\
  \ Drupal 的内容模型并存，尤其是当他们使用其他数据源时。最重要的好处之一是，消费端应用可以执行客户端验证，而完全无需咨询服务器。\n\n在 Waterwheel.js\
  \ 中，资源发现允许消费端应用开发者在实例化 `waterwheel` 时，使用一个包含关于 Drupal 上哪些实体和字段可用于检索和操作信息的元数据对象。\n\
  \n#### 通过资源发现填充资源\n\n要填充 Waterwheel.js 可用的资源，您可以提供一个资源清单来启用资源发现。Waterwheel.js 可以自动处理一个\
  \ OpenAPI 模式的 JSON 文件，并在向 Drupal 发出请求之前，根据这些响应验证任何用户生成的内容。\n\n例如，请查看以下示例，该示例从 JSON\
  \ 文件导入 OpenAPI 模式，并将其整合到 Waterwheel.js 的可用数据中。\n\n```\n// 在 Node.js 服务器上\nconst\
  \ Waterwheel = require('waterwheel');\nconst waterwheel = new Waterwheel({\nbase:\
  \ 'http://drupal-backend.dd:8083',\nresources: require('./resources.json'),\noauth:\
  \ {\ngrant_type: 'GRANT-TYPE',\nclient_id: 'CLIENT-ID',\nclient_secret: 'CLIENT-SECRET',\n\
  username: 'USERNAME',\npassword: 'PASSWORD'\n}\n});\n```\n\n如果您希望在稍后而非实例化时填充 Waterwheel.js\
  \ 的资源，您可以使用 `populateResources()` 方法，该方法会向 OpenAPI Drupal 模块提供的资源发出一个额外的 API 调用。在这里，我们看到使用\
  \ ES6 的 promise 来调用该方法以处理响应。\n\n```\nwaterwheel.populateResources('http://drupal-test.dd:8083/resources.json')\n\
  .then(res => {\n// ...\n});\n```\n\n一旦您填充了 Waterwheel.js 的内部资源，您就可以使用 `getAvailableResources()`\
  \ 方法来访问它们。promise 返回的响应将包含一个可用资源数组，如下面的注释所示。然后，您可以根据此数组验证对资源的传入请求。\n\n```\nwaterwheel.getAvailableResources()\n\
  .then(res => {\n/*\n[ 'comment',\n'file',\n'menu',\n'node.article',\n'node.page',\n\
  'node_type.content_type',\n'query',\n'taxonomy_term.tags',\n'taxonomy_vocabulary',\n\
  'user' ]\n*/\n});\n```\n\n### 注意\n\nOpenAPI Drupal 模块可在 Drupal.org 上的 [`https://www.drupal.org/project/openapi`](https://www.drupal.org/project/openapi)\
  \ 获取。有关 OpenAPI 的更多详细信息，请查阅第 24 章。\n\n### 使用 Waterwheel.js 消费和操作 Drupal\n\nWaterwheel.js\
  \ 与 Contenta.js（本章后续讨论）一样，为 JavaScript 开发者与 Drupal 之间搭建了一座桥梁，允许他们使用母语（JavaScript）通过\
  \ Drupal 的 Web 服务来检索和操作内容。\n\n#### 使用 Waterwheel.js 检索内容\n\n要使用 Waterwheel.js 检索内容，您可以在\
  \ `api` 对象上使用 `get()` 方法，并在过程中指定类型（以及必要的包的名称）。Waterwheel.js 中的所有查询都返回 ES6 的 promise。由于\
  \ Waterwheel.js 需要实体类型和包的名称来构建正确的资源路径，我们在调用 `get()` 时，必须在 `api` 对象内通过指定相应的资源来同时标识这两者。\n\
  \n```\n// Node 表示带有不同包的类型\nwaterwheel.api['node:article'].get(1) // .then( ...\n\
  waterwheel.api['node:page'].get(1) // .then( ...\n// User 同时表示类型和包\nwaterwheel.api['user'].get(1)\
  \ // .then( ...\n```\n\n`get()` 方法接受两个参数：必需的请求实体的 `标识符`（例如，核心 REST 中的 `nid`、`tid`、`uid`\
  \ 等），以及可选的响应 `格式`，默认为 `json`。\n\n```\nwaterwheel.api['node:article'].get(1)\n.then(res\
  \ => {\n// Drupal JSON 响应\n})\n.catch(err => {\n// 错误\n});\n```\n\n要请求序列化为 XML 的实体，请包含所需的\
  \ `format` 参数：\n\n```\nwaterwheel.api['node:article'].get(1, 'xml')\n.then(res =>\
  \ {\n// Drupal JSON 响应\n})\n.catch(err => {\n// 错误\n});\n```\n\n#### 使用 Waterwheel.js\
  \ 创建内容\n\n使用 Waterwheel.js，您还可以通过发出 `POST` 请求并调用 `post()` 方法，在核心 REST 中创建一个新实体。以下对\
  \ `post()` 方法的调用创建了一个标题为“Hello Drupal”的*基本页面*类型节点。\n\n`post()` 方法接受两个参数：所需内容实体的\
  \ `body`，其格式需使 Drupal 能够将其反序列化为一个 Drupal 实体；以及可选的 `format`，默认为 JSON。\n\n```\nwaterwheel.api['node:page'].post({\n\
  \"type\": [\n{\"target_id\": \"page\"}\n],\n\"title\": [\n{\"value\": \"Hello Drupal\"\
  }\n],\n\"body\": [\n{\"value\": \"How are you today?\"}\n]\n})\n.then(res => {\n\
  // 201 已创建\n})\n.catch(err => {\n// 错误\n});\n```\n\n#### 使用 Waterwheel.js 更新内容\n\
  \n我们还可以通过调用 `patch()` 方法，对 Drupal 核心 REST 中的任何内容实体发出 `PATCH` 请求（即执行更新操作）。该方法接受三个参数：需要更新的实体的\
  \ `标识符`（必需）、包含更新后实体字段的 `body`（必需），以及可选的 `format`。以下查询更新了 `nid` 为 `1` 的文章的标题和正文。\n\
  \n```\nwaterwheel.api['node:article'].patch(1, {\n\"nid\": [\n{\"value\": \"1\"\
  }\n],\n\"type\": [\n{\"target_id\": \"article\"}\n],\n\"title\": [\n{\"value\":\
  \ \"New title\"}\n],\n\"body\": [\n{\"value\": \"New node\"}\n]\n})\n.then(res =>\
  \ {\n// 更新后的 JSON 格式实体\n})\n.catch(err => {\n// 错误\n});\n```\n\n与典型的核心 REST 响应类似，此\
  \ `PATCH` 查询会在响应中返回新更新的 JSON 对象，随后可在已完成的 promise 中进行处理。\n\n#### 使用 Waterwheel.js\
  \ 删除内容\n\n要使用 Waterwheel.js 删除一个实体，我们只需在调用 `delete()` 方法时提供标识符作为参数，我们的 Drupal 实体就会被删除。\n\
  \n```\nwaterwheel.api['user'].delete(2)\n.then(res => {\n// 204 无内容\n})\n.catch(err\
  \ => {\n// 错误\n});\n```\n\n\n\n### 使用 JSON API 和 Waterwheel.js 检索内容\n\n如果你的 Drupal\
  \ 站点已安装 JSON API（完整概述请参阅第 8 章和第 12 章），你可以借助 `jsonapi` 对象使用 Waterwheel.js 来查询 JSON\
  \ API。该对象包含一个用于检索单个内容实体和实体集合的 `get()` 方法。\n\n截至目前，Waterwheel.js 的 JSON API 功能仅支持检索（`get()`）、创建（`post()`）和删除（`delete()`）。\n\
  \n`get()` 方法接受三个参数：\n- `resource`：被请求的包（bundle）和实体类型。\n- `params`：查询所需的其他参数，这些参数在发出请求前会被转换为查询字符串参数。\n\
  - `id`：被请求实体的 UUID。\n\n要检索一个集合，你可以像下面的示例一样，将包和实体类型作为字符串提供，这形成了第一个参数。以下代码从 JSON API\
  \ 中检索一篇默认的文章集合。\n\n```\nwaterwheel.jsonapi.get('node/article', {})\n.then(res =>\
  \ {\n// 处理响应\n})\n.catch(err => {\n// 错误处理\n});\n```\n\n要检索单个资源，我们可以提供第三个参数，即相关实体的\
  \ UUID。在这个例子中，我们正在检索 UUID 表达在参数中的那篇文章。\n\n```\nwaterwheel.jsonapi.get('node/article',\
  \ {}, 'bc4acb41-d3fe-4e19-a43b-c51665dab367')\n.then(res => {\n// 处理响应\n})\n.catch(err\
  \ => {\n// 错误处理\n});\n```\n\n得益于 JSON API，我们还可以检索被请求资源中关系（relationships）包含的相关资源。这意味着除了文章本身，我们还可以通过引用文章实体中包含的\
  \ `uid` 来获取相关的文章作者。我们通过“重载”UUID 参数来指定这种关系来实现这一点。\n\n```\nwaterwheel.jsonapi.get('node/article',\
  \ {}, 'bc4acb41-d3fe-4e19-a43b-c51665dab367/uid')\n.then(res => {\n// 处理响应\n})\n\
  .catch(err => {\n// 错误处理\n});\n```\n\n最后，我们还可以使用第二个 `params` 参数，对我们可能想要检索的任何集合动态执行查询操作。这些操作的常见示例可以在第\
  \ 12 章找到，这里复现了几个。\n\n要按标题升序排序，我们可以像下面这样提供一个 `sort` 查询字符串参数，反映相对路径 `/jsonapi/node/article?sort=title`。\n\
  \n```\nwaterwheel.jsonapi.get('node/article', {\nsort: 'title'\n})\n.then(res =>\
  \ {\n// 处理响应\n})\n.catch(err => {\n// 错误处理\n});\n```\n\n在字段名前加一个连字符，我们可以得到按标题降序排序的集合，反映路径\
  \ `/jsonapi/node/article?sort=-title`。\n\n```\nwaterwheel.jsonapi.get('node/article',\
  \ {\nsort: '-title'\n})\n.then(res => {\n// 处理响应\n})\n.catch(err => {\n// 错误处理\n\
  });\n```\n\n我们还可以将集合限制为仅 25 条记录，反映路径 `/jsonapi/node/article?page[limit]=25`。\n\n\
  ```\nwaterwheel.jsonapi.get('node/article', {\npage: {\nlimit: '25'\n}\n})\n.then(res\
  \ => {\n// 处理响应\n})\n.catch(err => {\n// 错误处理\n});\n```\n\n我们可以确保初始集合只包含第 26 到第\
  \ 50 篇文章，由路径 `/jsonapi/node/article?page[limit]=25&page[offset]=25` 表示。\n\n```\n\
  waterwheel.jsonapi.get('node/article', {\npage: {\nlimit: '25',\noffset: '25'\n\
  }\n})\n.then(res => {\n// 处理响应\n})\n.catch(err => {\n// 错误处理\n});\n```\n\n作为最后一个例子，我们可以定义自己的过滤器——此处只允许标识符为\
  \ 5 或更高的文章——并将其应用到集合中，这里反映的路径构造如下：\n\n```\n/jsonapi/node/article\n?filter[nid_filter][condition][value]=5\n\
  &filter[nid_filter][condition][field]=nid\n&filter[nid_filter][condition][operator]=%3C\n\
  ```\n\n这里，`%3C` 代表左尖括号 `<`。如你所见，得益于 Waterwheel.js 内置的查询处理，我们不需要使用 UTF-8 替换。\n\n\
  ```\nwaterwheel.jsonapi.get('node/article', {\nfilter: {\nnid_filter: {\ncondition:\
  \ {\nvalue: '5',\nfield: 'nid',\noperator: '<'\n}\n}\n}\n})\n.then(res => {\n//\
  \ 处理响应\n})\n.catch(err => {\n// 错误处理\n});\n```\n\n### 使用 JSON API 和 Waterwheel.js\
  \ 创建内容\n\nWaterwheel.js 还允许我们创建和删除 JSON API 暴露的内容实体，但截至目前，它不允许我们通过 `PATCH` 请求来更新它们。\n\
  \n`post()` 和 `delete()` 的第一个参数——连接后的包和实体类型——与 `jsonapi` 对象上的 `get()` 相同。然而，第二个参数不同；在\
  \ `post()` 中，它是要创建的文章的期望数据，而在 `delete()` 中，它是要删除实体的 UUID。\n\n在第一个示例中，我们使用预定义的数据创建一篇文章，Drupal\
  \ 将使用这些数据来构建实体。\n\n```\nconst postData = {\n'data': {\n'type': 'node--article',\n\
  'attributes': {\n'langcode': 'en',\n'title': '我悄悄创建的新文章',\n'status': '1',\n'promote':\
  \ '0',\n'sticky': '0',\n'default_langcode': '1',\n'path': null,\n'body': {\n'value':\
  \ '向你问候我悄悄创建的新文章。'\n}\n}\n}\n};\nwaterwheel.jsonapi.post('node/article', postData)\n\
  .then(res => {\n// 处理响应\n})\n.catch(err => {\n// 错误处理\n});\n```\n\n### 使用 JSON API\
  \ 和 Waterwheel.js 删除内容\n\n在第二个示例中，我们通过在调用 `delete()` 时引用实体的 UUID 来删除一个实体。注意其参数与\
  \ `post()` 不同。\n\n```\nwaterwheel.jsonapi.delete('node/article', 'bc4acb41-d3fe-4e19-a43b-c51665dab367/uid')\n\
  .then(res => {\n// 处理响应\n})\n.catch(err => {\n// 错误处理\n});\n```\n\n### Waterwheel.swift\n\
  \nWaterwheel.swift 以前被称为 Drupal iOS SDK，它为 Drupal 8 的核心 REST API 以及常见的 Swift 消费者需求（如会话管理和身份验证功能）提供了强大的支持。由于它旨在与\
  \ Swift 集成，Waterwheel.swift 支持 iOS、macOS、tvOS 和 watchOS。尽管全面检视 Waterwheel.swift\
  \ 的功能超出了本书的范围，但我们在此强调几个关键特性。\n\n得益于 Swift，Waterwheel.swift 相比其前身（用 Objective-C 实现的\
  \ Drupal iOS SDK）在性能上有显著优势。因此，构建 Swift 应用程序的开发人员可以利用该语言的闭包等特性。\n\n例如，对于 iOS，Waterwheel.swift\
  \ 提供了一个现成的登录按钮，开发人员可以将其子类化或放置到视图中的任何所需位置。该按钮可以与一个定制的 `LoginViewController` (`waterwheelLoginViewController`)\
  \ 配合使用，该控制器开箱即用地提供了用户名和密码字段，允许开发人员以最小的开销将 Drupal 用户登录和注销功能集成到 Swift 应用程序中。\n\n总之，Waterwheel.swift\
  \ 转变了面向 Drupal 的 Swift 开发人员体验，使其变得轻松自如。得益于 Swift，你可以利用苹果技术的下一代语法特性来与 Drupal 交换数据，而无需学习或理解\
  \ Drupal 复杂且常常难以驾驭的 Web 服务生态系统。\n\n### 注意\n\nWaterwheel.swift 可在 GitHub 上获得： [`https://github.com/kylebrowning/waterwheel.swift`](https://github.com/kylebrowning/waterwheel.swift)，同时还有一个演示应用程序：\
  \ [`https://github.com/kylebrowning/waterwheel.swift/tree/4.x/waterwheelDemo`](https://github.com/kylebrowning/waterwheel.swift/tree/4.x/waterwheelDemo)。\n\
  \n\n\n### `ember-drupal-waterwheel`\n\n本节和下一节，我们将深入探讨 Waterwheel 生态系统中，为使用 Ember\
  \ 和 React 构建消费者应用的开发者所提供的扩展、插件和参考构建的各个要素。在后续章节中，我们将转向 Contenta 生态系统。\n\n由 Chris\
  \ Hamper (hampercm) 编写的 `ember-drupal-waterwheel` 扩展，帮助 Ember 开发者构建由 Drupal 支撑的消费者应用。例如，`ember-drupal-waterwheel`\
  \ 与提供 Ember 应用服务端渲染功能的 FastBoot 扩展兼容。\n\n无论是在将现有 Ember 应用连接到 Drupal Web 服务提供者（例如\
  \ Contenta、Reservoir 或 Headless Lightning），还是从头创建新的 Ember 应用，我们都可以在 Ember 应用开发的各个阶段使用\
  \ `ember-drupal-waterwheel` 扩展。\n\n尽管 Ember 自带了一个通用的 `JSONAPIAdapter`，用于处理遵循 JSON\
  \ API 规范的各类 API 的请求和响应，但 `ember-drupal-waterwheel` 扩展所包含的适配器和序列化器能够处理 Drupal 特有的\
  \ JSON API 请求和响应，同时还能处理由 Simple OAuth 模块提供的 OAuth 2.0 认证（参见第 9 章）。\n\n首先，使用 Ember\
  \ 自带的命令行界面 Ember CLI 来安装该扩展。\n\n```\n$ ember new my-app\n$ cd my-app\n$ ember install\
  \ ember-drupal-waterwheel\n```\n\n`ember-drupal-waterwheel` 允许你即时生成反映 Drupal 实体类型的\
  \ Ember 模型、路由和模板。通过使用带 `drupal` 前缀参数的 `ember generate` 命令（或其简写 `ember g`），我们可以创建现成的\
  \ Ember 应用资源，并可以在此基础上进行修改。\n\n```\n$ ember g drupal-article\n$ ember g drupal-tag\n\
  ```\n\n我们还可以通过在通用实体类型名称后面将自定义实体名称作为参数传入，来为自定义 Drupal 实体生成所需的模型、路由和模板。\n\n```\n$\
  \ ember g drupal-entity my_custom_entity\n```\n\n### 注意\n\n`ember-drupal-waterwheel`\
  \ 扩展可在 GitHub 上获取，地址为 [`https://github.com/acquia/ember-drupal-waterwheel`](https://github.com/acquia/ember-drupal-waterwheel)\
  \ 。\n\n### `react-waterwheel-app`\n\n`react-waterwheel-app` 参考应用（见图 16-2）通过 Waterwheel.js\
  \ 库与一个基础 React 应用相结合，与 Drupal 后端集成，为内容实体的增删改查操作提供了一个简单的编辑界面。\n\n![../images/468476_1_En_16_Chapter/468476_1_En_16_Fig2_HTML.jpg](img/468476_1_En_16_Fig2_HTML.jpg)\n\
  \n图 16-2\n\n`react-waterwheel-app` 中显示与特定用户关联的内容列表的用户页面\n\nWaterwheel 生态系统中由 React\
  \ 和 Ember 驱动的参考应用还有一个相似之处，即由于 `src/config.js` 文件的存在，它们都易于配置。在 `react-waterwheel-app`\
  \ 中，你可以通过保存包含适当的 Drupal 主机名和 OAuth 2.0 所需凭证的文件，将 React 应用连接到 Drupal Web 服务提供者。\n\
  \n要开始使用 `react-waterwheel-app` 并连接到一个 Drupal 站点，请从 GitHub 克隆仓库并运行此处所示的命令。`react-waterwheel-app`\
  \ 项目使用 Yarn 作为依赖管理器，这与许多现代 JavaScript 生态系统保持一致。\n\n```\n$ git clone https://github.com/acquia/react-waterwheel-app\n\
  $ cd react-waterwheel-app\n$ yarn install\n```\n\n### 注意\n\n`react-waterwheel-app`\
  \ 参考构建可在 GitHub 上获取，地址为 [`https://github.com/acquia/react-waterwheel-app`](https://github.com/acquia/react-waterwheel-app)\
  \ 。\n\n### Contenta 生态系统\n\n如第 15 章所述，社区主导的 Contenta 发行版旨在为解耦 Drupal 提供一个功能丰富且能与多种演示和参考构建无缝集成的综合性后端。这些演示和参考构建针对与\
  \ Contenta 而非通用 Drupal 后端的使用进行了优化。Contenta 团队还积极接触其他社区，这些社区慷慨地贡献了可引用的消费者应用。\n\n\
  虽然 Contenta 拥有比 Waterwheel 生态系统更广泛的参考构建，但在撰写本文时，这些构建通常变化很大，因此不太稳定。然而，本章将介绍其中一些足够健壮的参考构建。在本节末尾，我们还将介绍\
  \ Contenta.js，它于 2018 年 7 月发布，专门为 Contenta CMS 提供了一个完整的 Node.js 中间件层。\n\n### Contenta\
  \ 参考构建\n\n与旨在提供通用 SDK 供开发者与任何解耦 Drupal 后端一起使用的 Waterwheel 生态系统不同，Contenta 生态系统更侧重于遵循单一设计的可演示应用，即由“开箱即用”计划制作的\
  \ Umami 主题。这有一个特别的优势，即便于在多个消费者应用之间进行比较，这对评估者非常有益。\n\n虽然全面深入地审视每个参考构建超出了本书的范围，并且这些参考构建本身不如\
  \ Contenta CMS 稳定，但这里我们将介绍几个最流行的 Contenta 消费者应用。\n\n##### `contenta_angular`\n\n\
  `contenta_angular` 参考应用旨在提供一套最佳实践，不仅用于构建由 Drupal 支撑的 Angular 应用，也适用于通用 Angular 应用的构建。为此，`contenta_angular`\
  \ 选用 Angular CLI 作为其命令行界面（有关 Angular CLI 的更多信息，请参见第 19 章），它包含了应用脚手架搭建、测试等功能。\n\n\
  此外，得益于 Service Worker 的使用，`contenta_angular` 支持离线工作。`contenta_angular` 的 Service\
  \ Worker 会在客户端缓存从 Drupal 加载的外部 API 调用和文件，这意味着整个应用可以在离线状态下运行。`contenta_angular` 应用还支持\
  \ HTTP/2 服务器推送，这使得服务器一旦接收到首次请求，即可启动 JavaScript 和 CSS 资源的传输。\n\n最后，`contenta_angular`\
  \ 使用了 Angular 生态系统的其他几个要素，例如基于 Material Design 的设计，其包含的 Sass 编译由 Angular CLI 免费提供。它还遵循\
  \ `ngrx 4` 库的状态管理方法，将对远程 API 的请求视为副作用，从而避免失败的请求导致过于乐观且难以回退的状态更改。^(⁷³)\n\n在撰写本文时，我们可以按照以下步骤安装\
  \ `contenta_angular`。此过程结束时，本地构建将在 `http://localhost:4200` 上可用。\n\n```\n$ npm install\
  \ -g @angular/cli\n$ git clone https://github.com/contentacms/contenta_angular.git\n\
  $ cd contenta_angular\n$ npm install\n$ ng serve\n```\n\n之后，你可以修改 `ngsw-manifest.json`、`src/environments/environment.prod.js`\
  \ 和 `src/environments/environment.js` 中的配置，以指向除公共 Contenta 主机之外的不同解耦 Drupal 主机。\n\
  \n### 注意\n\n`contenta_angular` 可在 GitHub 上获取，地址为 [`https://github.com/contentacms/contenta_angular`](https://github.com/contentacms/contenta_angular)\
  \ 。在撰写本文时，演示应用可在 [`https://contenta-angular.firebaseapp.com`](https://contenta-angular.firebaseapp.com)\
  \ 上访问。\n\n\n\n##### `contenta_ember`\n\n`contenta_ember` 参考应用程序也使用了其框架 Ember 的官方命令行界面（更多关于\
  \ Ember 的内容，请参见第 21 章）。借助 Ember CLI，开发者可以使用与 Angular CLI 类似的脚手架工具、内置的测试功能（Ember\
  \ 非常强调自动化测试），以及生成生产就绪代码的打包功能。\n\n`contenta_ember` 最引人注目的特性之一是其 Ember 代码生成能力。借助 Ember\
  \ CLI，您可以通过*一条命令*生成裸机 Ember 模型、组件和其他代码。^(⁷⁴)\n\n安装 `contenta_ember` 与安装 `contenta_angular`\
  \ 一样简单直接。\n\n```\n$ git clone https://github.com/contentacms/contenta_ember.git\n\
  $ cd contenta_ember\n$ npm install\n$ ember serve\n```\n\n若要一次性在本地运行测试，或在每次文件更改时运行测试，请分别使用以下命令。\n\
  \n```\n$ ember test\n$ ember test --server\n```\n\n若要构建生产就绪的 Ember 应用程序，您可以使用 `ember\
  \ build` 命令，该命令同样接受多种标志。\n\n```\n$ ember build --environment production\n```\n\n\
  > **注意**  \n> `contenta_ember` 在 GitHub 上的地址为 [`https://github.com/contentacms/contenta_ember`](https://github.com/contentacms/contenta_ember)\
  \ ，在撰写本文时，演示应用程序位于 [`http://umami.emc23.com`](http://umami.emc23.com) 。\n\n#####\
  \ `contenta_react`\n\n`contenta_react` 参考应用程序利用了 React 生态系统中一个新兴的项目，即 Create React\
  \ App，其目标是通过提供一个包含部分最重要 React 功能的现成样板，来解决初学者在 React 之旅中面临的诸多挑战。\n\n> **注意**  \n\
  > Create React App 在 GitHub 上的地址为 [`https://github.com/facebook/create-react-app`](https://github.com/facebook/create-react-app)\
  \ 。\n\n`contenta_react` 还使用了 Redux（一个用于 JavaScript 应用程序的可预测状态容器）、Aphrodite（一个与框架无关的\
  \ JavaScript 内联样式提供程序）以及服务器端渲染。^(⁷⁵)\n\n在撰写本文时，要安装 `contenta_react` 并通过本地服务器 `https://localhost:3000`\
  \ 快速启动，请使用以下命令。\n\n```\n$ git clone https://github.com/contentacms/contenta_react.git\n\
  $ cd contenta_react\n$ yarn install\n$ yarn start\n```\n\n若要以开发模式运行应用程序（每次编辑文件时页面都会重新加载，并在控制台记录开发错误），您可以使用以下命令。\n\
  \n```\n$ yarn run start:dev\n```\n\n若要创建放置于 `build` 文件夹中的生产就绪构建，请使用以下命令。在运行 `build`\
  \ 命令后执行 `yarn start`，将以生产模式初始化应用程序，并对初始页面状态进行服务器端渲染。\n\n```\n$ yarn build\n$ yarn\
  \ start\n```\n\n> **注意**  \n> `contenta_react` 在 GitHub 上的地址为 [`https://github.com/contentacms/contenta_react`](https://github.com/contentacms/contenta_react)\
  \ 。\n\n##### `contenta_vue_nuxt`\n\n`contenta_vue_nuxt` 参考应用程序阐述了一个愿景，即反映使 Vue.js\
  \ 普及的相同特性（更多关于 Vue.js 的内容，请参见第 20 章）。这个理想状态意味着低入门门槛、渐进式可采纳性、代码可读性以及易于上手的学习性。^(⁷⁶)\n\
  \nContenta 的 Vue.js 消费者还利用了 Nuxt.js，它为 Vue.js 提供了服务器端渲染，但并未使用 Vue CLI。这两个项目均在第 20\
  \ 章中讨论。\n\n要安装 `contenta_vue_nuxt`，请使用以下命令。\n\n```\n$ git clone https://github.com/contentacms/contenta_vue_nuxt.git\n\
  $ cd contenta_vue_nuxt\n$ npm install\n```\n\n若要启动一个带有热重载功能（每次代码编辑时刷新）的本地环境，请执行以下操作。\n\
  \n```\n$ npm run dev\n```\n\n若要运行单元测试、生成生产构建并启动生产服务器，请按顺序执行以下命令。\n\n```\n$ npm test\n\
  $ npm run build\n$ npm run start\n```\n\n> **注意**  \n> `contenta_vue_nuxt` 在 GitHub\
  \ 上的地址为 [`https://github.com/contentacms/contenta_vue_nuxt`](https://github.com/contentacms/contenta_vue_nuxt)\
  \ ，在撰写本文时，演示应用程序位于 [`https://contentanuxt.now.sh`](https://contentanuxt.now.sh)\
  \ 。\n\n如果关于 Waterwheel 和 Contenta 参考应用程序的讨论感觉过于浅显和入门，那是因为我们尚未介绍支撑它们的 JavaScript\
  \ 技术。在本书第五部分构建我们自己的、基于 Drupal 的 JavaScript 消费者的过程中，我们将重新回顾这些内容，以从中汲取灵感。\n\n### Contenta.js\n\
  \nContenta.js 的发布是为了补充 Contenta CMS 在 JavaScript 消费者中的使用，它解决了一个迫切需求：需要一个规范的 Node.js\
  \ 代理作为 Drupal 内容 API 层和前端 JavaScript 应用程序之间的中间件。随着越来越多的用户开始在自己的项目中采用 Contenta CMS，Contenta\
  \ 团队注意到这个需求迅速导致了碎片化，表现为各个机构都有自己的、独特的 Node.js 代理来为各种 JavaScript 消费者提供 Drupal 内容。^(⁷⁷)\n\
  \nNode.js 中间件层至关重要的原因有几个。首先，当解耦的 Drupal 架构需要聚合来自多个来源的数据时，Node.js 凭借其非阻塞 I/O 成为检索这些数据的更优机制。其次，在为通用应用程序执行服务器端渲染时，Node.js\
  \ 是明确的需求。最后，Node.js 中的中间件层提供了缓存功能，允许请求从 Node.js 的缓存中检索数据，而不是直接访问数据的原始来源。鉴于 Contenta.js\
  \ 的动机多种多样，该中间件的既定理念是“分支并继续”（\"fork and go.\"）。^(⁷⁸)\n\nContenta.js 的既定目标是“带来一致性和协作——一套通用实践，以使各机构能够专注于使用\
  \ Node.js 创建尽可能最好的软件。”确实，它附带了一些开发者认为对 Node.js 代理至关重要的特性。\n\n首先，只要在配置中提供了站点的 URI，Contenta.js\
  \ 就能与任何暴露 API 的 Contenta CMS 安装进行无缝集成。启用了 JSON API、JSON-RPC（参见第 23 章）、Subrequests（参见第\
  \ 23 章）和 OpenAPI（参见第 24 章）模块的 Contenta 安装无需进一步配置。\n\n其次，Contenta.js 包含多个对开发有用的特性，包括一个多线程\
  \ Node.js 服务器、一个促进请求聚合的 Subrequests 服务器、Contenta 提供的 Redis 集成、一个利用 Flow 的类型安全开发环境，以及一种对开发者更友好的配置\
  \ CORS 的方法。\n\n> **注意**  \n> Contenta.js 在 GitHub 上的地址为 [`https://github.com/contentacms/contentajs`](https://github.com/contentacms/contentajs)\
  \ 。\n\n\n\n### 结论\n\n尽管无头 CMS 仅在消费者 SDK 方面采用开源，但解耦 Drupal 却拥有从头到尾均为开源 CMS 的独特优势，无论你使用的是来自\
  \ `Contenta` 或 `Waterwheel` 生态系统的参考构建还是 SDK。凭借适用于多种语言的 SDK 和适用于多种 JavaScript 技术的参考构建，`Contenta`\
  \ 和 `Waterwheel` 都为基于解耦 Drupal 的消费者应用开发者描绘了一个充满希望的未来。\n\n事实上，Drupal 与其他技术（即 JavaScript\
  \ 框架和原生移动技术，如 `Swift`）的集成度越高，Drupal 以 API 为先的未来就越有保障，并且基于消费者应用开发者的反馈，Drupal 的 Web\
  \ 服务也将更加稳健。有了功能强大的库和参考资料，解耦 Drupal 能够赢得那些最初可能甚至从未搜索过 Drupal 的其他技术和社区的采用。\n\n在第 5\
  \ 部分中，在我们将所有时间都花在 Drupal 内部或 Drupal 与其消费者之间后，现在我们将转向前端和消费者。由于每个消费者都不同，因此在后续章节中不可能逐一考虑每种技术。因此，我们将仅关注最重要的、同时具有原生等效实现的\
  \ JavaScript 框架，即 `Angular`、`Ember`、`React` 和 `Vue`。在介绍了每个项目之后，我们将使用相同的接口在所有这四个框架上构建一个简单的应用程序，该应用程序将突显它们之间的差异，并充分利用我们迄今为止建立的所有基础。\n\
  \n脚注 1 2 3 4 5 6 7 8\n\n"
- '# 第 V 部分 与消费者的集成


  与消费者的集成


  在第 4 部分中，我们对新兴的解耦 Drupal 生态系统及其最常用的组件进行了简要调查，包括像 `Contenta`、`Reservoir` 和 `Headless
  Lightning` 这样的 API 优先发行版，以及帮助开发人员为自身实现提供起点的 SDK 和参考构建。


  在这些章节中，我们将深入探讨一些最常用的、驱动基于 Drupal 应用程序的 JavaScript 技术，即 `React`、`React Native`、`Angular`、`Vue.js`
  和 `Ember`。在此过程中，我们探索了所有这些技术的观点倾向范围，并构建了与 Drupal Web 服务交互的应用程序。当然，我们不可能详尽地涵盖这些项目以解释其所有概念，因为每个项目都值得为其撰写一本甚至更多的书。


  我们在这些章节中审视的 JavaScript 技术涵盖了从有限的、专注于视图的库到高度固执己见的 MV*（模型-视图-任何东西）框架的整个范围。这两种类别的 JavaScript
  技术都在前端开发社区中被大规模采用。尽管如此，这些工具在多个维度上存在显著差异。


  例如，尽管 `React` 处于观点性较弱的端，但它也将许多关于其他工具的必要决策留给了开发人员，这可能导致具有挑战性的学习曲线。其他工具，即 `Angular`
  和 `Ember`，则对它们期望开发者如何使用其功能抱有很强的观点性。例如，`Ember` 默认包含 JSON API 支持，而 `Angular` 则强制使用
  `TypeScript`。与此同时，JavaScript 社区中的许多人通常认为 `React` 和 `Vue.js` 更灵活，并允许采用不同的解决方案。例如，虽然我们可以通过将其作为依赖项包含在
  `React` 中来自由地利用 `Waterwheel.js`，但由于 `Ember` 有一个用于 JSON API 的默认适配器，`Waterwheel.js`
  就变得多余了。


  由于 `React` 是 JavaScript 社区中使用的最流行的 JavaScript 项目之一，并且在当今的解耦 Drupal 架构中得到了很好的体现，因此我们从它开始我们的旅程。之后，我们将介绍基于
  Drupal 的应用程序在 `React Native`、`Angular`、`Vue.js` 和 `Ember` 中的实现。


  '
- "# 17. React\n\n`React` 是一个流行的 JavaScript 视图库，经常与其他技术结合使用来创建单页 JavaScript 应用程序。`React`\
  \ 于 2013 年由 Facebook 创立，由于其声明式的状态管理、将模板与视图逻辑放在一起，以及相对不固执己见的技术栈（这意味着它与 `Angular`（见第\
  \ 19 章）和 `Ember`（见第 21 章）最为不同），因此在流行度上迅速超越了其他类似项目。在过去几年中，围绕核心 `React` 库已经发展出了一个广泛的生态系统。\n\
  \n`React` 自称是一个“用于构建用户界面的 JavaScript 库”，并在其主页上声明：\n\n- *React 使创建交互式 UI 变得轻而易举。为你应用中的每种状态设计简单的视图，当数据变化时，React\
  \ 将高效地更新和渲染正确的组件。* ^(⁷⁹)\n\n与其他框架不同，`React` 强调其作为库的独特特性，而不是传统的模型-视图-控制器（MVC）框架。由于它专注于提供可重用和可嵌套的组件，许多人选择将\
  \ `React` 视为 MVC 架构中的视图层。因为它纯粹是一个视图库，架构师经常将其他技术与 `React` 配对，并且在工具选择方面往往缺乏指导。\n\n\
  传统上，使用声明式方法和双向数据绑定的 MVC 框架必须直接将更改应用于 DOM。例如，`AngularJS` 手动更新 DOM 节点。与此同时，`React`\
  \ 使用*虚拟 DOM*，这是一种抽象的 DOM，允许对不同用户界面状态进行差异比较（对比所有已考虑的差异），从而实现可能最高效的 DOM 操作。\n\n由于整个技术栈中工具覆盖的缺乏，`React`\
  \ 构建可能特别具有挑战性和负担。在许多 `React` 架构中，需要决定是否使用 `Flux` 架构方法、`Redux` 绑定库以及其他更小的库，如 `react-router`（现在是\
  \ `React` 应用程序中最常用的路由库）。`React` 的最后一个缺点是它对 Web Components 的支持不完善，这使得它与 `Ember` 等框架形成对比，并带来了向前兼容性的问题。^(⁸⁰)\n\
  \n### 注意\n\n有关 `React` 的更多信息，请访问网站 [`https://reactjs.org`](https://reactjs.org)。有关\
  \ `React` 中对 Web Components 支持的更多信息，请查阅文档 [`https://reactjs.org/docs/web-components.html`](https://reactjs.org/docs/web-components.html)。\n\
  \n## React 中的关键概念\n\n虽然在过去的几年里，`React` 生态系统以其臭名昭著的困难学习曲线而闻名，但如今创建 `React` 应用程序的过程已经简单得多，这要归功于\
  \ `create-react-app` 项目，它提供了一个功能完整的 `React` 应用程序，而无需在 `Webpack` 和 `Babel` 等工具中进行额外的构建配置。\n\
  \n### 搭建一个 React 应用程序并安装依赖\n\n要创建一个新的 `create-react-app` 应用程序，请执行以下命令。\n\n```\n\
  $ npx create-react-app ddip-react\n$ cd ddip-react\n$ yarn start\n```\n\n最后的命令会启动一个本地服务器，并使你的\
  \ `React` 应用程序在 `http://localhost:3000` 可用。你可以使用以下命令轻松创建一个可用于客户端的压缩包。\n\n```\n$\
  \ yarn build\n```\n\n\n\n### 注意\n\n`npx` 适用于 `npm` 5.2 及更高版本。\n\n我们还需要在代码库中包含并安装几个依赖项，特别是\
  \ `react-router-dom`。作为 React 生态系统中最常用的路由库之一，它不仅提供 `react-router` 的所有功能，还能实现跨路由创建链接。我们将在后续章节介绍如何在\
  \ React 中执行路由。请注意，要执行以下命令，你需要打开一个新的终端窗口或停止本地服务器。\n\n```\n$ yarn add react-router-dom\n\
  ```\n\n我们将使用 `axios` 从 Drupal 网站执行检索操作来支持我们的应用；因此也需要包含它。如果你还需要 OAuth 2.0 认证（参见第\
  \ 9 章），不妨考虑使用已内置该认证功能的 Waterwheel.js（参见第 16 章）。\n\n```\n$ yarn add axios\n```\n\n\
  完成此步骤后，你的 `package.json` 文件应如下所示。\n\n```\n{\n\"name\": \"ddip-react\",\n\"version\"\
  : \"0.1.0\",\n\"private\": true,\n\"dependencies\": {\n\"axios\": \"⁰.18.0\",\n\"\
  react\": \"¹⁶.5.2\",\n\"react-dom\": \"¹⁶.5.2\",\n\"react-router-dom\": \"⁴.3.1\"\
  ,\n\"react-scripts\": \"2.0.3\"\n},\n\"scripts\": {\n\"start\": \"react-scripts\
  \ start\",\n\"build\": \"react-scripts build\",\n\"test\": \"react-scripts test\"\
  ,\n\"eject\": \"react-scripts eject\"\n},\n\"eslintConfig\": {\n\"extends\": \"\
  react-app\"\n},\n\"browserslist\": [\n\">0.2%\",\n\"not dead\",\n\"not ie <= 11\"\
  ,\n\"not op_mini all\"\n]\n}\n```\n\n你的目录结构应如下所示（不包括 `node_modules` 目录）。\n\n```\n\
  ├── README.md\n├── package.json\n├── public\n│   ├── favicon.ico\n│   ├── index.html\n\
  │   └── manifest.json\n├── src\n│   ├── App.css\n│   ├── App.js\n│   ├── App.test.js\n\
  │   ├── index.css\n│   ├── index.js\n│   ├── logo.svg\n│   └── serviceWorker.js\n\
  └── yarn.lock\n```\n\n### 注意\n\n本章的其余内容大致基于并受 Matt Grill (drpal) 编写的 `react-waterwheel-app`\
  \ 代码启发，该代码将在第 16 章中介绍。\n\n### 索引组件\n\n如前所述，React 具有可嵌套、可重用的*组件*概念，其中包含一个顶层的根组件。当我们在应用上下文中使用这些组件时，通常需要传入*属性（properties）*，为组件提供需要渲染的差异化信息。\n\
  \n在 `src` 目录中，我们可以创建第一个组件，`create-react-app` 已经为我们搭建好了脚手架，该组件将作为索引（根）组件，所有其他组件都会渲染到其中。我们需要获取所有依赖项。将\
  \ `src/App.js` 的内容修改为以下代码。\n\n```\n// src/App.js\nimport React, { Component } from\
  \ 'react';\nimport {\nBrowserRouter as Router,\nRoute,\nLink\n} from 'react-router-dom';\n\
  class App extends Component {\nconstructor(props) {\nsuper(props);\nthis.state =\
  \ {};\n}\ncomponentWillMount() {\nthis.setState({\narticles: [\n{\nid: '3ca469da-b905-4a77-8d97-954abcdc4cf6',\n\
  attributes: {\ntitle: 'Capto',\nuuid: '3ca469da-b905-4a77-8d97-954abcdc4cf6',\n\
  created: 1526387013,\nbody: {\nvalue: 'Camur'\n}\n}\n},\n{\nid: '1e1a4598-f9c7-4ce7-adbd-7603401cc23b',\n\
  attributes: {\ntitle: 'Esse Ex Nibh Valde Valetudo',\nuuid: '1e1a4598-f9c7-4ce7-adbd-7603401cc23b',\n\
  created: 1526387013,\nbody: {\nvalue: 'Illum loquor persto plaga premo.'\n}\n}\n\
  }\n]\n});\n}\nrender() {\nreturn (\n\nReact app\n\n);\n}\n}\nexport default App;\n\
  ```\n\n我们依次查看这段代码的每个部分，理解 React 如何处理某些重要元素会很有帮助。首先，我们引入所有依赖项。\n\n```\nimport React,\
  \ { Component } from 'react';\nimport { render } from 'react-dom';\nimport {\nBrowserRouter\
  \ as Router,\nRoute,\nLink\n} from 'react-router-dom';\n```\n\n然后，我们实现一个 `Component`\
  \ 类，并用 React 实例化该组件时定义的任何属性来填充它。\n\n```\nclass App extends Component {\nconstructor(props)\
  \ {\nsuper(props);\nthis.state = {};\n}\n```\n\n最后，我们通过使用 `componentWillMount()`\
  \ 方法接入 React 的组件生命周期来检索数据。在此例中，由于尚未引入 Drupal，我们提供的是虚拟数据。\n\n```\ncomponentWillMount()\
  \ {\nthis.setState({\narticles: [\n{\nid: '3ca469da-b905-4a77-8d97-954abcdc4cf6',\n\
  attributes: {\ntitle: 'Capto',\nuuid: '3ca469da-b905-4a77-8d97-954abcdc4cf6',\n\
  created: 1526387013,\nbody: {\nvalue: 'Camur'\n}\n}\n},\n{\nid: '1e1a4598-f9c7-4ce7-adbd-7603401cc23b',\n\
  attributes: {\ntitle: 'Esse Ex Nibh Valde Valetudo',\nuuid: '1e1a4598-f9c7-4ce7-adbd-7603401cc23b',\n\
  created: 1526387013,\nbody: {\nvalue: 'Illum loquor persto plaga premo.'\n}\n}\n\
  }\n]\n});\n}\n```\n\n最后，我们渲染组件，但正如你所见，我们尚未提供数据。如果你使用 `npm run start` 打开应用程序，应用将是空的。在下一节中，我们将介绍\
  \ React 的原生模板语言 JSX。\n\n### 注意\n\n有关 React 组件的更多信息，请查阅文档：[`https://reactjs.org/docs/components-and-props.html`](https://reactjs.org/docs/components-and-props.html)。\n\
  \n### React 状态与声明式渲染\n\n与其他主流框架和库一样，React 提供了一种原生方法来实现声明式渲染，该方法通过将传入的属性与它们所涉及的组件的标记放在一起来实现。这产生了一种以\
  \ JSX 编写的高度清晰的模板，JSX 是 React 对 JavaScript 的语法扩展，看起来类似于 HTML 或 XML。JSX 可用于渲染传统的 HTML\
  \ 元素以及 React 组件。\n\n我们要做的第一件事是更新我们的 `render()` 方法，添加将文章渲染到应用程序所需的逻辑。考虑以下示例，并更新 `src/App.js`\
  \ 以反映当前状态。\n\n```\n// src/App.js\nimport React, { Component } from 'react';\nimport\
  \ {\nBrowserRouter as Router,\nRoute,\nLink\n} from 'react-router-dom';\nclass App\
  \ extends Component {\nconstructor(props) {\nsuper(props);\nthis.state = {};\n}\n\
  componentWillMount() {\nthis.setState({\narticles: [\n{\nid: '3ca469da-b905-4a77-8d97-954abcdc4cf6',\n\
  attributes: {\ntitle: 'Capto',\nuuid: '3ca469da-b905-4a77-8d97-954abcdc4cf6',\n\
  created: 1526387013,\nbody: {\nvalue: 'Camur'\n}\n}\n},\n{\nid: '1e1a4598-f9c7-4ce7-adbd-7603401cc23b',\n\
  attributes: {\ntitle: 'Esse Ex Nibh Valde Valetudo',\nuuid: '1e1a4598-f9c7-4ce7-adbd-7603401cc23b',\n\
  created: 1526387013,\nbody: {\nvalue: 'Illum loquor persto plaga premo.'\n}\n}\n\
  }\n]\n});\n}\nrender() {\nreturn (\n\nReact app\n\n{this.state.articles && this.state.articles.map(article\
  \ => (\n\n{article.attributes.title}\n\n{article.attributes.created}\n{article.attributes.body.value}\n\
  \n))}\n\n);\n}\n}\nexport default App;\n```\n\n仔细审视上面给出的 `render()` 方法。如你所见，在访问状态对象中的值并将其显示在列表中之前，我们正在验证数据是否存在于状态对象中。在此过程中，我们创建了一个简单的内容列表，你可以在图\
  \ 17-1 中看到。\n\n![../images/468476_1_En_17_Chapter/468476_1_En_17_Fig1_HTML.jpg](img/468476_1_En_17_Fig1_HTML.jpg)\n\
  \n图 17-1\n\n我们的 React 应用程序的当前状态渲染了虚拟数据\n\n### 注意\n\n有关 JSX 的更多信息，请查阅文档：[`https://reactjs.org/docs/introducing-jsx.html`](https://reactjs.org/docs/introducing-jsx.html)。有关声明式渲染的更多信息，请查阅文档：[`https://reactjs.org/docs/rendering-elements.html`](https://reactjs.org/docs/rendering-elements.html)。\n\
  \n\n\n### React 路由与组件\n\n现在，我们将应用拆分为主视图和用于展示单篇文章信息的组件。为此，需要使用 React Router，并向 React\
  \ 提供一个新组件。在你的 `src` 目录中，创建一个名为 `Article.js` 的新文件。这将成为我们新的文章详情组件。\n\n将以下内容插入到 `src/Article.js`\
  \ 中。如你所见，我们将原先嵌套列表中的信息提取出来，放入独立的文章详情组件中。我们还为文章数据关联了一个类型，借助 `PropTypes` 的类型检查，可以更轻松地进行调试。\n\
  \n```js\n// src/Article.js\nimport React from 'react';\nimport PropTypes from 'prop-types';\n\
  const Article = ({article}) => (\n\n{article && (\n\n{article.attributes.title}\n\
  \n{article.id}\n{article.attributes.created}\n\n{article.attributes.body.value}\n\
  \n)}\n\n);\nArticle.propTypes = {\narticle: PropTypes.object\n};\nexport default\
  \ Article;\n```\n\n现在，我们可以更新 index 组件，添加文章选择逻辑。首先，需要导入新的 `Article` 组件，以便 index 组件能够识别它。然后，需要提供一个路由机制，允许根据文章标识符选择并渲染文章。请参考\
  \ `src/App.js` 的以下新状态。\n\n```js\n// src/App.js\nimport React, { Component } from\
  \ 'react';\nimport {\nBrowserRouter as Router,\nRoute,\nLink\n} from 'react-router-dom';\n\
  import Article from './Article.js';\nclass App extends Component {\nconstructor(props)\
  \ {\nsuper(props);\nthis.state = {};\n}\ncomponentWillMount() {\nthis.setState({\n\
  articles: [\n{\nid: '3ca469da-b905-4a77-8d97-954abcdc4cf6',\nattributes: {\ntitle:\
  \ 'Capto',\nuuid: '3ca469da-b905-4a77-8d97-954abcdc4cf6',\ncreated: 1526387013,\n\
  body: {\nvalue: 'Camur'\n}\n}\n},\n{\nid: '1e1a4598-f9c7-4ce7-adbd-7603401cc23b',\n\
  attributes: {\ntitle: 'Esse Ex Nibh Valde Valetudo',\nuuid: '1e1a4598-f9c7-4ce7-adbd-7603401cc23b',\n\
  created: 1526387013,\nbody: {\nvalue: 'Illum loquor persto plaga premo.'\n}\n}\n\
  }\n]\n});\n}\nrender() {\nreturn (\n\nReact app\n\n{this.state.articles && this.state.articles.map(article\
  \ => (\n\n{article.attributes.title}\n\n))}\n\n{this.state.articles &&\n {\nlet\
  \ article = this.state.articles.find(article => article.id === match.params.articleID);\n\
  return ();\n}\n}/>\n}\n\n);\n}\n}\nexport default App;\n```\n\n再次查看应用时，可以看到点击任意文章链接后，详情组件会渲染出来，如图\
  \ 17-2 所示。\n\n![../images/468476_1_En_17_Chapter/468476_1_En_17_Fig2_HTML.jpg](img/468476_1_En_17_Fig2_HTML.jpg)\n\
  \n图 17-2\n\n当我们点击其中一个链接时，可以看到详情组件更新，且 URL 会变为 `/articles/` 后接选中文章的 UUID。\n\n###\
  \ 注意\n\n关于 React 组件的更多信息，请查阅文档： [`https://reactjs.org/docs/components-and-props.html`](https://reactjs.org/docs/components-and-props.html)。\n\
  \n## 用 Drupal 和 JSON API 为 React 提供后端支持\n\n为了用 API 暴露的真实数据支持 React 应用，我们使用了在第八章和第十二章构建的\
  \ Drupal 网站的最终状态，该站点提供了一个符合 JSON API 规范的 Web 服务。如果你还没有搭建一个带有生成内容并启用了 JSON API 的\
  \ Drupal 站点，请先回到第八章和第十二章继续操作。\n\n### 使用 `axios` 获取 Drupal 数据\n\n现在有了 `axios`，我们可以向\
  \ Drupal 发出请求，获取填充应用所需的真实数据内容项。用以下内容替换 `src/App.js`，它用基于 `axios` 的 Promise 替换了 `componentWillMount()`\
  \ 中的虚拟数据。请注意，我们现在通过一个新的 `import` 语句引入了 `axios` 依赖。\n\n```js\n// src/App.js\nimport\
  \ React, { Component } from 'react';\nimport {\nBrowserRouter as Router,\nRoute,\n\
  Link\n} from 'react-router-dom';\nimport axios from 'axios';\nimport Article from\
  \ './Article.js';\nclass App extends Component {\nconstructor(props) {\nsuper(props);\n\
  this.state = {};\n}\ncomponentWillMount() {\naxios.get('http://jsonapi-test.dd:8083/jsonapi/node/article')\n\
  .then(res => this.setState( { articles: res.data.data }))\n.catch(console.log);\n\
  }\nrender() {\nreturn (\n\nReact app\n\n{this.state.articles && this.state.articles.map(article\
  \ => (\n\n{article.attributes.title}\n\n))}\n\n{this.state.articles &&\n {\nlet\
  \ article = this.state.articles.find(article => article.id === match.params.articleID);\n\
  return ();\n}\n}/>\n}\n\n);\n}\n}\nexport default App;\n```\n\n回到应用，可以看到 Drupal\
  \ 数据现在正确地填充了 React 应用。这也如图 17-3 所示。\n\n![../images/468476_1_En_17_Chapter/468476_1_En_17_Fig3_HTML.jpg](img/468476_1_En_17_Fig3_HTML.jpg)\n\
  \n图 17-3\n\n回到应用，表明我们现在已成功填充了 Drupal 数据。\n\n### 注意\n\n关于 `axios` 的更多信息，请查阅文档： [`https://github.com/axios/axios`](https://github.com/axios/axios)。\n\
  \n\n\n#### 处理错误与加载状态\n\n现在，我们可以添加一些错误处理机制和加载状态，以防 Drupal 站点响应缓慢。不过，要实现这一点，我们需要在\
  \ React 应用以及 Promise 处理中考虑错误与加载状态。将`src/App.js`的内容替换为以下代码，即可查看效果。\n\n```javascript\n\
  // src/App.js\nimport React, { Component } from 'react';\nimport {\nBrowserRouter\
  \ as Router,\nRoute,\nLink\n} from 'react-router-dom';\nimport axios from 'axios';\n\
  import Article from './Article.js';\nclass App extends Component {\nconstructor(props)\
  \ {\nsuper(props);\nthis.state = {\narticles: [],\nloading: true,\nerrored: false\n\
  };\n}\ncomponentWillMount() {\naxios.get('http://jsonapi-test.dd:8083/jsonapi/node/article')\n\
  .then(res => this.setState({ articles: res.data.data }))\n.catch(err => {\nconsole.log(err);\n\
  this.setState({ errored: true });\n})\n.finally(() => this.setState({ loading: false\
  \ }));\n}\nrender() {\nreturn (\n\nReact app\n{this.state.errored ? (\n抱歉，当前无法获取{'this'}信息。\n\
  ) : (\n\n{this.state.loading ? (\n加载中...\n) : (\n\n{this.state.articles && this.state.articles.map(article\
  \ => (\n\n{article.attributes.title}\n\n))}\n\n{this.state.articles &&\n {\nlet\
  \ article = this.state.articles.find(article => article.id === match.params.articleID);\n\
  return ();\n}\n}/>\n}\n\n)}\n\n)}\n\n);\n}\n}\nexport default App;\n```\n\n这里有不少内容需要深入分析，我们来逐一剖析这个代码示例。首先，我们向\
  \ React 的状态机声明了`errored`和`loading`这两个初始状态，它们分别被设置为`false`和`true`。\n\n```javascript\n\
  constructor(props) {\nsuper(props);\nthis.state = {\narticles: [],\nloading: true,\n\
  errored: false\n};\n}\n```\n\n然后，在`componentWillMount()`方法中，我们增强了错误处理，并在 Promise\
  \ 完全兑现后将`loading`状态调整为`true`。\n\n```javascript\ncomponentWillMount() {\naxios.get('http://jsonapi-test.dd:8083/jsonapi/node/article')\n\
  .then(res => this.setState({ articles: res.data.data }))\n.catch(err => {\nconsole.log(err);\n\
  this.setState({ errored: true });\n})\n.finally(() => this.setState({ loading: false\
  \ }));\n}\n```\n\n接着，在`render()`方法中，我们使用三元运算符来检查`loading`和`errored`状态是否为`true`。在第一个条件语句中，如果`errored`状态返回`true`，则仅显示错误信息。否则，如果`loading`状态为`true`，则会显示一个加载占位符，直到\
  \ Promise 兑现，之后继续渲染。\n\n请注意以下代码段中，由于`this`是 JavaScript 和 JSX 中的保留字，我们在第二行将其包裹在一个表达式中。此外，由于\
  \ JSX 表达式需要一个外层标签，我们添加了一个`<section>`元素来包含处理`loading`状态的控制结构。\n\n```javascript\n\
  {this.state.errored ? (\n抱歉，当前无法获取{'this'}信息。\n) : (\n\n{this.state.loading ? (\n\
  加载中...\n) : (\n\n{this.state.articles && this.state.articles.map(article => (\n\n\
  {article.attributes.title}\n\n))}\n\n{this.state.articles &&\n {\nlet article =\
  \ this.state.articles.find(article => article.id === match.params.articleID);\n\
  return ();\n}\n}/>\n}\n\n)}\n\n)}\n```\n\n你可以在图 17-4 和 17-5 中看到我们刚刚完成的效果。\n\n![../images/468476_1_En_17_Chapter/468476_1_En_17_Fig5_HTML.jpg](img/468476_1_En_17_Fig5_HTML.jpg)\n\
  \n**图 17-5** 当 Promise 仍处于待定状态时，我们会看到一条加载消息，直到 Promise 兑现\n\n![../images/468476_1_En_17_Chapter/468476_1_En_17_Fig4_HTML.jpg](img/468476_1_En_17_Fig4_HTML.jpg)\n\
  \n**图 17-4** 当 Promise 抛出错误时，我们会收到一条错误消息\n\n### 注意\n\n有关 React 条件渲染的更多信息，请查阅文档[`reactjs.org/docs/conditional-rendering.html`](https://reactjs.org/docs/conditional-rendering.html)。\n\
  \n### 结论\n\nReact 推广了许多如今在 JavaScript 社区中广泛采用的概念，包括虚拟 DOM 和 JSX 的底层哲学。由于其范围有限但功能强大，React\
  \ 成为了解耦 Drupal 的消费者中的热门选择。尽管如此，由于缺乏明确观点和规范的最佳实践，React 可能成为一个难以驾驭且充满挑战的工具，不过在整个生态系统中，这一状况正在迅速改善。\n\
  \n在下一章中，我们将转向 React Native，它利用了 React 的许多原则，以便通过 React 创建强大的原生桌面或移动应用。尽管还有其他示例（包括但不限于\
  \ Ionic 和 Electron）支持使用 JavaScript 创建原生应用，但由于 React Native 的广泛流行和采用，我们选择专注于它。\n\n\
  脚注 1 2\n\n"
- "# 18. React Native\n\nReact Native 是一个流行的框架，它利用了 React 的一些最熟悉的功能，例如其可嵌套的组件架构和 JSX\
  \ 模板系统的细微差别。然而，有几个关键区别将 React Native 与其他 JavaScript 框架区分开来。首先，由于 React Native 专注于原生应用开发，它不允许使用任何传统的\
  \ HTML 元素。\n\nReact Native 的官网对其独特的定位进行了如下描述：\n\n> *使用 React Native，你构建的并不是“移动 Web\
  \ 应用”、“HTML5 应用”或“混合应用”。你构建的是一个真正的移动应用，它与使用 Objective-C 或 Java 构建的应用无法区分。React Native\
  \ 使用了与常规 iOS 和 Android 应用相同的基本 UI 构建块。你只需使用 JavaScript 和 React 将这些构建块组合在一起。* ^((81))\n\
  \n由于我们已经对 React 有一定的了解（参见第 17 章），我们将快速转向区分 React Native 与 React 的元素，以及从 React Native\
  \ 消费者的上下文中消费 Drupal 数据的过程。\n\n### 注意\n\n有关 React Native 的更多信息，请查阅网站[`facebook.github.io/react-native`](https://facebook.github.io/react-native)。\n\
  \n## React Native 的关键概念\n\n如果你已经熟悉我们在上一章中详细介绍的关于 React 的开发方法，那么下一节将是驾轻就熟的领域。然而，React\
  \ Native 有许多特性，这些特性体现了其对原生移动应用而非传统 Web 应用的重视。\n\n\n\n### 搭建 React Native 应用框架\n\n\
  与 React 生态系统类似，React Native 也提供了一个应用脚手架工具，可加快 React Native 项目的启动过程。要安装 Expo CLI，请执行以下命令。\n\
  \n```\n$ npm install -g expo-cli\n```\n\n安装完该包之后，你可以调用 `expo` 命令在本地搭建一个新的 React\
  \ Native 项目。Expo CLI 会询问你想要一个已包含标签导航的应用，还是一个空白模板。我们选择**空白模板**作为我们的模板。\n\n```\n$\
  \ expo init DdipReactNative\n$ cd DdipReactNative\n```\n\n要启动打包器（允许我们以多种方式测试应用），请执行以下命令。\n\
  \n```\n$ expo start\n```\n\n打包器运行后，在运行打包器的终端窗口中，你可以输入 `a` 来启动一个可用的 Android 模拟器，或者输入\
  \ `i` 来启动 iOS 模拟器。在本章中，我们使用 Xcode 内置的 iOS 模拟器。你还可以使用其他命令，例如输入 `s` 将应用的 URL 发送到手机号码或电子邮件地址，或者输入\
  \ `q` 显示二维码。\n\n由于我们将再次利用 `axios` 库向 Drupal 发起请求，我们可以按如下方式将其添加到依赖项中。\n\n```\n$ yarn\
  \ add axios\n```\n\n在安装过程结束时，你的 `package.json` 清单文件应如下所示。\n\n```\n{\n\"name\": \"\
  empty-project-template\",\n\"main\": \"node_modules/expo/AppEntry.js\",\n\"private\"\
  : true,\n\"scripts\": {\n\"start\": \"expo start\",\n\"android\": \"expo start --android\"\
  ,\n\"ios\": \"expo start --ios\",\n\"eject\": \"expo eject\"\n},\n\"dependencies\"\
  : {\n\"axios\": \"⁰.18.0\",\n\"expo\": \"³⁰.0.1\",\n\"react\": \"16.3.1\",\n\"react-native\"\
  : \"https://github.com/expo/react-native/archive/sdk-30.0.0.tar.gz\"\n}\n}\n```\n\
  \n此外，你的目录结构应如下所示（不包括 `node_modules` 目录）。\n\n```\n├── App.js\n├── app.json\n├── assets\n\
  │   ├── icon.png\n│   └── splash.png\n├── package.json\n└── yarn.lock\n```\n\n完成这些步骤后，我们现在可以讨论\
  \ React 和 React Native 之间最显著的区别。\n\n### 注意\n\n有关设置 React Native 的更多信息，请查阅位于 [`https://facebook.github.io/react-native/docs/getting-started`](https://facebook.github.io/react-native/docs/getting-started)\
  \ 的文档。\n\n### React Native 视图\n\n与 React 一样，React Native 主要操作*视图*，即数据的显示。默认的 `View`\
  \ 组件是一个占据整个屏幕且不可滚动的视图。在某些场景下，由于我们预期会有大量的文本内容，我们稍后还会用到 `ScrollView` 组件。`ScrollView`\
  \ 默认可以垂直滚动，如果设置了 `horizontal` 属性（`<ScrollView horizontal/>`），也可以水平滚动。\n\n此外，我们将利用\
  \ `FlatList` 组件来提供一个文章列表。`FlatList` 组件接受两个属性：`data`（列表需要渲染的数据）和 `renderItem`（表示列表中的一项，并返回每个项目将渲染成的组件）。\n\
  \n让我们从第 17 章 React 应用的中间状态开始，调整一些初始代码以适应 React Native 的细微差别。将 `App.js` 替换为以下代码，并特别注意我们已将所有的\
  \ HTML 元素替换为了 React Native 元素。另请注意引用 React Native 的 `import` 语句。\n\n```\n// App.js\n\
  import React from 'react';\nimport { FlatList, StyleSheet, Text, View } from 'react-native';\n\
  export default class App extends React.Component {\nconstructor(props) {\nsuper(props);\n\
  this.state = {};\n}\ncomponentWillMount() {\nthis.setState({\narticles: [\n{\nid:\
  \ '3ca469da-b905-4a77-8d97-954abcdc4cf6',\nattributes: {\ntitle: 'Capto',\nuuid:\
  \ '3ca469da-b905-4a77-8d97-954abcdc4cf6',\ncreated: 1526387013,\nbody: {\nvalue:\
  \ 'Camur'\n}\n}\n},\n{\nid: '1e1a4598-f9c7-4ce7-adbd-7603401cc23b',\nattributes:\
  \ {\ntitle: 'Esse Ex Nibh Valde Valetudo',\nuuid: '1e1a4598-f9c7-4ce7-adbd-7603401cc23b',\n\
  created: 1526387013,\nbody: {\nvalue: 'Illum loquor persto plaga premo.'\n}\n}\n\
  }\n]\n});\n}\nrender() {\nreturn (\n\n item.id}\nrenderItem={({item}) => {item.attributes.title}}\n\
  />\n\n);\n}\n}\nconst styles = StyleSheet.create({\ncontainer: {\nflex: 1,\nbackgroundColor:\
  \ '#fff',\npaddingTop: 22\n},\nitem: {\npadding: 10,\nfontSize: 18,\nheight: 44,\n\
  },\n});\n```\n\n我们逐一介绍这段代码中不熟悉的部分。首先，我们的 `render()` 方法使用我们提供给状态对象的虚拟数据渲染了一个 `FlatList`\
  \ 组件。然后，我们渲染列表中的每一项。`FlatList` 的默认行为期望每个数据项中都包含一个唯一的可缓存的 `key` 键，但由于我们使用 JSON API，我们需要覆盖此行为以改用包含\
  \ UUID 的 `id` 属性。\n\n```\nrender() {\nreturn (\n\n item.id}\nrenderItem={({item})\
  \ => {item.attributes.title}}\n/>\n\n);\n}\n```\n\n最后，我们包含了几个样式对象，这些对象在 `View` 和\
  \ `FlatList` 组件中被调用。特别注意，由于传统 CSS 在 React Native 环境中不可用，我们使用了一些独特的约定，包括 CSS 属性名采用\
  \ `camelCase` 形式。\n\n```\nconst styles = StyleSheet.create({\ncontainer: {\nflex:\
  \ 1,\nbackgroundColor: '#fff',\npaddingTop: 22\n},\nitem: {\npadding: 10,\nfontSize:\
  \ 18,\nheight: 44,\n},\n});\n```\n\n在 iOS 模拟器中生成的应用程序如图 18-1 所示。\n\n![../images/468476_1_En_18_Chapter/468476_1_En_18_Fig1_HTML.jpg](img/468476_1_En_18_Fig1_HTML.jpg)\n\
  \n**图 18-1** 我们的 iOS 模拟器显示渲染到 `FlatList` 组件中的虚拟文章\n\n### 注意\n\n有关 `FlatList` 和列表视图的更多信息，请查阅位于\
  \ [`https://facebook.github.io/react-native/docs/using-a-listview`](https://facebook.github.io/react-native/docs/using-a-listview)\
  \ 的文档。\n\n### React Native 样式\n\n在继续之前，由于我们计划提供一个包含文章相关信息的文章详情组件，我们可以调整应用程序以包含一些额外的属性和增强的样式集。修改你的\
  \ `App.js` 文件，使其如下所示，并注意新增的 `ScrollView` 导入。\n\n```\n// App.js\nimport React from\
  \ 'react';\nimport { FlatList, ScrollView, StyleSheet, Text, View } from 'react-native';\n\
  export default class App extends React.Component {\nconstructor(props) {\nsuper(props);\n\
  this.state = {};\n}\ncomponentWillMount() {\nthis.setState({\narticles: [\n{\nid:\
  \ '3ca469da-b905-4a77-8d97-954abcdc4cf6',\nattributes: {\ntitle: 'Capto',\nuuid:\
  \ '3ca469da-b905-4a77-8d97-954abcdc4cf6',\ncreated: 1526387013,\nbody: {\nvalue:\
  \ 'Camur'\n}\n}\n},\n{\nid: '1e1a4598-f9c7-4ce7-adbd-7603401cc23b',\nattributes:\
  \ {\ntitle: 'Esse Ex Nibh Valde Valetudo',\nuuid: '1e1a4598-f9c7-4ce7-adbd-7603401cc23b',\n\
  created: 1526387013,\nbody: {\nvalue: 'Illum loquor persto plaga premo.'\n}\n}\n\
  }\n]\n});\n}\nrender() {\nreturn (\n\n item.id}\nrenderItem={({item}) => (\n\n{item.attributes.title}\n\
  ID: {item.id}\nCreated: {item.attributes.created}\nBody: {item.attributes.body.value}\n\
  \n)}\n/>\n\n);\n}\n}\nconst styles = StyleSheet.create({\ncontainer: {\nflex: 1,\n\
  backgroundColor: '#fff',\npaddingTop: 22,\n},\nitem: {\npadding: 10,\nbackgroundColor:\
  \ '#eee',\nborderBottomColor: '#ccc',\nborderBottomWidth: 5,\n},\nitemHeading: {\n\
  marginTop: 10,\npaddingTop: 10,\npaddingBottom: 10,\nfontSize: 24,\n},\nitemAttribute:\
  \ {\npaddingTop: 10,\npaddingBottom: 10,\n}\n});\n```\n\n这些最新更改的结果如图 18-2 所示。\n\n\
  ![../images/468476_1_En_18_Chapter/468476_1_En_18_Fig2_HTML.jpg](img/468476_1_En_18_Fig2_HTML.jpg)\n\
  \n**图 18-2** 我们的 React Native 应用现在采用了一些样式，以改善用户体验并区分各篇独立文章\n\n\n\n### 注意\n\n有关 `ScrollView`\
  \ 的更多信息，请查阅 [`https://facebook.github.io/react-native/docs/using-a-scrollview`](https://facebook.github.io/react-native/docs/using-a-scrollview)\
  \ 上的文档。有关 React Native 样式的更多信息，请查阅 [`https://facebook.github.io/react-native/docs/style`](https://facebook.github.io/react-native/docs/style)\
  \ 上的文档。\n\n### React Native 组件\n\n将所有代码放在一个文件中很快就变得难以管理。正如我们在上一章中成功所做的那样，我们也可以将列表逻辑拆分到一个单独的组件中，以保持良好的关注点分离。首先，添加以下\
  \ `Article.js` 组件。\n\n```\n// Article.js\nimport React from 'react';\nimport { StyleSheet,\
  \ Text, View } from 'react-native';\nimport PropTypes from 'prop-types';\nconst\
  \ Article = ({article}) => (\n\n{article.attributes.title}\nID: {article.id}\nCreated:\
  \ {article.attributes.created}\nBody: {article.attributes.body.value}\n\n);\nArticle.propTypes\
  \ = {\narticle: PropTypes.object\n};\nconst styles = StyleSheet.create({\nitem:\
  \ {\npadding: 10,\nbackgroundColor: '#eee',\nborderBottomColor: '#ccc',\nborderBottomWidth:\
  \ 5,\n},\nitemHeading: {\nmarginTop: 10,\npaddingTop: 10,\npaddingBottom: 10,\n\
  fontSize: 24,\n},\nitemAttribute: {\npaddingTop: 10,\npaddingBottom: 10,\n}\n});\n\
  export default Article;\n```\n\n然后，我们可以调整 `App.js` 文件以反映新组件的存在。请特别注意声明对该组件依赖的 `import`\
  \ 语句。\n\n```\n// App.js\nimport React from 'react';\nimport { FlatList, ScrollView,\
  \ StyleSheet, Text, View } from 'react-native';\nimport Article from './Article.js';\n\
  export default class App extends React.Component {\nconstructor(props) {\nsuper(props);\n\
  this.state = {};\n}\ncomponentWillMount() {\nthis.setState({\narticles: [\n{\nid:\
  \ '3ca469da-b905-4a77-8d97-954abcdc4cf6',\nattributes: {\ntitle: 'Capto',\nuuid:\
  \ '3ca469da-b905-4a77-8d97-954abcdc4cf6',\ncreated: 1526387013,\nbody: {\nvalue:\
  \ 'Camur'\n}\n}\n},\n{\nid: '1e1a4598-f9c7-4ce7-adbd-7603401cc23b',\nattributes:\
  \ {\ntitle: 'Esse Ex Nibh Valde Valetudo',\nuuid: '1e1a4598-f9c7-4ce7-adbd-7603401cc23b',\n\
  created: 1526387013,\nbody: {\nvalue: 'Illum loquor persto plaga premo.'\n}\n}\n\
  }\n]\n});\n}\nrender() {\nreturn (\n\n item.id}\nrenderItem={({item}) => (\n\n)}\n\
  />\n\n);\n}\n}\nconst styles = StyleSheet.create({\ncontainer: {\nflex: 1,\nbackgroundColor:\
  \ '#fff',\npaddingTop: 22,\n},\n});\n```\n\n重新加载应用程序后，应该不会看到与图 18-2 有任何变化，因为我们只是移动了代码。\n\
  \n### 注意\n\n有关 React Native 中原生组件的更多信息，请查阅 [`https://facebook.github.io/react-native/docs/components-and-apis`](https://facebook.github.io/react-native/docs/components-and-apis)\
  \ 上的文档。React Native 中的堆栈导航（类似于 React 路由）因其相对不稳定性而超出了本章的范围，但其文档可在 [`https://reactnavigation.org`](https://reactnavigation.org)\
  \ 上找到。\n\n## 使用 Drupal 和 JSON API 作为 React Native 的后端\n\n我们将使用一个现有的 Drupal 站点作为\
  \ React Native 应用程序的后端，该站点公开了我们在第 8 章和第 12 章中配置和构建的 JSON API。如果你没有一个功能完备、启用了 JSON\
  \ API 并填充了一些内容的 Drupal 站点，请返回第 8 章和第 12 章，以全面了解 Drupal 的 JSON API 实现。\n\n### 使用\
  \ `axios` 检索 Drupal 数据\n\n就像我们在第 17 章中所做的那样，我们可以使用 `axios` 将我们的虚拟数据替换为来自 Drupal\
  \ 的实际数据。考虑以下 `App.js` 的新状态，其结果如图 18-3 所示。\n\n![../images/468476_1_En_18_Chapter/468476_1_En_18_Fig3_HTML.jpg](img/468476_1_En_18_Fig3_HTML.jpg)\n\
  \n图 18-3\n\n完整的文章正文表明，我们的文章已按预期正确地从 Drupal 站点获取\n\n```\n// App.js\nimport React\
  \ from 'react';\nimport { FlatList, ScrollView, StyleSheet, Text, View } from 'react-native';\n\
  import axios from 'axios';\nimport Article from './Article.js';\nexport default\
  \ class App extends React.Component {\nconstructor(props) {\nsuper(props);\nthis.state\
  \ = {};\n}\ncomponentWillMount() {\naxios.get('http://jsonapi-test.dd:8083/jsonapi/node/article')\n\
  .then(res => this.setState({ articles: res.data.data }))\n.catch(console.log);\n\
  }\nrender() {\nreturn (\n\n item.id}\nrenderItem={({item}) => (\n\n)}\n/>\n\n);\n\
  }\n}\nconst styles = StyleSheet.create({\ncontainer: {\nflex: 1,\nbackgroundColor:\
  \ '#fff',\npaddingTop: 22,\n},\n});\n```\n\n### 注意\n\n有关 React Native 中网络功能的更多信息，请查阅\
  \ [`https://facebook.github.io/react-native/docs/network`](https://facebook.github.io/react-native/docs/network)\
  \ 上的文档。有关 `axios` 的更多信息，请查阅 [`https://github.com/axios/axios`](https://github.com/axios/axios)\
  \ 上的文档。\n\n### 处理错误和加载状态\n\n与 Web 应用程序的常见情况一样，向用户指示数据视图尚未渲染的不同场景对我们来说很重要。幸运的是，我们只需重复在第\
  \ 17 章中的工作，即可为我们的 React Native 应用程序提供 `errored`（错误）和 `loading`（加载）状态。请考虑以下 `App.js`\
  \ 的新状态。\n\n```\n// App.js\nimport React from 'react';\nimport { FlatList, ScrollView,\
  \ StyleSheet, Text, View } from 'react-native';\nimport axios from 'axios';\nimport\
  \ Article from './Article.js';\nexport default class App extends React.Component\
  \ {\nconstructor(props) {\nsuper(props);\nthis.state = {\narticles: [],\nerrored:\
  \ false,\nloading: true\n};\n}\ncomponentWillMount() {\naxios.get('http://jsonapi-test.dd:8083/jsonapi/node/article')\n\
  .then(res => this.setState({ articles: res.data.data }))\n.catch(err => {\nconsole.log(err);\n\
  this.setState({ errored: true });\n})\n.finally(() => this.setState({ loading: false\
  \ }));\n}\nrender() {\nreturn (\n\n{this.state.errored ? (\n抱歉，当前无法获取此信息。\n) : (\n\
  \n{this.state.loading ? (\n加载中...\n) : (\n item.id}\nrenderItem={({item}) => (\n\
  \n)}\n/>\n\n)}\n)}\n\n);\n}\n}\nconst styles = StyleSheet.create({\ncontainer: {\n\
  flex: 1,\nbackgroundColor: '#fff',\npaddingTop: 22,\n},\n});\n```\n\n现在，我们可以断开 Drupal\
  \ 网站的连接，会发现我们的应用程序不会返回网络错误，而是会显示错误消息，如图 18-4 所示。此外，我们还会看到一个加载状态，它会反馈我们的应用程序确实在正常运行，如图\
  \ 18-5 所示。\n\n![../images/468476_1_En_18_Chapter/468476_1_En_18_Fig5_HTML.jpg](img/468476_1_En_18_Fig5_HTML.jpg)\n\
  \n图 18-5\n\n当我们首次加载应用程序时，请求正在处理中，应用程序会显示加载信息\n\n![../images/468476_1_En_18_Chapter/468476_1_En_18_Fig4_HTML.jpg](img/468476_1_En_18_Fig4_HTML.jpg)\n\
  \n图 18-4\n\n当我们断开 Drupal 站点连接时，请求未能完成，应用程序会显示错误信息\n\n\n\n### 结论\n\nReact Native\
  \ 是一种强大且稳健的替代方案，可用于替代使用 Objective-C 和 Swift 等移动技术编写原生移动应用，因为它使我们能够沿用已熟悉的 **React**\
  \ 约定。得益于这两种技术的相似性，熟悉 React 的开发人员可以相对快速地开始构建 React Native 应用。尽管如此，React Native 的生态系统仍在扩展，诸如\
  \ React Navigation 等工具也在迅速成熟。\n\n在下一章中，我们将研究 **Angular**，这是一个完全不同的框架，拥有许多独特特性，使其既引人入胜又时而令人沮丧。尽管在有限的篇幅内无法全面介绍\
  \ TypeScript 及其细微差别，也无法对 Angular 进行详尽综述，但我们仍将构建一个由解耦 Drupal 支持的等效 Angular 应用。\n\n\
  脚注 1\n\n"
- "# 19. Angular\n\nAngular 是一个有着悠久历史的 JavaScript 框架，但在过去几年中经历了重大演变，以至于与其前身 AngularJS\
  \ 相比几乎面目全非。如今，Angular 利用 TypeScript，并强调其使命是成为一个统一的框架，用于构建跨越 Web、移动端以及原生移动和桌面应用的应用体验。\n\
  \nAngular 文档说明如下：\n\n> Angular 是一个平台，可以轻松地使用 Web 构建应用。Angular 结合了声明式模板、依赖注入、端到端工具以及集成的最佳实践，以解决开发挑战。Angular\
  \ 使开发者能够构建适用于 Web、移动端或桌面的应用。\n\n与 Ember（参见第 21 章）一样，Angular 以其相当固执己见的开发实践而闻名，最明显的证据是它要求开发者使用\
  \ TypeScript。尽管如此，其丰富的生态系统，加上其跨设备能力，使得 Angular 成为那些为解耦 Drupal 架构选择 JavaScript 技术的人的一个有吸引力的候选方案。\n\
  \n### 注意\n\n有关 Angular 的完整文档，请参阅 Angular 网站：[`https://angular.io`](https://angular.io)。\n\
  \n## Angular 中的关键概念\n\n由于 Angular 使用 TypeScript，为你的代码编辑器安装一个能识别 TypeScript 语法的包可能会很有用。如果你使用\
  \ Atom 作为代码编辑器，可以通过以下命令为 Atom 安装 TypeScript 包。\n\n```\n$ apm install atom-typescript\n\
  ```\n\n### 注意\n\nAtom 代码编辑器可从 [`https://atom.io`](https://atom.io) 下载。\n\n### 搭建\
  \ Angular 应用脚手架\n\n与 Ember 和 Vue.js（参见第 20 章）一样，Angular 有一个官方命令行界面，称为 Angular CLI，可简化\
  \ Angular 开发过程中的某些任务。要全局安装 Angular CLI，请执行以下命令。\n\n```\n$ npm install -g @angular/cli\n\
  ```\n\nAngular CLI 以及任何由 Angular CLI 生成的项目都需要 Node 8.9 或更高版本以及 NPM 5.5.1 或更高版本。你可以分别使用\
  \ `node -v` 和 `npm -v` 命令来验证你的版本是否是最新的。\n\n### 注意\n\n有关安装 Node.js 的更多信息，请查阅网站 [`https://nodejs.org/en/download`](https://nodejs.org/en/download)。有关安装\
  \ NPM 的更多信息，请查阅网站 [`https://docs.npmjs.com/getting-started/installing-node#install-npm--manage-npm-versions`](https://docs.npmjs.com/getting-started/installing-node%2523install-npm%252D%252Dmanage-npm-versions)。如果你有其他项目依赖于其他版本的\
  \ Node，请考虑使用诸如 Node Version Manager 之类的工具，该工具可在 GitHub 上获取：[`https://github.com/creationix/nvm`](https://github.com/creationix/nvm)。\n\
  \n我们可以使用以下命令创建一个新项目，并启动一个带有热重载功能的本地开发服务器。按顺序，以下命令会在我们选择的目录中搭建一个新的 Angular 应用，进入该目录，并启动一个本地服务器。`--open`\
  \ 标志将在浏览器中打开一个包含该应用的标签页。\n\n```\n$ ng new ddip-ng\n$ cd ddip-ng\n$ ng serve --open\n\
  ```\n\n一旦搭建好一个新的 Angular 应用，你的目录结构将如下所示（不包括 `node_modules` 目录）。\n\n```\n├── README.md\n\
  ├── angular.json\n├── e2e\n│   ├── protractor.conf.js\n│   ├── src\n│   │   ├──\
  \ app.e2e-spec.ts\n│   │   └── app.po.ts\n│   └── tsconfig.e2e.json\n├── package-lock.json\n\
  ├── package.json\n├── src\n│   ├── app\n│   │   ├── app.component.css\n│   │   ├──\
  \ app.component.html\n│   │   ├── app.component.spec.ts\n│   │   ├── app.component.ts\n\
  │   │   └── app.module.ts\n│   ├── assets\n│   ├── browserslist\n│   ├── environments\n\
  │   │   ├── environment.prod.ts\n│   │   └── environment.ts\n│   ├── favicon.ico\n\
  │   ├── index.html\n│   ├── karma.conf.js\n│   ├── main.ts\n│   ├── polyfills.ts\n\
  │   ├── styles.css\n│   ├── test.ts\n│   ├── tsconfig.app.json\n│   ├── tsconfig.spec.json\n\
  │   └── tslint.json\n├── tsconfig.json\n└── tslint.json\n```\n\n现在，我们可以使用 Atom 打开该应用并开始编写代码。^(⁸²)\
  \ 你也可以使用你选择的、包含 TypeScript 支持的代码编辑器。\n\n```\n$ atom .\n```\n\n### 根组件\n\n与其他流行的\
  \ JavaScript 应用框架一样，Angular 使用可重用且可嵌套的组件，包括应用根组件。当我们打开 `src/app/app.component.ts`\
  \ 时，我们会看到我们可以更改应用的总体标题。\n\n```\n// src/app/app.component.ts\nimport { Component\
  \ } from '@angular/core';\n@Component({\nselector: 'app-root',\ntemplateUrl: './app.component.html',\n\
  styleUrls: ['./app.component.css']\n})\nexport class AppComponent {\ntitle = 'ddip-ng';\n\
  }\n```\n\n在本章中，我们将构建一个能够访问 Drupal 中内容实体的简单内容浏览器。为此，由于 TypeScript 是一种静态类型语言，我们需要定义一个与\
  \ Drupal bundle（Drupal 内容类型）匹配的类，并考虑其属性的类型，如下例所示。\n\n在我们将 Angular 应用连接到 Drupal 之前，我们将暂时使用虚拟数据。\n\
  \n```\n// src/app/app.component.ts\nimport { Component } from '@angular/core';\n\
  export class Article {\nattributes: object;\n}\n@Component({\nselector: 'app-root',\n\
  templateUrl: './app.component.html',\nstyleUrls: ['./app.component.css']\n})\nexport\
  \ class AppComponent {\ntitle = 'ddip-ng';\narticle: Article = {\nattributes: {\n\
  uuid: '7ac282af-81d1-4d88-925d-9a3a9f6d304f',\ntitle: 'Neque Nisl',\nbody: {\nvalue:\
  \ 'At interdico letalis modo qui.'\n}\n}\n}\n}\n```\n\n\n\n### 双向数据绑定\n\n我们还可以修改根组件，使其显示一篇虚拟文章并附带一个\
  \ `<input>` 元素，以演示*双向数据绑定*。在此场景中，`ngModel` 是一个指令，我们需要通过在 `FormsModule` 上声明额外的依赖来添加它，如下方\
  \ `app.module.ts` 中所示。\n\n```\n// src/app/app.module.ts\nimport { BrowserModule\
  \ } from '@angular/platform-browser';\nimport { NgModule } from '@angular/core';\n\
  import { FormsModule } from '@angular/forms';\nimport { AppComponent } from './app.component';\n\
  @NgModule({\ndeclarations: [\nAppComponent\n],\nimports: [\nBrowserModule,\nFormsModule\n\
  ],\nproviders: [],\nbootstrap: [AppComponent]\n})\nexport class AppModule { }\n\
  ```\n\n现在，将 `app.component.html` 的内容替换为以下内容。\n\n```\n{{title}}\n{{article.attributes.title}}\
  \ details\nTitle: \n```\n\n由于 Angular 强制执行双向数据绑定，我们可以编辑此 `<input>` 元素，并看到标题随之更新。您可以在图\
  \ 19-1 中看到应用程序的当前状态。\n\n![../images/468476_1_En_19_Chapter/468476_1_En_19_Fig1_HTML.jpg](img/468476_1_En_19_Fig1_HTML.jpg)\n\
  \n图 19-1\n\n当我们在 `<input>` 元素中进行编辑时，双向数据绑定确保值会立即更新。\n\n### 注意\n\n有关 Angular 表单的更多信息，请查阅文档\
  \ [`https://angular.io/guide/user-input`](https://angular.io/guide/user-input)。从这个示例开始，本章中的许多示例都灵感来源于\
  \ Angular 文档中的“英雄之旅”教程，该教程位于 [`https://angular.io/tutorial`](https://angular.io/tutorial)。\n\
  \n### Angular 组件\n\n为了获得更好的可维护性，我们可以生成一个组件来容纳所有处理文章显示的逻辑。要生成新组件，请在退出运行中的服务器（按 Ctrl+C）或打开新的终端窗口后，执行以下命令。\n\
  \n```\n$ ng generate component articles\n```\n\n如果您导航到 `src/app/app.module.ts`，您将看到\
  \ Angular 已使用对新组件的引用更新了根模块。\n\n```\n// src/app/app.module.ts\nimport { BrowserModule\
  \ } from '@angular/platform-browser';\nimport { NgModule } from '@angular/core';\n\
  import { FormsModule } from '@angular/forms';\nimport { AppComponent } from './app.component';\n\
  import { ArticlesComponent } from './articles/articles.component';\n@NgModule({\n\
  declarations: [\nAppComponent,\nArticlesComponent\n],\nimports: [\nBrowserModule,\n\
  FormsModule\n],\nproviders: [],\nbootstrap: [AppComponent]\n})\nexport class AppModule\
  \ { }\n```\n\n现在，在我们的根组件中，我们可以引用刚刚创建的新组件，并将所有逻辑移到文章组件中。请注意，此示例被分成两个独立的文件，由 HTML\
  \ 注释分隔。\n\n```\n{{title}}\n{{article.attributes.title}} details\nTitle: \n```\n\n\
  我们还需要相应地更新根组件和文章组件的行为。\n\n```\n// src/app/articles/articles.component.ts\nimport\
  \ { Component } from '@angular/core';\nexport class Article {\nattributes: object\n\
  }\n@Component({\nselector: 'app-articles',\ntemplateUrl: './articles.component.html',\n\
  styleUrls: ['./articles.component.css']\n})\nexport class ArticlesComponent {\n\
  title = 'ddip-ng';\narticle: Article = {\nattributes: {\nuuid: '7ac282af-81d1-4d88-925d-9a3a9f6d304f',\n\
  title: 'Neque Nisl',\nbody: {\nvalue: 'At interdico letalis modo qui.'\n}\n}\n}\n\
  }\n// src/app/app.component.ts\nimport { Component } from '@angular/core';\n@Component({\n\
  selector: 'app-root',\ntemplateUrl: './app.component.html',\nstyleUrls: ['./app.component.css']\n\
  })\nexport class AppComponent {\ntitle = 'ddip-ng';\n}\n```\n\n让我们提供一些虚拟数据作为常量，以便我们能够遍历多篇文章。为此，我们创建一个组件可访问的公共属性，如下例所示。\n\
  \n```\n// src/app/articles/articles.component.ts\nimport { Component } from '@angular/core';\n\
  export class Article {\nattributes: object;\n}\nconst ARTICLES: Article[] = [\n\
  {\nattributes: {\nuuid: '7ac282af-81d1-4d88-925d-9a3a9f6d304f',\ntitle: 'Neque Nisl',\n\
  body: {\nvalue: 'At interdico letalis modo qui.'\n}\n}\n},\n{\nattributes: {\nuuid:\
  \ 'dfca8a65-a214-470c-ae39-6e7c1ab9c87f',\ntitle: 'Aptent Immitto',\nbody: {\nvalue:\
  \ 'Exputo molior nobis patria quadrum saepius valde.'\n}\n}\n},\n{\nattributes:\
  \ {\nuuid: 'df334ec5-216f-487e-8aa5-29a9224acb8f',\ntitle: 'In Interdico Nibh Nisl\
  \ Utinam',\nbody: {\nvalue: 'Cui refoveo similis.'\n}\n}\n}\n];\n@Component({\n\
  selector: 'app-articles',\ntemplateUrl: './articles.component.html',\nstyleUrls:\
  \ ['./articles.component.css']\n})\nexport class ArticlesComponent {\ntitle = 'ddip-ng';\n\
  articles = ARTICLES;\n}\n```\n\n### 注意\n\n有关 Angular 组件的更多信息，请查阅文档 [`https://angular.io/guide/architecture-components`](https://angular.io/guide/architecture-components)。\n\
  \n\n\n### Angular 指令\n\n在 Angular 中，`指令`用于指示渲染模板时开发者所期望的逻辑。我们也可以创建自定义指令，以对 DOM 元素施加自定义行为。\n\
  \n我们可以深入 articles 组件，通过提供一个文章列表（而不是一个用于编辑文章标题的字段）来丰富模板。我们可以使用 `ngFor` 指令来遍历刚刚提供给组件的虚拟文章。最终，我们将允许用户在选中某篇具体文章时编辑其标题。\n\
  \n```\n文章列表\n\n文章 {{article.attributes.uuid}}：{{article.attributes.title}}\n\n```\n\
  \n其结果如图 19-2 所示。\n\n![../images/468476_1_En_19_Chapter/468476_1_En_19_Fig2_HTML.jpg](img/468476_1_En_19_Fig2_HTML.jpg)\n\
  \n图 19-2\n\n我们的虚拟文章正确显示了\n\n为了恢复编辑文章标题的功能，我们将提供点击行为。当点击一篇文章时，我们需要显示之前演示过双向数据绑定的表单。为此，我们可以为每个列表项添加一个\
  \ `click` 事件绑定。\n\n```\n文章列表\n\n文章 {{article.attributes.uuid}}：{{article.attributes.title}}\n\
  \n```\n\n我们在 `articles.component.ts` 中定义了 `onSelect()` 方法，如下例所示。\n\n```\n// src/app/articles/articles.component.ts\n\
  import { Component } from '@angular/core';\nexport class Article {\nattributes:\
  \ object;\n}\nconst ARTICLES: Article[] = [\n{\nattributes: {\nuuid: '7ac282af-81d1-4d88-925d-9a3a9f6d304f',\n\
  title: 'Neque Nisl',\nbody: {\nvalue: 'At interdico letalis modo qui.'\n}\n}\n},\n\
  {\nattributes: {\nuuid: 'dfca8a65-a214-470c-ae39-6e7c1ab9c87f',\ntitle: 'Aptent\
  \ Immitto',\nbody: {\nvalue: 'Exputo molior nobis patria quadrum saepius valde.'\n\
  }\n}\n},\n{\nattributes: {\nuuid: 'df334ec5-216f-487e-8aa5-29a9224acb8f',\ntitle:\
  \ 'In Interdico Nibh Nisl Utinam',\nbody: {\nvalue: 'Cui refoveo similis.'\n}\n\
  }\n}\n];\n@Component({\nselector: 'app-articles',\ntemplateUrl: './articles.component.html',\n\
  styleUrls: ['./articles.component.css']\n})\nexport class ArticlesComponent {\n\
  title = 'ddip-ng';\narticles = ARTICLES;\nselectedArticle: Article;\nonSelect(article:\
  \ Article): void {\nthis.selectedArticle = article;\n}\n}\n```\n\n然后，在模板中，我们可以重新插入之前缺失的逻辑，并绑定到我们新定义的\
  \ `selectedArticle` 属性，而不是 `article` 属性。为了更容易识别选中的文章，我们还包含了 UUID。最后，我们可以使用 `ngIf`\
  \ 指令来确保不会因尝试引用尚未选中的文章标题而抛出任何错误。本例的结果如图 19-3 所示。\n\n![../images/468476_1_En_19_Chapter/468476_1_En_19_Fig3_HTML.jpg](img/468476_1_En_19_Fig3_HTML.jpg)\n\
  \n图 19-3\n\n在此示例中，我们点击了列表中的第三篇文章并编辑了标题，这会更新在其上方渲染的绑定属性\n\n```\n文章列表\n\n文章 {{article.attributes.uuid}}：{{article.attributes.title}}\n\
  \n{{selectedArticle.attributes.title}} 详情 ({{selectedArticle.attributes.uuid}})\n\
  \n标题：\n\n```\n\n将来，我们可能希望对这篇文章应用某些样式，以便其活动状态清晰可见。将 `articles.component.html` 更新如下。\n\
  \n```\n文章列表\n\n文章 {{article.attributes.uuid}}：{{article.attributes.title}}\n\n{{selectedArticle.attributes.title}}\
  \ 详情 ({{selectedArticle.attributes.uuid}})\n\n标题：\n\n```\n\n然后，将以下选择器添加到 `articles.component.css`\
  \ 中，以便区分选中的文章。其结果如图 19-4 所示。\n\n![../images/468476_1_En_19_Chapter/468476_1_En_19_Fig4_HTML.jpg](img/468476_1_En_19_Fig4_HTML.jpg)\n\
  \n图 19-4\n\n得益于少量 CSS，现在从列表中哪篇文章被选中一目了然\n\n```\n/* src/app/articles.component.css\
  \ */\n.selected {\nfont-weight: bold;\ncolor: green;\n}\n```\n\n### 注意\n\n有关 Angular\
  \ 指令的更多信息，请查阅关于属性型指令的文档（[`https://angular.io/guide/attribute-directives`](https://angular.io/guide/attribute-directives)）和关于结构型指令的文档（[`https://angular.io/guide/structural-directives`](https://angular.io/guide/structural-directives)）。\n\
  \n\n\n### Angular 服务\n\n现在我们已经介绍了组件的一些细节（全面探讨超出了本书的范围），可以将注意力转向服务了。正如我们在 Ember 中也将看到的那样（见第\
  \ 21 章），让组件同时充当数据提供者并不是最佳实践，因为我们最终期望将应用程序连接到 Web 服务。在 Angular 中，*服务*是一个广泛的概念，代表应用程序中的依赖项——无论是值、函数还是其他特性——并且通常服务于单一、明确的目的。\n\
  \n因此，我们应该提供一个服务，为任何依赖它的组件提供数据。这意味着我们可以将数据与单个组件解耦，并提供一种通用的数据检索方式。例如，在我们的场景中，我们希望创建一个为组件提供文章数据的服务。要生成新服务，请执行以下命令。\n\
  \n```\n$ ng generate service article\n```\n\n这会在我们的 `src/app` 目录中创建一个 `article.service.ts`\
  \ 文件。因为我们知道最终需要从 Web 服务检索文章，所以可以添加一个 `getArticles()` 方法。\n\n```typescript\n// src/app/article.service.ts\n\
  import { Injectable } from '@angular/core';\n@Injectable({\nprovidedIn: 'root'\n\
  })\nexport class ArticleService {\ngetArticles(): void {}\n}\n```\n\n然后，我们可以从文章组件中移除模拟文章，并将其放入一个单独的文件中。这样做是为了让我们的服务更容易检索文章。创建\
  \ `dummy-articles.ts` 并插入以下内容。\n\n```typescript\n// src/app/dummy-articles.ts\n\
  import { Article } from './articles/articles.component';\nexport const ARTICLES:\
  \ Article[] = [\n{\nattributes: {\nuuid: '7ac282af-81d1-4d88-925d-9a3a9f6d304f',\n\
  title: 'Neque Nisl',\nbody: {\nvalue: 'At interdico letalis modo qui.'\n}\n}\n},\n\
  {\nattributes: {\nuuid: 'dfca8a65-a214-470c-ae39-6e7c1ab9c87f',\ntitle: 'Aptent\
  \ Immitto',\nbody: {\nvalue: 'Exputo molior nobis patria quadrum saepius valde.'\n\
  }\n}\n},\n{\nattributes: {\nuuid: 'df334ec5-216f-487e-8aa5-29a9224acb8f',\ntitle:\
  \ 'In Interdico Nibh Nisl Utinam',\nbody: {\nvalue: 'Cui refoveo similis.'\n}\n\
  }\n}\n];\n```\n\n在从文章组件导出的部分中，我们移除了包含模拟数据的常量，并向 Angular 指明 `articles` 属性由一组文章构成。\n\
  \n```typescript\n// src/app/articles/articles.component.ts\nimport { Component }\
  \ from '@angular/core';\nexport class Article {\nattributes: object;\n}\n@Component({\n\
  selector: 'app-articles',\ntemplateUrl: './articles.component.html',\nstyleUrls:\
  \ ['./articles.component.css']\n})\nexport class ArticlesComponent {\ntitle = 'ddip-ng';\n\
  articles: Article[];\nselectedArticle: Article;\nonSelect(article: Article): void\
  \ {\nthis.selectedArticle = article;\n}\n}\n```\n\n然后，我们可以调整文章服务，使其改用模拟文章。\n\n```typescript\n\
  // src/app/article.service.ts\nimport { Injectable } from '@angular/core';\nimport\
  \ { Article } from './articles/articles.component'\nimport { ARTICLES } from './dummy-articles';\n\
  @Injectable({\nprovidedIn: 'root'\n})\nexport class ArticleService {\ngetArticles():\
  \ Article[] {\nreturn ARTICLES;\n}\n}\n```\n\n在文章组件中，我们通过 `import` 语句将服务添加为依赖项，使用依赖注入添加一个私有的\
  \ `articleService` 属性，并通过构造函数将该属性标记为 `ArticleService` 的注入目标。然后，我们将 `ArticleService`\
  \ 添加到 `@Component` 装饰器底部的 `providers` 数组中，以确保 Angular 知道每次初始化新文章组件时都要创建一个新的 `ArticleService`。最后，我们可以通过向导出部分添加\
  \ `getArticles()` 方法来添加一个专门用于检索文章的方法。\n\n```typescript\n// src/app/articles/articles.component.ts\n\
  import { Component } from '@angular/core';\nimport { ArticleService } from '../article.service'\n\
  export class Article {\nattributes: object;\n}\n@Component({\nselector: 'app-articles',\n\
  templateUrl: './articles.component.html',\nstyleUrls: ['./articles.component.css'],\n\
  providers: [ArticleService]\n})\nexport class ArticlesComponent {\ntitle = 'ddip-ng';\n\
  articles: Article[];\nselectedArticle: Article;\nconstructor(private articleService:\
  \ ArticleService) { }\ngetArticles(): void {\nthis.articles = this.articleService.getArticles();\n\
  }\nonSelect(article: Article): void {\nthis.selectedArticle = article;\n}\n}\n```\n\
  \n为了确保 Angular 在初始化时立即调用 `getArticles()`，我们将该方法包含在 `ngOnInit()` 生命周期钩子中。请注意，在下面的示例中，我们还包含了\
  \ `OnInit` 作为依赖项，并在 `export` 语句中注明文章组件实现了 `OnInit`。\n\n```typescript\n// src/app/articles/articles.component.ts\n\
  import { Component, OnInit } from '@angular/core';\nimport { ArticleService } from\
  \ '../article.service'\nexport class Article {\nattributes: object;\n}\n@Component({\n\
  selector: 'app-articles',\ntemplateUrl: './articles.component.html',\nstyleUrls:\
  \ ['./articles.component.css'],\nproviders: [ArticleService]\n})\nexport class ArticlesComponent\
  \ implements OnInit {\ntitle = 'ddip-ng';\narticles: Article[];\nselectedArticle:\
  \ Article;\nconstructor(private articleService: ArticleService) { }\ngetArticles():\
  \ void {\nthis.articles = this.articleService.getArticles();\n}\nngOnInit(): void\
  \ {\nthis.getArticles();\n}\nonSelect(article: Article): void {\nthis.selectedArticle\
  \ = article;\n}\n}\n```\n\n### 注意\n有关 Angular 服务的更多信息，请查阅文档 [`https://angular.io/guide/architecture-services`](https://angular.io/guide/architecture-services)。\n\
  \n## 使用 Drupal 和 JSON API 作为 Angular 的后端\n\n现在我们已经为 Angular 应用提供了一个服务来从模拟数据集中检索数据，接下来需要准备\
  \ Angular 应用以使用 Drupal 实现的 JSON API。为此，我们需要重构文章服务中的 `getArticles()` 方法，使其能够处理可观察对象。\n\
  \n如果您还没有按照第 8 章和第 12 章所述设置并准备好 Drupal 中的 JSON API 后端，请返回这些章节以确保您能够继续。\n\n### 为 Angular\
  \ 添加 `HttpClient`\n\n我们现在需要将文章服务指向我们的 Drupal JSON API 实现，以便直接从后端检索数据。首先，在应用模块中包含\
  \ `HttpClientModule`，如下所示。请仔细检查新的 `import` 语句以及 `imports` 数组中新增的成员。\n\n```typescript\n\
  // src/app/app.module.ts\nimport { BrowserModule } from '@angular/platform-browser';\n\
  import { NgModule } from '@angular/core';\nimport { FormsModule } from '@angular/forms';\n\
  import { HttpClientModule } from '@angular/common/http';\nimport { AppComponent\
  \ } from './app.component';\nimport { ArticlesComponent } from './articles/articles.component';\n\
  @NgModule({\ndeclarations: [\nAppComponent,\nArticlesComponent\n],\nimports: [\n\
  BrowserModule,\nFormsModule,\nHttpClientModule\n],\nproviders: [],\nbootstrap: [AppComponent]\n\
  })\nexport class AppModule { }\n```\n\n### 注意\n有关 `HttpClient` 的更多信息，请查阅文档 [`https://angular.io/guide/http`](https://angular.io/guide/http)。\n\
  \n\n\n### 从 Drupal 检索数据并处理 Observable\n\n现在我们已经有了所需的依赖项，包括 `HttpClientModule` 中提供的\
  \ `HttpClient` 和 `HttpHeaders`，我们可以更新文章服务，以从之前准备好的 Drupal JSON API 实现中检索所需数据。\n\n\
  考虑以下示例，特别注意我们引入的其他用于处理 Observable 和错误的依赖项。注意，由于不同环境的差异，最佳实践是将指向 Drupal 后端的 URI 存储在一个单独的配置文件（例如\
  \ `config.ts`）中。\n\n```\n// src/app/article.service.ts\nimport { Injectable } from\
  \ '@angular/core';\nimport { HttpClient, HttpHeaders } from '@angular/common/http';\n\
  import { Observable, of } from 'rxjs';\nimport { catchError, map } from 'rxjs/operators';\n\
  import { Article } from './articles/articles.component'\nconst httpOptions = {\n\
  headers: new HttpHeaders({ 'Content-Type': 'application/json' })\n}\n@Injectable({\n\
  providedIn: 'root'\n})\nexport class ArticleService {\nprivate articlesUrl = 'http://jsonapi-test.dd:8083/jsonapi/node/article';\n\
  constructor(private http: HttpClient) {}\ngetArticles(): Observable {\nreturn this.http.get(this.articlesUrl,\
  \ httpOptions)\n.pipe(\nmap(res => res['data'])\n)\n.pipe(\ncatchError(this.handleError([]))\n\
  );\n}\nprivate handleError (result?: T) {\nreturn (error: any): Observable => {\n\
  console.error(error);\nreturn of(result as T);\n}\n}\n}\n```\n\n从 Drupal 的角度仔细审视其中一些元素会有所启发。注意，由于\
  \ JSON API 要求一个值为 `application/json` 的 `Content-Type` 头，我们除了导入 `HttpClient` 外，还导入了\
  \ `HttpHeaders`。接着，我们设置了请求应发往的 URL。然后，我们定义了方法 `getArticles()`，它返回一个 Observable，每当其中包含的文章发生变化时，该\
  \ Observable 就会通知我们。\n\n由于 JSON API 将所有数据作为 `data` 对象的一部分返回，而不是作为简单的数组（更多内容请参见第\
  \ 8 章），因此我们需要使用 `map()` 函数将响应映射到其构成的 `data` 对象，以便访问其下的资源数组。最后，我们执行了一些基本的错误处理，并将抛出的任何错误记录到控制台。\n\
  \n### 注意\n\n有关 Observable 的更多信息，请查阅文档 [`https://angular.io/guide/observables`](https://angular.io/guide/observables)。有关\
  \ Angular 中 Observable 的更多信息，请查阅文档 [`https://angular.io/guide/observables-in-angular`](https://angular.io/guide/observables-in-angular)。\n\
  \n### 在组件中订阅 Observable\n\n由于我们现在已更新文章服务，使其使用从 JSON API 检索的数据填充的 Observable，而不是一个虚拟常量，因此我们的最后一步是修改文章组件，使其正确处理来自文章服务的\
  \ Observable。将你的文章组件更新为以下内容。\n\n```\n// src/app/articles/articles.component.ts\n\
  import { Component, OnInit } from '@angular/core';\nimport { ArticleService } from\
  \ '../article.service'\nexport class Article {\nattributes: object;\n}\n@Component({\n\
  selector: 'app-articles',\ntemplateUrl: './articles.component.html',\nstyleUrls:\
  \ ['./articles.component.css'],\nproviders: [ArticleService]\n})\nexport class ArticlesComponent\
  \ implements OnInit {\ntitle = 'ddip-ng';\narticles: Article[];\nselectedArticle:\
  \ Article;\nconstructor(private articleService: ArticleService) { }\ngetArticles():\
  \ void {\nthis.articleService.getArticles()\n.subscribe(articles => this.articles\
  \ = articles);\n}\nngOnInit(): void {\nthis.getArticles();\n}\nonSelect(article:\
  \ Article): void {\nthis.selectedArticle = article;\n}\n}\n```\n\n如你所见，现在我们在订阅 Observable，以便在应用程序需要了解的任何数据发生变化时得到通知。接着，我们向\
  \ `subscribe()` 方法传入一个 observer（观察者），它负责处理我们收到的通知。\n\n当我们回到浏览器中的应用程序时，可以看到它现在已完全填充了来自\
  \ JSON API 的文章，而不是我们的虚拟列表，并且当我们点击显示的文章之一时，表单仍然按预期显示。这个最终状态如图 19-5 所示。\n\n![../images/468476_1_En_19_Chapter/468476_1_En_19_Fig5_HTML.jpg](img/468476_1_En_19_Fig5_HTML.jpg)\n\
  \n**图 19-5** 我们由 Angular 驱动的内容浏览器的最终状态，使用了直接从 Drupal 的 JSON API 检索的内容\n\n### 注意\n\
  \n关于 Observable 在 Angular 应用程序中其他实用场景的更多信息，请查阅文档 [`https://angular.io/guide/practical-observable-usage`](https://angular.io/guide/practical-observable-usage)。\n\
  \n### 结论\n\nAngular 是开发基于 Drupal 的消费者应用程序的一个强大且稳健的选择。其最丰富的特性包括内置的 Observable 支持、功能齐全的\
  \ HTTP 客户端、类似于其他框架的组件驱动方法，以及得益于静态类型语言 TypeScript 而带来的良好开发者体验。尽管如此，一些开发者可能会发现，由于采用了\
  \ TypeScript，Angular 的学习曲线变得陡峭，尤其是那些更习惯于 AngularJS 旧有范式的开发者。\n\n在下一章，我们将完全转换方向，转向\
  \ Vue，由于其独特的渐进式采用方法，它与 Angular 有着显著的不同。Angular 是一个功能强大的庞然大物，提供了一系列复杂但高效的功能，而 Vue\
  \ 则倾向于一种不那么固执己见的导向，阐明了一系列开发者可以探索的方向。与 Angular 类似，Vue 受益于基于组件的架构，并在模板中使用指令。\n\n**脚注**\
  \ 1\n\n\n\n"
- "# 20. Vue.js\n\n`Vue.js` 因其灵活性和被 Laravel 等社区采用，成为近年来最受赞誉的 JavaScript 项目之一。它的愿景首先聚焦于*渐进式可适配性*这一理念，即\
  \ `Vue.js` 既可以作为一个库，仅仅是用户界面的装饰器，也可以作为高度定制化架构的成熟框架。这一使命使 `Vue.js` 区别于我们在这些章节中讨论的其他一些项目。\n\
  \n`Vue.js` 文档中有如下陈述：\n\n> *Vue（读音 /vjuː/，类似 view）是一个用于构建用户界面的渐进式框架。与其它大型框架不同的是，Vue\
  \ 被设计为可以自底向上逐层应用。Vue 的核心库只关注视图层，不仅易于上手，还便于与第三方库或既有项目整合。*\n\n`Vue.js` 强调其追求的三大特性：\n\
  \n*   *易学易用*：`Vue.js` 旨在让编写 HTML、CSS 和 JavaScript 的开发者易于理解。\n*   *灵活多变*：`Vue.js`\
  \ 的目标是在范围有限的库和功能完善的框架之间保持灵活性。\n*   *性能卓越*：`Vue.js` 拥有 20KB（min+gzip）的运行时和性能极高的虚拟\
  \ DOM。\n\n几个显著的特征将 `Vue.js` 与用于创建 JavaScript 应用程序的其他常用工具区分开来。例如，与 React 类似，`Vue.js`\
  \ 使用了虚拟 DOM，并提供了响应式和可组合的视图组件。此外，尽管 `Vue.js` 支持 JSX（React 那种类似 XML 的声明式语法，参见第 17\
  \ 章），但 `Vue.js` 默认也提供了基于 HTML 的模板，这类似于 AngularJS 的方法（比较 AngularJS 指令 `ng-if` 和 Vue.js\
  \ 指令 `v-if`）。\n\n得益于 `Vue.js` 的渐进式可适配性，它可以在不同的范围内使用，包括作为一个 `<script>` 元素嵌入，而不是需要一个完整的\
  \ Node.js 构建。你可以从 `Vue.js` 网站下载开发版或生产就绪版并进行嵌入，或者你也可以像我们在这里做的那样，从一个内容分发网络（CDN）引入某个版本。\n\
  \n这一特性也突显了与 Angular 和 Ember 相比，`Vue.js` 的轻约束性。此外，PHP 社区中的其他人，尤其是 Laravel，已经探索并将\
  \ `Vue.js` 作为前端开发的标准基础。\n\n**注意：** 关于 `Vue.js` 的完整文档，请参阅 `Vue.js` 网站 [`http://vuejs.org`](http://vuejs.org)。关于直接嵌入\
  \ `Vue.js` 的信息，请参阅 [`https://vuejs.org/v2/guide/installation.html#Direct-lt-script-gt-Include`](https://vuejs.org/v2/guide/installation.html%2523Direct-lt-script-gt-Include)。\n\
  \n## Vue.js 核心概念\n\n`Vue.js` 的一些核心概念包括声明式渲染、指令、条件与循环以及组件。在本节中，我们还将探讨不断成熟的 `Vue.js`\
  \ 生态系统中的元素，例如 Vue CLI、`Vue.js` 插件和 `Vue.js` 预设。不过，首先，有必要审视一下模型-视图-视图模型（MVVM）架构模式，`Vue.js`\
  \ 从中汲取了大量灵感。\n\n## Vue.js 的 MVVM 启发式模式\n\nMVVM 架构模式与 MVC 架构类似，不同之处在于*视图模型*，它是一个值转换器，负责转换数据模型中存在的数据对象，以便这些数据能够被轻松渲染和维护。因此，视图模型可以被视为更像模型而非视图，它处理视图的大部分（即使不是全部）显示行为。\n\
  \n在 `Vue.js` 中，*视图模型* 是视图层之上的一个抽象层，它在一个 `options` 对象中提供属性，该对象包含 `data` 和 `methods`（用于定义行为）。视图模型也可以被视为模型内数据的当前状态，或者是一个*绑定器*，负责管理视图中处理和应用程序中数据绑定逻辑之间的所有通信。从这个意义上说，视图模型类似于\
  \ MVC 架构或 MVP 架构中的控制器。\n\n例如，考虑以下示例，它定义了一个视图模型，并构成了我们的 `Vue.js` 应用程序的基础。\n\n```\n\
  // vm 是 ViewModel 的缩写。\nvar vm = new Vue({\n    // options 对象\n});\n```\n\n当我们创建一个\
  \ `Vue.js` 实例时，我们需要提供一个 `options` 参数作为一个对象，该对象包含应用程序中要使用的 `data` 和 `methods`。一个\
  \ `Vue.js` 应用程序通常由一个根 `Vue.js` 实例组成，该实例也可以有选择地组织成一个嵌套和可复用组件的树。因此，所有组件本身也是 `Vue.js`\
  \ 实例，并接受 `options` 对象。\n\n当我们像前面的例子那样实例化一个 `Vue.js` 实例时，它会将 `data` 对象中的所有属性提供给 `Vue.js`\
  \ *响应式系统*，这样每当数据更新时，视图就会相应地做出反应。由于属性仅在实例化 `Vue.js` 实例时在 `data` 对象中才是响应式的，因此，如果一个属性不是立即使用，则必须提供初始值。^(⁸³)\n\
  \n## 声明式渲染与指令\n\n`Vue.js` 使用存储为 `.vue` 文件（如果是 `<script>` 嵌入，则为 HTML 文件）的 HTML 模板，以及用\
  \ ES5 或 ES6 编写的、定义 `Vue.js` 应用程序行为的 JavaScript 文件。考虑以下示例，该示例在 `.app` 类上初始化一个 Vue\
  \ 应用程序，并传入要在 `{{ greeting }}` 元素内渲染的数据。\n\n将以下内容插入新创建的 `index.html` 文件和一个 `index.js`\
  \ 文件中，我们也已将后者嵌入到我们的 HTML 中。\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <meta\
  \ charset=\"utf-8\">\n    <title>Vue.js app</title>\n</head>\n<body>\n    <div class=\"\
  app\">\n        {{ greeting }}\n    </div>\n    <script src=\"https://unpkg.com/vue\"\
  ></script>\n    <script src=\"index.js\"></script>\n</body>\n</html>\n```\n\n```javascript\n\
  // index.js\nvar app = new Vue({\n    el: '.app',\n    data: {\n        greeting:\
  \ 'Hello world!'\n    }\n});\n```\n\n与 AngularJS 类似，`Vue.js` 指令以 `v-` 为前缀，并为渲染后的\
  \ DOM 提供特定的响应式行为。例如，考虑以下示例，它确保链接的 `href` 属性与在 `Vue.js` 中对 `url` 属性所做的任何修改保持同步。\n\
  \n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <title>Vue.js\
  \ app</title>\n</head>\n<body>\n    <div class=\"app\">\n        <a v-bind:href=\"\
  url\">What year is this?</a>\n    </div>\n    <script src=\"https://unpkg.com/vue\"\
  ></script>\n    <script src=\"index.js\"></script>\n</body>\n</html>\n```\n\n```javascript\n\
  // index.js\nvar app = new Vue({\n    el: '.app',\n    data: {\n        url: 'https://en.wikipedia.org/wiki/'\n\
  \            + new Date().getFullYear().toString()\n    }\n});\n```\n\n我们还可以借助 `v-on`\
  \ 指令处理动态用户输入，该指令包含我们可能希望在 `Vue.js` 中处理的某些用户操作。考虑以下示例，它允许用户点击一个按钮来更新应用程序初始化时生成的年份。\n\
  \n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <title>Vue.js\
  \ app</title>\n</head>\n<body>\n    <div class=\"app\">\n        {{ year }}\n  \
  \      <button v-on:click=\"updateYear\">Update year</button>\n    </div>\n    <script\
  \ src=\"https://unpkg.com/vue\"></script>\n    <script src=\"index.js\"></script>\n\
  </body>\n</html>\n```\n\n```javascript\n// index.js\nvar app = new Vue({\n    el:\
  \ '.app',\n    data: {\n        year: '2018'\n    },\n    methods: {\n        updateYear:\
  \ function() {\n            this.year = new Date().getFullYear().toString();\n \
  \       }\n    }\n});\n```\n\n考虑一个示例实现，其中我们通过 JSON API 在 `Vue.js` 中检索了一个节点集合。使用\
  \ `v-for` 指令，我们可以构建一个遍历该集合的 `for` 循环，并渲染 JSON API 响应中提供的某些属性。\n\n```html\n<!DOCTYPE\
  \ html>\n<html>\n<head>\n    <meta charset=\"utf-8\">\n    <title>Vue.js app</title>\n\
  </head>\n<body>\n    <div class=\"app\">\n        <div v-for=\"node in nodes\">\n\
  \            <h2>{{ node.attributes.title }}</h2>\n            <p>{{ node.attributes.created\
  \ }}</p>\n            <p>{{ node.attributes.body.value }}</p>\n        </div>\n\
  \    </div>\n    <script src=\"https://unpkg.com/vue\"></script>\n    <script src=\"\
  index.js\"></script>\n</body>\n</html>\n```\n\n```javascript\n// index.js\nvar app\
  \ = new Vue({\n    el: '.app',\n    data: {\n        nodes: [\n            {\n \
  \               attributes: {\n                    title: 'Capto',\n           \
  \         created: 1526387013,\n                    body: {\n                  \
  \      value: 'Camur'\n                    }\n                }\n            }\n\
  \        ]\n    }\n});\n```\n\n## Vue.js 组件\n\n考虑以下示例，其中我们定义了一个 `Vue.js` 组件，并为它提供了一些虚拟数据，然后通过指令将其渲染为\
  \ HTML。\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\"\
  >\n    <title>Vue.js app</title>\n</head>\n<body>\n    <div class=\"app\">\n   \
  \     <node-item v-for=\"item in nodeList\" v-bind:node=\"item\"></node-item>\n\
  \    </div>\n    <script src=\"https://unpkg.com/vue\"></script>\n    <script src=\"\
  index.js\"></script>\n</body>\n</html>\n```\n\n```javascript\n// index.js\nVue.component('node-item',\
  \ {\n    props: ['node'],\n    template: `<div>\n        <h2>{{ node.attributes.title\
  \ }}</h2>\n        <p>{{ node.attributes.created }}</p>\n        <p>{{ node.attributes.body.value\
  \ }}</p>\n    </div>`\n});\n\nvar app = new Vue({\n    el: '.app',\n    data: {\n\
  \        nodeList: [\n            {\n                id: '3ca469da-b905-4a77-8d97-954abcdc4cf6',\n\
  \                attributes: {\n                    title: 'Capto',\n          \
  \          created: 1526387013,\n                    body: {\n                 \
  \       value: 'Camur'\n                    }\n                }\n            }\n\
  \        ]\n    }\n});\n```\n\n正如你所见，在这个代码示例中，我们定义了一个名为 `node-item` 的组件，它带有某些属性，这些属性是从表示虚拟\
  \ API 响应的数据中传入的。\n\n**注意：** 在 JavaScript 中，反引号用于表示多行字符串。\n\n## Vue.js 生态系统\n\n在我们转向开发一个功能完备的、由\
  \ Drupal 驱动的 `Vue.js` 应用程序之前，我们首先应该考虑 `Vue.js` 生态系统中一些有助于开发者快速构建应用程序的重要元素。\n\n例如，对于大型项目以及为了快速启动开发，使用\
  \ `Vue.js` 的官方命令行界面 Vue CLI 可能会很有用，它提供了许多项目模板可供使用。要全局安装 Vue CLI，请执行以下 `npm` 或 `yarn`\
  \ 命令。\n\n```\nnpm install -g @vue/cli\n# 或\nyarn global add @vue/cli\n```\n\n\n\n"
- '# 使用 npm


  ```

  $ npm install -g @vue/cli

  ```


  要安装 `yarn`，请先执行以下命令，然后再执行下方的 `yarn` 命令。


  ```

  $ npm install -g yarn

  ```


  '
- "# 使用 yarn\n\n```\n$ yarn global add @vue/cli\n```\n\nVue CLI 安装完成后，你可以使用它来搭建全新的应用程序，这些应用会包含大型\
  \ Vue.js 项目所需的预期目录结构。同时，它还能启动一个便捷的用户界面，让你只需几个简单步骤就能创建新应用。下方的第一个命令会在创建应用时提供更多选项。第二个命令则列出所有可用选项，第三个命令则提供一个用户界面，用于搭建新的\
  \ Vue.js 应用。\n\n```\n$ vue create my-vue-app\n$ vue create --help\n$ vue ui\n```\n\
  \n如果你想使用现有模板，请执行以下命令，通过模板来初始化 Vue.js，而不是使用 `vue create` 命令。例如，以下命令使用 `webpack-simple`\
  \ 模板创建了一个新的 Vue.js 应用。\n\n```\n$ vue init webpack-simple my-vue-app\n$ cd my-vue-app\n\
  $ npm install\n$ npm run dev\n```\n\nVue.js 还提供了丰富的插件生态系统，你可以利用它为你的应用添加功能。例如，`vue\
  \ add` 命令允许我们通过将插件添加到开发依赖项中，将其安装到现有项目中。\n\n```\n$ vue add @vue/eslint\n$ vue add\
  \ @vue/cli-plugin-eslint\n```\n\n在项目根目录的 `~/.vuerc` 配置文件中，你还可以向 Vue.js 注册某些设置，从而使特定插件按特定方式运行。在以下示例中，我们设置\
  \ `@vue/cli-plugin-eslint` 使用 Drupal 采用的 Airbnb JavaScript 风格指南。\n\n```\n{\n  \"\
  useConfigFiles\": true,\n  \"router\": true,\n  \"vuex\": true,\n  \"cssPreprocessor\"\
  : \"sass\",\n  \"plugins\": {\n    \"@vue/cli-plugin-babel\": {},\n    \"@vue/cli-plugin-eslint\"\
  : {\n      \"config\": \"airbnb\",\n      \"lintOn\": [\"save\", \"commit\"]\n \
  \   }\n  }\n}\n```\n\n## 用 Drupal 和 JSON API 支持 Vue.js\n\n在构建我们以 Drupal 为后端的 Vue.js\
  \ 应用过程中，我们将回顾在第 12 章中创建的 Drupal 网站的最终状态。如果你还没有建立一个启用了 JSON API 并包含内容的网站，请返回第 12\
  \ 章，确保你按照步骤将 JSON API 声明为依赖项并启用了该模块。\n\n### 搭建 Vue.js 应用\n\n首先，我们可以使用以下命令来搭建一个新的\
  \ Vue.js 应用。在这些示例中，我们使用 `yarn` 来处理我们的依赖项。出于我们的目的，在搭建新的 Vue.js 应用时，我们将选择 `default`\
  \ 选项，该选项将包含 `babel`（ES6 转译）和 `eslint`（代码检查）的插件。\n\n```\n$ vue create ddip-vue\n\
  $ cd ddip-vue\n```\n\n要在本地服务器上测试我们的 Vue.js 应用，我们可以执行以下命令，该命令将在 `http://localhost:8080`\
  \ 上显示标准的欢迎信息。\n\n```\n$ yarn serve\n```\n\n在我们的 Vue.js 应用中，我们将使用 `axios` HTTP 客户端来提供我们所需的与\
  \ Drupal 的双向通信。`axios` 是一个基于 Promise 的 HTTP 客户端，它也是 Waterwheel.js 库（参见第 16 章）的一部分，并且能够向任意后端发出\
  \ HTTP 请求。`axios` 可以作为依赖项包含进来，要么通过 `npm` 或 `yarn` 作为最终客户端构建的一部分，要么通过指向内容分发网络（CDN）的嵌入方式引入。\n\
  \n出于我们的目的，我们使用以下命令将 `axios` 添加为依赖项。请注意，你需要停止服务器（Ctrl+C）或打开一个新的终端窗口才能继续下一步。\n\n```\n\
  $ yarn add axios\n```\n\n你的目录结构将如下所示（不包括 `node_modules` 目录）。\n\n```\n├── README.md\n\
  ├── babel.config.js\n├── package.json\n├── public\n│   ├── favicon.ico\n│   └──\
  \ index.html\n├── src\n│   ├── App.vue\n│   ├── assets\n│   │   └── logo.png\n│\
  \   ├── components\n│   │   └── HelloWorld.vue\n│   └── main.js\n└── yarn.lock\n\
  ```\n\n### 使用 `axios` 检索 Drupal 数据\n\n将 `HelloWorld.vue` 替换为一个名为 `Articles.vue`\
  \ 的组件，其内容如下。在此示例中，我们创建了一个文章集合的视图，并将其分配给 `articles` 属性，然后传递给模板进行渲染。\n\n```\n<template>\n\
  \  <div>\n    <article v-for=\"article in articles\" :key=\"article.id\">\n    \
  \  <h2>{{ article.attributes.title }}</h2>\n      <p>{{ article.attributes.created\
  \ }}</p>\n      <p>{{ article.attributes.body.value }}</p>\n    </article>\n  </div>\n\
  </template>\n\n<script>\nimport axios from 'axios';\nexport default {\n  name: 'Articles',\n\
  \  data () {\n    return {\n      articles: []\n    };\n  },\n  mounted () {\n \
  \   this.getArticles();\n  },\n  methods: {\n    getArticles () {\n      axios.get('http://jsonapi-test.dd:8083/jsonapi/node/article')\n\
  \        .then(res => this.articles = res.data.data)\n        .catch(err => {\n\
  \          throw new Error(err);\n        });\n    }\n  }\n}\n</script>\n```\n\n\
  然后，将 `App.vue` 替换为以下内容。\n\n```\n<template>\n  <div id=\"app\">\n    <Articles/>\n\
  \  </div>\n</template>\n\n<script>\nimport Articles from './components/Articles.vue'\n\
  export default {\n  name: 'app',\n  components: {\n    Articles\n  }\n}\n</script>\n\
  ```\n\n### 处理错误和加载状态\n\n思考以下改编自 Vue.js 文档的示例，如果 Promise 抛出错误，它会显示一条错误消息；当 Promise\
  \ 正在完成时，则显示一条正在加载的消息。如果我们禁用 Acquia Dev Desktop，你将看到错误消息出现。\n\n```\n<template>\n\
  \  <div>\n    <div v-if=\"errored\">\n      <p>抱歉，此信息目前不可用。</p>\n    </div>\n  \
  \  <div v-else>\n      <div v-if=\"loading\">\n        <p>加载中……</p>\n      </div>\n\
  \      <div v-else>\n        <article v-for=\"article in articles\" :key=\"article.id\"\
  >\n          <h2>{{ article.attributes.title }}</h2>\n          <p>{{ article.attributes.created\
  \ }}</p>\n          <p>{{ article.attributes.body.value }}</p>\n        </article>\n\
  \      </div>\n    </div>\n  </div>\n</template>\n\n<script>\nimport axios from\
  \ 'axios';\nexport default {\n  name: 'Articles',\n  data () {\n    return {\n \
  \     articles: [],\n      loading: true,\n      errored: false\n    };\n  },\n\
  \  mounted () {\n    this.getArticles();\n  },\n  methods: {\n    getArticles ()\
  \ {\n      axios.get('http://jsonapi-test.dd:8083/jsonapi/node/article')\n     \
  \   .then(res => this.articles = res.data.data)\n        .catch(err => {\n     \
  \     this.errored = true;\n          throw new Error(err);\n        })\n      \
  \  .finally(() => this.loading = false);\n    }\n  }\n}\n</script>\n```\n\n现在，我们可以查看\
  \ Vue.js 应用的最终结果，并继续添加其他对用户体验至关重要的元素，例如 CSS。你可以在图 20-1 中看到这一点。你也可以在图 20-2 中看到错误状态。从这里开始，我们可以对针对\
  \ JSON API 的请求应用各种过滤器和排序操作，或者提供处理其他 Drupal bundles 的组件。\n\n![../images/468476_1_En_20_Chapter/468476_1_En_20_Fig2_HTML.jpg](img/468476_1_En_20_Fig2_HTML.jpg)\n\
  \n**图 20-2** 当我们禁用本地环境时，得益于我们的错误处理，应用程序会显示一条错误消息\n\n![../images/468476_1_En_20_Chapter/468476_1_En_20_Fig1_HTML.jpg](img/468476_1_En_20_Fig1_HTML.jpg)\n\
  \n**图 20-1** 我们的 Vue.js 应用的结果显示了我们从 JSON API 请求的集合\n\n> **注意：** 有关如何执行 `PATCH`、`POST`\
  \ 和 `DELETE` 请求的 `axios` 文档，请参阅 [`https://github.com/axios/axios`](https://github.com/axios/axios)。\n\
  \n### 结论\n\n正如你在本章的示例中所见，Vue.js 的灵活性和渐进式可采纳性使其区别于我们在本书中介绍的其他 JavaScript 项目。在本章中，我们介绍了\
  \ Vue.js 的一些基本概念，包括声明式渲染、指令和组件构成。我们还使用了嵌入式脚本来演示 Vue.js 不仅可以通过完整的命令行界面使用，还可以作为一个资源文件使用。最后，我们探讨了将\
  \ `axios` 与 Vue.js 结合使用，从 Drupal 的 JSON API 实现中检索资源的过程。\n\n在下一章中，我们将注意力转向 Ember，尽管它是一个高度固执己见的框架，但它强调愉快的开发者体验。正如我们将看到的，它包含一个内置的\
  \ JSON API 数据适配器，这极大地加速了构建以 Drupal 为后端的 Ember 应用程序的过程。在此过程中，我们将触及 Ember 中一些独特的细微差别，以及它们在应用程序开发过程中的作用。\n\
  \n---\n\n**脚注**\n\n21. Ember\n\n\n\n"
- "# Ember：一个具有悠久历史的 JavaScript 框架\n\nEmber 是一个在 JavaScript 社区中具有悠久历史的 JavaScript\
  \ 框架。其社区将自己的项目描述为“Web 的 SDK”，推崇约定优于配置。换句话说，Ember 社区更看重一套共同的实践，而非显式设置。因此，Ember 通常被认为比其他常见的\
  \ JavaScript 框架更具优势，这得益于其广泛的标准化，包括大多数应用程序的规范目录结构，这简化了新成员加入其他代码库的过程，并提供了一种清晰、可互操作的模板化方法。\n\
  \n从历史上看，Ember 是 SproutCore 项目的后继者，后者包含一个应用程序框架和一个包含用户界面组件的小部件库。2011 年，SproutCore\
  \ 2.0 应用程序框架更名为 Ember，以区别于 SproutCore 小部件库。\n\nEmber 强调雄心勃勃的 Web 应用程序的概念，旨在尽可能接近原生应用程序的用户体验。由于这一特性，Ember\
  \ 可以与其他 JavaScript 模型-视图-任意（MV*）框架区分开来，因为它具有高度固执己见的特性，这对于倾向于使用更轻量级视图库（如 React）的开发者来说可能不太理想。从文化角度来看，Ember\
  \ 社区更类似于 Drupal 社区，因为它没有 Google（Angular）和 Facebook（React）等企业巨头的支持。^(⁸⁴,) ^(⁸⁵)\n\
  \n> **注意**  \n> 有关 Ember 的更多信息，请访问网站 [`https://www.emberjs.com`](https://www.emberjs.com)。\n\
  \n## Ember 中的关键概念\n\nEmber 提供了多种工具来简化构建 Ember 应用程序的过程，包括 Ember CLI 命令行界面。首先，我们在此总结\
  \ Ember 生态系统中一些最重要的组件，任何开始使用 Ember 的人都应该了解这些组件。\n\n### Ember 生态系统\n\n尽管 Ember 本身作为一个纯客户端框架就可以使用，无需任何额外扩展，但存在许多周边工具对新开发者特别有用。Ember\
  \ 核心团队维护其中一些项目，而其他项目则是 Ember 传统起点的一部分。此处列出的其他项目是社区维护的插件，类似于 Drupal 的贡献模块生态系统，它们提供了额外的功能。\n\
  \n*   **Ember CLI**：这个用于搭建 Ember 应用程序的官方命令行界面，将 Ember 对约定的重视带入了 Ember 构建过程。与 Vue.js\
  \ 应用程序模板（参见第 20 章）非常相似，`Ember CLI` 也提供了蓝图，允许快速生成 Ember 应用程序。此外，它还提供了其他优势，例如 ES6\
  \ 转译、具有热重载（任何文件更改时自动重载）的本地开发服务器、功能齐全的测试框架，以及强大的资产和依赖管理。\n*   **Ember Data**：此功能提供了数据持久化，将客户端模型映射到服务器端数据。尽管\
  \ `Ember Data` 不是 Ember 框架的严格要求，但绝大多数 Ember 应用程序都使用它来加载和保存记录及其关系。开箱即用，`Ember Data`\
  \ 无需额外配置即可执行经常需要的数据操作。\n*   **Ember Inspector**：此浏览器扩展可用于 Google Chrome 或 Mozilla\
  \ Firefox，并提供针对 Ember 应用程序的有用调试功能。借助 `Ember Inspector`，开发者可以在应用程序启动的任何阶段检查模板和组件。当与\
  \ `Ember Data` 结合使用时，`Ember Inspector` 还可以访问为 Ember 模型加载的记录。\n*   **Ember FastBoot**：此\
  \ Ember CLI 插件为利用通用 JavaScript 和 Node.js 堆栈的 Ember 应用程序提供服务器端渲染。\n*   **Liquid Fire**：这个流行的\
  \ Ember 插件提供了一种声明式方法来在 Ember 应用程序中包含动画和过渡。\n\n> **注意**  \n> 有关可用 Ember 插件的更多信息，请查阅\
  \ Ember Observer 网站 [`https://www.emberobserver.com`](https://www.emberobserver.com)。\n\
  \n## 搭建 Ember 应用程序\n\n我们可以使用以下命令全局安装 Ember CLI。\n\n```\n$ npm install -g ember-cli\n\
  ```\n\n要检查 Ember CLI 是否正确安装，请执行以下命令。\n\n```\n$ ember -v\n```\n\n安装完成后，我们可以使用 `ember\
  \ new` 命令搭建一个新的 Ember 应用程序。\n\n```\n$ ember new ddip-ember\n$ cd ddip-ember\n```\n\
  \n搭建完成后的目录结构应如下所示（不包括 `node_modules` 目录）。\n\n```\n├── README.md\n├── app\n│   ├──\
  \ app.js\n│   ├── components\n│   ├── controllers\n│   ├── helpers\n│   ├── index.html\n\
  │   ├── models\n│   ├── resolver.js\n│   ├── router.js\n│   ├── routes\n│   ├──\
  \ styles\n│   │   └── app.css\n│   └── templates\n│       ├── application.hbs\n\
  │       └── components\n├── config\n│   ├── environment.js\n│   ├── optional-features.json\n\
  │   └── targets.js\n├── ember-cli-build.js\n├── package-lock.json\n├── package.json\n\
  ├── public\n│   └── robots.txt\n├── testem.js\n├── tests\n│   ├── helpers\n│   ├──\
  \ index.html\n│   ├── integration\n│   ├── test-helper.js\n│   └── unit\n└── vendor\n\
  ```\n\n要启动具有热重载功能的本地服务器，我们可以使用以下命令，该命令将创建一个构建并将其部署到 `http://localhost:4200`。如果你导航到该\
  \ URL，你应该会看到 Ember 友好的吉祥物 Tomster，戴着安全帽并显示一条欢迎消息。\n\n```\n$ ember server\n```\n\n\
  现在，我们可以打开一个代码编辑器（例如 Atom）并按我们的喜好修改生成的代码。\n\n```\n$ atom .\n```\n\n> **注意**  \n>\
  \ Atom 代码编辑器可以从 [`https://atom.io`](https://atom.io) 下载。有关 Ember CLI 的更多信息，请查阅文档\
  \ [`https://ember-cli.com`](https://ember-cli.com)。\n\n## Ember 模板\n\nEmber 框架使用\
  \ Handlebars 作为其标准模板语言。尽管这对于习惯于 Twig 的 Drupal 开发者来说看起来很熟悉，但 Handlebars 有显著的不同。在\
  \ Ember 中，*模板*负责显示已暴露给模板上下文的属性，该上下文可以是路由或组件（稍后会详细介绍）。Handlebars 特有的双花括号还可以包含各种其他助手并调用其他组件。\n\
  \n要了解模板如何工作，请从项目根目录导航到 `app/templates/application.hbs` 并在你选择的代码编辑器中打开它。此模板代表我们的根应用程序模板，我们所有的组成模板和组件都将渲染到其中。将内容替换为以下示例，同时注意注释语法和\
  \ `{{outlet}}`，它代表嵌套在当前模板中的模板。\n\n```\n{{! app/templates/application.hbs }}\nEmber\
  \ app\n{{outlet}}\n```\n\n需要注意的是，每当我们需要生成一个新模板时，我们可以使用方便的 `ember generate` 命令（简称\
  \ `ember g`），它将在模板目录中搭建一个类似于我们根应用程序模板的新模板。以下两个命令是等效的。\n\n```\n$ ember generate template\
  \ my-new-template\n$ ember g template my-new-template\n```\n\n> **注意**  \n> 如果已存在同名的模板，Ember\
  \ CLI 会询问您是否要覆盖现有模板或取消。有关 Ember 模板的更多信息，请查阅文档 [`https://guides.emberjs.com/release/templates/handlebars-basics`](https://guides.emberjs.com/release/templates/handlebars-basics)。\n\
  \n\n\n### Ember 路由\n\n在`Ember`框架中，URL 或路由代表着应用的状态。每一个独立的 URL 都绑定到一个*路由对象*，该对象控制着浏览器为用户渲染的内容。`Ember`路由同时包含了模板（决定路由上渲染的内容）和路由处理器（负责执行渲染并加载`Ember`暴露给模板的模型）。\n\
  \n在我们的案例中，将像前几章一样构建一个简单的文章内容浏览器。可以使用以下命令生成一个新路由。注意，这里使用上一节中的简写形式。\n\n```\n$ ember\
  \ g route articles\n```\n\n在路由模板中插入以下内容。\n\n```\n{{! app/templates/articles.hbs\
  \ }}\nList of articles\n```\n\n当导航到`http://localhost:4200/articles`时，你将看到两个标题，一个代表我们在根应用模板中提供的`<h1>`，另一个代表我们在文章模板中提供的`<h2>`。\n\
  \n现在已知模板正常工作，我们可以通过打开路由处理器提供一些初始的虚拟数据来在路由上渲染。幸运的是，`Ember CLI`已经生成了一个空的`articles.js`文件作为路由处理器。将内容替换为以下代码，其中我们在`model`钩子中提供了一些虚拟数据作为数组（稍后将详细介绍）。\n\
  \n```\n// app/routes/articles.js\nimport Route from '@ember/routing/route';\nexport\
  \ default Route.extend({\nmodel () {\nreturn [\n{\ntitle: 'Capto',\nuuid: '3ca469da-b905-4a77-8d97-954abcdc4cf6',\n\
  created: 1526387013,\nbody: {\nvalue: 'Camur'\n}\n},\n{\ntitle: 'Esse Ex Nibh Valde\
  \ Valetudo',\nuuid: '1e1a4598-f9c7-4ce7-adbd-7603401cc23b',\ncreated: 1526387013,\n\
  body: {\nvalue: 'Illum loquor persto plaga premo.'\n}\n}\n]\n}\n});\n```\n\n现在，在路由模板中，我们可以在文章路由模板中遍历这个数组。\n\
  \n```\n{{! app/templates/articles.hbs }}\nList of articles\n\n{{#each model as |article|}}\n\
  {{article.title}}\n\n{{article.created}}\n{{article.body.value}}\n\n{{/each}}\n\n\
  ```\n\n当再次导航到文章路由时，我们将看到熟悉的标题，后面跟着一个由虚拟文章组成的无序列表。\n\n注意\n关于`Ember`路由的更多信息，请查阅文档：[`https://guides.emberjs.com/release/routing`](https://guides.emberjs.com/release/routing)\
  \ 。\n\n### Ember 组件\n\n在`Ember`中，*组件*是可重用且可嵌套的，就像 JavaScript 社区中其他常用框架一样。组件通常由一个`Handlebars`模板（描述组件应如何呈现自身）和一个绑定到组件的\
  \ JavaScript 文件（决定其行为）组成。由于`Ember`有明确的目标是遵循`Web Components`规范，其组件处理方式类似于`Custom\
  \ Elements`。考虑我们已开始构建的文章浏览器。如果我们也想构建一个 Drupal 页面浏览器，重复与页面和其他内容实体相同的代码将变得繁琐且最终维护性差。然而，如果我们能跨所有实体类型进行泛化，就可以使用一个仅因\
  \ Drupal bundle 而异的通用组件。\n\n使用以下命令生成一个新组件。\n\n```\n$ ember g component entity-list\n\
  ```\n\n在组件模板中，我们可以复制文章模板的内容，并提供更通用的、与我们所处理的实体类型无关的代码。如你所见，因为每个组件的标题会变化，我们需要将`{{title}}`作为一个属性提供。\n\
  \n```\n{{! app/templates/components/entity-list.hbs }}\n{{title}}\n\n{{#each entities\
  \ as |entity|}}\n{{entity.title}}\n\n{{entity.created}}\n{{entity.body.value}}\n\
  \n{{/each}}\n\n```\n\n现在，在总体的文章模板中，我们可以将内容替换为对`entity-list`组件的调用。由于`Ember`遵循`Custom\
  \ Elements`规范，所有组件名称都需要用连字符连接以确保前向兼容性。\n\n```\n{{! app/templates/articles.hbs }}\n\
  {{entity-list title=\"List of articles\" entities=model}}\n```\n\n当我们还希望在内容浏览器中包含一个页面列表时，可以生成一个新路由，并提供类似的模板而无需更改底层属性。\n\
  \n```\n$ ember g route pages\n```\n\n页面路由看起来与文章路由完全相同，只是`type`属性不同，如下例所示。\n\n```\n\
  {{! app/templates/pages.hbs }}\n{{entity-list title=\"List of pages\" entities=model}}\n\
  ```\n\n现在，我们需要提供由示例页面组成的虚拟数据。\n\n```\n// app/routes/pages.js\nimport Route from\
  \ '@ember/routing/route';\nexport default Route.extend({\nmodel () {\nreturn [\n\
  {\ntitle: 'Humo',\nuuid: 'bc4acb41-d3fe-4e19-a43b-c51665dab367',\ncreated: 1526387013,\n\
  body: {\nvalue: 'Commoveo cui ille modo pecus valde.'\n}\n},\n{\ntitle: 'Hos Ille\
  \ Olim',\nuuid: '1e343b8a-3bb5-4c3e-aba2-665cb2cfbece',\ncreated: 1526387013,\n\
  body: {\nvalue: 'Esse genitus ibidem mos quidne utrum valde.'\n}\n}\n]\n}\n});\n\
  ```\n\n当导航到`http://localhost:4200/pages`时，我们将看到虚拟数据出现。\n\n作为改善应用用户体验的附加步骤，我们可以在根应用模板顶部提供一个基本的导航栏，允许我们在创建的路由之间导航。将内容替换为以下内容。\n\
  \n```\n{{! app/templates/application.hbs }}\n{{#link-to \"index\"}}Ember app{{/link-to}}\n\
  \n{{#link-to \"articles\"}}Articles{{/link-to}}\n{{#link-to \"pages\"}}Pages{{/link-to}}\n\
  \n{{outlet}}\n```\n\n我们应用在两个路由上的当前状态可以在图 21-1 和图 21-2 中看到。\n\n![../images/468476_1_En_21_Chapter/468476_1_En_21_Fig2_HTML.jpg](img/468476_1_En_21_Fig2_HTML.jpg)\n\
  \n图 21-2\n在`http://localhost:4200/articles`处的虚拟文章列表\n\n![../images/468476_1_En_21_Chapter/468476_1_En_21_Fig1_HTML.jpg](img/468476_1_En_21_Fig1_HTML.jpg)\n\
  \n图 21-1\n在`http://localhost:4200/pages`处的虚拟页面列表\n\n注意\n关于`Ember`组件的更多信息，请查阅文档：[`https://guides.emberjs.com/release/components/defining-a-component`](https://guides.emberjs.com/release/components/defining-a-component)\
  \ 。\n\n### Ember 模型\n\n到目前为止，我们通过`Ember`的`model`钩子提供了虚拟数据。在`Ember`中，*模型*代表客户端上的持久状态，并且通常也会将数据持久化到\
  \ Web 服务器，尽管它们可以表示在任何远程保存的数据。当我们修改数据或添加新数据时，模型会被保存。\n\n我们可以像之前生成路由、模板和组件一样生成模型。由于我们将使用\
  \ Drupal 的`JSON API`实现，我们生成的每个模型代表我们将处理的每个 bundle（Drupal 内容类型）。\n\n```\n$ ember\
  \ g model node--article\n$ ember g model node--page\n```\n\n生成模型后，我们需要使用`Ember Data`中的`.attr()`方法告知`Ember`我们希望暴露给将渲染它们的模板的属性。在以下示例中，我们将特定的\
  \ JSON API 属性注册到`Ember`。\n\n```\n// app/models/node--article.js\nimport DS from\
  \ 'ember-data';\nexport default DS.Model.extend({\nuuid: DS.attr(),\ntitle: DS.attr(),\n\
  created: DS.attr(),\nbody: DS.attr()\n});\n// app/models/node--page.js\nimport DS\
  \ from 'ember-data';\nexport default DS.Model.extend({\nuuid: DS.attr(),\ntitle:\
  \ DS.attr(),\ncreated: DS.attr(),\nbody: DS.attr()\n});\n```\n\n`.attr()`方法通常被调用来将输入转换为不同的类型。例如，我们可以将\
  \ API 响应中的整数转换为字符串（`.attr('string')`）。此外，由于`Ember Data`智能地捕获了属性中所有子数据，因此无需为`body`值包含额外的`value`属性。^(⁸⁶)\n\
  \n\n\n### 说明\n\n有关 Ember 模型的更多信息，请参阅 [`https://guides.emberjs.com/release/models`](https://guides.emberjs.com/release/models)\
  \ 上的文档。\n\n## 使用 Drupal 和 JSON API 支持 Ember\n\n现在我们已经创建了模型，接下来准备将 Drupal 后端连接到 Ember\
  \ 应用。我们将再次利用第 8 章和第 12 章中使用的安装了 JSON API 的 Drupal 站点。如果你需要进一步了解如何在 Drupal 中启用和使用\
  \ JSON API，请回顾第 8 章和第 12 章。\n\n## Ember 适配器与 `JSONAPIAdapter`\n\n在 Ember 中，*适配器*用于通过\
  \ `XMLHttpRequests` 促进与 API 的通信。虽然在有多个数据源支持时，Ember 应用可能使用多个适配器，但在我们的案例中，只需要一个覆盖整个应用并代表\
  \ Drupal 站点中 JSON API 实现的单一适配器。如果你需要多个适配器，可以在此处显示的 `application` 之外提供另一个参数，以支持多个数据源。\n\
  \n```\n$ ember g adapter application\n```\n\n默认情况下，Ember 会生成一个 `JSONAPIAdapter`，因为\
  \ Ember 社区已将 JSON API 选为首选的 API 规范。Ember Data 也为不遵循 JSON API 规范的 REST API 提供了其他适配器，但这些通常会要求开发者执行其他设置步骤。为了连接到我们之前设置好的\
  \ Drupal 内容仓库，我们需要为适配器提供 `host` 和 `namespace`，如这个示例所示。\n\n```\n// app/adapters/application.js\n\
  import DS from 'ember-data';\nexport default DS.JSONAPIAdapter.extend({\nhost: 'http://jsonapi-test.dd:8083',\n\
  namespace: 'jsonapi'\n});\n```\n\n### 说明\n\n有关 Ember 适配器的更多信息，请参阅 [`https://guides.emberjs.com/release/models/customizing-adapters`](https://guides.emberjs.com/release/models/customizing-adapters)\
  \ 上的文档。\n\n## 在路由处理程序中获取数据\n\n在我们最初提供虚拟数据的路由处理程序中，现在可以运用 Ember 的数据存储，将模型钩子中的内容替换为对\
  \ Drupal 数据的检索。请考虑以下路由处理程序示例，我们将 JSON API 发布的 Drupal 数据导入路由，以便在路由模板中使用。\n\n```\n\
  // app/routes/articles.js\nimport Route from '@ember/routing/route';\nexport default\
  \ Route.extend({\nmodel () {\nreturn this.get('store').findAll('node--article');\n\
  }\n});\n// app/routes/pages.js\nimport Route from '@ember/routing/route';\nexport\
  \ default Route.extend({\nmodel () {\nreturn this.get('store').findAll('node--page');\n\
  }\n});\n```\n\n你可能已经注意到，保存后，我们的 Ember 应用不再按预期工作。如果我们导航到 Drupal 站点并检查 Drupal 错误日志（`/admin/reports/dblog`），会发现针对不符合\
  \ Drupal JSON API 实现预期格式的 URL（例如 `/jsonapi/node--articles` 等）出现 `404 Not Found`\
  \ 错误。此外，当我们在谷歌浏览器等浏览器中打开开发者控制台时，可以看到类似图 21-3 所示的错误。\n\n![../images/468476_1_En_21_Chapter/468476_1_En_21_Fig3_HTML.jpg](img/468476_1_En_21_Fig3_HTML.jpg)\n\
  \n**图 21-3** 我们的适配器需要进一步自定义，以反映 Drupal JSON API 实现中的预期路径\n\n需要进一步的工作来确保我们的 Ember\
  \ 应用能够正确地从 Drupal 检索数据。\n\n## 自定义 `JSONAPIAdapter`\n\n为了让我们的 `JSONAPIAdapter` 识别\
  \ Drupal 独特的 JSON API 路径，我们需要用额外的代码进一步自定义适配器，使其能够识别 Drupal 的 JSON API。这可以通过多种方式实现，这里我们可以看到一个由\
  \ Chris Hamper（`hampercm`）优化的示例。\n\n```\n// app/adapters/application.js\nimport\
  \ DS from 'ember-data';\nexport default DS.JSONAPIAdapter.extend({\nhost: 'http://jsonapi-test.dd:8083',\n\
  namespace: 'jsonapi',\npathForType(type) {\nlet entityPath;\nswitch(type) {\ncase\
  \ 'node--article':\nentityPath = 'node/article';\nbreak;\ncase 'node--page':\nentityPath\
  \ = 'node/page';\nbreak;\n}\nreturn entityPath;\n},\nbuildURL() {\nreturn this._super(...arguments);\n\
  }\n});\n```\n\n现在，我们可以在图 21-4 和图 21-5 中看到完成且功能完整的内容浏览器。\n\n![../images/468476_1_En_21_Chapter/468476_1_En_21_Fig5_HTML.jpg](img/468476_1_En_21_Fig5_HTML.jpg)\n\
  \n**图 21-5** 我们的内容浏览器显示直接来源于 Drupal 站点 JSON API 的页面\n\n![../images/468476_1_En_21_Chapter/468476_1_En_21_Fig4_HTML.jpg](img/468476_1_En_21_Fig4_HTML.jpg)\n\
  \n**图 21-4** 我们的内容浏览器显示直接来源于 Drupal 站点 JSON API 的文章\n\n### 结论\n\n在本章中，我们通过环游 Ember\
  \ 生态系统，完成了对 JavaScript 技术的探索。得益于 Ember 提供的广泛工具库以及其相对固化的取向，我们可以预见各种用例并快速开发应用。在此过程中，我们深入探讨了\
  \ Ember 框架的关键元素，如模板、路由、路由处理程序、组件、模型和适配器。尽管对某些开发者来说 Ember 可能过于固化，但其丰富的插件生态系统使其成为解耦\
  \ Drupal 实践者的一个引人注目的选择。此外，Ember 社区采用 JSON API 并默认提供 `JSONAPIAdapter`，意味着 Ember 是计划基于\
  \ Drupal JSON API 实现构建消费者的架构师的特别合适之选。通过最小的开销和适配器有限的定制，我们可以创建一个丰富的消费者，而无需依赖像 `axios`\
  \ 这样的第三方库。在第六部分中，我们将考虑高级主题，结束对解耦 Drupal 的探索。在接下来的章节中，我们将关注用于扩展 Drupal 网络服务能力以支持解耦架构的核心和贡献解决方案，包括创建自定义\
  \ REST 资源、利用贡献模块增强 Drupal 的 JSON API 实现。我们还将探讨一些挑战，例如通过缓存确保良好性能、通过模式和生成的文档为消费者提供愉快的开发者体验。最后，我们将思考解耦\
  \ Drupal 对 Drupal 前端以及更广泛 CMS 的未来影响。\n\n\n\n"
- "# 排版后的 Markdown 文档\n\n在第五部分中，我们介绍了当前用于构建解耦 Drupal 消费者的一些主要 JavaScript 技术，例如 React、Angular、Ember\
  \ 和 Vue，包括在选择这些技术时与 Drupal 的 Web 服务解决方案相关的动机、概念性介绍以及构建由 Drupal 支持的应用程序的指南。在本章中，我们结束对全栈的探索，涵盖解耦\
  \ Drupal 的高级主题，例如 REST 插件系统、适用于高级用例的贡献模块、模式与生成的 API 文档、缓存以及解耦 Drupal 的未来。\n\n我们在这些章节中涉足了许多不同的领域，其内容并非旨在详尽无遗地检查，而是作为对解耦\
  \ Drupal 领域中快速演变和长期存在的解决方案的调查。例如，我们首先转向 Drupal 核心中的 REST 插件系统，该系统使用了已经存在多年的 Drupal\
  \ 8 开发范式。然而，紧接着，我们转向开创性的贡献模块，这些模块提供诸如 OpenAPI 实现、派生模式以及子请求等功能。我们还涵盖了缓存，这是实时生产构建成功的关键主题。\n\
  \n虽然创建扩展现有核心 REST 功能的自定义资源相对简单，但该过程确实需要在 Drupal 中创建一个自定义模块并具备一些 PHP 知识。幸运的是，Drupal\
  \ 插件系统在 Drupal 的文档中有很好的体现，对 `Plugin API` 的掌握为新手 Drupal 开发者打开了通往 Drupal 中许多其他功能扩展的大门。\n\
  \n得益于诸如 `JSON API Extras`、`JSON API Defaults`、`JSON-RPC`、`Subrequests` 和 `Decoupled\
  \ Router` 等项目，贡献模块生态系统对解耦 Drupal 架构的优势不可低估。提供模式和生成文档的模块（如 `Schemata` 和 `OpenAPI`）也是如此。尽管这些项目中的许多还不稳定且仍在大力开发中，但它们为核心功能中的特性路线图以及即将推出的核心功能（例如\
  \ Drupal 的 `JSON API` 实现）揭示了有前途的前进方向。\n\n最后，任何解耦 Drupal 架构都必须考虑其决策在投入生产后对性能的影响。有许多特性专门用于改善解耦\
  \ Drupal 的性能结果，特别是 Drupal 的缓存标签系统以及诸如反向代理和内容分发网络（CDN）等外部工具。尽管在缓存方面没有一刀切的解决方案，但对这些问题的坦诚考虑对于架构的成功至关重要。\n\
  \n为了结束我们对解耦 Drupal 世界的旅程，本书的最后一章讨论了解耦 Drupal 当前和即将出现的问题，以及解耦 Drupal 在中长期的发展前景。我们首先介绍活跃的\
  \ `Admin UI` 和 `JavaScript Modernization Initiative`，这是一个致力于将解耦 Drupal 的优势引入 Drupal\
  \ 自身管理界面的团队。最后，我们讨论了 Drupal 主题层的问题、Drupal 对开发者和编辑者的承诺的未来，以及 Drupal 在解耦 CMS 领域中的地位。\n\
  \n## 22. REST 插件系统\n\n与 Drupal 中的许多其他模块一样，RESTful Web 服务模块（参见第 [7] 章）可以通过额外的资源插件进行扩展，这些插件向\
  \ Drupal 核心 `REST API` 添加新的资源。由于 RESTful Web 服务模块是 Drupal 核心的一部分，并且我们绝不应在任何情况下修改\
  \ Drupal 核心代码，因此我们可以通过自定义模块添加资源插件。\n\n对于熟悉 PHP 的 Drupal 开发者来说，第一部分详细介绍的创建自定义模块的过程将会很熟悉，可以安全地跳过而直接阅读后续部分。对于那些对从\
  \ PHP 角度进行 Drupal 开发感兴趣，并希望扩展核心 `REST` 以包含定制资源的人来说，本章的全部内容将传授有用的知识。\n\n### 创建自定义模块\n\
  \n在 Drupal 8 中，下载的贡献模块位于 `/modules` 目录中。最佳实践是将所有不属于 Drupal 贡献模块生态系统的自定义模块放在 `/modules/custom`\
  \ 目录下以便区分。在 `/modules/custom` 目录中，创建一个您选择名称的新目录，例如 `extended_rest`。\n\n每个 Drupal\
  \ 模块都必须有一个 YAML 文件，在 Drupal 术语中称为 `.info.yml` 文件。YAML 文件表达有关 Drupal 模块的某些关键信息，例如其人类可读的名称、将出现在扩展页面（`/admin/modules`）上的描述、其适用的\
  \ Drupal 版本以及该模块的任何依赖项。\n\n例如，考虑我们新的 `extended_rest` 模块的 `.info.yml` 文件，该文件名为 `extended_rest.info.yml`，位于\
  \ `/modules/custom/extended_rest` 目录中。请注意，我们声明了对 RESTful Web 服务模块的依赖，因为我们将在其提供的插件之一上进行实现。\n\
  \n```\nname: Extended REST\ndescription: 'Adds custom resources to the Drupal core\
  \ REST API.'\npackage: Custom\ntype: module\ncore: 8.x\ndependencies:\n- drupal:rest\n\
  ```\n\n无需任何进一步操作，此时可以导航到扩展页面（`/admin/modules`）并在列表中看到您的模块，尽管启用它不会执行任何操作，因为我们还没有编写任何用于向核心\
  \ `REST API` 添加新资源的代码。^([(87)])\n\n> **注意**  \n> 您也可以使用 Drupal Console 通过命令 `drupal\
  \ generate:plugin:rest:resource` 来搭建一个已经包含生成的资源插件的自定义模块。有关使用此命令的更多信息，请查阅位于 [`https://hechoendrupal.gitbooks.io/drupal-console/content/en/commands/generate-plugin-rest-resource.html`](https://hechoendrupal.gitbooks.io/drupal-console/content/en/commands/generate-plugin-rest-resource.html)\
  \ 的 Drupal Console 文档。有关 Drupal Console 的更多信息，请查阅 [`https://drupalconsole.com`](https://drupalconsole.com)。^([(88)])\n\
  \n### 实现 REST 资源插件\n\n要添加我们的自定义 REST 资源，我们需要使用 Drupal 插件。在 Drupal 8 中，**插件** 是可替换的小功能单元。通常，负责相似功能的插件属于同一个\
  \ **插件类型**。在 REST 资源的情况下，涉及的插件是 `ResourceBase` 插件，它被用于其他 REST 资源的提供，例如数据库日志资源和通用实体资源。\n\
  \n下一步是我们在 Extended REST 模块中创建 `ResourceBase` 插件的实现。为此，我们严格遵守 Drupal 的模块文件和目录结构。在\
  \ `/modules/custom/extended_rest/src/Plugin/rest/resource` 目录中创建一个名为 `CustomResource.php`（或您喜欢为资源命名的任何名称）的文件。\n\
  \n请注意，您的目录结构应如下所示。\n\n\n```modules\n├── custom\n│   └── extended_rest\n│       ├──\
  \ extended_rest.info.yml\n│       └── src\n│           └── Plugin\n│           \
  \    └── rest\n│                   └── resource\n│                       └── CustomResource.php\n\
  ```\n\n在以下示例中，我们为承载逻辑的 PHP 类设置了一个命名空间，并使用了 `ResourceBase` 和 `ResourceResponse` 类，后者将负责处理响应的发送。\n\
  \n```php\n<?php\nnamespace Drupal\\extended_rest\\Plugin\\rest\\resource;\nuse Drupal\\\
  rest\\Plugin\\ResourceBase;\nuse Drupal\\rest\\ResourceResponse;\n```\n\n**注意**\
  \  \n关于 Drupal 插件系统的更多信息，请参阅 Drupal.org 上的插件 API 概述，网址为 [`https://www.drupal.org/docs/8/api/plugin-api/plugin-api-overview`](https://www.drupal.org/docs/8/api/plugin-api/plugin-api-overview)。\n\
  \n## 为 REST 资源插件添加注解\n\n下一步是添加插件注解，这可能是最重要的一步，因为它使插件实现能够被发现，并决定了我们的资源在 Drupal 中的呈现方式以及资源可用的\
  \ URI。我们通过在 `CustomResource` 类的文档块中表达一个 `@RestResource` 注解来实现这一点。\n\n```php\n/**\n\
  \ * 为核心 REST API 添加一个自定义资源。\n *\n * @RestResource(\n *   id = \"custom_resource\"\
  ,\n *   label = @Translation(\"自定义资源\"),\n *   uri_paths = {\n *     \"canonical\"\
  \ = \"/custom_resource/{id}\",\n *     \"https://www.drupal.org/link-relations/create\"\
  \ = \"/custom_resource\"\n *   }\n * )\n */\nclass CustomResource extends ResourceBase\
  \ {\n}\n```\n\n所示的 `uri_paths` 定义对于插件实现至关重要，该定义以链接关系类型为键，以部分 URI 为值。如果您选择不在 `uri_paths`\
  \ 定义中指定任何内容，Drupal 将根据插件标识符自动生成 URI，而不是依赖于我们定义的路径。为了进一步解释这一点，请考虑我们前面的定义缺少 `uri_paths`\
  \ 定义的情况。\n\n如果没有 `uri_paths` 定义，Drupal 将自动允许对以下路径使用以下方法。请注意 `POST` 与其他方法的区别。\n\n\
  ```http\nGET /custom_resource/{id}\nPATCH /custom_resource/{id}\nDELETE /custom_resource/{id}\n\
  POST /custom_resource\n```\n\n定义 `uri_paths` 还允许我们通过 REST 资源插件进行 API 版本管理，方法是每次需要递增\
  \ API 版本时，都可以添加具有不同 `uri_paths` 的新资源。请考虑以下示例文档块和注解。\n\n```php\n/**\n * 为核心 REST\
  \ API 添加一个自定义资源。\n *\n * @RestResource(\n *   id = \"custom_resource\",\n *   label\
  \ = @Translation(\"自定义资源\"),\n *   uri_paths = {\n *     \"canonical\" = \"/api/v1/custom_resource/{id}\"\
  ,\n *     \"https://www.drupal.org/link-relations/create\" = \"/api/v1/custom_resource\"\
  \n *   }\n * )\n */\n```\n\n**注意**  \n有关 Drupal 插件 API 中注解的更多信息，请查阅 [`https://www.drupal.org/docs/8/api/plugin-api/annotations-based-plugins`](https://www.drupal.org/docs/8/api/plugin-api/annotations-based-plugins)\
  \ 上的文档。关于 `POST` 请求中不常见的 `uri_paths` 键，请查阅 [`https://www.drupal.org/node/2811757`](https://www.drupal.org/node/2811757)。\n\
  \n## 在资源插件中提供响应\n\n现在我们已经为资源添加了注解，可以定义一个方法，并指示 Drupal 我们希望它如何响应该方法的请求。例如，考虑我们在以下示例中如何处理\
  \ `GET` 方法。在此示例中，由于我们的资源将是只读的（因为其他方法尚未实现），我们排除了除 `canonical` 路径之外的所有路径，并提供了一个单一资源。\n\
  \n```php\n/**\n * 为核心 REST API 添加一个自定义资源。\n *\n * @RestResource(\n *   id = \"custom_resource\"\
  ,\n *   label = @Translation(\"自定义资源\"),\n *   uri_paths = {\n *     \"canonical\"\
  \ = \"/custom_resource\",\n *   }\n * )\n */\nclass CustomResource extends ResourceBase\
  \ {\n  /**\n   * 处理 GET 请求的响应。\n   *\n   * @return \\Drupal\\rest\\ResourceResponse\n\
  \   */\n  public function get() {\n    $response = ['message' => 'Hello world!'];\n\
  \    return new ResourceResponse($response);\n  }\n}\n```\n\n如果您已启用 REST UI 模块（请参阅第\
  \ 8 章），您现在将看到自定义资源出现在可用 REST 资源列表中，并且该资源上的 `GET` 方法现在可配置，如图 22-1 所示。我们之前详细介绍的手动配置过程也是可行的。\n\
  \n![../images/468476_1_En_22_Chapter/468476_1_En_22_Fig1_HTML.jpg](img/468476_1_En_22_Fig1_HTML.jpg)\n\
  \n**图 22-1**  \n当我们为自定义资源添加 `GET` 请求处理时，它就会出现在 REST UI 中的可配置资源列表中。\n\n现在，我们可以通过发出以下请求来测试该资源是否确实提供了响应。\n\
  \n```http\nGET /custom_resource?_format=json HTTP/1.1\nAuthorization: Basic YWRtaW46YWRtaW4=\n\
  Content-Type: application/json\n```\n\n我们将从 Drupal 收到以下响应，如图 22-2 所示。\n\n![../images/468476_1_En_22_Chapter/468476_1_En_22_Fig2_HTML.jpg](img/468476_1_En_22_Fig2_HTML.jpg)\n\
  \n**图 22-2**  \n我们的自定义资源以 `200 OK` 响应码和我们期望的响应负载向我们致意。\n\n```json\n{\n  \"message\"\
  : \"Hello world!\"\n}\n```\n\n**注意**  \n关于正在使用的 REST 资源插件的更多示例，请分别查阅位于 [`https://github.com/drupal/drupal/blob/8.6.x/core/modules/dblog/src/Plugin/rest/resource/DBLogResource.php`](https://github.com/drupal/drupal/blob/8.6.x/core/modules/dblog/src/Plugin/rest/resource/DBLogResource.php)\
  \ 和 [`https://github.com/drupal/drupal/blob/8.6.x/core/modules/rest/src/Plugin/rest/resource/EntityResource.php`](https://github.com/drupal/drupal/blob/8.6.x/core/modules/rest/src/Plugin/rest/resource/EntityResource.php)\
  \ 的 `DBLogResource` 和 `EntityResource` 插件实现。\n\n### 结论\n\n如您所见，REST 插件系统是快速配置新资源以供使用者使用的有效手段。在本章中，我们介绍了\
  \ REST 资源插件实现中一些最重要的元素，包括模块创建、注解和响应处理。掌握了这些以及其他插件实现，您就可以让 Drupal 提供各种各样的资源。\n\n\
  在下一章中，我们将介绍解耦式 Drupal 生态系统中的一些贡献模块，这些模块有助于高级用例，例如远程过程调用（RPC）、性能改进、处理修改后的路径以及为 JSON\
  \ API 配置默认值和其他设置。接下来，我们将探索 JSON API Extras、JSON API Defaults、JSON-RPC、Subrequests\
  \ 和 Decoupled Router 模块。\n\n"
- "# 脚注\n\n23. 高级用例的贡献模块\n\n\n## JSON API 扩展、JSON API 默认值、JSON-RPC 与子请求\n\n尽管 `JSON\
  \ API`、`RELAXed Web Services` 和 `GraphQL` 模块（见第 12)–14) 章）都是规范的实现并提供 Web 服务，但其他贡献模块则提供了与\
  \ Web 服务提供相邻或相关但并非直接核心的功能，这些功能在各个方面为开发者带来便利，无论是改善开发者体验还是用户体验。在本章中，我们将介绍该领域一些最流行的模块。\n\
  \n例如，`JSON API Extras` 和 `JSON API Defaults` 扩展了 `JSON API` 模块，提供了覆盖 `JSON API`\
  \ 模块默认配置的能力。同时，`JSON-RPC` 允许开发者访问 Drupal 中非 RESTful 且无法通过 API 请求轻松执行的某些操作。最后，`Subrequests`\
  \ 通过支持链式请求来缓解性能问题，而 `Decoupled Router` 则确保资源即使在其 URL 随时间变化时也能正确解析。\n\n### JSON API\
  \ Extras\n\n`JSON API` 模块最重要的优势之一在于它需要零配置。我们只需启用该模块，即可获得一个符合 JSON API 规范的 API。然而，在许多情况下，你可能希望覆盖该模块提供的某些默认设置。为此，我们需要利用\
  \ `JSON API Extras` 模块，该模块也随 Contenta 发行版（见第 15) 章）一起提供，由 Mateu Aguiló Bosch（`e0ipso`）编写。\n\
  \n`JSON API Extras` 模块提供了覆盖默认设置并建立结果 API 应遵循的新设置的接口。目前，其功能包括常见需求，例如：启用和禁用单个资源、为资源名称和路径设置别名、禁用实体中的单个字段、为字段名称设置别名，以及通过使用\
  \ Drupal 字段增强器来修改字段输出。^(⁸⁹)\n\n要安装 `JSON API Extras` 模块，请使用以下命令。如果 `JSON API` 尚未安装，Composer\
  \ 可以为您获取它。\n\n```bash\n$ composer config repositories.drupal composer https://packages.drupal.org/8\n\
  $ composer require drupal/jsonapi_extras\n$ drush en -y jsonapi_extras\n```\n\n\
  导航到 **配置** ➤ **JSON API 覆盖** (`/admin/config/services/jsonapi`)，其中的 JSON API 资源配置页面列出了所有通过\
  \ JSON API 启用和公开的资源，并反映了每个预设的默认值。例如，考虑 `node--article` 资源，点击该行右侧的 **覆盖** 按钮。\n\n\
  如图 23-1 所示，我们可以实施多种更改，这些更改可能改善消费者应用程序的开发者体验，而在这些应用中，Drupal 的包（Bundle）是完全无意义的。界面的第一部分允许我们：禁用所讨论的资源、更改在集合检索时调用的类型名称（例如，从\
  \ `node--article` 改为 `articles`），或更改资源可用的路径（例如，从 `/jsonapi/node/article` 改为 `/jsonapi/articles`）。\n\
  \n![../images/468476_1_En_23_Chapter/468476_1_En_23_Fig1_HTML.jpg](img/468476_1_En_23_Fig1_HTML.jpg)\n\
  \n**图 23-1** 使用 `JSON API Extras` 禁用单个资源、覆盖资源类型以及覆盖请求资源的路径\n\n在图 23-2 所示的界面第二部分，我们可以看到：我们可以禁用响应中出现的单个字段、为字段名称设置别名，并且（单击\
  \ **高级** 按钮后）选择一个字段增强器以不同方式装饰响应中的字段值。得益于 `JSON API Extras`，我们可以利用广泛的功能集来丰富我们的响应，从而加速下游的消费者开发。\n\
  \n![../images/468476_1_En_23_Chapter/468476_1_En_23_Fig2_HTML.jpg](img/468476_1_En_23_Fig2_HTML.jpg)\n\
  \n**图 23-2** 我们还可以禁用单个字段，使其不出现在响应中；为消费者设置字段名称别名；或者使用 Drupal 字段增强器，在字段进入序列化响应之前修改其输出\n\
  \n> **注意**  \n> `JSON API Extras` 模块可在 Drupal.org 上获取：[`www.drupal.org/project/jsonapi_extras`](https://www.drupal.org/project/jsonapi_extras)。\n\
  \n### JSON API Defaults\n\n由 Martin Kolar（`mkolar`）维护的 `JSON API Defaults` 模块允许我们为资源设置默认的包含项和过滤器，但它仍处于不稳定和开发阶段。`JSON\
  \ API Defaults` 在以下场景中特别有用：消费者希望发出更精简的请求，而不需要为生成包含关系的特定响应而提供参数。简而言之，您可以对资源发出不带任何参数的请求，并收到具有预定义默认值的响应，即使响应中缺少指示此类特征的参数。^(⁹⁰)\n\
  \n> **注意**  \n> `JSON API Defaults` 模块可在 Drupal.org 上获取：[`www.drupal.org/project/jsonapi_defaults`](https://www.drupal.org/project/jsonapi_defaults)，但它仍处于不稳定和积极开发阶段。\n\
  \n#### JSON-RPC\n\n有时，Drupal 中更多的功能需要提供给消费者应用的开发者，因为检索和操作内容对于消费者应用的需求来说是不充分的。此外，许多解耦式\
  \ Drupal 实践者正在探索编辑界面，这些界面虽然基于 Drupal，但通常需要能够执行关键的 Drupal 操作，例如运行 cron 任务或重建缓存注册表。\n\
  \n由 Mateu Aguiló Bosch（`e0ipso`）和 Gabriel Sullice（`gabesullice`）维护的 `JSON-RPC` 模块在\
  \ Drupal 中提供了一种无状态、轻量级的协议，用于执行 **远程过程调用**（RPC），^(⁹¹) 这些调用在另一个系统上执行过程（或子程序），但编写方式如同本地操作，无需直接编码远程操作。^(⁹²)\
  \ 它旨在用于 Drupal 中任何无法通过 REST 表示的函数，其使命是作为构建 Drupal 管理和自省界面的规范基础。尽管核心 REST 提供了创建自定义资源的能力，但某些\
  \ Drupal 操作（如缓存重建）无法通过任何 RESTful API 实现。\n\n简而言之，消费者应用的开发者可以使用 `JSON-RPC` 模块在 JavaScript\
  \ 或原生应用中包含界面，以触发 Drupal 中的某些任务，例如将站点置于维护模式。此外，`JSON-RPC` 还会暴露 Drupal 数据库中的某些内部细节，例如权限和已启用模块的列表。\n\
  \n要安装 `JSON-RPC` 模块，请使用以下命令。请确保使用 **使用 JSON-RPC 服务** 权限为希望访问 `JSON-RPC` 的角色授予权限。对于某些任务，您可能还需要\
  \ **管理站点配置** 权限。\n\n```bash\n$ composer config repositories.drupal composer https://packages.drupal.org/8\n\
  $ composer require drupal/jsonrpc\n$ drush en -y jsonrpc jsonrpc_core\n```\n\n要发现可用的\
  \ `JSON-RPC` 方法，您可以通过首先安装 `JSON-RPC Discovery` 子模块（该子模块依赖于 Serialization 模块）来自省\
  \ `JSON-RPC` API。\n\n```bash\n$ drush en -y jsonrpc_discovery\n```\n\n\n\n从那时起，你可以向\
  \ Drupal 后端发送 `GET` 请求到 `/jsonrpc/methods`，以检索文档并查看详细用法信息。\n\n要向 Drupal 服务器发送 JSON-RPC\
  \ 调用以触发非 RESTful 操作，我们需要创建一个包含 `Authorization` 标头（使用基本认证）的 `POST` 请求。请求正文需要符合 JSON-RPC\
  \ 规范。\n\n对于仅强制 `GET` 请求的内容分发网络（CDN），还有一种替代方法，涉及向 `/` 发送带有 `?query=` 参数的 `GET` 请求。但这要求\
  \ JSON 进行 URL 编码。\n\n考虑以下请求，我们可以用它来远程重建 Drupal 的缓存注册表。你还可以在图 23-3 中看到该请求。\n\n```\
  \ http\nPOST /jsonrpc HTTP/1.1\nAuthorization: Basic YWRtaW46YWRtaW4=\nContent-Type:\
  \ application/json\n{\n\"jsonrpc\": \"2.0\",\n\"method\": \"cache.rebuild\"\n}\n\
  ```\n\n在 `GET` 情况下，请求将如下所示。\n\n``` http\nGET /?query=%7B%22jsonrpc%22%3A%222.0%22%2C%22method%22%3A%22cache.rebuild%22%7D\
  \ HTTP/1.1\nAuthorization: Basic YWRtaW46YWRtaW4=\nContent-Type: application/json\n\
  ```\n\n如你所见，现在我们已从消费者的角度远程重建了缓存注册表。\n\n![../images/468476_1_En_23_Chapter/468476_1_En_23_Fig3_HTML.jpg](img/468476_1_En_23_Fig3_HTML.jpg)\n\
  \n**图 23-3**\n一个 `204 No Content` 响应表示我们的 JSON-RPC 调用在清除所有缓存的情况下成功了。\n\n对于一个更复杂的例子，我们可以请求列出\
  \ Drupal 站点中所有可用的权限，然后我们可以在消费者中使用它来创建一个权限视图。考虑以下请求，它请求一个权限列表，其中 `uid` 为 2 的用户的上限为\
  \ 5，偏移量为 0。\n\n``` http\nPOST /jsonrpc HTTP/1.1\nAuthorization: Basic YWRtaW46YWRtaW4=\n\
  Content-Type: application/json\n{\n\"jsonrpc\": \"2.0\",\n\"method\": \"user_permissions.list\"\
  ,\n\"params\": {\n\"page\": {\n\"limit\": 5,\n\"offset\": 0\n}\n},\n\"id\": 2\n\
  }\n```\n\n表 23-1 列出了一些你在开发过程中可能用到的最常见的 JSON-RPC 方法。\n\n**表 23-1**\nJSON-RPC 方法及其参数\n\
  \n| JSON-RPC 方法 | 描述 | 参数 |\n| --- | --- | --- |\n| `cache.rebuild` | 重建系统缓存 | 无\
  \ |\n| `maintenance_mode.isEnabled` | 启用或禁用维护模式 | `enabled` |\n| `user_permissions.add_permission_to_role`\
  \ | 将给定权限添加到指定角色 | `permission, role` |\n| `user_permissions.list` | 列出站点中所有可用权限\
  \ | `page (limit, offset)` |\n| `plugins.list` | 列出已定义的插件 | `page (limit, offset),\
  \ service` |\n| `route_builder.rebuild` | 重建应用的路由器（如果重建成功，结果为 `TRUE`，否则为 `FALSE`)\
  \ | 无 |\n\n**注意**\nJSON-RPC 模块在 Drupal.org 上可用，位于 [`https://www.drupal.org/project/jsonrpc`](https://www.drupal.org/project/jsonrpc)。请谨慎使用，因为它仍处于测试阶段。JSON-RPC\
  \ 调用的示例可以在 Postman 集合中找到，位于 [`https://www.getpostman.com/collections/04e08782cde9fbf64f44`](https://www.getpostman.com/collections/04e08782cde9fbf64f44)。未实现的\
  \ API 列表可以在 [`https://www.drupal.org/project/drupal/issues/2913790`](https://www.drupal.org/project/drupal/issues/2913790)\
  \ 找到。有关 JSON-RPC 背后动机的更多信息，请参阅 Mateu Aguiló Bosch 在 Lullabot 上发表的文章“JSON-RPC to\
  \ Decouple Everything Else”，网址为 [`https://www.lullabot.com/articles/jsonrpc-to-decouple-everything-else`](https://www.lullabot.com/articles/jsonrpc-to-decouple-everything-else)。\n\
  \n#### 子请求\n\n在利用 JSON API 作为 Web 服务解决方案时，我们尚未涉及的一个领域是其对性能的影响。毕竟，使用 JSON API 而不是核心\
  \ REST 等替代方案的主要动机之一是，由于能够处理相关实体的包含关系，从而减少了对多个连续请求的需求。尽管如此，如果你使用的是 HTTP/1.1，通常仍然需要顺序请求，因为在消费者中所需的一切并不总能通过单个请求处理。\n\
  \nJSON API 模块的维护者 Mateu Aguiló Bosch 将文章创建作为性能缺陷的一个例子。例如，要远程创建一个关联了许多分类术语的文章，我们需要先创建这些分类术语，因为文章创建要求我们提供分类术语\
  \ ID。然而，要做到这一点，我们还需要创建一个词汇表来处理这些分类术语。虽然在某些消费者身上，许多这些操作可以并行进行，但许多其他消费者却没有这种便利。正如\
  \ Aguiló Bosch 精辟地指出的那样，“每个消费者都可以有自己的想法来决定如何发出请求，以及这些请求是否可以被并行化。”^(⁹³)\n\n与其发出连续请求并损害性能，我们可以利用子请求（`Subrequests`）模块在单个请求中处理许多\
  \ JSON API 操作，特别是那些足够简单以至于无需人工输入的操作。图 23-4 说明了子请求的工作原理。\n\n![../images/468476_1_En_23_Chapter/468476_1_En_23_Fig4_HTML.jpg](img/468476_1_En_23_Fig4_HTML.jpg)\n\
  \n**图 23-4**\n子请求如何链接有依赖关系的请求\n\n要安装子请求，请执行以下命令。请注意，子请求依赖于几个第三方库，处理这些库需要 Composer\
  \ 或 Composer Manager。^(⁹⁴)\n\n```\n$ composer require drupal/subrequests:².0\n$\
  \ drush en -y subrequests\n```\n\n**注意**\n子请求模块在 Drupal.org 上可用，位于 [`https://www.drupal.org/project/subrequests`](https://www.drupal.org/project/subrequests)。它也被包含在\
  \ Contenta 发行版中（见第 15 章），并与 Contenta.js 集成（见第 16 章）。\n\n##### 子请求蓝图\n\n在子请求中，一个被称为*蓝图*的\
  \ JSON 文档包含一组指令，说明如何在一次 Drupal 引导中执行相互依赖的连续请求。子请求蓝图使用占位符代替 Drupal 将创建的未实现值。通过这种方式，我们可以将蓝图视为没有标识符的请求。后续成功响应将用正确的标识符填充这些占位符。\n\
  \n对子请求的请求采用以下格式。请注意，`Content-Type` 标头是必需的，以便处理蓝图的前端控制器能够解释请求。\n\n``` http\nPOST\
  \ /subrequests HTTP/1.1\nAuthorization: Basic YWRtaW46YWRtaW4=\nContent-Type: application/json\n\
  ```\n\n还有一种使用 `GET` 的替代方法，类似于我们在 JSON-RPC 中发出 `GET` 请求的方式（见上一节），请求正文包含在附加到 `/subrequests?query=`\
  \ 的百分比编码字符串中。\n\n**注意**\n关于用法，从现在开始，我们使用*子请求*（大写）来指代子请求模块，并将使用*subrequest*（小写）来指代单个的子请求或组成请求。\n\
  \n蓝图本身被构造成一个包含多个请求对象的数组，每个请求对象代表一个 Drupal 预期执行的请求。蓝图中的每个子请求都包含表 23-2 中列出的属性。`action`\
  \ 和 `uri` 属性是推荐的，其他属性是可选的。^(⁹⁵)\n\n**表 23-2**\n子请求属性\n\n\n\n##### 子请求属性\n\n| 属性\
  \ | 描述 | 示例值 |\n| --- | --- | --- |\n| `action` | 子请求将要执行的操作类型 | `view, create,\
  \ update, replace, delete, exists, discover` |\n| `uri` | 子请求的 URI | `/jsonapi/node/article`\
  \ |\n| `requestId` | 子请求的唯一标识符，用于将其与某个部分响应相匹配 | `req-2` |\n| `body` | 子请求请求体的序列化内容\
  \ | 以 JSON 表示的某篇文章 |\n| `headers` | 一个键值对对象，键表示头部名称，值表示头部值 | `{ \"Content-Type\"\
  : \"application/json\" }` |\n| `waitFor` | 将另一个子请求的 `requestID` 表示为依赖项；在 `waitFor`\
  \ 请求给出响应之前，此子请求无法运行 | `req-1` |\n\n**注意：** 有关如何在子请求中形成请求的更完整规范，请查阅 [`https://www.drupal.org/project/subrequests`](https://www.drupal.org/project/subrequests)\
  \ 上的文档。\n\n## 处理请求依赖项\n\n在子请求蓝图中，先前的请求会以两种方式表现为后续请求中的依赖项：*请求依赖项*和*响应指针*（也称为*响应嵌入*）。如上一节所示，`waitFor`\
  \ 键很重要，因为它表示对前一个请求响应的依赖。虽然每个子请求只能声明对单个其他子请求的依赖，但我们可以通过将这些依赖项收集到一个单独的蓝图中，并将该蓝图所代表的子请求声明为依赖项，从而声明对一系列多个子请求的依赖。\n\
  \n通常，子请求需要来自对其他子请求响应中的信息。因此，子请求可以包含替换令牌（响应指针），这些令牌需要根据其共享蓝图中先前成功的子请求来解析。针对未完成的响应的替换令牌的格式如下，其中\
  \ `<request_id>` 表示依赖项子请求的请求标识符，`<location>` 表示令牌在子请求对象中的位置（例如，如果指针在请求体中则为 `body`），`<path_expression>`\
  \ 表示一个字符串，用于指定依赖项子请求响应中的哪一部分应替换该令牌。\n\n```\n{{/.@}}\n```\n\n例如，考虑以下示例响应指针。在此示例中，我们标识了包含所需值以替换令牌的先前请求（`req-1`）、先前响应中所需值的位置（`body`），以及如何通过遍历其中包含的对象（`$.data.id`）来访问它。请注意，遵循\
  \ JSONPath 规范的 `$` 在此情况下表示 `body` 的值。\n\n```\n{{/req-1.body@$.data.id}}\n```\n\n\
  **注意：** 如果顶层请求的 `Content-Type` 头部的值为 `application/json`，则响应指针应遵循位于 [`http://goessner.net/articles/JsonPath`](http://goessner.net/articles/JsonPath)\
  \ 的 JSONPath 规范。如果 `Content-Type` 为 `application/xml`，则响应指针应遵循位于 [`https://www.w3.org/TR/xpath20`](https://www.w3.org/TR/xpath20)\
  \ 的 XPath 2.0 规范。\n\n**警告：** 不要将响应指针用作 `requestId` 或 `waitFor` 属性的值。\n\n## 使用子请求蓝图\n\
  \n当所有组成子请求都已完成且所有响应都已填充后，Drupal 会向顶层请求发出一个统一的响应，该响应将每个子请求的响应作为数组成员包含在内。这些最终响应中的每一个都使用\
  \ `207 Multi-Status` 响应码，因为每个子请求都将包含其自身的响应码。对顶层请求的响应将附带 `Content-Type` 头部，其值为 `multipart/related`。\n\
  \n请考虑以下示例蓝图，它创建了一个分类术语，然后将其用于创建一篇文章。特别要注意第二个请求 `req-2` 中对 `waitFor` 的使用以及替换令牌 `{{/req-1.body@$.data.id}}`，该令牌针对\
  \ `req-1` 响应中 `data` 对象下的 `id` 属性，作为应填充占位符的信息。\n\n```\n[\n{\n\"requestId\": \"req-1\"\
  ,\n\"uri\": \"/jsonapi/taxonomy_term/tags\",\n\"action\": \"create\",\n\"body\"\
  : \"{\\\"data\\\":{\\\"type\\\":\\\"taxonomy_term--tags\\\",\\\"attributes\\\":{\\\
  \"name\\\":\\\"Cetaceans\\\",\\\"description\\\":{\\\"value\\\":\\\"Species that\
  \ are cetaceans\\\"},\\\"weight\\\":5},\\\"relationships\\\":{\\\"vid\\\":{\\\"\
  data\\\":{\\\"type\\\":\\\"taxonomy_vocabulary--taxonomy_vocabulary\\\",\\\"id\\\
  \":\\\"b4708a6b-5df8-4019-adab-870cbfb09fd6\\\"}}}}}\",\n\"headers\": {\n\"Accept\"\
  : \"application/vnd.api+json\",\n\"Content-Type\": \"application/vnd.api+json\"\
  ,\n\"Authorization\": \"Basic YWRtaW46YWRtaW4=\"\n}\n},\n{\n\"requestId\": \"req-2\"\
  ,\n\"waitFor\": [\"req-1\"],\n\"uri\": \"/jsonapi/node/article\",\n\"action\": \"\
  create\",\n\"body\": \"{\\\"data\\\":{\\\"type\\\":\\\"node--article\\\",\\\"attributes\\\
  \":{\\\"langcode\\\":\\\"en\\\",\\\"title\\\":\\\"Porpoises\\\",\\\"status\\\":\\\
  \"1\\\",\\\"promote\\\":\\\"1\\\",\\\"sticky\\\":\\\"0\\\",\\\"default_langcode\\\
  \":\\\"1\\\",\\\"body\\\":{\\\"value\\\":\\\"Porpoises are a group of fully aquatic\
  \ mammals that are sometimes referred to as mereswine, all of which are classified\
  \ under the family Phococenidae, parvorder Odontoceti, which means toothed whales.\\\
  \",\\\"format\\\":\\\"plain_text\\\",\\\"summary\\\":\\\"Porpoises are a group of\
  \ fully aquatic mammals that are sometimes referred to as mereswine.\\\"}},\\\"\
  relationships\\\":{\\\"type\\\":{\\\"data\\\":{\\\"type\\\":\\\"node_type--node_type\\\
  \",\\\"id\\\":\\\"article\\\"}},\\\"uid\\\":{\\\"data\\\":{\\\"type\\\":\\\"user--user\\\
  \",\\\"id\\\":\\\"1\\\"}},\\\"field_tags\\\":{\\\"data\\\":[{\\\"type\\\":\\\"taxonomy_term--tags\\\
  \",\\\"id\\\":\\\"{{/req-1.body@data.id}}\\\"}]}}}}\",\n\"headers\": {\n\"Accept\"\
  : \"application/vnd.api+json\",\n\"Content-Type\": \"application/vnd.api+json\"\
  ,\n\"Authorization\": \"Basic YWRtaW46YWRtaW4=\"\n}\n}\n]\n```\n\n**注意：** 您可以使用\
  \ Drupal PHP 中的 `json_encode()` 和 JavaScript 中的 `JSON.stringify()` 等方法创建您刚刚看到的序列化\
  \ JSON 对象。\n\n如您所见，子请求通过一种可被多个实现相同规范的消费者共享的方式，在性能方面带来了显著改善。无论如何，Drupal 始终以相同的方式解释这些链接的请求。\n\
  \n**注意：** 您可以使用页面缓存来加速组成子请求的交付。有关缓存技术的更多信息，请参见第 25 章。有关子请求动机的更多信息，请参见 Mateu Aguiló\
  \ Bosch 在 Lullabot 上发表的文章“使用子请求实现令人难以置信的解耦性能”，网址为 [`https://www.lullabot.com/articles/incredible-decoupled-performance-with-subrequests`](https://www.lullabot.com/articles/incredible-decoupled-performance-with-subrequests)。\n\
  \n\n\n### 解耦路由器\n\n同样由 Mateu Aguiló Bosch(e0ipso)编写的`解耦路由器`模块，对于计划采用以 Web 消费者（而非原生移动消费者）为核心的架构而言尤为重要。搜索引擎优化(SEO)和路由主要涉及浏览器端功能，用户看到的\
  \ URL 至关重要。\n\nDrupal 一直坚持让内容编辑者和站点构建者能够通过其*URL 别名*功能为 Drupal 渲染的页面指定不同的 URL。然而，虽然\
  \ Drupal 用户可以轻松更改这些路径（例如使用 Views REST 导出功能，参见第 11 章），但消费者端有时可能更脆弱，只有在请求失败时才会意识到\
  \ URL 发生了变化。\n\n例如，考虑一种情况：某个资源原本可通过`/api/airports/amsterdam-schiphol`这样的 URL 访问，但由于\
  \ URL 更改为`/api/airports/ams`，该资源不再存在于原位置。`解耦路由器`允许任何未更新路径的消费者通过 Drupal 将请求重定向到正确的路由。`解耦路由器`通过回答一个常见问题来实现这一点：“无论路径如何变化，当前路径下存在什么实体？”它会追踪\
  \ URL 的修改，使得一旦发生此类变化，Drupal 就能使用通用标识符（例如`node:21`）将路径解析到新位置，并从新路径返回正确的实体数据，而消费者对此毫不知情。^(⁹⁶)\n\
  \n> **注意**  \n> `解耦路由器`模块可在 Drupal.org 上获取，地址为[`https://www.drupal.org/project/decoupled_router`](https://www.drupal.org/project/decoupled_router)。关于`解耦路由器`的更多信息，请参阅\
  \ Mateu Aguiló Bosch 在 Lullabot 上发表的文章“Decoupled Drupal Hard Problems: Routing”，地址为[`https://www.lullabot.com/articles/decoupled-hard-problems-routing`](https://www.lullabot.com/articles/decoupled-hard-problems-routing)。`解耦路由器`也包含在\
  \ Contenta 发行版中（参见第 15 章），并与`Contenta.js`集成（参见第 16 章）。\n\n## 总结\n\n在本章中，我们介绍了几个以不同方式改善解耦\
  \ Drupal 实践者体验的模块，即`JSON API Extras`、`JSON API Defaults`、`JSON-RPC`、`Subrequests`和`解耦路由器`。`JSON\
  \ API Extras`和`JSON API Defaults`都提供了额外的用户界面以实现更丰富的配置，而`JSON-RPC`则通过 RPC 扩展了 Drupal\
  \ 的可操控性。同时，针对生产环境用例，`Subrequests`和`解耦路由器`分别解决了性能陷阱和资源 URL 变更的问题。\n\n在下一章中，我们将转换话题，讨论能够显著提升构建消费者应用的开发者体验的\
  \ Schema 和生成的文档。具体来说，我们将讨论自动生成 API 文档的前景，包括 Reservoir 引入的并排预览功能，以及管理此类 Schema 认知的工具（`OpenAPI`和`Schemata`模块）。最后，我们将简要探讨自动生成\
  \ API 文档的功能如何催生自动生成表单甚至完整的编辑界面。\n\n"
- "# 脚注\n\n## 24. Schema 与自动生成文档\n\n对于解耦 Drupal 实践者而言，提升构建消费者应用的开发者体验的最佳方法之一，是提供清晰的途径来访问概述\
  \ Drupal Web 服务中可用资源的 Schema，并基于该 Schema 使用自动生成的文档。在本章中，我们将重点关注贡献者在这两个领域所做的一些创新工作。\n\
  \nSchema 丰富了解耦 Drupal 架构，这不仅因为它们在内省 Web 服务方面的作用，还因为它们提供了超越软件开发本身的价值。例如，组织能够受益于描述逻辑数据模型(LDM)的能力，该模型可以跨越其数字生态系统中的所有\
  \ API 和消费者应用，从而促进更深入的理解和更好的数据协调。对于许多此类组织而言，Drupal 正扮演着这一核心角色。\n\n## Schemata\n\n\
  *Schema*是描述 JSON 文档形状的声明性描述，例如来自 Drupal Web 服务的典型实体响应。它们允许后端和前端开发者理解 API 如何处理请求以及服务器如何形成响应。Schema\
  \ 对于所有 Web 服务都是必不可少的，因为它们提供了一种简单的 API 测试查询无法实现的内省级别。\n\n简而言之，Schema 负责捕获从 Web 服务返回的任何\
  \ JSON 文档的结构，并以机器可读的方式呈现这些信息，以便其他需要集成的系统能够理解并处理相同的 Schema。在 Drupal 8 中，由 Adam Ross(Grayside)维护的**Schemata\
  \ 模块**负责提供 Schema 并促进自动生成文档（参见下一节）。\n\n健壮的 Schema 定义不仅为自动生成文档（这对构建消费者应用的开发者来说是一个关键特性）打开了大门，也为自动生成代码（参见本章最后一节）铺平了道路，我们可以针对\
  \ Schema 生成可用的表单。Schema 的另一个关键优势是*客户端验证*的潜力，即消费者端了解应如何形成请求的知识可以避免向服务器发送往返请求来执行验证。\n\
  \n在解耦 Drupal 架构中拥有众多消费者的最大缺点之一是，这些消费者会根据各自技术特性实现自己的表单，从而导致大量重复劳动。当我们需要在内容类型中添加新字段或从响应中删除字段时，情况会变得更糟，因为消费者中的所有表单都需要重构。\n\
  \nSchema 描述了 API 暴露的数据形状，但同时也负责 Web 服务的其他重要信息，例如资源是否可以被删除、是否公开、或者是否可以进行`POST`交互。由于这些内容并不存在于\
  \ Drupal 数据模型中，我们需要一个像`Schemata`模块这样的 Schema 提供者，以普遍理解的方式提供这些信息。^(⁹⁷)\n\n`Schemata`模块从核心\
  \ REST（参见第 7 章）的`序列化`模块中派生出数据模型的 Schema 定义，并支持针对序列化为 JSON、HAL+JSON 和 JSON API（仅内容实体）的实体的\
  \ JSON Schema 规范。利用 Drupal 8 新的类型化数据系统，`Schemata`支持一系列其他引人注目的功能，例如测试、代码生成、文档生成等。\n\
  \n要安装`Schemata`，请使用以下命令。\n\n```bash\n$ composer require drupal/schemata\n$ drush\
  \ en -y schemata\n```\n\n`Schemata`是一个精简模块，因为它支撑着子模块`Schemata JSON Schema`，该子模块实现了针对派生\
  \ Schema 的 JSON Schema 规范。因此，我们只应将`Schemata`与包含`序列化器`实现以定义 Schema 的附加模块结合安装。^(⁹⁸)\n\
  \n\n\n### Schemata JSON Schema\n\n要启用 `Schemata JSON Schema`，请使用以下命令。启用后，`Schemata\
  \ JSON Schema` 模块将添加 *访问不同数据模型* 的权限。\n\n```\n$ drush en -y schemata_json_schema\n\
  ```\n\n要在浏览器中浏览 schema，或发送返回 schema 响应的 `GET` 请求，我们需要使用符合 `Schemata` URL 格式的路径。考虑以下路径，其中\
  \ `{entity_type}` 代表实体类型，`{bundle}` 代表 bundle（Drupal 内容类型），`{output_format}` 代表期望的输出格式（除非您使用不同的序列化方式，否则为\
  \ `schema_json`），`{described_format}` 代表 schema 所描述的格式（例如 `json`、`hal_json`、`api_json`）。\n\
  \n```\n/schemata/{entity_type}/{bundle}?_format={output_format}&_describes={described_format}\n\
  ```\n\n例如，考虑以下示例，它获取 JSON API 中 Drupal 文章的一个 JSON schema。当我们使用适当的权限向该路径发送 `GET`\
  \ 请求时，会收到一个 `200 OK` 响应，如图 24-1 所示。\n\n```\n/schemata/node/article?_format=schema_json&describes=api_json\n\
  ```\n\n与 JSON API 中的类型处理不同（参见第 12 章），`Schemata` 要求我们在实体类型没有 bundle 时省略 bundle，如下例所示，它根据\
  \ `HAL+JSON` 格式检索用户的 JSON schema。\n\n```\n/schemata/user?_format=schema_json&describes=hal_json\n\
  ```\n\n![../images/468476_1_En_24_Chapter/468476_1_En_24_Fig1_HTML.jpg](img/468476_1_En_24_Fig1_HTML.jpg)\n\
  \n**图 24-1** 在此示例中，我们根据 JSON API 规范检索了一个描述 Drupal 文章结构的 schema。\n\n> **注意**  \n\
  > `Schemata` 模块可在 Drupal.org 上获取：[`www.drupal.org/project/schemata`](https://www.drupal.org/project/schemata)。有关\
  \ JSON Schema 规范的更多信息，请查阅 [`json-schema.org`](http://json-schema.org)。有关如何在 Drupal\
  \ 的 PHP 环境中使用 `Schemata` 的信息，请查阅 `README`：[`cgit.drupalcode.org/schemata/tree/README.md`](https://cgit.drupalcode.org/schemata/tree/README.md)。\n\
  \n## 生成的 API 文档\n\n生成的 API 文档并非新概念，流行的例子包括 `OpenAPI`（以前称为 Swagger 规范）和 `API Blueprint`。在许多情况下，从业者使用这些技术来描述和原型化一个\
  \ API 规范。在 Drupal 的案例中，我们使用 API 文档技术来描述一个已存在的 API 规范。\n\n像 `OpenAPI` 和 `API Blueprint`\
  \ 这样的规范也通常是 *API 设计* 工具的一部分，因为它们可以被那些只想在 API 工作原型中尝试和测试不同场景的开发人员使用。此外，流水线开发（参见第\
  \ 5 章）的前景也变得更加可行，因为像 `API Blueprint` 这样的工具可以促进 *虚拟 API* 的创建，当后端开发人员正在提供将提供 API 的\
  \ Web 服务时，消费应用程序的开发人员可以针对这些虚拟 API 进行工作。\n\n对于消费应用程序的开发人员来说，生成的 API 文档可能是一个巨大的福音，因为它消除了向\
  \ API 发送测试请求以确定 schema 结构以及后端对请求的期望的需要。例如，`Reservoir`（参见第 15 章）是第一个为了消费开发人员的利益而引入资源\
  \ JSON 表示及其 Drupal 渲染的并排预览概念的项目，这个想法迅速被 `Contenta` 和 `Headless Lightning`（参见第 15\
  \ 章）所采纳。\n\n> **注意**  \n> 有关 `API Blueprint` 的更多信息，请访问网站 [`apiblueprint.org`](https://apiblueprint.org)。我们将在下一节介绍\
  \ `OpenAPI`。\n\n## OpenAPI\n\n`OpenAPI`（以前称为 Swagger 规范）是一个用于描述 RESTful Web 服务的规范，此外还具有生成、消费和可视化这些服务等功能。其目的是在开发人员之间为记录\
  \ API 创建一个共享标准。`OpenAPI` 最初是 Swagger 整体框架的一部分，但在 2016 年，它成为了由 Linux 基金会领导的一个独立计划的一部分。请注意，`OpenAPI`\
  \ 与 Swagger 规范是同义词，而术语 *Swagger* 指的是实现该规范的工具生态系统。\n\n给定一个包含 API 详细信息的接口文件，Swagger\
  \ 生态系统能够基于可用的 Web 服务生成文档、测试用例，甚至可工作的代码。Swagger 生态系统中的一些工具包括 `Swagger UI`、`Swagger\
  \ Codegen` 和 `Paw`。\n\n由 Rich Gerdes (richgerdes) 和 Ted Bowman (tedbow) 维护的 `OpenAPI`\
  \ 模块是 Drupal 对该 API 的实现，它与核心 REST（参见第 7 章）和 Drupal 的 JSON API 实现（参见第 8 章和第 12 章）集成，以记录这些\
  \ Web 服务中可用的实体路由。您还可以创建便于其他自定义集成的插件。`OpenAPI` 模块依赖于 `Schemata`（参见本章第一节）、`Serialization`\
  \ 和 `Schemata in JSON Schema` 模块。\n\n另一个独立的模块 `OpenAPI UI` 模块负责在渲染后的 Drupal 前端上提供面向用户的文档，该文档描述了兼容的\
  \ API。但是，您需要安装一个解析 `OpenAPI` 文档的用户界面库。`OpenAPI UI` 模块推荐的选项是 `ReDoc`，这是一个 JavaScript\
  \ 库，允许用户浏览 Web 服务的 API 文档，并包含在 `ReDoc for OpenAPI UI` 模块中。还有一个 `Swagger for OpenAPI\
  \ UI` 模块，它与 `Swagger UI` 集成。\n\n为您的 Drupal 站点上可用的 Web 服务生成 API 文档的最简单方法是安装所有这些模块。在具有核心\
  \ REST 或 JSON API 中已有 Web 服务的 Drupal 站点上执行以下命令。由于 `ReDoc for OpenAPI UI` 依赖于 `OpenAPI\
  \ UI`，因此 `OpenAPI UI` 依赖项将被自动获取。\n\n```\n$ composer require drupal/openapi\n$ composer\
  \ require drupal/openapi_ui_redoc\n$ drush en -y openapi openapi_ui_redoc\n```\n\
  \n要改为安装 `Swagger for OpenAPI UI`，请使用以下命令。\n\n```\n$ composer require drupal/openapi\n\
  $ composer require drupal/openapi_ui_swagger\n$ drush en -y openapi openapi_ui_swagger\n\
  ```\n\n我们现在可以通过导航到 配置 ➤ OpenAPI (`/admin/config/services/openapi`) 来查看我们的文档，在那里我们可以下载\
  \ Swagger 规范 JSON 文件供个人使用，或者使用 `ReDoc` 浏览文档，如图 24-2 所示。\n\n![../images/468476_1_En_24_Chapter/468476_1_En_24_Fig2_HTML.jpg](img/468476_1_En_24_Fig2_HTML.jpg)\n\
  \n**图 24-2** OpenAPI 资源页面为我们提供了下载 API 规范文件或使用我们已安装的库浏览生成的文档的功能。\n\n> **注意**  \n\
  > `OpenAPI` 模块可在 Drupal.org 上获取：[`www.drupal.org/project/openapi`](https://www.drupal.org/project/openapi)。`OpenAPI\
  \ UI` 模块可在 Drupal.org 上获取：[`www.drupal.org/project/openapi_ui`](https://www.drupal.org/project/openapi_ui)。`ReDoc\
  \ for OpenAPI UI` 模块可在 Drupal.org 上获取：[`www.drupal.org/project/openapi_ui_redoc`](https://www.drupal.org/project/openapi_ui_redoc)。`Swagger\
  \ for OpenAPI UI` 模块可在 Drupal.org 上获取：[`www.drupal.org/project/openapi_ui_swagger`](https://www.drupal.org/project/openapi_ui_swagger)。\n\
  \n\n\n### 生成代码\n\n提供符合标准的 API 规范文档（如 OpenAPI 规范）最令人信服的理由之一在于，同一份文档不仅可以用于生成文档和测试用例，还能生成实际可运行的代码。当前\
  \ API 规范工具的前沿能力是基于 API 规范生成通用表单乃至完整界面。\n\n一个典型例子是`Swagger Codegen`，它能够生成用于构建消费者应用的服务器存根和\
  \ SDK。^(¹⁰³) 另一个生成表单的例子是`react-jsonschema-form`，该工具能够根据 Bootstrap 约定生成 React 组件（参见第\
  \ 15 章），它解释 JSON schema（例如由`Schemata`模块提供的 schema），并生成与 schema 集成的完整 HTML 表单。^(¹⁰⁴)\n\
  \n对这两个项目的全面介绍远超本书范围，但基于 API 规范和 schema 的代码生成，已成为处理 Web 服务领域最重要的当前趋势之一，预示着我们在前端表单与后端业务逻辑耦合方式上的范式转变。\n\
  \n**注**：关于`Swagger Codegen`的更多信息，请访问[`https://swagger.io/tools/swagger-codegen`](https://swagger.io/tools/swagger-codegen)。关于`react-jsonschema-form`的更多信息，请访问[`https://github.com/mozilla-services/react-jsonschema-form`](https://github.com/mozilla-services/react-jsonschema-form)。\n\
  \n## 总结\n\n当前普遍理解的 API 规范和自动生成 API 文档的发展势头，预示着消费者与 Web 服务交互方式的新纪元。特别是，schema 有助于更深入地内省数据，而自动生成的文档在构建消费者应用时能显著提升开发者体验。最后，那些根据\
  \ schema 或 API 规范生成实际可运行代码的新兴工具，正在重塑我们对客户端/服务器关系的认知。\n\n在下一章中，我们将介绍一些在解耦 Drupal\
  \ 项目中日趋重要的最佳实践，包括反向代理以及结合 Drupal 缓存标签系统的使用。在此过程中，我们将讨论用于驱动解耦 Drupal 架构缓存的一些最知名技术。\n\
  \n"
- "# 脚注\n\n## 25. 缓存\n\n对于任何高性能的解耦 Drupal 架构而言，缓存至关重要，但由于不同实现之间的差异，它又充满了极大的变数。加之开源解决方案范围有限（尽管有`Contenta.js`，参见第\
  \ 16 章）能够作为反向代理提升消费者应用性能，这使得缓存问题更加复杂。\n\n本章将介绍解耦 Drupal（相较于单体 Drupal 架构）中的一些缓存用例，为何反向代理比内部对象缓存更适合缓存，Drupal\
  \ 缓存标签系统的工作原理，以及缓存索引和失效的最佳实践。由于没有两种实现是完全相同的，单一的章节无法穷尽每种性能场景下的所有缓存方案，但本章会为您自己的解耦\
  \ Drupal 架构提供一些可能的研究方向。\n\n## 解耦 Drupal 中的缓存用例\n\n在 2018 年“解耦 Drupal 日”上，David Strauss\
  \ 在其演讲《有效的 API 缓存：当客户端是解耦前端时实现高命中率》中，指出了利用缓存架构进行解耦 Drupal 的三个最常见用例，其中许多与第 5 章概述的解耦\
  \ Drupal 优势相呼应。\n\n支持在 Drupal 实例与任何消费者实例之间使用强大缓存层的主要论点之一是*安全性*。单体 Drupal 架构极易受到攻击媒介的攻击，而利用反向代理等缓存系统可以缓解恶意行为者利用漏洞的某些途径。\n\
  \n另一个动机是*个性化*。如今，许多用户体验根据用户品味变得越来越动态和个性化，当大量用户开始请求内容时，服务器的负担变得非常沉重。在单体 Drupal 中基于个性化数据生成整个页面可能很简单，但防止对高度个性化的\
  \ API 响应的请求触发完整的 Drupal 引导过程则极具挑战性。在解耦 Drupal 中，针对大规模个性化体验的健壮缓存是硬性要求。\n\n最后，技术在全球的普及导致了*地理分布广泛的动态用户*激增，这些用户从远离数据中心实际位置的地方访问内容。这些来自世界各地的用户越来越期望获得与附近用户相同的良好体验。^(¹⁰⁵)\n\
  \n## Drupal 缓存标签系统\n\nDrupal 8 中最重要且引人注目的特性之一是*缓存标签系统*，它允许缓存项通过*缓存标签*声明对其他缓存项的依赖。简而言之，缓存标签提供了一种声明式方法，让我们能够追踪缓存项如何依赖\
  \ Drupal 管理的数据。缓存标签是字符串，并在字符串集合中传输，最常见的是在标头中传输。^(¹⁰⁶) 一种有用且形象的方式来思考缓存标签集合，是将它们视为标识产品成分的配料表；当某种成分改变时，整个产品都需要反映该更新。\n\
  \n在解释缓存标签的工作原理之前，我们应先确定 Drupal 缓存标签系统有用的一些场景。在当今的 Drupal 中，许多用户生成的内容不仅在其自身页面上渲染，还会在区块（可重复的页面组件）、视图显示或视图\
  \ REST 导出（参见第 11 章）中渲染。当内容更新时，我们希望该内容的每一个实例（无论位于何处）都能反映该内容的最新状态。简而言之，无论内容项位于何处，我们都需要使其失效。\n\
  \n通过在 Drupal 中对特定内容实体声明缓存标签，我们可以确保：无论某个缓存项在何处包含了该内容实体的缓存项，该缓存项都会被失效，转而使用该内容的更新版本。\n\
  \n缓存标签采用以下形式，其中`{object}`是需要缓存的对象（例如，节点、用户、配置等），`{identifier}`是该对象在 Drupal 中的标识符。\n\
  \n```\n{object}:{identifier}\n```\n\n当对象只有一个实例或多个实例不可能存在时，则不需要标识符（从而形成`{object}`格式）。除了不能包含空格外，缓存标签语法没有其他限制。请参考表\
  \ 25-1 中的缓存标签示例，这些示例反映了常见需求。\n\n**表 25-1** 缓存标签示例\n\n| 缓存标签 | 描述 |\n|---|---|\n\
  | `node:53` | 标识符为 53 的节点实体的缓存标签，当该实体变更时失效 |\n\n\n\n`user:2` — 标识符为 2 的用户实体缓存标签，当实体发生变化时失效。\n\
  \n`node_list` — 所有节点实体的列表缓存标签，当任何节点实体被添加、修改或删除时失效。\n\n`library_info` — 资源库的缓存标签，当任何资源库被添加、修改或删除时失效。\n\
  \nDrupal 为**实体**（缓存标签格式：`{entity_type}:{entity_identifier}`）、**配置**（缓存标签格式：`config:{configuration_name}`）和**自定义场景**（例如\
  \ `library_info`）处理缓存标签。在接下来的章节中，我们将讨论如何在反向代理和内容交付网络（CDN）的上下文中使用缓存标签，这是在解耦式 Drupal\
  \ 架构中进行数据缓存的两种最常见方法。\n\n> **注意**  \n> 有关 Drupal 缓存标签系统的更多详细信息，请查阅文档 [`https://www.drupal.org/docs/8/api/cache-api/cache-tags`](https://www.drupal.org/docs/8/api/cache-api/cache-tags)。\n\
  \n## 反向代理与内容交付网络\n\n尽管一些 Drupal 开发者选择将所有缓存维护在 Drupal 内部，并依靠内部页面缓存等工具进行缓存失效处理，但这在解耦式\
  \ Drupal 架构中意义不大，因为我们需要在 API 响应发送到消费方服务器后对其进行缓存。许多 Drupal 开发者选择在使用整体式架构时使用反向代理和\
  \ CDN，但它们在解耦式场景中可能更为有用。\n\n定义一些术语：**反向代理**是一种代理服务器，代表消费方向服务器发出请求，并代理消费方发起请求。^(¹⁰⁷)\
  \ 反向代理不仅是缓存方面的热门工具，还能提供统一的方式将请求转发至 Drupal 实例。同时，CDN 是分布式的代理服务器网络，无论最终用户位于何处，都能确保高可用性和高性能。^(¹⁰⁸)\
  \ 在许多情况下，CDN 可以替代解耦式 Drupal 架构中的反向代理。\n\n在 Drupal 中，通常将 Varnish（一种 HTTP 反向代理，可置于任何使用\
  \ HTTP 通信的服务器之前）置于 Drupal 实例之前。^(¹⁰⁹) 其他 Drupal 实践者则选择使用 Redis（一种键/值缓存和存储，也被称为数据结构服务器）或\
  \ Memcached（一种分布式内存缓存系统）等解决方案。\n\nStrauss 在其演讲中告诫，不要使用位于前端的对象缓存来为解耦式 Drupal 架构提供缓存支持，因为如图\
  \ 25-1 所示，这会产生一致性问题。例如，如果你有一个 Node.js 服务器位于 Memcached 实例之前，Node.js 代替 Drupal 从 Memcached\
  \ 中检索数据，那么 Drupal 就需要知道如何使 Node.js 服务器前的 Memcached 实例失效。换句话说，所有前端和后端实例现在都在与同一个 `cache`\
  \ 进行通信。\n\n![../images/468476_1_En_25_Chapter/468476_1_En_25_Fig1_HTML.jpg](img/468476_1_En_25_Fig1_HTML.jpg)\n\
  \n**图 25-1** 在此场景中，消费方和 Drupal 都依赖于消费方上的对象缓存，这要求 Drupal 了解前端缓存如何存储缓存项以及如何使其失效。经\
  \ David Strauss 许可，根据其图解改编。\n\n当消费方改变其在 Memcached 中的缓存方式时，可能会产生一致性问题。如果消费方修改了其在\
  \ Memcached 中的缓存方式，而 Drupal 未更新以反映这些修改，就可能产生不一致，导致最终用户看到过时的内容。\n\n尽管强烈建议也利用 Drupal\
  \ 自身的内部缓存系统，但同样不应使用 Drupal 自身的对象缓存来缓存 API 响应，因为每次请求缓存时都需要引导 Drupal，从而抵消了使用缓存带来的性能优势。如图\
  \ 25-2 所示。\n\n![../images/468476_1_En_25_Chapter/468476_1_En_25_Fig2_HTML.jpg](img/468476_1_En_25_Fig2_HTML.jpg)\n\
  \n**图 25-2** 在此情况下，每当消费方从 Drupal 的原生缓存系统中获取缓存项时，每次查找都会触发一次 Drupal 引导。经 David Strauss\
  \ 许可，根据其图解改编。\n\nStrauss 建议使用反向代理作为 API 响应缓存，将反向代理作为独立实体置于消费方和 Drupal 实例之间。或者，你还可以配置反向代理或\
  \ CDN 来缓存 JavaScript 框架的初始渲染。这种方法如图 25-3 所示，其特殊优势在于 Drupal 既能填充缓存，又能根据自身模式（本例中为\
  \ Drupal 缓存标签）管理缓存。\n\n![../images/468476_1_En_25_Chapter/468476_1_En_25_Fig3_HTML.jpg](img/468476_1_En_25_Fig3_HTML.jpg)\n\
  \n**图 25-3** David Strauss 推荐的架构，可确保缓存记录 Drupal 的可缓存性元数据，同时防止过多的 Drupal 引导。经 David\
  \ Strauss 许可，根据其图解改编。\n\n> **注意**  \n> 有关如何为解耦式 Drupal 架构提供缓存的更多信息，请参阅 David Strauss\
  \ 在 2018 年解耦式 Drupal 日上的演讲“有效的 API 缓存：当客户端是解耦式前端时实现高命中率”，网址为 [`https://2018.decoupleddays.com/session/effective-api-caching-achieving-high-hit-rates-when-your-client-decoupled-front-end`](https://2018.decoupleddays.com/session/effective-api-caching-achieving-high-hit-rates-when-your-client-decoupled-front-end)。\n\
  \n## 缓存索引\n\n为了向反向代理和 CDN 指示哪些缓存标签与缓存项相关联，我们可以在标头中发出缓存标签。目前，出于调试目的，Drupal 提供了一个\
  \ `X-Drupal-Cache-Tags` 标头。Drupal 还可以发送适应特定反向代理和 CDN 特性的标头。\n\n例如，某些 CDN 不允许缓存项中包含空格或逗号。因此，Drupal\
  \ 可以发出一个 `Surrogate-Keys` 标头（值用空格分隔），或一个 `Cache-Tag` 标头（值用逗号分隔）。通常建议你的 Drupal 网站所在的\
  \ Web 服务器以及你的反向代理都支持最多容纳 16 KB 缓存标签的响应标头。\n\n如果超出了 16 KB 的建议大小（大约相当于 1000 个缓存标签），你应该检查分配缓存标签的方式，以及是否提供了过于复杂的响应。此外，一旦超出限制，许多服务会直接忽略剩余的缓存标签，从而导致过时数据。\n\
  \n表 25-2 列出了流行 CDN 产品和反向代理中缓存标签标头的一些常见等效项。\n\n**表 25-2** 流行 CDN 和反向代理中的缓存标签标头\n\n\
  | 缓存标签标头 | 服务 |\n| --- | --- |\n| `Cache-Tag` | Cloudflare Enterprise |\n| `Edge-Cache-Tag`\
  \ | Akamai |\n| `HashTwo` | Varnish Pro |\n| `Surrogate-Keys` | Fastly |\n| `xkey`\
  \ | Varnish mod |\n\n> **注意**  \n> 有关在反向代理和 CDN 中使用缓存标签的更多信息，请查阅文档 [`https://www.drupal.org/docs/8/api/cache-api/cache-tags`](https://www.drupal.org/docs/8/api/cache-api/cache-tags)。\n\
  \n\n\n### 缓存失效\n\n借助缓存标签，你可以选择性地使特定缓存项失效，同时也能让包含该缓存项的其他内容失效。需要注意的是，如果你使用的是开源版 Varnish\
  \ 以及提供集成功能的模块，则需要配置 Varnish 以支持这些缓存标签的清除。如果使用的是 CDN，许多 CDN 都提供自己的清除 API，能够处理带有缓存标签的缓存项失效操作。其中部分清除\
  \ API 可以在单个请求中处理多个失效项，而另一些则需要发送多次请求。\n\n以下是一个示例 Varnish 配置（使用 Varnish 配置语言编写），用于处理来自\
  \ Drupal 的清除请求。\n\n```\nsub vcl_recv {\nif (req.method == \"PURGE\") {\nxkey.softpurge(req.http.xkey-purge);\n\
  }\n}\n```\n\n来自 Drupal 的清除请求可以通过 cURL 编写如下，其中 `{cache_tag}` 表示需要失效的缓存标签（需根据代理的具体特性进行格式化），`{cache_host}`\
  \ 表示缓存的主机地址。\n\n```\ncurl -XPURGE -H\"xkey-purge: {cache_tag}\" {cache_host}\n```\n\
  \n这种缓存失效操作并非仅清除单个缓存项，而是会清除所有包含该特定节点的内容，从而凸显了 Drupal 缓存标签系统的优势。至此，我们已经掌握了执行缓存失效的方法，但尚未说明为何使用\
  \ `softpurge()` 方法而非传统的硬清除。硬清除是指强制将指定缓存项从缓存中移除，使得这些项在清除后不再出现。Strauss 建议仅在处理极度敏感的数据或需要极高实时准确性的数据时才进行硬清除。而软清除（大多数\
  \ CDN API 均支持）会将缓存项的生存时间设置为零，但在新的缓存副本尚未送达的中间阶段，仍然允许该缓存项出现。这样做的好处是：在包含已更新对象的缓存请求中，直到新副本到达缓存之前，仍会提供略微过期的对象。这可以防止服务器出现请求风暴，并在新副本传输到缓存期间避免对最终用户造成响应缓慢的问题。\n\
  \n**注意**：如果你使用的是开源版 Varnish，可能需要额外安装一个模块来支持软清除。\n\n### 结论\n\n在本章中，我们探讨了解耦式 Drupal\
  \ 中缓存最佳实践的整体图景。我们介绍了 Drupal 的缓存标签系统，该系统提供了对缓存能力元数据的支持，可用于实现高度精细化的缓存失效；定义了反向代理和 CDN\
  \ 作为缓存 Drupal Web 服务响应最有效的手段；并探索了现实场景中执行缓存索引和失效的一些现有方法。下一章将标志着我们共同深入探索解耦式 Drupal\
  \ 的结束。在最后一章中，我们将再次将视野放大到更广阔的背景下，探讨 Drupal 整个生命周期中一些最及时但也最具挑战性的问题，尤其是在解耦式 Drupal\
  \ 架构在 Drupal 社区中日益兴起的背景下。我们还将思考不断演进 Drupal 使命、与其他社区及运动联合所带来的影响。这其中关乎的正是 Drupal 的未来与前景。\n\
  \n"
- '# 脚注


  26. 解耦式 Drupal 的未来


  正如我们在这些章节中所看到的，解耦式 Drupal 在许多方面都有可能决定 Drupal 未来多年的发展轨迹。它能够为各种消费者提供 Drupal 内容，而无需考虑这些消费者是如何构建的，这既是解耦式
  Drupal 的关键优势之一，也是 API 优先架构的普遍优势。Drupal 并非处于这一范式转变的孤例，许多其他长期存在的软件项目（如 WordPress）也在经历着自身的重大演进。


  Drupal 正处于其历史中一个独特的十字路口。迄今为止，组织选择 Drupal 大多是基于其构建网站的能力以及提供丰富功能编辑体验的能力。如今，组织对 Drupal
  的应用更进一步，用其内容服务于整个数字生态系统，将所有数据集中到一个 CMS 中。此外，Drupal 的用户体验正在经历全面改革，不仅涉及设计和用户界面，还包括前端开发体验，即对
  JavaScript 进行现代化改造。


  在本章中，我们将简要介绍一些正在进行的工作，旨在持续为 Drupal 做好准备迎接充满希望的未来，以及一些将对 Drupal 作为 CMS 的中长期未来产生直接影响的问题——其视野已然远远超出简单的网站范畴。


  ## 管理界面与 JavaScript 现代化计划


  2017 年 9 月，在维也纳举行的 DrupalCon 上，一群 Drupal 核心贡献者和 Drupal 社区的 JavaScript 维护者一致同意，在
  Drupal 核心的管理界面中采用 React 库进行实验。¹¹⁰ 这一漫长过程始于作者在 2016 年初提议采用 JavaScript 框架，¹¹¹ React
  的采用为 Drupal 管理界面的运作方式带来了根本性变革。其他被考虑的备选方案包括 Angular、Ember、Vue.js、Elm 等框架，社区中仍有人支持将
  Vue.js 作为备选，原因在于它被 Laravel 社区采用且具有渐进式采用特性（参见第 20 章）。


  管理界面与 JavaScript 现代化计划是由 Drupal 社区的用户体验专家、设计师与 JavaScript 维护者共同发起的一项联合行动，旨在重新构想
  Drupal 的内部用户体验，使其符合那些由单页应用和无缝交互构成的其他编辑体验的期望。


  自 Drupal 8 发布以来，Drupal 的管理体验基本保持不变。一个相关的问题是：这种体验是否已经过时到足以威胁 Drupal 作为 CMS 的主导地位？


  管理界面与 JavaScript 现代化计划由 Angie Byron (webchick)、Cristina Chumillas (ckrina)、Matt
  Grill (drpal) 和 Sally Young (justafish) 领导，根据 Drupal.org 计划页面所述，其目标如下：¹¹²


  1.  为 Drupal 的编辑和管理界面创建一套新的“设计系统”，并逐步实施。

  2.  创建一个解耦式的单页 React 应用，用于管理 Drupal 后台。

  3.  现代化底层 JavaScript 代码，并增强 Drupal 的 API，以更好地支持所有类型的解耦应用。




