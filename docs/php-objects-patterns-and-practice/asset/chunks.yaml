    # `CommandResolver`


    控制器需要决定如何解释 HTTP 请求，以便调用正确的代码来处理该请求。虽然你可以轻松地将此逻辑放在 `Controller` 类本身中，但我更倾向于为此使用专门的类。这样，在必要时可以轻松地重构为多态形式。


    前端控制器通常通过运行 `Command` 对象来调用应用程序逻辑（我在第 11 章介绍了 `Command` 模式）。`Command` 是根据请求 URL
    选择的（使用 URL 路径，或者较少见的 GET 参数）。无论哪种方式，最终都会得到一个可用于选择 `Command` 的令牌或模式。不止有一种方法可以使用
    URL 来选择命令。例如，你可以根据配置文件或数据结构来测试令牌（逻辑策略）。或者，你可以直接在文件系统上针对类文件进行测试（物理策略）。


    上一章中你看到了一个使用物理策略的命令工厂示例。这次，我将采用逻辑方法，将 URL 片段映射到 `Command` 类：


    ```php

    // listing 12.13

    class CommandResolver

    {

    private static $refcmd = null;

    private static $defaultcmd = DefaultCommand::class;

    public function __construct()

    {

    // 可以将其设置为可配置

    self::$refcmd = new \ReflectionClass(Command::class);

    }

    public function getCommand(Request $request): Command

    {

    $reg = Registry::instance();

    $commands = $reg->getCommands();

    $path = $request->getPath();

    $class = $commands->get($path);

    if (is_null($class)) {

    $request->addFeedback("路径 ''$path'' 不匹配");

    return new self::$defaultcmd();

    }

    if (! class_exists($class)) {

    $request->addFeedback("类 ''$class'' 未找到");

    return new self::$defaultcmd();

    }

    $refclass = new \ReflectionClass($class);

    if (! $refclass->isSubClassOf(self::$refcmd)) {

    $request->addFeedback("命令 ''$refclass'' 不是一个 Command");

    return new self::$defaultcmd();

    }

    return $refclass->newInstance();

    }

    }

    ```


    这个简单的类从注册表中获取一个 `Conf` 对象，并使用 URL 路径（由 `Request::getPath()` 方法提供）来尝试获取一个类名。如果找到类名，并且该类存在且扩展了
    `Command` 基类，则实例化并返回它。


    如果这些条件中的任何一个不满足，`getCommand()` 方法会通过提供一个默认的 `Command` 对象来优雅降级。


    更复杂的实现（例如，Silex 和 Symfony 中路由逻辑所使用的实现）将允许在这些路径中使用通配符。


    你可能会问，为什么这段代码会信任它找到的 `Command` 类不需要参数：


    ```php

    return $refclass->newInstance();

    ```


    答案在于 `Command` 类本身的签名：


    ```php

    // listing 12.14

    abstract class Command

    {

    final public function __construct()

    {

    }

    public function execute(Request $request)

    {

    $this->doExecute($request);

    }

    abstract public function doExecute(Request $request);

    }

    ```


    通过将构造函数方法声明为 `final`，我使得子类无法重写它。因此，没有 `Command` 类需要为其构造函数提供参数。


    在创建命令类时，你应该小心，尽可能让它们不包含应用程序逻辑。一旦它们开始处理应用程序类型的事情，你会发现它们变成了一种混乱的事务脚本，重复代码很快就会渗入。命令是一种中继站：它们应该解释请求、调用领域层来操作一些对象，然后为表示层存放数据。一旦它们开始做比这更复杂的事情，可能就是重构的时候了。好消息是重构相对容易。发现命令试图做太多事情并不难，解决方案通常也很明确：将该功能下移到辅助类或领域类中。


    # `Request`


    请求由 PHP 为我们神奇地处理，并整齐地打包在超全局数组中。你可能已经注意到，我仍然使用一个类来表示请求。一个 `Request` 对象被传递给 `CommandResolver`，然后再传递给
    `Command`。


    我为什么不让这些类直接查询 `$_REQUEST`、`$_POST` 或 `$_GET` 数组呢？当然可以这样做，但通过将请求操作集中在一个地方，我开启了新的可能性。


    例如，你可以对传入的请求应用过滤器。或者，如下一个示例所示，你可以从 HTTP 请求之外的其他地方收集请求参数，从而允许从命令行或测试脚本运行应用程序。


    `Request` 对象也是一个有用的存储库，用于存放需要传递给视图层的数据。实际上，许多系统为此目的提供了单独的 `Response` 对象，但这里我们会保持精简。


    下面是一个简单的 `Request` 超类：


    ```php

    // listing 12.15

    abstract class Request

    {

    protected $properties;

    protected $feedback = [];

    protected $path = "/";

    public function __construct()

    {

    $this->init();

    }

    abstract public function init();

    public function setPath(string $path)

    {

    $this->path = $path;

    }

    public function getPath(): string

    {

    return $this->path;

    }

    public function getProperty(string $key)

    {

    if (isset($this->properties[$key])) {

    return $this->properties[$key];

    }

    return null;

    }

    public function setProperty(string $key, $val)

    {

    $this->properties[$key] = $val;

    }

    public function addFeedback(string $msg)

    {

    array_push($this->feedback, $msg);

    }

    public function getFeedback(): array

    {

    return $this->feedback;

    }

    public function getFeedbackString($separator = "\n"): string

    {

    return implode($separator, $this->feedback);

    }

    public function clearFeedback()

    {

    $this->feedback = [];

    }

    }

    ```


    如你所见，这个类的大部分内容都用于设置和获取属性的机制。`init()` 方法负责填充私有的 `$properties` 数组，这将在子类中处理。值得注意的是，这个示例实现忽略了请求方法——在现实世界中你绝不会想这样做。一个完整的实现应该管理
    `GET`、`POST` 和 `PUT` 数组，并提供一个统一的查询机制。一旦你有了一个 `Request` 对象，你应该能够通过 `getProperty()`
    方法访问参数，该方法接受一个键字符串并返回对应的值（存储在 `$properties` 数组中）。你也可以通过 `setProperty()` 添加数据。


    该类还管理一个 `$feedback` 数组。这是一个简单的通道，控制器类可以通过它向用户传递消息。在更完整的实现中，我们很可能需要区分错误消息和信息性消息。


    你可能记得 `ApplicationHelper` 实例化了 `HttpRequest` 和 `CliRequest` 中的一个。以下是第一个：


    ```php

    // listing 12.16

    class HttpRequest extends Request

    {

    public function init()

    {

    // 我们为了方便忽略了 POST/GET 等区别

    // 在现实世界中不要这样做！

    $this->properties = $_REQUEST;

    $this->path = $_SERVER[''PATH_INFO''];

    $this->path = (empty($this->path)) ? "/" : $this->path;

    }

    }

    ```


    `CliRequest` 从命令行获取参数对，形式为 `key=value`，并将它们分解为属性。它还会检测带有 `path:` 前缀的参数，并将提供的值赋给对象的
    `$path` 属性：


    ```php

    // listing 12.17

    class CliRequest extends Request

    {

    public function init()

    {

    $args = $_SERVER[''argv''];

    foreach ($args as $arg) {

    if (preg_match("/^path:(\S+)/", $arg, $matches)) {

    $this->path = $matches[1];

    } else {

    if (strpos($arg, ''='')) {

    list($key, $val) = explode("=", $arg);

    $this->setProperty($key, $val);

    }

    }

    }

    $this->path = (empty($this->path)) ? "/" : $this->path ;

    }

    }

    ```

    '
- fmt: '##### A Command


    You have already seen the `Command` base class, and Chapter [11](#A314621_5_En_11_Chapter.html)
    covered the Command pattern in detail, so there’s no need to go too deep into
    Commands. Let’s round things off, though, with a simple, concrete `Command` object:


    ```

    // listing 12.18

    class DefaultCommand extends Command

    {

    public function doExecute(Request $request)

    {

    $request->addFeedback("Welcome to WOO");

    include(__DIR__ . "/main.php");

    }

    }

    ```


    This is the `Command` object that is served up by `CommandResolver` if no explicit
    request for a particular `Command` is received.


    As you may have noticed, the abstract base class implements `execute()` itself,
    calling down to the `doExecute()` implementation of its child class. This allows
    us to add setup and cleanup code to all commands, simply by altering the base
    class.


    The `execute()` method is passed a `Request` object that gives access to user
    input, as well as to the `setFeedback()` method. `DefaultCommand` makes use of
    this to set a welcome message.


    Finally, the command dispatches control to a view, simply by calling `include()`.
    Embedding the map from command to view in the `Command` classes is the simplest
    dispatch mechanism; but for small systems, it can be perfectly adequate. A more
    flexible strategy can be seen in the “Application Controller” section.


    The file `main.php` contains some HTML and a call into the `Request` object to
    check for any feedback (I’ll cover views in more detail, shortly). I now have
    all the components in place to run the system. Here’s what I see:


    ```


    Woo! it''s Woo!


    Welcome to WOO


    ```


    As you can see, the feedback message set by the default command has found its
    way into the output. Let’s review the full process that leads to this outcome.


    ##### Overview


    It is possible that the detail of the classes covered in this section might disguise
    the simplicity of the Front Controller pattern. Figure [12-4](#A314621_5_En_12_Chapter.html#Fig4)
    shows a sequence diagram that illustrates the life cycle of a request.


    ![A314621_5_En_12_Fig4_HTML.gif](A314621_5_En_12_Fig4_HTML.gif)


    Figure 12-4. The front controller in operation


    As you can see, the front controller delegates initialization to the `ApplicationHelper`
    object (which could use caching to short-circuit any expensive setup). The `Controller`
    then acquires a `Command` object from the `CommandResolver` object. Finally, it
    invokes `Command::execute()` to kick off the application logic.


    In this implementation of the pattern, the `Command` itself is responsible for
    delegating to the view layer. You can see a refinement of this in the next section.


    #### Consequences


    Front Controller is not for the fainthearted. It does require a lot of up-front
    development before you begin to see benefits. This is a serious drawback if your
    project requires fast turnaround, or if it is small enough that the Front Controller
    framework would weigh in heavier than the rest of the system.


    Having said that, once you have successfully deployed a Front Controller in one
    project, you will find that you can reuse it for others with lightning speed.
    You can abstract much of its functionality into library code, effectively building
    yourself a reusable framework.


    The requirement that all configuration information be loaded up for every request
    is another drawback. All approaches will suffer from this to some extent, but
    Front Controller often requires additional information, such as logical maps of
    commands and views.


    This overhead can be eased considerably by caching such data. The most efficient
    way of doing this is to add the data to your system as native PHP. This is fine
    if you are the sole maintainer of a system; but if you have nontechnical users,
    you may need to provide a configuration file. You can still automate the native
    PHP approach, though, by creating a system that reads a configuration file and
    then builds PHP data structures, which it writes to a cache file. Once the native
    PHP cache has been created, the system will use it in preference to the configuration
    file until a change is made and the cache must be rebuilt.


    On the plus side, Front Controller centralizes the presentation logic of your
    system. This means that you can exert control over the way that requests are processed
    and views are selected in one place (well, in one set of classes, anyway). This
    reduces duplication and decreases the likelihood of bugs.


    Front Controller is also very extensible. Once you have a core up and running,
    you can add new `Command` classes and views very easily.


    In this example, commands handled their own view dispatch. If you use the Front
    Controller pattern with an object that helps with view (and possibly command)
    selection, then the pattern allows for excellent control over navigation, which
    is harder to maintain elegantly when presentation control is distributed throughout
    a system. I cover such an object in the next section.


    ### Application Controller


    Allowing commands to invoke their own views is acceptable for smaller systems,
    but it is not ideal. It is preferable to decouple your commands from your view
    layer as much as possible.


    An application controller takes responsibility for mapping requests to commands,
    and commands to views. This decoupling means that it becomes easier to switch
    in alternative sets of views without changing the codebase. It also allows the
    system owner to change the flow of the application, again without the need for
    touching any internals. By allowing for a logical system of Command resolution,
    the pattern also makes it easier for the same Command to be used in different
    contexts within a system.


    #### The Problem


    Remember the nature of the example problem. An administrator needs to be able
    to add a venue to the system and to associate a space with it. The system might,
    therefore, support the `AddVenue` and `AddSpace` commands. According to the examples
    so far, these commands would be selected using a direct map from a path (`/addvenue`)
    to a class (`AddVenue`).


    Broadly speaking, a successful call to the `AddVenue` command should lead to an
    initial call to the `AddSpace` command. This relationship might be hard-coded
    into the classes themselves, with `AddVenue` invoking `AddSpace` on success. `AddSpace`
    might then include a view that contains the form for adding the space to the venue.


    Both commands may be associated with at least two different views, a core view
    for presenting the input form and an error or “thank you” screen. According to
    the logic already discussed, the `Command` classes themselves would include those
    views (using conditional tests to decide which view to present in which circumstances).


    This level of hard-coding is fine, as long as the commands will always be used
    in the same way. It begins to break down, though, if I want a special view for
    `AddVenue` in some circumstances, and if I want to alter the logic by which one
    command leads to another (perhaps one flow might include an additional screen
    between a successful venue addition and the start of a space addition). If each
    of your commands is only used once, in one relationship to other commands and
    with one view, then you should hard-code your commands’ relationship with each
    other and their views. Otherwise, you should read on.


    An application controller class can take over this logic, freeing up `Command`
    classes to concentrate on their job, which is to process input, invoke application
    logic, and handle any results.'
