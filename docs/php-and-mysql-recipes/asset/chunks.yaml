    F.M. Kromann, *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_11


    CHAPTER 11 ■ FUNCTIONS


    How it Works


    In this example we have a function that can delete all rows in a specific table.
    The function does not have any parameters as input and it does not return any
    values.


    <?php


    // 11_1.php


    function DeleteRows() {


    $con = mysqli_connect(''host'', ''user'', ''secret'');


    if ($con) {


    mysqli_select_db($con, ''mydb'');


    mysqli_query($con, "delete from mytable;");


    mysqli_close($con);


    }


    else {


    echo "No database connection";


    }


    }


    // Call the function


    DeleteRows();


    If overall the script doesn’t have to do anything else it’s not really needed
    to wrap the delete operation in a function, but if the delete function is being
    used in multiple scripts or there is logic to check if the condition is right
    it will increase readability of the code to have the logic for the delete operation
    in a separate function.


    In that case it’s important to use meaningful function names.


    Recipe 11-2\. Variable Scope


    Problem


    In the previous example the DeleteRows() function created a connect to the database
    before deleting the rows and the connection was closed at the end of the function.
    If the script performs many operations on the database there would be an impact
    on performance as the connect operation is relatively expensive. If it’s possible
    to connect at the beginning of the script and use the same connection in all database
    operations the connect operation would only be performed once for the entire request.


    It’s always a good idea to minimize the number of database operations the script
    is performing in order to get the best possible performance of the script.


    Solution


    Variables defined outside of a function are not directly accessible inside the
    function. This is called scope.


    In PHP there is the global scope that includes all variables defined outside of
    any function. These can be accessed directly by any code that is executed outside
    of any function.'
  trans: "\n# 第 11 章：函数\n\n在第 2 章中，我们讨论了如何使用类来构建数据（成员变量）和功能（方法）的对象。当有一种方法可以将逻辑简单地封装到一个单一函数中，其工作方式与语言内置函数大致相同时，使用类来实例化对象然后调用其中的某个方法可能显得过于复杂。\n\
    \n类与函数之间的一个主要区别在于声明成员为`public`、`protected`或`private`的能力。这一特性在函数中并不存在，但函数内部定义的函数除外，这将在本章后面讨论。\n\
    \n函数可以定义仅在函数内部可用的变量，这几乎类似于函数作用域相关技巧中描述的私有成员变量。\n\n## 解决方案\n\n函数的最简单形式是使用关键字`function`定义，后跟函数名、一对圆括号和一对花括号，用于函数定义。\n\
    \n```\nfunction DeleteRows() {}\n```\n\n函数名不区分大小写。声明为`MyFunc()`的函数可以以`myfunc()`或`MYFUNC()`的方式调用，但建议使用与函数定义相同的大小写。要让此函数执行某些操作，我们需要在花括号之间编写逻辑。函数中的代码遵循与任何\
    \ PHP 脚本完全相同的结构。在函数外部可调用的任何函数在函数内部也同样可用。这对于内置函数和用户定义函数均适用。\n\n假设函数有返回值，它可以作为语句调用，也可以作为计算的右值调用。\n\
    \n有一些看起来像函数的语言结构示例。最基本的是用于定义数组类型变量的`array()`结构。它被用作赋值的右值。\n\n`list()`结构用于获取一个数组并将其元素拆分为单个变量。`list()`结构被用在赋值的左端。\n\
    \n© Frank M. Kromann 2016\n\nF.M. Kromann 著作，《PHP 与 MySQL 实战》，DOI 10.1007/978-1-4842-0605-8_11\n\
    \n## 工作原理\n\n在这个例子中，我们有一个可以删除特定表中所有行的函数。该函数没有任何输入参数，也不返回任何值。\n\n```\n<?php\n//\
    \ 11_1.php\nfunction DeleteRows() {\n    $con = mysqli_connect('host', 'user',\
    \ 'secret');\n    if ($con) {\n        mysqli_select_db($con, 'mydb');\n     \
    \   mysqli_query($con, \"delete from mytable;\");\n        mysqli_close($con);\n\
    \    }\n    else {\n        echo \"No database connection\";\n    }\n}\n// 调用函数\n\
    DeleteRows();\n```\n\n如果整个脚本不需要执行其他任何操作，那么将删除操作封装到函数中确实没有必要。但如果删除函数在多个脚本中使用，或者需要逻辑判断条件是否合适，那么将删除操作的逻辑放在一个单独的函数中将会提高代码的可读性。\n\
    \n在这种情况下，使用有意义的函数名非常重要。\n\n## 技巧 11-2：变量作用域\n\n### 问题\n\n在上一个例子中，`DeleteRows()`函数在删除行之前创建了一个数据库连接，并在函数结束时关闭了连接。如果脚本对数据库执行大量操作，由于连接操作相对昂贵，会对性能产生影响。如果能在脚本开始时建立连接，并在所有数据库操作中使用同一连接，则整个请求只需执行一次连接操作。\n\
    \n为了获得脚本的最佳性能，尽量减少脚本执行的数据库操作次数始终是一个好主意。\n\n### 解决方案\n\n在函数外部定义的变量不能在函数内部直接访问。这称为作用域。\n\
    \n在 PHP 中，存在全局作用域，它包括在任何函数外部定义的所有变量。这些变量可以被任何在函数外部执行的代码直接访问。\n"
- fmt: "# 函数作用域与参数传递\n\n## 局部变量与全局变量\n\n函数内部定义的变量仅对该函数内部的代码可用。\n\n从函数内部访问全局作用域中的变量有两种方式。第一种方式是使用超全局变量`$GLOBALS`。内置变量`$GLOBALS`不像其他超全局变量那样带有前导下划线`_`，因为它早在超全局变量概念出现之前就已经被引入到语言中。所有超全局变量都可以在任何作用域中访问。`$GLOBALS`变量是一个数组，包含了在全局作用域中定义的所有变量。第二种方式是在一个或多个变量名前使用关键字`global`，变量名之间用逗号分隔。这将在全局作用域中创建并引用该变量。\n\
    \n### 工作原理\n\n有了这些知识，我们现在可以重写示例`11_1.php`中的代码，使用上述两种方法之一来访问全局变量。\n\n```php\n//\
    \ 11_2.php\n\n$con = mysqli_connect('host', 'user', 'secret');\n\nif ($con) {\n\
    \    mysqli_select_db($con, 'mydb');\n}\n\nfunction DeleteRows() {\n    if ($GLOBALS['con'])\
    \ {\n        mysqli_query($GLOBALS['con'], \"delete from mytable;\");\n    } else\
    \ {\n        echo \"No database connection\";\n    }\n}\n\n// Call the function\n\
    DeleteRows();\nmysqli_close($con);\n```\n\n使用`$GLOBALS`数组会使代码稍微难以阅读，但能清晰地表明正在发生什么。使用`global`关键字的相同代码如下：\n\
    \n```php\n// 11_3.php\n\n$con = mysqli_connect('host', 'user', 'secret');\n\n\
    if ($con) {\n    mysqli_select_db($con, 'mydb');\n}\n\nfunction DeleteRows() {\n\
    \    global $con;\n    if ($con) {\n        mysqli_query($con, \"delete from mytable;\"\
    );\n    } else {\n        echo \"No database connection\";\n    }\n}\n\n// Call\
    \ the function\nDeleteRows();\nmysqli_close($con);\n```\n\n在这种写法中，脚本可读性稍好，但也很容易忘记添加`global`语句，导致即使脚本可能有数据库连接，也会显示错误消息。\n\
    \n---\n\n# 食谱 11-3：传递参数\n\n## 问题\n\n删除特定表中的所有行并不是一个实用的函数。它只做一件事，而且只能用于这一个目的。我们如何创建一个更通用的函数，能够从任何表中删除特定的行？\n\
    \n## 解决方案\n\n解决方案是为函数定义扩展一个或多个参数。函数参数就像函数内部定义的变量，但允许向函数传递信息或从函数接收信息。变量的顺序很重要。如果函数按顺序定义了三个变量`$a`、`$b`和`$c`，那么传入的第一个值将赋给`$a`，第二个值赋给`$b`，以此类推。\n\
    \n所有支持的变量类型都可以用作参数。名称本身不能直接作为参数，但可以通过传递一个数组来实现，数组中的每个元素都是一个键值对。这样参数的顺序就不再重要了。\n\
    \n与任何输入一样，最佳实践是在使用变量之前验证其类型和内容。这可以防止错误。\n\n## 工作原理\n\n扩展`DeleteRows()`函数，使用两个参数：第一个参数是一个字符串，表示要删除行的表名；第二个参数是一个数组，包含要删除的\
    \ ID。这假设所有表都包含一个作为主键的`id`列。\n\n```php\n// 11_4.php\n\n$con = mysqli_connect('host',\
    \ 'user', 'secret');\n\nif ($con) {\n    mysqli_select_db($con, 'mydb');\n}\n\n\
    function DeleteRows($table, $ids) {\n    global $con;\n    if ($con) {\n     \
    \   $where = \"\";\n        if (is_array($ids) && sizeof($ids)) {\n          \
    \  $strids = implode(\", \", $ids);\n            $where = \" where id in ({$strids})\"\
    ;\n        }\n        mysqli_query($con, \"delete from {$table}{$where};\");\n\
    \    } else {\n        echo \"No database connection\";\n    }\n}\n\n// Call the\
    \ function\nDeleteRows(\"mytable\", [1, 3, 5]);\nmysqli_close($con);\n```\n\n\
    将空数组作为第二个参数传入会导致`where`子句为空，函数将删除表中的所有行。\n\n这里没有对`$table`变量进行验证。这允许用户传递任何类型的变量，可能会引发\
    \ SQL 错误。如果向`$table`参数传递了一个数组，字符串替换将导致 SQL 语句变成`\"delete from Array\"`。"
  raw: 'Variables defined inside a function are only available to code defined as
    part of the function.


    There are two ways to access variables from the global scope from within a function.
    The first way is to use the super global variable $GLOBALS . The built-in variable
    $GLOBALS does not have the leading _ as the other super globals because it was
    introduced in the language a long time before the concept of the super globals.
    All super globals can be accessed in all scopes. The $GLOBALS variable is an array
    of all the variables defined in the global scope. The second option is to use
    the keyword global in front of one or more variable names separated by commas.
    This will create and reference the variable in the global scope.


    CHAPTER 11 ■ FUNCTIONS


    How it Works


    With this knowledge we can now rewrite the code from example 11_1.php to use either
    of the two methods of accessing global variables .


    <?php


    // 11_2.php


    $con = mysqli_connect(''host'', ''user'', ''secret'');


    if ($con) {


    mysqli_select_db($con, ''mydb'');


    }


    function DeleteRows() {


    if ($_GLOBALS[''con'']) {


    mysqli_query($_GLOBALS[''con''], "delete from mytable;");


    }


    else {


    echo "No database connection";


    }


    }


    // Call the function


    DeleteRows();


    mysqli_close($con);


    Using the $_GLOBALS array makes the code a bit unreadable but it’s clear what’s
    happening. The same code using the global keyword looks like this:


    <?php


    // 11_3.php


    $con = mysqli_connect(''host'', ''user'', ''secret'');


    if ($con) {


    mysqli_select_db($con, ''mydb'');


    }


    function DeleteRows() {


    global $con;


    if ($con) {


    mysqli_query($con, "delete from mytable;");


    }


    else {


    echo "No database connection";


    }


    }


    // Call the function


    DeleteRows();


    mysqli_close($con);


    In this case the script is a bit more readable but it’s also common to forget
    to add the global statement causing the script to show the error message even
    though the script might have a database connection.


    CHAPTER 11 ■ FUNCTIONS


    R ecipe 11-3\. Passing Parameters


    Problem


    Deleting all the rows in a specific table is not a practical function. It does
    a single thing and it can only be used for that. How can we create a more generic
    function that can delete specific rows from any table?


    Solution


    The solution is to extend the function definition with one or more parameters.
    Function parameters act as variables defined inside the function but allow the
    passing of information to or from the function. The order of the variables is
    important. If the function defines three variables $a, $b, and $c in that order
    then that first value passed in will be assigned to $a, the second to $b, etc.


    All supported variable types can be used as parameters. Names are not directly
    supported but can be implemented by passing an array where each element is a key
    value pair. That way the order of the parameters is no longer important.


    As with any input it’s the best practice to validate the type and content of variables
    before using them.


    This can prevent errors.


    How it Works


    Expanding the DeleteRows() function with two parameters where the first is a string
    with the name of the table to delete from and the second is an array of id’s to
    delete. This assumes that all the tables include an id column as the primary key.


    <?php


    // 11_4.php


    $con = mysqli_connect(''host'', ''user'', ''secret'');


    if ($con) {


    mysqli_select_db($con, ''mydb'');


    }


    function DeleteRows($table, $ids) {


    global $con;


    if ($con) {


    $where = "";


    if (is_array($ids) && sizeof($ids)) {


    $strids = implode(", ", $ids);


    $where = " where id in ({$strids})";


    }


    mysqli_query($con, "delete from {$table}{$where};");


    }


    else {


    echo "No database connection";


    }


    }


    // Call the function


    DeleteRows("mytable", [1, 3, 5]);


    mysqli_close($con);


    CHAPTER 11 ■ FUNCTIONS


    Passing an empty array as the second parameter will cause the where clause to
    be empty and the function will delete all rows from the table.


    There is no validation of the $table variable. This will allow the user to pass
    any type of variable that could cause a SQL error. If an array is passed to the
    $table parameter the string replacement will cause the SQL statement to be “delete
    from Array.”'
