    ```php

    $mysqli=new mysqli(''localhost'',''root'', '''',''test''); $result = $mysqli->query(''DELETE
    FROM persons WHERE firstname = "Hans";'');


    ?>

    ```


    All lines from the database, where the field `firstname` is `Hans`, will be deleted.
    So be careful to double check your `WHERE` clause.


