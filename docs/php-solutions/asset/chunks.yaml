  trans: '

    ### 影响文件访问的配置设置


    托管公司可以通过 `php.ini` 对文件访问施加进一步限制。要了解已施加了哪些限制，请在您的网站上运行 `phpinfo()`，并检查 Core 部分中的设置。表
    7-1 列出了您需要检查的设置。除非您自己运行服务器，否则通常无法控制这些设置。


    表 7-1. 影响文件访问的 PHP 配置设置


    | 指令 | 默认值 | 描述 |

    | --- | --- | --- |

    | `allow_url_fopen` | On | 允许 PHP 脚本打开互联网上的公开文件 |

    | `allow_url_include` | Off | 控制包含远程文件的能力 |


    表 7-1 中的设置都控制通过 URL（而非本地文件系统）对文件的访问，但它们之间存在重要区别。第一个设置 `allow_url_fopen` 允许您读取远程文件，但不能直接将它们包含到脚本中。这通常是安全的，因此默认启用。如果您的网站上禁用了
    `allow_url_fopen`，您将无法访问有用的外部数据源，例如新闻源和公共 XML 文档。


    另一方面，`allow_url_include` 允许您直接将远程文件包含到脚本中。这是一个重大的安全风险，因此默认禁用 `allow_url_include`。


    **提示**：如果您的托管公司已禁用 `allow_url_fopen`，请请求启用它。否则，您将无法使用 PHP 解决方案 7-5。但不要混淆名称：在托管环境中，`allow_url_include`
    应始终处于关闭状态。


    在 PHP 5.4 之前，某些服务器对本地文件的访问施加了限制。这些限制现已被移除。对本地文件系统中文件的访问由每个文件和文件夹上设置的权限控制。


    ### 为本地测试创建文件存储文件夹


    将数据存储在站点根目录内非常不安全，尤其是在需要为文件夹设置全局访问权限时。如果您能访问站点根目录之外的私有文件夹，请将数据存储作为子文件夹创建，并为其授予必要的权限。


    就本章而言，我建议 Windows 用户在 C 盘上创建一个名为 `private` 的文件夹。


    Mac 用户应在其主文件夹内创建一个 `private` 文件夹。如有必要，按照上一章所述，在文件夹的信息面板中设置读写权限。


    如果您在 Linux 上进行测试，还需要确保 Web 服务器对 `private` 文件夹拥有读写权限。


    ## 读写文件


    读写文件的能力有着广泛的应用。例如，您可以打开另一个网站上的文件，将内容读入服务器的内存，使用字符串和 XML 操作函数提取信息，然后将结果写入本地文件。您还可以查询自己服务器上的数据库，并将数据输出为文本或
    CSV（逗号分隔值）文件。您甚至可以生成 Open Document Format 或 Microsoft Excel 电子表格格式的文件。但首先，让我们来看一下基本操作。


    **提示**：如果您订阅了 lynda.com 的在线培训库，可以在我的“使用 PHP 将数据导出到文件”课程（[`www.lynda.com/PHP-tutorials/Exporting-Data-Files-PHP/158375-2.html`](http://www.lynda.com/PHP-tutorials/Exporting-Data-Files-PHP/158375-2.html)）中学习如何将数据从数据库导出为各种格式，例如
    Microsoft Excel 和 Word。


    ### 单次操作读取文件


    PHP 有三个函数可以在单次操作中读取文本文件的内容。


    *   `readfile()` 打开一个文件并直接输出其内容。

    *   `file_get_contents()` 将整个文件的内容读入单个字符串，但不直接产生输出。

    *   `file()` 将每一行读入一个数组。


    #### PHP 解决方案 7-1：获取文本文件的内容


    此 PHP 解决方案演示了使用 `readfile()`、`file_get_contents()` 和 `file()` 访问文件内容之间的区别。


    将 `sonnet.txt` 复制到您的 `private` 文件夹。这是一个包含莎士比亚十四行诗第 116 首的文本文件。在 `phpsols` 站点根目录中创建一个名为
    `filesystem` 的新文件夹，然后在该新文件夹中创建一个名为 `get_contents.php` 的 PHP 文件。将以下代码插入 PHP 块中（`ch07`
    文件夹中的 `get_contents_01.php` 显示了嵌入在网页中的代码，但您可以仅使用 PHP 代码进行测试）：


    ```

    readfile(''C:/private/sonnet.txt'');

    ```


    如果您使用的是 Mac，请按如下方式修改路径名，使用您自己的 Mac 用户名：


    ```

    readfile(''/Users/username/private/sonnet.txt'');

    ```


    如果您在 Linux 或远程服务器上进行测试，请相应修改路径名。


    **注意**：为简洁起见，本章剩余示例仅显示 Windows 路径名。


    保存 `get_contents.php` 并在浏览器中查看。您应该会看到类似以下截图的内容。浏览器会忽略原始文本中的换行符，并将莎士比亚的十四行诗显示为一个连续的文本块。


    ![A978-1-4842-0635-5_7_Figa_HTML.jpg](img/A978-1-4842-0635-5_7_Figa_HTML.jpg)


    **提示**：如果看到错误消息，请检查代码输入是否正确，以及在 Mac 或 Linux 上是否设置了正确的文件和文件夹权限。


    PHP 有一个名为 `nl2br()` 的函数，可以将换行符转换为 `<br/>` 标签。像这样更改 `get_contents.php` 中的代码（代码在
    `get_contents_02.php` 中）：


    ```

    nl2br(readfile(''C:/private/sonnet.txt''));

    ```


    **注意**：为了与 XHTML 兼容，`nl2br()` 会在 `<br/>` 的闭合尖括号前插入一个尾部斜杠。在 HTML5 中，尾部斜杠是可选的。`<br/>`
    和 `<br>` 都是有效的。


    保存 `get_contents.php` 并在浏览器中重新加载。输出仍然是一个连续的文本块。当您这样将一个函数作为参数传递给另一个函数时，内部函数的结果通常会传递给外部函数，从而在单个表达式中执行两个操作。因此，您会期望文件的内容在显示到浏览器之前先传递给
    `nl2br()`。然而，`readfile()` 会立即输出文件内容。当它完成时，已经没有任何内容可供 `nl2br()` 插入 `<br/>` 标签了。文本已经到达浏览器。


    **注意**：当两个函数像这样嵌套时，内部函数先执行，外部函数处理结果。但内部函数的返回值需要作为参数对外部函数有意义。`readfile()` 的返回值是从文件中读取的字节数。即使您在行首添加了
    `echo`，您也只会得到添加到文本末尾的 `594`。在这种情况下，嵌套函数不起作用，但它通常是一种非常有用的技术，可以避免在将内部函数的结果传递给另一个函数处理之前将其存储在变量中。


    您需要使用 `file_get_contents()` 而不是 `readfile()` 来将换行符转换为 `<br/>` 标签。`readfile()`
    只是输出文件内容，而 `file_get_contents()` 将文件内容作为一个字符串返回。如何处理它完全由您决定。像这样修改代码（或使用 `get_contents_03.php`）：


    ```

    echo nl2br(file_get_contents(''C:/private/sonnet.txt''));

    ```


    在浏览器中重新加载页面。现在，十四行诗的每一行都显示在自己的行上。


    ![A978-1-4842-0635-5_7_Figb_HTML.jpg](img/A978-1-4842-0635-5_7_Figb_HTML.jpg)


    `file_get_contents()` 的优势在于您可以将文件内容赋值给一个变量，并以某种方式处理它，然后再决定如何处理它。像这样更改 `get_contents.php`
    中的代码（或使用 `get_contents_04.php`）并将页面加载到浏览器中：


    ```

    $sonnet = file_get_contents(''C:/private/sonnet.txt'');

    // 将换行符替换为空格

    $words = str_replace("\r\n", '' '', $sonnet);

    ```

