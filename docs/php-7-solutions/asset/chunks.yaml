    \ different, display both with an en dash between them. It’s a\n    simple `if.\
    \ . .else` situation\n    . Change the code in the paragraph in `footer.php` like\
    \ this:\n\n```\n    ©\n\nDavid Powers\n    ```\n\nAs in PHP Solution 5-5, I’ve\
    \ used curly braces around the variables\n    in the `else`\n    clause because\
    \ they’re in a double-quoted string\n    that contains no whitespace.\n\n3.  Save\
    \ `footer.php` and reload\n    `index.php` in a\n    browser. The copyright notice\
    \ should look the same as before.\n\n4.  Change the argument passed to the `date()`\
    \ function to a\n    lowercase *y*, like this:\n\n```\n    $thisYear = date('y');\n\
    \    ```\n\n5.  Save `footer.php` and click\n    the Reload button in your browser.\
    \ The second year is displayed using\n    only the last two digits, as shown in\
    \ the following screenshot:\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fige_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Fige_HTML.jpg)\n\
    \nTip\nThis should serve as a reminder of the importance of case-sensitivity\n\
    in PHP. Uppercase *Y* and lowercase *y* produce different\nresults with the `date()`\
    \ function.\nForgetting about case-sensitivity is one of the most common causes\
    \ of\nerrors in PHP.\n\n1.  Change the argument passed to `date()`  back to an\
    \ uppercase\n    *Y*. Set the value of `$startYear` to the\n    current year and\
    \ reload the page. This time, you should see only the\n    current year displayed.\n\
    \nYou now have a fully automated copyright notice. The finished code is\n    in\
    \ `footer_02.php` in the\n    `ch05`\n    folder.\n\nPHP Solution 5-7: Displaying\
    \ a Random Image\nAll you need to display a random image is a list\nof available\
    \ images, stored in an indexed array (see “Creating arrays”\nin Chapter [4](#332054_4_En_4_Chapter.xhtml)).\
    \ Since indexed arrays are\nnumbered from 0, you can select one of the images\
    \ by generating a random\nnumber between 0 and one less than the length of the\
    \ array. All this is\naccomplished by a few lines of code…\n\nContinue using the\
    \ same files. Alternatively, use `index_04.php` from the\n`ch05` folder and\n\
    rename it `index.php`. Since\n`index_04.php`\nuses `title.php`,\n`menu.php`, and\n\
    `footer.php`,\nmake sure all three files are in your `includes` folder. The\n\
    images are already in the `images` folder.\n\n1.  Create a blank PHP page in the\
    \ `includes` folder and\n    name it `random_image.php`.\n    Insert the following\
    \ code (it’s also in `random_image_01.php`\n    in the `ch05`\n    folder):\n\n\
    ```\n    <?php\n    $images = ['kinkakuji', 'maiko', 'maiko_phone', 'monk', 'fountains',\n\
    \    'ryoanji', 'menu', 'basin'];\n    $i = random_int(0, count($images)-1);\n\
    \    $selectedImage = \"images/{$images[$i]}.jpg\";\n    ```\n\nThis is the complete\
    \ script: an array of image names minus the `.jpg` filename\n    extension (there’s\
    \ no need to repeat shared information—they’re all\n    JPEG), a random number\
    \ generator, and a string that builds the correct\n    path name for the selected\
    \ file.\n\nTo generate a random number within a range, pass the minimum and\n\
    \    maximum numbers as arguments to the `random_int()`\n    function . Since\n\
    \    there are eight images in the array, you need a number between 0 and 7.\n\
    \    The simple way to do this would be to use `random_int(0, 7)`—simple, but\
    \ inefficient. Every time you change the `$images` array, you\n    need to count\
    \ how many elements it contains and change the maximum\n    number passed to `random_int()`.\n\
    \nIt’s much easier to get PHP to do that for you with the `count()`\n    function,\
    \  which\n    counts the number of elements in an array. You need a number one\
    \ less\n    than the number of elements in the array, so the second argument passed\n\
    \    to `random_int()`\n    becomes `count($images)-1`, and\n    the result is\
    \ stored in `$i`.\n\nThe random number is used in the final line to build the\
    \ correct path\n    name for the selected file. The variable `$images[$i]` is\n\
    \    embedded in a double-quoted string with no whitespace separating it from\n\
    \    surrounding characters, so it’s enclosed in curly braces. Arrays start\n\
    \    at 0, so if the random number is 1, `$selectedImage` is\n    `images/maiko.jpg`.\n\
    \nIf you’re new to PHP, you may find it difficult to understand code\n    like\
    \ this:\n\n```\n    $i = random_int(0, count($images)-1);\n    ```\n\nAll that’s\
    \ happening is that the second argument passed to `random_int()` is an\n    expression\
    \ rather than a number. If it makes it easier for you to\n    follow, rewrite\
    \ the code like this:\n\n```\n    $numImages = count($images); // $numImages is\
    \ 8\n    $max = $numImages – 1;       // $max is 7\n    $i = random_int(0, $max);\
    \    // $i = random_int(0, 7)\n    ```\n\n2.  Open `index.php`\n    and include\
    \ `random_image.php` by\n    inserting the command in the same code block as `title.php`,\
    \ like this:\n\n```\n    Since `random_image.php`\n    doesn’t send any direct\
    \ output to the browser, it’s safe to put it above\n    the `DOCTYPE`.\n\n```\n\
    \n3.  Scroll down inside `index.php`, and locate\n    the code that displays the\
    \ image in the figure element. It looks like\n    this:\n\n```\n\nWater basin\
    \ at Ryoanji temple\n\n```\n\n4.  Instead of using `images/basin.jpg` as a\n \
    \   fixed image, replace it with `$selectedImage`. All\n    the images have different\
    \ dimensions, so delete the `width` and `height` attributes and\n    use a generic\
    \ `alt` attribute. Also\n    remove the text in the `figcaption` element.\n  \
    \  The code in step 3 should now look like this:\n\n```\n    \" alt=\"Random image\"\
    \ class=\"picBorder\">\n\n```\n\nNote\nThe PHP block displays only a single value,\
    \ so you can use the short\n`echo` tag `<?=`.\n\n1.  Save both `random_image.php`\
    \ and\n    `index.php` , then load `index.php` into a\n    browser. The image\
    \ should now be chosen at random. Click the Reload\n    button in your browser;\
    \ you should see a variety of images, as shown in\n    Figure [5-11](#332054_4_En_5_Chapter.xhtml#Fig11).\n\
    \n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig11_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Fig11_HTML.jpg)\n\
    \nFigure 5-11.\n\nStoring image filenames in an indexed array makes it easy to\
    \ display\n    a random image\n\nYou can check your code against `index_05.php`\
    \ and\n`random_image_01.php`\nin the `ch05`\nfolder.\nThis is a simple and effective\
    \ way of displaying a random image, but\nit would be much better if you could\
    \ set the width and height for\ndifferent-sized images dynamically, as well as\
    \ add a caption to describe\nthe image."
  trans: "\n```\n© 2006&ndash;2019 David Powers\n```\n\n使用包含文件的优势在于，只需修改这一个文件，就能更新整个网站的版权声明。不过，更高效的做法是让年份自动递增。\n\
    \n2. PHP 的 `date()` 函数可以很好地处理这个问题。像这样修改段落中的代码：\n\n```\n© 2006&ndash; David Powers\n\
    ```\n\n这会替换第二个日期，并用四位数字显示当前年份。请确保向 `date()` 传递大写的 `Y` 作为参数。\n\n**注意**  \n第 16\
    \ 章中的表 [16-4](https://doi.org/10.1007/978-1-4842-4338-1_Table#16-4) 列出了最常用的字符，这些字符可以传递给\
    \ `date()` 函数以显示日期部分，例如月份、星期几等。\n\n1. 保存 `footer.php` 并在浏览器中加载 `index.php`。页面底部的版权声明应该和之前一样——当然，除非你是在\
    \ 2020 年或之后阅读本文，在这种情况下将会显示当前年份。\n\n2. 和大多数版权声明一样，这个声明涵盖了一个年份范围，表示网站的首次上线时间。由于第一个日期是过去的年份，可以硬编码。但如果你正在创建一个新网站，则只需要当前年份。直到\
    \ 1 月 1 日才需要显示年份范围。\n\n要显示年份范围，需要知道起始年份和当前年份。如果两个年份相同，只显示当前年份；如果不同，则显示两者并用短破折号连接。这是一个简单的\
    \ `if...else` 场景。像这样修改 `footer.php` 中段落里的代码：\n\n```\n© David Powers\n```\n\n与\
    \ PHP 方案 5-5 一样，我在 `else` 子句中为变量使用了花括号，因为它们位于一个不含空格的**双引号字符串**中。\n\n3. 保存 `footer.php`\
    \ 并在浏览器中重新加载 `index.php`。版权声明应该和之前看起来一样。\n\n4. 将传递给 `date()` 函数的参数改为小写的 `y`，如下所示：\n\
    \n```\n$thisYear = date('y');\n```\n\n5. 保存 `footer.php` 并点击浏览器中的“重新加载”按钮。第二年将仅显示最后两位数字，如下图所示：\n\
    \n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fige_HTML.jpg](img/332054_4_En_5_Fige_HTML.jpg)\n\
    \n**提示**  \n这应该提醒我们 PHP 中大小写敏感的重要性。大写的 `Y` 和小写的 `y` 与 `date()` 函数结合会产生不同的结果。忘记大小写敏感是\
    \ PHP 中最常见的错误原因之一。\n\n1. 将传递给 `date()` 的参数改回大写的 `Y`。将 `$startYear` 的值设置为当前年份并重新加载页面。这一次，你应该只看到当前年份被显示出来。\n\
    \n现在你已经有了一个完全自动化的版权声明。完成的代码位于 `ch05` 文件夹的 `footer_02.php` 中。\n\n## PHP 方案 5-7：显示随机图片\n\
    \n显示随机图片只需要一个可用图片列表，存储在索引数组中（请参阅第 4 章中的“创建数组”）。由于索引数组从 0 开始编号，你可以通过生成一个介于 0 和数组长度减\
    \ 1 之间的随机数来选中其中一张图片。这一切只需几行代码即可完成……\n\n继续使用相同的文件。或者，使用 `ch05` 文件夹中的 `index_04.php`\
    \ 并将其重命名为 `index.php`。由于 `index_04.php` 使用了 `title.php`、`menu.php` 和 `footer.php`，请确保这三个文件都在你的\
    \ `includes` 文件夹中。图片已在 `images` 文件夹中。\n\n1. 在 `includes` 文件夹中创建一个空白 PHP 页面，并将其命名为\
    \ `random_image.php`。插入以下代码（该代码也位于 `ch05` 文件夹的 `random_image_01.php` 中）：\n\n```\n\
    <?php\n$images = ['kinkakuji', 'maiko', 'maiko_phone', 'monk', 'fountains',\n\
    'ryoanji', 'menu', 'basin'];\n$i = random_int(0, count($images)-1);\n$selectedImage\
    \ = \"images/{$images[$i]}.jpg\";\n```\n\n这是完整的脚本：一个包含图片名称（不含 `.jpg` 文件扩展名）的数组（无需重复共享信息——它们都是\
    \ JPEG 格式）、一个随机数生成器，以及一个为所选文件构建正确路径名的字符串。\n\n要在一个范围内生成随机数，请将最小值和最大值作为参数传递给 `random_int()`\
    \ 函数。由于数组中有八张图片，你需要一个介于 0 和 7 之间的数字。简单的方法是使用 `random_int(0, 7)`——简单，但效率低下。每次更改\
    \ `$images` 数组时，你都需要数一数它包含多少个元素，并更改传递给 `random_int()` 的最大数字。\n\n使用 PHP 的 `count()`\
    \ 函数为你完成这项工作要容易得多，该函数会计算数组中的元素数量。你需要一个比数组中元素数量少 1 的数字，因此传递给 `random_int()` 的第二个参数变为\
    \ `count($images)-1`，并将结果存储在 `$i` 中。\n\n在最后一行中，随机数被用来为所选文件构建正确的路径名。变量 `$images[$i]`\
    \ 被嵌入到一个**双引号字符串**中，且与周围字符之间没有空格分隔，因此它被括在花括号中。数组从 0 开始，所以如果随机数是 1，`$selectedImage`\
    \ 就是 `images/maiko.jpg`。\n\n如果你是 PHP 新手，可能会觉得理解这样的代码有困难：\n\n```\n$i = random_int(0,\
    \ count($images)-1);\n```\n\n实际上，传递给 `random_int()` 的第二个参数是一个表达式，而不是一个数字。如果这样能让你更容易理解，可以将代码重写如下：\n\
    \n```\n$numImages = count($images); // $numImages 是 8\n$max = $numImages – 1;\
    \       // $max 是 7\n$i = random_int(0, $max);    // $i = random_int(0, 7)\n```\n\
    \n2. 打开 `index.php`，通过在与 `title.php` 相同的代码块中插入命令来包含 `random_image.php`，如下所示：\n\
    \n```\n由于 `random_image.php` 不会向浏览器发送任何直接输出，将其放在 `DOCTYPE` 之上是安全的。\n```\n\n3.\
    \ 向下滚动到 `index.php` 内部，找到在 figure 元素中显示图片的代码。它看起来像这样：\n\n```\n<img src=\"images/basin.jpg\"\
    \ alt=\"龙安寺水钵\" width=\"360\" height=\"240\" class=\"picBorder\">\n<figcaption>龙安寺水钵</figcaption>\n\
    ```\n\n4. 不再使用固定的 `images/basin.jpg` 作为图片，而是将其替换为 `$selectedImage`。所有图片都有不同的尺寸，因此删除\
    \ `width` 和 `height` 属性，并使用一个通用的 `alt` 属性。同时删除 `figcaption` 元素中的文本。步骤 3 中的代码现在应该看起来像这样：\n\
    \n```\n<img src=\"<?= $selectedImage ?>\" alt=\"随机图片\" class=\"picBorder\">\n\
    ```\n\n**注意**  \n这个 PHP 块只显示一个值，因此你可以使用简短的 `echo` 标签 `<?=`。\n\n1. 同时保存 `random_image.php`\
    \ 和 `index.php`，然后在浏览器中加载 `index.php`。现在图片应该是随机选择的。点击浏览器中的“重新加载”按钮；你应该会看到各种不同的图片，如图\
    \ 5-11 所示。\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig11_HTML.jpg](img/332054_4_En_5_Fig11_HTML.jpg)\n\
    \n**图 5-11.** 将图片文件名存储在索引数组中使得显示随机图片变得容易\n\n你可以对照 `ch05` 文件夹中的 `index_05.php`\
    \ 和 `random_image_01.php` 来检查你的代码。这是一种简单而有效的显示随机图片的方式，但如果能够动态地为不同大小的图片设置宽度和高度，并且添加描述图片的标题，效果会更好。\n\
    \n"
- fmt: "### PHP Solution 5-8: Adding a Caption to the Random Image\n\nThis solution\
    \ uses a multidimensional array—or an array of arrays—to store the filename and\
    \ caption for each image. If you find the concept of a multidimensional array\
    \ difficult to understand in abstract terms, think of it as a large box with a\
    \ lot of envelopes inside, and inside each envelope is a photo and its caption.\
    \ The box is the top-level array, and the envelopes inside are the subarrays.\n\
    \nThe images are different sizes, but PHP conveniently provides a function called\
    \ `getimagesize()`. Guess what it does.\n\nThis PHP solution builds on the previous\
    \ one, so continue working with the same files.\n\n1. Open `random_image.php`\
    \ and change the code as follows:\n\n```\n'kinkakuji',\n    'caption' => 'The\
    \ Golden Pavilion in Kyoto'],\n    ['file'    => 'maiko',\n    'caption' => 'Maiko&mdash;trainee\
    \ geishas in Kyoto'],\n    ['file'    => 'maiko_phone',\n    'caption' => 'Every\
    \ maiko should have one&mdash;a mobile, of course'],\n    ['file'    => 'monk',\n\
    \    'caption' => 'Monk begging for alms in Kyoto'],\n    ['file'    => 'fountains',\n\
    \    'caption' => 'Fountains in central Tokyo'],\n    ['file'    => 'ryoanji',\n\
    \    'caption' => 'Autumn leaves at Ryoanji temple, Kyoto'],\n    ['file'    =>\
    \ 'menu',\n    'caption' => 'Menu outside restaurant in Pontocho, Kyoto'],\n \
    \   ['file'    => 'basin',\n    'caption' => 'Water basin at Ryoanji temple, Kyoto']\n\
    \    ];\n    $i = random_int(0, count($images)-1);\n    $selectedImage = \"images/{$images[$i]['file']}.jpg\"\
    ;\n    $caption = $images[$i]['caption'];\n```\n\n**Caution**  \nYou need to be\
    \ careful with the code. Each subarray is enclosed in a pair of square brackets\
    \ and is followed by a comma, which separates it from the next subarray. You’ll\
    \ find it easier to build and maintain multidimensional arrays if you align the\
    \ array keys and values as shown.\n\nAlthough the code looks complicated, it’s\
    \ an ordinary indexed array that contains eight items, each of which is an associative\
    \ array containing definitions for `'file'` and `'caption'`. The definition of\
    \ the multidimensional array forms a single statement, so there are no semicolons\
    \ until line 19. The closing bracket on that line matches the opening one on line\
    \ 2.\n\nThe variable used to select the image also needs to be changed, because\
    \ `$images[$i]` no longer contains a string, but rather an array. To get the correct\
    \ filename for the image, you need to use `$images[$i]['file']`. The caption for\
    \ the selected image is contained in `$images[$i]['caption']` and stored in a\
    \ shorter variable.\n\n2. You now need to amend the code in `index.php` to display\
    \ the caption, like this:\n\n```\n\" alt=\"Random image\" class=\"picBorder\"\
    >\n```\n\n3. Save `index.php` and `random_image.php` and load `index.php` into\
    \ a browser. Most images will look fine, but there’s an ugly gap to the right\
    \ of the image of the trainee geisha with a mobile phone, as shown in Figure 5-12.\n\
    \n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig12_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Fig12_HTML.jpg)\n\
    \n**Figure 5-12.** The long caption protrudes beyond the image and shifts it too\
    \ far left\n\n4. Add the following code at the end of `random_image.php`:\n\n\
    ```\nif (file_exists($selectedImage) && is_readable($selectedImage)) {\n    $imageSize\
    \ = getimagesize($selectedImage);\n}\n```\n\nThe `if` statement uses two functions,\
    \ `file_exists()` and `is_readable()`, to make sure `$selectedImage` not only\
    \ exists but also that it’s accessible (it may be corrupted or have the wrong\
    \ permissions). These functions return Boolean values (`true` or `false`), so\
    \ they can be used directly as part of the conditional statement.\n\nThe single\
    \ line inside the `if` statement uses the function `getimagesize()` that returns\
    \ an array of information about the image, which is stored as `$imageSize`. You’ll\
    \ learn more about `getimagesize()` in Chapter 10. At the moment, you’re interested\
    \ in the following two pieces of information:\n\n- `$imageSize[0]`: The width\
    \ of the image in pixels\n- `$imageSize[3]`: A string containing the image’s height\
    \ and width formatted for inclusion in an `<img>` tag\n\n5. First of all, let’s\
    \ fix the code in the `<img>` tag. Change it like this:\n\n```\n\" alt=\"Random\
    \ image\" class=\"picBorder\" >\n```\n\nThis inserts the correct `width` and `height`\
    \ attributes inside the `<img>` tag.\n\n6. Although this sets the dimensions for\
    \ the image, you still need to control the width of the caption. You can’t use\
    \ PHP inside an external style sheet, but there’s nothing stopping you from creating\
    \ a `<style>` block in the `<head>` of `index.php`. Insert the following code\
    \ just before the closing `</head>` tag:\n\n```\nfigcaption {\n    width: px;\n\
    }\n```\n\nThis code consists of only seven short lines, but it’s an odd mix of\
    \ PHP and HTML. Let’s start with the first and final lines. If you strip away\
    \ the PHP tags and replace the HTML `<style>` block with a comment, this is what\
    \ you end up with:\n\n```\nif (isset($imageSize)) {\n    // do something if $imageSize\
    \ has been set\n}\n```\n\nIn other words, if the variable `$imageSize` hasn’t\
    \ been set (defined), the PHP engine ignores everything between the curly braces.\
    \ It doesn’t matter that most of the code between the braces is HTML and CSS.\
    \ If `$imageSize` hasn’t been set, the PHP engine skips to the closing brace,\
    \ and the intervening code isn’t sent to the browser.\n\n**Tip**  \nMany inexperienced\
    \ PHP coders wrongly believe that they need to use `echo` or `print` to create\
    \ HTML output inside a conditional statement. As long as the opening and closing\
    \ braces match, you can use PHP to hide or display sections of HTML like this.\
    \ It’s a lot neater and involves a lot less typing than using `echo` all the time.\n\
    \nIf `$imageSize` has been set, the `<style>` block is created and `$imageSize[0]`\
    \ is used to set the correct width for the paragraph that contains the caption.\n\
    \n7. Save `random_image.php` and `index.php`, then reload `index.php` into a browser.\
    \ Click the Reload button until the image of the trainee geisha with the mobile\
    \ phone appears. This time, it should look like Figure 5-13. If you view the browser’s\
    \ source code, the style rule uses the correct width for the image.\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig13_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Fig13_HTML.jpg)\n\
    \n**Figure 5-13.** The ugly gap is removed by creating a style rule directly related\
    \ to the image size\n\n**Note**  \nIf the caption still protrudes, make sure there’s\
    \ no gap between the closing PHP tag and `px` in the `<style>` block. CSS does\
    \ not permit whitespace between the value and unit of measurement.\n\n8. The code\
    \ in `random_image.php` and the code you have just inserted prevent errors if\
    \ the selected image can’t be found, but the code that displays the image is devoid\
    \ of similar checks. Temporarily change the name of one of the images, either\
    \ in `random_image.php` or in the `images` folder. Reload `index.php` several\
    \ times. Eventually, you should see an error message like that in Figure 5-14.\
    \ It looks very unprofessional.\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig14_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Fig14_HTML.jpg)\n\
    \n**Figure 5-14.** An error in an include file can destroy the look of your page"
  raw: "PHP Solution 5-8: Adding a caption to the Random\nImage\nThis solution uses\
    \ a multidimensional\narray—or an array of arrays—to store the filename and caption\
    \ for\neach image. If you find the concept of a multidimensional array\ndifficult\
    \ to understand in abstract terms, think of it as a large box\nwith a lot of envelopes\
    \ inside, and inside each envelope is a photo and\nits caption. The box is the\
    \ top-level array, and the envelopes inside\nare the subarrays.\nThe images are\
    \ different sizes, but PHP conveniently provides a\nfunction called `getimagesize()`\
    \ . Guess what it\ndoes.\n\nThis PHP solution builds on the previous one, so continue\
    \ working with\nthe same files.\n\n1.  Open  `random_image.php`\n     and change\
    \ the code as follows:\n\n```\n     'kinkakuji',\n    'caption' => 'The Golden\
    \ Pavilion in Kyoto'],\n    ['file'    => 'maiko',\n    'caption' => 'Maiko&mdash;trainee\
    \ geishas in Kyoto'],\n    ['file'    => 'maiko_phone',\n    'caption' => 'Every\
    \ maiko should have one&mdash;a mobile, of course'],\n    ['file'    => 'monk',\n\
    \    'caption' => 'Monk begging for alms in Kyoto'],\n    ['file'    => 'fountains',\n\
    \    'caption' => 'Fountains in central Tokyo'],\n    ['file'    => 'ryoanji',\n\
    \    'caption' => 'Autumn leaves at Ryoanji temple, Kyoto'],\n    ['file'    =>\
    \ 'menu',\n    'caption' => 'Menu outside restaurant in Pontocho, Kyoto'],\n \
    \   ['file'    => 'basin',\n    'caption' => 'Water basin at Ryoanji temple, Kyoto']\n\
    \    ];\n    $i = random_int(0, count($images)-1);\n    $selectedImage = \"images/{$images[$i]['file']}.jpg\"\
    ;\n    $caption = $images[$i]['caption'];\n    ```\n\nCaution\nYou need to be\
    \ careful with the code. Each subarray is enclosed in a\npair of square brackets\
    \ and is followed by a comma, which separates it\nfrom the next subarray. You’ll\
    \ find it easier to build and maintain\nmultidimensional arrays if you align the\
    \ array keys and values as\nshown.\n\nAlthough the code looks complicated, it’s\
    \ an ordinary indexed array\nthat contains eight items, each of which is an associative\
    \ array\ncontaining definitions for  `'file'` and `'caption'`. The\ndefinition\
    \ of the multidimensional array forms a single statement, so\nthere are no semicolons\
    \ until line 19\\. The closing bracket on that line\nmatches the opening one on\
    \ line 2.\n\nThe variable used to select the image also needs to be changed, because\n\
    `$images[$i]` no\nlonger contains a string, but rather an array. To get the correct\n\
    filename for the image, you need to use `$images[$i]['file']`.\nThe caption for\
    \ the selected image is contained in `$images[$i]['caption']`\nand stored in a\
    \ shorter variable.\n\n1.  You now need to amend the code in `index.php` to display\n\
    \    the caption, like this:\n\n```\n    \" alt=\"Random image\" class=\"picBorder\"\
    >\n\n```\n\n2.  Save `index.php`\n    and `random_image.php` and\n    load `index.php`\n\
    \    into a browser. Most images will look fine, but there’s an ugly gap to\n\
    \    the right of the image of the trainee geisha with a mobile phone, as\n  \
    \  shown in Figure [5-12](#332054_4_En_5_Chapter.xhtml#Fig12).\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig12_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Fig12_HTML.jpg)\n\
    \nFigure 5-12.\n\nThe long caption protrudes beyond the image and shifts it too\
    \ far\n    left\n\n3.  Add the following code at the end of `random_image.php`:\n\
    \n```\n    if (file_exists($selectedImage) && is_readable($selectedImage)) {\n\
    \    $imageSize = getimagesize($selectedImage);\n    }\n    ```\n\nThe `if`\n\
    \    statement uses two functions, `file_exists()` and\n    `is_readable()` ,\
    \ to make sure `$selectedImage` not\n    only exists but also that it’s accessible\
    \ (it may be corrupted or have\n    the wrong permissions). These functions return\
    \ Boolean values (`true` or `false`), so they can\n    be used directly as part\
    \ of the conditional statement.\n\nThe single line inside the `if` statement uses\
    \ the\n    function `getimagesize()` that\n    returns an array of information\
    \ about the image, which is stored as\n    `$imageSize`.\n    You’ll learn more\
    \ about `getimagesize()`  in Chapter [10](#332054_4_En_10_Chapter.xhtml). At the\
    \ moment, you’re interested\n    in the following two pieces of information:\n\
    \n*   `$imageSize[0]`: The\n        width of the image in pixels\n\n*   `$imageSize[3]`:\
    \ A\n        string containing the image’s height and width formatted for inclusion\n\
    \        in an `<img>`\n        tag\n\n4.  First of all, let’s fix the code in\
    \ the `<img>` tag.\n    Change it like this:\n\n```\n    \" alt=\"Random image\"\
    \ class=\"picBorder\"\n    >\n    ```\n\nThis inserts the correct `width` and\
    \ `height` attributes\n    inside the `<img>` tag.\n\n5.  Although this sets the\
    \ dimensions for the image, you still need to\n    control the width of the caption.\
    \ You can’t use PHP inside an external\n    style sheet, but there’s nothing stopping\
    \ you from creating a `<style>` block\n    in the `<head>` of `index.php`. Insert\
    \ the\n    following code just before the closing `</head>`\n    tag  .\n\n```\n\
    \nfigcaption {\n    width: px;\n    }\n\n```\n\nThis code consists of only seven\
    \ short lines, but it’s an odd mix of PHP\n    and HTML. Let’s start with the\
    \ first and final lines. If you strip away\n    the PHP tags and replace the HTML\
    \ `<style>` block\n    with a comment, this is what you end up with:\n\n```\n\
    \    if (isset($imageSize)) {\n    // do something if $imageSize has been set\n\
    \    }\n    ```\n\nIn other words, if the variable `$imageSize` hasn’t\n    been\
    \ set (defined), the PHP engine ignores everything between the curly\n    braces.\
    \ It doesn’t matter that most of the code between the braces is\n    HTML and\
    \ CSS. If `$imageSize` hasn’t\n    been set, the PHP engine skips to the closing\
    \ brace, and the intervening\n    code isn’t sent to the browser.\n\nTip\nMany\
    \ inexperienced PHP coders wrongly believe that they need to use\n`echo` or `print`\
    \ to create HTML\noutput inside a conditional statement. As long as the opening\
    \ and\nclosing braces match, you can use PHP to hide or display sections of\n\
    HTML like this. It’s a lot neater and involves a lot less typing than\nusing `echo`\
    \ all\nthe time.\n\nIf `$imageSize`\nhas been set, the `<style>` block\nis created\
    \ and `$imageSize[0]` is used\nto set the correct width for the paragraph that\
    \ contains the caption.\n\n1.  Save `random_image.php` and\n    `index.` `php`\
    \ , then\n    reload `index.php` into a\n    browser. Click the Reload button\
    \ until the image of the trainee geisha\n    with the mobile phone appears. This\
    \ time, it should look like Figure\n    [5-13](#332054_4_En_5_Chapter.xhtml#Fig13).\
    \ If you view\n    the browser’s source code, the style rule uses the correct\
    \ width for the\n    image.\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig13_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Fig13_HTML.jpg)\n\
    \nFigure 5-13.\n\nThe ugly gap is\n    removed by creating a style rule directly\
    \ related to the image size\n\nNote\nIf the caption still protrudes, make sure\
    \ there’s no gap between the\nclosing PHP tag and `px` in the `<style>` block.\n\
    CSS does not permit whitespace between the value and unit of\nmeasurement.\n\n\
    1.  The code in `random_image.php` and\n    the code you have just inserted prevent\
    \ errors if the selected image\n    can’t be found, but the code that displays\
    \ the image is devoid of\n    similar checks. Temporarily change the name of one\
    \ of the images, either\n    in `random_image.php` or\n    in the `images`\n \
    \   folder. Reload `index.php` several\n    times. Eventually, you should see\
    \ an error message like that in Figure\n    [5-14](#332054_4_En_5_Chapter.xhtml#Fig14).\
    \ It looks very\n    unprofessional.\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig14_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Fig14_HTML.jpg)\n\
    \nFigure 5-14.\n\nAn error in an include file can destroy the look of your page"
  trans: "\n### PHP 解决方案 5-8：为随机图像添加说明文字\n\n此解决方案使用多维数组（即数组的数组）来存储每张图像的文件名和说明文字。如果你觉得从抽象角度理解多维数组概念有困难，可以把它想象成一个大盒子，里面有许多信封，每个信封里装着一张照片及其说明。盒子就是顶层数组，里面的信封就是子数组。\n\
    \n这些图像尺寸各不相同，但 PHP 恰好提供了一个名为 `getimagesize()` 的函数。猜猜它是做什么的。\n\n此 PHP 解决方案基于前一个方案，因此请继续使用相同的文件。\n\
    \n1. 打开 `random_image.php` 并将代码修改如下：\n\n```\n'kinkakuji',\n    'caption' => '京都金阁寺'],\n\
    \    ['file'    => 'maiko',\n    'caption' => '舞伎——京都的见习艺伎'],\n    ['file'   \
    \ => 'maiko_phone',\n    'caption' => '每个舞伎都应该有一部——当然是手机'],\n    ['file'    =>\
    \ 'monk',\n    'caption' => '在京都化缘的僧侣'],\n    ['file'    => 'fountains',\n   \
    \ 'caption' => '东京市中心的喷泉'],\n    ['file'    => 'ryoanji',\n    'caption' => '京都龙安寺的秋叶'],\n\
    \    ['file'    => 'menu',\n    'caption' => '京都先斗町餐厅外的菜单'],\n    ['file'    =>\
    \ 'basin',\n    'caption' => '京都龙安寺的水钵']\n    ];\n    $i = random_int(0, count($images)-1);\n\
    \    $selectedImage = \"images/{$images[$i]['file']}.jpg\";\n    $caption = $images[$i]['caption'];\n\
    ```\n\n**注意**  \n你需要注意代码的编写。每个子数组用一对方括号括起来，后面跟一个逗号，用于与下一个子数组分隔。如果像示例所示对齐数组键和值，你会发现构建和维护多维数组更容易。\n\
    \n虽然代码看起来复杂，但它只是一个包含八个元素的普通索引数组，每个元素都是一个包含 `'file'` 和 `'caption'` 定义的关联数组。多维数组的定义构成了一条单一语句，因此在第\
    \ 19 行之前没有分号。该行的右括号与第 2 行的左括号匹配。\n\n用于选择图像的变量也需要更改，因为 `$images[$i]` 不再包含字符串，而是包含一个数组。要获取正确的图像文件名，你需要使用\
    \ `$images[$i]['file']`。所选图像的说明文字包含在 `$images[$i]['caption']` 中，并存储在一个较短的变量中。\n\
    \n2. 现在你需要修改 `index.php` 中的代码来显示说明文字，如下所示：\n\n```\n\" alt=\"随机图片\" class=\"picBorder\"\
    >\n```\n\n3. 保存 `index.php` 和 `random_image.php`，并在浏览器中加载 `index.php`。大多数图像看起来正常，但持有手机的见习艺伎图像的右侧有一个难看的空白区域，如图\
    \ 5-12 所示。\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig12_HTML.jpg](img/332054_4_En_5_Fig12_HTML.jpg)\n\
    \n**图 5-12.** 长说明文字超出了图像范围，并将其过度左移\n\n4. 在 `random_image.php` 末尾添加以下代码：\n\n```\n\
    if (file_exists($selectedImage) && is_readable($selectedImage)) {\n    $imageSize\
    \ = getimagesize($selectedImage);\n}\n```\n\n`if` 语句使用了两个函数 `file_exists()` 和\
    \ `is_readable()`，以确保 `$selectedImage` 不仅存在，而且可访问（它可能已损坏或权限不正确）。这些函数返回布尔值（`true`\
    \ 或 `false`），因此可以直接用作条件语句的一部分。\n\n`if` 语句内的单行代码使用了 `getimagesize()` 函数，该函数返回一个包含图像信息的数组，并存储为\
    \ `$imageSize`。你将在第 10 章了解更多关于 `getimagesize()` 的内容。目前，你感兴趣的是以下两条信息：\n\n- `$imageSize[0]`：图像的宽度（像素）\n\
    - `$imageSize[3]`：包含图像高度和宽度信息的字符串，格式化为 `<img>` 标签的属性\n\n5. 首先，让我们修复 `<img>` 标签中的代码。按如下方式更改：\n\
    \n```\n\" alt=\"随机图片\" class=\"picBorder\" >\n```\n\n这将在 `<img>` 标签内插入正确的 `width`\
    \ 和 `height` 属性。\n\n6. 尽管这设置了图像的尺寸，你仍然需要控制说明文字的宽度。你无法在外部样式表中使用 PHP，但没有什么可以阻止你在\
    \ `index.php` 的 `<head>` 中创建一个 `<style>` 块。在结束的 `</head>` 标签之前插入以下代码：\n\n```\n\
    figcaption {\n    width: px;\n}\n```\n\n这段代码只有七行简短代码，但它是一个 PHP 和 HTML 的奇特混合体。让我们从第一行和最后一行开始。如果你去掉\
    \ PHP 标签并用注释替换 HTML `<style>` 块，得到的结果是：\n\n```\nif (isset($imageSize)) {\n   \
    \ // 如果 $imageSize 已设置，则执行某些操作\n}\n```\n\n换句话说，如果变量 `$imageSize` 尚未设置（定义），PHP\
    \ 引擎会忽略大括号之间的所有内容。大括号之间的代码大部分是 HTML 和 CSS，这无关紧要。如果 `$imageSize` 尚未设置，PHP 引擎会跳转到右大括号，并且中间的代码不会发送到浏览器。\n\
    \n**提示**  \n许多经验不足的 PHP 程序员错误地认为，在条件语句中需要使用 `echo` 或 `print` 来生成 HTML 输出。只要开闭大括号匹配，你就可以像这样使用\
    \ PHP 来隐藏或显示 HTML 部分。这比总是使用 `echo` 要整洁得多，而且输入量也更少。\n\n如果 `$imageSize` 已设置，则会创建\
    \ `<style>` 块，并使用 `$imageSize[0]` 为包含说明文字的段落设置正确的宽度。\n\n7. 保存 `random_image.php`\
    \ 和 `index.php`，然后在浏览器中重新加载 `index.php`。点击“重新加载”按钮，直到手持手机的见习艺伎图像出现。这次，它应该看起来像图\
    \ 5-13。如果你查看浏览器的源代码，样式规则使用了正确的图像宽度。\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig13_HTML.jpg](img/332054_4_En_5_Fig13_HTML.jpg)\n\
    \n**图 5-13.** 通过创建与图像尺寸直接相关的样式规则，消除了难看的空白区域\n\n**注意**  \n如果说明文字仍然突出，请确保 `<style>`\
    \ 块中结束的 PHP 标签与 `px` 之间没有空格。CSS 不允许在值和度量单位之间存在空白。\n\n8. `random_image.php` 中的代码以及你刚刚插入的代码，可以在所选图像找不到时防止错误，但显示图像的代码缺少类似的检查。临时更改其中一个图像的名称（无论是在\
    \ `random_image.php` 中还是在 `images` 文件夹中）。多次重新加载 `index.php`。最终，你应该会看到如图 5-14 所示的错误信息。这看起来非常不专业。\n\
    \n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig14_HTML.jpg](img/332054_4_En_5_Fig14_HTML.jpg)\n\
    \n**图 5-14.** 包含文件中的错误可能会破坏页面的外观\n"
- fmt: "2. The conditional statement at the foot of `random_image.php` sets `$imageSize`\
    \ only if the selected image both exists and is readable, so if `$imageSize` has\
    \ been set, you know it’s all systems go. Add the opening and closing blocks of\
    \ a conditional statement around the figure element that displays the image in\
    \ `index.php`, like this:\n\n```\n<img src=\"images/<?= $selectedImage ?>.jpg\"\
    \n     alt=\"Random image\" class=\"picBorder\">\n```\n\nImages that exist will\
    \ display normally, but you’ll avoid any embarrassing error messages in case of\
    \ a missing or corrupt file—a much more professional look. Don’t forget to restore\
    \ the name of the image you changed in the previous step.\n\nYou can check your\
    \ code against `index_06.php` and `random_image_02.php` in the `ch05` folder.\n\
    \n## Preventing errors with Include Files\n\nMany hosting companies turn off error\
    \ reporting for notices, so you probably wouldn’t be aware of the problem shown\
    \ in Figure 5-14 if you did all your testing on your remote server. However, it’s\
    \ important to eliminate all errors before deploying PHP pages on the Internet.\
    \ Just because you can’t see the error message doesn’t mean your page is okay.\n\
    \nPages that use a server-side technology such as PHP deal with a lot of unknowns,\
    \ so it’s wise to code defensively, checking values before using them. This section\
    \ describes measures you can take to prevent and troubleshoot errors with include\
    \ files.\n\n### Checking the existence of variables\n\nThe lesson that can be\
    \ drawn from PHP Solutions 5-5 and 5-8 is that you should always use the null\
    \ coalescing operator to set a default value, or use `isset()` to verify the existence\
    \ of a variable that comes from an include file and wrap any dependent code in\
    \ a conditional statement. You can also use `isset()` with the logical `Not` operator\
    \ (see Table 4-7 in Chapter 4) to assign a default value, like this:\n\n```\n\
    if (!isset($someVariable)) {\n    $someVariable = default value;\n}\n```\n\nYou’re\
    \ likely to come across this structure for setting a default value in many scripts\
    \ because the null coalescing operator has been available only since PHP 7.0 was\
    \ released in December 2015. Neither is better than the other; but the null coalescing\
    \ operator makes for shorter code.\n\n### Checking whether a function or class\
    \ has been defined\n\nInclude files are frequently used to define custom functions\
    \ or classes. Attempting to use a function or class that hasn’t been defined triggers\
    \ a fatal error. To check whether a function has been defined, pass the name of\
    \ the function as a string to `function_exists()`. When passing the name of the\
    \ function to `function_exists()`, omit the parentheses at the end of function\
    \ name. For example, you check whether a function called `doubleIt()` has been\
    \ defined like this:\n\n```\nif (function_exists('doubleIt')) {\n    // use doubleIt()\n\
    }\n```\n\nTo check whether a class has been defined, use `class_exists()` in the\
    \ same way, passing a string containing the class name as the argument:\n\n```\n\
    if (class_exists('MyClass')) {\n    // use MyClass\n}\n```\n\nAssuming you want\
    \ to use the function or class, a more practical approach is to use a conditional\
    \ statement to include the definition file if the function or class hasn’t already\
    \ been defined. For example, if the definition for `doubleIt()` is in a file called\
    \ `utilities.php`:\n\n```\nif (!function_exists('doubleIt')) {\n    require_once\
    \ './includes/utilities.php';\n}\n```\n\n## Suppressing Error Messages on a Live\
    \ Web Site\n\nAssuming your include files are working normally on your remote\
    \ server, the measures outlined in the previous sections are probably all the\
    \ error checking you need. However, if your remote server displays error messages,\
    \ you should take steps to suppress them. The following techniques hide all error\
    \ messages, not only those related to include files.\n\n### Using the Error Control\
    \ Operator\n\nA rather crude, but effective, technique is to use the PHP error\
    \ control operator (`@`), which suppresses error messages associated with the\
    \ line in which it’s used. You place `@` either at the beginning of the line or\
    \ directly in front of the function or command that you think might generate an\
    \ error, like this:\n\n```\n@ include './includes/random_image.php';\n```\n\n\
    The problem with the error control operator is that it hides errors rather than\
    \ working around them. It’s only one character, so it’s easy to forget you have\
    \ used it. Consequently, you can waste a lot of time looking for errors in the\
    \ wrong part of your script. If you use the error control operator, the `@` mark\
    \ should be the first thing you remove when troubleshooting a problem. The other\
    \ drawback is that you need to use the error control operator in every line that\
    \ might generate an error message, because it affects only the current line.\n\
    \n### Turning Off `display_errors` in the PHP Configuration\n\nA better way of\
    \ suppressing error messages in a live web site is to turn off the `display_errors`\
    \ directive in the web server’s configuration. The most effective way to do this\
    \ is to edit `php.ini` if your hosting company gives you control over its settings.\
    \ Locate the `display_errors` directive and change `On` to `Off`.\n\nIf you don’t\
    \ have control of `php.ini`, many hosting companies allow you to change a limited\
    \ range of configuration settings using a file called either `.htaccess` or `.user.ini`.\
    \ The choice of file depends on how PHP was installed on the server, so check\
    \ with your hosting company to find out which to use.\n\nIf your server supports\
    \ `.htaccess` files, add the following command to the `.htaccess` file in the\
    \ server root folder:\n\n```\nphp_flag display_errors Off\n```\n\nIn a `.user.ini`\
    \ file, the command is simply this:\n\n```\ndisplay_errors Off\n```\n\nBoth `.htaccess`\
    \ and `.user.ini` are plain text files. Like `php.ini`, each command should be\
    \ on a separate line. If the file doesn’t already exist on your remote server,\
    \ you can simply create it in a text editor. Make sure your editor doesn’t automatically\
    \ add `.txt` to the end of the filename. Then upload the file to your web site’s\
    \ server root folder.\n\n> **Tip:** By default, macOS hides files with a name\
    \ that begins with a dot. In macOS Sierra and later, use the keyboard shortcut\
    \ Cmd+Shift+. (dot) to toggle the display of hidden files on and off.\n\n### Turning\
    \ Off `display_errors` in an Individual File\n\nIf you don’t have control over\
    \ the server configuration, you can prevent error messages from being displayed\
    \ by adding the following line at the top of any script:\n\n```\nini_set('display_errors',\
    \ 'Off');\n```\n\n## PHP Solution 5-9: Redirecting When an Include File can’t\
    \ be Found\n\nAll the techniques suggested so far only suppress error messages\
    \ if an include file can’t be found. If a page would be meaningless without the\
    \ include file, you should redirect the user to an error page if the include file\
    \ is missing.\n\nOne way to do so is to throw an exception, like this:\n\n```\n\
    $file = './includes/menu.php';\nif (file_exists($file) && is_readable($file))\
    \ {\n    include $file;\n} else {\n    throw new Exception(\"$file can't be found\"\
    );\n}\n```\n\nWhen using code that might throw an exception, you need to wrap\
    \ it in a `try` block and create a `catch` block to handle the exception (see\
    \ “Handling errors and exceptions” in Chapter 4). This PHP solution shows how\
    \ to do this, using the `catch` block to redirect users to a different page if\
    \ an include file can’t be found.\n\nIf you have designed and tested your site\
    \ thoroughly, this technique should not be necessary on most pages that use include\
    \ files. However, the following PHP solution is by no means a pointless exercise.\
    \ It demonstrates several important features of PHP: how to throw and catch exceptions\
    \ and how to redirect to another page. As you’ll see from the following instructions,\
    \ redirection isn’t always straightforward. This PHP solution shows how to overcome\
    \ the most common problem."
  raw: "2.  The conditional\n    statement at the foot of `random_image.php` sets\n\
    \    `$imageSize` only\n    if the selected image both exists and is readable,\
    \ so if `$imageSize` has been\n    set, you know it’s all systems go. Add the\
    \ opening and closing blocks of\n    a conditional statement around the figure\
    \ element that displays the\n    image in `index.php`, like this:\n\n```\n\n\"\
    \ alt=\"Random image\" class=\"picBorder\"\n    >\n\n```\n\nImages that exist\
