  trans: "\n### 官方 Shopify 渠道\n\nShopify 有一系列用于与开发者及合作伙伴沟通、并促进社区讨论的“官方”渠道。主要渠道有：\n\
    \n- Shopify 论坛（`https://ecommerce.shopify.com/forums`）是开始搜索有关 Shopify 概念或开发问题的好地方。在社区中建立声誉的最佳方式之一，就是在这里帮助他人，或分享自己的经验。\n\
    - 请确保你通过 RSS 或电子邮件订阅了 Shopify 的各类博客。官方博客共有三个——一个面向商家（`https://www.shopify.com/blog`），一个面向合作伙伴和开发者（`https://www.shopify.com/partners/blog`），还有一个专注于企业级产品\
    \ Shopify Plus（`https://www.shopify.com/enterprise`）。图 11-9 展示了合作伙伴博客。\n\n  ![A437216_1_En_11_Fig9_HTML.jpg](img/A437216_1_En_11_Fig9_HTML.jpg)\n\
    \n  图 11-9\n\n  Shopify 合作伙伴博客源源不断地为对 Shopify 感兴趣的开发者和合作伙伴提供信息。\n\n- 目前有两个“官方”\
    \ Shopify 播客——由 Keir Whitaker 主持的更新频率不高但内容深入的 Shopify 合作伙伴播客（`https://soundcloud.com/shopify-partners`），以及由\
    \ Felix Thea 主持、以商家为中心的 Shopify Masters 播客（`https://www.shopify.com/blog/topics/podcasts`）。\n\
    - 有一个面向所有已注册 Shopify 合作伙伴开放的官方 Shopify 合作伙伴 Slack 社区。注册后，请向你的客户经理介绍自己并申请邀请。\n\n\
    ### 其他资源\n\n当然，让 Shopify 变得如此出色的原因之一，是众多由社区驱动的团体和倡议。以下是其中一些值得关注的亮点：\n\n- 由 Kurt\
    \ Elster 主持的非官方 Shopify 播客（`http://www.unofficialshopifypodcast.com`）。它虽然以商家为中心，但通常包含许多对开发者以及其他希望学习技能以造福店主的合作伙伴而言实用且可操作的建议。\n\
    - 由 TJ Mapes 运营的 eCommTalk Slack 频道（`http://ecommtalk.com`）。这个社区汇聚了合作伙伴、营销人员和商家，其中有许多经验丰富、愿意帮助\
    \ Shopify 开发者的人。\n- 由 Jonathan Kennedy 运营的 Shopify 创业者 Facebook 群组（`https://www.facebook.com/groups/shopifyentrepreneurs/`）。虽然技术性不强，但这是联系和帮助有抱负的\
    \ Shopify 商家的好方法，因此对于开发者来说，这里是磨练主题开发技能的沃土。\n\n### 线下活动\n\n如果你渴望与 Shopify 社区的其他成员线下见面，也有很多机会。2016\
    \ 年，Shopify 开始在全球范围内支持“官方” Shopify 聚会网络，该网络正在加速扩张。你可以在 Shopify 网站的合作伙伴活动页面（`https://www.shopify.com/partners/blog/partner-events`）上找到即将举行的聚会列表。\n\
    \n还有 Unite，这是 Shopify 的年度合作伙伴大会，也是公司发布重大功能公告的场所。此外，Shopify 经常在全球范围内支持或举办本地研讨会和为期一天的卫星会议。请联系你在\
    \ Shopify 的客户经理，了解你所在地区即将举办的活动。\n\n### 使用开源\n\n最后，在从事 Shopify 项目时可以利用的最佳资源之一是\
    \ GitHub（是的，还有其他开源平台可供选择）。Shopify 不仅倾向于将大量代码作为“官方”开源仓库发布，来自世界各地的第三方开发者和专家也分享了自己的项目、工具和代码片段。\n\
    \n除了发布我们自己的几个开源项目外，我的公司还使用（并随后贡献代码给）现有库，例如 Ruby 和 Python 的 Shopify API 客户端，或 Shopify\
    \ App gem。修复你遇到的问题并将你的补丁贡献回项目，这对每个人都有帮助，并且常常能带来与有趣客户合作的机会。\n\n在为客户解决问题时，熟悉开源流程也可能是一个优势。在某些情况下，你可以直接与试图修复\
    \ Shopify 代码库中错误的开发者进行对话。²\n\n## 总结\n\n在结束本章（以及本书的主体部分）之际，我想强调，我认为 Shopify 合作伙伴生态系统的协作性质是其平台成功的关键。在我从事该平台的多年间，每当我有疑问或请求时，几乎毫无例外地都感受到了\
    \ Shopify 社区其他成员的温暖、耐心和帮助。\n\n只需在 Twitter 上联系一位专家，或通过电子邮件给他们发条消息，就能带来富有成效的讨论、有趣的客户工作，偶尔还能收获友谊，因为事实证明，大多数人都乐于讨论他们的工作并分享他们所知。\n\
    \n以 Twitter 上的 `@gavinballard` 为例——他总是乐于聊 Shopify 并欢迎新关注者！\n\n脚注  \n1  \n`http://gavinballard.com/using-respond.js-with-shopify/`\n\
    \n2  \n例如，请查看 `https://github.com/Shopify/active_shipping/pull/170#issuecomment-50399499`，在那里我能够直接与负责配送逻辑的\
    \ Shopify 开发者合作，为我们的一个客户解决问题。\n"
