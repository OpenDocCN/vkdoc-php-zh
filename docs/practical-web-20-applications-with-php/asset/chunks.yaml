    can potentially grow quite large on a high-traffic site that records lots of debugging
    information.


    You may want to consider using a tool such as logrotate.


    In any case, a solid foundation is now in place for your application logging and
    auditing needs. You can now easily add logging capabilities to any new classes
    you develop.


    **Site Error Handling**


    We are now going to change our code to handle any errors that may occur when users
    access the site. Several kinds of errors can occur in the day-to-day running of
    your web site:


    • **Database errors.** This is any error relating to accessing the database server
    or its data.


    For example, the following are possible errors that may occur:


    • Connection errors, caused because the server or network may be down, the username
    or password are incorrect, or the database name is incorrect.


    • Query errors, caused when the SQL being used is invalid. If your application
    has been correctly developed and tested, then these should never occur.


    • Data errors, caused by violating a constraint in the database. This may occur
    if you enter a duplicate value in a unique field or if you delete data from a
    table that is referenced elsewhere via a foreign key. Once again, this should
    not occur if the application has been developed and tested correctly.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch14CMP2 11/13/07 8:20 PM Page 525


    C H A P T E R 1 4 ■ D E P L OY M E N T A N D M A I N T E N A N C E


    **525**


    • **Application runtime errors.** This is a fairly broad title for basically any
    error (including uncaught exceptions) that occurs in code. Examples of application
    errors that may occur are as follows:


    • Filesystem and permission errors, such as if the application tries to read a
    file that doesn’t exist or that it is not allowed to read. Similarly, if the application
    tries to write a file but isn’t allowed to, then this will also cause an error.
    A file that your application reads that is in the incorrect format may also cause
    an error.


    • If your application accesses web services on remote servers, then how well your
    application runs is partly dependent on these servers. For example, if you process
    credit card payments using a third-party gateway, then that gateway must be oper-ational
    for you to make sales on your site.


    • **HTTP errors.** These are errors that occur based on the user’s request. The
    most common HTTP error (and the one that we are going to cover in this section)
    is a 404 File Not Found error. Although many different errors can occur, other
    common errors are 401


    Unauthorized (if a user tries to access a resource that they must be logged in
    for) and 403 Forbidden (if the user simply isn’t allowed to access the resource).


    ■**Note** First, because of the Apache rewrite rules we set up for our application
    in Chapter 2, we won’t be handling 404 errors in the “traditional way” that people
    do with Apache (using ErrorDocument 404).


    Rather, we will generate 404 errors when a user tries to access a controller or
    action that does not exist.


    Second, the 401 and 403 errors don’t apply to our application, even though we
    have a permissions system.


    This is because we’ve implemented our own user login and permissions system, so
    the traditional HTTP


    codes don’t apply.


    Although we could have included the aforementioned error handling when setting
    up the application (specifically, for handling database and 404 errors), I have
    chosen to group it all together into this single section so you can see how the
    system reacts to errors as a whole.


    Note that in some cases we have already handled various application errors that
    occur. An example of this is catching exceptions that have been thrown in various
    circumstances, such as in Chapter 12 when implementing blog post indexing capabilities.


    In the error handling we are now going to implement, we will add handling capabilities
    to two areas of the application:


    • Before the request is dispatched. This is to handle any errors that occur prior
    to dispatching the result with Zend_Controller_Front. In other words, it’ll deal
    with any errors that occur with code inside the index.php bootstrap.


    • While the request is being dispatched. This is to handle any errors that occur
    within the application, such as in a controller action or in one of the many classes
    we have written (errors that we haven’t yet handled, that is). This also includes
    HTTP errors such as when the file isn’t found (404).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch14CMP2 11/13/07 8:20 PM Page 526


    **526**


    C H A P T E R 1 4 ■ D E P L OY M E N T A N D M A I N T E N A N C E


    **Objectives of Error Handling**


    Before we implement any error handling, we must determine what we’re actually
    trying to achieve by handling the error. An error handling system should do the
    following:


    • **Notify the user that an error occurred.** Whether it is a system error or
    user error that has occurred, the user should still know that something went wrong
    and their request could not be completed correctly.


    • **Record the error.** This may involve either writing the error to a log file
    or notifying the system administrator, or both. Typically a user error (such as
    a 404 error) is not something you’d need to notify the administrator about (although
    logging 404 errors can be useful in statistics analysis).


    • **Roll back the current request.** If a server error occurs halfway through
    a client request, then any performed actions should be rolled back. Let’s use
    the example of having a system that saves a user-submitted form to a local database
    and submits it to a third-party server. If the third-party server is down (resulting
    in an error), then the form shouldn’t be saved locally and the user should be
    notified so. Note that our application isn’t required to handle errors in this
    manner.


    ■**Note** This example is somewhat crude. In actual fact, if you had such a system,
    you would typically have an external process (such as a cron job/scheduled task)
    that was responsible for communicating with the third-party server rather than
    performing the action in real time while completing the user request. The local
    database record would then have a status column to indicate whether the form has
    been successfully submitted remotely. The example should demonstrate the point
    of rolling back the request.


    **Handling Predispatch Errors**


    First we are going to handle any errors that may arise prior to dispatching the
    user request. In our application, before we dispatch the request, we load the
    configuration file, initialize the application logger, and connect to the database.
    Additionally, we are going to catch any errors that were not caught elsewhere
    (that is, in the dispatch loop).'
