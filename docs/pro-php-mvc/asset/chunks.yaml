    \    if (is_string($tree))\n        {\n            $tree = addslashes($tree);\n\
    \            return \"\\$_text[] = \\\"{$tree}\\\";\";\n        }\n        \n\
    \        if (sizeof($tree[\"children\"]) > 0)\n        {\n            foreach\
    \ ($tree[\"children\"] as $child)\n            {\n                $content[] =\
    \ $this->_script($child);\n            }\n        }\n        \n        if (isset($tree[\"\
    parent\"]))\n        {\n            return $this->_implementation->handle($tree,\
    \ implode($content));\n        }\n        \n        return implode($content);\n\
    \    }\n}\n```\n\n## `_script()` 方法说明\n\n最后一个受保护的解析器方法是 `_script()` 方法。它遍历（由 `_tree()`\
    \ 方法生成的）层次结构，解析纯文本节点，并间接调用每个有效标签的处理程序。`_script()` 方法应生成语法正确的函数体。\n\n## 解析器的完整性与简化需求\n\
    \n我们的解析器在技术上已经完备。如果这些受保护的方法是公开的，我们就可以将一系列语句串联起来实现多种用途：将模板转换为数组，将该数组转换为树，并利用脚本转换该树。不过，我们想要更简便的方法。需要牢记的是，我们的模板是预编译的，也就是说我们需要先将它们编译成函数，然后才能使用。\n\
    \n因此，我们可以通过提供两个公共方法来简化模板解析：一个用于将模板转换为函数，另一个用于根据输入数据数组来处理模板。让我们看看清单 8-11 中的这两个方法。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 主公共解析器方法\n\n**清单 8-11.**\
    \ 主公共解析器方法\n\n```php\nnamespace Framework\n{\n    use Framework\\Base as Base;\n\
    \    use Framework\\ArrayMethods as ArrayMethods;\n    use Framework\\StringMethods\
    \ as StringMethods;\n    use Framework\\Template\\Exception as Exception;\n  \
    \  \n    class Template extends Base\n    {\n        public function parse($template)\n\
    \        {\n            if (!is_a($this->_implementation, \"Framework\\Template\\\
    Implementation\"))\n            {\n                throw new Exception\\Implementation();\n\
    \            }\n            \n            $array = $this->_array($template);\n\
    \            $tree = $this->_tree($array[\"all\"]);\n            $this->_code\
    \ = $this->header . $this->_script($tree) . $this->footer;\n            $this->_function\
    \ = create_function(\"\\$_data\", $this->code);\n            \n            return\
    \ $this;\n        }\n        \n        public function process($data = array())\n\
    \        {\n            if ($this->_function == null)\n            {\n       \
    \         throw new Exception\\Parser();\n            }\n            \n      \
    \      try\n            {\n                $function = $this->_function;\n   \
    \             return $function($data);\n            }\n            catch (\\Exception\
    \ $e)\n            {\n                throw new Exception\\Parser($e);\n     \
    \       }\n        }\n    }\n}\n```\n\n## `parse()` 与 `process()` 方法说明\n\n除了为模板解析器分配模板实现之外，在评估和填充模板时，你只会使用\
    \ `parse()` 和 `process()` 这两个公共方法。`parse()` 方法利用我们迄今为止为模板解析器编写的所有代码来创建一个可用的函数。它将处理后的模板包裹在我们之前看到的\
    \ `$_header` 和 `$_footer` 变量中。然后，通过调用 PHP 的 `create_function` 方法对其求值，并将其赋值给受保护的\
    \ `$_function` 属性。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n`process()`\
    \ 方法检查受保护的 `$_function` 属性是否存在，如果不存在则抛出 `Template\\Exception\\Parser` 异常。然后，它尝试使用传递给它的\
    \ `$data` 执行生成的函数。如果函数执行出错，则抛出另一个 `Template\\Exception\\Parser` 异常。\n\n## 示例模板展示\n\
    \n让我们看看解析器在后台如何处理清单 8-12 中所示的模板。\n\n**清单 8-12.** 示例模板\n\n```php\n{if $name &&\
    \ $address}\n    name: {echo $name} <br />\n    address: {echo $address} <br />\n\
    {/if}\n{elseif $name}\n    name: {echo $name} <br />\n{/elseif}\n{foreach $value\
    \ in $stack}\n    {foreach $item in $value}\n        item ({echo $item_i}): {echo\
    \ $item} <br />\n    {/foreach}\n{/foreach}\n{foreach $value in $empty}\n    <!--never\
    \ printed-->\n{/foreach}\n{else}\n    nothing in that stack! <br />\n{/else}\n\
    {macro test($args)}\n    this item's value is: {echo $args} <br />\n{/macro}\n\
    {foreach $value in $stack[\"one\"]}\n    {echo test($value)}\n{/foreach}\n{if\
    \ true}\n    in first <br />\n    {if true}\n        in second <br />\n      \
    \  {if true}\n            in third <br />\n        {/if}\n    {/if}\n{/if}\n```\n"
