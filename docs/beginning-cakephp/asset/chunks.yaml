    **Listing 13-4.** *An Example of a Plugin Model Extending the App Model*


    <?


    class EventModel extends CalendarAppModel {


    var $name = ''Event'';


    }


    ?>


    Helpers, components, behaviors, and DataSources may also be used as part of a
    plugin.


    Their naming conventions generally remain the same as when used as elements of
    a Cake application and not as plugin elements. Refer to Table 13-1 for information
    on how to name other plugin classes and what objects they extend.


    **Running Plugin Actions**


    Once a plugin is installed in your Cake application, you may access its actions
    by adding the plugin name plus the action and parameters to the URL. The Events
    controller used in Listing 13-3 could be called in the blog application with the
    following URL:


    [http://localhost/blog/calendar/events](http://localhost/blog/calendar/events)


    Of course, the action and parameters also follow:


    [http://localhost/blog/calendar/events/view/01/2009](http://localhost/blog/calendar/events/view/01/2009)


    Controllers in the surrounding Cake application can run a plugin’s controller
    actions using the requestAction() function:


    $events = $this->requestAction(array(''controller''=>''CalendarEvents'',''action''=>➥


    ''getEvents''));


    **Using Plugin Layouts**


    By default, the plugin will use the default layout in the surrounding application’s
    app/views/


    layouts directory. Specifying a layout stored in the plugin is simple: just use
    the $layout class variable in either the action or the controller. Be sure to
    add the plugin name to the layout setting. Listing 13-5 gives an example of how
    to do this.


    **Listing 13-5.** *Using a Plugin Layout in the Plugin Controller*


    <?


    class EventsController extends CalendarAppController {


    var $name = ''Events'';


    var $layout = ''Calendar.default'';


    }


    ?>


