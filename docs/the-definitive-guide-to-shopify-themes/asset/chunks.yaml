- fmt: "### Official Shopify Channels\n\nShopify has a number of “official” channels\
    \ for communicating with developers and partners and facilitating community discussion.\
    \ The key ones are:\n\n- The Shopify Forums (`https://ecommerce.shopify.com/forums`)\
    \ are great place to start searching when looking for answers to questions you\
    \ might have about Shopify concepts or development. One of the best ways to build\
    \ up a reputation in the community is by helping other people out here, or posting\
    \ about your own experiences.\n- Make sure you’re subscribed to Shopify’s various\
    \ blogs via RSS or e-mail. There are three official blogs—one targeted at merchants\
    \ (`https://www.shopify.com/blog`), one at partners and developers (`https://www.shopify.com/partners/blog`),\
    \ and one focused on the enterprise offering Shopify Plus (`https://www.shopify.com/enterprise`).\
    \ Figure 11-9 shows the partner blog.\n\n  ![A437216_1_En_11_Fig9_HTML.jpg](A437216_1_En_11_Fig9_HTML.jpg)\n\
    \n  Figure 11-9\n\n  The Shopify Partner blog contains a constant stream of information\
    \ for developers and partners interested in Shopify.\n\n- Two “official” Shopify\
    \ podcasts currently exist—the infrequently-updated but in-depth Shopify Partners\
    \ Podcast, hosted by Keir Whitaker (`https://soundcloud.com/shopify-partners`)\
    \ and the merchant-focused Shopify Masters Podcast (`https://www.shopify.com/blog/topics/podcasts`),\
    \ hosted by Felix Thea.\n- There’s an official Shopify Partners Slack community,\
    \ which is open to all registered Shopify partners. Once you’re registered, introduce\
    \ yourself to your Partner Manager and ask for an invite.\n\n### Other Resources\n\
    \nOf course, one of the things that makes Shopify great is the multitude of community-driven\
    \ groups and initiatives. Some of the stand-outs to take note of are:\n\n- The\
    \ Unofficial Shopify Podcast, hosted by Kurt Elster (`http://www.unofficialshopifypodcast.com`).\
    \ It’s merchant-focused but often contains plenty of useful, actionable advice\
    \ for developers and other partners who’d like to learn skills that can benefit\
    \ storeowners.\n- The eCommTalk Slack channel, run by TJ Mapes (`http://ecommtalk.com`).\
    \ A great mix of partners, marketers and merchants, this community contains plenty\
    \ of experienced people willing to help out fellow Shopify developers.\n- The\
    \ Shopify Entrepreneurs Facebook group, run by Jonathan Kennedy (`https://www.facebook.com/groups/shopifyentrepreneurs/`).\
    \ Not that technically-minded, but it’s a great way to connect with and help out\
    \ aspiring Shopify merchants, so for a developer it’s fertile ground for honing\
    \ theme development skills.\n\n### IRL Events\n\nIf you’re itching to meet up\
    \ with others in the Shopify community offline, there are plenty of opportunities\
    \ to do that as well. In 2016, Shopify starting supporting a network of “official”\
    \ Shopify Meetups around the globe, a network that’s been expanding at an increasing\
    \ pace. You can find a list of upcoming meetups on the Partner Events page on\
    \ the Shopify site (`https://www.shopify.com/partners/blog/partner-events`).\n\
    \nThere’s also Unite, Shopify’s annual partner conference and where the company\
    \ makes major feature announcements. In addition, Shopify often supports or runs\
    \ local workshops and satellite one-day conferences around the globe. Contact\
    \ your Partner Manager at Shopify to find out what’s coming up in your corner\
    \ of the world.\n\n### Use Open-Source\n\nFinally, one of the best resources to\
    \ leverage when working on Shopify projects is GitHub (yes, other open-source\
    \ platforms are available). Not only does Shopify tend to release a lot of their\
    \ code as “official” open-source repositories, but third-party developers and\
    \ experts from around the world have shared their own projects, tools, and code\
    \ snippets as well.\n\nApart from releasing several of our own open-source projects,\
    \ my company has also used (and later contributed to) existing libraries like\
    \ the Ruby and Python Shopify API clients or the Shopify App gem. Fixing problems\
    \ you run into and contributing your patches back into a project helps everyone\
    \ and can often lead to opportunities to work with interesting clients.\n\nBeing\
    \ familiar with the open-source process can also be an advantage when trying to\
    \ resolve issues on behalf of clients. In some cases, you’re able to have a direct\
    \ conversation with the developers trying to resolve a bug in the Shopify codebase.²\n\
    \n## Summary\n\nTo wrap up this chapter (and the substantive portion of this book),\
    \ I want to emphasize how much I see the collaborative nature of Shopify’s partner\
    \ ecosystem as key to the platform’s success. In my years working on the platform,\
    \ I have almost without exception been greeted with warmth, patience, and helpfulness\
    \ from others in the Shopify community as I’ve reached out with questions or requests.\n\
    \nSimply pinging a fellow expert on Twitter or dropping someone a line via e-mail\
    \ has led to fruitful discussions, interesting client work, and the occasional\
    \ friendship, as it turns out that most people are happy to discuss their work\
    \ and share what they know.\n\nTake `@gavinballard` on Twitter as an example—he’s\
    \ always keen to chat Shopify and greet new followers!\n\nFootnotes  \n1  \n`http://gavinballard.com/using-respond.js-with-shopify/`\n\
    \n2  \nAs an example, check out `https://github.com/Shopify/active_shipping/pull/170#issuecomment-50399499`,\
    \ where I was able to work directly with the Shopify developers responsible for\
    \ the shipping logic to resolve a problem for a client of ours."
