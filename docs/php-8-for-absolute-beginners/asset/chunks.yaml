- fmt: "### Secure Programming\n\nError messages can sometimes display some of our\
    \ code in an attempt to help us determine how to fix a syntax problem. For example,\
    \ the error might show the locations or even userids and passwords to access our\
    \ databases. A user is more likely to come back to our site if a \"temporarily\
    \ unavailable\" message is displayed instead of an error indicating the system\
    \ crashed.\n\n> **Note:**  \n> By default, the setup file for PHP sets the display\
    \ of all errors to on. In a live environment, we would need to turn this parameter\
    \ off by modifying its setting in the `php.ini` configuration file.\n\nIf you\
    \ are creating programs in an environment in which you do not have access to the\
    \ `php.ini` file, the display of errors might be turned off. In this situation,\
    \ you can include the following two lines of PHP at the beginning of your scripts\
    \ to display all error messages.\n\n```php\nerror_reporting( E_ALL );\nini_set(\
    \ \"display_errors\", 1 );\n```\n\nAll example programs shown in this book will\
    \ not include these statements, as we are assuming you are creating code in a\
    \ test environment in which all errors can be displayed.\n\n> **Hint:**  \n> Learn\
    \ the location of the *log files* created in your LAMP, WAMP, or MAMP stack. On\
    \ occasion, some errors that are not directly related to your program code may\
    \ be listed in these files. If your program does not execute and seems to also\
    \ not produce an error, the actual error might be in a log file.\n\nLet's produce\
    \ an error.\n\n```\nListing 2-4\ntest4.php\n```\n\nDo you see the error? PHP might\
    \ not display the error, but there is a problem. There is only one string delimiter\
    \ (double quote). To write valid PHP, we must wrap our strings in string delimiters.\
    \ In the preceding example, since the end delimiter is missing, PHP cannot see\
    \ where the output ends. If we run the code, we might see the following error\
    \ message in our browser.\n\n![](images/323857_3_En_2_Chapter/323857_3_En_2_Fig4_HTML.jpg)\n\
    \nThis window describes the error that occurs in the personal home page test,\
    \ parse error, syntax error, unexpected end of file, and expecting variables.\n\
    \n**Figure 2-4** – test4.php error\n\nError messages are friendly but not always\
    \ as precise as you might prefer. When PHP is unable to process code, an error\
    \ is triggered. The previous message clearly does not point out that a double\
    \ quote is missing in the code. PHP will make an educated guess about what the\
    \ problem might be. In the example, PHP has encountered an \"unexpected end of\
    \ file\" on line 6\\. But wait, the error was on line 4, not line 6! Why did it\
    \ miss the correct line? Remember that the starting delimiter indicates the start\
    \ of a string; the interpreter will assume everything after the double quote is\
    \ a string until it finds another one. However, it never finds another double\
    \ quote. It is assuming that the rest of the code, including `?>`, is part of\
    \ the string. Thus, it complains about the program ending too soon before the\
    \ string was complete.\n\n> **Hint:**  \n> When working with error messages, if\
    \ you do not see an error in the line indicated by the message, check one or more\
    \ lines above the line indicated. You probably forgot to include a double quote\
    \ or a semicolon.\n\n**Exercise:** Return to the example programs we have covered\
    \ previously in this chapter. Adjust the programs to remove or change code to\
    \ cause errors. Run the programs to discover what error messages will display.\
    \ You might want to even keep a list of error messages and possible problems in\
    \ a text file, for reference, while you are learning PHP. Being familiar with\
    \ the most common errors and possible solutions will greatly increase your time\
    \ used to debug programs.\n\nIf you encounter an error message you don't understand,\
    \ search the Internet for an explanation. A site such as [`www.stackoverflow.com`](http://www.stackoverflow.com)\
    \ is very likely to have an explanation for your particular error message. Someone\
    \ in this world has had the same error as your program produced. There are many\
    \ free sites and blogs that will help you determine a solution.\n\n## Creating\
    \ an HTML5 Page with PHP\n\nPHP is a wonderful language for creating dynamic HTML\
    \ pages. With a tiny bit of PHP, we can create a valid HTML5 page with variable\
    \ content in memory and have PHP output the created page to the browser.\n\n###\
    \ HTML Review\n\nHTML requires a few tags to be properly formatted. Additional\
    \ tags are available in HTML5 to organize the information in a more logical design.\n\
    \n```html\n<!DOCTYPE html>\n<html>\n  <head>\n    <title>Page Title</title>\n\
    \  </head>\n  <body>\n    <p>The page body</p>\n  </body>\n</html>\n```\n\nAll\
    \ HTML must exist between the opening (`<html>`) and closing (`</html>`) tags.\
    \ After the opening tag, a head section (`<head></head>`) should be included to\
    \ provide the title of the page (`<title></title>`) and other page information.\
    \ The actual HTML tags used to display contents of a web page are placed between\
    \ the body tags (`<body></body>`). The `<p></p>` tags will display the string\
    \ in paragraph form.\n\nFor additional details on these HTML tags, visit one of\
    \ the free online tutorial sites, such as [w3schools.com](http://w3schools.com).\n\
    \nWe will use this basic HTML structure to create a bare-bones skeleton for a\
    \ personal portfolio site. Let's create `index.php` with the code shown in Listing\
    \ 2-5.\n\n```php\n<?php\n$title = \"Hello World\";\n$content = \"<h1>Hello World</h1>\"\
    ;\n$page = \"\n<!DOCTYPE html>\n<html>\n  <head>\n    <title>$title</title>\n\
    \  </head>\n  <body>\n    $content\n  </body>\n</html>\n\";\necho $page;\n?>\n\
    Listing 2-5\nindex.php\n```\n\nThis `index.php` program includes three variables:\
    \ `$title`, `$content`, and `$page`. The first two set information within the\
    \ HTML provided in `$page`. The only actual instruction that sends information\
    \ to the browser is the final `echo` statement. This statement sends all the HTML\
    \ tags within `$page` to be interpreted, producing the output shown in Figure\
    \ 2-5a.\n\n![](images/323857_3_En_2_Chapter/323857_3_En_2_Fig6_HTML.jpg)\n\nThis\
    \ image represents the source code of hypertext markup language discover a well\
    \ formed page with a head, title, meta, and body steps.\n\n**Figure 2-5b** – index.php\
    \ source code\n\n![](images/323857_3_En_2_Chapter/323857_3_En_2_Fig5_HTML.jpg)\n\
    \nThis window represents the result of executing the code in the index, the output\
    \ is hello world.\n\n**Figure 2-5a** – index.php output\n\nWhen we view the *source\
    \ code* produced in the browser (Figure 2-5b), we discover a well-formed HTML5\
    \ page with a title and a heading. It's a good habit to inspect the source code\
    \ of your PHP-generated HTML pages. Any HTML errors are usually highlighted by\
    \ the browser in the source view.\n\n### Including a Simple Page Template\n\n\
    Creating a valid HTML5 page with PHP is a very, very common task. Let's try to\
    \ create the same output in a way that's easier to reuse in other projects. If\
    \ you can reuse your code in other projects, you can develop solutions faster\
    \ and more efficiently. We will keep the HTML5 page template in a separate file.\n\
    \nWe will create a new folder called `templates` in our existing PHP project.\
    \ The PHP file `page.php` will be placed in the `templates` folder, containing\
    \ the code shown in Listing 2-6.\n\n```php\n<?php\n$page = \"\n<!DOCTYPE html>\n\
    <html>\n  <head>\n    <title>$title</title>\n  </head>\n  <body>\n    $content\n\
    \  </body>\n</html>\n\";\n?>\nListing 2-6\npage.php\n```\n\nThe `page.php` file\
    \ contains only the `$page` variable seen in Listing 2-6. The other two variables\
    \ and the `echo` statement will exist in the `newindex.php` file."
