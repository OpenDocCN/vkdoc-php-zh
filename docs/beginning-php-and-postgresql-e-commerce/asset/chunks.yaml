- fmt: '# 第9章 处理客户订单


    那个按钮看起来相当普通，但老实说，它是本章的核心。尽管如此，按钮背后隐藏着许多逻辑，所以让我们讨论一下当客户点击该按钮时应该发生什么。请记住，在这个阶段，我们并不关心是谁下的订单，但我们确实希望将关于所订购产品的信息存储在数据库中。


    基本上，当客户点击“提交订单”按钮时，需要发生两件事：


    * 首先，订单必须存储在数据库中的某个位置。这意味着您必须将购物车中的产品保存到一个名为`HatShop Order ***nnn***`的订单中，并清空购物车。

    * 其次，客户会被重定向到一个PayPal支付页面，客户在该页面上支付订单所需的金额。您可以在图9-2中看到PayPal支付页面。


    **图9-2.** *PayPal支付页面*


    > **注意** 对于第二个开发阶段，我们仍然不自行处理付款，而是使用第三方支付处理器。现在我们不再需要PayPal购物车，因为我们在上一章中实现了自己的购物车。相反，我们将使用PayPal的单品购买选项，该选项将访问者直接重定向到支付页面。


    使用第三方支付处理器时出现的一个问题是，客户可能会在结账页面改变主意并取消订单。这可能导致订单已保存到数据库中（订单在页面重定向到支付页面之前已保存），但付款未完成。显然，我们需要一个付款确认系统，以及一个能够存储每个订单状态信息的数据库结构。


    您将实现的确认系统很简单。每个支付处理器，包括PayPal，都可以被指示在处理付款后发送确认消息。我们将允许站点管理员在管理页面中手动检查哪些订单已付款。这些订单被称为已验证订单。您将在本章后面看到如何在站点的订单管理部分管理它们。


    > **注意** PayPal及其竞争对手提供自动化系统，当付款完成或取消时通知您的网站。然而，本书不深入探讨这些支付系统的具体细节——您需要自行研究并学习所选公司的文档。PayPal即时付款通知文档包含在订单管理集成指南中，可从`https://www.paypal.com/en_US/pdf/PP_OrderManagement_IntegrationGuide.pdf`下载。


    现在您已经了解了如何处理那个“提交订单”按钮，接下来的主要问题是：哪些订单信息需要存储在数据库中，以及如何存储。正如您在前几章中所见，决定如何存储信息有助于您更好地理解整个系统的工作方式。


    ## 在数据库中存储订单


    需要存储两种订单信息：


    * 关于订单的通用详细信息，例如订单创建日期；产品是否已发货以及何时发货；订单是已验证、已完成还是已取消；以及其他一些细节。

    * 属于该订单的产品及其数量。


    在本章后面创建的订单管理页面中，您将能够查看和修改通用订单信息。


    ## 创建新的数据表


    由于所存储信息的性质，您需要两个数据表：`orders`和`order_detail`。`orders`表存储关于整个订单的信息，而`order_detail`包含属于每个订单的产品。'
  raw: 'C H A P T E R 9 ■ D E A L I N G W I T H C U S TO M E R O R D E R S


    The button looks quite boring for something that we can honestly say is the center
    of this chapter’s universe. Still, a lot of logic is hidden behind it, so let’s
    talk about what should happen when the customer clicks that button. Remember that
    at this stage we don’t care who places the order, but we do want to store information
    in the database about the products that were ordered.


    Basically, two things need to happen when the customer clicks the Place Order
    button:


    • First, the order must be stored somewhere in the database. This means that you
    must save the shopping cart’s products to an order named HatShop Order ***nnn***
    and clear the shopping cart.


    • Secondly, the customer is redirected to a PayPal payment page where the customer
    pays the necessary amount for the order. You can see the PayPal payment page in
    Figure 9-2.


    **Figure 9-2.** *The PayPal payment page*


    ■**Note** For the second development stage, we still don’t process payments ourselves
    but use a third-party payment processor instead. Now we no longer need the PayPal
    shopping cart because we implemented our own in the previous chapter. Instead,
    we’ll use the Single Item Purchases option of PayPal, which redirects the visitor
    directly to a payment page.


    A problem that arises when using a third-party payment processor is that the customer
    can change his mind and cancel the order while at the checkout page. This can
    result in orders


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH09.qxd 11/17/06 3:39 PM Page 305


    C H A P T E R 9 ■ D E A L I N G W I T H C U S TO M E R O R D E R S


    **305**


    that are saved to the database (the order is saved before the page is redirected
    to the payment page) but for which payment wasn’t completed. Obviously, we need
    a payment confirmation system, along with a database structure that is able to
    store status information about each order.


    The confirmation system that you’ll implement is simple. Every payment processor,
    including PayPal, can be instructed to send a confirmation message after a payment
    has been processed. We’ll allow the site administrator to manually check, in the
    administration page, which orders have been paid for. These orders are known as
    verified orders. You’ll see later in this chapter how to manage them in the orders-management
    part of the site.


    ■**Note** PayPal and its competitors offer automated systems that inform your
    web site when a payment has been completed or canceled. However, this book doesn’t
    visit the intimate details of any of these payment systems—you’ll need to do your
    homework and study the documentation of your company of choice. The PayPal Instant
    Payment Notification documentation is included in the Order Management Integration
    Guide, which can be downloaded at https://www.paypal.com/en_US/pdf/


    PP_OrderManagement_IntegrationGuide.pdf.


    Now that you have an idea of what to do with that Place Order button, the next
    major concerns are what order information to store in the database and how to
    store it. As you saw in previous chapters, deciding how to store information helps
    you get a better idea of how the whole system works.


    **Storing Orders in the Database**


    Two kinds of order information need to be stored:


    • General details about the order, such as the date the order was created; whether
    and when the products have been shipped; whether the order is verified, completed,
    or canceled; and a few other details


    • The products that belong to that order and their quantities In the orders administration
    page that you’ll create later in this chapter, you’ll be able to see and modify
    the general order information.


    Creating the New Data Tables


    Due to the nature of the information that will be stored, you need two data tables:
    orders and order_detail. The orders table stores information regarding the order
    as a whole, while order_detail contains the products that belong to each order.


    [www.it-ebooks.info](http://www.it-ebooks.info/)'
