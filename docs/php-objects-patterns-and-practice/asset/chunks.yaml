    There can be no guarantees about properties that have been dynamically set, though.'
  trans: '

    ### 第一个（或两个）对象


    如果说类是生成对象的模板，那么对象就是根据类中定义的模板结构化的数据。对象被称为其类的实例，其类型由该类定义。


    我将使用 `ShopProduct` 类作为模具来生成 `ShopProduct` 对象。为此，我需要使用 `new` 运算符。`new` 运算符与类名配合使用，示例如下：


    ```

    // listing 03.02

    $product1 = new ShopProduct();

    $product2 = new ShopProduct();

    ```


    `new` 运算符以类名作为唯一操作数，并返回该类的一个实例；在我们的示例中，它生成了一个 `ShopProduct` 对象。


    我已经使用 `ShopProduct` 类作为模板生成了两个 `ShopProduct` 对象。虽然它们在功能上完全相同（即都是空的），但 `$product1`
    和 `$product2` 是由同一个类生成的同一类型的**不同**对象。


    如果你还不理解，可以试试这个类比。想象一台制造塑料鸭子的机器，其中的模具就是类。我们的对象就是这台机器生成的鸭子。生成的物品类型由压制它的模具决定。这些鸭子在外观上完全相同，但它们是不同的实体。换句话说，它们是同一类型的不同实例。这些鸭子甚至可能有各自的序列号来证明其身份。在
    PHP 脚本中创建的每个对象也都有自己唯一的标识符。（请注意，该标识符在对象的生命周期内是唯一的；也就是说，PHP 会重用标识符，即使在同一进程内也是如此。）我可以通过打印
    `$product1` 和 `$product2` 对象来演示这一点：


    ```

    // listing 03.03

    var_dump($product1);

    var_dump($product2);

    ```


    执行这些函数会产生以下输出：


    ```

    object(popp\ch03\batch01\ShopProduct)#235 (0) {

    }

    object(popp\ch03\batch01\ShopProduct)#234 (0) {

    }

    ```


    **注意：** 在旧版 PHP 中（直至 5.1 版本），你可以直接打印对象。这会将该对象强制转换为包含对象 ID 的字符串。从 PHP 5.2 开始，该语言不再支持这种魔法，任何将对象当作字符串处理的尝试都会导致错误，除非在对象的类中定义了一个名为
    `__toString()` 的方法。我将在本章后面介绍方法，并在第 4 章“高级特性”中介绍 `__toString()`。


    通过将对象传递给 `var_dump()`，我可以提取有用信息，包括每个对象在井号后的内部标识符。


    为了让这些对象更有趣，我可以修改 `ShopProduct` 类，使其支持称为属性的特殊数据字段。


    ## 在类中设置属性


    类可以定义称为属性的特殊变量。属性（也称为成员变量）保存的数据可以在不同对象之间变化。因此，以 `ShopProduct` 对象为例，你可能希望操作标题和价格等字段。


    类中的属性看起来与标准变量相似，不同之处在于声明属性时，必须在属性变量前加上一个可见性关键字。这可以是 `public`、`protected` 或 `private`，它决定了该属性可以被访问的作用域。


    **注意：** 作用域指的是变量有意义（它同样适用于方法，我将在本章后面介绍）的函数或类上下文。因此，在函数内定义的变量存在于局部作用域，而在函数外定义的变量存在于全局作用域。一个经验法则是，你无法访问比当前作用域更局部的数据。所以，如果你在函数内部定义了一个变量，之后无法从函数外部访问它。对象比这更具渗透性，某些对象变量有时可以从其他上下文访问。正如你将看到的，哪些变量可以被访问以及从什么上下文访问，由
    `public`、`protected` 和 `private` 关键字决定。


    我将在本章后面重新讨论这些关键字和可见性问题。现在，我使用 `public` 关键字声明一些属性：


    ```

    // listing 03.04

    class ShopProduct

    {

    public $title = "default product";

    public $producerMainName = "main name";

    public $producerFirstName = "first name";

    public $price  = 0;

    }

    ```


    如你所见，我设置了四个属性，并为每个属性分配了默认值。任何从 `ShopProduct` 类实例化的对象现在都将预先填充默认数据。每个属性声明中的 `public`
    关键字确保我可以从对象上下文外部访问该属性。


    你可以使用字符 `''->''`（对象运算符）结合对象变量和属性名称，逐个对象地访问属性变量，示例如下：


    ```

    // listing 03.05

    $product1 = new ShopProduct();

    print $product1->title;

    default product

    ```


    由于这些属性被定义为 `public`，你可以像读取它们一样为它们赋值，从而替换类中设置的任何默认值：


    ```

    // listing 03.06

    $product1 = new ShopProduct();

    $product2 = new ShopProduct();

    $product1->title="My Antonia";

    $product2->title="Catch 22";

    ```


    通过在 `ShopProduct` 类中声明并设置 `$title` 属性，我确保了所有 `ShopProduct` 对象在首次创建时都具有该属性。这意味着使用该类的代码可以基于这一假设来操作
    `ShopProduct` 对象。不过，由于我可以重置它，`$title` 的值可能因对象而异。


    **注意：** 使用类、函数或方法的代码通常被称为该类、函数或方法的**客户端**或**客户端代码**。在接下来的章节中，你会经常看到这个术语。


    事实上，PHP 并不强制我们在类中声明所有属性。你可以动态地向对象添加属性，示例如下：


    ```

    // listing 03.07

    $product1->arbitraryAddition = "treehouse";

    ```


    然而，这种为对象分配属性的方法并不被认为是面向对象编程中的良好实践。


    为什么动态设置属性是不良实践？当你创建一个类时，你定义了一个类型。你告知世界，你的类（以及从它实例化的任何对象）由一组特定的字段和函数组成。如果你的 `ShopProduct`
    类定义了 `$title` 属性，那么任何处理 `ShopProduct` 对象的代码都可以基于以下假设继续操作：`$title` 属性将可用。但动态设置的属性则无法提供任何保证。

    '
- fmt: '在现阶段，我的对象仍然有些笨重。当需要处理对象的属性时，我必须从对象外部进行操作。我通过访问对象来设置和获取属性信息。在多个对象上设置多个属性很快就会变得繁琐：


    ```

    // listing 03.08

    $product1 = new ShopProduct();

    $product1->title = "My Antonia";

    $product1->producerMainName  = "Cather";

    $product1->producerFirstName = "Willa";

    $product1->price = 5.99;

    ```


    我再次操作`ShopProduct`类，逐一覆盖所有默认属性值，直到设置完所有产品详细信息。现在我已经设置了一些数据，也可以访问它们：


    ```

    // listing 03.09

    print "author: {$product1->producerFirstName} "

    . "{$product1->producerMainName}\n";

    ```


    这会输出以下内容：


    ```

    author: Willa Cather

    ```


    这种设置属性值的方法存在许多问题。由于PHP允许您动态设置属性，因此如果拼写错误或忘记某个属性名，您将不会收到警告。例如，假设我想输入这一行：


    ```

    $product1->producerMainName  = "Cather";

    ```


    不幸的是，我错误地输入成了这样：


    ```

    $product1->producerSecondName  = "Cather";

    ```


    对于PHP引擎而言，这段代码完全合法，且不会发出警告。然而，当我打印作者姓名时，将得到意想不到的结果。


    另一个问题是，我的类过于宽松。我并未强制要求设置标题、价格或生产者名称。客户端代码可以确信这些属性存在，但很可能经常遇到默认值。理想情况下，我希望鼓励任何实例化`ShopProduct`对象的人设置有意义的属性值。


    最后，我需要费很大周折才能完成一项我可能经常需要做的事情。正如我们所见，打印完整的作者姓名是一个繁琐的过程。


    让对象替我处理这类繁琐工作会更好。


    所有这些问题都可以通过为`ShopProduct`对象提供一组自己的函数来解决，这些函数可以在对象上下文内部操作属性数据。


    ## 使用方法


    正如属性允许您的对象存储数据一样，方法允许您的对象执行任务。方法是在类内部声明的特殊函数。正如您所料，方法声明类似于函数声明。`function`关键字位于方法名称之前，后面跟着括号中可选的参数变量列表。方法体由大括号括起来：


    ```

    public function myMethod($argument, $another)

    {

    // ...

    }

    ```


    与函数不同，方法必须在类的主体中声明。它们还可以接受许多限定符，包括可见性关键字。与属性一样，方法可以声明为`public`、`protected`或`private`。通过将方法声明为`public`，您可以确保它可以从当前对象外部调用。如果方法声明中省略了可见性关键字，方法将被隐式声明为`public`。然而，良好的实践是对所有方法明确声明可见性（我将在本章后面回到方法修饰符）。


    ```

    // listing 03.10

    class ShopProduct

    {

    public $title = "default product";

    public $producerMainName = "main name";

    public $producerFirstName = "first name";

    public $price = 0;

    public function getProducer()

    {

    return $this->producerFirstName . " "

    . $this->producerMainName;

    }

    }

    ```


    在大多数情况下，您将使用对象变量结合对象运算符`->`和方法名称来调用方法。在方法调用中必须使用括号，就像调用函数一样（即使您没有向方法传递任何参数）：


    ```

    // listing 03.11

    $product1 = new ShopProduct();

    $product1->title = "My Antonia";

    $product1->producerMainName  = "Cather";

    $product1->producerFirstName = "Willa";

    $product1->price = 5.99;

    print "author: {$product1->getProducer()}\n";

    ```


    这会输出以下内容：


    ```

    author: Willa Cather

    ```


    我向`ShopProduct`类添加了`getProducer()`方法。请注意，我将`getProducer()`声明为`public`，这意味着它可以从类外部调用。


    我在这个方法的主体中引入了一个特性。`$this`伪变量是类引用对象实例的机制。如果您觉得这个概念难以理解，可以尝试将`$this`替换为短语“当前实例”。考虑以下语句：


    ```

    $this->producerFirstName

    ```


    这相当于：


    ```

    当前实例的$producerFirstName属性

    ```


    因此，`getProducer()`方法组合并返回`$producerFirstName`和`$producerMainName`属性，使我免于每次需要引用完整的生产者名称时都要执行此任务。


    这稍微改进了这个类。不过，我仍然受困于大量的不必要灵活性。我依赖客户端程序员来更改`ShopProduct`对象的属性，使其脱离默认值。这在两个方面存在问题。首先，正确初始化一个`ShopProduct`对象需要五行代码，没有程序员会为此感谢你。其次，我无法确保在初始化`ShopProduct`对象时设置任何属性。我需要的是一种在从类实例化对象时自动调用的方法。'
  raw: 'My objects are still cumbersome at this stage. When I need to work with an
    object’s properties, I must currently do so from outside the object. I reach in
    to set and get property information. Setting multiple properties on multiple objects
    will soon become a chore:


    ```

    // listing 03.08

    $product1 = new ShopProduct();

    $product1->title = "My Antonia";

    $product1->producerMainName  = "Cather";

    $product1->producerFirstName = "Willa";

    $product1->price = 5.99;

    ```


    I work once again with the `ShopProduct` class, overriding all the default property
    values one by one until I have set all product details. Now that I have set some
    data, I can also access it:


    ```

    // listing 03.09

    print "author: {$product1->producerFirstName} "

    . "{$product1->producerMainName}\n";

    ```


    This outputs the following:


    ```

    author: Willa Cather

    ```


    There are a number of problems with this approach to setting property values.
    Because PHP lets you set properties dynamically, you will not get warned if you
    misspell or forget a property name. For example, assume I want to type this line:


    ```

    $product1->producerMainName  = "Cather";

    ```


    Unfortunately, I mistakenly type it like this:


    ```

    $product1->producerSecondName  = "Cather";

    ```


    As far as the PHP engine is concerned, this code is perfectly legal, and I would
    not be warned. When I come to print the author’s name, though, I will get unexpected
    results.


    Another problem is that my class is altogether too relaxed. I am not forced to
    set a title, a price, or producer names. Client code can be sure that these properties
    exist, but is likely to be confronted with default values as often as not. Ideally,
    I would like to encourage anyone who instantiates a `ShopProduct` object to set
    meaningful property values.


    Finally, I have to jump through hoops to do something that I will probably want
    to do quite often. As we have seen, printing the full author name is a tiresome
    process.


    It would be nice to have the object handle such drudgery on my behalf.


    All of these problems can be addressed by giving the `ShopProduct` object its
    own set of functions that can be used to manipulate property data from within
    the object context.


    ## Working with Methods


    Just as properties allow your objects to store data, methods allow your objects
    to perform tasks. Methods are special functions declared within a class. As you
    might expect, a method declaration resembles a function declaration. The `function`
    keyword precedes a method name, followed by an optional list of argument variables
    in parentheses. The method body is enclosed by braces:


    ```

    public function myMethod($argument, $another)

    {

    // ...

    }

    ```


    Unlike functions, methods must be declared in the body of a class. They can also
    accept a number of qualifiers, including a visibility keyword . Like properties,
    methods can be declared `public`, `protected`, or `private`. By declaring a method
    `public`, you ensure that it can be invoked from outside of the current object.
    If you omit the visibility keyword in your method declaration, the method will
    be declared `public` implicitly. It is considered good practice, however, to declare
    visibility explicitly for all methods (I will return to method modifiers later
    in the chapter


    ```

    // listing 03.10

    class ShopProduct

    {

    public $title = "default product";

    public $producerMainName = "main name";

    public $producerFirstName = "first name";

    public $price = 0;

    public function getProducer()

    {

    return $this->producerFirstName . " "

    . $this->producerMainName;

    }

    }

    ```


    In most circumstances, you will invoke a method using an object variable in conjunction
    with the object operator, `->,` and the method name. You must use parentheses
    in your method call as you would if you were calling a function (even if you are
    not passing any arguments to the method):


    ```

    // listing 03.11

    $product1 = new ShopProduct();

    $product1->title = "My Antonia";

    $product1->producerMainName  = "Cather";

    $product1->producerFirstName = "Willa";

    $product1->price = 5.99;

    print "author: {$product1->getProducer()}\n";

    ```


    This outputs the following:


    ```

    author: Willa Cather

    ```


    I add the `getProducer()` method to the `ShopProduct` class. Notice that I declare
    `getProducer()` public, which means it can be called from outside the class.


    I introduce a feature in this method’s body. The `$this` pseudo-variable is the
    mechanism by which a class can refer to an object instance. If you find this concept
    hard to swallow, try replacing `$this` with the phrase “the current instance.”
    Consider the following statement:


    ```

    $this->producerFirstName

    ```


    This translates to the following:


    ```

    the $producerFirstName property of the current instance

    ```


    So the `getProducer()` method combines and returns the `$producerFirstName` and
    `$producerMainName` properties, saving me from the chore of performing this task
    every time I need to quote the full producer name.


    This has improved the class a little. I am still stuck with a great deal of unwanted
    flexibility, though. I rely on the client coder to change a `ShopProduct` object’s
    properties from their default values. This is problematic in two ways. First,
    it takes five lines to properly initialize a `ShopProduct` object, and no coder
    will thank you for that. Second, I have no way of ensuring that any of the properties
    are set when a `ShopProduct` object is initialized. What I need is a method that
    is called automatically when an object is instantiated from a class.'
  trans: '

    在现阶段，我的对象仍然有些笨重。当需要处理对象的属性时，我必须从对象外部进行操作。我通过访问对象来设置和获取属性信息。在多个对象上设置多个属性很快就会变得繁琐：


    ```

    // listing 03.08

    $product1 = new ShopProduct();

    $product1->title = "My Antonia";

    $product1->producerMainName  = "Cather";

    $product1->producerFirstName = "Willa";

    $product1->price = 5.99;

    ```


    我再次操作`ShopProduct`类，逐一覆盖所有默认属性值，直到设置完所有产品详细信息。现在我已经设置了一些数据，也可以访问它们：


    ```

    // listing 03.09

    print "author: {$product1->producerFirstName} "

    . "{$product1->producerMainName}\n";

    ```


    这会输出以下内容：


    ```

    author: Willa Cather

    ```


    这种设置属性值的方法存在许多问题。由于 PHP 允许您动态设置属性，因此如果拼写错误或忘记某个属性名，您将不会收到警告。例如，假设我想输入这一行：


    ```

    $product1->producerMainName  = "Cather";

    ```


    不幸的是，我错误地输入成了这样：


    ```

    $product1->producerSecondName  = "Cather";

    ```


    对于 PHP 引擎而言，这段代码完全合法，且不会发出警告。然而，当我打印作者姓名时，将得到意想不到的结果。


    另一个问题是，我的类过于宽松。我并未强制要求设置标题、价格或生产者名称。客户端代码可以确信这些属性存在，但很可能经常遇到默认值。理想情况下，我希望鼓励任何实例化`ShopProduct`对象的人设置有意义的属性值。


    最后，我需要费很大周折才能完成一项我可能经常需要做的事情。正如我们所见，打印完整的作者姓名是一个繁琐的过程。


    让对象替我处理这类繁琐工作会更好。


    所有这些问题都可以通过为`ShopProduct`对象提供一组自己的函数来解决，这些函数可以在对象上下文内部操作属性数据。


    ## 使用方法


    正如属性允许您的对象存储数据一样，方法允许您的对象执行任务。方法是在类内部声明的特殊函数。正如您所料，方法声明类似于函数声明。`function`关键字位于方法名称之前，后面跟着括号中可选的参数变量列表。方法体由大括号括起来：


    ```

    public function myMethod($argument, $another)

    {

    // ...

    }

    ```


    与函数不同，方法必须在类的主体中声明。它们还可以接受许多限定符，包括可见性关键字。与属性一样，方法可以声明为`public`、`protected`或`private`。通过将方法声明为`public`，您可以确保它可以从当前对象外部调用。如果方法声明中省略了可见性关键字，方法将被隐式声明为`public`。然而，良好的实践是对所有方法明确声明可见性（我将在本章后面回到方法修饰符）。


    ```

    // listing 03.10

    class ShopProduct

    {

    public $title = "default product";

    public $producerMainName = "main name";

    public $producerFirstName = "first name";

    public $price = 0;

    public function getProducer()

    {

    return $this->producerFirstName . " "

    . $this->producerMainName;

    }

    }

    ```


    在大多数情况下，您将使用对象变量结合对象运算符`->`和方法名称来调用方法。在方法调用中必须使用括号，就像调用函数一样（即使您没有向方法传递任何参数）：


    ```

    // listing 03.11

    $product1 = new ShopProduct();

    $product1->title = "My Antonia";

    $product1->producerMainName  = "Cather";

    $product1->producerFirstName = "Willa";

    $product1->price = 5.99;

    print "author: {$product1->getProducer()}\n";

    ```


    这会输出以下内容：


    ```

    author: Willa Cather

    ```


    我向`ShopProduct`类添加了`getProducer()`方法。请注意，我将`getProducer()`声明为`public`，这意味着它可以从类外部调用。


    我在这个方法的主体中引入了一个特性。`$this`伪变量是类引用对象实例的机制。如果您觉得这个概念难以理解，可以尝试将`$this`替换为短语“当前实例”。考虑以下语句：


    ```

    $this->producerFirstName

    ```


    这相当于：


    ```

    当前实例的$producerFirstName 属性

    ```


    因此，`getProducer()`方法组合并返回`$producerFirstName`和`$producerMainName`属性，使我免于每次需要引用完整的生产者名称时都要执行此任务。


    这稍微改进了这个类。不过，我仍然受困于大量的不必要灵活性。我依赖客户端程序员来更改`ShopProduct`对象的属性，使其脱离默认值。这在两个方面存在问题。首先，正确初始化一个`ShopProduct`对象需要五行代码，没有程序员会为此感谢你。其次，我无法确保在初始化`ShopProduct`对象时设置任何属性。我需要的是一种在从类实例化对象时自动调用的方法。

    '
- fmt: '### Creating a Constructor Method


    A constructor method is invoked when an object is created. You can use it to set
    things up, ensuring that essential properties are assigned values and any necessary
    preliminary work is completed.


    **Note**


    In versions previous to PHP 5, a constructor method took on the name of the class
    that enclosed it. So the `ShopProduct` class would use a `ShopProduct()` method
    as its constructor. This no longer works in all circumstances and was deprecated
    as of PHP 7. Name your constructor method `__construct()`.


    Note that the method name begins with two underscore characters. You will see
    this naming convention for many other special methods in PHP classes. Here I define
    a constructor for the `ShopProduct` class:


    ```

    // listing 03.12

    class ShopProduct

    {

    public $title;

    public $producerMainName;

    public $producerFirstName;

    public $price = 0;

    public function __construct(

    $title,

    $firstName,

    $mainName,

    $price

    ) {

    $this->title = $title;

    $this->producerFirstName = $firstName;

    $this->producerMainName = $mainName;

    $this->price = $price;

    }

    public function getProducer()

    {

    return $this->producerFirstName . " "

    . $this->producerMainName;

    }

    }

    ```


    Once again, I gather functionality into the class, saving effort and duplication
    in the code that uses it. The `__construct()` method is invoked when an object
    is created using the `new` operator:


    ```

    // listing 03.13

    $product1 = new ShopProduct(

    "My Antonia",

    "Willa",

    "Cather",

    5.99

    );

    print "author: {$product1->getProducer()}\n";

    ```


    This produces the following:


    ```

    author: Willa Cather

    ```


    Any arguments supplied are passed to the constructor. So in my example, I pass
    the title, the first name, the main name, and the product price to the constructor.
    The constructor method uses the pseudo-variable `$this` to assign values to each
    of the object’s properties.


    **Note**


    A `ShopProduct` object is now easier to instantiate and safer to use. Instantiation
    and setup are completed in a single statement. Any code that uses a `ShopProduct`
    object can be reasonably sure that all its properties are initialized.


    This predictability is an important aspect of object-oriented programming. You
    should design your classes so that users of objects can be sure of their features.
    One way you can make an object safe is to render predictable the types of data
    it holds in its properties. One might ensure that a `$name` property is always
    made up of character data, for example. But how can you achieve this if property
    data is passed in from outside the class? In the next section, I examine a mechanism
    you can use to enforce object types in method declarations.


    ## Arguments and Types


    Type determines the way data can be managed in your scripts. You use the `string`
    type to display character data, for example, and manipulate such data with string
    functions. Integers are used in mathematical expressions, Booleans are used in
    test expressions, and so on. These categories are known as primitive types. On
    a higher level, though, a class defines a type. A `ShopProduct` object, therefore,
    belongs to the primitive type `object`, but it also belongs to the `ShopProduct`
    class type. In this section, I will look at types of both kinds in relation to
    class methods.


    Method and function definitions do not necessarily require that an argument should
    be of a particular type. This is both a curse and a blessing. The fact that an
    argument can be of any type offers you flexibility. You can build methods that
    respond intelligently to different data types, tailoring functionality to changing
    circumstances. This flexibility can also cause ambiguity to creep into code when
    a method body expects an argument to hold one type but gets another.


    ### Primitive Types


    PHP is a loosely typed language. This means that there is no necessity for a variable
    to be declared to hold a particular data type. The variable `$number` could hold
    the value `2` and the string `"two"` within the same scope. In strongly typed
    languages, such as C or Java, you must declare the type of a variable before assigning
    a value to it, and, of course, the value must be of the specified type.


    This does not mean that PHP has no concept of type. Every value that can be assigned
    to a variable has a type. You can determine the type of a variable’s value using
    one of PHP’s type-checking functions. Table [3-1](#A314621_5_En_3_Chapter.html#Tab1)
    lists the primitive types recognized in PHP and their corresponding test functions.
    Each function accepts a variable or value and returns `true` if this argument
    is of the relevant type.


    **Table 3-1. Primitive Types and Checking Functions in PHP**


    | Type Checking Function | Type | Description |

    | --- | --- | --- |

    | `is_bool()` | Boolean | One of the two special values, `true` or `false` |

    | `is_integer()` | Integer | A whole number. Alias of `is_int()` and `is_long()`
    |

    | `is_double()` | Double | A floating point number (a number with a decimal point).
    Alias of `is_float()` |

    | `is_string()` | String | Character data |

    | `is_object()` | Object | An object |

    | `is_array()` | Array | An array |

    | `is_resource()` | Resource | A handle for identifying and working with external
    resources such as databases or files |

    | `is_null()` | Null | An unassigned value |


    Checking the type of a variable can be particularly important when you work with
    method and function arguments.'
