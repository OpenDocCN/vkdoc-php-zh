  \ 13-5）。\n\n**图 13-5.** *来自 PsDummy 的审计表条目*\n\n**工作原理：订单处理功能的框架**\n\n`OrderProcessor`\
  \ 以及各个管道阶段会添加条目，以指示成功或失败。随后可以检查这些条目，了解订单的处理情况，这在错误检查时是一项重要功能。\n\n消息编号列很有意思，因为它允许你将特定消息与标识编号关联起来。你可以另外创建一个数据库表，将这些消息编号与描述对应起来，不过这并非必要，因为编号方案（本章后面会看到）本身就具有相当描述性。\n\
