  raw: 'All modern browsers—Chrome, IE7+, Firefox, Safari, and Opera—have a built-in
    `XMLHttpRequest` object.


    When an asynchronous request is made to the server, you need to watch for the
    state of the request and also for the response to the request. To do this, a function
    called `xmlhttp.onreadystatechange` is used in statement #6 and it continuously
    checks the status of the request.


    The `readyState` property shown in statement #7 holds the status of the server’s
    response. Each time the `readyState` changes, the `onreadystatechange` function
    will be executed. Here are the possible values for the `readyState` property:


    *   State Description

    *   0 The request is not initialized

    *   1 The request has been set up

    *   2 The request has been sent

    *   3 The request is in process

    *   4 The request is complete


    The `status` attribute in statement #7 represents the status of the HTTP request.
    If the `status` value is `500`, it represents an Internal Server Error; a `400`
    value represents a Bad Request; `401` represents Unauthorized; `403` represents
    Forbidden; `404` is Not Found, and so on. The status value `200` means no error.
    The `onreadystatechange` function checks for the state of the request. If the
    `state` has the value of `4`, that means that the full server response is received.
    If the `status` has a value of `200`, that means the response doesn’t have an
    error and you can continue processing it.


    Statement #8 accesses the element with the `cartcountinfo` ID. The `cartcountinfo`
    is the ID of the `span` element that is added to the header after the cart icon.
    It is through this element that the cart count returned by the file `countcart.php`
    will be displayed.


    Statement #9 displays the welcome message along with the user’s e-mail address
    if the user is already signed in and the session variable exists. Also, if the
    user is signed in, statement #10 displays the Log Out link, which invokes the
    `logout.php` file when clicked.


    To display the number of items in the cart, the `countcart.php` script, shown
    in Listing [4-4](#A978-1-4842-1672-9_4_Chapter.html#FPar7), accesses the items
    in the `cart` table that match the session ID of the site’s visitor and returns
    the count of the rows fetched.


    Listing 4-4\. The countcart.php File Counts and Returns the Number of Items Selected
    in the Cart


    `<?php`


    `$totalquantity=0;`


    `if (session_status() == PHP_SESSION_NONE) {`


    `session_start();`


    `}`


    `$connect = mysqli_connect("localhost", "root", "gold", "shopping") or die("Please,
    check your server connection.");`


    `$sess = session_id();`


    `$query="select * from cart where cart_sess = ''$sess''";`


    `$results = mysqli_query($connect, $query) or die(mysql_error());`


    `while ($row = mysqli_fetch_array($results, MYSQLI_ASSOC)) {`


    `extract($row);`


    `$totalquantity = $totalquantity + $cart_quantity;`


    `}`


    `echo $totalquantity;`


    `?>`


    You can see in this code that the connection to the MySQL server is established,
    the `shopping` database is active, and all the rows from the `cart` table that
    match the session ID of the visitor are accessed. The quantity of the items in
    the cart is added and the total of the quantity is returned as the cart count.
    Assuming the visitor selected two items in the cart, the cart count 2 will appear
    next to the cart icon in the site header, as shown in Figure [4-7](#A978-1-4842-1672-9_4_Chapter.html#Fig7).


