  raw: 'The _upload() method begins with us loading CakePHP’s bundled File class.
    This is due to the fact that CakePHP does not support the class autoloading we
    have come to expect from our own framework or Zend Framework.


    From there, we create a new File instance and use its copy() method to create
    a copy of the temporarily uploaded file within our ~/app/webroot/uploads directory.
    Finally, we save a reference to the uploaded file in the photos table. We call
    the _upload() method within our register() and settings() actions, as shown in
    Listing 32-7.


    ***Listing 32-7.*** ~/app/Controller/UsersController.php (Extract)


    class UsersController extends AppController


    {


    public function register()


    {


    if ($this->request->is("post"))


    {


    if ($this->User->save($this->request->data))


    {


    $this->_upload("photo", $this->User->id);


    $this->Session->setFlash("Your account has been created.");


    }


    else


    {


    $this->Session->setFlash("An error occurred while creating your account.");


    }


    }


    }


    public function settings()


    {


    $this->_isSecure();


    $this->set("user", $this->user);


    $this->User->id = $this->user["User"]["id"];


    if ($this->request->is("get"))


    {


    $this->request->data = $this->user;


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 32 ■ Cakephp: extending


    else if ($this->request->is("post"))


    {


    if ($this->User->save($this->request->data))


    {


    $this->_upload("photo", $this->User->id);


    $this->Session->setFlash("Your account has been updated.");


    }


    else


    {


    $this->Session->setFlash("An error occurred while updating your account.");


    }


    }


    }


    }


    Now, when new users register for an account in the sample application, and select
    a photo to upload, their user record will be created, their photo will be uploaded,
    and a reference to their photo will be created in the database (and assigned to
    the user account).


    Third-Party Libraries


    Using third-party libraries is a little different from using built-in libraries
    in CakePHP. There are two different ways of doing this, either with plugins or
    by placing them in a vendor directory.


    Plugins


    Creating a plugin is not unlike duplicating the structure of the app directory
    and filling it with the controllers, views, models, and collections that your
    plugin requires in order to function. The problem is that this approach generates
    a lot of work if all we want to do is use a preexisting PHP library.


    ■ **Note** You can find more about Cakephp plugins here: [http://book.cakephp.org/2.0/en/plugins.html](http://book.cakephp.org/2.0/en/plugins.html)


    Vendor Directory


    The approach we will take is by placing the Imagine library within a Vendor directory.
    Begin by placing the Imagine library within the ~/app/Vendor directory, followed
    by a new _thumbnail() method in our UsersController, as shown in Listing 32-8.


    ***Listing 32-8.*** ~/app/Controller/UsersController.php (Extract)


    class UsersController extends AppController


    {


    protected function _thumbnail($photo)


    {


    App::uses("File", "Utility");


    App::import("Vendor", "Imagine/Image/ManipulatorInterface"); App::import("Vendor",
    "Imagine/Image/ImageInterface");


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 32 ■ Cakephp: extending


    App::import("Vendor", "Imagine/Image/ImagineInterface");


    App::import("Vendor", "Imagine/Image/BoxInterface");


    App::import("Vendor", "Imagine/Image/PointInterface");


    App::import("Vendor", "Imagine/Image/Point");


    App::import("Vendor", "Imagine/Gd/Image");


    App::import("Vendor", "Imagine/Gd/Imagine");


    App::import("Vendor", "Imagine/Image/Box");


    $path = WWW_ROOT."uploads";


    $width = 64;


    $height = 64;


    $file = new File($path.DS.$photo["name"]);


    if ($file)


    {


    $name = $file->name();


    $extension = $file->ext();


    $thumbnail = "{$name}-{$width}x{$height}.{$extension}";


    if (!file_exists("{$path}/{$thumbnail}"))


    {


    $imagine = new Imagine\Gd\Imagine();


    $size = new Imagine\Image\Box($width, $height);


    $mode = Imagine\Image\ImageInterface::THUMBNAIL_OUTBOUND;


    $imagine


    ->open("{$path}/{$name}.{$extension}")


    ->thumbnail($size, $mode)


    ->save("{$path}/{$thumbnail}");


    }


    return $thumbnail;


    }


    }


    }'
