    {


    /**


    * @readwrite


    */


    protected $_user;


    public function __construct($options = array())


    {


    parent::__construct($options);


    // connect to database


    $database = Registry::get("database");


    $database- >connect();


    // schedule disconnect from database


    Events::add("framework.controller.destruct.after", function($name) {


    $database = Registry::get("database");


    $database- >disconnect();


    });


    }


    }


    }


    Our modified __construct() method actually schedules a call to the $database-
    >disconnect() method, using our new events. This is only safe to do if we are
    sure we won’t need the database connection after it has been closed. What’s cool
    about it is that we don’t need to find a place to shove the disconnect code. We
    simply listen for the event, within the __construct() method, and it will be done.


