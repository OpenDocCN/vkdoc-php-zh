    \    $OK = false;\n    // create database connection\n    // create SQL\n    //\
    \ prepare the statement\n    // bind the parameters and execute the statement\n\
    \    // redirect if successful or display error\n    }\n    ```\n\nAfter including\
    \ the connection function, the code sets `$OK` to `false`. This is reset\n   \
    \ to `true` only if\n    there are no errors. The five comments at the end map\
    \ out the remaining\n    steps.\n\n3.  Create a PDO connection to the database\
    \ as the user with read and write\n    privileges, and build the SQL like this:\n\
    \n```\n    // create database connection\n    $conn = dbConnect('write', 'pdo');\n\
    \    // create SQL\n    $sql = 'INSERT INTO blog (title, article)\n    VALUES(:title,\
    \ :article)';\n    ```\n\nThe values that will be derived from variables are represented\
    \ by\n    named placeholders consisting of the column name preceded by a colon\n\
    \    (`:title` and\n    `:article`). The\n    value for the other columns will\
    \ be generated by the database. The `article_id` primary\n    key is incremented\
    \ automatically, and the `created` and `updated` columns have\n    their default\
    \ values set to `CURRENT_TIMESTAMP`."
  trans: "\n# 提示\n作为一项安全措施，一些开发者建议使用与数据库列名不同的名称，因为任何人都可以通过查看表单的源代码看到输入字段的名称。使用不同的名称会增加入侵数据库的难度。在网站需要密码保护的部分，这无需担忧。但对于可公开访问的表单（例如用于用户注册或登录的表单），你或许应该考虑这一思路。\n\
    \n## 插入新记录\n\n向表中插入新记录的基本 SQL 语句如下：\n\n```\nINSERT [INTO] table_name (column_names)\n\
    VALUES (values)\n```\n\n`INTO` 位于方括号中，表示它是可选的。它的存在纯粹是为了让 SQL 读起来更像人类语言。列名可以按任何顺序排列，但第二组括号中的值必须与其对应的列顺序一致。尽管\
    \ MySQLi 和 PDO 的代码非常相似，但为了避免混淆，我将分别介绍它们。\n\n> **注意** 本章中的许多脚本使用了一种称为“设置标志（setting\
    \ a flag）”的技术。`flag` 是一个布尔变量，初始化为 `true` 或 `false`，用于检查某事是否发生。例如，如果 `$OK` 初始设置为\
    \ `false`，并且仅在数据库查询成功执行时才重置为 `true`，那么它就可以用作控制另一个代码块的条件。\n\n## PHP 解决方案 15-1：使用\
    \ MySQLi 插入新记录\n\n本 PHP 解决方案展示了如何使用 MySQLi 预处理语句向 `blog` 表插入新记录。使用预处理语句可以避免引用转义和控制字符的问题。它还能保护你的数据库免受\
    \ SQL 注入攻击（参见第 13 章）。\n\n1. 在 `phpsols-4e` 站点根目录下创建一个名为 `admin` 的文件夹。从 `ch15`\
    \ 文件夹复制 `blog_insert_mysqli_01.php`，并将其在新文件夹中保存为 `blog_insert_mysqli.php`。\n\n\
    2. 插入新记录的代码应仅在表单已提交时运行，因此它被包裹在一个条件语句中，该语句检查 `$_POST` 数组中提交按钮的 `name` 属性（`insert`）。将以下代码放在\
    \ `DOCTYPE` 声明之上：\n\n   ```\n   在包含连接函数之后，代码将 `$OK` 设置为 `false`。仅当没有错误时，它才会被重置为\
    \ `true`。末尾的五条注释勾勒出我们将要填写的剩余步骤。\n   ```\n\n3. 以具有读写权限的用户身份创建数据库连接，初始化预处理语句，并编写带有占位符的\
    \ SQL，这些占位符将用于存放从用户输入中获取的数据，如下所示：\n\n   ```\n   // 创建数据库连接\n   $conn = dbConnect('write');\n\
    \   // 初始化预处理语句\n   $stmt = $conn->stmt_init();\n   // 创建 SQL\n   $sql = 'INSERT\
    \ INTO blog (title, article)\n   VALUES(?, ?)';\n   ```\n\n   将从 `$_POST['title']`\
    \ 和 `$_POST['article']` 获取的值由问号占位符表示。其他列将自动填充。`article_id` 列是主键，使用 `AUTO_INCREMENT`，而\
    \ `created` 和 `updated` 列的默认值是 `CURRENT_TIMESTAMP`。\n\n   > **注意** 此处的代码顺序与第 13\
    \ 章略有不同。该脚本将在第 17 章进一步扩展以运行一系列 SQL 查询，因此预处理语句被首先初始化。\n\n4. 下一步是将问号替换为变量中的值——这个过程称为**绑定参数**。插入以下代码：\n\
    \n   ```\n   if ($stmt->prepare($sql)) {\n   // 绑定参数并执行语句\n   $stmt->bind_param('ss',\
    \ $_POST['title'], $_POST['article']);\n   $stmt->execute();\n   if ($stmt->affected_rows\
    \ > 0) {\n   $OK = true;\n   }\n   }\n   ```\n\n   这部分代码用于保护数据库免受 SQL 注入攻击。将变量按照希望插入\
    \ SQL 查询的顺序传递给 `bind_param()` 方法，同时第一个参数指定每个变量的数据类型，同样按照与变量相同的顺序。两者都是字符串，因此这个参数是\
    \ `'ss'`。\n\n   一旦值绑定到占位符，就调用 `execute()` 方法。\n\n   `affected_rows` 属性记录了 `INSERT`、`UPDATE`\
    \ 或 `DELETE` 查询影响的行数。\n\n   > **注意** 如果查询触发了 MySQL 错误，`affected_rows` 返回 −1。与某些编程语言不同，PHP\
    \ 将 −1 视为 `true`。因此，你需要检查 `affected_rows` 是否大于零，以确保查询成功。如果大于零，`$OK` 将被重置为 `true`。\n\
    \n5. 最后，将页面重定向到现有记录列表，或显示任何错误消息。在上一步之后添加此代码：\n\n   ```\n   // 重定向（如果成功）或显示错误\n\
    \   if ($OK) {\n   header('Location:\n   http://localhost/phpsols-4e/admin/blog_list_mysqli.php');\n\
    \   exit;\n   } else {\n   $error = $stmt->error;\n   }\n   }\n   ?>\n   ```\n\
    \n6. 在页面的主体中添加以下代码块，以便在插入操作失败时显示错误消息：\n\n   ```\n   插入新博客条目\n   <?php\n   if (isset($error))\
    \ {\n   echo \"<p>错误：$error</p>\";\n   }\n   ?>\n   ```\n\n   完整代码位于 `ch15` 文件夹中的\
    \ `blog_insert_mysqli_02.php`。\n\n至此，插入页面就完成了。但在测试之前，请先创建 `blog_list_mysqli.php`，该文件将在\
    \ PHP 解决方案 15-3 中介绍。\n\n> **注意** 为了专注于与数据库交互的代码，本章中的脚本并未对用户输入进行验证。在实际应用中，你应该使用第\
    \ 6 章中描述的技术来检查表单提交的数据，并在检测到错误时重新显示。\n\n## PHP 解决方案 15-2：使用 PDO 插入新记录\n\n本 PHP\
    \ 解决方案展示了如何使用 PDO 预处理语句向 `blog` 表插入新记录。如果尚未创建，请在 `phpsols-4e` 站点根目录下创建一个名为 `admin`\
    \ 的文件夹。\n\n1. 将 `blog_insert_pdo_01.php` 复制到 `admin` 文件夹，并保存为 `blog_insert_pdo.php`。\n\
    \n2. 插入新记录的代码应仅在表单已提交时运行，因此它被包裹在一个条件语句中，该语句检查 `$_POST` 数组中提交按钮的 `name` 属性（`insert`）。将以下代码放在\
    \ `DOCTYPE` 声明之上的 PHP 代码块中：\n\n   ```\n   if (isset($_POST['insert'])) {\n   require_once\
    \ '../includes/connection.php';\n   // 初始化标志\n   $OK = false;\n   // 创建数据库连接\n\
    \   // 创建 SQL\n   // 准备语句\n   // 绑定参数并执行语句\n   // 重定向（如果成功）或显示错误\n   }\n   ```\n\
    \n   在包含连接函数之后，代码将 `$OK` 设置为 `false`。仅当没有错误时，它才会被重置为 `true`。末尾的五条注释勾勒出剩余的步骤。\n\
    \n3. 以具有读写权限的用户身份创建 PDO 数据库连接，并构建 SQL 语句，如下所示：\n\n   ```\n   // 创建数据库连接\n   $conn\
    \ = dbConnect('write', 'pdo');\n   // 创建 SQL\n   $sql = 'INSERT INTO blog (title,\
    \ article)\n   VALUES(:title, :article)';\n   ```\n\n   将从变量获取的值由命名占位符表示，这些占位符由列名前加冒号组成（`:title`\
    \ 和 `:article`）。其他列的值将由数据库生成。`article_id` 主键会自动递增，而 `created` 和 `updated` 列的默认值设置为\
    \ `CURRENT_TIMESTAMP`。\n"
- fmt: "4. The next stage is to initialize the prepared statement and bind the values\
    \ from the variables to the placeholders—a process known as **binding the parameters**.\
    \ Add the following code:\n\n```\n// prepare the statement\n$stmt = $conn->prepare($sql);\n\
    // bind the parameters and execute the statement\n$stmt->bindParam(':title', $_POST['title'],\
    \ PDO::PARAM_STR);\n$stmt->bindParam(':article', $_POST['article'], PDO::PARAM_STR);\n\
    // execute and get number of affected rows\n$stmt->execute();\n$OK = $stmt->rowCount();\n\
    ```\n\nThis begins by passing the SQL query to the `prepare()` method of the database\
    \ connection (`$conn`) and storing a reference to the statement as a variable\
    \ (`$stmt`).\n\nNext, the values in the variables are bound to the placeholders\
    \ in the prepared statement, and the `execute()` method runs the query.\n\nWhen\
    \ used with an `INSERT`, `UPDATE`, or `DELETE` query, the PDO `rowCount()` method\
    \ reports the number of rows affected by the query. If the record is inserted\
    \ successfully, `$OK` is `1`, which PHP treats as `true`. Otherwise, it’s `0`,\
    \ which is treated as `false`.\n\n5. Finally, redirect the page to a list of existing\
    \ records or display any error message. Add this code after the previous step:\n\
    \n```\n// redirect if successful or display error\nif ($OK) {\n    header('Location:\
    \ http://localhost/phpsols-4e/admin/blog_list_pdo.php');\n    exit;\n} else {\n\
    \    $error = $stmt->errorInfo()[2];\n}\n}\n?>\n```\n\nThe error message, if any,\
    \ is stored as the third element of the array returned by `$stmt->errorInfo()`\
    \ and is accessed using array dereferencing.\n\n6. Add a PHP code block in the\
    \ body of the page to display any error message:\n\n```\n<?php\nif (isset($error))\
    \ {\n    echo \"<p>Error: $error</p>\";\n}\n?>\n```\n\nThe completed code is in\
    \ `blog_insert_pdo_02.php` in the `ch15` folder.\n\nThat completes the insert\
    \ page, but before testing it, create `blog_list_pdo.php`, which is described\
    \ next.\n\n### Linking to the Update and Delete Pages\n\nBefore you can update\
    \ or delete a record, you need to find its primary key. A practical way of doing\
    \ this is to query the database to select all records. You can use the results\
    \ of this query to display a list of all records, complete with links to the update\
    \ and delete pages. By adding the value of `article_id` to a query string in each\
    \ link, you automatically identify the record to be updated or deleted. As Figure\
    \ 15-2 shows, the URL displayed in the browser status bar (bottom left) identifies\
    \ the `article_id` of the article `Trainee Geishas Go Shopping` as 2.\n\n![../images/332054_4_En_15_Chapter/332054_4_En_15_Fig2_HTML.jpg](images/332054_4_En_15_Chapter/332054_4_En_15_Fig2_HTML.jpg)\n\
    \n**Figure 15-2.** The EDIT and DELETE links contain the record’s primary key\
    \ in a query string\n\nThe update page uses this to display the correct record\
    \ ready for updating. The same information is conveyed in the `DELETE` link to\
    \ the delete page.\n\nTo create a list like this, you need to start with an HTML\
    \ table that contains two rows and as many columns as you want to display, plus\
    \ two extra columns for the EDIT and DELETE links. The first row is used for column\
    \ headings. The second row is wrapped in a PHP loop to display all the results.\
    \ The table in `blog_list_mysqli_01.php` in the `ch15` folder looks like this\
    \ (the version in `blog_list_pdo_01.php` is the same, except that the links in\
    \ the last two table cells point to the PDO versions of the update and delete\
    \ pages):\n\n```\n<table>\n  <tr>\n    <th>Created</th>\n    <th>Title</th>\n\
    \    <th>&nbsp;</th>\n    <th>&nbsp;</th>\n  </tr>\n  <tr>\n    <td>EDIT</td>\n\
    \    <td>DELETE</td>\n  </tr>\n</table>\n```\n\n### PHP Solution 15-3: Creating\
    \ the Links to the Update and Delete Pages\n\nThis PHP solution shows how to create\
    \ a page to manage the records in the `blog` table by displaying a list of all\
    \ records and linking to the update and delete pages. There are only minor differences\
    \ between the MySQLi and PDO versions, so these instructions describe both.\n\n\
    Copy `blog_list_mysqli_01.php` or `blog_list_pdo_01.php` to the `admin` folder\
    \ and save it as `blog_list_mysqli.php` or `blog_list_pdo.php`, depending on which\
    \ method of connection you plan to use. The different versions link to the appropriate\
    \ insert, update, and delete files.\n\n1. You need to connect to the database\
    \ and create the SQL query. Add the following code in a PHP block above the `DOCTYPE`\
    \ declaration:\n\n```\nrequire_once '../includes/connection.php';\nrequire_once\
    \ '../includes/utility_funcs.php';\n// create database connection\n$conn = dbConnect('read');\n\
    $sql = 'SELECT * FROM blog ORDER BY created DESC';\n```\n\nIf you’re using PDO,\
    \ add `'pdo'` as the second argument to `dbConnect()`.\n\n2. Submit the query\
    \ by adding the following code before the closing PHP tag.\n\nFor MySQLi, use\
    \ this:\n\n```\n$result = $conn->query($sql);\nif (!$result) {\n    $error = $conn->error;\n\
    }\n```\n\nFor PDO, use this:\n\n```\n$result = $conn->query($sql);\n$error = $conn->errorInfo()[2];\n\
    ```\n\n3. Add a conditional statement just before the table to display any error\
    \ message, and wrap the table in the `else` block. The code before the table looks\
    \ like this:\n\n```\n<?php\nif (isset($error)) {\n    echo \"<p>$error</p>\";\n\
    } else { ?>\n```\n\nThe closing curly brace goes in a separate PHP block after\
    \ the closing `</table>` tag.\n\n4. You now need to enclose the second table row\
    \ in a loop and retrieve each record from the result set. The following code goes\
    \ between the closing `</tr>` tag of the first row and the opening `<tr>` tag\
    \ of the second row.\n\nFor MySQLi, use this:\n\n```\n<?php while ($row = $result->fetch_assoc())\
    \ { ?>\n```\n\nFor PDO, use this:\n\n```\n<?php while ($row = $result->fetch())\
    \ { ?>\n```\n\nThis is the same as in the previous chapter, so it should need\
    \ no explanation.\n\n5. Display the `created` and `title` fields for the current\
    \ record in the first two cells of the second row, like this:\n\n```\n<td><?=\
    \ $row['created'] ?></td>\n<td><?= safe($row['title']) ?></td>\n```\n\nThe `created`\
    \ column stores a `TIMESTAMP` data type, which is a fixed format, so it doesn’t\
    \ need sanitizing. But the `title` column is text-related, so it needs to be passed\
    \ to the `safe()` function defined in Chapter 13.\n\n6. In the next two cells,\
    \ add the query string and value of the `article_id` field for the current record\
    \ to both URLs, as follows (although the links are different, the highlighted\
    \ code is the same for the PDO version):\n\n```\n<td><a href=\"blog_update_mysqli.php?article_id=<?=\
    \ $row['article_id'] ?>\">EDIT</a></td>\n<td><a href=\"blog_delete_mysqli.php?article_id=<?=\
    \ $row['article_id'] ?>\">DELETE</a></td>\n```\n\nWhat you’re doing here is adding\
    \ `?article_id=` to the URL and then using PHP to display the value of `$row['article_id']`.\
    \ The `article_id` column stores only integers, so the value doesn’t need to be\
    \ sanitized. It’s important that you don’t leave any spaces that might break the\
    \ URL or the query string. After the PHP has been processed, the opening `<a>`\
    \ tag should look like this when viewing the page’s source code in a browser (although\
    \ the number will vary according to the record):\n\n```\n<a href=\"blog_update_mysqli.php?article_id=2\"\
    >EDIT</a>\n```\n\n7. Finally, close the loop surrounding the second table row\
    \ with a curly brace, like this:\n\n```\n<?php } ?>\n```\n\n8. Save `blog_list_mysqli.php`\
    \ or `blog_list_pdo.php` and load the page into a browser. Assuming that you loaded\
    \ the contents of `blog.sql` into the `phpsols` database earlier, you should see\
    \ a list of four items, as shown in Figure 15-2. You can now test `blog_insert_mysqli.php`\
    \ or `blog_insert_pdo.php`. After inserting an item, you should be returned to\
    \ the appropriate version of `blog_list.php`, and the date and time of creation,\
    \ together with the title of the new item, should be displayed at the top of the\
    \ list. Check your code against `blog_list_mysqli_02.php` or `blog_list_pdo_02.php`\
    \ in the `ch15` folder if you encounter any problems."
