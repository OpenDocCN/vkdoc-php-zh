    **Creating a Smarty Plug-In to Output Breadcrumbs**


    The breadcrumb trail has been assigned to templates as is, meaning that we can
    call the getTrail() method to return an array of all of the trail steps. The problem
    with this is that it clutters the template, especially when you consider some
    of the options that can be used.


    Instead, we will create another Smarty plug-in: a function called breadcrumbs.
    With this function, we will be able to output the trail based on a number of different
    options. This function is reusable, and you’ll be able to use it for other sites
    you create with Smarty. This should always be a goal when developing code such
    as this.


    Listing 6-6 shows the contents of function.breadcrumbs.php, which is stored in
    the


    ./include/Templater/plugins directory. This code basically loops over each step
    in the breadcrumb trail and generates a hyperlink and a displayable title. Since
    it is optional for steps to have a link, a title is only generated if no link
    is included. The same class and file naming conventions apply as in the geturl
    plug-in discussed previously (in the “Generating URLs in Smarty Templates” section),
    and as before it is best to initialize all parameters at the beginning of the
    function.


    **Listing 6-6.** *A Custom Smarty Plug-In Used to Output the Breadcrumb Trail*
    *(function.breadcrumbs.php)*


    <?php


    function smarty_function_breadcrumbs($params, $smarty)


    {


    $defaultParams = array(''trail'' => array(),


    ''separator'' => '' &gt; '',


    ''truncate'' => 40);


    // initialize the parameters


    foreach ($defaultParams as $k => $v) {


    if (!isset($params[$k]))


    $params[$k] = $v;


    }


    // load the truncate modifier


    if ($params[''truncate''] > 0)


