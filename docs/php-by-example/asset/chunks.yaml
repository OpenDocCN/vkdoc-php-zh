    # 熟悉生成器


    *生成器函数* 是一种会返回特殊对象作为结果的函数。该对象在属性上类似于数组，但它并非真正的数组。更准确地说，它是一种创建数组假象的绝妙方式。特别是，调用生成器函数的结果可以用于
    `foreach` 循环语句中，以便对集合进行迭代。


    | 详情 |

    | --- |

    | 从形式上看，生成器函数返回一个 `Generator` 类的对象。该类实现了 `Iterator` 接口。`Generator` 类的对象不能使用 `new`
    语句创建。 |


    让我们通过一些简单的例子来考虑创建和使用生成器函数的细节。首先需要知道的是，生成器函数返回的对象可以用来获取一个值序列。特别地，要获取当前值，可以使用 `current()`
    方法；要切换到下一个值，则调用 `next()` 方法。


    严格来说，“生成器”更适合指代由生成器函数返回的对象。然而，为了方便起见，这个术语也常被用于指代相应的函数。


    生成器函数的描述有其自身的特点。因此，要将一个值包含到调用 `current()` 方法时返回的值列表中，需要在函数代码中使用 `yield` 语句，后跟相应的值。示例如清单
    11-1 所示。


    ```

    current(),"\n";

    // 切换到下一个值：

    $color->next();

    }

    ?>

    清单 11-1

    熟悉生成器

    ```


    程序的执行结果如下。


    ```

    程序输出（来自清单 11-1）

    [1] Red

    [2] Yellow

    [3] Green

    ```


    在这个例子中，我们定义了一个 `colors()` 生成器函数，其中使用了 `yield "Red"`、`yield "Yellow"` 和 `yield
    "Green"` 命令。这意味着最终得到的生成器对象（即调用 `colors()` 函数时获得的对象）会生成值 `"Red"`、`"Yellow"` 和 `"Green"`。


    程序中执行了 `$color=colors()` 命令，该命令将调用 `colors()` 函数的结果写入 `$color` 变量。因此，`$color`
    变量指向一个 `Generator` 类的对象。该对象除了其他功能外，还拥有 `current()` 和 `next()` 方法。如果从 `$color`
    对象调用 `current()` 方法，会得到值 `"Red"`。之后，如果调用 `next()` 方法，然后再调用 `current()` 方法，会得到值
    `"Yellow"`。最后，再次调用 `next()` 和 `current()` 方法会得到值 `"Green"`。所有这些都通过 `for` 循环语句进行了演示，该循环从
    `$color` 对象中三次调用了 `current()` 和 `next()` 方法。


    | 详情 |

    | --- |

    | 如果在调用了三次 `next()` 方法之后（即，在迭代完“写入”`$color` 对象的所有值之后）再调用 `current()` 方法，将得到一个空引用。
    |


    如果每次生成一个新值都必须调用两个方法，那么生成器函数的作用就不大了。清单 11-2 展示了一种使用生成器函数的更好方法。


    ```

    清单 11-2

    生成器函数与循环语句

    ```


    程序的结果与前一个案例几乎相同。


    ```

    程序输出（来自清单 11-2）

    Red

    Yellow

    Green

    ```


    `colors()` 生成器函数的代码略有改动。生成的值列表现在通过数组实现，并且在函数体中的 `foreach` 循环语句里调用了 `yield` 语句。此外，我们没有将函数调用的指令写入一个单独的变量，而是直接在
    `foreach` 循环语句中将其指定为要迭代的集合。结果是，指定一个包含程序执行时显示值的数组，来代替调用 `color()` 函数。


    ## 带参数的生成器函数


    乍一看，生成器函数的概念可能像是数组方法的不必要复杂化，但事实远非如此。生成器函数允许我们编写优雅且高效的代码。例如，清单 11-3 使用了一个带参数的生成器函数来生成数字序列。


    ```

    清单 11-3

    带参数的生成器函数

    ```


    程序的输出如下。


    ```

    程序输出（来自清单 11-3）

    [1] 1 3 5 7 9

    [2] 3 4 5 6 7 8 9

    [3] 10 9 8 7 6 5

    ```


    `numbers()` 函数被描述为带有三个参数（最后一个有默认值）。该函数旨在创建一个生成数字序列的对象。第一个参数 `$count` 指定序列中应包含多少个数字。第二个参数
    `$start` 指定序列中的第一个值。第三个参数 `$step`（默认值为 `1`）指定计算序列时的增量。函数的核心是一个循环语句，循环次数由 `$count`
    参数决定。用于 `yield $num` 命令中的 `$num` 变量，其初始值由 `$start` 参数定义。每次循环，该变量的值都会增加由 `$step`
    参数确定的量。


    我们在用于显示数字序列的 `foreach` 循环语句中调用 `numbers()` 函数。因此，`numbers(5,1,2)` 指令表示生成一个包含 `5`
    个数字的序列，初始值是 `1`，每个后续数字比前一个多 `2`。`numbers(7,3)` 指令用于创建一个包含 `7` 个数字的序列，从 `3` 开始，每个数字比前一个多
    `1`。最后，使用 `numbers(6,10,-1)` 指令，得到包含 `6` 个数字的序列；第一个数字是 `10`，每个后续数字比前一个少 `1`（数字按倒序排列）。


    ## 基于生成器的数组


    如前所述，生成器提供了使用数组的假象。但有时，你可能需要解决一个更简单的任务：基于生成器创建一个数组。原则上，可以使用内置函数 `iterator_to_array()`
    来实现。生成器作为参数传递给该函数，函数返回通过迭代生成器“内容”而创建的数组。假设你有一个如下的函数：


    ```

    function nums($n){

    for($k=1;$k<=$n;$k++){

    yield $k;

    }

    }

    ```


    那么，以下命令将创建一个包含从 1 到 5 的数字的数组（包含两端），并且对该数组的引用被写入 `$A` 变量。


    ```

    $A=iterator_to_array(nums(5));

    ```


