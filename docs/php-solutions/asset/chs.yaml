  ```\n\n\n\n### 使用 `password_verify()` 验证加密密码\n\n`password_verify()` 函数的功能正如你所期望的那样：它用于验证通过\
  \ `password_hash()` 加密的密码。该函数仅需两个参数：提交的密码和加密后的版本。若提交的密码正确，函数返回 `true`，否则返回 `false`。\n\
  \n### PHP 解决方案 9-8：使用加密登录\n\n既然你已经有了加密的密码，就需要修改登录表单以适配新的设置。只需选择包含加密密码的 CSV 文件，并使用\
  \ `password_verify()` 检查所提交密码的有效性。同样，这依赖于使用 PHP 5.5 或在脚本中包含 `password_compat` 库。\n\
  \n打开 PHP 解决方案 9-3 中的 `login.php`，或使用 `ch09` 文件夹中的 `login_02.php`。将 `$userlist` 的位置改为使用加密密码：\n\
  \n`$userlist = 'C:/private/encrypted.csv';`\n\n打开 PHP 解决方案 9-3 中的 `includes/authenticate.php`，或使用\
  \ `ch09` 文件夹中的 `authenticate_01.php`。加密密码文件的第一行没有标题，因此删除以下注释和代码行：\n\n`// 忽略 CSV\
  \ 文件第一行的标题`  \n`$titles = fgetcsv($file);`\n\n找到以下代码行：\n\n`if ($data[0] == $username\
  \ && $data[1] == $password) {`\n\n将其修改为：\n\n`if ($data[0] == $username && password_verify($password,\
  \ $data[1])) {`\n\n保存 `login.php` 并进行测试。它应该与之前一样正常工作，同时更加安全。如有必要，可使用 `ch09` 文件夹中的\
  \ `login_03.php` 和 `authenticate_02.php` 检查你的代码。\n\n*   `$password` 包含提交的密码，而 `$data[1]`\
  \ 包含加密版本，因此它们作为参数传递给 `password_verify()`，该函数仅在密码正确时返回 `true`。\n\nPHP 解决方案 9-3 至\
  \ 9-8 构建了一个简单而有效的用户认证系统，无需数据库后端。然而，它确实存在局限性。最重要的是，包含用户名和密码的 CSV 文件必须位于服务器根目录之外。此外，一旦记录数量增多，查询数据库通常比逐行遍历\
  \ CSV 文件快得多。第 17 章 涵盖了使用数据库进行用户认证的内容。\n\n#### 保持加密与时俱进\n\n使用 PHP 5.5 新增的密码哈希函数的主要优势在于，它们被设计为能紧跟加密技术的改进。无需指定特定的加密标准，而是将\
  \ `PASSWORD_DEFAULT` 作为 `password_hash()` 的第二个参数，这能确保新注册始终使用当时被认为最安全的方法。即使默认值发生变化，`password_verify()`\
  \ 函数仍能验证现有密码，因为加密密码包含识别其加密方式的信息。\n\n还有一个名为 `password_needs_rehash()` 的函数，用于检查加密密码是否需要更新为当前标准。它被设计用于用户登录网站时。以下代码假设提交的密码存储在\
  \ `$password` 中，加密密码存储在 `$encrypted` 中，并且你使用的是 PHP 默认的加密方法。\n\n```\nif (password_verify($password,\
  \ $encrypted) {\n    if (password_needs_rehash($encrypted, PASSWORD_DEFAULT)) {\n\
  \        $encrypted = password_hash($password, PASSWORD_DEFAULT);\n        // 存储更新后的\
  \ $encrypted\n    }\n}\n```\n\n每次用户登录都执行此检查，几乎肯定过于频繁。PHP 的策略是仅在重大版本发布（如 5.7.0 或\
  \ 7.0.0）时更改默认加密方式。唯一的例外是当当前默认加密方式发现严重安全漏洞时。如果你紧跟 PHP 的发展动态，可以在默认加密方式更改时，创建一个脚本一次性更新所有存储的密码。如果你没有时间关注\
  \ PHP 世界的变化，那么在每次登录时使用 `password_needs_rehash()` 应该能确保网站安全，尽管这可能会拖慢登录过程。\n\n## 设置会话时间限制\n\
  \n默认情况下，PHP 将用户计算机上的会话 cookie 的生命周期设置为 0，这会使会话保持活动状态，直到用户注销或关闭浏览器。你可以通过调用 `ini_set()`\
  \ 函数来提前设置会话超时，该函数允许你动态更改某些 PHP 配置指令。在会话开始时，将指令 `session.cookie_lifetime` 作为第一个参数，将包含\
  \ cookie 保持活动秒数的字符串作为第二个参数。例如，你可以将会话 cookie 的生命周期限制为 10 分钟，如下所示：\n\n```\nsession_start();\n\
  ini_set('session.cookie_lifetime', '600');\n```\n\n尽管这很有效，但它有两个缺点。首先，过期时间是基于服务器时间，而非用户计算机时间。如果用户计算机时钟不准，cookie\
  \ 可能立即过期，或者持续的时间远超你的预期。另一个问题是，用户可能会在没有说明的情况下自动注销。下一个 PHP 解决方案提供了一种更友好的方法。\n\n\n\n\
  ### PHP 方案 9-9：在一段非活动时间后结束会话\n\n本 PHP 方案演示了如何在用户于指定时间段内未进行任何触发页面加载的操作时结束会话。当会话首次启动时（通常在用户登录时），当前时间会被存储在一个会话变量中。每当用户加载页面时，该会话变量都会与当前时间进行比较：如果时间差超过预设限制，则销毁会话及其变量；否则，将该变量更新为当前时间。\n\
  \n以下说明假设你已经按照 PHP 方案 9-3 至 9-8 设置了登录系统。\n\n你需要将当前时间存储在用户凭证验证通过之后、但脚本将用户重定向到网站受限制部分之前。在\
  \ `authenticate.php` 中找到以下代码段（大约在第 16-20 行），并插入以下粗体显示的新代码：\n\n```\nif ($data[0]\
  \ == $username && password_verify($password, $data[1])) {\n    $_SESSION['authenticated']\
  \ = 'Jethro Tull';\n    $_SESSION['start'] = time();\n    session_regenerate_id();\n\
  \    break;\n}\n```\n\n当会话超时时，直接将用户毫不客气地丢回登录屏幕并不友好，因此最好解释一下发生了什么。在 `login.php` 中，在紧接\
  \ `<body>` 标签（大约在第 22-27 行）后的 PHP 代码块中添加以下粗体显示的代码：\n\n- `time()` 函数会返回一个当前时间戳。通过将其存储在\
  \ `$_SESSION['start']` 中，它变得对所有以 `session_start()` 开头的页面都可用。\n\n```\n<?php\nif ($error)\
  \ {\n    echo \"<p>$error</p>\";\n} elseif (isset($_GET['expired'])) { ?>\n    <p>您的会话已过期。请重新登录。</p>\n\
  <?php } ?>\n```\n\n打开 `menu.php`，剪切 `DOCTYPE` 声明上方 PHP 代码块中的代码，并将其粘贴到一个新的空白文件中。将该文件保存为\
  \ `includes` 文件夹下的 `session_timeout.php`，然后按如下方式编辑代码：\n\n- 如果 URL 的查询字符串中包含名为 `expired`\
  \ 的变量，则会显示该消息。\n\n```\n<?php\nsession_start();\nob_start();\n// 设置时间限制（单位：秒）\n$timelimit\
  \ = 15;\n// 获取当前时间\n$now = time();\n// 如果被拒绝，重定向到的页面\n$redirect = 'http://localhost/phpsols/sessions/login.php';\n\
  // 如果未设置会话变量，则重定向到登录页面\nif (!isset($_SESSION['authenticated'])) {\n    header(\"\
  Location: $redirect\");\n    exit;\n} elseif ($now > $_SESSION['start'] + $timelimit)\
  \ {\n    // 如果已超时，销毁会话并重定向\n    $_SESSION = [];\n    // 使会话 cookie 失效\n    if (isset($_COOKIE[session_name()]))\
  \ {\n        setcookie(session_name(), '', time()-86400, '/');\n    }\n    // 结束会话并使用查询字符串重定向\n\
  \    session_destroy();\n    header(\"Location: {$redirect}?expired=yes\");\n  \
  \  exit;\n} else {\n    // 如果代码执行到这里，说明一切正常，因此更新开始时间\n    $_SESSION['start'] = time();\n\
  }\n```\n\n- 行内注释解释了发生了什么，你应该能认出 `elseif` 子句中的大部分内容（来自 PHP 方案 9-5）。PHP 以秒为单位衡量时间，我将\
  \ `$timelimit`（第 5 行）设置为了极其短暂的 15 秒，纯粹是为了演示效果。若要设置一个更合理的限制，例如 15 分钟，之后可以这样修改：\n\n\
  `$timelimit = 15 * 60; // 15 分钟`\n\n- 当然，你也可以将 `$timelimit` 设置为 `900`，但当 PHP 可以帮你完成繁重工作时，何必自寻烦恼呢？\n\
  - 如果 `$_SESSION['start']` 加上 `$timelimit` 的和小于当前时间（存储为 `$now`），你就结束会话并将用户重定向到登录页面。执行重定向的那一行会在\
  \ URL 末尾添加一个查询字符串，如下所示：\n\n`http://localhost/phpsols/sessions/login.php?expired=yes`\n\
  \n在 `menu.php` 的 `DOCTYPE` 声明上方包含 `session_timeout.php`。include 命令应为 PHP 代码块中的唯一代码：\n\
  \n- 第 2 步中的代码不关心 `expired` 的值；将值设为 `yes` 只是为了让它在浏览器地址栏中看起来更友好。\n- 如果脚本执行到了最后的 `else`，这意味着\
  \ `$_SESSION['authenticated']` 已设置且未达到时间限制，因此 `$_SESSION['start']` 被更新为当前时间，页面正常显示。\n\
  \n```\n<?php require_once '../includes/session_timeout.php'; ?>\n<!DOCTYPE HTML>\n\
  ```\n\n用同样的方式替换 `secretpage.php` 中 `DOCTYPE` 声明上方的代码。保存所有已编辑的页面，并将 `menu.php` 或\
  \ `secretpage.php` 加载到浏览器中。如果页面显示，请点击“退出”。然后重新登录，并在 `menu.php` 和 `secretpage.php`\
  \ 之间来回导航。一旦确认链接正常工作，等待 15 秒或更长时间，再尝试导航回另一个页面。你应会被自动注销，并看到以下画面：\n\n![A978-1-4842-0635-5_9_Figk_HTML.jpg](img/A978-1-4842-0635-5_9_Figk_HTML.jpg)\n\
  \n- 如有必要，请根据 `ch09` 文件夹中的 `authenticate_03.php`、`login_04.php`、`session_timeout.php`、`menu_05.php`\
  \ 和 `secretpage_04.php` 检查你的代码。\n\n### 在多页表单间传递信息\n\n通过 `$_POST` 和 `$_GET` 数组传递的变量只具有短暂的存在性。一旦它们被传递到某个页面，除非你以某种方式保存其值，否则它们就会消失。在表单之间传递信息的常用方法是从\
  \ `$_POST` 数组中提取其值，并将其存储在 HTML 的隐藏字段中，如下所示：\n\n`<input type=\"hidden\" name=\"address\"\
  \ id=\"address\" value=\"<?= $_POST['address']; ?>\">`\n\n顾名思义，隐藏字段是表单代码的一部分，但屏幕上不会显示任何内容。隐藏字段适用于一两个项目，但假设你有一个分布在四页上的调查。如果每页有\
  \ 10 个项目，那么你总共需要 60 个隐藏字段（第二页 10 个，第三页 20 个，第四页 30 个）。会话变量可以帮你省去所有这些编码工作。它们还可以确保访问者始终从多页表单的正确页面开始。\n\
  \n\n\n### PHP 解决方案 9-10：使用会话实现多页表单\n\n在本 PHP 解决方案中，您将构建一个用于多页表单的脚本，该脚本从 `$_POST`\
  \ 数组收集数据并将其分配给会话变量。如果用户尝试先访问表单的其他部分，该脚本会自动将用户重定向到表单的第一页。\n\n将 `ch09` 文件夹中的 `multiple_01.php`、`multiple_02.php`、`multiple_03.php`\
  \ 和 `multiple_04.php` 复制到 `sessions` 文件夹。前三页包含询问用户姓名、年龄和地址的简单表单。每个 `<form>` 标签的\
  \ `action` 属性为空，因此表单是自处理的，但它们尚不包含任何处理脚本。最后一页将最终显示前三页的数据。\n\n在 `multiple_01.php`\
  \ 的 `DOCTYPE` 声明上方的 PHP 代码块中添加以下代码：\n\n```\nif (isset($_POST['next'])) {\n    session_start();\n\
  \    // 设置一个变量来控制对其他页面的访问\n    $_SESSION['formStarted'] = true;\n    // 设置必填字段\n\
  \    $required = 'first_name';\n    $firstPage = 'multiple_01.php';\n    $nextPage\
  \ = 'multiple_02.php';\n    $submit = 'next';\n    require_once '../includes/multiform.php';\n\
  }\n```\n\n在 `includes` 文件夹中创建一个名为 `multiform.php` 的文件。删除所有 HTML 标记并插入以下代码：\n\n*\
  \ 提交按钮的 `name` 属性是 `next`，因此此代码块仅在表单已提交时运行。它启动会话并创建一个将用于控制对其他表单页面访问的会话变量。\n* 接下来是四个变量，将由处理多页表单的脚本使用：\n\
  \    * `$required`：当前页面中必填字段的 `name` 属性数组。如果只有一个必填字段，则可以使用字符串代替数组。如果没有必填字段，则可以省略。\n\
  \    * `$firstPage`：表单第一页的文件名\n    * `$nextPage`：表单下一页的文件名\n    * `$submit`：当前页面中提交按钮的名称\n\
  * 最后，代码包含了处理多页表单的脚本。\n\n```\n<?php\nif (!isset($_SESSION)) {\n    session_start();\n\
  }\n$filename = basename($_SERVER['SCRIPT_FILENAME']);\n$current = 'http://' . $_SERVER['HTTP_HOST']\
  \ . $_SERVER['PHP_SELF'];\n```\n\n现在您已经获取了当前文件的名称及其 URL，可以使用 `str_replace()` 创建第一页和下一页的\
  \ URL，如下所示：\n\n* 多页表单的每一页都需要调用 `session_start()`，但在同一页上调用两次会产生错误，因此条件语句首先检查 `$_SESSION`\
  \ 超全局变量是否可访问。如果不可访问，则启动该页面的会话。\n* 在条件语句之后，`$_SERVER['SCRIPT_FILENAME']` 被传递给 `basename()`\
  \ 函数以提取当前页面的文件名。这与您在 PHP 解决方案 4-3 中使用的技术相同。\n* `$_SERVER['SCRIPT_FILENAME']` 包含父文件的路径，因此当此脚本包含在\
  \ `multiple_01.php` 中时，`$filename` 的值将是 `multiple_01.php`，而不是 `multiform.php`。\n\
  * 下一行从字符串 `http://` 以及 `$_SERVER['HTTP_HOST']`（包含当前域名）和 `$_SERVER['PHP_SELF']`（包含当前文件除去域名后的路径）的值构建当前页面的\
  \ URL。如果您在本地测试，当您加载多页表单的第一页时，`$current` 将是 `http://localhost/phpsols/sessions/multiple_01.php`。\n\
  \n```\n$redirectFirst = str_replace($filename, $firstPage, $current);\n$redirectNext\
  \ = str_replace($filename, $nextPage, $current);\n```\n\n为防止用户不从头开始就访问多页表单，添加一个检查\
  \ `$filename` 值的条件语句。如果它不同于第一页，并且 `$_SESSION['formStarted']` 尚未创建，则 `header()` 函数将重定向到第一页，如下所示：\n\
  \n* `str_replace()` 的第一个参数是您要替换的字符串，第二个参数是替换字符串，第三个参数是目标字符串。在步骤 2 中，您将 `$firstPage`\
  \ 设置为 `multiple_01.php`，将 `$nextPage` 设置为 `multiple_02.php`。因此，`$redirectFirst`\
  \ 变为 `http://localhost/phpsols/sessions/multiple_01.php`，`$redirectNext` 变为 `http://localhost/phpsols/sessions/multiple_02.php`。\n\
  \n```\nif ($filename != $firstPage && !isset($_SESSION['formStarted'])) {\n    header(\"\
  Location: $redirectFirst\");\n    exit;\n}\n```\n\n脚本的其余部分遍历 `$_POST` 数组，检查哪些必填字段为空，并将它们添加到\
  \ `$missing` 数组。如果没有缺失项，`header()` 函数会将用户重定向到多页表单的下一页。`multiform.php` 的完整脚本如下所示：\n\
  \n```\n<?php\nif (!isset($_SESSION)) {\n    session_start();\n}\n$filename = basename($_SERVER['SCRIPT_FILENAME']);\n\
  $current = 'http://' . $_SERVER['HTTP_HOST'] . $_SERVER['PHP_SELF'];\n$redirectFirst\
  \ = str_replace($filename, $firstPage, $current);\n$redirectNext = str_replace($filename,\
  \ $nextPage, $current);\nif ($filename != $firstPage && !isset($_SESSION['formStarted']))\
  \ {\n    header(\"Location: $redirectFirst\");\n    exit;\n}\nif (isset($_POST[$submit]))\
  \ {\n    // 创建空数组用于存储任何缺失的字段\n    $missing = [];\n    // 如果未设置 $required 则创建数组\n\
  \    if (!isset($required)) {\n        $required = [];\n    } else {\n        //\
  \ 使用类型转换运算符将单个字符串转换为数组\n        $required = (array) $required;\n    }\n    // 处理\
  \ $_POST 变量并将它们保存到 $_SESSION 数组中\n    foreach ($_POST as $key => $value) {\n   \
  \     // 跳过提交按钮\n        if ($key == $submit) continue;\n        // 分配给临时变量，如果不是数组则去除空白\n\
  \        $temp = is_array($value) ? $value : trim($value);\n        // 如果为空且是必填字段，则添加到\
  \ $missing 数组中\n        if (empty($temp) && in_array($key, $required)) {\n     \
  \       $missing[] = $key;\n        } else {\n            // 否则，分配给与 $key 同名的变量\n\
  \            $_SESSION[$key] = $temp;\n        }\n    }\n    // 如果没有必填字段缺失，则重定向到下一页\n\
  \    if (!$missing) {\n        header(\"Location: $redirectNext\");\n        exit;\n\
  \    }\n}\n```\n\n在 `multiple_02.php` 的 `DOCTYPE` 声明上方的 PHP 代码块中添加以下代码：\n\n> **注意：**\
