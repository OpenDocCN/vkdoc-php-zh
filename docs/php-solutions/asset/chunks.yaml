- fmt: "# Opening and Closing Files for Read/Write Operations\n\nThe functions we\
    \ have looked at so far do everything in a single pass. However, PHP also has\
    \ a set of functions that allow you to open a file, read it and/or write to it,\
    \ and then close the file. The file can be either on the local file system or\
    \ a publicly available file on a different domain.\n\nThe following are the most\
    \ important functions used for this type of operation:\n\n*   `fopen()`: Opens\
    \ a file\n*   `fgets()`: Reads the contents of a file, normally one line at a\
    \ time\n*   `fgetcsv()`: Gets the current line from a CSV file and converts it\
    \ into an array\n*   `fread()`: Reads a specified amount of a file\n*   `fwrite()`:\
    \ Writes to a file\n*   `feof()`: Determines whether the end of the file has been\
    \ reached\n*   `rewind()`: Moves the internal pointer back to the top of the file\n\
    *   `fseek()`: Moves the internal pointer to a specific location in the file\n\
    *   `fclose()`: Closes a file\n\nThe first of these, `fopen()`, offers a bewildering\
    \ choice of options for how the file is to be used once it’s open: `fopen()` has\
    \ one read-only mode, four write-only modes, and five read/write modes. There\
    \ are so many because they give you control over whether to overwrite the existing\
    \ content or append new material. At other times, you may want PHP to create a\
    \ file if it doesn’t already exist.\n\nEach mode determines where to place the\
    \ internal pointer when it opens the file. It’s like the cursor in a word processor:\
    \ PHP starts reading or writing from wherever the pointer happens to be when you\
    \ call `fread()` or `fwrite()`.\n\nTable [7-2](#A978-1-4842-0635-5_7_Chapter.html#Tab2)\
    \ guides you through all the options.\n\n**Table 7-2.** Read/write modes used\
    \ with `fopen()`\n\n| Type | Mode | Description |\n| --- | --- | --- |\n| Read-only\
    \ | `r` | Internal pointer initially placed at beginning of file. |\n| Write-only\
    \ | `w` | Existing data deleted before writing. Creates a file if it doesn’t already\
    \ exist. |\n| | `a` | Append mode. New data added at end of file. Creates a file\
    \ if it doesn’t already exist. |\n| | `c` | Existing content is preserved, but\
    \ the internal pointer is placed at the beginning of the file. Creates a file\
    \ if it doesn’t already exist. |\n| | `x` | Creates a file only if it doesn’t\
    \ already exist. Fails if there’s already a file with the same name. |\n| Read/write\
    \ | `r+` | Read/write operations can take place in either order and begin wherever\
    \ the internal pointer is at the time. Pointer initially placed at beginning of\
    \ file. File must already exist for operation to succeed. |\n| | `w+` | Existing\
    \ data deleted. Data can be read back after writing. Creates a file if it doesn’t\
    \ already exist. |\n| | `a+` | Opens a file ready to add new data at end of file.\
    \ Also permits data to be read back after internal pointer has been moved. Creates\
    \ a file if it doesn’t already exist. |\n| | `c+` | Existing content is preserved,\
    \ and the internal pointer is placed at the beginning of the file. Creates a new\
    \ file if it doesn’t already exist. |\n| | `x+` | Creates a new file, but fails\
    \ if a file of the same name already exists. Data can be read back after writing.\
    \ |\n\nChoose the wrong mode, and you could end up deleting valuable data. You\
    \ also need to be careful about the position of the internal pointer. If the pointer\
    \ is at the end of the file, and you try to read the contents, you end up with\
    \ nothing. On the other hand, if the pointer is at the beginning of the file,\
    \ and you start writing, you overwrite the equivalent amount of existing data.\
    \ “Moving the internal pointer” later in this chapter explains this in more detail.\n\
    \nYou work with `fopen()` by passing it the following two arguments:\n\n*   The\
    \ path to the file you want to open, or URL if the file is on a different domain\n\
    *   A string containing one of the modes listed in Table [7-2](#A978-1-4842-0635-5_7_Chapter.html#Tab2)\n\
    \nThe `fopen()` function returns a reference to the open file, which can then\
    \ be used with the other read/write functions. This is how you would open a text\
    \ file for reading:\n\n```\n$file = fopen('C:/private/sonnet.txt', 'r');\n```\n\
    \nThereafter, you pass `$file` as the argument to other functions, such as `fgets()`\
    \ and `fclose()`. Things should become clearer with a few practical demonstrations.\
    \ Rather than building the files yourself, you’ll probably find it easier to use\
    \ the files in the `ch07` folder. I’ll run quickly through each mode.\n\n**Note:**\
    \ Mac and Linux users need to adjust the path to the `private` folder in the example\
    \ files to match their setup.\n\n## Reading a File with `fopen()`\n\nThe file\
    \ `fopen_read.php` contains the following code:\n\n```\n// store the pathname\
    \ of the file\n$filename = 'C:/private/sonnet.txt';\n\n// open the file in read-only\
    \ mode\n$file = fopen($filename, 'r');\n\n// read the file and store its contents\n\
    $contents = fread($file, filesize($filename));\n\n// close the file\nfclose($file);\n\
    \n// display the contents with <br/> tags\necho nl2br($contents);\n```\n\nIf you\
    \ load this into a browser, you should see the following output:\n\n![A978-1-4842-0635-5_7_Fige_HTML.jpg](A978-1-4842-0635-5_7_Fige_HTML.jpg)\n\
    \nThe result is identical to using `file_get_contents()` in `get_contents_03.php`.\
    \ Unlike `file_get_contents()`, the function `fread()` needs to know how much\
    \ of the file to read. You need to supply a second argument indicating the number\
    \ of bytes. This can be useful if you want, say, only the first 100 or so characters\
    \ from a very big file. However, if you want the whole file, you need to pass\
    \ the file’s path name to `filesize()` to get the correct figure.\n\nThe other\
    \ way to read the contents of a file with `fopen()` is to use `fgets()`, which\
    \ retrieves one line at a time. This means you need to use a `while` loop in combination\
    \ with `feof()` to read right to the end of the file. The code in `fopen_readloop.php`\
    \ looks like this:\n\n```\n$filename = 'C:/private/sonnet.txt';\n\n// open the\
    \ file in read-only mode\n$file = fopen($filename, 'r');\n\n// create variable\
    \ to store the contents\n$contents = '';\n\n// loop through each line until end\
    \ of file\nwhile (!feof($file)) {\n    // retrieve next line, and add to $contents\n\
    \    $contents .= fgets($file);\n}\n\n// close the file\nfclose($file);\n\n//\
    \ display the contents\necho nl2br($contents);\n```\n\nThe `while` loop uses `fgets()`\
    \ to retrieve the contents of the file one line at a time—`!feof($file)` is the\
    \ same as saying “until the end of `$file`”—and stores them in `$contents`.\n\n\
    Using `fgets()` is very similar to using the `file()` function in that it handles\
    \ one line at a time. The difference is that you can break out of the loop with\
    \ `fgets()` once you have found the information you’re looking for. This is a\
    \ significant advantage if you’re working with a very large file. The `file()`\
    \ function loads the entire file into an array, consuming memory."
  raw: '### Opening and Closing Files for Read/Write Operations


    The functions we have looked at so far do everything in a single pass. However,
    PHP also has a set of functions that allow you to open a file, read it and/or
    write to it, and then close the file. The file can be either on the local file
    system or a publicly available file on a different domain.


    The following are the most important functions used for this type of operation:


    *   `fopen()`: Opens a file

    *   `fgets()`: Reads the contents of a file, normally one line at a time

    *   `fgetcsv()`: Gets the current line from a CSV file and converts it into an
    array

    *   `fread()`: Reads a specified amount of a file

    *   `fwrite()`: Writes to a file

    *   `feof()`: Determines whether the end of the file has been reached

    *   `rewind()`: Moves the internal pointer back to the top of the file

    *   `fseek()`: Moves the internal pointer to a specific location in the file

    *   `fclose()`: Closes a file


    The first of these, `fopen()`, offers a bewildering choice of options for how
    the file is to be used once it’s open: `fopen()` has one read-only mode, four
    write-only modes, and five read/write modes. There are so many because they give
    you control over whether to overwrite the existing content or append new material.
    At other times, you may want PHP to create a file if it doesn’t already exist.


    Each mode determines where to place the internal pointer when it opens the file.
    It’s like the cursor in a word processor: PHP starts reading or writing from wherever
    the pointer happens to be when you call `fread()` or `fwrite()`.


    Table [7-2](#A978-1-4842-0635-5_7_Chapter.html#Tab2) guides you through all the
    options.


    Table 7-2.


    Read/write modes used with `fopen()`


    | Type | Mode | Description |

    | --- | --- | --- |

    | Read-only | `r` | Internal pointer initially placed at beginning of file. |

    | Write-only | `w` | Existing data deleted before writing. Creates a file if it
    doesn’t already exist. |

    |   | `a` | Append mode. New data added at end of file. Creates a file if it doesn’t
    already exist. |

    |   | `c` | Existing content is preserved, but the internal pointer is placed
    at the beginning of the file. Creates a file if it doesn’t already exist. |

    |   | `x` | Creates a file only if it doesn’t already exist. Fails if there’s
    already a file with the same name. |

    | Read/write | `r+` | Read/write operations can take place in either order and
    begin wherever the internal pointer is at the time. Pointer initially placed at
    beginning of file. File must already exist for operation to succeed. |

    | `w+` | Existing data deleted. Data can be read back after writing. Creates a
    file if it doesn’t already exist. |

    | `a+` | Opens a file ready to add new data at end of file. Also permits data
    to be read back after internal pointer has been moved. Creates a file if it doesn’t
    already exist. |

    | `c+` | Existing content is preserved, and the internal pointer is placed at
    the beginning of the file. Creates a new file if it doesn’t already exist. |

    | `x+` | Creates a new file, but fails if a file of the same name already exists.
    Data can be read back after writing. |


    Choose the wrong mode, and you could end up deleting valuable data. You also need
    to be careful about the position of the internal pointer. If the pointer is at
    the end of the file, and you try to read the contents, you end up with nothing.
    On the other hand, if the pointer is at the beginning of the file, and you start
    writing, you overwrite the equivalent amount of existing data. “Moving the internal
    pointer” later in this chapter explains this in more detail.


    You work with `fopen()` by passing it the following two arguments:


    *   The path to the file you want to open, or URL if the file is on a different
    domain

    *   A string containing one of the modes listed in Table [7-2](#A978-1-4842-0635-5_7_Chapter.html#Tab2)


    The `fopen()` function returns a reference to the open file, which can then be
    used with the other read/write functions. This is how you would open a text file
    for reading:


    `$file = fopen(''C:/private/sonnet.txt'', ''r'');`


    Thereafter, you pass `$file` as the argument to other functions, such as `fgets()`
    and `fclose()`. Things should become clearer with a few practical demonstrations.
    Rather than building the files yourself, you’ll probably find it easier to use
    the files in the `ch07` folder. I’ll run quickly through each mode.


    Note


    Mac and Linux users need to adjust the path to the `private` folder in the example
    files to match their setup.


    #### Reading a File with fopen( )


    The file `fopen_read.php` contains the following code:


    `// store the pathname of the file`


    `$filename = ''C:/private/sonnet.txt'';`


    `// open the file in read-only mode`


    `$file = fopen($filename, ''r'');`


    `// read the file and store its contents`


    `$contents = fread($file, filesize($filename));`


    `// close the file`


    `fclose($file);`


    `// display the contents with <br/> tags`


    `echo nl2br($contents);`


    If you load this into a browser, you should see the following output:


    ![A978-1-4842-0635-5_7_Fige_HTML.jpg](A978-1-4842-0635-5_7_Fige_HTML.jpg)


    The result is identical to using `file_get_contents()` in `get_contents_03.php`.
    Unlike `file_get_contents()`, the function `fread()` needs to know how much of
    the file to read. You need to supply a second argument indicating the number of
    bytes. This can be useful if you want, say, only the first 100 or so characters
    from a very big file. However, if you want the whole file, you need to pass the
    file’s path name to `filesize()` to get the correct figure.


    The other way to read the contents of a file with `fopen()` is to use `fgets()`,
    which retrieves one line at a time. This means you need to use a `while` loop
    in combination with `feof()` to read right to the end of the file. The code in
    `fopen_readloop.php` looks like this:


    `$filename = ''C:/private/sonnet.txt'';`


    `// open the file in read-only mode`


    `$file = fopen($filename, ''r'');`


    `// create variable to store the contents`


    `$contents = '''';`


    `// loop through each line until end of file`


    `while (!feof($file)) {`


    `// retrieve next line, and add to $contents`


    `$contents .= fgets($file);`


    `}`


    `// close the file`


    `fclose($file);`


    `// display the contents`


    `echo nl2br($contents);`


    The `while` loop uses `fgets()` to retrieve the contents of the file one line
    at a time—`!feof($file)` is the same as saying “until the end of `$file`”—and
    stores them in `$contents`.


    Using `fgets()` is very similar to using the `file()` function in that it handles
    one line at a time. The difference is that you can break out of the loop with
    `fgets()` once you have found the information you’re looking for. This is a significant
    advantage if you’re working with a very large file. The `file()` function loads
    the entire file into an array, consuming memory.'
  trans: "\n# 以读写模式打开和关闭文件\n\n到目前为止，我们介绍过的函数都能一次性完成所有操作。不过，PHP 还提供了一组函数，允许你打开文件、读取和/或写入内容，然后关闭文件。该文件可以是本地文件系统中的文件，也可以是其他域上公开可用的文件。\n\
    \n以下是用于此类操作的最重要的函数：\n\n*   `fopen()`：打开文件\n*   `fgets()`：读取文件内容，通常是一次读取一行\n* \
    \  `fgetcsv()`：从 CSV 文件中获取当前行，并将其转换为数组\n*   `fread()`：读取文件的指定长度\n*   `fwrite()`：写入文件\n\
    *   `feof()`：判断是否已到达文件末尾\n*   `rewind()`：将内部指针移回文件开头\n*   `fseek()`：将内部指针移动到文件中的特定位置\n\
    *   `fclose()`：关闭文件\n\n第一个函数 `fopen()` 提供了令人眼花缭乱的选项，用于指定文件打开后的使用方式：`fopen()` 有一种只读模式、四种只写模式和五种读写模式。之所以有这么多模式，是因为它们让你能够控制是覆盖现有内容还是追加新内容。有时，你可能希望\
    \ PHP 在文件不存在时创建它。\n\n每种模式都决定了打开文件时将内部指针放置在何处。它就像文字处理器中的光标：当你调用 `fread()` 或 `fwrite()`\
    \ 时，PHP 会从指针当前所在的位置开始读取或写入。\n\n表 7-2 将指导您了解所有选项。\n\n**表 7-2.** `fopen()` 使用的读写模式\n\
    \n| 类型 | 模式 | 描述 |\n| --- | --- | --- |\n| 只读 | `r` | 内部指针初始位置位于文件开头。 |\n| 只写\
    \ | `w` | 写入前删除现有数据。如果文件不存在则创建。 |\n| | `a` | 追加模式。新数据添加到文件末尾。如果文件不存在则创建。 |\n|\
    \ | `c` | 保留现有内容，但内部指针置于文件开头。如果文件不存在则创建。 |\n| | `x` | 仅在文件不存在时创建文件。如果已存在同名文件则失败。\
    \ |\n| 读写 | `r+` | 读写操作可以任意顺序进行，并从当前内部指针所在位置开始。指针初始位于文件开头。操作成功要求文件必须已存在。 |\n|\
    \ | `w+` | 删除现有数据。写入后可回读数据。如果文件不存在则创建。 |\n| | `a+` | 打开文件，准备在文件末尾添加新数据。移动内部指针后也允许回读数据。如果文件不存在则创建。\
    \ |\n| | `c+` | 保留现有内容，内部指针置于文件开头。如果文件不存在则创建新文件。 |\n| | `x+` | 创建新文件，但如果同名文件已存在则失败。写入后可回读数据。\
    \ |\n\n如果选错了模式，你可能会意外删除宝贵的数据。你还需注意内部指针的位置。如果指针位于文件末尾，而你试图读取内容，结果将一无所获。另一方面，如果指针位于文件开头，而你开始写入，则会覆盖等量的现有数据。本章后面的“移动内部指针”部分将对此进行更详细的解释。\n\
    \n使用 `fopen()` 需要传入以下两个参数：\n\n*   要打开文件的路径，如果文件位于不同域名下则提供 URL\n*   包含表 7-2 中列出的某个模式的字符串\n\
    \n`fopen()` 函数返回一个指向打开文件的引用，该引用随后可与其他读写函数一起使用。以下是打开文本文件进行读取的方法：\n\n```\n$file\
    \ = fopen('C:/private/sonnet.txt', 'r');\n```\n\n之后，你可以将 `$file` 作为参数传递给其他函数，例如\
    \ `fgets()` 和 `fclose()`。通过一些实际演示，事情应该会变得更清晰。你可能会发现使用 `ch07` 文件夹中的文件更容易，而不是自行构建文件。我将快速介绍每种模式。\n\
    \n**注意：** Mac 和 Linux 用户需要调整示例文件中 `private` 文件夹的路径，以匹配其环境设置。\n\n## 使用 `fopen()`\
    \ 读取文件\n\n文件 `fopen_read.php` 包含以下代码：\n\n```\n// 存储文件路径名\n$filename = 'C:/private/sonnet.txt';\n\
    \n// 以只读模式打开文件\n$file = fopen($filename, 'r');\n\n// 读取文件并存储其内容\n$contents = fread($file,\
    \ filesize($filename));\n\n// 关闭文件\nfclose($file);\n\n// 使用 <br/> 标签显示内容\necho\
    \ nl2br($contents);\n```\n\n如果你在浏览器中加载此文件，应会看到以下输出：\n\n![A978-1-4842-0635-5_7_Fige_HTML.jpg](img/A978-1-4842-0635-5_7_Fige_HTML.jpg)\n\
    \n结果与 `get_contents_03.php` 中使用 `file_get_contents()` 完全相同。与 `file_get_contents()`\
    \ 不同，`fread()` 函数需要知道要读取多少内容。你需要提供第二个参数来指示字节数。如果你只想读取一个超大文件的前 100 个左右的字符，这将非常有用。但是，如果你想要整个文件，则需要将文件路径名传递给\
    \ `filesize()` 以获取正确的大小。\n\n另一种使用 `fopen()` 读取文件内容的方法是使用 `fgets()`，它一次检索一行。这意味着你需要将\
    \ `while` 循环与 `feof()` 结合使用，才能一直读取到文件末尾。`fopen_readloop.php` 中的代码如下所示：\n\n```\n\
    $filename = 'C:/private/sonnet.txt';\n\n// 以只读模式打开文件\n$file = fopen($filename,\
    \ 'r');\n\n// 创建变量来存储内容\n$contents = '';\n\n// 循环遍历每一行，直到文件末尾\nwhile (!feof($file))\
    \ {\n    // 获取下一行，并追加到 $contents 中\n    $contents .= fgets($file);\n}\n\n// 关闭文件\n\
    fclose($file);\n\n// 显示内容\necho nl2br($contents);\n```\n\n`while` 循环使用 `fgets()`\
    \ 逐行检索文件内容——`!feof($file)` 等价于“直到 `$file` 的末尾”——并将它们存储在 `$contents` 中。\n\n使用 `fgets()`\
    \ 与使用 `file()` 函数非常相似，因为它也是一次处理一行。区别在于，一旦你找到所需的信息，就可以使用 `fgets()` 跳出循环。如果你在处理一个非常大的文件，这是一个显著的优势。而\
    \ `file()` 函数会将整个文件加载到数组中，从而消耗内存。\n"
- fmt: "# PHP Solution 7-2: Extracting Data from a CSV File\n\nText files can be used\
    \ as a flat-file database, where each record is stored in a single line with a\
    \ comma, tab, or other delimiter between each field. This type of file is called\
    \ a CSV file. Usually, CSV stands for comma-separated values, but it can also\
    \ mean character-separated values when a tab or different delimiter is used. This\
    \ PHP solution shows how to extract the values from a CSV file into a multidimensional\
    \ associative array using `fopen()` and `fgetcsv()`.\n\nCopy `users.csv` from\
    \ the `ch07` folder to your `private` folder. The file contains the following\
    \ data as comma-separated values:\n\n`name,password`\n\n`david,codeslave`\n\n\
    `ben,bigboss`\n\nThe first line consists of titles for the data in the rest of\
    \ the file. There are just two lines of data, each containing a name and password.\
    \ This file will also be used in Chapter 9 to create a simple file-based login\
    \ system.\n\n> **Caution**: When storing data as comma-separated values, there\
    \ should be no space after the comma. If you add a space, it’s considered to be\
    \ the first character of a data field. Each line in a CSV file must have the same\
    \ number of items.\n\nCreate a file called `getcsv.php` in the `filesystem` folder\
    \ and use `fopen()` to open `users.csv` in read mode:\n\n`$file = fopen('C:/private/users.csv',\
    \ 'r');`\n\nUse `fgetcsv()` to extract the first line from the file as an array,\
    \ then assign it to a variable called `$titles`:\n\n`$titles = fgetcsv($file);`\n\
    \nThis creates `$titles` as an array containing the values from the first line\
    \ (name and password).\n\nThe `fgetcsv()` function requires a single argument,\
    \ the reference to the file you have opened. It also accepts up to four optional\
    \ arguments:\n\n- The maximum length of the line: The default value is 0, which\
    \ means no limit.\n- The delimiter between fields: Comma is the default.\n- The\
    \ enclosure character: If fields contain the delimiter as part of the data, they\
    \ must be enclosed in quotes. Double quotes are the default.\n- The escape character:\
    \ The default is a backslash.\n\nThe CSV file that we're using doesn't require\
    \ any of the optional arguments to be set.\n\nOn the next line, initialize an\
    \ empty array for the values that will be extracted from the CSV data:\n\n`$users\
    \ = [];`\n\nAfter extracting values from a line, `fgetcsv()` moves to the next\
    \ line. To get the remaining data from the file, you need to create a loop. In\
    \ `fopen_readloop.php`, `!feof($file)` was used as the condition. This time, assign\
    \ the return value of `fgetcsv()` to a variable in the condition, like this:\n\
    \n```php\nwhile (($data = fgetcsv($file)) !== false) {\n    $users[] = array_combine($titles,\
    \ $data);\n}\n```\n\nNote that the statement that assigns the return value from\
    \ `fgetcsv()` is enclosed in a separate pair of parentheses and then compared\
    \ to `false` using the not identical operator (`!==`). This has the effect of\
    \ running the loop until `fgetcsv()` produces no more data.\n\nThe code inside\
    \ the loop uses the `array_combine()` function to generate an associative array,\
    \ which is added to the `$users` array. This function requires two arguments,\
    \ both of which must be arrays with the same number of elements. The two arrays\
    \ are merged, drawing the keys for the resulting associative array from the first\
    \ argument and the values from the second one.\n\nClose the CSV file:\n\n`fclose($file);`\n\
    \nTo inspect the result, use `print_r()`. Surround it with `<pre>` tags to make\
    \ the output easier to read:\n\n```php\necho '<pre>';\nprint_r($users);\necho\
    \ '</pre>';\n```\n\nThis works well with `users.csv`, but the script can be made\
    \ more robust. If `fgetcsv()` encounters a blank line, it returns an array containing\
    \ a single `null` element, which generates an error when passed as an argument\
    \ to `array_combine()`. Amend the `while` loop by adding the conditional statement\
    \ highlighted in bold:\n\n![A978-1-4842-0635-5_7_Fig1_HTML.jpg](A978-1-4842-0635-5_7_Fig1_HTML.jpg)\n\
    \n**Figure 7-1.** The CSV data has been converted into a multidimensional associative\
    \ array\n\nSave `getcsv.php` and load it in a browser. You should see the result\
    \ shown in Figure 7-1.\n\n```php\nwhile (($data = fgetcsv($file)) !== false) {\n\
    \    if (count($data) == 1 && is_null($data[0])) {\n        continue;\n    }\n\
    \    $users[] = array_combine($titles, $data);\n}\n```\n\nThe conditional statement\
    \ uses the `count()` method to find out how many elements are in the array. If\
    \ there's only one, and the value of the first element is `null`, the `continue`\
    \ keyword returns to the top of the loop without executing the next line.\n\n\
    You can check your code against `getcsv.php` in the `ch07` folder.\n\n### CSV\
    \ Files Created on Mac OS\n\nPHP often has difficulty detecting the line endings\
    \ in CSV files created on Mac operating systems. If `fgetcsv()` fails to extract\
    \ data correctly from a CSV file, add the following line of code at the top of\
    \ the script:\n\n`ini_set('auto_detect_line_endings', true);`\n\nThis has a marginal\
    \ effect on performance, so it should be used only if Mac line endings cause problems\
    \ with CSV files.\n\n## Replacing Content with `fopen()`\n\nThe first of the write-only\
    \ modes (`w`) deletes any existing content in a file, so it's useful for working\
    \ with files that need to be updated frequently. You can test the `w` mode with\
    \ `fopen_write.php`, which has the following PHP code above the `DOCTYPE` declaration:\n\
    \n```php\n<?php\n// if the form has been submitted, process the input text\nif\
    \ (isset($_POST['putContents'])) {\n    // open the file in write-only mode\n\
    \    $file = fopen('C:/private/write.txt', 'w');\n    // write the contents\n\
    \    fwrite($file, $_POST['contents']);\n    // close the file\n    fclose($file);\n\
    }\n?>\n```\n\nWhen the form in the page is submitted, this code writes the value\
    \ of `$_POST['contents']` to a file called `write.txt`. The `fwrite()` function\
    \ takes two arguments: the reference to the file and whatever you want to write\
    \ to it.\n\n> **Note**: You may come across `fputs()` instead of `fwrite()`. The\
    \ two functions are identical: `fputs()` is a synonym for `fwrite()`.\n\nIf you\
    \ load `fopen_write.php` into a browser, type something into the text area, and\
    \ click Write to file, PHP creates `write.txt` and inserts whatever you typed\
    \ into the text area. Since this is just a demonstration, I've omitted any checks\
    \ to make sure that the file was successfully written. Open `write.txt` to verify\
    \ that your text has been inserted. Now, type something different into the text\
    \ area and submit the form again. The original content is deleted from `write.txt`\
    \ and replaced with the new text. The deleted text is gone forever.\n\n## Appending\
    \ Content with `fopen()`\n\nThe append mode not only adds new content at the end,\
    \ preserving any existing content, but it can also create a new file if it doesn't\
    \ already exist. The code in `fopen_append.php` looks like this:\n\n```php\n//\
    \ open the file in append mode\n$file = fopen('C:/private/append.txt', 'a');\n\
    // write the contents followed by a new line\nfwrite($file, $_POST['contents']\
    \ . PHP_EOL);\n// close the file\nfclose($file);\n```\n\nNotice that I have concatenated\
    \ `PHP_EOL` after `$_POST['contents']`. This is a PHP constant that represents\
    \ a new line using the correct characters for the operating system. On Windows,\
    \ it inserts a carriage return and newline character, but on Macs and Linux only\
    \ a newline character.\n\nIf you load `fopen_append.php` into a browser, type\
    \ some text, and submit the form, it creates a file called `append.txt` in the\
    \ private folder and inserts your text. Type something else and submit the form\
    \ again; the new text should be added to the end of the previous text, as shown\
    \ in the following screenshot.\n\n![A978-1-4842-0635-5_7_Figf_HTML.jpg](A978-1-4842-0635-5_7_Figf_HTML.jpg)\n\
    \nWe'll come back to append mode in Chapter 9."
  raw: '#### PHP Solution 7-2: Extracting data from a CSV file


    Text files can be used as a flat-file database, where each record is stored in
    a single line with a comma, tab, or other delimiter between each field. This type
    of file is called a CSV file. Usually, CSV stands for comma-separated values,
    but it can also mean character-separated values when a tab or different delimiter
    is used. This PHP solution shows how to extract the values from a CSV file into
    a multidimensional associative array using `fopen()` and `fgetcsv()`.


    Copy `users.csv` from the `ch07` folder to your `private` folder. The file contains
    the following data as comma-separated values:


    `name,password`


    `david,codeslave`


    `ben,bigboss`


    The first line consists of titles for the data in the rest of the file. There
    are just two lines of data, each containing a name and password. This file will
    also be used in [Chapter 9](#A978-1-4842-0635-5_9_Chapter.html) to create a simple
    file-based login system.


    Caution


    When storing data as comma-separated values, there should be no space after the
    comma. If you add a space, it’s considered to be the first character of a data
    field. Each line in a CSV file must have the same number of items.


    Create a file called `getcsv.php` in the `filesystem` folder and use `fopen()`
    to open `users.csv` in read mode:


    `$file = fopen(''C:/private/users.csv'', ''r'');`


    Use `fgetcsv()` to extract the first line from the file as an array, then assign
    it to a variable called `$titles`:


    `$titles = fgetcsv($file);`


    This creates `$titles` as an array containing the values from the first line (name
    and password).


    The `fgetcsv()` function requires a single argument, the reference to the file
    you have opened. It also accepts up to four optional arguments:


    *   The maximum length of the line: The default value is 0, which means no limit

    *   The delimiter between fields: Comma is the default.

    *   The enclosure character: If fields contain the delimiter as part of the data,
    they must be enclosed in quotes. Double quotes are the default.

    *   The escape character: The default is a backslash.


    The CSV file that we’re using doesn’t require any of the optional arguments to
    be set.


    On the next line, initialize an empty array for the values that will be extracted
    from the CSV data:


    `$users = [];`


    After extracting values from a line, `fgetcsv()` moves to the next line. To get
    the remaining data from the file, you need to create a loop. In `fopen_readloop.php`,
    `!feof($file)` was used as the condition. This time, assign the return value of
    `fgetcsv()` to a variable in the condition, like this:


    `while (($data = fgetcsv($file)) !== false) {`


    `$users[] = array_combine($titles, $data);`


    `}`


    Note that the statement that assigns the return value from `fgetcsv()` is enclosed
    in a separate pair of parentheses and then compared to `false` using the not identical
    operator (`!==`). This has the effect of running the loop until `fgetcsv()` produces
    no more data.


    The code inside the loop uses the `array_combine()` function to generate an associative
    array, which is added to the `$users` array. This function requires two arguments,
    both of which must be arrays with the same number of elements. The two arrays
    are merged, drawing the keys for the resulting associative array from the first
    argument and the values from the second one.


    Close the CSV file:


    `fclose($file);`


    To inspect the result, use `print_r()`. Surround it with `<pre>` tags to make
    the output easier to read:


    `echo ''<pre>'';`


    `print_r($users);`


    `echo ''</pre>'';`


    This works well with `users.csv`, but the script can be made more robust. If `fgetcsv()`
    encounters a blank line, it returns an array containing a single `null` element,
    which generates an error when passed as an argument to `array_combine()`. Amend
    the `while` loop by adding the conditional statement highlighted in bold:


    ![A978-1-4842-0635-5_7_Fig1_HTML.jpg](A978-1-4842-0635-5_7_Fig1_HTML.jpg)


    Figure 7-1.


    The CSV data has been converted into a multidimensional associative array Save
    `getcsv.php` and load it in a browser. You should see the result shown in Figure
    7-1.


    `while (($data = fgetcsv($file)) !== false) {`


    `if (count($data) == 1` `&&` `is_null($data[0])) {`


    `continue;`


    `}`


    `$users[] = array_combine($titles, $data);`


    `}`


    The conditional statement uses the `count()` method to find out how many elements
    are in the array. If there’s only one, and the value of the first element is `null`,
    the `continue` keyword returns to the top of the loop without executing the next
    line.


    You can check your code against `getcsv.php` in the `ch07` folder.


    CSV FILES CREATED ON MAC OS


    PHP often has difficulty detecting the line endings in CSV files created on Mac
    operating systems. If `fgetcsv()` fails to extract data correctly from a CSV file,
    add the following line of code at the top of the script:


    `ini_set(''auto_detect_line_endings'', true);`


    This has a marginal effect on performance, so it should be used only if Mac line
    endings cause problems with CSV files.


    #### Replacing Content with fopen( )


    The first of the write-only modes (`w`) deletes any existing content in a file,
    so it’s useful for working with files that need to be updated frequently. You
    can test the `w` mode with `fopen_write.php`, which has the following PHP code
    above the `DOCTYPE` declaration:


    `<?php`


    `// if the form has been submitted, process the input text`


    `if (isset($_POST[''putContents''])) {`


    `// open the file in write-only mode`


    `$file = fopen(''C:/private/write.txt'', ''w'');`


    `// write the contents`


    `fwrite($file, $_POST[''contents'']);`


    `// close the file`


    `fclose($file);`


    `}`


    `?>`


    When the form in the page is submitted, this code writes the value of `$_POST[''contents'']`
    to a file called `write.txt`. The `fwrite()`function takes two arguments: the
    reference to the file and whatever you want to write to it.


    Note


    You may come across `fputs()` instead of `fwrite()`. The two functions are identical:
    `fputs()` is a synonym for `fwrite()`.


    If you load `fopen_write.php` into a browser, type something into the text area,
    and click Write to file, PHP creates `write.txt` and inserts whatever you typed
    into the text area. Since this is just a demonstration, I’ve omitted any checks
    to make sure that the file was successfully written. Open `write.txt` to verify
    that your text has been inserted. Now, type something different into the text
    area and submit the form again. The original content is deleted from `write.txt`
    and replaced with the new text. The deleted text is gone forever.


    #### Appending Content with fopen( )


    The append mode not only adds new content at the end, preserving any existing
    content, but it can also create a new file if it doesn’t already exist. The code
    in `fopen_append.php` looks like this:


    `// open the file in append mode`


    `$file = fopen(''C:/private/append.txt'', ''a'');`


    `// write the contents followed by a new line`


    `fwrite($file, $_POST[''contents''] . PHP_EOL);`


    `// close the file`


    `fclose($file);`


    Notice that I have concatenated `PHP_EOL` after `$_POST[''contents'']`. This is
    a PHP constant that represents a new line using the correct characters for the
    operating system. On Windows, it inserts a carriage return and newline character,
    but on Macs and Linux only a newline character.


    If you load `fopen_append.php` into a browser, type some text, and submit the
    form, it creates a file called append.txt in the private folder and inserts your
    text. Type something else and submit the form again; the new text should be added
    to the end of the previous text, as shown in the following screenshot.


    ![A978-1-4842-0635-5_7_Figf_HTML.jpg](A978-1-4842-0635-5_7_Figf_HTML.jpg)


    We’ll come back to append mode in [Chapter 9](#A978-1-4842-0635-5_9_Chapter.html).'
  trans: "\n# PHP 方案 7-2：从 CSV 文件中提取数据\n\n文本文件可作为平面文件数据库使用，每条记录存储在单独一行中，各字段之间用逗号、制表符或其他分隔符隔开。这类文件称为\
    \ CSV 文件。通常，CSV 代表逗号分隔值，但当使用制表符或其他分隔符时，也可表示字符分隔值。本 PHP 方案展示了如何使用 `fopen()` 和 `fgetcsv()`\
    \ 将 CSV 文件中的值提取到多维关联数组中。\n\n将 `ch07` 文件夹中的 `users.csv` 复制到你的 `private` 文件夹。该文件包含以下逗号分隔值数据：\n\
    \n`name,password`\n\n`david,codeslave`\n\n`ben,bigboss`\n\n第一行由文件其余数据列标题组成。只有两行数据，每行包含一个用户名和密码。该文件还将在第\
    \ 9 章中用于创建一个简单的基于文件的登录系统。\n\n> **警告**：以逗号分隔值存储数据时，逗号后不应有空格。如果添加空格，它将被视为数据字段的第一个字符。CSV\
    \ 文件中的每一行必须包含相同数量的项目。\n\n在 `filesystem` 文件夹中创建一个名为 `getcsv.php` 的文件，并使用 `fopen()`\
    \ 以读取模式打开 `users.csv`：\n\n`$file = fopen('C:/private/users.csv', 'r');`\n\n使用\
    \ `fgetcsv()` 将文件中的第一行提取为数组，然后将其赋值给名为 `$titles` 的变量：\n\n`$titles = fgetcsv($file);`\n\
    \n这将创建一个包含第一行（name 和 password）值的数组 `$titles`。\n\n`fgetcsv()` 函数需要一个参数，即你已打开文件的引用。它还接受最多四个可选参数：\n\
    \n- 行的最大长度：默认值为 0，表示无限制。\n- 字段之间的分隔符：默认为逗号。\n- 封闭字符：如果字段包含作为数据一部分的分隔符，则必须用引号括起来。默认值为双引号。\n\
    - 转义字符：默认值为反斜杠。\n\n我们使用的 CSV 文件不需要设置任何可选参数。\n\n在下一行，初始化一个空数组，用于存储将从 CSV 数据中提取的值：\n\
    \n`$users = [];`\n\n从一行中提取值后，`fgetcsv()` 会移动到下一行。要获取文件中的其余数据，你需要创建一个循环。在 `fopen_readloop.php`\
    \ 中，使用了 `!feof($file)` 作为条件。这次，将 `fgetcsv()` 的返回值赋值给条件中的一个变量，如下所示：\n\n```php\n\
    while (($data = fgetcsv($file)) !== false) {\n    $users[] = array_combine($titles,\
    \ $data);\n}\n```\n\n请注意，将从 `fgetcsv()` 返回值的语句用一对单独的括号括起来，然后使用不全等运算符（`!==`）与 `false`\
    \ 进行比较。这会使得循环运行直到 `fgetcsv()` 不再产生数据。\n\n循环内的代码使用 `array_combine()` 函数生成一个关联数组，并将其添加到\
    \ `$users` 数组中。此函数需要两个参数，这两个参数必须是具有相同数量元素的数组。两个数组合并，从第一个参数提取结果关联数组的键，从第二个参数提取值。\n\
    \n关闭 CSV 文件：\n\n`fclose($file);`\n\n要检查结果，请使用 `print_r()`。将其包裹在 `<pre>` 标签中，使输出更易于阅读：\n\
    \n```php\necho '<pre>';\nprint_r($users);\necho '</pre>';\n```\n\n这对于 `users.csv`\
    \ 运行良好，但脚本可以更健壮。如果 `fgetcsv()` 遇到空行，它会返回一个包含单个 `null` 元素的数组，当作为参数传递给 `array_combine()`\
    \ 时会导致错误。通过添加以粗体突出显示的条件语句来修改 `while` 循环：\n\n![A978-1-4842-0635-5_7_Fig1_HTML.jpg](img/A978-1-4842-0635-5_7_Fig1_HTML.jpg)\n\
    \n**图 7-1.** CSV 数据已转换为多维关联数组\n\n保存 `getcsv.php` 并在浏览器中加载它。你应该会看到如图 7-1 所示的结果。\n\
    \n```php\nwhile (($data = fgetcsv($file)) !== false) {\n    if (count($data) ==\
    \ 1 && is_null($data[0])) {\n        continue;\n    }\n    $users[] = array_combine($titles,\
    \ $data);\n}\n```\n\n该条件语句使用 `count()` 方法找出数组中有多少个元素。如果只有一个，并且第一个元素的值为 `null`，则\
    \ `continue` 关键字返回循环顶部而不执行下一行。\n\n你可以对照 `ch07` 文件夹中的 `getcsv.php` 检查你的代码。\n\n\
    ### 在 Mac OS 上创建的 CSV 文件\n\nPHP 通常难以检测 Mac 操作系统上创建的 CSV 文件的行尾。如果 `fgetcsv()` 无法正确从\
    \ CSV 文件中提取数据，请在脚本顶部添加以下代码行：\n\n`ini_set('auto_detect_line_endings', true);`\n\
    \n这对性能影响很小，因此仅当 Mac 行尾导致 CSV 文件出现问题时才应使用。\n\n## 使用 `fopen()` 替换内容\n\n第一个只写模式（`w`）会删除文件中的任何现有内容，因此对于需要频繁更新的文件非常有用。你可以使用\
    \ `fopen_write.php` 测试 `w` 模式，该文件在 `DOCTYPE` 声明之上有以下 PHP 代码：\n\n```php\n<?php\n\
    // 如果表单已提交，处理输入文本\nif (isset($_POST['putContents'])) {\n    // 以只写模式打开文件\n   \
    \ $file = fopen('C:/private/write.txt', 'w');\n    // 写入内容\n    fwrite($file,\
    \ $_POST['contents']);\n    // 关闭文件\n    fclose($file);\n}\n?>\n```\n\n当页面中的表单提交时，此代码将\
    \ `$_POST['contents']` 的值写入名为 `write.txt` 的文件中。`fwrite()` 函数接受两个参数：文件的引用以及你要写入的任何内容。\n\
    \n> **注意**：你可能会遇到 `fputs()` 而不是 `fwrite()`。这两个函数完全相同：`fputs()` 是 `fwrite()` 的同义词。\n\
    \n如果在浏览器中加载 `fopen_write.php`，在文本区域中键入一些内容，然后单击“写入文件”，PHP 会创建 `write.txt` 并插入你在文本区域中键入的任何内容。由于这只是一个演示，我省略了任何检查以确保文件已成功写入。打开\
    \ `write.txt` 以验证你的文本已插入。现在，在文本区域中键入不同的内容并再次提交表单。原始内容将从 `write.txt` 中删除，并替换为新文本。已删除的文本将永久消失。\n\
    \n## 使用 `fopen()` 追加内容\n\n追加模式不仅会在末尾添加新内容，保留任何现有内容，而且如果文件不存在，还可以创建新文件。`fopen_append.php`\
    \ 中的代码如下所示：\n\n```php\n// 以追加模式打开文件\n$file = fopen('C:/private/append.txt', 'a');\n\
    // 写入内容后跟一个新行\nfwrite($file, $_POST['contents'] . PHP_EOL);\n// 关闭文件\nfclose($file);\n\
    ```\n\n请注意，我在 `$_POST['contents']` 之后连接了 `PHP_EOL`。这是一个 PHP 常量，表示使用适合操作系统的正确字符的新行。在\
    \ Windows 上，它会插入一个回车符和换行符，但在 Mac 和 Linux 上只插入一个换行符。\n\n如果在浏览器中加载 `fopen_append.php`，键入一些文本并提交表单，它会在\
    \ private 文件夹中创建一个名为 `append.txt` 的文件并插入你的文本。键入其他内容并再次提交表单；新文本应添加到先前文本的末尾，如下面的屏幕截图所示。\n\
    \n![A978-1-4842-0635-5_7_Figf_HTML.jpg](img/A978-1-4842-0635-5_7_Figf_HTML.jpg)\n\
    \n我们将在第 9 章中再次讨论追加模式。\n"
- fmt: "### Locking a File Before Writing\n\nThe purpose of using `fopen()` with `c`\
    \ mode is to give you the opportunity to lock the file with `flock()` before modifying\
    \ it. The `flock()` function takes two arguments: the file reference and a constant\
    \ specifying how the lock should operate. There are three types of operation:\n\
    - `LOCK_SH` acquires a shared lock for reading\n- `LOCK_EX` acquires an exclusive\
    \ lock for writing\n- `LOCK_UN` releases the lock\n\nTo lock a file before writing\
    \ to it, open the file in `c` mode and immediately call `flock()`, like this:\n\
    \n```\n// open the file in c mode\n$file = fopen('C:/private/lock.txt', 'c');\n\
    // acquire an exclusive lock\nflock($file, LOCK_EX);\n```\n\nThis opens the file,\
    \ or creates it if it doesn’t already exist, and places the internal pointer at\
    \ the beginning of the file. This means you need to move the pointer to the end\
    \ of the file or delete the existing content before you can start writing with\
    \ `fwrite()`. To move the pointer to the end of the file, use the `fseek()` function,\
    \ like this:\n\n```\n// move to end of file\nfseek($file, 0, SEEK_END);\n```\n\
    \nAlternatively, delete the existing contents by calling `ftruncate()`:\n\n```\n\
    // delete the existing contents\nftruncate($file, 0);\n```\n\nAfter you have finished\
    \ writing to the file, you must unlock it manually before calling `fclose()`:\n\
    \n```\n// unlock the file before closing\nflock($file, LOCK_UN);\nfclose($file);\n\
    ```\n\n**Caution**  \nAccording to the documentation for `flock()`, the file is\
    \ no longer automatically unlocked when the file is closed (see [`http://php.net/manual/en/function.flock.php`](http://php.net/manual/en/function.flock.php)).\
    \ Even if you can reopen the file, it remains locked to other users and processes.\n\
    \n### Preventing Overwriting an Existing File\n\nUnlike other write modes, `x`\
    \ mode won’t open an existing file. It only creates a new file ready for writing.\
    \ If a file of the same name already exists, `fopen()` returns `false`, preventing\
    \ you from overwriting it. The processing code in `fopen_exclusive.php` looks\
    \ like this:\n\n```\n// create a file ready for writing only if it doesn't already\
    \ exist\n// error control operator prevents error message from being displayed\n\
    if ($file = @ fopen('C:/private/once_only.txt', 'x')) {\n   // write the contents\n\
    \   fwrite($file, $_POST['contents']);\n   // close the file\n   fclose($file);\n\
    } else {\n   $error = 'File already exists, and cannot be overwritten.';\n}\n\
    ```\n\nAttempting to write to an existing file in `x` mode generates a series\
    \ of PHP error messages. Wrapping the write and close operations in a conditional\
    \ statement deals with most of them, but `fopen()` still generates a warning.\
    \ The error control operator (`@`) in front of `fopen()` suppresses the warning.\n\
    \nLoad `fopen_exclusive.php` into a browser, type some text, and click Write to\
    \ file. The content should be written to `once_only.txt` in your target folder.\
    \ If you try it again, the message stored in `$error` is displayed above the form.\n\
    \n### Combined Read/Write Operations with `fopen()`\n\nBy adding a plus sign (`+`)\
    \ after any of the previous modes, the file is opened for both reading and writing.\
    \ You can perform as many read or write operations as you like—and in any order—until\
    \ the file is closed. The difference between the combined modes is as follows:\n\
    \n- `r+`: The file must already exist; a new one will not be automatically created.\
    \ The internal pointer is placed at the beginning, ready for reading existing\
    \ content.\n- `w+`: Existing content is deleted, so there is nothing to read when\
    \ the file is first opened.\n- `a+`: The file is opened with the internal pointer\
    \ at the end, ready to append new material, so the pointer needs to be moved back\
    \ before anything can be read.\n- `c+`: The file is opened with the internal pointer\
    \ at the beginning.\n- `x+`: Always creates a new file, so there’s nothing to\
    \ read when the file is first opened.\n\nReading is done with `fread()` or `fgets()`\
    \ and writing with `fwrite()`, exactly the same as before. What’s important is\
    \ to understand the position of the internal pointer.\n\n### Moving the Internal\
    \ Pointer\n\nReading and writing operations always start wherever the internal\
    \ pointer happens to be, so you normally want it to be at the beginning of the\
    \ file for reading, and at the end of the file for writing. To move the pointer\
    \ to the beginning, pass the file reference to `rewind()` like this:\n\n```\n\
    rewind($file);\n```\n\nTo move the pointer to the end of a file use `fseek()`\
    \ like this:\n\n```\nfseek($file, 0, SEEK_END);\n```\n\nYou can also use `fseek()`\
    \ to move the internal pointer to a specific position or relative to its current\
    \ position. For details, see [`http://php.net/manual/en/function.fseek.php`](http://php.net/manual/en/function.fseek.php).\n\
    \n**Tip**  \nIn append mode (`a` or `a+`), content is always written to the end\
    \ of the file regardless of the pointer’s current position.\n\n## Exploring the\
    \ File System\n\nPHP’s file system functions can also open directories (folders)\
    \ and inspect their contents. You put one of these functions to practical use\
    \ in PHP Solution 6-6 by using `scandir()` to create an array of existing filenames\
    \ in the `images` folder and looping through the array to create a unique name\
    \ for an uploaded file. From the web developer’s point of view, other practical\
    \ uses of the file system functions are building drop-down menus that display\
    \ the contents of a folder and creating a script that prompts a user to download\
    \ a file, such as an image or PDF document.\n\n### Inspecting a Folder with `scandir()`\n\
    \nLet’s take a closer look at the `scandir()` function, which you used in PHP\
    \ Solution 6-6. It returns an array consisting of the files and folders within\
    \ a specified folder. Just pass the path name of the folder (directory) as a string\
    \ to `scandir()` and store the result in a variable like this:\n\n```\n$files\
    \ = scandir('../images');\n```\n\nYou can examine the result by using `print_r()`\
    \ to display the contents of the array, as shown in the following screenshot (the\
    \ code is in `scandir.php` in the `ch07` folder):\n\n![A978-1-4842-0635-5_7_Figg_HTML.jpg](A978-1-4842-0635-5_7_Figg_HTML.jpg)\n\
    \nThe array returned by `scandir()` doesn’t contain just files. The first two\
    \ items are known as dot files, which represent the current and parent folders.\
    \ The final item is a folder called `thumbs`. The array contains only the names\
    \ of each item. If you want more information about the contents of a folder, it’s\
    \ better to use the `FilesystemIterator` class."
  raw: '#### Locking a File Before Writing


    The purpose of using `fopen()` with `c` mode is to give you the opportunity to
    lock the file with `flock()` before modifying it.


