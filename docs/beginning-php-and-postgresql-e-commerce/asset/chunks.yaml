- fmt: "# 格式优化后的文本\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n`648XCH13.qxd`\
    \ `11/17/06` `3:46 PM` `Page 468`\n\n**468**\n\n## CHAPTER 13 ■ IMPLEMENTING THE\
    \ ORDER PIPELINE: PART I\n\nLet’s now look at the `AdminMail` method that simply\
    \ takes a few parameters for the basic email properties:\n\n```php\n// Builds\
    \ email message\n\npublic function MailAdmin($subject, $message, $sourceStage)\n\
    {\n    $to = ADMIN_EMAIL;\n    $headers = 'From: ' . ORDER_PROCESSOR_EMAIL . \"\
    \\r\\n\";\n    $body = 'Message: ' . $message . \"\\n\" .\n            'Source:\
    \ ' . $sourceStage . \"\\n\" .\n            'Order ID: ' . $this->mOrderInfo['order_id'];\n\
    \n    $result = mail($to, $subject, $body, $headers);\n\n    if ($result === false)\n\
    \    {\n        throw new Exception('Failed sending this mail to administrator:'\
    \ .\n                            \"\\n\" . $body);\n    }\n}\n```\n\nThe `CreateAudit`\
    \ method is also a simple one and calls the `CreateAudit` business tier method\
    \ shown earlier:\n\n```php\n// Adds audit message\n\npublic function CreateAudit($message,\
    \ $messageNumber)\n{\n    Orders::CreateAudit($this->mOrderInfo['order_id'], $message,\
    \ $messageNumber);\n}\n```\n\nAt this point, it’s worth examining the message\
    \ number scheme we’ve chosen for order-processing audits. In all cases, the audit\
    \ message number will be a five-digit number. The first digit of this number is\
    \ either 1 if an audit is being added by `OrderProcessor` or 2 if the audit is\
    \ added by a pipeline section. The next two digits are used for the pipeline stage\
    \ that added the audit (which maps directly to the status of the order when the\
    \ audit was added).\n\nThe final two digits uniquely identify the message within\
    \ this scope. For example, so far you’ve seen the following message numbers:\n\
    \n- `10000`: Order processor started.\n- `10001`: Order processor finished.\n\
    - `10002`: Order processor error occurred.\n\nLater, you’ll see a lot of these\
    \ numbers that start with 2, as you get on to pipeline sections and include the\
    \ necessary information for identifying the pipeline section as noted previously.\
    \ We hope you’ll agree that this scheme allows for plenty of flexibility, although\
    \ you can, of course, use whatever numbers you see fit. As a final note, numbers\
    \ ending in 00 and 01 are used for starting and finishing messages for both the\
    \ order processor and pipeline stages, whereas 02 and above are for other messages.\
    \ There is no real reason for this apart from consistency between the components.\n\
    \nThe `PsDummy` class that is used in this skeleton processor performs some basic\
    \ functions to check that things are working correctly:\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n`648XCH13.qxd` `11/17/06` `3:46 PM` `Page 469`\n\n**469**\n\n```php\n<?php\n\
    \nclass PsDummy implements IPipelineSection\n{\n    public function Process($processor)\n\
    \    {\n        $processor->CreateAudit('PsDoNothing started.', 99999);\n    \
    \    $processor->CreateAudit('Customer: ' .\n                                $processor->mCustomerInfo['name'],\
    \ 99999);\n        $processor->CreateAudit('Order subtotal: ' .\n            \
    \                    $processor->mOrderInfo['total_amount'], 99999);\n       \
    \ $processor->MailAdmin('Test.', 'Test mail from PsDummy.', 99999);\n        $processor->CreateAudit('PsDoNothing\
    \ finished', 99999);\n    }\n}\n\n?>\n```\n\nThe code here uses the `CreateAudit`\
    \ and `MailAdmin` methods of `OrderProcessor` to generate something to show that\
    \ the code has executed correctly. Note that the numbering schemes outlined previously\
