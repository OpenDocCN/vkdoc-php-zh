    # Section 1\. Preface


    In this book, we will learn to construct a robust and efficient API architecture
    that revolves around operations. By the end of this, you will have the knowledge
    and necessary skills to build an operation-oriented API using the PHP programming
    language and the Symfony framework.


    This book is designed to provide you with a comprehensive understanding of how
    to create a single API endpoint that embraces the concept of operations. We will
    utilize the robust features of Symfony to build an environment where operations
    are the focal point of our API design.


    Please note that this book assumes a certain level of familiarity with the Symfony
    framework. It is not intended to serve as a comprehensive guide of Symfony but
    rather as a focused exploration of its powerful features for building an operation-oriented
    API.


    It’s also important to clarify that this book does not delve into the development
    of specific operations themselves. While we may use operation examples like “SendPayment”
    for illustrative purposes, the primary goal is to demonstrate how to construct
    the necessary code to discover, manage, and execute operations.


    Throughout the chapters, we will cover essential Symfony topics such as dependency
    injection features, security authentication, and background operations with Symfony
    Messenger.


    # Section 2\. CRUD API Endpoints and Operation-Oriented Endpoints


    ## CRUD-Based API Endpoints


    Developers usually build APIs using the REST approach, that is, focusing on resources.
    To expose the operations that clients can perform over those resources, we usually
    follow the CRUD acronym, which means **CREATE**, **READ**, **UPDATE**, and **DELETE**.
    Each word represents an operation, so it means that for each resource we can


    *   Create a new element


    *   Read from the resource listing the current elements


    *   Update an existing element


    *   Remove an existing element


    When we refer to a resource, we can think about a collection of elements (for
    instance, a book resource).


    When defining the resource API calls, we normally set up an HTTP endpoint for
    each CRUD operation we want to expose. Let’s see an example for a book resource:


    *   **GET** /api/v1/book


    *   **GET** /api/v1/book/{id}


    *   **POST** /api/v1/book


    *   **PATCH** /api/v1/book/{id}


    *   **DELETE** /api/v1/book/{id}


    As you can see above


    *   The **GET** endpoints perform the **READ** operations.


    *   The **POST** endpoint performs the **CREATE** operation.


    *   The **PATCH** endpoint performs the **UPDATE** operation.


    *   The **DELETE** endpoint performs the **DELETE** operation.


    This approach covers basic operations. What happens when we want to expose more
    complex operations? Let’s explore it in the next section.


    ## Operation-Oriented Endpoints


    Imagine an e-commerce API with an endpoint for orders (*api/v1/orders/{orderId}*)
    where we want to approve an order placed by a customer. With a simple PATCH request,
    you might send a payload like this:


    ```

    PATCH api/v1/orders/{orderId}

    {

    "status": "approved"

    }

    ```


    This approach works, but it doesn’t explicitly convey the intent behind the update.
    The server needs to understand that “approved” refers to approving the order,
    not just changing a generic “status” field. Approving an order may involve more
    tasks than just updating the value of the status field.


    Let’s consider the operation we want to execute as a resource. To do it, we would
    create an order operation resource that would receive the operation to perform
    and the data required to perform this operation:


    ```

    POST /api/v1/orders/operation

    {

    "operation" : "ApproveOrder",

    "data" : {

    "id" : 1559877444

    }

    }

    ```


    This is a clearer approach since the payload operation name explicitly communicates
    the purpose of the request. It helps us to go one step further and specify business
    actions through an operation endpoint. However, this approach could complicate
    the generation of API documentation since we only have a single endpoint. Let’s
    consider the following alternatives:


    ```

    POST /api/v1/operation/approve-order

    {

    "id" : 1559877444

    }

    PATCH /api/v1/orders/:id/approve-order

    ```


    The above alternatives would facilitate the creation of documentation, and at
    the same time, our API would continue to focus on the operation.


    We will see during the last section of Chapter [1](#663561_1_En_1_Chapter.xhtml)
    that we can define our endpoints in other ways while keeping our API operationally
    oriented. The way to discover, retrieve, and execute operations will be the same
    regardless of how we define our endpoints.


    This approach requires discovering the operation to be executed, obtaining the
    associated handler, and executing the operation using the data received. We will
    learn how to code it using PHP and the Symfony framework during the course of
    the book.


    ## Conclusion


    In this section, we have exposed the advantages we can take when using an operation-oriented
    approach to build our API. The next section will give us a brief guide about what
    Symfony components and backend services we are going to use before starting to
    write code.'
  trans: "\n# Apress 口袋指南\n\n*Apress 口袋指南* 系列丛书提供对整个科技行业前沿发展和实践工作的简洁总结。该系列图书篇幅较短，旨在提供易于阅读、便于吸收的快速指南，非常适合时间紧张的专业人士。\n\
    \n本系列涵盖与现代行业相关的全部主题，从安全、AI、机器学习、云计算、Web 开发、产品设计，到编程技术和商业主题等。\n\n典型主题可能包括：\n\n\
    -   针对特定主题、方法、函数或框架的简明指南\n-   专业最佳实践和行业趋势\n-   热门或新兴主题的概览\n-   行业案例研究\n-   适合学生和有兴趣进入科技行业人士的核心概念简明阐述\n\
    -   概述“必备”概念和实践的简短参考指南。\n\n有关该系列的更多信息，请访问 [`https://link.springer.com/bookseries/17385`](https://link.springer.com/bookseries/17385)。\n\
    \nISSN 3004-927X  \ne-ISSN 3004-9288  \nApress 口袋指南  \nISBN 979-8-8688-2061-8\
    \  \ne-ISBN 979-8-8688-2062-5  \n`https://doi.org/10.1007/979-8-8688-2062-5`\n\
    \n© Nacho Colomina Torregrosa 2025  \n本作品受版权保护。所有权利（无论是全部还是部分材料）均专有地由出版商授权，特别是翻译权、重印权、插图复用权、朗诵权、广播权、微缩胶片复制权或任何其他物理形式的复制权，以及信息存储与检索的传输权、电子改编权、计算机软件权，或现在已知或以后开发的类似或不同方法。在本出版物中使用通用描述性名称、注册商标、商标、服务标记等，即使没有具体声明，也不意味着这些名称不受相关保护法律和法规的约束，因此可自由使用。出版商、作者和编辑假定本书中的建议和信息在出版之日是真实和准确的。出版商、作者或编辑均不对其中包含的材料或可能存在的任何错误或遗漏提供明示或暗示的保证。对于已出版地图和机构隶属关系中的管辖权主张，出版商保持中立。\n\
    \n本 Apress 印记由隶属于 Springer Nature 的注册公司 APress Media, LLC 出版。\n\n注册公司地址为：1 New\
    \ York Plaza, New York, NY 10004, U.S.A.\n\n# 第 1 节 前言\n\n在本书中，我们将学习构建一个围绕操作（operations）的稳健且高效的\
    \ API 架构。学完本书，你将掌握使用 PHP 编程语言和 Symfony 框架构建面向操作的 API 所需的知识和必要技能。\n\n本书旨在让你全面理解如何创建一个拥抱操作概念的单一\
    \ API 端点。我们将利用 Symfony 的强大功能来构建一个以操作为 API 设计焦点的环境。\n\n请注意，本书假定你对 Symfony 框架有一定程度的熟悉。本书并非旨在作为\
    \ Symfony 的全面指南，而是专注于探索其构建面向操作的 API 的强大功能。\n\n同样重要的是要明确，本书不涉及具体操作本身的开发。虽然我们可能会使用像`SendPayment`这样的操作示例进行说明，但主要目标是演示如何构建必要的代码来发现、管理和执行操作。\n\
    \n在后续章节中，我们将涵盖一系列关键的 Symfony 主题，例如依赖注入功能、安全认证以及使用 Symfony Messenger 处理的后台操作。\n\
    \n# 第 2 节 CRUD API 端点与面向操作的端点\n\n## 基于 CRUD 的 API 端点\n\n开发者通常使用 REST 方法构建 API，即专注于资源。为了公开客户端可以对资源执行的操作，我们通常遵循\
    \ CRUD 首字母缩写，即**CREATE**（创建）、**READ**（读取）、**UPDATE**（更新）和**DELETE**（删除）。每个词代表一种操作，这意味着对于每个资源，我们可以：\n\
    \n-   创建一个新元素\n-   读取资源列表，列出当前元素\n-   更新一个现有元素\n-   删除一个现有元素\n\n当我们提到资源时，可以将其视为元素的集合（例如，图书资源）。\n\
    \n在定义资源 API 调用时，我们通常为要公开的每个 CRUD 操作设置一个 HTTP 端点。让我们看一个图书资源的例子：\n\n-   **GET**\
    \ `/api/v1/book`\n-   **GET** `/api/v1/book/{id}`\n-   **POST** `/api/v1/book`\n\
    -   **PATCH** `/api/v1/book/{id}`\n-   **DELETE** `/api/v1/book/{id}`\n\n如上所示：\n\
    \n-   **GET**端点执行**READ**操作。\n-   **POST**端点执行**CREATE**操作。\n-   **PATCH**端点执行**UPDATE**操作。\n\
    -   **DELETE**端点执行**DELETE**操作。\n\n这种方法涵盖了基本操作。当我们想要公开更复杂的操作时会发生什么？让我们在下一节中探讨。\n\
    \n## 面向操作的端点\n\n想象一个电子商务 API，它有一个用于订单的端点（`api/v1/orders/{orderId}`），我们希望在此处批准客户下的订单。通过一个简单的\
    \ PATCH 请求，你可以发送如下的负载：\n\n```\nPATCH api/v1/orders/{orderId}\n{\n\"status\": \"\
    approved\"\n}\n```\n\n这种方法可行，但它没有明确传达更新背后的意图。服务器需要理解`approved`指的是批准订单，而不仅仅是更改一个通用的`status`字段。批准订单可能涉及比仅更新`status`字段值更多的任务。\n\
    \n让我们考虑将要执行的操作本身视为一个资源。为此，我们将创建一个订单操作资源，该资源会接收要执行的操作以及执行此操作所需的数据：\n\n```\nPOST\
    \ /api/v1/orders/operation\n{\n\"operation\" : \"ApproveOrder\",\n\"data\" : {\n\
    \"id\" : 1559877444\n}\n}\n```\n\n这是一种更清晰的方法，因为负载中的操作名称明确传达了请求的目的。它帮助我们更进一步，通过操作端点指定业务操作。然而，由于我们只有一个端点，这种方法可能会使\
    \ API 文档的生成变得复杂。让我们考虑以下替代方案：\n\n```\nPOST /api/v1/operation/approve-order\n{\n\
    \"id\" : 1559877444\n}\nPATCH /api/v1/orders/:id/approve-order\n```\n\n上述替代方案将有助于创建文档，同时，我们的\
    \ API 将继续聚焦于操作。\n\n在第一章的最后一部分，我们将看到如何以其他方式定义我们的端点，同时保持 API 面向操作。无论我们如何定义端点，发现、检索和执行操作的方式都是相同的。\n\
    \n这种方法需要发现要执行的操作，获取相关的处理器，并使用接收到的数据执行该操作。在本书的课程中，我们将学习如何使用 PHP 和 Symfony 框架对其进行编码。\n\
    \n## 结论\n\n在本节中，我们展示了在构建 API 时采用面向操作的方法可以带来的优势。下一节将简要介绍在开始编写代码之前我们将使用哪些 Symfony\
    \ 组件和后端服务。\n"
- fmt: '# Section 3. Prerequisites


    This section offers a concise overview of the Symfony components and backend services
    that will be utilized in the upcoming chapters, along with instructions for their
    installation.


    The code of this book has been written using the PHP 8.3 version and the Symfony
    version 7.3.


    ## Symfony Components


    ### Symfony Serializer Pack


    The Symfony Serializer Component provides a simple and efficient way to serialize
    and deserialize data. It allows us to convert PHP data structures, such as arrays
    and objects, into a format that can be easily stored or transmitted, such as JSON
    or XML. In the same way, this component also allows us to deserialize raw data
    (JSON, XML) into PHP classes. We will need this component to deserialize API inputs
    and serialize API outputs.


    ### Symfony Validator


    The Symfony Validator component provides a way to validate data. It allows you
    to define rules and constraints for your data and then checks if the data conforms
    to those rules. The component provides a wide range of built-in validators, such
    as checks for email addresses, URLs, and credit card numbers, as well as more
    complex validation logic.


    We will need this component to validate the required data to execute an operation
    so that we can avoid errors during the execution.


    ### Symfony Security


    The Symfony Security Component provides a set of tools for handling authentication,
    authorization, and other security-related tasks in Symfony applications. With
    features such as user authentication, access control, and firewall configuration,
    the Security Component helps developers implement robust security measures to
    protect their applications from unauthorized access and potential security threats.


    We will use this component in Chapter 2 to create a firewall to protect our API
    endpoint and we will also use voters to authorize operations to certain users
    based, for instance, on their roles.


    ### Symfony Messenger


    The Symfony Messenger Component simplifies the process of sending and receiving
    messages within Symfony applications. It enables developers to decouple application
    logic by using message buses, handlers, and transports to handle message processing
    asynchronously. By leveraging the Messenger Component, developers can streamline
    communication between different parts of their application, improving scalability
    and maintainability.


    We will use this component in Chapter 3 to execute operations in the background.
    Furthermore, we also need to install the corresponding messenger transport package
    depending on which we are going to use. In this book, we are using Redis as a
    routing transport, so we will need to install the `redis-messenger` package too.
    We will also need to install the `doctrine-messenger` component since we will
    route the failed operations to a doctrine transport.


    ### Symfony ORM Pack


    The Symfony Doctrine Component is a powerful tool that integrates the Doctrine
    ORM (Object-Relational Mapping) library into Symfony applications. This component
    simplifies database interactions by mapping database tables to PHP objects, allowing
    developers to work with database records as if they were regular PHP objects.
    With features such as entity mapping, query building, and database migrations,
    the Symfony Doctrine Component provides a robust and efficient way to manage database
    operations within Symfony applications.


    We need this component since we are going to create a `User` entity in Chapter
    2 to store the users who will be able to access our API. We will also need it
    in Chapter 3 because we will route failed operations to a doctrine transport.


    ### Symfony Doctrine Fixtures Bundle


    The Symfony Doctrine Fixtures Bundle is a tool that allows developers to easily
    manage and load sample data into a Symfony application’s database. It provides
    a way to create and execute data fixtures, which are Symfony services that define
    the sample data to be loaded into the database. We need these services to load
    users to our `User` entity.


    ### Symfony String


    The Symfony String component provides a set of useful classes and functions for
    working with strings in PHP. The component includes classes for manipulating strings,
    such as trimming, padding, and splitting, as well as classes for working with
    URLs, inflectors, and slugifiers.


    We will use this component in the last section of Chapter 1 to camelize an operation
    name.


    ### Symfony Maker Bundle


    The Symfony Maker Bundle is a developer-friendly tool that automates the creation
    of common Symfony elements, such as controllers, entities, forms, and more. We
    will use this component to generate the `User` entity and to generate the API
    tests in the last chapter.


    ### Symfony Rate Limiter


    The Symfony Rate Limiter component allows developers to control the rate of requests
    made to an application. It helps prevent abuse by limiting the number of requests
    a user can make within a specific time frame. This component provides a flexible
    and customizable way to implement rate-limiting strategies, such as frame window
    and token bucket, to ensure system stability and security.


    To install this component, we will have to install the Symfony Lock component
    too.


    ### Symfony Test-Pack


    The Symfony Test Pack is a component that integrates the PhpUnit test tool and
    provides a set of tools and utilities to help you write and run tests for your
    Symfony-based applications. It includes a range of features such as a test client,
    a profiler, and a set of assertions to make testing easier and more efficient.
    We will need this component so that we can write the API tests in the last chapter.


    ## Installing Composer


    Before creating the Symfony project, we must install Composer. Composer is the
    most commonly used PHP package manager, and it is required to create the project
    and to install the Symfony components. To download and install it, refer to the
    official docs.


    ## Creating the Symfony Project


    We will need to install the `symfony-cli` tool to create a new Symfony project.
    Follow the official download Symfony docs to install it. After installing, we
    are ready to create the project. To do it, we must execute the following command
    within a folder of your choice.


    ```

    symfony new  --version="7.3.*"

    ```


    The above command should create the basic folder structure and install the framework-required
    libraries.


    ## Installing the Components


    After having the project created, we have to install the components we have talked
    about in the previous sections. To install it, you must use composer:


    ```

    composer require symfony/messenger

    composer require symfony/redis-messenger

    composer require symfony/doctrine-messenger

    composer require symfony/orm-pack

    composer require symfony/security-bundle

    composer require --dev symfony/maker-bundle

    composer require --dev orm-fixtures

    composer require symfony/lock

    composer require symfony/rate-limiter

    composer require symfony/string

    composer require --dev symfony/test-pack

    ```


    After installing the test component, ensure PhpUnit has been installed by running
    the following command: `bin/phpunit` from the project root folder.'
  raw: '# Section 3\. Prerequisites


    This section offers a concise overview of the Symfony components and backend services
    that will be utilized in the upcoming chapters, along with instructions for their
    installation.


    The code of this book has been written using the PHP 8.3 version and the Symfony
    version 7.3.


    ## Symfony Components


    ### Symfony Serializer Pack


    The Symfony Serializer Component provides a simple and efficient way to serialize
    and deserialize data. It allows us to convert PHP data structures, such as arrays
    and objects, into a format that can be easily stored or transmitted, such as JSON
    or XML. In the same way, this component also allows us to deserialize raw data
    (JSON, XML) into PHP classes. We will need this component to deserialize API inputs
    and serialize API outputs.


    ### Symfony Validator


    The Symfony Validator component provides a way to validate data. It allows you
    to define rules and constraints for your data and then checks if the data conforms
    to those rules. The component provides a wide range of built-in validators, such
    as checks for email addresses, URLs, and credit card numbers, as well as more
    complex validation logic.


    We will need this component to validate the required data to execute an operation
    so that we can avoid errors during the execution.


    ### Symfony Security


    The Symfony Security Component provides a set of tools for handling authentication,
    authorization, and other security-related tasks in Symfony applications. With
    features such as user authentication, access control, and firewall configuration,
    the Security Component helps developers implement robust security measures to
    protect their applications from unauthorized access and potential security threats.


    We will use this component in Chapter [2](#663561_1_En_2_Chapter.xhtml) to create
    a firewall to protect our API endpoint and we will also use voters to authorize
    operations to certain users based, for instance, on their roles.


    ### Symfony Messenger


    The Symfony Messenger Component simplifies the process of sending and receiving
    messages within Symfony applications. It enables developers to decouple application
    logic by using message buses, handlers, and transports to handle message processing
    asynchronously. By leveraging the Messenger Component, developers can streamline
    communication between different parts of their application, improving scalability
    and maintainability.


    We will use this component in Chapter [3](#663561_1_En_3_Chapter.xhtml) to execute
    operations in the background. Furthermore, we also need to install the corresponding
    messenger transport package depending on which we are going to use. In this book,
    we are using Redis as a routing transport, so we will need to install the redis-messenger
    package too. We will also need to install the doctrine-messenger component since
    we will route the failed operations to a doctrine transport.


    ### Symfony ORM Pack


    The Symfony Doctrine Component is a powerful tool that integrates the Doctrine
    ORM (Object-Relational Mapping) library into Symfony applications. This component
    simplifies database interactions by mapping database tables to PHP objects, allowing
    developers to work with database records as if they were regular PHP objects.
    With features such as entity mapping, query building, and database migrations,
    the Symfony Doctrine Component provides a robust and efficient way to manage database
    operations within Symfony applications.


    We need this component since we are going to create a **User** entity in Chapter
    [2](#663561_1_En_2_Chapter.xhtml) to store the users who will be able to access
    our API. We will also need it in Chapter [3](#663561_1_En_3_Chapter.xhtml) because
    we will route failed operations to a doctrine transport.


    ### Symfony Doctrine Fixtures Bundle


    The Symfony Doctrine Fixtures Bundle is a tool that allows developers to easily
    manage and load sample data into a Symfony application’s database. It provides
    a way to create and execute data fixtures, which are Symfony services that define
    the sample data to be loaded into the database. We need these services to load
    users to our **User** entity.


    ### Symfony String


    The Symfony String component provides a set of useful classes and functions for
    working with strings in PHP. The component includes classes for manipulating strings,
    such as trimming, padding, and splitting, as well as classes for working with
    URLs, inflectors, and slugifiers.


    We will use this component in the last section of Chapter [1](#663561_1_En_1_Chapter.xhtml)
    to camelize an operation name.


    ### Symfony Maker Bundle


    The Symfony Maker Bundle is a developer-friendly tool that automates the creation
    of common Symfony elements, such as controllers, entities, forms, and more. We
    will use this component to generate the **User** entity and to generate the API
    tests in the last chapter.


    ### Symfony Rate Limiter


    The Symfony Rate Limiter component allows developers to control the rate of requests
    made to an application. It helps prevent abuse by limiting the number of requests
    a user can make within a specific time frame. This component provides a flexible
    and customizable way to implement rate-limiting strategies, such as frame window
    and token bucket, to ensure system stability and security.


    To install this component, we will have to install the Symfony Lock component
    too.


    ### Symfony Test-Pack


    The Symfony Test Pack is a component that integrates the [PhpUnit](https://phpunit.de/index.html)
    test tool and provides a set of tools and utilities to help you write and run
    tests for your Symfony-based applications. It includes a range of features such
    as a test client, a profiler, and a set of assertions to make testing easier and
    more efficient. We will need this component so that we can write the API tests
    in the last chapter.


    ## Installing Composer


    Before creating the Symfony project, we must install Composer. Composer is the
    most commonly used PHP package manager, and it is required to create the project
    and to install the Symfony components. To download and install it, refer to the
    [official docs](https://getcomposer.org/doc/00-intro.md%2523installation-linux-unix-macos).


    ## Creating the Symfony Project


    We will need to install the **symfony-cli** tool to create a new Symfony project.
    Follow the [official download Symfony docs](https://symfony.com/download) to install
    it. After installing, we are ready to create the project. To do it, we must execute
    the following command within a folder of your choice.


    ```

    symfony new  --version="7.3.*"

    ```


    The above command should create the basic folder structure and install the framework-required
    libraries.


    ## Installing the Components


    After having the project created, we have to install the components we have talked
    about in the previous sections. To install it, you must use composer:


    ```

    composer require symfony/messenger

    composer require symfony/redis-messenger

    composer require symfony/doctrine-messenger

    composer require symfony/orm-pack

    composer require symfony/security-bundle

    composer require --dev symfony/maker-bundle

    composer require --dev orm-fixtures

    composer require symfony/lock

    composer require symfony/rate-limiter

    composer require symfony/string

    composer require --dev symfony/test-pack

    ```


    After installing the test component, ensure PhpUnit has been installed by running
    the following command: *bin/phpunit* from the project root folder.'
  trans: '

    # 第 3 节 前置条件


    本节概述了后续章节将用到的 Symfony 组件和后端服务，以及它们的安装说明。


    本书的代码基于 PHP 8.3 版本和 Symfony 7.3 版本编写。


    ## Symfony 组件


    ### Symfony Serializer Pack


    Symfony Serializer 组件提供了一种简单高效的数据序列化与反序列化方式。它允许我们将 PHP 数据结构（如数组和对象）转换为易于存储或传输的格式（如
    JSON 或 XML）。同样，该组件也允许我们将原始数据（JSON、XML）反序列化为 PHP 类。我们将需要此组件来反序列化 API 输入并序列化 API
    输出。


    ### Symfony Validator


    Symfony Validator 组件提供了一种数据验证方式。它允许您为数据定义规则和约束，然后检查数据是否符合这些规则。该组件提供了大量内置验证器，例如对电子邮件地址、URL
    和信用卡号的检查，以及更复杂的验证逻辑。


    我们将需要此组件来验证执行操作所需的数据，从而避免在执行过程中出错。


    ### Symfony Security


    Symfony Security 组件提供了一套工具，用于处理 Symfony 应用程序中的身份验证、授权和其他安全相关任务。该组件具有用户身份验证、访问控制和防火墙配置等功能，可帮助开发者实施强大的安全措施，以保护其应用程序免受未经授权的访问和潜在安全威胁。


    我们将在第 2 章中使用此组件来创建防火墙以保护 API 端点，同时还将使用投票器（voters）根据用户角色等条件授权特定用户执行操作。


    ### Symfony Messenger


    Symfony Messenger 组件简化了在 Symfony 应用程序中发送和接收消息的过程。它使开发者能够通过使用消息总线、处理器和传输机制来异步处理消息，从而实现应用逻辑的解耦。通过利用
    Messenger 组件，开发者可以简化应用程序不同部分之间的通信，提高可扩展性和可维护性。


    我们将在第 3 章中使用此组件在后台执行操作。此外，我们还需要根据实际使用的传输方式安装相应的 Messenger 传输包。本书使用 Redis 作为路由传输，因此我们还需要安装
    `redis-messenger` 包。由于我们需要将失败的操作路由到 Doctrine 传输，因此还需要安装 `doctrine-messenger` 组件。


    ### Symfony ORM Pack


    Symfony Doctrine 组件是一个强大的工具，它将 Doctrine ORM（对象关系映射）库集成到 Symfony 应用程序中。该组件通过将数据库表映射到
    PHP 对象来简化数据库交互，使开发者能够像处理普通 PHP 对象一样处理数据库记录。该组件具有实体映射、查询构建和数据库迁移等功能，为在 Symfony
    应用程序中管理数据库操作提供了一种强大且高效的方式。


    我们需要此组件，因为将在第 2 章创建一个 `User` 实体来存储能够访问我们 API 的用户。在第 3 章中也需要它，因为我们将把失败的操作路由到 Doctrine
    传输。


    ### Symfony Doctrine Fixtures Bundle


    Symfony Doctrine Fixtures Bundle 是一个工具，允许开发者轻松管理并将样本数据加载到 Symfony 应用程序的数据库中。它提供了一种创建和执行数据夹具的方式，这些夹具是定义要加载到数据库中的样本数据的
    Symfony 服务。我们需要这些服务来向 `User` 实体加载用户数据。


    ### Symfony String


    Symfony String 组件提供了一套用于在 PHP 中处理字符串的有用类和函数。该组件包含用于操作字符串的类（如修剪、填充和分割），以及用于处理 URL、词形变化器和
    Slug 生成器的类。


    我们将在第 1 章的最后一个部分使用此组件来驼峰化操作名称。


    ### Symfony Maker Bundle


    Symfony Maker Bundle 是一个对开发者友好的工具，它可以自动创建常见的 Symfony 元素，例如控制器、实体、表单等。我们将使用此组件生成
    `User` 实体，并在最后一章生成 API 测试。


    ### Symfony Rate Limiter


    Symfony Rate Limiter 组件允许开发者控制向应用程序发出的请求速率。它通过限制用户在特定时间范围内可以发出的请求数量来帮助防止滥用。该组件提供了一种灵活且可定制的方式来实现限流策略（如窗口限流和令牌桶），以确保系统的稳定性和安全性。


    要安装此组件，我们还需要同时安装 Symfony Lock 组件。


    ### Symfony Test-Pack


    Symfony Test Pack 是一个集成 PhpUnit 测试工具的组件，提供了一套工具和实用程序来帮助您为基于 Symfony 的应用程序编写和运行测试。它包含测试客户端、分析器以及一系列断言等功能，使测试更加轻松高效。我们需要此组件以便在最后一章编写
    API 测试。


    ## 安装 Composer


    在创建 Symfony 项目之前，我们必须安装 Composer。Composer 是最常用的 PHP 包管理器，创建项目和安装 Symfony 组件都需要它。若要下载并安装它，请参考官方文档。


    ## 创建 Symfony 项目


    我们将需要安装 `symfony-cli` 工具来创建新的 Symfony 项目。请按照 Symfony 官方下载文档进行安装。安装完成后，我们就可以创建项目了。为此，需要在您选择的文件夹中执行以下命令。


    ```

    symfony new  --version="7.3.*"

    ```


    上述命令应会创建基本的文件夹结构并安装框架所需的库。


    ## 安装组件


    创建项目后，我们需要安装之前小节中讨论的组件。要安装它们，您必须使用 composer：


    ```

    composer require symfony/messenger

    composer require symfony/redis-messenger

    composer require symfony/doctrine-messenger

    composer require symfony/orm-pack

    composer require symfony/security-bundle

    composer require --dev symfony/maker-bundle

    composer require --dev orm-fixtures

    composer require symfony/lock

    composer require symfony/rate-limiter

    composer require symfony/string

    composer require --dev symfony/test-pack

    ```


    安装测试组件后，通过从项目根文件夹运行以下命令来确保 PhpUnit 已安装：`bin/phpunit`。

