    **14** CHAPTER 2 ■ SETTING UP THE APPLICATION FRAMEWORK


    ■**Note** You will need sufficient permissions to create this directory structure.
    You may instead prefer to keep the code for this book in your home directory.
    I chose to use `/var/www` since it is a commonly used area on web servers to hold
    web sites, and it is short and easy to refer back to when required. (On a typical
    Windows setup, you won’t need any special permissions to create the required directories.)


    ## Installing the Zend Framework


    The Zend Framework is an open-source library of PHP 5 components that can be used
    to solve tasks that commonly arise in everyday web development. It is actively
    contributed to by a large number of developers, and it is backed by Zend (the
    company that writes the Zend Engine, which has powered PHP since PHP 4). We will
    be using this framework in our application, as it allows us to focus on developing
    a Web 2.0 application, rather than getting bogged down in the details of building
    an entire application infrastructure.


    These are some of the components we will be using:


    - `Zend_Auth` and `Zend_Acl`: Used to authenticate users when they try to log
    in and to check their permissions (see Chapter 3)

    - `Zend_Controller`: Used to handle client requests and direct the requests to
    the appropriate classes (see later this chapter)

    - `Zend_Db`: Used to interact with the application MySQL database

    - `Zend_Mail`: Used to send e-mails to users

    - `Zend_Validate` and `Zend_Filter`: Used to check and sanitize user-submitted
    data in forms

    - `Zend_Search`: Used for full-text searching


    We will use more components, but, as you can see, we will be making heavy use
    of the framework.


    Download the Zend Framework from [http://framework.zend.com](http://framework.zend.com).
    In this book, I used version 1.0.2, but you should use the most up-to-date version
    available. Use these commands to extract the library to the `include` directory:


    ```

    # cd /var/www/phpweb20

    # wget http://framework.zend.com/releases/ZendFramework-1.0.2/ZendFramework-1.0.2.tar.gz

    # tar -zxf ZendFramework-1.0.2.tar.gz

    # mv ZendFramework-1.0.2/library/Zend include

    ```


    The last command moves the actual library files from the extracted archive into
    the application directory. The additional files in the archive include documentation
    and unit testing and are not really required. You may wish to remove the downloaded
    files once you have installed the framework, as they are no longer needed.


    ---


    ## Configuring the Web Server


    A typical development setup is to use your normal computer (such as your Windows
    or Mac OS machine) to write your code, while running the web server on another
    server. In such a case, you need to access the web server over a network. For
    example, I use a Windows machine for my day-to-day work, while my web server is
    a FreeBSD machine elsewhere in the office.


    ■**Tip** I aim to keep my development web server configured identically to my
    production server, as this helps to eliminate any unforeseeable issues that may
    arise when deploying my code (such as different versions of linked libraries).


    For the purposes of this book, I assume the web application is accessible using
    the web address [http://phpweb20](http://phpweb20). In order to access my web
    server using this hostname, I make a fake DNS entry in my Windows host file so
    my browser will resolve the `phpweb20` hostname to `192.168.0.80`. This is the
    entry I add in my Windows hostname file (`c:\windows\system32\drivers\etc\hosts`
    in Windows XP):


    ```

    192.168.0.80 phpweb20

    ```


    ■**Note** Setting up a host as described here is not related to the development
    of the web application, but rather allows you to access it in your web browser.
    Creating fake hostnames is a simple trick for development purposes, eliminating
    the need for a DNS server or a real domain. Once you deploy your application live,
    you will need to use a real hostname so other people can access your web site.


    If you have control over a real DNS server, you may instead prefer to create your
    own hostname. (Just keep in mind that I continually refer to `phpweb20` throughout
    this book.)


    ■**Note** You could use IP-based hosting, which would allow you to simply access
    [http://192.168.0.80](http://192.168.0.80). Since name-based hosting in Apache
    is arguably the most common setup, I’ve chosen instead to use the method described
    previously (that is, setting up a fake hostname). Obviously, using a real hostname
    is better, but I’ve tried to simplify matters by not requiring it for this book.


    ### Creating a Virtual Host in Linux


    To configure the web server, we must first create the `<VirtualHost>` entry for
    Apache. I like to store this configuration data in its own file within my application
    directory, and then use the `Include` directive from the main Apache `httpd.conf`
    file. This means changes can be made to the local configuration, and the main
    configuration will pick up the changes automatically when the server is restarted.
    Listing 2-1 shows the contents of the `/var/www/phpweb20/httpd.conf` file.


    **Listing 2-1.** *Virtual Host Configuration for Apache on Linux (httpd.conf)*


    ```

    <VirtualHost 192.168.0.80>

    ServerName phpweb20

    DocumentRoot /var/www/phpweb20/htdocs

    <Directory /var/www/phpweb20/htdocs>

    AllowOverride All

    Options All

    </Directory>

    php_value include_path .:/var/www/phpweb20/include:/usr/local/lib/pear

    php_value magic_quotes_gpc off

    php_value register_globals off

    </VirtualHost>

    ```


    In your main `httpd.conf` file (commonly found in `/usr/local/apache2/conf/httpd.conf`
    for a default Linux install), you would add the following line:


    ```

    Include /var/www/phpweb20/httpd.conf

    ```'
