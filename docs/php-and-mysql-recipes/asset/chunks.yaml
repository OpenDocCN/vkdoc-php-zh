    Recipe 16-5\. Updating Data


    Problem


    Adding new records or rows to a table is not the only operation users might want
    to have. How can we create a method that can update one or more columns in a table?


    Solution


    In SQL the update statement can be used to update one or more columns of one or
    more rows in the table.


    Like insert statements update statements work on a single table. If it’s necessary
    to update records in multiple tables, multiple updates statements are needed.


    The structure of an update statement starts by identifying the table to update,
    followed by a comma separated list of column names and values and finally a where
    clause that identifies the rows to update. If the where clause is omitted the
    update statement will make the update to all rows in the table.


    Identifying the primary key in the where clause is the easiest way to update a
    single record but it’s possible to use other values to identify the row(s) to
    update.


    CHAPTER 16 ■ USING MYSQL DATABASES


    How it Works


    The following code section is an example of a method called updateAlbum() for
    the music class. This method takes two parameters. The first one is the id column
    that identifies the row to update and the second is an array of values, similar
    to the values returned from the getAlbum() method.


    function updateAlbum($id, $data = []) {


    $schema = [


    "id" => "int",


    "title" => "char",


    "artist_id" => "int",


    "description" => "char",


    ];


    $columns = [];


    foreach($data as $k => $v) {


    if (array_key_exists($k, $schema)) {


    if (is_null($v)) {


    $column[] = "$k = NULL";


    }


    else {


    switch($schema[$k]) {


    "int" :


    $column[] = "$k = " . (int)$v;


    break;


    "char" :


    $column[] = "$k = ''" . $this->real_escape_string($v) ."''"; break;


    }


    }


    }


    }


    if (sizeof($columns)) {


    $sql = "update album set " . implode(", ", $columns) .


    " where id = $id;";


    $this->Query($sql);


    }


    }


    The function includes a schema definition. This is used to validate the content
    of the $data variable.


    Any value that is not found in the $schema definition will be ignored. This will
    eliminate SQL errors if the user were to update a nonexisting column. The schema
    also defines the types of the columns, allowing the code to perform the correct
    type casting.


    The schema definition does not include column length or other restrictions that
    could be used for additional validation. This would be easy to add as additional
    parameters in the schema definition.


    This function could be made a more generic by adding a private method that includes
    parameters for table name and the schema definition. This can then be used to
    add a method to update both the album and artist tables.


    CHAPTER 16 ■ USING MYSQL DATABASES


    Both of these tables use the same type of primary key. In both cases it’s an integer
    value that is incremented automatically. It is always a good idea to use a private
    key without any real information, especially if the primary key is used as a foreign
    key reference. Changing the value of such a key would require changing the value
    in all tables that references it. If the key is without any value there is never
    any reason to change it.


