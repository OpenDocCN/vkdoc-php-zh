  trans: "\n通过让辅助器更多特性能在配置文件等区域中编辑，或在视图中通过参数自定义，可以使其更具可移植性，最终也更为实用。\n\n## 投票标签\n\n\
    清单 9-11 展示了如何用来自 `tags.php` 文件的投票标签替换 `$blog->voteUpLink()` 函数中的 `$text` 参数。在此练习中，请对\
    \ `$blog->voteDownLink()` 函数执行相同操作。你也可以寻找其他方式，为 `$blog->comments()` 函数生成其他标签。请参考\
    \ PHP 手册中关于 `sprintf()` 函数的说明，以扩展你自定义标签的功能。\n\n## 总结\n\n本章探讨了 Cake 的内置辅助器。大多数\
    \ Cake 应用程序中使用的两个辅助器是 HTML 辅助器和表单辅助器。它们共同简化了 HTML 渲染和表单处理。得益于表单辅助器，传递用户表单提交变得简单，并为控制器和模型提供了处理数据的标准化方法。Cake\
    \ 中还有其他几个可用的辅助器。本章概述了这些辅助器及其包含的功能。很多时候，你需要创建自己的自定义辅助器。我展示了如何为你的博客应用程序编写一个辅助器，用于渲染视图的评论。\n\
    \n通过使用这个辅助器，你可以将视图中的代码量减少到几个字符串。\n\n自定义辅助器变量是扩展辅助器功能的一种方式。本章还解释了如何提供一组输出变量，使辅助器更具可移植性。在第\
    \ 10 章中，你将转向 Cake 的路由，并研究如何为你的应用程序自定义 URL 结构。\n\n# 第 10 章\n\n## 路由\n\n**在**开箱即用的情况下，Cake\
    \ 会拦截所有 URL，并将它们映射到相应的控制器和操作。这是框架的一个出色特性，可加快应用程序开发速度。与在 URL 中使用长字符串传递变量，或创建数十个独立脚本处理应用程序中每个函数不同，Cake\
    \ 的路由系统管理所有请求，正如你在前几章看到的那样。但是，如何自定义路由方案呢？或者，如果你想生成非 HTML 文件，例如 PDF、RSS 源或某种 XML\
    \ 输出呢？还有搜索引擎优化怎么办？出于这些目的，Cake 的路由功能将消除映射 URL、处理动态请求以及自定义应用程序路径和 URL 结构带来的麻烦。\n\
    \n几乎所有主要的路由操作都将在 `app/config/routes.php` 文件中进行。所有路由及其配置都存储在此文件中，并使用特定的语法。一些默认路由（用于处理主要\
    \ URL）已写入 `routes.php` 文件。默认情况下，Cake 会解析斜杠之间列出的传递值，并推导出指向控制器和操作的路径，以及将参数传递给这些操作。通过使用魔术变量、参数、扩展名、参数和其他特性，你可以完全操控路由以适应你的应用程序，同时仍然保持\
    \ MVC 结构。\n\n**注意** 请记住，`routes.php` 页面是级联的，这意味着路由的顺序很重要。如果 Cake 通过一个路由解析了 URL，它将立即在此结束，而不会继续检查页面下方的其他路由。虽然这通常不会影响整个应用程序，但如果你在处理同一控制器或操作中的更复杂路由时，它可能会产生影响。\n\
    \n### 基本路由\n\n正如你在默认的 `routes.php` 配置文件中看到的，基本路由通过 `Router::connect()` 函数调用，该函数带有一个路径以及一个存储路由参数的数组：\n\
    \n`Router::connect('/', array('controller' => 'pages', 'action' => 'display',\
    \ 'home'));`\n\n上一行是应用程序的基本路由。它将 URL 元素连接到 Pages 控制器的 Display 操作，并发送值 `home` 作为可在操作中使用的参数。通过指定另一个控制器和操作，你可以更改基本路由，从而使默认首页不再是\
    \ Pages 控制器的 Display 操作。\n\n`Router::connect()` 函数中的第一个值是路由引擎接收到的路径。如果路径验证通过，则将调用参数数组，用户将被带到数组中指定的任何位置。看待此路径的另一种方式是将其视为一个\
    \ if-then 语句；如果输入的 URL 没有参数，只有基本 URL，则将值 `home` 传递给 Pages 控制器中的 Display 操作。你可以手动指定值，或使用占位符来接受该\
    \ URL 参数的所有可能值：\n\n`Router::connect('/articles/*', array('controller'=>'posts','action'=>'index'));`\n\
    \n上一行显示了一种连接到博客应用程序中 Posts 控制器的新方法。通过在路径中使用星号，你本质上是在告诉路由器接受并传递它在单词 `articles`\
    \ 之后找到的任何内容。与基本路径示例一样，该路径将被像 if-then 语句一样测试：如果提供的 URL 以单词 `articles` 开头，则将 URL\
    \ 中的后续内容传递给 Posts 控制器。默认情况下，将调用 Index 操作。你基本上为 Posts 控制器构造了一个别名。\n\n现在，如果你愿意，你可以将所有指向\
    \ Posts 控制器的链接输入为指向 Articles 控制器。\n\n### 参数\n\n传统上，在 PHP 中为请求变量赋值是通过使用参数构建序列化字符串来完成的：\n\
    \n`http://localhost/script.php?variable=value&another_var=another_val`\n\n在前面的代码中，字符串中的参数是\
    \ `variable` 和 `another_var`。当控制器操作与各种参数和可能的参数组合交互时，可能有必要以不同于 Cake 默认路由模式的方式构造\
    \ URL 字符串。\n\n路由器中的参数以冒号后跟一个值的形式出现在 URL 中：\n\n`http://localhost/blog/posts/view/id:5/set:2`\n\
    \n在前面的代码中，参数是 `id` 和 `set`，它们的值分别是 `5` 和 `2`。通常，这个例子最好在视图中不带参数进行管理，即只使用值。但是，当操作使用诸如\
    \ Paginator 之类的组件时，可能需要传递参数以使组件正常工作。例如，对于 Paginator，正常的 Cake URL 默认指向数据集的第一页。但是通过向字符串添加参数，Paginator\
    \ 能够检索数据集的另一页：\n\n`http://localhost/blog/posts/index/page:2/sort:id/direction:asc`\n\
    \n传递的参数包含在 `passedArgs` 数组中。前面的字符串将像这样存储值：\n\n```\n$this->passedArgs = Array(\n\
    \    'page'=>2,\n    'sort'=>'id',\n    'direction'=>'asc'\n);\n```\n\n参数作为键值对传递到此数组中的控制器，除非在\
    \ `routes.php` 配置文件中被绕过。\n\n参数的一个重要用途是作为 Cake 向操作传递变量的方式。请注意，因为路由器已在 URL 字符串中找到了参数，所以它不会将它们作为变量传递给操作。\n"
- fmt: "# 路由（Routes）\n\n## 传递参数（Passed Arguments）\n\n[http://localhost/blog/posts/view/5/comments:false](http://localhost/blog/posts/view/5/comments:false)\n\
    \n上述 URL 中，第二个参数（`comments:false`）*不会*像第一个参数那样被传递给动作（action）：\n\n```\nfunction\
    \ view($id=null) {\n    $displayComments = $this->passedArgs['comments'];\n  \
    \  ...\n}\n```\n\n典型的动作参数与传递参数（passed arguments）之间的这种区别，在控制器中构建方法时会产生影响。动作可以在没有任何传递参数的情况下正常执行，根据动作的具体需求，这可能是一个重要的选项。\n\
    \n## 反向路由（Reverse Routing）\n\nWeb 应用程序已开始倾向于使用友好的 URL，而非复杂的 URL 字符串。例如，`[www.site.com/cart/item/race_car](http://www.site.com/cart/item/race_car)`\
    \ 就比 `www.site.com/index.php?page=cart&item=race_car` 更好。这种做法不仅是为了搜索引擎优化或让应用程序对用户更友好，也是为了便于对应用的整体路由进行简单修改。试想，如果一个\
    \ Web 应用程序构建在 GET 变量之上，那么要彻底改造其整个路由结构将非常困难。在维护旧 URL 的同时实现新 URL，将面临许多新问题。\n\n这在很大程度上取决于应用程序本身，但通常需要添加一些额外的函数来实现\
    \ URL 的反向解析。\n\n## 查找（Lookups）\n\n默认情况下，URL 查找是单向地通过路由器进行的，这意味着当点击一个链接时，路由器会执行查找，并映射出相应的控制器、动作和参数。输入\
    \ `/posts/view/17` 将导致路由器查找 `Posts` 控制器的 `View` 动作在应用程序中的位置，并将参数传递给它。但是，反向查找又如何呢？假设你想要编写一个链接，并让路由器查找如何构造这个链接。这就是*反向查找*，即逆向查找。\n\
    \n## 在路由器中重写 URL\n\n在博客应用程序中，假设将来某个时候你需要停止在 URL 中使用 `Posts` 控制器名称。这意味着需要遍历整个应用程序，将所有指向\
    \ `Posts` 控制器的链接实例更改为新的路由。这显然会拖慢开发进度，并使站点结构更难更改。或者，你可以使用 Cake 的反向路由机制来重写所有指向 `Posts`\
    \ 控制器的 URL。\n\n`09775ch10final 7/1/08 9:50 PM Page 178`\n\n**178**\n\n第 10 章 ■\
    \ 路 由\n\n## 详细链接（Verbose Linking）\n\n要反向生成路由，首先必须使用详细方法来编写链接。在 `$html->link()`\
    \ 函数中，不再写入路径字符串，而是像这样将一些 URL 参数包含在一个数组中：\n\n```\n$html->link('View Post', array('controller'=>'posts',\
    \ 'action'=>'view', $post['Post']['id']));\n```\n\n这个数组并不会告诉函数 URL 路径是什么，而是提供了动态构建路径所需的必要参数。虽然使用这种数组确实会需要在组合链接时输入更多字符，但它允许你通过一个地方（即\
    \ `routes.php` 配置文件）来使用路由器拦截整个应用程序中的所有链接，而无需回头逐个查找需要更改的链接。\n\n要完成反向路由，你只需要在 `routes.php`\
    \ 配置文件中输入一条新的连接字符串来更改路由：\n\n```\nRouter::connect('/articles/*', array('controller'=>'posts',\
    \ 'action'=>'view'));\n```\n\n如果在 `$html->link()` 函数中不使用详细数组，路由器仍会尝试访问 `Posts`\
    \ 控制器，并且 URL 中仍会出现 *posts* 一词。然而，既然你已经指定了希望用 *articles* 一词来链接到 `Posts` 控制器，路由器就会为你构建应用程序中的路径。只要链接同时调用了\
    \ `Posts` 控制器和 `View` 动作，路由器就会用 *articles* 替换路径中的相应部分。例如，通常指向以下位置的链接：\n\n`/posts/view/25`"
