- fmt: '### Checking for Permission


    In this section, we''re modifying the `ApiOperationHandler` so that it checks
    whether the user has enough permissions for operating.


    ```

    use App\Api\Collection\OperationCollection;

    use App\Api\Input\ApiInput;

    use App\Api\Output\ApiOutput;

    use App\Validation\ValidationHandler;

    use Symfony\Bundle\SecurityBundle\Security;

    use Symfony\Component\Security\Core\Exception\AccessDeniedException;

    class ApiOperationHandler

    {

    public function __construct(

    private readonly ValidationHandler $validationHandler,

    private readonly OperationCollection $operationCollection,

    private readonly Security $security

    ){ }

    public function performOperation(ApiInput $apiInput): ApiOutput

    {

    $operation = $this->operationCollection->getOperation($apiInput->operation);

    $isGranted = $this->security->isGranted(''PERFORM'', $operation);

    if(!$isGranted){

    throw new AccessDeniedException(''Not allowed to perform this operation'');

    }

    $inputData = ($operation->metadata->input)

    ? $this->validationHandler->deserializeAndValidate($apiInput->data, $operation->metadata->input)

    : null

    ;

    return $operation->handler->perform($inputData);

    }

    }

    ```


    Let''s focus on the changes below the `getOperation` line. It uses the method
    `isGranted` of the `security.helper` Symfony service to check whether the user
    has permissions or not. Internally, this method executes all the voters whose
    `supports` method returns true. As the voters work under a "unanimous" strategy,
    if any voter denies access, then the requested operation will be revoked; otherwise,
    it will be granted.


    - To use the `security.helper` service, we inject it using the `Symfony\Bundle\SecurityBundle\Security`
    class which is an alias of it.


    ### Conclusion


    We have achieved fine-grained control over operation access by using voters. This
    ensures that only authorized users can execute specific operations, safeguarding
    sensitive data and functionalities within the API. In the next section, we will
    address scenarios where operations require access to information about the currently
    logged-in user.


    ## Section 4. Accessing the Logged User from Operations


    There can be operations that could require access to the user-logged data. For
    instance, the `SendPayment` operation could need the current user''s balance before
    sending the payment. For this reason, we need a way to:


    - Know whether an operation requires access to the user

    - Pass the user to the operation so that it can use it


    ### The OperationRequiresUserInterface


    Let''s start by creating an interface that will be implemented by those operations
    that require access to the user.


    ```

    use Symfony\Component\Security\Core\User\UserInterface;

    interface OperationRequiresUserInterface

    {

    public function setUser(UserInterface $user): void;

    }

    ```


    This interface declares a method named `setUser`, which will be used by the `ApiOperationHandler`
    to pass the user to the operation.


    ### Passing the User to the Operation


    We have to modify the `ApiOperationHandler` `performOperation` method so that
    it can check whether the operation requires the user and pass it.


    ```

    public function performOperation(ApiInput $apiInput): ApiOutput

    {

    $operation = $this->operationCollection->getOperation($apiInput->operation);

    $isGranted = $this->security->isGranted(''PERFORM'', $operation);

    if(!$isGranted){

    throw new AccessDeniedException(''Not allowed to perform this operation'');

    }

    $inputData = ($operation->metadata->input)

    ? $this->validationHandler->deserializeAndValidate($apiInput->data, $operation->metadata->input)

    : null

    ;

    if($this-security-getToken()?-getUser() && $operation->handler instanceof OperationRequiresUserInterface)
    {

    $operation->handler->setUser($this->security->getToken()->getUser());

    }

    $operation->handler->perform($inputData);

    }

    ```


    After validating the operation data, the `performOperation` function checks whether
    the operation object is an instance of `OperationRequiresUserInterface`, that
    is, the operation implements that interface. If so, the handler uses the `setUser`
    method to pass the user to the operation.


    ### Implementing the OperationRequiresUserInterface


    Let''s make the `SendPayment` operation implement the `OperationRequiresUserInterface`.


    ```

    use App\Api\Attribute\OperationMetadata;

    use App\Api\Input\Operation\SendPaymentInput;

    use App\Api\Output\ApiOutput;

    use App\Security\Miscelanea\OperationNames;

    use Symfony\Component\Security\Core\User\UserInterface;

    #[OperationMetadata(

    name: OperationNames::SendPayment->name,

    input: SendPaymentInput::class,

    )]

    class SendPaymentOperation implements OperationInterface, OperationRequiresUserInterface

    {

    private ?UserInterface $user = null;

    /**

    * @param SendPaymentInput $data

    */

    public function perform(mixed $data): ApiOutput

    {

    /**

    * Business logic to send the payment would go here

    */

    return new ApiOutput([

    ''id'' => ''77fg76hf''

    ], 202);

    }

    public function setUser(?UserInterface $user): void

    {

    $this->user = $user;

    }

    }

    ```


    As you can see, the `setUser` method initializes the operation `user` property
    with the user passed as a parameter and, from that moment, the user is available
    to be used in the operation.


    ### Conclusion


    In this section, we have designed a way to allow operations to access the currently
    logged user if they require it. In the next section, we will learn how to validate
    input requests according to the user role.


    ## Section 5. Validating Operations According to the User Role


    In the previous chapter, we validated the operations according to the operation
    input class properties constraints. In this chapter, we are going to go one step
    further and validate them based on the user''s role too.


    ### Using Validation Groups in the Input Model


    Symfony [Validation Groups](https://symfony.com/doc/current/validation/groups.html)
    are a great feature to validate an object only against some of its constraints.
    Let''s start from the following assumption: We want to create an operation for
    creating projects. These projects always require a name and a description. The
    project start and end dates will be required only for the `ROLE_PROJECT_MANAGER`
    user so that:


    - **ROLE_PROJECT_MANAGER**: They will have to send all the parameters.

    - **ROLE_DEVELOPER**: They will only have to send the name and the description.


    Below you can see the input class:


    ```

    use Symfony\Component\Validator\Constraints\IsNull;

    use Symfony\Component\Validator\Constraints\Date;

    use Symfony\Component\Validator\Constraints\NotBlank;

    readonly class CreateProjectInput

    {

    public function __construct(

    #[NotBlank(message: ''name cannot be empty'', groups: [''ROLE_PROJECT_MANAGER'',
    ''ROLE_DEVELOPER''])]

    public string $name,

    #[NotBlank(message: ''description cannot be empty'', groups: [''ROLE_PROJECT_MANAGER'',
    ''ROLE_DEVELOPER''])]

    public string $description,

    #[NotBlank(message: ''start date cannot be empty'', groups: [''ROLE_PROJECT_MANAGER''])]

    #[IsNull(message: ''start date must be empty'', groups: [''ROLE_DEVELOPER''])]

    #[Date(message: ''start date must be a valid date'', groups: [''ROLE_PROJECT_MANAGER''])]

    public string $startDate,

    #[NotBlank(message: ''end date cannot be empty'', groups: [''ROLE_PROJECT_MANAGER''])]

    #[IsNull(message: ''end date must be empty'', groups: [''ROLE_DEVELOPER''])]

    #[Date(message: ''end date must be a valid date'', groups: [''ROLE_PROJECT_MANAGER''
    ])]

    public string $endDate,

    ){}

    }

    ```


    As you can observe, the model specifies that both name and description are required
    for both managers and developers, but start and end dates can only be specified
    by the project managers. In fact, an [`IsNull`](https://symfony.com/doc/current/reference/constraints/IsNull.html)
    constraint specifies that developers cannot fill those properties.


    - We use the `IsNull` constraint to avoid generating errors in the database caused
    by trying to store empty strings on date nullable fields.'
