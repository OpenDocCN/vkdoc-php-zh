    ');'));\n```\n\n我不仅传递了参数来说明助手应渲染哪种类型的表单输入字段（在本例中是一个 HTML 按钮），还通过指定 HTML 属性 `onSubmit`\
    \ 并赋予其值，将 JavaScript 的 `alert()` 函数分配给了该元素。\n"
- fmt: 'Using the`options`array is generally more effective than using raw HTML. Usually
    the helpers can provide a uniform linking system or display mechanism that cuts
    down on the headache of keeping the application consistent. Also, getting used
    to the look and flow of helper strings can be more aesthetic for the eyes, especially
    if you favor PHP syntax over HTML markup. Probably the most important reason for
    sticking with helpers, even for custom JavaScript and Ajax calls, is to prevent
    duct-taping your application. In other words, you’re working in Cake, and the
    framework is strong enough to lessen your code. Too often developers settle for
    a hack or for a deprecated method to get a complex process working right. Don’t
    overlook how Cake’s helpers can contribute to your process. You’ll find more features
    than you might have been expecting to help you through the challenge.


    ## Prototype vs. jQuery


    In recent months, the jQuery framework has increased in popularity and in functionality.


    Many Cake developers have begged for Cake to be rewritten around this framework
    rather than Prototype. At the time of writing, rumors are floating around that
    jQuery will eventually replace Prototype in the`Ajax`helper. Whatever the case,
    the`Ajax`helper is destined to go on working the same way; you just may need to
    install a different library in the`app/webroot/js`folder.


    Regardless of the direction Cake will take, both frameworks offer some important
    features that every serious Ajax developer will want to consider. Again, you can
    pull in their functions by using the`options`array in various helper functions.
    For example, using jQuery’s form plugin, I can upload a file with the`Form`helper:


    ```

    <?=$form->button(''Upload'',array(''onClick''=>''$(\''#storyEditForm\'').ajaxSubmit({

    target: \''#storyTextUpload\'',url: " .$html->url(''/stories/text'').''\''});
    return

    false;''));?>

    ```


    There’s definitely more to this function than what is included here, but this
    example does illustrate how to assign a jQuery function to the`onClick`event in
    the`$form->button()`function. Provided that my controllers are using the`render()`function
    in Ajax mode, Cake can run its logic through the MVC structure as normal and still
    use an Ajax library outside the`Ajax`helper.


    ## Uploading Files with jQuery


    We couldn’t possibly explore every possible Ajax method available in Cake. However,
    one of the most common needs of web applications is some kind of file upload.
    This task can be rather cumbersome, especially when you want to manage file uploads
    with Ajax. Many of the Ajax frameworks don’t support file input elements because
    of the way they serialize HTML forms. JavaScript can’t place the file contents
    into a string, which is how many of these frameworks submit form data. Fortunately,
    jQuery’s Form plugin can handle file uploads, making it possible to integrate
    uploading with Ajax.


    Because jQuery currently is not part of the default`Ajax`helper, adding a file
    upload feature to your blog will demonstrate how to incorporate a non-Prototype
    framework into Cake.


    ### Installing jQuery and the Form Plugin


    Remember that you must install the JavaScript libraries to be called manually.
    Download the latest version of jQuery as well as the Form plugin. The following
    links should help in locating those files:


    *   jQuery: [http://docs.jquery.com/Downloading_jQuery](http://docs.jquery.com/Downloading_jQuery)

    *   Form plugin: [http://jqueryjs.googlecode.com/svn/trunk/plugins/form/](http://jqueryjs.googlecode.com/svn/trunk/plugins/form)
    `jquery.form.js`


    Next, you have to place the necessary files into the`app/webroot/js`directory
    and make them available in the default layout. The trouble is that jQuery may
    conflict with Prototype, which you have used to provide the comments voting and
    submissions, so let’s add some logic to the default layout to detect whether it’s
    running the`Posts Add`action or something else.'
