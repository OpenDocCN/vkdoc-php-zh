    \ or list all entries. Figure [7-1](#323857_3_En_7_Chapter.xhtml#Fig1) uses the\
    \ MVC\narchitecture to develop a schematic overview of the blog administration\
    \ module .\n\n![](images/323857_3_En_7_Chapter/323857_3_En_7_Fig1_HTML.png)\n\n\
    A chart reflects the responsibilities of the front controller, mainly\nthese are\
    \ classified into three parts, models, views, and\ncontrollers.\n\nFigure 7-1\n\
    Distribution of responsibilities\n\nNotice that every view has a corresponding\
    \ controller. The entry\nmodel displays all entries and saves any new entry.\n\
    \nAdmin View: Creating the Admin Blog Site\nLet  us create a\nnew folder called\
    \ `ch7` and a folder\n`blog` inside the\n`ch7` folder.\nInside the `blog`\nfolder,\
    \ we will also create four other folders: `models`, `views`, `controllers`, and\n\
    `CSS`.\nWe can now copy the `page.php` program  from the `template` folder in\n\
    `ch4` to the\n`views` folder\nunder `blog.` We\ncan also copy the `Page_Data.class.php`\n\
    program from the `ch4 classes` folder into the `models` folder. We\nwill create\
    \ a blank style sheet, which we will code later, and place it\nin the `CSS`\n\
    folder with the name of `blog.css`. Of course,\nwe can download the files for\
    \ this chapter from the publisher’s\nwebsite.\n\nNow it is time to create a test\
    \ version of  `admin.php` \n`,` our front\ncontroller, to see if everything works\
    \ together properly.\n\n```\nsetTitle(\"PHP/MySQL blog demo\");\n$pageData->setCss(\"\
    \");\n$pageData->setContent(\"YES!\");\ninclude_once \"views/page.php\";\necho\
    \ $page;\n?>\nListing 7-1\nadmin.php\n```\n\nNote\n\nIf you copied the `Page_Data.class.php`\n\
    from the `ch4`\nfolder, the validation using the if statements will need to be\
    \ adjusted\nto allow the values passed in this listing and future listings in\
    \ this\nchapter. If you don’t see the expected results, check the security\nrestrictions\
    \ within this file. The `Page_Data.class.php`\nfile from the publisher’s website\
    \ already has the required\nadjustments.\n\nThis code should look familiar, as\
    \ it is similar to the basic front\ncontrollers that we created in previous chapters.\
    \ The only addition is\nthe included style sheet.\nWhen testing this program,\
    \ everything should work as expected; we\nshould get a well-formed HTML5 with\
    \ a `<title>` of\n*PHP/MySQL blog demo* and an `<h1>` element\nhappily exclaiming\
    \ *YES*! Seeing YES in the browser is visual\nconfirmation that the project is\
