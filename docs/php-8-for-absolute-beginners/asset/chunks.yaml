- fmt: '# Classes Make Objects


    We can use the new class definition in the index file. It will require a tiny
    change.


    ```

    title = "Thomas Blom Hansen: Portfolio site";

    $pageData->css = "";

    $pageData->content = $nav;

    $navigationIsClicked = isset($_GET[''page'']);

    if ($navigationIsClicked ) {

    $fileToLoad = $_GET[''page''];

    } else {

    $fileToLoad = "skills";

    }

    include_once "views/$fileToLoad.php";

    $pageData->content .= $info;

    require "templates/pagewithcss.php";

    echo $page;

    ?>

    ```


    The `stdClass` has been removed and replaced with the `Page_Data` class. If we
    load `indexwithclass.php` into our browser, we will discover that the outcome
    is the same as we discovered in Figure [2-10](#323857_3_En_2_Chapter.xhtml#Fig11).
    The results are the same, but the program has become more secure. The `Page_Data`
    class enables us to keep a placeholder for embedded styles in the page template
    and only assign an actual value to that property whenever we need a page with
    an embedded `<style>` element.


    ## Highlighting Current Navigation Item with a Dynamic Style Rule


    We have created a page template and a `Page_Data` object, each with embedded styles.
    We kept common styles used throughout a web page in an external style sheet. But
    there are a few cases in which dynamic styles on individual pages are quite powerful.


    **Exercise**: We could use a dynamic style rule to highlight the current navigation
    item. Review your CSS skills and adjust the `indexwithclass` program to include
    a dynamic internal style sheet which highlights the current navigation selected
    on the menu, and use the `embeddedStyle` property to save and interpret the new
    CSS code.


    ## Summary


    We have discovered how to use a little basic PHP to build a very dynamic site.
    Your learning process will probably benefit from a bit of experimenting at this
    point. Try attempting some of the project suggestions at the end of this chapter.
    In the next chapter, we will learn about HTML forms, PHP functions, and more details
    on conditional statements.


    ## Projects


    1. Complete the personal portfolio site from this chapter. Add however many page
    views you see fit and update your navigation accordingly.


    2. Create some more comprehensive, detailed page views. In the process, you should
    gradually become more comfortable with the dynamic site structure and how page
    views are returned to be displayed in the index file.


    3. Use your existing CSS skills to develop a consistent website design for the
    portfolio. It will be a very good exercise to use your existing HTML and CSS skills
    in this new context of dynamic sites. It is a good idea to do this exercise while
    the site you are working on is simple.


    # 3. Form Management


    ## Objectives


    After completing this chapter, you will be able to


    * Create and use HTML forms

    * Use superglobal arrays

    * Encode URL variables with HTML forms using the `GET` method

    * Encode URL variables with HTML forms using the `POST` method

    * Create a dynamic PHP quiz program

    * Use `if-else` conditional statements

    * Create and use named functions

    * Create secure classes and objects using constructors, setters, and getters

    * Understand how an American western film can teach you about clean code

    * Discover why code really is poetry


    In Chapter [2](#323857_3_En_2_Chapter.xhtml), we built a dynamic, personal portfolio
    site. In the process, we saw how to encode URL variables with `<a>` elements and
    how to access such URL variables using the `$_GET` superglobal. Passing data is
    what separates dynamic web pages from static ones. By customizing an experience
    based on the user’s choices, we are able to add an entirely new level of value
    to a website.


    Now that we have seen a little PHP and written a basic dynamic site, we are ready
    to go deeper into URL variables. HTML `<form>` elements are commonly used to create
    interfaces that allow users to interact with a dynamic site. If you have spent
    any time on the Web, you have used an HTML form to submit information. To create
    an interactive website, we need to learn how to create and use these HTML forms.


    ## What Are Forms?


    HTML forms allow visitors to interact and provide information on a website. Figure
    [3-1](#323857_3_En_3_Chapter.xhtml#Fig1) shows Google’s search form. When a user
    visits [`www.google.com`](http://www.google.com), types a search term into the
    text input field, and then clicks Google Search, Google will perform the requested
    search.


    ![](images/323857_3_En_3_Chapter/323857_3_En_3_Fig1_HTML.jpg)


    A model on how the google search bar is visible to users, it helps to easily search
    for required information.


    **Figure 3-1** Search form from [*www.google.com*](http://www.google.com)


    Another kind of form you probably have come across is a login form, through which
    registered users can log in and enter a restricted area. You may have seen such
    forms when you log in to your Facebook account, your bank account, or your Gmail
    account. The login in Figure [3-2](#323857_3_En_3_Chapter.xhtml#Fig2) is from
    Facebook.


    ![](images/323857_3_En_3_Chapter/323857_3_En_3_Fig2_HTML.jpg)


    The login page of Facebook is represented in this image, with a login email and
    password for entering to Facebook portal. An option to create new account at the
    end.


    **Figure 3-2** Login form from [*www.facebook.com*](http://www.facebook.com)


    A final familiar example could be the star rating system. You may have come across
    a star rating system when you bought a book from an online bookstore. Figure [3-3](#323857_3_En_3_Chapter.xhtml#Fig3)
    shows the star rating form from Amazon.


    ![](images/323857_3_En_3_Chapter/323857_3_En_3_Fig3_HTML.jpg)


    A model represents how the star rating from amazon is visible to users, in that
    headline writing, photo, and video adding options are also added.


    **Figure 3-3** Star rating form from [*www.amazon.com*](http://www.amazon.com)


    If you are going to work as a web developer or web designer, you will develop
    and design usable, functional forms. Web forms are the interface between a system
    and its users; developing and designing web forms is extremely important.


    ## Setting Up a New PHP Project


    Let’s create a new project folder called `ch3` in the `XAMPP/htdocs` folder to
    hold all the work we will accomplish in this chapter. Inside `ch3`, we will need
    copies of the `templates` and `classes` folders, and the PHP scripts, from Chapter
    [2](#323857_3_En_2_Chapter.xhtml). We can copy these from our Chapter [2](#323857_3_En_2_Chapter.xhtml)
    folder or by downloading them from the publisher’s website. We also need to create
    an empty folder called `views`.


    Let’s add a basic PHP template for the `index.php` file. Notice that we are reusing
    `classes/Page_Data.class.php` and `templates/page.php`, from Chapter [2](#323857_3_En_2_Chapter.xhtml),
    without changing a single line of code inside either script. Efficient and effective
    programmers reuse library files within their programs. Whether the files were
    provided by PHP or created by the programmer (or someone else in a corporation),
    stable and secure programs can be developed with more efficiency and speed by
    reusing code that is known to be reliable. Just solve it once; don’t reinvent
    the wheel over and over again!'
