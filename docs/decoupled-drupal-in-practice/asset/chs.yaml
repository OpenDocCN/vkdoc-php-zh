  ## 使用 RELAXed Web Services 检索资源


  `RELAXed Web Services` 提供了多种多样的资源，每种资源都有不同的特性。在开始之前，我们需要定义可用的资源及其在 Drupal 生态系统中的含义。例如，CouchDB
  数据库等同于 Drupal 的*工作区*，而 CouchDB 文档等同于 Drupal 的*实体*。


  表 13-1 以非详尽列表的形式定义了一些常见的 CouchDB 术语及其 Drupal 等效项。


