  \ 条件，则会插入一行。调用 `delete()` 方法将删除匹配 `WHERE` 条件的行，如果没有条件则删除所有行。\n\n### Model\n\n由于我们选择创建一个\
  \ ORM 并将其存储在 `Model` 类中，因此大多数模型测试都涉及 ORM 方法。`Model` 类不是一个工厂，所以我们不需要那些测试，只需要创建一组简单的模型测试。\n\
  \n我们需要测试模型结构是否正确地同步到数据库。我们需要测试是否可以从数据库插入、更新和删除行。我们还要测试是否可以从数据库返回匹配 `WHERE` 条件的行。\n\
  \n### 覆盖范围\n\n我们应该创建覆盖以下需求的测试：\n\n- `Model` 类与数据库同步。\n- `Model` 类可以插入行。\n- `Model`\
  \ 类可以获取行数。\n- `Model` 类可以多次保存一行。\n- `Model` 类可以更新行。\n- `Model` 类可以删除行。\n\n### 测试\n\
  \n首先，我们需要定义一个模型以同步到数据库，如清单 11-14 所示。它遵循我们在第 10 章中学习的相同格式。\n\n***清单 11-14.*** 将模型同步到数据库\n\
  \n```php\n$database = new Framework\\Database(array(\n    \"type\" => \"mysql\"\
