    # PHP 库、扩展、类与对象


    PHP 的一大优势在于能够轻松地将代码模块存储在库中。代码一旦存入库中，便可方便地在其他程序中复用。使用那些已在“实际”环境中经过充分测试和使用的代码，能大大减少程序错误并提高生产力，因为你无需重新发明轮子。没有必要重新创建已经成功运行的代码，这既浪费时间和精力，又容易导致不必要的程序错误。实际上，程序员可能并不了解代码模块（`class`）中具体存在什么代码。然而，程序员知道可以向这个“黑箱”传递哪些参数（例如数字），以及能从黑箱中获得什么结果（例如数字之和）。


    你可能会担心：程序员盲目地将信息传入黑箱，又盲目地接收返回的信息。但这其实是个优势，而非劣势。它允许模块的创建者更新代码，而不会影响模块的使用方式。只要模块接受相同的输入并返回相同的输出，使用该模块的程序员就察觉不到任何变化。模块可以进行更新以提升效率、增强安全性或修正程序代码问题，而无需用户改变他们在代码中处理该模块的方式。


    ## PHP 扩展


    ```

    extension=bz2

    extension=curl

    ;extension=ffi

    ;extension=ftp

    extension=fileinfo

    extension=gd2

    extension=gettext

    ;extension=gmp

    ;extension=intl

    ;extension=imap

    ;extension=ldap

    extension=mbstring

    extension=exif

    extension=mysqli

    ;extension=oci8_12c

    ;extension=odbc

    ;extension=openssl

    ;extension=pdo_firebird

    extension=pdo_mysql

    ;extension=pdo_oci

    ;extension=pdo_odbc

    ;extension=pdo_pgsql

    extension=pdo_sqlite

    ;extension=pgsql

    ;extension=shmop

    ;extension=snmp

    ;extension=soap

    ;extension=sockets

    ;extension=sodium

    ;extension=sqlite3

    ;extension=tidy

    ;extension=xmlrpc

    ;extension=xsl

    例 4-1

    php.ini 文件中的扩展

    ```


    *有关 PHP 扩展及其功能的完整列表和说明，请访问* [*www.php.net/manual/en/extensions.alphabetical.php*](http://www.php.net/manual/en/extensions.alphabetical.php)*。*


    PHP 拥有大量包含数千行经过充分测试代码的库。例 4-1 是 `php.ini` 文件的部分副本，展示了几个*可在 PHP 中激活的扩展（库）*。这些代码已经编译完成。通过移除扩展语句前的注释符号（`;`），即可激活
    PHP 环境中已存在的库扩展。保存 INI 文件后，必须重启 PHP 和 Web 服务器（`Apache`）（参见第 1 章中关于 `php.ini` 文件位置以及重启
    PHP 和 Apache 的示例）。这种便捷的库添加方式是 PHP 如此受欢迎的原因之一。还可以通过多种方法将额外的库“安装”到 PHP 中。其中一种流行的方法是
    *PEAR*（PHP 扩展与应用仓库），它负责第三方库的代码分发与维护。


    - *PEAR 以及其他第三方库的安装方法超出了本书的讨论范围。不过，你可以通过以下链接了解更多信息：*

    - [`pear.php.net/manual/en/about-pear.php`](https://pear.php.net/manual/en/about-pear.php)


    此外，程序员还可以通过 `require` 或 `require_once` 语句，将自有的代码库（未编译的）直接“安装”到应用程序中。在企业中，将可能多次复用的代码（例如数据库访问）包含进来是一种常见做法。通过将其（经过充分测试的代码）存放在本地库中，任何更改（例如数据库迁移到另一台服务器）只需在一个位置（本地库文件）处理，而无需修改多个文件。这同时也减少了代码冗余，提高了可靠性。


    虽然本地库可以只包含代码方法（函数），但更常见的是这些库中包含模块（类）。这使得程序员能够采用前面提到的“黑箱”概念进行编程。三层架构（第 2 章中解释过）正是基于这一前提。通过引用包含代码的库（使用
    `require` 或 `require_once` 语句），可以从库中访问代码类。一旦建立引用，便会创建该类的一个实例（`对象`）。创建实例后，程序代码就能访问该对象的所有功能。


    ## 类与对象


    类类似于房屋的蓝图。蓝图包含建造房屋所需所有元素的描述（特征）。但蓝图本身并非实际的房屋，它描述的是如果我们召集施工队建造房屋，可能实现的结果。蓝图不被认为实际存在（如同房屋那样存在）。然而，它描述了建造房屋所需的材料（钉子、石膏板和木材）以及建造过程。


    一个**类**描述了代码模块的**特征**（属性）以及该代码中可能发生的**行为**（方法或函数）。但在创建该类的一个实例（称为**对象**）之前，它在内存中并不实际存在。一旦创建实例，就可以访问其特征和行为。正确创建的类与对象能够保护特征（属性）不受直接访问。这为对象提供了在属性值变更请求生效之前，验证该请求是否合法的机会。这通常被称为**封装**。为了保护属性不被外部直接访问，应使用
    **private** 访问类型来声明它们。`Private` 访问类型只允许类内部的方法修改属性的值。**设置方法**（本章稍后讨论）用于修改属性。**获取方法**（同样在稍后讨论）通常用于检索属性值。


    ## 创建 PHP 类


    我们先创建一个类的基本结构。我们将创建一个 `dog` 类，它可以设置狗的某些特征（体型、品种、颜色和名字），并且能让狗“叫”以及显示各属性中保存的值。我们将把
    `dog` 类创建在一个独立的文件（库）中，以便在需要时加载到程序（或任何其他程序）中。


    要创建一个 PHP 类，我们使用 `class` 关键字，并将类中的所有代码封装在 `{}` 中。


    ```

    例 4-2

    dog.php 文件中的基本类结构

    ```

    '
- fmt: '# 文本排版：PHP 类与属性


    如示例[4-2](#394210_2_En_4_Chapter.xhtml#PC2)所示，`class`关键字是小写的。然而，类名`Dog`以大写字母开头。PHP
    允许你创建以小写字母开头的类，但通常的实践是通过大写首字母来轻松识别类。包含类的实际文件名（`dog.php`）也应与类名（`Dog`）匹配。


    *关于类、方法和属性的更多信息，请访问 php.net 上的 [www.php.net/manual/en/classobj.examples.php](http://www.php.net/manual/en/classobj.examples.php)。*


    类名不能包含空格。你还应避免使用特殊字符。不过，下划线（`_`）是允许的，并且常用于连接两个单词（`set_name`）。你可能注意到，有些类名在类名之前包含双下划线（`__`）（例如`__Myclass`）。但由于存在使用此格式的“魔术”类（本章后面会介绍其中两个），这并不是推荐的做法。


    如前所述，类包含属性。**属性**也称为**变量**。


    属性包含类的特征。当创建类的一个实例时，属性对于该对象是唯一的。操作系统会在内存中预留一块空间来保存属性。操作系统为我们处理内存管理，包括清理不再需要的属性。在
    PHP 中，一旦到达右花括号（`}`），已创建的属性就会被操作系统中的**垃圾回收器**安排移除。此时程序无法再访问该属性。


    属性可以保存多种不同类型的数据。在大多数语言中，创建属性时，还必须包含一个数据类型来描述所存储数据的种类（例如字符串）。然而，PHP 不需要定义数据类型。但我们建议你使用数据类型，以便验证是否接受了正确的信息。当未声明数据类型时，PHP
    会在数据首次放入属性时确定要存储在该属性中的数据类型。


    属性以初始的`$`和属性名称创建。属性名称可以包含字母、数字和下划线（`_`）。下划线可以放在属性名前（在`$`之后）或单词之间。不允许包含空格。属性通常以小写字母创建，但
    PHP 也允许大写字母。PHP 是区分大小写的，会将小写属性（`speak`）和大写属性（`Speak`）视为两个不同的属性。


