    C U L O U S


    Typically, you will define the callback prior to initiating the Ajax request,
    and then pass in the function name with the request options (as discussed in the
    previous section). Each callback receives the XMLHttpRequest object as its first
    parameter, thereby allowing you to easily read the response data (including HTTP
    status code) if it is available.


    The following are the main callback functions you will typically need to define
    when handling an Ajax request:


    • onSuccess: This callback is called upon successful completion of a request.
    A request is successful if no error occurs and if the HTTP status code is in the
    2xx family.


    • onFailure: If a request completes successfully but returns an HTTP status code
    not in the 2xx family, this callback is invoked.


    • onComplete: After a request has completed and all other callbacks have been
    called, the onComplete callback is triggered. In reality, you will probably not
    need this callback in your requests unless you have some kind of cleanup code
    that needs to be executed whether a request succeeds or not.


    ■**Note** Many Ajax programmers (both in the past and even now) simply check for
    an exact status code of 200 when trying to determine success. Not all successful
    HTTP requests will necessarily return this status code, however, so the onSuccess
    callback should be used instead. Prototype will automatically deal with each of
    these status codes.


    Here’s an example of defining the onComplete and onFailure callbacks, combined
    with the other options you may need in an Ajax request:


    <script type="text/javascript">


    var options = {


    method : ''post'',


    parameters : ''action=save&id=1234'',


    onSuccess : function(transport)


    {


    alert(''Ajax request succeeded!'');


    },


    onFailure : function(transport)


    {


    alert(''Oh no – something went wrong!'');


    }


    };


    </script>


    The callback functions I have defined are somewhat useless, but hopefully they
    demonstrate how the Ajax request is set up.


    In reality, I much prefer to define the actual function as its own separate block,
    and then pass in the function name as the argument in the options hash. An example
