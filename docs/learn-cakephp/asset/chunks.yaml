    # 2. What Is Unit Testing?


    ![A337704_2_En_2_Figa_HTML.jpg](A337704_2_En_2_Figa_HTML.jpg)


    Give me your hand, baby


    Unit testing allows you to test your software in isolation. Normally, unit tests
    are small, fast, and test just a short piece of code—a unit—such as a function.
    A unit test is code designed to test other code.


    It helps to keep the code short, easy to understand, and easy to read. It helps,
    too, to write more maintainable code. As a result, this helps to create software
    with fewer bugs. Unit tests automatize the testing process.


    Unit tests alone will not guarantee perfect, bug-free applications, but they help
    a lot.


    ## From Manual Testing to Unit Tests


    When you write code, you have to be sure that it will do its job. As I am discussing
    testing PHP, beginners should test in the browser. Write the code; open the browser;
    give different inputs; and check if the output is what is wanted. Sound familiar?
    This is called manual testing, and with this, we test functionality, not our code.


    The next step is to have a system to automatize testing, so that you do not have
    to manually click here and there in the browser in order to check your software.
    There are many tools with which to do this. The two main approaches are test-driven
    development (TDD) and behavior-driven development (BDD).


    TDD, in short, starts with writing tests before you write your code. This approach
    relies on unit tests.


    As unit tests are for small pieces of code, they are easy to write, and your code
    is easily covered by them.


    In BDD, tests of any unit should be specified in terms of the desired behavior
    of the unit.


    ## Arguments


    There are common arguments against writing unit tests. I want to highlight the
    advantages of unit testing, by addressing those arguments and sharing my own experience
    with the issues those arguments address. Then, you can try out unit testing for
    yourself and make your own decision.


    ### Argument #1: It’s Impossible to Test All Variations


    Yes, it’s true. You will not be able to test all possible variations. But at least
    a unit test will show what variations are covered by your tests. If you can determine
    that the application fails because of a variation not covered by the unit test,
    you just extend the test.


    For example, if I had a test that runs successfully with positive integers, I
    could extend the test later for 0, negative integers, or floats, when necessary.


    ### Argument #2: Writing Tests Takes Too Much Time


    Writing—and maintaining—extra code takes time. That’s obvious. But writing is
    itself just one of many time-consuming factors. What are the others? Time spent
    trying to understand our own code three or four months after writing it, or time
    spent trying to understand someone else’s code. Time spent trying to find the
    particular piece of code with the bug. Time spent reviewing our code whenever
    third-party code is changed. When we add up the time spent on all these things,
    it starts to look like unit testing could save time. Saving time means saving
    money, but be careful. Unit tests could save time; it’s not that they definitely
    will save time. You have to use the tests correctly.


    Learning to use unit tests takes time too. But I think the learning curve is short,
    and there will be a return, even the very first time you use them.


    ### Argument #3: Writing Tests Is Hard


    Writing tests is easy. Writing good tests is hard. But it just takes a little
    practice.


    There is an exception. Writing tests for spaghetti code, or for functions that
    do many things, is hard. So, when you run into difficult tests, you should make
    sure that this is an indication that your code requires refactoring.


    ### Argument #4: I Don’t Need Tests; I Know My Code


    Nearly 99.9% of the time, you do not code alone. We frequently use third-party
    code. And we tend to forget, or to change, the way we think about coding, as time
    passes. Maybe it seemed clear when we first wrote the code, but after a while,
    we may have to spend minutes (or hours) to understand what we did.


    Many times, I write tests for my helper functions consisting of five or six lines.
    These functions are much simpler to test when your code sits on different servers,
    different PHP versions. It is simpler to test different inputs—even with data
    that should not be there at all—such as division by zero.


    ### Argument #5: It Is Just a Waste of Time


    This argument is given by web developers who start to write unit tests and have
    argument #4 in mind. They often say, “I created some unit tests, but when running,
    they did not find any bugs at all. I think it was a waste of time.”


    OK, now you have tests. So, you have an asset in hand that can help you to check
    the same parts of your code after you make some changes or do some refactoring.
    At least, for this, you do not have to go back to manual testing any more. Write
    more tests, go back to your code after three months, and check the difference.
    Writing some code and maintaining it is two different things. With unit tests,
    you will not waste as much time on maintaining the code as without them.


    ### Argument #6: The Tests Might Have Their Own Bugs


    Yes. Any code might have bugs. But unit tests are short, so it’s easy to write
    them bug-free. It’s entirely possible to write tests that pass even when they
    should fail. Once again, the solution is practice.


    Never forget: Tests show the presence of errors, not the absence of errors.'
