    \ Java 和 C#）的异常模型。然而，PHP 中的异常与标准的 PHP 错误以一种奇怪的组合共存，你不能仅仅依赖异常来处理运行时问题。一些 PHP 扩展（如\
    \ PDO）可以配置为生成异常来指示运行时发生的问题，而在其他情况下，你唯一的选择是处理标准 PHP 错误。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XCH03.qxd 11/8/06 9:45 AM Page 85\n\n### 第三章：创建产品目录：第一部分 85\n\n异常相对于错误的优势在于处理它们时提供的灵活性。当生成异常时，你可以本地处理它并让脚本继续正常执行，或者你可以将异常传递给另一个类进行进一步处理。使用异常，你的脚本不会像出现\
    \ PHP 错误时那样终止。当使用异常时，你将怀疑可能抛出异常的代码放在`try`块内，并在关联的`catch`块中处理潜在的异常：\n\n```\ntry\n\
    {\n    // 可能生成你想要处理的异常的代码\n}\ncatch (Exception $e)\n{\n    // 当生成异常时执行的代码\n  \
    \  // （异常细节可通过 $e 对象访问）\n}\n```\n\n当`try`块中的任何代码生成异常时，执行会直接传递到`catch`块。除非`catch`块中的代码重新抛出异常，否则假定它已处理了该异常，并且脚本的执行会正常继续。这种灵活性允许你防止许多可能导致页面停止工作的原因，当你编写\
    \ PHP 代码时，你将体会到异常赋予你的强大功能！\n\nPHP 5 异常由`Exception`类表示，该类包含异常的详细信息。你可以使用`throw`关键字自己生成（抛出）异常。抛出的`Exception`对象会沿着调用栈传播，直到使用`catch`关键字拦截它。调用栈是正在执行的方法列表。因此，如果函数`A()`调用函数`B()`，而函数`B()`又调用函数`C()`，则调用栈将由这三个方法组成。在这种情况下，在函数`C()`中引发的异常可以在同一函数中处理，前提是有问题的代码位于`try-catch`块内。如果不是这种情况，异常会传播到方法`B()`，该方法有机会处理异常，依此类推。如果没有方法处理异常，则异常最终由\
    \ PHP 解释器拦截，它会将异常转换为 PHP 致命错误。\n\n在我们的数据库处理代码中，我们将捕获 PDO 可能生成的潜在异常。\n\n虽然默认情况下不这样做，但可以指示\
    \ PDO 在执行 SQL 命令或打开数据库连接时出现问题的情况下生成异常，如下所示：\n\n```\n// 创建一个新的 PDO 类实例\n$handler\
    \ = new PDO( ... );\n\n// 配置 PDO 以抛出异常\nself::$_mHandler->setAttribute(PDO::ATTR_ERRMODE,\n\
    \                                PDO::ERRMODE_EXCEPTION);\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XCH03.qxd 11/8/06 9:45 AM Page 86\n\n### 86 第三章：创建产品目录：第一部分\n\n我们捕获这些异常，并将错误详细信息传递给你在第\
    \ 2 章中编写的错误处理代码。以下代码片段显示了一个实现此功能的简短函数：\n\n```\n// PDOStatement::fetch 的包装方法\n\
    public static function GetRow($statementHandler, $params = null, $fetchStyle =\
    \ PDO::FETCH_ASSOC)\n{\n    // 将返回值初始化为 null\n    $result = null;\n\n    // 尝试执行接收到的预处理语句\n\
    \    try\n    {\n        self::Execute($statementHandler, $params);\n        $result\
    \ = $statementHandler->fetch($fetchStyle);\n    }\n    catch(PDOException $e)\n\
    \    {\n        // 关闭数据库处理器并触发错误\n        self::Close();\n        trigger_error($e->getMessage(),\
    \ E_USER_ERROR);\n    }\n\n    // 返回查询结果\n    return $result;\n}\n```\n\n## 使用连接发出命令\n\
    \n打开连接后，你现在就达到了我们从一开始就追求的阶段：通过连接执行 SQL 命令。\n\n你可以根据具体情况以多种方式执行命令。你想要执行的 SQL 查询是否返回任何数据？如果是，返回什么类型的数据以及以什么格式返回？我们将用于执行\
    \ SQL 查询的 PDO 方法有：\n\n- `PDOStatement::execute`用于执行`INSERT`、`UPDATE`或`DELETE`查询。\n\
    - `PDOStatement::fetch`用于从数据库中检索一行数据。\n- `PDOStatement::fetchAll`用于从数据库中检索多行数据。\n\
    - `PDO::prepare`准备要执行的 SQL 查询，创建一个所谓的*预处理语句*。\n\n**预处理语句**是一个参数化的 SQL 查询，其参数值由参数标记（`?`）或命名变量（`:variable_name`）替换，如下例所示：\n\
    - `$query1 = \"SELECT name FROM department WHERE department_id = ?\"`\n- `$query1\
    \ = \"SELECT name FROM department WHERE department_id = :dept_id\"`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XCH03.qxd 11/8/06 9:45 AM Page 87\n\n### 第三章：创建产品目录：第一部分 87\n\n要执行预处理语句，你需要为执行查询的函数提供参数值，这些函数会为你构建完整的\
    \ SQL 查询。为了实现部门列表，你不需要使用参数，但你将在第 4 章中学习如何处理它们。\n\n非预处理语句可以使用`PDO::exec`通过 PDO\
    \ 执行，在这种情况下，你需要创建包含其参数的 SQL 查询字符串。在本书中，我们将始终使用预处理语句，因为它们带来了两个重要的好处：\n\n- 参数值会被检查以防止注入攻击。\n\
    - 使用预处理语句查询可能执行得更快，因为数据库服务器可以重用为预处理语句构建的访问计划。\n\n为了能够更多地重用数据库处理代码，并为数据库代码拥有集中的错误处理机制，我们不会从应用程序的业务层直接使用\
    \ PDO 方法。相反，我们将 PDO 功能包装到一个名为`DatabaseHandler`的类中，并将从业务层的其他类中使用这个类。\n\n## 编写业务层代码\n\
    \n好的，让我们编写一些代码！你将首先编写`DatabaseHandler`类，这将是一个支持类，包含其他业务层方法所需的通用功能。\n"
