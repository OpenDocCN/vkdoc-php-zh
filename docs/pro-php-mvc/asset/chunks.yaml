  raw: 'The first two routes are automatically defined for us. The first is used to
    present the default landing page for new CodeIgniter installations. The second
    is merely a means of specifying a custom error page for missing controllers, actions,
    or views.


    In some of the routes we have used things like (:num), (:any), and $1\. These
    are used in the translation of routes to regular expressions. CodeIgniter uses
    regular expression matching to determine the correct controller and action to
    execute, much the same as our framework does. The values matched by (:num) and
    (:any) are sent to the action as arguments.


    If you try to access any of these new routes, you will see an error. This is because
    we have not yet created the corresponding controllers, actions, and so on. In
    Chapter 23, we will create the controllers, models, and views required for most
    of these routes to function correctly.


    ■ **Note** You can find more details about this configuration file at [http://codeigniter.com/user_guide/](http://codeigniter.com/user_guide/general/routing.html)


    [general/routing.html](http://codeigniter.com/user_guide/general/routing.html).


    Questions


    1\. In the Chapter 21, we learned how CodeIgniter secures the application and
    system class files by a line of code in every file. Our framework handles this
    differently by restricting all web requests to a public folder. Does this mean
    CodeIgniter got it wrong?


    2\. In Chapter 4, we discussed the differences between associative array configurations
    and INI configurations. How might we represent the same routes in an INI


    configuration format?


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 22 ■ CodEIgnITER: BooTsTRAPPIng


    Answers


    1\. The core team responsible for CodeIgniter development has been quite thorough
    in its application of this security technique. The problem is not that their system
    is insecure, but that securing it requires a combination of Apache security and
    the addition of security code to each class file. That does not mean this security
    check would be a bad thing if we decided to add it to our framework, but that
    forgetting to add it to any CodeIgniter application class files could create a
    security vulnerability.


    2\. There are a number of ways to approach this question, but the simplest would
    be to use a format resembling what is shown in Listing 22-3.


    ***Listing 22-3.*** INI route configuration


    route[register] = users/register


    route[login] = users/login


    route[logout] = users/logout


    ...


    route[thumbnails/:id] = files/thumbnails/:id


    route[files/delete/:id] = files/delete/:id


    route[files/undelete/:id] = files/undelete/:id


    Exercises


    1\. In this chapter, we created all the routes our example application requires.
    Now try creating a route that uses a username to invoke the users/profile action.


    2\. Having all these routes without any controllers and actions isn’t very helpful
    to us. Try creating a controller and action to handle a few of the routes we defined.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Chapter 23**


    **CodeIgniter: MVC**


    We have our work cut out for us, with CodeIgniter. It does provide us with controllers,
    models, and views with which to build all the functionality our social network
    needs, but they are little more than empty containers.


    We have grown accustomed to have an ORM in our models, yet CodeIgniter provides
    none of this. We are also used to having autoloaded classes within our controllers,
    yet CodeIgniter makes us load our own classes. We are used to a rich templating
    language in our views, yet CodeIgniter provides a stunted template parser and
    even encourages PHP directly in view templates.


    Goals


    • We need to recognize the differences between our framework and CodeIgniter when
    it comes to creating the controllers, models, and views for our example application.


    • We need to create the models for users, friends, files, and messages.


    • We need to create the corresponding views and controllers.


    Differences'
