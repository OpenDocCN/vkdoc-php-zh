- fmt: "### Figure 11-1  \nPHP sessions store a unique identifier as a cookie in the\
    \ browser  \n\nA matching file, which contains the same jumble of letters and\
    \ numbers as part of its filename, is created on the web server, as shown in Figure\
    \ [11-2](#332054_4_En_11_Chapter.xhtml#Fig2).  \n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Fig2_HTML.jpg](images/332054_4_En_11_Chapter/332054_4_En_11_Fig2_HTML.jpg)\
    \  \n\n### Figure 11-2  \nThe content of the cookie identifies the session data\
    \ stored on the web server  \n\nWhen a session is initiated, the server stores\
    \ information in session variables that can be accessed by other pages as long\
    \ as the session remains active (normally until the browser is closed). Because\
    \ the session ID is unique to each visitor, the information stored in session\
    \ variables cannot be seen by anyone else. This means sessions are ideal for user\
    \ authentication, although they can be used for any situation where you want to\
    \ preserve information for the same user when passing from one page to the next,\
    \ such as with a multipage form or a shopping cart.  \n\nThe only information\
    \ stored on the user’s computer is the cookie that contains the session ID, which\
    \ is meaningless by itself. This means private information cannot be exposed simply\
    \ by examining the contents of this cookie.  \n\nThe session variables and their\
    \ values are stored on the web server. Figure [11-3](#332054_4_En_11_Chapter.xhtml#Fig3)\
    \ shows the contents of a simple session file. As you can see, it’s in plain text,\
    \ and the content isn’t difficult to decipher. The session shown in the figure\
    \ has one variable: `name`. The variable’s name is followed by a vertical pipe,\
    \ then the letter “s”, a colon, a number, another colon, and the variable’s value\
    \ in quotes. The “s” stands for string, and the number indicates how many characters\
    \ the string contains. So, this session variable contains my name as a string\
    \ that is five characters long.  \n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Fig3_HTML.jpg](images/332054_4_En_11_Chapter/332054_4_En_11_Fig3_HTML.jpg)\
    \  \n\n### Figure 11-3  \nThe details of the session are stored on the server\
    \ in plain text  \n\nThis setup has several implications. The cookie containing\
    \ the session ID normally remains active until the browser is closed. So, if several\
    \ people share the same computer, they all have access to each other’s sessions\
    \ unless they always close the browser before handing over to the next person,\
    \ something over which you have no control. So, it’s important to provide a logout\
    \ mechanism to delete both the cookie and the session variables, keeping your\
    \ site secure. You can also create a timeout mechanism, which automatically prevents\
    \ anyone from regaining access after a certain period of inactivity.  \n\nStoring\
    \ session variables in plain text on the web server is not, in itself, a cause\
    \ for concern. As long as the server is correctly configured, the session files\
    \ cannot be accessed through a browser. Inactive files are also routinely deleted\
    \ by PHP (in theory, the lifetime is 1,440 seconds—24 minutes—but this cannot\
    \ be relied upon). Nevertheless, it should be obvious that if an attacker manages\
    \ to compromise the server or hijack a session, the information could be exposed.\
    \ So, although sessions are generally secure enough for password-protecting parts\
    \ of a web site or working with multipage forms, you should never use session\
    \ variables to store sensitive information, such as passwords or credit card details.\
    \ As you’ll see in “Using Sessions to Restrict Access” later in this chapter,\
    \ although a password is used to gain access to a protected site, the password\
    \ itself is stored (preferably hashed) in a separate location and not as a session\
    \ variable.  \n\n**Note**  \nHashing is a one-way process that scrambles plain\
    \ text to produce a unique message digest. It’s frequently confused with encryption,\
    \ which allows the encrypted text to be decrypted. When hashing is executed correctly,\
    \ there is no way of reversing the process to reveal the original password.  \n\
    \nSessions are supported by default, so you don’t need any special configuration.\
    \ However, sessions won’t work if cookies are disabled in the user’s browser.\
    \ It is possible to configure PHP to send the session ID through a query string,\
    \ but this is considered a security risk.  \n\n## Creating PHP sessions  \n\n\
    Just put the following command in every PHP page that you want to use in a session:\
    \  \n\n```  \nsession_start();  \n```  \n\nThis command should be called only\
    \ once in each page, and it must be called before the PHP script generates any\
    \ output, so the ideal position is immediately after the opening PHP tag. If any\
    \ output is generated before the call to `session_start()`, the command fails\
    \ and the session won’t be activated for that page. (See “The ‘Headers already\
    \ sent’ error” section later for an explanation.)  \n\n## Creating and Destroying\
    \ Session Variables  \n\nYou create a session variable by adding it to the `$_SESSION`\
    \ superglobal array in the same way you would assign an ordinary variable. Say\
    \ you want to store a visitor’s name and display a greeting. If the name is submitted\
    \ in a login form as `$_POST['name']`, you assign it like this:  \n\n```  \n$_SESSION['name']\
    \ = $_POST['name'];  \n```  \n\n`$_SESSION['name']` can now be used in any page\
    \ that begins with `session_start()`. Because session variables are stored on\
    \ the server, you should get rid of them as soon as they are no longer required\
    \ by your script or application. Unset a session variable like this:  \n\n```\
    \  \nunset($_SESSION['name']);  \n```  \n\nTo unset *all* session variables—for\
    \ instance, when you’re logging someone out—set the `$_SESSION` superglobal array\
    \ to an empty array, like this:  \n\n```  \n$_SESSION = [];  \n```  \n\n**Caution**\
    \  \nDo not be tempted to try `unset($_SESSION)`. It works all right—but it’s\
    \ a little too effective. It not only clears the current session but also prevents\
    \ any further session variables from being stored.  \n\n## Destroying a session\
    \  \n\nBy itself, unsetting all the session variables effectively prevents any\
    \ of the information from being reused, but you should also invalidate the session\
    \ cookie like this:  \n\n```  \nif (isset($_COOKIE[session_name()])) {  \n   \
    \ setcookie(session_name(), \", time()-86400, '/');  \n}  \n```  \n\nThis uses\
    \ the function `session_name()` to get the name of the session dynamically and\
    \ resets the session cookie to an empty string and to expire 24 hours ago (86,400\
    \ is the number of seconds in a day). The final argument (`'/'`) applies the cookie\
    \ to the whole domain.  \n\nFinally, close the session with the following command:\
    \  \n\n```  \nsession_destroy();  \n```  \n\nThis function is rather poorly named.\
    \ It simply closes the session. It doesn’t destroy any of the session variables\
    \ or unset the session cookie. It’s important to invalidate the session cookie\
    \ and close a session to avoid the risk of an unauthorized person gaining access\
    \ either to a restricted part of the site or to any information exchanged during\
    \ the session. However, a visitor may forget to log out, so it’s not always possible\
    \ to guarantee that the session will be properly closed, which is why it’s so\
    \ important not to store sensitive information in a session variable.  \n\n**Note**\
    \  \nPHP 7 doesn’t support `session_register()` or `session_unregister()` often\
    \ found in old scripts.  \n\n## Regenerating the session ID  \n\nWhen a user changes\
    \ status, such as after logging in, it’s recommended as a security measure to\
    \ regenerate the session ID. This changes the random string of letters and numbers\
    \ that identify the session but preserves all the information stored in session\
    \ variables. In *Pro PHP Security, 2nd Edition* (Apress, 2010, ISBN 978-1-4302-3318-3),\
    \ Chris Snyder and Michael Southwell explain that “the goal of generating a fresh\
    \ session ID is to remove the possibility, however slight, that an attacker with\
    \ knowledge of the low-level security session might be able to perform high-security\
    \ tasks.”  \n\nTo regenerate the session ID, simply call `session_regenerate_id()`\
    \ and redirect the user to another page or reload the same one.  \n\n## The “Headers\
    \ already sent” error"
