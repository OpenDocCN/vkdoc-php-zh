    \ 10/31/06 10:07 PM Page 267\n\n# CHAPTER 8\n\n## The Shopping Cart\n\n欢迎进入开发的第二阶段！在此阶段，您将开始改进已有的、功能完善的电子商务网站，并添加新功能。\n\
    \n那么，具体可以改进哪些方面呢？如果您快速浏览一下网络上的热门电子商务网站，不难找到答案。它们为用户提供个性化体验、产品推荐、记住客户偏好，并拥有许多其他功能，使网站令人难忘，并让用户不购买些东西就难以离开。\n\
    \n在开发的第一阶段，您大量依赖第三方支付处理器（PayPal）提供的集成购物车，因此没有在数据库中记录任何购物车或订单信息。目前，您的网站无法显示“最受欢迎”产品列表或任何关于已售产品的信息，因为在此阶段，您并未追踪售出的产品。这使得实施这些改进变得不可能。\n\
    \n显然，将订单信息保存在数据库中是您的首要任务。事实上，您接下来想要实现的大多数功能都依赖于已售产品的记录。为了实现这一功能，在本章中，您将实现一个自定义购物车，它将数据存储在本地`hatshop`数据库中。与您无法控制且难以保存到数据库中进行进一步处理和分析的PayPal购物车相比，这将为您提供更大的灵活性。使用自定义购物车时，当访客点击某个产品的“添加到购物车”按钮时，该产品将被添加到访客的购物车中。当访客点击“查看购物车”按钮时，将显示如图8-1所示的页面。\n\
