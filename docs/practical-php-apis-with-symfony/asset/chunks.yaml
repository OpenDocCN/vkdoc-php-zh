    \  OperationRequiresUserInterface) {\n            $user = $this->em->getRepository(User::class)->findOneByEmail($message->user);\n\
    \            $apiOperation->handler->setUser($user);\n        }\n        $apiOutput\
    \ = $apiOperation->handler->perform($message->operationInput);\n        $this->eventDispatcher->dispatch(\n\
    \            new OperationPerformedEvent($apiOperation->metadata, $message->operationInput,\
    \ $apiOutput->data, $user),\n        );\n    }\n}\n```\n\nWe have injected the\
    \ Symfony event dispatcher service and, after getting the operation result, we\
    \ use the `dispatch` method to trigger the event. After triggered, the `OperationSubscriber`\
    \ will detect the fired event and will react to it. We have also initialized the\
    \ user with the null value to avoid a “non-defined variable” error when passing\
    \ it to the event constructor.\n\n### Conclusion\n\nTo finish this chapter, we\
    \ have learned how to dispatch an event after a background operation finishes\
    \ so that we can notify the user. In the next chapter, we will implement the necessary\
    \ mechanisms so that an endpoint can only execute operations related to its context.\n\
    \n# 4. Context-Specific Operations\n\nThroughout the previous chapters, we have\
