    \ with the `__construct()` function.\n\nIn the App helper, insert the contents\
    \ of Listing 9-8.\n\n**Listing 9-8.** *The* `__construct()` *Function in the App\
    \ Helper*\n\n```php\n1 function __construct() {\n2     parent::__construct();\n\
    3     $this->loadConfig();\n4 }\n```\n\nThis function will be called when any\
    \ helper is included in a controller. Line 2 makes sure that all the default constructions\
    \ of the Helper object are performed first. Then, on line 3 you’ve included the\
