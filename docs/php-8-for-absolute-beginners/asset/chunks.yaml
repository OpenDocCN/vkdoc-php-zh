  trans: "\n再次强调，我们可以使用一些 CSS，但目前我们已经拥有一个功能性的博客，允许用户选择查看更详细的信息。它同时包含了管理员功能（添加新博客条目）和普通用户功能。现在是时候庆祝一下我们的进展了！自第一章以来，我们已经取得了长足的进步。但是……\n\
    \n**练习**：更新项目，通过添加本章前面类似代码，使用相同的 CSS 样式表来专业地设计所有条目的显示效果以及单个条目的详细显示效果。向样式表中添加 CSS，使所有当前视图都能以类似的专业用户友好设计进行显示。\n\
    \n### 代码异味：重复代码\n\n你闻到了吗？我们的代码中传来了一股难闻的气味。这是每个程序员都知道的典型代码异味之一。随着你编程能力的提升，你应该学会避免这类问题。\n\
    \n> **注意**  \n> 可以在[`http://en.wikipedia.org/wiki/Code_smell`](http://en.wikipedia.org/wiki/Code_smell)找到一份长长的典型代码异味列表。\n\
    \n重复代码是指*相同或相似的代码出现在多个地方*。你已经知道在哪里可以闻到这种味道了吗？它就在 `models/Newest_Blog_Entry_Table.class.php`\
    \ 文件中。下面是一个例子：\n\n```\n//models/Blog_Entry_Table.class.php 的部分代码\npublic function\
    \ getEntry( $id ) {\n$sql = \"SELECT entry_id, title, entry_text, date_created\n\
    FROM blog_entry\nWHERE entry_id = ?\";\n$statement = $this->db->prepare( $sql\
    \ );\n$data = array( $id );\ntry{\n$statement->execute( $data );\n} catch (Exception\
    \ $e) {\n$exceptionMessage = \"You tried to run this sql: $sql \nException: $e\"\
    ;\ntrigger_error($exceptionMessage );\n}\n$model = $statement->fetchObject();\n\
    return $model;\n}\n```\n\n在 `Newest_Blog_Entry_Table` 类中还有几个类似的方法。它们都 `prepare()`\
    \ 一个 `PDOStatement` 并 `try()` 去 `execute()` 它。在这三个方法中，我们都可以找到许多几乎相同的代码行。这很糟糕！\n\
    \n### 遵循 Curly 法则保持 DRY\n\n重复代码不好，原因有很多。其一是不够高效；我们只是使用了比必要更多的代码行。代码不必要地冗长。更长的代码不可避免地会导致更多潜在错误。更少的代码意味着更少的出错机会。重复代码不好的另一个原因是它会随着时间的推移使程序的维护变得复杂。随着时间的推移，代码极有可能需要更新。如果代码在多个不同的方法中完全相同或极其相似，那么可能所有这些方法都需要进行更改。我们应该始终创建尽可能易于维护的代码。\n\
    \n我们可以将重复的代码放在一个独立的方法中，这样对代码的任何修改都可以在一个地方完成。然后每个方法都可以调用这个新方法。这减少了维护时间并提高了可靠性。\n\
    \n这实际上只是遵循 Curly 法则（或至少是 Curly 法则的一个变体）进行编码的另一个例子。Curly 的原始法则是：*只做一件事*。这个特定的变体应该是：*仅做一次一件事*。还有一种极客的说法：保持\
    \ DRY。*DRY* 是“don’t repeat yourself”（不要重复自己）的缩写。\n\n### 使用 Curly 法则进行重构\n\n*重构*是在不改变代码功能的前提下修改代码的过程。这对程序员来说是一件大事。每当我们意识到项目需求已经超出了代码架构，或者换句话说，当代码架构无法以优雅的方式支持项目所需的功能时，我们都应该重构代码。简单来说，当我们在多个地方发现重复的逻辑时，就需要修复它。\n\
    \n是时候重构 `Newest_Blog_Entry_Table` 类了，让它变得更 DRY。让我们从将准备 SQL 语句的代码封装到一个独立的方法开始。\n\
    \n```\n//$sql 参数必须是 SQL 字符串\n//$data 必须是用于 SQL 的动态数据数组\nprivate function executeSQL\
    \ ( $sql, $data) {\n//创建一个 PDOStatement 对象\n$statement = $this->db->prepare( $sql\
    \ );\ntry{\n//使用动态数据并执行查询\n$statement->execute( $data );\n} catch (Exception $e)\
    \ {\n$exceptionMessage = \"You tried to run this sql: $sql \nException: $e\";\n\
    trigger_error($exceptionMessage);\n}\n//返回 PDOStatement 对象\nreturn $statement;\n\
    }\npublic function executeSQL ( $sql, $data) {\n```\n\n这个新方法接受 `$sql` 中的预处理语句和从另一个程序或方法调用时要放入预处理语句的数据数组\
    \ `$data`。然后它以我们在 Blog Entry 类中包含的其他方法中发现的方式使用这些信息。\n\n声明了新方法后，我们可以重构其中一个现有方法，使其使用这个新方法。\n\
    \n```\npublic function getEntry( $id ){\n$sql = \"SELECT entry_id, title, entry_text,\
    \ date_created\nFROM blog_entry\nWHERE entry_id = ?\";\n$data = array($id);\n\
    //调用新的 DRY 方法\n$statement = $this->executeSQL($sql, $data);\n$model = $statement->fetchObject();\n\
    return $model;\n}\n清单 7-21\nUpdated_Blog_Entry_Table.class.php 的 getEntry 方法\n\
    ```\n\n新的 `executeSQL()` 方法使 `getEntry()` 方法稍微短了一些。代码也更容易理解，因为它只创建了预处理语句和数组，然后调用了\
    \ `executeSQL` 方法。接着它获取结果并返回。\n\n有一个小的语法细节需要注意。看到我们如何在一个方法调用同一个类中声明的另一个方法时使用 `$this`\
    \ 关键字了吗？这与使用 `$this` 访问属性并没有太大的不同。在这两种情况下，`$this` 都是对象对自身的引用。这是面向对象中表达“我的”的方式。\n\
    \n让我们重构 `saveEntry()` 方法。\n\n```\npublic function saveEntry ( $title, $entry )\
    \ {\n$entrySQL = \"INSERT INTO blog_entry ( title, entry_text )\nVALUES ( ?, ?)\"\
    ;\n$formData = array($title, $entry);\n//更改从这里开始\n//$this 是对象表达“我的”的方式\n//所以 $this->executeSQL\
    \ 调用 Blog_Entry_Table 的 executeSQL 方法\n$entryStatement = $this->executeSQL( $entrySQL,\
    \ $formData );\n//更改结束\n}\n清单 7-22\nUpdated_Blog_Entry_Table.class.php 的 saveEntry\
    \ 方法\n```\n\n最后，让我们重构 `getAllEntries()` 方法。\n\n```\npublic function getAllEntries\
    \ () {\n$sql = \"SELECT entry_id, title, SUBSTRING(entry_text, 1, 150) AS intro\
    \  FROM blog_entry\";\n$statement = $this->executeSQL($sql);\nreturn $statement;\n\
    }\n清单 7-23\nUpdated_Blog_Entry_Table.class.php 的 getAllEntries 方法\n```\n\n这里有一个小问题。我们只需要\
    \ SQL 字符串，而不需要数组来检索所有记录，因为我们没有使用预处理语句。然而，当我们调用 `executeSQL()` 时，它需要两个参数。我们只想传递一个。\n\
    \n有时，我们希望用一个参数调用 `executeSQL()`，有时又希望用两个参数调用它。第二个参数需要是可选的。幸运的是，PHP 有一种非常简单的方法使参数成为可选参数。我们只需为参数声明一个默认值，如果没有传递参数，就会使用这个默认值。让我们更新\
    \ `executeSQL` 方法来允许这样做。\n\n```\nprivate function executeSQL ( $sql, $data = NULL\
    \ ){\n//代码更改结束\n$statement = $this->db->prepare( $sql );\ntry{\n$statement->execute(\
    \ $data );\n} catch (Exception $e){\n$exceptionMessage = \"You tried to run this\
    \ sql: $sql \nException: $e\";\ntrigger_error($exceptionMessage );\n}\nreturn\
    \ $statement;\n}\n清单 7-24\nUpdated_Blog_Entry_Table.class.php 的 executeSQL 方法\n\
    ```\n\n在上述代码中，参数 `$data` 获得了默认值 `NULL`。因此，如果调用 `executeSQL()` 时没有提供第二个参数，那么创建的\
    \ `PDOStatement` 对象将以 `NULL` 执行。不会有动态值替换预处理语句中的占位符。这正是我们想要的，因为这条语句的 SQL 中没有占位符。\n"
- fmt: '您可以访问[`www.w3schools.com/php/php_functions.asp`](http://www.w3schools.com/php/php_functions.asp)来了解更多关于函数参数默认值的知识。


    在其他情况下，当使用两个参数调用`executeSQL()`时，第二个参数将用于用实际值替换SQL占位符。在代码中使用可选参数是一个非常强大的概念。在将近乎重复的代码封装到一个单独的方法中时，这通常会带来简洁的解决方案。


    **注意**：对以下文件进行了微小改动以正确使用新的`Blog Entry Table`类。

    `updated-entries-html.php`, `updatedblog.php`, `updatedindex.php`


    我们可以通过在浏览器中执行`updatedindex.php`来测试我们的改动。当显示所有条目并为单个条目检索更多信息时，输出结果将是相同的。请记住：重构就是在不改变代码行为的前提下修改代码。因此，成功的测试可以确认代码的行为与重构前完全一致。重构的唯一目的是使代码更易于维护和更高效。


    ## 安全编程


    你可能已经注意到，`executeSQL()`方法是`private`而非`public`的。它是`Blog Entry Table`类的一个脆弱成员。它只应在类内部被调用，并且只能由该类中的其他方法调用。它当然不应被类外部的代码调用。

    `executeSQL()`方法是其他方法使用的*子方法*。此方法对数据库表中的数据执行实际的更改。它非常容易受到黑客攻击。因此，它需要受到保护，以防被类外部的任何尝试所使用。简单地将其设置为`private`就提供了这种额外的保护。它只能被类本身内部的方法使用。


    请记住：单一职责原则（也称为Curly定律）适用于类。一个类应只有一个目的，其所有属性和行为都应严格与该目的保持一致。具有单一职责的类比具有多个职责的类更简单，而简单的类比复杂的类更容易使用。通过使用`private`访问修饰符隐藏一些属性和方法，我们提供了一个更简单、更易于使用的公共接口。因此，作为经验法则，默认使用`private`，在需要时再使用`public`。


    **注意**：还有第三个访问修饰符：`protected`。在PHP中，它与`private`类似，但可以通过*继承*与子类共享。你可以在[`www.killerphp.com/tutorials/object-oriented-php/`](http://www.killerphp.com/tutorials/object-oriented-php/)找到一篇很好的教程，涵盖继承、访问修饰符和其他核心OOP主题。


    ## 总结


    在本章中，我们创建了一个基本的博客。该博客提供了管理员创建新条目的功能，以及用户显示博客条目的功能。在此过程中，我们学习了预处理语句，并介绍了设计模式。我们还发现了如何重构重复代码。我们创建了一个`Blog
    Entry Table`类，它是一个数据网关，提供了从PHP代码到`blog_entry`数据库表的单一访问点。我们消除了糟糕的代码，并在此过程中生成了符合DRY原则的代码。


    虽然我们的代码提供了一个功能良好的博客，但它缺少一些关键组件。例如，我们无法更新或删除博客条目。接下来，我们将增强这个博客的功能。


    ## 项目


    1. 使用本章和前几章的设计实践，创建一个学生注册系统。该系统应接受学生信息（姓名、地址、出生日期和专业）并将信息保存到数据库中。系统还应显示所有已注册学生的姓名。每个学生姓名旁边应有一个链接，用于提供额外的学生信息。点击链接时，将显示姓名、地址、出生日期和专业。


    2. 使用MVC模式，创建一个用户可以请求更多信息的网页。该页面应接受用户的姓名、电子邮件、主题和详细描述。这些信息将存储在数据库中。创建管理员页面，以显示所有用户输入的主题。在每个主题旁边提供一个链接，用于显示用户的姓名、电子邮件和详细描述。作为额外挑战，请搜索[`www.php.net`](http://www.php.net)来了解如何使用PHP发送电子邮件。在用户提交信息后（除了将信息保存到数据库之外），向你的电子邮件地址发送一封电子邮件。


    ---


    # 8. 基础博客：条目与评论


    ## 目标


    完成本章后，你将能够：


    *   创建一个包含交互式HTML表单的视图

    *   创建一个控制器来处理来自表单的输入

    *   创建一个模型，用于使用数据库表保存和检索任何条目

    *   使用外键来关联数据库中的行和表注释

    *   使用继承来避免冗余代码

    *   创建一个搜索算法来查找数据库表中的数据


    在本章中，我们将对管理员模块和用户（博客）模块进行改进。我们将从管理员模块开始。


    管理员模块的第二次迭代将通过条目编辑器（前端控制器）更新和删除现有条目。在改进条目管理器的过程中，我们将从编写小型、非正式的代码测试开始。这些测试在添加额外代码之前检查控制器、模型和视图之间的信息逻辑流程，以避免使调试过程复杂化。将测试集成到开发过程中将提高整体代码质量并减少调试时间。


    ## 为管理员模块创建模型


    查看前一章中我们的管理员模块版本，我们可以清楚地看到已经有一些按钮可用于保存或删除现有条目。我们还可以看到缺少了一些东西。我们应该在哪里点击才能将现有条目加载到条目编辑器中，以便我们可以编辑或删除它呢？


    让我们开始我们的开发过程来解决这个问题，首先从发布商的网站复制文件。你可以选择复制`ch7`文件夹中的文件并进行修改，如下一段所述。但是，由于改动数量较多，不推荐这样做。如果你确实想涉足那片沼泽，请遵循以下说明。


    首先，创建一个`ch8`文件夹。在此文件夹下，创建一个`blog`文件夹。在`blog`文件夹下，创建`controllers`、`css`、`models`和`views`文件夹。在`controllers`文件夹下，创建一个`admin`文件夹。在`views`文件夹下，创建一个`admin`文件夹。然后按照下表所示，从`ch7`文件夹复制程序。


    | 原始名称 | 新名称 | 位置 |

    | :--- | :--- | :--- |

    | `newesteditor.php` | `editor.php` | `controllers/admin` |

    | `database.php` | `database.php` | `Models` |

    | `Page_Data.class.php` | `Page_Data.class.php` | `Models` |

    | `Updated_Blog_Entry_Table.class.php` | `Blog_Entry_Table.class.php` | `Models`
    |

    | `updated-admin-navigation.php` | `admin-navigation.php` | `views/admin` |

    | `insert-editor-html.php` | `editor-html.php` | `views/admin` |

    | `insertadminWithNavigation.php` | `admin.php` | `Blog` |

    | `newblog.css` | `blog.css` | `css` |

    | `page.php` | `page.php` | `views` |


