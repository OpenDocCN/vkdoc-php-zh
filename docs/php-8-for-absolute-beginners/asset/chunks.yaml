    This window represents the result of executing the code in the test3, the output
    is I am Thomas and I have a friend called Brennan.


    Figure 2-3


    test3.php output


    As mentioned in Chapter [1](#323857_3_En_1_Chapter.xhtml), the equal sign is an
    *assignment operator*. It tells the interpreter to take whatever is on the right-hand
    side, a string in these examples, and place it into the variable on the left-hand
    side. In many languages, we also need to tell the system what type of information
    will be stored, such as a string, number, or single character. PHP allows us to
    optionally declare *data types*.


    The operating system needs the data type to determine what set of bits to use
    to represent the data in memory. If a data type is not declared, PHP will look
    at the information first stored in the variable, strings in this example, to inform
    the operating system of the type of data being stored.


    #### A Variable Is a Placeholder


    Variables are used extensively in programming. They provide programs the flexibility
    to temporarily store data while the program is running and to change the data
    used whenever necessary. Let’s look at more details from the previous listing.


    ```

    echo "I am $myName and I have a friend called $friendsName.";

    ```


    When the program was executed, the variable $friendsName displayed Brennan and
    the variable $myName displayed Thomas. The information displayed replaced each
    corresponding PHP variable in the original string.


    Did you notice that we had some HTML code within the string? Remember that the
    results of the execution of PHP code are sent to the browser. The completed string,
    including the <p> tags, is sent to the browser to be interpreted. If we view the
    source code within the browser, we will see that the <p> tags exist and have been
    interpreted. We can pass any HTML, CSS, or even JavaScript code to the browser
    to be interpreted by including it in an echo string. We will soon see great benefits
    to using this technique.


    In some other programming languages, a variable cannot be contained within a string.
    The string has to be broken apart, as shown in the following line.


    ```

    echo "I am $myName and I have a friend called " . $friendsName" . ".";

    ```


    The period is a *string concatenator* character, which allows us to connect multiple
    strings together. We can replace our previous code line with this example, and
    it will produce the same result. However, hopefully, you can see that it becomes
    much more of a problem to keep up with all the periods and quotes. Debugging becomes
    more difficult. Thank you, PHP developers, for making our job easier!


    #### Valid PHP Variable Names


    In PHP, all variables must begin with a dollar sign character ($). Variable names
    are case sensitive. Variables can also contain underscores (_). Usually, when
    we create a variable, we start with an alphabetic character. However, some special
    variables begin with underscores.


    ### Program Design and Logic


    When creating variable names, be consistent. Each programmer has their own style
    in designing names; the key is to use the same style throughout your program.
    You may prefer camel hump ($myName), underscores ($my_name), a combination ($my_Name),
    or a different technique. All are acceptable. Some programmers will also include
    the type of data stored within the name ($stringMyName) to allow easier debugging.
    For readability, we suggest using names that are meaningful. As you note in our
    simple examples, so far, we did not name our variables $name1 or $name2\. We provided
    some meaning to the variable by using $myName and $friendsName. This allows anyone
    reviewing our code some understanding of what type of data will be stored. Remember,
    when creating larger programs, this will be important in helping to determine
    which variable relates to what areas of a program.


    Note


    You can actually use numbers in variable names but not in initial positions. So,
    `$1a` is an invalid variable name, whereas `$a1` is perfectly valid.


    ### Displaying PHP Errors


    On your journey toward learning PHP, you will produce code errors . It is easy
    to think that you have done something bad when you have written some erroneous
    PHP. In a sense, it is, of course, bad. You would probably prefer to write perfect
    PHP from the very start, but even experts sometimes make coding mistakes.


    In another sense, errors are a very good thing. Many such errors present a learning
    opportunity. If you understand the cause of an error, you are less likely to repeat
    it, and even if you do repeat it, you can easily correct the error if you recognize
    it.


    PHP error messages are not always displayed; it depends on your environment. Why
    are errors not always displayed? The simple answer is in a live environment, we
    don’t want to display errors to our users. This shows both poor programming on
    our part and might even cause a security breach.'
