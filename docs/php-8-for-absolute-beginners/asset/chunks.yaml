- fmt: '# Showing the Quiz Form


    To show the quiz form, we need to make a couple of minor changes to our index
    and navigation files. In the index file, we will change our include statement
    for the navigation to call an updated version.


    ```

    include_once "views/quiznavigation.php";

    ```


    > **Note**: In the new navigation file (`quiznavigation.php`), we will call the
    `quizform` program instead of the `quiz` program.


    ```

    Dynamic quiz

    ```


    Review the `indexquiz.php` and `navigationquiz.php` files to note these changes.


    ![Figure 3-11 Output from indexquiz.php using navigationquiz.php](images/323857_3_En_3_Chapter/323857_3_En_3_Fig11_HTML.jpg)


    This window represents by the localhost search on the Bing dynamic quiz learn
    personal home page.


    **Figure 3-11** Output from indexquiz.php using navigationquiz.php


    Try running this program and determine the results, after selecting a value in
    the drop-down list box. What did you discover? We are not, yet, using the value
    passed. We will soon fix this problem.


    ## The POST Method


    The first form used the `GET` method, but it is not the only possible HTTP method.
    There is another method called `POST`. The `POST` method has no defined maximum
    of characters – in fact, the `POST` method is not even limited to text. When using
    the HTTP `POST` method, it is even possible to upload files through a form. HTTP
    `POST` variables are not visible in the URL. They are sent hidden from view. This
    makes HTTP `POST` the perfect candidate for forms that have to deal with larger
    amounts of content and forms with sensitive information.


    ### Secure Programming


    Don’t confuse the hiding of sensitive information with the idea that the data
    is secure. `POST` does hide the information. However, it does not encrypt the
    information. Hackers can still gain access to the information passed. `POST` does,
    however, eliminate the user’s ability to bookmark a page that has URL variables.
    With the `POST` method, the variables are no longer contained in the URL string.


    ### Using the `$_POST` Superglobal


    Let’s use the superglobal called `$_POST` to process the form when it is submitted.
    Let’s update the quiz program to display our response.


    ```

    You clicked $answer";

    $response .= "

    Try quiz again?

    ";

    return $response;

    }

    ?>

    ```


    **Listing 3-14** newquiz.php


    ```

    $quizIsSubmitted = isset( $_POST[''quiz-submitted''] );

    ```


    Using the `isset` PHP function, the program first will determine if the user submitted
    the quiz. They have to click the submit button in the quiz form for the true part
    of the `if` statement to be executed.


    ### Program Design and Logic


    Programs should allow users to change their minds when selecting from a list of
    choices, especially if it is a quiz! By requiring the user to click a submit button
    after decisions have been made, the user can double-check their selections before
    committing their answers. Otherwise, the program would only go with their first
    choice.


    ```

    if ( $quizIsSubmitted ){

    $answer = $_POST[''answer''];

    $info = showQuizResponse( $answer );

    } else {

    include_once "views/newquizform.php";

    }

    ```


    If the user did click the submit button, the answer will be placed in `$answer`
    using `$_POST`. Then the value is passed into a function called `showQuizResponse`.
    If the user did not click the submit button, the program will display the form,
    until they click the submit button, or navigate somewhere else.


    ```

    function showQuizResponse( string $answer ) : string {

    $response = "You clicked $answer";

    $response .= "

    Try quiz again?

    ";

    return $response;

    }

    ```


    If the submit button was clicked, the function accepts the response (located in
    `$answer`) and builds a string (`$response`) which includes the answer selected
    and a link asking the user if they want to try the quiz again. This string is
    returned by the function.


    ```

    $info = showQuizResponse( $answer );

    ```


    The returned string is placed into `$info`. The index program (`indexnewquiz.php`)
    will then display the contents of `$info`.


    > **Note**: Minor changes have been made to `indexnewquiz.php`, `newquiznavigation.php`,
    and `newquizform.php` to call the new versions of these programs. However, no
    logic changes have taken place.


    ![Figure 3-12 Results from clicking yes](images/323857_3_En_3_Chapter/323857_3_En_3_Fig12_HTML.jpg)


    This window represents when the admin clicks yes for the previous window post
    bar.


    **Figure 3-12** Results from clicking yes


    **Exercise**: Adjust the `newquizform.php` program to ask more than one question.
    Adjust the `indexnewquiz.php` program to display the responses to all the questions
    asked.


    ## `$_POST` Is an Array


    We stated that `$_GET` is a superglobal array. `$_POST` is another superglobal
    array. But what is an array really? Basically, an *array* can hold multiple items.
    Each item is stored under an index. In PHP, the index can be numeric, or it can
    be a string. Arrays with string indexes are called *associate arrays*. `$_POST`
    and `$_GET` create associative arrays to hold the values that are passed from
    one program to another. When we retrieve the values, we are accessing them from
    the associative array that PHP created in memory.


    We can create our own associative arrays. Let’s look at an example.


    ```

    Listing 3-15

    testAssocArray.php

    ```


    If we run this program in our browser, we will see “My name is Thomas.” In this
    example, `$my` is an associate array. We can see that it holds a collection of
    data stored in the same name (`$my`) but with different indexes (`name`, `year-of-birth`,
    `height`). In order to retrieve data from an array, we must use the array name
    with an index. “Thomas” is stored in array `$my` under the index `[''name'']`.
    PHP allows the storage of different types of data within the same array. In our
    example, two strings and an integer are stored. Remember, PHP usually determines
    data types when the first values are stored. Thus, the data types are actually
    determined after the array has already been initially created. In many other programming
    languages, arrays are restricted to one data type which must be declared when
    the array is created.


    It can often be handy to inspect all items in an array. PHP has a function to
    do just that. It is called `print_r()`. Here’s one way to use it.


    ```

    ";

    $out .=print_r($my, true);

    $out .= "";

    echo $out;

    ```


    **Listing 3-16** printAssocArray.php


    If we run this code, we will see every index of `$my` and its corresponding value.


    ![Figure 3-13 Output from printAssocArray.php](images/323857_3_En_3_Chapter/323857_3_En_3_Fig13_HTML.jpg)


    This window represents how the code is written for the print Assoc array.


    **Figure 3-13** Output from printAssocArray.php


    Arrays can be very helpful, because they allow us to group items together. The
    `$_GET` and `$_POST` arrays are provided by PHP to give us easy access to all
    data encoded with the HTTP methods `GET` and `POST`. Let’s update our quiz program
    to look at the associate array that is created.


    ```

    ";

    $info .= print_r($_POST, true);

    $info .= "";

    } else {

    include_once "views/printnewquizform.php";

    }

