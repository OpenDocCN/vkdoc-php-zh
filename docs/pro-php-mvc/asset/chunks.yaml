    \n## Chapter 17 ■ Sharing\n\n### Questions\n\n1.  Error pages are a common feature\
    \ of most applications. Why do we add the logic to display them in the application\
    \ bootstrap file?\n2.  Why is it important not to use a Template or View instance\
    \ to render the error pages?\n3.  We created a large array of exception classes\
    \ in the bootstrap file. Wouldn’t this be better in a configuration file?\n4.\
    \  When we wanted to get replies, or check whether another user was our friend,\
    \ we did so via model methods. Why not just check that sort of thing in the view\
    \ or the controller?\n\n### Answers\n\n1.  Yes, error pages are a common feature\
    \ of most of today’s applications. However, the means for handling errors are\
    \ not. We have chosen to raise exceptions in almost every instance where errors\
    \ prevent the normal functioning of the application. For this reason, and in order\
    \ to present the correct error pages, we inspect the type of exception that has\
    \ been raised. How other applications handle their errors might differ. For this\
    \ reason, the code is no longer application-agnostic, and the bootstrap becomes\
    \ the most reasonable place for this logic.\n2.  We use an include statement to\
    \ avoid any possible errors with using a Template or View instance. This is similar\
    \ to how our testing code resides in the public folder. The more framework code\
    \ required for handling error pages, the less we can afford for errors to occur\
    \ within that code. The simplest solution is, therefore, to use as little framework\
    \ code to test for/report on framework errors.\n3.  If an exception occurs in\
    \ the configuration classes, and the error pages require those classes, the error\
    \ pages won’t be displayed.\n4.  The main goal of MVC is the separation of concerns.\
    \ Fetching friends/replies are the concern of the model, and the corresponding\
    \ code should be contained in the applicable models.\n\n### Exercises\n\n1.  The\
    \ list of exception classes is quite specific, and quite lengthy. Now try specifying\
    \ which error page must be displayed (within the exception class) and modifying\
    \ the bootstrap file accordingly.\n2.  We created the `isFriend()`/`hasFriend()`\
    \ methods to be able to tell which actions to present the user, but when we wanted\
    \ to fetch a user’s friends, we did so in the controller. Now see if you can create\
    \ methods to fetch the friends straight from the User model.\n3.  To be able to\
    \ reply to earlier messages, we had to create individual forms for each top-level\
    \ message shared. The problem is that these forms are always visible, leading\
    \ to an ugly page. Now try employing some PHP/JavaScript to show/hide different\
    \ reply forms, by allowing the user to click a \"reply\" link.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Chapter 18\n\n## Photos\n\nUser profiles and status messages are only parts\
    \ of the puzzle of social networks. As a developer, you cannot go far without\
    \ encountering file uploads, and they form a large portion of many types of enterprise\
    \ applications, social networks included.\n\nHowever, file uploads are a strange\
    \ beast. The logic required to achieve them varies greatly from platform to platform.\
    \ Some platforms, such as ColdFusion, handle file uploads almost implicitly. Other\
    \ platforms, like ASP classic, are nightmarish when it comes to this area of development.\n\
    \nPHP, on the other hand, requires a bit of work, but after you have the hang\
    \ of it, file uploads are a breeze. We will begin this chapter with a brief introduction\
    \ to the logic required for file uploads, and then progress to adding file-upload\
    \ capabilities to our application.\n\n### Goals\n\n- We will review the processes\
    \ required to facilitate file uploads.\n- We will then add upload functionality\
    \ to the registration and settings pages (for profile photos).\n- Finally, we\
    \ will display these photos on the profile and the user search pages.\n\n### How\
    \ to Upload Files\n\nThe basic idea is that files need to get from the users to\
    \ the server. This happens in a few steps, and while the order is important, there\
    \ is plenty of room for adding extras, like validation for the following:\n\n\
    - The user posts a form, containing a file input with a selected file.\n- The\
    \ server checks for a posted form, then checks for a posted file.\n- If a file\
    \ was posted, the server checks whether it can move the file from temporary storage\
    \ to a permanent location.\n- If the file was moved, the server performs any postprocessing\
    \ on the file, such as returning the dimensions, modifying any relevant database\
    \ rows, and so forth.\n\nThese four simple steps can be represented with the code\
    \ shown in Listing 18-1.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### Chapter 18 ■ Photos\n\n**Listing 18-1.** Uploading a File\n\n```php\nif\
    \ (isset($_FILES[\"photo_field\"]))\n{\n    $file = $_FILES[\"photo_field\"];\n\
    \    $newFile = \"path/to/permanent/file\";\n    $uploaded = move_uploaded_file($file[\"\
    tmp_name\"], $newFile);\n    if ($uploaded)\n    {\n        $meta = getimagesize($newFile);\n\
    \        // do something with the new file/metadata\n    }\n}\n```\n\nThis code\
    \ appears pretty simple, but how does it fit into our application? Let’s move\
    \ along to find out.\n\n### User Photos\n\nFor a start, we will have many users,\
    \ who are all allowed to upload their own photos. This means we can expect many\
    \ file uploads. It also means that we could probably benefit from storing a reference\
    \ to each upload within a database table.\n\nLet’s begin integrating the photo-upload\
    \ functionality into our application, by creating a new model that will serve\
    \ as a means to storing uploaded file references in the database. Take a look\
    \ at Listing 18-2 to see this new File model.\n\n**Listing 18-2.** The File Model\n\
    \n```php\nclass File extends Shared\\Model\n{\n    /**\n     * @column\n     *\
    \ @readwrite\n     * @type text\n     * @length 255\n     */\n    protected $_name;\n\
    \n    /**\n     * @column\n     * @readwrite\n     * @type text\n     * @length\
    \ 32\n     */\n    protected $_mime;\n\n    /**\n     * @column\n     * @readwrite\n\
    \     * @type integer\n     */\n    protected $_size;\n\n    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n    /**\n     * @column\n     * @readwrite\n     * @type integer\n     */\n\
    \    protected $_width;\n\n    /**\n     * @column\n     * @readwrite\n     *\
    \ @type integer\n     */\n    protected $_height;\n\n    /**\n     * @column\n\
    \     * @readwrite\n     * @type integer\n     */\n    protected $_user;\n}\n\
    ```\n\nThis model is similar to the Friend model we created in Chapter 17, in\
    \ that it has no validation. That is not because validation is unimportant to\
    \ us, but simply because it could complicate things at this stage. The File model\
    \ has fields for file name, mime type, file size, width, height, and user. With\
    \ the exception of the user field, all the fields relate to specific uploads,\
    \ and we will populate them after a file has successfully been uploaded.\n\nIf\
    \ this model is persisted to the database (using the `Connector->sync()` method),\
    \ it should produce a table like that shown in Listing 18-3.\n\n**Listing 18-3.**\
    \ The file Table\n\n```sql\nCREATE TABLE `file` (\n  `name` varchar(255) DEFAULT\
    \ NULL,\n  `mime` varchar(32) DEFAULT NULL,\n  `size` int(11) DEFAULT NULL,\n\
    \  `width` int(11) DEFAULT NULL,\n  `height` int(11) DEFAULT NULL,\n  `user` int(11)\
    \ DEFAULT NULL,\n  `id` int(11) NOT NULL AUTO_INCREMENT,\n  `live` tinyint(4)\
    \ DEFAULT NULL,\n  `deleted` tinyint(4) DEFAULT NULL,\n  `created` datetime DEFAULT\
    \ NULL,\n  `modified` datetime DEFAULT NULL,\n  PRIMARY KEY (`id`),\n  KEY `live`\
    \ (`live`),\n  KEY `deleted` (`deleted`)\n) ENGINE = InnoDB DEFAULT CHARSET =\
    \ utf8;\n```\n"
