    **Installing PostgreSQL**


    To install PostgreSQL, follow these simple steps. We tested these steps with PostgreSQL
    8.1, but you should download the latest available version of PostgreSQL.


    1. Visit `http://www.postgresql.org/`, and click the Downloads link from the menu.

    2. Under the Download Core Distribution box, click Via FTP.

    3. Select the binary directory from the list.

    4. Select the folder for the latest available stable version.

    5. Select `win32`.

    6. Download the installer file, which is named something like `postgresql-*version*.zip`.
    You will then probably be asked to select a mirroring location. Choose one close
    to your current location.

    7. Unzip the downloaded file, and execute the installer executable file.

    8. In the first setup screen, choose your language, and click Start.

    9. Use the default options in the first setup screens, but be sure to set the
    Account password in the Service configuration screen (see Figure A-2).


    **Figure A-2.** *Testing the PHP installation*


    10. After clicking Next, confirm the creation of the `postgres` user account in
    Windows. If you are warned about your password being weak, it’s probably safe
    to say No when asked about replacing it with a random password during development
    on your local machine.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    `648XAppA.qxd 11/19/06 1:45 PM Page 577`


    **577**


    A P P E N D I X A ■ I N S TA L L I N G A PA C H E , P H P, A N D P O S T G R E
    S Q L


    11. In the next screen, you’re asked to configure the database cluster. Choose
    the settings depending on your particular requirements. For example, it may be
    safe to choose the default encoding to UTF-8 if you intend to store text that’s
    not supported by the default encoding.

    12. Click Next, make sure the selected procedural language `PL/pgsql` is selected,
    and click Next again.

    13. In the Enable Contrib Modules screen, select `TSearch2`, which will be used
    for full-text searching, and click Next twice to install PostgreSQL.


    **Preparing Your Unix Playground**


    Almost all the Linux distributions include Apache, PHP, and PostgreSQL, however,
    you may have out-of-date versions of these programs. Before trying to download
    anything, you should check first whether you can find what you need on your system,
    online, or on the installation CDs of your Linux distribution. We don’t have high
    requirements for Apache and PostgreSQL, so you can do a binary installation for
    them, but you’ll have to compile PHP from sources to enable all the libraries
    you will need.


    **Installing Apache 2**


    The most common way to create an SSL-powered web server is to use Apache and OpenSSL.
    You probably have them installed on your system.


    You should first check whether you have OpenSSL RPMs installed on your system
    with the following command:


    `rpm -qa | grep openssl`


    If you don’t have OpenSSL, grab the following RPMs from a resource such as `http://www.rpmfind.net/`,
    and install them. Be sure to take the latest available versions.


    - `openssl-*version*.rpm`

    - `openssl-devel-*version*.rpm`


    We decided to build the latest Apache Web Server (version 2.2.3 at the moment
    of writing) from sources. First, you should download the latest Unix Apache source
    from `http://httpd.apache.org/download.cgi`, and uncompress it with something
    like this: `tar -zxvf httpd-2.2.3.tar.gz`


    Now you can move on to actually compile and install the Apache Web Server on your
    system. Go to the root of the Apache sources, and execute the following commands
    (you need to be logged in as `root` when executing `make install`):


    ```

    ./configure --prefix=/usr/local/apache2 --enable-so --enable-ssl --with-ssl --enable-auth-digest

    make

    make install

    ```


    `648XAppA.qxd 11/19/06 1:45 PM Page 578`


    **578**


    A P P E N D I X A ■ I N S TA L L I N G A PA C H E , P H P, A N D P O S T G R E
    S Q L


    To enable SSL, you’ll need to install an SSL certificate into Apache. If you host
    your application with a hosting company that offers SSL, you can do all testing
    on your development machine with a “fake” SSL certificate that you generate on
    your own. You can do this by making yourself a certificate authority. To generate
    your own certificate, you should follow some of the excellent tutorials you can
    find on the Internet, such as the one at `http://www.linux.com/howtos/SSL-Certificates-HOWTO/index.shtml`
    (you can also find many more using a simple web search). Otherwise, if you want
    to install an SSL certificate for production, you’ll need to get a “real” SSL
    certificate from a certification authority such as VeriSign, as explained in Chapter
    7.


    Make any changes you need in the `httpd.conf` configuration file, and then start
    your Apache server with:


    `/usr/local/apache2/bin/apachectl start`


    > **Note:** If you get errors such as “module access_module is built in and can’t
    be loaded,” try to comment out the `LoadModule` line from the `httpd.conf` that
    corresponds to the module that generated the error. An even better method is to
    try to comment out every module that you don’t need.


    Now load `http://localhost/` in your browser to make sure your Apache Web Server
    is up and running, and then browse to `https://localhost/` to test that you can
    also access Apache through SSL.


    **Installing PostgreSQL 8**


    Follow these steps to install PostgreSQL on your system:


    1. Download the PostgreSQL source code from `http://www.postgresql.org/ftp/source/`.
    For the purposes of this installation guide, we’re using `postgresql-8.1.5.tar.gz`,
    but you should download the latest available version instead.

    2. Unpack the archive with a command such as the following: `tar -zxvf postgresql-8.1.5.tar.gz`

    3. Change context to the `postgresql-8.1.5` folder: `cd postgresql-8.1.5`

    4. Execute the following command to prepare PostgreSQL to install to `/usr/local/pgsql`:
    `./configure --prefix=/usr/local/pgsql`

    5. Make sure you’re logged in as `root` (use the `su` command if necessary), and
    execute: `make install`

    6. For security reasons, PostgreSQL won’t allow `root` to start the server. Execute
    the following command to change the owner of all the files to `postgres`: `chown
    -R postgres:postgres /usr/local/pgsql`

    7. Log in as `postgres`, or use the `su` command, and then change the directory
    to `/usr/local/pgsql`: `cd /usr/local/pgsql`

    8. Initialize a database cluster with this command: `bin/initdb -D ./data`

    9. Start PostgreSQL with this command: `bin/pg_ctl -D ./data -l data/logfile start`

    10. Now that PostgreSQL is started, you need to create a database and another
    user before going any further. You should use a separate database for each of
    the projects to make things a little cleaner and easier to understand. You should
    also use separate users for each database. This keeps everything separate and
    “project a” won''t be able to modify any of “project b’s” data. To create a new
    user in PostgreSQL, it’s pretty simple. Just use the following command and then
    follow the prompts: `/usr/local/pgsql/bin/createuser`. The new user should not
    be able to create new databases or create new users. To create a database, it''s
    a little different: `/usr/local/pgsql/bin/createdb --owner=username databasename`


    **Installing pgAdmin III**


    `pgAdmin III` doesn’t ship with the Linux version of PostgreSQL, as it does with
    the Windows version. Keeping in mind to replace the file names with the actual
    ones in case you use newer versions, here are the steps you should follow to install
    `pgAdmin III` on your Linux machine.'
