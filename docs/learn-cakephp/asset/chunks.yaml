    ### 论点 #7：开发过程会破坏测试


    随着你在开发周期中不断添加新层，你同样需要维护你的测试。当代码发生变化时，相应的测试也应随之改变；否则，测试将会失败。不过，既然你修改了代码，你就应该知道如何修改测试。


    实际上，这正是拥有测试的优势之一。当我重构代码时，测试应该能够成功运行。如果我修改了代码的签名或返回值，测试会失败，或者也可能成功运行。如果失败，你就能看到代码在哪些地方可能会产生问题或
    bug。因此，它促进了安全的修改。


    ## 我们为什么要编写测试？


    测试能显著缩短测试时间，这最终会节省成本。测试有助于编写高质量的代码，并且是重构过程中的重要资产。它们将改变你对代码的思考方式。


    ### 测试功能


    当我们首次编写代码时，应该检查它是否真的实现了我们想要的功能。我们所有人都会这样做——无论有没有单元测试。实际上，`var_dump` 及其同类工具也算是一种测试。只是它们无法满足测试的真正目的。


    一段时间后，你必然需要对旧代码进行修改，要么是因为存在 bug，要么仅仅是因为你想优化之前的工作。在这种情况下，你也需要一些手段来测试代码是否依然满足你的需求。手动测试既枯燥、缓慢又低效。


    与任何其他测试系统相比，手动测试耗时都多得多，至少在你认真细致地操作时是如此。同一个方法可能在应用程序的许多地方被调用，你需要测试所有地方，以确保你的应用程序按预期工作。除此之外，你还应该列出可能的输入列表，例如“我应该用负数、零、字母、特殊字符来测试它。”
    也许在部署到生产环境之前，你忽略了测试所有情况。不，这种情况绝对不会发生！


    ### 重构


    重命名变量或函数可以提高代码的可读性。但你必须注意，重命名不会引入新的 bug 或冲突。修改方法的签名或返回值也是如此。测试能为你提供帮助。


    有时候，代码中会存在一些与代码目标毫无关联，或者根本不做任何事情的片段。显然，你想要移除这些代码，但之后你必须检查代码的主体部分是否仍然能正常工作。如果你的代码有测试覆盖，你就可以安全地移除那些不需要的代码片段，因为如果你移除了有用的部分，测试就会失败。


    在另一些时候，你可能知道自己的代码有问题，但不想花时间去修复。于是，你只是在代码中留下一段注释，比如 `// TODO: 如果 $num = 0 将会出错`。而一个失败的测试则要清晰得多。


    有句名言：“如果没坏，就别修它。” 你可能会问：我辛苦写出来的代码运行得好好的，你在说什么呢？但简单来说，这句话对于软件开发并不适用。重构是开发中非常重要的一部分。通过成功地重构代码，你最终会得到和没有重构时相同的结果，但你的代码将变得可复用、可维护、更快、更整洁，并且质量更高。


    ### 获取快速反馈


    快速反馈非常重要。开发人员没有时间点击每一个链接，以所有可能的顺序按每一个按钮，多次按浏览器的“返回”按钮，用各种数据（甚至是恶意数据）填写表单，或者部署新代码然后等待客户反馈。


    我认为 Firebug ( [`getfirebug.com`](https://getfirebug.com) ) 是一个很好的例子。我打开 HTML 选项卡并更改一些内容，我立刻就能在浏览器中看到结果。


    还有其他语言的工具，它们通过在每一个分号后或每次保存文件时实际运行测试来提供即时反馈。这些都是极其强大的开发工具。虽然 PHP 中没有这样的工具，但无论如何，测试是实现这一目标的最佳工具。


    ### 高质量的代码


    测试是在隔离环境中运行的。因此，通过运行一个测试，你正在验证一个不依赖于其他代码段的特定代码片段。但这很容易违反单一职责原则。测试为我们的代码编写过程增加了一个视角。更多内容可参见第
    3 章。


    ### 发挥大脑的最佳状态


    在压力之下，即使是最聪明的人（是的，甚至包括程序员）也会犯愚蠢的错误。


    你曾经写过像 `if(3 < 5)` 这样的代码吗？从来没有？我保证，你会的。即使是最微不足道的代码或代码变更，你也很可能会破坏某些东西。你是否总是放松？你是否总是有足够的时间编写代码？你的老板是否总是开心？你的客户是否总是耐心？你是否总是有明确的规格说明？你的孩子是否整夜安睡？如果答案是否定的，你就会犯愚蠢的错误。测试能帮助你以一种简单的方式检查你的代码。


    ### 节省时间和金钱


    正如我之前提到的，无论通过何种方式，你终究会测试你的代码。但你可以选择一种更有效的方法。你可以选择一种让你花更少时间修复 bug 和重构，而花更多时间实际编写代码的方法。节省时间很有趣——你总是可以把这些时间用来追你最喜欢的下一集电视剧——而节省时间也就意味着节省金钱。


    ## 总结


    在本章中，你学习了我们为什么要测试，什么是单元测试，以及反对它的论点是什么。由此，你了解到你可以节省维护代码的时间——因为几个月后的代码对你来说可能就像别人写的一样陌生——以及测试如何帮助你发挥大脑的最佳状态。


    # 3. 整洁代码


    ![A337704_2_En_3_Figa_HTML.jpg](img/A337704_2_En_3_Figa_HTML.jpg)


    我们的 API 似乎存在一些沟通问题


    谁在意代码呢？只要它能运行，那就没问题了。对吧？我不这么认为。


    有几个理由让你应该关注代码质量。


    首先，你代码的质量将决定软件的质量。如果你认为可以用混乱的代码构建出优秀的软件，那你是在做梦。其次，整洁代码节省时间。你花在阅读代码上的时间将多于编写它的时间。你团队中的其他人也会花相当一部分时间来阅读你的代码。你同样会花时间阅读别人的代码。整洁代码易于阅读，因此整洁代码能节省时间。第三，你的代码是你自身的反映。如果你不重视代码的质量，你就不会被录用。混乱的代码意味着你对自己或自己的作品没有坚持高标准。客户和雇主都要求质量。


    整洁代码是可维护的。它易于阅读和理解。这意味着它易于使用和修改。整洁代码是直截了当的。


    ## 如何编写整洁代码


    编写整洁代码不需要花费大量时间。编写整洁代码是一种习惯，在编写和重构过程中需要多加注意。幸运的是，这是一种可以学会的习惯。


    永远不要忘记：我们为机器和人编写代码。人更重要。


    以下是关于如何编写整洁代码的一些提示。当你在团队中工作时，至少应该明确这些选项。

    '
- fmt: '# Comments


    There are people who say that unit testing can be a substitute for comments. There
    are others who say “don’t comment—refactor.” Both approaches have their merits,
    but comments can be a great help to write better code.


    To learn when and what to comment takes time. I think the best approach is to
    view comments as Post-its in our code. So if something is not straightforward
    or takes some time to understand, comment it. For example, most of the time, I
    comment regular expressions. But don’t forget: you should update your comments
    on code change. Otherwise, you can run into misleading or confusing comments.


    Using PHPDoc (`www.phpdoc.org/`) is a best practice and is used by CakePHP’s core.
    PHPDoc makes it possible to generate documentation directly from your source code.
    It promotes standardized comments for all your classes and methods.


    # Naming


    We should name our classes, methods, variables, parameters, etc. Names should
    be descriptive and meaningful. “Foo” and “bar” work well in short code examples
    but can be very confusing in production code.


    When you are totally immersed in your code, a variable named `$lld` may be clear,
    but wouldn’t `$last_login_date` be a little bit more readable and easier to understand?


    By its conventions, CakePHP uses underscored names for database tables, field
    names, and view files. For class names, it uses CamelCased names. For variable
    and parameter names, you can choose any of these; however, just stick to one.
    So, if you prefer underscored variable names, underscore all of your variable
    names, and do not mix in CamelCased names.


    It is best to follow the PHP Standards Recommendations (PSR) (`www.php-fig.org/psr`).
    `PSR-1` recommends using CamelCased method names. Using verbs for method names
    is a best practice.


    # Methods


    Methods should do one, and only one, thing and do it well. This is the single
    responsibility principle. This means that methods should be short, which means
    that they will be easy to understand. There are developers who recommend a maximum
    of three lines of code.


    If a function accepts more than two arguments, it is a good candidate for refactoring.


    CakePHP’s ORM is a good example of using method chaining. It can significantly
    improve the readability of your code, or it can significantly mess it up. So,
    please learn from the good examples.


    # Code Formatting


    Historians say the bloodiest battle in history was that of Stalingrad, in 1942.
    They say this because they never attended a meeting at which developers try to
    agree on the code style that they are going to follow in a new project.


    Thanks to `PSR-2`, the battle is over, and we have a recommendation to follow.


    Code formatting covers indentation, where to place opening and closing brackets,
    where to put new lines, and more.


    # MVC


    As MVC (Model–View–Controller) stresses, do not mix model, controller, and view
    functionality in the same files or classes. This also helps to keep your code
    clean.


    Perhaps there are a lot of other things that you can do to ensure clean code,
    but to list and introduce all the options here is beyond the scope of this book.
    You can use clever tools, such as PHP Mess Detector (`https://phpmd.org/`), to
    help you to write clean code.


    # How Tests Help in Writing Clean Code


    Even if you use unit tests in your applications, you can still end up with messy
    code. Unit testing won’t do the work for you. I’ll cover this topic in more detail
    in Chapter `4`.


    ## Planning


    Planning is a very important part of creating great software, but people like
    me and you are often too impatient to plan everything down to the last detail.
    We like to get our hands dirty as soon as possible. Unfortunately, this kind of
    coding creates problems. Using unit tests encourages us to think things over (or
    plan) during development. If I want to add a new feature to a web application,
    I’ll certainly think about how it will function. Without at least this much planning,
    I won’t be able to write the code. When it runs, I’m finished—at least until someone
    detects a bug. When I write a test, I have to think about the possible and acceptable
    inputs, the output, and the return value. Writing tests helps us to think from
    a distance, on a more abstract level, and test-driven development (TDD) helps
    us to get the best out of it.


    ## Refactoring


    As long as your test doesn’t fail, you can be sure the code you’ve tested does
    what it should. Tests help to check if changes in the code have broken anything.
    Because unit tests run in isolation, they help to produce better, simpler code.


    With tests, you do not have to worry about changing a function’s signature or
    return values’ type. Tests will show where you have to apply changes for function
    calls.


    If your tests are not just a few lines, this may be a sign of a broken single
    responsibility principle in your code. This is often true if you change your test
    after refactoring your code. Remember this, and you will end up with cleaner code.


    # Summary


    In this chapter, I introduced the idea and importance of clean code. You learned
    a few principles to follow to ensure clean code and why naming or code formatting
    matters. Finally, you saw how unit tests can help in writing cleaner code.


    # 4. Test-Driven Development


    ![A337704_2_En_4_Figa_HTML.jpg](A337704_2_En_4_Figa_HTML.jpg)


    Let’s start to play by trying and doing.


    Developers who depend heavily on unit tests use a technique known as “test-driven
    development,” or TDD.


    TDD is a software development process whereby you write tests before you implement
    code. So, the tests guide the developer to write the code itself. TDD is a cyclical
    process, with 4+1 steps: write tests, write code, refactor, test again, and repeat
    the process again.


    ## PHP TDD Tools


    There are many tools that can be of great help in TDD with PHP.


    ### PHPUnit


    PHPUnit (`https://phpunit.de/`) is the de facto standard tool for unit testing
    and TDD for PHP. It is integrated into Cake, so you will become familiar with
    using it soon.


    There are other tools, however, that also have a growing community and provide
    support.


    ### Codeception


    Codeception (`http://codeception.com/`) has support for writing unit tests, functional
    tests, and acceptance tests. It is integrated into a few PHP development frameworks,
    such as Zend, Symfony, Laravel, and others.


    ### SimpleTest


    SimpleTest (`http://simpletest.org/`) is an easy-to-use framework with SSL, proxies,
    and authentication support. Users of JUnit will be familiar with its interface.


    ### Atoum


    Atoum (`https://github.com/atoum`) is a relatively new player that uses new PHP
    features introduced in PHP version 5.3.


    ### Selenium


    Selenium (`http://www.seleniumhq.org/`) is actually more comprehensive than the
    previously mentioned tools, as it is a sophisticated, robust system that automates
    browsers. With it, a web application as a whole can be tested.


    ## TDD Development Cycle


    TDD requires a different way of thinking and a different style of coding. Let’s
    see what it takes. With CakePHP, the subject at hand, you do not have to start
    from scratch. Its framework already includes a lot of great features. So, now
    we have to concentrate only on our application development.'
