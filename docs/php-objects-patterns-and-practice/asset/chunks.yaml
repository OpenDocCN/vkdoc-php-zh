- fmt: '## Summary


    As always, the patterns you choose to use will depend on the nature of your problem.
    I naturally gravitate toward a `Data Mapper` working with an identity object.
    I like neat automated solutions, but I also need to know I can break out of the
    system and go manual when I need to, while maintaining a clean interface and a
    decoupled database layer. I may need to optimize an SQL query, for example, or
    use a join to acquire data across multiple tables. Even if you’re using a complex
    pattern-based third-party framework, you may find that the fancy object-relational
    mapping on offer does not do quite what you want. One test of a good framework,
    and of a good home-grown system, is the ease with which you can plug your own
    hack into place without degrading the overall integrity of the system as a whole.
    I love elegant, beautifully composed solutions, but I’m also a pragmatist!


    Once again, I have covered a lot in this chapter. Here’s a quick rundown of the
    patterns we looked at and how you use them:


    - `Data Mapper`: Create specialist classes for mapping `Domain Model` objects
    to and from relational databases

    - `Identity Map`: Keep track of all the objects in your system to prevent duplicate
    instantiations and unnecessary trips to the database

    - `Unit of Work`: Automate the process by which objects are saved to the database,
    ensuring that only objects that have been changed are updated, and only those
    that have been newly created are inserted

    - `Lazy Load`: Defer object creation, and even database queries, until they are
    actually needed

    - `Domain Object Factory`: Encapsulate object creation functionality

    - `Identity Object`: Allow clients to construct query criteria without reference
    to the underlying database

    - `Query (Selection and Update) Factory`: Encapsulate the logic for constructing
    SQL queries

    - `Domain Object Assembler`: Construct a controller that manages the high-level
    process of data storage and retrieval


    In the next chapter, we take a welcome break from code, and I’ll introduce some
    of the wider practices that can contribute to a successful project.


    # Part III Practice


    # 14. Good (and Bad) Practice


    So far in this book, I have focused on coding, concentrating particularly on the
    role of design in building flexible and reusable tools and applications. Development
    doesn’t end with code, however. It is possible to come away from books and courses
    with a solid understanding of a language, yet still encounter problems when it
    comes to running and deploying a project.


    In this chapter, I will move beyond code to introduce some of the tools and techniques
    that form the underpinnings of a successful development process. This chapter
    will cover the following:


    - Third-party packages: Where to get them and when to use them

    - Build: Creating and deploying packages

    - Version control: Bringing harmony to the development process

    - Documentation: Writing code that is easy to understand, use, and extend

    - Unit testing: A tool for automated bug detection and prevention

    - Standards: Why it''s sometimes good to follow the herd

    - `Vagrant`: A tool that uses virtualization, so that all developers can work
    with a system that resembles a production environment, no matter their hardware
    or OS

    - Continuous integration: Using this practice and set of tools to automate project
    builds and tests, as well as to be alerted of problems as they occur


    ## Beyond Code


    When I first graduated from working on my own and took a place in a development
    team, I was astonished at how much stuff other developers seemed to have to know.
    Good-natured arguments simmered endlessly over issues of vital-seeming importance:
    Which is the best text editor? Should the team standardize on an integrated development
    environment? Should we impose a coding standard? How should we test our code?
    Should we document as we develop? Sometimes these issues seemed more important
    than the code itself, and my colleagues seemed to have acquired their encyclopedic
    knowledge of the domain through some strange process of osmosis.


    The books I had read on PHP, Perl, and Java certainly didn’t stray from the code
    itself to any great extent. As I have already discussed, most books on programming
    platforms rarely diverge from their tight focus on functions and syntax to take
    in code design. If design is off topic, you can be sure that wider issues such
    as version control and testing are rarely discussed. This is not a criticism—if
    a book professes to cover the main features of a language, it should be no surprise
    that this is all it does.


    In learning about code, however, I found that I had neglected many of the mechanics
    of a project’s day-to-day life. I discovered that some of these details were critical
    to the success or failure of projects I helped develop. In this chapter, and in
    more detail in coming chapters, I will look beyond code to explore some of the
    tools and techniques on which the success of your projects may depend.'
