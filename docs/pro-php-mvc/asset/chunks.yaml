    \ design pattern we used previously can be described as having one class that\
    \ provides a simple interface to a more complicated set of functionality. You\
    \ can read more about the façade pattern at [http://en.wikipedia.org/wiki/Facade_pattern](http://en.wikipedia.org/wiki/Facade_pattern).\n\
    \n## Rendering\n\nThe `View` class is only half the work required for automatically\
    \ rendering the correct view. We now need to use it within a modified `Controller`\
    \ class, in order for each action to render its own view. The changes needed to\
    \ the `Controller` are fairly extensive, so we will review each section. We begin\
    \ with a few embellishments on the previous `Controller` skeleton, as shown in\
    \ Listing 13-6.\n\n***Listing 13-6.*** Fleshing Out the Controller\n\n```\nnamespace\
    \ Framework\n{\n    use Framework\\Base as Base;\n    use Framework\\View as View;\n\
    \    use Framework\\Registry as Registry;\n    use Framework\\Template as Template;\n\
    \    use Framework\\Controller\\Exception as Exception;\n\n    class Controller\
    \ extends Base\n    {\n        /**\n         * @readwrite\n         */\n     \
    \   protected $_parameters;\n\n        /**\n         * @readwrite\n         */\n\
    \        protected $_layoutView;\n\n        /**\n         * @readwrite\n     \
    \    */\n        protected $_actionView;\n\n        /**\n         * @readwrite\n\
    \         */\n        protected $_willRenderLayoutView = true;\n\n        /**\n\
    \         * @readwrite\n         */\n        protected $_willRenderActionView\
    \ = true;\n\n        /**\n         * @readwrite\n         */\n        protected\
    \ $_defaultPath = \"application/views\";\n\n        /**\n         * @readwrite\n\
    \         */\n        protected $_defaultLayout = \"layouts/standard\";\n\n  \
    \      /**\n         * @readwrite\n         */\n        protected $_defaultExtension\
    \ = \"html\";\n\n        /**\n         * @readwrite\n         */\n        protected\
    \ $_defaultContentType = \"text/html\";\n\n        protected function _getExceptionForImplementation($method)\n\
    \        {\n            return new Exception\\Implementation(\"{$method} method\
    \ not implemented\");\n        }\n\n        protected function _getExceptionForArgument()\n\
    \        {\n            return new Exception\\Argument(\"Invalid argument\");\n\
    \        }\n    }\n}\n```\n\nWe add three additional getter/setter properties:\
    \ `layoutView`, `actionView`, and `willRenderLayoutView`/`willRenderActionView`.\
    \ The `layoutView` property is a placeholder for a layout's view, the `actionView`\
    \ property is a placeholder for the action's view, and the `willRenderLayoutView`/`willRenderActionView`\
    \ properties are flags that will be used to disable automatic view rendering.\n\
    \nLayouts address a problem you might not even have known existed. In terms of\
    \ interface design, a consistent layout is essential for a good user experience.\
    \ I did say that we would ignore (most) interface design, but this is a functional\
    \ requirement of any good application, so we are adding it now."
