    There are four steps to generating a unique URL:


    **1.** Turn the title value into a string that is URL friendly. To do this, we
    will ensure that only letters, numbers, and hyphens are included. Additionally,
    we will make the entire string lowercase for uniformity. We will make the string
    a maximum of 30 characters, which should be enough to ensure uniqueness. For example,
