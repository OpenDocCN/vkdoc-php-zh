    term means something quite different in Java and C++, I think it is better to
    talk in terms of interception.


    PHP supports three built-in interceptor methods. Like `__construct()`, these are
    invoked for you when the right conditions are met. Table [4-3](#A314621_5_En_4_Chapter.html#Tab3)
    describes the methods.


    Table 4-3.


    The Interceptor Methods


    | Method | Description |

    | --- | --- |

    | `__get($property)` | Invoked when an undefined property is accessed |

    | `__set($property, $value)` | Invoked when a value is assigned to an undefined
    property |

    | `__isset($property)` | Invoked when `isset()` is called on an undefined property
    |

    | `__unset($property)` | Invoked when `unset()` is called on an undefined property
    |

    | `__call($method, $arg_array)` | Invoked when an undefined non-static method
    is called |

    | `__callStatic($method, $arg_array)` | Invoked when an undefined static method
    is called |


    The `__get()` and `__set()` methods are designed for working with properties that
    have not been declared in a class (or its parents).


    `__get()`is invoked when client code attempts to read an undeclared property.
    It is called automatically with a single string argument containing the name of
    the property that the client is attempting to access. Whatever you return from
    the `__get()` method will be sent back to the client as if the target property
    exists with that value. Here’s a quick example:


    ```

    // listing 04.71

    class Person

    {

    public function __get(string $property)

    {

    $method = "get{$property}";

    if (method_exists($this, $method)) {

    return $this->$method();

    }

    }

    public function getName(): string

    {

    return "Bob";

    }

    public function getAge(): int

    {

    return 44;

    }

    }

    ```


    When a client attempts to access an undefined property, the `__get()` method is
    invoked. I have implemented `__get()` to take the property name and construct
    a new string, prepending the word “get”. I pass this string to a function called
    `method_exists()`, which accepts an object and a method name and tests for method
    existence. If the method does exist, I invoke it and pass its return value to
    the client. Assume the client requests a `$name` property :


    ```

    $p = new Person();

    print $p->name;

    ```


    In this case, the `getName()` method is invoked behind the scenes:


    ```

    Bob

    ```


    If the method does not exist, I do nothing. The property that the user is attempting
    to access will resolve to NULL.


    The `__isset()` method works in a similar way to `__get()`. It is invoked after
    the client calls `isset()` on an undefined property. Here’s how I might extend
    `Person`:


    ```

    // listing 04.72

    public function __isset(string $property)

    {

    $method = "get{$property}";

    return (method_exists($this, $method));

    }

    ```


    Now a cautious user can test a property before working with it:


    ```

    if (isset($p->name)) {

    print $p->name;

    }

    ```


    The `__set()` method is invoked when client code attempts to assign to an undefined
    property. It is passed two arguments: the name of the property and the value the
    client is attempting to set. You can then decide how to work with these arguments.
    Here I further amend the `Person` class:


    ```

    // listing 04.73

    class Person

    {

    private $myname;

    private $myage;

    public function __set(string $property, string $value)

    {

    $method = "set{$property}";

    if (method_exists($this, $method)) {

    return $this->$method($value);

    }

    }

    public function setName(string $name)

    {

    $this->myname = $name;

    if (! is_null($name)) {

    $this->myname = strtoupper($this->myname);

    }

    }

    public function setAge(int $age)

    {

    $this->myage = $age;

    }

    }

    ```'
  trans: "\n# 内部错误类\n\n回溯到异常机制首次引入时，`try` 和 `catch` 主要应用于 PHP 代码而非核心引擎。内部生成的错误保留了自身的逻辑。如果你希望以与代码生成异常相同的方式来管理核心错误，这可能会变得混乱。PHP\
    \ 7 通过引入 `Error` 类开始着手解决这个问题。该类实现了 `Throwable`——与 `Exception` 类实现的相同的内置接口，因此它可以被同等对待。这也意味着表\
    \ 4-1 中描述的方法得以遵循。`Error` 类针对单个错误类型有子类化。以下是你如何捕获由 `eval` 语句生成的解析错误：\n\n```php\n\
    try {\n    eval(\"illegal code\");\n} catch (\\Error $e) {\n    print get_class($e)\
    \ . \"\\n\";\n} catch (\\Exception $e) {\n    // 对 Exception 进行处理\n}\n```\n\n\
    输出如下：\n\n```\nParseError\n```\n\n因此，你可以通过在 `catch` 子句中指定 `Error` 超类或指定更具体的子类来匹配某些类型的内部错误。表\
    \ 4-2 显示了当前的 `Error` 子类。\n\n**表 4-2.** PHP 7 引入的内置错误类\n\n| 错误                \
    \  | 描述                                                                 |\n|-----------------------|----------------------------------------------------------------------|\n\
    | `ArithmeticError`     | 针对与数学相关的错误抛出，特别是那些与位运算相关的错误                  |\n| `AssertionError`\
    \      | 当 `assert()` 语言结构（用于调试）失败时抛出                           |\n| `DivisionByZeroError`\
    \ | 当尝试将数字除以零时抛出                                               |\n| `ParseError`\
    \          | 当运行时代码解析 PHP（例如使用 `eval()`）失败时抛出                     |\n| `TypeError`\
    \           | 当向方法传递错误类型的参数、方法返回错误类型的值，或向方法传递错误数量的参数时抛出 |\n\n> **注意**  \n> 在撰写本文时，调用\
    \ `Error::getMessage()` 会失败并报错，尽管该方法已在 `Throwable` 接口中声明。很可能在你阅读本文时此问题已得到修复。\n\
    \n# 使用拦截器\n\nPHP 提供了内置的拦截器方法，可以拦截发送给未定义方法和属性的消息。这也被称为重载（overloading），但由于该术语在 Java\
    \ 和 C++ 中含义完全不同，我认为最好用“拦截”来描述。\n\nPHP 支持三种内置的拦截器方法。与 `__construct()` 类似，这些方法会在满足适当条件时自动为你调用。表\
    \ 4-3 描述了这些方法。\n\n**表 4-3.** 拦截器方法\n\n| 方法                                   \
    \ | 描述                                               |\n|-----------------------------------------|----------------------------------------------------|\n\
    | `__get($property)`                      | 当访问未定义属性时被调用                     \
    \        |\n| `__set($property, $value)`              | 当为未定义属性赋值时被调用        \
    \                   |\n| `__isset($property)`                    | 当对未定义属性调用 `isset()`\
    \ 时被调用                |\n| `__unset($property)`                    | 当对未定义属性调用\
    \ `unset()` 时被调用                |\n| `__call($method, $arg_array)`           |\
    \ 当调用未定义的非静态方法时被调用                     |\n| `__callStatic($method, $arg_array)`\
    \     | 当调用未定义的静态方法时被调用                       |\n\n`__get()` 和 `__set()` 方法旨在用于处理类（或其父类）中未声明的属性。\n\
    \n`__get()` 在客户端代码尝试读取未声明的属性时被调用。它会自动调用，并接收一个包含客户端试图访问的属性名称的单一字符串参数。无论你从 `__get()`\
    \ 方法返回什么，都会作为该目标属性的值发送回客户端。以下是一个快速示例：\n\n```php\n// 代码清单 04.71\nclass Person\n\
    {\n    public function __get(string $property)\n    {\n        $method = \"get{$property}\"\
    ;\n        if (method_exists($this, $method)) {\n            return $this->$method();\n\
    \        }\n    }\n\n    public function getName(): string\n    {\n        return\
    \ \"Bob\";\n    }\n\n    public function getAge(): int\n    {\n        return\
    \ 44;\n    }\n}\n```\n\n当客户端尝试访问未定义的属性时，`__get()` 方法将被调用。我实现了 `__get()` 方法来接收属性名称并构造一个新的字符串，前缀以\
    \ \"get\"。我将此字符串传递给名为 `method_exists()` 的函数，该函数接收一个对象和方法名称，并测试方法是否存在。如果方法确实存在，我就调用它并将其返回值传递给客户端。假设客户端请求\
    \ `$name` 属性：\n\n```php\n$p = new Person();\nprint $p->name;\n```\n\n在这种情况下，后台会调用\
    \ `getName()` 方法：\n\n```\nBob\n```\n\n如果方法不存在，我将不执行任何操作。用户试图访问的属性将解析为 NULL。\n\n\
    `__isset()` 方法的工作方式与 `__get()` 类似。它在客户端对未定义属性调用 `isset()` 后被调用。以下是我如何扩展 `Person`\
    \ 类：\n\n```php\n// 代码清单 04.72\npublic function __isset(string $property)\n{\n\
    \    $method = \"get{$property}\";\n    return (method_exists($this, $method));\n\
    }\n```\n\n现在，谨慎的用户可以在处理属性之前对其进行测试：\n\n```php\nif (isset($p->name)) {\n    print\
    \ $p->name;\n}\n```\n\n`__set()` 方法在客户端代码尝试为未定义属性赋值时被调用。它接收两个参数：属性名称和客户端尝试设置的值。然后你可以决定如何处理这些参数。此处我进一步修改了\
    \ `Person` 类：\n\n```php\n// 代码清单 04.73\nclass Person\n{\n    private $myname;\n\
    \    private $myage;\n\n    public function __set(string $property, string $value)\n\
    \    {\n        $method = \"set{$property}\";\n        if (method_exists($this,\
    \ $method)) {\n            return $this->$method($value);\n        }\n    }\n\n\
    \    public function setName(string $name)\n    {\n        $this->myname = $name;\n\
    \        if (!is_null($name)) {\n            $this->myname = strtoupper($this->myname);\n\
    \        }\n    }\n\n    public function setAge(int $age)\n    {\n        $this->myage\
    \ = $age;\n    }\n}\n```\n"
- fmt: "在本例中，我将使用“setter”方法而非“getter”。如果用户尝试给一个未定义的属性赋值，则`__set()`方法会被调用，并传入属性名和所赋的值。我会测试是否存在相应的方法，若存在则调用它。通过这种方式，我可以过滤所赋的值。\n\
    \n> **注意**  \n> 请记住，PHP文档中的方法和属性通常以静态术语提及，以便将其与所属类关联。因此，你可能会讨论`Person::$name`属性，即便该属性并未声明为`static`，且实际上是通过对象来访问的。\n\
    \n所以，如果我创建了一个`Person`对象，然后尝试设置一个名为`Person::$name`的属性，由于此类未定义`$name`属性，`__set()`方法会被调用。该方法会接收到字符串`\"\
    name\"`和客户端所赋的值。如何使用这个值则取决于`__set()`的实现。在这个例子中，我根据属性参数和字符串`\"set\"`组合构造了一个方法名。`setName()`方法被找到并成功调用。该方法会转换传入的值，并将其存储到一个真实的属性中：\n\
    \n```\n$p = new Person();\n$p->name = \"bob\";\n// $myname 属性变为 'BOB'\n```\n\n\
    正如你所料，`__unset()`与`__set()`相对应。当对未定义的属性调用`unset()`时，`__unset()`会被调用，并传入该属性的名称。然后你可以利用这些信息做任何处理。本例将`null`传递给一个方法，该方法通过`__set()`中使用的相同技术解析得到：\n\
    \n```\n// listing 04.74\npublic function __unset(string $property)\n{\n$method\
    \ = \"set{$property}\";\nif (method_exists($this, $method)) {\n$this->$method(null);\n\
    }\n}\n```\n\n`__call()`方法可能是所有拦截器方法中最有用的一个。当客户端代码调用一个未定义的方法时，它会被调用。`__call()`会接收到方法名和一个包含所有客户端传入参数的数组。你从`__call()`方法返回的任何值都会作为被调用方法的返回值返回给客户端。\n\
    \n`__call()`方法对委托非常有用。委托是一种机制，通过它一个对象将方法调用传递给第二个对象。它类似于继承，子类会将方法调用传递给父类的实现。但继承中父类与子类的关系是固定的，而委托能够在运行时切换接收对象，因此比继承更灵活。通过一个例子可以稍微澄清一下。下面是一个简单的类，用于格式化来自`Person`类的信息：\n\
    \n```\n// listing 04.75\nclass PersonWriter\n{\npublic function writeName(Person\
    \ $p)\n{\nprint $p->getName() . \"\\n\";\n}\npublic function writeAge(Person $p)\n\
    {\nprint $p->getAge() . \"\\n\";\n}\n}\n```\n\n当然，我可以通过继承此类，以不同方式输出`Person`数据。下面是一个`Person`类的实现，它同时使用了`PersonWriter`对象和`__call()`方法：\n\
    \n```\n// listing 04.76\nclass Person\n{\nprivate $writer;\npublic function __construct(PersonWriter\
    \ $writer)\n{\n$this->writer = $writer;\n}\npublic function __call(string $method,\
    \ array $args)\n{\nif (method_exists($this->writer, $method)) {\nreturn $this->writer->$method($this);\n\
    }\n}\npublic function getName(): string\n{\nreturn \"Bob\";\n}\npublic function\
    \ getAge(): int\n{\nreturn 44;\n}\n}\n```\n\n这里的`Person`类要求构造函数参数为一个`PersonWriter`对象，并将其存储在一个属性变量中。在`__call()`方法中，我使用传入的`$method`参数，检查是否在我存储的`PersonWriter`对象中存在同名方法。如果找到这样的方法，我将方法调用委托给`PersonWriter`对象，并将当前实例（通过伪变量`$this`）传递给它。思考一下，如果客户端对`Person`进行如下调用会发生什么：\n\
    \n```\n$person = new Person(new PersonWriter());\n$person->writeName();\n```\n\
    \n在这种情况下，`__call()`方法被调用。我在`PersonWriter`对象中找到名为`writeName()`的方法并调用它。这省去了我手动调用委托方法的麻烦，比如这样：\n\
    \n```\nfunction writeName() {\n$this->writer->writeName($this);\n}\n```\n\n`Person`类神奇地获得了两个新方法。虽然自动化委托可以节省大量工作，但也可能带来清晰度上的代价。如果你过度依赖委托，你向外界呈现的是一个动态接口，它抵制反射（运行时检查类结构的能力），并且对客户端程序员来说，一眼看过去并不总是清晰易懂。这是因为委托类与其目标对象之间的交互逻辑可能很隐晦——它深埋在如`__call()`这样的方法中，而不是像类似关系那样通过继承关系或方法类型提示提前显现出来。拦截器方法有其用武之地，但应谨慎使用，并且依赖这些方法的类应非常清晰地记录这一事实。\n\
    \n我将在本书后面继续讨论委托和反射这两个主题。\n\n`__get()`和`__set()`拦截器方法也可用于管理复合属性。这对客户端程序员来说可能是一种便利。例如，设想一个`Address`类，它管理门牌号和街道名称。最终这些对象数据将被写入数据库字段，因此将门牌号和街道名称分开是合理的。但如果门牌号和街道名称通常以未区分的整体形式获取，那么你可能希望为类的用户提供帮助。下面是一个管理复合属性`Address::$streetaddress`的类：\n\
    \n```\n// listing 04.77\nclass Address\n{\nprivate $number;\nprivate $street;\n\
    public function __construct(string $maybenumber, string $maybestreet = null)\n\
    {\nif (is_null($maybestreet)) {\n$this->streetaddress = $maybenumber;\n} else\
    \ {\n$this->number = $maybenumber;\n$this->street = $maybestreet;\n}\n}\npublic\
    \ function __set(string $property, string $value)\n{\nif ($property === \"streetaddress\"\
    ) {\nif (preg_match(\"/^(\\d+.*?)[\\s,]+(.+)$/\", $value, $matches)) {\n$this->number\
    \ = $matches[1];\n$this->street = $matches[2];\n} else {\nthrow new \\Exception(\"\
    unable to parse street address: '{$value}'\");\n}\n}\n}\npublic function __get(string\
    \ $property)\n{\nif ($property === \"streetaddress\") {\nreturn $this->number\
    \ . \" \" . $this->street;\n}\n}\n}\n// listing 04.78\n$address = new Address(\"\
    441b Bakers Street\");\nprint \"street address: {$address->streetaddress}\\n\"\
    ;\n$address = new Address(\"15\", \"Albert Mews\");\nprint \"street address: {$address->streetaddress}\\\
    n\";\n$address->streetaddress = \"34, West 24th Avenue\";\nprint \"street address:\
    \ {$address->streetaddress}\\n\";\n```\n\n当用户尝试设置（不存在的）`Address::$streetaddress`属性时，拦截器方法`__call()`被调用。在那里，我测试属性名为`streetaddress`。在设置`$number`和`$street`属性之前，我必须首先确保提供的值可以解析，然后继续提取字段。在这个例子中，我设置了简单的规则。如果一个地址以数字开头，并且在第二部分之前有空格或逗号，则可以被解析。借助于反向引用，如果检查通过，我已经在`$matches`数组中获得了所需的数据，并将值赋给`$number`和`$street`属性。如果解析失败，则抛出一个异常。因此，当诸如`441b\
    \ Bakers Street`的字符串被赋值给`Address::$streetaddress`时，实际被填充的是`$number`和`$street`属性。我可以通过`print_r()`来演示这一点：\n\
    \n```\n$address = new Address(\"441b Bakers Street\");\nprint_r($address);\nAddress\
    \ Object\n(\n[number:Address:private] => 441b\n[street:Address:private] => Bakers\
    \ Street\n)\n```"
  raw: 'In this example, I work with “setter” methods rather than “getters.” If a
    user attempts to assign to an undefined property, the `__set()` method is invoked
    with the property name and the assigned value. I test for the existence of the
    appropriate method and invoke it if it exists. In this way, I can filter the assigned
    value.


    Note


    Remember that methods and properties in PHP documentation are frequently spoken
    of in static terms in order to identify them with their classes. So you might
    talk about the `Person::$name` property, even though the property is not declared
    `static` and would in fact be accessed via an object.


    So if I create a `Person` object and then attempt to set a property called `Person::$name`,
    the `__set()` method is invoked because this class does not define a `$name` property.
    The method is passed the string `"name"` and the value that the client assigned.
    How the value is then used depends on the implementation of `__set()`. In this
    example, I construct a method name out of the property argument combined with
    the string, `"set"`. The `setName()` method is found and duly invoked. This transforms
    the incoming value and stores it in a real property:


    ```

    $p = new Person();

    $p->name = "bob";

    // the $myname property becomes ''BOB''

    ```


    As you might expect, `__unset()` mirrors `__set()`. When `unset()` is called on
    an undefined property, `__unset()` is invoked with the name of the property. You
    can then do what you like with the information. This example passes `null` to
    a method resolved using the same technique that you saw used by `__set()`:


    ```

    // listing 04.74

    public function __unset(string $property)

    {

    $method = "set{$property}";

    if (method_exists($this, $method)) {

    $this->$method(null);

    }

    }

    ```


    The `__call()` method is probably the most useful of all the interceptor methods.
    It is invoked when an undefined method is called by client code. `__call()` is
    invoked with the method name and an array holding all arguments passed by the
    client. Any value that you return from the `__call()` method is returned to the
    client as if it were returned by the method invoked.


    The `__call()` method can be useful for delegation. Delegation is the mechanism
    by which one object passes method invocations on to a second. It is similar to
    inheritance, in that a child class passes on a method call to its parent implementation.
    With inheritance the relationship between child and parent is fixed, so the ability
    to switch the receiving object at runtime means that delegation can be more flexible
    than inheritance. An example clarifies things a little. Here is a simple class
    for formatting information from the `Person` class :


    ```

    // listing 04.75

    class PersonWriter

    {

    public function writeName(Person $p)

    {

    print $p->getName() . "\n";

    }

    public function writeAge(Person $p)

    {

    print $p->getAge() . "\n";

    }

    }

    ```


    I could, of course, subclass this to output `Person` data in various ways. Here
    is an implementation of the `Person` class that uses both a `PersonWriter` object
    and the `__call()` method:


    ```

    // listing 04.76

    class Person

    {

    private $writer;

    public function __construct(PersonWriter $writer)

    {

    $this->writer = $writer;

    }

    public function __call(string $method, array $args)

    {

    if (method_exists($this->writer, $method)) {

    return $this->writer->$method($this);

    }

    }

    public function getName(): string

    {

    return "Bob";

    }

    public function getAge(): int

    {

    return 44;

    }

    }

    ```


    The `Person` class here demands a `PersonWriter` object as a constructor argument
    and stores it in a property variable. In the `__call()` method, I use the provided
    `$method` argument, testing for a method of the same name in the `PersonWriter`
    object I have stored. If I encounter such a method, I delegate the method call
    to the `PersonWriter` object, passing my current instance to it (in the `$this`
    pseudo-variable). Consider what happens if the client makes this call to `Person`:


    ```

    $person = new Person(new PersonWriter());

    $person->writeName();

    ```


    In this case, the `__call()` method is invoked. I find a method called `writeName()`
    in my `PersonWriter` object and invoke it. This saves me from manually invoking
    the delegated method like this:


    ```

    function writeName() {

    $this->writer->writeName($this);

    }

    ```


    The `Person` class has magically gained two new methods. Although automated delegation
    can save a lot of legwork, there can be a cost in clarity. If you rely too much
    on delegation, you present the world with a dynamic interface that resists reflection
    (the runtime examination of class facets) and is not always clear to the client
    coder at first glance. This is because the logic that governs the interaction
    between a delegating class and its target can be obscure—buried in methods like
    `__call()` rather than signaled up front by inheritance relationships or method
    type hints, as is the case for similar relationships. The interceptor methods
    have their place, but they should be used with care, and classes that rely on
    them should document this fact very clearly.


    I will return to the topics of delegation and reflection later in the book.


    The `__get()` and `__set()` interceptor methods can also be used to manage composite
    properties. This can be a convenience for the client programmer. Imagine, for
    example, an `Address` class that manages a house number and a street name. Ultimately
    this object data will be written to database fields, so the separation of number
    and street is sensible. But if house numbers and street names are commonly acquired
    in undifferentiated lumps, then you might want to help the class’s user. Here
    is a class that manages a composite property , `Address::$streetaddress`:


    ```

    // listing 04.77

    class Address

    {

    private $number;

    private $street;

    public function __construct(string $maybenumber, string $maybestreet = null)

    {

    if (is_null($maybestreet)) {

    $this->streetaddress = $maybenumber;

    } else {

    $this->number = $maybenumber;

    $this->street = $maybestreet;

    }

    }

    public function __set(string $property, string $value)

    {

    if ($property === "streetaddress") {

    if (preg_match("/^(\d+.*?)[\s,]+(.+)$/", $value, $matches)) {

    $this->number = $matches[1];

    $this->street = $matches[2];

    } else {

    throw new \Exception("unable to parse street address: ''{$value}''");

    }

    }

    }

    public function __get(string $property)

    {

    if ($property === "streetaddress") {

    return $this->number . " " . $this->street;

    }

    }

    }

    // listing 04.78

    $address = new Address("441b Bakers Street");

    print "street address: {$address->streetaddress}\n";

    $address = new Address("15", "Albert Mews");

    print "street address: {$address->streetaddress}\n";

    $address->streetaddress = "34, West 24th Avenue";

    print "street address: {$address->streetaddress}\n";

    ```


    When a user attempts to set the (nonexistent) `Address::$streetaddress` property
    , the interceptor method `__call()` is invoked. There, I test for the property
    name, `streetaddress`. Before I can set the `$number` and `$street` properties,
    I must first ensure that the provided value can be parsed, and then go ahead and
    extract the fields. For this example, I have set simple rules. An address can
    be parsed if it begins with a number and has spaces or commas ahead of a second
    part. Thanks to back references, if the check passes, I already have the data
    I’m looking for in the `$matches` array, and I assign values to the `$number`
    and `$street properties`. If the parse fails, I throw an exception. So when a
    string such as `441b Bakers Street` is assigned to `Address::$streetaddress`,
    it’s actually the `$number` and `$street` properties that get populated. I can
    demonstrate this with `print_r()`:


    ```

    $address = new Address("441b Bakers Street");

    print_r($address);

    Address Object

    (

    [number:Address:private] => 441b

    [street:Address:private] => Bakers Street

    )

    ```'
  trans: "\n在本例中，我将使用“setter”方法而非“getter”。如果用户尝试给一个未定义的属性赋值，则`__set()`方法会被调用，并传入属性名和所赋的值。我会测试是否存在相应的方法，若存在则调用它。通过这种方式，我可以过滤所赋的值。\n\
    \n> **注意**  \n> 请记住，PHP 文档中的方法和属性通常以静态术语提及，以便将其与所属类关联。因此，你可能会讨论`Person::$name`属性，即便该属性并未声明为`static`，且实际上是通过对象来访问的。\n\
    \n所以，如果我创建了一个`Person`对象，然后尝试设置一个名为`Person::$name`的属性，由于此类未定义`$name`属性，`__set()`方法会被调用。该方法会接收到字符串`\"\
    name\"`和客户端所赋的值。如何使用这个值则取决于`__set()`的实现。在这个例子中，我根据属性参数和字符串`\"set\"`组合构造了一个方法名。`setName()`方法被找到并成功调用。该方法会转换传入的值，并将其存储到一个真实的属性中：\n\
    \n```\n$p = new Person();\n$p->name = \"bob\";\n// $myname 属性变为 'BOB'\n```\n\n\
    正如你所料，`__unset()`与`__set()`相对应。当对未定义的属性调用`unset()`时，`__unset()`会被调用，并传入该属性的名称。然后你可以利用这些信息做任何处理。本例将`null`传递给一个方法，该方法通过`__set()`中使用的相同技术解析得到：\n\
    \n```\n// listing 04.74\npublic function __unset(string $property)\n{\n$method\
    \ = \"set{$property}\";\nif (method_exists($this, $method)) {\n$this->$method(null);\n\
    }\n}\n```\n\n`__call()`方法可能是所有拦截器方法中最有用的一个。当客户端代码调用一个未定义的方法时，它会被调用。`__call()`会接收到方法名和一个包含所有客户端传入参数的数组。你从`__call()`方法返回的任何值都会作为被调用方法的返回值返回给客户端。\n\
    \n`__call()`方法对委托非常有用。委托是一种机制，通过它一个对象将方法调用传递给第二个对象。它类似于继承，子类会将方法调用传递给父类的实现。但继承中父类与子类的关系是固定的，而委托能够在运行时切换接收对象，因此比继承更灵活。通过一个例子可以稍微澄清一下。下面是一个简单的类，用于格式化来自`Person`类的信息：\n\
    \n```\n// listing 04.75\nclass PersonWriter\n{\npublic function writeName(Person\
    \ $p)\n{\nprint $p->getName() . \"\\n\";\n}\npublic function writeAge(Person $p)\n\
    {\nprint $p->getAge() . \"\\n\";\n}\n}\n```\n\n当然，我可以通过继承此类，以不同方式输出`Person`数据。下面是一个`Person`类的实现，它同时使用了`PersonWriter`对象和`__call()`方法：\n\
    \n```\n// listing 04.76\nclass Person\n{\nprivate $writer;\npublic function __construct(PersonWriter\
    \ $writer)\n{\n$this->writer = $writer;\n}\npublic function __call(string $method,\
    \ array $args)\n{\nif (method_exists($this->writer, $method)) {\nreturn $this->writer->$method($this);\n\
    }\n}\npublic function getName(): string\n{\nreturn \"Bob\";\n}\npublic function\
    \ getAge(): int\n{\nreturn 44;\n}\n}\n```\n\n这里的`Person`类要求构造函数参数为一个`PersonWriter`对象，并将其存储在一个属性变量中。在`__call()`方法中，我使用传入的`$method`参数，检查是否在我存储的`PersonWriter`对象中存在同名方法。如果找到这样的方法，我将方法调用委托给`PersonWriter`对象，并将当前实例（通过伪变量`$this`）传递给它。思考一下，如果客户端对`Person`进行如下调用会发生什么：\n\
    \n```\n$person = new Person(new PersonWriter());\n$person->writeName();\n```\n\
    \n在这种情况下，`__call()`方法被调用。我在`PersonWriter`对象中找到名为`writeName()`的方法并调用它。这省去了我手动调用委托方法的麻烦，比如这样：\n\
    \n```\nfunction writeName() {\n$this->writer->writeName($this);\n}\n```\n\n`Person`类神奇地获得了两个新方法。虽然自动化委托可以节省大量工作，但也可能带来清晰度上的代价。如果你过度依赖委托，你向外界呈现的是一个动态接口，它抵制反射（运行时检查类结构的能力），并且对客户端程序员来说，一眼看过去并不总是清晰易懂。这是因为委托类与其目标对象之间的交互逻辑可能很隐晦——它深埋在如`__call()`这样的方法中，而不是像类似关系那样通过继承关系或方法类型提示提前显现出来。拦截器方法有其用武之地，但应谨慎使用，并且依赖这些方法的类应非常清晰地记录这一事实。\n\
    \n我将在本书后面继续讨论委托和反射这两个主题。\n\n`__get()`和`__set()`拦截器方法也可用于管理复合属性。这对客户端程序员来说可能是一种便利。例如，设想一个`Address`类，它管理门牌号和街道名称。最终这些对象数据将被写入数据库字段，因此将门牌号和街道名称分开是合理的。但如果门牌号和街道名称通常以未区分的整体形式获取，那么你可能希望为类的用户提供帮助。下面是一个管理复合属性`Address::$streetaddress`的类：\n\
    \n```\n// listing 04.77\nclass Address\n{\nprivate $number;\nprivate $street;\n\
    public function __construct(string $maybenumber, string $maybestreet = null)\n\
    {\nif (is_null($maybestreet)) {\n$this->streetaddress = $maybenumber;\n} else\
    \ {\n$this->number = $maybenumber;\n$this->street = $maybestreet;\n}\n}\npublic\
    \ function __set(string $property, string $value)\n{\nif ($property === \"streetaddress\"\
    ) {\nif (preg_match(\"/^(\\d+.*?)[\\s,]+(.+)$/\", $value, $matches)) {\n$this->number\
    \ = $matches[1];\n$this->street = $matches[2];\n} else {\nthrow new \\Exception(\"\
    unable to parse street address: '{$value}'\");\n}\n}\n}\npublic function __get(string\
    \ $property)\n{\nif ($property === \"streetaddress\") {\nreturn $this->number\
    \ . \" \" . $this->street;\n}\n}\n}\n// listing 04.78\n$address = new Address(\"\
    441b Bakers Street\");\nprint \"street address: {$address->streetaddress}\\n\"\
    ;\n$address = new Address(\"15\", \"Albert Mews\");\nprint \"street address: {$address->streetaddress}\\\
    n\";\n$address->streetaddress = \"34, West 24th Avenue\";\nprint \"street address:\
    \ {$address->streetaddress}\\n\";\n```\n\n当用户尝试设置（不存在的）`Address::$streetaddress`属性时，拦截器方法`__call()`被调用。在那里，我测试属性名为`streetaddress`。在设置`$number`和`$street`属性之前，我必须首先确保提供的值可以解析，并继续提取字段。在这个例子中，我设置了简单的规则。如果一个地址以数字开头，并且在第二部分之前有空格或逗号，则可以被解析。借助于反向引用，如果检查通过，我已经在`$matches`数组中获得了所需的数据，并将值赋给`$number`和`$street`属性。如果解析失败，则抛出一个异常。因此，当诸如`441b\
    \ Bakers Street`的字符串被赋值给`Address::$streetaddress`时，实际被填充的是`$number`和`$street`属性。我可以通过`print_r()`来演示这一点：\n\
    \n```\n$address = new Address(\"441b Bakers Street\");\nprint_r($address);\nAddress\
    \ Object\n(\n[number:Address:private] => 441b\n[street:Address:private] => Bakers\
    \ Street\n)\n```\n"
- fmt: '# 高级文档工程师排版结果


    The `__get()` method is much more straightforward, of course. Whenever the `Address::$streetaddress`
    property is accessed, `__get()` is invoked. In my implementation of this interceptor,
    I test for `streetaddress` and, if I find a match, I return a concatenation of
    the `$number` and `$street` properties.


    ## Defining Destructor Methods


    You have seen that the `__construct()` method is automatically invoked when an
    object is instantiated. PHP 5 also introduced the `__destruct()` method. This
    is invoked just before an object is garbage-collected; that is, before it is expunged
    from memory. You can use this method to perform any final cleaning up that might
    be necessary.


    Imagine, for example, a class that saves itself to a database when so ordered.
    I could use the `__destruct()` method to ensure that an instance saves its data
    when it is deleted:


    ```

    // listing 04.79

    class Person

    {

    protected $name;

    private   $age;

    private   $id;

    public function __construct(string $name, int $age)

    {

    $this->name = $name;

    $this->age  = $age;

    }

    public function setId(int $id)

    {

    $this->id = $id;

    }

    public function __destruct()

    {

    if (! empty($this->id)) {

    // save Person data

    print "saving person\n";

    }

    }

    }

    ```


    The `__destruct()` method is invoked whenever a `Person` object is removed from
    memory. This will happen either when you call the `unset()` function with the
    object in question or when no further references to the object exist in the process.
    So if I create and destroy a `Person` object, you can see the `__destruct()` method
    come into play:


    ```

    // listing 04.80

    $person = new Person("bob", 44);

    $person->setId(343);

    unset($person);

    // output:

    // saving person

    ```


    Although tricks like this are fun, it’s worth sounding a note of caution. `__call()`,
    `__destruct()`, and their colleagues are sometimes called magic methods. As you
    will know if you have ever read a fantasy novel, magic is not always a good thing.
    Magic is arbitrary and unexpected. Magic bends the rules. Magic incurs hidden
    costs.


    In the case of `__destruct()`, for example, you can end up saddling clients with
    unwelcome surprises. Think about the `Person` class—it performs a database write
    in its `__destruct()` method. Now imagine a novice developer idly putting the
    `Person` class through its paces. He doesn’t spot the `__destruct()` method, and
    he sets about instantiating a set of `Person` objects. Passing values to the constructor,
    he assigns the CEO’s secret and faintly obscene nickname to the `$name` property,
    and then sets `$age` at 150\. He runs his test script a few times, trying out
    colorful name and age combinations.


    The next morning, his manager asks him to step into a meeting room to explain
    why the database contains insulting `Person` data. The moral? Do not trust magic.


    ## Copying Objects with `__clone()`


    In PHP 4, copying an object was a simple matter of assigning from one variable
    to another:


    ```

    class CopyMe

    {

    }

    $first = new CopyMe();

    $second = $first;

    // PHP 4: $second and $first are 2 distinct objects

    // PHP 5 plus: $second and $first refer to one object

    ```


    This “simple matter” was a source of many bugs, as object copies were accidentally
    spawned when variables were assigned, methods were called, and objects were returned.
    This was made worse by the fact that there was no way of testing two variables
    to see whether they referred to the same object. Equivalence tests would tell
    you whether all fields were the same (`==`) or whether both variables were objects
    (`===`), but not whether they pointed to the same object.


    In PHP, objects are always assigned and passed around by reference. This means
    that when my previous example is run with PHP 5, `$first` and `$second` contain
    references to the same object instead of two copies. Although this is generally
    what you want when working with objects, there will be occasions when you need
    to get a copy of an object rather than a reference to an object.


    PHP provides the `clone` keyword for just this purpose. `clone` operates on an
    object instance, producing a by-value copy:


    ```

    class CopyMe

    {

    }

    $first  = new CopyMe();

    $second = clone $first;

    // PHP 5 plus: $second and $first are 2 distinct objects

    ```


    The issues surrounding object copying only start here. Consider the `Person` class
    that I implemented in the previous section. A default copy of a `Person` object
    would contain the identifier (the `$id` property), which in a full implementation
    I would use to locate the correct row in a database. If I allow this property
    to be copied, a client coder can end up with two distinct objects referencing
    the same data source, which is probably not what she wanted when she made her
    copy. An update in one object will affect the other, and vice versa.


    Luckily, you can control what is copied when `clone` is invoked on an object.
    You do this by implementing a special method called `__clone()` (note the leading
    two underscores that are characteristic of built-in methods). `__clone()` is called
    automatically when the `clone` keyword is invoked on an object.


    When you implement `__clone()`, it is important to understand the context in which
    the method runs. `__clone()` is run on the copied object and not the original.
    Here I add `__clone()` to yet another version of the `Person` class:


    ```

    // listing 04.81

    class Person

    {

    private $name;

    private $age;

    private $id;

    public function __construct(string $name, int $age)

    {

    $this->name = $name;

    $this->age = $age;

    }

    public function setId(int $id)

    {

    $this->id = $id;

    }

    public function __clone()

    {

    $this->id = 0;

    }

    }

    ```


    When `clone` is invoked on a `Person` object, a new shallow copy is made, and
    its `__clone()` method is invoked. This means that anything I do in `__clone()`
    overwrites the default copy I already made. In this case, I ensure that the copied
    object’s `$id` property is set to zero:


    ```

    // listing 04.82

    $person = new Person("bob", 44);

    $person->setId(343);

    $person2 = clone $person;

    // $person2 :

    //     name: bob

    //     age: 44

    //     id: 0.

    ```


    A shallow copy ensures that primitive properties are copied from the old object
    to the new. Object properties, though, are copied by reference, which may not
    be what you want or expect when cloning an object. Say that I give the `Person`
    object an `Account` object property. This object holds a balance that I want copied
    to the cloned object. What I don’t want, though, is for both `Person` objects
    to hold references to the same account:


    ```

    // listing 04.83

    class Account

    {

    public $balance;

    public function __construct(float $balance)

    {

    $this->balance = $balance;

    }

    }

    // listing 04.84

    class Person

    {

    private $name;

    private $age;

    private $id;

    public  $account;

    public function __construct(string $name, int $age, Account $account)

    {

    $this->name = $name;

    $this->age  = $age;

    $this->account = $account;

    }

    public function setId(int $id)

    {

    $this->id = $id;

    }

    public function __clone()

    {

    $this->id   = 0;

    }

    }

    // listing 04.85

    $person = new Person("bob", 44, new Account(200));

    $person->setId(343);

    $person2 = clone $person;

    // give $person some money

    $person->account->balance += 10;

    // $person2 sees the credit too

    print $person2->account->balance;

    ```


    This gives the following output:


    ```


    ```


    `$person` holds a reference to an `Account` object that I have kept publicly accessible
    for the sake of brevity (as you know, I would usually restrict access to a property,
    providing an accessor method, if necessary). When the clone is created, it holds
    a reference to the same `Account` object that `$person` references. I demonstrate
    this by adding to the `$person` object’s `Account` and confirming the increased
    balance via `$person2`.


    If I do not want an object property to be shared after a clone operation, then
    it is up to me to clone it explicitly in the `__clone()` method:


    ```

    function __clone()

    {

    $this->id   = 0;

    $this->account = clone $this->account;

    }

    ```'
