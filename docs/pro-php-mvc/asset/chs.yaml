- "# 第 15 章 ■ 搜索\n\n***清单 15-9.*** 扩展实现实用方法\n\n```php\nprotected function _getKey($tree)\n\
  {\n    if (empty($tree[\"arguments\"][\"key\"]))\n    {\n        return null;\n\
  \    }\n    return trim($tree[\"arguments\"][\"key\"]);\n}\n\nprotected function\
