    \n## Software Required for Developing the Site\n\nBecause you will be developing\
    \ this e-commerce site in PHP, you need the following three software products\
    \ to run a PHP script:\n\n- **Apache web server**—A local web server to run and\
    \ debug PHP scripts on the local machine.\n- **PHP interpreter**—To interpret\
    \ PHP code. The Apache web server uses the PHP interpreter to interpret PHP code\
    \ and generate HTML code.\n- **MySQL**—The most popular database system used with\
    \ PHP to store data entered by the users for future reference.\n\nInstead of installing\
    \ these products individually, you can install the WampServer or XAMPP server.\
    \ These servers install all three products—Apache, PHP, and MySQL—simultaneously\
    \ on your machine. Next, you learn how to install the WampServer.\n\n> **Note**\
    \  \n> The WampServer provides a Windows web development environment for Apache,\
    \ MySQL, and PHP databases.\n\n## Installing the WampServer\n\nTo check and debug\
    \ your PHP scripts locally before uploading to the actual server, you need to\
    \ install the WampServer on the local machine. So, download a free copy of WampServer\
    \ from [`http://www.wampserver.com/en`](http://www.wampserver.com/en). The latest\
    \ version of WampServer available at the time of this writing is 2.5. After downloading\
    \ WampServer, double-click on its `.exe` file and select `Run`.\n\n> **Note**\
    \  \n> WampServer is an open source, easy-to-use server. It includes a great graphical\
    \ tool, `phpMyAdmin`, that makes administering MySQL quite easy. It’s very easy\
    \ to use WampServer tools and you don’t need any prior knowledge. Later in this\
    \ chapter, you will learn how to use WampServer and its tools.\n\nThe first screen\
    \ is a welcome screen that indicates which WampServer version will be installed,\
    \ as shown in Figure [1-16](#A978-1-4842-1672-9_1_Chapter.html#Fig16). Click on\
    \ the `Next` button.\n\n![A978-1-4842-1672-9_1_Fig16_HTML.jpg](A978-1-4842-1672-9_1_Fig16_HTML.jpg)\n\
    \nFigure 1-16.\n\nWelcome screen of WampServer setup wizard\n\nThe next window\
