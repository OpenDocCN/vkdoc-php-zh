  \ `completeadmin.php` 中的部分代码在每个页面上检查登录状态，如果用户未登录，则将其重定向到登录页面。\n\n## 总结\n\n这一章很长。我们涵盖了很多内容，多到无法在此一一列举。但我们学到的一些最重要的新技能包括：用于隐私保护的单向加密、用于有状态记忆的会话（session），以及有效限制对博客管理模块的访问。我希望你会认同实现一个登录系统是非常有收获的。如前所述，这个博客已准备好进行\
