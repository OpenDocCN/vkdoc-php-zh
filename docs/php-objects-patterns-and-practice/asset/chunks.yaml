  trans: '

    #### 实现


    一如既往，该模式的关键在于接口。应用控制器是一个类（或一组类），前端控制器可使用它根据用户请求获取命令，并在命令执行后找到要呈现的正确视图。图 12-5 展示了这种关系的基本框架。


    ![A314621_5_En_12_Fig5_HTML.gif](img/A314621_5_En_12_Fig5_HTML.gif)


    图 12-5.


    应用控制器模式


    与本章中的所有模式一样，其目标是为客户端代码尽可能简化操作——因此前端控制器类十分精简。然而，在接口背后，我必须部署一个实现。这里介绍的方法只是其中一种实现方式。当你阅读本节时，请记住，该模式的本质在于参与者（应用控制器、命令和视图）之间的交互方式，而非本实现的具体细节。


    让我们从使用应用控制器的代码开始。


    ##### 前端控制器


    以下是 `FrontController` 与 `AppController` 类协同工作的一种方式（已简化并去除了错误处理）：


    ```

    // 列表 12.19

    // 控制器

    private function __construct()

    {

    $this->reg = Registry::instance();

    }

    public function handleRequest()

    {

    $request = $this->reg->getRequest();

    $controller = new AppController();

    $cmd = $controller->getCommand($request);

    $cmd->execute($request);

    $view = $controller->getView($request);

    $view->render($request);

    }

    ```


    与上一示例相比，主要区别在于，除了将类名从 `CommandResolver` 改为 `AppController`（诚然，这在某种程度上只是外观上的改动），我们现在还同时获取了
    `ViewComponent` 和 `Command` 对象。请注意，此代码使用注册表对象来获取 `Request` 对象。我们也可以将 `AppController`
    对象存储在 `Registry` 中——即使其他组件在其他地方并未使用它。避免直接实例化的类通常更灵活且更易于测试。


    那么，`AppController` 是根据什么逻辑知道哪个视图与哪个命令相关联的呢？与面向对象代码一样，接口比实现更重要。不过，让我们来填充一种可能的方法。


    ##### 实现概述


    一个 `Command` 类可能会根据操作的不同阶段来要求显示不同的视图。`AddVenue` 命令的默认视图可能是一个数据输入表单。如果用户添加了错误类型的数据，可能会再次显示该表单，或者显示一个错误页面。如果一切顺利，并且在系统中成功创建了场地，那么我可能希望转发到一连串
    `Command` 对象中的下一个：或许是 `AddSpace`。


    `Command` 对象通过设置状态标志来告知系统其当前状态。以下是这个最小实现所识别的标志（在 `Command` 父类中作为属性设置）：


    ```

    // 列表 12.20

    const CMD_DEFAULT = 0;

    const CMD_OK = 1;

    const CMD_ERROR = 2;

    const CMD_INSUFFICIENT_DATA = 3;

    ```


    应用控制器使用 `Request` 对象查找并实例化正确的 `Command` 类。一旦命令执行完毕，它将与一个状态相关联。可以将这种“命令+状态”的组合与一个数据结构进行比较，以确定接下来应该执行哪个命令，或者——如果没有更多命令需要执行——应该提供哪个视图。


    ##### 配置文件


    系统的所有者可以通过设置一组配置指令来决定命令和视图协同工作的方式。以下是一个摘录：


    这个 XML 片段展示了一种策略，用于将命令的执行流程及其与视图的关系从 `Command` 类本身中抽象出来。所有指令都包含在一个 `control` 元素中。


    每个 `command` 元素都定义了描述基本命令映射的 `path` 和 `class` 属性。然而，视图的逻辑更为复杂。`command` 顶级下的 `view`
    元素定义了一个默认关系。换句话说，如果没有匹配更具体的条件，该 `view` 将用于该命令。`status` 元素则定义了这些具体条件。它们的 `value`
    属性应与你之前看到的某个命令状态相匹配。例如，当命令执行产生 `CMD_OK` 状态时，如果在 XML 文档中定义了对应的状态，则将使用相应的 `view`
    元素。


    `view` 元素定义了一个 `name` 属性。该值用于构建一个指向模板文件的路径，随后可包含该模板文件。


    `command` 或 `status` 元素可能包含一个 `forward` 元素来代替 `view`。WOO 系统将 `forward` 视为一种特殊的
    `view`，它不会渲染模板，而是使用新的路径重新调用应用程序。


    让我们根据上述解释来梳理一下这段 XML 的片段：


    当使用 `/addvenue` 路径调用系统时，将调用 `AddVenue` 命令。然后它会生成一个状态值——`CMD_DEFAULT`、`CMD_OK`、`CMD_ERROR`
    或 `CMD_INSUFFICIENT_DATA` 中的一个。对于除 `CMD_OK` 之外的任何状态，都将调用 `addvenue` 模板。但是，如果命令返回
    `CMD_OK` 状态，则条件匹配。`status` 元素可以简单地包含另一个视图来替换默认视图。然而，这里 `forward` 元素开始发挥作用。通过转发到另一个
    `command`，配置文件将处理视图的所有责任委托给了新元素。然后，系统将在新请求中从 `/addspace` 路径重新开始。

