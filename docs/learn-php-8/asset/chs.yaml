  \n**图 4-4** 包含 set 和 get 方法的 Dog 类输出\n\n*程序设计建议——在编码和测试阶段，经常显示属性中的值是个好习惯，这样可以确保它们在恰当的时间被更新。但是，当你将程序从测试模式迁移到生产环境时，应该减少向用户显示的内容。通常没有必要向用户展示属性中的更新值。最好只向用户提示更新已成功。在生产环境之前，你可以简单地将不需要的打印代码行注释掉。这样，在将来对应用程序进行升级时，只需移除这些代码行的注释，就能快速进行调试。*\n\
  \n#### 动手实践\n\n1.  除了在 `Dog` 类中创建 `$dog_gender` 属性和 `set` 方法之外，再创建一个 `get` 方法来显示更新后的值。同时更新\
  \ `lab.php` 文件，添加一个 `print` 语句（类似于本节中的示例）来调用 `get` 方法。\n\n\n### 构造方法\n\n前述示例中存在一个难点：若需初始创建对象并为其属性赋值，则需大量调用\
  \ `set` 例程。`Dog` 类要求我们调用四个 set 方法（`set_dog_name`、`set_dog_breed`、`set_dog_color`\
  \ 和 `set_dog_weight`）才能为所有属性赋值。我们可以采用更高效的方法一次性更新所有这些属性，从而精简 `lab.php` 文件中的代码。在提供初始值后，我们仍可借助\
  \ `Dog` 类中的 `set` 例程进行后续修改（例如狗狗体重增加了）。这些初始值并非默认值，但若初始值无效，则仍需默认值作为备选。\n\n当在内存中创建类的实例（对象）时，操作系统会执行**构造方法**，该方法会用所有现有的属性和方法构建该对象。系统还会在内存中构建表格，用于追踪对象的位置及对象属性中存在的值。当对象不再需要时，操作系统的垃圾回收器将被该对象的**析构方法**调用，从而将其从内存中移除。\n\
  \n您也可以编写一个构造方法，当对象被放入内存时，该方法会被自动调用。当执行创建对象的代码行（`$lab = new Dog;`）时，系统会在对象中查找构造方法。若存在，则执行该方法。您可以在同一行创建对象的代码中，将所有属性的初始值传递给该构造方法。\n\
  \n```\n$lab = new Dog('Fred', 'Lab', 'Yellow', 50);\n```\n\n这样就能从 `lab.php` 程序中更高效地提供初始值。\n\
  \n构造方法是一种通用格式，其函数名为 `__construct`（注意 construct 前有两个下划线）。\n\n您可以在构造方法中使用现有的 `set`\
  \ 方法来更新属性。您需要收集所有消息（`TRUE`/`FALSE`）并将其返回给调用程序（`lab.php`）。您可以采用最初编写 `get_properties`\
  \ 方法时使用的类似流程。\n\n```\nset_dog_name($value1) == TRUE ? 'TRUE,' : 'FALSE,';\nstring\
  \ $breed_error = $this->set_dog_breed($value2) == TRUE ? 'TRUE,' : 'FALSE,';\nstring\
  \ $color_error = $this->set_dog_color($value3) == TRUE ? 'TRUE,' : 'FALSE,';\nstring\
  \ $weight_error= $this->set_dog_weight($value4) == TRUE ? 'TRUE' : 'FALSE';\n$this->error_message\
  \ = $name_error . $breed_error . $color_error . $weight_error;\n}\n//---------------------------------toString-------------------------------\n\
  public function __toString()\n{\nreturn $this->error_message;\n}\n//... 此行以下 dog.php\
  \ 无其他代码变更。\n示例 4-12\n带构造方法的 Dog 类——dog.php\n```\n\n有关 `__construct` 方法的更多信息，请访问\
  \ [www.php.net/manual/en/language.oop5.decon.php](http://www.php.net/manual/en/language.oop5.decon.php)。\n\
  \n首先，我们来讨论示例 4-12 中名为 `__toString` 的特殊方法（注意有两个下划线）的用法。默认情况下，构造方法不允许返回信息。`return`\
  \ 语句不能在构造方法内部使用。为了将构造方法中生成的错误消息返回给调用程序（`lab.php`），您必须采用技巧。`__toString` 方法允许程序员决定：当尝试对对象名使用\
  \ `print`（或 `echo`）方法（如 `print $lab;`）时会发生什么。可以通过包含一个返回字符串的 `__toString` 方法来覆盖此行为。您可以通过允许在执行\
  \ `print $lab;` 语句时返回 `$error_message` 属性中的值，来解决无法返回错误消息的问题。\n\n有关 `__toString`\
  \ 方法及其他魔术方法的更多信息，请访问 [www.php.net/manual/en/language.oop5.magic.php](http://www.php.net/manual/en/language.oop5.magic.php)。\n\
  \n由 `set` 方法返回的 `TRUE` 和 `FALSE` 常量也会引发问题，因为它们是常量而非字符串。如果您尝试使用某个方法（例如 `strval(TRUE);`）将这些常量转换为字符串，那么它们所代表的值（`TRUE`\
  \ 为 1，`FALSE` 为 0）将变成字符串，而非 `'TRUE'` 或 `'FALSE'`。因此，它们无法通过 `__toString` 方法返回。为解决此问题，我们在构造方法中编写以下代码，将\
  \ `TRUE` 转换为 `'TRUE'` 或将 `FALSE` 转换为 `'FALSE'`：\n\n```\n$name_error = $this->set_dog_name($value1)\
  \ == TRUE ? 'TRUE,' : 'FALSE,';\n```\n\n运算顺序将导致 `set_dog_name` 方法在该代码的任何部分之前执行。`set_dog_name`\
  \ 方法返回 `TRUE` 或 `FALSE`（常量）。假设执行后该方法返回 `TRUE`，那么该行代码现在变为：\n\n```\n$name_error ==\
  \ TRUE == TRUE ? 'TRUE,' : 'FALSE,';\n```\n\n运算顺序随后要求评估比较 (`TRUE == TRUE`)。显然，此结果为\
  \ `TRUE`。因此将使用 `?` 和 `:` 之间的语句。\n\n```\n$name_error = 'TRUE,';\n```\n\n因此 `$name_error`\
  \ 被设置为字符串 `\"TRUE,\"`，这现在是一个字符串，而非常量。同时请注意，为了准备接收下一个 `'TRUE'` 或 `'FALSE'` 值，已添加了一个\
  \ ','。每个传递的值（最后一个值除外）都必须用 ',' 分隔，以便后续拆分该字符串。另外三行类似的代码被评估，并在错误消息属性中放置 `'TRUE,'` 或\
  \ `'FALSE,'`（权重错误评估的字符串末尾不包含逗号，因为它是最后一个被评估的）。\n\n构造方法中的最后一行代码被评估。\n\n```\n$this->error_message\
  \ = $name_error . $breed_error . $color_error . $weight_error;\n```\n\n这一行将每个错误属性的值放入\
  \ `error_message` 属性中。如果所有更新都成功，`$error_message` 属性将包含：\n\n```\n\"TRUE,TRUE,TRUE,TRUE\"\
  \n```\n\n请注意，除了最后一个项目外，每个传递的项目都包含一个 ',' 作为分隔符。这对于拆分字符串的结果是必要的。\n\n```\n' :\n'Name\
  \ update not successful';\nprint $breed_error == 'TRUE' ? 'Breed update successful'\
  \ :\n'Breed update not successful';\nprint $color_error == 'TRUE' ? 'Color update\
  \ successful' :\n'Color update not successful';\nprint $weight_error == 'TRUE' ?\
  \ 'Weight update successful' :\n'Weight update not successful';\n// ------------------------------Set\
  \ Properties----------------------------\n...此行以下 lab.php 无其他变更。\n示例 4-13\n调用构造方法的\
  \ lab.php 文件\n```\n\n\n\n\n示例 4-13 第三行对象的创建方式略有变化。\n\n```\n$lab = new Dog('Fred','Lab','Yellow','100');\n\
  ```\n\n现在我们通过构造函数将初始值（`Fred`、`Lab`、`Yellow` 和 `100`）传入对象。否则，我们需要调用四次 `set` 方法（`set_dog_name`、`set_dog_breed`、`set_dog_color`\
  \ 和 `set_dog_weight`）才能达到相同效果。这允许我们在初始设置对象（`$lab`）后，使用 `set` 方法进行所需的更新。\n\n为了确定四个属性的更新是否成功，我们必须从对象中的\
  \ `$error_message` 属性检索值（`TRUE`、`TRUE`、`TRUE`、`TRUE`）。`Dog` 类中的 `__toString` 方法允许我们通过将\
  \ `$lab` 视为字符串来实现这一点。这允许我们使用 `explode` 方法以类似 `get_properties` 方法输出的方式进行操作。\n\n```\n\
