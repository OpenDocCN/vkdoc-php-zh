    \    1.  `IF (condition) { execution };`\n    2.  `IF (condition) { execution\
    \ }`\n    3.  `if (condition) { execution };`\n    4.  `if (condition) {execution}`\n\
    \n4.  Which of the following includes properties and actions (methods or functions)\
