  \ 消除了很多猜测工作，因为它是完全面向对象的，这意味着处理日期的过程相当自然，因为方法名称是不言自明的。\n\n例如，要设置月份，可以调用 `setMonth()`\
  \ 设值方法；要获取年份，可以调用 `getYear()` 获取方法；依此类推。本章的其余部分将专门介绍此类及其众多方法。\n\n> **注意** 由于 `Date`\
  \ 依赖于 5.0 版本中可用的面向对象特性，因此不能将 `Date` 与任何更早版本一起使用。如果你尚未升级到 5.1 版本（但正在使用 5.0.X 版本）并想使用\
