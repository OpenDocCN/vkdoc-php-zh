    Recipe 3-12\. Working with Complex Numbers


    Problem


    PHP and many other programming languages do not handle complex numbers natively.
    Working with and calculating impedance of electronic circuits require the use
    of complex numbers .


    Solution


    PHP does not support operator overloading and there is no support for complex
    numbers, but it’s still possible to create objects that can be used to handle
    the various operations of complex math.


    CHAPTER 3 ■ PERFORMING MATH OPERATIONS


    How it Works


    Complex numbers have two parts and they can be represented as an object with a
    real and an imaginary part. They are often written as r + i*j where r is the real
    part, j is the imaginary part, and i is the imaginary number from taking the square
    root of -1\. The following example implements addition, subtraction, and a magic
    function to handle using the object in a string context.


    <?php


    // 3_26.php


    class Complex {


    public $re;


    public $im;


    function __construct($re, $im) {


    $this->re = $re;


    $this->im = $im;


    }


    static function Add(Complex $c1, Complex $c2) {


    return new Complex($c1->re + $c2->re, $c1->im + $c2->im);


    }


    static function Subtract(Complex $c1, Complex $c2) {


    return new Complex($c1->re - $c2->re, $c1->im - $c2->im);


    }


    function __toString() {


    return $this->re . " + " + $this->im . "i";


    }


    }


    $c1 = new Complex(1, -2);


    $c2 = new Complex(3, 5);


    $c3 = Complex::Add($c1, $c2);


    $c4 = Complex::Subtract($c2, $c1);


    echo "$c1\n$c2\n";


    -1i


    8i


    This is a simple implementation of complex math and it only implements addition
    and subtraction. For a more complete implementation take a look at the PEAR module
    Math_Complex at [http://pear.php.net/](http://pear.php.net/package/Math_Complex/)


    [package/Math_Complex/ .](http://pear.php.net/package/Math_Complex/)


    ****MATH EXTENSIONS**


    By installing the extensions GNU MP (gmp) and/or Binary Calculator Math (bcmath)
    it will become possible to work on numbers larger than the precision of the PHP
    version used. The numbers will be represented as stings. The gmp extension is
    used for arbitrary length integers and bcmath is used for arbitrary precession
    numbers.


    **CHAPTER 4**


    **Working with Arrays**


    Arrays play a central role in PHP programming. Many functions return arrays and
    they are often used to handle configuration. The basic array is a list of key
    and value pairs where the key can be an integer or a string and the value can
    be any variable type, including arrays.


    Recipe 4-1\. Creating Arrays


    Problem


    Arrays are treated as a fundamental data type in PHP. There are no functions to
    call or objects that must be instantiated to create variables with array values.


    Solution


    PHP uses the language construct array() to create arrays. If you assign the value
    array() to a variable you create an empty array or an array without any elements.
    It is also possible to include a comma-separated list of key => value pairs between
    the parentheses to create an array that’s already populated with values. If the
    keys are omitted from the definition PHP will assign numerical values starting
    at 0 as the keys.


    As stated above, the keys can be either integers or strings. If other types of
    keys are used PHP will perform an automatic type conversion. Floating point and
    Boolean values will be converted to integers.


    The null value will be converted to the empty string and valid numerical strings
    like “7” will be converted to integers as well. The sting “07” will not be converted
    as 07 is not a valid decimal number.


    The keys in an array do not all have to be of the same type. The same goes for
    the values. These can be mixed as each element in the array is treated as any
    other variable with no relation to other elements or other variables.


    From version 5.3 of PHP it’s possible to use shorthand syntax to create arrays.
    This is done with square brackets [] just like it’s done in JavaScript.


    In order to access a specific element in an array you would need to know the key.
    The key value is placed in square brackets after the variable name like $b = $a[''key''];.
    This will assign the element value for the key ''key'' to the variable $b . If
    the array element is an array it’s possible to access elements in that array by
    adding a second set of square brackets with a key value $b = $a[''key''][''key2''];
    . This can be repeated every time the element is an array.


    © Frank M. Kromann 2016


    F.M. Kromann, *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_4


    CHAPTER 4 ■ WORKING WITH ARRAYS


    How it Works


    The following example shows examples of six different arrays.


    <?php


    // 4_1.php


    $a = array(); // Empty array


    $b = []; // Empty array


    $c = array(1, 2, 3, 4, 5);


    $d = array(5 => ''Orange'', ''Apple'', ''Banana'', ''test'' => 5);


    $e = array(


    ''host'' => ''localhost'',


    ''database'' => ''orders'',


    ''user'' => ''root'',


    ''password'' => ''secret'',


    );


    $f = [


    ''host'' => ''localhost'',


    ''database'' => ''orders'',


    ''user'' => ''root'',


    ''password'' => ''secret'',


    ];


    The first two arrays are empty with no elements. The third array contains five
    integer elements and the keys are automatically assigned starting at 0 and ending
    at 4\. In the fourth array the keys are mixed and the first key is defined to
    be 5 so the following keys will be auto-assigned as 6 and 7 and the last element
    has a string value as the key.


    The last two arrays are identical, and they are just created with the short and
    the long syntax just as the first two arrays.


    When arrays are created the elements are stored in the order of creation. If the
    values are auto-assigned they will increment from 0 or the last numerical key
    used.


    <?php


    // 4_2.php


    $a = [1, 2, 5=>3, 4, 5, 10 => 6];


    echo "\$a contains\n";


    foreach($a as $k => $v) {


    echo "$k = $v\n";


    }


    $b = [5 => 5, 4 => 4, 3 => 3, 2 => 2];


    echo "\$b contains\n";


    foreach($b as $k => $v) {


    echo "$k = $v\n";


    }


    CHAPTER 4 ■ WORKING WITH ARRAYS


    This example will produce the following output showing the arrays will be traversed
