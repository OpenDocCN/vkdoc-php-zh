  raw: '• We need to learn how to install PEAR and PHPUnit.


    • We need to learn how to create and run tests on our controllers.


    Installing PEAR


    PEAR is the official distribution platform for reusable PHP libraries. You can
    think of it like Homebrew except instead of distributing packages that work with
    OS X, it distributes libraries tailored for use with PHP.


    You can install PEAR in just a few steps, which we will detail next.


    Windows


    • After you have downloaded and installed PHP, you must manually execute the batch
    file located in, for example, c:\php\go-pear.bat. The setup will ask you some
    questions, after which the PEAR Package Manager will be installed in the path
    that you have specified during installation.


    • Next, you must add the installation path to your PATH environment. Either do
    this manually (Start > Control Panel > System > Environment) or run (double-click)
    the newly generated PEAR_ENV.reg that’s now found in the PHP source directory.


    • After that, you can access the PEAR Package Manager by running the command pear
    in a Windows Command Prompt.


    • To update your PEAR installation, request [http://pear.php.net/go-pear.phar
    in y](http://pear.php.net/go-pear.phar)our browser and save the output to a local
    file, go-pear.phar. You can then run the following line:


    php go-pear.phar


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 29 ■ Zend Framework: testing


    Unix/Linux/BSD


    When using PHP, the PEAR Package Manager is already installed unless one has used
    the ./configure option


    --without-pear.


    If one uses a version of PHP that is supplied by Unix/Linux/BSD distributors,
    it may be necessary to manually install PEAR. Users should consult the documentation
    for the respective distribution in this case. If you want to reinstall PEAR, you
    can use the following method:


    • wget [http://pear.php.net/go-pear.phar](http://pear.php.net/go-pear.phar)


    • php go-pear.phar


    Mac OS X


    On Mac OS 10.4 and earlier, the PEAR Package Manager is already installed in /usr/bin/pear.


    If you are using Mac OS 10.5 (Leopard) and would like to install a new copy or
    reinstall the PEAR Package Manager, use the following command:


    • wget [http://pear.php.net/go-pear.phar](http://pear.php.net/go-pear.phar)


    • php -d detect_unicode=0 go-pear.phar


    Installing PHPUnit


    Installing PHPUnit is even easier, at this point, since it requires only the following
    two commands:


    • pear config-set auto_discover 1


    • pear install pear.phpunit.de/PHPUnit


    Running the Tests


    When we initially set up our Zend Framework project, it notified us that PHPUnit
    was not found within the PHP


    include path. Now that we have installed PHPUnit (via PEAR) we should no longer
    have this problem.


    Navigate to the tests directory that the Zend Framework CLI generated for us and
    run the following command:


    • phpunit


    ■ **Note** Be sure to follow the instructions in phpunit.xml if your Zend Framework
    library files are within the libraries directory.


    Adding Tests


    Adding tests is a fairly straightforward process. We will add four tests to the
    tests/controllers/


    IndexControllerTest.php file, as shown in Listing 29-1.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 29 ■ Zend Framework: testing


    ***Listing 29-1.*** Adding Unit Tests


    class IndexControllerTest extends Zend_Test_PHPUnit_ControllerTestCase


    {


    protected $_email = "testing_user";


    protected $_password = "testing_password";


    public function setUp()


    {


    $this->bootstrap = new Zend_Application(APPLICATION_ENV, APPLICATION_PATH .


    "/configs/application.ini");


    parent::setUp();


    }


    public function testRegisterHasFields()


    {


    $this->dispatch("/users/register");


    $this->assertQuery("input[name=''first'']", "first name field not found"); $this->assertQuery("input[name=''last'']",
    "last name field not found"); $this->assertQuery("input[name=''email'']", "email
    field not found"); $this->assertQuery("input[name=''password'']", "password field
    not found"); $this->assertQuery("input[name=''photo'']", "photo field not found");
    $this->assertQuery("input[name=''save'']", "register button not found");


    }


    public function testRegisterWorks()'
