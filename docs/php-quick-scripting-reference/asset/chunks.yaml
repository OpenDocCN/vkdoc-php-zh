    \nclass FruitBasket\n{\n  public $apple;\n\nfunction __construct() { $apple =\
    \ new Apple(); }\n\nfunction __clone()\n  {\n    $this->apple = clone $this->apple;\n\
    \  }\n}\n```\n\n# 第 23 章\n\n![图片](img/frontdot.jpg)\n\n# 用户输入\n\n当 HTML 表单提交到\
    \ PHP 页面时，数据就会被该脚本获取。\n\n## HTML 表单\n\n一个 HTML 表单有两个必需的属性：`action` 和 `method`。`action`\
    \ 属性指定了表单数据传递到的脚本。例如，下面的表单将一个名为 `myString` 的输入属性提交给脚本文件 `MyPage.php`。\n\n```\n\
    <html>\n<body>\n  <form action=\"MyPage.php\" method=\"post\">\n    <input type=\"\
