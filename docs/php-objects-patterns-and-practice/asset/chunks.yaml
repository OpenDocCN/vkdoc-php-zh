    \ such as scalar and return\ntype declarations. Probably for reasons of backward\
    \ compatibility, a few\npopular frameworks remain essentially procedural in nature\
    \ (notably\nWordPress); by-and-large, however, most new PHP projects today are\n\
    object-oriented.\n\nIn Chapters [3](#A314621_5_En_3_Chapter.html), [4](#A314621_5_En_4_Chapter.html),\
    \ and [5](#A314621_5_En_5_Chapter.html), I looked at PHP’s object-oriented\nsupport\
    \ in detail. Here are some of the new features PHP has introduced\nsince version\
    \ 5: reflection, exceptions, private and protected methods\nand properties, the\
    \ `__toString()` method,\nthe `static`\nmodifier, abstract classes and methods,\
    \ final methods and properties,\ninterfaces, iterators, interceptor methods, type\
    \ declarations, the `const` modifier,\npassing by reference, `__clone()`, the\
    \ `__construct()` method,\nlate static binding, namespaces, and anonymous classes.\
    \ The extensive\nlength of this incomplete list reveals the degree to which the\
    \ future of\nPHP is bound up with object-oriented programming.\n\nThe Zend Engine\
    \ 2 and PHP 5 have made object-oriented design central to\nthe PHP project, opening\
    \ up the language to a new set of developers and\nopening up new possibilities\
    \ for existing devotees.\n\nIn Chapter [6](#A314621_5_En_6_Chapter.html), I looked\
    \ at the benefits that\nobjects can bring to the design of your projects. Because\
    \ objects and\ndesign are one of the central themes of this book, it is worth\
    \ recapping\nsome conclusions in detail.\n\nChoice\n\nThere is no law that says\
    \ you have to develop with classes and objects\nonly. Well-designed object-oriented\
    \ code provides a clean interface that\ncan be accessed from any client code ,\
    \ whether procedural or\nobject-oriented. Even if you have no interest in writing\
    \ objects\n(unlikely if you are still reading this book), you will probably find\n\
    yourself using them, if only as a client of Composer packages.\n\nEncapsulation\
    \ and Delegation\n\nObjects mind their own business and get on with their allotted\
    \ tasks\nbehind closed doors. They provide an interface through which requests\n\
    and results can be passed. Any data that need not be exposed, and the\ndirty details\
    \ of implementation, are hidden behind this front.\n\nThis gives object-oriented\
    \ and procedural projects different shapes. The\ncontroller in an object-oriented\
    \ project is often surprisingly sparse,\nconsisting of a handful of instantiations\
    \ that acquire objects and\ninvocations that call up data from one set and pass\
    \ it on to another.\n\nA procedural project, on the other hand, tends to be much\
    \ more\ninterventionist. The controlling logic descends into implementation to\
    \ a\ngreater extent, referring to variables, measuring return values, and\ntaking\
    \ turns along different pathways of operation according to\ncircumstance.\n\n\
    Decoupling"
