- "# 网络\n\n## DNS 功能\n\n##### `dns_get_record()`\n\n来看一个示例。假设你想进一步了解 `example.com`\
  \ 域名：\n\n```php\n<?php\n\n$result = dns_get_record(\"example.com\");\n\nprint_r($result);\n\
  \n?>\n```\n\n返回的抽样信息如下：\n\n```\nArray (\n    [0] => Array (\n        [host] => example.com\n\
  \        [type] => NS\n        [target] => a.iana-servers.net\n        [class] =>\
  \ IN\n        [ttl] => 110275\n    )\n    [1] => Array (\n        [host] => example.com\n\
  \        [type] => A\n        [ip] => 192.0.34.166\n        [class] => IN\n    \
  \    [ttl] => 88674\n    )\n)\n```\n\n如果你只对名称服务器记录感兴趣，可以执行以下代码：\n\n```php\n<?php\n\
  \n$result = dns_get_record(\"example.com\",\"DNS_CNAME\"); print_r($result);\n\n\
  ?>\n```\n\n这会返回以下内容：\n\n```\nArray ( [0] => Array ( [host] => example.com [type]\
  \ => NS\n[target] => a.iana-servers.net [class] => IN [ttl] => 21564 )\n[1] => Array\
  \ ( [host] => example.com [type] => NS\n[target] => b.iana-servers.net [class] =>\
  \ IN [ttl] => 21564 ) )\n```\n\n##### `getmxrr()`\n\n```\nint getmxrr (string *hostname*,\
  \ array *&mxhosts* [, array *&weight*])\n```\n\n`getmxrr()` 函数检索由 `hostname` 指定的主机的\
  \ MX 记录。MX 记录会被添加到 `mxhosts` 指定的数组中。如果提供了可选输入参数 `weight`，相应的权重值将被放置在其中，这些权重值指向每个由记录标识的服务器所分配的命中率。示例如下：\n\
  \n```php\n<?php\n\ngetmxrr(\"wjgilmore.com\",$mxhosts);\n\nprint_r($mxhosts);\n\n\
  ?>\n```\n\n这会返回以下内容：\n\n```\nArray ( [0] => mail.wjgilmore.com)\n```\n\n#### 服务\n\
  \n尽管我们通常泛化地使用“互联网”这个词，谈论着使用互联网聊天、阅读或下载某款游戏的最新版本，但实际上，我们指的是共同定义这个通信平台的一个或多个互联网服务。这些服务的例子包括\
  \ HTTP、FTP、POP3、IMAP 和 SSH。出于各种原因（其解释超出了本书范围），每个服务通常运行在一个特定的通信端口上。例如，HTTP 的默认端口是\
  \ 80，SSH 的默认端口是 22。如今，网络各层级对防火墙的广泛需求使得了解这些事项变得相当重要。PHP 有两个函数，`getservbyname()` 和\
  \ `getservbyport()`，可用于了解更多关于服务及其对应端口号的信息。\n\n##### `getservbyname()`\n\n```\nint\
  \ getservbyname (string *service*, string *protocol*)\n```\n\n`getservbyname()`\
  \ 函数返回与 `/etc/services` 文件中 `service` 对应的服务端口号。`protocol` 参数指定你引用的是该服务的 tcp 还是 udp\
  \ 组件。来看一个示例：\n\n```php\n<?php\n\necho \"HTTP 的默认端口号是：\".getservbyname(\"http\",\
  \ \"tcp\");\n\n?>\n```\n\n这会返回以下内容：\n\n```\nHTTP 的默认端口号是：80\n```\n\n##### `getservbyport()`\n\
  \n```\nstring getservbyport (int *port*, string *protocol*)\n```\n\n`getservbyport()`\
  \ 函数返回与 `/etc/services` 文件中提供的端口号对应的服务名称。`protocol` 参数指定你引用的是该服务的 tcp 还是 udp 组件。来看一个示例：\n\
  \n```php\n<?php\n\necho \"端口 80 的默认服务是：\".getservbyport(80, \"tcp\");\n\n?>\n```\n\
  \n这会返回以下内容：\n\n```\n端口 80 的默认服务是：http\n```\n\n### 建立套接字连接\n\n在当今的网络环境中，你常常需要查询本地或远程的服务。这通常通过与该服务建立套接字连接来完成。本节将演示如何使用\
  \ `fsockopen()` 函数实现这一点。\n\n#### `fsockopen()`\n\n```\nresource fsockopen (string\
  \ *target*, int *port* [, int *errno* [, string *errstring*\n[, float *timeout*]]])\n\
  ```\n\n`fsockopen()` 函数在端口 `port` 上与 `target` 指定的资源建立连接，并将错误信息返回给可选参数 `errno` 和\
  \ `errstring`。可选参数 `timeout` 设置一个时间限制（以秒为单位），指定函数在失败之前尝试建立连接的时间长度。\n\n第一个示例展示了如何使用\
  \ `fsockopen()` 与 `www.example.com` 建立端口 80 连接，并输出其首页：\n\n```php\n<?php\n\n// 与\
  \ www.example.com 建立端口 80 连接\n\n$http = fsockopen(\"www.example.com\",80);\n\n//\
  \ 向服务器发送请求\n\n$req = \"GET / HTTP/1.1\\r\\n\";\n\n$req .= \"Host: www.example.com\\\
  r\\n\";\n\n$req .= \"Connection: Close\\r\\n\\r\\n\";\n\nfputs($http, $req);\n\n\
  // 输出请求结果\n\nwhile(!feof($http))\n\n{\n\necho fgets($http, 1024);\n\n}\n\n// 关闭连接\n\
  \nfclose($http);\n\n?>\n```\n\n这会返回以下内容：\n\n```\nHTTP/1.1 200 OK Date: Mon, 05 Jan\
  \ 2006 02:17:54 GMT Server: Apache/1.3.27 (Unix) (Red-Hat/Linux) Last-Modified:\
  \ Wed, 08 Jan 2006 23:11:55 GMT ETag:\n\"3f80f-1b6-3e1cb03b\" Accept-Ranges: bytes\
  \ Content-Length: 438\nConnection: close Content-Type: text/html\n\nYou have reached\
  \ this web page by typing \"example.com\", \"example.net\", or\n\"example.org\"\
  \ into your web browser.\n\nThese domain names are reserved for use in documentation\
  \ and are not available for registration. See RFC 2606, Section 3.\n```\n\n第二个示例，如清单\
  \ 16-1 所示，演示了如何使用 `fsockopen()` 构建一个基本的端口扫描器。\n\n**清单 16-1.** *使用 fsockopen() 创建端口扫描器*\n\
  \n```php\n<?php\n\n// 为脚本提供足够的时间完成此任务\n\nini_set(\"max_execution_time\", 120);\n\
  \n// 定义扫描范围\n\n$rangeStart = 0;\n\n$rangeStop = 1024;\n\n// 要扫描哪个服务器？\n\n$target\
  \ = \"www.example.com\";\n\n// 构建端口值的数组\n\n$range =range($rangeStart, $rangeStop);\n\
  \necho \"<p>$target 的扫描结果</p>\";\n\n// 执行扫描\n\nforeach ($range as $port) {\n\n$result\
  \ = @fsockopen($target, $port,$errno,$errstr,1);\n\nif ($result) echo \"<p>端口 $port\
  \ 处套接字已打开</p>\";\n\n}\n\n?>\n```\n\n扫描 `www.example.com` 网站，返回以下输出：\n\n```\nwww.example.com\
  \ 的扫描结果：\n\n端口 22 处套接字已打开\n\n端口 80 处套接字已打开\n\n端口 443 处套接字已打开\n```\n\n实现相同目标的一种更省事的方法是使用程序执行命令（如\
  \ `system()`）和出色的免费软件包 Nmap (http://www.insecure.org/nmap/)。本章的结束部分“常见网络任务”中演示了这种方法。\n\
  \n#### `pfsockopen()`\n\n```\nint pfsockopen (string *host*, int *port* [, int *errno*\
  \ [, string *errstring*\n[, int *timeout*]]])\n```\n\n`pfsockopen()` 函数，即“持久化 `fsockopen()`”，在操作上与\
  \ `fsockopen()` 相同，区别在于脚本执行完成后连接不会关闭。\n\n### 邮件\n\nPHP 这个强大且易于实现的功能非常有用，并且在众多 Web\
  \ 应用程序中都是必需的，以至于本节很可能是本章（如果不是本书的话）中最受欢迎的部分之一。在本节中，你将学习如何使用 PHP 流行的 `mail()` 函数发送电子邮件，包括如何控制头部、包含附件以及执行其他常见的任务。此外，还将介绍\
  \ PHP 的 IMAP 扩展，并演示通过这个出色的库提供的众多功能。\n\n本节将介绍相关的配置指令，描述 PHP 的 `mail()` 函数，并以几个突出展示该函数多种用法的示例作为结尾。\n\
  \n### 配置指令\n\n有五个与 PHP 的 `mail()` 函数相关的配置指令。请密切关注这些描述，因为每条指令都是特定于平台的。\n\n- `SMTP`\n\
  \  - 作用域：`PHP_INI_ALL`\n  - 默认值：`localhost`\n\n\n\n"
- '# SMTP


  `SMTP`指令用于为 PHP 的 Windows 平台版本`mail()`函数设置邮件传输代理（MTA）。请注意，此指令仅适用于 Windows 平台，因为该函数在
  Unix 平台上的实现实际上只是该操作系统`mail()`函数的包装器。相反，Windows 平台的实现依赖于通过套接字连接至由该指令定义的本地或远程 MTA。


  '
- '# sendmail_from


  作用域：`PHP_INI_ALL`；默认值：`Null`


  `sendmail_from`指令用于设置邮件标头中的`From`字段。该参数仅在 Windows 平台上有用。如果您使用的是 Unix 平台，则必须在`mail()`函数的`addl_headers`参数中设置此字段。


  '
- '# sendmail_path


  作用域：`PHP_INI_SYSTEM`；默认值：默认的 sendmail 路径


  如果`sendmail`二进制文件不在系统路径中，或者您想向其传递额外参数，则`sendmail_path`指令用于设置该文件的路径。默认情况下，其值设置为：`sendmail
  -t -i`


  请记住，此指令仅适用于 Unix 平台。Windows 平台依赖于与`SMTP`指令指定的 SMTP 服务器（通过`smtp_port`端口）建立套接字连接。


  '
- '# smtp_port


  作用域：`PHP_INI_ALL`；默认值：`25`


  `smtp_port`指令用于设置连接至`SMTP`指令所指定服务器时使用的端口。


  '
- '# mail.force_extra_parameters


  作用域：`PHP_INI_SYSTEM`；默认值：`Null`


  您可以使用`mail.force_extra_parameters`指令向`sendmail`二进制文件传递额外标志。请注意，此处传递的任何参数将替换通过`mail()`函数的`addl_parameters`参数传递的内容。


  从 PHP 4.2.3 开始，如果您在安全模式下运行，`addl_params`参数会被禁用。但是，即使启用了安全模式，通过此指令传递的任何标志仍会被传递。此外，该参数在
  Windows 平台上无效。


  #### `mail()`


  ```php

  boolean mail(string to, string subject, string message [, string addl_headers

  [, string addl_params]])

  ```


  `mail()`函数可以向`to`中指定的一个或多个收件人发送主题为`subject`、内容包含`message`的电子邮件。您可以使用`addl_headers`参数定制邮件的多项属性，甚至可以通过`addl_params`参数传递额外标志来修改
  SMTP 服务器的行为。


  在 Unix 平台上，PHP 的`mail()`函数依赖于`sendmail` MTA。如果您使用其他 MTA（例如 qmail），则需要使用该 MTA 的`sendmail`包装器。PHP
  在 Windows 平台上实现的该函数则依赖于与本章前面介绍的`SMTP`配置指令所指定的 MTA 建立套接字连接。


  本节其余部分将通过大量示例，重点展示这个简单而强大函数的多种能力。


  #### 发送纯文本电子邮件


  使用`mail()`函数发送最简单的电子邮件很简单，只需使用三个必需参数。示例如下：


  ```php

  <?php


  mail("test@example.com", "这是一个主题", "这是邮件正文");


  ?>

  ```


  尝试将示例中的收件人地址替换为您自己的地址，并在服务器上执行该脚本。邮件应在片刻后到达您的收件箱。如果您在 Windows 服务器上执行此脚本，`From`字段应显示您在`sendmail_from`配置指令中设置的电子邮件地址。但是，如果您在
  Unix 机器上执行此脚本，您可能会注意到`From`地址有些奇怪，很可能显示为`nobody`或`www`用户。由于 PHP 的`mail()`函数在 Unix
  系统上的实现方式，默认发件人将显示为服务器守护进程运行时所用的同一用户。您可以更改此默认设置，如下一个示例所示。




  '
- '# 发送带有额外标头的电子邮件


  上述示例在某种程度上是一种概念验证，仅为了展示通过 PHP 确实可以发送邮件。然而，在实际应用中，不太可能采用这种极为精简的方法。相反，你可能需要指定额外的标头，例如`Reply-To`、`Content-Type`和`From`。为此，你可以使用`mail()`函数的`addl_headers`参数，如下所示：


  ```

  <?php


  $headers = "From:sender@example.com\r\n";


  $headers .= "Reply-To:sender@example.com\r\n";


  $headers .= "Content-Type: text/plain;\r\n charset=iso-8859-1\r\n"; mail("test@example.com",
  "This is the subject",


  "This is the mail body", $headers);


  ?>

  ```


  使用额外标头时，请确保其语法和顺序与 RFC 822 和 2822 中的规定完全一致；否则，可能会发生意外行为。


  已知某些邮件服务器未能完全遵循规范，从而导致额外的异常行为。如果出现问题，请查阅相应的文档。


  '
- '# 发送邮件给多个收件人


  发送邮件给多个收件人很容易实现，只需在`to`参数中放置逗号分隔的地址列表，如下所示：


  ```

  <?php


  $headers = "From:sender@example.com\r\n";


  $recipients = "test@example.com,info@example.com";


  mail($recipients, "This is the subject","This is the mail body", $headers);


  ?>

  ```


  你也可以通过修改相应的标头，将邮件发送给`cc:`和`bcc:`收件人。示例如下：


  ```

  <?php


  $headers = "From:secretary@example.com\r\n";


  $headers .= "Bcc:theboss@example.com\n";


  mail("intern@example.com", "Company picnic scheduled",


  "Don''t be late!", $headers);


  ?>

  ```


  #### 发送 HTML 格式的电子邮件


  尽管许多人认为 HTML 格式的电子邮件堪称互联网上最令人头疼的事物之一，然而，如何发送 HTML 格式的邮件却是一个与 PHP 的`mail()`函数相关的反复出现的问题。因此，提供一个示例似乎是明智之举，并期望不会因此伤害无辜的收件人。


  尽管围绕这个任务存在广泛的困惑，但发送 HTML 格式的电子邮件实际上非常简单。只需将`Content-Type`标头设置为`text/html;`即可。请考虑以下示例：


  ```

  <?php


  // 分配几个标头

  $headers = "From:sender@example.com\r\n";

  $headers .= "Reply-To:sender@example.com\r\n";

  $headers .= "Content-Type: text/html;\r\n charset=\"iso-8859-1\"\r\n";


  // 创建邮件正文。

  $body = "

  <html>

  <head>

  <title>您的冬季学期课程表</title>

  </head>

  <body>

  <p>以下是您的冬季学期课程安排。<br />

  如有任何疑问，请联系您的指导顾问。

  </p>

  <table>

  <tr>

  <th>课程</th><th>教师</th><th>日期</th><th>时间</th>

  </tr>

  <tr>

  <td>数学 630</td><td>Kelly, George</td><td>周一、三、五</td><td>上午 10:30</td>

  </tr>

  <tr>

  <td>物理 133</td><td>Josey, John</td><td>周二、四</td><td>下午 1:00</td>

  </tr>

  </table>

  </body>

  </html>

  ";


  // 发送邮件

  mail("student@example.com", "Wi/03 课程表", $body, $headers);


  ?>

  ```


  执行此脚本将生成一封如图 16-1 所示的邮件。


  **图 16-1.** *一封 HTML 格式的电子邮件*


  由于各种邮件客户端处理 HTML 格式邮件的方式存在差异，在此类问题上，建议坚持使用纯文本格式。


  #### 发送附件


  如何以编程方式创建的邮件中包含附件，这个问题经常出现。最优雅的解决方案之一是通过 Richard Heyes (http://www.phpguru.org/)
  编写并维护的一个优秀类库来实现，该类库名为 HTML Mime Mail 5。它可在 GNU GPL 许可下免费下载和使用，使得发送基于 MIME 的邮件变得轻而易举。


  除了提供始终直观的 OOP 语法来管理邮件发送外，该类库还能执行迄今为止讨论的所有邮件特定任务，并且能够发送附件。


  > **注意** 如果 GPL 许可证不适合您的项目，Richard Heyes 还提供了基于 BSD 许可证的旧版本 HTML Mime Mail。请访问他的网站
  http://www.phpguru.org/ 获取更多信息。


  与大多数其他类库一样，使用 HTML Mime Mail 只需将其放置在您的`INCLUDE`路径中，然后像这样将其包含到脚本中：


  ```

  include("mimemail/htmlMimeMail5.php");

  ```


  接下来，实例化该类并发送一封包含 Word 文档附件的邮件：


  ```

  // 实例化类

  $mail = new htmlMimeMail5();


  // 设置 From 和 Reply-To 标头

  $mail->setFrom(''Jason <author@example.com>'');

  $mail->setReturnPath(''author@example.com'');


  // 设置主题

  $mail->setSubject(''带附件的测试邮件'');


  // 设置正文

  $mail->setText("请查收附件中的第 16 章。谢谢！");


  // 获取要作为附件的文件

  $attachment = $mail->getFile(''chapter16.doc'');


  // 附加文件，为其指定名称和相应的 MIME 类型。

  $mail->addAttachment($attachment, ''chapter16.doc'', ''application/vnd.ms-word'');


  // 将邮件发送至 editor@example.com

  $result = $mail->send(array(''editor@example.com''));

  ```


  请记住，这仅仅是这个优秀类库所提供功能的一小部分。如果你计划将邮件相关功能集成到你的应用程序中，这绝对是一个值得关注的库。


  ### IMAP、POP3 和 NNTP


  PHP 提供了一套强大的函数集用于与 IMAP 协议通信，称为其 IMAP 扩展。由于它主要用于邮件，因此将其放在“邮件”部分似乎很合适。然而，此扩展所依赖的基础库也能够与
  POP3 和 NNTP 协议进行交互。作为入门介绍，本节主要侧重于 IMAP 相关的示例，尽管在许多情况下，这些示例也能透明地适用于其他两种协议。


  然而，在深入探讨 IMAP 扩展的具体细节之前，我们先花点时间回顾一下 IMAP 的用途和优势。IMAP，全称 Internet Message Access
  Protocol（互联网消息访问协议），是斯坦福大学的成果，最早出现于 1986 年。然而，正是在华盛顿大学，该协议才真正开始流行起来，成为访问和操作远程消息存储的一种常用方式。IMAP
  让用户能够像管理本地邮件一样管理电子邮件，创建和管理用于组织的文件夹，使用各种标记（例如，已读、已删除、已回复）标记邮件，以及在存储上执行搜索操作等等。随着用户需要从多个地点（例如，家里、办公室和旅途中）访问电子邮件，这些功能变得越来越有用。


  如今，IMAP 几乎随处可见；事实上，你自己的工作单位或大学很可能提供基于 IMAP 的邮件访问；如果没有，那就在技术上落后了。


  PHP 的 IMAP 功能相当强大，通过该库提供了近 70 个函数。本节将介绍几个关键函数，并提供一些示例，将它们组合起来可以提供非常基础的基于 Web 的邮件客户端的功能。本节的目标是演示此扩展的一些基本功能，并为你提供一个可以开始进行进一步实验的基础。然而，首先你需要完成一些必需的配置相关任务。




  ■**提示** `SquirrelMail`（http://www.squirrelmail.org/）是一款基于 PHP 和 IMAP 扩展编写的综合性 Web
  邮件客户端。它支持 40 种语言，拥有非常活跃的开发者和用户社区，以及超过 200 个插件，`SquirrelMail` 仍然是目前最有前景的开源 Web 邮件产品之一。


  #### 需求


  在使用 PHP 的 IMAP 扩展之前，你需要完成几项相对简单的任务，本节将对此进行概述。PHP 的 IMAP 扩展依赖于由华盛顿大学 (UW) 创建和维护的
  `c-client` 库。你可以从 UW 的 FTP 站点 `ftp://ftp.cac.washington.edu/imap/` 下载该软件。安装该软件非常简单，`c-client`
  包中的 `README` 文件包含了相关说明。不过，一直以来存在一些容易混淆的地方，此处列出其中几点：


  *   `makefile` 包含许多操作系统的端口列表。你应该选择最适合自己系统的端口，并在构建包时指定它。

  *   默认情况下，`c-client` 软件假设你将通过 SSL 连接到 IMAP 服务器。如果你选择不使用 SSL 进行连接，请务必在构建包时在命令行中传递
  `SSLTYPE=none`。否则，PHP 将在后续配置过程中失败。

  *   如果你计划仅使用 `c-client` 库来允许 PHP 与远程或预先存在的本地 IMAP/POP3/NNTP 服务器通信，则无需安装 `README`
  文档中讨论的各种守护进程。仅构建该包就足够了。

  *   有报告称，将 `c-client` 源代码文件复制到操作系统的 include 目录时会发生严重的系统冲突。为避免此类问题，请在该目录中创建一个子目录（例如命名为
  `imap-版本号#`），并将文件放置其中。


  一旦 `c-client` 构建完成，使用 `--with-imap` 标志重新构建 PHP。为了节省时间，请查看 `phpinfo()` 函数的输出，并复制“Configure
  Command”部分的内容。其中包含上次使用的 `configure` 命令及其所有附带的标志。将其复制到命令行，并在其后附加以下内容：


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ```

  --with-imap=/path/to/c-client/directory

  ```


  重启 Apache，你应该就可以继续了。


  下一节将重点介绍该库中你最可能使用的那些函数。为实用起见，这些函数将根据其任务进行介绍，从建立服务器连接等非常基础的过程开始，到你可能需要的一些更复杂的操作（如重命名邮箱和移动邮件）结束。请记住，这些只是
  IMAP 扩展提供的函数中的一部分示例。完整的函数列表请查阅 PHP 手册。


  #### 建立与关闭连接


  在使用任一协议执行任何操作之前，你需要建立服务器连接。一如既往，完成必要任务后，应关闭连接。本节将介绍能够处理这两项任务的函数。


  ##### `imap_open()`


  ```

  resource imap_open(string *mailbox*, string *username*, string *pswd* [, int *options*])

  ```


  `imap_open()` 函数建立到一个由 `mailbox` 指定的 IMAP 邮箱的连接，成功时返回一个 IMAP 流，否则返回 `FALSE`。此连接依赖于三个组件：`mailbox`、`username`
  和 `pswd`。后两个组件的含义不言自明，但 `mailbox` 应同时包含服务器地址和邮箱路径这一点可能不那么明显。此外，如果使用的端口号不是标准端口（IMAP、POP3
  和 NNTP 的 143、110 和 119），你需要在此参数后添加一个冒号，后跟特定的端口号。




  '
- "# 可选的 `options` 参数是一个由一种或多种值组成的位掩码。此处介绍最相关的一些值：\n\n- `OP_ANONYMOUS`：当你不想更新或使用 `.newsrc`\
  \ 配置文件时，应使用此 NNTP 专用选项。\n\n- `CL_EXPUNGE`：此选项会使打开的邮箱在关闭时被彻底清除。清除邮箱意味着所有标记为删除的邮件将被销毁。\n\
  \n- `OP_HALFOPEN`：指定此选项将告知 `imap_open()` 打开一个连接，但不要打开任何特定邮箱。此选项仅适用于 NNTP 和 IMAP。\n\
  \n- `OP_READONLY`：此选项告知 `imap_open()` 以只读权限打开邮箱。\n\n- `OP_SECURE`：此选项强制 `imap_open()`\
  \ 忽略不安全的身份验证尝试。\n\n以下示例分别演示了如何打开与 IMAP、POP3 和 NNTP 邮箱的连接：\n\n```\n// 打开一个 IMAP 连接\n\
  $ms = imap_open(\"{imap.example.com:143/imap/notls}\",\"jason\",\"mypswd\");\n\n\
  // 打开一个 POP3 连接\n$ms = imap_open(\"{pop3.example.com:110/pop3/notls}\",\"jason\"\
  ,\"mypswd\");\n\n// 打开一个 NNTP 连接\n$ns = imap_open(\"{nntp.example.com:119/nntp}\"\
  ,\"jason\",\"mypswd\");\n```\n\n**注意：** 如果你计划执行非 SSL 连接，则需要为 IMAP 邮箱添加后缀 `/imap/notls`，为\
  \ POP3 邮箱添加后缀 `/pop3/notls`，因为 PHP 默认假设你正在使用 SSL 连接。忽略使用此后缀将导致尝试失败。\n\n##### `imap_close()`\n\
  \n`boolean imap_close(resource msg_stream [, int flag])` `imap_close()` 函数关闭一个先前由\
  \ `msg_stream` 指定的已建立流。它接受一个可选标志 `CL_EXPUNGE`，该标志在执行时会销毁所有标记为删除的邮件。示例如下：\n\n```\n\
