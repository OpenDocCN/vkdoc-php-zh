- fmt: "# If you are creating a service to store images and other files you might\
    \ end up with the same file being uploaded multiple times with the same or different\
    \ names but by looking at the hash value of the content of the file it's possible\
    \ to determine if the file is already on your system. In order to do that we will\
    \ create a database table that contains an `id`, `filename`, and `hash` of each\
    \ file. When a new file is added we check to see if the `hash` is already known,\
    \ and if it is we return the existing hash; if it's not known we create a new\
    \ record and store the file.\n\n```php\n<?php\n\n// 6_24.php\n\n// create table\
    \ files (\n//   id int auto_increment,\n//   hash varchar(255),\n//   filename\
    \ varchar(255),\n//   primary key(id)\n// );\n// create index ixHash on files(hash);\n\
    \n$con = mysqli_connect('127.0.0.1', 'root', 'secret', 'book');\n\nfunction GetFile($hash)\
    \ {\n  global $con;\n  $file = null;\n\n  $sql = \"select * from files where hash\
    \ = '{$hash}'\";\n  $rs = mysqli_query($con, $sql);\n  if ($rs) {\n    $file =\
    \ mysqli_fetch_row($rs);\n    mysqli_free_result($rs);\n  }\n  return $file;\n\
    }\n\nfunction SaveFile($filename) {\n  global $con;\n  $hash = hash_file('sha256',\
    \ $filename);\n  if (!GetFile($hash)) {\n    mysqli_query($con, \"insert into\
    \ files (hash, filename) values ('{$hash}', '{$filename}')\");\n  }\n}\n\nSaveFile('6_1.php');\n\
    SaveFile('6_12.php');\nSaveFile('6_1.php');\n\n$rs = mysqli_query($con, \"select\
    \ * from files\");\nif ($rs) {\n  while ($row = mysqli_fetch_row($rs)) {\n   \
    \ print_r($row);\n  }\n  mysqli_free_result($rs);\n}\n\nmysqli_close($con);\n\
    ```\n\nThe function `GetFile()` will return the values stored in the database\
    \ if the hash is already found and `null` if it's not already in the database.\
    \ The function `SaveFile()` will call the `GetFile()` function before creating\
    \ the new record to prevent duplicate records. This is shown at the end of the\
    \ example where we insert three files.\n\nThe first and the last is the same file\
    \ so only two records get created and the output will look like this:\n\n```\n\
    Array\n(\n    [0] => 1\n    [1] => 866b1551930506766708fbb73cfdfc6fd5038cf812cb64983f43d771b8e0ff71\n\
    \    [2] => 6_1.php\n)\nArray\n(\n    [0] => 2\n    [1] => 125a71508e064ee34662498fcb040585fd1bf539cf4f09b203a79adffba8fc99\n\
    \    [2] => 6_12.php\n)\n```\n\n## Recipe 6-12. Storing Passwords\n\n### Problem\n\
    \nMany web sites allow the users to register and create an account to get access\
    \ to additional features or to view statuses on shopping orders. Many of these\
    \ sites use an e-mail address as the user id and some form of password. Storing\
    \ passwords as plain text values in a database is not very secure. If the site\
    \ is hacked or the hard drive gets into the wrong hands, all the passwords might\
    \ be exposed.\n\n### Solution\n\nInstead of storing the plain text password we\
    \ can store a hash value of the password. We can use the `md5()`, `sha1()`, or\
    \ `hash()` function from the previous recipe or if you are using PHP 5.5 or newer,\
    \ you can use the `password_hash()` function. It is recommended that the database\
    \ schema allows for at least 60 characters (255 is better) for the password column\
    \ as the hashing algorithm might change over time to improve security and create\
    \ stronger hash values.\n\n### How it Works\n\nIf you have a table called `users`\
    \ with the columns `login` and `password` you should use the `password_hash()`\
    \ function before storing a password for a user and before checking if the login\
    \ and password provided during the login is valid.\n\n```php\n<?php\n\n// 6_25.php\n\
    \n//create table myusers (\n//  id int auto_increment,\n//  login varchar(255),\n\
    //  password varchar(255),\n//  primary key(id)\n//);\n\n$con = mysqli_connect('127.0.0.1',\
    \ 'root', 'secret', 'book');\n\nfunction CreateUser($login, $password) {\n  global\
    \ $con;\n  $login = mysqli_escape_string($con, $login);\n  $password = mysqli_escape_string($con,\
    \ password_hash($password, PASSWORD_BCRYPT));\n  mysqli_query($con, \"insert into\
    \ myusers (login, password) values ('{$login}', '{$password}')\");\n}\n\nfunction\
    \ CheckUser($login, $password) {\n  global $con;\n  $user = null;\n  $login =\
    \ mysqli_escape_string($con, $login);\n  $rs = mysqli_query($con, \"select * from\
    \ myusers where login='{$login}'\");\n  if ($rs) {\n    $user = mysqli_fetch_assoc($rs);\n\
    \    if ($user && !password_verify($password, $user['password'])) {\n      $user\
    \ = null;\n    }\n    mysqli_free_result($rs);\n  }\n  return $user;\n}\n\nCreateUser('john@example.com',\
    \ 'A secret Password');\n\nif (CheckUser('john@example.com', 'A secret Password'))\
    \ {\n  echo \"User exists and password is correct\\n\";\n}\nelse {\n  echo \"\
    User does not exist or password is incorrect\\n\";\n}\n```\n\nUsing the MySQL\
    \ command-line tool to show the rows in the table will look something like this:\n\
    \n```\nMariaDB [book]> select password from myusers;\n+--------------------------------------------------------------+\n\
    | password                                                     |\n+--------------------------------------------------------------+\n\
    | $2y$10$V4KWuQIzssFRmlQeZNLPeegsyQ0MFp0vjUNl3FP9.7k5E4EiB5INi |\n+--------------------------------------------------------------+\n\
    1 row in set (0.00 sec)\n```\n\n# Chapter 7: Files and Directories\n\nIn this\
    \ chapter we are going to discuss two basic ways that files are used with PHP.\
    \ The first one is the script with the PHP code in the form of the main script\
    \ file and includes any files that the script might use.\n\nThe second one is\
    \ in the form of more content or data that is read off the local or remote file\
    \ system and processed by the script.\n\n## Recipe 7-1. Include and Require\n\n\
    ### Problem\n\nWhen PHP is used to execute or interpret a script it always starts\
    \ with a single file. This can be as an input parameter to the command-line version\
    \ of PHP (`php-cli`) or indirectly from a web server request that is passed onto\
    \ PHP.\n\nHaving a single file contain all the code needed for each request could\
    \ lead to large script files and code duplication. In addition it makes sense\
    \ to break the code into small units each serving a specific purpose.\n\nThis\
    \ is often done with a single class definition in each file.\n\n### Solution\n\
    \nThis is where `include` and `require` come into play. Any time you have code\
    \ that's shared between multiple scripts you can place it in a separate file and\
    \ include the code everywhere it's needed. The basic differences between `include`\
    \ and `require` is how these statements react if the requested file doesn't exist\
    \ on the file system. `Include` will generate a warning and `require` will generate\
    \ a fatal error and stop the script execution.\n\nThere are two different schools\
    \ of thought on how to structure include files. The first is to place them in\
    \ the same directory structure as the main script(s). Normally this forces the\
    \ developer to use the same extension as the main scripts in order to avoid exposure\
    \ of the content to the end user if they were to request the files directly. If\
    \ the web server is configured to take files that have the `.php` extension and\
    \ pass them through the PHP interpreter, files with other extensions like `.inc`\
    \ might just be passed on as is and if the file includes database credentials\
    \ and other secrets the end user might be able to access these. The simple fix\
    \ to this is to make sure the web server is configured to hand all PHP files off\
    \ to the interpreter. An include file that is used to configure database credentials\
    \ will most likely not generate any output so the content the user will see will\
    \ be an empty document.\n\nThe other school of thought is to place all include\
    \ files outside the directory structure that is used to define the document root\
    \ for the web site. In this case the files can have any extension, and they can't\
    \ be exposed directly to the user because the web server does not know how to\
    \ access these. This is the preferred method in my opinion.\n\n© Frank M. Kromann\
    \ 2016\n\nF.M. Kromann, *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_7"
