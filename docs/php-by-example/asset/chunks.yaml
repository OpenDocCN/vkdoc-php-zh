    Let’s talk about the scheme. The browser on the client side makes a request to
    the server. The server sends a response – the page with the form. There is the
    `Submit` button. The form data is sent to the server when the button is clicked.
    The server processes the data (for doing that, a script is used that can be explicitly
    specified in the form description) and then sends a response (HTML code) to the
    browser. The document, among other things, can be displayed in the window where
    the document with the form was displayed initially. That is the approach you use
    in the example.


    Finally, the `action` attribute defines the script to process the form data. The
    HTML code resulting from executing the program is sent back to the browser. In
    this example, the value of the `action` attribute is the text `"listing12_03.php"`.
    That means the form data is passed to the program written in the `listing12_03.php`
    file for processing.


