    \n## 工作原理：处理税费与运费问题\n\n请注意，这是本章最关键代码段之一。如果您决定添加自己的税费与运费系统，此处很可能是您需要进行修改的地方，因为所有选择都在此页面完成。数据库和业务层的修改则更为通用——但并非说改动不必要。\n\
    \n在测试新系统处理税费与运费功能之前，请先通过订单管理页面检查旧订单是否未受影响。旧订单检索的信息应保持不变，因为数据未发生更改。\n\n下新订单时，最好选择位于美国/加拿大发货区域的客户（因该区域目前是唯一征收税费的区域）。请注意，在结账页面上必须选择配送选项。\n\
    \n下单后，在数据库中查看新订单。结果如图 12-3 所示。\n\n在本章之前的内容中，您已经基本了解了税费与运费的计算方式，让我们来简要回顾一下。\n\n\
    首先，客户需要为其地址选择发货区域。如果未选择发货区域，客户将无法选择配送选项，从而无法下单。当客户下单时，所选发货区域会附在`orders`表的订单记录中。订单的税费要求也会附加上，但此过程无需用户输入，当前使用非常简单的算法完成选择（尽管修改起来并不困难）。\n\
    \n## 后续开发\n\n从这里出发有多种发展方向。首先或许是为税费和配送选项添加管理系统。这里未实现此功能，部分原因是基于您已掌握的书籍经验来看这并不复杂，另一部分原因是此处呈现的技术更像是一种开发模板，而非完整的解决方案。税费与运费计算存在众多选项，此处仅讨论基础内容。\n\
    \n接入在线服务进行税费与运费计算是很有吸引力的选择；对于配送服务而言，这完全可行。实际上，FedEx 等运输公司提供的服务与本书后续将介绍的信用卡网关公司流程类似。访问这些服务所需的代码与信用卡处理代码将非常相似，当然，您需要根据具体细节进行调整。但遗憾的是，可能需要进行更重大的修改，例如为产品增加重量和尺寸信息——这完全取决于您销售的产品类型。以\
    \ HatShop 目录中的商品为例，许多产品比空气还轻，运费可能非常低廉。\n\n## 本章小结\n\n在本章中，您扩展了 HatShop 网站，使客户能够利用第\
    \ 11 章引入的所有新数据和技术下单。本章中的大部分修改为本应书籍后续将使用的订单处理管道奠定了基础。您还实现了一种快速查看客户订单的方法，尽管这远非一个完整的管理工具——后续章节会进一步完善。\n\
    \n您还实现了一个简单的系统，用于向订单添加税费和运费。该系统远非通用解决方案，但它能工作且足够简单。更重要的是，你可以轻松在此基础上构建更复杂的算法和用户交互，以选择税费与配送选项并相应定价。\n\
    \n从下一章开始，您将通过开发专业的订单处理管道，进一步扩展客户订购系统。\n\n## 第十三章\n\n实现订单管道：第一部分\n\n您的电子商务应用程序正逐步完善。已添加客户账户功能，并正在跟踪客户地址和信用卡信息——这些信息已安全存储。然而，目前您并未使用这些信息，而是将处理责任委托给\
    \ PayPal。\n\n在本章及下一章中，您将构建自己的订单处理管道，处理信用卡授权、库存检查、配送、邮件通知等事务。我们将把信用卡处理的具体细节留到第\
    \ 15 章讨论，但本章将展示此流程在整个架构中的位置。\n\n对于电子商务网站而言，订单管道功能是一项极其有用的能力。订单管道功能让您能够跟踪订单在流程每个阶段的状态，并提供审计信息，以便后续参考或在订单处理出现问题时进行追溯。所有这些操作都无需依赖第三方会计系统，这也有助于降低成本。本章第一部分将讨论什么是订单管道，以及适用于\
    \ HatShop 应用的具体细节。\n\n本章主体部分将构建订单管道系统，这还需要对当前工作方式进行少量修改，并对正在使用的数据库进行一些补充。然而，本章中的代码并不比您已经使用的代码复杂多少。真正的挑战在于系统的设计。\n"
- fmt: '# What Is an Order Pipeline?


    Any commercial transaction, whether in a shop on the street, over the Internet,
    or anywhere else, has several related tasks that must be carried out before it
    can be considered complete.


    For example, you can’t simply remove an item of clothing from a fashion boutique
    (without paying) and say that you’ve bought it—remuneration is an integral part
    of any purchase. In addition, a transaction only completes successfully if each
    of the tasks carried out completes successfully. If a customer’s credit card is
    rejected, for example, then no funds can be taken from it, so a purchase can’t
    be made.


    The sequence of tasks in a transaction is often thought of in terms of a pipeline.
    In this analogy, orders start at one end of the pipe and come out of the other
    end when they are completed. Along the way, they must pass through several pipeline
    sections, each of which is responsible for a particular task or a related group
    of tasks. If any pipeline section fails to complete, then the order “gets stuck”
    and might require outside interaction before it can move further along the pipeline,
    or it might be canceled completely.


    For example, the simple pipeline shown in Figure 13-1 applies to transactions
    in a brick-and-mortar store.


    **Figure 13-1.** *Transactions for a brick-and-mortar store*


    The last section might be optional and might involve additional tasks such as
    gift-wrapping. The payment stage might also take one of several methods of operation
    because the customer could pay using cash, a credit card, gift certificates, and
    so on.


    When you consider e-commerce purchasing, the pipeline becomes longer, but it isn’t
    really any more complicated.


    ## Designing the Order Pipeline


    In the HatShop e-commerce application, the pipeline will look like the one in
    Figure 13-2.


    **Figure 13-2.** *The HatShop order pipeline*


    The tasks carried out in these pipeline sections are as follows:


    - **Customer Notification:** An email notification is sent to the customer stating
    that order processing has started and confirming the items to be sent and the
    address that goods will be sent to.

    - **Credit Card Authorization:** The credit card used for purchasing is checked,
    and the total order amount is set aside (although no payment is taken at this
    stage).

    - **Stock Check:** An email is sent to the supplier with a list of the items that
    have been ordered. Processing continues when the supplier confirms that the goods
    are available.

    - **Payment:** The credit card transaction is completed using the funds set aside
    earlier.

    - **Shipping:** An email is sent to the supplier confirming that payment for the
    items ordered has been taken. Processing continues when the supplier confirms
    that the goods have been shipped.

    - **Customer Notification:** An email is sent notifying the customer that the
    order has been shipped and thanking the customer for using the HatShop web site.


    > **Note:** In terms of implementation, as you’ll see shortly, there are more
    stages than this because the stock check and shipping stages actually consist
    of two pipeline sections—one for sending the email and one that waits for confirmation.


    As orders flow through this pipeline, entries are added to a new database table
    called `audit`. These entries can be examined to see what has happened to an order
    and are an excellent way to identify problems if they occur. Each entry in the
    `orders` table is also flagged with a status, identifying which point in the pipeline
    it has reached.


    To process the pipeline, you’ll create classes representing each stage. These
    classes carry out the required processing and then modify the status of the order
    in the `orders` table to advance the order. You’ll also need a coordinating class
    (or processor), which can be called for any order and executes the appropriate
    pipeline stage class. This processor is called once when the order is placed and,
    in normal operation, is called twice more—once for stock confirmation and once
    for shipping confirmation.


    To make life easier, you’ll also define a common interface supported by each pipeline
    stage class. This enables the order processor class to access each stage in a
    standard way.


    You’ll also define several utility functions and expose several common properties
    in the order processor class, which will be used as necessary by the pipeline
    stages. For example, the ID of the order should be accessible to all pipeline
    stages, so to save code duplication, you’ll put that information in the order
    processor class.


    Now, let’s get on to the specifics. You’ll build a number of files in the `business`
    folder containing all the new classes, which you’ll reference from HatShop. The
    new files you’ll create are the following:


    - `OrderProcessor`: Main class for processing orders.

    - `IPipelineSection`: Interface definition for pipeline sections.

    - `PsInitialNotification`, `PsCheckFunds`, `PsCheckStock`, `PsStockOk`, `PsTakePayment`,
    `PsShipGoods`, `PsShipOk`, `PsFinalNotification`: Pipeline section classes. We’ll
    create these classes in Chapter 14; here we’ll use a dummy (`PsDummy`) class instead.


    The progress of an order through the pipeline as mediated by the order processor
    relates to the pipeline shown earlier (see Figure 13-3).


    **Figure 13-3.** *Pipeline processing*


    The process shown in this diagram is divided into three sections:


    - Customer places order.

    - Supplier confirms stock.

    - Supplier confirms shipping.


    The first stage is as follows:


    1. When the customer confirms an order, `presentation/smarty_plugins/function.load_checkout_info.php`
    creates the order in the database and calls `OrderProcessor` to begin order processing.

    2. `OrderProcessor` detects that the order is new and calls `PsInitialNotification`.

    3. `PsInitialNotification` sends an email to the customer confirming the order
    and advances the order stage. It also instructs `OrderProcessor` to continue processing.

    4. `OrderProcessor` detects the new order status and calls `PsCheckFunds`.'
