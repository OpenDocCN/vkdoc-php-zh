    of Cake. Vendor data flows in one direction, not back and forth.


    **Installing a Third-Party Script**


    Now that I’ve covered the basics of installing a vendor, let’s use a third-party
    script in your blog application. Rather than build a wiki engine from scratch,
    let’s choose one of the many open source text-parsing engines: Textile.


    First, obtain a copy of Textile, which is available at [http://textile.thresholdstate.com.](http://textile.thresholdstate.com)


    In this tutorial, I’ll be using version 2.0\. Once you have downloaded the file
    and decompressed it, you’ll find the main engine file named classTextile.php.
    Place this file in the app/vendors folder for the blog application.


    **Including Textile**


    Make the classTextile.php file contents available to the Posts controller by using
    the App::import() function for including vendors (see Listing 12-3). Be sure to
    place this line before the Posts controller class instantiation line. Since the
    file name is not all lowercase, you must specify the file name in the parameters
    array.


    **Listing 12-3.** *Including Textile As a Vendor*


    <?


    App::import(''Vendor'',''textile'',array(''file''=>''classTextile.php'')); class
    PostsController extends AppController { …


    09775ch12final 7/1/08 9:52 PM Page 211


    C H A P T E R 1 2 ■ V E N D O R S


    **211**


    Now that Textile is included in the Posts controller, the view can use its functions
    to parse the post content. Vendors included in the controller will be available
    in the view, so you need to add nothing else in the controller. Now, because everything
    will depend on the vendor itself and because Cake cannot provide conventions for
    third-party scripts, this process may need to change depending on what vendor
    is being used. Textile itself comes into play when any kind of text needs to be
    rendered in the browser following a wiki-style parser. Thus, this vendor in practice
    would be executed in the view as the view renders the contents provided by the
    database.


    **Instantiating and Running Textile**


    In the app/views/posts/view.ctp file, start a new instance of the Textile class
    by inserting Listing 12-4 into line 1.


    **Listing 12-4.** *Starting a New Textile Class*


    <? $textile = new Textile();?>


    Thanks to the Posts controller and Listing 12-4, the class object functions in
    classTextile.php are now available for use in the view. Textile has the TextileThis()
    function to filter the final text through its engine and parse out its own unique
    wiki-style commands.


    Line 6 now contains the post’s article content as passed in the $post[''Post''][''content'']
    variable. Let’s run this variable through Textile’s TextileThis() function by
    substituting the following line for line 6:


    <?=$textile->TextileThis($post[''Post''][''content'']);?>


    **Writing Posts with Textile**


    Now that Textile is running in your application, you can use its syntax when writing
    blog posts to easily add some text-formatting touches. Since Textile works on
    final output, you don’t have to rework anything in the other Add or Edit actions;
    simply adhere to the syntax when entering text, and all should appear correctly.


    To test your implementation of Textile, try adding some content in a blog post
    using some of Textile’s wiki commands. For example, placing underscores around
    a word will result in the


    <em> tag being wrapped around the word, and so forth.


    **Using Other Frameworks with CakePHP**


    Perhaps one of the most complicated aspects of using a PHP framework is working
    it into a large enterprise-level application that runs on multiple frameworks.
    You may be familiar with some of the other web frameworks out there; you may even
    have experimented with a few of them before trying Cake. The question of how to
    implement another framework with Cake is sometimes the most important concern
    of all.


    Because you can’t assume that these frameworks are entirely compatible with Cake,
    conventions for using them have not been arranged or included in the core. To
    bring them into


    09775ch12final 7/1/08 9:52 PM Page 212


    **212**


    C H A P T E R 1 2 ■ V E N D O R S


    the application, you must tackle the project on an individual basis; each framework
    will have very different methods of working by itself and will certainly require
    a unique set of parameters and methods to work with Cake.


    **Zend Framework**


    One of the most popular PHP frameworks is Zend Framewor[k (http://framework.zend.com](http://framework.zend.com)).


    You may need to take advantage of its functions for your web applications. To
    do so, you must use Zend Framework (Zend, or ZF for short) as a vendor in the
    Cake application.


    **ZEND OR ZF?**


    There are some nuances when referring to Zend Framework. The *company* that created
    the framework is called Zend, and the official title of the *framework* is Zend
    Framework. On its site and elsewhere, the framework is often referred to as ZF
    to avoid confusion with the company name. In this section, however, I prefer to
    avoid the acronym, so I’ll stick with Zend to refer both to the company and to
    the framework. Be advised that when reading up on Zend Framework on the Web, you
    may need to be more specific than just using the company name.'
  trans: '

    # 在 CakePHP 中引入和使用第三方库


    简而言之，引入第三方库是一种机制，让您能够灵活地将外部资源引入应用程序，而不受框架限制；但作为一个框架，Cake 无法代为管理第三方库的局限性。因此，Cake
    提供的用于支持第三方库的函数和方法，实际上仅限于将其引入应用程序。从那里开始，要让第三方库正常工作，就需要理解该库本身的具体构造，以及它如何与 Cake 交互。


    此外，不能期望命名约定、设计模式以及 MVC 结构能延伸到第三方库中。如果您需要执行控制器逻辑，就应该在控制器或组件中编写代码，而不是在第三方库中。我曾与一位初学
    Cake 的开发者交流过，他试图通过将所有内容编写为第三方库文件，并只引入一两个 Cake 资源，来绕过学习 Cake 的函数和结构。这不仅首先就违背了使用
    Cake 的目的，而且还导致在调试第三方库文件上浪费更多时间。


    如果您想要分发一个用 Cake 构建的资源，您可能希望保持其原样，而不是将其作为第三方库发布。换句话说，如果您编写的是一个辅助类，那么就将其作为辅助类提供给其他开发者；他们能更好地理解您编写该脚本的意图，更重要的是，他们会知道如何在自己的应用程序中使用它。第三方库最适合用于那些独立于
    CakePHP 开发、并在各种应用中广泛使用的库或其他脚本。


    ## 单向脚本


    关于第三方库的另一个重要点是，Cake 以单向方式支持它们。第三方库文件本身不能使用 Cake 的辅助函数、类对象或其他资源。尝试将诸如 Ajax 辅助之类的功能引入第三方库，会遇到更多问题，并且需要大量改造才能实现。与此相关的问题是显而易见的；强制第三方库改变其行为，会抵消使用
    Cake 的便利性。关于第三方库可以谈很多，仅仅是因为经常有 Cake 新手会从“包含文件”的角度思考，而不是反过来。所以，请记住——Cake 可以使用第三方库的功能，但第三方库不能使用
    Cake 的功能。第三方库的数据是单向流动的，而不是双向的。


    ## 安装第三方脚本


    既然我已经介绍了引入第三方库的基础知识，那么让我们在您的博客应用程序中使用一个第三方脚本。与其从头构建一个维基引擎，不如选择众多开源文本解析引擎之一：Textile。


    首先，获取一份 Textile 的副本，可从 [`textile.thresholdstate.com`](http://textile.thresholdstate.com)
    获取。


    在本教程中，我将使用 2.0 版本。下载并解压文件后，您会找到名为 `classTextile.php` 的主引擎文件。将此文件放入博客应用程序的 `app/vendors`
    文件夹中。


    ### 引入 Textile


    通过使用 `App::import()` 函数来引入第三方库（参见清单 12-3），使 `Posts` 控制器能够使用 `classTextile.php`
    文件的内容。请确保将这一行放置在 `Posts` 控制器类实例化行之前。由于文件名并非全小写，您必须在参数数组中指定文件名。


    **清单 12-3.** *将 Textile 作为第三方库引入*


    ```php

    <?

    App::import(''Vendor'',''textile'',array(''file''=>''classTextile.php''));

    class PostsController extends AppController {

    …

    ```


    现在 Textile 已被引入 `Posts` 控制器中，视图就可以使用它的函数来解析文章内容了。在控制器中引入的第三方库将在视图中可用，因此您无需在控制器中添加其他内容。现在，由于一切都依赖于第三方库本身，并且
    Cake 无法为第三方脚本提供约定，因此这个过程可能需要根据所使用的第三方库而改变。当任何类型的文本需要按照维基风格的解析器在浏览器中渲染时，Textile
    就派上用场了。因此，这个第三方库实际上会在视图渲染数据库提供的内容时在视图中执行。


    ### 实例化并运行 Textile


    在 `app/views/posts/view.ctp` 文件中，通过插入清单 12-4 到第 1 行，来启动一个新的 `Textile` 类实例。


    **清单 12-4.** *启动一个新的 Textile 类*


    ```php

    <? $textile = new Textile();?>

    ```


    得益于 `Posts` 控制器和清单 12-4，`classTextile.php` 中的类对象函数现在可以在视图中使用了。Textile 提供了 `TextileThis()`
    函数，用于通过其引擎过滤最终文本，并解析其独有的维基风格命令。


    第 6 行现在包含了通过 `$post[''Post''][''content'']` 变量传递来的文章内容。让我们通过用以下行替换第 6 行，来通过 Textile
    的 `TextileThis()` 函数运行这个变量：


    ```php

    <?=$textile->TextileThis($post[''Post''][''content'']);?>

    ```


    ### 使用 Textile 撰写文章


    现在 Textile 已经在您的应用程序中运行了，您可以在撰写博客文章时使用它的语法，轻松添加一些文本格式化的点缀。由于 Textile 作用于最终输出，您无需在其他“添加”或“编辑”操作中做任何修改；只需在输入文本时遵循其语法，一切就应该能正确显示。


    要测试您的 Textile 实现，可以尝试在博客文章中添加一些使用 Textile 维基命令的内容。例如，在单词周围加下划线会得到用 `<em>` 标签包裹该单词的结果，等等。


    ## 在 CakePHP 中使用其他框架


    使用 PHP 框架时，最复杂的方面之一可能是如何将其集成到运行着多个框架的大型企业级应用程序中。您可能熟悉一些其他的 Web 框架；您甚至可能在尝试 Cake
    之前就实验过几个。如何将另一个框架与 Cake 结合使用的问题，有时是所有关注点中最重要的。


    由于不能假定这些框架与 Cake 完全兼容，因此核心中并未安排或包含使用它们的约定。要将它们引入应用程序，您必须逐个项目地处理；每个框架自身的工作方式都截然不同，并且肯定需要一套独特的参数和方法才能与
    Cake 协同工作。


    ### Zend Framework


    最流行的 PHP 框架之一是 Zend Framework（[`framework.zend.com`](http://framework.zend.com)）。您可能需要利用它的函数来构建
    Web 应用程序。为此，您必须在 Cake 应用程序中将 Zend Framework（简称 Zend 或 ZF）作为第三方库来使用。


    **ZEND 还是 ZF？**


    在提及 Zend Framework 时有一些细微差别。创建该框架的*公司*叫 Zend，而该*框架*的官方名称是 Zend Framework。在其网站和其他地方，为了避免与公司名称混淆，该框架通常简称为
    ZF。然而在本节中，我倾向于避免使用缩写，所以我将坚持使用 Zend 来同时指代公司和框架。请注意，当您在网络上查阅 Zend Framework 的资料时，可能需要比仅使用公司名称更具体一些。

    '
- fmt: "好，以下是按照 Markdown 排版要求处理后的内容：\n\n---\n\n幸运的是，对于 Cake 开发者来说，Zend 更像是一组库（按照 Zend\
    \ 开发者的习惯，称之为*组件*）而非一个 MVC 框架。它的每个组件都可以通过包含（include）的方式引入到独立的 PHP 应用程序中。如前所述，将这些组件作为供应商（vendor）使用，可以让您将\
    \ Zend 集成到 Cake 应用中。每个组件都有自己特定的安装步骤，您需要查阅 Zend 的支持网站和文档来了解这些步骤。但在 Cake 中安装 Zend\
    \ 组件的一般步骤将在以下各节中说明。首先，让我们看看您的博客应用程序中是否可以使用 Zend 提供的任何功能。\n\n## 在评论添加操作中屏蔽垃圾信息\n\
    \nZend 的竞争优势之一是其 Web 服务库。从 1.5 版本开始，Zend 提供了以下 Web 服务组件：\n\n- Akismet\n- Amazon\n\
    - Audioscrobbler (Last.fm)\n- Del.icio.us\n- Flickr\n- Nirvanix\n- Simpy\n- SlideShare\n\
    - StrikeIron\n- Technorati\n- Yahoo!\n\n您可以将博客发展出各种功能，从在 Amazon 上自动检查标题到从 Flickr\
    \ 获取图片。但是，最直接且可能是博客最重要的基本功能是垃圾信息检查。由于博客提供了一个用户可以输入自己评论的场所，因此您的博客就有可能被垃圾信息轰炸，尤其是在博客变得广为人知之后。多亏了\
    \ Zend，`Akismet` Web 服务组件已经可用，所有繁重的工作都已经为您完成了。\n\n关键在于让它能在您的 Cake 应用程序中运行。\n\n\
    在对 Zend 提供的 `Akismet` 组件进行一些了解后，您会发现需要一个 API 密钥（这是使用任何类型的 Web 服务的常见要求），该密钥由 Akismet\
    \ 提供（[www.akismet.com](http://www.akismet.com)）。请务必获取此 API 密钥；否则，`Akismet` 组件将无法正常运行。（有关\
    \ `Akismet` 组件的更多信息，请访问 [http://framework.zend.com/manual/en/zend.service.akismet.html](http://framework.zend.com/manual/en/zend.service.akismet.html)。）下载\
    \ Zend Framework 库并解压其内容。您应该会找到一个名为 `Zend` 的文件夹，其中包含该框架的所有组件。如果您的服务器上已经在运行 Zend，请记下相对于\
    \ `app/vendors` 文件夹的路径。否则，将 `Zend` 文件夹放在 `app/vendors` 目录中。如同 `Textile` 的安装一样，在评论添加操作中编写\
    \ `App::import()` 函数来引入 Zend `Akismet` 组件（列表 12-5）。\n\n**列表 12-5.** *在* `app/controllers/comments_controller.php`\
    \ *文件中导入 `Akismet` 组件*\n\n```\nfunction add() {\n    App::import('Vendor','akismet',array('file'=>'Zend/Service/Akismet.php'));\n\
    ```\n\n此时，您需要偏离典型的 Cake 协议，因为您现在处理的是 Zend。在列表 12-5 的第 6 行，您通过引用 `Zend/Service/Akismet.php`\
    \ 文件引入了 `Akismet` 组件。但是，当此脚本在评论控制器中被调用时，存在一个问题：它会运行相对于 `Zend` 目录的自身包含。这需要更改，以避免与\
    \ Cake 的路径发生冲突。打开 `Zend/Service/Akismet.php` 文件，并在任何包含函数之前插入一个新的 `include_path`\
    \ 定义来解决此问题：\n\n```\nini_set('include_path', dirname(dirname(dirname(__FILE__))));\n\
    ```\n\n现在，您可以开始在控制器中使用 `Akismet` 组件了。接下来，通过在评论添加操作中调用 `Zend_Service_Akismet` 类来实例化一个新对象：\n\
    \n```\n$akismet = new Zend_Service_Akismet('************','http://localhost/blog');\n\
    ```\n\n请注意，要开始一个新的 `Akismet` 对象，您必须在第一个参数中提供 API 密钥，在第二个参数中提供博客的 URI。密钥（您应该已从\
