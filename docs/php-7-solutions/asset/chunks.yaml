    \nYou can check your code against `index_06.php` and\n    `random_image_02.php`\n\
    \    in the `ch05`\n    folder.\n\nPreventing errors with Include Files\nMany\
    \ hosting companies turn off error reporting for notices, so you\nprobably wouldn’t\
    \ be aware of the problem shown in Figure [5-14](#332054_4_En_5_Chapter.xhtml#Fig14)\
    \ if you did all\nyour testing on your remote server. However, it’s important\
    \ to eliminate\nall errors before deploying PHP pages on the Internet. Just because\
    \ you\ncan’t see the error message doesn’t mean your page is okay.\nPages that\
    \ use a server-side technology such as PHP deal with a lot\nof unknowns, so it’s\
    \ wise to code defensively, checking values before\nusing them. This section describes\
    \ measures you can take to prevent and\ntroubleshoot errors with include files.\n\
    \nChecking the existence of variables\n\nThe lesson that can be drawn from PHP\
    \ Solutions 5-5 and 5-8 is\nthat you should always use the null coalescing operator\
    \ to set a default\nvalue, or use `isset()`  to verify the\nexistence of a variable\
    \ that comes from an include file and wrap any\ndependent code in a conditional\
    \ statement. You can also use `isset()` with the\nlogical `Not`\noperator (see\
    \ Table [4-7](#332054_4_En_4_Chapter.xhtml#Tab7) in Chapter [4](#332054_4_En_4_Chapter.xhtml))\
    \ to assign a default value, like\nthis:\n\n```\nif (!isset($someVariable)) {\n\
    $someVariable = default value;\n}\n```\n\nYou’re likely to come across this structure\
    \ for setting a default\nvalue in many scripts because the null coalescing operator\
    \ has been\navailable only since PHP 7.0 was released in December 2015\\. Neither\
    \ is\nbetter than the other; but the null coalescing operator makes for\nshorter\
    \ code.\n\nChecking whether a function or class has been\ndefined\n\nInclude files\
    \ are frequently used to define custom functions or classes.\nAttempting to use\
    \ a function or class that\nhasn’t been defined triggers a fatal error. To check\
    \ whether a function\nhas been defined, pass the name of the function as a string\
    \ to `function_exists()`.\nWhen passing the name of the function to `function_exists()`,\n\
    omit the parentheses at the end of function name. For example, you check\nwhether\
    \ a function called `doubleIt()` has been\ndefined like this:\n\n```\nif (function_exists('doubleIt'))\
    \ {\n// use doubleIt()\n}\n```\n\nTo check whether a class has been defined, use\
    \ `class_exists()` in the\nsame way, passing a string containing the class name\
    \ as the argument:\n\n```\nif (class_exists('MyClass')) {\n// use MyClass\n}\n\
    ```\n\nAssuming you want to use the function or class, a more practical\napproach\
    \ is to use a conditional statement to include the definition\nfile if the function\
    \ or class hasn’t already been defined. For example,\nif the definition for `doubleIt()`\
    \  is in a file called\n`utilities.php`:\n\n```\nif (!function_exists('doubleIt'))\
    \ {\nrequire_once './includes/utilities.php';\n}\n```\n\nSuppressing Error Messages\
    \ on a Live Web Site\nAssuming your include files are working normally on your\
    \ remote\nserver, the measures outlined in the previous sections are probably\
    \ all\nthe error checking you need. However, if your remote server displays\n\
    error messages, you should take steps to suppress them. The following\ntechniques\
    \ hide all error messages, not only those related to include\nfiles.\n\nUsing\
    \ the Error Control Operator\n\nA rather crude, but effective, technique is to\
    \ use the\nPHP **error control operator** (`@`), which suppresses\nerror messages\
    \ associated with the line in which it’s used. You place\n`@` either at the\n\
    beginning of the line or directly in front of the function or command\nthat you\
    \ think might generate an error, like this:\n\n```\n@ include './includes/random_image.php';\n\
    ```\n\nThe problem with the error control operator is that it hides errors\nrather\
    \ than working around them. It’s only one character, so it’s easy\nto forget you\
    \ have used it. Consequently, you can waste a lot of time\nlooking for errors\
    \ in the wrong part of your script. If you use the\nerror control operator, the\
    \ `@` mark should be the\nfirst thing you remove when troubleshooting a problem.\n\
    The other drawback is that you need to use the error control operator\nin every\
    \ line that might generate an error message, because it affects\nonly the current\
    \ line.\n\nTurning Off display_errors in the PHP\nConfiguration\nA better way\
    \ of suppressing error messages in a live web\nsite is to turn off the `display_errors`\n\
    directive in the web server’s configuration. The most effective way to\ndo this\
    \ is to edit `php.ini` if your\nhosting company gives you control over its settings.\
    \ Locate the `display_errors`\ndirective and change `On` to `Off`.\nIf you don’t\
    \ have control of `php.ini`, many hosting\ncompanies allow you to change a limited\
    \ range of configuration settings\nusing a file called either `.htaccess` or `.user.ini`.\
    \ The choice\nof file depends on how PHP was installed on the server, so check\
    \ with\nyour hosting company to find out which to use.\n\nIf your server supports\
    \ `.htaccess` files, add\nthe following command to the `.htaccess` file in the\n\
    server root folder:\n\n```\nphp_flag display_errors Off\n```\n\nIn a `.user.ini`\n\
    file, the command is simply this:\n\n```\ndisplay_errors Off\n```\n\nBoth `.htaccess`\
    \ and `.user.ini` are plain\ntext files. Like `php.ini`, each command\nshould\
    \ be on a separate line. If the file doesn’t already exist on your\nremote server,\
    \ you can simply create it in a text editor. Make sure your\neditor doesn’t automatically\
    \ add `.txt` to the end of\nthe filename. Then upload the file to your web site’s\
    \ server root\nfolder.\n\nTip\nBy default, macOS hides files with a name that\
    \ begins with a dot. In\nmacOS Sierra and later, use the keyboard shortcut Cmd+Shift+.\
    \ (dot) to\ntoggle the display of hidden files on and off.\n\nTurning Off display_errors\
    \ in an Individual\nFile\n\nIf you don’t have control over the server configuration,\
    \ you can\nprevent error messages from being displayed by adding the following\
    \ line\nat the top of any script:\n\n```\n\nPHP Solution 5-9: Redirecting When\
    \ an Include File\ncan’t be Found\nAll the techniques suggested so far only suppress\
    \ error messages if\nan include file can’t be found. If a page would be meaningless\
    \ without\nthe include file, you should redirect the user to an error page if\
    \ the\ninclude file is missing.\n\nOne way to do so is to throw an exception,\
    \ like this:\n\n```\n$file = './includes/menu.php';\nif (file_exists($file) &&\
    \ is_readable($file)) {\ninclude $file;\n} else {\nthrow new Exception(\"$file\
    \ can't be found\");\n}\n```\n\nWhen using code that might throw an exception,\
    \ you need to wrap it in\na `try` block and\ncreate a `catch`\nblock to handle\
    \ the exception (see “Handling errors and exceptions” in\nChapter [4](#332054_4_En_4_Chapter.xhtml)).\
    \ This PHP solution shows how to\ndo this, using the `catch` block to\nredirect\
    \ users to a different page if an include file can’t be\nfound.\nIf you have designed\
    \ and tested your site thoroughly, this technique\nshould not be necessary on\
    \ most pages that use include files. However,\nthe following PHP solution is by\
    \ no means a pointless exercise. It\ndemonstrates several important features of\
    \ PHP: how to throw  and catch exceptions\nand how to redirect to another page.\
    \ As you’ll see from the following\ninstructions, redirection isn’t always straightforward.\
    \ This PHP\nsolution shows how to overcome the most common problem."
  trans: "\n2. `random_image.php` 底部的条件语句仅在所选图像既存在又可读时才设置 `$imageSize`，因此如果 `$imageSize`\
    \ 已被设置，就表示一切就绪。请在 `index.php` 中显示图像的 `<figure>` 元素周围添加条件语句的起始和结束标记，如下所示：\n\n```\n\
    <img src=\"images/<?= $selectedImage ?>.jpg\"\n     alt=\"随机图片\" class=\"picBorder\"\
    >\n```\n\n存在的图像会正常显示，但若文件缺失或损坏，你将避免任何令人尴尬的错误信息——这会让页面看起来更专业。别忘了恢复你在上一步中修改的图像名称。\n\
    \n你可以将代码与 `ch05` 文件夹中的 `index_06.php` 和 `random_image_02.php` 进行对照检查。\n\n## 使用包含文件预防错误\n\
    \n许多托管公司会关闭针对通知类问题的错误报告，因此如果你只在远程服务器上进行测试，可能根本察觉不到图 5-14 所示的问题。然而，在将 PHP 页面部署到互联网之前，消除所有错误至关重要。仅仅因为你看不到错误信息，并不意味着你的页面没有问题。\n\
    \n使用 PHP 等服务器端技术的页面会处理大量未知因素，因此明智的做法是进行防御性编码，在使用值之前先进行检查。本节介绍了一些措施，你可以用来预防和排查包含文件相关的错误。\n\
    \n### 检查变量是否存在\n\n从 PHP 解决方案 5-5 和 5-8 中可以得出的经验是：你应该始终使用空合并运算符来设置默认值，或者使用 `isset()`\
    \ 来验证来自包含文件的变量是否存在，并将所有依赖该变量的代码包裹在条件语句中。你还可以将 `isset()` 与逻辑非运算符（参见第 4 章表 4-7）结合使用来分配默认值，如下所示：\n\
    \n```\nif (!isset($someVariable)) {\n    $someVariable = 默认值;\n}\n```\n\n你可能会在很多脚本中看到这种设置默认值的结构，因为空合并运算符是从\
    \ 2015 年 12 月发布的 PHP 7.0 才开始可用的。两者并没有好坏之分；但空合并运算符能让代码更简洁。\n\n### 检查函数或类是否已定义\n\
    \n包含文件常用于定义自定义函数或类。尝试使用一个尚未定义的函数或类会触发致命错误。要检查函数是否已定义，请将函数名作为字符串传递给 `function_exists()`。在将函数名传递给\
    \ `function_exists()` 时，记得省略函数名末尾的括号。例如，检查一个名为 `doubleIt()` 的函数是否已定义，可以这样做：\n\n\
    ```\nif (function_exists('doubleIt')) {\n    // 使用 doubleIt()\n}\n```\n\n要检查类是否已定义，可以用同样的方式使用\
    \ `class_exists()`，将包含类名的字符串作为参数传递：\n\n```\nif (class_exists('MyClass')) {\n \
    \   // 使用 MyClass\n}\n```\n\n假设你想使用某个函数或类，一种更实用的方法是：如果该函数或类尚未定义，则使用条件语句来包含其定义文件。例如，如果\
    \ `doubleIt()` 的定义位于名为 `utilities.php` 的文件中：\n\n```\nif (!function_exists('doubleIt'))\
    \ {\n    require_once './includes/utilities.php';\n}\n```\n\n## 在线上网站中抑制错误信息\n\
    \n假设你的包含文件在远程服务器上运行正常，那么前面几节概述的措施可能已经涵盖了所有你需要的错误检查。然而，如果你的远程服务器会显示错误信息，你应该采取措施将其抑制。以下技术会隐藏所有错误信息，而不仅仅是那些与包含文件相关的。\n\
    \n### 使用错误控制运算符\n\n一种比较粗糙但有效的方法是使用 PHP 的错误控制运算符（`@`），它可以抑制与该行代码相关的错误信息。你可以将 `@`\
    \ 放在行首，或者直接放在你认为可能产生错误的函数或命令前面，就像这样：\n\n```\n@ include './includes/random_image.php';\n\
    ```\n\n错误控制运算符的问题在于，它会隐藏错误而不是绕过错误。它只是一个字符，所以很容易忘记你已经使用了它。结果，你可能会浪费大量时间在脚本的错误部分寻找错误。如果你使用了错误控制运算符，在排查问题时，`@`\
    \ 标记应该是你移除的第一个东西。另一个缺点是，你需要在每一个可能产生错误信息的行上都使用错误控制运算符，因为它只影响当前行。\n\n### 在 PHP 配置中关闭\
    \ `display_errors`\n\n在线上网站中抑制错误信息的一个更好的方法，是在 Web 服务器的配置中关闭 `display_errors` 指令。如果您的托管公司允许您控制其设置，最有效的方法是编辑\
    \ `php.ini`。找到 `display_errors` 指令，将 `On` 改为 `Off`。\n\n如果你无法控制 `php.ini`，许多托管公司允许你使用名为\
    \ `.htaccess` 或 `.user.ini` 的文件更改有限的配置设置。选择哪种文件取决于 PHP 在服务器上的安装方式，因此请咨询你的托管公司以确定使用哪种。\n\
    \n如果你的服务器支持 `.htaccess` 文件，请在服务器根目录的 `.htaccess` 文件中添加以下命令：\n\n```\nphp_flag display_errors\
    \ Off\n```\n\n在 `.user.ini` 文件中，命令则简单地写为：\n\n```\ndisplay_errors Off\n```\n\n\
    `.htaccess` 和 `.user.ini` 都是纯文本文件。与 `php.ini` 类似，每个命令应单独占一行。如果远程服务器上不存在该文件，你可以直接在文本编辑器中创建它。确保你的编辑器不会自动在文件名末尾添加\
    \ `.txt`。然后，将该文件上传到你网站的服务器根目录。\n\n> **提示：** 默认情况下，macOS 会隐藏以点开头的文件。在 macOS Sierra\
    \ 及更高版本中，使用键盘快捷键 Cmd+Shift+. (点) 来切换隐藏文件的显示和隐藏。\n\n### 在单个文件中关闭 `display_errors`\n\
    \n如果你无法控制服务器配置，可以通过在任何脚本的顶部添加以下行来防止显示错误信息：\n\n```\nini_set('display_errors', 'Off');\n\
    ```\n\n## PHP 解决方案 5-9：当找不到包含文件时进行重定向\n\n到目前为止建议的所有技术，都只是在找不到包含文件时抑制错误信息。如果缺少包含文件会导致页面没有意义，那么你应该在包含文件缺失时将用户重定向到一个错误页面。\n\
    \n一种实现方法是抛出异常，就像这样：\n\n```\n$file = './includes/menu.php';\nif (file_exists($file)\
    \ && is_readable($file)) {\n    include $file;\n} else {\n    throw new Exception(\"\
    $file 找不到\");\n}\n```\n\n当使用可能抛出异常的代码时，你需要将其包裹在 `try` 代码块中，并创建一个 `catch` 代码块来处理异常（参见第\
    \ 4 章的“处理错误和异常”）。此 PHP 解决方案展示了如何做到这一点，即在找不到包含文件时，使用 `catch` 代码块将用户重定向到另一个页面。\n\
    \n如果你已经对网站进行了全面设计和测试，那么在大多数使用包含文件的页面上，此技术并不是必需的。然而，下面的 PHP 解决方案绝非无意义的练习。它演示了 PHP\
    \ 的几个重要特性：如何抛出和捕获异常，以及如何重定向到另一个页面。正如你将从以下说明中看到的，重定向并非总是那么简单。这个 PHP 解决方案展示了如何克服最常见的问题。\n"
- fmt: "接续使用 PHP 解决方案 5-8 中的 `index.php`，或者使用 `ch05` 文件夹中的 `index_06.php`。\n\n1. \
    \ 将 `error.php` 从 `ch05` 文件夹复制到站点根目录。如果编辑程序提示更新页面中的链接，请不要更新。这是一个包含通用错误消息和指向其他页面链接的静态页面。\n\
    \n2.  在编辑程序中打开 `index.php`。导航菜单是最不可或缺的包含文件，因此请像这样编辑 `index.php` 中的 `require` 命令：\n\
    \n```\n    $file = './includes/menu.php';\n    if (file_exists($file) && is_readable($file))\
    \ {\n    require $file;\n    } else {\n    throw new Exception(\"$file can't be\
    \ found\");\n    }\n    ```\n\n提示\n将包含文件的路径存储在一个变量中，例如上述代码，可以避免重复输入四次，从而减少拼写错误的可能性。\n\
    \n3.  要将用户重定向到另一个页面，请使用 `header()` 函数。除非存在语法错误，否则 PHP 引擎通常从页面顶部开始处理，输出 HTML，直到遇到问题。这意味着当\
    \ PHP 引擎执行到此代码时，输出可能已经开始。为防止这种情况发生，请在生成任何输出之前启动 `try` 块。（这在许多设置上可能不起作用，但请耐心阅读，因为它演示了一个重要的观点。）\n\
    \n    滚动到页面顶部，并像这样编辑开头的 PHP 代码块：\n\n```\n    这将打开 `try` 块。\n\n```\n\n4.  滚动到页面底部，并在结束的\
    \ `</html>` 标签后添加以下代码：\n\n```\n    这将关闭 `try` 块并创建一个 `catch` 块来处理异常。`catch` 块中的代码使用\
    \ `header()` 将用户重定向到 `error.php`。`header()` 函数向浏览器发送一个 HTTP 头。它接受一个字符串作为参数，该字符串包含由冒号分隔的头及其值。在这种情况下，它使用\
    \ `Location` 头将浏览器重定向到冒号后 URL 指定的页面。必要时调整 URL 以匹配您自己的设置。\n\n```\n\n5.  保存 `index.php`\
    \ 并在浏览器中测试页面。它应该正常显示。\n\n6.  将您在步骤 2 中创建的变量 `$file` 的值更改为指向一个不存在的包含文件，例如 `men.php`。\n\
    \n7.  保存 `index.php` 并在浏览器中重新加载它。如果您在测试环境中使用 XAMPP 或最新版本的 MAMP，您很可能会被正确重定向到 `error.php`。但是，在某些设置上，您很可能会看到图\
    \ 5-15 中的消息。\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig15_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Fig15_HTML.jpg)\n\
    \n图 5-15。\n\n如果输出已发送到浏览器，`header()` 函数将无法工作\n\n图 5-15 中的错误消息可能比任何其他错误消息导致更多的开发者抓狂。（我也深受其害。）如前所述，如果输出已发送到浏览器，则不能使用\
    \ `header()` 函数。那么，发生了什么？\n\n答案就在错误消息中，但并不明显。它说错误发生在第 52 行，这是调用 `header()` 函数的地方。您真正需要知道的是输出是在哪里生成的。该信息隐藏在这里：\n\
    \n```\n    (output started at C:\\xampp\\htdocs\\phpsols-4e\\index.php:4)\n  \
    \  ```\n\n冒号后面的数字 4 是行号。那么，`index.php` 的第 4 行是什么？从下面的屏幕截图中可以看到，第 4 行输出了 HTML DOCTYPE\
    \ 声明。\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Figf_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Figf_HTML.jpg)\n\
    \n由于到目前为止代码中没有错误，PHP 引擎已经输出了 HTML。一旦发生这种情况，`header()` 就无法重定向页面，除非输出存储在缓冲区（Web\
    \ 服务器的内存）中。\n\n注意\n您在 XAMPP 和其他一些设置中没有收到此错误消息的原因是因为输出缓冲通常设置为 4096，这意味着在 HTTP 头发送到浏览器之前，4\
    \ KB 的输出存储在缓冲区中。虽然有用，但这会给您一种虚假的安全感，因为您的远程服务器上可能未启用输出缓冲。因此，即使您被正确重定向，也请继续阅读。\n\n\
    8.  像这样编辑 `index.php` 顶部的代码块：\n\n```\n    `ob_start()` 函数会开启输出缓冲，防止在调用 `header()`\
    \ 函数之前将任何输出发送到浏览器。\n\n```\n\n9.  PHP 引擎会在脚本结束时自动刷新缓冲区，但最好显式地执行此操作。像这样编辑页面底部的 PHP\
    \ 代码块：\n\n```\n    这里添加了两个不同的函数。重定向到另一个页面时，您不希望将 HTML 存储在缓冲区中。因此，在 `catch` 块内部，调用了\
    \ `ob_end_clean()`，它会关闭缓冲区并丢弃其内容。\n    但是，如果没有抛出异常，您希望显示缓冲区的内容，因此在页面末尾的 `try`\
    \ 和 `catch` 块之后调用了 `ob_end_flush()`。这会刷新缓冲区的内容并将其发送到浏览器。\n\n```\n\n10. 保存 `index.php`\
    \ 并在浏览器中重新加载它。这次，无论您的服务器配置中是否启用了缓冲，您都应该被重定向到错误页面，如图 5-16 所示。\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig16_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Fig16_HTML.jpg)\n\
    \n图 5-16。\n\n缓冲输出使浏览器能够重定向到错误页面\n\n11. 将 `$file` 的值更改回 `./includes/menu.php` 并保存\
    \ `index.php`。当您在错误页面上单击“主页”链接时，`index.php` 应正常显示。\n\n您可以将您的代码与 `ch05` 文件夹中的 `index_07.php`\
    \ 进行比较。\n\n为什么我不能对 PHP 包含使用站点根目录相对链接？\n嗯，您可以，也不能。为清楚起见，我首先解释相对于文档的链接和相对于站点根的链接之间的区别。\n\
    \n文档相对链接\n大多数 Web 创作工具指定到其他文件（如样式表、图像和其他网页）的路径时，都是相对于当前文档的。如果目标页面在同一文件夹中，则仅使用文件名。如果目标页面比当前页面高一级，则文件名前加上\
    \ `../`。这被称为**文档相对路径**或链接。如果您有一个包含许多层级文件夹的站点，这种类型的链接可能难以理解——至少对人类来说是这样。\n\n相对于站点根的链接\n\
    网页中使用的另一种链接类型始终以正斜杠开头，这是站点根的简写。**站点根相对路径**的优点是，无论当前页面在站点层次结构中的深度如何，开头的正斜杠都能保证浏览器从站点的顶层开始查找。尽管站点根相对链接更易于阅读，但\
    \ PHP 包含命令无法处理它们。您必须使用文档相对路径、绝对路径，或者在您的 `include_path` 指令中指定 `includes` 文件夹（请参阅本章后面的“调整您的\
    \ include_path”）。\n\n注意\n只有当开头的斜杠代表站点根时，PHP 包含命令才无法定位外部文件。Linux 和 macOS 上的绝对路径也以正斜杠开头。绝对路径是明确的，因此它们没有问题。"
  raw: "Continue working with `index.php` from PHP\nSolution 5-8\\. Alternatively,\
    \ use `index_06.php` from the\n`ch05` folder.\n\n1.  Copy `error.php` from the\n\
    \    `ch05` folder to\n    the site root. Don’t update the links in the page if\
    \ your editing\n    program prompts you to do so. This is a static page that contains\
    \ a\n    generic error message and links back to the other pages.\n\n2.  Open\
    \ `index.php`\n    in your editing program. The navigation menu is the most indispensable\n\
    \    include file, so edit the `require` command in\n    `index.php` like\n  \
    \  this:\n\n```\n    $file = './includes/menu.php';\n    if (file_exists($file)\
    \ && is_readable($file)) {\n    require $file;\n    } else {\n    throw new Exception(\"\
    $file can't be found\");\n    }\n    ```\n\nTip\nStoring the path of the include\
    \ file in a variable like this avoids\nthe need to retype it four times, reducing\
    \ the likelihood of spelling\nmistakes.\n\n1.  To redirect the user to another\
    \ page, use the `header()`\n    function  . Unless there’s a\n    syntax error,\
    \ the PHP engine normally processes a page from the top,\n    outputting the HTML\
    \ until it reaches a problem. This means that output\n    will have already begun\
    \ by the time the PHP engine gets to this code. To\n    prevent this from happening,\
    \ start the `try` block before any\n    output is generated. (This won’t work\
    \ on many setups, but bear with me,\n    because it demonstrates an important\
    \ point.)\n\nScroll to the top of the page and edit the opening PHP code block\
    \ like\n    this:\n\n```\n    This opens the `try` block.\n\n```\n\n2.  Scroll\
    \ down to the bottom of the page and add the following code after\n    the closing\
    \ `</html>`\n    tag :\n\n```\n    This closes the `try` block and creates\n \
    \   a `catch` block\n    to handle the exception. The code in the `catch` block\
    \ uses\n    `header()` to\n    redirect the user to `error.php`.\n    The `header()`\n\
    \    function  sends an\n    HTTP header to the browser. It takes as its argument\
    \ a string containing\n    the header and its value separated by a colon. In this\
    \ case, it uses the\n    `Location` header\n    to redirect the browser to the\
    \ page specified by the URL following the\n    colon. Adjust the URL to match\
    \ your own setup if necessary.\n\n```\n\n3.  Save `index.php` and test\n    the\
    \ page in a browser. It should display as normal.\n\n4.  Change the value of `$file`,\
    \ the variable\n    you created in step 2, to point to a nonexistent include file,\
    \ such as\n    `men.php`.\n\n5.  Save `index.php`\n    and reload it in your browser.\
    \ If you’re using XAMPP or the latest\n    version of MAMP in your testing environment,\
    \ you’ll probably be\n    correctly redirected to `error.php`. On some\n    setups,\
    \ though, you’re likely to see the message in Figure [5-15](#332054_4_En_5_Chapter.xhtml#Fig15).\n\
    \n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig15_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Fig15_HTML.jpg)\n\
    \nFigure 5-15.\n\nThe `header()`\n    function won’t work if output has already\
    \ been sent to the browser\n\nThe error message in Figure [5-15](#332054_4_En_5_Chapter.xhtml#Fig15)\
    \ is probably\n    responsible for more heads being banged against keyboards than\
    \ any\n    other. (I, too, bear the scars.) As mentioned earlier, the `header()`\
    \ function\n    cannot be used if output has been sent to the browser. So, what’s\n\
    \    happened?\n\nThe answer is in the error message, but it’s\n    not immediately\
    \ obvious. It says the error happened on line 52, which is\n    where the `header()`\
    \ function is\n    called. What you really need to know is where the output was\
    \ generated.\n    That information is buried here:\n\n```\n    (output started\
    \ at C:\\xampp\\htdocs\\phpsols-4e\\index.php:4)\n    ```\n\nThe number 4 after\
    \ the colon is the line number. So, what’s on line 4\n    of `index.php`?\n  \
    \  As you can see from the following screenshot, line 4 outputs the HTML\n   \
    \ DOCTYPE declaration.\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Figf_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Figf_HTML.jpg)\n\
    \nBecause there’s no error in the code up to this point, the PHP engine\n    has\
    \ already output the HTML. Once that has happened, `header()` can’t\n    redirect\
    \ the page unless the output is stored in a buffer (the web\n    server’s memory).\n\
    \nNote\nThe reason you don’t get this error message in XAMPP and some other\n\
    setups is because output buffering is commonly set to 4096, which means\nthat\
    \ 4 KB of output is stored in the buffer before the HTTP headers are\nsent to\
    \ the browser. Although useful, this gives you a false sense of\nsecurity because\
    \ output buffering might not be enabled on your remote\nserver. So, keep reading\
    \ even if you were correctly redirected.\n\n1.  Edit the code block at the top\
    \ of `index.php` like this:\n\n```\n    The `ob_start()` function\n     turns\
    \ on output\n    buffering, preventing any output from being sent to the browser\
    \ before\n    the `header()`\n    function is called.\n\n```\n\n2.  The PHP engine\
    \ automatically flushes the buffer at the end of the\n    script, but it’s better\
    \ to do so explicitly. Edit the PHP code block at\n    the foot of the page like\
    \ this:\n\n```\n    Two different functions have been added here. When redirecting\
    \ to\n    another page, you don’t want the HTML stored in the buffer. So, inside\n\
    \    the `catch`\n    block, a call is made to `ob_end_clean()` , which turns\
    \ off the\n    buffer and discards its contents.\n    However, if an exception\
    \ isn’t thrown, you want to display the\n    contents of the buffer, so `ob_end_flush()`\
    \  is called at the end\n    of the page after both the `try` and `catch` blocks.\
    \ This\n    flushes the contents of the buffer and sends it to the browser.\n\n\
    ```\n\n3.  Save `index.php`\n    and reload it in a browser. This time, you should\
    \ be redirected to the\n    error page, as shown in Figure [5-16](#332054_4_En_5_Chapter.xhtml#Fig16),\
    \ regardless of\n    whether buffering has been enabled in your server’s configuration.\n\
    \n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig16_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Fig16_HTML.jpg)\n\
    \nFigure 5-16.\n\nBuffering the output enables the browser to redirect to the\
    \ error\n    page\n\n4.  Change the value of `$file` back to `./includes/menu.php`\n\
    \    and save `index.php`. When you\n    click the Home link on the error page,\
    \ `index.php` should\n    display normally.\n\nYou can compare your code with\
    \ `index_07.php` in the\n    `ch05`\n    folder.\n\nWhy can’t I Use Site-root-relative\
    \ Links with PHP\nIncludes?\nWell, you can and you can’t. For the sake of clarity,\
    \ I’ll begin by\nexplaining the distinction between links relative to the document\
    \ and to\nthe site root.\n\nDocument-relative Links\nMost web authoring tools\
    \ specify the path to other files, such as\nstyle sheets, images, and other web\
    \ pages, relative to the current\ndocument. If the target page is in the same\
    \ folder, just the filename is\nused. If it’s one level higher than the current\
    \ page, the filename is\npreceded by `../`. This is known as\na \n**document-relative\
    \ path**  or link. If you have a\nsite with many levels of folders, this type\
    \ of link can be difficult to\nunderstand—at least for humans.\n\nLinks relative\
    \ to the Site Root\nThe other type of link used in web pages always begins with\
    \ a forward\nslash, which is shorthand for the site root. The advantage of a\n\
    **site-root-relative path** is that it doesn’t matter how\ndeep the current page\
    \ is in the site hierarchy, the forward slash at the\nbeginning guarantees the\
    \ browser will start looking from the top level\nof the site. Although site-root-relative\
    \ links are much easier to read,\n PHP include\ncommands can’t handle them. You\
    \ must use a document-relative path, an\nabsolute path, or specify the `includes`\
    \ folder in\nyour `include_path`\ndirective (see “Adjusting your include_path”\
    \ later in this chapter).\n\nNote\nIt’s only when the leading slash represents\
    \ the site root that PHP\ninclude commands cannot locate the external file. An\
    \ absolute path on\nLinux and macOS also begins with a forward slash. Absolute\
    \ paths are\nunambiguous, so they present no problem."
