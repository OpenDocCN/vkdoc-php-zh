    \ So for ∼1.3, 1.3 is the minimum and there can be no match at\n2.0.0 or above\n\
    \ |\n\nCaret\n |\n  ^1.3\n |\n  Will match up to, but not including, the next\
    \ breaking change. So while\n∼1.3.1 will not match at 1.4 and above, ^1.3.1 will\
    \ match from 1.3.1 up\nto, but not including, 2.0.0\\. This is generally the most\
