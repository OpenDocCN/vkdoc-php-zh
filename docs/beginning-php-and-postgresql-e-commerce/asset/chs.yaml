  \n---\n\n## 创建产品目录：第二部分\n\n在上一章中，您为 HatShop 网站实现了一个可选部门列表。然而，一个产品目录的意义远不止于那个部门列表。在本章中，您将添加许多新的产品目录功能。本章的结构与上一章类似，但需要添加大量新功能，这涉及相当多的代码。\n\
  \n请回顾第 3 章的图 3-1、图 3-2 和图 3-3，以直观了解您将在本章中实现的新功能。\n\n在本章中，您将：\n\n- 学习关系数据以及数据表之间发生的关系类型，然后在数据库中创建新的数据结构。\n\
  - 理解如何关联相关数据表、如何使用子查询、如何在数据层实现分页，以及更多关于 PL/pgSQL 函数和技术的理论。\n- 完成业务层，使其能够与新的 PL/pgSQL\
  \ 函数协同工作，发送参数，并将请求的数据传递给表示层。\n\n\n\n• 完成表示层，向访客展示目录中类别、商品等详细信息。\n\n## 存储新数据\n\n\
  鉴于本章新增的功能，你需要在数据库中添加更多数据表并不令人意外。然而，这不仅仅是添加新数据表那么简单。\n\n你还需了解关系数据以及数据表之间可实现的关系，这样才能从数据库中获取更有意义的信息。\n\
  \n## 何为关系型数据库\n\n数据库能存储数据这并非什么秘密。然而，现代**关系型数据库管理系统**，如 PostgreSQL、MySQL、SQL Server、Oracle、DB2\
  \ 等，通过增加存储和管理**关系数据**的能力，扩展了这一基本功能。这是一个值得关注的概念。\n\n那么，*关系数据* 是什么意思呢？不难发现，现实世界数据库中存储的每条数据，都与某些已有信息存在关联。商品与类别和部门相关，订单与商品和客户相关，以此类推。关系型数据库将信息存储在数据表中，并且知晓这些表之间的关联。\n\
  \n这些相互关联的表构成了*关系型数据库*，它本身成为了一个有独立意义的对象，而不仅仅是一组无关的数据表。可以说，*数据* 只有当我们赋予其意义时才成为*信息*，而建立数据之间的关联正是实现这一目标的理想方式。\n\
  \n不妨观察一下商品目录，看看它需要哪些数据，以及如何将这些数据转化为信息。对于商品目录，你至少需要三个数据表：一个用于部门，一个用于类别，一个用于商品。需要注意的是，即使从逻辑上说每个数据表是更大实体的一部分——换句话说，即使我们说一个类别*包含*商品，存放商品的表也并不在存放类别的表内部——但在物理上，每个数据表都是独立的数据库对象。这并不与数据库的关系特性相矛盾。图\
  \ 4-1 简单展示了三个数据表，并包含一些示例数据。\n\n包含部门数据的表\n\n名称\n\n**节日**\n\n包含商品数据的表\n\n**帽子与贝雷帽**\n\
  \n**?**\n\n名称\n\n**戏装帽**\n\n**黑色清教徒帽**\n\n**军帽贝雷帽**\n\n**?**\n\n**金属维京头盔**\n\n包含类别数据的表\n\
  \n**山姆大叔高顶礼帽**\n\n名称\n\n**天鹅绒宽边帽**\n\n**?**\n\n**圣诞帽**\n\n**司机帽**\n\n**万圣节帽**\n\n\
  **...**\n\n**圣帕特里克节帽**\n\n**贝雷帽**\n\n**司机帽**\n\n**戏装帽**\n\n**军帽**\n\n**图 4-1.**\
  \ *无关联的部门、类别与商品*\n\n当两个表被称为“关联”时，更具体地是指这些表中的*记录*是关联的。因此，如果商品表与类别表相关联，这就意味着每条商品记录都与类别表中的某条记录存在关联。\n\
  \n图 4-1 并未展示数据库的物理表示，因此我们没有列出表名。此类图表用于决定数据库中需要存储*什么*。在知道要存储*什么*之后，下一步是确定所列数据之间*如何*关联，这将引导出数据库的物理结构。虽然图\
  \ 4-1 展示了三种需要存储的数据类型，但你稍后会了解到，要在数据库中实现这一结构，实际上会使用四个表。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，对给定的英文文本进行翻译。\n\
  \n\n现在你已经知道自己想要存储哪些数据了，我们来思考一下这三个部分是如何相互关联的。除了知道两个表中的记录*以某种方式*关联之外，你还需要了解它们之间的*关系类型*。现在，我们来仔细看看两个表之间可能存在的不同关联方式。\n\
  \n## 关系型数据与表关系\n\n为了继续探索关系型数据库的世界，让我们进一步分析到目前为止一直讨论的三个逻辑表。为了方便起见，现在给它们命名：包含产品的表是\
  \ `product`，包含类别的表是 `category`，最后一个是我们的老朋友 `department`。这并不意外！幸运的是，这些表实现了表之间最常用的关系类型，即**一对多**和**多对多**关系，因此你有机会学习它们。\n\
  \n> **注意：** 这两种关系类型存在一些变体，以及不太流行的一对一关系。在一对一关系中，一个表中的每一行都恰好匹配另一个表中的一行。\n>\n> 例如，在一个允许将患者分配到床位的数据库中，你希望患者和床位之间是一对一关系！数据库系统不支持强制执行这种关系，因为你必须同时在两个表中添加匹配的记录。\n\
  >\n> 此外，具有一对一关系的两个表可以连接成一个表。\n\n## 一对多关系\n\n当一个表中的一条记录可以与相关表中的多条记录相关联，但反之不成立时，就形成了一对多关系。在我们的案例中，这发生在\
  \ `department` – `category` 关系上。一个特定的部门可以包含任意数量的类别，但每个类别仅属于*唯一一个*部门。图 4-2 更好地展示了部门与类别之间的一对多关系。\n\
  \n另一个常见的一对多关系场景是 `order` – `order_details` 表，其中 `order` 包含订单的一般详细信息（如日期、总金额等），而\
  \ `order_details` 包含与订单相关的产品。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n648XCH04.qxd 10/31/06 10:01 PM 第 110 页\n\n**110**\n\n第 4 章 ■ 创建产品目录：第二部分\n\n**department\
  \ 表**\n\n**category 表**\n\n贝雷帽  \n鸭舌帽  \n帽子和贝雷帽  \n圣诞帽  \n节日  \n万圣节帽  \n化装帽  \n\
  圣帕特里克节帽  \n戏剧帽  \n军帽\n\n**图 4-2.** *部门与类别之间的一对多关系*\n\n在数据库中，一对多关系是通过在关系的*多*方表中添加一个额外的列来实现的，该列引用了关系*一*方表中\
  \ ID 列。简单来说，在 `category` 表中，会有一个额外的列（称为 `department_id`），用于存储该类别所属部门的 ID。\n\n稍后，在学习多对多关系和\
  \ `FOREIGN KEY` 约束之后，你将开始在数据库中实现这一关系。\n\n## 多对多关系\n\n另一种常见的关系类型是多对多关系。当关系双方表中的记录都可以在另一方表中有多条匹配记录时，就形成了这种关系。在我们的场景中，这发生在\
  \ `product` 和 `category` 表之间，因为我们知道一个产品可以存在于多个类别中（*一个*产品 – *多个*类别），同时一个类别也可以有多个产品（*一个*类别\
  \ – *多个*产品）。\n\n之所以会出现这种情况，是因为我们之前决定一个产品可以属于多个类别。如果一个产品只能属于一个类别，那么就会形成另一个一对多关系，就像部门与类别之间的关系一样（一个类别不能属于多个部门）。\n\
  \n如果你用图片来表示这种关系，就像之前图 4-2 所示，但这次使用通用名称，你会得到类似于图 4-3 所示的内容。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n648XCH04.qxd 10/31/06 10:01 PM 第 111 页\n\n第 4 章 ■ 创建产品目录：第二部分 **111**\n\n**category**\
  \ 表\n\n**product** 表\n\n产品 1  \n类别 1  \n产品 2  \n类别 2  \n产品 3  \n类别 3  \n产品 4  \n\
  产品 5\n\n**图 4-3.** *类别与产品之间的多对多关系*\n\n虽然在逻辑上多对多关系发生在两个表之间，但数据库（包括 PostgreSQL 数据库）无法仅使用两个表在物理上实现这种关系，因此我们通过添加第三个表来“作弊”。这个第三个表称为**连接表**（也称为*链接表*或*关联表*），配合两个一对多关系，有助于实现多对多关系。连接表用于关联产品和类别，不限制一个类别可以有多少个产品，也不限制一个产品可以添加到多少个类别中。图\
  \ 4-4 展示了连接表的作用。\n\n**category** 表\n\n**Junction** 表\n\n**product** 表\n\n类别 1  \n\
