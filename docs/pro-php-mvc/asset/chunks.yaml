    Questions


    1\. Error pages are a common feature of most applications. Why do we add the logic
    to display them in the application bootstrap file?


    2\. Why is it important not to use a Template or View instance to render the error
    pages?


    3\. We created a large array of exception classes in the bootstrap file. Wouldn’t
    this be better in a configuration file?


    4\. When we wanted to get replies, or check whether another user was our friend,
    we did so via model methods. Why not just check that sort of thing in the view
    or the controller?


    Answers


    1\. Yes, error pages are a common feature of most of today’s applications. However,
    the means for handling errors are not. We have chosen to raise exceptions in almost


    every instance where errors prevent the normal functioning of the application.
    For this reason, and in order to present the correct error pages, we inspect the
    type of exception that has been raised. How other applications handle their errors
    might differ. For this reason, the code is no longer application-agnostic, and
    the bootstrap becomes the most reasonable place for this logic.


    2\. We use an include statement to avoid any possible errors with using a Template
    or View instance. This is similar to how our testing code resides in the public
    folder. The more framework code required for handling error pages, the less we
    can afford for errors to occur within that code. The simplest solution is, therefore,
    to use as little framework code to test for/report on framework errors.


    3\. If an exception occurs in the configuration classes, and the error pages require
    those classes, the error pages won’t be displayed.


    4\. The main goal of MVC is the separation of concerns. Fetching friends/replies
    are the concern of the model, and the corresponding code should be contained in
    the


    applicable models.


    Exercises


    1\. The list of exception classes is quite specific, and quite lengthy. Now try
    specifying which error page must be displayed (within the exception class) and
    modifying the bootstrap file accordingly.


    2\. We created the isFriend()/hasFriend() methods to be able to tell which actions
    to present the user, but when we wanted to fetch a user’s friends, we did so in
    the controller. Now see if you can create methods to fetch the friends straight
    from the User model.


    3\. To be able to reply to earlier messages, we had to create individual forms
    for each top-level message shared. The problem is that these forms are always
    visible, leading to an ugly page. Now try employing some PHP/JavaScript to show/hide
    different reply forms, by allowing the user to click a “reply” link.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Chapter 18**


    **Photos**


    User profiles and status messages are only parts of the puzzle of social networks.
    As a developer, you cannot go far without encountering file uploads, and they
    form a large portion of many types of enterprise applications, social networks
    included.


    However, file uploads are a strange beast. The logic required to achieve them
    varies greatly from platform to platform. Some platforms, such as ColdFusion,
    handle file uploads almost implicitly. Other platforms, like ASP


    classic, are nightmarish when it comes to this area of development.


    PHP, on the other hand, requires a bit of work, but after you have the hang of
    it, file uploads are a breeze. We will begin this chapter with a brief introduction
    to the logic required for file uploads, and then progress to adding file-upload
    capabilities to our application.


    Goals


    • We will review the processes required to facilitate file uploads.


    • We will then add upload functionality to the registration and settings pages
    (for profile photos).


    • Finally, we will display these photos on the profile and the user search pages.


    How to Upload Files


    The basic idea is that files need to get from the users to the server. This happens
    in a few steps, and while the order is important, there is plenty of room for
    adding extras, like validation for the following:


    • The user posts a form, containing a file input with a selected file.


    • The server checks for a posted form, then checks for a posted file.


    • If a file was posted, the server checks whether it can move the file from temporary
    storage to a permanent location.


    • If the file was moved, the server performs any postprocessing on the file, such
    as returning the dimensions, modifying any relevant database rows, and so forth.


    These four simple steps can be represented with the code shown in Listing 18-1.


