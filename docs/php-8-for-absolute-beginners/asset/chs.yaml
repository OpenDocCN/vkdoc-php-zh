  \n**图 3-3** 来自 [*www.amazon.com*](http://www.amazon.com) 的星级评分表单\n\n如果你要成为一名 Web\
  \ 开发人员或 Web 设计师，你将开发和设计可用且功能性的表单。Web 表单是系统与其用户之间的接口；开发和设计 Web 表单极其重要。\n\n## 建立新的\
  \ PHP 项目\n\n让我们在 `XAMPP/htdocs` 文件夹中创建一个名为 `ch3` 的新项目文件夹，用于存放我们在本章中将完成的所有工作。在 `ch3`\
  \ 内部，我们需要从第 2 章中复制 `templates` 和 `classes` 文件夹以及 PHP 脚本的副本。我们可以从第 2 章文件夹中复制这些文件，或者从出版商的网站下载。我们还需要创建一个名为\
  \ `views` 的空文件夹。\n\n让我们为 `index.php` 文件添加一个基础的 PHP 模板。请注意，我们正在重用第 2 章中的 `classes/Page_Data.class.php`\
  \ 和 `templates/page.php`，而没有更改这两个脚本中的任何一行代码。高效且有效的程序员会在他们的程序中重用库文件。无论这些文件是由 PHP\
  \ 提供的，还是由程序员（或公司中的其他人）创建的，通过重用已知可靠且安全的代码，可以以更高的效率和速度开发稳定安全的程序。解决问题一次就好；不要重复造轮子！\n\
  \n\n```php\n$title = \"Building and processing HTML forms with PHP\";\n$pageData->content\
  \ = \"will soon show a navigation...\";\n$pageData->content .= \"...and a form here\"\
  ;\nrequire \"templates/pagewithcss.php\";\necho $page;\n?>\n```\n\n**清单 3-1** `index.php`\n\
  \n### 亲自查看\n\n要检查所有内容是否已正确输入，请保存`index.php`文件，然后使用浏览器导航至`http://localhost/ch3/index.php`。预期的输出如图\
