    \ Ajax 的主要概念。那么，使用带有动画框架的 Ajax 呢？或者构建花哨的 Web 2.0 功能，比如拖放式购物车或调整 HTML 元素大小的滑块工具？在考虑如何将\
    \ Ajax 引入你的 Cake 应用程序时，请记住这些基本步骤。\n\n**将 JavaScript 与选项数组一起传递**\n\n在各种助手函数中查找选项数组，即使在非\
    \ Ajax 助手中引入更复杂或定制化的 JavaScript 函数时也是如此。通过使用此数组，你可以将 JavaScript 函数传递给你希望与更复杂的\
    \ Ajax 方法一起工作的助手所渲染的 HTML 元素。例如，如果我想编写自己的 JavaScript 函数，我可以像这样使用选项数组调用该函数：\n\n\
