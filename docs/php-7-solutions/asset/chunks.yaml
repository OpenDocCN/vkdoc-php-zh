    );\n        }\n        // check the MIME type\n        if (!$this->checkType($details['mime']))\
    \ {\n            throw new \\Exception('Cannot process that type of file.');\n\
    \        }\n        $this->original = $image;\n        $this->originalwidth =\
    \ $details[0];\n        $this->originalheight = $details[1];\n        $this->basename\
    \ = pathinfo($image, PATHINFO_FILENAME);\n        $this->setDestination($destination);\n\
    \        $this->setMaxSize($maxSize);\n        $this->setSuffix($suffix);\n  \
    \  }\n}\n```\n\n2. 接下来，创建用于设置缩略图目标文件夹的方法。在`checkType()`方法定义之后，将以下代码添加到`Thumbnail.php`中：\n\
    \n```php\nprotected function setDestination($destination) {\n    if (is_dir($destination)\
    \ && is_writable($destination)) {\n        $this->destination = rtrim($destination,\
    \ '/\\\\') . DIRECTORY_SEPARATOR;\n    } else {\n        throw new \\Exception(\"\
    Cannot write to $destination.\");\n    }\n}\n```\n\n该方法首先检查`$destination`是否为文件夹（目录）且可写。如果不是，则抛出异常。否则，执行其余代码。\n\
    \n在将提交的值赋值给`$destination`属性之前，我们需要确保它以单个尾部斜杠结尾。这是通过将提交的值传递给`rtrim()`函数来实现的，该函数通常用于去除字符串末尾的空白字符。但是，如果传递一个字符串作为第二个参数，它也会去除这些字符。因此，这会从字符串末尾去除正斜杠和反斜杠——需要使用两个反斜杠，因为PHP使用反斜杠来转义单引号和双引号（参见第[4]章中的“在双引号内使用转义序列”）。然后将PHP常量`DIRECTORY_SEPARATOR`连接到`$destination`的末尾。`DIRECTORY_SEPARATOR`常量会根据操作系统自动选择正确的斜杠类型。\n\
    \n**提示**  \nPHP在路径中同等对待正斜杠或反斜杠。即使这导致添加了相反类型的斜杠，对PHP而言路径仍然有效。但是，在为PHP脚本之外的使用构建路径时（例如创建URL或将路径交给外部程序执行），您不能依赖此行为。\n\
