  trans: '

    ### 技巧 4：资源压缩


    虽然样式表和脚本通常不像图片那么庞大，但它们仍然会对页面的整体体积产生显著影响。


    在遵循技巧 #1，尽可能简化并移除多余样式和内容之后，你可以使用资源压缩来进一步减小样式表和脚本的文件大小。


    压缩会移除资源中那些让人类易于读写，但对浏览器并非必需的多余信息（例如换行符和空白）。就 JavaScript 而言，压缩还可以通过重写 `var aLongVariableNameUsefulForHumans`
    为 `var a` 等方式，积极地优化你的代码大小。


    #### 如何压缩资源


    如果你想尝试压缩，或者只是想要进行一次性的压缩，有很多在线工具可以接收 CSS 或 JavaScript 文件并输出压缩后的版本（只需搜索“CSS/JavaScript
    minifier”）。然而，压缩最有用之处在于我们能将其嵌入工作流一次，然后不再操心。在这里，Grunt 插件 `grunt-contrib-cssmin`
    和 `grunt-contrib-uglify` 再次登场，分别用于 CSS 和 JavaScript 的压缩。


    如果你有不同的工作流流程，或想通过命令行进行压缩，可以试试功能全面的 `YUICompressor`，它能处理 CSS 和 JavaScript。`uglify`
    工具也作为独立的 JavaScript 压缩器提供，可在命令行中运行。


    ### 技巧 5：其他零碎事项


    正确实施所有这些技巧，在大多数情况下，都能让你在提升主题性能方面取得很大进展。如果你和我一样，对性能有些吹毛求疵，或者你正处在一个需要压榨出每一丝速度来切实影响商店利润的情况，那么还有一些事情可以做。


    #### 实现设备响应式设计


    在“响应式设计”成为我们通过来回拖拽浏览器宽度来做的那件事之前，它有着更广泛的含义——网站能够响应一系列上下文环境以提供最佳体验。


    这个想法在性能领域派上用场的一个好例子是“视网膜”或“高分辨率”图片。过去几年处理高分辨率图片的常见技术是，直接向所有客户端提供一张缩小到一半大小的高分辨率图片。然后由浏览器负责适当调整大小和显示。


    这种方法的问题在于，当服务于非高分辨率屏幕时非常浪费——它们下载了一张四倍大小的图片却毫无益处。“设备响应式设计”正是考虑了这种情况，通过使用媒体查询或 JavaScript
    库，仅在高分辨率设备上加载高分辨率图片。


    #### 使用延迟加载


    这项技术对 Shopify 商店特别有效，因为它们通常包含大量图片。延迟加载图片涉及使用 JavaScript 库，仅在图片应在用户视口内可见时才进行加载，从而改善初始页面加载时间。


    当你的主题涉及很长的页面，而许多访客实际上不需要加载大部分内容时，这项技术尤其方便。Matt Mlinac 的延迟加载 jQuery 插件（[`http://www.appelsiini.net/projects/lazyload`](http://www.appelsiini.net/projects/lazyload)）是一个非常可靠的实现。


    #### 为垫片/回退方案使用条件加载


    如果你正在为旧版浏览器使用“垫片”或回退方案（例如，`RespondJS` 回退方案允许 Internet Explorer 8 等旧版浏览器使用媒体查询），请确保你不会在新版浏览器上浪费地下载它们。


    你可以通过在加载脚本时使用条件注释来实现这一点，如清单 10-4 所示，或者根据使用 `Modernizr` 等库的测试结果，使用基于 JavaScript
    的条件加载。


    ```

    ...

    清单 10-4

    使用条件注释为 Internet Explorer 8 及更低版本加载 Respond.js 回退方案

    ```


    #### 掌握“async”属性


    如前所述，将 `<script>` 标签放在 HTML 的 `<head>` 部分会严重影响页面加载时间，因为浏览器在等待 JavaScript 加载时会阻塞页面渲染。常识告诉我们，页面中包含
    `script` 标签的最佳位置是在页面最底部，`</body>` 标签之前。


    这是一个很好的默认方法，但随着 HTML5 的出现，我们现在可以为 script 元素使用 `async` 属性，它告诉浏览器在后台加载脚本的同时，继续解析和渲染页面。


    然而，使用 `async` 有一些重要的注意事项——即无法保证执行时间或顺序。如果你有兴趣深入探讨 `async` 的细节，我读过最好的文章是 Jake Archibald
    在 [`http://www.html5rocks.com/en/tutorials/speed/script-loading/`](http://www.html5rocks.com/en/tutorials/speed/script-loading/)
    上的讲解。


    #### 检查资源 404 和 301 错误


    通过浏览器的开发者工具查看 Network 面板或类似面板，检查是否有资源返回 404 或 301 错误。


    缺少的资源（404 错误）浪费了一次请求，你应该移除对该资源的引用或用有效的资源替换——如果网站本身有一个很大或复杂的自定义 404 页面，每次缺少资源时都需要下载它，这个问题会变得更加严重。


    资源请求被 301 响应码重定向实际上相当常见（例如，对某个资源 `http://` 版本的请求可能会被自动重定向到 `https://` 版本）。如果你看到这种情况，直接链接到最终的
    URL 以避免浪费最初的请求。


    ## 评估性能改进


    每次进行性能优化后，最好再次测量你的性能指标，看看改变了什么。这不仅能给你带来成就感并激励你，你还会开始清楚地知道哪些地方容易优化，并开始将它们融入你正常的开发工作流程中。


    现在，尽管所有这些测量都很有用，但没有什么比实际使用你的网站来检查客户是否获得了良好体验更有效的了！下次你在火车上，或者在信号不好的地方用手机时，试着清除浏览器缓存然后加载你的网站。如果你能让咖啡馆里的陌生人也做同样的事，并尝试从你的商店买东西，那将获得额外加分。


    如果你等不及要离开家或办公室来测试你的性能改进，并且你有一台 Mac，你可以使用 OS X 的网络链路调节器，如图 10-9 所示。将你的连接设置调低到不稳定的
    2G 网络，看看你的网站是否还能撑住。


    ![A437216_1_En_10_Fig9_HTML.jpg](img/A437216_1_En_10_Fig9_HTML.jpg)


    *图 10-9 — 调节那个链接！*


    在 [`http://nshipster.com/network-link-conditioner/`](http://nshipster.com/network-link-conditioner/)
    上获取如何设置网络链路调节器的说明。Chrome 用户（Mac 和 Windows 上均可）在开发者工具的 Network 选项卡中可以使用类似的功能（称为
    Throttling）。


    ## 最后想法


    性能优化是一项能为店主带来显著回报的任务，但在开发和测试过程中却经常被忽视，因为我们很容易下意识地掩盖网站的问题。


    请记住：作为主题开发者，你必须等待 Shopify 商店加载（这是你的工作）。客户没有这个义务，他们会毫不犹豫地转向竞争对手。

    '
- fmt: '## Summary


    This chapter explored why performance is simultaneously one of the most important
    yet most often overlooked aspects of theme development. The chapter dug in to
    the motivation for improving theme performance and discussed the key metrics to
    track along with the tools to track them.


    With an understanding of what you were trying to improve under your belt, you
    learned about a number of specific strategies and techniques you can use to ensure
    your themes load quickly and provide a responsive customer experience.


    Footnotes [1](#A437216_1_En_10_Chapter.html#Fn1_source)


    Their report, delivered at the 2009 Velocity conference, can be found at [`http://velocityconf.com/velocity2009/public/schedule/detail/8523`](http://velocityconf.com/velocity2009/public/schedule/detail/8523).


    [2](#A437216_1_En_10_Chapter.html#Fn2_source)


    [`http://www.stevesouders.com/blog/2013/05/09/how-fast-are-we-going-now/`](http://www.stevesouders.com/blog/2013/05/09/how-fast-are-we-going-now/)


    [3](#A437216_1_En_10_Chapter.html#Fn3_source)


    [`https://sites.google.com/a/webpagetest.org/docs/using-webpagetest/metrics/speed-index`](https://sites.google.com/a/webpagetest.org/docs/using-webpagetest/metrics/speed-index)


    [4](#A437216_1_En_10_Chapter.html#Fn4_source)


    [`https://github.com/tkadlec/grunt-perfbudget`](https://github.com/tkadlec/grunt-perfbudget)


    # 11. Collaborative Theme Development


    This final chapter looks at some strategies and tools you can use to make it easier
    to build Shopify themes in collaboration with others. It will also discuss how
    you can deploy your themes in a professional manner to reduce the risk of downtime,
    conflicts, or errors on the theme being used by your customers.


    Finally, I''ll wrap up the substantive part of this book by discussing how you
    can make the most of Shopify''s ecosystem to boost your understanding of the platform
    and forge deeper connections within the partner community.


    ## Collaborating on Themes


    The previous chapters covered the core components of Shopify themes, discussed
    different approaches to building them, and walked through the development of an
    example theme. These discussions have been working on two assumptions—that we''re
    working in a team size of one, and that our code is being uploaded directly to
    the Shopify site it''s being used on.


    In the real world, this often isn''t the case—themes can be built by teams of
    many developers, designers, and content editors. Furthermore, when your themes
    are being used "in production" by merchants, having a professional deployment
    process becomes important to reduce the risk of errors being introduced to a store
    and potentially causing revenue loss.


    Even if you''re a solo developer and don''t anticipate that changing, following
    the practices we''re about to outline will not only make your single-person workflow
    smoother, it''ll also mean that developers taking over a project (or yourself
    coming back to a theme after a couple of months'' break) get the benefit of a
    smooth, clearly defined workflow.


    ### Collaborative Workflows with Version Control


    Recall Chapter [2](#A437216_1_En_2_Chapter.html), which discussed how to place
    your theme files under version control with Git—a vital first step if you plan
    on working on themes with other people. To recap:


    - Version control provides a way to track changes to your theme files, and provides
    an easy way to recover from accidentally overwritten or deleted files.

    - It provides a way to record who was responsible for specific changes to a theme
    and allows multiple developers to work on a project at the same time before "merging"
    changes.

    - You can use feature branches and multiple preview themes to develop new code
    and theme features independently of the live theme.


    To turn this into a modern collaborative development workflow, we only need to
    add a couple of things to the mix:


    - A centralized server (or a decentralized process) allowing multiple developers
    to push their own changes and fetch the changes of others.

    - A system for organizing what needs to be done and who needs to be doing it.

    - A process for reviewing changes before they are merged into the main codebase.


    There are about as many different workflows for this sort of thing as there are
    developers, so I won''t attempt a comprehensive list. Instead, here''s a description
    of the typical workflow we use at my company for managing this process (we use
    GitHub as a central code repository, for listing and tracking issues, and for
    reviewing and merging changes):


    - A new code repository is created on GitHub, and the relevant team members are
    given access to the code. If we''re building a theme from scratch, someone will
    create the initial set of files locally using `Slate` or our own theme framework.
    If we''re working with an existing theme, we''ll use `Slate`, `Theme Kit`, or
    Shopify''s `.zip` export feature to fetch the current set of files and commit
    them to the repository as a starting point.

    - Each team member creates their own unpublished "preview theme" on the store
    we''re working on, to ensure that any changes they make don''t affect the live
    site or other developers, but can still make use of "real" store data.

    - We identify the work to be done and break it into small, discrete features that
    are added as "Issues" in GitHub. Work is divvied up by assigning those issues
    to individual team members.

    - When tackling a new issue, a developer will create a new "feature branch" specific
    to that issue and work on it with their code changes automatically updating the
    personal preview theme.

    - Once happy with the changes, the developer will create a GitHub pull request
    asking to merge the changes into the "master" branch of the repository. Another
    team member (usually the project''s technical lead) is assigned to review the
    changes (see Figure [11-1](#A437216_1_En_11_Chapter.html#Fig1)). Once feedback
    is given and any required changes are made, the changes are merged into the "master"
    branch of the repository and the process repeats with the next issue.


    ![A437216_1_En_11_Fig1_HTML.jpg](A437216_1_En_11_Fig1_HTML.jpg)


    Figure 11-1 A theme code review in progress on GitHub


    Using a process like this and only deploying the "master" branch to the published
    theme on a Shopify store ensures that developers aren''t accidentally overwriting
    or duplicating each other''s work. When using code review before merging changes
    into the "master" branch, it also ensures all changes get a second pair of eyes
    on them.'
