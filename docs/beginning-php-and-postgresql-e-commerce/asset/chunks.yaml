- fmt: "648XCH04.qxd 10/31/06 10:01 PM Page 163\n\n# CHAPTER 4 ■ CREATING THE PRODUCT\
    \ CATALOG: PART II **163**\n\n**3.** Open the `index.php` file, and replace the\
    \ line `$pageContentsCell = 'blank.tpl';` with the line `$pageContentsCell = 'first_page_contents.tpl';`.\
    \ This way, when no `DepartmentID` and `CategoryID` are in the query string, `index.php`\
    \ will load the `first_page_contents` componentized template.\n\n**4.** Load your\
    \ project in your favorite browser. The result should look like Figure 3-1 in\
    \ Chapter 3.\n\n## How It Works: The `first_page_contents` Componentized Template\n\
    \nThe actual list of products is still displayed using the `products_list` Smarty\
    \ componentized template, which you built earlier in this chapter. However, this\
    \ time it isn’t loaded from `department.tpl` (like it loads when browsing a department\
    \ or a category) but from a new template file named `first_page_contents.tpl`.\n\
    \n## Showing Product Details\n\nThe last bit of code you’ll implement in this\
    \ chapter is about displaying product details. When the visitor clicks on any\
    \ product, he or she will be forwarded to the product’s details page, which shows\
    \ the product’s complete description and the secondary product image. In the later\
    \ chapters, you’ll add more features to this page, such as product recommendations\
    \ or product reviews.\n\nLet’s do this in the following exercise.\n\n### Exercise:\
    \ Creating the `Product` Componentized Template\n\n**1.** Edit `index.php` to\
    \ load the `product.tpl` template using the `$pageContentsCell` variable if the\
    \ `ProductID` parameter exists in the query string. Add the boldfaced lines to\
    \ the `index.php` file as shown in the following code:\n\n```php\n// Load department\
    \ details if visiting a department\nif (isset ($_GET['DepartmentID']))\n{\n  $pageContentsCell\
    \ = 'department.tpl';\n  $categoriesCell = 'categories_list.tpl';\n}\n\n// Load\
    \ product details page if visiting a product\nif (isset ($_GET['ProductID']))\n\
    \  $pageContentsCell = 'product.tpl';\n\n// Assign a template file to the page\
    \ contents cell\n$page->assign('pageContentsCell', $pageContentsCell);\n$page->assign('categoriesCell',\
    \ $categoriesCell);\n```\n\n**2.** Okay, now create the componentized template\
    \ for the product details page in which the product with full description and\
    \ second image will display. Create a file named `function.load_product.php` in\
    \ the `presentation/smarty_plugins` folder with the following contents:\n\n```php\n\
    <?php\n\n// Plugin function for the load_product function plugin\nfunction smarty_function_load_product($params,\
    \ $smarty)\n{\n  // Create Product object\n  $product = new Product();\n  $product->init();\n\
    \n  // Assign template variable\n  $smarty->assign($params['assign'], $product);\n\
    }\n\n// Handles product details\nclass Product\n{\n  // Public variables to be\
    \ used in Smarty template\n  public $mProduct;\n  public $mPageLink = 'index.php';\n\
    \n  // Private stuff\n  private $_mProductId;\n\n  // Class constructor\n  public\
    \ function __construct()\n  {\n    // Variable initialization\n    if (isset ($_GET['ProductID']))\n\
    \      $this->_mProductId = (int)$_GET['ProductID'];\n    else\n      trigger_error('ProductID\
    \ required in product.php');\n  }\n\n  public function init()\n  {\n    // Get\
    \ product details from business tier\n    $this->mProduct = Catalog::GetProductDetails($this->_mProductId);\n\
    \    if (isset ($_SESSION['page_link']))\n      $this->mPageLink = $_SESSION['page_link'];\n\
    \  }\n}\n?>\n```\n\n**3.** Now get in touch with your artistic side, and spread\
    \ these variables all over the page in an attempt to make the page more attractive\
    \ to the visitor. To do that, you need to create a `product.tpl` file in the `presentation/templates`\
    \ folder. Feel free to go wild and customize this page as you want.\n\n```smarty\n\
    {load_product assign=\"product\"}\n\n<span class=\"description\">{$product->mProduct.name}</span>\n\
    \n<br /><br />\n```"
