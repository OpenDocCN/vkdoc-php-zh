    所有重命名重复文件的代码都需要添加到你在上一个 PHP 方案中创建的 `checkName()` 方法中。在方法结束的花括号前添加以下代码：\n\n```\n\
    if ($this->renameDuplicates) {\n    $name = isset($this->newName) ? $this->newName\
    \ : $file['name'];\n    $existing = scandir($this->destination);\n    if (in_array($name,\
    \ $existing)) {\n        // 重命名文件\n    }\n}\n```\n\n条件语句检查 `$renameDuplicates`\
    \ 属性是 `true` 还是 `false`。只有当它为 `true` 时，大括号内的代码才会被执行。\n\n条件块内的第一行代码使用三元运算符设置 `$name`\
    \ 的值。这与 `moveFile()` 方法中使用的技术相同。如果 `$newName` 属性有值，则该值被赋给 `$name`。否则，使用原始名称。\n\
    \n下一行使用 `scandir()` 函数，该函数返回目录中所有文件和文件夹的数组。传递给 `scandir()` 的参数是上传文件夹，因此 `$existing`\
    \ 包含该文件夹中已有文件的数组。\n\n下一行的条件语句将 `$name` 传递给 `in_array()` 函数，以确定 `$existing` 数组是否包含同名的文件。如果没有匹配项，则无需执行任何操作。\n\
    \n如果在 `$existing` 数组中找到了 `$name`，则需要生成一个新名称。在嵌套条件语句内的“重命名文件”注释下添加以下代码：\n\n```\n\
    // 重命名文件\n$basename = pathinfo($name, PATHINFO_FILENAME);\n$extension = pathinfo($name,\
    \ PATHINFO_EXTENSION);\n$i = 1;\ndo {\n    $this->newName = $basename . '_' .\
    \ $i++;\n    if (!empty($extension)) {\n        $this->newName .= \".$extension\"\
    ;\n    }\n} while (in_array($this->newName, $existing));\n```\n\n在之前的 PHP 方案中，我们使用\
    \ `pathinfo()` 来获取文件扩展名。这次，你需要同时获取文件的基本名和扩展名。你需要再次获取扩展名，因为如果文件类型不受信任，可能会在文件名后附加后缀。\n\
