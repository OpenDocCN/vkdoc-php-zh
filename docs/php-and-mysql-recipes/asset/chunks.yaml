    \ 使用十进制表示数字。当数字作为输出打印，或数字用于给变量赋值或用于计算时，都假定使用的是十进制。在各种情况下，对其他基值数字的使用会使代码更具可读性。\n\
    \n#### 解决方案\n\nPHP 支持其他 3 种基值（2、8、16）：二进制、八进制和十六进制。为了告诉 PHP 公式中写的数字不是十进制数，需要为数字添加限定符：二进制为`0b`，八进制为`0`，十六进制为`0x`。\n\
    \n#### 工作原理\n\n在下一个示例中，数字 100 分别在不带限定符以及使用三种特殊限定符转换为二进制、八进制和十六进制值的情况下使用。输出不进行相同的转换，因此程序将显示数字\
    \ 100 在每种表示中的十进制值。\n\n```php\n<?php\n// 3_6.php\n$i = 100;\n$b = 0b100;\n$o =\
    \ 0100;\n$h = 0x100;\necho $i . \"\\n\";\necho $b . \"\\n\";\necho $o . \"\\n\"\
    ;\necho $h . \"\\n\";\n```\n\n此示例的输出如下：\n\n第 3 章 ■ 执行数学运算\n\n在数字上使用基限定符时，有效的数字如下：\n\
    \n*   `0b`或二进制：只允许 0 和 1，\n*   `0`或八进制：只允许 0 到 7，\n*   `0x`或十六进制：允许 0-9 以及字母 a-f\
    \ 或 A-F。\n\n使用无效数字将产生解析错误。\n\n允许这些限定符使得某些类型的值更具可读性。考虑 Linux 文件系统上的文件权限。这些通常用三个八进制数字表示所有者、组和其他权限，其中\
    \ 4 代表读取，2 代表写入，1 代表执行权限。数字`0750`表示所有者具有读、写和执行权限；组具有读和执行权限；而其他所有人没有任何访问权限。如果这个数字用十进制表示，它将是\
    \ 488，并且不容易读取访问权限。\n\n### 配方 3-2：转换为不同的基值\n\n#### 问题\n\n在数字上使用限定符仅当数字作为 PHP 代码的一部分编写时才是选项。如果数字来自数据库或\
    \ API 调用，并且数字作为程序的输出写入，我们需要其他方法来在不同的基值之间进行转换。\n\n#### 解决方案\n\nPHP 自带了一些函数使这变得容易。函数`dechex()`将十进制整数值转换为对应的十六进制值。将十六进制字符串转换为整数的相反操作由`hexdec()`函数处理。类似地，函数`decbin()`和`bindec()`在十进制和二进制之间转换，最后函数`decoct()`和`octdec()`在十进制和八进制之间转换。\n\
    \n除了基限定符和转换函数之外，PHP 还带有一个内置函数，可用于在任意基数之间转换数字。函数`base_convert()`接受三个参数，分别称为值（`value`）、源基数（`frombase`）和目标基数（`tobase`）。\n\
    \n`base_convert(number, frombase, tobase);`\n\n该值可以是整数或表示整数的字符串。如果使用整数，PHP 会在进行转换前将数字转换为字符串。返回值始终是一个字符串。如果返回值是十进制的，则生成的字符串可以在计算中用作数字字符串，PHP\
    \ 会在执行计算时将其转换为数字。\n\n#### 工作原理\n\n下面的示例将打印值 4。\n\n```php\n<?php\n// 3_7.php\n\
    echo base_convert(100, 2, 10);\n```\n\n请注意，输入值 100 是作为整数给出的，函数会在执行操作之前使用常规的十进制表示将其转换为字符串。如果该数字是以二进制表示形式（`0b100`）编写的，系统会将该值转换为字符串（4），在这种情况下，函数将返回\
    \ 0，因为 4 在二进制中不是有效数字。\n\n第 3 章 ■ 执行数学运算\n\n```php\n<?php\n// 3_8.php\necho base_convert(0b100,\
    \ 2, 10);\n```\n"
- fmt: '# Converting Numbers to a Different Base


    Converting numbers to a different base can be useful to compact the size of number
    strings. The valid bases are any integer between 2 and 36. The 26 characters in
    the English alphabet and the 10 digits define this limitation.


    ## Recipe 3-3. Storing Binary Values in Integers


    ### Problem


    Programming often use bit values to store flags or options that only have two
    possible values (On and Off or True and False). This allows the storage of 32
    or 64 values in a single integer value. Using base 10 values to check, set or
    clear any of these flags is a bit cumbersome as the numbers (1, 2, 4, 8, 16, 32,
    64, etc.) are difficult to remember and work with.


    ### Solution


    In addition to the basic math operations PHP also handles binary operations. These
    can be used to change single bits in a number, shift bits left or right, etc.
    Depending on the operating system and how PHP was compiled the number of available
    bits in an integer value is either 32 or 64. That gives`2 ** 32` or`2 ** 64` different
    values of an integer. Because all of PHP’s integers are signed the first bit is
    used to handle the sign and that leaves`2 ** 31` or`2 ** 63` positive and negative
    values when the binary string is converted to a decimal number.


    ### How it Works


    We can use the`base_convert()` function to print out a binary representation of
    an integer value. On a 64-bit version of PHP the following code will produce 63
    1’s


    ```php

    <?php


    // 3_9.php


    echo base_convert(PHP_INT_MAX, 10, 2);

    ```


    This is the binary representation of`9223372036854775807`. There are only 63 1’s
    because the first bite is 0 and that’s not printed by the`base_convert()` function
    although it’s still part of the 64 bits.


    With the use of the binary not operator (`~`) all the bits in the number can be
    flipped so in the next example we get a 1 followed by 63 0’s.


    ```php

    <?php


    // 3_10.php


    echo base_convert(~PHP_INT_MAX, 10, 2);

    ```


    ## Recipe 3-4. Setting and Clearing Bits in Binary


    ### Problem


    You want to set or clear individual bits in binary representation.


    **Note:** Recipe 3-2 shows how to convert numbers to binary representation for
    display purposes.


    ### Solution


    In addition to the NOT (`~`) operator PHP also supports bitwise AND (`&`), OR
    (`|`), XOR (`^`), and shifting left (`<<`) and right (`>>`). The bitwise NOT,
    AND, and OR functions are different from the Boolean NOT (`!`), AND (`&&`) and
    OR (`||`) operations. In fact the words AND and OR can be used instead of `&&`
    and `||` the same ways as it’s done in database queries using the SQL92 syntax.


    The bitwise OR operator combines the bits from the same location in two variables
    to form the bit in a new variable using the OR logic. If both bits are 0 the resulting
    bit will also be 0. If one or both bits are 1 the resulting bit will be 1.


    The bitwise AND operator combines the bits from the same location in two variables
    to form the bit in a new variable using the AND logic. If both bits are 1 the
    resulting bit will also be 1. If one or both bits are 0 the resulting bit will
    be 0.


    The bitwise XOR operator combines the bits from the same location in two variables
    to form the bit in a new variable using the XOR logic. If one of the bits is 1
    and the other is 0, the resulting bit will be 1. If both bits are 0 or 1 the resulting
    bit will be 0.


    ### How it Works


    If a variable has a value and it is required that certain bits are set to 1, this
    can be done with the OR operation by adding the value of the exact bits. In the
    following example the variable`$v` is assigned the value 12 (`0b00`).


    The variable is then combined with 2 (`0b10`) using the bitwise OR operation and
    the result is stored in`$x`.


    The result is 14 (`0b1110`) as all the bits in each position are combined starting
    with the least significant bit.


    In this example the two numbers have 2 and 4 bits defined but in the internal
    representation both numbers will have 32 or 64 bits and the ones not defined will
    default to 0. In this case the numbers could be written as`0b1100` and`0b0010`.
    Both representations are valid, and that is also the case for octal and hexadecimal
    numbers where leading zeros can help readability.


    ```php

    <?php


    // 3_11.php


    $v = 0b1110;


    $x = $v | 0b10;

    ```


    If the opposite operation is required where a specific bit should be cleared the
    AND operator can be used but we would also need to use the NOT. Consider the following
    example where`$v` is assigned the value 14 (`0b1110`) and the goal is to clear
    the third bit to create the result 10 (`0b1010`).


    ```php

    <?php


    // 3_12.php


    $v = 0b1110;


    $x = $v & 0b100;

    ```


    In the case the AND operation will result in the value 4 (`0b100`) as the third
    bit is the only location where both bits are 1. If the value is changed to 13
    (`0b1011`) before the AND operation the result would be the expected. Adding the
    not operator in front of the value will make this happen.


    ```php

    <?php


    // 3_13.php


    $v = 0b1110;


    $x = $v & ~0b100;

    ```


    If`~0b100` is printed it will show the result of -5. That is because the default
    output is using base 10. This can be illustrated with the use of the`printf()`
    function that can format the output to be binary.


    ```php

    <?php


    // 3_14.php


    printf("%b\n", 0b100);


    printf("%b\n", ~0b100);

    ```


    Here is the output:


    In this example all 64 bits are flipped from 0 to 1 or from 1 to 0.


    ## Recipe 3-5. Using Hexadecimal Numbers


    ### Problem


    Using integers in a binary way is handy to represent flags but writing long numbers
    with 0’s and 1’s is not ideal for readability.


    ### Solution


    Using the hexadecimal (base 16) system can help with that. Each digit in a hexadecimal
    number represents 4 bits of the value. On a 32-bit system the integer can be represented
    by 8 digits and 16 on a 64-bit system.


    ### How it Works


    Changing the binary numbers in the example 14 (`0xE`) and 8 (`0x8`) will make
    the code shorter but still preserve the readability.


    ```php

    <?php


    // 3_15.php


    $v = 0xE;


    $x = $v & ~0x8;

    ```


    This becomes more obvious as more digits are involved.


    ## Recipe 3-6. Increasing Performance with Binary Shift


    ### Problem


    Multiplying two numbers used to be hard on computers. Many CPU cycles are needed
    and with limited resources this was a problem.


    ### Solution


    By using binary math it’s possible to multiply a number by 2 or divide it by 2
    with simple bit shifting. The bitwise shift operations works, as arithmetic, where
    shifting all bits one place to the left is the same as multiplying by 2 and shifting
    them one place to the right is the same as dividing by 2. The shift left operator
    will add 0’s to the right side and drop the bit at the left side. The shift right
    operator will preserve the sign bit and drop the bit at the right.


    ### How it Works


    The shift operators can shift any number of bits. The left side of the shift operator
    is the number that where the bits are going to be shifted and the right side is
    the number of bits to shift.


    ```php

    <?php


    // 3_16.php


    $bits = PHP_INT_SIZE * 8;


    $v = 1;


    for ($i = 0; $i < $bits; $i++) {


    printf("$v << $i = %64b \n", $v << $i);


    }

    ```


    Shifting numbers more than the number of bits in an integer (32 or 64) will result
    in undefined behaviors. The number of bits in an integer can be calculated from
    the constant`PHP_INT_SIZE` times 8 (the number of bits in a byte). The output
    from the example above looks like this:


    ```

    1 << 0 = 1

    1 << 1 = 10

    1 << 2 = 100

    1 << 3 = 1000

    1 << 4 = 10000

    1 << 5 = 100000

    1 << 6 = 1000000

    1 << 7 = 10000000

    1 << 8 = 100000000

    1 << 9 = 1000000000

    1 << 10 = 10000000000

    1 << 11 = 100000000000

    1 << 12 = 1000000000000

    1 << 13 = 10000000000000

    1 << 14 = 100000000000000

    1 << 15 = 1000000000000000

    1 << 16 = 10000000000000000

    1 << 17 = 100000000000000000

    1 << 18 = 1000000000000000000

    1 << 19 = 10000000000000000000

    1 << 20 = 100000000000000000000

    1 << 21 = 1000000000000000000000

    1 << 22 = 10000000000000000000000

    1 << 23 = 100000000000000000000000

    ```'
