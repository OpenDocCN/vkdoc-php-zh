    When developing the code for this chapter, I originally designed the password
    checker as a function. The basic code inside the function was the same, but I
    decided to convert it into a class to make it more flexible and easier to use.
    The problem with the function was that it needed a large number of arguments to
    set the different options, and it was difficult to remember which order they came
    in. There was also the difficulty of handling the result. If there were no errors,
    the function returned `true`; but if any errors were found, it returned the array
    of error messages. Since PHP treats an array with elements as implicitly `true`,
    this meant having to use the identical operator (three equal signs—see Table 3-5)
    to check whether the result was a Boolean `true`.


    Converting the code to a class eliminated these problems. The public methods to
    set the options have intuitive names and can be set in any order—or not at all.
    And the result is always a Boolean `true` or `false`, because a separate method
    retrieves the array of error messages. It involved writing more code, but the
    improvements made it worthwhile.


