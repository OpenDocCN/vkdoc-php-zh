    ## 章节回顾


    如果你在开始阅读本书时对PHP知之甚少或一无所知，那么你已不再是初学者阵营的一员，而是正在以多种有用的方式利用PHP的强大功能。希望到了现在，你已经开始意识到相同或类似的技术会反复出现。你不应只是复制代码，而应开始识别那些可以根据自己需求进行调整的技术，并进行独立实验。


    本书的其余部分将继续巩固你的知识，但引入了一个新的因素：MySQL关系数据库（及其替代品MariaDB），这将把你的PHP技能提升到一个更高的水平。下一章将介绍MySQL，并向你展示如何为后续章节设置它。


    # 10. 数据库入门


    动态网站与数据库结合后具有全新的意义。从数据库提取内容使你能以静态网站不可能（即使并非完全不可能）的方式呈现材料。脑海中浮现的例子包括在线商店（如[Amazon.com](http://amazon.com/)）、新闻网站（如BBC的[www.bbcnews.com](http://www.bbcnews.com/)）以及包括Google和Yahoo!在内的大型搜索引擎。数据库技术使得这些网站能够呈现成千上万甚至数百万个独特的页面。即使你的雄心壮志远不及此，一个数据库也可以以相对较少的努力增加你网站的丰富内容。


    PHP支持所有主流数据库，包括Microsoft SQL Server、Oracle和PostgreSQL，但它最常与开源数据库MySQL结合使用。根据DB-Engines（[http://db-engines.com/en/ranking](http://db-engines.com/en/ranking)）的数据，截至2014年底，MySQL排名为使用第二广泛的数据库。然而，围绕MySQL的未来存在争议，Google和Wikimedia已放弃MySQL转而支持MariaDB（[https://mariadb.org/](https://mariadb.org/)）。几个领先的Linux发行版也已用MariaDB取代了MySQL。本章首先简要讨论这两个数据库之间竞争的影响。


    在本章中，你将学习以下内容：


    *   数据库如何存储信息

    *   选择图形界面与数据库交互

    *   创建用户帐户

    *   使用适当的数据类型定义数据库表

    *   备份数据并将其传输到另一台服务器'
