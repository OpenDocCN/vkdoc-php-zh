    ## Installing MySQL 5


    Next you must install MySQL 5. You can download it from [http://dev.mysql.com/downloads.](http://dev.mysql.com/downloads)


    Just like Apache, the Windows version of MySQL 5 is very straightforward to install
    as it uses an installer. If you are installing on Linux, it is recommended that
    you download the binary distribution, as MySQL can be a slow program to compile
    from source. I recommend installing MySQL to the`/usr/local`directory, although
    you may prefer a different setup.


    Assuming you have downloaded the 5.0.41 version, the commands to install MySQL
    on Linux are as follows:


    ```

    # cd /usr/local

    # tar -zxf /path/to/mysql-5.0.41-linux-i686.tar.gz

    # ln -s mysql-5.0.41-linux-i686 mysql

    # cd mysql

    # ./configure

    ```


    Setting up the server using a symbolic link to`/usr/local/mysql`allows you to
    upgrade the server version in the future much more easily.


    Once you have run the configure script, you can start the MySQL server with the
    following command:


    ```

    # ./bin/mysqld_safe &

    ```


    Note that this assumes you are already in the`/usr/local/mysql`directory.


    It is now recommended that you add`/usr/local/mysql/bin`to your system path so
    you can easily load MySQL programs when required (such as`mysql`, `mysqladmin`,
    and`mysqldump`).


    ## Installing PHP 5.2.3


    The code developed in this book is designed to run on PHP 5.2.3 (or later). We
    will be using many PHP 5-specific features, so you will not be able to run the
    code in this book on PHP 4.


    Strictly speaking, you can use a version of PHP 5 earlier than 5.2.3, but it is
    best to use the latest available version. Note that the Zend Framework requires
    a minimum PHP version of 5.1.4.


    Download PHP 5.2.3 (or later) from the PHP web site [(http://www.php.net/downloads.php),
    and use the follo](http://www.php.net/downloads.php)wing commands to compile a
    fresh version of PHP. Note that these commands only include the minimum options
    required for compatibility with the code in this book.


    ```

    # tar -zxf php-5.2.3.tar.gz

    # cd php-5.2.3

    # ./configure --with-apxs2 \

    --with-gd --with-curl \

    --with-mysql --with-pdo-mysql \

    --with-jpeg-dir --with-png-dir \

    --with-freetype-dir --with-zlib

    # make

    # make install

    ```


    Once these commands have successfully executed, PHP should be compiled and installed,
    including the PEAR library in`/usr/local/lib/php`.


    > **Note** Please ensure that your version of PHP is built with the GD library
    enabled, as we will use it in this book for generating CAPTCHA images (Chapter
    4) and for resizing uploaded images (Chapter 11).


    When you run the`make install`command, the Apache`httpd.conf`file will be modified
    to load the PHP library; however, you may still need to add the following lines
    to ensure that Apache recognizes files with the extension`.php`as PHP files:


    ```

    AddType application/x-httpd-php .php

    AddType application/x-httpd-php-source .phps

    ```


    This second line is optional, but it is included with the PHP documentation, so
    I have included it here.


    You should also modify the`DirectoryIndex`directive in`httpd.conf`so`index.php`files
    are treated as index files. You can simply add`index.php`to this command so it
    looks something like the following:


    ```

    DirectoryIndex index.php index.html

    ```


    ## Application Filesystem Structure


    Let’s now take a look at the filesystem structure we will be using for the web
    application. The precise naming and organization of the directories in the web
    application is not in itself critical—it is simply important that everything is
    easy to find and manage.


    In this book, we will develop the entire application within a directory called`/var/www/phpweb20`(with
    “phpweb20” referring to the title of this book). You can, of course, use whichever
    directory on your own server that you choose, although we will refer back to this
    directory name on several occasions.


    ### Web Root Directory


    We need to define a root directory for the web server to access. This is the directory
    specified in the Apache configuration, and it is where Apache looks for files
    when a user requests a page in the web site. I will call this directory`htdocs`(the
    full path is`/var/www/phpweb20/htdocs`).


    Most of the files in our application will exist outside of this directory (such
    as PHP classes and web site templates), which prevents users from directly accessing
    these files.


    ### Data Storage Directory


    Next, we need a directory for storing application data (that is, data in addition
    to that in the database). Here we will store log files (both from Apache, and
    those we create ourselves), files uploaded by users, as well as any other temporary
    data.


    I will call this directory`data`, and it will contain a number of subdirectories
    for each of the different types of data stored. These subdirectories are`logs`,
    `uploaded-files`, and`tmp`.


    ### PHP Classes Directory


    We next need a directory called`include`, which will be used to store all PHP
    functions and libraries. Any third-party scripts we use (such as Smarty) will
    also be stored in this directory in addition to our own code. Application controllers
    (scripts that define the different actions users can perform on the web site)
    will be stored in a directory called`Controllers`in the`include`directory.


    When we create the Apache virtual host for our application (in the “Configuring
    the Web Server” section of this chapter), we will include the`include`directory
    in the PHP`include_path`directive, so our application will know where to find
    this code.


    ### Templates Directory


    Finally, we need a directory to hold all the web site templates. We could put
    these directly inside either the`htdocs`directory or the`include`directory; however,
    they are not PHP code (although they do contain display logic), and they shouldn’t
    be directly accessible (although they do contain HTML markup). We will put them
    in a directory called`templates`.


    ### Full Directory Structure


    Putting this all together, the directory structure of our web application will
    look like this:


    ```

    /

    |- /data

    |  |- /logs

    |  |- /uploaded-files

    |  |- /tmp

    |- /htdocs

    |- /include

    |  |- /Controllers

    |- /templates

    ```


    To create this structure in Linux, you would issue the following commands:


    ```

    # mkdir /var/www/phpweb20

    # cd /var/www/phpweb20

    # mkdir data

    # mkdir data/logs

    # mkdir data/uploaded-files

    # mkdir data/tmp

    # mkdir htdocs

    # mkdir include

    # mkdir include/Controllers

    # mkdir templates

    ```


    When you view the directory listing, you should see the following:'
