    **18**


    C H A P T E R 3 ■ C R E AT I N G A TO - D O L I S T A P P L I C AT I O N


    **5.** Based on the response in step 4, the model returns either a true result
    or a false result to the controller.


    **6.** The controller processes the result and fetches the appropriate view to
    be sent to the client (either a success screen or an error message).


    **7.** The final output view is displayed to the client.


    **Figure 3-1.** *A flowchart of a login process in the MVC structure* MVC structures
    are useful because they allow you to separate the different processes of the web
    site. When needing to change or add new form fields, for instance, you need only
    to locate the appropriate view file and make the change. Instead of sifting through
    PHP output functions or scripts, you know that all the views are contained in
    the views folder. The same is true of controllers and models. Certain functions
    are available across the whole application without requiring any includes. Managing
    all the paths for include files or libraries in a non-MVC application can become
    difficult as the program grows; in this regard, the MVC


    architecture helps keep the application more agile. Table 3-1 explains what the
    models, views, and controllers handle; where these files are stored in Cake; and
    how the files are named.


    **Table 3-1.** *MVC Structure Areas*


    **File Name and Location in**


    **Area**


    **Type of Process**


    **Application**


    Model


    Handles all database functions


    app/models/{Model name}.php


    View


    Handles the presentation layer and displays,


    app/views/{Controller


    including Ajax output


    name}/{View name}.ctp


    Controller


    Handles all logic and requests


    app/controllers/{Controller


    name}_controller.php


