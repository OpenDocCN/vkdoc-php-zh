    确保从用户接受信息并将信息传递给应用程序的整个过程中，所有验证都是一致的，这一点非常重要。HTML 和 JavaScript 代码很容易被用户查看（你可以在浏览器中通过“查看源代码”看到代码）。任何高安全级别格式的验证都应该在编译并受服务器保护的编程语言中完成。


