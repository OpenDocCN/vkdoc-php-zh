  trans: "\n在继续之前，我们对上一个示例做了一处改动：增加了一种自增数值的方式。在 `for` 语句中，我们使用 `++` 来递增 `$number`，而不是\
    \ `$number = $number + 1`。实际上，有多种方法可以递增数值。\n\n```\n$number = $number + 1;\n$number++;\n\
    $number += 1;\n```\n\n上述所有语句都会将变量加一。但请注意，每种方式都是在变量被使用后才进行递增。什么意思呢？\n\n```\n$number\
    \ = 1;\necho $number++;\necho $number;\n```\n\n上述语句中，第一个 `echo` 会输出值 1，第二个 `echo`\
    \ 输出值 2。因为 `$number++` 是在第一次输出之后才执行递增操作。\n\n```\n$number = 1;\necho ++$number;\n\
    echo $number;\n```\n\n如果将 `++` 符号移到左边，变量会在被使用前递增。因此，第一个 `echo` 语句会显示 2，第二个显示 3。\n\
    \n在 `for` 语句中，我们也可以将递增操作改为使用前进行。由于我们实际并未使用该值（例如用 `echo` 显示），因此在这个 `for` 循环示例中，结果不会发生任何变化。大多数情况下，先递增还是后递增并没有区别，但正如我们刚发现的，我们应当谨慎，确保能得到预期的结果。\n\
    \n```\n$number = 2;\necho $number--;\necho --$number;\n```\n\n我们还可以使用 `--` 来递减变量。其过程相同：如果符号在右侧，则在变量使用后递减；如果在左侧，则在变量使用前递减。在这个示例中，第一个\
    \ `echo` 会显示 2，第二个显示 0。0？你是不是以为是 1？第一次 `echo` 后，值递减为 1。然后，在第二次 `echo` 显示结果之前，值再次递减为\
    \ 0。\n\n**练习**：调整 `for` 循环示例，使其循环十次。然后调整循环，使其仅显示奇数。提示：将递增改为每次加二。最后，查阅 [`www.php.net`](http://www.php.net)\
    \ 上 `continue` 和 `break` 语句的用法。如何跳过值为 4 的情况，但继续循环？如果计数变量值为 6，如何提前退出循环？\n\n现在我们回到构建图片库的工作。\n\
    \n![](img/323857_3_En_4_Fig5_HTML.jpg)\n\n这张图片反映了开发者在图片成功上传到网站后所看到的窗口。\n\n**图\
    \ 4-5** `securelistgallery.php` 通过 `securelistindex.php` 的输出\n\n## 使用 glob 查找文件夹中的文件\n\
    \nPHP 的 `glob` 方法可用于查找与模式匹配的路径名。它能快速扫描目录，并创建一个包含所有匹配项的数组。我们可以使用 `for` 循环来获取结果，因为我们不知道会返回多少结果。我们可以通过数组的\
    \ `length` 属性来获知这一信息。不过，还有一种更好的选择：`foreach` 循环。这种循环专为遍历数组和其他列表而设计。\n\n### For\
    \ Each 循环\n\n```\nforeach ($arrayname as $value) {\n语句\n}\n```\n\n`foreach` 语法需要一个数组（或列表）名称和一个用于存储当前项的变量。例如：\n\
    \n```\n<?php\n$cars = array(\"Volvo\", \"BMW\", \"Toyota\");\nforeach ($cars as\
    \ $value) {\n  echo \"$value <br>\";\n}\n?>\n```\n\n在这个示例中，声明了一个汽车数组。`foreach`\
    \ 循环会遍历该数组，并将每个值（汽车品牌）放入变量 `$value` 中，然后显示该值。循环会一直持续到数组中没有更多汽车为止。我们无需担心数组的大小，并且可以轻松更改数组而无需修改循环！\n\
    \n### 显示所有图片\n\n现在让我们使用 `foreach` 循环来检索图片库中的图片。\n\n```\n<?php\nfunction showImages()\
    \ {\n  $out = \"<h1>图片库</h1>\";\n  $out .= \"<div>\";\n  $dir_name = \"imgs\"\
    ;\n  chdir($dir_name);\n  $images = glob(\"*.jpg\");\n  foreach($images as $image)\
    \ {\n    $out .= '<img src=\"'.$image.'\" alt=\"image\" />';\n  }\n  $out .= \"\
    </div>\";\n  return $out;\n}\n$info = showImages();\n?>\n```\n\n**列表 4-8** `listgallery.php`\n\
    \n函数的前几行将 HTML 代码传递给 `$out` 变量，以格式化图片的显示。我们将在另一个示例中优化这个显示效果。\n\n```\n$dir_name\
    \ = \"imgs\";\n```\n"
