    the provided $parameters array. Since our autoload() function throws an exception
    if the class cannot be found, we can assume that the controller was either loaded,
    or doesn’t exist, which then raises a Router\Exception\Controller exception. Our
    _pass() method then checks whether the Controller class has a method that matches
    the $action required. If not, it will raise a Router\Exception\Action exception.


    We then check whether the action is callable (checking for @protected or @private
    in the metadata).


    If either of these conditions is met, we raise a Router\Exception\Action exception.
    We also define an anonymous function to deal with hooks.


    ■ **Note** Hooks are functions that hook into a certain point within a running
    system, so that they can be run without changing the system itself. An example
    would be creating a hook function to execute before the intended action. We can
    change this hook function at any time without modifying the action itself.


    If the action has a @before [method, [method...]] flag, our Router class will
    first execute that method.


    Likewise, if the action has an @after [method, [method...]] flag, our Router class
    will execute it after the action has completed.


    Methods identified in @before and @after, having @once flags will be run only
    once, irrespective of how many times they are referenced in @before and @after.
    If the action has a @protected or @private flag, our Router class will throw an
    exception as if the action could not be found.


    @before and @after are examples of how to implement hooks in our framework. The
    order of execution is first to execute any @before hooks, then to assign the parameters
    to the Controller instance and execute the controller. Finally, our _pass() method
    will execute any @after hooks. The full class looks like that shown in Listing
