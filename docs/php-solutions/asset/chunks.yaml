    \n```\n} else {\n    echo \"<p>共找到 $numRows 条记录。</p>\";\n?>\n<?php } ?>\n</body>\n\
    ```\n\n在 `pdo.php` 页面主题的两个 PHP 代码块之间添加以下表格，使其受 `else` 块控制。这是为了防止 SQL 查询失败时出现错误。显示结果集的\
    \ PHP 代码以粗体显示。\n\n```\n<table>\n<tr>\n    <th>image_id</th>\n    <th>文件名</th>\n\
    \    <th>说明</th>\n</tr>\n<?php foreach ($conn->query($sql) as $row) { ?>\n<tr>\n\
    \    <td><?php echo $row['image_id']; ?></td>\n    <td><?php echo $row['filename'];\
    \ ?></td>\n    <td><?php echo $row['caption']; ?></td>\n</tr>\n<?php } ?>\n</table>\n\
    ```\n\n保存页面并在浏览器中查看。它应该看起来像 PHP 解决方案 11-3 中的截图。你可以将你的代码与 `ch11` 文件夹中的 `pdo_02.php`\
    \ 进行对照。\n\n### PDO 连接速查表\n\n表 11-2 总结了使用 PDO 进行连接和数据库查询的基本细节。一些命令将在后续章节中使用，但这里列出以便于参考。\n\
    \n**表 11-2.** 使用 PDO 进行数据库连接\n\n| 操作 | 用法 | 说明 |\n| --- | --- | --- |\n| 连接 |\
    \ `$conn = new PDO($DSN,$u,$p);` | 实践中需要三个参数：数据源名称（DSN）、用户名、密码。必须包裹在 `try/catch`\
    \ 块中。 |\n| 提交 `SELECT` 查询 | `$result = $conn->query($sql);` | 将结果作为 `PDOStatement`\
    \ 对象返回。 |\n| 提取记录 | `foreach($conn->query($sql) as $row) {` | 在一次操作中提交 `SELECT`\
    \ 查询并以关联数组形式获取当前行。 |\n| 统计结果数 | `$numRows = $result->rowCount()` | 在 MySQL/MariaDB\
    \ 中，返回 `SELECT` 查询的结果数。大多数其他数据库不支持。 |\n| 获取单个结果 | `$item = $result->fetchColumn();`\
    \ | 获取结果第一列中的第一条记录。要从其他列获取结果，请使用列号（从 0 开始计数）作为参数。 |\n| 获取下一条记录 | `$row = $result->fetch();`\
    \ | 从结果集中以关联数组形式获取下一行。 |\n| 释放数据库资源 | `$result->closeCursor();` | 释放连接以允许新查询。\
    \ |\n| 提交非 `SELECT` 查询 | `$affected = $conn->exec($sql);` | 虽然 `query()` 可用于非\
    \ `SELECT` 查询，但 `exec()` 返回受影响的行数。 |\n\n## 使用 SQL 与数据库交互\n\n正如你刚才所见，PHP 连接到数据库、发送查询并接收结果，但查询本身需要用\
    \ SQL 编写。尽管 SQL 是一个通用标准，但存在许多 SQL 方言。包括 MySQL 在内的每个数据库供应商都对标准语言进行了扩展。这些扩展提高了效率和功能，但通常与其他数据库不兼容。本书中的\
    \ SQL 适用于 MySQL 5.1 或更高版本，但不一定能移植到 Microsoft SQL Server、Oracle 或其他数据库。\n\n###\
    \ 编写 SQL 查询\n\nSQL 语法规则不多，而且所有规则都非常简单。\n"
- fmt: "# SQL is case-insensitive\n\nThe query that retrieves all records from the\
    \ `images` table looks like this:\n\n`SELECT * FROM images`\n\nThe words in uppercase\
    \ are SQL keywords. This is purely a convention. The following are all equally\
    \ correct:\n\n`SELECT * FROM images`\n\n`select * from images`\n\n`SeLEcT * fRoM\
    \ images`\n\nAlthough SQL keywords are case-insensitive, the same doesn’t apply\
    \ to database column names. The advantage of using uppercase for keywords is that\
    \ it makes SQL queries easier to read. You’re free to choose whichever style suits\
    \ you best, but the ransom-note style of the last example is probably best avoided.\n\
    \n# Whitespace is ignored\n\nThis allows you to spread SQL queries over several\
    \ lines for increased readability. The one place where whitespace is not allowed\
    \ is between a function name and the opening parenthesis. The following generates\
    \ an error:\n\n`SELECT COUNT (*) FROM images`  /* BAD EXAMPLE */\n\nThe space\
    \ needs to be closed up like this:\n\n`SELECT COUNT(*) FROM images`  /* CORRECT\
    \ */\n\nAs you probably gathered from these examples, you can add comments to\
    \ SQL queries by putting them between `/*` and `*/`.\n\n# Strings must be quoted\n\
    \nAll strings must be quoted in an SQL query. It doesn’t matter whether you use\
    \ single or double quotes, as long as they are in matching pairs. However, it’s\
    \ normally better to use MySQLi- or PDO prepared statements, as explained later\
    \ in this chapter.\n\n# Handling numbers\n\nAs a general rule, numbers should\
    \ not be quoted, as anything in quotes is a string. However, MySQL accepts numbers\
    \ enclosed in quotes and treats them as their numeric equivalent. Be careful to\
    \ distinguish between a real number and any other data type made up of numbers.\
    \ For instance, a date is made up of numbers but should be enclosed in quotes\
    \ and stored in a date-related column type. Similarly, telephone numbers should\
    \ be enclosed in quotes and stored in a text-related column type.\n\n> **Note:**\
    \ SQL queries normally end with a semicolon, which is an instruction to the database\
    \ to execute the query. When using PHP, the semicolon must be omitted from the\
    \ SQL. Consequently, standalone examples of SQL are presented throughout this\
    \ book without a concluding semicolon.\n\n## Refining the data retrieved by a\
    \ SELECT query\n\nThe only SQL query you have run so far retrieves all records\
    \ from the `images` table. Much of the time, you want to be more selective.\n\n\
    ### Selecting specific columns\n\nUsing an asterisk to select all columns is a\
    \ convenient shortcut, but you should normally specify only those columns you\
    \ need. List the column names separated by commas after the `SELECT` keyword.\
    \ For example, this query selects only the `filename` and `caption` fields for\
    \ each record:\n\n`SELECT filename, caption FROM images`\n\nYou can test this\
    \ in `mysqli_03.php` and `pdo_03.php` in the `ch11` folder.\n\n### Changing the\
    \ order of results\n\nTo control the sort order, add an `ORDER BY` clause with\
    \ the name(s) of the column(s) in order of precedence. Separate multiple columns\
    \ by commas. The following query sorts the captions from the `images` table in\
    \ alphabetical order (the code is in `mysqli_04.php` and `pdo_04.php`):\n\n`$sql\
    \ = 'SELECT * FROM images ORDER BY caption';`\n\n> **Note:** This semicolon is\
    \ part of the PHP statement, not part of the SQL query.\n\nThe preceding query\
    \ produces this output:\n\n![A978-1-4842-0635-5_11_Figg_HTML.jpg](A978-1-4842-0635-5_11_Figg_HTML.jpg)\n\
    \nTo reverse the sort order, add the `DESC` (for “descending”) keyword like this\
    \ (there are examples in `mysqli_05.php` and `pdo_05.php`):\n\n`$sql = 'SELECT\
    \ * FROM images ORDER BY caption DESC';`\n\n![A978-1-4842-0635-5_11_Figh_HTML.jpg](A978-1-4842-0635-5_11_Figh_HTML.jpg)\n\
    \nThere is also an `ASC` (for “ascending”) keyword. It’s the default sort order,\
    \ so is normally omitted.\n\nHowever, specifying `ASC` increases clarity when\
    \ columns in the same table are sorted in a different order. For example, if you\
    \ publish multiple articles every day, you could use the following query to display\
    \ titles in alphabetical order, but ordered by the date of publication with the\
    \ most recent ones first:\n\n`SELECT * FROM articles`  \n`ORDER BY published DESC,\
    \ title ASC`\n\n### Searching for specific values\n\nTo search for specific values,\
    \ add a `WHERE` clause to the `SELECT` query. The `WHERE` clause follows the name\
    \ of the table. For example, the query in `mysqli_06.php` and `pdo_06.php` looks\
    \ like this:\n\n`$sql = 'SELECT * FROM images`  \n`WHERE image_id = 6';`\n\n>\
    \ **Note:** SQL uses one equal sign to test for equality, unlike PHP, which uses\
    \ two.\n\nIt produces the following result:\n\n![A978-1-4842-0635-5_11_Figi_HTML.jpg](A978-1-4842-0635-5_11_Figi_HTML.jpg)\n\
    \nIn addition to testing for equality, a `WHERE` clause can use comparison operators,\
    \ such as greater than (`>`) and less than (`<`). Rather than go through all the\
    \ options now, I’ll introduce others as needed. [Chapter 13](#A978-1-4842-0635-5_13_Chapter.html)\
    \ has a comprehensive roundup of the four main SQL commands: `SELECT`, `INSERT`,\
    \ `UPDATE`, and `DELETE`, including a list of the main comparison operators used\
    \ with `WHERE`.\n\nIf used in combination with `ORDER BY`, the `WHERE` clause\
    \ must come first. For example (the code is in `mysqli_07.php` and `pdo_07.php`):\n\
    \n`$sql = 'SELECT * FROM images`  \n`WHERE image_id > 5`  \n`ORDER BY caption\
    \ DESC';`\n\nThis selects the three images that have an `image_id` greater than\
    \ 5 and sorts them by their captions in reverse order.\n\n### Searching for text\
    \ with wildcard characters\n\nIn SQL, the percentage sign (`%`) is a wildcard\
    \ character that matches anything or nothing. It’s used in a `WHERE` clause in\
    \ conjunction with the `LIKE` keyword.\n\nThe query in `mysqli_08.php` and `pdo_08.php`\
    \ looks like this:\n\n`$sql = 'SELECT * FROM images`  \n`WHERE caption LIKE \"\
    %Kyoto%\"';`\n\nIt searches for all records in the `images` table where the `caption`\
    \ column contains “Kyoto,” and produces the following result:\n\n![A978-1-4842-0635-5_11_Figj_HTML.jpg](A978-1-4842-0635-5_11_Figj_HTML.jpg)\n\
    \nAs the preceding screenshot shows, it finds six records out of the eight in\
    \ the `images` table. All the captions end with “Kyoto,” so the wildcard character\
    \ at the end is matching nothing, whereas the wildcard at the beginning matches\
    \ the rest of each caption.\n\nIf you omit the leading wildcard (`\"Kyoto%\"`),\
    \ the query searches for captions that begin with “Kyoto.” None of them do, so\
    \ you get no results from the search.\n\nThe query in `mysqli_09.php` and `pdo_09.php`\
    \ looks like this:\n\n`$sql = 'SELECT * FROM images`  \n`WHERE caption LIKE \"\
    %maiko%\"';`\n\nIt produces the following result:\n\n![A978-1-4842-0635-5_11_Figk_HTML.jpg](A978-1-4842-0635-5_11_Figk_HTML.jpg)\n\
    \nThe query spells “maiko” all in lowercase, but the query also finds it with\
    \ an initial capital. Wildcard searches with `LIKE` are case-insensitive.\n\n\
    To perform a case-sensitive search, you need to add the `BINARY` keyword like\
    \ this (the code is in `mysqli_10.php` and `pdo_10.php`):\n\n`$sql = 'SELECT *\
    \ FROM images`  \n`WHERE caption LIKE BINARY \"%maiko%\"';`\n\nAll the examples\
    \ you have seen so far have been hard-coded, but most of the time, the values\
    \ used in SQL queries need to come from user input. Unless you’re careful, this\
    \ puts you at risk of a malicious exploit known as SQL injection. The rest of\
    \ this chapter explains this danger and how to avoid it."
  raw: '#### SQL is case-insensitive


    The query that retrieves all records from the `images` table looks like this:


    `SELECT * FROM images`


    The words in uppercase are SQL keywords. This is purely a convention. The following
    are all equally correct:


    `SELECT * FROM images`


    `select * from images`


    `SeLEcT * fRoM images`


    Although SQL keywords are case-insensitive, the same doesn’t apply to database
    column names. The advantage of using uppercase for keywords is that it makes SQL
    queries easier to read. You’re free to choose whichever style suits you best,
    but the ransom-note style of the last example is probably best avoided.


    #### Whitespace is ignored


    This allows you to spread SQL queries over several lines for increased readability.
    The one place where whitespace is not allowed is between a function name and the
    opening parenthesis. The following generates an error:


    `SELECT COUNT (*) FROM images  /* BAD EXAMPLE */`


    The space needs to be closed up like this:


    `SELECT COUNT(*) FROM images  /* CORRECT */`


    As you probably gathered from these examples, you can add comments to SQL queries
    by putting them between `/*` and `*/`.


    #### Strings must be quoted


    All strings must be quoted in an SQL query. It doesn’t matter whether you use
    single or double quotes, as long as they are in matching pairs. However, it’s
    normally better to use MySQLi- or PDO prepared statements, as explained later
    in this chapter.


    #### Handling numbers


    As a general rule, numbers should not be quoted, as anything in quotes is a string.
    However, MySQL accepts numbers enclosed in quotes and treats them as their numeric
    equivalent. Be careful to distinguish between a real number and any other data
    type made up of numbers. For instance, a date is made up of numbers but should
    be enclosed in quotes and stored in a date-related column type. Similarly, telephone
    numbers should be enclosed in quotes and stored in a text-related column type.


    Note


    SQL queries normally end with a semicolon, which is an instruction to the database
    to execute the query. When using PHP, the semicolon must be omitted from the SQL.
    Consequently, standalone examples of SQL are presented throughout this book without
    a concluding semicolon.


    ### Refining the data retrieved by a SELECT query


    The only SQL query you have run so far retrieves all records from the `images`
    table. Much of the time, you want to be more selective.


    #### Selecting specific columns


    Using an asterisk to select all columns is a convenient shortcut, but you should
    normally specify only those columns you need. List the column names separated
    by commas after the `SELECT` keyword. For example, this query selects only the
    `filename` and `caption` fields for each record:


    `SELECT filename, caption FROM images`


    You can test this in `mysqli_03.php` and `pdo_03.php` in the `ch11` folder.


    #### Changing the order of results


    To control the sort order, add an `ORDER BY` clause with the name(s) of the column(s)
    in order of precedence. Separate multiple columns by commas. The following query
    sorts the captions from the `images` table in alphabetical order (the code is
    in `mysqli_04.php` and `pdo_04.php)`:


    `$sql = ''SELECT * FROM images ORDER BY caption'';`


    Note


    This semicolon is part of the PHP statement, not part of the SQL query.


    The preceding query produces this output:


    ![A978-1-4842-0635-5_11_Figg_HTML.jpg](A978-1-4842-0635-5_11_Figg_HTML.jpg)


    To reverse the sort order, add the `DESC` (for “descending”) keyword like this
    (there are examples in `mysqli_05.php` and `pdo_05.php`):


    `$sql = ''SELECT * FROM images ORDER BY caption DESC'';`


    ![A978-1-4842-0635-5_11_Figh_HTML.jpg](A978-1-4842-0635-5_11_Figh_HTML.jpg)


    There is also an `ASC` (for “ascending”) keyword. It’s the default sort order,
    so is normally omitted.


    However, specifying `ASC` increases clarity when columns in the same table are
    sorted in a different order. For example, if you publish multiple articles every
    day, you could use the following query to display titles in alphabetical order,
    but ordered by the date of publication with the most recent ones first:


    `SELECT * FROM articles`


    `ORDER BY published DESC, title ASC`


    #### Searching for specific values


    To search for specific values, add a `WHERE` clause to the `SELECT` query. The
    `WHERE` clause follows the name of the table. For example, the query in `mysqli_06.php`
    and `pdo_06.php` looks like this:


    `$sql = ''SELECT * FROM images`


    `WHERE image_id = 6'';`


    Note


    SQL uses one equal sign to test for equality, unlike PHP, which uses two.


    It produces the following result:


    ![A978-1-4842-0635-5_11_Figi_HTML.jpg](A978-1-4842-0635-5_11_Figi_HTML.jpg)


    In addition to testing for equality, a `WHERE` clause can use comparison operators,
    such as greater than (`>`) and less than (`<`). Rather than go through all the
    options now, I’ll introduce others as needed. [Chapter 13](#A978-1-4842-0635-5_13_Chapter.html)
    has a comprehensive roundup of the four main SQL commands: `SELECT`, `INSERT`,
    `UPDATE`, and `DELETE`, including a list of the main comparison operators used
    with `WHERE`.


    If used in combination with `ORDER BY`, the `WHERE` clause must come first. For
    example (the code is in `mysqli_07.php` and `pdo_07.php`):


    `$sql = ''SELECT * FROM images`


    `WHERE image_id > 5`


    `ORDER BY caption DESC'';`


    This selects the three images that have an `image_id` greater than 5 and sorts
    them by their captions in reverse order.


    #### Searching for text with wildcard characters


    In SQL, the percentage sign (`%`) is a wildcard character that matches anything
    or nothing. It’s used in a `WHERE` clause in conjunction with the `LIKE` keyword.


    The query in `mysqli_08.php` and `pdo_08.php` looks like this:


    `$sql = ''SELECT * FROM images`


    `WHERE caption LIKE "%Kyoto%"'';`


    It searches for all records in the `images` table where the `caption` column contains
    “Kyoto,” and produces the following result:


    ![A978-1-4842-0635-5_11_Figj_HTML.jpg](A978-1-4842-0635-5_11_Figj_HTML.jpg)


    As the preceding screenshot shows, it finds six records out of the eight in the
    `images` table. All the captions end with “Kyoto,” so the wildcard character at
    the end is matching nothing, whereas the wildcard at the beginning matches the
    rest of each caption.


    If you omit the leading wildcard (`"Kyoto%"`), the query searches for captions
    that begin with “Kyoto.” None of them do, so you get no results from the search.


    The query in `mysqli_09.php` and `pdo_09.php` looks like this:


    `$sql = ''SELECT * FROM images`


    `WHERE caption LIKE "%maiko%"'';`


    It produces the following result:


    ![A978-1-4842-0635-5_11_Figk_HTML.jpg](A978-1-4842-0635-5_11_Figk_HTML.jpg)


    The query spells “maiko” all in lowercase, but the query also finds it with an
    initial capital. Wildcard searches with `LIKE` are case-insensitive.


    To perform a case-sensitive search, you need to add the `BINARY` keyword like
    this (the code is in `mysqli_10.php` and `pdo_10.php`):


    `$sql = ''SELECT * FROM images`


    `WHERE caption LIKE` `BINARY` `"%maiko%"'';`


    All the examples you have seen so far have been hard-coded, but most of the time,
    the values used in SQL queries need to come from user input. Unless you’re careful,
    this puts you at risk of a malicious exploit known as SQL injection. The rest
    of this chapter explains this danger and how to avoid it.'
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的格式和注意事项，将以下英文文本翻译成中文。\n\n\n# SQL 不区分大小写\n\n\
    从 `images` 表中检索所有记录的查询如下所示：\n\n`SELECT * FROM images`\n\n大写单词是 SQL 关键字。这纯粹是一种约定。以下写法都是同样正确的：\n\
    \n`SELECT * FROM images`\n\n`select * from images`\n\n`SeLEcT * fRoM images`\n\
    \n尽管 SQL 关键字不区分大小写，但数据库列名并非如此。使用大写关键字的优点是能让 SQL 查询更易于阅读。您可以自由选择最适合自己的风格，但最后一个例子中的“勒索信”风格最好避免。\n\
    \n# 空格将被忽略\n\n这允许您将 SQL 查询分散到多行，以提高可读性。唯一不允许出现空格的地方是在函数名和左括号之间。以下写法会报错：\n\n`SELECT\
    \ COUNT (*) FROM images`  /* 错误示例 */\n\n需要消除空格，像这样：\n\n`SELECT COUNT(*) FROM images`\
    \  /* 正确示例 */\n\n正如您可能从这些示例中推断出的那样，您可以通过将注释放在 `/*` 和 `*/` 之间来向 SQL 查询添加注释。\n\n\
    # 字符串必须用引号括起来\n\n所有字符串在 SQL 查询中都必须用引号括起来。使用单引号还是双引号无关紧要，只要它们成对匹配即可。但是，通常最好使用 MySQLi\
    \ 或 PDO 预处理语句，正如本章稍后所述。\n\n# 处理数字\n\n作为一般规则，数字不应加引号，因为引号内的任何内容都是字符串。然而，MySQL 接受用引号括起来的数字，并将其视为等效的数字。务必将实数与由数字组成的其他数据类型区分开来。例如，日期由数字组成，但应括在引号中并存储在日期相关的列类型中。同样，电话号码应括在引号中并存储在文本相关的列类型中。\n\
    \n> **注意：** SQL 查询通常以分号结尾，这是指示数据库执行查询的指令。使用 PHP 时，必须从 SQL 语句中省略分号。因此，本书中的独立 SQL\
    \ 示例均不包含结尾分号。\n\n## 优化 SELECT 查询检索的数据\n\n到目前为止，您唯一运行过的 SQL 查询是从 `images` 表中检索所有记录。在大多数情况下，您希望更具选择性。\n\
    \n### 选择特定列\n\n使用星号选择所有列是一种方便的快捷方式，但通常您应该只指定所需的列。在 `SELECT` 关键字后列出以逗号分隔的列名。例如，此查询仅为每条记录选择\
    \ `filename` 和 `caption` 字段：\n\n`SELECT filename, caption FROM images`\n\n您可以在\
    \ `ch11` 文件夹中的 `mysqli_03.php` 和 `pdo_03.php` 文件中测试此查询。\n\n### 更改结果的顺序\n\n要控制排序顺序，请添加一个\
    \ `ORDER BY` 子句，后跟按优先级顺序排列的列名。多个列名之间用逗号分隔。以下查询按字母顺序对 `images` 表中的标题进行排序（代码在 `mysqli_04.php`\
    \ 和 `pdo_04.php` 中）：\n\n`$sql = 'SELECT * FROM images ORDER BY caption';`\n\n\
    > **注意：** 此分号是 PHP 语句的一部分，而不是 SQL 查询的一部分。\n\n前面的查询产生以下输出：\n\n![A978-1-4842-0635-5_11_Figg_HTML.jpg](img/A978-1-4842-0635-5_11_Figg_HTML.jpg)\n\
    \n要反转排序顺序，请添加 `DESC`（表示“降序”）关键字，如下所示（在 `mysqli_05.php` 和 `pdo_05.php` 中有示例）：\n\
    \n`$sql = 'SELECT * FROM images ORDER BY caption DESC';`\n\n![A978-1-4842-0635-5_11_Figh_HTML.jpg](img/A978-1-4842-0635-5_11_Figh_HTML.jpg)\n\
    \n还有一个 `ASC`（表示“升序”）关键字。这是默认排序顺序，因此通常省略。\n\n但是，当同一个表中的列按不同顺序排序时，指定 `ASC` 可以提高清晰度。例如，如果您每天发布多篇文章，可以使用以下查询按字母顺序显示标题，但按发布日期排序，最新的在前：\n\
    \n`SELECT * FROM articles`  \n`ORDER BY published DESC, title ASC`\n\n### 搜索特定值\n\
    \n要搜索特定值，请在 `SELECT` 查询中添加一个 `WHERE` 子句。`WHERE` 子句位于表名之后。例如，`mysqli_06.php` 和\
    \ `pdo_06.php` 中的查询如下所示：\n\n`$sql = 'SELECT * FROM images`  \n`WHERE image_id\
    \ = 6';`\n\n> **注意：** SQL 使用一个等号来测试相等性，这与 PHP 使用两个等号不同。\n\n它产生以下结果：\n\n![A978-1-4842-0635-5_11_Figi_HTML.jpg](img/A978-1-4842-0635-5_11_Figi_HTML.jpg)\n\
    \n除了测试相等性之外，`WHERE` 子句还可以使用比较运算符，例如大于 (`>`) 和小于 (`<`)。现在先不逐一介绍所有选项，我将在需要时介绍其他选项。第\
    \ 13 章全面总结了四个主要的 SQL 命令：`SELECT`、`INSERT`、`UPDATE` 和 `DELETE`，包括与 `WHERE` 一起使用的主要比较运算符列表。\n\
    \n如果与 `ORDER BY` 结合使用，`WHERE` 子句必须放在前面。例如（代码在 `mysqli_07.php` 和 `pdo_07.php` 中）：\n\
    \n`$sql = 'SELECT * FROM images`  \n`WHERE image_id > 5`  \n`ORDER BY caption\
    \ DESC';`\n\n这将选择 `image_id` 大于 5 的三张图片，并按标题降序排序。\n\n### 使用通配符搜索文本\n\n在 SQL 中，百分号（`%`）是一个通配符，可以匹配任何内容或不匹配任何内容。它在\
    \ `WHERE` 子句中与 `LIKE` 关键字结合使用。\n\n`mysqli_08.php` 和 `pdo_08.php` 中的查询如下所示：\n\n\
    `$sql = 'SELECT * FROM images`  \n`WHERE caption LIKE \"%Kyoto%\"';`\n\n它搜索 `images`\
    \ 表中所有 `caption` 列包含“Kyoto”的记录，并产生以下结果：\n\n![A978-1-4842-0635-5_11_Figj_HTML.jpg](img/A978-1-4842-0635-5_11_Figj_HTML.jpg)\n\
    \n如前面的屏幕截图所示，它从 `images` 表的八条记录中找到了六条。所有标题都以“Kyoto”结尾，因此结尾的通配符不匹配任何内容，而开头的通配符匹配每个标题的其余部分。\n\
    \n如果您省略开头的通配符（`\"Kyoto%\"`），查询将搜索以“Kyoto”开头的标题。没有标题以它开头，因此您将无法获得任何搜索结果。\n\n`mysqli_09.php`\
    \ 和 `pdo_09.php` 中的查询如下所示：\n\n`$sql = 'SELECT * FROM images`  \n`WHERE caption\
    \ LIKE \"%maiko%\"';`\n\n它产生以下结果：\n\n![A978-1-4842-0635-5_11_Figk_HTML.jpg](img/A978-1-4842-0635-5_11_Figk_HTML.jpg)\n\
    \n该查询将“maiko”全部拼写为小写，但查询也找到了首字母大写的记录。使用 `LIKE` 进行通配符搜索不区分大小写。\n\n要执行区分大小写的搜索，您需要添加\
    \ `BINARY` 关键字，如下所示（代码在 `mysqli_10.php` 和 `pdo_10.php` 中）：\n\n`$sql = 'SELECT\
    \ * FROM images`  \n`WHERE caption LIKE BINARY \"%maiko%\"';`\n\n到目前为止，您看到的所有示例都是硬编码的，但大多数情况下，SQL\
    \ 查询中使用的值需要来自用户输入。除非您非常小心，否则这会使您面临称为 SQL 注入的恶意攻击风险。本章的其余部分将解释这种危险以及如何避免它。\n"
- fmt: '# Understanding the Danger of SQL Injection


    SQL injection is very similar to the email header injection I warned you about
    in [Chapter 5](#A978-1-4842-0635-5_5_Chapter.html). An injection attack tries
    to insert spurious conditions into an SQL query in an attempt to expose or corrupt
    your data. The meaning of the following query should be easy to understand:


    ```

    SELECT * FROM users WHERE username = ''xyz'' AND pwd = ''abc''

    ```


    It''s the basic pattern for a login application. If the query finds a record where
    `username` is `xyz` and `pwd` is `abc`, you know that a correct combination of
    username and password have been submitted, so the login succeeds. All an attacker
    needs to do is inject an extra condition like this:


    ```

    SELECT * FROM users WHERE username = ''xyz'' AND pwd = ''abc'' OR 1 = 1

    ```


    The `OR` means that only one of the conditions needs to be true, so the login
    succeeds even without a correct username and password. SQL injection relies on
    quotes and other control characters not being properly escaped when part of the
    query is derived from a variable or user input.


    There are several strategies you can adopt to prevent SQL injection, depending
    on the situation:


    * If the variable is an integer (for example, the primary key of a record), use
    `is_numeric()` and the `(int)` casting operator to ensure it''s safe to insert
    in the query.

    * If you are using MySQLi, pass each variable to the `real_escape_string()` method
    before inserting it in the query.

    * The PDO equivalent of `real_escape_string()` is the `quote()` method, but it
    doesn''t work with all databases. The PDO documentation advises against using
    `quote()`, strongly recommending the use of prepared statements instead.

    * Use a prepared statement. In a prepared statement, placeholders in the SQL query
    represent values that come from user input. The PHP code automatically wraps strings
    in quotes and escapes embedded quotes and other control characters. The syntax
    is different for MySQLi and PDO.

    * None of the preceding strategies is suitable for column names, which must not
    be enclosed in quotes. To use a variable for column names, create an array of
    acceptable values and check that the submitted value is in the array before inserting
    it into the query.


    With the exception of `quote()`, let''s take a look at using each of these techniques.


    ## PHP Solution 11-6: Inserting an integer from user input into a query


    This PHP solution shows how to sanitize a variable from user input to make sure
    it contains only an integer before inserting the value into an SQL query. The
    technique is the same for both MySQLi and PDO.


    Copy either `mysqli_integer_01.php` or `pdo_integer_01.php` from the `ch11` folder
    to the `mysqli` or `pdo` folder. Each file contains an SQL query that selects
    the `image_id` and `filename` columns from the `images` table. In the body of
    the page, there''s a form with a drop-down menu that is populated by a loop that
    runs through the results of the SQL query. The MySQLi version looks like this:


    ```php

    <form action="" method="get">


    <select name="image_id">


    <?php while ($row = $images->fetch_assoc()) { ?>


    <option value="<?= $row[''image_id'']; ?>"


    <?php if (isset($_GET[''image_id'']) &&


    $_GET[''image_id''] == $row[''image_id'']) {


    echo ''selected'';


    } ?>


    ><?= $row[''filename'']; ?></option>


    <?php } ?>


    </select>


    <input type="submit" name="go" value="Display">


    </form>

    ```


    * The form uses the `get` method and assigns the `image_id` to the `value` attribute
    of the `<option>` tags. If `$_GET[''image_id'']` has the same value as `$row[''image_id'']`,
    the current `image_id` is the same as that passed through the page''s query string,
    so the `selected` attribute is added to the opening `<option>` tag. The value
    of `$row[''filename'']` is inserted between the opening and closing `<option>`
    tags.

    * The PDO version is identical apart from the fact that it runs the query directly
    in a `foreach` loop using the PDO `fetch()` method.

    * If you load the page into a browser, you''ll see a drop-down menu that lists
    the files in the `images` folder like this:


    ![A978-1-4842-0635-5_11_Figl_HTML.jpg](A978-1-4842-0635-5_11_Figl_HTML.jpg)


    Insert the following code immediately after the closing `</form>` tag. The code
    is the same for both MySQLi and PDO, apart from one line.


    ```php

    <?php


    if (isset($_GET[''image_id''])) {


    if (!is_numeric($_GET[''image_id''])) {


    $image_id = 1;


    } else {


    $image_id = (int) $_GET[''image_id''];


    }


    $sql = "SELECT filename, caption FROM images


    WHERE image_id = $image_id";


    $result = $conn->query($sql);


    $row = $result->fetch_assoc();


    ?>


    <figure><img src="../images/<?= $row[''filename'']; ?>">


    <figcaption><?= $row[''caption'']; ?></figcaption>


    </figure>


    <?php } ?>

    ```


    If you are using the PDO version, locate this line:


    * The conditional statement checks whether `image_id` has been sent through the
    `$_GET` array. If it has been, the next conditional statement uses the logical
    Not operator with `is_numeric()` to check if it''s not numeric. The `is_numeric()`
    function applies a strict test, accepting only numbers or numeric strings. It
    doesn''t attempt to convert the value to a number if it begins with a digit.

    * If the value submitted through the query string isn''t numeric, a default value
    is assigned to a new variable called `$image_id`. However, if `$_GET[''image_id'']`
    is numeric, it''s assigned to `$image_id` using the `(int)` casting operator.
    Using the casting operator is an extra precaution in case someone tries to probe
    your script for error messages by submitting a floating point number.

    * Since you know `$image_id` is an integer, it''s safe to insert directly in the
    SQL query. Because it''s a number, it doesn''t need to be wrapped in quotes, but
    the string assigned to `$sql` needs to use double quotes to ensure the value of
    `$image_id` is inserted into the query.

    * The new query is submitted to MySQL by the `query()` method, and the result
    is stored in `$row`. Finally, `$row[''filename'']` and `$row[''caption'']` are
    used to display the image and its caption in the page.


    `$row = $result->fetch_assoc();`


    Change it to this:


    ```php

    $row = $result->fetch();

    ```'
  raw: '## Understanding the Danger of SQL Injection


    SQL injection is very similar to the email header injection I warned you about
    in [Chapter 5](#A978-1-4842-0635-5_5_Chapter.html). An injection attack tries
    to insert spurious conditions into an SQL query in an attempt to expose or corrupt
    your data. The meaning of the following query should be easy to understand:


    `SELECT * FROM users WHERE username = ''xyz'' AND pwd = ''abc''`


    It’s the basic pattern for a login application. If the query finds a record where
    `username` is `xyz` and `pwd` is `abc`, you know that a correct combination of
    username and password have been submitted, so the login succeeds. All an attacker
    needs to do is inject an extra condition like this:


    `SELECT * FROM users WHERE username = ''xyz'' AND pwd = ''abc'' OR 1 = 1`


    The `OR` means that only one of the conditions needs to be true, so the login
    succeeds even without a correct username and password. SQL injection relies on
    quotes and other control characters not being properly escaped when part of the
    query is derived from a variable or user input.


    There are several strategies you can adopt to prevent SQL injection, depending
    on the situation:


    *   If the variable is an integer (for example, the primary key of a record),
    use `is_numeric()` and the `(int)` casting operator to ensure it’s safe to insert
    in the query.

    *   If you are using MySQLi, pass each variable to the `real_escape_string()`
    method before inserting it in the query.

    *   The PDO equivalent of `real_escape_string()` is the `quote()` method, but
    it doesn’t work with all databases. The PDO documentation advises against using
    `quote()`, strongly recommending the use of prepared statements instead.

    *   Use a prepared statement. In a prepared statement, placeholders in the SQL
    query represent values that come from user input. The PHP code automatically wraps
    strings in quotes and escapes embedded quotes and other control characters. The
    syntax is different for MySQLi and PDO.

    *   None of the preceding strategies is suitable for column names, which must
    not be enclosed in quotes. To use a variable for column names, create an array
    of acceptable values and check that the submitted value is in the array before
