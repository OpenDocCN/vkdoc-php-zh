    to the database, you incorporate the username, secret key, and unencrypted password
    in the `WHERE` clause of a `SELECT` query. If the query finds a match, the user
    is allowed into the restricted part of the site. If there’s no match, the login
    is rejected. The code is the same as in PHP Solution 17-2, except for the following
    section.


    For MySQLi, it looks like this (see `authenticate_2way_` `mysqli.php`):


    `<?php`


    `require_once ''connection.php'';`


    `$conn = dbConnect(''read'');`


    `// create key`


    `$key = ''takeThisWith@PinchOfSalt'';`


    `$sql = ''SELECT username FROM users_2way`


    `WHERE username = ? AND pwd = AES_ENCRYPT(?, ?)'';`


    `// initialize and prepare statement`


    `$stmt = $conn->stmt_init();`


    `$stmt->prepare($sql);`


    `// bind the input parameters`


    `$stmt->bind_param(''sss'', $username, $password, $key);`


    `$stmt->execute();`


    `// to get the number of matches, you must store the result`


    `$stmt->store_result();`


    `// if a match is found, num_rows is 1, which is treated as true`


    `if ($stmt->num_rows) {`


    `$_SESSION[''authenticated''] = ''Jethro Tull'';`


    `// get the time the session started`


    `$_SESSION[''start''] = time();`


    `session_regenerate_id();`


    `header("Location: $redirect"); exit;`


    `} else {`


    `// if not verified, prepare error message`


    `$error = ''Invalid username or password'';`


    `}`


    Note that you need to store the result of the prepared statement before you can
    access the `num_rows` property. If you fail to do this, `num_rows` will always
    be `0`, and the login will fail even if the username and password are correct.


    The revised code for PDO looks like this (see `authenticate_2way_pdo.inc.php`):


    `<?php`


    `require_once ''connection.php'';`


    `$conn = dbConnect(''read'', ''pdo'');`


    `// create key`


    `$key = ''takeThisWith@PinchOfSalt'';`


    `$sql = ''SELECT username FROM users_2way`


    `WHERE username = ? AND pwd = AES_ENCRYPT(?, ?)'';`


    `// prepare statement`


    `$stmt = $conn->prepare($sql);`


    `// bind variables by passing them as an array when executing statement`


    `$stmt->execute([$username, $password, $key]);`


    `// if a match is found, rowCount() produces 1, which is treated as true`


    `if ($stmt->rowCount()) {`


    `$_SESSION[''authenticated''] = ''Jethro Tull'';`


    `// get the time the session started`


    `$_SESSION[''start''] = time();`


    `session_regenerate_id();`


    `header("Location: $redirect"); exit;`


    `} else {`


    `// if not verified, prepare error message`


    `$error = ''Invalid username or password'';`


    `}`


    To test these scripts, use them in place of `authenticate_mysqli.php` and `authenticate_`
    `pdo.php`.


    ### Decrypting a password


    Decrypting a password that uses two-way encryption simply involves passing the
    secret key as the second argument to `AES_DECRYPT()` in a prepared statement,
    like this:


    `$key = ''takeThisWith@PinchOfSalt'';`


    `$sql = "SELECT AES_DECRYPT(pwd, ''$key'') AS pwd FROM users_2way`


    `WHERE username = ?";`


    The key must be exactly the same as the one originally used to encrypt the password.
    If you lose the key, the passwords remain as inaccessible as those stored using
    one-way encryption.


    Normally, the only time you need to decrypt a password is when a user requests
    a password reminder. Creating the appropriate security policy for sending out
    such reminders depends a great deal on the type of site that you''re operating.
    However, it goes without saying that you shouldn’t display the decrypted password
    onscreen. You need to set up a series of security checks, such as asking for the
    user’s date of birth or mother’s maiden name, or posing a question whose answer
    only the user is likely to know. Even if the user gets the answer right, you should
    send the password by email to the user’s registered address.


    All the necessary knowledge should be at your fingertips if you have succeeded
    in getting this far in this book.


    ## Updating User Details


    I haven’t included any update forms for the user registration pages. It’s a task
    that you should be able to accomplish by yourself at this stage. The most important
    point about updating user registration details is that you should not display
    the user’s existing password in the update form. If you’re using one-way encryption,
    you can’t, anyway.'
  trans: "\n### 注册新用户\n\n`AES_ENCRYPT()`函数接受两个参数：要加密的值和加密密钥。加密密钥可以是您选择的任意字符串。在本示例中，我选择了`takeThisWith@PinchOfSalt`，但使用随机字母数字字符和符号组合会更安全。\n\
    \n单向加密和双向加密的基本注册脚本是相同的。唯一区别在于将用户数据插入数据库的部分。\n\n> **提示**  \n> 以下脚本直接将加密密钥嵌入页面中。如果您在服务器根目录之外有一个私有文件夹，建议在包含文件中定义密钥并将其存储在私有文件夹中。\n\
    \nMySQLi 的代码如下（完整代码见 `ch17` 文件夹中的 `register_2way_mysqli.php`）：\n\n```\nif (!$errors)\
    \ {\n\n// 包含连接文件\nrequire_once 'connection.php';\n$conn = dbConnect('write');\n\
    \n// 创建密钥\n$key = 'takeThisWith@PinchOfSalt';\n\n// 准备 SQL 语句\n$sql = 'INSERT\
    \ INTO users_2way (username, pwd)\nVALUES (?, AES_ENCRYPT(?, ?))';\n$stmt = $conn->stmt_init();\n\
    if ($stmt = $conn->prepare($sql)) {\n\n// 绑定参数并将详细信息插入数据库\n$stmt->bind_param('sss',\
    \ $username, $password, $key);\n$stmt->execute();\n}\n\nif ($stmt->affected_rows\
    \ == 1) {\n$success = \"$username 已注册。您现在可以登录。\";\n} elseif ($stmt->errno == 1062)\
    \ {\n$errors[] = \"$username 已被使用。请选择其他用户名。\";\n} else {\n$errors[] = $stmt->error;\n\
    }\n\n}\n```\n\nPDO 的代码如下（完整代码见 `ch17` 文件夹中的 `register_2way_pdo.php`）：\n\n```\n\
    if (!$errors) {\n\n// 包含连接文件\nrequire_once 'connection.php';\n$conn = dbConnect('write',\
    \ 'pdo');\n\n// 创建密钥\n$key = 'takeThisWith@PinchOfSalt';\n\n// 准备 SQL 语句\n$sql\
    \ = 'INSERT INTO users_2way (username, pwd)\nVALUES (:username, AES_ENCRYPT(:pwd,\
    \ :key))';\n$stmt = $conn->prepare($sql);\n\n// 绑定参数并将详细信息插入数据库\n$stmt->bindParam(':username',\
    \ $username, PDO::PARAM_STR);\n$stmt->bindParam(':pwd', $password, PDO::PARAM_STR);\n\
    $stmt->bindParam(':key', $key, PDO::PARAM_STR);\n$stmt->execute();\n\nif ($stmt->rowCount()\
    \ == 1) {\n$success = \"$username 已注册。您现在可以登录。\";\n} elseif ($stmt->errorCode()\
    \ == 23000) {\n$errors[] = \"$username 已被使用。请选择其他用户名。\";\n} else {\n$errors[]\
    \ = '抱歉，数据库出现问题。';\n}\n\n}\n```\n\n严格来说，没必要为 `$key` 使用绑定参数，因为它并非来自用户输入。但如果直接将其嵌入查询中，整个查询需要用双引号包裹，而\
    \ `$key` 则需要用单引号包裹。\n\n要测试上述脚本，只需将它们包含在 `register_db.php` 中，而不是 `register_db_mysqli.php`\
    \ 或 `register_db_pdo.php`。\n\n### 使用双向加密进行用户认证\n\n创建带有双向加密的登录页面非常简单。连接数据库后，将用户名、密钥和未加密的密码整合在\
    \ `SELECT` 查询的 `WHERE` 子句中。如果查询找到匹配项，则允许用户进入网站的受限部分；如果没有匹配项，则拒绝登录。代码与 PHP 解决方案\
    \ 17-2 基本相同，唯一下面部分不同。\n\n对于 MySQLi，代码如下（见 `authenticate_2way_mysqli.php`）：\n\n\
    ```\n<?php\nrequire_once 'connection.php';\n$conn = dbConnect('read');\n\n// 创建密钥\n\
    $key = 'takeThisWith@PinchOfSalt';\n\n$sql = 'SELECT username FROM users_2way\n\
    WHERE username = ? AND pwd = AES_ENCRYPT(?, ?)';\n\n// 初始化并准备语句\n$stmt = $conn->stmt_init();\n\
    $stmt->prepare($sql);\n\n// 绑定输入参数\n$stmt->bind_param('sss', $username, $password,\
    \ $key);\n$stmt->execute();\n\n// 要获取匹配数量，必须存储结果\n$stmt->store_result();\n\n//\
    \ 如果找到匹配项，num_rows 为 1，视为 true\nif ($stmt->num_rows) {\n$_SESSION['authenticated']\
    \ = 'Jethro Tull';\n// 获取会话开始时间\n$_SESSION['start'] = time();\nsession_regenerate_id();\n\
    header(\"Location: $redirect\"); exit;\n} else {\n// 如果未验证，准备错误消息\n$error = '用户名或密码无效';\n\
    }\n```\n\n请注意，在访问 `num_rows` 属性之前，必须先存储预处理语句的结果。如果未能执行此操作，`num_rows` 将始终为 `0`，即使用户名和密码正确，登录也会失败。\n\
    \nPDO 的修订代码如下（见 `authenticate_2way_pdo.inc.php`）：\n\n```\n<?php\nrequire_once\
    \ 'connection.php';\n$conn = dbConnect('read', 'pdo');\n\n// 创建密钥\n$key = 'takeThisWith@PinchOfSalt';\n\
    \n$sql = 'SELECT username FROM users_2way\nWHERE username = ? AND pwd = AES_ENCRYPT(?,\
    \ ?)';\n\n// 准备语句\n$stmt = $conn->prepare($sql);\n\n// 通过在执行语句时以数组形式传递来绑定变量\n\
    $stmt->execute([$username, $password, $key]);\n\n// 如果找到匹配项，rowCount() 返回 1，视为\
    \ true\nif ($stmt->rowCount()) {\n$_SESSION['authenticated'] = 'Jethro Tull';\n\
    // 获取会话开始时间\n$_SESSION['start'] = time();\nsession_regenerate_id();\nheader(\"\
    Location: $redirect\"); exit;\n} else {\n// 如果未验证，准备错误消息\n$error = '用户名或密码无效';\n\
    }\n```\n\n要测试这些脚本，请用它们替换 `authenticate_mysqli.php` 和 `authenticate_pdo.php`。\n\
    \n### 解密密码\n\n解密使用双向加密的密码，只需在预处理语句中将密钥作为第二个参数传递给 `AES_DECRYPT()`，如下所示：\n\n```\n\
    $key = 'takeThisWith@PinchOfSalt';\n$sql = \"SELECT AES_DECRYPT(pwd, '$key') AS\
    \ pwd FROM users_2way\nWHERE username = ?\";\n```\n\n密钥必须与最初用于加密密码的密钥完全相同。如果丢失密钥，密码将像使用单向加密存储的一样无法访问。\n\
    \n通常，只有在用户请求密码提醒时才需要解密密码。为此类提醒制定适当的安全策略在很大程度上取决于您运营的网站类型。然而，不言而喻，您不应该在屏幕上显示解密后的密码。您需要设置一系列安全检查，例如询问用户的出生日期或母亲的婚前姓名，或者提出一个只有用户本人可能知道答案的问题。即使用户回答正确，您也应该通过电子邮件将密码发送到用户的注册地址。\n\
    \n如果您已成功阅读本书至此，那么您应该能够轻松掌握所有必要知识。\n\n## 更新用户详细信息\n\n我没有为用户注册页面包含任何更新表单。这是一个现阶段您应该能够自行完成的任务。更新用户注册详细信息最重要的一点是，不应在更新表单中显示用户现有的密码。如果使用单向加密，您无论如何也无法显示它。\n"
- fmt: '# Where Next?


    This book has covered a massive amount of ground. If you’ve mastered all the techniques
    covered here, you are well on your way to becoming an intermediate PHP developer,
    and with a little more effort, you will enter the advanced level. If it’s been
    a struggle, don’t worry. Go over the earlier chapters again. The more you practice,
    the easier it becomes.


    You’re probably thinking, “How on earth can I remember all this?” You don’t need
    to. Don’t be ashamed to look things up. Bookmark the PHP online manual ( [`http://php.net/manual/en/`](http://php.net/manual/en/)
    ) and use it regularly. It’s constantly updated, and it has lots of useful examples.
    Type a function name into the search box at the top right of every page to be
    taken straight to a full description of that function. Even if you can’t remember
    the correct function name, the manual takes you to a page that suggests the most
    likely candidates. Most pages have practical examples showing how the function
    or class is used.


    What makes dynamic web design easy is not an encyclopedic knowledge of PHP functions
    and classes but a solid grasp of how conditional statements, loops, and other
    structures control the flow of a script. Once you can visualize your projects
    in terms of “if this happens, what should happen next?” you’re the master of your
    own game. I consult the PHP online manual frequently. To me, it’s like a dictionary.
    Most of the time, I just want to check that I have the arguments in the right
    order, but I often find that something catches my eye and opens up new horizons.
    I may not use that knowledge immediately, but I store it at the back of my mind
    for future use and go back when I need to check the details.


    The MySQL online manual ( [`http://dev.mysql.com/doc/refman/5.6/en/index.html`](http://dev.mysql.com/doc/refman/5.6/en/index.html)
    ) is equally useful. The documentation for MariaDB is at [`https://mariadb.com/kb/en/`](https://mariadb.com/kb/en/)
    . Make both the PHP and database online manuals your friends, and your knowledge
    will grow by leaps and bounds.'
