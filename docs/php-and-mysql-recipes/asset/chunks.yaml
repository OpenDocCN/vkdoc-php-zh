    \       )\n)\nArray\n(\n    [0] => Array\n        (\n            [first_name]\
    \ => Ringo\n            [last_name] => Star\n            [date_of_birth] => -930528000\n\
    \        )\n    [1] => Array\n        (\n            [first_name] => John\n  \
    \          [last_name] => Lenon\n            [date_of_birth] => -922406400\n \
    \       )\n    [2] => Array\n        (\n            [first_name] => Paul\n   \
    \         [last_name] => McCartney\n            [date_of_birth] => -869097600\n\
    \        )\n    [3] => Array\n        (\n            [first_name] => George\n\
    \            [last_name] => Harrison\n            [date_of_birth] => -847324800\n\
    \        )\n)\n```\n\n按名字或姓氏排序对于披头士乐队的四位成员来说没有区别，但按出生日期排序则显示了不同的记录顺序。\n\n## 食谱\
    \ 4-7.  将数组用作栈\n\n### 问题\n栈是一种常用结构，元素可以从栈的开口端添加和移除。栈被视为后进先出（LIFO）结构。\n\n### 解决方案\n\
    通过使用 `array_pop()`、`array_push()`、`array_shift()` 和 `array_unshift()` 函数，可以将数组用作栈。`Shift`\
    \ 和 `unshift` 作用于数组的开头，而 `push` 和 `pop` 作用于数组的末尾。这些函数将返回数组的第一个或最后一个元素。如果数组为空或变量不是数组，这些函数将返回\
    \ `NULL`。\n\n### 工作原理\n"
- fmt: "函数 `array_push()` 会将一个元素添加到数组的末尾。键名将是下一个可用的数值。如果数组为空，第一个键将是 `0`。 函数 `array_pop()`\
    \ 会移除数组中的最后一个值并将其返回，以便赋值给一个变量或在比较中使用。\n\n```php\n<?php\n// 4_24.php\n\n$stack\
    \ = array();\n\narray_push($stack, 'orange');\narray_push($stack, 'apple');\n\
    array_push($stack, 'banana');\n\nprint_r($stack);\n\n$fruit = array_pop($stack);\n\
    \nprint_r($stack);\n```\n\n在此例中，我们向栈中添加了三种水果并打印了数组的所有值。然后我们使用 `array_pop()` 移除最后添加的元素，并再次打印数组内容。此时数组中只剩下两个值。\n\
    \n```\nArray\n(\n    [0] => orange\n    [1] => apple\n    [2] => banana\n)\nArray\n\
    (\n    [0] => orange\n    [1] => apple\n)\n```\n\n我们可以通过使用 `array_unshift()` 和\
    \ `array_shift()` 实现相同的功能。\n\n```php\n<?php\n// 4_25.php\n\n$stack = array();\n\
    \narray_unshift($stack, 'orange');\narray_unshift($stack, 'apple');\narray_unshift($stack,\
    \ 'banana');\n\nprint_r($stack);\n\n$fruit = array_shift($stack);\n\nprint_r($stack);\n\
    ```\n\n水果会以相反顺序显示，并且每次添加或移除元素时，现有元素的所有键都必须向上或向下移动，以便为新元素腾出空间。这将导致 `shift` 和 `unshift`\
    \ 函数的运行速度比 `push` 和 `pop` 稍慢。\n\n```\nArray\n(\n    [0] => banana\n    [1] =>\
    \ apple\n    [2] => orange\n)\nArray\n(\n    [0] => apple\n    [1] => orange\n\
    )\n```\n\n## 配方 4-8：数组切片与拼接\n\n### 问题\n\n你需要获取数组的一部分，或者将一个数组插入到另一个数组的中间。\n\n###\
    \ 解决方案\n\n有两个函数可用于处理这些操作。`array_slice()` 函数可用于剪切数组的一部分并将其赋值给一个新数组。`array_splice()`\
    \ 函数可用于将一个数组插入到另一个数组的任意位置。\n\n### 工作原理\n\n`array_slice()` 函数接受两到四个参数。第一个是源数组，第二个是偏移量。这是从数组开头跳过的元素数量。可选的第三个参数是切片的长度或要复制的元素数量。最后的可选第四个参数定义是否保留数值数组键。默认为\
    \ `false`。下面的示例展示了如何从一个大数组中复制一个包含两个元素的小切片。该示例还演示了保留键与不保留键之间的区别。\n\n```php\n<?php\n\
    // 4_26.php\n\n$a = array(\n    'apple',\n    'orange',\n    'banana',\n    'animal'\
    \ => 'horse',\n    'vechicle' => 'truck'\n);\n\nprint_r(array_slice($a, 2, 2));\n\
    print_r(array_slice($a, 2, 2, true));\n```\n\n输出如下：\n\n```\nArray\n(\n    [0]\
    \ => banana\n    [animal] => horse\n)\nArray\n(\n    [2] => banana\n    [animal]\
    \ => horse\n)\n```\n\n这是一个微小的差异，但在输出的第一部分中，`banana` 的索引从 `2` 变为了 `0`，而在第二部分中，其位置/键被保留了。\n\
    \n`array_splice()` 函数也接受四个参数。第一个是源数组，第二个是偏移量，第三个是长度，第四个是要插入的数组。该函数可以三种不同的方式使用：第一种是删除数组的一部分，第二种是将一个新数组插入到数组中，第三种是前两种操作的组合。\n\
    \n第一个参数（源数组）是通过引用传递的。这会导致数组的值被该函数更改。此外，该函数会返回一个包含所有被替换元素的数组。\n\n第二个参数可以是正数或负数。如果为正，则从数组开头计算偏移量；如果为负，则从数组末尾开始计算。"
  raw: 'The function array_push() will add an element to the end of an array. The
    key will be the next available numerical value. If the array is empty the first
    key will be 0\. The function array_pop() will remove the last value from the array
    and return it so it can be assigned to a value or used in a comparison.


    <?php


    // 4_24.php


    $stack = array();


    array_push($stack, ''orange'');


    array_push($stack, ''apple'');


    array_push($stack, ''banana'');


    print_r($stack);


    $fruit = array_pop($stack);


    print_r($stack);


    In this case we have added three fruits to the stack and printed all the values
    of the array. Then we use array_pop() to remove the element that was added last
    and print the contents of the array again. This time only two values are left
    in the array.


    Array


    (


    [0] => orange


    [1] => apple


    [2] => banana


    )


    Array


    (


    [0] => orange


    [1] => apple


    )


    We can accomplish the same functionality with the use of array_unshift() and array_shift()
    .


    <?php


    // 4_25.php


    $stack = array();


    array_unshift($stack, ''orange'');


    array_unshift($stack, ''apple'');


    array_unshift($stack, ''banana'');


    CHAPTER 4 ■ WORKING WITH ARRAYS


    print_r($stack);


    $fruit = array_shift($stack);


    print_r($stack);


    The fruits will show up in the reverse order and each time we add or remove an
    element all keys of the existing elements will have to be shifted up or down in
    order to make room for the new element. This will cause the shift and unshift
    functions to be a bit slower than push and pop.


    Array


