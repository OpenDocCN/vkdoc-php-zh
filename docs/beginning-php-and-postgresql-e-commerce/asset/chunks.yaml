- fmt: 'When it comes to product removal, things aren’t so straightforward. You can
    either unassign the product from a category by removing the record from the `product_category`
    table, or you can effectively remove the product from the `product` table. Because
    products are accessed in the catalog by selecting a category, you must make sure
    there are no orphaned products (products that don’t belong to any category) because
    they couldn’t be accessed using the current administration interface.


    So, if you added a Delete button for a product, what would it actually do? Delete
    the product from the database? This would work, but it’s a bit awkward if you
    have a product assigned to multiple categories, and you only want to remove it
    from a single category. On the other hand, if the Delete button removes the product
    from the current category, you can create orphaned products because they exist
    in the `product` table, but they don’t belong to any category, so they can’t be
    accessed. You could fix that by allowing the site administrator to see the complete
    list of products without locating them by department and category.


    The simple solution implemented in this chapter is like that. There will be two
    delete buttons: a Remove from category button, which allows removing the product
    from a single category, and a Remove from catalog button, which completely removes
    the product from the catalog by deleting its entries in the `product` and `product_category`
    tables. If the product belongs to more categories, only the Remove from category
    button will be active. If the product belongs to a single category, only the Remove
    from catalog button will be available because removing it only from its category
    would generate an orphan product in the `product` table (a product that doesn’t
    belong to any category, thus is inaccessible through the current interface).


    With this componentized template, apart from permitting the administrator to remove
    products, you’ll also see how to assign the currently selected product to an additional
    category or to move the product to another category.


    ## Implementing the Presentation Tier


    Figure 7-12 shows how the product details admin page will look for the Black Basque
    Beret product.


    Figure 7-12. *Administering product details*


    You’ll implement the `admin_product` Smarty componentized template in the following
    exercise.


    ### Exercise: Implementing admin_product


