  \ 代码不再暴露。\n\n7.  将文件名改回 `menu.php`，并通过在浏览器中直接加载并再次查看源代码来测试包含文件。\n\n8.  移除你在第 3 步添加到\
  \ `menu.php` 中的密码 PHP 代码，并将 `index.php` 中的包含命令恢复到原始设置，如下所示：\n\nPHP 方案 5-3：自动指示当前页面\n\
  \n让我们解决菜单不指示当前页面的问题。解决方案是通过 PHP 获取当前页面的文件名，然后使用条件语句在相应的 `<a>` 标签中插入一个 ID。\n\n继续使用相同的文件。或者，使用\
  \ `ch05` 文件夹中的 `index_02.php`、`contact.php`、`gallery.php`、`blog.php`、`menu_01.php`\
  \ 和 `footer_01.php`，确保从任何文件名中移除 `_01` 和 `_02`。\n\n1.  打开 `menu.php`。当前代码如下所示：\n\n\
  ```html\n<body>\n    <ul>\n        <li><a href=\"index.php\">首页</a></li>\n     \
  \   <li><a href=\"blog.php\">博客</a></li>\n        <li><a href=\"gallery.php\">画廊</a></li>\n\
  \        <li><a href=\"contact.php\">联系</a></li>\n    </ul>\n</body>\n```\n\n指示当前页面的样式由第\
  \ 2 行突出显示的 `id=\"here\"` 控制。你需要 PHP 来插入 `id=\"here\"`：如果当前页面是 `blog.php`，则插入到 `blog.php\
  \ <a>` 标签中；如果是 `gallery.php`，则插入到 `gallery.php <a>` 标签中；如果是 `contact.php`，则插入到 `contact.php\
  \ <a>` 标签中。\n\n希望你现在已经得到了提示——你需要在每个 `<a>` 标签中使用一个 `if` 语句（参见第 3 章的“做出决策”）。第 2 行需要看起来像这样：\n\
  \n```html\n<li><a href=\"blog.php\">首页</a></li>\n```\n\n其他链接也应该以类似方式修改。但是 `$currentPage`\
  \ 的值是如何得到的呢？你需要找出当前页面的文件名。\n\n2.  暂时将 `menu.php` 放在一边，创建一个名为 `get_filename.php`\
  \ 的新 PHP 页面。插入以下代码（或者使用 `ch05` 文件夹中的 `get_filename.php`）：\n\n```php\n<?php echo\
  \ $_SERVER['SCRIPT_FILENAME']; ?>\n```\n\n3.  保存 `get_filename.php` 并在浏览器中查看。在 Windows\
  \ 系统上，你应该看到类似以下截图的内容。（`ch05` 文件夹中的版本包含此步骤和下一步骤的代码，以及指示各自内容的文本。）\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Figa_HTML.jpg](img/332054_4_En_5_Figa_HTML.jpg)\n\
  \n在 macOS 上，你应该看到类似这样的内容：\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Figb_HTML.jpg](img/332054_4_En_5_Figb_HTML.jpg)\n\
  \n`$_SERVER['SCRIPT_FILENAME']` 来自 PHP 内置的超全局数组之一，它始终提供当前页面的绝对文件路径。你现在需要的是提取出文件名的方法。\n\
  \n\n\n4.  按如下所示修改上一步中的代码：\n\n```\n<?php echo basename($_SERVER['SCRIPT_FILENAME']);\n\
  ```\n\n5.  保存`get_filename.php`，然后点击浏览器中的“重新加载”按钮。现在你应该只看到文件名：`get_filename.php`。\n\
  \nPHP 内置函数 `basename()` 接收一个文件路径作为参数，并提取出文件名。那么，你就得到了当前页面的文件名查找方法。\n\n6.  按如下所示修改`menu.php`中的代码（更改处以**粗体**突出显示）：\n\
  \n```\n>Home\n>Blog\n>Gallery\n>Contact\n```\n\n**提示**\n我在`here`周围使用了双引号，因此将字符串`'id=\"\
  here\"'`包裹在单引号中。这样比 `\"id=\\\"here\\\"\"`更易读。\n\n1.  保存`menu.php`，并在浏览器中加载`index.php`。菜单看起来应该和之前没有区别。使用菜单导航到其他页面。这次，如图\
  \ 5-5 所示，当前页面旁边的边框应为白色，指示你在网站中的位置。如果你在浏览器中检查页面的源代码视图，会看到`here` ID 已自动插入到正确的链接中。\n\
  \n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig5_HTML.jpg](img/332054_4_En_5_Fig5_HTML.jpg)\n\
  \n**图 5-5.** 包含文件中的条件代码为每个页面生成不同的输出。\n\n2.  如有必要，请将你的代码与`ch05`文件夹中的`menu_02.php`进行比较。\n\
  \n## PHP 解决方案 5-4：根据文件名自动生成页面标题\n\n本解决方案使用 `basename()` 提取文件名，然后使用 PHP 字符串函数格式化名称，以便插入到\
  \ `<title>` 标签中。它仅适用于能反映页面内容的文件名，但这本身也是一个好的实践。\n\n1.  创建一个名为 `title.php` 的新 PHP\
  \ 文件，并保存在 `includes` 文件夹中。\n\n2.  删除脚本编辑器插入的任何代码，并输入以下代码：\n\n```\n<?php $title =\
  \ basename($_SERVER['SCRIPT_FILENAME'], '.php');\n```\n\n**提示**\n不要在末尾添加 PHP 结束标签。当同一文件中\
  \ PHP 代码之后没有其他内容时，结束标签是可选的。省略结束标签有助于避免包含文件中常见的“headers already sent”错误。你将在 PHP 解决方案\
  \ 5-9 中了解更多关于此错误的信息。\n\nPHP 解决方案 5-3 中使用的 `basename()` 函数接受一个可选的第二个参数：一个包含文件名扩展名（前面带句点）的字符串。添加第二个参数会从文件名中去除扩展名。因此，这段代码提取文件名，去除\
  \ `.php` 扩展名，并将结果赋值给一个名为 `$title` 的变量。\n\n1.  打开 `contact.php`，并通过在 `DOCTYPE` 上方输入以下内容来包含\
  \ `title.php`：\n\n**注意**\n通常情况下，网页中的 `DOCTYPE` 声明之前不应有任何内容。但是，这不适用于 PHP 代码，只要它不向浏览器发送任何输出。`title.php`\
  \ 中的代码仅将值赋给 `$title`，因此 `DOCTYPE` 声明仍然是浏览器看到的第一个输出。\n\n1.  按如下所示修改 `<title>` 标签：\n\
  \n```\nJapan Journey \n```\n\n注意，在简写的 PHP 开放标签之前有一个空格。如果没有这个空格，`$title` 的值将会紧挨着“Journey”。\n\
  \n2.  保存两个页面，并在浏览器中加载 `contact.php`。不带 `.php` 扩展名的文件名已添加到浏览器标签中，如图 5-6 所示。\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig6_HTML.jpg](img/332054_4_En_5_Fig6_HTML.jpg)\n\
  \n**图 5-6.** 一旦提取出文件名，你就可以动态生成页面标题。\n\n3.  如果你希望从文件名派生的标题部分首字母大写呢？PHP 有一个名为 `ucfirst()`\
  \ 的简洁小函数，它正好能做到这一点（`uc` 代表“大写”）。在第 2 步的代码中添加另一行，如下所示：\n\n```\n<?php\n$title = basename($_SERVER['SCRIPT_FILENAME'],\
  \ '.php');\n$title = ucfirst($title);\n```\n\n如果你是编程新手，这可能会让你感到困惑，所以让我们来看看这里发生了什么。PHP\
  \ 标签之后的第一行代码获取文件名，去除末尾的 `.php`，并将其存储为 `$title`。下一行将 `$title` 的值传递给 `ucfirst()` 以将首字母大写，并将结果存回\
  \ `$title`。因此，如果文件名是 `contact.php`，`$title` 最初为 `contact`，但在下一行结束时，它变成了 `Contact`。\n\
  \n**提示**\n你可以将两行代码合并为一行来缩短代码，如下所示：`$title = ucfirst(basename($_SERVER['SCRIPT_FILENAME'],\
  \ '.php'));`。像这样嵌套函数时，PHP 会先处理最内层的函数，并将结果传递给外层函数。这使你的代码更短，但不太容易阅读。\n\n1.  这种技术的一个缺点是文件名只能包含一个单词——至少应该如此。URL\
  \ 中不允许有空格，这就是为什么一些网页设计软件或浏览器会用 `%20` 替换空格，这在 URL 中看起来丑陋且不专业。你可以通过使用下划线来解决这个问题。\n\
  \n将 `contact.php` 的文件名更改为 `contact_us.php`。\n\n2.  按如下所示修改 `title.php` 中的代码：\n\n\
  ```\n<?php\n$title = basename($_SERVER['SCRIPT_FILENAME'], '.php');\n$title = str_replace('_',\
  \ ' ', $title);\n$title = ucwords($title);\n```\n\n中间一行使用了一个名为 `str_replace()` 的函数来查找每个下划线并将其替换为空格。该函数接受三个参数：你想要替换的字符、替换字符以及你想要更改的字符串。\n\
  \n**提示**\n你也可以使用 `str_replace()` 并通过将空字符串（一对中间没有任何内容的引号）作为第二个参数来移除字符。这会将第一个参数中的字符串替换为空，从而有效地将其移除。\n\
  \n最后一行代码没有使用 `ucfirst()`，而是使用了相关的函数 `ucwords()`，该函数使每个单词的首字母大写。\n\n1.  保存 `title.php`，并在浏览器中加载重命名后的\
  \ `contact_us.php`。图 5-7 显示了结果。\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig7_HTML.jpg](img/332054_4_En_5_Fig7_HTML.jpg)\n\
  \n**图 5-7.** 下划线已被移除，并且两个单词的首字母都已大写。\n\n2.  将文件名改回 `contact.php`，并在浏览器中重新加载该文件。`title.php`\
  \ 中的脚本仍然有效。没有下划线需要替换，因此 `str_replace()` 保持 `$title` 的值不变，并且 `ucwords()` 将首字母转换为大写，即使只有一个单词也是如此。\n\
  \n3.  对 `index.php`、`blog.php` 和 `gallery.php` 重复步骤 3 和 4。\n\n4.  Japan Journey\
  \ 网站的主页名为 `index.php`。如图 5-8 所示，将当前解决方案应用于此页面似乎不太合适。\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig8_HTML.jpg](img/332054_4_En_5_Fig8_HTML.jpg)\n\
  \n**图 5-8.** 从 `index.php` 生成页面标题会产生不理想的结果。\n\n有两种解决方案：要么不对此类页面应用此技术，要么使用条件语句（`if`\
  \ 语句）来处理特殊情况。例如，要显示 Home 而不是 Index，请按如下所示修改 `title.php` 中的代码：\n\n```\n<?php\n$title\
  \ = basename($_SERVER['SCRIPT_FILENAME'], '.php');\n$title = str_replace('_', '\
  \ ', $title);\nif ($title == 'index') {\n    $title = 'home';\n}\n$title = ucwords($title);\n\
  ```\n\n\n  \n"
- "# PHP 条件语句与变量处理  \n\n条件语句的第一行使用两个等号检查`$title`的值。下一行使用单个等号将新值赋给`$title`。如果页面被调用的名称不是`index.php`，则花括号内的行将被忽略，`$title`保持其原始值。\
  \  \n\n## 提示  \nPHP 是区分大小写的，因此此解决方案仅在“index”全部为小写时有效。要进行不区分大小写的比较，请将前面代码的第四行修改为：`if\
  \ (strtolower($title) == 'index') {`。函数`strtolower()`将字符串转换为小写——因此得名——并常用于进行不区分大小写的比较。转换为小写不是永久性的，因为`strtolower($title)`没有赋值给变量；它仅用于进行比较。要永久更改，需要将结果赋值回变量，就像最后一行中`ucwords($title)`被赋值回`$title`一样。要将字符串转换为大写，请使用`strtoupper()`。\
  \  \n\n1.  保存`title.php`并在浏览器中重新加载`index.php`。页面标题现在看起来更自然，如图 5-9 所示。  \n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig9_HTML.jpg](img/332054_4_En_5_Fig9_HTML.jpg)\
  \  \n\n**图 5-9.** 条件语句将`index.php`上的标题更改为`Home`  \n\n2.  导航回`contact.php`，您会看到页面标题仍然从页面名称正确派生。\
  \  \n\n您可以将代码与`title.php`以及`ch05`文件夹中的`index_03.php`、`blog_02.php`、`gallery_02.php`和`contact_02.php`的更新版本进行对照检查。\
  \  \n\n## 注意事项  \n绝大多数 PHP 网站托管在 Linux 服务器上，这些服务器将文件和目录（文件夹）名称视为区分大小写。然而，在 Windows\
  \ 或 macOS 上本地开发时，文件和文件夹名称的处理方式不区分大小写。为避免在将文件部署到生产服务器时出现路径错误，我建议在命名文件和文件夹时仅使用小写。如果您想混合使用大小写，请确保拼写一致。\
  \  \n\n"
- "# PHP 解决方案 5-5：处理缺失的变量  \n\n在许多场景中，预期值可能会缺失。例如，您可能拼错了变量名，表单可能没有提交值，或者包含文件缺失。因此，在尝试使用外部来源的值之前，检查其是否存在是一个好策略。在本解决方案中，您将使用两种不同的方法处理此问题。\
  \  \n\n1.  继续使用与上一个解决方案相同的文件。或者，将`index_03.php`、`blog_02.php`、`gallery_02.php`和`contact_02.php`从`ch05`文件夹复制到您的站点根目录。同时确保`title.php`、`menu_02.php`和`footer_01.php`位于`includes`文件夹中。如果使用`ch05`文件夹中的文件，请从每个文件名中删除下划线和数字。\
  \  \n\n2.  在`index.php`中，将`<title>`标签中变量的首字母大写，从`$title`改为`$Title`。PHP 变量是区分大小写的，因此这不再引用`title.php`生成的值。\
  \  \n\n3.  保存文件，并在浏览器中加载`index.php`。右键单击查看源代码。如果您将`error_reporting`设置为第 2 章推荐的级别，您应该会看到如图\
  \ 5-10 所示的结果。浏览器选项卡包含来自 PHP 错误通知的原始 HTML，关于未定义变量。  \n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig10_HTML.jpg](img/332054_4_En_5_Fig10_HTML.jpg)\
  \  \n\n**图 5-10.** 拼错变量会生成一个错误通知，显示在浏览器选项卡中  \n\n4.  PHP 7 中的 null 合并运算符无缝处理了这种情况。像这样修改`<title>`标签中的\
  \ PHP 块：  \n\n5.  保存并重新加载页面。浏览器选项卡现在应该如下所示：  \n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Figc_HTML.jpg](img/332054_4_En_5_Figc_HTML.jpg)\
  \  \n\n未定义的变量被忽略，null 合并运算符后面的值被显示而不生成错误通知。  \n\n6.  删除引号之间的文本，留空字符串如下：  \n\n7.\
  \  再次保存并重新加载页面。这次，浏览器选项卡只显示 HTML 中的文本。空字符串简单地抑制了错误通知。  \n\n8.  通过将变量名首字母改为小写来更正变量名，并再次测试页面。现在它看起来与上一个\
  \ PHP 解决方案结束时相同（参见图 5-9）。  \n\n9.  null 合并运算符适用于在变量不存在时设置默认值；但如果要修改变量，则不能使用它。在这种情况下，您需要使用`isset()`函数来测试变量是否存在。\
  \  \n\n打开`blog.php`并按如下方式修改`<title>`标签：  \n\n```\nJapan Journey\n```\n\n请注意，HTML\
  \ 文本与开始 PHP 标签之间的空格已被移除。此外，开始 PHP 标签不再是简写形式，因为 PHP 块包含一个条件语句；它不仅仅是显示一个值。  \n\n`isset()`函数在变量存在时返回`true`。因此，如果`$title`已被定义，`echo`会显示一个包含长破折号（`&mdash;`是\
  \ HTML 字符实体）后跟`$title`值的双引号字符串。我将变量包裹在花括号中，因为实体和`$title`之间没有空格。这是可选的，但它使代码更易于阅读。\
  \  \n\n## 提示  \n`isset()`函数在值为空字符串时返回`true`。它检查变量是否已定义且不是`null`。使用`empty()`检查空字符串或零值。\
  \  \n\n1.  保存`blog.php`并在浏览器中测试。浏览器选项卡应如下所示：  \n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Figd_HTML.jpg](img/332054_4_En_5_Figd_HTML.jpg)\
  \  \n\n由于`$title`有值，`isset()`返回`true`并显示前面带长破折号的值。  \n\n2.  尝试使用未定义的变量，例如`$Title`。条件语句内的代码将被忽略而不会触发错误通知。\
  \  \n\n3.  使用`isset()`或 null 合并运算符来保护`gallery.php`和`contact.php`免受`<title>`标签中使用未定义变量的影响。\
  \  \n\n您可以将代码与`ch05`文件夹中的`index_04.php`、`blog_03.php`、`gallery_03.php`和`contact_03.php`进行对照检查。\
  \  \n\n"
- "# 创建内容变化的页面  \n\n到目前为止，您已经使用 PHP 根据页面的文件名生成不同的输出。接下来的两个解决方案生成独立于文件名变化的内容：每年 1 月\
  \ 1 日自动更新年份的版权声明和一个随机图像生成器。  \n\n"
- "# PHP 解决方案 5-6：自动更新版权声明  \n\n`footer.php`中的版权声明仅包含静态 HTML。本 PHP 解决方案展示了如何使用`date()`函数自动生成当前年份。该代码还指定了版权起始年份，并使用条件语句确定当前年份是否不同。如果是，则显示两个年份。\
  \  \n\n继续使用 PHP 解决方案 5-5 中的文件。或者，使用`ch05`文件夹中的`index_04.php`和`footer_01.php`，并从文件名中删除数字。如果使用`ch05`文件夹中的文件，请确保在`includes`文件夹中有`title.php`和`menu.php`的副本。\
  \  \n\n1.  打开`footer.php`。它包含以下 HTML：  \n\n\n\n```\n© 2006&ndash;2019 David Powers\n\
  ```\n\n使用包含文件的优势在于，只需修改这一个文件，就能更新整个网站的版权声明。不过，更高效的做法是让年份自动递增。\n\n2. PHP 的 `date()`\
  \ 函数可以很好地处理这个问题。像这样修改段落中的代码：\n\n```\n© 2006&ndash; David Powers\n```\n\n这会替换第二个日期，并用四位数字显示当前年份。请确保向\
  \ `date()` 传递大写的 `Y` 作为参数。\n\n**注意**  \n第 16 章中的表 [16-4](https://doi.org/10.1007/978-1-4842-4338-1_Table#16-4)\
  \ 列出了最常用的字符，这些字符可以传递给 `date()` 函数以显示日期部分，例如月份、星期几等。\n\n1. 保存 `footer.php` 并在浏览器中加载\
  \ `index.php`。页面底部的版权声明应该和之前一样——当然，除非你是在 2020 年或之后阅读本文，在这种情况下将会显示当前年份。\n\n2. 和大多数版权声明一样，这个声明涵盖了一个年份范围，表示网站的首次上线时间。由于第一个日期是过去的年份，可以硬编码。但如果你正在创建一个新网站，则只需要当前年份。直到\
  \ 1 月 1 日才需要显示年份范围。\n\n要显示年份范围，需要知道起始年份和当前年份。如果两个年份相同，只显示当前年份；如果不同，则显示两者并用短破折号连接。这是一个简单的\
  \ `if...else` 场景。像这样修改 `footer.php` 中段落里的代码：\n\n```\n© David Powers\n```\n\n与 PHP\
  \ 方案 5-5 一样，我在 `else` 子句中为变量使用了花括号，因为它们位于一个不含空格的**双引号字符串**中。\n\n3. 保存 `footer.php`\
  \ 并在浏览器中重新加载 `index.php`。版权声明应该和之前看起来一样。\n\n4. 将传递给 `date()` 函数的参数改为小写的 `y`，如下所示：\n\
  \n```\n$thisYear = date('y');\n```\n\n5. 保存 `footer.php` 并点击浏览器中的“重新加载”按钮。第二年将仅显示最后两位数字，如下图所示：\n\
  \n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fige_HTML.jpg](img/332054_4_En_5_Fige_HTML.jpg)\n\
  \n**提示**  \n这应该提醒我们 PHP 中大小写敏感的重要性。大写的 `Y` 和小写的 `y` 与 `date()` 函数结合会产生不同的结果。忘记大小写敏感是\
  \ PHP 中最常见的错误原因之一。\n\n1. 将传递给 `date()` 的参数改回大写的 `Y`。将 `$startYear` 的值设置为当前年份并重新加载页面。这一次，你应该只看到当前年份被显示出来。\n\
  \n现在你已经有了一个完全自动化的版权声明。完成的代码位于 `ch05` 文件夹的 `footer_02.php` 中。\n\n## PHP 方案 5-7：显示随机图片\n\
  \n显示随机图片只需要一个可用图片列表，存储在索引数组中（请参阅第 4 章中的“创建数组”）。由于索引数组从 0 开始编号，你可以通过生成一个介于 0 和数组长度减\
  \ 1 之间的随机数来选中其中一张图片。这一切只需几行代码即可完成……\n\n继续使用相同的文件。或者，使用 `ch05` 文件夹中的 `index_04.php`\
  \ 并将其重命名为 `index.php`。由于 `index_04.php` 使用了 `title.php`、`menu.php` 和 `footer.php`，请确保这三个文件都在你的\
  \ `includes` 文件夹中。图片已在 `images` 文件夹中。\n\n1. 在 `includes` 文件夹中创建一个空白 PHP 页面，并将其命名为\
  \ `random_image.php`。插入以下代码（该代码也位于 `ch05` 文件夹的 `random_image_01.php` 中）：\n\n```\n\
  <?php\n$images = ['kinkakuji', 'maiko', 'maiko_phone', 'monk', 'fountains',\n'ryoanji',\
  \ 'menu', 'basin'];\n$i = random_int(0, count($images)-1);\n$selectedImage = \"\
  images/{$images[$i]}.jpg\";\n```\n\n这是完整的脚本：一个包含图片名称（不含 `.jpg` 文件扩展名）的数组（无需重复共享信息——它们都是\
  \ JPEG 格式）、一个随机数生成器，以及一个为所选文件构建正确路径名的字符串。\n\n要在一个范围内生成随机数，请将最小值和最大值作为参数传递给 `random_int()`\
  \ 函数。由于数组中有八张图片，你需要一个介于 0 和 7 之间的数字。简单的方法是使用 `random_int(0, 7)`——简单，但效率低下。每次更改 `$images`\
  \ 数组时，你都需要数一数它包含多少个元素，并更改传递给 `random_int()` 的最大数字。\n\n使用 PHP 的 `count()` 函数为你完成这项工作要容易得多，该函数会计算数组中的元素数量。你需要一个比数组中元素数量少\
  \ 1 的数字，因此传递给 `random_int()` 的第二个参数变为 `count($images)-1`，并将结果存储在 `$i` 中。\n\n在最后一行中，随机数被用来为所选文件构建正确的路径名。变量\
  \ `$images[$i]` 被嵌入到一个**双引号字符串**中，且与周围字符之间没有空格分隔，因此它被括在花括号中。数组从 0 开始，所以如果随机数是 1，`$selectedImage`\
  \ 就是 `images/maiko.jpg`。\n\n如果你是 PHP 新手，可能会觉得理解这样的代码有困难：\n\n```\n$i = random_int(0,\
  \ count($images)-1);\n```\n\n实际上，传递给 `random_int()` 的第二个参数是一个表达式，而不是一个数字。如果这样能让你更容易理解，可以将代码重写如下：\n\
  \n```\n$numImages = count($images); // $numImages 是 8\n$max = $numImages – 1;  \
  \     // $max 是 7\n$i = random_int(0, $max);    // $i = random_int(0, 7)\n```\n\n\
  2. 打开 `index.php`，通过在与 `title.php` 相同的代码块中插入命令来包含 `random_image.php`，如下所示：\n\n```\n\
  由于 `random_image.php` 不会向浏览器发送任何直接输出，将其放在 `DOCTYPE` 之上是安全的。\n```\n\n3. 向下滚动到 `index.php`\
  \ 内部，找到在 figure 元素中显示图片的代码。它看起来像这样：\n\n```\n<img src=\"images/basin.jpg\" alt=\"\
  龙安寺水钵\" width=\"360\" height=\"240\" class=\"picBorder\">\n<figcaption>龙安寺水钵</figcaption>\n\
  ```\n\n4. 不再使用固定的 `images/basin.jpg` 作为图片，而是将其替换为 `$selectedImage`。所有图片都有不同的尺寸，因此删除\
  \ `width` 和 `height` 属性，并使用一个通用的 `alt` 属性。同时删除 `figcaption` 元素中的文本。步骤 3 中的代码现在应该看起来像这样：\n\
  \n```\n<img src=\"<?= $selectedImage ?>\" alt=\"随机图片\" class=\"picBorder\">\n```\n\
  \n**注意**  \n这个 PHP 块只显示一个值，因此你可以使用简短的 `echo` 标签 `<?=`。\n\n1. 同时保存 `random_image.php`\
  \ 和 `index.php`，然后在浏览器中加载 `index.php`。现在图片应该是随机选择的。点击浏览器中的“重新加载”按钮；你应该会看到各种不同的图片，如图\
  \ 5-11 所示。\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig11_HTML.jpg](img/332054_4_En_5_Fig11_HTML.jpg)\n\
  \n**图 5-11.** 将图片文件名存储在索引数组中使得显示随机图片变得容易\n\n你可以对照 `ch05` 文件夹中的 `index_05.php` 和\
  \ `random_image_01.php` 来检查你的代码。这是一种简单而有效的显示随机图片的方式，但如果能够动态地为不同大小的图片设置宽度和高度，并且添加描述图片的标题，效果会更好。\n\
  \n\n\n\n### PHP 解决方案 5-8：为随机图像添加说明文字\n\n此解决方案使用多维数组（即数组的数组）来存储每张图像的文件名和说明文字。如果你觉得从抽象角度理解多维数组概念有困难，可以把它想象成一个大盒子，里面有许多信封，每个信封里装着一张照片及其说明。盒子就是顶层数组，里面的信封就是子数组。\n\
  \n这些图像尺寸各不相同，但 PHP 恰好提供了一个名为 `getimagesize()` 的函数。猜猜它是做什么的。\n\n此 PHP 解决方案基于前一个方案，因此请继续使用相同的文件。\n\
  \n1. 打开 `random_image.php` 并将代码修改如下：\n\n```\n'kinkakuji',\n    'caption' => '京都金阁寺'],\n\
  \    ['file'    => 'maiko',\n    'caption' => '舞伎——京都的见习艺伎'],\n    ['file'    =>\
  \ 'maiko_phone',\n    'caption' => '每个舞伎都应该有一部——当然是手机'],\n    ['file'    => 'monk',\n\
  \    'caption' => '在京都化缘的僧侣'],\n    ['file'    => 'fountains',\n    'caption' =>\
  \ '东京市中心的喷泉'],\n    ['file'    => 'ryoanji',\n    'caption' => '京都龙安寺的秋叶'],\n  \
  \  ['file'    => 'menu',\n    'caption' => '京都先斗町餐厅外的菜单'],\n    ['file'    => 'basin',\n\
  \    'caption' => '京都龙安寺的水钵']\n    ];\n    $i = random_int(0, count($images)-1);\n\
  \    $selectedImage = \"images/{$images[$i]['file']}.jpg\";\n    $caption = $images[$i]['caption'];\n\
  ```\n\n**注意**  \n你需要注意代码的编写。每个子数组用一对方括号括起来，后面跟一个逗号，用于与下一个子数组分隔。如果像示例所示对齐数组键和值，你会发现构建和维护多维数组更容易。\n\
  \n虽然代码看起来复杂，但它只是一个包含八个元素的普通索引数组，每个元素都是一个包含 `'file'` 和 `'caption'` 定义的关联数组。多维数组的定义构成了一条单一语句，因此在第\
  \ 19 行之前没有分号。该行的右括号与第 2 行的左括号匹配。\n\n用于选择图像的变量也需要更改，因为 `$images[$i]` 不再包含字符串，而是包含一个数组。要获取正确的图像文件名，你需要使用\
  \ `$images[$i]['file']`。所选图像的说明文字包含在 `$images[$i]['caption']` 中，并存储在一个较短的变量中。\n\n\
  2. 现在你需要修改 `index.php` 中的代码来显示说明文字，如下所示：\n\n```\n\" alt=\"随机图片\" class=\"picBorder\"\
  >\n```\n\n3. 保存 `index.php` 和 `random_image.php`，并在浏览器中加载 `index.php`。大多数图像看起来正常，但持有手机的见习艺伎图像的右侧有一个难看的空白区域，如图\
  \ 5-12 所示。\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig12_HTML.jpg](img/332054_4_En_5_Fig12_HTML.jpg)\n\
  \n**图 5-12.** 长说明文字超出了图像范围，并将其过度左移\n\n4. 在 `random_image.php` 末尾添加以下代码：\n\n```\n\
  if (file_exists($selectedImage) && is_readable($selectedImage)) {\n    $imageSize\
  \ = getimagesize($selectedImage);\n}\n```\n\n`if` 语句使用了两个函数 `file_exists()` 和 `is_readable()`，以确保\
  \ `$selectedImage` 不仅存在，而且可访问（它可能已损坏或权限不正确）。这些函数返回布尔值（`true` 或 `false`），因此可以直接用作条件语句的一部分。\n\
  \n`if` 语句内的单行代码使用了 `getimagesize()` 函数，该函数返回一个包含图像信息的数组，并存储为 `$imageSize`。你将在第 10\
  \ 章了解更多关于 `getimagesize()` 的内容。目前，你感兴趣的是以下两条信息：\n\n- `$imageSize[0]`：图像的宽度（像素）\n\
  - `$imageSize[3]`：包含图像高度和宽度信息的字符串，格式化为 `<img>` 标签的属性\n\n5. 首先，让我们修复 `<img>` 标签中的代码。按如下方式更改：\n\
  \n```\n\" alt=\"随机图片\" class=\"picBorder\" >\n```\n\n这将在 `<img>` 标签内插入正确的 `width`\
  \ 和 `height` 属性。\n\n6. 尽管这设置了图像的尺寸，你仍然需要控制说明文字的宽度。你无法在外部样式表中使用 PHP，但没有什么可以阻止你在 `index.php`\
  \ 的 `<head>` 中创建一个 `<style>` 块。在结束的 `</head>` 标签之前插入以下代码：\n\n```\nfigcaption {\n\
  \    width: px;\n}\n```\n\n这段代码只有七行简短代码，但它是一个 PHP 和 HTML 的奇特混合体。让我们从第一行和最后一行开始。如果你去掉\
  \ PHP 标签并用注释替换 HTML `<style>` 块，得到的结果是：\n\n```\nif (isset($imageSize)) {\n    //\
  \ 如果 $imageSize 已设置，则执行某些操作\n}\n```\n\n换句话说，如果变量 `$imageSize` 尚未设置（定义），PHP 引擎会忽略大括号之间的所有内容。大括号之间的代码大部分是\
  \ HTML 和 CSS，这无关紧要。如果 `$imageSize` 尚未设置，PHP 引擎会跳转到右大括号，并且中间的代码不会发送到浏览器。\n\n**提示**\
  \  \n许多经验不足的 PHP 程序员错误地认为，在条件语句中需要使用 `echo` 或 `print` 来生成 HTML 输出。只要开闭大括号匹配，你就可以像这样使用\
  \ PHP 来隐藏或显示 HTML 部分。这比总是使用 `echo` 要整洁得多，而且输入量也更少。\n\n如果 `$imageSize` 已设置，则会创建 `<style>`\
  \ 块，并使用 `$imageSize[0]` 为包含说明文字的段落设置正确的宽度。\n\n7. 保存 `random_image.php` 和 `index.php`，然后在浏览器中重新加载\
  \ `index.php`。点击“重新加载”按钮，直到手持手机的见习艺伎图像出现。这次，它应该看起来像图 5-13。如果你查看浏览器的源代码，样式规则使用了正确的图像宽度。\n\
  \n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig13_HTML.jpg](img/332054_4_En_5_Fig13_HTML.jpg)\n\
  \n**图 5-13.** 通过创建与图像尺寸直接相关的样式规则，消除了难看的空白区域\n\n**注意**  \n如果说明文字仍然突出，请确保 `<style>`\
  \ 块中结束的 PHP 标签与 `px` 之间没有空格。CSS 不允许在值和度量单位之间存在空白。\n\n8. `random_image.php` 中的代码以及你刚刚插入的代码，可以在所选图像找不到时防止错误，但显示图像的代码缺少类似的检查。临时更改其中一个图像的名称（无论是在\
  \ `random_image.php` 中还是在 `images` 文件夹中）。多次重新加载 `index.php`。最终，你应该会看到如图 5-14 所示的错误信息。这看起来非常不专业。\n\
  \n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig14_HTML.jpg](img/332054_4_En_5_Fig14_HTML.jpg)\n\
  \n**图 5-14.** 包含文件中的错误可能会破坏页面的外观\n\n\n\n2. `random_image.php` 底部的条件语句仅在所选图像既存在又可读时才设置\
  \ `$imageSize`，因此如果 `$imageSize` 已被设置，就表示一切就绪。请在 `index.php` 中显示图像的 `<figure>` 元素周围添加条件语句的起始和结束标记，如下所示：\n\
  \n```\n<img src=\"images/<?= $selectedImage ?>.jpg\"\n     alt=\"随机图片\" class=\"\
  picBorder\">\n```\n\n存在的图像会正常显示，但若文件缺失或损坏，你将避免任何令人尴尬的错误信息——这会让页面看起来更专业。别忘了恢复你在上一步中修改的图像名称。\n\
  \n你可以将代码与 `ch05` 文件夹中的 `index_06.php` 和 `random_image_02.php` 进行对照检查。\n\n## 使用包含文件预防错误\n\
  \n许多托管公司会关闭针对通知类问题的错误报告，因此如果你只在远程服务器上进行测试，可能根本察觉不到图 5-14 所示的问题。然而，在将 PHP 页面部署到互联网之前，消除所有错误至关重要。仅仅因为你看不到错误信息，并不意味着你的页面没有问题。\n\
  \n使用 PHP 等服务器端技术的页面会处理大量未知因素，因此明智的做法是进行防御性编码，在使用值之前先进行检查。本节介绍了一些措施，你可以用来预防和排查包含文件相关的错误。\n\
  \n### 检查变量是否存在\n\n从 PHP 解决方案 5-5 和 5-8 中可以得出的经验是：你应该始终使用空合并运算符来设置默认值，或者使用 `isset()`\
  \ 来验证来自包含文件的变量是否存在，并将所有依赖该变量的代码包裹在条件语句中。你还可以将 `isset()` 与逻辑非运算符（参见第 4 章表 4-7）结合使用来分配默认值，如下所示：\n\
  \n```\nif (!isset($someVariable)) {\n    $someVariable = 默认值;\n}\n```\n\n你可能会在很多脚本中看到这种设置默认值的结构，因为空合并运算符是从\
  \ 2015 年 12 月发布的 PHP 7.0 才开始可用的。两者并没有好坏之分；但空合并运算符能让代码更简洁。\n\n### 检查函数或类是否已定义\n\n\
  包含文件常用于定义自定义函数或类。尝试使用一个尚未定义的函数或类会触发致命错误。要检查函数是否已定义，请将函数名作为字符串传递给 `function_exists()`。在将函数名传递给\
  \ `function_exists()` 时，记得省略函数名末尾的括号。例如，检查一个名为 `doubleIt()` 的函数是否已定义，可以这样做：\n\n\
  ```\nif (function_exists('doubleIt')) {\n    // 使用 doubleIt()\n}\n```\n\n要检查类是否已定义，可以用同样的方式使用\
  \ `class_exists()`，将包含类名的字符串作为参数传递：\n\n```\nif (class_exists('MyClass')) {\n   \
  \ // 使用 MyClass\n}\n```\n\n假设你想使用某个函数或类，一种更实用的方法是：如果该函数或类尚未定义，则使用条件语句来包含其定义文件。例如，如果\
  \ `doubleIt()` 的定义位于名为 `utilities.php` 的文件中：\n\n```\nif (!function_exists('doubleIt'))\
  \ {\n    require_once './includes/utilities.php';\n}\n```\n\n## 在线上网站中抑制错误信息\n\n\
  假设你的包含文件在远程服务器上运行正常，那么前面几节概述的措施可能已经涵盖了所有你需要的错误检查。然而，如果你的远程服务器会显示错误信息，你应该采取措施将其抑制。以下技术会隐藏所有错误信息，而不仅仅是那些与包含文件相关的。\n\
  \n### 使用错误控制运算符\n\n一种比较粗糙但有效的方法是使用 PHP 的错误控制运算符（`@`），它可以抑制与该行代码相关的错误信息。你可以将 `@`\
  \ 放在行首，或者直接放在你认为可能产生错误的函数或命令前面，就像这样：\n\n```\n@ include './includes/random_image.php';\n\
  ```\n\n错误控制运算符的问题在于，它会隐藏错误而不是绕过错误。它只是一个字符，所以很容易忘记你已经使用了它。结果，你可能会浪费大量时间在脚本的错误部分寻找错误。如果你使用了错误控制运算符，在排查问题时，`@`\
  \ 标记应该是你移除的第一个东西。另一个缺点是，你需要在每一个可能产生错误信息的行上都使用错误控制运算符，因为它只影响当前行。\n\n### 在 PHP 配置中关闭\
  \ `display_errors`\n\n在线上网站中抑制错误信息的一个更好的方法，是在 Web 服务器的配置中关闭 `display_errors` 指令。如果您的托管公司允许您控制其设置，最有效的方法是编辑\
  \ `php.ini`。找到 `display_errors` 指令，将 `On` 改为 `Off`。\n\n如果你无法控制 `php.ini`，许多托管公司允许你使用名为\
  \ `.htaccess` 或 `.user.ini` 的文件更改有限的配置设置。选择哪种文件取决于 PHP 在服务器上的安装方式，因此请咨询你的托管公司以确定使用哪种。\n\
  \n如果你的服务器支持 `.htaccess` 文件，请在服务器根目录的 `.htaccess` 文件中添加以下命令：\n\n```\nphp_flag display_errors\
  \ Off\n```\n\n在 `.user.ini` 文件中，命令则简单地写为：\n\n```\ndisplay_errors Off\n```\n\n`.htaccess`\
  \ 和 `.user.ini` 都是纯文本文件。与 `php.ini` 类似，每个命令应单独占一行。如果远程服务器上不存在该文件，你可以直接在文本编辑器中创建它。确保你的编辑器不会自动在文件名末尾添加\
  \ `.txt`。然后，将该文件上传到你网站的服务器根目录。\n\n> **提示：** 默认情况下，macOS 会隐藏以点开头的文件。在 macOS Sierra\
  \ 及更高版本中，使用键盘快捷键 Cmd+Shift+. (点) 来切换隐藏文件的显示和隐藏。\n\n### 在单个文件中关闭 `display_errors`\n\
  \n如果你无法控制服务器配置，可以通过在任何脚本的顶部添加以下行来防止显示错误信息：\n\n```\nini_set('display_errors', 'Off');\n\
  ```\n\n## PHP 解决方案 5-9：当找不到包含文件时进行重定向\n\n到目前为止建议的所有技术，都只是在找不到包含文件时抑制错误信息。如果缺少包含文件会导致页面没有意义，那么你应该在包含文件缺失时将用户重定向到一个错误页面。\n\
  \n一种实现方法是抛出异常，就像这样：\n\n```\n$file = './includes/menu.php';\nif (file_exists($file)\
  \ && is_readable($file)) {\n    include $file;\n} else {\n    throw new Exception(\"\
  $file 找不到\");\n}\n```\n\n当使用可能抛出异常的代码时，你需要将其包裹在 `try` 代码块中，并创建一个 `catch` 代码块来处理异常（参见第\
  \ 4 章的“处理错误和异常”）。此 PHP 解决方案展示了如何做到这一点，即在找不到包含文件时，使用 `catch` 代码块将用户重定向到另一个页面。\n\n\
  如果你已经对网站进行了全面设计和测试，那么在大多数使用包含文件的页面上，此技术并不是必需的。然而，下面的 PHP 解决方案绝非无意义的练习。它演示了 PHP 的几个重要特性：如何抛出和捕获异常，以及如何重定向到另一个页面。正如你将从以下说明中看到的，重定向并非总是那么简单。这个\
  \ PHP 解决方案展示了如何克服最常见的问题。\n\n\n\n接续使用 PHP 解决方案 5-8 中的 `index.php`，或者使用 `ch05` 文件夹中的\
  \ `index_06.php`。\n\n1.  将 `error.php` 从 `ch05` 文件夹复制到站点根目录。如果编辑程序提示更新页面中的链接，请不要更新。这是一个包含通用错误消息和指向其他页面链接的静态页面。\n\
  \n2.  在编辑程序中打开 `index.php`。导航菜单是最不可或缺的包含文件，因此请像这样编辑 `index.php` 中的 `require` 命令：\n\
  \n```\n    $file = './includes/menu.php';\n    if (file_exists($file) && is_readable($file))\
  \ {\n    require $file;\n    } else {\n    throw new Exception(\"$file can't be\
  \ found\");\n    }\n    ```\n\n提示\n将包含文件的路径存储在一个变量中，例如上述代码，可以避免重复输入四次，从而减少拼写错误的可能性。\n\
  \n3.  要将用户重定向到另一个页面，请使用 `header()` 函数。除非存在语法错误，否则 PHP 引擎通常从页面顶部开始处理，输出 HTML，直到遇到问题。这意味着当\
  \ PHP 引擎执行到此代码时，输出可能已经开始。为防止这种情况发生，请在生成任何输出之前启动 `try` 块。（这在许多设置上可能不起作用，但请耐心阅读，因为它演示了一个重要的观点。）\n\
