    ![A978-1-4842-0635-5_13_Fig3_HTML.jpg](A978-1-4842-0635-5_13_Fig3_HTML.jpg)


    Figure 13-3.


    The primary key keeps track of a record during the update process


    The primary key is stored in a hidden field in the update form. After you have
    edited the record in the update page, you submit the form using the `post` method
    to pass all the details, including the primary key, to an `UPDATE` command.


    The basic syntax of the SQL `UPDATE` command looks like this:


    `UPDATE` `table_name` `SET` `column_name` `=` `value` `,` `column_name` `=` `value`


    `WHERE` `condition`


    The condition when updating a specific record is the primary key. So, when updating
    `article_id 3` in the `blog` table, the basic `UPDATE` query looks like this:


    `UPDATE blog SET title =` `value` `, article =` `value`


    `WHERE article_id = 3`


    Although the basic principle is the same for both MySQLi and PDO, the code differs
    sufficiently to warrant separate instructions.'
  trans: "\n#### PHP 解决方案 13-3：创建指向更新和删除页面的链接\n\n本 PHP 解决方案演示了如何创建一个页面来管理 `blog` 表中的记录，具体方法为显示所有记录的列表并链接到更新和删除页面。MySQLi\
    \ 和 PDO 版本之间仅存在细微差异，因此本说明将同时介绍两者。\n\n将 `blog_list_mysqli_01.php` 或 `blog_list_pdo_01.php`\
    \ 复制到 `admin` 文件夹，并根据您计划使用的连接方式，将其另存为 `blog_list_mysqli.php` 或 `blog_list_pdo.php`。不同版本会链接到相应的插入、更新和删除文件。\n\
    \n您需要连接到数据库并创建 SQL 查询。在 `DOCTYPE` 声明上方的 PHP 代码块中添加以下代码：\n\n```\nrequire_once '../includes/connection.php';\n\
    \n// 创建数据库连接\n\n$conn = dbConnect('read');\n\n$sql = 'SELECT * FROM blog ORDER\
    \ BY created DESC';\n```\n\n如果您使用的是 PDO，请在 `dbConnect()` 中添加 `'pdo'` 作为第二个参数。\n\
    \n通过添加以下代码（位于闭合 PHP 标签之前）来提交查询。\n\n对于 MySQLi，请使用以下代码：\n\n```\n$result = $conn->query($sql);\n\
    \nif (!$result) {\n    $error = $conn->error;\n}\n```\n\n对于 PDO，请使用以下代码：\n\n```\n\
    $result = $conn->query($sql);\n\n$errorInfo = $conn->errorInfo();\n\nif (isset($errorInfo[2]))\
    \ {\n    $error = $errorInfo[2];\n}\n```\n\n在表格前添加一个条件语句以显示任何错误信息，并将表格包裹在 `else`\
    \ 代码块中。表格前的代码如下所示：\n\n```\n<?php if (isset($error)) {\n    echo \"<p>$error</p>\"\
    ;\n} else { ?>\n```\n\n闭合花括号应位于结束的 `</table>` 标签之后，并放入一个单独的 PHP 代码块中。\n\n现在，您需要将第二行表格包裹在一个循环中，并从结果集中检索每条记录。以下代码应放在第一行的闭合\
    \ `</tr>` 标签与第二行的开始 `<tr>` 标签之间。\n\n对于 MySQLi，请使用以下代码：\n\n```\n</tr>\n<?php while($row\
    \ = $result->fetch_assoc()) { ?>\n<tr>\n```\n\n对于 PDO，请使用以下代码：\n\n```\n</tr>\n\
    <?php while ($row = $result->fetch()) { ?>\n<tr>\n```\n\n这与前一章相同，因此无需解释。\n\n在第二行的前两个单元格中显示当前记录的\
    \ `created` 和 `title` 字段，如下所示：\n\n```\n<td><?= $row['created']; ?></td>\n<td><?=\
    \ $row['title']; ?></td>\n```\n\n在接下来的两个单元格中，将当前记录的查询字符串和 `article_id` 字段的值添加到两个\
    \ URL 中，如下所示（虽然链接不同，但高亮显示的代码对于 PDO 版本是相同的）：\n\n```\n<td><a href=\"blog_update_mysqli.php?article_id=<?=\
    \ $row['article_id']; ?>\">编辑</a></td>\n<td><a href=\"blog_delete_mysqli.php?article_id=<?=\
    \ $row['article_id']; ?>\">删除</a></td>\n```\n\n这里所做的是将 `?article_id=` 添加到 URL\
    \ 中，然后使用 PHP 显示 `$row['article_id']` 的值。重要的是不要留下任何可能破坏 URL 或查询字符串的空格。在 PHP 处理完毕后，在浏览器中查看页面源代码时，开始的\
    \ `<a>` 标签应如下所示（尽管数字会根据记录而变化）：\n\n```\n<a href=\"blog_update_mysqli.php?article_id=2\"\
    >\n```\n\n最后，使用一个花括号闭合包裹第二行表格的循环，如下所示：\n\n```\n</tr>\n<?php } ?>\n</table>\n```\n\
    \n保存 `blog_list_mysqli.php` 或 `blog_list_pdo.php` 并在浏览器中加载该页面。假设您已经将 `blog.sql`\
    \ 的内容加载到 `phpsols` 数据库中，您应该会看到一个包含四个项目的列表，如图 13-2 所示。现在您可以测试 `blog_insert_mysqli.php`\
    \ 或 `blog_insert_pdo.php`。插入项目后，您应该会被重定向到相应版本的 `blog_list.php`，并且创建日期和时间以及新项目的标题应显示在列表顶部。如果遇到任何问题，请将您的代码与\
    \ `ch13` 文件夹中的版本进行对比。\n\n**提示：** 此代码假定表中始终存在一些记录。作为练习，请使用 PHP 解决方案 11-2（MySQLi）或\
    \ 11-4（PDO）中的技术来统计结果数量，并使用条件语句在没有找到记录时显示一条消息。解决方案在 `blog_list_norec_mysqli.php`\
    \ 和 `blog_list_norec_pdo.php` 中。\n\n### 更新记录\n\n更新页面需要执行两个单独的过程，如下所示：\n\n- 检索选定的记录，并将其显示以进行编辑\n\
    - 在数据库中更新编辑后的记录\n\n第一阶段使用 `$_GET` 超全局数组从 URL 中检索主键，然后使用它在更新表单中选择并显示该记录，如图 13-3\
    \ 所示。\n\n![A978-1-4842-0635-5_13_Fig3_HTML.jpg](img/A978-1-4842-0635-5_13_Fig3_HTML.jpg)\n\
    \n图 13-3. 主键在更新过程中跟踪记录\n\n主键存储在更新表单的一个隐藏字段中。在更新页面中编辑记录后，您使用 `post` 方法提交表单，将所有详细信息（包括主键）传递给一个\
    \ `UPDATE` 命令。\n\nSQL `UPDATE` 命令的基本语法如下所示：\n\n```\nUPDATE table_name SET column_name\
    \ = value, column_name = value\nWHERE condition\n```\n\n更新特定记录时的条件是主键。因此，在更新 `blog`\
    \ 表中的 `article_id 3` 时，基本的 `UPDATE` 查询如下所示：\n\n```\nUPDATE blog SET title = value,\
    \ article = value\nWHERE article_id = 3\n```\n\n虽然 MySQLi 和 PDO 的基本原理相同，但代码差异足以需要提供单独的说明。\n"
- fmt: "# PHP Solution 13-4: Updating a Record with MySQLi\n\nThis PHP solution shows\
    \ how to load an existing record into the update form and then send the edited\
    \ details to the database for updating using MySQLi. To load the record, you need\
    \ to have created the management page that lists all records, as described in\
    \ PHP Solution 13-3.\n\nCopy `blog_update_mysqli_01.php` from the `ch13` folder\
    \ and save it in the `admin` folder as `blog_update_mysqli.php`. The first stage\
    \ involves retrieving the details of the record that you want to update. Put the\
    \ following code in a PHP block above the `DOCTYPE` declaration:\n\n```php\nrequire_once\
    \ '../includes/connection.php';\n\n// initialize flags\n$OK = false;\n$done =\
    \ false;\n\n// create database connection\n$conn = dbConnect('write');\n\n// initialize\
    \ statement\n$stmt = $conn->stmt_init();\n\n// get details of selected record\n\
    if (isset($_GET['article_id']) && !$_POST) {\n    // prepare SQL query\n    $sql\
    \ = 'SELECT article_id, title, article\n            FROM blog WHERE article_id\
    \ = ?';\n    if ($stmt->prepare($sql)) {\n        // bind the query parameter\n\
    \        $stmt->bind_param('i', $_GET['article_id']);\n        // execute the\
    \ query, and fetch the result\n        $OK = $stmt->execute();\n        // bind\
    \ the results to variables\n        $stmt->bind_result($article_id, $title, $article);\n\
    \        $stmt->fetch();\n    }\n}\n\n// redirect if $_GET['article_id'] not defined\n\
    if (!isset($_GET['article_id'])) {\n    header('Location: http://localhost/phpsols/admin/blog_list_mysqli.php');\n\
    \    exit;\n}\n\n// get error message if query fails\nif (isset($stmt) && !$OK\
    \ && !$done) {\n    $error = $stmt->error;\n}\n```\n\nAlthough this is very similar\
    \ to the code used for the insert page, the first few lines are outside the conditional\
    \ statements. Both stages of the update process require the database connection\
    \ and a prepared statement, so this avoids the need to duplicate the same code\
    \ later. Two flags are initialized: `$OK` to check the success of retrieving the\
    \ record, and `$done` to check whether the update succeeds.\n\nThe first conditional\
    \ statement makes sure that `$_GET['article_id']` exists and that the `$_POST`\
    \ array is empty. So the code inside the braces is executed only when the query\
    \ string is set, but the form hasn’t been submitted.\n\nYou prepare the `SELECT`\
    \ query in the same way as for an `INSERT` command, using a question mark as a\
    \ placeholder for the variable. However, note that instead of using an asterisk\
    \ to retrieve all columns, the query specifies three columns by name like this:\n\
    \n```sql\n$sql = 'SELECT article_id, title, article\n        FROM blog WHERE article_id\
    \ = ?';\n```\n\nThis is because a MySQLi prepared statement lets you bind the\
    \ result of a `SELECT` query to variables, and to be able to do this, you must\
    \ specify the column names and the order you want them to be in.\n\nFirst, you\
    \ need to initialize the prepared statement and bind `$_GET['article_id']` to\
    \ the query with `$stmt->bind_param()`. Because the value of `article_id` must\
    \ be an integer, you pass `'i'` as the first argument.\n\nThe code executes the\
    \ query, and then binds the result to variables in the same order as the columns\
    \ specified in the `SELECT` query before fetching the result.\n\nThe next conditional\
    \ statement redirects the page to `blog_list_mysqli.php` if `$_GET['article_id']`\
    \ hasn’t been defined. This prevents anyone from trying to load the update page\
    \ directly in a browser.\n\nThe final conditional statement stores an error message\
    \ if the prepared statement has been created but both `$OK` and `$done` remain\
    \ `false`. You haven’t added the update script yet, but if the record is retrieved\
    \ or updated successfully, one of them will be switched to `true`. So if both\
    \ remain `false`, you know there was something wrong with one of the SQL queries.\n\
    \nNow that you have retrieved the contents of the record, you need to display\
    \ them in the update form. If the prepared statement succeeded, `$article_id`\
    \ should contain the primary key of the record to be updated, because it’s one\
    \ of the variables you bound to the result set with the `bind_result()` method.\n\
    \nHowever, if there’s an error you need to display the message onscreen. But if\
    \ someone alters the query string to an invalid number, `$article_id` will be\
    \ set to `0`, so there is no point in displaying the update form. Add the following\
    \ conditional statements immediately before the opening `<form>` tag:\n\n```php\n\
    <p><a href=\"blog_list_mysqli.php\">List all entries </a></p>\n\n<?php if (isset($error))\
    \ {\n    echo \"<p class='warning'>Error: $error</p>\";\n}\n\nif($article_id ==\
    \ 0) { ?>\n    <p class=\"warning\">Invalid request: record does not exist.</p>\n\
    <?php } else { ?>\n    <form name=\"form1\" method=\"post\" action=\"\">\n```\n\
    \nThe first conditional statement displays any error message reported by the MySQLi\
    \ prepared statement. The second wraps the update form in an `else` block, so\
    \ the form will be hidden if `$article_id` is `0`.\n\nAdd the closing curly brace\
    \ of the `else` block immediately after the closing `</form>` tag, like this:\n\
    \n```php\n</form>\n<?php } ?>\n</body>\n```\n\nIf `$article_id` is not `0`, you\
    \ know that `$title` and `$article` also contain valid values and can be displayed\
    \ in the update form without further testing. However, you need to pass text values\
    \ to `htmlentities()` to avoid problems with displaying quotes. Display `$title`\
    \ in the `value` attribute of the `title` input field like this:\n\n```php\n<input\
    \ name=\"title\" type=\"text\" id=\"title\" value=\"<?= htmlentities($title);\
    \ ?>\">\n```\n\nDo the same for the `article` text area. Because text areas don’t\
    \ have a `value` attribute, the code goes between the opening and closing `<textarea>`\
    \ tags like this:\n\n```php\n<textarea name=\"article\" id=\"article\"><?= htmlentities($article);\
    \ ?></textarea>\n```\n\nMake sure there is no space between the opening and closing\
    \ PHP and `<textarea>` tags. Otherwise, you’ll get unwanted spaces in your updated\
    \ record.\n\nThe `UPDATE` command needs to know the primary key of the record\
    \ you want to change. You need to store the primary key in a hidden field so that\
    \ it is submitted in the `$_POST` array with the other details. Because hidden\
    \ fields are not displayed onscreen, the following code can go anywhere inside\
    \ the form:\n\n```php\n<input name=\"article_id\" type=\"hidden\" value=\"<?=\
    \ $article_id; ?>\">\n```\n\nSave the update page and test it by loading `blog_list_mysqli.php`\
    \ into a browser and selecting the `EDIT` link for one of the records. The contents\
    \ of the record should be displayed in the form fields, as shown in Figure [13-3](#A978-1-4842-0635-5_13_Chapter.html#Fig3).\n\
    \nThe `Update Entry` button doesn’t do anything yet. Just make sure that everything\
    \ is displayed correctly, and confirm that the primary key is registered in the\
    \ hidden field. You can check your code, if necessary, against `blog_update_mysqli_02.php`.\n\
    \nThe `name` attribute of the submit button is `update`, so all the update processing\
    \ code needs to go in a conditional statement that checks for the presence of\
    \ `update` in the `$_POST` array. Place the following code, highlighted in bold,\
    \ immediately above the code in step 1 that redirects the page:\n\n```php\n$stmt->fetch();\n\
    \    }\n}\n\n// if form has been submitted, update record\nif (isset($_POST ['update']))\
    \ {\n    // prepare update query\n    $sql = 'UPDATE blog SET title = ?, article\
    \ = ?\n            WHERE article_id = ?';\n    if ($stmt->prepare($sql)) {\n \
    \       $stmt->bind_param('ssi', $_POST['title'], $_POST['article'],\n       \
    \                   $_POST['article_id']);\n        $done = $stmt->execute();\n\
    \    }\n}\n\n// redirect page on success or if $_GET['article_id']) not defined\n\
    if ($done || !isset($_GET['article_id'])) {\n```\n\nThe `UPDATE` query is prepared\
    \ with question mark placeholders where values are to be supplied from variables.\
    \ The prepared statement has already been initialized in the code outside the\
    \ conditional statement, so you can pass the SQL to the `prepare()` method and\
    \ bind the variables with `$stmt->bind_param()`. The first two variables are strings,\
    \ and the third is an integer, so the first argument is `'ssi'`."
