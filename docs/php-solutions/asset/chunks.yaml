    `}`


    ## Chapter Review


    Once you have learned the basic SQL and the PHP commands necessary to communicate
    with a database, working with single tables is very easy. Linking tables through
    foreign keys, however, can be quite challenging. The power of a relational database
    comes from its sheer flexibility. The problem is that this infinite flexibility
    means there is no single “right” way of doing things.


    Don''t let this put you off, though. Your instinct may be to stick with single
    tables, but down that route lies even greater complexity. The key to making it
    easy to work with databases is to limit your ambitions in the early stages. Build
    simple structures like the one in this chapter, experiment with them, and get
    to know how they work. Add tables and foreign-key links gradually. People with
    a lot of experience working with databases say they frequently spend more than
    half the development time just thinking about the table structure. After that,
    the coding is the easy bit!


    In the final chapter, we move back to working with a single table, addressing
    the important subject of user authentication with a database and how to handle
    encrypted passwords.


    # 17. Authenticating Users with a Database


    Chapter 9 showed you the principles of user authentication and sessions to password
    protect parts of your website, but the login scripts all relied on usernames and
    passwords stored in a CSV file. Keeping user details in a database is both more
    secure and more efficient. Instead of just storing a list of usernames and passwords,
    a database can store other details, such as first name, family name, email address,
    and so on. Databases also give you the option of using either one- or two-way
    encryption. In the first section of this chapter, we’ll examine the difference
    between the two. Then you’ll create registration and login scripts for both types
    of encryption.


    What this chapter covers:


    *   Deciding how to encrypt passwords

    *   Using one-way encryption for user registration and login

    *   Using two-way encryption for user registration and login

    *   Decrypting passwords'
  trans: "\n### 创建带有外键约束的删除脚本\n\n在 InnoDB 表中为 `ON DELETE` 选择值取决于表之间关系的性质。以 `phpsols`\
    \ 数据库为例，在 `article2cat` 交叉引用表中将两列都设置为 `CASCADE` 不仅是安全的，而且是可取的。如果在 `blog` 或 `categories`\
    \ 父表中删除了某条记录，则需要在交叉引用表中删除相关联的值。\n\n`images` 表和 `blog` 表之间的关系则不同。如果你从 `images`\
    \ 表中删除一条记录，可能不希望删除 `blog` 表中相关的文章。在这种情况下，`SET NULL` 是一个合适的选择。当从 `images` 表中删除一条记录时，相关文章中的外键将被设置为\
    \ `NULL`，但文章本身保持不变。\n\n另一方面，如果图像对于理解文章至关重要，请选择 `RESTRICT`。任何尝试删除仍有相关文章的图像的操作都会自动被阻止。\n\
    \n这些考量会影响你如何处理删除脚本。当外键约束设置为 `CASCADE` 或 `SET NULL` 时，你不需要做任何特殊处理。你可以使用简单的 `DELETE`\
    \ 查询，其余工作交给数据库处理。\n\n然而，如果外键约束设置为 `RESTRICT`，`DELETE` 查询将会失败。为了显示适当的错误信息，请使用 MySQLi\
    \ 语句对象的 `errno` 属性。由于外键约束而失败的查询的 MySQL 错误代码是 `1451`。在调用 `execute()` 方法后，你可以按如下方式检查\
    \ MySQLi 中的错误：\n\n```\n$stmt->execute();\nif ($stmt->affected_rows > 0) {\n  \
    \  $deleted = true;\n} else {\n    $deleted = false;\n    if ($stmt->errno ==\
    \ 1451) {\n        $error = '该记录在子表中有依赖文件，无法删除。';\n    } else {\n        $error\
    \ = '删除该记录时出现问题。';\n    }\n}\n```\n\n如果你使用 PDO，请使用 `errorCode()` 方法。由于外键约束而失败的查询代码是\
    \ `HY000`。在检查受影响的行数之后，你可以使用 PDO 预处理语句检查错误代码，示例如下：\n\n```\n$deleted = $stmt->rowCount();\n\
    if (!$deleted) {\n    if ($stmt->errorCode() == 'HY000') {\n        $error = '该记录在子表中有依赖文件，无法删除。';\n\
    \    } else {\n        $error = '删除该记录时出现问题。';\n    }\n}\n```\n\n如果你使用 PDO 的 `exec()`\
    \ 方法，技术是相同的，该方法对于非 `SELECT` 查询会返回受影响的行数。使用 `exec()` 时，需要在数据库连接上调用 `errorCode()`\
    \ 方法。\n\n```\n$deleted = $conn->exec($sql);\nif (!$deleted) {\n    if ($conn->errorCode()\
    \ == 'HY000') {\n        $error = '该记录在子表中有依赖文件，无法删除。';\n    } else {\n      \
    \  $error = '删除该记录时出现问题。';\n    }\n}\n```\n\n### 创建不带外键约束的删除脚本\n\n如果你无法使用 InnoDB\
    \ 表，则需要将相同的逻辑构建到你自己的删除脚本中。要达到与 `ON DELETE CASCADE` 相同的效果，请连续运行两个 `DELETE` 查询，示例如下：\n\
    \n```\n$sql = 'DELETE FROM article2cat WHERE article_id = ?';\n$stmt->prepare($sql);\n\
    $stmt->bind_param('i', $_POST['article_id']);\n$stmt->execute();\n\n$sql = 'DELETE\
    \ FROM blog WHERE article_id = ?';\n$stmt->prepare($sql);\n$stmt->bind_param('i',\
    \ $_POST['article_id']);\n$stmt->execute();\n```\n\n要达到与 `ON DELETE SET NULL`\
    \ 相同的效果，请将 `UPDATE` 查询与 `DELETE` 查询结合使用，示例如下：\n\n```\n$sql = 'UPDATE blog SET\
    \ image_id = NULL WHERE image_id = ?';\n$stmt->prepare($sql);\n$stmt->bind_param('i',\
    \ $_POST['image_id']);\n$stmt->execute();\n\n$sql = 'DELETE FROM images WHERE\
    \ image_id = ?';\n$stmt->prepare($sql);\n$stmt->bind_param('i', $_POST['image_id']);\n\
    $stmt->execute();\n```\n\n要达到与 `ON DELETE RESTRICT` 相同的效果，你需要在继续执行 `DELETE` 查询之前，先运行一个\
    \ `SELECT` 查询来查找是否存在依赖记录，示例如下：\n\n```\n$sql = 'SELECT image_id FROM blog WHERE\
    \ image_id = ?';\n$stmt->prepare($sql);\n$stmt->bind_param('i', $_POST['image_id']);\n\
    $stmt->execute();\n// 存储结果以找出它包含的行数\n$stmt->store_result();\n// 如果 num_rows 不为\
    \ 0，则存在依赖记录\nif ($stmt->num_rows) {\n    $error = '该记录在子表中有依赖文件，无法删除。';\n} else\
    \ {\n    $sql = 'DELETE FROM images WHERE image_id = ?';\n    $stmt->prepare($sql);\n\
    \    $stmt->bind_param('i', $_POST['image_id']);\n    $stmt->execute();\n}\n```\n\
    \n## 章节回顾\n\n一旦你掌握了与数据库通信所需的基本 SQL 和 PHP 命令，操作单表就变得非常容易。然而，通过外键链接表可能会相当具有挑战性。关系型数据库的强大之处在于其极高的灵活性。问题在于，这种无限的灵活性意味着没有单一的“正确”做事方式。\n\
    \n不过，不要让这阻碍你。你的本能可能是坚持使用单表，但那条路会带来更大的复杂性。让数据库工作变得简单的关键在于早期阶段限制你的野心。构建像本章中这样的简单结构，进行实验，并熟悉它们的工作原理。逐步添加表和外键链接。经验丰富的数据库工作者常说，他们经常花费超过一半的开发时间仅仅用于思考表结构。在那之后，编码就是轻松的部分了！\n\
    \n在最后一章中，我们将回到单表操作，讨论使用数据库进行用户认证以及如何处理加密密码的重要主题。\n\n# 17. 使用数据库进行用户认证\n\n第 9 章向你展示了用户认证和使用会话保护网站部分区域的原则，但所有登录脚本都依赖于存储在\
    \ CSV 文件中的用户名和密码。将用户详细信息保存在数据库中的方式既更安全也更高效。数据库不仅可以存储用户名和密码列表，还可以存储其他详细信息，例如名字、姓氏、电子邮件地址等。数据库还为你提供了使用单向或双向加密的选项。在本章的第一节中，我们将探讨两者的区别。然后，你将针对这两种加密类型创建注册和登录脚本。\n\
    \n本章内容涵盖：\n\n*   决定如何加密密码\n*   使用单向加密进行用户注册和登录\n*   使用双向加密进行用户注册和登录\n*   解密密码\n"
- fmt: '# Choosing an Encryption Method


    The PHP solutions in [Chapter 9](#A978-1-4842-0635-5_9_Chapter.html) use the one-way
    encryption method—once a password has been encrypted, there’s no way of reversing
    the process. This is both an advantage and a disadvantage. It offers the user
    greater security because passwords encrypted this way remain secret. However,
    there’s no way of reissuing a lost password, since not even the site administrator
    can decrypt it. The only solution is to reset it.


    The alternative is to use two-way encryption, which relies on a pair of functions:
    one to encrypt the password and another to convert it back to plain text, making
    it easy to reissue passwords to forgetful users. Two-way encryption uses a secret
    key that is passed to both functions to perform the conversion. The key is simply
    a string that you make up yourself. Obviously, to keep the data secure, the key
    needs to be sufficiently difficult to guess and should never be stored in the
    database. However, you need to embed the key in your registration and login scripts—either
    directly or through an include file—so if your scripts are ever exposed, your
    security is blown wide apart.


    MySQL and MariaDB offer a number of two-way encryption functions, but `AES_ENCRYPT()`
    is considered the most secure. It uses the Advanced Encryption Standard with a
    128-bit key length (AES-128) approved by the U.S. government for the protection
    of classified material up to the SECRET level (TOP SECRET material requires AES-192
    or AES-256).


    Both one-way and two-way encryption have advantages and disadvantages. Many security
    experts recommend that passwords should be changed frequently. So, forcing a user
    to change a forgotten password because it can’t be decrypted could be regarded
    as a good security measure. On the other hand, users are likely to be frustrated
    by the need to deal with a new password each time they forget the existing one.
    I’ll leave it to you to decide which approach is best suited to your circumstances,
    and I’ll concentrate solely on the technical implementation.


    # Using One-Way Encryption


    In the interests of keeping things simple, I’m going to use the same basic forms
    as in [Chapter 9](#A978-1-4842-0635-5_9_Chapter.html), so only the username and
    encrypted password are stored in the database.


    **Note**


    The following PHP solutions use `password_hash()` and `password_verify()`, which
    require PHP 5.5 or later. You can emulate these functions on older versions of
    PHP (minimum 5.3.7) using the `password_compat` library from [`https://github.com/ircmaxell/password_compat`](https://github.com/ircmaxell/password_compat).


    ## Creating a Table to Store Users’ Details


    In phpMyAdmin, create a new table called `users` in the `phpsols` database. The
    table needs three columns with the settings listed in Table 17-1.


    **Table 17-1.** Settings for the `users` table


    | Name | Type | Length/Values | Attributes | Null | Index | A_I |

    | --- | --- | --- | --- | --- | --- | --- |

    | `user_id` | `INT` | | `UNSIGNED` | Deselected | `PRIMARY` | Selected |

    | `username` | `VARCHAR` | `15` | | Deselected | `UNIQUE` | |

    | `pwd` | `VARCHAR` | `255` | | Deselected | | |


    To ensure no one can register the same username as one that’s already in use,
    the `username` column is given a `UNIQUE` index.


    The `pwd` column, which is for the password, allows a string of up to 255 characters
    to be stored. This is much longer than the 60 characters required by the default
    encryption method used by `password_hash()` in PHP 5.5 and 5.6. But the `PASSWORD_DEFAULT`
    constant is designed to change over time as new and stronger algorithms are added
    to PHP. So, the recommended size is 255 characters.


    ## Registering New Users in the Database


    To register users in the database, you need to create a registration form that
    asks for a username and password. The `username` column has been defined with
    a `UNIQUE` index, so the database will return an error if anyone attempts to register
    the same username as an existing one. In addition to validating the user input,
    the processing script needs to detect the error and advise the user to choose
    a different username.'
