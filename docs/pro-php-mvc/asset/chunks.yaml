- fmt: "`_thumbnail()`方法与我们之前在Zend Framework应用程序中创建的方法类似，但存在一些细微差别。首先，我们接受相同类型的参数，但为了符合CakePHP约定，它们的命名略有不同。其次，我们利用`File`组件来获取正确的文件名和扩展名。第三，由于没有类自动加载机制为我们执行此操作，我们需要手动导入调整上传照片大小所需的全部Imagine类。最后，在用于打开和保存缩略图的字符串方面存在一些小的差异。\n\
    \n所有这些都体现在`profile()`操作和`profile.ctp`视图模板中，如代码清单32-9和32-10所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 第32章 ■ CakePHP：扩展\n\n**代码清单32-9** `~/app/Controller/UsersController.php`（摘录）\n\
    \n```php\nclass UsersController extends AppController\n{\n    public function\
    \ profile()\n    {\n        $this->_isSecure();\n        if (sizeof($this->user[\"\
    Photo\"]))\n        {\n            $this->set(\"photo\", $this->_thumbnail($this->user[\"\
    Photo\"][0]));\n        }\n        $this->set(\"user\", $this->user);\n    }\n\
    }\n```\n\n**代码清单32-10** `~/app/View/Users/profile.ctp`\n\n```php\n<?php if ($photo):\
    \ ?>\n<img src=\"/uploads/<?php echo $photo; ?>\" />\n<?php endif; ?>\n<h1><?php\
    \ echo $user[\"User\"][\"first\"]; ?> <?php echo $user[\"User\"][\"last\"]; ?></h1>\n\
    ```\n\n这是一个个人资料页面！\n\n我们现在知道如何使用内置的CakePHP集合，以及如何包含第三方（供应商）库。\n\n### 问题\n\n1.\
    \  CakePHP提供了第一个处理关系的ORM库（在我们迄今为止构建/使用的所有框架中）。这个概念有哪些优点和缺点？\n2.  与之前的章节相比，我们在本章中生成表单的方式大不相同。这如何体现好处和坏处？\n\
    \n### 答案\n\n1.  在任何ORM中，关系都是一个难以正确处理的问题。我们在本章中创建的关系易于设置，但在很大程度上依赖于命名约定。我们无需做任何工作即可检索相关照片，这大大减轻了我们的工作量。这也需要对CakePHP中关系的工作原理有基本了解。\n\
    2.  CakePHP并不是我们用来支持自动表单生成的唯一框架。Zend Framework也支持此类功能；然而，两个框架都需要深入了解如何定义这些表单以及如何使用它们各种功能。与任何自动生成的代码一样，即使是很小的更改也需要大量了解自动完成的操作。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 第32章 ■ CakePHP：扩展\n\n\
    ### 练习\n\n1.  在本章中，我们选择使用`Vendor`目录作为Imagine库的存放位置。对于计划在其他项目中重用的第三方代码，使用插件要好得多，但这也需要大量代码。尝试将我们基于供应商的Imagine代码转换为插件。\n\
    2.  CakePHP的ORM库还支持通过在主数据对象上调用`saveAll()`方法来创建多个数据库记录。尝试将照片和用户的单独`save()`调用合并起来。\n\
    \n> **注意** 您可以在此处了解有关创建相关记录的这种方法的更多信息：[http://book.cakephp.org/2.0/](http://book.cakephp.org/2.0/en/models/saving-your-data.html#model-saveall-array-data-null-array-options-array)\n\
    > [en/models/saving-your-data.html#model-saveall-array-data-null-array-options-array](http://book.cakephp.org/2.0/en/models/saving-your-data.html#model-saveall-array-data-null-array-options-array)\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第33章\n## CakePHP：测试\n\
    \n与我们在Zend Framework中进行的测试类似，CakePHP的单元测试依赖于PHPUnit，这使得我们在CakePHP中的收尾工作变得容易。\n\
    \n### 目标\n\n*   我们需要学习如何创建并对控制器运行测试。\n\n### 测试\n\n我们可以创建一些简单的测试来验证CakePHP控制器的功能。"
  raw: 'The _thumbnail() method is similar to the one we created in our Zend Framework
    application, with a few subtle differences. First, we accept the same types of
    arguments but they are named slightly differently in order to accommodate CakePHP
    conventions. Second, we utilize the File component in order to get the correct
    file name and extension. Third, we need to manually import all of the Imagine
    classes required to resize the uploaded photos, since there is no class autoloading
    to do this for us. Finally, there are a few small differences in the strings used
    to open and save our thumbnails.


    This all comes together in the profile() action and the profile.ctp view template,
    as shown in Listings 32-9 and 32-10.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 32 ■ Cakephp: extending


    ***Listing 32-9*** ~/app/Controller/UsersController.php (Extract)


    class UsersController extends AppController


    {


    public function profile()


    {


    $this->_isSecure();


    if (sizeof($this->user["Photo"]))


    {


    $this->set("photo", $this->_thumbnail($this->user["Photo"][0]));


    }


    $this->set("user", $this->user);


    }


    }


    ***Listing 32-10.*** ~/app/View/Users/profile.ctp


    <?php if ($photo): ?>


    <img src="/uploads/<?php echo $photo; ?>" />


    <?php endif; ?>


    <h1><?php echo $user["User"]["first"]; ?> <?php echo $user["User"]["last"]; ?></h1>
    This is a profile page!


    We now know how to use built-in CakePHP collections, as well as how to include
    third-party (vendor) libraries.


    Questions


    1\. CakePHP presents the first ORM library that handles relationships (out of
    all the frameworks we have built/used so far). What are some of the benefits and
    drawbacks of this concept?


    2\. We generated our forms quite differently in this chapter, compared to previous
    chapters. How is this good and bad?


    Answers


    1\. Relationships are a complicated thing to get right in any ORM. The relationships
    we created in this chapter were easy to set up, but depended largely on naming


    conventions. The fact that we didn’t have to do any work to retrieve related photos
    considerably lightened our workload. It also required a basic understanding of
    how the relationships work in CakePHP.


    2\. CakePHP is not the only framework we used to support automatic form generation.


    Zend Framework also facilitates this kind of thing; however, both frameworks require
    an in-depth knowledge of how to define these forms and how to use their various


    functionality. As with any automatically generated code, even small changes require
    lots of knowledge of what’s being done automatically.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 32 ■ Cakephp: extending


    Exercises


    1\. In this chapter, we chose to use the Vendor directory as a home for the Imagine
    library. It is far better to use plugins for third-party code that you plan to
    reuse in other projects, but it also requires a lot of code. Try to convert our
    vendor-based Imagine code into a plugin.


    2\. CakePHP’s ORM library also supports creating multiple database records by
    calling the saveAll() method on the main data object. Instead of separate save()
    calls for photos and users, try to combine them.


    ■ **Note** You can learn more about this method of creating related records here:
    [http://book.cakephp.org/2.0/](http://book.cakephp.org/2.0/en/models/saving-your-data.html#model-saveall-array-data-null-array-options-array)


    [en/models/saving-your-data.html#model-saveall-array-data-null-array-options-array](http://book.cakephp.org/2.0/en/models/saving-your-data.html#model-saveall-array-data-null-array-options-array)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Chapter 33**


    **CakePHP: Testing**


    Similar to the testing we did in Zend Framework, CakePHP’s unit tests depend on
    PHPUnit, making it an easy end to our time in CakePHP.


    Goals


    • We need to learn how to create and run tests on our controllers.


    Testing


    There are a few simple tests that we can create in order to validate the functionality
    of our CakePHP controllers.'
