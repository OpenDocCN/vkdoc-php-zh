    \ you to use parentheses () to change the order in which values\nare calculated.\
    \ Otherwise, for numerical values, the language usually\nfollows a mathematical\
    \ **order of\noperations** . This order is similar to normal mathematics\nbut\
    \ does have a few differences. We will see some of these as we explore\nthe remainder\
    \ of the book.\n\n```\nFor more information on order of operations, visit www.php.net/manual/en/language.operators.precedence.php.\n\
    ```\n\nLet us look at some examples:"
  trans: "\n# 变量\n\n**变量**用于在内存中临时存储信息。大多数情况下，PHP 在使用变量时并不要求你声明**数据类型**。*数据类型*描述了你要存储的数据类型，例如字符串（文本）、整数（整型数）或浮点数（小数）。操作系统会利用这些信息来确定存储该信息所需的空间大小。\n\
    \n自 PHP 7 以来，开发者已经可以在许多情况下选择声明数据类型。当你希望限制存储在内存中的数据种类时，声明数据类型是一个好主意。请记住，除非你加以阻止，否则\
    \ PHP 会进行**数据类型转换**（例如将字符串`\"10\"`转换为数值`10`）。我们很快将提供更多示例。但首先，让我们看看在 PHP 中声明变量的标准方法。\n\
    \n在 PHP 中，你在使用变量之前通常甚至不需要单独声明它。在声明变量或函数时，开发者可以使用多种风格。最常见的是**驼峰命名法**。驼峰命名法中，第一个单词小写，后续单词的首字母大写，例如`addIt`。不过，其他风格也是可以接受的，例如：\n\
    \n```php\n$first_number = 0;\n$second_Number = 1;\n$number1 = 12;\n```\n\n关键在于，无论你选择哪种风格，都应在代码中保持一致。哪种格式更好其实并没有优势。尽管很多程序员会很乐意告诉你他们的看法！在我看来，你应该使用有意义的名称，例如`total_Sales`。有些人还会在名称中包含数据类型，例如`int_Total_Sales`。在大型程序中，采用良好的命名约定将更容易跟踪变量的使用情况。\n\
    \n*变量必须以`$`作为第一个字符，并使用其他字母数字字符完成名称。你也可以使用下划线（`_`）。但是，不允许使用其他特殊符号或空格。*\n\n在下面的示例中，一个变量（`$result`）将保存名为`addIt`的函数返回的任何值。由于我们没有声明数据类型，这个变量可能包含数值结果、字符串结果或其他可能的格式。作为程序员，我们可能想要这种灵活性。例如，如果函数能够产生结果，我们就返回结果；如果无法返回结果，我们可以返回一个字符串（`\"\
    Invalid Result\"`），或者返回`NULL`（表示没有结果，与返回零不同）。\n\n由于这个函数接受两个参数（`12`，`13`），我们假设它会将这两个数字相加并返回结果。然后`print`语句会显示变量中包含的内容。\n\
    \n> **注意**  \n> 虽然本书中的大多数示例使用`print`语句来显示信息，但`echo`语句也非常常用。\n\n如果我们没有声明数据类型来限制传入函数的内容（见下文），那么下面的示例也可能在传入其他类型的信息时产生良好结果。然而，函数内部可能存在某些操作，在传入非预期的信息时无法正确执行。一个好的程序员总会编写代码，避免因保存或传入无效数据到函数而导致的任何可能错误情况。必须考虑每一种情况，哪怕是程序员认为不合逻辑或几乎不可能发生的情况。\n\
    \n如果我们想限制接受或使用的信息类型，可以声明数据类型。我们很快会探讨几个示例。目前，默认情况下请记住，变量的数据类型是在首次使用变量时确定的。\n\n\
    1. 数据类型为字符串（字符）。\n\n```php\n$myValue = \"Help\";\n```\n\n2. 数据类型被设为**整数**（整型数）。\n\
    \n```php\n$myValue = 123;\n```\n\n3. 两个整数相加得到整数，然后存入变量中。\n\n```php\n$myValue =\
    \ 123 + 456;\n// 结果：$myValue 现在包含 579\n```\n\n4. 两个**浮点数**相加得到浮点数，并存入变量中。\n\n\
    ```php\n$myValue = 123.123 + 123.456;\n// 结果：$myValue 现在包含 246.579\n```\n\n5.\
    \ 浮点数与整数相加将产生一个浮点数。\n\n```php\n$myValue = 123.233 + 12;\n// 结果：$myValue 现在包含 135.233\n\
    ```\n\n6. 尝试将数字与字符串形式的数字相加，如果该字符串可以转换为数字，则会成功。将数值相加的结果与前面的示例类似。\n\n```php\n$myValue\
    \ = 123 + \"456\";\n// 结果：$myValue 现在包含 579\n```\n\n**字符串连接符**（`.`）可用于合并两个字符串。结果可以放入变量中（你已经猜到了，它现在包含一个字符串）。在以下示例中，现有的两个字符串被合并在一起，创建一个新的字符串，并存储在`$myValue`中。\n\
    \n```php\n$myValue = \"Help\" . \" me!\";\n// 结果：$myValue 现在包含 \"Help me!\"\n\
    ```\n\n1. 当合并字符串和整数时，PHP 会将整数转换为字符串（`123`），使其能够与另一个字符串（`Help`）连接，从而生成字符串`\"Help\
    \ 123\"`，该字符串将被放入变量中。\n\n```php\n$myValue = \"Help \" . 123;\n// 结果：$myValue 现在包含\
    \ \"Help 123\"\n```\n\n2. 如第 1 章所示，当尝试合并一个字符串和两个值（本例中这两个值需要相加）时，PHP 会先进行计算，然后将结果转换为字符串。\n\
    \n```php\n$num1 = 1;\n$num2 = 2;\n$myValue = \"Help \" . $num1 + $num2;\n// 结果：$myValue\
    \ 现在包含 \"Help 3\"\n```\n\n*（如果在 PHP 7.5 之前的任何版本中尝试，示例 2 将产生错误消息。）*\n\n## 数据类型提示\n\
    \nPHP 7 引入了数据类型提示。这使得开发者能够限制可以传入或传出函数或对象的数据类型。\n\n在之前的示例中，该函数限制`$value`仅能包含**布尔型**（`true`/`false`）值。它还限制返回的值也是布尔型。\n\
    \n> **注意**  \n> `true`不是字符串，而是一个布尔值。因此，它不需要引号。\n\n在调用`myFunction`函数时，上述两条语句都可能是有效的。如果没有传入值，那么变量`$value`被设置为**默认值**，即`null`。**Null**\
    \ 表示变量为空。然而，我们也可以传入一个布尔值（`true`），该值将取代`null`被使用。\n\n为了启用数据类型的强制检查，必须在 PHP 代码的第一行添加以下语句：\n\
    \n```php\n<?php declare(strict_types=1);\n```\n\n如果未包含**严格类型**语句，PHP 会在可能的情况下尝试转换数据类型，这可能导致函数或对象接受无效数据，从而产生无效结果，或者更糟糕的是导致程序抛出异常（错误状态）。在后续学习函数、数组和对象时，我们将看到更多示例。\n\
    \n## 算术运算符\n\n算术运算的工作方式与数学相似。不同之处在于，计算是在**赋值运算符**的右侧（`=` 符号的右侧）进行，然后将结果放入表达式左侧的变量、函数或其他对象中。PHP\
    \ 已经包含了许多可以用来产生计算器结果的函数。\n\n```\n有关可用数学函数的更多信息，请访问 www.php.net/manual/en/ref.math.php。\n\
    ```\n\nPHP 允许你使用括号`()`来改变值的计算顺序。否则，对于数值，该语言通常遵循数学上的**运算顺序**。这个顺序与常规数学类似，但确实存在一些差异。在本书后续部分我们将看到其中一些差异。\n\
    \n```\n有关运算顺序的更多信息，请访问 www.php.net/manual/en/language.operators.precedence.php。\n\
    ```\n\n让我们看一些示例：\n"
- fmt: "1. 赋值运算符（`=`）将获取表达式右侧的值（`1`），并将其放入表达式左侧的变量（`$my_num`）中。如果该变量不存在，它将被创建在内存中。\n\
    \n```php\n$my_num = 1;\n```\n\n2. 以下两个语句都将表达式右侧的值（`$my_num`）添加到表达式左侧变量（`$value`）中已有的内容。如果该变量之前不存在，则向右侧的值加零，并将结果放入变量（`$value`）中。如果变量中存在字符串，则在相加之前会尝试将其转换为数字。\n\
    \n```php\n$value += $my_num;\n$value = $value + $my_num;\n```\n\n3. 此语句与 #2 类似，不同之处在于从变量中包含的值中减去右侧的值。如果该变量之前不存在，则从\
    \ 0 中减去右侧的值（`$my_num`）。如果变量中存在字符串，则在相减之前会尝试将其转换为数字。\n\n```php\n$value -= $my_num;\n\
    $value = $value - $my_num;\n```\n\n4. 此语句与 #3 类似，不同之处在于执行乘法而非减法。如果该变量之前不存在，则右侧的值（`$my_num`）乘以\
    \ 0。如果变量中存在字符串，则在相乘之前会尝试将其转换为数字。\n\n```php\n$value *= $my_num;\n$value = $value\
    \ * $my_num;\n```\n\n5. 此语句与 #4 类似，不同之处在于将右侧的值（`$my_num`）除以变量中包含的值。除法将返回一个浮点数，除非两个值都是整数且能整除（没有小数部分）。如果变量中存在字符串，则在相除之前会尝试将其转换为数字。\n\
    \n*注意：如果变量 `$my_num` 不存在，它将被设置为 0。这将导致抛出异常，因为不能除以零！*\n\n```php\n$value /= $my_num;\n\
    $value = $value / $my_num;\n```\n\n注意：PHP 8 提供了函数 `fdiv()`，它在除以零时会返回 `INF`（无穷大）、`-INF`（负无穷大）或\
    \ `NAN`（非数字），而不是抛出异常。\n\n6. 此语句与 #5 类似，不同之处在于将除法的余数放入变量中。如果变量中存在字符串，则在取模之前会尝试将其转换为数字。\n\
    \n*注意：如果变量 `$my_num` 不存在，它将被设置为 0。这将导致抛出异常，因为不能除以零！*\n\n```php\n$value %= $my_num;\n\
    $value = $value % $my_num;\n```\n\n7. 此语句将 `$value` 提升到 `$my_num` 中包含的幂次，并将结果放回\
    \ `$value`。\n\n```php\n$value = $value ** $my_num;\n```\n\n8. 变量可以在使用前进行**递增/递减**（`++$num`，`--$num`），也可以在使用后进行（`$num++`，`$num--`）。\n\
    \n```php\n( 假设每个语句执行前 $num = 1 )\n$value = $num++ - 5; // $value 是 -4, $num 是\
    \ 2\n$value = $num-- + 5; // $value 是 6, $num 是 0\n$value = ++$num – 5; // $value\
    \ 是 -3, $num 是 2\n$value = --$num + 5; // $value 是 5, $num 是 0\n```\n\n**动手实践**\n\
    \n1. 创建一个程序，将两个数值设置到两个不同的变量中。然后计算这两个数相加、相减、相除和相乘的结果。每次计算后，用一句话显示结果，例如“1 和 2 的和是\
    \ 3。”\n\n提示：在大多数情况下，PHP 允许你在字符串中放置变量名。例如，“`$firstNumber` 和 `$secondNumber` 的和是\
    \ `$sum`。”可能会产生预期的结果。\n\n2. 创建一个除以零的程序。它会生成什么错误信息？如何避免这种情况？\n\n3. 使用本节提供的链接，探索\
    \ PHP 中包含的一些数学函数。创建一个程序来求一个数的平方根并求该数的自然对数。\n\n## 条件语句\n\n**条件语句**用于判断比较结果是“真”还是“假”。如果语句为真，则执行\
    \ `if` 语句之后的代码。如果语句为假，则执行 `else` 语句（如果有的话）之后的代码。与上一节介绍的赋值运算符（`=`）不同，比较两个值是否相等需要两个（`==`）或三个（`===`）等号。两个等号忽略大小写或数据类型。‘A’\
    \ 和 ‘a’ 会被视为相等。同样，5 和 5.0 也会被视为相等。三个等号要求完全匹配。对于上面的两个例子，使用三个等号时它们都不会被视为相等。\n\n\
    注意：如果程序员错误地只使用一个等号，程序不会产生错误。它会假定一个“真”状态，条件语句可能会产生无效结果。\n\n```php\nif(statement\
    \ to compare) {\n// 如果比较结果为真，则执行此处代码\n}\n// 无论结果为真还是假，都会执行 if 语句后的代码\n\nif(statement\
    \ to compare) {\n// 如果比较结果为真，则执行此处代码\n}\nelse {\n// 如果比较结果为假，则执行此处代码\n}\n// 无论结果为真还是假，都会执行\
    \ if/else 语句后的代码\n```\n\n条件语句的基本结构如下所示。在第一个示例中，只有当语句为真时才执行 `if` 语句内的代码。如果语句为假，则不执行其他代码。在第二个示例中，在\
    \ `else` 语句后提供了在语句为假时要执行的代码。也可以使用嵌套的 `if`/`else` 语句。我们将在另一章中演示这些结构的用法。\n\n让我们看一些使用比较运算符的条件语句示例：\n\
    \n1.\n```php\n<?php\n$a = 25;\n$b = 36;\nif ($a == $b) {\n    print \"$a and $b\
    \ are equal.\";\n} else {\n    print \"$a and $b are not equal.\";\n}\n?>\n```\n\
    输出：36 and 25 are not equal.\n原因：`$a`（25）和 `$b`（36）中的值不相同。因此，将执行 `else` 部分中的代码。\n\
    \n2.\n```php\n<?php\n$a = \"A\";\n$b = \"a\";\nif ($a === $b) {\n    print \"\
    $a and $b are equal.\";\n} else {\n    print \"$a and $b are not equal.\";\n}\n\
    ?>\n```\n输出：A and a are not equal.\n原因：使用三个等号（`===`）也会比较大小写。在这个例子中，由于大小写原因，比较结果为假。如果去掉一个等号，结果将变为真。\n\
    \n注意：在此示例中，使用了双引号来创建字符串。由于每个字符只有一个字符，也可以使用单引号。\n\n3.\n```php\n<?php\n$a = 25;\n\
    $b = 36;\nif ($a != $b) {\n    print \"$a and $b are not equal.\";\n} else {\n\
    \    print \"$a and $b are equal.\";\n}\n?>\n```\n输出：36 and 25 are not equal.\n\
    原因：**非运算符**（`!`）的工作方式与等号运算符（见 #1）的结果相反。条件从假状态反转为真状态。执行 `if` 表达式之后的代码。\n\n4.\n\
    ```php\n<?php\n$a = \"A\";\n$b = \"a\";\nif ($a !== $b) {\n    print \"$a and\
    \ $b are not equal.\";\n} else {\n    print \"$a and $b are equal.\";\n}\n?>\n\
    ```\n输出：a and A are not equal.\n原因：**不全等运算符**（`!==`）的工作方式与全等运算符（见 #2）的结果相反。该比较变为真。执行\
    \ `if` 语句之后的代码。\n\n5.\n```php\n<?php\n$a = 25.1;\n$b = 36;\nif ($a < $b) {\n \
    \   print \"$a is less than $b.\";\n} else {\n    print \"$a is not less than\
    \ $b.\";\n}\n?>\n```\n输出：25.1 is less than 36.\n原因：小于比较若左侧的值小于右侧的值，则返回真。在 PHP\
    \ 8 中，我们可以混合使用浮点数（小数）和整数（整型）进行比较。在此示例中，36 会在比较之前转换为 36.0。\n\n6.\n```php\n<?php\n\
