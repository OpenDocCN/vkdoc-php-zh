    that contain non-numeric characters are automatically escaped and wrapped in quotes
    when the SQL is executed. Column names and operators cannot be in quotes.


    Prepared statements involve slightly more code than just submitting the query
    directly, but placeholders make the SQL easier to read and write, and the process
    is more secure.


    The syntax for MySQLi and PDO is different, so the following sections deal with
    them separately.


    ### Embedding variables in MySQLi prepared statements


    Using a MySQLi prepared statement involves several stages.


    #### Initialize the statement


    To initialize the prepared statement, call the `stmt_init()` method on the database
    connection and store it in a variable, as follows:


    `$stmt = $conn->stmt_init();`


    #### Prepare the statement


    You then pass the SQL query to the statement’s `prepare()` method. This checks
    that you haven’t used question mark placeholders in the wrong place, and that
    when everything is put together, the query is valid SQL.


    If there are any mistakes, the `prepare()` method returns `false`, so it’s common
    to enclose the next steps in a conditional statement to ensure they run only if
    everything is still okay.


    Error messages can be accessed through the statement’s `error` property.


    #### Bind values to the placeholders


    Replacing the question marks with the actual values held in the variables is technically
    known as binding the parameters. It’s this step that protects your database from
    SQL injection.


    Pass the variables to the statement’s `bind_param()` method in the same order
    as you want them inserted into the SQL query, together with a first argument specifying
    the data type of each variable, again in the same order as the variables. The
    data type must be specified by one of the following four characters:


    *   `b`: Binary (such as an image, Word document, or PDF file)

    *   `d`: Double (floating point number)

    *   `i:` Integer (whole number)

    *   `s:` String (text)


    The number of variables passed to `bind_param()` must be exactly the same as the
    number of question mark placeholders. For example, to pass a single value as a
    string, use this:


    `$stmt->bind_param(''s'', $_GET[''words'']);`


    To pass two values, the `SELECT` query needs two question marks as placeholders,
    and both variables need to be bound with `bind_param()`, like this:


    `$sql = ''SELECT * FROM products WHERE price < ? AND type = ?'';`


    `$stmt = $conn->stmt_init();`


    `$stmt->prepare($sql);`


    `$stmt->bind_param(''ds'', $_GET[''price''], $_GET[''type'']);`


    The first argument to `bind_param()`, `''ds''`, specifies `$_GET[''price'']` as
    a floating point number and `$_GET[''type'']` as a string.


    #### Execute the statement


    Once the statement has been prepared and the values have been bound to the placeholders,
    call the statement’s `execute()` method. The result of a `SELECT` query can then
    be fetched from the statement object. With other types of queries, this is the
    end of the process.


    #### Binding the results (optional)


    Optionally, you can bind the results of a `SELECT` query to variables with the
    `bind_result()` method. This avoids the need to extract each row and then access
    the results as `$row[''column_name'']`.


    To bind the results, you must name each column specifically in the `SELECT` query.
    List the variables you want to use in the same order and pass them as arguments
    to `bind_result()`. For example, let’s say your SQL looks like this:


    `$sql = ''SELECT image_id, filename, caption FROM images WHERE caption LIKE ?'';`


    To bind the results of the query, use this code:


    `$stmt->bind_result($image_id, $filename, $caption);`


    This allows you to access the results directly as `$image_id`, `$filename`, and
    `$caption`.


    #### Store the result (optional)


    When you use a prepared statement for a `SELECT` query, the results are unbuffered.
    This means that they remain on the database server until you fetch them. This
    has the advantage of requiring less memory, particularly if the result set contains
    a large number of rows. However, unbuffered results impose the following restrictions:


    *   Once the results are fetched, they’re no longer stored in memory. Consequently,
    you can’t use the same result set more than once.

    *   You can’t run another query on the same database connection until all of the
    results have been fetched or cleared.

    *   You can’t use the `num_rows` property to find out how many rows are in the
    result set.

    *   You can’t use `data_seek()` to move to a specific row in the result set.


    To avoid these restrictions, you can optionally store the result set using the
    statement’s `store_result()` method. However, if you simply want to display the
    result immediately without reusing later, there’s no need to store it first.


    Note


    To clear an unbuffered result, call the statement’s `free_result()` method.


    #### Fetch the result


    To loop through the results of a `SELECT` query that has been executed with a
    prepared statement, use the `fetch()` method. If you have bound the results to
    variables, do it like this:


    `while ($stmt->fetch()) {`


    `// display the bound variables for each row`


    `}`


    If you haven’t bound the results to variables, use `$row = $stmt->fetch()` and
    access each variable as `$row[''column_name'']`.


    #### Close the statement


    When you have finished with a prepared statement, the `close()` method frees the
    memory used.'
  trans: "\n## 对用户输入使用预处理语句\n\n`MySQLi` 和 `PDO` 都支持预处理语句，这提供了重要的安全特性。预处理语句是 SQL 查询的一个模板，它为每个可变的值包含一个占位符。这不仅使得在\
    \ PHP 代码中嵌入变量更加容易，还能防止 SQL 注入攻击，因为在查询执行之前，引号和其他字符会被自动转义。\n\n使用预处理语句的其他优点是，当相同的查询被多次使用时，它们更加高效。此外，你可以将\
    \ `SELECT` 查询中每一列的结果绑定到命名变量，从而更容易地显示输出。\n\n`MySQLi` 和 `PDO` 都使用问号作为匿名占位符，如下所示：\n\
    \n`$sql = 'SELECT image_id, filename, caption FROM images WHERE caption LIKE ?';`\n\
    \n`PDO` 也支持命名占位符的使用。命名占位符以冒号开头，后跟一个标识符，如下所示：\n\n`$sql = 'SELECT image_id, filename,\
    \ caption FROM images WHERE caption LIKE :search';`\n\n**注意**：即使占位符代表的值是字符串，它们也不需要用引号包裹。这使得构建\
    \ SQL 查询更加容易，因为无需担心单引号和双引号的正确组合。\n\n占位符仅能用于列值。它们不能用于 SQL 查询的其他部分，例如列名或运算符。这是因为当\
    \ SQL 执行时，包含非数字字符的值会被自动转义并用引号包裹。列名和运算符不能放在引号中。\n\n预处理语句所需的代码比直接提交查询略多，但占位符使 SQL\
    \ 更易于阅读和编写，并且该过程更安全。\n\n`MySQLi` 和 `PDO` 的语法不同，因此接下来的部分将分别讨论它们。\n\n### 在 MySQLi\
    \ 预处理语句中嵌入变量\n\n使用 `MySQLi` 预处理语句涉及几个阶段。\n\n#### 初始化语句\n\n要初始化预处理语句，请在数据库连接上调用\
    \ `stmt_init()` 方法，并将其存储在一个变量中，如下所示：\n\n`$stmt = $conn->stmt_init();`\n\n####\
    \ 准备语句\n\n然后，将 SQL 查询传递给语句的 `prepare()` 方法。这会检查你是否在错误的位置使用了问号占位符，并确保当所有内容组合在一起时，查询是有效的\
    \ SQL。\n\n如果有任何错误，`prepare()` 方法会返回 `false`，因此通常将后续步骤包含在条件语句中，以确保它们仅在一切正常时才运行。\n\
    \n可以通过语句的 `error` 属性访问错误消息。\n\n#### 将值绑定到占位符\n\n用变量中的实际值替换问号，在技术术语中称为绑定参数。正是这一步保护你的数据库免受\
    \ SQL 注入。\n\n按照希望它们插入到 SQL 查询中的相同顺序，将变量传递给语句的 `bind_param()` 方法，同时第一个参数指定每个变量的数据类型，同样按照与变量相同的顺序。数据类型必须由以下四个字符之一指定：\n\
    \n- `b`：二进制（例如图像、Word 文档或 PDF 文件）\n- `d`：双精度（浮点数）\n- `i`：整数（整数）\n- `s`：字符串（文本）\n\
    \n传递给 `bind_param()` 的变量数量必须与问号占位符的数量完全相同。例如，要传递一个字符串值，请使用以下代码：\n\n`$stmt->bind_param('s',\
    \ $_GET['words']);`\n\n要传递两个值，`SELECT` 查询需要两个问号作为占位符，并且两个变量都需要使用 `bind_param()`\
    \ 进行绑定，如下所示：\n\n```\n$sql = 'SELECT * FROM products WHERE price < ? AND type =\
    \ ?';\n$stmt = $conn->stmt_init();\n$stmt->prepare($sql);\n$stmt->bind_param('ds',\
    \ $_GET['price'], $_GET['type']);\n```\n\n`bind_param()` 的第一个参数 `'ds'` 指定 `$_GET['price']`\
    \ 为浮点数，`$_GET['type']` 为字符串。\n\n#### 执行语句\n\n一旦语句准备好并且值已绑定到占位符，就调用语句的 `execute()`\
    \ 方法。然后可以从语句对象中获取 `SELECT` 查询的结果。对于其他类型的查询，这就是过程的结束。\n\n#### 绑定结果（可选）\n\n可选地，你可以使用\
    \ `bind_result()` 方法将 `SELECT` 查询的结果绑定到变量。这避免了解析每一行然后以 `$row['column_name']` 的形式访问结果。\n\
    \n要绑定结果，你必须在 `SELECT` 查询中具体指定每一列的名称。按照相同的顺序列出你想要使用的变量，并将它们作为参数传递给 `bind_result()`。例如，假设你的\
    \ SQL 如下所示：\n\n`$sql = 'SELECT image_id, filename, caption FROM images WHERE caption\
    \ LIKE ?';`\n\n要绑定查询的结果，请使用以下代码：\n\n`$stmt->bind_result($image_id, $filename,\
    \ $caption);`\n\n这允许你直接以 `$image_id`、`$filename` 和 `$caption` 的形式访问结果。\n\n####\
    \ 存储结果（可选）\n\n当你对 `SELECT` 查询使用预处理语句时，结果是无缓冲的。这意味着它们会保留在数据库服务器上，直到你获取它们。这样做的好处是占用更少的内存，特别是当结果集包含大量行时。然而，无缓冲结果施加了以下限制：\n\
    \n- 一旦结果被获取，它们就不再存储在内存中。因此，你不能多次使用同一个结果集。\n- 在所有的结果被获取或清除之前，你不能在同一数据库连接上运行另一个查询。\n\
    - 你不能使用 `num_rows` 属性来查找结果集中有多少行。\n- 你不能使用 `data_seek()` 来移动到结果集中的特定行。\n\n为避免这些限制，你可以使用语句的\
    \ `store_result()` 方法选择性地存储结果集。但是，如果你只是想立即显示结果而不在之后重复使用，则无需先存储它。\n\n**注意**：要清除无缓冲结果，请调用语句的\
    \ `free_result()` 方法。\n\n#### 获取结果\n\n要遍历使用预处理语句执行的 `SELECT` 查询的结果，可以使用 `fetch()`\
    \ 方法。如果已经将结果绑定到变量，请这样做：\n\n```\nwhile ($stmt->fetch()) {\n    // 显示每一行绑定的变量\n\
    }\n```\n\n如果你没有将结果绑定到变量，请使用 `$row = $stmt->fetch()` 并以 `$row['column_name']` 的形式访问每个变量。\n\
    \n#### 关闭语句\n\n当你完成预处理语句的使用后，`close()` 方法会释放所使用的内存。\n"
- fmt: "#### PHP Solution 11-8: Using a MySQLi prepared statement in a search\n\n\
    This PHP solution shows how to use a MySQLi prepared statement with a `SELECT`\
    \ query; it also demonstrates binding the result to named variables.\n\nCopy `mysqli_prepared_01.php`\
    \ from the `ch11` folder and save it in the `mysqli` folder as `mysqli_prepared.php`.\
    \ It contains the same search form and results table as that used in PHP Solution\
    \ 11-7. In a PHP code block above the `DOCTYPE` declaration, create a conditional\
    \ statement to include `connection.php` and create a read-only connection when\
    \ the search form is submitted. The code looks like this:\n\n```\nif (isset($_GET['go']))\
    \ {\n    require_once '../includes/connection.php';\n    $conn = dbConnect('read');\n\
    }\n```\n\nNext, add the SQL query inside the conditional statement. The query\
    \ needs to name the three columns you want to retrieve from the `images` table.\
    \ Use a question mark as the placeholder for the search term, like this:\n\n```\n\
    $sql = 'SELECT image_id, filename, caption FROM images\n        WHERE caption\
    \ LIKE ?';\n```\n\nBefore passing the user-submitted search term to the `bind_param()`\
    \ method, you need to add the wildcard characters to it and assign it to a new\
    \ variable, like this:\n\n```\n$searchterm = '%'. $_GET['search'] .'%';\n```\n\
    \nYou can now create the prepared statement. The finished code in the PHP block\
    \ above the `DOCTYPE` declaration looks like this:\n\n```\nif (isset($_GET['go']))\
    \ {\n    require_once '../includes/connection.inc.php';\n    $conn = dbConnect('read');\n\
    \    $sql = 'SELECT image_id, filename, caption FROM images\n            WHERE\
    \ caption LIKE ?';\n    $searchterm = '%'. $_GET['search'] .'%';\n    $stmt =\
    \ $conn->stmt_init();\n    if ($stmt->prepare($sql)) {\n        $stmt->bind_param('s',\
    \ $searchterm);\n        $stmt->execute();\n        $stmt->bind_result($image_id,\
    \ $filename, $caption);\n        $stmt->store_result();\n        $numRows = $stmt->num_rows;\n\
    \    } else {\n        $error = $stmt->error;\n    }\n}\n```\n\nAdd a conditional\
    \ statement after the opening `<body>` tag to display the error message if a problem\
    \ has occurred:\n\n- This initializes the prepared statement and assigns it to\
    \ `$stmt`. The SQL query is then passed to the `prepare()` method, which checks\
    \ the validity of the query’s syntax. If there’s a problem with the syntax, the\
    \ `else` block assigns the error message to `$error`. If there are no mistakes\
    \ in the syntax, the rest of the script inside the conditional statement is executed.\n\
    - The first line inside the conditional statement binds `$searchterm` to the `SELECT`\
    \ query, replacing the question mark placeholder. The first argument tells the\
    \ prepared statement to treat it as a string.\n- After the prepared statement\
    \ is executed, the next line binds the results of the `SELECT` query to `$image_id`,\
    \ `$filename`, and `$caption`. These need to be in the same order as in the query.\
    \ I have named the variables after the columns they represent, but you can use\
    \ any variables you want.\n- Then the result is stored. Note that you store the\
    \ result simply by calling the statement object’s `store_result()` method. Unlike\
    \ using `query()`, you don’t assign the return value of `store_result()` to a\
    \ variable. If you do, it’s simply `true` or `false`, depending on whether the\
    \ result was stored successfully.\n- Finally, the number of rows retrieved by\
    \ the query is obtained from the statement object’s `num_rows` property and stored\
    \ in `$numRows`.\n\n```\n<?php\nif (isset($error)) {\n    echo \"<p>$error</p>\"\
    ;\n}\n?>\n```\n\nAdd the following code after the search form to display the result:\n\
    \n```\n<?php if (isset($numRows)) { ?>\n<p>Number of results for <b><?= htmlentities($_GET['search']);\
    \ ?></b>: <?= $numRows; ?></p>\n<?php if ($numRows) { ?>\n<table>\n<tr>\n<th>image_id</th>\n\
    <th>filename</th>\n<th>caption</th>\n</tr>\n<?php while ($stmt->fetch()) { ?>\n\
    <tr>\n<td><?= $image_id; ?></td>\n<td><?= $filename; ?></td>\n<td><?= $caption;\
    \ ?></td>\n</tr>\n<?php } ?>\n</table>\n<?php }\n} ?>\n```\n\n- Most of this code\
    \ is the same as was used in PHP Solution 11-7. The difference lies in the `while`\
    \ loop that displays the results. Instead of using the `fetch_assoc()` method\
    \ on a result object and storing the result in `$row`, it simply calls the `fetch()`\
    \ method on the prepared statement. There’s no need to store the current record\
    \ as `$row`, because the values from each column have been bound to `$image_id`,\
    \ `$filename`, and `$caption`.\n\nYou can compare your code with `mysqli_prepared_02.php`\
    \ in the `ch11` folder.\n\n### Embedding variables in PDO prepared statements\n\
    \nPDO prepared statements offer the choice of anonymous and named placeholders.\n\
    \n#### Using anonymous placeholders\n\nAnonymous placeholders use question marks\
    \ in exactly the same way as MySQLi:\n\n```\n$sql = 'SELECT image_id, filename,\
    \ caption FROM images WHERE caption LIKE ?';\n```\n\n#### Using named placeholders\n\
    \nNamed placeholders begin with a colon, like this:\n\n```\n$sql = 'SELECT image_id,\
    \ filename, caption FROM images WHERE caption LIKE :search';\n```\n\nUsing named\
    \ placeholders makes the code a lot easier to understand, particularly if you\
    \ choose names that are based on the variables that contain the values to be embedded\
    \ in the SQL.\n\n#### Preparing the statement\n\nPreparing and initializing a\
    \ statement is done in a single step (unlike with MySQLi, which requires two).\
    \ You pass the SQL with placeholders directly to the connection object’s `prepare()`\
    \ method, which returns the prepared statement, like this:\n\n```\n$stmt = $conn->prepare($sql);\n\
    ```"
  raw: '#### PHP Solution 11-8: Using a MySQLi prepared statement in a search


    This PHP solution shows how to use a MySQLi prepared statement with a `SELECT`
    query; it also demonstrates binding the result to named variables.


    Copy `mysqli_prepared_01.php` from the `ch11` folder and save it in the `mysqli`
    folder as `mysqli_prepared.php`. It contains the same search form and results
