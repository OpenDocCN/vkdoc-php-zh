  {\n  $s = '';\n  $MAXSTRLEN = 64;\n  $trace_array = debug_backtrace();\n\n  for\
  \ ($i = 0; $i < $irrelevantFirstEntries; $i++)\n    array_shift($trace_array);\n\
  \n  $tabs = sizeof($trace_array) - 1;\n  foreach ($trace_array as $arr)\n  {\n \
  \   $tabs -= 1;\n    if (isset ($arr['class']))\n      $s .= $arr['class'] . '.';\n\
  \    $args = array ();\n    if (!empty ($arr['args']))\n      foreach ($arr['args']as\
  \ $v)\n      {\n        if (is_null($v))\n          $args[] = 'null';\n        elseif\
  \ (is_array($v))\n          $args[] = 'Array[' . sizeof($v) . ']';\n        elseif\
  \ (is_object($v))\n          $args[] = 'Object: ' . get_class($v);\n        elseif\
