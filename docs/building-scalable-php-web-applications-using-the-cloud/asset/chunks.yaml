- fmt: '# 10.1 Using Amazon Lightsail


    While most of this book has focused on hosting your application on Linode, since
    so much of the cloud hosting is based on AWS, I think it is worthwhile to look
    at some of the hosting options on AWS.


    One of the issues with AWS is simply its massive number of options. The number
    of options available actually makes it quite difficult to administer.


    As an example of this, one time I was working on a team and needed access to the
    logs. After much searching, we finally found the option to grant access to the
    log files. However, it turned out that *looking at* the log files was actually
    a *different* permission than the permission needed to *retrieve* the log files.
    So, while I had permission to *look at* the log files, I didn’t have permission
    to actually get them. They finally gave up fine-grained control and made me an
    administrator. That’s not to say that AWS doesn’t have this ability, it’s just
    that trying to manage it turns out to cost as much in time as effort as you might
    have saved doing it some other, less “automated” way. Having lots of options and
    trying to be everything to everyone can easily make it so that you drown in options
    and settings that no one has the time and opportunity to master.


    There are so many fine-grained controls, each with their own issues, quirks, and
    bugs. The number of different platforms and systems that AWS “supports” is very
    large. However, I find that oftentimes there are large holes in that support,
    which, while they can be worked around, the workarounds sometimes make me wish
    that I had just done it all manually to begin with.


    Amazon’s first foray into cloud hosting is called EC2—the Elastic Compute Cloud.
    Like most of AWS, this is a very flexible option for cloud hosting. However, it
    suffers from the problem inherent in a lot of AWS—it is really complicated to
    set up and use successfully. Not only is the setup complicated, the *pricing*
    is ridiculously complicated. They charge you not only for computer time but also
    for hardware I/O requests. That’s right, they keep track *and bill you* for the
    number of hard drive accesses.


    In order to better compete with easier-to-use services like Linode and DigitalOcean,
    AWS introduced Amazon Lightsail. Lightsail’s feature set and pricing structure
    is very similar to what we have looked at on Linode. Lightsail is accessible from
    the same AWS management console that contains CloudFront and S3. Just search for
    Lightsail, and the dashboard should look similar to Figure [10-1](#487291_1_En_10_Chapter.xhtml#Fig1).


    There are a few minor differences between Lightsail and Linode to be aware of
    for our purposes:


    1. Lightsail instances by default connect via a public key instead of a password,
    and connect you to a regular user instead of connecting as `root`.

    2. Lightsail’s CentOS distribution has a slightly different set of preinstalled
    packages than Linode.


    ![../images/487291_1_En_10_Chapter/487291_1_En_10_Fig1_HTML.jpg](images/487291_1_En_10_Chapter/487291_1_En_10_Fig1_HTML.jpg)


    Figure 10-1 The Initial Dashboard of Amazon Lightsail


    3. All Lightsail instances are automatically added to Amazon’s private network.
    In fact, when you are on the box, the *only* IP address you see is the private
    network address. The external IP that you receive just gets routed to that internal
    IP address.

    4. Backups of Lightsail instances have to be made manually.

    5. Lightsail has a separate database service that you can use if you don’t want
    to manage your database server yourself.


    To launch and set up a new instance, click the “Create Instance” button. This
    brings you to a screen similar to Figure [10-2](#487291_1_En_10_Chapter.xhtml#Fig2).


    Here, you will need to choose the datacenter (instance location) which will host
    your node. This is slightly different than Linode, as AWS has both datacenters
    and *availability zones*. In AWS, datacenters are organized into multiple availability
    zones. These zones can easily share resources for load balancing, but each availability
    zone has a separate line for power and external Internet connections. Essentially,
    they act like they are in the same datacenter, but servers in different availability
    zones are unlikely to be affected by the same event (such as loss of power or
    Internet). So, for instance, you could have your master database in one availability
    zone, and a replica database in another. Then, if the availability zone of your
    master goes down, the replica (since it is in a different availability zone) can
    be promoted and serve as the master.


    ![../images/487291_1_En_10_Chapter/487291_1_En_10_Fig2_HTML.jpg](images/487291_1_En_10_Chapter/487291_1_En_10_Fig2_HTML.jpg)


    Figure 10-2 Creating a Lightsail Instance


    The platform we want to choose is “Linux/Unix.” Then, select “OS Only” (the other
    options allow for preconfigured servers for specific tasks). After that, select
    “CentOS.” Scrolling down, you can ignore most of the other questions, and select
    whichever size of node you wish. Then, to identify your instance, call it `template-node`
    as we did before. Click “Create Instance” to create the machine.


    It may take AWS a while to create your machine. When it does, you can click the
    machine, and you will get a dashboard similar to Figure [10-3](#487291_1_En_10_Chapter.xhtml#Fig3).
    To log in, just click the button labeled “Connect Using SSH.” This will bring
    up a terminal window, with you connected to the node as the user `centos`.


    You can use this `centos` user in place of the `fred` user in the examples in
    this book. Or, you can go ahead and create `fred` when requested. You will still
    need to use the box as `root` to configure it, however. To log in as `root`, just
    issue the command:


    ```

    sudo su -

    ```


    ![../images/487291_1_En_10_Chapter/487291_1_En_10_Fig3_HTML.jpg](images/487291_1_En_10_Chapter/487291_1_En_10_Fig3_HTML.jpg)


    Figure 10-3 Lightsail Node Dashboard


    And now your session will be as the `root` user.


    Lightsail nodes come with a slightly different set of packages than Linode nodes.
    To get your Lightsail node similar to the starting point of Linode’s system, issue
    the following commands:


    ```

    yum install -y nano

    yum install -y firewalld

    systemctl start firewalld

    systemctl enable firewalld

    ```


    From this point, you can follow the node setup instructions from Chapters [3](#487291_1_En_3_Chapter.xhtml)
    and [4](#487291_1_En_4_Chapter.xhtml) essentially identically.


    In Chapter [5](#487291_1_En_5_Chapter.xhtml), the mechanism for creating new instances
    from backups is only slightly different. In Lightsail, backups are created using
    the “Snapshots” feature. All you have to do is go to the “Snapshots” tab of your
    node, give your snapshot a name, and create it. Once created, you can create a
    new node from this snapshot as shown in Figure [10-4](#487291_1_En_10_Chapter.xhtml#Fig4).
    Load balancers can be created from Lightsail under the “Networking” tab off of
    the main screen.


    ![../images/487291_1_En_10_Chapter/487291_1_En_10_Fig4_HTML.jpg](images/487291_1_En_10_Chapter/487291_1_En_10_Fig4_HTML.jpg)


    Figure 10-4 Creating a Node from a Snapshot


    After that, the rest of the information about creating a cloud doesn’t change,
    as it is all about what happens on the nodes themselves.'
