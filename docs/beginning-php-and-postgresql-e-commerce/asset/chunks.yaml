    \ 10:56 PM Page 212\n\n**212** C H A P T E R 7 ■ C ATA L O G A D M I N I S T R\
    \ AT I O N\n\n■**Note** As stated earlier, in Chapter 11, you’ll learn about hashing\
    \ and how to work with hashed passwords stored in the database. If you want to\
    \ use hashing now, you need to store the hash value of the password in the config\
    \ file instead of storing the password in clear text (`hatshopadmin`, in this\
    \ case). At login time, you compare the hash value of the string entered by the\
    \ user to the hash value you saved in the config file. You can calculate the hash\
    \ value of a string by applying the `sha1` function to it (the `sha1` function\
    \ calculates the hash value using the SHA-1 algorithm). Don’t worry if this sounds\
    \ too advanced at this moment, Chapter 11 will show you the process in more detail.\n\
    \n**7.** Now we’ll create the `admin_login` componentized template to supervise\
    \ the login moment. Let’s start by creating the `presentation/templates/admin_login.tpl`\
    \ file and then add the following code to it:\n\n```smarty\n{* admin_login.tpl\
    \ *}\n{load_admin_login assign=\"admin_login\"}\n<br /><br />\n<div id=\"admin_login_box\"\
    >\n<span class=\"admin_title\">HatShop Login</span>\n<br /><br />\n<span class=\"\
    admin_page_text\">\nEnter login information or go back to\n<a href=\"{\"index.php\"\
    |prepare_link:\"http\"}\">storefront</a>\n</span>\n<br />\n{if $admin_login->mLoginMessage\
    \ neq ''}\n<br />\n<span class=\"admin_error_text\">{$admin_login->mLoginMessage}</span>\n\
    <br />\n{/if}\n<br />\n<form method=\"post\" action=\"{\"admin.php\"|prepare_link:\"\
    https\"}\"> Username:\n<input type=\"text\" name=\"username\" value=\"{$admin_login->mUsername}\"\
    \ />\nPassword:\n<input type=\"password\" name=\"password\" value=\"\" />\n<br\
    \ /><br />\n<input type=\"submit\" name=\"submit\" value=\"Login\" />\n</form>\n\
    </div>\n```\n\n**8.** Create a new Smarty function plugin file named `function.load_admin_login.php`\
    \ in the `presentation/smarty_plugins` folder with the following code in it:\n\
    \n```php\n<?php\n/* Smarty plugin function that gets called when the\nload_admin_login\
    \ function plugin is loaded from a template */\n\nfunction smarty_function_load_admin_login($params,\
    \ $smarty)\n{\n  // Create AdminLogin object\n  $admin_login = new AdminLogin();\n\
    \n  // Assign template variable\n  $smarty->assign($params['assign'], $admin_login);\n\
    }\n\n// Class that deals with authenticating administrators\nclass AdminLogin\n\
    {\n  // Public variables available in smarty templates\n  public $mUsername;\n\
    \  public $mLoginMessage = '';\n\n  // Class constructor\n  public function __construct()\n\
    \  {\n    // Verify if the correct username and password have been supplied\n\
    \    if (isset ($_POST['submit']))\n    {\n      if ($_POST['username'] == ADMIN_USERNAME\n\
    \          && $_POST['password'] == ADMIN_PASSWORD)\n      {\n        $_SESSION['admin_logged']\
    \ = true;\n        header('Location: admin.php');\n        exit;\n      }\n  \
    \    else\n        $this->mLoginMessage = 'Login failed. Please try again:';\n\
    \    }\n  }\n}\n?>\n```\n\n**9.** Create the `presentation/templates/admin_menu.tpl`\
    \ file, and add the following code:\n\n```smarty\n{* admin_menu.tpl *}\n<span\
    \ class=\"admin_title\">HatShop Admin</span>\n<span class=\"menu_text\"> |\n \
    \ <a href=\"{\"admin.php\"|prepare_link:\"https\"}\">CATALOG ADMIN</a> |\n  <a\
    \ href=\"{\"index.php\"|prepare_link:\"http\"}\">STOREFRONT</a> |\n  <a href=\"\
    {\"admin.php?Page=Logout\"|prepare_link:\"https\"}\">LOGOUT</a> |\n</span>\n<br\
    \ />\n```\n\n**10.** Load `index.php` in your favorite browser page, and you’ll\
    \ see the admin page link in the welcome message. Click it, and an HTML login\
    \ form will be displayed; Figure 7-8 shows the message you’ll get if you type\
    \ in the wrong password."
