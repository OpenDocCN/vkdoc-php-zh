    \ use this:\n\n```\n</tr>\n<?php while($row = $result->fetch_assoc()) { ?>\n<tr>\n\
    ```\n\nFor PDO, use this:\n\n```\n</tr>\n<?php while ($row = $result->fetch())\
    \ { ?>\n<tr>\n```\n\nThis is the same as in the previous chapter, so it should\
    \ need no explanation.\n\nDisplay the `created` and `title` fields for the current\
    \ record in the first two cells of the second row, like this:\n\n```\n<td><?=\
