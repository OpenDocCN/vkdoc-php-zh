    \ 2) . \"\\n\";\necho $return = $client->Multiply(5, 2) . \"\\n\";\n```\n\n在客户端示例中，wsdl\
    \ 文件是从服务端加载的。也可以本地加载以节省一次网络请求，但 soap 客户端支持缓存 wsdl 文件，避免每次请求都重新加载。缓存通常存储在 `/tmp`\
    \ 目录中，如果服务端更新了 wsdl 文件，必须手动清除缓存。\n\n## 第 14 章：XML、RSS、WDDX 与 SOAP\n\n通过使用 wsdl\
    \ 文件，客户端代码变得更像“普通”的 PHP 代码。加载 wsdl 文件后，`SoapClient` 会为其中定义的每个方法创建魔术函数，现在可以直接调用这些函数。\n\
