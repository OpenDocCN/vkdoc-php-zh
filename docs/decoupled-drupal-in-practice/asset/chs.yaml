  在整个章节的示例中，假设您要么手动创建了内容，要么使用 Devel Generate 自动生成了内容，这些步骤我们将在第 7 章中进行。


  有关 CouchDB 发出的响应标头的信息，请参阅 [`http://docs.couchdb.org/en/latest/api/basics.html`](http://docs.couchdb.org/en/latest/api/basics.html)
  提供的 CouchDB 文档。


