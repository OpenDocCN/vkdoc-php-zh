  \  ```\n    $error\";\n    } elseif (isset($_GET['expired'])) { ?>\n    您的会话已过期。请重新登录。\n\
  \n    ```\n\n    如果 URL 的查询字符串中包含名为 `expired` 的参数，则会显示此消息。\n\n3.  打开 `menu.php`，剪切\
