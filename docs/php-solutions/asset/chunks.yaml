    ### Creating delete scripts without foreign-key constraints


    If you can’t use InnoDB tables, you need to build the same logic into your own
    delete scripts. To achieve the same effect as `ON DELETE CASCADE`, run two consecutive
    `DELETE` queries, like this:


    `$sql = ''DELETE FROM article2cat WHERE article_id = ?'';`


    `$stmt->prepare($sql);`


    `$stmt->bind_param(''i'', $_POST[''article_id'']);`


