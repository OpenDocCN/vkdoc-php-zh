    \ MyClass;\n// Checks the result:\n$obj->set(123);\n$obj->show();\n?>\n```\n\n\
    **清单 9-3** 接口继承\n\n以下是程序执行的结果。\n\n```\nThe output of the program (from Listing\
    \ 9-3)\n$num = 123\n```\n\n这个例子与前一个类似，但存在一个本质区别。如前所述，声明了带有`show()`方法的`Alpha`接口。`Bravo`接口声明了`set()`方法。但除此之外，`Bravo`接口还继承了`Alpha`接口。因此，`Bravo`接口隐式获得了`show()`方法和`set()`方法。相应地，实现`Bravo`接口的`MyClass`类必须包含（并且确实包含）`set()`和`show()`方法的描述。\n\
    \n> **注意**\n> 一个接口继承另一个接口，然后由类来实现这种方案并不好。我们通过例子来解释这一点。特别是，`Bravo`接口只明确声明了`set()`方法。你必须追溯接口继承链才能理解在实现该接口时必须定义`show()`方法。这不太理想。第一种方案，即类实现两个不同的接口，要方便得多，因为你可以立即识别出需要在类中实现的内容。\n\
    \n## 类继承与接口实现\n\n一个类可以继承另一个类并同时实现一个或多个接口。在这种情况下，在类描述中，类名之后依次放置`extends`关键字、被继承的类名、`implements`关键字以及要实现的接口名称。清单\
    \ 9-4 展示了这样一个示例。\n\n```\n    number=$number;\n    }\n    function show(){\n  \
    \      echo \"\\$number = \",$this->number,\"\\n\";\n    }\n}\n// Creates an object:\n\
    $obj=new MyClass;\n// Checks the result:\n$obj->set(123);\n$obj->show();\n?>\n\
    ```\n\n**清单 9-4** 类继承与接口实现\n\n以下是程序执行的结果。\n\n```\nThe output of the program (from\
    \ Listing 9-4)\n$number = 123\n```\n\n该程序描述了带有`$number`字段的`Base`类。此外，还声明了带有`show()`方法的`Alpha`接口和带有`set()`方法的`Bravo`接口。`MyClass`类继承了`Base`类并实现了`Alpha`和`Bravo`接口。`$number`字段从`Base`类继承到`MyClass`类中，以便在`set()`和`show()`方法的描述中可以引用它。`$obj`对象是基于`MyClass`类创建的，因此它拥有`$number`字段以及`show()`和`set()`方法。\n\
    \n## 特征（Traits）\n类的继承和接口的实现都解决了一个战略性问题：代码复用。还有另一种语法结构专门用于解决这个问题，那就是**特征**。\n\n\
    特征是一段可用于“构建”类的代码块。特征本身并不独立发挥作用，但你可以通过组合它们来得到一个类。特征的描述方式如下：使用`trait`关键字，然后在花括号内放置特征代码块。这是当你包含该特征时，会被添加到类中的代码块。要在类中包含特征，需要在类体中使用`use`指令，然后列出要包含的特征，用逗号分隔。清单\
    \ 9-5 展示了其实际用法。\n\n```\n    number,\"\\n\";\n        echo \"\\$symbol = \",$this->symbol,\"\
    \\n\";\n    }\n}\n// The second trait:\ntrait Second{\n    function set($number,$symbol){\n\
    \        $this->number=$number;\n        $this->symbol=$symbol;\n    }\n}\n//\
    \ Including the traits in the class:\nclass MyClass{\n    use First,Second;\n\
    \    private $symbol;\n    function __construct($number,$symbol){\n        $this->set($number,$symbol);\n\
    \        $this->show();\n    }\n}\n// Creates an object of the class:\n$obj=new\
    \ MyClass(100,'A');\n?>\n```\n\n**清单 9-5** 初识特征\n\n以下是程序的输出。\n\n```\nThe output\
    \ of the program (from Listing 9-5)\n$number = 100\n$symbol = A\n```\n\n程序的核心是创建`MyClass`类（然后基于该类创建`$obj`对象）。但这个类是“分部分”“组装”起来的。具体来说，描述了两个特征（`First`和`Second`）。`First`特征包含了私有字段`$number`的声明以及`show()`方法。调用该方法时，会显示`$number`和`$symbol`字段的值（`$symbol`字段未在特征中声明）。`Second`特征描述了带有两个参数的`set()`方法。调用时，该方法会将值赋给`$number`和`$symbol`字段（这些字段未在特征中声明）。`MyClass`类的描述以`use\
    \ First,Second`指令开始，该指令将`First`和`Second`特征的内容添加到类中。\n\n> **注意**\n> 情况就像是`First`和`Second`特征的内容被直接写入了`MyClass`类体中一样。\n\
    \n除了特征之外，在类中还声明了私有字段`$symbol`。同时，在类中还描述了一个带两个参数的构造函数。在构造函数中调用了`set()`和`show()`方法，以便为`$number`和`$symbol`字段赋值，然后显示这些字段的值。因此，创建`MyClass`类对象的命令`$obj=new\
    \ MyClass(100,'A')`会自动显示一条消息。\n\n## 对象类型控制\n"
- fmt: '在某些情况下，确保程序中使用的对象属于特定类或实现特定接口非常重要。为什么需要这样做？例如，你描述了一个函数，并计划将一个对象作为参数传递给它，然后调用该对象的某个方法。该对象需要拥有该方法。你如何保证这一点？一种方法是在函数描述中显式指定参数类型。但如果只指定类名，那么只能将该类（或其子类）的对象作为参数传递给此类函数。还有一种更“精细”的方法。它包括创建一个接口，在其中声明所需的方法。然后，创建一个参数类型为接口名称的函数。如果是这样，任何实现该接口的类的对象都可以作为该函数的参数传递。对象实现了接口这一事实保证了该对象拥有所需的方法。


    详情 |


    | --- | --- | --- |


    你可以创建一个包含声明方法的抽象类。如果将该抽象类的名称指定为函数参数类型，则任何继承该抽象类的类的对象都可以作为函数参数传递。


    所描述的方法在清单[9-6](#613529_1_En_9_Chapter.xhtml#PC11)所示的程序中实现。


    ```

    show();

    }

    // 创建对象：

    $A=new Alpha();

    $B=new Bravo();

    // 将对象作为参数传递给函数：

    display($A);

    display($B);

    ?>

    清单 9-6

    接口作为函数参数类型

    ```


    该程序描述了`MyInterface`接口，其中声明了`show()`方法。它还创建了两个类：`Alpha`和`Bravo`，它们实现了`MyInterface`接口。`display()`函数有一个参数，其类型为`MyInterface`。这意味着你可以将实现`MyInterface`接口的类的对象作为参数传递给该函数。这确保了作为参数的对象拥有`show()`方法。在函数体中，会从传入的对象参数调用该方法。


    为了检查`display()`函数是否正确运行，首先传递一个`Alpha`类的对象作为参数调用它，然后传递一个`Bravo`类的对象调用它。下面显示了程序的执行结果。


    ```

    程序输出 (来自清单 9-6)

    The class Alpha

    The class Bravo

    ```


    通过为函数参数指定接口类型，你为潜在的函数参数设置了一个“过滤器”。


    一个圆形图标，中心有一个字母 i。注意


    如果你尝试将一个未实现`MyInterface`接口的类的对象传递给`display()`函数，就会出错。即使该类包含`show()`方法，也会发生这种情况。


    还有另一种检查参数类型的方法，其在后果方面没有那么严重。它基于使用`instanceof`指令，该指令可用于检查对象是否属于特定类型。清单[9-7](#613529_1_En_9_Chapter.xhtml#PC13)是前一个程序的版本，但这次没有显式指定`display()`函数的参数类型。相反，在函数体内检查参数类型。


    ```

    show();

    }else{

    echo "参数类型错误\n";

    }

    }

    // 创建对象：

    $A=new Alpha();

    $B=new Bravo();

    // 将对象作为参数传递给函数：

    display($A);

    display($B);

    ?>

    清单 9-7

    检查参数类型

    ```


    程序的执行结果如下。


    ```

    程序输出 (来自清单 9-7)

    The class Alpha

    参数类型错误

    ```


    与之前的示例（来自清单[9-6](#613529_1_En_9_Chapter.xhtml#PC11)）不同，`Bravo`类包含`show()`方法的描述，但它没有实现`MyInterface`接口。同时，`display()`函数描述中也没有指定参数类型。但在函数体内，你使用了一个条件语句。它检查`$obj
    instanceof MyInterface`条件。如果函数的`$obj`参数是`MyInterface`类型，则该条件为真。也就是说，如果创建`$obj`对象所基于的类实现了`MyInterface`接口，条件为真。在这种情况下，会从`$obj`对象调用`show()`方法。否则，执行`echo
    "参数类型错误\n"`命令。


    ## 命名空间


    命名空间的概念是通用的，并在许多编程语言中使用。为了理解它，让我们考虑一个与编程无关的虚构场景。假设一个学生群体中有两个学生同名（相同的姓、名和中间名）。在官方文件中区分这些学生将非常困难。但是，如果你按小组划分整个学生群体，并将同名者分配到不同的组中，那么学生识别的情况就会得到显著改善。使用命名空间时也会发生类似的事情。命名空间类似于学生组。在命名空间内，类、函数和其他工具应该是可区分的，或者换句话说，应该具有唯一的名称。但是，例如，如果函数属于不同的命名空间，它们可以有相同的名称。


    要将程序包含到命名空间中，你在程序中添加`namespace`指令，然后放置命名空间的名称。该指令必须是代码中的第一个命令。然后，如果你想将某些工具包含到另一个程序中，你必须使用`require_once`指令来添加包含命名空间的文件。当引用来自导入命名空间的类、函数和其他工具时，你将命名空间名称和反斜杠`\`放在类或函数名称之前。


    让我们分析一个创建和使用命名空间的小例子。`MyUtils`命名空间的描述如清单[9-8](#613529_1_En_9_Chapter.xhtml#PC15)所示。


    ```

    清单 9-8

    创建命名空间

    ```


    代码以`namespace MyUtils`指令开始，这意味着接下来的`MyClass`类和`hello()`函数属于`MyUtils`命名空间。假设该代码写入到`listing09_08.php`文件中。


    下一步是使用创建的`MyUtils`命名空间。发生这种情况的代码如清单[9-9](#613529_1_En_9_Chapter.xhtml#PC16)所示。


    ```

    show();

    // 调用程序中描述的函数：

    hello();

    // 从导入的命名空间中调用函数：

    MyUtils\hello();

    ?>

    清单 9-9

    使用命名空间

    ```


    程序以`require_once "listing09_08.php"`指令开始，该指令导入了`listing09_08.php`文件的内容。程序还描述了`hello()`函数。该函数的名称与来自`MyUtils`命名空间的函数名称相同。要基于来自`MyUtils`命名空间的`MyClass`类创建对象，请使用`$obj=new
    MyUtils\MyClass()`命令。这里，你引用类的方式值得注意：除了类名之外，你还指定了命名空间名称（`MyUtils\MyClass`表达式）。然后，你可以对创建的对象执行标准操作。例如，`$obj->show()`命令从`$obj`对象调用`show()`方法。


    `hello()`命令调用直接在程序中描述的函数。要调用来自`MyUtils`命名空间的函数，请使用`MyUtils\hello()`命令。程序的执行结果如下。


    ```

    程序输出 (来自清单 9-9)

    The class MyClass

    The function hello()

    The namespace MyUtils

    ```'
  raw: 'In some cases, ensuring that the object used in a program

    belongs to a specific class or implements a particular interface is

    important. Why is that necessary? For example, you describe a function

    and plan to pass an object as an argument to it, then call a certain

    method from the object. The object needs to have that method. How can

    you guarantee that? One way is to specify the argument type in the

    function description explicitly. But if you just specify the name of the

    class, then you can pass objects of that class only (or its child

    classes) as an argument to such a function. There is a more “refined”

    approach. It consists in creating an interface in which the needed

    method is declared. Then, you create a function with an

    argument whose type is the interface’s name. If so, an object of any

    class implementing that interface can be passed as an argument of the

    function. The fact that the object implements the interface guarantees

    that the object has the needed method.


    Details |


    | --- | --- | --- |


    You can create an abstract class with a declared method. If you specify the name
    of

    that abstract class as a function argument type, you can pass an object

    of any class that inherits the abstract class as a function

    argument. |


    The described approach is implemented in the program shown in Listing

    [9-6](#613529_1_En_9_Chapter.xhtml#PC11).


    ```

    show();

    }

    // Creates objects:

    $A=new Alpha();

    $B=new Bravo();

    // Passes the objects to the function as an argument:

    display($A);

    display($B);

    ?>

    Listing 9-6

    An Interface as a Type of Function Argument

    ```


    The program describes the `MyInterface` interface, in which the

    `show()` method

    is declared. It also creates two classes, `Alpha` and `Bravo`, implementing

    the `MyInterface`

    interface. The `display()` function

    has one argument whose type is `MyInterface`. That

    means you can pass objects of the classes that implement the `MyInterface` interface

    as an argument to the function. That ensures the object being the

    argument has the `show()` method. The method is

    called in the function from the object passed as an argument.


    To check if the `display()` function

    operates correctly, you first call it by passing an object of the `Alpha` class
    as an

    argument, and then you call it by passing an object of the `Bravo` class. The

    following shows the result of the program execution.


    ```

    The output of the program (from Listing 9-6)

    The class Alpha

    The class Bravo

    ```


    By specifying an interface type for the function argument, you set a

    “filter” for the potential function arguments.


    A circular icon

    reads a letter i at the center.Note


    An error arises if you try to pass an object of the class that does

    not implement the `MyInterface` interface

    to the `display()` function.

    It happens even if that class contains the `show()` method.


    There is another way to check the type of argument, which is not as

    tragic in terms of consequences. It is based on the use of the `instanceof` instruction,
    which can

    be exploited to check if an object is of a specific type. Listing [9-7](#613529_1_En_9_Chapter.xhtml#PC13)
    is a version of

    the previous program, but this time, the type of the `display()` function

    argument is not explicitly specified. Instead, the argument type is

    checked in the function’s body.


    ```

    show();

    }else{

    echo "The argument type error\n";

    }

    }

    // Creates objects:

    $A=new Alpha();

    $B=new Bravo();

    // The object is passed as an argument to the function:

    display($A);

    display($B);

    ?>

    Listing 9-7

    Checking the Argument Type

    ```


    The result of the program execution is as follows.


    ```

    The output of the program (from Listing 9-7)

    The class Alpha

    The argument type error

    ```


    Unlike the previous example (from Listing [9-6](#613529_1_En_9_Chapter.xhtml#PC11)),
    the `Bravo` class contains

    a description of the `show()` method, but it

    does not implement the `MyInterface` interface. Also, the

    `display()`

    function description does not specify the argument type. But in the body

    of the function, you use a conditional statement. It checks the `$obj instanceof
    MyInterface` condition. It is true if the `$obj` argument of the

    function is of the type `MyInterface`. That is

    so if the class based on which the `$obj` object was

    created implements the `MyInterface`

    interface. In that case, the `show()` method is

    called from the `$obj` object.

    Otherwise, the `echo "The argument type error\n"` command is executed.


    A Namespace

    The concept of a namespace is universal and is used in many

    programming languages. To understand it, let’s consider an imaginary

    situation unrelated to programming. Suppose a

    student community has two students whose names are identical (the same

    first, last, and middle names). It would be challenging to distinguish

    these students in the official documents. But if you separate the whole

    student community by groups and distribute the namesakes into different

    groups, then the situation with student identification significantly

    improves. Something similar happens when using namespaces. A namespace

    is an analogy to a group of students. Within the namespace, classes,

    functions, and other utilities should be distinguishable or, in other

    words, should have unique names. But if, for example, functions belong

    to different namespaces, they may have the same names.

    To include a program into a namespace, you add the `namespace` instruction

    into the program and then put the name of the namespace.

    The instruction must be the first command in the code. Then, if you want

    to include some utilities in another program, you have to use the `require_once`

    instruction to add the file that contains the namespace. When referring

    to classes, functions, and other utilities from the imported namespace,

    you put the namespace name and the backslash `\` before the class or

    function name.


    Let’s analyze a small example in which a namespace is created and used.

    A description of the `MyUtils` namespace is

    shown in Listing [9-8](#613529_1_En_9_Chapter.xhtml#PC15).


    ```

    Listing 9-8

    Creating a Namespace

    ```


    The code begins with the `namespace MyUtils`

    instruction, which means that the following `MyClass` class and the

    `hello()` function belong to the `MyUtils` namespace. It

    is assumed that the code is written to the `listing09_08.php`

    file.


    The next step uses the created `MyUtils` namespace.

    The code in which that happens is shown in Listing [9-9](#613529_1_En_9_Chapter.xhtml#PC16).


    ```

    show();

    // Calls the function described in the program:

    hello();

    // Calls the function from the imported namespace:

    MyUtils\hello();

    ?>

    Listing 9-9

    Using the Namespace

    ```


    The program begins with the `require_once "listing09_08.php"` instruction, which
    imports the contents of the

    `listing09_08.php`

    file. The program also describes the `hello()` function. The

    name of the function matches the name of the function from the `MyUtils`

    namespace.

    To create an object based on the `MyClass` class from

    the `MyUtils`

    namespace, use the `$obj=new MyUtils\MyClass()` command. Here, the way

    you refer to the class is remarkable: along with the name of the class,

    you specify the namespace name (the `MyUtils\MyClass`

    expression). Then, you can perform standard operations with the created

    object. For example, the `$obj->show()`

    command calls the `show()` method from

    the `$obj`

    object.


    The `hello()`

    command calls the function

    described directly in the program. To call the function from the `MyUtils` namespace,

    use the `MyUtils\hello()`

    command. The result of the program execution is as follows.


    ```

    The output of the program (from Listing 9-9)

    The class MyClass

    The function hello()

    The namespace MyUtils

    ```'
