    value of `$item`. This is another example of using a variable variable (see “Creating
    new variables dynamically” in [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html)).
    Each time the loop runs, `$item` contains the value of the current element in
    the `$expected` array. The first element is `name`, so `${$item}` dynamically
    creates a variable called `$name`. In effect, the conditional statement becomes
    this:


    `if (isset($name) && !empty($name)) {`


    `$val = $name;`


    `}`


    On the next pass through the loop, `${$item}` creates a variable called `$email`,
    and so on.


    Caution


    The vital point about this script is that it builds the message body only from
    items in the `$expected` array. You must list the names of all form fields in
    the `$expected` array for it to work.


    If a field that’s not specified as required is left empty, its value is set to
    “Not selected.” The code also processes values from multiple-choice elements,
    such as check-box groups and `<select>` lists, which are transmitted as subarrays
    of the `$_POST` array. The `implode()` function converts the subarrays into comma-separated
    strings.'
