    \ `<head>` 部分，类似于清单 9-4 和 9-5。在清单 9-4 中，请注意 `<html>` 元素上的 `prefix` 属性，该属性用于指示我们正在使用开放图谱模式。为简洁起见，我在清单\
    \ 9-5 的逻辑块中省略了文章模板的开放图谱标记。资源部分随课程捆绑的文件包含该部分的完整代码。\n\n```html\n<!-- ... 标签，样式表包含\
    \ ... -->\n{% include 'head-open-graph' %}\n```\n*清单 9-4 示例 layout/theme.liquid*\n\
    \n```html\n{% if template contains 'product' %}\n  {% for image in product.images\
    \ limit:6 %}\n    <meta property=\"og:image\" content=\"{{ image.src | img_url:\
    \ 'grande' }}\" />\n  {% endfor %}\n  {% if product.compare_at_price_max %}\n\
