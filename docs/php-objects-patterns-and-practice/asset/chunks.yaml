  trans: '

    # 条件语句


    在项目中，你完全有理由使用 `if` 和 `switch` 语句。不过，有时候这类结构也可能是在呼唤多态性。


    如果你发现自己在类中频繁测试某些条件，尤其是当这些测试在多个方法中都出现时，这可能是你的一个类应该拆分成两个或更多类的信号。要看看条件代码的结构是否暗示了那些可以表达为类的职责。这些新类应当实现一个共享的抽象基类。这样一来，你很可能还需要解决如何将正确的类传递给客户端代码的问题。我将在第
    9 章中介绍一些用于创建对象的模式。


    # UML


    在本书中，到目前为止，我一直让代码自己说话，并使用简短的示例来说明继承和多态等概念。


    这样做很有用，因为 PHP 是我们共同的语言：如果你读到这里，说明这门语言是我们共通的。然而，随着我们的示例在规模和复杂性上不断增长，仅用代码来阐述设计的宏观视野就变得有些荒谬了。仅凭几行代码很难看清全貌。


    UML 代表统一建模语言（Unified Modeling Language）。通常，在使用这些首字母缩写时，会与定冠词“the”连用。它不仅仅是一种统一的建模语言，它就是统一建模语言。


    也许这种权威性的口吻源于这门语言形成的过程。根据 Martin Fowler（《UML Distilled》，Addison-Wesley Professional，1999）的说法，UML
    是在面向对象设计社区的权威和精英们经历了多年智力与官僚层面的争论之后，才最终成为标准的。


    这场争论的成果是一种用于描述面向对象系统的强大图形语法。在本节中，我们只会触及皮毛，但你会很快发现，一点点 UML（抱歉，是一点点 the UML）就能发挥巨大作用。


    尤其是类图，它能够描述结构和模式，使得它们的含义一目了然。这种清晰的呈现方式在代码片段和要点列表中通常很难找到。


    ## 类图


    虽然类图只是 UML 的一个方面，但它们或许是最普遍使用的。由于它们在描述面向对象关系方面特别有用，我将在本书中主要使用它们。


    ### 表示类


    正如你所料，类是类图的主要组成部分。一个类由一个带有名称的方框表示（见图 6-1）。


    ![A314621_5_En_6_Fig1_HTML.gif](img/A314621_5_En_6_Fig1_HTML.gif)


    图 6-1. 一个类


    该类被分为三个部分，名称显示在第一部分。当我们只提供类名而不提供更多信息时，这些分割线是可选的。在设计类图时，我们可能会发现图 6-1 中的详细程度对于某些类来说已经足够。我们没有义务去表示每一个字段和方法，甚至也不需要在类图中画出每一个类。


    抽象类通过将类名设为斜体（见图 6-2）或在类名后添加 `{abstract}`（见图 6-3）来表示。第一种方法在两者中更为常见，但第二种方法在做笔记时更有用。


    ![A314621_5_En_6_Fig3_HTML.gif](img/A314621_5_En_6_Fig3_HTML.gif)


    图 6-3. 使用约束定义的抽象类


    ![A314621_5_En_6_Fig2_HTML.gif](img/A314621_5_En_6_Fig2_HTML.gif)


    图 6-2. 一个抽象类


    注意：`{abstract}` 这种语法是约束的一个例子。约束在类图中用于描述特定元素应如何使用。大括号内的文本没有特殊结构；它只是简要说明可能适用于该元素的任何条件。


    接口的定义方式与类相同，但接口必须包含一个构造型（即 UML 的一种扩展），如图 6-4 所示。


    ![A314621_5_En_6_Fig4_HTML.gif](img/A314621_5_En_6_Fig4_HTML.gif)


    图 6-4. 一个接口


    ### 属性


    广义上讲，属性描述了一个类的特性。属性列在类名正下方的部分中（见图 6-5）。


    ![A314621_5_En_6_Fig5_HTML.gif](img/A314621_5_En_6_Fig5_HTML.gif)


    图 6-5. 一个属性


    让我们仔细看看示例中的这个属性。开头的符号代表该属性的可见性级别，或称访问控制。表 6-1 显示了可用的三种符号。


    表 6-1. 可见性符号


    | 符号 | 可见性 | 说明 |

    | --- | --- | --- |

    | + | 公共（Public） | 对所有代码可用 |

    | - | 私有（Private） | 仅对当前类可用 |

    | # | 受保护（Protected） | 仅对当前类及其子类可用 |


    可见性符号后面跟着属性的名称。在这个例子中，我描述的是 `ShopProduct::$price` 属性。冒号用于分隔属性名称与其类型（以及可选的默认值）。


    再次提醒，你只需要包含为了清晰起见所必需的详细信息。


    ### 操作


    操作描述方法；或者更准确地说，它们描述可以在类的实例上调用的方法。图 6-6 显示了 `ShopProduct` 类中的两个操作。


    ![A314621_5_En_6_Fig6_HTML.gif](img/A314621_5_En_6_Fig6_HTML.gif)


    图 6-6. 操作


    正如你所见，操作使用的语法与属性类似。可见性符号位于方法名之前。参数列表括在圆括号中。如果有返回类型，则用冒号分隔。参数之间用逗号分隔，并遵循属性语法，即参数名称与其类型之间用冒号分隔。


    不出所料，这种语法相对灵活。你可以省略可见性标志和返回类型。参数通常仅由其类型表示，因为参数名称通常并不重要。


    ### 描述继承与实现


    UML 将继承关系描述为泛化（generalization）。这种关系由一条从子类指向其父类的线表示。这条线末端带有一个空心闭合箭头。


    图 6-7 显示了 `ShopProduct` 类与其子类之间的关系。


    ![A314621_5_En_6_Fig7_HTML.gif](img/A314621_5_En_6_Fig7_HTML.gif)


    图 6-7. 描述继承


    UML 将接口与实现它的类之间的关系描述为实现（realization）。因此，如果 `ShopProduct` 类实现了 `Chargeable` 接口，我们可以将其添加到我们的类图中，如图
    6-8 所示。


    ![A314621_5_En_6_Fig8_HTML.gif](img/A314621_5_En_6_Fig8_HTML.gif)


    图 6-8. 描述接口实现

    '
- fmt: '#### Associations


    Inheritance is only one of a number of relationships in an object-oriented system.
    An association occurs when a class property is declared to hold a reference to
    an instance (or instances) of another class.


    In Figure [6-9](#A314621_5_En_6_Chapter.html#Fig9), we model two classes and create
    an association between them.


    ![A314621_5_En_6_Fig9_HTML.gif](A314621_5_En_6_Fig9_HTML.gif)


    Figure 6-9. A class association


    At this stage, we are vague about the nature of this relationship. We have only
    specified that a `Teacher` object will have a reference to one or more `Pupil`
    objects, or vice versa. This relationship may or may not be reciprocal.


    You can use arrows to describe the direction of the association. If the `Teacher`
    class has an instance of the `Pupil` class but not the other way round, then you
    should make your association an arrow leading from the `Teacher` to the `Pupil`
    class. This association, which is called unidirectional, is shown in Figure [6-10](#A314621_5_En_6_Chapter.html#Fig10).


    ![A314621_5_En_6_Fig10_HTML.gif](A314621_5_En_6_Fig10_HTML.gif)


    Figure 6-10. A unidirectional association


    If each class has a reference to the other, you can use a double-headed arrow
    to describe a bidirectional relationship, as in Figure [6-11](#A314621_5_En_6_Chapter.html#Fig11).


    ![A314621_5_En_6_Fig11_HTML.gif](A314621_5_En_6_Fig11_HTML.gif)


    Figure 6-11. A bidirectional association


    You can also specify the number of instances of a class that are referenced by
    another in an association. You do this by placing a number or range beside each
    class. You can also use an asterisk (`*`) to stand for any number. In Figure [6-12](#A314621_5_En_6_Chapter.html#Fig12),
    there can be one `Teacher` object and zero or more `Pupil` objects.


    ![A314621_5_En_6_Fig12_HTML.gif](A314621_5_En_6_Fig12_HTML.gif)


    Figure 6-12. Defining multiplicity for an association


    In Figure [6-13](#A314621_5_En_6_Chapter.html#Fig13), there can be one `Teacher`
    object and between five and ten `Pupil` objects in the association.


    ![A314621_5_En_6_Fig13_HTML.gif](A314621_5_En_6_Fig13_HTML.gif)


    Figure 6-13. Defining multiplicity for an association


    #### Aggregation and Composition


    Aggregation and composition are similar to association. All describe a situation
    in which a class holds a permanent reference to one or more instances of another.
    With aggregation and composition, though, the referenced instances form an intrinsic
    part of the referring object.


    In the case of aggregation, the contained objects are a core part of the container,
    but they can also be contained by other objects at the same time. The aggregation
    relationship is illustrated by a line that begins with an unfilled diamond.


    In Figure [6-14](#A314621_5_En_6_Chapter.html#Fig14), I define two classes: `SchoolClass`
    and `Pupil`. The `SchoolClass` class aggregates `Pupil`.


    ![A314621_5_En_6_Fig14_HTML.gif](A314621_5_En_6_Fig14_HTML.gif)


    Figure 6-14. Aggregation


    Pupils make up a class, but the same `Pupil` object can be referred to by different
    `SchoolClass` instances at the same time. If I were to dissolve a school class,
    I would not necessarily delete the pupil, who may attend other classes.


    Composition represents an even stronger relationship than this. In composition,
    the contained object can be referenced by its container only. It should be deleted
    when the container is deleted. Composition relationships are depicted in the same
    way as aggregation relationships, except that the diamond should be filled (see
    Figure [6-15](#A314621_5_En_6_Chapter.html#Fig15)).


    ![A314621_5_En_6_Fig15_HTML.gif](A314621_5_En_6_Fig15_HTML.gif)


    Figure 6-15. Composition


    A `Person` class maintains a reference to a `SocialSecurityData` object. The contained
    instance can belong only to the containing `Person` object.


    #### Describing Use


    The use relationship is described as a dependency in the UML. It is the most transient
    of the relationships discussed in this section because it does not describe a
    permanent link between classes.


    A used class may be passed as an argument or acquired as a result of a method
    call.


    The `Report` class in Figure [6-16](#A314621_5_En_6_Chapter.html#Fig16) uses a
    `ShopProductWriter` object. The use relationship is shown by the broken line and
    open arrow that connects the two. It does not, however, maintain this reference
    as a property in the same way that a `ShopProductWriter` object maintains an array
    of `ShopProduct` objects.


    ![A314621_5_En_6_Fig16_HTML.gif](A314621_5_En_6_Fig16_HTML.gif)


    Figure 6-16. A dependency relationship


    #### Using Notes


    Class diagrams can capture the structure of a system, but they provide no sense
    of process. Figure [6-16](#A314621_5_En_6_Chapter.html#Fig16) tells us about the
    classes in our system. From Figure [6-16](#A314621_5_En_6_Chapter.html#Fig16),
    you know that a `Report` object uses a `ShopProductWriter`, but you don’t know
    the mechanics of this. In Figure [6-17](#A314621_5_En_6_Chapter.html#Fig17), I
    use a note to clarify things somewhat.


    ![A314621_5_En_6_Fig17_HTML.gif](A314621_5_En_6_Fig17_HTML.gif)


    Figure 6-17. Using a note to clarify a dependency


    As you can see, a note consists of a box with a folded corner. It will often contain
    scraps of pseudo-code.


    This clarifies Figure [6-16](#A314621_5_En_6_Chapter.html#Fig16); you can now
    see that the `Report` object uses a `ShopProductWriter` to output product data.
    This is hardly a revelation, but use relationships are not always so obvious.
    In some cases, even a note might not provide enough information. Luckily, you
    can model the interactions of objects in your system, as well as the structure
    of your classes.'
  raw: '#### Associations


    Inheritance is only one of a number of relationships in an object-oriented system.
