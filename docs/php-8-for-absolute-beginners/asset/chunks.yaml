  trans: '

    ### 包含模板


    我们的模板是库中的第一个条目。*库* 是指一组可在其他程序中重复使用的现有代码。要在 `newindex.php` 文件中使用该模板，我们需要将其引入到程序中。PHP
    提供了四种可用于从库中访问信息的指令。


    - `include`：该指令会尝试从调用程序中插入库文件的代码。如果库文件不存在，该命令不会引发错误。如果程序中多次尝试插入同一个库文件，该指令也不会引发错误。

    - `include_once`：该指令会尝试插入库文件的代码。如果库文件不存在，它不会引发错误。但是，如果同一程序多次尝试插入同一个库文件，它不会再次将其包含进来。

    - `require`：当尝试包含一个不存在的库文件时，该指令会引发错误。但是，如果在同一程序中多次尝试包含同一个库文件，它不会引发错误。

    - `require_once`：如果尝试使用一个不存在的库文件，或者在同一程序中多次尝试使用一个现有的库文件，它将不会再次将其包含进来。


    如果 `page.php` 文件不存在，我们的程序将无法正常运行。从逻辑上讲，我们会使用 `require` 或 `require_once` 指令，因为这些内容是必需的。由于我们的程序很短，我们不必担心多次尝试使用
    `page.php` 文件。无论如何，这都不会造成什么危害，因为库文件只会将 `$page` 变量重置为我们正在使用的相同内容。我们可以放心地使用 `require`
    命令。


    ### 安全编程


    在学习 PHP 基础知识的同时，我们应始终尝试创建*安全的程序*。程序员应花时间在包含库文件时选择最安全的选项。文件始终有可能缺失。缺失库文件会使程序无法运行吗？如果是这样，请使用
    `require` 指令之一。否则，请使用 `include` 指令之一。如果在程序中多次包含同一个库文件会潜在危害程序的运行结果，请使用带有 `once`
    选项的命令之一。目前，以我们的编程技能，任何引发的错误都会显示在浏览器中。对于在线站点来说，这个示例被认为是不安全的。我们将在后续章节中学习如何以更专业的方式处理错误。


    为什么不在每次尝试引入库文件时都使用 `require_once` 或 `require` 呢？


    答案是效率。使用 `require_once` 会导致多次检查文件是否存在以及文件是否被多次使用。如果不需要这样，我们就往程序中添加了不必要的命令。要始终关注效率，因为我们希望开发出能以最快速度正确执行的程序。


    ```

    Hello World";

    //indicate the relative path to the file to include

    require "templates/page.php";

    echo $page;

    ?>

    列表 2-7

    newindex.php

    ```


    现在 `newindex.php` 文件是一个非常短的程序。该程序设置了 `$title` 和 `$content` 变量，引入了 `page.php` 文件中的代码，并输出了其内容。上述代码的输出将与之前程序的输出完全相同。没有功能上的变化，但在代码架构上有一些美观上的改进。一个可重复使用的*页面模板*现在保存在一个单独的文件中。我们实际上是在将代码的不同部分拆分到不同的文件中。其结果是，更多的代码可以在其他项目中轻松地重复使用。这种分离不同部分的过程也被称为*关注点分离*。


    ### 注释你的代码


    你应该始终在程序中放置*注释*（非可执行文本）。这些注释应提醒你代码的作用及其原因。在现实世界中，你将要创建数百个程序。如果需要对现有程序进行修改，注释可以帮助程序员快速确定逻辑设计。即使这个程序是你多年前创建的，你也会感激这些关于程序设计方式的提醒。许多公司还要求包含注释，其中包括对程序将实现的功能的描述、输入和输出列表、创建者以及自首次发布以来对程序所做的任何更改的信息。


    **注意**


    本书中我们使用有限数量的注释来减少印刷页数。这不应被解读为暗示注释不重要。它们非常重要！

    '
- fmt: '#### Block and Single-Line Comments


    In PHP, we must clearly delimit comments, so PHP will not try to interpret comments
    as if they were actual production code. Let’s look at two ways of writing code
    comments in PHP: *block* and *single-line comments*.


    ```

    Single-line comments begin with //. The comments exist in just one

    line. Of course, we can include additional // to add several lines of

    comments. However, the block format allows you to use an opening

    delimiter, /*, and a closing delimiter, */. With the block format,

    several lines of comments can be included without repeating // on each

    line.

    ```


    #### Avoiding Naming Conflicts


    Programs can contain hundreds of lines of code. These programs will use many variables,
    and each one must be named uniquely and meaningfully. It is easy to make the mistake
    of accidentally reusing a variable in PHP. Since variables are created and updated
    using similar instructions, a program could replace data existing within a variable
    by mistake. We need to avoid potential name conflicts, so this does not occur.


    **Note**


    In languages that declare variables before they can be used, an error would be
    raised if there is another attempt to declare the variable. PHP does not require
    variables to be declared and does not raise an error if the variable is reused
    by accident. However, efficient programs can reuse variables, by design, rather
    than using unnecessary memory to create additional variables.


    ```php

    <?php

    $title = "Welcome to my blog";

    /*

    hundreds lines of code later

    */

    $title = "Web developer";

    ?>

    ```


    Do you see a problem with the preceding code? Initially, a variable named `$title`
    is used to indicate the value of an HTML page’s `<title>` element. Much later
    in the same program, a variable also named `$title` is used to store a job title.
    This can especially occur when importing library files into an existing program.
    The library file might contain variable names that are the same as used in the
    calling program. The `namespace` instruction can be used to separate portions
    of a program to avoid a potential conflict. This is especially useful for programs
    using many libraries.


    **Exercise**: Go to the [php.net](http://php.net) website and search for information
    on namespaces. You can also view videos on YouTube covering PHP namespaces. How
    can we adjust the example programs shown to use namespaces instead of an object?


    We can also avoid a naming conflict by creating an *object*. In *object-oriented
    programming*, an object can include multiple variables (*properties*) and functions
    (*methods* – blocks of code). For example, an object can contain information about
    where we live and the ability to generate directions to drive to the location.
    A `class`, which declares the contents of the object, is similar to a blueprint
    for a house. The blueprint provides many details about the house, but it is not
    an actual house. The actual house must be built following the blueprints. Then
    the house exists. For an object to exist in programming, it must be declared (using
    a class) and then an instance must be created (using the `new` keyword). The instance
    of a class is the object. The object exists within memory (with its own variables
    and blocks of code) for the calling program to use. When the object is no longer
    needed, it can be released within the program itself. All existing objects will
    automatically be released when a program ends.


    ```php

    $pageData = new StdClass();

    $pageData->title = "Welcome to my blog";

    /*

    hundreds lines of code later

    */

    $jobData = new StdClass();

    $jobData->title = "Web developer";

    ?>

    ```


    Without digging too deep into object-oriented programming, after all this is only
    Chapter [2](#323857_3_En_2_Chapter.xhtml), we can easily create an object to hold
    multiple values. We will use PHP’s native `StdClass` class to do so. In the preceding
    code example, we see two different objects, each with a `title` property. The
    `new` keyword is used to create the objects from the existing class. In this example,
    `$pageData` and `$jobData` are created from the `StdClass`. Each object then creates
    a `title` variable (property) within itself. `$pageData->title` creates its own
    separate `title` property. Later in this program, the instruction `$jobData->title`
    creates a different `title` property for `$jobData`. The object provides a context,
    and that will make it easier for us to use the right title in the right place
    in our code. We can use objects to organize our code into meaningful units that
    belong together. We could say that an object and its properties are much like
    a folder and the files inside.


    **Note**


    For developing a quick list of variables (properties) which are associated with
    a specific name (object), `stdClass` is useful. However, it is not as efficient
    as arrays, because it creates unnecessary object code for this type of task. It
    also does not allow the creation of `set` and `get` routines which can increase
    the objects data security and reliability. Later in the chapter, we will create
    our own class and object which will allow us more control over the data, its accessibility,
    and its reliability. Using objects in your code is a de facto standard for dealing
    with complexity in systems, without introducing unnecessary complexity in your
    code. We will learn much more about programming with objects throughout the book.


    #### The Object Operator


    To get values from an object property, we must specify two things: which object
    and which of its properties to get. To that end, we can use PHP’s *object operator*.
    The general syntax is as follows:


    ```php

    $objectName->propertyName;

    ```


    PHP’s object operator looks like an arrow. It indicates that you are using a particular
    property (indicated on the right side) from inside a specific object (indicated
    on the left side). We can alternatively use *dot notation*. As stated before,
    be consistent, pick a style that you are comfortable using, and use the same style
    throughout your program.


    **Exercise**: Go to [php.net](http://php.net) and research the use of dot notation
    in PHP. Adjust our previous coding example to use dot notation instead of the
    object operator. Which style do you prefer? Why?


    #### Using a `StdClass` Object for Page Data


    Let’s refactor `index.php` and the page template with an object to prevent annoying
    naming conflicts. Here is the newer `index.php` file.


    ```php

    <?php

    $pageData = new StdClass();

    $pageData->title = "New, object-oriented test title";

    $pageData->content = "Hello from an object";

    require "templates/newerpage.php";

    echo $page;

    ?>

    ```


    **Listing 2-8** `newerindex.php`


    We will also need to update `page.php`, so it uses the newly created object and
    its properties in the right places. We will now call it `newerpage.php`.


    ```php

    <?php

    $page = "

    <html>

    <head>

    <title>$pageData->title</title>

    </head>

    <body>

    $pageData->content

    </body>

    </html>

    ";

    ?>

    ```


    **Listing 2-9** `newerpage.php`


    Load `index.php` in your browser. You should expect to see the changed values
    in the `<title>` and `<body>` elements. However, all other display and source
    code is unchanged.


    #### Page Views


    A personal portfolio site is likely to have a few different pages. Perhaps one
    page about skills and educational background, and another page with links to examples
    of work. Because we are making a dynamic website, we will use our template to
    display pages for the portfolio. We actually are not creating multiple pages;
    we are creating multiple *page views*. A page view is something that looks like
    an individual page. One page view may be composed of several smaller views. We
    could think of a page view as a Lego house and a view as a Lego brick: the smaller
    parts are combined to build something bigger. Where did I put that Lego pirate
    ship anyway?'
