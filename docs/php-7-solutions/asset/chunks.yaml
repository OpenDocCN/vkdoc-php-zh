  trans: '

    ## 注意


    你可能会遇到使用 `copy()` 而非 `move_uploaded_file()` 的脚本。如果缺少其他检查措施，`copy()` 会让你的网站面临严重的安全风险。例如，恶意用户可能试图欺骗你的脚本，去复制其本不应有权访问的文件，比如密码文件。请始终使用
    `move_uploaded_file()`，它要安全得多。


    1.  保存 `file_upload.php`，并在浏览器中加载它。点击“浏览”或“选择文件”按钮，从 `phpsols-4e` 站点的 `images`
    文件夹中选择一个文件。如果你从其他地方选择文件，请确保其大小小于 50 KB。点击“打开”（在 Mac 上为“选择”）以在表单中显示文件名。在显示文件输入字段的浏览器中，你可能无法看到完整路径。这是一个外观问题，留给你自己通过
    CSS 解决。点击“上传”按钮。如果你在本地测试，表单输入字段几乎会立即清空。

    2.  导航到 `upload_test` 文件夹，确认你选择的图片的副本已存在于其中。如果没有，请对照 `file_upload_04.php` 检查你的代码。同时，如有必要，请检查上传文件夹是否已设置正确的权限。


    ## 说明


    下载文件使用的是 `C:/upload_test/`。请根据你自己的配置进行调整。


    如果没有收到任何错误消息但找不到文件，请确保图片没有超过 `upload_max_filesize`（参见表 9-1）。另外，检查你是否漏掉了 `$destination`
    末尾的尾部斜杠。在 `upload_test` 文件夹中，你找到的可能不是 `myfile.jpg`，而是在磁盘结构中高一级的目录里找到 `upload_testmyfile.jpg`。


    3.  将 `$max` 的值改为 `3000`，保存 `file_upload.php`，然后选择一个大于 2.9 KB 的文件进行上传（`images`
    文件夹中的任何文件都可以），再次测试。点击“上传”按钮并检查 `upload_test` 文件夹。该文件不应该在那里。

    4.  如果你有兴趣进行实验，将 `MAX_FILE_SIZE` 隐藏字段移到文件输入字段下方，然后再次尝试。请确保你选择的文件与第 6 步中使用的文件不同，因为
    `move_uploaded_file()` 会覆盖同名的现有文件。稍后你将学习如何为文件赋予唯一的名称。


    这次，文件应该会被复制到你的上传文件夹中。隐藏字段必须位于文件输入元素之前，`MAX_FILE_SIZE` 才能生效。继续之前，请将隐藏字段移回其原始位置。


    ## 创建 PHP 文件上传类


    正如你刚才所见，上传文件仅需几行代码，但这本身还不足以宣告任务完成。你需要通过实施以下步骤来使过程更加安全：


    -   检查错误级别。

    -   在服务器上验证文件未超过允许的最大大小。

    -   检查文件类型是否可接受。

    -   从文件名中移除空格。

    -   重命名与现有文件同名的文件，以防止覆盖。

    -   自动处理多个文件上传。

    -   告知用户结果。


    每次你想要上传文件时，都需要实施这些步骤，因此构建一个易于重用的脚本是合理的。这就是我选择使用自定义类的原因。构建 PHP 类通常被视为一个高级主题，但别因此而却步。**类**
    是一个旨在协同工作的函数和变量的集合。这虽然过于简化，但足以让你理解基本概念。类中的每个函数通常应专注于单一任务，因此你将构建独立的函数来实现前述列表中的步骤。代码还应该是通用的，不局限于特定的网页。一旦构建好类，你可以在任何表单中重用它。尽管类定义很长，但使用该类只需编写几行代码。类的另一个优势在于，你可以通过创建**子类**（也称为**子类**）来添加或修改其功能。你将在第
    10 章中看到一个例子，该章基于本章开发的类进行构建。


    要使用一个类，你需要调用其构造方法来创建该类的一个实例（即一个**对象**）。该对象可以访问该类的所有特性，即其函数（称为**方法**）和变量（称为**属性**）。通常会创建类的多个实例来处理不同的情况。例如，你可能希望创建单独的对象来将图片和文本文件上传到不同的位置。当你通读本章的其余部分时，这些概念会变得更加清晰。


    如果你时间紧迫，完成的类位于 `ch09/PhpSolutions` 文件夹中。即使你自己不构建脚本，也请通读相关描述，以便清楚了解其工作原理。


    ## 定义 PHP 类


    定义 PHP 类非常简单。你使用 `class` 关键字，后跟类名，然后将该类的所有代码放在一对花括号之间。按照惯例，类名以大写字母开头，并存储在与类同名的单独文件中。


    ### 使用命名空间避免命名冲突


    如果你编写自己的脚本，很少需要担心命名冲突。我们将创建一个用于上传文件的类，因此 `Upload` 或 `FileUpload` 看起来是合乎逻辑的名称。一旦你开始使用他人编写的脚本和类（包括本书中的），就存在多个类同名带来的风险。PHP
    通过使用命名空间将相关的类、函数和常量分组来解决这个问题。


    一种常见的策略是将类定义存储在一个描述其功能的文件夹结构中，并为顶层文件夹赋予一个基于域名或公司名称的唯一名称。命名空间可以有子级别，因此文件夹结构会复制为用反斜杠分隔的子命名空间。命名空间也会单独声明，允许你使用简单的类名。我们将要构建的类名为
    `Upload`，但为了避免命名冲突，它将被创建在名为 `PhpSolutions\File` 的命名空间中。


    你可以在文件顶部使用 `namespace` 关键字，后跟命名空间，像这样声明命名空间：


    ```

    namespace PhpSolutions\File;

    ```


    ## 注意


    在所有操作系统上，PHP 都使用反斜杠作为命名空间分隔符。不要试图在 Linux 或 macOS 上将其更改为正斜杠。


    因此，如果我们在此命名空间中创建一个名为 `Upload` 的类，其完全限定名就是 `PhpSolutions\File\Upload`。


    ### 导入命名空间类


    为了避免每次引用命名空间类时都使用完全限定名，你可以在脚本开头使用 `use` 关键字导入该类，如下所示：


    ```

    use PhpSolutions\File\Upload;

    ```

