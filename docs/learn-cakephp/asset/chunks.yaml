    can.


    ## Loading Fixtures into Your Tests


    Let’s take a look at `tests/TestCase/Model/Table/UsersTableTest.php`, which is
    also generated by `bake`, as discussed in the previous chapter.


    ```

    1  <?php

    2  namespace App\Test\TestCase\Model\Table;

    ```


    Namespaces are added at PHP 5.3, as well as a recommended language feature to
    use in PHP 7 applications. The simplest definition of a namespace is that it is
    a way of encapsulating items.


    ```

    4  use App\Model\Table\UsersTable;

    5  use Cake\ORM\TableRegistry;

    6  use Cake\TestSuite\TestCase;

    ```


    By the `use` operator, we import other namespaces.


    ```

    8  /**

    9   * App\Model\Table\UsersTable Test Case

    10   */

    11  class UsersTableTest extends TestCase

    12  {

    ```


    Model tests extend CakePHP’s `TestCase` class.


    ```

    14      /**

    15       * Test subject

    16       *

    17       * @var \App\Model\Table\UsersTable

    18       */

    19      public $Users;

    21      /**

    22       * Fixtures

    23       *

    24       * @var array

    25       */

    26      public $fixtures = [

    27          ''app.users'',

    28          ''app.comments'',

    29          ''app.posts'',

    30          ''app.categories'',

    31          ''app.tags'',

    32          ''app.posts_tags''

    33      ];

    ```


    The `$fixtures` array defines which fixtures should be loaded for our tests. As
    you can see, `bake` imported fixtures related to the `User` model. For now, get
    rid of the related models and keep it simple. Change the code to look like this:


    ```

    26  public $fixtures = [''app.users''];

    ```


    If you do not have any model queries that will try to retrieve related database
    tables, this will suffice. As only those fixtures will be loaded into your test
    database that are added here, related database tables will not exist, so trying
    to query them will create an error.


    It is always good practice to keep tests simple and load only fixtures that are
    absolutely necessary.


    ## Summary


    In this chapter, you were introduced to the concept of fixtures and learned how
    to write, generate, and load them into our tests. One of the most important lessons
    is to keep fixtures as short as possible and load only the necessary fixtures
    into your tests.


