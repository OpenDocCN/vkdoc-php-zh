    \n从 `upload()` 调用中移除参数：\n\n`$loader->upload();`\n\n保存 `file_upload.php` 并重复测试，多次上传同一文件。每次上传文件时，您都应该看到一条消息，提示文件已被重命名。\n\
    \n还可以使用扩展名在 `$notTrusted` 数组中的文件进行尝试。默认情况下，数字会插入后缀之前。如果你将 `false` 作为参数传递给 `allowAllTypes()`，则不会添加后缀，数字会插入到文件的正常扩展名之前。\n\
    \n通过检查 `upload_test` 文件夹的内容来查看结果。您应该会看到类似图 6-9 的内容。\n\n如有必要，您可以对照 `ch06/PhpSolutions/File`\
    \ 文件夹中的 `Upload_05.php` 文件检查您的代码。\n\n![A978-1-4842-0635-5_6_Fig9_HTML.jpg](img/A978-1-4842-0635-5_6_Fig9_HTML.jpg)\n\
    \n*图 6-9.*  \n该类会从文件名中移除空格，并防止文件被覆盖\n\n### 上传多个文件\n\n现在您已拥有一个灵活的文件上传类，但它一次只能处理一个文件。在文件字段的\
    \ `<input>` 标签中添加 `multiple` 属性，即可在符合 HTML5 标准的浏览器中选择多个文件。如果您在表单中添加额外的文件字段，旧版浏览器也支持多文件上传。\n\
    \n构建 `Upload` 类的最后一步是使其能够处理多个文件。为了理解代码的工作原理，您需要了解当表单允许多文件上传时，`$_FILES` 数组会发生什么变化。\n"
- fmt: "### How the `$_FILES` array handles multiple files\n\nSince `$_FILES` is a\
    \ multidimensional array, it’s capable of handling multiple uploads. In addition\
    \ to adding the `multiple` attribute to the `<input>` tag, you need to add an\
    \ empty pair of square brackets to the `name` attribute, like this:\n\n`<input\
    \ type=\"file\" name=\"image[]\" id=\"image\" multiple>`\n\nAs you learned in\
    \ [Chapter 5](#A978-1-4842-0635-5_5_Chapter.html), adding square brackets to the\
    \ `name` attribute submits multiple values as an array. You can examine how this\
    \ affects the `$_FILES` array by using `multi_upload_01.php` or `multi_upload_02.php`\
    \ in the `ch06` folder. Figure [6-10](#A978-1-4842-0635-5_6_Chapter.html#Fig10)\
    \ shows the result of selecting four files in a modern desktop browser that supports\
    \ the `multiple` attribute.\n\n![A978-1-4842-0635-5_6_Fig10_HTML.jpg](A978-1-4842-0635-5_6_Fig10_HTML.jpg)\n\
    \nFigure 6-10. The `$_FILES` array can upload multiple files in a single operation\n\
    \nAlthough this structure is not as convenient as having the details of each file\
    \ stored in a separate subarray, the numeric keys keep track of the details that\
    \ refer to each file. For example, `$_FILES['image']['name'][2]` relates directly\
    \ to `$_FILES['image']['tmp_name'][2]`, and so on.\n\nAt the time of this writing,\
    \ all modern desktop browsers support the `multiple` attribute, as does Safari\
    \ on iOS (since version 6.1). This attribute is not supported in Internet Explorer\
    \ 9 or earlier, nor in Android (the current version is 4.4).\n\nBrowsers that\
    \ don’t support the `multiple` attribute upload a single file using the same structure,\
    \ so the name of the file is stored as `$_FILES['image']['name'][0]`.\n\n**Tip**\n\
    \nIf you need to support multiple file uploads on older browsers, omit the `multiple`\
    \ attribute and create separate file input fields for however many files you want\
    \ to upload simultaneously. Give each `<input>` tag the same `name` attribute\
    \ followed by square brackets. The resulting structure of the `$_FILES` array\
    \ is the same as in Figure [6-10](#A978-1-4842-0635-5_6_Chapter.html#Fig10).\n\
    \n### PHP Solution 6-7: Adapting the class to handle multiple uploads\n\nThis\
    \ PHP solution shows how to adapt the `upload()` method of the `Upload` class\
    \ to handle multiple file uploads. The class automatically detects when the `$_FILES`\
    \ array is structured as in Figure [6-10](#A978-1-4842-0635-5_6_Chapter.html#Fig10)\
    \ and uses a loop to handle however many files are uploaded.\n\nWhen you upload\
    \ a file from a form designed to handle only single uploads, the `$_FILES` array\
    \ stores the filename as a string in `$_FILES['image']['name']`. But when you\
    \ upload from a form capable of handling multiple uploads, `$_FILES['image']['name']`\
    \ is an array. Even if only one file is uploaded, its name is stored as `$_FILES['image']['name'][0]`.\n\
    \nSo, by detecting if the `name` element is an array, you can decide how to process\
    \ the `$_FILES` array. If the `name` element is an array, you need to loop through\
    \ it, using its index to extract the current file’s other details, and then storing\
    \ them in a variable that can be passed to the `checkFile()` method.\n\nWith that\
    \ in mind, continue working with your existing class file. Alternatively, use\
    \ `Upload_05.php` in the `ch06/PhpSolutions/File` folder.\n\nAmend the `upload()`\
    \ method by adding a conditional statement to check if the `name` element of `$uploaded`\
    \ is an array:\n\n```\npublic function upload($renameDuplicates = true) {\n  \
    \  $this->renameDuplicates = $renameDuplicates;\n    $uploaded = current($_FILES);\n\
    \    if (is_array($uploaded['name'])) {\n        // deal with multiple uploads\n\
    \    } else {\n        if ($this->checkFile($uploaded)) {\n            $this->moveFile($uploaded);\n\
    \        }\n    }\n}\n```\n\nThe conditional statement checks if `$uploaded['name']`\
    \ is an array. If it is, it needs special handling. The existing call to `checkFile()`\
    \ now goes inside the `else` block.\n\n**Note**\n\nRefer to PHP Solution 6-2 if\
    \ you need reminding how `$uploaded` contains the reference to the first element\
    \ in the `$_FILES` array.\n\nIn order to deal with multiple uploads, the challenge\
    \ is to gather the five values associated with a single file (`name`, `type`,\
    \ and so on) before passing them to the `checkFile()` and `moveFile()` methods.\n\
    \nIf you refer to Figure [6-10](#A978-1-4842-0635-5_6_Chapter.html#Fig10), `$uploaded['name']`\
    \ is an indexed array that contains the names of the uploaded files. By running\
    \ that array through a `foreach` loop, you can access both the key and value,\
    \ like this:\n\n```\nforeach ($uploaded['name'] as $key => $value) { }\n```\n\n\
    The first time the loop runs, `$key` is 0. Using the key, you can get access to\
    \ the other elements in the `$_FILES` array for the first file and assign them\
    \ to a new array called `$currentFile`. The second time it runs, you get the details\
    \ of the second file, and so on.\n\nThe revised code for the `upload()` method\
    \ looks like this:\n\n```\npublic function upload($renameDuplicates = true) {\n\
    \    $this->renameDuplicates = $renameDuplicates;\n    $uploaded = current($_FILES);\n\
    \    if (is_array($uploaded['name'])) {\n        // deal with multiple uploads\n\
    \        foreach ($uploaded['name'] as $key => $value) {\n            $currentFile['name']\
    \ = $uploaded['name'][$key];\n            $currentFile['type'] = $uploaded['type'][$key];\n\
    \            $currentFile['tmp_name'] = $uploaded['tmp_name'][$key];\n       \
    \     $currentFile['error'] = $uploaded['error'][$key];\n            $currentFile['size']\
    \ = $uploaded['size'][$key];\n            if ($this->checkFile($currentFile))\
    \ {\n                $this->moveFile($currentFile);\n            }\n        }\n\
    \    } else {\n        if ($this->checkFile($uploaded)) {\n            $this->moveFile($uploaded);\n\
    \        }\n    }\n}\n```\n\nAll you’re interested in is `$key`, so `$value` is\
    \ never used. The first time the loop runs, `$uploaded['name'][$key]` accesses\
    \ the value stored in `$uploaded['name'][0]` and assigns it to `$currentFile['name']`;\
    \ `$uploaded['type'][$key]` accesses `$uploaded['type'][0]` and assigns it to\
    \ `$currentFile['type']`, and so on. You never loop through the arrays for `type`,\
    \ `tmp_name`, `error`, and `size`. Their values are accessible through the key\
    \ thanks to the predictable nature of the `$_FILES` array.\n\nEach time the loop\
    \ runs, `$currentFile` contains the details of a single file, which are then passed\
    \ to the `checkFile()` and `moveFile()` methods exactly as before.\n\nSave `Upload.php`\
    \ and test it with `file_upload.php`. It should work the same as before, uploading\
    \ only one file at a time. Add a pair of square brackets at the end of the `name`\
    \ attribute in the file field and insert the `multiple` attribute, like this:\n\
    \n`<input type=\"file\" name=\"image[]\" id=\"image\" multiple>`\n\nYou don’t\
    \ need to make any changes to the PHP code above the `DOCTYPE` declaration. The\
