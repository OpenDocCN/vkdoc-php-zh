    3 var `$name` = ''Post'';


    4 var `$belongsTo` = array(''User'');


    5 var `$hasAndBelongsToMany` = array(''Tag'');


    6 }


    7 ?>

    最后，创建包含脚手架的`Tags`控制器，以便您可以添加标签来测试“多对多”关系。清单4-14包含了新的`Tags`控制器文件的代码。


    ![Image 25](index-72_1.jpg)


    **50**


    **第四章 ■ 文件命名和数据库设计**


    **清单4-14.** *Tags控制器*


    ```

    1 <?

    2 class TagsController extends AppController {

    3 var $name = ''Tags'';

    4 var $scaffold;

    5 }

    6 ?>

    ```


    运行`Tags`控制器以添加一些占位标签用于测试。添加多个标签以使测试更有效（因为您正在测试的关系是多对多）。至此，“多对多”关系的所有准备工作已完成。启动`Posts`的`Add`操作来创建一篇新文章，您应该会看到一个从`tags`表中提取了标签名称的多选区域，如图4-3所示。


    **图4-3.** *测试标签和文章之间的“多对多”关系*


    ![Image 26](index-73_1.jpg)


    **51**


    **第四章 ■ 文件命名和数据库设计**


    名称正确显示的多选框表明Cake已有效识别了该关系，并正在从`tags`表中拉取适当的数据。


    为测试反向关系，创建几篇文章，然后访问`Tags`的`Add`操作。您应该会看到一个同样带有多选框的视图，其中高亮显示了关联的文章，如图4-4所示。


    **图4-4.** *在Tags Add视图中，文章数据以多选框形式显示*


    在脚手架视图中，标签和文章都展示了它们之间的关系。这些模型彼此之间能正确协作，因此您现在可以开始操作视图以改进应用程序的设计、流程和功能。为了更好地控制“多对多”关系，可以使用以下参数。


    ---


    **`className` 参数**


    此名称对应于关联的模型。在`Posts`::`Tags`示例中，`Post`模型需要将`className`设置为`Tag`。


    **`joinTable` 参数**


    还记得您是如何创建第三个表来存放文章和标签的所有关联的吗？这被称为*连接表*，可以通过`joinTable`参数手动设置。对于博客应用，您应该将其设置为`posts_tags`，名称来源于表名，而非模型名。


    **`foreignKey` 和 `associationForeignKey` 参数**


    当前模型在连接表中的键是`associationForeignKey`，在本例中，对于`Post`模型而言是`post_id`。`foreignKey`参数用于另一个模型，也就是说，对于`Post`模型它是`tag_id`。当您需要在单个模型中指定多个“多对多”关系时，请设置这些参数。


    **`conditions`、`fields`、`order` 和 `limit` 参数**


    这些参数的行为与其他所有关联相同。使用这些参数可以设置手动SQL条件、限制返回的字段、设置返回结果的排序顺序，以及限制返回的最大记录数。


    ---


    **超越脚手架**


