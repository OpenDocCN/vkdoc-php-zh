    ## 渲染事件详情


    请注意，清单 13-6 中用于创建日历事件表的 SQL 包含一个名为`details`的字段。这样当日历中出现事件时，用户可以点击该事件以查看更多详情。到目前为止，`$calendar->render()`函数已经负责渲染日历并显示指定月份每一天的匹配事件。


    但是，每个事件保存的详情信息必须由辅助方法提供——这部分代码尚未编写。接下来，由于函数中已完成了每周的迭代，我们将关闭月份表格；然后使用清单 13-17 输出每个事件的`details`字段内容。


    **清单 13-17.** *渲染事件详情*


    ```

    $out .= ''</table>'';


