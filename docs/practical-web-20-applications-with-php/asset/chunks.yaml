    The usernameExists() Method


    We call this method to determine whether or not the passed-in username already
    exists. If the username is in use, then true is returned; otherwise false is returned.


    The IsValidUsername() Method


    This method simply checks whether or not a username is valid, returning true if
    it is and false if not. To check the validity of the username, we use the Zend_Validate
    component of the Zend Framework. We are only checking for alphanumeric characters,
    so we can use the Zend_Validate_Alnum class.


    Obviously, we could write a simple regular expression (such as /^[a-z0-9]+$/i)
    to check this, but Zend_Validate allows us to easily chain different validators
    together, meaning that in the future you could easily change the method for validating
    a username. Additionally, using Zend_Validate is a good practice to get into,
    as we will be using it throughout this book when validating form data (we will
    see it again shortly when we check users’ e-mail addresses).


    This method is static, as it does not rely on an instance of DatabaseObject_User.


