    \ href=\"index.php\">Cookware</a></li>\n</ul>\n</li>\n<li><a href=\"index.php\"\
    >Books</a></li>\n</ul>\n</nav>\n</div>\n<p>\n```\n\nTo display a header, a `table`\
    \ element is defined consisting of three columns. To display the web site title,\
    \ Search box, and cart icon, the width of the columns is defined in the ratios—30%,\
    \ 40%, and 20%. The background color of the table is set to cyan and the foreground\
    \ color is set to blue. To display the web site title, \"Bintu Online Bazar,\"\
    \ the font size is set to 35px through statement #1. Statement #2 navigates the\
    \ users to the `searchitems.php` script when they click the Search button. The\
    \ text entered by the user in the Search box is also passed to the `searchitems.php`\
    \ script through the `$_POST` array.\n\nFollowing the Search box, a cart icon\
