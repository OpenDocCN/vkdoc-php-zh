    \ );\n}\n}\n$entryRequested = isset( $_GET['id'] );\n//create a new if-statement\n\
    if ( $entryRequested ) {\n$id = $_GET['id'];\n//load model of existing entry\n\
    $entryData = $entryTable->getEntry( $id );\n$entryData->entry_id = $id;\n}\ninclude_once\
    \ \"views/admin/new-editor-html.php\";\n?>\nListing 8-4\nneweditor.php\n```\n\n\
    ```\n$entryRequested = isset( $_GET['id'] );\n//create a new if-statement\nif\
    \ ( $entryRequested ) {\n$id = $_GET['id'];\n//load model of existing entry\n\
    $entryData = $entryTable->getEntry( $id );\n$entryData->entry_id = $id;\n}\n```\n\
    \n`isset` is\nused to determine if the hidden `id` value has been\nset. If it\
    \ has, then it is retrieved and placed into `$id`. The `$id` value is then\npassed\
    \ into the `getEntry()` method to\nretrieve the data from that particular record\
    \ in the database table. The\n`$id` value then\nis added to the `entry_id` property\
    \ in\nthe `StdObject`\nnamed `$entryData` which was\ncreated when the data was\
    \ retrieved.\n\nNote\n\nThe following new versions, with minor changes, have been\
    \ created to\naccess `neweditor.php` and\n`new-editor-html.php`:\n`new-entries-html.php,\
    \ newentries.php`.\n\nLet us take time to test the logic of our code before we\
    \ continue. We\ncan test our code by entering `http://localhost/ch8/blog/admin.php?page=newentries`\n\
    into a browser – then by selecting one of the blogs that are\ndisplayed.\n\nThe\
    \ editor is not perfect yet. We can see any existing entry in the\neditor, but\
    \ we cannot save any changes. If we click the Save button, a\nnew entry will be\
    \ inserted, but an existing blog cannot be updated. The\neditor cannot properly\
    \ handle existing entries yet, nor can it delete\nexisting entries. Deleting is\
    \ easy, so we will implement that first.\n\n![](images/323857_3_En_8_Chapter/323857_3_En_8_Fig2_HTML.jpg)\n\
    \nThis dialer reflects when the host clicks the editor to create a new\nblog,\
    \ this dialer contains a title bar and entry bar.\n\nFigure 8-2\nOutput from calling\
    \ neweditor.php via admin.php\n and selecting a blog\n\nHandling Entry Deletion\n\
    The model will logically contain code to delete entry data from the\ndatabase.\
    \ The view already has a Delete button , so no changes\nare necessary. The controller\
    \ must also be updated to execute code when\na user clicks the Delete button.\n\
    \nDeleting Entries from the Database\n\nTo delete    a row of data from the\n\
    `blog_entry`\ntable in the database, we will need to create more SQL. Let us take\
    \ a\nminute to reflect. Where would we write the code to delete an entry? The\n\
    PHP code to delete an entry in the `blog_entry` table\nbelongs in the `Blog_Entry_Table\
    \ class, our` single gateway to the database table. We will create a new\nmethod\
    \ to accomplish this task."
  trans: "\n# 排版后的文档\n\n每个被复制的文件都需要更新，以使用任何重命名的程序。\n\n接下来，为了完成更新和删除的任务，让我们向管理员显示所有条目的列表。点击一个条目会将其加载到条目编辑器中。我们可以使用`Blog`类中的`getAllEntries()`方法来完成此任务。\n\
    \n## 显示管理链接\n\n在之前的模型（`Blog_Entry_Table.class.php`）经过尝试、测试和理解后，我们可以开始处理视图。让我们创建一个可点击的博客条目标题列表。这使我们能够采用与`blog.php`程序类似的逻辑。我们可以使用`while`循环通过`PDO\
    \ Statement`对象迭代数据库记录。数据库表中的每一行数据都将由一个单独的`<li>`元素表示。我们可以将各个博客标题包裹在`<a>`元素中，以创建可点击的条目列表。让我们对第\
    \ 7 章的`updated-entries-html.php`程序进行这些调整。\n\n```\n<?php\n$info = \"<ul>\";\n$info\
    \ .= \"Blog Entries\";\n$info .= \"</ul>\";\n$info .= \"<ul>\";\n//loop through\
    \ all $entries from the database\n//remember each one row temporarily as $entry\n\
    //$entry will be a StdClass object with entry_id, title and intro\nwhile ( $entry\
    \ = $entries->fetchObject() ) {\n$href  = \"admin.php?page=editor&id=$entry->entry_id\"\
    ;\n//create an <li> for each of the entries\n$info .= \"<li><a href='$href'>$entry->title</a></li>\"\
    ;\n}\n//end the <ul>\n$info .= \"</ul>\";\necho $info;\n?>\nListing 8-1\nentries-html.php\n\
    ```\n\n点击一个条目将请求一个类似`admin.php?page=editor&id=2`的 URL。这样，编辑器控制器将能访问到被点击条目的`entry_id`。此代码与我们之前创建的代码类似。\n\
    \n现在我们可以创建一个用于管理访问的条目控制器。\n\n```\n<?php\n$entries = $entryTable->getAllEntries();\n\
    include_once \"views/admin/entries-html.php\";\n?>\nListing 8-2\nentries.php\n\
    ```\n\n这段代码与第 7 章的`updatedblog.php`类似。实际上它是一个简化版本，因为我们没有检查用户是否点击了按钮。默认情况下，我们会显示所有条目。\n\
    \n我们可以通过在浏览器中加载`http://localhost/ch8/blog/admin.php?page=entries`来测试程序的逻辑流程。一旦我们对一切正常感到满意，就可以向代码中添加更多细节。\n\
    \n![](img/323857_3_En_8_Fig1_HTML.jpg)\n\n一个管理网页的快照，以博客条目作为主标题，新博客和另一个博客作为副标题。\n\
    \n**图 8-1** 从`admin.php?page=entries`输出的结果\n\n我们现在看到一系列可点击的博客条目标题。如果我们点击一个标题，将显示空的条目编辑器。我们可以更改此行为，使条目编辑器加载被点击博客条目的内容并显示在编辑器中。\n\
    \n## 用待编辑的条目填充表单\n\n有时，条目编辑器表单应显示为空白字段，以便我们可以创建新条目。其他时候，编辑器应显示现有条目，以便进行编辑。用户可以点击博客标题将值加载到编辑器中。点击博客标题会将条目的`entry_id`编码为\
    \ URL 变量。因此，如果条目的`entry_id`作为 URL 变量可用，我们可以将相应的条目加载到编辑器中。如果未找到此类 URL 变量，我们可以显示一个空白编辑器。\n\
    \n让我们调整编辑器视图，以便在找到`id`时显示内容；否则，它仍将显示一个空表单。\n\n```\n<?php\n$info .= \"\n<form method='post'\
    \ action='admin.php?page=neweditor'>\n<fieldset>\n<legend>New Entry Submission</legend>\n\
    <label>Title</label>\n<input type='text' name='title' value='$entryData->title'\
    \ />\n<label>Entry</label>\n<textarea name='entry'>$entryData->entry_text</textarea>\n\
    <input type='submit' value='Save' />\n</fieldset>\n</form>\n\";\n?>\nListing 8-3\n\
    new-editor-html.php\n```\n\n```\n$entryDataFound = isset( $entryData );\nif( $entryDataFound\
    \ === false ){\n    //default values for an empty editor\n    $entryData = new\
    \ StdClass();\n    $entryData->entry_id = 0;\n    $entryData->title = \"\";\n\
    \    $entryData->entry_text = \"\";\n}\n```\n\n如果`$entryData`中包含信息（如果用户点击了标题，则通过从数据库中拉取记录来填充），那么该信息将被放入`$entryDataFound`中。该信息包含在一个`StdClass`中。如果没有拉取到信息（用户想输入新博客），则使用默认值。\n\
    \n```\n<input type='hidden' name='id' value='$entryData->entry_id' />\n```\n\n\
    `entry_id`被保存到一个隐藏变量`id`中，因为该值对用户没有意义。在显示页面时，它将从视图中隐藏。但是，如果用户查看浏览器中形成的 HTML 代码（查看源代码），该值将是可见的。因此，它是隐藏的，但不被认为是安全的。\n\
    \n```\n<input type='text' name='title' value='$entryData->title' />\n<textarea\
    \ name='entry'>$entryData->entry_text</textarea>\n```\n\n标题和条目字段都使用`StdClass`中的值填充。这将显示要更新的博客数据，如果用户想输入新博客，则显示默认值。\n\
    \n最后一步是更新`editor.php`程序，以使用`Blog_Entry_Table`中的`getEntry()`方法来检索用户请求的任何博客条目的数据。\n\
    \n```\n<?php\nif ( isset( $_POST['title'] ) && isset( $_POST['entry'] ) ){\n \
    \   $title = $_POST['title'];\n    $entry = $_POST['entry'];\n    $entryTable->saveEntry(\
    \ $title, $entry );\n}\n$entryRequested = isset( $_GET['id'] );\n//create a new\
    \ if-statement\nif ( $entryRequested ) {\n    $id = $_GET['id'];\n    //load model\
    \ of existing entry\n    $entryData = $entryTable->getEntry( $id );\n    $entryData->entry_id\
    \ = $id;\n}\ninclude_once \"views/admin/new-editor-html.php\";\n?>\nListing 8-4\n\
    neweditor.php\n```\n\n```\n$entryRequested = isset( $_GET['id'] );\n//create a\
    \ new if-statement\nif ( $entryRequested ) {\n    $id = $_GET['id'];\n    //load\
    \ model of existing entry\n    $entryData = $entryTable->getEntry( $id );\n  \
    \  $entryData->entry_id = $id;\n}\n```\n\n`isset`用于确定隐藏的`id`值是否已被设置。如果已设置，则将其检索并放入`$id`中。然后将`$id`值传递给`getEntry()`方法，以从数据库表中该特定记录中检索数据。然后，`$id`值被添加到名为`$entryData`的`StdObject`的`entry_id`属性中，该对象在数据检索时被创建。\n\
    \n> **注意**\n> 为了访问`neweditor.php`和`new-editor-html.php`，已创建了以下带有微小更改的新版本：`new-entries-html.php`、`newentries.php`。\n\
    \n让我们在继续之前花点时间测试一下代码的逻辑。我们可以通过在浏览器中输入`http://localhost/ch8/blog/admin.php?page=newentries`，然后选择显示的博客之一来测试代码。\n\
    \n编辑器还不完美。我们可以在编辑器中看到任何现有条目，但无法保存任何更改。如果我们点击“保存”按钮，将插入一个新条目，但无法更新现有博客。编辑器还不能正确处理现有条目，也无法删除现有条目。删除很容易，所以我们将首先实现它。\n\
    \n![](img/323857_3_En_8_Fig2_HTML.jpg)\n\n此对话框反映了主持人点击编辑器创建新博客时的界面，该对话框包含标题栏和条目栏。\n\
    \n**图 8-2** 通过`admin.php`调用`neweditor.php`并选择一个博客后的输出结果\n\n## 处理条目删除\n\n模型将逻辑上包含用于从数据库中删除条目数据的代码。视图已经有一个“删除”按钮，因此无需更改。控制器也必须更新，以便在用户点击“删除”按钮时执行代码。\n\
    \n### 从数据库中删除条目\n\n要删除`blog_entry`表中的一行数据，我们需要创建更多的 SQL。让我们花一分钟思考一下。我们应该在哪里编写删除条目的代码？用于删除`blog_entry`表中条目的\
    \ PHP 代码属于`Blog_Entry_Table`类——我们访问数据库表的单一网关。我们将创建一个新方法来完成此任务。\n"
- fmt: "```php\n//partial code for models/New_Blog_Entry_Table.class.php\n//declare\
    \ a new method inside the Blog_Entry_Table class\npublic function deleteEntry\
    \ ( $id ) {\n$sql = \"DELETE FROM blog_entry WHERE entry_id = ?\";\n$data = array(\
    \ $id );\n$statement = $this->executeSQL( $sql, $data );\n}\nListing 8-5\nPartial\
    \ Listing from New_Blog_Entry_Table.class.php\n```\n\nThe code within this method\
    \ should look familiar. It uses the same logic as other methods in the `Blog_Entry_Table`.\
    \ The only difference is the SQL statement.\n\nDeleting data from a database is\
    \ a final action; there is no undo! It is important that we never accidentally\
    \ delete something. The database table is properly designed: every record has\
    \ a primary key. That means every single record can be uniquely identified if\
    \ we have the primary key of an entry. It follows that we also know which record\
    \ to delete by the `entry_id`.\n\n## Responding to Delete Requests\n\nWith the\
    \ editor model ready to delete entries, it is time to update the controller with\
    \ code, to determine if the Delete button was clicked. If the Delete button was\
    \ clicked, the controller should call the model, to have the relevant entry deleted.\n\
    \n```php\n//partial code for views/admin/editor-html.php\n//two buttons, one name,\
    \ different values\n```\n\nClicking any of the submit buttons in the editor form\
    \ will encode a URL variable named `action`. The `action` will have a value of\
    \ `save`, if the Save button is clicked, and a value of `delete`, if the Delete\
    \ button is clicked. Knowing this, let us update the editor program.\n\n```php\n\
    saveEntry( $title, $entry );\n} else if ($buttonClicked === 'delete' ) {\n$entryTable->deleteEntry(\
    \ $id );\n}\n}\n$entryRequested = isset( $_GET['id'] );\n//create a new if-statement\n\
    if ( $entryRequested ) {\n$id = $_GET['id'];\n//load model of existing entry\n\
    $entryData = $entryTable->getEntry( $id );\n$entryData->entry_id = $id;\n}\ninclude_once\
    \ \"views/admin/new-editor-html.php\";\n?>\nListing 8-6\nnewesteditor.php\n```\n\
    \nThere are actually only a few changes necessary.\n\n```php\n$id = $_POST['id'];\n\
    ```\n\nThe hidden value in `id` is saved into `$id`.\n\n```php\n} else if ($buttonClicked\
    \ === 'delete' ) {\n$entryTable->deleteEntry( $id );\n}\n```\n\nAn `else if` statement\
    \ is added to check if the Delete button was clicked. If it was, then the `$id`\
    \ value is passed to the new `deleteEntry()` method.\n\n> **Note**  \n> The following\
    \ programs have been updated to call the new versions of `newesteditor.php` and\
    \ `New_Blog_Entry_Table.php`:  \n> `new-entries-html.php`, `newestentries.php`,\
    \ `newadmin.php`, `newest-editor-html.php`, `newest-admin-navigation.php`.\n\n\
    We can pause again to test our updates to the model, controller, and view. We\
    \ can check our progress by entering `http://localhost/ch8/blog/newadmin.php?page=newestentries`\
    \ into a browser. After selecting a blog to delete and clicking the Delete button,\
    \ the form will clear. This gives the user an indication that the record has been\
    \ deleted. We can click the `All entries` menu item to discover that the entry\
    \ is no longer listed. We can also verify this by looking in the database table.\n\
    \n> **Note**  \n> The `entry_id` can be found in two different places. In one\
    \ part of the program, the code looks for the `entry_id` using `$_POST['id']`;\
    \ in another part of the program, the code looks for it using `$_GET['id']`. It\
    \ is a little peculiar that they hold identical values but serve different purposes.\
    \  \n>  \n> The `$_GET['id']` gets encoded every time a user clicks a blog title\
    \ listed. So, `$_GET['id']` represents the `entry_id` of a blog entry a user would\
    \ like to see in the entry editor.  \n> The `$_POST['id']` gets encoded every\
    \ time an entry has been loaded into the entry editor. It represents the `entry_id`\
    \ of the entry the user has just seen in the editor. So, `$_GET['id']` represents\
    \ the entry to be loaded, whereas `$_POST['id']` represents the already loaded\
    \ entry.  \n\nWe now have an editor that can create new entries and delete existing\
    \ ones. Let us complete the process by allowing the administrator to update entries.\n\
    \n## Preparing a Model to Update Entries in the Database\n\nUpdating an existing\
    \ entry in the database is definitely a job for the model. Let us add an update\
    \ method to our `Blog_Entry_Table`.\n\n```php\n//Partial code for models/Newest_Blog_Entry_Table.class.php\n\
    //declare new method\npublic function updateEntry ( $id, $title, $entry) {\n$sql\
    \ = \"UPDATE blog_entry\nSET title = ?,\nentry_text = ?\nWHERE entry_id = ?\"\
    ;\n$data = array( $title, $entry, $id );\n$statement = $this->executeSQL( $sql,\
    \ $data) ;\nreturn $statement;\n}\nListing 8-7\nPartial Listing of Newest_Blog_Entry_Table.class.php\n\
    ```\n\nThe logic of this function and the basic structure of the SQL should look\
    \ familiar. We used the update SQL statement when we updated our poll. However,\
    \ we are using a prepared statement to place the changes into the record in the\
    \ database table to ensure that any attempt at SQL Injection will fail. Now we\
    \ can update the code to call this method when the user clicks the Save button.\
    \ The Save button will accept both a new entry and an updated entry.\n\n## Controller:\
    \ Should I Insert or Update?\n\nWhen the user clicks Save, the displayed entry\
    \ should either be inserted or updated in the database. Which action to take depends\
    \ on which entry was displayed in the entry editor form.\n\nRemember the hidden\
    \ input from the editor view? It stores the currently displayed entry’s `entry_id`,\
    \ or `0`, if the editor fields are blank (set to the defaults). We can use this\
    \ information to check whether the administrator is trying to insert a new row\
    \ in the `blog_entry` table or update an existing row.\n\nWhen the Save button\
    \ is clicked, we will retrieve the value from the hidden input. If the editor\
    \ was empty, the hidden input holds a value of `0`. This indicates the administrator\
    \ has just created a new entry. The code will then insert a new row into `blog_entry`.\
    \ If it holds any other integer, the code will update the `blog_entry` with the\
    \ corresponding `entry_id`. Let us update the controller to accomplish these tasks.\n\
    \n```php\nsaveEntry( $title, $entry );\n} else if  (($buttonClicked === 'save')\
    \ and ($id != '0')) {\n$entryTable->updateEntry( $id, $title, $entry );\n} else\
    \ if ($buttonClicked === 'delete' ) {\n$entryTable->deleteEntry( $id );\n}\n}\n\
    $entryRequested = isset( $_GET['id'] );\n//create a new if-statement\nif ( $entryRequested\
    \ ) {\n$id = $_GET['id'];\n//load model of existing entry\n$entryData = $entryTable->getEntry(\
    \ $id );\n$entryData->entry_id = $id;\n}\ninclude_once \"views/admin/updated-editor-html.php\"\
    ;\n//New function to remove invalid code\nfunction clean_input($value) {\n$value\
    \ = trim($value);\n$value = stripslashes($value);\n$value = strip_tags($value);\n\
    return $value;\n}\n?>\nListing 8-8\nupdatededitor.php\n```\n\n## Secure Programming\n\
    \n```php\n$id = clean_input($_POST['id']);\n$title = clean_input($_POST['title']);\n\
    $entry = clean_input($_POST['entry']);\n...\nfunction clean_input($value) {\n\
    $value = trim($value);\n$value = stripslashes($value);\n$value = strip_tags($value);\n\
    return $value;\n}\n```\n\nIn addition to the changes mentioned, we have taken\
    \ the opportunity to improve the validity of the data being entered by using three\
    \ PHP functions: `trim()`, `stripslashes()`, and `strip_tags()`.  \n`trim()` will\
    \ remove extra spaces, tabs, and/or newline characters. Backslashes will be removed\
    \ using `stripslashes()`.  \n`strip_tags()` will remove any PHP or HTML tags entered,\
    \ which will keep it from being executed.\n\n> **Note**  \n> The following programs\
    \ have been updated to access the most current versions of the updated files:\
    \  \n> `updated-editor-html.php`, `updated-entries-html.php`, `updatedentries.php`,\
    \ `updatedadmin.php`, `updated-admin-navigation.php`.\n\nThe code must be able\
    \ to differentiate between two user actions (save, update). When the user clicks\
    \ the Save button, and `entry_id` is `0`, the user is really trying to insert\
    \ a new entry.\n\n```php\n$id = clean_input($_POST['id']);\n$title = clean_input($_POST['title']);\n\
    $entry = clean_input($_POST['entry']);\n```"
