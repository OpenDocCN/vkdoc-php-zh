    \ 如果需要，删除上传的原始图像\n\n        if ($this->deleteOriginal) {\n\n            unlink($this->destination\
    \ . $filename);\n\n        }\n\n    } else {\n\n        $this->messages[] = '无法上传\
    \ ' . $file['name'];\n\n    }\n\n}\n```\n\n如果原始图像上传成功，新添加的代码会包含一个条件语句，使得仅在 `$deleteOriginal`\
    \ 为 `false` 时生成消息。接着，它调用 `createThumbnail()` 方法，并将上传的图像作为参数传入。最后，如果 `$deleteOriginal`\
