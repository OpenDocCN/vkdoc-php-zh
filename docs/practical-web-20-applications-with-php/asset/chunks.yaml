    第14章 ■ 部署与维护


    现在，如果你尝试访问`http://phpweb20/admin`，除非你的用户类型是管理员，否则访问将被拒绝。


    ## 应用程序部署


    现在我们来研究将Web应用程序部署到生产服务器上的过程。到目前为止，我们假设所有开发都在专用的开发服务器上进行，并且应用程序的用户无法访问此服务器。


    管理Web应用程序版本的典型设置涉及三种类型的服务器：


    *   **开发服务器**：这里创建并测试新代码。应用程序有时可能正常工作，有时可能完全崩溃。通常只有开发人员和测试人员才能访问。

    *   **预发布服务器**：一旦Web应用程序的新版本完成，它会被部署到预发布服务器。此服务器的配置与生产服务器完全相同（相同的操作系统以及`Apache`、`PHP`等软件的版本）。此应用程序将完全功能化，但其数据可能是静态的且过时的（它通常不是备份服务器或镜像服务器）。它通常由开发人员和测试人员访问（或许还有委托您开发应用程序以批准更改的客户）。在预发布服务器上部署提供了一个很好的机会来确定在部署到生产服务器时可能出现的任何“陷阱”。

    *   **生产服务器**：一旦一切在预发布服务器上看起来运行正常，新的应用程序版本就可以部署到生产服务器。这是现实世界看到的服务器，它包含实时数据库和最新数据。


    实际上，普通Web开发者的流程可能不包含预发布服务器，因为开发服务器通常可以兼任预发布服务器。在以下章节中，为简化问题，我们将假设只处理开发服务器和生产服务器。


    ## 不同服务器的不同配置


    在将Web应用程序文件部署到生产服务器之前，我们必须处理不同服务器需要不同配置的问题。这样做的原因是，我们应该能够将所有文件部署到生产服务器，并使它们立即可用，而无需随后修改生产配置文件。


    例如，在你的开发环境中，数据库服务器很可能与Web服务器是同一台物理机器（这意味着你的`PHP`将连接到“`localhost`”上的服务器）。在生产环境中，情况可能并非如此。许多Web主机将数据库服务器与Web服务器分离。因此，你可能需要不同的数据库连接设置。为了处理这个问题，我们在应用程序的`settings.ini`文件中添加一个新段落。


    当我们在第2章创建设置文件时，所有配置字符串都位于一个名为`development`的段落中，该段落用方括号表示如下：


    ```

    [development]

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    `9063Ch14CMP2 11/13/07 8:20 PM Page 539`


    第14章 ■ 部署与维护


    **539**


    我们可以用同样的方式在该文件中定义更多段落。因此，如果我们想为生产环境设置不同的配置，我们会包括下面这行：


    ```

    [production]

    ```


    然后你将在这一行后面定义生产环境的设置。不过，这里唯一的问题是，某些设置对于开发和生产环境可能完全相同。为了帮助解决这个问题，`Zend_Config`允许在配置文件中进行继承。


    换句话说，对于生产环境的设置，我们可以使用所有开发环境的设置，然后根据需要覆盖每一个。我们通过如下方式定义新段落来实现：


    ```

    [production : development]

    ```


    回到之前在生产环境中为数据库服务器使用不同主机名的例子，我们可以使用以下配置文件：


    ```

    [development]


    database.type = pdo_mysql


    database.hostname = localhost


    database.username = phpweb20


    database.password = myPassword


    database.database = phpweb20


    ; other development settings here


    [production : development]


    database.hostname = 192.168.0.123

    ```


    在这段代码中，开发环境使用的所有设置（例如数据库用户名和密码）也将在生产环境中使用，但主机名`database.hostname`已被覆盖。


    清单14-19显示了你应该添加到`settings.ini`文件中的代码。即使你不打算更改任何设置，为了使后续的代码正常工作，你也需要添加这一行。


    **清单14-19.** *定义生产环境设置段落（`settings.ini`）*


    ```

    [development]


    ; other development settings here


    [production : development]

    ```


    ### 告诉引导程序使用哪个配置


    一旦为生产服务器创建了配置段落，我们必须更改引导文件，以便它加载正确的段落。到目前为止，我们已经硬编码引导程序使用开发环境的段落。问题是，代码如何知道加载哪个段落？


    为此，我们必须向引导程序中添加一些检测机制。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    `9063Ch14CMP2 11/13/07 8:20 PM Page 540`


    **540**


    第14章 ■ 部署与维护


    我们要采用的方法是在`Apache`配置中将值写入Web服务器环境。使用`Apache`的`SetEnv`指令，我们将写入一个值，该值指定要使用的配置段落的名称，以及要使用的设置文件的名称。'
  raw: 'First you need to consider the permissions of the administration section.
    Obviously you want only privileged users to be able to access this area. Thankfully,
    we already catered for this in Chapter 3 by defining permissions for a user type
    of administrator. The permissions defined in that chapter stated that the administrator
    role would be able to access the resource called admin.


    Creating an administrator is simply a matter of signing up for a new account on
    the site and then manually updating the database record of the created record
    using SQL.


    ■**Note** Typically it is only this initial administrator for whom you will need
    to perform manual SQL queries.


    If you do indeed implement a user management tool for the admin area as discussed
    earlier, then you will be able to create subsequent administrators, but you still
    need to create the initial administrator using SQL.


    For instance, if I wanted to update the user with the username qz to be an administrator,
    I could use the following SQL query on the application database:


    mysql> update users set user_type = ''administrator'' where username = ''qz'';
    Creating the AdminController Class


    The next step for implementing an administration area is to create a new controller.
    To obey the permissions defined in Chapter 3, this controller must be called AdminController.


    ■**Note** Recall that the line used in Chapter 3 was $this->acl->allow(''administrator'',
    ''admin''), meaning the administrator role can access the admin controller, while
    other users cannot.


    The code in Listing 14-18 shows a starting point for this controller and belongs
    in a file called ./include/Controllers/AdminController.php. Note that you will
    still have to create all necessary actions and templates accordingly.


    **Listing 14-18.** *A Skeleton for the Administration Area (AdminController.php)*


    <?php


    class AdminController extends CustomControllerAction


    {


    public function indexAction()


    {


    }


    }


    ?>


