    ## 继承与私有成员


    让我们从列表 8-5 中的程序开始，探讨在继承过程中私有类成员会发生什么。


    ```

    code=$code;

    }

    // 用于获取字段值的公有方法：

    public function get(){

    return $this->code;

    }

    }

    // 子类：

    class Bravo extends Alpha{

    // 构造函数：

    function __construct($code){

    // 调用继承的方法：

    $this->set($code);

    echo "已创建对象: ",$this->get(),"\n";

    }

    }

    // 创建子类对象：

    $obj=new Bravo(123);

    // 调用继承的方法：

    $obj->set(321);

    echo "字段 \$code: ",$obj->get(),"\n";

    ?>

