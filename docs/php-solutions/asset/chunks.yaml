    - `getMaxSize()`：获取单张图像的最大上传大小。默认值为 50 KB。\n- `setMaxSize()`：更改最大上传大小。参数应以允许的字节数表示。\n\
    \n因为 `ThumbnailUpload` 类依赖于 `Upload` 和 `Thumbnail` 类，所以在实际网站上使用此类时，你需要将这三个类定义文件上传到你的远程\
    \ Web 服务器。\n\n## 本章回顾\n\n这又是一个内容密集的章节，不仅展示了如何从较大的图像生成缩略图，还向你介绍了如何扩展现有类以及重写继承的方法。设计和扩展类起初可能会让人感到困惑，但如果你专注于每个方法的作用，事情就会变得不那么令人望而生畏。类设计的一个关键原则是将大型任务分解为小的、可管理的单元。理想情况下，一个方法应执行单一任务，例如为原始图像创建图像资源。\n\
    \n使用类的真正优势在于，一旦你定义了它们，就能节省大量时间和精力。每次你想向网站添加文件或缩略图上传功能时，无需输入数十行代码，调用该类只需几行简单的代码。此外，不要认为本章的代码仅限于创建和上传缩略图。类文件中的许多子程序都可以经过调整用于其他场景。\n\
    \n在下一章中，你将全面了解 PHP 会话。它能保留与特定用户相关的信息，并在密码保护网页方面起着至关重要的作用。\n"
- fmt: "# 9. Pages That Remember: Simple Login and Multipage Forms\n\nThe Web is a\
    \ brilliant illusion. When you visit a well-designed website, you get a great\
    \ feeling of continuity, as though flipping through the pages of a book or a magazine.\
    \ Everything fits together as a coherent entity. The reality is quite different.\
    \ Each part of an individual page is stored and handled separately by the web\
    \ server. Apart from needing to know where to send the relevant files, the server\
    \ has no interest in who you are. Each time a PHP script runs, the variables exist\
    \ only in the server’s memory and are normally discarded as soon as the script\
    \ finishes. Even variables in the `$_POST` and `$_GET` arrays have only a brief\
    \ lifespan. Their value is passed once to the next script and then removed from\
    \ memory unless you do something with it, such as storing the information in a\
    \ hidden form field. Even then, it persists only if the form is submitted.\n\n\
    To get around these problems, PHP uses sessions. After briefly describing how\
    \ sessions work, I’ll show you how you can use session variables to create a simple,\
    \ file-based login system and pass information from one page to another without\
    \ the need to use hidden form fields.\n\nIn this chapter, you’ll learn about the\
    \ following:\n\n- Understanding what sessions are and how to create them\n- Creating\
    \ a file-based login system\n- Checking password strength with a custom-built\
    \ class\n- Setting a time limit for sessions\n- Using sessions to keep track of\
    \ information over multiple pages\n\n## What Sessions Are and How They Work\n\n\
    A session ensures continuity by storing a random identifier—the session ID—on\
    \ the web server and as a cookie on the visitor’s computer. The web server uses\
    \ the cookie to recognize that it’s communicating with the same person (or, to\
    \ be more precise, with the same computer). Figures [9-1](#A978-1-4842-0635-5_9_Chapter.html#Fig1)\
    \ through [9-3](#A978-1-4842-0635-5_9_Chapter.html#Fig3) show the details of a\
    \ simple session created in my local testing environment.\n\n![A978-1-4842-0635-5_9_Fig1_HTML.jpg](A978-1-4842-0635-5_9_Fig1_HTML.jpg)\n\
    \n*Figure 9-1. PHP sessions store a unique identifier as a cookie in the browser*\n\
    \nAs Figure [9-1](#A978-1-4842-0635-5_9_Chapter.html#Fig1) shows, the cookie stored\
    \ in the browser is called `PHPSESSID`, and the content is a jumble of letters\
    \ and numbers. This random string is the session’s ID.\n\nA matching file, which\
    \ contains the same jumble of letters and numbers as part of its filename, is\
    \ created on the web server, as shown in Figure [9-2](#A978-1-4842-0635-5_9_Chapter.html#Fig2).\n\
    \n![A978-1-4842-0635-5_9_Fig2_HTML.jpg](A978-1-4842-0635-5_9_Fig2_HTML.jpg)\n\n\
    *Figure 9-2. The content of the cookie identifies the session data stored on the\
    \ web server*\n\nWhen a session is initiated, the server stores information in\
    \ session variables that can be accessed by other pages as long as the session\
    \ remains active (normally until the browser is closed). Because the session ID\
    \ is unique to each visitor, the information stored in session variables cannot\
    \ be seen by anyone else. This means sessions are ideal for user authentication,\
    \ although they can be used for any situation where you want to preserve information\
    \ for the same user when passing from one page to the next, such as with a multipage\
    \ form or a shopping cart.\n\nThe only information stored on the user’s computer\
    \ is the cookie that contains the session ID, which is meaningless by itself.\
    \ This means private information cannot be exposed simply by examining the contents\
    \ of this cookie.\n\nThe session variables and their values are stored on the\
    \ web server. Figure [9-3](#A978-1-4842-0635-5_9_Chapter.html#Fig3) shows the\
    \ contents of a simple session file. As you can see, it’s in plain text, and the\
    \ content isn’t difficult to decipher. The session shown in the figure has one\
    \ variable: `name`. The variable’s name is followed by a vertical pipe, then the\
    \ letter “s”, a colon, a number, another colon, and the variable’s value in quotes.\
    \ The “s” stands for string, and the number indicates how many characters the\
    \ string contains. So, this session variable contains my name as a string that\
    \ is five characters long.\n\n![A978-1-4842-0635-5_9_Fig3_HTML.jpg](A978-1-4842-0635-5_9_Fig3_HTML.jpg)\n\
    \n*Figure 9-3. The details of the session are stored on the server in plain text*\n\
    \nThis setup has several implications. The cookie containing the session ID normally\
    \ remains active until the browser is closed. So, if several people share the\
    \ same computer, they all have access to each other’s sessions unless they always\
    \ close the browser before handing over to the next person, something over which\
    \ you have no control. So, it’s important to provide a logout mechanism to delete\
    \ both the cookie and the session variables, keeping your site secure. You can\
    \ also create a timeout mechanism, which automatically prevents anyone from regaining\
    \ access after a certain period of inactivity.\n\nStoring session variables in\
    \ plain text on the web server is not, in itself, a cause for concern. As long\
    \ as the server is correctly configured, the session files cannot be accessed\
    \ through a browser. Inactive files are also routinely deleted by PHP (in theory,\
    \ the lifetime is 1,440 seconds—24 minutes, but this cannot be relied upon). Nevertheless,\
    \ it should be obvious that, if an attacker manages to compromise the server or\
    \ hijack a session, the information could be exposed. So, although sessions are\
    \ generally secure enough for password protecting parts of a website or working\
    \ with multipage forms, you should never use session variables to store sensitive\
    \ information, such as passwords or credit card details. As you’ll see in “Using\
    \ sessions to restrict access” later in this chapter, although a password is used\
    \ to gain access to a protected site, the password itself is stored (preferably\
    \ encrypted) in a separate location and not as a session variable.\n\nSessions\
    \ are supported by default, so you don’t need any special configuration. However,\
    \ sessions won’t work if cookies are disabled in the user’s browser. It is possible\
    \ to configure PHP to send the session ID through a query string, but this is\
    \ considered a security risk.\n\n### Creating PHP Sessions\n\nJust put the following\
    \ command in every PHP page that you want to use in a session:\n\n```\nsession_start();\n\
    ```\n\nThis command should be called only once in each page, and it must be called\
    \ before the PHP script generates any output, so the ideal position is immediately\
    \ after the opening PHP tag. If any output is generated before the call to `session_start()`,\
    \ the command fails and the session won’t be activated for that page. (See “The\
    \ ‘Headers already sent’ error” section later for an explanation).\n\n### Creating\
    \ and Destroying Session Variables\n\nYou create a session variable by adding\
    \ it to the `$_SESSION` superglobal array in the same way you would assign an\
    \ ordinary variable. Say you want to store a visitor’s name and display a greeting.\
    \ If the name is submitted in a login form as `$_POST['name']`, you assign it\
    \ like this:\n\n```\n$_SESSION['name'] = $_POST['name'];\n```\n\n`$_SESSION['name']`\
    \ can now be used in any page that begins with `session_start()`. Because session\
    \ variables are stored on the server, you should get rid of them as soon as they\
    \ are no longer required by your script or application. Unset a session variable\
    \ like this:\n\n```\nunset($_SESSION['name']);\n```\n\nTo unset all session variables—for\
    \ instance, when you’re logging someone out—set the `$_SESSION` superglobal array\
    \ to an empty array, like this:\n\n```\n$_SESSION = [];\n```\n\n> **Caution**\
    \  \n> Do not be tempted to try `unset($_SESSION)`. It works all right—but it’s\
    \ a little too effective. It not only clears the current session but also prevents\
    \ any further session variables from being stored."
  raw: '# 9. Pages That Remember: Simple Login and Multipage Forms


    The Web is a brilliant illusion. When you visit a well-designed website, you get
    a great feeling of continuity, as though flipping through the pages of a book
    or a magazine. Everything fits together as a coherent entity. The reality is quite
    different. Each part of an individual page is stored and handled separately by
    the web server. Apart from needing to know where to send the relevant files, the
    server has no interest in who you are. Each time a PHP script runs, the variables
    exist only in the server’s memory and are normally discarded as soon as the script
    finishes. Even variables in the `$_POST` and `$_GET` arrays have only a brief
    lifespan. Their value is passed once to the next script and then removed from
    memory unless you do something with it, such as storing the information in a hidden
    form field. Even then, it persists only if the form is submitted.


    To get around these problems, PHP uses sessions. After briefly describing how
    sessions work, I’ll show you how you can use session variables to create a simple,
    file-based login system and pass information from one page to another without
    the need to use hidden form fields.


    In this chapter, you’ll learn about the following:


    *   Understanding what sessions are and how to create them

    *   Creating a file-based login system

    *   Checking password strength with a custom-built class

    *   Setting a time limit for sessions

    *   Using sessions to keep track of information over multiple pages


    ## What Sessions Are and How They Work


    A session ensures continuity by storing a random identifier—the session ID—on
    the web server and as a cookie on the visitor’s computer. The web server uses
    the cookie to recognize that it’s communicating with the same person (or, to be
    more precise, with the same computer). Figures [9-1](#A978-1-4842-0635-5_9_Chapter.html#Fig1)
    through [9-3](#A978-1-4842-0635-5_9_Chapter.html#Fig3) show the details of a simple
    session created in my local testing environment.


    ![A978-1-4842-0635-5_9_Fig1_HTML.jpg](A978-1-4842-0635-5_9_Fig1_HTML.jpg)


    Figure 9-1.


    PHP sessions store a unique identifier as a cookie in the browser


    As Figure [9-1](#A978-1-4842-0635-5_9_Chapter.html#Fig1) shows, the cookie stored
    in the browser is called `PHPSESSID`, and the content is a jumble of letters and
    numbers. This random string is the session’s ID.


    A matching file, which contains the same jumble of letters and numbers as part
    of its filename, is created on the web server, as shown in Figure [9-2](#A978-1-4842-0635-5_9_Chapter.html#Fig2).


    ![A978-1-4842-0635-5_9_Fig2_HTML.jpg](A978-1-4842-0635-5_9_Fig2_HTML.jpg)


    Figure 9-2.


    The content of the cookie identifies the session data stored on the web server


    When a session is initiated, the server stores information in session variables
    that can be accessed by other pages as long as the session remains active (normally
    until the browser is closed). Because the session ID is unique to each visitor,
    the information stored in session variables cannot be seen by anyone else. This
    means sessions are ideal for user authentication, although they can be used for
    any situation where you want to preserve information for the same user when passing
    from one page to the next, such as with a multipage form or a shopping cart.


    The only information stored on the user’s computer is the cookie that contains
    the session ID, which is meaningless by itself. This means private information
    cannot be exposed simply by examining the contents of this cookie.


    The session variables and their values are stored on the web server. Figure [9-3](#A978-1-4842-0635-5_9_Chapter.html#Fig3)
    shows the contents of a simple session file. As you can see, it’s in plain text,
    and the content isn’t difficult to decipher. The session shown in the figure has
    one variable: `name`. The variable’s name is followed by a vertical pipe, then
    the letter “s”, a colon, a number, another colon, and the variable’s value in
    quotes. The “s” stands for string, and the number indicates how many characters
    the string contains. So, this session variable contains my name as a string that
    is five characters long.


    ![A978-1-4842-0635-5_9_Fig3_HTML.jpg](A978-1-4842-0635-5_9_Fig3_HTML.jpg)


    Figure 9-3.


    The details of the session are stored on the server in plain text


    This setup has several implications. The cookie containing the session ID normally
    remains active until the browser is closed. So, if several people share the same
    computer, they all have access to each other’s sessions unless they always close
    the browser before handing over to the next person, something over which you have
    no control. So, it’s important to provide a logout mechanism to delete both the
    cookie and the session variables, keeping your site secure. You can also create
    a timeout mechanism, which automatically prevents anyone from regaining access
    after a certain period of inactivity.


    Storing session variables in plain text on the web server is not, in itself, a
    cause for concern. As long as the server is correctly configured, the session
    files cannot be accessed through a browser. Inactive files are also routinely
    deleted by PHP (in theory, the lifetime is 1,440 seconds—24 minutes, but this
    cannot be relied upon). Nevertheless, it should be obvious that, if an attacker
    manages to compromise the server or hijack a session, the information could be
    exposed. So, although sessions are generally secure enough for password protecting
    parts of a website or working with multipage forms, you should never use session
    variables to store sensitive information, such as passwords or credit card details.
    As you’ll see in “Using sessions to restrict access” later in this chapter, although
    a password is used to gain access to a protected site, the password itself is
    stored (preferably encrypted) in a separate location and not as a session variable.


    Sessions are supported by default, so you don’t need any special configuration.
    However, sessions won’t work if cookies are disabled in the user’s browser. It
    is possible to configure PHP to send the session ID through a query string, but
    this is considered a security risk.


    ### Creating PHP Sessions


    Just put the following command in every PHP page that you want to use in a session:


    `session_start();`


    This command should be called only once in each page, and it must be called before
    the PHP script generates any output, so the ideal position is immediately after
    the opening PHP tag. If any output is generated before the call to `session_start()`,
    the command fails and the session won’t be activated for that page. (See “The
    ‘Headers already sent’ error” section later for an explanation).


    ### Creating and Destroying Session Variables


    You create a session variable by adding it to the `$_SESSION` superglobal array
    in the same way you would assign an ordinary variable. Say you want to store a
    visitor’s name and display a greeting. If the name is submitted in a login form
    as `$_POST[''name'']`, you assign it like this:


    `$_SESSION[''name''] = $_POST[''name''];`


    `$_SESSION[''name'']` can now be used in any page that begins with `session_start()`.
    Because session variables are stored on the server, you should get rid of them
    as soon as they are no longer required by your script or application. Unset a
    session variable like this:


    `unset($_SESSION[''name'']);`


    To unset all session variables—for instance, when you’re logging someone out—set
    the `$_SESSION` superglobal array to an empty array, like this:


    `$_SESSION = [];`


    Caution


    Do not be tempted to try `unset($_SESSION)`. It works all right—but it’s a little
    too effective. It not only clears the current session but also prevents any further
    session variables from being stored.'
  trans: "\n# 9. 具备记忆功能的页面：简易登录与多页表单\n\n网络世界是一场精妙的幻象。当你访问一个设计精良的网站时，会体验到一种强烈的连贯性，仿佛在翻阅一本书或一本杂志。所有元素都完美融合，成为一个协调的整体。而现实情况则大相径庭。网页的每个部分都由网络服务器分别存储和处理。除了需要知道将相关文件发送到哪里之外，服务器对你的身份毫无兴趣。每次\
    \ PHP 脚本运行时，变量只存在于服务器的内存中，并且通常在脚本执行完毕后就被丢弃。即便是 `$_POST` 和 `$_GET` 数组中的变量，其寿命也极其短暂。它们的值只被传递给下一个脚本一次，之后便从内存中移除——除非你对其进行某些操作，比如将信息存储在一个隐藏的表单字段中。即便如此，也只有在表单被提交时，这些信息才会持续存在。\n\
    \n为了解决这些问题，PHP 采用了会话（Sessions）机制。在简要介绍会话的工作原理之后，我将向你展示如何使用会话变量来创建一个简单的基于文件的登录系统，并在无需使用隐藏表单字段的情况下，将信息从一个页面传递到另一个页面。\n\
    \n在本章中，你将学习以下内容：\n\n-   理解什么是会话以及如何创建它们\n-   创建一个基于文件的登录系统\n-   使用自定义类检查密码强度\n\
    -   为会话设置时间限制\n-   使用会话在多页面间追踪信息\n\n## 什么是会话及其工作原理\n\n会话通过在 Web 服务器上以及访问者计算机的\
    \ Cookie 中存储一个随机标识符（即会话 ID）来确保连续性。Web 服务器利用这个 Cookie 来识别正在与同一个人（更准确地说，是同一台计算机）通信。图\
    \ 9-1 至 9-3 展示了在我的本地测试环境中创建的一个简单会话的详细信息。\n\n![A978-1-4842-0635-5_9_Fig1_HTML.jpg](img/A978-1-4842-0635-5_9_Fig1_HTML.jpg)\n\
    \n*图 9-1. PHP 会话将唯一标识符作为 Cookie 存储在浏览器中*\n\n如图 9-1 所示，存储在浏览器中的 Cookie 被称为 `PHPSESSID`，其内容是一串杂乱的字母和数字。这个随机字符串就是会话的\
    \ ID。\n\n在 Web 服务器上，会创建一个匹配的文件，文件名中包含同样杂乱的字母和数字，如图 9-2 所示。\n\n![A978-1-4842-0635-5_9_Fig2_HTML.jpg](img/A978-1-4842-0635-5_9_Fig2_HTML.jpg)\n\
    \n*图 9-2. Cookie 的内容标识了存储在 Web 服务器上的会话数据*\n\n当一个会话被启动时，服务器会将信息存储在会话变量中。只要会话保持活动状态（通常直到浏览器关闭），这些变量就可以被其他页面访问。由于每个访问者的会话\
    \ ID 都是唯一的，因此存储在会话变量中的信息不会被其他人看到。这意味着会话非常适合用于用户身份验证，尽管它们也可以用于任何你希望在从一页转到下一页时为同一用户保留信息的场景，例如多页表单或购物车。\n\
    \n存储在用户计算机上的唯一信息是包含会话 ID 的 Cookie，而这个 ID 本身毫无意义。这意味着，仅通过检查此 Cookie 的内容，私有信息是不会暴露的。\n\
    \n会话变量及其值存储在 Web 服务器上。图 9-3 显示了一个简单会话文件的内容。如你所见，它是纯文本格式，内容也不难解读。图中所示的会话只有一个变量：`name`。变量名后面跟着一个竖线，然后是字母“s”、冒号、一个数字、另一个冒号，以及用引号括起来的变量值。“s”代表字符串，数字表示该字符串包含的字符数。因此，这个会话变量包含我的名字，作为一个长度为\
    \ 5 个字符的字符串。\n\n![A978-1-4842-0635-5_9_Fig3_HTML.jpg](img/A978-1-4842-0635-5_9_Fig3_HTML.jpg)\n\
    \n*图 9-3. 会话的详细信息以纯文本形式存储在服务器上*\n\n这种设置有几个影响。包含会话 ID 的 Cookie 通常保持活动状态直到浏览器关闭。因此，如果多人共用同一台计算机，除非他们在交接给下一个人之前总是关闭浏览器（这是你无法控制的），否则他们都能访问彼此的会话。因此，提供一个注销机制来删除\
    \ Cookie 和会话变量，以保持你的网站安全，这一点非常重要。你还可以创建一个超时机制，在特定不活动时间后自动阻止任何人重新获得访问权限。\n\n将会话变量以纯文本形式存储在\
    \ Web 服务器上，这本身并不值得担忧。只要服务器配置正确，会话文件就不能通过浏览器访问。不活动的文件也会被 PHP 定期删除（理论上的生存时间是 1,440\
    \ 秒——24 分钟，但这并不能保证）。然而，显而易见的是，如果攻击者成功入侵了服务器或劫持了一个会话，这些信息就可能暴露。因此，尽管会话对于保护网站部分区域的密码或处理多页表单来说通常足够安全，但你绝不应将会话变量用于存储敏感信息，例如密码或信用卡详细信息。正如你将在本章后面的“使用会话限制访问”中看到的，虽然密码用于访问受保护站点，但密码本身是存储在单独的位置（最好是加密的），而不是作为会话变量。\n\
    \n会话默认是受支持的，因此你不需要任何特殊配置。但是，如果用户浏览器中禁用了 Cookie，会话将无法工作。可以配置 PHP 通过查询字符串发送会话 ID，但这被认为是一种安全风险。\n\
    \n### 创建 PHP 会话\n\n只需将以下命令放在你希望用于会话的每个 PHP 页面中：\n\n```\nsession_start();\n```\n\
    \n这个命令在每个页面中只应调用一次，并且必须在 PHP 脚本生成任何输出之前调用，因此理想位置是紧跟在 PHP 开始标签之后。如果在调用 `session_start()`\
    \ 之前生成了任何输出，该命令将失败，并且该页面的会话将不会被激活（稍后请参阅“‘Headers already sent’ 错误”一节以了解原因）。\n\n\
    ### 创建和销毁会话变量\n\n你可以通过将变量添加到 `$_SESSION` 超全局数组来创建会话变量，其方式与赋值普通变量相同。假设你想存储访问者的名字并显示问候语。如果名字在登录表单中作为\
    \ `$_POST['name']` 提交，你可以这样赋值：\n\n```\n$_SESSION['name'] = $_POST['name'];\n```\n\
    \n现在，`$_SESSION['name']` 可以在任何以 `session_start()` 开头的页面中使用。由于会话变量存储在服务器上，一旦你的脚本或应用程序不再需要它们，就应该将其清除。像这样释放一个会话变量：\n\
    \n```\nunset($_SESSION['name']);\n```\n\n要释放所有会话变量——例如，当你要注销某人时——将 `$_SESSION`\
    \ 超全局数组设置为空数组，像这样：\n\n```\n$_SESSION = [];\n```\n\n> **警告**  \n> 不要试图使用 `unset($_SESSION)`。它虽然能正常工作，但效果过强。它不仅会清除当前会话，还会阻止存储任何后续的会话变量。\n"
- fmt: "### Destroying a Session\n\nBy itself, unsetting all the session variables\
    \ effectively prevents any of the information from being reused, but you should\
    \ also invalidate the session cookie like this:\n\n```\nif (isset($_COOKIE[session_name()]))\
    \ {\n    setcookie(session_name(), '', time()-86400, '/');\n}\n```\n\nThis uses\
    \ the function `session_name()` to get the name of the session dynamically and\
    \ resets the session cookie to an empty string and to expire 24 hours ago (86,400\
    \ is the number of seconds in a day). The final argument (`'/'`) applies the cookie\
    \ to the whole domain.\n\nFinally, destroy the session with the following command:\n\
    \n```\nsession_destroy();\n```\n\nBy destroying a session like this, there is\
    \ no risk of an unauthorized person gaining access either to a restricted part\
    \ of the site or to any information exchanged during the session. However, a visitor\
    \ may forget to log out, so it’s not always possible to guarantee that the `session_destroy()`\
    \ command will be triggered, which is why it’s so important not to store sensitive\
    \ information in a session variable.\n\n**Caution**\n\nYou may find `session_register()`\
    \ and `session_unregister()` in old scripts. These functions were removed from\
    \ PHP 5.4 and are no longer available. Use `$_SESSION['variable_name']` and `unset($_SESSION['variable_name'])`\
    \ instead.\n\n### Regenerating the Session ID\n\nWhen a user changes status, such\
    \ as after logging in, it’s recommended as a security measure to regenerate the\
    \ session ID. This changes the random string of letters and numbers that identify\
    \ the session but preserves all the information stored in session variables. In\
    \ PHP Pro Security, 2nd Edition (Apress, 2010, ISBN 978-1-4302-3318-3), Chris\
    \ Snyder and Michael Southwell explain that “the goal of generating a fresh session\
    \ ID is to remove the possibility, however slight, that an attacker with knowledge\
    \ of the low-level security session might be able to perform high-security tasks.”\n\
    \nTo regenerate the session ID, simply call `session_regenerate_id()` and redirect\
    \ the user to another page or reload the same one.\n\n### The “Headers Already\
    \ Sent” Error\n\nAlthough using PHP sessions is very easy, there’s one problem\
    \ that causes beginners a great deal of head banging. Instead of everything working\
    \ the way you expect, you see the following message:\n\n```\nWarning: Cannot add\
    \ header information - headers already sent\n```\n\nI’ve mentioned this problem\
    \ several times before in conjunction with the `header()` function. It affects\
    \ `session_start()` and `setcookie()` as well. In the case of `session_start()`,\
    \ the solution is simple: make sure that you put it immediately after the opening\
    \ PHP tag (or very soon thereafter), and check that there’s no whitespace before\
    \ the opening tag.\n\nSometimes the problem occurs even if there is no whitespace\
    \ ahead of the PHP tag. This is usually caused by editing software inserting the\
    \ byte order mark (BOM) at the beginning of the script. If this happens, open\
    \ your script editor’s preferences and disable the use of the BOM in PHP pages.\n\
    \nWhen using `setcookie()` to destroy the session cookie, however, it’s quite\
    \ likely that you may need to send output to the browser before calling the function.\
    \ In this case, PHP lets you save the output in a buffer using `ob_start()`. You\
    \ then flush the buffer with `ob_end_flush()` after `setcookie()` has done its\
    \ job. You’ll see how to do this in PHP Solution 9-2.\n\n## Using Sessions to\
    \ Restrict Access\n\nThe first words that probably come to mind when thinking\
    \ about restricting access to a website are “username” and “password.” Although\
    \ these generally unlock entry to a site, neither is essential to a session. You\
    \ can store any value as a session variable and use it to determine whether to\
    \ grant access to a page. For instance, you could create a variable called `$_SESSION['status']`\
    \ and give visitors access to different parts of the site depending on its value,\
    \ or no access at all if it hasn’t been set.\n\nA little demonstration should\
    \ make everything clear and will show you how sessions work in practice."
  raw: '### Destroying a Session


    By itself, unsetting all the session variables effectively prevents any of the
    information from being reused, but you should also invalidate the session cookie
    like this:


    `if (isset($_COOKIE[session_name()])) {`


    `setcookie(session_name(), '''', time()-86400, ''/'');`


    `}`


    This uses the function `session_name()` to get the name of the session dynamically
    and resets the session cookie to an empty string and to expire 24 hours ago (86,400
    is the number of seconds in a day). The final argument (`''/''`) applies the cookie
    to the whole domain.


    Finally, destroy the session with the following command:


    `session_destroy();`


    By destroying a session like this, there is no risk of an unauthorized person
    gaining access either to a restricted part of the site or to any information exchanged
    during the session. However, a visitor may forget to log out, so it’s not always
    possible to guarantee that the `session_destroy()` command will be triggered,
    which is why it’s so important not to store sensitive information in a session
    variable.


    Caution


    You may find `session_register()` and `session_unregister()` in old scripts. These
    functions were removed from PHP 5.4 and are no longer available. Use `$_SESSION[''variable_name'']`
    and `unset($_SESSION[''variable_name''])` instead.


    ### Regenerating the Session ID


    When a user changes status, such as after logging in, it’s recommended as a security
    measure to regenerate the session ID. This changes the random string of letters
    and numbers that identify the session but preserves all the information stored
    in session variables. In PHP Pro Security, 2nd Edition (Apress, 2010, ISBN 978-1-4302-3318-3),
    Chris Snyder and Michael Southwell explain that “the goal of generating a fresh
    session ID is to remove the possibility, however slight, that an attacker with
    knowledge of the low-level security session might be able to perform high-security
    tasks.”


    To regenerate the session ID, simply call `session_regenerate_id()` and redirect
    the user to another page or reload the same one.


    ### The “Headers Already Sent” Error


    Although using PHP sessions is very easy, there’s one problem that causes beginners
    a great deal of head banging. Instead of everything working the way you expect,
    you see the following message:


    `Warning: Cannot add header information - headers already sent`


    I’ve mentioned this problem several times before in conjunction with the `header()`
    function. It affects `session_start()` and `setcookie()` as well. In the case
    of `session_start()`, the solution is simple: make sure that you put it immediately
    after the opening PHP tag (or very soon thereafter), and check that there’s no
    whitespace before the opening tag.


    Sometimes the problem occurs even if there is no whitespace ahead of the PHP tag.
    This is usually caused by editing software inserting the byte order mark (BOM)
    at the beginning of the script. If this happens, open your script editor’s preferences
    and disable the use of the BOM in PHP pages.


    When using `setcookie()` to destroy the session cookie, however, it’s quite likely
    that you may need to send output to the browser before calling the function. In
    this case, PHP lets you save the output in a buffer using `ob_start()`. You then
    flush the buffer with `ob_end_flush()` after `setcookie()` has done its job. You’ll
    see how to do this in PHP Solution 9-2.


    ## Using Sessions to Restrict Access


    The first words that probably come to mind when thinking about restricting access
    to a website are “username” and “password.” Although these generally unlock entry
    to a site, neither is essential to a session. You can store any value as a session
    variable and use it to determine whether to grant access to a page. For instance,
    you could create a variable called `$_SESSION[''status'']` and give visitors access
    to different parts of the site depending on its value, or no access at all if
    it hasn’t been set.


    A little demonstration should make everything clear and will show you how sessions
    work in practice.'
  trans: "\n### 销毁会话\n\n仅仅取消设置所有会话变量能有效防止任何信息被重复使用，但你也应像这样使会话 Cookie 失效：\n\n```\n\
    if (isset($_COOKIE[session_name()])) {\n    setcookie(session_name(), '', time()-86400,\
    \ '/');\n}\n```\n\n这里使用函数 `session_name()` 动态获取会话名称，并将会话 Cookie 重置为空字符串，且将其过期时间设为\
    \ 24 小时之前（86,400 是一天的秒数）。最后一个参数（`'/'`）将 Cookie 应用于整个域名。\n\n最后，使用以下命令销毁会话：\n\n\
    ```\nsession_destroy();\n```\n\n像这样销毁会话后，未经授权的人员便无法访问网站的限制区域或会话期间交换的任何信息。然而，访问者可能会忘记注销，因此无法始终保证\
    \ `session_destroy()` 命令会被触发，这就是为什么不在会话变量中存储敏感信息如此重要的原因。\n\n**注意**\n\n你可能会在旧脚本中见到\
    \ `session_register()` 和 `session_unregister()` 函数。这些函数已在 PHP 5.4 中被移除，不再可用。请改用\
    \ `$_SESSION['variable_name']` 和 `unset($_SESSION['variable_name'])`。\n\n### 重新生成会话\
    \ ID\n\n当用户状态发生改变时（例如登录后），建议作为安全措施重新生成会话 ID。这会更改标识会话的随机字母数字字符串，但会保留存储在会话变量中的所有信息。在《PHP\
    \ Pro Security》第二版（Apress, 2010，ISBN 978-1-4302-3318-3）中，Chris Snyder 和 Michael\
    \ Southwell 解释道：“生成新会话 ID 的目的是消除攻击者利用低级安全会话知识执行高级安全任务的可能性，无论这种可能性多么微小。”\n\n要重新生成会话\
    \ ID，只需调用 `session_regenerate_id()`，然后将用户重定向到另一个页面或重新加载当前页面。\n\n### “标头已发送”错误\n\
    \n虽然使用 PHP 会话非常简单，但有一个问题常让初学者头疼不已。你看到的不是一切按预期工作，而是以下消息：\n\n```\nWarning: Cannot\
    \ add header information - headers already sent\n```\n\n我之前在讨论 `header()` 函数时已多次提及此问题。它同样会影响\
    \ `session_start()` 和 `setcookie()`。对于 `session_start()`，解决方案很简单：确保将其紧跟在 PHP 开始标签之后（或尽早放置），并检查开始标签前没有空白字符。\n\
    \n有时即使 PHP 标签前没有空白字符，问题仍会发生。这通常是由于编辑软件在脚本开头插入了字节顺序标记（BOM）。如果遇到这种情况，请打开脚本编辑器的偏好设置，禁用\
    \ PHP 页面中的 BOM 使用。\n\n然而，当使用 `setcookie()` 销毁会话 Cookie 时，很可能需要在调用该函数之前向浏览器发送输出。在这种情况下，PHP\
    \ 允许你使用 `ob_start()` 将输出保存在缓冲区中。然后在 `setcookie()` 完成其工作后，使用 `ob_end_flush()` 刷新缓冲区。你将在\
    \ PHP 解决方案 9-2 中了解如何实现。\n\n## 使用会话限制访问\n\n当考虑限制网站访问时，最先想到的词可能是“用户名”和“密码”。尽管这些通常是解锁网站入口的关键，但它们对会话来说并非必需。你可以将任何值存储为会话变量，并用它来决定是否允许访问某个页面。例如，你可以创建一个名为\
    \ `$_SESSION['status']` 的变量，根据其值赋予访问者网站不同区域的权限，如果未设置则该变量不赋予任何访问权限。\n\n一个小演示应该能让一切清晰明了，并向你展示会话在实际中是如何运作的。\n"
- fmt: '### PHP Solution 9-1: A Simple Session Example


    This should take only a few minutes to build, but you can also find the complete
    code in `session_01.php`, `session_02.php`, and `session_03.php`, in the `ch09`
    folder.


    Create a page called `session_01.php` in a new folder called `sessions` in the
    `phpsols` site root. Insert a form with a text field called `name` and a `Submit`
    button. Set the `method` to `post` and `action` to `session_02.php`. The form
    should look like this:


    ```

    <form method="post" action="session_02.php">


    <p>


    <label for="name">Name:</label>


    <input type="text" name="name" id="name">


    </p>


    <p>


    <input type="submit" name="Submit" value="Submit">


    </p>


    </form>

    ```


    In another page called `session_02.php`, insert this above the `DOCTYPE` declaration:


    ```

    <?php


    // initiate session


    session_start();


    // check that form has been submitted and that name is not empty


    if ($_POST && !empty($_POST[''name''])) {


    // set session variable


    $_SESSION[''name''] = $_POST[''name''];


    }


    ?>

    ```


    Insert the following code between the `<body>` tags in `session_02.php`:


    - The inline comments explain what’s going on. The session is started, and as
    long as `$_POST[''name'']` isn’t empty, its value is assigned to `$_SESSION[''name'']`.


    ```

    <?php


    // check session variable is set


    if (isset($_SESSION[''name''])) {


    // if set, greet by name


    echo ''Hi, '' . $_SESSION[''name''] . ''. <a href="session_03.php">Next</a>'';


    } else {


    // if not set, send back to login


    echo ''Who are you? <a href="session_01.php">Login</a>'';


    }


    ?>

    ```


    - If `$_SESSION[''name'']` has been set, a welcome message is displayed along
    with a link to `session_03.php`. Otherwise, the page tells the visitor that it
    doesn’t recognize who’s trying to gain access and provides a link back to the
    first page.


    **Caution**


    Take care when typing the following line:


    `echo ''Hi, '' . $_SESSION[''name''] . ''. <a href="session03.php">Next</a>'';`


    The first two periods (surrounding `$_SESSION[''name'']`) are the PHP concatenation
    operator. The third period (immediately after a single quote) is an ordinary period
    that will be displayed as part of the string.


    Create `session_03.php`. Type the following above the `DOCTYPE` to initiate the
    session:


    `<?php session_start(); ?>`


    Insert the following code between the `<body>` tags of `session_03.php`:


    ```

    <?php


    // check whether session variable is set


    if (isset($_SESSION[''name''])) {


    // if set, greet by name


    echo ''Hi, '' . $_SESSION[''name''] . ''. See, I remembered your name!<br>'';


    // unset session variable


    unset($_SESSION[''name'']);


    // invalidate the session cookie


    if (isset($_COOKIE[session_name()])) {


    setcookie(session_name(), '''', time()-86400, ''/'');


    }


    // end session


    session_destroy();


    echo ''<a href="session_02.php">Page 2</a>'';


    } else {


    // display if not recognized


    echo "Sorry, I don''t know you.<br>";


    echo ''<a href="session_01.php">Login</a>'';


    }


    ?>

    ```


    Load `session_01.php` into a browser, type your name in the text field, and click
    Submit. You should see something like the following screenshot. At this stage,
    there is no apparent difference between what happens here and in an ordinary form.


    - If `$_SESSION[''name'']` has been set, the page displays it, then unsets it
    and invalidates the current session cookie. By placing `session_destroy()` at
    the end of the first code block, the session and its associated variables cease
    to be available.


    ![A978-1-4842-0635-5_9_Figa_HTML.jpg](A978-1-4842-0635-5_9_Figa_HTML.jpg)


    When you click Next, the power of sessions begins to show. The page remembers
    your name, even though the `$_POST` array is no longer available to it. If you’re
    using XAMPP as your testing setup, you’ll probably see something similar to the
    following screenshot.


    ![A978-1-4842-0635-5_9_Figb_HTML.jpg](A978-1-4842-0635-5_9_Figb_HTML.jpg)


    - However, with other setups, such as MAMP, you’re likely to get a “headers already
    sent” warning message like this:


    ![A978-1-4842-0635-5_9_Figc_HTML.jpg](A978-1-4842-0635-5_9_Figc_HTML.jpg)


    **Note**


    As explained in [Chapter 4](#A978-1-4842-0635-5_4_Chapter.html), XAMPP doesn’t
    produce the warning about headers because it’s configured to buffer the first
    4 KB of output. However, not all servers buffer output, so it’s important to fix
    this problem.


    Click the link to Page 2 (if you got an error message, it’s just below the message).
    The session has been destroyed, so this time `session_02.php` has no idea who
    you are.


    ![A978-1-4842-0635-5_9_Figd_HTML.jpg](A978-1-4842-0635-5_9_Figd_HTML.jpg)


    Type the address of `session_03.php` in the browser address bar and load it. It,
    too, has no recollection of the session and displays an appropriate message.


    ![A978-1-4842-0635-5_9_Fige_HTML.jpg](A978-1-4842-0635-5_9_Fige_HTML.jpg)


    Even if you didn’t get the warning message in step 8, you need to prevent it from
    happening when you deploy pages that rely on sessions to other servers. The error
    message not only looks bad, but it also means `setcookie()` can’t invalidate the
    session cookie. Even though `session_start()` comes immediately after the opening
    PHP tag in `session_03.php`, the warning message is triggered by the `DOCTYPE`
    declaration, the `<head>`, and other HTML being output before `setcookie()`.


    ### PHP Solution 9-2: Buffering the Output with ob_start( )


    Although you could put `setcookie()` in the PHP block above the `DOCTYPE` declaration,
    you would also need to assign the value of `$_SESSION[''name'']` to an ordinary
    variable, because it ceases to exist after the session is destroyed. Rather than
    pull the whole script apart, the answer is to buffer the output with `ob_start()`.


    Continue working with `session_03.php` from the previous section.


    Amend the PHP block above the `DOCTYPE` declaration like this:


    ```

    <?php


    session_start();


    ob_start();


    ?>

    ```


    Flush the output immediately after invalidating the session cookie, like this:


    - This turns on output buffering and prevents output from being sent to the browser
    until the end of the script or until you specifically flush the output with `ob_end_flush()`.


    ```

    // invalidate the session cookie


    if (isset($_COOKIE[session_name()])) {


    setcookie(session_name(), '''', time()-86400, ''/'');


    }


    ob_end_flush();

    ```


    Save `session_03.php` and test the sequence again. This time there should be no
    warning. More important, the session cookie is no longer valid.


    ### Using File-based Authentication


    As you have just seen, the combination of session variables and conditional statements
    lets you present completely different pages to a visitor depending on whether
    a session variable has been set. All you need to do is add a password-checking
    system and you have a basic user authentication system.


    In PHP Solution 7-2 I showed you how to use the `fopen()` and `fgetcsv()` functions
    to generate a multidimensional associative array from a CSV file. You can now
    adapt that script to create a simple login system using sessions. Each person’s
    username and password are stored as comma-separated values in `users.csv`. The
    first line of the file contains the field headers that are used as the keys for
    each subarray. The contents of the file look like this:


    ```

    name,password


    david,codeslave


    ben,bigboss

    ```


    **Note**


    The following PHP solutions assume there’s a copy of `users.csv` in the `private`
    folder that was set up in [Chapter 7](#A978-1-4842-0635-5_7_Chapter.html). Refer
    to [Chapter 7](#A978-1-4842-0635-5_7_Chapter.html) if you haven’t set up a folder
    for PHP to read and write files. If you create your own version of `users.csv`,
    there should be no space after the comma separating the username and password.'
