    \ In the right side of the screen, you can see the name of the selected department,\
    \ its description, and its featured products. We decided to list only the featured\
    \ products in the department page, in part because the complete list would be\
    \ too long. The text above the list of featured products is the description for\
    \ the selected department, which means you’ll need to store both a name and a\
    \ description for each department in the database.\n\nIn this page, when a particular\
    \ category from the categories list is selected, all of its products are listed,\
    \ along with updated title and description text.\n\nClicking a product’s image\
    \ in any of the products lists takes you to a product details page, which you\
    \ can see in Figure 3-3.\n\n**Figure 3-3.** *Visiting the Halloween Hats category*\
    \  \nWhen a category is selected, all its products are listed—you no longer see\
    \ featured products. Note that the description text also changes. This time, this\
    \ is the description of the selected category.\n\n## Roadmap for This Chapter\n\
    \nAs you can see, the product catalog, although not very complicated, has more\
    \ parts that need to be covered. In this chapter, you’ll only create the departments\
    \ list (see Figure 3-4).\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00180.png)\n\n648XCH03.qxd 11/8/06 9:44 AM Page 61\n\nCHAPTER 3 ■\
    \ CREATING THE PRODUCT CATALOG: PART I **61**\n\n**Figure 3-4.** *The departments\
    \ list*\n\nThe departments list will be the first dynamically generated data in\
    \ your site (the names of the departments will be extracted from the database).\n\
    \nIn this chapter, you’ll implement just the departments list part of the web\
    \ site. After you understand what happens behind the list of departments, you’ll\
    \ quickly implement the other components of the product catalog in Chapter 4.\n\
    \nIn Chapter 2, we discussed the three-tiered architecture that you’ll use to\
    \ implement the web application. The product catalog part of the site makes no\
    \ exception to the rule, and its components (including the departments list) will\
    \ be spread over the three logical layers.\n\nFigure 3-5 previews what you’ll\
    \ create at each tier in this chapter to achieve a functional departments list.\n\
    \n## Web Server\n### Presentation Tier\n- `Smarty` Componentized Template:\n \
    \ - `departments_list.tpl` (Smarty Design Template)\n  - `function.load_departments_list.php`\
    \ (Smarty function plugin and `DepartmentsList` helper class)\n\n### Business\
    \ Tier\n- PHP Code:\n  - `catalog.php` (contains the `Catalog` class and its `GetDepartments`\
    \ method)\n  - `database_handler.php` (contains the `DatabaseHandler` class)\n\
    \  - `error_handler.php` (contains the `ErrorHandler` class)\n\n## PostgreSQL\
    \ Server\n### Data Tier\n- PostgreSQL function: `catalog_get_departments_list()`\n\
    - Data: `Department` (PostgreSQL data table)\n- Data Store\n\n**Figure 3-5.**\
    \ *The components of the departments list*\n\nSo far, you’ve only played a bit\
    \ with the presentation and business tiers in Chapter 2. Now, when building the\
    \ catalog, you’ll finally meet the final tier and work further with the `hatshop`\
    \ database. (Depending on whom you ask, the data store may or may not be considered\
    \ an integral part of the three-tiered architecture.)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XCH03.qxd 11/8/06 9:44 AM Page 62\n\n**62** CHAPTER 3 ■ CREATING THE PRODUCT\
    \ CATALOG: PART I\n\nThese are the main steps you’ll take toward having your own\
    \ dynamically generated departments list. Note that you start with the database\
    \ and make your way to the presentation tier:\n\n1. Create the `department` table\
    \ in the database. This table will store data regarding the store’s departments.\
    \ Before adding this table, you’ll learn the basic concepts of working with relational\
    \ databases.\n\n2. Write a PostgreSQL function named `catalog_get_departments_list`,\
    \ which returns the IDs and names of the departments from the `department` table.\
    \ PHP scripts will call this function to generate the departments list for your\
    \ visitor. PostgreSQL functions are logically located in the data tier of your\
    \ application. At this step, you’ll learn how to speak to your relational database\
    \ using SQL.\n\n3. Create the `DatabaseHandler` class, which will be your helper\
