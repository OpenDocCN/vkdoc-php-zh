    \n## Architecture Overview\n\nWith a lot of ground to cover, let's kick off with\
    \ an overview of the patterns to come, followed by an introduction to building\
    \ layered, or tiered, applications.\n\n### The Patterns\n\nI will explore several\
    \ patterns in this chapter. You may read from start to finish or dip into those\
    \ patterns that fit your needs or pique your interest:\n\n*   Registry : This\
    \ pattern is useful for making data available to all classes in a process. Through\
    \ careful use of serialization, it can also be used to store information across\
    \ a session or even across instances of an application.\n*   Front Controller\
    \ : Use this for larger systems in which you know that you will need as much flexibility\
    \ as possible in managing many different views and commands.\n*   Application\
    \ Controller : Create a class to manage view logic and command selection.\n* \
    \  Template View : Create pages that manage display and user interface only, incorporating\
