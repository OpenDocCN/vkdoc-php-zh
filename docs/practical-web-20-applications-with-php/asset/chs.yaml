  \ 11/13/07 8:20 PM Page 524\n\n**524**\n\n第 14 章 ■ 部署与维护\n\n> **注意** `grep` 的 `-i`\
  \ 选项表示搜索时不区分大小写。\n\n在开发新功能时，实时监控日志文件也很有用。当你无法轻松地将调试信息直接输出到浏览器时（例如在 Ajax 子请求中或使用第三方服务时），这一点尤其重要。你可以使用\
  \ `tail -f` 来实现这一点，这意味着 `tail` 会监控文件的任何更改，并在文件写入时显示其中的任何新数据。\n\n```\ntail -f /var/www/phpweb20/data/logs/debug.log\n\
  ```\n\n> **提示** 使用 `-f` 选项时，可以按 Ctrl+C 退出 `tail`。另请注意，运行此命令时，在监控新内容之前会显示最后十行，就像正常运行\
  \ `tail` 时一样（假设你没有指定要显示的行数）。\n\n你可能还需要考虑的另一个问题是管理日志文件，因为在一个记录了大量调试信息的高流量站点上，它们可能会变得非常大。你可能需要考虑使用诸如\
  \ `logrotate` 之类的工具。\n\n无论如何，现在已为你的应用程序日志记录和审计需求奠定了坚实的基础。你现在可以轻松地为任何新开发的类添加日志记录功能。\n\
  \n### 站点错误处理\n\n现在我们将要更改代码，以处理用户访问站点时可能发生的任何错误。在你的网站日常运行中，可能会发生几种类型的错误：\n\n- **数据库错误。**\
  \ 这是与访问数据库服务器或其数据相关的任何错误。例如，可能发生的错误包括：\n  - 连接错误，由于服务器或网络可能宕机、用户名或密码不正确或数据库名称不正确而导致。\n\
  \  - 查询错误，由于使用的 SQL 无效而导致。如果你的应用程序已正确开发和测试，则这些错误不应发生。\n  - 数据错误，由于违反数据库中的约束而导致。如果你在唯一字段中输入了重复值，或者从通过外键被其他地方引用的表中删除数据，则可能发生此错误。同样，如果应用程序已正确开发和测试，则不应发生此错误。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n9063Ch14CMP2 11/13/07 8:20\
  \ PM Page 525\n\n第 14 章 ■ 部署与维护\n\n**525**\n\n- **应用程序运行时错误。** 这是一个相当宽泛的标题，基本上涵盖了代码中发生的任何错误（包括未捕获的异常）。可能发生的应用程序错误示例如下：\n\
  \  - 文件系统和权限错误，例如应用程序尝试读取不存在的文件或不允许读取的文件。同样，如果应用程序尝试写入文件但不允许，那么也会导致错误。你的应用程序读取的格式不正确的文件也可能导致错误。\n\
  \  - 如果你的应用程序访问远程服务器上的 Web 服务，那么你的应用程序运行的好坏程度部分取决于这些服务器。例如，如果你使用第三方网关处理信用卡付款，那么该网关必须正常运行，你才能在你的站点上进行销售。\n\
  \n- **HTTP 错误。** 这些是基于用户请求发生的错误。最常见的 HTTP 错误（也是我们将在本节中介绍的错误）是 404 文件未找到错误。虽然可能发生许多不同的错误，但其他常见的错误包括\
  \ 401 未经授权（如果用户尝试访问他们必须登录才能访问的资源）和 403 禁止访问（如果用户根本不被允许访问该资源）。\n\n> **注意** 首先，由于我们在第\
  \ 2 章中为应用程序设置的 Apache 重写规则，我们不会按照人们使用 Apache 的“传统方式”（使用 `ErrorDocument 404`）来处理\
  \ 404 错误。相反，当用户尝试访问不存在的控制器或操作时，我们将生成 404 错误。其次，401 和 403 错误不适用于我们的应用程序，即使我们有权限系统。这是因为我们已经实现了自己的用户登录和权限系统，所以传统的\
  \ HTTP 状态码并不适用。\n\n尽管我们可以在设置应用程序时（特别是处理数据库和 404 错误时）就包含上述错误处理，但我选择将它们全部归并到这一节中，以便你可以看到系统作为一个整体如何对错误做出反应。\n\
  \n请注意，在某些情况下，我们已经处理了发生的各种应用程序错误。一个例子是捕获在各种情况下抛出的异常，例如在第 12 章实现博客文章索引功能时。\n\n在我们即将实现的错误处理中，我们将为应用程序的两个区域添加处理能力：\n\
  \n- 在请求被分发之前。这是为了处理在使用 `Zend_Controller_Front` 分发结果之前发生的任何错误。换句话说，它将处理 `index.php`\
  \ 引导文件中代码发生的任何错误。\n- 在请求被分发期间。这是为了处理应用程序内部发生的任何错误，例如在控制器操作或我们编写的众多类之一中（即我们尚未处理的错误）。这还包括\
  \ HTTP 错误，例如当文件未找到时（404）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  9063Ch14CMP2 11/13/07 8:20 PM Page 526\n\n**526**\n\n第 14 章 ■ 部署与维护\n\n#### 错误处理的目标\n\
  \n在实施任何错误处理之前，我们必须确定我们实际上希望通过处理错误来实现什么。一个错误处理系统应执行以下操作：\n\n- **通知用户发生了错误。** 无论是系统错误还是用户错误，用户都应该知道出了问题，并且他们的请求无法正确完成。\n\
  - **记录错误。** 这可能涉及将错误写入日志文件或通知系统管理员，或两者兼而有之。通常，用户错误（例如 404 错误）是不需要通知管理员的（尽管记录 404\
  \ 错误在统计分析中可能有用）。\n- **回滚当前请求。** 如果在客户端请求中途发生服务器错误，则应回滚任何已执行的操作。让我们以这样一个系统为例：它将用户提交的表单保存到本地数据库，并将其提交给第三方服务器。如果第三方服务器宕机（导致错误），则不应在本地保存表单，并且应通知用户。请注意，我们的应用程序不需要以这种方式处理错误。\n\
  \n> **注意** 这个例子有点粗糙。实际上，如果你有这样的系统，你通常会有一个外部进程（例如 cron 作业/计划任务）负责与第三方服务器通信，而不是在完成用户请求时实时执行该操作。然后，本地数据库记录将有一个状态列来指示表单是否已成功远程提交。这个例子应该能说明回滚请求的要点。\n\
  \n#### 处理分发前错误\n\n首先，我们将处理在分发用户请求之前可能出现的任何错误。在我们的应用程序中，在分发请求之前，我们会加载配置文件、初始化应用程序日志记录器并连接到数据库。此外，我们将捕获其他任何地方（即在分发循环中）未捕获的错误。\n\
  \n\n\n# 应用错误处理与日志记录\n\n本质上，我们要做的是将应用程序引导文件（`./htdocs/index.php`）中的所有代码包装在单个`try\
  \ … catch`语句中，这意味着如果在处理用户请求的任何部分发生任何错误（尚未以其他方式处理），我们可以在一个地方处理它。\n\n##### 向用户通知错误\n\
  \n当我们检测到发生错误时，我们将把用户的浏览器重定向到一个静态 HTML 页面，该页面不依赖数据库甚至 PHP。\n\n这个页面将简单地告知用户出了问题，并且他们的请求无法完成。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n---\n\n**第 14 章 部署与维护 527**\n\
  \n`Listing 14-6`显示了`error.html`文件的代码，我们将其存储在`./htdocs`目录中。在生产环境中使用时，你可能更愿意进一步自定义此页面（通过添加你的\
  \ Logo 和 CSS 样式）。\n\n**Listing 14-6.** *通知用户网站正在维护（error.html）*\n\n```\n<!DOCTYPE\
  \ html\nPUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\"\n\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
  >\n<html lang=\"en\" xml:lang=\"en\">\n<head>\n<title>This site is undergoing maintenance</title>\n\
  <meta http-equiv=\"Content-Type\" content=\"text/html; charset=iso-8859-1\" />\n\
  </head>\n<body>\n<div>\n<h1>Site Under Maintenance</h1>\n<p>\nThis site is currently\
  \ under maintenance.\nPlease check back shortly.\n</p>\n</div>\n</body>\n</html>\n\
  ```\n\n##### 捕获错误\n\n现在我们有了一个出错时显示的错误模板，接下来要对引导文件进行一些修改。我们不在此文件中使用多个`try … catch`结构，而是只使用一个。这将涵盖`index.php`中几乎所有的代码。\n\
  \n然而，这样做的唯一问题是，我们无法将这些错误写入日志文件，因为日志记录器将在`try`块内创建，因此在`catch`块中不可用。为了解决这个问题，我们将首先创建日志记录器，并且不使用配置文件中的值，而是使用\
  \ Apache 的`SERVER_ADMIN`变量。如果 Web 服务器配置正确，那么这应该包含一个有效的电子邮件地址，用于联系管理员。\n\n我们将在代码中初始使用`SERVER_ADMIN`值，一旦`settings.ini`成功加载，就使用配置文件中的`logging.email`值。如果此值在\
  \ Apache 配置中设置不正确，那么异常处理器将捕获此问题。由于`Zend_Log`至少需要一个写入器，我使用了`Zend_Log_Writer_Null`来确保始终有一个写入器。如果不这样做，异常处理器中将会发生错误，因为我们将异常消息写入`$logger`。\n\
  \n---\n\n**第 14 章 部署与维护 528**\n\n> **注意** `Zend_Log_Writer_Null`是一个特殊的写入器，它只是丢弃所有消息，而不实际写入或发送到任何地方。\n\
  \n`Listing 14-7`显示了引导文件的开头部分，存储在`./htdocs/index.php`中。整个文件将在后续的列表中展示。\n\n**Listing\
  \ 14-7.** *使用 Apache 配置确定日志电子邮件地址（index.php）*\n\n```\n<?php\nrequire_once('Zend/Loader.php');\n\
  Zend_Loader::registerAutoload();\n\n// setup the application logger\n$logger = new\
  \ Zend_Log(new Zend_Log_Writer_Null());\n\ntry {\n    $writer = new EmailLogger($_SERVER['SERVER_ADMIN']);\n\
  \    $writer->addFilter(new Zend_Log_Filter_Priority(Zend_Log::CRIT));\n    $logger->addWriter($writer);\n\
  ```\n\n请注意，我们使用`$writer`变量来保存`EmailLogger`对象，以便稍后更改目标电子邮件地址。\n\n\n\n接下来是清单 14-8，其中我们加载了应用程序配置。接着我们修改`$logger`对象，使其能够写入文件系统，并将关键日志消息发送到`settings.ini`中的电子邮件地址，而非使用`SERVER_ADMIN`值。\n\
  \n**清单 14-8.** *更改日志记录器以使用配置值（index.php）*\n\n```php\n// 加载应用程序配置\n$config = new\
  \ Zend_Config_Ini('../settings.ini', 'development');\nZend_Registry::set('config',\
  \ $config);\n\n// 修改应用程序日志记录器\n$logger->addWriter(new Zend_Log_Writer_Stream($config->logging->file));\n\
  $writer->setEmail($config->logging->email);\nZend_Registry::set('logger', $logger);\n\
  ```\n\n接下来是数据库连接代码。正如我们在第 2 章首次创建数据库连接代码时提到的，实际的连接直到第一次执行查询时才会建立。因此，我们首先要做的是强制建立数据库连接，以便在启动时就能捕获任何潜在的连接错误，而不是在处理用户请求的中途才捕获。\n\
  \n要强制立即建立连接，我们只需在适配器对象实例化后调用其`getConnection()`方法，如下所示：\n\n```php\n$db = Zend_Db::factory($config->database->type,\
  \ $params);\n$db->getConnection();\n```\n\n如果连接失败，则会抛出一个异常，就像`factory()`调用失败时一样。我们只需要捕获此异常并相应地写入日志消息，就像之前加载配置时所做的那样。\n\
  \n> **提示** 实际上，如果连接失败，抛出的异常使用`Zend_Db_Adapter_Exception`类。而`factory()`调用失败时抛出的异常则使用`Zend_Db_Exception`类。这使我们能够在同一代码块中轻松地分别捕获不同的异常。由于我们并不关心具体是哪种错误（也就是说，任何错误都足以让我们停止操作），因此我们无需区分异常类型。\n\
  \n清单 14-9 展示了`index.php`中的数据库连接代码。\n\n**清单 14-9.** *在启动时强制建立数据库连接（index.php）*\n\n\
  ```php\n// 连接数据库\n$params = array('host' => $config->database->hostname,\n     \
  \           'username' => $config->database->username,\n                'password'\
  \ => $config->database->password,\n                'dbname' => $config->database->database);\n\
  $db = Zend_Db::factory($config->database->type, $params);\n$db->getConnection();\n\
  Zend_Registry::set('db', $db);\n```\n\n接下来我们查看清单 14-10，这是用于设置身份验证、创建前端控制器、设置视图渲染器（使用\
  \ Smarty）以及创建自定义路由的代码。这段代码没有做任何更改，只是现在它位于清单 14-8 中开启的`try … catch`语句内部。我在此处包含这段代码，只是为了展示完整的`index.php`。\n\
  \n**清单 14-10.** *设置前端控制器及其路由（index.php）*\n\n```php\n// 设置应用程序身份验证\n$auth = Zend_Auth::getInstance();\n\
  $auth->setStorage(new Zend_Auth_Storage_Session());\n\n// 处理用户请求\n$controller =\
  \ Zend_Controller_Front::getInstance();\n$controller->setControllerDirectory($config->paths->base\
  \ .\n                                    '/include/Controllers');\n$controller->registerPlugin(new\
  \ CustomControllerAclManager($auth));\n\n// 设置视图渲染器\n$vr = new Zend_Controller_Action_Helper_ViewRenderer();\n\
  $vr->setView(new Templater());\n$vr->setViewSuffix('tpl');\nZend_Controller_Action_HelperBroker::addHelper($vr);\n\
  \n// 设置用户个人主页的路由\n$route = new Zend_Controller_Router_Route(\n    'user/:username/:action/*',\n\
  \    array('controller' => 'user',\n          'action' => 'index')\n);\n$controller->getRouter()->addRoute('user',\
  \ $route);\n\n// 设置查看博客文章的路由\n```\n\n\n\n```php\n$route = new Zend_Controller_Router_Route(\n\
  \    'user/:username/view/:url/*',\n    array('controller' => 'user',\n        \
  \  'action' => 'view')\n);\n$controller->getRouter()->addRoute('post', $route);\n\
  \n// 设置用于查看月度归档的路由\n$route = new Zend_Controller_Router_Route(\n    'user/:username/archive/:year/:month/*',\n\
  \    array('controller' => 'user',\n          'action' => 'archive')\n);\n$controller->getRouter()->addRoute('archive',\
  \ $route);\n\n// 设置用于用户标签空间的路由\n$route = new Zend_Controller_Router_Route(\n   \
  \ 'user/:username/tag/:tag/*',\n    array('controller' => 'user',\n          'action'\
  \ => 'tag')\n);\n$controller->getRouter()->addRoute('tagspace', $route);\n```\n\n\
  接下来，我们通过调度请求并捕获可能抛出的所有异常来完成此文件。如清单 14-11 所示。\n\n**清单 14-11.** *捕获异常并重定向*\n\n```php\n\
  $controller->dispatch();\n} catch (Exception $ex) {\n    $logger->emerg($ex->getMessage());\n\
  \    header('Location: /error.html');\n    exit;\n}\n?>\n```\n\n由于 `$logger` 对象是在\
  \ `try … catch` 结构之前创建的，因此我们能够在异常处理程序中向其写入消息。\n\n#### 应用程序运行时错误\n\n接下来，我们必须编写代码来处理应用程序错误，例如\
  \ 404 错误或其他意外错误。为此，我们使用错误处理插件。默认情况下，`Zend_Controller_Front` 会加载错误处理插件，该插件将自动查找名为\
  \ `ErrorController` 的控制器类。\n\n当调度期间抛出未处理的异常时，`Zend_Controller_Front` 会将请求路由到 `ErrorController`\
  \ 类的 `errorAction()` 方法。由于错误处理插件是自动注册的，因此我们无需对引导文件进行任何更改即可支持此类。\n\n> **注意** 也可以使用不同的控制器和操作来处理错误，但默认情况下会使用错误控制器的错误操作。\n\
  \n为了获取发生的错误信息，我们从请求中检索 `error_handler` 参数。清单 14-12 显示了用于创建 `ErrorController` 类的代码。此代码应写入\
  \ `./include/Controllers` 目录中名为 `ErrorController.php` 的文件中。\n\n**清单 14-12.** *初始化错误处理类（ErrorHandler.php）*\n\
  \n```php\n<?php\nclass ErrorController extends CustomControllerAction\n{\n    public\
  \ function errorAction()\n    {\n        $request = $this->getRequest();\n     \
  \   $error = $request->getParam('error_handler');\n```\n\n接下来，我们通过检查 `$error` 对象的\
  \ `type` 属性来确定发生的错误类型。此变量可以包含以下值之一：\n\n- 如果请求的 URL 未匹配到任何控制器（例如 `http://phpweb20/asdf`），则使用\
  \ `EXCEPTION_NO_CONTROLLER`。\n- 如果请求的 URL 匹配到控制器但未匹配到该控制器内的操作（例如 `http://phpweb20/account/asdf`），则使用\
  \ `EXCEPTION_NO_ACTION`。\n- 对于发生的所有其他错误，无论其原因如何，都使用 `EXCEPTION_OTHER`。例如，如果发生数据库错误，则会使用此错误类型。\n\
  \n我们将前两种错误均视为 404 错误，因为它们实际上是由于请求了无效的 URL 而导致的。为了进一步模块化此代码，我们将在 `ErrorController`\
  \ 中创建一个单独的操作来处理 404 错误，并将其命名为 `error404Action()`。\n\n清单 14-13 中的代码展示了如何检测不同类型的错误，然后相应地转发\
  \ 404 错误。我们稍后将实现 `error404Action()` 函数。\n\n**清单 14-13.** *检测发生的错误类型（ErrorController.php）*\n\
  \n```php\nswitch ($error->type) {\n    case Zend_Controller_Plugin_ErrorHandler::EXCEPTION_NO_CONTROLLER:\n\
  ```\n\n\n```php\ncase Zend_Controller_Plugin_ErrorHandler::EXCEPTION_NO_ACTION:\n\
  \    $this->_forward('error404');\n    return;\n\ncase Zend_Controller_Plugin_ErrorHandler::EXCEPTION_OTHER:\n\
  default:\n    // 继续执行\n}\n```\n\n> **注意：** 将本函数命名为 `404Action()` 而非 `error404Action()`\
  \ 会更恰当；然而，以数字开头命名标识符（即函数名或变量名）是语法错误。\n\n实际上，这意味着现在 404 错误会通过转发请求（使用 `_forward()`\
  \ 工具方法）而移出本方法。本函数中的其余代码现在用于处理所有其他错误（即类型为 `EXCEPTION_OTHER` 的错误）。\n\n由于错误可能发生在页面渲染过程中，我们必须首先通过调用响应对象的\
  \ `clearBody()` 来清除已生成的响应内容。如果不这样做，用户可能会看到请求页面的一半内容后紧跟着错误信息。\n\n最后，我们使用关键优先级级别记录错误消息。这意味着它将像我们在本章前面看到的那样，通过电子邮件发送给系统管理员。\n\
  \n列表 14-14 展示了我们用于清除响应主体并记录错误的代码。\n\n请注意，本函数结束后，`Zend_Controller_Front` 视图渲染器将自动尝试在\
  \ `./templates/error` 目录中显示我们尚未创建的 `error.tpl` 模板。在完成 `ErrorHandler` 类的代码后，我们将立即进行此操作。\n\
  \n---\n\n**列表 14-14.** *清除响应主体并记录错误（ErrorController.php）*\n\n```php\n$this->getResponse()->clearBody();\n\
  Zend_Registry::get('logger')->crit($error->exception->getMessage());\n```\n\n> **提示：**\
  \ 如果你想实际查看此错误处理器的效果，只需尝试从现有控制器动作之一抛出一个异常即可。例如，尝试在 `./include/Controllers/IndexController.php`\
  \ 文件的 `indexAction()` 函数中添加 `throw new Exception('Testing the error handling');`，然后在浏览器中打开\
  \ `http://phpweb20`。如果这样做，请务必在测试其正确工作后，移除这行代码！\n\n接下来，我们将实现 `error404Action()` 函数，如果请求的控制器或动作未找到，前一个函数会转发至此函数。本函数的目标是首先记录错误，然后设置适当的\
  \ HTTP 错误代码（以便用户的浏览器能够相应地解释响应），最后向用户显示一条消息。\n\n由于 404 错误可能频繁发生，且通常不表示重大问题，我们不将其视为关键错误。因此，我们使用\
  \ `Zend_Log::INFO` 优先级级别（通过调用日志记录器的 `info()` 方法）。这意味着消息将被写入日志文件，但不会通过电子邮件发送给管理员。你可能需要留意这些消息，因为它们可能指示某处存在不正确的链接。\n\
  \n本函数的最后一步是创建一个页面标题（使用 `$breadcrumbs` 对象），并将请求的 URI 分配给模板，以便我们可以输出它，向用户指示未找到文件。列表\
  \ 14-15 展示了要添加到 `ErrorController.php` 文件中的代码。\n\n**列表 14-15.** *通过写入日志并发送适当响应来处理\
  \ 404 错误（ErrorHandler.php）*\n\n```php\npublic function error404Action()\n{\n   \
  \ $request = $this->getRequest();\n    $error = $request->getParam('error_handler');\n\
  \    $uri = $request->getRequestUri();\n\n    Zend_Registry::get('logger')->info('发生\
  \ 404 错误: ' . $uri);\n    $this->getResponse()->setHttpResponseCode(404);\n    $this->breadcrumbs->addStep('404\
  \ 文件未找到');\n    $this->view->requestedAddress = $uri;\n}\n```\n\n---\n\n##### 创建错误显示模板\n\
  ```\n\n\n"
- "# 现在错误处理器的 PHP 代码已经完成，我们必须为每个控制器动作创建模板。首先，我们创建用于在应用程序发生错误时显示消息的模板。该文件位于 `./templates/error/error.tpl`。这是我们第一次使用这个错误目录，因此你可能需要先创建它。如前所述，你可以从现有的控制器动作中抛出一个假异常来测试这个错误处理器。\n\
