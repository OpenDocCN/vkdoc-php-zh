    C H A P T E R 3 ■ C R E AT I N G T H E P R O D U C T C ATA L O G : PA RT I **79**


    Note that you can’t create a function if your database already has a function
    with the same name and parameter number and types. You can, however, have multiple
    functions with the same name but different parameters (this method is called *overloading*
    in OOP [Object Oriented Programming] terminology). The key is that when calling
    the function, PostgreSQL must know which version of the function to call, and
    it can do that if the parameters are different.


    To change an existing function, you should use CREATE OR REPLACE FUNCTION instead
    of CREATE FUNCTION, which creates the function if it doesn’t already exist or
    updates the function if it does exist.


    We’ll use types to specify what kind of data the function returns. A type is defined
    like this: CREATE TYPE *name* AS


    ( attribute_name data_type [, ... ] )


    For the data tier of the departments list, you need to create a type called department_list
    and a function called catalog_get_departments_list. Let’s do this in the following
    exercise.


    **Exercise: Creating PostgreSQL Types and Functions**


    **1.** Start pgAdmin III, and connect to the hatshop database using the hatshopadmin
    username.


    **2.** pgAdmin III has the interface elements that you can use to create types
    without writing code (you can check by right-clicking on Types, and selecting
    New Type). However, because the interface is not particularly friendly, we prefer
    to write and execute the code that performs the same actions. Choose Tools ➤ Query
    Tool, and write this code:


    CREATE TYPE department_list AS


    (


    department_id INTEGER,


    name VARCHAR(50)


    );


    **3.** Press F5 to execute the command. The output should be similar to “Query
    returned successfully with no result in 30 ms.”


    **4.** Choose Edit ➤ Clear Window to clear the current contents, and write the
    following code that creates the catalog_get_departments_list function:


    CREATE FUNCTION catalog_get_departments_list()


    RETURNS SETOF department_list LANGUAGE plpgsql AS $$


    DECLARE


    outDepartmentListRow department_list;


    BEGIN


    FOR outDepartmentListRow IN


    SELECT department_id, name


    FROM department


    ORDER BY department_id


    LOOP


    RETURN NEXT outDepartmentListRow;


    END LOOP;


    END;


    $$;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


