    **The $$() Function**


    The $$() function (not to be confused with the $() function discussed previously)
    is a very powerful function that allows you to select elements using CSS rules.
    All returned elements are extended with extra Prototype functionality, just as
    $() does. Note, however, that an array is returned, even if only a single element
    is found. The ordering of elements in the array is the order of the elements in
    the document.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063CH05CMP2 10/29/07 8:39 PM Page 129


    C H A P T E R 5 ■ I N T R O D U C T I O N TO P R OTOT Y P E A N D S C R I P TA
    C U L O U S


    **129**


    A CSS rule is a string used to specify elements in Cascading Style Sheets (CSS)
    documents, using a combination of element names (such as div), class names (such
    as .box), and element ID names (such as #box-content). For example, in Listing
    5-2 we could have used var elts =


    $$(''#box-container .box'') instead of using the call to document.getElementsByClassName().


    Here are some more examples:


    • $$(''form''): Selects all forms on a page


    • $$(''div.box''): Selects all div elements that have the class name box


    • $$(''div#logo img''): Selects the img element within the div called #logo


    • $$(''input[type=radio]''): Selects all inputs that are radio buttons


    So why not just use $$() solely, and forget about $() and getElementsByClassName()?
    Yes, $$() can do exactly what the other two functions can do, but it is more expensive
    to call. That is, it is less efficient.


    If you want to select an element whose ID you know, you should use $(''element-id'')
    instead of $$(''#element-id''), since the former is more efficient (also, using
    $$() returns an array, and $() doesn’t in this case). If you want to select all
    elements with a certain class (such as class .box inside a div with ID #box-container),
    you should use $(''box-container'').


    getElementsByClassName(''box'') instead of $$(''#box-container .box'').


    [One recommendation from the Prototype documentation (found on http://proto-](http://proto-typejs.org/api)


    [typejs.org/api), is that if you do use $$(), try to narrow the search down by
    specifying a](http://proto-typejs.org/api)


    parent element’s ID at the start of the CSS rule. In other words, $$(''#box-container
    .box'') would be more efficient than $$(''.box''), as the former would only search
    within the #box-container element for elements with class .box, while the latter
    would search the entire DOM.


    If you are familiar with CSS, using $$() will be far easier to read and write,
    but from a performance point of view you should try to avoid it if there is a
    more efficient solution. For simplicity, I will continue to use $$() in the examples.


    **The getElementsBySelector() Function**


    It is possible to use the same syntax as in $$() but to only look within a particular
    element rather than the whole document. This can be achieved by calling the getElementsBySelector()
    function directly on an element.


    For example, you can use $(''box-container'').getElementsBySelector(''.box'')
    to find all elements that have class .box inside the #box-container element.


