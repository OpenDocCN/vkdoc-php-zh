  trans: '

    在这里，您需要处理`MyClass`类，它拥有一个公有的`$code`字段和一个单参数构造函数。构造函数参数指定了该字段的值。从 PHP 8 开始，将字段声明与字段赋值合并可以显著减少代码量。考虑到这些创新，代码可能如下所示。


    ```

    class MyClass{

    function __construct(public $code){}

    }

    ```


    发生了什么变化？首先，没有字段声明。其次，构造函数中没有为字段赋值的命令。第三，在构造函数声明中，`$code`参数前面加上了`public`访问级别限定符。这意味着该类拥有一个访问级别为`public`的`$code`字段。这也意味着，传递给构造函数的参数会被自动赋值为该字段的值。


    因此，如果在构造函数参数的描述中为参数指定了访问级别限定符，那么意味着以下几点。


    *   该类拥有相应的字段。

    *   构造函数参数（自动）被赋值为该字段的值（无需编写命令）。


    接下来，我们来分析一个小例子。


    一个铃铛图标。PHP 8 标准


    清单 7-12 中的代码仅在 PHP 8 中运行。


    清单 7-12 展示了类的声明，其构造函数定义了两个字段（一个是公有字段，一个是私有字段）。


    ```

    code,"\n";

    echo "The field \$name = ",$this->name,"\n";

    }

    }

    // Creates an object:

    $obj=new MyClass(123,"MyClass");

    // Checks the fields:

    $obj->show();

    ?>

    Listing 7-12

    Defining Fields in the Constructor

    ```


    程序执行结果如下。


    ```

    The output of the program (from Listing 7-12)

    The object is created: 123 and MyClass

    The field $code = 123

    The field $name = MyClass

    ```


    在`MyClass`类的构造函数中，`$code`参数使用`public`限定符声明，`$name`参数使用`private`限定符声明。这意味着该类拥有公有字段`$code`和私有字段`$name`。构造函数的第一个参数被赋值为`$code`字段的值，构造函数的第二个参数则指定了`$name`字段的值。构造函数中包含`echo
    "The object is created: $code and $name\n"`命令，该命令显示一条消息，说明对象已创建以及传递给构造函数的参数值。


    详细信息


    | --- | --- | --- |


    构造函数参数与类字段同名。在构造函数中，`$code`和`$name`指令指的是构造函数的参数。您需要使用`$this->code`和`$this->name`指令来访问这些字段。


    `MyClass`类中描述了`show()`方法。当调用该方法时，它会显示调用该方法的对象的`$code`和`$name`字段。声明`MyClass`类后，使用`$obj=new
    MyClass(123,"MyClass")`命令基于该类创建一个对象。之后，从该对象调用`show()`方法（`$obj->show()`语句）。


    一个构造函数可以同时包含普通参数和声明字段的参数。与之前类似的一个示例如清单 7-13 所示。


    ```

    name=$name;

    echo "The object is created: $code and $name\n";

    }

    function show(){

    echo "The field \$code = ",$this->code,"\n";

    echo "The field \$name = ",$this->name,"\n";

    }

    }

    $obj=new MyClass(123,"MyClass");

    $obj->show();

    ?>

    Listing 7-13

    Ordinary Arguments and the Arguments That Declare Fields in the Constructor

    ```


    在`MyClass`类的构造函数中，第二个参数是普通参数，而类中同名的私有字段是传统方式声明的。您还添加了一条命令，将构造函数的第二个参数赋值给`$name`字段。在其他所有方面，这两个示例都是相似的。程序执行结果与前一种情况相同。


    # 总结


    *   对象由类创建，可以包含字段和方法。

    *   类声明以`class`关键字开头，后跟类名，并在花括号内包含类描述。

    *   类中声明的字段和方法称为类成员。方法的描述与普通函数相同。描述字段时，字段的值可以省略。

    *   要确定访问级别，可以使用关键字（访问级别限定符）`private`（私有类成员）、`protected`（受保护类成员）和`public`（公有类成员）。如果没有指定访问级别限定符，则表示相应的类成员是公有的。

    *   要基于类创建对象，请使用`new`指令，后跟类名。相应表达式的结果是对所创建对象的引用。该引用被赋值给一个对象变量。

    *   在赋值对象变量时，不会创建对象的副本，两个变量引用的是同一个对象。要创建对象的副本，赋值语句中应包含`clone`指令。

    *   构造函数是在创建对象时自动调用的方法。它名为`__construct()`，可以接受参数。如果是这样，构造函数的参数将在创建对象的语句中指定，位于类名后面的括号内。

    *   析构函数是在对象从内存中移除时自动调用的方法。析构函数名为`__destruct()`，没有参数。

    *   一个类可以包含静态字段和方法。这些类成员使用`static`关键字声明。静态类成员不绑定到任何特定对象，并且无论是否创建了相应类的任何对象，它们都存在。

    *   要访问对象的字段，请使用`$object->field`形式的指令，字段名称中不包含`$`符号。从对象调用方法使用类似`$object->method(arguments)`的命令。对静态类成员的访问以`class::$field`和`class::method(arguments)`的格式进行。

    *   `$this`关键字在类中用作标识符，表示调用方法的对象。`self`关键字在类中用作类标识符，用于访问静态字段和方法。

    *   有一些具有特殊用途的特殊方法，它们会被自动调用。这些方法的名字以双下划线开头。这些方法包括`__toString()`（自动调用来将对象转换为字符串）、`__call()`（尝试调用不存在的方法时自动调用）、`__get()`（尝试读取不可访问字段的值时自动调用）以及`__set()`（尝试给不可访问字段赋值时自动调用）。

    *   从 PHP 8 开始，可以将构造函数中的参数描述与字段声明合并。在这种情况下，需要为参数提供一个访问级别限定符，这会自动创建相应的字段，并根据传递给构造函数的参数来赋值。


    ## 8. 继承


    *“这都挺好的，但我没搞懂！”*


    ——*《ALF》（电视剧）*


    本章将介绍面向对象编程中一个关键机制——继承。与封装和多态性并列为面向对象编程的三大支柱。接下来，您将学习如何在 PHP 中实现继承。

    '
- fmt: '# Creating a Child Class


    So, let’s say that you have a class that you would like to modify (add some new
    properties and methods to it). In principle, you can simply modify the code of
    the corresponding class. But the situation is complicated because the programs
    already use the class. Therefore, the idea of modifying the code of an already
    existing class is not the best one. The idea of describing a new class from scratch,
    duplicating, in addition to new fragments, the contents of the original class
    is also not productive. First, in that case, you have to repeat the existing code.
    In programming, such a style is usually a sign of a badly created program. Second,
    if you later have to make changes to the original class (for example, by changing
    the code of one of the methods), you may need to make changes to the newly created
    class synchronously. So, what are you going to do? In such a situation, it is
    reasonable to use the *inheritance mechanism*.


    The idea is simple: create a new class based on an existing one. In that case,
    the newly created class automatically inherits all public and protected methods
    from the original class. (What happens to the private members of the class is
    a special case, which is discussed a little later.) The class from which the new
    class is created is called the *parent* or *base* class. A class created based
    on the parent class is called a *child* or *derived* class.


    > A circular icon reads a letter i at the center. Note


    PHP allows multilevel inheritance: from a parent class, you can create a child
    class, from which another child class can be created, and from it, the next child
    class, and so on. Thus, child and parent classes are relative: a class can be
    a child for some class and a parent for another class.


    However, PHP does not allow multiple inheritance: a child class can have one and
    only one parent class.


    From a technical point of view, creating a child class is very simple: in the
    class description, after its name, you put the `extends` keyword and the name
    of the parent class. The description of the child class specifies only those fields
    and methods that should be appended to the child class in addition to the members
    from the parent class. The members of the parent class are automatically available
    in the child class. The child class declaration template looks as follows.


    ```php

    class Bravo extends Alpha{

    ```'
