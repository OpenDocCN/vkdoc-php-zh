- fmt: '# Choosing a PHP Editor


    Your development machine is now running all the necessary programs for executing
    PHP. The next step is to decide how you’re going to write your scripts. PHP scripts
    are text based, so you have a myriad of options, ranging from the simple `Notepad.exe`
    and text-edit programs to highly specialized *integrated development environments*
    (*IDEs*).


    You can probably write PHP code using whichever program you have used for writing
    HTML and CSS. There are some features you should expect from a good editor:


    *   *Syntax highlighting*: This is the ability to recognize certain words in a
    programming language, such as variables, control structures, and various other
    special texts. This special text is highlighted or otherwise differentiated to
    make scanning your code much easier.

    *   *Built-in function references*: When you enter the name of a function or an
    object method, this feature displays available parameters, as well as the file
    that declares the function, a short description of what the function does, and
    a more in-depth breakdown of parameters and return values. This feature proves
    invaluable when dealing with large libraries, and it can save you trips to the
    PHP website to check the order of parameters or acceptable arguments for a function.

    *   *Auto-complete features*: This feature adds available PHP keywords to a drop-down
    list, allowing you to select the intended keyword from the list quickly and easily,
    saving you the effort of remembering and typing it out every time. When it comes
    to productivity, every second counts, and this feature is a great way to save
    time.

    *   *Code folding*: This feature lets you collapse snippets of code, making your
    workspace clutter-free and your code easy to navigate.

    *   *Auto-indent*: This automatically indents the code you write in a consistent
    manner. Such indented code is vastly easier to read for human readers, because
    indentation indicates relationships between code blocks.

    *   *Built-in FTP*: You need FTP to upload your PHP files to an online web server
    when you want to publish your project on the World Wide Web. You can use a stand-alone
    FTP program, but if it is built into your IDE, you can upload an entire project
    with a single click.


    There are many good IDEs and editors to choose from. Beginners may find it easier
    to start with a simpler editor. The examples in this book were created with Notepad++
    (notepadplusplus.com) to keep development simple. However, feel free to explore
    other options. The following list includes download links for four of the most
    popular free IDEs for PHP:


    *   *NetBeans* – [`https://netbeans.org/`](https://netbeans.org/)

    *   *Aptana* – [`www.aptana.com/`](http://www.aptana.com/)

    *   *Eclipse* – [`www.eclipse.org/`](http://www.eclipse.org/)

    *   *Visual Studio* – [`https://visualstudio.microsoft.com/`](https://visualstudio.microsoft.com/)


    There are also many PHP IDEs for purchase, some of which provide a 30-day free
    trial. We have chosen to promote those that don’t charge us to use them.


    **Exercise**: Explore your different options for editing PHP programs. Choose
    an editor or IDE that you feel most comfortable using. For assistance in installing
    your selection, go to YouTube and search for a video demonstrating the installation.
    Don’t forget to include the version number in your search. In the next section,
    we will create our first program. Thus, we need an editor to do so.


    As stated previously, we will use Notepad++ for the examples in this book. You
    should have no difficulties following the examples with any other editor. If you
    decide to use an IDE, you will have to consult online documentation to learn how
    to set up a new project in your chosen IDE.


    # Creating Your First PHP Program


    With everything set up and running as it should, it is time to take the plunge
    and write our first PHP script.


    As a server-side scripting language, PHP requires a web server such as Apache
    to run. You have just installed Apache on your local computer, so your system
    is ready. Apache will interpret any PHP files saved inside a folder called `htdocs`.
    You can find it inside your XAMPP installation in `XAMPP/xamppfiles/htdocs`.


    You’ll be making many PHP files soon, so it is a good idea to keep them organized.
    Create a new folder inside `htdocs` and call it `ch1`.


    **Note**


    To fully grasp and understand PHP programming, it is imperative that you attempt
    to program all examples provided in the book. While the completed code can be
    downloaded, you will only learn and remember by doing. It is worth the time and
    effort to create your own programs. As with all programming books, publishing
    errors might occur. If you are sure that you have created code as shown in the
    book and still are receiving errors, check the code files provided for the chapter.
    Each code file has been tested for accuracy and completeness.


    Now open your editor or IDE of choice. Determine how to create a “new” file within
    your editor, so you can begin coding. Then enter the following program exactly
    as shown. If you have problems with this code, verify your code with the example
    provided in the code files (`test.php`) for Chapter [1](#323857_3_En_1_Chapter.xhtml),
    which can be downloaded using the directions provided in the preamble of this
    book.


    ```

    Listing 1-1

    test.php

    ```


    Make sure to save the file as `test.php` in the `ch1` folder that you created
    under `htdocs`. Your editor may require you to either “save as” “all files” or
    “save as” “php.” It is very important that you make sure the file ending is `.php`,
    not `.txt` or some other ending. PHP files will only execute if they have a `.php`
    file ending. This is a simple process that can be a “got ya” moment, if not saved
    properly.


    ![](images/323857_3_En_1_Chapter/323857_3_En_1_Fig16_HTML.jpg)


    This dialer represents how we want to save the output file after completing work,
    always we want to save it in `name.php` format, by using Notepad.


    Figure 1-16


    Saving `test.php` in Notepad++


    # Running Your First PHP Script


    The next step is to get Apache to process your PHP script. That happens automatically,
    if you request the script through a browser. So, open a web browser and navigate
    to `http://localhost/ch1/test.php` and marvel at the PHP-generated output you
    should see in your browser (Figure [1-17](#323857_3_En_1_Chapter.xhtml#Fig17)).
    You have successfully created and executed your first PHP script!


    ![](images/323857_3_En_1_Chapter/323857_3_En_1_Fig17_HTML.jpg)


    This is how we can see the final output of the file after successfully running
    a written program in the system.


    Figure 1-17


    Seeing the output from `test.php`


    If you accidentally save your file with a `.txt` ending, your code will not execute
    (Figure [1-18](#323857_3_En_1_Chapter.xhtml#Fig18)), and you will see a listing
    of your code. This will also occur if your code is not saved under the `htdocs`
    folder or Apache is not running. If this occurs, correct either the file ending,
    the location of your file, or turn on Apache, and attempt to run it again. Once
    you’re successful, pat yourself on the back. You did it! You created your first
    PHP program (and made it to the end of the chapter).


    ![](images/323857_3_En_1_Chapter/323857_3_En_1_Fig18_HTML.jpg)


    This type of window reflects the written program having improper file ending.


    Figure 1-18


    Saving test and running it with an improper file ending'
  raw: '## Choosing a PHP Editor


    Your development machine is now running all the necessary programs for executing
    PHP. The next step is to decide how you’re going to write your scripts. PHP scripts
    are text based, so you have a myriad of options, ranging from the simple `Notepad.exe`
    and text-edit programs to highly specialized *integrated development environments*
    (*IDEs*) .


    You can probably write PHP code using whichever program you have used for writing
    HTML and CSS. There are some features you should expect from a good editor:


    *   *Syntax highlighting*: This is the ability to recognize certain words in a
    programming language, such as variables, control structures, and various other
    special texts. This special text is highlighted or otherwise differentiated to
    make scanning your code much easier.


    *   *Built-in function references* : When you enter the name of a function or
    an object method, this feature displays available parameters, as well as the file
    that declares the function, a short description of what the function does, and
    a more in-depth breakdown of parameters and return values. This feature proves
    invaluable when dealing with large libraries, and it can save you trips to the
    PHP website to check the order of parameters or acceptable arguments for a function.


    *   *Auto-complete features* : This feature adds available PHP keywords to a drop-down
    list, allowing you to select the intended keyword from the list quickly and easily,
    saving you the effort of remembering and typing it out every time. When it comes
    to productivity, every second counts, and this feature is a great way to save
    time.


    *   *Code folding* : This feature lets you collapse snippets of code, making your
    workspace clutter-free and your code easy to navigate.


    *   *Auto-indent*: This automatically indents the code you write in a consistent
    manner. Such indented code is vastly easier to read for human readers, because
    indentation indicates relationships between code blocks.


    *   *Built-in FTP*: You need FTP to upload your PHP files to an online web server
