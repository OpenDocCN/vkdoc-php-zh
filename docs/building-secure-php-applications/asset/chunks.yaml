- fmt: '### `include_path`


    `include_path` specifies the directories where PHP will search for included or
    required files.


    If the include path includes directories that contain sensitive files, an attacker
    might exploit it to include malicious files. We should take care to avoid including
    directories that are not under our control, as this could lead to security vulnerabilities.


    Imagine your website is a library. The `include_path` setting is like specifying
    which shelves the librarian should look at when finding a book. If the shelves
    contain harmful books (malicious files) or books that should not be accessed by
    just anyone (sensitive files), an attacker could misuse this access. Ensuring
    that the librarian only searches trusted shelves (directories) helps maintain
    the security of the library.


    ### `extension_dir`


    `extension_dir` sets the directory where PHP looks for extensions (shared libraries
    that extend PHP’s functionality).


    If an attacker can manipulate this setting, they might be able to load and execute
    malicious extensions, compromising server security. It’s crucial to ensure that
    this directory is secure and that only trusted extensions are used.


    Imagine your website is a restaurant kitchen, and `extension_dir` is the storage
    room where chefs keep their cooking tools (extensions). If anyone could place
    their own tools in the storage room, they might bring in dangerous or inappropriate
    items (malicious extensions). By securing the storage room and ensuring only trusted
    chefs can add tools, we can maintain a safe kitchen environment.


    ### `mime_magic.magicfile`


    `mime_magic.magicfile` specifies the path to a MIME magic file used for MIME type
    detection.


    If an attacker can control or manipulate this file, they could potentially trick
    the server into misidentifying the type of a file, which may lead to security
    vulnerabilities such as code execution.


    Imagine your website is a factory, and the `mime_magic.magicfile` is like the
    quality control manual that tells workers how to identify different materials.
    If someone could alter the manual, they might mislabel harmful substances as safe,
    leading to potential accidents. By ensuring the manual is securely stored and
    only accessible to trusted personnel, we maintain the safety and accuracy of the
    factory operations.


    ### `allow_webdav_methods`


    `allow_webdav_methods` controls whether WebDAV methods are allowed in PHP scripts.


    Allowing WebDAV methods could expose your application to security risks associated
    with WebDAV, such as unauthorized file access and manipulation. It’s generally
    recommended to set this to “Off” unless you have a specific need for WebDAV methods.


    Imagine your website is a secure document storage facility. Allowing WebDAV methods
    is like giving external parties the ability to directly access and manipulate
    the documents stored in the facility. This could lead to unauthorized access and
    potential data breaches. By setting `allow_webdav_methods` to “Off,” we ensure
    that only authorized and necessary methods are used for accessing and manipulating
    files.


    ### `session.gc_maxlifetime`


    `session.gc_maxlifetime` specifies the maximum lifetime of a session in seconds.


    Setting this value too high can lead to long-lived sessions that are susceptible
    to session hijacking or fixation attacks. Properly configuring this setting ensures
    that sessions expire after a reasonable time, reducing the risk of unauthorized
    access to user sessions.


    Imagine your website is a hotel, and `session.gc_maxlifetime` is like the duration
    a guest can stay in a room without renewing their booking. If guests are allowed
    to stay indefinitely, unauthorized individuals might exploit this to occupy rooms
    (sessions) without proper authorization. By setting a reasonable checkout time,
    we ensure that rooms (sessions) are vacated and unauthorized access is minimized.


    Some more security configurations: In addition to the aforementioned configurations,
    here are a few more which are essential for extra security setup.


    ![](images/609480_1_En_2_Chapter/609480_1_En_2_Figf_HTML.jpg)


    ### `session.referer_check = /application/path`


    This setting allows you to specify a referer check for session validation. It
    restricts the session to be accessible only if the HTTP Referer matches the specified
    value.


    Using `session.referer_check` can be a security measure to prevent session fixation
    and session hijacking attacks. It limits access to a session only to requests
    originating from a specific application path. This can help protect against unauthorized
    access to sessions from external sources.


    Imagine your website is a secure building, and `session.referer_check` is like
    a security guard checking the ID of anyone entering. The guard only allows access
    to those with valid IDs from your building, preventing outsiders from gaining
    unauthorized access.


    Example configuration:


    ```

    session.referer_check = /application/path

    ```


    ### `memory_limit`


    `memory_limit` sets the maximum amount of memory that a PHP script can allocate.
    It’s typically used to prevent PHP scripts from consuming excessive server resources.


    Setting an appropriate `memory_limit` is essential for security because it helps
    prevent resource exhaustion attacks. If a script can’t allocate unlimited memory,
    attackers can’t easily overwhelm the server by consuming all available memory.
    However, setting it too low can affect the proper functioning of your application,
    so it should be balanced with your application’s needs.


    Imagine your website is a cafeteria with limited seating (memory). Setting a limit
    ensures that no single group can occupy all the seats, allowing fair access to
    all customers and preventing overcrowding.


    Example configuration:


    ```

    memory_limit = 128M

    ```


    ### `max_execution_time`


    `max_execution_time` determines the maximum amount of time (in seconds) a PHP
    script is allowed to run before it’s terminated.


    Limiting script execution time can help prevent denial-of-service (DoS) attacks
    where an attacker submits scripts that run indefinitely and consume server resources.
    However, setting it too low might disrupt legitimate script execution. It should
    be configured based on your application’s requirements.


    Think of your website as a meeting room. Setting a maximum meeting time ensures
    that meetings don’t run indefinitely, allowing others to use the room and preventing
    a single meeting from monopolizing the space.


    Example configuration:


    ```

    max_execution_time = 30 // 30 seconds

    ```


    ### `report_memleaks = On`


    This setting controls whether PHP reports memory leaks when a script ends.


    Enabling `report_memleaks` can help in debugging memory-related issues and identifying
    potential security vulnerabilities in your code. It doesn’t have a direct security
    impact but can aid in identifying and fixing vulnerabilities related to memory
    usage.


    Imagine your website as a factory. Reporting memory leaks is like having inspectors
    who identify and report leaks in machinery, helping maintain the factory’s efficiency
    and safety.


    Example configuration:


    ```

    report_memleaks = On

    ```


    ### `track_errors = Off`


    `track_errors` determines whether PHP records errors in the variable `$php_errormsg`.


    Keeping `track_errors` off by default is generally a good practice because it
    minimizes the exposure of error messages in your application, reducing the risk
    of information leakage. If error messages contain sensitive information or stack
    traces, keeping them out of the error log can enhance security.


    Think of your website as a secure communication system. Turning off `track_errors`
    ensures that error messages aren’t broadcasted, preventing sensitive information
    from being overheard by unauthorized parties.


    Example configuration:


    ```

    track_errors = Off

    ```'
