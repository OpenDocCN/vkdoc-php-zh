    ## Chapter Review


    If you started this book with little or no knowledge of PHP, you’re no longer
    in the beginners’ league, but rather are leveraging the power of PHP in a lot
    of useful ways. Hopefully, by now you’ll have begun to appreciate that the same
    or similar techniques crop up again and again. Instead of just copying code, you
    should start to recognize techniques that you can adapt to your needs and then
    experiment on your own.


    The rest of this book continues to build on your knowledge but brings a new factor
    into play: the MySQL relational database (and its drop-in replacement, MariaDB),
    which will take your PHP skills to a higher level. The next chapter offers an
    introduction to MySQL and shows you how to set it up for the remaining chapters.


    # 10. Getting Started with a Database


    Dynamic websites take on a whole new meaning in combination with a database. Drawing
    content from a database allows you to present material in ways that would be impractical—if
    not impossible—with a static website. Examples that spring to mind are online
    stores, such as [`Amazon.com`](http://amazon.com/) ; news sites, such as the BBC
    ( [`www.bbcnews.com`](http://www.bbcnews.com/) ); and the big search engines,
    including Google and Yahoo! Database technology allows these websites to present
    thousands, sometimes millions, of unique pages. Even if your ambitions are nowhere
    near as grandiose, a database can increase your website’s richness of content
    with relatively little effort.


    PHP supports all major databases, including Microsoft SQL Server, Oracle, and
    PostgreSQL, but it’s most frequently used in conjunction with the open source
    MySQL database. According to DB-Engines ( [`http://db-engines.com/en/ranking`](http://db-engines.com/en/ranking)
    ), in late 2014 MySQL ranked as the second most widely used database. However,
    controversy surrounds the future of MySQL, which Google and Wikimedia have abandoned
    in favor of MariaDB ( [`https://mariadb.org/`](https://mariadb.org/) ). Several
    leading Linux distributions have also replaced MySQL with MariaDB. This chapter
    begins with a brief discussion of the implications of the rivalry between these
    two databases.


    In this chapter, you’ll learn about the following:


    *   How a database stores information

    *   Choosing a graphical interface to interact with a database

    *   Creating user accounts

    *   Defining a database table with the appropriate data types

    *   Backing up and transferring data to another server'
