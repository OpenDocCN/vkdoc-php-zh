    Starting an E-Commerce Site


    **T**he word “e-commerce” has had a remarkable fall fromgrace in the past few
    years. Just the idea of having an e-commerce web site was enough to get many businessmen
    salivating with anticipation. But now, it’s no longer enough to say, “e-commerce
    is the future—get online or get out of business.” You now need compelling, realistic,
    and specific reasons to take your business online.


    This book focuses on programming and associated disciplines, such as creating,
    accessing, and manipulating databases. But before we jump into that, we need to
    understand the business decisions that lead to the creation of an e-commerce site
    in the first place.


    If you want to build an e-commerce site today, you must answer some tough questions.


    The good news is that these questions do have answers, and we’re going to have
