    **Tags**


    Tags are used as a way to categorize items on a web site. The type of item being
    tagged can be anything really, such as a news article, an image, a product, or
    a link. By assigning a series of keywords to that item (that is, tags), it is
    easy to find related items based on the keyword of choice.


    Let’s look at a practical example of how tagging could be used. If you were to
    categorize this book, you could say it is about *PHP*, *Web 2.0*, *Ajax*, and
    *MySQL*, among other things. Each of the italicized terms would be perfectly acceptable
    as tags. Now consider if you had a web site that listed a catalog of books. Each
    book would have its own relevant set of tags, just like the tags we just mentioned.
    To find every book that had something to do with PHP (assuming it had been tagged
    correctly), you could simply search for all books with a tag of *PHP*.


    We will be implementing a system like this, but instead of tagging books in a
    library or catalog, we will be tagging blog posts. Technically speaking, we won’t
    be tagging posts—we will provide the blog owner with the tools to tag their own
    posts.


    Additionally, we will then provide the means to filter posts by one or more tags.
    We will implement this on a per-user basis by listing each of a user’s unique
    tags in a list on their public home page.


    In Chapter 12, we will extend the tagging functionality we create here to allow
    users to search for tags.


    **Implementing Tagging**


    To implement a tagging system, we must first create a database table in which
    to store tags.


    Since each blog post can have multiple tags, we create a table with two columns:
    one to indicate the post ID and another to store the actual tag, as shown in Listing
    10-1\. This means if two posts share the same tag, each post will have its own
    record in this table for that tag.


    **Listing 10-1.** *Database Table to Store Blog Post Tags In (schema-mysql.sql)*
    create table blog_posts_tags (


    post_id bigint unsigned not null,


    tag varchar(255) not null,


    primary key (post_id, tag)


    ) type = InnoDB;


    Next we must create some tag management functions in the DatabaseObject_BlogPost
    class. The functions we will create are as follows:


    • getTags(): Retrieves all tags for a blog post


    • hasTag(): Checks whether a blog post has the specified tag


    • addTags(): Adds one or more tags to a blog post


    • deleteTags(): Deletes one or more tags from a blog post


    • deleteAllTags(): Deletes all tags from a blog post


