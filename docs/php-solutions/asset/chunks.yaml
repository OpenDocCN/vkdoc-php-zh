- fmt: '### Adding and Subtracting Set Periods with the DateInterval Class


    The `DateInterval` class is used to specify the period to be added or subtracted
    from a `DateTime` object using the `add()` and `sub()` methods. It’s also used
    by the `diff()` method, which returns a `DateInterval` object. Using the `DateInterval`
    class feels rather odd to begin with, but it’s relatively simple to understand.


    To create a `DateInterval` object, you need to pass to the constructor a string
    that specifies the length of the interval; this string must be formatted according
    to the ISO 8601 standard. The string always begins with the letter `P` (for period),
    followed by one or more pairs of integers and letters known as period designators.
    If the interval includes hours, minutes, or seconds, the time element is preceded
    by the letter `T`. Table [14-7](#A978-1-4842-0635-5_14_Chapter.html#Tab7) lists
    the valid period designators.


    **Table 14-7.** ISO 8601 period designators used by the `DateInterval` class


    | Period designator | Meaning |

    | --- | --- |

    | `Y` | Years |

    | `M` | Months |

    | `W` | Weeks—cannot be combined with days |

    | `D` | Days—cannot be combined with weeks |

    | `H` | Hours |

    | `M` | Minutes |

    | `S` | Seconds |


    The following examples should clarify how to specify an interval:


    ```

    $interval1 = new DateInterval(''P2Y'');           // 2 years

    $interval2 = new DateInterval(''P5W'');           // 5 weeks

    $interval3 = new DateInterval(''P37D'');          // 5 weeks 2 days

    $interval4 = new DateInterval(''PT6H20M'');       // 6 hours 20 minutes

    $interval5 = new DateInterval(''P1Y2DT3H5M50S''); // 1 year 2 days 3 hours 5 min
    50 sec

    ```


    Note that `$interval3` needs to specify the total number of days because weeks
    are automatically converted to days, so `W` and `D` cannot be combined in the
    same interval definition.


    To use a `DateInterval` object with the `add()` or `sub()` method of the `DateTime`
    class, pass the object as an argument. For example, this adds 12 days to the date
    for Christmas Day 2014:


    ```

    $xmas2014 = new DateTime(''12/25/2014'');

    $interval = new DateInterval(''P12D'');

    $xmas2014->add($interval);

    ```


    If you don’t need to reuse the interval, you can pass the `DateInterval` constructor
    directly as the argument to `add()` like this:


    ```

    $xmas2014 = new DateTime(''12/25/2014'');

    $xmas2014->add(new DateInterval(''P12D''));

    ```


    The result of this calculation is demonstrated in `date_interval_01.php`, which
    produces the following output:


    ![A978-1-4842-0635-5_14_Fige_HTML.jpg](A978-1-4842-0635-5_14_Fige_HTML.jpg)


    An alternative to using the period designators listed in Table [14-7](#A978-1-4842-0635-5_14_Chapter.html#Tab7)
    is to use the static `createFromDateString()` method, which takes as an argument
    an English relative date string in the same way as `strtotime()` does. Using `createFromDateString()`,
    the preceding example can be rewritten like this (the code is in `date_interval_02.php`):


    ```

    $xmas2014 = new DateTime(''12/25/2014'');

    $xmas2014->add(DateInterval::createFromDateString(''+12 days''));

    ```


    This produces exactly the same result.


    > **Caution:** Adding and subtracting months with `DateInterval` has the same
    effect as described earlier. If the resulting date is out of range, the extra
    days are added. For example, adding one month to January 31 results in March 3
    or 2, depending on whether it’s a leap year. To get the last day of the month,
    use the technique described earlier in “Handling overflows with relative dates.”


    ### Finding the Difference Between Two Dates with the `diff()` Method


    To find the difference between two dates, create a `DateTime` object for both
    dates, and pass the second object as the argument to the first object’s `diff()`
    method. The result is returned as a `DateInterval` object. To extract the result
    from the `DateInterval` object, you need to use the object’s `format()` method,
    which uses the format characters listed in Table 14-8. These are different from
    the format characters used by the `DateTime` class. Fortunately, most of them
    are easy to remember.


    **Table 14-8.** Format characters used by the `DateInterval::format()` method


    | Format character | Description | Examples |

    | --- | --- | --- |

    | `%Y` | Years. At least two digits, with leading zero if necessary | 12, 01 |

    | `%y` | Years, no leading zero | 12, 1 |

    | `%M` | Months with leading zero | 02, 11 |

    | `%m` | Months, no leading zero | 2, 11 |

    | `%D` | Days with leading zero | 03, 24 |

    | `%d` | Days, no leading zero | 3, 24 |

    | `%a` * | Total number of days | 15, 231 |

    | `%H` | Hours with leading zero | 03, 23 |

    | `%h` | Hours, no leading zero | 3, 23 |

    | `%I` | Minutes with leading zero | 05, 59 |

    | `%i` | Minutes, no leading zero | 5, 59 |

    | `%S` | Seconds with leading zero | 05, 59 |

    | `%s` | Seconds, no leading zero | 5, 59 |

    | `%R` | Display minus when negative, plus when positive | -, + |

    | `%r` | Display minus when negative, no sign when positive | - |

    | `%%` | Percentage sign | % |


    * A bug in PHP 5.3 on some Windows builds always returned 6015 as the total number
    of days.


    The following example in `date_interval_03.php` shows how to get the difference
    between the current date and the American Declaration of Independence using `diff()`
    and displaying the result with the `format()` method:


    ```

    <p><?php

    $independence = new DateTime(''7/4/1776'');

    $now = new DateTime();

    $interval = $now->diff($independence);

    echo $interval->format(''%Y years %m months %d days''); ?>

    since American independence.</p>

    ```


    If you load `date_interval_03.php` into a browser, you should see something similar
    to the following screenshot (of course, the actual period will be different).


    ![A978-1-4842-0635-5_14_Figf_HTML.jpg](A978-1-4842-0635-5_14_Figf_HTML.jpg)


    The format characters follow a logical pattern. Uppercase characters always produce
    at least two digits with a leading zero if necessary. Lowercase characters have
    no leading zero.


    > **Caution:** With the exception of `%a`, which represents the total number of
    days, the format characters represent only specific parts of the overall interval.
    For example, if you change the format string to `$interval->format(''%m months'')`,
    it shows only the number of whole months that have elapsed since last July 4.
    It does not show the total number of months since July 4, 1776.'
