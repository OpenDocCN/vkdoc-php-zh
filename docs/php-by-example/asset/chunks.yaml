    ```

    程序输出（来自清单 5-5）

    $A = 100 and $B = 200

    输入：参数 100 和 200

    输出：参数 200 和 100

    $A = 200 and $B = 100

    ```


    你可以看到，在将`$A`和`$B`变量传递给`swap()`函数后，它们的值发生了变化。


    ![](img/613529_1_En_5_Figi_HTML.jpg)包含字母 i 的信息图标。注意


    如果你在函数执行期间更改函数参数的值，那么参数的传递机制至关重要。如果不打算更改参数的值，那么默认的按值传递参数的机制是完全可接受的。

