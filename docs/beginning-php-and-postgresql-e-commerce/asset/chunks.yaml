    ## 安装 PHP 5


    每次你想在 Linux 上启用一个新的 PHP 库时，都需要重新编译 PHP 模块。因此，建议从一开始就进行一次“良好”的编译，包含所有需要的库。


    访问 `http://www.php.net/downloads.php`，获取 PHP 5.x 的完整源代码存档，并将其内容解压到一个目录中。


    在编译 PHP 并让 Apache 识别它（通过更新 Apache 的配置文件 `httpd.conf`）之前，你需要安装 PHP 下工作所需的额外模块。


    让我们逐一处理它们。


    ### mhash


    mhash 库为大量哈希算法提供了统一的接口。你在第 11 章中使用它对客户密码进行了哈希处理。请参考该章节以了解更多关于哈希的内容。


    从 `http://mhash.sourceforge.net/` 下载 mhash，解压（使用 `tar -zxvf`），并通过执行以下命令进行安装：


    ```

    ./configure

    ./make

    ./make install

    ```


    或者，如果你使用 Red Hat，你可以从 `http://www.ottolander.nl/opensource/mhash/libmhash.html`
    下载 RPM 包并进行安装。我们安装了 `libmhash-0.8.18-2a.i386.rpm` 和 `libmhash-devel-0.8.18-2a.i386.rpm`
    这两个 RPM 包。


    ### mcrypt


    该库允许你使用广泛的加密功能。你将需要它来加密高度敏感的信息，例如第 11 章中讨论的信用卡详细信息。（更多细节请参考第 11 章。）


    从 `http://mcrypt.sourceforge.net/` 下载 mcrypt，解压（使用 `tar -zxvf`），并通过执行以下命令进行安装：


    ```

    ./configure

    ./make

    ./make install

    ```


    另外，你可以在 `http://www.ottolander.nl/opensource/mcrypt/mcrypt.html` 找到 Red Hat 的
    RPM 包。我们安装了 `libmcrypt-2.5.7-1a.i386.rpm` 和 `libmcrypt-devel-2.5.7-1a.i386.rpm`
    这两个 RPM 包。


    或者，你也可以使用来自 `http://mcrypt.sourceforge.net` 的源代码。


    ### CURL（客户端 URL 库）函数


    你将使用 libcurl，这是一个允许你使用多种不同协议连接并与多种不同类型服务器通信的库。在第 14 章中，你需要它通过 SSL 与支付网关进行通信。你可以从
    `http://curl.haxx.se/download.html` 获取最新版本的 curl 库，也可以使用 `http://www.rpmfind.net`
    为你的系统查找 RPM 包。


