  trans: "\n# 实现订单流水线：第一部分\n\n## 更新订单状态\n\n每个流水线环节都需要能够更改订单的状态，使其进入下一个流水线环节。此项功能并非简单地递增状态，而是保持灵活性，以防最终出现更复杂的分支式流水线。这需要在数据库中新增一个名为\
    \ `orders_update_status` 的函数，以及一个数据层方法 `UpdateOrderStatus`，你需要将其添加到 `Orders` 类中（位于\
    \ `business/orders.php`）。\n\n首先，在你的 `hatshop` 数据库中创建 `orders_update_status` 函数：\n\
    \n```sql\n-- 创建 orders_update_status 函数\n\nCREATE FUNCTION orders_update_status(INTEGER,\
    \ INTEGER)\nRETURNS VOID LANGUAGE plpgsql AS $$\nDECLARE\n  inOrderId ALIAS FOR\
    \ $1;\n  inStatus ALIAS FOR $2;\nBEGIN\n  UPDATE orders SET status = inStatus\
    \ WHERE order_id = inOrderId;\nEND;\n$$;\n```\n\n然后，将 `UpdateOrderStatus` 方法添加到\
    \ `business/order.php` 文件中的 `Orders` 类：\n\n```php\n// 更新订单的流水线状态\npublic static\
    \ function UpdateOrderStatus($orderId, $status)\n{\n  // 构建 SQL 查询\n  $sql = 'SELECT\
    \ orders_update_status(:order_id, :status);';\n\n  // 构建参数数组\n  $params = array\
    \ (':order_id' => $orderId, ':status' => $status);\n\n  // 使用 PDO 特定功能准备语句\n \
    \ $result = DatabaseHandler::Prepare($sql);\n\n  // 执行查询\n  return DatabaseHandler::Execute($result,\
    \ $params);\n}\n```\n\n`OrderProcessor` 类（位于 `business/order_processor.php`）中调用业务数据层方法的方法同样名为\
    \ `UpdateOrderStatus`：\n\n```php\n// 设置订单状态\npublic function UpdateOrderStatus($status)\n\
    {\n  Orders::UpdateOrderStatus($this->mOrderInfo['order_id'], $status);\n  $this->mOrderInfo['status']\
    \ = $status;\n}\n```\n\n## 设置信用卡认证详细信息\n\n在下一章中，当我们处理信用卡使用时，你将需要在 `orders` 表的\
    \ `auth_code` 和 `reference` 字段中设置数据。\n\n为了支持该功能，首先在你的数据库中添加 `orders_set_auth_code`\
    \ 函数：\n\n```sql\n-- 创建 orders_set_auth_code 函数\n\nCREATE FUNCTION orders_set_auth_code(INTEGER,\
    \ VARCHAR(50), VARCHAR(50))\nRETURNS VOID LANGUAGE plpgsql AS $$\nDECLARE\n  inOrderId\
    \ ALIAS FOR $1;\n  inAuthCode ALIAS FOR $2;\n  inReference ALIAS FOR $3;\nBEGIN\n\
    \  UPDATE orders\n  SET auth_code = inAuthCode, reference = inReference\n  WHERE\
    \ order_id = inOrderId;\nEND;\n$$;\n```\n\n然后，将 `SetOrderAuthCodeAndReference`\
    \ 方法添加到 `business/order.php` 文件中的 `Orders` 类：\n\n```php\n// 设置订单的授权码\npublic static\
    \ function SetOrderAuthCodeAndReference($orderId, $authCode, $reference)\n{\n\
    \  // 构建 SQL 查询\n  $sql = 'SELECT orders_set_auth_code(:order_id, :auth_code,\
    \ :reference);';\n\n  // 构建参数数组\n  $params = array (':order_id' => $orderId,\n\
    \                   ':auth_code' => $authCode,\n                   ':reference'\
    \ => $reference);\n\n  // 使用 PDO 特定功能准备语句\n  $result = DatabaseHandler::Prepare($sql);\n\
    \n  // 执行查询\n  return DatabaseHandler::Execute($result, $params);\n}\n```\n\n\
    在数据库中设置这些值的代码是 `SetOrderAuthCodeAndReference` 方法，你需要将其添加到 `business/order_processor.php`\
    \ 文件中的 `OrderProcessor` 类：\n\n```php\n// 设置订单的授权码和参考码\npublic function SetAuthCodeAndReference($authCode,\
    \ $reference)\n{\n  Orders::SetOrderAuthCodeAndReference($this->mOrderInfo['order_id'],\n\
    \                                       $authCode, $reference);\n  $this->mOrderInfo['auth_code']\
    \ = $authCode;\n}\n```\n"
- fmt: "`$this->mOrderInfo['reference'] = $reference;`\n\n`}`\n\nThis code also sets\
    \ the corresponding elements from the `$mOrderInfo` array, just in case they are\
    \ required before `OrderProcessor` terminates. In this situation, it wouldn’t\
    \ make much sense to get these values from the database when we already know what\
    \ the result will be.\n\n## Setting the Order Shipment Date\n\nWhen an order is\
    \ shipped, you should update the shipment date in the database, which can simply\
    \ be the current date. Add the `orders_set_date_shipped` function to your `hatshop`\
    \ database:\n\n```sql\n-- Create orders_set_date_shipped function\nCREATE FUNCTION\
    \ orders_set_date_shipped(INTEGER)\nRETURNS VOID LANGUAGE plpgsql AS $$\nDECLARE\n\
    \  inOrderId ALIAS FOR $1;\nBEGIN\n  UPDATE orders SET shipped_on = NOW() WHERE\
    \ order_id = inOrderId;\nEND;\n$$;\n```\n\nAdd the new data tier method, `SetDateShipped`,\
    \ to your `Orders` class in `business/orders.php` as follows:\n\n```php\n// Set\
    \ order's ship date\npublic static function SetDateShipped($orderId)\n{\n  //\
    \ Build the SQL query\n  $sql = 'SELECT orders_set_date_shipped(:order_id);';\n\
    \  // Build the parameters array\n  $params = array (':order_id' => $orderId);\n\
    \  // Prepare the statement with PDO-specific functionality\n  $result = DatabaseHandler::Prepare($sql);\n\
    \  // Execute the query\n  return DatabaseHandler::Execute($result, $params);\n\
    }\n```\n\nAdd the following method to the `OrderProcessor` class in `business/order_processor.php`:\n\
