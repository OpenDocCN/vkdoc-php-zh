  trans: "```markdown\nif (condition is true) {\n// 条件为 true 时执行的代码\n} else {\n//\
    \ 条件为 false 时运行的默认代码\n}\nif (second condition is true) {\n// 第二个条件为 true 时执行的代码\n\
    } else {\n// 第二个条件为 false 时运行的默认代码\n}\n```\n\n在这种情况下，*两个*条件语句都会被运行。如果你只想执行一个代码块，请像这样使用\
    \ `elseif`：\n\n```\nif (condition is true) {\n// 第一个条件为 true 时执行的代码\n} elseif\
    \ (second condition is true) {\n// 第一个条件不成立，但第二个条件为 true 时执行的代码\n} else {\n//\
    \ 两个条件均为 false 时的默认代码\n}\n```\n\n你可以在一个条件语句中任意使用多个 `elseif` 子句。*只有第一个为 true 的条件会被执行；其余所有条件都会被忽略，即使它们也为\
    \ true。* 这意味着你需要按照希望的求值优先级顺序来构建条件语句。这是一个严格的“先到先得”层级结构。\n\n> **注意**  \n> 虽然 `elseif`\
    \ 通常写作一个单词，但你也可以将 `else if` 作为两个分开的单词使用。\n\n## 进行比较\n\n条件语句只关心一件事：被测试的条件是否为 `true`。如果不是\
    \ `true`，那必定是 `false`。这里没有折中或模棱两可的余地。条件通常依赖于两个值的比较。这个是否比那个大？它们是否相等？诸如此类。\n\n要测试是否相等，PHP\
    \ 使用两个等号（`==`），如下所示：\n\n```\nif ($status == 'administrator') {\n// 发送到管理页面\n}\
    \ else {\n// 拒绝进入管理区域\n}\n```\n\n> **警告**  \n> 不要在首行使用单个等号（`$status = 'administrator'`）。这样做会让网站的**管理区域向所有人开放**。为什么？因为这会自动将\
    \ `$status` 的值设为 `administrator`；它并不会比较这两个值。要比较值，你必须使用两个等号。这是一个常见错误，但可能带来灾难性的后果。\n\
    \n大小比较使用数学符号：小于（`<`）和大于（`>`）。假设你正在检查文件的大小，以决定是否允许其上传到服务器。你可以这样设置最大为 50 KB（1 千字节\
    \ = 1024 字节）：\n\n```\nif ($bytes > 51200) {\n// 显示错误消息并放弃上传\n} else {\n// 继续上传\n\
    }\n```\n\n> **注意**  \n> 第 4 章将介绍如何同时测试多个条件。\n\n## 使用缩进和空白提高清晰度\n\n缩进代码有助于将语句保持为逻辑分组，使其更容易理解脚本的流程。PHP\
    \ 会忽略代码内的空白，因此你可以采用任何你喜欢的风格。只要保持一致性，这样当你发现任何看起来不协调的地方时就能轻易察觉。\n\n大多数人发现缩进四个或五个空格最能提高代码的可读性。风格上最大的差异可能在于花括号的位置。一种常见的做法是将开头的花括号放在与前一行代码相同的行上，而闭合的花括号放在代码块之后的新行上，如下所示：\n\
    \n```\nif ($bytes > 51200) {\n// 显示错误消息并放弃上传\n} else {\n// 继续上传\n}\n```\n\n然而，其他人则偏好这种风格：\n\
    \n```\nif ($bytes > 51200)\n{\n// 显示错误消息并放弃上传\n}\nelse\n{\n// 继续上传\n}\n```\n\n\
    风格并不重要。重要的是你的代码要保持一致且易于阅读。\n\n## 使用循环执行重复任务\n\n**循环**是巨大的时间节省工具，因为它们能一遍又一遍地执行相同的任务，却只涉及很少的代码。它们经常与数组和数据库结果一起使用。你可以逐个遍历每个项目，寻找匹配项或执行特定任务。循环与条件语句结合使用时尤其强大，允许你一次性对大量数据有选择地执行操作。通过在实际场景中使用循环，能最好地理解它们。所有循环结构的详细信息及示例，请参见第\
    \ 4 章。\n\n## 使用函数执行预设任务\n\n**函数**用来做事情……很多事情，其数量在 PHP 中令人难以置信。一个典型的 PHP 设置会提供数千个内置函数供你使用。你实际上只需要用到其中一小部分，但知道\
    \ PHP 是一门功能完备的语言，这让人安心。\n\n你在本书中将用到的函数都是真正有用的，例如获取图像的宽度和高度、从现有图像创建缩略图、查询数据库、发送电子邮件等等。你可以在\
    \ PHP 代码中识别出函数，因为它们后面总是跟着一对括号。有时括号是空的，就像你在上一章的 `phpversion.php` 中用到的 `phpversion()`\
    \ 那样。不过，通常情况下，括号内会包含变量、数字或字符串，例如图 3-1 中脚本的这行代码：\n\n```\n$thisYear = date('Y');\n\
    ```\n\n这段代码计算当前年份并将其存储在变量 `$thisYear` 中。它通过将字符串 `'Y'` 传递给内置 PHP 函数 `date()` 来工作。像这样在括号之间放置一个值被称为**向函数传递参数**。函数接收参数中的值并进行处理，以产生（或**返回**）结果。例如，如果你将字符串\
    \ `'M'` 而不是 `'Y'` 作为参数传递给 `date()`，它将返回当前月份的三个字母缩写（例如 Mar、Apr、May）。如下例所示，你通过将结果赋给一个命名恰当的变量来捕获函数的结果：\n\
    \n```\n$thisMonth = date('M');\n```\n\n> **注意**  \n> 第 16 章将深入介绍 PHP 如何处理日期和时间。\n\
    \n有些函数接受多个参数。在这种情况下，请在括号内使用逗号分隔参数，如下所示：\n\n```\n$mailSent = mail($to, $subject,\
    \ $message);\n```\n\n不难想到，这会向第一个参数中存储的地址发送一封电子邮件，主题行是第二个参数存储的内容，消息是第三个参数存储的内容。你将在第\
    \ 6 章了解这个函数的工作原理。\n\n> **提示**  \n> 你经常会看到用“参数（parameter）”来代替“参数（argument）”。从技术上讲，parameter\
    \ 指的是函数定义中使用的变量，而 argument 指的是传递给函数的实际值。在实际使用中，这两个术语往往可以互换使用。\n\n好像所有内置函数还不够似的，PHP\
    \ 还允许你构建自己的自定义函数，下一章将对此进行描述。即使你不喜欢创建自己的函数，在本书中你也会用到我自己制作的一些函数。它们的使用方式与内置函数相同。\n\
    \n## 显示 PHP 输出\n\n除非你能在网页中显示结果，否则所有这些幕后的魔法就没有多大意义。在 PHP 中有两种方式可以实现这一点：使用 `echo`\
    \ 或 `print`。两者之间有一些细微的差别，但这些差别非常微妙，你可以将 `echo` 和 `print` 视为相同的。我更喜欢 `echo`，原因很简单：它少一个字母要打。\n\
    \n你可以将 `echo` 与变量、数字和字符串一起使用；只需将其放在你想要显示的内容前面即可，如下所示：\n\n```\n$name = 'David';\n\
    echo $name;   // 显示 David\necho 5;       // 显示 5\necho 'David'; // 显示 David\n\
    ```\n```"
- fmt: "When using `echo` or `print` with a variable, the variable must contain only\
    \ a single value. You cannot use them to display the contents of an array or of\
    \ a database result. This is where loops are so useful: you use `echo` or `print`\
    \ inside the loop to display each element individually. You’ll see plenty of examples\
    \ of this in action throughout the rest of the book.\n\nYou may see scripts that\
    \ use parentheses with `echo` and `print`, like this:\n\n```\necho('David'); //\
    \ displays David\n```\n\nThe parentheses make no difference. Unless you enjoy\
    \ typing for the sake of it, leave them out.\n\n## Using the Short Echo Tag\n\n\
    When you want to display the value of a single variable or expression (and nothing\
    \ else), you can use the short `echo` tag, which consists of an opening angle\
    \ bracket, a question mark, and the equal sign, like this:\n\n```\nMy name is\
    \ .\n```\n\nThis produces the same output as this:\n\n```\nMy name is .\n```\n\
    \nBecause it’s shorthand for `echo`, no other code can be in the same PHP block,\
    \ but it’s particularly useful when embedding database results in a web page.\
    \ It goes without saying that the value of the variable must be set in a previous\
    \ PHP block before you can use this shortcut.\n\n**Tip**  \nBecause no other code\
    \ can be in the same PHP block, it’s common practice to omit the semicolon before\
    \ the closing PHP tag when using the short `echo` tag.\n\n## Joining Strings Together\n\
    \nAlthough many other computer languages use the plus sign (`+`) to join text\
    \ (strings), PHP uses a period, dot, or full stop (`.`), like this:\n\n```\n$firstName\
    \ = 'David';\n$lastName = 'Powers';\necho $firstName.$lastName; // displays DavidPowers\n\
    ```\n\nAs the comment in the final line of code indicates, when two strings are\
    \ joined like this, PHP leaves no gap between them. Don’t be fooled into thinking\
    \ that adding a space after the period will do the trick. It won’t. You can put\
    \ as much space on either side of the period as you like; the result will always\
    \ be the same, because PHP ignores whitespace in code. In fact, it’s recommended\
    \ to leave a space on either side of the period for readability.\n\nTo display\
    \ a space in the final output, you must either include a space in one of the strings\
    \ or insert the space as a separate string, like this:\n\n```\necho $firstName\
    \ . ' ' . $lastName; // displays David Powers\n```\n\n**Tip**  \nThe period—or\
    \ **concatenation operator**, to give it its correct name—can be difficult to\
    \ spot among other code. Make sure the font size in your editor is large enough\
    \ to see the difference between periods and commas.\n\n## Working with Numbers\n\
    \nPHP can do a lot with numbers, from simple addition to complex math. The next\
    \ chapter contains details of the arithmetic operators you can use with PHP. All\
    \ you need to remember at this stage is that numbers must not contain any punctuation\
    \ other than a decimal point. PHP will choke if you feed it numbers that contain\
    \ commas (or anything else) as the thousands separator.\n\n## Understanding PHP\
    \ Error Messages\n\nError messages are an unfortunate fact of life, so you need\
    \ to understand what they’re trying to tell you. The following illustration shows\
    \ a typical error message.\n\n![../images/332054_4_En_3_Chapter/332054_4_En_3_Figa_HTML.jpg](images/332054_4_En_3_Chapter/332054_4_En_3_Figa_HTML.jpg)\n\
    \nPHP error messages report the line where PHP discovered a problem. Most newcomers—quite\
    \ naturally—assume that’s where to look for their mistake. Wrong… Most of the\
    \ time, PHP is telling you that something unexpected has happened. In other words,\
    \ the mistake lies *before* that point. The preceding error message means that\
    \ PHP discovered an `echo` command where there shouldn’t have been one. (Error\
    \ messages always prefix PHP elements with `T_`, which stands for token.) Instead\
    \ of worrying what might be wrong with the `echo` command (probably nothing),\
    \ start working backward, looking for anything missing, probably a semicolon or\
    \ closing quote on a previous line. Sometimes, the message reports the error on\
    \ the last line of the script. That always means you have omitted a closing curly\
    \ brace somewhere further up the page.\n\nThese are the main categories of errors,\
    \ presented here in descending order of importance:\n\n- **Fatal error**: Any\
    \ HTML output preceding the error will be displayed, but once the error is encountered—as\
    \ the name suggests—everything else is killed stone dead. A fatal error is often\
    \ caused by referring to a nonexistent file or function.\n- **Parse error**: This\
    \ means there’s a mistake in your code syntax, such as mismatched quotes or a\
    \ missing semicolon or closing brace. It stops the script in its tracks, and it\
    \ doesn’t even allow any HTML output to be displayed.\n- **Warning**: A warning\
    \ indicates a serious problem, such as a missing include file. (Include files\
    \ are the subject of Chapter 5.) However, the error is usually not serious enough\
    \ to prevent the rest of the script from being executed.\n- **Deprecated**: This\
    \ warns you about features that are scheduled to be removed from a future version\
    \ of PHP. If you see this type of error message, you should seriously consider\
    \ updating your script, as it could suddenly stop working if your server is upgraded.\n\
    - **Strict**: This type of error message warns you about using techniques that\
    \ are not considered good practice.\n- **Notice**: This advises you about relatively\
    \ minor issues, such as the use of a nondeclared variable. Although this type\
    \ of error won’t stop your page from displaying (and you can turn off the display\
    \ of notices), you should always try to eliminate them. Any error is a threat\
    \ to your output.\n\n### Why is My Page Blank?\n\nMany beginners are left scratching\
    \ their heads when they load a PHP page into a browser and see absolutely nothing.\
    \ There’s no error message, just a blank page. This happens when there’s a parse\
    \ error—in other words, a mistake in the code—and the `display_errors` directive\
    \ in `php.ini` is turned off.\n\nIf you followed the advice in the previous chapter,\
    \ `display_errors` should be enabled in your local testing environment. However,\
    \ most hosting companies turn off `display_errors`. This is good for security,\
    \ but it can make it difficult to troubleshoot problems on your remote server.\
    \ As well as parse errors, a missing include file often causes blank pages.\n\n\
    You can turn on the display of errors for an individual script by adding the following\
    \ code right at the top of the page:\n\n```\nini_set('display_errors', '1');\n\
    ```\n\nPut this code on the first line after the opening PHP tag, or in a separate\
    \ PHP block at the top of the page if the PHP is lower down the page. When you\
    \ upload the page and refresh the browser, you should see any error messages generated\
    \ by PHP.\n\nIf you still see a blank page after adding this line of code, it\
    \ means there’s an error in your syntax. Test the page locally with `display_errors`\
    \ turned on to find out what’s causing the problem.\n\n**Caution**  \nAfter correcting\
    \ the error, remove the code that turns on the display of errors. If something\
    \ else breaks in the script at a later stage, you don’t want to expose potential\
    \ vulnerabilities on your live web site.\n\n## PHP Quick Checklist"
  raw: "When using `echo` or `print` with a\nvariable, the variable must contain only\
    \ a single value. You cannot use\nthem to display the contents of an array or\
    \ of a database result. This\nis where loops are so useful: you use `echo` or\
    \ `print` inside the loop\nto display each element individually. You’ll see plenty\
    \ of examples of\nthis in action throughout the rest of the book.\n\nYou may see\
    \ scripts that use parentheses with `echo` and `print`, like this:\n\n```\necho('David');\
    \ // displays David\n```\n\nThe parentheses make no difference. Unless you enjoy\
    \ typing for the\nsake of it, leave them out.\n\nUsing the Short Echo Tag\n\n\
    When you want to display the value of a single variable or expression\n(and nothing\
    \ else), you can use the short `echo` tag, which\nconsists of an opening angle\
    \ bracket, a question mark, and the equal\nsign, like this:\n\n```\nMy name is\
    \ .\n```\n\nThis produces the same output as this:\n\n```\nMy name is .\n```\n\
    \nBecause it’s shorthand for `echo`, no other code\ncan be in the same PHP block,\
    \ but it’s particularly useful when\nembedding database results in a web page.\
    \ It goes without saying that\nthe value of the variable must be set in a previous\
    \ PHP block before you\ncan use this shortcut.\n\nTip\nBecause no other code can\
    \ be in the same PHP block, it’s common\npractice to omit the semicolon before\
    \ the closing PHP tag when using the\nshort `echo`\ntag.\n\nJoining Strings Together\n\
    \nAlthough many other computer languages use the plus\nsign (`+`) to\njoin text\
    \ (strings), PHP uses a period, dot, or full stop (`.`), like this:\n\n```\n$firstName\
    \ = 'David';\n$lastName = 'Powers';\necho $firstName.$lastName; // displays DavidPowers\n\
    ```\n\nAs the comment in the final line of code indicates, when two strings\n\
    are joined like this, PHP leaves no gap between them. Don’t be fooled\ninto thinking\
    \ that adding a space after the period will do the trick. It\nwon’t. You can put\
    \ as much space on either side of the period as you\nlike; the result will always\
    \ be the same, because PHP ignores whitespace\nin code. In fact, it’s recommended\
    \ to leave a space on either side of\nthe period for readability.\n\nTo display\
    \ a space in the final output, you must either include a space\nin one of the\
    \ strings or insert the space as a separate string, like\nthis:\n\n```\necho $firstName\
    \ . ' ' . $lastName; // displays David Powers\n```\n\nTip\nThe period—or **concatenation\
    \ operator**, to give it its\ncorrect name—can be difficult to spot among other\
    \ code. Make sure the\nfont size in your editor is large enough to see the difference\
    \ between\nperiods and commas.\n\nWorking with numbers\nPHP can do a lot with\
    \ numbers, from simple addition to complex math. The next\nchapter contains details\
    \ of the arithmetic operators you can use with\nPHP. All you need to remember\
    \ at this stage is that numbers must not\ncontain any punctuation other than a\
    \ decimal point. PHP will choke if\nyou feed it numbers that contain commas (or\
    \ anything else) as the\nthousands separator.\n\nUnderstanding PHP error messages\n\
    Error messages are an unfortunate fact of life, so you need to\nunderstand what\
    \ they’re trying to tell you. The following illustration\nshows a typical error\
    \ message.\n\n![../images/332054_4_En_3_Chapter/332054_4_En_3_Figa_HTML.jpg](images/332054_4_En_3_Chapter/332054_4_En_3_Figa_HTML.jpg)\n\
    \nPHP error messages report the line where PHP discovered a problem.\nMost newcomers—quite\
    \ naturally—assume that’s where to look for their\nmistake. Wrong…\nMost of the\
    \ time, PHP is telling you that something unexpected has\nhappened. In other words,\
    \ the mistake lies *before* that point.\nThe preceding error message means that\
    \ PHP discovered an `echo` command where\nthere shouldn’t have been one. (Error\
    \ messages always prefix PHP\nelements with T_, which stands for token.)\nInstead\
    \ of worrying what might be wrong with the `echo` command\n(probably nothing),\
    \ start working backward, looking for anything\nmissing, probably a semicolon\
    \ or closing quote on a previous line.\nSometimes, the message reports the error\
    \ on the last line of the\nscript. That always means you have omitted a closing\
    \ curly brace\nsomewhere further up the page.\n\nThese are the main categories\
    \ of errors, presented here in descending\norder of importance:\n\n*   **Fatal\
    \ error**: Any HTML output preceding the error\n    will be displayed, but once\
    \ the error is encountered—as the name\n    suggests—everything else is killed\
    \ stone dead. A fatal error is often\n    caused by referring to a nonexistent\
    \ file or function.\n\n*   **Parse error**: This means there’s a mistake in\n\
    \    your code syntax, such as mismatched quotes or a missing semicolon or\n \
    \   closing brace. It stops the script in its tracks, and it doesn’t even\n  \
    \  allow any HTML output to be displayed.\n\n*   **Warning**: A warning indicates\
    \ a serious problem,\n    such as a missing include file. (Include files are the\
    \ subject of\n    Chapter [5](#332054_4_En_5_Chapter.xhtml).) However, the error\
    \ is usually\n    not serious enough to prevent the rest of the script from being\n\
    \    executed.\n\n*   **Deprecated**: This warns you about features that\n   \
    \ are scheduled to be removed from a future version of PHP. If you see\n    this\
    \ type of error message, you should seriously consider updating your\n    script,\
    \ as it could suddenly stop working if your server is\n    upgraded.\n\n*   **Strict**:\
    \ This type of error message warns you\n    about using techniques that are not\
    \ considered good practice.\n\n*   **Notice**: This advises you about relatively\
    \ minor\n    issues, such as the use of a nondeclared variable. Although this\
    \ type of\n    error won’t stop your page from displaying (and you can turn off\
    \ the\n    display of notices), you should always try to eliminate them. Any error\n\
    \    is a threat to your output.\n\nWhy is My Page Blank?\nMany beginners are\
    \ left scratching their heads when they load a PHP\npage into a browser and see\
    \ absolutely nothing. There’s no error\nmessage, just a blank page. This happens\
    \ when there’s a parse error—in\nother words, a mistake in the code—and the `display_errors`\n\
    directive in `php.ini` is turned\noff.\nIf you followed the advice in the previous\
    \ chapter,  `display_errors`\n should be enabled in your local testing environment.\
    \ However,\nmost hosting companies turn off `display_errors`. This\nis good for\
    \ security, but it can make it difficult to troubleshoot\nproblems on your remote\
    \ server. As well as parse errors, a missing\ninclude file often causes blank\
    \ pages.\n\nYou can turn on the display of errors for an individual script by\
    \ adding\nthe following code right at the top of the page:\n\n```\nini_set('display_errors',\
    \ '1');\n```\n\nPut this code on the first line after the opening PHP tag, or\
    \ in a\nseparate PHP block at the top of the page if the PHP is lower down the\n\
    page. When you upload the page and refresh the browser, you should see\nany error\
    \ messages generated by PHP.\nIf you still see a blank page after adding this\
    \ line of code, it\nmeans there’s an error in your syntax. Test the page locally\
    \ with  `display_errors`\n turned on to find out what’s causing the problem.\n\
    \nCaution\nAfter correcting the error, remove the code that turns on the display\n\
    of errors. If something else breaks in the script at a later stage, you\ndon’t\
    \ want to expose potential vulnerabilities on your live web\nsite.\n\nPHP Quick\
    \ Checklist"
  trans: "\n当对变量使用 `echo` 或 `print` 时，该变量必须仅包含单个值。你不能用它们来显示数组或数据库结果的内容。这正是循环大显身手的地方：在循环内部使用\
    \ `echo` 或 `print` 来逐个显示每个元素。在本书的后续内容中，你会看到大量实际应用的示例。\n\n你可能会看到有些脚本在 `echo` 和\
    \ `print` 中使用括号，像这样：\n\n```\necho('David'); // 显示 David\n```\n\n括号并不影响结果。除非你纯粹是为了享受打字的乐趣，否则可以省略它们。\n\
    \n## 使用短 echo 标签\n\n当你只想显示单个变量或表达式的值时，可以使用简短的 `echo` 标签，它由一个左尖括号、一个问号和一个等号组成，如下所示：\n\
    \n```\nMy name is .\n```\n\n这会产生与以下代码相同的输出：\n\n```\nMy name is .\n```\n\n因为它是\
    \ `echo` 的简写形式，所以同一个 PHP 代码块中不能包含其他代码，但在将数据库结果嵌入网页时，它尤其有用。不言而喻，在使用这个快捷方式之前，变量的值必须在之前的\
    \ PHP 代码块中已经设置好。\n\n**提示**  \n由于同一个 PHP 代码块中不能包含其他代码，因此在使用短 `echo` 标签时，常见的做法是在闭合的\
    \ PHP 标签前省略分号。\n\n## 拼接字符串\n\n尽管许多其他计算机语言使用加号（`+`）来拼接文本（字符串），但 PHP 使用句点、点号或英文句号（`.`），如下所示：\n\
    \n```\n$firstName = 'David';\n$lastName = 'Powers';\necho $firstName.$lastName;\
    \ // 显示 DavidPowers\n```\n\n如最后一行代码中的注释所示，像这样拼接两个字符串时，PHP 不会在它们之间留下任何空隙。不要误以为在句点后添加一个空格就能解决问题，那是行不通的。你可以在句点的任意一侧放置任意数量的空格，结果始终相同，因为\
    \ PHP 会忽略代码中的空白字符。实际上，为了可读性，建议在句点的两侧各留一个空格。\n\n要在最终输出中显示一个空格，你必须在其中一个字符串中包含一个空格，或者将空格作为一个单独的字符串插入，如下所示：\n\
    \n```\necho $firstName . ' ' . $lastName; // 显示 David Powers\n```\n\n**提示**  \n\
    句点——或者更准确地说，它的正式名称是**连接运算符**——在其他代码中可能难以辨认。请确保你编辑器中的字体大小足够大，以便能够区分句点和逗号。\n\n##\
    \ 处理数字\n\nPHP 可以进行大量的数字运算，从简单的加法到复杂的数学计算。下一章将包含你可以与 PHP 一起使用的算术运算符的详细信息。现阶段你需要记住的是，数字中除了小数点外，不能包含任何标点符号。如果你给\
    \ PHP 提供包含逗号（或其他任何字符）作为千位分隔符的数字，它将会报错。\n\n## 理解 PHP 错误消息\n\n错误消息是编程中不可避免的现实，因此你需要理解它们试图传达的信息。下图展示了一条典型的错误消息。\n\
    \n![../images/332054_4_En_3_Chapter/332054_4_En_3_Figa_HTML.jpg](img/332054_4_En_3_Figa_HTML.jpg)\n\
    \nPHP 错误消息报告了 PHP 发现问题的行号。大多数新手——很自然地——会认为那里就是查找错误的地方。错了……大多数情况下，PHP 是在告诉你发生了意外情况。换句话说，错误位于*之前*的某处。前面的错误消息意味着\
    \ PHP 发现了一个不应该出现的 `echo` 命令。（错误消息总是用 `T_` 作为 PHP 元素的前缀，`T_` 代表 token。）不要纠结于 `echo`\
    \ 命令可能有什么问题（很可能没有问题），而是开始向后查找，寻找任何缺失的东西，很可能是前一行缺少的分号或右引号。有时，消息会在脚本的最后一行报告错误。这通常意味着你在页面中更靠前的位置遗漏了一个右花括号。\n\
    \n以下是错误的主要类别，按重要性降序排列：\n\n- **致命错误 (Fatal error)**：错误之前的所有 HTML 输出将被显示，但一旦遇到该错误——顾名思义——其他所有内容都会立即终止。致命错误通常由引用不存在的文件或函数引起。\n\
    - **解析错误 (Parse error)**：这表示你的代码语法中有错误，例如引号不匹配、缺少分号或右花括号。它会立即停止脚本，甚至不允许任何 HTML\
    \ 输出被显示。\n- **警告 (Warning)**：警告表明存在严重问题，例如缺少包含文件。（包含文件是第 5 章的主题。）然而，该错误通常不会严重到阻止脚本其余部分的执行。\n\
    - **已弃用 (Deprecated)**：这警告你某些特性计划从未来版本的 PHP 中移除。如果你看到此类错误消息，应认真考虑更新你的脚本，因为如果你的服务器升级，它可能会突然停止工作。\n\
    - **严格 (Strict)**：此类错误消息会警告你使用了不被视为良好实践的技术。\n- **注意 (Notice)**：这通知你一些相对次要的问题，例如使用了未声明的变量。尽管此类错误不会阻止你的页面显示（并且你可以关闭通知的显示），但你应始终尝试消除它们。任何错误都是对输出的威胁。\n\
    \n### 我的页面为什么是空白的？\n\n许多初学者在将 PHP 页面加载到浏览器中却完全看不到任何内容时，会感到困惑。没有错误消息，只有一个空白页面。当存在解析错误（即代码中的错误）并且\
    \ `php.ini` 中的 `display_errors` 指令被关闭时，就会发生这种情况。\n\n如果你遵循了前一章的建议，那么在你的本地测试环境中\
    \ `display_errors` 应该已启用。然而，大多数托管公司会关闭 `display_errors`。这对安全有好处，但可能会使你在远程服务器上排查问题变得困难。除了解析错误，缺少包含文件也常常导致空白页面。\n\
    \n你可以通过将以下代码添加到页面顶部来为单个脚本开启错误显示：\n\n```\nini_set('display_errors', '1');\n```\n\
    \n将此代码放在 PHP 开始标签后的第一行，或者如果 PHP 代码在页面较下方，则将其放在页面顶部一个单独的 PHP 代码块中。当你上传页面并刷新浏览器时，应该会看到\
    \ PHP 生成的任何错误消息。\n\n如果在添加这行代码后仍然看到空白页面，则意味着你的语法中存在错误。在启用了 `display_errors` 的情况下在本地测试该页面，以找出导致问题的原因。\n\
    \n**注意**  \n更正错误后，请移除开启错误显示的代码。如果脚本在后续阶段的其他地方出现问题，你不希望暴露你在线网站上的潜在漏洞。\n\n## PHP\
    \ 快速检查清单\n"
- fmt: '# 本文概述


    本章包含大量信息，但希望它能让你对 PHP 的工作原理有一个大致的了解。以下是部分要点的提醒：


    - 始终为 PHP 页面使用正确的文件扩展名，通常是`.php`。

    - 将 PHP 代码括在正确的标签之间：`<?php`和`?>`。

    - 避免使用短形式的开始标签：`<?`。使用`<?php`更可靠。

    - 在仅包含 PHP 代码的文件中省略结束的 PHP 标签。

    - PHP 变量以`$`开头，后跟字母或下划线字符。

    - 选择有意义的变量名，并记住它们是区分大小写的。

    - 使用注释来提醒你的脚本做了什么。

    - 数字不需要引号，但字符串（文本）需要。

    - 小数点（英文句号）是数字中允许的唯一标点符号。

    - 你可以对字符串使用单引号或双引号，但外部引号必须匹配。

    - 使用反斜杠来转义字符串内部同类型的引号。

    - 要将相关项存储在一起，请使用数组。

    - 使用条件语句（如`if`和`if . . . else`）进行决策。

    - 循环简化了重复性任务。

    - 函数执行预设任务。

    - 使用`echo`或`print`显示 PHP 输出。

    - 对于大多数错误消息，从指示的位置*向后*查找。

    - 保持微笑——并记住 PHP 并不*难*。


    下一章将详细介绍你可以在本书学习过程中参考的基本细节。


    # 4. PHP：快速参考


    前一章为初学者提供了 PHP 的鸟瞰视图，而本章则深入探讨细节。它不打算一次性读完。当你需要找出如何做某件特定事情时（例如构建数组或使用循环重复某个操作），可以随时查阅。以下各节并不试图涵盖
    PHP 的每个方面，但它们将有助于扩展你对本书其余部分的理解。


    ## 本章涵盖内容


    - 理解 PHP 中的数据类型

    - 使用算术运算符进行计算

    - 理解 PHP 如何处理字符串中的变量

    - 创建索引数组和关联数组

    - 理解 PHP 将什么视为真和假

    - 使用比较来做出决策

    - 在循环内重复执行相同的代码

    - 使用函数模块化代码

    - 使用生成器生成一系列值

    - 理解类和对象

    - 动态创建新变量


    ## 在现有网站中使用 PHP


    PHP 代码通常仅在使用了`.php`文件扩展名的页面中被处理。尽管你可以在同一个网站中混用`.html`和`.php`页面，但最好仅使用`.php`，即使并非每个页面都包含动态特性。这让你能够灵活地向页面添加
    PHP，而不会破坏现有链接或失去搜索引擎排名。


    ## PHP 中的数据类型


    PHP 是一种所谓的**弱类型**语言。实际上，这意味着与某些其他计算机语言（例如 Java 或 C#）不同，PHP 并不关心你在变量中存储了什么类型的数据。


    大多数情况下，这非常方便，尽管你需要注意用户输入。你可能期望用户在表单中输入一个数字，但除非你进行检查，否则如果遇到一个单词，PHP 不会拒绝它。仔细检查用户输入是后面几章的主要主题之一。


    即使 PHP 是弱类型的，它也使用以下数据类型：


    - **整数**：这是一个整数，例如 1、25、42 或 2006。整数不得包含任何逗号或其他标点符号，例如千位分隔符。

    - **浮点数**：这是一个包含小数点的数字，例如 9.99、98.6 或 2.1。PHP 不支持使用逗号作为小数点，这在许多欧洲国家很常见。你必须使用句点。与整数一样，浮点数不得包含千位分隔符。（此类型也称为**float**或**double**。）'
  raw: "This chapter contains a lot of information, but hopefully it has given\nyou\
    \ a broad overview of how PHP works. Here’s a reminder of some of the\nmain points:\n\
    \n*   Always give PHP pages the correct filename extension, normally\n    `.php`.\n\
    \n*   Enclose PHP code between the correct tags: `<?php` and `?>`.\n\n*   Avoid\
    \ the short form of the opening tag: `<?`. Using `<?php` is more\n    reliable.\n\
    \n*   Omit the closing PHP tag in files that contain only PHP\n    code.\n\n*\
    \   PHP variables begin with `$` followed by a\n    letter or the underscore character.\n\
    \n*   Choose meaningful variable names and remember they’re\n    case-sensitive.\n\
    \n*   Use comments to remind you what your script does.\n\n*   Numbers don’t require\
    \ quotes, but strings (text) do.\n\n*   The decimal point is the only punctuation\
    \ allowed in\n    numbers.\n\n*   You can use either single or double quotes around\
    \ strings, but\n    the outer pair must match.\n\n*   Use a backslash to escape\
    \ quotes of the same type inside a\n    string.\n\n*   To store related items\
    \ together, use an array.\n\n*   Use conditional statements, such as `if` and\
    \ `if . . . else`, for\n    decision-making.\n\n*   Loops simplify repetitive\
    \ tasks.\n\n*   Functions perform preset tasks.\n\n*   Display PHP output with\
    \ `echo` or `print`.\n\n*   With most error messages, work *backward* from the\n\
    \    position indicated.\n\n*   Keep smiling—and remember that PHP is *not*\n\
    \    difficult.\n\nThe next chapter fills in essential details that you can refer\
    \ to as\nyou progress through this book.\n\n4. PHP: A Quick Reference\n\nWhereas\
    \ the previous chapter offered a bird’s eye view of PHP for\nbeginners, this chapter\
