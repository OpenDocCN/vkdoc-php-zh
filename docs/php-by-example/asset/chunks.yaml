- fmt: '`foreach`循环语句用于遍历`$A`数组的元素。键存储在`$k`变量中，元素的值存储在`$v`变量中。在每个循环中，`print("\$A[$k]
    = $v")`命令会显示数组元素的值。然后，条件语句开始发挥作用，其中检查`gettype($v)=="string"`条件（元素值为`string`类型）。如果条件成立，`print("
    - remove\n")`命令会显示一条关于移除元素的消息，然后使用`unset($A[$k])`命令将该元素从数组中移除。


    如果`gettype($v)=="string"`条件为假，则`print(" - remain\n")`命令会显示元素保留在数组中的消息。


    循环语句终止后，检查数组的内容。检查结果显示，文本值对应的元素已从数组中移除。


    有时，你不需要知道或使用数组元素的键。也就是说，你只对元素的值感兴趣。如果是这样，可以在`foreach`循环语句中使用简化的语法。


