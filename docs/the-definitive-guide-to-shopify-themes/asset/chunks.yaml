  trans: '

    # 关键词分析


    幸运的是，搜索引擎如今已更为智能，关键词堆砌的策略不再奏效。但这并不意味着关键词分析与研究不再重要。搜索引擎并非读心术士，因此它们需要明确指示，了解哪些词语和短语与每个页面最相关。理解顾客在寻找商家产品时使用的词汇和短语，对于确定主题应在页面不同元素上给予何种优先级至关重要。请思考以下问题：


    -   顾客在搜索时更倾向于使用品牌或供应商名称（例如 “耐克气垫” 而非 “气泵”）吗？

    -   顾客是否会使用标准化的部件或型号编号（例如 “MS2846728”）来搜索产品？

    -   产品的变体（如尺寸或颜色）是产品的附属属性，还是决定性特征（例如 “苹果手表” 与 “金色苹果手表”）？


    # 重复内容


    电商商店常遇到的一个问题是“重复内容”。由于许多商店转售他人的产品，商家可能会被诱惑直接从供应商或竞争对手的网站复制粘贴产品描述。应强烈反对这种做法，因为搜索引擎会识别出来，并认为你的产品页面在搜索结果中的相关性低得多。


    另一个 Shopify 网站特有的问题是，同一件产品可能出现在多个 URL 地址下（它出现在其“根 URL” `https://example.myshopify.com/products/product-name`，但也出现在
    `https://example.myshopify.com/collections/widgets/product-name`、`https://example.myshopify.com/collections/under-50-dollars/product-name`，产品出现在每个集合中都会产生一个
    URL）。


    幸运的是，缓解此问题只需确保你的主题布局在页面顶部包含一个规范 URL 引用，如下所示：


    `<link rel="canonical" href="{{ canonical_url }}" />`


    # 结构化数据


    如果你花时间让你的网站易于人类使用，并遵循 HTML5 规范中的标准约定，那么搜索引擎和社交网络等自动化系统也能很好地理解你的页面。


    然而，你还可以采取一些措施，让机器更容易理解你网站上的信息，并提示这些信息如何最有效地呈现给用户。


    方法之一是使用多种不同类型的结构化数据，这些数据以标准的、机器可读的格式提供信息。本章重点介绍与电商商店最相关的两种结构化数据类型：


    -   `Schema.org` 标记，它允许谷歌及其他搜索引擎读取并展示价格、库存、评价和产品状况信息。它也用于一些商品库存源应用，例如 Google Shopping。

    -   社交媒体标记，由 Facebook、Twitter 和 Pinterest 等社交网络使用，用于决定如何展示你网站上被分享的页面。


    ## Schema.org 词汇表


    `Schema.org` 词汇表是一项开放的努力，旨在为描述网络上的“事物”提供一种标准化方式。它包括从 `TVSeason` 到 `RentalCarReservation`
    等广泛对象及其属性的层次化定义。与 Shopify 商店最相关的是，它允许指定网站上每个待售 `Product` 的信息（以及销售这些产品的 `Organization`
    信息和网站博客上可能出现的任何 `Article` 信息）。


    所有主流搜索引擎和许多其他自动化系统都能读取 `Schema.org` 标记，正是它驱动了你在各种搜索结果中肯定见过的“丰富”信息，如图 9-2 所示。


    ![A437216_1_En_9_Fig2_HTML.jpg](img/A437216_1_En_9_Fig2_HTML.jpg)


    图 9-2 谷歌搜索结果中的产品“丰富摘要”。亚马逊的结果不仅包含价格和库存信息，还包含汇总评价信息。


    ## 微数据


    历史上，`Schema.org` 标记是通过一种称为微数据（Microdata）的系统提供的。这需要在网站的 HTML 元素中添加与相关数据对应的特殊属性和属性。要了解此过程的工作原理，请比较清单
    9-1（无微数据标记）和清单 9-2（有微数据标记）。


    ```

    {{ product.title | escape }}

    {{ product.price | money }}

    {{ product.description }}


    {% for image in product.images %}


    {% endfor %}


    清单 9-1

    无微数据标记的产品 Liquid 模板示例

    ```


    ```

    {{ product.title | escape }}


    {{ product.price | money }}


    {{ product.description }}


    {% for image in product.images %}


    {% endfor %}


    清单 9-2

    添加微数据标记后的同一产品 Liquid 模板示例

    ```


    虽然微数据得到广泛支持，但它给 Web 开发者带来了一些问题。在现有的 HTML 标记中到处添加这些额外属性，增加了源代码的视觉复杂性。Shopify 开发者可能要将单个产品实体的微数据标记分散到多个模板和
    Liquid 代码片段中，这使得跟踪和维护变得困难。


    除此之外，添加微数据还强制将页面 HTML 结构与相关的 `Schema.org` 数据模型紧密耦合，降低了灵活性，并常常迫使开发者为了迎合 `Schema.org`
    的嵌套结构而在页面中添加无意义的 HTML 元素。

    '
- fmt: "#### Enter JSON-LD\n\nMicrodata 的局限性现已通过 JSON-LD（用于链接数据的 JSON，[`http://json-ld.org`](http://json-ld.org)）得到解决。\n\
    \nJSON-LD 将实体的信息与其 HTML 表示解耦，并允许在 HTML 页面的单个位置指定该信息，这使其成为 Shopify 主题提供 `Schema.org`\
    \ 结构化数据的推荐方式。它作为 `<script>` 标签内的简单 JSON 对象添加到页面中，如清单 [9-3](#A437216_1_En_9_Chapter.html#Par47)\
    \ 所示。\n\n```json\n{\n\"@context\": \"http://json-ld.org/contexts/person.jsonld\"\
    ,\n\"@id\": \"http://dbpedia.org/resource/John_Lennon\",\n\"name\": \"John Lennon\"\
    ,\n\"born\": \"1940-9-09\",\n\"spouse\": \"http://dbpedia.org/resource/Cynthia_Lennon\"\
    \n}\n```\n*清单 9-3 简单的 JSON-LD 示例*\n\n对于 Shopify 主题，我通常的做法是创建一个单独的 `json-ld.liquid`\
    \ 代码片段，其中包含条件逻辑，以便为当前页面显示适当的结构化数据，并将其包含在主题布局文件的 `<head>` 中。\n\n由于篇幅限制，此处略去了 Liquid\
    \ JSON-LD 示例，但我在大多数主题中使用的完整代码片段可在本书的可下载资源中找到。请查找 `code/snippets/json-ld.liquid`\
    \ 文件。它不仅包含了 JSON-LD 产品标记的良好起点，还包含了商店实体本身以及任何博客文章的标记。\n\n**提示：** 尽管 Shopify 使许多您希望使用\
    \ JSON-LD 标记的产品信息（如标题、价格和库存信息）在 Liquid 模板中可用，但某些属性（如商品状况或制造商 URL）在 Shopify 管理后台中没有对应的字段，因此无法以标准化方式获取。\n\
    \n如果您希望在 Shopify 商店中包含此信息，好的方法是使用产品和变体元字段来存储该信息，并使其可用于您的 JSON-LD Liquid 代码片段（有关元字段使用的详细信息，请参阅第\
    \ [5](#A437216_1_En_5_Chapter.html) 章）。资源中提供的 JSON-LD 示例代码片段包含了对此的演示。\n\n关于 JSON-LD\
    \ 最后要注意的一点是，某些类型的 `Schema.org` 信息尚不支持。其中一个例子是 `Breadcrumb` 实体，它通常出现在网站导航栏的 HTML\
    \ 中。如果您希望结构化数据机器人理解这些导航提示，则必须使用 Microdata 方法，并将这些属性直接添加到相关的 HTML 元素中。这可以与页面上的\
    \ JSON-LD 结合使用，因此您只需标记不受支持的元素即可。\n\n## 社交分享\n\n除了 Microdata，还有其他几种标记模式可用于为特定网站（尤其是社交媒体平台）提供更多信息。这里涵盖的两个主要模式是开放图谱协议（由\
    \ Facebook 开发和使用，现在被 Pinterest 用于其 Rich Pins 功能）和 Twitter 卡片标记。\n\n添加对这些标记模式的支持的好处是，这些及其他社交网络可以更多地了解商店的产品和页面，从而带来“更丰富”的分享体验。\n\
    \n### 开放图谱标记\n\n开放图谱标记只是一系列添加到主题 `<head>` 部分的 `<meta>` 标签。通过这些标签添加的信息被 Facebook\
    \ 用于在页面被分享时生成图片和描述。\n\n这些标签也被 Pinterest 的 Rich Pins 功能使用，该功能提供价格和库存信息，以便用户可以直接从\
    \ Pinterest 购买 Shopify 商店的产品。\n\n#### 添加开放图谱标记\n\n对于 Shopify 主题，我们主要关注将开放图谱信息添加到我们的产品页面和（如果我们有博客）文章页面。这些是我们希望确保\
    \ Facebook 和 Pinterest 能够从中提取大量信息的页面。\n\n与 JSON-LD 标记一样，我通常使用 Liquid 代码片段来处理开放图谱标记，然后将该代码片段包含在布局文件的\
    \ `<head>` 部分，类似于清单 [9-4](#A437216_1_En_9_Chapter.html#Par59) 和 [9-5](#A437216_1_En_9_Chapter.html#Par60)。在清单\
    \ [9-4](#A437216_1_En_9_Chapter.html#Par59) 中，请注意 `<html>` 元素上的 `prefix` 属性，该属性用于指示我们正在使用开放图谱模式。为简洁起见，我在清单\
    \ [9-5](#A437216_1_En_9_Chapter.html#Par60) 的逻辑块中省略了文章模板的开放图谱标记。资源部分随课程捆绑的文件包含该部分的完整代码。\n\
    \n```html\n<!-- ... 标签，样式表包含 ... -->\n{% include 'head-open-graph' %}\n```\n*清单\
    \ 9-4 示例 layout/theme.liquid*\n\n```html\n{% if template contains 'product' %}\n\
    \  {% for image in product.images limit:6 %}\n    <meta property=\"og:image\"\
    \ content=\"{{ image.src | img_url: 'grande' }}\" />\n  {% endfor %}\n  {% if\
    \ product.compare_at_price_max %}\n    <meta property=\"og:price:amount\" content=\"\
    {{ product.price | money_without_currency }}\" />\n    <meta property=\"og:price:currency\"\
    \ content=\"{{ shop.currency }}\" />\n  {% endif %}\n{% elsif template contains\
    \ 'article' %}\n  <!-- 文章模板的开放图谱标记 -->\n{% endif %}\n```\n*清单 9-5 示例 snippets/open-graph.liquid\
    \ 代码*\n\n#### 测试开放图谱标记\n\n使用 Facebook 的开放图谱调试工具（[`https://developers.facebook.com/tools/debug`](https://developers.facebook.com/tools/debug)）可以轻松检查您的开放图谱标记是否正常工作。您只需输入要测试的页面的\
    \ URL，然后点击调试按钮，即可获取关于 Facebook 能够提取哪些信息的报告。\n\n**注意：** 如果您正在开发的商店受密码保护，开放图谱调试工具将无法工作！这是因为\
    \ Facebook 需要能够请求页面以读取您的开放图谱标记。\n\n当您在 Facebook 或 Pinterest 上启动分享过程时，检查一下显示效果也是值得的，如图\
    \ [9-3](#A437216_1_En_9_Chapter.html#Fig3) 所示。\n\n![A437216_1_En_9_Fig3_HTML.jpg](A437216_1_En_9_Fig3_HTML.jpg)\n\
    *图 9-3 从开放图谱标签中正确提取了图片和描述*\n\n进行此最终测试将让您确切了解当您的产品或文章被分享时其他人会看到什么，包括图片的检索和裁剪方式，以及任何被截断的文本信息。\n\
    \n务必注意，Facebook 经常缓存开放图谱信息。因此，如果您看到错误或过时的数据，请使用调试工具获取相关 URL，然后点击“获取新的抓取信息”按钮强制刷新。\n\
    \n### 推特卡片标记\n\n推特卡片标记提供与开放图谱标记类似的功能，它允许 Twitter 在共享商店页面时显示“更丰富”的信息。添加标记本身的过程与开放图谱数据的处理几乎完全相同，只是多了几个测试和验证结果的步骤。\n\
    \n**注意：** 需要 Twitter 账户才能为您的 Shopify 主题添加 Twitter 卡片支持。\n\n#### 添加推特卡片标记\n\n首先，我们需要添加所需的标记，与开放图谱标记一样，它采用\
    \ `<head>` 内一系列 `<meta>` 标签的形式。同样，我倾向于使用 Liquid 代码片段来保持我的 Twitter 卡片标记独立，如清单 [9-6](#A437216_1_En_9_Chapter.html#Par69)\
    \ 和 [9-7](#A437216_1_En_9_Chapter.html#Par70) 所示。同样，为简洁起见，清单 [9-7](#A437216_1_En_9_Chapter.html#Par70)\
    \ 中处理文章模板的代码已被省略，可在本书的资源部分查看完整内容。\n\n```html\n<!-- ... 标签，样式表包含 ... -->\n{% include\
    \ 'head-open-graph' %}\n{% include 'head-twitter-cards' %}\n```\n*清单 9-6 示例 layout/theme.liquid，包含了\
    \ Twitter 卡片标记代码片段*\n\n```html\n{% if template contains 'product' %}\n  <meta\
    \ name=\"twitter:card\" content=\"product\" />\n  <meta name=\"twitter:title\"\
    \ content=\"{{ product.title }}\" />\n  <meta name=\"twitter:description\" content=\"\
    {{ product.description | strip_html | truncate: 200 }}\" />\n  {% if product.vendor\
    \ == blank %}\n    <meta name=\"twitter:label1\" content=\"Price\" />\n    <meta\
    \ name=\"twitter:data1\" content=\"{{ product.price | money_without_currency }}\"\
    \ />\n  {% else %}\n    <meta name=\"twitter:label1\" content=\"Vendor\" />\n\
    \    <meta name=\"twitter:data1\" content=\"{{ product.vendor }}\" />\n  {% endif\
    \ %}\n{% elsif template contains 'article' %}\n  <!-- 文章模板的 Twitter 卡片标记 -->\n\
    {% endif %}\n```\n*清单 9-7 示例 snippets/twitter-card.liquid*"
  raw: "#### Enter JSON-LD\n\nThe limitations of Microdata have now been addressed\
    \ thanks to JSON-LD (JSON for Linking Data— [`http://json-ld.org`](http://json-ld.org)\
    \ ).\n\nJSON-LD decouples information about an entity from its HTML representation\
    \ and allows it to be specified in a single location on a HTML page, making it\
    \ the recommended way for Shopify themes to provide `Schema.org` structured data.\
    \ It’s added to a page as a simple JSON object inside a `<script>` tag, as shown\
    \ in Listing [9-3](#A437216_1_En_9_Chapter.html#Par47).\n\n```\n{\n\"@context\"\
    : \"http://json-ld.org/contexts/person.jsonld\",\n\"@id\": \"http://dbpedia.org/resource/John_Lennon\"\
    ,\n\"name\": \"John Lennon\",\n\"born\": \"1940-9-09\",\n\"spouse\": \"http://dbpedia.org/resource/Cynthia_Lennon\"\
    \n}\nListing 9-3\nSimple JSON-LD Example\n```\n\nFor Shopify themes, my usual\
    \ approach is to create a single `json-ld.liquid` snippet that contains conditional\
    \ logic to display the appropriate structured data for the current page and include\
    \ that inside the `<head>` of my theme’s layout file.\n\nFor space reasons, I’ve\
    \ skipped providing a Liquid JSON-LD example here, but the full snippet I use\
    \ in most of my themes is available in this book’s downloadable resources. Look\
    \ for it at `code/snippets/json-ld.liquid`. It not only includes a good starting\
    \ point for JSON-LD product markup, but also for the store entity itself and any\
    \ blog articles.\n\nTip\n\nWhile Shopify makes a lot of the product information\
    \ you’d want to mark up with JSON-LD available in Liquid templates (such as title,\
    \ price, and availability information), some attributes such as item condition\
    \ or manufacturer URL don’t have corresponding fields in the Shopify admin and,\
    \ as such, aren’t available in a standardized manner.\n\nIf you’d like to include\
    \ this information on your Shopify store, a good approach is to use product and\
    \ variant metafields to store that information and make it available to your JSON-LD\
    \ Liquid snippet (see Chapter [5](#A437216_1_En_5_Chapter.html) for details on\
    \ metafield use). The example JSON-LD snippet provided in the resources includes\
    \ a demonstration of this.\n\nOne final thing to note about JSON-LD is that there\
    \ are some types of `Schema.org` information that aren’t yet supported. One example\
    \ of this is the `Breadcrumb` entity, commonly present in the HTML of a site’s\
    \ navbar. If you want structured data bots to understand these navigational hints,\
    \ you have to use the Microdata approach and add those attributes directly to\
    \ the relevant HTML elements. This can be done in conjunction with JSON-LD on\
    \ the page, so you only need to mark up the unsupported elements .\n\n## Social\
    \ Sharing\n\nIn addition to Microdata, there are a couple of other markup schemas\
    \ that can be used to provide further information to particular sites, specifically\
    \ social media platforms. The two main ones covered here are the Open Graph Protocol\
    \ (developed and used by Facebook and now used by Pinterest for their Rich Pins\
    \ feature) and Twitter Card Markup.\n\nThe benefits of adding support for these\
    \ markup schemas is that these and other social networks can understand more about\
    \ a store’s products and pages, leading to a “richer” sharing experience.\n\n\
    ### Open Graph Markup\n\nOpen Graph markup is simply a series of `<meta>` tags\
    \ added inside the `<head>` section of your theme. The information you add through\
    \ these tags is used by Facebook to generate the image and description of pages\
    \ when they’re getting shared.\n\nThese tags are also used by Pinterest’s Rich\
    \ Pins feature, which provides price and availability information so that users\
    \ can purchase products from a Shopify store directly from Pinterest.\n\n####\
    \ Adding Open Graph Markup\n\nFor Shopify themes, we’re primarily concerned with\
    \ adding Open Graph information to our product pages and (if we have a blog) our\
    \ article pages. These are the pages that we want to make sure Facebook and Pinterest\
    \ can extract plenty of information from.\n\nAs with JSON-LD markup, I typically\
    \ use a Liquid snippet to handle Open Graph markup, then include that snippet\
    \ in the `<head>` portion of my layout file, something like Listings [9-4](#A437216_1_En_9_Chapter.html#Par59)\
    \ and [9-5](#A437216_1_En_9_Chapter.html#Par60). In Listing [9-4](#A437216_1_En_9_Chapter.html#Par59),\
    \ note the `prefix` attribute on the `<html>` element, which is required to indicate\
    \ we’re using the Open Graph schema. For the sake of brevity, I’ve cut out the\
    \ Open Graph markup for the article templates in the logic block in Listing [9-5](#A437216_1_En_9_Chapter.html#Par60).\
    \ The file in the resources section bundled with the course has the full code\
    \ for that section .\n\n```\n\n tags, stylesheet includes ... -->\n\n{% include\
    \ 'head-open-graph' %}\n\nListing 9-4\nExample layout/theme.liquid\n```\n\n```\n\
    \n{% if template contains 'product' %}\n\n{% for image in product.images limit:6\
    \ %}\n\n{% endfor %}\n\n{% if product.compare_at_price_max %}\n\n{% endif %}\n\
    \n{% elsif template contains 'article' %}\n\n{% endif %}\nListing 9-5\nExample\
    \ snippets/open-graph.liquid Code\n```\n\n#### Testing Open Graph Markup\n\nChecking\
    \ that your Open Graph markup is working properly is easy with Facebook’s Open\
    \ Graph debugging tool ( [`https://developers.facebook.com/tools/debug`](https://developers.facebook.com/tools/debug)\
    \ ). You just need to enter the URL of the page you’d like to test and click Debug\
    \ to get a report on the information Facebook could extract.\n\nNote\n\nThe Open\
    \ Graph debugging tool won’t work if the store you’re developing on is password\
    \ protected! This is because Facebook needs to be able to request the page in\
    \ order to read your Open Graph markup.\n\nIt’s also worth checking how things\
    \ look when you start the sharing process on Facebook or Pinterest, as shown in\
    \ Figure [9-3](#A437216_1_En_9_Chapter.html#Fig3).\n\n![A437216_1_En_9_Fig3_HTML.jpg](A437216_1_En_9_Fig3_HTML.jpg)\n\
    \nFigure 9-3\n\nThe correct image and description has been extracted from Open\
    \ Graph tags\n\nDoing this final test will let you see exactly what others will\
    \ see when your products or articles are shared, including how images are retrieved\
    \ and cropped, and any text information that’s being truncated.\n\nIt’s important\
    \ to note that Facebook often caches Open Graph information, so if you’re seeing\
    \ incorrect or stale data, use the debugging tool to fetch the URL in question\
    \ and then click the Fetch New Scrape Information button to force a refresh.\n\
    \n### Twitter Card Markup\n\nTwitter Card markup provides a similar function to\
    \ Open Graph markup, in that it allows Twitter to display “richer” information\
    \ when pages from a store are being shared. The process to add the markup itself\
    \ is pretty much identical to that used for Open Graph data, with just a couple\
    \ of additional steps to test and validate the result.\n\nNote\n\nA Twitter account\
    \ is required to add Twitter Card support to your Shopify themes.\n\n#### Adding\
    \ Twitter Card Markup\n\nFirst, we need to add the required markup, which like\
    \ Open Graph markup, takes the form of a series of `<meta>` tags inside the `<head>`.\
    \ Again, I tend to use a Liquid snippet to keep my Twitter card markup separate,\
    \ as per Listings [9-6](#A437216_1_En_9_Chapter.html#Par69) and [9-7](#A437216_1_En_9_Chapter.html#Par70).\
    \ Again, for the sake of brevity, the code-handling article templates in Listing\
    \ [9-7](#A437216_1_En_9_Chapter.html#Par70) are omitted and viewable in full in\
    \ the book’s resources section.\n\n```\n\n tags, stylesheet includes ... -->\n\
    \n{% include 'head-open-graph' %}\n\n{% include 'head-twitter-cards' %}\n\nListing\
    \ 9-6\nExample layout/theme.liquid, with the Twitter Card Markup Snippet Being\
    \ Included\n```\n\n```\n{% if template contains 'product' %}\n\n{% if product.vendor\
    \ == blank %}\n\n{% else %}\n\n{% endif %}\n{% elsif template contains 'article'\
    \ %}\n\n{% endif %}\nListing 9-7\nExample snippets/twitter-card.liquid\n```"
  trans: "\n#### 进入 JSON-LD\n\nMicrodata 的局限性现已通过 JSON-LD（用于链接数据的 JSON，[`http://json-ld.org`](http://json-ld.org)）得到解决。\n\
    \nJSON-LD 将实体的信息与其 HTML 表示解耦，并允许在 HTML 页面的单个位置指定该信息，这使其成为 Shopify 主题提供 `Schema.org`\
    \ 结构化数据的推荐方式。它作为 `<script>` 标签内的简单 JSON 对象添加到页面中，如清单 9-3 所示。\n\n```json\n{\n\"\
    @context\": \"http://json-ld.org/contexts/person.jsonld\",\n\"@id\": \"http://dbpedia.org/resource/John_Lennon\"\
    ,\n\"name\": \"John Lennon\",\n\"born\": \"1940-9-09\",\n\"spouse\": \"http://dbpedia.org/resource/Cynthia_Lennon\"\
    \n}\n```\n*清单 9-3 简单的 JSON-LD 示例*\n\n对于 Shopify 主题，我通常的做法是创建一个单独的 `json-ld.liquid`\
    \ 代码片段，其中包含条件逻辑，以便为当前页面显示适当的结构化数据，并将其包含在主题布局文件的 `<head>` 中。\n\n由于篇幅限制，此处略去了 Liquid\
    \ JSON-LD 示例，但我在大多数主题中使用的完整代码片段可在本书的可下载资源中找到。请查找 `code/snippets/json-ld.liquid`\
    \ 文件。它不仅包含了 JSON-LD 产品标记的良好起点，还包含了商店实体本身以及任何博客文章的标记。\n\n**提示：** 尽管 Shopify 使许多您希望使用\
    \ JSON-LD 标记的产品信息（如标题、价格和库存信息）在 Liquid 模板中可用，但某些属性（如商品状况或制造商 URL）在 Shopify 管理后台中没有对应的字段，因此无法以标准化方式获取。\n\
    \n如果您希望在 Shopify 商店中包含此信息，好的方法是使用产品和变体元字段来存储该信息，并使其可用于您的 JSON-LD Liquid 代码片段（有关元字段使用的详细信息，请参阅第\
    \ 5 章）。资源中提供的 JSON-LD 示例代码片段包含了对此的演示。\n\n关于 JSON-LD 最后要注意的一点是，某些类型的 `Schema.org`\
    \ 信息尚不支持。其中一个例子是 `Breadcrumb` 实体，它通常出现在网站导航栏的 HTML 中。如果您希望结构化数据机器人理解这些导航提示，则必须使用\
    \ Microdata 方法，并将这些属性直接添加到相关的 HTML 元素中。这可以与页面上的 JSON-LD 结合使用，因此您只需标记不受支持的元素即可。\n\
    \n## 社交分享\n\n除了 Microdata，还有其他几种标记模式可用于为特定网站（尤其是社交媒体平台）提供更多信息。这里涵盖的两个主要模式是开放图谱协议（由\
    \ Facebook 开发和使用，现在被 Pinterest 用于其 Rich Pins 功能）和 Twitter 卡片标记。\n\n添加对这些标记模式的支持的好处是，这些及其他社交网络可以更多地了解商店的产品和页面，从而带来“更丰富”的分享体验。\n\
