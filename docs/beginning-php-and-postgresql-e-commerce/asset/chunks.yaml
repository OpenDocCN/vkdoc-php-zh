    C H A P T E R 3 ■ C R E AT I N G T H E P R O D U C T C ATA L O G : PA RT I Indexes


    Indexes are related to PostgreSQL performance tuning, so we’ll mention them only
    briefly here.


    **Indexes** are database objects meant to increase the overall speed of database
    operations.


    Indexes work on the presumption that the vast majority of database operations
    are read operations. Indexes increase the speed of search operations but slow
    down insert, delete, and update operations. Usually, the gains of using indexes
    considerably outweigh the drawbacks.


    On a table, you can create one or more indexes, with each index working on one
    column or on a set of columns. When a table is indexed on a specific column, its
    rows are either indexed or physically arranged based on the values of that column
    and the type of index. This makes search operations on that column very fast.
    If, for example, an index exists on department_id and then you do a search for
    the department with the ID value 934, the search would be performed very quickly.


    The drawback of indexes is that they can slow down database operations that add
    new rows or update existing ones because the index must be actualized (or the
    table rows rearranged) each time these operations occur.


    You should keep the following in mind about indexes:


    • Indexes greatly increase search operations on the database, but they slow down
    operations that change the database (delete, update, and insert operations).


    • Having too many indexes can slow down the general performance of the database.
    The general rule is to set indexes on columns frequently used in WHERE, ORDER
    BY, and GROUP


    BY clauses or used in table joins.


    • By default, unique indexes are automatically created on primary key table columns.


    You can use dedicated tools to test the performance of a database under stress
    conditions with and without particular indexes; in fact, a serious database administrator
    will want to run some of these tests before deciding on a winning combination
    for indexes.


