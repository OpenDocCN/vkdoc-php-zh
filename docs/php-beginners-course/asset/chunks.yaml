    **Preamble**


    **Welcome!**


    So you want to learn quickly how to program in PHP? This book is the right choice.
    You will learn within easy-to-understand chapters the basics of developing dynamic
    websites in PHP. It places special emphasis on full code examples which run independently
    of each other.


    It begins with setting up the development environment on your computer. Immediately
    after you write your first PHP script and execute it in your newly installed server.
    Then you will learn how you can query information and control the program sequence
    in order to create dynamic websites. You also learn how you can save the information
    in databases or files, and read again.


    Finally, you will get a short introduction to more advanced topics such as writing
    clean and safe program code.


    You will not become a professional web developer by reading only this book, but
    you will get very good fundamentals and a guide in programming your first dynamic
    websites.


    **Prerequisites**


    There is no special knowledge necessary. If you want to learn programming in PHP,
    I assume that you know how to install applications on your computer.


    Some knowledge of HTML to format texts cannot harm but is not mandatory and it
    will be the main HTML code explained in the appropriate places.


    On hardware you need is a computer with monitor, mouse and keyboard. Since we
    program websites, of course an internet connection helps to get the needed software
    and more tutorials, but isn’t needed during development, as we install our own
    little server. You only need to download some (free) software from the Internet,
    more on that later.


    You are free, what operating system you use for development. The book will show
    you how to do the installation of a PHP server with MySQL support on Windows,
    Linux and MacOS and it will give you some examples of modern text editors.


    **Day 1**


    **PHP – DEFINITION AND HISTORY**


    PHP is a scripting language that is used primarily to develop dynamic webpages.
    PHP


    scripts are executed directly on the server and not in the browser of a visitor.


    PHP was developed in 1995 by Rasmus Lerdorf. His goal was to create a simple replacement
    for the collection of use-ful Perl scripts. This is how Personal Home Page Tools
    came into being. Soon after, he recreated the tool collection in the programming
    language C.


    Today, PHP is still developed in C, a very powerful programming language. It was
    soon followed by the first version, PHP / FI (Form Interpreter).


    In 1998, Andi Gutmans and Zeev Suraski, in cooperation with Lerdorf, created PHP
    3 from scratch to make it ready for use, particularly in the booming e-commerce
    business. Gutmans and Suraski founded the company Zend Technol-ogies Ltd., which
    contributed the main parts of PHP 4.


    In 2004, PHP5 introduced enhanced support for object-oriented programming and
    greatly increased the speed of the PHP interpreter.


    Eleven years later, in 2015, PHP 7 was released. It is powered by a new engine
    with a fast speed. PHP 6 was skipped because projects planned to carry out the
    program were never finished and so the developers focused on a completely new
    core engine. Most scripts execute twice as fast as in PHP 5.x. The majority of
    old PHP 5 scripts only need small changes to run in PHP 7\. Scripts in this book
    are all updated to be fully compatible.


    **Setting up the development environment (Windows, Linux or** **Mac OS)**


    **Windows**


    On Windows, the prefabricated server packages make it extremely easy to install
    the server. For the development, I prefer the package of Xampp (www.apachefriends.org).


    Download the installer for Windows and run the installation. I recommend to keep
    C:/xampp/ as the default folder path. If you install the package under C:/Programs/XAMPP/,
    the server may make problems because the necessary file permissions are not set
    correctly.'
  trans: "\n# PHP 初学者课程\n\n**5 天掌握 PHP/MySQL 编程基础**\n\n## 版权页\n\n版权所有 © 2017 克劳斯·滕迈尔\
    \  \n保留所有权利\n\n2012 年 5 月首次发行电子版，上架于亚马逊 KDP 和 Smashwords 公司  \n2016 年 12 月推出英文译本\
    \  \n2017 年 1 月第 6 版\n\n所有品牌和产品名称均为其各自所有者的商标。我们对软件/硬件的任何损坏不承担责任，所有信息不提供担保。未经许可不得复制本书内容。引用时请参考亚马逊图书页面链接。\n\
    \n封面设计：克劳斯·滕迈尔  \n封面图片：© MWiner / Fotolia.com\n\n## 目录\n\n前言  \n欢迎！  \n前置要求\n\n\
    第 1 天  \nPHP —— 定义与历史  \n搭建开发环境（Windows、Linux 或 Mac OS）  \nWindows  \nLinux  \n\
    MacOS  \n文本编辑器  \n第一个 PHP 程序（向全世界问好）  \n变量（信息存储器）  \n初始化变量  \n注释代码  \n算术运算（基本计算）\
    \  \n组合多个变量（数组）  \n数组排序  \n多维数组\n\n第 2 天  \n用用户信息填充变量（GET / POST）  \n识别并读取 GET\
    \ 变量  \n识别并读取 POST 变量  \n条件与程序控制（IF/ELSE/ELSEIF）  \n分支分析（switch / case）  \n重复任务的循环（While\
    \ / For / Foreach）  \nWhile() 循环  \nFor() 循环  \nForeach() 循环\n\n第 3 天  \n日期与时间（是谁拨动了时钟？）\
    \  \n`DATE()`  \n`microtime()`  \n使用 `mktime()` 向 `DATE()` 函数传递时间点  \n文本函数（字符串操作）\
    \  \n编写自己的函数  \n将代码拆分为多个文件\n\n第 4 天  \n使用数据库存储和读取信息（MySQL）  \n在 PHP 中连接数据库  \n\
    创建新数据库  \n选择我们的数据库  \n创建表  \n向数据库写入数据  \n从数据库检索数据  \n从数据库删除数据  \n文件操作（读取/写入文件）\
    \  \n保存到文本文件  \n从文本文件读取  \n管理会话\n\n第 5 天  \n编写干净的代码（一年后仍能理解）  \nPHP 脚本中的安全性  \n\
    原则：永远不要信任来自外部的数据  \n防范 SQL 注入  \n加密你的密码  \n为你的密码加盐  \n网站推荐  \n书籍推荐\n\n尾声\n\n##\
    \ 前言\n\n### 欢迎！\n\n想快速学会 PHP 编程？这本书正是你的选择。你将通过易于理解的章节，学习用 PHP 开发动态网站的基础知识。本书特别强调完整且可独立运行的代码示例。\n\
    \n首先，你会在自己的计算机上搭建开发环境。紧接着，你将编写第一个 PHP 脚本并在新安装的服务器上执行。然后，你将学习如何查询信息、控制程序流程以创建动态网站。你还将学习如何将信息保存到数据库或文件中，并重新读取。\n\
    \n最后，你将获得关于高级主题（如编写干净、安全的程序代码）的简短介绍。\n\n仅阅读本书不会让你成为专业的 Web 开发者，但你将获得非常扎实的基础知识，以及编写第一个动态网站的指导。\n\
    \n### 前置要求\n\n无需特殊知识。如果你想学习 PHP 编程，我假设你知道如何在计算机上安装应用程序。\n\n一些 HTML 知识有助于格式化文本，但并非必需，在适当位置会对主要\
    \ HTML 代码进行解释。\n\n硬件方面，你只需要一台带有显示器、鼠标和键盘的计算机。由于我们进行网站编程，当然还需要互联网连接来获取必要的软件和更多教程，但在开发过程中并非必需，因为我们安装了本地小型服务器。你只需要从互联网下载一些（免费的）软件，后续会详细说明。\n\
    \n你可以自由选择开发时使用的操作系统。本书将展示如何在 Windows、Linux 和 MacOS 上安装支持 MySQL 的 PHP 服务器，并提供一些现代文本编辑器的示例。\n\
    \n## 第 1 天\n\n### PHP —— 定义与历史\n\nPHP 是一种主要用于开发动态网页的脚本语言。PHP 脚本直接在服务器上执行，而不是在访问者的浏览器中。\n\
    \nPHP 由拉斯姆斯·勒多夫于 1995 年开发。他的目标是为 Perl 脚本集创建一个简单的替代品。由此诞生了“个人主页工具”。不久后，他用 C 编程语言重写了这个工具集。\n\
    \n今天，PHP 仍然用 C 语言进行开发，这是一种非常强大的编程语言。紧接着诞生了第一个版本 PHP/FI（表单解释器）。\n\n1998 年，安迪·古特曼斯和泽夫·苏拉斯基与勒多夫合作，从头创建了\
    \ PHP 3，使其更适合在蓬勃发展的电子商务业务中使用。古特曼斯和苏拉斯基创办了 Zend Technologies Ltd. 公司，并为 PHP 4 贡献了核心部分。\n\
    \n2004 年，PHP 5 引入了对面向对象编程的增强支持，并大幅提高了 PHP 解释器的速度。\n\n十一年后的 2015 年，PHP 7 发布。它采用全新的高速引擎驱动。PHP\
    \ 6 被跳过，因为计划进行的项目从未完成，因此开发者专注于全新的核心引擎。大多数脚本的执行速度是 PHP 5.x 的两倍。大多数旧的 PHP 5 脚本只需少量修改即可在\
    \ PHP 7 中运行。本书中的所有脚本均已更新为完全兼容版本。\n\n### 搭建开发环境（Windows、Linux 或 Mac OS）\n\n####\
    \ Windows\n\n在 Windows 上，预制服务器包使安装变得极其简单。对于开发，我推荐使用 Xampp 包（`www.apachefriends.org`）。\n\
    \n下载适用于 Windows 的安装程序并运行安装。我建议保留 `C:/xampp/` 作为默认文件夹路径。如果你将包安装在 `C:/Programs/XAMPP/`\
    \ 下，服务器可能会因文件权限设置不正确而出现问题。\n"
- fmt: '# 服务器安装与配置


    在安装过程中，系统会询问是否将各个服务器组件作为操作系统服务安装。**你绝对不能这样做**，否则服务器会持续在后台运行（直到你手动停止服务），消耗资源，并且会通过网络持续可用。


    ## Linux


    在 Linux 中，最好使用包管理器安装 Apache 和 MySQL 服务器，并手动进行配置。但对于本书，我建议初学者使用来自 `www.apachefriends.org`
    的预配置包，它包含了所有必要的服务器功能和 PHP 扩展。在下载链接下方，你可以找到 Linux 安装说明以及关于如何快速启动和停止服务器的一些提示。


    ## MacOS


    即使对于 MacOS，也有 `Apachefriends.org` 的包。但我更推荐 MacOS 用户使用 `MAMP` 包。它的操作类似，但给我的问题更少。该应用程序可在
    `www.mamp.info` 免费获取。也有付费的专业版，但对于我们的第一次编程体验来说并不需要。下载安装文件后，请将 `MAMP` 安装到你的 `Application`
    文件夹中。


    以上所有服务器包都包含一个名为 `htdocs` 的目录。我们将使用这个目录来存储文件，这些文件可以通过浏览器从服务器访问。因此，打开你的浏览器并输入以下
    URL：`http://127.0.0.1`


    在 MacOS 下，你需要输入服务器的端口号（默认端口号为 `4444`，因此完整的 URL 应为：`http://127.0.0.1:4444`）。你应该会看到服务器包的欢迎页面（`XAMPP`
    / `MAMP`），并收到一些关于服务器的信息。


    `127.0.0.1` 始终指向本地计算机。这意味着浏览器试图寻找本地 Web 服务器。或者，你也可以使用 `http://localhost`，这应该会得到相同的结果。


    ## 文本编辑器


    每个操作系统都有很多优秀的文本编辑器。然而，在这种情况下，`Microsoft Office Word` 或 `LibreOffice Writer` 不能被视为文本编辑器，因为它们除了文本之外，还保存了大量关于页面和文本格式的信息。而文本编辑器只保存输入文本的确切字符，就像在编辑器中显示的那样。现代文本编辑器会对文本进行着色，使其更具可读性。着色不会被保存，但当你重新打开文件时会动态显示。这个功能被称为语法高亮。语法是用来描述代码的术语，而在文本编辑器中高亮它意味着编程语言的各种命令和函数会被着色。


    还有集成开发环境，它们能极大地帮助编写和管理程序代码以及软件项目的所有其他部分。集成开发环境会自动检测程序代码中函数的交叉引用，并能在编写注释时显示最近使用过的函数。


    有一些大型的集成开发环境项目，它们以开源形式提供，或针对所有操作系统采用不同的许可证。许多开发者使用集成开发环境 `Eclipse`（`www.eclipse.org`）或
    `NetBeans`（`www.netbeans.org`）。


    如果你有一台性能较低的计算机，或者想快速测试一些简短的 PHP 脚本，那么我推荐使用文本编辑器 `jEdit`，它是一款开源软件，可以从 `www.jedit.org`
    下载。在较大的 Linux 发行版中，可以通过软件渠道以稍旧版本的形式获取 `jEdit`。


    对于本书来说，无论你使用集成开发环境还是简单的文本编辑器，都没有关系。如果你打算成为一名专业的 PHP 开发者，你迟早会接触到集成开发环境。


    为了给出具体的建议，我个人建议你先在像 `jEdit` 这样的文本编辑器中编写第一个脚本，在完成少量几个小型 PHP 项目之后，再将更高级的脚本编写到集成开发环境的界面中。


    ## 第一个 PHP 程序（欢迎全世界）


    我们现在来编写第一个小型 PHP 脚本。'
  raw: 'During the installation, it will be asked whether the individual server components
    should be installed as a service in the operating system. You must not do so,
    otherwise the server will constantly run in the background (until you stop the
    services manually), consume resources, and will be continuously available over
    the network.


    **Linux**


    In Linux, it would be better to install an Apache web server and a MySQL server
    using the Package Manager and to perform the configuration manually. But, for
    this book, I recommend that the beginners use a prepared package from www.apachefriends.org,
    which has all the necessary server features and PHP extensions. Beneath the download
    links, you will find the Linux installation instructions and some tips on how
    you can start and stop the server quickly.


    **MacOS**


    There are Apachefriends.org packages even for MacOS. But I prefer the package
    of MAMP for MacOS users. Its oper-ation is similar but has given me fewer problems.
    The application is available for free under www.mamp.info. There is also a paid
    Pro version, but we do not need this for our first programming experience. After
    downloading the setup file, please install MAMP in your Application folder.


    All the abovementioned server packages contain a directory with the label ‘htdocs.’
    We will use this to store files that can be accessed via a browser from the server.
    So, open your browser and enter the following URL: http://127.0.0.1


    Under MacOS, you have to enter the port number of the server (the default number
    is 4444, so the entire URL should be: http://127.0.0.1:4444) You should be greeted
    from your server package’s website (XAMPP / MAMP) and receive some information
    about the server.


    127.0.0.1 always leads to the local computer. This means that the browser tries
    to find a local web server. Alternatively, you could use http://localhost. This
    should lead to the same result.


    **Text editors**


    Each operating system has a lot of good text editors. However, in this case, Microsoft
    Office Word or LibreOffice Writer cannot be regarded as text editors because they
    save a lot of information about the page and text formatting apart from the text.
    A text editor saves the exact characters of the entered text as it appears in
    the editor. Modern text editors colour text to make it more readable. The colouring
    will not be saved, but shown dynamically when you reopen the file. This function
    is called syntax highlighting. Syntax is the term used to describe the code, and
    highlighting it in a text editor means that various commands and functions of
    a programming language are coloured.


    There are also Integrated Development Environments (IDEs), which help a lot to
    write and manage the program code and all other parts of a software project. IDEs
    automatically detect cross-references to functions in the program code and can
    display the recently used functions while writing notes.


    There are large IDE projects, which are available as open source items, or under
    different licenses for all operating sys-tems. Many developers use the IDEs Eclipse
    (www.eclipse.org) or NetBeans (www.netbeans.org).


    If you have a low-performance computer or want to quickly test some short PHP
    scripts, then I recommend using the text editor jEdit, which has been developed
    as an open source software and can be downloaded from www.jedit.org. In the larger
    Linux distributions, jEdit is available via a Software Channel (Package Manager)
    in a somewhat outdated version.


    For this book, it does not matter whether you are using an IDE or a simple text
    editor. If you are going to be a profes-sional PHP developer, you will come in
    contact with an IDE


    sooner or later.


    In order to issue a specific recommendation, I would personally suggest that you
    write the first scripts in a text editor like jEdit, and more advanced scripts
    into the surface of an IDE, only after finishing a handful of small PHP projects.


    **The first PHP program (Welcome the whole world)** We will now write our first
    small PHP script.'
