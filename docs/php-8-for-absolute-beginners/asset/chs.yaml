  \ semestergrade (varchar)`。\n\n现在我们有四种类型的测试数据可用于填充图表！我们已经准备好进入下一步了！\n\n但在我们查看更多代码之前，需要先确定程序的逻辑。让我们考虑一下用户向我们提供必要信息所需的步骤，以及创建仪表盘和图表的流程。\n\
  \n- *选择文件格式*：数据库、Excel 电子表格、JSON 或 CSV。\n- *如果选择了数据库*：确定要使用的数据库以及该数据库中的表。\n- *如果选择了\
