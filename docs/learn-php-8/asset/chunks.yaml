- fmt: '# Some Coding in the Interface Tier


    Some coding (shown in later chapters), which prepares information to be sent to
    other tiers, may be present in the interface tier. For example, `JavaScript` code
    that verifies that the user has entered all the required information or the proper
    information (numeric characters in an age text box) is acceptable. Additional
    code may also prepare information received from the business rules tier to be
    displayed (such as converting numbers to text format) in the interface.


    - **Verification/verification code** — Verification code validates information.
    The code compares the information received to an expected standard format. For
    example, the code can verify that an email address has both a `@` and a `.` (period).
    If the information has both symbols, it could be considered “valid” (although
    we still are not sure that the email address actually exists). If it does not
    have both symbols, the code is not valid. Information that is not valid usually
    will cause the program to display an error message to the user requesting valid
    information be reentered.


    The interface usually provides code with the ability to react to user interactions
    (clicking the Submit button), commonly called *user events*. Code may also be
    provided that prepares information provided by the user for use by other tiers
    (such as converting text entered by the user into number format for a calculation
    in the business rules tier).


    - **Event — Event-driven languages** (such as `PHP`) can execute blocks of code
    when an event occurs. Events can be something that the user has done (such as
    clicking a button). Events can also be fired by the operating system. Programs
    provide listener code that “hears” an event. When an event occurs, the code provides
    an event method, which then executes.


    A program chooses which events to listen for by the presence, or lack of, listener
    code.


    The interface tier should not directly interact with a database management system
    or a database itself. By doing so, this would lock the tier into the database
    location and actual design of the database. The tier should not manipulate data
    (except for display purposes). Any accounting, mathematical calculations, or processing
    of data related to the application itself should be accomplished in the business
    rules tier.


    ## Do vs. Don’t in the Interface Tier


    | Do | Don’t |

    | --- | --- |

    | Format data for display | Access data from database |

    | Verify correct information from user | Calculate results |

    | Respond to user events | Process information |

    | Handle the unexpected (exceptions) | Verify user IDs and passwords |

    | Format data for business rules tier |  |


    - **Database Management System (DBMS)** — A Database Management System is software
    that allows a user or an application to create and define a database. It also
    provides the ability to insert, update, or delete information in the database.


    ### Do It


    1.  Give three examples of items that would be included in the interface tier.

    2.  Give three examples of items that would not be included in the interface tier.

    3.  Can some program code exist in the interface tier? If so, what tasks does
    this code provide?


    # Business Rules Tier


    ![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig7_HTML.jpg](images/394210_2_En_2_Chapter/394210_2_En_2_Fig7_HTML.jpg)


    **Figure 2-7** Business rules tier


    The business rules tier processes all information and data received from the interface
    tier and the data tier. This tier will also return information requested by the
    interface tier (such as returning `"Hello World"`) and submit information to the
    data tier for storage. Most of the actual programming code is contained in this
    tier.


    The business rules tier code usually makes an application truly unique from another
    application. If an application is copyrighted, the uniquely creative algorithms
    are probably hidden in this tier. For example, many of the differences in web
    search engines and how the information will ultimately be displayed are embedded
    in the business rules tier.


    Unlike the interface tier, which may contain code in the browser, all coding in
    the business tier is completed using a program(s) (such as `PHP`) on a server.
    Scripting and programming code residing on a server is secured by the server itself
    and cannot be accessed by the user. Business tier code can also reside on an application
    server (as a service) or on a web server (as a web service). Servers ensure that
    code in this tier is secure by not allowing direct access by the user.


    - **Server/application server/web server** — A server is connected to a network
    to provide services to any node (machine) on the network (or the Internet). A
    server can provide more than one service (communication, security, and/or storage)
    or can provide a specific service. Application servers house applications that
    are accessible to users on the network (or the Internet). Web servers host web
    pages and web applications. They are usually exposed to access outside a corporation.

    - **Service** — Services are applications that reside in the memory of a computer
    or server that responds to requests from other applications. Services can be automatically
    loaded into memory when the computer or server is booted, or they can manually
    be started and stopped when required. Services do not have GUI interfaces. The
    business rules tier can reside as a service(s) on a computer or server.


    Information passed between the tiers of the application can be subject to possible
    manipulation by hackers; this tier may contain code, similar to the interface
    tier, to verify the validity and proper format of the data received.


    Information passed from this tier to other tiers can be formatted for easy acceptance.
    For example, a *dataset* (similar to a table or spreadsheet) can be returned to
    the interface tier for display in a table or list box existing on a web page.
    A dataset could also be sent to the data tier to be inserted into a database.


    - **Dataset** — A *dataset* is a structure that can hold multiple data tables.
    A data table is similar to a table in a database (with rows, columns, and data)
    or a spreadsheet. Datasets are commonly used to pass information between tiers
    and between methods.


    The business rules tier returns values to the tiers that request it. The tier
    does not provide any GUI interfaces or forms of any kind. Interfaces are not needed
    because the tier has no direct contact with the user at any time. All communication
    to the business rules tier is handled either through the interface tier or the
    data tier. Like the interface tier, the business rules tier does not directly
    update stored information in databases. All storage updates occur in the data
    tier.


    ## Do vs. Don’t in the Business Rules Tier


    | Do | Don’t |

    | --- | --- |

    | Manipulate data | Display information |

    | Format data | Save data on secondary device |

    | Store data in memory | Display error messages |

    | Raise exceptions |  |

    | Verify data |  |


    ### Do It


    1.  What tasks can business rules tier code accomplish that is similar to a task
    accomplished by code in the interface tier? Why is this code possibly duplicated
    in both tiers?

    2.  How does the business rules tier pass and receive data (information)?'
