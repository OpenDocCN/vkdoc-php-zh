- fmt: "`GetBacktrace` gets the backtrace information from the `debug_backtrace` function\
    \ (which was introduced in PHP 4.3.0) and changes its output format to generate\
    \ an HTML error message similar to a Java error. It isn’t important to understand\
    \ every line in `GetBacktrace` unless you want to personalize the backtrace displayed\
    \ in case of an error. The 2 parameter sent to `GetBacktrace` specifies that the\
    \ backtrace results should omit the first two entries (the calls to `ErrorHandler::Handler`\
    \ and `ErrorHandler::GetBacktrace`).\n\nYou build the detailed error string in\
    \ `ErrorHandler::Handler`, including the backtrace information: `$backtrace =\
    \ ErrorHandler::GetBacktrace(2);`\n\n```php\n// Error message to be displayed,\
    \ logged or mailed\n$error_message = \"\\nERRNO: $errNo\\nTEXT: $errStr\" .\n\"\
    \\nLOCATION: $errFile, line \" .\n\"$errLine, at \" . date('F j, Y, g:i a') .\n\
    \"\\nShowing backtrace:\\n$backtrace\\n\\n\";\n```\n\nDepending on the configuration\
    \ options from the `config.php` file, you decide whether to display, log, and/or\
    \ email the error. Here we use PHP’s `error_log` method, which knows how to email\
    \ or write the error’s details to a log file:\n\n```php\n// Email the error details,\
    \ in case SEND_ERROR_MAIL is true\nif (SEND_ERROR_MAIL == true)\n    error_log($error_message,\
    \ 1, ADMIN_ERROR_MAIL, \"From: \" .\n    SENDMAIL_FROM . \"\\r\\nTo: \" . ADMIN_ERROR_MAIL);\n\
    \n// Log the error, in case LOG_ERRORS is true\nif (LOG_ERRORS == true)\n    error_log($error_message,\
    \ 3, LOG_ERRORS_FILE);\n```\n\n**Note** If you want to be able to send an error\
    \ email to a localhost mail account (`your_name@localhost`), then you should have\
    \ an SMTP (Simple Mail Transfer Protocol) server started on your machine. On a\
    \ Red Hat (or Fedora) Linux distribution, you can start an SMTP server with the\
    \ following command: `service sendmail start`\n\n**Note** On Windows systems,\
    \ you should check in IIS (Internet Information Services) Manager for Default\
    \ SMTP Virtual Server and make sure it’s started.\n\nWhile you are developing\
    \ the site, the `DEBUGGING` constant should be set to `true`, but after launching\
    \ the site in the “wild,” you should make it `false`, causing a user-friendly\
    \ error message to be displayed instead of the debugging information in case of\
    \ serious errors, and no message shown at all in case of nonfatal errors.\n\n\
    The errors of type `E_WARNING` are pretty tricky because you don't know which\
    \ of them should stop the execution of the request. The `IS_WARNING_FATAL` constant\
    \ set in `config.php` decides whether this type of error should be considered\
    \ fatal for the project. Also, errors of type `E_NOTICE` and `E_USER_NOTICE` are\
    \ not considered fatal:\n\n```php\n/* Warnings don't abort execution if IS_WARNING_FATAL\
    \ is false\n   E_NOTICE and E_USER_NOTICE errors don't abort execution */\nif\
    \ (($errNo == E_WARNING && IS_WARNING_FATAL == false) ||\n    ($errNo == E_NOTICE\
    \ || $errNo == E_USER_NOTICE))\n    // If the error is nonfatal ...\n{\n    //\
    \ Show message only if DEBUGGING is true\n    if (DEBUGGING == true)\n       \
    \ echo '<pre>' . $error_message . '</pre>';\n}\nelse\n    // If error is fatal\
    \ ...\n{\n    // Show error message\n    if (DEBUGGING == true)\n        echo\
    \ '<pre>' . $error_message . '</pre>';\n    else\n        echo SITE_GENERIC_ERROR_MESSAGE;\n\
    \    // Stop processing the request\n    exit;\n}\n```\n\nIn the following chapters,\
    \ you’ll need to manually trigger errors using the `trigger_error` PHP function,\
    \ which lets you specify the kind of error to generate. By default, it generates\
    \ `E_USER_NOTICE` errors, which are not considered fatal but are logged and reported\
    \ by `ErrorHandler::Handler` code.\n\n## Preparing the Database\n\nThe final step\
    \ in this chapter is to create the PostgreSQL database, although you won’t use\
    \ it until the next chapter. We will show you the steps to create your database\
    \ and create a user with full privileges to it using the `pgAdmin III` utility\
    \ that ships with PostgreSQL. If you’re working with a database hosted by a hosting\
    \ service, the service may give you access to your database through a web-based\
    \ utility such as `phpPgAdmin`. See [http://phppgadmin.sourceforge.net/](http://phppgadmin.sourceforge.net/)\
    \ for more details about using `phpPgAdmin`.\n\nBefore moving on, make sure you\
    \ have PostgreSQL 8 installed. Consult Appendix A for installation instructions.\
    \ Follow the steps in the exercise to create the database and a new user account.\n\
    \n### Exercise: Creating the `hatshop` Database and a New User Account\n\n1. Start\
    \ the `pgAdmin III` utility, and select your database server from the left pane\
    \ (in Windows, you start `pgAdmin III` by choosing Start ➤ Programs ➤ PostgreSQL\
    \ ➤ pgAdmin III). The window should then look like the one in Figure 2-11.\n\n\
    \   **Figure 2-11.** *The main pgAdmin III page*\n\n2. While the database server\
    \ is selected, choose Tools ➤ Connect. Alternatively, you can right-click the\
    \ database server entry, and select Connect from the context menu. If asked, enter\
    \ the root password and click OK.\n\n3. You connected to the database server using\
    \ the superuser account. For our project, we want to create a regular user account\
    \ that will have access just to the `hatshop` database. Extend the database server\
    \ node, right-click the Login Roles node, and select New Login Role from the context\
    \ menu. Type `hatshopadmin` for the role name and for its password, and check\
    \ the Superuser check box, as shown in Figure 2-12. Then click OK.\n\n   **Figure\
    \ 2-12.** *Creating a new database role*\n\n4. Now create the `hatshop` database.\
    \ Right-click the Databases node, and choose New Database from the context menu.\
    \ Type `hatshop` for its name, and select `hatshopadmin` from the Owner drop-down\
    \ list. If you intend to store non-ASCII data, you should also choose the UTF-8\
    \ encoding, as shown in Figure 2-13. Click OK, and wait until the process completes\
    \ and the New Database dialog box closes.\n\n   **Figure 2-13.** *Creating a new\
    \ database*\n\n   **Note** All operations performed with the `pgAdmin III` utility\
    \ can be also done by executing SQL code. SQL is the language used to interact\
    \ with the database, and `pgAdmin III` can be used as an interface for executing\
    \ SQL commands into your database. You’ll learn more about SQL while following\
    \ the exercises in this book.\n\n5. In the end, select the `hatshop` node. You\
    \ can browse the tree to see how an empty database looks, but don’t worry, you’ll\
    \ start filling it with data in the next chapter. `pgAdmin III` is nice enough\
    \ to even show you the SQL query it used to create your database (see Figure 2-14).\n\
    \n   **Figure 2-14.** *Your brand new database*\n\n6. From now on, when connecting\
    \ to the `hatshop` database, you won’t use the PostgreSQL superuser any more,\
    \ but you’ll use the `hatshopadmin` account instead. For a quick test, select\
    \ the database server, and then choose Tools ➤ Disconnect. Right-click the database\
    \ server, choose Properties, and type `hatshopadmin` in the Username text box,\
    \ as shown in Figure 2-15. Click OK. On the next attempt to connect to the server,\
    \ you’ll be asked for the password of the `hatshopadmin` user. After logging in,\
    \ you’ll have access only to the `hatshop` database and to the public objects\
    \ of any other databases.\n\n   **Figure 2-15.** *Configuring the hatshopadmin\
    \ user*"
