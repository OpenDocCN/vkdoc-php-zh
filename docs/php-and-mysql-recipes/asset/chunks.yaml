    }


    else {


    echo "No database connection";


    }


    }


    // Call the function


    $params = [


    ''ids'' => [1, 3, 5],


    ''table'' => ''mytable''


    ];


    DeleteRows($params);


    mysqli_close($con);


    Now the function takes a single parameter called $options. It must be an array
    and the key called ‘table’


    must be defined, otherwise the function will print an error message. The order
    the parameters are created in the array does not matter.


    Using arrays as parameters makes it possible to change how a function works without
    breaking existing code that uses the function. That is only the case if new parameters
    are added. Renaming or removing parameters might still require changes to existing
    code that is calling the function.


    CHAPTER 11 ■ FUNCTIONS


    Recipe 11-4\. Optional Parameters


    Problem


    In the previous examples the parameter for the ids to delete could be an empty
    array causing the function to delete all rows in the table. In the example where
    the parameters was passed as an array it would be possible to leave out the ids
    key and the function would still work, but in the example where table and ids
    were passed as two separate variables the ids would have to be passed, even if
    it was an empty array. It would be nice to be able to only pass the parameters
    that make sense in the context of calling the function.


    Solution


    Optional parameters are a way to tell the function to use a specific value for
    a parameter if the caller provides none. Optional parameters are defined from
    right to left in the parameter list. The first optional parameter that can be
    defined is the last parameter in the list and when that is optional the one before
    that can be defined optional. This can continue until all parameters are defined
    as optional.


    Optional parameters are defined by assigning a value to the variable in the parameter
    list. If the $ids parameter should have a default value of an empty array it’s
    written as $ids = [] or $ids = array() if you prefer the classic syntax.


    How It Works


    By changing the last parameter to have a default value of an empty array it’s
    possible to call the DeleteRows() function with a single parameter. In that case
    the function will delete all rows from the specified table.


    <?php


    // 11_6.php


    $con = mysqli_connect(''host'', ''user'', ''secret'');


    if ($con) {


    mysqli_select_db($con, ''mydb'');


    }


    function DeleteRows($table, $ids = []) {


    global $con;


    if ($con) {


    $where = "";


    if (is_array($ids) && sizeof($ids)) {


    $strids = implode(", ", $ids);


    $where = " where id in ({$strids})";


    }


    mysqli_query($con, "delete from {$table}{$where};");


    }


    else {


    echo "No database connection";


    }


    }


    // Call the function


    DeleteRows("mytable");


    mysqli_close($con);


    CHAPTER 11 ■ FUNCTIONS


    Variables with an optional value will either be assigned the optional value, when
    nothing is passed to the parameter, or the value passed by the caller. In the
    case where the options are passed as an array, that might cause an unwanted overwrite
    effects. Consider the function declaration: function DeleteRows($options = [''table''
    => ''mytable'']) {}


    If this function is called with DeleteRows([''ids'' => [1, 3, 5]); the table name
    is lost and the function will not delete anything. To get around this we can define
    the default values inside the function and merge the options that are passed in
    onto the internal variable. This can be done with the array_merge() function .


    <?php


    // 11_7.php


    $con = mysqli_connect(''host'', ''user'', ''secret'');


    if ($con) {


    mysqli_select_db($con, ''mydb'');


    }


    function DeleteRows($opt = []) {


    global $con;


    $options = array_merge([''table'' => ''mytable''], $opt);


    if ($con) {


    if (is_array($options) && $options[''table'']) {


    $where = "";


    if (is_array($options[''ids'']) && sizeof($options[''ids''])) {


    $strids = implode(", ", $options[''ids'']);


    $where = " where id in ({$strids})";


    }


    mysqli_query($con, "delete from {$options[''table'']}{$where};");


    }


    else {


    echo ''$options must be an array'';


    }


    }


    else {


    echo "No database connection";


    }


    }


    // Call the function


    $params = [


    ''ids'' => [1, 3, 5]


    ];


    DeleteRows($params);


    mysqli_close($con);


    The $opt parameter is not optional and the internal variable $options is defined
    as the merge between a static array defining the table parameter and the values
    from $opt , if any. The array_merge() function will overwrite keys from the first
    array with values from the second array or add keys that are missing in the first
    array and exist in the second array.


    CHAPTER 11 ■ FUNCTIONS


    Calling the DeleteRows() function without any parameters will delete all the rows
    in the mytable table. Adding only a parameter for ids will delete the matching
    rows in mytable. If deletion is required for a different table the caller can
    simply provide an option for table with an optional list of ids.


    Again this function does not provide any checks if the table exists or if the
    user is allowed to delete the data (access control).


    Recipe 11-5\. Type Declarations


    Problem


    In a strict typed language like C the compiler will check that all parameters
    passed to functions are the correct type and the compilation will fail before
    the code can be executed. In a loosely typed language like PHP (see ch[apter 10](http://dx.doi.org/10.1007/978-1-4842-0605-8_10)
    ) it’s possible for variables to accept any type of data and they can change type
    during runtime. Is it possible to enable features that can help the developer
    passing the correct types of data to functions and class methods?


    Solution


    Type Declarations was introduced in PHP version 5.0\. Back then the concept was
    called type hinting. In this version it was only possible to use class/interface
    or self as a type declaration. PHP version 5.1 added support for array, PHP version
    5.4 added support for callable, and PHP 7.0 added support for scalar types (bool,
    int, float, and string).


    Type declaration works by adding a type string in front of the variable. The type
    string can be a name of a class or interface, the word ‘self’ to indicate an object
    of the same class as the method is defined on or one of the keywords array, callable,
    bool, int, float, or string.


    When a type declaration is used the parameter will not accept a null value. A
    null value does not have any type. It is however possible to allow the parameter
    to accept null values by making the parameter optional and defining the default
    value as null.


    How it Works


    In the next example the function definition is changed to have a string and array
    as the parameters.


    <?php


    // 11_8.php


    $con = mysqli_connect(''host'', ''user'', ''secret'');


    if ($con) {


    mysqli_select_db($con, ''mydb'');


    }


    function DeleteRows(string $table, array $ids = []) {


    global $con;


    if ($con) {


    $where = "";


    if (is_array($ids) && sizeof($ids)) {


    $strids = implode(", ", $ids);


    $where = " where id in ({$strids})";


    }


    CHAPTER 11 ■ FUNCTIONS


    mysqli_query($con, "delete from {$table}{$where};");


    }


    else {


    echo "No database connection";


    }


    }


    // Call the function


    DeleteRows("mytable");


    mysqli_close($con);


    If this function is called with other types of parameters than a string and an
    array, PHP will cause a catchable fatal error (PHP 5) or throw an exception of
    TypeError (PHP 7).'
  trans: "\n# 第 11 章：函数\n\n## 技巧 11-4：可选参数\n\n### 问题\n\n在之前的示例中，用于指定要删除的 ID 的参数可能是一个空数组，导致函数删除表中的所有行。在参数以数组形式传递的示例中，可以省略\
    \ `ids` 键，函数仍然可以工作；但在 `table` 和 `ids` 作为两个独立变量传递的示例中，即使 `ids` 是一个空数组，也必须传递它。如果能够只传递在调用函数的上下文中有意义的参数，那将非常方便。\n\
    \n### 解决方案\n\n可选参数是一种告诉函数，在调用者未提供某个参数的值时，使用特定值的方法。可选参数在参数列表中从右向左定义。第一个可定义的可选参数是列表中的最后一个参数，当该参数变为可选的之后，它前面的参数也可以被定义为可选。这个过程可以一直持续，直到所有参数都被定义为可选。\n\
    \n可选参数是通过在参数列表中为变量赋值来定义的。如果 `$ids` 参数应该有一个默认值为空数组，可以写成 `$ids = []`，或者如果你更喜欢传统语法，也可以写成\
    \ `$ids = array()`。\n\n### 实现原理\n\n通过将最后一个参数修改为具有默认值空数组，就可以只使用一个参数来调用 `DeleteRows()`\
    \ 函数。在这种情况下，函数将删除指定表中的所有行。\n\n```php\n<?php\n// 11_6.php\n\n$con = mysqli_connect('host',\
    \ 'user', 'secret');\n\nif ($con) {\n    mysqli_select_db($con, 'mydb');\n}\n\n\
    function DeleteRows($table, $ids = []) {\n    global $con;\n\n    if ($con) {\n\
    \        $where = \"\";\n\n        if (is_array($ids) && sizeof($ids)) {\n   \
    \         $strids = implode(\", \", $ids);\n            $where = \" where id in\
    \ ({$strids})\";\n        }\n\n        mysqli_query($con, \"delete from {$table}{$where};\"\
    );\n    } else {\n        echo \"No database connection\";\n    }\n}\n\n// 调用函数\n\
    DeleteRows(\"mytable\");\n\nmysqli_close($con);\n?>\n```\n\n带有可选值的变量要么在未向该参数传递任何值时被赋予可选值，要么被赋予调用者传递的值。当参数以数组形式传递时，可能会导致意外的覆盖效果。考虑函数声明：`function\
    \ DeleteRows($options = ['table' => 'mytable']) {}`。如果使用 `DeleteRows(['ids' =>\
    \ [1, 3, 5]]);` 调用此函数，表名就会丢失，函数将不会删除任何内容。为了解决这个问题，我们可以在函数内部定义默认值，并将传入的选项合并到内部变量中。这可以通过\
    \ `array_merge()` 函数来实现。\n\n```php\n<?php\n// 11_7.php\n\n$con = mysqli_connect('host',\
    \ 'user', 'secret');\n\nif ($con) {\n    mysqli_select_db($con, 'mydb');\n}\n\n\
    function DeleteRows($opt = []) {\n    global $con;\n\n    $options = array_merge(['table'\
    \ => 'mytable'], $opt);\n\n    if ($con) {\n        if (is_array($options) &&\
    \ $options['table']) {\n            $where = \"\";\n\n            if (is_array($options['ids'])\
    \ && sizeof($options['ids'])) {\n                $strids = implode(\", \", $options['ids']);\n\
    \                $where = \" where id in ({$strids})\";\n            }\n\n   \
    \         mysqli_query($con, \"delete from {$options['table']}{$where};\");\n\
    \        } else {\n            echo '$options must be an array';\n        }\n\
    \    } else {\n        echo \"No database connection\";\n    }\n}\n\n// 调用函数\n\
    $params = [\n    'ids' => [1, 3, 5]\n];\n\nDeleteRows($params);\n\nmysqli_close($con);\n\
    ?>\n```\n\n`$opt` 参数不是可选的，内部变量 `$options` 被定义为一个静态数组（定义了 table 参数）与 `$opt`（如果有值）合并的结果。`array_merge()`\
    \ 函数会用第二个数组中的值覆盖第一个数组中的键，或者添加第一个数组中缺失但存在于第二个数组中的键。\n\n不传递任何参数调用 `DeleteRows()`\
    \ 函数将删除 `mytable` 表中的所有行。仅传递 ids 参数将删除 `mytable` 中匹配的行。如果需要对不同的表进行删除操作，调用者只需为\
    \ table 提供一个选项，并可附带一个可选的 id 列表。\n\n此外，该函数允许用户删除数据库中任何表中的记录。最好验证一下表是否存在以及用户是否有权执行删除操作。\n\
    \n同样的示例也可以通过一个命名参数的数组来实现。\n\n```php\n<?php\n// 11_5.php\n\n$con = mysqli_connect('host',\
    \ 'user', 'secret');\n\nif ($con) {\n    mysqli_select_db($con, 'mydb');\n}\n\n\
    function DeleteRows($options) {\n    global $con;\n\n    if ($con) {\n       \
    \ if (is_array($options) && $options['table']) {\n            $where = \"\";\n\
    \n            if (is_array($options['ids']) && sizeof($options['ids'])) {\n  \
    \              $strids = implode(\", \", $options['ids']);\n                $where\
    \ = \" where id in ({$strids})\";\n            }\n\n            mysqli_query($con,\
    \ \"delete from {$options['table']}{$where};\");\n        } else {\n         \
    \   echo '$options must be an array';\n        }\n    } else {\n        echo \"\
    No database connection\";\n    }\n}\n\n// 调用函数\n$params = [\n    'ids' => [1,\
    \ 3, 5],\n    'table' => 'mytable'\n];\n\nDeleteRows($params);\n\nmysqli_close($con);\n\
    ?>\n```\n\n现在该函数接受一个名为 `$options` 的单一参数。它必须是一个数组，并且必须定义 `'table'` 键，否则函数将输出一条错误消息。参数在数组中创建的顺序无关紧要。\n\
    \n使用数组作为参数，可以在不破坏使用该函数的现有代码的情况下改变函数的工作方式。这仅在添加新参数时成立。重命名或删除参数可能仍需要更改调用该函数的现有代码。\n\
    \n同样，此函数不提供任何检查，以确定表是否存在或用户是否有权删除数据（访问控制）。\n\n## 技巧 11-5：类型声明\n\n### 问题\n\n在像\
    \ C 语言这样的强类型语言中，编译器会检查传递给函数的所有参数类型是否正确，如果类型不匹配，代码在执行之前就会编译失败。在像 PHP（参见第 10 章）这样的弱类型语言中，变量可以接受任何类型的数据，并且可以在运行时更改类型。有没有可能启用一些功能，帮助开发者将正确类型的数据传递给函数和类方法？\n\
    \n### 解决方案\n\n类型声明是在 PHP 5.0 版本中引入的。当时这个概念被称为类型提示。在这个版本中，只能使用类/接口或 `self` 作为类型声明。PHP\
    \ 5.1 版本增加了对数组的支持，PHP 5.4 版本增加了对可调用类型（callable）的支持，PHP 7.0 版本增加了对标量类型（`bool`、`int`、`float`\
    \ 和 `string`）的支持。\n\n类型声明的工作原理是在变量前面添加一个类型字符串。该类型字符串可以是类或接口的名称，或者 `'self'` 关键字（表示与方法定义所在类相同的对象），也可以是\
    \ `array`、`callable`、`bool`、`int`、`float` 或 `string` 等关键字。\n\n当使用类型声明时，参数将不接受空值。空值没有任何类型。但是，可以通过使参数变为可选并将其默认值定义为\
    \ null，来允许参数接受空值。\n\n### 实现原理\n\n在下一个示例中，函数定义被修改为接受字符串类型和数组类型作为参数。\n\n```php\n\
    <?php\n// 11_8.php\n\n$con = mysqli_connect('host', 'user', 'secret');\n\nif ($con)\
    \ {\n    mysqli_select_db($con, 'mydb');\n}\n\nfunction DeleteRows(string $table,\
    \ array $ids = []) {\n    global $con;\n\n    if ($con) {\n        $where = \"\
    \";\n\n        if (is_array($ids) && sizeof($ids)) {\n            $strids = implode(\"\
    , \", $ids);\n            $where = \" where id in ({$strids})\";\n        }\n\n\
    \        mysqli_query($con, \"delete from {$table}{$where};\");\n    } else {\n\
    \        echo \"No database connection\";\n    }\n}\n\n// 调用函数\nDeleteRows(\"\
    mytable\");\n\nmysqli_close($con);\n?>\n```\n\n如果使用除字符串和数组之外的其他类型参数调用此函数，PHP 将导致一个可捕获的致命错误（PHP\
    \ 5）或抛出一个 `TypeError` 异常（PHP 7）。\n"
- fmt: "# 排版后内容\n\n**Catchable fatal error: Argument 1 passed to `DeleteRows()` must\
    \ be an instance of string, integer given**\n\n## Recipe 11-6. Return Values\n\
    \n### Problem\n\nSo far we have looked at calling functions and passing parameters\
    \ but what about getting the result of a database calculation or a database query?\n\
    \n### Solution\n\nThere are two ways of getting values from a function call. The\
    \ first option is to define a return value. This is done with the use of the keyword\
    \ `return`. The `return` keyword can be used alone and will cause the function\
    \ to stop executing at that point, without returning any value.\n\nIf the `return`\
    \ keyword is followed by a value or expression the function will return the value.\
    \ This can be a scalar or a more complex value like an array or object.\n\nThe\
    \ other way to return data from a function is to use parameters passed by reference.\
    \ This is done by adding an `&` in front of the parameter name in the function\
    \ declaration. Older versions of PHP would allow this at call time but this has\
    \ been deprecated. It can only be done at the declaration.\n\nA function can return\
    \ a value with the use of the `return` statement and at the same time return one\
    \ or more values by parameters passed as reference. It is common to use the return\
    \ value as a status code that’s easy to check and then use the returned parameters\
    \ as the actual data returned.\n\n### How it Works\n\nThe `DeleteRows()` function\
    \ used as an example throughout this chapter can be extended to return the number\
    \ of rows actually deleted.\n\n```php\n<?php\n// 11_9.php\n\n$con = mysqli_connect('host',\
    \ 'user', 'secret');\n\nif ($con) {\n    mysqli_select_db($con, 'mydb');\n}\n\n\
    // CHAPTER 11 ■ FUNCTIONS\n\nfunction DeleteRows(string $table, array $ids = [])\
    \ {\n    global $con;\n    if ($con) {\n        $where = \"\";\n        if (is_array($ids)\
    \ && sizeof($ids)) {\n            $strids = implode(\", \", $ids);\n         \
    \   $where = \" where id in ({$strids})\";\n        }\n        mysqli_query($con,\
    \ \"delete from {$table}{$where};\");\n        return mysqli_affected_rows($con);\n\
    \    } else {\n        echo \"No database connection\";\n        return -1;\n\
    \    }\n}\n\n// Call the function\nDeleteRows(\"mytable\");\nmysqli_close($con);\n\
    ```\n\nThe function contains two `return` statements that each will terminate\
    \ execution at that point. The second `return` statement is used in the case of\
    \ an error condition where no connection to the database exists.\n\nThe possible\
    \ return values for a successful deletion are 0 or higher so to indicate an error\
    \ a return value outside of this range is chosen.\n\nIt is good programming practice\
    \ to have as few places a function can return as possible. That makes the code\
    \ easier to understand. In the example above we could assign the number of affected\
    \ rows to a variable and do the same with the `-1` value and simply have a single\
    \ `return` statement at the end of the function.\n\nTo show how a function can\
    \ return data in parameters passed by reference we can create a function that\
    \ selects rows from a table.\n\n```php\n<?php\n// 11_10.php\n\n$con = mysqli_connect('host',\
    \ 'user', 'secret');\n\nif ($con) {\n    mysqli_select_db($con, 'mydb');\n}\n\n\
    function SelectRows(string $table, &$data) {\n    global $con;\n    $data = [];\n\
    \    if ($con) {\n        $where = \"\";\n        $rs = mysqli_query($con, \"\
    select * from {$table};\");\n        if ($rs) {\n            while($row = mysqli_fetch_assoc($rs))\
    \ {\n                $data[] = $row;\n            }\n            mysqli_free_result($rs);\n\
    \        }\n        // CHAPTER 11 ■ FUNCTIONS\n    } else {\n        echo \"No\
    \ database connection\";\n    }\n    return sizeof($data);\n}\n\n// Call the function\n\
    if (SelectRows(\"mytable\", $mytable)) {\n    // Do Something\n}\nmysqli_close($con);\n\
    ```\n\nIn this example the function `SelectRows()` takes two parameters. The first\
    \ is a string that indicates the name of the table to use. The second parameter\
    \ does not have any type declaration, as the function will overwrite any data\
    \ already in it as the return value.\n\nThis function will always return a value\
    \ of 0 or higher, even if there is an error.\n\n## Recipe 11-7. Check if Function\
    \ Exists\n\n### Problem\n\nCalling a function that is undefined will cause a fatal\
    \ error. Most of the time this happens due to spelling errors but there can be\
    \ cases where the programmer wants to check if a function is defined and then\
    \ act accordingly.\n\n### Solution"
