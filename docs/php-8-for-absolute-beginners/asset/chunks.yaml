    ## Summary


    This was a long chapter. We covered a lot. Too much to list here. But some of
    the most important new skills we have gained include one-way encryption for privacy,
    a session for stateful memory, and effectively restricting access to the administration
    module of the blog. I hope you will agree it was very rewarding to implement a
    login system. As mentioned before, the blog is ready for beta testing. Have your
    significant other or a friend test the system out. It is not perfect, but close.
    Whatever potential problems the tester finds, take the time to fix them. Remember,
    PHP programs can do more than manage websites. In the last chapter, we will diverge
    from creating websites to look at creating a data dashboard and the logic for
    a checkers game.


    ## Projects


    1.  Using the design practices from this and previous chapters, update the student
