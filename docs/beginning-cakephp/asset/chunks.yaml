  trans: '

    # Ajax 表单提交


    渲染一个触发 Ajax 表单提交的提交按钮。


    与所有其他助手一样，`Ajax` 助手必须通过在 `var $helpers` 数组中将其作为值包含来在控制器中初始化：


    ```

    var $helpers = array(''Html'',''Form'',''Ajax'');

    ```


    然后，在视图中，通过使用 `$ajax` 对象调用 `Ajax` 助手函数。例如：


    ```

    $ajax->submit();

    ```


    当然，根据所使用的函数，会向该函数传递参数。


    ```

    $ajax->submit(''Submit'',array(''url''=>''/comments/add'',''update''=>''comments_add''));

    ```


    ## 准备 Ajax 助手


    在使用 `Ajax` 助手之前，必须执行对该助手来说独一无二的一两个重要步骤。因为它依赖于 `Prototype`，必须确保在每个页面中包含了 `Prototype`
    JavaScript 文件。还需要使这些脚本对所有可能使用 `Ajax` 助手的视图可访问。


    ### 安装 Prototype


    从 [www.prototypejs.org/download](http://www.prototypejs.org/download) 下载最新版本的
    `Prototype`。你应该会得到一个类似 `prototype-1.x.x.x.js` 的 JavaScript 文件。将此文件放在 `app/webroot/js`
    文件夹中。现在整个应用程序都可以访问它了。要完成 `Prototype` 的安装，需要编辑默认布局。在 `app/views/layouts/default.ctp`
    文件的 `<head>` 标签之间某处，包含以下行：


    ```

    $javascript->link(array(''prototype''));

    ```


    这里，你正在使用 `JavaScript` 助手生成指向该 JavaScript 文件的链接。这些链接在网页中呈现为类似这样的内容以包含该脚本：


    ```

    <script type="text/javascript" src="/js/prototype.js"></script>

    ```


    当然，`JavaScript` 助手会自动生成指向 JavaScript 文件的正确 URL。


    ### 在应用程序控制器文件中包含 JavaScript 助手


    如果你刷新了应用程序，可能会注意到以下错误：`Undefined variable: javascript [APP/views/layouts/default.ctp,
    line 5]`。


    只要助手未正确初始化，就会发生此错误。在这种情况下，你正尝试在布局文件中使用一个助手，并且由于默认布局旨在被所有控制器调用，因此你将需要在所有控制器中初始化
    `JavaScript` 助手。


    有一种方法可以避免逐个进入每个控制器。通过创建你自己的 `App` 控制器文件，你可以将供所有控制器使用的函数放置在其中，从而减少冗余代码。然而，要做到这一点，需要使用一些约定，以便
    Cake 能够识别 `App` 控制器。


    `App` 控制器的位置是 `app/app_controller.php`。像其他控制器一样，该文件必须包含适当的 PHP 代码来创建一个新的 `App`
    控制器对象实例：


    ```

    <?

    class AppController extends Controller {


    }

    ?>

    ```


    ### 使助手对整个应用程序可用


    在 `App` 控制器中，你也可以包含任何可能在任何或所有控制器中使用的助手。这就像在单个控制器中一样，通过在 `var $helpers` 属性数组中分配一个助手列表来完成。


    为了你的博客应用，让我们继续包含你将需要使用到的所有助手。将以下行插入到新的 `App` 控制器的第 3 行：`var $helpers = array(''Html'',''Form'',''Ajax'',''Javascript'');`。


    默认布局文件中的 `$javascript->link()` 函数现在应该可以正常工作了。


    通常，当在布局中使用助手时，你应该使用 `App` 控制器来包含这些助手；这将使你不必在每个控制器中都进行助手的包含操作。


    ## 向博客添加评论


    在你能够使用 `Ajax` 助手处理用户评论之前，你需要创建数据库表来存储评论。在数据库中创建一个名为 `comments` 的新表，并创建如清单 8-1
    所示的字段。


    **清单 8-1.** *用于创建* `comments` *表的 SQL*


    ```

    CREATE TABLE `comments` (

    `id` int(11) unsigned NOT NULL auto_increment,

    `name` varchar(255) default NULL,

    `content` text,

    `post_id` int(11) unsigned,

    PRIMARY KEY (`id`)

    );

    ```


    接下来，使用清单 8-2 中的代码创建 `Comment` 模型。


    **清单 8-2.** *`Comment` 模型*


    ```

    <?

    class Comment extends AppModel {

    var $name = ''Comment'';

    var $belongsTo = array(''Post'');

    }

    ?>

    ```


    注意，此模型具有与 `Post` 模型的 `belongsTo` 关联。要绑定此关联，你将需要编辑 `Post` 模型以包含“has many”关系。打开
    `Post` 模型，并插入以下行以完成关联：`var $hasMany = array(''Comment'');`。


    为了稳妥起见，在 `app/controllers/comments_controller.php` 中创建 `Comments` 控制器，并粘贴清单 8-3
    中的代码。


    **清单 8-3.** *Comments 控制器*


    ```

    <?

    class CommentsController extends AppController {

    var $name = ''Comments'';

    }

    ?>

    ```


    现在 `Comments` 控制器以及匹配的表和模型已准备好，可以在应用程序中使用了。现在，你可以通过在 `Posts` 视图和控制器中插入一些 `Ajax`
    助手代码，将评论功能整合到博客中。


    ## 在视图中集成 Ajax


    使用 `Ajax` 助手要求 `Prototype` 框架被包含在网页中。你已经通过将 `Prototype` 脚本安装在 `app/webroot/js`
    文件夹中，并提供在 `app/views/layouts/default.ctp` 文件中指向该文件的链接完成了此操作。你还已在 `App` 控制器中使该助手可用。现在，将
    Ajax 集成到将要使用该助手的单个视图中就变得容易了。


    ### 显示评论


    请记住，Ajax 输出将被插入到你选择的 HTML 元素中。你在视图中用于处理此输出的任何元素都是所有操作发生的地方。`<div>` 和 `<span>`
    元素分别适用于任何通用的块级或内联内容。让我们创建一个 `<div>` 来处理 `Posts` 视图中所有评论的 Ajax 输出。


    打开 `app/views/posts/view.ctp`，在文件底部创建 `<div>` 作为 Ajax 处理的目标。


    在清单 8-4 中，我在第 9 行为评论的迭代以及用于提交新评论的 Ajax 表单预留了空间。为了拉取相关联的评论并使其在此处可用，你将需要编辑 `Posts`
    控制器中的 `View` 操作。


    **清单 8-4.** *向 Posts 视图添加评论部分*

    ```

    6

    <hr/>

    <h2>评论</h2>

    <div id="comments">

    </div>

    ```


    清单 8-5 几乎与之前相同，只是我调整了第 6 行之后的几行。第 7 行获取请求的文章记录，第 8 行获取与当前文章相关联的评论。第 9 行使用 `set()`
    函数将这些变量传递给视图。


    **清单 8-5.** *调整后的 View 操作，为视图提供相关联的评论*

    ```

    1

    function view($id = null) {

    if (!$id) {

    $this->Session->setFlash(''不合法的文章'');

    $this->redirect(array(''action''=>''index''));

    }

    $post = $this->Post->read(null,$id);

    $comments = $this->Post->Comment->find(''all'',array(''conditions''=>array(

    ''Post.id''=>$id)));

    $this->set(compact(''post'',''comments''));

    10 }

    ```


    回到清单 8-4 的第 9 行，你现在可以插入一个循环来显示 `$comments` 数组的内容（参见清单 8-6）。


    **清单 8-6.** *Posts 视图中的评论循环*

    ```

    <? foreach($comments as $comment): ?>

    10 <div class="comment">

    <p><b><?=$comment[''Comment''][''name''];?></b></p>

    12 <p><?=$comment[''Comment''][''content''];?></p>

    13

    </div>

    <? endforeach;?>

    ```


    该循环遵循清单 8-5 第 8 行中 `find()` 结果的传统结构。

