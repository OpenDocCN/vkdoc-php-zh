    C H A P T E R 6


    Receiving Payments Using


    PayPal


    **L**et’s makesome money! Your e-commerce web site needs a way to receive payments
    from customers. The preferred solution for established companies is to open a
    merchant account, but many small businesses choose to start with a solution that’s
    simpler to implement, where they don’t have to process credit card or payment
    information themselves.


    A number of companies and web sites can help individuals or small businesses that
    don’t have the resources to process credit cards and wire transactions. These
    companies can be used to intermediate the payment between online businesses and
    their customers. Many of these payment-processing companies are relatively new,
    and the handling of any individual’s financial details is very sensitive. Additionally,
    a quick search on the Internet will produce reports from both satisfied and unsatisfied
    customers for almost all of these companies. For these reasons, we are not recommending
    any specific third-party company.


    Instead, this chapter lists some of the companies currently providing these services,
    and then demonstrates some of the functionality they provide with PayPal. You’ll
    learn how to integrate PayPal with HatShop in the first two stages of development.
    In this chapter, you will


    • Learn how to create a new PayPal Website Payments Standard account.


    • Learn how to integrate PayPal in stage 1 of development, where you’ll need a
    shopping cart and custom checkout mechanism.


    • Learn how to integrate PayPal in stage 2 of development, where you’ll have your
    own shopping cart, so you’ll need to guide the visitor directly to a payment page.'
