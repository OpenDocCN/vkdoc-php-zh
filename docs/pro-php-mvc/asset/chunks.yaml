    Consider, again, the database methods we created for inserting/updating rows.
    If a WHERE clause is provided, the database will attempt to update a row. If no
    WHERE conditions are present, a row will be inserted. A call to the delete() method
    will remove rows matching the WHERE conditions, or all rows if there are no conditions.


    Model


    Because we have chosen to create an ORM, and to store it within the Model class,
    most of the model tests involve the ORM methods. The Model class is not a factory,
    so we don’t need those tests, leaving a simple set of model tests to create.


    We need to test that the model structure syncs correctly to the database. We need
    to test whether rows can be inserted, updated, and deleted from the database.
    We also test whether rows can be returned form the database, matching WHERE conditions.


    Coverage


    We should create tests that cover the following requirements:


    • The Model class syncs with the database.


    • The Model class can insert rows.


    • The Model class can fetch the number of rows.


    • The Model class can save a row multiple times.


    • The Model class can update rows.


    • The Model class can delete rows.


