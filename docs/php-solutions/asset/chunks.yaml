    }\n?>\n<form action=\"\" method=\"post\" enctype=\"multipart/form-data\" id=\"\
    uploadImage\">\n```\n\n这是一个简单的 `foreach` 循环，它以无序列表的形式显示 `$result` 的内容。当页面首次加载时，`$result`\
    \ 尚未设置，因此这段代码仅在表单提交后运行。\n\n保存 `file_upload.php` 并在浏览器中测试。只要你选择一张小于 50 KB 的图片，就应该看到文件上传成功的确认信息，如图\
    \ 6-4 所示。\n\n你可以将你的代码与 `ch06` 文件夹中的 `file_upload_05.php` 和 `PhpSolutions/File/Upload_01.php`\
    \ 进行比较。\n\n![A978-1-4842-0635-5_6_Fig4_HTML.jpg](img/A978-1-4842-0635-5_6_Fig4_HTML.jpg)\n\
    \n图 6-4. `Upload` 类报告上传成功\n\n该类的功能与 PHP 解决方案 6-1 完全相同：上传文件，但为此需要更多的代码。不过，你已经为将来对上传文件执行一系列安全检查的类奠定了基础。这段代码你只需编写一次。当你使用该类时，无需再次编写此代码。\n\
    \n如果你之前没有接触过对象和类，某些概念可能显得陌生。可以将 `$loader` 对象简单视为访问你在 `Upload` 类中定义的函数（方法）的一种方式。你经常创建独立的对象来存储不同的值，例如处理\
    \ `DateTime` 对象时。在此场景下，单个对象足以处理文件上传。\n\n## 检查上传错误\n\n目前，`Upload` 类会不加区分地上传任何类型的文件。甚至\
    \ 50 KB 的限制也可以被绕过，因为唯一检查是在浏览器中进行的。在将文件移交给 `moveFile()` 方法之前，`checkFile()` 方法需要运行一系列测试。其中最重要的测试之一是检查\
    \ `$_FILES` 数组报告的错误级别。\n\n错误级别 8 最无帮助，因为 PHP 无法检测是哪个 PHP 扩展导致上传停止。幸运的是，这种情况很少遇到。\n\
    \n表 6-2 显示了错误级别的完整列表。\n\n**表 6-2.** `$_FILES` 数组中不同错误级别的含义\n\n| 错误级别 | 含义 |\n\
    | --- | --- |\n| 0 | 上传成功 |\n| 1 | 文件超过 `php.ini` 中指定的最大上传大小（默认 2 MB） |\n| 2 |\
    \ 文件超过 `MAX_FILE_SIZE` 指定的大小（参见 PHP 解决方案 6-1） |\n| 3 | 文件仅部分上传 |\n| 4 | 表单提交时未指定文件\
    \ |\n| 6 | 没有临时文件夹 |\n| 7 | 无法将文件写入磁盘 |\n| 8 | 上传被未指定的 PHP 扩展停止 |\n\n错误级别 5 当前未定义。\n"
- fmt: "# PHP Solution 6-3: Testing the error level, file size, and MIME type\n\n\
    This PHP solution updates the `checkFile()` method to call a series of internal\
    \ (protected) methods to verify that the file is okay to accept. If a file fails\
    \ for any reason, an error message reports the reason to the user.\n\nContinue\
    \ working with `Upload.php`. Alternatively, use `Upload_01.php` in the `ch06/PhpSolutions/File`\
    \ folder, move it to `PhpSolutions/File` at the top level of the `phpsols` site,\
    \ and rename it `Upload.php`. (Always remove the underscore and number from partially\
    \ completed files.)\n\nThe `checkFile()` method needs to run three tests: on the\
    \ error level, the size of the file, and the file’s MIME type. Update the method\
    \ definition like this:\n\n```\nprotected function checkFile($file) {\n    $accept\
    \ = true;\n    if ($file['error'] != 0) {\n        $this->getErrorMessage($file);\n\
    \        // stop checking if no file submitted\n        if ($file['error'] ==\
    \ 4) {\n            return false;\n        } else {\n            $accept = false;\n\
    \        }\n    }\n    if (!$this->checkSize($file)) {\n        $accept = false;\n\
    \    }\n    if (!$this->checkType($file)) {\n        $accept = false;\n    }\n\
    \    return $accept;\n}\n```\n\nOriginally, `checkFile()` simply returned `true`.\
    \ Now, a variable called `$accept` is used as the method’s return value, and is\
    \ initialized to `true`. Three conditional statements conduct a series of tests,\
    \ which are carried out by protected methods that will be defined shortly. If\
    \ the file fails any of the tests, `$accept` is set to `false`. The method returns\
    \ `true` only if all three tests are passed.\n\nUsing `$accept` as the return\
    \ value makes it possible to generate error messages detailing all problems with\
    \ a file. This avoids the annoying situation in which an upload is rejected for\
    \ one reason only for it to be rejected for a different reason once the first\
    \ problem is resolved.\n\nThe argument passed to the `checkFile()` method is the\
    \ top-level element in the `$_FILES` array. The upload field in the form we’re\
    \ using is called `image`, so `$file` is the equivalent of `$_FILES['image']`.\
    \ That means you can access `$_FILES['image']['error']` as `$file['error']`.\n\
    \n> **Note:** As explained in PHP Solution 6-2, the name of the upload field is\
    \ unimportant, because the `upload()` method automatically gets the current element\
    \ from the `$_FILES` array.\n\nThe first conditional statement checks the error\
    \ level. If it’s not zero, there’s a problem with the upload; `$file` is passed\
    \ as an argument to the `getErrorMessage()` method, which you’ll define next.\n\
    \nIf the error level is 4, no file was selected. There’s no point in checking\
    \ any further, so the method immediately returns `false`. Otherwise, `$accept`\
    \ is set to `false`, and the next two conditional statements carry out checks\
    \ on the file’s size and MIME type.\n\nThe `getErrorMessage()` method is a `switch`\
    \ statement (see “Using the switch statement for decision chains” in [Chapter\
    \ 3](#A978-1-4842-0635-5_3_Chapter.html)) that uses the error levels listed in\
    \ Table 6-2 to add a suitable message to the `$messages` array. The code looks\
    \ like this:\n\n```\nprotected function getErrorMessage($file) {\n    switch($file['error'])\
    \ {\n        case 1:\n        case 2:\n            $this->messages[] = $file['name']\
    \ . ' is too big: (max: ' .\n                $this->getMaxSize() . ').';\n   \
    \         break;\n        case 3:\n            $this->messages[] = $file['name']\
    \ . ' was only partially uploaded.';\n            break;\n        case 4:\n  \
    \          $this->messages[] = 'No file submitted.';\n            break;\n   \
    \     default:\n            $this->messages[] = 'Sorry, there was a problem uploading\
    \ ' .\n                $file['name'];\n            break;\n    }\n}\n```\n\nPart\
    \ of the message for error levels 1 and 2 is created by a method called `getMaxSize()`,\
    \ which converts the value of `$max` from bytes to kilobytes. You’ll define `getMaxSize()`\
    \ shortly.\n\nOnly the first four error levels have descriptive messages. The\
    \ `default` keyword catches other error levels, including any that might be added\
    \ in future, and adds a generic reason.\n\nBefore defining `getMaxSize()`, let’s\
    \ deal with the other tests. The `checkSize()` method looks like this:\n\n```\n\
    protected function checkSize($file) {\n    if ($file['error'] == 1 || $file['error']\
    \ == 2 ) {\n        return false;\n    } elseif ($file['size'] == 0) {\n     \
    \   $this->messages[] = $file['name'] . ' is an empty file.';\n        return\
    \ false;\n    } elseif ($file['size'] > $this->max) {\n        $this->messages[]\
    \ = $file['name'] . ' exceeds the maximum size\n            for a file (' . $this->getMaxSize()\
    \ . ').';\n        return false;\n    } else {\n        return true;\n    }\n\
    }\n```\n\nThe conditional statement starts by checking the error level. If it’s\
    \ 1 or 2, the file is too big, so the method simply returns `false`. The appropriate\
    \ error message has already been set by the `getErrorMessage()` method.\n\nThe\
    \ next condition checks if the reported size is zero. Although this happens if\
    \ the file is too big or no file was selected, those scenarios have already been\
    \ covered by the `getErrorMessage()` method. So, the assumption is that the file\
    \ is empty.\n\nNext, the reported size is compared with the value stored in the\
    \ `$max` property. Although files that are too big should trigger error level\
    \ 2, you still need to make this comparison in case the user has managed to sidestep\
    \ `MAX_FILE_SIZE`. The error message also uses `getMaxSize()` to display the maximum\
    \ size.\n\nIf the size is okay, the method returns `true`.\n\nThe third test checks\
    \ the MIME type. Add the following code to the class definition:\n\n```\nprotected\
    \ function checkType($file) {\n    if (in_array($file['type'], $this->permitted))\
    \ {\n        return true;\n    } else {\n        $this->messages[] = $file['name']\
    \ . ' is not permitted type of file.';\n        return false;\n    }\n}\n```\n\
    \nThe conditional statement checks the type reported by the `$_FILES` array against\
    \ the array stored in the `$permitted` property. If it’s in the array, the method\
    \ returns `true`. Otherwise, the reason for rejection is added to the `$messages`\
    \ array, and the method returns `false`.\n\nThe `getMaxSize()` method used by\
    \ `getErrorMessages()` and `checkSize()` converts the raw number of bytes stored\
    \ in `$max` into a friendlier format. Add the following definition to the class\
    \ file:\n\n```\npublic function getMaxSize() {\n    return number_format($this->max/1024,\
    \ 1) . ' KB';\n}\n```\n\nThis uses the `number_format()` function, which normally\
    \ takes two arguments: the value you want to format and the number of decimal\
    \ places you want the number to have. The first argument is `$this->max/1024`,\
    \ which divides `$max` by 1024 (the number of bytes in a kilobyte). The second\
    \ argument is 1, so the number is formatted to one decimal place. The `'. ' KB'`\
    \ at the end concatenates KB to the formatted number.\n\nThe `getMaxSize()` method\
    \ has been declared public in case you want to display the value in another part\
    \ of a script that uses the `Upload` class.\n\nSave `Upload.php` and test it again\
    \ with `file_upload.php`. With images smaller than 50 KB, it works the same as\
    \ before. But if you try uploading a file that’s too big and of the wrong MIME\
    \ type, you get a result similar to Figure [6-5](#A978-1-4842-0635-5_6_Chapter.html#Fig5).\n\
    \nYou can check your code against `Upload_02.php` in the `ch06/PhpSolutions/File`\
    \ folder.\n\n![A978-1-4842-0635-5_6_Fig5_HTML.jpg](A978-1-4842-0635-5_6_Fig5_HTML.jpg)\n\
    \n**Figure 6-5.** The class now reports errors with invalid size and MIME types"
  raw: '#### PHP Solution 6-3: Testing the error level, file size, and MIME type


    This PHP solution updates the `checkFile()` method to call a series of internal
    (protected) methods to verify that the file is okay to accept. If a file fails
    for any reason, an error message reports the reason to the user.


    Continue working with `Upload.php`. Alternatively, use `Upload_01.php` in the
    `ch06/PhpSolutions/File` folder, move it to `PhpSolutions/File` at the top level
    of the `phpsols` site, and rename it `Upload.php`. (Always remove the underscore
    and number from partially completed files.)


    The `checkFile()` method needs to run three tests: on the error level, the size
