    a Router\Route subclass for every route we will define. The second thing you should
    notice is that we refer to the Router\Route subclasses by their class name. We
    could create a Router\Route subclass factory, but that’s a little overkill at
    this point, considering our applications will be constituted mostly of inferred
    routes.


    The next example, shown in Listing 7-13, showcases the use of metadata to facilitate
    the use of hooks within our Controller subclasses. The init(), authenticate(),
    and notify() methods have @protected flags, so they will not be routed to, from
    our Router class. The home() method indicates that the methods init(), 80


