    Upon clicking the Login link, the `signin.php` script is executed and it prompts
    the user to enter an e-mail address and password. If the user enters a valid e-mail
    address and password, a welcome message will be displayed in the header of the
    site as well as in the body of the page, as shown in Figure [4-8](#A978-1-4842-1672-9_4_Chapter.html#Fig8).


