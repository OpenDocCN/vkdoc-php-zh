  \n#### 面包屑导航\n\n导航路径，或更亲切地称之为*面包屑导航*，在 Web 应用程序中经常被实现，因为它为用户提供了一种直观可见且易于理解的导航辅助工具。将用户当前的位置分解为一系列超链接路径，这些路径提供了当前文档相对于整个网站位置的概要视图，这不仅为用户提供了比浏览器更实用、更高效的导航工具，还有助于补充甚至替代典型网站的本地菜单系统。\n\
  \n图 13-4 展示了面包屑导航的实际效果。\n\n**图 13-4.** *典型的导航路径*\n\n本节将演示两种不同的面包屑导航实现方式。第一种方法使用数组，将复杂的\
  \ URL 树转换为更友好的命名规则。这种实现方式特别适用于为大多数静态页面创建导航树。第二种方法扩展了第一种方法，这次使用 PostgreSQL 数据库来为数据库驱动的网站创建用户友好的导航映射。虽然两种方法遵循不同的思路，但都达到了相同的目的。实际上，实现一种混合映射策略通常很有用：即一种能够同时处理静态页面和数据库驱动页面的策略。\n\
  \n##### 从静态数据创建面包屑导航\n\n使用 PHP 实现面包屑导航的一种简单方法是创建一个关联数组，将整个目录结构映射到对应的用户友好标题。当每个页面加载时，解析\
  \ URL 并将其转换为数组中指定的、由这些用户友好标题组成的链接列表。实现此功能的通用过程如下：\n\n\n\n**1.** 在纸上或文本文件中勾勒出 Web\
  \ 目录结构，为每个目录和页面分配一个用户友好的名称。\n\n**2.** 创建一个关联数组，用于为面包屑导航提供用户友好的名称。该数组通常存储在全局站点头文件中。\n\
  \n**3.** 创建 URL 解析与映射函数 `create_crumbs()`。将其存储在全局站点头文件中。\n\n**4.** 在需要显示面包屑路径的每个页面中，在适当位置执行\
  \ `create_crumbs()` 函数。\n\n`代码清单 13-2` 展示了 `create_crumbs()` 函数。\n\n**代码清单 13-2.**\
  \ *`create_crumbs()` 函数*\n\n```php\nfunction create_crumbs($crumb_site, $home_label,\
  \ $crumb_labels) {\n    // 启动面包屑路径\n    $crumb_trail = \"<a href=\\\"$crumb_site\\\
  \">$home_label</a>\";\n    // 解析请求的 URL 路径\n    $crumb_tree = explode('/', $_SERVER['PHP_SELF']);\n\
  \    // 启动路径中使用的 URL 路径\n    $crumb_path = $crumb_site.'/';\n    // 组装面包屑路径\n  \
  \  for ($x = 1; $x < count($crumb_tree) - 2; $x++) {\n        $crumb_path .= $crumb_tree[$x].'/';\n\
  \        $crumb_trail .= ' &gt; <a href=\"'.$crumb_path.'\">'.\n        $crumb_labels[$crumb_tree[$x]].'</a>';\n\
