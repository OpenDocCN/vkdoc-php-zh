- fmt: "## Using Prepared Statements for User Input\n\nBoth `MySQLi` and `PDO` support\
    \ prepared statements, which offer important security features. A prepared statement\
    \ is a template for an SQL query that contains a placeholder for each value that\
    \ is changeable. This not only makes it easier to embed variables in your PHP\
    \ code, but also prevents SQL injection attacks as quotes and other characters\
    \ are automatically escaped before the query is executed.\n\nOther advantages\
    \ of using prepared statements are that they’re more efficient when the same query\
    \ is used more than once. Also, you can bind the results from each column of a\
    \ `SELECT` query to named variables, making it easier to display the output.\n\
    \nBoth `MySQLi` and `PDO` use question marks as anonymous placeholders, like this:\n\
    \n`$sql = 'SELECT image_id, filename, caption FROM images WHERE caption LIKE ?';`\n\
    \n`PDO` also supports the use of named placeholders. A named placeholder begins\
    \ with a colon followed by an identifier, like this:\n\n`$sql = 'SELECT image_id,\
    \ filename, caption FROM images WHERE caption LIKE :search';`\n\n**Note**: Placeholders\
    \ are not wrapped in quotes, even when the value they represent is a string. This\
    \ makes it a lot easier to build an SQL query because there’s no need to worry\
    \ about getting the correct combination of single and double quotes.\n\nPlaceholders\
    \ can be used only for column values. They can’t be used for other parts of an\
    \ SQL query, such as column names or operators. This is because values that contain\
    \ non-numeric characters are automatically escaped and wrapped in quotes when\
    \ the SQL is executed. Column names and operators cannot be in quotes.\n\nPrepared\
    \ statements involve slightly more code than just submitting the query directly,\
    \ but placeholders make the SQL easier to read and write, and the process is more\
    \ secure.\n\nThe syntax for `MySQLi` and `PDO` is different, so the following\
    \ sections deal with them separately.\n\n### Embedding Variables in MySQLi Prepared\
    \ Statements\n\nUsing a `MySQLi` prepared statement involves several stages.\n\
    \n#### Initialize the Statement\n\nTo initialize the prepared statement, call\
    \ the `stmt_init()` method on the database connection and store it in a variable,\
    \ as follows:\n\n`$stmt = $conn->stmt_init();`\n\n#### Prepare the Statement\n\
    \nYou then pass the SQL query to the statement’s `prepare()` method. This checks\
    \ that you haven’t used question mark placeholders in the wrong place, and that\
    \ when everything is put together, the query is valid SQL.\n\nIf there are any\
    \ mistakes, the `prepare()` method returns `false`, so it’s common to enclose\
    \ the next steps in a conditional statement to ensure they run only if everything\
    \ is still okay.\n\nError messages can be accessed through the statement’s `error`\
    \ property.\n\n#### Bind Values to the Placeholders\n\nReplacing the question\
    \ marks with the actual values held in the variables is technically known as binding\
    \ the parameters. It’s this step that protects your database from SQL injection.\n\
    \nPass the variables to the statement’s `bind_param()` method in the same order\
    \ as you want them inserted into the SQL query, together with a first argument\
    \ specifying the data type of each variable, again in the same order as the variables.\
    \ The data type must be specified by one of the following four characters:\n\n\
    - `b`: Binary (such as an image, Word document, or PDF file)\n- `d`: Double (floating\
    \ point number)\n- `i`: Integer (whole number)\n- `s`: String (text)\n\nThe number\
    \ of variables passed to `bind_param()` must be exactly the same as the number\
    \ of question mark placeholders. For example, to pass a single value as a string,\
    \ use this:\n\n`$stmt->bind_param('s', $_GET['words']);`\n\nTo pass two values,\
    \ the `SELECT` query needs two question marks as placeholders, and both variables\
    \ need to be bound with `bind_param()`, like this:\n\n```\n$sql = 'SELECT * FROM\
    \ products WHERE price < ? AND type = ?';\n$stmt = $conn->stmt_init();\n$stmt->prepare($sql);\n\
    $stmt->bind_param('ds', $_GET['price'], $_GET['type']);\n```\n\nThe first argument\
    \ to `bind_param()`, `'ds'`, specifies `$_GET['price']` as a floating point number\
    \ and `$_GET['type']` as a string.\n\n#### Execute the Statement\n\nOnce the statement\
    \ has been prepared and the values have been bound to the placeholders, call the\
    \ statement’s `execute()` method. The result of a `SELECT` query can then be fetched\
    \ from the statement object. With other types of queries, this is the end of the\
    \ process.\n\n#### Binding the Results (Optional)\n\nOptionally, you can bind\
    \ the results of a `SELECT` query to variables with the `bind_result()` method.\
    \ This avoids the need to extract each row and then access the results as `$row['column_name']`.\n\
    \nTo bind the results, you must name each column specifically in the `SELECT`\
    \ query. List the variables you want to use in the same order and pass them as\
    \ arguments to `bind_result()`. For example, let’s say your SQL looks like this:\n\
    \n`$sql = 'SELECT image_id, filename, caption FROM images WHERE caption LIKE ?';`\n\
    \nTo bind the results of the query, use this code:\n\n`$stmt->bind_result($image_id,\
    \ $filename, $caption);`\n\nThis allows you to access the results directly as\
    \ `$image_id`, `$filename`, and `$caption`.\n\n#### Store the Result (Optional)\n\
    \nWhen you use a prepared statement for a `SELECT` query, the results are unbuffered.\
    \ This means that they remain on the database server until you fetch them. This\
    \ has the advantage of requiring less memory, particularly if the result set contains\
    \ a large number of rows. However, unbuffered results impose the following restrictions:\n\
    \n- Once the results are fetched, they’re no longer stored in memory. Consequently,\
    \ you can’t use the same result set more than once.\n- You can’t run another query\
    \ on the same database connection until all of the results have been fetched or\
    \ cleared.\n- You can’t use the `num_rows` property to find out how many rows\
    \ are in the result set.\n- You can’t use `data_seek()` to move to a specific\
    \ row in the result set.\n\nTo avoid these restrictions, you can optionally store\
    \ the result set using the statement’s `store_result()` method. However, if you\
    \ simply want to display the result immediately without reusing later, there’s\
    \ no need to store it first.\n\n**Note**: To clear an unbuffered result, call\
    \ the statement’s `free_result()` method.\n\n#### Fetch the Result\n\nTo loop\
    \ through the results of a `SELECT` query that has been executed with a prepared\
    \ statement, use the `fetch()` method. If you have bound the results to variables,\
    \ do it like this:\n\n```\nwhile ($stmt->fetch()) {\n    // display the bound\
    \ variables for each row\n}\n```\n\nIf you haven’t bound the results to variables,\
    \ use `$row = $stmt->fetch()` and access each variable as `$row['column_name']`.\n\
    \n#### Close the Statement\n\nWhen you have finished with a prepared statement,\
    \ the `close()` method frees the memory used."
