- fmt: "# PHP 请求与响应\n\nPHP 曾经用于向浏览器发送完整的 HTML 文档。浏览器随后会渲染该文档，并从同一服务器或其他服务器获取其他资源（如图片和\
    \ JavaScript）。为了最小化数据量并创建更具动态性的网站，向服务器发送请求以仅获取最新信息、获取状态更新或获取页面上某些内容的详细信息变得非常有用。\n\
    \n## 解决方案\n\n从 PHP 的角度来看，完整 HTML 文档的请求、图片的请求或部分 HTML/JSON 文档的请求之间没有真正的区别。它们都遵循标准的\
    \ HTTP 协议，我们已经了解了如何创建对这些请求的响应的所有构建模块。\n\n在客户端方面，我们讨论了在地址栏中输入或用户点击链接时生成的 `GET`\
    \ 请求，并且我们看到了如何使用 HTML 表单生成 `POST` 请求。在本节中，我们将使用 JavaScript 生成 `GET` 或 `POST` 请求。可以使用纯\
    \ JavaScript 创建这些请求，或者您可以选择像 jQuery 这样的库，它将某些功能封装到简单易用的函数中。\n\n## 工作原理\n\n该功能的基础始于创建通信对象。在所有浏览器中，创建方式并不完全相同，但当对象创建后，它提供了相同的功能。\n\
    \n```\nif (window.XMLHttpRequest) { // code for Mozilla, etc.\n    var xmlhttp\
    \ = new XMLHttpRequest()\n}\nelse if (window.ActiveXObject) { // code for IE\n\
    \    var xmlhttp = new ActiveXObject(\"Microsoft.XMLHTTP\")\n}\n```\n\n在这个小例子中，我们测试了\
    \ `XMLHttpRequest` 对象是否在 `window` 上定义，或者 IE 浏览器是否支持 `ActiveXObject`。\n\n`XMLHttpResponse`\
    \ 的异步特性要求定义一个函数来处理传入的响应。可以像这样定义一个函数：`ProcessStatus = function()` {\n\n```\nswitch\
    \ (xmlhttp.readyState) {\n    case 4 :\n        switch (xmlhttp.status) {\n  \
    \          case 0 : // Aborted\n                break;\n            case 200 :\
    \ // if Ok\n            case 304 : // if not modified\n                resp =\
    \ xmlhttp.responseText;\n                break;\n        }\n}\n```\n\n而启动请求的代码如下所示：\n\
    \n```\nxmlhttp.onreadystatechange = ProcessStatus;\ntry {\n    xmlhttp.open(\"\
    GET\", 'http://mydomain.com/12_12.php', true);\n}\ncatch (e) {\n    alert('Error');\n\
    }\n```\n\n在 PHP 端，响应的格式应符合 JavaScript 代码期望的格式。这可以是一个字符串或 JSON 编码的字符串。\n\n```\n\
    <?php\n// 12_13.php\n$resp = [\n    'a' => 1,\n    'b' => 2\n];\nheader('Content-Type:\
    \ application/json');\necho json_encode($resp);\n```\n\n输出将是响应变量的 JSON 编码字符串：`{\"\
    a\":1,\"b\":2}`。\n\n# Recipe 12-11. Web Sockets\n\n## 问题\n\n到目前为止，我们处理的问题都是由客户端向服务器发送请求并接收响应开始的。除非有客户端发送请求，否则服务器上不会发生任何事情。是否可以在浏览器停留在页面的整个期间保持通信线路开放？\n\
    \n## 解决方案\n\nWeb Sockets 是一种双向（全双工）通信管道，允许浏览器连接到专用的 PHP 脚本。Web Sockets 协议不使用 HTTP\
    \ 或 HTTPS 作为通信基础，而是使用 `ws` 或 `wss` 进行 SSL 加密连接。\n\n## 工作原理\n\n开始使用 Web Sockets\
    \ 的简单方法是下载并扩展现有的套接字服务器。这可以是 [https://github.com/ghedipunk/PHP-WebSockets](https://github.com/ghedipunk/PHP-WebSockets)。这是一个独立脚本，从命令行执行。这些脚本不应放置在\
    \ Web 根目录中，并且甚至可以在没有常规 Web 服务器的服务器上使用。\n\n一个简单的服务器，接收消息并返回字符反转顺序的字符串，如下所示：\n\n\
    ```\n#!/usr/bin/env php\n<?php\n// 12_14.php\nrequire('./websockets.php');\n\n\
    class echoServer extends WebSocketServer {\n    protected function process ($user,\
    \ $message) {\n        $this->send($user, str_reverse($message));\n    }\n   \
    \ protected function connected ($user) {\n    }\n    protected function closed\
    \ ($user) {\n    }\n}\n\n$echo = new echoServer(\"0.0.0.0\",\"9000\");\ntry {\n\
    \    $echo->run();\n}\ncatch (Exception $e) {\n    $echo->stdout($e->getMessage());\n\
    }\n```\n\n`WebSocketsServer` 类使用了一些必须在该类中定义的抽象方法，即使它们在此示例中不执行任何操作。这些函数可用于在客户端连接和断开连接时配置数据和进行清理。\n\
    \n一个可以发送和接收来自服务器消息的 HTML 文档如下所示：\n\n```\n<!DOCTYPE html>\n<!- 12_14.html ->\n\
    <html>\n<head>\n<script>\nvar socket;\nfunction init() {\n    var host = \"ws://127.0.0.1:9000/echobot\"\
    ;\n    try {\n        socket = new WebSocket(host);\n        socket.onmessage\
    \ = function(msg) {\n            var div = document.createElement(\"div\");\n\
    \            div.innerHTML = msg.data;\n            document.getElementsByTagName('body')[0].appendChild(div);\n\
    \        };\n    }\n    catch (e) {\n        alert(e);\n    }\n}\nfunction send(msg)\
    \ {\n    try {\n        socket.send(msg);\n    }\n    catch (e) {\n        alert(e);\n\
    \    }\n}\n</script>\n</head>\n<body onload=\"init();\">\n<button onclick=\"send('This\
    \ is a test');\">Send</button>\n</body>\n</html>\n```\n\n# 第十三章 创建和使用表单\n\nHTML\
    \ 表单有许多用途，从简单的联系表单到在基于 Web 的应用程序中收集和编辑数据。表单可以创建为 HTML 的静态部分，也可以基于来自数据库或其他来源的数据集使用\
    \ PHP 动态生成。无论表单如何生成，在提交表单之前验证输入都是良好的实践。这将有助于防止数据错误，并且用户可以在不将数据发送到服务器进行验证的情况下纠正错误。在将数据插入数据库或在服务器上以其他方式使用之前，还需要验证\
    \ `POST` 请求的内容。\n\n## Recipe 13-1. 表单元素\n\n### 问题\n\nHTML 表单中可以使用多种不同类型的输入。这些输入如何映射到原生\
    \ PHP 数据类型，甚至数据库中的列类型？\n\n### 解决方案\n\n通常，来自 HTML 表单的所有输入在 PHP 中都被视为字符串值。这是因为类型不会从客户端传递到服务器。`POST`\
    \ 请求包含键/值对，没有其他信息。接收 `POST` 请求的 PHP 脚本必须执行必要的类型转换。\n\nHTML 支持许多输入类型。最通用的类型是文本字段，可用于输入用户可以在键盘上键入的任何字符。文本输入的基本\
    \ HTML 语法如下：\n\n```\n<input type=\"text\" name=\"text\" />\n```\n\n`name` 属性的值会导致在\
    \ `$_POST`（或 `$_GET`）数组中创建一个具有相同值的索引，用户输入的值可以在该索引处访问。\n\n一种特殊的文本输入类型称为密码。这将在用户键入时替换输入的内容，防止他人从旁窥视。\n\
    \n```\n<input type=\"password\" name=\"password\" />\n```\n\n每个字符通常被替换为星号 `*`。请注意，表单上的内容仍以明文传输，除非客户端和服务器之间使用了加密连接。不需要加密将空表单从服务器发送到客户端的\
    \ `GET` 请求，但将数据发送回服务器的 `POST` 请求应该加密以保护密码。"
  raw: 'PHP used to send complete HTML documents to the browser. The browser would
    then render the document and fetch additional resources like images and javascript
    from the same server or other servers. In order to minimize the amount of data
    and create sites that are more dynamic it us useful to send requests to the server
    to fetch just the latest information, get a status update, or get details about
    some content on the page.


    Solution


    From the PHP perspective there is no real difference between a request for a full
    HTML document, a request for an image, or some partial HTML or JSON document.
    It all follows the standard HTTP protocol and we have seen all the building blocks
    on how to create the response to any of those requests.


    From the client side we have discussed GET requests as entered in the address
    bar or when a user clicks a link and we have seen how a HTML form can be used
    to generate a POST request. In this section we will work on generating a GET or
    POST request using JavaScript. It is possible to create these requests with pure
    Javascript or you can choose a library like jQuery that wraps some of the functionality
    into simple and easy-to-use functions.


    How it Works


    The basis of the functionality starts by the creation of a communication object.
    This is not done the same way in all browsers but when the object is created it
    does provide the same functionality.


    if (window.XMLHttpRequest) { // code for Mozilla, etc.


    xml xmlhttp = new XMLHttpRequest()


    }


    else if (window.ActiveXObject) { // code for IE


    var xmlhttp = new ActiveXObject("Microsoft.XMLHTTP")


    }


    In this little example we test to see if the XMLHttpRequest object is defined
    on the window or if there is support for ActiveXObject in IE browsers.


    The asynchronous nature of the XMLHttpResponse requires the definition of a function
    to process the response when it comes in. This can be done with a function like
    this: ProcessStatus = function() {


    switch (xmlhttp.readyState) {


    case 4 :


    switch (xmlhttp.status) {


    case 0 : // Aborted


    break;


    case 200 : // if Ok


    case 304 : // if not modified


    resp = xmlhttp.responseText;


    break;


    }


    }


    }


    CHAPTER 12 ■ WEB FUNDAMENTALS


    And the code to start the request would look something like this:


    xmlhttp.onreadystatechange = ProcessStatus;


    try {


    xmlhttp.open("GET", ''http://mydomain.com/12_12.php'', true);


    }


    catch (e) {


    alert(''Error'');


    }


    On the PHP side the response should be formatted to how the JavaScript code expects
    the response.


    This can be a string or a Json encode string.


    <?php


    // 12_13.php


    $resp = [


    ''a'' => 1,


    ''b'' => 2


    ];


    header(''Content-Type: application/json'');


    echo json_encode($resp);


    The output will be a JSON encoded string of the response variable:


    {"a":1,"b":2}


    Recipe 12-11\. Web Sockets


    Problem


    So far we have worked on problems that start by the client sending a request to
    the server and receiving a response. Nothing happens on the server unless there
    is a client sending requests. Is it possible to have a line of communication open
    as long as the browser stays of the page?


    Solution


    Web Sockets is a bidirectional (full duplex) communication pipe that allows browsers
    to connect to special purpose php scripts. The Web Sockets protocol does not use
    http or https as the basis for communication.


    Instead it uses ws or wss for SSL encrypted connections.


    How it Works


    Easy ways to get started with Web Sockets is to download, and extend an existing
    socket server. This could


    [be https://github.com/ghedipunk/PHP-WebSockets](https://github.com/ghedipunk/PHP-WebSockets)


    . This is a stand-alone script that is executed from


    the command line. The scripts should not be placed in the web root and they can
    even be used on servers without a regular web server.


    CHAPTER 12 ■ WEB FUNDAMENTALS


    A simple server that receives a message and sends back a string with the characters
    in reversed order looks like this.


    #!/usr/bin/env php


    <?php


    // 12_14.php


    require(''./websockets.php'');


    class echoServer extends WebSocketServer {


    protected function process ($user, $message) {


    $this->send($user, str_reverse($message));


    }


    protected function connected ($user) {


    }


    protected function closed ($user) {


    }


    }


    $echo = new echoServer("0.0.0.0","9000");


    try {


    $echo->run();


    }


    catch (Exception $e) {


    $echo->stdout($e->getMessage());


    }


    The WebSocketsServer class uses a couple of abstract methods that must be defined
    in the class even if they do nothing as in this example. These functions could
    be used to configure data and clean up on connect and disconnect from clients.


    And an html document that can send and receive messages from the server could
    look like this:


    <!DOCTYPE html>


    <!- 12_14.html ->


    <html>


    <head>


    <script>


    var socket;


    function init() {


    var host = "ws://127.0.0.1:9000/echobot";


    try {


    socket = new WebSocket(host);


    socket.onmessage = function(msg) {


    var div = document.createElement("div");


    div.innerHTML = msg.data;


    document.getElementsByTagName(''body'')[0].appendChild(div);


    };


    }


    CHAPTER 12 ■ WEB FUNDAMENTALS


    catch (e) {


    alert(e);


    }


    }


    function send(msg) {


    try {


    socket.send(msg);


    }


    catch (e) {


    alert(e);


    }


    }


    </script>


    </head>


    <body onload="init();">


    <button onclick="send(''This is a test'');">Send</button>


    </script>


    </body>


    </html>


    **CHAPTER 13**


    **Creating and Using Forms**


    HTML Forms have many usages, ranging from a simple contact form to a way to collect
    and edit data in a web-based application. Forms can be created as a static section
    of HTML or it can be dynamically generated with PHP based on a set of data from
    a database or another source. No matter how the form is generated it’s good practice
    to validate the input before the form is submitted. This will help prevent data
    errors and the user will be able to correct errors without having the data sent
    to the server for validations. It is also necessary to validate the contents of
    the POST request before data is inserted into the database or otherwise used on
    the server.


    Recipe 13-1\. Form Elements


    Problem


    There are a number of different types of input that can be used in an HTML form.
    How does these map to native PHP data types and even to column types in a database?


    Solution


    In general all input from a HTML form is treated as string values in PHP. This
    is because the type is not passed on from the client to the server. The POST request
    contains key/value pairs with no other information. The PHP script that receives
    the POST request has to perform the necessary type conversion.


    There are a number of input types supported by HTML. The most generic type is
    a text field that can be used to enter any character the user can type on the
    keyboard. The basic HTML syntax for a text input looks like this:


    <input type="text" name="text" />


    The value of the name attribute will cause an index in the $_POST (or $_GET) array
    to be created with the same value and the value entered by the user can be accessed
    at that index.


    A special type of text input is called password. This will replace the content
    of the input while the user is typing, preventing others from reading over the
    shoulder.


    <input type="password" name="password" />


    Each character is typically replaced with an asterisk *. Please note that the
    content on the form is still transferred in clear text, unless an encrypted connection
    is used between the client and the server. It is not necessary to encrypt the
    GET request that sends the empty form from the server to the client, but the POST


    that sends data back to the server should be encrypted to secure passwords.


    © Frank M. Kromann 2016


    F.M. Kromann, *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_13


