  \n## 通过身份验证增强安全性\n\n我们需要做的最后几件事之一是关闭一个大的安全漏洞。我们的管理模块是完全开放的，对所有用户都可用。让我们创建一个过程，要求所有管理员在使用系统之前必须登录。创建此过程需要我们执行以下任务：\n\
  \n*   在`simple_blog`数据库中创建一个管理员表\n*   使用密码的单向哈希\n*   创建一个用于创建新管理员的 HTML 表单\n*  \
  \ 为管理员创建一个登录表单\n*   对未授权用户隐藏管理模块\n*   使用会话在多个 HTTP 请求之间保持登录状态\n\n## 在数据库中创建管理员表\n\
  \n为我们的站点启用授权管理员，需要我们创建一个表来存储他们的数据。我们将创建一个`admin`表来存储以下管理员信息：\n\n*   `admin_id`：标识管理员的唯一编号\n\
  *   `email`：管理员的电子邮件地址\n*   `userid`：管理员的用户 ID\n*   `password`：管理员的密码\n\n我们将使用 BCRYPT（PHP\
  \ 8 中的默认哈希算法）对密码进行哈希处理，该算法当前会生成一个 72 字符的字符串。但是，未来的版本会扩展这个字符串。因此，我们将使用`VARCHAR`数据类型创建`password`列，并将输入限制为\
  \ 255 个字符以备将来扩展。我们还将允许使用`VARCHAR`数据类型、大小为 255 个字符的`userid`。但是，我们将对`userid`和`password`都要求最小长度为八个字符，这将通过\
  \ HTML 和 PHP 代码进行验证。\n\n要创建`admin`表，我们将导航到浏览器中的`http://localhost/phpmyadmin`，选择`simple_blog`数据库，然后打开\
  \ SQL 选项卡。接着，我们将输入以下命令来创建表。\n\n```\ncreate table admin(\nadmin_id INT NOT NULL AUTO_INCREMENT,\n\
  email TEXT,\nuserid VARCHAR(72),\npassword VARCHAR(72),\nprimary key (admin_id)\n\
  )\n```\n\n> **注意**：你也可以选择数据库，然后向下滚动到创建表区域并输入表名（`admin`）。然后点击`执行`按钮。系统会提供一个用于填写表中字段的表单。输入与前面脚本中所示相同的信息，点击`保存`按钮后会产生相同的结果。\n\
  \n## 使用 BCRYPT 对密码进行哈希处理\n\n当我们开始向`admin`表插入新用户时，我们将了解如何使用 BCRYPT 对字符串进行哈希处理。BCRYPT\
  \ 算法提供单向哈希。\n\n对密码进行哈希处理是强安全的绝对要求，因为哈希后的密码更难被盗取。让我们假设密码是`Test`。如果我们使用 BCRYPT 对其进行哈希处理，那么`Test`就变成了：\n\
  \n```\n$2y$10$xJN9J3cSlTp25rqS5MNYFepRs5Mkcs0y.zya6MFshLPDllWBTav4S\n```\n\n这无疑使得密码极难破解！即使数据库遭受严重攻击，所有用户名和密码都暴露了，攻击者仍然很难滥用这些用户名和密码。\n\
  \n### 单向哈希\n\n密码应始终通过单向哈希来保护。如果密码使用单向哈希算法进行哈希处理，那么几乎不可能确定真实的密码。任何能够恢复丢失密码的系统本质上都是不安全的。如果原始密码可以被恢复，那么系统必定以某种方式记住了密码。如果系统记住了密码，系统管理员很可能也能看到密码。如果密码可见，它就很容易受到攻击。一个安全的系统只存储哈希后的密码。如果有人忘记了密码，安全的系统会提供重置密码的机会。\n\
  \n在博客系统的上下文中，这意味着管理员的密码对所有博客管理员都是受保护的。如果用户丢失了密码，就无法再次发送给他们。相反，系统可以为他们提供重置密码的机会。\n\
  \n### 足够的安全性\n\n始终假设即使是最安全的系统也可能被攻破。问题在于攻击者需要投入多少时间和精力。我们的任务是提供足够的安全性，以阻止攻击者尝试访问数据库内容。\n\
  \n> **注意**：有关使用 PHP 对密码进行哈希处理的更多信息，请访问[`www.php.net/manual/en/function.password-hash.php`](http://www.php.net/manual/en/function.password-hash.php)。\n\
  \n## 在数据库中添加管理员\n\n我们现在有了一个用于保存管理员凭据的数据库表；我们准备好开始创建博客管理员了。第一步是创建一个表单，允许我们输入电子邮件地址、`userid`和相应的密码。完成此操作后，我们将信息存储到数据库中以备后用。\n\
