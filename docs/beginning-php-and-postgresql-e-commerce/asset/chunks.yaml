    retrieve data. Its functionality is quite clear, as it uses a number of helper
    methods to get the work done. First, it decides whether it should use SOAP or
    REST depending on the configuration setting you’ve added to include/config.php.


    The AMAZON_METHOD constant you defined in include/config.php instructs whether
    ECS will be contacted through REST or SOAP. The value of that constant (which
    should be REST or SOAP) decides whether GetDataWithRest() or GetDataWithSoap()
    will be used to contact Amazon. No matter which method you choose, the results
    should be the same:


    // Retrieves Amazon products for sending to presentation tier public function
    GetProducts()


    {


    // Use SOAP to get data


    if (AMAZON_METHOD == ''SOAP'')


    **$result = $this->GetDataWithSoap();**


    // Use REST to get data


    else


    **$result = $this->GetDataWithRest();**


