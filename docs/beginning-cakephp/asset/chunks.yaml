    **The Vote Tag**


    Listing 9-11 showed how to replace the $text parameter in the $blog->voteUpLink()
    function with the vote tag from the tags.php file. In this exercise, do the same
    for the $blog->voteDownLink() function. You can also look for ways to generate
    other tags for use in the $blog->comments() function. Consult the PHP manual for
    help with the sprintf() function to extend the capabilities of your custom tags.


    **Summary**


    This chapter explored Cake’s built-in helpers. The two used in most Cake applications
    are the HTML and Form helpers. Together, they simplify rendering HTML and processing
    forms. Thanks to the Form helper, passing along user form submissions is easy
    and provides the controller and model with a standardized method for handling
    data. Several other helpers are available in Cake. This chapter outlined what
    these helpers are and what functions they include. Many times you will want to
    create your own custom helper. I showed how to write one for your blog application
    that renders the comments for the view.


    By using this helper, you can reduce the amount of code in the view to a couple
    of strings.


    Customizing helper variables is one way to expand the functionality of the helper.
    This chapter also explained how to provide a set of output variables that make
    the helper more portable. In Chapter 10, you’ll move to routing in Cake and examine
    how to customize URL


    structures for your applications.


