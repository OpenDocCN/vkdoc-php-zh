    **Customizing Helper Variables**


    You’ve built a custom helper with functions to handle specific operations. But
    what about customizing the variables used by built-in helpers? Suppose you want
    to perform the same operation that is already written in the HTML helper but you
    want to change the display of the HTML helper’s output. Rather than build a completely
    different helper to fit your customized output, you can simply alter the variables
    the HTML helper uses and then call the needed function.


    Recall that you already created the App helper file in the app/ directory. There,
    you can intercept the global variables used by any helper and insert your own
    code. Open the cake/


    libs/view/helpers/html.php file to read the raw HTML helper code. Scroll down
    to line 47


    and see the $tags array (as shown in Listing 9-7).


    **Listing 9-7.** *The HTML Helper’s* $tags *Array*


