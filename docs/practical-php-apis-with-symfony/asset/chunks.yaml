- fmt: "### Mapping the Received Payload Directly to the `ApiInput`\n\nThis first\
    \ case is the most obvious. The received payload must exactly match with the `ApiInput`\
    \ model. The `MapRequestPayload` attribute internally deserializes the request\
    \ payload into the model and validates it. If any error is found, Symfony creates\
    \ a `ValidationFailedException` with the errors, wraps it into an `UnprocessableEntityHttpException`,\
    \ and throws it with a 422 Unprocessable Entity HTTP code.\n\n```php\nuse App\\\
    Api\\ApiOperationHandler;\nuse App\\Api\\Input\\ApiInput;\nuse Symfony\\Bundle\\\
    FrameworkBundle\\Controller\\AbstractController;\nuse Symfony\\Component\\HttpFoundation\\\
    JsonResponse;\nuse Symfony\\Component\\Routing\\Annotation\\Route;\nuse Symfony\\\
    Component\\HttpKernel\\Attribute\\MapRequestPayload;\n\nclass ApiController extends\
    \ AbstractController\n{\n    public function __construct(\n        private readonly\
    \ ApiOperationHandler $apiOperationHandler\n    ) {}\n\n    #[Route('/api/v1/operation',\
    \ name: 'api_operation', methods: ['POST'])]\n    public function operationAction(#[MapRequestPayload]\
    \ ApiInput $apiInput): JsonResponse\n    {\n        $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
    \        return new JsonResponse($apiOutput->data, $apiOutput->code);\n    }\n\
    }\n```\n\n### Receiving the Operation Name As a Route Parameter\n\nIn this case,\
    \ the operation name comes within a route parameter name `operationSlug` and the\
    \ operation data comes within the payload. To handle the request, we need to make\
    \ some changes:\n\n#### Get the Operation Name from the Slug\n\nTo discover which\
    \ operation must be executed, let’s create a static method in the `OperationNames`\
    \ enumeration which will transform the operation slug into an operation name.\n\
    \n```php\nuse function Symfony\\Component\\String\\u;\n// .......\n\npublic static\
    \ function getBySlug(string $slug): string\n{\n    return u($slug)->camel()->title();\n\
    }\n```\n\nThe `getBySlug` function uses the Symfony String “u” function to camelize\
    \ the slug and uppercase the first character. In this way, we manage to convert\
    \ the slug into a valid operation name.\n\n#### Create the `ApiInput` Model Manually\n\
    \nIn the below code, we are going to create the `ApiInput` model following the\
    \ next steps:\n\n- We ensure that the received payload is a valid JSON. This is\
    \ mandatory since we do not use the `MapRequestPayload` attribute in this case.\n\
    - We use the `getBySlug` function to get the operation name and use it as the\
    \ first `ApiInput` constructor argument.\n- We decode the received payload (the\
    \ operation data) to an array and use it as the second `ApiInput` constructor\
    \ argument.\n\nLet’s create a method to ensure that the received payload is a\
    \ valid JSON in the `ValidationHandler` class:\n\n```php\nclass ValidationHandler\n\
    {\n    public function __construct(\n        private readonly SerializerInterface\
    \ $serializer,\n        private readonly ValidatorInterface $validator\n    )\
    \ {}\n\n    // Other methods...\n\n    public function validateAndGetJsonInput(string\
    \ $content): array\n    {\n        $data = json_decode($content, true);\n    \
    \    if (is_null($data)) {\n            if (json_last_error() !== JSON_ERROR_NONE)\
    \ {\n                throw new InvalidPayloadException('Invalid Json Payload');\n\
    \            }\n            $data = [];\n        }\n        return $data;\n  \
    \  }\n}\n\n#[Route('/api/v1/operation/{operationSlug}', name: 'api_slug_operation',\
    \ methods: ['POST'])]\npublic function operationActionSlug(string $operationSlug,\
    \ Request $request, ValidationHandler $validationHandler): JsonResponse\n{\n \
    \   $data = $validationHandler->validateAndGetJsonInput($request->getContent());\n\
    \    $apiInput = new ApiInput(\n        OperationNames::getBySlug($operationSlug),\n\
    \        $data\n    );\n    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
    \    return new JsonResponse($apiOutput->data, $apiOutput->code);\n}\n```\n\n\
    The second `ApiInput` parameter (which holds the operation data) received the\
    \ JSON decoded data if there are no errors. Remember that this data is validated\
    \ by the `performOperation` method according to the operation input model. To\
    \ validate it, it uses the `ValidationHandler` service from the previous chapter.\n\
    \n### Using a Route per Operation Without a Slug Parameter\n\nThis case is similar\
    \ to the previous one, but instead of sending the operation slug as a parameter,\
    \ the route defines the operation name. In this way, we would facilitate the generation\
    \ of documentation while keeping our API oriented towards operations.\n\n```php\n\
    #[Route('/api/v1/operation/send-payment', name: 'api_send_payment_operation',\
    \ methods: ['POST'])]\npublic function operationActionSendPayment(Request $request,\
    \ ValidationHandler $validationHandler): JsonResponse\n{\n    $data = $validationHandler->validateAndGetJsonInput($request->getContent());\n\
    \    $apiInput = new ApiInput(\n        OperationNames::SendPayment->name,\n \
    \       $data\n    );\n    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
    \    return new JsonResponse($apiOutput->data, $apiOutput->code);\n}\n```\n\n\
    ### Using an HTTP GET Route\n\nHTTP GET requests usually receive the data within\
    \ the URL query string, so to be able to get the data and pass it to the `ApiInput`\
    \ model, we can rely on the Symfony Request query parameter.\n\n```php\n#[Route('/api/v1/operation/get-campaigns',\
    \ name: 'api_send_get_campaigns', methods: ['GET'])]\npublic function operationActionGetCampaigns(Request\
    \ $request): JsonResponse\n{\n    $apiInput = new ApiInput(\n        OperationNames::GetCampaigns->name,\n\
    \        $request->query->all()\n    );\n    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
    \    return new JsonResponse($apiOutput->data, $apiOutput->code);\n}\n```\n\n\
    ### Passing Data Within Route Parameters\n\nThere can be situations when some\
    \ parameters are passed as route parameters instead of using the query string\
    \ or the request payload. Let’s observe the following example.\n\n```php\n#[Route('/api/v1/sensor/{sensorId}/operation/update-data',\
    \ name: 'api_update_sensor_data', methods: ['PATCH'])]\npublic function operationActionUpdateSensorData(int\
    \ $sensorId, Request $request, ValidationHandler $validationHandler): JsonResponse\n\
    {\n    $data = $validationHandler->validateAndGetJsonInput($request->getContent());\n\
    \    $apiInput = new ApiInput(\n        OperationNames::UpdateSensorData->name,\n\
    \        array_merge(\n            $data,\n            ['sensorId' => $sensorId]\n\
    \        )\n    );\n    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
    \    return new JsonResponse($apiOutput->data, $apiOutput->code);\n}\n```\n\n\
    In this case, we need to manually add the `sensorId` parameter to the received\
    \ payload, which is achieved using the PHP `array_merge` function.\n\nAs an improvement,\
    \ instead of hardcoding the `sensorId` parameter name, we could create an enumeration\
    \ to hold those parameter names.\n\n```php\nenum OperationParametersNames: string\n\
    {\n    case SensorId = 'sensorId';\n}\n```\n\nAnd then, we would change the `array_merge`\
    \ with this:\n\n```php\narray_merge(\n    json_decode($request->getContent(),\
    \ true),\n    [OperationParametersNames::SensorId->value => $sensorId]\n)\n```\n\
    \n### Combining with Traditional CRUD Routes\n\nIn the same way that we can define\
    \ our endpoints in various ways to receive the operation to be executed and the\
    \ data, we can also combine operation-oriented routes with traditional CRUD routes.\n\
    \n```php\n#[Route('/api/v1/template')]\nclass ApiTemplatingController extends\
    \ AbstractController\n{\n    public function __construct(\n        private readonly\
    \ ApiOperationHandler $apiOperationHandler\n    ) {}\n\n    #[Route('', name:\
    \ 'api_get_templates', methods: ['GET'])]\n    public function getTemplates():\
    \ JsonResponse\n    {\n        return new JsonResponse([]);\n    }\n\n    #[Route('/operation',\
    \ name: 'api_template_operation', methods: ['POST'])]\n    public function operationAction(#[MapRequestPayload]\
    \ ApiInput $apiInput): JsonResponse\n    {\n        $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
    \        return new JsonResponse($apiOutput->data, $apiOutput->code);\n    }\n\
    }\n```\n\nAs we can see in the above controller, it combines a CRUD-type endpoint\
    \ (`getTemplates`) with an operation-oriented endpoint (`operationAction`)."
  raw: '#### Mapping the Received Payload Directly to the ApiInput


    This first case is the most obvious. The received payload must exactly match with
    the **ApiInput** model. The [MapRequestPayloa​d](https://symfony.com/blog/new-in-symfony-6-3-mapping-request-data-to-typed-objects)
    attribute internally deserializes the request payload into the model and validates
    it. If any error is found, Symfony creates a **ValidationFailedException** with
    the errors, wraps it into an **UnprocessableEntityHttpException**, and throws
    it with a 422 Unprocessable Entity Http code.


    ```

    use App\Api\ApiOperationHandler;

    use App\Api\Input\ApiInput;

    use Symfony\Bundle\FrameworkBundle\Controller\AbstractController;

    use Symfony\Component\HttpFoundation\JsonResponse;

    use Symfony\Component\Routing\Annotation\Route;

    use Symfony\Component\HttpKernel\Attribute\MapRequestPayload;

    classApiController extends AbstractController

    {

    public function __construct(

    private readonly ApiOperationHandler $apiOperationHandler

    ){}

    #[Route(''/api/v1/operation'', name: ''api_operation'', methods: [''POST''])]

    public function operationAction(#[MapRequestPayload] ApiInput $apiInput): JsonResponse

    {

    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);

    return new JsonResponse($apiOutput->data, $apiOutput->code);

    }

    }

    ```


    #### Receiving the Operation Name As a Route Parameter


    In this case, the operation name comes within a route parameter name **operationSlug**
    and the operation data comes within the payload. To handle the request, we need
    to make some changes:


    ##### Get the Operation Name from the Slug


    To discover which operation must be executed, let’s create a static method in
    the OperationNames enumeration which will transform the operation slug into an
    operation name.


    ```

    use function Symfony\Component\String\u;

    // .......

    public static function getBySlug(string $slug): string

    {

    return u($slug)->camel()->title();

    }

    ```


    The **getBySlug** function uses the [Symfony String](https://symfony.com/doc/current/string.html%2523methods-to-change-case)
    “u” function to camelize the slug and uppercase the first character. In this way,
    we manage to convert the slug into a valid operation name.


    ##### Create the ApiInput Model Manually


    In the below code, we are going to create the ApiInput model following the next
    steps:


    *   We ensure that the received payload is a valid JSON. This is mandatory since
    we do not use the **MapRequestPayload** attribute in this case.


    *   We use the **getBySlug** function to get the operation name and use it as
    the first **ApiInput** constructor argument.


    *   We decode the received payload (the operation data) to an array and use it
    as the second **ApiInput** constructor argument.


    Let’s create a method to ensure that the received payload is a valid JSON in the
    ValidationHandler class:


    ```

    class ValidationHandler

    {

    public function __construct(

    private readonly SerializerInterface $serializer,

    private readonly ValidatorInterface $validator

    ){}

    // The other methods

    public function validateAndGetJsonInput(string $content): array

    {

    $data = json_decode($content, true);

    if(is_null($data)){

    if(json_last_error() !== JSON_ERROR_NONE) {

    throw new InvalidPayloadException(''Invalid Json Payload'');

    }

    $data = [];

    }

    return $data;

    }

    }

    #[Route(''/api/v1/operation/{operationSlug}'', name: ''api_slug_operation'', methods:
    [''POST''])]

    public function operationActionSlug(string $operationSlug, Request $request, ValidationHandler
    $validationHandler): JsonResponse

    {

    $data = $validationHandler->validateAndGetJsonInput($request->getContent());

    $apiInput = new ApiInput(

    OperationNames::getBySlug($operationSlug),

    $data

    );

    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);

    return new JsonResponse($apiOutput->data, $apiOutput->code);

    }

    ```


    The second **ApiInput** parameter (which holds the operation data) received the
    json decoded data is there are no errors. Remember that this data is validated
    by the **performOperation** method according to the operation input model. To
    validate it, it uses the ValidationHandler service from the previous chapter.


    #### Using a Route per Operation Without a Slug Parameter


    This case is similar to the previous one, but instead of sending the operation
    slug as a parameter, the route defines the operation name. In this way, we would
    facilitate the generation of documentation while keeping our API oriented towards
    operations.


    ```

    #[Route(''/api/v1/operation/send-payment'', name: ''api_send_payment_operation'',
    methods: [''POST''])]

    public function operationActionSendPayment(Request $request, ValidationHandler
    $validationHandler): JsonResponse

    {

    $data = $validationHandler->validateAndGetJsonInput($request->getContent());

    $apiInput = new ApiInput(

    OperationNames::SendPayment->name,

    $data

    );

    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);

    return new JsonResponse($apiOutput->data, $apiOutput->code);

    }

    ```


    #### Using an Http Get Route


    Http Get requests usually receive the data within the URL query string, so to
    be able to get the data and pass it to the ApiInput model, we can rely on the
    Symfony Request query parameter.


    ```

    #[Route(''/api/v1/operation/get-campaigns'', name: ''api_send_get_campaigns'',
    methods: [''GET''])]

    public function operationActionGetCampaigns(Request $request): JsonResponse

    {

    $apiInput = new ApiInput(

    OperationNames::GetCampaigns->name,

    $request->query->all()

    );

    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);

    return new JsonResponse($apiOutput->data, $apiOutput->code);

    }

    ```


    #### Passing Data Within Route Parameters


    This can be situations when some parameters are passed as a route parameters instead
    of using the query string or the request payload. Let’s observe the following
    example.


    ```

    #[Route(''/api/v1/sensor/{sensorId}/operation/update-data'', name: ''api_update_sensor_data'',
    methods: [''PATCH''])]

    public function operationActionUpdateSensorData(int $sensorId, Request $request,
    ValidationHandler $validationHandler): JsonResponse

    {

    $data = $validationHandler->validateAndGetJsonInput($request->getContent());

    $apiInput = new ApiInput(

    OperationNames::UpdateSensorData->name,

    array_merge(

    $data,

    [''sensorId'' => $sensorId]

    )

    );

    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);

    return new JsonResponse($apiOutput->data, $apiOutput->code);

    }

    ```


    In this case, we need to manually add the **sensorId** parameter to the received
    payload, which is achieved using the PHP array_merge function.


    As an improvement, instead of hardcoding the **sensorId** parameter name, we could
    create an enumeration to hold those parameter names.


    ```

    enum OperationParametersNames: string

    {

    case SensorId = ''sensorId'';

    }

    ```


    And then, we would change the array_merge with this:


    ```

    array_merge(

    json_decode($request->getContent(), true),

    [OperationParametersNames::SensorId->value => $sensorId]

    )

    ```


    #### Combining with Traditional CRUD Routes


    In the same way that we can define our endpoints in various ways to receive the
    operation to be executed and the data, we can also combine operation-oriented
    routes with traditional CRUD routes.


    ```

    #[Route(''/api/v1/template'')]

    class ApiTemplatingController extends AbstractController

    {

    public function __construct(

    private readonly ApiOperationHandler $apiOperationHandler

    ){}

    #[Route('''', name: ''api_get_templates'', methods: [''GET''])]

    public function getTemplates(): JsonResponse

    {

    return new JsonResponse([]);

    }

    #[Route(''/operation'', name: ''api_template_operation'', methods: [''POST''])]

    public function operationAction(#[MapRequestPayload] ApiInput $apiInput): JsonResponse

    {

    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);

    return new JsonResponse($apiOutput->data, $apiOutput->code);

    }

    }

    ```


    As we can see in the above controller, it combines a CRUD-type endpoint (**getTemplates**)
    with an operation-oriented endpoint (**operationAction**).'
  trans: "\n### 将接收到的载荷直接映射到 `ApiInput`\n\n第一种情况最为直接。接收到的载荷必须与 `ApiInput` 模型完全匹配。`MapRequestPayload`\
    \ 属性会在内部将请求载荷反序列化为模型并进行验证。如果发现任何错误，Symfony 会创建一个包含错误信息的 `ValidationFailedException`，将其包装成\
    \ `UnprocessableEntityHttpException`，并以 422 Unprocessable Entity HTTP 状态码抛出。\n\
    \n```php\nuse App\\Api\\ApiOperationHandler;\nuse App\\Api\\Input\\ApiInput;\n\
    use Symfony\\Bundle\\FrameworkBundle\\Controller\\AbstractController;\nuse Symfony\\\
    Component\\HttpFoundation\\JsonResponse;\nuse Symfony\\Component\\Routing\\Annotation\\\
    Route;\nuse Symfony\\Component\\HttpKernel\\Attribute\\MapRequestPayload;\n\n\
    class ApiController extends AbstractController\n{\n    public function __construct(\n\
    \        private readonly ApiOperationHandler $apiOperationHandler\n    ) {}\n\
    \n    #[Route('/api/v1/operation', name: 'api_operation', methods: ['POST'])]\n\
    \    public function operationAction(#[MapRequestPayload] ApiInput $apiInput):\
    \ JsonResponse\n    {\n        $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
    \        return new JsonResponse($apiOutput->data, $apiOutput->code);\n    }\n\
    }\n```\n\n### 将操作名称作为路由参数接收\n\n此类情况下，操作名称来源于路由参数 `operationSlug`，而操作数据来自请求载荷。为了处理该请求，我们需要做一些修改：\n\
    \n#### 从 Slug 中获取操作名称\n\n为了确定需要执行哪个操作，让我们在 `OperationNames` 枚举中创建一个静态方法，将操作 slug\
    \ 转换为操作名称。\n\n```php\nuse function Symfony\\Component\\String\\u;\n// .......\n\
    \npublic static function getBySlug(string $slug): string\n{\n    return u($slug)->camel()->title();\n\
    }\n```\n\n`getBySlug` 函数使用 Symfony String 的 `u` 函数将 slug 转为驼峰式并将首字母大写。通过这种方式，我们成功将\
    \ slug 转换成了有效的操作名称。\n\n#### 手动创建 `ApiInput` 模型\n\n在下面的代码中，我们将按照以下步骤创建 `ApiInput`\
    \ 模型：\n\n- 确保接收到的载荷是有效的 JSON。这一步是强制性的，因为此情况下我们没有使用 `MapRequestPayload` 属性。\n-\
    \ 使用 `getBySlug` 函数获取操作名称，并将其作为 `ApiInput` 构造函数的第一个参数。\n- 将接收到的载荷（操作数据）解码为数组，并将其作为\
    \ `ApiInput` 构造函数的第二个参数。\n\n我们来在 `ValidationHandler` 类中创建一个方法，确保接收到的载荷是有效的 JSON：\n\
    \n```php\nclass ValidationHandler\n{\n    public function __construct(\n     \
    \   private readonly SerializerInterface $serializer,\n        private readonly\
    \ ValidatorInterface $validator\n    ) {}\n\n    // 其他方法...\n\n    public function\
    \ validateAndGetJsonInput(string $content): array\n    {\n        $data = json_decode($content,\
    \ true);\n        if (is_null($data)) {\n            if (json_last_error() !==\
    \ JSON_ERROR_NONE) {\n                throw new InvalidPayloadException('Invalid\
    \ Json Payload');\n            }\n            $data = [];\n        }\n       \
    \ return $data;\n    }\n}\n\n#[Route('/api/v1/operation/{operationSlug}', name:\
    \ 'api_slug_operation', methods: ['POST'])]\npublic function operationActionSlug(string\
    \ $operationSlug, Request $request, ValidationHandler $validationHandler): JsonResponse\n\
    {\n    $data = $validationHandler->validateAndGetJsonInput($request->getContent());\n\
    \    $apiInput = new ApiInput(\n        OperationNames::getBySlug($operationSlug),\n\
    \        $data\n    );\n    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
    \    return new JsonResponse($apiOutput->data, $apiOutput->code);\n}\n```\n\n\
    如果没有错误，`ApiInput` 的第二个参数（保存操作数据）会接收到 JSON 解码后的数据。请注意，此数据会根据操作输入模型，由 `performOperation`\
    \ 方法进行验证。为了进行验证，它使用了上一章中的 `ValidationHandler` 服务。\n\n### 不使用 Slug 参数，为每个操作使用独立的路由\n\
    \n此情况与前一种类似，但路由不通过参数传递操作 slug，而是直接定义操作名称。这样，我们可以在保持 API 面向操作的同时，方便文档的生成。\n\n```php\n\
    #[Route('/api/v1/operation/send-payment', name: 'api_send_payment_operation',\
    \ methods: ['POST'])]\npublic function operationActionSendPayment(Request $request,\
    \ ValidationHandler $validationHandler): JsonResponse\n{\n    $data = $validationHandler->validateAndGetJsonInput($request->getContent());\n\
    \    $apiInput = new ApiInput(\n        OperationNames::SendPayment->name,\n \
    \       $data\n    );\n    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
    \    return new JsonResponse($apiOutput->data, $apiOutput->code);\n}\n```\n\n\
    ### 使用 HTTP GET 路由\n\nHTTP GET 请求通常通过 URL 查询字符串接收数据。因此，为了获取数据并将其传递给 `ApiInput`\
    \ 模型，我们可以依赖 Symfony Request 的查询参数。\n\n```php\n#[Route('/api/v1/operation/get-campaigns',\
    \ name: 'api_send_get_campaigns', methods: ['GET'])]\npublic function operationActionGetCampaigns(Request\
    \ $request): JsonResponse\n{\n    $apiInput = new ApiInput(\n        OperationNames::GetCampaigns->name,\n\
    \        $request->query->all()\n    );\n    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
    \    return new JsonResponse($apiOutput->data, $apiOutput->code);\n}\n```\n\n\
    ### 在路由参数中传递数据\n\n可能会出现某些参数通过路由参数传递，而不是使用查询字符串或请求载荷的情况。让我们看下面的例子。\n\n```php\n\
    #[Route('/api/v1/sensor/{sensorId}/operation/update-data', name: 'api_update_sensor_data',\
    \ methods: ['PATCH'])]\npublic function operationActionUpdateSensorData(int $sensorId,\
    \ Request $request, ValidationHandler $validationHandler): JsonResponse\n{\n \
    \   $data = $validationHandler->validateAndGetJsonInput($request->getContent());\n\
    \    $apiInput = new ApiInput(\n        OperationNames::UpdateSensorData->name,\n\
    \        array_merge(\n            $data,\n            ['sensorId' => $sensorId]\n\
    \        )\n    );\n    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
    \    return new JsonResponse($apiOutput->data, $apiOutput->code);\n}\n```\n\n\
    在此情况下，我们需要手动将 `sensorId` 参数添加到接收到的载荷中，这通过 PHP 的 `array_merge` 函数实现。\n\n作为改进，我们可以创建一个枚举来保存这些参数名称，而不是硬编码\
    \ `sensorId` 参数名。\n\n```php\nenum OperationParametersNames: string\n{\n    case\
    \ SensorId = 'sensorId';\n}\n```\n\n然后，我们将 `array_merge` 部分改成这样：\n\n```php\narray_merge(\n\
    \    json_decode($request->getContent(), true),\n    [OperationParametersNames::SensorId->value\
    \ => $sensorId]\n)\n```\n\n### 与传统的 CRUD 路由结合使用\n\n与我们可以通过多种方式定义端点来接收待执行的操作和数据一样，我们也可以将面向操作的路由与传统的\
    \ CRUD 路由结合使用。\n\n```php\n#[Route('/api/v1/template')]\nclass ApiTemplatingController\
    \ extends AbstractController\n{\n    public function __construct(\n        private\
    \ readonly ApiOperationHandler $apiOperationHandler\n    ) {}\n\n    #[Route('',\
    \ name: 'api_get_templates', methods: ['GET'])]\n    public function getTemplates():\
    \ JsonResponse\n    {\n        return new JsonResponse([]);\n    }\n\n    #[Route('/operation',\
    \ name: 'api_template_operation', methods: ['POST'])]\n    public function operationAction(#[MapRequestPayload]\
    \ ApiInput $apiInput): JsonResponse\n    {\n        $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
    \        return new JsonResponse($apiOutput->data, $apiOutput->code);\n    }\n\
    }\n```\n\n如上控制器所示，它结合了一个 CRUD 类型的端点（`getTemplates`）和一个面向操作的端点（`operationAction`）。\n"
- fmt: "### Conclusion\n\nIn this section, we have learned how to build an endpoint\
    \ in different ways so that clients can connect to our API and execute operations.\
    \ In the next chapter, we will study how to create versions of our API so that\
    \ we can allow one or more operations to be available only for one or more versions\
    \ of the API.\n\n## Section 7. Versioning the API\n\nIt is normal when developing\
    \ APIs to add new functionalities and operations, and it is also normal that some\
    \ of those new functionalities are only available for certain versions. In this\
    \ section, we will explore a way to specify that an operation can only be available\
    \ for one or more versions.\n\n### A New Metadata Parameter\n\nThe operation metadata\
    \ is the perfect place to specify which versions the operation is available in.\
    \ To achieve this, let’s add a new parameter to the attribute.\n\n```\n#[\\Attribute(\\\
    Attribute::TARGET_CLASS)]\nclass OperationMetadata\n{\n    public function __construct(\n\
    \        public readonly string $name,\n        public readonly ?array $version\
    \ = null,\n        public readonly ?string $input = null\n    ){ }\n}\n```\n\n\
    The `version` parameter specifies which API versions can execute the operation.\
    \ If no version is specified, it will mean that no version is required. Now, we\
    \ need to receive the API version in some way. This way can be using a Symfony\
    \ route parameter.\n\n### Receiving the Version\n\nThe below code adds a `version`\
    \ parameter to the controller route.\n\n```\n#[Route('/api/{version}/operations',\
    \ name: 'post_api_operation', methods: ['POST'])]\npublic function operationAction(string\
    \ $version, #[MapRequestPayload] ApiInput $apiInput): JsonResponse\n{\n    $apiOutput\
    \ = $this->apiOperationHandler->performOperation($apiInput, $version);\n    return\
    \ new JsonResponse($apiOutput->data, $apiOutput->code);\n}\n```\n\nThe `version`\
    \ parameter arrives as a route parameter. Then, this parameter is passed to the\
    \ `ApiOperationHandler` so that it can check internally whether the version matches\
    \ with the operation.\n\n### Checking the Version\n\nNow, it’s time to add some\
    \ modifications to the `ApiOperationHandler` to be able to check the version.\n\
    \n```\npublic function performOperation(ApiInput $apiInput, ?string $version =\
    \ null): ApiOutput\n{\n    $operation = $this->operationCollection->getOperation($apiInput->operation);\n\
    \    if(!is_null($version) && $operation->metadata->version && !in_array($version,\
    \ $operation->metadata->version)) {\n        OperationDoesNotSupportApiVersionException(sprintf(\n\
    \            'Operation supported version: %s - Using version: %s',\n        \
    \    implode(“,”, $operation->metadata->version),\n            $version\n    \
    \    ));\n    }\n    $inputData = ($operation->metadata->input)\n        ? $this->validationHandler->deserializeAndValidate($apiInput->data,\
    \ $operation->metadata->input)\n        : null\n    ;\n    $operation->handler->perform($inputData);\n\
    }\n```\n\nThe `performOperation` method now receives the `version` as an optional\
    \ parameter. Then, the method checks the following conditions:\n\n- A version\
    \ is passed.\n- The operation metadata holds a version.\n- The version passed\
    \ does not exist into the operation allowed versions array.\n\nIf the above conditions\
    \ are met, an `OperationDoesNotSupportApiVersionException` is thrown, informing\
    \ the client that the operation cannot be executed for that API version. Let’s\
    \ see the exception code.\n\n```\nnamespace App\\Exception;\nclass OperationDoesNotSupportApiVersionException\
    \ extends \\RuntimeException\n{\n}\n```\n\nThis exception does nothing. We are\
    \ simply going to check for it in the `KernelSubscriber` to inform the user about\
    \ a version error within the JSON response.\n\n### Checking for an OperationDoesNotSupportApiVersionException\
    \ in the KernelSubscriber\n\nAs we did in the last sections, we have to check\
    \ for a version error in the kernel subscriber and format the error correctly.\n\
    \n```\nif($exception instanceof OperationDoesNotSupportApiVersionException){\n\
    \    $event->setResponse( new JsonResponse([\n        'errors' => [\n        \
    \    'operation_version' => $exception->getMessage()\n        ]\n    ], 400));\n\
    \    return;\n}\n```\n\nAs you can see, we have only been added another condition\
    \ for this kind of exception.\n\n### Conclusion\n\nIn this section, we have extended\
    \ the `OperationMetadata` attribute by adding a new parameter that specifies the\
    \ API versions an operation supports. In the final section, we will see how to\
    \ leverage Symfony’s Monolog Bundle together with its events system to automatically\
    \ log every API request and response.\n\n## Section 8. Monitoring Operations\n\
    \nAnother critical aspect to consider when developing APIs (regardless of the\
    \ approach) is how to monitor their performance. For example:\n\n- How long does\
    \ an operation take to process?\n- Which operations generate the most bottlenecks?\n\
    - What is the error rate (4xx/5xx) for each operation or endpoint?\n- What percentage\
    \ of requests exceed an acceptable latency threshold (e.g., the 95th percentile)?\n\
    \nThere are many tools which allow DevOps to monitor APIs such as Prometheus +\
    \ Grafana, ELK (Elastic/Logstash/Kibana), OpenTelemetry, etc.\n\nIn this chapter,\
    \ we will not cover how to set up external monitoring tools. Instead, we will\
    \ focus on using Symfony’s built-in features to generate log files containing\
    \ detailed execution data. Later on, developers and DevOps engineers can feed\
    \ those logs into any monitoring platform to build dashboards and analyze the\
    \ results.\n\n### Creating a Monolog Handler\n\nIn Section 3 Prerequisites of\
    \ the previous chapter, we learned how to install the Monolog bundle: the de facto\
    \ standard for logging in Symfony applications. Its configuration lives in the\
    \ `config/packages/monolog.yaml` file. Below is an example that defines a custom\
    \ handler writing to a dedicated log file:\n\n```\nmonolog:\n    handlers:\n \
    \       operations_performance:\n            type: stream\n            path: \"\
    %kernel.logs_dir%/op_performance.log\"\n            level: debug\n           \
    \ channels: [op_performance]\n    channels:\n        - deprecation # Deprecations\
    \ are logged in the dedicated \"deprecation\" channel when it exists\n       \
    \ - op_performance\n```\n\nHere, the `operations_performance` handler listens\
    \ on the `op_performance` channel and writes every debug-level (and above) record\
    \ to the `var/log/op_performance.log` file (the default location of the `%kernel.logs_dir%`\
    \ variable). Since recent Symfony releases include automatic service registration,\
    \ the kernel dynamically creates a service for each Monolog custom channel that\
    \ you configure. The service ID is derived from the handler’s channel name, converted\
    \ to camelCase, and suffixed with the `Logger` string. In this example, the service\
    \ becomes `$opPerformanceLogger`."
  raw: '### Conclusion


    In this section, we have learned how to build an endpoint in different ways so
    that clients can connect to our API and execute operations. In the next chapter,
    we will study how to create versions of our API so that we can allow one or more
    operations to be available only for one or more versions of the API.


    ## Section 7\. Versioning the API


    It is normal when developing APIs to add new functionalities and operations, and
    it is also normal that some of those new functionalities are only available for
    certain versions. In this section, we will explore a way to specify that an operation
    can only be available for one or more versions.


    ### A New Metadata Parameter


    The operation metadata is the perfect place to specify which versions the operation
    is available in. To achieve this, let’s add a new parameter to the attribute.


    ```

    #[\Attribute(\Attribute::TARGET_CLASS)]

    class OperationMetadata

    {

    public function __construct(

    public readonly string $name,

    public readonly ?array $version = null,

    public readonly ?string $input = null

    ){ }

    }

    ```


    The “version” parameter specifies which API versions can execute the operation.
    If no version is specified, it will mean that no version is required. Now, we
    need to receive the API version in some way. This way can be using a symfony route
    parameter.


    ### Receiving the Version


    The below code adds a “version” parameter to the controller route.


    ```

    #[Route(''/api/{version}/operations'', name: ''post_api_operation'', methods:
    [''POST''])]

    public function operationAction(string $version, #[MapRequestPayload] ApiInput
    $apiInput): JsonResponse

    {

    $apiOutput = $this->apiOperationHandler->performOperation($apiInput, $version);

    return new JsonResponse($apiOutput->data, $apiOutput->code);

    }

    ```


    The “version” parameter arrives as a route parameter. Then, this parameter is
    passed to the ApiOperationHandler so that it can check internally whether the
    version matches with the operation.


    ### Checking the Version


    Now, it’s time to add some modifications to the ApiOperationHandler to be able
    to check the version.


    ```

    public function performOperation(ApiInput $apiInput, ?string $version = null):
    ApiOutput

    {

    $operation = $this->operationCollection->getOperation($apiInput->operation);

    if(!is_null($version) && $operation->metadata->version && !in_array($version,
    $operation->metadata->version)) {

    OperationDoesNotSupportApiVersionException(sprintf(

    ''Operation supported version: %s - Using version: %s'',

    implode(“,”, $operation->metadata->version),

    $version

    ));

    }

    $inputData = ($operation->metadata->input)

    ? $this->validationHandler->deserializeAndValidate($apiInput->data, $operation->metadata->input)

    : null

    ;

    $operation->handler->perform($inputData);

    }

    ```


    The **performOperation** method now receives the “version” as an optional parameter.
    Then, the method checks the following conditions:


    *   A version is passed.


    *   The operation metadata holds a version.


    *   The version passed does not exist into the operation allowed versions array.


    If the above conditions are met, an **OperationDoesNotSupportApiVersionException**
    is thrown, informing the client that the operation cannot be executed for that
    API version. Let’s see the exception code.


    ```

    namespace App\Exception;

    class OperationDoesNotSupportApiVersionException extends \RuntimeException

    {

    }

    ```


    This exception does nothing. We are simply going to check for it in the KernelSubscriber
    to inform the user about a version error within the JSON response.


    ### Checking for an OperationDoesNotSupportApiVersionException in the KernelSubscriber


    As we did in the last sections, we have to check for a version error in the kernel
    subscriber and format the error correctly.


    ```

    if($exception instanceof OperationDoesNotSupportApiVersionException){

    $event->setResponse( new JsonResponse([

    ''errors'' => [

    ''operation_version'' => $exception->getMessage()

    ]

    ], 400));

    return;

    }

    ```


    As you can see, we have only been added another condition for this kind of exception.


    ### Conclusion


    In this section, we have extended the **OperationMetadata** attribute by adding
    a new parameter that specifies the API versions an operation supports. In the
    final section, we will see how to leverage Symfony’s Monolog Bundle together with
    its events system to automatically log every API request and response.


    ## Section 8\. Monitoring Operations


    Another critical aspect to consider when developing APIs (regardless of the approach)
    is how to monitor their performance. For example:


    *   How long does an operation take to process?


    *   Which operations generate the most bottlenecks?


    *   What is the error rate (4xx/5xx) for each operation or endpoint?


    *   What percentage of requests exceed an acceptable latency threshold (e.g.,
    the 95th percentile)?


    There are many tools which allow DevOps to monitor APIs such as Prometheus + Grafana,
    ELK (Elastic/Logstash/Kibana), OpenTelemetry, etc.


    In this chapter, we will not cover how to set up external monitoring tools. Instead,
    we will focus on using Symfony’s built-in features to generate log files containing
    detailed execution data. Later on, developers and DevOps engineers can feed those
    logs into any monitoring platform to build dashboards and analyze the results.


    ### Creating a Monolog Handler


    In Section 3 Prerequisites of the previous chapter, we learned how to install
    the Monolog bundle: the de facto standard for logging in Symfony applications.
    Its configuration lives in the *config/packages/monolog.yaml* file. Below is an
    example that defines a custom handler writing to a dedicated log file:


    ```

    monolog:

    handlers:

    operations_performance:

    type: stream

    path: "%kernel.logs_dir%/op_performance.log"

    level: debug

    channels: [op_performance]

    channels:

    - deprecation # Deprecations are logged in the dedicated "deprecation" channel
    when it exists

    - op_performance

    ```


    Here, the *operations_performance* handler listens on the *op_performance* channel
    and writes every debug-level (and above) record to the *var/log/op_performance.log*
    file (the default location of the %kernel.logs_dir% variable). Since recent Symfony
    releases include automatic service registration, the kernel dynamically creates
    a service for each Monolog custom channel that you configure. The service ID is
    derived from the handler’s channel name, converted to camelCase, and suffixed
    with the “Logger” string. In this example, the service becomes $opPerformanceLogger.'
  trans: "\n\n### 结论\n\n在本节中，我们学习了如何以不同方式构建端点，以便客户端能够连接到我们的 API 并执行操作。在下一章中，我们将研究如何为我们的\
    \ API 创建版本，从而允许某些操作仅适用于一个或多个 API 版本。\n\n## 第 7 节 对 API 进行版本管理\n\n在开发 API 时，添加新功能和新操作是很常见的，同样常见的是，其中一些新功能仅对特定版本可用。在本节中，我们将探讨如何指定一个操作仅对一个或多个版本可用。\n\
    \n### 一个新的元数据参数\n\n操作元数据是指定操作在哪些版本中可用的理想位置。为了实现这一点，让我们向该属性添加一个新参数。\n\n```\n#[\\\
    Attribute(\\Attribute::TARGET_CLASS)]\nclass OperationMetadata\n{\n    public\
    \ function __construct(\n        public readonly string $name,\n        public\
    \ readonly ?array $version = null,\n        public readonly ?string $input = null\n\
    \    ){ }\n}\n```\n\n`version` 参数指定了哪些 API 版本可以执行该操作。如果未指定版本，则意味着不要求任何特定版本。现在，我们需要以某种方式接收\
    \ API 版本。一种方式是使用 Symfony 路由参数。\n\n### 接收版本\n\n以下代码向控制器路由添加了一个 `version` 参数。\n\n\
    ```\n#[Route('/api/{version}/operations', name: 'post_api_operation', methods:\
    \ ['POST'])]\npublic function operationAction(string $version, #[MapRequestPayload]\
    \ ApiInput $apiInput): JsonResponse\n{\n    $apiOutput = $this->apiOperationHandler->performOperation($apiInput,\
    \ $version);\n    return new JsonResponse($apiOutput->data, $apiOutput->code);\n\
    }\n```\n\n`version` 参数作为路由参数传入。然后，该参数被传递给 `ApiOperationHandler`，以便其能在内部检查版本是否与操作匹配。\n\
    \n### 检查版本\n\n现在，是时候对 `ApiOperationHandler` 进行一些修改，使其能够检查版本了。\n\n```\npublic function\
    \ performOperation(ApiInput $apiInput, ?string $version = null): ApiOutput\n{\n\
    \    $operation = $this->operationCollection->getOperation($apiInput->operation);\n\
    \    if(!is_null($version) && $operation->metadata->version && !in_array($version,\
    \ $operation->metadata->version)) {\n        OperationDoesNotSupportApiVersionException(sprintf(\n\
    \            '操作支持的版本：%s - 使用的版本：%s',\n            implode(“，”, $operation->metadata->version),\n\
    \            $version\n        ));\n    }\n    $inputData = ($operation->metadata->input)\n\
    \        ? $this->validationHandler->deserializeAndValidate($apiInput->data, $operation->metadata->input)\n\
    \        : null\n    ;\n    $operation->handler->perform($inputData);\n}\n```\n\
    \n`performOperation` 方法现在接收 `version` 作为一个可选参数。然后，该方法检查以下条件：\n\n- 传入了版本。\n- 操作元数据中保存了版本信息。\n\
    - 传入的版本不存在于操作允许的版本数组中。\n\n如果满足上述条件，则会抛出一个 `OperationDoesNotSupportApiVersionException`\
    \ 异常，告知客户端该操作无法在该 API 版本上执行。让我们看一下异常代码。\n\n```\nnamespace App\\Exception;\nclass\
    \ OperationDoesNotSupportApiVersionException extends \\RuntimeException\n{\n}\n\
    ```\n\n这个异常本身不执行任何操作。我们只需在 `KernelSubscriber` 中捕获它，以便在 JSON 响应中告知用户版本错误。\n\n###\
    \ 在 KernelSubscriber 中检查 OperationDoesNotSupportApiVersionException 异常\n\n正如我们在上一节中所做的那样，我们必须在内核订阅器中检查版本错误，并正确地格式化错误信息。\n\
    \n```\nif($exception instanceof OperationDoesNotSupportApiVersionException){\n\
    \    $event->setResponse( new JsonResponse([\n        'errors' => [\n        \
    \    'operation_version' => $exception->getMessage()\n        ]\n    ], 400));\n\
    \    return;\n}\n```\n\n如你所见，我们只是为这种类型的异常添加了另一个条件判断。\n\n### 结论\n\n在本节中，我们扩展了 `OperationMetadata`\
    \ 属性，添加了一个新参数来指定操作所支持的 API 版本。在最后一节中，我们将看到如何利用 Symfony 的 Monolog Bundle 及其事件系统来自动记录每个\
    \ API 的请求和响应。\n\n## 第 8 节 监控操作\n\n在开发 API（无论采用何种方法）时，另一个需要考虑的关键方面是如何监控它们的性能。例如：\n\
    \n-   一个操作需要多长时间来处理？\n-   哪些操作最容易导致瓶颈？\n-   每个操作或端点的错误率（4xx/5xx）是多少？\n-   有多少比例的请求超过了可接受的延迟阈值（例如，第\
    \ 95 百分位数）？\n\n有许多工具允许 DevOps 人员监控 API，例如 Prometheus + Grafana、ELK（Elastic/Logstash/Kibana）、OpenTelemetry\
    \ 等。\n\n在本章中，我们不会介绍如何设置外部监控工具。相反，我们将重点介绍如何使用 Symfony 的内置功能生成包含详细执行数据的日志文件。之后，开发人员和\
    \ DevOps 工程师可以将这些日志导入任何监控平台，以构建仪表板并分析结果。\n\n### 创建 Monolog 处理器\n\n在上一章的*第 3 节\
    \ 先决条件*中，我们学习了如何安装 Monolog bundle：它是 Symfony 应用程序中日志记录的事实标准。其配置位于 `config/packages/monolog.yaml`\
    \ 文件中。以下是一个示例，它定义了一个写入专用日志文件的自定义处理器：\n\n```\nmonolog:\n    handlers:\n       \
    \ operations_performance:\n            type: stream\n            path: \"%kernel.logs_dir%/op_performance.log\"\
    \n            level: debug\n            channels: [op_performance]\n    channels:\n\
    \        - deprecation # 弃用警告会记录到专用的“deprecation”通道中（如果存在）\n        - op_performance\n\
    ```\n\n这里，`operations_performance` 处理器监听 `op_performance` 通道，并将所有 debug 级别（及更高级别）的记录写入\
    \ `var/log/op_performance.log` 文件（`%kernel.logs_dir%` 变量的默认位置）。由于最近的 Symfony 版本包含了自动服务注册功能，内核会为你配置的每个\
    \ Monolog 自定义通道动态创建一个服务。服务 ID 由处理器的通道名称转换而来，转换为驼峰格式，并附加 `Logger` 字符串。在此示例中，服务变为\
    \ `$opPerformanceLogger`。\n\n"
- fmt: "### Creating a Logging Wrapper to Log Operations Execution Information\n\n\
    In this section, we are going to explore how to inject the logger configured in\
    \ the previous section and how to use it to write to the configured file.\n\n\
    ```php\nuse Psr\\Log\\LoggerInterface;\nuse Symfony\\Component\\Uid\\Uuid;\nclass\
    \ OperationPerformanceLogger\n{\npublic function __construct(\nprivate readonly\
    \ LoggerInterface $opPerformanceLogger\n){}\npublic function logStartOperation(string\
    \ $operation, ?array $inputData): string\n{\n$id = Uuid::v4();\n$this->opPerformanceLogger->info(json_encode([\n\
    'operation' => $operation,\n'id' => $id,\n'input_data' => $inputData ?? [],\n\
    'ts_start' => microtime(true)\n]));\nreturn (string)$id;\n}\npublic function logEndOperation(string\
    \ $operation, string $id, int $responseCode, ?array $outputData): void\n{\n$this->opPerformanceLogger->info(json_encode([\n\
    'operation' => $operation,\n'id' => $id,\n'output_data' => $outputData ?? [],\n\
    'ts_end' => microtime(true),\n'response_code' => $responseCode\n]));\n}\n}\n```\n\
    \nLet’s start within the constructor. As you can see, we have injected the `$opPerformanceLogger`\
    \ service, which implements the `Psr\\Log\\LoggerInterface` required by the Symfony’s\
    \ kernel. This service exposes two key methods:\n\n- **`logStartOperation`**:\
    \ This method should be invoked when an operation request is received. It takes\
    \ the operation name and an array of input values (or an empty array if none)\
    \ and writes the following information (as JSON) to the log file:\n    - **`operation`**:\
    \ The operation name\n    - **`id`**: An id to identify the request. Here, we\
    \ use Symfony Uid component to generate an Uuid v4 as an ID.\n    - **`input_data`**:\
    \ The received input data as an array or an empty array if no input data has been\
    \ received.\n    - **`ts_start`**: The timestamp when the operation has been received.\n\
    \n    This method returns the generated id. In the next sections, we will learn\
    \ how to carry this id within the request so that it can be used to log the operation\
    \ termination data.\n\n- **`logEndOperation`**: This method should be invoked\
    \ after the operation requested execution ends and the response has been sent\
    \ to the client. It receives the operation name, the id generated in the `logStartOperation`\
    \ method, the http response code returned to the client and the execution result\
    \ data. The method writes the following information in the log file:\n    - **`operation`**:\
    \ The operation name.\n    - **`id`**: An id to identify the request. It is the\
    \ same ID generated in the `logStartOperation` method.\n    - **`output_data`**:\
    \ The output data array or an empty array if no response data is returned to the\
    \ client. This could be the case of a 204 No Content Http Response.\n    - **`ts_end`**:\
    \ The timestamp when the operation ends.\n    - **`response_code`**: The http\
    \ response code returned to the client.\n\nWith this logger service in place,\
    \ you can leverage Symfony’s event system to automatically record both the start\
    \ and end of each API operation.\n\n### Writing to the Log When an Operation Request\
    \ Is Received\n\nWe are going to use the `kernelEvents.REQUEST` Symfony event\
    \ to discover whether an operation request has been received and, if so, write\
    \ to the log. To achieve that, we will create a new Symfony Kernel Subscriber:\n\
    \n```php\nuse App\\Api\\Input\\ApiInput;\nuse App\\Api\\Logger\\OperationPerformanceLogger;\n\
    use Symfony\\Component\\EventDispatcher\\EventSubscriberInterface;\nuse Symfony\\\
    Component\\HttpKernel\\Event\\RequestEvent;\nuse Symfony\\Component\\HttpKernel\\\
    KernelEvents;\nuse Symfony\\Component\\Serializer\\Exception\\ExceptionInterface;\n\
    use Symfony\\Component\\Serializer\\SerializerInterface;\nclass OperationPerformanceSubscriber\
    \ implements EventSubscriberInterface\n{\npublic const string OP_REQ_ATTR = 'OP_REQ';\n\
    public function __construct(\nprivate readonly SerializerInterface $serializer,\n\
    private readonly OperationPerformanceLogger $operationPerformanceLogger\n){}\n\
    public static function getSubscribedEvents(): array\n{\nreturn [\nKernelEvents::REQUEST\
    \   => ['onOperationReceived', 2]\n];\n}\npublic function onOperationReceived(RequestEvent\
    \ $event): void\n{\n$uri = $event->getRequest()->getUri();\nif(!preg_match('#\\\
    /api\\/v[1-9]{1}\\/operation#', $uri)) {\nreturn;\n}\ntry{\n$apiInput = $this->serializer->deserialize($event->getRequest()->getContent(),\
    \ ApiInput::class, 'json');\nif(!empty($apiInput->operation)) {\n$operationRequestId\
    \ = $this->operationPerformanceLogger->logStartOperation($apiInput->operation,\
    \ $apiInput->data);\n$event->getRequest()->attributes->set(self::OP_REQ_ATTR,\
    \ $operationRequestId . ':' . $apiInput->operation);\n}\n}\ncatch(ExceptionInterface\
    \ $e) {}\n}\n}\n```\n\nLet’s explore the above new subscriber. This subscriber\
    \ keeps listening to the `KernelEvents::REQUEST` event and, after catching it,\
    \ it executes the `onOperationReceived` method. This method performs the following\
    \ logic:\n\n- It checks whether the request URI matches the operation request\
    \ route path.\n- If do not, it returns and performs no extra logic.\n- If so,\
    \ it deserializes the payload to the `ApiInput` model.\n- If the are no errors\
    \ in the deserializing process, the method uses the `logStartOperation` method\
    \ from the `OperationPerformanceLogger` service to write the operation requested\
    \ information. Then, it gets the `$operationRequestId` returned by the `logStartOperation`\
    \ method and saves it into the request attributes bag so that we can use it later.\n\
    \nAs you have noticed, there is no code in the `onOperationReceived` catch block.\
    \ This is because if there are any errors after validating the received API input\
    \ payload, the client will receive a 400 Bad Request response and the request\
    \ will not continue to the handler, so it is not worth writing in the log in this\
    \ case."
  raw: "### Creating a Logging Wrapper to Log Operations Execution Information\n\n\
    In this section, we are going to explore how to inject the logger configured in\
    \ the previous section and how to use it to write to the configured file.\n\n\
    ```\nuse Psr\\Log\\LoggerInterface;\nuse Symfony\\Component\\Uid\\Uuid;\nclass\
    \ OperationPerformanceLogger\n{\npublic function __construct(\nprivate readonly\
    \ LoggerInterface $opPerformanceLogger\n){}\npublic function logStartOperation(string\
    \ $operation, ?array $inputData): string\n{\n$id = Uuid::v4();\n$this->opPerformanceLogger->info(json_encode([\n\
    'operation' => $operation,\n'id' => $id,\n'input_data' => $inputData ?? [],\n\
    'ts_start' => microtime(true)\n]));\nreturn (string)$id;\n}\npublic function logEndOperation(string\
    \ $operation, string $id, int $responseCode, ?array $outputData): void\n{\n$this->opPerformanceLogger->info(json_encode([\n\
    'operation' => $operation,\n'id' => $id,\n'output_data' => $outputData ?? [],\n\
    'ts_end' => microtime(true),\n'response_code' => $responseCode\n]));\n}\n}\n```\n\
    \nLet’s start within the constructor. As you can see, we have injected the *$opPerformanceLogger*\
    \ service, which implements the “Psr\\Log\\LoggerInterface” required by the Symfony’s\
    \ kernel. This service exposes two key methods:\n\n*   **logStartOperation**:\
    \ This method should be invoked when an operation request is received. It takes\
    \ the operation name and an array of input values (or an empty array if none)\
    \ and writes the following information (as JSON) to the log file:\n    *   **operation**:\
    \ The operation name\n\n    *   **id**: An id to identify the request. Here, we\
    \ use Symfony Uid component to generate an Uuid v4 as an ID.\n\n    *   **input_data**:\
    \ The received input data as an array or an empty array if no input data has been\
    \ received.\n\n    *   **ts_start**: The timestamp when the operation has been\
    \ received.\n\n    This method returns the generated id. In the next sections,\
    \ we will learn how to carry this id within the request so that it can be used\
    \ to log the operation termination data.\n\n*   **logEndOperation**: This method\
    \ should be invoked after the operation requested execution ends and the response\
    \ has been sent to the client. It receives the operation name, the id generated\
    \ in the **logStartOperation** method, the http response code returned to the\
    \ client and the execution result data. The method writes the following information\
    \ in the log file:\n    *   **operation**: The operation name.\n\n    *   **id**:\
    \ An id to identify the request. It is the same ID generated in the **logStartOperation**\
    \ method.\n\n    *   **output_data**: The output data array or an empty array\
    \ if no response data is returned to the client. This could be the case of a 204\
