    \n648XCH08.qxd 10/31/06 10:07 PM 第 267 页\n\n# 第 8 章\n\n## 购物车\n\n欢迎进入开发的第二阶段！在此阶段，您将开始改进已有的、功能完善的电子商务网站，并添加新功能。\n\
    \n那么，具体可以改进哪些方面呢？如果您快速浏览一下网络上的热门电子商务网站，不难找到答案。它们为用户提供个性化体验、产品推荐、记住客户偏好，并拥有许多其他功能，使网站令人难忘，并让用户不购买些东西就难以离开。\n\
    \n在开发的第一阶段，您大量依赖第三方支付处理器（PayPal）提供的集成购物车，因此没有在数据库中记录任何购物车或订单信息。目前，您的网站无法显示“最受欢迎”产品列表或任何关于已售产品的信息，因为在此阶段，您并未追踪售出的产品。这使得实施这些改进变得不可能。\n\
    \n显然，将订单信息保存在数据库中是您的首要任务。事实上，您接下来想要实现的大多数功能都依赖于已售产品的记录。为了实现这一功能，在本章中，您将实现一个自定义购物车，它将数据存储在本地\
    \ `hatshop` 数据库中。与您无法控制且难以保存到数据库中进行进一步处理和分析的 PayPal 购物车相比，这将为您提供更大的灵活性。使用自定义购物车时，当访客点击某个产品的“添加到购物车”按钮时，该产品将被添加到访客的购物车中。当访客点击“查看购物车”按钮时，将显示如图\
    \ 8-1 所示的页面。\n\n**267**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
    ![](img/00113.png)\n\n![](img/00068.png)\n\n648XCH08.qxd 10/31/06 10:07 PM 第 268\
    \ 页\n\n**268**\n\n第 8 章 ■ 购物车\n\n**图 8-1.** *HatShop 购物车*\n\n我们的购物车将具备“稍后购买”功能，允许访客将购物车中的产品移到一个单独的列表中，以防他们只想购买部分商品（见图\
    \ 8-2）。\n\n**图 8-2.** *HatShop“稍后购买”功能*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00111.png)\n\n648XCH08.qxd 10/31/06 10:07 PM 第 269 页\n\n第 8 章 ■ 购物车\n\
    \n**269**\n\n除购物车页面外，在所有其他页面中，访客将能在屏幕左侧看到购物车摘要，如图 8-3 所示。\n\n在本章结束时，您将拥有一个功能完整的购物车，但访客还无法对其中的商品下订单。您将在下一章中添加此功能，届时将实现一个自定义结账流程——“继续结账”按钮。当访客点击此按钮时，购物车中的产品将作为单独的订单保存到数据库中，访客将被重定向到一个付款页面。如果您在开发的第一阶段集成了\
    \ PayPal 购物车，从下一章开始，PayPal 将仅用于处理付款，您将不再依赖其购物车。\n\n具体来说，在本章中，您将学习如何：\n\n- 设计购物车\n\
    - 添加新的数据库表以存储购物车记录\n- 创建与新表一起使用的数据层函数\n- 实现业务层方法\n- 实现“添加到购物车”和“查看购物车”按钮（如果您在\
    \ PayPal 章节中已经实现了它们，则使其与新购物车协同工作）\n- 实现自定义购物车的表示层部分\n\n**图 8-3.** *显示购物车摘要*\n\n\
    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH08.qxd 10/31/06 10:07\
    \ PM 第 270 页\n\n**270**\n\n第 8 章 ■ 购物车\n\n## 设计购物车\n\n在开始编写购物车代码之前，让我们仔细看看您将要做什么。\n\
    \n首先，请注意，在此网站阶段，您不会有任何用户个性化功能。\n"
- fmt: "# 排版后内容\n\nIt doesn’t matter who buys your products at this point, you just\
    \ want to know what products were sold and when. When you add user customization\
    \ features in the later chapters, your task will be fairly simple: when the visitor\
    \ authenticates, the visitor’s temporary (anonymous) shopping cart will be associated\
    \ with the visitor’s account. Because you work with temporary shopping carts,\
    \ even after implementing the customer account system, the visitor isn’t required\
    \ to supply additional information (log in) earlier than necessary.\n\nProbably\
    \ the best way to store shopping cart information is to generate a unique `cart\
    \ ID` for each shopping cart and save it on the visitor’s computer as a cookie.\
    \ When the visitor clicks the Add to Cart button, the server first verifies whether\
    \ the cookie exists on the client computer. If it does, the specified product\
    \ is added to the existing cart. Otherwise, the server generates another `cart\
    \ ID`, saves it to the client’s cookie, and then adds the product to the newly\
    \ generated shopping cart.\n\nIn the previous chapter, you created the componentized\
    \ templates by starting with the presentation layer components. However, this\
    \ strategy doesn’t work here because now you need to do a bit more design work\
    \ beforehand, so we’ll take the more common approach and start with the database\
    \ tier.\n\n## Storing Shopping Cart Information\n\nYou will store all the information\
    \ from the shopping carts in a single table named `shopping_cart`. Follow the\
    \ next exercise to create the `shopping_cart` table.\n\n### Exercise: Creating\
    \ the `shopping_cart` Table\n\n**1.** Load pgAdmin III, and connect to the `hatshop`\
    \ database.\n\n**2.** Click Tools ➤ Query tool (or click the SQL button on the\
    \ toolbar). A new query window should appear.\n\n**3.** Use the query tool to\
    \ execute this code, which creates the `shopping_cart` table in your `hatshop`\
    \ database:\n\n```sql\n-- Create shopping_cart table\n\nCREATE TABLE shopping_cart\n\
    (\n  cart_id CHAR(32) NOT NULL,\n  product_id INTEGER NOT NULL,\n  quantity INTEGER\
    \ NOT NULL,\n  buy_now BOOLEAN NOT NULL DEFAULT true,\n  added_on TIMESTAMP NOT\
    \ NULL,\n  CONSTRAINT pk_cart_id_product_id PRIMARY KEY (cart_id, product_id),\n\
    \  CONSTRAINT fk_product_id FOREIGN KEY (product_id) REFERENCES product (product_id)\n\
    \    ON UPDATE RESTRICT ON DELETE RESTRICT\n);\n```\n\n### How It Works: The `shopping_cart`\
    \ Table\n\nLet’s look at each field in `shopping_cart`:\n\n- `cart_id` stores\
    \ a unique ID that you’ll generate for each shopping cart. This is not an integer\
    \ field like other ID columns you’ve created so far. It is a `char` field and\
    \ will be filled with an MD5 hash of a unique ID, which will be a 32-character\
    \ string.\n- `product_id` references the ID of an existing product.\n- `quantity`\
    \ stores the product’s shopping cart quantity.\n- `buy_now` helps you implement\
    \ the Save for Later functionality. The `buy_now` field is a boolean type with\
    \ the default value of `true`. When the customer proceeds to check out, only the\
    \ products that have this value set to `true` are added to the order, whereas\
    \ the Save for Later products remain in the shopping cart. This feature is useful\
    \ because it allows the visitor to keep more products in the shopping cart than\
    \ he or she can afford (or wants to buy) at the moment and allows the visitor\
    \ to order only a selection of the products in the shopping cart.\n- `added_on`\
    \ will be populated with the current date when a new product is added to the cart\
    \ and is useful when deleting old shopping carts from the database.\n\n> **Note**\
    \ The `shopping_cart` table has a composite primary key formed of both `cart_id`\
    \ and `product_id` fields. This makes sense because a particular product can exist\
    \ only once in a particular shopping cart, so a `(cart_id, product_id)` pair shouldn’t\
    \ appear more than once in the table.\n\n## Implementing the Data Tier\n\nIn this\
    \ section, you’ll create the usual functions that query the database for the shopping\
    \ cart operation. Before going further with the code, let’s review the functions\
    \ you’ll add to the `hatshop` database:\n\n- `shopping_cart_add_product` adds\
    \ a product to the shopping cart.\n- `shopping_cart_update` modifies shopping\
    \ cart products’ quantities.\n- `shopping_cart_remove_product` deletes a record\
    \ from the visitor’s shopping cart.\n- `shopping_cart_get_products` gets the list\
    \ of products in the specified shopping cart and is called when you want to show\
    \ the user his shopping cart.\n- `shopping_cart_get_saved_products` gets the list\
    \ of products saved in the shopping cart to buy later and is called when the user\
    \ requests to view the shopping cart details page.\n- `shopping_cart_get_total_amount`\
    \ returns the total costs of the products in the specified product cart.\n- `shopping_cart_save_product_for_later`\
    \ saves a product to a shopping cart for later purchase.\n- `shopping_cart_move_product_to_cart`\
    \ moves a product from the Save for Later list back to the “main” shopping cart.\n\
    \nNow let’s create each method one at a time in the following exercise.\n\n###\
    \ Exercise: Implementing the Functions\n\n**1.** Load pgAdmin III, and connect\
    \ to the `hatshop` database.\n\n**2.** Click Tools ➤ Query tool (or click the\
    \ SQL button on the toolbar). A new query window should appear.\n\n**3.** Use\
    \ the query tool to execute this code, which creates the `shopping_cart_add_product`\
    \ function in your `hatshop` database:\n\n```sql\n-- Create shopping_cart_add_product\
    \ function\n\nCREATE FUNCTION shopping_cart_add_product(CHAR(32), INTEGER) RETURNS\
    \ VOID\nLANGUAGE plpgsql AS $$\nDECLARE\n  inCartId ALIAS FOR $1;\n  inProductId\
    \ ALIAS FOR $2;\n  productQuantity INTEGER;\nBEGIN\n  SELECT INTO productQuantity\n\
    \    quantity\n  FROM shopping_cart\n  WHERE cart_id = inCartId AND product_id\
    \ = inProductId;\n  IF productQuantity IS NULL THEN\n    INSERT INTO shopping_cart(cart_id,\
    \ product_id, quantity, added_on)\n    VALUES (inCartId, inProductId, 1, NOW());\n\
    \  ELSE\n    UPDATE shopping_cart\n    SET quantity = quantity + 1, buy_now =\
    \ true\n    WHERE cart_id = inCartId AND product_id = inProductId;\n  END IF;\n\
    END;\n$$;\n```\n\nThe `shopping_cart_add_product` function is called when the\
    \ visitor clicks on the Add to Cart button for one of the products. If the selected\
    \ product already exists in the shopping cart, its quantity is increased by one;\
    \ if the product doesn't exist, one unit is added to the shopping cart (a new\
    \ `shopping_cart` record is created).\n\nNot surprisingly, `shopping_cart_add_product`\
    \ receives two parameters, namely `inCartId` and, of course, `inProductId`.\n\n\
    The function first determines whether the product mentioned by `inProductId` exists\
    \ in the cart referred to by the `inCartId`. It does this by testing whether an\
    \ `(inCartId, inProductId)` pair is in the `shopping_cart` table. If the product\
    \ is in the cart, `shopping_cart_add_product` updates the current product quantity\
    \ in the shopping cart by adding one unit. Otherwise, `shopping_cart_add_product`\
    \ creates a new record for the product in `shopping_cart` with a default quantity\
    \ of 1 but not before checking whether the mentioned `inProductId` is valid.\n\
    \nThe `NOW()` PostgreSQL function retrieves the current date and manually populates\
    \ the `added_on` field.\n\n**4.** Use the query tool to execute the following\
    \ code, which creates the `shopping_cart_update` function in your `hatshop` database:\n\
    \n```sql\n-- Create shopping_cart_update function\n\nCREATE FUNCTION shopping_cart_update(CHAR(32),\
    \ INTEGER[], INTEGER[])\nRETURNS VOID\nLANGUAGE plpgsql AS $$\nDECLARE\n  inCartId\
    \ ALIAS FOR $1;\n  inProductIds ALIAS FOR $2;\n  inQuantities ALIAS FOR $3;\n\
    BEGIN\n  FOR i IN array_lower(inQuantities, 1)..array_upper(inQuantities, 1) LOOP\n\
    \    IF inQuantities[i] > 0 THEN\n      UPDATE shopping_cart\n      SET quantity\
    \ = inQuantities[i], added_on = NOW()\n```"
