- fmt: "### SPL Types\n\n`SPL` (or Standard PHP Library) is a library of additional\
    \ types to augment those native to core PHP. There are some popular classes (like\
    \ `LogicException` and `ArrayObject`). Some of the `SPL` ships with *standard*\
    \ PHP installations. The parts we’re going to look at shortly do not…\n\nYou can\
    \ find these mystery libraries at **http://www.php.net/manual/en/book.spl-types.php**.\n\
    \nThis section assumes you’re using the Vagrant box explained earlier. If not,\
    \ please set that up first. These commands are Linux-specific and depend on the\
    \ pre-installed modules explained earlier.\n\n#### Installing SPL Types\n\nTo\
    \ install them, run the following commands:\n\n```\n1 $ sudo apt-get install libpcre3-dev\
    \ php5-dev\n\n3 Reading package lists... Done\n4 Building dependency tree\n5 Reading\
    \ state information... Done\n6 The following extra packages will be installed:\n\
    7   autoconf automake autotools-dev build-essential...\n```\n\n```\n1 $ sudo pecl\
    \ install SPL_Types\n\n3 downloading SPL_Types-0.4.0.tgz ...\n4 Starting to download\
    \ SPL_Types-0.4.0.tgz (8,388 bytes)\n5 .....done: 8,388 bytes\n6 6 source files,\
    \ building\n7 running: phpize...\n```\n\nThese two commands install the pre-requisites\
    \ for compiling `PECL` extensions. `PECL` is a repository just like `PEAR`. If\
    \ you’ve heard of neither, then don’t worry. All you need to know is that the\
    \ `SPL` Types are hosted here, so to install them we need to be able to compile\
    \ `PECL` extensions.\n\n```\n1 $ sudo bash -c \"echo extension=spl_types.so >>\
    \ /etc/php5/cli/php.ini\"\n```\n\nThis command appends `extension=spl_types.so`\
    \ to the `php.ini` file (as per the installation instructions).\n\n```\n1 $ sudo\
    \ service php5-fpm restart\n\n3 php5-fpm stop/waiting\n4 php5-fpm start/running,\
    \ process...\n```\n\nThis command restarts `PHP-FPM` - the process that interprets\
    \ PHP command line instructions and `Nginx` web requests. These commands should\
    \ have installed the `SPL` Types, but just to be sure, run the following command:\n\
    \n```\n1 $ php -i | grep SPL_Types\n2 SPL_Types\n```\n\nIf you see that `SPL_Types`\
    \ line, then you should be good to go!\n\n#### Using SPL Types\n\nLet’s look at\
    \ a few examples of how these classes can be used:\n\n```\n 1 <?php\n\n 3 class\
    \ NumberType extends SplFloat\n 4 {\n 5   /**\n 6    * @return float\n 7    */\n\
    \ 8   public function toInteger()\n 9   {\n10     return round($this);\n11   }\n\
    \n13   /**\n14    * @return string\n15    */\n16   public function toString()\n\
    17   {\n18     return (string) $this;\n19   }\n20 }\n\n22 $number = new NumberType(13.86);\n\
    \n24 print $number->toInteger(); // 14\n25 print $number->toString();  // \"13.86\"\
    \n\n27 print (float) $number + 1.00; // 14.86\n28 print $number * 12;        \
    \   // 156\n```\n\nThe `toInteger` and `toString` methods do similar things to\
    \ the box classes. The magic happens when we do basic arithmetic with the `$number`\
    \ object. `SPL` Types are automatically unboxed when they are used in arithmetic\
    \ expressions, or cast or concatenated. Any operator that would normally with\
    \ with a scalar type will work with the corresponding `SPL` Type.\n\nHere’s another\
    \ example:\n\n```\n 1 <?php\n\n 3 class StringType extends SplString\n 4 {\n 5\
    \   /**\n 6    * @param int   $start\n 7    * @param mixed $length\n 8    *\n\
    \ 9    * @return StringType\n10    */\n11   public function slice($start = 0,\
    \ $length = null)\n12   {\n13     if ($length === null) {\n14       return new\
    \ static(substr($this, $start));\n15     }\n\n17     return new static(substr($this,\
    \ $start, $length));\n18   }\n19 }\n\n21 $string = new StringType(\"Hello World\"\
    );\n\n23 print $string->slice(6); // \"World\"\n```\n\nWe can design our types\
    \ so that they return new instances. This gives us a simple *chaining* interface.\n\
    \nBe careful when assuming the return type of native PHP functions. Be sure to\
    \ check them before the call to `new static()` or you may encounter fatal errors.\n\
    \n### Scalar Objects\n\n[Nikita Popov](https://twitter.com/nikita_ppv) is a prolific\
    \ contributor to PHP (both core and user-land). He’s made libraries such as [PHP-Parser](https://github.com/nikic/PHP-Parser)\
    \ which is used all over the web, and in popular frameworks (like [Laravel](http://laravel.com)).\
    \ He’s championed many multiple RFCs, which have become parts of core PHP.\n\n\
    He’s also created a custom extension which allows the registration of custom type\
    \ handlers. You can find it at [https://github.com/nikic/scalar_objects](https://github.com/nikic/scalar_objects).\n\
    \nWe’re going to install and use this module to get even closer to our ideal type\
    \ handling situation…\n\nThis section assumes you’re using the Vagrant box explained\
    \ earlier. If not, please set that up first. These commands are Linux-specific\
    \ and depend on the pre-installed modules explained earlier.\n\n#### Installing\
    \ Scalar Objects\n\nFirst up, we need to install the `Git` command-line tool:\n\
    \n```\n1 $ sudo apt-get install git\n\n3 Reading package lists... Done\n4 Building\
    \ dependency tree\n5 Reading state information... Done\n6 The following extra\
    \ packages will be installed:\n7   git-man liberror-perl...\n```\n\nFollowing\
    \ this, we can clone and build the extension:\n\n```\n1 $ git clone https://github.com/nikic/scalar_objects.git\n\
    \n3 Cloning into 'scalar_objects'...\n4 remote: Reusing existing pack: 213, done.\n\
    5 remote: Total 213 (delta 0), reused 0 (delta 0)\n6 Receiving objects: 100% (213/213),\
    \ 75.36 KiB, done.\n7 Resolving deltas: 100% (112/112), done.\n```\n\n```\n1 $\
    \ cd scalar_objects && phpize && ./configure && make && sudo make install\n```\n\
    \nThese commands will install the Scalar Objects extension, but we still need\
    \ to add it to the configuration: `$ sudo bash -c \"echo extension=scalar_objects.so\
    \ >> /etc/php5/cli/php.ini\"`\n\nThis command resembles the one we used to install\
    \ the `SPL` Types. We’re essentially doing the same thing, so we need to restart\
    \ `PHP5-FPM`:\n\n```\n1 $ sudo service php5-fpm restart\n\n3 php5-fpm stop/waiting\n\
    4 php5-fpm start/running, process...\n```\n\nThis should complete the process\
    \ of installing the Scalar Objects extension, but we can make sure it’s working\
    \ by running the following command:\n\n```\n1 $ php -i | grep scalar\n\n3 scalar_objects\n\
    4 scalar-objects support => enabled\n```\n\n#### Using Scalar Objects\n\nThe new\
    \ extension adds a method we can use to register these type handlers. This is\
    \ how you we can use it:\n\n```\n 1 <?php\n\n 3 class StringHandler\n 4 {\n 5\
    \   /**\n 6    * @param int   $start\n 7    * @param mixed $length\n 8    *\n\
    \ 9    * @return StringType\n10    */\n11   public function slice($start = 0,\
    \ $length = null)\n12   {\n13     if ($length === null) {\n14       return substr($this,\
    \ $start);\n15     }\n\n17     return substr($this, $start, $length);\n18   }\n\
    19 }\n\n21 register_primitive_type_handler(\"string\", \"StringHandler\");\n\n\
    23 $string = \"Hello World\";\n\n25 print $string->slice(6); // \"World\"\n```\n\
    \nThis is easier than boxing scalar types, as we don’t have to pull *native* types\
    \ out of class instances. This is easier than `SPL` Types, as we don’t have to\
    \ put *native* types into class instances.\n\nThere are seven supported types:\n\
    \n*   `null`\n*   `bool`\n*   `int`\n*   `float`\n*   `string`\n*   `array`\n\
    *   `resource`\n\nYou may be wondering whether this extension plays nicely with\
    \ `SPL` Types. The answer is *probably not*. You shouldn’t mix these extensions\
    \ and since the Scalar Objects extension does everything `SPL` Types you shouldn’t\
    \ need both.\n\n### Zephir\n\n`Zephir` is a framework for writing compilable and\
    \ installable PHP extensions, using a PHP superset language sharing some similarity\
    \ with C code. `Zephir` isn’t strictly a PHP extension, nor are Zephir libraries\
    \ written in true PHP.\n\nIt’s part of the same collective from which the `Phalcon`\
    \ framework comes, and `Phalcon` is itself a PHP extension. This should get interesting!"
