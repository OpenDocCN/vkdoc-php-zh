    \ and Thumping\"));\n$collection->add(new Venue(-1, \"Eeezy\"));\n$collection->add(new\
    \ Venue(-1, \"Duck and Badger\"));\nforeach ($collection as $venue) {\n    print\
    \ $venue->getName() . \"\\n\";\n}\n```\n\n使用我在此构建的实现，你无法对该集合做更多其他操作；然而，添加 `elementAt()`、`deleteAt()`、`count()`\
    \ 以及类似的方法是一个简单的任务。（而且很有趣，享受其中吧！）\n\n注意，我使用了 `::class` 语法来获取类的完全限定字符串表示。这个特性自 PHP\
    \ 5.5 起才可用。在此之前，我必须小心地自己提供完整的 `namespace` 路径。\n"
- fmt: '### Using a Generator in Place of the Iterator Interface


    Although it’s not difficult to do, implementing an `Iterator` interface can be
    a chore. As of PHP 5.5 you can use a simpler (and often more memory efficient)
    mechanism called a generator. A generator is a function that can return multiple
    values, usually in a loop. Instead of using the `return` keyword, a generator
    function will use `yield`. When the PHP processor sees `yield` in a function,
    it will return an `Iterator` of type `Generator` to calling code. This new object
    can be treated like any `Iterator`. Cleverly, the loop that yielded a value using
    `yield` will continue to run, but only as the `Generator` is asked for its `next()`
    value. Practically speaking, the flow looks like this:


    - Client code calls a generator function (a function containing a `yield` keyword)

    - The generator function contains a loop or a repetitive process which returns
    multiple values via `yield`. On encountering `yield`, the PHP processor creates
    a `Generator` object and returns it to client code

    - The repetitive process in the generator function is temporarily frozen at this
    point

    - Client code takes this `Generator` and treats like any `Iterator`—probably passing
    it to `foreach`

    - With every iteration of `foreach`, the `Generator` object gets the next value
    from the generator function


    So I could use this feature for my `Collection` base class. Because a generator
    function (or method) returns a `Generator`, the `Collection` itself would no longer
    be iterable—instead, I’ll use a generator method as a factory:


    ```php

    // src/ch13/batch01/GenCollection.php

    // listing 13.08

    abstract class GenCollection

    {

    protected $mapper;

    protected $total = 0;

    protected $raw = [];

    private $result;

    private $pointer = 0;

    private $objects = [];

    public function __construct(array $raw = [], Mapper $mapper = null)

    {

    $this->raw = $raw;

    $this->total = count($raw);

    if (count($raw) && is_null($mapper)) {

    throw new AppException("need Mapper to generate objects");

    }

    $this->mapper = $mapper;

    }

    public function add(DomainObject $object)

    {

    $class = $this->targetClass();

    if (! ($object instanceof $class )) {

    throw new AppException("This is a {$class} collection");

    }

    $this->notifyAccess();

    $this->objects[$this->total] = $object;

    $this->total++;

    }

    public function getGenerator()

    {

    for ($x = 0; $x < $this->total; $x++) {

    yield $this->getRow($x);

    }

    }

    abstract public function targetClass(): string;

    protected function notifyAccess()

    {

    // deliberately left blank!

    }

    private function getRow($num)

    {

    $this->notifyAccess();

    if ($num >= $this->total || $num < 0) {

    return null;

    }

    if (isset($this->objects[$num])) {

    return $this->objects[$num];

    }

    if (isset($this->raw[$num])) {

    $this->objects[$num] = $this->mapper->createObject($this->raw[$num]);

    return $this->objects[$num];

    }

    }

    }

    ```


    As you can see, this makes for a more compact base class. I have been able to
    do away with `current()` and `reset()`, and so on. The one drawback is that the
    `Collection` itself can no longer be iterated directly. Instead, client code must
    call `getGenerator()` and iterate the `Generator` object that `yield` causes to
    be returned, like this:


    ```php

    // listing 13.09

    $genvencoll = new GenVenueCollection();

    $genvencoll->add(new Venue(-1, "Loud and Thumping"));

    $genvencoll->add(new Venue(-1, "Eeezy"));

    $genvencoll->add(new Venue(-1, "Duck and Badger"));

    $gen = $genvencoll->getGenerator();

    foreach ($gen as $wrapper) {

    print_r($wrapper);

    }

    ```


    Because I’d rather not add this additional layer to my system, I’m going to stick
    with the implemented `Iterator` version for this example. However, generators
    are really the way to go for making lightweight iterators with the minimum of
    setup.


    ### Acquiring Collection Objects


    We have already seen that I have decided to use the `Registry` as a factory for
    Collections. I also use it for serving up `Mapper` objects. Here is the code:


    ```php

    // listing 13.10

    public function getVenueMapper(): VenueMapper

    {

    return new VenueMapper();

    }

    public function getSpaceMapper(): SpaceMapper

    {

    return new SpaceMapper();

    }

    public function getEventMapper(): EventMapper

    {

    return new EventMapper();

    }

    public function getVenueCollection(): VenueCollection

    {

    return new VenueCollection();

    }

    public function getSpaceCollection(): SpaceCollection

    {

    return new SpaceCollection();

    }

    public function getEventCollection(): EventCollection

    {

    return new EventCollection();

    }

    ```


    I’m beginning to push the boundaries of what fits neatly in the `Registry`. A
    few more getter methods, and it will be time to refactor this code to use the
    Abstract Factory pattern instead. I’ll leave that to you, though (head back to
    Chapter 9 if you need a reminder).


    Now that accessing `Mapper` and `Collection` classes is so easy, the `Venue` class
    can be extended to manage the persistence of `Space` objects. The class provides
    methods for adding individual `Space` objects to its `SpaceCollection` or for
    switching in an entirely new `SpaceCollection`:


    ```php

    // listing 13.11

    // Venue

    public function getSpaces(): SpaceCollection

    {

    if (is_null($this->spaces)) {

    $reg = Registry::instance();

    $this->spaces = $reg->getSpaceCollection();

    }

    return $this->spaces;

    }

    public function setSpaces(SpaceCollection $spaces)

    {

    $this->spaces = $spaces;

    }

    public function addSpace(Space $space)

    {

    $this->getSpaces()->add($space);

    $space->setVenue($this);

    }

    ```


    The `setSpaces()` operation currently takes it on trust that all `Space` objects
    in the collection refer to the current `Venue`. It would be easy enough to add
    checking to the method. This version keeps things simple though. Notice that I
    only instantiate the `$spaces` property when `getSpaces()` is called. Later on,
    I’ll demonstrate how you can extend this lazy instantiation to limit database
    requests.


    The `VenueMapper` needs to set up a `SpaceCollection` for each `Venue` object
    it creates:


    ```php

    // listing 13.12

    // VenueMapper

    protected function doCreateObject(array $array): DomainObject

    {

    $obj = new Venue(

    (int)$array[''id''],

    $array[''name'']

    );

    $spacemapper = new SpaceMapper();

    $spacecollection = $spacemapper->findByVenue($array[''id'']);

    $obj->setSpaces($spacecollection);

    return $obj;

    }

    ```


    The `VenueMapper::doCreateObject()` method gets a `SpaceMapper` and acquires a
    `SpaceCollection` from it. As you can see, the `SpaceMapper` class implements
    a `findByVenue()` method. This brings us to the queries that generate multiple
    objects. For the sake of brevity, I omitted the `Mapper::findAll()` method from
    the original listing for `woo\mapper\Mapper`. Here it is restored:


    ```php

    // listing 13.13

    // Mapper

    public function findAll(): Collection

    {

    $this->selectAllStmt()->execute([]);

    return $this->getCollection(

    $this->selectAllStmt()->fetchAll()

    );

    }

    abstract protected function selectAllStmt(): \PDOStatement;

    abstract protected function getCollection(array $raw): Collection;

    ```


    This method calls a child method: `selectAllStmt()`. Like `selectStmt()`, this
    should contain a prepared statement object primed to acquire all rows in the table.
    Here’s the `PDOStatement` object as created in the `SpaceMapper` class:


    ```php

    // listing 13.14

    // SpaceMapper::__construct()

    $this->selectAllStmt = $this->pdo->prepare(

    "SELECT * FROM space"

    );

    $this->findByVenueStmt = $this->pdo->prepare(

    "SELECT * FROM space where venue=?"

    );

    ```


    I included another statement here, `$findByVenueStmt`, which is used to locate
    `Space` objects specific to an individual `Venue`.


    The `findAll()` method calls another new method, `getCollection()`, passing it
    its found data. Here is `SpaceMapper::getCollection()`:'
