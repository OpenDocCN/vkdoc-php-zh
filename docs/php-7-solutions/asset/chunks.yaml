- fmt: '# How PHP has Grown


    PHP started out in 1995 with rather modest ambitions. It was originally called
    Personal Home Page Tools (`PHP Tools`). One of its main goals was to create a
    guestbook by gathering information from an online form and displaying it on a
    web page. Within three years, it was decided to drop Personal Home Page from the
    name, because it sounded like something for hobbyists and didn’t do justice to
    the range of sophisticated features that had since been added. That left the problem
    of what the initials PHP should stand for. In the end, it was decided to call
    it PHP Hypertext Preprocessor—a rather ugly choice, which is why most people simply
    call it `PHP`.


    PHP has continued to develop over the years, adding new features all the time.
    In addition to being used by some of the biggest web sites, it’s the language
    that drives highly popular frameworks and content management systems (`CMSs`)
    such as Laravel (`https://laravel.com/`), Drupal (`http://drupal.org/`), and WordPress
    (`http://wordpress.org/`).


    One of the language’s great attractions is that it remains true to its roots.
    Although it has support for sophisticated object-oriented programming, you can
    start using it without diving into complex theory. PHP’s original creator, Rasmus
    Lerdorf, once described it as “a very programmer-friendly scripting language suitable
    for people with little or no programming experience as well as the seasoned web
    developer who needs to get things done quickly.” You can start writing useful
    scripts right away, yet be confident in knowing that you’re using a technology
    with the capability to develop industrial-strength applications.


    ### Note

    Although PHP 7 is mostly backward compatible with PHP 5, much of the code in this
    book uses features that are new to PHP 7. PHP 6 was never released officially.


    # How PHP Makes Pages Dynamic


    PHP was originally designed to be embedded in the HTML of a web page, and that’s
    the way it’s often still used. For example, to display the current year in a copyright
    notice, you could put this in your footer:


    ```

    &copy;  PHP 7 Solutions

    ```


    On a PHP-enabled web server, the code between the `<?php` and `?>` tags is automatically
    processed and displays the year like this:


    ![images/332054_4_En_1_Chapter/332054_4_En_1_Figa_HTML.jpg](images/332054_4_En_1_Chapter/332054_4_En_1_Figa_HTML.jpg)


    This is only a trivial example, but it illustrates some of the advantages of using
    PHP:


    * Anyone accessing your site after the stroke of midnight on New Year’s Day sees
    the correct year.

    * The date is calculated by the web server, so it’s not affected if the clock
    in the user’s computer is set incorrectly.


    Although it’s convenient to embed PHP code in HTML like this, it’s repetitive
    and can lead to mistakes. It can also make your web pages difficult to maintain,
    particularly once you start using more complex PHP code. Consequently, it’s common
    practice to store a lot of dynamic code in separate files and then use PHP to
    build your pages from the different components. The separate files—or *include
    files*, as they’re usually called—can contain only PHP, only HTML, or a mixture
    of both.


    As a simple example, you can put your web site’s navigation menu in an include
    file and use PHP to include it in each page. Whenever you need to change the menu,
    you edit only the include file, and the changes are automatically reflected in
    every page that includes the menu. Just imagine how much time that saves on a
    web site with dozens of pages!


    With an ordinary HTML page, the content is fixed by the web developer at design
    time and uploaded to the web server. When somebody visits the page, the web server
    simply sends the HTML and other assets, such as images and the style sheet. It’s
    a simple transaction—the request comes from the browser, and the fixed content
    is sent back by the server. When you build web pages with PHP, much more goes
    on. Figure 1-1 shows what happens.


    ![images/332054_4_En_1_Chapter/332054_4_En_1_Fig1_HTML.png](images/332054_4_En_1_Chapter/332054_4_En_1_Fig1_HTML.png)


    Figure 1-1. The web server builds each PHP page dynamically in response to a request


    When a PHP-driven web site is visited, it sets in motion the following sequence
    of events:


    1. The browser sends a request to the web server.

    2. The web server hands the request to the PHP engine, which is embedded in the
    server.

    3. The PHP engine processes the code. In many cases, it might also query a database
    before building the page.

    4. The server sends the completed page back to the browser.


    This process usually takes only a fraction of a second, so the visitor to a PHP
    web site is unlikely to notice any delay. Because each page is built individually,
    PHP sites can respond to user input, displaying different content when a user
    logs in or showing the results of a database search.


    ## Creating pages that think for themselves


    PHP is a server-side language. The PHP code remains on the web server. After it
    has been processed, the server sends only the output of the script. Normally,
    this is HTML, but PHP can also be used to generate other web languages, such as
    `JSON` (`JavaScript Object Notation`) or `XML` (`Extensible Markup Language`).


    PHP enables you to introduce logic into your web pages that is based on alternatives.
    Some decisions are made using information that PHP gleans from the server: the
    date, the time, the day of the week, information in the page’s URL, and so on.
    If it’s Wednesday, it will show Wednesday’s TV schedules. At other times, decisions
    are based on user input, which PHP extracts from online forms. If you have registered
    with a site, it will display personalized information—that sort of thing.


    # How Hard is PHP to Use and Learn?


    PHP isn’t rocket science, but don’t expect to become an expert in 5 minutes. Perhaps
    the biggest shock to newcomers is that PHP is far less tolerant of mistakes than
    browsers are with HTML. If you omit a closing tag in HTML, most browsers will
    still render the page. If you omit a closing quote, semicolon, or brace in PHP,
    you’ll get an uncompromising error message like the one shown in Figure 1-2. This
    affects all programming languages, such as JavaScript and `C#`, not just PHP.


    ![images/332054_4_En_1_Chapter/332054_4_En_1_Fig2_HTML.jpg](images/332054_4_En_1_Chapter/332054_4_En_1_Fig2_HTML.jpg)


    Figure 1-2. Server-side languages like PHP are intolerant of most coding errors


    If you’re the sort of web designer or developer who uses a visual design tool
    like Adobe Dreamweaver and never looks at the underlying code, it’s time to rethink
    your approach. Mixing PHP with poorly structured HTML is likely to lead to problems.
    PHP uses loops to perform repetitive tasks, such as displaying the results of
    a database search. A loop repeats the same section of code—usually a mixture of
    PHP and HTML—until all results have been displayed. If you put the loop in the
    wrong place or if your HTML is badly structured, your page is likely to collapse
    like a house of cards.


    If you’re not already in the habit of doing so, it’s a good idea to check your
    pages using the World Wide Web Consortium’s (`W3C`) Markup Validation Service
    (`http://validator.w3.org/unicorn`).


    ### Note

    The `W3C` is the international body that develops standards such as HTML and CSS
    to ensure the long-term growth of the Web. It’s led by the inventor of the World
    Wide Web, Tim Berners-Lee. To learn about the `W3C`’s mission, see `www.w3.org/Consortium/mission`.'
