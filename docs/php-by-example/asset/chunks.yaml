    ## 多维数组


    数组的元素也可以是数组。而这些内部数组的元素也可以是数组，依此类推。在这种情况下，必须使用多个索引或键来访问内部数组的元素：第一个键允许访问内部数组，第二个键允许访问该内部数组的元素，并且这个链条可以继续。如果是这样，我们通常称之为多维数组。但是，在PHP中，由于数组元素可以是不同类型，这个概念相当模糊。我们基于这样一个事实：多维数组是一个其元素中包含数组的数组。


    从技术角度来看，创建多维数组并不复杂。在创建初始（外部）数组时，将一个或多个元素描述为数组即可。清单[4-7](#613529_1_En_4_Chapter.xhtml#PC16)显示了一个小例子。


    ```

    array("X"=>2,"Y"=>3),9=>array("D","E","F"));

    echo "数组 \$B:\n";

    // 数组的内容：

    print_r($B);

    echo "数组 \$B:\n";

    // 遍历元素：

    foreach($B as $k1=>$v1){

    foreach($v1 as $k2=>$v2){

    // 显示元素的值：

    echo "\$B[$k1][$k2] = $v2\n";

    }

    }

    ?>

    清单 4-7

    多维数组

    ```


