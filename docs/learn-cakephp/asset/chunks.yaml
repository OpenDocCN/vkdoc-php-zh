- fmt: '# Using `phpunit.xml`


    The other option to create test suites is to add them into a `/phpunit.xml.dist`
    file. This file was automatically created when we installed `cakephp` via `composer`.
    By default, PHPUnit will look for a file named either `phpunit.xml` or `phpunit.xml.dist`
    in the directory in which you run it, and it will use the values it contains to
    alter its own behavior. In the case of CakePHP, this file is in the root directory
    of our app.


    This XML file describes different settings for our tests. There is a `<testsuites>`
    section wherein you can define new test suites. Let’s add the following lines
    as a new child element of the `<testsuites>` element.


    ```

    2      src/Model/Table

    3      src/Model/Table/CommentsTableTest.php

    4      tests/TestCase/Controller/CommentsControllerTest.php

    ```


    Our new test suite’s name is `ExcitingFeature`, because we group those tests that
    are related to a new feature in what we are working on.


    There can be multiple `<directory>` elements. PHPUnit will add all tests in that
    directory recursively.


    There can be multiple `<exclude>` elements. This is not a great surprise, but
    these files will be excluded.


    There can be multiple `<file>` elements also. These files will be added to the
    test suite.


    ## Summary


    I dedicated this short chapter to testing suites. You learned how to group certain
    tests, by using the `TestSuite` object or the `phpunit.xml` file.


    # 13. Testing from Command Line


    ![A337704_2_En_13_Figa_HTML.jpg](A337704_2_En_13_Figa_HTML.jpg)


    You need the right tools to do good work


    Running tests can be time-consuming, but this doesn’t require any user interaction.
    For that reason, tests are ideal targets for automation. CakePHP has a built-in
    test shell that we’ve already used in the previous chapters. As was mentioned
    earlier, testing in the browser is boring, time-consuming, and not the best option.
    With unit tests, you can develop without touching the browser. This one thing
    can significantly shorten development time.


    ### Debug Messages


    Debug messages are written into the console, so you can see them by executing
    your tests. So, if you have `debug($result);` in your code, the output of this
    call will be available at the console.


    ### Run All Tests


    Before deployment, you are going to run all tests, to check that all is correct.
    The following command will run all your tests:


    ```

    $ cd ∼/public_html/cakeBlog

    $ vendor/bin/phpunit

    ```


    A middle-size project with good test coverage can take from thirty minutes to
    two to three hours to run.


    ### Run Test Suites


    The next level is to run test suites. This is required when you are working on
    a feature and have a test suite for that feature.


    If you used `TestSuite`, then you are going to run something such as the following:


    ```

    $ cd ∼/public_html/cakeBlog

    $ vendor/bin/phpunit tests/TestCase/AllModelTableTest.php

    ```


    If you defined your test suite in `phpunit.xml.dist`, you need the following command:


    ```

    $ cd ∼/public_html/cakeBlog

    $ vendor/bin/phpunit --testsuite ExcitingFeature

    ```


    ### Run All Tests in a File


    When you want to run all tests in a test file, for example, in your `UsersTableTest.php`
    file, you should run the following command:


    ```

    $ cd ∼/public_html/cakeBlog

    $ vendor/bin/phpunit tests/TestCase/Model/Table/UsersTableTest.php

    ```


    You will use this when you work only on one model. Your models are loosely coupled,
    so you only want to check one model.


    ### Filtering Test Cases


    During development, most of the time, you are going to run only one test on what
    you are currently working on. The `--filter` option serves this purpose.


    ```

    $ cd ∼/public_html/cakeBlog

    $ vendor/bin/phpunit --filter testDoSomething tests/TestCase/Model/Table/CategoriesTableTest.php

    ```


    ### Understanding a Failing Test’s Output


    PHPUnit shows the differences between the actual and expected results on assertions.


    We have already created `/tests/Fixture/CommentsFixture.php`, so this is the time
    to change the `$records` array.


    ```

    1  public $records = [

    2      [

    3          ''id'' => 1,

    4          ''comment'' => ''This is my first comment.'',

    5          ''user_id'' => 1,

    6          ''post_id'' => 1

    7      ],

    8      [

    9          ''id'' => 2,

    10          ''comment'' => ''This is an other comment by someone else.'',

    11          ''user_id'' => 2,

    12          ''post_id'' => 1

    13      ],

    14      [

    15          ''id'' => 3,

    16          ''comment'' => ''Call out Gouranga and be happy'',

    17          ''user_id'' => 1,

    18          ''post_id'' => 1

    19      ],

    20  ];

    ```


    So, we have three comments, all of them belonging to the first post. Comments
    1 and 3 are created by user 1; comment 2 is created by user 2.


    Add a new test function to `/tests/TestCase/Model/Table/CommentsTableTest.php`,
    as follows:


    ```

    1  public function testGetCommentsOfUser()

    2  {

    3      $actual = $this->Comments->getCommentsOfUser(2);

    4      $expected = [

    5          [

    6              ''id'' => 5,

    7              ''comment'' => ''This is an other comment by someone else.'',

    8              ''user_id'' => 2,

    9              ''post_id'' => 2

    10          ]

    11      ];

    12      $this->assertEquals(

    13          $expected,

    14          $actual->hydrate(false)->toArray()

    15      );

    16  }

    ```


    We expect to get the preceding array when we call `getCommentsOfUser()` method.


    And, finally, create the `getCommentsOfUser()` method in `/src/Model/Table/CommentsTable.php`.


    ```

    1  public function getCommentsOfUser($userId)

    2  {

    3      return $this->find()

    4          ->where([''user_id'' => $userId]);

    5  }

    ```


    It’s now time to test.


    ```

    $ cd ∼/public_html/cakeBlog

    $ vendor/bin/phpunit --filter testGetCommentsOfUser tests/TestCase/Model/Table/CommentsTableTest.php

    ```


    We will get the following output, shown in Figure [13-1](#A337704_2_En_13_Chapter.html#Fig1):


    ![A337704_2_En_13_Fig1_HTML.jpg](A337704_2_En_13_Fig1_HTML.jpg)


    Figure 13-1. Failing test


    The red F indicates that our test failed.


    The next line shows the test’s execution time and the memory used.


    We can see which method of which test file failed, and a message describing the
    reason for the failure.


    Then we can see the difference between the expected and the actual result. The
    - sign indicates the expected result; the + sign shows the actual result.


    So, the figure shows that we expected an array that has only one member, which
    is another array. This is OK.


    The expected id is 5, but the actual id is 2. The `comment` and `user_id` are
    equal both in expected and actual arrays, but `post_id` again differs.


    Then the next line shows the line number of the failed assertion.


    At the end, we can see the summarized report of the run tests.


    ### Interrupting Tests


    You can stop running a test at any time at the console, by pressing `Ctrl+C`.
    If you do so, do not forget to check your test database, as database entries can
    remain there, as you interrupt test execution before it removes all entries.


    ### Summary


    In this chapter, you learned how to use information provided by `debug`, how to
    run all tests at once, and how to filter tests. An overview of the test output
    was provided, and you learned how to interrupt tests.


