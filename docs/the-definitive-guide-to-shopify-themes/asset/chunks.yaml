    Shopify. Introduction


    Back in 2005, Shopify got off the ground when a couple of folks in Canada wanted
    to sell snowboards online but couldn’t find an Ecommerce platform to meet their
    needs.


    Since then, the capabilities of the Shopify, the number of merchants using it,
    and the world of Ecommerce in general has come a long way. At the time of writing,
    the platform powers the online stores of over 500,000 businesses across 175 countries,
    with 2,500 of those being high-volume merchants on the newer “enterprise” offering,
    Shopify Plus. A total of $15.4 billion in transactions was processed by Shopify
    in 2016, a doubling of the previous year’s total.


    Many point to Shopify’s hosted nature, its expanding range of features, or its
    partnerships with major companies like Facebook, Twitter, and Amazon as core to
    its success. In my opinion, one of the most critical and oft-overlooked factors
    underlying Shopify’s growth is its ecosystem of Partners—a broad spectrum of developers,
    designers, marketers, and experts who work with Shopify merchants to help them
    grow and succeed on the platform. Being one of these Partners myself, I guess
    this opinion comes off as quite self-serving, but I feel that anyone who’s worked
    with Shopify in any capacity would have to acknowledge that at the very least,
    the Partner ecosystem is a major asset.


    Partners are the ones helping merchants transition to Shopify, building out their
    stores, customizing their themes, and configuring the multitude of available applications.
    They’re also the ones developing themes and apps for sale in Shopify’s official
    Stores, making a living and building businesses on top of the platform.


    I first came to Shopify as a tinkerer quite early in its history, in 2008\. The
    feature set was limited; APIs were undocumented and the default themes merchants
    could choose from when setting up your store weren’t going to win any design awards.
    Getting things to work was often a matter of trial, error, and swearing at Liquid
    code. Still, it was streets ahead of any other platform at the time in terms of
    ease-of-use, and there was something about the way the company seemed dedicated
    to improve that made it interesting enough to stick around (Tobi, then and now
    Shopify’s CEO, would often be in the Partner forums responding to issues directly
    with a “just rolling out some code to fix that now!”).


    Sticking around has proven to be a good decision—in 2013 I could make the transition
    to full-time Shopify freelance work; in 2015 I founded Disco, a studio that helps
    Shopify merchants grow and improve their businesses. Over that time, I’ve worked
    on stores large and small, built themes and applications from scratch, written
    and released open-sourced libraries, and partnered with Shopify to deliver talks,
    workshops, and online courses. Most importantly, I’ve had the chance to meet scores
    of amazing Partners and “Shopifolk,” discover the world of Ecommerce through the
    eyes of merchants, and make friends with a diverse range of people from across
    the world.


    This book is an attempt to share some of the things this experience has taught
    me.


    ## Why This Book?


    No one resource can equip a person with every specific thing they need to know
    about Shopify themes. There are too many edge cases, too many wonderful quirks
    in the world of online commerce, for a one-stop shop to deliver on that promise.


    Fortunately, for the Shopify developer faced with learning the ropes or tackling
    a new requirement, there’s already quite a wealth of information at hand. Shopify’s
    official Theme and Liquid documentation is professional and thorough, and they
    often publish detailed “How-to” guides on the official Partner Blog. Shopify Partners
    themselves often fill in the gaps with blog posts and code examples, and for those
    still struggling to find answers, there are healthy communities of folk willing
    to help on the official Shopify forums or in unofficial Slack groups.


    So why add one more voice to the mix?


    Despite that breadth of information already out there, I’ve long felt there’s
    something missing—something that allows a novice Shopify theme developer to tie
    all these disparate bits of of knowledge together into a single narrative. In
    this book, I’m trying to fill this gap by covering both high-level theme design
    principles and practical coding skills, and using case studies and examples wherever
    possible to tie the two together.


    The goal here isn’t to replicate existing documentation or to provide a step-by-step
    rote-learning approach for every conceivable scenario you’ll face as a theme developer.
    Rather, by reading this book, you should acquire a deeper understanding of how
    Shopify themes work, how you can rely upon fundamental principles of theme design
    when faced with new situations, and how you can level up the workflow processes
    you use to deliver a professional final product.'
