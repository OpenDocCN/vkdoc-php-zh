  \n谨以此书献给我的家人和朋友，无论他们身处 Shopify 世界内外。\n\n## 引言\n\n早在 2005 年，当加拿大几位朋友想在线销售滑雪板却找不到合适的电子商务平台时，Shopify\
  \ 应运而生。\n\n自那时起，Shopify 的功能、使用其服务的商家数量以及整个电子商务世界都取得了长足发展。截至本书撰写时，该平台为 175 个国家超过\
  \ 50 万家企业的在线商店提供支持，其中 2500 家是使用较新“企业级”产品 Shopify Plus 的高销量商家。2016 年，Shopify 处理了总计\
  \ 154 亿美元的交易，是前一年总额的两倍。\n\n许多人将 Shopify 的成功归因于其托管性质、不断扩展的功能范围，以及与 Facebook、Twitter\
  \ 和 Amazon 等大公司的合作关系。在我看来，支撑 Shopify 发展的最关键且常被忽视的因素之一是其合作伙伴生态系统——这是一个由开发者、设计师、营销人员和专家组成的广泛群体，他们与\
  \ Shopify 商家合作，帮助商家在平台上成长并取得成功。由于我自己就是这些合作伙伴之一，我猜这一观点听起来有些自利，但我认为任何以任何身份与 Shopify\
  \ 合作过的人都必须承认，至少合作伙伴生态系统是一项重要资产。\n\n合作伙伴帮助商家迁移到 Shopify，构建他们的商店，定制主题，并配置众多可用应用程序。他们还在\
  \ Shopify 官方商店开发并销售主题和应用程序，在平台之上谋生并建立业务。\n\n我最初于 2008 年（Shopify 发展早期）以探索者的身份接触 Shopify。当时功能集有限；API\
  \ 没有文档说明，商家设置店铺时可选择的默认主题也谈不上设计奖项。要让一切正常运行，往往需要反复试验、纠错，并对 Liquid 代码感到头疼。尽管如此，在易用性方面，它当时远超其他任何平台，而且该公司似乎致力于改进的某种特质使其足够有趣，值得我继续关注（当时的\
  \ Shopify CEO Tobi——至今仍担任此职——经常直接在合作伙伴论坛中回应问题，并说“刚刚推出一些代码来修复这个问题！”）。\n\n坚持下去被证明是一个明智的决定——2013\
  \ 年，我得以转型为全职 Shopify 自由职业者；2015 年，我创立了 Disco，这是一家帮助 Shopify 商家成长和改善业务的工作室。在那段时间里，我参与过大小型商店的项目，从零开始构建主题和应用程序，编写并发布了开源库，并与\
  \ Shopify 合作举办演讲、研讨会和在线课程。最重要的是，我有机会结识众多出色的合作伙伴和“Shopify 人”，通过商家的视角发现电子商务世界，并与来自世界各地的各类人士交朋友。\n\
  \n本书旨在分享这段经历教会我的一些东西。\n\n### 为何撰写本书？\n\n没有任何单一资源能让人掌握关于 Shopify 主题所需的每一个具体知识。在线商业世界有太多的边缘情况和奇妙的特性，一个“一站式商店”无法兑现这样的承诺。\n\
  \n幸运的是，对于面临学习基础知识或处理新需求的 Shopify 开发者来说，手头已有相当丰富的信息资源。Shopify 官方的主题和 Liquid 文档专业且详尽，他们经常在官方合作伙伴博客上发布详细的“操作指南”。Shopify\
  \ 合作伙伴自己也常通过博客文章和代码示例填补空白，而对于仍在寻找答案的人，官方 Shopify 论坛或非官方 Slack 群组中有活跃的社区成员愿意提供帮助。\n\
  \n那么，为何还要增加一个声音呢？\n\n尽管已有如此广泛的信息存在，我长久以来一直感觉缺少某样东西——某样能让新手 Shopify 主题开发者将所有零散知识串联成一个完整叙述的东西。在本书中，我试图通过涵盖高层主题设计原则和实用编码技能，并尽可能使用案例研究和实例将两者结合起来，来填补这一空白。\n\
  \n这里的目标并非复制现有文档，或为你作为主题开发者可能面临的每一种设想场景提供逐步的机械学习方法。相反，通过阅读本书，你应该能更深入地理解 Shopify 主题的工作原理，在面对新情况时如何依赖主题设计的基本原则，以及如何提升工作流程以交付专业的最终产品。\n\
  \n\n### 本书读者对象\n\n本书假定您已掌握网页设计与开发的基础知识——包括 HTML、CSS 和 JavaScript。书中不要求您具备任何 Shopify\
  \ 开发经验（我们将在第 1 章通过 Shopify 入门指南开启旅程）。  \n有一定 Shopify 经验的开发者可能会觉得前期内容较为简单，但能从工作流自动化、开发最佳实践以及对\
  \ Shopify 主题架构与设计原则的深入探讨中获得价值。  \n资深 Shopify 开发者也同样能从中获益——无论是了解高级主题部署技术、将性能优化提升至新高度，还是获得主题开发的全新视角。\n\
  \n### 本书结构\n\n本书共分为 11 个章节。每章探讨 Shopify 主题开发的不同概念或组件，内容虽相对独立，但整体遵循时间顺序。第 4 章至第 7\
  \ 章尤为突出，这四章连贯地演示了从零构建完整 Shopify 主题的全过程。  \n因此，我建议您首次阅读时按章节顺序通读，之后可根据需要回头查阅特定章节。\
  \  \n书中使用代码片段演示概念与具体技术。受篇幅限制，许多代码段仅截取关键部分——完整版本可访问 GitHub 资源仓库`https://github.com/Apress/definitive-guide-to-shopify-themes`获取。另一个\
  \ GitHub 仓库`https://github.com/gavinballard/defguide-theme`则记录了从第 4 章练习开始构建、并在后续章节练习中不断完善的示例主题的完整源码。\n\
  \n### 延伸阅读\n\n如您遇到困难或希望深入了解某主题，除常规 Google 搜索外，还可通过以下渠道寻求帮助：查询官方 Shopify 论坛（`https://ecommerce.shopify.com/forums`）、查阅官方主题文档（`https://help.shopify.com/themes`），或浏览合作伙伴博客（`https://www.shopify.com/partners/blog`）上的文章。\
  \  \n此外，在 Slack、Reddit 和 Facebook 等社交平台上，专注于 Shopify 的社区也在不断壮大。  \n如果您对本书内容有任何疑问或需勘误，可直接通过邮箱`gavin@gavinballard.com`与我联系。\
  \  \n好戏开场了！\n\n### 致谢\n\n正如我会对所有愿意倾听的人热情宣扬的那样，Shopify 的“秘制配方”并非在于其代码，而在于其生态系统——那些齐心协力“让商业惠及每个人”的员工、专家和合作伙伴。这听起来有些矫情，但确是肺腑之言——没有以下各位的帮助，我绝不可能完成本书或从事我所热爱的工作。\
  \  \n感谢多年来与我相遇的众多 Shopify 员工与合作伙伴，感谢你们的时间与慷慨——无论是回答论坛问题、协助撰写博文、深入解决晦涩的 Liquid 问题，还是合作开展激动人心的新项目。你们人数众多，无法一一列举，但特别感谢\
  \ Shopify 的 Carson Shold、Jason Bowman、Courtney Symons 和 Rhys Furner，以及合作伙伴社区的 Jessica\
  \ Claesson、Galen King、Stewart Knapman、Mack Johnson、Chris Pointer、Kurt Elster、Justin\
  \ Metros、Rick Davies、Dave Lazar、Cal Wilson、Alex O'Byrne 和 Piers Thorogood，感谢你们对本书早期版本的支持（以及你们在\
  \ Shopify 领域的卓越贡献）。  \n特别感谢 One Inch Round 的 Scott Hay，他是我梦寐以求的首位客户；感谢 Apress 的\
  \ Louise Corrigan 和 Nancy Chen，她们的耐心与坚持促使本书最终成稿；当然还有 Shopify 无与伦比的 Keir Whitaker。\
  \  \n最后，衷心感谢我在 Disco 的同事们、我的家人以及朋友们给予我的支持。\n\n\n\n"
