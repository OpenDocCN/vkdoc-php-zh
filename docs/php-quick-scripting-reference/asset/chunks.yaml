    that work are the backslash (`\\`) and single-quote (`\''`) characters.


    ```

    $s = ''It\''s''; // "It''s"

    ```


    Escaping the backslash is only necessary before a single-quote or at the end of
    the string.


    Character reference


    Characters within strings can be referenced by specifying the index of the desired
    character in square brackets after the string variable, starting with zero. This
    can be used both for accessing and modifying single characters.


    ```

    $s = ''Hello'';

    $s[0] = ''J'';

    echo $s; // "Jello"

    ```


    The `strlen` function retrieves the length of the string argument. This can for
    example be used to change the last character of a string.


    ```

    $s[strlen($s)-1] = ''y'';

    echo $s; // "Jelly"

    ```


    String compare


    The way to compare two strings is simply by using the equal to operator. This
    will not compare the memory addresses, as in some other languages.


    ```

    $a = ''test'';

    $b = ''test'';

    $c = ($a == $b); // true

    ```


