  trans: "\n### 问题\n\n如果你一直在使用事务脚本，你可能会发现随着不同脚本需要执行相同任务，重复代码会成为一个问题。虽然可以在一定程度上进行抽象，但随着时间的推移，很容易陷入剪切-粘贴式编码。\n\
    \n你可以使用领域模型来提取并封装系统中的参与者和处理过程。与其编写脚本来向数据库添加空间数据，然后再关联事件数据，不如创建 `Space` 和 `Event`\
    \ 类。预订某个空间中的事件可以简化为调用 `Space::bookEvent()`。检查时间冲突这样的任务则变成 `Event::intersects()`，以此类推。\n\
    \n显然，对于像 Woo 这样简单的示例，事务脚本已经足够。但随着领域逻辑变得复杂，领域模型的替代方案会越来越有吸引力。复杂的逻辑可以更轻松地处理，并且在建模应用领域时，你需要的条件代码也会更少。\n\
    \n### 实现\n\n领域模型的设计可以相对简单。与此主题相关的大多数复杂性都体现在旨在保持模型纯净的模式上——也就是说，将其与应用中的其他层分离开来。\n\
    \n将领域模型的参与者与表示层分离，很大程度上只需要确保它们保持独立。然而，将参与者与数据层分离则要棘手得多。尽管理想情况是仅从模型所代表和解决的问题角度来考虑领域模型，但数据库的实际情况却难以回避。\n\
    \n领域模型类通常与关系数据库中的表直接映射，这无疑让开发更轻松。例如，图 12-11 展示了一个类图，描绘了 Woo 系统中的部分参与者。\n\n![A314621_5_En_12_Fig11_HTML.gif](img/A314621_5_En_12_Fig11_HTML.gif)\n\
    \n图 12-11.\n\n领域模型的一个片段\n\n图 12-11 中的对象镜像了为事务脚本示例建立的表结构。这种直接关联使系统更易于管理，但并非总是可行，尤其是当你使用的数据库模式先于应用存在时。这种关联本身也可能成为问题的根源。如果不小心，你最终可能是在对数据库建模，而不是在解决你试图应对的问题和驱动力。\n\
    \n领域模型经常镜像数据库结构，但这并不意味着它的类应该了解数据库的任何信息。通过将模型与数据库分离，你可以让整个层更易于测试，并且不太容易受到模式变更，甚至存储机制变更的影响。这也让每个类的职责聚焦于其核心任务。\n\
    \n以下是一个简化的 `Venue` 对象及其父类：\n\n```php\n// listing 12.44\nabstract class DomainObject\n\
    {\n    private $id;\n    public function __construct(int $id)\n    {\n       \
    \ $this->id = $id;\n    }\n    public function getId(): int\n    {\n        return\
    \ $this->id;\n    }\n    public static function getCollection(string $type): Collection\n\
    \    {\n        // 虚拟实现\n        return Collection::getCollection($type);\n  \
    \  }\n    public function markDirty()\n    {\n        // 下一章再讲！\n    }\n}\n//\
    \ listing 12.45\nclass Venue extends DomainObject\n{\n    private $name;\n   \
    \ private $spaces;\n    public function __construct(int $id, string $name)\n \
    \   {\n        $this->name = $name;\n        $this->spaces = self::getCollection(Space::class);\n\
    \        parent::__construct($id);\n    }\n    public function setSpaces(SpaceCollection\
    \ $spaces)\n    {\n        $this->spaces = $spaces;\n    }\n    public function\
    \ getSpaces(): SpaceCollection\n    {\n        return $this->spaces;\n    }\n\
    \    public function addSpace(Space $space)\n    {\n        $this->spaces->add($space);\n\
    \        $space->setVenue($this);\n    }\n    public function setName(string $name)\n\
    \    {\n        $this->name = $name;\n        $this->markDirty();\n    }\n   \
    \ public function getName(): string\n    {\n        return $this->name;\n    }\n\
    }\n```\n\n这个类与那些设计为无需持久化的类有几点不同。我没有使用数组，而是使用 `SpaceCollection` 类型的对象来存储 `Venue`\
    \ 可能包含的任何 `Space` 对象（不过，即使不涉及数据库，也有人会认为类型安全的数组也是个优点）。由于这个类使用特殊的集合对象而非 `Space`\
    \ 对象数组，构造函数需要在启动时实例化一个空集合。它通过调用层超类型上的静态方法来实现这一点：\n\n```php\n$this->spaces = self::getCollection(Space::class);\n\
    ```\n\n我将在下一章回到这个系统的集合对象以及如何获取它们的话题。不过目前，超类只是返回一个空数组。\n\n**注意**：在本章及下一章中，我将讨论对\
    \ `Venue` 和 `Space` 对象的修改。这些是简单的领域对象，它们共享一个共同的功能核心。如果你正在跟随编码，你应该能够将我所讨论的概念应用到任何一个类上。例如，`Space`\
    \ 类可能不维护 `Space` 对象的集合，但它可能会以完全相同的方式管理 `Event` 对象。\n\n我期望构造函数中有一个 `$id` 参数，我会将它传递给超类进行存储。`$id`\
    \ 参数代表数据库中某行的唯一 ID，这一点不足为奇。另外请注意，我调用了超类上的一个方法 `markDirty()`（当你遇到工作单元模式时将会涉及这一点）。\n\
    \n### 结果\n\n领域模型的设计需要和你需要模拟的业务流程一样简单或复杂。其美妙之处在于，在设计模型时，你可以专注于问题中的驱动力，而在其他层（理论上）处理持久化和表示层等问题。\n\
    \n在实践中，我认为大多数开发者在设计领域模型时，至少会考虑数据库。没有人愿意设计出这样的结构——当需要将对象存入数据库或从数据库中取出时，会迫使你（或者更糟，你的同事）编写弯弯绕绕的复杂代码。\n\
    \n这种领域模型与数据层之间的分离在设计上代价不菲。虽然可以将数据库代码直接放在模型中（尽管你可能想设计一个网关来处理实际的 SQL），但对于相对简单的模型，特别是当每个类大体上映射到一个表时，这种方法可以真正带来好处，省去了为设计一个外部系统来协调对象与数据库之间的巨大设计开销。\n\
    \n### 总结\n\n我在这里涵盖了非常多的内容（尽管我也省略了很多）。你不应该被本章中大量的代码所吓倒。模式应该用在合适的环境中，并在有用时进行组合。使用本章中描述的那些你认为符合项目需求的模式，不要觉得在开始一个项目之前必须先构建一个完整的框架。另一方面，这里有足够的材料可以作为框架的基础，或者同样很有可能，为你可能选择部署的一些预构建框架的架构提供一些见解。\n\
    \n而且还有更多内容！我把你留在了持久化的边缘，只给出了一些关于集合和映射器的诱人提示。在下一章中，我将介绍一些用于处理数据库以及将你的对象与数据存储细节隔离开来的模式。\n"
- fmt: "# 13. Database Patterns\n\nMost web applications of any complexity handle\
    \ persistence to a greater or lesser extent. Shops must recall their products\
    \ and their customer records. Games must remember their players and the state\
    \ of play. Social networking sites must keep track of your 238 friends and your\
    \ unaccountable liking for boy-bands of the ’80s and ’90s. Whatever the application,\
    \ the chances are it’s keeping score behind the scenes. In this chapter, I look\
    \ at some patterns that can help.\n\nThis chapter will cover the following:\n\n\
    *   The Data Layer interface: Patterns that define the points of contact between\
    \ the storage layer and the rest of the system\n*   Object watching: Keeping track\
    \ of objects, avoiding duplicates, and automating save and insert operations\n\
    *   Flexible queries: Allowing your client coders to construct queries without\
    \ thinking about the underlying database\n*   Creating lists of found objects:\
    \ Building iterable collections\n*   Managing your database components: The welcome\
    \ return of the Abstract Factory pattern\n\n## The Data Layer\n\nIn discussions\
    \ with clients, it’s usually the presentation layer that dominates. Fonts, colors,\
    \ and ease of use are the primary topics of conversation. Among developers, it\
    \ is often the database that looms large. It’s not the database itself that concerns\
    \ us; we can trust that to do its job unless we’re very unlucky. No, it’s the\
    \ mechanisms we use to translate the rows and columns of a database table into\
    \ data structures that cause the problems. In this chapter, I look at code that\
    \ can help with this process.\n\nNot everything presented here sits in the Data\
    \ layer itself. Rather, I have grouped some of the patterns that help to solve\
    \ persistence problems. All of these patterns are described by one or more of\
    \ Clifton Nock, Martin Fowler, and Alur, et al.\n\n## Data Mapper\n\nIf you thought\
    \ I glossed over the issue of saving and retrieving `Venue` objects from the database\
    \ in the “Domain Model” section of Chapter [12](#A314621_5_En_12_Chapter.html),\
    \ here is where you might find at least some answers. The Data Mapper pattern\
    \ is described as a Data Access Object in a couple places. First, it’s covered\
    \ by Alur et al. in *Core J2EE Patterns: Best Practices and Design Strategies*\
    \ (Prentice Hall, 2001). It’s also covered by Martin Fowler in *Patterns of Enterprise\
    \ Application Architecture* (Addison-Wesley Professional, 2002). Note that Data\
    \ Access Object is not an exact match to the Data Mapper pattern, as it generates\
    \ data transfer objects; but since such objects are designed to become the real\
    \ thing if you add water, the patterns are close enough).\n\nAs you might imagine,\
    \ a data mapper is a class that is responsible for handling the transition from\
    \ database to object.\n\n### The Problem\n\nObjects are not organized like tables\
    \ in a relational database. As you know, database tables are grids made up of\
    \ rows and columns. One row may relate to another in a different (or even the\
    \ same) table by means of a foreign key. Objects, on the other hand, tend to relate\
    \ to one another more organically. One object may contain another, and different\
    \ data structures will organize the same objects in different ways, combining\
    \ and recombining objects in new relationships at runtime. Relational databases\
    \ are optimized to manage large amounts of tabular data, whereas classes and objects\
    \ encapsulate smaller focused chunks of information.\n\nThis disconnect between\
    \ classes and relational databases is often described as the object-relational\
    \ impedance mismatch (or simply impedance mismatch).\n\nSo how do you make that\
    \ transition? One answer is to give a class (or a set of classes) responsibility\
    \ for just that problem, effectively hiding the database from the domain model\
    \ and managing the inevitable rough edges of the translation.\n\n### Implementation\n\
