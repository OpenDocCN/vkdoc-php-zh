- fmt: '### The Site Header


    For the example theme, we’re going to add a new `header.liquid` section (see Listing
    4-2) that renders the store name and iterates over the links defined in the main
    navigation menu (configurable from the Shopify Admin) as well as the Search, Log
    In/My Account, and Cart links. We’ll then include it in the `theme.liquid` (see
    Listing 4-3) so that it appears on every page of the site.


    ```liquid

    {{ shop.name | escape }}


    {%- for link in linklists.main-menu.links -%}


    {{ link.title | escape }}


    {%- endfor -%}


    Search


    {%- if shop.customer_accounts_enabled -%}

    {%- if customer -%}


    {{ customer.first_name | escape }}


    {%- else -%}


    Log in


    {%- endif -%}

    {%- endif -%}


    Cart ({{ cart.item_count }})


    Listing 4-2

    A Simple sections/header.liquid Section

    ```


    ```liquid

    ...


    {%- section ''header'' -%}

    {{ content_for_layout }}

    ...

    Listing 4-3

    Include the Header Section at the Top of theme.liquid So That It Appears on Every
    Page

    ```


    When rendered on the Shopify site, it looks something like Figure 4-3 (note that
    I’ve skipped the addition of all the styling code in this book; refer to the example
    theme repository for details). Note that the items in the menu bar (Shop, Best
    Sellers, etc.) are defined in the Online Store > Navigation section of the Shopify
    Admin, not directly in the theme.


    ![A437216_1_En_4_Fig3_HTML.jpg](A437216_1_En_4_Fig3_HTML.jpg)


    **Figure 4-3** The example theme’s header


    Simple, but effective! Some things to note:


    * The implementation is consistent. We’re not changing the menu items available
    or the layout of menu items depending on the current page. It’s important to keep
    the navigation structure of the site consistent from one page to the next, as
    it reduces the amount of information a user must process when moving from one
    page to the other. Making large “contextual” changes to site layout or structure
    can be confusing for users and should be avoided.

    * A cart link is included in its conventional spot (the top right of the page).
    Keeping this element means that no matter where they are, the customers know how
    to take the most important step on any Ecommerce site—move to the checkout. Note
    also that the number of items currently bagged is displayed to help the customers
    keep track of their cart state.

    * The design allows for only a single level of navigation in the header. There
    are no dropdown menus or category filters at this stage. You’ll be learning about
    navigation patterns in more detail shortly.


    #### Making the Header Configurable


    One of the advantages of using a section for the header rather than a snippet
    is that we can define configuration settings directly in the section and have
    them appear in a simple interface in the Shopify Admin’s theme customizer. To
    demonstrate, let’s make a change to allow the storeowners to select which navigation
    menu they would like to use to render the list of links at the top of the site
    (it’s currently fixed to `main-menu`, which is a default Shopify navigation menu).


    We can start this by adding a `{% schema %}` definition at the top of `sections/header.liquid`,
    then updating the way we fetch the navigation menu to use (see Listing 4-4). When
    this is done, users opening the theme customizer from the Shopify backend will
    be able to pick which menu to use (see Figure 4-4). Note that the `link_list`
    type refers to Navigation Menus, as titled in the Shopify Admin.


    ![A437216_1_En_4_Fig4_HTML.jpg](A437216_1_En_4_Fig4_HTML.jpg)


    **Figure 4-4** Adding the `{% schema %}` markup gives users a nice UI to make
    configuration changes inside the Shopify Admin’s theme customizer


    ```liquid

    {% schema %}

    {

    "name": "Header",

    "settings": [

    {

    "id": "primary_link_list",

    "type": "link_list",

    "label": "Primary navigation menu",

    "default": "main-menu"

    }

    ]

    }

    {% endschema %}


    ...

    {%- assign primary_link_list = linklists[section.settings.primary_link_list] -%}

    {%- unless primary_link_list == blank -%}


    {%- for link in primary_link_list.links -%}

    ...

    Listing 4-4

    Addition of {% schema %} Markup

    ```


    ### The Navigation Menu


    The initial approach to a navigation header offers only a single level of options.
    For stores with a very limited number of pages or products, this simple approach
    may suffice. However, there are many stores where it’s useful to give users more
    choice and a quicker way of narrowing down the product range. This is usually
    achieved by adding contextual menu options (e.g., dropdown menus).'
