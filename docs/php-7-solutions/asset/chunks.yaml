    \    Otherwise, the page tells the visitor that it doesn’t recognize who’s\n \
    \   trying to gain access and provides a link back to the first page.\n\nCaution\n\
    Take care when typing the following line:\n`echo 'Hi there, ' . htmlentities($_SESSION['name'])\
    \ . '. <a href=\"session03.php\">Next</a>';`\nThe first two periods (surrounding\
    \ `htmlentities($_SESSION['name'])`)\nare the PHP concatenation operator. The\
    \ third period (immediately after\na single quote) is an ordinary period that\
    \ will be displayed as part of\nthe string.\n\n1.  Create `session_03.php`. Type\n\
    \    the following above the `DOCTYPE` to initiate\n    the session:\n\n2.  Insert\
    \ the following code between the `<body>` tags of\n    `session_03.php`:\n\n```\n\
    \    ';\n    // unset session variable\n    unset($_SESSION['name']);\n    //\
    \ invalidate the session cookie\n    if (isset($_COOKIE[session_name()])) {\n\
    \    setcookie(session_name(), \", time()-86400, '/');\n    }\n    // end session\n\
    \    session_destroy();\n    echo 'Back to page 2';\n    } else {\n    // display\
    \ if not recognized\n    echo \"Sorry, I don't know you.\";\n    echo 'Please\
    \ log in';\n    }\n    ?>\n    ```\n\nIf `$_SESSION['name']` has\n    been set,\
    \ the page displays it, then unsets it and invalidates the\n    current session\
    \ cookie. By placing  `session_destroy()`\n     at the end of the first code block,\
    \ the session and its\n    associated variables cease to be available.\n\n3. \
    \ Load `session_01.php` into a\n    browser, type your name in the text field,\
    \ and click Submit.\n\n4.  You should see something like the following screenshot.\
    \ At this\n    stage, there is no apparent difference between what happens here\
    \ and in\n    an ordinary form.\n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Figa_HTML.jpg](images/332054_4_En_11_Chapter/332054_4_En_11_Figa_HTML.jpg)\n\
    \n5.  When you click Next, the power of sessions begins to show. The page\n  \
    \  remembers your name, even though the `$_POST` array is no\n    longer available\
    \ to it. In most cases, you’ll probably see something\n    similar to the following\
    \ screenshot.\n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Figb_HTML.jpg](images/332054_4_En_11_Chapter/332054_4_En_11_Figb_HTML.jpg)\n\
    \nHowever, on some servers, you might get the following warning message\n    that\
    \ header information cannot be modified because headers have already\n    been\
    \ sent.\n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Figc_HTML.jpg](images/332054_4_En_11_Chapter/332054_4_En_11_Figc_HTML.jpg)\n\
    \nNote\nAs explained in Chapter [5](#332054_4_En_5_Chapter.xhtml), servers don’t\
    \ produce the warning\nabout headers if they’re configured to buffer the first\
    \ 4 KB of output.\nHowever, not all servers buffer output, so it’s important to\
    \ fix this\nproblem.\n\n1.  Click the link to page 2 (if you got an error message,\
    \ it’s just\n    below the message). The session has been destroyed, so this time\
    \ `session_02.php` has no\n    idea who you are.\n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Figd_HTML.jpg](images/332054_4_En_11_Chapter/332054_4_En_11_Figd_HTML.jpg)\n\
    \n2.  Type the address of `session_03.php` in the\n    browser address bar and\
    \ load it. It, too, has no recollection of the\n    session and displays an appropriate\
    \ message.\n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Fige_HTML.jpg](images/332054_4_En_11_Chapter/332054_4_En_11_Fige_HTML.jpg)\n\
    \nEven if you didn’t get the warning message in step 8, you need to\nprevent it\
    \ from happening when you deploy pages that rely on sessions to\nother servers.\
    \ The error message not only looks bad, but it also means\n `setcookie()` \ncan’t\
    \ invalidate the session cookie. Even though `session_start()` comes\nimmediately\
    \ after the opening PHP tag in `session_03.php`, the\nwarning message is triggered\
    \ by the `DOCTYPE` declaration,\nthe `<head>`, and\nother HTML being output before\
    \ `setcookie()`.\n\nPHP Solution 11-2: Buffering the Output with\nob_start()\n\
    Although you could put `setcookie()` in the\nPHP block above the `DOCTYPE` declaration,\n\
    you would also need to assign the value of `$_SESSION['name']` to\nan ordinary\
    \ variable, because it ceases to exist after the session is\ndestroyed. Rather\
    \ than pull the whole script apart, the answer is to\nbuffer the output with \n\
    `ob_start()`\n.\n\nContinue working with `session_03.php` from\nthe previous section.\n\
    \n1.  Amend the PHP block above the `DOCTYPE` declaration\n    like this:\n\n\
    ```\n    This turns on output buffering and prevents output from being sent to\n\
    \    the browser until the end of the script or until you specifically flush\n\
    \    the output with `ob_end_flush()`.\n\n```\n\n2.  Flush the output immediately\
    \ after invalidating the session cookie, like\n    this:"
  trans: "\n# 使用会话限制访问\n\n虽然使用 PHP 会话非常容易，但有一个问题会让初学者抓耳挠腮。你可能看不到代码按预期工作，而是看到以下信息：\n\
    \n```\nWarning: Cannot add header information - headers already sent\n```\n\n\
    我之前在介绍 `header()` 函数时多次提到过这个问题。它同样会影响 `session_start()` 和 `setcookie()`。对于 `session_start()`，解决方案很简单：确保将其紧跟在\
    \ PHP 起始标签之后（或紧随其后），并检查起始标签前没有空格。\n\n有时即使 PHP 标签前没有空格，问题也会出现。这通常是由编辑软件在脚本开头插入字节顺序标记（BOM）引起的。如果发生这种情况，请打开脚本编辑器的偏好设置，并禁用\
    \ PHP 页面中的 BOM 使用。\n\n然而，在使用 `setcookie()` 销毁会话 cookie 时，很可能需要在调用该函数之前向浏览器发送输出。在这种情况下，PHP\
    \ 允许你使用 `ob_start()` 将输出保存在缓冲区中。然后，在 `setcookie()` 完成其工作后，使用 `ob_end_flush()`\
    \ 刷新缓冲区。你将在 PHP 解决方案 11-2 中看到如何执行此操作。\n\n## 使用会话限制访问\n\n在考虑限制网站访问时，脑海中可能首先浮现的词是“用户名”和“密码”。尽管这两者通常是进入网站的钥匙，但它们都不是会话的必要条件。你可以将任何值存储为会话变量，并使用它来决定是否授予对页面的访问权限。例如，你可以创建一个名为\
    \ `$_SESSION['status']` 的变量，并根据其值允许访问者访问网站的不同部分，或者如果该变量未设置，则完全拒绝访问。\n\n一个小小的演示应该能让一切清晰明了，并让你了解会话在实际中是如何工作的。\n\
    \n## PHP 解决方案 11-1：一个简单的会话示例\n\n这应该只需要几分钟就能构建完成，但你也可以在 `ch11` 文件夹中的 `session_01.php`、`session_02.php`\
    \ 和 `session_03.php` 中找到完整的代码。\n\n1.  在 `phpsols-4e` 站点根目录中创建一个名为 `sessions` 的新文件夹，并在其中创建一个名为\
    \ `session_01.php` 的页面。插入一个包含名为 `name` 的文本字段和一个 `提交` 按钮的表单。将 `method` 设置为 `post`，`action`\
    \ 设置为 `session_02.php`。表单应如下所示：\n\n```\n<form method=\"post\" action=\"session_02.php\"\
    >\n  输入您的姓名：<input type=\"text\" name=\"name\" />\n  <input type=\"submit\" name=\"\
    submit\" value=\"提交\" />\n</form>\n```\n\n2.  在另一个名为 `session_02.php` 的页面中，在 `DOCTYPE`\
    \ 声明上方插入以下代码：\n\n```\n<?php\nsession_start();\nif (isset($_POST['name'])) {\n\
    \  $_SESSION['name'] = $_POST['name'];\n}\n?>\n```\n\n内联注释解释了正在发生的事情。会话启动，只要 `$_POST['name']`\
    \ 不为空，其值就会被赋给 `$_SESSION['name']`。\n\n3.  在 `session_02.php` 的 `<body>` 标签之间插入以下代码：\n\
    \n```\n<?php\nif (isset($_SESSION['name'])) {\n  echo '您好，' . htmlentities($_SESSION['name'])\
    \ . '。<a href=\"session_03.php\">下一页</a>';\n} else {\n  // 如果未设置，则返回登录页面\n  echo\
    \ '您是谁？请<a href=\"session_01.php\">登录</a>';\n}\n?>\n```\n\n如果设置了 `$_SESSION['name']`，则会显示一条欢迎消息以及一个指向\
    \ `session_03.php` 的链接。否则，页面会告诉访问者无法识别试图访问的用户，并提供一个返回第一页的链接。\n\n### 注意\n\n输入以下代码行时要小心：\n\
    ```\necho '您好，' . htmlentities($_SESSION['name']) . '。<a href=\"session_03.php\"\
    >下一页</a>';\n```\n前两个句点（围绕 `htmlentities($_SESSION['name'])`）是 PHP 的字符串连接运算符。第三个句点（紧跟在单引号之后）是一个普通的句点，将作为字符串的一部分显示。\n\
    \n1.  创建 `session_03.php`。在 `DOCTYPE` 上方输入以下代码以启动会话：\n\n```\n<?php\nsession_start();\n\
    ?>\n```\n\n2.  在 `session_03.php` 的 `<body>` 标签之间插入以下代码：\n\n```\n<?php\nif (isset($_SESSION['name']))\
    \ {\n  echo '您好 ' . htmlentities($_SESSION['name']) . '。下次再见。';\n  // 取消设置会话变量\n\
    \  unset($_SESSION['name']);\n  // 使会话 cookie 失效\n  if (isset($_COOKIE[session_name()]))\
    \ {\n    setcookie(session_name(), '', time()-86400, '/');\n  }\n  // 结束会话\n \
    \ session_destroy();\n  echo '<a href=\"session_02.php\">返回页面 2</a>';\n} else\
    \ {\n  // 如果无法识别则显示\n  echo \"抱歉，我不认识您。\";\n  echo '<a href=\"session_01.php\"\
    >请登录</a>';\n}\n?>\n```\n\n如果设置了 `$_SESSION['name']`，页面会显示它，然后取消设置它并使当前会话 cookie\
    \ 失效。通过将 `session_destroy()` 放在第一个代码块的末尾，该会话及其相关变量将不再可用。\n\n3.  在浏览器中加载 `session_01.php`，在文本字段中键入您的姓名，然后单击“提交”。\n\
    \n4.  您应该会看到类似以下截图的内容。在此阶段，这里发生的情况与普通表单没有明显区别。\n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Figa_HTML.jpg](img/332054_4_En_11_Figa_HTML.jpg)\n\
    \n5.  当您单击“下一页”时，会话的威力开始显现。即使 `$_POST` 数组不再可用，页面也会记住您的姓名。在大多数情况下，您可能会看到类似于以下截图的内容。\n\
    \n![../images/332054_4_En_11_Chapter/332054_4_En_11_Figb_HTML.jpg](img/332054_4_En_11_Figb_HTML.jpg)\n\
    \n然而，在某些服务器上，您可能会收到以下警告消息，提示无法修改头信息，因为头信息已发送。\n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Figc_HTML.jpg](img/332054_4_En_11_Figc_HTML.jpg)\n\
    \n### 注意\n\n如第 5 章所述，如果服务器配置为缓冲前 4 KB 的输出，则不会产生关于头信息的警告。但是，并非所有服务器都会缓冲输出，因此解决此问题很重要。\n\
    \n1.  单击指向页面 2 的链接（如果您收到错误消息，它就在消息下方）。会话已被销毁，所以这次 `session_02.php` 不知道您是谁。\n\n\
    ![../images/332054_4_En_11_Chapter/332054_4_En_11_Figd_HTML.jpg](img/332054_4_En_11_Figd_HTML.jpg)\n\
    \n2.  在浏览器地址栏中键入 `session_03.php` 的地址并加载它。它同样不记得会话，并显示相应的消息。\n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Fige_HTML.jpg](img/332054_4_En_11_Fige_HTML.jpg)\n\
    \n即使您在步骤 8 中没有收到警告消息，当您将依赖会话的页面部署到其他服务器时，也需要防止这种情况发生。错误消息不仅看起来糟糕，而且意味着 `setcookie()`\
    \ 无法使会话 cookie 失效。尽管 `session_start()` 紧跟在 `session_03.php` 中 PHP 起始标签之后，但警告消息是由\
    \ `DOCTYPE` 声明、`<head>` 以及 `setcookie()` 之前输出的其他 HTML 触发的。\n\n## PHP 解决方案 11-2：使用\
    \ `ob_start()` 缓冲输出\n\n虽然你可以将 `setcookie()` 放在 `DOCTYPE` 声明上方的 PHP 代码块中，但你还需要将\
    \ `$_SESSION['name']` 的值赋给一个普通变量，因为在会话销毁后它就不再存在了。与其将整个脚本拆开，不如使用 `ob_start()` 来缓冲输出。\n\
    \n继续使用上一节中的 `session_03.php`。\n\n1.  像这样修改 `DOCTYPE` 声明上方的 PHP 代码块：\n\n```\n<?php\n\
    session_start();\nob_start();\n?>\n```\n\n这会开启输出缓冲，并防止输出被发送到浏览器，直到脚本结束或你使用 `ob_end_flush()`\
    \ 专门刷新输出。\n\n2.  在使会话 cookie 失效后立即刷新输出，如下所示：\n\n```\n<?php\nif (isset($_SESSION['name']))\
    \ {\n  echo '您好 ' . htmlentities($_SESSION['name']) . '。下次再见。';\n  unset($_SESSION['name']);\n\
    \  if (isset($_COOKIE[session_name()])) {\n    setcookie(session_name(), '', time()-86400,\
    \ '/');\n  }\n  ob_end_flush();\n  session_destroy();\n  echo '<a href=\"session_02.php\"\
    >返回页面 2</a>';\n} else {\n  echo \"抱歉，我不认识您。\";\n  echo '<a href=\"session_01.php\"\
    >请登录</a>';\n}\n?>\n```\n"
- fmt: "```\n    // invalidate the session cookie\n    if (isset($_COOKIE[session_name()]))\
    \ {\n        setcookie(session_name(), \"\", time()-86400, '/');\n    }\n    ob_end_flush();\n\
    \    ```\n\n3.  保存`session_03.php`并再次测试该序列。这次应该不会出现警告。更重要的是，会话cookie不再有效。（更新后的代码位于`session_04.php`中。）\n\
    \n## 使用基于文件的身份验证\n\n正如您刚才所见，会话变量和条件语句的组合让您能够根据是否设置了某个会话变量，向访问者呈现完全不同的页面。您只需要添加一个密码检查系统，就拥有了一个基本的用户身份验证系统。\n\
    \n在深入探讨代码之前，让我们先考虑一下安全密码这个重要问题。\n\n### 使密码安全\n\n密码绝不应存储在可公开访问的位置。换句话说，如果您使用基于文件的身份验证系统，该文件必须位于Web服务器的文档根目录之外。此外，密码不应以纯文本形式保存。为了更高的安全性，建议对密码进行哈希处理。多年来，建议使用`MD5`或`SHA-1`算法将密码哈希为32位或40位的十六进制数字。它们最初的优势之一——速度，却变成了一个主要弱点。自动脚本可以在暴力攻击中每秒处理大量计算，以确定原始值——这与其说是猜测，不如说是尝试每一种可能的组合。\n\
    \n目前的建议是使用两个函数：`password_hash()`和`password_verify()`，它们提供了更强大的密码哈希和验证系统。要哈希一个密码，只需将其传递给`password_hash()`函数，如下所示：\n\
    \n```\n$hashed = password_hash($password, PASSWORD_DEFAULT);\n```\n\n`password_hash()`的第二个参数是一个常量，它将加密方法交给PHP处理，让您能够随时跟上被认为是最安全的加密方法。\n\
    \n> **注意**：`password_hash()`函数为高级用户提供了其他选项。详情请参见[`www.php.net/manual/en/function.password-hash.php`](http://www.php.net/manual/en/function.password-hash.php)。还有一个关于安全密码哈希的常见问题解答页面，位于[`www.php.net/manual/en/faq.passwords.php`](http://www.php.net/manual/en/faq.passwords.php)。\n\
    \n使用`password_hash()`会以一种无法逆转的方式打乱纯文本密码。这意味着即使您的密码文件泄露，也没人能找出密码是什么。这也意味着您无法将密码转换回其原始值。从某方面来说，这并不重要：当用户登录时，`password_verify()`会根据哈希版本检查提交的值。缺点在于，如果用户忘记密码，您无法发送密码提醒；必须创建一个新密码。尽管如此，良好的安全性要求对密码进行哈希处理。\n\
    \n哈希处理无法防范密码最常见的问题：那些容易猜测或使用常见单词的密码。许多注册系统现在通过要求混合使用字母数字字符和符号来强制使用更强的密码。\n\n因此，首要任务是创建一个用户注册表单，用于检查以下内容：\n\
    \n*   密码和用户名包含最少字符数\n*   密码符合最低强度标准，例如包含数字、大写和小写字符以及符号的混合\n*   密码与确认字段中的第二次输入匹配\n\
    *   用户名未被使用\n\n### PHP解决方案11-3：创建密码强度检查器\n\n本PHP解决方案展示如何创建一个类，用于检查密码是否满足特定要求，例如空格的使用、最少字符数以及不同类型字符的组合。默认情况下，该类仅检查密码是否只包含单个空格、开头或结尾没有空格，以及包含最少字符数。可选方法允许您设置更严格的条件，例如使用大小写字符、数字和非字母数字符号的组合。\n\
    \n本PHP解决方案从构建用户注册表单开始，该表单也将在PHP解决方案11-4中使用。\n\n1.  在`sessions`文件夹中创建一个名为`register.php`的页面，并插入一个包含三个文本输入字段和一个提交按钮的表单。按下图所示布局表单并命名输入元素。如果想节省时间，请使用`ch11`文件夹中的`register_01.php`。\n\
    \n    ![../images/332054_4_En_11_Chapter/332054_4_En_11_Figf_HTML.jpg](images/332054_4_En_11_Chapter/332054_4_En_11_Figf_HTML.jpg)\n\
    \n2.  一如既往，您希望仅在表单已提交时才运行处理脚本，因此所有内容都需要包含在一个条件语句中，该语句检查提交按钮的`name`属性是否在`$_POST`数组中。然后，您需要检查输入是否满足您的最低要求。在`DOCTYPE`声明上方的PHP代码块中插入以下代码：\n\
    \n    ```\n    if (isset($_POST['register'])) {\n        $username = trim($_POST['username']);\n\
    \        $password = trim($_POST['pwd']);\n        $retyped = trim($_POST['conf_pwd']);\n\
    \        require_once '../PhpSolutions/Authenticate/CheckPassword.php';\n    }\n\
    \    ```\n\n    条件语句内部的代码将三个文本字段的输入传递给`trim()`以去除开头和结尾的空白，并将结果赋值给简单变量。接下来，它包含将包含密码检查类的文件，您将在下一步中定义该类。\n\
    \n3.  在`PhpSolutions`文件夹中创建一个名为`Authenticate`的新文件夹。然后在新文件夹中创建一个名为`CheckPassword.php`的文件。该文件将只包含PHP脚本，因此请删除所有HTML并添加以下代码：\n\
    \n    ```\n    <?php\n    namespace PhpSolutions\\Authenticate;\n\n    class CheckPassword\
    \ {\n        protected $password;\n        protected $minChars;\n        protected\
    \ $mixedCase = false;\n        protected $minNums = 0;\n        protected $minSymbols\
    \ = 0;\n        protected $errors = [];\n\n        public function __construct($password,\
    \ $minChars = 8) {\n            $this->password = $password;\n            $this->minChars\
    \ = $minChars;\n        }\n\n        public function check() {\n            if\
    \ (preg_match('/\\s{2,}/', $this->password)) {\n                $this->errors[]\
    \ = 'Password can contain only single spaces.';\n            }\n            if\
    \ (preg_match('/^\\s+|\\s+$/', $this->password)) {\n                $this->errors[]\
    \ = 'Password cannot begin or end with spaces.';\n            }\n            if\
    \ (strlen($this->password) < $this->minChars) {\n                $this->errors[]\
    \ = \"Password must be at least $this->minChars characters.\";\n            }\n\
    \            return $this->errors ? false : true;\n        }\n\n        public\
    \ function getErrors() {\n            return $this->errors;\n        }\n    }\n\
