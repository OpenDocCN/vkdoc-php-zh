    on the `CommandContext` object instantiated in the controller’s constructor. The
    `process()` method acquires the `"action"` parameter (falling back to the string
    `"default"` if no action parameter is present). The method then delegates object
    instantiation to the `CommandFactory` object. It invokes `execute()` on the returned
    command. Notice how the controller has no idea about the command’s internals.
    It is this independence from the details of command execution that makes it possible
    for you to add new `Command` classes with a relatively small impact on this framework.


    Here’s one more `Command` class :


    ```

    // listing 11.52

    class FeedbackCommand extends Command

    {

    public function execute(CommandContext $context): bool

    {

    $msgSystem = Registry::getMessageSystem();

    $email = $context->get(''email'');

    $msg   = $context->get(''msg'');

    $topic = $context->get(''topic'');

    $result = $msgSystem->send($email, $msg, $topic);

    if (! $result) {

    $context->setError($msgSystem->getError());

    return false;

    }

    return true;

    }

    }

    ```


    Note


    I will return to the Command pattern in Chapter [12](#A314621_5_En_12_Chapter.html),
    with a fuller implementation of a `Command` factory class. The framework for running
    commands presented here is a simplified version of another pattern that you will
    encounter: the Front Controller.


    This class will be run in response to a `"feedback"` action string, without the
    need for any changes in the controller or `CommandFactory` classes.


    Figure [11-9](#A314621_5_En_11_Chapter.html#Fig9) shows the participants of the
