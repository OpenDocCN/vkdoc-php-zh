  \ true);`\n\n要保护网站上的任何页面，你只需将上述步骤 2 中的八行代码添加到 `DOCTYPE` 声明上方即可。\n\n### PHP 方案 9-5：创建可重用的退出按钮\n\
  \n除了登录网站之外，用户还应该能够退出登录。本 PHP 方案演示了如何创建可插入到任何页面的退出按钮。\n\n继续使用上一节中的文件进行操作。\n\n在 `menu.php`\
  \ 的 `<body>` 中插入以下表单，创建一个退出按钮：\n\n```\n<form method=\"post\" action=\"\">\n<input\
