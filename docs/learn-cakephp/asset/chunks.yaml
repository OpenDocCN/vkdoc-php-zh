- fmt: '# 测试函数命名


    测试函数名应以`test`开头。


    不要害怕使用描述性函数名，即使它们很长。它们非常有帮助。我们想检查谁是最后注册的用户，根据我们的测试数据，我们知道应该是唯一用户`''rrd''`。因此，我们使用了`testIfWeGetRrdAsLastRegisteredUser`作为方法名。请记住，当向测试数据添加新用户时，也应更新此测试。


    # 断言


    在测试函数中，我们会做一些简单的事情：获取期望值，然后检查函数返回值是否等于该值。还有其他有用的断言方法，例如`assertTrue`、`assertFalse`和`assertContains`。你可以在PHPUnit
    API（[`https://phpunit.de/manual/current/en/appendixes.assertions.html`](https://phpunit.de/manual/current/en/appendixes.assertions.html)）中查看所有断言方法。


    # 先失败


    你还记得TDD的过程吗？首先，编写一个会失败的测试。我们已经准备好了，这应该不会令人意外，因为我们的模型方法只返回`true`。现在，让我们编写正确的代码。


    # 通过测试


    好的。我们的测试失败了。现在将实际代码添加到用户模型。


    ```

    1  public function getLastRegistered()

    2  {

    3      return $this->find()

    4          ->order(''created'')

    5          ->first();

    6  }

    ```


    我们通过调用`Users`模型的`find()`方法请求最后注册用户的数据，按`created`字段排序结果，并返回第一条结果。


    重新运行测试应显示通过测试的报告，并带有绿色条（图[8-2](#A337704_2_En_8_Chapter.html#Fig2)）。


    ![A337704_2_En_8_Fig2_HTML.jpg](A337704_2_En_8_Fig2_HTML.jpg)


    图 8-2. 通过测试


    那么，我们的测试实际发生了什么？


    ```

    1  public function testIfWeGetRrdAsLastRegisteredUser()

    2  {

    3      $actual = $this->Users->getLastRegistered();

    ```


    该方法将返回一个从测试数据库填充的`User`对象。


    ```

    4      $expected = ''rrd'';

    ```


    我们定义期望值。


    ```

    5      $this->assertEquals($expected, $actual->username);

    6  }

    ```


    然后进行断言。如果一切正常，`$actual->username`应为`''rrd''`。


    打开你的`UsersFixture.php`文件并添加一条新记录。如果第二个用户的创建时间早于`rrd`，你的测试将通过。如果创建时间晚于`rrd`，你的测试将失败。完成实验后，请确保代码能让测试通过。测试失败意味着出了问题。


    我们的测试耗时798毫秒完成。测试应运行快速。始终关注执行时间。


    # 测试与胖模型


    编写更好代码的一个概念是拥有胖模型和薄控制器。


    这意味着控制器应该非常薄，仅作为请求和响应之间的转换层。因此，业务逻辑放在模型中，由控制器频繁使用。


    另一个概念是越小越好。这意味着我们应该有短小的方法。有人主张每个方法最多三行，另一些人则推荐最多十行。短方法更易于阅读、理解、维护和测试。长方法容易违反单一职责原则。


    所有这些意味着我们将拥有包含许多短小方法的胖模型，每个方法只负责一件事。而且你可能会为所有模型方法编写测试。


    测试将帮助你识别自己遵循的导致问题的糟糕编码模式。


    CakePHP遵循模型-视图-控制器（MVC）模式，即使编程模式对你来说很陌生，它也提供了良好的支持并帮助你遵循。假设我们想要一个按用户名首字母分组的用户列表。例如，A:
    Amindala，B: Ben Kenobi，Boba Fett，等等。也许我们想要一个链接列表，以便用户点击某人的名字时，会被重定向到该用户的个人资料页面。


    为满足此需求，我们应该查询用户表以获取用户名，然后将结果提供给视图，并构建HTML列表。


    与数据库的通信应在模型中进行。所有`find()`调用都应放在模型中。


    控制器将检查用户权限，并设置变量供视图显示或闪现错误消息。


    视图应实际构建HTML列表和链接。视图不应执行任何业务逻辑，只应输出内容。如果在控制器或模型中使用了`print`（或`echo`）语句，就破坏了MVC模式。同时，大多数视图代码应仅输出内容，不做其他事情。计算表格汇总或平均值是例外情况。


    # 测试回调


    你可能已经注意到有些函数是由`bake`自动生成的。这些是测试回调。CakePHP的单元测试包含以下回调方法：


    *   `setUp`在每个`test`方法之前调用，因此这是初始化通用对象的最佳位置。应始终调用`parent::setUp()`。

    *   `tearDown`在每个`test`方法之后调用。不要忘记调用`parent::tearDown`。


    `tearDownAfterClass`在测试用例中的测试方法启动后调用一次。此方法必须是`static`的。


    # 总结


    在本章中，我们编写了第一个单元测试。起初它失败了，因为我们遵循了TDD。你学习了测试方法的主要原则：断言如何工作。你还学习了胖模型以及模型、控制器和视图之间的区别。最后，你学习了测试回调。


    # 9. 控制器测试 1


    ![A337704_2_En_9_Figa_HTML.jpg](A337704_2_En_9_Figa_HTML.jpg)


    是的，通过尝试和实践来学习是编码的根本


    在第[7](#A337704_2_En_7_Chapter.html)章中，你看到模型测试继承自`TestCase`。控制器测试继承自`IntegrationTestCase`。使用这些基类将模拟`get`、`post`调用，并检查响应对象。'
  raw: '## Names of Test Functions


    Test function names should start with `test`.


    Don’t be afraid to use descriptive function names, even if they are long. They’re
    a great help. We want to check who was the last registered user, and from our
    fixture, we know that should be our only user `''rrd''`. So, we used `testIfWeGetRrdAsLastRegisteredUser`
    for the method name. We should keep in mind that when we add new users to our
    fixtures, we should update this test also.


    ## Assertions


    In test functions, we’ll do something simple: take an expected value and see if
    our function’s return value is equal to that value. There are other useful assertion
    methods, such as `assertTrue`, `assertFalse`, and `assertContains`. You can see
    all of them at PHPUnit API ( [`https://phpunit.de/manual/current/en/appendixes.assertions.html`](https://phpunit.de/manual/current/en/appendixes.assertions.html)
    ).


    ## Fail First


    Do you remember the process of TDD? First, you write a test that fails. We are
    ready for that, and it should come as a surprise, as our model method only returns
    `true`. So, now let’s write the correct code.


    ## Passing Test


    OK. Our test failed. Now add the actual code to the user model.


    ```

    1  public function getLastRegistered()

    2  {

    3      return $this->find()

    4          ->order(''created'')

    5          ->first();

    6  }

    ```


    We requested the last registered user’s data by calling the `Users` model’s `find()`
    method, ordered the results by `created` field and returned the first result.


    Rerunning the test should give us a passed tests report with a green bar (Figure
    [8-2](#A337704_2_En_8_Chapter.html#Fig2)).


    ![A337704_2_En_8_Fig2_HTML.jpg](A337704_2_En_8_Fig2_HTML.jpg)


    Figure 8-2.


    Passed test


    So, what actually happened in our test?


    ```

    1  public function testIfWeGetRrdAsLastRegisteredUser()

    2  {

    3      $actual = $this->Users->getLastRegistered();

    ```


    The method will return a `User` object that will be populated from the test database.


    ```

    4      $expected = ''rrd'';

    ```


    We define the expected value.


    ```

    5      $this->assertEquals($expected, $actual->username);

    6  }

    ```


    And then do the assertion. If everything is fine, `$actual->username` should be
    `''rrd''`.


    Take your `UsersFixture.php` file and add a new record. If the second user’s creation
    time was earlier than `rrd`’s, your test will pass. If it was created at a later
    time, your test will fail. When you’ve finished playing with this, leave your
    code in such a way that your test passes. A failing test means something is wrong.


    Our test finished in 798 ms. Tests should run fast. Always keep your eye on execution
    time.


    ## Tests and Fat Models


    One concept of writing better code is to have fat models and thin controllers.


    This means that the controllers should be really thin, just for a translator layer
    between requests and responses. So, the business logic is in models that are frequently
    used by controllers.


    Another concept is smaller is better. This means we should have small methods.
    There are those who advocate a maximum of three lines per method; others recommend
    a maximum ten lines. Short methods are easier to read, understand, maintain, and
    easy to test. Longer methods can easily break the single-responsibility principle.


    All these together mean that we will have fat models with many short methods that
    are responsible for only one thing. And perhaps you are going to have tests for
    all your model methods.


    Tests will help you to identify the bad coding patterns that you follow and cause
    problems for you.


    CakePHP follows the Model-View-Controller (MVC) pattern, offers good support,
    and helps you to follow along, even if programming patterns are new to you. Let’s
    say that we want to have a list of users grouped by the first character of their
    names. So, something like A: Amindala, B: Ben Kenobi, Boba Fett, etc. Perhaps
    we want a list of links, so that if the user clicks someone’s name, he or she
    will be redirected to the user’s profile page.


    To meet this requirement, we should query our user table for the usernames, then
    set the result available for the view and build up an HTML list.


    The communication with the database should be in our model. All your `find()`
    calls should be in models.


    The controller will check users’ permissions and set variables for the views to
    display or flash error messages.


    The view should actually build up the HTML list and links. View should not do
    any business logic, only print out output. If you have print (or echo) statements
    in your controller or model, you have broken the MVC pattern. At the same time,
    most of the view code should be printing only output and not anything else. An
    exception is calculating table summaries or averages.


    ## Test Callbacks


    You may have noticed that some functions are automatically generated by `bake`.
    These are test callbacks. CakePHP’s unit tests have the following callback methods:


    *   `setUp` is called before every `test` method, so this is the best place to
    put initialization of generally used objects. You should always call `parent::setUp()`.

    *   `tearDown` is called after every `test` method. Don’t forget to call `parent::tearDown`.


    The `tearDownAfterClass` is called once, after the test methods in a case are
    started. This method must be `static`.


    ## Summary


    In this chapter, we wrote our first unit test. At first, it failed, as we followed
    TDD. You learned the main principle of test methods: how assertions work. You
    also learned about fat models and the differences between models, controllers,
    and views. Finally, you learned about test callbacks.


    # 9. Controller Tests 1


    ![A337704_2_En_9_Figa_HTML.jpg](A337704_2_En_9_Figa_HTML.jpg)


    Yes, learning by trying and doing is the root of coding


    In chapter [7](#A337704_2_En_7_Chapter.html), you saw that model tests extend
    `TestCase`. Controller tests extend `IntegrationTestCase`. Using this as base
    classes will simulate `get`, post `calls`, and check for response objects.'
