    **3.** If the two hash values are different, we will assume the image was requested
    incorrectly, and a 404 error is sent back.


    **4.** If the hash value is correct, we generate the thumbnail and send it back.


    If the user manually changes the width or height in the URL, the hash will not
    match the request, so the thumbnail won’t be generated.


