  图 15-6 展示了各子目录的职责并包含所有相关信息。基础 Symfony 应用结构可在 Symfony 官方网页 [`https://symfony.com/doc/current/bundles/best_practices.xhtml#directory-structure`](https://symfony.com/doc/current/bundles/best_practices.xhtml#directory-structure)
  找到。


  项目创建完成后，使用以下命令启动：


