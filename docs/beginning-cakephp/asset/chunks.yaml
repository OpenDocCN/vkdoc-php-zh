    In this chapter, I’ll explain the final routines to consider when wrapping up
    a Cake application and making it ready to deploy. I won’t go through the code
    line by line, but I will direct you to common tasks that put the finishing touches
    on your Cake projects. Consider the routines outlined here as exercises that will
    help you practice.


    **Designing the Home Page**


    Until now, I’ve pointed you to areas of the application by specifying a direct
    URL. For instance, when telling you to edit a certain action, I would write the
    path to that action with the full URL


    (like [http://localhost/blog/posts/view/1](http://localhost/blog/posts/view/1)).
    You will need to create a home page that contains all these URLs or at least a
    page that lists how to navigate to all the features you’ve built into the blog.
    Many novices begin with the home page before building the features of the application,
    which can lead to a cluttered starting point for their visitors. Design considerations
    aside, Cake, by its architecture and convention, promotes using dynamic methods
    as much as possible to generate site content. You can take advantage of what you’ve
    already built into the blog application to create the links that will direct the
    user to all other areas of the site.


    The first step is to create a starting point. Then, you provide content and navigation
    that takes the user through the interface from that point to the next. You have
    two options for creating this starting point, or home page: you can use Cake’s
    built-in Pages controller or choose an action to be the starting point, such as
    the Posts Index action.


    **Using the Pages Controller to Produce a Single View**


    Areas of the application that don’t necessarily perform any logic or that assemble
    various methods from several controllers, like a home page, may need a view only.
    For your blog application, home needs to include only a couple of posts that link
    to their full-story view and the categories links you built in Chapter 14 with
    the Tree behavior. I would normally do this by **273**


