  \n\n\n## 显示产品详情\n\n那么，如何显示额外的产品详情，比如描述和不同的功能特性呢？回想一下第 1 章的内容，关于产品的所有信息——包括其代码、名称、价格、描述等——都存储在`products`表中。产品的功能特性则存储在一个名为`productfeatures`的独立表中。脚本`itemdetails.php`（如代码清单\
  \ 3-7 所示）会显示所选产品的详细信息。\n\n代码清单 3-7. `itemdetails.php`脚本显示所选项目的详细信息\n\n```php\n<?php\n\
  \ninclude('topmenu.php');\n\n$connect = mysqli_connect(\"localhost\", \"root\",\
