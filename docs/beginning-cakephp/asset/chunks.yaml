    Set to unsigned; give it the primary key, and set it to


    auto_increment.


    name


    varchar


    date


    datetime


    priority


    int


    completed


    tinyint


    Giving each record a unique id value is essential for Cake to function without
    trouble.


    This application is simple, so you may be able to get by without creating an id
    field set to auto_increment. However, it’s good practice to make sure that all
    your records in the database can be identified by a unique value and that it’s
    named id, because then Cake can generate scaffolding around your table without
    any code on your part. Once you begin creating associated tables, then it will
    be mandatory to include an id field.


    ■**Note** When specifying how to design the database schema, I will provide you
    with MySQL dump table creation code rather than walk through each field and its
    types and values (for example, ìdìnt(11) unsigned NOT_NULL auto_increment).


    **Creating Models**


    Now that you have a table in the database, Cake will need a model file to talk
    to that table and fetch results for the application. In the app/models directory,
    create a new file named item.php.'
