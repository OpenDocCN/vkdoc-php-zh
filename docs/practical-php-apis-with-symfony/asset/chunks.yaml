    ### 检查权限


    在本节中，我们将修改 `ApiOperationHandler`，使其能够检查用户是否拥有执行操作的足够权限。


    ```

    use App\Api\Collection\OperationCollection;

    use App\Api\Input\ApiInput;

    use App\Api\Output\ApiOutput;

    use App\Validation\ValidationHandler;

    use Symfony\Bundle\SecurityBundle\Security;

    use Symfony\Component\Security\Core\Exception\AccessDeniedException;

    class ApiOperationHandler

    {

    public function __construct(

    private readonly ValidationHandler $validationHandler,

    private readonly OperationCollection $operationCollection,

    private readonly Security $security

    ){ }

    public function performOperation(ApiInput $apiInput): ApiOutput

    {

    $operation = $this->operationCollection->getOperation($apiInput->operation);

    $isGranted = $this->security->isGranted(''PERFORM'', $operation);

    if(!$isGranted){

    throw new AccessDeniedException(''Not allowed to perform this operation'');

    }

    $inputData = ($operation->metadata->input)

    ? $this->validationHandler->deserializeAndValidate($apiInput->data, $operation->metadata->input)

    : null

    ;

    return $operation->handler->perform($inputData);

    }

    }

    ```


    让我们重点关注 `getOperation` 行下方的变化。它使用了 `security.helper` Symfony 服务的 `isGranted` 方法来检查用户是否拥有权限。在内部，此方法会执行所有其
    `supports` 方法返回 `true` 的投票器。由于投票器采用“一致同意”策略，如果任何投票器拒绝访问，则请求的操作将被撤销；否则，该操作将被授予权限。


    -   为了使用 `security.helper` 服务，我们通过注入 `Symfony\Bundle\SecurityBundle\Security`
    类（它是该服务的别名）来使用它。


    ### 结论


    通过使用投票器，我们已经实现了对操作访问的细粒度控制。这确保了只有授权的用户才能执行特定操作，从而保护了 API 中的敏感数据和功能。在下一节中，我们将处理操作需要访问当前登录用户信息的情况。


    ## 第 4 节：从操作中访问已登录用户


    可能存在需要访问已登录用户数据的操作。例如，`SendPayment` 操作在发送付款前可能需要获取当前用户的余额。因此，我们需要一种方法来实现：


    -   确定操作是否需要访问用户信息

    -   将用户传递给操作，以便操作可以使用它


    ### OperationRequiresUserInterface 接口


    让我们先创建一个接口，该接口将由那些需要访问用户信息的操作来实现。


    ```

    use Symfony\Component\Security\Core\User\UserInterface;

    interface OperationRequiresUserInterface

    {

    public function setUser(UserInterface $user): void;

    }

    ```


    该接口声明了一个名为 `setUser` 的方法，`ApiOperationHandler` 将使用此方法将用户传递给操作。


    ### 将用户传递给操作


    我们必须修改 `ApiOperationHandler` 的 `performOperation` 方法，使其能够检查操作是否需要用户信息并将其传递。


    ```

    public function performOperation(ApiInput $apiInput): ApiOutput

    {

    $operation = $this->operationCollection->getOperation($apiInput->operation);

    $isGranted = $this->security->isGranted(''PERFORM'', $operation);

    if(!$isGranted){

    throw new AccessDeniedException(''Not allowed to perform this operation'');

    }

    $inputData = ($operation->metadata->input)

    ? $this->validationHandler->deserializeAndValidate($apiInput->data, $operation->metadata->input)

    : null

    ;

    if($this-security-getToken()?-getUser() && $operation->handler instanceof OperationRequiresUserInterface)
    {

    $operation->handler->setUser($this->security->getToken()->getUser());

    }

    $operation->handler->perform($inputData);

    }

    ```


    在验证操作数据之后，`performOperation` 函数会检查操作对象是否是 `OperationRequiresUserInterface` 的实例，也就是说，该操作实现了这个接口。如果是，处理器就会使用
    `setUser` 方法将用户传递给该操作。


    ### 实现 OperationRequiresUserInterface 接口


    让我们让 `SendPayment` 操作实现 `OperationRequiresUserInterface` 接口。


    ```

    use App\Api\Attribute\OperationMetadata;

    use App\Api\Input\Operation\SendPaymentInput;

    use App\Api\Output\ApiOutput;

    use App\Security\Miscelanea\OperationNames;

    use Symfony\Component\Security\Core\User\UserInterface;

    #[OperationMetadata(

    name: OperationNames::SendPayment->name,

    input: SendPaymentInput::class,

    )]

    class SendPaymentOperation implements OperationInterface, OperationRequiresUserInterface

    {

    private ?UserInterface $user = null;

    /**

    * @param SendPaymentInput $data

    */

    public function perform(mixed $data): ApiOutput

    {

    /**

    * 发送付款的业务逻辑将在此处编写

    */

    return new ApiOutput([

    ''id'' => ''77fg76hf''

    ], 202);

    }

    public function setUser(?UserInterface $user): void

    {

    $this->user = $user;

    }

    }

    ```


    如您所见，`setUser` 方法使用作为参数传递的用户来初始化操作的 `user` 属性，从那一刻起，该用户便可在操作中使用。


    ### 结论


    在本节中，我们设计了一种方法，允许操作在需要时访问当前登录的用户。在下一节中，我们将学习如何根据用户角色验证输入请求。


    ## 第 5 节：根据用户角色验证操作


    在上一章中，我们根据操作输入类的属性约束来验证操作。在本章中，我们将更进一步，也根据用户角色来验证操作。


    ### 在输入模型中使用验证组


    Symfony [验证组](https://symfony.com/doc/current/validation/groups.html) 是一个很好的功能，可以仅针对对象的某些约束进行验证。让我们从以下假设开始：我们想要创建一个用于创建项目的操作。这些项目始终需要名称和描述。项目的开始日期和结束日期仅对
    `ROLE_PROJECT_MANAGER` 用户是必需的，因此：


    -   **ROLE_PROJECT_MANAGER**：他们必须发送所有参数。

    -   **ROLE_DEVELOPER**：他们只需发送名称和描述。


    下面您可以看到输入类：


    ```

    use Symfony\Component\Validator\Constraints\IsNull;

    use Symfony\Component\Validator\Constraints\Date;

    use Symfony\Component\Validator\Constraints\NotBlank;

    readonly class CreateProjectInput

    {

    public function __construct(

    #[NotBlank(message: ''名称不能为空'', groups: [''ROLE_PROJECT_MANAGER'', ''ROLE_DEVELOPER''])]

    public string $name,

    #[NotBlank(message: ''描述不能为空'', groups: [''ROLE_PROJECT_MANAGER'', ''ROLE_DEVELOPER''])]

    public string $description,

    #[NotBlank(message: ''开始日期不能为空'', groups: [''ROLE_PROJECT_MANAGER''])]

    #[IsNull(message: ''开始日期必须为空'', groups: [''ROLE_DEVELOPER''])]

    #[Date(message: ''开始日期必须是一个有效的日期'', groups: [''ROLE_PROJECT_MANAGER''])]

    public string $startDate,

    #[NotBlank(message: ''结束日期不能为空'', groups: [''ROLE_PROJECT_MANAGER''])]

    #[IsNull(message: ''结束日期必须为空'', groups: [''ROLE_DEVELOPER''])]

    #[Date(message: ''结束日期必须是一个有效的日期'', groups: [''ROLE_PROJECT_MANAGER'' ])]

    public string $endDate,

    ){}

    }

    ```


    正如您所看到的，该模型规定名称和描述对于管理员和开发人员都是必需的，但开始和结束日期只能由项目经理指定。实际上，[`IsNull`](https://symfony.com/doc/current/reference/constraints/IsNull.html)
    约束指定了开发人员不能填写这些属性。


    -   我们使用 `IsNull` 约束来避免由于尝试在可为空的日期字段中存储空字符串而导致数据库错误。

    '
- fmt: '### Specifying That the Operation Uses Groups


    Now, we need to specify that the operation uses validation groups so that the
    handler can act accordingly. To do it, we are going to add a new parameter named
    `validateByRole` in the `OperationMetadata` attribute so that the `ApiOperationHandler`
    can know whether to use validation groups or not.


    ```

    #[Attribute(\Attribute::TARGET_CLASS)]

    class OperationMetadata

    {

    public function __construct(

    public readonly string $name,

    public readonly ?string $version = null,

    public readonly ?string $input = null,

    public readonly ?bool $validateByRole = null

    ){ }

    }

    ```


    ### Adapting the Validation Handler to Use Groups


    If you remember from Chapter [1](#663561_1_En_1_Chapter.xhtml), "Section 5. Validating
    Operations," we created a class named `ValidationHandler` to deserialize and validate
    the received operation data according to the operation input model. We need to
    modify this class so that it can apply the validation groups when needed.


    Let''s take a look at the `ValidationHandler` class again:


    ```

    use App\Exception\InvalidPayloadException;

    use Symfony\Component\Serializer\SerializerInterface;

    use Symfony\Component\Validator\Exception\ValidationFailedException;

    use Symfony\Component\Validator\Validator\ValidatorInterface;

    class ValidationHandler

    {

    public function __construct(

    private readonly SerializerInterface $serializer,

    private readonly ValidatorInterface $validator

    ){}

    public function deserializeAndValidate(array|string $payload, string $className,
    ?array $groups)

    {

    try{

    $object = (is_array($payload))

    ? $this->serializer->denormalize($payload, $className)

    : $this->serializer->deserialize($payload, $className, ''json'')

    ;

    }

    catch(\Symfony\Component\Serializer\Exception\ExceptionInterface $e) {

    throw new InvalidPayloadException();

    }

    $errors = $this->validator->validate($object, null, $groups);

    if(count($errors) > 0) {

    throw new ValidationFailedException(null, $errors);

    }

    return $object;

    }

    }

    ```


    As you can see, we have only made two changes:


    - We have added a third parameter to the `deserializeAndValidate` method to be
    able to pass the groups to apply. It may be null since groups may not apply.

    - We pass the groups to the Symfony validation service. Symfony also accepts the
    groups parameter as null for the cases where groups do not apply.


    ### Adapting the ApiOperationHandler to Pass the Groups


    To finish this section, we must instruct the `ApiOperationHandler` so that it
    can know whether to use validation groups or not.


    ```

    public function performOperation(ApiInput $apiInput): ApiOutput

    {

    $operation = $this->operationCollection->getOperation($apiInput->operation);

    $isGranted = $this->security->isGranted(''PERFORM'', $operation);

    if(!$isGranted){

    throw new AccessDeniedException(''Not allowed to perform this operation'');

    }

    $validationGroups = ($operation->metadata->validateByRole) ? $this->security->getUser()->getRoles()
    : null;

    $inputData = ($operation->metadata->input)

    ? $this->validationHandler->deserializeAndValidate($apiInput->data, $operation->metadata->input,
    $validationGroups)

    : $apiInput->data

    ;

    return $operation->handler->perform($inputData);

    }

    ```


    If we take a look at the `ApiOperationHandler performOperation` method, it checks
    the `validateByRole` value. If it is true, it assigns an array for the `$validationGroups`
    variable which holds the group names (which match the user roles). Otherwise,
    it assigns null. Then, the `$validationGroups` variable is passed to the `deserializeAndValidate`
    method as the third parameter.


    ### Conclusion


    We have explored how to use Symfony validation groups to validate a subset of
    the operation input properties based on the authenticated user roles. This offers
    us the flexibility to enforce different validation rules tailored to the specific
    permissions and responsibilities of each user role.


    In the next section, we will learn how to use a rate limiter to control the frequency
    of requests made by each user to prevent abuse and ensure system stability.


    ## Section 6. Controlling Requests


    To prevent DoS attacks, we will rely on the Symfony rate-limiter component to
    control the number of requests that arrive at the API.


    ### The Token-Bucket Strategy


    Imagine a token bucket as a container that holds a limited number of tokens. In
    the context of rate-limiting requests to an API, the token bucket strategy works
    like this:


    - Initially, the token bucket is filled with a certain number of tokens.

    - Each time a request is made to the API, the system checks if there are enough
    tokens in the bucket.

    - If there are enough tokens available, the request execution continues, and the
    system removes a token from the bucket.

    - If there are not enough tokens available, the request is delayed until more
    tokens become available.


    Over time, the token bucket refills at a certain rate, adding new tokens to the
    bucket.


    ### Configuring Token-Bucket Strategy


    The rate limiter configuration is located in the file `config/packages/framework.yaml`
    under the `rate_limiter` section.


    ```

    framework:

    rate_limiter:

    api:

    policy: ''token_bucket''

    limit: 5000

    rate: { interval: ''20 minutes'', amount: 200 }

    ```


    The above configuration allows a maximum of 5000 tokens and adds 200 tokens every
    20 minutes after making the first HTTP request. The `policy` key indicates that
    we are using the `token_bucket` strategy. As we are using service auto-wiring,
    Symfony will create a bound var named `apiLimiter` which will hold our rate-limiter
    service. Let''s see how to use it in the next section.'
