- fmt: "```css\n.left_box {\n  margin: 0px 15px 15px 0px;\n  padding: 2px;\n  width:\
    \ 170px;\n}\n\nimg {\n  border: 0;\n}\n\n#header {\n  left: 194px;\n  margin:\
    \ 0px;\n  padding: 0px;\n  position: absolute;\n  text-align: right;\n  top: 10px;\n\
    \  width: 570px;\n}\n\n#content {\n  left: 194px;\n  margin: 0px;\n  padding:\
    \ 0px 0px 10px 10px;\n  position: absolute;\n  top: 110px;\n  width: 558px;\n\
    }\n```\n\n**7.** Add a file named `config.php` to the `hatshop/include` folder,\
    \ with the following contents:\n\n```php\n<?php\n// SITE_ROOT contains the full\
    \ path to the hatshop folder\ndefine('SITE_ROOT', dirname(dirname(__FILE__)));\n\
    \n// Application directories\ndefine('PRESENTATION_DIR', SITE_ROOT . '/presentation/');\n\
    define('BUSINESS_DIR', SITE_ROOT . '/business/');\n\n// Settings needed to configure\
    \ the Smarty template engine\ndefine('SMARTY_DIR', SITE_ROOT . '/libs/smarty/');\n\
    define('TEMPLATE_DIR', PRESENTATION_DIR . '/templates');\ndefine('COMPILE_DIR',\
    \ PRESENTATION_DIR . '/templates_c');\ndefine('CONFIG_DIR', SITE_ROOT . '/include/configs');\n\
    ?>\n```\n\nBefore moving on, let’s see what happens here. `dirname(__FILE__)`\
    \ returns the parent directory of the current file; naturally, `dirname(dirname(__FILE__))`\
    \ returns the parent of the current file’s directory. This way our `SITE_ROOT`\
    \ constant will be set to the full path of `hatshop`. With the help of the `SITE_ROOT`\
    \ constant, we set up absolute paths of Smarty folders.\n\n**8.** Create a file\
    \ named `app_top.php` in the `hatshop/include` folder, and add the following contents\
    \ to it:\n\n```php\n<?php\n// Include utility files\nrequire_once 'include/config.php';\n\
    \n// Load the page template\nrequire_once PRESENTATION_DIR . 'page.php';\n?>\n\
    ```\n\nThis file (`app_top.php`) will be included at the top of the main web pages\
    \ to perform the necessary initializations.\n\n**9.** Create a file named `page.php`\
    \ in the `hatshop/presentation` folder, and add the following contents to it:\n\
    \n```php\n<?php\n// Reference Smarty library\nrequire_once SMARTY_DIR . 'Smarty.class.php';\n\
    \n/* Class that extends Smarty, used to process and display Smarty files */\n\
    class Page extends Smarty\n{\n    // Class constructor\n    public function __construct()\n\
    \    {\n        // Call Smarty's constructor\n        parent::Smarty();\n\n  \
    \      // Change the default template directories\n        $this->template_dir\
    \ = TEMPLATE_DIR;\n        $this->compile_dir = COMPILE_DIR;\n        $this->config_dir\
    \ = CONFIG_DIR;\n    }\n}\n?>\n```\n\nIn `page.php`, you extend the `Smarty` class\
    \ with a wrapper class named `Page`, which changes Smarty’s default behavior.\
    \ The `Page` class configures in its constructor the Smarty folders you created\
    \ earlier.\n\n> **Tip:** As mentioned earlier, Smarty requires three folders to\
    \ operate: `templates`, `templates_c`, and `configs`. In the constructor of the\
    \ `Page` class, we set a separate set of these directories for our application.\
    \ If you want to turn on caching, then Smarty also needs a directory named `cache`.\
    \ We will not be using Smarty caching for HatShop, but you can read more details\
    \ about this in the Smarty manual at http://smarty.php.net/manual/en/caching.php.\n\
    \n**10.** Add the `index.php` file to the `hatshop` folder. The role of this file\
    \ is to load the `index.tpl` template by using the `Page` class you created earlier.\
    \ Here’s the code for `index.php`:\n\n```php\n<?php\n// Load Smarty library and\
    \ config files\nrequire_once 'include/app_top.php';\n\n// Load Smarty template\
    \ file\n$page = new Page();\n\n// Display the page\n$page->display('index.tpl');\n\
    ?>\n```\n\n**11.** Now it’s time to see some output from this thing. Load `http://localhost/hatshop/`\
    \ in your favorite web browser, and admire the results as shown in Figure 2-9.\n\
    \n![Figure 2-9](images/00093.png)\n\n**Figure 2-9.** *Running HatShop*\n\n###\
    \ How It Works: The First Page of HatShop"
