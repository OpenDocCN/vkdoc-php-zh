    **Preparing the Database**


    The final step in this chapter is to create the PostgreSQL database, although
    you won’t use it until the next chapter. We will show you the steps to create
    your database and create a user with full privileges to it using the pgAdmin III
    utility that ships with PostgreSQL. If you’re working with a database hosted by
    a hosting service, the service may give you access to your database through a
    web-based utility such as phpPgAdmin. See http://phppgadmin.


    sourceforge.net/ for more details about using phpPgAdmin.


    Before moving on, make sure you have PostgreSQL 8 installed. Consult Appendix
    A for installation instructions. Follow the steps in the exercise to create the
    database and a new user account.


    **Exercise: Creating the hatshop Database and a New User Account** **1.**


    Start the pgAdmin III utility, and select your database server from the left pane
    (in Windows, you start pgAdmin III by choosing Start ➤ Programs ➤ PostgreSQL ➤
    pgAdmin III). The window should then look like the one in Figure 2-11.


    **Figure 2-11.** *The main pgAdmin III page*


    **2.** While the database server is selected, choose Tools ➤ Connect. Alternatively,
    you can right-click the database server entry, and select Connect from the context
    menu. If asked, enter the root password and click OK.


    **3.** You connected to the database server using the superuser account. For our
    project, we want to create a regular user account that will have access just to
    the hatshop database. Extend the database server node, right-click the Login Roles
    node, and select New Login Role from the context menu. Type **hatshopadmin** for
    the role name and for its password, and check the Superuser check box, as shown
    in Figure 2-12\. Then click OK.


