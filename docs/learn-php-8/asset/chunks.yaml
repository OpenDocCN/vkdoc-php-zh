    1.  使用第 2 章学期项目中的设计，创建一个 PHP 程序，该程序包含一个或多个 PHP 函数，用于验证从每个字段传入的信息内容，以确保没有发生数据损坏。将这些函数放在其自己的文件中。测试程序应导入这些函数，并尝试在数组中放置有效和无效的数据，当提供有效数据时，生成一份已入库物品的报告。创建的文件应使用与本章示例中所示类似的逻辑。


    # 4. 模块化编程


    *我刚看到我的人生在眼前闪过，而我所能看到的只有一个闭合标签……*


    ## 章节目标/学生学习成果


    完成本章后，学生将能够


    *   创建一个无错误的、简单的面向对象 (OO) 模块化 PHP 程序

    *   创建一个 PHP 类并实例化该类（对象）

    *   创建一个 OO PHP 封装程序，包括 GET 和 SET 方法

    *   创建接受参数并返回信息的 PHP 方法（函数）

    *   创建 PHP 公有和私有属性（变量）

    *   将来自另一个文件或库的现有 PHP 代码导入到程序中

    *   使用三元（条件）运算符验证接收到的信息

