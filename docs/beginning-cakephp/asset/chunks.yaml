    服务器。Cake 连接这些数据源（datasource）的方式是通过一个名为 `DataSource` 的资源文件，这与数据源本身并非同一概念。为了在本章中保持一致性，我将使用驼峰式拼写的
    `DataSource` 来指代 Cake 的资源文件，而使用小写单词 `datasource` 来指代实际的数据源。简而言之，在 Cake 中，你使用 `DataSources`
    来连接诸如 MySQL、XML 文件和 LDAP 服务器等数据源。


    ![图片 47](img/index-266_1.jpg)


    ![图片 48](img/index-266_2.jpg)


    ![图片 49](img/index-266_3.jpg)


    将其传递给 `read()` 函数，而不是必须按照当前数据源可能要求的某种独特方式，逐步执行读取记录的操作。模型应尽可能避免为适应特定数据源而更改其现有方法。


    例如，图 14-2 展示了 MySQL `DataSource` 如何扩展模型，以使模型无需自行构造必要的 SQL 查询字符串并执行数据库连接方法。


    **图 14-2.** *MySQL DataSource 为模型拼接连接字符串和数据库查询。*


    过程如下：


    1. 模型运行其某个函数，该函数被发送至 `DataSource`；在此例中，调用了 `find()`，并发送了 `$value` 的内容。

    2. `DataSource` 根据数据源的语言拼接查询字符串，连接至数据源并执行查询；在此例中，MySQL `DataSource` 执行类似 `"SELECT
    * FROM table WHERE field=$value"` 的查询。

    3. 数据源返回结果集；此处，MySQL `DataSource` 执行一些 `mysql_fetch_array()` 函数，并遍历来自数据库的结果集以获取最终结果。

    4. 获得最终结果后，`DataSource` 格式化该结果集以供模型使用。这通常会是某种类型的数组。

    5. 格式化后的数组或结果集被发送回模型。模型随后将其数据用于自身用途。


    ## 使用内置 DataSources


    Cake 的内置 `DataSources` 仅支持关系型数据库系统。由于它们充当模型与数据库之间的层，模型内不会调用额外的 `DataSource` 函数。要从一个
    `DataSource` 切换到另一个，只需调整数据库配置文件即可。


    更改应用程序主 `DataSource` 的第一步是设置 `app/config/database.php` 中的 `driver` 参数。打开此文件，你将找到
    `DATABASE_CONFIG` 类；它应包含最初搭建博客应用时使用的原始设置（见清单 14-1）。


    **清单 14-1.** *`app/config/database.php` 中的 `DATABASE_CONFIG` 类*


    ```

    1 class DATABASE_CONFIG {

    2   var $default = array(

    3     ''driver'' => ''mysql'',

    4     ''persistent'' => false,

    5     ''host'' => ''localhost'',

    6     ''port'' => '''',

    7     ''login'' => ''root'',

    8     ''password'' => ''root'',

    9     ''database'' => ''blog'',

    10    ''schema'' => '''',

    11    ''prefix'' => '''',

    12    ''encoding'' => ''''

    13   );

    14 }

    ```


    清单 14-1 的第 2 至 13 行包含 `$default` 变量，它告知 Cake 连接到默认数据源的位置。博客应用当前通过内置的 MySQL `DataSource`
    连接到 MySQL。这在第 3 行通过 `driver` 参数设置。通过将其更改为其他驱动，Cake 将使用新的对应 `DataSource` 来替代 MySQL。表
    14-2 列出了可用的驱动选项，你可以根据想要连接的 `DataSource` 使用。


    **表 14-2.** *`DATABASE_CONFIG` 类可用的驱动选项*


    | 驱动参数 | 数据源 | 最低 PHP 版本要求 |

    |-----------|--------|---------------------|

    | `db2` | IBM DB2、Cloudscape 和 Apache Derby | PHP 4 |

    | `mssql` | Microsoft SQL Server 2000 及更高版本 | PHP 4 |

    | `mysql` | MySQL 4 和 5 | PHP 4 |

    | `mysqli` | MySQL 4 和 5 改进接口 | PHP 5 |

    | `oracle` | Oracle 8 及更高版本 | PHP 4 |

    | `postgres` | PostgreSQL 7 及更高版本 | PHP 4 |

    | `sqlite` | SQLite | PHP 5 |

