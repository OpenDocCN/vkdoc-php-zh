    \ content=\"product\" />\n  <meta name=\"twitter:title\" content=\"{{ product.title\
    \ }}\" />\n  <meta name=\"twitter:description\" content=\"{{ product.description\
    \ | strip_html | truncate: 200 }}\" />\n  {% if product.vendor == blank %}\n \
    \   <meta name=\"twitter:label1\" content=\"Price\" />\n    <meta name=\"twitter:data1\"\
    \ content=\"{{ product.price | money_without_currency }}\" />\n  {% else %}\n\
    \    <meta name=\"twitter:label1\" content=\"Vendor\" />\n    <meta name=\"twitter:data1\"\
    \ content=\"{{ product.vendor }}\" />\n  {% endif %}\n{% elsif template contains\
    \ 'article' %}\n  <!-- Article template Twitter Card markup -->\n{% endif %}\n\
    ```\n*清单 9-7 示例 snippets/twitter-card.liquid*\n"
- fmt: '# Validating Twitter Card Markup


    Unlike `Open Graph` markup, you need to "validate" your new markup before `Twitter`
    will use it.


    To do that, simply head to Twitter''s Card Validator at [`https://cards-dev.twitter.com/validator`](https://cards-dev.twitter.com/validator)
    (you''ll need to be logged in to `Twitter`). Select `Product` from the `Card Catalog`,
    then select the `Validate & Apply` tab and enter the `URL` of any of the product
    pages on your site.


    Click `Go` and you should see confirmation that your card markup has been validated,
    along with a preview of what it will look like when someone shares a product from
    your theme, as shown in Figure [9-4](#A437216_1_En_9_Chapter.html#Fig4).


    ![A437216_1_En_9_Fig4_HTML.jpg](A437216_1_En_9_Fig4_HTML.jpg)


    Figure 9-4 The Twitter Card validator will show you a preview based on extracted
    data


    ## Caring about Sharing


    Once you''ve gone to the effort of setting up this markup, you''re going to want
    to take advantage of it by encouraging visitors to your site to share your products
    and content pages.


    ### Deciding Which Share Options to Support


    First, you should recognize that "the more the merrier" isn''t a great catchphrase
    when it comes to sharing widgets. Instead, sites tend to do better with social
    traffic when they focus on a few key social networks, rather than slapping a barrage
    of icons on their product pages (see Figure [9-5](#A437216_1_En_9_Chapter.html#Fig5)).


    ![A437216_1_En_9_Fig5_HTML.jpg](A437216_1_En_9_Fig5_HTML.jpg)


    Figure 9-5 Scattergun approaches to sharing like this are rarely effective or
    engaged with by users


    Users are easily overwhelmed by choice, so making that choice simpler ("Do I share
    to `Facebook` or `Twitter`?") makes it more likely they''ll take one of these
    actions instead of giving up entirely. Putting the focus on two or three networks
    also makes it easier for the storeowner to manage and engage people on those networks
    while running the store without being spread too thin.


    If you''re working with a specific client, a conversation with them should help
    you both work out which networks are going to be the most beneficial for them.[¹](#A437216_1_En_9_Chapter.html#Fn1)
    More niche or geographically-specific platforms might be important too, depending
    on the context.


    If you''re building a theme to be used by many different stores, then you should
    add support for all the major social networks and allow storeowners to toggle
    them on and off in the theme''s settings page (refer to Chapter [8](#A437216_1_En_8_Chapter.html)
    on theme setting customization).


    Regardless of which networks you choose to focus on, I strongly recommend giving
    users an easy way to share your pages via email. While not everyone may be accustomed
    to the social networks you''re using, email is ubiquitous, and is the most common
    way of sharing a product with a specific person. Adding email sharing support
    can be as simple as adding a `mailto:` link with a blank recipient and a short
    pre-populated subject and body, letting the users send a message through their
    own mail clients.


    ### Integrating Sharing


    All major social networks allow you to integrate sharing buttons very easily,
    often through a small JavaScript snippet. However, there are two major issues
    with using these default buttons:


    - They''re unlikely to match the design aesthetic of your theme

    - They often come with a performance overhead and can slow down your site


    The first can be an issue if the mismatch between the buttons and the rest of
    your page ends up drawing focus away from the primary piece of content on the
    page. The second is a usability issue, especially on mobile devices, where adding
    four or five scripts (which in turn often load additional scripts) kills performance.


    Fortunately, the solution to both problems is quite simple! All social networks
    allow users to trigger a share action through a simple `<a href="">` link, which
    you can of course style however you like (see Figure [9-6](#A437216_1_En_9_Chapter.html#Fig6)
    for example of how this has been done in Shopify''s `Pop` theme).


    ![A437216_1_En_9_Fig6_HTML.jpg](A437216_1_En_9_Fig6_HTML.jpg)


    Figure 9-6 Sharing triggers in the `Pop` theme have been restyled as simple links
    that match the aesthetic


    Building up the `URL` for the `href` attribute for use on the different social
    networks can be a little tricky. Here''s an example of how I''d do it in `Liquid`
    for a `Twitter` share link:


    ```

    Tweet this!

    ```


    Twitter''s a pretty simple use case, as it only requires us to pass the text and
    `URL` parameters. Some networks, like `LinkedIn`, expect more parameters.


    The `code/snippets/social-share.liquid` example in the resources bundled with
    the book includes a pattern for share links that handles multiple social networks,
    as well as adapting to the type of page (product, article, or content page) it''s
    being used on, which you''re welcome to repurpose for your own themes.


    ## Exercise: SEO and Social Sharing


    Following each section in this chapter, walk through your exercise theme and ensure
    that it conforms to `SEO` best practices and that it''s configured for social
    sharing.


    Some of the things you should check are:


    - Every page has an `<h1>` header and a `meta` description.

    - Your `theme.liquid` defines a canonical `URL` for every page, using the `Liquid`
    `{{ canonical_url }}` tag.

    - All images define appropriate `alt` attributes.

    - `Schema.org` markup is provided on index, product, and articles pages, either
    through `Microdata` or `JSON-LD`.

    - Product and article pages define `Open Graph` and `Twitter Card` markup.

    - Products are easily shareable via on-page links.


    Feel free to use the `JSON-LD`, `Open Graph`, `Twitter Card`, and `Social Sharing`
    snippets provided in the downloadable resources to achieve this. Just make sure
    you take a couple of minutes to walk through the code so that you''re clear about
    what each snippet is doing.


    ## Summary


    This chapter discussed the difference between on-page and off-page `SEO`. It then
    focused on techniques for improving on-page `SEO` in your themes, as they are
    the elements most commonly under our control as designers and developers.


    The chapter also looked at ways to help customers share content from themes and
    looked at which sharing mechanisms it makes sense for your theme to support.


    ## Footnotes


    [1](#A437216_1_En_9_Chapter.html#Fn1_source) Kevan Lee''s epic blog post called
    "How to Choose the Right Social Network for Your Business" provides some excellent
    guidance on this: [`https://blog.bufferapp.com/how-to-choose-a-social-network`](https://blog.bufferapp.com/how-to-choose-a-social-network).


    # 10. Performance


    This chapter explains theme performance—why it''s important, how to measure it,
    and how to improve it. It discussed techniques that we can use to both reduce
    initial load times and improve the perceived responsiveness of a `Shopify` storefront.


    While it pays dividends to be thinking about these ideas from day one of your
    theme design, the techniques discussed here are equally useful for existing themes
    that need some fat trimmed.'
