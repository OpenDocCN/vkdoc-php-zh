- fmt: "# Processing Database Records\n\nIf you process each record as `$row`, the\
    \ extract is in `$row['first100']`. To retrieve both the first 100 characters\
    \ and the full article, simply include both in the query like this:\n\n```\nSELECT\
    \ article_id, title, LEFT(article, 100) AS first100, article\nFROM blog ORDER\
    \ BY created DESC\n```\n\nTaking a fixed number of characters produces a crude\
    \ result, as Figure [16-1](#332054_4_En_16_Chapter.xhtml#Fig1) shows.\n\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig1_HTML.jpg](images/332054_4_En_16_Chapter/332054_4_En_16_Fig1_HTML.jpg)\n\
    \n**Figure 16-1.** Selecting the first 100 characters from an article chops many\
    \ words in half\n\n## Ending an Extract on a Complete Word\n\nTo end an extract\
    \ on a complete word, you need to find the final space and use that to determine\
    \ the length of the substring. So, if you want the extract to be a maximum of\
    \ 100 characters, use either of the preceding methods to start with, and store\
    \ the result in `$extract`. Then you can use the PHP string functions `strrpos()`\
    \ and `substr()` to find the last space and end the extract like this (the code\
    \ is in `blog_word_mysqli.php` and `blog_word_pdo.php`):\n\n```\n$extract = $row['first100'];\n\
    // find position of last space in extract\n$lastSpace = strrpos($extract, ' ');\n\
    // use $lastSpace to set length of new extract and add ...\necho safe(substr($extract,\
    \ 0, $lastSpace)) . '... ';\n```\n\nThis produces the more elegant result shown\
    \ in Figure [16-2](#332054_4_En_16_Chapter.xhtml#Fig2). It uses `strrpos()`, which\
    \ finds the last position of a character or substring within another string. Since\
    \ you're looking for a space, the second argument is a pair of quotes with a single\
    \ space between them. The result is stored in `$lastSpace`, which is passed as\
    \ the third argument to `substr()`, finishing the extract on a complete word.\
    \ Finally, add a string containing three dots and a space, and join the two with\
    \ the concatenation operator (a period or dot).\n\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig2_HTML.jpg](images/332054_4_En_16_Chapter/332054_4_En_16_Fig2_HTML.jpg)\n\
    \n**Figure 16-2.** Ending the extract on a complete word produces a more elegant\
    \ result\n\n> **Caution:** Don't mix up `strrpos()`, which gets the last position\
    \ of a character or substring, with `strpos()`, which gets the first position.\
    \ The extra \"r\" stands for \"reverse\"—`strrpos()` searches from the end of\
    \ the string.\n\n## Extracting the First Paragraph\n\nAssuming that you have entered\
    \ your text in the database using the Enter or Return key to indicate new paragraphs,\
    \ this is very easy. Simply retrieve the full text, use `strpos()` to find the\
    \ first newline character, and use `substr()` to extract the first section of\
    \ text up to that point.\n\nThe following SQL query is used in `blog_para_mysqli.php`\
    \ and `blog_para_pdo.php`:\n\n```\nSELECT article_id, title, article\nFROM blog\
    \ ORDER BY created DESC\n```\n\nThe following code is used to display the first\
    \ paragraph of `article`:\n\n```php\necho safe(substr($row['article'], 0, strpos($row['article'],\
    \ PHP_EOL)));\n```\n\nLet's break it up and take a look at the third argument\
    \ on its own:\n\n```\nstrpos($row['article'], PHP_EOL)\n```\n\nThis locates the\
    \ first end of line character in `$row['article']` in a cross-platform way using\
    \ the `PHP_EOL` constant (see \"Appending content with `fopen()`\" in Chapter\
    \ [7](#332054_4_En_7_Chapter.xhtml)). You could rewrite the code like this:\n\n\
    ```\n$newLine = strpos($row['article'], PHP_EOL);\necho safe(substr($row['article'],\
    \ 0, $newLine));\n```\n\nBoth sets of code do exactly the same thing, but PHP\
    \ lets you nest a function as an argument passed to another function. As long\
    \ as the nested function returns a valid result, you can frequently use shortcuts\
    \ like this. Using the `PHP_EOL` constant eliminates the problem of dealing with\
    \ the different characters used by Linux, macOS, and Windows to insert a new line.\n\
    \n## Displaying Paragraphs\n\nSince we're on the subject of paragraphs, many beginners\
    \ are confused by the fact that all the text retrieved from a database is displayed\
    \ as a continuous block, with no separation between paragraphs. HTML ignores whitespace,\
    \ including new lines. To get text stored in a database displayed as paragraphs,\
    \ you have the following options:\n\n- Store your text as HTML.\n- Convert new\
    \ lines to `<br/>` tags.\n- Create a custom function to replace new lines with\
    \ paragraph tags.\n\n### Storing Database Records as HTML\n\nThe first option\
    \ involves installing an HTML editor, such as CKEditor ( [https://ckeditor.com/](https://ckeditor.com/)\
    \ ) or TinyMCE ( [www.tiny.cloud/](http://www.tiny.cloud/) ), in your content\
    \ management forms. Mark up your text as you insert or update it. The HTML is\
    \ stored in the database, and the text displays as intended. Installing one of\
    \ these editors is beyond the scope of this book.\n\n> **Note:** If you store\
    \ text as HTML in a database, you can't use the `safe()` function to display it\
    \ because the HTML tags will be displayed as part of the text. Instead, use `strip_tags()`\
    \ and specify which tags are permitted (see \"Accessing Remote Files\" in Chapter\
    \ [7](#332054_4_En_7_Chapter.xhtml) and [www.php.net/manual/en/function.strip-tags.php](http://www.php.net/manual/en/function.strip-tags.php)\
    \ ).\n\n### Converting New Lines to `<br/>` Tags\n\nThe simplest option is to\
    \ pass your text to the `nl2br()` function before displaying it, like this:\n\n\
    ```\necho nl2br(safe($row['article']));\n```\n\nVoilà!—paragraphs. Well, not really.\
    \ The `nl2br()` function converts newline characters to `<br/>` tags (the closing\
    \ slash is for compatibility with XHTML and is valid in HTML5). As a result, you\
    \ get fake paragraphs. It's a quick and dirty solution, but not ideal.\n\n> **Tip:**\
    \ Using `nl2br()` is a suboptimal solution. But if you decide to use it, you must\
    \ sanitize the text before passing it to `nl2br()`. Otherwise, the angle brackets\
    \ of the `<br />` tags will be converted to HTML character entities, resulting\
    \ in them being displayed in your text rather as tags in the underlying HTML.\n\
    \n### Creating a Function to Insert `<p>` Tags\n\nTo display text retrieved from\
    \ a database as genuine paragraphs, wrap the database result in a pair of paragraph\
    \ tags, and then use the `preg_replace()` function to convert consecutive newline\
    \ characters to a closing `</p>` tag, immediately followed by an opening `<p>`\
    \ tag, like this:\n\n```php\necho \"<p>\\n\" . preg_replace('/[\\r\\n]+/', \"\
    </p>\\n<p>\\n\", safe($row['article'])) . \"</p>\\n\";\n```\n\nThe regular expression\
    \ used as the first argument matches one or more carriage returns and/or newline\
    \ characters. You can't use the `PHP_EOL` constant here because you need to match\
    \ all consecutive newline characters and replace them with a single pair of paragraph\
    \ tags. The pair of `<p>` tags is in double quotes, with `\\n` between them to\
    \ add a newline character, in order to make the HTML code easier to read.\n\n\
    Remembering the pattern for a regex can be difficult, so you can easily convert\
    \ this into a custom function, like this:\n\n```php\nfunction convertToParas($text)\
    \ {\n    $text = trim($text);\n    $text = htmlspecialchars($text, ENT_COMPAT|ENT_HTML5,\
    \ 'UTF-8', false);\n    return '<p>' . preg_replace('/[\\r\\n]+/', \"</p>\\n<p>\"\
    , $text) . \"</p>\\n\";\n}\n```\n\nThis trims whitespace, including newline characters,\
    \ from the beginning and end of the text, which it then sanitizes by passing it\
    \ to the `htmlspecialchars()` function with four arguments. The second line of\
    \ code inside the function is the same as in the `safe()` function that was defined\
    \ in Chapter [13](#332054_4_En_13_Chapter.xhtml). The final line adds a `<p>`\
    \ tag at the beginning, replaces internal sequences of newline characters with\
    \ closing and opening tags, and appends a closing `</p>` tag and newline character\
    \ at the end.\n\nYou can then use the function like this:\n\n```php\necho convertToParas($row['article']);\n\
    ```\n\nThe code for the function definition is in an updated version of `utility_funcs.php`\
    \ in the `ch16` folder. You can see it being used in `blog_ptags_mysqli.php` and\
    \ `blog_ptags_pdo.php`."
  raw: "If you process each record as `$row`, the extract is\nin `$row['first100']`.\
    \ To\nretrieve both the first 100 characters and the full article, simply\ninclude\
    \ both in the query like this:\n\n```\nSELECT article_id, title, LEFT(article,\
    \ 100) AS first100, article\nFROM blog ORDER BY created DESC\n```\n\nTaking a\
    \ fixed number of characters produces a crude result, as Figure\n[16-1](#332054_4_En_16_Chapter.xhtml#Fig1)\
    \ shows.\n\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig1_HTML.jpg](images/332054_4_En_16_Chapter/332054_4_En_16_Fig1_HTML.jpg)\n\
    \nFigure 16-1.\nSelecting the first 100 characters from an article chops many\
    \ words\nin half\n\nEnding an Extract on a Complete Word\n\nTo end an extract\
    \ on a complete word, you need to find the final space\nand use that to determine\
    \ the length of the substring. So, if you want\nthe extract to be a maximum of\
    \ 100 characters, use either of the\npreceding methods to start with, and store\
    \ the result in `$extract`. Then you\ncan use the PHP string functions `strrpos()`\
    \ and `substr()`  to find the last space\nand end the extract like this (the code\
    \ is in `blog_word_mysqli.php`\nand `blog_word_pdo.php`):\n\n```\n$extract = $row['first100'];\n\
    // find position of last space in extract\n$lastSpace = strrpos($extract, ' ');\n\
    // use $lastSpace to set length of new extract and add ...\necho safe(substr($extract,\
    \ 0, $lastSpace)) . '... ';\n```\n\nThis produces the more elegant result shown\
    \ in Figure [16-2](#332054_4_En_16_Chapter.xhtml#Fig2). It uses `strrpos()`, which\n\
    finds the last position of a character or substring within another\nstring. Since\
    \ you’re looking for a space, the second argument is a pair\nof quotes with a\
    \ single space between them. The result is stored in\n`$lastSpace`,\nwhich is\
    \ passed as the third argument to `substr()`, finishing\nthe extract on a complete\
    \ word. Finally, add a string containing three\ndots and a space, and join the\
    \ two with the concatenation operator (a\nperiod or dot).\n\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig2_HTML.jpg](images/332054_4_En_16_Chapter/332054_4_En_16_Fig2_HTML.jpg)\n\
    \nFigure 16-2.\nEnding the extract on a complete word produces a more elegant\n\
    result\n\nCaution\nDon’t mix up `strrpos()`, which gets\nthe last position of\
    \ a character or substring, with `strpos()`, which gets\nthe first position. The\
    \ extra “r” stands for “reverse”—`strrpos()` searches\nfrom the end of the string.\n\
    \nExtracting the First Paragraph\nAssuming that you have entered your text in\
    \ the database using the\nEnter or Return key to indicate new paragraphs, this\
    \ is very\neasy. Simply retrieve the full text, use `strpos()` to find the\nfirst\
    \ newline character, and use `substr()` to extract\nthe first section of text\
    \ up to that point.\n\nThe following SQL query is used in `blog_para_mysqli.php`\n\
    and `blog_para_pdo.php`:\n\n```\nSELECT article_id, title, article\nFROM blog\
    \ ORDER BY created DESC\n```\n\nThe following code is used to display the first\
    \ paragraph of `article`:\n\n```\n\nLet’s break it up and take a look at the third\
    \ argument on its own:\n\n```\nstrpos($row['article'], PHP_EOL)\n```\n\nThis locates\
    \ the first end of line character in `$row['article']` in a\ncross-platform way\
    \ using the `PHP_EOL` constant (see\n“Appending content with fopen()” in Chapter\
    \ [7](#332054_4_En_7_Chapter.xhtml)). You could rewrite the code like\nthis:\n\
    \n```\n$newLine = strpos($row['article'], PHP_EOL);\necho safe(substr($row['article'],\
    \ 0, $newLine));\n```\n\nBoth sets of code do exactly the same thing, but PHP\
    \ lets you nest a\nfunction as an argument passed to another function. As long\
    \ as the\nnested function returns a valid result, you can frequently use shortcuts\n\
    like this.\nUsing the `PHP_EOL` constant\neliminates the problem of dealing with\
    \ the different characters used by\nLinux, macOS, and Windows to insert a new\
    \ line.\n\nDisplaying Paragraphs\n\nSince we’re on the subject of paragraphs,\
    \ many beginners are confused by\nthe fact that all the text retrieved from a\
    \ database is displayed as a\ncontinuous block, with no separation between paragraphs.\
    \ HTML ignores\nwhitespace, including new lines. To get text stored in a database\n\
    displayed as paragraphs, you have the following options:\n\n*   Store your text\
    \ as HTML.\n\n*   Convert new lines to `<br/>`\n    tags.\n\n*   Create a custom\
    \ function to replace new lines with paragraph\n    tags.\n\nStoring Database\
    \ Records as HTML\nThe first option involves installing an HTML editor, such as\
    \ CKEditor\n( [`https://ckeditor.com/`](https://ckeditor.com/) ) or TinyMCE (\
    \ [`www.tiny.cloud/`](http://www.tiny.cloud/) ), in your content management forms.\
    \ Mark up your text\nas you insert or update it. The HTML is stored in the database,\
    \ and the\ntext displays as intended. Installing one of these editors is beyond\
    \ the\nscope of this book.\n\nNote\nIf you store text as HTML in a database, you\
    \ can’t use the `safe()` function to\ndisplay it because the HTML tags will be\
    \ displayed as part of the text.\nInstead, use `strip_tags()` and\nspecify which\
    \ tags are permitted (see “Accessing Remote Files” in\nChapter [7](#332054_4_En_7_Chapter.xhtml)\
    \ and [`www.php.net/manual/en/function.strip-tags.php`](http://www.php.net/manual/en/function.strip-tags.php)\
    \ ).\n\nConverting New Lines to <br/> Tags\n\nThe simplest option is to pass your\
    \ text to the `nl2br()` function\nbefore displaying it, like this:\n\n```\necho\
    \ nl2br(safe($row['article']));\n```\n\nVoilà!—paragraphs. Well, not really. The\
    \ `nl2br()` function\nconverts newline characters to `<br/>` tags (the\nclosing\
    \ slash is for compatibility with XHTML and is valid in HTML5). As\na result,\
    \ you get fake paragraphs. It’s a quick and dirty solution, but\nnot ideal.\n\n\
    Tip\nUsing `nl2br()` is a\nsuboptimal solution. But if you decide to use it, you\
    \ must sanitize the\ntext before passing it to `nl2br()`. Otherwise,\nthe angle\
    \ brackets of the `<br />` tags\nwill be converted to HTML character entities,\
    \ resulting in them being\ndisplayed in your text rather as tags in the underlying\
    \ HTML.\n\nCreating a Function to Insert <p> Tags\n\nTo display text retrieved\
    \ from a database as genuine paragraphs, wrap the\ndatabase result in a pair of\
    \ paragraph tags, and then use the `preg_replace()`\nfunction to convert consecutive\
    \ newline characters to a closing `</p>` tag,\nimmediately followed by an opening\
    \ `<p>` tag, like\nthis:\n\n```\n\\n\", safe($row['article'])); ?>\n```\n\nThe\
    \ regular expression used as the first argument matches one or more\ncarriage\
    \ returns and/or newline characters. You can’t use the `PHP_EOL` constant here\n\
    because you need to match all consecutive newline characters and replace\nthem\
    \ with a single pair of paragraph tags. The pair of `<p>` tags is in\ndouble quotes,\
    \ with `\\n` between them to\nadd a newline character, in order to make the HTML\
    \ code easier to read.\nRemembering the pattern for a regex can be difficult,\
    \ so you can easily\nconvert this into a custom function, like this:\n\n```\n\
    function convertToParas($text) {\n$text = trim($text);\n$text = htmlspecialchars($text,\
    \ ENT_COMPAT|ENT_HTML5, 'UTF-8', false);\nreturn '' . preg_replace('/[\\r\\n]+/',\
    \ \"\\n\", $text) . \"\\n\";\n}\n```\n\nThis trims whitespace, including newline\
    \ characters, from the\nbeginning and end of the text, which it then sanitizes\
    \ by passing it to\nthe `htmlspecialchars()`\nfunction with four arguments. The\
    \ second line of code inside the\nfunction is the same as in the `safe()` function\
    \ that\nwas defined in Chapter [13](#332054_4_En_13_Chapter.xhtml). The final\
    \ line adds a `<p>` tag at the\nbeginning, replaces internal sequences of newline\
    \ characters with\nclosing and opening tags, and appends a closing `</p>` tag\
    \ and\nnewline character at the end.\n\nYou can then use the function like this:\n\
    \n```\nThe code for the function definition is in an updated version of\n`utility_funcs.php`\
    \ in\nthe `ch16`\nfolder. You can see it being used in `blog_ptags_mysqli.php`\n\
    and `blog_ptags_pdo.php`."
  trans: "\n# 处理数据库记录\n\n如果以 `$row` 的形式逐条处理记录，提取的内容保存在 `$row['first100']` 中。要同时获取前\
    \ 100 个字符和完整文章，只需在查询语句中包含两者即可，如下所示：\n\n```\nSELECT article_id, title, LEFT(article,\
    \ 100) AS first100, article\nFROM blog ORDER BY created DESC\n```\n\n提取固定数量的字符会产生粗糙的结果，如图\
    \ 16-1 所示。\n\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig1_HTML.jpg](img/332054_4_En_16_Fig1_HTML.jpg)\n\
    \n**图 16-1.** 从文章中选取前 100 个字符会将许多单词截断\n\n## 在完整单词处结束摘要\n\n要在完整单词处结束摘要，你需要找到最后一个空格，并以此确定子字符串的长度。因此，如果你希望摘要最多为\
    \ 100 个字符，请先使用前面任一种方法，并将结果存储在 `$extract` 中。然后你可以使用 PHP 字符串函数 `strrpos()` 和 `substr()`\
    \ 找到最后一个空格，并按如下方式结束摘要（代码位于 `blog_word_mysqli.php` 和 `blog_word_pdo.php` 中）：\n\n\
    ```\n$extract = $row['first100'];\n// 查找摘要中最后一个空格的位置\n$lastSpace = strrpos($extract,\
    \ ' ');\n// 使用 $lastSpace 设置新摘要的长度并添加 ...\necho safe(substr($extract, 0, $lastSpace))\
    \ . '... ';\n```\n\n这样会生成更优雅的结果，如图 16-2 所示。它使用了 `strrpos()` 函数，该函数用于查找某个字符或子字符串在另一个字符串中最后一次出现的位置。由于你需要查找的是空格，第二个参数是一对引号，中间包含一个空格。结果存储在\
    \ `$lastSpace` 中，并作为第三个参数传递给 `substr()`，从而在完整单词处结束摘要。最后，添加一个包含三个点和一个空格的字符串，并使用连接运算符（点号）将这两部分连接起来。\n\
    \n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig2_HTML.jpg](img/332054_4_En_16_Fig2_HTML.jpg)\n\
    \n**图 16-2.** 在完整单词处结束摘要能产生更优雅的结果\n\n> **注意：** 不要将用于获取字符或子字符串最后位置的 `strrpos()`\
    \ 与用于获取首次出现位置的 `strpos()` 混淆。多出的 \"r\" 代表 \"reverse\"（反向）——`strrpos()` 从字符串末尾开始搜索。\n\
    \n## 提取第一段\n\n假设你在输入数据库中的文本时，使用回车键或换行键来表示新段落，那么这一操作非常简单。只需获取全文，使用 `strpos()` 找到第一个换行符，然后使用\
    \ `substr()` 提取到该位置为止的第一段文本。\n\n以下 SQL 查询用于 `blog_para_mysqli.php` 和 `blog_para_pdo.php`：\n\
    \n```\nSELECT article_id, title, article\nFROM blog ORDER BY created DESC\n```\n\
    \n以下代码用于显示 `article` 的第一段：\n\n```php\necho safe(substr($row['article'], 0, strpos($row['article'],\
    \ PHP_EOL)));\n```\n\n我们来分解一下，单独看看第三个参数：\n\n```\nstrpos($row['article'], PHP_EOL)\n\
    ```\n\n这行代码使用 `PHP_EOL` 常量以跨平台的方式定位 `$row['article']` 中的第一个行尾字符（参见第 7 章“使用 `fopen()`\
    \ 追加内容”）。你可以将代码重写为：\n\n```\n$newLine = strpos($row['article'], PHP_EOL);\necho\
    \ safe(substr($row['article'], 0, $newLine));\n```\n\n两段代码完成的功能完全相同，但 PHP 允许你将一个函数嵌套作为另一个函数的参数传递。只要嵌套函数返回有效结果，你就可以频繁使用这种快捷方式。使用\
    \ `PHP_EOL` 常量消除了处理 Linux、macOS 和 Windows 在插入换行时使用不同字符的问题。\n\n## 显示段落\n\n既然我们谈到了段落，很多初学者会对从数据库检索到的所有文本都显示为一个连续块、段落之间没有分隔而感到困惑。HTML\
    \ 会忽略空白字符，包括换行符。要让存储在数据库中的文本以段落形式显示，你有以下选择：\n\n- 将文本存储为 HTML。\n- 将换行符转换为 `<br/>`\
    \ 标签。\n- 创建自定义函数，用段落标签替换换行符。\n\n### 将数据库记录存储为 HTML\n\n第一种选择涉及在内容管理表单中安装 HTML 编辑器，例如\
    \ CKEditor（[`ckeditor.com/`](https://ckeditor.com/)）或 TinyMCE（[www.tiny.cloud/](http://www.tiny.cloud/)）。在插入或更新文本时对其进行标记。HTML\
    \ 存储在数据库中，文本会按预期方式显示。安装这类编辑器超出了本书的讨论范围。\n\n> **注意：** 如果将文本作为 HTML 存储在数据库中，则不能使用\
    \ `safe()` 函数来显示它，因为 HTML 标签会作为文本的一部分显示。相反，应使用 `strip_tags()` 并指定哪些标签是允许的（参见第\
    \ 7 章“访问远程文件”和 [www.php.net/manual/en/function.strip-tags.php](http://www.php.net/manual/en/function.strip-tags.php)）。\n\
    \n### 将换行符转换为 `<br/>` 标签\n\n最简单的做法是在显示文本之前将其传递给 `nl2br()` 函数，如下所示：\n\n```\necho\
    \ nl2br(safe($row['article']));\n```\n\n瞧！——段落出现了。好吧，其实并非如此。`nl2br()` 函数将换行符转换为\
    \ `<br/>` 标签（结束斜杠是为了与 XHTML 兼容，在 HTML5 中也有效）。结果你得到的是伪段落。这是一种快速但粗糙的解决方案，并不理想。\n\
    \n> **提示：** 使用 `nl2br()` 并非最佳方案。但如果决定使用它，必须在将文本传递给 `nl2br()` 之前对其进行净化。否则，`<br\
    \ />` 标签的尖括号会被转换为 HTML 字符实体，导致它们作为文本显示，而不是作为底层 HTML 中的标签。\n\n### 创建插入 `<p>` 标签的函数\n\
    \n要将从数据库中检索到的文本显示为真正的段落，请将数据库结果包裹在一对段落标签中，然后使用 `preg_replace()` 函数将连续的换行符转换为一个结束\
    \ `</p>` 标签，紧接着是一个开始 `<p>` 标签，如下所示：\n\n```php\necho \"<p>\\n\" . preg_replace('/[\\\
    r\\n]+/', \"</p>\\n<p>\\n\", safe($row['article'])) . \"</p>\\n\";\n```\n\n用作第一个参数的正则表达式匹配一个或多个回车符和/或换行符。你不能在此处使用\
    \ `PHP_EOL` 常量，因为你需要匹配所有连续的换行符，并将它们替换为一对段落标签。这对 `<p>` 标签放在双引号内，使用 `\\n` 在它们之间添加一个换行符，以便使\
    \ HTML 代码更易于阅读。\n\n记住正则表达式的模式可能比较困难，因此你可以轻松地将其转换为自定义函数，如下所示：\n\n```php\nfunction\
    \ convertToParas($text) {\n    $text = trim($text);\n    $text = htmlspecialchars($text,\
    \ ENT_COMPAT|ENT_HTML5, 'UTF-8', false);\n    return '<p>' . preg_replace('/[\\\
    r\\n]+/', \"</p>\\n<p>\", $text) . \"</p>\\n\";\n}\n```\n\n该函数从文本的开头和结尾去除空白字符（包括换行符），然后通过将文本传递给包含四个参数的\
    \ `htmlspecialchars()` 函数进行净化。函数内部的第二行代码与第 13 章中定义的 `safe()` 函数中的代码相同。最后一行在开头添加\
    \ `<p>` 标签，将内部的连续换行符序列替换为结束和开始标签，并在末尾附加一个结束 `</p>` 标签和一个换行符。\n\n然后你可以像这样使用该函数：\n\
    \n```php\necho convertToParas($row['article']);\n```\n\n该函数定义的代码位于 `ch16` 文件夹中更新版的\
    \ `utility_funcs.php` 文件中。你可以在 `blog_ptags_mysqli.php` 和 `blog_ptags_pdo.php`\
    \ 中看到它的用法。\n"
- fmt: "注意  \n尽管`utility_funcs.php`的更新版本同时包含了`safe()`和`convertToParas()`函数定义，我决定不在`convertToParas()`内部调用`safe()`，因为这会产生潜在的不稳定依赖。如果在未来某个阶段你决定采用不同的文本清理方式并删除了`safe()`函数定义，调用`convertToParas()`时将触发致命错误，因为它依赖的正是已不存在的自定义函数。\n\
    \n## 提取完整句子\n\nPHP没有句子的概念。统计句号意味着你会忽略所有以感叹号或问号结尾的句子，还会面临在小数点处断句或在句号后截断闭合引号的风险。为解决这些问题，我设计了一个名为`getFirst()`的PHP函数，它能识别正常句子末尾的标点符号：\n\
    \n*   句号、问号或感叹号\n*   可选地后接单引号或双引号\n*   后接一个或多个空格\n\n`getFirst()`函数接受两个参数：你要从中提取第一部分的文本，以及要提取的句子数量。第二个参数是可选的；如果未提供，函数默认提取前两个句子。代码如下（位于`utility_funcs.php`中）：\n\
    \n```\nfunction getFirst($text, $number=2) {\n    // 使用正则表达式拆分为句子\n    $sentences\
    \ = preg_split('/([.?!][\"\\']?\\s)/', $text, $number+1,\n        PREG_SPLIT_DELIM_CAPTURE);\n\
    \    if (count($sentences) > $number * 2) {\n        $remainder = array_pop($sentences);\n\
    \    } else {\n        $remainder = '';\n    }\n    $result = [];\n    $result[0]\
    \ = implode('', $sentences);\n    $result[1] = $remainder;\n    return $result;\n\
    }\n```\n\n此函数返回包含两个元素的数组：提取的句子和剩余的文本。你可以使用第二个元素创建指向全文页面的链接。\n\n加粗的那一行使用正则表达式识别每个句子的结尾——句号、问号或感叹号，可选地后接双引号或单引号及一个空格。这作为第一个参数传递给`preg_split()`，该函数使用正则表达式将文本拆分为数组。第二个参数是目标文本。第三个参数决定文本拆分的最大块数，这里设为比要提取的句子数量多一。通常情况下，`preg_split()`会丢弃正则表达式匹配到的字符，但使用`PREG_SPLIT_DELIM_CAPTURE`作为第四个参数，并结合正则表达式中的一对捕获括号，能将它们保留为独立的数组元素。换句话说，`$sentences`数组的元素交替出现句子文本和标点及空格，如下所示：\n\
    \n```\n$sentences[0] = '\"Hello, world';\n$sentences[1] = '!\" ';\n```\n\n事先无法知道目标文本中有多少句子，因此需要判断提取所需数量的句子后是否还有剩余内容。条件语句使用`count()`确定`$sentences`数组中的元素数量，并将结果与`$number`乘以2进行比较（因为每个句子对应数组中的两个元素）。如果还有更多文本，`array_pop()`会移除`$sentences`数组的最后一个元素并将其赋值给`$remainder`。如果没有剩余文本，`$remainder`则为空字符串。函数的最后阶段使用`implode()`（以空字符串作为第一个参数）将提取的句子拼接起来，然后返回包含提取文本和剩余内容的双元素数组。\n\
    \n如果你觉得这段解释难以理解，别担心。这段代码相当高级，构建该函数经过大量实验，并且多年来我逐步改进它。\n\n## PHP方案16-1：显示文章的前两个句子\n\
    \n本PHP方案展示如何使用前述的`getFirst()`函数显示`blog`表中每篇文章的摘要。如果你在本书前面创建了Japan Journey站点，请使用`blog.php`。或者，使用`ch16`文件夹中的`blog_01.php`，并将其另存为`phpsols-4e`站点根目录下的`blog.php`。你还需要`includes`文件夹中的`footer.php`、`menu.php`、`title.php`和`connection.php`。如果`includes`文件夹中尚未包含这些文件，`ch16`文件夹中有它们的副本。\n\
    \n1.  将`utility_funcs.php`的更新版本从`ch16`文件夹复制到`includes`文件夹，并在`blog.php`的`DOCTYPE`声明上方的PHP代码块中引入它。同时引入`connection.php`并创建数据库连接。此页面需要只读权限，因此使用`read`作为传递给`dbConnect()`的参数，如下所示：\n\
    \n```\n    require_once './includes/connection.php';\n    require_once './includes/utility_funcs.php';\n\
    \    // 创建数据库连接\n    $conn = dbConnect('read');\n    ```\n\n    如果你使用PDO，请在`dbConnect()`中添加`'pdo'`作为第二个参数。\n\
    \n2.  准备一个SQL查询，检索`blog`表中的所有记录，然后提交查询，如下所示：\n\n```\n    $sql = 'SELECT * FROM\
    \ blog ORDER BY created DESC';\n    $result = $conn->query($sql);\n    ```\n\n\
    3.  添加检查数据库错误的代码。\n\n    对于MySQLi，使用以下代码：\n\n```\n    if (!$result) {\n      \
    \  $error = $conn->error;\n    }\n    ```\n\n    对于PDO，调用`errorInfo()`方法并检查第三个数组元素是否存在，如下所示：\n\
    \n```\n    $errorInfo = $conn->errorInfo();\n    if (isset($errorInfo[2])) {\n\
    \        $error = $errorInfo[2];\n    }\n    ```\n\n4.  删除页面`<main>`元素内的所有静态HTML，并添加代码以在查询出现问题时显示错误消息：\n\
    \n```\n    $error\";\n    } else {\n    }\n    ?>\n\n```\n\n5.  在`else`块内创建一个循环以显示结果：\n\
    \n```\n    while ($row = $result->fetch_assoc()) {\n        echo \"{$row['title']}\"\
    ;\n        $extract = getFirst($row['article']);\n        echo '' . safe($extract[0]);\n\
    \        if ($extract[1]) {\n            echo '\n            <a href=\"details.php?article_id='\
    \ . $row['article_id'] . '\">More</a>';\n        }\n        echo '';\n    }\n\
    \    ```\n\n    对于PDO，代码相同，但这一行除外：\n\n```\n    while ($row = $result->fetch_assoc())\
    \ {\n    ```\n\n    将其替换为：\n\n```\n    while ($row = $result->fetch()) {\n   \
    \ ```\n\n    `getFirst()`函数处理`$row['article']`并将结果存储在`$extract`中。`$extract[0]`中的前两个句子会立即显示。如果`$extract[1]`包含内容，则表示还有更多要显示的内容。因此`if`块内的代码会显示一个指向`details.php`的链接，链接中带有文章主键的查询字符串。\n\
    \n6.  保存页面并在浏览器中测试。你应该会看到每篇文章的前两个句子如图[16-3](#332054_4_En_16_Chapter.xhtml#Fig3)所示。\n\
    \n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig3_HTML.jpg](images/332054_4_En_16_Chapter/332054_4_En_16_Fig3_HTML.jpg)\n\
    \n图16-3. 前两个句子已从较长的文本中干净地提取出来\n\n7.  通过向`getFirst()`添加数字作为第二个参数来测试函数，如下所示：\n\n\
    ```\n$extract = getFirst($row['article'], 3);\n```\n\n这将显示前三个句子。如果增加的数字等于或超过文章中的句子数量，则不会显示“More”链接。\
    \  \n你可以将你的代码与`ch16`文件夹中的`blog_mysqli.php`和`blog_pdo.php`进行比较。  \n我们将在第[17](#332054_4_En_17_Chapter.xhtml)章中介绍`details.php`。在此之前，让我们先处理动态网站中日期使用这个雷区。"
  raw: "Note\nAlthough the updated version of `utility_funcs.php`\ncontains both the\
    \ `safe()` and `convertToParas()`\nfunction definitions, I decided against calling\
    \ the `safe()` function\ninside `convertToParas()`\nbecause it would have created\
    \ a potentially unstable dependency. If, at\nsome stage in the future, you decided\
    \ to employ a different way of\nsanitizing text and deleted the `safe()` function\n\
    definition, invoking `convertToParas()`\nwould trigger a fatal error because it\
    \ relies on a custom function that\nwould no longer exist.\n\nExtracting Complete\
    \ Sentences\n\nPHP has no concept of what constitutes a sentence. Counting periods\n\
    means you ignore all sentences that end with an exclamation point or a\nquestion\
    \ mark. You also run the risk of breaking a sentence on a decimal\npoint or cutting\
    \ off a closing quote after a period. To overcome these\nproblems, I have devised\
    \ a PHP function called `getFirst()` that\nidentifies the punctuation at the end\
    \ of a normal sentence:\n\n*   A period, question mark, or exclamation point\n\
    \n*   Optionally followed by a single or double quote\n\n*   Followed by one or\
    \ more spaces\n\nThe `getFirst()`\nfunction  takes\ntwo arguments: the text from\
    \ which you want to extract the first section\nand the number of sentences you\
    \ want to extract. The second argument is\noptional; if it’s not supplied, the\
    \ function extracts the first two\nsentences. The code looks like this (it’s in\
    \ `utility_funcs.php`):\n\n```\nfunction getFirst($text, $number=2) {\n// use\
    \ regex to split into sentences\n$sentences = preg_split('/([.?!][\"\\']?\\s)/',\
    \ $text, $number+1,\nPREG_SPLIT_DELIM_CAPTURE);\nif (count($sentences) > $number\
    \ * 2) {\n$remainder = array_pop($sentences);\n} else {\n$remainder = '';\n}\n\
    $result = [];\n$result[0] = implode('', $sentences);\n$result[1] = $remainder;\n\
    return $result;\n}\n```\n\nThis function returns an array containing two elements:\
    \ the extracted\nsentences and any text that’s left over. You can use the second\
    \ element\nto create a link to a page containing the full text.\n\nThe line highlighted\
    \ in bold uses a regex to identify the end of each\nsentence—a period, question\
    \ mark, or exclamation point, optionally\nfollowed by a double or single quotation\
    \ mark and a space. This is\npassed as the first argument to `preg_split()` ,\
    \ which uses the regex\nto split the text into an array. The second argument is\
    \ the target text.\nThe third argument determines the maximum number of chunks\
    \ to split the\ntext into. You want one more than the number of sentences to be\n\
    extracted. Normally, `preg_split()` discards\nthe characters matched by the regex,\
    \ but using `PREG_SPLIT_DELIM_CAPTURE`\nas the fourth argument together with a\
    \ pair of capturing parentheses in\nthe regex preserves them as separate array\
    \ elements. In other words, the\nelements of the `$sentences` array\nconsist alternately\
    \ of the text of a sentence followed by the\npunctuation and space, like this:\n\
    \n```\n$sentences[0] = '\"Hello, world';\n$sentences[1] = '!\" ';\n```\n\nIt’s\
    \ impossible to know in advance how many sentences there are in\nthe target text,\
    \ so you need to find out if there’s anything remaining\nafter extracting the\
    \ desired number of sentences. The conditional statement\nuses `count()` to\n\
    ascertain the number of elements in the `$sentences` array and\ncompares the result\
    \ with `$number` multiplied by\n2 (because the array contains two elements for\
    \ each sentence). If\nthere’s more text, `array_pop()` removes\nthe last element\
    \ of the `$sentences` array and\nassigns it to `$remainder`. If\nthere’s no further\
    \ text, `$remainder` is an\nempty string.\nThe final stage of the function uses\
    \ `implode()`  with an empty string\nas its first argument to stitch the extracted\
    \ sentences back together\nand then returns a two-element array containing the\
    \ extracted text and\nanything that’s left over.\nDon’t worry if you found that\
    \ explanation hard to follow. The code is\nquite advanced. It took a lot of experimentation\
    \ to build the function,\nand I have improved it gradually over the years.\n\n\
    PHP Solution 16-1: Displaying the First Two\nSentences of an Article\n\nThis PHP\
    \ solution shows how to display an extract from each article in\nthe `blog` table\n\
    using the `getFirst()`\nfunction \ndescribed in the preceding section. If you\
    \ created the Japan Journey\nsite earlier in the book, use `blog.php`.\nAlternatively,\
    \ use `blog_01.php` from the\n`ch16` folder and\nsave it as `blog.php` in the\
    \ `phpsols-4e` site root.\nYou also need `footer.php`, `menu.php`, `title.php`,\
    \ and `connection.php` in the\n`includes`\nfolder. There are copies of these files\
    \ in the `ch16` folder if you\ndon’t already have them in the `includes` folder.\n\
    \n1.  Copy the updated version of `utility_funcs.php`\n    from the `ch16`\n \
    \   folder to the `includes` folder, and\n    include it in `blog.php` in the\
    \ PHP\n    code block above the `DOCTYPE` declaration.\n    Also include `connection.php`\
    \ and\n    create a connection to the database. This page needs read-only\n  \
    \  privileges, so use `read` as the argument\n    passed to `dbConnect()`, like\n\
    \    this:\n\n```\n    require_once './includes/connection.php';\n    require_once\
    \ './includes/utility_funcs.php';\n    // create database connection\n    $conn\
    \ = dbConnect('read');\n    ```\n\nAdd 'pdo' as the second argument to dbConnect()\
    \ if you’re using\n    PDO.\n\n2.  Prepare an SQL query to retrieve all records\
    \ from the `blog` table and then\n    submit it, like this:\n\n```\n    $sql =\
    \ 'SELECT * FROM blog ORDER BY created DESC';\n    $result = $conn->query($sql);\n\
    \    ```\n\n3.  Add the code to check for a database error.\n\nFor MySQLi, use\
    \ this:\n\n```\n    if (!$result) {\n    $error = $conn->error;\n    }\n    ```\n\
    \nFor PDO, call the `errorInfo()` method\n    and check for the existence of the\
    \ third array element, like this:\n\n```\n    $errorInfo = $conn->errorInfo();\n\
    \    if (isset($errorInfo[2])) {\n    $error = $errorInfo[2];\n    }\n    ```\n\
    \n4.  Delete all the static HTML inside the `<main>` element\n    in the body\
    \ of the page, and add the code to display the error message\n    if a problem\
    \ arises with the query:\n\n```\n    $error\";\n    } else {\n    }\n    ?>\n\n\
    ```\n\n5.  Create a loop inside the `else` block to display\n    the results:\n\
    \n```\n    while ($row = $result->fetch_assoc()) {\n    echo \"{$row['title']}\"\
    ;\n    $extract = getFirst($row['article']);\n    echo '' . safe($extract[0]);\n\
    \    if ($extract[1]) {\n    echo '\n    More';\n    }\n    echo '';\n    }\n\
    \    ```\n\nThe code is the same for PDO, except for this line:\n\n```\n    while\
    \ ($row = $result->fetch_assoc()) {\n    ```\n\nReplace it with this:\n\n```\n\
    \    while ($row = $result->fetch()) {\n    ```\n\nThe `getFirst()`\n    function\
    \ \n    processes `$row['article']` and\n    stores the result in `$extract`.\
    \ The first\n    two sentences of `article` in `$extract[0]` are\n    immediately\
    \ displayed. If `$extract[1]` contains\n    anything, it means there is more to\
    \ display. So the code inside the\n    `if` block\n    displays a link to `details.php`,\
    \ with the\n    article’s primary key in a query string.\n\n6.  Save the page\
    \ and test it in a browser. You should see the first two\n    sentences of each\
    \ article displayed as shown in Figure [16-3](#332054_4_En_16_Chapter.xhtml#Fig3).\n\
    \n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig3_HTML.jpg](images/332054_4_En_16_Chapter/332054_4_En_16_Fig3_HTML.jpg)\n\
    \nFigure 16-3.\n\nThe first two sentences have been extracted cleanly from the\
    \ longer\n    text\n\n7.  Test the function by adding a number as a second argument\
    \ to `getFirst()`, like\n    this:\n\n```\n$extract = getFirst($row['article'],\
    \ 3);\n```\n\nThis displays the first three sentences. If you increase the number\n\
    so that it equals or exceeds the number of sentences in an article, the\nMore\
    \ link won’t be displayed.\nYou can compare your code with `blog_mysqli.php` and\n\
    `blog_pdo.php` in\nthe `ch16`\nfolder.\nWe’ll look at `details.php` in\nChapter\
    \ [17](#332054_4_En_17_Chapter.xhtml). Before that, let’s tackle the\nminefield\
    \ presented by using dates in a dynamic web site."
  trans: "\n注意  \n尽管`utility_funcs.php`的更新版本同时包含了`safe()`和`convertToParas()`函数定义，我决定不在`convertToParas()`内部调用`safe()`，因为这会产生潜在的不稳定依赖。如果在未来某个阶段你决定采用不同的文本清理方式并删除了`safe()`函数定义，调用`convertToParas()`时将触发致命错误，因为它依赖的正是已不存在的自定义函数。\n\
    \n## 提取完整句子\n\nPHP 没有句子的概念。统计句号意味着你会忽略所有以感叹号或问号结尾的句子，还会面临在小数点处断句或在句号后截断闭合引号的风险。为解决这些问题，我设计了一个名为`getFirst()`的\
    \ PHP 函数，它能识别正常句子末尾的标点符号：\n\n*   句号、问号或感叹号\n*   可选地后接单引号或双引号\n*   后接一个或多个空格\n\n\
    `getFirst()`函数接受两个参数：你要从中提取第一部分的文本，以及要提取的句子数量。第二个参数是可选的；如果未提供，函数默认提取前两个句子。代码如下（位于`utility_funcs.php`中）：\n\
    \n```\nfunction getFirst($text, $number=2) {\n    // 使用正则表达式拆分为句子\n    $sentences\
    \ = preg_split('/([.?!][\"\\']?\\s)/', $text, $number+1,\n        PREG_SPLIT_DELIM_CAPTURE);\n\
