    ## About the Technical Reviewer


    **GREG SABINO MULLANE** has used many databases but believes that none compare
    to PostgreSQL (and advocates calling it “Postgres”). He helps maintain the Postgres
    mailing lists and web sites, has spoken at OSCon and other events on Postgres
    topics, and has contributed code to the Postgres core. He is the primary developer
    of the `DBD::Pg` module, has ported MediaWiki to Postgres, and has been recognized
    as a Postgres Major Developer for all of his Postgres work. He has a strong interest
    in PGP and cryptography, and he attends keysignings as often as possible. His
    PGP fingerprint is 2529 DF6A B8F7 9407 E944 45B4 BC9B 9067 1496 4AC8, and he has
    been known to sneak it into code he has written. He currently works as a software
    developer for End Point, primarily doing Postgres, Perl, and PHP work. He and
    his wife Joy enjoy traveling and try to make at least one overseas trip a year.


