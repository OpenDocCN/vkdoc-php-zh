    Essentially what we must do is as follows:


    • Instantiate the Profile_User class within DatabaseObject_User.


    • Load the profile data automatically when a user is loaded.


    • Save the profile data automatically when the user record is saved.


    • Delete the profile data automatically when the user record is deleted.


    Additionally, we must deal with the fact that the user ID is not known when creating
    a new user record with DatabaseObject_User. As such, we must correctly use the
    callbacks that DatabaseObject makes available. We will use them as follows:


    • In the load callback (postLoad()), we will set the user ID and load the profile
    data.


    • Before an insert occurs (preInsert()), we will generate a password for the user.
    For now, we will use the PHP uniqid() function to generate a password, but we
    will improve on this in Chapter 4 when we need to send an e-mail out to new users.


    • After an insert occurs (postInsert()), we will set the user ID and save the
    profile data.


    • After an update occurs (postUpdate()), we will save the profile data (the user
    ID is known at this point).


    • Before a delete occurs (preDelete()), we will delete all profile data. Note
    that this must occur before the user is deleted (as opposed to being done in postDelete()),
    because a foreign key constraint violation will occur if we do it the other way
    around (that is, users_profile depends on users, so data can’t be removed from
    users that is referenced in users_profile).


