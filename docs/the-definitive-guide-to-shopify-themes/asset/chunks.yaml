- fmt: '# Liquid, Shopify’s Templating Language


    Looking at this theme structure, you’ve probably noticed that lots of the files
    end with a `.liquid` extension.


    Liquid is an open-source template markup language created by Shopify. Because
    of its nature (simple, secure, and stateless), it’s a good fit for supporting
    dynamic content, logic, and inclusion within theme templates without sacrificing
    security or performance.


    Like most HTML template languages that you might be familiar with (such as PHP
    or Ruby’s ERB), we use Liquid by inserting special tags into regular HTML markup.
    Whereas PHP and ERB use tags that look like `<?php ... ?>` and `<%= ... %>` respectively,
    Liquid uses tags that look like `{% ... %}` (control tags) and `{{ ... }}` (output
    tags).


    The Liquid code to render a list of the products inside a product collection might
    look like Listing [1-1](#A437216_1_En_1_Chapter.html#Par22).


    ```

    {% if collection.products.size > 0 %}


    {% for product in collection.products %}

    {{ product.title | upcase }}

    {% endfor %}


    {% else %}

    No products in collection!

    {% endif %}

    Listing 1-1

    Example of Liquid Code Rendering a List of Products in a Collection

    ```


    We can see from this example that Liquid gives us the ability to:


    - Write conditional statements like `{% if ... endif %}`;

    - Iterate over lists with `{% for ... endfor %}`;

    - Output content with `{{ ... }}`;

    - Apply filters to output like `| upcase`;

    - Access variable objects that Shopify provides to templates like `collection`


    Shopify’s Liquid reference at [`https://help.shopify.com/themes/liquid`](https://help.shopify.com/themes/liquid)
    provides a comprehensive introduction to all the tags, filters, and syntax of
    Liquid, but if you’re like me, you’ll probably find that the best way to get comfortable
    with Liquid is simply to dive in! Browsing through the Liquid files that come
    with your default theme should give you a pretty solid understanding of how things
    are put together. There’s no need to try to have all the syntax memorized before
    you start—you’ll quickly pick it up once you dive in.


    Liquid is an open-source templating language, and it’s used in many more places
    than just on Shopify. However, it’s important to note that Shopify’s implementation
    of Liquid contains a few Shopify-specific filters, tags, and variable objects
    that aren’t supported by the “standard” Liquid library, so if you’re wondering
    why a particular Liquid example is or isn’t working in your Shopify theme, it’s
    prudent to check that what you’re attempting is actually possible on the platform.
    A handy resource for this is Shopify’s Liquid Cheat Sheet at [`https://www.shopify.com/partners/shopify-cheat-sheet`](https://www.shopify.com/partners/shopify-cheat-sheet).
    It’s a handy single-page reference for all the supported logic, objects, tags,
    and filters in Shopify themes. You may notice both in this book and in other examples
    across the web that Liquid control tags can be written like this: `{% ... %}`
    or like this: `{%- ... -%}` (with a minus symbol next to the percentage sign).
    Similarly, output tags can be written like this: `{{ ... }}` or like this: `{{-
    ... -}}`.


    In terms of logic, these forms are the same. The difference between the two is
    how they affect any whitespace on either side of the Liquid tags. It used to be
    quite common for Shopify themes with lots of control flow logic and iteration
    to end up with large amounts of whitespace output to the browser, so the “percent-minus”
    form of the Liquid tags was introduced. Using this form will result in the Liquid
    processor stripping all whitespace from the left and right side of the Liquid
    tag in the resulting HTML.


    My default position is to now always use the “percent-minus” format by default,
    unless that will interfere with how I want the output to appear. You can use whichever
    form you want, but just remember that outside of whitespace, the forms are logically
    equivalent and interchangeable while reading through example code.


    ## Assets


    Aside from the Liquid files and the JSON configuration files (which are covered
    in more detail in Chapter [8](#A437216_1_En_8_Chapter.html)), the other type of
    files we’ll find in our theme are asset files.


    Assets consist of images, stylesheets, JavaScript, and other resources that our
    theme needs to load in the browser. How we use these assets in our themes will
    become clearer as we walk through some examples, but there are a couple of things
    to note at this stage:


    - All files in the `assets` directory are automatically made available and hosted
    via Shopify’s CDN (`cdn.shopify.com`). This means they are heavily cached to improve
    the speed of delivery to end customers, but it also means that they won’t be loaded
    from the same domain as our storefront (leading to the enforcement of cross-origin
    browser restrictions).

    - To refer to an asset from within your Liquid templates, Shopify makes two filters
    available: `asset_url` and `asset_img_url`. Both take the name of an asset and
    return the URL to that asset on the CDN, with the latter allowing for some additional
    parameters to do things like resize or crop image assets.

    - Shopify natively supports Sass precompilation for stylesheets, so you can add
    a `styles.scss` file directly to your `assets` directory and Shopify will compile
    it to CSS and make it available to your theme. (For example, you could include
    it in the `<head>` section of your `theme.liquid` with the Liquid `{{ ''styles.scss.css''
    | asset_url | stylesheet_tag }}`.)

    - Shopify also supports text-based assets like JavaScript, stylesheets, or SVG
    images having a `.liquid` extension, which it will compile before uploading to
    the CDN. This means you can use Liquid control flow logic and theme settings to
    introduce a level of dynamic logic into your asset files. You’ll see some practical
    examples of that in the chapters to come, especially in Chapter [8](#A437216_1_En_8_Chapter.html).'
