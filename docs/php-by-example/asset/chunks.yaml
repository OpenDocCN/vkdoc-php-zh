- fmt: "# Anonymous Functions\n\nIn PHP, it is possible to describe functions that\
    \ do not have a name. Such functions are usually called *anonymous*. The elegance\
    \ and practical value of anonymous functions come from the fact that they can\
    \ be assigned as a value to variables.\n\n| Details |\n| --- |\n| An anonymous\
    \ function can be represented as an object (which is not far from the truth) that\
    \ can be called; that is, used as a function. If such an object (an anonymous\
    \ function) is assigned to a variable, that variable can be treated as if it were\
    \ the name of a function. |\n\nAn anonymous function is described as simply as\
    \ a regular one but with two important features. First, the function name is not\
    \ specified (a list of arguments in parentheses follows the `function` keyword).\
    \ Second, such a function is usually immediately assigned to a variable. The general\
    \ template for creating an anonymous function looks like the following.\n\n```\n\
    $variable=function(arguments){\n# commands\n};\n```\n\nHow this looks in practice\
    \ is illustrated in Listing [5-11](#613529_1_En_5_Chapter.xhtml#PC23).\n\n```\n\
    \ <?php\n$n=4;\n$x=5;$y=10;\n// Assigning a function:\n$A=function($n){\nfor($s=0,$k=1;$k<=$n;$k++){\n\
    $s+=$k*$k;\n}\nreturn $s;\n};\n// Calling a function:\necho \"\\$A($n) -> \",$A($n),\"\
    \\n\";\n// Assigning functions:\n$B=$A;\n// The variable gets a function as a\
    \ value:\n$A=function($x,$y){\nreturn $x+$y;\n};\n// Calls the functions by variables:\n\
    echo \"\\$B($n) -> \",$B($n),\"\\n\";\necho \"\\$A($x,$y) -> \",$A($x,$y),\"\\\
    n\";\n?>\nListing 5-11\nAnonymous Functions\n```\n\nThe result of the program\
    \ execution is as follows.\n\n```\nThe output of the program (from Listing 5-11)\n\
    $A(4) -> 30\n$B(4) -> 30\n$A(5,10) -> 15\n```\n\nFirst, the `$A` variable is assigned\
    \ the following construction as a value.\n\n```\nfunction($n){\nfor($s=0,$k=1;$k<=$n;$k++){\n\
    $s+=$k*$k;\n}\nreturn $s;\n}\n```\n\nIt defines an anonymous function that, based\
    \ on the argument `$n`, calculates (and returns as a result) the sum of the squares\
    \ of natural numbers from `1` to `$n`. Once that anonymous function has been assigned\
    \ to `$A` (note the semicolon at the end of the assignment statement), `$A` can\
    \ be treated like a function—in particular, it can be called. For example, the\
    \ value of the `$A($n)` expression (with the value `4` for the `$n` variable)\
    \ is the sum of the squared numbers from `1` to `4` (that is, `30`). Further,\
    \ after executing the `$B=$A` command, which assigns `$A` to the `$B` variable,\
    \ the `$B` variable also \"becomes a function\" and is the same as `$A`. The `$A`\
    \ variable is then assigned a new anonymous function, defined as follows.\n\n\
    ```\nfunction($x,$y){\nreturn $x+$y;\n}\n```\n\nThis time, it is a function with\
    \ two arguments and returns the sum of the arguments. Therefore, the value of\
    \ the `$A($x,$y)` expression (with the values `5` and `10` for the `$x` and `$y`\
    \ variables, respectively) is `15`.\n\n## Named Arguments\n\nWhen calling a function,\
    \ you pass the arguments in the same order in which they were specified in the\
    \ function declaration. That way of passing arguments is called positional one,\
    \ or passing arguments *by position*. However, PHP 8 introduced the ability to\
    \ pass arguments *by name*. In that case, when the function is called, the arguments\
    \ (all or some) are defined by a name and a value. The function itself is described\
    \ as usual.\n\n| Details |\n| --- |\n| If an argument is specified in the function\
    \ declaration, then the name of that argument is specified without the `$` symbol\
    \ when the function is called. A colon follows the argument name and then the\
    \ argument value. For example, if you used the `$arg` argument in the `func()`\
    \ function declaration, then to pass the argument by name when calling the function,\
    \ you use the `func(arg: value)` instruction. |\n\nListing [5-12](#613529_1_En_5_Chapter.xhtml#PC27)\
    \ is a small example illustrating how to pass arguments by name to a function.\n\
    \n![](images/613529_1_En_5_Chapter/613529_1_En_5_Figs_HTML.gif)A bell icon. **The\
    \ PHP 8 Standard**\n\nThe following code only runs in PHP 8.\n\n```\n<?php\nfunction\
    \ show($first,$second,$third){\necho \"The first argument: $first\\n\";\necho\
    \ \"The second argument: $second\\n\";\necho \"The third argument: $third\\n\"\
    ;\n}\necho \"Positional passing:\\n\";\nshow(100,200,300);\necho \"\\nNamed passing:\\\
    n\";\nshow(second:200,third:300,first:100);\necho \"\\nMixed passing:\\n\";\n\
    show(100,third:300,second:200);\n?>\nListing 5-12\nUsing the Named Arguments\n\
    ```\n\nThe result of the program execution is as follows.\n\n```\nThe output of\
    \ the program (from Listing 5-12)\nThe first argument: 100\nThe second argument:\
    \ 200\nThe third argument: 300\n\nThe first argument: 100\nThe second argument:\
    \ 200\nThe third argument: 300\n\nThe first argument: 100\nThe second argument:\
    \ 200\nThe third argument: 300\n```\n\nIn this case, an ordinary function `show()`\
    \ with three arguments named `$first`, `$second`, and `$third` is described. When\
    \ you call the function, it displays the values of the arguments passed to it.\n\
    \nYou can call the function in the usual way, using positional argument passing.\
    \ For example, the `show(100,200,300)` command means that the value `100` is passed\
    \ as the `$first` argument, the value `200` is passed as the `$second` argument,\
    \ and the value `300` is passed as the `$third` argument.\n\nThe `show(second:200,third:300,first:100)`\
    \ command gives an example of passing all three arguments by name. As in the previous\
    \ case, the value `100` is passed as the `$first` argument, the value `200` is\
    \ passed as the `$second` argument, and the value `300` is passed as the `$third`\
    \ argument.\n\nYou can use the mixed argument passing scheme when some arguments\
    \ are passed positionally and some are passed by name.\n\n![](images/613529_1_En_5_Chapter/613529_1_En_5_Figp_HTML.jpg)An\
    \ information icon with the letter 'i'.Note\n\nWhen calling a function, if arguments\
    \ are passed by position and by name, those arguments that are passed by position\
    \ are listed first.\n\nAnother example is given by the `show(100,third:300,second:200)`\
    \ command. The first argument is passed positionally, and the other two are passed\
    \ by name.\n\nPassing arguments by name can be especially efficient if the function's\
    \ arguments have default values.\n\n| Details |\n| --- |\n| Note that a default\
    \ argument value is used if that argument is not explicitly specified when the\
    \ function is called. In a function declaration, the default value is specified\
    \ after the argument name through the assignment operator. |\n\nAn example where\
    \ function arguments have default values and are passed by name is shown in Listing\
    \ [5-13](#613529_1_En_5_Chapter.xhtml#PC29).\n\n```\n<?php\nfunction show($first=1,$second=2,$third=3){\n\
    echo \"The first argument: $first\\n\";\necho \"The second argument: $second\\\
    n\";\necho \"The third argument: $third\\n\";\n}\necho \"Positional with omitted\
    \ argument:\\n\";\nshow(100,third:300);\necho \"\\nNamed with omitted arguments:\\\
    n\";\nshow(second:200);\n?>\nListing 5-13\nNamed Arguments and Default Values\n\
    ```\n\nThe following is the result of the program execution.\n\n```\nThe output\
    \ of the program (from Listing 5-13)\nThe first argument: 100\nThe second argument:\
    \ 2\nThe third argument: 300\n\nThe first argument: 1\nThe second argument: 200\n\
    The third argument: 3\n```\n\nNow, for the `show()` function, the `$first`, `$second`,\
    \ and `$third` arguments have the default values `1`, `2`, and `3` respectively.\
    \ Therefore, when you call the function with the `show(100,third:300)` command,\
    \ the `$first` argument is set to `100`, the `$second` argument uses the default\
    \ value `2`, and the `$third` argument is set to `300`.\n\nIf the `show(second:200)`\
    \ command is used, the `$second` argument is set to `200`, and the default values\
    \ `1` and `3` are used for the `$first` and `$third` arguments, respectively."
  raw: "## Anonymous Functions\n\nIn PHP, it is possible to describe functions that\
    \ do not have a name. Such functions are usually called *anonymous*. The elegance\
    \ and practical value of anonymous functions come from the fact that they can\
    \ be assigned as a value to variables.\n\n| Details |\n| --- |\n| An anonymous\
    \ function can be represented as an object (which is not far from the truth) that\
    \ can be called; that is, used as a function. If such an object (an anonymous\
    \ function) is assigned to a variable, that variable can be treated as if it were\
    \ the name of a function. |\n\nAn anonymous function is described as simply as\
    \ a regular one but with two important features. First, the function name is not\
    \ specified (a list of arguments in parentheses follows the `function` keyword).\
    \ Second, such a function is usually immediately assigned to a variable. The general\
    \ template for creating an anonymous function looks like the following.\n\n```\n\
    $variable=function(arguments){\n# commands\n};\n```\n\nHow this looks in practice\
    \ is illustrated in Listing [5-11](#613529_1_En_5_Chapter.xhtml#PC23).\n\n```\n\
    \ \",$A($n),\"\\n\";\n// Assigning functions:\n$B=$A;\n// The variable gets a\
    \ function as a value:\n$A=function($x,$y){\nreturn $x+$y;\n};\n// Calls the functions\
    \ by variables:\necho \"\\$B($n) -> \",$B($n),\"\\n\";\necho \"\\$A($x,$y) ->\
    \ \",$A($x,$y),\"\\n\";\n?>\nListing 5-11\nAnonymous Functions\n```\n\nThe result\
    \ of the program execution is as follows.\n\n```\nThe output of the program (from\
    \ Listing 5-11)\n$A(4) -> 30\n$B(4) -> 30\n$A(5,10) -> 15\n```\n\nFirst, the `$A`\
    \ variable is assigned the following construction as a value.\n\n```\nfunction($n){\n\
    for($s=0,$k=1;$k<=$n;$k++){\n$s+=$k*$k;\n}\nreturn $s;\n}\n```\n\nIt defines an\
    \ anonymous function that, based on the argument `$n`, calculates (and returns\
    \ as a result) the sum of the squares of natural numbers from `1` to `$n`. Once\
    \ that anonymous function has been assigned to `$A` (note the semicolon at the\
    \ end of the assignment statement), `$A` can be treated like a function—in particular,\
    \ it can be called. For example, the value of the `$A($n)` expression (with the\
    \ value `4` for the `$n` variable) is the sum of the squared numbers from `1`\
    \ to `4` (that is, `30`). Further, after executing the `$B=$A` command, which\
    \ assigns `$A` to the `$B` variable, the `$B` variable also “becomes a function”\
    \ and is the same as `$A`. The `$A` variable is then assigned a new anonymous\
    \ function, defined as follows.\n\n```\nfunction($x,$y){\nreturn $x+$y;\n}\n```\n\
    \nThis time, it is a function with two arguments and returns the sum of the arguments.\
    \ Therefore, the value of the `$A($x,$y)` expression (with the values `5` and\
    \ `10` for the `$x` and `$y` variables, respectively) is `15`.\n\n## Named Arguments\n\
    \nWhen calling a function, you pass the arguments in the same order in which they\
    \ were specified in the function declaration. That way of passing arguments is\
    \ called positional one, or passing arguments *by position*. However, PHP 8 introduced\
    \ the ability to pass arguments *by name*. In that case, when the function is\
    \ called, the arguments (all or some) are defined by a name and a value. The function\
    \ itself is described as usual.\n\n| Details |\n| --- |\n| If an argument is specified\
    \ in the function declaration, then the name of that argument is specified without\
    \ the `$` symbol when the function is called. A colon follows the argument name\
    \ and then the argument value. For example, if you used the `$arg` argument in\
    \ the `func()` function declaration, then to pass the argument by name when calling\
    \ the function, you use the `func(arg: value)` instruction. |\n\nListing [5-12](#613529_1_En_5_Chapter.xhtml#PC27)\
    \ is a small example illustrating how to pass arguments by name to a function.\n\
    \n![](images/613529_1_En_5_Chapter/613529_1_En_5_Figs_HTML.gif)A bell icon. **The\
    \ PHP 8 Standard**\n\nThe following code only runs in PHP 8.\n\n```\nListing 5-12\n\
    Using the Named Arguments\n```\n\nThe result of the program execution is as follows.\n\
    \n```\nThe output of the program (from Listing 5-12)\nThe first argument: 100\n\
    The second argument: 200\nThe third argument: 300\n\nThe first argument: 100\n\
    The second argument: 200\nThe third argument: 300\n\nThe first argument: 100\n\
    The second argument: 200\nThe third argument: 300\n\n```\n\nIn this case, an ordinary\
    \ function `show()` with three arguments named `$first`, `$second`, and `$third`\
    \ is described. When you call the function, it displays the values of the arguments\
    \ passed to it.\n\nYou can call the function in the usual way, using positional\
    \ argument passing. For example, the `show(100,200,300)` command means that the\
    \ value `100` is passed as the `$first` argument, the value `200` is passed as\
    \ the `$second` argument, and the value `300` is passed as the `$third` argument.\n\
    \nThe `show(second:200,third:300,first:100)` command gives an example of passing\
    \ all three arguments by name. As in the previous case, the value `100` is passed\
    \ as the `$first` argument, the value `200` is passed as the `$second` argument,\
    \ and the value `300` is passed as the `$third` argument.\n\nYou can use the mixed\
    \ argument passing scheme when some arguments are passed positionally and some\
    \ are passed by name.\n\n![](images/613529_1_En_5_Chapter/613529_1_En_5_Figp_HTML.jpg)An\
    \ information icon with the letter 'i'.Note\n\nWhen calling a function, if arguments\
    \ are passed by position and by name, those arguments that are passed by position\
    \ are listed first.\n\nAnother example is given by the `show(100,third:300,second:200)`\
    \ command. The first argument is passed positionally, and the other two are passed\
    \ by name.\n\nPassing arguments by name can be especially efficient if the function’s\
    \ arguments have default values.\n\n| Details |\n| --- |\n| Note that a default\
    \ argument value is used if that argument is not explicitly specified when the\
    \ function is called. In a function declaration, the default value is specified\
    \ after the argument name through the assignment operator. |\n\nAn example where\
    \ function arguments have default values and are passed by name is shown in Listing\
    \ [5-13](#613529_1_En_5_Chapter.xhtml#PC29).\n\n```\nListing 5-13\nNamed Arguments\
    \ and Default Values\n```\n\nThe following is the result of the program execution.\n\
    \n```\nThe output of the program (from Listing 5-13)\nThe first argument: 100\n\
    The second argument: 2\nThe third argument: 300\n\nThe first argument: 1\nThe\
    \ second argument: 200\nThe third argument: 3\n\n```\n\nNow, for the `show()`\
    \ function, the `$first`, `$second`, and `$third` arguments have the default values\
    \ `1`, `2`, and `3` respectively. Therefore, when you call the function with the\
    \ `show(100,third:300)` command, the `$first` argument is set to `100`, the `$second`\
    \ argument uses the default value `2`, and the `$third` argument is set to `300`.\n\
    \nIf the `show(second:200)` command is used, the `$second` argument is set to\
    \ `200`, and the default values `1` and `3` are used for the `$first` and `$third`\
    \ arguments, respectively."
  trans: "\n# 匿名函数\n\n在 PHP 中，可以定义没有名称的函数。这类函数通常被称为*匿名函数*。匿名函数的优雅之处和实际价值在于，它们可以作为值赋给变量。\n\
    \n| 详情 |\n| --- |\n| 匿名函数可以被表示为一个可调用的对象（这很接近事实），即可作为函数使用。如果这样一个对象（即匿名函数）被赋给一个变量，那么该变量可以像函数名一样被使用。\
    \ |\n\n匿名函数的描述方式与普通函数类似，但有两点重要区别。首先，函数名不指定（在 `function` 关键字后直接跟参数列表）。其次，这样的函数通常会立即赋给一个变量。创建匿名函数的一般模板如下所示。\n\
    \n```\n$variable=function(arguments){\n# commands\n};\n```\n\n实际使用效果如清单 5-11 所示。\n\
    \n```\n <?php\n$n=4;\n$x=5;$y=10;\n// 赋予函数：\n$A=function($n){\nfor($s=0,$k=1;$k<=$n;$k++){\n\
    $s+=$k*$k;\n}\nreturn $s;\n};\n// 调用函数：\necho \"\\$A($n) -> \",$A($n),\"\\n\"\
    ;\n// 赋予函数：\n$B=$A;\n// 变量获取函数作为值：\n$A=function($x,$y){\nreturn $x+$y;\n};\n//\
    \ 通过变量调用函数：\necho \"\\$B($n) -> \",$B($n),\"\\n\";\necho \"\\$A($x,$y) -> \",$A($x,$y),\"\
    \\n\";\n?>\n清单 5-11\n匿名函数\n```\n\n程序执行结果如下。\n\n```\n程序输出（来自清单 5-11）\n$A(4) ->\
    \ 30\n$B(4) -> 30\n$A(5,10) -> 15\n```\n\n首先，变量 `$A` 被赋予以下结构作为值。\n\n```\nfunction($n){\n\
    for($s=0,$k=1;$k<=$n;$k++){\n$s+=$k*$k;\n}\nreturn $s;\n}\n```\n\n它定义了一个匿名函数，该函数基于参数\
    \ `$n`，计算并返回从 `1` 到 `$n` 的自然数平方和。一旦该匿名函数被赋给 `$A`（注意赋值语句末尾的分号），`$A` 就可以像函数一样被使用——特别是，它可以被调用。例如，表达式\
    \ `$A($n)` 的值（变量 `$n` 的值为 `4`）是从 `1` 到 `4` 的平方和（即 `30`）。接着，执行 `$B=$A` 命令将 `$A`\
    \ 赋给变量 `$B` 后，`$B` 变量也“变成了函数”，且与 `$A` 相同。然后，`$A` 变量被赋予一个新的匿名函数，定义如下。\n\n```\n\
    function($x,$y){\nreturn $x+$y;\n}\n```\n\n这次是一个有两个参数的函数，返回两个参数的和。因此，表达式 `$A($x,$y)`\
    \ 的值（变量 `$x` 和 `$y` 的值分别为 `5` 和 `10`）是 `15`。\n\n## 命名参数\n\n调用函数时，通常按照函数声明中指定的顺序传递参数。这种参数传递方式称为位置传递，或称*按位置*传递参数。然而，PHP\
    \ 8 引入了*按名称*传递参数的能力。在这种情况下，调用函数时，参数（全部或部分）由名称和值定义。函数本身的描述方式与往常相同。\n\n| 详情 |\n\
    | --- |\n| 如果在函数声明中指定了某个参数，那么在调用函数时，该参数的名称不带 `$` 符号。参数名称后跟冒号，然后是参数值。例如，如果在 `func()`\
    \ 函数声明中使用了 `$arg` 参数，那么在调用函数时，使用 `func(arg: value)` 指令来按名称传递参数。 |\n\n清单 5-12 是一个小例子，说明如何向函数按名称传递参数。\n\
    \n![](img/613529_1_En_5_Figs_HTML.gif)一个铃铛图标。**PHP 8 标准**\n\n以下代码仅能在 PHP 8 中运行。\n\
    \n```\n<?php\nfunction show($first,$second,$third){\necho \"The first argument:\
    \ $first\\n\";\necho \"The second argument: $second\\n\";\necho \"The third argument:\
    \ $third\\n\";\n}\necho \"Positional passing:\\n\";\nshow(100,200,300);\necho\
    \ \"\\nNamed passing:\\n\";\nshow(second:200,third:300,first:100);\necho \"\\\
    nMixed passing:\\n\";\nshow(100,third:300,second:200);\n?>\n清单 5-12\n使用命名参数\n\
    ```\n\n程序执行结果如下。\n\n```\n程序输出（来自清单 5-12）\nThe first argument: 100\nThe second\
    \ argument: 200\nThe third argument: 300\n\nThe first argument: 100\nThe second\
    \ argument: 200\nThe third argument: 300\n\nThe first argument: 100\nThe second\
    \ argument: 200\nThe third argument: 300\n```\n\n在这个例子中，描述了一个普通的函数 `show()`，它有三个参数，分别命名为\
    \ `$first`、`$second` 和 `$third`。调用该函数时，它会显示传递给它的参数值。\n\n你可以使用位置参数传递的方式正常调用该函数。例如，`show(100,200,300)`\
    \ 命令表示将值 `100` 作为 `$first` 参数传递，值 `200` 作为 `$second` 参数传递，值 `300` 作为 `$third`\
    \ 参数传递。\n\n`show(second:200,third:300,first:100)` 命令给出了一个将所有三个参数按名称传递的例子。与前面的情况一样，值\
    \ `100` 作为 `$first` 参数传递，值 `200` 作为 `$second` 参数传递，值 `300` 作为 `$third` 参数传递。\n\
    \n你可以使用混合参数传递方案，其中一些参数按位置传递，一些按名称传递。\n\n![](img/613529_1_En_5_Figp_HTML.jpg)一个带有字母“i”的信息图标。注意\n\
    \n调用函数时，如果同时使用位置传递和名称传递参数，那么按位置传递的参数应列在前面。\n\n另一个例子由 `show(100,third:300,second:200)`\
    \ 命令给出。第一个参数按位置传递，另外两个按名称传递。\n\n如果函数的参数有默认值，按名称传递参数会特别高效。\n\n| 详情 |\n| --- |\n\
    | 请注意，如果在调用函数时未显式指定某个参数，则会使用该参数的默认值。在函数声明中，默认值通过赋值运算符在参数名称后指定。 |\n\n清单 5-13 展示了一个示例，其中函数参数具有默认值并按名称传递。\n\
    \n```\n<?php\nfunction show($first=1,$second=2,$third=3){\necho \"The first argument:\
    \ $first\\n\";\necho \"The second argument: $second\\n\";\necho \"The third argument:\
    \ $third\\n\";\n}\necho \"Positional with omitted argument:\\n\";\nshow(100,third:300);\n\
    echo \"\\nNamed with omitted arguments:\\n\";\nshow(second:200);\n?>\n清单 5-13\n\
    命名参数和默认值\n```\n\n以下是程序执行的结果。\n\n```\n程序输出（来自清单 5-13）\nThe first argument: 100\n\
    The second argument: 2\nThe third argument: 300\n\nThe first argument: 1\nThe\
    \ second argument: 200\nThe third argument: 3\n```\n\n现在，对于 `show()` 函数，参数 `$first`、`$second`\
    \ 和 `$third` 分别具有默认值 `1`、`2` 和 `3`。因此，当使用 `show(100,third:300)` 命令调用该函数时，`$first`\
    \ 参数被设置为 `100`，`$second` 参数使用默认值 `2`，而 `$third` 参数被设置为 `300`。\n\n如果使用 `show(second:200)`\
    \ 命令，则 `$second` 参数被设置为 `200`，而 `$first` 和 `$third` 参数分别使用默认值 `1` 和 `3`。\n"
- fmt: '# Summary


    - A function is a named block of code that can be called by the name. The function
    declaration begins with the `function` keyword, followed by the function’s arguments
    (in parentheses). Then, the commands are enclosed in curly braces. The commands
    are executed when the function is called.

    - A function can return a result. The return value of a function is specified
    after the `return` instruction, which terminates the execution of the function.

    - For a function, you can explicitly specify the type of arguments and the type
    of result.

    - By default, the arguments of functions are passed by value (copies of the variables
    specified as the function arguments are created). To pass the arguments by reference,
    in the function declaration, the name of the corresponding argument is preceded
    by the `&` reference symbol.

    - Arguments can have default values (specified through the assignment operator
    after the argument name in the function declaration). The default value is used
    if no value is specified for the argument when the function is called.

    - You can create functions with an arbitrary number of arguments. In that case,
    the entire set of arguments is identified with one argument, preceded by an ellipsis
    in the function declaration. The argument is treated as an array.

    - Functions can be defined using recursion when the function calls itself (but
    usually with a different argument).

    - The function (syntax construction) `eval()` allows you to execute the commands
    in the string passed as an argument to the function.

    - It is possible to create anonymous functions that do not have a name. An anonymous
    function is assigned to a variable; after that, the variable can be called as
    if it were a function.

    - Starting with PHP 8, arguments can be passed by name when calling functions.
    In that case, you specify the argument’s name (without the `$` symbol) and, separated
    by a colon, the argument’s value when calling the function.


    # Useful Tricks and Operations


    > *Imitation is the sincerest form of plagiarism.*

    > —*ALF* (TV series)


    This chapter discusses topics that are essential and useful in everyday practice.


    ## Constants


    Constants are fundamentally different from variables in that the value of a constant
    cannot be changed. The `define()` function (more precisely, a syntax construction)
    is usually used to add a constant to a program. The function’s first argument
    is a string with the constant’s name. The second argument specifies the value
    of the constant. The `$` symbol is not used at the beginning of the constant name.
    Following the generally accepted convention, the names of constants consist of
    capital letters (that is, this is not necessary, but good manners oblige). For
    example, the `define("PI",3.141592)` command defines the constant `PI` with the
    value `3.141592`. After executing that command, the value of the constant `PI`
    cannot be changed.


    A constant cannot be deleted after it has been created. To check the existence
    of a constant, the `defined()` function is used, the argument of which is a string
    with the name of the constant; for example, `defined("PI")`. The result is `true`
    or `false` depending on whether the constant is defined.


    There is another way to add a constant to a program. In that case, the keyword
    `const` is used, after which the name of the constant is specified (without the
    `$` symbol at the beginning of the name), and, through the assignment operator,
    the value of the constant. For example, the constant `TEN` with the value `10`
    can be defined with the `const TEN=10` command.


    The fundamental difference between these two ways of creating constants is that
    constants defined by the `define()` function are created at runtime. In contrast,
    constants created using the `const` statement are created at the compilation time.
    That circumstance has consequences. For example, the command to create a constant
    using the `const` statement cannot be placed in a conditional statement but can
    be done using the `define()` function. On the other hand, the `define()` function
    cannot be used in classes and interfaces (discussed in later chapters of the book)
    to create constant fields; in that case, an expression based on the `const` statement
    is used.


