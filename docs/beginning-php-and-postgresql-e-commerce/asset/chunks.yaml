    **Implementing the Presentation Tier**


    The presentation tier for the HatShop customer account system consists of the
    following componentized templates:


    customer_login: The login box.


    customer_logged: After a user is logged in, this componentized template takes
    the place of the customer_login componentized template to show the currently logged-in
    user and displays account management and logout links.


    customer_details: For registering a new user or for editing the basic details
    of an existing user.


    customer_address: Allows a user to add/edit address information.


    customer_credit_card: Allows a user to add/edit credit card information.


