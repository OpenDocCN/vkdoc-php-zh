  \ 01:00:01\n                    [details] => Merry Christmas\n            )\n  \
  \  ),\n    [1] => Array(\n            [CalendarEvent] => Array(\n              \
  \      [id] => 2\n                    [name] => Test Event 2\n                 \
  \   [date] => 2009-01-01 01:00:00\n                    [details] => And a happy\
  \ new year\n            )\n    )\n);\n```\n\n如果你使用以下命令将这个相同的结果集传递给 `Set::extract()`：`$events\
  \ = Set::extract($events,'{n}.CalendarEvent');`  \n那么结果数组的格式化方式将如下所示：\n\n```\n$events\
  \ = Array(\n    [0] => Array(\n            [id] => 1\n            [name] => Test\
  \ Event 1\n            [date] => 2008-12-25 01:01:00\n            [details] => Merry\
