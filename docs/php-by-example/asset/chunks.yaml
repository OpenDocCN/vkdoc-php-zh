    The most important conclusion is that changing the `$A` array (after executing
    the `$B=$A` command) does not affect the `$B` array. In other words, the `$B=$A`
    command creates a copy of the `$A` array.


    ![](images/613529_1_En_4_Chapter/613529_1_En_4_Fige_HTML.jpg)An i symbol.Note


    Such an obvious conclusion might seem strange and naive. However, this situation
    may surprise those familiar with Java, C#, or Python.


    ## Concatenating Arrays


    Another practical operation is the concatenation (addition) of arrays. To do that,
    you use the `+` operator. The rule is as follows. If you add an array to an array,
    you get an array consisting of elements from both arrays. If the merged arrays
    have elements with the same keys, the resulting array keeps the value presented
    in the first operand (the value from the first array). The situation is illustrated
    in Listing [4-9](#613529_1_En_4_Chapter.xhtml#PC20).


    ```

    1,2,"Last"=>3];

    $B=[100,200,"Last"=>300];

    // The sum of the arrays:

    $C=$A+$B;

    // The contents of the resulting array:

    print_r($C);

    ?>

    Listing 4-9

    The Sum of Arrays

    ```


    The output of the program is as follows.


    ```

    The output of the program (from Listing 4-9)

    Array

    (

    [First] => 1

    [0] => 2

    [Last] => 3

    [1] => 200

    )

    ```


    Create two arrays using the `$A=["First"=>1,2,"Last"=>3]` and `$B=[100,200,"Last"=>300]`
    commands. Next, calculate the sum of these arrays (the `$C=$A+$B` instruction).
    What is the result? The result is an array that contains elements from the two
    original arrays. There is just some intrigue regarding the elements that have
    matching indexes. There are two such elements (two pairs). This means the element
    with the `"Last"` key, and the element with the `0` index (in the `$A` array,
    that is, the element with the value `2`, and in the `$B` array, that is, the element
    with the value `100`). As noted, the first array (the `$A` array) takes precedence
    in such situations. Thus, in the `$C` array, the element with the `0` index has
    the value `2`, and the element with the `"Last"` key has the value `3`.'
