    **4.** Accepts the response, which contains any errors that occurred.


    • If there are no errors, tells the browser to submit the form normally.


    • If there are errors, loops over them and displays each one on the form.


    Because all of the error containers are already in place on the form, it is a
    simple matter to write the error message to the error container and then call
    the show() method on it (this is a method Prototype adds to all HTML elements,
    as we saw in Chapter 5). For more discussion of how to create JavaScript classes
    using Prototype, refer to Chapter 5.


