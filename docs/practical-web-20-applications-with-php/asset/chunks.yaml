    Implementing Site Search


    **T**he nextstep in the development of our webapplication is to provide a search
    tool for users to find content on the web site. Essentially what we will be doing
    is allowing people to search based on content in blog posts, as well as on tags
    that have been assigned to those posts.


    Implementing site search consists of two major steps:


    • **Creating and managing full-text indexes.** Whenever a new post is created,
    we must add it to the index. Similarly, when a post is edited, the index must
    be updated accordingly, and if a post is deleted, then it must be removed from
    the index. We will be using the Zend_Search_Lucene component of the Zend Framework
    to manage these indexes.


    • **Performing searches and displaying results.** We will include a search form
    on the web site. Users will be able to enter their desired search term, which
    we must then accept and use to query the search index. Once we find the matching
    documents, we will output those results to the user.


    Another feature we will be implementing is an Ajax-based search suggestion tool.
    This means when somebody begins to type a search query, suggestions will be provided
    based on what other users have also searched for. This is loosely based on the
    Google Suggest tool.


    **Introduction to Zend_Search_Lucene**


    Zend_Search_Lucene is the text search tool that comes with the Zend Framework.
    It is a general-purpose tool (based on the Apache Lucene project) that allows
    the developer to index their documents as they please, as well as providing users
    with a powerful interface to query the created indexes.


    Each entry in a search index is referred to as a *document*. A document consists
    of one or more fields, as decided by the developer. You can use five field types
    for each field in a document. I describe each of these in the “Zend_Search_Lucene
    Field Types” section.


    When you add new content to your application, you create a new document in the
    search index. Likewise, you can delete documents from the index. One restriction
    with Zend_Search_


    Lucene is that you cannot update an existing document in the index. Rather, you
    must delete it and then add it again.


    **427**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch12CMP3 11/13/07 9:26 PM Page 428


    **428**


    C H A P T E R 1 2 ■ I M P L E M E N T I N G S I T E S E A R C H


    **Comparison to MySQL Full-Text Indexing**


    Although Zend_Search_Lucene is not the only tool available for creating full-text
    indexes, it has various advantages over other solutions, the biggest being that
    it is a native PHP solution. This means that regardless of the platform we use
    or the database we use, we can use Zend_Search_


    Lucene to provide our web application with searching capabilities.


    Since the database server we have been primarily developing for in this web application
    has been MySQL, we will briefly look at the native MySQL solution for full-text
    indexing.


    When creating a new table in MySQL, you can specify a column as fulltext, meaning
    MySQL will automatically maintain a full-text index for that column. This allows
    you to perform SQL queries against this column.


    For example, to create a database table that holds searchable news articles, you
    could create a table in MySQL using the following:


    create table news_articles (


    article_id serial not null,


    title varchar(255) not null,


    body text not null,


    primary key (article_id),


    fulltext (title, body)


    );


    You would then be able to search in this table using the MySQL match() … against
    syntax.


    For example, to find all records matching the keyword MySQL, you would use the
    following SQL


    query:


    select * from news_articles where match(title, body) against (''MySQL'');


    The match() … against syntax returns a score based on the relevance of each row
    that is matched. The results are automatically sorted by this score. You can retrieve
    this score by including match() … against in the column list:


    select *, match(title, body) against (''MySQL'') as score


    from news_articles


    where match(title, body) against (''MySQL'');


    Because maintenance of the index is automated, no extra work is required to maintain
    the index. This is a big advantage over the method we will be using, although
    there are some other drawbacks, such as the following:


    • Full-text configuration is global to the server. By default, search terms must
    be at least four characters to be used. You can change this setting, but it will
    apply to all databases running on the server. The same applies to the list of
    the stop words. A *stop word* is a word that is ignored when performing a search.
    Words such as *the* or *to* are examples of stop words.


    • If you want to run your application on a different database server, then this
    solution will not be available.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch12CMP3 11/13/07 9:26 PM Page 429


    C H A P T E R 1 2 ■ I M P L E M E N T I N G S I T E S E A R C H


    **429**


    It is primarily because of this second restriction that we will instead use a
    native PHP


    solution. Additionally, there may be times when you write web applications that
    use no database at all, in which case you would have no choice but to use a solution
    such as Zend_Search_Lucene.


    ■**Note** If you are using PostgreSQL, then a good solution for a full-text indexing
    extension is Tsearch2\. One drawback with this extension is that it must be compiled
    into the server. Although this is fine if you manage your own web servers, it
    can be difficult to get access to this extension in a shared hosting environment.


    **Zend_Search_Lucene Field Types**


    Five different field types are available for storing document data in a Zend_Search_Lucene
    document. Each serves a distinctly different purpose, and it is likely that you
    will typically use several of these field types for each stored document.


    • Keyword: This field type is used to hold data that users can search on, as well
    as being included in the returned search data. It is typically used for data such
    as a date or URL, since the value stored in the index is exactly as you specify
    it.


    • UnIndexed: If you want to store data with an indexed document but you don’t
    want that data to be searchable, then you use this field type. This is useful
    for storing extra data with the document that you use when displaying the search
    results.


    • Binary: This field type works similarly to the UnIndexed field type, except
    that it is for binary data. An example of binary data you may want to store with
    an indexed document is a thumbnail image or icon representing that data.


    • Text: This is the field type you use for data you want users to be able to search
    on, as well as data that will be returned in the search results. This differs
    from the Keyword type in that the data is tokenized, meaning the data is split
    up into separate words (hence whitespace and other nonword characters are ignored),
    with each returned token indexed.


    • UnStored: This field type allows you to add searchable data to the document
    just like the Text field; however, when a document is found from searching on
    data using this field type, unlike the Text type, that data isn’t returned with
    the results.


    You can structure the data to be indexed in many ways using these different field
    types.


    For instance, you may want to retrieve a database ID only in search results and
    then manually look up the corresponding data before presenting it to the user.
    In this scenario, you would use an UnStored field type to add the searchable content
    as well as UnIndexed to store the corresponding database ID. This is the method
    we will be using.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch12CMP3 11/13/07 9:26 PM Page 430


    **430**


    C H A P T E R 1 2 ■ I M P L E M E N T I N G S I T E S E A R C H


    **Field Naming**


    Every field you add to an indexed document must have a name. There are two reasons
    for this.


    First, when a search has been performed and you are displaying the search results
    to the user, you need a way to reference the stored data. Second, the advanced
    querying capabilities of Zend_Search_Lucene allow users to search on a specific
    field.


    For example, if you were to create an index of all news articles in your web site,
    you might include a field called author (which would be of type Text since we
    want it to be searchable and to be returned in results) to hold the name of the
    person who wrote the article.


    If you wanted to find all articles by me (Quentin Zervaas), you would use the
    search term author:"Quentin Zervaas".


    ■**Note** The entire author name must be quoted, since not doing so would mean
    in this case that the author field was searched for Quentin while the main index
    was searched for Zervaas. Although the intended results would be returned, other
    records may also be returned (such as articles by someone called Quentin that
    also happened to have the word Zervaas in any of the indexed fields).


    This leads us now to the default search field that is used. In the previous example,
    we specified the author field must be searched; however, if no field is specified
    (that is, only the search term is specified), then all indexed fields are searched.


    We will look at some more advanced queries later in this chapter once we have
    integrated the indexing capabilities.


    **Indexing Application Content**


    Now that we have briefly looked at how Zend_Search_Lucene is structured, it is
    time to create indexes for the content in our web application. We will be indexing
    the content from all published blog posts, including the content, title, tags,
    and timestamp.


    We must also make a number of changes to the existing system to ensure indexes
    are correctly maintained. Specifically, this includes the following:


    • When a new blog post is created (or existing post is sent live), it must be
    added to the search index.


    • When an existing post is deleted (or sent from live to draft), it must be removed
    from the search index.


    • When a blog post is modified, it must be removed from the search index and readded.


    Additionally, since the index must be initially created at some point, we are
    going to write code to rebuild the entire index from scratch.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch12CMP3 11/13/07 9:26 PM Page 431


    C H A P T E R 1 2 ■ I M P L E M E N T I N G S I T E S E A R C H


    **431**


    Because rebuilding an index from scratch is an expensive process (in terms of
    the time taken as well as the memory and CPU cycles used), it is not something
    you want to do frequently. Because of this, we must do our best to keep the index
    as up-to-date as possible. You may want to supplement this by rebuilding the index
    periodically (such as weekly) using a cron job.


    To index all blog posts in the web application, we will first write code to generate
    an indexable document for each blog post. This is done using the Zend_Search_Lucene_Document
    class. Following this we will implement the functionality listed previously.


    **Indexing Multiple Types of Data**


    The search index we build in this application is specifically geared toward blog
    posts. In a larger web application, you may have other content you want to index
    also. In that instance you may want to have one index for each type of data (then
    when a search is performed, you search each index), or you have one index containing
    all searchable data.


    Each of these methods has its own advantages and disadvantages. For example, if
    you use a single index for all types of data


    • It is simpler to search across all indexes in one operation since all searchable
    data is in one place.


    • You must keep track of the kind of data each document in the index is. For example,
    if you are indexing data about news articles as well as about uploaded files,
    you must differentiate between these somehow when you display search results to
    users.


    On the other hand, if you use one index for each type of data


    • It is more difficult to search because you have to search every index when a
    search is performed.


    • It gives you more leverage to create different types of searches on your site.
    For example, if you want a form to allow users to search only in uploaded files,
    then you simply search the corresponding index. If you also have an index that
    holds information about news articles, you can skip searching this completely.


    Ultimately it comes down to your own needs, depending on the type of application
    you are implementing and the search capabilities you need to provide.


    **Creating a New Zend_Search_Lucene_Document**


    As mentioned earlier this chapter, each entry in a Zend_Search_Lucene index is
    referred to as a document. To create a document that can be added to a search
    index, we use the Zend_Search_


    Lucene_Document class. After instantiating this class, we add all of the required
    fields and data accordingly. Once this has been done, the document can be added
    to the index.


    In this section, we will write a new function for the DatabaseObject_BlogPost
    class that builds and returns such a document. We are not actually concerned with
    adding this document to the search index yet. We will deal with this later this
    chapter.


