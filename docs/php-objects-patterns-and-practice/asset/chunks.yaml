    );\nuse popp\\library\\LibraryCatalogue;\n// will be found under mylib/\nuse popp\\\
    library\\inventory\\Book;\n// will be found under additional/\nuse popp\\library\\\
    inventory\\Ebook;\n$catalogue = new LibraryCatalogue();\n$catalogue->addBook(new\
    \ Book());\n$catalogue->addBook(new Ebook());\n```\n\n**注意**  \n你必须使用 Composer\
    \ 生成自动加载文件 `vendor/autoload.php`，并且在访问你在 `composer.json` 中声明的逻辑之前，必须以某种方式包含该文件。你可以通过运行命令\
    \ `composer install` 来实现。你可以在第 15 章了解更多关于 Composer 的信息。\n\n还记得关于副作用的规则吗？一个 PHP\
    \ 文件应该声明类、接口、函数等；或者执行一个动作。但是，它不应该同时做这两件事。此脚本属于执行动作的类别。关键在于，它调用了 `require_once()`\
    \ 来包含使用 `composer.json` 文件中的配置生成的自动加载代码。正因为如此，所有的类都被定位到了，尽管 `Ebook` 被放置在了一个与其余代码完全不同的独立基础目录中。\n\
    \n为什么要为同一个核心命名空间维护两个独立的目录？一个可能的原因是，你想将单元测试与生产代码分开管理。你也可以管理不会随系统每个版本一起发布的插件和扩展。\n\
    \n**注意**  \n请务必关注 [`http://www.php-fig.org/psr/`](http://www.php-fig.org/psr/)\
    \ 上的所有 PSR 标准。这是一个快速发展的领域，你很可能会发现与你相关的标准正在制定中。\n\n# 总结\n\n在本章中，我稍微纠结了一下标准可能不那么激动人心的可能性——然后论证了它们的力量。标准帮助我们解决了集成问题，这样我们就可以继续做更了不起的事情。我介绍了\
    \ PSR-1 和 PSR-2，即基本编码规范和更广泛的编码风格标准。接着，我讨论了 PSR-4，即自动加载器的标准。最后，我通过一个基于 Composer\
    \ 的示例，展示了在实际操作中符合 PSR-4 的自动加载。\n\n## 16. PHP 使用和创建组件\n### 使用 Composer\n\n程序员渴望生成可重用的代码。这是面向对象编程的伟大目标之一。我们喜欢将有用的功能从特定上下文的混乱中抽象出来，将一个特定的解决方案变成一个可以反复使用的工具。从另一个角度来看，如果程序员热爱可重用，他们就讨厌重复。通过创建可以复用的库，程序员避免在多个项目中实现类似的解决方案。\n\
    \n然而，即使我们在自己的代码中避免了重复，还有一个更广泛的问题。对于你创建的每一个工具，有多少其他程序员也实现了相同的解决方案？这造成了史诗般的浪费：程序员之间进行协作，集中精力将一个单一的工具做得更好，而不是产生大量同一主题的变体，难道不是更明智吗？\n\
    \n为了做到这一点，我们需要获取现有的库。但随后我们需要的包很可能还需要其他库才能工作。因此，我们需要一个能够处理下载和安装包，以及管理它们依赖关系的工具。这就是\
    \ Composer 的用武之地；它做了所有这些，甚至更多。\n\n本章将涵盖几个关键问题：\n\n*   **安装**：下载和设置 Composer\n\
    *   **需求**：使用 `composer.json` 获取包\n*   **版本**：指定版本，以便在不破坏系统的情况下获取最新代码\n*   **Packagist**：配置代码以供公共访问\n\
    *   **私有仓库**：利用私有仓库使用 Composer\n\n# 什么是 Composer？\n\n严格来说，Composer 是一个依赖管理器，而不是包管理器。这似乎是因为它在本地处理组件关系，而不是像\
    \ Yum 和 Apt 那样集中处理。如果你认为这是一个过于细微的区别，你可能是对的。无论我们如何定义它，Composer 允许你指定包。它将包下载到本地目录（`vendor`），查找并下载所有依赖项，然后通过一个自动加载器使所有这些代码对你的项目可用。\n\
    \n和往常一样，我们需要从获取工具开始。\n\n# 安装 Composer\n\n你可以从 [`https://getcomposer.org/download/`](https://getcomposer.org/download/)\
    \ 下载 Composer。你会在那里找到一个安装程序机制，但 `phar` 文件应该能满足大多数用途：\n\n```\n$ wget https://getcomposer.org/download/1.2.0/composer.phar\
    \ .\n$ chmod 755 composer.phar\n$ sudo mv composer.phar /usr/bin/composer\n```\n\
    \n我下载了归档文件并运行 `chmod` 来确保它是可执行的。然后我把它复制到一个中心位置，这样我就可以从系统的任何地方轻松运行它。现在我可以测试这个命令了：\n\
    \n```\n$ composer --version\nComposer version 1.2.0 2016-07-19 01:28:52\n```\n\
    \n# 安装一个（一组）包\n\n我为什么要做那个带括号的花哨操作？因为包总会衍生出其他包——有时会衍生出很多包。\n\n不过，让我们从一个独立的库开始。假设我们正在构建一个需要与\
    \ Twitter 通信的应用程序。稍加研究，我找到了 `abraham/twitteroath` 包。为了安装它，我需要生成一个名为 `composer.json`\
    \ 的 JSON 文件，然后定义一个 `require` 元素：\n\n```\n{\n\"require\": {\n\"abraham/twitteroauth\"\
    : \"0.6.*\"\n}\n}\n```\n\n我开始时，目录除了 `composer.json` 文件外是空的。但是，一旦我运行 Composer 命令，我们就会看到变化：\n\
    \n```\n$ composer install\nLoading composer repositories with package information\n\
    Updating dependencies (including require-dev)\n- Installing abraham/twitteroauth\
    \ (0.6.4)\nDownloading: 100%\nWriting lock file\nGenerating autoload files\n```\n\
    \n那么生成了什么呢？让我们看看：\n\n```\n$ ls\ncomposer.json  composer.lock  vendor\n```\n\n\
    Composer 将包安装到 `vendor/` 中。它还会生成一个名为 `composer.lock` 的文件。这个文件指定了所有已安装包的精确版本。如果你使用版本控制，你应该提交这个文件。如果另一个开发者运行\
    \ `composer install` 并且 `composer.lock` 文件存在，那么她系统上安装的包版本将与指定版本完全相同。通过这种方式，团队可以保持同步，并且你可以确保生产环境与开发和测试环境完全匹配。你可以通过运行以下片段来覆盖锁定文件：\n\
    \n```\ncomposer update\n```\n\n这将生成一个新的锁文件。通常，你会运行此命令以保持与新的包版本同步（如果你像我所做的那样使用了通配符或范围）。\n\
    \n# 从命令行安装包\n\n如你所见，我可以使用编辑器创建 `composer.json` 文件。但你也可以让 Composer 为你做这件事。如果你需要从一个单一包开始，这尤其有用。当你在命令行上调用\
    \ `composer require` 时，Composer 会下载指定的包并将其安装到 `vendor/` 中。它还会生成一个 `composer.json`\
    \ 文件，然后你可以编辑和扩展该文件：\n\n```\n$ composer require abraham/twitteroauth\nUsing version\
    \ ⁰.6.4 for abraham/twitteroauth\n./composer.json has been created\nLoading composer\
    \ repositories with package information\nUpdating dependencies (including require-dev)\n\
    - Installing abraham/twitteroauth (0.6.4)\nLoading from cache\nWriting lock file\n\
    Generating autoload files\n```"
- fmt: "Composer is designed to support semantic versioning. In essence, this involves\
    \ defining a package’s version with three numbers, separated by dots: major, minor,\
    \ and patch. If you fix a bug, add no functionality, and do not break backwards\
    \ compatibility, you should increment the patch number. If you add new functionality,\
    \ but do not break backwards compatibility, you should increment the middle minor\
    \ number. If your new version breaks backwards compatibility (in other words,\
    \ if client code would break if this new version were suddenly switched in), then\
    \ you should increment the first major version number.\n\n> **Note**\n> You can\
    \ read more about the semantic versioning convention at [`https://semver.org`](https://semver.org).\n\
    \nYou should bear this in mind when specifying versions in your `composer.json`\
    \ file: if you are too liberal in your ranges or wild cards, you may find that\
    \ your system breaks on update.\n\nTable 16-1 shows some of the ways that you\
    \ can specify versions with Composer.\n\n**Table 16-1. Composer and Package Versions**\n\
    \n| Type | Example | Notes |\n| :--- | :--- | :--- |\n| Exact | `1.2.2` | Only\
    \ install the given version |\n| Wildcard | `1.2.*` | Install the exact specified\
    \ numbers, but find latest available version matching the wildcard |\n| Range\
    \ | `1.0.0 - 1.1.7` | Install a version no lower than the first number and no\
    \ higher than the last number |\n| Comparison | `>1.2.0 <=1.2.2` | Use `<`, `<=`,\
    \ `>`, and `>=` to specify complex ranges. You can combine these directives with\
    \ a space (equivalent to “and”) or with `\\|\\|` to specify “or”. |\n| Tilde (major\
    \ version) | `~1.3` | The given number is the minimum, and the final number specified\
    \ can increase. So for `~1.3`, `1.3` is the minimum and there can be no match\
    \ at `2.0.0` or above |\n| Caret | `^1.3` | Will match up to, but not including,\
    \ the next breaking change. So while `~1.3.1` will not match at 1.4 and above,\
    \ `^1.3.1` will match from 1.3.1 up to, but not including, 2.0.0. This is generally\
    \ the most useful shortcut |\n\n### `require-dev`\n\nVery often you need packages\
    \ during development that are unnecessary in a production context. You will want\
    \ to run tests locally, for example, but you are unlikely to need PHPUnit available\
    \ on your public site.\n\nComposer addresses this by supporting a separate `require-dev`\
    \ element. You can add packages here, just as you can for the `require` element:\n\
    \n```json\n{\n  \"require-dev\": {\n    \"phpunit/phpunit\": \"*\"\n  },\n  \"\
    require\": {\n    \"abraham/twitteroauth\": \"0.6.*\",\n    \"ext-xml\": \"*\"\
    \n  }\n}\n```\n\nNow, when we run `composer install`, PHPUnit and all sorts of\
    \ dependent packages are downloaded and installed:\n\n```\n$ composer install\n\
    Loading composer repositories with package information\nUpdating dependencies\
    \ (including require-dev)\n- Installing abraham/twitteroauth (0.6.4)\nLoading\
    \ from cache\n- Installing symfony/yaml (v3.1.3)\nDownloading: 100%\n- Installing\
    \ sebastian/version (2.0.0)\nDownloading: 100%\n....\n- Installing phpspec/prophecy\
    \ (v1.6.1)\nDownloading: 100%\n- Installing myclabs/deep-copy (1.5.1)\nLoading\
    \ from cache\n- Installing phpunit/phpunit (5.5.0)\nDownloading: 100%\nsebastian/global-state\
    \ suggests installing ext-uopz (*)\nphpunit/phpunit-mock-objects suggests installing\
    \ ext-soap (*)\nphpunit/php-code-coverage suggests installing ext-xdebug (>=2.4.0)\n\
    phpunit/phpunit suggests installing phpunit/php-invoker (~1.1)\nWriting lock file\n\
    Generating autoload files\n```\n\nIf you’re installing in a production context,\
    \ however, you can pass the `--no-dev` flag to `composer install`, and Composer\
    \ will download only those packages specified in the `require` element:\n\n```\n\
    $ composer install --no-dev\nLoading composer repositories with package information\n\
    Updating dependencies\n- Installing abraham/twitteroauth (0.6.4)\nLoading from\
    \ cache\nWriting lock file\nGenerating autoload files\n```\n\n> **Note**\n> When\
    \ you run the `composer install` command, Composer creates a file named `composer.lock`.\
    \ This records the exact version of every file you installed under `vendor/`.\
    \ If you run `composer install` with a `composer.lock` file present alongside\
    \ `composer.json`, Composer will fetch the package versions it has recorded if\
    \ they are not present. This is useful because you can commit a `composer.lock`\
    \ file to your version-control repository and be sure that your team will download\
    \ the same versions of all the packages you have installed. If you need to override\
    \ `composer.lock`, either to get the latest versions of packages or because you\
    \ have changed `composer.json`, you should run `composer update` to override the\
    \ lock file.\n\n### Composer and Autoload\n\nWe covered autoloading in some detail\
    \ in Chapter 15. For the sake of completeness however, it is worth looking at\
    \ it briefly. Composer generates a file named `autoload.php`, which handles class\
    \ loading for the packages it downloads. You can also leverage this functionality\
    \ for your own code by including `autoload.php` (usually with `require_once()`).\
    \ Once you have done this, any class you declare in your system will be found\
    \ automatically when accessed in your code, so long as your directories and filenames\
    \ mirror your namespaces and class names.\n\nIn other words, a class named `popp5/megaquiz/command/CommandContext`\
    \ must be placed in a file named `CommandContext.php` in the `popp5/megaquiz/command/`\
    \ directory.\n\nIf you want to mix things up (perhaps by omitting a redundant\
    \ leading directory or two, or by adding a test directory to the search path),\
    \ then you can use the `autoload` element to map a namespace to your file structure,\
    \ like this:\n\n```json\n\"autoload\": {\n  \"psr-4\": {\n    \"popp5\\\\megaquiz\\\
    \\\": [\"src\", \"test\"]\n  }\n}\n```\n\nNow, so long as `autoload.php` is included,\
    \ my classes are easily discoverable. Thanks to my `autoload` configuration, the\
    \ `popp5/megaquiz/command/CommandContext` class will now be found in `src/command/CommandContext.php`.\
    \ Not only that, but because I have referenced more than one target (`test` as\
    \ well as `src`), I can also create test classes that belong to the `popp5\\megaquiz\\\
    ` namespace under the `test/` directory.\n\nTurn to the “PSR-4 Autoloading” section\
    \ in Chapter 15 to follow a more in-depth example.\n\n### Creating Your Own Package\n\
    \nIf you have worked with PEAR in the past, you might expect a section on creating\
    \ a package here to involve an entirely new package file. In fact, we’ve already\
    \ been creating a package throughout this chapter. We just have to add some more\
    \ information, and then find a way to make our code available to others.\n\n####\
    \ Adding Package Information\n\nYou really do not have to add that much information\
    \ to make a viable package, but you absolutely need a `name`, so that your package\
    \ can be found. I’m also going to include the `description` and `authors` elements,\
    \ as well as to create a fake product named `megaquiz` which you will find popping\
    \ up in other chapters occasionally:\n\n```json\n\"name\": \"popp5/megaquiz\"\
    ,\n\"description\": \"a truly mega quiz\",\n\"authors\": [\n  {\n    \"name\"\
    : \"matt zandstra\",\n    \"email\": \"matt@getinstance.com\"\n  }\n],\n```\n\n\
    These fields should be mostly self-explanatory. The exception might be that leading\
    \ namespace—`popp5`, in this case—which is separated from the actual package name\
    \ by a forward slash. This is known as the vendor name. As you might expect, the\
    \ vendor name becomes a top-level directory under `vendor/` when your package\
    \ is installed. This is often the organization name used by the package owner\
    \ in Github or Bitbucket.\n\nWith all that in place, you are ready to commit your\
    \ package to your version control host of choice. If you’re not sure what that\
    \ involves, you can learn a lot more about this subject in Chapter 17."
  raw: "Composer is designed to support semantic versioning. In essence, this\ninvolves\
    \ defining a package’s version with three numbers, separated by\ndots: major,\
    \ minor, and patch. If you fix a bug, add no\nfunctionality, and do not break\
    \ backwards compatibility, you should\nincrement the patch number. If\nyou add\
    \ new functionality, but do not break backwards compatibility, you\nshould increment\
    \ the middle minor number. If your new version\nbreaks backwards compatibility\
    \ (in other words, if client code would\nbreak if this new version were suddenly\
    \ switched in), then you should\nincrement the first major\nversion number.\n\n\
    Note\n\nYou can read more about the semantic versioning convention at [`https://semver.org`](https://semver.org)\
    \ .\n\nYou should bear this in mind when specifying versions in your `composer.json`\
    \ file:\nif you are too liberal in your ranges or wild cards, you may find that\n\
    your system breaks on update.\n\nTable [16-1](#A314621_5_En_16_Chapter.html#Tab1)\
    \ shows some of\nthe ways that you can specify versions with Composer.\n\nTable\
    \ 16-1.\n\nComposer and Package Versions\n\nType\n |\n  Example\n |\n  Notes\n\
    \ |\n\n| --- | --- | --- | --- | --- | --- | --- |\n\nExact\n |\n  1.2.2\n |\n\
    \  Only install the given version\n |\n\nWildcard\n |\n  1.2.*\n |\n  Install\
    \ the exact specified numbers, but find latest available version\nmatching the\
    \ wildcard\n |\n\nRange\n |\n  1.0.0 - 1.1.7\n |\n  Install a version no lower\
    \ than the first number and no higher than the\nlast number\n |\n\nComparison\n\
    \ |\n  >1.2.0 <=1.2.2\n |\n  Use `<`, `<=`, `>`, and `>=` to specify\ncomplex\
