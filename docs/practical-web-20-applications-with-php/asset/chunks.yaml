    Required Methods


    Because the functionality we are implementing is somewhat complex, there are a
    large number of methods we need to create. Here is a list of each of the methods
    we will create in BlogLocationManager, including the arguments passed and a brief
    description of what the method does:


    • initialize(container, form): This sets up the class and links the add location
    form to the map by observing the necessary events.


    • loadMap(): This creates the actual map and displays it once the page has loaded.


    Additionally, it will initiate the request to fetch all existing locations for
    the current blog post.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch13CMP3 11/15/07 8:20 AM Page 494


    **494**


    C H A P T E R 1 3 ■ I N T E G R AT I N G G O O G L E M A P S


    • zoomAndCenterMap(): This automatically zooms the map in as far as possible to
    display all of the locations. This will be called when the map is initially loaded
    and also when a new location is added. If there are no locations to work with,
    the map will show the entire earth.


    • addMarkerToMap(location_id, lat, lng, desc): This adds a marker to the map based
    on the arguments. This includes creating an information window that displays a
    delete button. If a marker with the given location_id already exists, then the
    existing marker is removed, and the new one is added.


    • removeMarkerFromMap(location_id): This removes a marker from the map based on
    the first argument. If the marker doesn’t exist, then nothing happens.


    • hasMarker(id): This checks whether a marker exists for the given location ID.


    • loadLocationsSuccess(transport): This handles the response from the Ajax request
    to retrieve locations (called when the map is first shown). This loops over each
    returned location and adds it to the map with addMarkerToMap().


    • onFormSubmit(e): This is the event handler for when the form to add a new location
    is submitted. This will initiate a request to the geocoder.


    • createPoint(locations): This handles the response from the geocoder by submitting
    the first match back to the server using Ajax to save it to the database.


    • createPointSuccess(transport): This handles the response from the Ajax request
    to save the point. If the point was successfully saved, this will then call addMarkerToMap()
    to display the new point on the map.


    • dragComplete(marker): This is called after a marker has been dragged and dropped
    to a new location. We initiate the Ajax request to save the new coordinates (the
    move action) to the database.


    • onDragCompleteSuccess(transport): This handles the response from the Ajax request
    to save a dragged marker’s new location. This method expects to receive the latitude
    and longitude of the point so it can be replotted. This means if for some reason
    the new coordinates were not saved, the point will revert to the location saved
    in the database.


    • onRemoveMarker(e): This is the event handler called when the remove location
    button is clicked on a marker’s information window. This will initiate the Ajax
    request to delete the location from the database.


    • onRemoveMarkerSuccess(transport): This is called after the Ajax request to delete
    a location from the database successfully returns. This function will remove the
    marker from the map.


    • unloadMap(): Just like in the previous version of this class, this is responsible
    for cleaning up the map. This involves calling the google.maps.Unload() API function.


