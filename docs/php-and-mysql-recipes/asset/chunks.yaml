    \ 等。所有这些都存储在 `$properties` 数组中，其值由 `__get()` 和 `__set()` 魔术方法处理。代码允许添加任何属性，但对\
    \ `wheels` 和 `seats` 提供了特殊处理。如果设置的值超出有效范围，代码将使用 `trigger_error()` 函数打印一条通知。该属性不会被设置，但代码会继续执行。\n\
    \n## 配方 2-12. 序列化类型与对象\n\n### 问题\n\n序列化 PHP 变量用于将整数、字符串和数组转换为字符串表示形式，该形式可以写入文件或数据库，并在之后检索并反序列化以恢复其原始值。\n\
    \n序列化对象稍微复杂一些，因为它们可能包含对资源的连接以及其他在序列化和反序列化时需要特殊处理的值。\n\n### 解决方案\n\n当对对象使用 `serialize()`\
    \ 和 `unserialize()` 函数时，可能需要对对象执行特殊操作，以正确处理成员变量的初始化。在此上下文中会用到 `__sleep()` 和 `__wakeup()`\
    \ 方法。当对象被序列化时，如果存在 `__sleep()` 函数，它会被调用。该函数应返回一个包含应被序列化的成员变量名称的数组。\n\n当使用 `unserialize()`\
    \ 函数重新创建对象时，会调用 `__wakeup()` 函数。这可用于处理诸如断开和重新连接数据库之类的操作，或是进行其他形式的清理和初始化，以确保对象的正确使用。\n\
    \n### 工作原理\n\n以下示例展示了一个数据库类的对象实例如何被序列化和反序列化。\n\n创建对象时，构造函数的参数存储在私有变量中，并建立与数据库的连接。序列化对象时，`__sleep()`\
    \ 函数会返回三个私有变量的名称；反序列化时，`__wakeup()` 函数会自动重新连接到同一个数据库。\n\n```php\n<?php\n// 2_18.php\n\
    \nclass Database {\n    protected $pdo;\n    private $dsn, $username, $password;\n\
    \n    public function __construct($dsn, $username, $password) {\n        $this->dsn\
    \ = $dsn;\n        $this->username = $username;\n        $this->password = $password;\n\
    \        $this->connect();\n    }\n\n    private function connect() {\n      \
    \  $this->pdo = new PDO($this->dsn, $this->username, $this->password);\n    }\n\
    \n    public function __sleep() {\n        return array('dsn', 'username', 'password');\n\
    \    }\n\n    public function __wakeup() {\n        $this->connect();\n    }\n\
    }\n\n$db = new Database('sqlite:mydb', 'user', 'password');\n$a = serialize($db);\n\
    echo $a;\n```\n\n该脚本将输出一行描述序列化对象的内容：`O:8:\"Database\":3:{s:13:\"Databasedsn\"\
    ;s:11:\"sqlite:mydb\";s:18:\"Databaseusername\"; s:4:\"user\";s:18:\"Databasepassword\"\
    ;s:8:\"password\";}`\n\n## 配方 2-13. 复制对象\n\n### 问题\n\n如果通过使用 `new` 运算符实例化类来创建对象，然后将其分配给第二个变量，PHP\
    \ 只会创建对该对象的引用，而不是复制该对象。操作存储在第一个变量中的对象也会影响存储在第二个变量中的对象，因为它们都引用同一个对象。\n\n### 解决方案\n\
    \n魔术函数 `__clone()` 用于对新创建的对象副本执行特殊操作。与任何魔术方法一样，这些方法不能直接调用，而是由特殊操作触发。\n"
- fmt: "# `__clone()` 方法\n\n当使用`clone`关键字创建对象时，会调用`__clone()`方法。与将对象赋值给一个新变量（这会创建对象的引用）相比，克隆对象可以提供对象的真正副本。\n\
    \n## 工作原理\n\n以下示例展示了将对象赋值给新变量与克隆对象之间的区别。\n\n```php\n<?php\n\n// 2_19.php\n\nclass\
    \ foo {\n\n    public $a = 5;\n\n}\n\n$b = new foo();\n\n$c = $b;\n\n$c->a++;\n\
    \necho $b->a . \"\\n\";\n\n$d = clone $b;\n\n$d->a++;\n\necho $b->a . \"\\n\"\
    ;\n\necho $d->a . \"\\n\";\n```\n\n在第一部分中，对象`$b`被赋值给一个新变量，成员变量`a`增加了1。这导致`$b->a`和`$c->a`都变为6，因为变量`$b`和`$c`引用的是同一个对象。\n\
    \n在第二部分中，对象`$b`被克隆并存储在变量`$d`中。修改`$d`中成员变量`a`的值不会影响`$b`中`a`的值，因为`$b`和`$d`引用的是两个不同的对象。此操作没有使用`__clone()`方法。添加这个魔术方法可以在对象被克隆后对其执行操作，如下所示：\n\
    \n```php\n<?php\n\n// 2_20.php\n\nclass foo {\n\n    public $a = 5;\n\n    function\
    \ __clone() {\n\n        $this->a = 0;\n\n    }\n\n}\n\n$b = new foo();\n\n$c\
    \ = $b;\n\n$c->a++;\n\necho $b->a . \"\\n\";\n\n$d = clone $b;\n\n$d->a++;\n\n\
    echo $b->a . \"\\n\";\n\necho $d->a . \"\\n\";\n```\n\n现在，在复制所有成员变量后，代码会调用`__clone()`方法。因此，在克隆后，`$d`的成员`a`会被设置为0，然后递增为1，并且仍然不会影响原始对象。\n\
    \n# 配方 2-14：将对象用作函数\n\n## 问题\n\nPHP支持可变函数名。这使得可以将函数名存储在字符串`$a = \"MyFunction\"\
    ;`中，并通过`$a();`语法执行该函数。如果该变量包含一个对象，PHP将生成运行时错误。\n\n## 解决方案\n\n在类上定义魔术方法`__invoke()`将导致该对象在作为函数使用时执行该方法。\n\
    \n## 工作原理\n\n在下面的示例中，当对象作为函数被调用时，它将对其自身使用`var_dump()`函数。\n\n```php\n<?php\n\n\
    // 2_21.php\n\nclass foo {\n\n    private $a = 5;\n\n    function __invoke() {\n\
    \n        var_dump($this);\n\n    }\n\n}\n\n$a = new foo();\n\n$a();\n```\n\n\
    该脚本的输出如下：\n\n```\nobject(foo)#1 (1) {\n  [\"a\":\"foo\":private]=>\n  int(5)\n\
    }\n```\n\n# 配方 2-15：方法重载\n\n## 问题\n\nPHP不支持像其他语言那样的方法重载——即同一个方法名在同一个类中可以使用多次，但参数列表不同。\n\
    \n## 解决方案\n\n与变量或属性可以通过`__get()`和`__set()`魔术方法进行重载的方式相同，方法也可以被重载。这通过`__call()`和`__callStatic()`来实现。\n\
    \n如果定义了这些函数，并且使用对象来调用一个不存在的成员函数，则会调用这些函数之一。如果该成员在对象上下文中被调用，将使用`__call()`；当该方法在静态上下文中被调用时，将使用`__callStatic()`。以下示例展示了如何实现方法重载。它还演示了重载方法的方法名将按原样处理（区分大小写），而不是像普通函数和方法那样通常作为不区分大小写的名称处理。\n\
    \n## 工作原理\n\n在下一个示例中，我们创建了一个名为`MethodOverload`的类，并定义了处理方法重载的函数。\n\n```php\n<?php\n\
    \n// 2_22.php\n\nclass MethodOverload {\n\n    private function call($name, $param,\
    \ $context) {\n\n        switch ($name) {\n\n            case 'f1' :\n\n     \
    \       case 'f2' :\n\n                echo \"You called $name in $context context\\\
    n\";\n\n                break;\n\n            default :\n\n                trigger_error(\"\
    Undefined method '$name'\", E_USER_NOTICE);\n\n                break;\n\n    \
    \    }\n\n    }\n\n    function __call($name, $param) {\n\n        $this->call($name,\
    \ $param, 'object');\n\n    }\n\n    static function __callStatic($name, $params)\
    \ {\n\n        self::call($name, $param, 'static');\n\n    }\n\n    static function\
    \ abc() {\n\n        echo \"abc() called\\n\";\n\n    }\n\n}\n\n$a = new MethodOverload();\n\
    \n$a->f1();\n\nMethodOverload::f2();\n\nMethodOverload::F2();\n\nMethodOverload::ABC();\n\
    ```"
  raw: 'The __clone() method is called when an object is created with the use of the
    clone keyword. Cloning the object provides a true copy of the object compared
    to assigning the object to a new variable, which will produce a reference to the
    object.


    How it Works


    The next example shows the difference between assigning an object to a new variable
    and cloning the object.


    <?php


    // 2_19.php


    class foo {


    public $a = 5;


    }


    $b = new foo();


    $c = $b;


    $c->a++;


    echo $b->a . "\n";


    $d = clone $b;


    $d->a++;


    echo $b->a . "\n";


    echo $d->a . "\n";


    In the first part the object $b is assigned to a new variable and the member variable
    a is incremented by 1\. This will cause both $b->a and $c->a to become 6 as both
    variables $b and $c references the same object.


    In the second part the object $b is cloned and stored in the variable $d . Changing
    the values of the member variable a in $d will not affect the value of a in $b
    as $b and $d are referencing two different objects. This was done without the
    use of the __clone() method. Adding this magic method will make it possible to
    perform actions on the object () after it is cloned, as shown next:


    <?php


    // 2_20.php


    class foo {


    public $a = 5;


    CHAPTER 2 ■ CLASSES AND OBJECTS


    function __clone() {


    $this->a = 0;


    }


    }


    $b = new foo();


    $c = $b;


    $c->a++;


    echo $b->a . "\n";


    $d = clone $b;


    $d->a++;


    echo $b->a . "\n";


    echo $d->a . "\n";


    Now the code will call the __clone() method after all the member variables are
    copied so in the case the member of a of $d will be set to 0 after the clone and
    then incremented to 1, and there is still no effect on the original object.


    Recipe 2-14\. Using Objects as Functions


    Problem


    PHP supports the use of variable function names. This makes it possible to store
    the name of a function in a string $a = "MyFunction"; and have the function executed
    with the $a(); syntax. If the variable contains an object PHP will generate a
    runtime error.


    Solution


    Defining the magic method __invoke() on a class will cause that method to be executed
    when the object is used as a function.


    How it Works


    In the example below the object will use the var_dump() function on itself when
    invoked as a function.


    <?php


    // 2_21.php


    class foo {


    private $a = 5;


    function __invoke() {


    var_dump($this);


    }


    }


    $a = new foo();


    $a();


    CHAPTER 2 ■ CLASSES AND OBJECTS


    The output of this script looks like this:


    object(foo)#1 (1) {


    ["a":"foo":private]=>


    int(5)


    }


    Recipe 2-15\. Overloading Methods


    Problem


    PHP does not support method overloading the same way as other languages where
    the same method name can be used multiple times in the same class but with a different
    argument list.


    Solution


    The same way as variables or properties can be overloaded with the __get() and
    __set() magic methods it’s also possible to overload methods. This is done with
    __call() and __callStatic() .


    If these functions are defined and an object is used to call a nonexisting member
    function one of these will be called instead. If the member is called in the object
    context __call() will be used and __callStatic() will be used when the method
    is called in the static context. The following example shows how the method overload
    can be implemented. It also demonstrates that the method names of overloaded methods
    will be handled as is (case sensitive) and not like functions and methods normally
    act as case insensitive names.


    How it Works


    In the next example we create a class called MethodOverload and define the functions
    to handle method overloading.


    <?php


    // 2_22.php


    class MethodOverload {


    private function call($name, $param, $context) {


    switch ($name) {


    case ''f1'' :


    case ''f2'' :


    echo "You called $name in $context context\n";


    break;


    default :


    trigger_error("Undefined method ''$name''", E_USER_NOTICE);


    break;


    }


    }


    function __call($name, $param) {


    $this->call($name, $param, ''object'');


    CHAPTER 2 ■ CLASSES AND OBJECTS


    }


    static function __callStatic($name, $params) {


    self::call($name, $param, ''static'');


    }


    static function abc() {


    echo "abc() called\n";


    }


    }


    $a = new MethodOverload();


    $a->f1();


    MethodOverload::f2();


    MethodOverload::F2();


    MethodOverload::ABC();'
