- fmt: '# Chapter 1: Starting an E-Commerce Site


    `648XCH01.qxd` 10/4/06 6:16 PM Page 5


    **5**


    ...send out updates and news. More sophisticated sites can automatically analyze
    a customer''s buying habits to make suggestions on other products the customer
    might like to buy.


    Another related benefit of e-commerce is that there''s no real cost in having
    people browse without buying. In fact, getting people to visit the site as often
    as possible can be valuable. You should consider building features into the site
    that are designed purely to make people visit regularly; for example, you might
    include community features such as forums or free content related to the products
    you''re selling.


    ## Reduce the Costs of Fulfilling Orders


    A well-built e-commerce site will be much cheaper to run than a comparable offline
    business.


    Under conventional business models, a staff member must feed an order into the
    company''s order-processing system. With e-commerce, the customer can do this
    for you—the gateway between the site and the order processing can be seamless.


    Of course, after your e-commerce site is up and running, the cost of actually
    taking orders gets close to zero—you don''t need to pay for checkout staff, assistants,
    security guards, or rent in a busy shopping mall.


    If you have a sound business idea, and you execute the site well, you can receive
    these benefits without a massive investment. What''s important is to always focus
    on the almighty dollar: Will your site, or any particular feature of it, really
    help you get more customers, get customers to spend more, or reduce the costs
    and therefore increase your margins?


    Now it''s time to introduce the site we''ll be using as the example in this book,
    and see just how all of these principles relate to our own shop.


    ## Let''s Make Money


    We''re going to build an e-commerce store that sells hats. On all the e-commerce
    sites we''ve worked on, there''s always been a trade-off to make between building
    an amazing site that everybody will love and creating a site on a limited budget
    that will make money. Usually, I''m on the trigger-happy, really amazing site
    side, but I''m always grateful that my ambitions are reined in by the actual business
    demands. If you''re designing and building the site for yourself and you are the
    client, then you have a challenge—keeping your view realistic while maintaining
    your enthusiasm for the project.


    This book shows you a logical way to build an e-commerce site that will deliver
    what it needs to be profitable. However, when designing your own site, you need
    to think carefully about exactly who your customers are, what they need, how they
    want to place orders, and what they are most likely to buy. Most important, you
    need to think about how they will come to your site in the first place. You should
    consider the following points before you start to visualize or design the site
    and certainly before you start programming:


    - **Getting customers**: How will you get visitors to the site in the first place?

    - **Offering products**: What will you offer, and how will you expect customers
    to buy? Will they buy in bulk? Will they make a lot of repeat orders? Will they
    know what they want before they visit, or will they want to be inspired? These
    factors will influence how you arrange your catalog and searching as well as what
    order process you use. A shopping basket is great if people want to browse. If
    people know exactly what they want, then they might prefer something more like
    an order form.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    `648XCH01.qxd` 10/4/06 6:16 PM Page 6


    **6**


    ## Processing Orders


    **Processing orders**: How will you turn a customer order into a parcel ready
    for mailing?


    Your main consideration here is finding an efficient way to process payments and
    deliver orders to whoever manages your stock or warehouse. How will you give your
    customers confidence in your ability to protect their data and deliver their purchases
    on time?'
