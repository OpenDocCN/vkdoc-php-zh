    \    }\n    return false;\n}\n```\n\n对于错误级别 1 和 2 的消息部分，由一个名为 `getMaxSize()` 的方法生成，该方法将\
    \ `$max` 的值从字节转换为千字节。稍后你将定义 `getMaxSize()`。\n\n只有前四个错误级别有描述性消息。`default` 关键字捕获其他错误级别（包括未来可能添加的任何级别），并添加一个通用原因。\n\
    \n`checkSize()` 方法如下所示：\n\n```php\nprotected function checkSize($file) {\n   \
    \ if ($file['error'] == 1 || $file['error'] == 2 ) {\n        return false;\n\
    \    } elseif ($file['size'] == 0) {\n        $this->messages[] = $file['name']\
    \ . ' 是一个空文件。';\n        return false;\n    } elseif ($file['size'] > $this->max)\
    \ {\n        $this->messages[] = $file['name'] . ' 超过了文件的最大大小（' .\n          \
    \  $this->getMaxSize() . '）。';\n        return false;\n    }\n    return true;\n\
    }\n```\n\n条件语句首先检查错误级别。如果错误级别为 1 或 2，则表示文件过大，因此该方法直接返回 `false`。相应的错误消息已由 `getErrorLevel()`\
    \ 方法设置。\n\n下一个条件检查报告的大小是否为零。虽然这种情况发生在文件过大或未选择文件时，但这些情况已被 `getErrorLevel()` 方法覆盖。因此，这里假设文件是空的。\n\
    \n接下来，将报告的大小与存储在 `$max` 属性中的值进行比较。尽管过大的文件应该触发错误级别 2，但你还是需要进行比较，以防用户设法绕过了 `MAX_FILE_SIZE`。错误消息同样使用\
    \ `getMaxSize()` 来显示最大大小。\n\n如果大小符合要求，该方法返回 `true`。\n\n第三个测试检查 MIME 类型。将以下代码添加到类定义中：\n\
    \n```php\nprotected function checkType($file) {\n    if (!in_array($file['type'],\
    \ $this->permitted)) {\n        $this->messages[] = $file['name'] . ' 不是允许的文件类型。';\n\
    \        return false;\n    }\n    return true;\n}\n```\n\n条件语句使用 `in_array()`\
    \ 函数与逻辑非运算符，将 `$_FILES` 数组报告的类型与存储在 `$permitted` 属性中的数组进行比较。如果该类型不在数组中，则将拒绝原因添加到\
    \ `$messages` 数组中，并且该方法返回 `false`。否则，返回 `true`。\n\n`getErrorLevel()` 和 `checkSize()`\
    \ 方法所使用的 `getMaxSize()` 方法，将存储在 `$max` 中的原始字节数转换为更友好的格式。将以下定义添加到类文件中：\n\n```php\n\
    public function getMaxSize() {\n    return number_format($this->max/1024, 1) .\
    \ ' KB';\n}\n```\n\n这使用了 `number_format()` 函数，该函数通常接受两个参数：要格式化的值和希望数字保留的小数位数。第一个参数是\
    \ `$this->max/1024`，它将 `$max` 除以 1024（一 KB 的字节数）。第二个参数是 1，因此数字被格式化为保留一位小数。末尾的\
    \ `. ' KB'` 将“KB”连接到格式化后的数字。\n\n`getMaxSize()` 方法被声明为 public，以便你可以在使用 `Upload`\
    \ 类的脚本的其他部分显示该值。\n\n保存 `Upload.php`，并用 `file_upload.php` 再次测试。对于小于 50 KB 的图片，其行为与之前相同。但如果你尝试上传一个既过大又具有错误\
    \ MIME 类型的文件，你将得到类似于图 9-5 的结果。\n\n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig5_HTML.jpg](img/332054_4_En_9_Fig5_HTML.jpg)\n\
    \n**图 9-5.** 该类现在会报告无效大小和 MIME 类型的错误\n\n你可以对照 `ch09/PhpSolutions/File` 文件夹中的 `Upload_02.php`\
    \ 检查你的代码。\n\n## 更改受保护的属性\n\n`$permitted` 属性只允许上传图片，而 `$max` 属性将文件限制为不超过 50 KB，但这些限制可能过于严格。无需每次有不同需求时都深入类定义文件进行修改，你可以向\
    \ `upload()` 方法添加可选参数，以便动态更改受保护的属性。\n\n### PHP 解决方案 9-4：允许上传不同类型和大小\n\n本 PHP 解决方案向你展示如何允许上传其他类型的文件，并更改允许的最大大小。\n\
    \n继续使用上一个 PHP 解决方案中的 `Upload.php`。或者，使用 `ch09/PhpSolutions/File` 文件夹中的 `Upload_02.php`。\n\
    \n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig6_HTML.jpg](img/332054_4_En_9_Fig6_HTML.jpg)\n\
    \n**图 9-6.** 大小限制生效，但检查 MIME 类型时出现错误\n\n为了使 `Upload` 类更加灵活，向 `upload()` 方法签名中添加两个可选参数，如下所示：\n\
    \n```php\npublic function upload($fieldname, $size = null, array $mime = null)\
    \ {\n```\n\n这两个参数默认都设置为 `null`，因此只有当调用 `upload()` 方法时为它们赋值时，才会改变可接受的文件大小和 MIME\
    \ 类型。我决定按此顺序放置它们，因为我认为更改可接受大小的需求可能比添加额外 MIME 类型更常见。\n\n`$mime` 参数之前有一个 `array`\
    \ 类型声明，因此即使只添加一种 MIME 类型，它也需要是一个单元素数组，而不是字符串。"
- fmt: '2. 编辑`upload()`方法，添加两个条件语句，以便在用到第二和第三参数时更新`$max`和`$permitted`属性。新代码需要放在`checkFile()`方法调用之前，因为需要在执行之前PHP解决方案中定义的检查之前，更新`$max`和`$permitted`的值。更新后的方法定义如下：


    ```

    public function upload($fieldname, $size = null, array $mime = null) {

    $uploaded = $_FILES[$fieldname];

    if (!is_null($size) && $size > 0) {

    $this->max = (int) $size;

    }

    if (!is_null($mime)) {

    $this->permitted = array_merge($this->permitted, $mime);

    }

