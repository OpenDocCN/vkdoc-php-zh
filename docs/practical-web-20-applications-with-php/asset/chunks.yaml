    **Creating the Form Processor for User Registration**


    In order to keep the code that is responsible for processing the user registration
    form separate from other parts of the application (such as the account controller
    that displays the registration form), we will create a class called FormProcessor_UserRegistration.
    This class will extend from FormProcessor, another utility class (available in
    the book’s code base in


    ./include/FormProcessor.php) that I wrote to aid in my own web application development.


    The FormProcessor class is fairly simple and doesn’t do anything aside from hold
    the form values you tell it to, and hold form error messages that you can display.


    The Initial FormProcessor_UserRegistration Class


    To extend FormProcessor, all we need to do is implement the *abstract* function
    process(), which accepts a Zend_Controller_Request_Abstract object as an argument
    and returns true if the form was successfully processed or false if an error occurred.
    The instance of Zend_


    Controller_Request_Abstract is an object generated by Zend_Controller_Front, which
    holds all data relating to the current request, such as get and post data.


    ■**Note** In actual fact, the instance of Zend_Controller_Request_Abstract is
    an instance of Zend_


    Controller_Request_Http that we will eventually pass to process(). The Zend_Controller_Request_


    Http class extends from Zend_Controller_Request_Abstract.


    As mentioned above, FormProcessor also provides methods for storing error messages:


    • addError($name, $message): Sets a new error message with the given name. If
    the error message already exists, that error name is assigned an array with multiple
    messages.


    • hasError($name): Checks whether an error message with the specified name has
    been set. By omitting the $name parameter, this method can also be used to check
    whether any errors have been set at all.


    • getError($name): Retrieves the error message for the given name. If no corresponding
    error message has been set, null is returned.


