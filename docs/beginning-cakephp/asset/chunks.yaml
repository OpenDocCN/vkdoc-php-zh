  trans: '

    请记住，Cake 框架遵循 MVC 方法：模型（Models）、视图（Views）和控制器（Controllers）。到目前为止，你已经熟悉了模型和控制器。将视图从其中分离出来，是为了更方便地处理输出。Cake
    将所有视图组织在 `app/views` 文件夹中。


    `views` 文件夹包含以下目录：


    *   `elements`

    *   `errors`

    *   `helpers`

    *   `layouts`

    *   `pages`

    *   `scaffolds`


    `layouts` 文件夹包含用于包裹应用程序的任何全局布局文件。你可以通过创建自己的默认布局，来替换 Cake 为脚手架、错误页面以及任何其他视图提供的默认布局。将名为
    `default.ctp` 的文件放入 `layouts` 文件夹中，会告知 Cake 应用此布局，而不是它自己的默认脚手架布局。由于这是一个布局文件，所有外围的
    HTML 代码都将应用于所有输出。


    ## 编写 `default.ctp` 文件


    创建 `app/views/layouts/default.ctp`，并在其中放入你自己的 HTML/CSS 代码。


    清单 5-1 展示了一个基本（且单调）的 HTML 布局，用以演示布局的工作方式。


    **清单 5-1.** *一个简单的默认布局*


    ```

    <html>

    <head>

    <title>我的 Cake 博客应用程序</title>

    <?=$html->css(‘styles’);?>

    </head>

    <body>

    <div id="container">

    <div id="content">

    <?=$content_for_layout;?>

    </div>

    </div>

    </body>

    </html>

    ```


    其中大部分是基本的 HTML 代码，它们会在浏览器窗口中显示一个名为“我的 Cake 博客应用程序”的标题，但除此之外没有其他作用。清单 5-1 的第 4
    行是一段 Cake 辅助函数代码，它会自动引入名为 `styles.css` 的 CSS 文件（你稍后将创建这个文件）。


    清单 5-1 的第 9 行是 Cake 中任何布局文件的关键所在。它是一个字符串，告诉 Cake 将所有的视图内容放在何处。当你启动任何未指定其他布局文件的控制器时，默认情况下，Cake
    现在会将 `$content_for_layout` 替换为你通过控制器、模型和视图生成的任何输出。


    ## 为布局创建样式表


    公共文件，或者你向普通网络用户提供的文件，如图片、JavaScript 文件和样式表，都存储在 `app/webroot` 文件夹中。默认情况下，此文件夹包含
    CSS 文件、脚本、图片和其他公共资源的占位符。在生产环境中，`app/webroot` 通常会作为文档根目录。无论如何，Cake 在链接到样式表、图片、JavaScript
    文件或其他公共资源文件时，都会在内部引用此目录。


    清单 5-1 的第 4 行是 Cake 辅助函数代码，它会为你生成一些 HTML 代码，此处是一个指向 CSS 文件的链接。这一行从 HTML 辅助函数中调用了
    `css()` 函数，该函数是 Cake 核心库的一部分，并将参数 `styles` 传递给该函数。HTML 辅助函数的 `css()` 函数知道要在 `app/webroot/css`
    文件夹中查找 `styles.css` 文件，并会为布局生成 `<link rel="stylesheet" type="text/css" href="/css/styles.css"
    />` 标签。


    通过使用 HTML 辅助函数来构建此链接，不仅减少了手动输入的代码量，而且还能确保无论你在何处运行 Cake 应用程序，该链接都不会因服务器设置不一致而失效。Cake
    还提供了更多辅助函数。使用它们可以显著减少应用程序中的代码量，尤其是在视图和布局中。


    到目前为止，`app/webroot/css` 目录中还没有 `styles.css` 文件。创建该文件，但将其保留为空。你应该会看到一个相当简单的博客应用程序视图（见图
    5-1）。


    **图 5-1.** *空白的样式表和简单的默认布局取代了脚手架布局和样式。*


    ![Image 27](img/index-79_1.png)

    ![Image 28](img/index-80_1.png)

