    **Managing User Records with DatabaseObject**


    DatabaseObject is a class I developed several years ago that I make heavy use
    of in nearly all of my PHP development tasks. It acts as an extra layer on top
    of a database connection, which makes reading, writing, and deleting rows from
    a database very simple. You can find the full DatabaseObject.php file in the ./include
    directory of the downloadable source code.


    Essentially, I extend the abstract DatabaseObject class for each major table in
    an application. So to manage records in the users table of our web application,
    we will create a class called DatabaseObject_User. Once we instantiate this class,
    we can then call the load() method to fetch a record from the database, use the
    save() method to either insert or update data in the database (depending on whether
    or not a record has already been loaded), and call delete() to delete a loaded
    record.


    ■**Note** When I first wrote DatabaseObject, neither PHP 5 nor the Zend Framework
    were out yet, but I have since updated this class to use PHP 5 and to work with
    the Zend_Db component. If you are not using Zend_Db, you will have to make appropriate
    changes.


    Instead of looking at the implementation details, we will take a look at the available
    functions and exactly how DatabaseObject can be used:


    • load(): Loads a record by performing a select query. Returns true if the record
    is loaded.


    • isSaved(): Returns true if a record has previously been loaded with load().


    • save(): Saves the current data to the database. If the record wasn’t previously
    loaded, an insert statement is used; otherwise the loaded record is updated with
    an SQL update.


    • delete(): If a record has been loaded, this function performs an SQL delete
    query.


    • getId(): Retrieves the database ID of a saved record.


    There are also a number of callbacks you can define, which are automatically called
    as required. The callbacks that can be defined are as follows:


    • postLoad(): Called after a record is successfully loaded. It could be used to
    load data from other tables as required.


    • preInsert(): Called prior to inserting a new record (note that in this case
    save() distinguishes inserts from updates). It could be used to set values dynamically
    (such as a timestamp recording the date of insert).


    • postInsert(): Called after a new record is saved. In the case of our users table,
    we will use this to send an e-mail to the new user.


    • preUpdate(): Called prior to an existing record being updated. It could be used
    to set values dynamically (such as a timestamp recording the date of update).


    • postUpdate(): Called after an existing record is updated.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


