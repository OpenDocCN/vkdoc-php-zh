    \n3.  直接在浏览器中加载`form.php`。它应该能正常加载并按预期工作。\n\n完成的版本位于`ch06`文件夹中的`form_end.php`。名为`bad_link_end.php`的文件链接到完成的版本，如果您只想测试脚本的话。\n\
    \n此技术涉及的代码比简单地将`$_SERVER['PHP_SELF']`传递给`htmlentities()`函数更多；但它的优势在于，如果用户点击了指向您表单的恶意链接，它能无缝地将用户引导至错误页面。显然，错误页面应该链接回您的主菜单。\n\
    \nPHP 解决方案 6-2：确保必填字段不为空\n\n当必填字段留空时，您不仅无法获得所需信息，而且用户可能永远收不到回复，尤其是在联系方式被省略的情况下。\n\
    \n继续使用本章前面“理解 post 和 get 之间的区别”中的文件。或者，使用`ch06`文件夹中的`contact_02.php`，并从文件名中移除`_02`。\n\
    \n1.  处理脚本使用两个数组：`$errors`和`$missing`，用于存储错误详情以及未填写的必填字段。这些数组将用于控制表单标签旁边错误消息的显示。页面首次加载时不应有任何错误，因此请在`contact.php`顶部的\
    \ PHP 代码块中将`$errors`和`$missing`初始化为空数组，如下所示：\n\n2.  仅当表单已提交时，电子邮件处理脚本才应运行。使用条件语句检查超全局变量`$_SERVER['REQUEST_METHOD']`的值。如果它是`POST`（全部大写），则表示表单已使用`post`方法提交。将以下以粗体显示的代码添加到页面顶部的\
    \ PHP 代码块中。\n\n提示：检查`$_SERVER['REQUEST_METHOD']`的值是否为`POST`是一个通用条件，可以用于任何表单，无论提交按钮的名称是什么。\n\
    \n1.  虽然您还不会实际发送电子邮件，但请定义两个变量来存储电子邮件的目标地址和主题行。以下代码放在上一步创建的条件语句内部：\n\n```\nif (\
    \ $_SERVER['REQUEST_METHOD'] == 'POST') {\n    // email processing script\n  \
    \  $to = 'david@example.com'; // use your own email address\n    $subject = 'Feedback\
    \ from Japan Journey';\n}\n```\n\n2.  接下来，创建两个数组：一个列出表单中每个字段的`name`属性，另一个列出所有*必填*字段。为了演示，将`email`字段设为可选，因此只有`name`和`comments`字段是必填的。在条件语句块内部，紧跟在定义主题行的代码之后添加以下代码：\n\
    \n```\n$subject = 'Feedback from Japan Journey';\n// list expected fields\n$expected\
    \ = ['name', 'email', 'comments'];\n// set required fields\n$required = ['name',\
    \ 'comments'];\n}\n```\n\n提示：为什么`$expected`数组是必需的？这是为了防止攻击者将其他变量注入到`$_POST`数组中，试图覆盖您的默认值。通过只处理您期望的变量，您的表单会安全得多。任何无关的值都会被忽略。\n\
    \n```"
- fmt: "1.  接下来的代码段不特定于该表单，因此应将其放入一个外部文件中，以便在任何邮件处理脚本中引用。创建一个新的PHP文件，命名为`processmail.php`，存放在`includes`文件夹中。然后在`contact.php`中，紧接上一步输入的代码之后引入它，如下所示：\n\
    \n    ```\n    $required = ['name', 'comments'];\n    require './includes/processmail.php';\n\
    \    }\n    ```\n\n2.  `processmail.php`中的代码首先检查`$_POST`变量中是否有必填字段留空。清除编辑器插入的任何默认代码，并将以下内容添加到`processmail.php`：\n\
    \n    ```\n     $value) {\n    // strip whitespace from $value if not an array\n\
    \    if (!is_array($value)) {\n    $value = trim($value);\n    }\n    if (!in_array($key,\
    \ $expected)) {\n    // ignore the value, it's not in $expected\n    continue;\n\
    \    }\n    if (in_array($key, $required) && empty($value)) {\n    // required\
    \ value is missing\n    $missing[] = $key;\n    $$key = \"\";\n    continue;\n\
    \    }\n    $$key = $value;\n    }\n    ```\n\n这个`foreach`循环通过去除文本字段的首尾空白，并将字段内容赋值给一个简化名称的变量来处理`$_POST`数组。因此，`$_POST['email']`变成了`$email`，依此类推。它还会检查必填字段是否留空，如果留空则将其添加到`$missing`数组中，并将相关变量设置为空字符串。\n\
    \n`$_POST`数组是一个关联数组，因此循环将当前元素的键和值分别赋值给`$key`和`$value`。循环开始使用`is_array()`函数和逻辑非运算符（`!`）检查当前值是否不是一个数组。如果不是，则使用`trim()`函数去除首尾空白，并将其重新赋值给`$value`。去除首尾空白可以防止有人通过多次按空格键来绕过必填字段的填写。\n\
    \n> **注意**\n> 当前表单只有文本输入字段，但后续会扩展为包含`<select>`和复选框元素，这些元素会以数组形式提交数据。之所以需要检查当前元素的值是否为数组，是因为将数组传递给`trim()`函数会触发错误。\n\
    \n下一个条件语句检查当前键是否不在`$expected`数组中。如果不在，`continue`关键字会强制循环停止处理当前元素并跳转到下一个元素。因此，所有不在`$expected`数组中的项都会被忽略。\n\
    \n接下来，我们检查当前数组键是否在`$required`数组中，并且它是否没有值。如果条件为真，则该键被添加到`$missing`数组中，并动态创建一个基于该键名的变量，其值设置为空字符串。请注意，在下面这行代码中，`$$key`以两个美元符号开头：\n\
    \n```\n$$key = \"\";\n```\n\n这意味着它是一个可变变量（参见第[4]章中的“动态创建新变量”）。因此，如果`$key`的值是“name”，那么`$$key`就变成了`$name`。同样，`continue`会使循环进入下一个元素。\n\
    \n但是，如果一直执行到循环的最后一行，我们就知道正在处理一个需要被处理的元素，因此会基于该键名动态创建一个变量，并将当前值赋给它。\n\n1.  保存`processmail.php`。稍后你还会向其中添加更多代码，但现在我们先转向`contact.php`的主体部分。表单起始标签中的`action`属性是空的。为本地测试目的，只需将其值设置为当前页面的名称：\n\
    \n2.  如果有任何字段缺失，你需要显示一条警告。在页面内容的顶部，`<h2>`标题和第一个段落之间添加一个条件语句，如下所示：\n\n    ```\n\
    \    Contact us\n\n    Please fix the item(s) indicated.\n\n    Ut enim ad minim\
    \ veniam . . . \n    ```\n\n    这会检查`$missing`和`$errors`，你在步骤1中将它们初始化为空数组。如第[4]章中的“PHP中的真值判断”所述，空数组被视为`false`，因此当页面首次加载时，条件语句内部的段落不会显示。然而，如果表单提交时某个必填字段未被填写，其名称会被添加到`$missing`数组中。包含至少一个元素的数组被视为`true`。`||`表示“或”，因此如果某个必填字段留空或发现错误，这个警告段落将会显示。（`$errors`数组将在PHP解决方案6-4中发挥作用。）\n\
    \n3.  为了确保到目前为止一切正常，保存`contact.php`并在浏览器中正常加载它（不要点击刷新按钮）。警告消息不会显示。在不填写任何字段的情况下点击“发送消息”。现在你应该能看到关于缺失项目的消息，如下图所示。\n\
    \n    ![../images/332054_4_En_6_Chapter/332054_4_En_6_Fige_HTML.jpg](images/332054_4_En_6_Chapter/332054_4_En_6_Fige_HTML.jpg)\n\
    \    ![../images/332054_4_En_6_Chapter/332054_4_En_6_Fig5_HTML.jpg](images/332054_4_En_6_Chapter/332054_4_En_6_Fig5_HTML.jpg)\n\
    \    **图6-5.** 通过验证用户输入，你可以显示关于必填字段的警告。\n\n1.  为了在每个缺失的必填字段旁边显示合适的消息，使用一个PHP条件语句在`<label>`标签内插入一个`<span>`，如下所示：\n\
    \n    ```\n    Name:\n\n    Please enter your name\n\n    ```\n\n    该条件使用`in_array()`函数来检查`$missing`数组是否包含值`name`。如果包含，则显示`<span>`。`$missing`在脚本顶部被定义为一个空数组，因此当页面首次加载时，该span不会显示。\n\
    \n2.  为`email`和`comments`字段插入类似的警告，如下所示：\n\n    ```\n    Email:\n\n    Please\
    \ enter your email address\n\n    Comments:\n\n    Please enter your comments\n\
    \n    ```\n\n    PHP代码是相同的，区别仅在于你在`$missing`数组中查找的值。该值与表单元素的`name`属性相同。\n\n3.\
    \  保存`contact.php`并再次测试页面，首先在所有字段中不输入任何内容。表单标签应该如图6-5所示。\n\n    尽管你为`email`字段的`<label>`添加了警告，但它没有显示，因为`email`尚未被添加到`$required`数组中。因此，`processmail.php`中的代码不会将其添加到`$missing`数组中。\n\
    \n1.  将`email`添加到`comments.php`顶部代码块中的`$required`数组里，如下所示：\n\n    ```\n    $required\
    \ = ['name', 'comments', 'email'];\n    ```\n\n2.  在不填写任何字段的情况下再次点击“发送消息”。这次，每个标签旁边都会显示警告消息。\n\
    \n3.  在“姓名”字段中键入你的名字。在“电子邮件”和“评论”字段中，仅多次按空格键，然后点击“发送消息”。“姓名”字段旁边的警告消息消失了，但另外两个警告消息仍然保留。`processmail.php`中的代码会去除文本字段的空白，因此它会拒绝通过输入一系列空格来绕过必填字段的尝试。\n\
    \n如果遇到任何问题，请将你的代码与`ch06`文件夹中的`contact_03.php`和`includes/processmail_01.php`进行对比。\n\
    \n更改必填字段所需做的全部工作就是修改`$required`数组中的名称，并在表单内相应输入元素的`<label>`标签中添加合适的提示。这很容易完成，因为你总是使用表单输入元素的`name`属性。"
  raw: "1.  The next section of code is not specific to this form, so it should go\n\
    \    in an external file that can be included in any email-processing script.\n\
    \    Create a new PHP file called `processmail.php` in\n    the `includes`\n \
    \   folder. Then include it in `contact.php`\n    immediately after the code you\
    \ entered in the previous step, like this:\n\n```\n    $required = ['name', 'comments'];\n\
    \    require './includes/processmail.php';\n    }\n    ```\n\n2.  The code in\
    \ `processmail.php`\n    begins by checking the `$_POST` variables for\n    required\
    \ fields that have been left blank. Strip any default code\n    inserted by your\
    \ editor and add the following to `processmail.php`:\n\n```\n     $value) {\n\
    \    // strip whitespace from $value if not an array\n    if (!is_array($value))\
    \ {\n    $value = trim($value);\n    }\n    if (!in_array($key, $expected)) {\n\
    \    // ignore the value, it's not in $expected\n    continue;\n    }\n    if\
    \ (in_array($key, $required) && empty($value)) {\n    // required value is missing\n\
    \    $missing[] = $key;\n    $$key = \"\";\n    continue;\n    }\n    $$key =\
    \ $value;\n    }\n    ```\n\nThis `foreach`\n    loop  processes\n    the `$_POST`\n\
    \    array by stripping out leading and trailing whitespace from text fields\n\
    \    and assigning the field’s contents to a variable with a simplified name.\n\
    \    As a result, `$_POST['email']`\n    becomes `$email`,\n    and so on. It\
    \ also checks if required fields are left blank, and adds\n    them to the `$missing`\
    \ array,\n    setting the related variable to an empty string.\n\nThe `$_POST`\n\
    \    array is an associative array, so the loop assigns the key and value of\n\
    \    the current element to `$key` and `$value`, respectively.\n    The loop begins\
    \ by checking that the current value isn’t an array, using\n    the `is_array()`\n\
    \    function with the logical Not operator (`!`). If it isn’t, the\n    `trim()`\n\
    \    function  strips\n    leading and trailing whitespace and reassigns it to\
    \ `$value`. Removing\n    leading and trailing whitespace prevents anyone from\
    \ pressing the space\n    bar several times to avoid filling in a required field.\n\
    \nNote\nThe form currently has only text input fields, but it will be\nexpanded\
    \ later to include `<select>`  and\ncheck box elements that submit data as arrays.\
    \ It’s necessary to check\nwhether the value of the current element is an array\
    \ because passing an\narray to the `trim()` function\ntriggers an error.\n\nThe\
    \ next conditional statement checks whether the current key is not\nin the `$expected`\
    \ array. If\nit isn’t, the `continue` keyword\nforces the loop to stop processing\
    \ the current element and move onto the\nnext one. So, anything not in the `$expected`\
    \ array is\nignored.\n\nNext, we check if the current array key is in the `$required`\
    \ array and\nif it has no value. If the condition returns true, the key is added\
    \ to\nthe `$missing`\narray and a variable based on the key’s name is created\
    \ dynamically and\nits value is set to an empty string. Notice that `$$key` begins\
    \ with two\ndollar signs in the following line:\n\n```\n$$key = \"\";\n```\n\n\
    This means it’s a variable variable (see “Creating new variables\ndynamically”\
    \ in Chapter [4](#332054_4_En_4_Chapter.xhtml)). So, if the value of `$key` is\
    \ “name,” `$$key` becomes `$name`.\nAgain, `continue` moves the\nloop onto the\
    \ next element.\n\nBut, if we get all the way to the final line of the loop, we\
    \ know that\nwe’re dealing with an element that needs to be processed, so a variable\n\
    based on the key name is created dynamically and the current value is\nassigned\
    \ to it.\n\n1.  Save `processmail.php`.\n    You’ll add more code to it later,\
    \ but let’s turn now to the main body of\n    `contact.php`.\n    The action attribute\
    \ in the opening form tag is empty. For local testing\n    purposes, just set\
    \ its value to the name of the current page:\n\n2.  You need to display a warning\
    \ if anything is missing. Add a conditional\n    statement at the top of the page\
    \ content between the `<h2>` heading\n    and the first paragraph, like this:\n\
    \n```\n    Contact us\n\nPlease fix the item(s) indicated.\n\nUt enim ad minim\
    \ veniam . . . \n    ```\n\nThis checks `$missing` and `$errors`, which you\n\
    \     initialized as\n    empty arrays in step 1\\. As explained in “The truth\
    \ according to PHP” in\n    Chapter [4](#332054_4_En_4_Chapter.xhtml), an empty\
    \ array is treated as\n    `false`, so the\n    paragraph inside the conditional\
    \ statement isn’t displayed when the page\n    first loads. However, if a required\
    \ field hasn’t been filled in when the\n    form is submitted, its name is added\
    \ to the `$missing` array. An\n    array with at least one element is treated\
    \ as `true`. The `||` means “or,” so\n    this warning paragraph will be displayed\
    \ if a required field is left\n    blank or if an error is discovered. (The `$errors`\
    \ array comes\n    into play in PHP Solution 6-4.)\n\n3.  To make sure it works\
    \ so far, save `contact.php` and load\n    it normally in a browser (don’t click\
    \ the Refresh button). The warning\n    message is not displayed. Click Send message\
    \ without filling in any of\n    the fields. You should now see the message about\
    \ missing items, as shown\n    in the following screenshot.\n\n![../images/332054_4_En_6_Chapter/332054_4_En_6_Fige_HTML.jpg](images/332054_4_En_6_Chapter/332054_4_En_6_Fige_HTML.jpg)\n\
    \n![../images/332054_4_En_6_Chapter/332054_4_En_6_Fig5_HTML.jpg](images/332054_4_En_6_Chapter/332054_4_En_6_Fig5_HTML.jpg)\n\
    \nFigure 6-5.\nBy validating user input, you can display warnings about required\n\
    fields\n\n1.  To display a suitable message alongside each missing required field,\
    \ use\n    a PHP conditional statement to insert a `<span>` inside\n    the `<label>`\
    \ tag,\n    like this:\n\n```\n    Name:\n\nPlease enter your name\n\n```\n\n\
    The condition uses the `in_array()` function\n    to check if the `$missing` array\n\
    \    contains the value `name`. If it does, the\n    `<span>` is\n    displayed.\
    \ `$missing` is defined\n    as an empty array at the top of the script, so the\
    \ span won’t be\n    displayed when the page first loads.\n\n2.  Insert similar\
    \ warnings for the `email` and `comments` fields like\n    this:\n\n```\n    Email:\n\
    \nPlease enter your email address\n\nComments:\n\nPlease enter your comments\n\
    \n```\n\nThe PHP code is the same except for the value you are looking for in\n\
    \    the `$missing`\n    array. It’s the same as the `name` attribute for\n  \
    \  the form element.\n\n3.  Save `contact.php` and test\n    the page again, first\
    \ by entering nothing into any of the fields. The\n    form labels should\n  \
    \  look like Figure [6-5](#332054_4_En_6_Chapter.xhtml#Fig5).\n\nAlthough you\
    \ added a warning to the `<label>` for the\n`email` field,\nit’s not displayed\
    \ because `email` hasn’t been\nadded to the `$required` array. As a\nresult, it’s\
    \ not added to the `$missing` array by the\ncode in `processmail.php`.\n\n1. \
    \ Add `email` to\n    the `$required`\n    array in the code block at the top\
    \ of `comments.php`, like\n    this:\n\n```\n    $required = ['name', 'comments',\
    \ 'email'];\n    ```\n\n2.  Click Send message again without filling in any fields.\
    \ This time,\n    you’ll see a warning message alongside each label.\n\n3.  Type\
    \ your name in the Name field. In the Email and Comments fields,\n    just press\
    \ the spacebar several times, then click Send message. The\n    warning message\
    \ alongside the Name field disappears, but the other two\n    warning messages\
    \ remain. The code in `processmail.php`\n    strips whitespace from text fields,\
    \ so it rejects attempts to bypass\n    required fields by entering a series of\
    \ spaces.\n\nIf you have any problems, compare your code with `contact_03.php`\
    \ and\n    `includes/processmail_01.php`\n    in the `ch06`\n    folder.\n\nAll\
    \ that needs to be done to change the required fields is to change\nthe names\
    \ in the `$required` array and\nadd a suitable alert inside the `<label>` tag\
    \ of\nthe appropriate input element inside the form. It’s easy to do because\n\
    you always use the `name` attribute of the\nform input element."
