    require_once $smarty->_get_plugin_filepath(''modifier'', ''truncate'');


    $links = array();


    $numSteps = count($params[''trail'']);


    for ($i = 0; $i < $numSteps; $i++) {


    $step = $params[''trail''][$i];


    // truncate the title if required


    if ($params[''truncate''] > 0)


    $step[''title''] = smarty_modifier_truncate($step[''title''],


    $params[''truncate'']);


    // build the link if it''s set and isn''t the last step


    if (strlen($step[''link'']) > 0 && $i < $numSteps - 1) {


    $links[] = sprintf(''<a href="%s" title="%s">%s</a>'', htmlSpecialChars($step[''link'']),


    htmlSpecialChars($step[''title'']),


    htmlSpecialChars($step[''title'']));


    }


    else {


    // either the link isn''t set, or it''s the last step


    $links[] = htmlSpecialChars($step[''title'']);


    }


    }


    // join the links using the specified separator


    return join($params[''separator''], $links);


    }


    ?>


    After the array of links has been built in this function, we create a single string
    to be returned by joining on the separator option. The default value for the separator
    is >, which we preescape. It is preescaped because some characters you might prefer
    to use aren’t typable, so you can specify the preescaped version when calling
    the plug-in. An example of this is the »


    symbol, which we can use by calling {breadcrumbs separator='' &raquo; ''}.


    When we generate the displayable title for each link, we make use of the Smarty
    truncate modifier. This allows us to restrict the total length of each breadcrumb
    link by specifying the maximum number of characters in a given string. If the
    string is longer than that number, it is chopped off at the end of the previous
    word and “...” is appended. For instance, if you were to truncate “The Quick Brown
    Fox Jumped over the Lazy Dog” to 13 characters, it would become “The Quick...”.
    This is an improvement over the PHP substr() function, since substr() will simply
    perform a hard break in the middle of a word (so the example string would become
    “The Quick Bro”).


