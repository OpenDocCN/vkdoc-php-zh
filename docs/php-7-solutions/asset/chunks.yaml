    \ to drop the table and all its data. The SQL file does this\nautomatically and\
    \ builds the table from scratch. These instructions\nassume that phpMyAdmin is\
    \ open to the page in step 6 of the previous\nsection."
  trans: "\n## 使用 phpMyAdmin 创建表\n\n| 字段 | 类型 | 长度/值 | 属性 | 空值 | 索引 | A_I |\n| ---\
    \ | --- | --- | --- | --- | --- | --- |\n| `image_id` | `INT` | | `UNSIGNED` |\
    \ 未选中 | `PRIMARY` | 已选中 |\n| `filename` | `VARCHAR` | `25` | | 未选中 | | |\n| `caption`\
    \ | `VARCHAR` | `120` | | 未选中 | | |\n\n1.  启动 phpMyAdmin（如果尚未打开），从屏幕左侧的数据库列表中选择\
    \ `phpsols`。这将打开 `Structure` 选项卡，并报告数据库中未找到任何表。\n2.  在 `Create table` 部分，在 `Name`\
    \ 字段中输入新表的名称（`images`），并在 `Number of columns` 字段中输入 `3`。然后点击 `Go` 按钮。\n3.  下一个屏幕用于定义表。这里有很多选项，但并非所有都需要填写。表\
    \ 12-1 列出了 `images` 表的设置。\n\n    第一列 `image_id` 被定义为 `INT` 类型，代表整数。其属性设置为 `UNSIGNED`，这意味着只允许正数。当你从索引下拉菜单中选择\
    \ `PRIMARY` 时，phpMyAdmin 会打开一个模式面板，你可以在其中指定高级选项。接受默认设置，然后点击 `Go` 关闭面板。接着，选中 `A_I`（`AUTO_INCREMENT`）复选框。这告诉\
    \ MySQL，每当插入新记录时，自动在该列插入下一个可用数字（从 1 开始）。\n    下一列 `filename` 被定义为 `VARCHAR` 类型，长度为\
    \ `25`。这意味着它最多接受 25 个字符的文本。\n    最后一列 `caption` 也是 `VARCHAR` 类型，长度为 `120`，因此它最多接受\
    \ 120 个字符的文本。\n    所有列的 `Null` 复选框均未选中，因此它们必须始终包含内容。不过，这个“内容”可以是一个空字符串。我将在本章后面的“在\
    \ MySQL 中选择正确的数据类型”部分更详细地描述列类型。\n    以下截图显示了在 phpMyAdmin 中设置完这些选项后的状态（`A_I` 右侧的列已被省略，因为它们无需填写）：\n\
    \    ![../images/332054_4_En_12_Chapter/332054_4_En_12_Figg_HTML.jpg](img/332054_4_En_12_Figg_HTML.jpg)\n\
    \    屏幕底部有一个 `Storage Engine`（存储引擎）选项。这决定了数据库文件内部存储的格式。自 MySQL 5.5 以来，InnoDB 一直是默认引擎。在此之前，MyISAM\
    \ 是默认引擎。我将在第 17 章中解释这些存储引擎之间的差异。在此之前，请使用 InnoDB。从一个存储引擎转换到另一个非常简单。\n    完成后，点击屏幕底部的\
    \ `Save` 按钮。\n\n**提示**  \n如果你点击的是 `Go` 而不是 `Save`，phpMyAdmin 会添加一个额外的列供你定义。如果发生这种情况，只需点击\
    \ `Save`。只要你不向字段中输入值，phpMyAdmin 就会忽略这个额外的列。\n\n1.  下一个屏幕列出 `images` 表，并显示一系列你可以对该表执行的操作。在\
    \ `Action` 下，点击 `Structure`，或者点击屏幕顶部的 `Structure` 选项卡。这会显示你刚刚创建的表的详细信息。\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figh_HTML.jpg](img/332054_4_En_12_Figh_HTML.jpg)\n\
    `image_id` 右侧的**金色钥匙**图标表示它是该表的主键。要编辑任何设置，请点击相应行的 `Change`。这会打开之前的屏幕并允许你更改值。\n\
    \n**提示**  \n如果你完全搞砸了并想重新开始，请点击屏幕顶部的 `Operations` 选项卡。然后，在 `Delete data or table`\
    \ 部分，点击 `Delete the table (DROP)` 并确认你想要删除该表。（在 SQL 中，*delete* 仅指记录。而删除列、表或数据库则用\
    \ *drop*。）\n\n## 向表中插入记录\n\n既然你已经有了表，就需要向其中放入一些数据。最终，你需要使用 HTML 表单、PHP 和 SQL 来构建自己的内容管理系统，但使用\
    \ phpMyAdmin 是快速简便的方法。\n\n### 使用 phpMyAdmin 手动插入记录\n\n以下说明演示了如何通过 phpMyAdmin 界面将记录添加到\
    \ `images` 表。\n\n1.  如果 phpMyAdmin 仍在显示上一节末尾的 `images` 表结构，请跳到步骤 2。否则，启动 phpMyAdmin\
    \ 并从左侧列表中选择 `phpsols` 数据库。然后，点击 `images` 右侧的 `Structure`，如下截图所示：\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figi_HTML.jpg](img/332054_4_En_12_Figi_HTML.jpg)\n\
    \n**提示**  \n主框架顶部的面包屑导航提供了页面头部各选项卡的上下文。前面截图中左上角的 `Structure` 选项卡是指 `phpsols` 数据库的结构。要访问单个表的结构，请点击该表名称旁边的\
    \ `Structure` 链接。\n\n1.  点击页面顶部中央的 `Insert` 选项卡。这将显示以下屏幕，供你插入多达两条记录：\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figj_HTML.jpg](img/332054_4_En_12_Figj_HTML.jpg)\n\
    \n1.  表单显示了每个列的名称和详细信息。你可以忽略 `Function` 字段。MySQL 拥有大量函数，你可以将它们应用于存储在表中的值。你将在接下来的章节中了解更多有关它们的信息。`Value`\
    \ 字段是你输入要插入到表中的数据的地方。\n\n    由于你已经将 `image_id` 定义为 `AUTO_INCREMENT`，MySQL 会自动插入下一个可用数字。因此，你*必须*将\
    \ `image_id` 的 `Value` 字段留空。按如下方式填写接下来的两个 `Value` 字段：\n\n    *   `filename`：`basin.jpg`\n\
    \    *   `caption`：`京都龙安寺水盆`\n\n2.  在第二个表单中，将 `image_id` 的 `Value` 字段留空，并按如下方式填写接下来的两个字段：\n\
    \n    *   `filename`：`fountains.jpg`\n    *   `caption`：`东京市中心喷泉`\n\n    通常，当你向第二个表单添加值时，`Ignore`\
    \ 复选框会自动取消选中，但如果需要，请手动取消选中。\n\n1.  点击第二个表单底部的 `Go` 按钮。用于插入记录的 SQL 语句将显示在页面顶部。我将在剩余章节中解释基本的\
    \ SQL 命令，但研究 phpMyAdmin 显示的 SQL 是学习如何构建自己的查询的好方法。SQL 在很大程度上基于人类语言，因此并不难学。\n\n\
    2.  点击页面左上角的 `Browse` 选项卡。你现在应该看到 `images` 表中的前两条条目，如下所示：\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figk_HTML.jpg](img/332054_4_En_12_Figk_HTML.jpg)\n\
    \n如你所见，MySQL 已在 `image_id` 字段中插入 `1` 和 `2`。你可以继续输入其余六张图像的详细信息，但让我们用一个包含所有必要数据的\
    \ SQL 文件来加快速度。\n\n### 从 SQL 文件加载图像记录\n\n由于 `images` 表的主键已设置为 `AUTO_INCREMENT`，因此需要删除该表及其所有数据。SQL\
    \ 文件会自动执行此操作，并从头开始构建表。以下说明假定 phpMyAdmin 已打开到上一节第 6 步的页面。\n"
- fmt: "1.  如果你不介意覆盖`images`表中的数据，请跳到步骤2。但是，如果你已输入不想丢失的数据，请将数据复制到另一个表中。点击页面顶部的`Operations`选项卡（根据屏幕大小，`Operations`可能隐藏在最右侧的`More`中），在`Copy\
    \ table to (database.table)`部分的空白字段中输入新表的名称，然后点击`Go`。以下截图显示了将`phpsols`数据库中的`images`表的结构和数据复制到`images_backup`的设置。\n\
    \n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figl_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Figl_HTML.jpg)\n\
    \n点击`Go`后，您会看到已复制表的确认信息。页面顶部的面包屑导航指示`phpMyAdmin`仍停留在`images`表中，因此即使屏幕上显示的是另一个页面，您也可以继续执行步骤2。\n\
    \n2.  点击页面顶部的`Import`选项卡。在下一个屏幕中，点击`File to import`中的`Browse`（或`Choose File`）按钮，然后导航至`ch12`文件夹中的`images.sql`。将所有选项保留为默认设置，并点击页面底部的`Go`。\n\
    \n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figm_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Figm_HTML.jpg)\n\
    \n1.  `phpMyAdmin`会删除原始表，创建一个新版本，并插入所有记录。当看到文件已导入的确认信息后，点击页面左上角的`Browse`按钮。现在您应该能看到与本章开头图12-1中相同的数据。\n\
    \n如果使用文本编辑器打开`images.sql`，您会看到它包含创建`images`表并填充数据的SQL命令。该表的构建方式如下：\n\n```\nDROP\
    \ TABLE IF EXISTS `images`;\nCREATE TABLE `images` (\n`image_id` int(10) unsigned\
    \ NOT NULL,\n`filename` varchar(25) NOT NULL,\n`caption` varchar(120) NOT NULL\n\
    ) ENGINE=InnoDB  DEFAULT CHARSET=latin1;\n```\n\n设置主键和自增（`auto_increment`）的命令位于文件末尾。\n\
    像这样从SQL文件导入数据，就是将数据从本地测试环境传输到网站所在远程服务器的方式。假设您的托管公司提供了`phpMyAdmin`来管理远程数据库，那么要传输数据，您只需启动远程服务器上的`phpMyAdmin`，点击`Import`选项卡，选择本地计算机上的SQL文件，然后点击`Go`即可。下一节将描述如何创建SQL文件。\n\
    \n## 创建用于备份和数据传输的SQL文件\n\n`MySQL`不会将数据库存储为可以简单上传到网站的单个文件。即使您找到了正确的文件，除非`MySQL`服务器已关闭，否则很可能会损坏它们。无论如何，大多数托管公司都不允许您上传原始文件，因为这也意味着要关闭他们的服务器，给每个人带来极大的不便。\n\
    \n不过，将数据库从一个服务器迁移到另一个服务器是很容易的。它只需要创建数据的备份**转储**（`dump`），然后使用`phpMyAdmin`或任何其他数据库管理程序将其加载到另一个数据库中。转储文件是一个文本文件，包含填充单个表甚至整个数据库所需的所有SQL命令。`phpMyAdmin`可以创建整个`MySQL`服务器、单个数据库、选定表或单个表的备份。\n\
    \n> **提示**  \n> 在您准备好将数据传输到另一个服务器或创建备份之前，不需要阅读如何创建转储文件的详细信息。\n\n为简单起见，以下说明仅展示如何备份单个数据库。\n\
    \n1.  在`phpMyAdmin`中，从左侧列表中选择`phpsols`数据库。如果已选择了该数据库，请点击屏幕顶部的`Database: phpsols`面包屑链接，如下所示：\n\
    \n![../images/332054_4_En_12_Chapter/332054_4_En_12_Fign_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Fign_HTML.jpg)\n\
    \n1.  从屏幕顶部的选项卡中选择`Export`。\n\n2.  有两种导出方式：`Quick`（快速）和`Custom`（自定义）。`Quick`方式只有一个用于导出文件格式的选项。默认为`SQL`，因此您只需点击`Go`，`phpMyAdmin`就会创建SQL转储文件并将其保存到浏览器的默认`Downloads`文件夹中。该文件与数据库同名，因此对于`phpsols`数据库，文件名为`phpsols.sql`。\n\
    \n3.  `Quick`方式适用于导出少量数据，但通常您需要对导出选项有更多控制；请选择`Custom`单选按钮。这里有很多选项，让我们逐个部分地看看。\n\
    \n4.  `Format`部分默认选择`SQL`，但也提供了一系列其他格式，包括`CSV`、`JSON`和`XML`。\n\n5.  `Table(s)`部分列出了数据库中的所有表。默认情况下，所有表都被选中，但您可以通过取消选中不需要的选项复选框来选择要导出的表。在下面的截图中，只选择了`images`表的结构和数据，因此不会导出`images_backup`。\n\
    \n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figo_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Figo_HTML.jpg)\n\
    \n> **提示**  \n> 备份单个表而不是整个数据库通常是个好主意，因为大多数`PHP`服务器被配置为将上传限制在2 MB。如下一步所述，压缩转储文件也有助于解决大小限制问题。\n\
    \n1.  `Output`部分有几个有用的选项。\n\n选中标记为`Rename exported databases/tables/columns`的复选框会启动一个模态面板，您可以在其中指定新名称。\n\
    \n`Use LOCK TABLES statement`复选框会添加命令，以防止在转储文件用于导入数据和/或结构时，其他人插入、更新或删除记录。\n\n\
    还有一些单选按钮，让您可以选择将SQL转储保存到文件（这是默认选项）或将输出显示为文本。如果您想在创建文件之前检查生成的SQL，将输出显示为文本会很有用。\n\
    \n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figp_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Figp_HTML.jpg)\n\
    \n`File name template`包含位于`@`标记之间的值。这将根据服务器、数据库或表自动生成文件名。一个非常酷的功能是，您可以使用`PHP strftime()`格式化字符（参见[`https://secure.php.net/manual/en/function.strftime.php`](https://secure.php.net/manual/en/function.strftime.php)）来增强模板。例如，您可以就在文件扩展名之前自动将当前日期添加到文件名中，如下所示：\n\
    \n```\n@DATABASE@_%Y-%m-%d\n```\n\n`Character set of the file`的默认值是`utf-8`。仅当您的数据以特定区域格式存储时，才需要更改此项。\n\
    \n默认情况下，转储文件不会被压缩，但下拉菜单提供了使用`zip`、`gzip`或`bzip`压缩的选项。这可以大大减小转储文件的大小，从而加快数据传输速度。导入压缩文件时，`phpMyAdmin`会自动检测压缩类型并解压。\n\
    \n最后一个选项允许您跳过大于指定MB数的文件。"
  raw: "1.  If you’re happy to overwrite the data in the `images` table, skip to\n\
    \    step 2\\. However, if you have entered data that you don’t want to lose,\n\
    \    copy your data to a different table. Click the `Operations` tab at the\n\
    \    top of the page (depending on the size of your screen, Operations might\n\
    \    be hidden inside `More` at the far right\n    of the row of tabs), type the\
    \ name of the new table in the blank field\n    in the section titled `Copy table\
    \ to (database.table)`, and click `Go`. The following\n    screenshot shows the\
    \ settings for copying the structure and data of the\n    `images` table to\n\
    \    `images_backup`\n    within the `phpsols` database.\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figl_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Figl_HTML.jpg)\n\
    \nAfter clicking `Go` you should see\n    confirmation that the table has been\
    \ copied. The breadcrumb trail at the\n    top of the page indicates that phpMyAdmin\
    \ is still in the `images` table, so you\n    can proceed to step 2, even though\
    \ you have a different page\n    onscreen.\n\n2.  Click the `Import` tab at the\
    \ top\n    of the page. In the next screen, click the `Browse` (or `Choose File`)\
    \ button\n    in `File to import`, then navigate to `images.sql` in the\n    `ch12`\
    \ folder.\n    Leave all options at their default setting, and click `Go` at the\
    \ foot of the\n    page.\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figm_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Figm_HTML.jpg)\n\
    \n1.  phpMyAdmin drops the original table, creates a new version, and\n    inserts\
    \ all the records. When you see confirmation that the file has\n    been imported,\
    \ click the `Browse` button at the\n    top left of the page. You should now see\
    \ the same data as shown in\n    Figure [12-1](#332054_4_En_12_Chapter.xhtml#Fig1)\
    \ at the\n    beginning of the chapter.\n\nIf you open `images.sql` in a text\n\
    editor, you’ll see that it contains the SQL commands that create the\n`images`\
    \ table\nand populate it with data. This is how the table is built:\n\n```\nDROP\
    \ TABLE IF EXISTS `images`;\nCREATE TABLE `images` (\n`image_id` int(10) unsigned\
    \ NOT NULL,\n`filename` varchar(25) NOT NULL,\n`caption` varchar(120) NOT NULL\n\
    ) ENGINE=InnoDB  DEFAULT CHARSET=latin1;\n```\n\nThe commands for setting the\
    \ primary key and auto_increment are at\nthe end of the file.\nImporting data\
    \ from an SQL file like this is how you transfer data\nfrom your local testing\
    \ environment to the remote server where your web\nsite is located. Assuming that\
    \ your hosting company provides phpMyAdmin\nfor you to administer your remote\
    \ database, all you need to do to\ntransfer the data is to launch the version\
    \ of phpMyAdmin on your remote\nserver, click the `Import` tab, select\nthe SQL\
    \ file on your local computer, and click `Go`.\nThe next section describes how\
    \ to create the SQL file.\n\nCreating an SQL file for backup and Data\nTransfer\n\
    MySQL doesn’t store your database in a single file that you can\nsimply upload\
    \ to your web site. Even if you find the right files, you’re\nlikely to damage\
    \ them unless the MySQL server is turned off. Anyway,\nmost hosting companies\
    \ won’t permit you to upload the raw files because\nit would also involve shutting\
    \ down their server, causing a great deal\nof inconvenience for everyone.  \n\
    Nevertheless, moving a database from one server to another is easy.\nAll it involves\
    \ is creating a backup **dump** of the data\nand loading it into the other database\
    \ using phpMyAdmin or any other\ndatabase administration program. The dump is\
    \ a text file\nthat contains all the SQL commands needed to populate an individual\n\
    table, or even an entire database. phpMyAdmin can create backups of your\nentire\
    \ MySQL server, individual databases, selected tables, or\nindividual tables.\n\
    \nTip\nYou don’t need to read the details of how to create a dump file until\n\
    you’re ready to transfer data to another server or create a backup.\n\nTo keep\
    \ things simple, these instructions show how to back up only a\nsingle database.\n\
    \n1.  In phpMyAdmin, select the `phpsols` database from\n    the list on the left.\
    \ If the database was already selected, click the\n    `Database: phpsols` breadcrumb\
    \ at the top of the screen, as shown here:\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Fign_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Fign_HTML.jpg)\n\
    \n1.  Select `Export` from the tabs\n    along the top of the screen.\n\n2.  There\
    \ are two export methods: Quick and Custom. The Quick method has\n    only one\
    \ option for the format of the export file. The default is SQL,\n    so all you\
    \ have to do is click `Go`, and phpMyAdmin\n    creates the SQL dump file and\
    \ saves it to your browser’s default `Downloads` folder. The\n    file has the\
    \ same name as the database, so for the `phpsols` database,\n    it’s called `phpsols.sql`.\n\
    \n3.  The Quick method is okay for exporting a small amount of data, but\n   \
    \ you normally need more control over the export options; select the `Custom`\
    \ radio button.\n    There are a lot of options, so let’s take a look at them\
    \ section by\n    section.\n\n4.  The `Format`\n    section defaults to SQL but\
    \ offers a range of other formats, including\n    CSV, JSON, and XML.\n\n5.  The\
    \ `Table(s)`\n    section lists all the tables in your database. By default all\
    \ are\n    selected, but you can choose which to export by deselecting the check\n\
    \    boxes of the options you don’t want. In the following screenshot, only\n\
    \    the `images`\n    table structure and data have been selected, so `images_backup`\
    \ won’t\n    be exported.\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figo_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Figo_HTML.jpg)\n\
    \nTip\nIt’s often a good idea to back up individual tables rather than an\nentire\
    \ database because most PHP servers are configured to limit uploads\nto 2 MB.\
    \ Compressing dump files, as described in the next step, also\nhelps get around\
    \ size restrictions.\n\n1.  The `Output`\n    section has several useful options.\n\
    \nSelecting the check box labeled `Rename exported databases/tables/columns` launches\
    \ a modal panel where you can\n    assign the new names.\n\nThe `Use LOCK TABLES\
    \ statement` check box adds commands that prevent anyone else from\n    inserting,\
    \ updating, or deleting records while the dump file is being\n    used to import\
    \ data and/or structure.\n\nThere are also radio buttons that give you the option\
    \ of either\n    saving the SQL dump to a file (this is the default) or viewing\
    \ the\n    output as text. Viewing as text can be useful if you want to check\
    \ the\n    SQL that’s being generated before you create the file.\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figp_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Figp_HTML.jpg)\n\
    \nThe File name template contains a value between `@` marks. This\n    automatically\
    \ generates the filename from the server, database, or\n    table. A really cool\
    \ feature is that you can use PHP `strftime()` formatting\n    characters (see\
    \ [`https://secure.php.net/manual/en/function.strftime.php`](https://secure.php.net/manual/en/function.strftime.php)\
    \ ) to enhance the template. For example, you can add\n    the current date automatically\
    \ to the filename just before the filename\n    extension, like this:\n\n```\n\
    \    @DATABASE@_%Y-%m-%d\n    ```\n\nThe default value of `Character set of the\
    \ file` is utf-8\\. You need to change this only if your data is\n    stored in\
    \ a specific regional format.\n\nBy default dump files are not compressed, but\
    \ the drop-down menu\n    offers the option to use zip, gzip, or bzip compression.\
    \ This can\n    greatly reduce the size of the dump file, speeding up the transfer\
    \ of\n    data. When importing a compressed file, phpMyAdmin automatically detects\n\
    \    the compression type and unzips it.\n\nThe final option allows you to skip\
    \ files larger than a specified\n    number of MB."
  trans: "\n1.  如果你不介意覆盖`images`表中的数据，请跳到步骤 2。但是，如果你已输入不想丢失的数据，请将数据复制到另一个表中。点击页面顶部的`Operations`选项卡（根据屏幕大小，`Operations`可能隐藏在最右侧的`More`中），在`Copy\
    \ table to (database.table)`部分的空白字段中输入新表的名称，然后点击`Go`。以下截图显示了将`phpsols`数据库中的`images`表的结构和数据复制到`images_backup`的设置。\n\
    \n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figl_HTML.jpg](img/332054_4_En_12_Figl_HTML.jpg)\n\
    \n点击`Go`后，您会看到已复制表的确认信息。页面顶部的面包屑导航指示`phpMyAdmin`仍停留在`images`表中，因此即使屏幕上显示的是另一个页面，您也可以继续执行步骤\
    \ 2。\n\n2.  点击页面顶部的`Import`选项卡。在下一个屏幕中，点击`File to import`中的`Browse`（或`Choose File`）按钮，然后导航至`ch12`文件夹中的`images.sql`。将所有选项保留为默认设置，并点击页面底部的`Go`。\n\
    \n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figm_HTML.jpg](img/332054_4_En_12_Figm_HTML.jpg)\n\
    \n3.  `phpMyAdmin`会删除原始表，创建一个新版本，并插入所有记录。当看到文件已导入的确认信息后，点击页面左上角的`Browse`按钮。现在您应该能看到与本章开头图\
    \ 12-1 中相同的数据。\n\n如果使用文本编辑器打开`images.sql`，您会看到它包含创建`images`表并填充数据的 SQL 命令。该表的构建方式如下：\n\
    \n```\nDROP TABLE IF EXISTS `images`;\nCREATE TABLE `images` (\n`image_id` int(10)\
    \ unsigned NOT NULL,\n`filename` varchar(25) NOT NULL,\n`caption` varchar(120)\
    \ NOT NULL\n) ENGINE=InnoDB  DEFAULT CHARSET=latin1;\n```\n\n设置主键和自增（`auto_increment`）的命令位于文件末尾。\n\
    像这样从 SQL 文件导入数据，就是将数据从本地测试环境传输到网站所在远程服务器的方式。假设您的托管公司提供了`phpMyAdmin`来管理远程数据库，那么要传输数据，您只需启动远程服务器上的`phpMyAdmin`，点击`Import`选项卡，选择本地计算机上的\
    \ SQL 文件，然后点击`Go`即可。下一节将描述如何创建 SQL 文件。\n\n## 创建用于备份和数据传输的 SQL 文件\n\n`MySQL`不会将数据库存储为可以简单上传到网站的单个文件。即使您找到了正确的文件，除非`MySQL`服务器已关闭，否则很可能会损坏它们。无论如何，大多数托管公司都不允许您上传原始文件，因为这也意味着要关闭他们的服务器，给每个人带来极大的不便。\n\
    \n不过，将数据库从一个服务器迁移到另一个服务器是很容易的。它只需要创建数据的备份**转储**（`dump`），然后使用`phpMyAdmin`或任何其他数据库管理程序将其加载到另一个数据库中。转储文件是一个文本文件，包含填充单个表甚至整个数据库所需的所有\
    \ SQL 命令。`phpMyAdmin`可以创建整个`MySQL`服务器、单个数据库、选定表或单个表的备份。\n\n> **提示**  \n> 在您准备好将数据传输到另一个服务器或创建备份之前，不需要阅读如何创建转储文件的详细信息。\n\
    \n为简单起见，以下说明仅展示如何备份单个数据库。\n\n1.  在`phpMyAdmin`中，从左侧列表中选择`phpsols`数据库。如果已选择了该数据库，请点击屏幕顶部的`Database:\
    \ phpsols`面包屑链接，如下所示：\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Fign_HTML.jpg](img/332054_4_En_12_Fign_HTML.jpg)\n\
    \n2.  从屏幕顶部的选项卡中选择`Export`。\n\n3.  有两种导出方式：`Quick`（快速）和`Custom`（自定义）。`Quick`方式只有一个用于导出文件格式的选项。默认为`SQL`，因此您只需点击`Go`，`phpMyAdmin`就会创建\
    \ SQL 转储文件并将其保存到浏览器的默认`Downloads`文件夹中。该文件与数据库同名，因此对于`phpsols`数据库，文件名为`phpsols.sql`。\n\
    \n4.  `Quick`方式适用于导出少量数据，但通常您需要对导出选项有更多控制；请选择`Custom`单选按钮。这里有很多选项，让我们逐个部分地看看。\n\
    \n5.  `Format`部分默认选择`SQL`，但也提供了一系列其他格式，包括`CSV`、`JSON`和`XML`。\n\n6.  `Table(s)`部分列出了数据库中的所有表。默认情况下，所有表都被选中，但您可以通过取消选中不需要的选项复选框来选择要导出的表。在下面的截图中，只选择了`images`表的结构和数据，因此不会导出`images_backup`。\n\
    \n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figo_HTML.jpg](img/332054_4_En_12_Figo_HTML.jpg)\n\
    \n> **提示**  \n> 备份单个表而不是整个数据库通常是个好主意，因为大多数`PHP`服务器被配置为将上传限制在 2 MB。如下一步所述，压缩转储文件也有助于解决大小限制问题。\n\
    \n7.  `Output`部分有几个有用的选项。\n\n选中标记为`Rename exported databases/tables/columns`的复选框会启动一个模态面板，您可以在其中指定新名称。\n\
    \n`Use LOCK TABLES statement`复选框会添加命令，以防止在转储文件用于导入数据和/或结构时，其他人插入、更新或删除记录。\n\n\
    还有一些单选按钮，让您可以选择将 SQL 转储保存到文件（这是默认选项）或将输出显示为文本。如果您想在创建文件之前检查生成的 SQL，将输出显示为文本会很有用。\n\
    \n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figp_HTML.jpg](img/332054_4_En_12_Figp_HTML.jpg)\n\
    \n`File name template`包含位于`@`标记之间的值。这将根据服务器、数据库或表自动生成文件名。一个非常酷的功能是，您可以使用`PHP strftime()`格式化字符（参见[`https://secure.php.net/manual/en/function.strftime.php`](https://secure.php.net/manual/en/function.strftime.php)）来增强模板。例如，您可以就在文件扩展名之前自动将当前日期添加到文件名中，如下所示：\n\
    \n```\n@DATABASE@_%Y-%m-%d\n```\n\n`Character set of the file`的默认值是`utf-8`。仅当您的数据以特定区域格式存储时，才需要更改此项。\n\
    \n默认情况下，转储文件不会被压缩，但下拉菜单提供了使用`zip`、`gzip`或`bzip`压缩的选项。这可以大大减小转储文件的大小，从而加快数据传输速度。导入压缩文件时，`phpMyAdmin`会自动检测压缩类型并解压。\n\
    \n最后一个选项允许您跳过大于指定 MB 数的文件。\n"
- fmt: '2. 在`Format-specific options`中，选项取决于步骤5中选择的格式。对于SQL，你可以选择在转储文件中显示注释，并将导出内容包含在事务中。使用事务的价值在于，如果因错误导致导入中断，数据库会回滚到之前的状态。


    其他选项包括禁用外键检查、将视图导出为表以及导出元数据。最后，还可以选择最大化与不同数据库系统或旧版MySQL的兼容性。通常，该值应设置为默认值：`NONE`。


    3. `Object creation options`部分允许你微调用于创建数据库和表的SQL。以下截图显示了默认设置。


    ![../images/332054_4_En_12_Chapter/332054_4_En_12_Figq_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Figq_HTML.jpg)


    创建备份时，通常建议选中`Add DROP TABLE / VIEW / PROCEDURE / FUNCTION / EVENT / TRIGGER statement`复选框，因为备份通常用于替换已损坏的现有数据。


    最后一个复选框默认选中，它会将表和列名用反引号（backticks）括起来，以避免名称中包含无效字符或使用保留字时出现问题。建议始终保留此项选中状态。


    4. `Data creation options`部分控制数据如何插入到表中。大多数情况下，默认设置即可。不过，你可能对修改前四个选项感兴趣，如下截图所示。


    ![../images/332054_4_En_12_Chapter/332054_4_En_12_Figr_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Figr_HTML.jpg)


    第一个复选框允许你在插入数据前清空表。如果你想替换现有数据（例如数据已损坏），这会很有用。


    另外两个复选框会影响`INSERT`命令的执行方式。`INSERT DELAYED`不适用于默认的`InnoDB`表。此外，从MySQL 5.6.6开始已弃用它，因此最好避免使用。


    `INSERT IGNORE`会跳过错误，例如主键重复。就个人而言，我认为最好能收到错误警报，因此不推荐使用它。


    标记为`Function to use when dumping data`的下拉菜单允许你选择`INSERT`、`UPDATE`或`REPLACE`。默认使用`INSERT`插入新记录。如果选择`UPDATE`，则仅更新现有记录。`REPLACE`会在必要时更新，并在记录不存在时插入新记录。


    5. 完成所有选择后，点击页面底部的`Go`。现在，你拥有一个备份，可用于将数据库内容迁移到另一台服务器。


    **提示** 默认情况下，由phpMyAdmin创建的文件仅包含用于创建和填充数据库表的SQL命令。除非你选择自定义选项，否则它不包含创建数据库的命令。这意味着你可以将表导入任何数据库，而不必与本地测试环境中的数据库同名。


    选择MySQL中的正确数据类型

    当为`image_id`列选择`Type`时，你可能会感到有些震惊。phpMyAdmin列出了所有可用数据类型——在MySQL 8和MariaDB 10中有超过40种。为了避免不必要的细节让你困惑，我将仅解释最常用的数据类型。你可以在MySQL文档中找到所有数据类型的完整详情，网址为：[`https://dev.mysql.com/doc/refman/8.0/en/data-types.html`](https://dev.mysql.com/doc/refman/8.0/en/data-types.html)。


    存储文本


    主要文本数据类型之间的区别归结为单个字段中可存储的最大字符数、对尾随空格的处理，以及是否可以设置默认值。


    *   `CHAR`：定长字符串。你必须在`Length/Values`字段中指定所需长度。最大允许值为255。在内部，字符串会用空格右填充到指定长度，但在检索值时尾随空格会被去除。你可以定义默认值。

    *   `VARCHAR`：可变长字符串。你必须指定计划使用的最大字符数（在phpMyAdmin中，在`Length/Values`字段中输入该数字）。最大字符数为65,535。如果存储的字符串带有尾随空格，检索时会保留这些空格。接受默认值。

    *   `TEXT`：存储最多65,535个字符的文本（大约比本章篇幅长50%）。不能定义默认值。


    `TEXT`很方便，因为你不需要指定最大大小（实际上，你也不能指定）。尽管`VARCHAR`和`TEXT`的最大大小都是65,535个字符，但有效大小会更少，因为一行中所有列可存储的最大数据量是65,535字节。


    提示

    保持简单：对于短文本项使用`VARCHAR`，对于较长文本项使用`TEXT`。`VARCHAR`和`TEXT`列仅占用存储输入值所需的磁盘空间。`CHAR`列始终分配声明长度所需的全部空间，即使为空也是如此。


    存储数字


    最常用的数字列类型如下：


    *   `INT`：介于-2,147,483,648和2,147,483,647之间的任何整数（整数）。如果列声明为`UNSIGNED`，则范围是0到4,294,967,295。

    *   `FLOAT`：浮点数。你可以选择指定两个以逗号分隔的数字来限制范围。第一个数字指定最大位数，第二个数字指定小数点后应有多少位。由于PHP会在计算后格式化数字，我建议使用不带可选参数的`FLOAT`。

    *   `DECIMAL`：带小数的数字；小数点后包含固定位数。定义表时，你需要指定最大位数以及小数点后应有多少位。在phpMyAdmin中，在`Length/Values`字段中输入以逗号分隔的数字。例如，`6,2`允许-9999.99到9999.99范围内的数字。如果不指定大小，当值存储在此类型列中时，小数部分会被截断。


    `FLOAT`和`DECIMAL`的区别在于精度。浮点数被视为近似值，容易受到舍入误差的影响（详细说明请参阅[`https://dev.mysql.com/doc/refman/8.0/en/problems-with-float.html`](https://dev.mysql.com/doc/refman/8.0/en/problems-with-float.html)）。请使用`DECIMAL`存储货币。


    注意

    不要使用逗号或空格作为千位分隔符。除数字外，数字中仅允许使用负号（-）和小数点（.）。


    存储日期和时间


    MySQL仅以一种格式存储日期：`YYYY-MM-DD`。这是ISO（国际标准化组织）批准的标准，避免了不同国家惯例中固有的歧义。我将在第16章中回到日期主题。最重要的日期和时间列类型如下：


    *   `DATE`：以`YYYY-MM-DD`格式存储的日期。范围是`1000-01-01`到`9999-12-31`。

    *   `DATETIME`：组合的日期和时间，以`YYYY-MM-DD HH:MM:SS`格式显示。

    *   `TIMESTAMP`：时间戳（通常由计算机自动生成）。合法值范围从1970年初到2038年1月中旬。'
  raw: "2.  In `Format-specific options`, the choices are determined by the format\
    \ selected in\n    step 5\\. For SQL, you can opt to display comments in the dump\
    \ file and\n    enclose the export in a transaction. The value of using a transaction\
    \ is\n    that the database is rolled back to its previous state if an error\n\
    \    causes the import to be abandoned.\n\nOther options include disabling foreign\
    \ key checks, exporting views\n    as tables, and exporting metadata. Finally,\
    \ you have the option to\n    maximize compatibility with different database systems\
    \ or older versions\n    of MySQL. Normally, the value should be set to the default:\
    \ `NONE`.\n\n3.  The `Object creation options` section lets you fine-tune the\
    \ SQL for creating databases\n    and tables. The following screenshot shows the\
    \ default settings.\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figq_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Figq_HTML.jpg)\n\
    \nWhen creating a backup, it’s usually a good idea to select the `Add DROP TABLE\
    \ / VIEW / PROCEDURE / FUNCTION / EVENT` / TRIGGER statement check box,\n    because\
    \ a backup is normally used to replace existing data that has\n    become corrupted.\n\
    \nThe final check box, which is selected by default, wraps table and\n    column\
    \ names in backquotes (backticks) to avoid problems with names that\n    contain\
    \ invalid characters or use reserved words. I suggest always\n    leaving this\
    \ selected.\n\n4.  The `Data creation options` section controls how data is inserted\
    \ into tables. In\n    most cases, the default settings are fine. However, you\
    \ may be\n    interested in changing the first four, which are shown in the following\n\
    \    screenshot.\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figr_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Figr_HTML.jpg)\n\
    \nThe first check box allows you to truncate the table before inserting\n    the\
    \ data. This is useful if you want to replace the existing data,\n    perhaps\
    \ if it has been corrupted.\n\nThe other two check boxes affect how `INSERT` commands\
    \ are\n    executed. `INSERT DELAYED` doesn’t work with the default InnoDB tables.\
    \ Moreover, it\n    is deprecated as of MySQL 5.6.6, so it’s probably best to\
    \ avoid it.\n\n`INSERT IGNORE` skips errors, such as duplicate primary keys. Personally,\n\
    \    I think it’s best to be alerted to errors, so I don’t recommend using\n \
    \   it.\n\nThe drop-down menu labeled `Function to use when dumping data` lets\
    \ you choose `INSERT, UPDATE,` or\n    `REPLACE`. The\n    default is to insert\
    \ new records with `INSERT`. If you select\n    `UPDATE`, only\n    existing records\
    \ are updated. `REPLACE` updates where\n    necessary and inserts new records\
    \ if they don’t already exist.\n\n5.  When you have made all your selections,\
    \ click `Go` at the bottom of\n    the page. You now have a backup that can be\
    \ used to transfer the\n    contents of your database to another server.\n\n**Tip** By\
    \ default, the file created by phpMyAdmin\n    contains the SQL commands only\
    \ to create and populate the database\n    tables. It does not include the command\
    \ to create the database unless\n    you select the custom option to do so. This\
    \ means you can import the\n    tables into any database. It does not need to\
    \ have the same name as the\n    one in your local testing environment.\n\nChoosing\
    \ the Right Data Type in MySQL\nYou may have received a bit of a shock when selecting\
    \ `Type` for the `image_id` column.\nphpMyAdmin lists all available data types—there\
    \ are more than 40 in\nMySQL 8 and MariaDB 10\\. Rather than confuse you with\
    \ unnecessary\ndetails, I’ll explain just those most commonly used.\nYou can find\
    \ full details of all data types in the MySQL\ndocumentation at [`https://dev.mysql.com/doc/refman/8.0/en/data-types.html`](https://dev.mysql.com/doc/refman/8.0/en/data-types.html)\
    \ .\n\nStoring text\n\nThe difference between the main text data types boils down\n\
    to the maximum number of characters that can be stored in an individual\nfield,\
    \ the treatment of trailing spaces, and whether you can set a\ndefault value.\n\
    \n*   `CHAR`: A\n    fixed-length string. You must specify the required length\
    \ in the `Length/Values` field.\n    The maximum permitted value is 255\\. Internally,\
    \ strings are right-padded\n    with spaces to the specified length, but the trailing\
    \ spaces are\n    stripped when you retrieve the value. You can define a default.\n\
    \n*   `VARCHAR`:\n    A variable-length string. You must specify the maximum number\
    \ of\n    characters you plan to use (in phpMyAdmin, enter the number in the `Length/Values`\
    \ field).\n    The maximum number of characters is 65,535\\. If a string is stored\
    \ with\n    trailing spaces, they are preserved on retrieval. Accepts a default\n\
    \    value.\n\n*   `TEXT`:\n    Stores text up to a maximum of 65,535 characters\
    \ (approximately 50%\n    longer than this chapter). Cannot define a default value.\n\
    \n`TEXT` is\nconvenient because you don’t need to specify a maximum size (in fact,\n\
    you can’t). Although the maximum size for `VARCHAR` and `TEXT` is 65,535\ncharacters,\
    \ the effective amount is less because the maximum amount that\ncan be stored\
    \ across all columns in a row is 65,535 bytes.\n\nTip\nKeep it simple: use `VARCHAR`\
    \ for short\ntext items and `TEXT` for longer ones.\n`VARCHAR` and\n`TEXT` columns\n\
    take only the amount of disk space needed to store the values entered in\nthem.\
    \ `CHAR`\ncolumns always allocate the full amount of space declared as the\nrequired\
    \ length, even when empty.\n\nStoring numbers\n\nThe most frequently used numeric\
    \ column types\nare as follows:\n\n*   `INT`: Any\n    whole number (integer)\
    \ between −2,147,483,648 and 2,147,483,647\\. If the\n    column is declared as\
    \ `UNSIGNED`, the range\n    is from 0 to 4,294,967,295.\n\n*   `FLOAT`: A\n \
    \   floating-point number. You can optionally specify two comma-separated\n  \
    \  numbers to limit the range. The first number specifies the maximum\n    number\
    \ of digits, and the second specifies how many of those digits\n    should come\
    \ after the decimal point. Since PHP will format numbers after\n    calculation,\
    \ I recommend that you use `FLOAT` without the\n    optional parameters.\n\n*\
    \   `DECIMAL`:\n    A number with a fraction; contains a fixed number of digits\
    \ after the\n    decimal point. When defining the table, you need to specify the\
    \ maximum\n    number of digits and how many of those digits should come after\
    \ the\n    decimal point. In phpMyAdmin, enter the numbers separated by a comma\
    \ in\n    the `Length/Values` field.\n    For example, 6,2 permits numbers in\
    \ the range from −9999.99 to 9999.99.\n    If you don’t specify the size, the\
    \ decimal fraction is truncated when\n    values are stored in this type of column.\n\
    \nThe difference between `FLOAT` and `DECIMAL` is accuracy.\nFloating-point numbers\
    \ are treated as approximate values and are subject\nto rounding errors (for a\
    \ detailed explanation, see [`https://dev.mysql.com/doc/refman/8.0/en/problems-with-float.html`](https://dev.mysql.com/doc/refman/8.0/en/problems-with-float.html)\
    \ ).\nUse `DECIMAL`\nto store currencies.\n\nCaution\nDon’t use commas or spaces\
    \ as the thousands separator. Apart from\nnumerals, the only characters permitted\
    \ in numbers are the negative\noperator (-) and the decimal point (.).\n\nStoring\
    \ dates and times\n\nMySQL stores dates in one format\nonly: `YYYY-MM-DD`. It’s\
    \ the\nstandard approved by the ISO (International Organization for\nStandardization)\
    \ and avoids the ambiguity inherent in different national\nconventions. I’ll return\
    \ to the subject of dates in Chapter [16](#332054_4_En_16_Chapter.xhtml). The\
    \ most important column types\nfor dates and times are as follows:\n\n*   `DATE`:\
    \ A\n    date stored as `YYYY-MM-DD`. The range\n    is 1000-01-01 to 9999-12-31.\n\
    \n*   `DATETIME`: A combined\n    date and time displayed in the format `YYYY-MM-DD\
    \ HH:MM:SS`.\n\n*   `TIMESTAMP`: A\n    timestamp (normally generated automatically\
    \ by the computer). Legal\n    values range from the beginning of 1970 to partway\
    \ through January\n    2038."
  trans: '好的，作为高级文档工程师和翻译员，我将严格遵守您提供的注意事项，将给定的英文文本（已内嵌在您提供的内容中）翻译成中文。



    2. 在`Format-specific options`中，选项取决于步骤 5 中选择的格式。对于 SQL，你可以选择在转储文件中显示注释，并将导出内容包含在事务中。使用事务的价值在于，如果因错误导致导入中断，数据库会回滚到之前的状态。


    其他选项包括禁用外键检查、将视图导出为表以及导出元数据。最后，还可以选择最大化与不同数据库系统或旧版 MySQL 的兼容性。通常，该值应设置为默认值：`NONE`。


    3. `Object creation options`部分允许你微调用于创建数据库和表的 SQL。以下截图显示了默认设置。


    ![../images/332054_4_En_12_Chapter/332054_4_En_12_Figq_HTML.jpg](img/332054_4_En_12_Figq_HTML.jpg)


    创建备份时，通常建议选中`Add DROP TABLE / VIEW / PROCEDURE / FUNCTION / EVENT / TRIGGER statement`复选框，因为备份通常用于替换已损坏的现有数据。


    最后一个复选框默认选中，它会将表和列名用反引号（backticks）括起来，以避免名称中包含无效字符或使用保留字时出现问题。建议始终保留此项选中状态。


    4. `Data creation options`部分控制数据如何插入到表中。大多数情况下，默认设置即可。不过，你可能对修改前四个选项感兴趣，如下截图所示。


    ![../images/332054_4_En_12_Chapter/332054_4_En_12_Figr_HTML.jpg](img/332054_4_En_12_Figr_HTML.jpg)


    第一个复选框允许你在插入数据前清空表。如果你想替换现有数据（例如数据已损坏），这会很有用。


    另外两个复选框会影响`INSERT`命令的执行方式。`INSERT DELAYED`不适用于默认的`InnoDB`表。此外，从 MySQL 5.6.6 开始已弃用它，因此最好避免使用。


    `INSERT IGNORE`会跳过错误，例如主键重复。就个人而言，我认为最好能收到错误警报，因此不推荐使用它。


    标记为`Function to use when dumping data`的下拉菜单允许你选择`INSERT`、`UPDATE`或`REPLACE`。默认使用`INSERT`插入新记录。如果选择`UPDATE`，则仅更新现有记录。`REPLACE`会在必要时更新，并在记录不存在时插入新记录。


    5. 完成所有选择后，点击页面底部的`Go`。现在，你拥有一个备份，可用于将数据库内容迁移到另一台服务器。


    **提示** 默认情况下，由 phpMyAdmin 创建的文件仅包含用于创建和填充数据库表的 SQL 命令。除非你选择自定义选项，否则它不包含创建数据库的命令。这意味着你可以将表导入任何数据库，而不必与本地测试环境中的数据库同名。


    选择 MySQL 中的正确数据类型

    当为`image_id`列选择`Type`时，你可能会感到有些震惊。phpMyAdmin 列出了所有可用数据类型——在 MySQL 8 和 MariaDB
    10 中有超过 40 种。为了避免不必要的细节让你困惑，我将仅解释最常用的数据类型。你可以在 MySQL 文档中找到所有数据类型的完整详情，网址为：[`https://dev.mysql.com/doc/refman/8.0/en/data-types.html`](https://dev.mysql.com/doc/refman/8.0/en/data-types.html)。


    存储文本


    主要文本数据类型之间的区别归结为单个字段中可存储的最大字符数、对尾随空格的处理，以及是否可以设置默认值。


    *   `CHAR`：定长字符串。你必须在`Length/Values`字段中指定所需长度。最大允许值为 255。在内部，字符串会用空格右填充到指定长度，但在检索值时尾随空格会被去除。你可以定义默认值。

    *   `VARCHAR`：可变长字符串。你必须指定计划使用的最大字符数（在 phpMyAdmin 中，在`Length/Values`字段中输入该数字）。最大字符数为
    65,535。如果存储的字符串带有尾随空格，检索时会保留这些空格。接受默认值。

    *   `TEXT`：存储最多 65,535 个字符的文本（大约比本章篇幅长 50%）。不能定义默认值。


    `TEXT`很方便，因为你不需要指定最大大小（实际上，你也不能指定）。尽管`VARCHAR`和`TEXT`的最大大小都是 65,535 个字符，但有效大小会更少，因为一行中所有列可存储的最大数据量是
    65,535 字节。


    **提示**

    保持简单：对于短文本项使用`VARCHAR`，对于较长文本项使用`TEXT`。`VARCHAR`和`TEXT`列仅占用存储输入值所需的磁盘空间。`CHAR`列始终分配声明长度所需的全部空间，即使为空也是如此。


    存储数字


    最常用的数字列类型如下：


    *   `INT`：介于-2,147,483,648 和 2,147,483,647 之间的任何整数（整数）。如果列声明为`UNSIGNED`，则范围是 0
    到 4,294,967,295。

    *   `FLOAT`：浮点数。你可以选择指定两个以逗号分隔的数字来限制范围。第一个数字指定最大位数，第二个数字指定小数点后应有多少位。由于 PHP 会在计算后格式化数字，我建议使用不带可选参数的`FLOAT`。

    *   `DECIMAL`：带小数的数字；小数点后包含固定位数。定义表时，你需要指定最大位数以及小数点后应有多少位。在 phpMyAdmin 中，在`Length/Values`字段中输入以逗号分隔的数字。例如，`6,2`允许-9999.99
    到 9999.99 范围内的数字。如果不指定大小，当值存储在此类型列中时，小数部分会被截断。


    `FLOAT`和`DECIMAL`的区别在于精度。浮点数被视为近似值，容易受到舍入误差的影响（详细说明请参阅[`https://dev.mysql.com/doc/refman/8.0/en/problems-with-float.html`](https://dev.mysql.com/doc/refman/8.0/en/problems-with-float.html)）。请使用`DECIMAL`存储货币。


    **注意**

    不要使用逗号或空格作为千位分隔符。除数字外，数字中仅允许使用负号（-）和小数点（.）。


    存储日期和时间


    MySQL 仅以一种格式存储日期：`YYYY-MM-DD`。这是 ISO（国际标准化组织）批准的标准，避免了不同国家惯例中固有的歧义。我将在第 16 章中回到日期主题。最重要的日期和时间列类型如下：


    *   `DATE`：以`YYYY-MM-DD`格式存储的日期。范围是`1000-01-01`到`9999-12-31`。

    *   `DATETIME`：组合的日期和时间，以`YYYY-MM-DD HH:MM:SS`格式显示。

    *   `TIMESTAMP`：时间戳（通常由计算机自动生成）。合法值范围从 1970 年初到 2038 年 1 月中旬。

