    Zend Framework 可以说是为 PHP 构建的第一个框架。其企业赞助商 Zend Technologies 与 PHP 语言本身有着悠久的历史；其创始人包括
    PHP 的两位原始作者 Andi Gutmans 和 Zeev Suraski。PHP 之所以成为最流行的 Web 编程语言之一，很大程度上始于 Zend
    Technologies 及其对语言的贡献。正因如此，Zend Framework 早期就取得了成功，并继续在 PHP 框架市场中扮演重要角色。


    就社区支持而言，Zend Framework 可能拥有所有 PHP 框架中最大的在线追随者群体。其文档广泛且详尽，非官方博客和论坛使得几乎任何问题都能获得在线支持。提交到核心的代码都经过严格的测试方法，这使得
    Zend Framework 成为一个极其健壮的框架。然而，Zend Framework 更像是一个大型的库集合，而非轻量级的 MVC 框架。例如，其主要库文件夹大小接近
    16MB，是 Cake 库大小的三倍多。启动 Zend Framework 需要更多的自定义和配置，而 Cake 则采用了"约定优于配置"的范式。你几乎可以在任何
    PHP 项目中使用 Zend Framework（我在第 12 章中演示了如何在 Cake 中使用 Zend 库），但代价是你必须编写或配置大量 Cake
    通过其调度方法自动完成的工作。


    Zend Framework 不像 Cake、CodeIgniter 和 Symfony 那样有单一开发范式，这吸引了许多开发人员。因此，像 MVC 这样的模式在
    Zend Framework 中是可行的，但这需要你手动编写配置方法，而这些方法在 Cake 和其他框架中是自动内置的。在框架如何减少扩展所需代码量方面，Cake
    无疑领先于 Zend Framework。学习 Zend Framework 通常比学习 Cake 更耗时，主要是因为框架的设计。对于初学者来说，启动 Zend
    Framework 的 MVC 变体通常比 Symfony 更困难，更不用说 Cake 了。


    诚然，在大多数 PHP 圈子中，Zend Framework 比 Cake 更为人知；可以说它是团队中的老将。但 Cake 正证明自己更像一颗冉冉升起的新星，移动更快且战略上更稳健。鉴于
    Cake 有效实现了 MVC 结构及其结构设计，它很可能会继续吸引前 Zend Framework 开发人员，并保持 PHP 框架领域的顶尖地位。


