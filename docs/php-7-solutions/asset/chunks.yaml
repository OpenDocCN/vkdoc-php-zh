  trans: "\n1.  在 `filesystem` 文件夹中创建一个名为 `imagelist.php` 的 PHP 页面。或者，使用 `ch07` 文件夹中的\
    \ `imagelist_01.php`。\n\n2.  在 `imagelist.php` 内创建一个表单，并插入一个仅包含一个 `<option>` 元素的\
    \ `<select>` 元素，如下所示（代码已在 `imagelist_01.php` 中）：\n\n```\n<select name=\"pix\"\
    >\n    <option value=\"\">选择一个图片</option>\n</select>\n```\n\n这个 `<option>` 是下拉菜单中唯一的静态元素。\n\
    \n3.  像这样修改表单中的 `<select>` 元素：\n\n```\n<select name=\"pix\">\n    <option value=\"\
    \">选择一个图片</option>\n    <?php\n    foreach ($files as $file) {\n        ?>\n \
    \       <option value=\"<?php echo $file->getFilename(); ?>\"><?php echo $file->getFilename();\
    \ ?></option>\n        <?php\n    }\n    ?>\n</select>\n```\n\n确保 `images` 文件夹的路径与您网站的文件夹结构相符。作为\
    \ `RegexIterator` 构造函数的第二个参数的正则表达式，不区分大小写地匹配具有 `.jpg`、`.png`、`.gif` 和 `.webp`\
    \ 扩展名的文件。\n\n`foreach` 循环简单地获取当前图片的文件名，并将其插入到 `<option>` 元素中。\n\n保存 `imagelist.php`\
    \ 并在浏览器中加载它。您应该会看到一个下拉菜单，列出了 `images` 文件夹中的所有图片，如图 7-2 所示。\n\n当集成到在线表单中时，所选图片的文件名会出现在\
    \ `$_POST` 数组中，并由 `<select>` 元素的 `name` 属性标识——在本例中是 `$_POST['pix']`。仅此而已！您可以将您的代码与\
    \ `ch07` 文件夹中的 `imagelist_02.php` 进行比较。\n\n## PHP 解决方案 7-4：创建通用文件选择器\n\n前面的 PHP\
    \ 解决方案依赖于对正则表达式的理解。使其适用于其他文件扩展名并不困难，但您需要小心，不要意外删除一个关键字符。除非正则表达式是您的专长，否则更简单的方法可能是将代码封装到一个函数中，该函数可用于检查特定文件夹并创建特定类型文件名的数组。例如，您可能想要创建一个\
    \ PDF 文档文件名的数组，或者一个包含 PDF 和 Word 文档的数组。以下是操作方法。\n\n1.  在 `filesystem` 文件夹中创建一个名为\
    \ `buildlist.php` 的新文件。该文件将仅包含 PHP 代码，因此请删除编辑程序插入的任何 HTML。\n\n2.  将以下代码添加到该文件中：\n\
    \n```\nfunction buildFileList($dir, $extensions) {\n    if (!is_dir($dir) && !is_readable($dir))\
    \ {\n        return false;\n    } else {\n        if (is_array($extensions)) {\n\
    \            $extensions = implode('|', $extensions);\n        }\n    }\n}\n```\n\
    \n这定义了一个名为 `buildFileList()` 的函数，它接受两个参数：\n\n*   `$dir`：要获取文件名列表的文件夹路径。\n*   `$extensions`：可以是包含单个文件扩展名的字符串，也可以是文件扩展名的数组。为保持代码简洁，文件扩展名不应包含前导句点。\n\
    \n函数首先检查 `$dir` 是否是一个文件夹并且可读。如果不是，函数返回 `false`，并且不再执行任何代码。\n\n如果 `$dir` 没问题，则执行\
    \ `else` 块。它也从一条条件语句开始，检查 `$extensions` 是否是一个数组。如果是，则将其传递给 `implode()`，它将数组元素连接起来，每个元素之间用竖线（`|`）分隔。竖线在正则表达式中用于表示可选值。假设将以下数组作为第二个参数传递给函数：\n\
    \n```\n['jpg', 'png', 'gif']\n```\n\n条件语句将其转换为 `jpg|png|gif`。因此，这会查找 `jpg`、`png`\
    \ 或 `gif`。但是，如果参数是一个字符串，则保持不变。\n\n3.  您现在可以构建正则表达式搜索模式，并将两个参数传递给 `FilesystemIterator`\
    \ 和 `RegexIterator`，如下所示：\n\n```\nfunction buildFileList($dir, $extensions) {\n\
    \    if (!is_dir($dir) && !is_readable($dir)) {\n        return false;\n    }\
    \ else {\n        if (is_array($extensions)) {\n            $extensions = implode('|',\
    \ $extensions);\n        }\n        $pattern = \"/\\.(?:{$extensions})$/i\";\n\
    \        $folder = new FilesystemIterator($dir);\n        $files = new RegexIterator($folder,\
    \ $pattern);\n    }\n}\n```\n\n正则表达式模式使用双引号字符串构建，并将 `$extensions` 包裹在花括号中，以确保\
    \ PHP 引擎能够正确解释它。复制代码时要小心。它不太容易阅读。\n\n4.  代码的最后一部分提取文件名以构建一个数组，该数组经过排序后被返回。完整的函数定义如下所示：\n\
    \n```\nfunction buildFileList($dir, $extensions) {\n    if (!is_dir($dir) && !is_readable($dir))\
    \ {\n        return false;\n    } else {\n        if (is_array($extensions)) {\n\
    \            $extensions = implode('|', $extensions);\n        }\n        $pattern\
    \ = \"/\\.(?:{$extensions})$/i\";\n        $folder = new FilesystemIterator($dir);\n\
    \        $files = new RegexIterator($folder, $pattern);\n        $filenames =\
    \ [];\n        foreach ($files as $file) {\n            $filenames[] = $file->getFilename();\n\
    \        }\n        natcasesort($filenames);\n        return $filenames;\n   \
    \ }\n}\n```\n\n这初始化了一个数组，并使用 `foreach` 循环通过 `getFilename()` 方法将文件名赋值给它。最后，该数组被传递给\
    \ `natcasesort()`，它以自然且不区分大小写的顺序进行排序。所谓“自然”是指，包含数字的字符串会以人类通常理解的方式进行排序。例如，计算机通常会将\
    \ `img12.jpg` 排在 `img2.jpg` 之前，因为 12 中的 1 被认为小于 2。使用 `natcasesort()` 会使 `img2.jpg`\
    \ 排在 `img12.jpg` 之前。\n\n5.  要使用此函数，请将文件夹路径和要查找的文件的扩展名作为参数。例如，您可以从一个文件夹中获取所有 Word\
    \ 和 PDF 文档，如下所示：\n\n```\n$docs = buildFileList('folder_name', ['doc', 'docx',\
    \ 'pdf']);\n```\n\n`buildFileList()` 函数的代码位于 `ch07` 文件夹的 `buildlist.php` 文件中。\n\
    \n## 访问远程文件\n\n在本地计算机或自己的网站上读取、写入和检查文件是很有用的。但是 `allow_url_fopen` 也允许您访问互联网上任何地方公开可用的文档。您可以读取内容，将其保存到变量中，并使用\
    \ PHP 函数进行操作，然后将其整合到自己的页面中或将信息保存到数据库。\n\n需要提醒一点：从远程来源提取材料以包含在自己的页面中时，存在安全风险。例如，远程页面可能包含嵌入在\
    \ `<script>` 标签或超链接中的恶意脚本。\n\n即使远程页面从受信任的源（例如 [Amazon.​com](http://amazon.com)\
    \ 数据库的产品详细信息、政府气象局的气象信息或报纸或广播公司的新闻推送）以已知格式提供数据，您也应该始终通过将其传递给 `htmlentities()`（请参阅\
    \ PHP 解决方案 6-3）来清理内容。除了将双引号转换为 `&quot;` 之外，`htmlentities()` 还将 `<` 转换为 `&lt;`，将\
    \ `>` 转换为 `&gt;`。这会以纯文本形式显示标签，而不是将它们视为 HTML。\n\n如果您希望允许某些 HTML 标签，请改用 `strip_tags()`\
    \ 函数。如果将字符串传递给 `strip_tags()`，它会返回一个去除了所有 HTML 标签和注释的字符串。它也会移除 PHP 标签。第二个可选参数是您希望保留的标签列表。例如，以下代码会去除除段落、一级标题和二级标题之外的所有标签：\n\
    \n```\n$stripped = strip_tags($original, '<p><h1><h2>');\n```\n"
- fmt: '# Consuming News and Other RSS Feeds


    Some of the most useful remote sources of information that you might want to incorporate
    in your sites come from RSS feeds. `RSS` stands for Really Simple Syndication,
    and it’s a dialect of `XML`. `XML` is similar to `HTML` in that it uses tags to
    mark up content. Instead of defining paragraphs, headings, and images, `XML` tags
    are used to organize data in a predictable hierarchy. `XML` is written in plain
    text, so it’s frequently used to share information between computers that might
    be running on different operating systems.


    Figure [7-3](#332054_4_En_7_Chapter.xhtml#Fig3) shows the typical structure of
    an RSS 2.0 feed. The whole document is wrapped in a pair of `<rss>` tags. This
    is the root element, similar to the `<html>` tags of a web page. The rest of the
    document is wrapped in a pair of `<channel>` tags, which always contain the following
    three elements that describe the RSS feed: `<title>`, `<description>`, and `<link>`.


    ![../images/332054_4_En_7_Chapter/332054_4_En_7_Fig3_HTML.png](images/332054_4_En_7_Chapter/332054_4_En_7_Fig3_HTML.png)


    Figure 7-3. The main contents of an RSS feed are in the item elements


    In addition to the three required elements, the `<channel>` can contain many other
    elements, but the interesting material is to be found in the `<item>` elements.
    In the case of a news feed, this is where the individual news items can be found.
    If you’re looking at the RSS feed from a blog, the `<item>` elements normally
    contain summaries of the blog posts.


    Each `<item>` element can contain several elements, but those shown in Figure
    [7-3](#332054_4_En_7_Chapter.xhtml#Fig3) are the most common, and usually the
    most interesting:


    *   `<title>`: The title of the item

    *   `<link>`: The URL of the item

    *   `<pubDate>`: Date of publication

    *   `<description>`: Summary of the item


    This predictable format makes it easy to extract the information using `SimpleXML`.


    **Note:** You can find the full RSS specification at [`www.rssboard.org/rss-specification`](http://www.rssboard.org/rss-specification).
    Unlike most technical specifications, it’s written in plain language and is easy
    to read.


    ## Using SimpleXML


    As long as you know the structure of an XML document, `SimpleXML` does what it
    says on the tin: it makes extracting information from XML simple. The first step
    is to pass the URL of the XML document to `simplexml_load_file()`. You can also
    load a local XML file by passing the path as an argument. For example, this gets
    the world news feed from the BBC:


    ```php

    $feed = simplexml_load_file(''http://feeds.bbci.co.uk/news/world/rss.xml'');

    ```


    This creates an instance of the `SimpleXMLElement` class. All the elements in
    the feed can now be accessed as properties of the `$feed` object by using the
    names of the elements. With an RSS feed, the `<item>` elements can be accessed
    as `$feed->channel->item`.


    To display the `<title>` of each `<item>`, create a `foreach` loop like this:


    ```php

    foreach ($feed->channel->item as $item) {

    echo $item->title . '''';

    }

    ```


    If you compare this with Figure [7-3](#332054_4_En_7_Chapter.xhtml#Fig3), you
    can see that you access elements by chaining the element names with the `->` operator
    until you reach the target. Since there are multiple `<item>` elements, you need
    to use a loop to tunnel further down. Alternatively, use array notation, like
    this:


    ```php

    $feed->channel->item[2]->title

    ```


    This gets the `<title>` of the third `<item>` element. Unless you want only a
    specific value, it’s simpler to use a loop. With that background out of the way,
    let’s use `SimpleXML` to display the contents of a news feed.


    ## PHP Solution 7-5: Consuming an RSS News Feed


    This PHP solution shows how to extract the information from a live news feed using
    `SimpleXML` and then display it in a web page. It also shows how to format the
    `<pubDate>` element to a more user-friendly format and how to limit the number
    of items displayed using the `LimitIterator` class.


    1. Create a new page called `newsfeed.php` in the `filesystem` folder. This page
    will contain a mixture of PHP and HTML.


    2. The news feed chosen for this PHP solution is BBC World News. A condition of
    using most news feeds is that you acknowledge the source. So add "The Latest from
    BBC News" formatted as an `<h1>` heading at the top of the page.


    **Note:** For the terms and conditions of using a BBC news feed on your own site,
    see [`www.bbc.co.uk/news/10628494#mysite`](http://www.bbc.co.uk/news/10628494%2523mysite)
    and [`www.bbc.co.uk/usingthebbc/terms/can-i-share-things-from-the-bbc/`](http://www.bbc.co.uk/usingthebbc/terms/can-i-share-things-from-the-bbc/).


    3. Create a PHP block below the heading and add the following code to load the
    feed:


    ```php

    $url = ''http://feeds.bbci.co.uk/news/world/rss.xml'';

    $feed = simplexml_load_file($url);

    ```


    4. Use a `foreach` loop to access the `<item>` elements and display the `<title>`
    of each one:


    ```php

    foreach ($feed->channel->item as $item) {

    echo htmlentities($item->title) . '''';

    }

    ```


    5. Save `newsfeed.php` and load the page in a browser. You should see a long list
    of news items similar to Figure [7-4](#332054_4_En_7_Chapter.xhtml#Fig4).


    ![../images/332054_4_En_7_Chapter/332054_4_En_7_Fig4_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Fig4_HTML.jpg)


    Figure 7-4. The news feed contains a large number of items


    6. The normal feed often contains 30 or more items. That’s fine for a news site,
    but you probably want a shorter selection in your own site. Use another SPL iterator
    to select a specific range of items. Amend the code like this:


    ```php

    $url = ''http://feeds.bbci.co.uk/news/world/rss.xml'';

    $feed = simplexml_load_file($url, ''SimpleXMLIterator'');

    $filtered = new LimitIterator($feed->channel->item, 0 , 4);

    foreach ($filtered as $item) {

    echo htmlentities($item->title) . '''';

    }

    ```


    To use `SimpleXML` with an SPL iterator, you need to supply the name of the `SimpleXMLIterator`
    class as the second argument to `simplexml_load_file()`. You can then pass the
    SimpleXML element you want to affect to an iterator constructor.


    In this case, `$feed->channel->item` is passed to the `LimitIterator` constructor.
    The `LimitIterator` takes three arguments: the object you want to limit, the starting
    point (counting from 0), and the number of times you want the loop to run. This
    code starts at the first item and limits the number of items to four.


    The `foreach` loop now loops over the `$filtered` result. If you test the page
    again, you’ll see just four titles, as shown in Figure [7-5](#332054_4_En_7_Chapter.xhtml#Fig5).
    Don’t be surprised if the selection of headlines is different from before. The
    BBC News web site is updated every minute.


    ![../images/332054_4_En_7_Chapter/332054_4_En_7_Fig5_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Fig5_HTML.jpg)


    Figure 7-5. The `LimitIterator` restricts the number of items displayed


    7. Now that you have limited the number of items, amend the `foreach` loop to
    wrap the `<title>` elements in a link to the original article, then display the
    `<pubDate>` and `<description>` items. The loop looks like this:


    ```php

    foreach ($filtered as $item) { ?>

    link) ?>">

    title)?>

    pubDate) ?>

    description) ?>

    }

    ```


    8. Save the page and test it again. The links take you directly to the relevant
    news story on the BBC web site. The news feed is now functional, but the `<pubDate>`
    format follows the format laid down in the RSS specification, as shown in the
    next screenshot:


    ![../images/332054_4_En_7_Chapter/332054_4_En_7_Figm_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Figm_HTML.jpg)'
