  \n## 技巧 15-5：调用 API\n\n### 问题\n\n调用 API 时，通常需要传递参数才能返回特定元素的数据。参数可以作为 GET 参数传递（即直接以键值对的形式添加到请求\
  \ URI 中），也可以作为 POST 参数传递（即作为请求体中的键值对）。\n\n有些 API 要求使用 POST 请求，仅仅是为了让用户请求数据变得稍微困难一些（无法在浏览器地址栏中输入请求来使用`wget`获取数据）；还有一些\
  \ API 则要求设置特殊的请求头。那么，如何使用 PHP 和 JavaScript 来调用这类 API 呢？\n\n### 解决方案\n\n在 PHP 中，我们可以利用流上下文（stream\
  \ context）来设置请求方法，并添加请求头和请求体数据。在 JavaScript 中，我们可以使用 jQuery 库中的 `$.post()` 函数。当然，使用\
  \ `XMLHTTP` 对象也是可行的，但这会需要多写几行代码。出于安全原因，大多数情况下，浏览器会阻止 `XMLHTTP` 向 HTML 文档来源域以外的任何域发送请求。\n\
  \n### 实现原理\n\n第一个示例是一个 PHP 脚本，它构建了一个 HTML 表单，用户可以在其中输入端点 URI 以及若干键值对。该表单由 PHP 提交，用于创建\
  \ API 请求并显示请求结果。在处理 API 时，这可以作为一个简单的调试工具来使用。\n\n```php\n// 15_6.php\n$response =\
  \ null;\n\nif ($_POST) {\n    $params = [];\n    foreach($_POST['key'] as $i=>$key)\
  \ {\n        if (!empty($key) && array_key_exists($i, $_POST['value'])) {\n    \
  \        $params = \"$key=\" . urlencode($_POST['value'][$i]);\n        }\n    }\n\
  \n    $options = array('http' =>\n        array(\n            'method' => $_POST['method'],\n\
  \            'content' => implode(\"&\", $params)\n        )\n    );\n\n    $context\
  \ = stream_context_create($options);\n    $response = file_get_contents($_POST['url'],\
  \ false, $context);\n\n    switch ($_POST['response']) {\n        case 0 :\n   \
  \         $json = json_decode($response, true);\n            $response_text = json_encode($json,\
  \ JSON_PRETTY_PRINT);\n            break;\n        case 1:\n            $dom = dom_import_simplexml($response)->ownerDocument;\n\
  \            $dom->formatOutput = true;\n            $response_text = $dom->saveXML();\n\
  \            break;\n    }\n}\n\necho <<<HEREDOC\n<!DOCTYPE html>\n<html>\n<head>\n\
