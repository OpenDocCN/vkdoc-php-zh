    \ stored in a\ntext-related column type.\n\nNote\nSQL queries normally end with\
    \ a semicolon, which is an instruction to\nthe database to execute the query.\
    \ When using PHP, the semicolon must be\nomitted from the SQL. Consequently, stand-alone\
    \ examples of SQL are\npresented throughout this book without a concluding semicolon.\n\
    \nRefining the Data Retrieved by a SELECT query\nThe only SQL query you have run\
    \ so far retrieves all records from the\n`images` table.\nMuch of the time, you\
    \ want to be more selective.\n\nSelecting Specific Columns\n\nUsing an asterisk\
    \ to select all columns is a convenient shortcut, but\nyou should normally specify\
    \ only those columns you need. List the column\nnames separated by commas after\
    \ the `SELECT` keyword. For\nexample, this query selects only the `filename` and\
    \ `caption` fields for\neach record:\n\n```\nSELECT filename, caption FROM images\n\
    ```\n\nYou can test this in `mysqli_03.php` and\n`pdo_03.php` in\nthe `ch13`\n\
    folder.\n\nChanging the order of results\n\nTo control the sort order, add an\
    \ `ORDER BY` clause  with the name(s) of\nthe column(s) in order of precedence.\
    \ Separate multiple columns by\ncommas. The following query sorts the captions\
    \ from the `images` table in\nalphabetical order (the code is in `mysqli_04.php`\
    \ and\n`pdo_04.php)`:\n\n```\n$sql = 'SELECT * FROM images ORDER BY caption';\n\
    ```\n\nNote\nThis semicolon is part of the PHP statement, not part of the SQL\n\
    query.\n\nThe preceding query produces this output:\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figg_HTML.jpg](images/332054_4_En_13_Chapter/332054_4_En_13_Figg_HTML.jpg)\n\
    \nTo reverse the sort order, add the `DESC` (for\n“descending”) keyword like this\
    \ (there are examples in `mysqli_05.php` and\n`pdo_05.php`):\n\n```\n$sql = 'SELECT\
    \ * FROM images ORDER BY caption DESC';\n```\n\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figh_HTML.jpg](images/332054_4_En_13_Chapter/332054_4_En_13_Figh_HTML.jpg)\n\
    There is also an `ASC` (for “ascending”)\nkeyword. It’s the default sort order,\
    \ so is normally omitted.\n\nHowever, specifying `ASC` increases clarity\nwhen\
    \ columns in the same table are sorted in a different order. For\nexample, if\
    \ you publish multiple articles every day, you could use the\nfollowing query\
    \ to display titles in alphabetical order, but ordered by\nthe date of publication\
    \ with the most recent ones first:\n\n```\nSELECT * FROM articles\nORDER BY published\
    \ DESC, title ASC\n```\n\nSearching for Specific Values\n\nTo search for specific\
    \ values, add a `WHERE` clause  to the `SELECT` query. The\n`WHERE` clause\nfollows\
    \ the name of the table. For example, the query in `mysqli_06.php` and\n`pdo_06.php`\n\
    looks like this:\n\n```\n$sql = 'SELECT * FROM images\nWHERE image_id = 6';\n\
    ```\n\nNote\nSQL uses one equal sign to test for equality, unlike PHP, which uses\n\
    two."
  trans: "\n2.  删除页面主体中 `else` 代码块末尾的右花括号（大约在第 26 行）。虽然显示 `images` 表的代码大部分是 HTML，但它需要放在\
    \ `else` 代码块内部。\n\n3.  在结束 PHP 标签后插入一个空行，然后在新的一行中，通过一个单独的 PHP 代码块添加右花括号。修改后的代码应该如下所示：\n\
    \n```\n    } else {\n    echo \"A total of $numRows records were found.\";\n \
    \   ?>\n\n```\n\n4.  在 `pdo.php` 主体中的两个 PHP 代码块之间添加下表，使其受 `else` 代码块控制。这样做是为了防止\
    \ SQL 查询失败时出现错误。显示结果集的 PHP 代码以粗体显示。\n\n```\n\nimage_id\n    filename\n    caption\n\
    \nquery($sql) as $row) { ?>\n\n```\n\n5.  保存页面并在浏览器中查看。它应该看起来像 PHP 解决方案 13-3 中的截图。你可以将代码与\
    \ `ch13` 文件夹中的 `pdo_02.php` 进行比较。\n\n## PDO 连接速查表\n\n表 13-2 总结了使用 PDO 进行连接和数据库查询的基本细节。某些命令将在后续章节中使用，但此处一并列出以便参考。\n\
    \n**表 13-2.** 使用 PDO 进行数据库连接\n\n| 操作 | 用法 | 说明 |\n| --- | --- | --- |\n| 连接 |\
    \ `$conn = new PDO($DSN,$u,$p);` | 实际使用时需要三个参数：数据源名称 (DSN)、用户名、密码。必须包裹在 `try/catch`\
    \ 代码块中。 |\n| 提交 `SELECT` 查询 | `$result = $conn->query($sql);` | 以 `PDOStatement`\
    \ 对象的形式返回结果。 |\n| 提取记录 | `foreach($conn->query($sql) as $row) {` | 一次操作中提交 `SELECT`\
    \ 查询并将当前行作为关联数组获取。 |\n| 统计结果数 | `$numRows = $result->rowCount()` | 在 MySQL/MariaDB\
    \ 中，返回 `SELECT` 查询的结果数量。大多数其他数据库不支持。 |\n| 获取单个结果 | `$item = $result->fetchColumn();`\
    \ | 获取结果第一列的第一条记录。要获取其他列的结果，请将列号（从 0 开始计数）作为参数传入。 |\n| 获取下一条记录 | `$row = $result->fetch();`\
    \ | 从结果集中将下一行作为关联数组获取。 |\n| 释放数据库资源 | `$result->closeCursor();` | 释放连接以允许执行新查询。\
    \ |\n| 提交非 `SELECT` 查询 | `$affected = $conn->exec($sql);` | 虽然 `query()` 可用于非\
    \ `SELECT` 查询，但 `exec()` 会返回受影响的行数。 |\n\n## 使用 SQL 与数据库交互\n\n正如你刚看到的，PHP 负责连接数据库、发送查询并接收结果，但查询本身需要用\
    \ SQL 编写。尽管 SQL 是一种通用标准，但它有许多方言。包括 MySQL 在内的每个数据库供应商都对标准语言进行了扩展。这些扩展提高了效率和功能性，但通常与其他数据库不兼容。本书中的\
    \ SQL 适用于 MySQL 5.1 或更高版本以及 MariaDB，但不一定适用于 Microsoft SQL Server、Oracle 或其他数据库。\n\
    \n### 编写 SQL 查询\n\nSQL 语法规则不多，而且都很简单。\n\n#### SQL 关键字不区分大小写\n\n从 `images` 表中检索所有记录的查询如下所示：\n\
    \n```\nSELECT * FROM images\n```\n\n大写的单词是 SQL 关键字。这纯粹是一种约定俗成的写法。以下写法都是正确的：\n\n\
    ```\nSELECT * FROM images\nselect * from images\nSeLEcT * fRoM images\n```\n\n\
    虽然 SQL 关键字不区分大小写，但这*不*适用于数据库列名。使用大写字母作为关键字的优点在于能使 SQL 查询更易于阅读。你可以自由选择最适合自己的风格，但最后一种类似勒索信的风格最好避免使用。\n\
    \n#### 空格会被忽略\n\n这允许你将 SQL 查询分散在多行以提高可读性。唯一*不允许*存在空格的地方是函数名和左括号之间。以下写法会报错：\n\n\
    ```\nSELECT COUNT (*) FROM images  /* 错误示例 */\n```\n\n空格需要像这样去掉：\n\n```\nSELECT\
    \ COUNT(*) FROM images  /* 正确 */\n```\n\n你可能已从这些示例中猜到，可以通过将注释放在 `/*` 和 `*/` 之间来为\
    \ SQL 查询添加注释。\n\n#### 字符串必须加引号\n\n在 SQL 查询中，所有字符串都必须加引号。使用单引号还是双引号无关紧要，只要成对匹配即可。不过，通常最好使用\
    \ MySQLi 或 PDO 的预处理语句，本章稍后将对此进行说明。\n\n#### 处理数字\n\n一般来说，数字不应加引号，因为引号内的任何内容都是字符串。但是，MySQL\
    \ 接受用引号括起来的数字，并将其视为等效的数字。请务必注意区分真正的数字和由数字组成的其他数据类型。例如，日期由数字组成，但应括在引号中并存储在日期相关的列类型中。同样，电话号码应括在引号中并存储在文本相关的列类型中。\n\
    \n#### 注意\n\nSQL 查询通常以分号结尾，这是指示数据库执行查询的指令。在使用 PHP 时，必须从 SQL 中省略分号。因此，本书中独立的 SQL\
    \ 示例在呈现时都不带结束分号。\n\n## 优化 SELECT 查询检索的数据\n\n到目前为止，你运行过的唯一 SQL 查询是从 `images` 表中检索所有记录。大多数情况下，你需要更有选择性。\n\
    \n### 选择特定列\n\n使用星号选择所有列是一种便捷的快捷方式，但通常应只指定所需的列。在 `SELECT` 关键字之后列出列名，并用逗号分隔。例如，此查询仅选择每条记录的\
    \ `filename` 和 `caption` 字段：\n\n```\nSELECT filename, caption FROM images\n```\n\
    \n你可以在 `ch13` 文件夹中的 `mysqli_03.php` 和 `pdo_03.php` 中测试这一点。\n\n### 更改结果排序顺序\n\n\
    要控制排序顺序，请添加一个 `ORDER BY` 子句，其中按优先级顺序包含一个或多个列名。多个列名用逗号分隔。以下查询按字母顺序对 `images` 表中的标题进行排序（代码位于\
    \ `mysqli_04.php` 和 `pdo_04.php` 中）：\n\n```\n$sql = 'SELECT * FROM images ORDER\
    \ BY caption';\n```\n\n**注意**\n此处的分号是 PHP 语句的一部分，不是 SQL 查询的一部分。\n\n上述查询产生如下输出：\n\
    ![../images/332054_4_En_13_Chapter/332054_4_En_13_Figg_HTML.jpg](img/332054_4_En_13_Figg_HTML.jpg)\n\
    \n要反转排序顺序，请像这样添加 `DESC`（表示“降序”）关键字（`mysqli_05.php` 和 `pdo_05.php` 中有示例）：\n\n```\n\
    $sql = 'SELECT * FROM images ORDER BY caption DESC';\n```\n\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figh_HTML.jpg](img/332054_4_En_13_Figh_HTML.jpg)\n\
    \n还有一个 `ASC`（表示“升序”）关键字。它是默认的排序顺序，因此通常省略。\n\n然而，当同一表中的列以不同顺序排序时，指定 `ASC` 可以提高清晰度。例如，如果你每天发布多篇文章，可以使用以下查询按字母顺序显示标题，但按发布日期排序，最新的在前：\n\
    \n```\nSELECT * FROM articles\nORDER BY published DESC, title ASC\n```\n\n###\
    \ 搜索特定值\n\n要搜索特定值，请在 `SELECT` 查询中添加一个 `WHERE` 子句。`WHERE` 子句跟在表名之后。例如，`mysqli_06.php`\
    \ 和 `pdo_06.php` 中的查询如下所示：\n\n```\n$sql = 'SELECT * FROM images\nWHERE image_id\
    \ = 6';\n```\n\n**注意**\nSQL 使用一个等号来测试相等性，这与 PHP 使用两个等号不同。\n"
- fmt: "It produces the following result:  \n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figi_HTML.jpg](images/332054_4_En_13_Chapter/332054_4_En_13_Figi_HTML.jpg)\n\
    \nIn addition to testing for equality, a `WHERE` clause can use comparison operators,\
    \ such as greater than (`>`) and less than (`<`). Rather than go through all the\
    \ options now, I’ll introduce others as needed. Chapter [15](#332054_4_En_15_Chapter.xhtml)\
    \ has a comprehensive roundup of the four main SQL commands: `SELECT`, `INSERT`,\
    \ `UPDATE`, and `DELETE`, including a list of the main comparison operators used\
    \ with `WHERE`.\n\nIf used in combination with `ORDER BY`, the `WHERE` clause\
    \ must come first. For example (the code is in `mysqli_07.php` and `pdo_07.php`):\n\
    \n```\n$sql = 'SELECT * FROM images\nWHERE image_id > 5\nORDER BY caption DESC';\n\
    ```\n\nThis selects the three images that have an `image_id` greater than 5 and\
    \ sorts them by their captions in reverse order.\n\n## Searching for text with\
    \ Wildcard Characters\n\nIn SQL, the percentage sign (`%`) is a wildcard character\
    \ that matches anything or nothing. It’s used in a `WHERE` clause in conjunction\
    \ with the `LIKE` keyword.\n\nThe query in `mysqli_08.php` and `pdo_08.php` looks\
    \ like this:\n\n```\n$sql = 'SELECT * FROM images\nWHERE caption LIKE \"%Kyoto%\"\
    ';\n```\n\nIt searches for all records in the `images` table where the `caption`\
    \ column contains “Kyoto,” and produces the following result:  \n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figj_HTML.jpg](images/332054_4_En_13_Chapter/332054_4_En_13_Figj_HTML.jpg)\n\
    \nAs the preceding screenshot shows, it finds six records out of the eight in\
    \ the `images` table. All the captions end with “Kyoto,” so the wildcard character\
    \ at the end is matching nothing, whereas the wildcard at the beginning matches\
    \ the rest of each caption. If you omit the leading wildcard (`\"Kyoto%\"`), the\
    \ query searches for captions that begin with “Kyoto.” None of them do, so you\
    \ get no results from the search.\n\nThe query in `mysqli_09.php` and `pdo_09.php`\
    \ looks like this:\n\n```\n$sql = 'SELECT * FROM images\nWHERE caption LIKE \"\
    %maiko%\"';\n```\n\nIt produces the following result:  \n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figk_HTML.jpg](images/332054_4_En_13_Chapter/332054_4_En_13_Figk_HTML.jpg)\n\
    \nThe query spells “maiko” all in lowercase, but the query also finds it with\
    \ an initial capital. Searches with `LIKE` are case-insensitive.\n\nTo perform\
    \ a case-sensitive search, you need to add the `BINARY` keyword like this (the\
    \ code is in `mysqli_10.php` and `pdo_10.php`):\n\n```\n$sql = 'SELECT * FROM\
    \ images\nWHERE caption LIKE BINARY \"%maiko%\"';\n```\n\nAll the examples you\
    \ have seen so far have been hard-coded, but most of the time, the values used\
    \ in SQL queries need to come from user input. Unless you’re careful, this puts\
    \ you at risk of a malicious exploit known as SQL injection. The rest of this\
    \ chapter explains this danger and how to avoid it.\n\n## Understanding the Danger\
    \ of SQL Injection\n\n**SQL injection** is very similar to the email header injection\
    \ I warned you about in Chapter [6](#332054_4_En_6_Chapter.xhtml). An injection\
    \ attack tries to insert spurious conditions into an SQL query in an attempt to\
    \ expose or corrupt your data. The meaning of the following query should be easy\
    \ to understand:\n\n```\nSELECT * FROM users WHERE username = 'xyz' AND pwd =\
    \ 'abc'\n```\n\nIt’s the basic pattern for a login application. If the query finds\
    \ a record where `username` is `xyz` and `pwd` is `abc`, you know that a correct\
    \ combination of username and password have been submitted, so the login succeeds.\
    \ All an attacker needs to do is inject an extra condition like this:\n\n```\n\
    SELECT * FROM users WHERE username = 'xyz' AND pwd = 'abc' OR 1 = 1\n```\n\nThe\
    \ `OR` means that only one of the conditions needs to be true, so the login succeeds\
    \ even without a correct username and password. SQL injection relies on quotes\
    \ and other control characters not being properly escaped when part of the query\
    \ is derived from a variable or user input.\n\nThere are several strategies you\
    \ can adopt to prevent SQL injection, depending on the situation:\n\n*   If the\
    \ variable is an integer (e.g., the primary key of a record), use `is_numeric()`\
    \ and the `(int)` casting operator to ensure it’s safe to insert in the query.\n\
    *   Use a **prepared statement**. In a prepared statement, placeholders in the\
    \ SQL query represent values that come from user input. The PHP code automatically\
    \ wraps strings in quotes and escapes embedded quotes and other control characters.\
    \ The syntax is different for MySQLi and PDO.\n*   None of the preceding strategies\
    \ is suitable for column names, which must not be enclosed in quotes. To use a\
    \ variable for column names, create an array of acceptable values and check that\
    \ the submitted value is in the array before inserting it into the query.\n\n\
    Let’s take a look at using each of these techniques.\n\n**Note**  \nI have not\
    \ included the MySQLi `real_escape_string()` or the PDO `quote()` methods as techniques\
    \ for preventing SQL injection because neither provides bulletproof protection.\
    \ Use prepared statements to embed values from user input into SQL queries.\n\n\
    ## PHP Solution 13-6: Inserting an integer from User Input into a query\n\nThis\
    \ PHP solution shows how to sanitize a variable from user input to make sure it\
    \ contains only an integer before inserting the value into an SQL query. The technique\
    \ is the same for both MySQLi and PDO.\n\n1.  Copy either `mysqli_integer_01.php`\
    \ or `pdo_integer_01.php` from the `ch13` folder to the `mysqli` or `pdo` folder,\
    \ and remove the `_01` from the filename. Each file contains an SQL query that\
    \ selects the `image_id` and `filename` columns from the `images` table. In the\
    \ body of the page, there’s a form with a drop-down menu that is populated by\
    \ a loop that runs through the results of the SQL query. The MySQLi version looks\
    \ like this:\n\n    ```\n    <?php while ($row = $result->fetch_assoc()) { ?>\n\
    \        <option value=\"<?= $row['image_id'] ?>\" <?php if ($_GET['image_id']\
    \ == $row['image_id']) echo 'selected' ?>>\n            <?= $row['filename'] ?>\n\
    \        </option>\n    <?php } ?>\n    ```\n\nThe form uses the `get` method\
    \ and assigns the `image_id` to the `value` attribute of the `<option>` tags.\
    \ If `$_GET['image_id']` has the same value as `$row['image_id']`, the current\
    \ `image_id` is the same as that passed through the page’s query string, so the\
    \ `selected` attribute is added to the opening `<option>` tag. The value of `$row['filename']`\
    \ is inserted between the opening and closing `<option>` tags.\n\nThe PDO version\
    \ is identical apart from the fact that it runs the query directly in a `foreach`\
    \ loop using the PDO `fetch()` method.\n\nIf you load the page into a browser,\
    \ you’ll see a drop-down menu that lists the files in the `images` folder like\
    \ this:  \n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figl_HTML.jpg](images/332054_4_En_13_Chapter/332054_4_En_13_Figl_HTML.jpg)\n\
    \n2.  Insert the following code immediately after the closing `</form>` tag. The\
    \ code is the same for both MySQLi and PDO, apart from one line.\n\n    ```\n\
    \    <?php\n    if (isset($_GET['image_id'])) {\n        $image_id = (int) $_GET['image_id'];\n\
    \        $error = ($image_id == 0) ? true : false;\n        if (!$error) {\n \
    \           $sql = \"SELECT filename, caption FROM images WHERE image_id = $image_id\"\
    ;\n            $result = $conn->query($sql);\n            $row = $result->fetch_assoc();\n\
    \            ?>\n            <h2><?= $row['caption'] ?></h2>\n            <img\
    \ src=\"images/<?= $row['filename'] ?>\" alt=\"<?= $row['caption'] ?>\">\n   \
    \         <?php\n        } else {\n            echo 'Image not found';\n     \
    \   }\n    }\n    ?>\n    ```\n\nThe conditional statement checks whether `image_id`\
    \ has been sent through the `$_GET` array. If it has, it’s assigned to `$image_id`\
    \ using the `(int)` casting operator. Using the casting operator serves two purposes:\
    \ it prevents attempts to probe your script for error messages by submitting a\
    \ floating-point number, and it converts non-numeric values to 0.\n\nThe next\
    \ line uses the ternary operator to set `$error` to `true` or `false` depending\
    \ on whether `$image_id` is 0.\n\nIf `$error` is `false`, the script queries the\
    \ database and displays the selected image and caption. Since you know `$image_id`\
    \ is an integer, it’s safe to insert directly in the SQL query. Because it’s a\
    \ number, it doesn’t need to be wrapped in quotes, but the string assigned to\
    \ `$sql` needs to use double quotes to ensure the value of `$image_id` is inserted\
    \ into the query."
