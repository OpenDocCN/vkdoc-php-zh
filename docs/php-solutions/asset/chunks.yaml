- fmt: '### PHP Solution 4-6: Displaying a Random Image


    Displaying a random image is very easy. All you need is a list of available images,
    which you store in an indexed array (see “Creating arrays” in [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html)).
    Since indexed arrays are numbered from 0, you can select one of the images by
    generating a random number between 0 and one less than the length of the array.
    All this is accomplished by a few lines of code...


    Continue using the same files. Alternatively, use `index_03.php` from the `ch04`
    folder and rename it `index.php`. Since `index_03.php` uses `title.php`, `menu.php`,
    and `footer.php`, make sure all three files are in your `includes` folder. The
    images are already in the `images` folder.


    Create a blank PHP page in the `includes` folder and name it `random_image.php`.
    Insert the following code (it’s also in `random_image_01.php` in the `ch04` folder):


    ```php

    <?php


    $images = [''kinkakuji'', ''maiko'', ''maiko_phone'', ''monk'', ''fountains'',


    ''ryoanji'', ''menu'', ''basin''];


    $i = rand(0, count($images)-1);


    $selectedImage = "images/{$images[$i]}.jpg";

    ```


    This is the complete script: an array of image names minus the `.jpg` filename
    extension (there’s no need to repeat shared information—they’re all JPEG), a random
    number generator, and a string that builds the correct path name for the selected
    file.


    **Note:** This script uses the shorthand array syntax that was introduced in PHP
    5.4.


    To generate a random number within a range, pass the minimum and maximum numbers
    as arguments to the `rand()` function. Since there are eight images in the array,
    you need a number between 0 and 7. The simple way to do this would be to use `rand(0,
    7)` — simple, but inefficient. Every time you change the `$images` array, you
    need to count how many elements it contains and change the maximum number passed
    to `rand()`.


    It’s much easier to get PHP to count them for you, and that’s exactly what the
    `count()` function does: it counts the number of elements in an array. You need
    a number one less than the number of elements in the array, so the second argument
    passed to `rand()` becomes `count($images)-1`, and the result is stored in `$i`.


    The random number is used in the final line to build the correct path name for
    the selected file. The variable `$images[$i]` is embedded in a double-quoted string
    with no whitespace separating it from surrounding characters, so it’s enclosed
    in curly braces. Arrays start at 0, so if the random number is 1, `$selectedImage`
    is `images/maiko.jpg`.


    If you’re new to PHP, you may find it difficult to understand code like this:


    ```php

    $i = rand(0, count($images)-1);

    ```


    All that’s happening is that the second argument passed to `rand()` is an expression
    rather than a number. If it makes it easier for you to follow, rewrite the code
    like this:


    ```php

    $numImages = count($images); // $numImages is 8

    $max = $numImages - 1;       // $max is 7

    $i = rand(0, $max);          // $i = rand(0, 7)

    ```


    Open `index.php` and include `random_image.php` by inserting the command in the
    same code block as `title.php`, like this:


    ```php

    <?php include ''./includes/title.php'';

    include ''./includes/random_image.php''; ?>

    ```


    Since `random_image.php` doesn’t send any direct output to the browser, it’s safe
    to put it above the `DOCTYPE`.


    Scroll down inside `index.php`, and locate the code that displays the image in
    the `<figure>` element. It looks like this:


    ```html

    <figure>

    <img src="images/basin.jpg" alt="Water basin at Ryoanji temple"

    width="350" height="237">

    <figcaption>Water basin at Ryoanji temple</figcaption>

    </figure>

    ```


    Instead of using `images/basin.jpg` as a fixed image, replace it with `$selectedImage`.
    All the images have different dimensions, so delete the `width` and `height` attributes
    and use a generic `alt` attribute. Also remove the text in the `<figcaption>`
    element. The code in step 3 should now look like this:


    ```html

    <figure>

    <img src="<?= $selectedImage; ?>" alt="Random image">

    <figcaption></figcaption>

    </figure>

    ```


    **Note:** The PHP block displays only a single value, so you can use the shortcut
    `<?=`.


    ![A978-1-4842-0635-5_4_Fig10_HTML.jpg](A978-1-4842-0635-5_4_Fig10_HTML.jpg)


    **Figure 4-10.** Storing image filenames in an indexed array makes it easy to
    display a random image


    Save both `random_image.php` and `index.php`, then load `index.php` into a browser.
    The image should now be chosen at random. Click the Reload button in your browser;
    you should see a variety of images, as shown in Figure [4-10](#A978-1-4842-0635-5_4_Chapter.html#Fig10).


    You can check your code against `index_04.php` and `random_image_01.php` in the
    `ch04` folder.


    This is a simple and effective way of displaying a random image, but it would
    be much better if you could set the width and height for different-sized images
    dynamically, as well as add a caption to describe the image.'
