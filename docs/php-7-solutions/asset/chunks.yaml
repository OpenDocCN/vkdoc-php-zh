    \ you\nget no results from the search.\n\nThe query in `mysqli_09.php` and\n`pdo_09.php`\n\
    looks like this:\n\n```\n$sql = 'SELECT * FROM images\nWHERE caption LIKE \"%maiko%\"\
    ';\n```\n\nIt produces the following result:\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figk_HTML.jpg](images/332054_4_En_13_Chapter/332054_4_En_13_Figk_HTML.jpg)\n\
    The query spells “maiko” all in lowercase, but the query also finds\nit with an\
    \ initial capital. Searches with `LIKE` are\ncase-insensitive.\n\nTo perform a\
    \ case-sensitive search, you need to add the `BINARY` keyword like\nthis (the\
    \ code is in `mysqli_10.php` and\n`pdo_10.php`):\n\n```\n$sql = 'SELECT * FROM\
    \ images\nWHERE caption LIKE BINARY \"%maiko%\"';\n```\n\nAll the examples you\
    \ have seen so far have been hard-coded, but most\nof the time, the values used\
    \ in SQL queries need to come from user\ninput. Unless you’re careful, this puts\
    \ you at risk of a malicious\nexploit known as SQL injection. The rest of this\
    \ chapter explains this\ndanger and how to avoid it.\n\nUnderstanding the Danger\
    \ of SQL Injection\n\n**SQL\ninjection**  is very similar to the email header\
    \ injection\nI warned you about in Chapter [6](#332054_4_En_6_Chapter.xhtml).\
    \ An injection attack tries to\ninsert spurious conditions into an SQL query in\
    \ an attempt to expose or\ncorrupt your data. The meaning of the following query\
    \ should be easy to\nunderstand:\n\n```\nSELECT * FROM users WHERE username =\
    \ 'xyz' AND pwd = 'abc'\n```\n\nIt’s the basic pattern for a login application.\
    \ If the query finds a\nrecord where `username` is `xyz` and `pwd` is `abc`, you\
    \ know that a\ncorrect combination of username and password have been submitted,\
    \ so the\nlogin succeeds. All an attacker needs to do is inject an extra condition\n\
    like this:\n\n```\nSELECT * FROM users WHERE username = 'xyz' AND pwd = 'abc'\
    \ OR 1 = 1\n```\n\nThe `OR` means\nthat only one of the conditions needs to be\
    \ true, so the login succeeds\neven without a correct username and password. SQL\
    \ injection relies on\nquotes and other control characters not being properly\
    \ escaped when part\nof the query is derived from a variable or user input.\n\n\
    There are several strategies you can adopt to prevent SQL injection,\ndepending\
    \ on the situation:\n\n*   If the variable is an integer (e.g., the primary key\
    \ of a\n    record), use `is_numeric()` and the\n    `(int)` casting\n    operator\
    \ to ensure it’s safe to insert in the query.\n\n*   Use a \n    **prepared statement**\
    \ . In a prepared statement,\n    placeholders in the SQL query represent values\
    \ that come from user\n    input. The PHP code automatically wraps strings in\
    \ quotes and escapes\n    embedded quotes and other control characters. The syntax\
    \ is different\n    for MySQLi and PDO.\n\n*   None of the preceding strategies\
    \ is suitable for column names,\n    which must not be enclosed in quotes. To\
    \ use a variable for column\n    names, create an array of acceptable values and\
    \ check that the submitted\n    value is in the array before inserting it into\
    \ the query.\n\nLet’s take a look at using each of these techniques.\n\nNote\n\
    I have not included the MySQLi `real_escape_string()`\nor the PDO `quote()` methods\
    \ as\ntechniques for preventing SQL injection because neither provides\nbulletproof\
    \ protection. Use prepared statements to embed values from\nuser input into SQL\
    \ queries.\n\nPHP Solution 13-6: Inserting an integer from User\nInput into a\
    \ query\n\nThis PHP solution shows how to sanitize a variable from user input\
    \ to\nmake sure it contains only an integer before inserting the value into an\n\
    SQL query. The technique is the same for both MySQLi and PDO.\n\n1.  Copy either\
    \ `mysqli_integer_01.php`\n    or `pdo_integer_01.php`\n    from the `ch13`\n\
    \    folder to the `mysqli` or `pdo` folder, and\n    remove the `_01`\n    from\
    \ the filename. Each file contains an SQL query that selects the\n    `image_id`\
    \ and\n    `filename`\n    columns from the `images` table. In the\n    body of\
    \ the page, there’s a form with a drop-down menu that is populated\n    by a loop\
    \ that runs through the results of the SQL query. The MySQLi\n    version looks\
    \ like this:\n\n```\n\nfetch_assoc()) { ?>\n    \"\n\n>\n\n```\n\nThe form uses\
    \ the `get` method and\n    assigns the `image_id` to the `value` attribute of\n\
    \    the `<option>` tags.\n    If `$_GET['image_id']` has\n    the same value\
    \ as `$row['image_id']`, the\n    current `image_id` is the same\n    as that\
    \ passed through the page’s query string, so the `selected` attribute is\n   \
    \ added to the opening `<option>`\n    tag . The value\n    of `$row['filename']`\
    \ is\n    inserted between the opening and closing `<option>`\n    tags.\n\nThe\
    \ PDO version is identical apart from the fact that it runs the\n    query directly\
    \ in a `foreach` loop using\n    the PDO `fetch()`\n    method.\n\nIf you load\
    \ the page into a browser, you’ll see a drop-down menu that\n    lists the files\
    \ in the `images` folder like\n    this:\n\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figl_HTML.jpg](images/332054_4_En_13_Chapter/332054_4_En_13_Figl_HTML.jpg)\n\
    \n1.  Insert the following code immediately after the closing `</form>` tag.\n\
    \    The code is the same for both MySQLi and PDO, apart from one line.\n\n```\n\
    \    query($sql);\n    $row = $result->fetch_assoc();\n    ?>\n    \">\n\nImage\
    \ not found';\n    }\n    } ?>\n    ```\n\nThe conditional\n    statement checks\
    \ whether `image_id` has been\n    sent through the `$_GET` array. If it\n   \
    \ has, it’s assigned to `$image_id` using the\n    `(int)` casting\n    operator.\
    \ Using the casting operator serves two purposes: it prevents\n    attempts to\
    \ probe your script for error messages by submitting a\n    floating-point number,\
    \ and it converts non-numeric values to 0.\n\nThe next line uses the ternary operator\
    \ to set `$error` to `true` or `false` depending on\n    whether $image_id is\
    \ 0.\n\nIf `$error` is\n    `false`, the\n    script queries the database and\
    \ displays the selected image and caption.\n    Since you know `$image_id` is\
    \ an\n    integer, it’s safe to insert directly in the SQL query. Because it’s\
    \ a\n    number, it doesn’t need to be wrapped in quotes, but the string assigned\n\
    \    to `$sql` needs\n    to use double quotes to ensure the value of `$image_id`\
    \ is inserted\n    into the query."
  trans: "\n它会产生如下结果：  \n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figi_HTML.jpg](img/332054_4_En_13_Figi_HTML.jpg)\n\
    \n除了测试相等性外，`WHERE` 子句还可以使用比较运算符，例如大于（`>`）和小于（`<`）。这里不一一列举所有选项，我将在需要时再介绍其他运算符。第\
    \ 15 章对四个主要的 SQL 命令：`SELECT`、`INSERT`、`UPDATE` 和 `DELETE` 进行了全面总结，其中包含与 `WHERE`\
    \ 一起使用的主要比较运算符列表。\n\n如果与 `ORDER BY` 结合使用，`WHERE` 子句必须放在前面。例如（代码位于 `mysqli_07.php`\
    \ 和 `pdo_07.php` 中）：\n\n```\n$sql = 'SELECT * FROM images\nWHERE image_id > 5\n\
    ORDER BY caption DESC';\n```\n\n这会选择 `image_id` 大于 5 的三张图片，并按说明文字的降序对它们进行排序。\n\
    \n## 使用通配符搜索文本\n\n在 SQL 中，百分号（`%`）是一个通配符，可以匹配任何内容或不匹配任何内容。它与 `LIKE` 关键字一起在 `WHERE`\
    \ 子句中使用。\n\n位于 `mysqli_08.php` 和 `pdo_08.php` 中的查询语句如下：\n\n```\n$sql = 'SELECT\
    \ * FROM images\nWHERE caption LIKE \"%Kyoto%\"';\n```\n\n它会搜索 `images` 表中所有 `caption`\
    \ 列包含“Kyoto”的记录，并产生如下结果：  \n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figj_HTML.jpg](img/332054_4_En_13_Figj_HTML.jpg)\n\
    \n如上截图所示，它会从 `images` 表的八条记录中找到六条。所有说明文字都以“Kyoto”结尾，因此结尾处的通配符未匹配任何内容，而开头的通配符则匹配了每条说明文字的其余部分。如果省略开头的通配符（`\"\
    Kyoto%\"`），查询将搜索以“Kyoto”开头的说明文字。但没有一条记录以“Kyoto”开头，因此搜索不会返回任何结果。\n\n位于 `mysqli_09.php`\
    \ 和 `pdo_09.php` 中的查询语句如下：\n\n```\n$sql = 'SELECT * FROM images\nWHERE caption\
    \ LIKE \"%maiko%\"';\n```\n\n它会产生如下结果：  \n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figk_HTML.jpg](img/332054_4_En_13_Figk_HTML.jpg)\n\
    \n查询中“maiko”全部是小写字母，但查询也能找到首字母大写的记录。使用 `LIKE` 的搜索是不区分大小写的。\n\n要执行区分大小写的搜索，需要添加\
    \ `BINARY` 关键字，如下所示（代码位于 `mysqli_10.php` 和 `pdo_10.php` 中）：\n\n```\n$sql = 'SELECT\
    \ * FROM images\nWHERE caption LIKE BINARY \"%maiko%\"';\n```\n\n到目前为止，您看到的所有示例都是硬编码的，但大多数情况下，SQL\
    \ 查询中使用的值需要来自用户输入。如果不加注意，这会使您面临一种称为 **SQL 注入** 的恶意利用风险。本章的其余部分将解释这种危险以及如何避免它。\n\
    \n## 理解 SQL 注入的危险\n\n**SQL 注入** 与我在第 6 章中告诫过您的电子邮件头注入非常相似。注入攻击试图在 SQL 查询中插入虚假条件，以试图暴露或破坏您的数据。以下查询的含义应该很容易理解：\n\
    \n```\nSELECT * FROM users WHERE username = 'xyz' AND pwd = 'abc'\n```\n\n这是登录应用程序的基本模式。如果查询找到一条\
    \ `username` 为 `xyz` 且 `pwd` 为 `abc` 的记录，则表明提交了正确的用户名和密码组合，因此登录成功。攻击者所需要做的只是像这样注入一个额外条件：\n\
    \n```\nSELECT * FROM users WHERE username = 'xyz' AND pwd = 'abc' OR 1 = 1\n```\n\
    \n`OR` 意味着只需要其中一个条件为真，因此即使没有正确的用户名和密码，登录也会成功。SQL 注入依赖于当部分查询源自变量或用户输入时，引号和其他控制字符未被正确转义。\n\
    \n根据具体情况，您可以采用几种策略来防止 SQL 注入：\n\n*   如果变量是整数（例如，记录的主键），请使用 `is_numeric()` 和 `(int)`\
    \ 转型运算符来确保将其插入查询是安全的。\n*   使用**预准备语句**。在预准备语句中，SQL 查询中的占位符代表来自用户输入的值。PHP 代码会自动将字符串包裹在引号中，并转义嵌入的引号和其他控制字符。MySQLi\
    \ 和 PDO 的语法不同。\n*   前述策略均不适用于列名，因为列名不能加引号。要将变量用作列名，请创建一个可接受值的数组，并在将其插入查询之前检查提交的值是否在该数组中。\n\
    \n让我们来看一下这些技术的每一种用法。\n\n**注意**  \n我没有将 MySQLi 的 `real_escape_string()` 或 PDO 的\
    \ `quote()` 方法列为防止 SQL 注入的技术，因为两者都不能提供万无一失的保护。请使用预准备语句将用户输入的值嵌入到 SQL 查询中。\n\n\
    ## PHP 解决方案 13-6：将用户输入的整数插入查询\n\n该 PHP 解决方案演示了如何在将用户输入的值插入 SQL 查询之前，对其进行清理以确保该值只包含整数。该技术对于\
    \ MySQLi 和 PDO 是相同的。\n\n1.  将 `ch13` 文件夹中的 `mysqli_integer_01.php` 或 `pdo_integer_01.php`\
    \ 复制到 `mysqli` 或 `pdo` 文件夹，并从文件名中删除 `_01`。每个文件都包含一个从 `images` 表中选择 `image_id`\
    \ 和 `filename` 列的 SQL 查询。在页面的主体部分，有一个包含下拉菜单的表单，该菜单由一个循环填充，该循环遍历 SQL 查询的结果。MySQLi\
    \ 版本如下所示：\n\n    ```\n    <?php while ($row = $result->fetch_assoc()) { ?>\n \
    \       <option value=\"<?= $row['image_id'] ?>\" <?php if ($_GET['image_id']\
    \ == $row['image_id']) echo 'selected' ?>>\n            <?= $row['filename'] ?>\n\
    \        </option>\n    <?php } ?>\n    ```\n\n表单使用 `get` 方法，并将 `image_id` 分配给\
    \ `<option>` 标签的 `value` 属性。如果 `$_GET['image_id']` 的值与 `$row['image_id']` 的值相同，则当前的\
    \ `image_id` 与通过页面查询字符串传递的相同，因此会将 `selected` 属性添加到开头的 `<option>` 标签中。`$row['filename']`\
    \ 的值被插入在开头的 `<option>` 和结尾的 `</option>` 标签之间。\n\nPDO 版本除了使用 PDO 的 `fetch()` 方法直接在\
    \ `foreach` 循环中运行查询这一点不同外，其他完全相同。\n\n如果在浏览器中加载该页面，您会看到一个列出 `images` 文件夹中文件的下拉菜单，如下所示：\
    \  \n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figl_HTML.jpg](img/332054_4_En_13_Figl_HTML.jpg)\n\
    \n2.  在结束的 `</form>` 标签之后立即插入以下代码。除了其中一行之外，该代码对于 MySQLi 和 PDO 是相同的。\n\n    ```\n\
    \    <?php\n    if (isset($_GET['image_id'])) {\n        $image_id = (int) $_GET['image_id'];\n\
    \        $error = ($image_id == 0) ? true : false;\n        if (!$error) {\n \
    \           $sql = \"SELECT filename, caption FROM images WHERE image_id = $image_id\"\
    ;\n            $result = $conn->query($sql);\n            $row = $result->fetch_assoc();\n\
    \            ?>\n            <h2><?= $row['caption'] ?></h2>\n            <img\
    \ src=\"images/<?= $row['filename'] ?>\" alt=\"<?= $row['caption'] ?>\">\n   \
    \         <?php\n        } else {\n            echo 'Image not found';\n     \
    \   }\n    }\n    ?>\n    ```\n\n条件语句检查 `image_id` 是否已通过 `$_GET` 数组发送。如果已发送，则使用\
    \ `(int)` 转型运算符将其赋值给 `$image_id`。使用转型运算符有两个目的：它可以防止通过提交浮点数来尝试探测脚本的错误消息，并将非数值转换为\
    \ 0。\n\n下一行使用三元运算符，根据 `$image_id` 是否为 0 将 `$error` 设置为 `true` 或 `false`。\n\n如果\
    \ `$error` 为 `false`，脚本将查询数据库并显示选中的图片和说明文字。由于您知道 `$image_id` 是一个整数，因此可以直接将其插入\
    \ SQL 查询中，这是安全的。因为它是一个数字，所以不需要用引号包裹，但赋值给 `$sql` 的字符串需要使用双引号，以确保 `$image_id` 的值被插入到查询中。\n"
- fmt: "# 文档排版结果\n\nThe new query is submitted to MySQL by the `query()` method, and\
    \ the result is stored in `$row`. Finally, `$row['filename']` and `$row['caption']`\
    \ are used to display the image and its caption in the page.\n\nHowever, if `$error`\
    \ is `true`, the final conditional statement displays “Image not found.”\n\n**Tip** I\
    \ opted for a separate conditional statement to display “Image not found” because\
    \ I plan to check for another error later, and I want to use the same error message\
    \ for both.\n\n2. If you are using the PDO version, locate this line:\n\n```\n\
    $row = $result->fetch_assoc();\n```\n\nChange it to this:\n\n```\n$row = $result->fetch();\n\
    ```\n\n3. Save the page and load it into a browser. When the page first loads,\
    \ only the drop-down menu is displayed.\n\n4. Select a filename from the drop-down\
    \ menu and click `Display`. The image of your choice should be displayed, as shown\
    \ in the following screenshot:\n\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figm_HTML.jpg](images/332054_4_En_13_Chapter/332054_4_En_13_Figm_HTML.jpg)\n\
    \nIf you encounter problems, check your code against `mysqli_integer_02.php` or\
    \ `pdo_integer_02.php` in the `ch13` folder.\n\n5. Edit the query string in the\
    \ browser, changing the value of `image_id` to a string. You should see “Image\
    \ not found.” However, if the string begins with a number between 1 and 8, you’ll\
    \ see the image and caption related to that number.\n\n6. Try a floating-point\
    \ number between 1.0 and 8.9. The relevant image is displayed normally.\n\n7.\
    \ Try a number outside the range of 1 to 8. No error messages are displayed because\
    \ there’s nothing wrong with the query. It’s simply looking for a value that doesn’t\
    \ exist. In this example, it doesn’t matter. All you see is a broken image icon.\
    \ But you should normally check the number of rows returned by the query, using\
    \ the `num_rows` property with MySQLi or the `rowCount()` method with PDO.\n\n\
    Change the code like this for MySQLi:\n\n```\n$result = $conn->query($sql);\n\
    if ($result->num_rows) {\n    $row = $result->fetch_assoc();\n    ?>\n    \">\n\
    \n$error = true;\n    }\n}\nif ($error) {\n    echo 'Image not found';\n}\n} ?>\n\
    ```\n\nFor PDO, use `$result->rowCount()` in place of `$result->num_rows`.\n\n\
    If no rows are returned by the query, 0 is treated by PHP as implicitly `false`,\
    \ so the condition fails, and the `else` clause is executed instead, setting `$error`\
    \ to `true`.\n\nThe conditional statement that displays “Image not found” could\
    \ be moved into an `else` block, but this script has several nested conditions.\
    \ Keeping it separate makes it easier to read the script and follow the conditional\
    \ logic.\n\n8. Test the page again. When you select an image from the drop-down\
    \ menu, it displays normally as before. But if you try entering an out-of-range\
    \ value in the query string, you see the following message instead:\n\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Fign_HTML.jpg](images/332054_4_En_13_Chapter/332054_4_En_13_Fign_HTML.jpg)\n\
    \nThe amended code is in `mysqli_integer_03.php` and `pdo_integer_03.php` in the\
    \ `ch13` folder.\n\n## Using Prepared Statements for User Input\n\nBoth MySQLi\
    \ and PDO support prepared statements, which offer important security features.\
    \ A prepared statement is a template for an SQL query that contains a placeholder\
    \ for each value that is changeable. This not only makes it easier to embed variables\
    \ in your PHP code but also prevents SQL injection attacks as quotes and other\
    \ characters are automatically escaped before the query is executed.\n\nOther\
    \ advantages of using prepared statements are that they’re more efficient when\
    \ the same query is used more than once. Also, you can bind the results from each\
    \ column of a `SELECT` query to named variables, making it easier to display the\
    \ output.\n\nBoth MySQLi and PDO use question marks as anonymous placeholders,\
    \ like this:\n\n```\n$sql = 'SELECT image_id, filename, caption FROM images WHERE\
    \ caption LIKE ?';\n```\n\nPDO also supports the use of named placeholders. A\
    \ named placeholder begins with a colon followed by an identifier, like this:\n\
    \n```\n$sql = 'SELECT image_id, filename, caption FROM images WHERE caption LIKE\
    \ :search';\n```\n\n**Note** Placeholders are not wrapped in quotes, even when\
    \ the value they represent is a string. This makes it a lot easier to build an\
    \ SQL query because there’s no need to worry about getting the correct combination\
    \ of single and double quotes.\n\nPlaceholders can be used only for column values.\
    \ They can’t be used for other parts of an SQL query, such as column names or\
    \ operators. This is because values that contain non-numeric characters are automatically\
    \ escaped and wrapped in quotes when the SQL is executed. Column names and operators\
    \ cannot be in quotes.\n\nPrepared statements involve slightly more code than\
    \ just submitting the query directly, but placeholders make the SQL easier to\
    \ read and write, and the process is more secure.\n\nThe syntax for MySQLi and\
    \ PDO is different, so the following sections deal with them separately.\n\n##\
    \ Embedding Variables in MySQLi Prepared Statements\n\nUsing a MySQLi prepared\
    \ statement involves several stages.\n\n### Initialize the Statement\n\nTo initialize\
    \ the prepared statement, call the `stmt_init()` method on the database connection\
    \ and store it in a variable, as follows:\n\n```\n$stmt = $conn->stmt_init();\n\
    ```\n\n### Prepare the Statement\n\nYou then pass the SQL query to the statement’s\
    \ `prepare()` method. This checks that you haven’t used question mark placeholders\
    \ in the wrong place, and that when everything is put together, the query is valid\
    \ SQL.\n\nIf there are any mistakes, the `prepare()` method returns `false`, so\
    \ it’s common to enclose the next steps in a conditional statement to ensure they\
    \ run only if everything is still okay.\n\nError messages can be accessed through\
    \ the statement’s `error` property.\n\n### Bind Values to the Placeholders\n\n\
    Replacing the question marks with the actual values held in the variables is technically\
    \ known as **binding the parameters**. It’s this step that protects your database\
    \ from SQL injection.\n\nPass the variables to the statement’s `bind_param()`\
    \ method in the same order as you want them inserted into the SQL query, together\
    \ with a first argument specifying the data type of each variable, again in the\
    \ same order as the variables. The data type must be specified by one of the following\
    \ four characters:\n\n- `b`: Binary (such as an image, Word document, or PDF file)\n\
    - `d`: Double (floating-point number)\n- `i`: Integer (whole number)\n- `s`: String\
    \ (text)\n\nThe number of variables passed to `bind_param()` must be exactly the\
    \ same as the number of question mark placeholders. For example, to pass a single\
    \ value as a string, use this:\n\n```\n$stmt->bind_param('s', $_GET['words']);\n\
    ```\n\nTo pass two values, the `SELECT` query needs two question marks as placeholders,\
    \ and both variables need to be bound with `bind_param()`, like this:\n\n```\n\
    $sql = 'SELECT * FROM products WHERE price < ? AND type = ?';\n$stmt = $conn->stmt_init();\n\
    $stmt->prepare($sql);\n$stmt->bind_param('ds', $_GET['price'], $_GET['type']);\n\
    ```\n\nThe first argument to `bind_param()`, `'ds'`, specifies `$_GET['price']`\
    \ as a floating-point number and `$_GET['type']` as a string.\n\n### Execute the\
    \ Statement\n\nOnce the statement has been prepared and the values have been bound\
    \ to the placeholders, call the statement’s `execute()` method. The result of\
    \ a `SELECT` query can then be fetched from the statement object. With other types\
    \ of queries, this is the end of the process.\n\n### Binding the Results (Optional)\n\
    \nOptionally, you can bind the results of a `SELECT` query to variables with the\
    \ `bind_result()` method. This avoids the need to extract each row and then access\
    \ the results as `$row['column_name']`."
  raw: "The new query is submitted to MySQL by the `query()` method, and\n    the\
    \ result is stored in `$row`. Finally, `$row['filename']` and\n    `$row['caption']`\n\
    \    are used to display the image and its caption in the page.\n\nHowever, if\
    \ `$error` is `true`, the final\n    conditional statement displays “Image not\
