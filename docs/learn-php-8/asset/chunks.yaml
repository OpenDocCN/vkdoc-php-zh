    \ | | `&&, And` | `ctype_alpha` | `strlen` | `ctype_digit` | | `||, Or` | Spaceship\
    \ Operator | NULL | Order of Operations | | Constructor Method | Destructor method\
    \ | `__toString` | List object |\n\n## Chapter Questions and Projects\n\n### Multiple\
    \ Choice\n\n1.  PHP variables begin with which symbol?\n    1.  ?\n    2.  `!`\n\
