    There are other tools, however, that also have a growing community and provide
    support.


    ### Codeception


    Codeception ( [`http://codeception.com/`](http://codeception.com/) ) has support
    for writing unit tests, functional tests, and acceptance tests. It is integrated
    into a few PHP development frameworks, such as Zend, Symfony, Laravel, and others.


    ### SimpleTest


    SimpleTest ( [`http://simpletest.org/`](http://simpletest.org/) ) is an easy-to-use
    framework with SSL, proxies, and authentication support. Users of JUnit will be
    familiar with its interface.


    ### Atoum


    Atoum ( [`https://github.com/atoum`](https://github.com/atoum) ) is a relatively
    new player that uses new PHP features introduced in PHP version 5.3.


    ### Selenium


    Selenium ( [`http://www.seleniumhq.org/`](http://www.seleniumhq.org/) ) is actually
    more comprehensive than the previously mentioned tools, as it is a sophisticated,
    robust system that automates browsers. With it, a web application as a whole can
    be tested.


    ## TDD Development Cycle


    TDD requires a different way of thinking and a different style of coding. Let’s
    see what it takes. With CakePHP, the subject at hand, you do not have to start
    from scratch. Its framework already includes a lot of great features. So, now
    we have to concentrate only on our application development.'
