    clear enough to make its point, which often means sacrificing error checking and
    fitness for its ostensible purpose. In other words, the example here is really
    intended to illustrate issues of design and duplication rather than the best way
    to parse and write file data. For this reason, I omit implementation where it
    is not relevant to the issue at hand.


    As you can see, I have had to use the test for the XML extension in each of the
    functions. It is this repetition that might cause us problems down the line. If
    I were to be asked to include yet another parameter format, I would need to remember
    to keep the `readParams()` and `writeParams()` functions in line with one another.


    Now I’ll address the same problem with some simple classes. First, I create an
    abstract base class that will define the interface for the type:


    ```

    // listing 06.04

    abstract class ParamHandler

    {

    protected $source;

    protected $params = [];

    public function __construct(string $source)

    {

    $this->source = $source;

    }

    public function addParam(string $key, string $val)

    {

    $this->params[$key] = $val;

    }

    public function getAllParams(): array

    {

    return $this->params;

    }

    public static function getInstance(string $filename): ParamHandler

    {

    if (preg_match("/\.xml$/i", $filename)) {

    return new XmlParamHandler($filename);

    }

    return new TextParamHandler($filename);

    }

    abstract public function write(): bool;

    abstract public function read(): bool;

    }

    ```


    I define the `addParam()` method to allow the user to add parameters to the protected
    `$params` property and `getAllParams()` to provide access to a copy of the array.


    I also create a static `getInstance()` method that tests the file extension and
    returns a particular subclass according to the results. Crucially, I define two
    abstract methods, `read()`and `write()`, ensuring that any subclasses will support
    this interface.


    Note


    Placing a static method for generating child objects in the parent class is convenient.
    Such a design decision has its own consequences, however. The `ParamHandler` type
    is now essentially limited to working with the concrete classes in this central
    conditional statement. What happens if you need to handle another format? Of course,
    if you are the maintainer of `ParamHandler`, you can always amend the `getInstance()`
    method. If you are a client coder, however, changing this library class may not
    be so easy (in fact, changing it won’t be hard, but you face the prospect of having
    to reapply your patch every time you reinstall the package that provides it).
    I will discuss issues of object creation in Chapter [9](#A314621_5_En_9_Chapter.html).


    Now, I’ll define the subclasses, once again omitting the details of implementation
    to keep the example clean:


    ```

    // listing 06.05

    class XmlParamHandler extends ParamHandler

    {

    public function write(): bool

    {

    // write XML

    // using $this->params

    }

    public function read(): bool

    {

    // read XML

    // and populate $this->params

    }

    }

    // listing 06.06

    class TextParamHandler extends ParamHandler

    {

    public function write(): bool

    {

    // write text

    // using $this->params

    }

    public function read(): bool

    {

    // read text

    // and populate $this->params

    }

    }

    ```


    These classes simply provide implementations of the `write()` and `read()` methods
    . Each class will write and read according to the appropriate format.


    Client code will write to both text and XML formats entirely transparently, according
    to the file extension :


    ```

    // listing 06.07

    $test = ParamHandler::getInstance(__DIR__ . "/params.xml");

    $test->addParam("key1", "val1");

    $test->addParam("key2", "val2");

    $test->addParam("key3", "val3");

    $test->write(); // writing in XML format

    ```


    We can also read from either file format:


    ```

    // listing 06.08

    $test = ParamHandler::getInstance(__DIR__ . "/params.txt");

    $test->read(); // reading in text format

    $params = $test->getAllParams();

    print_r($params);

    ```


    So, what can we learn from these two approaches?


    ### Responsibility


    The controlling code in the procedural example takes responsibility for deciding
    about format—not once, but twice. The conditional code is tidied away into functions,
    certainly, but this merely disguises the fact of a single flow, making decisions
    as it goes. Calls to `readParams()` and to `writeParams()` take place in different
    contexts, so we are forced to repeat the file extension test in each function
    (or to perform variations on this test).


    In the object-oriented version, this choice about file format is made in the static
    `getInstance()` method , which tests the file extension only once, serving up
    the correct subclass. The client code takes no responsibility for implementation.
    It uses the provided object with no knowledge of, or interest in, the particular
    subclass it belongs to. It knows only that it is working with a `ParamHandler`
    object, and that it will support `write()` and `read()`. While the procedural
    code busies itself about details, the object-oriented code works only with an
    interface, unconcerned about the details of implementation. Because responsibility
    for implementation lies with the objects and not with the client code, it would
    be easy to switch in support for new formats transparently.


    ### Cohesion


    Cohesion is the extent to which proximate procedures are related to one another.
    Ideally, you should create components that share a clear responsibility. If your
    code spreads related routines widely, you will find them harder to maintain as
    you have to hunt around to make changes.


    Our `ParamHandler` classes collect related procedures into a common context. The
    methods for working with XML share a context in which they can share data and
    where changes to one method can easily be reflected in another if necessary (e.g.,
    if you needed to change an XML element name). The `ParamHandler` classes can therefore
    be said to have high cohesion.


    The procedural example, on the other hand, separates related procedures. The code
    for working with XML is spread across functions.


    ### Coupling


    Tight coupling occurs when discrete parts of a system’s code are tightly bound
    up with one another so that a change in one part necessitates changes in the others.
    Tight coupling is by no means unique to procedural code, though the sequential
    nature of such code makes it prone to the problem.


    You can see this kind of coupling in the procedural example. The `writeParams()`
    and `readParams()` functions run the same test on a file extension to determine
    how they should work with data. Any change in logic you make to one will have
    to be implemented in the other. If you were to add a new format, for example,
    you would have to bring the functions into line with one another, so that they
    both implement a new file extension test in the same way. This problem can only
    get worse as you add new parameter-related functions.


    The object-oriented example decouples the individual subclasses from one another
    and from the client code. If you were required to add a new parameter format,
    you could simply create a new subclass, amending a single test in the static `getInstance()`
    method.'
  trans: "\n示例代码总是需要在清晰表达意图与保持实用性之间艰难平衡。为了阐明核心观点，往往需要牺牲错误检查和实际适用性。换句话说，这里的示例旨在展示设计和重复性问题，而非演示解析和写入文件数据的最佳实践。因此，我会省略与当前问题无关的实现细节。\n\
    \n如你所见，每个函数中我都不得不对 XML 扩展名进行检测。正是这种重复性可能在未来引发问题。如果要求我增加另一种参数格式，我必须确保 `readParams()`\
    \ 和 `writeParams()` 这两个函数彼此保持一致。\n\n现在，我将通过一些简单的类来处理相同的问题。首先，我创建一个抽象基类来定义该类型的接口：\n\
    \n```\n// listing 06.04\nabstract class ParamHandler\n{\n    protected $source;\n\
    \    protected $params = [];\n    public function __construct(string $source)\n\
    \    {\n        $this->source = $source;\n    }\n    public function addParam(string\
    \ $key, string $val)\n    {\n        $this->params[$key] = $val;\n    }\n    public\
    \ function getAllParams(): array\n    {\n        return $this->params;\n    }\n\
    \    public static function getInstance(string $filename): ParamHandler\n    {\n\
    \        if (preg_match(\"/\\.xml$/i\", $filename)) {\n            return new\
    \ XmlParamHandler($filename);\n        }\n        return new TextParamHandler($filename);\n\
    \    }\n    abstract public function write(): bool;\n    abstract public function\
    \ read(): bool;\n}\n```\n\n我定义了 `addParam()` 方法，允许用户向受保护的 `$params` 属性添加参数，并通过\
    \ `getAllParams()` 方法提供对该数组副本的访问。\n\n我还创建了一个静态方法 `getInstance()`，用于检测文件扩展名，并根据结果返回特定的子类。关键在于，我定义了两个抽象方法\
    \ `read()` 和 `write()`，确保任何子类都会支持这个接口。\n\n> **注意**\n>\n> 在父类中放置用于生成子对象的静态方法确实很方便。然而，这种设计决策也有其后果。`ParamHandler`\
    \ 类型现在基本上被限制为只能与这个中心条件语句中的具体类协作。如果需要处理另一种格式该怎么办？当然，如果你是 `ParamHandler` 的维护者，你可以随时修改\
    \ `getInstance()` 方法。但如果你是一名客户端程序员，修改这个库类可能就没那么容易了（实际上修改并不难，问题在于每次重新安装包含该类的包时，你都必须重新应用你的补丁）。我将在第\
    \ 9 章讨论对象创建的相关问题。\n\n现在，我将定义子类，同样省略实现细节以保持示例简洁：\n\n```\n// listing 06.05\nclass\
    \ XmlParamHandler extends ParamHandler\n{\n    public function write(): bool\n\
    \    {\n        // 写入 XML\n        // 使用 $this->params\n    }\n    public function\
    \ read(): bool\n    {\n        // 读取 XML\n        // 并填充 $this->params\n    }\n\
    }\n// listing 06.06\nclass TextParamHandler extends ParamHandler\n{\n    public\
    \ function write(): bool\n    {\n        // 写入文本\n        // 使用 $this->params\n\
    \    }\n    public function read(): bool\n    {\n        // 读取文本\n        // 并填充\
    \ $this->params\n    }\n}\n```\n\n这些类仅提供了 `write()` 和 `read()` 方法的实现。每个类将根据对应的格式进行写入和读取操作。\n\
    \n客户端代码将根据文件扩展名完全透明地写入文本和 XML 两种格式：\n\n```\n// listing 06.07\n$test = ParamHandler::getInstance(__DIR__\
    \ . \"/params.xml\");\n$test->addParam(\"key1\", \"val1\");\n$test->addParam(\"\
    key2\", \"val2\");\n$test->addParam(\"key3\", \"val3\");\n$test->write(); // 以\
    \ XML 格式写入\n```\n\n我们也可以从任一文件格式读取：\n\n```\n// listing 06.08\n$test = ParamHandler::getInstance(__DIR__\
    \ . \"/params.txt\");\n$test->read(); // 以文本格式读取\n$params = $test->getAllParams();\n\
    print_r($params);\n```\n\n那么，我们可以从这两种方法中学到什么？\n\n### 职责\n\n在过程式示例中，控制代码负责决定格式——而且不止一次，而是两次。条件代码确实被整理到函数中，但这只是掩盖了单一流程的事实，流程在运行过程中做出决策。对\
    \ `readParams()` 和 `writeParams()` 的调用发生在不同的上下文中，因此我们被迫在每个函数中重复文件扩展名检测（或对该检测进行变体处理）。\n\
    \n在面向对象的版本中，这种关于文件格式的选择是在静态方法 `getInstance()` 中做出的，它只检测一次文件扩展名，然后提供正确的子类。客户端代码不承担任何实现职责。它使用提供的对象，但不知道也不关心它属于哪个特定的子类。它只知道自己在操作一个\
    \ `ParamHandler` 对象，并且该对象会支持 `write()` 和 `read()` 方法。过程式代码忙于处理细节，而面向对象代码仅与接口协作，不关心实现细节。由于实现职责由对象而非客户端代码承担，因此可以轻松透明地切换对新格式的支持。\n\
    \n### 内聚性\n\n内聚性指的是相邻近的代码过程之间的关联程度。理想情况下，你应该创建共享清晰职责的组件。如果相关例程分散在代码各处，你会发现维护它们更加困难，因为你需要四处查找才能进行修改。\n\
    \n我们的 `ParamHandler` 类将相关过程收集到一个共同的上下文中。用于处理 XML 的方法共享一个上下文，它们可以在此共享数据，并且在必要时，一个方法的变更可以轻松地反映在另一个方法中（例如，如果你需要更改一个\
    \ XML 元素名称）。因此可以说 `ParamHandler` 类具有高内聚性。\n\n另一方面，过程式示例将相关过程分离。用于处理 XML 的代码分散在各个函数中。\n\
    \n### 耦合性\n\n当系统代码中离散的部分紧密地相互绑定，以至于一个部分的变更必然导致其他部分的变更时，就会发生紧耦合。紧耦合绝非过程式代码的专属问题，尽管这类代码的顺序性本质使其更容易出现此问题。\n\
    \n你可以在过程式示例中看到这种耦合。`writeParams()` 和 `readParams()` 函数对文件扩展名执行相同的检测，以决定它们应如何处理数据。你对其中一个函数所做的任何逻辑更改，都必须在另一个函数中实现。例如，如果你添加一种新格式，就必须使这两个函数保持一致，以便它们以相同的方式实现新的文件扩展名检测。随着你添加更多与参数相关的函数，这个问题只会变得更糟。\n\
    \n面向对象的示例将各个子类相互解耦，并将它们与客户端代码解耦。如果你需要添加一种新的参数格式，只需创建一个新的子类，并修改静态方法 `getInstance()`\
    \ 中的单一检测点即可。\n"
- fmt: '### Orthogonality


    The killer combination of components with tightly defined responsibilities that
    are also independent from the wider system is sometimes referred to as orthogonality.
    Andrew Hunt and David Thomas discuss this subject in their book, *The Pragmatic
    Programmer: From Journeyman to Master* (Addison-Wesley Professional, 1999).


    Orthogonality, it is argued, promotes reuse in that components can be plugged
    into new systems without needing any special configuration. Such components will
    have clear inputs and outputs, independent of any wider context. Orthogonal code
    makes change easier because the impact of altering an implementation will be localized
    to the component being altered. Finally, orthogonal code is safer. The effects
    of bugs should be limited in scope. An error in highly interdependent code can
    easily cause knock-on effects in the wider system.


    There is nothing automatic about loose coupling and high cohesion in a class context.
    We could, after all, embed our entire procedural example into one misguided class.
    So how can we achieve this balance in our code? I usually start by considering
    the classes that should live in my system.


    ### Choosing Your Classes


    It can be surprisingly difficult to define the boundaries of your classes, especially
    as they will evolve with any system that you build.


    It can seem straightforward when you are modeling the real world. Object-oriented
    systems often feature software representations of real things—`Person`, `Invoice`,
    and `Shop` classes abound. This would seem to suggest that defining a class is
    a matter of finding the things in your system and then giving them agency through
    methods. This is not a bad starting point, but it does have its dangers. If you
    see a class as a noun, a subject for any number of verbs, then you may find it
    bloating as ongoing development and requirement changes call for it to do more
    and more things.


    Let’s consider the `ShopProduct` example that we created in Chapter 3. Our system
    exists to offer products to a customer, so defining a `ShopProduct` class is an
    obvious choice. But is that the only decision we need to make? We provide methods
    such as `getTitle()` and `getPrice()` for accessing product data. When we are
    asked to provide a mechanism for outputting summary information for invoices and
    delivery notes, it seems to make sense to define a `write()` method. When the
    client asks us to provide the product summaries in different formats, we look
    again at our class. We duly create `writeXML()` and `writeHTML()` methods in addition
    to the `write()` method. Or we add conditional code to `write()` to output different
    formats, according to an option flag.


    Either way, the problem here is that the `ShopProduct` class is now trying to
    do too much. It is struggling to manage strategies for display, as well as for
    managing product data.


    How should you think about defining classes? The best approach is to think of
    a class as having a primary responsibility and to make that responsibility as
    singular and focused as possible. Put the responsibility into words. It has been
    said that you should be able to describe a class’s responsibility in 25 words
    or less, rarely using the words “and” or “or.” If your sentence gets too long
    or mired in clauses, it is probably time to consider defining new classes along
    the lines of some of the responsibilities you have described.


    So, `ShopProduct` classes are responsible for managing product data. If we add
    methods for writing to different formats, we begin to add a new area of responsibility:
    product display. As you saw in Chapter 3, we actually defined two types based
    on these separate responsibilities. The `ShopProduct` type remained responsible
    for product data, and the `ShopProductWriter` type took on responsibility for
    displaying product information. Individual subclasses refined these responsibilities.


    > **Note:** Very few design rules are entirely inflexible. You will sometimes
    see code for saving object data in an otherwise unrelated class, for example.
    Although this would seem to violate the rule that a class should have a singular
    responsibility, it can be the most convenient place for the functionality to live
    because a method has to have full access to an instance’s fields. Using local
    methods for persistence can also save us from creating a parallel hierarchy of
    persistence classes mirroring our savable classes, and thereby introducing unavoidable
    coupling. We deal with other strategies for object persistence in Chapter 12.
    Avoid religious adherence to design rules; they are not a substitute for analyzing
    the problem before you. Try to remain alive to the reasoning behind the rule,
    and emphasize that over the rule itself.


    ### Polymorphism


    Polymorphism, or class switching, is a common feature of object-oriented systems.
    You have encountered it several times already in this book.


    Polymorphism is the maintenance of multiple implementations behind a common interface.
    This sounds complicated, but in fact, it should be very familiar to you by now.
    The need for polymorphism is often signaled by the presence of extensive conditional
    statements in your code.


    When I first created the `ShopProduct` class in Chapter 3, I experimented with
    a single class which managed functionality for books and CDs, in addition to generic
    products. In order to provide summary information, I relied on a conditional statement:


    ```

    // listing 03.31

    public function getSummaryLine()

    {

    $base  = "{$this->title} ( {$this->producerMainName}, ";

    $base .= "{$this->producerFirstName} )";

    if ($this->type == ''book'') {

    $base .= ": page count - {$this->numPages}";

    } elseif ($this->type == ''cd'') {

    $base .= ": playing time - {$this->playLength}";

    }

    return $base;

    }

    ```


    These statements suggested the shape for the two subclasses: `CdProduct` and `BookProduct`.


    By the same token, the conditional statements in my procedural parameter example
    contained the seeds of the object-oriented structure I finally arrived at. I repeated
    the same condition in two parts of the script:


    ```

    // listing 06.03

    function readParams(string $source): array

    {

    $params = [];

    if (preg_match("/\.xml$/i", $source)) {

    // read XML parameters from $source

    } else {

    // read text parameters from $source

    }

    return $params;

    }

    function writeParams(array $params, string $source)

    {

    if (preg_match("/\.xml$/i", $source)) {

    // write XML parameters to $source

    } else {

    // write text parameters to $source

    }

    }

    ```


    Each clause suggested one of the subclasses I finally produced: `XmlParamHandler`
    and `TextParamHandler`. These extended the abstract base class `ParamHandler`’s
    `write()` and `read()` methods:


    ```

    // listing 06.09

    // could return XmlParamHandler or TextParamHandler

    $test = ParamHandler::getInstance($file);

    $test->read();  // could be XmlParamHandler::read() or TextParamHandler::read()

    $test->addParam("newkey1", "newval1");

    $test->write(); // could be XmlParamHandler::write() or TextParamHandler::write()

    ```


    It is important to note that polymorphism doesn’t banish conditionals. Methods
    such as `ParamHandler::getInstance()` will often determine which objects to return
    based on `switch` or `if` statements. These tend to centralize the conditional
    code into one place, though.


    As you have seen, PHP enforces the interfaces defined by abstract classes. This
    is useful because we can be sure that a concrete child class will support exactly
    the same method signatures as those defined by an abstract parent. This includes
    type declarations and access controls. Client code can, therefore, treat all children
    of a common superclass interchangeably (as long it only relies on only functionality
    defined in the parent).'
