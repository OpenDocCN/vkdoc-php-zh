  trans: "\n### PHP 方案 13-1：使用 MySQLi 插入新记录\n\n本 PHP 方案演示了如何使用 MySQLi 预处理语句向 `blog`\
    \ 表中插入新记录。使用预处理语句可以避免转义引号和控制字符带来的问题，同时还能防止数据库受到 SQL 注入攻击（参见第 11 章）。\n\n在 `phpsols`\
    \ 站点根目录下创建一个名为 `admin` 的文件夹。从 `ch13` 文件夹中复制 `blog_insert_01.php`，并将其保存到新文件夹中，命名为\
    \ `blog_insert_mysqli.php`。插入新记录的代码只应在表单提交后运行，因此将其封装在条件语句中，该语句检查 `$_POST` 数组中提交按钮（`insert`）的\
    \ `name` 属性。将以下代码放在 `DOCTYPE` 声明之上：\n\n```php\n<?php\n\nif (isset($_POST['insert']))\
    \ {\n\nrequire_once '../includes/connection.php';\n\n// 初始化标志\n$OK = false;\n\n\
    // 创建数据库连接\n// 初始化预处理语句\n// 创建 SQL\n// 绑定参数并执行语句\n// 如果成功则重定向，否则显示错误\n\n}\n\n\
    ?>\n```\n\n在引入连接函数后，代码将 `$OK` 设置为 `false`。仅当没有错误时，该变量才会被重置为 `true`。末尾的五个注释勾勒出了我们将在下面填充的剩余步骤。\n\
    \n创建数据库连接，用户需拥有读写权限，然后初始化预处理语句，并创建包含占位符的 SQL，这些占位符将用于存储来自用户输入的数据，具体如下：\n\n```php\n\
    // 创建数据库连接\n$conn = dbConnect('write');\n\n// 初始化预处理语句\n$stmt = $conn->stmt_init();\n\
    \n// 创建 SQL\n$sql = 'INSERT INTO blog (title, article)\nVALUES(?, ?)';\n```\n\n\
    将从 `$_POST['title']` 和 `$_POST['article']` 获取的值用问号占位符表示。其他列将自动填充。`article_id`\
    \ 列是主键，使用 `AUTO_INCREMENT` 自增，而 `created` 和 `updated` 列的默认值为 `CURRENT_TIMESTAMP`。\n\
    \n> **注意：** 此处的代码顺序与第 11 章略有不同。该脚本将在第 15 章中进一步开发，用于执行一系列 SQL 查询，因此首先初始化预处理语句。\n\
    \n下一步是将问号替换为变量中存储的值——这一过程称为绑定参数。插入以下代码：\n\n```php\nif ($stmt->prepare($sql)) {\n\
    \n// 绑定参数并执行语句\n$stmt->bind_param('ss', $_POST['title'], $_POST['article']);\n\
    $stmt->execute();\n\nif ($stmt->affected_rows > 0) {\n    $OK = true;\n}\n\n}\n\
    ```\n\n这部分代码能防止数据库受到 SQL 注入攻击。将变量按照要插入 SQL 查询的顺序传递给 `bind_param()` 方法，同时传递第一个参数，该参数指定每个变量的数据类型，顺序同样与变量一致。两个变量都是字符串，因此该参数为\
    \ `'ss'`。\n\n将值绑定到占位符后，调用 `execute()` 方法。\n\n`affected_rows` 属性记录了 `INSERT`、`UPDATE`\
    \ 或 `DELETE` 查询所影响的行数。\n\n> **警告：** 如果查询触发 MySQL 错误，`affected_rows` 会返回 –1。与某些编程语言不同，PHP\
    \ 将 –1 视为 `true`。因此，你需要确认 `affected_rows` 大于零，才能确保查询成功。如果大于零，`$OK` 会被重置为 `true`。\n\
    \n最后，将页面重定向到现有记录列表，或显示错误信息。在上一步之后添加以下代码：\n\n```php\n// 如果成功则重定向，否则显示错误\nif ($OK)\
    \ {\nheader('Location:\nhttp://localhost/phpsols/admin/blog_list_mysqli.php ');\n\
    exit;\n} else {\n$error = $stmt->error;\n}\n\n}\n\n?>\n```\n\n在页面主体中添加以下代码块，以便在插入操作失败时显示错误信息：\n\
    \n```php\n<h1>插入新博客条目</h1>\n\n<?php if (isset($error)) {\necho \"<p>错误：$error</p>\"\
    ;\n} ?>\n\n<form method=\"post\" action=\"\">\n```\n\n完整代码位于 `ch13` 文件夹中的 `blog_insert_mysqli.php`。\n\
    \n至此，插入页面已完成。但在测试之前，请先创建 `blog_list_mysqli.php`，该文件将在 PHP 方案 13-3 中介绍。\n\n> **注意：**\
    \ 为了专注于与数据库交互的代码，本章中的脚本未对用户输入进行验证。在实际应用开发中，应使用第 5 章中介绍的技术检查表单提交的数据，并在检测到错误时重新显示。\n"
- fmt: '### PHP Solution 13-2: Inserting a New Record with PDO


    This PHP solution shows how to insert a new record in the `blog` table using a
    PDO prepared statement. If you haven’t already done so, create a folder called
    `admin` in the `phpsols` site root.


    Copy `blog_insert_01.php` to the `admin` folder and save it as `blog_insert_pdo.php`.
    The code that inserts a new record should be run only if the form has been submitted,
    so it’s enclosed in a conditional statement that checks for the `name` attribute
    of the submit button (`insert`) in the `$_POST` array. Put the following in a
    PHP block above the `DOCTYPE` declaration:


    ```

    if (isset($_POST[''insert''])) {


    require_once ''../includes/connection.php'';


    // initialize flag

    $OK = false;


    // create database connection

    // create SQL

    // prepare the statement

    // bind the parameters and execute the statement

    // redirect if successful or display error


    }

    ```


    After including the connection function, the code sets `$OK` to `false`. This
    is reset to `true` only if there are no errors. The five comments at the end map
    out the remaining steps.


    Create a PDO connection to the database as the user with read and write privileges,
    and build the SQL like this:


    ```

    // create database connection

    $conn = dbConnect(''write'', ''pdo'');


    // create SQL

    $sql = ''INSERT INTO blog (title, article)

    VALUES(:title, :article)'';

    ```


    The values that will be derived from variables are represented by named placeholders
    consisting of the column name preceded by a colon (`:title` and `:article`). The
    value for the other columns will be generated by the database. The `article_id`
    primary key is incremented automatically, and the `created` and `updated` columns
    have their default values set to `CURRENT_TIMESTAMP`.


    The next stage is to initialize the prepared statement and bind the values from
    the variables to the placeholders—a process known as binding the parameters. Add
    the following code:


    ```

    // prepare the statement

    $stmt = $conn->prepare($sql);


    // bind the parameters and execute the statement

    $stmt->bindParam('':title'', $_POST[''title''], PDO::PARAM_STR);

    $stmt->bindParam('':article'', $_POST[''article''], PDO::PARAM_STR);


    // execute and get number of affected rows

    $stmt->execute();

    $OK = $stmt->rowCount();

    ```


    This begins by passing the SQL query to the `prepare()` method of the database
    connection (`$conn`) and storing a reference to the statement as a variable (`$stmt`).


    Next, the values in the variables are bound to the placeholders in the prepared
    statement, and the `execute()` method runs the query.


    When used with an `INSERT`, `UPDATE`, or `DELETE` query, the PDO `rowCount()`
    method reports the number of rows affected by the query. If the record is inserted
    successfully, `$OK` is `1`, which PHP treats as `true`. Otherwise, it’s `0`, which
    is treated as `false`.


    Finally, redirect the page to a list of existing records or display any error
    message. Add this code after the previous step:


    ```

    // redirect if successful or display error

    if ($OK) {

    header(''Location: http://localhost/phpsols/admin/blog_list_pdo.php'');

    exit;

    } else {

    $errorInfo = $stmt->errorInfo();

    if (isset($errorInfo[2])) {

    $error = $errorInfo[2];

    }

    }

    }

    ?>

    ```


    Since the prepared statement has been stored as `$stmt`, you can access an array
    of error messages using `$stmt->errorInfo()`. The third element of the array will
    be set only if there’s a problem.


    Add a PHP code block in the body of the page to display any error message:


    ```

    <h1>Insert New Blog Entry</h1>

    <?php if (isset($error)) {

    echo "<p>Error: $error</p>";

    } ?>

    <form method="post" action="">

    ```


    The completed code is in `blog_insert_pdo.php` in the `ch13` folder.


    That completes the insert page, but before testing it, create `blog_list_pdo.php`,
    which is described next.


    ### Linking to the Update and Delete Pages


    Before you can update or delete a record, you need to find its primary key. A
    practical way of doing this is to query the database and display a list of all
    records. You can use the results of this query to display a list of all records,
    complete with links to the update and delete pages. By adding the value of `article_id`
    to a query string in each link, you automatically identify the record to be updated
    or deleted. As Figure 13-2 shows, the URL displayed in the browser status bar
    (bottom left) identifies the `article_id` of the article `Tiny Restaurants Crowded
    Together` as `3`.


    ![A978-1-4842-0635-5_13_Fig2_HTML.jpg](A978-1-4842-0635-5_13_Fig2_HTML.jpg)


    **Figure 13-2.** The EDIT and DELETE links contain the record’s primary key in
    a query string


    The update page uses this to display the correct record ready for updating. The
    same information is conveyed in the `DELETE` link to the delete page.


    To create a list like this, you need to start with an HTML table that contains
    two rows and as many columns as you want to display, plus two extra columns for
    the EDIT and DELETE links. The first row is used for column headings. The second
    row is wrapped in a PHP loop to display all the results. The table in `blog_list_mysqli_01.php`
    in the `ch13` folder looks like this (the version in `blog_list_pdo_01.php` is
    the same, except that the links in the last two table cells point to the PDO versions
    of the update and delete pages):


    ```

    <table>

    <tr>

    <th>Created</th>

    <th>Title</th>

    <th>&nbsp;</th>

    <th>&nbsp;</th>

    </tr>

    <tr>

    <td></td>

    <td></td>

    <td><a href="blog_update_mysqli.php">EDIT</a></td>

    <td><a href="blog_delete_mysqli.php">DELETE</a></td>

    </tr>

    </table>

    ```'
  raw: '#### PHP Solution 13-2: Inserting a New Record with PDO


    This PHP solution shows how to insert a new record in the `blog` table using a
    PDO prepared statement. If you haven’t already done so, create a folder called
    `admin` in the `phpsols` site root.


    Copy `blog_insert_01.php` to the `admin` folder and save it as `blog_insert_pdo.php`.
      The code that inserts a new record should be run only if the form has been submitted,
    so it’s enclosed in a conditional statement that checks for the `name` attribute
    of the submit button (`insert`) in the `$_POST` array. Put the following in a
    PHP block above the `DOCTYPE` declaration:  


    `if (isset($_POST[''insert''])) {`


    `require_once ''../includes/connection.php'';`


    `// initialize flag`


    `$OK = false;`


    `// create database connection`


    `// create SQL`


    `// prepare the statement`


    `// bind the parameters and execute the statement`


    `// redirect if successful or display error`


    `}`


    After including the connection function, the code sets `$OK` to `false`. This
    is reset to `true` only if there are no errors. The five comments at the end map
    out the remaining steps.


    Create a PDO connection to the database as the user with read and write privileges,
    and build the SQL like this:  


    `// create database connection`


    `$conn = dbConnect(''write'', ''pdo'');`


    `// create SQL`


    `$sql = ''INSERT INTO blog (title, article)`


    `VALUES(:title, :article)'';`


    The values that will be derived from variables are represented by named placeholders
    consisting of the column name preceded by a colon (`:title` and `:article`). The
    value for the other columns will be generated by the database. The `article_id`
    primary key is incremented automatically, and the `created` and `updated` columns
    have their default values set to `CURRENT_TIMESTAMP`.


    The next stage is to initialize the prepared statement and bind the values from
    the variables to the placeholders—a process known as binding the parameters. Add
    the following code:  


    `// prepare the statement`


    `$stmt = $conn->prepare($sql);`


    `// bind the parameters and execute the statement`


    `$stmt->bindParam('':title'', $_POST[''title''], PDO::PARAM_STR);`


    `$stmt->bindParam('':article'', $_POST[''article''], PDO::PARAM_STR);`


    `// execute and get number of affected rows`


    `$stmt->execute();`


    `$OK = $stmt->rowCount();`


    This begins by passing the SQL query to the `prepare()` method of the database
    connection (`$conn`) and storing a reference to the statement as a variable (`$stmt`).


    Next, the values in the variables are bound to the placeholders in the prepared
    statement, and the `execute()` method runs the query.


    When used with an `INSERT`, `UPDATE`, or `DELETE` query, the PDO `rowCount()`
    method reports the number of rows affected by the query. If the record is inserted
    successfully, `$OK` is `1`, which PHP treats as `true`. Otherwise, it’s `0`, which
    is treated as `false`.


    Finally, redirect the page to a list of existing records or display any error
    message. Add this code after the previous step:  


    `// redirect if successful or display error`


    `if ($OK) {`


    `header(''Location:` `http://localhost/phpsols/admin/blog_list_pdo.php` `'');`


    `exit;`


    `} else {`


    `$errorInfo = $stmt->errorInfo();`


    `if (isset($errorInfo[2])) {`


    `$error = $errorInfo[2];`


    `}`


    `}`


    `}`


    `?>`


    Since the prepared statement has been stored as `$stmt`, you can access an array
    of error messages using `$stmt->errorInfo()`. The third element of the array will
    be set only if there’s a problem.


    Add a PHP code block in the body of the page to display any error message:  


    `<h1>Insert New Blog Entry</h1>`


    `<?php if (isset($error)) {`


    `echo "<p>Error: $error</p>";`


    `} ?>`


    `<form method="post" action="">`


    The completed code is in `blog_insert_pdo.php` in the `ch13` folder.


    That completes the insert page, but before testing it, create `blog_list_pdo.php`,
    which is described next.


    ### Linking to the Update and Delete Pages


    Before you can update or delete a record, you need to find its primary key. A
    practical way of doing this is to query the database and display a list of all
    records. You can use the results of this query to display a list of all records,
    complete with links to the update and delete pages. By adding the value of `article_id`
    to a query string in each link, you automatically identify the record to be updated
    or deleted. As Figure [13-2](#A978-1-4842-0635-5_13_Chapter.html#Fig2) shows,
    the URL displayed in the browser status bar (bottom left) identifies the `article_id`
    of the article `Tiny Restaurants Crowded Together` as `3`.


    ![A978-1-4842-0635-5_13_Fig2_HTML.jpg](A978-1-4842-0635-5_13_Fig2_HTML.jpg)


    Figure 13-2.


    The EDIT and DELETE links contain the record’s primary key in a query string


    The update page uses this to display the correct record ready for updating. The
    same information is conveyed in the `DELETE` link to the delete page.


    To create a list like this, you need to start with an HTML table that contains
    two rows and as many columns as you want to display, plus two extra columns for
    the EDIT and DELETE links. The first row is used for column headings. The second
    row is wrapped in a PHP loop to display all the results. The table in `blog_list_mysqli_01.php`
    in the `ch13` folder looks like this (the version in `blog_list_pdo_01.php` is
    the same, except that the links in the last two table cells point to the PDO versions
    of the update and delete pages):


    `<table>`


    `<tr>`


    `<th>Created</th>`


    `<th>Title</th>`


    `<th>&nbsp;</th>`


    `<th>&nbsp;</th>`


    `</tr>`


    `<tr>`


    `<td></td>`


    `<td></td>`


    `<td><a href="blog_update_mysqli.php">EDIT</a></td>`


    `<td><a href="blog_delete_mysqli.php">DELETE</a></td>`


    `</tr>`


    `</table>`'
  trans: '

    ### PHP 方案 13-2：使用 PDO 插入新记录


    本 PHP 方案演示了如何使用 PDO 预处理语句向 `blog` 表中插入新记录。如果尚未操作，请先在 `phpsols` 站点根目录下创建一个名为 `admin`
    的文件夹。


    将 `blog_insert_01.php` 复制到 `admin` 文件夹中，并另存为 `blog_insert_pdo.php`。插入新记录的代码应仅在表单提交后运行，因此它被包裹在一个条件语句中，该语句会检查
    `$_POST` 数组中是否存在提交按钮的 `name` 属性值（`insert`）。请在 `DOCTYPE` 声明之前的 PHP 代码块中添加以下内容：


    ```

    if (isset($_POST[''insert''])) {


    require_once ''../includes/connection.php'';


    // 初始化标志

    $OK = false;


    // 创建数据库连接

    // 创建 SQL 语句

    // 准备预处理语句

    // 绑定参数并执行语句

    // 成功则重定向，否则显示错误


    }

    ```


    在引入连接函数后，代码将 `$OK` 设置为 `false`。仅当没有错误时，它才会被重置为 `true`。末尾的五条注释勾勒出了后续步骤。


    以具有读写权限的用户身份创建到数据库的 PDO 连接，并按如下方式构建 SQL 语句：


    ```

    // 创建数据库连接

    $conn = dbConnect(''write'', ''pdo'');


    // 创建 SQL 语句

    $sql = ''INSERT INTO blog (title, article)

    VALUES(:title, :article)'';

    ```


    从变量中获取的值由命名占位符表示，这些占位符由列名加上冒号前缀组成（`:title` 和 `:article`）。其他列的值将由数据库自动生成。`article_id`
    主键会自动递增，`created` 和 `updated` 列的默认值设置为 `CURRENT_TIMESTAMP`。


    下一步是初始化预处理语句，并将变量值绑定到占位符——这一过程称为参数绑定。添加以下代码：


    ```

    // 准备预处理语句

    $stmt = $conn->prepare($sql);


    // 绑定参数并执行语句

    $stmt->bindParam('':title'', $_POST[''title''], PDO::PARAM_STR);

    $stmt->bindParam('':article'', $_POST[''article''], PDO::PARAM_STR);


    // 执行并获取受影响行数

    $stmt->execute();

    $OK = $stmt->rowCount();

    ```


    首先，将 SQL 查询传递给数据库连接对象（`$conn`）的 `prepare()` 方法，并将语句的引用存储为变量（`$stmt`）。


    接下来，将变量中的值绑定到预处理语句中的占位符，然后 `execute()` 方法运行查询。


    当与 `INSERT`、`UPDATE` 或 `DELETE` 查询一起使用时，PDO 的 `rowCount()` 方法会报告查询影响的行数。如果记录插入成功，`$OK`
    为 `1`，PHP 会将其视为 `true`。否则，它为 `0`，被视为 `false`。


    最后，将页面重定向到现有记录列表，或显示错误消息。在上一步骤之后添加此代码：


    ```

    // 成功则重定向，否则显示错误

    if ($OK) {

    header(''Location: http://localhost/phpsols/admin/blog_list_pdo.php'');

    exit;

    } else {

    $errorInfo = $stmt->errorInfo();

    if (isset($errorInfo[2])) {

    $error = $errorInfo[2];

    }

    }

    }

    ?>

    ```


    由于预处理语句已存储为 `$stmt`，因此可以使用 `$stmt->errorInfo()` 访问错误信息数组。仅当出现问题时，数组的第三个元素才会被设置。


    在页面的主体部分添加一个 PHP 代码块，用于显示任何错误消息：


    ```

    <h1>插入新博客条目</h1>

    <?php if (isset($error)) {

    echo "<p>错误：$error</p>";

    } ?>

    <form method="post" action="">

    ```


    完整代码位于 `ch13` 文件夹中的 `blog_insert_pdo.php` 文件内。


    至此，插入页面已完成，但在测试之前，请先创建 `blog_list_pdo.php`，具体说明见下文。


    ### 链接到更新和删除页面


    在更新或删除记录之前，你需要找到其主键。一种实用的方法是查询数据库并显示所有记录的列表。你可以利用此查询结果来展示所有记录，并附上指向更新和删除页面的链接。通过在每个链接的查询字符串中添加
    `article_id` 的值，即可自动标识要更新或删除的记录。如图 13-2 所示，浏览器状态栏（左下角）显示的 URL 将文章 `Tiny Restaurants
    Crowded Together` 的 `article_id` 标识为 `3`。


    ![A978-1-4842-0635-5_13_Fig2_HTML.jpg](img/A978-1-4842-0635-5_13_Fig2_HTML.jpg)


    **图 13-2.** 编辑和删除链接在查询字符串中包含记录的主键


    更新页面利用此信息显示正确的记录以供修改。删除链接中也传递了相同的信息到删除页面。


    要创建这样的列表，你需要从一个包含两行以及任意多显示列的 HTML 表格开始，此外还要为编辑和删除链接额外增加两列。第一行用于显示列标题。第二行被包裹在 PHP
    循环中，用于显示所有结果。`ch13` 文件夹中的 `blog_list_mysqli_01.php` 文件中的表格代码如下所示（`blog_list_pdo_01.php`
    中的版本相同，区别仅在于最后两个表格单元格中的链接指向的是 PDO 版本的更新和删除页面）：


    ```

    <table>

    <tr>

    <th>创建时间</th>

    <th>标题</th>

    <th>&nbsp;</th>

    <th>&nbsp;</th>

    </tr>

    <tr>

    <td></td>

    <td></td>

    <td><a href="blog_update_mysqli.php">编辑</a></td>

    <td><a href="blog_delete_mysqli.php">删除</a></td>

    </tr>

    </table>

    ```

