    \n## Introduction\n\n### Why Write This Book\n\nI decided to write this book after\
    \ spending a great deal of time working towards libraries that simplify the methods\
    \ used when working with strings, numbers, arrays etc. They’re called Scalar Types,\
    \ because PHP treats them differently to objects. They have no properties, no\
    \ methods.\n\nPHP has a rich history and a dominant place on the web. It has achieved\
    \ much despite language inconsistencies and difficulties, particularly when it\
    \ comes to these scalar types. Bjarne Stroustrup once said: “There are only two\
    \ kinds of languages: the ones people complain about and the ones nobody uses”.\
    \ PHP is one of those languages that *everybody* uses, yet that’s often seen as\
    \ a good reason to ignore the bad parts and just get stuff done.\n\nI’m all for\
    \ getting stuff done, and to that end I have used Plain Ol’ PHP for many years.\
    \ It’s always bugged me how procedural PHP is, in an ecosystem of OOP libraries\
    \ and frameworks. So I decided to take a deeper look at building a stronger type\
    \ system on top of PHP.\n\nThat’s the goal of this book. We look at using *standard*\
    \ PHP libraries. We look at using user-land libraries. We look at using extensions\
    \ and cross-compilers. All this works towards creating a set of reusable tools\
    \ which unify and ease the scalar types of PHP."
