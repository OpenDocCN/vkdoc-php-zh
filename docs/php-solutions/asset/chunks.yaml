    \    <th>filename</th>\n    <th>caption</th>\n</tr>\n<?php foreach ($conn->query($sql)\
    \ as $row) { ?>\n<tr>\n    <td><?php echo $row['image_id']; ?></td>\n    <td><?php\
    \ echo $row['filename']; ?></td>\n    <td><?php echo $row['caption']; ?></td>\n\
    </tr>\n<?php } ?>\n</table>\n```\n\nSave the page and view it in a browser. It\
    \ should look like the screenshot in PHP Solution 11-3. You can compare your code\
    \ against `pdo_02.php` in the `ch11` folder.\n\n### PDO connection crib sheet\n\
    \nTable [11-2](#A978-1-4842-0635-5_11_Chapter.html#Tab2) summarizes the basic\
    \ details of connection and database queries with PDO. Some commands will be used\
