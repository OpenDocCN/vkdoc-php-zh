- fmt: '### Discovering Operations


    Discovering operations is as simple as using the `getOperation` method from the
    [OperationCollection](#663561_1_En_1_Chapter.xhtml#Par65) service. Let’s create
    an `ApiOperationHandler` service to encapsulate this logic.


    ```php

    namespace App\Api;

    use App\Api\Collection\OperationCollection;

    use App\Api\Input\ApiInput;

    use App\Api\Output\ApiOutput;

    class ApiOperationHandler

    {

    public function __construct(

    private readonly OperationCollection $operationCollection,

    ){ }

    public function performOperation(ApiInput $apiInput): ApiOutput

    {

    $operation = $this->operationCollection->getOperation($apiInput->operation);

    return $operation->handler->perform($apiInput->data);

    }

    }

    ```


    The `performOperation` method receives an input model as a parameter. As this
    model holds the operation name, the method passes it to the `OperationCollection::getOperation`
    method and gets an `ApiOperation` wrapper, which holds the operation handler and
    the operation metadata. Then, it performs the operation (using the `OperationInterface::perform`
    method) and returns the result as an `ApiOutput` model.


    ### Handling `NotFoundOperationException` Errors


    When we wrote the operation collection service, we threw an exception when we
    did not find an operation. Let’s write the class for this exception:


    ```php

    use Symfony\Component\HttpKernel\Exception\NotFoundHttpException;

    class NotFoundOperationException extends NotFoundHttpException

    {

    }

    ```


    The exception class does nothing. It simply extends from the Symfony `NotFoundHttpException`,
    which automatically sets up the HTTP response code as a "404 Not Found". Now,
    we need to instruct Symfony to return a formatted JSON response within the missing
    operation message when this exception is thrown. To do it, we are going to write
    a [Symfony event subscriber](https://symfony.com/doc/current/event_dispatcher.html%2523listeners-or-subscribers)
    that will keep listening to the Symfony [KernelException event](https://symfony.com/doc/current/reference/events.html%2523kernel-exception).
    Symfony triggers this event every time an exception is thrown.


    ```php

    namespace App\EventSubscriber;

    use App\Exception\NotFoundOperationException;

    use Symfony\Component\EventDispatcher\EventSubscriberInterface;

    use Symfony\Component\HttpFoundation\JsonResponse;

    use Symfony\Component\HttpKernel\Event\ExceptionEvent;

    use Symfony\Component\HttpKernel\KernelEvents;

    class KernelSubscriber implements EventSubscriberInterface

    {

    public static function getSubscribedEvents(): array

    {

    return [

    KernelEvents::EXCEPTION => ''onException''

    ];

    }

    public function onException(ExceptionEvent $event): void

    {

    $exception = $event->getThrowable();

    if($exception instanceof NotFoundOperationException){

    $event->setResponse(new JsonResponse([

    ''errors'' => [

    ''operation'' => $exception->getMessage()

    ]

    ]));

    }

    }

    }

    ```


    As you can see in the above code, the `onException` method is executed after the
    kernel exception event is triggered. This method checks whether the exception
    thrown is an instance of `NotFoundOperationException`. If so, it creates a [JsonResponse](https://symfony.com/doc/current/components/http_foundation.html%2523creating-a-json-response)
    with the exception message and it is passed to the event `setResponse` method.
    Finally, this response is the one that will be returned to the end client.


    ### Conclusion


    We have explored the creation of a collection repository that acts as a central
    hub for storing all defined operations. Additionally, we have introduced a handler
    responsible for retrieving operations from the collection and executing them.
    Furthermore, we have addressed the scenario of encountering an operation that
    does not exist within the collection. By implementing mechanisms to handle "not
    found" operations gracefully, we can ensure robustness and user-friendliness within
    our API.


    In the next section, we will shift our focus to lazy operations. By leveraging
    the Symfony lazy loading techniques, we can ensure that our applications remain
    responsive and efficient, loading only the necessary components when they are
    needed.


    ## Section 4. Lazy Operations


    In the previous section, we learned how to use the Symfony capabilities to create
    a collection to store the operations that can be executed within our API. In an
    environment with plenty of operations available, it’s essential to consider the
    performance implications of loading all operations upfront. This is where lazy
    operations can come into play.


    Lazy operations allow us to defer the loading of operations until they are actually
    needed. This approach can significantly improve the performance of our API, especially
    when dealing with a large number of operations or with operations that are a bit
    heavy to instantiate.


    As an example, we could think about an operation that injects the mailer service.
    Even when you do not need the mailer, it is always instantiated in order to construct
    the operation and add it to the collection.


    To be able to add lazy operations to the collection, we are relying on the `lazy`
    parameter of the `Autoconfigure` attribute.


    ### The `LazyOperationInterface` Interface


    The `LazyOperationInterface` code is similar to the `OperationInterface` code
    but with the following differences:


    - The `Autoconfigure` attribute sets the parameter `lazy` as true. This means
    that the operations that implement this interface will be lazy-loaded into the
    collection.


    - It adds a method named `getMetadata` to return the operation metadata. This
    method is required because metadata attributes cannot be reliably accessed on
    lazy-loaded (proxied) services.


    ```php

    use App\Api\Attribute\OperationMetadata;

    use App\Api\Output\ApiOutput;

    use Symfony\Component\DependencyInjection\Attribute\Autoconfigure;

    #[Autoconfigure(lazy: true, tags: [''api.operation''])]

    interface LazyOperationInterface

    {

    public function perform(mixed $data): ApiOutput;

    public function getMetadata(): OperationMetadata;

    }

    ```


    We have to take into account that lazy operations services cannot be readonly
    classes nor final classes.


    ### Marking an Operation As Lazy


    To mark an operation as lazy, we only have to implement the previous interface.


    ```php

    use App\Api\Attribute\OperationMetadata;

    use App\Api\Operation\LazyOperationInterface;

    use App\Api\Output\ApiOutput;

    use App\Security\Miscelanea\OperationNames;

    class SendReportingByEmail implements LazyOperationInterface

    {

    public function perform(mixed $data): ApiOutput

    {

    /**

    * Required code to send the reporting by email

    */

    return new ApiOutput([

    ''report_id'' => ''5899865'', ''email_status'' => ''queued''

    ], 200);

    }

    public function getMetadata(): OperationMetadata

    {

    return new OperationMetadata(

    name: OperationNames::SendReportingByEmail->name,

    input: SendReportingByEmailInput::class

    );

    }

    }

    ```


    As we can see, the operation metadata is returned within the `getMetadata` method.


    ### Modifying the `OperationCollectionConfigurator`


    We have to modify the `OperationCollectionConfigurator` service to check whether
    an operation is flagged as lazy. If so, it will have to extract the metadata using
    the `getMetadata` method instead of reading the `OperationMetadata` attribute.


    ```php

    public function configure(OperationCollection $operationCollection): void

    {

    $operations = [];

    foreach ($this->apiOperations as $operation){

    if($operation instanceof LazyOperationInterface) {

    $metadata = $operation->getMetadata();

    $operations[$metadata->name] = new ApiOperation(

    $operation,

    $metadata

    );

    }

    else{

    $metadata = $this->readAttribute(OperationMetadata::class,  $operation);

    $operations[$metadata->name] = new ApiOperation($operation, $metadata);

    }

    }

    $operationCollection->setOperations($operations);

    }

    ```'
