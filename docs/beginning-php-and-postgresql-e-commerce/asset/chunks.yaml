    # CHAPTER 3


    ## Creating the Product Catalog: Part I


    After learning about the three-tier architecture and implementing a bit of your
    web site’s main page, it’s time to continue your work by starting to create the
    HatShop product catalog.


    Because the product catalog is composed of many components, you’ll create it over
    two chapters. In this chapter, you’ll create the first data table, implement access
    methods in the middle tier, and learn how to deal with the data tier. By the end
    of this chapter, you’ll finally have something dynamically generated on your web
    page. In Chapter 4, you’ll finish building the product catalog by adding support
    for categories, product lists, a product details page, and more!


    The main topics we’ll touch on in this chapter are


    - Analyzing the structure of the product catalog and the functionality it should
    support

    - Creating the database structures for the catalog and the data tier of the catalog

    - Implementing the business tier objects required to make the catalog run

    - Implementing a functional user interface for the product catalog


    ### Showing Your Visitors What You’ve Got


    One of the essential features required in any e-store is to allow the visitor
    to easily browse through the products. Just imagine what Amazon.com would be like
    without its excellent product catalog!


    Whether your visitors are looking for something specific or just browsing, it’s
    important to make sure their experience with your site is a pleasant one. After
    all, you want your visitors to find what they are looking for as easily and painlessly
    as possible. This is why you’ll want to add search functionality to the site and
    also find a clever way of structuring products into categories so they can be
    quickly and intuitively accessed.


    Depending on the size of the store, it might be enough to group products under
    a number of categories, but if there are a lot of products, you’ll need to find
    even more ways to categorize and structure the product catalog.


    Determining the structure of the catalog is one of the first tasks to accomplish
    in this chapter. Keep in mind that in a professional approach, these details would
    have been established before starting to code when building the requirements document
    for the project, as explained in Appendix B. However, for the purposes of this
    book, we prefer to deal with things one at a time.


    After the structure of the catalog is established, you’ll start writing the code
    that makes the catalog work as planned.


    ### What Does a Product Catalog Look Like?


    Today’s web surfers are more demanding than they used to be. They expect to find
    information quickly on whatever product or service they have in mind, and if they
    don’t find it, they are likely to go to the competition before giving the site
    a second chance. Of course, you don’t want this to happen to your visitors, so
    you need to structure the catalog to make it as intuitive and helpful as possible.


    Because the e-store will start with around 100 products and will probably have
    many more in the future, it’s not enough to just group them in categories. The
    store also has a number of departments and each department will contain a number
    of categories. Each category can then have any number of products attached to
    it.


    > **Note** Later in the book, you’ll also create the administrative part of the
    web site, often referred to as the Control Panel, which allows the client to update
    department, category, and product data. Until then, you’ll manually fill in the
    database with data (or you can “cheat” by using the SQL scripts provided as part
    of the Source Code/Download section of the Apress web site at `http://www.apress.com`,
    as you’ll see).


    Another particularly important detail that you need to think about is whether
    a category can exist in more than one department and whether a product can exist
    in more than one category. As you might suspect, this is the kind of decision
    that has implications on the way you code the product catalog, so you need to
    consult your client on this matter.


    For the HatShop product catalog, each category can exist in only one department,
    but a product can exist in more than one category. For example, the product “Military
    Beret” will appear in both “Berets” and “Military Hats” categories. This decision
    will have implications in the way you’ll design the database, and we’ll highlight
    those implications when we get there.


    Finally, apart from having the products grouped in categories, you also want to
    have featured products. For this web site, a product can be featured either on
    the front page or in the department pages. The next section shows a few screenshots
    that explain this.


    ### Previewing the Product Catalog


    Although you’ll have the fully functional product catalog finished by the end
    of Chapter 4, taking a look at it right now will give you a better idea about
    where you’re heading. In Figure 3-1, you can see the HatShop front page and two
    of its featured products.


    Note the departments list in the upper-left corner of the page. The list of departments
    is dynamically generated with data gathered from the database; you’ll implement
    the list of departments in this chapter.


    When site visitors click a department in the departments list, they go to the
    main page of the specified department. This replaces the store’s list of catalog-featured
    products with a page containing information specific to the selected department—including
    the list of featured products for that department. In Figure 3-2, you see the
    page that will appear when the Holiday department is clicked.


