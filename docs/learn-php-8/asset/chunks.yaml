- fmt: '# 用户输入验证与过滤


    确保从用户接受信息并将信息传递给应用程序的整个过程中，所有验证都是一致的，这一点非常重要。HTML和JavaScript代码很容易被用户查看（你可以在浏览器中通过“查看源代码”看到代码）。任何高安全级别格式的验证都应该在编译并受服务器保护的编程语言中完成。


    - **安全性与性能**——你可能会疑惑为什么要在用户端进行验证。为什么不直接将所有信息传递给服务器上的程序，让程序告诉你是否需要修复任何问题？有些程序员确实这样做。然而，目标是拥有高效的程序。通过尝试在用户浏览器中验证信息，可以减少与服务器的往返调用次数。这提高了应用程序和Web服务器的性能与效率。此外，正如你将看到的，通过在浏览器中进行验证，文本框中的内容仍然可供用户调整。如果验证在Web服务器上完成，HTML表单中的信息可能会丢失，因为每次与Web服务器收发信息时，网页都会重新加载。


    浏览器中验证的目标是确保用户提供的信息满足服务器上程序的要求。你最初可能会对这个示例向用户显示所需信息的格式感到不满。然而，目标不是保护数据安全；目标是确保数据有效。向用户告知所请求的数据格式并非安全漏洞。


    ## 动手实践


    1. 调整示例[5-1](#394210_2_En_5_Chapter.xhtml#PC1)，包含第[4](#394210_2_En_4_Chapter.xhtml)章“动手实践”中的性别信息。使用文本框从用户处接收信息。尝试使用HTML5来限制用户可以在文本框中输入的信息类型。测试你的代码。


    # PHP 过滤


    现在是时候看看对PHP文件（`lab.php`）需要做哪些更改了。我们需要能够接收来自HTML程序的属性与值（`dog_name`、`dog_breed`、`dog_color`和`dog_weight`）。但是，我们需要担心有人可能会尝试发送可能影响程序运行甚至导致系统崩溃的信息。


    本节采用两种方法来帮助减少有害数据的可能性。首先，我们将确定是否已收到所有必需信息。如果没有，我们将要求用户返回HTML页面（`lab.html`）输入信息。这至少可以确保我们拥有所有数据，并且这些数据可能已经通过了HTML5页面提供的验证。其次，我们将从接收到的数据中过滤掉HTML、JavaScript和PHP语法。这将减少可执行语句被传递到程序中的机会。


    ```php

    <?php declare(strict_types=1);

    require_once("dog.php");

    if ((isset($_POST[''dog_name''])) && (isset($_POST[''dog_breed''])) && (isset($_POST[''dog_color'']))
    && (isset($_POST[''dog_weight''])))

    {

    string $dog_name = filter_var( $_POST[''dog_name''],

    FILTER_SANITIZE_STRING);

    string $dog_breed = filter_var( $_POST[''dog_breed''],

    FILTER_SANITIZE_STRING);

    string $dog_color = filter_var( $_POST[''dog_color''],

    FILTER_SANITIZE_STRING);

    string $dog_weight = filter_var( $_POST[''dog_weight''],

    FILTER_SANITIZE_STRING);

    $lab = new Dog($dog_name,$dog_breed,$dog_color,$dog_weight);

    list($name_error, $breed_error, $color_error, $weight_error) =

    explode('','', $lab);

    ...

    示例5-2

    lab.php顶部含有clean_input方法的部分列表

    ```


    *关于PHP函数`filter_var`的更多信息，请访问* [`www.php.net/manual/en/function.filter-var.php`](http://www.php.net/manual/en/function.filter-var.php)。*关于与`filter_var`一起使用的过滤器类型的更多信息，请访问*
    [`www.php.net/manual/en/filter.filters.php`](http://www.php.net/manual/en/filter.filters.php)。*关于`$_POST`的更多信息，请访问*
    [`www.php.net/manual/en/reserved.variables.post.php`](http://www.php.net/manual/en/reserved.variables.post.php)。


    在`lab.php`的顶部，我们添加了几个项目以提供更安全的代码。


    ```php

    if ((isset($_POST[''dog_name''])) && (isset($_POST[''dog_breed''])) &&

    (isset($_POST[''dog_color''])) && (isset($_POST[''dog_weight''])))

    ```


    这个`if`语句使用`isset`方法和`$_POST`来验证所有四个属性（`dog_name`、`dog_breed`、`dog_color`和`dog_weight`）都已通过`POST`方法从HTML文件传递到程序中。如果所有项目都已传递，那么我们将过滤（清理）这些项目。如果其中任何一个没有传递，一个`else`语句（我们稍后将查看）将请求用户返回`lab.html`页面输入所有必需信息。


    ```php

    string $dog_name = filter_var( $_POST[''dog_name''],

    FILTER_SANITIZE_STRING);

    string $dog_breed = filter_var( $_POST[''dog_breed''],

    FILTER_SANITIZE_STRING);

    string $dog_color = filter_var( $_POST[''dog_color''],

    FILTER_SANITIZE_STRING);

    string $dog_weight = filter_var( $_POST[''dog_weight''],

    FILTER_SANITIZE_STRING);

    ```


    `filter_var`方法与`FILTER_SANITIZE_STRING`过滤器将移除所有标签和其他字符来净化字符串。在字符串被净化后，它消除了用户输入可执行代码的可能性。但是，此时它不会消除不合逻辑的字符（例如狗名字中的数字）。我们稍后将进一步清理每个单独的字符串。


    - **安全性与性能**——程序过滤掉从应用程序外部接收到的任何可能有害的信息至关重要。在有害数据被使用或保存之前，先将其移除或拒绝，要容易得多。在当今发生重大安全漏洞的情况下，这是绝对必须做的。


    演示的过滤器方法不会阻止某人输入“asabsbabsa”作为狗的名字。然而，这些方法将防止任何输入造成危害。


    ```php

    else

    {

    print "Missing or invalid parameters. Please go back to the lab.html page to

    enter valid information.";

    print "Dog Creation Page";

    }

    示例5-3

    lab.php底部的部分列表

    ```


    前面提到的`if`语句的`true`部分包含了`lab.php`文件中的所有活动代码。如果一个或多个参数缺失，`else`部分（位于`lab.php`文件的底部）将请求用户返回`lab.html`页面正确输入信息。


    ## 动手实践


    1. 调整新的`lab.php`文件（从本书网站下载）中的代码。添加代码以过滤不良的性别代码，并确保已从HTML文件接收到性别信息。确保通过`filter_var`方法传递你的属性以移除任何有害数据。


    # 额外的HTML输入安全


    从本章到目前为止开发的代码中可以看出，每当在HTML表单上使用文本框时，必须在多个区域包含额外的代码来验证用户输入的内容。当你需要允许用户在输入内容上有灵活性（例如包含姓名和地址的表单）时，文本框是必需的。但是，当你希望将用户的响应限制在特定的可能值列表（例如州的两字母缩写）时，可以使用其他表单对象。这将提供更有效的数据，因为用户将无法输入拼写错误或无效数据。


