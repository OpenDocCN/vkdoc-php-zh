    `$error = ''There was a problem deleting the record.'';`


    `}`


    `}`


    If you are using PDO, use the `errorCode()` method. The code for a query that
    fails as a result of a foreign-key constraint is `HY000`. After checking the number
    of affected rows, you can check the error code with a PDO prepared statement,
    like this:


    `$deleted = $stmt->rowCount();`


    `if (!$deleted) {`


    `if ($stmt->errorCode() == ''HY000'') {`


    `$error = ''That record has dependent files in a child table, and cannot be deleted.'';`


    `} else {`


    `$error = ''There was a problem deleting the record.'';`


    `}`


    `}`


    The technique is the same if you use the PDO `exec()` method, which returns the
    number of affected rows with a non-`SELECT` query. When using `exec()`, the `errorCode()`
    method is called on the database connection.


    `$deleted = $conn->exec($sql);`


    `if (!$deleted) {`


