    public function searchEntry ( $searchTerm ) {

    $sql = "SELECT entry_id, title FROM blog_entry

    WHERE title LIKE ?

    OR entry_text LIKE ?";

    $data = array( "%$searchTerm%", "%$searchTerm%" );

    $statement = $this->executeSQL($sql, $data);

    return $statement;

    }

    ```

    清单 8-21

    部分清单 `Searched_Blog_Entry_Table.class.php`


    或许需要为 `$data` 数组稍作解释。*当两个元素完全相同时*，创建包含两个独立元素的数组难道不奇怪吗？实际上，SQL 中未命名占位符的数量必须与数组中执行的项目数量完全一致。由于
    SQL 中有两个占位符，我们需要一个包含两个值的数组用于搜索。在上述示例中，代码将在两个不同的表列（`title` 和 `entry_text`）中搜索相同的搜索词。


    ## 使用 LIKE 条件进行搜索


    前面的 SQL 语句展示了一个本书先前示例中未使用过的 SQL 关键字：`LIKE`。


    ```php

    $sql = "SELECT entry_id, title FROM blog_entry

    WHERE title LIKE ?

    OR entry_text LIKE ?";

    $data = array( "%$searchTerm%", "%$searchTerm%" );

    ```


    `%` 字符表示通配符。通配符可以代表任何内容。该查询将返回所有 `title` 或 `entry_text` 包含搜索值（无论出现在这些列中的任何位置）的行结果集。例如，如果搜索值为“test”，则可能返回
    `title` 为“test if it works”的行；也可能返回 `entry_text` 值为“This is a test”的行。由于通配符同时位于搜索词的前后，因此两种结果都有可能。


    ## 搜索结果视图


    为了以用户易于理解的方式展示搜索结果，我们需要创建一个搜索视图。我们将为返回的数据包裹一些 HTML 代码。


    ```php

    您搜索的关键词为：$searchTerm";

    while ( $searchRow = $searchData->fetchObject() ){

    $href = "searchedindex.php?page=searchedblog&id=$searchRow->entry_id";

    $searchedHTML .= "$searchRow->title";

    }

    $searchedHTML .= "";

    $info .= $searchedHTML;

    ?>

    ```

    清单 8-22

    `searched-results-html.php`


    上述代码假定存在一个 `$searchData` 变量。如果找不到该变量，则会触发错误。如果找到 `$searchData` 变量，代码将通过 `while`
    语句遍历结果集。`while` 循环将为每个与搜索条件匹配的 `blog_entry` 创建一个 `<li>` 元素。


    ## 从控制器加载搜索结果视图


    为了在浏览器中显示搜索结果，我们必须加载搜索结果视图。将视图与模型关联是控制器的任务。


    ```php

    searchEntry( $searchTerm ) ;

    include_once "views/searched-results-html.php";

    }

    ?>

