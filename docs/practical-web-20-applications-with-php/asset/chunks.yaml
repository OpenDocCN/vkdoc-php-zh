    The way we achieve this setup of using controller and action names to dictate
    permissions is to write a plug-in for Zend_Controller (by extending the Zend_Controller_Plugin_


    Abstract class). This plug-in defines the preDispatch() method, which receives
    a user request before the front controller dispatches the request to the respective
    action. Effectively, we are intercepting the request and checking whether the
    current user has sufficient privileges to execute that action.


    To register a plug-in with Zend_Controller, we call the registerPlugin() method
    on our Zend_Controller_Front instance. Before we do that, let’s create the plug-in,
    which we will call CustomControllerAclManager. We will create all roles and resources
    for Zend_Acl in this class, as well as checking permissions.


    Listing 3-5 shows the contents of the CustomControllerAclManager.php file, which
    we will store in the /var/www/phpweb20/include directory.


    **Listing 3-5.** *The CustomControllerAclManager Plug-in, Which Checks Permissions
    Prior to* *Dispatching User Requests (CustomControllerAclManager.php)*


