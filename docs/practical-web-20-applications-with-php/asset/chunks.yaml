    Implementing Web 2.0 Features


    **U**p untilnow in this book, we have looked at various techniques of using Ajax
    (that is, the XMLHttpRequest object with the help of Prototype) to manipulate
    data in the web application we are developing.


    Some examples of this include updating the HTML content on a web page dynamically,
    validating forms, and using JSON as a means to exchange data between the client
    and the server.


    Although these techniques are very useful and somewhat straightforward to implement,
    they are not the only features that define a web site as being “Web 2.0.” In this
    chapter, we will look at some of the other features of Web 2.0, which include
    the following:


    • **Tags.** A tag is typically one or two words used to describe some arbitrary
    item. Because a tag is usually very concise, it is used as a way to categorize
    said items. One item can have multiple tags, and if used properly, one tag will
    belong to multiple items.


    • **Web feeds.** A web feed is a stream of a web site’s content provided by the
    site’s owner in order to allow other publishers to display that data. This is
    often done using the Atom or RSS standard, although other formats are available.


    • **Microformats.** A microformat is a simple data format used to formally structure
    certain kinds of HTML data. For instance, whenever you want to list a person’s
    contact details on a web page, you would mark it up in HTML according to the hCard
    microformat (which we will look at later in this chapter). You can still style
    and lay out the contact details however you’d like in your CSS, but by marking
    it up in this way a microformat reader can recognize this data easily as a person’s
    contact details. For more information about microformats[, visit http://microformats.org.](http://microformats.org)


    In this chapter, we will extend the capabilities of the blogging system we have
    created to allow users to assign tags to posts. We will then change the output
    of their home page to categorize their blog posts based on the assigned tags.


    Next we will take a look at web feeds by creating an Atom feed of a user’s blog
    using the Zend_Feed component of the Zend Framework.


    Finally, we will look at microformats and how to consume them using the Operator
    plugin for Firefox. We will use the rel-tag microformat on the tagging system
    we create, as well as extend user accounts to allow a public profile. We will
    then display the created profile using the hCard microformat, allowing contact
    details to be easily exported to other programs.


