    除了作为语言解释器，操作系统还是一个内存管理器。在所有高级编程语言（如 `PHP`）中，当数据需要临时存储在内存中，或更永久地存储在存储设备（或云服务器）上时，操作系统就会接管。作为程序员，我们通过创建变量或常量来请求操作系统将数据存储在内存中。变量类似于我们在代数中使用的变量。在代数中，当
    `A + B = C` 时，`A`、`B` 和 `C` 都是变量。我们知道它们可以代表任何数字。在编程中，同样的变量也可以存储数字，甚至字符，同时通知操作系统暂时将这些项目存储在内存中。


    大多数编程语言（包括 `PHP`）将代数等式反转成 `C = A + B`。为什么？很高兴你问到这点。虽然 `A`、`B` 和 `C` 是变量，但编程中的等号实际上是一个赋值运算符。它会将右侧（`A
    + B`）的任何内容取过来，存储到左侧（`C`）中。因此，它取出存储在 `A` 中的值（数字），将其与存储在 `B` 中的值相加，然后将结果放入变量 `C`
    中。这三个变量都驻留在计算机的内存中。


    我们加法程序的结果存储在内存的某个位置，而我们不知道具体在哪里。什么？我们真的不关心在哪里，只要我们能使用变量 `C` 在需要时随时检索它即可。我们信任操作系统为我们提供支持（它会妥善地存储和保护我们的信息）。


    操作系统会查看存储在变量中的值，或者查看程序代码中的变量声明语句，以帮助确定如何存储该变量。请记住，比特模式用于表示计算机中的所有字符（包括数字）。当信息存储在内存或存储设备中时，它以比特格式存储。因此，操作系统需要知道存储的是数字还是字符。数字
    1 和字符 1 之间有区别。基本上，我们通常不对字符进行数学运算，但会对数字进行。因此，系统需要知道我们是否可能进行数学运算。如果我们要在计算中使用它，它会以一种允许我们进行计算的格式存储。我们将在使用
    `PHP` 进行计算时进一步探讨这一点。


    这也引出了我们与计算机之间的另一个区别。我们使用十进制系统创建数字。我们从 0 数到 9（十个不同的数字）。然后当需要进入下一个数字时，我们增加一位数形成数字
    10。如你所知，当我们到 100（10 组 10）时，最终还要加一位数。然而，计算机使用二进制系统（基数为 2）来存储 0 或 1（两个不同的数字）。当计算机需要存储更大的数字时，它会增加一位（10）。你可能已经注意到，在使用计算机或购买计算机时，一切似乎实际上都基于八的倍数（8、16、32、64……）。为什么？实际上，这是随着我们添加更多比特而逻辑上产生的。


    将二进制 0 转换为十进制 0（或将二进制 1 转换为十进制 1）很容易，因为它们表示相同的值（零或一）。然而，二进制 10 与十进制 10 是不同的。十进制
    10 代表 10 个值（十个手指）。在上一段中，我们提到当二进制数需要大于 1 时，需要增加一位。二进制 10 比 1 大一；它是十进制中的数字 2（两根手指）。


    困惑了吗？让我们看一些例子。


    **表 1-1 十进制与二进制对比**


    | 十进制 | 二进制（基数为 2） |

    | :--- | :--- |

    | 0 | 0 |

    | 1 | 1 |

    | 2 | 10 |

    | 3 | 11 |

    | 4 | 100 |

    | 5 | 101 |

    | 6 | 110 |

    | 7 | 111 |


    请记住，二进制中第一位（最右边）是 0 或 1。第二位代表 2。因此，`10` 是 2（2 + 0）。`11` 是 3（2 + 1）。由于 `11` 是 3，我们必须增加一位来产生
    4（`100`）。5 是 `101`（4 + 0 + 1）。6 是 `110`（4 + 2 + 0）。7 是 `111`（4 + 2 + 1）。这需要一些练习才能习惯。不要纠结于细节；如果你理解了基本概念，随着编程技能的提升，你最终会恍然大悟。请注意，当我们达到三位数（`111`）时，实际上已经创建了八个值（0–7）。这逻辑上表明比特可以基于八的倍数进行收集。`111
    111` 将是两组 8（8 × 2 = 16）。`111 111 111` 是三组 8（8 × 3 = 24）。`111 111 111 111` 是 32（8
    × 4）。在确定计算机如何存储信息时，我们关注八的倍数就合乎逻辑了。我们继续吧；稍后会再次讨论这一点。


    让我们回到操作系统的讨论。操作系统还会决定变量存储在内存中的什么位置。操作系统用来确定数据存储位置的算法（代码）非常精良且高效。它经过多年调整，为信息存储提供了最佳解决方案。操作系统会考虑很多因素（对于一个初级书籍来说，太多以至于无法深入探讨）来决定将数据存储在何处。它考虑的一些因素包括：数据可能被使用的频率、哪个程序在使用它、数据的大小以及存储的数据类型。


    我们希望你现在能看到，操作系统使我们的生活作为程序员变得更加轻松。我们无需担心存储位置等细节，甚至不必担心实际程序在内存中的运行位置。操作系统会为我们的程序所需的一切分配内存位置。它还会努力保护我们的程序不受其他试图造成伤害的程序的侵扰，甚至在我们程序崩溃时处理问题。根据程序崩溃的原因，它甚至可能通过错误消息告诉我们发生了什么。例如，如果没有足够的内存来运行我们的程序（或继续运行我们的程序），它会告知我们。

