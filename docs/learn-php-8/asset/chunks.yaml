    ## JSON Backup and Recovery


    What changes are needed to provide backup and recovery for JSON data instead of
    XML data? Actually, no changes at all. As long as the changes from the first section
    of this chapter are implemented, the `displaychangelog` program and the changes
    to the `dog_data` class will handle JSON in the same manner as XML data.


    ## MySQL Backup and Recovery


    As you might be guessing, as long as the changes from the second section of this
    chapter are implemented, no additional changes will be required for backup and
    recovery of MySQL data. However, we can take a moment to look at an alternative
    way of handling MySQL data.


    It is a common practice to create a SQL script file to execute against a database.
