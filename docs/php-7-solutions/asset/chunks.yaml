- fmt: "# Nesting Include Files\n\nOnce a file has been included in another, relative\
    \ paths are calculated from the parent file, not from the included file. This\
    \ presents problems for functions or class definitions in an external file that\
    \ need to include another external file.\n\nIf both external files are in the\
    \ same folder, you include a nested file with just the filename, like this:\n\n\
    ```php\nrequire_once 'Thumbnail.php';\n```\n\nIn this case, the relative path\
    \ should *not* begin with `./` because `./` means “start from this folder.” With\
    \ an include file, “this folder” means the parent file’s folder, not the include\
    \ file’s folder, resulting in an incorrect path to the nested file.\n\nWhen the\
    \ include files are in different folders, you can build an absolute path to the\
    \ target file using the PHP constant `__DIR__`. This constant returns the absolute\
    \ path of the include file’s directory (folder) without a trailing slash. Concatenating\
    \ `__DIR__`, a forward slash, and a document-relative path converts the relative\
    \ path into an absolute one. For example, let’s say this is the relative path\
    \ from one include file to another:\n\n```php\n'../File/Upload.php'\n```\n\nYou\
    \ convert it into an absolute path like this:\n\n```php\n__DIR__ . '/../File/Upload.php'\n\
    ```\n\nAdding the forward slash to the beginning of the document-relative path\
    \ has the effect of finding the parent folder of the include file, then going\
    \ up one level to find the correct path. You’ll see an example of this in use\
    \ in Chapter [10](#332054_4_En_10_Chapter.xhtml), where an include file needs\
    \ to include another file that’s in a different folder.\n\n# Chapter Review\n\n\
    This chapter has plunged you headlong into the world of PHP, using includes, arrays,\
    \ and multidimensional arrays. It has shown you how to extract the name of the\
    \ current page, display a random image, and get the image’s dimensions. You have\
    \ also learned how to throw and catch exceptions and to redirect to a different\
    \ page. There’s a lot to absorb, so don’t worry if it doesn’t all sink in the\
    \ first time. The more you use PHP, the more familiar you’ll become with the basic\
    \ techniques. In the next chapter you’ll learn how PHP processes input from online\
    \ forms and will use that knowledge to send feedback from a web site to your email\
    \ inbox.\n\n# Bringing Forms to Life\n\nForms lie at the very heart of working\
    \ with PHP. You use forms for logging in to restricted pages, registering new\
    \ users, placing orders with online stores, entering and updating information\
    \ in a database, sending feedback … and the list goes on. The same principles\
    \ lie behind all these uses, so the knowledge you gain from this chapter will\
    \ have practical value in most PHP applications. To demonstrate how to process\
    \ information from a form, I’m going to show you how to gather feedback from visitors\
    \ to your site and send it to your mailbox.\n\nUnfortunately, user input can expose\
    \ your site to malicious attacks. It’s important to check data submitted from\
    \ a form before accepting it. Although HTML5 form elements validate user input\
    \ in modern browsers, you still need to check the data on the server. HTML5 validation\
    \ helps legitimate users avoid submitting a form with errors, but malicious users\
    \ can easily sidestep checks performed in the browser. Server-side validation\
    \ is not optional, but essential. The PHP solutions in this chapter show you how\
    \ to filter out or block anything suspicious or dangerous. No online application\
    \ is completely hack-proof, but it doesn’t take a lot of effort to keep all but\
    \ the most determined marauders at bay. It’s also a good idea to preserve user\
    \ input and redisplay it if the form is incomplete or errors are discovered.\n\
    \nThese solutions build a complete mail-processing script that can be reused in\
    \ different forms, so it’s important to read them in sequence.\n\nIn this chapter,\
    \ you’ll learn about the following:\n\n- Understanding how user input is transmitted\
    \ from an online form\n- Displaying errors without losing user input\n- Validating\
    \ user input\n- Sending user input by email\n\n## How PHP Gathers Information\
    \ from a Form\n\nAlthough HTML contains all the necessary tags to construct a\
    \ form, it doesn’t provide any means to process the form when submitted. For that,\
    \ you need a server-side solution, such as PHP.\n\nThe Japan Journey web site\
    \ contains a simple feedback form (see Figure [6-1](#332054_4_En_6_Chapter.xhtml#Fig1)).\
    \ Other elements—such as radio buttons, check boxes, and drop-down menus—will\
    \ be added later.\n\n![../images/332054_4_En_6_Chapter/332054_4_En_6_Fig1_HTML.jpg](images/332054_4_En_6_Chapter/332054_4_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1. Processing a feedback form is one of the most popular uses of PHP\n\
    \nFirst, let’s take a look at the HTML code for the form (it’s in `contact_01.php`\
    \ in the `ch06` folder):\n\n```html\n<form method=\"post\" action=\"\">\n    <p>\n\
    \        <label for=\"name\">Name:</label>\n        <input type=\"text\" name=\"\
    name\" id=\"name\">\n    </p>\n    <p>\n        <label for=\"email\">Email:</label>\n\
    \        <input type=\"text\" name=\"email\" id=\"email\">\n    </p>\n    <p>\n\
    \        <label for=\"comments\">Comments:</label>\n        <textarea name=\"\
    comments\" id=\"comments\" cols=\"30\" rows=\"10\"></textarea>\n    </p>\n   \
    \ <p>\n        <input type=\"submit\" name=\"send\" id=\"send\" value=\"Send message\"\
    >\n    </p>\n</form>\n```\n\nThe first two `<input>` tags and the `<textarea>`\
    \ tag contain both `name` and `id` attributes set to the same value. The reason\
    \ for this duplication is accessibility. HTML uses the `id` attribute to associate\
    \ the `<label>` element with the correct `<input>` element. Form-processing scripts,\
    \ however, rely on the `name` attribute. So, although the `id` attribute is optional\
    \ in the Submit button, you *must* use the `name` attribute for each form element\
    \ that you want to be processed.\n\n**Note:** The `name` attribute of a form input\
    \ element shouldn’t normally contain spaces. If you want to combine multiple words,\
    \ join them with an underscore (PHP will do this automatically if you leave any\
    \ spaces). Because the script developed later in this chapter converts the `name`\
    \ attributes to PHP variables, don’t use hyphens or any other characters that\
    \ are invalid in PHP variable names.\n\nTwo other things to notice are the `method`\
    \ and `action` attributes inside the opening `<form>` tag. The `method` attribute\
    \ determines how the form sends data. It can be set to either `post` or `get`.\
    \ The `action` attribute tells the browser where to send the data for processing\
    \ when the Submit button is clicked. If the value is left empty, as here, the\
    \ page attempts to process the form itself. However, an empty `action` attribute\
    \ is invalid in HTML5, so that will need to be fixed.\n\n**Note:** I have deliberately\
    \ avoided using any of the new HTML5 form features, such as `type=\"email\"` and\
    \ the `required` attribute. This makes it easier to test the PHP server-side validation\
    \ scripts. After testing, you can update your forms to use the HTML5 validation\
    \ features. Validation in the browser is mainly a courtesy to the user to prevent\
    \ incomplete information from being submitted, so it’s optional. Server-side validation\
    \ should never be skipped.\n\n### Understanding the Difference Between `post`\
    \ and `get`\n\nThe best way to demonstrate the difference between the `post` and\
    \ `get` methods is with a real form. If you completed the previous chapter, you\
    \ can continue working with the same files.\n\nOtherwise, the `ch06` folder contains\
    \ a complete set of files for the Japan Journey site with all the code from Chapter\
    \ [5](#332054_4_En_5_Chapter.xhtml) incorporated in them. Copy `contact_01.php`\
    \ to the site root and rename it `contact.php`. Also copy `footer.php`, `menu.php`,\
    \ and `title.php` of the `ch06/includes` folder to the `includes` folder in the\
    \ site root.\n\n1. Locate the opening `<form>` tag in `contact.php` and change\
    \ the value of the `method` attribute from `post` to `get`, like this:\n\n```html\n\
    <form method=\"get\" action=\"\">\n```\n\n2. Save `contact.php` and load the page\
    \ in a browser. Type your name, email address, and a short message into the form,\
    \ then click Send message.\n\n![../images/332054_4_En_6_Chapter/332054_4_En_6_Figa_HTML.jpg](images/332054_4_En_6_Chapter/332054_4_En_6_Figa_HTML.jpg)\n\
    \n3. Look in the browser address bar. You should see the contents of the form\
    \ attached to the end of the URL, like this:\n\n![../images/332054_4_En_6_Chapter/332054_4_En_6_Figb_HTML.jpg](images/332054_4_En_6_Chapter/332054_4_En_6_Figb_HTML.jpg)\n\
    \nIf you break up the URL, it looks like this:"
