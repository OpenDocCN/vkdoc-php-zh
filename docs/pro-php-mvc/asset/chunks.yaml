    \ value=\"登录\" />\n        </li>\n    </ol>\n</form>\n```\n\n登录表单非常简单。它只有两个字段，用于输入电子邮件地址和密码，我们将在\
    \ `Users->login()` 操作中使用它们，如**代码清单 14-12** 所示。\n\n***代码清单 14-12.*** `Users->login()`\
    \ 操作\n\n```php\npublic function login()\n{\n    if (RequestMethods::post(\"login\"\
