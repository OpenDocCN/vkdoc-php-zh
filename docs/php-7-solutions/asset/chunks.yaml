- fmt: "1.  `$checkPwd = new CheckPassword($password, 10);`\n\n2.  Save and test the\
    \ page again. If you encounter any problems, compare your code with `register_02.php`\
    \ in the `ch11` folder and `CheckPassword_01.php` in the `ch11/PhpSolutions/Authenticate`\
    \ folder.\n\n3.  Assuming that your code is working, add to the class definition\
    \ in `CheckPassword.php` the public methods to set the password strength. Where\
    \ you put them inside the class makes no difference technically (as long as they’re\
    \ inside the curly braces), but my preference is to put public methods in the\
    \ same order as they’re used. You need to set the options before calling the `check()`\
    \ method , so insert the following code between the constructor and `check()`\
    \ method definitions:\n\n```\npublic function requireMixedCase() {\n    $this->mixedCase\
    \ = true;\n}\npublic function requireNumbers($num = 1) {\n    if (is_numeric($num)\
    \ && $num > 0) {\n        $this->minNums = (int) $num;\n    }\n}\npublic function\
    \ requireSymbols($num = 1) {\n    if (is_numeric($num) && $num > 0) {\n      \
    \  $this->minSymbols = (int) $num;\n    }\n}\n```\n\nThis code is pretty straightforward.\
    \ The `requireMixedCase()` method takes no arguments and resets the `$mixedCase`\
    \ property to `true`. The other two methods take one argument, check that it’s\
    \ a number greater than 0, and assign it to the relevant property. The `(int)`\
    \ casting operator ensures that it’s an integer (see “Explicitly changing a variable’s\
    \ data type” in Chapter 4 for a detailed explanation). The value of `$num` sets\
    \ the minimum amount of numbers or nonalphanumeric symbols the password must contain.\
    \ By default, the value is set to 1, making the argument optional.\n\n4.  The\
    \ `check()` method needs to be updated to perform the necessary checks for these\
    \ strength criteria. Amend the code like this:\n\n```\npublic function check()\
    \ {\n    if (preg_match('/\\s{2,}/', $this->password)) {\n        $this->errors[]\
    \ = 'Password can contain only single spaces.';\n    }\n    if (preg_match('/^\\\
    s+|\\s+$/', $this->password)) {\n        $this->errors[] = 'Password cannot begin\
    \ or end with spaces.';\n    }\n    if (strlen($this->password) < $this->minChars)\
    \ {\n        $this->errors[] = \"Password must be at least $this->minChars characters.\"\
    ;\n    }\n    if ($this->mixedCase) {\n        $pattern = '/(?=.*\\p{Ll})(?=.*\\\
    p{Lu})/u';\n        if (!preg_match($pattern, $this->password)) {\n          \
    \  $this->errors[] = 'Password should include uppercase and lowercase characters.';\n\
    \        }\n    }\n    if ($this->minNums) {\n        $pattern = '/\\d/';\n  \
    \      $found = preg_match_all($pattern, $this->password, $matches);\n       \
    \ if ($found < $this->minNums) {\n            $this->errors[] = \"Password should\
    \ include at least $this->minNums number(s).\";\n        }\n    }\n    if ($this->minSymbols)\
    \ {\n        $pattern = '/[\\p{S}\\p{P}]/u';\n        $found = preg_match_all($pattern,\
    \ $this->password, $matches);\n        if ($found < $this->minSymbols) {\n   \
    \         $this->errors[] = \"Password should include at least $this->minSymbols\
    \ nonalphanumeric character(s).\";\n        }\n    }\n    return $this->errors\
    \ ? false : true;\n}\n```\n\nEach of the three new conditional statements is run\
    \ only if the equivalent public method is called before the `check()` method.\
    \ Each one stores a regular expression as `$pattern` and then uses `preg_match()`\
    \ or `preg_match_all()` to test the password.\n\nIf the `$mixedCase` property\
    \ is set to `true`, the regular expression and password are passed to `preg_match()`\
    \ to look for at least one lowercase letter and one uppercase letter in any position\
    \ in the password. The regular expression uses Unicode category metacharacters\
    \ for lowercase and uppercase, so permitted characters are not restricted to the\
    \ unaccented characters A–Z. The lowercase `u` after the closing delimiter is\
    \ a modifier that treats the pattern and subject strings as UTF-8.\n\nThe `$minNums`\
    \ and `$minSymbols` properties are set to 0 by default. If they’re reset to a\
    \ positive number, the regular expression and password are passed to the `preg_match_all()`\
    \ function to find how many times the regex matches. The function requires three\
    \ arguments: the regex, the string to be searched, and a variable to store the\
    \ matches; it returns the number of matches found. In this case, all you’re interested\
    \ in is the number of matches. The variable that stores the matches is discarded.\n\
    \nThe `$pattern` in the last conditional statement uses the Unicode category metacharacters\
    \ for math symbols, currency signs, punctuation, and other symbols together with\
    \ the UTF-8 modifier.\n\n5.  Save `CheckPassword.php` and test the updated class\
    \ by calling the new methods in `register.php`. For example, the following requires\
    \ the password to have a minimum of ten characters, at least one uppercase and\
    \ one lowercase letter, two numbers, and one nonalphanumeric symbol:\n\n```\n\
    $checkPwd = new CheckPassword($password, 10);\n$checkPwd->requireMixedCase();\n\
    $checkPwd->requireNumbers(2);\n$checkPwd->requireSymbols();\nif ($checkPwd->check())\
    \ {\n```\n\nIt doesn’t matter in which order you call the new methods, as long\
    \ as they’re after the constructor and before the call to the `check()` method.\
    \ Use a variety of combinations to enforce different strengths of password.\n\n\
    If necessary, check your code against `register_03.php` in the `ch11` folder and\
    \ `CheckPassword_02.php` in the `ch11/PhpSolutions/Authenticate` folder.\n\nWhen\
    \ developing the code for this chapter, I originally designed the password checker\
    \ as a function. The basic code inside the function was the same, but I decided\
    \ to convert it into a class to make it more flexible and easier to use. The problem\
    \ with the function was that it needed a large number of arguments to set the\
    \ different options, and it was difficult to remember which order they came in.\
    \ There was also the difficulty of handling the result. If there were no errors,\
    \ the function returned `true`; but if any errors were found, it returned the\
    \ array of error messages. Since PHP treats an array with elements as implicitly\
    \ `true`, this meant having to use the identical operator (three equal signs—see\
    \ Table 4-6) to check whether the result was a Boolean `true`. Converting the\
    \ code to a class eliminated these problems. The public methods to set the options\
    \ have intuitive names and can be set in any order—or not at all. And the result\
    \ is always a Boolean `true` or `false`, because a separate method retrieves the\
    \ array of error messages. It involved writing more code, but the improvements\
    \ made it worthwhile.\n\n## PHP Solution 11-4: Creating a File-based User Registration\
    \ System\n\nThis PHP solution creates a simple user registration system that hashes\
    \ passwords with the `password_hash()` function. It uses the `CheckPassword` class\
    \ from PHP Solution 11-3 to enforce minimum strength requirements. Further checks\
    \ ensure that the username contains a minimum number of characters and that the\
    \ user has retyped the password correctly in a second field. The user credentials\
    \ are stored in a plain text file, which must be outside the web server’s document\
    \ root. The instructions assume you have set up a `private` folder that PHP has\
    \ write access to, as described in Chapter 7. It’s also assumed that you’re familiar\
    \ with the “Appending content with fopen()” section in that chapter.\n\nContinue\
    \ working with the files from the preceding PHP solution. Alternatively, use `register_03.php`\
    \ in the `ch11` folder and `CheckPassword_02.php` in the `ch11/PhpSolutions/Authenticate`\
    \ folder.\n\n1.  Create a file called `register_user_csv.php` in the `includes`\
    \ folder and strip out any HTML inserted by your script editor."
