    \ Zend Framework 库并解压其内容。您应该会找到一个名为 `Zend` 的文件夹，其中包含该框架的所有组件。如果您的服务器上已经在运行 Zend，请记下相对于\
    \ `app/vendors` 文件夹的路径。否则，将 `Zend` 文件夹放在 `app/vendors` 目录中。如同 `Textile` 的安装一样，在评论添加操作中编写\
    \ `App::import()` 函数来引入 Zend `Akismet` 组件（列表 12-5）。\n\n**列表 12-5.** *在* `app/controllers/comments_controller.php`\
    \ *文件中导入 `Akismet` 组件*\n\n```\nfunction add() {\n    App::import('Vendor','akismet',array('file'=>'Zend/Service/Akismet.php'));\n\
    ```\n\n此时，您需要偏离典型的 Cake 协议，因为您现在处理的是 Zend。在列表 12-5 的第 6 行，您通过引用 `Zend/Service/Akismet.php`\
    \ 文件引入了 `Akismet` 组件。但是，当此脚本在评论控制器中被调用时，存在一个问题：它会运行相对于 `Zend` 目录的自身包含。这需要更改，以避免与\
    \ Cake 的路径发生冲突。打开 `Zend/Service/Akismet.php` 文件，并在任何包含函数之前插入一个新的 `include_path`\
    \ 定义来解决此问题：\n\n```\nini_set('include_path', dirname(dirname(dirname(__FILE__))));\n\
    ```\n\n现在，您可以开始在控制器中使用 `Akismet` 组件了。接下来，通过在评论添加操作中调用 `Zend_Service_Akismet` 类来实例化一个新对象：\n\
    \n```\n$akismet = new Zend_Service_Akismet('************','http://localhost/blog');\n\
    ```\n\n请注意，要开始一个新的 `Akismet` 对象，您必须在第一个参数中提供 API 密钥，在第二个参数中提供博客的 URI。密钥（您应该已从\
    \ Akismet 获得）通常是一个 12 位的字母数字字符串。\n"
