  trans: "\n# 我们不预设 inspector 属性已设置\n\n我们不预设 `inspector` 属性已被设置。这种情况通常发生在子类未调用其父类\
    \ `__construct()` 方法时。为此会给出相应的错误描述。我们假设任何到达 `__call()` 方法的访问器方法调用，都指向子类中已定义的非公开属性。我们假设这些调用遵循\
    \ `setProperty()`/`getProperty()` 的格式，因此会去除 `get/set` 部分，并在剩余字符串后附加一个下划线。\n\n\
    这将有效地将对 `setColor()`/`getColor()` 的调用转换为 `_color`。如果子类中不存在该属性，则会抛出异常。如果调用的方法是\
    \ getter，我们会（通过元数据）判断读取该属性是否被允许。只有当属性包含 `@read` 或 `@readwrite` 标记时，才允许读取。如果允许读取，则返回该属性的值。\n\
    \n如果调用的方法是 setter，我们会判断写入该属性是否被允许。只有当属性包含 `@write` 或 `@readwrite` 标记时，才允许写入。如果允许写入，则将该属性的值设置为第一个参数的值。你可能会好奇这些异常是什么样的，因为我们只是抛出了更多方法的结果。\n\
    \n如果我们创建继承自这个 `Base` 类的子类，就可以直接开始使用 getter/setter，只需在子类的元数据中设置 `@read`/`@write`/`@readwrite`\
    \ 标记即可。当然，实际 `Base` 类中包含了大量代码，如果我们只打算使用一两次，则无需创建它。\n\n然而，在我们的框架中，几乎所有其他类都将继承自\
    \ `Base` 类，因此这是一项值得的投资！现在，我们无需在每个需要访问器方法的类中自行编写这些方法，只需继承 `Base` 类，所有繁重的工作便会自动完成。\n\
    \n## 透明的 Getter/Setter\n\n在本章开头，我们对比了使用公开属性和使用 getter/setter 的差异。如果我们能像使用公开属性那样使用受保护属性，同时又保留\
    \ getter/setter 带来的额外数据安全性，那会怎样？答案是可行的，方法就是使用清单 3-10 中展示的两个魔术方法。\n\n***清单 3-10.***\
    \ `__get()`/`__set()` 魔术方法\n\n```\npublic function __get($name)\n{\n    $function\
    \ = \"get\".ucfirst($name);\n    return $this->$function();\n}\n\npublic function\
    \ __set($name, $value)\n{\n    $function = \"set\".ucfirst($name);\n    return\
    \ $this->$function($value);\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第 3 章 ■ 基类\n\n乍一看，这些方法似乎没做什么实质性的工作。`__get()` 方法接受一个参数，该参数代表被访问的属性名称。以 `$obj->property`\
    \ 为例，该参数将是 `property`。\n\n然后，我们的 `__get()` 方法会将其转换为 `getProperty`，这与我们在 `__call()`\
    \ 方法中定义的命名模式相匹配。这意味着 `$obj->property` 会首先尝试设置同名的公开属性，然后进入 `__get()`，接着尝试调用公开方法\
    \ `setProperty()`，再进入 `__call()`，最后设置受保护的 `$_property`。\n\n`__set()` 方法的工作原理类似，不同之处在于它接受第二个参数，用于定义要设置的值。如果查看图\
    \ 3-1 所示的示意图，可能会更容易理解发生了什么。\n\n**`$obj->property = \"foo\";`**\n\n| `public $property`\
