  raw: '### Making Passwords More Secure


    Although this file-based user authentication setup is adequate for restricting
    access to webpages, all the passwords are stored in plain text. For greater security,
    it’s advisable to encrypt passwords. For many years, it was recommended to use
    the `MD5` or `SHA-`1 algorithms to encrypt passwords as a 32- or 40-digit hexadecimal
    number. One of their original strengths, speed, has turned out to be a major weakness.
    Automated scripts can process huge numbers of calculations per second in a brute
    force attack to determine the original value—not so much guessing as trying every
    possible combination.


    PHP 5.5 introduced a much more robust system of encrypting and verifying passwords
    using two functions: `password_hash()` and `password_verify()`. To encrypt a password,
    just pass it to the `password_hash()` function, like this:


    `$encrypted = password_hash($password, PASSWORD_DEFAULT);`


    The second argument to `password_hash()` is a constant that leaves the choice
    of encryption method up to PHP, allowing you to keep up to date with what is considered
    the most secure method at the time.


    Note


    The `password_hash()` function has other options for advanced users. For details,
    see [`http://php.net/manual/en/function.password-hash.php`](http://php.net/manual/en/function.password-hash.php)
    . There’s also a FAQ (frequently asked questions) page about safe password hashing
    at [`http://php.net/manual/en/faq.passwords.php`](http://php.net/manual/en/faq.passwords.php)
    .


    Using `password_hash()` performs one-way encryption. This means that even if your
    password file is exposed, no one will be able to work out what the passwords are.
    It also means that you have no way of converting an encrypted password back to
    its original value. In one respect, this is unimportant: when a user logs in,
    `password_verify()` checks the submitted value against the encrypted version.
    The disadvantage is that there is no way that you can send users password reminders
    if they forget them; you must generate a new password. Nevertheless, good security
    demands encryption.


    ENABLING PASSWORD HASHING IN OLDER VERSIONS OF PHP


    The password hashing functions are not available prior to PHP 5.5. However, if
    your server is running PHP 5.3.7 or later, or any version of PHP 5.4, you can
    enable the same functionality with the `password_compat` library.


    To check whether `password_compat` will run on your version of PHP, download `version-test.php`
    from [`https://github.com/ircmaxell/password_compat`](https://github.com/ircmaxell/password_compat)
    . If it outputs Pass, include `password.php` to enable the password hashing functions
    in a script. This is a single file that can be downloaded from the `lib` folder
    at the same URL.


    Once you have included `password.php`, the functions work exactly the same as
    in PHP 5.5 and later.


    Encryption is no protection against the most common problem with passwords: ones
    that are easy to guess or that use common words. Many registration systems now
    enforce the use of stronger passwords by requiring a mixture of alphanumeric characters
    and symbols.


    To improve the basic login system developed so far, you need to create a user
    registration form that checks the following:


    *   That the password and username contain a minimum number of characters

    *   That the password matches minimum strength criteria, such as containing a
    mixture of numbers, uppercase and lowercase characters, and symbols

    *   That the password matches a second entry in a confirmation field

    *   That the username isn’t already in use


    ### PHP Solution 9-6: Creating a Password-strength Checker


    This PHP solution shows how to create a class that checks whether a password meets
    certain requirements, such as no spaces, a minimum number of characters, and a
    combination of different types of characters. By default, the class checks only
    that the password has no spaces and contains a minimum number of characters. Optional
    methods allow you to set tougher conditions, such as using a combination of uppercase
    and lowercase characters, numbers, and nonalphanumeric symbols.


    This PHP solution starts by building the user registration form that will also
    be used in PHP Solution 9-7.


    Create a page called `register.php` in the `sessions` folder and insert a form
    with three text input fields and a Submit button. Lay out the form and name the
    input elements as shown in the following screenshot. If you want to save time,
    use `register_01.php` in the `ch09` folder.


    ![A978-1-4842-0635-5_9_Figh_HTML.jpg](A978-1-4842-0635-5_9_Figh_HTML.jpg)


    As always, you want the processing script to run only if the form has been submitted,
    so everything needs to be enclosed in a conditional statement that checks whether
    the `name` attribute of the Submit button is in the `$_POST` array. Then you need
    to check that the input meets your minimum requirements. Insert the following
    code in a PHP block above the `DOCTYPE` declaration:


    `if (isset($_POST[''register''])) {`


    `$username = trim($_POST[''username'']);`


    `$password = trim($_POST[''pwd'']);`


    `$retyped = trim($_POST[''conf_pwd'']);`


    `require_once ''../PhpSolutions/Authenticate/CheckPassword.php'';`


    `}`


    Create a new folder called `Authenticate` in the `PhpSolutions` folder. Then create
    a file called `CheckPassword.php` inside the new folder. It will contain only
    PHP script, so strip out any HTML and add the following code:


    *   The code inside the conditional statement passes the input from the three
    text fields to `trim()` to remove whitespace from the beginning and end, and it
    assigns the results to simple variables. Next it includes the file that will contain
    the class that checks the password, which you’ll define next.


    `<?php`


    `namespace PhpSolutions\Authenticate;`


    `class CheckPassword {`


    `protected $password;`


    `protected $minimumChars;`


    `protected $mixedCase = false;`


    `protected $minimumNumbers = 0;`


    `protected $minimumSymbols = 0;`


    `protected $errors = [];`


    `public function __construct($password, $minimumChars = 8) {`


    `$this->password = $password;`


    `$this->minimumChars = $minimumChars;`


    `}`


    `public function check() {`


    `if (preg_match(''/\s/'', $this->password)) {`


    `$this->errors[] = ''Password cannot contain spaces.'';`


    `}`


    `if (strlen($this->password) < $this->minimumChars) {`


    `$this->errors[] = "Password must be at least`


    `$this->minimumChars characters.";`


    `}`


    `return $this->errors ? false : true;`


    `}`


    `public function getErrors() {`


    `return $this->errors;`


    `}`


    `}`


    Save `CheckPassword.php` and switch to `register.php`.   In `register.php`, add
    the following line immediately after the opening PHP tag to import the CheckPassword
    class:'
  trans: "\n### 提升密码安全性\n\n尽管这种基于文件的用户认证方式足以限制网页访问权限，但所有密码都以明文形式存储。为了更高的安全性，建议对密码进行加密。多年来，一直推荐使用`MD5`或`SHA-1`算法将密码加密为\
    \ 32 位或 40 位的十六进制数。这些算法最初的优势——运算速度快——如今却成为了主要弱点。自动化脚本每秒可进行海量计算，通过暴力破解尝试所有可能的组合来推断原始值。\n\
    \nPHP 5.5 引入了一个更强大的密码加密和验证系统，使用两个函数：`password_hash()`和`password_verify()`。要加密密码，只需将其传递给`password_hash()`函数，如下所示：\n\
    \n```\n$encrypted = password_hash($password, PASSWORD_DEFAULT);\n```\n\n`password_hash()`的第二个参数是一个常量，它将加密方法的选择权交给\
    \ PHP，让你能够始终采用当前公认最安全的加密方法。\n\n**注意：** `password_hash()`函数为高级用户提供了其他选项。详情请参见[`http://php.net/manual/en/function.password-hash.php`](http://php.net/manual/en/function.password-hash.php)。关于安全密码哈希的常见问题（FAQ）页面位于[`http://php.net/manual/en/faq.passwords.php`](http://php.net/manual/en/faq.passwords.php)。\n\
    \n使用`password_hash()`执行的是单向加密。这意味着即使你的密码文件泄露，也没有人能破解出原始密码。这也意味着你无法将加密后的密码还原回原始值。从某个角度来看，这无关紧要：当用户登录时，`password_verify()`会将提交的值与加密版本进行比对。缺点是如果用户忘记密码，你无法向他们发送密码提醒；你必须生成一个新密码。尽管如此，出于安全考虑，加密是必要的。\n\
    \n### 在旧版 PHP 中启用密码哈希\n\n密码哈希函数在 PHP 5.5 之前的版本中不可用。不过，如果你的服务器运行的是 PHP 5.3.7 或更高版本，或者任何\
    \ PHP 5.4 版本，你可以通过`password_compat`库启用相同的功能。\n\n要检查`password_compat`是否能在你的 PHP\
    \ 版本上运行，请从[`https://github.com/ircmaxell/password_compat`](https://github.com/ircmaxell/password_compat)下载`version-test.php`。如果输出结果为\"\
    Pass\"，则在脚本中包含`password.php`即可启用密码哈希函数。这是一个单个文件，可以从同一 URL 下的`lib`文件夹中下载。\n\n一旦包含了`password.php`，这些函数的工作原理与\
    \ PHP 5.5 及更高版本完全相同。\n\n加密并不能防范密码最常见的问题：密码过于简单或使用常见词汇。许多注册系统现在通过要求混合使用字母数字字符和符号来强制使用更强的密码。\n\
    \n为了改进目前开发的基本登录系统，你需要创建一个用户注册表单，用于检查以下内容：\n\n- 密码和用户名包含最少字符数\n- 密码符合最低强度标准，例如包含数字、大小写字母和符号的混合\n\
    - 密码与确认字段中的第二次输入一致\n- 用户名尚未被使用\n\n## PHP 解决方案 9-6：创建密码强度检查器\n\n本 PHP 解决方案演示如何创建一个类，用于检查密码是否满足特定要求，例如无空格、最少字符数以及不同类型字符的组合。默认情况下，该类仅检查密码是否无空格并包含最少字符数。可选方法允许你设置更严格的条件，例如使用大小写字母、数字以及非字母数字符号的组合。\n\
    \n本 PHP 解决方案从构建用户注册表单开始，该表单也将在 PHP 解决方案 9-7 中使用。\n\n在`sessions`文件夹中创建一个名为`register.php`的页面，并插入一个包含三个文本输入字段和一个提交按钮的表单。按以下截图中所示布局表单并命名输入元素。如果想节省时间，请使用`ch09`文件夹中的`register_01.php`。\n\
    \n![A978-1-4842-0635-5_9_Figh_HTML.jpg](img/A978-1-4842-0635-5_9_Figh_HTML.jpg)\n\
    \n与往常一样，你希望处理脚本仅在表单提交后运行，因此所有内容都需要封装在一个条件语句中，该语句检查提交按钮的`name`属性是否存在于`$_POST`数组中。然后你需要检查输入是否满足最低要求。在`DOCTYPE`声明上方的\
    \ PHP 代码块中插入以下代码：\n\n```\nif (isset($_POST['register'])) {\n    $username = trim($_POST['username']);\n\
    \    $password = trim($_POST['pwd']);\n    $retyped = trim($_POST['conf_pwd']);\n\
    \    require_once '../PhpSolutions/Authenticate/CheckPassword.php';\n}\n```\n\n\
    在`PhpSolutions`文件夹中创建一个名为`Authenticate`的新文件夹。然后在新文件夹内创建一个名为`CheckPassword.php`的文件。该文件仅包含\
    \ PHP 脚本，因此移除所有 HTML 并添加以下代码：\n\n- 条件语句内的代码将三个文本字段的输入传递给`trim()`以去除首尾空白，并将结果赋值给简单变量。接下来包含将包含密码检查类的文件，你将随后定义该类。\n\
    \n```\n<?php\nnamespace PhpSolutions\\Authenticate;\n\nclass CheckPassword {\n\
    \    protected $password;\n    protected $minimumChars;\n    protected $mixedCase\
    \ = false;\n    protected $minimumNumbers = 0;\n    protected $minimumSymbols\
    \ = 0;\n    protected $errors = [];\n\n    public function __construct($password,\
    \ $minimumChars = 8) {\n        $this->password = $password;\n        $this->minimumChars\
    \ = $minimumChars;\n    }\n\n    public function check() {\n        if (preg_match('/\\\
    s/', $this->password)) {\n            $this->errors[] = '密码不能包含空格。';\n       \
    \ }\n        if (strlen($this->password) < $this->minimumChars) {\n          \
    \  $this->errors[] = \"密码长度必须至少为$this->minimumChars 个字符。\";\n        }\n     \
    \   return $this->errors ? false : true;\n    }\n\n    public function getErrors()\
    \ {\n        return $this->errors;\n    }\n}\n```\n\n保存`CheckPassword.php`并切换到`register.php`。在`register.php`中，在开头的\
    \ PHP 标签后立即添加以下一行以导入`CheckPassword`类：\n"
- fmt: "# CheckPassword 类文档\n\n- 这定义了基本的`CheckPassword`类，它最初只检查密码是否包含空格以及是否具有所需的最少字符数。您很快就会添加其他功能。\n\
    - 该文件首先声明`PhpSolutions\\Authenticate`为其命名空间，然后定义具有六个受保护属性的`CheckPassword`类。前两个用于密码和最少的字符数。`$mixedCase`、`$minimumNumbers`和`$minimumSymbols`属性将用于增强密码强度，但最初设置为`false`或0。`$errors`属性将用于在密码未通过任何检查时存储错误消息数组。\n\
    - 构造函数方法接受两个参数：密码和最少的字符数，并将它们分配给相关属性。默认情况下，最少字符数设置为8，这使得此参数可选。\n- `check()`方法包含两个条件语句。第一个使用`preg_match()`和一个正则表达式来搜索密码中的空白字符。第二个条件语句使用`strlen()`，它返回字符串的长度，并将结果与`$minimumChars`进行比较。\n\
    - 如果密码未通过任一测试或两个测试都未通过，`$errors`属性将包含至少一个元素，PHP将其视为固有的`true`。`check()`方法中的最后一行使用`$errors`属性作为三元运算符的条件。如果发现任何错误，`check()`方法返回`false`，表示密码验证失败。否则，返回`true`（如果您需要提醒此结构的工作原理，请参阅[第3章](#A978-1-4842-0635-5_3_Chapter.html)中的“使用三元运算符”）。\n\
    - `getErrors()`公共方法简单地返回错误消息数组。\n\n`use PhpSolutions\\Authenticate\\CheckPassword;`\n\
    \n**注意**\n\n您必须始终在脚本的顶层导入带命名空间的类。试图在条件语句中导入该类会产生解析错误。\n\n在表单提交后执行代码的条件语句内部，创建一个`CheckPassword`对象，传递`$password`作为参数。然后调用`check()`方法并处理结果，如下所示：\n\
    \n```php\nrequire_once '../PhpSolutions/Authenticate/CheckPassword.php';\n\n$checkPwd\
    \ = new CheckPassword($password);\n$passwordOK = $checkPwd->check();\n\nif ($passwordOK)\
    \ {\n    $result = ['Password OK'];\n} else {\n    $result = $checkPwd->getErrors();\n\
    }\n```\n\n`CheckPassword`构造函数的第二个参数是可选的，因此省略它会将最少字符数设置为默认的8。`check()`方法的结果被赋值给`$passwordOK`。如果返回`true`，则一个报告密码正常的单元素数组被赋值给`$result`。否则，使用`getErrors()`方法从`$checkPwd`对象中检索错误数组。\n\
    \n**注意**\n\n一旦测试完成，单元素数组将被注册用户的脚本替换。您需要使用数组，因为下一步将使用`foreach`循环来显示结果。\n\n在页面正文的表单上方添加以下\
    \ PHP 代码块：\n\n```php\n<h1>Register User</h1>\n<?php\nif (isset($result)) {\n \
    \   echo '<ul>';\n    foreach ($result as $item) {\n        echo \"<li>$item</li>\"\
    ;\n    }\n    echo '</ul>';\n}\n?>\n<form action=\"\" method=\"post\">\n```\n\n\
    保存`register.php`并在浏览器中加载它。通过不填写任何字段单击“注册”按钮来测试`CheckPassword`类。您应该会看到一条消息，告知您密码至少需要8个字符。使用包含8个字符的密码尝试。您应该看到“Password\
    \ OK”。使用至少8个字符但在中间插入空格的密码尝试。您将收到警告，不允许使用空格。使用少于8个字符但中间有空格的密码尝试。您将看到以下警告：\n\n-\
    \ 这会在表单提交后以无序列表的形式显示密码测试的结果。\n\n![A978-1-4842-0635-5_9_Figi_HTML.jpg](A978-1-4842-0635-5_9_Figi_HTML.jpg)\n\
    \n更改`register.php`中的代码，将可选的第二个参数传递给`CheckPassword`构造函数，将最少字符数设置为10：\n\n```php\n\
    $checkPwd = new CheckPassword($password, 10);\n```\n\n保存并再次测试页面。如果遇到任何问题，请将您的代码与`ch09`文件夹中的`register_02.php`和`ch09/PhpSolutions/Authenticate`文件夹中的`CheckPassword_01.php`进行比较。假设您的代码正常工作，将设置密码强度的公共方法添加到`CheckPassword.php`中的类定义中。从技术上讲，将它们放在类中的哪个位置没有区别（只要它们在大括号内），但我倾向于按照使用顺序放置公共方法。您需要在调用`check()`方法之前设置选项，因此将以下代码插入到构造函数和`check()`方法定义之间：\n\
    \n```php\npublic function requireMixedCase() {\n    $this->mixedCase = true;\n\
    }\n\npublic function requireNumbers($num = 1) {\n    if (is_numeric($num) && $num\
    \ > 0) {\n        $this->minimumNumbers = (int) $num;\n    }\n}\n\npublic function\
    \ requireSymbols($num = 1) {\n    if (is_numeric($num) && $num > 0) {\n      \
    \  $this->minimumSymbols = (int) $num;\n    }\n}\n```\n\n需要更新`check()`方法以执行这些强度标准的必要检查。如下修改代码：\n\
    \n- 这段代码非常简单。`requireMixedCase()`方法不接受任何参数，并将`$mixedCase`属性重置为`true`。其他两个方法接受一个参数，检查它是否大于0的数字，并将其分配给相关属性。`(int)`类型转换操作符确保它是一个整数。您首次在PHP方案6-4中遇到类型转换操作符（有关详细说明，请参阅[第6章](#A978-1-4842-0635-5_6_Chapter.html)中的“显式更改数据类型”）。`$num`的值设置了密码必须包含的最少数字或非字母数字符号的数量。默认情况下，该值设置为1，使参数可选。\n\
    \n```php\npublic function check() {\n    if (preg_match('/\\s/', $this->password))\
    \ {\n        $this->errors[] = 'Password cannot contain spaces.';\n    }\n\n \
    \   if (strlen($this->password) < $this->minimumChars) {\n        $this->errors[]\
    \ = \"Password must be at least $this->minimumChars characters.\";\n    }\n\n\
    \    if ($this->mixedCase) {\n        $pattern = '/(?=.*[a-z])(?=.*[A-Z])/';\n\
    \        if (!preg_match($pattern, $this->password)) {\n            $this->errors[]\
    \ = 'Password should include uppercase and lowercase characters.';\n        }\n\
    \    }\n\n    if ($this->minimumNumbers) {\n        $pattern = '/\\d/';\n    \
    \    $found = preg_match_all($pattern, $this->password, $matches);\n        if\
    \ ($found < $this->minimumNumbers) {\n            $this->errors[] = \"Password\
    \ should include at least $this->minimumNumbers number(s).\";\n        }\n   \
    \ }\n\n    if ($this->minimumSymbols) {\n        $pattern = \"/[-!$%^&*(){}<>[\\\
    ]'\" . '\"|#@:;.,?+=_\\/\\∼]/';\n        $found = preg_match_all($pattern, $this->password,\
    \ $matches);\n        if ($found < $this->minimumSymbols) {\n            $this->errors[]\
    \ = \"Password should include at least $this->minimumSymbols nonalphanumeric character(s).\"\
    ;\n        }\n    }\n\n    return $this->errors ? false : true;\n}\n```"
  raw: '*   This defines the basic `CheckPassword` class, which initially checks only
    whether the password contains any spaces and whether it has the required minimum
    number of characters. You’ll add the other features shortly.

    *   The file begins by declaring `PhpSolutions\Authenticate` as its namespace,
    and then defines the `CheckPassword` class with six protected properties. The
    first two are for the password and minimum number of characters. The `$mixedCase`,
    `$minimumNumbers`, and `$minimumSymbols` properties will be used to add strength
    to the password but are initially set to `false` or 0\. The `$errors` property
    will be used to store an array of error messages if the password fails any of
    the checks.

    *   The constructor method takes two arguments, the password and the minimum number
    of characters, and assigns them to the relevant properties. By default, the minimum
    number of characters is set to 8, making this an optional argument.

    *   The `check()` method contains two conditional statements. The first uses `preg_match()`
    with a regular expression that searches for whitespace characters inside the password.
    The second conditional statement uses `strlen()`, which returns the length of
    a string and compares the result with `$minimumChars`.

    *   If the password fails either test, or both, the `$errors` property contains
    at least one element, which PHP treats as intrinsically `true`. The final line
    in the `check()` method uses the `$errors` property as the condition with the
    ternary operator. If any errors are found, the `check()` method returns `false`,
    indicating that the password has failed validation. Otherwise, it returns `true`
