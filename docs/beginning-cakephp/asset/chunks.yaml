  trans: "\n# 自定义控制器与模型\n\n本操作中的大部分逻辑与本章“自定义博客控制器”部分讨论的命令类似。不同之处在于它使用了模型函数。在第 6 章中，我简要讨论了`save()`函数，现在我将更详细地解释这个模型函数。\n\
    \n## `save()`函数\n\n如前所述，`save()`函数接受一个格式化数组（通常是自动格式化的`$this->data`数组），并将其值保存到数据库中匹配的字段中。\n\
    \n该函数还提供了一些其他参数，用于数据验证和指定数据将保存到哪些字段（请参见表 7-6）。\n\n**表 7-6.** `save()`模型函数中可用的参数（按顺序）\n\
    \n| 名称 | 类型 | 默认值 | 说明 |\n|------|------|--------|------|\n| `data` | `Array`\
    \ | `null` | 要保存到数据库的数据，按字段和值进行键控 |\n| `validate` | `Boolean` | `true` | 触发在相应模型中指定的数据验证\
    \ |\n| `fieldList` | `Array` | `null` | 允许写入数据的字段列表 |\n\n`save()`函数根据保存的成功与否返回`true`或`false`。\n\
    \n例如，当数据验证发生并未通过测试（如模型中指定的那样）时，模型将返回`false`。在控制器中，可以指定诸如闪存消息或对失败验证做出反应等其他方法。\n\
    \n请注意，清单 7-6 中的第 4 行已经用于处理`save()`函数的返回结果。换句话说，如果`save()`函数返回`true`，第 4 行会触发第\
    \ 5-6 行的执行。要运行验证测试，你不必使用控制器（实际上，你应该避免使用控制器），你可以在模型内部单独运行验证。\n\n## 数据验证\n\nWeb\
    \ 开发中最繁琐的任务之一可能就是对用户提交的表单进行数据验证测试。这项任务如此繁琐的一个原因是，当你给用户一个开放式字段时，他们真的可以向应用程序提交任何内容。\n\
    \n应用程序如何知道如何处理用户可能提供的无数文本变体？与其陷入关于正则表达式的冗长而艰苦的讨论中，Cake 让你用更少的技术术语来解决这个问题。\n\n\
    为用户提交的表单（如添加操作）设置数据验证的第一步是打开模型并开始定义验证规则。转到`app/models/post.php`文件。\n\n它应该看起来像清单\
    \ 7-7 中的代码。\n\n**清单 7-7.** Post 模型\n\n```php\n<?\nclass Post extends AppModel\
    \ {\n    var $name = 'Post';\n    var $belongsTo = array('User');\n    var $hasAndBelongsToMany\
    \ = array('Tag');\n}\n?>\n```\n\n你已经构建了与`User`和`Tag`模型的关联。通过在 5 行和 6 行之间插入一个新行，开始构建你的验证规则。\n\
    \n```php\nvar $validate = array();\n```\n\n到目前为止，`$validate`属性数组中还没有输入任何规则。要创建验证规则，只需将数组键控为对应于字段及其规则。如果在保存过程中任何规则未满足，模型将向控制器返回错误并退出保存过程。\n\
    \n`posts`表将接收`name`、`date`和`content`字段的数据，并将接收关联的`User`模型的 ID。你可以通过为每个字段提供一个键并在`$validate`数组中提供一个规则来验证为这些字段提供的数据类型。在这里，数据库中的字段类型将帮助你确定要存储的数据类型。`name`字段是一个标准的`varchar`字段，因此你可能希望验证此处存储的唯一字符是字母数字。只需将以下字符串添加到`$validate`数组中：`var\
    \ $validate = array('name'=>'alphaNumeric');`\n"
- fmt: "You could continue the array for all the other fields with rules that match\
    \ their field types like so:\n\n```\nvar $validate = array(\n    'name'=>'alphaNumeric',\n\
    \    'date'=>'date',\n    'content'=>null\n);\n```\n\n## Using Multiple Validations\n\
    \nMany more validation possibilities exist. You may need to check the length of\
    \ the supplied string, or the symbols used, or even apply multiple rules to a\
    \ single field. The model can accommodate more options simply by extending each\
    \ field with its own array. Each item in this array will contain a key that matches\
    \ an available option and the value you supply for validation.\n\n## Required\
    \ Fields\n\nTo require a field, use the `required` boolean option:\n\n```\nvar\
    \ $validate = array('name'=>array('required'=>true));\n```\n\nIn this example,\
    \ if the user submitted a null value for `name`, then the model would fail during\
    \ validation. Thus, the `save()` function in the controller would return `false`,\
    \ telling the controller that nothing was saved to the database.\n\nAnother important\
    \ point about this parameter is that it will continue to invalidate if no index\
    \ for the field is found in the data array. For instance, `$this->data` is the\
    \ array with keys and values that get saved, and if no key exists for the field\
    \ name to be validated, `required` will also invalidate.\n\nYou may have constructed\
    \ the database in such a way that a field may need to remain empty, but not trigger\
    \ an invalidation response if the key is missing from the data array. To do this,\
    \ use the `allowEmpty` parameter. By setting this parameter to `false`, you are\
    \ essentially saying \"Do not allow this field to contain empty characters like\
    \ spaces, tabs, and so on.\" The catch is that this parameter is called into the\
    \ validation only if there exists a key for the field in the data array.\n\n##\
    \ Setting Error Messages During Validation\n\nYou can customize the invalidation\
    \ error message to be used by the controller and/or displayed in the view. You\
    \ do this with the `message` key:\n\n```\nvar $validate = array(\n    'name'=>array(\n\
    \        'rule'=>'alphaNumeric',\n        'message'=>'The Title of the Post can\
    \ only contain alphanumeric characters'\n    )\n);\n```\n\nTo display this error\
    \ message in the view, be sure to include the Form helper's `error()` function:\n\
    \n```\n<?=$form->input('name');\n<?=$form->error('name');\n```\n\n## Create or\
    \ Update?\n\nTwo possibilities exist for saving data: creating a new record or\
    \ updating one. Sometimes you may need validation to occur only during an update\
    \ process and not when creating a new record, or vice versa. To distinguish which\
    \ type of save needs validating, use the `on` parameter:\n\n```\nvar $validate\
    \ = array(\n    'name'=>array(\n        'rule'=>'alphaNumeric',\n        'message'=>'The\
    \ Title of the Post can only contain alphanumeric characters',\n        'on'=>'create'\n\
    \    )\n);\n```\n\nThe available options for the `on` key are `create` and `update`.\n\
    \n## Using Built-in Validation Rules\n\nSeveral built-in validation rules reduce\
    \ certain data-checking processes to a single parameter. Table 7-7 lists the available\
    \ rules.\n\n**Table 7-7.** *Built-in Rules*\n\n| **Value** | **Rule** | **Example**\
    \ |\n| --------- | -------- | ----------- |\n| `alphaNumeric` | Field must contain\
    \ only letters and numbers | `'rule'=>'alphaNumeric'` |\n| `between` | Length\
    \ of field must be between supplied values | `'rule'=>array('between',10,20)`\
    \ |\n| `blank` | Field must be left blank or contain only whitespace characters\
    \ | `'rule'=>'blank'` |\n| `cc` | Field must be a valid credit card number | `'rule'=>array('cc','fast')`\
    \ |\n| `comparison` | Field's numeric value is compared to a supplied value |\
    \ `'rule'=>array('comparison','>=',21)` |\n| `date` | Field must contain a valid\
    \ date string | `'rule'=>'date'` |\n| `decimal` | Field must be a valid decimal\
    \ number | `'rule'=>'decimal'` |\n| `email` | Field must be a valid e-mail address\
    \ | `'rule'=>'email'` |\n| `equalTo` | Field must equal the supplied value | `'rule'=>array('equalTo','www')`\
    \ |\n| `extension` | Field must contain the supplied file extension suffix | `'rule'=>array('extension','jpg')`\
    \ |\n| `ip` | Field must be a valid IPv4 address | `'rule'=>'ip'` |\n| `minLength`\
    \ | | |"
