    19\n</div>\n```\n\n清单 8-12 的第 11 行将评论的唯一 ID 附加到 `vote_` 后面，以便为你提供一个唯一标识的 `<div>`\
    \ 元素进行更新。添加评论表单已经会执行一些 Ajax 操作，因此为了避免更新元素时发生任何冲突，我确保了每个评论的 ID 都是唯一的。\n\n清单 8-12\
    \ 中的大部分标记都是为了组织该功能的设计，使其对用户可访问，并且可以根据你自身网站的设计进行修改。但第 14 和 15 行包含了 `$ajax->link()`\
