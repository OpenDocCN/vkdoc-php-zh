  \n648XCH16.qxd 11/19/06 12:31 PM Page 537\n\n\n\n## 第 16 章：产品评论\n\n至此，您已拥有一个功能完整的电子商务网站。但这并不妨碍您为其添加更多功能，使其对访客更加实用和友好。\n\
  \n通过在网站上添加产品评论系统，您可以提高访客回访率——他们可能会为已购商品撰写评论，或者查看他人对商品的评价。\n\n评论系统还能帮助您了解客户偏好，从而改进商品推荐策略，甚至根据客户反馈调整网站或商品目录结构。\n\
  \n为了方便您和客户，我们将产品评论列表及添加新评论的表单整合到商品详情页中。添加新评论的表单仅对注册用户显示，因为我们决定不允许匿名评论（当然，您也可以根据需要轻松修改这一设置）。我们将按照常规流程实现这一新功能，从数据库层开始，最终完成用户界面。本章成果如图\
  \ 16-1 所示。\n\n![图 16-1](img/00044.png)\n\n**图 16-1.** *包含产品评论的商品详情页*\n\n## 实现数据层\n\
  \n为了构建评论系统，您需要在`hatshop`数据库中创建`review`表以及两个数据层函数：`catalog_get_product_reviews`函数用于检索特定商品的评论，`catalog_create_product_review`方法用于向商品添加评论。\n\
  \n### 练习：为数据库添加客户评论支持\n\n1. 启动 pgAdmin III，并连接到`hatshop`数据库。\n2. 点击**工具 ➤ 查询工具**（或点击工具栏上的\
  \ SQL 按钮）。将出现一个新的查询窗口。\n3. 使用查询工具执行以下代码，在`hatshop`数据库中创建`review`表：\n\n```sql\n--\
  \ 创建评论表\nCREATE TABLE review\n(\n  review_id SERIAL NOT NULL,\n  customer_id INTEGER\
  \ NOT NULL,\n  product_id INTEGER NOT NULL,\n  review TEXT NOT NULL,\n  rating SMALLINT\
  \ NOT NULL,\n  created_on TIMESTAMP NOT NULL,\n  CONSTRAINT pk_review_id PRIMARY\
  \ KEY (review_id),\n  CONSTRAINT fk_customer_id FOREIGN KEY (customer_id)\n    REFERENCES\
  \ customer (customer_id)\n    ON UPDATE RESTRICT ON DELETE RESTRICT,\n  CONSTRAINT\
  \ fk_product_id FOREIGN KEY (product_id)\n    REFERENCES product (product_id)\n\
  \    ON UPDATE RESTRICT ON DELETE RESTRICT\n);\n```\n\n4. 执行以下代码，在`hatshop`数据库中创建`review_info`类型和`catalog_get_product_review`函数：\n\
  \n```sql\n-- 创建 review_info 类型\nCREATE TYPE review_info AS\n(\n  customer_name VARCHAR(50),\n\
  \  review TEXT,\n  rating SMALLINT,\n  created_on TIMESTAMP\n);\n\n-- 创建 catalog_get_product_reviews\
  \ 函数\nCREATE FUNCTION catalog_get_product_reviews(INTEGER)\nRETURNS SETOF review_info\
  \ LANGUAGE plpgsql AS $$\nDECLARE\n  inProductId ALIAS FOR $1;\n  outReviewInfoRow\
  \ review_info;\nBEGIN\n  FOR outReviewInfoRow IN\n    SELECT c.name, r.review, r.rating,\
  \ r.created_on\n    FROM review r\n    INNER JOIN customer c\n      ON c.customer_id\
  \ = r.customer_id\n    WHERE r.product_id = inProductId\n    ORDER BY r.created_on\
  \ DESC\n  LOOP\n    RETURN NEXT outReviewInfoRow;\n  END LOOP;\nEND;\n$$;\n```\n\
  \n`catalog_get_product_review`函数会检索由`inProductId`参数标识的商品的评论。由于还需要评论者的姓名，因此我们对`customer`表进行了`INNER\
  \ JOIN`操作。\n\n5. 使用查询工具执行以下代码，在`hatshop`数据库中添加`catalog_create_product_review`函数：\n\
  \n```sql\n-- 创建 catalog_create_product_review 函数\n```\n\n\n\n```sql\nCREATE FUNCTION\
  \ catalog_create_product_review(INTEGER, INTEGER, TEXT, SMALLINT)\nRETURNS VOID\
  \ LANGUAGE plpgsql AS $$\nDECLARE\n  inCustomerId ALIAS FOR $1;\n  inProductId ALIAS\
  \ FOR $2;\n  inReview ALIAS FOR $3;\n  inRating ALIAS FOR $4;\nBEGIN\n  INSERT INTO\
  \ review (customer_id, product_id, review, rating, created_on)\n  VALUES (inCustomerId,\
  \ inProductId, inReview, inRating, NOW());\nEND;\n$$;\n```\n\n当注册访客添加产品评论时，会调用`catalog_create_product_review`函数。\n\
  \n## 实现业务层\n\n在 `business/catalog.php` 文件的 `Catalog` 类中添加相应的业务层方法：\n\n```php\n//\
  \ Gets the reviews for a specific product\npublic static function GetProductReviews($productId)\n\
  {\n    // Build the SQL query\n    $sql = 'SELECT * FROM catalog_get_product_reviews(:product_id);';\n\
  \    // Build the parameters array\n    $params = array (':product_id' => $productId);\n\
  \    // Prepare the statement with PDO-specific functionality\n    $result = DatabaseHandler::Prepare($sql);\n\
  \    // Execute the query and return the results\n    return DatabaseHandler::GetAll($result,\
  \ $params);\n}\n\n// Creates a product review\npublic static function CreateProductReview($customer_id,\
  \ $productId, $review, $rating)\n{\n    // Build the SQL query\n    $sql = 'SELECT\
  \ catalog_create_product_review(:customer_id, :product_id, :review, :rating);';\n\
  \    // Build the parameters array\n    $params = array (\n        ':customer_id'\
  \ => $customer_id,\n        ':product_id' => $productId,\n        ':review' => $review,\n\
  \        ':rating' => $rating\n    );\n    // Prepare the statement with PDO-specific\
  \ functionality\n    $result = DatabaseHandler::Prepare($sql);\n    // Execute the\
  \ query\n    return DatabaseHandler::Execute($result, $params);\n}\n```\n\n## 实现用户界面\n\
