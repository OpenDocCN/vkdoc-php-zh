    \n> **注意：** 向 Web 应用的架构中添加 Smarty 或其他模板引擎会增加一些初始编码工作，并且也意味着有一个学习曲线。然而，你仍然应该尝试一下，因为使用这种现代开发技术所带来的优势在后续过程中会证明是非常显著的。\n\
    \n### 有哪些替代方案？\n\nSmarty 并非 PHP 可用的唯一模板引擎。其他流行的模板引擎包括：\n\n- `Yapter`（[`yapter.sourceforge.net/`](http://yapter.sourceforge.net/)）\n\
