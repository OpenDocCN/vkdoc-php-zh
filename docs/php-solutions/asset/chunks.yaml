- fmt: "#### PHP Solution 4-7: Adding a Caption to the Random Image\n\nThis solution\
    \ uses a multidimensional array—or an array of arrays—to store the filename and\
    \ caption for each image. If you find the concept of a multidimensional array\
    \ difficult to understand in abstract terms, think of it as a large box with a\
    \ lot of envelopes inside, and inside each envelope is a photo and its caption.\
    \ The box is the top-level array, and the envelopes inside are the subarrays.\n\
    \nThe images are different sizes, but PHP conveniently provides a function called\
    \ `getimagesize()`. Guess what it does.\n\nThis PHP solution builds on the previous\
    \ one, so continue working with the same files.\n\nOpen `random_image.php` and\
    \ change the code as follows:\n\n```\n<?php\n\n$images = [\n    ['file'    =>\
    \ 'kinkakuji',\n     'caption' => 'The Golden Pavilion in Kyoto'],\n    ['file'\
    \    => 'maiko',\n     'caption' => 'Maiko &#8212;trainee geishas in Kyoto'],\n\
    \    ['file'    => 'maiko_phone',\n     'caption' => 'Every maiko should have\
    \ one &#8212;a mobile, of course'],\n    ['file'    => 'monk',\n     'caption'\
    \ => 'Monk begging for alms in Kyoto'],\n    ['file'    => 'fountains',\n    \
    \ 'caption' => 'Fountains in central Tokyo'],\n    ['file'    => 'ryoanji',\n\
    \     'caption' => 'Autumn leaves at Ryoanji temple, Kyoto'],\n    ['file'   \
    \ => 'menu',\n     'caption' => 'Menu outside restaurant in Pontocho, Kyoto'],\n\
    \    ['file'    => 'basin',\n     'caption' => 'Water basin at Ryoanji temple,\
    \ Kyoto']\n];\n\n$i = rand(0, count($images)-1);\n$selectedImage = \"images/{$images[$i]['file']}.jpg\"\
    ;\n$caption = $images[$i]['caption'];\n```\n\n**Caution**  \nYou need to be careful\
    \ with the code. Each subarray is enclosed in a pair of square brackets and is\
    \ followed by a comma, which separates it from the next subarray. You’ll find\
    \ it easier to build and maintain multidimensional arrays if you align the array\
    \ keys and values as shown.\n\nAlthough the code looks complicated, it’s an ordinary\
    \ indexed array that contains eight items, each of which is an associative array\
    \ containing definitions for `'file'` and `'caption'`. The definition of the multidimensional\
    \ array forms a single statement, so there are no semicolons until line 19. The\
    \ closing bracket on that line matches the opening one on line 2.\n\nThe variable\
    \ used to select the image also needs to be changed, because `$images[$i]` no\
    \ longer contains a string, but rather an array. To get the correct filename for\
    \ the image, you need to use `$images[$i]['file']`. The caption for the selected\
    \ image is contained in `$images[$i]['caption']` and stored in a shorter variable.\n\
    \nYou now need to amend the code in `index.php` to display the caption, like this:\n\
    \n```\n<figure>\n<img src=\"<?= $selectedImage; ?>\" alt=\"Random image\">\n<figcaption><?=\
    \ $caption; ?></figcaption>\n</figure>\n```\n\nAdd the following code at the end\
    \ of `random_image.php`:\n\n```\nif (file_exists($selectedImage) && is_readable($selectedImage))\
    \ {\n    $imageSize = getimagesize($selectedImage);\n}\n```\n\nThe `if` statement\
    \ uses two functions, `file_exists()` and `is_readable()`, to make sure `$selectedImage`\
    \ not only exists but also that it’s accessible (it may be corrupted or have the\
    \ wrong permissions). These functions return Boolean values (`true` or `false`),\
    \ so they can be used directly as part of the conditional statement. The single\
    \ line inside the `if` statement uses the function `getimagesize()` to get the\
    \ image’s dimensions and stores them in `$imageSize`. You’ll learn more about\
    \ `getimagesize()` in Chapter 8. At the moment, you’re interested in the following\
    \ two pieces of information:\n\n* `$imageSize[0]`: The width of the image in pixels\n\
    * `$imageSize[3]`: A string containing the image’s height and width formatted\
    \ for inclusion in an `<img>` tag\n\nFirst of all, let’s fix the code in the `<img>`\
    \ tag. Change it like this:\n\n![A978-1-4842-0635-5_4_Fig11_HTML.jpg](A978-1-4842-0635-5_4_Fig11_HTML.jpg)\n\
    \n**Figure 4-11.** The long caption protrudes beyond the image and shifts it too\
    \ far left\n\nSave `index.php` and `random_image.php` and load `index.php` into\
    \ a browser. Most images will look fine, but there’s an ugly gap to the right\
    \ of the image of the trainee geisha with a mobile phone, as shown in Figure 4-11.\n\
    \n```\n<img src=\"<?= $selectedImage; ?>\" alt=\"Random image\" <?= $imageSize[3];\
    \ ?>>\n```\n\nThis inserts the correct `width` and `height` attributes inside\
    \ the `<img>` tag.\n\nAlthough this sets the dimensions for the image, you still\
    \ need to control the width of the caption. You can’t use PHP inside an external\
    \ style sheet, but there’s nothing stopping you from creating a `<style>` block\
    \ in the `<head>` of `index.php`. Insert the following code just before the closing\
    \ `</head>` tag.\n\n```\n<?php if (isset($imageSize)) { ?>\n<style>\nfigcaption\
    \ {\n    width: <?= $imageSize[0]; ?>px;\n}\n</style>\n<?php } ?>\n```\n\nThis\
    \ code consists of only seven short lines, but it’s an odd mix of PHP and HTML.\
    \ Let’s start with the first and final lines. If you strip away the PHP tags and\
    \ replace the HTML `<style>` block with a comment, this is what you end up with:\n\
    \n```\nif (isset($imageSize)) {\n    // do something if $imageSize has been set\n\
    }\n```\n\nIn other words, if the variable `$imageSize` hasn’t been set (defined),\
    \ the PHP engine ignores everything between the curly braces. It doesn’t matter\
    \ that most of the code between the braces is HTML and CSS. If `$imageSize` hasn’t\
    \ been set, the PHP engine skips to the closing brace, and the intervening code\
    \ isn’t sent to the browser.\n\n**Tip**  \nMany inexperienced PHP coders wrongly\
    \ believe that they need to use `echo` or `print` to create HTML output inside\
    \ a conditional statement. As long as the opening and closing braces match, you\
    \ can use PHP to hide or display sections of HTML like this. It’s a lot neater\
    \ and involves a lot less typing than using `echo` all the time.\n\nIf `$imageSize`\
    \ has been set, the `<style>` block is created and `$imageSize[0]` is used to\
    \ set the correct width for the paragraph that contains the caption.\n\n![A978-1-4842-0635-5_4_Fig12_HTML.jpg](A978-1-4842-0635-5_4_Fig12_HTML.jpg)\n\
    \n**Figure 4-12.** The ugly gap is removed by creating a style rule directly related\
    \ to the image size\n\nSave `random_image.php` and `index.php`, then reload `index.php`\
    \ into a browser. Click the Reload button until the image of the trainee geisha\
    \ with the mobile phone appears. This time, it should look like Figure 4-12. If\
    \ you view the browser’s source code, the style rule uses the correct width for\
    \ the image.\n\n**Note**  \nIf the caption still protrudes, make sure there’s\
    \ no gap between the closing PHP tag and `px` in the `<style>` block. CSS does\
    \ not permit whitespace between the value and unit of measurement.\n\nThe conditional\
    \ statement at the foot of `random_image.php` sets `$imageSize` only if the selected\
    \ image both exists and is readable, so if `$imageSize` has been set, you know\
    \ it’s all systems go. Add the opening and closing blocks of a conditional statement\
    \ around the figure element that displays the image in `index.php`, like this:\n\
    \n![A978-1-4842-0635-5_4_Fig13_HTML.jpg](A978-1-4842-0635-5_4_Fig13_HTML.jpg)\n\
    \n**Figure 4-13.** An error in an include file can destroy the look of your page\n\
    \nThe code in `random_image.php` and the code you have just inserted prevent errors\
    \ if the selected image can’t be found, but the code that displays the image is\
    \ devoid of similar checks. Temporarily change the name of one of the images,\
    \ either in `random_image.php` or in the `images` folder. Reload `index.php` several\
    \ times. Eventually, you should see an error message like that in Figure 4-13.\
    \ It looks very unprofessional.\n\n```\n<?php if (isset($imageSize)) { ?>\n<figure>\n\
    <img src=\"<?= $selectedImage; ?>\" alt=\"Random image\"\n<?= $imageSize[3]; ?>>\n\
    <figcaption><?= $caption; ?></figcaption>\n</figure>\n<?php } ?>\n```"
