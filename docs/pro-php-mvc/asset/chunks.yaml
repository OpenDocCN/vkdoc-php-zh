    **Chapter 24**


    **CodeIgniter: Extending**


    CodeIgniter includes a wide assortment of libraries that cater to details such
    as file uploads, image manipulation, and e-mail sending. Let us see how to use
    these, as well as extend CodeIgniter to use third-party libraries.


    Goals


    • We need to learn how to use built-in CodeIgniter libraries.


    • We need to learn how to include our own (third-party) libraries in our CodeIgniter
    applications.


    • We need to learn how to extend core CodeIgniter classes.


    File Uploads


    We will begin by looking at how to use one of the built-in CodeIgniter libraries
    for file uploads. Our original sample application allows the user to upload a
    photo on registration, so that would be the perfect place to include this functionality.
    Our original application includes a File model, which we need to re-create with
    CodeIgniter.


    It needs to include all the methods the Files controller will require in order
    to correctly process/query photo database table rows. After this, we need to modify
    the actions and views that are involved with file uploads to correctly intercept
    and process uploaded files. The File model should look like the code in Listing
    24-1.


    ***Listing 24-1.*** The File Model


    class File extends CI_Model


    {


    public $id;


    public $live = true;


    public $deleted = false;


    public $created;


    public $modified;


    public $name;


    public $mime;


    public $size;


    public $width;


    public $height;


    public $user;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 24 ■ CodEIgnITER: ExTEndIng


    protected function _populate($options)


    {


    // set all existing properties


    foreach ($options as $key => $value)


    {


    if (property_exists($this, $key))


    {


    $this->$key = $value;


    }


    }


    }


    public function __construct($options = array())


    {


    // be a good subclass


    parent::__construct();


    // populate values


    if (sizeof($options))


    {


    $this->_populate($options);


    }


    // load row


    $this->load();


    }


    public function load()


    {


    if ($this->id)


    {


    // get corresponding row


    $query = $this->db


    ->where("id", $this->id)


    ->get("file", 1, 0);


    // populate properties with row data


    if ($row = $query->row())


    {


    $this->id = (bool) $row->id;


    $this->live = (boolean) $row->live;


    $this->deleted = (boolean) $row->deleted;


    $this->created = $row->created;


    $this->modified = $row->modified;


    $this->name = $row->name;


    $this->mime = $row->mime;


    $this->size = $row->size;


    $this->width = $row->width;


    $this->height = $row->height;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 24 ■ CodEIgnITER: ExTEndIng


    $this->user = $row->user;


    }


    }


    }


    public function save()


    {


    // initialize data


    $data = array(


    "live" => (int) $this->live,


    "deleted" => (int) $this->deleted,


    "modified" => date("Y-m-d H:i:s"),


    "name" => $this->name,


    "mime" => $this->mime,


    "size" => $this->size,


    "width" => $this->width,


    "height" => $this->height,


    "user" => $this->user


    );


    // update


    if ($this->id)


    {


    $where = array("id" => $this->id);


    return $this->db->update("file", $data, $where);


    }


    // insert


    $data["created"] = date("Y-m-d H:i:s");


    $this->id = $this->db->insert("file", $data);


    // return insert id


    return $this->id;


    }


    public static function first($where)


    {


    $user = new File();


    // get the first user


    $user->db->where($where);


    $user->db->limit(1);


    $query = $user->db->get("file");


    // initialze the data


    $data = $query->row();


    $user->_populate($data);


    // return the user


    return $user;


    }


    }


