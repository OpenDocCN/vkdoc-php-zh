  \n### 数据库\n\n数据库测试要复杂得多。我们进行常规的工厂类测试，还需要考虑在第 9 章中探讨的连接器/查询概念。查询类也包含许多需要测试的方法。\n\n\
  ### 测试覆盖范围\n\n我们应创建覆盖以下需求的测试：\n\n-   `Database` 工厂类可以被创建。\n-   `Database\\Connector\\\
