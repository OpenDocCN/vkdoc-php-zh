  trans: "\n# 第 7 章：目录管理\n\n**221**\n\n```\n}\n}\n?>\n```\n\n**3.** 修改 `admin.php`\
    \ 文件，以加载新创建的 `admin_departments` 组件化模板：\n\n```\n// 如果管理员已登录，加载管理页面菜单\n$pageMenuCell\
    \ = 'admin_menu.tpl';\n\nif (isset ($_GET['Page']))\n    $admin_page = $_GET['Page'];\n\
    \n// 如果未显式设置页面，则默认加载部门页面\nelse\n    $admin_page = 'Departments';\n\n// 如果正在执行注销操作...\n\
    if (isset ($_GET['Page']) && ($_GET['Page'] == 'Logout'))\n{\n    unset($_SESSION['AdminLogged']);\n\
    \    header('Location: admin.php');\n    exit;\n}\n\n// 选择要加载的管理页面...\nif ($admin_page\
    \ == 'Departments')\n    $pageContentsCell = 'admin_departments.tpl';\n}\n```\n\
    \n## 工作原理：`admin_departments` 组件化模板\n\n您在此练习中编写了大量代码，但仍然无法进行测试。这是先创建用户界面的难点所在。不过，仔细审视这些代码，它其实并不复杂。下面我们来看看\
    \ `admin_departments.tpl` 模板是如何实现的。\n\n以下是用于构建表格行的 `{section}` 结构方案：\n\n```\n\
    {section name=cDepartments loop=$admin_departments->mDepartments}\n    {if $admin_departments->mEditItem\
    \ ==\n         $admin_departments->mDepartments[cDepartments].department_id}\n\
    \        ...\n    {else}\n        ...\n    {/if}\n{/section}\n```\n\n默认情况下，部门名称和描述是不可编辑的。但当您点击某个部门的编辑按钮时，`$admin_departments->mEditItem`\
    \ 会被设置为该点击部门的 `department_id` 值，Smarty 呈现逻辑便会生成可编辑的文本框来代替标签。这将允许管理员编辑所选部门的详细信息（在编辑模式下，更新/取消按钮会替代编辑按钮出现，如之前图示所示）。\n\
    \n每当用户点击这些按钮中的任意一个时，从 `admin_departments` 模板加载的 Smarty 插件函数（位于 `load_admin_departments.php`\
    \ 中）便会执行，并对访客的操作做出响应。该函数能够识别点击的是哪个按钮，并在解析已提交变量列表并读取点击按钮的名称后，知晓该执行何种操作。在部门管理页面（参见\
    \ `admin_departments.tpl` 模板文件）中，按钮的名称格式类似 `submit_edit_dep_1`。\n\n所有按钮名称均以 `submit`\
    \ 开头，并以部门 ID 结尾。名称中间的部分是按钮类型的代码，用于指定对该部门执行何种操作。名为 `submit_edit_dep_1` 的按钮指示插件函数进入\
    \ `department_id` 值为 1 的部门的编辑模式。\n\n请注意，对于“添加部门”按钮，按钮名称中指定的部门 ID 变得无关紧要，因为其值是由数据库自动生成的（`department_id`\
    \ 是一个 `SERIAL` 列）。\n\n在本例中，按钮类型可以是：\n- `add_dep`：用于添加部门按钮\n- `edit_dep`：用于编辑部门按钮\n\
    - `update_dep`：用于更新按钮\n- `delete_dep`：用于删除按钮\n- `edit_categ`：用于编辑类别按钮\n\n根据点击按钮的类型，将调用相应的业务层方法。接下来我们来逐一介绍这些方法。\n\
    \n## 实现业务层\n\n您从 `AdminDepartments` 类中调用了四个中间层方法。现在需要添加它们对应的业务层方法：\n\n- `GetDepartmentsWithDescriptions`：返回要在部门管理页面中显示的部门列表。\n\
    - `UpdateDepartment`：更改部门的详细信息。其参数包括部门的 `department_id` 值、新名称和新描述。\n- `DeleteDepartment`：删除由\
    \ `department_id` 参数指定的部门。\n"
