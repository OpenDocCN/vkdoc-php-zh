  raw: '### Inserting Dates into MySQL


    MySQL’s requirement for dates to be formatted as `YYYY-MM-DD` presents a headache
    for online forms that allow users to input dates. As you saw in [Chapter 13](#A978-1-4842-0635-5_13_Chapter.html),
    the current date and time can be inserted automatically by using a `TIMESTAMP`
    column. You can also use the MySQL `NOW()` function to insert the current date
    in a `DATE` or `DATETIME` column. It’s when you need any other date that problems
    arise.


    Using a text input field in a form relies on users being trusted to follow a set
    pattern for inputting dates, such as `MM/DD/YYYY`. If everybody complies, you
    can use the `explode()` function to rearrange the date parts, like this:


    `if (isset($_POST[''theDate''])) {`


    `$date = explode(''/'', $_POST[''theDate'']);`


    `$mysqlFormat = "$date[2]-$date[0]-$date[1]";`


    `}`


    If someone deviates from the format, you end up with invalid dates in your database.


    The situation will eventually be a lot simpler when all browsers support the HTML5
    date input field. There’s an example in `date_test.php` in the `ch14` folder.
    The code in the body of the page looks like this:


    `<form method="post" action="">`


    `<p>`


    `<label for="date">Date:</label>`


    `<input type="date" name="date" id="date">`


    `</p>`


    `<p>`


    `<input type="submit" name="submit" id="submit" value="Submit">`


    `</p>`


    `</form>`


    `<?php`


    `if (isset($_POST[''submit''])) {`


    `echo ''The date you selected is: '' . htmlentities($_POST[''date'']);`


    `}`


    `?>`


    The real advantage of using `date` as the input type is that browsers often display
    a date picker as soon as the field gains focus, and the selected value is displayed
    according to the device’s user settings. So, Americans and Europeans see the date
    displayed in their preferred format. But when the form is submitted, the value
    is always in the ISO `YYYY-MM-DD` format. Figure [14-5](#A978-1-4842-0635-5_14_Chapter.html#Fig5)
    shows the output of `date_test.php` in Safari 7.1 on my iPhone 5\. The date picker
    and `date` field use the UK date format, but the value submitted through the `$_POST`
    array is in the ISO format.


    ![A978-1-4842-0635-5_14_Fig5_HTML.jpg](A978-1-4842-0635-5_14_Fig5_HTML.jpg)


    Figure 14-5.


    HTML5 date input fields display dates in local format, but submit them in the
    ISO format


    Unfortunately, only 50 percent of browsers in use in September 2014 supported
    the date input type. At the time of this writing, there was no indication of when
    popular browsers, such as Internet Explorer and Firefox, planned to implement
    support.


    Consequently, the most reliable method of gathering dates from an online form
    remains the use of separate input fields for month, day, and year.


    #### PHP Solution 14-4: Validating and Formatting Dates for MySQL Input


    This PHP solution concentrates on checking the validity of a date and converting
    it to MySQL format. It’s designed to be incorporated in an insert or update form
    of your own.


    Create a page called `date_converter.php` and insert a form containing the following
    code (or use `date_converter_01.php` in the `ch14` folder):


    `<form method="post" action="">`


    `<p>`


    `<label for="month">Month:</label>`


    `<select name="month" id="month">`


    `<option value=""></option>`


    `</select>`


    `<label for="day">Date:</label>`


    `<input name="day" type="number" required id="day" max="31" min="1"`


    `maxlength="2">`


    `<label for="year">Year:</label>`


    `<input name="year" type="number" required id="year" maxlength="4">`


    `</p>`


    `<p>`


    `<input type="submit" name="convert" id="convert" value="Convert">`


    `</p>`


    `</form>`


    This code creates a drop-down menu called `month` and two input fields called
    `day` and `year`. The drop-down menu doesn’t have any values at the moment, but
    it will be populated by a PHP loop. The `day` and `year` fields use the HTML5
    `number` type and `required` attribute. The day field also has the `max` and `min`
    attributes so as to restrict the range to between 1 and 31\. Browsers that support
    the new HTML5 form elements display number steppers alongside the fields and restrict
    the type and range of input. Other browsers render them as ordinary text input
    fields. For the benefit of older browsers, both have `maxlength` attributes that
    limit the number of characters accepted.   Amend the section that builds the drop-down
    menu, like this:


    `<select name="month" id="month">`


    `<?php`


    `$months = [''Jan'',''Feb'',''Mar'',''Apr'',''May'',''Jun'',`


    `''Jul'',''Aug'', ''Sep'', ''Oct'', ''Nov'',''Dec''];`


    `$thisMonth = date(''n'');`


    `for ($i = 1; $i <= 12; $i++) { ?>`


    `<option value="` `<?= $i; ?>` `"`


    `<?php`


    `if ((!$_POST` `&&` `$i == $thisMonth) ||`


    `(isset($_POST[''month''])` `&&` `$i == $_POST[''month''])) {`


    `echo '' selected'';`


    `} ?>>`


    `<?= $months[$i - 1]; ?>`


    `</option>`


    `<?php } ?>`


    `</select>`


    Also populate the fields for the day and year with the current date or the value
    selected after the form has been submitted.


    *   This creates an array of month names and uses the `date()`function to find
    the number of the current month (the meaning of the argument passed to `date()`
    is explained later in this chapter).

    *   A `for` loop then populates the menu’s `<option>` tags. I have set the initial
    value of `$i` to `1`, because I want to use it for the value of the month. Inside
    the loop, the conditional statement checks two sets of conditions, both of which
    are enclosed in parentheses to ensure they’re evaluated in the correct sequence.
    The first set checks that the `$_POST` array is empty and the values of `$i` and
    `$thisMonth` are the same. But if the form has been submitted, `$_POST[''month'']`
    will have been set, so the alternative set of conditions checks whether `$i` is
    the same as `$_POST[''month'']`. As a result, when the form is first loaded, `selected`
    is inserted into the `<option>` tag for the current month. But if the form has
    already been submitted, the month selected by the user is displayed again.

    *   The name of the month is displayed between the `<option>` tags by drawing
    it from the `$months` array. Because indexed arrays begin at 0, you need to subtract
    1 from the value of `$i` to get the right month.


    `<label for="day">Date:</label>`


    `<input name="day" type="number" required id="day" max="31" min="1"`


    `maxlength="2" value="<?php if (!$_POST) {`


    `echo date(''j'');`


    `} elseif (isset($_POST[''day''])) {`


    `echo $_POST[''day''];`


    `} ?>">`


    `<label for="year">Year:</label>`


    `<input name="year" type="number" required id="year" maxlength="4"`


    `value="<?php if (!$_POST) {`


    `echo date(''Y'');`


    `} elseif (isset($_POST[''year''])) {`


    `echo $_POST[''year''];`


    `} ?>">`


    The code that performs all the checks is a custom function in `utility_funcs.php`.
    It looks like this:'
  trans: "\n### 在 MySQL 中插入日期\n\nMySQL 要求日期必须按照 `YYYY-MM-DD` 的格式存放，这对于允许用户输入日期的在线表单来说十分令人头疼。正如你在第\
    \ 13 章中所见，通过使用 `TIMESTAMP` 类型的列，可以自动插入当前日期和时间。你也可以使用 MySQL 的 `NOW()` 函数在 `DATE`\
    \ 或 `DATETIME` 类型的列中插入当前日期。当你需要插入其他日期时，问题就来了。\n\n在表单中使用文本输入框依赖于用户是否能够按照设定的日期输入模式来操作，例如\
    \ `MM/DD/YYYY`。如果每个人都遵守规则，你就可以使用 `explode()` 函数重新排列日期的各个部分，就像这样：\n\n```\nif (isset($_POST['theDate']))\
    \ {\n    $date = explode('/', $_POST['theDate']);\n    $mysqlFormat = \"$date[2]-$date[0]-$date[1]\"\
    ;\n}\n```\n\n如果有人不按这个格式输入，你的数据库中最终就会出现无效的日期。\n\n当所有浏览器都支持 HTML5 日期输入字段时，情况最终会变得简单得多。在\
    \ `ch14` 文件夹中的 `date_test.php` 里有一个示例。页面主体部分的代码如下：\n\n```\n<form method=\"post\"\
    \ action=\"\">\n    <p>\n        <label for=\"date\">日期：</label>\n        <input\
    \ type=\"date\" name=\"date\" id=\"date\">\n    </p>\n    <p>\n        <input\
    \ type=\"submit\" name=\"submit\" id=\"submit\" value=\"提交\">\n    </p>\n</form>\n\
    \n<?php\nif (isset($_POST['submit'])) {\n    echo '您选择的日期是：' . htmlentities($_POST['date']);\n\
    }\n?>\n```\n\n使用 `date` 作为输入类型的真正优势在于，浏览器通常会在该字段获得焦点时立即显示日期选择器，并且所选值会根据设备的用户设置来显示。因此，美国人和欧洲人可以以他们偏好的格式看到日期。但是当表单提交时，该值始终是国际标准\
    \ `YYYY-MM-DD` 格式。图 14-5 展示了在我的 iPhone 5 上的 Safari 7.1 中 `date_test.php` 的输出结果。日期选择器和\
    \ `date` 字段使用的是英国日期格式，但通过 `$_POST` 数组提交的值是国际标准格式。\n\n![A978-1-4842-0635-5_14_Fig5_HTML.jpg](img/A978-1-4842-0635-5_14_Fig5_HTML.jpg)\n\
    \n**图 14-5.** HTML5 日期输入字段以本地格式显示日期，但以国际标准格式提交\n\n不幸的是，截至 2014 年 9 月，只有 50% 的浏览器支持日期输入类型。在撰写本书时，尚无迹象表明诸如\
    \ Internet Explorer 和 Firefox 等主流浏览器何时计划提供支持。\n\n因此，从在线表单收集日期最可靠的方法仍然是使用月份、日期和年份各自独立的输入字段。\n\
    \n### PHP 解决方案 14-4：为 MySQL 输入验证和格式化日期\n\n此 PHP 解决方案专注于检查日期的有效性并将其转换为 MySQL 格式。它被设计为可以集成到你自己的插入或更新表单中。\n\
    \n创建一个名为 `date_converter.php` 的页面，并插入一个包含以下代码的表单（或使用 `ch14` 文件夹中的 `date_converter_01.php`）：\n\
    \n```\n<form method=\"post\" action=\"\">\n    <p>\n        <label for=\"month\"\
    >月份：</label>\n        <select name=\"month\" id=\"month\">\n            <option\
    \ value=\"\"></option>\n        </select>\n        <label for=\"day\">日期：</label>\n\
    \        <input name=\"day\" type=\"number\" required id=\"day\" max=\"31\" min=\"\
    1\" maxlength=\"2\">\n        <label for=\"year\">年份：</label>\n        <input\
    \ name=\"year\" type=\"number\" required id=\"year\" maxlength=\"4\">\n    </p>\n\
    \    <p>\n        <input type=\"submit\" name=\"convert\" id=\"convert\" value=\"\
    转换\">\n    </p>\n</form>\n```\n\n这段代码创建了一个名为 `month` 的下拉菜单以及两个分别名为 `day` 和 `year`\
    \ 的输入字段。这个下拉菜单目前没有任何值，但稍后将通过 PHP 循环来填充。`day` 和 `year` 字段使用了 HTML5 的 `number` 类型和\
    \ `required` 属性。日期字段还设置了 `max` 和 `min` 属性，以便将范围限制在 1 到 31 之间。支持新 HTML5 表单元素的浏览器会在这些字段旁边显示数字调节器，并限制输入的类型和范围。其他浏览器则将其渲染为普通的文本输入字段。为了兼容旧版浏览器，两者都设置了\
    \ `maxlength` 属性，以限制可接受的字符数。\n\n修改构建下拉菜单的部分，如下所示：\n\n```\n<select name=\"month\"\
    \ id=\"month\">\n    <?php\n    $months = ['一月','二月','三月','四月','五月','六月',\n  \
    \             '七月','八月', '九月', '十月', '十一月','十二月'];\n    $thisMonth = date('n');\n\
    \    for ($i = 1; $i <= 12; $i++) { ?>\n        <option value=\"<?= $i; ?>\"\n\
    \        <?php\n        if ((!$_POST && $i == $thisMonth) ||\n            (isset($_POST['month'])\
    \ && $i == $_POST['month'])) {\n            echo ' selected';\n        } ?>>\n\
    \        <?= $months[$i - 1]; ?>\n        </option>\n    <?php } ?>\n</select>\n\
    ```\n\n还需用当前日期或表单提交后所选的值来填充日期和年份字段。\n\n- 这段代码创建了一个月份名称数组，并使用 `date()` 函数来查找当前月份的数值（传递给\
    \ `date()` 的参数含义将在本章后面解释）。\n- 然后，一个 `for` 循环用来填充菜单的 `<option>` 标签。我将 `$i` 的初始值设为\
    \ `1`，因为我希望用它来表示月份的值。在循环内部，条件语句检查两组条件，两者都包含在括号内以确保它们按照正确的顺序被求值。第一组检查 `$_POST`\
    \ 数组是否为空，以及 `$i` 和 `$thisMonth` 的值是否相同。但如果表单已经提交，`$_POST['month']` 将会被设置，因此另一组条件检查\
    \ `$i` 是否与 `$_POST['month']` 相同。因此，当表单首次加载时，`selected` 会被插入到当前月份的 `<option>` 标签中。但如果表单已经被提交，则会再次显示用户选择的月份。\n\
    - 月份的名称通过从 `$months` 数组中提取来显示在 `<option>` 标签之间。因为索引数组从 0 开始，所以你需要从 `$i` 的值中减去\
    \ 1 才能获得正确的月份。\n\n```\n<label for=\"day\">日期：</label>\n<input name=\"day\" type=\"\
    number\" required id=\"day\" max=\"31\" min=\"1\"\n       maxlength=\"2\" value=\"\
    <?php if (!$_POST) {\n           echo date('j');\n       } elseif (isset($_POST['day']))\
    \ {\n           echo $_POST['day'];\n       } ?>\">\n\n<label for=\"year\">年份：</label>\n\
    <input name=\"year\" type=\"number\" required id=\"year\" maxlength=\"4\"\n  \
    \     value=\"<?php if (!$_POST) {\n           echo date('Y');\n       } elseif\
    \ (isset($_POST['year'])) {\n           echo $_POST['year'];\n       } ?>\">\n\
    ```\n\n执行所有检查的代码是 `utility_funcs.php` 中的一个自定义函数。内容如下：\n"
- fmt: "- 如果您测试输入字段，在大多数浏览器中，`Date`字段最多接受两个字符，`Year`字段最多接受四个字符。尽管这减少了出错的可能性，您仍然需要验证输入并正确格式化日期。\n\
    \n![A978-1-4842-0635-5_14_Fig6_HTML.jpg](A978-1-4842-0635-5_14_Fig6_HTML.jpg)\n\
    \n图 14-6. 为日期部分使用单独的输入字段有助于消除错误\n\n保存页面并在浏览器中测试。它应该显示当前日期，外观类似于图[14-6](#A978-1-4842-0635-5_14_Chapter.html#Fig6)。\n\
    \n```php\nfunction convertDateToISO($month, $day, $year) {\n    $month = trim($month);\n\
    \    $day = trim($day);\n    $year = trim($year);\n    $result[0] = false;\n \
    \   if (empty($month) || empty($day) || empty($year)) {\n        $result[1] =\
    \ 'Please fill in all fields';\n    } elseif (!is_numeric($month) || !is_numeric($day)\
    \ ||\n        !is_numeric($year)) {\n        $result[1] = 'Please use numbers\
    \ only';\n    } elseif (($month < 1 || $month > 12) || ($day < 1 || $day > 31)\
    \ ||\n        ($year < 1000 || $year > 9999)) {\n        $result[1] = 'Please\
    \ use numbers within the correct range';\n    } elseif (!checkdate($month,$day,$year))\
    \ {\n        $result[1] = 'You have used an invalid date';\n    } else {\n   \
    \     $result[0] = true;\n        $result[1] = sprintf('%d-%02d-%02d', $year,\
    \ $month, $day);\n    }\n    return $result;\n}\n```\n\n- 该函数接受三个参数：`month`、`day`和`year`，它们都应该是数字。前三行代码去除输入两端的空白，下一行初始化`$result`数组的第一个元素。如果输入验证失败，数组的第一个元素为`false`，第二个元素包含错误消息。如果验证通过，`$result`的第一个元素为`true`，第二个元素包含格式化后的日期，准备插入到MySQL中。\n\
    - 这一系列条件语句检查输入值是否为空或非数字。第三个测试检查数字是否在可接受范围内。年份的范围由MySQL的法定范围决定。在极少数情况下，如果您需要的年份超出该范围，您必须选择不同的列类型来存储数据。\n\
    - 通过使用一系列`elseif`子句，这段代码在遇到第一个错误时立即停止测试。尽管表单预填了值，但无法保证输入来自您的表单。它可能来自自动脚本，因此这些检查是必要的。\n\
    - 如果输入通过了前三个测试，它随后会接受PHP函数`checkdate()`的检查，该函数足够智能，能够识别闰年并防止9月31日这样的错误。\n- 最后，如果输入通过了所有测试，它会使用`sprintf()`函数重新构建为适合插入MySQL的正确格式。该函数将格式化字符串作为第一个参数，其中`%d`代表整数，`%02d`代表必要时用前导零填充的两位数整数。连字符按字面处理。接下来的三个参数是要插入格式化字符串的值。这会生成ISO格式的日期，月份和日期带有前导零。\n\
    \n> **注意**：有关`sprintf()`的详细信息，请参见[`http://php.net/manual/en/function.sprintf.php`](http://php.net/manual/en/function.sprintf.php)。\n\
    \n为了测试目的，在页面主体的表单下方添加以下代码：\n\n```php\nif (isset($_POST['convert'])) {\n    require_once\
    \ 'utility_funcs.php';\n    $converted = convertDateToISO($_POST['month'], $_POST['day'],\n\
    \        $_POST['year']);\n    if ($converted[0]) {\n        echo 'Valid date:\
    \ ' . $converted[1];\n    } else {\n        echo 'Error: ' . $converted[1] . '<br>';\n\
    \        echo 'Input was: ' . $months[$_POST['month']-1] . ' ' .\n           \
    \ $_POST['day'] . ', ' . $_POST['year'];\n    }\n}\n```\n\n- 您可以将您的代码与`ch14`文件夹中的`date_converter_02.php`进行比较。\n\
    \n![A978-1-4842-0635-5_14_Fig8_HTML.jpg](A978-1-4842-0635-5_14_Fig8_HTML.jpg)\n\
    \n图 14-8. `convertDateToISO()`函数拒绝无效日期\n\n- 如果您输入无效日期，您应该看到相应的错误消息（见图[14-8](#A978-1-4842-0635-5_14_Chapter.html#Fig8)）。\n\
    \n![A978-1-4842-0635-5_14_Fig7_HTML.jpg](A978-1-4842-0635-5_14_Fig7_HTML.jpg)\n\
    \n图 14-7. 日期已验证并转换为ISO格式\n\n保存页面并通过输入日期并单击“Convert”进行测试。如果日期有效，您应该看到它被转换为ISO格式，如图[14-7](#A978-1-4842-0635-5_14_Chapter.html#Fig7)所示。\n\
    \n- 这检查表单是否已提交。如果已提交，它会包含`utility_funcs.php`（在`ch14`文件夹中有一份副本）并将表单值传递给`convertDateToISO()`函数，将结果保存在`$converted`中。\n\
    - 如果日期有效，`$converted[0]`为`true`，格式化后的日期位于`$converted[1]`中。如果日期无法转换为ISO格式，`else`块会显示存储在`$converted[1]`中的错误消息以及原始输入。为了显示正确的月份值，从`$_POST['month']`的值中减去1，将结果用作`$months`数组的键。\n\
    \n当为需要用户输入日期的表创建表单时，以与`date_converter.php`相同的方式添加三个字段：月份、日期和年份。在将表单输入插入数据库之前，包含`utility_funcs.php`（或您决定存放该函数的任何位置），并使用`convertDateToISO()`函数验证日期并将其格式化为适合数据库插入的格式。\n\
    \n```php\nrequire_once 'utility_funcs.php';\n$converted = convertDateToMySQL($_POST['month'],\
    \ $_POST['day'], $_POST['year']);\nif ($converted[0]) {\n    $date = $converted[1];\n\
    } else {\n    $errors[] = $converted[1];\n}\n```\n\n如果您的`$errors`数组包含任何元素，则放弃插入或更新过程并显示错误。否则，`$date`可以安全地插入到SQL查询中。\n\
    \n> **注意**：本章其余部分专门介绍在PHP中处理日期。这是一个重要但复杂的话题。我建议您浏览每一节以熟悉PHP的日期处理功能，并在需要实现特定功能时返回本节。"
