  \n第 17 章 ■ 分享\n\n**注意**：在添加新链接之前，最好先检查用户之间是否已存在关联。\n\n分享\n\n分享是一件非常重要的事情。可以说，它是人们使用社交网络的首要原因。我们将创建一个让用户分享状态消息的功能。我们甚至允许用户对分享的消息进行评论，并在每个用户的活动信息流中展示所有相关消息。\n\
  \n为了存储消息信息，我们需要创建另一个模型，如清单 17-13 所示。\n\n**清单 17-13.** `Message`模型\n\n```php\nclass\
  \ Message extends Shared\\Model\n{\n    /**\n     * @column\n     * @readwrite\n\
  \     * @type text\n     * @length 256\n     *\n     * @validate required\n    \
  \ * @label body\n     */\n    protected $_body;\n\n    /**\n     * @column\n   \
  \  * @readwrite\n     * @type integer\n     */\n    protected $_message;\n\n   \
  \ /**\n     * @column\n     * @readwrite\n     * @type integer\n     */\n    protected\
  \ $_user;\n}\n```\n\n此消息模型期望的数据库表如清单 17-14 所示。\n\n**清单 17-14.** `message`表\n\n```sql\n\
  CREATE TABLE `message` (\n  `user` int(11) DEFAULT NULL,\n  `message` int(11) DEFAULT\
  \ NULL,\n  `body` text DEFAULT NULL,\n  `id` int(11) NOT NULL AUTO_INCREMENT,\n\
  \  `live` tinyint(4) DEFAULT NULL,\n  `deleted` tinyint(4) DEFAULT NULL,\n  `created`\
  \ datetime DEFAULT NULL,\n  `modified` datetime DEFAULT NULL,\n  PRIMARY KEY (`id`),\n\
  \  KEY `live` (`live`),\n  KEY `deleted` (`deleted`)\n) ENGINE=InnoDB DEFAULT CHARSET=utf8\n\
  ```\n\n每条消息都有一个正文，属于一个用户，并且可以关联到另一条消息（即之前分享的消息）。创建实际消息非常简单：我们首先需要修改主页，以便向当前用户展示所有相关的、已分享的消息。\n\
  \n\n\n我们来看看如何自定义`Home`控制器以显示好友的消息流，如清单 17-15 所示。\n\n**清单 17-15.** 消息流\n\n```\npublic\
  \ function index()\n{\n    $user = $this->getUser();\n    $view = $this->getActionView();\n\
  \n    if ($user)\n    {\n        $friends = Friend::all(array(\n            \"user\
  \ = ?\" => $user->id,\n            \"live = ?\" => true,\n            \"deleted\
  \ = ?\" => false\n        ), array(\"friend\"));\n\n        $ids = array();\n  \
  \      foreach($friends as $friend)\n        {\n            $ids[] = $friend->friend;\n\
  \        }\n\n        $messages = Message::all(array(\n            \"user in ?\"\
  \ => $ids,\n            \"live = ?\" => true,\n            \"deleted = ?\" => false\n\
  \        ), array(\n            \"*\",\n            \"(SELECT CONCAT(first, \\\"\
  \ \\\", last) FROM user WHERE user.id = message.user)\"\n            => \"user_name\"\
  \n        ), \"created\", \"asc\");\n\n        $view->set(\"messages\", $messages);\n\
  \    }\n}\n```\n\n为了获取相关消息，我们修改后的`index()`动作首先需要获取所有关联行。接着我们将好友行展平为一维好友 ID 数组，再获取与这些用户关联的所有消息。最后，我们将消息赋值给动作视图。视图标记也相当简单，如清单\
  \ 17-16 所示。\n\n**清单 17-16.** `application/views/home/index.html`\n\n```\n<h1>Home</h1>\n\
  {if isset($messages)}\n{foreach $message in $messages}\n{echo $message->body}<br\
  \ />\n{/foreach}\n{/if}\n```\n\n让用户能看到好友的消息固然是好，但我们还需要允许他们分享自己的消息。第一步是在`Messages`控制器中添加一个新动作，如清单\
  \ 17-17 所示。\n\n**清单 17-17.** `application/controllers/messages.php`\n\n```\nuse\
  \ Shared\\Controller as Controller;\nuse Framework\\RequestMethods as RequestMethods;\n\
  \nclass Messages extends Controller\n{\n    public function add()\n    {\n     \
  \   $user = $this->getUser();\n\n        if (RequestMethods::post(\"share\"))\n\
  \        {\n            $message = new Message(array(\n                \"body\"\
  \ => RequestMethods::post(\"body\"),\n                \"message\" => RequestMethods::post(\"\
  message\"),\n                \"user\" => $user->id\n            ));\n\n        \
  \    if ($message->validate())\n            {\n                $message->save();\n\
  \                header(\"Location: /\");\n                exit();\n           \
  \ }\n        }\n    }\n}\n```\n\n`Messages::add()`动作负责将表单提交的数据收集到新的消息数据库行中。它执行必要的验证，如果一切无误，则保存记录并重定向回首页。现在我们需要在首页添加一个表单，供用户发布新消息。请看清单\
  \ 17-18，了解具体如何实现。\n\n**清单 17-18.** `application/views/home/index.html`（摘录）\n\n```\n\
  {if (isset($user))}\n<form method=\"post\" action=\"/messages/add.html\">\n    <textarea\
  \ name=\"body\"></textarea>\n    <input type=\"submit\" name=\"share\" value=\"\
  share\" />\n</form>\n{/if}\n```\n\n这是我们创建的少数几个提交到不同动作的表单之一。由于`Messages::add()`动作会重定向回本页，用户不会察觉到这个过程。这里我们没有指定消息字段，因为通过此表单添加的任何消息都不是对其他消息的回复。\n\
  \n不过，我们确实希望能够回复之前的消息。同时，我们也想显示回复内容。\n\n在进一步修改首页之前，我们需要向`Message`模型添加一些方法，如清单 17-19\
  \ 所示。\n\n**清单 17-19.** 消息模型方法\n\n```\npublic function getReplies()\n{\n    return\
  \ self::all(array(\n        \"message = ?\" => $this->getId(),\n        \"live =\
  \ ?\" => true,\n        \"deleted = ?\" => false\n    ), array(\"*\"), \"created\"\
  , \"desc\");\n}\n\npublic static function fetchReplies($id)\n{\n    $message = new\
  \ Message(array(\n        \"id\" => $id\n    ));\n    return $message->getReplies();\n\
  }\n```\n\n第一个方法获取某条消息的回复列表，同时返回回复者的`user_name`，并按创建时间排序，使较新的消息显示在前。有了这两个方法，我们来看看首页如何变化，如清单\
  \ 17-20 所示。\n\n**清单 17-20.** `application/views/home/index.html`（摘录）\n\n```\n{if\
  \ isset($messages)}\n{foreach $message in $messages}\n{echo $message->body}<br />\n\
  {foreach $reply in Message::fetchReplies($message->id)}\n```\n\n\n\n\n`{echo $reply->body}`\n\
  \n`{/foreach}`\n\n`<form method=\"post\" action=\"/messages/add.html\">`\n\n`<textarea\
  \ name=\"body\"></textarea>`\n\n`<input type=\"hidden\" value=\"{echo $message->id}\"\
  \ name=\"message\" />`\n\n`<input type=\"submit\" name=\"share\" value=\"share\"\
  \ />`\n\n`</form>`\n\n`{/foreach}`\n\n`{/if}`\n\n首先需要注意，嵌套消息/回复已被渲染（使用了我们刚刚创建的方法）。其次需要注意，我们为每条主消息都提供了一个表单。这是因为每个表单都需要一个不同的消息字段来传达用户可能正在回复的消息。`Messages::add()`动作既能处理顶层消息，也能处理回复。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 17 章 ■ 分享\n\n### 问题\n\
  \n1.  错误页面是大多数应用程序的常见功能。为什么我们要将显示它们的逻辑放在应用程序的引导文件中？\n2.  为什么重要的是不要使用模板或视图实例来渲染错误页面？\n\
  3.  我们在引导文件中创建了一大组异常类。这些内容放在配置文件中不是更好吗？\n4.  当我们想要获取回复或检查另一个用户是否为我们的好友时，我们是通过模型方法实现的。为什么不在视图或控制器中直接检查这类内容呢？\n\
  \n### 答案\n\n1.  是的，错误页面是当今大多数应用程序的常见功能。然而，处理错误的方式却各不相同。我们选择在几乎所有因错误导致应用程序无法正常运行的情况下抛出异常。出于这个原因，并且为了呈现正确的错误页面，我们检查了所抛出异常的类型。其他应用程序处理错误的方式可能有所不同。因此，这段代码不再是与应用程序无关的，而引导文件成为了放置此逻辑最合理的位置。\n\
  2.  我们使用`include`语句来避免使用模板或视图实例时可能出现的任何错误。这类似于我们的测试代码存放在`public`文件夹中的方式。处理错误页面所需的框架代码越多，这些代码中出现错误的可能性就越大。因此，最简单的解决方案是尽可能少地使用框架代码来测试/报告框架错误。\n\
  3.  如果配置类中发生了异常，并且错误页面需要这些类，那么错误页面将无法显示。\n4.  MVC 的主要目标是关注点分离。获取好友/回复是模型关注的事情，相应的代码应包含在适用的模型中。\n\
  \n### 练习\n\n1.  异常类的列表非常具体，而且相当冗长。现在尝试在异常类内部指定必须显示哪个错误页面，并相应地修改引导文件。\n2.  我们创建了`isFriend()`/`hasFriend()`方法来判断应向用户展示哪些操作，但当我们想要获取用户的好友时，我们是在控制器中进行的。现在尝试创建可以直接从\
  \ User 模型中获取好友的方法。\n3.  为了能够回复较早的消息，我们必须为每个分享的顶层消息创建独立的表单。问题在于这些表单始终可见，导致页面不美观。现在尝试使用一些\
  \ PHP/JavaScript，通过允许用户点击“回复”链接来显示/隐藏不同的回复表单。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 18 章\n\n## 照片\n\n用户资料和状态消息只是社交网络拼图的一部分。作为一名开发者，你无法避开文件上传，它们构成了包括社交网络在内的许多类型企业应用程序的很大一部分。\n\
  \n然而，文件上传是一种奇怪的东西。实现它们所需的逻辑因平台而异。有些平台，如 ColdFusion，几乎隐式地处理文件上传。其他平台，如经典 ASP，在开发这个领域简直是噩梦。\n\
  \n相比之下，PHP 需要一些工作，但一旦你掌握了它，文件上传就变得轻而易举。我们将从简要介绍文件上传所需的逻辑开始本章，然后逐步向我们的应用程序添加文件上传功能。\n\
  \n### 目标\n\n-   我们将回顾实现文件上传所需的过程。\n-   然后，我们将为注册和设置页面（用于个人资料照片）添加上传功能。\n-   最后，我们将这些照片显示在个人资料和用户搜索页面上。\n\
  \n### 如何上传文件\n\n基本思路是文件需要从用户端到达服务器。这通过几个步骤完成，虽然顺序很重要，但还有很大的空间来添加额外功能，例如对以下内容的验证：\n\
  \n-   用户发布一个表单，其中包含一个已选定文件的文件输入框。\n-   服务器检查是否有提交的表单，然后检查是否有提交的文件。\n-   如果文件已提交，服务器检查是否可以将文件从临时存储移动到永久位置。\n\
  -   如果文件已移动，服务器对文件执行任何后期处理，例如返回尺寸、修改任何相关的数据库行等。\n\n这四个简单的步骤可以用清单 18-1 所示的代码表示。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 第 18 章 ■ 照片\n\n**清单 18-1.**\
  \ 上传文件\n\n```php\nif (isset($_FILES[\"photo_field\"]))\n{\n    $file = $_FILES[\"\
  photo_field\"];\n    $newFile = \"path/to/permanent/file\";\n    $uploaded = move_uploaded_file($file[\"\
  tmp_name\"], $newFile);\n    if ($uploaded)\n    {\n        $meta = getimagesize($newFile);\n\
  \        // 对新文件/元数据执行操作\n    }\n}\n```\n\n这段代码看起来相当简单，但它如何融入我们的应用程序呢？让我们继续往下看。\n\
  \n### 用户照片\n\n首先，我们会有很多用户，他们都允许上传自己的照片。这意味着我们预计会有大量的文件上传。这也意味着将上传文件的引用存储在数据库表中可能会对我们有利。\n\
  \n让我们开始将照片上传功能集成到我们的应用程序中，方法是创建一个新模型，该模型将作为在数据库中存储上传文件引用的一种手段。查看清单 18-2 以了解这个新的\
  \ File 模型。\n\n**清单 18-2.** File 模型\n\n```php\nclass File extends Shared\\Model\n\
  {\n    /**\n     * @column\n     * @readwrite\n     * @type text\n     * @length\
  \ 255\n     */\n    protected $_name;\n\n    /**\n     * @column\n     * @readwrite\n\
  \     * @type text\n     * @length 32\n     */\n    protected $_mime;\n\n    /**\n\
  \     * @column\n     * @readwrite\n     * @type integer\n     */\n    protected\
  \ $_size;\n\n    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n    /**\n \
  \    * @column\n     * @readwrite\n     * @type integer\n     */\n    protected\
  \ $_width;\n\n    /**\n     * @column\n     * @readwrite\n     * @type integer\n\
  \     */\n    protected $_height;\n\n    /**\n     * @column\n     * @readwrite\n\
  \     * @type integer\n     */\n    protected $_user;\n}\n```\n\n这个模型与我们第 17 章创建的\
  \ Friend 模型类似，它没有验证。这并不是因为验证对我们不重要，而仅仅是因为在这个阶段它会使事情复杂化。File 模型包含文件名称、MIME 类型、文件大小、宽度、高度和用户的字段。除了用户字段外，所有字段都与特定的上传相关，我们将在文件成功上传后填充它们。\n\
  \n如果这个模型被持久化到数据库中（使用`Connector->sync()`方法），它应该会生成一个如清单 18-3 所示的表。\n\n**清单 18-3.**\
  \ file 表\n\n```sql\nCREATE TABLE `file` (\n  `name` varchar(255) DEFAULT NULL,\n\
  \  `mime` varchar(32) DEFAULT NULL,\n  `size` int(11) DEFAULT NULL,\n  `width` int(11)\
  \ DEFAULT NULL,\n  `height` int(11) DEFAULT NULL,\n  `user` int(11) DEFAULT NULL,\n\
  \  `id` int(11) NOT NULL AUTO_INCREMENT,\n  `live` tinyint(4) DEFAULT NULL,\n  `deleted`\
  \ tinyint(4) DEFAULT NULL,\n  `created` datetime DEFAULT NULL,\n  `modified` datetime\
  \ DEFAULT NULL,\n  PRIMARY KEY (`id`),\n  KEY `live` (`live`),\n  KEY `deleted`\
  \ (`deleted`)\n) ENGINE = InnoDB DEFAULT CHARSET = utf8;\n```\n\n\n\n\n"
- "# 由于我们需要在用户注册和设置更新的地方添加上传功能，因此应该添加一个核心函数来执行上传操作。我们将把这个函数添加到`Users`模型中，如代码清单 18-4\
  \ 所示。\n\n#### 代码清单 18-4. `_upload()`方法\n\n```php\nuse Shared\\Controller as Controller;\n\
  \nclass Users extends Controller\n{\n    protected function _upload($name, $user)\n\
  \    {\n        if (isset($_FILES[$name]))\n        {\n            $file = $_FILES[$name];\n\
  \            $path = APP_PATH.\"/public/uploads/\";\n            $time = time();\n\
  \            $extension = pathinfo($file[\"name\"], PATHINFO_EXTENSION);\n     \
  \       $filename = \"{$user}-{$time}.{$extension}\";\n\n            if (move_uploaded_file($file[\"\
  tmp_name\"], $path.$filename))\n            {\n                $meta = getimagesize($path.$filename);\n\
  \                if ($meta)\n                {\n                    $width = $meta[0];\n\
  \                    $height = $meta[1];\n\n                    $file = new File(array(\n\
  \                        \"name\" => $filename,\n                        \"mime\"\
  \ => $file[\"type\"],\n                        \"size\" => $file[\"size\"],\n  \
  \                      \"width\" => $width,\n                        \"height\"\
  \ => $height,\n                        \"user\" => $user\n                    ));\n\
  \n                    $file->save();\n                }\n            }\n       \
  \ }\n    }\n}\n```\n\n关于这个方法，有几个重要事项需要注意。首先，文件上传可能只在两个方面有所不同，具体来说是表单输入的名称和上传文件的用户\
  \ ID。其次需要注意的是，该方法在`public/uploads`文件夹内为新文件定义了一个路径。这将允许文件通过 URL 直接访问。\n\n与我们的示例代码一样，该方法检查是否有文件被上传。如果有，该方法会尝试将文件移动到永久位置。\n\
  \n**注意：** 当文件无法移动到永久存储时，这可能是上传不安全或无效的迹象。此时正好可以引发异常，让开发者意识到出现了问题。\n\n文件移动到永久存储后，会创建一个新的`File`实例，并将一行记录保存到数据库中。我们还会确定上传文件的宽度/高度。既然我们有了一个可重用的上传方法，现在是时候将其集成到`Users`控制器的`register()`和`settings()`操作中了。\n\
  \n这些方法应类似于代码清单 18-5 和 18-6 所示。\n\n#### 代码清单 18-5. `register()`操作\n\n```php\nuse\
  \ Framework\\RequestMethods as RequestMethods;\nuse Shared\\Controller as Controller;\n\
  \nclass Users extends Controller\n{\n    public function register()\n    {\n   \
  \     if (RequestMethods::post(\"save\"))\n        {\n            $user = new User(array(\n\
  \                \"first\" => RequestMethods::post(\"first\"),\n               \
  \ \"last\" => RequestMethods::post(\"last\"),\n                \"email\" => RequestMethods::post(\"\
  email\"),\n                \"password\" => RequestMethods::post(\"password\")\n\
  \            ));\n\n            if ($user->validate())\n            {\n        \
  \        $user->save();\n                $this->_upload(\"photo\", $user->id);\n\
  \                $this->actionView->set(\"success\", true);\n            }\n\n \
  \           $this->actionView->set(\"errors\", $user->errors);\n        }\n    }\n\
  }\n```\n\n#### 代码清单 18-6. `settings()`操作\n\n```php\nuse Framework\\RequestMethods\
  \ as RequestMethods;\nuse Shared\\Controller as Controller;\n\nclass Users extends\
  \ Controller\n{\n    /**\n     * @before _secure\n     */\n    public function settings()\n\
  \    {\n        $errors = array();\n\n        if (RequestMethods::post(\"save\"\
  ))\n        {\n            $this->user->first = RequestMethods::post(\"first\");\n\
  \            $this->user->last = RequestMethods::post(\"last\");\n            $this->user->email\
  \ = RequestMethods::post(\"email\");\n\n            if (RequestMethods::post(\"\
  password\"))\n            {\n                $this->user->password = RequestMethods::post(\"\
  password\");\n            }\n\n            if ($this->user->validate())\n      \
  \      {\n                $this->user->save();\n                $this->_upload(\"\
  photo\", $this->user->id);\n                $this->actionView->set(\"success\",\
  \ true);\n            }\n\n            $errors = $this->user->errors;\n        }\n\
  \n        $this->actionView->set(\"errors\", $errors);\n    }\n}\n```\n\n集成我们可重用的`_upload()`方法相当简单。在每种情况下，我们只需提供正确的表单输入名称和用户\
  \ ID 即可执行文件上传。我们还需要将表单输入添加到`register.html`和`settings.html`视图中，如代码清单 18-7 所示。\n\n\
  #### 代码清单 18-7. 文件输入\n\n```html\n<li>\n    <label>\n        照片：\n        <input\
  \ type=\"file\" name=\"photo\" />\n    </label>\n</li>\n```\n\n\n\n- 确认已完成所有步骤：创建了\
  \ `uploads` 文件夹（并设置了上传所需的正确文件权限），且已提交注册或设置表单。此时，你应该能看到该文件夹中开始生成文件。同时，你需要在 `settings.html`\
  \ 和 `register.html` 表单中添加 `enctype = \"multipart/form-data\"` 属性。\n\n> **注意**：如果要为文件上传机制添加验证，你需要在文件输入控件下方添加一些\
  \ `echo` 逻辑，以显示验证错误信息。\n\n**稍加展示**\n\n既然文件上传功能已可正常工作，接下来应将上传的文件整合到个人资料页面和搜索页面中。首先，我们需要在\
  \ `User` 模型上创建一个新方法，用于返回最新的 `File` 行。请参见清单 18-8，了解具体实现方式。\n\n***清单 18-8.*** `getFile()`\
  \ 方法\n\n```php\nuse Shared\\Model as Model;\n\nclass User extends Model\n{\n   \
  \ public function getFile()\n    {\n        return File::first(array(\n        \
  \    \"user = ?\" => $this->id,\n            \"live = ?\" => true,\n           \
  \ \"deleted = ?\" => false\n        ), array(\"*\"), \"id\", \"DESC\");\n    }\n\
  }\n```\n\n该方法仅从数据库中返回与当前用户行关联的最新文件。接下来，我们需要更新 `search.html` 模板以包含照片，如清单 18-9 所示。\n\
  \n***清单 18-9.*** `search.html` 模板（节选）\n\n```html\n{foreach $_user in $users}\n{script\
  \ $file = $_user->file}\n<tr>\n    <td>{if $file} <img src=\"/uploads/{echo $file->name}\"\
  \ />{/if}</td>\n    <td>{echo $_user->first} {echo $_user->last}</td>\n    <td>\n\
  \        {if $_user->isFriend($user->id)}\n            <a href=\"/unfriend/{echo\
  \ $_user->id}.html\">unfriend</a>\n        {/if}\n        {else}\n            <a\
  \ href=\"/friend/{echo $_user->id}.html\">friend</a>\n        {/else}\n    </td>\n\
  </tr>\n{/foreach}\n```\n\n由于 `getFile()` 方法符合 `Base` 类中 `__get()` 方法的模式，我们可以直接通过\
  \ `$_user->file` 引用它。如果找到了文件，则将文件名回显到 `img` 元素的 `src` 属性中，从而在搜索结果列表中渲染该图片。最后一步是修改\
  \ `profile.html` 视图，如清单 18-10 所示。\n\n***清单 18-10.*** `profile.html` 模板（节选）\n\n```html\n\
  {script $file = $user->file}\n{if $file} <img src=\"/uploads/{echo $file->name}\"\
  \ />{/if}\n<h1>{echo $user->first} {echo $user->last}</h1>\n```\n\n这是一个个人资料页面！\n\
  \n至此，我们已完成允许用户上传文件，并让这些文件在搜索页面和个人资料页面上显示的所有步骤。\n\n**问题**\n\n1. 为什么有必要在数据库中保存对上传文件的引用？\n\
  2. 我们将文件上传到了 `public/uploads` 文件夹，并且没有检查它们是否为有效的图片。是什么阻止了用户上传恶意文件到服务器？\n3. 确定并存储文件的宽度和高度的目的是什么？\n\
  4. 如何修改此功能以支持上传到像 Amazon CloudFront 或 Rackspace Cloud Files 这样的云服务？\n\n**答案**\n\n\
  1. 这并不是绝对必要的，但强烈建议这样做。任何 PHP 应用中最大的瓶颈之一就是文件的读写操作。如果我们不在数据库中保存这些文件引用，就必须遍历 `uploads`\
  \ 文件夹中的所有文件，匹配那些文件名中包含用户 ID 的文件。这种方法效率太低，不实用。而通过数据库行，我们可以简单地查询与用户关联的所有行，并通过引用返回对应的文件。\n\
  2. 我们没有进行验证，因此无法阻止此类事情发生。\n3. 在保护应用程序安全时，你应该采取一系列步骤——从拒绝执行 `uploads` 目录中的任何文件，到验证允许用户上传的文件的\
  \ MIME 类型、大小和文件名。这些过程应在文件被移动到永久存储之前完成，并且不会妨碍其他步骤的执行。\n\n\n\n### 3\\. 我们谈论了很多关于文件的内容，但实际上指的都是照片。\n\
  \n其核心思想是用户可以上传多张照片，并且这些照片会在数据库中被引用。`Width` 和 `height` 是用于确定照片如何渲染和/或修改的有用属性。我们在此并未使用它们，但它们可以应用于多种实用场景，例如生成缩略图或在幻灯片中渲染。\n\
  \n### 4\\. 我们首先要检查文件是否已上传。\n\n在执行任何必要的文件验证后，我们会将文件上传到云服务器，而不是将其移动到（我们自己的服务器上的）永久存储位置。确定元数据并将引用保存到数据库的步骤仍然适用，但在获取信息的具体方式上可能会有细微差别。\n\
  \n### 练习\n\n1.  我们的代码在文件验证方面相当简略。请尝试添加一些检查，例如文件大小、MIME 类型和文件名，以确保上传的文件确实是有效的图像。\n\
  \n2.  利用存储的 `width` 和 `height` 属性，尝试为上传的照片创建缩略图，这样当上传大尺寸照片时，搜索页面和个人资料页面就不会出错。一个可能有帮助的\
  \ PHP 函数是 `imagecopyresized()`。\n\n3.  我们简单讨论了一下使用基于云的存储服务器。如果你特别有冒险精神，可以尝试连接并使用这些服务之一来存储上传的文件。\n\
  \n> **注意** 你可以在 [www.php.net/manual/en/function.imagecopyresized.php](http://www.php.net/manual/en/function.imagecopyresized.php)\
  \ 上阅读更多关于 `imagecopyresized()` 方法的信息。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 19 章：扩展\n\n流行框架的最大区别之一在于它们能多么轻松地通过第三方库进行扩展。到目前为止，我们开发的所有类要么属于框架，要么属于应用程序。\n\
  \n### 目标\n\n-   我们需要了解如何创建自己的库。\n-   我们需要了解如何使用其他开发者编写的库。\n-   我们需要理解什么是观察者设计模式，以及它为何与我们的应用程序相关。\n\
  -   我们需要在我们的应用程序中构建一种监听和触发事件的方法。\n\n### Foxy\n\n我们要介绍的第一种库是我们自己创建的那一类。虽然这些库严格来说并非第三方，但我们有可能在多个项目中重用它们。它们的“应用”属性不够强，我们不想将其与其余应用程序代码捆绑在一起；但它们的“框架”属性也不够强，我们不想将其添加到框架代码中。\n\
  \n几年前，我创建了一个库，其明确目的是确定用户的浏览器，并提供针对性的样式表，以便在 CSS 中使用自定义字体。这类似于 Google 的 Web Fonts（[www.google.com/webfonts](http://www.google.com/webfonts)）；事实上，我认为那正是最初启发我编写这个库的原因。\n\
  \n我决定将这个库命名为 `Foxy`（是 *font* 和 *proxy* 两个词的组合词）。这个库将启发我们构建自己的字体代理库，该库会更简单一些，但本质上是相同的。\n\
  \n### 自定义 CSS 字体\n\nCSS 虽然不是本书的重点，但却是现代网络不可或缺的一部分。如果你不熟悉，可以将其视为 HTML 页面中元素的着装规范。样式声明（即关于元素某些方面外观的指令）通过\
  \ CSS 选择器定位到特定元素。CSS 选择器是结构化元素标记的字符串表示形式。\n\n现代浏览器对自定义字体的支持相当不错，而且这个概念也绝非新鲜事物。这个库也有一些很好的替代方案，它们各自在其领域内表现出色。我们构建这个库并非因为我们能做得更好，而是为了获得如何扩展框架的基本理解。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\n\n"
- "# 第 19 章 ■ 扩展\n\n牢记以上内容后，请看一下使用这些自定义字体所需的 CSS，如代码清单 19-1 所示。\n\n***代码清单 19-1.***\
  \ CSS 自定义字体声明\n\n```\n@font-face\n{\nfont-family: \"LuxiSans\";\nsrc: url(\"/fonts/LuxiSans.eot\"\
  );\nsrc: url(\"/fonts/LuxiSans.eot?#iefix\") format(\"embedded-opentype\"), url(\"\
  /fonts/LuxiSans.woff\") format(\"woff\"),\nurl(\"/fonts/LuxiSans.ttf\") format(\"\
  truetype\"),\nurl(\"/fonts/LuxiSans.svg#LuxiSans\") format(\"svg\");\nfont-style:\
  \ normal;\n}\n```\n\n虽然这很容易通过硬编码实现，但对于少量字体来说，其扩展性并不强。首先，每种字体需要额外添加 10 行 CSS，更不用说每种字体变体（粗体、斜体等）了。某些浏览器（如\
  \ Internet Explorer）难以处理多个 `src` 值，这让情况更加复杂，导致这种方法有点不稳定。\n\n我们真正想要的是让应用程序检测我们正在使用哪个浏览器，并仅返回相关文件类型的\
  \ CSS。要实现这一点，我们需要 a) 能够注册多种字体类型/变体，b) 检测浏览器类型，以及 c) 仅提供适用的字体格式。\n\n### 构建代理\n\n\
  我们首先在 `application/libraries` 目录中添加一个 `fonts` 目录，其中包含两个 PHP 类文件。\n\n第一个文件 `application/libraries/fonts/types.php`\
  \ 包含一些常量，代表不同的格式类型。你可以在代码清单 19-2 中看到这个文件。\n\n***代码清单 19-2.*** `application/libraries/fonts/types.php`\n\
  \n```\nnamespace Fonts\n{\nclass Types\n{\nconst OTF = \"opentype\";\nconst TTF\
  \ = \"truetype\";\nconst EOT = \"eot\";\n}\n}\n```\n\n第二个类稍微复杂一些。它从代码清单 19-3 所示的代码开始，用于向代理添加字体格式/变体。\n\
  \n***代码清单 19-3.*** `application/libraries/fonts/proxy.php`（摘录）\n\n```\nnamespace\
  \ Fonts\n{\nuse Fonts\\Types as Types;\nclass Proxy\n{\nprotected $_fonts = array();\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\nCHAPTER 19 ■ ExTEnding\npublic\
  \ function addFont($key, $type, $file)\n{\nif (!isset($this- >_fonts[$type]))\n\
  {\n$this- >_fonts[$type] = array();\n}\n$this- >_fonts[$type][$key] = $file;\nreturn\
  \ $this;\n}\npublic function addFontTypes($key, $types)\n{\nforeach ($types as $type\
  \ = > $file)\n{\n$this- > addFont($key, $type, $file);\n}\nreturn $this;\n}\npublic\
  \ function removeFont($key, $type)\n{\nif (isset($this- >_fonts[$type][$key]))\n\
  {\nunset($this- >_fonts[$type][$key]);\n}\nreturn $this;\n}\npublic function getFont($key,\
  \ $type)\n{\nif (isset($this- >_fonts[$type][$key]))\n{\nreturn $this- >_fonts[$type][$key];\n\
  }\nreturn null;\n}\n}\n}\n```\n\n`addFont()` 方法将单个字体添加到受保护的 `$_fonts` 数组。类似地，`addFontTypes()`\
  \ 方法为每个字体的多个字体类型添加一个数组。`getFont()` 方法从 `$_fonts` 数组中返回指定名称的字体，而 `deleteFont()` 方法从\
  \ `$_fonts` 数组中移除指定名称的字体。\n\n这些方法实际上并没有做任何有用的事情。为了知道要提供哪些字体，我们需要知道哪个浏览器正在尝试加载它们。这就是下一个方法发挥作用的地方，如代码清单\
  \ 19-4 所示。\n\n***代码清单 19-4.*** `application/libraries/fonts/proxy.php`（摘录）\n\n```\n\
  namespace Fonts\n{\nuse Fonts\\Types as Types;\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  CHAPTER 19 ■ ExTEnding\nclass Proxy\n{\npublic function sniff($agent)\n{\n$browser\
  \ = \"#(opera|ie|firefox|chrome|version)\\s\\/:?.*?\n(safari|version\\s\\/:|$)#i\"\
  ;\n$platform = \"#(ipod|iphone|ipad|webos|android|win|mac|linux)#i\";\nif (preg_match($browser,\
  \ $agent, $browsers))\n{\nif (preg_match($platform, $agent, $platforms))\n{\n$platform\
  \ = $platforms[1];\n}\nelse\n{\n$platform = \"other\";\n}\nreturn array(\n\"browser\"\
  \ = > (strtolower($browsers[1]) == \"version\") ? \nstrtolower($browsers[3]) :\
  \ strtolower($browsers[1]),\n\"version\" = > (float) (strtolower($browsers[1]) ==\
  \ \"opera\") ? \nstrtolower($browsers[4]) : strtolower($browsers[2]),\n\"platform\"\
  \ = > strtolower($platform)\n);\n}\nreturn false;\n}\n}\n}\n```\n\n\n\n`sniff()`方法正是这样做的：它嗅探浏览器的用户代理字符串，以尝试识别浏览器的特征（类型、版本和平台）。\n\
  \n**注意** 通过用户代理检测来识别浏览器并不可靠。浏览器可以更改自己的用户代理，并且新浏览器（带有新的用户代理字符串）不断发布。最好的情况下，这种方法需要定期更新。最坏的情况下，它可能会对实际支持某些格式的浏览器产生错误否定结果。请自行承担风险！\n\
  \n因此，我们有了添加字体格式的方法和识别哪个浏览器正在请求自定义字体的方法。我们通过清单 19-5 所示的方法将这两方面结合起来。\n\n**清单 19-5.**\
  \ `application/libraries/fonts/proxy.php`（摘录）\n\n```php\nnamespace Fonts\n\n{\n\n\
  use Fonts\\Types as Types;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nCHAPTER 19 ■ ExTEnding\n\nclass Proxy\n\n{\n\npublic function detectSupport($agent)\n\
  \n{\n\n$sniff = $this->sniff($agent);\n\nif ($sniff)\n\n{\n\nswitch ($sniff[\"platform\"\
  ])\n\n{\n\ncase \"win\":\n\ncase \"mac\":\n\ncase \"linux\":\n\n{\n\nswitch ($sniff[\"\
  browser\"])\n\n{\n\ncase \"opera\":\n\n{\n\nreturn ($sniff[\"version\"] > 10) ?\
  \ array(Types::TTF, Types::OTF, Types::SVG) : false;\n\n}\n\ncase \"safari\":\n\n\
  {\n\nreturn ($sniff[\"version\"] > 3.1) ? array(Types::TTF, Types::OTF) : false;\n\
  \n}\n\ncase \"chrome\":\n\n{\n\nreturn ($sniff[\"version\"] > 4) ? array(Types::TTF,\
  \ Types::OTF) : false;\n\n}\n\ncase \"firefox\":\n\n{\n\nreturn ($sniff[\"version\"\
  ] > 3.5) ? array(Types::TTF, Types::OTF) : false;\n\n}\n\ncase \"ie\":\n\n{\n\n\
  return ($sniff[\"version\"] > 4) ? array(Types::EOT) : false;\n\n}\n\n}\n\n}\n\n\
  }\n\n}\n\nreturn false;\n\n}\n\n}\n\n}\n```\n\n`detectSupport()`方法首先调用`sniff()`方法。然后，它直接进入一些嵌套的`switch`语句，这些语句返回一个已知支持格式的数组，或者返回`false`。这将对浏览器支持哪些字体提供最佳猜测。\n\
  \n有了这些方法，我们几乎准备好开始提供自定义字体了，但我认为还应该添加一个便捷方法。请查看清单 19-6 以了解此方法。\n\n**清单 19-6.** `application/libraries/fonts/proxy.php`（摘录）\n\
  \n```php\nnamespace Fonts\n\n{\n\nuse Fonts\\Types as Types;\n\nclass Proxy\n\n\
  {\n\npublic function serve($key, $agent)\n\n{\n\n$support = $this->detectSupport($agent);\n\
  \nif ($support)\n\n{\n\n$fonts = array();\n\nforeach ($support as $type)\n\n{\n\n\
  $font = $this->getFont($key, $type);\n\nif ($font)\n\n{\n\n$fonts[$type] = $this->getFont($key,\
  \ $type);\n\n}\n\n}\n\nreturn $fonts;\n\n}\n\nreturn array();\n\n}\n\n}\n\n}\n```\n\
  \n`serve()`方法接受一个`$key`（指代存储在`$_fonts`数组中的字体样式）和一个`$agent`（指代用户代理），以便检测支持情况并返回一个支持的字体数组。\n\
  \n#### 使用代理\n\n现在我们需要使用刚刚构建的字体代理。为此，我们将创建一个新的`Files`控制器，其中包含一个`fonts()`动作。为了访问这个动作，我们将向第\
  \ 17 章创建的`routes.php`文件（位于`public/routes.php`）添加一个自定义路由。该自定义路由具有清单 19-7 所示的配置参数。\n\
  \n**清单 19-7.** 自定义字体路由\n\n```php\narray(\n\n\"pattern\" => \"fonts/:id\",\n\n\"\
  controller\" => \"files\",\n\n\"action\" => \"fonts\"\n\n)\n```\n\n思路是我们添加一个指向此路由的外部样式表。然后`fonts()`动作生成该样式表，并将其传回浏览器。让我们看看`fonts()`动作是什么样的，如清单\
  \ 19-8 所示。\n\n**清单 19-8.** `Files`控制器\n\n```php\nuse Shared\\Controller as Controller;\n\
  \nuse Fonts\\Proxy as Proxy;\n\nuse Fonts\\Types as Types;\n\nclass Files extends\
  \ Controller\n\n{\n\npublic function fonts($name)\n\n{\n\n$path = \"/fonts\";\n\n\
  if (!file_exists(\"{$path}/{$name}\"))\n\n{\n\n$proxy = new Proxy();\n\n$proxy->addFontTypes(\"\
  {$name}\", array(\n\nTypes::OTF => \"{$path}/{$name}.otf\",\n\nTypes::EOT => \"\
  {$path}/{$name}.eot\",\n\nTypes::TTF => \"{$path}/{$name}.ttf\"\n\n));\n\n$weight\
  \ = \"\";\n\n$style = \"\";\n\n$font = explode(\"-\", $name);\n\nif (sizeof($font)\
  \ > 1)\n\n{\n\nswitch (strtolower($font[1]))\n\n{\n\ncase \"Bold\":\n```\n\n\n```php\n\
  $weight = \"bold\";\n\nbreak;\n\ncase \"Oblique\":\n\n$style = \"oblique\";\n\n\
  break;\n\ncase \"BoldOblique\":\n\n$weight = \"bold\";\n\n$style = \"oblique\";\n\
  \nbreak;\n\n}\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n```\n\n\
  ## 第 19 章 ■ 扩展\n\n```php\n$declarations = \"\";\n$font = join(\"-\", $font);\n$sniff\
  \ = $proxy->sniff($_SERVER[\"HTTP_USER_AGENT\"]);\n$served = $proxy->serve($font,\
  \ $_SERVER[\"HTTP_USER_AGENT\"]);\n\nif (sizeof($served) > 0)\n{\n    $keys = array_keys($served);\n\
