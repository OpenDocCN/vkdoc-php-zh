  \                <startdate>$startDate</startdate>\n                <issuenumber>$issueNumber</issuenumber>\n\
  \            </Card>\n        </CardTxn>\n    </Transaction>\n</Request>\";\n  \
  \  }\n\n    // 为向 DataCash 发送履行请求编写 XML 结构\n    public function MakeXmlFulfill($dataCashClient,\
  \ $dataCashPassword, $method, $authCode, $reference)\n    {\n        $this->_mXml\
  \ =\n\"<?xml version=\\\"1.0\\\" encoding=\\\"UTF-8\\\"\\x3F>\n<Request>\n    <Authentication>\n\
  \        <password>$dataCashPassword</password>\n        <client>$dataCashClient</client>\n\
  \    </Authentication>\n    <Transaction>\n        <HistoricTxn>\n            <reference>$reference</reference>\n\
  \            <authcode>$authCode</authcode>\n            <method>$method</method>\n\
  \        </HistoricTxn>\n    </Transaction>\n</Request>\";\n    }\n\n    // 获取当前的\
  \ XML\n    public function GetRequest()\n    {\n        return $this->_mXml;\n \
  \   }\n\n    // 使用 CURL 向 DataCash 发送 HTTP POST 请求\n    public function GetResponse()\n\
  \    {\n        // 初始化 CURL 会话\n        $ch = curl_init();\n\n        // 准备进行 HTTP\
  \ POST 请求\n        curl_setopt($ch, CURLOPT_POST, 1);\n\n        // 准备要 POST 的 XML\
  \ 文档\n        curl_setopt($ch, CURLOPT_POSTFIELDS, $this->_mXml);\n\n        //\
  \ 设置要 POST XML 结构的目标 URL\n        // ...\n    }\n}\n```\n\n\n\n```php\ncurl_setopt($ch,\
  \ CURLOPT_URL, $this->_mUrl);\n\n/* 不在 SSL 握手中验证对等证书的通用名称 */\ncurl_setopt($ch, CURLOPT_SSL_VERIFYHOST,\
  \ 0);\n\n// 阻止 CURL 验证对等证书\ncurl_setopt($ch, CURLOPT_SSL_VERIFYPEER, 0);\n\n/* 我们需要\
  \ CURL 直接返回传输结果，而不是打印它 */\ncurl_setopt($ch, CURLOPT_RETURNTRANSFER, 1);\n\n// 执行一个\
  \ CURL 会话\n$result = curl_exec($ch);\n\n// 关闭一个 CURL 会话\ncurl_close($ch);\n\n//\
  \ 返回响应\nreturn $result;\n```\n\n**2.** 在你的 `include/config.php` 文件末尾定义 DataCash\
  \ URL 和登录数据：\n\n```php\n// datacash 的常量定义\ndefine('DATACASH_URL', 'https://testserver.datacash.com/Transaction');\n\
  define('DATACASH_CLIENT', '你的账户客户编号');\ndefine('DATACASH_PASSWORD', '你的账户密码');\n\
  ```\n\n**3.** 在你的项目根目录（`hatshop` 文件夹）中创建 `test_datacash.php` 文件，并在其中添加以下内容：\n\n\
  ```php\n<?php\nsession_start();\n\nif (empty($_GET['step']))\n{\n    require_once\
  \ 'include/config.php';\n    require_once BUSINESS_DIR . 'datacash_request.php';\n\
