    | `character` | 可变 | 存储固定长度的字符数据。比最大值短的字符串会用空格补充，而更长的字符串则会被截断。在比较这种类型的值时，尾随空格不会被考虑在内。该数据类型常用的别名是
    `char`。 |

    | `character varying` | 可变 | 存储可变长度的字符数据。该数据类型常用的别名是 `varchar`。你设置的维度（dimension）代表它能接受的最大字符串长度（更长的字符串会被截断）。
    |

    | `text` | 无限 | 存储长度无限的字符串。PostgreSQL 文档指出，`text` 和 `character varying` 字符串数据类型之间没有性能差异。
    |

    | `serial` | 4 字节 | 这不是一个“真正的”数据类型，而是一种用于定义自动编号整数列的约定，类似于 MySQL 中的 `AUTO_INCREMENT`
    或 SQL Server 中的 `IDENTITY`。在 PostgreSQL 7.3 或更高版本中，`serial` 并不意味着 `UNIQUE`，如果你希望该列存储唯一值，则必须（且应该）明确指定这一点。`serial`
    的变体是 `bigserial` 类型，它在 `bigint` 之上实现了自动编号功能。 |


