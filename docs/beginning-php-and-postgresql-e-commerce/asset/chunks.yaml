    C H A P T E R 1 3 ■ I M P L E M E N T I N G T H E O R D E R P I P E L I N E :
    PA RT I Let’s now look at the AdminMail method that simply takes a few parameters
    for the basic email properties:


    // Builds email message


    public function MailAdmin($subject, $message, $sourceStage)


    {


    $to = ADMIN_EMAIL;


    $headers = ''From: '' . ORDER_PROCESSOR_EMAIL . "\r\n"; $body = ''Message: ''
    . $message . "\n" .


    ''Source: '' . $sourceStage . "\n" .


    ''Order ID: '' . $this->mOrderInfo[''order_id''];


    $result = mail($to, $subject, $body, $headers);


    if ($result === false)


    {


    throw new Exception (''Failed sending this mail to administrator:'' .


    "\n" . $body);


    }


    }


    The CreateAudit method is also a simple one and calls the CreateAudit business
    tier method shown earlier:


    // Adds audit message


    public function CreateAudit($message, $messageNumber)


    {


    Orders::CreateAudit($this->mOrderInfo[''order_id''], $message, $messageNumber);


    }


    At this point, it’s worth examining the message number scheme we’ve chosen for
    order-processing audits. In all cases, the audit message number will be a five-digit
    number. The first digit of this number is either 1 if an audit is being added
    by OrderProcessor or 2 if the audit is added by a pipeline section. The next two
    digits are used for the pipeline stage that added the audit (which maps directly
    to the status of the order when the audit was added).


    The final two digits uniquely identify the message within this scope. For example,
    so far you’ve seen the following message numbers:


    • 10000: Order processor started.


    • 10001: Order processor finished.


    • 10002: Order processor error occurred.


    Later, you’ll see a lot of these numbers that start with 2, as you get on to pipeline
    sections and include the necessary information for identifying the pipeline section
    as noted previously. We hope you’ll agree that this scheme allows for plenty of
    flexibility, although you can, of course, use whatever numbers you see fit. As
    a final note, numbers ending in 00 and 01 are used for starting and finishing
    messages for both the order processor and pipeline stages, whereas 02 and above
    are for other messages. There is no real reason for this apart from consistency
    between the components.


    The PsDummy class that is used in this skeleton processor performs some basic
    functions to check that things are working correctly:


