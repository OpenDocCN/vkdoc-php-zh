  \n### 应用程序部署\n\n现在我们来研究将 Web 应用程序部署到生产服务器上的过程。到目前为止，我们假设所有开发都在专用的开发服务器上进行，并且应用程序的用户无法访问此服务器。\n\
  \n管理 Web 应用程序版本的典型设置涉及三种类型的服务器：\n\n*   **开发服务器**：这里创建并测试新代码。应用程序有时可能正常工作，有时可能完全崩溃。通常只有开发人员和测试人员才能访问。\n\
  *   **预发布服务器**：一旦 Web 应用程序的新版本完成，它会被部署到预发布服务器。此服务器的配置与生产服务器完全相同（相同的操作系统以及`Apache`、`PHP`等软件的版本）。此应用程序将完全功能化，但其数据可能是静态的且过时的（它通常不是备份服务器或镜像服务器）。它通常由开发人员和测试人员访问（或许还有委托您开发应用程序以批准更改的客户）。在预发布服务器上部署提供了一个很好的机会来确定在部署到生产服务器时可能出现的任何“陷阱”。\n\
  *   **生产服务器**：一旦一切在预发布服务器上看起来运行正常，新的应用程序版本就可以部署到生产服务器。这是现实世界看到的服务器，它包含实时数据库和最新数据。\n\
  \n实际上，普通 Web 开发者的流程可能不包含预发布服务器，因为开发服务器通常可以兼任预发布服务器。在以下章节中，为简化问题，我们将假设只处理开发服务器和生产服务器。\n\
  \n#### 不同服务器的不同配置\n\n在将 Web 应用程序文件部署到生产服务器之前，我们必须处理不同服务器需要不同配置的问题。这样做的原因是，我们应该能够将所有文件部署到生产服务器，并使它们立即可用，而无需随后修改生产配置文件。\n\
  \n例如，在你的开发环境中，数据库服务器很可能与 Web 服务器是同一台物理机器（这意味着你的`PHP`将连接到“`localhost`”上的服务器）。在生产环境中，情况可能并非如此。许多\
  \ Web 主机将数据库服务器与 Web 服务器分离。因此，你可能需要不同的数据库连接设置。为了处理这个问题，我们在应用程序的`settings.ini`文件中添加一个新段落。\n\
  \n当我们在第 2 章创建设置文件时，所有配置字符串都位于一个名为`development`的段落中，该段落用方括号表示如下：\n\n```\n[development]\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n`9063Ch14CMP2 11/13/07\
  \ 8:20 PM Page 539`\n\n第 14 章 ■ 部署与维护\n\n**539**\n\n我们可以用同样的方式在该文件中定义更多段落。因此，如果我们想为生产环境设置不同的配置，我们会包括下面这行：\n\
  \n```\n[production]\n```\n\n然后你将在这一行后面定义生产环境的设置。不过，这里唯一的问题是，某些设置对于开发和生产环境可能完全相同。为了帮助解决这个问题，`Zend_Config`允许在配置文件中进行继承。\n\
  \n换句话说，对于生产环境的设置，我们可以使用所有开发环境的设置，然后根据需要覆盖每一个。我们通过如下方式定义新段落来实现：\n\n```\n[production\
  \ : development]\n```\n\n回到之前在生产环境中为数据库服务器使用不同主机名的例子，我们可以使用以下配置文件：\n\n```\n[development]\n\
  \ndatabase.type = pdo_mysql\n\ndatabase.hostname = localhost\n\ndatabase.username\
  \ = phpweb20\n\ndatabase.password = myPassword\n\ndatabase.database = phpweb20\n\
  \n; other development settings here\n\n[production : development]\n\ndatabase.hostname\
  \ = 192.168.0.123\n```\n\n在这段代码中，开发环境使用的所有设置（例如数据库用户名和密码）也将在生产环境中使用，但主机名`database.hostname`已被覆盖。\n\
  \n清单 14-19 显示了你应该添加到`settings.ini`文件中的代码。即使你不打算更改任何设置，为了使后续的代码正常工作，你也需要添加这一行。\n\n\
  **清单 14-19.** *定义生产环境设置段落（`settings.ini`）*\n\n```\n[development]\n\n; other development\
  \ settings here\n\n[production : development]\n```\n\n##### 告诉引导程序使用哪个配置\n\n一旦为生产服务器创建了配置段落，我们必须更改引导文件，以便它加载正确的段落。到目前为止，我们已经硬编码引导程序使用开发环境的段落。问题是，代码如何知道加载哪个段落？\n\
  \n为此，我们必须向引导程序中添加一些检测机制。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  `9063Ch14CMP2 11/13/07 8:20 PM Page 540`\n\n**540**\n\n第 14 章 ■ 部署与维护\n\n我们要采用的方法是在`Apache`配置中将值写入\
  \ Web 服务器环境。使用`Apache`的`SetEnv`指令，我们将写入一个值，该值指定要使用的配置段落的名称，以及要使用的设置文件的名称。\n\n\n\n\
  接着，我们修改`index.php`启动文件以读取并使用这些值。这些值并非必须指定：如果配置中未包含它们，我们将使用默认设置文件`settings.ini`和默认配置段落`production`。\n\
  \n> **注意** 通常情况下，你无需更改设置文件的文件名，但具备这种能力有时会很有用。例如，如果你想基于同一代码库运行两个独立的网站，可以为每个站点使用独立的设置文件，然后在每个站点的\
  \ Web 服务器配置中指定使用哪个文件。\n\n如前所述，Apache 中使用`SetEnv`指令来设置环境变量。该指令的第一个值是环境变量的名称，第二个值是值。我们将使用的值如下：\n\
  \n```\nSetEnv APP_CONFIG_FILE \"settings.ini\"\nSetEnv APP_CONFIG_SECTION \"development\"\
  \n```\n\n> **注意** 我们将使用`APP_CONFIG_SECTION`值为`development`（而不是`production`），因为我将此段落视为正在开发应用程序。一旦你部署了它（使用本章后面的说明），你便可以将此值设置为`production`，或者完全省略它（因为我们将使用`production`作为默认值）。\n\
  \n然后，这些值可以通过`$_SERVER`变量从任何 PHP 脚本中访问。\n\n例如，要获取配置文件名，你可以使用`$_SERVER['APP_CONFIG_FILE']`。\n\
  \n清单 14-20 展示了我们对第 2 章（清单 2-1）中创建的 Web 服务器配置所做的更改。这些更改位于`/var/www/phpweb20/httpd.conf`文件中。你需要重启\
  \ Web 服务器才能使这些值生效。\n\n**清单 14-20.** *在 Apache 配置中设置设置文件名和段落 (`httpd.conf`)*\n\n\
  ```\n<VirtualHost 192.168.0.80>\nServerName phpweb20\nDocumentRoot /var/www/phpweb20/htdocs\n\
  <Directory /var/www/phpweb20/htdocs>\nAllowOverride All\nOptions All\n</Directory>\n\
  php_value include_path .:/var/www/phpweb20/include:/usr/local/lib/pear\n\nphp_value\
  \ magic_quotes_gpc off\nphp_value register_globals off\n\nSetEnv APP_CONFIG_FILE\
  \ \"settings.ini\"\nSetEnv APP_CONFIG_SECTION \"development\"\n</VirtualHost>\n\
  ```\n\n下一步是更新应用程序启动文件以使用这些值。清单 14-21 展示了我们对`./htdocs/index.php`文件所做的更改，以便配置文件名和段落不再被硬编码。\n\
  \n**清单 14-21.** *使用 Apache 环境变量决定配置 (`index.php`)*\n\n```php\n<?php\nrequire_once('Zend/Loader.php');\n\
  Zend_Loader::registerAutoload();\n\n// 设置应用程序日志记录器\n$logger=new Zend Log(new Zend\
  \ Log Writer Null());\ntry {\n$writer = new EmailLogger($ SERVER['SERVER ADMIN']);\n\
  $writer->addFilter(new Zend Log Filter Priority(Zend Log::CRIT));\n$logger->addWriter($writer);\n\
  \n// 加载应用配置\n$configFile = '';\nif (isset($_SERVER['APP_CONFIG_FILE']))\n$configFile\
  \ = basename($_SERVER['APP_CONFIG_FILE']);\nif (strlen($configFile) == 0)\n$configFile\
  \ = 'settings.ini';\n\n$configSection = '';\nif (isset($_SERVER['APP_CONFIG_SECTION']))\n\
  $configSection = basename($_SERVER['APP_CONFIG_SECTION']);\nif (strlen($configSection)\
  \ == 0)\n$configSection = 'production';\n\n$config = new Zend_Config_Ini('../' .\
  \ $configFile, $configSection);\nZend_Registry::set('config', $config);\n\n// ...\
  \ 其他代码\n```\n\n这些更改首先尝试从服务器变量读取`APP_CONFIG_FILE`段落。如果没有找到值（或值为空），则使用默认值`settings.ini`。接着，我们做同样的事情来确定要使用的配置段落（使用`APP_CONFIG_SECTION`）。最后，在实例化`Zend_Config_Ini`时使用这些值。\n\
  \n> **注意** 此代码通过使用`basename()`强制设置文件位于应用程序根目录（`/var/www/phpweb20`）。如果你希望能够在系统其他地方存储该文件，可以修改此代码以允许在`APP_CONFIG_FILE`设置中使用完整路径。\n\
  \n#### 使用 Rsync 部署应用文件\n\n为了帮助部署应用文件（包括初始部署和后续更新），你可以使用`rsync`程序。`Rsync`是一种用于在两个位置之间同步文件和目录的工具。尽管\
  \ FTP 和 SFTP 等程序可能有用，但用它们来部署更新却很繁琐（因为文件可能跨越许多目录）。\n\n`Rsync`通过确定副本 A（在我们的例子中，是开发服务器上的副本）和副本\
  \ B（生产服务器上的副本）之间的差异，然后将这些差异应用到副本 B 来实现同步。通过仅传输副本之间的差异，需要传输的数据量被最小化。\n\n`rsync`可以通过\
  \ SSH 连接使用，这一特性使其成为同步两个代码副本的绝佳方式。但要注意，`rsync`必须安装在两台服务器上（如果使用 SSH，则 SSH 也必须安装）。\n\
  \n如果你的服务器上还没有`rsync`，可以从[`rsync.samba.org`](http://rsync.samba.org)下载。每个你想要同步文件的服务器都需要安装它。\n\
  \n现在让我们看一个使用`rsync`的例子。假设两台服务器都已安装`rsync`，你可以从开发环境拉取文件到生产环境（通过在**生产**服务器上运行`rsync`），或者将文件从开发环境推送到生产环境（通过在**开发**服务器上运行`rsync`）。\n\
  \n如果你想将应用程序部署到一个虚构的生产服务器`production.example.com`上，你需要执行以下命令：\n\n```\n# rsync -rlptzv\
  \ -e ssh /var/www/phpweb20 myUsername@production.example.com:/var/www\n```\n\n此命令中使用的参数含义如下：\n\
  \n- `-r`：递归复制文件（即复制所有目录和子目录）。\n- `-l`：复制符号链接。\n- `-p`：保持文件和目录的权限。\n- `-t`：保持文件的时间戳。\n\
  - `-z`：在传输过程中压缩数据。\n- `-v`：执行过程中输出详细信息。\n- `-e`：指定用作传输工具的 shell。这里我们使用`ssh`。\n\n\
  下一个参数指明被同步文件的主副本，而最后一个参数是正在被更新的副本。在这个例子中，我们从开发服务器复制，所以可以使用本地路径。如果我们从生产服务器运行`rsync`，那么在此参数中会使用一个\
  \ URL，并将生产服务器上的本地路径作为最后一个参数。\n\n第一次运行此命令时，所有应用文件都会被复制，而后续只会复制更改过的文件。你可以通过先运行两次命令轻松看出这一点——第二次不会有任何文件被复制。\n\
  \n> **注意** 你也可以使用`-n`参数预览哪些文件将被传输，而无需实际执行传输。\n\n### 备份与恢复\n\n我们将要探讨的应用程序管理的下一个方面是生产服务器上数据的备份与恢复。在以下部分中，我们将介绍如何备份应用程序中使用的\
  \ MySQL 数据库，以及如何在需要时恢复它。我们开发的 PHP 代码无需从生产服务器备份，因为它只是开发代码的一个副本（假设你已经备份了本地开发代码或已使用版本控制）。\n\
  \n\n\n### 备份与恢复\n\n在许多托管环境中，网络主机商会为你处理备份工作；不过，了解如何自行进行备份仍然很有用。这还能让你将生产环境中的真实数据复制到开发环境中，在开发新功能时能有真实数据进行操作。\n\
  \n> **注意**：在第 11 章中，我们开发动态图片库时，曾将上传的图片存储在文件系统中。当时我已经分析了这样做的优缺点。本节仅涉及程序数据库的备份与恢复；但请注意，你也应当备份这些上传的图片。\n\
  \n#### 导出数据库\n\n要导出程序数据库，我们使用`mysqldump`程序。这将把整个数据库（根据指定的选项）导出到一个文件中，我们可以将其保存到任意所需的位置（例如备份服务器或\
  \ CD/DVD）。\n\n使用`mysqldump`时，我们可以指定许多选项来控制数据的导出方式（例如仅导出表结构而不导出数据，或反之），但对于我们的需求而言，默认选项已经足够。\n\
  \nLinux 中导出数据库的命令如下：\n\n```\n# mysqldump dbname\n```\n\n这会将数据库的结构和数据输出到终端（标准输出）。因此，如果你希望将其写入文件，必须将输出重定向到文件。换句话说，我们可以这样操作：\n\
  \n```\n# mysqldump dbname > filename.sql\n```\n\n更好的做法是，我们可以先通过`gzip`管道压缩输出（因为数据库可能体积较大）：\n\
  \n```\n# mysqldump dbname | gzip > filename.sql.gz\n```\n\n由于我们使用`phpweb20`用户名及密码连接数据库，因此必须指定`-u`和`-p`参数以使用所需的凭据。此外，我们可以将数据库名称（`phpweb20`）代入前面的示例：\n\
  \n```\n# mysqldump -u phpweb20 -p phpweb20 | gzip > phpweb20.sql.gz\n```\n\n执行此命令后，当前目录下将有一个数据库的压缩备份。\n\
  \n> **提示**：PostgreSQL 中与`mysqldump`对应的工具是`pg_dump`。需要提供给该程序的参数与`mysqldump`略有不同，但两者工作原理基本相同。\n\
  \n#### 导入数据库\n\n既然已经有了数据库备份，了解如何从头重建数据库就很有用。首先，如果数据库尚不存在，需要创建数据库及相应的权限（按照第 2 章的说明操作）：\n\
  \n```\nmysql> create database phpweb20;\n```\n\n接着，从命令行导入文件。可以先解压文件，然后将结果通过管道传给`mysql`程序。注意，我们需要向`gunzip`传递`--stdout`参数才能实现：\n\
  \n```\n# gunzip --stdout phpweb20.sql.gz | mysql -u phpweb20 -p phpweb20\n```\n\n\
  如果数据库转储文件已经解压，可以使用以下命令：\n\n```\n# mysql -u phpweb20 -p phpweb20 < phpweb20.sql\n\
  ```\n\n可以看出，导出和导入数据库数据相对简单。如果需要同时管理大量权限或拥有某些特殊配置，操作可能会稍显复杂。\n\n有些人喜欢将数据库导出拆分为两个文件：一个用于表结构，另一个用于实际数据。这样可以在两个独立步骤中恢复数据，尤其当数据库已有必要的表结构时（例如从生产环境复制数据到开发数据库），这种做法特别有用。\n\
  \n## 总结\n\n本章探讨了与创建和管理网络应用程序相关的多个主题。这些主题相当重要，因为在创建需要以最少维护工作平稳运行的应用程序时，都必须考虑这些方面。\n\
  \n具体而言，本章涵盖的主题如下：\n\n- 创建实用的日志系统，能在出现问题时通知管理员\n- 处理运行时可能发生的错误，记录错误并通知终端用户发生了问题\n\
  - 处理 404 错误，告知用户所请求的页面无法找到\n- 创建管理后台，允许有权限的用户根据需要控制程序数据\n- 为网络应用程序创建多套配置，以适应应用可能使用的每种环境（开发、预发布、生产）\n\
  - 将应用程序部署到生产服务器（包括如何部署更新）\n- 备份与恢复 MySQL 数据库\n\n学完本章后，你应该对从零开始开发一个网络应用程序所需的步骤有了扎实的理解。本章涵盖的主题将帮助你，在真实环境中管理之前章节所开发的代码。\n\
  \n尽管你可能不需要我们在 Web 2.0 应用程序中实现的所有功能，但我希望它提出了一些想法和概念，能帮助你进一步开发这个应用，或从头创建你自己的应用。\n\n\
  请记住，这些想法并非一成不变——它们仅仅是我个人的做法。如果你对本书中我做的某些内容有不同看法，你应该通过尝试自己的方式挑战它，并自行判断哪种方法最好。更妙的是，我希望你能直接向我提出挑战，这样我也能学到新东西。\n\
