    Since the code has grown in length, it will be much easier to follow the logical
    flow (and to modify the code when necessary) if much of the work is done in methods.
    As with many applications, the main flow of the program becomes one embedded `if
    else` statement.


    ![../images/394210_2_En_7_Chapter/394210_2_En_7_Fig1_HTML.jpg](images/394210_2_En_7_Chapter/394210_2_En_7_Fig1_HTML.jpg)


    **Figure 7-1** The `readchangelog.php` file requesting selection of a change log
    file


    Upon opening the application, a list box will allow the users to select which
    valid change log file to use (and possibly update). The `else` portion of the
    statement will direct the program to `select_File_Process`, which will handle
    this request.


    ![../images/394210_2_En_7_Chapter/394210_2_En_7_Fig2_HTML.jpg](images/394210_2_En_7_Chapter/394210_2_En_7_Fig2_HTML.jpg)


    **Figure 7-2** The `readchangelog` file displaying the selected log and requesting
    the valid data file


    Once the user has selected a change file, the contents of the file will be displayed
    in the same manner as shown in Chapter [6](#394210_2_En_6_Chapter.xhtml). The
    `display_Process` method will provide this information. The user can decide to
    remove some entries in the change file selected. If deletions are needed, the
    `delete_Process` method will complete the process, using the same techniques shown
    in Chapter [6](#394210_2_En_6_Chapter.xhtml). In addition, the same method will
    allow the user to select the most recent valid data file to apply changes. Once
    the data file has been selected, `update_XML_File_Process` will apply the changes
    to the file using the `dogdata` program (in Example [7-3](#394210_2_En_7_Chapter.xhtml#PC26)).
    The process will display a changes completed message to the user.


    The `select_File_Process` method uses similar logic as found in the `getbreeds.php`
    program (in Example [5-5](#394210_2_En_5_Chapter.xhtml#PC7)).


    ```php

    function select_File_Process()

    {

    $directory = "";

    $files = glob($directory . "*change.log");

    echo "";

    echo "Select a file to display";

    echo "";

    foreach($files as $file)

    {

    echo "$file";

    }

    echo "";

    echo "";

    echo "";

    }

    ```


    The PHP `glob` method places all file names in a given directory (`$directory`)
    into an array (`$files`). Setting `$directory` to `""` indicates that the current
    directory will be searched. The second parameter provides the ability to filter
    the file types retrieved. `*change.log` directs the method to pull all files with
    the ending `change.log`. The `*` (asterisk) is a wildcard character that accepts
    any characters. This combination will pull all the change log files produced by
    the `dog_data` class. The remaining lines create an HTML drop-down list displaying
    the file names retrieved. A `submit` will cause the program to call itself again
    with the selected file residing in the `change_file` property.


    ```php

    function display_Process()

    {

    $change_Array = load_Array();

    $row_Count = count($change_Array) -1;

    displayRecords($row_Count, $change_Array, $_POST[''change_file'']);

    }

    ```


    `display_Process` is called when a change file has been selected. This method
    calls the `load_Array` method.


    ```php

    function load_Array()

    {

    $change_File = $_POST[''change_file''];

    $logFile = fopen($change_File, "r");

    $row_Count = 0;

    while(!feof($logFile))

    {

    $change_Array[$row_Count] = explode('' | '', fgets($logFile));

    $row_Count++;

    }

    $row_Count--;

    fclose($logFile);

    return $change_Array;

