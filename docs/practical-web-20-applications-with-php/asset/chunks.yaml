    the geocoder response for later use. Although we won’t be caching the entire response,
    we will be caching the latitude and longitude for each point in the database.


    **Browser Compatibility**


    Google Maps is compatible with all modern graphical browsers. Obviously since
    it is completely reliant on JavaScript, users must have JavaScript enabled in
    their browser. In case a user has a browser that does support JavaScript but doesn’t
    support Google Maps (perhaps it’s an older browser or a browser with an incomplete
    JavaScript implementation), the google.maps.BrowserIsCompatible() function is
    available to check whether the browser has the capabilities Google Maps requires.


    In addition to using google.maps.BrowserIsCompatible() to ensure Google Maps will
    work, we should also provide a non-JavaScript solution for users viewing blog
    posts that have location data. To handle this case, we will simply display a list
    of any saved locations that belong to a post (using microformats) rather than
    displaying a map.


    Because we have implemented similar solutions in previous chapters, I have chosen
    not to include a non-JavaScript implementation in this chapter for the management
    of blog post locations. However, I have included notes later about how to approach
    the issue.


