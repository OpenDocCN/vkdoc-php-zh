- "# 超越网页的 PHP\n\n## Shell 脚本、桌面软件、系统守护进程等等……无需学习新语言\n\n### 罗布·阿利\n\n本书在 [`leanpub.com/php`](http://leanpub.com/php)\
  \ 有售\n\n此版本发布于 2015-07-02\n\n![出版商标志](img/image00247.jpeg)\n\n* * * * *\n\n这是一本\
  \ [Leanpub](http://leanpub.com) 图书。Leanpub 采用精益出版流程为作者和出版商赋能。[精益出版](http://leanpub.com/manifesto)\
  \ 是指使用轻量级工具进行迭代，获取读者反馈，不断调整直至成书，并在过程中积累势头的电子书出版方式。\n\n* * * * *\n\n© 2012 - 2015\
  \ 罗布·阿利\n\n## 目录\n\n## 指南\n\n1. 开始阅读\n\n## 欢迎\n\n### 关于作者\n\n我从 2000 年底开始使用 PHP\
  \ 编程。最初这并非我的选择，因为我当时偏爱 Perl 和 Delphi（也称为 Object Pascal）这两种语言。1999 年我从利兹大学获得计算机科学学位后，成为一名自由网页开发者，情况开始发生变化。仅仅几个月后，我就有机会从一位朋友手中接手一份（相对而言）规模庞大的政府网站合同，这位朋友正离开自由职业界，去拥抱更安稳、更理性的全职工作。唯一的障碍是，已有数千行代码写好了，而且是用一种名为“PHP”的相对较新的语言编写的。哦，另一个障碍是，我只有大约一周的时间来学习它才能接手网站。于是，按照当时的方式，我跑到当地的\
  \ Waterstones 书店（对于年轻读者来说，那是个买书的地方。纸质书。而且我们得亲自出门去买。或者在线下单，等上几天才能收到。我提过它们是纸做的吗？）。我手里拿着纸质版的《傻瓜通用\
  \ PHP 与 MySQL 入门完全指南合集》（书名我可能没记全），坐下来，品着一品脱的啤酒（记住，我当时在约克郡），开始阅读。几天后，我就能像专业人士一样写代码了（好吧，代码能跑通），12\
  \ 年后的今天，我从未回头。在经历了多样的自由职业生涯，并创办了几家（IT 相关及不相关的）初创公司（成功程度不一，通常很惨淡）之后，我现在是牛津大学的一名全职程序员。我的日常工作涉及中等规模的数据采集与管理、统计分析，并为研究人员和公众提供用户界面。我的大部分开发工作都是用\
  \ PHP 完成的，要么开发新项目，要么整合他人的软件、系统和数据库。\n\n在我的整个职业生涯中，我一直使用 PHP 进行网页开发，但对于桌面 GUI 工作，我最初使用\
  \ Delphi（然后是 Free-Pascal/Lazarus），并用 bash shell 脚本补充处理其他任务。这主要是因为我在大学时学了这些语言。然而，随着\
  \ PHP 的成熟，我越来越多地在网页之外使用它，现在我几乎不再用其他语言来处理遇到的任何编程或脚本任务。由于在大学期间以及一些自由职业工作中，我不得已接触过其他语言，如\
  \ C++、Javascript、Fortran、Lisp（可能还有我大脑故意不想记住的其他语言），我可以诚实地说，PHP 现在是我的首选语言，而非不得不用。\n\
  \n当我不被电脑束缚时，我很想说我有许多丰富多彩的兴趣爱好。我以前确实有。我可以写一整本书（销量不会好）来讲述我的经历和见闻，并且我愿意相信这些经历让我成为一个全面发展的人。但如今，我没有那么多爱好了。这很大程度上是因为我三个可爱的小女儿艾莉、伊兹和英迪，我美丽的妻子帕尔芙，以及我更加美丽的猫咪米娅对我的需求。而且，我不希望有任何改变。至少，我是这么告诉自己的……\n\
  \n## 1. 引言\n\n如果你的电子阅读器（或手指直接翻过纸质书的扉页）直接把你带到了这一页，那么你（或许明智地）跳过了本书的“前部”，其中包含封面、目录、关于作者、致谢以及其他一些零碎内容。如果你对此感兴趣，请往回翻。否则，请继续阅读，开始你的\
  \ PHP 软件广阔世界之旅。\n\n\n### 1.1 “用 PHP？我们又不是在建网站，你知道吧！”\n\n无论是它目前递归式的名称（“PHP：PHP 超文本预处理器”），还是其创造者拉斯马斯·勒德尔夫最初赋予它的名字（“PHP：个人主页”），都强化了人们普遍认为\
  \ PHP 是一种 Web 脚本语言的看法。这种看法在 1995 年 PHP 首次被创建时以及之后的多年里，确实是正确的。在 Web 领域，PHP 表现出色：它易于使用、开发迅速、部署广泛、与\
  \ Web 技术栈紧密结合（它通常是 LAMP、WAMP、MAMP 等中的 `P`），当然，还因为它免费且开源。\n\n但许多人没有意识到（或者没注意到，或者选择不注意到）PHP\
  \ 已经进化并成熟了。它现在非常接近于一种现代的、通用的编程语言。这种认知上的缺失部分要归咎于 PHP 自身，因为它在一些基础功能上花了很长时间才完善，例如面向对象的语言结构，甚至是在没有\
  \ Web 服务器参与的情况下也能运行的能力。然而，编程社区也没有起到帮助作用；许多程序员难以看到 PHP 将其快速动态开发模型从 Web 带入更广泛计算环境的潜力，许多人只是固守着“面向初学者的\
  \ Web 脚本”这种教条，而这实际上只在其早期阶段才是真实的。\n\n特别是最近的几个版本，已经带来了主流的语言特性（例如，闭包、trait、更好的语言支持、命名空间和后期静态绑定等等）。性能不断提升，内存使用（旧版本的一个痛点）显著下降，PHP\
  \ 现在已成为更精简的流行脚本语言之一。为了满足更高的性能需求，PHP 现在内置了 Op-code 缓存，这对于经常使用的脚本非常有用，而 Facebook（全球最大的\
  \ PHP 用户）是正在发布带有 JIT 编译器的替代解释器/虚拟机（VM）的几个团队之一，这使得性能比标准 Zend 引擎最高可提升 6 倍。当然，PHP 核心语言的开发仍在快速进行中，5.6\
  \ 版本最近已发布，具有更好的性能、集成的调试器和众多语言增强功能，这表明有关 PHP 消亡的报道还为时过早！\n\n如果你是一位希望在 Web 领域之外拓展工作的\
  \ PHP Web 开发者，那么现在正是利用你现有技能，尝试在 PHP 中进行桌面和系统编程的最佳时机。如果你是一位正在考虑学习哪种语言的新手程序员，你可以学习到的技能将能应用于比许多其他类似语言更广泛的场景。\n\
  \n但是，为什么，到底为什么要用 PHP 来做这些呢？为什么不写个 Shell 脚本？为什么不学习 C++ 或其他通常用于软件项目的语言？事实是，这些都是可行的选择，你的人生可能也会因此一帆风顺。但是，为什么要放弃运用你现有技能的机会呢？为什么不使用\
  \ PHP 集成的数据库访问、重用来自你 Web 项目的现有代码和数据、利用 PHP 易于使用的网络库和函数、享受灵活的数据和文本处理、以及根据需要将 Shell\
  \ 命令和其他语言混入 PHP 中，从而两全其美呢？简而言之，为什么不用呢？\n\n本书旨在向您，PHP 程序员，展示如何在 Web 之外使用 PHP。我们将探讨构建桌面应用、命令行工具、系统守护进程、网络服务器和其他本地应用程序。重要的是，我会向你展示如何在不离开\
  \ PHP 及其友好生态这个舒适圈的情况下完成这一切。\n\n希望我已经让你相信，PHP 是一种跨平台、注重快速开发、功能多样的语言，非常适合许多不同类型的软件。但如果你仍然怀疑\
  \ PHP 交付真正非 Web 软件的能力，并且不想通读全书来了解其实现能力，那么请直接跳到书末的附录 D，那里有诸如 Web 服务器、数据库引擎、机器学习工具等完全用\
  \ PHP 编写的项目示例。如果这些都不能激励你用 PHP 创建自己的软件，那么可能没什么能了！\n\n| ![信息](img/image00248.jpeg)\
  \ | **延伸阅读** “PHP 比你想象的要好得多” - Fabien Pontencier 的文章，概述了 PHP 开发的优点并探讨了 PHP 生态系统的变化\
  \ [`fabien.potencier.org/article/64/php-is-much-better-than-you-think`](http://fabien.potencier.org/article/64/php-is-much-better-than-you-think)\
  \ |\n\n### 1.2 你是 PHP 新手吗？\n\n本书旨在向 PHP 开发者展示如何利用他们现有的技能来编写软件，而不是网页。但我知道有些读者可能是\
  \ PHP 新手，他们阅读本书是为了感受 PHP 的能力。如果你已经是一位程序员，尽管不精通 PHP，那么全面的官方 `PHP` 手册可能是了解 PHP 与你所习惯语言之间差异的最佳起点。\n\
  \n如果你还不是程序员，你喜爱的电子书零售商那里有大量“PHP 入门”书籍。无论哪种情况，更广泛的网络也提供了其通常广度和深度的知识和教程，只需通过谷歌审慎搜索即可找到。\n\
  \n最后，无论是新手还是经验丰富的程序员，如果你正在认真考虑使用 PHP，那么在全身心投入编码之前，先看看一些 PHP“最佳实践”网站可能是有价值的。从长远来看，这可能会为你省去很多麻烦。\n\
  \n| ![信息](img/image00248.jpeg) | **延伸阅读** 官方 `PHP` 手册 [`www.php.net/manual`](http://www.php.net/manual)\
