  trans: '

    # 上传函数会引入上传类，然后创建一个上传器实例（`$uploader` 对象），并传入保存图片信息的属性名。该属性名已在 HTML 上传表单中设置。永久文件存储位置（`imgs`）也会传入
    `saveIn` 方法并存储在对象中。接着调用 `$uploader` 的 `save` 函数，该函数会验证图片并检查文件夹（`imgs`）是否可写。如果文件成功移动，`$out`
    会被设置为“新文件已上传到图片库”。如果文件因验证失败或文件夹不可写而未能移动，则会将“文件上传到图片库时出现错误”的消息传递给 `$out`。`$out`
    被返回并赋值给 `$info`，从而在页面上显示。


    使用 `imageslistindex.php` 测试程序。该程序应允许上传任何不超过大小限制的 JPEG 文件。


    **练习**：可以在这些最终程序中添加哪些内容以使其更安全？逐个检查每个程序，并利用已掌握的知识提供更安全的程序。如何限制上传到最终目录的所有文件的总大小？添加代码以实现此限制。这也有助于降低成功发动
    DOS 攻击的可能性。此外，请访问 [`www.php.net`](http://www.php.net) 了解如何创建常量。常量一旦初始创建后便无法更改。修改程序，将任何在赋予初始值后不再变化的变量改为常量。常量确实为创建安全程序提供了另一种工具。


    这很酷吧？我们拥有一个完全动态的图片库，用户可以通过网站上传自己的图片。虽然这还算不上是 `flickr.com`，但我们希望您会认同，您已经开始真正使用
    PHP 来创造有趣且实用的东西了。


    ## 单一职责原则


    我们希望您能赞叹 `Uploader` 类定义的优雅之处。它的规划和编写聚焦于单一目标：上传文件。它所拥有的属性和方法仅用于完成这一任务。属性全部与要上传的文件相关，方法则全部与上传有效文件相关。


    *单一职责原则*是面向对象编程中的常用原则。该原则规定，一个类应为单一目的而编写。类的所有属性和方法都应直接与该单一目的相关。该类应仅有一个需要变更的理由。


    例如：`Uploader` 类只有一个变更的理由。如果你希望用它来上传不同的文件，它就会改变。单一职责原则是代码中一个值得追求的完美理念。这其实是“柯里定律”的再次体现，只是这次应用在了面向对象编程中。


    > **注意**

    >

    > 你可以在 [`http://en.wikipedia.org/wiki/Single_responsibility_principle`](http://en.wikipedia.org/wiki/Single_responsibility_principle)
    阅读更多关于单一职责原则的内容。


    ## 总结


    在本章中，我们了解了如何利用对象和对象方法创建一个动态图片库。我们还用属性和方法声明了一个自定义类定义。我们学习了几种类型的循环，并发现 `foreach`
    循环专门用于访问数组中的信息，尤其是我们可能不知道实际大小的数组。


    目前，我们已经编写了两个类定义：`Uploader` 和 `Page_Data`。我们才刚刚开始学习类和对象。在本书的后续章节中，我们将接触到更多类和对象。在未来的页面中，有大量的示例和解释等着你，所以请坚持下去。学习需要时间，而我们才刚刚开始。


    ## 项目


    1.  在网上探索关于使用 HTML 和 PHP 上传多个文件的示例。修改本章中的示例以实现同时上传多个文件。探索并使用 HTML 中用于限制上传大小的设置，使其与
    `php.ini` 文件中设置的大小相同。但是，请注意，黑客可以修改 HTML 并绕过此限制。为应对这种可能性，在 PHP 上传器类中添加代码，将多文件上传的大小限制为
    `php.ini` 中的值。同时，向 HTML 表单中添加代码，限制同时上传的文件数量为 `php.ini` 文件中设置的值。并在上传器类中添加 PHP 代码，同样限制要上传的文件数量。


    2.  添加 PHP 代码，在显示图片前确定 `imgs` 文件夹中的文件数量。仅显示数量达到 `php.ini` 文件中设置值的图片数。


    3.  在网上探索示例，通过要求在上传文件前输入用户 ID 和密码，将 HTML 上传表单的访问权限限制给特定用户。同样，需要预判到黑客可能尝试绕过此限制。在调用上传器程序之前，使用
    PHP 代码检查用户 ID 和密码。如果你想要挑战一下，我们如何对密码进行哈希处理，并在哈希后验证它？请访问 [`www.php.net`](http://www.php.net)
    了解保护密码的最新技术。


    4.  修改程序示例，使其上传文档（如 PDF）而非图片。不显示图片，而是显示指向文档的 HTML 链接。


    5.  复习 PHP 8 基本语法


    ## 目标


    完成本章后，你应能够：


    *   理解条件语句的用途和价值

    *   理解 `for`、`while` 和 `foreach` 循环的用途和价值

    *   理解函数的用途和价值

    *   理解数组的用途和价值


    既然我们已经成功创建了第一个可用的项目，让我们花点时间回顾一下 PHP 的基本语法。我们将复习一些已经介绍过的主题，并在本章中探索新的主题。在掌握了本章和前面章节的知识后，我们将准备探索数据库和其他外部文件的使用，并着手一个更大的项目：一个博客系统。花时间输入本章示例中的代码并对其进行修改，挑战自己，成为一名更好的程序员。你与代码打交道越多，就越能熟练掌握快速高效的代码开发。


    ### 从头开始


    如前所述，所有 PHP 代码都必须放在 `<?php` 和 `?>` 标记之间。Web 服务器首先查看文件扩展名（`.php`）以判断是否存在 PHP 代码。一旦确定存在，便使用标记来指示代码的位置。


    ```

    I love Green Tomatoes

    My partner hates Green Tomatoes

    ```


    如上所示，PHP 代码可以通过简单地使用起始和结束标记分散到文件（网页）的不同区域。但是，每次这样做都需要将代码发送给 PHP 解释器进行处理。所以，不要过度沉迷于此。你需要的是易于阅读和理解的代码。当代码流程易于理解时，你创建逻辑错误的机会也会减少。


    ### 注释


    可以使用 `//` 或 `/*` 创建注释。请记住，注释不会被执行。但它们非常重要。优秀的程序员会提供注释，以便其他人能理解任何复杂的代码。程序只有一个人维护的时代已经过去了。任何支持你创建的代码的人，都会非常感激你在提供注释方面所做的努力。

