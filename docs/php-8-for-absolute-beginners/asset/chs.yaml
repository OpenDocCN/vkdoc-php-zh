  \n## 程序设计逻辑\n\n程序应该允许用户在选择列表中改变主意，尤其是在测验中！通过要求用户在做出决定后点击提交按钮，用户可以在提交答案之前再次检查他们的选择。否则，程序只会采用他们的第一选择。\n\
