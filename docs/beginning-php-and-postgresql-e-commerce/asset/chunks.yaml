    first letter in every word except the first one), such as $someEnemy, $someOtherEnemy.


    • Variable names should be written in lowercase, with an underscore as the word
    separator, such as $master_of_war.


    • Database objects use the same conventions as variable names (the department_id
    column).


    • Try to indent your code using a fixed number of spaces (say, four) for each
    level.


    (The code in this book uses two spaces because of physical space limitations.)
    Among the decisions that need to be made is whether to use quotes for strings.
    JavaScript, HTML, and PHP allow using both single quotes and double quotes. For
    the code in this book, we’ll use double quotes in HTML and JavaScript code, and
    we’ll use single quotes in PHP.


    Although for JavaScript it’s a matter of taste (you can use single quotes, as
    long as you use them consistently), in PHP, the single quotes are processed faster,
    they are more secure, and they are less likely to cause programming errors. Learn
