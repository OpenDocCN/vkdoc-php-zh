  trans: "```php\nprint \"Dog weight is $this->dog_weight. Dog breed is $this->dog_breed.\n\
    Dog color is $this->dog_color.\";\n```\n\nPHP 允许我们将属性放入字符串（引号）中。这样可以减少句点和引号的使用（或许也能减少你抓耳挠腮的次数）。关于\
    \ `$this` 指针的示例，请访问 [`php.net/manual/en/language.oop5.basic.php`](http://php.net/manual/en/language.oop5.basic.php)。\n\
    \n现在我们已经有了生成输出所需的代码，需要在类中添加一个方法来执行 `print` 行。类中发生的所有\"动作\"都必须包含在**方法**中。方法的创建风格与类类似（只是它们实际上包含在类内部）。方法使用关键字\
    \ `function` 后跟方法名和 `()` 来声明。通常方法名使用小写字母，但 PHP 也接受大写字母。下划线（`_`）也可以放在方法名的开头或内部。方法内的所有代码都包含在\
    \ `{}` 中。\n\n- **程序设计建议**——如示例 4-4 所示，注意正确使用开闭括号（`{` 和 `}`）变得更加重要。每个开括号都必须有一个闭括号。编辑器（在第\
    \ 1 章中讨论过）可以通过颜色编码帮助你更轻松地查看所有括号。此外，缩进（如示例 4-4 所示）有助于在视觉上对齐括号。PHP 引擎会忽略多余的空格（称为**空白**）。因此，程序员可以让代码在视觉上更美观且更容易调试。\n\
    \n```php\ndog_weight. Dog breed is\n$this->dog_breed. Dog color is $this->dog_color.\"\
    ;\n}\n}\n?>\nExample 4-4\nBasic class structure with properties and a method in\
    \ dog.php file\n```\n\n这个类现在能够执行一个动作（通过 `display_properties` 方法）。所以，我们终于可以测试其功能了。为此，示例\
    \ 4-4 中的代码必须放在 `dog.php` 文件中（与类名相同），并且位于将使用它的程序所在的同一位置。\n\n现在我们需要创建一个程序，通过 `require_once`\
    \ 语句引入这个代码库。然后，程序需要创建类（`Dog`）的一个实例。最后，程序需要调用方法（`display_properties`）来显示属性的内容。\n\
    \n- **程序设计建议**——PHP 允许在程序代码中的任何位置使用 `include`、`include_once`、`require` 和 `require_once`\
    \ 语句。如果在错误的位置使用或多次使用，可能会导致潜在问题。强烈建议将这些语句集中放在代码尽可能靠前的位置，以便于检查库是否已安装。在 PHP 8 中，我们可以将这些文件预加载到服务器的内存中。我们将在后续章节中演示这一功能。\n\
    \n- **安全性与可靠性**——PHP 有多种方法可将库引入 PHP 程序。`include` 方法会尝试引入一个库。但是，如果库不存在，程序会继续运行（或显示警告）。`include`\
    \ 方法也不关心该库是否已附加到代码中。大型程序可能会意外地多次尝试引入同一个库（由于重复的方法和/或类名，这会在程序中抛出异常）。`include_once`\
    \ 方法消除了多次尝试引入同一个库的可能性。如果库已被包含，则该语句不会执行。`require` 方法不允许在找不到库时继续运行程序。但与 `include`\
    \ 方法一样，它也可能多次尝试引入同一个库。`require_once` 方法通过仅在库尚未安装时引入它，解决了这些潜在问题。\n\n我们在前一章简要介绍了\
    \ `require` 语句。但在这里回顾其用法是值得的，因为我们将在本书的剩余部分中使用它。`require_once` 语句的格式很简单。关键字 `require_once`\
    \ 后跟库名（`dog.php`）。该语句应放在代码的开头附近，并且在实际创建类（`Dog`）的实例之前。\n\n```php\nrequire_once(\"\
    dog.php\");\n```\n\n*你可以在 `require_once` 语句中包含路径名。但建议不要使用绝对路径。更多信息，请访问 [www.php.net/manual/en/function.require-once.php](http://www.php.net/manual/en/function.require-once.php)。*\n\
    \n要创建类的实例，需要创建一个属性，该属性\"指向\"内存中的类实例。使用 `new` 关键字来告知操作系统应在内存中创建该类的一个实例（并且构造函数方法应执行，稍后会提到）。实际的类名用于确定要构建成对象的类。\n\
    \n```php\n$lab = new Dog;\n```\n\n这段代码会创建 `Dog` 类的一个实例，并用 `$lab` 属性（指针）来引用它。每个类实例都会创建各个属性的实际独立副本（`$dog_size`、`$dog_breed`、`$dog_color`\
    \ 和 `$dog_name`）。这允许你更改该实例（`$lab`）的属性值，而不会影响其他实例的属性。\n\n```php\n$lab->display_properties();\n\
    ```\n\n一旦创建了实例，你就可以通过对象名（`$lab`）和方法名（`display_properties`）来访问任何方法。\n\n```php\n\
    display_properties();\n?>\nExample 4-5\nBasic program structure including a library,\
    \ object, and method call in lab.php\n```\n\n**注意**  \n我们目前假设 `dog.php` 文件存在。但是，如果这段代码用于生产环境，我们需要处理文件可能丢失的情况。我们将在后面的示例中使用第\
    \ 3 章讨论的 `try/catch` 方法来捕获任何问题。\n\n图 4-1 展示了 `lab.php` 程序的成功输出，该程序包含了 `dog.php`\
    \ 文件中的 `Dog` 类。\n\n![../images/394210_2_En_4_Chapter/394210_2_En_4_Fig1_HTML.jpg](img/394210_2_En_4_Fig1_HTML.jpg)\n\
    \n**图 4-1**  \nlab.php 的输出\n\n*关于创建对象（类的实例）的更多示例，请访问 [www.php.net/manual/en/language.oop5.basic.php](http://www.php.net/manual/en/language.oop5.basic.php)。*\n\
    \n**动手实践**"
- fmt: "1.  Add a `speak` method to the `Dog` class to give each instance the ability\
    \ to “bark”. Hint: Include a `print` (or `echo`) statement in your method. Add\
    \ a call to your `speak` method after the call to the `display_properties` method\
    \ in the `lab.php` file.\n\n2.  Create a second object from the `Dog` class in\
    \ the `lab.php` file called `$chow`. Call the `speak` method (#1) to make him\
    \ “bark”.\n\n3.  Create a new library file that contains a class of another animal\
    \ of your choice. Within that class, create four properties that provide characteristics\
    \ of that animal. Include a method that will print each of these characteristics.\
    \ Also include a method that will cause the animal to speak. Create another file\
    \ that will use this library file to create an instance of the class. The program\
    \ should also call the method to display the properties and the method to cause\
    \ the animal to speak.\n\n**Program errors**—If you encountered errors when trying\
    \ this example, check the following:\n\n1.  Did you name the class (`Dog`) and\
    \ the file name (`dog.php`) the same? Make sure the file ending is `.php` and\
    \ not `.txt` for both the `dog.php` and `lab.php` files.\n\n2.  In the `require_once`\
    \ statement in the `lab.php` file, is the file name exactly the same as the `dog.php`\
    \ file?\n\n3.  Are the `dog.php` and `lab.php` files in the same folder?\n\n4.\
    \  Did you include the same amount of opening (`{`) and closing (`}`) brackets\
    \ in both programs?\n\n5.  Did you forget any semicolons (`;`)？\n\n6.  For each\
    \ `$this` statement, make sure the `$` is part of `this` and not of the property\
    \ (`$this->dog_weight`).\n\n7.  For any other errors, copy and paste your error\
    \ into a search engine to find possible solutions. Remember, the error may be\
    \ in either the Apache or PHP error logs (see Chapter [1](#394210_2_En_1_Chapter.xhtml)\
    \ for details).\n\n## Return Method\n\nIn Chapter [2](#394210_2_En_2_Chapter.xhtml),\
    \ the business rules tier was defined to contain modules of code that return information\
    \ requested, but do not provide an interface or format for displaying the data\
    \ returned. In the previous example, the `Dog` class violates this requirement.\
    \ However, we can fix this problem with just a few code changes to the `dog.php`\
    \ and `lab.php` files.\n\nThe `print` statement in the `Dog` class should be replaced.\
    \ However, we will want to pass multiple values (`dog_weight`, `dog_color`, `dog_breed`,\
    \ and `dog_name`) back to the program that has called it. There are many ways\
    \ that we can accomplish this task. However, since you are just starting programming,\
    \ let us keep it simple. We can create a comma-delimitated string easily by reformatting\
    \ the original string. We can now replace the `print` statement with\n\n```\n\
    return \"$this->dog_weight, $this->dog_breed, $this->dog_color.\";\n```\n\nAs\
    \ shown in Chapter [3](#394210_2_En_3_Chapter.xhtml), we have restricted the data\
    \ type of the information returned from the method to string by adding `: string`\
    \ to the method signature line. The new `Dog` class would now contain what is\
    \ shown in Example [4-6](#394210_2_En_4_Chapter.xhtml#PC14).\n\n```\ndog_weight,$this->dog_breed,$this->dog_color.\"\
    ;\n}\n}\n?>\nExample 4-6\nBasic Dog class with return statement—dog.php\n```\n\
    \nWe now need to adjust the `lab.php` file to be able to accept what has been\
    \ passed back from the `get_properties` method (`display_properties` is renamed\
    \ `get_properties` to reflect that it no longer displays the properties; it now\
    \ returns them). We can accomplish this by creating a property in the `lab.php`\
    \ file to receive what has been passed back from the `get_properties` method.\n\
    \n```\nstring $dog_properties = $lab->get_properties();\n```\n\n> **Note:** While\
    \ we are confident that only a string was returned from the method `get_properties`,\
    \ because we restricted the data type, we are locking down any potential data\
    \ leak by also declaring `$dog_properties` with the same data type. We must remember\
    \ that the external file could somehow be changed without our knowledge. Defensive\
    \ programming should always be used.\n\nIf we were to use the `print` function\
    \ to display `$dog_properties` at this point, we would display:\n\n```\nno weight,\
    \ no breed, no color\n```\n\nHowever, we intended to produce a similar result\
    \ as was shown previously. We can do this, but we need to be able to break the\
    \ string into three pieces based on the “,” delimiter. Luckily, there are PHP\
    \ methods available that can easily accomplish this task. The `explode` method\
    \ will break a string based on a delimiter. The substrings (pieces of the string)\
    \ can then be dropped into individual properties using a `list` object. For our\
    \ needs, we can split the `$dog_properties` string as follows:\n\n```\nlist($dog_weight,\
    \ $dog_breed, $dog_color) = explode(',', $dog_properties);\n```\n\nFor more information\
    \ on the `explode` function, visit [www.php.net/manual/en/function.explode.php](http://www.php.net/manual/en/function.explode.php).\
    \ This will drop `0` into `$dog_weight`, `no breed` into `$dog_breed`, and `no\
    \ color` into `$dog_color`. These three properties are also being created inside\
    \ the `lab.php` program in this same line of code. I happen to give them the same\
    \ names as their counterparts in the `Dog` class. However, remember if we had\
    \ not created the `Dog` class, we would not know the original property names.\
    \ It would not matter, because we can call them anything we want and accomplish\
    \ the same task.\n\nNow that we have the variables containing the information,\
    \ we can re-create the original `print` statement in the `lab.php` program instead\
    \ of in the `dog.php` library.\n\n```\nprint \"Dog weight is $dog_weight. Dog\
    \ breed is $dog_breed. Dog color is $dog_color.\";\n```\n\nNotice that we did\
    \ *not* include the `$this` pointer. We are not executing this statement within\
    \ a class. We do not create instances of the `lab.php` program. There is only\
    \ one instance of the program (because it is not a class and cannot have multiple\
    \ instances). So, the `$this` pointer is unnecessary.\n\nThe new `lab.php` program\
    \ would now look like Example [4-7](#394210_2_En_4_Chapter.xhtml#PC19).\n\n```\n\
    get_properties();\nlist($dog_weight, $dog_breed, $dog_color) = explode(',', $dog_properties);\n\
    print \"Dog weight is $dog_weight. Dog breed is $dog_breed.\nDog color is $dog_color.\"\
    ;\n?>\nExample 4-7\nThe lab.php program with print statement\n```\n\nAssuming\
    \ there are no errors in our program, the output will be the same as Figure [4-1](#394210_2_En_4_Chapter.xhtml#Fig1),\
    \ unchanged from the previous version of the program. However, the `Dog` class\
    \ now meets one of the standards of the business rules tier by returning information\
    \ to the program that calls it without attempting to format the output. The `lab.php`\
    \ program now handles formatting the output.\n\n## Do It\n\n1.  Adjust the `speak`\
    \ method in the `dog.php` file to return the `bark` string but not `print` it.\
    \ Also adjust the call to the method in the `lab.php` file to display the output\
    \ of the string. You can accept the string from the method and `print` the string\
    \ in one line of code using syntax similar to the following:\n    \n    ```\n\
    \    print $lab->speak();\n    ```\n\n2.  Adjust the `$chow` object in the `lab.php`\
    \ file to properly handle the return of the properties string and the `speak`\
    \ string.\n\n3.  Adjust the `animal` class to return any strings instead of printing\
    \ them. Adjust the program that makes an instance of the `animal` class to accept\
    \ and display the strings that are returned.\n\n## Set Methods"
  raw: "1.  Add a `speak`\n    method to the `Dog` class to give\n    each instance\
    \ the ability to “bark”. Hint: Include a `print` (or `echo`) statement in\n  \
    \  your method. Add a call to your `speak` method after\n    the call to the `display_properties`\n\
    \    method  in the\n    `lab.php`\n    file.\n\n2.  Create a second object from\
    \ the `Dog` class in the\n    `lab.php` file\n    called `$chow`.\n    Call the\
    \ `speak`\n    method (#1) to make him “bark”.\n\n3.  Create a new library file\
    \ that contains a class of another animal of\n    your choice. Within that class,\
    \ create four properties that provide\n    characteristics of that animal. Include\
    \ a method that will print each of\n    these characteristics. Also include a\
    \ method that will cause the animal\n    to speak. Create another file that will\
    \ use this library file to create\n    an instance of the class. The program should\
    \ also call the method to\n    display the properties and the method to cause\
    \ the animal to speak.\n\n*Program errors—If you encountered errors when trying\
    \ this example,\ncheck the following*\n*:*\n\n1.  *Did you name the class (Dog)\
    \ and the file name (dog.php) the\n    same? Make sure the file ending is* *.php*\
    \ *and not*\n    *.txt* *for both the* *dog.php* *and*\n    *lab.php* *files.*\n\
    \n2.  *In the* *require_once* *statement in the*\n    *lab.php* *file, is the\
    \ file name exactly the same as the*\n    *dog.php* *file?*\n\n3.  *Are the* *dog.php*\
    \ *and* *lab.php*\n    *files in the same folder?*\n\n4.  *Did you include the\
    \ same amount of opening ({) and closing (})\n    brackets in both programs?*\n\
    \n5.  *Did you forget any semicolons (;)?*\n\n6.  *For each* *$this statement,\
    \ make sure the* *$*\n    *is part of* *this* *and not of the property\n    ($this->dog_weight).*\n\
    \n7.  *For any other errors, copy and paste your error into a search\n    engine\
    \ to find possible solutions. Remember, the error may be in either\n    the Apache\
    \ or PHP error logs (see Chapter* [*1*](#394210_2_En_1_Chapter.xhtml) *for\n \
    \   details).*\n\nReturn Method\nIn Chapter [2](#394210_2_En_2_Chapter.xhtml),\
    \ the business rules tier was\ndefined to contain modules of code that return\
    \ information requested,\nbut do not provide an interface or format for displaying\
    \ the data\nreturned. In the previous example, the `Dog` class violates\nthis\
    \ requirement. However, we can fix this problem with just a few code\nchanges\
    \ to the `dog.php` and `lab.php` files.\n\nThe `print`\nstatement  in the\n`Dog`\
    \ class\nshould be replaced. However, we will want to pass multiple values (`dog_weight`,\
    \ `dog_color`, `dog_breed`, and `dog_name`) back to the\nprogram that has called\
    \ it. There are many ways that we can accomplish\nthis task. However, since you\
    \ are just starting programming, let us keep\nit simple. We can create a comma-delimitated\
    \ string easily by\nreformatting the original string. We can now replace the `print`\
    \ statement with\n\n```\nreturn \"$this->dog_weight, $this->dog_breed, $this->dog_color.\"\
    ;\n```\n\nAs shown in Chapter [3](#394210_2_En_3_Chapter.xhtml), we have restricted\
    \ the data type\nof the information returned from the method to string by adding\
    \ : string\nto the method signature line. The new `Dog` class would now\ncontain\
    \ what is shown in Example [4-6](#394210_2_En_4_Chapter.xhtml#PC14).\n\n```\n\
    dog_weight,$this->dog_breed,$this->dog_color.\";\n}\n}\n?>\nExample 4-6\nBasic\
    \ Dog class with return statement—dog.php\n```\n\nWe now need to adjust the `lab.php`\
    \ file to be\nable to accept what has been passed back from the `get_properties`\
    \ method\n(`display_properties`  is renamed `get_properties` to\nreflect that\
    \ it no longer displays the properties; it now returns them).\nWe can accomplish\
    \ this by creating a property in the `lab.php` file to\nreceive what has been\
    \ passed back from the `get_properties`\nmethod.\n\n```\nstring $dog_properties\
    \ = $lab->get_properties();\n```\n\nNote\n\nWhile we are confident that only a\
    \ string was returned from the\nmethod get_properties, because we restricted the\
    \ data type, we are\nlocking down any potential data leak by also declaring $dog_properties\n\
    with the same data type. We must remember that the external file could\nsomehow\
    \ be changed without our knowledge. Defensive programming should\nalways be used.\n\
    \nIf we were to use the `print` function to\ndisplay `$dog_properties` at\nthis\
    \ point, we would display:\n\n```\nno weight, no breed, no color\n```\n\nHowever,\
    \ we intended to produce a similar result as was shown\npreviously. We can do\
    \ this, but we need to be able to break the string\ninto three pieces based on\
    \ the “,” delimiter. Luckily, there are PHP\nmethods available that can easily\
    \ accomplish this task. The\n**explode** method will break a string based on a\n\
    delimiter. The **substrings** (pieces of the string) can\nthen be dropped into\
    \ individual properties using a **list**\nobject. For our needs, we can split\
    \ the `$dog_properties`\nstring as follows:\n\n```\nlist($dog_weight, $dog_breed,\
    \ $dog_color) = explode(',', $dog_properties);\n```\n\n*For more information on\
    \ the* *explode* *function,\nvisit* [*www.php.net/manual/en/function.explode.php*](http://www.php.net/manual/en/function.explode.php)*.*\n\
    This will drop 0 into `$dog_weight`, `no breed` into `$dog_breed`, and `no color`\
    \ into `$dog_color`. These\nthree properties are also being created inside the\
    \ `lab.php`  program in this same\nline of code. I happen to give them the same\
    \ names as their counterparts\nin the `Dog`\nclass. However, remember if we had\
    \ not created the `Dog` class, we would\nnot know the original property names.\
    \ It would not matter, because we\ncan call them anything we want and accomplish\
    \ the same task.\n\nNow that we have the variables containing the information,\
    \ we can\nre-create the original `print` statement in\nthe `lab.php`\nprogram\
    \ instead of in the `dog.php` library.\n\n```\nprint \"Dog weight is $dog_weight.\
    \ Dog breed is $dog_breed. Dog color is $dog_color.\";\n```\n\nNotice that we\
    \ did *not* include the `$this` pointer. We are\nnot executing this statement\
    \ within a class. We do not create instances\nof the `lab.php`\nprogram. There\
    \ is only one instance of the program (because it is not a\nclass and cannot have\
    \ multiple instances). So, the `$this` pointer is\nunnecessary.\n\nThe new `lab.php`\n\
    program would now look like Example [4-7](#394210_2_En_4_Chapter.xhtml#PC19).\n\
    \n```\nget_properties();\nlist($dog_weight, $dog_breed, $dog_color) = explode(',',\
    \ $dog_properties);\nprint \"Dog weight is $dog_weight. Dog breed is $dog_breed.\n\
    Dog color is $dog_color.\";\n?>\nExample 4-7\nThe lab.php program with print statement\n\
    ```\n\nAssuming there are no errors in our program, the output will be the\nsame\
    \ as Figure [4-1](#394210_2_En_4_Chapter.xhtml#Fig1), unchanged from\nthe previous\
    \ version of the program. However, the `Dog` class now meets\none of the standards\
    \ of the business rules tier by returning information\nto the program that calls\
    \ it without attempting to format the output.\nThe lab.php program now handles\
    \ formatting the output.\n\nDo It\n\n1.  Adjust the `speak` method  in the `dog.php`\
    \ file to\n    return the `bark`\n    string but not `print` it. Also adjust\n\
    \    the call to the method in the `lab.php` file to\n    display the output of\
    \ the string. You can accept the string from the\n    method and `print` the string\
    \ in\n    one line of code using syntax similar to the following:\n\n1.  Adjust\
    \ the `$chow` object in the\n    `lab.php` file to\n    properly handle the return\
    \ of the properties string and the `speak` string.\n\n2.  Adjust the `animal`\
    \ class to\n    return any strings instead of printing them. Adjust the program\
    \ that\n    makes an instance of the `animal` class to\n    accept and display\
    \ the strings that are returned.\n\n```\nprint $lab->speak();\n```\n\nSet Methods"
  trans: "\n1.  向 `Dog` 类添加一个 `speak` 方法，使每个实例都能“汪汪叫”。提示：在方法中包含一个 `print`（或 `echo`）语句。在\
    \ `lab.php` 文件的 `display_properties` 方法调用之后，添加对你的 `speak` 方法的调用。\n\n2.  在 `lab.php`\
    \ 文件中，从 `Dog` 类创建第二个对象，命名为 `$chow`。调用 `speak` 方法（#1）让它“汪汪叫”。\n\n3.  创建一个新的库文件，其中包含你选择的另一种动物的类。在该类中，创建四个属性来描述该动物的特征。包含一个方法，用于打印这些特征中的每一个。同时还要包含一个方法，能让该动物发出叫声。创建另一个文件，使用这个库文件来创建该类的一个实例。该程序还应调用显示属性的方法以及让动物发出叫声的方法。\n\
    \n**程序错误**——如果在尝试此示例时遇到错误，请检查以下几点：\n\n1.  你是否将类名（`Dog`）和文件名（`dog.php`）命名一致？请确保\
    \ `dog.php` 和 `lab.php` 文件的结尾都是 `.php` 而非 `.txt`。\n\n2.  在 `lab.php` 文件的 `require_once`\
    \ 语句中，文件名是否与 `dog.php` 文件完全一致？\n\n3.  `dog.php` 和 `lab.php` 文件是否在同一个文件夹中？\n\n\
    4.  在两个程序中，你是否包含了相同数量的左花括号（`{`）和右花括号（`}`）？\n\n5.  你是否遗漏了任何分号（`;`）？\n\n6.  对于每条\
    \ `$this` 语句，确保 `$` 是 `this` 的一部分，而不是属性的一部分（`$this->dog_weight`）。\n\n7.  对于其他任何错误，请将你的错误信息复制并粘贴到搜索引擎中，查找可能的解决方案。请记住，错误可能出现在\
    \ Apache 或 PHP 的错误日志中（详见第 1 章）。\n\n## 返回方法\n\n在第 2 章中，业务规则层被定义为包含返回请求信息的代码模块，但不提供显示返回数据的界面或格式。在前面的例子中，`Dog`\
    \ 类违反了这一要求。不过，我们只需对 `dog.php` 和 `lab.php` 文件稍作修改，就能解决这个问题。\n\n`Dog` 类中的 `print`\
    \ 语句应被替换。但是，我们需要将多个值（`dog_weight`、`dog_color`、`dog_breed` 和 `dog_name`）传回调用它的程序。完成这个任务有多种方法。不过，由于你刚开始学习编程，我们采用简单的方法。我们可以通过重新格式化原始字符串，轻松地创建一个用逗号分隔的字符串。现在，我们可以用以下内容替换\
    \ `print` 语句：\n\n```\nreturn \"$this->dog_weight, $this->dog_breed, $this->dog_color.\"\
    ;\n```\n\n如第 3 章所示，我们通过在方法签名行添加 `: string`，将方法返回的信息的数据类型限制为字符串。新的 `Dog` 类将包含如示例\
    \ 4-6 所示的内容。\n\n```\ndog_weight,$this->dog_breed,$this->dog_color.\";\n}\n}\n\
    ?>\n示例 4-6\n包含返回语句的基础 Dog 类——dog.php\n```\n\n现在我们需要调整 `lab.php` 文件，使其能够接收 `get_properties`\
    \ 方法传回的内容（`display_properties` 更名为 `get_properties`，以反映它不再显示属性，而是返回属性）。我们可以在 `lab.php`\
    \ 文件中创建一个属性来接收 `get_properties` 方法传回的内容来实现这一点。\n\n```\nstring $dog_properties\
    \ = $lab->get_properties();\n```\n\n> **注意：** 尽管我们确信 `get_properties` 方法只返回了一个字符串，因为我们限制了其数据类型，但我们还通过将\
    \ `$dog_properties` 声明为相同的数据类型来锁定任何潜在的数据泄漏。我们必须记住，外部文件可能会在我们不知情的情况下被更改。应始终采用防御性编程。\n\
    \n此时，如果我们使用 `print` 函数来显示 `$dog_properties`，我们将看到：\n\n```\nno weight, no breed,\
    \ no color\n```\n\n然而，我们本打算产生与之前类似的结果。我们可以做到这一点，但需要能够根据逗号“,”分隔符将字符串分成三部分。幸运的是，PHP\
    \ 提供了可以轻松完成此任务的方法。`explode` 方法可以根据分隔符拆分字符串。然后，可以使用 `list` 对象将子字符串（字符串片段）放入各个属性中。根据我们的需求，我们可以像下面这样拆分\
    \ `$dog_properties` 字符串：\n\n```\nlist($dog_weight, $dog_breed, $dog_color) = explode(',',\
    \ $dog_properties);\n```\n\n关于 `explode` 函数的更多信息，请访问 [www.php.net/manual/en/function.explode.php](http://www.php.net/manual/en/function.explode.php)。这段代码会将\
    \ `0` 放入 `$dog_weight`，将 `no breed` 放入 `$dog_breed`，将 `no color` 放入 `$dog_color`。这三个属性也在这同一行代码中于\
    \ `lab.php` 程序内部被创建。我碰巧给它们取了与 `Dog` 类中对应属性相同的名字。但是，请记住，如果我们没有创建过 `Dog` 类，我们不会知道原始的属性名称。不过这没关系，因为我们可以随意给它们命名，并且完成相同的任务。\n\
    \n现在，我们已经有了包含信息的变量，我们可以在 `lab.php` 程序中重新创建原始的 `print` 语句，而不是在 `dog.php` 库中。\n\n\
    ```\nprint \"Dog weight is $dog_weight. Dog breed is $dog_breed. Dog color is\
    \ $dog_color.\";\n```\n\n请注意，我们*没有*包含 `$this` 指针。我们并不是在类中执行这个语句。我们也不创建 `lab.php`\
    \ 程序的实例。该程序只有一个实例（因为它不是一个类，不能有多个实例）。因此，`$this` 指针是多余的。\n\n新的 `lab.php` 程序现在看起来会像示例\
    \ 4-7 这样。\n\n```\nget_properties();\nlist($dog_weight, $dog_breed, $dog_color)\
    \ = explode(',', $dog_properties);\nprint \"Dog weight is $dog_weight. Dog breed\
    \ is $dog_breed.\nDog color is $dog_color.\";\n?>\n示例 4-7\n包含 print 语句的 lab.php\
    \ 程序\n```\n\n假设我们的程序没有错误，输出将与图 4-1 相同，与程序的先前版本相比没有变化。然而，`Dog` 类现在通过将信息返回给调用它的程序，并且不试图格式化输出，从而满足了业务规则层的其中一个标准。现在由\
    \ `lab.php` 程序负责处理输出的格式化。\n\n## 动手实践\n\n1.  调整 `dog.php` 文件中的 `speak` 方法，使其返回\
    \ `bark` 字符串，而不是`打印`它。同时调整 `lab.php` 文件中对该方法的调用，以显示该字符串的输出。你可以使用类似于下面的语法，在一行代码中从该方法接收字符串并`打印`该字符串：\n\
    \    \n    ```\n    print $lab->speak();\n    ```\n\n2.  调整 `lab.php` 文件中的 `$chow`\
    \ 对象，使其能正确处理属性字符串和 `speak` 字符串的返回。\n\n3.  调整 `animal` 类，使其返回任何字符串，而不是打印它们。调整创建\
    \ `animal` 类实例的程序，使其能够接收并显示返回的字符串。\n\n## 设置方法\n"
- fmt: 'This example is still very limited because we cannot currently adjust the
    values in the properties to relate to the actual objects we created (such as `$lab`).
    In order to adjust these properties, we must have some ability to access the properties
    from the program that uses the object (`lab.php`). However, because of encapsulation
    and security concerns, we do not want to expose the properties to be directly
    manipulated by the calling program. Object-oriented programming standards require
    that we create properties as “private” (as we have done already) and then use
    actual methods in the class to change any values.


    - **Security and reliability**—Creating `set` methods in classes provides the
    ability for the class to verify that the information that is to be placed in a
    property is valid before the property is updated. Validation includes not only
    data types but also valid ranges, such as 1 to 140 for a person’s age. If this
    verification is not done before changing the value in a property, corruption of
    data could take place. After the fact, it may be impossible or very difficult
    to correct invalid data that has been accepted. `Set` methods can reject invalid
    data and return error messages to the calling program or raise exceptions.


    A `set` method allows values to be passed into the method. These values can then
    be verified before updating the properties in the object. Parameters (values)
    are passed into a method between the parentheses `()` in the method call.


    ```

    $dog_error_message = $lab->set_dog_name(''Fred'');

    ```


    If the `set_dog_name` method exists within the `Dog` class and accepts a string
    representing the name of the dog, you could use a method call similar to the previous
    code. This call would pass the string `"Fred"` into the `set_dog_name` method.
    It also provides the ability for the `set` method to return a value into the property
    `$dog_error_message` to indicate if the property was updated properly. You can
    simply pass a `''true''` or `''false''` Boolean value back from the method to
    indicate the status of the update. The calling program then can determine how
    to handle the status of the update.


    If you simply pass back a `''true''` or `''false''` Boolean value, you can use
    a simplified version of the PHP conditional statement, called the *ternary operator*
    to check `$dog_error_message`.


    ```

    print $dog_error_message ? ''Name update successful'' :

    ''Name update not successful'';

    ```


    *For more information on the* *ternary conditional operator* *, visit* [*www.php.net/manual/en/language.operators.comparison.php*](http://www.php.net/manual/en/language.operators.comparison.php)*.*


    - **Security and performance**—Use caution when displaying error messages to actual
    live users of your applications. You can provide too much information and expose
    your program code unnecessarily. Displaying a generic error message, such as “system
    not currently available”, to the user may be a safer option. In live applications,
    log files should be created to record errors and access to the application itself.


    With this format, the calling program (`lab.php`) can easily determine the status
    of the update and display a corresponding message. The message between the `?`
    and the `:` (“`Name update successful`”) will display if the string in `$dog_error_message`
    is `''true''`. If the value in `$dog_error_message` is `''false''`, the string
    between the `:` and the `;` (“`Name update not successful`”) will display.


    Note


    When a comparison is structured that does not include a comparison operator (==,
    <=, >=, ...) and a value to compare, PHP will assume that it is a Boolean (true/false)
    comparison. Thus, we did not need to include code to actually check for ''true''
    or ''false''. However, we could have included it, as shown in the following.


    ```

    set_dog_name(''Fred'');

    print $dog_error_message ? ''Name update successful'' :

    ''Name update not successful'';

    bool $dog_error_message = $lab->set_dog_weight(50);

    print $dog_error_message ? ''Weight update successful'' :

    ''Weight update not successful'';

    bool $dog_error_message = $lab->set_dog_breed(''Lab'');

    print $dog_error_message ? ''Breed update successful'' :

    ''Breed update not successful'';

    bool $dog_error_message = $lab->set_dog_color(''Yellow'');

    print $dog_error_message ? ''Color update successful'' :

    ''Color update not successful'';

    //-----------------------------Get Properties---------------------------

    $dog_properties = $lab->get_properties();

    list($dog_weight, $dog_breed, $dog_color) = explode('','', $dog_properties);

    print "Dog weight is $dog_weight. Dog breed is $dog_breed.

    Dog color is $dog_color.";

    ?>

    Example 4-8

    The lab.php file with set methods and error checking

    ```


    ```

    print $dog_error_message == TRUE ? ''Name update successful'' :

    ''Name update not successful'';

    ```


    In Example [4-8](#394210_2_En_4_Chapter.xhtml#PC24), `lab.php` now has the ability
    to pass information into the properties in the `$lab` object of the `Dog` class.
    It also determines if the update for each property was successful and responds
    accordingly. There are opportunities in this example to be more efficient with
    the amount of code that you have created. However, we will hold off on efficiency
    until you have gathered a few more skills.


    The `lab.php` code now calls a `set` method for each property to be updated (`set_dog_name`,
    `set_dog_breed`, `set_dog_weight`, and `set_dog_color`) and passes information
    into each method. Notice that strings are passed into each method, except for
    the `set_dog_weight` method, which accepts an integer (whole number) value.


    We now need to create `set` methods within the `Dog` class. Each method now accepts
    a parameter (string or integer) and returns a `''true''` or `''false''` Boolean
    value. The method is created in a style similar to the previous `get_properties`
    method that we created. Let us keep the validation process simple for now and
    you will learn how to improve it in later chapters.


    ```

    function set_dog_name(string $value) : bool

    {

    bool $error_message = TRUE;

    (ctype_alpha($value) && strlen($value) < 21) ? $this->dog_name = $value : $error_message
    = FALSE;

    return $error_message;

    }

    ```


    The `set_dog_name` method will accept a string into the `$value` property (parameter)
    defined in the function header (`function set_dog_name( string $value) : bool`).
    Next, the method creates a property `$error_message` and provides an initial value
    of `TRUE`. This property (along with the `$value` property) will only exist while
    the method is executing. As soon as the execution hits the `}` closing bracket,
    these properties will no longer be available.


    - **Programming note**—`TRUE` and `FALSE` are constants that are included as part
    of the PHP language. Constants cannot be changed and are in all caps. `TRUE` is
    actually represented internally as a `1` and `FALSE` is represented internally
    as a `0`.


    Note


    Since we included scalar hints (data types) in the example, we did not need to
    include the `ctype_alpha` function which will determine if the value is a string.
    However, we have provided it as another tool to determine if a variable contains
    a string.


    - **Programming note**—`&&` is an `AND` operator. In order for the `(ctype_alpha($value)
    && strlen($value) < 21)` statement to be `TRUE`, `$value` must include only alphabetic
    characters and must be fewer than 21 characters.


    A **ternary operator** looks at the two possible statuses of the `$value` property
    (which contains whatever was passed into the method).


    1.  The `ctype` method is used to determine if the characters in `$value` are
    alphabetic (`ctype_alpha($value)`).


    2.  The `strlen` method is used to determine if the length of the string in `$value`
    is less than 21 characters (`strlen($value) < 21`).'
  raw: "This example is\nstill very limited because we cannot currently adjust the\
    \ values in the\nproperties to relate to the actual objects we created (such as\
    \ `$lab`). In order to\nadjust these properties, we must have some ability to\
    \ access the\nproperties from the program that uses the object (`lab.php`). However,\n\
    because of encapsulation and security concerns, we do not want to expose\nthe\
    \ properties to be directly manipulated by the calling program.\nObject-oriented\
