- '# 排版后内容


  在此场景中，部分逻辑从业务层转移到了数据层。在很多其他情况下，你可以选择将某些逻辑放在某一层、另一层，或同时放在两层。大多数情况下，实现三层架构并没有唯一的最佳方式，你需要根据个人偏好或外部限制做出折衷或选择。


  此外，有时即便你知道实现某项功能的“正确”方式（从架构角度看），你也可能会选择打破规则以提升性能。通常来说，如果这种方式能提升性能，那么*稍微*打破各层之间的严格界限是可以接受的（例如，将部分业务规则添加到数据层，或者反过来），*前提是*这些规则不太可能随时间改变。否则，将所有业务规则保留在中间层是更好的选择，因为它能生成更“干净”、更易于维护的应用程序。


  最后，不要试图从表示层直接访问数据层。这是一个常见错误，也是导致系统复杂、难以维护且缺乏灵活性的最快途径。在许多数据访问教程或入门材料中，你会看到如何通过简单的用户界面应用程序执行基本数据库操作。在这类程序中，所有逻辑可能都写在一个简短的单文件中，而非分散到不同层。


  尽管这些材料可能很好，但请记住，这些文本大多旨在教你如何完成不同的独立任务（例如访问数据库），而不是如何正确创建灵活且可扩展的应用程序。


  ## HatShop 的三层架构


  为 HatShop 网站实现三层架构将有助于实现本章开头列出的目标。乍看之下似乎僵化的系统所强加的编码规范，从长远来看能带来极佳的灵活性和可扩展性。


  将应用程序的主要部分拆分为独立的较小组件，有助于提升可重用性。在为网站添加新功能时，你通常会多次发现可以重用某些现有部分。无需大幅改动现有代码即可添加新功能，这本身就是可重用性的一个良好范例。


  三层架构的另一个优势是，如果实施得当，整个系统对于变化具有很好的鲁棒性。当某一层中的组件发生变化时，其他层通常不受影响，甚至在极端情况下也是如此。例如，如果出于某种原因更换了后端数据库系统（比如经理决定使用
  Oracle 替代 PostgreSQL），你只需更新数据层，或许再稍微调整一下业务层即可。


  ## 为什么不使用更多层？


  我们迄今为止所讨论的三层架构是 *n* 层架构的一个特定（也是最流行的）版本。**\*n\*-层架构**指的是将解决方案拆分为数量为 *n* 的逻辑层。在复杂项目中，有时将业务层拆分为多个层是合理的，从而产生超过三层的架构。


  然而，对于我们的网站而言，坚持使用三层设计是最合理的，它既能提供大部分优势，又无需花费过多设计时间或使用复杂的框架代码层级来支撑架构。


  或许采用更复杂、更精细的架构，你能为应用程序实现更高水平的灵活性和可扩展性，但在开始实施任何内容之前，你需要花费更多时间进行设计。与任何编程项目一样，你必须在设计架构所需的时间与实施架构所需的时间之间找到恰当的平衡。三层架构最适合中等复杂度的项目，例如
  HatShop 网站。


  你可能还会问相反的问题：“为什么不使用更少的层？”两层架构，也称为*客户端-服务器*架构，适用于复杂度较低的项目。简而言之，两层架构需要更少的规划时间，并在初期允许更快的开发，但从长远来看，它生成的应用程序更难维护和扩展。由于我们预计将来需要扩展应用程序，因此客户端-服务器架构不适合我们的应用程序，本书将不再进一步讨论。


  既然大致架构已经明确，我们来看看你将使用哪些技术和工具来实现它。在简要讨论技术之后，你将通过创建网站的第一个页面和后端数据库，来搭建表示层和数据层的基础。在第
  3 章开始创建网站的产品目录时，你将在三个层中分别开始实现一些实际功能。


  ## 选择技术与工具


  无论选择何种架构，每个开发项目中都会出现一个主要问题：将使用哪些技术、编程语言和工具，同时要牢记外部需求可能会严重限制你的选项。


  > **注意** 在本书中，我们将使用 PHP、PostgreSQL 及相关技术创建一个网站。我们非常喜欢这些技术，但这并不一定意味着它们在所有情况下都是任何类型项目的最佳选择。此外，在许多情况下，由于客户需求，你必须使用特定技术。软件开发过程中的系统需求和软件需求阶段将决定你必须使用哪些技术来创建应用程序。详情请参见附录
  B。


  虽然本书假设读者对 PHP 和 PostgreSQL 有一定经验，但我们仍会快速浏览它们，并了解它们如何融入我们的项目以及三层架构。


  > **注意** 我们在附录 A 中包含了完整的环境安装说明（包括 Apache、PHP 和 PostgreSQL）。


  ### 使用 PHP 生成动态 Web 内容


  PHP 是一种用于构建动态、交互式 Web 内容的开源技术。其在官方 PHP 网站（`http://www.php.net`）上的简短描述是：“PHP 是一种广泛使用的通用脚本语言，特别适用于
  Web 开发，并可嵌入到 HTML 中。”


  PHP 代表 *PHP: Hypertext Preprocessor*（是的，这是一个递归缩写），可在其官方网站免费下载。我们在附录 A 中包含了 PHP 的完整安装说明。由于我们使用
  PHP 构建动态网站，你还可以在附录 A 中学习如何安装 Apache 以及如何将 PHP 与之集成。


  PHP 的故事始于 1994 年，是一段成功的经历。促成其成功的因素包括：


  - PHP 是免费的；特别是与 Linux 服务器软件结合使用时，PHP 可被证明是一种构建动态 Web 内容的高性价比技术。

  - PHP 的学习曲线比其他脚本语言更短。




  '
- "# PHP 社区及其替代方案\n\n- PHP 社区非常活跃，许多有用的辅助库或现有库的新版本正在不断开发中（例如你可以在 `PEAR` 仓库或 [`www.phpclasses.org`](http://www.phpclasses.org)\
  \ 找到的库），并且新功能也频繁添加。\n- PHP 在各种 Web 服务器和操作系统（类 Unix 平台、Windows、Mac OS X）上表现非常出色。\n\
  \n然而，PHP 并非唯一用于创建动态网页的服务器端脚本语言。其最流行的竞争者包括 `JSP`（Java Server Pages）、`Perl`、`ColdFusion`\
  \ 和 `ASP.NET`。这些技术之间存在许多差异，但也存在一些根本性的相似之处。例如，使用这些技术编写的页面都由基础 HTML（绘制页面的静态部分，即模板）和生成动态部分的代码组成。\n\
  \n> **注意：** 你或许想了解一下 *Beginning ASP.NET 2.0 E-Commerce in C# 2005*（Apress，2005），该书讲解了如何使用\
  \ `ASP.NET 2.0`、`C#` 和 `SQL Server 2005` 构建电子商务网站。\n\n## 使用 Smarty 分离布局与代码\n\n由于\
  \ PHP 简单且易于上手，人们往往容易在没有恰当设计对长远有益的架构和框架的情况下就直接开始编码。\n\n更糟糕的是，构建 PHP 页面直截了当的方法就是将\
  \ PHP 指令与 HTML 混合在一起，因为 PHP 默认并没有提供一种明显的技术来将 PHP 代码与 HTML 布局信息分离。\n\n将 PHP 逻辑与 HTML\
  \ 混合有两个重要的缺点：\n\n- 这种技术常常导致代码冗长、复杂且难以管理。你可能见过那些长度惊人的源文件，PHP 和 HTML 混乱地混合在一起，难以阅读，一周后就无法理解了。\n\
  - 这些混合文件是设计师和程序员共同工作的对象，这不必要地增加了协作的复杂性。这也增加了设计师在进行界面美化修改时无意中引入代码逻辑错误的几率。\n\n这类问题促使了模板引擎的发展，它们提供了将表现逻辑与静态\
  \ HTML 布局分离的框架。`Smarty`（[`smarty.php.net`](http://smarty.php.net)）是 PHP 中最流行、最强大的模板引擎。其主要目的是为你提供一种简单的方法来分离应用逻辑（PHP\
  \ 代码）和表现代码（HTML）。\n\n这种分离使得程序员和模板设计师可以独立地在同一个应用程序上工作。程序员可以更改 PHP 逻辑而无需修改模板文件，设计师也可以更改模板而无需关心使其运行起来的代码是如何工作的。\n\
  \n图 2-4 展示了 Smarty 设计模板文件与其 Smarty 插件文件之间的关系。\n\n### Smarty 组件化模板\n\n**Smarty 设计模板**\
  \  \n（包含 HTML 和 Smarty 标签的 `.tpl` 文件）\n- 在模板中使用的赋值变量：\n  - （`$variable1`）\n  - （`$variable2`）\n\
  \  - ...\n  - （`$variableN`）\n\n**Smarty 插件文件**  \n（包含表现层逻辑的 `.php` 文件）\n\n**图 2-4.**\
  \ *Smarty 组件化模板*\n\nSmarty 设计模板（一个包含 HTML 布局以及 Smarty 特定标签和代码的 `.tpl` 文件）及其 Smarty\
  \ 插件文件（一个包含模板相关代码的 `.php` 文件）共同构成了一个 **Smarty 组件化模板**。你将在构建电子商务网站的过程中了解更多关于 Smarty\
  \ 工作的原理。如需全面的 Smarty 教程，请阅读 *Smarty PHP Template Programming and Applications*（Packt，2006）。\n\
  \n> **注意：** 向 Web 应用的架构中添加 Smarty 或其他模板引擎会增加一些初始编码工作，并且也意味着有一个学习曲线。然而，你仍然应该尝试一下，因为使用这种现代开发技术所带来的优势在后续过程中会证明是非常显著的。\n\
  \n### 有哪些替代方案？\n\nSmarty 并非 PHP 可用的唯一模板引擎。其他流行的模板引擎包括：\n\n- `Yapter`（[`yapter.sourceforge.net/`](http://yapter.sourceforge.net/)）\n\
  - `EasyTemplate`（[`www.onlinetools.org/tools/easytemplate/index.php`](http://www.onlinetools.org/tools/easytemplate/index.php)）\n\
  - `phpLib`（[`phplib.sourceforge.net/`](http://phplib.sourceforge.net/)）\n- `TemplatePower`（[`templatepower.codocad.com/`](http://templatepower.codocad.com/)）\n\
  \n尽管所有模板引擎都遵循相同的基本原则，但我们选择在本书的 PHP 电子商务项目中使用 Smarty，因为它具有良好的性能表现、强大的功能（如模板编译和缓存）以及在业界的广泛认可。\n\
  \n## 使用 PostgreSQL 存储网站数据\n\n访问者在浏览网站时看到的大部分数据都将从关系型数据库中检索。关系型数据库管理系统（`RDBMS`）是一种复杂的软件程序，其目的是尽可能快速、可靠地存储、管理和检索数据。对于\
  \ HatShop 网站来说，它将存储所有关于产品、部门、用户、购物车等的数据。\n\n有许多 `RDBMS` 可供你与 PHP 配合使用，包括 `PostgreSQL`、`MySQL`、`Oracle`\
  \ 等。PostgreSQL 可以说是世界上最先进的开源数据库，它是一个免费、快速且可靠的数据库。另一个重要的优势是，许多网站托管提供商都提供对 PostgreSQL\
  \ 数据库的访问，这让你刚创建好的电子商务网站上线时更加轻松。在开发 HatShop 电子商务网站时，我们将使用 PostgreSQL 作为后端数据库。\n\n\
  用于与关系型数据库通信的语言是 SQL（结构化查询语言）。然而，每个数据库引擎都识别该语言的特定方言。如果你决定使用不同于 PostgreSQL 的 `RDBMS`，你可能需要更新某些\
  \ SQL 查询。\n\n### 与 PostgreSQL 交互\n\n你通过编写一个 SQL 查询，将其发送给数据库引擎，并检索结果，来与数据库服务器对话。SQL\
  \ 查询可以涉及网站数据或其数据结构的任何内容，例如“给我部门列表”、“删除产品编号 223”、“创建一个数据表”或“在目录中搜索黄色帽子”。\n\n无论 SQL\
  \ 查询内容是什么，我们都需要一种方式将其发送给 PostgreSQL。PostgreSQL 附带了一个简单的、基于文本的界面（名为 `\"psql\"`），它允许执行\
  \ SQL 查询并获取结果。命令行界面使用起来不是特别方便，但功能齐全。不过，也有其他替代方案。\n\n一些免费的第三方数据库管理工具允许你通过易于使用的图形界面来操作数据结构和执行\
  \ SQL 查询。在本书中，我们将向你展示如何使用 `pgAdmin III`，这是随 PostgreSQL 一起提供的管理工具。\n\n除了需要通过直接界面与\
  \ PostgreSQL 引擎交互外，你还需要学习如何通过 PHP 代码以编程方式访问 PostgreSQL。这个需求是显而易见的，因为电子商务网站在为访问者构建页面时，需要查询数据库来检索目录信息（部门、类别、产品等）。\n\
  \n至于通过 PHP 代码查询 PostgreSQL 数据库，你将要使用的工具是 `PDO`（PHP 数据对象）。\n\n### 使用 PDO 实现数据库集成\n\
  \n**`PDO`（PHP 数据对象）** 是一个原生的数据访问抽象库，随 PHP 5.1 一起提供\n\n\n\nPDO 作为 PHP 5.0 的 PECL\
  \ 扩展提供。（PECL 是一个 PHP 扩展仓库，位于 `http://pecl.php.net/`。）官方 PDO 手册及其安装说明（也可在附录 A 中找到）位于\
  \ `http://php.net/pdo`。\n\nPDO 提供了一种统一的方式来访问各种数据源。使用 PDO 可以提高应用程序的可移植性和灵活性，因为如果后端数据库发生变化，对数据访问代码的影响可以降到最低（在许多情况下，只需更改新数据库的连接字符串）。\n\
  \n熟悉 PDO 数据访问抽象层后，你可以在其他可能需要不同数据库解决方案的项目中使用相同的编程技术。\n\n为了演示使用旧版 PHP 函数和 PDO 访问数据库之间的区别，让我们快速浏览两个简短的\
  \ PHP 代码片段。\n\n**注意** 如果你不熟悉这些代码的工作原理，不必担心——我们将在后续章节中更详细地分析所有内容。\n\n以下示例展示了使用 PHP\
  \ 原生（特定于 PostgreSQL）函数进行数据库访问：\n\n```php\n// 连接到 PostgreSQL\n\n$link = pg_connect('host=localhost\
  \ dbname=hatshop' .\n\n'user=' . $username . ' password=' . $password)\n\nor die('无法连接：'\
  \ . pg_last_error($link));\n\n// 执行 SQL 查询\n\n$queryString = 'SELECT * FROM product';\n\
  \n$result = pg_query($link, $queryString)\n\nor die('查询失败：' . pg_last_error($link));\n\
  \n// 关闭连接\n\npg_close($link);\n```\n\n接下来，展示相同的操作，但这次使用 PDO：\n\n```php\ntry\n\n\
  {\n\n// 创建新的 PDO 实例\n\n$database_handler =\n\nnew PDO('pgsql:host=localhost;dbname=hatshop',\n\
  \n$username, $password);\n\n// 准备 SQL 查询\n\n$statement_handler =\n\n$database_handler->prepare('SELECT\
  \ * FROM product');\n\n// 执行 SQL 查询\n\n$statement_handler->execute();\n\n// 获取结果\n\
  \n$result = $statement_handler->fetchAll();\n\n// 清除 PDO 对象实例\n\n$database_handler\
  \ = null;\n\n}\n\ncatch (PDOException $e)\n\n{\n\n/* 如果出现问题，我们捕获对象抛出的异常，打印消息并停止脚本执行\
  \ */\n\nprint '错误！ <br />' . $e->getMessage() . '<br />'; exit;\n\n}\n```\n\n使用\
  \ PDO 的代码版本更长，但它包含强大的错误处理机制和*预处理语句*（可保护你免受注入攻击）。如果这些概念听起来很陌生，请再次等待后续章节，届时我们将让 PDO\
  \ 投入使用，你将在那里了解更多相关信息。\n\n另外，使用 PDO 时，例如，如果你决定使用 MySQL 而非 PostgreSQL，则无需更改数据访问代码。另一方面，第一个使用特定于\
  \ PostgreSQL 函数的代码片段则需要完全更改（使用 `mysql_connect` 和 `mysql_query` 替代 `pg_connect` 和\
  \ `pg_query`，依此类推）。此外，一些特定于 MySQL 的函数具有不同于类似 PostgreSQL 函数的参数。\n\n使用数据库抽象层（如 PDO）时，在更改数据库后端时，你可能只需更改连接字符串。请注意，这里我们仅讨论与数据库交互的\
  \ PHP 代码。在实践中，如果数据库引擎支持不同的 SQL 方言，你可能还需要更新一些 SQL 查询。\n\n**注意** 为了使 SQL 查询尽可能可移植，请使其语法尽可能接近\
  \ SQL-92 标准。你将在第 3 章了解更多关于 SQL 的细节。\n\n## PostgreSQL 与三层架构\n\n至此，很明显 PostgreSQL\
  \ 与数据层有关。但是，如果你之前没有使用过数据库，可能不太清楚 PostgreSQL 不仅仅是一个简单的数据存储。除了内部存储的实际数据外，PostgreSQL\
  \ 还能够以存储过程的形式存储逻辑、维护表关系、确保遵守各种数据完整性规则等。\n\n你可以通过 SQL（结构化查询语言）与 PostgreSQL 通信，这是一种用于与数据库交互的语言。SQL\
  \ 用于向数据库传输指令，例如“发送给我最后 10 个订单”或“删除产品 #123”。\n\n尽管可以在 PHP 代码中编写 SQL 语句然后提交执行，但这通常是一种*不良实践*，因为它会带来安全性、一致性和性能方面的损失。在我们的解决方案中，我们将使用**数据库函数**存储所有数据层逻辑。\n\
  \n本书中的代码设计为与 PostgreSQL 8.1（撰写本文时最新的稳定版本）兼容。PostgreSQL 由电子商务软件项目中的数据存储组成，如图 2-5\
  \ 所示。\n\n**图 2-5.** *你将用于开发 HatShop 的技术*\n\n## 选择命名和编码标准\n\n尽管编码和命名标准起初可能看起来不那么重要，但绝对不应被忽视。不遵循代码规则集几乎总是会导致代码难以阅读、理解和维护。另一方面，当你遵循一致的编码方式时，几乎可以说你的代码已经完成了一半的文档工作，这对项目的可维护性是一项重要贡献，尤其是在多人同时参与同一项目时。\n\
  \n**提示** 一些公司有自己的编码和命名标准政策，而在其他情况下，你可以灵活地使用自己的偏好。无论哪种情况，黄金法则是保持编码方式的一致性。注释你的代码是提高代码长期可维护性的另一个好习惯。\n\
  \n命名约定涉及项目中的许多元素，这仅仅是因为项目中几乎所有的元素都有名称：项目本身、文件、类、变量、方法、方法参数、数据库表、数据库列等等。在命名所有这些元素时如果没有一些纪律，一周的编码之后你将完全看不懂自己写过的东西。\n\
  \n在开发 HatShop 时，我们遵循了一套在 PHP 开发者中流行的命名约定。以下代码中总结了一些最重要的规则：\n\n```php\nclass WarZone\n\
  \n{\n\npublic $mSomeSoldier;\n\nprivate $_mSomeOtherSoldier;\n\nfunction SearchAndDestroy($someEnemy,\
  \ $someOtherEnemy)\n\n{\n\n$master_of_war = 'Soldier';\n\n$this->mSomeSoldier =\
  \ $someEnemy;\n\n$this->_mSomeOtherSoldier = $someOtherEnemy;\n\n}\n\n}\n```\n\n\
  - 类名和方法名应使用帕斯卡命名法（每个单词首字母大写），例如 `WarZone` 或 `IsDataValid`。\n- 公有类属性名称遵循与类名相同的规则，但应前缀字符\
  \ `m`。因此，有效的公有属性名称如下所示：`$mSomeSoldier`。\n- 私有类属性名称遵循与公有类属性名称相同的规则，但额外加以下划线前缀，例如\
  \ `$_mSomeOtherSoldier`。\n\n\n\n-   方法参数名应使用驼峰命名法（首字母小写，后续每个单词首字母大写），例如 `$someEnemy`、`$someOtherEnemy`。\n\
  \n-   变量名应使用小写字母，并用下划线分隔单词，例如 `$master_of_war`。\n\n-   数据库对象采用与变量名相同的命名惯例（如 `department_id`\
  \ 列）。\n\n-   尝试使用固定数量的空格（比如四个）缩进每一级代码。\n\n（由于物理空间限制，本书的代码使用两个空格缩进。）需要做出的决策之一是对字符串是否使用引号。JavaScript、HTML\
  \ 和 PHP 都允许使用单引号和双引号。对于本书的代码，我们将在 HTML 和 JavaScript 代码中使用双引号，在 PHP 中使用单引号。\n\n虽然对于\
  \ JavaScript 来说，这纯粹是个人喜好问题（只要保持一致，你可以使用单引号），但在 PHP 中，单引号的处理速度更快、更安全，并且更不容易引发编程错误。更多关于\
  \ PHP 字符串的信息，请访问 `http://php.net/types.string`。在 `http://www.sitepoint.com/print/quick-php-tips`\
  \ 和 `http://www.jeroenmulder.com/weblog/2005/04/php_single_and_double_quotes.php`\
  \ 可以找到两篇关于 PHP 字符串的有用文章。\n\n## 启动 HatShop 项目\n\n到目前为止，我们一直在讨论与即将创建的应用程序相关的理论。这很有趣，但将所学知识付诸实践会更加有趣。\n\
  \n启动引擎！\n\n## 安装所需软件\n\n本书中的代码已在以下环境中测试通过：\n\n-   PHP 5.1\n-   Apache 2.2\n-   PostgreSQL\
  \ 8.1\n\n**注意** 代码很可能与上述软件的更新版本兼容，但无法与早于 PHP 5 的 PHP 版本一起使用。\n\n只要项目兼容 PHP 5.1（参见\
  \ `http://www.php.net/manual/en/installation.php`），它也应该适用于其他 Web 服务器。然而，Apache 是绝大多数\
  \ PHP 项目首选的 Web 服务器。\n\n有关 PHP、Apache 和 PostgreSQL 的详细安装说明，请参见附录 A。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 获取代码编辑器\n\n如果你还没有心仪的代码编辑器，在编写第一行代码之前，你需要安装一个。有许多免费的编辑器可用，商业编辑器的清单甚至更长。这取决于个人喜好和预算。你可以在\
  \ `http://www.php-editors.com` 找到一份 PHP 编辑器列表。以下是一些比较受欢迎的编辑器：\n\n-   Zend Studio\
  \ (`http://www.zend.com/products/zend_studio`) 可能是用于开发 PHP Web 应用程序最强大的 IDE（集成开发环境）。\n\
  -   phpEclipse (`http://www.phpeclipse.net`) 是一个日益流行的 PHP Web 应用开发环境。Zend 是 Eclipse\
  \ 基金会的成员。\n-   Emacs (`http://www.gnu.org/software/emacs/`)，正如其官网所定义，是一个“可扩展、可定制、自我记录、实时显示的编辑器”。Emacs\
  \ 是一款非常强大、免费且跨平台的编辑器。\n-   SciTe (`http://scintilla.sourceforge.net/SciTEDownload.html`)\
  \ 是一款免费且跨平台的编辑器。\n-   PSPad (`http://www.pspad.com/`) 是一款在 Windows 开发者中很流行的免费编辑器。该编辑器能够为许多现有文件格式进行语法高亮显示。附加插件可以集成\
  \ CSS 编辑功能和拼写检查功能。\n-   PHP Designer 2006 (`http://www.mpsoftware.dk`) 是一款 Windows\
  \ 编辑器，包含一个集成的调试器。\n\n## 准备 hatshop 虚拟文件夹\n\n使用开源、跨平台技术的一个优势是你可以选择用于开发的操作系统。你应该能够在\
  \ Windows、Unix、Linux、Mac 以及其他系统上开发和运行 HatShop。然而，这也意味着你可能需要费些心思来搭建初始环境，特别是如果你是个新手的话。\n\
  \n在搭建项目虚拟文件夹时，一些细节因操作系统而异（主要是因为文件路径不同），因此我们将在接下来的页面中分别为 Windows 和 Unix 系统进行说明。不过，主要步骤是相同的：\n\
  \n1.  在文件系统中创建一个名为 `hatshop`（我们使用小写字母命名文件夹）的文件夹，该文件夹将存放 HatShop 项目的文件（例如 PHP 代码、图片文件等）。\n\
  2.  编辑 Apache 的配置文件（`httpd.conf`），创建一个名为 `hatshop` 的虚拟文件夹，指向之前创建的物理文件夹 `hatshop`。这样，当在\
  \ Web 浏览器中访问 `http://localhost/hatshop` 时，将加载物理文件夹 `hatshop` 中的项目。此功能在 Apache 中通过别名实现，别名通过\
  \ `httpd.conf` 配置文件进行配置。别名条目的语法如下：\n\n```\nAlias 虚拟文件夹名 真实文件夹名\n```\n\n**提示** `httpd.conf`\
  \ 配置文件文档齐全，但你也可以查阅 Apache 2 文档，地址是 `http://httpd.apache.org/docs-2.0/`。\n\n如果你在\
  \ Windows 系统上工作，请按照下面的练习步骤操作。Unix 系统的步骤将在本练习之后介绍。\n\n### 练习：在 Windows 上准备 hatshop\
  \ 虚拟文件夹\n\n1.  创建一个名为 `hatshop` 的新文件夹，用于存放你在本书中完成的所有工作。你可能会发现将其创建在根目录（`C:\\`）下最方便，但由于我们将在项目中使用相对路径，你也可以自由选择任何位置。\n\
  2.  Apache 用来处理客户端请求的默认位置通常是 `C:\\Program Files\\Apache Software Foundation\\ApacheX.Y\\\
  htdocs`。该位置由 Apache 配置文件中的 `DocumentRoot` 指令定义，该文件位于 `APACHE_BASE/conf/httpd.conf`（其中\
  \ `APACHE_BASE` 是 Apache 的安装文件夹）。\n    因为我们想要使用自己的文件夹而不是 `DocumentRoot` 提到的默认文件夹，所以需要创建一个名为\
  \ `hatshop` 的虚拟文件夹，指向你在步骤 1 中创建的物理文件夹 `hatshop`。\n    打开 Apache 配置文件（`httpd.conf`），并添加以下几行：\n\
  \n```\n<IfModule alias_module>\n```\n\n\n```apacheconf\n<IfModule alias_module>\n\
  # ...\nAlias /hatshop/ \"C:/hatshop/\"\nAlias /hatshop \"C:/hatshop\"\n</IfModule>\n\
  \n<Directory \"C:/hatshop\">\nAllow from all\n</Directory>\n```\n\n添加这些行并重启 Apache\
  \ 网络服务器后，对 `http://localhost/hatshop` 或 `http://localhost/hatshop/` 的请求将执行 `hatshop`\
  \ 文件夹（如果存在）中的应用程序。\n\n**3.** 在 `hatshop` 文件夹中创建一个名为 `test.php` 的文件，内容如下：\n\n```php\n\
  <?php phpinfo(); ?>\n```\n\n**4.** 重启 Apache 网络服务器，然后在网页浏览器中加载 `http://localhost/hatshop/test.php`（如果\
  \ Apache 在 8080 端口运行，则加载 `http://localhost:8080/hatshop/test.php`）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 2 章 ■ 奠定基础\n\n**练习：在 Unix 系统上准备 hatshop 虚拟文件夹**\n\n**1.** 创建一个名为 `hatshop` 的新文件夹，它将用于本书中的所有工作。你可能会发现将其创建在用户主目录中最简单（此时\
  \ `hatshop` 文件夹的完整路径类似于 `/home/username/hatshop`），但由于我们在项目中使用相对路径，也可以随意将其创建在任何位置。\n\
  \n**2.** Apache 用于服务客户端请求的默认位置通常是类似 `/usr/local/apache2/htdocs/` 的路径。此位置由 Apache\
  \ 配置文件中的 `DocumentRoot` 指令定义，该配置文件的完整路径通常是 `/usr/local/apache/conf/httpd.conf`。因为我们想使用自己的文件夹而不是\
  \ `DocumentRoot` 所指的默认文件夹，需要创建一个名为 `hatshop` 的虚拟文件夹，指向你在步骤 1 中创建的物理文件夹 `hatshop`。打开\
  \ Apache 配置文件（`httpd.conf`），找到 `Aliases` 部分，并添加以下行：\n\n```apacheconf\n<IfModule\
  \ alias_module>\n# ...\nAlias /hatshop/ \"/home/username/hatshop/\"\nAlias /hatshop\
  \ \"/home/username/hatshop\"\n</IfModule>\n\n<Directory \"/home/username/hatshop\"\
  >\nAllow from all\n</Directory>\n```\n\n添加这些行后，对 `http://localhost/hatshop` 或 `http://localhost/hatshop/`\
  \ 的请求将执行 `hatshop` 文件夹（如果存在）中的应用程序。\n\n**3.** 在 `hatshop` 文件夹中创建一个名为 `test.php`\
  \ 的文件，内容如下：\n\n```php\n<?php phpinfo(); ?>\n```\n\n**4.** 重启 Apache 网络服务器，然后在网页浏览器中加载\
  \ `http://localhost/hatshop/test.php`（如果 Apache 在 8080 端口运行，则加载 `http://localhost:8080/hatshop/test.php`）。\n\
  \n**工作原理：虚拟文件夹**\n\n构建 HatShop 电子商务网站的第一步虽然很小，但很重要，因为它可以让你测试 Apache、PHP 和 `hatshop`\
  \ 别名是否正常工作。如果运行测试页面时遇到问题，请确保你已正确遵循附录 A 中的安装步骤。\n\n无论你使用的是 Windows 还是类 Unix 系统，在网页浏览器中加载\
  \ `test.php` 都应该会显示由 `phpinfo` 函数返回的 PHP 信息，如图 2-6 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图 2-6](img/00020.png)\n\n**图 2-6.** *测试 PHP 和* hatshop *虚拟文件夹*\n\n你还确保了 `hatshop`\
  \ 目录及其所有内容可以被网络服务器正常访问。\n\n**安装 Smarty**\n\n安装 Smarty 只需将 Smarty PHP 类复制到你的项目文件夹中。许多网络托管公司会为你提供这些类，但出于两个原因，最好自己进行安装：\n\
  \n-   尽可能让你的项目独立于服务器设置，这总是更好的选择。\n-   即使托管系统安装了 Smarty，该公司的版本也可能随时间发生变化，也许在没有通知的情况下，这可能会影响你网站的功能。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n在以下练习中，你将把 Smarty 安装到 `hatshop`\
  \ 文件夹的一个名为 `libs` 的子文件夹中。无论你使用什么操作系统，这些步骤都应同样有效。\n\n**练习：安装 Smarty**\n\n**1.** 在\
  \ `hatshop` 文件夹内创建一个名为 `libs` 的文件夹，然后在 `libs` 文件夹内创建一个名为 `smarty` 的文件夹。\n\n**2.**\
  \ 从 `http://smarty.php.net/download.php` 下载最新版本的 Smarty，并下载最新的稳定版本。该压缩包是一个 `.tar.gz`\
  \ 文件。要在 Windows 下解压，你需要一个诸如 WinZip (`http://www.winzip.com`) 或 WinRar (`http://www.rarlabs.com`)\
  \ 的程序。解压该压缩包，并将压缩包中 `Smarty-2.X.Y/libs` 目录的内容复制到你之前创建的文件夹（`hatshop/libs/smarty`）中。你只需复制所提到的\
  \ `libs` 文件夹的内容，无需其他。\n\n**3.** 为了正常运行，Smarty 需要三个你需要创建的文件夹：`templates`、`templates_c`\
  \ 和 `configs`。在 `hatshop` 目录内创建一个名为 `presentation` 的文件夹，并在该文件夹中创建两个名为 `templates`\
  \ 和 `templates_c` 的文件夹。`presentation` 文件夹将包含所有展示文件。\n\n**4.** 在 `hatshop` 文件夹内创建一个名为\
  \ `include` 的文件夹。它将包含应用程序的所有配置文件。在此文件夹内创建一个名为 `configs` 的文件夹。\n\n**5.** 如果你使用的是\
  \ Unix 操作系统，你还需要设置一些安全选项。你需要确保 Apache 对 `templates_c` 目录有写权限，Smarty 引擎需要在该目录保存其编译后的模板文件（稍后你将了解更多相关信息）。如果你在\
  \ Unix 系统下构建项目，应执行以下命令，以确保你的 Apache 服务器能够访问你的项目文件，并对 `templates_c` 目录拥有写权限：\n\n\n\
  执行`chmod a+w /home/username/hatshop/presentation/templates_c`。\n\n**注意** 在 Unix\
  \ 系统上按此处所示设置权限，允许任何拥有你 Unix 机器 shell 帐户的用户查看文件夹中任何文件的源代码，包括 PHP 代码和其他数据（其中可能包含敏感信息，例如数据库密码、用于加密/解密信用卡信息的密钥等）。要微调安全设置，请咨询系统管理员。\n\
  \n**工作原理：Smarty 安装**\n\n在此练习中，你创建了 Smarty 使用的这三个文件夹：\n\n- `templates`文件夹将包含网站 (`*.tpl`文件)\
  \ 的 Smarty 模板。\n- `templates_c`文件夹将包含编译后的 Smarty 模板；这些文件由 Smarty 引擎自动生成。\n- `configs`文件夹将包含模板可能需要的配置文件。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH02.qxd 11/8/06 9:33\
  \ AM Page 34\n\n**34**\n\n第 2 章 ■ 奠定基础\n\n添加这些文件夹后，你的文件夹结构应如下所示：\n```\nhatshop/\n\
  \  include/\n    configs/\n    libs/\n    smarty/\n      internals/\n      plugins/\n\
  \  presentation/\n    templates/\n    templates_c/\n```\n\n**实现网站骨架**\n\n网站的视觉设计通常在与客户讨论后确定，并与专业的网页设计师合作完成。或者，你也可以从许多以合理价格提供此类服务的公司购买网站模板。\n\
  \n这是一本编程书，所以我们不会关注网页设计问题。我们将实现一个简单、友好且可用的设计，它允许轻松定制（如果你需要在我们正在创建的设计之上应用你的布局），并且能让你专注于网站的技术细节。\n\
  \nHatShop 中的所有页面，包括首页，都将具有如图 2-7 所示的结构。\n\n虽然产品目录的详细结构将在下一章介绍，但目前我们知道需要在网站的每个页面上显示一个主要部门列表。\n\
  \n当访问者点击某个部门时，该部门的类别列表将出现在部门列表下方。该网站还有一个搜索框，允许访问者执行产品搜索。在页面顶部，网站页眉将出现在访问者浏览的任何页面上。\n\
