    As we can see, the for loop takes less lines of code than the while loop

    to accomplish the same result.


    ```

    for ( $number = 1; $number < 5 ; $number++) {

    ```


    The counting variable $number is initialized to one, compared to the

    number five, and incremented in the same program statement. Actually,

    for loops automatically execute statements in the first position (before

    the first semicolon) once at the beginning of the loop. They then

    execute the code in the second position (between the semicolons)

    whenever they reach the top of the loop (including the first time

    entering the loop). The code in the third position (between the last

    semicolon and the parentheses) is executed whenever they reach the

    bottom of the loop. In other words, the for loop produces the same

    result as the while loop. However, it helps remind us to create a

    counting variable, to give it an initial value, to compare it, and most

    importantly to increment it every time.'
  trans: "\n```php\n$out .= \"图片画廊\";\n$out .= \"\";\n$out .= \"我将很快列出所有图像\";\n$out\
    \ .= \"\";\nreturn $out;\n}\n//函数调用\n$info = showImages();\n?>\n代码清单 4-5\nshowgallery.php\n\
    ```\n\n请注意函数 `showImages()` 中的变量 `$out` 如何通过*增量拼接*在数行代码中逐渐累积内容。最终，当 HTML 字符串构建完成后，变量\
    \ `$out` 的内容被返回到调用该函数的代码行。\n\n```php\n$info = showImages();\n```\n\n生成的字符串通过 `$info`\
    \ 变量返回到 `index.php`，在那里它将被添加到 `$pageData` 对象中，与页面模板合并，并输出到浏览器。\n\n# 迭代\n\n希望函数、变量和增量拼接的概念正在逐渐明朗。由于我们将要使用多张图片，我们需要花些时间来理解**迭代**：重复使用同一段代码多次。\n\
    \n## While 循环\n\n让我们从 *while* *循环*开始。只要条件为真，`while` 循环就会重复执行同一个代码块。其基本语法是：\n\n\
    ```php\nwhile ( $condition ) {\n    // 在此处重复代码\n}\n```\n\n`while` 循环在语法上与 `if`\
    \ 语句非常相似。如果条件为 `true`，则后续代码块中的代码将重复执行，直到条件变为 `false`。以下示例用于说明这一概念。\n\n```php\n\
    <?php\n$number = 1;\nwhile ( $number < 5 ) {\n    echo \"<p>这是第 $number 行。</p>\\\
    n\";\n    $number = $number + 1;\n}\n?>\n代码清单 4-6\nwhileloop.php\n```\n\n```php\n\
    while ( $number < 5 ) {\n```\n\n![whileloop.php 的输出](img/323857_3_En_4_Fig4_HTML.jpg)\n\
    \n该图片反映了程序员在使用不同循环向网站上传图片后的窗口视图。\n\n**图 4-4** whileloop.php 的输出\n\n该代码块重复执行了四次。这是因为\
    \ while 语句括号内声明的条件所致。它检查 `$number` 是否小于五。循环首次执行时，`$number` 被设置为 1。\n\n```php\n\
    $number = $number + 1;\n```\n\n每次代码块运行时，`$number` 都会增加 1。当 `while` 循环重复四次后，*计数变量*\
    \ `$number` 的值为 5。因为五不小于五，所以 `while` 循环终止，第五行不会被输出。\n\n> **注意：** 如果程序员忘记递增用于计数的变量会发生什么？如果变量不递增，其值就不会改变。循环会继续将表达式评估为\
    \ true，因为 1 的值不会改变，而且它仍然小于五。这会造成一个*死循环*。这是一个常见错误，尤其是对于初学者来说。务必反复检查是否记得包含了计数变量的递增。\n\
    \n## For 循环\n\n作为一名新程序员，我们希望尽可能多地获得提示，以便成功创建迭代所需的任何代码。While 循环是一个很适合在条件发生变化前持续迭代的通用循环。然而，*for\
    \ 循环*专门针对已知循环次数的情况而设计。\n\n```php\n<?php\nfor ( $number = 1; $number < 5 ; $number++\
    \ ) {\n    echo \"<p>这是第 $number 行。</p>\\n\";\n}\n?>\n代码清单 4-7\nforloop.php\n\
    ```\n\n如我们所见，要实现与 while 循环相同的结果，for 循环所需的代码行数更少。\n\n```php\nfor ( $number = 1;\
    \ $number < 5 ; $number++ ) {\n```\n\n计数变量 `$number` 被初始化为 1，与数字 5 进行比较，并在同一个程序语句中递增。实际上，for\
    \ 循环会在循环开始时自动执行第一个位置（第一个分号前）的语句一次。然后，每当循环到达顶部时（包括首次进入循环时），它会执行第二个位置（两个分号之间）的代码。每当循环到达底部时，它会执行第三个位置（最后一个分号和右括号之间）的代码。换句话说，for\
    \ 循环产生的结果与 while 循环相同。然而，它有助于提醒我们创建计数变量、为其赋予初始值、进行比较，以及——最重要的——每次递增它。\n"
- fmt: "Before we move on, one change we did add to the previous example was another\
    \ way to increment a value. In the `for` statement `$number` is incremented using\
    \ `++`, instead of `$number = $number + 1`. There are actually several ways we\
    \ can increment values.\n\n```\n$number = $number + 1;\n$number++;\n$number +=\
    \ 1;\n```\n\nAll the preceding statements increment the variable by one. Each\
    \ increments the value after it has been used. What?\n\n```\n$number = 1;\necho\
    \ $number++;\necho $number;\n```\n\nThe preceding statements will display the\
    \ value of 1 with the first `echo` and 2 with the second `echo`. The value is\
    \ increased, using `$number++`, after it has been echoed the first time.\n\n```\n\
    $number = 1;\necho ++$number;\necho $number;\n```\n\nIf we move the `++` symbols\
    \ to the left, the variable will be incremented before it is used. Thus, the first\
    \ `echo` statement will display two and the second will display three.\n\nWe could\
    \ have switched our incrementation to occur before use in the `for` statement.\
    \ Since we are not actually using the value (such as displaying it with an `echo`),\
    \ it will not actually change any result with this `for`-loop example. Most of\
    \ the time, it does not matter if you increment before or after, but, as we just\
    \ discovered, we should be careful that we produce the results we expect.\n\n\
    ```\n$number = 2;\necho $number--;\necho --$number;\n```\n\nWe can also decrement\
    \ variables using `--`. The process is the same; if it is on the right side, it\
    \ will decrement after use. If it is on the left side, it will decrement before\
    \ use. In this example. The first `echo` will display two and the second zero.\
    \ Zero? Did you think it was one? The value is decremented with the first `echo`\
    \ to one. Then it is decremented again to zero before the second `echo` displays\
    \ the results.\n\n**Exercise**: Adjust the `for`-loop example to loop ten times.\
    \ Then adjust the loop to only display odd numbers. Hint: Change the incrementation\
    \ to add two each time. Finally look up the use of the `continue` and `break`\
    \ statements at [`www.php.net`](http://www.php.net). How can we skip the value\
    \ of four, but continue the loop? How can we exit the loop early if the counting\
    \ variable holds the value of six?\n\nLet us get back to creating our images gallery.\n\
    \n![](images/323857_3_En_4_Chapter/323857_3_En_4_Fig5_HTML.jpg)\n\nThe image reflects\
    \ how the programmer sees the window after images are successfully uploaded to\
    \ the website.\n\n**Figure 4-5** Output from `securelistgallery.php` via `securelistindex.php`\n\
    \n## Using glob to Find Files in a Folder\n\nThe PHP `glob` method can be used\
    \ to find pathnames that match a pattern. It can quickly scan a directory and\
    \ create an array which contains all items that match the pattern. We could use\
    \ the `for` loop to retrieve the results, because we do not know how many results\
    \ will be returned. We could discover this information with the length property\
    \ of the array. However, there is an even better option, the `foreach` loop. This\
    \ loop was specifically created to iterate arrays and other lists.\n\n### For\
    \ Each Loop\n\n```\nforeach ($arrayname as $value) {\nstatement\n}\n```\n\nThe\
    \ `foreach` syntax requires an array (or list) name and a variable to hold the\
    \ current item being viewed. For example:\n\n```\n<?php\n$cars = array(\"Volvo\"\
    , \"BMW\", \"Toyota\");\nforeach ($cars as $value) {\n  echo \"$value <br>\";\n\
    }\n?>\n```\n\nIn this example, an array of cars has been declared. The `foreach`\
    \ loop will increment through the array and place each value (car) in the variable\
    \ `$value`. It then displays the value. The loop continues until there are no\
    \ more cars. We do not need to worry about the size of the array and can easily\
    \ change the array without having to change the loop!\n\n### Showing All Images\n\
    \nLet us use the `foreach` loop to retrieve images for our gallery.\n\n```\n<?php\n\
    function showImages() {\n  $out = \"<h1>Images Gallery</h1>\";\n  $out .= \"<div>\"\
    ;\n  $dir_name = \"imgs\";\n  chdir($dir_name);\n  $images = glob(\"*.jpg\");\n\
    \  foreach($images as $image) {\n    $out .= '<img src=\"'.$image.'\" alt=\"image\"\
    \ />';\n  }\n  $out .= \"</div>\";\n  return $out;\n}\n$info = showImages();\n\
    ?>\n```\n\n**Listing 4-8** `listgallery.php`\n\nThe first few lines of the function\
    \ pass HTML code to the `$out` variable to format the display of the images. We\
    \ will clean up this display in another example.\n\n```\n$dir_name = \"imgs\"\
    ;\n```"
