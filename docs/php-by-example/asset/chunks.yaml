    \n## 匿名类\n\n有些情况下，你需要一个类只基于它创建一个对象。在这种情况下，使用匿名类很方便。这意味着你在创建类的同时创建一个对象。相应的指令以`new`关键字开头，后跟`class`关键字以及花括号中的类描述。让我们看一个小例子来解释所描述的方法。程序如清单`[9-14]`所示。\n\
