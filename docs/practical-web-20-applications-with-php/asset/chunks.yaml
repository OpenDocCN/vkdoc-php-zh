    # 备份与恢复


    在许多托管环境中，网络主机商会为你处理备份工作；不过，了解如何自行进行备份仍然很有用。这还能让你将生产环境中的真实数据复制到开发环境中，在开发新功能时能有真实数据进行操作。


    > **注意**：在第 11 章中，我们开发动态图片库时，曾将上传的图片存储在文件系统中。当时我已经分析了这样做的优缺点。本节仅涉及程序数据库的备份与恢复；但请注意，你也应当备份这些上传的图片。


    ## 导出数据库


    要导出程序数据库，我们使用`mysqldump`程序。这将把整个数据库（根据指定的选项）导出到一个文件中，我们可以将其保存到任意所需的位置（例如备份服务器或
    CD/DVD）。


    使用`mysqldump`时，我们可以指定许多选项来控制数据的导出方式（例如仅导出表结构而不导出数据，或反之），但对于我们的需求而言，默认选项已经足够。


    Linux 中导出数据库的命令如下：


    ```

    # mysqldump dbname

    ```


    这会将数据库的结构和数据输出到终端（标准输出）。因此，如果你希望将其写入文件，必须将输出重定向到文件。换句话说，我们可以这样操作：


    ```

    # mysqldump dbname > filename.sql

    ```


    更好的做法是，我们可以先通过`gzip`管道压缩输出（因为数据库可能体积较大）：


    ```

    # mysqldump dbname | gzip > filename.sql.gz

    ```


    由于我们使用`phpweb20`用户名及密码连接数据库，因此必须指定`-u`和`-p`参数以使用所需的凭据。此外，我们可以将数据库名称（`phpweb20`）代入前面的示例：


    ```

    # mysqldump -u phpweb20 -p phpweb20 | gzip > phpweb20.sql.gz

    ```


    执行此命令后，当前目录下将有一个数据库的压缩备份。


    > **提示**：PostgreSQL 中与`mysqldump`对应的工具是`pg_dump`。需要提供给该程序的参数与`mysqldump`略有不同，但两者工作原理基本相同。


    ## 导入数据库


    既然已经有了数据库备份，了解如何从头重建数据库就很有用。首先，如果数据库尚不存在，需要创建数据库及相应的权限（按照第 2 章的说明操作）：


    ```

    mysql> create database phpweb20;

    ```


    接着，从命令行导入文件。可以先解压文件，然后将结果通过管道传给`mysql`程序。注意，我们需要向`gunzip`传递`--stdout`参数才能实现：


    ```

    # gunzip --stdout phpweb20.sql.gz | mysql -u phpweb20 -p phpweb20

    ```


    如果数据库转储文件已经解压，可以使用以下命令：


    ```

    # mysql -u phpweb20 -p phpweb20 < phpweb20.sql

    ```


    可以看出，导出和导入数据库数据相对简单。如果需要同时管理大量权限或拥有某些特殊配置，操作可能会稍显复杂。


    有些人喜欢将数据库导出拆分为两个文件：一个用于表结构，另一个用于实际数据。这样可以在两个独立步骤中恢复数据，尤其当数据库已有必要的表结构时（例如从生产环境复制数据到开发数据库），这种做法特别有用。


    ## 总结


    本章探讨了与创建和管理网络应用程序相关的多个主题。这些主题相当重要，因为在创建需要以最少维护工作平稳运行的应用程序时，都必须考虑这些方面。


    具体而言，本章涵盖的主题如下：


    - 创建实用的日志系统，能在出现问题时通知管理员

    - 处理运行时可能发生的错误，记录错误并通知终端用户发生了问题

    - 处理 404 错误，告知用户所请求的页面无法找到

    - 创建管理后台，允许有权限的用户根据需要控制程序数据

    - 为网络应用程序创建多套配置，以适应应用可能使用的每种环境（开发、预发布、生产）

    - 将应用程序部署到生产服务器（包括如何部署更新）

    - 备份与恢复 MySQL 数据库


    学完本章后，你应该对从零开始开发一个网络应用程序所需的步骤有了扎实的理解。本章涵盖的主题将帮助你，在真实环境中管理之前章节所开发的代码。


    尽管你可能不需要我们在 Web 2.0 应用程序中实现的所有功能，但我希望它提出了一些想法和概念，能帮助你进一步开发这个应用，或从头创建你自己的应用。


    请记住，这些想法并非一成不变——它们仅仅是我个人的做法。如果你对本书中我做的某些内容有不同看法，你应该通过尝试自己的方式挑战它，并自行判断哪种方法最好。更妙的是，我希望你能直接向我提出挑战，这样我也能学到新东西。


