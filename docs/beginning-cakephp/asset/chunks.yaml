  trans: '

    你一定已经使用过 HTML 辅助器，这或许是最容易掌握的一个。使用 HTML 辅助器有以下优势：


    - 通常，坚持使用辅助器可以减少在视图中必须输入的 HTML 标记数量。

    - 通过向辅助器传递变量，可以动态管理 HTML 输出，而无需手动操作。你不必再为那些 HTML 辅助器已提供的常见任务编写自己的方法。

    - 我是否过分强调了管理链接的优势？让我再说一遍：这个辅助器能让你免于在更改域名、更改 URL 方案或迁移到不同托管商时，逐一排查并测试所有可能存在的链接失效问题而引发的头痛。这一点再怎么强调也不为过——尤其是对新手网页开发者而言，最大的挑战之一就是让应用具备可移植性。

    - 对某些用户来说，阅读 PHP 比阅读 HTML 更容易。至少，那些偏爱 PHP 语法胜过 HTML 标记的人会发现，HTML 辅助器是编写视图的更好方法。


    在视图中，通过使用 `$html` 对象来调用 HTML 辅助器。它是 Cake 应用中默认包含的两个辅助器之一，无需在控制器中使用 `var $helpers`
    数组声明。然而，一旦你在应用中添加了更多辅助器，最好在 `var $helpers` 数组中明确写出 HTML 辅助器；这样，无论未来应用运行在哪个 Cake
    版本上，该辅助器都能被正确调用。一个更详细的 `$helpers` 属性也能确保项目中的其他开发者明确知道视图中使用了哪些辅助器。


    > **注意**：HTML 辅助器在 `var $helpers` 数组中的指定方式与其他所有辅助器一样，需要使用首字母大写的驼峰式写法。这意味着使用 `var
    $helpers = array(''HTML'');`（全大写）将无法正常工作；必须像这样使用 `Html`：`var $helpers = array(''Html'');`。


    在接下来的章节中，我将介绍大部分 HTML 辅助器函数及其用法。当你在应用中有机会使用它们时，请务必保持代码的一致性；你当然可以直接手写 HTML，但这可能会绕开使用
    HTML 辅助器的一些优势。


    ---


    ## `charset`


    该函数用于输出 HTML `<meta>` 标签，指定页面的字符集。通常，该函数在布局文件中使用。


    **`charset( charset[string])`**


    - `charset` = null：要在 `<meta>` 标签中使用的字符集


    例如，以下代码：


    ```

    <?=$html->charset(''UTF-16'');?>

    ```


    将输出：


    ```

    <meta http-equiv="Content-Type" content="text/html; charset=UTF-16"/>

    ```


    默认字符集可以在 `app/config/core.php` 文件中指定。请按照标准的 HTML 字符集规范，更改第 47 行附近的 `App.encoding`
    设置。（供参考：已注册字符集值的列表可从万维网联盟 [www.w3.org/International/O-charset-lang.html](http://www.w3.org/International/O-charset-lang.html)
    获取。）`App.encoding` 的值默认设置为 `UTF-8`。


    ---


    ## `css`


    该函数用于输出引入样式表的标签。通常，CSS 文件存储在 `app/webroot/css` 目录下，并通过本节描述的 `css` 函数来引用。根据参数中指定的值，该函数会返回一个
    `<link>` 或 `<style>` 标签。


    **`css( path[mixed], rel[string], attributes[array], inline[bool])`**


    - `path`：样式表的名称（不包含 `.css` 扩展名），或者一个包含 `app/webroot/css` 目录下多个样式表名称的数组。

    - `rel` = `''stylesheet''`：`rel` 属性；如果设置为 `import`，则该函数将返回 `<style>` 标签中的 `@import`
    链接，而不是 `<link rel=''stylesheet''>` 标签。

    - `attributes`：包含要添加到 `<link>` 或 `<style>` 标签中的任何 HTML 属性；以键值对形式组织，键为属性名，值为要赋给该属性的值。

    '
- fmt: '`inline = true`: 如果设置为`false`，结果将被放置在页面的`<head>`元素中；否则，函数将输出内联内容。


    使用`attributes`数组，你可以为打印或屏幕输出指定样式表，如下所示：


    `<?=$html->css(''cake.generic.print'',null,array(''media''=>''print''));?>`


    或者这样：


    `<?=$html->css(''cake.generic.screen'',null,array(''media''=>''screen''));?>`


    可以通过在`path`参数中传入数组来调用多个样式表：


    `<?=$html->css(array(''reset'',''type'',''layout''));?>`


    `CSS`函数通常用于布局中，但也可以在单个视图文件中调用。


    ### `div`


    此函数返回一个格式化的`<div>`标签。其用法相当直接和基础，因为`<div>`标签旨在作为HTML样式和布局的包装器，或作为JavaScript操作的占位符。


    **`div( class[string], text[string], attributes[array], escape[bool] )`**


    - `class` = null: 标签的`class`属性名称。

    - `text` = null: 显示在`<div>`元素内部的文本。

    - `attributes`: 包含要包含在标签中的任何HTML属性；以属性名称为键，属性值为值的数组形式组织。

    - `escape` = false: 如果设置为`true`，`text`参数的内容将进行HTML转义。


    假设我想创建一个独特设计的标签或页面元素，以`<div>`元素显示。`$html->div()`函数可以这样使用：


    `<?=$html->div(''tab'',''Home'');?>`


    输出如下：


    ```html

    <div class="tab">Home</div>

    ```


    如果传递的变量包含了`<div>`标签的内容，我可以使用比纯HTML标记稍少的代码来轻松显示该变量。`div()`函数如下所示：


    `<?=$html->div(''story'',$story[''Story''][''contents'']);?>`


    它比以下代码少用了几个字符：


    `<div class="story"><?=$story[''Story''][''contents''];?></div>`


    此函数通常用作显示`<div>`标签的便捷包装器，并允许你坚持使用PHP而不是HTML（如果你愿意）。


    ### `docType`


    与`$html->charset()`函数类似，此函数主要用在布局中，以避免输入冗长的符合标准的HTML文档类型字符串。


    **`docType( type[string] )`**


    - `type` = ''xhtml-strict'': 要用于`docType`声明的文档类型。有关可在`type`参数中使用的可能文档类型，请参见表9-1。


    **表 9-1.** *可与 `$html->docType()` 函数一起使用的可能文档类型*


    | 参数值           | 文档类型                 |

    |------------------|--------------------------|

    | `html4-strict`   | HTML 4.0 Strict          |

    | `html4-trans`    | HTML 4.0 Transitional    |

    | `html4-frame`    | HTML 4.0 Frameset        |

    | `xhtml-strict`   | XHTML 1.0 Strict         |

    | `xhtml-trans`    | XHTML 1.0 Transitional   |

    | `xhtml-frame`    | XHTML 1.0 Frameset       |

    | `xhtml11`        | XHTML 1.1                |


    通过在布局文件中输入以下内容：


    `<?=$html->docType(''xhtml-strict'');?>`


    文档类型声明将生成为以下字符串：


    ```html

    <!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">

    ```


