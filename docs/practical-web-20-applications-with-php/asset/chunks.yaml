    **Implementing Account Management**


    Earlier in this chapter we implemented the login and logout system for user accounts.
    When a user successfully logged in, the code would redirect them to the page they
    initially requested. In many cases[, this will be their account home page (which
    has the URL http://phpweb20/account).](http://phpweb20/account)


    So far, however, we haven’t actually implemented this action in the AccountController
    class.


    In this section, we will first create this action (indexAction()), although there
    isn’t terribly much that this will do right now. Next, we will update the site
    header template so it has more useful navigation (even if it is still unstyled).
    This will include additional menu options for logged-in users only. Finally, we
