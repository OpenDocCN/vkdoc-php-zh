  trans: "\n# 第 4 章：创建产品目录：第二部分\n\n组件化模板在分析查询字符串后决定显示哪些产品。如果查询字符串中同时包含 `DepartmentID`\
    \ 和 `CategoryID` 参数，则表示应列出该类别下的产品。如果仅包含 `DepartmentID`，则访问者正在浏览某个部门，因此应显示该部门的特色产品。如果没有\
    \ `DepartmentID`，则访问者位于主页，因此应显示目录中的特色产品。\n\n要将 `products_list` 组件化模板与首页集成，你需要创建一个额外的模板文件（`first_page_contents.tpl`），该文件将在后续步骤中实现。\n\
    \n在接下来的练习中创建好 `products_list` 后，你将能够按部门和按类别浏览产品。随后，你将了解如何将产品添加到主网页中。\n\n## 练习：创建\
    \ `products_list` 组件化模板\n\n1. 将 `product_images` 目录从源代码/下载部分（http://www.apress.com）复制到你的项目的\
    \ `hatshop` 文件夹中。\n\n2. 将以下样式添加到 `hatshop.css` 文件中：\n```css\n.paging_text a\n\
    {\n  color: #0000ff;\n  font-size: 11px;\n  font-weight: normal;\n  text-decoration:\
    \ underline;\n}\n\n.paging_text a:hover\n{\n  color: #0000ff;\n}\n\np.right\n\
    {\n  clear: right;\n  float: right;\n  width: 260px;\n  margin: 0px 0px 15px 0px;\n\
    }\n\np.right br\n{\n  clear: left;\n}\n\np.left\n{\n  clear: left;\n  float:left;\n\
    \  width: 260px;\n  margin: 0px 0px 15px 0px;\n  padding: 0px;\n}\n\np.left br\n\
    {\n  clear: left;\n}\n\n.product_image\n{\n  clear: none;\n  float: left;\n  margin:\
    \ -10px 5px 0px 0px;\n  padding: 10px 0px 0px 0px;\n}\n\na.product_name\n{\n \
    \ color: #000000;\n  font-family: arial, tahoma, verdana;\n  font-size: 14px;\n\
    }\n\na.product_name:hover\n{\n  color: #ff0000;\n  font-family: arial, tahoma,\
    \ verdana;\n  font-size: 14px;\n}\n\n.price\n{\n  font-weight: bold;\n}\n\n.old_price\n\
    {\n  color: #ff0000;\n  font-weight: normal;\n  text-decoration: line-through;\n\
    }\n```\n\n3. 在 `presentation/templates` 文件夹内创建一个名为 `products_list.tpl` 的新 Smarty\
    \ 设计模板，并向其中添加以下代码：\n```smarty\n{* products_list.tpl *}\n{load_products_list assign=\"\
    products_list\"}\n\n{if $products_list->mrHowManyPages > 1}\n<br />\n<span class=\"\
    paging_text\">\n第 {$products_list->mPageNo} 页，共 {$products_list->mrHowManyPages}\
    \ 页\n{if $products_list->mPreviousLink}\n<a href=\"{$products_list->mPreviousLink|prepare_link:\"\
    http\"}\">上一页</a>\n{else}\n上一页\n{/if}\n{if $products_list->mNextLink}\n<a href=\"\
    {$products_list->mNextLink|prepare_link:\"http\"}\">下一页</a>\n{else}\n下一页\n{/if}\n\
    </span>\n{/if}\n<br />\n\n{section name=k loop=$products_list->mProducts}\n{assign\
    \ var=direction_p value=\"左对齐\"}\n{if $smarty.section.k.index != 0 &&\n($smarty.section.k.index\
    \ + 1) % 2 == 0}\n{assign var=direction_p value=\"右对齐\"}\n{else}\n<br />\n{/if}\n\
    \n<p class=\"{$direction_p}\">\n<a class=\"product_name\"\nhref=\"{$products_list->mProducts[k].link|prepare_link:\"\
    http\"}\">\n{$products_list->mProducts[k].name}\n</a>\n<br />\n<a href=\"{$products_list->mProducts[k].link|prepare_link:\"\
    http\"}\">\n<img src=\"product_images/{$products_list->mProducts[k].thumbnail}\"\
    \nborder=\"0\" width=\"120\" alt=\"产品图片\" class=\"product_image\" />\n</a>\n<span\
    \ class=\"product_description\">\n{$products_list->mProducts[k].description}\n\
    </span>\n<br /><br />\n<span>价格：</span>\n{if $products_list->mProducts[k].discounted_price\
    \ == 0}\n<span class=\"price\">\n{else}\n<span class=\"old_price\">\n{/if}\n${$products_list->mProducts[k].price}\n\
    </span>\n{if $products_list->mProducts[k].discounted_price != 0}\n<span class=\"\
    price\">\n${$products_list->mProducts[k].discounted_price}\n</span>\n{/if}\n</p>\n\
    {/section}\n```\n"
- fmt: "### 4. Now you must create the template plugin file for the `products_list.tpl`\
    \ template. Create a new file named `function.load_products_list.php` in the `presentation/smarty_plugins`\
    \ folder, and add the following code to it:\n\n```php\n<?php\n\n// Plugin functions\
    \ inside plugin files must be named: smarty_type_name\nfunction smarty_function_load_products_list($params,\
    \ $smarty)\n{\n  // Create ProductsList object\n  $products_list = new ProductsList();\n\
    \  $products_list->init();\n\n  // Assign template variable\n  $smarty->assign($params['assign'],\
    \ $products_list);\n}\n\nclass ProductsList\n{\n  // Public variables to be read\
    \ from Smarty template\n  public $mProducts;\n  public $mPageNo;\n  public $mrHowManyPages;\n\
    \  public $mNextLink;\n  public $mPreviousLink;\n\n  // Private members\n  private\
    \ $_mDepartmentId;\n  private $_mCategoryId;\n\n  // Class constructor\n  public\
    \ function __construct()\n  {\n    // Get DepartmentID from query string casting\
    \ it to int\n    if (isset ($_GET['DepartmentID']))\n      $this->_mDepartmentId\
    \ = (int)$_GET['DepartmentID'];\n\n    // Get CategoryID from query string casting\
    \ it to int\n    if (isset ($_GET['CategoryID']))\n      $this->_mCategoryId =\
    \ (int)$_GET['CategoryID'];\n\n    // Get PageNo from query string casting it\
    \ to int\n    if (isset ($_GET['PageNo']))\n      $this->mPageNo = (int)$_GET['PageNo'];\n\
    \    else\n      $this->mPageNo = 1;\n  }\n\n  public function init()\n  {\n \
    \   /* If browsing a category, get the list of products by calling the\n     \
    \  GetProductsInCategory business tier method */\n    if (isset ($this->_mCategoryId))\n\
    \      $this->mProducts = Catalog::GetProductsInCategory(\n        $this->_mCategoryId,\
    \ $this->mPageNo, $this->mrHowManyPages);\n\n    /* If browsing a department,\
    \ get the list of products by calling the\n       GetProductsOnDepartmentDisplay\
    \ business tier method */\n    elseif (isset ($this->_mDepartmentId))\n      $this->mProducts\
    \ = Catalog::GetProductsOnDepartmentDisplay(\n        $this->_mDepartmentId, $this->mPageNo,\
    \ $this->mrHowManyPages);\n\n    /* If browsing the first page, get the list of\
    \ products by calling the\n       GetProductsOnCatalogDisplay business tier method\
    \ */\n    else\n      $this->mProducts = Catalog::GetProductsOnCatalogDisplay(\n\
    \        $this->mPageNo, $this->mrHowManyPages);\n\n    /* If there are subpages\
    \ of products, display navigation controls */\n    if ($this->mrHowManyPages >\
    \ 1)\n    {\n      // Read the query string\n      $query_string = getenv('QUERY_STRING');\n\
    \n      // Find if we have PageNo in the query string\n      $pos = stripos($query_string,\
    \ 'PageNo=');\n\n      /* If there is no PageNo in the query string\n        \
    \ then we're on the first page */\n      if ($pos == false)\n      {\n       \
    \ $query_string .= '&PageNo=1';\n        $pos = stripos($query_string, 'PageNo=');\n\
    \      }\n\n      // Read the current page number from the query string\n    \
    \  $temp = substr($query_string, $pos);\n      sscanf($temp, 'PageNo=%d', $this->mPageNo);\n\
    \n      // Build the Next link\n      if ($this->mPageNo >= $this->mrHowManyPages)\n\
    \        $this->mNextLink = '';\n      else\n      {\n        $new_query_string\
    \ = str_replace('PageNo=' . $this->mPageNo,\n          'PageNo=' . ($this->mPageNo\
    \ + 1),\n          $query_string);\n        $this->mNextLink = 'index.php?' .\
    \ $new_query_string;\n      }\n\n      // Build the Previous link\n      if ($this->mPageNo\
    \ == 1)\n        $this->mPreviousLink = '';\n      else\n      {\n        $new_query_string\
    \ = str_replace('PageNo=' . $this->mPageNo,\n          'PageNo=' . ($this->mPageNo\
    \ - 1),\n          $query_string);\n        $this->mPreviousLink = 'index.php?'\
    \ . $new_query_string;\n      }\n    }\n\n    // Build links for product details\
    \ pages\n    $url = $_SESSION['page_link'];\n    if (count($_GET) > 0)\n     \
    \ $url = $url . '&ProductID=';\n    else\n      $url = $url . '?ProductID=';\n\
    \n    for ($i = 0; $i < count($this->mProducts); $i++)\n    {\n      $this->mProducts[$i]['link']\
    \ =\n        $url . $this->mProducts[$i]['product_id'];\n    }\n  }\n}\n?>\n```\n\
    \n### 5. Add the following code at the beginning of `index.php`, after the reference\
    \ to `app_top.php` (`app_top.php` activates session handling, which is required\
    \ for the following code to work). This code makes sure to always save the link\
    \ to the current page if that page is not a product details page. In other words,\
    \ `$_SESSION['page_link']` will always contain the link to the last visited page\
    \ which is not a product details page. You need to save this value to implement\
    \ the Continue Shopping button in the product details page, which needs to forward\
    \ the visitor to the previously visited page.\n\n```php\n<?php\n// Load Smarty\
    \ library and config files\nrequire_once 'include/app_top.php';\n\n/* If not visiting\
    \ a product page, save the link to the current page\n   in the page_link session\
    \ variable; it will be used to create the\n   Continue Shopping link in the product\
    \ details page and the links\n   to product details pages */\nif (!isset ($_GET['ProductID']))\n\
    \  $_SESSION['page_link'] = substr(getenv('REQUEST_URI'),\n    strrpos(getenv('REQUEST_URI'),\
    \ '/') + 1,\n    strlen(getenv('REQUEST_URI')) - 1);\n\n// Load Smarty template\
    \ file\n$page = new Page();\n```\n\n### 6. Open `presentation/templates/department.tpl`\
    \ and replace\n\n```\n<br />\nPlace list of products here\n```\n\nwith\n\n```\n\
    {include file=\"products_list.tpl\"}\n```\n\n### 7. Load your project in your\
    \ favorite browser, navigate to one of the departments, and then select a category\
    \ from a department. Also, find a category with more than four products to test\
    \ that the paging functionality works, as shown earlier in Figure 4-8.\n\n**How\
    \ It Works: The products_list Componentized Template**  \nBecause most functionality\
    \ regarding the products list has already been implemented in the data and business\
    \ tiers, this task was fairly simple. The Smarty design template file (`products_list.tpl`)\
    \ contains the layout to be used when displaying products, and its template plugin\
    \ file (`function.load_products_list.php`) gets the correct list of products to\
    \ display.\n\nThe constructor in `function.load_products_list.php` (the `ProductsList`\
    \ class) creates a new instance of the business tier object (`Catalog`) and retrieves\
    \ `DepartmentID`, `CategoryID`, and `PageNo` from the query string, casting them\
    \ to `int` as a security measure. These values are used to decide which products\
    \ to display:\n\n```php\n// Class constructor\npublic function __construct()\n\
    {\n  // Get DepartmentID from query string casting it to int\n  if (isset ($_GET['DepartmentID']))\n\
    \    $this->_mDepartmentId = (int)$_GET['DepartmentID'];\n\n  // Get CategoryID\
    \ from query string casting it to int\n  if (isset ($_GET['CategoryID']))\n  \
    \  $this->_mCategoryId = (int)$_GET['CategoryID'];\n\n  // Get PageNo from query\
    \ string casting it to int\n  if (isset ($_GET['PageNo']))\n    $this->mPageNo\
    \ = (int)$_GET['PageNo'];\n  else\n    $this->mPageNo = 1;\n}\n```\n\nThe `init()`\
    \ method, which continues the constructor’s job, starts by retrieving the requested\
    \ list of products. It decides what method of the business tier to call by analyzing\
    \ the `mCategoryId` and `mDepartmentId` members (which, thanks to the constructor,\
    \ represent the values of the `CategoryID` and `DepartmentID` query string parameters).\n\
    \nIf `CategoryID` is present in the query string, it means the visitor is browsing\
    \ a category, so `GetProductsInCategory` is called to retrieve the products in\
    \ that category. If only `DepartmentID` is present, `GetProductsOnDepartmentDisplay`\
    \ is called to retrieve the department’s featured products. If not even `DepartmentID`\
    \ is present, this means the visitor is on the main page, and `GetProductsOnCatalogDisplay`\
    \ is called to get the products to be featured on the first page of the site:\n\
    \n```php\npublic function init()\n{\n```"
