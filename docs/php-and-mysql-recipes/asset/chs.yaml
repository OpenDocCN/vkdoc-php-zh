  $response_text\n</pre>\n\n</body>\n</html>\nHEREDOC;\n\n# 第 15 章 ■ 使用 JSON 进行数据交换\n\
  \n请注意 JavaScript 部分中的美元符号已被转义。美元符号用作 `jQuery()` 函数的简写 `$()`，也出现在某些变量名中，但由于 PHP 会在\
  \ `HEREDOC` 块中进行变量替换，这些未在 PHP 作用域中定义的变量将被替换为空字符串。\n\n表单包含了用于输入 URL、方法、响应显示方式以及单个参数的键/值的字段。如果需要更多参数，用户可以点击\
  \ `添加参数` 按钮，表单将会扩展。\n\n当表单提交后，PHP 端会根据提交的数据创建一个 HTTP 请求，并在 HTML 文档的预格式化区域显示来自 API\
  \ 调用的响应。\n\n## 配方 15-6. API 身份验证\n\n### 问题\n\n对 API 的用户进行身份验证的最佳方式是什么？\n\n### 解决方案\n\
  \n首先，在调用 API 时你绝不应该以明文形式发送用户名和密码，并且也绝不应该将任何身份验证参数包含在 URI 中，因为这些参数会被服务器记录。这些信息应始终作为请求头或请求体的一部分发送。\n\
  \nAPI 提供者通常会为每个用户发放一个应用密钥或其他唯一标识。这通常是某种哈希值，无法关联到特定的用户账户。有些网站还会提供一个密钥代码，用于生成请求的哈希值，但该密钥代码不应随请求一起发送。服务器知道这个密钥，可以在服务器端生成哈希值，并与请求中包含的哈希值进行比较。如果两者匹配，服务器就可以假定请求者就是其所声称的身份。\n\
  \n哈希运算可以使用部分请求参数进行，但也可以包含诸如请求者的公网 IP 或用户代理字符串等信息，只要客户端和服务器使用相同的数据集来创建哈希值即可。\n```\n\
  \n\n某些 API 要求客户端在每个请求上都进行身份验证，但服务器也可以在响应中包含一个会话令牌，来自同一客户端且包含该会话令牌的任何后续请求都将被视为有效。服务器可能会使用请求中的额外参数（如用户代理字符串和\
  \ IP 地址）来验证会话令牌。如果这些参数在请求之间发生变化，服务器将使会话失效。\n\n### 工作原理\n\n有多种生成应用密钥和机密（App Keys\
  \ and Secrets）的方法。应用密钥可以通过对与账户相关的某些数据进行 SHA256 哈希运算来生成。\n\n```php\n<?php\n\n$appkey\
  \ = hash('sha256', $email . $first_name, $date);\n```\n\n在这个例子中，拼接电子邮件地址、名字和某个日期表示形式会创建一个字符串，然后用该字符串生成一个哈希值。这个哈希值随后会与账户一起存储。\n\
  \n对账户中用户唯一的不同值进行哈希运算可以生成一个机密，该机密仅由服务器和客户端知晓，并且永远不会作为请求的一部分被包含。\n\n```php\n<?php\n\
  \n$secret = hash('sha1', $account_id . $email);\n```\n\n在服务器端，应用密钥和机密将作为附加的账户信息保存。一个好的做法是，在生成机密时，只在网页上显示一次，以防止多次显示。如果用户忘记了机密，则应生成一个新的。\n\
  \n客户端和服务器之间必须就如何生成哈希值达成一致。这可以通过将所有参数作为字符串，加上机密，然后对该字符串生成哈希值来实现。该哈希值随后作为附加参数添加到请求中。在服务器端，除了哈希值之外的所有参数将被组合成类似的字符串，并使用应用密钥在数据库中查找机密，从而生成哈希值以验证提供的哈希值。\n\
  \n下一个示例展示了客户端如何使用包含 `$appkey` 和 `$secret` 变量的包含文件。\n\n确保包含文件存储在 Web 根目录之外，以防止从浏览器访问它。\n\
  \n```php\n<?php\n\n// 15_7.php\n\nrequire \"api_credentials.inc\";\n\n$params =\
  \ [\n\n\"appkey=$appkey\",\n\n\"article=1\"\n\n];\n\n$hash = hash('sha256', implode(\"\
  \", $params) . $secret);\n\n$params['hash'] = $hash;\n\n$options = array('http'\
  \ =>\n\narray(\n\n'method' => \"POST\",\n\n'content' => implode(\"&\", $params)\n\
  \n)\n\n);\n\n$context = stream_context_create($options);\n\n$response = file_get_contents(\"\
  http://example.com/articels\", false, $context);\n```\n\n如果 API 调用的服务器端由 PHP 脚本处理，其处理请求的方式如下：\n\
  \n```php\n<?php\n\n// 16_8.php\n\n$params = [\n\n\"appkey={$_POST['appkey']}\",\n\
  \n\"article={$_POST['article']}\"\n\n];\n\n$secret = GetSecret($_POST['appkey']);\n\
  \n$hash = hash('sha256', implode(\"\", $params) . $secret);\n\nif ($hash == $_POST['hash'])\
  \ {\n\n// Request is allowed\n\n}\n\nelse {\n\n// Error – the hash did not match\n\
  \n}\n```\n\n`GetSecret()` 函数调用应执行数据库查找，以根据提供的应用密钥获取机密的数值。\n\n## 第 16 章 使用 MySQL\
  \ 数据库\n\n数据库在 Web 应用程序中扮演着重要角色，这些应用程序的内容不断变化，并根据用户的偏好、位置或其他参数进行提供。数据库也用于以博客评论、创建账户时的个人信息等形式从用户那里收集信息。\n\
  \nPHP 以一组函数的形式支持多种不同类型的数据库，用于连接、执行查询以及获取数据库中表和列的信息。其中一些数据库扩展是过程式的，而另一些则提供了面向对象的接口。名为\
  \ MySQL 的开源数据库是与 PHP 一起使用最广泛的数据库，Facebook、Twitter 和 Wikipedia 等大小公司都在使用它。该扩展在大多数发行版中默认提供。\n\
  \n`mysql` 扩展已被弃用，并由 `mysqli` 扩展取代。其中的 `I` 代表 Improved（改进版）。\n\n从 PHP 7 开始，不再提供 `mysql`\
  \ 扩展。\n\n\n\n\nMySQL 数据库的源代码目前由 Oracle 公司拥有和维护，而 MySQL 原始团队开发了一个名为 MariaDB 的新开源版本。该数据库与\
  \ MySQL API 兼容，可作为 MySQL 的即插即用替代品。目前 CentOS 7 提供的标准数据库正是 MariaDB。\n\n另一个优势在于其体积小巧，这使得\
  \ MySQL 能够用于硬件资源有限的环境或嵌入式系统。\n\n本章将演示如何使用 `mysqli` 扩展从 PHP 脚本执行常见的数据库操作。\n\n## 食谱\
  \ 16-1. 连接 MySQL\n\n### 问题\n\n尽管数据库中的 MySQL 数据存储在文件系统中，但无法通过使用 `fopen()` 或 `file_get_contents()`\
  \ 函数打开并读取/写入文件来访问。要发送命令并接收数据，需要让数据库服务器保持运行，并在客户端与服务器之间建立 TCP/IP 连接。如何在 PHP 中实现这一点呢？\n\
  \n### 解决方案\n\n`mysqli` 扩展包含一个名为 `mysqli_connect()` 的函数。该函数需要主机名、用户 ID、密码、数据库名称、TCP\
  \ 端口和套接字作为参数。如果连接成功，它将返回一个连接资源；如果连接失败，则返回 `false`。\n\n也可以使用 PHP 数据对象（`PDO`）扩展来连接\
  \ MySQL。\n\n© Frank M. Kromann 2016  \nF.M. Kromann, *PHP and MySQL Recipes*, DOI\
  \ 10.1007/978-1-4842-0605-8_16\n\n第 16 章 ■ 使用 MySQL 数据库\n\n所有参数都可以通过在 `php.ini`\
  \ 中提供的配置选项来设置默认值。这些默认值定义如下：\n\n```\nmysqli.default_host = \"127.0.0.1\"\nmysqli.default_user\
  \ = \"db_user\"\nmysqli.default_pw = \"secret\"\nmysqli.default_port = 3306\nmysqli.default_socket\
  \ = \"\"\n```\n\n至少需要提供主机名、用户名和密码的值。如果指定了数据库，则会尝试连接到该数据库。随时可以使用 `mysqli_select_db()`\
  \ 函数切换到同一主机下的其他数据库。\n\n如果数据库服务器和 Web 服务器运行在同一台机器上，我们可以使用 `localhost` 或 IP 地址 `127.0.0.1`\
  \ 作为数据库服务器的主机名。如果两个服务位于不同的服务器上，则需要提供远程主机名或 IP 地址。在高流量环境中，使用 IP 地址可以提供更好的性能。在这种情况下，客户端无需在每次连接请求时都执行\
  \ DNS 查询来将主机名解析为 IP 地址。\n\n### 工作原理\n\n要连接数据库，我们需要在服务器上创建一个数据库。可以通过在服务器上使用 `mysql`\
  \ 命令来创建。\n\n```\nmysql –u root –p\n```\n\n该命令将使用 `root` 用户连接到本地主机上的 MySQL（或 MariaDB）服务器。\n\
  \n连接将是交互式的，可用于创建新的数据库、表，以及添加、更新或删除数据。\n\n在此示例中，我们将创建一个名为 `music` 的表来存储专辑、曲目和艺术家信息。第一步是创建数据库：\n\
  \n```\ncreate database music;\n```\n\n使用命令 `show databases;` 可以获取服务器上所有可用数据库的列表。\n\
  \n```\nMariaDB [mysql]> show databases;\n+--------------------+\n| Database    \
  \       |\n+--------------------+\n| information_schema |\n| book              \
  \ |\n| music              |\n| mysql              |\n| performance_schema |\n+--------------------+\n\
  5 rows in set (0.00 sec)\n```\n\n第 16 章 ■ 使用 MySQL 数据库\n\n还需要创建一个数据库用户，并授予该用户对数据库的访问权限。这是从\
  \ PHP 连接数据库时将使用的用户账户。\n\n```\nMariaDB [mysql]> CREATE USER 'php'@'localhost' IDENTIFIED\
  \ BY 'secret';\nQuery OK, 0 rows affected (0.01 sec)\n```\n\n这将创建一个名为 `php`、密码为\
  \ `secret` 的用户账户。最后一步是授予 `php` 用户对 `music` 数据库的访问权限。\n\n```\nMariaDB [mysql]> GRANT\
  \ ALL PRIVILEGES ON music . * TO 'php'@'localhost';\nQuery OK, 0 rows affected (0.00\
  \ sec)\n```\n\n该语句将授予该用户对 `music` 数据库中所有表的访问权限。\n\n\n\n\n退出`mysql`工具，然后使用新帐户重新登录：\n\
  \n```bash\nmysql -u php -p\n```\n\n输入密码（`secret`），然后输入显示数据库的命令。\n\n```\nMariaDB\
  \ [(none)]> show databases;\n+--------------------+\n| Database           |\n+--------------------+\n\
  | information_schema |\n| music              |\n+--------------------+\n2 rows in\
  \ set (0.01 sec)\n```\n\n这将仅列出用户有权访问的数据库。`information_schema`数据库由 MySQL 用于存储有关表、列、键和索引等数据，这是一个所有用户都可以访问（只读）的数据库。\n\
  \n为了在数据库中存储数据，我们需要创建一个或多个表。每个表定义了多个不同数据类型（如整数、字符、日期时间等）的列。数据以行的形式添加到表中。\n\n每行将包含每个列的一个值。如果模式定义允许，某些列的值可以为空，但所有行将具有相同数量的列。\n\
  \n```\nMariaDB [music]> create table album (\n    -> id int auto_increment,\n  \
  \  -> title varchar(250) not null,\n    -> description varchar(2000),\n    -> primary\
  \ key(id)\n    -> );\nQuery OK, 0 rows affected (0.02 sec)\n```\n\n第 16 章 ■ 使用 MySQL\
  \ 数据库\n\n`show tables;`和`describe album;`命令可用于显示可用表的列表以及`album`表的定义。\n\n```\nMariaDB\
  \ [music]> show tables;\n+-----------------+\n| Tables_in_music |\n+-----------------+\n\
  | album           |\n+-----------------+\n1 row in set (0.00 sec)\n\nMariaDB [music]>\
  \ describe album;\n+-------------+---------------+------+-----+---------+----------------+\n\
  | Field       | Type          | Null | Key | Default | Extra          |\n+-------------+---------------+------+-----+---------+----------------+\n\
  | id          | int(11)       | NO   | PRI | NULL    | auto_increment |\n| title\
  \       | varchar(250)  | NO   |     | NULL    |                |\n| description\
  \ | varchar(2000) | YES  |     | NULL    |                |\n+-------------+---------------+------+-----+---------+----------------+\n\
  3 rows in set (0.00 sec)\n```\n\n包含在主键中的列不能有`NULL`值，因此无需在任何属于主键的列上指定禁止空值的约束。\n\n\
  `auto_increment`约束用于在`INSERT`语句未提供值时自动为列分配值。\n\n现在我们有了一个包含单个表的数据库，以及一个可用于从 PHP 脚本连接和操作数据库的用户。在过程化设置中，这可能类似于`16_1.php`示例。\n\
  \n```php\n<?php\n// 16_1.php\n$con = mysqli_connect('127.0.0.1', 'php', 'secret',\
  \ 'music');\nif (mysqli_connect_error()) {\n    die(\"Error connecting: \" . mysqli_connect_errno()\
  \ . ' '\n        . mysqli_connect_error() . \"\\n\");\n}\nelse {\n    echo \"Connected\
  \ to music\\n\";\n}\n```\n\n作为一种替代方案，相同的功能可以通过面向对象的方法实现。\n\n```php\n<?php\n// 16_2.php\n\
  $mysqli = new mysqli('127.0.0.1', 'php', 'secret', 'music');\nif ($mysqli->connect_error)\
  \ {\n    die(\"Error connecting: {$mysqli->connect_errno} {$mysqli->connect_error}\\\
  n\");\n}\nelse {\n    echo \"Connected to music\\n\";\n}\n```\n\n第 16 章 ■ 使用 MySQL\
  \ 数据库\n\n如果脚本作为来自 Web 服务器的请求调用，则无需断开连接或释放任何资源。当脚本终止时，PHP 会自动处理这些。如果脚本运行时间较长或不再需要数据库连接，最好关闭连接。这可以通过`mysqli_close()`函数或`mysqli::close()`方法完成。\n\
  \n```php\n<?php\n// 16_3.php\n$con = mysqli_connect('127.0.0.1', 'php', 'secret',\
  \ 'music');\nif (mysqli_connect_error()) {\n    die(\"Error connecting: \" . mysqli_connect_errno()\
  \ . ' '\n        . mysqli_connect_error() . \"\\n\");\n}\nelse {\n    echo \"Connected\
  \ to music\\n\";\n    mysqi_close($con);\n}\n```\n\n或者使用面向对象的代码：\n\n```php\n<?php\n\
  // 16_4.php\n$mysqli = new mysqli('127.0.0.1', 'php', 'secret', 'music');\nif ($mysqli->connect_error)\
  \ {\n    die(\"Error connecting: {$mysqli->connect_errno} {$mysqli->connect_error}\\\
  n\");\n}\nelse {\n    echo \"Connected to music\\n\";\n    $mysqli->close();\n}\n\
  ```\n\n配方 16-2。持久连接\n\n问题\n\n\n\n"
- "# 连接数据库\n\n连接数据库可能需要花费一些时间，如果所有或大多数对 Web 服务器的请求都使用同一个数据库，那么保持一个连接池并反复重用这些连接是合理的。\n\
  \n### 解决方案\n\n各种数据库扩展中的`持久连接`功能已经存在很长时间了。尽管持久连接可以节省一些时间，但也可能引发问题。如果使用持久连接锁定了某个表，而脚本无法释放该锁，那么该表可能会一直保持锁定状态，直到手动终止连接（重启\
  \ Web 服务器，可能还需要重启数据库服务器），因此需谨慎使用。\n\n在较旧的数据库驱动中，曾使用专门的连接函数（例如用`mysql_pconnect()`代替`mysql_connect()`），但在`mysqli`驱动中，持久连接是通过在主机名前添加前缀`'p:'`来创建的。\n\
  \n允许的持久连接数量可在`php.ini`中配置，并且应匹配网站的同时请求数。如果该数值设置过低，某些用户可能会遇到连接问题。\n\n当 Web 服务器关闭或重启时，持久连接会被关闭。如果持久连接是由\
  \ CLI 模式下运行的脚本创建的，那么当脚本终止时连接也会关闭。在这种情况下，持久连接和非持久连接没有区别。\n\n### 工作原理\n\n以下示例展示了如何使用主机名的`'p:'`前缀来创建持久连接。\n\
  \n```php\n<?php\n// 16_5.php\n\n$mysqli = new mysqli('p:127.0.0.1', 'php', 'secret',\
  \ 'music');\n\nif ($mysqli->connect_error) {\n    die(\"Error connecting: {$mysqli->connect_errno}\
  \ {$mysqli->connect_error}\\n\");\n}\nelse {\n    echo \"Connected to music\\n\"\
  ;\n}\n```\n\n不要在持久链接上使用`close()`函数，因为这会将其从内存中移除。\n\n可以使用`phpinfo()`函数来显示`mysqli`连接的状态。`Active\
  \ Persistent Links` 是当前正在使用的链接数。`Inactive Persistent Links` 是当前未使用但可用的链接数，而`Active\
  \ Links` 是当前正在使用的非持久链接数。\n\n### `mysqli`\n\n- **`MysqlI 支持`**: 已启用\n- **`客户端 API\
  \ 库版本`**: `mysqlnd 5.0.12-dev - 20150407 - $Id: d8daadaf41e3cd81d7c6ae96c6091fd15b2c9382\
  \ $`\n- **`活动持久链接`**\n- **`非活动持久链接`**\n- **`活动链接`**\n\n"
- "# 配方 16-3. 获取数据\n\n### 问题\n\n数据库使用内部格式存储数据，并优化了索引和内存的使用，以便基于查询提取数据。如果使用`mysql`命令行工具，查询结果会以文本形式列在控制台上。那么，如何将数据提取到\
  \ PHP 变量中，以便在脚本中使用这些数据执行操作或生成输出呢？\n\n### 解决方案\n\nSQL 数据库的矩形网格特性可以很容易地在 PHP 数组中表示。这将是一个数组的数组。外层数组对应结果中的行，内层数组代表每一行中所有列的值。\n\
  \n### 工作原理\n\n为了在表中有数据可供获取，我们首先需要插入一些数据。使用`mysql`命令行工具执行以下命令：\n\n```sql\nuse music;\n\
  \ninsert into album (title) values('Yellow Submarine');\ninsert into album (title)\
  \ values('Sgt. Pepper''s Lonely Hearts Club Band');\ninsert into album (title) values('Help');\n\
  insert into album (title) values('Abbey Road');\n```\n\n为了验证数据，从表中查询所有列：\n\n```sql\n\
  MariaDB [music]> select * from album;\n+----+---------------------------------------+-------------+\n\
  | id | title                                 | description |\n+----+---------------------------------------+-------------+\n\
  |  1 | Yellow Submarine                      | NULL        |\n|  2 | Sgt. Pepper's\
  \ Lonely Hearts Club Band | NULL        |\n|  3 | Help                         \
  \         | NULL        |\n|  4 | Abbey Road                            | NULL \
  \       |\n+----+---------------------------------------+-------------+\n4 rows\
  \ in set (0.00 sec)\n```\n\n\n\n注意第二条专辑的插入语句中，撇号处有两个引号。这是因为单引号是字符串分隔符，为了插入单引号，必须对其进行转义，以告知解析器这并非字符串的结束。\n\
  \n`Id`列是自动添加的，因为插入语句未提供该列；`description`字段未指定，因此显示为`NULL`值。\n\n下一个示例演示如何创建扩展`mysqli`类的类。\n\
  \n```php\n<?php\n\n// 16_6.php\n\nini_set('display_errors', 1);\n\nclass music extends\
  \ mysqli {\n\nfunction __construct() {\n\nparent::__construct('127.0.0.1', 'php',\
  \ 'secret', 'music');\n\nif ($this->connect_error) {\n\ndie(\"Unable to connect\
  \ to music\\n\");\n\n}\n\n}\n\nfunction getAlbums() {\n\n$albums = [];\n\n$result\
  \ = $this->Query(\"select * from album;\");\n\nif ($result) {\n\nwhile($row = $result->fetch_assoc())\
  \ {\n\n$albums[] = $row;\n\n}\n\n$result->close();\n\n}\n\nreturn $albums;\n\n}\n\
  \n}\n\n$music = new music();\n\nprint_r($music->getAlbums());\n```\n\n`music`类的构造函数不接受任何参数，但它会使用一些硬编码参数（主机、用户、密码和数据库）调用父类的构造函数。`getAlbums()`方法执行查询`\"\
  select * from album;\"`，如果查询成功执行，它会循环遍历结果，并将每一行插入到一个数组中，最后返回该数组。在函数返回前关闭结果集，这会释放查询所使用的任何内存。\n\
  \n此脚本的输出如下所示：\n\n```\nArray\n(\n    [0] => Array\n        (\n            [id] =>\
  \ 1\n            [title] => Yellow Submarine\n            [description] =>\n   \
  \     )\n\n    [1] => Array\n        (\n            [id] => 2\n            [title]\
  \ => Sgt. Pepper's Lonely Hearts Club Band\n            [description] =>\n     \
  \   )\n\n    [2] => Array\n        (\n            [id] => 3\n            [title]\
  \ => Help\n            [description] =>\n        )\n\n    [3] => Array\n       \
  \ (\n            [id] => 4\n            [title] => Abbey Road\n            [description]\
  \ =>\n        )\n\n)\n```\n\n有几种不同的函数可以从结果集中获取数据。这里使用的是`fetch_assoc()`。它会为每一行返回一个关联数组。这就是为什么内部数组中的每个元素都有与所选列名匹配的键。在这个例子中，查询使用了`\"\
  select * from album;\"`来选择所有列，但我们也可以编写`\"select id, title from album;\"`来仅选择前两列。\n\
  \n## Recipe 16-4. 插入数据\n\n### 问题\n\n上一个示例中的类可用于从数据库的特定表中提取数据，但如何添加新行呢？\n\n### 解决方案\n\
