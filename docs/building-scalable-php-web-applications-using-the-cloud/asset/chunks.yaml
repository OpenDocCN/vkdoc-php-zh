  trans: "\n### ![../images/487291_1_En_6_Chapter/487291_1_En_6_Figa_HTML.jpg](img/487291_1_En_6_Figa_HTML.jpg)\
    \ 缓存调试技巧\n\n缓存虽然好处巨大，但也带来了自身的一系列问题。为了更好地调试网页，最好始终准备一组参数，你可以将其传给应用程序以关闭缓存。例如，在我自己的许多应用程序中，在\
    \ URL 中传入 `no_cache=1` 就会关闭缓存。这通常是问题上报时我首先检查的地方。\n\n以下是可能遇到缓存问题的一些迹象，以及相应的处理方法：\n\
    \n- **问题**：即使数据库中有新内容，你的应用程序仍输出旧内容。\n  \n  **诊断**：缓存中保留了过期的内容。\n  \n  **解决方案**：让内容更快过期，或者提供额外的缓存键信息，以便缓存知晓何时需要新数据。\n\
    \n- **问题**：你的应用程序根据参数输出了不恰当的数据。\n  \n  **诊断**：这通常发生在缓存键不够具体时。例如，如果内容以错误的语言输出，那可能意味着你需要将当前语言作为缓存键的一部分。\n\
    \  \n  **解决方案**：在缓存键中添加更多参数，确保真正用唯一键标识每一份独特内容；或者你也可以决定此内容过于特殊，不宜缓存。\n\n- **问题**：同一页面每次刷新时输出不同内容。\n\
    \  \n  **诊断**：每台服务器上的缓存内容因访问时间不同而异。\n  \n  **解决方案**：有几种方法可以解决。你可以 (a) 减少过期时间，(b)\
    \ 增加负载均衡器的“粘性”，确保同一个人始终访问同一台服务器（从而命中同一个缓存），(c) 使用全局（或同步）缓存代替本地缓存，以及 (d) 添加额外的缓存键参数，更好地协调用户从缓存中获取的数据。\n\
    \n- **问题**：缓存并没有像你想象的那样加速应用程序。\n  \n  **诊断**：要么从未命中缓存，要么没有缓存正确的内容。\n  \n  **解决方案**：由于出错的方式有很多，修复方法也很多。这通常发生在每个用户访问不同数据集时，导致没有任何数据能从缓存中取出。可以通过增大缓存容量和/或智能预加载可能被访问的数据到缓存中来修复。你可能还需要延长数据的过期时间。不过，问题也可能出在你需要对数据做大量后处理，这比实际查询耗时更久。\n\
    \n# 7. 数据库复制\n\n有些内容根本无法缓存。临时查询、实时变化的数据、以及访问模式分布在大量不相关页面上的网站，都很难通过缓存来优化。对于此类工作负载，你可以部署更大的数据库服务器，但最终连这些服务器也会达到极限。\n\
    \n因此，许多应用架构都采用数据库复制，即使用多个数据库服务器来处理请求。\n\n## 7.1 数据库复制的类型\n\n根据需求不同，数据库复制有多种类型。基本的复制类型包括：\n\
    \n- **故障转移复制**：在这种配置中，复制服务器不承担负载，但它们确保如果主数据库服务器宕机，有一个包含最新数据的数据库可以立即接管。\n\n- **主/副本复制**：在这种配置中，主数据库是唯一具有读写权限的数据库。副本服务器在主数据库记录数据时（或稍后）接收数据，但它们是主数据库的只读副本。所有更新都发往主数据库，但查询可以发送到主数据库或任何副本服务器。这也被称为“主/从复制”，其中副本数据库被视为“从数据库”。\n\
    \n- **多主复制**：在这种配置中，所有数据库都被视为同等的“主”数据库，可以在其中任何一个上执行写入操作。任何数据库上的写入操作随后会与集群中的其余部分同步。\n\
    \n本章将重点介绍主/副本复制，因为它最容易实现，实际遇到的问题最少，且性价比最高。多主复制很少使用，因为配置、维护和保持高效都很困难，并且很少有数据库支持。即使支持，多主复制也常常引入新的、难以解决的问题，例如数据冲突（即当两个不同服务器上提交了冲突的数据时）。因此，为了保持简洁，本书将聚焦于主/副本配置。\n\
    \n图 7-1 展示了一个典型主/副本架构的概念视图。"
- fmt: '# 7.2 Replicating the PostgreSQL Database


    PostgreSQL’s replication system has advanced quite a bit over the years both in
    features and in ease of use. While it is not *difficult* to use, it does take
    some explanation to understand.


    The built-in PostgreSQL replication system uses a technique known as log streaming
    to replicate. PostgreSQL, in order to guarantee data consistency, creates what
    is known as a write-ahead log, or WAL. Basically, PostgreSQL writes to the WAL
    the changes it is *about* to do and then actually does the changes. This means
    that if the database server powers off during an update, it has a record of what
    it was doing and can simply finish the operation when it comes back on.


    ![../images/487291_1_En_7_Chapter/487291_1_En_7_Fig1_HTML.jpg](images/487291_1_En_7_Chapter/487291_1_En_7_Fig1_HTML.jpg)


    **Figure 7-1** Diagram of a Master/Replica Database Architecture


    Interestingly, this is precisely the information that a replication server would
    also need to know. Therefore, to implement database replication, PostgreSQL simply
    ships the WAL files to the replication servers, which likewise implement the changes.
    This type of replication is known as WAL streaming.


    To accomplish this in our cluster, we need to configure our main database in order
    to receive replication connections. Log in to `dbmaster` as the root user, edit
    the file `/var/lib/pgsql/data/postgresql.conf`, and set the following settings:


    ```

    wal_level = hot_standby

    wal_keep_segments = 32

    max_wal_senders = 4

    hot_standby = on

    ```


    If you are using a later version (9.4 or greater) of PostgreSQL, you will also
    need to set:


    ```

    max_replication_slots = 4

    ```


    However, this setting will break the version of PostgreSQL that ships with CentOS
    7.2 that we are working with in this book.


    These configuration changes accomplish several things:


    *   `wal_level` adjusts PostgreSQL’s “write-ahead log” (i.e., WAL) so that it
    retains enough detail to send everything that a replica server would need.

    *   `wal_keep_segments` keeps enough data from the WAL hanging around after it
    is used so that the replica server can still get to the data if it falls behind.
    We have set this to 32, which is a pretty conservative setting. This allows for
    a new replica to have a lot of time to get fully synchronized and prevents minor
    network glitches and slowdowns from desynchronizing the servers.

    *   `max_wal_senders` should be set to at least the number of replica servers
    plus two (and, if you decide to install a newer PostgreSQL, you may need to set
    `max_replication_slots` to the same value).

    *   `hot_standby = on` allows the replica server to respond to queries.


    Next, we need to add a replicator user to the PostgreSQL database. Type in `psql
    -U postgres` to access the database, then type the following to create the user
    `replicator` for replication (all on one line):


    ```

    CREATE ROLE replicator WITH REPLICATION

    PASSWORD ''mypassword'' LOGIN;

    ```


    Then type `\q` to exit.


    Next, we need to give remote servers permission to open replication connections
    to this server. Add the following line to `/var/lib/pgsql/data/pg_hba.conf`:


    ```

    host replication replicator all md5

    ```


    Now we need to restart the database so that the new settings take effect:


    ```

    systemctl restart postgresql

    ```


    Our server is now completely ready to start taking replication requests. Now we
    can set up the replica server.


    In order to set up a PostgreSQL replica server, the first thing we need to do
    is to create a new Linode node for it to run on by replicating our template node
    using the standard procedure. For this exercise, name the new node `dbreplica`.
    You will also need to add a private IP address to this machine and write it down
    (we will refer to it as `DB.REPLICA.PRIVATE.IP` for the rest of this book).


    Now, boot up `dbreplica` and log in as `root`.


    If you have followed the instructions, this machine should not have PostgreSQL
    running. If it is running, however, you can turn it off with `systemctl stop postgresql`.
    Once PostgreSQL is off, we need to clear out the existing PostgreSQL installation.
    Do that with the following command:


    ```

    rm -rf /var/lib/pgsql/data/*

    ```


    Now we need to request an initial binary backup from the master system as a starting
    point for replication. This is accomplished with the `pg_basebackup` command.
    To generate this initial backup starting point, first switch to the postgres user
    like this:


    ```

    su - postgres

    ```


    Next, issue the following command (all on one line):


    ```

    pg_basebackup -x -U replicator -h DB.MASTER.PRIVATE.IP

    -D /var/lib/pgsql/data

    ```


    It will ask you for the password, and then it will copy the entire PostgreSQL
    instance from the master database, including the configuration files. Next, you
    will need to tweak the configuration files after this step is complete. The `postgresql.conf`
    file that we set up in Chapter [5](#487291_1_En_5_Chapter.xhtml) has a command
    `listen_addresses` which includes the server’s private IP address. Unfortunately,
    since this was copied from the master database, it currently has the master database’s
    private IP address. To fix that, just open up `/var/lib/pgsql/data/postgresql.conf`
    and change the `listen_addresses` configuration to read:


    ```

    listen_addresses = ''localhost,DB.REPLICA.PRIVATE.IP''

    ```


    After this concludes successfully, you need to tell PostgreSQL that this server
    is to be used as a hot standby.


    This is done by telling the server to go into “continuous recovery mode” on startup.
    To do this, we create the file `/var/lib/pgsql/data/recovery.conf` with the following
    contents (the last two lines should both be typed on the same line):


    ```

    standby_mode = ''on''

    primary_conninfo = ''host=DB.MASTER.PRIVATE.IP port=5432

    user=replicator password=mypassword''

    ```


    Once this is all in place, you need to exit back to the root user like this:


    ```

    exit

    ```


    Now that you are the root user again, we need to turn the PostgreSQL database
    back on and make sure it will come on automatically if it reboots:


    ```

    systemctl start postgresql

    systemctl enable postgresql

    ```


    We also need to make sure there is a hole in the firewall to receive database
    connections:


    ```

    firewall-cmd --add-service postgresql

    firewall-cmd --add-service postgresql --permanent

    ```


    At this point, your system is now up and running as a replica server!


    To verify this, run the following command, which will list all of your running
    PostgreSQL processes:


    ```

    ps afxw|grep postgres

    ```


    One of the processes in the list should include the word `recovering` or startup
    in the output. This means that the database is up, active, and feeding off of
    the WAL logs of the master.


    You can also check the log files, which will be in the directory `/var/lib/pgsql/data/pg_log`.
    The end of the log file should say something like “database system is ready to
    accept read only connections” and “streaming replication successfully connected
    to primary.”


    ## A Few Notes On Postgresql Replication


    PostgreSQL implementations are called “instances” and can contain any number of
    databases. If you are following the instructions in this book, your PostgreSQL
    instance only contains one database (actually three, since PostgreSQL always comes
    with a pair of template databases installed, `template0` and `template1`). It
    is easy enough to create a new database using the `createdb` command-line program
    or issuing a `create database` instruction while running `psql`.


    In any case, keep in mind that since the PostgreSQL WAL file is a system-level
    feature (i.e., the WAL files are shared by the entire database instance), PostgreSQL
    streaming replication replicates the entire PostgreSQL instance, not just a single
    database.'
