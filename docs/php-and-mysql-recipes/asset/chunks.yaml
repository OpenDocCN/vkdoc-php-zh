    ## 技巧 8-10. 添加文本


    ### 问题


    在之前的几个技巧中，我们了解了如何在图像上绘图以及将一张图像合并到另一张图像上，但如果想添加文本呢？可以使用字体，还是只能使用系统定义的字体？


    ### 解决方案


    根据 PHP 和 GD 扩展的编译方式，有几种添加文本的选项。基本功能由 `ImageString()` 函数提供。该函数可以使用五种内置字体之一插入字符串，或者您可以使用
    `ImageLoadFont()` 来加载 GD 字体。这些字体文件必须在与其使用的 CPU 架构相同的环境下生成。此函数只能绘制水平文本。


    此外，PHP 可以编译为支持 FreeType。启用此功能后，您可以使用计算机上的任何 TrueType 字体（`.ttf`）在图像上渲染文本。函数 `ImageTTFText()`
    用于使用 TrueType 字体绘制文本。所使用的字体必须位于服务器上，但无需在客户端计算机上安装它们。


    使用 TrueType 字体时，很难知道结果字符串的尺寸（以像素为单位）。尺寸将取决于字体、字号和所写的字符。函数 `ImageTTFBox()` 可用于计算给定文本的包围框尺寸。如果您想检查给定字符串是否适合图像，或者想要居中显示文本，这将非常有用。


    ### 工作原理


    第一个示例展示了如何使用 `ImageString()` 函数向图像添加文本。


    ![Image 25](img/index-224_1.jpg)


    ```php

    // 8_21.php


    $img = ImageCreateTrueColor(250, 50);


    ImageFill($img, 0, 0, 0xffffff);


    ImageString($img, 4, 10, 10, "PHP Recipes", 0);


    $f = $_GET[''f''] ?: ''gif'';


    switch (strtolower($f)) {


    case ''jpg'' :


    case ''jpeg'' :


    header(''Content-Type: image/jpeg'');


    ImageJPEG($img);


    break;


    case ''png'' :


    header(''Content-Type: image/png'');


    ImagePNG($img);


    break;


    default :


    header(''Content-Type: image/gif'');


    ImageGIF($img);


    break;


    }


    ImageDestroy($img);

    ```


