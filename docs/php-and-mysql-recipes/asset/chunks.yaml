    \n与任何输入一样，最佳实践是在使用变量之前验证其类型和内容。这可以防止错误。\n\n## 工作原理\n\n扩展`DeleteRows()`函数，使用两个参数：第一个参数是一个字符串，表示要删除行的表名；第二个参数是一个数组，包含要删除的\
