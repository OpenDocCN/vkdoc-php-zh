- fmt: '# Connecting to Web Services


    Most service providers (including Amazon.com) use `SOAP` or `REST` (or both) to
    expose Web Services to Internet client programs. You can choose to make a Web
    Service request by using either `REST` or `SOAP`, and you get the exact same results
    with both options. In this chapter, you''ll learn how to access ECS 4.0 using
    both `REST` and `SOAP`.


    `REST` (Representational State Transfer) uses carefully crafted URLs with specific
    name-value pairs to call specific methods on the servers. You can find two useful
    articles about `REST` at http://www.xml.com/pub/a/2004/08/11/rest.html and http://www.onlamp.com/pub/a/php/2003/10/30/amazon_rest.html.


    `REST` is considered to be the easiest way to communicate with the Web Services
    that expose this interface. Nonofficial sources say that 85% of ECS clients went
    the `REST` way.


    When using `REST`, all you have to do to perform an Amazon search is to make a
    classical HTTP GET request, and you''ll receive the response in XML format.


    `SOAP` (Simple Object Access Protocol) is an XML-based standard for encoding the
    information transferred in a Web Service request or response. `SOAP` is fostered
    by a number of organizations, including powerful companies such as Microsoft,
    IBM, and Sun.


    When accessing ECS, you can send the request either through `REST` or by sending
    a `SOAP` message. The Web Service will return an XML response with the data you
    requested.


    You''ll learn more about `REST` and `SOAP` by playing with ECS.


    **Note** You need to understand that in this chapter we''ll touch just a bit of
    the functionality provided by the Amazon ECS. A serious discussion on the subject
    would probably need a separate book, but what you''ll see in this chapter is enough
    to get you on the right track. Also, be aware that in this chapter we integrate
    functionality from Amazon.com, but using the same Amazon ECS account, you can
    access services from Amazon.fr, Amazon.ca, Amazon.de, Amazon.co.jp, and Amazon.co.uk.


    ## Creating Your Amazon E-Commerce Service Account


    The official ECS web site is located at http://www.amazon.com/webservices. You
    can find the latest version of the documentation at http://developer.amazonwebservices.com/connect/
    — be sure to bookmark this URL because you''ll find it very useful.


    Before moving on, you need to create your account with the Amazon ECS. To access
    ECS, you need an `Access Key ID`, which identifies your account in the ECS system.
    If you don''t already have one, apply now at http://www.amazon.com/gp/aws/registration/registration-form.html.
    The `Access Key ID` is a 20-character alphanumeric string.


    **Note** Before October 11, 2005, Amazon used to provide something called a `Subscription
    ID`, instead of an `Access Key ID`. The purpose is similar, and if you already
    have a `Subscription ID`, you may continue using it. For any new applications,
    Amazon encourages you to use the `Access Key ID`.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    The `Access Key ID` gives you access to more Amazon Web Services and Alexa Web
    Services (Alexa is a service owned by Amazon), as you can see in Figure 17-2.
    To access some of these services, you''ll also need a `Secret Access Key`, which
    you also get upon registration, but the `Secret Access Key` isn''t required when
    working with ECS.


    **Figure 17-2.** *Amazon Web Services*


    ## Obtaining an Amazon Associate ID


    The `Access Key ID` you created earlier is your key to retrieving data through
    the Amazon ECS. This data allows you to compose the Amazon Super Hats department
    that you saw in Figure 17-1.'
