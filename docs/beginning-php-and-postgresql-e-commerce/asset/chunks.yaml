    **Figure 3-4.** *The departments list*


    The departments list will be the first dynamically generated data in your site
    (the names of the departments will be extracted from the database).


    In this chapter, you’ll implement just the departments list part of the web site.
    After you understand what happens behind the list of departments, you’ll quickly
    implement the other components of the product catalog in Chapter 4.


    In Chapter 2, we discussed the three-tiered architecture that you’ll use to implement
    the web application. The product catalog part of the site makes no exception to
    the rule, and its components (including the departments list) will be spread over
    the three logical layers.


    Figure 3-5 previews what you’ll create at each tier in this chapter to achieve
    a functional departments list.


    Web Server


    Presentation Tier


    Smarty Componentized Template:


    departments_list.tpl (Smarty Design Template)


    function.load_departments_list.php (Smarty function plugin and DepartmentsList
    helper class)


    Business Tier


    PHP Code:


    catalog.php (contains the Catalog class and its GetDepartments method) database_handler.php
    (contains the DatabaseHandler class) error_handler.php (contains the ErrorHandler
    class)


    PostgreSQL Server


    Data Tier


    PostgreSQL function: catalog_get_departments_list()


    Data


    Department


    PostgreSQL


    (data table)


    Data Store


    **Figure 3-5.** *The components of the departments list* So far, you’ve only played
    a bit with the presentation and business tiers in Chapter 2\. Now, when building
    the catalog, you’ll finally meet the final tier and work further with the hatshop


