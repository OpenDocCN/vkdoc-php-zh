  \ HTML 页面是如何将*视图*与*模型*结合起来的。我们可以看到*前端控制器*如何连接模型和视图，并将格式良好的 HTML5 页面输出到浏览器供用户查看。\n\
  \n#### 创建投票控制器\n\n有了一个使用其自身模型、视图和前端控制器设置创建的几乎空白的页面后，我们可以准备一个文件来在浏览器中显示我们的投票示例。坚持使用\
  \ MVC 方法，我们最终将需要一个投票模型、一个投票视图和一个投票控制器。让我们创建一个基本的投票控制器，并从前端控制器（`index.php`）加载它。让我们在\
  \ `controllers` 文件夹中创建一个新文件 `poll.php`。\n\n```php\n<?php\n$info = \"<p>投票即将在此显示</p>\"\
  ;\n?>\n```\n\n**列表 6-2** `poll.php`\n\n接下来，我们将从前端控制器（我们现在将其命名为 `pollindex.php`）加载投票控制器。\n\
  \n```php\n<?php\n$pageData = new stdClass();\n$pageData->setTitle(\"PHP/MySQL 网站投票示例\"\
  );\ninclude_once \"controllers/poll.php\";\n$pageData->setContent($info);\n$pageData->appendContent(\"\
  ...and content goes here.\");\nrequire \"views/page.php\";\necho $page;\n?>\n```\n\
  \n**列表 6-3** `pollindex.php`\n\n此格式应该看起来很熟悉，因为它与本教材中先前的索引示例非常相似。\n\n![](img/323857_3_En_6_Fig11_HTML.jpg)\n\
  \n一张管理网页的图片，显示“投票即将在此显示。”\n\n**图 6-11** `pollindex.php` 的输出\n\n现在，我们的前端控制器和投票控制器正在协同工作，为我们的投票创建一个动态网页！接下来让我们开发投票模型。\n\
  \n#### 创建投票模型\n\n有了初步的投票控制器，我们就可以开发一个初步的投票模型了。\n\n```php\n<?php\nclass Poll {\n\
  \    private $poll_question = \"Are you sure?\";\n    private $yes = 0;\n    private\
  \ $no = 0;\n\n    public function getPollData() {\n        return $this;\n    }\n\
  \n    public function getPollQuestion() : string {\n        return $this->poll_question;\n\
  \    }\n\n    public function getYes() : int {\n        return $this->yes;\n   \
  \ }\n\n    public function getNo() : int {\n        return $this->no;\n    }\n}\n\
  ?>\n```\n\n**列表 6-4** `Poll.class.php`\n\n`Poll` 类定义了所有 `Poll` 对象的蓝图。`Poll` 类包含一个方法\
  \ `getPollData()`，它返回 `$this`。这个返回实现了什么？简单的答案是，它为调用此方法的任何代码返回一个指向该对象的*指针*（内存地址）。这个程序里有什么对象？在调用此方法之前，必须创建此类的一个实例（我们很快就会看到）。一旦创建，就可以调用\
  \ `getPollData()` 方法。此时，一个包含此类内容的对象将在其自己的内存空间中存在。`return` 语句将一个指向该对象的引用（指针）传递给调用该函数的代码。这将允许调用代码直接访问和使用该对象及其内容。\n\
  \n`$pollData` 对象具有 `poll_question`、`yes` 和 `no` 的属性及获取方法。`$pollData` 对象*表示*显示投票所需的所有内容。换句话说，`$pollData`\
  \ *模型化*了投票数据。\n\n#### 创建投票视图\n\n我们现在可以创建一个投票视图来查看我们的数据（包含在我们刚刚创建的模型中）。\n\n```php\n\
  <?php\necho \"\n<div>\n<h2>投票结果</h2>\n<ul>\n<li>\" . $pollData->getYes() . \" 回答是</li>\n\
  <li>\" . $pollData->getNo() . \" 回答否</li>\n</ul>\n</div>\n\";\n?>\n```\n\n**列表 6-5**\
  \ `poll-html.php`\n\n此视图使用获取方法来检索投票结果（目前默认值为零）并将它们放入一个无序列表中。\n\n#### 连接投票视图与投票模型\n\
  \n在创建了初步的投票模型和投票视图后，我们可以更新投票控制器来连接模型和视图，并最终在浏览器中显示一些内容。\n\n```php\n<?php\ninclude_once\
  \ \"models/Poll.class.php\";\n$poll = new Poll();\n$pollData = $poll->getPollData();\n\
  include_once \"views/poll-html.php\";\n?>\n```\n\n**列表 6-6** `newpoll.php`\n\n`Poll`\
  \ 类模型被包含到控制器中，并创建了一个实例（`$poll`）。调用了 `getPollData()` 方法，该方法创建了指向 `$poll` 对象的引用，命名为\
  \ `$pollData`。我们说 `$pollData` 现在是一个指向该对象的指针。我们现在可以使用 `$pollData` 访问对象中的任何内容。最后，附加了显示投票结果的\
  \ `poll-html.php` 视图。就是这样！我们有了一个 MVC 投票。\n\n![](img/323857_3_En_6_Fig12_HTML.jpg)\n\
  \n一个应用程序输出（`newpollindex.php`）显示了投票结果，YES 和 NO 均为 0。\n\n**图 6-12** `newpollindex.php`\
  \ 的输出\n\n也许你非常想问这样一个问题：*为什么我要创建三个不同的文件来显示一个简单的 `<ul>` 元素？* 这是一个完全合理的问题。如果你只是想显示一个包含几个硬编码值的\
  \ `<ul>` 元素，那么 MVC 方法完全是小题大做。最好的方法可能是编写一个简短的 HTML 程序。\n\n这里的重点是引入一个非常简单的示例来介绍 MVC\
  \ 设计模式，这样就不会有过于复杂的代码来掩盖 MVC 的基本原则。通过 MVC 方法，你可以完美地搭建一个数据库驱动的 Web 应用程序。对于如此简单的事情，MVC\
  \ 架构几乎不是必需的，但它确实可以解决你在更复杂的项目中会遇到的一些挑战，例如我们将在下一章开始制作的博客系统。\n\nMVC 将视图与模型和控制器分离开。这意味着我们可以在不更改其他任何内容的情况下更改视图。假设我们不希望投票使用\
  \ `<ul>` 元素。我们可以简单地更改 `views/poll-html.php` 中使用的 HTML 标签，并相信其余代码能正确运行。我们可以在不更改其他任何内容的情况下轻松更改视图。\n\
  \n类似地，我们可以更改内容，同时仍然相信我们的代码能按预期运行。将 `no` 属性设置为 9 将是一项简单的任务。我们只需要更改一小段代码。这个投票应用程序是使用自包含元素构建的。\n\
  \n#### 从 PHP 连接到 MySQL/MariaDB\n\nMVC 架构将使连接到数据库并使用数据库驱动的数据进行投票变得相当简单。一旦建立了这样的连接，我们就可以从数据库中检索数据并使用\
  \ HTML 进行查看。这就是 MVC 数据库驱动网站的精髓。\n\n##### PHP 数据对象 (PDO)\n\nPHP 提供了几种访问 MySQL/MariaDB\
  \ 数据库的方法。在本书中，我们将专门使用 PHP 数据对象 (PDO)。这是一种从 PHP 连接到数据库的非常安全且高效的方式。PDO 支持多种数据库，并提供了一套统一的方法来处理大多数数据库交互。这对于需要支持多种数据库类型（如\
  \ PostgreSQL、Firebird 或 Oracle）的应用程序来说是一个巨大的优势。\n\n##### 打开连接\n\n是时候连接到我们的数据库了。请记住，模型包含所有检索数据的代码。因此，我们将创建一个模型程序来连接到我们的数据库，并很快创建一个程序来检索我们的数据库信息。以下代码假定数据库不需要用户\
  \ ID 和密码即可访问。但是，在生产环境中，使用登录凭据来保护数据库至关重要。这只需要进行简单的更改，即可用正确的用户 ID 和密码更新代码。\n\n```php\n\
  <?php\ntry {\n    $dbh = new PDO('mysql:host=localhost;dbname=bitter', 'root', '');\n\
  \    $pageData->setContent(\"连接成功！\");\n} catch (PDOException $e) {\n    $pageData->setContent(\"\
  连接失败！$e\");\n    exit();\n}\n?>\n```\n\n**列表 6-7** `database.php`\n\n\n好的，作为一名高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n## 排版后的文档\n\n前面的代码使用了之前介绍的`try/catch`块来处理可能抛出异常的任何代码。当尝试打开数据库时，我们可能不会成功。因此，这行代码被放在`try`块中。如果引发了异常，`catch`块将执行，显示异常消息、我们自己的消息并退出程序。如果一切正常，我们可以继续尝试检索数据。如果成功，代码会创建一个`PDO`对象并将其存储在`$db`变量中。\n\
  \n> **注意**  \n> 你可能还有其他可用于创建到数据库的`PDO`连接的设置。你可以查阅[`www.php.net/manual/en/book.pdo.php`](http://www.php.net/manual/en/book.pdo.php)获取完整且详细的覆盖信息。\n\
  \n我们很快会将这个程序导入到我们的控制器中。\n\n### 与 Poll 模型共享数据库连接\n\n我们可以使用带参数的构造函数来与`Poll`模型共享数据库连接。\n\
  \n```\ndb property\n$this->db = $dbConnection;\n}\npublic function getPollData()\
  \ {\nreturn $this;\n}\npublic function getPollQuestion() : string {\nreturn $this->poll_question;\n\
  }\npublic function getYes() : int {\nreturn $this->yes;\n}\npublic function getNo()\
  \ : int {\nreturn $this->no;\n}\n}\n?>\nListing 6-8\nNewPoll.class.php\n```\n\n\
  现在构造函数接受指向数据库连接对象的指针，并将其放入`$db`中。接下来，我们将调用`Poll`类的构造函数，并将`PDO`对象指针作为参数传递。暂停一下思考。在我们的代码中，我们应该在哪里加载`Poll`模型？\n\
  \n从`poll`控制器！\n\n```\ngetPollData();\ninclude_once \"views/poll-html.php\";\n?>\n\
  Listing 6-9\nnewestpoll.php\n```\n\n现在，我们已经将数据库连接传递给了`Poll`模型。代码共享了一个数据库连接，但目前还没有使用它做任何事情。让我们更新`index.php`文件，以包含我们的数据库连接。\n\
  \n```\nsetTitle(\"PHP/MySQL site poll example\");\ninclude_once \"models/database.php\"\
  ;\ninclude_once \"controllers/newestpoll.php\";\n$pageData->setContent($info);\n\
  require \"views/page.php\";\necho $page;\n?>\nListing 6-10\nnewestpollindex.php\n\
  ```\n\n只有少数几个小改动。`database.php`程序已被包含，控制器已更新到最新版本。如果我们执行这个索引文件，在输出中不会看到任何变化。然而，我们已经连接到了数据库并传递了指向数据对象的指针。我们离一个完整的程序越来越近了！\n\
  \n变量`$db`在`newestpollindex.php`中声明。它在`newestpoll.php`中可用，因为它是在`newestpollindex.php`中被包含的。包含一个文件很像将代码从一个文件复制并粘贴到另一个文件中。因此，在任何包含文件中声明的所有变量都可以在其他被包含的文件中使用，只要这些文件是在之后被包含的。\n\
  \n### 使用 PDOStatement 检索数据\n\n在数据库内部，我们有一个`poll`表，包含`poll_question`以及`yes`和`no`属性的值。我们准备从数据库中检索数据。\n\
  \n请记住，处理轮询数据的代码属于`Poll`模型。因此，我们需要修改`Poll`类中的`getPollData`方法。目前，该方法返回硬编码的轮询数据；我们希望返回基于数据库驱动的轮询数据。\n\
  \n```\n?php\n//complete code for models/Poll.class.php\nclass Poll {\nprivate $db;\n\
  //method requires a database connection as argument\npublic function __construct(\
  \ $dbConnection ){\n//store the received connection in the $this->db property\n\
  $this->db = $dbConnection;\n}\npublic function getPollData() {\n$sql = \"SELECT\
  \ poll_question, yes, no FROM poll WHERE poll_id = 1\";\n$statement = $this->db->prepare($sql);\n\
  $statement->execute();\n$pollData = $statement->fetchObject();\nreturn $pollData;\n\
  }\n}\n?>\nListing 6-11\nNewestPoll.class.php\n```\n\n`Poll`类实际上变成了一个更小的程序。我们不再需要存储问题和响应的值，因为我们正在将包含来自数据库信息的对象传递回调用程序。因此，属性和`get`方法不再需要。只需要几行代码就可以检索到我们的信息。\n\
  \n```\n$sql = \"SELECT poll_question, yes, no FROM poll WHERE poll_id = 1\";\n```\n\
  \n属性`$sql`包含用于检索所需信息的 SQL 语句。\n\n```\n$statement = $this->db->prepare($sql);\n```\n\
  \nSQL 字符串在执行前被转换为`PDOStatement`对象。`prepare()`将一个简单的 SQL 字符串转换为`PDOStatement`对象。\n\
  \n```\n$statement->execute();\n```\n\n`PDOStatement`方法`execute()`针对 MySQL/MariaDB\
  \ 数据库执行 SQL。\n\n```\n$pollData = $statement->fetchObject();\n```\n\n`fetchObject()`从查询的数据库表中检索一行数据，创建一个`StdClass`对象（`$pollData`）。这个对象将公开暴露我们检索到的所有数据。然而，这并不是什么安全问题，因为我们原本就打算向所有人显示这些数据。如果我们打算使用这些数据更新数据库，则需要使用更安全的方法。返回的`StdClass`对象会自动创建属性`poll_question`、`yes`和`no`。\n\
  \n```\nreturn $pollData;\n```\n\n该对象被返回给调用程序（`finalpoll.php`）。\n\n> **注意**  \n>\
  \ 你可以在[`www.php.net/manual/en/class.pdostatement.php`](http://www.php.net/manual/en/class.pdostatement.php)查阅`PDOStatement`对象的官方文档。\n\
  \n```\ngetPollData();\ninclude_once \"views/finalpoll-html.php\";\n?>\nListing 6-12\n\
  finalpoll.php\n```\n\n`finalpoll.php`仅被修改为调用更新后的`Poll`类和一个略有修改的 HTML 视图。\n\n```\n\
  Poll results\n\n$pollData->yes said yes\n $pollData->no said no\n\n\";\n?>\nListing\
  \ 6-13\nfinalpoll-html.php\n```\n\n由于从数据库返回的是一个`StdObject`，我们可以直接访问属性而无需使用`get`方法。因此，视图程序（`finalpoll-html.php`）发生了一个小变化。\n\
  \n```\nsetTitle(\"PHP/MySQL site poll example\");\ninclude_once \"models/database.php\"\
  ;\ninclude_once \"controllers/finalpoll.php\";\n$pageData->setContent($info);\n\
  require \"views/page.php\";\necho $page;\n?>\nListing 6-14\nfinalpollindex.php\n\
  ```\n\n索引文件（控制器）也仅被略微修改以调用新版本的轮询控制器。如果我们在浏览器中执行`finalpollindex.php`程序，会发现与图 6-12\
  \ 相同的输出格式。然而，一个重要的区别是现在数据是从数据库中提取的。一个真正的数据库驱动的网站！\n\n### 显示轮询表单\n\n我们还没有一个像样的站点轮询。站点访问者应该被允许提交他们的意见，从而为轮询结果做出贡献。我们必须为站点访问者提供一个表单。请记住，所有显示都是视图。那么，让我们更新视图，不仅要显示轮询结果，还要接受站点访问者的意见。\n\
  \n```\n\n$pollData->poll_question\n\nYes, it is!\nNo, not really!\n\nPoll results\n\
  \n$pollData->yes said yes\n$pollData->no said no\n\n\";\n?>\nListing 6-15\ncompletepoll-html.php\n\
  ```\n\n```\n$dataFound = isset( $pollData );\nif( $dataFound === false ){\ntrigger_error(\
  \ 'views/completepoll-html.php needs an $pollData object' );\n}\n```\n\n为了提高程序的可靠性，我们添加了一个`if`语句，用于判断`$pollData`信息是否被正确创建。我们之前假设它总是被正确创建的。但永远不要假设。始终要预料到意外情况，并检查可能出错的情况。`trigger_error`将创建一个自定义错误消息。当表单在其他程序（如控制器）中使用时，你可以创建一个`try/catch`来捕获这个可能的错误。\n\
  \n```\nform method='post' action='completepollindex.php'>\n$pollData->poll_question\n\
  \nYes, it is!\nNo, not really!\n\n```\n\n\n\n# 创建了一个用于获取客户意见的表单。\n\n一旦客户点击提交按钮进行回复，该回复将通过\
  \ `post` 方法传递到索引（控制器）。\n\n## 根据表单输入更新数据库表\n\n完成站点投票示例还需要最后一步。我们需要检索用户通过表单提交的任何输入，并用接收到的输入更新投票表。如果网站访问者提交了\
  \ `no`，我们将增加投票数据库表中 `no` 属性的值。\n\n所有数据交互都是模型的任务。让我们用一个更新数据库表的方法来更新投票模型类。\n\n```\n\
  db property\n$this->db = $dbConnection;\n}\npublic function getPollData() {\n$sql\
  \ = \"SELECT poll_question, yes, no FROM poll WHERE poll_id = 1\";\n$statement =\
  \ $this->db->prepare($sql);\n$statement->execute();\n$pollData = $statement->fetchObject();\n\
  return $pollData;\n}\npublic function updatePoll ( $input ) {\nif ( $input === \"\
  yes\" ) {\n$updateSQL = \"UPDATE poll SET yes = yes+1 WHERE poll_id = 1\";\n} else\
  \ if ( $input === \"no\" ) {\n$updateSQL = \"UPDATE poll SET no = no+1 WHERE poll_id\
  \ = 1\";\n}\n$updateStatement = $this->db->prepare($updateSQL);\n$updateStatement->execute();\n\
  }\n}\n?>\n```\n\n新方法 `updatePoll()` 与 `getPollData` 方法类似。但是，如果用户提交了 `yes`，我们将格式化一个\
  \ SQL 字符串来更新投票表中的 `yes` 属性。如果用户提交了 `no`，我们将格式化另一个 SQL 字符串来更新 `no` 属性。注意，yes 或 no\
  \ 的值会增加 1，以便将用户的选择添加到数据库表中的正确位置。无论创建哪个 SQL 字符串，它都会被存储在一个名为 `$updateSQL` 的变量中。一旦\
  \ `$updateSQL` 字符串创建完成，我们再次使用 PDO 方法 `prepare()` 将 SQL 字符串转换为 `PDOStatement` 对象，并将其存储在变量\
  \ `$updateStatement` 中。然后我们调用 `execute()` 来更新投票表。\n\n### 安全编程\n\n我们应当时刻警惕黑客可能试图利用\
  \ *SQL 注入* 来破坏我们的表和数据库。SQL 注入是一种尝试将 SQL 语句插入到程序使用 SQL 进行插入或更新数据库数据中的行为。在未来的章节中，我们将使用预编译语句来创建我们的\
  \ SQL 命令，这将降低注入成功的可能性。我们还会在对数据库进行任何更新之前验证数据。在前面的例子中，我们没有使用任何从用户那里收集的信息来格式化 SQL 语句。因此，创建的\
  \ SQL 语句是安全的，能够抵御 SQL 注入。\n\n## 响应用户输入\n\n控制器负责处理用户交互。因此，`投票控制器` 是拦截来自投票表单的用户输入的正确位置。需要向脚本中添加几项内容。\n\
  \n```\nupdatePoll( $input );\n}\n$pollData = $poll->getPollData();\ninclude_once\
  \ \"views/completepoll-html.php\";\n?>\n```\n\n```\n//检查表单是否已提交\n$isPollSubmitted\
  \ = isset( $_POST['user-input'] );\n//如果刚刚提交...\nif ( $isPollSubmitted ) {\n```\n\
  \n我们将使用 `isset` 方法来判断用户是否已选择在调查中发表意见。如果他们选择了，我们将更新结果。\n\n```\n//获取从表单接收的输入\n$input\
  \ = $_POST['user-input'];\n//...更新模型\n$poll->updatePoll( $input );\n}\n```\n\n如果他们确实提交了，我们将检索选定的值并将其放入\
  \ `$input` 中。然后我们将该值传递给 `updatePoll` 方法，该方法将对数据库表进行更改。\n\n```\n$pollData = $poll->getPollData();\n\
  include_once \"views/completepoll-html.php\";\n```\n\n无论用户是否提供了意见，程序都将获取当前的投票结果，并通过调用\
  \ HTML 页面来显示它们。\n\n**注意**：索引（控制器）程序发生了一个小改动，用于调用 `completepoll.php`。您可以在从出版商网站下载的文件中查看到此更改。\n\
  \n要查看结果，请在浏览器中运行 `completepollindex.php`。\n\n![一个应用程序输出（completepollindex.php）显示\
  \ PHP 和投票结果：2 人回答是，0 人回答否。](img/323857_3_En_6_Fig13_HTML.jpg)  \n**图 6-13** 来自 completepollindex.php\
  \ 的输出\n\n我们现在有一个功能完备的投票网站！这个最终版本有一个弱点。您能看出来吗？一旦用户输入了他们的意见，程序允许他们再次输入。如何纠正这个问题？我们可以更改输出，使其仅在页面首次显示时显示问题。一旦意见被提交，我们就可以显示不再询问问题但显示结果的页面。我们可以修改结果，使其使用之前创建的\
  \ `finalpoll-html.php`。这只需要更改前面讨论过的 include 语句。\n\n**练习**：调整最终的投票项目，以接受用户的多个输入。调整控制器、模型和视图来请求、存储和显示这些信息。\n\
  \n## 总结\n\n在本章中，我们学习了 SQL 语句的基础知识，以及如何使用 PHP 与数据库交互。我们学习了 MVC 如何为创建需要数据和界面的程序提供逻辑结构。在接下来的章节中，我们将学习如何构建一个带有基本条目管理器的博客，该管理器允许我们创建、修改和删除条目，并在公共页面上显示它们。\n\
  \n## 项目\n\n1.  MVC 设计的力量在于，能够在很少或不需要更改项目其他组件的情况下更改模型或视图。查看 PHP 文档 ([`www.php.net/manual/en/function.file.php`](http://www.php.net/manual/en/function.file.php))\
  \ 关于文件读写的内容。更改示例中的模型代码，以将投票信息读取并存储到文件中，而不是数据库中。您应该能够在几乎无需修改控制器或查看器的情况下进行这些更改。大部分更改应发生在模型内部。\n\
  2.  访问 [`www.w3schools.in/laravel-tutorial/`](http://www.w3schools.in/laravel-tutorial/)\
  \ 并了解 Laravel 如何帮助使用 PHP 和其他工具创建健壮的、数据驱动的 Web 应用程序。\n\n# 7. 构建基本博客系统\n\n## 目标\n\n\
  完成本章后，您将能够：\n\n- 创建一个包含 HTML 表单的视图，用于接受新的博客条目\n- 创建一个控制器，用于处理来自表单的输入\n- 创建一个模型，用于使用数据库表保存和检索任何条目\n\
  - 设计并创建一个包含表的 MySQL/MariaDB 数据库\n- 为前端控制器使用设计模式\n- 为数据库访问使用表数据网关设计模式\n- 使用 `while`\
  \ 循环遍历数据集\n\n在本章中，我们将开始构建我们的博客系统。我们将从创建一个条目管理器（前端控制器）开始。我们将为博客系统创建两个首页，一个用于管理员，一个用于用户。到本章结束时，基本博客系统将能够保存新博客并显示存储在数据库中的所有条目。在此过程中，我们将使用之前介绍过的概念和主题：数据库设计、SQL\
  \ 和 MVC。我们还将学习新技术，包括设计实践和预编译 SQL 语句。\n\n### 创建 blog_entry 数据库表\n\n任何新应用程序最重要的步骤之一是规划用于保存数据的表。这对以后应用程序扩展的难易程度有着巨大的影响。*扩展*是指应用程序为管理更多信息和/或用户而进行的扩展，如果在开始新项目时没有长远考虑，这可能会非常痛苦。起初，博客需要存储几种类型的条目信息才能运行，包括以下内容：\n\
  \n- 唯一 ID\n- 条目标题\n- 条目文本\n- 创建日期\n\n第一步是确定条目表的字段类型。\n\n\n\n## 数据库表单设计\n\n-   `entry_id`：唯一标识条目的数字。这将是一个正整数，并且该数字自动递增以确保唯一性。`entry_id`将是该表的主键。\n\
  \n-   `title`：相对较短的字母数字字符串。我们将字符串限制为 150 个字符。\n\n-   `entry_text`：长度不确定的字母数字字符串。我们不会限制此字段的长度（在合理范围内）。\n\
  \n-   `date_created`：在条目首次创建时自动生成的时间戳。我们将使用此字段对条目进行按时间排序，并让用户知道条目的原始发布时间。\n\n现在我们已经确定了所需的字段，是时候创建数据库了。使用我们在前一章学到的技术，让我们开始吧。请记住，Apache\
  \ 和 MySQL/MariaDB 都需要运行才能使我们的应用程序正常工作。\n\n```sql\nCREATE DATABASE simple_blog\n\
  ```\n\n我们可以将上述代码输入到 phpMyAdmin 的 SQL 窗口中，或者使用 phpMyAdmin 的“数据库”菜单项创建数据库。\n\n下一步是创建`entries`表。请记住从\
  \ phpMyAdmin 控制面板左侧的菜单中选择`simple_blog`数据库。\n\n```sql\nCREATE TABLE blog_entry (\n\
  entry_id INT NOT NULL AUTO_INCREMENT,\ntitle VARCHAR( 150 ),\nentry_text TEXT,\n\
  date_created TIMESTAMP DEFAULT CURRENT_TIMESTAMP,\nPRIMARY KEY ( entry_id )\n)\n\
  ```\n\n我们可以在 SQL 窗口中输入上述代码。或者，在选择数据库后，使用 phpMyAdmin 提供的创建表文本框。如果选择使用文本框输入值，请确保输入的所有信息与上述代码中提供的信息一致。\n\
  \n`title`属性有一个新的数据类型：`VARCHAR(150)`。因此，任何标题都必须包含可变长度的`CHAR`acter。博客条目标题可以是 0 到 150\
  \ 个字符之间的字符串。如果我们插入一个长度为 151 个字符的标题，则只有前 150 个字符会保存到`blog_entry`表中。数据库确保我们输入的值在保存之前是有效的。\n\
  \n`date_created`属性也声明了一个新的数据类型：`TIMESTAMP`。`TIMESTAMP`保存关于某一时刻的精确信息。它存储*年*、*月*、*日*、*时*、*分*和*秒*，格式为\
  \ YYYY-MM-DD HH:MM:SS。\n\n我们已经讨论过在 MySQL 表中使用默认值。这里，它再次用于`date_created`属性。当第一次插入新条目时，MySQL/MariaDB\
  \ 将根据服务器时钟自动存储当前的`TIMESTAMP`。服务器时钟将基于服务器所在的时区。\n\n## 规划 PHP 脚本\n\n我们的下一个逻辑步骤是创建一个博客条目编辑器，以便我们可以创建新的博客条目。此博客条目编辑器仅供博客作者使用。普通网站访问者无法创建新条目。普通网站访问者应只能查看博客条目，不能编辑现有条目或创建新条目。\n\
  \n处理此类任务的一种方法是创建两个主要的站点入口：`index.php`（供普通访问者使用）和`admin.php`。在 MVC 术语中，`index.php`和`admin.php`都将是*前端控制器*。在后面的章节中，我们将学习如何使用登录来限制对`admin.php`的访问。\n\
  \n管理页面将列出所有博客条目，并提供对条目编辑器的访问，以创建新条目以及编辑或删除现有条目。这将需要单独的视图：一个用于列出所有条目，另一个用于显示编辑器。\n\
  \n程序`admin.php`将显示一个 HTML5 页面。它将允许管理员决定是显示编辑器还是列出所有条目。图[7-1]使用 MVC 架构开发了博客管理模块的概要示意图。\n\
  \n![图 7-1：责任分配](img/323857_3_En_7_Fig1_HTML.png)\n\n图表反映了前端控制器的职责，主要分为三个部分：模型、视图和控制器。\n\
  \n**图 7-1** 责任分配\n\n请注意，每个视图都有一个对应的控制器。条目模型显示所有条目并保存任何新条目。\n\n## 管理视图：创建管理博客站点\n\
  \n让我们创建一个名为`ch7`的新文件夹，并在`ch7`文件夹内创建一个`blog`文件夹。在`blog`文件夹内，我们还将创建另外四个文件夹：`models`、`views`、`controllers`和`CSS`。\n\
  \n我们现在可以将`ch4`中`template`文件夹中的`page.php`程序复制到`blog`下的`views`文件夹中。我们还可以将`ch4 classes`文件夹中的`Page_Data.class.php`程序复制到`models`文件夹中。我们将创建一个空白样式表（稍后编写代码），并将其放置在`CSS`文件夹中，命名为`blog.css`。当然，我们可以从出版商的网站下载本章的文件。\n\
  \n现在是时候创建`admin.php`的测试版本（我们的前端控制器）了，以验证一切是否正常协同工作。\n\n```php\n<?php\n$pageData\
  \ = new Page_Data();\n$pageData->setTitle(\"PHP/MySQL blog demo\");\n$pageData->setCss(\"\
  \");\n$pageData->setContent(\"YES!\");\ninclude_once \"views/page.php\";\necho $page;\n\
  ?>\n```\n\n**清单 7-1** `admin.php`\n\n> **注意**：如果您从`ch4`文件夹复制了`Page_Data.class.php`，则需要调整使用`if`语句进行的验证，以允许传入此清单以及本章后续清单中的值。如果您没有看到预期的结果，请检查此文件中的安全限制。出版商网站上的`Page_Data.class.php`文件已经包含了所需的调整。\n\
  \n这段代码看起来应该很熟悉，因为它类似于我们在前几章中创建的基本前端控制器。唯一的补充是包含的样式表。\n\n测试此程序时，一切都应正常运行；我们应该得到一个格式良好的\
  \ HTML5 页面，其中`<title>`为“PHP/MySQL blog demo”，并且一个`<h1>`元素愉快地显示“YES！”在浏览器中看到“YES”是项目设置正确的视觉确认。如果我们查看源代码，我们还会看到用于访问\
  \ CSS 样式表的 HTML 链接已正确定位在标题部分。\n\n### 创建管理员条目管理器导航\n\n条目管理器（前端控制器）将有两个视图：一个用于列出所有条目，另一个用于显示条目编辑器。让我们创建一个导航来访问这些视图。\n\
  \n但首先，我们可以预料到，在完成之前，这个项目将包含许多 PHP 文件。让我们创建一些文件夹，将与管理模块相关的脚本分组在一起。我们将在现有的`views`文件夹中创建一个名为`admin`的文件夹。我们将在此文件夹中放置管理导航的第一个版本。\n\
  \n```php\n<?php\n$nav = \"<h1>Blog Admin</h1>\n<a href='admin.php'>All entries</a>\n\
  <a href='admin.php?editor'>Editor</a>\n\";\n?>\n```\n\n**清单 7-2** `admin-navigation.php`\n\
  \n我们可以看到条目管理器导航与我们之前创建的导航非常相似。\n\n管理导航是一个*静态视图*，意味着脚本中没有动态或数据库驱动的信息。我们不需要为导航创建模型，因为所有内容都是硬编码的。我们需要一个控制器来在需要加载导航时加载它。导航将一直加载并显示。我们将从一个新版本的前端控制器来控制这一点。\n\
  \n```php\n<?php\ninclude_once \"models/Page_Data.class.php\";\n$pageData = new Page_Data();\n\
  $pageData->setTitle(\"PHP/MySQL blog demo\");\n$pageData->setCss(\"\");\ninclude_once\
  \ \"views/admin/admin-navigation.php\";\n$pageData->setContent($nav . \"YES!\");\n\
  include_once \"views/page.php\";\necho $page;\n?>\n```\n\n**清单 7-3** `adminWithNavigation.php`\n\
  \n程序只做了三个小调整。导航程序已包含在代码的顶部。`$nav`变量已被添加到传递给`setContent`方法的字符串中。导航程序也已调整，以调用此新版本的管理页面。\n\
  \n![图 7-2：管理员导航页面](img/323857_3_En_7_Fig2_HTML.jpg)\n\n\n\n### 窗口与导航\n\n当编辑器区域中的所有条目都完成输入后，窗口会进行刷新，以便进行导航。\n\
  \n**图 7-2**  \n`adminWithNavigation.php` 的输出\n\n在浏览器中运行程序时，我们应该会在浏览器窗口顶部看到导航栏。点击某个导航项不会立即产生可见效果；导航只是一个视图。点击任何导航项都会编码一个名为\
  \ `page` 的 URL 变量。如果我们查看浏览器的地址栏，就能看到它。接下来，我们将创建控制器代码来响应这些用户交互。\n\n### 加载管理员模块控制器\n\
  \n如前所述，`admin.php` 程序是我们的前端控制器。因此，它将加载与用户点击的导航项相关联的任何其他控制器。导航栏中有两个链接，因此我们需要两个控制器。\n\
  \n让我们创建两个初步控制器，这样在点击导航项时就能在浏览器中看到可见的变化。我们在 `controllers` 文件夹中添加一个 `admin` 文件夹。我们将在此文件夹内为编辑器视图创建一个程序。\n\
  \n```\n<?php\necho \"editor controller loaded!\";\n?>\n```\n\n**列表 7-4**  \n`editor.php`\n\
  \n这个编辑器控制器一开始不会做太多事情。最初，我们只想检查它是否正确连接了相关文件。有了这个基础，我们就可以开发更复杂的代码了。让我们再创建另一个文件，用于控制最终将列出所有条目的视图。\n\
  \n```\n<?php\necho \"entries controller loaded!\";\n?>\n```\n\n**列表 7-5**  \n`entries.php`\n\
  \n现在我们可以调整管理员程序来处理这些控制器。\n\n```\n<?php\n$pageData->setTitle(\"PHP/MySQL blog demo\"\
  );\n$pageData->setCss(\"\");\n$pageData->setContent($nav);\n//新代码从这里开始\n$navigationIsClicked\
  \ = isset( $_GET['page'] );\nif ( $navigationIsClicked ) {\n    //准备加载对应的控制器\n \
  \   $contrl = $_GET['page'];\n} else {\n    //准备加载默认控制器\n    $contrl = \"entries\"\
