  trans: "\n# 操作查询条件\n\n在 `find()` 函数中操作这些参数，并使用这两种表示查询条件的方式，可以执行更复杂的数据库查询，并将数据集精确裁剪到所需结果。这省去了遍历数据的麻烦，只需提供一个包含特定条件的数组，模型就会返回已格式化好的数据集，供控制器和视图处理。\n\
    \n## 设置查询条件\n\n查询条件格式化为数组形式。键对应要搜索的字段，值表示要在该字段中查找的值。请注意，查询条件中提供的字段结构与典型的 SQL 查询字符串不同。关联模型（此处为\
    \ `User`）后跟句点和字段名，告诉 `find()` 函数通过关联模型（而不是 `Post` 模型）执行查询。换句话说，即在关联表中搜索名为 `id`\
    \ 且值为 `1` 的字段。\n\n使用数组作为查询条件可能是构建查询的更高效方式。默认情况下，查询将搜索与数组中输入的值相等的字段。\n\n要搜索值不等于某个特定值的字段，只需在表达式前添加\
    \ `<>`：\n\n```\n$this->Post->find('all',array('conditions'=>array('User.id'=>'<>\
    \ 1')));\n```\n\nCake 会解析其他 SQL 表达式，包括 `LIKE`、`BETWEEN` 和 `REGEX`，但必须在运算符和值之间留一个空格。可以通过将字段名括在\
    \ SQL 的 `DATE()` 参数中来搜索日期或日期时间字段。\n\n## 设置多个条件\n\nCake 支持多个条件。通过使用数组来格式化条件，可以轻松管理多个搜索：\n\
    \n```\n$this->Post->find('all',array('conditions'=>array('User.id'=>1,'DATE(Post.date)'=>'CURDATE()')));\n\
    ```\n\n将条件合并到单个查询中的默认方式是使用 `AND` 布尔运算符。换句话说，上一个示例将告诉模型查找所有用户 ID 为 `1` *且* 发布日期为今天的帖子。\n\
    \n假设你需要使用 `OR` 运算符执行多条件查询。你可以通过将条件数组设置为键为 `or` 的数组的值来实现，如下所示：\n\n```\n$this->Post->find('all',array('conditions'=>array(\n\
    \  'or'=>array(\n    'User.id'=>1,'DATE(Post.date)'=>'CURDATE()'\n  )\n)));\n\
    ```\n\n在此示例中，所有有效的 SQL 布尔运算都可以替代 `OR`。其中包括 `AND`、`OR`、`NOT` 或 `XOR`。\n\n你也可以让\
    \ Cake 搜索一个字段中的多个值。只需将一个包含所有可能搜索值的数组附加到字段键即可：\n\n```\n$this->Post->find('all',array('conditions'=>array('User.id'=>array(1,2,5,10))));\n\
    ```\n\n## 显示最新帖子\n\n随着 `posts` 表的增长，`Index` 操作中当前 `find()` 函数返回的结果也会增加。为确保服务器负载不受影响，并且由于你只需要最新的五篇帖子，你可以自定义查询条件，只返回五条记录，而不是（可能）数百条。\n\
    \n最简单的方法是将 `limit` 设置为 `5`，并按创建日期降序 `order` 结果：\n\n```\n$this->Post->find('all',array('order'=>'date\
    \ DESC','limit'=>5,'recursive'=>0));\n```\n\n现在，`find()` 函数将获取所有 `Post` 记录及其所有者（此处为与帖子关联的\
    \ `User` 记录），按 `date` 字段排序（最新的在前），并将结果限制为五条。\n\n示例数据库在 `ID` 字段中设置了 `auto_increment`，这意味着\
    \ `ID` 字段不仅通过唯一值标识记录，还告诉我们创建的先后顺序。因为理论上管理员可以操作 `date` 字段，但不能操作 `ID` 字段，所以在某些情况下按\
    \ `ID` 排序可能比按 `date` 排序更有价值。不过，这由客户端或开发者自行决定。在本博客中，我们将相信分配给帖子的日期将决定该帖子在网站上的出现时间。\n\
    \n将新条件插入到清单 7-4 第 2 行的 `find()` 函数中，并用结果代码替换 `Index` 操作。\n\n## 调整索引视图\n\n`Index`\
    \ 视图也需要调整，即使只是为了将管理操作从用户可及范围内移除。\n\n进入 `app/views/posts/index.ctp` 文件并插入以下代码，也可以使用您自己的自定义视图代码，以更具故事性的形式显示内容：\n\
    \n```\n<? foreach($posts as $post): ?>\n<div class=\"story\">\n  <?=$html->link('<h1>'.$post['Post']['name'].'</h1>','/posts/view/'.$post['Post']['id'],null,null,false);?>\n\
    \  <p>\n    发布于 <?=date('Y 年 n 月 j 日, g:i a',strtotime($post['Post']['date']));?>\n\
    \  </p>\n  <p>\n    <b>作者：<?=$post['User']['firstname'];?> <?=$post['User']['lastname'];?></b>\n\
    \  </p>\n  <br/>\n  <p><?=$post['Post']['content'];?></p>\n</div>\n<? endforeach;\
    \ ?>\n```\n\n## 查看操作\n\n你刚刚完成的练习使用户可以点击索引视图中每篇帖子的标题，这将把他们带到该帖子的 `View` 操作。`View`\
    \ 操作应已包含清单 7-5 中所示的烘焙代码。\n\n**清单 7-5.** *帖子控制器中的查看操作*\n\n```\nfunction view($id\
    \ = null) {\n  if (!$id) {\n    $this->Session->setFlash(__('无效帖子。', true));\n\
    \    $this->redirect(array('action'=>'index'));\n  }\n  $this->set('post', $this->Post->read(null,\
    \ $id));\n}\n```\n\n清单 7-5 的第 6 行展示了 `read()` 函数的用法。这与我已讨论过的 `find()` 函数类似，但它确实有一些独特之处，对于简单的页面请求特别有用。\n\
    \n### `read()` 函数\n\n简而言之，`read()` 函数读取特定记录的内容。它与 `find()` 的不同之处在于它不包含 `recursive`\
    \ 参数。有关 `read()` 模型函数中可用的参数，请参见表 7-3。\n\n**表 7-3.** `read()` 模型函数中可用的参数（按顺序）\n\
    \n| 名称   | 类型  | 默认值    | 说明                                                 \
    \    |\n| ------ | ----- | --------- | --------------------------------------------------------\
    \ |\n| fields | Mixed | `null`    | 单个字段名的字符串值或字段名数组                         |\n\
    | id     | 整数 | `null`    | 要读取的记录的 ID                                       \
    \ |\n\n`View` 操作对 `read()` 函数的使用非常适合当前任务；保持原样即可。清单 7-5 的第 3–4 行包含了通过 `Session`\
    \ 组件设置错误消息以及发生错误时重定向用户的函数。\n\n### `setFlash()` 函数\n\n在第六章中，我讨论了 `setFlash()` 函数，但仅限于基本术语。该函数的作用不仅仅是显示错误消息。表\
    \ 7-4 列出了其参数。\n\n**表 7-4.** Session 组件中 `setFlash()` 函数可用的参数（按顺序）\n\n| 名称    |\
    \ 类型   | 默认值     | 说明                                                        \
    \ |\n| ------- | ------ | ---------- | ------------------------------------------------------------\
    \ |\n| message | 字符串 | `null`     | 在布局的 `$session->flash()` 函数中可用的消息        \
    \       |\n| layout  | 字符串 | `default`  | 放置 flash 消息的布局；这可以将显示 flash 的 `<div>`\
    \ 容器元素从默认切换为另一个自定义布局 |\n| params  | 数组   | `null`     | 作为视图变量传递给布局的参数       \
    \                          |\n| key     | 字符串 | `flash`    | 一种区分多种 flash 消息类型的方式，用于多个\
    \ flash 消息       |\n\n默认情况下，布局中的 `$session->flash()` 函数在收到来自 `setFlash()` 函数的\
    \ flash 消息后，会将消息显示在标准化的 HTML 字符串内。\n"
- fmt: "`<div id=\"flashMessage\" class=\"message\">Invalid post.</div>` 要自定义围绕 flash\
    \ 消息的 HTML，你可以在`app/views/layouts`文件夹中添加一个新的布局文件，并在`setFlash()`函数中设置`layout`参数。例如，你可以在`layouts`目录中创建一个名为`flash.ctp`的自定义\
    \ flash 布局，其中包含以下单行代码：\n\n```\n<div class=”error_message”><?=$content_for_layout;?></div>\n\
    ```\n\n然后，在`setFlash()`函数中，你可以像这样传递新的布局参数：`$this->Session->setFlash('Invalid Post.','flash');`\n\
    \n当显示 flash 消息时，它*不会*替换视图的整个布局。新 flash 布局文件的全部内容将被放置在布局中`$session->flash()`函数出现的位置。然后，在`flash.ctp`文件中`$content_for_layout`出现的位置，将插入\
    \ flash 消息。设置`layout`参数允许完全自定义 flash 消息的显示方式，但这需要创建一个单独的布局文件来容纳那个自定义的 HTML。\n\n\
    如果由于某种原因，flash 需要包含关于错误的更多细节，你可以通过将变量作为数组添加到函数的第三个参数中来传递给布局：\n\n`$this->Session->setFlash(‘Invalid\
    \ post.’,’flash’,array(‘story’=>$id));`\n\n在`app/views/layouts/flash.ctp`文件中，通过之前的`setFlash()`函数传递的变量将作为`$story`可用，其行为类似于通过控制器的`set()`函数在视图文件中传递的变量。\n\
    \n`setFlash()`中的`key`参数使得可以在布局的不同区域显示 flash 消息。例如，`app/views/layouts/default.ctp`文件可以包含两个由`key`区分的`flash()`函数：\n\
    \n```\n<div id=”top”>\n<? $session->flash(‘top’);?>\n</div>\n<div id=”bottom”>\n\
    <? $session->flash(‘bottom’);?>\n</div>\n```\n\n现在，当控制器使用`setFlash()`触发 flash\
    \ 消息时，你可以指定希望消息出现的位置。像这样在 flash 消息中使用`key`：`$this->Session->setFlash('Invalid\
    \ post.',null,null,'bottom');`，会告诉 Session 组件将该消息与参数设置为`bottom`的`flash()`函数匹配。\n\
    \n清单 7-5 的第 3 行只需要在发生错误时显示一个基本的 flash 消息，所以我不会向`setFlash()`函数添加任何更多参数。但是，你当然可以让消息表达任何你想要的内容。只需将第一个参数更改为你自己的错误消息即可。\n\
    \n## `redirect()`函数\n\n清单 7-5 的第 4 行在发生错误时重定向用户。你可以通过使用控制器的`redirect()`函数来实现这一点。`redirect()`的可用参数列在表\
    \ 7-5 中。\n\n**表 7-5.** `redirect()`控制器函数中可用的参数（按顺序）\n\n| 名称 | 类型 | 默认值 | 说明 |\n\
    | :--- | :--- | :--- | :--- |\n| `url` | Mixed | `null` | 指向应用程序中另一个站点或位置的字符串或数组。\
    \ |\n| `status` | Integer | `null` | 如果需要，HTTP 状态码（例如，404 或 500 错误代码）。 |\n| `exit`\
    \ | Boolean | `true` | 如果为 `true`，重定向后将调用 PHP `exit()` 函数。 |\n\n■**注意** 如果此函数中的`exit`参数设置为`false`，Cake\
    \ 将继续执行重定向后控制器中的代码。只有当`exit`参数设置为`true`（意味着调用了 PHP `exit()`函数，从而终止脚本执行）时，重定向后所有其他进程才会停止。这可能会产生意想不到的后果，因为用户的浏览器将请求一个新页面，但旧的脚本可能继续运行。\n\
    \n`redirect()`函数的`url`参数可以设置为一个数组。注意在清单 7-5 的第 4 行中，数组的键和值对应于 Cake 应用程序中的位置。此函数中可用的键与\
    \ Cake 的路由器参数相对应。例如，数组`array('controller'=>'users','action'=>'index')`会将用户重定向到\
    \ Users 控制器的 Index 操作。\n\n`url`参数也可以使用单个字符串。这些字符串遵循与 Web 浏览器中访问 Cake 应用程序区域时使用的相同\
    \ URL 结构。前面数组中显示的相同路径可以格式化为如下字符串：`'/users/index'`\n\n其他 Cake 函数可以帮助处理`url`参数。其中一个例子是`referer()`函数。通过在`url`参数中放置`$this->referer()`，Cake\
    \ 将重定向到当前操作的引用页面。\n\n`status`参数允许你传递一个 HTTP 状态码作为服务器响应的一部分。服务器最常见的错误响应之一是 404\
    \ Not Found 错误。有时你可能希望将`redirect()`函数用于未解析的 URL。在这些情况下，在`status`参数中使用整数 404，允许应用程序像典型的\
    \ 404 服务器响应一样响应错误。所有 HTTP 状态码都是可用的。\n\n在清单 7-5 的第 4 行中，你假定用户从 Index 操作访问 View\
    \ 操作，因此如果发生错误，你会将他们重定向回此操作。\n\n## 自定义文章显示\n\n出于调整 Index 视图的相同原因，你需要调整 View 视图。你可能还想微调此视图以使文章更易于阅读。之前，你简化了这个视图。在这个练习中，尝试用自己的设计来装饰\
    \ View 视图。确保故事可读且布局良好。你甚至可以尝试使用`app/webroot/css`文件夹并添加你自己的样式。以下是一些起始的最小代码，属于`app/views/posts/view.ctp`文件：\n\
    \n```\n<?=$html->link(‘<h1>’.$post[‘Post’][‘name’].’</h1>’,’/posts/view/’.$post[‘Post’]➥\n\
    [‘id’],null,null,false);?>\n<p>Author: <?=$post[‘User’][‘firstname’];?> <?=$post[‘User’][‘lastname’];?></p>\n\
    <p>Date Published: <?=$post[‘Post’][‘date’];?></p>\n<hr/>\n<p><?=$post[‘Post’][‘content’];?></p>\n\
    ```\n\n## 为博客创建模型\n\nPosts 控制器中的 Add 和 Edit 操作使用重要的模型函数。你可以通过向模型中添加新函数来扩展这些操作与\
    \ Post 及相关模型的交互。在第 6 章中，你自定义了一些 CRUD 视图并学习了提交表单。现在你将查看模型函数并扩展它们。你将首先查看 Posts 控制器中的\
    \ Add 和 Edit 操作，检查它们的逻辑，并了解它们如何与扩展 Post 模型相关联。\n\n## Add 操作\n\nIndex 和 View 操作通过简单的数据库查询与模型交互。然而，要使\
    \ Add 操作正常工作，需要向模型发送数据。通过使用回调函数，如控制器的`beforeFilter()`和`afterFilter()`函数，你可以拦截数据库保存、运行数据验证检查等。让我们首先检查控制器中的\
    \ Add 操作。打开`app/controllers/posts_controller.php`文件，滚动到 Add 操作（参见清单 7-6）。\n\n\
    **清单 7-6.** *Posts 控制器中的 Add 操作*\n\n```\nfunction add() {\n if (!empty($this->data))\
