  \n## 安装 LAMP 服务器\n\nLAMP 代表 Linux、Apache、MySQL 和 PHP。它是一组开源软件产品，用于在 Linux 机器上运行\
  \ Web 服务器。以下是安装 LAMP 的步骤：\n\n**安装 Apache。** 要安装 Apache，请打开终端并输入以下命令：\n```\nsudo\
  \ apt-get install apache2\n```\n要检查 Apache 是否已安装，请打开浏览器并访问地址 `http://localhost/`。如果页面显示文本\
  \ \"It works!\"，则表示 Apache 安装成功。\n\n**安装 MySQL。** 要安装 MySQL，请打开终端并输入以下命令：\n```\n\
  sudo apt-get install mysql-server\n```\n系统会提示您设置 root 密码。如果您的计算机没有提示，请输入以下命令来设置\
  \ root 密码：\n```\nmysql -u root\nmysql> SET PASSWORD FOR 'root'@'localhost' = PASSWORD('yourpassword');\n\
  ```\n要安装 `phpMyAdmin` 工具，请在终端中输入以下命令：\n```\nsudo apt-get install libapache2-mod-auth-mysql\
  \ php5-mysql phpmyadmin\n```\nMySQL 安装完成后，您可以使用以下命令激活它：\n```\nsudo mysql_install_db\n\
  ```\n\n**安装 PHP。** 要安装 PHP，请打开终端并输入以下命令：\n```\nsudo apt-get install php5 libapache2-mod-php5\
  \ php5-mcrypt\n```\n对提示的问题回答 \"yes\"，PHP 将自行安装。\n\n成功安装 WampServer 或 LAMP 后，您可以继续启动其中任何一个。本书中使用的是\
  \ WampServer，但步骤对于两个服务器是通用的。\n\n### 启动服务器\n\n要使用 WampServer，您需要启动它。因此，请双击其桌面图标或按照以下步骤操作：\n\
  \n- 打开开始屏幕。\n- 在开始屏幕上显示的磁贴列表中，找到 WampServer。如果在应用程序和程序列表中找不到 WampServer，请在屏幕的空白处输入文本\
  \ \"WAMP\"。\n- 将出现一个搜索框，并列出所有与输入文本匹配的应用程序。\n- 单击结果列表中显示的 WampServer 图标。\n\n启动 WampServer\
  \ 后，任务栏中会出现一个图标，如图 1-21 所示。\n\n![A978-1-4842-1672-9_1_Fig21_HTML.jpg](img/A978-1-4842-1672-9_1_Fig21_HTML.jpg)\n\
