  trans: "\n# 导航菜单设计\n\n为你的网站选择合适的菜单设计方案，需要深入理解网站的信息层级，尤其是产品层级。你需要考虑以下事项：\n\n- 客户/店铺所有者如何对商品进行分类\n\
    - 竞争对手如何对相同或相似商品进行分类\n- 客户如何对商品进行分类\n- 分类是“深”的（顶层类别少，但包含大量子类别和孙类别）还是“宽”的（顶层类别多，子类别很少或没有）\n\
    - 类别之间的重叠程度\n- 需要筛选或搜索的产品属性维度\n- 网站是否“内容密集”（例如，包含大量博客文章和文章）\n\n这个列表可能有点令人畏惧，但在确定你的导航菜单需要多大规模时，这是一个需要考虑的重要因素。如果店铺只销售\
    \ 2-3 种商品，你可以完全跳过分类；如果销售 50 种，可能只需要类别就够了；如果销售 500 种以上，那么你至少需要两级分类。\n\n重要的是，要意识到\
    \ Shopify 后台在分类方面（常被诟病的）局限性。严格来说，我们只被允许有一“真正”级的分类（用 Shopify 的术语来说就是“集合”）。并没有内在的子类别概念。我们真正得到的是产品上几个不同的字段，让我们可以对它们进行分组：**标签**、**产品类型**和**产品供应商**。**标签**最常用于模拟子类别功能。\n\
    \n在 Shopify 开发的几乎所有领域，我的一般性建议是避免过于聪明，过度突破边界会导致麻烦。作为推论，我不建议尝试用 Shopify 实现孙类别，除非你有非常明确的需求和可维护的方法（也许需要应用程序支持）。\n\
    \n对于示例店铺，我使用 Shopify 提供的“Apparel”示例产品数据。这为我们提供了 25 种产品的库存，涵盖了一些服装（男装和女装）、包袋和一些配饰。考虑到产品的分布以及客户可能如何看待它们，我将为此店铺设定四个主要产品类别：**女装**、**男装**、**包袋**和**配饰**。由于每个类别下只有\
    \ 4-5 种产品，我暂时不对它们进行子分类。\n\n除了这个产品层级，我还要假设店铺所有者认为有几个内容页面很重要——**关于我们**、**商品评价**和**媒体报道**。我还想为客户提供一个到达最受欢迎产品的快捷方式，我们可以通过一个指向“畅销品”集合的链接来实现。基于这些信息，主导航菜单的最终示例信息层级如下：\n\
    \n- 店铺\n  - 女装\n  - 男装\n  - 包袋\n  - 配饰\n- 畅销品\n- 关于我们\n- 商品评价\n- 媒体报道\n\n一旦我们有了一个层级结构，就需要决定如何在店铺前端最好地实现它。鉴于\
    \ Shopify 不原生支持层级导航菜单（在撰写本文时，此功能仍处于测试阶段），实现它们的标准方法是：\n\n1. 在 Shopify 后台为每个子菜单创建一个新的导航菜单，其名称与其顶层名称匹配（在此示例中，意味着创建一个名为“店铺”的新导航菜单，其中包含指向“女装”、“男装”、“包袋”和“配饰”集合的链接）。\n\
    2. 在遍历顶层菜单项时，更新 Liquid 代码以检查当前项是否存在子菜单。如果存在，则通过依次遍历其项来渲染该子菜单。\n\n你可以在 Shopify\
    \ 后台（参见图 4-5）和 `header.liquid` 部分（参见代码清单 4-5）中看到我如何为示例店铺实现这一点，并在前端看到结果（参见图 4-6）。\n\
    \n![A437216_1_En_4_Fig6_HTML.jpg](img/A437216_1_En_4_Fig6_HTML.jpg)\n\n图 4-6：示例主题店铺前端上的最终简单下拉菜单\n\
    \n![A437216_1_En_4_Fig5_HTML.jpg](img/A437216_1_En_4_Fig5_HTML.jpg)\n\n图 4-5：在\
    \ Shopify 后台配置子导航菜单\n\n```\n{%- for link in primary_link_list.links -%}\n{%- assign\
    \ child_link_list_handle = link.title | handle -%}\n{%- assign child_link_list\
    \ = linklists[child_link_list_handle] -%}\n{%- if child_link_list and child_link_list.links.size\
    \ > 0 -%}\n{%- assign has_child_link_list = true %}\n{%- else- %}\n{%- assign\
    \ has_child_link_list = false %}\n{%- endif -%}\n\n{{ link.title | escape }}\n\
    \n{%- if has_child_link_list -%}\n\n{%- for child_link in child_link_list.links\
    \ -%}\n{{ child_link.title | escape }}\n{%- endfor -%}\n\n{%- endif -%}\n\n{%-\
    \ endfor -%}\n```\n代码清单 4-5：更新后的导航菜单链接循环，用于处理子菜单导航项\n\n## 下拉菜单设计指南\n\n-   **限制菜单选项：**\
    \ 尽量避免菜单项超过七个，因为这会给用户带来过大的认知负担。如果你觉得需要更多，可以考虑增加一级层级，或者仅仅依靠集合页面流畅的筛选体验来让用户缩小结果范围。记住，这是一个**上限**，而不是目标——ASOS\
    \ 的店铺只有三个顶层菜单项（首页、男装和女装）。\n-   **保持下拉菜单只有一级：** 尽管在下拉菜单一侧添加子菜单很诱人，但研究表明这对用户来说操作繁琐且棘手。当下拉菜单通过悬停激活时尤其如此——除非用户非常小心地移动鼠标，否则就会“丢失”菜单。如果你需要能够显示更大的类别范围，可以考虑使用下一节讨论的超级菜单。\n\
    -   **通过点击激活下拉菜单，而不是悬停：** 这意味着你不必担心移动设备和平板电脑等触控设备（在这些设备上无法触发悬停事件）有不同体验。它还允许你即使光标离开菜单，也能保持打开的菜单就位，从而避免用户的主要挫败感和潜在的可访问性问题。\n\
    \n图 4-7 中的下拉菜单是一个存在一些问题的菜单示例。首先，它太长，客户必须滚动才能看到所有选项。其次，它是悬停激活的，鼠标一离开就会立即关闭（在滚动以查看底部时非常常见）。最后，它包含的子菜单也存在同样的悬停问题，并且主菜单没有通过任何方式（例如右侧的箭头）提示它们的存在。\n\
    \n![A437216_1_En_4_Fig7_HTML.jpg](img/A437216_1_En_4_Fig7_HTML.jpg)\n\n图 4-7：一个存在若干可用性问题的下拉菜单\n"
- fmt: "### Mega-Menus\n\nIf you have a lot of categories, you might find you have\
    \ too much information to fit into a single level of dropdowns. That’s where the\
    \ common mega-menu design pattern comes in to play. Mega-menus let you offer many\
    \ deep navigation choices to users, presented in a structure you can control and\
    \ illustrate if needed (see Figure [4-8](#A437216_1_En_4_Chapter.html#Fig8)).\n\
    \n![A437216_1_En_4_Fig8_HTML.jpg](A437216_1_En_4_Fig8_HTML.jpg)\n\nFigure 4-8\n\
    \nWhile quite cluttered, this example shows how mega-menus can be used to categorize\
    \ a large number of deep links on the ASOS site\n\nBecause mega-menus offer a\
    \ high degree of space and flexibility, they should be treated as a design canvas\
    \ unto themselves rather than just a way to list a bunch of items. Doing this,\
    \ in combination with the following recommendations, will help you make the most\
    \ of your menus and provide a better shopping experience to customers.\n\n- Use\
    \ headings and columns to clearly break down and identify the chosen sections\
    \ of your menu. The choice of columns should reflect the common ways customers\
    \ may want to browse the product range—e.g., Shop by Size, Shop by Brand, and\
    \ Shop by Price.\n- You don’t need to simply order products or categories alphabetically.\
    \ Use the flexibility of the mega-menu to promote your best selling or featured\
    \ items on the top left of the menu.\n- Keep mega-menus short. Making menus too\
    \ tall presents problems for users with small screens. You can compensate by using\
    \ the full width of the screen.\n- Don’t be afraid to use images or graphics to\
    \ enhance products or categories (without going overboard and turning your mega-menu\
    \ into a visual mess).\n- Ensure your menus are mobile friendly by using responsive\
    \ design techniques.\n\nThe Sunglass Hut has an excellent example of an effective\
    \ mega-menu, shown in Figure [4-9](#A437216_1_En_4_Chapter.html#Fig9). A considered\
    \ selection of top-level items (Hers, His…) opens (with a click!) a mega-menu\
    \ that offers further deep navigation. The menu effectively makes use of graphics\
    \ to offer a Featured Brands functionality as well as a featured collection at\
    \ the bottom.\n\n![A437216_1_En_4_Fig9_HTML.jpg](A437216_1_En_4_Fig9_HTML.jpg)\n\
    \nFigure 4-9\n\nThe Sunglass Hut’s interesting horizontal twist on the mega-menu\
    \ is a great example of menu design\n\nThe implementation logic behind a mega-menu\
    \ is similar to the existing dropdown menu we’ve implemented on the example theme;\
    \ the key difference is in the styling and sizing of the elements displayed. For\
    \ this reason, and because we’re not yet dealing with that many products, let’s\
    \ leave the implementation of a mega-menu on the store for now and move on to\
    \ another important navigation element—the footer.\n\n### The Site Footer\n\n\
    More than just a spot to dump an e-mail signup form, designers often overlook\
    \ the incredibly useful role footers play in navigation. They can serve as a get\
    \ out of jail tool for users who have made it to the bottom of the page without\
    \ finding what they’re looking for, reducing the chance of someone bouncing off\
    \ your site. Thanks to convention, they are also often the first place customers\
    \ will look when in search of your shipping, refund, and return policies.\n\n\
    Additionally, footers are a great place to place trust signals like “secure” or\
    \ “trusted” site badges and logos, logos of well-known customers, or logos of\
    \ media companies that have covered your brand. Studies show that reinforcing\
    \ the trustworthiness of your site with these types of signals on every page can\
    \ have a positive impact on conversion rates.\n\n> **Note**  \n> All this useful\
    \ information in the footer can be lost if your store implements “infinite scroll”\
    \ techniques on collection pages. This is one of a couple of reasons I don’t recommend\
    \ using infinite scroll on Ecommerce sites. You’ll dig into this more in Chapter\
    \ [6](#A437216_1_En_6_Chapter.html) when diving into collection page design.\n\
    \nTo implement a footer in the example theme, we’re going to take a similar approach\
    \ to the header and create a new section called `footer.liquid` (see Listing [4-6](#A437216_1_En_4_Chapter.html#Par95))\
    \ then include it from `theme.liquid` (see Listing [4-7](#A437216_1_En_4_Chapter.html#Par96)),\
    \ this time underneath the `{{ content_for_layout }}` tag. Like with `sections/header.liquid`,\
    \ we need to include a `{% schema %}` section at the top to allow users to customize\
    \ the footer.\n\n```liquid\n{% schema %}\n{\n\"name\": \"Footer\",\n\"blocks\"\
    : [\n{\n\"type\": \"link_list\",\n\"name\": \"Navigation menu\",\n\"settings\"\
    : [\n{\n\"id\": \"link_list\",\n\"type\": \"link_list\",\n\"label\": \"Navigation\
    \ menu\"\n}\n]\n},\n{\n\"type\": \"payment_icons\",\n\"name\": \"Payment icons\"\
    \n}\n]\n}\n{% endschema %}\n\n{%- for block in section.blocks -%}\n{%- case block.type\
    \ -%}\n{%- when 'link_list' -%}\n{%- include 'footer-block-link-list' -%}\n{%-\
    \ when 'payment_icons' -%}\n{%- include 'footer-block-payment-icons' -%}\n{%-\
    \ endcase -%}\n{%- endfor -%}\n\nListing 4-6\nThe Contents of the New sections/footer.liquid\
    \ File\n```\n\n```liquid\n...\n{{ content_for_layout }}\n{%- section 'footer'\
    \ -%}\n{{- 'jquery-3.1.1.min.js' | asset_url | script_tag -}}\n...\nListing 4-7\n\
    The Inclusion of the New Footer Section in theme.liquid\n```\n\nThe `footer.liquid`\
    \ code introduces a new Liquid concept: blocks. Blocks are wrappers around content\
    \ and settings, which can be added, removed, and reordered within a particular\
    \ section. It makes sense to use blocks when you’d like to allow the theme owner\
    \ to define repeated sections of content, or control the order content appears\
    \ in.\n\nIn this footer, we defined two type of blocks within the footer section—a\
    \ `link_list` type and a `payment_icons` type. The first allows the rendering\
    \ of a vertical navigation menu within a footer column, the second displays a\
    \ list of supported payment icons on the storefront. From the theme customizer,\
    \ storeowners will be able to add and remove these blocks to configure the footer\
    \ at will.\n\nIn `footer.liquid`, the code loops over each block configured in\
    \ the section, checks its type, and includes either `footer-block-link-list.liquid`\
    \ or `footer-block-payment-icons.liquid`. These are Liquid snippet files, stored\
    \ in the theme’s `snippets` directory in order to logically partition and simplify\
    \ the code in the `footer.liquid` section. The filenames used here are just a\
    \ convention to identify that they are included as blocks from within the footer\
    \ section. Check out the example theme repository for the full implementation\
    \ of these snippets.\n\nFigure [4-10](#A437216_1_En_4_Chapter.html#Fig10) shows\
    \ the result of adding the footer in the theme customizer and in the theme preview.\n\
    \n![A437216_1_En_4_Fig10_HTML.jpg](A437216_1_En_4_Fig10_HTML.jpg)\n\nFigure 4-10\n\
    \nAdding the footer snippet gives a customizable multi-column footer layout\n\n\
    ### Exercise: Layout and Navigation\n\n1. Following the steps from this chapter,\
    \ add header and footer sections to your theme, including the configurable `{%\
    \ schema %}` sections to allow users to configure the navigation menus to be used\
    \ in each section.\n2. Design an information hierarchy for the most important\
    \ pages for your own hypothetical store, including a product hierarchy and sensible\
    \ categorization system.\n3. If your information hierarchy calls for multiple\
    \ levels of information, add a dropdown menu to your main navigation to make it\
    \ easier for customers to find what they’re looking for. If you’re feeling plucky,\
    \ implement the dropdown menu as a mega-menu with some additional graphical information\
    \ inside the expanded area."
  raw: '#### Mega-Menus


    If you have a lot of categories, you might find you have too much information
    to fit into a single level of dropdowns. That’s where the common mega-menu design
    pattern comes in to play. Mega-menus let you offer many deep navigation choices
    to users, presented in a structure you can control and illustrate if needed (see
    Figure [4-8](#A437216_1_En_4_Chapter.html#Fig8)).


    ![A437216_1_En_4_Fig8_HTML.jpg](A437216_1_En_4_Fig8_HTML.jpg)


    Figure 4-8


    While quite cluttered, this example shows how mega-menus can be used to categorize
    a large number of deep links on the ASOS site


    Because mega-menus offer a high degree of space and flexibility, they should be
    treated as a design canvas unto themselves rather than just a way to list a bunch
    of items. Doing this, in combination with the following recommendations, will
    help you make the most of your menus and provide a better shopping experience
    to customers.


    *   Use headings and columns to clearly break down and identify the chosen sections
    of your menu. The choice of columns should reflect the common ways customers may
    want to browse the product range—e.g., Shop by Size, Shop by Brand, and Shop by
    Price.

    *   You don’t need to simply order products or categories alphabetically. Use
    the flexibility of the mega-menu to promote your best selling or featured items
    on the top left of the menu.

    *   Keep mega-menus short. Making menus too tall presents problems for users with
    small screens. You can compensate by using the full width of the screen.

    *   Don’t be afraid to use images or graphics to enhance products or categories
    (without going overboard and turning your mega-menu into a visual mess).

    *   Ensure your menus are mobile friendly by using responsive design techniques.


    The Sunglass Hut has an excellent example of an effective mega-menu, shown in
    Figure [4-9](#A437216_1_En_4_Chapter.html#Fig9). A considered selection of top-level
    items (Hers, His…) opens (with a click!) a mega-menu that offers further deep
    navigation. The menu effectively makes use of graphics to offer a Featured Brands
    functionality as well as a featured collection at the bottom.


    ![A437216_1_En_4_Fig9_HTML.jpg](A437216_1_En_4_Fig9_HTML.jpg)


    Figure 4-9


    The Sunglass Hut’s interesting horizontal twist on the mega-menu is a great example
    of menu design


    The implementation logic behind a mega-menu is similar to the existing dropdown
    menu we’ve implemented on the example theme; the key difference is in the styling
    and sizing of the elements displayed. For this reason, and because we’re not yet
    dealing with that many products, let’s leave the implementation of a mega-menu
    on the store for now and move on to another important navigation element—the footer.


    ### The Site Footer


    More than just a spot to dump an e-mail signup form, designers often overlook
    the incredibly useful role footers play in navigation. They can serve as a get
    out of jail tool for users who have made it to the bottom of the page without
    finding what they’re looking for, reducing the chance of someone bouncing off
    your site. Thanks to convention, they are also often the first place customers
    will look when in search of your shipping, refund, and return policies.


    Additionally, footers are a great place to place trust signals like “secure” or
    “trusted” site badges and logos, logos of well-known customers, or logos of media
    companies that have covered your brand. Studies show that reinforcing the trustworthiness
    of your site with these types of signals on every page can have a positive impact
    on conversion rates.


    Note


    All this useful information in the footer can be lost if your store implements
    “infinite scroll” techniques on collection pages. This is one of a couple of reasons
    I don’t recommend using infinite scroll on Ecommerce sites. You’ll dig into this
    more in Chapter [6](#A437216_1_En_6_Chapter.html) when diving into collection
    page design.


    To implement a footer in the example theme, we’re going to take a similar approach
    to the header and create a new section called `footer.liquid` (see Listing [4-6](#A437216_1_En_4_Chapter.html#Par95))
    then include it from `theme.liquid` (see Listing [4-7](#A437216_1_En_4_Chapter.html#Par96)),
    this time underneath the `{{ content_for_layout }}` tag. Like with `sections/header.liquid`,
    we need to include a `{% schema %}` section at the top to allow users to customize
    the footer .


    ```

    {% schema %}

    {

    "name": "Footer",

    "blocks": [

    {

    "type": "link_list",

    "name": "Navigation menu",

    "settings": [

    {

    "id": "link_list",

    "type": "link_list",

    "label": "Navigation menu"

    }

    ]

    },

    {

    "type": "payment_icons",

    "name": "Payment icons"

    }

    ]

    }

    {% endschema %}


    {%- for block in section.blocks -%}

    {%- case block.type -%}

    {%- when ''link_list'' -%}

    {%- include ''footer-block-link-list'' -%}

    {%- when ''payment_icons'' -%}

    {%- include ''footer-block-payment-icons'' -%}

    {%- endcase -%}

    {%- endfor -%}


    Listing 4-6

    The Contents of the New sections/footer.liquid File

    ```


    ```

    ...

    {{ content_for_layout }}

    {%- section ''footer'' -%}

    {{- ''jquery-3.1.1.min.js'' | asset_url | script_tag -}}

    ...

    Listing 4-7

    The Inclusion of the New Footer Section in theme.liquid

    ```


    The `footer.liquid` code introduces a new Liquid concept: blocks. Blocks are wrappers
    around content and settings, which can be added, removed, and reordered within
    a particular section. It makes sense to use blocks when you’d like to allow the
    theme owner to define repeated sections of content, or control the order content
    appears in.


    In this footer, we defined two type of blocks within the footer section—a `link_list`
    type and a `payment_icons` type. The first allows the rendering of a vertical
    navigation menu within a footer column, the second displays a list of supported
    payment icons on the storefront. From the theme customizer, storeowners will be
    able to add and remove these blocks to configure the footer at will .


    In `footer.liquid`, the code loops over each block configured in the section,
    checks its type, and includes either `footer-block-link-list.liquid` or `footer-block-payment-icons.liquid.`
    These are Liquid snippet files, stored in the theme’s `snippets` directory in
    order to logically partition and simplify the code in the `footer.liquid` section.
    The filenames used here are just a convention to identify that they are included
    as blocks from within the footer section). Check out the example theme repository
    for the full implementation of these snippets.


    Figure [4-10](#A437216_1_En_4_Chapter.html#Fig10) shows the result of adding the
    footer in the theme customizer and in the theme preview.


    ![A437216_1_En_4_Fig10_HTML.jpg](A437216_1_En_4_Fig10_HTML.jpg)


    Figure 4-10


    Adding the footer snippet gives a customizable multi-column footer layout Exercise:
    Layout and Navigation


    1.  Following the steps from this chapter, add header and footer sections to your
    theme, including the configurable `{% schema %}` sections to allow users to configure
    the navigation menus to be used in each section.  

    2.  Design an information hierarchy for the most important pages for your own
    hypothetical store, including a product hierarchy and sensible categorization
    system.  

    3.  If your information hierarchy calls for multiple levels of information, add
    a dropdown menu to your main navigation to make it easier for customers to find
    what they’re looking for. If you’re feeling plucky, implement the dropdown menu
    as a mega-menu with some additional graphical information inside the expanded
    area.'
  trans: '

    ### 大型菜单（Mega-Menus）


    如果你的分类很多，可能会发现信息量太大，无法在单级下拉菜单中容纳。这时，常见的大型菜单设计模式就派上了用场。大型菜单允许你向用户提供许多深层次的导航选项，并以你可控且可配图的结构呈现（见图
    4-8）。


    ![A437216_1_En_4_Fig8_HTML.jpg](img/A437216_1_En_4_Fig8_HTML.jpg)


    图 4-8


    尽管看起来有些杂乱，但这个示例展示了如何使用大型菜单对 ASOS 网站上大量深层链接进行分类。


    由于大型菜单提供了高度的空间和灵活性，它们应被视为一个独立的设计画布，而不仅仅是列出大量项目的方式。这样做，并结合以下建议，将帮助你充分利用菜单，为客户提供更好的购物体验。


    -   使用标题和列来清晰地划分和标识你所选的菜单部分。列的选择应反映客户浏览产品范围的常见方式——例如，“按尺寸选购”、“按品牌选购”和“按价格选购”。

    -   你不必简单地按字母顺序排列产品或分类。利用大型菜单的灵活性，在菜单的左上角推广你的畅销品或特色商品。

    -   保持大型菜单简短。菜单过高会给屏幕较小的用户带来问题。你可以通过充分利用屏幕宽度来弥补。

    -   不要害怕使用图片或图形来美化产品或分类（但不要过度，以免让你的大型菜单变得视觉混乱）。

    -   通过使用响应式设计技术，确保你的菜单在移动设备上友好。


    Sunglass Hut 提供了一个优秀的大型菜单示例，如图 4-9 所示。精心挑选的顶级项目（女款、男款...）通过点击打开一个提供更深层次导航的大型菜单。该菜单有效利用图形提供了“特色品牌”功能以及底部的特色系列。


    ![A437216_1_En_4_Fig9_HTML.jpg](img/A437216_1_En_4_Fig9_HTML.jpg)


    图 4-9


    Sunglass Hut 在大型菜单上有趣的横向变动是菜单设计的一个绝佳范例。


    大型菜单背后的实现逻辑与我们已经在示例主题中实现的下拉菜单类似；主要区别在于所显示元素的样式和大小。基于这个原因，并且因为我们还没有处理那么多产品，让我们暂时搁置在商店中实现大型菜单的工作，转而讨论另一个重要的导航元素——页脚。


    ### 网站页脚（The Site Footer）


    页脚不仅仅是放置电子邮件注册表单的地方，设计师们常常忽视页脚在导航中极其有用的作用。对于已经滚动到页面底部但未找到所需内容的用户来说，页脚可以充当“救星”工具，降低用户跳出你网站的可能性。由于惯例，页脚也通常是客户寻找有关运费、退款和退货政策信息时首先查看的地方。


    此外，页脚是放置信任信号的好地方，例如“安全”或“可信赖”网站徽章和标志、知名客户的标志，或报道过你品牌的媒体公司标志。研究表明，在每个页面上使用这些类型的信号来加强网站的可信度，可以对转化率产生积极影响。


    > **注**

    > 如果你的商店在系列页面上采用了“无限滚动”技术，页脚中所有这些有用的信息可能会丢失。这是我不建议在电商网站使用无限滚动的几个原因之一。在深入探讨系列页面设计的第
    6 章中，你将更深入地了解这一点。


    为了在示例主题中实现页脚，我们将采用与页眉类似的方法，创建一个名为 `footer.liquid` 的新部分（参见代码清单 4-6），然后从 `theme.liquid`（参见代码清单
    4-7）中包含它，这次放在 `{{ content_for_layout }}` 标签之下。与 `sections/header.liquid` 一样，我们需要在顶部包含一个
    `{% schema %}` 部分，以允许用户自定义页脚。


    ```liquid

    {% schema %}

    {

    "name": "Footer",

    "blocks": [

    {

    "type": "link_list",

    "name": "导航菜单",

    "settings": [

    {

    "id": "link_list",

    "type": "link_list",

    "label": "导航菜单"

    }

    ]

    },

    {

    "type": "payment_icons",

    "name": "支付图标"

    }

    ]

    }

    {% endschema %}


    {%- for block in section.blocks -%}

    {%- case block.type -%}

    {%- when ''link_list'' -%}

    {%- include ''footer-block-link-list'' -%}

    {%- when ''payment_icons'' -%}

    {%- include ''footer-block-payment-icons'' -%}

    {%- endcase -%}

    {%- endfor -%}


    代码清单 4-6

    新建 sections/footer.liquid 文件的内容

    ```


    ```liquid

    ...

    {{ content_for_layout }}

    {%- section ''footer'' -%}

    {{- ''jquery-3.1.1.min.js'' | asset_url | script_tag -}}

    ...

    代码清单 4-7

    在 theme.liquid 中包含新的页脚部分

    ```


    `footer.liquid` 代码引入了一个新的 Liquid 概念：块。块是内容和设置的封装器，可以在特定部分内添加、删除和重新排序。当你希望允许主题所有者定义重复的内容部分或控制内容出现的顺序时，使用块是合理的。


    在此页脚中，我们在页脚部分内定义了两类块——一个 `link_list` 类型和一个 `payment_icons` 类型。第一个允许在页脚列内呈现垂直导航菜单，第二个则在商店前台显示支持的支付图标列表。通过主题定制器，店主将能够自由添加或删除这些块来配置页脚。


    在 `footer.liquid` 中，代码会遍历在该部分中配置的每个块，检查其类型，并包含 `footer-block-link-list.liquid`
    或 `footer-block-payment-icons.liquid`。这些是 Liquid 代码片段文件，存储在主题的 `snippets` 目录中，以便在逻辑上划分和简化
    `footer.liquid` 部分中的代码。这里使用的文件名只是一种约定，用以标识它们是从页脚部分作为块被包含进来的。请查看示例主题仓库以获取这些代码片段的完整实现。


    图 4-10 展示了在主题定制器和主题预览中添加页脚后的结果。


    ![A437216_1_En_4_Fig10_HTML.jpg](img/A437216_1_En_4_Fig10_HTML.jpg)


    图 4-10


    添加页脚代码段可提供可自定义的多列页脚布局


    ### 练习：布局与导航


    1.  按照本章的步骤，向你的主题添加页眉和页脚部分，包括可配置的 `{% schema %}` 部分，以允许用户配置每个部分中使用的导航菜单。

    2.  为你自己假设的商店设计最重要页面的信息层级，包括产品层级和合理的分类系统。

    3.  如果你的信息层级需要多层信息，请在主导航中添加一个下拉菜单，以便客户更容易找到他们想要的东西。如果你有雄心壮志，可以将该下拉菜单实现为大型菜单，并在展开区域内包含一些额外的图形信息。

