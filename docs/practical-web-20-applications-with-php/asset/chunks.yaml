    This code passes a function as the argument to each(). This function is executed
    once for each item in the array each() is called on. The argument passed to this
    function is the element in question, thereby allowing us to call hide() or show()
    directly on it.


    ■**Note** Although I didn’t use it in this case, the second argument passed to
    the function inside each() contains the loop number. For example, function(s,
    idx) { … } would pass 0 in the idx parameter for the first element, 1 for the
    second, and so on.


    Alternatively, you can use invoke() instead of each(). This allows you to call
    a single method on each element, with an arbitrary number of arguments. This would
    work perfectly in this hide/show example, as we are just calling these methods
    for each box. However, if you needed to execute multiple lines of code, you would
    need to go back to using each().


    Listing 5-4 shows the hideAll() and showAll() functions with a call to invoke().
    Note that the method you want to invoke on each array element is passed as a string.


