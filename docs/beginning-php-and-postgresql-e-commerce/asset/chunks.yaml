    **5.** Also in php.ini, find this line:


    extension_dir = "./"


    and change it to


    extension_dir = "C:\PHP\ext"


    **6.** Copy libmhash.dll, libeay32.dll, ssleay32.dll, and libmcrypt.dll from your
    PHP


    folder to the Windows System32 folder.


    **7.** Open for editing, with any text editor (even Notepad), the Apache configuration
    file.


    The default location of this file is conf\httpd.conf under the Apache installation
    folder.


    **8.** In httpd.conf, find the portion with many LoadModule entries, and add the
    following lines (the names may vary depending on your specific Apache and PHP
    versions): LoadModule php5_module c:/php/php5apache2_2.dll


    AddType application/x-httpd-php .php


    ■**Note** If you don’t have the php5apach2_2.dll file in your PHP folder, you
    can get it in the packages you can download from http://snaps.php.net/.


    **9.** Also in httpd.conf, find the DirectoryIndex entry, and add index.php at
    the end of the line, like this:


    DirectoryIndex index.html **index.php**


    **10.** Save your changes in httpd.conf, then restart Apache 2\. If you get any
    errors at this stage, you should check that you correctly implemented the previous
    steps.


    **11.** To test that your PHP installation works, create a file named test.php
    in the htdocs folder of your Apache installation with a call to PHP’s phpinfo()
    function:


    <?php


    phpinfo();


    ?>


    **12.** Point your web browser to http://localhost/test.php (or http://localhost:8080/


    test.php if you installed Apache to work on port 8080) to test whether everything
