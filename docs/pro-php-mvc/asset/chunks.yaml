    - `application/views/navigation.html`，333\n- `render()` 方法，211\n- `application/views/users/edit.html`，332\n\
    - 视图类，208\n- `application/views/users/view.html`，331\n- 数据库工厂类配置，205\n- 内容管理系统\
    \ (CMS)，321\n- 目标，201\n- `delete()`/`undelete()` 动作，330\n- `Index.php`，203\n-\
    \ `edit()`/`view()` 动作，329\n- URL 重写，202\n- 文件 `view()`、`delete()` 和 `undelete()`\
