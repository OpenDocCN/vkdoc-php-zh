- fmt: '# 算术运算符


    算术运算符包括四种基本算术运算，以及用于获取除法余数的取模运算符（`%`）。


    ```

    $x = 4 + 2; // 6 // addition

    $x = 4 - 2; // 2 // subtraction

    $x = 4 * 2; // 8 // multiplication

    $x = 4 / 2; // 2 // division

    $x = 4 % 2; // 0 // modulus (division remainder)

    ```


    # 赋值运算符


    第二组是赋值运算符。最重要的是赋值运算符（`=`）本身，它将一个值赋给一个变量。


    ## 复合赋值运算符


    赋值运算符和算术运算符的一个常见用法是对一个变量进行操作，然后将结果保存回同一个变量。这些操作可以通过复合赋值运算符来简化。


    ```

    $x = 0;

    $x += 5; // $x = $x+5;

    $x -= 5; // $x = $x-5;

    $x *= 5; // $x = $x*5;

    $x /= 5; // $x = $x/5;

    $x %= 5; // $x = $x%5;

    ```


    ## 递增和递减运算符


    另一个常见操作是将变量递增或递减 1。这可以通过递增（`++`）和递减（`--`）运算符来简化。


    ```

    $x++; // $x += 1;

    $x--; // $x -= 1;

    ```


    这两个运算符都可以放在变量的前面或后面。


    ```

    $x++; // post-increment

    $x--; // post-decrement

    ++$x; // pre-increment

    --$x; // pre-decrement

    ```


    无论使用哪种方式，对变量的结果都是相同的。区别在于，后置运算符在修改变量之前返回原始值，而前置运算符先修改变量，然后返回值。


    ```

    $x = 5; $y = $x++; // $x=6, $y=5

    $x = 5; $y = ++$x; // $x=6, $y=6

    ```


    # 比较运算符


    比较运算符比较两个值并返回`true`或`false`。它们主要用于指定条件，这些条件是指计算结果为`true`或`false`的表达式。


    ```

    $x = (2 == 3);  // false // equal to

    $x = (2 != 3);  // true  // not equal to

    $x = (2 <> 3);  // true  // not equal to (alternative)

    $x = (2 === 3); // false // identical

    $x = (2 !== 3); // true  // not identical

    $x = (2 > 3);   // false // greater than

    $x = (2 < 3);   // true  // less than

    $x = (2 >= 3);  // false // greater than or equal to

    $x = (2 <= 3);  // true  // less than or equal to

    ```


    全等运算符（`===`）用于比较操作数的值和数据类型。如果两个操作数的值相同且类型相同，则返回`true`。同样，不全等运算符（`!==`）如果操作数的值不相同或类型不相同，则返回`true`。换句话说，相等运算符会执行类型转换，而全等运算符则不会。


    ```

    $x = (1 ==  "1"); // true  (same value)

    $x = (1 === "1"); // false (different types)

    ```


    # 逻辑运算符


    逻辑运算符通常与比较运算符一起使用。逻辑与（`&&`）如果左侧和右侧都为真，则计算结果为`true`，逻辑或（`||`）如果左侧或右侧为真，则计算结果为`true`。逻辑非（`!`）运算符用于反转布尔结果。请注意，对于“逻辑与”和“逻辑或”，如果结果已由左侧确定，则不会计算运算符的右侧。


    ```

    $x = (true && false); // false // logical and

    $x = (true || false); // true  // logical or

    $x = !(true);         // false // logical not

    ```


    # 位运算符


    位运算符可以操作数字的二进制位。例如，异或运算符（`^`）会打开运算符一侧设置的位，但不会打开两侧都设置的位。


    ```

    $x = 5 & 4;  // 101 & 100 = 100 (4) // and

    $x = 5 | 4;  // 101 | 100 = 101 (5) // or

    $x = 5 ^ 4;  // 101 ^ 100 = 001 (1) // xor (exclusive or)

    $x = 4 << 1; // 100 << 1  =1000 (8) // left shift

    $x = 4 >> 1; // 100 >> 1  =  10 (2) // right shift

    $x = ~4;     // ~00000100 = 11111011 (-5) // invert

    ```


    这些位运算符与算术运算符一样，也有简写的赋值运算符。


    ```

    $x=5; $x &= 4;  // 101 & 100 = 100 (4) // and

    $x=5; $x |= 4;  // 101 | 100 = 101 (5) // or

    $x=5; $x ^= 4;  // 101 ^ 100 = 001 (1) // xor

    $x=5; $x <<= 1; // 101 << 1  =1010 (10)// left shift

    $x=5; $x >>= 1; // 101 >> 1  =  10 (2) // right shift

    ```


    # 运算符优先级


    在 PHP 中，表达式通常从左到右计算。然而，当一个表达式包含多个运算符时，这些运算符的优先级决定了它们被计算的顺序。


    ![image](images/Table3-1.jpg)


    例如，逻辑与（`&&`）的绑定优先级低于关系运算符，而关系运算符的绑定优先级又低于算术运算符。


    ```

    $x = 2+3 > 1*4 && 5/5 == 1; // true

    ```


    为了更清晰，可以使用括号来指定表达式的哪一部分将被首先计算。括号在所有运算符中优先级最高。


    ```

    $x = ((2+3) > (1*4)) && ((5/5) == 1); // true

    ```


    ## 额外的逻辑运算符


    在优先级表中，请特别注意最后三个运算符：`and`、`or`和`xor`。`and`和`or`运算符的工作方式与逻辑运算符`&&`和`||`相同。唯一的区别是它们的优先级较低。


    ```

    // Same as: $a = (true && false);

    $a = true && false; // $a is false


    // Same as: ($a = true) and false;

    $a = true and false; // $a is true

    ```


    `xor`运算符是位运算符`^`的布尔版本。如果只有一个操作数为真，则计算结果为`true`。


    ```

    $a = (true xor true); // false

    ```


    # 第四章


    ![image](images/frontdot.jpg)


    # 字符串


    字符串是可以存储在变量中的一系列字符。在 PHP 中，字符串通常由单引号分隔。


    ```

    $a = ''Hello'';

    ```


    ## 字符串连接


    PHP 有两个字符串运算符。点号（`.`）被称为连接运算符，它将两个字符串合并为一个。它还有一个配套的赋值运算符（`.=`），它将右侧字符串追加到左侧字符串变量。


    ```

    $b = $a . '' World''; // Hello World

    $a .= '' World'';     // Hello World

    ```


    ## 分隔字符串


    PHP 字符串可以用四种不同的方式分隔。有两种单行表示法：双引号（`" "`）和单引号（`'' ''`）。它们之间的区别在于，变量在单引号字符串中不会被解析，而在双引号字符串中则会被解析。


    ```

    $c = ''World'';

    echo "Hello $c"; // "Hello World"

    echo ''Hello $c''; // "Hello $c"

    ```


    单引号字符串通常更受青睐，除非需要解析变量，主要是因为字符串解析会带来非常小的性能开销。然而，双引号字符串被认为更易于阅读，这使得选择更多是出于个人偏好。


    除了单引号和双引号字符串外，还有两种多行表示法：heredoc 和 nowdoc。这些表示法主要用于包含较大的文本块。


    ### Heredoc 字符串


    heredoc 语法由`<<<`运算符后跟一个标识符和一个换行符组成。然后包含字符串，接着是一个包含该标识符的换行符以关闭字符串。与双引号字符串一样，变量在
    heredoc 字符串内部会被解析。


    ```

    $s = <<<LABEL

    Heredoc (with parsing)

    LABEL;

    ```


    ### Nowdoc 字符串


    nowdoc 字符串的语法与 heredoc 字符串相同，只是初始标识符用单引号括起来。变量不会在 nowdoc 字符串内部被解析。


    ```

    $s = <<<''LABEL''

    Nowdoc (without parsing)

    LABEL;

    ```


    ## 转义字符


    转义字符用于编写特殊字符，例如反斜杠或双引号。PHP 中可用的转义字符表如下所示。


    ![image](images/Table4-1.jpg)


    例如，换行符在文本中用转义字符`\n`表示。


    ```

    $s = "Hello\nWorld";

    ```


    请注意，此字符不同于`<br>` HTML 标签，后者在网页上创建换行。


    ```

    echo "Hello<br>World";

    ```'
  raw: 'The arithmetic operators include the four basic arithmetic operations, as
    well as the modulus operator (`%`) which is used to obtain the division remainder.


    ```

    $x = 4 + 2; // 6 // addition

    $x = 4 - 2; // 2 // subtraction

    $x = 4 * 2; // 8 // multiplication

    $x = 4 / 2; // 2 // division

    $x = 4 % 2; // 0 // modulus (division remainder)

    ```


    Assignment operators


    The second group is the assignment operators. Most importantly, the assignment
    operator (`=`) itself, which assigns a value to a variable.


    Combined assignment operators


    A common use of the assignment and arithmetic operators is to operate on a variable
    and then to save the result back into that same variable. These operations can
    be shortened with the combined assignment operators.


    ```

    $x = 0;

    $x += 5; // $x = $x+5;

    $x -= 5; // $x = $x-5;

    $x *= 5; // $x = $x*5;

    $x /= 5; // $x = $x/5;

    $x %= 5; // $x = $x%5;

    ```


    Increment and decrement operators


    Another common operation is to increment or decrement a variable by one. This
    can be simplified with the increment (`++`) and decrement (`−−`) operators.


    ```

    $x++; // $x += 1;

    $x−−; // $x -= 1;

    ```


    Both of these operators can be used either before or after a variable.


    ```

    $x++; // post-increment

    $x−−; // post-decrement

    ++$x; // pre-increment

    −−$x; // pre-decrement

    ```


    The result on the variable is the same whichever is used. The difference is that
    the post-operator returns the original value before it changes the variable, while
    the pre-operator changes the variable first and then returns the value.


    ```

    $x = 5; $y = $x++; // $x=6, $y=5

    $x = 5; $y = ++$x; // $x=6, $y=6

    ```


    Comparison operators


    The comparison operators compare two values and return either true or false. They
    are mainly used to specify conditions, which are expressions that evaluate to
    either true or false.


    ```

    $x = (2 == 3);  // false // equal to

    $x = (2 != 3);  // true  // not equal to

    $x = (2 <> 3);  // true  // not equal to (alternative)

    $x = (2 === 3); // false // identical

    $x = (2 !== 3); // true  // not identical

    $x = (2 > 3);   // false // greater than

    $x = (2 < 3);   // true  // less than

    $x = (2 >= 3);  // false // greater than or equal to

    $x = (2 <= 3);  // true  // less than or equal to

    ```


    The identical operator (`===`) is used for comparing both the value and data type
    of the operands. It returns true if both operands have the same value and are
    of the same type. Likewise, the not identical operator (`!==`) returns true if
    the operands do not have the same value or are not of the same type. Put another
    way, the equality operators will perform type conversions, whereas the identical
    operators will not.


    ```

    $x = (1 ==  "1"); // true  (same value)

    $x = (1 === "1"); // false (different types)

    ```


    Logical operators


    The logical operators are often used together with the comparison operators. Logical
    and (`&&`) evaluates to true if both the left and right side are true, and logical
    or (`||`) evaluates to true if either the left or right side is true. The logical
    not (`!`) operator is used for inverting a Boolean result. Note that for both
    “logical and” and “logical or” the right side of the operator will not be evaluated
    if the result is already determined by the left side.


    ```

    $x = (true && false); // false // logical and

    $x = (true || false); // true  // logical or

    $x = !(true);         // false // logical not

    ```


    Bitwise operators


    The bitwise operators can manipulate binary digits of numbers. For example, the
    xor operator (`^`) turn on the bits that are set on one side of the operator,
    but not on both sides.


    ```

    $x = 5 & 4;  // 101 & 100 = 100 (4) // and

    $x = 5 | 4;  // 101 | 100 = 101 (5) // or

    $x = 5 ^ 4;  // 101 ^ 100 = 001 (1) // xor (exclusive or)

    $x = 4 << 1; // 100 << 1  =1000 (8) // left shift

    $x = 4 >> 1; // 100 >> 1  =  10 (2) // right shift

    $x = ∼4;     // ∼00000100 = 11111011 (-5) // invert

    ```


    These bitwise operators have shorthand assignment operators, just like the arithmetic
    operators.


    ```

    $x=5; $x &= 4;  // 101 & 100 = 100 (4) // and

    $x=5; $x |= 4;  // 101 | 100 = 101 (5) // or

    $x=5; $x ^= 4;  // 101 ^ 100 = 001 (1) // xor

    $x=5; $x <<= 1; // 101 << 1  =1010 (10)// left shift

    $x=5; $x >>= 1; // 101 >> 1  =  10 (2) // right shift

    ```


    Operator precedence


    In PHP, expressions are normally evaluated from left to right. However, when an
    expression contains multiple operators, the precedence of those operators decides
    the order in which they are evaluated.


    ![image](images/Table3-1.jpg)


    For example, logical and (`&&`) binds weaker than relational operators, which
    in turn bind weaker than arithmetic operators.


    ```

    $x = 2+3 > 1*4 && 5/5 == 1; // true

    ```


    To make things clearer, parentheses can be used to specify which part of the expression
    will be evaluated first. Parentheses have the highest precedence of all operators.


    ```

    $x = ((2+3) > (1*4)) && ((5/5) == 1); // true

    ```


    Additional logical operators


    In the precedence table make special note of the last three operators: `and`,
    `or` and `xor`. The `and` and `or` operators work in the same way as the logical
    `&&` and `||` operators. The only difference is their lower level of precedence.


    ```

    // Same as: $a = (true && false);

    $a = true && false; // $a is false


    // Same as: ($a = true) and false;

    $a = true and false; // $a is true

    ```


    The `xor` operator is a Boolean version of the bitwise `^` operator. It evaluates
    to true if only one of the operands are true.


    ```

    $a = (true xor true); // false

    ```


    CHAPTER 4


    ![image](images/frontdot.jpg)


    String


    A string is a series of characters that can be stored in a variable. In PHP, strings
    are typically delimited by single quotes.


    ```

    $a = ''Hello'';

    ```


    String concatenation


    PHP has two string operators. The dot symbol is known as the concatenation operator
    (`.`) and combines two strings into one. It also has an accompanying assignment
    operator (`.=`), which appends the right-hand string to the left-hand string variable.


    ```

    $b = $a . '' World''; // Hello World

    $a .= '' World'';     // Hello World

    ```


    Delimiting strings


    PHP strings can be delimited in four different ways. There are two single-line
    notations: double-quote (`" "`) and single-quote (`'' ''`). The difference between
    them is that variables are not parsed in single-quoted strings whereas they are
    parsed in double-quoted strings.


    ```

    $c = ''World'';

    echo "Hello $c"; // "Hello World"

    echo ''Hello $c''; // "Hello $c"

    ```


    Single-quoted strings tend to be preferred unless parsing is desired, mainly because
    string parsing has a very small performance overhead. However, double-quoted strings
    are considered easier to read, which makes the choice more a matter of preference.


    In addition to single-quoted and double-quoted strings, there are two multi-line
    notations: heredoc and nowdoc. These notations are mainly used to include larger
    blocks of text.


    Heredoc strings


    The heredoc syntax consists of the `<<<` operator followed by an identifier and
    a new line. The string is then included followed by a new line containing the
    identifier in order to close the string. Variables are parsed inside of a heredoc
    string, just as with double-quoted strings.


    ```

    $s = <<<LABEL

    Heredoc (with parsing)

    LABEL;

    ```


    Nowdoc strings


    The syntax for the nowdoc string is the same as for the heredoc string, except
    that the initial identifier is enclosed in single-quotes. Variables will not be
    parsed inside a nowdoc string.


    ```

    $s = <<<''LABEL''

    Nowdoc (without parsing)

    LABEL;

    ```


    Escape characters


    Escape characters are used to write special characters, such as backslashes or
    double-quotes. A table of the escape characters available in PHP can be seen below.


    ![image](images/Table4-1.jpg)


    For example, line breaks are represented with the escape character “\n” in text.


    ```

    $s = "Hello\nWorld";

    ```


    Note that this character is different from the `<br>` HTML tag, which creates
    line breaks on web pages.


    ```

    echo "Hello<br>World";

    ```'
