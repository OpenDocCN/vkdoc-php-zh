  trans: "\n## 总结\n\n在本章中，你学习了如何访问 `products` 数据表中的产品，并以表格形式将其显示在屏幕上。你还学习了如何创建显示不同产品类别的下拉菜单，并实现页面间的导航。此外，你还学习了如何显示属于特定类别的产品、定义网站页眉、实现搜索功能，以及展示选定产品的详细信息。你还了解了网站如何通过会话处理来记住访问者信息。在编写网站首页代码之前，你学习了如何为网站应用登录和注销功能。\n\
    \n下一章将重点介绍用户选择放入购物车的商品。你将学习如何显示购物车以及编辑购物车中的商品。你还将了解如何下单，以及如何输入和保存用户的配送信息。最后，你将学习提供不同的支付方式，供用户购买你的产品。\n\
    \n# 4. 管理购物车\n\n电子补充材料 本章在线版本（doi:[10.1007/978-1-4842-1672-9_4](http://dx.doi.org/10.1007/978-1-4842-1672-9_4)）包含补充材料，仅供授权用户使用。\n\
    \n到目前为止，我们一直专注于展示产品列表及其详细信息。在本章中，你将让用户能够选择他们想要购买的产品，并将其添加到购物车中。\n\n顾名思义，购物车是一个软件模块，用于显示访问者选择购买的产品。购物车中的商品可以根据需要修改，即在将产品添加到购物车后，用户可以从购物车中移除商品、添加更多商品，或增加已在购物车中选定商品的数量。购物车是一个数据表，用于临时保存用户选定要购买的商品。\n\
    \n为了存储和管理购物车中的商品，我们创建了一个名为 `cart` 的数据表，其结构在第 1 章中定义。在这里，你将学习编写代码，将访问者想要购买的商品保存到购物车中。\n\
    \n在本章中，你将学习以下内容：\n\n- 将选定商品保存到购物车\n- 维护购物车\n- 使用 AJAX 在网站页眉中显示购物车数量\n- 进入结算流程\n\
    - 提供配送信息\n- 了解不同的支付方式\n- 进行支付\n\n## 将选定商品保存到购物车\n\n回顾第 3 章中清单 3-7 所示的 `itemdetails.php`\
    \ 脚本，它展示了选定产品的详细信息，并在信息下方显示以下两个按钮：\n\n- **立即购买** — 将商品添加到购物车并进入结算流程。\n- **加入购物车**\
    \ — 将商品添加到购物车并停留在当前页面，以便用户选择更多产品。\n\n**加入购物车**按钮会导航到 `cart.php` 脚本，该脚本将当前产品的信息保存到\
    \ `cart` 数据表中。`cart.php` 脚本的代码如清单 4-1 所示。\n\n**清单 4-1.** `cart.php` 脚本保存用户选定的商品\n\
    \n```\n<?php\n\ninclude('topmenu.php');\n\nif (session_status() == PHP_SESSION_NONE)\
    \ {\n    session_start();\n}\n\n$connect = mysqli_connect(\"localhost\", \"root\"\
    , \"gold\", \"shopping\") or die(\"请检查服务器连接。\");\n\n$message = \"\";\n$quantity=\"\
    \";\n$action=\"\";\n$query=\"\";\n\nif (isset($_POST['quantity'])) {\n    $quantity\
    \ = trim($_POST['quantity']);\n}\n\nif ($quantity=='')\n{\n    $quantity=1;\n\
    }\n\nif($quantity <=0)\n{\n    echo \"数量值无效 \";\n    echo \"请返回并输入有效值\";\n}\n\
    else\n{\n    if (isset($_REQUEST['icode'])) {\n        $itemcode = $_REQUEST['icode'];\n\
    \    }\n\n    if (isset($_REQUEST['iname'])) {\n        $item_name = $_REQUEST['iname'];\n\
    \    }\n\n    if (isset($_REQUEST['iprice'])) {\n        $price = $_REQUEST['iprice'];\n\
    \    }\n\n    if (isset($_POST['modified_quantity'])) {\n        $modified_quantity\
    \ = $_POST['modified_quantity'];\n    }\n\n    $sess = session_id();\n\n    if\
    \ (isset($_REQUEST['action'])) {\n        $action = $_REQUEST['action'];\n   \
    \ }\n\n    switch ($action) {\n        case \"add\":\n            $query=\"select\
    \ * from cart where cart_sess = '$sess' and cart_itemcode like '$itemcode'\";\n\
    \            $result = mysqli_query($connect, $query) or die(mysql_error());\n\
    \            if(mysqli_num_rows($result)==1)\n            {\n                $row=mysqli_fetch_array($result,\
    \ MYSQLI_ASSOC);\n                $qt=$row['cart_quantity'];\n               \
    \ $qt=$qt + $quantity;\n                $query=\"UPDATE cart set cart_quantity=$qt\
    \ where cart_sess = '$sess' and cart_itemcode like '$itemcode'\";\n          \
    \      $result = mysqli_query($connect, $query)  or die(mysql_error());\n    \
    \        }\n            else\n            {\n                $query = \"INSERT\
    \ INTO cart (cart_sess, cart_quantity, cart_itemcode, cart_item_name, cart_price)\
    \ VALUES ('$sess', $quantity, '$itemcode', '$item_name', $price)\";\n        \
    \        $message = \"<div align=\\\"center\\\"><strong>商品已添加。</strong></div>\"\
    ;\n            }\n            break;\n\n        case \"change\":\n           \
    \ if($modified_quantity==0)\n            {\n                $query = \"DELETE\
    \ FROM cart WHERE cart_sess = '$sess' and cart_itemcode like '$itemcode'\";\n\
    \                $message = \"<div style=\\\"width:200px; margin:auto;\\\">商品已删除</div>\"\
    ;\n            }\n            else\n            {\n                if($modified_quantity\
    \ <0)\n                {\n                    echo \"输入的数量无效\";\n            \
    \    }\n                else\n                {\n                    $query =\
    \ \"UPDATE cart SET cart_quantity = $modified_quantity  WHERE cart_sess = '$sess'\
    \ and cart_itemcode like '$itemcode'\";\n                    $message = \"<div\
    \ style=\\\"width:200px; margin:auto;\\\">数量已更改</div>\";\n                }\n\
    \            }\n            break;\n\n        case \"delete\":\n            $query\
    \ = \"DELETE FROM cart WHERE cart_sess = '$sess' and cart_itemcode like '$itemcode'\"\
    ;\n            $message = \"<div style=\\\"width:200px; margin:auto;\\\">商品已删除</div>\"\
    ;\n            break;\n\n        case \"empty\":\n            $query = \"DELETE\
    \ FROM cart WHERE cart_sess = '$sess'\";\n            break;\n    }\n\n    if($query\
    \ !=\"\")\n    {\n        $results = mysqli_query($connect, $query) or die(mysql_error());\n\
    \        echo $message;\n    }\n\n    include(\"showcart.php\");\n    echo \"\
    <SCRIPT LANGUAGE=\\\"JavaScript\\\">updateCart();</SCRIPT>\";\n}\n\n?>\n```\n"
- fmt: "程序首先启动会话。会话ID将用于记住特定用户在购物车中所选的项目。记住，如果会话已启用且不存在任何会话，则会话状态等于`PHP_SESSION_NONE`。然后，建立与MySQL服务器的连接，并选择`shopping`数据库。从`$_POST`数组中检索所购商品的数量（存储在`quantity`变量中）。如果用户未指定数量，则默认为1。同时，还会验证输入的数量值是否为非负数。从`itemdetails.php`脚本发送的商品代码、商品名称和价格（分别存储在`icode`、`iname`和`iprice`变量中）通过`$_REQUEST`数组检索，并赋值给`$itemcode`、`$item_name`和`$price`变量。\n\
    \n生成一个会话并存储在`$sess`变量中。此会话ID被分配给购物车中选中的所有产品，以标识特定用户选择的商品。检索`action`变量的值，该值决定对购物车项目执行的操作类型。`action`变量的值可以是`add`、`change`或`delete`。当`action`变量的值为`add`时，表示需要将产品添加到`cart`表中。类似地，如果`action`的值为`change`，则表示需要修改已在购物车中的产品；而`delete`操作则表示需要从购物车中删除指定产品。\n\
    \n当`action`变量为`add`时，首先检查该产品是否已在购物车中。如果产品已在购物车中，则仅修改数量字段，即增加产品的数量以表示添加。如果产品不在购物车中，则在`cart`表中添加新行。\n\
    \n注意\n\n会话是服务器端文件（包含要存储的访问者所有数据）和客户端cookie（包含对服务器数据的引用）的组合。使用`session_start()`函数创建该文件和客户端cookie。正如你在[第3章](#A978-1-4842-1672-9_3_Chapter.html)中学到的，HTTP是一种无状态协议，这意味着必须通过使用cookie、URL重写或隐藏字段将会话ID与用户持续关联。\n\
    \n运行该脚本后，你将看到所选产品的详细信息。还会看到输入该产品数量的提示，随后点击“添加到购物车”或“立即购买”，如图[4-1](#A978-1-4842-1672-9_4_Chapter.html#Fig1)所示。\n\
    \n![A978-1-4842-1672-9_4_Fig1_HTML.jpg](A978-1-4842-1672-9_4_Fig1_HTML.jpg)\n\n\
    图4-1.\n\n将所选商品添加到购物车\n\n清单[4-1](#A978-1-4842-1672-9_4_Chapter.html#FPar1)中所示的`cart.php`脚本主要专注于向购物车添加产品。将产品添加到购物车后，需要对其进行维护。也就是说，你需要根据访问者的更改来修改购物车的内容。你将在下一节中了解如何操作。\n\
    \n### 维护购物车\n\n将产品添加到购物车后，需要一个脚本来显示购物车中选中的所有产品，并在需要时修改购物车内容。清单[4-2](#A978-1-4842-1672-9_4_Chapter.html#FPar3)中所示的`showcart.php`脚本负责显示购物车中选中的项目并管理它们。\n\
    \n清单4-2. `showcart.php`脚本显示`cart`表中的内容并进行维护\n\n```\n<?php\n\nif ( ! isset($totalamount))\
    \ {\n    $totalamount=0;\n}\n\n$totalquantity=0;\n\nif (!session_id()) {\n   \
    \ session_start();\n}\n\n$connect = mysqli_connect(\"localhost\", \"root\", \"\
    gold\", \"shopping\") or die(\"Please, check your server connection.\");\n\n$sessid\
    \ = session_id();\n\n$query = \"SELECT * FROM cart WHERE cart_sess = '$sessid'\"\
    ;\n\n$results = mysqli_query($connect, $query) or die (mysql_query());\n\nif(mysqli_num_rows($results)==0)\n\
    {\n    echo \"<div style=\\\"width:200px; margin:auto;\\\">Your Cart is empty</div>\
    \ \";\n}\nelse\n{\n    ?>\n    <table border=\"1\" align=\"center\" cellpadding=\"\
    5\">\n    <tr><td> Item Code</td><td>Quantity</td><td>Item Name</td><td>Price</td><td>Total\
    \ Price</td>\n    <?php\n    while ($row = mysqli_fetch_array($results, MYSQLI_ASSOC))\
    \ {\n        extract($row);\n        echo \"<tr><td>\";\n        echo $cart_itemcode;\n\
    \        echo \"</td>\";\n        echo \"<td><form method=\\\"POST\\\" action=\\\
    \"cart.php?action=change&icode=$cart_itemcode\\\"><input type=\\\"text\\\" name=\\\
    \"modified_quantity\\\" size=\\\"2\\\" value=\\\"$cart_quantity\\\">\";\n    \
    \    echo \"</td><td>\";\n        echo $cart_item_name;\n        echo \"</td><td>\"\
    ;\n        echo $cart_price;\n        echo \"</td><td>\";\n        $totalquantity\
    \ = $totalquantity + $cart_quantity;\n        $totalprice = number_format($cart_price\
    \ * $cart_quantity, 2);\n        $totalamount=$totalamount + ($cart_price * $cart_quantity);\n\
    \        echo $totalprice;\n        echo \"</td><td>\";\n        echo \"<input\
    \ type=\\\"submit\\\" name=\\\"Submit\\\"  value=\\\"Change quantity\\\"></form></td>\"\
    ;\n        echo \"<td>\";\n        echo \"<form method=\\\"POST\\\" action=\\\"\
    cart.php?action=delete&icode=$cart_itemcode\\\">\";\n        echo \"<input type=\\\
    \"submit\\\" name=\\\"Submit\\\" value=\\\"Delete Item\\\"></form></td></tr>\"\
    ;\n    }\n    echo \"<tr><td >Total</td><td>$totalquantity</td><td></td><td></td><td>\"\
    ;\n    $totalamount = number_format($totalamount, 2);\n    echo $totalamount;\n\
    \    echo \"</td></tr>\";\n    echo \"</table><br>\";\n    echo \"<div style=\\\
    \"width:400px; margin:auto;\\\">You currently have \" . $totalquantity . \" product(s)\
    \ selected in your cart</div> \";\n    ?>\n    <table border=\"0\" style=\"margin:auto;\"\
    >\n    <tr><td  style=\"padding: 10px;\">\n    <form method=\"POST\" action=\"\
    cart.php?action=empty\">\n    <input type=\"submit\" name=\"Submit\" value=\"\
    Empty Cart\" style=\"font-family:verdana; font-size:150%;\" >\n    </form>\n \
    \   </td><td>\n    <form method=\"POST\" action=\"checklogin.php\">\n    <input\
    \ id=\"cartamount\" name=\"cartamount\" type=\"hidden\" value= \"<?php echo $totalamount\
    \ ; ?>\">\n    <input type=\"submit\" name=\"Submit\" value=\"Checkout\"  style=\"\
    font-family:verdana; font-size:150%;\" >\n    </form>\n    </td></tr></table>\n\
    \    <?php\n}\n?>\n</body>\n</html>\n```\n\n该程序确定会话ID是否已设置。如果未设置，则启动一个新会话。如前所述，会话ID有助于识别特定网站访问者选择的产品。此后，建立与MySQL服务器的连接，并选择`shopping`数据库。执行SQL查询，以检查具有给定会话ID的购物车中是否有任何产品。如果有，则表示该访问者已经向购物车中添加了一个或多个产品。在这种情况下，购物车中存储的所有商品及其各自的数量都会显示在屏幕上。\n\
    \n如果在`cart`表中未找到与给定会话ID匹配的产品，则表示购物车中没有产品。屏幕上会显示一条消息，告知访问者“购物车中已选择0件产品”。\n\n该脚本使访问者能够执行以下任务：\n\
    \n*   通过从顶部菜单中选择任何商品类别，向购物车添加更多产品。\n*   修改购物车中任何商品的数量。\n*   从购物车中删除某件商品或清空整个购物车。"
  raw: 'The program begins by starting the session. The session ID will be used to
    remember the items selected in the cart by the particular user. Remember that
    the status of the session is equal to `PHP_SESSION_NONE` if the session is enabled
    and none exists. Then, a connection to the MySQL server is established and the
    `shopping` database file is selected. The quantity of the item purchased (stored
    in the `quantity` variable) is retrieved from the `$_POST` array. If the user
    has not specified a quantity, the default is one. It also verifies that the value
    of the quantity entered is a non-negative number. The item code, item name, and
    price (stored in the `icode`, `iname`, and `iprice` variables) sent from the `itemdetails.php`
    script are retrieved using the `$_REQUEST` array and are assigned to the `$itemcode`,
    `$item_name`, and `$price` variables.


    A session is generated and stored in the `$sess` variable. This session ID is
    assigned to all the products selected in the cart to identify the items selected
    by a particular user. The value of the `action` variable is retrieved and determines
    the kind of operation to be applied to the cart items. The value of the `action`
    variable can be `add`, `change`, or `delete`. When the `action` variable’s value
    is `add`, it means the product has to be added to the `cart` table. Similarly,
    if the `action`’s value is `change`, it means a product that is already in the
    cart needs to be modified, and the `delete` action means that the specified product
    has to be deleted from the cart.


    When the `action` variable is `add`, it is first checked to determine whether
    the product is already in the cart. If the product is already in the cart, only
    the quantity field is modified, i.e., the quantity of the product is incremented
    to indicate the addition. If the product does not exist in the cart, a new row
    is added to the `cart` table.


    Note


    A session is a combination of a server-side file containing all the data you want
    to store about the visitor and a client-side cookie containing a reference to
    the server data. The file and the client-side cookie are created using the function
    `session_start()`. As you learned in [Chapter 3](#A978-1-4842-1672-9_3_Chapter.html),
    HTTP is a stateless protocol, which means the session ID must be continuously
    correlated with the user through the use of cookies, URL rewrites, or hidden fields.


    Upon running the script, you get the detailed information of the selected product.
    You’ll also see prompts to enter the quantity of that product, followed by clicking
    Add To Cart or Buy Now, as shown in Figure [4-1](#A978-1-4842-1672-9_4_Chapter.html#Fig1).


    ![A978-1-4842-1672-9_4_Fig1_HTML.jpg](A978-1-4842-1672-9_4_Fig1_HTML.jpg)


    Figure 4-1.


    Adding the selected item to the cart


