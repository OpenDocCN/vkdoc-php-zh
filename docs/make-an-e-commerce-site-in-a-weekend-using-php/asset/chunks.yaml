    \ Linux installed on your machine, you can download and install the LAMP server."
  raw: 'Again, the Quantity text box specifies how many of the item you want to purchase
    (the default value is 1). Assuming you want one of the selected products, click
    the Add To Cart button. On clicking the Add To Cart button, all the products selected
    in the cart will be displayed, as shown in Figure [1-9](#A978-1-4842-1672-9_1_Chapter.html#Fig9).


    ![A978-1-4842-1672-9_1_Fig9_HTML.jpg](A978-1-4842-1672-9_1_Fig9_HTML.jpg)


    Figure 1-9.


    Items selected in the cart


    As mentioned, not only can you update the quantity of any product that is selected
    in the cart, but you also can delete any item from the cart if it is not required.
    Assume you don’t want the Micromax smart phone anymore, for example. To delete
    it from the cart, click the Delete Item button in that product’s row. The Micromax
    smart phone will be removed from the cart, leaving the two Asus laptops in the
    cart (see Figure [1-10](#A978-1-4842-1672-9_1_Chapter.html#Fig10)).


    ![A978-1-4842-1672-9_1_Fig10_HTML.jpg](A978-1-4842-1672-9_1_Fig10_HTML.jpg)


    Figure 1-10.


    An item deleted from the cart Note


    Clicking the Empty Cart button will remove all the products currently in the cart.


    If you are ready to purchase your items, you can click the Checkout button. If
    before you began shopping, you created an account and logged in, your user details
    like your name, address, contact number, and so on, will be automatically displayed.
    The app will just ask for shipping information. But If you are not logged in yet,
    you will get the message shown in the Figure [1-11](#A978-1-4842-1672-9_1_Chapter.html#Fig11).


    ![A978-1-4842-1672-9_1_Fig11_HTML.jpg](A978-1-4842-1672-9_1_Fig11_HTML.jpg)


    Figure 1-11.


    Page informing the login status of the customer


    If you have not yet created an account, you’re prompted to do that first. If you
    have an account, you will be prompted to log in. If you select the create account
    link (“click here to login”), you get a screen to fill in user details, as shown
    in Figure [1-12](#A978-1-4842-1672-9_1_Chapter.html#Fig12).


    ![A978-1-4842-1672-9_1_Fig12_HTML.jpg](A978-1-4842-1672-9_1_Fig12_HTML.jpg)


    Figure 1-12.


    Page for creating account of the customer


    While you’re filling in the form, be careful to fill in the two fields, Password
    and ReType Password. These fields must be exactly the same. If the content of
    these fields don’t match, you will be asked to enter them again.


    After entering the required information, you are required to click the Submit
    button. If the supplied information is correct, you’ll be registered and asked
    to provide shipping information (the address where product(s) have to be delivered)
    if purchasing is over, as shown in Figure [1-13](#A978-1-4842-1672-9_1_Chapter.html#Fig13).


    ![A978-1-4842-1672-9_1_Fig13_HTML.jpg](A978-1-4842-1672-9_1_Fig13_HTML.jpg)


    Figure 1-13.


    Welcome message for the signed-in customer


    When you select the link for supplying shipping information, you get a few text
    boxes to indicate where your products should be delivered, as shown in Figure
    [1-14](#A978-1-4842-1672-9_1_Chapter.html#Fig14).


    ![A978-1-4842-1672-9_1_Fig14_HTML.jpg](A978-1-4842-1672-9_1_Fig14_HTML.jpg)


    Figure 1-14.


    Page for supplying shipping information


    After filling in the shipping information, you click the Supply Payment Information
    button. You will be taken to a page that asks you to enter payment information,
    as shown in Figure [1-15](#A978-1-4842-1672-9_1_Chapter.html#Fig15).


    ![A978-1-4842-1672-9_1_Fig15_HTML.jpg](A978-1-4842-1672-9_1_Fig15_HTML.jpg)


    Figure 1-15.


    Page for entering payment information


    On clicking the Submit button, the order details will be stored in the database
    along with a unique order number. This order number is displayed to the users
    for future communication.


    ## Software Required for Developing the Site


    Because you will be developing this e-commerce site in PHP, you need the following
    three software products to run a PHP script:


    *   Apache web server—A local web server to run and debug PHP scripts on the local
    machine.

    *   PHP interpreter—To interpret PHP code. The Apache web server uses the PHP
    interpreter to interpret PHP code and generate HTML code.

    *   MySQL—The most popular database system used with PHP to store data entered
    by the users for future reference.


    Instead of installing these products individually, you can install the WampServer
    or XAMPP server. These servers install all three products—Apache, PHP, and MySQL—simultaneously
    on your machine. Next, you learn how to install the WampServer.


    Note


    The WampServer provides a Windows web development environment for Apache, MySQL,
    and PHP databases.


    ## Installing the WampServer


    To check and debug your PHP scripts locally before uploading to the actual server,
    you need to install the WampServer on the local machine. So, download a free copy
    of WampServer from [`http://www.wampserver.com/en`](http://www.wampserver.com/en)
    . The latest version of WampServer available at the time of this writing is 2.5\.
    After downloading WampServer, double-click on its `.exe` file and select Run.


    Note


    WampServer is an open source, easy-to-use server. It includes a great graphical
    tool, phpMyAdmin, that makes administering MySQL quite easy. It’s very easy to
    use WampServer tools and you don’t need any prior knowledge. Later in this chapter,
    you will learn how to use WampServer and its tools.


    The first screen is a welcome screen that indicates which WampServer version will
    be installed, as shown in Figure [1-16](#A978-1-4842-1672-9_1_Chapter.html#Fig16).
    Click on the Next button.


    ![A978-1-4842-1672-9_1_Fig16_HTML.jpg](A978-1-4842-1672-9_1_Fig16_HTML.jpg)


    Figure 1-16.


    Welcome screen of WampServer setup wizard


    The next window shows the license and terms and conditions of using the WampServer
    (see Figure [1-17](#A978-1-4842-1672-9_1_Chapter.html#Fig17)). Accept the license
    agreement and click Next.


    ![A978-1-4842-1672-9_1_Fig17_HTML.jpg](A978-1-4842-1672-9_1_Fig17_HTML.jpg)


    Figure 1-17.


    Screen showing the license agreement


    Select the folder to install WampServer (see Figure [1-18](#A978-1-4842-1672-9_1_Chapter.html#Fig18)).
    It’s best to keep the default folder location. Click the Next button.


    ![A978-1-4842-1672-9_1_Fig18_HTML.jpg](A978-1-4842-1672-9_1_Fig18_HTML.jpg)


    Figure 1-18.


    Screen prompting for the installation folder


    Check boxes will be displayed (see Figure [1-19](#A978-1-4842-1672-9_1_Chapter.html#Fig19))
    prompting whether you want to have WampServer icons added to your desktop and
    to Quick Launch. Check the check boxes. Click Next to move further.


    ![A978-1-4842-1672-9_1_Fig19_HTML.jpg](A978-1-4842-1672-9_1_Fig19_HTML.jpg)


    Figure 1-19.


    Screen prompting whether to show quick launch and desktop icons


    The next window shows the items for review that you have chosen up until now.
    You can click the Back button to make any changes. Let’s click the Install button
    to initiate the installation procedure (see Figure [1-20](#A978-1-4842-1672-9_1_Chapter.html#Fig20)).


    ![A978-1-4842-1672-9_1_Fig20_HTML.jpg](A978-1-4842-1672-9_1_Fig20_HTML.jpg)


    Figure 1-20.


    Final screen before installing WampServer files


    If you have Linux installed on your machine, you can download and install the
    LAMP server.'
  trans: "好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本准确地翻译成中文。\n\n译文：\n\n\n同样，`Quantity`文本框指定您想要购买的商品数量（默认值为\
    \ 1）。假设您想要选定的产品之一，请单击`Add To Cart`按钮。单击`Add To Cart`按钮后，购物车中所有选定的产品将会显示出来，如图 1-9\
