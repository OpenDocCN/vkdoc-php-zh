  \n13. 保存`blog_insert_mysqli.php`并在浏览器中加载该页面。在支持 JavaScript 的浏览器中，复选框应显示在`<select>`下拉菜单和提交按钮之间。选中复选框可禁用下拉菜单并显示隐藏字段，如图\
  \ 18-9 所示。\n\n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig9_HTML.jpg](img/332054_4_En_18_Fig9_HTML.jpg)\n\
  \n图 18-9.\n\n复选框控制文件和标题输入字段的显示\n\n14. 取消选中复选框。文件和标题输入字段被隐藏，下拉菜单重新启用。如有必要，你可以对照`ch18`文件夹中的`blog_insert_mysqli_04.php`和`toggle_fields.js`检查你的代码。\n\
  \n我使用 JavaScript 而不是 PHP 来控制文件和标题输入字段的显示，因为 PHP 是一种服务器端语言。在 PHP 引擎将输出发送到浏览器之后，除非你向\
  \ Web 服务器发送另一个请求，否则它将不再与页面进行交互。另一方面，JavaScript 在浏览器中运行，因此它能够在本地操作页面内容。JavaScript\
  \ 还可以与 PHP 结合使用，在后台向 Web 服务器发送请求，并使用结果刷新页面的一部分而无需重新加载页面——这种技术称为 Ajax，超出了本书的范围。\n\
  更新后的插入表单现在包含了分类和图像的输入字段，但处理脚本仍然只处理标题的文本输入字段和博客条目的文本区域。\n\n## PHP 解决方案 18-4：将数据插入多个表\n\
  \n此 PHP 解决方案改编了`blog_insert_mysqli.php`中的现有脚本，以按需上传新图像，然后按照图 18-6 中概述的决策链将数据插入`images`、`blog`和`article2cat`表。它假设你已经设置了`article2cat`交叉引用表，并完成了\
  \ PHP 解决方案 18-2 和 18-3。\n不要试图匆忙完成本节。代码相当长，但它整合了许多你之前学过的技术。\n\n> **注意**\n> 如果你使用的是\
  \ PDO，此 PHP 解决方案之后会有一个单独的部分描述代码中的主要差异。\n\n\n\n1.  你在 PHP Solution 18-2 中更新的 `Upload`\
  \ 类使用了一个命名空间，因此你需要在脚本的顶层导入它。在 `blog_insert_mysqli.php` 顶部 PHP 开始标签之后立即添加此行：\n\n\
  ```\nuse PhpSolutions\\File\\Upload;\n```\n\n2.  在预处理器语句初始化之后，立即插入以下条件语句来处理已上传或选择的图像。\n\
  \n```\n// 初始化预处理语句\n$stmt = $conn->stmt_init();\n// 如果已上传文件，则处理它\nif(isset($_POST['upload_new'])\
  \ && $_FILES['image']['error'] == 0) {\n    $imageOK = false;\n    require_once\
  \ '../PhpSolutions/File/Upload.php';\n    $loader = new Upload('../images/');\n\
  \    $loader->upload('image');\n    $names = $loader->getFilenames();\n    // 如果上传失败，$names\
  \ 将是一个空数组\n    if ($names) {\n        $sql = 'INSERT INTO images (filename, caption)\
  \ VALUES (?, ?)';\n        if ($stmt->prepare($sql)) {\n            $stmt->bind_param('ss',\
  \ $names[0], $_POST['caption']);\n            $stmt->execute();\n            $imageOK\
  \ = $stmt->affected_rows;\n        }\n    }\n    // 获取图像的主键或查明问题所在\n    if ($imageOK)\
  \ {\n        $image_id = $stmt->insert_id;\n    } else {\n        $imageError =\
  \ implode(' ', $loader->getMessages());\n    }\n} elseif (!empty($_POST['image_id']))\
  \ {\n    // 获取之前上传的图像的主键\n    $image_id = $_POST['image_id'];\n}\n// 创建 SQL\n$sql\
  \ = 'INSERT INTO blog (title, article) VALUES(?, ?)';\n```\n\n这首先检查 `$_POST['upload_new']`\
  \ 是否已设置。如第 6 章所述，复选框只有在被选中时才会包含在 `$_POST` 数组中。因此，如果复选框未被选中，条件失败，转而测试底部的 `elseif`\
  \ 子句。`elseif` 子句检查 `$_POST['image_id']` 是否存在。如果存在且不为空，则表示已从下拉菜单中选择了一个现有图像，该值存储在\
  \ `$image_id` 中。\n\n如果两个测试都失败，则表示既未上传也未从下拉菜单中选择图像。脚本稍后会在准备 `blog` 表的 `INSERT` 查询时考虑到这一点，允许你在没有图像的情况下创建博客条目。\n\
  \n但是，如果 `$_POST['upload_new']` 存在，则表示复选框已被选中，并且可能已上传图像。为了确保这一点，条件语句还会检查 `$_FILES['image']['error']`\
  \ 的值。如第 9 章所学，错误代码 `0` 表示上传成功。任何其他错误代码意味着上传失败或未选择文件。\n\n假设文件已成功从表单上传，条件语句会包含 `Upload`\
  \ 类定义并创建一个名为 `$loader` 的对象，将目标文件夹设置为 `images`。然后调用 `upload()` 方法，将文件输入字段的名称传递给它，以处理文件并将其存储在\
  \ `images` 文件夹中。为避免使代码复杂化，这里使用了默认的最大文件大小和 MIME 类型。\n\n你在 PHP Solution 18-2 中对 `Upload`\
  \ 类所做的更改仅在文件成功移动到目标文件夹时，将上传文件的名称添加到 `$filenames` 属性中。`getFilenames()` 方法检索 `$filenames`\
  \ 属性的内容，并将结果赋值给 `$names`。\n\n如果文件成功移动，其文件名会作为 `$names` 数组的第一个元素被存储。因此，如果 `$names`\
  \ 包含一个值，你可以安全地继续执行 `INSERT` 查询，该查询将 `$names[0]` 和 `$_POST['caption']` 的值作为字符串绑定到预处理语句。\n\
  \n语句执行后，`affected_rows` 属性会重置 `$imageOK` 的值。如果 `INSERT` 查询成功，`$imageOK` 为 `1`，这被视为\
  \ `true`。\n\n如果图像详情已插入到 `images` 表中，预处理语句的 `insert_id` 属性会检索新记录的主键并将其存储在 `$image_id`\
  \ 中。必须在运行任何其他 SQL 查询之前访问 `insert_id` 属性，因为它包含最近一次查询的主键。\n\n但是，如果 `$imageOK` 仍为 `false`，则\
  \ `else` 块会调用上传对象的 `getMessages()` 方法，并将结果赋值给 `$imageError`。`getMessages()` 方法返回一个数组，因此使用\
  \ `implode()` 函数将数组元素连接成一个字符串。失败最可能的原因是文件过大或 MIME 类型错误。\n\n3.  只要图像上传没有失败，过程的下一步就是将博客条目插入到\
  \ `blog` 表中。`INSERT` 查询的形式取决于博客条目是否与图像关联。如果有关联，`$image_id` 存在并需要作为外键插入到 `blog` 表中。否则，可以使用原始查询。\n\
  \n像这样修改原始查询：\n\n```\n// 仅当没有图像上传错误时才插入博客详情\nif (!isset($imageError)) {\n    // 如果设定了\
  \ $image_id，则将其作为外键插入\n    if (isset($image_id)) {\n        $sql = 'INSERT INTO\
  \ blog (image_id, title, article) VALUES(?, ?, ?)';\n        if ($stmt->prepare($sql))\
  \ {\n            $stmt->bind_param('iss', $image_id, $_POST['title'], $_POST['article']);\n\
  \            $stmt->execute();\n        }\n    } else {\n        // 创建 SQL\n   \
  \     $sql = 'INSERT INTO blog (title, article)\n        VALUES(?, ?)';\n      \
  \  if ($stmt->prepare($sql)) {\n            // 绑定参数并执行语句\n            $stmt->bind_param('ss',\
  \ $_POST['title'], $_POST['article']);\n            $stmt->execute();\n        }\n\
  \    }\n    if ($stmt->affected_rows > 0) {\n        $OK = true;\n    }\n}\n```\n\
  \n整个代码段被包裹在一个条件语句中，该语句检查 `$imageError` 是否存在。如果存在，则无需插入新博客条目，因此整个代码块被忽略。\n\n但是，如果\
  \ `$imageError` 不存在，嵌套的条件语句会根据 `$image_id` 是否存在来准备不同的 `INSERT` 查询，然后执行已准备好的那个。\n\
  \n检查 `affected_rows` 属性的条件语句被移出了 `else` 块，以便它适用于任一 `INSERT` 查询。\n\n4.  过程的下一步是将值插入到\
  \ `article2cat` 交叉引用表中。代码紧跟在上一节的代码之后，如下所示：\n\n```\n// 如果博客条目插入成功，检查分类\nif ($OK &&\
  \ isset($_POST['category'])) {\n    // 获取文章的主键\n    $article_id = $stmt->insert_id;\n\
  \    foreach ($_POST['category'] as $cat_id) {\n        if (is_numeric($cat_id))\
  \ {\n            $values[] = \"($article_id, \" . (int) $cat_id . ')';\n       \
  \ }\n    }\n    if ($values) {\n        $sql = 'INSERT INTO article2cat (article_id,\
  \ cat_id)\n        VALUES ' . implode(',', $values);\n        // 执行查询，如果失败则获取错误信息\n\
  \        if (!$conn->query($sql)) {\n            $catError = $conn->error;\n   \
  \     }\n    }\n}\n```\n\n\n\n`$OK`的值由插入数据到`blog`表的查询的`affected_rows`属性决定，且仅当选中任意分类时，多选的`<select>`列表才会被包含在`$_POST`数组中。因此，仅当数据成功插入`blog`表，且表单中至少选中了一个分类时，此代码块才会执行。它首先从预处理语句对象的`insert_id`属性获取插入操作的主键，并将其赋值给`$article_id`。\n\
  \n表单将分类值作为数组提交。`foreach`循环检查`$_POST['category']`中的每个值。如果该值是数值，则执行以下行：\n\n```\n$values[]\
  \ = \"($article_id, \" . (int) $cat_id . ')';\n```\n\n这会创建一个由两个主键`$article_id`和`$cat_id`组成的字符串，它们用逗号分隔并包裹在一对圆括号中。`(int)`强制转换运算符确保`$cat_id`是一个整数。结果被赋值给一个名为`$values`的数组。例如，如果`$article_id`是`10`且`$cat_id`是`4`，则赋值给数组的结果字符串为`(10,\
  \ 4)`。\n\n如果`$values`包含任何元素，则`implode()`会将其转换为逗号分隔的字符串，并追加到 SQL 查询中。例如，如果选中了分类`2`、`4`和`5`，生成的查询如下所示：\n\
  \n```\nINSERT INTO article2cat (article_id, cat_id)\nVALUES (10, 2),(10, 4),(10,\
  \ 5)\n```\n\n正如第 15 章“回顾四个基本 SQL 命令”中所述，这是如何使用单个`INSERT`查询插入多行的方法。\n\n由于`$article_id`来自可靠来源，并且`$cat_id`的数据类型已检查过，因此直接将这些变量用于\
  \ SQL 查询是安全的，无需使用预处理语句。查询通过`query()`方法执行。如果失败，连接对象的`error`属性将存储在`$catError`中。\n\n\
  5.  最后的代码段处理成功时的重定向和错误消息。修改后的代码如下所示：\n\n```\n// redirect if successful or display\
  \ error\nif ($OK && !isset($imageError) && !isset($catError)) {\nheader('Location:\
  \ http://localhost/phpsols-4e/admin/blog_list_mysqli.php');\nexit;\n} else {\n$error\
  \ = $stmt->error;\nif (isset($imageError)) {\n$error .= ' ' . $imageError;\n}\n\
  if (isset($catError)) {\n$error .= ' ' . $catError;\n}\n}\n```\n\n控制重定向的条件现在确保`$imageError`和`$catError`不存在。如果任一存在，其值会被追加到原始的`$error`中，`$error`包含了来自预处理语句对象的任何错误消息。\n\
  \n6.  保存`blog_insert_mysqli.php`并在浏览器中测试。尝试上传一张过大的图片或一个 MIME 类型错误的文件。表单应重新显示，并附有错误消息，且博客详情得以保留。同时尝试插入带或不带图片和/或分类的博客条目。你现在拥有一个通用的插入表单。\n\
  \n如果你没有合适的图片供上传，请使用`phpsols images`文件夹中的图片。`Upload`类会重命名它们以避免覆盖现有文件。\n\n你可以对照`ch18`文件夹中的`blog_insert_mysqli_05.php`检查你的代码。\n\
  \n## PDO 版本的主要差异\n\n最终的 PDO 版本可以在`ch18`文件夹中的`blog_insert_pdo_05.php`找到。它遵循与 MySQLi\
  \ 版本相同的基本结构和逻辑，但在将值插入数据库的方式上存在一些重要差异。\n\n步骤 2 中的代码紧跟 MySQLi 版本，但使用了命名占位符代替匿名占位符。为了获取受影响的行数，PDO\
  \ 在语句对象上使用`rowCount()`方法。最近一次插入操作的主键通过在连接对象上调用`lastInsertId()`方法获得。与 MySQLi 的`insert_id`属性类似，你需要在`INSERT`查询执行后立即访问它。\n\
  \n最大的变化在于步骤 3 中向`blog`表插入详情信息的代码。由于 PDO 可以使用`bindValue()`将`null`值插入列，因此只需要一个预处理语句。步骤\
  \ 3 的 PDO 代码如下所示：\n\n```\n// insert blog details only if there hasn't been an image\
  \ upload error\nif (!isset($imageError)) {\n// create SQL\n$sql = 'INSERT INTO blog\
  \ (image_id, title, article)\nVALUES(:image_id, :title, :article)';\n// prepare\
  \ the statement\n$stmt = $conn->prepare($sql);\n// bind the parameters\n// if $image_id\
  \ exists, use it\nif (isset($image_id)) {\n$stmt->bindParam(':image_id', $image_id,\
  \ PDO::PARAM_INT);\n} else {\n// set image_id to NULL\n$stmt->bindValue(':image_id',\
  \ NULL, PDO::PARAM_NULL);\n}\n$stmt->bindParam(':title', $_POST['title'], PDO::PARAM_STR);\n\
  $stmt->bindParam(':article', $_POST['article'], PDO::PARAM_STR);\n// execute and\
  \ get number of affected rows\n$stmt->execute();\n$OK = $stmt->rowCount();\n}\n\
  ```\n\n如果已上传图片，以粗体高亮的条件语句会将`$image_id`的值绑定到命名的`:image_id`占位符。但如果没有上传图片，`bindValue()`会将该值设置为`NULL`。\n\
  \n在步骤 4 中，PDO 版本使用`exec()`代替`query()`来将值插入`article2cat`表。`exec()`方法执行一个 SQL 查询并返回受影响的行数，因此当不需要使用预处理语句时，它应与`INSERT`、`UPDATE`和`DELETE`查询一起使用。\n\
  \n另一个重要的区别在于构建错误消息的代码（如果出现问题）。由于在 PDO 中，创建和准备语句是一个步骤，因此如果出现问题，语句对象可能不存在。所以，在尝试调用`errorInfo()`方法之前，你需要检查其是否存在。如果没有语句，代码会从数据库连接对象获取错误消息。同时需要将`$error`初始化为空字符串，以便连接各种消息，如下所示：\n\
  \n```\n// redirect if successful or display error\nif ($OK && !isset($imageError)\
  \ && !isset($catError)) {\nheader('Location: http://localhost/phpsols-4e/admin/blog_list_pdo.php');\n\
  exit;\n} else {\n$error = \";\nif (isset($stmt)) {\n$error .= $stmt->errorInfo()[2];\n\
  } else {\n$error .= $conn->errorInfo()[2];\n}\nif (isset($imageError)) {\n$error\
  \ .= ' ' . $imageError;\n}\nif (isset($catError)) {\n$error .= ' ' . $catError;\n\
  }\n}\n```\n\n## 在多表中更新和删除记录\n\n`categories`和`article2cat`表的添加意味着上一章 PHP 解决方案 17-2\
  \ 和 17-3 中对`blog_update_mysqli.php`和`blog_update_pdo.php`所做的修改不再完全覆盖`phpsols`数据库中的外键关系。除了修改更新表单外，你还需要创建脚本来删除记录，而不破坏数据库的参照完整性。\n\
  \n\n\n# 更新交叉引用表中的记录\n\n交叉引用表中的每条记录只包含一个复合主键。通常情况下，主键不应被修改，且必须保持唯一性。这给更新 `article2cat`\
  \ 表带来了一个问题：如果在更新博客条目时对已选分类未作任何更改，则无需更新交叉引用表。但若分类发生了变动，则需要确定哪些交叉引用记录需要删除，哪些新记录需要插入。\n\
  \n与其纠结于是否发生了变更，一个简单的解决方案是：删除所有现有的交叉引用记录，然后重新插入所选分类。如果未作更改，只需再次插入相同的分类即可。\n\n## PHP\
  \ 解决方案 18-5：将分类添加到更新表单\n\n本 PHP 解决方案对上一章 PHP 解决方案 17-2 中的 `blog_update_mysqli.php`\
  \ 进行了修改，使其能够更新与博客条目关联的分类。为保持结构简单，对条目关联图片的唯一更改是选择一张不同的现有图片或不选择任何图片。\n\n1. 继续使用 PHP\
  \ 解决方案 17-2 中的 `blog_update_mysqli.php`。或者，从 `ch18` 文件夹复制 `blog_update_mysqli_04.php`，并将其保存到\
  \ `admin` 文件夹中，命名为 `blog_update_mysqli.php`。\n\n2. 页面首次加载时，需要执行第二个查询来获取与博客条目关联的分类。将以下高亮代码添加到获取所选记录详细信息的条件语句中：\n\
  \n```\n$stmt->free_result();\n// 获取与文章关联的分类\n$sql = 'SELECT cat_id FROM article2cat\n\
  WHERE article_id = ?';\nif ($stmt->prepare($sql)) {\n    $stmt->bind_param('i',\
  \ $_GET['article_id']);\n    $OK = $stmt->execute();\n    $stmt->bind_result($cat_id);\n\
  \    // 循环遍历结果并将其存储到数组中\n    $selected_categories = [];\n    while ($stmt->fetch())\
  \ {\n        $selected_categories[] = $cat_id;\n    }\n}\n```\n\n该查询从交叉引用表中选取与所选博客条目主键匹配的所有记录中的\
  \ `cat_id`。结果绑定到 `$cat_id`，然后通过 `while` 循环将值提取到名为 `$selected_categories` 的数组中。\n\
  \n3. 在 HTML 页面的主体中，在文本区域和显示图片列表的 `<select>` 下拉菜单之间添加一个多选的 `<select>` 列表。使用另一个 SQL\
  \ 查询来填充它，如下所示：\n\n```\n<label for=\"category\">分类：</label>\n<select name=\"category[]\"\
  \ size=\"5\" multiple id=\"category\">\n<?php\n$getCats = 'SELECT cat_id, category\
  \ FROM category ORDER BY category';\n$categories = $conn->query($getCats);\nwhile\
  \ ($row = $categories->fetch_assoc()) {\n    ?>\n    <option value=\"<?php echo\
  \ $row['cat_id']; ?>\"\n    <?php\n    if (in_array($row['cat_id'], $selected_categories))\
  \ {\n        echo ' selected';\n    }\n    ?>><?php echo $row['category']; ?></option>\n\
  <?php } ?>\n</select>\n```\n\n`while` 循环通过将 `cat_id` 插入 `value` 属性，并在开闭标签之间显示分类来构建每个\
  \ `<option>` 标签。如果 `cat_id` 存在于 `$selected_categories` 数组中，则在 `<option>` 标签中插入 `selected`。这样就能选中与博客条目已关联的分类。\n\
  \n4. 保存 `blog_update_mysqli.php`，然后选择 `blog_list_mysqli.php` 中的某个 `EDIT` 链接，以确保多选列表已填充分类。如果你在\
  \ PHP 解决方案 18-4 中插入了新条目，则与你输入的条目关联的分类应被选中，如下图所示。\n\n![../images/332054_4_En_18_Chapter/332054_4_En_18_Figa_HTML.jpg](img/332054_4_En_18_Figa_HTML.jpg)\n\
  \n如有必要，你可以对照 `ch18` 文件夹中的 `blog_update_mysqli_05.php` 检查代码。PDO 版本位于 `blog_update_pdo_05.php`。\n\
  \n5. 接下来，需要编辑在提交表单时更新记录的那部分代码。新代码首先删除交叉引用表中与 `article_id` 匹配的所有条目，然后插入在更新表单中选择的值。内联注释标明了为节省篇幅而省略的现有代码位置。\n\
  \n```\n// 如果表单已提交，则更新记录\nif (isset($_POST ['update'])) {\n    // 准备更新查询\n    if\
  \ (!empty($_POST['image_id'])) {\n        // 现有代码已省略\n    } else {\n        // 现有代码已省略\n\
  \        $done = $stmt->execute();\n    }\n}\n// 删除交叉引用表中的现有值\n$sql = 'DELETE FROM\
  \ article2cat WHERE article_id = ?';\nif ($stmt->prepare($sql)) {\n    $stmt->bind_param('i',\
  \ $_POST['article_id']);\n    $done = $stmt->execute();\n}\n// 插入新值到 article2cat\n\
  if (isset($_POST['category']) && is_numeric($_POST['article_id'])) {\n    $article_id\
  \ = (int) $_POST['article_id'];\n    foreach ($_POST['category'] as $cat_id) {\n\
  \        $values[] = \"($article_id, \" . (int) $cat_id . ')';\n    }\n    if ($values)\
  \ {\n        $sql = 'INSERT INTO article2cat (article_id, cat_id)\n            \
  \    VALUES ' . implode(',', $values);\n        $done = $conn->query($sql);\n  \
  \  }\n}\n```\n\n在更新表单中插入所选值的代码与 PHP 解决方案 18-4 步骤 4 中的代码完全相同。关键点在于它使用的是 `INSERT`\
  \ 查询，而非 `UPDATE` 查询。由于原始值已被删除，因此需要重新添加它们。\n\n6. 保存 `blog_update_mysqli.php`，并通过更新\
  \ `blog` 表中的现有记录进行测试。如有必要，你可以对照 `ch18` 文件夹中的 `blog_update_mysqli_06.php` 检查代码。PDO\
  \ 版本位于 `blog_update_pdo_06.php`。\n\n## 将多个查询作为事务中的块处理\n\n前述 PHP 解决方案在很大程度上依赖于信任。更新序列涉及三个独立的查询：更新\
  \ `blog` 表、删除 `article2cat` 表中的引用，以及插入新引用。如果其中任何一个失败，`$done` 将被设置为 `false`；但如果后续查询成功，它又会被重置为\
  \ `true`。你很容易最终只完成部分更新，而对此一无所知，除非失败的是查询序列中的最后一部分。\n\n一个解决方案可能是运行一系列条件语句，如果前面的查询失败，则阻止后续执行。问题在于你仍然会得到部分更新。当更新多个表中的关联记录时，整个序列需要被视为一个块。如果一部分失败，则整个序列失败。更新序列只有在所有部分都成功时才会被处理。将多个查询视为一个统一块在\
  \ SQL 中被称为**事务**。\n\n在 MySQLi 和 PDO 中实现事务都很简单。\n\n> **注意**  \n> 要在 MySQL 和 MariaDB\
  \ 中使用事务，必须使用 InnoDB 存储引擎。\n\n### 在 MySQLi 中使用事务\n\n默认情况下，MySQL 和 MariaDB 在自动提交模式下工作。换句话说，SQL\
  \ 查询会立即执行。要使用事务，你需要关闭自动提交模式，然后在数据库连接对象上调用 `begin_transaction()` 方法，如下所示（假设 `$conn`\
  \ 是数据库连接）：\n\n```\n$conn->autocommit(false);\n$conn->begin_transaction();\n```\n\
  \n然后像平常一样运行 SQL 查询序列，根据查询是否成功执行，将变量设置为 `true` 或 `false`。如果在序列结束时检测到任何错误，可以将所有表回滚到原始状态。否则，提交事务，将序列作为单个块处理，如下所示：\n\
  \n```\nif ($trans_error) {\n    $conn->rollback();\n} else {\n    $conn->commit();\n\
  }\n```\n\n### 在 PDO 中使用事务\n\nPDO 也在自动提交模式下工作。在数据库连接对象上调用 `beginTransaction()` 方法会关闭自动提交模式。与其使用变量来跟踪单个查询的成功与否，更简单的方法是让\
  \ PDO 在遇到问题时立即抛出异常。然后可以使用 `catch` 块将表回滚到原始状态。基本结构如下所示：\n\n\n\n```php\n// 设置 PDO\
  \ 在遇到问题时抛出异常\n$conn->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION);\n\
  try {\n    $conn->beginTransaction();\n    // 运行一系列 SQL 查询\n    // 如果没有遇到问题，则提交事务\n\
  \    $done = $conn->commit();\n    // 如果出现问题，则捕获异常\n} catch (Exception $e) {\n \
  \   // 回滚到原始状态并获取错误信息\n    $conn->rollBack();\n    $trans_error = $e->getMessage();\n\
  }\n```\n\n**警告**：PHP 中的函数和方法名不区分大小写，因此对于 MySQLi 和 PDO，`rollBack()` 和 `rollback()`\
  \ 都是可接受的。然而，`begin_transaction()`（MySQLi）和 `beginTransaction()`（PDO）之间存在细微差别。PDO\
  \ 方法中没有下划线。\n\n## PHP 解决方案 18-6：将表转换为 InnoDB 存储引擎\n\n此 PHP 解决方案展示了如何将表从 MyISAM 转换为\
  \ InnoDB。如果你计划将表上传到远程服务器，该服务器也必须支持 InnoDB（参见 PHP 解决方案 18-1）。\n\n1. 在 phpMyAdmin\
  \ 中选择 `phpsols` 数据库，然后选择 `article2cat` 表。\n\n2. 点击屏幕右上角的 **操作** 选项卡。\n\n3. 在 **表选项**\
  \ 部分，**存储引擎** 字段显示了表当前使用的引擎。如果显示为 **MyISAM**，从下拉菜单中选择 **InnoDB**，如图 18-10 所示。\n\n\
  \   ![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig10_HTML.jpg](img/332054_4_En_18_Fig10_HTML.jpg)\n\
  \n   **图 18-10.** 在 phpMyAdmin 中更改表的存储引擎非常容易\n\n4. 点击 `Go`。更改存储引擎就这么简单！\n\n**注意**：每个表都需要单独转换。你无法在一次操作中更改数据库中所有表的引擎。\n\
  \n## PHP 解决方案 18-7：将更新序列封装在事务中（MySQLi）\n\n此 PHP 解决方案改进了 `blog_update_mysqli.php`\
  \ 中的脚本，将更新 `blog` 和 `article2cat` 表的 SQL 查询序列封装在一个事务中，如果序列的任何部分失败，则将数据库回滚到其原始状态。\n\
  \n1. 如有必要，按照上一个 PHP 解决方案中所述，将 `blog` 和 `article2cat` 表的存储引擎转换为 InnoDB。\n\n2. 继续使用\
  \ PHP 解决方案 18-5 中的 `blog_update_mysqli.php` 和 `blog_list_mysqli.php` 进行操作。或者，从 `ch18`\
  \ 文件夹将 `blog_update_mysqli_06.php` 和 `blog_list_mysqli_04.php` 复制到 `phpsols-4e`\
  \ 站点根目录下的 `admin` 文件夹，并移除文件名中的数字。\n\n3. 在 `blog_update_mysqli.php` 顶部初始化一个空数组，用于存储错误消息：\n\
  \n   ```php\n   $trans_error = [];\n   ```\n\n4. 在运行更新查询序列的条件语句开头，关闭自动提交模式并开始一个事务，如下所示：\n\
  \n   ```php\n   // 如果表单已提交，则更新记录\n   if (isset($_POST ['update'])) {\n       //\
  \ 关闭自动提交\n       $conn->autocommit(false);\n       $conn->begin_transaction();\n\
  \       // 准备更新查询\n   ```\n\n5. 在更新 `blog` 表的查询之后，添加一个条件语句，以便在查询失败时将任何错误消息添加到 `$trans_error`\
  \ 数组中。为节省空间，省略了部分现有代码：\n\n   ```php\n   if (!empty($_POST['image_id'])) {\n    \
  \   // 省略现有代码\n       $done = $stmt->execute();\n   }\n   } else {\n       // 省略现有代码\n\
  \       $done = $stmt->execute();\n   }\n   }\n   if (!$done) {\n       $trans_error[]\
  \ = $stmt->error;\n   }\n   ```\n\n6. 添加类似的条件语句，以捕获从交叉引用表中删除现有值时可能出现的任何错误消息。\n\n\
  \   ```php\n   // 删除交叉引用表中的现有值\n   $sql = 'DELETE FROM article2cat WHERE article_id\
  \ = ?';\n   if ($stmt->prepare($sql)) {\n       $stmt->bind_param('i', $_POST['article_id']);\n\
  \       $done = $stmt->execute();\n       if (!$done) {\n           $trans_error[]\
  \ = $stmt->error;\n       }\n   }\n   ```\n\n7. 捕获向 `article2cat` 表插入更新值时可能出现的错误消息的代码需要略有不同，因为它使用的是\
  \ `query()` 方法而非预处理语句。你需要访问数据库连接对象的 `error` 属性，而不是语句对象的 `error` 属性，如下所示：\n\n   ```php\n\
  \   if ($values) {\n       $sql = 'INSERT INTO article2cat (article_id, cat_id)\n\
  \               VALUES ' . implode(',', $values);\n       $done = $conn->query($sql);\n\
  \       if (!$done) {\n           $trans_error[] = $conn->error;\n       }\n   }\n\
  \   ```\n\n8. 在查询序列之后，使用条件语句来回滚或提交事务，如下所示（该代码放在点击“更新”按钮时运行脚本的条件语句内）：\n\n   ```php\n\
  \   if ($trans_error) {\n       $conn->rollback();\n       $done = false;\n   }\
  \ else {\n       $conn->commit();\n   }\n   ```\n\n   如果 `$trans_error` 包含任何错误消息，则必须将\
  \ `$done` 显式设置为 `false`。这是因为任何在事务外部本应成功的查询都会将 `$done` 设置为 `true`。\n\n9. 需要修改重定向页面的条件语句以处理事务。添加以粗体突出显示的新代码：\n\
  \n   ```php\n   // 更新后或未定义 $_GET['article_id'] 时重定向页面\n   if (($done || $trans_error)\
  \ || (!$_POST && !isset($_GET['article_id']))) {\n       $url = 'http://localhost/phpsols-4e/admin/blog_list_mysqli.php';\n\
  \       if ($done) {\n           $url .= '?updated=true';\n       } elseif ($trans_error)\
  \ {\n           $url .= '?trans_error=' . serialize($trans_error);\n       }\n \
  \      header(\"Location: $url\");\n       exit;\n   }\n   ```\n\n   现在条件被分组在括号内，以确保它们被正确解释。第一对检查\
  \ `$done` 或 `$trans_error` 是否等于 `true`。最后一个条件通过检查 `$_POST` 数组是否为空来使其更具体。这是必要的，因为在点击“更新”按钮后，`!isset($_GET['article_id'])`\
  \ 始终为 `true`。\n\n   如果 `$trans_error` 包含任何错误消息，则它等于 `true`，因此会将查询字符串附加到重定向位置。由于\
  \ `$trans_error` 是一个数组，因此需要先将其传递给 `serialize()` 函数，然后才能将其连接到查询字符串上。这会将数组转换为一个字符串，该字符串可以转换回其原始格式。\n\
  \n10. 最后一个更改位于 `blog_list_mysqli.php` 中表格上方的 PHP 代码块中。添加以粗体显示的代码，以便在更新失败时显示任何错误消息：\n\
  \n    ```php\n    if (isset($_GET['updated'])) {\n        echo '记录已更新';\n    } elseif\
  \ (isset($_GET['trans_error'])) {\n        $trans_error = unserialize($_GET['trans_error']);\n\
  \        echo '由于以下错误，无法更新记录：';\n        echo '';\n        foreach ($trans_error\
  \ as $item) {\n            echo '' . safe($item) . '';\n        }\n        echo\
  \ '';\n    }\n    ```\n\n    `unserialize()` 函数反转了 `serialize()` 的效果，将错误消息转换回一个数组，然后在\
  \ `foreach` 循环中显示。\n\n11. 保存 `blog_update_mysqli.php` 和 `blog_list_mysqli.php`，并更新一条现有记录。脚本应该像以前一样工作。\n\
  \n12. 在 `blog_update_mysqli.php` 的 SQL 中故意引入一些错误，并再次测试。这次，当你返回 `blog_list_mysqli.php`\
  \ 时，应该会看到类似于图 18-11 的一系列错误消息。\n\n\n\n# PHP 解决方案 18-8：在事务中包装更新序列（PDO）\n\n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig11_HTML.jpg](img/332054_4_En_18_Fig11_HTML.jpg)\n\
  \n**图 18-11.** 由于列名错误，更新操作失败\n\n13. 点击刚尝试更新的记录的`EDIT`链接，验证所有值均未改变。你可以对照`ch18`文件夹中的`blog_update_mysqli_07.php`和`blog_list_mysqli_05.php`检查代码。\n\
  \n本 PHP 解决方案改进了`blog_update_pdo.php`中的脚本，将更新`blog`和`article2cat`表的 SQL 查询序列包装在事务中，如果序列中的任何部分失败，则将数据库回滚到原始状态。\n\
  \n1. 如有必要，按照 PHP 解决方案 18-6 的描述，将`blog`和`article2cat`表的存储引擎转换为 InnoDB。\n\n2. 继续使用\
  \ PHP 解决方案 18-5 中的`blog_update_pdo.php`和`blog_list_pdo.php`进行操作。或者，将`ch18`文件夹中的`blog_update_pdo_06.php`和`blog_list_pdo_04.php`复制到`phpsols-4e`站点根目录的`admin`文件夹中，并移除文件名中的数字。\n\
  \n3. 在页面顶部初始化一个变量用于跟踪事务，并将其值设置为`false`：\n\n```php\n$trans_error = false;\n```\n\n\
  4. 在运行更新`blog`和`article2cat`表查询序列的条件语句内部，设置 PDO 在遇到问题时抛出异常，如下所示：\n\n```php\nif (isset($_POST['update']))\
  \ {\n    $conn->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION);\n    //\
  \ 准备更新查询\n    $sql = 'UPDATE blog SET image_id = ?, title = ?, article = ?\n   \
  \ WHERE article_id = ?';\n```\n\n5. 将所有运行更新查询的代码包装在`try`/`catch`块中，并在`try`块开头开始一个事务，如下所示：\n\
  \n```php\n$conn->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION);\ntry {\n\
  \    $conn->beginTransaction();\n    // 准备更新查询\n    // 其他数据库查询已省略\n} catch (Exception\
  \ $e) {\n    $conn->rollBack();\n    $trans_error = $e->getMessage();\n}\n```\n\n\
  6. 在现有代码中，每次执行查询的返回值都设置为`$done`。由于我们使用了事务，这不再必要。我们将使用`$done`作为成功提交事务的返回值。找到以下行（大约在第\
  \ 53、57 和 69 行）：\n\n```php\n$done = $stmt->execute();\n$done = $stmt->execute([$_POST['article_id']]);\n\
  $done = $conn->exec($sql);\n```\n\n将其修改为：\n\n```php\n$stmt->execute();\n$stmt->execute([$_POST['article_id']]);\n\
  $conn->exec($sql);\n```\n\n7. 在`catch`块之前，立即添加以粗体显示的代码来提交事务：\n\n```php\n$done =\
  \ $conn->commit();\n} catch (Exception $e) {\n    $conn->rollBack();\n    $trans_error\
  \ = $e->getMessage();\n}\n```\n\n8. 需要修改重定向页面的条件语句以处理事务。添加以粗体高亮显示的新代码：\n\n```php\n\
  // 更新后或当$_GET['article_id']未定义时重定向页面\nif (($done || $trans_error) || (!$_POST &&\
  \ !isset($_GET['article_id']))) {\n    $url = 'http://localhost/phpsols-4e/admin/blog_list_pdo.php';\n\
  \    if ($done) {\n        $url .= '?updated=true';\n    } elseif ($trans_error)\
  \ {\n        $url .= \"?trans_error=$trans_error\";\n    }\n    header(\"Location:\
  \ $url\");\n    exit;\n}\n```\n\n现在条件语句被分组在括号内，以确保正确解析。第一对检查`$done`或`$trans_error`是否等于`true`。最终条件通过检查`$_POST`数组是否为空变得更加具体。这是必要的，因为点击更新按钮后，`!isset($_GET['article_id'])`始终为`true`。\n\
  \n\n\n# 处理后的文本\n\n如果 `$trans_error` 包含任何错误消息，则其值为 `true`，因此会在重定向上追加一个查询字符串。\n\n\
  9.  最后的改动在 `blog_list_pdo.php` 中表格上方的 PHP 代码块里。添加粗体部分的代码，以便在更新失败时显示错误消息：\n\n```\n\
  if (isset($_GET['updated'])) {\n    echo 'Record updated';\n} elseif (isset($_GET['trans_error']))\
  \ {\n    echo \"Can't update record because of the following error: \";\n    echo\
  \ safe($_GET['trans_error']) . '';\n}\n```\n\nPDO 在遇到错误时会立即抛出异常，因此即使存在多个错误，也只会有一条错误消息。\n\
  \n10. 保存 `blog_update_pdo.php` 和 `blog_list_pdo.php`，并更新一条现有记录。脚本应像之前一样正常工作。\n\n\
  11. 在 `blog_update_pdo.php` 的某个更新查询中故意引入一个错误，然后再次测试。这一次，当你被重定向回 `blog_list_pdo.php`\
  \ 时，将会看到错误消息。\n\n12. 点击刚刚尝试更新的记录旁的 `EDIT` 链接，并验证没有任何值发生变化。你可以将你的代码与 `ch18` 文件夹中的\
  \ `blog_update_pdo_07.php` 和 `blog_list_pdo_05.php` 进行核对。\n\n**提示：** 当事务需要满足特定条件才能处理一系列查询时，它们至关重要。例如，在金融数据库中，只有在资金充足时才能进行资金转账。\n\
  \n## 删除时保持参照完整性\n\n在 PHP Solution 18-5 中，删除交叉引用表中的记录时无需担心参照完整性，因为每条记录中存储的值都是外键。每个记录只是引用了\
  \ `blog` 表和 `categories` 表中存储的主键。参照本章开头的图 18-1，从交叉引用表中删除组合了 `article_id 2` 和 `cat_id\
  \ 1` 的记录，只是断开了题为“见习艺妓逛商店”的文章与 `Kyoto` 分类之间的链接。文章和分类本身不受影响，它们仍然保留在各自的表中。\n\n如果你决定删除文章或分类，情况就完全不同了。如果你从\
  \ `blog` 表中删除“见习艺妓逛商店”这篇文章，则所有对 `article_id 2` 的引用也必须从交叉引用表中删除。同样地，如果你删除 `Kyoto`\
  \ 分类，则所有对 `cat_id 1` 的引用都必须从交叉引用表中移除。或者，如果一个项目的主键作为外键存储在别处，你必须阻止该删除操作。\n\n最好的方法是通过建立外键约束。为此，相关表必须使用\
  \ InnoDB 存储引擎。如果你使用的是 MySQL 或 MariaDB 5.5 或更高版本，InnoDB 是默认引擎。此外，本书附带的所有 `.sql` 文件都选择\
  \ InnoDB 引擎。但是，如果你有使用 MyISAM 存储引擎创建的现有表，则需要先转换它们，然后才能建立外键约束（参见 PHP Solution 18-6）。\n\
  \n## PHP Solution 18-9：设置外键约束\n\n本 PHP 解决方案介绍如何在 phpMyAdmin 中设置 `article2cat`、`blog`\
  \ 和 `categories` 表之间的外键约束。外键约束必须始终在子表中定义。在本例中，子表是 `article2cat`，因为它将其他表中的 `article_id`\
  \ 和 `cat_id` 主键作为外键存储。\n\n1.  在 phpMyAdmin 中选择 `article2cat` 表，然后点击“结构”选项卡。\n\n\
  2.  点击结构表上方的“关系视图”（如图 18-12 中圆圈所示）（在旧版 phpMyAdmin 中，它是结构表下方的一个链接）。\n\n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig12_HTML.jpg](img/332054_4_En_18_Fig12_HTML.jpg)\n\
  \n**图 18-12.** 在 phpMyAdmin 的关系视图中定义外键约束\n\n3.  打开的屏幕就是你定义外键约束的地方。将“约束名称”字段留空。phpMyAdmin\
  \ 会自动为约束生成一个名称。\n\n4.  只能在已建立索引的列上设置外键约束。`article2cat` 表中的 `article_id` 和 `cat_id`\
  \ 列是该表的复合主键，因此它们都列在“列”下拉菜单中。选择 `article_id`。然后在“外键约束（INNODB）”下选择以下设置：\n\n    * \
  \  数据库：`phpsols`\n    *   表：`blog`\n    *   列：`article_id`\n\n    这就在父表（`blog`）中的\
  \ `article_id` 和子表（`article2cat`）中的 `article_id` 之间建立了一个约束。\n\n5.  接下来，你需要决定约束的行为方式。“ON\
  \ DELETE”下拉菜单包含以下选项：\n\n    *   `CASCADE`：当你删除父表中的一条记录时，子表中的所有依赖记录都会被删除。例如，如果你在\
  \ `blog` 表中删除了主键为 `article_id 2` 的记录，则 `article2cat` 表中所有包含 `article_id 2` 的记录都会被自动删除。\n\
  \    *   `SET NULL`：当你删除父表中的一条记录时，子表中所有依赖记录的外键都会被设置为 NULL。外键列必须接受 NULL 值。\n    *\
  \   `NO ACTION`：在某些数据库系统上，这允许延迟外键约束检查。MySQL 会立即执行检查，因此其效果与 `RESTRICT` 相同。\n    *\
  \   `RESTRICT`：如果子表中仍存在依赖记录，则阻止删除父表中的记录。\n\n    **注意：** `ON UPDATE` 也有相同的选项。除了 `RESTRICT`\
  \ 之外，其他选项的用途有限，因为只有在特殊情况下才应该更改记录的主键。`ON UPDATE RESTRICT` 不仅阻止对父表中的主键进行更改；还会拒绝子表中任何会导致外键值在父表中找不到匹配行的插入或更新操作。\n\
  \n    对于交叉引用表来说，`CASCADE` 是合乎逻辑的选择。如果你决定删除父表中的一条记录，你希望该记录的所有交叉引用也同时被移除。但是，为了演示外键约束的默认行为，请为\
  \ `ON DELETE` 和 `ON UPDATE` 都选择 `RESTRICT`。\n\n6.  点击“添加约束”链接，使用以下设置为 `cat_id` 建立外键约束：\n\
  \n    *   列：`cat_id`\n    *   数据库：`phpsols`\n    *   表：`categories`\n    *   列：`cat_id`\n\
  \n7.  将 `ON DELETE` 和 `ON UPDATE` 设置为 `RESTRICT`。设置应如图 18-13 所示。然后点击“保存”按钮。\n\n\
  ![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig13_HTML.jpg](img/332054_4_En_18_Fig13_HTML.jpg)\n\
  \n**图 18-13.** 为交叉引用表设置外键约束\n\n**注意：** 旧版 phpMyAdmin 中关系视图的布局不同，它将“数据库”、“表”和“列”下拉菜单组合在一个下拉菜单中。\n\
  \n8.  如果尚未完成，请至少更新一篇博客条目，将其与一个分类关联起来。\n\n9.  在 phpMyAdmin 中，选择 `categories` 表，然后点击已知与某博客条目关联的分类旁边的\
  \ `Delete`，如图 18-14 所示。\n\n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig14_HTML.jpg](img/332054_4_En_18_Fig14_HTML.jpg)\n\
  \n**图 18-14.** 尝试删除 `categories` 表中的一条记录\n\n\n\n10. 点击 `OK`，当 phpMyAdmin 要求你确认删除时。如果你已正确设置外键约束，你将看到类似于图\
  \ 18-15 的错误信息。\n\n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig15_HTML.jpg](img/332054_4_En_18_Fig15_HTML.jpg)\n\
  \n图 18-15. 如果存在依赖记录，外键约束会阻止删除。\n\n11. 如果错误信息出现在模态对话框中，点击对话框将其关闭。\n\n12. 选择 `article2cat`\
  \ 表，然后点击“结构”选项卡。接着点击“关系视图”。\n\n**注意**：在较旧版本的 phpMyAdmin 中，`ON DELETE` 和 `ON UPDATE`\
  \ 可能为空。将这些选项留空与选择 `RESTRICT` 效果相同，后者是两者的默认值。\n\n13. 将两个 `ON DELETE` 设置都改为 `CASCADE`，然后点击\
  \ `Save`。\n\n14. 在 `blog` 表中选择一条你知道已关联某个分类的记录。记下其 `article_id`，然后删除该记录。\n\n15. 检查\
  \ `article2cat` 表。与你刚刚删除的记录相关联的记录也已被删除。\n\n要继续探索外键约束，请选择 `blog` 表，并与 `images` 表中的\
  \ `image_id` 建立外键关系。如果你从 `images` 表中删除一条记录，`blog` 表中的 `image_id` 外键需要被设置为 `NULL`。如果你将\
  \ `ON DELETE` 的值设置为 `SET NULL`，这将会自动完成。通过从 `images` 表中删除一条记录并检查 `blog` 表中的相关记录来测试它。\n\
  \n**注意**：如果你需要将 InnoDB 表转换回 MyISAM，你必须先移除所有外键约束。选择“关系视图”，然后点击每个约束左上角的“删除”。在较旧版本的\
  \ phpMyAdmin 中，将“外键 (INNODB)”字段留空，然后点击 `Save`。移除约束后，你可以按照 PHP 方案 18-6 中的描述更改存储引擎。选择\
  \ `MyISAM` 而不是 `InnoDB`。\n\n## 创建带有外键约束的删除脚本\n\n在 InnoDB 表中选择 `ON DELETE` 的值取决于表之间的关系性质。在\
  \ `phpsols` 数据库的情况下，不仅安全而且最好将 `article2cat` 交叉引用表中两列的选项都设置为 `CASCADE`。如果在 `blog`\
  \ 或 `categories` 父表中删除了记录，则需要在交叉引用表中删除相关值。\n\n`images` 表和 `blog` 表之间的关系不同。如果你从 `images`\
  \ 表中删除一条记录，你可能不希望删除 `blog` 表中的相关文章。在这种情况下，选择 `SET NULL` 是合适的。当从 `images` 表中删除一条记录时，相关文章中的外键会被设置为\
  \ `NULL`，但文章内容保持不变。\n\n另一方面，如果图像对文章理解至关重要，请选择 `RESTRICT`。任何删除仍有关联文章的图像的尝试都会被自动阻止。\n\
  \n这些考虑因素会影响你处理删除脚本的方式。当外键约束设置为 `CASCADE` 或 `SET NULL` 时，你不需要做任何特殊处理。你可以使用简单的 `DELETE`\
  \ 查询，其余部分交给数据库处理。\n\n然而，如果外键约束设置为 `RESTRICT`，`DELETE` 查询将会失败。为了显示适当的错误信息，请使用 MySQLi\
  \ 语句对象的 `errno` 属性。由于外键约束而失败的查询的 MySQL 错误代码是 `1451`。在调用 `execute()` 方法之后，你可以按如下方式检查\
  \ MySQLi 中的错误：\n\n```\n$stmt->execute();\nif ($stmt->affected_rows > 0) {\n$deleted\
  \ = true;\n} else {\n$deleted = false;\nif ($stmt->errno == 1451) {\n$error = 'That\
  \ record has dependent files in a child table, and cannot be deleted.';\n} else\
  \ {\n$error = 'There was a problem deleting the record.';\n}\n}\n```\n\n如果你使用 PDO，请使用\
  \ `errorCode()` 方法。由于外键约束而失败的查询的代码是 `HY000`。在检查受影响行数后，你可以像这样使用 PDO 预处理语句检查错误代码：\n\
  \n```\n$deleted = $stmt->rowCount();\nif (!$deleted) {\nif ($stmt->errorCode() ==\
  \ 'HY000') {\n$error = 'That record has dependent files in a child table, and cannot\
  \ be deleted.';\n} else {\n$error = 'There was a problem deleting the record.';\n\
  }\n}\n```\n\n如果你使用 PDO 的 `exec()` 方法，技术是相同的，该方法在使用非 `SELECT` 查询时返回受影响的行数。当使用 `exec()`\
  \ 时，`errorCode()` 方法是在数据库连接上调用的：\n\n```\n$deleted = $conn->exec($sql);\nif (!$deleted)\
  \ {\nif ($conn->errorCode() == 'HY000') {\n$error = 'That record has dependent files\
  \ in a child table, and cannot be deleted.';\n} else {\n$error = 'There was a problem\
  \ deleting the record.';\n}\n}\n```\n\n## 创建没有外键约束的删除脚本\n\n如果你不能使用 InnoDB 表，你需要在你自己的删除脚本中构建相同的逻辑。为了实现与\
  \ `ON DELETE CASCADE` 相同的效果，像这样连续运行两个 `DELETE` 查询：\n\n```\n$sql = 'DELETE FROM article2cat\
  \ WHERE article_id = ?';\n$stmt->prepare($sql);\n$stmt->bind_param('i', $_POST['article_id']);\n\
  $stmt->execute();\n$sql = 'DELETE FROM blog WHERE article_id = ?';\n$stmt->prepare($sql);\n\
  $stmt->bind_param('i', $_POST['article_id']);\n$stmt->execute();\n```\n\n为了实现与 `ON\
  \ DELETE SET NULL` 相同的效果，像这样运行一个结合了 `DELETE` 查询的 `UPDATE` 查询：\n\n```\n$sql = 'UPDATE\
  \ blog SET image_id = NULL WHERE image_id = ?';\n$stmt->prepare($sql);\n$stmt->bind_param('i',\
  \ $_POST['image_id']);\n$stmt->execute();\n$sql = 'DELETE FROM images WHERE image_id\
  \ = ?';\n$stmt->prepare($sql);\n$stmt->bind_param('i', $_POST['image_id']);\n$stmt->execute();\n\
  ```\n\n为了实现与 `ON DELETE RESTRICT` 相同的效果，你需要在继续执行 `DELETE` 查询之前先运行一个 `SELECT` 查询来查找是否存在依赖记录，如下所示：\n\
  \n```\n$sql = 'SELECT image_id FROM blog WHERE image_id = ?';\n$stmt->prepare($sql);\n\
  $stmt->bind_param('i', $_POST['image_id']);\n$stmt->execute();\n// store result\
  \ to find out how many rows it contains\n$stmt->store_result();\n// if num_rows\
  \ is not 0, there are dependent records\nif ($stmt->num_rows) {\n$error = 'That\
  \ record has dependent files in a child table, and cannot be deleted.';\n} else\
  \ {\n$sql = 'DELETE FROM images WHERE image_id = ?';\n$stmt->prepare($sql);\n$stmt->bind_param('i',\
  \ $_POST['image_id']);\n$stmt->execute();\n}\n```\n\n## 章节回顾\n\n一旦你学会了与数据库通信所需的基本\
  \ SQL 和 PHP 命令，处理单张表就变得非常容易。然而，通过外键链接表可能相当具有挑战性。关系数据库的强大之处在于其极高的灵活性。问题在于这种无限的灵活性意味着没有单一的“正确”做事方式。\n\
  \n尽管如此，不要因此气馁。你的直觉可能是坚持使用单张表，但在那条路上会面临更大的复杂性。使数据库工作变得简单的关键在于在早期阶段限制你的野心。构建如本章中所示的简单结构，尝试它们，并了解它们的工作原理。逐步添加表和外键链接。具有丰富数据库经验的人说，他们经常花费超过一半的开发时间来思考表结构。在那之后，编码就是简单的事了！\n\
  \n在最后一章中，我们将回到处理单张表，讨论用户认证这一重要主题以及如何处理哈希和加密密码。\n\n## 19. 使用数据库进行用户认证\n\n\n\n# 第\
  \ 11 章：用户身份验证与密码存储\n\n第 11 章介绍了使用密码保护网站部分的用户身份验证和会话原理，但所有登录脚本都依赖于存储在 CSV 文件中的用户名和密码。将用户详细信息存储在数据库**既更安全又更高效**。数据库不仅可以存储用户名和密码列表，还能存储其他详细信息，例如名字、姓氏、电子邮件地址等。数据库还允许你选择使用**哈希处理（单向且不可逆）或加密（双向）**。在本章的第一节中，我们将探讨这两者之间的区别。然后，你将针对这两种存储方式创建注册和登录脚本。\n\
  \n本章涵盖：\n\n*   决定如何存储密码\n*   使用单向密码哈希处理进行用户注册和登录\n*   使用双向加密进行用户注册和登录\n*   解密密码\n\
  \n## 选择密码存储方法\n\n第 11 章中的 PHP 解决方案使用了密码哈希处理——一旦密码被哈希，就无法逆转该过程。这既是一个优点也是一个缺点。它为用户提供了更高的安全性，因为以这种方式存储的密码仍然保密。然而，无法重新发放丢失的密码，因为即使是网站管理员也无法解密它。唯一的解决方案是**重置它**。\n\
  \n另一种方法是使用**密钥加密**。这是一个双向、可逆的过程，依赖于一对函数：一个用于加密密码，另一个用于将其转换回纯文本，从而可以轻松为健忘的用户重新发放密码。双向加密使用一个**密钥**，该密钥被传递给这两个函数以执行转换。这个密钥只是一个你自己构造的字符串。显然，为了确保数据安全，密钥需要足够难以猜测，并且**绝不应存储在数据库中**。但是，你需要将密钥嵌入到注册和登录脚本中——直接嵌入或通过包含文件嵌入——因此，如果你的脚本被暴露，你的安全性将彻底崩溃。\n\
  \nMySQL 和 MariaDB 提供了许多双向加密函数，但 `AES_ENCRYPT()` 被认为是最安全的。它使用美国**政府批准**的**高级加密标准**，具有\
  \ **128 位密钥长度**（AES-128），用于保护最高 SECRET 级别的机密材料（TOP SECRET 材料需要 AES-192 或 AES-256）。\n\
  \n哈希处理和密钥加密各有优缺点。许多安全专家建议密码应经常更改。因此，因为密码无法解密而强迫用户更改忘记的密码，可被视为一项良好的安全措施。另一方面，用户每次忘记现有密码都需要处理一个新密码，这可能会让他们感到沮丧。我将由你根据自身情况决定哪种方法最适合，我将仅专注于技术实现。\n\
  \n## 使用密码哈希处理\n\n为了保持简单，我将使用与第 11 章相同的基本表单，因此数据库中仅存储用户名和哈希后的密码。\n\n### 创建存储用户详细信息的表\n\
  \n在 phpMyAdmin 中，在 `phpsols` 数据库中创建一个名为 `users` 的新表。该表需要三列，设置如表 19-1 所示。\n\n**表\
  \ 19-1. users 表的设置**\n\n| 名称       | 类型      | 长度/值 | 属性       | Null | 索引     \
  \ | A_I |\n|------------|-----------|---------|------------|------|-----------|-----|\n\
  | `user_id`   | `INT`     |         | `UNSIGNED` | 取消选择 | `PRIMARY` | 已选择 |\n| `username`\
  \  | `VARCHAR` | `15`    |            | 取消选择 | `UNIQUE`  |     |\n| `pwd`      \
  \ | `VARCHAR` | `255`   |            | 取消选择 |           |     |\n\n为了确保没有人可以注册已存在的相同用户名，`username`\
  \ 列被赋予了 `UNIQUE` 索引。用于存储密码的 `pwd` 列允许存储最长 255 个字符的字符串。这比 `password_hash()` 使用的默认哈希算法所需的\
  \ 60 个字符长得多。但是，`PASSWORD_DEFAULT` 常量旨在随着 PHP 添加新的、更强的算法而随着时间的推移而改变。因此，建议的大小为 255\
  \ 个字符。\n\n### 在数据库中注册新用户\n\n要在数据库中注册用户，你需要创建一个要求输入用户名和密码的注册表单。`username` 列已定义为 `UNIQUE`\
  \ 索引，因此如果有人试图注册与现有用户名相同的用户名，数据库将返回错误。除了验证用户输入外，处理脚本还需要检测错误并建议用户选择不同的用户名。\n\n####\
  \ PHP 解决方案 19-1：创建用户注册表单\n\n此 PHP 解决方案展示了如何改编第 11 章的注册脚本以用于 MySQL 或 MariaDB。它使用了\
  \ PHP 解决方案 11-3 中的 `CheckPassword` 类和 PHP 解决方案 11-4 中的 `register_user_csv.php`。\n\
  \n如有必要，将 `CheckPassword.php` 从 `ch19/PhpSolutions/Authenticate` 文件夹复制到 `phpsols-4e`\
  \ 站点根目录下的 `PhpSolutions/Authenticate` 文件夹，并将 `register_user_csv.php` 从 `ch19` 文件夹复制到\
  \ `includes` 文件夹。你还应阅读 PHP 解决方案 11-3 和 11-4 中的说明，以了解原始脚本的工作原理。\n\n1.  将 `register_db.php`\
  \ 从 `ch19` 文件夹复制到 `phpsols-4e` 站点根目录下名为 `authenticate` 的新文件夹中。该页面包含与第 11 章相同的基本用户注册表单，包含用于用户名的文本输入字段、密码字段、用于确认的另一个密码字段以及用于提交数据的按钮，如下面的屏幕截图所示：\n\
  \n    ![../images/332054_4_En_19_Chapter/332054_4_En_19_Figa_HTML.jpg](img/332054_4_En_19_Figa_HTML.jpg)\n\
  \n2.  在 `DOCTYPE` 声明上方的 PHP 代码块中添加以下代码：\n\n    ```\n    if (isset($_POST['register']))\
  \ {\n        $username = trim($_POST['username']);\n        $password = trim($_POST['pwd']);\n\
  \        $retyped = trim($_POST['conf_pwd']);\n        require_once '../includes/register_user_mysqli.php';\n\
  \    }\n    ```\n\n    这与 PHP 解决方案 11-4 中的代码非常相似。如果表单已提交，用户输入将被去除首尾空白并分配给简单变量。然后包含一个名为\
  \ `register_user_mysqli.php` 的外部文件。如果你计划使用 PDO，请将包含文件命名为 `register_user_pdo.php`。\n\
  \n3.  处理用户输入的文件基于你在第 11 章中创建的 `register_user_csv.php`。复制原始文件并将其保存在 `includes` 文件夹中，命名为\
  \ `register_user_mysqli.php` 或 `register_user_pdo.php`。\n\n4.  在你刚刚复制并重命名的文件中，找到以如下内容开头的条件语句（大约在第\
  \ 23 行）：\n\n    ```\n    if (!$errors) {\n        // 使用默认算法哈希密码\n        $password\
  \ = password_hash($password, PASSWORD_DEFAULT);\n    ```\n\n5.  删除条件语句中其余的代码。条件语句现在应如下所示：\n\
  \n    ```\n    if (!$errors) {\n        // 使用默认算法哈希密码\n        $password = password_hash($password,\
  \ PASSWORD_DEFAULT);\n    }\n    ```\n\n6.  将用户详细信息插入数据库的代码位于条件语句内部。首先包含数据库连接文件并创建具有读写权限的连接。\n\
  \n\n\n```php\nif (!$errors) {\n    // 使用默认算法对密码进行哈希处理\n    $password = password_hash($password,\
  \ PASSWORD_DEFAULT);\n    // 引入连接文件\n    require_once 'connection.php';\n    $conn\
  \ = dbConnect('write');\n}\n```\n\n连接文件同样位于 `includes` 文件夹内，因此你只需提供文件名即可。对于 PDO，需要在\
  \ `dbConnect()` 的第二个参数中传入 `'pdo'`。\n\n7. 代码的最后一部分负责准备并执行预处理语句，以将用户详细信息插入数据库。由于 `username`\
  \ 列设置了 `UNIQUE` 索引，如果用户名已存在，查询将会失败。一旦发生这种情况，代码需要生成一条错误信息。MySQLi 和 PDO 的代码实现有所不同。\n\
  \n对于 MySQLi，请添加以下加粗显示的代码：\n\n```php\nif (!$errors) {\n    // 使用默认算法对密码进行哈希处理\n \
  \   $password = password_hash($password, PASSWORD_DEFAULT);\n    // 引入连接文件\n   \
  \ require_once 'connection.php';\n    $conn = dbConnect('write');\n    // 准备 SQL\
  \ 语句\n    $sql = 'INSERT INTO users (username, pwd) VALUES (?, ?)';\n    $stmt =\
  \ $conn->stmt_init();\n    if ($stmt = $conn->prepare($sql)) {\n        // 绑定参数并将详细信息插入数据库\n\
  \        $stmt->bind_param('ss', $username, $password);\n        $stmt->execute();\n\
  \    }\n    if ($stmt->affected_rows == 1) {\n        $success = htmlentities($username)\
  \ . ' 已注册成功。您现在可以登录了。';\n    } elseif ($stmt->errno == 1062) {\n        $errors[]\
  \ = htmlentities($username) . ' 已被使用。请选择其他用户名。';\n    } else {\n        $errors[]\
  \ = $stmt->error;\n    }\n}\n```\n\n新代码首先将参数绑定到预处理语句。用户名和密码都是字符串，因此 `bind_param()`\
  \ 的第一个参数是 `'ss'`（参见第 13 章“在 MySQLi 预处理语句中嵌入变量”）。语句执行后，条件语句会检查 `affected_rows` 属性的值。如果值为\
  \ `1`，则表示详细信息已成功插入。\n\n**提示：** 你必须显式检查 `affected_rows` 的值，因为如果发生错误，它的值是 -1。与某些编程语言不同，PHP\
  \ 将 -1 视为 `true`。\n\n另一种条件分支会检查预处理语句的 `errno` 属性值，该属性包含 MySQL 错误代码。对于带有 `UNIQUE`\
  \ 索引的列，重复值的错误代码是 `1062`。如果检测到该错误代码，则会向 `$errors` 数组添加一条错误信息，要求用户选择其他用户名。如果生成了其他错误代码，则会将存储在语句\
  \ `error` 属性中的信息添加到 `$errors` 数组中。\n\nPDO 版本如下所示：\n\n```php\nif (!$errors) {\n \
  \   // 使用默认加密方式对密码进行加密\n    $password = password_hash($password, PASSWORD_DEFAULT);\n\
  \    // 引入连接文件\n    require_once 'connection.php';\n    $conn = dbConnect('write',\
  \ 'pdo');\n    // 准备 SQL 语句\n    $sql = 'INSERT INTO users (username, pwd) VALUES\
  \ (:username, :pwd)';\n    $stmt = $conn->prepare($sql);\n    // 绑定参数并将详细信息插入数据库\n\
  \    $stmt->bindParam(':username', $username, PDO::PARAM_STR);\n    $stmt->bindParam(':pwd',\
  \ $password, PDO::PARAM_STR);\n    $stmt->execute();\n    if ($stmt->rowCount()\
  \ == 1) {\n        $success = htmlentities($username) . ' 已注册成功。您现在可以登录了。';\n  \
  \  } elseif ($stmt->errorCode() == 23000) {\n        $errors[] = htmlentities($username)\
  \ . ' 已被使用。请选择其他用户名。';\n    } else {\n        $errors[] = $stmt->errorInfo()[2];\n\
  \    }\n}\n```\n\n预处理语句对 `username` 和 `pwd` 列使用了命名参数。提交的值通过 `bindParam()` 方法进行绑定，并使用\
  \ `PDO::PARAM_STR` 常量将数据类型指定为字符串。语句执行后，条件语句使用 `rowCount()` 方法来检查记录是否已创建。\n\n如果预处理语句因用户名已存在而失败，`errorCode()`\
  \ 方法生成的值是 `23000`。PDO 使用的是 ANSI SQL 标准定义的错误代码，而非 MySQL 生成的错误代码。如果错误代码匹配，则会向 `$errors`\
  \ 数组添加一条信息，要求用户选择其他用户名。否则，将使用 `errorInfo()` 方法返回的错误信息。\n\n**注意：** 在 MySQLi 和 PDO\
  \ 脚本中，当在实际网站上部署注册脚本时，请将 `else` 块中的代码替换为通用的错误信息。显示语句的 `error` 属性（MySQLi）或 `$stmt->errorInfo()[2]`（PDO）的值仅用于测试目的。\n\
  \n8. 剩下要做的就是添加在注册页面上显示结果的代码。请在 `register_db.php` 中开头的 `<form>` 标签之前添加以下代码：\n\n```php\n\
  <?php\nif (isset($success)) {\n    echo \"<p>$success</p>\";\n} elseif (isset($errors)\
  \ && !empty($errors)) {\n    echo '<ul>';\n    foreach ($errors as $error) {\n \
  \       echo \"<li>$error</li>\";\n    }\n    echo '</ul>';\n}\n?>\n```\n\n9. 保存\
  \ `register_db.php`，然后在浏览器中加载它。通过输入你知道会违反密码强度规则的输入来测试它。如果你在同一尝试中犯了多个错误，表单顶部应出现一个带项目符号的错误消息列表，如下一个屏幕截图所示。\n\
  \n![../images/332054_4_En_19_Chapter/332054_4_En_19_Figb_HTML.jpg](img/332054_4_En_19_Figb_HTML.jpg)\n\
  \n10. 现在正确填写注册表单。你应该会看到一条消息，提示你已为你选择的用户名创建了一个帐户。\n\n11. 尝试再次注册相同的用户名。这次你应该会收到一条类似于以下屏幕截图所示的消息：\n\
  \n![../images/332054_4_En_19_Chapter/332054_4_En_19_Figc_HTML.jpg](img/332054_4_En_19_Figc_HTML.jpg)\n\
  \n12. 如果需要，请对照 `register_db_mysqli.php` 和 `register_user_mysqli.php`，或对照 `register_db_pdo.php`\
  \ 和 `register_user_pdo.php` 检查你的代码，所有这些文件都在 `ch19` 文件夹中。\n\n现在你已在数据库中注册了用户名和密码，接下来需要创建一个登录脚本。`ch19`\
  \ 文件夹包含一组文件，这些文件复制了 PHP 解决方案 11-5 到 11-7 的设置：一个登录页面和两个受密码保护的页面。\n\n## PHP 解决方案 19-2：使用数据库验证用户凭证\n\
  \n此 PHP 解决方案演示了如何通过查询数据库来查找用户名的加密密码，然后将其与用户提交的密码一起作为参数传递给 `password_verify()`，从而验证用户存储的凭证。如果\
  \ `password_verify()` 返回 `true`，则将用户重定向到受限制的页面。\n\n1. 将 `login_db.php`、`menu_db.php`\
  \ 和 `secretpage_db.php` 从 `ch19` 文件夹复制到 `authenticate` 文件夹。同时将 `logout_db.php` 和\
  \ `session_timeout_db.php` 从 `ch19` 文件夹复制到 `includes` 文件夹。\n\n这将设置与第 11 章中使用的基本测试平台相同。唯一的区别是链接已更改，以便重定向到\
  \ `authenticate` 文件夹。\n\n2. 在 `login_db.php` 中，在 `DOCTYPE` 声明上方的一个 PHP 块中添加以下代码：\n\
  \n\n```php\n$error = \"\";\nif (isset($_POST['login'])) {\n    session_start();\n\
  \    $username = trim($_POST['username']);\n    $password = trim($_POST['pwd']);\n\
  \    // 成功登录后重定向的页面地址\n    $redirect = 'http://localhost/phpsols-4e/authenticate/menu_db.php';\n\
  \    require_once '../includes/authenticate_mysqli.php';\n}\n```\n\n这段代码与第 11 章登录表单中的代码模式相似。首先将\
  \ `$error` 初始化为空字符串。条件语句会在表单提交时启动一个会话。用户输入字段中的空白字符被去除，成功登录后用户将被重定向到的页面地址存储在一个变量中。最后，引入了下一节将要构建的认证脚本。\n\
  \n如果你使用的是 PDO，请将 `authenticate_pdo.php` 作为处理脚本。\n\n3. 创建一个名为 `authenticate_mysqli.php`\
  \ 或 `authenticate_pdo.php` 的新文件，并将其保存在 `includes` 文件夹中。该文件仅包含 PHP 脚本，因此请去掉所有 HTML\
  \ 标记。\n\n4. 引入数据库连接文件，使用只读账户创建数据库连接，并使用预处理语句获取用户的详细信息。\n\n对于 MySQLi，请使用以下代码：\n\n\
  ```php\n$stmt = $conn->stmt_init();\n$stmt->prepare($sql);\n// 绑定输入参数\n$stmt->bind_param('s',\
  \ $username);\n$stmt->execute();\n// 绑定结果，为密码使用一个新变量\n$stmt->bind_result($storedPwd);\n\
  $stmt->fetch();\n```\n\n这是一个非常直接的 `SELECT` 查询，因此在将其传递给 MySQLi 的 `prepare()` 方法时，我没有使用条件语句。用户名是一个字符串，因此\
  \ `bind_param()` 的第一个参数是 `'s'`。如果找到匹配项，结果将被绑定到 `$storedPwd`。你需要为存储的密码使用一个新变量，以避免覆盖用户提交的密码。\n\
  \n语句执行后，`fetch()` 方法获取结果。\n\n对于 PDO，请使用以下代码：\n\n```php\n$stmt = $conn->prepare($sql);\n\
  // 将输入参数作为单个元素的数组传递\n$stmt->execute([$username]);\n$storedPwd = $stmt->fetchColumn();\n\
  ```\n\n这段代码与 MySQLi 版本功能相同，但使用了 PDO 语法。用户名通过 `execute()` 方法作为单元素数组传递。由于结果中只有一列，`fetchColumn()`\
  \ 会返回值并将其赋给 `$storedPwd`。\n\n5. 获取用户名的密码后，你只需将提交的密码和存储的密码传递给 `password_verify()`。如果\
  \ `password_verify()` 返回 `true`，则创建会话变量以指示登录成功及会话开始时间，重新生成会话 ID，并重定向到受限页面。否则，将错误信息存储在\
  \ `$error` 中。\n\n在上一步输入的代码之后插入以下代码。这对 MySQLi 和 PDO 是相同的。\n\n```php\n// 将提交的密码与存储的密码进行比对\n\
  if (password_verify($password, $storedPwd)) {\n    $_SESSION['authenticated'] =\
  \ 'Jethro Tull';\n    // 获取会话开始的时间\n    $_SESSION['start'] = time();\n    session_regenerate_id();\n\
  \    header(\"Location: $redirect\");\n    exit;\n} else {\n    // 如果验证失败，准备错误信息\n\
  \    $error = '无效的用户名或密码';\n}\n```\n\n如同第 11 章所述，`$_SESSION['authenticated']` 的值实际上并不重要。\n\
  \n6. 保存 `authenticate_mysqli.php` 或 `authenticate_pdo.php`，然后使用你在 PHP 解决方案 19-1\
  \ 末尾注册的用户名和密码登录 `login_db.php` 进行测试。登录过程应与第 11 章完全相同。不同之处在于，所有详细信息都更安全地存储在数据库中。\n\
  \n必要时，你可以对照 `ch19` 文件夹中的 `login_mysqli.php` 和 `authenticate_mysqli.php`，或 `login_pdo.php`\
  \ 和 `authenticate_pdo.php` 来检查你的代码。如果遇到问题，最常见的错误是在数据库中为哈希密码创建的列太窄。该列必须至少宽 60 个字符，建议使其能够存储多达\
  \ 255 个字符，以防未来的加密方法生成更长的字符串。\n\n尽管将哈希密码存储在数据库中比使用文本文件更安全，但密码是以纯文本（未加密）形式从用户的浏览器发送到服务器的。为了安全起见，登录和后续页面的访问应通过传输层安全（TLS）或安全套接字层（SSL）连接进行。\n\
  \n## 使用密钥加密\n\n设置用户注册和认证用于密钥加密的主要区别在于，密码需要使用 `BLOB` 数据类型作为二进制对象存储在数据库中（更多信息请参见第\
  \ 12 章的“存储二进制数据”），并且密码验证是在 SQL 查询中进行的，而不是在 PHP 脚本中。\n\n### 创建存储用户详细信息的表\n\n在 phpMyAdmin\
  \ 中，在 `phpsols` 数据库中创建一个名为 `users_2way` 的新表。它需要三列，设置如表 19-2 所列。\n\n**表 19-2.** `users_2way`\
  \ 表的设置\n\n| 名称       | 类型    | 长度/值 | 属性       | 空值      | 索引     | A_I       |\n\
  |------------|---------|---------|------------|-----------|-----------|-----------|\n\
  | `user_id`  | `INT`   |         | `UNSIGNED` | 未选中    | `PRIMARY` | 已选中    |\n\
  | `username` | `VARCHAR` | `15`   |            | 未选中    | `UNIQUE`  |          \
  \ |\n| `pwd`      | `BLOB`  |         |            | 未选中    |           |      \
  \     |\n\n### 注册新用户\n\n`AES_ENCRYPT()` 函数接受两个参数：要加密的值和一个加密密钥。加密密钥可以是您选择的任何字符串。在本例中，我选择了\
  \ `takeThisWith@PinchOfSalt`，但使用随机的字母数字字符和符号序列会更安全。默认情况下，`AES_ENCRYPT()` 使用 128\
  \ 位密钥对数据进行编码。要使用更安全的 256 位密钥长度，您需要在 MySQL 中将系统变量 `block_encryption_mode` 设置为 `aes-256-cbc`（更多详细信息，请参见\
  \ [`https://dev.mysql.com/doc/refman/8.0/en/encryption-functions.html#function_aes-decrypt`](https://dev.mysql.com/doc/refman/8.0/en/encryption-functions.html%2523function_aes-decrypt)）。用于单向密码哈希和密钥加密的基本注册脚本是相同的。唯一的区别在于将用户数据插入数据库的部分。\n\
  \n> **提示**  \n> 以下脚本将加密密钥直接嵌入页面中。为了安全起见，您应该在包含文件中定义密钥，并将其存储在服务器文档根目录之外。\n\nMySQLi\
  \ 的代码如下所示（完整列表在 `ch19` 文件夹中的 `register_2way_mysqli.php`）：\n\n```php\nif (!$errors)\
  \ {\n    // 引入连接文件\n    require_once 'connection.php';\n    $conn = dbConnect('write');\n\
  \    // 创建一个密钥\n    $key = 'takeThisWith@PinchOfSalt';\n    // 准备 SQL 语句\n    $sql\
  \ = 'INSERT INTO users_2way (username, pwd)\n            VALUES (?, AES_ENCRYPT(?,\
  \ ?))';\n    $stmt = $conn->stmt_init();\n    if ($stmt = $conn->prepare($sql))\
  \ {\n        // 绑定参数并将详细信息插入数据库\n        $stmt->bind_param('sss', $username, $password,\
  \ $key);\n        $stmt->execute();\n    }\n    if ($stmt->affected_rows == 1) {\n\
  \        $success = htmlentities($username) . ' 已注册。您现在可以登录。';\n    } elseif ($stmt->errno\
  \ == 1062) {\n        $errors[] = htmlentities($username) . ' 已被使用。请选择其他用户名。';\n\
  \    } else {\n        $errors[] = $stmt->error;\n    }\n}\n```\n\n对于 PDO，代码如下所示（完整列表请参见\
  \ `ch19` 文件夹中的 `register_2way_pdo.php`）：\n```\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将以下英文文本翻译成专业、准确的中文。\n\
  \n\n```php\nif (!$errors) {\n// include the connection file\nrequire_once 'connection.php';\n\
  $conn = dbConnect('write', 'pdo');\n// create a key\n$key = 'takeThisWith@PinchOfSalt';\n\
  // prepare SQL statement\n$sql = 'INSERT INTO users_2way (username, pwd)\nVALUES\
  \ (:username, AES_ENCRYPT(:pwd, :key))';\n$stmt = $conn->prepare($sql);\n// bind\
  \ parameters and insert the details into the database\n$stmt->bindParam(':username',\
  \ $username, PDO::PARAM_STR);\n$stmt->bindParam(':pwd', $password, PDO::PARAM_STR);\n\
  $stmt->bindParam(':key', $key, PDO::PARAM_STR);\n$stmt->execute();\nif ($stmt->rowCount()\
  \ == 1) {\n$success = htmlentities($username) . ' has been registered. You may now\
  \ log in.';\n} elseif ($stmt->errorCode() == 23000) {\n$errors[] = htmlentities($username)\
  \ . ' is already in use. Please choose another username.';\n} else {\n$errors[]\
  \ = 'Sorry, there was a problem with the database.';\n}\n}\n```\n\n严格来说，不需要为`$key`使用绑定参数，因为它并非来自用户输入。但是，如果直接将其嵌入查询中，整个查询需要用双引号括起来，并且`$key`需要用单引号括起来。\n\
  \n要测试前面的脚本，请将它们复制到 `includes` 文件夹中，并在 `register_db.php` 中引用它们，以替代 `register_db_mysqli.php`\
  \ 或 `register_db_pdo.php`。\n\n## 使用双向加密进行用户身份验证\n\n使用双向加密创建登录页面非常简单。连接到数据库后，将用户名、密钥和未加密的密码合并到\
  \ `SELECT` 查询的 `WHERE` 子句中。如果查询找到匹配项，则允许用户访问网站的受限部分。如果没有匹配项，则拒绝登录。除了以下部分，代码与 PHP\
  \ 方案 19-2 相同。\n\n对于 MySQLi，代码如下所示（参见 `authenticate_2way_mysqli.php`）：\n\n```php\n\
  $stmt = $conn->stmt_init();\n$stmt->prepare($sql);\n// bind the input parameters\n\
  $stmt->bind_param('sss', $username, $password, $key);\n$stmt->execute();\n// to\
  \ get the number of matches, you must store the result\n$stmt->store_result();\n\
  // if a match is found, num_rows is 1, which is treated as true\nif ($stmt->num_rows)\
  \ {\n$_SESSION['authenticated'] = 'Jethro Tull';\n// get the time the session started\n\
  $_SESSION['start'] = time();\nsession_regenerate_id();\nheader(\"Location: $redirect\"\
  ); exit;\n} else {\n// if not verified, prepare error message\n$error = 'Invalid\
  \ username or password';\n}\n```\n\n请注意，在访问 `num_rows` 属性之前，需要先存储预处理语句的结果。如果不这样做，`num_rows`\
  \ 将始终为 `0`，即使用户名和密码正确，登录也会失败。\n\nPDO 的修订代码如下所示（参见 `authenticate_2way_pdo.php`）：\n\
  \n```php\n$stmt = $conn->prepare($sql);\n// bind variables by passing them as an\
  \ array when executing statement\n$stmt->execute([$username, $password, $key]);\n\
  // if a match is found, rowCount() produces 1, which is treated as true\nif ($stmt->rowCount())\
  \ {\n$_SESSION['authenticated'] = 'Jethro Tull';\n// get the time the session started\n\
  $_SESSION['start'] = time();\nsession_regenerate_id();\nheader(\"Location: $redirect\"\
  ); exit;\n} else {\n// if not verified, prepare error message\n$error = 'Invalid\
  \ username or password';\n}\n```\n\n要测试这些脚本，请将它们复制到 `includes` 文件夹中，并用它们替换 `authenticate_mysqli.php`\
  \ 和 `authenticate_pdo.php`。\n\n### 解密密码\n\n解密使用双向加密的密码，只需在预处理语句中将密钥作为第二个参数传递给 `AES_DECRYPT()`\
  \ 即可，如下所示：\n\n```php\n$key = 'takeThisWith@PinchOfSalt';\n$sql = \"SELECT AES_DECRYPT(pwd,\
  \ '$key') AS pwd FROM users_2way\nWHERE username = ?\";\n```\n\n该密钥必须与最初用于加密密码的密钥完全相同。如果丢失密钥，密码将像使用单向哈希存储的密码一样无法访问。通常，唯一需要解密密码的情况是用户请求密码提醒时。为此类提醒制定适当的安全策略在很大程度上取决于您运营的网站类型。然而，不言而喻，您不应在屏幕上显示解密后的密码。您需要设置一系列安全检查，例如询问用户的出生日期或提出一个只有用户可能知道答案的问题。即使用户答对了，也应将密码通过电子邮件发送到用户的注册地址。如果您能成功读完本书至此，那么所有必要的知识应该已经尽在掌握。\n\
  \n### 更新用户详细信息\n\n我没有为用户注册页面包含任何更新表单。这是一个您在这个阶段应该能够自行完成的任务。更新用户注册详细信息最重要的点是，您不应在更新表单中显示用户的现有密码。如果您使用的是密码哈希，无论如何也无法显示。\n\
  \n### 下一步做什么？\n\n本书涵盖了大量的内容。如果您已经掌握了这里介绍的所有技术，那么您已经走在成为中级 PHP 开发人员的道路上，再稍加努力，就能进入高级水平。如果感觉有些吃力，请不要担心。重新阅读前面的章节。练习得越多，就会越容易。\n\
  \n您可能会想，“我到底怎样才能记住所有这些？”您不需要全部记住。查阅资料并不丢人。请收藏 PHP 在线手册 (`www.php.net/manual/en/`)\
  \ 并经常使用它。它不断更新，并且包含许多有用的示例。在页面右上角的搜索框中输入函数名称，即可直接查看该函数的完整描述。即使您记不住准确的函数名，手册也会将您带到一个列出最可能候选项的页面。大多数页面都提供了实际示例，说明函数或类的使用方法。\n\
  \n使动态网页设计变得容易的，不是对 PHP 函数和类的百科全书式了解，而是对条件语句、循环和其他结构如何控制脚本流程的扎实掌握。一旦您能根据“如果发生这种情况，接下来应该发生什么？”来想象您的项目，您就成为自己游戏的主宰者。我经常查阅\
  \ PHP 在线手册。对我来说，它就像一本字典。大多数时候，我只是想检查参数顺序是否正确，但我经常发现某些东西会吸引我的眼球，并打开新的视野。我也许不会立即使用这些知识，但会将其存储在我的脑海深处以备将来使用，并在需要检查细节时再回去查阅。\n\
  \nMySQL 在线手册 (`https://dev.mysql.com/doc/refman/8.0/en/`) 同样有用。MariaDB 的文档在 `https://mariadb.com/kb/en/library/documentation/`。将\
