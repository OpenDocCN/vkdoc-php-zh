  trans: '

    ### 问题


    管理对象组可能是一项相当复杂的任务，尤其是当这些对象本身还可能包含自己的子对象时。这类问题在编码中非常常见。想想发票，其中包含汇总了额外产品或服务的明细项，或者待办事项列表，其中的项目本身又包含多个子任务。在内容管理中，我们离不开由章节、页面、文章或媒体组件构成的树状结构。从外部管理这些结构很快就会变得令人望而生畏。


    让我们回到之前的一个场景。我正在设计一个基于名为《文明》的游戏系统。玩家可以在构成地图的数百个方格上移动单位。单个棋子可以组合成一个群体，进行移动、战斗和防御。这里我定义了几种单位类型：


    ```

    // 代码清单 10.01

    abstract class Unit

    {

    abstract public function bombardStrength(): int;

    }

    class Archer extends Unit

    {

    public function bombardStrength(): int

    {

    return 4;

    }

    }

    class LaserCannonUnit extends Unit

    {

    public function bombardStrength(): int

    {

    return 44;

    }

    }

    ```


    `Unit` 类定义了一个抽象方法 `bombardStrength()`，用于设置单位轰击相邻方格的攻击强度。我在 `Archer` 和 `LaserCannonUnit`
    类中都实现了该方法。这些类还会包含关于移动和防御能力的信息，不过我会保持简单。我可以定义一个单独的类来将单位组合在一起，就像这样：


    ```

    // 代码清单 10.02

    class Army

    {

    private $units = [];

    public function addUnit(Unit $unit)

    {

    array_push($this->units, $unit);

    }

    public function bombardStrength(): int

    {

    $ret = 0;

    foreach ($this->units as $unit) {

    $ret += $unit->bombardStrength();

    }

    return $ret;

    }

    }

    // 代码清单 10.03

    $unit1 = new Archer();

    $unit2 = new LaserCannonUnit();

    $army = new Army();

    $army->addUnit($unit1);

    $army->addUnit($unit2);

    print $army->bombardStrength();

    ```


    `Army` 类有一个 `addUnit()` 方法，该方法接受一个 `Unit` 对象。`Unit` 对象被存储在一个名为 `$units` 的数组属性中。我在
    `bombardStrength()` 方法中计算军队的总攻击强度。该方法只是遍历所有聚合的 `Unit` 对象，并调用每个对象的 `bombardStrength()`
    方法。


    只要问题保持这么简单，这个模型就是完全可以接受的。但如果我要添加一些新的需求呢？假设一个军队应该能够与其他军队合并。每个军队应该保留其自身的标识，以便日后能够从整体中分离出来。大公的英勇部队今天可能与索姆斯将军对敌人暴露侧翼的进攻有共同的目标，但一场国内叛乱随时可能让他的军队匆忙班师回朝。出于这个原因，我不能简单地将每个军队的单位都倒入一个新的部队中。


    我可以修改 `Army` 类，使其除了接受 `Unit` 对象外，也接受 `Army` 对象：


    ```

    // 代码清单 10.04

    public function addArmy(Army $army)

    {

    array_push($this->armies, $army);

    }

    ```


    然后我需要修改 `bombardStrength()` 方法，使其同时遍历所有军队和单位：


    ```

    // 代码清单 10.05

    public function bombardStrength(): int

    {

    $ret = 0;

    foreach ($this->units as $unit) {

    $ret += $unit->bombardStrength();

    }

    foreach ($this->armies as $army) {

    $ret += $army->bombardStrength();

    }

    return $ret;

    }

    ```


    目前这种额外的复杂性还不算太成问题。但请记住，我需要在诸如 `defensiveStrength()`、`movementRange()` 等方法中也做类似的事情。我的游戏将功能丰富。业务部门已经在要求一种能容纳最多十个单位的运兵车，以提升它们在某些地形上的移动范围。显然，运兵车与军队类似，因为它也包含单位。它也有自己的特性。我可以进一步修改
    `Army` 类来处理 `TroopCarrier` 对象，但我知道未来还会有更多单位组合的需求。很明显，我需要一个更灵活的模型。


    让我们重新审视一下我一直在构建的模型。我创建的所有类都有一个共同需求：`bombardStrength()` 方法。实际上，客户端不需要区分军队、单位或运兵车。它们在功能上是相同的。它们都需要移动、攻击和防御。那些包含其他对象的对象需要提供添加和移除它们的方法。这些相似之处引导我们得出一个不可避免的结论：由于容器对象与其所包含的对象共享接口，它们自然适合归属于同一个类型家族。

    '
- fmt: '### Implementation


    The Composite pattern defines a single inheritance hierarchy that lays down two
    distinct sets of responsibilities. We have already seen both of these in our example.
    Classes in the pattern must support a common set of operations as their primary
    responsibility. For us, that means the `bombardStrength()` method. Classes must
    also support methods for adding and removing child objects.


    Figure [10-1](#A314621_5_En_10_Chapter.html#Fig1) shows a class diagram that illustrates
    the Composite pattern as applied to our problem.


    ![A314621_5_En_10_Fig1_HTML.gif](A314621_5_En_10_Fig1_HTML.gif)


    Figure 10-1. The Composite pattern


    As you can see, all the units in this model extend the `Unit` class. A client
    can be sure, then, that any `Unit` object will support the `bombardStrength()`
    method. So, an `Army` can be treated in exactly the same way as an `Archer`.


    The `Army` and `TroopCarrier` classes are composites: they are designed to hold
    `Unit` objects. The `Archer` and `LaserCannon` classes are leaves, designed to
    support unit operations, but not to hold other `Unit` objects. There is actually
    an issue as to whether leaves should honor the same interface as composites, as
    they do in Figure [10-1](#A314621_5_En_10_Chapter.html#Fig1). The diagram shows
    `TroopCarrier` and `Army` aggregating other units, even though the leaf classes
    are also bound to implement `addUnit()`. I will return to this question shortly.
    Here is the abstract `Unit` class:


    ```

    // listing 10.06

    abstract class Unit

    {

    abstract public function addUnit(Unit $unit);

    abstract public function removeUnit(Unit $unit);

    abstract public function bombardStrength(): int;

    }

    ```


    As you can see, I lay down the basic functionality for all `Unit` objects here.
    Now, let’s see how a composite object might implement these abstract methods:


    ```

    // listing 10.07

    class Army extends Unit

    {

    private $units = [];

    public function addUnit(Unit $unit)

    {

    if (in_array($unit, $this->units, true)) {

    return;

    }

    $this->units[] = $unit;

    }

    public function removeUnit(Unit $unit)

    {

    $idx = array_search($unit, $this->units, true);

    if (is_int($idx)) {

    array_splice($this->units, $idx, 1, []);

    }

    }

    public function bombardStrength(): int

    {

    $ret = 0;

    foreach ($this->units as $unit) {

    $ret += $unit->bombardStrength();

    }

    return $ret;

    }

    }

    ```


    The `addUnit()` method checks whether I have already added the same `Unit` object
    before storing it in the private `$units` array property. `removeUnit()` uses
    a similar check to remove a given `Unit` object from the property.


    `Army` objects, then, can store `Unit` objects of any kind, including other `Army`
    objects, or leaves such as `Archer` or `LaserCannonUnit`. Because all units are
    guaranteed to support `bombardStrength()`, our `Army::bombardStrength()` method
    simply iterates through all the child `Unit` objects stored in the `$units` property,
    calling the same method on each.


    One problematic aspect of the Composite pattern is the implementation of add and
    remove functionality. The classic pattern places `add()` and `remove()` methods
    in the abstract super class. This ensures that all classes in the pattern share
    a common interface. As you can see here, though, it also means that leaf classes
    must provide an implementation:


    ```

    // listing 10.08

    class UnitException extends \Exception

    {

    }

    // listing 10.09

    class Archer extends Unit

    {

    public function addUnit(Unit $unit)

    {

    throw new UnitException(get_class($this) . " is a leaf");

    }

    public function removeUnit(Unit $unit)

    {

    throw new UnitException(get_class($this) . " is a leaf");

    }

    public function bombardStrength(): int

    {

    return 4;

    }

    }

    ```


    I do not want to make it possible to add a `Unit` object to an `Archer` object,
    so I throw exceptions if `addUnit()` or `removeUnit()` are called. I will need
    to do this for all leaf objects, so I could perhaps improve my design by replacing
    the abstract `addUnit()/removeUnit()` methods in `Unit` with default implementations
    like the one in the preceding example:


    ```

    // listing 10.10

    abstract class Unit

    {

    public function addUnit(Unit $unit)

    {

    throw new UnitException(get_class($this) . " is a leaf");

    }

    public function removeUnit(Unit $unit)

    {

    throw new UnitException(get_class($this) . " is a leaf");

    }

    abstract public function bombardStrength(): int;

    }

    // listing 10.11

    class Archer extends Unit

    {

    public function bombardStrength(): int

    {

    return 4;

    }

    }

    ```


    This removes duplication in leaf classes, but has the drawback that a composite
    is not forced at compile time to provide an implementation of `addUnit()` and
    `removeUnit()`, which could cause problems down the line.


    I will look in more detail at some of the problems presented by the Composite
    pattern in the next section. Let’s end this section by examining some of its benefits:


    * **Flexibility**: Because everything in the Composite pattern shares a common
    supertype, it is very easy to add new composite or leaf objects to the design
    without changing a program’s wider context.

    * **Simplicity**: A client using a Composite structure has a straightforward interface.
    There is no need for a client to distinguish between an object that is composed
    of others and a leaf object (except when adding new components). A call to `Army::bombardStrength()`
    may cause a cascade of delegated calls behind the scenes; but to the client, the
    process and result are exactly equivalent to those associated with calling `Archer::bombardStrength()`.

    * **Implicit reach**: Objects in the Composite pattern are organized in a tree.
    Each composite holds references to its children. An operation on a particular
    part of the tree, therefore, can have a wide effect. We might remove a single
    `Army` object from its `Army` parent and add it to another. This simple act is
    wrought on one object, but it has the effect of changing the status of the `Army`
    object’s referenced `Unit` objects and of their own children.

    * **Explicit reach**: Tree structures are easy to traverse. They can be iterated
    in order to gain information or to perform transformations. We will look at a
    particularly powerful technique for this in the next chapter when we deal with
    the Visitor pattern.


    Often, you really see the benefit of a pattern only from the client’s perspective,
    so here are a couple of armies:


    ```

    // listing 10.12

    // create an army

    $main_army = new Army();

    // add some units

    $main_army->addUnit(new Archer());

    $main_army->addUnit(new LaserCannonUnit());

    // create a new army

    $sub_army = new Army();

    // add some units

    $sub_army->addUnit(new Archer());

    $sub_army->addUnit(new Archer());

    $sub_army->addUnit(new Archer());

    // add the second army to the first

    $main_army->addUnit($sub_army);

    // all the calculations handled behind the scenes

    print "attacking with strength: {$main_army->bombardStrength()}\n";

    ```


    I create a new `Army` object and add some primitive `Unit` objects. I repeat the
    process for a second `Army` object that I then add to the first. When I call `Unit::bombardStrength()`
    on the first `Army` object, all the complexity of the structure that I have built
    up is entirely hidden.'
