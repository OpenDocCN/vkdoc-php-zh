- fmt: "# Implementing the Order Pipeline: Part I\n\n## Updating the Status of an\
    \ Order\n\nEach pipeline section needs the capability to change the status of\
    \ an order, advancing it to the next pipeline section. Rather than simply incrementing\
    \ the status, this functionality is kept flexible, just in case you end up with\
    \ a more complicated branched pipeline. This requires a new function in the database,\
    \ named `orders_update_status`, and a data tier method, `UpdateOrderStatus`, which\
    \ you need to add to the `Orders` class (located in `business/orders.php`).\n\n\
    Start by creating the `orders_update_status` function in your `hatshop` database:\n\
    \n```sql\n-- Create orders_update_status function\n\nCREATE FUNCTION orders_update_status(INTEGER,\
    \ INTEGER)\nRETURNS VOID LANGUAGE plpgsql AS $$\nDECLARE\n  inOrderId ALIAS FOR\
    \ $1;\n  inStatus ALIAS FOR $2;\nBEGIN\n  UPDATE orders SET status = inStatus\
    \ WHERE order_id = inOrderId;\nEND;\n$$;\n```\n\nThen, add the `UpdateOrderStatus`\
    \ method to the `Orders` class in `business/order.php`:\n\n```php\n// Updates\
    \ the order pipeline status of an order\npublic static function UpdateOrderStatus($orderId,\
    \ $status)\n{\n  // Build the SQL query\n  $sql = 'SELECT orders_update_status(:order_id,\
    \ :status);';\n\n  // Build the parameters array\n  $params = array (':order_id'\
    \ => $orderId, ':status' => $status);\n\n  // Prepare the statement with PDO-specific\
    \ functionality\n  $result = DatabaseHandler::Prepare($sql);\n\n  // Execute the\
    \ query\n  return DatabaseHandler::Execute($result, $params);\n}\n```\n\nThe method\
    \ in `OrderProcessor` (in `business/order_processor.php`) that calls the business\
    \ data tier method is also called `UpdateOrderStatus`:\n\n```php\n// Set order\
    \ status\npublic function UpdateOrderStatus($status)\n{\n  Orders::UpdateOrderStatus($this->mOrderInfo['order_id'],\
    \ $status);\n  $this->mOrderInfo['status'] = $status;\n}\n```\n\n## Setting Credit\
    \ Card Authentication Details\n\nIn the next chapter, when we deal with credit\
    \ card usage, you'll need to set data in the `auth_code` and `reference` fields\
    \ in the `orders` table.\n\nTo support that functionality, first add the `orders_set_auth_code`\
    \ function to your database:\n\n```sql\n-- Create orders_set_auth_code function\n\
    \nCREATE FUNCTION orders_set_auth_code(INTEGER, VARCHAR(50), VARCHAR(50))\nRETURNS\
    \ VOID LANGUAGE plpgsql AS $$\nDECLARE\n  inOrderId ALIAS FOR $1;\n  inAuthCode\
    \ ALIAS FOR $2;\n  inReference ALIAS FOR $3;\nBEGIN\n  UPDATE orders\n  SET auth_code\
    \ = inAuthCode, reference = inReference\n  WHERE order_id = inOrderId;\nEND;\n\
    $$;\n```\n\nThen, add the `SetOrderAuthCodeAndReference` method to your `Orders`\
    \ class in `business/order.php`:\n\n```php\n// Sets order's authorization code\n\
    public static function SetOrderAuthCodeAndReference($orderId, $authCode, $reference)\n\
    {\n  // Build the SQL query\n  $sql = 'SELECT orders_set_auth_code(:order_id,\
    \ :auth_code, :reference);';\n\n  // Build the parameters array\n  $params = array\
    \ (':order_id' => $orderId,\n                   ':auth_code' => $authCode,\n \
    \                  ':reference' => $reference);\n\n  // Prepare the statement\
    \ with PDO-specific functionality\n  $result = DatabaseHandler::Prepare($sql);\n\
    \n  // Execute the query\n  return DatabaseHandler::Execute($result, $params);\n\
    }\n```\n\nThe code to set these values in the database is the `SetOrderAuthCodeAndReference`\
    \ method, which you need to add to your `OrderProcessor` class in `business/order_processor.php`:\n\
    \n```php\n// Set order's authorization code and reference code\npublic function\
    \ SetAuthCodeAndReference($authCode, $reference)\n{\n  Orders::SetOrderAuthCodeAndReference($this->mOrderInfo['order_id'],\n\
    \                                       $authCode, $reference);\n  $this->mOrderInfo['auth_code']\
    \ = $authCode;\n}\n```"
