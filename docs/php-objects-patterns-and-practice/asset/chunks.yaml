    I could go on to create methods for counting the number of units in the tree,
    for saving components to a database, and for calculating the food units consumed
    by an army.


    Why would I want to include these methods in the composite’s interface? There
    is only one really compelling answer. I include these disparate operations here
    because this is where an operation can gain easy access to related nodes in the
    composite structure.


    Although it is true that ease of traversal is part of the Composite pattern, it
    does not follow that every operation that needs to traverse the tree should therefore
    claim a place in the Composite’s interface.


    So these are the forces at work: I want to take full advantage of the easy traversal
    afforded by my object structure, but I want to do this without bloating the interface.


    ### Implementation


    I’ll begin with the interfaces. In the abstract `Unit` class, I define an `accept()`
    method :


    ```

    // listing 11.39

    abstract class Unit

    {

