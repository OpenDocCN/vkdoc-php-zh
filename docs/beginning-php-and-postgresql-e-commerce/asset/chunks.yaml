    **Showing Products Page by Page**


    If certain web sections need to list large numbers of products, it’s useful to
    let the visitor browse them page by page, with a predefined (or configurable by
    the visitor) number of products per page.


    Depending on the tier on your architecture where paging is performed, there are
    three main ways to implement paging:


    **Paging at the data tier level:** In this case, the database returns only the
    page of products needed by the presentation tier.


    **Paging at the business tier level:** The business tier requests the complete
    page of products from the database, performs filtering, and returns back to the
    presentation tier only the page of products that needs to be displayed.


    **Paging at the presentation tier level:** In this scenario, the presentation
    tier receives the complete list of products and extracts the page that needs to
    be displayed for the visitor.


    Paging at the business tier and presentation tier levels has potential performance
    problems, especially when dealing with large result sets, because they imply transferring
    unnecessarily large quantities of data from the database to the presentation tier.
    Additional data also needs to be stored on the server’s memory, unnecessarily
    consuming server resources.


    In our web site, we’ll implement paging at the data tier level, not only because
    of its better performance, but also because it allows you to learn some tricks
    about database programming that you’ll find useful when developing your web sites.


    To implement paging at the data tier level, we need to find how to build a `SELECT`
    query that returns just a portion of records (products) from a larger set, and
    each database language seems to have different ways for doing this. To achieve
    this functionality in PostgreSQL, you need to use the `LIMIT` and `OFFSET` keywords
    together with the `SELECT` statement:


    - `OFFSET` specifies how many records from the original rowset to skip. So if
    you want to retrieve the second page of products in a catalog that has four products
    per page, you would need to specify `OFFSET 4`. A query without an offset is the
    same as a query with `OFFSET 0`.

    - `LIMIT` specifies the maximum number of rows to return.


    When using `OFFSET` and `LIMIT`, it’s highly recommended to also use `ORDER BY`.
    Without this clause, PostgreSQL doesn’t guarantee the order in which the results
    are returned, so, theoretically, different requests for a certain page of products
    could deliver different results. The following SQL query tells PostgreSQL to return
    the rows 15, 16, 17, 18, and 19 from the list of alphabetically ordered products:


    ```

    SELECT name

    FROM product

    ORDER BY name

    LIMIT 5

    OFFSET 14;

    ```


    With the current database you should get these products:

    ```

    name

    Confederate Civil War Kepi

    Confederate Slouch Hat

    Cotton Beret

    Green MadHatter Hat

    Hanukah Hat

    ```


    You’ll use the `LIMIT` and `OFFSET` keywords to specify the range of records you’re
    interested in when retrieving lists of products. For more details, you can always
    refer to the official documentation at [http://www.postgresql.org/docs/current/interactive/queries-limit.html](http://www.postgresql.org/docs/current/interactive/queries-limit.html).


    **Writing the New Database Functions**


    Now you implement the data tier functions, which return data from the database.
    First you’ll implement the PostgreSQL functions that retrieve department and category
    information:


    - `catalog_get_department_details`

    - `catalog_get_categories_list`

    - `catalog_get_category_details`


    Afterwards, you’ll write the functions that deal with products. Only four functions
    effectively ask for products, but you’ll also implement three helper functions
    (`catalog_count_products_in_category`, `catalog_count_products_on_department`,
    and `catalog_count_products_on_catalog`) to assist in implementing the paging
    functionality.'
