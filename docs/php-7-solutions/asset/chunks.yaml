  trans: "\n3. 保存页面并进行测试。点击`Next`链接，应该会看到剩余的子集缩略图，如图 14-6 所示。由于没有更多图片需要显示，`Next`链接会消失，但缩略图网格左下角会出现一个`Prev`链接。图库顶部的记录计数器现在会反映当前显示的缩略图范围，如果你点击正确的缩略图，同一子集会保留在屏幕上，同时显示相应的大图。大功告成！\n\
    \n你可以对照`gallery_mysqli_08.php`或`gallery_pdo_08.php`检查代码。\n\n## 章节回顾\n\n仅用几页的篇幅，你就将一份枯燥的文件名列表转变为一个动态的在线图库，并配备了页面导航系统。所需做的只是为每张主要图片创建缩略图，将两张图片上传至相应的文件夹，并将文件名和说明文字添加到数据库的`images`表中。只要数据库与`images`和`thumbs`文件夹的内容保持同步，你便拥有一个动态图库。不仅如此，你还学会了如何选择记录子集、通过查询字符串链接到相关信息，以及构建页面导航系统。\n\
    \n使用 PHP 的次数越多，你就越能意识到，技能不在于记住大量晦涩函数的使用方法，而在于理清实现 PHP 达成目标的逻辑。这本质上是一个“如果这样，就那样做；如果那样，就做不同的事”的问题。一旦你能预见到某种情况可能出现的各种结果，通常就能构建出处理它的代码。\n\
    \n到目前为止，你一直专注于从简单的数据库表中提取记录。在下一章中，我将向你展示如何插入、更新和删除数据。\n\n## 15. 管理内容\n\n虽然你可以使用\
    \ phpMyAdmin 进行许多数据库管理操作，但你或许希望设置一些区域，让客户可以登录更新某些数据，而无需授予他们对数据库的完全控制权。为此，你需要构建自己的表单，并创建定制化的内容管理系统。\n\
    \n每个内容管理系统的核心通常是所谓的 CRUD 循环——创建(Create)、读取(Read)、更新(Update)和删除(Delete)——它仅使用四个\
    \ SQL 命令：`INSERT`、`SELECT`、`UPDATE`和`DELETE`。为了演示基本的 SQL 命令，本章将向你展示如何为名为`blog`的表构建一个简单的内容管理系统。即使你不想构建自己的内容管理系统，本章涵盖的这四个命令对于几乎所有基于数据库驱动的页面（如用户登录、用户注册、搜索表单、搜索结果等）来说也是必不可少的。\n\
    \n在本章中，你将学习以下内容：\n\n-   在数据库表中插入新记录\n-   显示现有记录的列表\n-   更新现有记录\n-   在删除记录前请求确认\n\
    \n### 设置内容管理系统\n\n管理数据库表中的内容涉及四个阶段，我通常将其分配给四个独立但相互关联的页面：分别用于插入、更新和删除记录，以及一个现有记录列表。记录列表有两个用途：识别数据库中存储的内容，更重要的是，通过查询字符串传递记录的主键，链接到更新和删除脚本。\n\
    \n`blog`表包含一系列要在 Japan Journey 网站中显示的标题和文章内容，如图 15-1 所示。为简单起见，该表仅包含五列：`article_id`（主键）、`title`、`article`、`created`和`updated`。\n\
    \n![../images/332054_4_En_15_Chapter/332054_4_En_15_Fig1_HTML.jpg](img/332054_4_En_15_Fig1_HTML.jpg)\n\
    \n*图 15-1. Japan Journey 网站中`blog`表的内容*\n\n### 创建博客数据库表\n\n如果你只想直接学习内容管理页面，可以从`ch15`文件夹导入`blog.sql`中的表结构和数据。打开\
    \ phpMyAdmin，选择`phpsols`数据库，按照第 12 章的方法导入该表。该 SQL 文件会创建表并用四篇短文填充它。\n\n如果你想从头开始自行创建所有内容，请打开\
    \ phpMyAdmin，选择`phpsols`数据库，如果未选中，请点击`Structure`标签页。在`Create table`部分，在`Name`字段中输入**blog**，在`Number\
    \ of columns`字段中输入**5**。然后点击`Go`。使用以下截图和表 15-1 中显示的设置。\n\n![../images/332054_4_En_15_Chapter/332054_4_En_15_Figa_HTML.jpg](img/332054_4_En_15_Figa_HTML.jpg)\n\
    \n*表 15-1. `blog`表的列定义*\n\n| 字段 | 类型 | 长度/值 | 默认值 | 属性 | 空值 | 索引 | A_I |\n| ---\
    \ | --- | --- | --- | --- | --- | --- | --- |\n| `article_id` | `INT` |  |  |\
    \ `UNSIGNED` | 取消选中 | `PRIMARY` | 选中 |\n| `title` | `VARCHAR` | `255` |  |  |\
    \ 取消选中 |  |  |\n| `article` | `TEXT` |  |  |  | 取消选中 |  |  |\n| `created` | `TIMESTAMP`\
    \ |  | `CURRENT_TIMESTAMP` |  | 取消选中 |  |  |\n| `updated` | `TIMESTAMP` |  | `CURRENT_TIMESTAMP`\
    \ | `on update CURRENT_TIMESTAMP` | 取消选中 |  |  |\n\n`created`和`updated`列的默认值设置为`CURRENT_TIMESTAMP`。因此，在首次输入记录时，这两列获得相同的值。`updated`列的`Attributes`设置为`on\
    \ update CURRENT_TIMESTAMP`。这意味着每当对记录进行更改时，它都会被更新。为了跟踪记录最初创建的时间，`created`列中的值永远不会被更新。\n\
    \n### 创建基本的插入和更新表单\n\nSQL 通过提供独立的命令来区分插入和更新记录。`INSERT`仅用于创建全新记录。一旦记录被插入，任何更改都必须使用`UPDATE`。由于这涉及到相同的字段，因此可以使用同一页面执行这两种操作。但这会使\
    \ PHP 代码更复杂，所以我更喜欢先为插入页面创建 HTML，将其另存为更新页面，然后分别编写代码。\n\n插入页面中的表单只需要两个输入字段：标题和文章。其余三列（主键和两个时间戳）的内容会自动处理。插入表单的代码如下所示：\n\
    \n```html\n<form method=\"post\" action=\"blog_insert_mysqli.php\">\n    <p>\n\
    \        <label for=\"title\">标题:</label>\n        <input type=\"text\" name=\"\
    title\" id=\"title\">\n    </p>\n    <p>\n        <label for=\"article\">文章:</label>\n\
    \        <textarea name=\"article\" id=\"article\" cols=\"60\" rows=\"10\"></textarea>\n\
    \    </p>\n    <p>\n        <input type=\"submit\" name=\"insert\" value=\"插入新条目\"\
    >\n    </p>\n</form>\n```\n\n该表单使用`post`方法。你可以在`ch15`文件夹中的`blog_insert_mysqli_01.php`和`blog_insert_pdo_01.php`文件中找到完整代码。内容管理表单已使用`styles`文件夹中的`admin.css`进行了基本样式设置。在浏览器中查看时，表单如下所示：\n\
    \n![../images/332054_4_En_15_Chapter/332054_4_En_15_Figb_HTML.jpg](img/332054_4_En_15_Figb_HTML.jpg)\n\
    \n更新表单除了标题和提交按钮外完全相同。按钮代码如下所示（完整代码在`blog_update_mysqli_01.php`和`blog_update_pdo_01.php`中）：\n\
    \n```html\n<input type=\"submit\" name=\"update\" value=\"更新条目\">\n```\n\n我已将标题和文章输入字段命名为与`blog`表中列名相同的名称。这有助于稍后在编写\
    \ PHP 和 SQL 代码时跟踪变量。\n"
- fmt: "# Tip\nAs a security measure, some developers recommend using different names\
    \ from the database columns because anyone can see the names of input fields just\
    \ by looking at the form’s source code. Using different names makes it more difficult\
    \ to break into the database. This shouldn’t be a concern in a password-protected\
    \ part of a site. However, you may want to consider the idea for publicly accessible\
    \ forms, such as those used for user registration or login.\n\n## Inserting New\
    \ Records\n\nThe basic SQL for inserting new records into a table looks like this:\n\
    \n```\nINSERT [INTO] table_name (column_names)\nVALUES (values)\n```\n\nThe `INTO`\
    \ is in square brackets, which means that it’s optional. It’s purely there to\
    \ make the SQL read a little more like human language. The column names can be\
    \ in any order you like, but the values in the second set of parentheses must\
    \ be in the same order as the columns they refer to. Although the code is very\
    \ similar for MySQLi and PDO, I’ll deal with each one separately to avoid confusion.\n\
    \n> **Note** Many of the scripts in this chapter use a technique known as “setting\
    \ a flag.” A `flag` is a Boolean variable that is initialized to either `true`\
    \ or `false` and used to check whether something has happened. For instance, if\
    \ `$OK` is initially set to `false` and reset to `true` only when a database query\
    \ executes successfully, it can be used as the condition controlling another code\
    \ block.\n\n## PHP Solution 15-1: Inserting a New Record with MySQLi\n\nThis PHP\
    \ solution shows how to insert a new record into the `blog` table using a MySQLi\
    \ prepared statement. Using a prepared statement avoids problems with escaping\
    \ quotes and control characters. It also protects your database against SQL injection\
    \ (see Chapter [13](#332054_4_En_13_Chapter.xhtml)).\n\n1. Create a folder called\
    \ `admin` in the `phpsols-4e` site root. Copy `blog_insert_mysqli_01.php` from\
    \ the `ch15` folder, and save it as `blog_insert_mysqli.php` in the new folder.\n\
    \n2. The code that inserts a new record should be run only if the form has been\
    \ submitted, so it’s enclosed in a conditional statement that checks for the `name`\
    \ attribute of the submit button (`insert`) in the `$_POST` array. Put the following\
    \ above the `DOCTYPE` declaration:\n\n   ```\n   After including the connection\
    \ function, the code sets `$OK` to `false`. This is reset\n   to `true` only if\
    \ there are no errors. The five comments at the end map out the remaining\n  \
    \ steps that we’ll fill in next.\n   ```\n\n3. Create a connection to the database\
    \ as the user with read and write privileges, initialize a prepared statement,\
    \ and create the SQL with placeholders for data that will be derived from the\
    \ user input like this:\n\n   ```\n   // create database connection\n   $conn\
    \ = dbConnect('write');\n   // initialize prepared statement\n   $stmt = $conn->stmt_init();\n\
    \   // create SQL\n   $sql = 'INSERT INTO blog (title, article)\n   VALUES(?,\
    \ ?)';\n   ```\n\n   The values that will be derived from `$_POST['title']` and\
    \ `$_POST['article']` are represented by question mark placeholders. The other\
    \ columns will be populated automatically. The `article_id` column is the primary\
    \ key, which uses `AUTO_INCREMENT`, and the default for the `created` and `updated`\
    \ columns is `CURRENT_TIMESTAMP`.\n\n   > **Note** The code is in a slightly different\
    \ order from Chapter [13](#332054_4_En_13_Chapter.xhtml). The script will be developed\
    \ further in Chapter [17](#332054_4_En_17_Chapter.xhtml) to run a series of SQL\
    \ queries, so the prepared statement is initialized first.\n\n4. The next stage\
    \ is to replace the question marks with the values held in the variables—a process\
    \ called **binding the parameters**. Insert the following code:\n\n   ```\n  \
    \ if ($stmt->prepare($sql)) {\n   // bind parameters and execute statement\n \
    \  $stmt->bind_param('ss', $_POST['title'], $_POST['article']);\n   $stmt->execute();\n\
    \   if ($stmt->affected_rows > 0) {\n   $OK = true;\n   }\n   }\n   ```\n\n  \
    \ This is the section that protects your database from SQL injection. Pass the\
    \ variables to the `bind_param()` method in the same order as you want them inserted\
    \ into the SQL query, together with a first argument that specifies the data type\
    \ of each variable, once again in the same order as the variables. Both are strings,\
    \ so this argument is `'ss'`.\n\n   Once the values have been bound to the placeholders,\
    \ call the `execute()` method.\n\n   The `affected_rows` property records how\
    \ many rows were affected by an `INSERT`, `UPDATE`, or `DELETE` query.\n\n   >\
    \ **Caution** If the query triggers a MySQL error, `affected_rows` returns −1.\
    \ Unlike some computing languages, PHP treats −1 as `true`. So, you need to check\
    \ that `affected_rows` is greater than zero to be sure that the query succeeded.\
    \ If it is greater than zero, `$OK` is reset to `true`.\n\n5. Finally, redirect\
    \ the page to a list of existing records or display any error message. Add this\
    \ code after the previous step:\n\n   ```\n   // redirect if successful or display\
    \ error\n   if ($OK) {\n   header('Location:\n   http://localhost/phpsols-4e/admin/blog_list_mysqli.php');\n\
    \   exit;\n   } else {\n   $error = $stmt->error;\n   }\n   }\n   ?>\n   ```\n\
    \n6. Add the following code block in the body of the page to display the error\
    \ message if the insert operation fails:\n\n   ```\n   Insert New Blog Entry\n\
    \   <?php\n   if (isset($error)) {\n   echo \"<p>Error: $error</p>\";\n   }\n\
    \   ?>\n   ```\n\n   The completed code is in `blog_insert_mysqli_02.php` in the\
    \ `ch15` folder.\n\nThat completes the insert page, but before testing it, create\
    \ `blog_list_mysqli.php`, which is described in the PHP Solution 15-3.\n\n> **Note** To\
    \ focus on the code that interacts with the database, the scripts in this chapter\
    \ don’t validate the user input. In a real-world application, you should use the\
    \ techniques described in Chapter [6](#332054_4_En_6_Chapter.xhtml) to check the\
    \ data submitted from the form and redisplay it if errors are detected.\n\n##\
    \ PHP Solution 15-2: Inserting a New Record with PDO\n\nThis PHP solution shows\
    \ how to insert a new record in the `blog` table using a PDO prepared statement.\
    \ If you haven’t already done so, create a folder called `admin` in the `phpsols-4e`\
    \ site root.\n\n1. Copy `blog_insert_pdo_01.php` to the `admin` folder and save\
    \ it as `blog_insert_pdo.php`.\n\n2. The code that inserts a new record should\
    \ be run only if the form has been submitted, so it’s enclosed in a conditional\
    \ statement that checks for the `name` attribute of the submit button (`insert`)\
    \ in the `$_POST` array. Put the following in a PHP block above the `DOCTYPE`\
    \ declaration:\n\n   ```\n   if (isset($_POST['insert'])) {\n   require_once '../includes/connection.php';\n\
    \   // initialize flag\n   $OK = false;\n   // create database connection\n  \
    \ // create SQL\n   // prepare the statement\n   // bind the parameters and execute\
    \ the statement\n   // redirect if successful or display error\n   }\n   ```\n\
    \n   After including the connection function, the code sets `$OK` to `false`.\
    \ This is reset to `true` only if there are no errors. The five comments at the\
    \ end map out the remaining steps.\n\n3. Create a PDO connection to the database\
    \ as the user with read and write privileges, and build the SQL like this:\n\n\
    \   ```\n   // create database connection\n   $conn = dbConnect('write', 'pdo');\n\
    \   // create SQL\n   $sql = 'INSERT INTO blog (title, article)\n   VALUES(:title,\
    \ :article)';\n   ```\n\n   The values that will be derived from variables are\
    \ represented by named placeholders consisting of the column name preceded by\
    \ a colon (`:title` and `:article`). The value for the other columns will be generated\
    \ by the database. The `article_id` primary key is incremented automatically,\
    \ and the `created` and `updated` columns have their default values set to `CURRENT_TIMESTAMP`."
