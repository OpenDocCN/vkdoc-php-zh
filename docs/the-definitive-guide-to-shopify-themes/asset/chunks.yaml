    ## 添加产品图片


    让我们开始为例题主题中的产品页面编写代码。


    默认情况下，商店中所有产品均使用 `templates/product.liquid` 文件进行展示。与其他页面模板文件类似，`product.liquid`
    的内容由 Shopify 处理，并渲染在 `theme.liquid` 的 `{{ content_for_layout }}` 标签中。接下来，我们将通过一个简单的产品图片轮播代码，开始向
    `product.liquid` 添加内容。其简化版 HTML 代码见`[5-1]`清单，显示效果见`[图 5-5]`。如果产品有多个图片，则会显示产品缩略图列表。用于生成`[图
    5-5]`所示产品模板的更详细的 `product.liquid` 文件，可在例题主题的 GitHub 仓库中找到。


    ![A437216_1_En_5_Fig5_HTML.jpg](img/A437216_1_En_5_Fig5_HTML.jpg)


    *图 5-5 – 示例产品页面上[5-1]清单的运行结果*


    ```

    {%- if product.images.size > 0 -%}

    {%- if product.images.size > 0 -%}

    {%- for image in product.images -%}

    {%- endfor -%}

    {%- endif -%}

    {%- else -%}

    {{ ''image'' | placeholder_svg_tag }}

    {%- endif -%}

    ```


    *清单 5-1 – 显示主产品的简化版 `product.liquid` 代码*


    在此，我添加了一些 HTML 标记，用于创建一个左侧列来插入产品图片。通过 Liquid，我们查询 `product` 变量（Shopify 在所有产品页面上自动提供该变量），以查看店主是否已为产品添加了图片（`{%-
    if product.images.size > 0 -%}`）。如果已添加，我们会在一个大的 `<img>` 标签中显示“主”图；如果产品有多个图片，我们则遍历所有产品图片，生成一个产品缩略图列表。


    目前，当点击缩略图时，实现方式是在新浏览器窗口中打开图片，而不是将大图替换为缩略图版本。如果你查看 GitHub 仓库中更完整的示例，会发现我利用了一个轮播控件，它允许用户通过左/右箭头滑动切换产品图片，也可以使用缩略图直接跳转到特定产品图片。


    ### 产品图片的设计考量


    在例题主题中添加产品图片的过程中，有必要考虑一些高层次的指导原则。产品图片通常应满足：


    *   **尺寸够大**（即使在较小的屏幕上或对于视力不佳的访客，也能轻松辨认细节）

    *   **画质够高**（无论是拍摄技术还是文件质量）

    *   **对于实物产品，应体现产品尺寸比例**

    *   **同时展示产品本身及使用场景**

    *   **不要使用任何明显的滤镜或数字修改**

    *   **在视觉风格、质感和宽高比上尽可能保持一致性**


    你并非总能控制主题中使用的产品图片，但当有机会时，应努力倡导这些原则。鼓励客户投入时间和预算，聘请专业团队拍摄（最好是具有电商产品摄影经验的摄影工作室）。顾客对电商网站的产品摄影质量非常敏感，如果你的产品图片看起来不专业，他们转化的可能性会大大降低。


    在主题设计项目开始时，你能做的最好的事情之一，就是为产品图片的分辨率和宽高比设定严格的指导原则。要求商家上传尽可能高分辨率的图片（2048 x 2048 像素是一个不错的目标，也是
    Shopify 渲染的最大尺寸）。为了避免页面加载时间过长，你可以利用 Shopify 的图片滤镜（将在下一节讨论）在适当位置渲染低分辨率版本的图片。


    在整个网站上为产品图片坚持使用一致的宽高比，可以降低产品并排渲染时出现不规则或突兀外观差异的可能性。我倾向于鼓励使用方形（1:1）图片，但根据所售产品类型，4:3
    或 3:4 的比例也能取得不错的效果。虽然你可以使用样式表和 Shopify 的图片滤镜来裁剪、拉伸和修剪图片，但拥有一个共同的起点总是更容易处理。


    ### Shopify 的图片滤镜


    Shopify 的实用功能之一是能够使用 Liquid 滤镜对图片进行即时尺寸调整和编辑。这意味着店主可以将最高分辨率的产品图片上传到后台，而主题开发者则可以使用这些滤镜生成适合特定位置尺寸和宽高比的版本。


    这里涉及的关键滤镜叫做 `product_img_url`，你可以在`[5-1]`清单中看到它的用法。你可以查阅 Shopify 文档了解详细信息¹，但该滤镜的主要用途包括：


    *   **使用较小版本的图片**，以减小文件大小和页面加载时间（你将在关于性能的`[第 10 章]`中学习相关内容）

    *   **裁剪或填充图片**，确保它们具有一致的宽高比

    *   **将图片转换为渐进式 JPEG**，以加快加载速度


    ### 可缩放的产品图片与产品灯箱


    实现可缩放的产品图片（将鼠标悬停在产品图片上，会显示“放大”版本）或产品灯箱（点击产品图片会弹出一个“模态”全屏产品图片），是让顾客近距离查看产品的绝佳方式。但至关重要的是，这些设计元素不应让用户感觉离开了原产品页面，从而打断他们的浏览流程。在实现这些功能时，还需要注意以下几点：


    *   它们应**渐进增强**，确保在未启用 JavaScript 时也能保持可用性。

    *   考虑在移动设备上**禁用**这些功能，因为在移动设备上产品图片通常已经是全宽显示，或者用户习惯于通过捏合触屏来放大图片。

    *   确保它们**支持键盘操作**，用户应能使用方向键在连续的图片间移动，并能通过 `Escape` 键关闭灯箱。

    '
- fmt: '### Product Video


    Adding relevant video to a product page can result in some dramatic conversion
    improvements[²](#A437216_1_En_5_Chapter.html#Fn2) and it’s likely that more and
    more online retailers will make use of video to better demonstrate their products
    and unique selling proposition.


    How you incorporate video into your theme will depend on whether high-quality
    video will be available for all products, or just a limited subset. If a large,
    high-quality video is available for every product on the store, then setting aside
    a prominent amount of space for those videos on every product page makes sense,
    as demonstrated on the Sonos site in Figure [5-6](#A437216_1_En_5_Chapter.html#Fig6).


    ![A437216_1_En_5_Fig6_HTML.jpg](A437216_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Sonos makes product video very prominent on its product pages


    Themes for stores that either don’t have videos for all products or have multiple
    videos for each product can display these through a second Thumbnails section.


    Avoid using embedded video tools that automatically load and present controls
    or branding (such as YouTube), as they can be distracting for the user. In fact,
    for performance reasons, it’s best to avoid loading a JavaScript-heavy player
    at all on page load, and instead provide an image that triggers a video player
    popup or embed when the user clicks on it. See Figure [5-7](#A437216_1_En_5_Chapter.html#Fig7).


    ![A437216_1_En_5_Fig7_HTML.jpg](A437216_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Boosted Boards does a good job of showing off their products, but some of their
    product thumbnails are videos. They could improve discoverability of this by adding
    a "Play Video" overlay to these thumbnails


    ### Adding Product Details and the Add To Cart Form


    Jumping back to the example theme, we’re now going to flesh out the content on
    the right side of the desktop mockups from Figure [5-4](#A437216_1_En_5_Chapter.html#Fig4):
    the product’s details, description, and a basic Add To Cart form. Listing [5-2](#A437216_1_En_5_Chapter.html#Par42)
    shows a simplified version of the Liquid code we need to achieve this, with Figure
    [5-8](#A437216_1_En_5_Chapter.html#Fig8) displaying the result in the browser.


    ![A437216_1_En_5_Fig8_HTML.jpg](A437216_1_En_5_Fig8_HTML.jpg)


    Figure 5-8


    The example product page, with product information and the Add To Cart form added


    ```

    ... (product image code omitted) ...


    {{ product.title | escape }}

    {{ product.vendor | escape }}

    {% if product.price_varies %}{{ product.price_min | money }} - {{ product.price_max
    | money }}{% else %}{{ product.price | money }}{% endif %}

    h3>

    {{ product.description }}


    {%- if product.variants.size > 1 -%}

    Select your {{ product.title | downcase }}


    {%- for variant in product.variants -%}

    {{ variant.title | escape }} - {{ variant.price | money }}

    {%- endfor -%}


    {%- else -%}


    {%- endif -%}

    Add to cart


    Listing 5-2

    Additions to templates/product.liquid to Add Product Information and Add To Cart
    Form

    ```


    Let’s break down these changes.


    #### Product Details and Description


    There’s nothing too involved with the code in Listing [5-2](#A437216_1_En_5_Chapter.html#Par42)
    used to render the product details and description. It’s really just a matter
    of outputting the appropriate Liquid variable (`product.title`, `product.min_price`)
    in a HTML element like an `<h1>` that gives the appropriate information hierarchy.


    I’ve used a couple of Liquid filters to output this information. I use the `|
    escape` filter when outputting the title and vendor. This is a good practice to
    follow when outputting any user-generated text content, to avoid any potential
    formatting or output issues (for example, if your product title contains a HTML
    character like `<`, the escape filter will ensure it’s rendered as text and not
    as HTML). I’m also using the `| money` filter to display the price of the product
    (stored by Shopify as cents, e.g. `18800`) in a format determined by the store’s
    currency and preferences.


    The `product.description` is output directly. It can contain HTML (to allow for
    things like anchor links inside the description content), so we don’t use the
    `| escape` filter on it. If you want to guarantee that the description doesn’t
    render anything funky that could break your page layout, you can force it to text
    only using the `| strip_html` filter.


    You may have noticed the example uses some Liquid logic when displaying the price
    of the product. This is done because it’s possible for different product variants
    (combinations of colors and sizes, for example) to have different prices. We should
    check if that’s the case for this product (`{% if product.price_varies %}`) to
    decide whether to display a single price (`product.price`) or the price range
    (`product.price_min` to `product.price_max`). Later in this chapter, you’ll see
    how you can tweak this approach to dynamically update the `price` element to display
    only the price of the currently selected variant.


    **Tip**


    Use real product descriptions rather than dummy or placeholder (lorem ipsum) text
    when designing your product pages. You’ll get a much better sense of how the product
    will look and flow and avoid surprises down the road.


    Another thing to avoid is copying and pasting product descriptions from manufacturer
    or competitor sites. Not only are there potentially negative SEO consequences
    for duplicating content in this way, you miss the opportunity to insert your brand’s
    unique voice into the description and persuade customers.'
