    pow() function is used to calculate the values of a raised to the power of x.
    The natural exponential function is defined by the natural number e and PHP has
    a special function to calculate e to the power of x called exp() . This function
    only takes one argument as the base value is given as e.


    CHAPTER 3 ■ PERFORMING MATH OPERATIONS


    How it Works


    Suppose you want to calculate the compounded interest of a loan of $1000 with
    an interest of 5 percent per year with the interest added 1, 2, 4, or 12 times
    a year:


    <?php


    // 3_22.php


    $principal = 1000;


    $interest = 0.05;


    $periods = array(1, 2, 4, 12);


    foreach ($periods as $p) {


    $ci = $principal * pow(1 + $interest / $p, $p);


    echo "Periods: $p, future value = $ci\n";


    }


    The results shown below indicate that even if the annual interest rate is 5 percent
    the future value after one year depends on how many times the interest is added.


    Periods: 1, future value = 1050


    Periods: 2, future value = 1050.625


    Periods: 4, future value = 1050.9453369141


    Periods: 12, future value = 1051.1618978817


    Using the same formula and compounding more and more often we can calculate the
    value for the continuous compounding or e.


    <?php


    // 3_23.php


    $interest = 1;


    $periods = array(1, 2, 4, 12, 52, 365, 8670, 525600, 31536000);


    foreach ($periods as $p) {


    $ci = pow(1 + $interest / $p, $p);


    echo "Periods: $p, future value = $ci\n";


    }


    The more often the interest is coumputed the closer the resulting value gets to
    the natural number (e).


    Periods: 1, future value = 2


    Periods: 2, future value = 2.25


    Periods: 4, future value = 2.44140625


    Periods: 12, future value = 2.6130352902247


    Periods: 52, future value = 2.6925969544372


    Periods: 365, future value = 2.714567482022


    Periods: 8670, future value = 2.7181250813746


    Periods: 525600, future value = 2.7182792426664


    Periods: 31536000, future value = 2.718281778469


    This example shows what happens when the compounding rate is increased every second.
    If the number of compoundings are increased even further the result will just
    get closer to the natural exponential e.


    CHAPTER 3 ■ PERFORMING MATH OPERATIONS


    Recipe 3-11\. Using Trigonometry to Calculate Distance and


    Direction


    Problem


    You are creating a web site that provides a list of hotels in the country and
    you want to provide a service to allow the user find the hotel that’s nearest
    to a given location.


    Solution


    Trigonometric functions relate an angle of a triangle with the lengths of its
    sides and are often used to model periodic phenomena and calculate distance and
    direction between points on a sphere, but they also have many other usages.


    There are six basic trigonometric functions that relate to the six possible ratios
    in a right angle triangle.


    All the trigonometric functions in PHP operate on angles measured in radians instead
    of degrees. In order to convert between radians and degrees PHP provides deg2rad()
    and rad2deg() functions.


    You can use Google Maps APIs to find the exact location of each hotel on the list
    or you can make an approximation by using the zip code and perform a database
    lookup to convert the zip codes to longitude and latitude.


    When you know the coordinates for both locations you can use trigonometric functions
    to calculate the distance, with the assumption that the earth is almost spherical.


    How it Works


    The radius of the earth is approximately 6271 km or 3959 miles. These numbers
    are defined as constants to allow the user to select which unit to use. All the
    trigonometric functions work on circles defined with a radius of 1 unit. This
    makes it easy to scale to any sphere.


    Longitude and latitude are provided as floating point numbers in degrees so the
    Pos2Distance() function starts by converting all these to radians used by the
    trigonometric functions in PHP.


    <?php


    // 3_24.php


    define(''RADIUS_KM'', 6371);


    define(''RADIUS_MILES'', 3959);


    function Pos2Distance($pos1, $pos2, $unit = RADIUS_KM, $precision = 0) {


    $lon1 = deg2rad($pos1[''lon'']);


    $lat1 = deg2rad($pos1[''lat'']);'
