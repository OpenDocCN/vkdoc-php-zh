    \ 循环提供了一种遍历数组的简便方法。在每次迭代中，数组中的下一个元素被赋值给指定的变量（迭代器），并且循环会持续执行，直到遍历完整个数组。\n\n```\n\
    $a = array (1,2,3);\n\nforeach ($a as $v) {\n  echo $v; // \"123\"\n}\n```\n\n\
    `foreach` 循环有一个扩展用法，通过添加一个键变量，后跟双箭头运算符（`=>`），再放到迭代器前面，来同时获取键名或索引。\n\n```\n$a =\
    \ array ('one' => 1, 'two' => 2, 'three' => 3);\n\nforeach ($a as $k => $v) {\n\
    \  echo \"$k => $v <br>\";\n}\n```\n\n### 替代语法\n\n与条件语句一样，循环中的花括号可以重写为替代语法，使用冒号和\
