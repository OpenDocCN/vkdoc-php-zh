  trans: "\n若两个表中的列名不同，请使用 `ON`，如下所示：\n\n```\nFROM table_1 LEFT JOIN table_2 ON table_1.col_name\
    \ = table_2.col_name\n```\n\n现在，你可以像这样重写 `details.php` 中的 SQL 查询：\n\n```\n$sql\
    \ = \"SELECT title, article, DATE_FORMAT(updated, '%W, %M %D, %Y') AS updated,\n\
    filename, caption\nFROM blog LEFT JOIN images USING (image_id)\nWHERE blog.article_id\
    \ = $article_id\";\n```\n\n如果你点击「**More**」链接查看没有关联图片的文章，现在应该可以看到文章正常显示，如图 17-11\
    \ 所示。其他文章也应能正常显示。完成的代码位于 `details_mysqli_02.php` 和 `details_pdo_02.php` 中。\n\n\
    ![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig11_HTML.jpg](img/332054_4_En_17_Fig11_HTML.jpg)\n\
    \n图 17-11. `LEFT JOIN` 也能检索没有匹配外键的文章\n\n## 创建智能链接\n\n`details.php` 底部的链接直接返回到\
    \ `blog.php`。当 `blog` 表中只有四条记录时这没问题，但一旦数据库中开始有更多记录，你就需要构建一个导航系统，正如我在第 14 章中展示的那样。导航系统的问题在于，你需要一种方法将访问者返回到他们之前所在的同一结果集位置。\n\
    \n### PHP 解决方案 17-5：返回到导航系统中的同一位置\n\n此 PHP 解决方案检查访问者来自内部链接还是外部链接。如果来源页面在同一网站内，则链接会将访问者返回到同一位置。如果来源页面是外部网站，或者服务器不支持必要的超全局变量，则脚本会替换为一个标准链接。此方案在\
    \ `details.php` 的上下文中展示，但可用于任何页面。\n\n该代码不依赖于数据库，因此对 MySQLi 和 PDO 来说都是相同的。\n\n\
    1.  找到 `details.php` 主体部分中的返回链接，它看起来像这样：\n\n    ```\n    <a href=\"blog.php\"\
    >回到博客</a>\n    ```\n\n2.  将光标紧贴在第一个引号的右侧，并插入以下用粗体突出显示的代码：\n\n    ```\n    <a href=\"\
    <?php\n    if (isset($_SERVER['HTTP_REFERER']) && isset($_SERVER['HTTP_HOST']))\
    \ {\n        $url = parse_url($_SERVER['HTTP_REFERER']);\n        if ($url['host']\
    \ == $_SERVER['HTTP_HOST']) {\n            echo $_SERVER['HTTP_REFERER'];\n  \
    \      } else {\n            echo 'blog.php';\n        }\n    } else {\n     \
    \   echo 'blog.php';\n    }\n    ?>\">回到博客</a>\n    ```\n\n`$_SERVER['HTTP_REFERER']`\
    \ 和 `$_SERVER['HTTP_HOST']` 是超全局变量，分别包含来源页面的 URL 和当前主机名。你需要使用 `isset()` 检查它们是否存在，因为并非所有服务器都支持它们。此外，浏览器可能会屏蔽来源页面的\
    \ URL。\n\n`parse_url()` 函数会创建一个数组，其中包含 URL 的每一部分，因此 `$url['host']` 包含主机名。如果它与\
    \ `$_SERVER['HTTP_HOST']` 匹配，说明访问者来自内部链接，因此内部链接的完整 URL 会被插入到 `href` 属性中。这包括任何查询字符串，因此该链接会将访问者送回导航系统中的同一位置。否则，会创建一个指向目标页面的普通链接。\n\
    \n完成的代码位于 `ch17` 文件夹中的 `details_mysqli_03.php` 和 `details_pdo_3.php`。\n\n## 章节回顾\n\
    \n使用 `INNER JOIN` 和 `LEFT JOIN` 从多个表中检索信息相对简单。成功处理多个表的关键在于构建它们之间的关系，使得复杂关系始终可以解析为\
    \ `1:1`，必要时可以通过交叉引用（或链接）表来实现。下一章将继续探索多表操作，展示在插入、更新和删除记录时如何处理外键关系。\n\n## 18. 管理多个数据库表\n\
    \n前一章向你展示了如何使用 `INNER JOIN` 和 `LEFT JOIN` 检索存储在多个表中的信息。你还学习了如何通过向子表添加额外列并逐个更新每条记录来插入外键，从而链接现有表。然而，大多数情况下，你需要同时在两个表中插入数据。这带来一个挑战，因为\
    \ `INSERT` 命令一次只能操作一个表。你需要按正确的顺序处理插入操作，从父表开始，以便能够获取新记录的主键，并同时将其与其他详细信息一起插入子表。在更新和删除记录时也需要考虑类似的问题。涉及的代码并不复杂，但在编写脚本时，你需要清晰地记住事件的顺序。\n\
    \n本章将指导你完成在 `blog` 表中插入新文章的过程，可选地选择一张相关图片或上传一张新图片，并将文章分配到一个或多个类别，所有这些都在一个操作中完成。然后，你将构建脚本来更新和删除文章，同时不破坏相关表的参照完整性。\n\
    \n你还将学习使用事务批量处理多个查询，如果批次中的任何部分失败，则将数据库回滚到其原始状态，以及外键约束，它控制当你尝试删除另一个表中仍然存在外键关系的记录时会发生什么。并非所有数据库都支持事务和外键约束，因此检查你的远程服务器是否支持非常重要。本章还解释了如果你的服务器不支持外键约束，你可以采取哪些措施来维护数据的完整性。\n\
    \n具体来说，你将学习以下内容：\n\n-   在相关表中插入、更新和删除记录\n-   在记录创建后立即查找其主键\n-   将多个查询作为单个批次处理，并在任何部分失败时回滚\n\
    -   转换表的存储引擎\n-   在 InnoDB 表之间建立外键约束\n\n### 维护参照完整性\n\n对于单个表，无论你更新一条记录多少次或删除多少条记录，对其他记录的影响为零。一旦你将一条记录的主键作为外键存储在另一个表中，你就创建了一个需要管理的依赖关系。例如，图\
    \ 18-1 展示了 `blog` 表中的第二篇文章（“见习艺伎去购物”）通过 `article2cat` 交叉引用表链接到了「**Kyoto**」和「**People**」类别。\n\
    \n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig1_HTML.jpg](img/332054_4_En_18_Fig1_HTML.jpg)\n\
    \n图 18-1. 你需要管理外键关系以避免孤立记录\n\n如果你删除了这篇文章，但未删除交叉引用表中 `article_id 2` 的条目，那么查找「**Kyoto**」或「**People**」类别中所有文章的查询将尝试匹配\
    \ `blog` 表中不存在的记录。同样，如果你决定删除某个类别，但未删除交叉引用表中匹配的记录，那么查找与某篇文章关联的类别的查询将尝试匹配一个不存在的类别。\n\
    \n用不了多久，你的数据库中就会充斥着孤立记录。幸运的是，维护参照完整性并不困难。SQL 通过建立称为外键约束的规则来实现这一点，这些规则告诉数据库，当你更新或删除一条在另一张表中有依赖记录的记录时应该怎么做。\n"
- fmt: '# Support for Transactions and Foreign-key Constraints


    Transactions and foreign-key constraints are supported by `InnoDB`, the default
    storage engine in MySQL 5.5 and later. The equivalent storage engine in MariaDB
    is `Percona XtraDB`, but it identifies itself as `InnoDB` and has the same features.
    Even if your remote server is running the latest version of MySQL or MariaDB,
    there’s no guarantee that `InnoDB` is supported, because your hosting company
    may have disabled it.


    If your server is running an older version of MySQL, the default storage engine
    is `MyISAM`, which doesn’t support transactions or foreign-key constraints. However,
    you might still have access to `InnoDB`, because it has been an integral part
    of MySQL since version 4.0. Converting `MyISAM` tables to `InnoDB` is very simple
    and takes only a few seconds.


    If you don’t have access to `InnoDB`, you need to maintain referential integrity
    by building the necessary rules into your PHP scripts. This chapter shows both
    approaches.


    > **Note**: `MyISAM` tables have the advantage of being very fast. They require
    less disk space and are ideal for storing large amounts of data that isn’t changed
    very often. However, the `MyISAM` engine is no longer being actively developed,
    so it’s not recommended to use it for new projects.


    ## PHP Solution 18-1: Checking Whether InnoDB is Supported


    This PHP solution explains how to check whether your remote server supports the
    `InnoDB` storage engine.


    1. If your hosting company provides phpMyAdmin to administer your database(s),
    launch phpMyAdmin on your remote server and click the `Engines` tab at the top
    of the screen, if it’s available. This displays a list of storage engines similar
    to Figure 18-2.


    ![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig2_HTML.jpg](images/332054_4_En_18_Chapter/332054_4_En_18_Fig2_HTML.jpg)


    **Figure 18-2.** Checking storage engine support through phpMyAdmin


    > **Note**: Notice that the description for `InnoDB` in Figure 18-2 refers to
    `Percona XtraDB`. The screenshot was taken on a MariaDB server. You are likely
    to see a different selection of storage engines on a MySQL server, but both MySQL
    and MariaDB should normally offer at least `InnoDB` and `MyISAM`. The `Aria` storage
    engine is MariaDB’s improved version of `MyISAM`. It’s not covered in this book
    because it’s not available on MySQL, nor does it support transactions or foreign-key
    constraints.


    2. The list displays all storage engines, including those that are not supported.
    Unsupported or disabled storage engines are grayed out. If you’re not sure of
    the status of `InnoDB`, click its name in the list.


    3. If `InnoDB` is not supported, you’ll see a message telling you so. If, on the
    other hand, you see a list of variables similar to Figure 18-3, you’re in luck—`InnoDB`
    is supported.


    ![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig3_HTML.jpg](images/332054_4_En_18_Chapter/332054_4_En_18_Fig3_HTML.jpg)


    **Figure 18-3.** Confirmation that `InnoDB` is supported


    4. If there’s no `Engines` tab in phpMyAdmin, select any table in your database
    and click the `Operations` tab at the top right of the screen. In the `Table options`
    section, click the down arrow to the right of the `Storage Engine` field to display
    the available options (see Figure 18-4). If `InnoDB` is listed, it’s supported.


    ![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig4_HTML.jpg](images/332054_4_En_18_Chapter/332054_4_En_18_Fig4_HTML.jpg)


    **Figure 18-4.** The available storage engines are listed in the Table options


    5. If neither of the preceding methods gives you the answer, open `storage_engines.php`
    in the `ch18` folder. Edit the first three lines to insert the hostname, username,
    and password for the database on your remote server.


    6. Upload `storage_engines.php` to your web site and load the page into a browser.
    You should see a list of storage engines and level of support, as shown in Figure
    18-5. In some cases, `NO` will be replaced by `DISABLED`.


    ![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig5_HTML.jpg](images/332054_4_En_18_Chapter/332054_4_En_18_Fig5_HTML.jpg)


    **Figure 18-5.** The SQL query in `storage_engines.php` reports which ones are
    supported


    As Figure 18-5 shows, a typical installation supports several storage engines.
    What may come as a surprise is that you can use different storage engines within
    the same database. In fact, it’s recommended that you do. Even if your remote
    server supports `InnoDB`, it’s usually more efficient to use `MyISAM` or `Aria`
    for tables that don’t require transactions or have a foreign-key relationship.
    Use `InnoDB` for tables that require transactions or have foreign-key relationships.


    I’ll explain how to convert tables to `InnoDB` later in this chapter. Before that,
    let’s look at how to establish and use foreign-key relationships regardless of
    the storage engine being used.


    ## Inserting Records into Multiple Tables


    An `INSERT` query can insert data into only one table. Consequently, when working
    with multiple tables, you need to plan your insert scripts carefully to ensure
    that all the information is stored and that the correct foreign-key relationships
    are established.


    PHP Solutions 17-2 (MySQLi) and 17-3 (PDO) in the previous chapter showed how
    to add the correct foreign key for an image that is already registered in the
    database. However, when inserting a new blog entry, you need to be able to select
    an existing image, upload a new image, or choose to have no image at all. This
    means that your processing script needs to check whether an image has been selected
    or uploaded and execute the relevant commands accordingly. In addition, tagging
    a blog entry with zero or more categories increases the number of decisions the
    script needs to make. Figure 18-6 shows the decision chain.


    ![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig6_HTML.png](images/332054_4_En_18_Chapter/332054_4_En_18_Fig6_HTML.png)


    **Figure 18-6.** The decision chain for inserting a new blog article with an image
    and categories


    When the page first loads, the form hasn’t been submitted, so the page simply
    displays the insert form. Both the existing images and categories are listed in
    the insert form by querying the database in the same way as was done for the images
    in the update form in PHP Solutions 17-2 and 17-3.


    After the form has been submitted, the processing script goes through the following
    steps:


    1. If an image has been uploaded, the upload is processed, the details of the
    image are stored in the `images` table, and the script gets the primary key of
    the new record.

    2. If no image has been uploaded, but an existing image has been selected, the
    script gets its foreign key from the value submitted through the `$_POST` array.

    3. In either case, the new blog article is inserted in the `blog` table along
    with the image’s primary key as a foreign key. However, if an image has neither
    been uploaded nor selected from the existing ones, the article is inserted in
    the `blog` table without a foreign key.

    4. Finally, the script checks whether any categories have been selected. If they
    have, the script gets the new article’s primary key and combines it with the primary
    keys of the selected categories in the `article2cat` table.


    If there’s a problem at any stage, the script needs to abandon the rest of the
    process and redisplay the user’s input. The script is quite long, so I’ll break
    it up into several sections. The first stage is to create the `article2cat` cross-reference
    table.


    ## Creating a Cross-reference Table'
