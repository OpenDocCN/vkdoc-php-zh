    \ also discusses the main data types used in programs and the basic operations\
    \ performed with variables.\n\n## Introduction to Variables\n\nIn its “classical”\
    \ sense, a variable is a named block of memory that can be accessed through the\
    \ name to read a value from memory or write a new value there. In PHP, creating\
    \ variables is quite simple: you just need to assign a value to the variable.\
    \ In other words, the variable appears in a program when a value is assigned to\
    \ it.\n\nThere is a rule in PHP: the name of a variable begins with the `$` symbol\
    \ (this symbol is part of the variable name). To assign a value to a variable,\
    \ you specify the variable’s name, then put the assignment operator (equal sign\
    \ `=`) and the value to be assigned to it. For example, the `$number=123` command\
    \ assigns the integer `123` to the `$number` variable, and the `$text=\"Hello,\
    \ PHP\"` command assigns the text value `\"Hello, PHP\"` to the `$text` variable.\n\
    \n![](images/613529_1_En_2_Chapter/613529_1_En_2_Figa_HTML.jpg)An information\
    \ icon.Note\n\nIn PHP, there is no such thing as a variable type. Variables do\
    \ not have a type. But the value that the variable refers to has a type. At different\
    \ stages of program execution, the same variable can refer to values of different\
    \ types.\n\nFirst, let’s look at Listing [2-1](#613529_1_En_2_Chapter.xhtml#PC1),\
    \ a small example that uses a variable.\n\n```\nListing 2-1\nCreating a Variable\n\
    ```\n\nThe result of the program execution is as follows.\n\n```\nThe output of\
    \ the program (from Listing 2-1)\nThe variable $number: the value is 123\n```\n\
    \nIn the program, you also meet three types of comments allowed in PHP.\n\n![](images/613529_1_En_2_Chapter/613529_1_En_2_Figb_HTML.jpg)An\
    \ information icon.Note\n\nA comment is a text in a program destined for the programmer\
    \ and ignored when the program is executed. In other words, comments explain the\
    \ purpose of commands but do not affect the program execution.\n\nThere are single-line\
    \ comments. A single-line comment begins with the double slash `//` or the `#`\
    \ character. Anything to the right of the `//` or `#` characters is a comment.\
    \ In addition to single-line comments, there are multi-line comments. Such comments\
    \ can span multiple lines. A multi-line comment begins with `/*` and ends with\
    \ `*/`. Everything between these characters is a comment. The program used all\
    \ three types of comments, although there was no need for that.\n\nIn addition\
    \ to comments, the program contains several noteworthy commands. The first is\
    \ the `$number=123` instruction, which creates the `$number` variable with the\
    \ value `123`. In addition to that, there are two more commands for displaying\
    \ messages in the terminal. Although both commands use the `print()` function,\
    \ they are different.\n\n![](images/613529_1_En_2_Chapter/613529_1_En_2_Figc_HTML.jpg)An\
    \ information icon.Note\n\nThis time, you pass an argument to the `print()` function\
    \ without parentheses.\n\nThe difference between the commands is as follows. In\
    \ the first case, the text to be displayed is enclosed in single quotes. In the\
    \ second case, the text is in double quotes. In principle, in both cases, you\
    \ get text. That means single and double quotes are two different ways to create\
    \ a text. They are almost equal. But some differences also exist. In this case,\
    \ both text values (`'The variable $number: '` and `\"the value $number\"`) contain\
    \ the name of the `$number` variable. So, if the variable’s name occurs in the\
    \ text enclosed in single quotes, then when the text is displayed in the terminal,\
    \ the variable’s name is displayed. If the variable’s name is placed in the text\
    \ enclosed in double quotes, then when displayed in the output window, its value\
    \ is substituted instead of the variable’s name. Therefore, when executing the\
    \ `print 'The variable $number: '` command, exactly the text in single quotes\
    \ is displayed. But when executing the `print \"the value $number\"` command,\
    \ then, instead of the name of the `$number` variable, its value `123` is substituted\
    \ in the text.\n\n![](images/613529_1_En_2_Chapter/613529_1_En_2_Figd_HTML.jpg)An\
    \ information icon.Note\n\nAs a result of calling the `print()` function, the\
    \ value of the argument passed to the function is displayed in the output window.\
    \ But there is no line break in the output area. Therefore, two messages are displayed\
    \ sequentially in the program discussed, one after the other in the same line.\n\
    \nNotably, many common tasks in PHP can be performed in different ways. The examples\
    \ are several types of comments, several ways to create text literals, several\
    \ instructions for displaying messages, and the list is not complete. The situation\
    \ is typical for PHP. In this sense, the language is very convenient and “comfortable”\
    \ if such a definition is suitable for a programming language.\n\n| Details |\n\
    | --- |\n| Along with variables, you can also use constants. A constant differs\
    \ from a variable in a way that the value of the constant cannot be changed. To\
    \ create a constant, use the `define()` function, the first argument of which\
