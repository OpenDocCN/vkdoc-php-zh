    C H A P T E R 1 3 ■ P L U G I N S


    **231**


    $out .= ''<td>''.$day.''<br/>'';


    $out .= $this->events($month,$day,$year,$events);


    $out .= ''</td>'';


    $day++;


    }


    }


    $out .= ''</tr>'';


    Throughout the rest of this function, the $out variable will be assigned all the
    output data to be rendered in the view. Notice that line 19 in Listing 13-13 instantiates
    this variable, and every other time $out is used, new values are appended to its
    existing contents. Line 19


    starts a new table, and line 20 uses the HTML helper to write the table’s header
    cells. Notice that these header cells contain text telling the user which column
    represents which day of the week.


    Lines 22–33 are the first iteration through week one. Notice that this iteration
    starts with a table row element (<tr>) and ends with the closing tag to finish
    the row. Line 23 starts a loop for each cell in this row, 1 representing the first
    cell, or Sun, and 7 representing the last, or Sat. Line 24 checks for where the
    first day of the month falls. If $day is less than or equal to 1 (in other words,
    if at this point in the iteration $day is set to the first date of the month)
    *and* the $firstday timestamp doesn’t equal the current day (as specified in $days_array),
    then the element will display a blank cell. Otherwise, it will create a table
    cell with the $day value displayed along with any events stored in the database
    for that day. Such a cell is created with lines 27–30\. When a day is displayed,
    the next day will become the new value for $day, so line 30 increases $day by
    1.


    Notice that line 28 uses a helper function, $calendar->events(), which has not
    yet been created. This function will cycle through the $events array, which will
    be the results from the Events controller. These results come from running a find
    request in the database for associated events and passed to the helper in line
    5 of Listing 13-12. For each event in this array that matches the current day,
    month, and year in the iteration of week one in Listing 13-13, the $calendar->events()
    function will return to be displayed in the current day’s cell. Since this operation
    of cycling through the $events array will be repeated for other weeks, it’s best
    to write it as another helper function rather than write the same operation over
    again. We’ll build the $calendar->events() function later. For now, the $out variable
    is set to pass a new table to the view with one row representing the first week
    of the month and any events found in the database for this week.


    **Rendering Weeks Two and Three**


    Like rendering the first week of the month, let’s now add weeks two and three
    to the helper with Listing 13-14.


