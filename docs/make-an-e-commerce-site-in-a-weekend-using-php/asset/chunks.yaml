- fmt: '## Accessing Products and Displaying Them on Screen


    You have already learned about the functions that are used to establish a connection
    with the MySQL server and to open the database to perform operations. You also
    learned about the procedure to execute a SQL query on a specified database. The
    `allitemslist.php` script, shown in Listing [3-1](#A978-1-4842-1672-9_3_Chapter.html#FPar1),
    uses those functions to access product information from the `products` table and
    display them on the screen in a tabular format.


    **Listing 3-1.** The `allitemslist.php` script for Displaying Items in the `products`
    Table


    ```

    <html>

    <head>

    </head>

    <body>

    <?php

    $connect = mysqli_connect("localhost", "root", "gold", "shopping") or die("Please,
    check your server connection.");

    $query = "SELECT item_code, item_name, description, imagename, price FROM products";

    $results = mysqli_query($connect, $query) or die(mysql_error());

    echo "<table border=\"0\">";

    $x=1;

    echo "<tr>";

    while ($row = mysqli_fetch_array($results, MYSQLI_ASSOC))  {

    if ($x <= 3)

    {

    $x = $x + 1;

    extract($row);

    echo "<td style=\"padding-right:15px;\">";

    echo "<a href=itemdetails.php?itemcode=$item_code>";

    echo ''<img src='' . $imagename . '' style="max-width:220px;max-height:240px;width:auto;height:auto;"></img><br/>'';

    echo $item_name .''<br/>'';

    echo "</a>";

    echo ''$''.$price .''<br/>'';

    echo "</td>";

    }

    else

    {

    $x=1;

    echo "</tr><tr>";

    }

    }

    echo "</table>";

    ?>

    </body>

    </html>

    ```


    This code first connects to the MySQL server as a user root and selects the `shopping`
    database. Then, a SQL statement is written to retrieve all the rows from the `products`
    table. The SQL query is executed and the rows are fetched from the `products`
    table and then assigned to the `$results` array. After that, with the help of
    the `while` loop, one row at a time is fetched from the `$results` array and the
    product information is displayed on the screen in the form of a table (see Figure
    [3-1](#A978-1-4842-1672-9_3_Chapter.html#Fig1)). Variable `x` is used to display
    three products in a row.


    ![A978-1-4842-1672-9_3_Fig1_HTML.jpg](A978-1-4842-1672-9_3_Fig1_HTML.jpg)


    **Figure 3-1.** All items in the `products` table displayed along with their images


    To link to different web pages and enable users to access the required information
    from the site, you need to create a drop-down menu. Let''s see how that is done.


    ## Creating a Drop-Down Menu


    Assuming that your site sells electronics, home and furniture products, and books,
    the drop-down menu needs to provide links to these product sections. Also, assuming
    that the site sells smart phones, laptops, cameras, and televisions, these product
    categories must be grouped under the Electronics section. The `menu.php` file,
    shown in Listing [3-2](#A978-1-4842-1672-9_3_Chapter.html#FPar2), defines a drop-down
    menu that provides links to these product categories.


    **Listing 3-2.** The `menu.php` script for displaying a drop-down menu for the
    e-commerce site


    ```

    <!DOCTYPE html>

    <head>

    <meta charset="utf-8">

    <title>Bintu Online Bazar</title>

    <link rel="stylesheet" href="css/style.css">

    </head>

    <body>

    <div class="container">

    <nav>

    <ul class="nav">

    <li><a href="index.php">Home</a></li>

    <li class="dropdown">

    <a href="index.php">Electronics</a>

    <ul>

    <li><a href="itemlist.php?category=CellPhone">Smart Phones</a></li>

    <li><a href="itemlist.php?category=Laptop">Laptops</a></li>

    <li><a href="index.php">Cameras </a></li>

    <li><a href="index.php">Televisions</a></li>

    </ul>

    </li>

    <li class="dropdown">

    <a href="index.php">Home & Furniture</a>

    <ul class="large">

    <li><a href="index.php">Kitchen Essentials</a></li>

    <li><a href="index.php">Bath Essentials</a></li>

    <li><a href="index.php">Furniture</a></li>

    <li><a href="index.php">Dining & Serving</a></li>

    <li><a href="index.php">Cookware</a></li>

    </ul>

    </li>

    <li><a href="index.php">Books</a></li>

    </ul>

    </nav>

    </div>

    <p>

    ```


    You can see in this code that the drop-down menu is made using the unordered list
    element. The menu contains four main sections called Home, Electronics, Home &
    Furniture, and Books. The Electronics menu has four submenu options—Smart Phones,
    Laptops, Cameras, and Televisions. Similarly, the Home & Furniture menu shows
    different submenu options. When a product category is chosen via any submenu option,
    the users will be navigated to the PHP script called `itemlist.php`. The product
    category they chose is also sent to the `itemlist.php` script, which in turn fetches
    all the products in that category from the database table and displays them on
    the screen.


    To apply foreground and background colors to the drop-down menu and to the menu
    option when a mouse pointer hovers over it, the script uses a cascading style
    sheet called `style.css`. It is linked to the script. Next is a quick introduction
    to CSS.


    ### CSS


    CSS stands for Cascading Style Sheets, which contain different styles, layouts,
    fonts, and colors for a web site. The advantages of using style sheets are:


    - Because all the styles are kept in one place, it is easy to maintain them. To
    change the style of an element, you don''t have to search the entire site. You
    simply edit it in one place.

    - You can change the layout and design of the site very easily.

    - Applying styles through CSS makes the code efficient and reduces the website
    loading time.


    Back to the web site, Listing [3-3](#A978-1-4842-1672-9_3_Chapter.html#FPar4)
