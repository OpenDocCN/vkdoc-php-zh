  trans: "\n# 使用展开运算符从数组中解包参数\n\n第 4 章简要介绍的展开运算符（`...`）有两个作用，即：\n\n- 在函数定义中使用时，它将多个参数转换为可在函数内部使用的数组。\n\
    - 在调用函数时，它会解包参数数组，并将其应用于函数的参数。\n\n第 4 章的示例演示了展开运算符的第一种用法。以下函数定义允许向函数传递任意数量的参数，并在函数内部将其作为数组处理：\n\
    \n```\nfunction addEm(...$nums) {\n    return array_sum($nums);\n}\n```\n\n展开运算符的第二种用法则相反。它不是将任意数量的参数转换为数组，而是将数组的元素视为单独传递给函数。以下\
    \ PHP 解决方案展示了一个简单示例，说明这如何具有实际价值。\n\n## PHP 解决方案 8-11：使用展开运算符处理 CSV 文件\n\n`fgetcsv()`\
    \ 函数将 CSV 文件中的数据作为索引数组返回。此 PHP 解决方案展示了如何使用展开运算符将数组直接传递给需要多个参数的函数，而无需分离各个元素。它还使用了上一\
    \ PHP 解决方案中描述的 `csv_processor()` 生成器。\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig14_HTML.jpg](img/332054_4_En_8_Fig14_HTML.jpg)\n\
    \n**图 8-14.** 每个数据数组都通过展开运算符直接传递给函数进行处理\n\n1.  在 `ch08` 文件夹中创建一个名为 `csv_splat.php`\
    \ 的文件，并包含 `csv_processor.php`：\n\n    ```\n    require_once './csv_processor.php';\n\
    \    ```\n\n2.  在 `ch08/data` 文件夹中，`weather.csv` 包含以下数据：\n\n    ```\n    City,temp\n\
    \    London,11\n    Paris,10\n    Rome,12\n    Berlin,8\n    Athens,19\n    ```\n\
    \n    温度以摄氏度为单位。为了那些认为水在 32° 而非 0° 结冰的人着想，我们需要以用户友好的方式处理这些数据。\n\n3.  在 `csv_splat.php`\
    \ 中，添加以下函数定义（代码位于 `csv_splat_01.php`）：\n\n    ```\n    function display_temp($city,\
    \ $temp) {\n        $tempF = round($temp/5*9+32);\n        return \"$city: $temp&deg;C\
    \ ($tempF&deg;F)\";\n    }\n    ```\n\n    该函数接受两个参数：城市名称和温度。温度使用标准公式（除以 5，乘以\
    \ 9，再加 32）转换为华氏度，并四舍五入到最接近的整数。\n\n    然后，函数返回一个字符串，包含城市名称和以摄氏度表示的温度，后跟括号中的华氏等效温度。\n\
    \n4.  包含数据的 CSV 文件以一行列标题开头，因此我们需要使用与上一个解决方案相同的技术跳过第一行。将数据加载到 `csv_processor()`\
    \ 生成器中，并按如下方式跳过第一行：\n\n    ```\n    $cities = csv_processor('./data/weather.csv');\n\
    \    $cities->next();\n    ```\n\n5.  使用 `while` 循环和 `display_temp()` 函数以及展开运算符处理剩余的数据行，如下所示：\n\
    \n    ```\n    while ($cities->valid()) {\n        echo display_temp(...$cities->current())\
    \ . '';\n        $cities->next();\n    }\n    ```\n\n    与上一个解决方案一样，生成器的 `current()`\
    \ 方法将当前数据行作为数组返回。但这次，不是将每个数组元素赋给变量，而是展开运算符解包数组，并按数组中的相同顺序将值作为参数进行赋值。\n\n    如果你觉得这段代码难以理解，可以先将\
    \ `current()` 方法的返回值赋给一个变量，如下所示：\n\n    ```\n    $data = $cities->current();\n\
    \    echo display_temp(...$data) . '';\n    ```\n\n    在传递给函数的数组参数前加上展开运算符效果与以下代码完全相同（代码位于\
    \ `csv_splat_02.php`）：\n\n    ```\n    [$city, $temp] = $cities->current();\n\
    \    echo display_temp($city, $temp) . '';\n    ```\n\n    图 8-14 显示了使用这两种技术的结果。\n\
    \n使用展开运算符解包参数数组具有简洁的优点，但较短的代码并不总是可读性最好的，当结果不符合预期时可能会增加调试难度。就个人而言，我认为将数组元素赋给变量，然后显式地将它们作为参数传递是一种更安全的方法。但即使你不使用某种特定技术，理解其工作原理仍然很有用，以防你需要处理他人的代码。\n\
    \n## 章节回顾\n\n处理数组是 PHP 中最常见的任务之一，尤其是在处理数据库时。几乎所有数据库查询的结果都以关联数组的形式返回，因此理解如何处理它们非常重要。在本章中，我们研究了修改数组、合并数组、排序和提取数据。在循环中使用数组时需记住的要点是，PHP\
    \ 始终处理数组的副本，除非你通过引用将值传递到循环中。相比之下，排序函数则作用于原始数组。\n\n你可以在 PHP 在线文档 [`www.php.net/manual/en/ref.array.php`](http://www.php.net/manual/en/ref.array.php)\
    \ 中找到所有数组相关函数的完整详细信息。本章展示了大约一半函数的实际示例，帮助你稳扎稳打，成为 PHP 数组处理方面的专家。\n\n# 9. 上传文件\n\
    \nPHP 处理表单的能力不仅限于文本。它还可用于将文件上传到服务器。例如，你可以构建一个房地产网站，让客户上传其房产图片，或者为所有亲朋好友搭建一个上传假日照片的网站。然而，能做某事并不意味着你应该去做。允许他人向你的网站上传内容可能会让你面临各种问题。你需要确保图片尺寸合适、质量过关，并且不包含任何非法内容。你还必须确保上传的文件不包含恶意脚本。换句话说，你需要像保护自己的计算机一样小心地保护你的网站。\n\
    \nPHP 使得限制接受文件的类型和大小相对简单。但它无法检查内容的适用性。请仔细考虑安全措施，例如通过将上传表单放在受密码保护的区域中，将上传限制为已注册和受信任的用户。\n\
    \n在学会如何通过第 11 章和第 19 章的 PHP 限制页面访问之前，如果在公共网站上部署，请仅在受密码保护的目录中使用本章的 PHP 解决方案。大多数托管公司通过网站的控制面板提供简单的密码保护。\n\
    \n本章第一部分致力于理解文件上传的机制，这将有助于理解后面的代码。这是一个相当深入的章节，而不是快速解决方案的集合。但是到本章结束时，你将构建一个能够处理单文件和多文件上传的\
    \ PHP 类。然后，你只需编写几行代码，就可以在任何表单中使用该类。\n\n你将学习以下内容：\n\n- 理解 `$_FILES` 数组\n- 限制上传文件的大小和类型\n\
    - 防止文件被覆盖\n- 处理多文件上传\n"
- fmt: "# How PHP Handles File Uploads\n\nThe term upload means moving a file from\
    \ one computer to another, but as far as PHP is concerned, all that’s happening\
    \ is that a file is being moved from one location to another. This means you can\
    \ test all the scripts in this chapter on your local computer without the need\
    \ to upload files to a remote server.\n\nPHP supports file uploads by default,\
    \ but hosting companies can restrict the size of uploads or disable them altogether.\
    \ Before proceeding, it’s a good idea to check the settings on your remote server.\n\
    \n## Checking whether your Server Supports Uploads\n\nAll the information you\
    \ need is displayed in the main PHP configuration page that you can display by\
    \ running `phpinfo()` on your remote server, as described in Chapter [2](#332054_4_En_2_Chapter.xhtml).\
    \ Scroll down until you find `file_uploads` in the Core section.\n\nIf the Local\
    \ Value is `On`, you’re ready to go, but you should also check the other configuration\
    \ settings listed in Table [9-1](#332054_4_En_9_Chapter.xhtml#Tab1).\n\n**Table\
    \ 9-1.** PHP configuration settings that affect file uploads\n\n| Directive |\
    \ Default value | Description |\n| --- | --- | --- |\n| `max_execution_time` |\
    \ 30 | The maximum number of seconds that a PHP script can run. If the script\
    \ takes longer, PHP generates a fatal error. |\n| `max_file_uploads` | 20 | The\
    \ maximum number of files that can be uploaded simultaneously. Excess files are\
    \ silently ignored. |\n| `max_input_time` | 60 | The maximum number of seconds\
    \ that a PHP script is allowed to parse the `$_POST` and `$_GET` arrays and file\
    \ uploads. Very large uploads are likely to run out of time. |\n| `post_max_size`\
    \ | 8M | The maximum permitted size of all `$_POST` data, *including* file uploads.\
    \ Although the default is 8M (8 megabytes), hosting companies may impose a smaller\
    \ limit. |\n| `upload_tmp_dir` |  | This is where PHP stores uploaded files until\
    \ your script moves them to a permanent location. If no value is defined in `php.ini`,\
    \ PHP uses the system default temporary directory (`C:\\Windows\\Temp` or `/tmp`\
    \ on Mac/Linux). |\n| `upload_max_filesize` | 2M | The maximum permitted size\
    \ of a single upload file. The default is 2M (megabytes), but hosting companies\
    \ may impose a smaller limit. An integer indicates the number of bytes. K means\
    \ kilobytes, M stands for megabytes, and G for gigabytes. |\n\nPHP 7 can handle\
    \ uploads of individual files larger than 2 gigabytes, but the actual limits are\
    \ determined by the settings in Table [9-1](#332054_4_En_9_Chapter.xhtml#Tab1).\
    \ The default 8 MB value of `post_max_size` includes the content of the `$_POST`\
    \ array, so the total size of files that can be uploaded simultaneously on a typical\
    \ server is less than 8 MB, with no single file greater than 2 MB. The server\
    \ administrator can change these defaults, so it’s important to check the limits\
    \ set by your hosting company. If you exceed those limits, an otherwise perfect\
    \ script will fail.\n\nIf the Local Value of `file_uploads` is `Off`, uploads\
    \ have been disabled. There is nothing you can do about it, other than ask your\
    \ hosting company if it offers a package with file uploading enabled. Your only\
    \ alternatives are to move to a different host or to use a different solution,\
    \ such as uploading files by FTP.\n\n**Tip**  \nAfter using `phpinfo()` to check\
    \ your remote server’s settings, remove the script or put it in a password-protected\
    \ directory.\n\n## Adding a File Upload Field to a Form\n\nAdding a file upload\
    \ field to an HTML form is easy. Just add `enctype=\"multipart/form-data\"` to\
    \ the opening `<form>` tag and set the `type` attribute of an `<input>` element\
    \ to `file`. The following code is a simple example of an upload form (it’s in\
    \ `file_upload_01.php` in the `ch09` folder):\n\n```\n<form action=\"\" method=\"\
    post\" enctype=\"multipart/form-data\">\n  <p>\n    <input type=\"file\" name=\"\
    image\">\n  </p>\n  <p>\n    <input type=\"submit\" name=\"upload\" value=\"Upload\"\
    >\n  </p>\n</form>\n```\n\nAlthough this is standard HTML, how it’s rendered in\
    \ a web page depends on the browser (see Figure [9-1](#332054_4_En_9_Chapter.xhtml#Fig1)).\
    \ Many browsers display a Choose File or Browse button with a status message or\
    \ the name of the selected file on the right. Microsoft Edge displays a read-only\
    \ text input field with a Browse button on the right. Edge launches a file selection\
    \ panel as soon as you click inside the field. These differences don’t affect\
    \ the operation of an upload form, but you need to take them into account when\
    \ designing the layout.\n\n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig1_HTML.jpg](images/332054_4_En_9_Chapter/332054_4_En_9_Fig1_HTML.jpg)\n\
    \n**Figure 9-1.** The look of a file input field depends on the browser\n\n##\
    \ Understanding the $_FILES Array\n\nWhat confuses many people is that their file\
    \ seems to vanish after it has been uploaded. This is because you can’t refer\
    \ to an uploaded file in the `$_POST` array in the same way as with text input.\
    \ PHP transmits the details of uploaded files in a separate superglobal array\
    \ called, not unreasonably, `$_FILES`. Moreover, files are uploaded to a temporary\
    \ folder and are deleted unless you explicitly move them to the desired location.\
    \ This allows you to subject the file to security checks before accepting the\
    \ upload.\n\n### Inspecting the $_FILES Array\n\nThe best way to understand how\
    \ the `$_FILES` array works is to see it in action. You can test everything in\
    \ a local test environment on your computer. It works in the same way as uploading\
    \ a file to a remote server.\n\n1.  Create a folder called `uploads` in the `phpsols-4e`\
    \ site root. Create a file called `file_upload.php` in the `uploads` folder and\
    \ insert the code from the previous section. Alternatively, copy `file_upload_01.php`\
    \ from the `ch09` folder and rename the file `file_upload.php`.\n\n2.  Insert\
    \ the following code right after the closing `</form>` tag (it’s also in `file_upload_02.php`):\n\
    \n    ```\n    <?php\n    if (isset($_POST['upload'])) {\n        echo '<pre>';\n\
    \        print_r($_FILES);\n        echo '</pre>';\n    }\n    ?>\n    ```\n\n\
    \    This uses `isset()` to check whether the `$_POST` array contains `upload`,\
    \ the `name` attribute of the Submit button. If it does, you know the form has\
    \ been submitted, so you can use `print_r()` to inspect the `$_FILES` array. The\
    \ `<pre>` tags make the output easier to read.\n\n3.  Save `file_upload.php` and\
    \ load it into a browser.\n\n4.  Click the Browse (or Choose File) button and\
    \ select a local file. Click Open (or Choose on a Mac) to close the selection\
    \ dialog box, and then click Upload. You should see something like Figure [9-2](#332054_4_En_9_Chapter.xhtml#Fig2).\n\
    \n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig2_HTML.jpg](images/332054_4_En_9_Chapter/332054_4_En_9_Fig2_HTML.jpg)\n\
    \n**Figure 9-2.** The $_FILES array contains the details of an uploaded file\n\
    \n`$_FILES` is a multidimensional array—an array of arrays. The top level contains\
    \ a single element that gets its key (or index) from the `name` attribute of the\
    \ file input field, in this case, `image`.\n\nThe top-level `image` array contains\
    \ a subarray consisting of five elements, namely:\n\n* `name`: The original name\
    \ of the uploaded file\n* `type`: The uploaded file’s MIME type\n* `tmp_name`:\
    \ The location of the uploaded file\n* `error`: An integer indicating the status\
    \ of the upload\n* `size`: The size of the uploaded file in bytes\n\nDon’t waste\
    \ time searching for the temporary file indicated by `tmp_name`: it won’t be there.\
    \ If you don’t save it immediately, PHP discards it.\n\n**Note**  \nA MIME type\
    \ is a standard used by browsers to determine a file’s format and how to handle\
    \ it. See [`https://developer.mozilla.org/en-US/docs/Web/HTTP/Basics_of_HTTP/MIME_types`](https://developer.mozilla.org/en-US/docs/Web/HTTP/Basics_of_HTTP/MIME_types)\
    \ for more information.\n\n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig3_HTML.jpg](images/332054_4_En_9_Chapter/332054_4_En_9_Fig3_HTML.jpg)\n\
    \n**Figure 9-3.** The $_FILES array still exists when no file is uploaded"
