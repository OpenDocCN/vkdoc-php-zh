- fmt: "```markdown\n# What We’re Basically Doing\n\nWhat we’re basically doing is\
    \ installing an OS X package manager called `Homebrew`. Using `Homebrew`, we can\
    \ install a drop-in replacement for Linux’s `wget` command.\n\n> **Note:** If\
    \ you would like more information on `Homebrew`, or are having trouble installing\
    \ it, you can read more at:\n> \n> [https://github.com/mxcl/homebrew/wiki](http://www.github.com/mxcl/homebrew/wiki)\n\
    \n> **Note:** It is normal to see these warnings, and it is okay to ignore them.\n\
    \nThe next 2 listings ([A-23 and A-24](#index_split_007.html#p452)) illustrate\
    \ commands 3 through 6 in this step.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 25](index-452_1.png)\n![Image 26](index-452_2.png)\n\n## Appendix A\
    \ ■ Setting Up a Web Server\n\n**Figure A-23.** *Downloading PECL Memcached extension*\n\
    \n**Figure A-24.** *Installing/configuring Memcached extension*\n\n### Step 3\n\
    \nNext, we need to install the Memcached server that will run in OS X. Do this\
    \ by downloading:\n\n[http://topfunky.net/svn/shovel/memcached/install-memcached.sh](http://www.topfunky.net/svn/shovel/memcached/install-memcached)\n\
    \nto a local directory (such as `~/Desktop`) and executing it with the following\
    \ commands:\n\n- `chmod 744 install-memcached.sh`\n- `sudo ./install-memcached.sh`\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 27](index-453_1.png)\n\
    \n## Appendix A ■ Setting Up a Web Server\n\n> **Note:** If the script did not\
    \ execute correctly, you probably do not have Xcode tools installed. Download\
    \ them from:\n> \n> [http://developer.apple.com/technologies/tools/](http://www.developer.apple.com/technologies/tools)\n\
    \nYou can tell `Memcached` to run as a daemon by typing `memcached –d` in the\
