  trans: '

    # 数字进制转换


    将数字转换为不同进制有助于精简数字字符串的尺寸。有效进制范围是 2 到 36 之间的任意整数，这一限制由英文字母表的 26 个字符和 10 个数字共同决定。


    ## 方案 3-3：将二进制值存储在整数中


    ### 问题描述


    编程中通常使用位值来存储只有两种可能值（开/关或真/假）的标志或选项。这允许在单个整数值中存储 32 个或 64 个值。使用十进制值来检查、设置或清除这些标志位略显笨拙，因为数字（1,
    2, 4, 8, 16, 32, 64 等）既难记忆又难操作。


    ### 解决方案


    除了基本的数学运算外，PHP 还支持二进制运算。这些运算可用于改变数字中的单个位、将位左移或右移等。根据操作系统和 PHP 编译方式的不同，整数值中的可用位数可以是
    32 位或 64 位。这提供了`2 ** 32`或`2 ** 64`种不同的整数值。由于 PHP 的所有整数都是有符号的，首位用于处理符号，当二进制字符串转换为十进制数时，这剩下`2
    ** 31`或`2 ** 63`个正负值。


    ### 实现原理


    我们可以使用`base_convert()`函数打印整数值的二进制表示。在 64 位版本的 PHP 中，以下代码将生成 63 个 1：


    ```php

    <?php


    // 3_9.php


    echo base_convert(PHP_INT_MAX, 10, 2);

    ```


    这是`9223372036854775807`的二进制表示。只有 63 个 1，因为第一位是 0，尽管它仍是 64 位的一部分，但`base_convert()`函数不会打印它。


    通过使用二进制非运算符（`~`），数字中的所有位都可以翻转，因此在下一个示例中，我们将得到一个 1 后跟 63 个 0。


    ```php

    <?php


    // 3_10.php


    echo base_convert(~PHP_INT_MAX, 10, 2);

    ```


    ## 方案 3-4：在二进制中设置和清除位


    ### 问题描述


    你想要在二进制表示中设置或清除单个位。


    **注意：** 方案 3-2 展示了如何将数字转换为二进制表示以供显示。


    ### 解决方案


    除了非（`~`）运算符外，PHP 还支持按位与（`&`）、或（`|`）、异或（`^`）以及左移（`<<`）和右移（`>>`）。按位非、与、或函数与布尔非（`!`）、与（`&&`）和或（`||`）运算不同。事实上，单词`AND`和`OR`可以替代`&&`和`||`使用，这与使用
    SQL92 语法进行数据库查询的方式相同。


    按位或运算符使用或逻辑将两个变量中相同位置的位组合起来，形成新变量中的位。如果两个位都是 0，则结果位也为 0。如果其中一个或两个位是 1，则结果位为 1。


    按位与运算符使用与逻辑将两个变量中相同位置的位组合起来，形成新变量中的位。如果两个位都是 1，则结果位也为 1。如果其中一个或两个位是 0，则结果位为 0。


    按位异或运算符使用异或逻辑将两个变量中相同位置的位组合起来，形成新变量中的位。如果其中一个位是 1 且另一个是 0，则结果位为 1。如果两个位都是 0 或都是
    1，则结果位为 0。


    ### 实现原理


