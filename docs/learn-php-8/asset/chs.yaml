  \ dog 应用程序 XML 文件中的信息设置的。然而，当前的位置可能不是有效数据的位置。添加到析构函数中的代码将使用有效数据的新位置，应用所需的更改，并将有效数据放回原始数据文件中。无需对`data_application`\
