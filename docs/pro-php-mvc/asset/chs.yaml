  \n---\n\n## 第 21 章：测试\n\n随着我们的示例应用进展顺利，我们再次需要将注意力转回测试这个主题。你可能会发现，测试抽象代码比测试应用逻辑要容易得多。更重要的是，我们需要执行的测试需要一定程度的交互，这是很难通过代码模拟的。\n\
  \n### 目标\n\n-   我们需要测试各种输入表单的格式。\n-   我们需要测试用户与这些表单交互的各种结果。\n\n测试表单有效性的众多方法之一是检查返回的\
  \ HTML 正文中是否存在某些元素。为此，我们需要使用 `Request` 类（用于向应用内的页面发起各种 HTTP 请求），并且我们需要评估 `Request`\
  \ 类返回的 HTML，以确定是否提供了某些输入字段。\n\n可以使用代码清单 21-1 中所示的函数来实现这两个目标。\n\n**代码清单 21-1.** 使用\
  \ `Request` 进行测试\n\n```php\n$get = function($url)\n{\n    $request = new Framework\\\
  Request();\n    return $request->get(\"http://\".$_SERVER[\"HTTP_HOST\"].\"/{$url}\"\
  );\n};\n\n$has = function($html, $fields)\n{\n    foreach ($fields as $field)\n\
  \    {\n        if (!stristr($html, \"name=\\\"{$field}\\\"\"))\n        {\n   \
  \         return false;\n        }\n    }\n    return true;\n};\n```\n\n第一个函数只是创建一个新的\
  \ `Request` 实例，并向本地主机内的一个路径发起 `GET` 请求。如果你的示例应用设置在不同的主机名下运行，请确保相应地调整此函数。\n\n第二个函数遍历一个字段名数组，检查它们是否包含在提供的\
  \ `$html` 字符串中。它会将它们转换为 `\"name=\\\"{$field}\\\"\"` 的格式，该格式针对表单字段。有了这些函数，我们可以为示例应用的各种表单编写测试，如代码清单\
  \ 21-2 所示。\n\n**代码清单 21-2.** 测试表单字段\n\n```php\nFramework\\Test::add(\n    function()\
  \ use ($get, $has)\n    {\n        $html = $get(\"register.html\");\n        $status\
