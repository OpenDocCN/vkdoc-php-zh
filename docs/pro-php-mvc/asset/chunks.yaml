    The Request\Response class is relatively simple. It accepts a response constructor
    option, which is the result of an HTTP request. It splits this response string
    into headers and a body, which are available through getter methods.


    Listing 15-8 shows how these classes are used in the creation of our second template
    construct: the partial construct.


    ***Listing 15-8.*** The _partial() Handler


    protected function _partial($tree, $content)


    {


    $address = trim($tree["raw"], " /");


    if (StringMethods::indexOf($address, "http") ! = 0)


    {


    $host = RequestMethods::server("HTTP_HOST");


    $address = "http://{$host}/{$address}";


    }


    $request = new Request();


    $response = addslashes(trim($request- > get($address)));


    return "\$_text[] = \"{$response}\";";


    }


    The _partial() handler accepts a URL ($address) that can either be absolute (e.g.,
    [http://www.google.com](http://www.google.com)) or relative to the same application
    (e.g[., http://localhost/messages/feed.html)](http://localhost/messages/feed.html).
    If the URL does not start with http then we will treat it as a relative URL and
    adjust it accordingly. We make a GET request to the URL and return the results
    to the template’s $_text array, where it will be rendered to the final template
    output.


