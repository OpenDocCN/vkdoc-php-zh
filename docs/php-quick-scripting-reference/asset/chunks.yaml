    \n## Loops\n\nThere are four looping structures in PHP. These are used to execute\
    \ a specific code block multiple times. Just as with the conditional `if` statement,\
    \ the curly brackets for the loops can be left out if there is only one statement\
    \ in the code block.\n\n### While loop\n\nThe `while` loop runs through the code\
    \ block only if its condition is true, and will continue looping for as long as\
    \ the condition remains true. Note that the condition is only checked at the beginning\
    \ of each iteration (loop).\n\n```\n$i = 0;\nwhile ($i < 10) { echo $i++; } //\
    \ 0-9\n```\n\n### Do-while loop\n\nThe `do-while` loop works in the same way as\
    \ the `while` loop, except that it checks the condition after the code block.\
    \ It will therefore always run through the code block at least once. Bear in mind\
    \ that this loop ends with a semicolon.\n\n```\n$i = 0;\ndo { echo $i++; } while\
    \ ($i < 10); // 0-9\n```\n\n### For loop\n\nThe `for` loop is used to go through\
    \ a code block a specific number of times. It uses three parameters. The first\
    \ parameter initializes a counter and is always executed once, before the loop.\
    \ The second parameter holds the condition for the loop and is checked before\
    \ each iteration. The third parameter contains the increment of the counter and\
    \ is executed at the end of each iteration.\n\n```\nfor ($i = 0; $i < 10; $i++)\
    \ { echo $i; } // 0-9\n```\n\nThe `for` loop has several variations since either\
    \ one of the parameters can be left out. For example, if the first and third parameters\
    \ are left out it behaves in the same way as the `while` loop.\n\n```\nfor (;$i\
    \ < 10;) { echo $i++; }\n```\n\nThe first and third parameters can also be split\
    \ into several statements using the comma operator (`,`).\n\n```\nfor ($i = 0,\
    \ $x = 9; $i < 10; $i++, $x--) {\n  echo $x; // 9-0\n}\n```\n\nThe `sizeof` function\
    \ retrieves the number of elements in an array. Together with the `for` loop it\
    \ can be used to iterate through a numeric array.\n\n```\n$a = array(1,2,3);\n\
    \nfor($i = 0; $i < sizeof($a); $i++) {\n  echo $a[$i]; // \"123\"\n}\n```\n\n\
    If there is no need to keep track of iterations the `foreach` loop provides a\
    \ cleaner syntax. This loop is also necessary for traversing associative arrays.\n\
    \n### Foreach loop\n\nThe `foreach` loop provides an easy way to iterate through\
    \ arrays. At each iteration the next element in the array is assigned to the specified\
    \ variable (the iterator) and the loop continues to execute until it has gone\
    \ through the entire array.\n\n```\n$a = array (1,2,3);\n\nforeach ($a as $v)\
    \ {\n  echo $v; // \"123\"\n}\n```\n\nThere is an extension of the `foreach` loop\
    \ to also obtain the key’s name or index, by adding a key variable followed by\
    \ the double arrow operator (`=>`) before the iterator.\n\n```\n$a = array ('one'\
    \ => 1, 'two' => 2, 'three' => 3);\n\nforeach ($a as $k => $v) {\n  echo \"$k\
    \ => $v <br>\";\n}\n```\n\n### Alternative syntax\n\nAs with conditional statements,\
    \ the brackets in the loops can be rewritten into the alternative syntax with\
    \ a colon and one of the `endwhile`, `endfor` or `endforeach` keywords.\n\n```\n\
    while ($i < 10): echo $i++; endwhile;\n\nfor ($i = 0; $i < 10; $i++): echo $i;\
    \ endfor;\n\nforeach ($a as $v): echo $v; endforeach;\n```\n\nThe main benefit\
    \ of this is improved readability, especially for longer loops.\n\n### Break\n\
    \nThere are two special keywords that can be used inside loops – `break` and `continue`.\
    \ The `break` keyword ends the execution of a loop structure.\n\n```\nfor (;;)\
    \ { break; } // end for\n```\n\nIt can be given a numeric argument which specifies\
    \ how many nested looping structures to break out of.\n\n```\n$i = 0;\nwhile ($i++\
    \ < 10)\n{\n  for (;;) { break 2; } // end for and while\n}\n```\n\n### Continue\n\
    \nThe `continue` keyword can be used within any looping statement to skip the\
    \ rest of the current loop and continue at the beginning of the next iteration."
