    Finally, we will implement the postInsert() callback. This is the function responsible
    for copying the image file from its temporary upload location to the uploaded
    files area of our web application. We will do this in postInsert() because if
    any SQL errors occurred before this point, the whole transaction could be easily
    rolled back, preventing the file from being incorrectly moved into the web application.


    To move the file, we will use the PHP move_uploaded_file() function. This function
    is used for security reasons, as it will automatically ensure that the file being
    moved was in fact uploaded via PHP. This function will return true if the file
    was successfully moved and false if not. Thus we can use the return value as the
    postInsert() return value. Remember that returning false from this callback will
    roll back the database transaction. In other words, if the file could not be copied
    for some reason, the database record would not be saved.


