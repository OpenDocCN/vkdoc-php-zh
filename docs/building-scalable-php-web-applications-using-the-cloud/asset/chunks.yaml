    \ focus on master/replica configurations.\n\nFigure 7-1 shows a conceptual view\
    \ of a typical master/replica architecture."
  raw: "### ![../images/487291_1_En_6_Chapter/487291_1_En_6_Figa_HTML.jpg](images/487291_1_En_6_Chapter/487291_1_En_6_Figa_HTML.jpg)\
    \ CACHE DEBUGGING TIPS\n\nCaches, while hugely beneficial, bring in their own\
    \ set of problems. In order to better debug web pages, it is best if you always\
    \ have a set of parameters that you can pass to the application to get it to turn\
    \ off caching. For instance, in many of my own applications, passing in a `no_cache=1`\
    \ in the URL will turn off caching. This is usually the first place I go to when\
    \ problems are reported.\n\nHere are some signs that you might be running into\
    \ caching problems, and what to do about them:\n\n*   **Problem**: Your application\
    \ is putting out old content, even though newer content is in the database.\n\n\
    \    **Diagnosis**: The cache is holding on to stale content.\n\n    **Solutions**:\
    \ Expire your content sooner, or provide additional cache key information to let\
    \ the cache know when you need new data.\n\n*   **Problem**: Your application\
    \ is spitting out inappropriate data given the parameters.\n\n    **Diagnosis**:\
    \ This often happens when your cache key is not specific enough. For instance,\
    \ if content was coming out in the wrong language, that might mean that you need\
    \ to attach the current language as part of the cache key.\n\n    **Solutions**:\
    \ Add more parameters to your cache key to make sure you truly identify each piece\
    \ of unique content with a unique key, or you may decide that this content it\
    \ too specific to be cached.\n\n*   **Problem** : The same page is spitting out\
    \ different content on each reload.\n\n    **Diagnosis**: The cache has different\
    \ content on each server depending on when it was accessed.\n\n    **Solutions**:\
    \ There are several ways to fix this. You can (a) decrease the amount of time\
    \ until expiration, (b) increase the “stickiness” on the load balancer to be sure\
    \ that the same person is always hitting the same server (and thus the same cache),\
    \ (c) utilize a global (or synchronized) cache instead of a local cache, and (d)\
    \ add additional cache key parameters to better coordinate what data a user gets\
    \ from the cache.\n\n*   **Problem**: The cache is not speeding up your application\
    \ as much as you thought.\n\n    **Diagnosis**: Either you are never hitting your\
    \ cache or you are not caching the right things.\n\n    **Solutions** : As there\
    \ are many ways this can go wrong, there are many ways to fix it. Often this occurs\
    \ when each user is accessing a different set of data, and therefore nothing winds\
    \ up being pulled from the cache. This can be fixed by increasing the cache size\
    \ and/or intelligently preloading the cache with data that is likely to be accessed.\
    \ You may need to increase the expiration time of your data as well. However,\
