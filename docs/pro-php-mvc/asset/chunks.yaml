- fmt: '# 用户与内容管理


    所有用户和内容都可以通过管理界面进行管理，这需要对有效的管理员用户账户进行身份验证。我们将根据需要创建各个模型结构。


    ## 文件夹


    我们需要为应用程序建立文件夹结构，以便文件存储在可预测的位置。我们已经将框架本身放置在同名文件夹中，但应用程序的其余部分应遵循图12-2所示整洁的组织模式。


    ***Figure 12-2.** 文件夹结构*


    `application`文件夹将存放所有内容，从框架代码到应用程序代码。我们创建的HTML视图将保存在`views`文件夹中，而任何第三方库将保存在`libraries`文件夹中。


    `configuration`文件夹将存放应用程序类的配置文件，而`model`和`controller`文件将分别存放在各自的文件夹中。


    `public`文件夹将存放所有可公开访问的文件，这些文件不会在应用程序执行过程中直接加载。这包括图片、JavaScript文件和层叠样式表。


    一个有趣的现象是，我们的应用程序测试存放在`public`文件夹中。这样做的目的是将测试与框架和应用程序代码库完全分离。我们的测试最终将使用框架代码并测试框架/应用程序代码，但保持这些方面（测试、框架和应用程序）的分离非常重要。


    ## 问题


    1. 我们已经为社交网络中的数据库表/数据对象定义了粗略的结构。在开始编码之前规划数据结构有什么意义？


    2. 我们使用的文件夹结构在很大程度上取决于所构建的应用程序类型。既然这种结构对于每个新应用程序都可能发生不同程度的变化，为什么我们还需要决定它？


    ## 答案


    1. 花在规划应用程序上的时间越多，开发过程就会越顺利。这在MVC应用程序中尤为明显。当应用程序使用数据库时，我们不仅仅是使用PHP查询数据库；我们是在构建模型并与数据库交互，就像对待其他类一样。我们需要事先知道这些类应该是什么样子。


    2. 文件夹结构在两个领域很重要。第一，它保持一切整洁有序。第二，我们可以快速找到所需内容。无论是查找模型、控制器还是第三方库，通过理解文件夹结构，我们都能快速定位。


    # 第13章 引导


    引导是一个比喻，指无需外部帮助即可自我维持的过程。就我们的框架而言，引导是一个统称，描述框架为了从网址到达特定的控制器、模型和视图集合而执行的一系列过程。


    这些过程之所以必要，是因为我们的框架高度专注于面向对象编程（OOP）实践，我们试图将尽可能多的功能隔离到各个类中。如果我们尝试采用函数式方法来构建MVC框架，这意味着代码以自上而下的方式执行，并且不需要初始代码来将各个类拼接成有意义的应用程序。


    到目前为止，我们已经构建了许多作为坚实框架基础的类。当我们开始在框架之上构建应用程序时，就需要开始思考每个部分如何与它需要的其他部分进行交互。这始于引导。


    ## 目标


    - 我们需要拦截对应用程序的请求（使用`.htaccess`），并将这些请求重定向到引导文件。

    - 引导文件需要实例化运行应用程序所需的类。这些类包括配置、缓存和路由器等。

    - 路由器将决定加载哪个控制器和动作。控制器将首先允许动作执行，然后渲染动作的视图（如果找到匹配的视图）。


    ## 当文件不是文件时……


    涉足框架开发的开发者可能会惊讶地发现，唯一的网址并不一定指向Web服务器上的唯一文件。多个域名指向同一个网站是很常见的。同样，带有各种查询字符串参数的地址指向同一个文件也很常见。我所说的地址到文件的关系，是指Web服务器根据模式匹配将地址（任何类型）重定向到它们选择的任何文件的能力。这个过程称为*URL重写*。


    URL重写是服务器可以做的事情，只要给予足够的指令，告诉它要匹配哪些地址，以及将相应的请求发送到哪里。请求可以重定向到本地文件系统中的文件/脚本，甚至可以重定向到远程文件和/或地址。这些指令通常放在特定Web服务器的配置文件中。


    一些Web服务器（如Apache2）允许在服务器启动时同时加载这些配置文件。这些服务器也可能允许在每个目录中存放配置文件，就像Apache2的情况一样。


    ## URL重写


    URL重写对我们很重要，因为我们将使用它将所有请求汇集到一个`index.php`文件中。这是因为我们希望所有请求都通过相同的引导代码（包含在这个`index.php`文件中）来处理，以便我们能够选择最佳的响应，而无需重复代码。


    我提到过可以使用基于目录的配置文件来初始化URL重写，我们现在就来创建一个。这个文件应放在`public`目录中，而您的Web服务器根目录应指向`public`目录内部。这将确保我们的应用程序代码可以读取所有框架文件，而只有`public`目录中包含的文件才能被外部世界公开访问。让我们看看这个文件在清单13-1中是什么样子。


    ***Listing 13-1.*** Apache2中的URL重写


    ```

    RewriteEngine On


    RewriteCond %{REQUEST_FILENAME} !-d


    RewriteCond %{REQUEST_FILENAME} !-f


    RewriteCond %{REQUEST_URI} !=/favicon.ico


    RewriteRule ^([a-zA-Z0-9\/\-_]+)\.?([a-zA-Z]+)?$ index.php?url = $1&extension
    = $2 [QSA,L]

    ```


    这五行代码看起来可能复杂，但它们的含义很简单。第一行指示Apache2为此目录启用URL重写。它假设服务器启动时已安装并启用了该模块。


    第二行指令告诉Apache2忽略对此目录中实际目录的所有请求。例如，如果`public`目录下有一个`scripts`目录，并且请求发送到`http://localhost/scripts`，Apache2将忽略重写，让请求正常执行。第三行指令类似，但针对文件。如果请求发送到`http://localhost/scripts/shared.js`，请求将正常执行。


    第四行指令告诉Apache2忽略对`http://localhost/favicon.ico`的所有请求。浏览器经常请求此类标准文件，我们不希望这种额外流量触发404错误页面，因为我们的框架不处理该地址。'
