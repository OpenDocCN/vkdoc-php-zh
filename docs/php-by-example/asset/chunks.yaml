    ```

    The output of the program (from Listing 7-11)

    $number: 123

    $code: 321

    $code: 50

    $value: 200

    ```


    ** PHP 8 标准 **：在高于 PHP 8 的版本中，动态属性的创建已被弃用。因此，命令`$obj->value=100`会触发警告。为避免此问题，可以在`MyClass`类中使用`#[\AllowDynamicProperties]`注解（将注解放在类定义之前）。


    `MyClass`类包含公共字段`$number`、私有字段`$code`、用于读取`$code`字段值的公共`get()`方法，以及用于设置该字段值的`set()`方法。`__set()`方法定义了两个参数：第一个参数`$name`指定要赋值的字段名称，第二个参数`$arg`是要赋给该字段的值。方法核心是一个条件语句，在其中检查`isset($this->$name)`条件。如果对象拥有对应字段，则该条件为真，此时执行命令`$this->$name=$arg/2`，字段获得所传递赋值值的一半。如果条件为假，则执行`$this->$name=2*$arg`，结果为对象获得一个对应字段，且该字段的值是尝试赋值的两倍。


    > **注意**：如果给不可访问的私有字段赋值，该字段获得所赋值的一半；如果给不存在的字段赋值，则该字段会被添加到对象中，并获取所赋值的两倍。


    基于`MyClass`类创建`$obj`对象后，使用命令`$obj->number=123`给公共字段`$number`赋值`123`，使用命令`$obj->set(321)`给私有字段`$code`赋值`321`。此时一切正常，因此表达式`$obj->number`返回`123`，`$obj->get()`返回`321`。下一步，尝试通过命令`$obj->code=100`给私有字段`$code`赋值。此时`__set()`方法被自动调用。由于`$obj`对象拥有`$code`字段，该字段的值变为`50`而非`100`，通过指令`$obj->get()`检查确认了这一点。命令`$obj->value=100`尝试给不存在的`$value`字段赋值`100`，此时`__set()`方法同样被调用。结果，`$value`字段被添加到对象中，并获得值`200`。可通过`$obj->value`语句检查该字段的值。


    ## 在构造函数中定义字段


    类中的构造函数通常会给正在创建的对象分配字段值。此时，字段在类中声明，构造函数包含基于构造函数参数给字段赋值的命令。在实际应用中，示例如下：


    ```

    class MyClass{

    // The field:

    public $code;

    // The constructor:

    function __construct($code){

    // The field is assigned a value:

    $this->code=$code;

    }

    }

    ```'
