    Adding the EmailLogger Writer to Zend_Log


    The next step is to instantiate the EmailLogger class and notify the logger about
    it. Before we can do this, there is one important step we have not covered yet.
    That is to filter messages by their priority. We want to send e-mails only for
    critical errors (while still writing all other messages to the filesystem log).
    This means we will filter out messages that don’t have the priority levels Zend_Log::CRIT,
    Zend_Log::ALERT, and Zend_Log::EMERG.


    To do this we use the Zend_Log_Filter_Priority class. This filter accepts the
    priority level as the first argument to the constructor. The default priority
    comparison operator is <=, meaning all messages matching that argument and lower
    will be matched. In our case, we will specify Zend_Log::CRIT as the priority level
    (this evaluates to a priority level of 2), which will therefore include Zend_Log::ALERT
    (priority level 1) and Zend_Log::EMERG (priority level 0).


    Once the filter has been created, we add it to the writer using the addFilter()
    method.


