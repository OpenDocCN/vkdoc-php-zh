    \ the next line\n   |       |     following the body; found 1 blank lines before\n\
    \   |       |     brace\n\nPHPCBF CAN FIX THE 4 MARKED SNIFF VIOLATIONS AUTOMATICALLY\n\
    \nTime: 358ms; Memory: 4Mb\n```\n\n显然，我需要稍微清理一下我的代码！\n\n自动化工具的好处之一是其非个人性。如果你的团队决定强制执行一套编码约定，可以说，由一个没有幽默感的脚本纠正你的风格，总比一个同样没有幽默感的同事来做同样的事情要好。\n\
    \n正如您现在可能预料到的，我想向我的构建文件中添加一个`CodeSniffer`目标：\n\n`phpcodesniffer`任务将为我完成这项工作。我使用`standard`属性来指定`PSR2`规则。我使用嵌套的`fileset`元素定义要检查的文件。我定义了一个`formatter`元素，其`type`属性为`checkstyle`。这将在`reports`目录中生成一个\
    \ XML 文件。\n\n因此，我拥有许多可以用来监控项目的实用工具。当然，如果我独自一人，即使有了方便的`Phing`构建文件，我很快也会对运行它们失去兴趣。事实上，我可能会回归到旧有的集成阶段思路，只在接近发布时才拿出这些工具，到那时它们作为预警系统的有效性已经无关紧要了。我需要的是一个持续集成（CI）服务器来为我运行这些工具。\n\
    \n`Jenkins`（原名`Hudson`）是一个开源持续集成服务器。虽然它是用`Java`编写的，但`Jenkins`很容易与`PHP`工具一起使用。这是因为持续集成服务器独立于它所构建的项目，负责启动并监控各种命令的结果。`Jenkins`还能很好地与`PHP`集成，因为它设计为支持插件，并且有一个非常活跃的开发者社区致力于扩展服务器的核心功能。\n\
    \n**注意**\n\n为什么选择`Jenkins`？`Jenkins`非常易于使用和扩展。它已经很成熟，并且拥有活跃的用户社区。它是免费且开源的。支持与`PHP`集成的插件（包括您能想到的大多数构建和测试工具）都是可用的。然而，市面上有很多\
    \ CI 服务器解决方案。本书的先前版本侧重于`CruiseControl`（[`http://cruisecontrol.sourceforge.net/`](http://cruisecontrol.sourceforge.net/)），它仍然是一个不错的选择。\n\
    \n**安装 Jenkins**\n\n`Jenkins`是一个`Java`系统，因此您需要安装`Java`。具体安装方法因系统而异。在`Fedora`发行版上，您可能会这样做：\n\
    \n```\n$ yum install java-1.7.0\n```\n\n或者，您可以直接从[`www.java.com`](http://www.java.com)获取`Java`。\n\
    \n您可以通过在命令行中运行它来确认是否已安装`Java`：\n\n```\n$ java -version\njava version \"1.7.0_101\"\
    \nOpenJDK Runtime Environment (rhel-2.6.6.4.el6_8-x86_64 u101-b00)\nOpenJDK 64-Bit\
    \ Server VM (build 24.95-b01, mixed mode)\n```\n\n您可以从项目主页[`http://jenkins-ci.org/`](http://jenkins-ci.org/)获取`Jenkins`。它可以通过`Java\
    \ Web Archive`（`WAR`）文件安装，或者主页上也提供了适用于大多数发行版的本地软件包链接。我将使用`Fedora`的安装选项：\n\n```\n\
    $ wget -O /etc/yum.repos.d/jenkins.repo http://pkg.jenkins-ci.org/redhat/jenkins.repo\n\
    $ rpm --import http://pkg.jenkins-ci.org/redhat/jenkins-ci.org.key\n$ yum install\
    \ jenkins\n```\n\n`Jenkins`网站为大多数发行版提供了安装说明。\n\n安装`Jenkins`后，您可以直接通过`Java`像这样运行它：\n\
    \n```\n$ sudo java -jar /usr/lib/jenkins/jenkins.war\n```\n\n但是，如果这样做，您以后可能会遇到问题。最好使用启动脚本，它将以`jenkins`用户身份运行`Jenkins`。以`Fedora`为例，您可以像这样启动`Jenkins`：\n\
    \n```\n$ service jenkins start\n```\n\n您还可以在[`https://wiki.jenkins-ci.org/display/JENKINS/JenkinsLinuxStartupScript`](https://wiki.jenkins-ci.org/display/JENKINS/JenkinsLinuxStartupScript)找到一个通用的启动脚本。\n\
    \n默认情况下，`Jenkins`运行在`8080`端口，因此您可以通过启动浏览器并访问`http://yourhost:8080/`来检查是否准备就绪。您应该会看到图\
    \ 21-2 所示的屏幕。\n\n图 21-2 中的说明非常清晰。我从`/var/lib/jenkins/secrets/initialAdminPassword`获取密码，并将其输入到提供的框中。然后我面临一个选择：安装流行的插件还是自己选择？我选择了最流行的插件，我知道这将使我获得对`Git`等功能支持。如果您想要一个精简的系统，您可能只选择您需要的插件。之后，在完成安装前，需要创建一个用户名和密码。\n\
    \n**安装 Jenkins 插件**\n\n`Jenkins`高度可定制，为了与我本章描述的功能集成，我需要相当多的插件。在`Jenkins`的 Web\
    \ 界面中，我点击`Manage Jenkins`，然后点击`Manage Plugins`。在`Available`选项卡下，我找到了一个很长的列表。我勾选了所有希望添加到`Jenkins`的插件对应的`Install`列中的复选框。\n\
    \n表 21-1 描述了我将要使用的插件。\n\n**表 21-1. 一些 Jenkins 插件**\n\n| 插件 | 描述 |\n| :--- | :---\
    \ |\n| | |\n"
- fmt: '| --- | --- | --- | --- | --- |


    ## Git Plug-in


    允许与 Git 仓库交互。


    ## xUnit Plug-in


    与包括`PHPUnit`在内的 xUnit 工具系列集成。


    ## Phing Plug-in


    调用`Phing`目标。


    ## Clover PHP Plug-in


    访问由`PHPUnit`生成的`clover` XML 文件和 HTML 文件，并生成报告。


    ## HTML Publisher Plug-in


    集成 HTML 报告。用于`PHPDocumentor`输出。


    ## Checkstyle Plug-in


    访问由`PHPCodeSniffer`生成的 XML 文件，并生成报告。


    你可以看到 Jenkins 插件页面如图 [21-3](#A314621_5_En_21_Chapter.html#Fig3) 所示。


    ![A314621_5_En_21_Fig3_HTML.jpg](A314621_5_En_21_Fig3_HTML.jpg)


    **图 21-3.** Jenkins 插件界面


    安装了这些插件后，我几乎准备好创建和配置我的项目了。


    ## 设置 Git 公钥


    在使用 Git 插件之前，我需要确保能够访问一个 Git 仓库。在章节 [17](#A314621_5_En_17_Chapter.html) 中，我描述了生成公钥以访问远程
    Git 仓库的过程。我们需要在这里重复此过程。但是 Jenkins 的''家''在哪里呢？


    这个位置是可配置的，但 Jenkins 自然会提示你。我点击`Manage Jenkins`，然后点击`Configure System`。我在那里找到了
    Jenkins 的主目录。当然，我也可以检查`/etc/passwd`文件中关于`jenkins`用户的信息。在我的例子中，目录是`/var/lib/jenkins`。


    现在我需要配置一个`.ssh`目录：


    ```

    $ sudo su jenkins -s /bin/bash

    $ cd ∼

    $ mkdir .ssh

    $ chmod 0700 .ssh

    $ ssh-keygen

    ```


    我切换到`jenkins`用户，并指定要使用的 shell（因为 shell 访问默认可能被禁用）。我进入该用户的主目录。`ssh-keygen`命令生成
    SSH 密钥。当提示输入密码时，我直接按回车键，这样 Jenkins 将仅通过其密钥进行身份验证。我确保生成在`.ssh/id_rsa`的文件对组和其他用户都不可读：


    ```

    $ chmod 0600 .ssh/id_rsa

    ```


    现在我可以从`.ssh/id_rsa.pub`获取公钥，并将其添加到我的远程 Git 仓库。更多信息请参见章节 [17](#A314621_5_En_17_Chapter.html)。


    我还没完全完成。我需要确保我的 Git 服务器是一个 SSH 已知主机。我可以将此设置与 Git 配置的命令行测试结合起来进行。我确保在执行此操作时仍然以`jenkins`用户登录：


    ```

    $ cd /tmp

    $ git clone git@bitbucket.org:getinstance/userthing.git

    ```


    系统会提示我确认我的 Git 主机，然后它会被添加到`jenkins`用户的`.ssh/known_hosts`文件中。这可以防止 Jenkins 稍后建立
    Git 连接时出现问题。


    ## 安装项目


    在 Jenkins 仪表盘页面上，我点击`New Item`。在这个新页面上，我终于可以创建我的`userthing`项目了。你可以在图 [21-4](#A314621_5_En_21_Chapter.html#Fig4)
    中看到设置界面。


    ![A314621_5_En_21_Fig4_HTML.jpg](A314621_5_En_21_Fig4_HTML.jpg)


    **图 21-4.** 项目设置界面


    我选择`Freestyle project`并点击`OK`。这会将我带到项目配置界面。我的首要任务是连接到远程 Git 仓库。我在`Source Code
    Manager`部分中选择 Git 单选按钮，并添加我的仓库。你可以在图 [21-5](#A314621_5_En_21_Chapter.html#Fig5)
    中看到这一点。


    ![A314621_5_En_21_Fig5_HTML.jpg](A314621_5_En_21_Fig5_HTML.jpg)


    **图 21-5.** 设置版本控制仓库


    如果一切顺利，我应该能够访问我的源代码。我可以通过保存并从仪表盘页面选择`Build`来检查这一点。然而，为了看到一些有意义的操作，我还应该设置`Phing`。如果你已经集中安装了`Phing`，这很简单。但是，如果你使用的是`Composer`，事情就会稍微复杂一些。你必须告诉
    Jenkins 在哪里可以找到`Phing`可执行文件。你可以通过从主菜单选择`Manage Jenkins`，然后选择`Global Tool Configuration`来实现。因为我安装了`Phing`插件，所以我会在那里找到一个该工具的配置区域。在图
    [21-6](#A314621_5_En_21_Chapter.html#Fig6) 中，我添加了`phing`脚本位置的路径（或者至少是运行`Composer`后它最终所在的位置）。


    ![A314621_5_En_21_Fig6_HTML.jpg](A314621_5_En_21_Fig6_HTML.jpg)


    **图 21-6.** 指定`Phing`的位置


    完成这一步后，我可以为我的项目配置`Phing`。我返回到`userthing`项目区域和`Configure`菜单。我滚动到`Build`部分，并从`Add
    build step`下拉菜单中选择两个项目。首先，我选择`Execute shell`。我需要确保 Jenkins 运行`composer install`，否则我项目所依赖的工具都不会被安装。图
    [21-7](#A314621_5_En_21_Chapter.html#Fig7) 显示了该配置。


    ![A314621_5_En_21_Fig7_HTML.jpg](A314621_5_En_21_Fig7_HTML.jpg)


    **图 21-7.** 设置 shell 执行


    我从`Add build step`下拉菜单中选择的下一个项目是`Invoke Phing targets`。在这里，我可以将我的`Phing`目标添加到文本字段中。你可以在图
    [21-8](#A314621_5_En_21_Chapter.html#Fig8) 中看到这一步。


    ![A314621_5_En_21_Fig8_HTML.jpg](A314621_5_En_21_Fig8_HTML.jpg)


    **图 21-8.** 配置`Phing`


    ## 运行首次构建


    我保存配置界面并点击`Build Now`来运行构建和测试过程。这是决定性的时刻！一个构建链接应该会出现在屏幕的`Build History`区域。我点击那个链接，然后点击`Console
    Output`来确认构建是否按预期进行。你可以在图 [21-9](#A314621_5_En_21_Chapter.html#Fig9) 中看到输出（尽管来自稍后的构建）。


    ![A314621_5_En_21_Fig9_HTML.jpg](A314621_5_En_21_Fig9_HTML.jpg)


    **图 21-9.** 控制台输出


    Jenkins 从 Git 服务器检出`userthing`代码，并运行所有构建和测试目标。


    ## 配置报告


    多亏了我的构建文件，`Phing`将报告保存到`build/reports`目录，并将文档保存到`build/docs`目录。我激活的插件可以从项目配置界面的`Add
    post-build action`下拉菜单中进行配置。


    图 [21-10](#A314621_5_En_21_Chapter.html#Fig10) 显示了其中一些配置项。


    ![A314621_5_En_21_Fig10_HTML.jpg](A314621_5_En_21_Fig10_HTML.jpg)


    **图 21-10.** 配置报告插件项


    为了避免让你看一个接一个的截图，将配置项压缩到一个表格中会更清晰。表 [21-2](#A314621_5_En_21_Chapter.html#Tab2)
    显示了一些构建后操作字段以及我在`Phing`构建文件中设置的相应值。


    **表 21-2.** 报告配置


    | 配置项 | Phing 任务 | 字段 | 值 |

    | :--- | :--- | :--- | :--- |

    | Publish Checkstyle analysis results | `phpcodesniffer` | Checkstyle results
    | `reports/checkstyle.xml` |

    | Publish Clover PHP Coverage Report | `phpunit` | Clover XML Location | `reports/cloverreport.xml`
    |

    | | | Clover HTML report directory | `reports/clovercoverage/` |

    | Publish HTML reports | `phpdoc2` | HTML directory to archive | `reports/docs`
    |

    | | | Index page[s] | `index.html` |

    | Publish Junit test result report | `phpunit` | Test report XMLs | `reports/testreport.xml`
    |

    | E-mail Notification | | Recipients | `someone@somemail.com` |'
