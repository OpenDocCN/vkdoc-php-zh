    `WHERE caption LIKE ?'';`


    Before passing the user-submitted search term to the `bind_param()` method, you
    need to add the wildcard characters to it and assign it to a new variable, like
    this:  


    `$searchterm = ''%''. $_GET[''search''] .''%'';`


    You can now create the prepared statement. The finished code in the PHP block
    above the `DOCTYPE` declaration looks like this:  


    `if (isset($_GET[''go''])) {`


    `require_once ''../includes/connection.inc.php'';`


    `$conn = dbConnect(''read'');`


    `$sql = ''SELECT image_id, filename, caption FROM images`


    `WHERE caption LIKE ?'';`


    `$searchterm = ''%''. $_GET[''search''] .''%'';`


    `$stmt = $conn->stmt_init();`


    `if ($stmt->prepare($sql)) {`


    `$stmt->bind_param(''s'', $searchterm);`


    `$stmt->execute();`


    `$stmt->bind_result($image_id, $filename, $caption);`


    `$stmt->store_result();`


    `$numRows = $stmt->num_rows;`


    `} else {`


    `$error = $stmt->error;`


    `}`


    `}`


    Add a conditional statement after the opening `<body>` tag to display the error
    message if a problem has occurred:  


    *   This initializes the prepared statement and assigns it to `$stmt`. The SQL
    query is then passed to the `prepare()` method, which checks the validity of the
    query’s syntax. If there’s a problem with the syntax, the `else` block assigns
    the error message to `$error`. If there are no mistakes in the syntax, the rest
    of the script inside the conditional statement is executed.

    *   The first line inside the conditional statement binds `$searchterm` to the
    `SELECT` query, replacing the question mark placeholder. The first argument tells
    the prepared statement to treat it as a string.

    *   After the prepared statement is executed, the next line binds the results
    of the `SELECT` query to `$image_id`, `$filename`, and `$caption`. These need
    to be in the same order as in the query. I have named the variables after the
    columns they represent, but you can use any variables you want.

    *   Then the result is stored. Note that you store the result simply by calling
    the statement object’s `store_result()` method. Unlike using `query()`, you don’t
    assign the return value of `store_result()` to a variable. If you do, it’s simply
    `true` or `false`, depending on whether the result was stored successfully.

    *   Finally, the number of rows retrieved by the query is obtained from the statement
    object’s `num_rows` property and stored in `$numRows`.


    `<?php`


    `if (isset($error)) {`


    `echo "<p>$error</p>";`


    `}`


    `?>`


    Add the following code after the search form to display the result:  


    `<?php if (isset($numRows)) { ?>`


    `<p>Number of results for <b>` `<?= htmlentities($_GET[''search'']); ?>` `</b>:`


    `<?= $numRows; ?>` `</p>`


    `<?php if ($numRows) { ?>`


    `<table>`


    `<tr>`


    `<th>image_id</th>`


    `<th>filename</th>`


    `<th>caption</th>`


    `</tr>`


    `<?php while ($stmt->fetch()) { ?>`


    `<tr>`


    `<td>` `<?= $image_id; ?>` `</td>`


    `<td>` `<?= $filename; ?>` `</td>`


    `<td>` `<?= $caption; ?>` `</td>`


    `</tr>`


    `<?php } ?>`


    `</table>`


    `<?php }`


    `} ?>`


    *   Most of this code is the same as was used in PHP Solution 11-7\. The difference
    lies in the `while` loop that displays the results. Instead of using the `fetch_assoc()`
    method on a result object and storing the result in `$row`, it simply calls the
    `fetch()` method on the prepared statement. There’s no need to store the current
    record as `$row`, because the values from each column have been bound to `$image_id`,
    `$filename`, and `$caption`.


    You can compare your code with `mysqli_prepared_02.php` in the `ch11` folder.


    ### Embedding variables in PDO prepared statements


    PDO prepared statements offer the choice of anonymous and named placeholders.


    #### Using anonymous placeholders


    Anonymous placeholders use question marks in exactly the same way as MySQLi:


    `$sql = ''SELECT image_id, filename, caption FROM images WHERE caption LIKE ?'';`


    #### Using named placeholders


    Named placeholders begin with a colon, like this:


