    **input( field[string], options[array] )**


    Perhaps no other helper function is quite so versatile as the $form->input() function.
    This tool works both to receive and to send data; when receiving data, it will
    display its contents in a form element, and when sending it, it will handle all
    the form fields and naming conventions so that the controller and model can parse
    the user’s data automatically. Each of the form input elements is rendered by
    this function as well. When data validation errors or messages are sent back to
    the view, this function also renders those messages and highlights the field,
    if desired. By sticking with this function, many of the typical form structures
    are reduced to less code (often just one line).


