    The try and catch keywords are used to handle **exceptions**.


    **PHP 5 EXCEPTION HANDLING**


    In Chapter 2, you implemented the code that intercepts and handles (and eventually
    reports) errors that happen in the HatShop site. **PHP errors** are the standard
    mechanism that you can use to react with an error happening in your PHP code.
    When a PHP error occurs, the execution stops; you can, however, define an error-handling
    function that is called just before the execution is terminated. You added such
    a function in Chapter 2, where you obtain as many details as possible about the
    error and log them for future reference.


    Having those details, a programmer can fix the code to avoid the same error happening
    in the future.


    PHP 5 introduced, along with other OOP features, a new way to handle runtime errors:
    enter exceptions.


    Exceptions represent the modern way of managing runtime errors in your code and
    are much more powerful and flexible than PHP errors. Exceptions are a very important
    part of the OO (Object Oriented) model, and PHP


    5 introduces an exception model resembling that of other OOP languages such as
    Java and C#. However, exceptions in PHP coexist with the standard PHP errors in
    a strange combination, and you can’t solely rely on exceptions for dealing with
    runtime problems. Some PHP extensions, such as PDO, can be configured to generate
    exceptions to signal problems that happen at runtime, whereas in other cases,
    your only option is to deal with standard PHP errors.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH03.qxd 11/8/06 9:45 AM Page 85


    C H A P T E R 3 ■ C R E AT I N G T H E P R O D U C T C ATA L O G : PA RT I **85**


    The advantages of exceptions over errors lies in the flexibility you’re offered
    in handling them. When an exception is generated, you can handle it locally and
    let your script continue executing normally, or you can pass the exception to
    another class for further processing. With exceptions, your script isn’t terminated
    like what happens when a PHP error appears. When using exceptions, you place the
    code that you suspect could throw an exception inside a try block and handle potential
    exceptions in an associated catch block: try


    {


    // Code that could generate an exception that you want to handle


    }


    catch (Exception $e)


    {


    // Code that is executed when an exception is generated


    // (exception details are accessible through the $e object)


    }


    When an exception is generated by any of the code in the try block, the execution
    is passed directly to the catch block. Unless the code in the catch block rethrows
    the exception, it is assumed that it handled the exception, and the execution
    of your script continues normally. This kind of flexibility allows you to prevent
    many causes that could make your pages stop working, and you’ll appreciate the
    power exceptions give you when writing PHP code!


    A PHP 5 exception is represented by the Exception class, which contains the exception’s
    details. You can generate (throw) an exception yourself using the throw keyword.
    The Exception object that you throw is propagated through the call stack until
    it is intercepted using the catch keyword. The call stack is the list of methods
    being executed. So if a function A() calls a function B(), which in turn calls
    a function C(), then the call stack will be formed of these three methods. In
    this scenario, an exception that is raised in function C() can be handled in the
    same function, provided the offending code is inside a try-catch block. If this
    is not the case, the exception propagates to method B(), which has a chance to
    handle the exception, and so on. If no method handles the exception, the exception
    is finally intercepted by the PHP interpreter, which transforms the exception
    into a PHP fatal error.


    In our database handling code, we’ll catch the potential exceptions that could
    be generated by PDO.


    Although it doesn’t do it by default, PDO can be instructed to generate exceptions
    in case something goes wrong when executing an SQL command or opening a database
    connection, like this:


    // Create a new PDO class instance


    $handler = new PDO( ... );


    // Configure PDO to throw exceptions


    self::$_mHandler->setAttribute(PDO::ATTR_ERRMODE,


    PDO::ERRMODE_EXCEPTION);


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH03.qxd 11/8/06 9:45 AM Page 86


    **86**


    C H A P T E R 3 ■ C R E AT I N G T H E P R O D U C T C ATA L O G : PA RT I We
    catch these exceptions, and we pass the error details to the error-handling code
    you wrote in Chapter 2\. The following code snippet shows a short function with
    this functionality implemented:


    // Wrapper method for PDOStatement::fetch


    public static function GetRow($statementHandler, $params = null, $fetchStyle =
    PDO::FETCH_ASSOC)


    {


    // Initialize the return value to null


    $result = null;


    // Try executing the prepared statement received as parameter try


    {


    self::Execute($statementHandler, $params);


    $result = $statementHandler->fetch($fetchStyle);


    }


    catch(PDOException $e)


    {


    // Close the database handler and trigger an error


    self::Close();


    trigger_error($e->getMessage(), E_USER_ERROR);


    }


    // Return the query results


    return $result;


    }


    Issuing Commands Using the Connection


    After opening the connection, you’re now at the stage we’ve been aiming for from
    the start: executing SQL commands through the connection.


    You can execute the command in many ways, depending on the specifics. Does the
    SQL


    query you want to execute return any data? If so, what kind of data, and in which
    format? The PDO methods that we’ll use to execute SQL queries are


    • PDOStatement::execute is used to execute an INSERT, an UPDATE, or DELETE query.


    • PDOStatement::fetch is used to retrieve one row of data from the database.


    • PDOStatement::fetchAll is used to retrieve multiple rows of data from the database.


    • PDO::prepare prepares an SQL query to be executed, creating a so-called *prepared
    statement*.


    A **prepared statement** is a parameterized SQL query whose parameter values are
    replaced by either parameter markers (?) or named variables (:variable_name),
    like in these examples: $query1 = "SELECT name FROM department WHERE department_id
    = ?"


    $query1 = "SELECT name FROM department WHERE department_id = :dept_id"


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH03.qxd 11/8/06 9:45 AM Page 87


    C H A P T E R 3 ■ C R E AT I N G T H E P R O D U C T C ATA L O G : PA RT I **87**


    To execute a prepared statement, you supply the parameter values to the functions
    that execute your query, which take care to build the complete SQL query for you.
    To implement the list of departments, you won’t need to work with parameters,
    but you’ll learn how to handle them in Chapter 4.


    Nonprepared statements can be executed with PDO using the PDO::exec, in which
    case, you need to create the string of the SQL query, including its parameters.
    In this book, we’ll always use prepared statements because they bring two important
    benefits:


    • Parameter values are checked to prevent injection attacks.


    • The query will likely execute faster with prepared statements because the database
    server can reuse the access plan it builds for a prepared statement.


    To be able to reuse more of the database handling code and to have a centralized
    error-handling mechanism for the database code, we won’t be using the PDO methods
    directly from the business tier of our application. Instead, we’ll wrap the PDO
    functionality into a class named DatabaseHandler, and we’ll use this class from
    the other classes of the business tier.


    **Writing the Business Tier Code**


    Okay, let’s write some code! You’ll start by writing the DatabaseHandler class,
    which will be a support class that contains generic functionality needed in the
    other business tier methods.'
