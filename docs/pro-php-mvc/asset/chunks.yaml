- fmt: "This completes the requirements set forth by our goals for this chapter. By\
    \ now, you should have a fully functional registration and login system, which\
    \ creates database records and saves to a session. It could do with a lot of polish\
    \ (which we will be adding later on), but is, nonetheless, a fair achievement!\n\
    \n> **Note:** The PHP `serialize()`/`unserialize()` methods are useful for turning\
    \ many kinds of PHP data types into their string representations. This is most\
    \ useful for taking objects (in memory) and turning them into a format that is\
    \ easy to store. We save the string representation of the user object to the session,\
    \ as it is much easier to imagine saving such data to any kind of session provider.\
    \ It’s not strictly needed with server sessions, but the more portable we make\
    \ the session management, the easier it will be to develop (and utilize) other\
    \ session drivers. Think ahead!\n\nI have included the following listings, for\
    \ the sake of completeness. They outline the full structure of the `Users` controller\
    \ (Listing 14-16), the `User` model (Listing 14-17), and the `Shared\\Model` subclass\
    \ (Listing 14-18).\n\n---\n\n**Listing 14-16.** The `Users` Controller\n\n```php\n\
