    \ (returning `false`) and to the Null Object (returning `true`):\n\n```\n// listing\
    \ 11.61\nif (! $unit->isNull()) {\n// do something\n} else {\nprint \"null - no\
    \ action\\n\";\n}\n```\n\nThat gives us the best of both worlds. Any method of\
    \ a `NullUnit` object can be safely called. And any `Unit` object can be queried\
    \ for null status.\n\n## Summary\n\nIn this chapter, I wrapped up my examination\
