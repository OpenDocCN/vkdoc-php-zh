    class MyClass {}

    namespace foo;

    use my\MyClass as MyAlias;

    $obj = new MyAlias();

    ```


    使用括号语法时，任何`use`指令都放在最顶层作用域的开头花括号之后。


    ```php

    namespace foo;

    {

    use my\MyClass as MyAlias;

    $obj = new MyAlias();

    }

    ```


    `as`子句可以省略，此时成员以其当前名称被导入。


    ```php

    namespace foo; use \my\MyClass;

    $obj = new MyClass();

    ```


    不可能一次批量导入另一个命名空间的所有成员。然而，有一个语法快捷方式可以在同一个`use`语句中导入多个成员。


    ```php

    namespace foo;

    use my\Class1 as C1, my\Class2 as C2;

    ```


    PHP 7 进一步简化了此语法，允许`use`声明在花括号内分组。


    ```php

    namespace foo; use my\{ Class1 as C1, Class2 as C2 };

    ```


    除了类、接口和命名空间之外，PHP 5.6 扩展了`use`结构以支持函数和常量别名。它们分别通过`use function`和`use const`结构导入。


    ```php

    namespace my\space {

    const C = 5;

    function f() {}

    }

    namespace {

    use const my\space\C;

    use function my\space\f;

    }

    ```


    请记住，别名仅适用于定义它们的脚本文件。因此，被导入的文件不会继承父文件的别名。


    ## 命名空间关键字


    `namespace`关键字可以作为一个常量使用，其值为当前命名空间，或者在全局代码中为空字符串。它可以用来显式地引用当前命名空间。


    ```php

    namespace my\name

    {

    function myPrint() { echo ''Hi''; }

    }

    namespace my

    {

    namespace\name\myPrint(); // "Hi"

    name\myPrint();           // "Hi"

    }

    ```


    ## 命名空间指南


    随着 Web 应用程序中涉及的组件数量增长，名称冲突的可能性也在增加。一个解决方案是用组件名作为名称的前缀。然而，这会产生很长的名称，降低了源代码的可读性。因此，PHP
    5.3 引入了命名空间，它允许开发者为每个组件将代码分组到独立命名的容器中。


    # 27. 引用


    引用是一种别名，允许两个不同的变量写入同一个值。使用引用可以执行三种操作：引用赋值、引用传递和引用返回。


    ## 引用赋值


    通过在要绑定的变量前放置一个与号（`&`）来分配引用。


    ```php

    $x = 5;

    $r = &$x; // r 是 x 的引用

    $s =& $x; // 另一种语法

    ```


    该引用随后成为该变量的别名，可以像原始变量一样使用。


    ```php

    $r = 10; // 给 $r/$x 赋值

    echo $x; // "10"

    ```


    ## 引用传递


    在 PHP 中，函数参数默认是按值传递的。这意味着传递的是变量的一个本地副本；因此如果副本被修改，不会影响原始变量。


    ```php

    function myFunc($x) { $x .= '' World''; }

    $x = ''Hello'';

    myFunc($x); // 传递 x 的值

    echo $x;    // "Hello"

    ```

