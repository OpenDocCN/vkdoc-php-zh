  trans: '

    市面上有许多工具可供选择。不过，即便经历了这么多时间，我通常还是会回到那个历史悠久的 Bugzilla（`http://www.bugzilla.org`）。Bugzilla
    是一款免费且开源的工具，拥有大多数开发者可能需要的所有功能。它是一个可下载的产品，因此你需要在自有服务器上运行它。它的界面看起来仍有些 Web 1.0 的风格，但这并不影响它的实用性。如果你不想自行托管追踪器，或者你更喜欢（并能负担得起）更美观的界面，那么可以考虑
    Atlassian 的 SAAS 解决方案 Jira（`https://www.atlassian.com/software/jira`）。


    对于高级任务追踪和项目规划（尤其是如果你对使用看板系统感兴趣），你还可以看看 Trello（`http://www.trello.com`）。


    追踪器通常只是你为了共享项目信息而想使用的协作工具套件中的一部分。你可以花些钱使用集成解决方案，例如 Basecamp（`https://basecamp.com/`）或
    Atlassian 工具（`https://www.atlassian.com/`）。或者，你也可以选择使用各种工具自行拼凑一个工具生态系统。例如，为了促进团队内部的沟通，你很可能需要一个聊天或消息传递机制。在撰写本文时，最流行的此类工具或许是
    Slack（`https://www.slack.com`）。Slack 是一个基于 Web 的多房间聊天环境。如果你像我一样守旧，你可能会立刻想到 IRC（互联网中继聊天）——没错，用
    Slack 能做的事情，用 IRC 几乎都能做到。但 Slack 的优势在于它基于浏览器、易于使用，并且内置了与其他服务的集成。Slack 是免费的，除非你需要高级功能。


    说到守旧，你也可以考虑为你的项目使用邮件列表。我最喜欢的邮件列表软件是 Mailman（`http://www.gnu.org/software/mailman/`），它是免费的，安装相对简单，而且可配置性极高。


    对于需要协作编辑的文本文件和电子表格，Google Docs（`https://docs.google.com/`）可能是最简单的解决方案。


    你的代码并不像你想象的那么清晰。初次接触代码库的陌生人可能会面临一项艰巨的任务。即使是作为代码的作者，你最终也会忘记代码是如何组合在一起的。对于内联文档，你应该看看
    phpDocumentor（`https://www.phpdoc.org/`），它允许你边写代码边生成文档，并自动生成带超链接的输出。phpDocumentor
    的输出在面向对象的上下文中特别有用，因为它允许用户在各个类之间点击跳转。由于类通常包含在各自的文件中，直接阅读源码可能需要跨越多个源文件，追踪复杂的线索。


    虽然内联文档很重要，但项目也会产生大量书面材料。这包括使用说明、关于未来方向的咨询、客户资产、会议记录和聚会公告。在项目的生命周期中，这些材料是动态变化的，通常需要一种机制来让人们协作处理它们的演变。


    维基（wiki 在夏威夷语中显然意为“非常快”）是创建协作式超链接文档网络的完美工具。只需点击一下按钮，就可以创建或编辑页面，并且系统会自动为与页面名称匹配的单词生成超链接。维基是另一种看似简单、必要且显而易见的工具，你肯定会觉得自己很可能先想到了这个主意，只是没抽出时间把它付诸实践而已。有很多维基可供选择。我在
    PhpWiki 和 DokuWiki 上有过良好的体验。你可以从 `http://phpwiki.sourceforge.net` 下载 PhpWiki，而
    DokuWiki 可以在 `http://wiki.splitbrain.org/wiki:dokuwiki` 找到。


    ## 总结


    在本章中，我总结了全书，重新审视了构成这本书的核心主题。虽然我没有在此解决诸如单个模式或对象函数等具体问题，但本章应该能作为本书关注点的一个合理总结。


    我们永远没有足够的空间或时间来涵盖所有想要讨论的内容。尽管如此，我希望这本书能够论证一个观点：PHP 正在走向成熟。它如今已是全球最流行的编程语言之一。我希望
    PHP 仍然是爱好者们最喜欢的语言，也希望许多新的 PHP 程序员会惊喜地发现，仅凭少量代码他们就能走多远。但同时，越来越多的专业团队正在使用 PHP 构建大型系统。这类项目需要的不仅仅是一种“只管去做”的方法。通过其扩展层，PHP
    一直是一种多功能语言，为数百种应用程序和库提供了入口。另一方面，它的面向对象支持使你能够访问一套不同的工具。一旦你开始以对象的方式思考，你就可以借鉴其他程序员来之不易的经验。你可以导航和部署那些不仅参考了
    PHP，还参考了 Smalltalk、C++、C# 或 Java 而开发出来的模式语言。我们负有责任，以精心的设计和良好的实践来迎接这一挑战。未来是可复用的。


