  ?>


  <form action="multiplevalueexample.php" method="post"> What''s your favorite programming
  language?<br /> (check all that apply):<br />


  <input type="checkbox" name="languages[]" value="csharp" />C#<br />


  <input type="checkbox" name="languages[]" value="jscript" />JavaScript<br />


