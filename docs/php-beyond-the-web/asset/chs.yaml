  \ |\n\n\n\n### 9.13 银弹 #5 - JIT 编译器和替代虚拟机\n\n在详细讨论它们之前，我先定义几个将要使用的术语，以防你对此不熟悉。\n\
  \n-   `虚拟机`, 或称 `VM`。这通常指的是我们过去所谓的解释器。具体来说，我们这里讨论的是更正式的名称——“进程虚拟机”，而不是通常运行在像 `VirtualBox`\
  \ 等平台上的虚拟化操作系统——“系统虚拟机”。当你编写 `PHP` 代码（或许多其他编程语言如 `Python` 或 `Java` 的代码）时，代码并不会像\
  \ `C` 语言那样直接编译成机器可执行指令。它首先被编译成一组中间指令，然后由虚拟机或解释器执行。`VM` 通常用 `C` 语言编写，并自行编译成机器可执行代码。这意味着用\
  \ `PHP` 编写的代码实际上是平台无关的，也就是说，它不需要了解特定平台上可用的指令集。`VM` 会处理这些细节（这就是为什么你会找到为 Windows、Linux、Mac\
  \ 等平台单独下载的 `PHP` 可执行文件，但绝大多数 `PHP` 脚本本身并不需要为不同平台准备不同的脚本）。\n\n| ![信息](img/image00248.jpeg)\
  \ | **延伸阅读** 维基百科上的进程虚拟机 [`en.wikipedia.org/wiki/Virtual_machine#Process_virtual_machines`](http://en.wikipedia.org/wiki/Virtual_machine#Process_virtual_machines)\
  \ |\n\n-   `JIT 编译器`: `JIT` 代表“Just In Time”（即时编译）。与预先完全编译（如 `C`）或在每个脚本运行开始时编译（如传统\
  \ `PHP`）不同，`JIT` 编译器会在代码运行时，“实时”地按函数逐一编译代码。这样做的好处是：a) 只需要编译那些实际执行的代码，b) 编译器可以利用运行时信息（例如当前变量类型，在像\
  \ `PHP` 这样的动态类型语言中，这些类型直到运行时才确定）来生成更优化的代码。简而言之，它们比传统解释器更快。\n\n| ![信息](img/image00248.jpeg)\
  \ | **延伸阅读** 维基百科上的 `JIT` 编译 [`en.wikipedia.org/wiki/Just-in-time_compilation`](http://en.wikipedia.org/wiki/Just-in-time_compilation)\
  \ |\n\n现在 `PHP` 有几种可选的 `VM`，其中最新的一些在 `PHP` 社区引起了波澜。`HHVM` 是 Facebook HipHop 项目（上文编译器部分已讨论）的最新成果，因其内置的\
  \ `JIT` 编译器而备受关注。它确实值得关注，因为在某些基准测试中，它比其取代的 `HPHPc` 编译器快 40% 以上，更自然地适配大多数生产工作流程，并且与\
  \ `PHP` 及其扩展具有更好的兼容性。\n\n还有其他一些可用的 `VM` 和 `JIT`，如下所列。然而，包括 `HHVM` 在内的所有这些方案，都存在一些共同的缺点。\n\
  \n-   **对 `PHP` 及其扩展的覆盖有限** – 它们中没有一个能完全覆盖 `PHP` 和常用扩展。`HHVM` 团队最近承诺会支持主流的 `PHP`\
  \ 框架和应用，但目前尚未完全实现（尽管在撰写本文时，他们已经设法让 27 个非常常见的框架和应用在 `HHVM` 下运行）。其他 `VM`，如 `PHP-QB`，明确声明只专注于\
  \ `PHP` 的特定子集，因此并非通用解决方案。因此，在考虑使用替代 `VM` 时，你需要全面测试（并可能需要修改）你的代码。\n-   **并非所有替代 `VM`\
  \ 在所有任务上都更快** – 例如，`HHVM` 中的 `JIT` 需要多次运行 CLI 脚本，才能积累足够的信息来生成优化代码。正如 Sara Golemon\
  \ 在“PHP 内部”邮件列表中所写：\n\n> *“作为 HipHop（`HHVM`）开源版本的维护者，我首先承认官方的 `PHP` 引擎和运行时具有更广泛的平台/架构支持、更强大的社区以及更庞大的扩展和功能库。此外，由于其生命周期设计，`PHP`\
  \ 在单次运行的命令行脚本上表现优于 `HHVM`。*\n> \n> *另一方面，`HHVM` 在处理 Web 请求方面的确比 `Apache+PHP` 表现更好。如果\
  \ Facebook 使用普通的 `PHP`，我们将需要至少 5 倍数量的 Web 服务器（而且我们现在已经用了很多）。这并不是说 `PHP` 不快，但使用松散类型的解释型字节码永远无法与原生机器码和严格类型保持同步。”*\
  \ [`marc.info/?l=php-internals&m=135399266632008&w=2`](http://marc.info/?l=php-internals&m=135399266632008&w=2)\n\
  \n因此，你需要针对自己的典型使用场景，对每个可能的 `VM` 进行基准测试，以确保真正获得所需的性能提升。\n\n值得关注的是 `PHP7`，即 `PHP`\
  \ 官方“下一代”版本。在撰写本文时，这个新版本计划于今年晚些时候发布。其承诺的功能之一是“提前编译”（`AOT`）编译器，它在某些方面与 `JIT` 类似。它的优点是不需要“预热”，因此可能为单次运行的\
  \ CLI 脚本提供比 `HHVM` 更好的性能提升。\n\n| ![](img/image00249.gif) | ***`HHVM`*** |\n| ---\
