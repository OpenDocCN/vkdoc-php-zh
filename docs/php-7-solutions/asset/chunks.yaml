- fmt: 'You can convert a site-root-relative path to an absolute one by concatenating
    the superglobal variable `$_SERVER[''DOCUMENT_ROOT'']` to the beginning of the
    path, like this:


    ```

    require $_SERVER[''DOCUMENT_ROOT''] . ''/includes/filename.php'';

    ```


    Most servers support `$_SERVER[''DOCUMENT_ROOT'']`, but check the PHP Variables
    section at the bottom of the configuration details displayed by `phpinfo()` on
    your remote server to make sure.


    ## Links Inside Include Files


    This is the point that tends to confuse many people. PHP and browsers interpret
    paths that begin with a forward slash differently. So, although you can’t use
    a site-root-relative link to include a file, the links *inside* an include file
    should normally be relative to the site root. This is because an include file
    can be included at any level of the site hierarchy, so document-relative links
    break when a file is included at a different level.


    > **Note:** The navigation menu in `menu.php` uses document-relative links rather
    than ones relative to the site root. They have been deliberately left like that
    because, unless you have created a virtual host, the site root is `localhost`,
    not `phpsols-4e`. This is a disadvantage of testing a site in a subfolder of the
    web server’s document root. The Japan Journey site used throughout this book has
    only one level, so the document-relative links work. When developing a site that
    uses multiple levels of folders, use site-root-relative links inside your include
    files and consider setting up a virtual host for testing (see Chapter [2](#332054_4_En_2_Chapter.xhtml)
    for details).


    ## Choosing Where to Locate Your Include Files


    A useful feature of PHP include files is that they can be located anywhere, as
    long as the page with the `include` command knows where to find them. Include
    files don’t even need to be inside your web server root. This means that you can
    protect include files that contain sensitive information, such as passwords, in
    a private directory (folder) that cannot be accessed through a browser.


    > **Tip:** If your hosting company provides a storage area outside your server
    root, you should seriously consider locating some, if not all, of your include
    files there.


    ## Security Considerations with Includes


    Include files are a very powerful feature of PHP. With that power come security
    risks. As long as the external file is accessible, PHP includes it and incorporates
    any code into the main script. Technically speaking, include files can even be
    on a different server. However, this is considered such a security risk that the
    configuration directive `allow_url_include` is disabled by default, so it’s impossible
    to include files from a different server unless you have complete control over
    your server’s configuration. Unlike `include_path`, the `allow_url_include` directive
    cannot be overridden except by the server administrator. Even if you control both
    servers yourself, you should never include a file from a different server. It’s
    possible for an attacker to spoof the address and try to execute a malicious script
    on your site. Never include files that can be uploaded or overwritten by the public.


    > **Note:** The remaining sections of this chapter are rather technical. They
    are provided primarily as a reference. Feel free to skip over them.


    ## Adjusting Your `include_path`


    An `include` command expects either a relative path or an absolute path. If neither
    is given, PHP automatically looks in the `include_path` specified in your PHP
    configuration. The advantage of locating include files in a folder specified in
    your web server’s `include_path` is that you don’t need to worry about getting
    the relative or absolute path correct. All you need is the filename. This can
    be very useful if you use a lot of includes or you have a site hierarchy several
    levels deep. There are three ways to change the `include_path`:


    *   **Edit the value in** `php.ini`: If your hosting company gives you access
    to `php.ini`, this is the best way to add a custom includes folder.

    *   **Use** `.htaccess` **or** `.user.ini`: If your hosting company allows changes
    to the configuration with an `.htaccess` or `.user.ini` file, this is a good alternative.

    *   **Use** `set_include_path()`: Use this only if the previous options are not
    available to you, because it affects the `include_path` only for the current file.


    The value of the `include_path` for your web server is listed in the Core section
    of the configuration details when you run `phpinfo()`. It normally begins with
    a period, which indicates the current folder, and is followed by the absolute
    path of each folder to be searched. On Linux and macOS, each path is separated
    by a colon. On Windows, the separator is a semicolon. On a Linux or Mac server,
    your existing `include_path` directive might look like this:


    ```

    .:/php/PEAR

    ```


    On a Windows server, the equivalent would look like this:


    ```

    .;C:\php\PEAR

    ```


    ### Editing the `include_path` in `php.ini` or `.user.ini`


    In `php.ini`, locate the `include_path` directive. To add a folder called `includes`
    in your own site, add a colon or semicolon—depending on your server’s operating
    system—at the end of the existing value, followed by the absolute path to the
    `includes` folder.


    On a Linux or Mac server, use a colon like this:


    ```

    include_path=".:/php/PEAR:/home/mysite/includes"

    ```


    On a Windows server, use a semicolon:


    ```

    include_path=".;C:\php\PEAR;C:\sites\mysite\includes"

    ```


    The commands are the same for a `.user.ini` file. The value in `.user.ini` overrides
    the default, so make sure you copy the existing value from `phpinfo()` and add
    the new path to it.


    ### Using `.htaccess` to Change the `include_path`


    The value in an `.htaccess` file overrides the default, so copy the existing value
    from `phpinfo()` and add the new path to it. On a Linux or Mac server, the value
    should be similar to this:


    ```

    php_value include_path ".:/php/PEAR:/home/mysite/includes"

    ```


    The command is the same on Windows, except that you separate the paths with a
    semicolon:


    ```

    php_value include_path ".;C:\php\PEAR;C:\sites\mysite\includes"

    ```


    > **Caution:** In `.htaccess`, do not insert an equal sign between `include_path`
    and the list of path names.


    ### Using `set_include_path()`


    Although `set_include_path()` affects only the current page, you can easily create
    a code snippet and paste it into pages in which you want to use it. PHP also makes
    it easy to get the existing `include_path` and combine it with the new one in
    a platform-neutral way.


    Store the new path in a variable and then combine it with the existing value,
    like this:


    ```

    $includes_folder = ''/home/mysite/includes'';

    set_include_path(get_include_path() . PATH_SEPARATOR . $includes_folder);

    ```


    It looks as though three arguments are being passed to `set_include_path()`, but
    it’s only one; the three elements are joined by the concatenation operator (a
    period), not commas.


    *   `get_include_path()` gets the existing `include_path`.

    *   `PATH_SEPARATOR` is a PHP constant that automatically inserts a colon or semicolon
    depending on the operating system.

    *   `$includes_folder` adds the new path.


    The problem with this approach is that the path to the new `includes` folder won’t
    be the same on your remote and local testing servers. You can fix that with a
    conditional statement. The superglobal variable `$_SERVER[''HTTP_HOST'']` contains
    the domain name of the web site. If your domain is `www.example.com`, you can
    set the correct path for each server like this:


    ```

    if ($_SERVER[''HTTP_HOST''] == ''www.example.com'') {

    $includes_folder = ''/home/example/includes'';

    } else {

    $includes_folder = ''C:/xampp/htdocs/phpsols-4e/includes'';

    }

    set_include_path(get_include_path() . PATH_SEPARATOR . $includes_folder);

    ```


    Using `set_include_path()` is probably not worthwhile for small web sites that
    don’t use many include files. However, you might find it useful on more complex
    projects.'
