  \ 对象的 `setMaxSize()` 方法，如下所示：\n\n```\n$loader = new Upload($destination);\n$loader->setMaxSize($max);\n\
  $loader->upload();\n$result = $loader->getMessages();\n```\n\n通过更改 `$max` 的值并将其作为参数传递给\
  \ `setMaxSize()`，你可以同时影响表单隐藏字段中的 `MAX_FILE_SIZE` 和类内部存储的最大值。\n\n**注意**\n\n对 `setMaxSize()`\
  \ 的调用必须在你使用 `upload()` 方法之前进行。在文件已经保存后更改类中的最大大小是没有意义的。\n\n\n\n保存`file_upload_php`并再次测试。选择一个之前未使用过的图片，或删除`upload_test`文件夹的内容。第一次尝试时，你可能只会看到一条文件过大的消息。检查`upload_test`文件夹以确认文件没有被传输。\n\
  \n再试一次。这次，你应该会看到类似图 6-6 的结果。\n\n![A978-1-4842-0635-5_6_Fig6_HTML.jpg](img/A978-1-4842-0635-5_6_Fig6_HTML.jpg)\n\
  \n图 6-6.\n\n大小限制生效了，但检查 MIME 类型时出现错误\n\n这是怎么回事？第一次可能没有看到关于允许文件类型的消息，原因是隐藏字段中`MAX_FILE_SIZE`的值直到你在浏览器中重新加载表单时才会刷新。第二次出现错误消息是因为更新后的`MAX_FILE_SIZE`值阻止了文件上传。因此，`$_FILES`数组的`type`元素为空。你需要调整`checkType()`方法来解决这个问题。\n\
  \n在`Upload.php`中，修改`checkType()`的定义如下：\n\n```\nprotected function checkType($file)\
  \ {\n\n    if (in_array($file['type'], $this->permitted)) {\n\n        return true;\n\
  \n    } else {\n\n        if (!empty($file['type'])) {\n\n            $this->messages[]\
  \ = $file['name'] . ' is not permitted \n\ntype of file.';\n\n        }\n\n    \
  \    return false;\n\n    }\n\n}\n```\n\n如果文件大小超过了表单隐藏字段中`MAX_FILE_SIZE`指定的限制，则不会上传任何内容，因此`$_FILES`数组的`type`元素为空。高亮显示的代码添加了一个新条件，仅在`$file['type']`不为空时才创建错误消息。\n\
  \n注意\n\n这样做的缺点是不会在文件类型不可接受时警告用户。然而，这比仅仅因为文件太大而显示关于允许类型的虚假警告更可取。\n\n保存类定义并再次测试`file_upload.php`。这次你应该只看到文件过大的消息。将`file_upload.php`顶部的`$max`值重置为`51200`。现在你应该能够上传图片了。如果第一次失败，那是因为`MAX_FILE_SIZE`还没有在表单中刷新。通过以下方式在`Upload`对象上调用`allowAllTypes()`方法来测试它（新代码行必须在调用`upload()`方法之前）：\n\
  \n```\n$loader = new Upload($destination);\n$loader->setMaxSize($max);\n$loader->allowAllTypes();\n\
  $loader->upload();\n$result = $loader->getMessages();\n```\n\n尝试上传任何类型的文件。只要它小于\
  \ 50 KB，就应该会成功上传。如有必要，将`$max`的值更改为一个足够大的数字。\n\n提示\n\n使用计算来设置`$max`的值。例如：`$max =\
  \ 600 * 1024; // 600 KB`。\n\n你可以对照`ch06/PhpSolutions/File`文件夹中的`Upload_03.php`来检查你的类定义。`ch06`文件夹中的`file_upload_06.php`包含了上传表单的更新版本。\n\
  \n到现在，我希望你已经理解了 PHP 类是如何由专门执行单一任务的函数（方法）构建的。修复关于图片不是允许类型的错误消息正因为该消息只能来自`checkType()`方法而变得简单。方法定义中使用的大部分代码都依赖于内置的\
  \ PHP 函数。一旦你学会了哪些函数最适合手头的任务，构建一个类——或任何其他 PHP 脚本——就变得容易多了。\n\n### 显式更改数据类型\n\n大多数时候，你不需要担心变量或值的数据类型。严格来说，通过表单提交的所有值都是字符串，但\
  \ PHP 会静默地将数字转换为适当的数据类型。这种自动的类型转换非常方便。但有时，你需要确保一个值是特定的数据类型。在这种情况下，你可以通过在值前面加上括号括起来的数据类型名称来将其强制转换（或更改）为所需的类型。你在\
  \ PHP Solution 6-4 中看到了这样一个例子，它将一个数值强制转换为整数，如下所示：\n\n```\n$this->max = (int) $num;\n\
  ```\n\n如果该值已经是目标类型，则保持不变。表 6-4 列出了 PHP 中使用的强制转换运算符。\n\n表 6-4.\n\nPHP 强制转换运算符\n\n\
  | 运算符 | 替代写法 | 转换为 |\n| :--- | :--- | :--- |\n| `(array)` |  | 数组 |\n| `(bool)`\
  \ | `(boolean)` | 布尔值（`true` 或 `false`） |\n| `(float)` | `(double)`， `(real)` |\
  \ 浮点数 |\n| `(int)` | `(integer)` | 整数 |\n| `(object)` |  | 对象 |\n| `(string)` |\
  \  | 字符串 |\n| `(unset)` |  | Null |\n\n要了解更多关于特定类型之间强制转换时的行为，请参阅在线文档：[`http://php.net/manual/en/language.types.type-juggling.php`](http://php.net/manual/en/language.types.type-juggling.php)\n\
  \n### 使潜在危险的文件无害化\n\nPHP Solution 6-4 中添加的`allowAllTypes()`方法使`Upload`类更灵活，但这也让你的服务器面临有人上传可执行文件并尝试运行它的风险。为了减轻这些风险，你可以自动为某些类型的文件名添加后缀。如果有人将`dosomedamage.php`上传到你的站点，你可以通过将名称更改为`dosomedamage.php.upload`来使其无害。\n\
  \n\n\n#### PHP 解决方案 6-5：检查并修正文件名\n\n本 PHP 解决方案演示了如何通过为没有文件扩展名或扩展名不受信任的文件名可选地附加 `.upload`，来消除潜在危险文件的安全隐患。同时，它还会检查文件名，将空格替换为下划线。\n\
  \n继续使用上一个 PHP 解决方案中的 `Upload.php` 文件进行操作。或者，也可以使用 `ch06/PhpSolutions/File` 文件夹中的\
  \ `Upload_03.php` 文件。\n\n在 `Upload.php` 类的定义顶部，于现有属性之后添加以下三个新的受保护属性：\n\n```\nprotected\
  \ $notTrusted = ['bin', 'cgi', 'exe', 'js', 'pl', 'php', 'py', 'sh'];\nprotected\
  \ $suffix = '.upload';\nprotected $newName;\n```\n\n第一个属性定义了一个包含潜在不安全文件扩展名的数组。第二个属性设置了将附加到风险文件名的默认后缀。第三个属性用于在文件名被更改时存储新的文件名。\n\
  \n> **注意**：`$notTrusted` 数组中的文件扩展名前面没有点号。这是因为检测文件扩展名的 PHP 内置函数会去掉开头的点号。\n\n默认情况下，该类会将\
  \ `.upload` 后缀附加到扩展名位于不可信列表中的文件。但如果只有已注册（且受信任）的用户才能上传文件，你可能不希望发生这种情况。为了使后缀变为可选，请像这样修改\
  \ `allowAllTypes()` 方法的定义：\n\n```\npublic function allowAllTypes($suffix = true)\
  \ {\n    $this->typeCheckingOn = false;\n    if (!$suffix) {\n        $this->suffix\
  \ = '';  // 空字符串\n    }\n}\n```\n\n这为 `allowAllTypes()` 方法添加了 `$suffix` 参数，并将其默认值设置为\
  \ `true`。在函数（方法）定义中为参数赋值会使其变为可选参数。\n\n添加到方法定义中的条件语句使用了取反运算符（`!`）。因此，如果传递给 `allowAllTypes()`\
  \ 的参数是 `false`，则类的 `$suffix` 属性值会被设置为空字符串（一对中间没有任何内容的引号）。实际上，这关闭了为文件名附加后缀的功能。它不会添加\
  \ `.upload`，而是什么都不加。\n\n我们需要在文件上传前所经历的一系列检查中再添加一项检查。请像这样修改 `checkFile()` 方法（为节省篇幅，省略了部分现有代码）：\n\
  \n```\nprotected function checkFile($file) {\n    $accept = true;\n    // 省略了错误和大小检查代码\n\
  \    if ($this->typeCheckingOn) {\n        if (!$this->checkType($file)) {\n   \
  \         $accept = false;\n        }\n    }\n    if ($accept) {\n        $this->checkName($file);\n\
  \    }\n    return $accept;\n}\n```\n\n如果文件未能通过之前的任何一项测试，则无需检查其文件名。因此，加粗显示的代码使用了条件语句，仅在\
  \ `$accept` 为 `true` 时才会调用新方法 `checkName()`。\n\n将 `checkName()` 定义为一个受保护的方法。其第一部分代码如下所示：\n\
  \n```\nprotected function checkName($file) {\n    $this->newName = null;\n    $nospaces\
  \ = str_replace(' ', '_', $file['name']);\n    if ($nospaces != $file['name']) {\n\
  \        $this->newName = $nospaces;\n    }\n}\n```\n\n该方法开始时将 `$newName` 属性设置为\
  \ `null`（换言之，没有值）。该类最终将能够处理多个文件的上传。因此，每次都需要重置该属性。\n\n然后，`str_replace()` 函数将文件名中的空格替换为下划线，并将结果赋值给\
  \ `$nospaces`。`str_replace()` 函数在 PHP 解决方案 4-4 中已有描述。\n\n将 `$nospaces` 的值与 `$file['name']`\
  \ 进行比较。如果两者不相同，则将 `$nospaces` 赋值给 `$newName` 属性。\n\n这样就处理了文件名中的空格问题。接下来，你需要为潜在不安全文件的名称添加后缀。\n\
  \n要判断文件是否潜在不安全，你需要提取文件扩展名。你可以使用 `pathinfo()` 函数来实现。在 `checkName()` 方法的右花括号之前添加以下代码行：\n\
  \n\n\n`$extension = pathinfo($nospaces, PATHINFO_EXTENSION);`\n\n`pathinfo()` 函数的第一个参数是去除了空白的文件名。第二个参数是一个\
  \ PHP 常量，用于指示该函数仅返回文件扩展名。\n\n**注意**：PHP 常量是区分大小写的。`PATHINFO_EXTENSION` 必须全部大写。\n\
  \n只有在 `$typeCheckingOn` 属性为 `false` 且 `$suffix` 属性不为空字符串时，你才需要添加后缀。因此，添加后缀的代码需要被包含在一个同时检查这两个条件的条件语句中。\n\
  \n然后，在该条件语句内部，需要嵌套另一个条件语句来检查文件扩展名是否在 `$notTrusted` 数组中。对于没有扩展名的文件，也最好添加后缀，因为这些文件在\
  \ Linux 服务器上经常被用作可执行文件。在上一步骤插入的行之后，将以下代码添加到 `checkName()` 方法中：\n\n```\nif (!$this->typeCheckingOn\
  \ && !empty($this->suffix)) {\n\nif (in_array($extension, $this->notTrusted) ||\
  \ empty($extension)) {\n\n$this->newName = $nospaces . $this->suffix;\n\n}\n\n}\n\
  ```\n\n嵌套条件语句内部的代码将后缀拼接到不含空格的文件名版本上，并将结果赋给 `$newName` 属性。\n\n如果文件名已通过移除空格、添加后缀或同时进行这两种操作而更改，那么\
  \ `moveFile()` 方法在将文件保存到目标位置时需要使用修改后的名称。像这样更新 `moveFile()` 方法的开头部分：\n\n```\nprotected\
  \ function moveFile($file) {\n\n$filename = isset($this->newName) ? $this->newName\
  \ : $file['name'];\n\n$success = move_uploaded_file($file['tmp_name'],\n\n$this->destination\
  \ . $filename );\n\nif ($success) {\n```\n\n新的第一行使用三元运算符（参见第 3 章中的“使用三元运算符”）为 `$filename`\
  \ 赋值。问号前的条件检查 `$newName` 属性是否已由 `checkName()` 方法设置。如果已设置，则使用新名称。否则，将 `$file['name']`（包含来自\
  \ `$_FILES` 数组的原始值）赋给 `$filename`。\n\n在第二行中，`$filename` 替换了拼接到 `$destination` 属性的值。因此，如果名称已更改，则使用新名称来存储文件。但如果没有进行任何更改，则使用原始名称。\n\
  \n让用户知道文件名是否已被更改是一个好主意。对 `moveFile()` 中用于在文件成功上传时创建消息的条件语句进行如下修改：\n\n```\nif ($success)\
  \ {\n\n$result = $file['name'] . ' was uploaded successfully';\n\nif (!is_null($this->newName))\
  \ {\n\n$result .= ', and was renamed ' . $this->newName;\n\n}\n\n$this->messages[]\
  \ = $result;\n\n}\n```\n\n如果 `$newName` 属性不为 `null`，说明文件已被重命名，并且该信息会通过组合连接运算符（`.=`）添加到存储在\
  \ `$result` 中的消息里。\n\n保存 `Upload.php`，并测试上传文件名中包含空格和/或文件扩展名在 `$notTrusted` 数组中的文件。空格应被替换为下划线，并且应为潜在风险的文件类型添加后缀，如图\
  \ 6-7 所示。\n\n![A978-1-4842-0635-5_6_Fig7_HTML.jpg](img/A978-1-4842-0635-5_6_Fig7_HTML.jpg)\n\
  \n图 6-7. 空格已被替换，并且已为文件名添加后缀\n\n在 `file_upload.php` 中，向 `allowAllTypes()` 传递 `false`\
  \ 作为参数，像这样：\n\n`$loader->allowAllTypes(false);`\n\n保存 `file_upload.php`，并使用一个扩展名在\
  \ `$notTrusted` 数组中的文件再次测试上传表单。这一次，文件名中只有空格会被替换。`.upload` 后缀将不会被添加（见图 6-8）。\n\n\
  ![A978-1-4842-0635-5_6_Fig8_HTML.jpg](img/A978-1-4842-0635-5_6_Fig8_HTML.jpg)\n\n\
  图 6-8. 这一次，后缀没有追加到文件名上\n\n你可以将你的代码与 `ch06/PhpSolutions/File` 文件夹中的 `Upload_04.php`\
  \ 进行核对。\n\n## 防止文件被覆盖\n\n按照目前的脚本，PHP 会自动覆盖现有文件而不发出警告。这可能正是你想要的。另一方面，这也可能是你最可怕的噩梦。该类需要提供一种选择，是覆盖现有文件，还是为其指定一个唯一的名称。\n\
  \n\n\n### PHP 方案 6-6：重命名重复文件\n\n此 PHP 方案对 `Upload` 类进行了改进，增加了在上传文件的扩展名前插入数字的选项，以避免覆盖已存在的同名文件。默认情况下，此选项已启用。\n\
  \n继续使用之前的同一个类定义文件进行操作。或者，使用 `ch06/PhpSolutions/File` 文件夹中的 `Upload_04.php` 文件。\n\
  \n重命名重复文件需要成为可选功能，因此请在类定义顶部的属性列表中添加一个新属性：\n\n`protected $renameDuplicates;`\n\n\
  我们并不创建公共方法来设置该属性的值，而是将其作为 `upload()` 方法的一个可选参数。像这样修改方法定义：\n\n```\npublic function\
  \ upload( $renameDuplicates = true ) {\n    $this->renameDuplicates = $renameDuplicates;\n\
  \    $uploaded = current($_FILES);\n    if ($this->checkFile($uploaded)) {\n   \
  \     $this->moveFile($uploaded);\n    }\n}\n```\n\n正如之前 PHP 方案中所述，通过在函数（方法）定义中为其赋值，可以使参数变为可选。除非你在调用\
  \ `upload()` 方法时传递了 `false` 作为参数，否则这将自动将 `$renameDuplicates` 属性设置为 `true`。\n\n所有重命名重复文件的代码都需要添加到你在上一个\
  \ PHP 方案中创建的 `checkName()` 方法中。在方法结束的花括号前添加以下代码：\n\n```\nif ($this->renameDuplicates)\
  \ {\n    $name = isset($this->newName) ? $this->newName : $file['name'];\n    $existing\
  \ = scandir($this->destination);\n    if (in_array($name, $existing)) {\n      \
  \  // 重命名文件\n    }\n}\n```\n\n条件语句检查 `$renameDuplicates` 属性是 `true` 还是 `false`。只有当它为\
  \ `true` 时，大括号内的代码才会被执行。\n\n条件块内的第一行代码使用三元运算符设置 `$name` 的值。这与 `moveFile()` 方法中使用的技术相同。如果\
  \ `$newName` 属性有值，则该值被赋给 `$name`。否则，使用原始名称。\n\n下一行使用 `scandir()` 函数，该函数返回目录中所有文件和文件夹的数组。传递给\
  \ `scandir()` 的参数是上传文件夹，因此 `$existing` 包含该文件夹中已有文件的数组。\n\n下一行的条件语句将 `$name` 传递给\
  \ `in_array()` 函数，以确定 `$existing` 数组是否包含同名的文件。如果没有匹配项，则无需执行任何操作。\n\n如果在 `$existing`\
  \ 数组中找到了 `$name`，则需要生成一个新名称。在嵌套条件语句内的“重命名文件”注释下添加以下代码：\n\n```\n// 重命名文件\n$basename\
  \ = pathinfo($name, PATHINFO_FILENAME);\n$extension = pathinfo($name, PATHINFO_EXTENSION);\n\
  $i = 1;\ndo {\n    $this->newName = $basename . '_' . $i++;\n    if (!empty($extension))\
  \ {\n        $this->newName .= \".$extension\";\n    }\n} while (in_array($this->newName,\
  \ $existing));\n```\n\n在之前的 PHP 方案中，我们使用 `pathinfo()` 来获取文件扩展名。这次，你需要同时获取文件的基本名和扩展名。你需要再次获取扩展名，因为如果文件类型不受信任，可能会在文件名后附加后缀。\n\
  \n为了获取基本名，传递给 `pathinfo()` 的第二个参数是 `PATHINFO_FILENAME`。现在我们已经将基本名和扩展名分别存储在不同的变量中，因此很容易通过在基本名和扩展名之间插入一个数字来构建新名称。\n\
  \n计数器变量 `$i` 被初始化为 1，然后一个 `do . . . while` 循环从 `$basename`、下划线和计数器 `$i` 开始构建新名称，每次循环运行时\
  \ `$i` 都会递增。条件语句在 `$extension` 不是空字符串时添加一个点和扩展名。循环的条件会持续检查新名称是否在 `$existing` 数组中。\n\
  \n**注意**  \n有关该循环工作原理的说明，请参见第 3 章中的“使用 while 和 do ... while 进行循环”。\n\n假设你要上传一个名为\
  \ `menu.jpg` 的文件，并且上传文件夹中已存在一个同名文件。循环将名称重建为 `menu_1.jpg`，并将结果赋给 `$newName` 属性。然后，循环的条件使用\
  \ `in_array()` 检查 `menu_1.jpg` 是否在 `$existing` 数组中。\n\n如果 `menu_1.jpg` 已存在，循环继续，但递增运算符\
  \ (`++`) 已将 `$i` 增加到 2，因此 `$newName` 变为 `menu_2.jpg`，该名称再次由 `in_array()` 进行检查。循环会一直持续，直到\
  \ `in_array()` 不再找到匹配项。`$newName` 属性中保留的任何值都将用作新的文件名。\n\n保存 `Upload.php` 并在 `file_upload.php`\
  \ 中测试修改后的类。首先，像这样将 `false` 作为参数传递给 `upload()` 方法：\n\n`$loader->upload( false );`\n\
  \n多次上传同一个文件。您应该会收到上传成功的消息，但当您检查 `upload_test` 文件夹的内容时，应该只存在一份该文件的副本。每次上传时它都会被覆盖。\n\
  \n从 `upload()` 调用中移除参数：\n\n`$loader->upload();`\n\n保存 `file_upload.php` 并重复测试，多次上传同一文件。每次上传文件时，您都应该看到一条消息，提示文件已被重命名。\n\
  \n还可以使用扩展名在 `$notTrusted` 数组中的文件进行尝试。默认情况下，数字会插入后缀之前。如果你将 `false` 作为参数传递给 `allowAllTypes()`，则不会添加后缀，数字会插入到文件的正常扩展名之前。\n\
  \n通过检查 `upload_test` 文件夹的内容来查看结果。您应该会看到类似图 6-9 的内容。\n\n如有必要，您可以对照 `ch06/PhpSolutions/File`\
  \ 文件夹中的 `Upload_05.php` 文件检查您的代码。\n\n![A978-1-4842-0635-5_6_Fig9_HTML.jpg](img/A978-1-4842-0635-5_6_Fig9_HTML.jpg)\n\
  \n*图 6-9.*  \n该类会从文件名中移除空格，并防止文件被覆盖\n\n### 上传多个文件\n\n现在您已拥有一个灵活的文件上传类，但它一次只能处理一个文件。在文件字段的\
  \ `<input>` 标签中添加 `multiple` 属性，即可在符合 HTML5 标准的浏览器中选择多个文件。如果您在表单中添加额外的文件字段，旧版浏览器也支持多文件上传。\n\
  \n构建 `Upload` 类的最后一步是使其能够处理多个文件。为了理解代码的工作原理，您需要了解当表单允许多文件上传时，`$_FILES` 数组会发生什么变化。\n\
  \n\n\n### `$_FILES` 数组如何处理多个文件\n\n由于 `$_FILES` 是一个多维数组，因此它能够处理多个上传。除了在 `<input>`\
  \ 标签中添加 `multiple` 属性外，还需要在 `name` 属性中添加一对方括号，如下所示：\n\n`<input type=\"file\" name=\"\
  image[]\" id=\"image\" multiple>`\n\n正如在第 5 章中学到的，在 `name` 属性中添加方括号会以数组形式提交多个值。你可以使用\
  \ `ch06` 文件夹中的 `multi_upload_01.php` 或 `multi_upload_02.php` 来查看这对 `$_FILES` 数组的影响。图\
  \ 6-10 显示了在使用支持 `multiple` 属性的现代桌面浏览器中选择四个文件后的结果。\n\n![A978-1-4842-0635-5_6_Fig10_HTML.jpg](img/A978-1-4842-0635-5_6_Fig10_HTML.jpg)\n\
  \n图 6-10. `$_FILES` 数组可以一次性上传多个文件\n\n虽然这种结构不如将每个文件的详细信息分别存储在单独的子数组中那么方便，但数字键可以追踪指向每个文件的详细信息。例如，`$_FILES['image']['name'][2]`\
  \ 直接对应 `$_FILES['image']['tmp_name'][2]`，以此类推。\n\n在撰写本文时，所有现代桌面浏览器都支持 `multiple`\
  \ 属性，iOS 上的 Safari（自 6.1 版本起）也支持该属性。Internet Explorer 9 及更早版本以及 Android（当前版本为 4.4）不支持该属性。\n\
  \n不支持 `multiple` 属性的浏览器会使用相同的结构上传单个文件，因此文件名称存储为 `$_FILES['image']['name'][0]`。\n\
  \n**提示**\n\n如果需要在旧版浏览器上支持多文件上传，请省略 `multiple` 属性，并为要同时上传的文件数量创建单独的文件输入字段。为每个 `<input>`\
  \ 标签设置相同的 `name` 属性，后跟方括号。生成的 `$_FILES` 数组结构与图 6-10 相同。\n\n### PHP 解决方案 6-7：调整类以处理多文件上传\n\
  \n本 PHP 解决方案展示了如何调整 `Upload` 类的 `upload()` 方法来处理多文件上传。该类会自动检测 `$_FILES` 数组是否如图 6-10\
  \ 所示的结构，并使用循环来处理上传的任意数量文件。\n\n当你从设计为仅处理单次上传的表单上传文件时，`$_FILES` 数组将文件名作为字符串存储在 `$_FILES['image']['name']`\
  \ 中。但是，当你从能处理多文件上传的表单上传时，`$_FILES['image']['name']` 是一个数组。即使只上传了一个文件，其名称也存储为 `$_FILES['image']['name'][0]`。\n\
  \n因此，通过检测 `name` 元素是否为数组，你可以决定如何处理 `$_FILES` 数组。如果 `name` 元素是数组，你需要遍历它，使用其索引提取当前文件的其他详细信息，然后将它们存储在一个变量中，该变量可以被传递给\
  \ `checkFile()` 方法。\n\n基于这一点，继续使用你现有的类文件。或者，使用 `ch06/PhpSolutions/File` 文件夹中的 `Upload_05.php`。\n\
  \n通过添加一个条件语句来检查 `$uploaded` 的 `name` 元素是否为数组，从而修改 `upload()` 方法：\n\n```\npublic\
  \ function upload($renameDuplicates = true) {\n    $this->renameDuplicates = $renameDuplicates;\n\
  \    $uploaded = current($_FILES);\n    if (is_array($uploaded['name'])) {\n   \
  \     // 处理多文件上传\n    } else {\n        if ($this->checkFile($uploaded)) {\n   \
  \         $this->moveFile($uploaded);\n        }\n    }\n}\n```\n\n条件语句检查 `$uploaded['name']`\
  \ 是否是一个数组。如果是，则需要特殊处理。现有的 `checkFile()` 调用现在位于 `else` 块中。\n\n**注意**\n\n如果你需要提醒 `$uploaded`\
  \ 如何包含对 `$_FILES` 数组中第一个元素的引用，请参考 PHP 方案 6-2。\n\n为了处理多文件上传，挑战在于将单个文件关联的五个值（`name`,\
  \ `type` 等）收集起来，然后将它们传递给 `checkFile()` 和 `moveFile()` 方法。\n\n如果你参考图 6-10，`$uploaded['name']`\
  \ 是一个包含已上传文件名称的索引数组。通过使用 `foreach` 循环遍历该数组，你可以同时访问键和值，如下所示：\n\n```\nforeach ($uploaded['name']\
  \ as $key => $value) { }\n```\n\n循环第一次运行时，`$key` 为 0。使用这个键，你可以访问 `$_FILES` 数组中第一个文件的其他元素，并将它们分配给一个名为\
  \ `$currentFile` 的新数组。第二次运行时，你会获得第二个文件的详细信息，以此类推。\n\n修改后的 `upload()` 方法代码如下所示：\n\
  \n```\npublic function upload($renameDuplicates = true) {\n    $this->renameDuplicates\
  \ = $renameDuplicates;\n    $uploaded = current($_FILES);\n    if (is_array($uploaded['name']))\
  \ {\n        // 处理多文件上传\n        foreach ($uploaded['name'] as $key => $value) {\n\
  \            $currentFile['name'] = $uploaded['name'][$key];\n            $currentFile['type']\
  \ = $uploaded['type'][$key];\n            $currentFile['tmp_name'] = $uploaded['tmp_name'][$key];\n\
  \            $currentFile['error'] = $uploaded['error'][$key];\n            $currentFile['size']\
  \ = $uploaded['size'][$key];\n            if ($this->checkFile($currentFile)) {\n\
  \                $this->moveFile($currentFile);\n            }\n        }\n    }\
  \ else {\n        if ($this->checkFile($uploaded)) {\n            $this->moveFile($uploaded);\n\
  \        }\n    }\n}\n```\n\n你所关心的只是 `$key`，因此 `$value` 从未被使用。循环第一次运行时，`$uploaded['name'][$key]`\
  \ 访问存储在 `$uploaded['name'][0]` 中的值，并将其赋给 `$currentFile['name']`；`$uploaded['type'][$key]`\
  \ 访问 `$uploaded['type'][0]` 并赋给 `$currentFile['type']`，依此类推。你永远不会循环遍历 `type`、`tmp_name`、`error`\
  \ 和 `size` 的数组。由于 `$_FILES` 数组的可预测性，它们的值可以通过键来访问。\n\n每次循环运行时，`$currentFile` 都包含单个文件的详细信息，然后这些详细信息会像之前一样传递给\
  \ `checkFile()` 和 `moveFile()` 方法。\n\n保存 `Upload.php` 并使用 `file_upload.php` 进行测试。它的表现应和之前一样，一次只上传一个文件。在文件字段的\
  \ `name` 属性末尾添加一对方括号，并插入 `multiple` 属性，如下所示：\n\n`<input type=\"file\" name=\"image[]\"\
  \ id=\"image\" multiple>`\n\n你不需要对 `DOCTYPE` 声明之上的 PHP 代码做任何更改。该代码对于单次和多次上传都是相同的。\n\
  \n**注意**\n\nIE 10 之前的 Internet Explorer 版本只会上传最后选定的文件。\n\n保存 `file_upload.php` 并在浏览器中重新加载。通过选择多个文件进行测试。当你点击“上传”时，应该会看到与每个文件相关的消息。符合你条件的文件会被上传。太大或类型错误的文件会被拒绝。\n\
  \n你可以对照 `ch06/PhpSolutions/File` 文件夹中的 `Upload_06.php` 检查你的代码。\n\n\n\n## 使用上传类\n\
  \n`Upload`类的使用非常简单——只需按照本章前面“使用命名空间类”中所述导入命名空间即可。在脚本中包含该类定义，并通过将文件路径作为参数传递给`upload_test`文件夹来创建一个`Upload`对象，如下所示：\n\
  \n`$destination = 'C:/upload_test/';`\n\n`$loader = new Upload($destination);`\n\
  \n> **注意：** 上传文件夹的路径必须以尾部斜杠结尾。\n\n默认情况下，该类只允许上传图像，但可以覆盖此设置。该类具有以下公共方法：\n\n- `setMaxSize()`：接受一个整数，设置每个上传文件的最大大小，覆盖默认的\
  \ 51200 字节（50 KB）。该值必须以字节表示。\n- `getMaxSize()`：报告以 KB 为单位的最大大小，格式化为一位小数。\n- `allowAllTypes()`：允许上传任何类型的文件。默认情况下，对于文件名扩展名列在`$notTrusted`属性中的文件，会追加`.upload`作为后缀。要阻止追加后缀，可向此方法传递`false`作为参数。\n\
  - `upload()`：将文件保存到目标文件夹。文件名中的空格会被替换为下划线。默认情况下，与现有文件同名的文件会通过在文件扩展名前插入一个数字来重命名。要覆盖文件，可向此方法传递`false`作为参数。\n\
  - `getMessages()`：返回一个消息数组，报告上传的状态。\n\n## 文件上传注意事项\n\n使用 PHP 从 Web 表单上传文件相当直接。失败的主要原因是没有为上传目录或文件夹设置正确的权限，以及在脚本结束前忘记将上传的文件移动到其目标位置。然而，允许其他人将文件上传到您的服务器会让您面临风险。实际上，您是在允许访问者自由写入您服务器的硬盘。您不会允许陌生人在您自己的计算机上这样做，因此您应该以同样的警惕性来保护对上传目录的访问。\n\
  \n理想情况下，上传应仅限于已注册且受信任的用户，因此上传表单应位于您网站中受密码保护的部分。此外，上传文件夹不需要位于您的网站根目录内，因此应尽可能将其放在私有目录中，除非您希望上传的内容立即显示在网页上。但请记住，PHP\
  \ 无法检查内容是否合法或得体，因此立即公开显示会带来超出纯技术层面的风险。您还应牢记以下安全要点：\n\n- 在 Web 表单和服务器端都设置上传文件的最大大小。\n\
  - 通过检查`$_FILES`数组中的 MIME 类型来限制上传文件的类型。或者，向可执行文件的名称添加后缀，以防止它们被远程运行。\n- 将文件名中的空格替换为下划线或连字符。\n\
  - 定期检查您的上传文件夹。确保里面没有不应该存在的内容，并定期进行清理。即使您限制了文件上传大小，也可能在未意识到的情况下耗尽分配的空间。\n\n## 章节回顾\n\
  \n本章向您介绍了如何创建 PHP 类。如果您是 PHP 或编程新手，可能会觉得有些困难。不要灰心。`Upload`类包含超过 180 行代码，其中一些很复杂，尽管我希望描述已经解释了代码在每个阶段的作用。即使您不理解所有代码，`Upload`类也会为您节省大量时间。它实现了文件上传所需的主要安全措施，但使用它只需十几行代码：\n\
  \n```php\nuse PhpSolutions\\File\\Upload;\n\nif (isset($_POST['upload'])) {\n  \
  \  require_once 'PhpSolutions/File/Upload.php';\n\n    try {\n        $loader =\
  \ new Upload('C:/upload_test/');\n        $loader->upload();\n        $result =\
  \ $loader->getMessages();\n    } catch (Exception $e) {\n        echo $e->getMessage();\n\
  \    }\n}\n```\n\n如果您觉得本章内容比较吃力，可以在更有经验时再回来看，届时您会发现代码更容易理解。\n\n在下一章中，您将学习一些检查文件和文件夹内容的技术，包括如何使用\
  \ PHP 读写文本文件。\n\n"
- '# 7. 使用 PHP 管理文件


  PHP 拥有大量用于处理服务器文件系统的函数，但要找到合适的函数并不总是那么容易。本章将理清这些纷繁复杂的内容，向您展示这些函数的一些实际用途，例如读写文本文件以存储少量信息而无需数据库。循环在检查文件系统内容方面起着重要作用，因此您还将探索一些标准
  PHP 库（SPL）迭代器，这些迭代器旨在提高循环效率。


  除了打开本地文件，PHP 还可以读取其他服务器上的公共文件，例如新闻源。新闻源通常格式化为 XML（可扩展标记语言）。在过去，从 XML 文件中提取信息是一个繁琐的过程，但由于名副其实的
  SimpleXML，情况已不再如此。在本章中，您将看到如何创建一个下拉菜单来列出文件夹中的所有图像，如何创建一个函数从文件夹中选择特定类型的文件，如何从另一台服务器拉取实时新闻源，以及如何提示访问者下载图像或
  PDF 文件而不是在浏览器中打开它。额外的好处是，您将学习如何更改从另一个网站获取的日期的时区。


  本章涵盖以下主题：


  - 读写文件

  - 列出文件夹中的内容

  - 使用`SplFileInfo`类检查文件

  - 使用 SPL 迭代器控制循环

  - 使用 SimpleXML 从 XML 文件中提取信息

  - 消费 RSS 源

  - 创建下载链接


  ## 检查 PHP 能否打开文件


  正如我在上一章中解释的，PHP 在大多数 Linux 服务器上以`nobody`或`apache`身份运行。因此，文件夹必须具有最低访问权限`755`，脚本才能打开文件。要创建或更改文件，您通常需要设置全局访问权限`777`，这是最不安全的设置。如果
  PHP 配置为以您自己的名称运行，您可以设置得更严格，因为您的脚本可以在您拥有读取、写入和执行权限的任何文件夹中创建和写入文件。在 Windows 服务器上，您需要写入权限才能创建或更新文件。如果您需要更改权限的帮助，请咨询您的主机服务商。




  ### 影响文件访问的配置设置


  托管公司可以通过 `php.ini` 对文件访问施加进一步限制。要了解已施加了哪些限制，请在您的网站上运行 `phpinfo()`，并检查 Core 部分中的设置。表
  7-1 列出了您需要检查的设置。除非您自己运行服务器，否则通常无法控制这些设置。


  表 7-1. 影响文件访问的 PHP 配置设置


  | 指令 | 默认值 | 描述 |

  | --- | --- | --- |

  | `allow_url_fopen` | On | 允许 PHP 脚本打开互联网上的公开文件 |

  | `allow_url_include` | Off | 控制包含远程文件的能力 |


  表 7-1 中的设置都控制通过 URL（而非本地文件系统）对文件的访问，但它们之间存在重要区别。第一个设置 `allow_url_fopen` 允许您读取远程文件，但不能直接将它们包含到脚本中。这通常是安全的，因此默认启用。如果您的网站上禁用了
  `allow_url_fopen`，您将无法访问有用的外部数据源，例如新闻源和公共 XML 文档。


  另一方面，`allow_url_include` 允许您直接将远程文件包含到脚本中。这是一个重大的安全风险，因此默认禁用 `allow_url_include`。


  **提示**：如果您的托管公司已禁用 `allow_url_fopen`，请请求启用它。否则，您将无法使用 PHP 解决方案 7-5。但不要混淆名称：在托管环境中，`allow_url_include`
  应始终处于关闭状态。


  在 PHP 5.4 之前，某些服务器对本地文件的访问施加了限制。这些限制现已被移除。对本地文件系统中文件的访问由每个文件和文件夹上设置的权限控制。


  ### 为本地测试创建文件存储文件夹


  将数据存储在站点根目录内非常不安全，尤其是在需要为文件夹设置全局访问权限时。如果您能访问站点根目录之外的私有文件夹，请将数据存储作为子文件夹创建，并为其授予必要的权限。


  就本章而言，我建议 Windows 用户在 C 盘上创建一个名为 `private` 的文件夹。


  Mac 用户应在其主文件夹内创建一个 `private` 文件夹。如有必要，按照上一章所述，在文件夹的信息面板中设置读写权限。


  如果您在 Linux 上进行测试，还需要确保 Web 服务器对 `private` 文件夹拥有读写权限。


  ## 读写文件


  读写文件的能力有着广泛的应用。例如，您可以打开另一个网站上的文件，将内容读入服务器的内存，使用字符串和 XML 操作函数提取信息，然后将结果写入本地文件。您还可以查询自己服务器上的数据库，并将数据输出为文本或
  CSV（逗号分隔值）文件。您甚至可以生成 Open Document Format 或 Microsoft Excel 电子表格格式的文件。但首先，让我们来看一下基本操作。


  **提示**：如果您订阅了 lynda.com 的在线培训库，可以在我的“使用 PHP 将数据导出到文件”课程（[`www.lynda.com/PHP-tutorials/Exporting-Data-Files-PHP/158375-2.html`](http://www.lynda.com/PHP-tutorials/Exporting-Data-Files-PHP/158375-2.html)）中学习如何将数据从数据库导出为各种格式，例如
  Microsoft Excel 和 Word。


  ### 单次操作读取文件


  PHP 有三个函数可以在单次操作中读取文本文件的内容。


  *   `readfile()` 打开一个文件并直接输出其内容。

  *   `file_get_contents()` 将整个文件的内容读入单个字符串，但不直接产生输出。

  *   `file()` 将每一行读入一个数组。


  #### PHP 解决方案 7-1：获取文本文件的内容


  此 PHP 解决方案演示了使用 `readfile()`、`file_get_contents()` 和 `file()` 访问文件内容之间的区别。


  将 `sonnet.txt` 复制到您的 `private` 文件夹。这是一个包含莎士比亚十四行诗第 116 首的文本文件。在 `phpsols` 站点根目录中创建一个名为
  `filesystem` 的新文件夹，然后在该新文件夹中创建一个名为 `get_contents.php` 的 PHP 文件。将以下代码插入 PHP 块中（`ch07`
  文件夹中的 `get_contents_01.php` 显示了嵌入在网页中的代码，但您可以仅使用 PHP 代码进行测试）：


  ```

  readfile(''C:/private/sonnet.txt'');

  ```


  如果您使用的是 Mac，请按如下方式修改路径名，使用您自己的 Mac 用户名：


  ```

  readfile(''/Users/username/private/sonnet.txt'');

  ```


  如果您在 Linux 或远程服务器上进行测试，请相应修改路径名。


  **注意**：为简洁起见，本章剩余示例仅显示 Windows 路径名。


  保存 `get_contents.php` 并在浏览器中查看。您应该会看到类似以下截图的内容。浏览器会忽略原始文本中的换行符，并将莎士比亚的十四行诗显示为一个连续的文本块。


  ![A978-1-4842-0635-5_7_Figa_HTML.jpg](img/A978-1-4842-0635-5_7_Figa_HTML.jpg)


  **提示**：如果看到错误消息，请检查代码输入是否正确，以及在 Mac 或 Linux 上是否设置了正确的文件和文件夹权限。


  PHP 有一个名为 `nl2br()` 的函数，可以将换行符转换为 `<br/>` 标签。像这样更改 `get_contents.php` 中的代码（代码在 `get_contents_02.php`
  中）：


  ```

  nl2br(readfile(''C:/private/sonnet.txt''));

  ```


  **注意**：为了与 XHTML 兼容，`nl2br()` 会在 `<br/>` 的闭合尖括号前插入一个尾部斜杠。在 HTML5 中，尾部斜杠是可选的。`<br/>`
  和 `<br>` 都是有效的。


  保存 `get_contents.php` 并在浏览器中重新加载。输出仍然是一个连续的文本块。当您这样将一个函数作为参数传递给另一个函数时，内部函数的结果通常会传递给外部函数，从而在单个表达式中执行两个操作。因此，您会期望文件的内容在显示到浏览器之前先传递给
  `nl2br()`。然而，`readfile()` 会立即输出文件内容。当它完成时，已经没有任何内容可供 `nl2br()` 插入 `<br/>` 标签了。文本已经到达浏览器。


  **注意**：当两个函数像这样嵌套时，内部函数先执行，外部函数处理结果。但内部函数的返回值需要作为参数对外部函数有意义。`readfile()` 的返回值是从文件中读取的字节数。即使您在行首添加了
  `echo`，您也只会得到添加到文本末尾的 `594`。在这种情况下，嵌套函数不起作用，但它通常是一种非常有用的技术，可以避免在将内部函数的结果传递给另一个函数处理之前将其存储在变量中。


  您需要使用 `file_get_contents()` 而不是 `readfile()` 来将换行符转换为 `<br/>` 标签。`readfile()` 只是输出文件内容，而
  `file_get_contents()` 将文件内容作为一个字符串返回。如何处理它完全由您决定。像这样修改代码（或使用 `get_contents_03.php`）：


  ```

  echo nl2br(file_get_contents(''C:/private/sonnet.txt''));

  ```


  在浏览器中重新加载页面。现在，十四行诗的每一行都显示在自己的行上。


  ![A978-1-4842-0635-5_7_Figb_HTML.jpg](img/A978-1-4842-0635-5_7_Figb_HTML.jpg)


  `file_get_contents()` 的优势在于您可以将文件内容赋值给一个变量，并以某种方式处理它，然后再决定如何处理它。像这样更改 `get_contents.php`
  中的代码（或使用 `get_contents_04.php`）并将页面加载到浏览器中：


  ```

  $sonnet = file_get_contents(''C:/private/sonnet.txt'');

  // 将换行符替换为空格

  $words = str_replace("\r\n", '' '', $sonnet);

  ```




  `// 拆分为单词数组`

  ```

  $words = explode('' '', $words);

  ```

  `// 提取前九个数组元素`

  ```

  $first_line = array_slice($words, 0, 9);

  ```

  `// 连接前九个元素并显示`

  ```

  echo implode('' '', $first_line);

  ```


  这段代码将 `sonnet.txt` 的内容存储在名为 `$sonnet` 的变量中，然后将其传递给 `str_replace()` 函数，该函数将回车符和换行符替换为空格，并将结果存储为
  `$words`。


  **注意**


  关于 `"\r\n"` 的解释，请参阅第 3 章中的“在双引号内使用转义序列”。该文本文件是在 Windows 系统中创建的，因此换行符由回车符和换行符表示。Mac
  OS X 和 Linux 系统上创建的文件仅使用换行符（`"\n"`）。


  随后，`$words` 被传递给 `explode()` 函数。这个名称听起来有些骇人的函数，能将字符串“炸开”并转换为数组。它使用第一个参数来确定在何处断开字符串。这里使用了空格，因此文本文件的内容被拆分为一个单词数组。


  接着，单词数组被传递给 `array_slice()` 函数，该函数从数组中截取一段，起始位置由第二个参数指定，第三个参数指定截取的长度。PHP 从 0 开始计数数组，因此这一操作提取了前九个单词。


  最后，`implode()` 执行与 `explode()` 相反的操作，它将数组的元素连接起来，并在每个元素之间插入第一个参数。结果通过 `echo` 显示，产生如下输出：


  ![A978-1-4842-0635-5_7_Figc_HTML.jpg](img/A978-1-4842-0635-5_7_Figc_HTML.jpg)


  现在，脚本不再显示整个文件内容，而是只显示第一行。完整的字符串仍然存储在 `$sonnet` 中。


  然而，如果你想逐行处理每个行，使用 `file()` 函数会更简单，它会将文件的每一行读入一个数组。要显示 `sonnet.txt` 的第一行，之前的代码可以简化为这样（参见
  `get_contents_05.php`）：


  ```

  $sonnet = file(''C:/private/sonnet.txt'');

  echo $sonnet[0];

  ```


  事实上，如果你不需要完整的数组，可以在调用 `file()` 函数后，直接在方括号中添加索引号来访问某一行。以下代码显示了十四行诗的第十一行（参见 `get_contents_06.php`）：


  ```

  echo file(''C:/private/sonnet.txt'')[10];

  ```


  ![A978-1-4842-0635-5_7_Figd_HTML.jpg](img/A978-1-4842-0635-5_7_Figd_HTML.jpg)


  **注意**


  像这样直接访问作为函数返回结果的数组元素，是一种称为“数组解引用”的技术。该技术从 PHP 5.4 版本开始引入。`get_contents_06.php` 中的代码在较旧版本的
  PHP 中无法运行。


  在我们刚刚探讨的三个函数中，`readfile()` 可能用处最小。它只是读取文件内容并直接将其输出到缓冲中。你无法操作文件内容或从中提取信息。不过，`readfile()`
  的一个实际用途是强制下载文件，本章后面会看到。


  另外两个函数 `file_get_contents()` 和 `file()` 则更有用，因为你可以将内容捕获到一个变量中，以便重新格式化或提取信息。它们的唯一区别在于：`file_get_contents()`
  将内容读入一个单一的字符串，而 `file()` 生成一个数组，其中每个元素对应文件中的一行。


  **提示**


  `file()` 函数会在每个数组元素的末尾保留换行符。如果你想去除换行符，可以将常量 `FILE_IGNORE_NEW_LINES` 作为第二个参数传递给该函数。你还可以通过使用
  `FILE_SKIP_EMPTY_LINES` 作为第二个参数来跳过空行。要同时去除换行符并跳过空行，可以用竖线分隔这两个常量，像这样：`FILE_IGNORE_NEW_LINES
  | FILE_SKIP_EMPTY_LINES`。


  尽管我们仅使用本地文本文件测试了 `file_get_contents()` 和 `file()`，但它们也可以检索其他域上公开文件的内容。这使得它们对于访问其他网页上的信息非常有用，尽管提取信息通常需要对字符串函数和文档对象模型（DOM）有扎实的理解。


  `file_get_contents()` 和 `file()` 的缺点是它们会将整个文件读入内存。对于非常大的文件，使用每次只处理文件一部分的函数会更可取。接下来我们将讨论这些函数。




