    **Getting Cake**


    The first step is to download the latest stable release of Cake version 1.2 from
    [www.cakephp.org.](http://www.cakephp.org)


    Once you’ve downloaded and extracted the Cake release file, you should end up
    with a folder named something like cake_1.2.x.xxxx with a handful of folders inside
    it (see Figure 2-1).


    **Figure 2-1.** *Contents of the main Cake install folder*


    The app folder is where almost everything happens in your application. It houses
    all the controllers, models, views, layouts, and all other JavaScript, CSS, Flash,
    image, and other files.


    Of course, if you take a peek inside the app folder, you’ll notice that all these
    areas of the application are organized into several subfolders.


    The cake folder contains all of Cake’s libraries and scripts. You can replace
    this folder with newer releases of Cake, and it should still work with the application.
    Inside, you will find dozens of individual PHP files that contain all of the classes
    and scripts necessary for Cake to run.


    The docs folder holds change log information and other readme files.


    Any other non-Cake PHP scripts you intend to work into your application are stored
    in the last folder, vendors. Later in the book, you’ll also use vendors to store
    some fancy PHP


    scripts that work independently of Cake.


    **Launching Cake**


    Running Cake is really this simple: rename the main Cake folder to how you want
    the application to be called in the browser and drop it into your localhost root.
    I have named mine first_app and have placed the folder in my localhost root. This
    root folder will depend on how your localhost is configured. It may be named webroot,
    www, or public_html (these are some of the most common folder names for the server
    root directory). Be sure to identify where your localhost root is and drop the
    renamed Cake folder into it. By typing


    [**http://localhost/first_app** in my w](http://localhost/first_app)eb browser,
    I get the Cake welcome screen (see Figure 2-2).


    ![Image 14](index-33_1.jpg)


