    \ (the first two numbers are\nequal to one, and each subsequent number is equal\
    \ to the sum of the two\nprevious numbers). In that case, instead of writing the\
    \ numbers in the\ndocument explicitly, use PHP code to generate the corresponding\
    \ content.\n\nDetails |\n\n| --- | --- | --- |\n\nDocuments with HTML markup usually\
    \ have the `.html` extension. For\nthe browser, that is an indicator that the\
    \ document contains hypertext\nmarkup. If you want to place PHP code in a document\
    \ with HTML markup,\nthe corresponding file should be saved with the `.php`\n\
    extension. |\n\nLet’s analyze the document shown in Listing [12-1](#613529_1_En_12_Chapter.xhtml#PC1).\n\
    \n```\n\nThe Fibonacci Numbers\n\nThe Fibonacci Sequence\nThe first two numbers\
    \ are equal to one, and each next number is equal to the sum of the two previous\
    \ ones. Here are the numbers:\n\nDo you know what the next number is?\n\nListing\
    \ 12-1\nThe Fibonacci Numbers\n```\n\nHere, you deal with a document containing\
    \ HTML markup; in that document,\nthere is a block with PHP code.\n\nDetails |\n\
    \n| --- | --- | --- |\n\nIt is important to consider what happens when you try\
    \ to open a document with HTML code.\nYou study the most common and frequently\
    \ used scheme and consider it in\na very simplified form.\nSo, suppose that there\
    \ are two computers: a client and a server. They\nare connected to each other.\
    \ A browser is launched on the client\ncomputer, and using that browser, you try\
    \ to open a document hosted on\nthe server computer. When the client receives\
    \ the document, it renders\nit based on the HTML markup.\nIf you request a PHP\
    \ document on the server through the client\nbrowser, then that document is executed\
    \ on the server as a script, and\nthe result is returned to the browser. If the\
    \ document contains both\nHTML markup and PHP code, then the already existing\
    \ HTML markup remains\n\"as it is\", and instead of the PHP code, the result of\
    \ its execution is\nsubstituted. The total result is a document with HTML markup\
    \ designed to\nbe displayed by the browser. You may say that you deal with dynamic\n\
