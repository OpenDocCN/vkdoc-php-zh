    The method `markTestIncomplete` is inherited from `IntegrationTestCase` and is
    defined in `PHPUnit`. It serves a simple purpose, which is not a great surprise:
    it marks the test incomplete. The actual test function requires a little more
    explanation, so we will add it later.


    ## About Integration Tests


    Integration tests allow you to test your application at a higher level. It simulates
    an HTTP request sent to your application. Testing your controller will also use
    all components, models, and helpers related to the given request.


    The following methods can be used for simulating HTTP requests:


    - `get()` sends a `GET` request

    - `post()` sends a `POST` request

    - `put()` sends a `PUT` request

    - `delete()` sends a `DELETE` request

    - `patch()` sends a `PATCH` request


    ## Assertion Methods


    By using `IntegrationTestCase`, we gain access to a lot of different assertion
    methods. Following are some of the most useful ones:


    - `$this->assertResponseOk();` checks if we got a `2xx` response code on calling
    the controller.

    - `$this->assertResponseSuccess();` checks if we got a `2xx` or `3xx` response
    code on calling the controller.

    - `$this->assertResponseError();` checks if we got a `4xx` response code on calling
    the controller.

    - `$this->assertResponseFailure();` checks if we got a `5xx` response code on
    calling the controller.

    - `$this->assertResponseCode(404);` checks if the response code is 404.

    - `$this->assertRedirectContains(''/posts/edit/'');` checks a part of the location
    header for redirects.

    - `$this->assertResponseEquals(''Call out Gouranga and be Happy!'');` checks if
    the response content equals the given value.

    - `$this->assertResponseContains(''Gouranga!'');` checks if the response content
    contains the given value.

    - `$this->assertResponseNotContains(''You are logged in!'');` checks if the response
    content does not contain the given value.

    - `$this->assertSession(1, ''Auth.User.id'');` checks the `session` variable.

    - `$this->assertEquals(''rrd'', $this->viewVariable(''username''));` checks the
    `view` variables.

    - `$this->assertContentType(''application/json'');` checks the content types.'
  raw: '## The Magic Behind Bake


    A lot of clever programming tools were used by the CakePHP team to create a handy
    tool like `bake`. As you can see in the preceding example, it really writes code
    for us.


    When we bake models, they detect the database field types and, based on that,
    create entity and model classes. Entity objects represent a database row, while
    model objects represent a database table, with its associations, validation rules,
    and methods. As models extend CakePHP’s `Table` class, they inherit a lot of useful
    methods. That is how we can use methods such as `get`, `save`, and `delete` without
    creating these methods. They are there as a result of the framework itself.


    When we bake controllers, `index`, `edit`, `view`, and `delete` methods will be
    generated, as these are the most commonly used operations. These methods will
    use the associated models.


    Baking also generates views for all the controller methods. So, for the `index`
    method, the index view is generated. In the view, we will access those variables
    that were set in the controller.


    As you can see, by inheritance and `bake`, we got a lot of things out of the oven.
    There is, however, one thing that you should keep in your mind. Code generated
    by `bake` is just for getting a working skeleton as fast as possible. It does
    not handle permissions or user authentication, so anybody can create and delete
    things. CakePHP can provide nice support for these also, but they are not automatically
    generated by `bake`.


    ## Creating Controller Tests


    Having had an overview of the generated controller, let’s create some tests for
    it. First, we must create fixtures for our categories, tags, and posts models.
    Let’s start with the categories. Chapter [7](#A337704_2_En_7_Chapter.html) provided
    an overview of fixtures, so the following code sample should be clear.


    ```

    1   ''Categories''];


    11      public $records = [

    12          [

    13              ''id'' => 1,

    14              ''category'' => ''Category 1''

    15          ],

    16          [

    17              ''id'' => 2,

    18              ''category'' => ''Category 2''

    19          ],

    20      ];

    21  }

    ```


    We imported the `Categories` model into the fixture and created two category records.
    This code should be in the `/tests/Fixture/CategoriesFixture.php` file. The file
    is generated by `bake`. Feel free to modify it, or just create a new one with
    the content above.


    ```

    1   ''Tags''];


    10      public $records = [

    11          [

    12              ''id'' => 1,

    13              ''tag'' => ''Tag 1''

    14          ],

    15          [

    16              ''id'' => 2,

    17              ''tag'' => ''Tag 2''

    18          ],

    19          [

    20              ''id'' => 3,

    21              ''tag'' => ''Tag 3''

    22          ],

    23      ];

    24  }

    ```


    We should do the same for tags. In this case, we create three tags. It should
    go to the `/tests/Fixture/TagsFixture.php` file.


    ```

    1   ''Posts''];


    10      public $records = [

    11          [

    12              ''id'' => 1,

    13              ''category_id'' => 1,

    14              ''user_id'' => 1,

    15              ''title'' => ''First Post Tilte'',

    16              ''body'' => ''This is the body of the first post...'',

    17              ''created'' => ''2016-05-01 13:00:00'',

    18              ''modified'' => ''2016-05-01 13:00:00''

    19          ],

