    \ make it easier to manage and maintain secure access control..\n\n*Register Policies*\n\
    \nPolicies must be registered in the AuthServiceProvider to be recognized by Laravel.\
    \ In the AuthServiceProvider, policies are mapped to their respective models.\
    \ This registration ensures that Laravel uses the correct policy for authorization\
    \ checks, linking models like Post to their corresponding PostPolicy.\n\n*Authorize\
    \ in the Controller Using Policies*"
  trans: "\n### 身份验证与授权\n\nLaravel 简化了用户身份验证和授权流程，通过守卫（Guards）和策略（Policies）来控制对资源的访问。它内置了密码哈希（Password\
    \ Hashing）以及针对时序攻击（Timing Attacks）的防护功能。\n\n```\n$email, 'password' => $password]))\
    \ {\n// 身份验证通过\n}\n// 授权\nif (Gate::allows('update-post', $post)) {\n// 用户被授权更新该文章\n\
    }\n```\n\n### 详细说明\n\n![](img/609480_1_En_4_Fig4_HTML.jpg)\n\n**图 4-4** Laravel\
    \ 中的身份验证与授权流程\n\n我们通过一个示例来看看 Laravel 如何处理身份验证和授权。这包括设置用户认证、创建包含授权检查的控制器，以及利用 Laravel\
    \ 内置功能进行安全的用户管理。\n\n#### 步骤 1：设置身份验证\n\n`Laravel Breeze` 是一个扩展包，它提供了一种简单轻量的方式在\
    \ Laravel 应用中设置身份验证。请按照以下步骤进行配置：\n\n##### 步骤 1：安装 Laravel Breeze\n\n首先，你需要使用 `Composer`（PHP\
    \ 的依赖管理器）来安装 `Laravel Breeze`。运行下面的命令，告诉 Composer 将 `Breeze` 包作为开发依赖项下载并安装到你的\
    \ Laravel 项目中。该包包含了快速搭建认证功能所需的所有文件和配置：\n\n```bash\ncomposer require laravel/breeze\
    \ --dev\n```\n\n##### 步骤 2：安装 Breeze 的身份验证脚手架\n\n`Breeze` 安装完成后，我们需要通过运行以下命令来搭建身份验证脚手架：\n\
    \n```bash\nphp artisan breeze:install\n```\n\n此命令会生成基本的身份验证系统所需的视图、路由、控制器和其他文件。这些文件会被放置在\
    \ Laravel 项目中的相应目录里，为用户登录、注册、密码重置和电子邮件验证提供基础框架。\n\n##### 步骤 3：运行数据库迁移\n\nLaravel\
    \ 使用迁移（Migrations）来管理数据库模式。要创建身份验证所需的数据库表，请运行：\n\n```bash\nphp artisan migrate\n\
    ```\n\n该命令会执行迁移文件，在你的数据库中创建用户表、密码重置表以及其他必要的实体表。迁移确保了数据库模式的一致性和版本控制。\n\n##### 步骤\
    \ 4：安装 NPM 依赖并编译前端资源\n\n`Laravel Breeze` 包含需要编译的前端资源。首先，通过运行以下命令安装必要的 Node.js\
    \ 依赖：\n\n```bash\nnpm install\n```\n\n该命令会下载并安装 `package.json` 文件中列出的所有必需的软件包。安装完依赖后，使用以下命令编译前端资源：\n\
    \n```bash\nnpm run dev\n```\n\n此命令使用像 `Webpack` 这样的工具来编译和打包你的 JavaScript 和 CSS\
    \ 文件。它会为开发环境准备好前端资源，让你在开发应用时能立刻看到更改的效果。\n\n#### 步骤 2：创建资源控制器\n\n接下来，创建一个用于管理资源（例如文章）并实现\
    \ CRUD（增删改查）操作的资源控制器。\n\n```bash\nphp artisan make:controller PostController --resource\n\
    ```\n\n该命令会生成一个包含 `index`、`create`、`store`、`show`、`edit`、`update` 和 `destroy`\
    \ 方法的控制器（`PostController`）。\n\n#### 步骤 3：定义路由\n\n在 `routes/web.php` 文件中，为身份验证和资源控制器定义路由。\n\
    \n```php\n<?php\nuse App\\Http\\Controllers\\PostController;\nuse Illuminate\\\
    Support\\Facades\\Route;\n\n// 身份验证路由\nrequire __DIR__.'/auth.php';\n\n// 资源路由\n\
    Route::resource('posts', PostController::class);\n```\n\n#### 步骤 4：在控制器中实现授权\n\
    \n编辑 `PostController` 以加入授权检查。例如，只有经过身份验证的用户才能创建、更新和删除文章。\n\n```php\npublic function\
    \ create()\n{\n    $this->authorize('create', Post::class);\n    return view('posts.create');\n\
    }\n\npublic function store(Request $request)\n{\n    $this->authorize('create',\
    \ Post::class);\n    // 验证和存储逻辑\n    // ...\n    return redirect()->route('posts.index');\n\
    }\n// 其他方法...\n```\n\n#### 步骤 5：在视图中实现授权\n\n在你的 Blade 视图中，可以使用 `@can` 指令根据用户的授权情况有条件地显示或隐藏内容。\n\
    \n```blade\n@if(Auth::check())\n    <a href=\"{{ route('posts.create') }}\">创建文章</a>\n\
    @endif\n\n@foreach($posts as $post)\n    <h2>{{ $post->title }}</h2>\n\n    @can('update',\
    \ $post)\n        <a href=\"{{ route('posts.edit', $post->id) }}\">编辑</a>\n  \
    \  @endcan\n\n    @can('delete', $post)\n        <form action=\"{{ route('posts.destroy',\
    \ $post->id) }}\" method=\"POST\">\n            @csrf\n            @method('DELETE')\n\
    \            <button type=\"submit\">删除</button>\n        </form>\n    @endcan\n\
    @endforeach\n```\n\n#### 步骤 6：定义策略\n\n在 Laravel 中，你可以使用策略（Policies）来封装授权逻辑。为 `Post`\
    \ 模型创建一个策略。\n\n```bash\nphp artisan make:policy PostPolicy\n```\n\n在 `PostPolicy`\
    \ 类中定义授权逻辑。\n\n```php\n<?php\n\nnamespace App\\Policies;\n\nuse App\\Models\\\
    User;\nuse App\\Models\\Post;\n\nclass PostPolicy\n{\n    public function update(User\
    \ $user, Post $post)\n    {\n        return $user->id === $post->user_id;\n  \
    \  }\n\n    public function delete(User $user, Post $post)\n    {\n        return\
    \ $user->id === $post->user_id;\n    }\n}\n```\n\n#### 步骤 7：注册策略\n\n在 `AuthServiceProvider`\
    \ 中，将 `PostPolicy` 注册到对应的模型上。\n\n```php\n<?php\n\nnamespace App\\Providers;\n\n\
    use App\\Models\\Post;\nuse App\\Policies\\PostPolicy;\nuse Illuminate\\Foundation\\\
    Support\\Providers\\AuthServiceProvider as ServiceProvider;\n\nclass AuthServiceProvider\
    \ extends ServiceProvider\n{\n    protected $policies = [\n        Post::class\
    \ => PostPolicy::class,\n    ];\n\n    public function boot()\n    {\n       \
    \ $this->registerPolicies();\n    }\n}\n```\n\n#### 步骤 8：在控制器中使用授权\n\n重构 `PostController`，使用\
    \ `authorize` 方法代替手动检查。\n\n```php\npublic function create()\n{\n    $this->authorize('create',\
    \ Post::class);\n    return view('posts.create');\n}\n\npublic function store(Request\
    \ $request)\n{\n    $this->authorize('create', Post::class);\n    // 验证和存储逻辑\n\
    \    // ...\n    return redirect()->route('posts.index');\n}\n// 其他方法...\n```\n\
    \n### 说明\n\n#### 身份验证\n\n`Laravel Breeze` 通过搭建必需的视图、控制器和路由来简化身份验证的设置。与已弃用的 `make:auth`\
    \ 命令不同，`Breeze` 提供了一种现代且简约的身份验证方法。安装 `Breeze` 后，身份验证路由会在 `routes/web.php` 文件中定义，使用户能够轻松地注册、登录和管理密码。\n\
    \n#### 控制器中的授权\n\nLaravel 控制器中的授权确保只有经过身份验证的用户才能执行某些操作。在 `PostController` 中，像\
    \ `create` 和 `store` 这样的方法会使用 `authorize` 方法来检查用户是否已通过身份验证。该方法会根据定义的策略验证用户是否拥有必要的权限。如果用户未经过身份验证，他们会被重定向到登录页面，从而确保安全的访问控制。\n\
    \n#### 视图中的授权\n\n在 Blade 视图中，Laravel 提供了 `@can` 指令，根据用户权限有条件地显示内容。该指令会检查与用户关联的授权策略，并决定是否应显示特定内容，例如编辑或删除文章的链接。此功能确保只有授权用户才能看到并与用户界面的某些部分进行交互。\n\
    \n#### 策略\n\nLaravel 的策略封装了针对特定模型（例如 `Post`）的授权逻辑。这些策略通过 `make:policy` 命令创建。策略定义的方法对应于用户可以对该模型执行的各种操作，例如更新或删除文章。通过集中管理授权逻辑，策略使得安全访问控制的维护和管理更加容易。\n\
    \n#### 注册策略\n\n策略必须在 `AuthServiceProvider` 中注册，才能被 Laravel 识别。在 `AuthServiceProvider`\
    \ 中，策略被映射到它们对应的模型。此注册确保 Laravel 在授权检查时使用正确的策略，将 `Post` 等模型与它们对应的 `PostPolicy`\
    \ 关联起来。\n\n#### 在控制器中使用策略进行授权\n"
- fmt: '# Session Security in Laravel


    The `PostController` leverages the `authorize` method to enforce authorization
    checks based on policies. When a user attempts to perform an action, such as creating
    or updating a post, the controller calls the relevant policy method to verify
    if the user has the necessary permissions. This approach provides a consistent
    and secure way to handle authorization across the application.


    This end-to-end example demonstrates how Laravel handles user authentication and
    authorization, leveraging Eloquent ORM for user management and policies for fine-grained
    authorization control. It helps ensure that only authenticated users can perform
    specific actions and that authorization logic is centralized and easily maintainable.


    ## Session Security


    Laravel secures user sessions by encrypting the session data. It also provides
    options for using secure, HTTP-only cookies. Session security in Laravel is a
    crucial aspect of web application development. Laravel provides a robust and secure
    session management system out of the box.


    ```

    ''value'']);

    ```


    ### Detailed Explanation


    ![](images/609480_1_En_4_Chapter/609480_1_En_4_Fig5_HTML.jpg)


    **Figure 4-5** Session security in Laravel


    Let’s review a detailed example of how to implement and secure sessions in a Laravel
    application.


    ### Step 1: Session Configuration


    Laravel’s session configuration is stored in the `config/session.php` file. You
    can customize various aspects of the session behavior here. Ensure that your configuration
    is set up securely. Laravel uses the `cookie` driver by default, storing session
    data in encrypted cookies.


    ```

    env(''SESSION_DRIVER'', ''cookie''),

    ...

    ''secure'' => env(''SESSION_SECURE_COOKIE'', true),

    ...

    ```


    ### Step 2: Controller and Routes


    Create a controller with routes to demonstrate session usage. In this example,
    we’ll create a simple controller named `SessionController` with methods for starting,
    reading, and destroying sessions.


    ```bash

    php artisan make:controller SessionController

    session()->put(''key'', ''value'');

    return ''Session started.'';

    }

    public function readSession(Request $request)

    {

    $value = $request->session()->get(''key'', ''default'');

    return ''Session value: '' . $value;

    }

    public function destroySession(Request $request)

    {

    $request->session()->forget(''key'');

    return ''Session destroyed.'';

    }

    }

    ```


    Register the routes in `web.php`:


    ```

    <?php

    // routes/web.php

    Route::get(''/start-session'', ''SessionController@startSession'');

    Route::get(''/read-session'', ''SessionController@readSession'');

    Route::get(''/destroy-session'', ''SessionController@destroySession'');

    ```


    ### Step 3: Middleware


    Laravel includes a `web` middleware group, which includes the `EncryptCookies`
    middleware. This middleware encrypts cookies, providing additional security for
    session data.


    ```

    [

    ...

    \Illuminate\Cookie\Middleware\EncryptCookies::class,

    ...

    ],

    ...

    ];

    ```


    ### Step 4: CSRF Protection


    Laravel includes CSRF protection by default. The `csrf` middleware checks that
    each incoming POST, PUT, and DELETE request includes a CSRF token. Ensure that
    your forms include the `@csrf` Blade directive.


    ```blade


    @csrf


    Submit


    ```


    ### Step 5: Session Encryption


    Laravel automatically encrypts session data for security. Ensure that the `encrypt`
    configuration option is set to `true` in the `config/session.php` file.


    ```

    true,

    ```


    ### Step 6: Session Flash Data


    Session flash data allows you to store temporary data that is available during
    the next HTTP request. This is commonly used for status messages.


    ```

    session()->flash(''status'', ''Data stored successfully!'');

    return redirect(''/'');

    }

    // Blade view

    @if (session(''status''))


    {{ session(''status'') }}


    @endif

    ```


    ### Explanation


    #### Session Configuration


    In Laravel, the `config/session.php` file is the central place for configuring
    various session settings. This file allows you to define parameters such as the
    session driver, lifetime, expiration behavior, and more, tailoring session management
    to suit the specific needs of your application.


    #### Controller and Routes


    The `SessionController` is responsible for demonstrating the basic operations
    of session management, including starting a session, reading session data, and
    destroying a session. The routes that map to these controller actions are defined
    in the `web.php` file, establishing the necessary endpoints for session interactions
    within your application.


    #### Middleware


    The `EncryptCookies` middleware, which is included in the `web` middleware group,
    ensures that all cookies are encrypted. This middleware adds a layer of security
    by protecting cookie data from being easily read or tampered with, thus enhancing
    the overall security of session data.


    #### CSRF Protection


    Laravel includes cross-site request forgery (CSRF) protection by default. This
    protection is implemented to secure your application against CSRF attacks by verifying
    that the requests received by your application are legitimate and intended. CSRF
    tokens are automatically generated and verified, making this process seamless
    and robust.


    #### Session Encryption


    To further secure session data, Laravel encrypts all session data before storing
    it. This means that even if an attacker gains access to the session storage, the
    data will be unreadable without the proper encryption key, thus maintaining the
    confidentiality and integrity of the session information.


    #### Session Flash Data


    Laravel provides a feature called session flash data, which allows for the temporary
    storage of data between requests. Flash data is useful for storing transient messages
    or data that only needs to be available for the next request, such as success
    or error messages after form submissions. This data is automatically removed after
    it has been read, ensuring that it does not persist longer than necessary.


    This example demonstrates the basics of session security in Laravel, including
    configuration, middleware, CSRF protection, encryption, and flash data. Always
    ensure that your session management aligns with security best practices.'
