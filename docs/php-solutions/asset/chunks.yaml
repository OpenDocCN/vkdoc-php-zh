    There isn’t a dedicated method that tells you whether daylight saving time is
    in operation, but the `getOffset()` method returns the number of seconds the time
    is offset from Coordinated Universal Time (UTC). The following line determines
    whether to display EDT or EST:


    `$timezone = ($offset == -14400) ? '' EDT'' : '' EST'';`


    This uses the value of `$offset` with the ternary operator. In summer, New York
    is four hours behind UTC (–14440 seconds). So, if `$offset` is –14400, the condition
    equates to `true`, and EDT is assigned to `$timezone`. Otherwise, EST is used.


    Finally, the value of `$timezone` is concatenated to the formatted time. The string
    used for `$timezone` has a leading space to separate the time zone from the time.
    When the page is loaded, the time is adjusted to the east coast of the United
    States, like this:


    ![A978-1-4842-0635-5_7_Fign_HTML.jpg](A978-1-4842-0635-5_7_Fign_HTML.jpg)


    ![A978-1-4842-0635-5_7_Fig6_HTML.jpg](A978-1-4842-0635-5_7_Fig6_HTML.jpg)


    Figure 7-6.


    The live news feed requires only a dozen lines of PHP code All the page needs
    now is smartening up with CSS. Figure [7-6](#A978-1-4842-0635-5_7_Chapter.html#Fig6)
    shows the finished news feed styled with `newsfeed.css` in the `styles` folder.
      Tip


    If you have a subscription to the lynda.com Online Training Library, you can learn
    more about SPL and SimpleXML in my course Up and Running with the Standard PHP
    Library ( [`www.lynda.com/PHP-tutorials/Up-Running-Standard-PHP-Library/175038-2.html`](http://www.lynda.com/PHP-tutorials/Up-Running-Standard-PHP-Library/175038-2.html)
    ).


    Although I have used the BBC news feed for this PHP solution, it should work with
    any RSS 2.0 feed. For example, you can try it locally with [`http://rss.cnn.com/rss/edition.rss`](http://rss.cnn.com/rss/edition.rss)
    . Using a CNN news feed in a public website requires permission from CNN. Always
    check with the copyright holder for terms and conditions before incorporating
    a feed into a website.'
  trans: "\n## PHP 方案 7-5：消费 RSS 新闻源\n\n本 PHP 方案演示了如何使用 `SimpleXML` 从实时新闻源中提取信息，并将其展示在网页上。它同时也展示了如何将\
    \ `<pubDate>` 元素格式化为更友好的格式，以及如何使用 `LimitIterator` 类限制显示的项目数量。\n\n在 `filesystem`\
    \ 文件夹中创建一个名为 `newsfeed.php` 的新页面。此页面将包含 PHP 和 HTML 的混合代码。本 PHP 方案选择的新闻源是 BBC 世界新闻。使用大多数新闻源的一个条件是必须注明来源。因此，在页面顶部添加一个格式化为\
    \ `<h1>` 标题的“来自 BBC 新闻的最新消息”。\n\n**注意：** 关于在自己的网站上使用 BBC 新闻源的条款和条件，请参阅 [`www.bbc.co.uk/news/10628494#mysite`](http://www.bbc.co.uk/news/10628494#mysite)\
    \ 和 [`www.bbc.co.uk/terms/additional_rss.shtml`](http://www.bbc.co.uk/terms/additional_rss.shtml)。\n\
    \n在标题下方创建一个 PHP 代码块，并添加以下代码来加载新闻源：\n\n```php\n$url = 'http://feeds.bbci.co.uk/news/world/rss.xml';\n\
    $feed = simplexml_load_file($url);\n```\n\n使用一个 `foreach` 循环来访问 `<item>` 元素并显示每个元素的\
    \ `<title>`：\n\n```php\nforeach ($feed->channel->item as $item) {\n    echo $item->title\
    \ . '<br>';\n}\n```\n\n通常，新闻源包含 50 个或更多项目。这对于新闻网站来说没问题，但你可能希望在自己的网站上显示更短的选项。使用另一个\
    \ SPL 迭代器来选择特定范围的项目。像这样修改代码：\n\n![A978-1-4842-0635-5_7_Fig4_HTML.jpg](img/A978-1-4842-0635-5_7_Fig4_HTML.jpg)\n\
    \n**图 7-4.** 新闻源包含大量项目\n\n保存 `newsfeed.php` 并在浏览器中加载该页面。你应该会看到一长串类似于图 7-4 显示的新闻项。\n\
    \n```php\n$url = 'http://feeds.bbci.co.uk/news/world/rss.xml';\n$feed = simplexml_load_file($url,\
    \ 'SimpleXMLIterator');\n$filtered = new LimitIterator($feed->channel->item, 0,\
    \ 4);\nforeach ($filtered as $item) {\n    echo $item->title . '<br>';\n}\n```\n\
    \n要使用 `SimpleXML` 配合 SPL 迭代器，你需要将 `SimpleXMLIterator` 类的名称作为第二个参数提供给 `simplexml_load_file()`。然后，你可以将要影响的\
    \ `SimpleXML` 元素传递给迭代器的构造函数。\n\n在这个例子中，`$feed->channel->item` 被传递给 `LimitIterator`\
    \ 的构造函数。`LimitIterator` 接受三个参数：要限制的对象、起始点（从 0 开始计数）以及循环运行的次数。这段代码从第一个项目开始，并将项目数量限制为四个。\n\
    \n`foreach` 循环现在遍历 `$filtered` 的结果。如果你再次测试页面，你将看到仅四个标题，如图 7-5 所示。如果显示的标题选择与之前不同，请不要感到惊讶。BBC\
    \ 新闻网站每分钟都在更新。\n\n既然你已经限制了项目的数量，修改 `foreach` 循环，将 `<title>` 元素包裹在一个指向原始文章的链接中，然后显示\
    \ `<pubDate>` 和 `<description>` 元素。循环体如下所示：\n\n![A978-1-4842-0635-5_7_Fig5_HTML.jpg](img/A978-1-4842-0635-5_7_Fig5_HTML.jpg)\n\
    \n**图 7-5.** `LimitIterator` 限制显示的项目数量\n\n```php\nforeach ($filtered as $item)\
    \ { ?>\n    <h2><a href=\"<?= $item->link; ?>\"><?= $item->title; ?></a></h2>\n\
    \    <p class=\"datetime\"><?php echo $item->pubDate; ?></p>\n    <p><?php echo\
    \ $item->description; ?></p>\n<?php } ?>\n```\n\n保存页面并再次测试。链接会将你直接带到 BBC 网站上的相关新闻报道。新闻源现在可以工作了，但是\
    \ `<pubDate>` 的格式遵循 RSS 规范中规定的格式，如下一个截图所示：\n\n![A978-1-4842-0635-5_7_Figl_HTML.jpg](img/A978-1-4842-0635-5_7_Figl_HTML.jpg)\n\
    \n要以更友好的方式格式化日期和时间，请将 `$item->pubDate` 传递给 `DateTime` 类的构造函数，然后使用 `DateTime format()`\
    \ 方法进行显示。像这样修改 `foreach` 循环中的代码：\n\n```php\n<p class=\"datetime\"><?php $date\
    \ = new DateTime($item->pubDate);\necho $date->format('M j, Y, g:ia'); ?></p>\n\
    ```\n\n这将日期重新格式化为如下所示：\n\n![A978-1-4842-0635-5_7_Figm_HTML.jpg](img/A978-1-4842-0635-5_7_Figm_HTML.jpg)\n\
    \n神秘的 PHP 日期格式化字符串在第 14 章中解释。\n\n这看起来好多了，但时间仍然以 GMT（伦敦时间）表示。如果你的网站大多数访问者在美国东海岸，你可能希望显示当地时间。使用\
    \ `DateTime` 对象就没有问题。使用 `setTimezone()` 方法更改为纽约时间。你甚至可以自动显示 EDT（美国东部夏令时）或 EST（美国东部标准时间），具体取决于是否处于夏令时。像这样修改代码：\n\
    \n```php\n<p class=\"datetime\"><?php $date = new DateTime($item->pubDate);\n\
    $date->setTimezone(new DateTimeZone('America/New_York'));\n$offset = $date->getOffset();\n\
    $timezone = ($offset == -14400) ? ' EDT' : ' EST';\necho $date->format('M j, Y,\
    \ g:ia') . $timezone; ?></p>\n```\n\n要创建一个 `DateTimeZone` 对象，请将 [`http://php.net/manual/en/timezones.php`](http://php.net/manual/en/timezones.php)\
    \ 上列出的一个时区作为参数传递给它。这是唯一需要 `DateTimeZone` 对象的地方，因此它被直接创建为 `setTimezone()` 方法的参数。\n\
    \n没有专门的方法告诉你是否处于夏令时，但 `getOffset()` 方法返回时间相对于协调世界时（UTC）的偏移秒数。以下代码行决定显示 EDT 还是\
    \ EST：\n\n```php\n$timezone = ($offset == -14400) ? ' EDT' : ' EST';\n```\n\n\
    这使用了 `$offset` 的值与三元运算符。在夏季，纽约比 UTC 晚四个小时（-14400 秒）。所以，如果 `$offset` 是 -14400，条件判断为\
    \ `true`，则 EDT 被赋值给 `$timezone`。否则，使用 EST。\n\n最后，`$timezone` 的值被连接到格式化后的时间上。`$timezone`\
    \ 使用的字符串有一个前导空格，用于将时区与时间分隔开。当页面加载时，时间会调整为美国东海岸的时间，如下所示：\n\n![A978-1-4842-0635-5_7_Fign_HTML.jpg](img/A978-1-4842-0635-5_7_Fign_HTML.jpg)\n\
    \n![A978-1-4842-0635-5_7_Fig6_HTML.jpg](img/A978-1-4842-0635-5_7_Fig6_HTML.jpg)\n\
    \n**图 7-6.** 实时新闻源只需要十几行 PHP 代码\n\n现在页面只需要用 CSS 进行美化。图 7-6 展示了在 `styles` 文件夹中使用\
    \ `newsfeed.css` 样式化后的最终新闻源。\n\n**提示：** 如果你订阅了 lynda.com 在线培训库，你可以在我的课程“Up and\
    \ Running with the Standard PHP Library”（[`www.lynda.com/PHP-tutorials/Up-Running-Standard-PHP-Library/175038-2.html`](http://www.lynda.com/PHP-tutorials/Up-Running-Standard-PHP-Library/175038-2.html)）中学习更多关于\
    \ SPL 和 SimpleXML 的知识。\n\n虽然我在这个 PHP 方案中使用了 BBC 新闻源，但它应该适用于任何 RSS 2.0 源。例如，你可以在本地尝试使用\
    \ [`http://rss.cnn.com/rss/edition.rss`](http://rss.cnn.com/rss/edition.rss)。在公开网站上使用\
    \ CNN 新闻源需要获得 CNN 的许可。在将任何新闻源整合到网站之前，请务必向版权所有者核实条款和条件。\n"
- fmt: "# Creating a Download Link\n\nA question that crops up regularly in online\
    \ forums is, “How do I create a link to an image (or PDF file) that prompts the\
    \ user to download it?” The quick solution is to convert the file into a compressed\
    \ format, such as ZIP. This frequently results in a smaller download, but the\
    \ downside is that inexperienced users may not know how to unzip the file, or\
    \ they may be using an older operating system that doesn’t include an extraction\
    \ facility. With PHP file system functions, it’s easy to create a link that automatically\
    \ prompts the user to download a file in its original format.\n\n## PHP Solution\
    \ 7-6: Prompting a User to Download an Image\n\nThis PHP solution sends the necessary\
    \ HTTP headers and uses `readfile()` to output the contents of a file as a binary\
    \ stream, forcing the browser to download it.\n\nCreate a PHP file called `download.php`\
    \ in the `filesystem` folder. The full listing is given in the next step. You\
    \ can also find it in `download.php` in the `ch07` folder. Remove any default\
    \ code created by your script editor and insert the following code:\n\n```php\n\
    <?php\n\n// define error page\n$error = 'http://localhost/phpsols/error.php';\n\
    \n// define the path to the download folder\n$filepath = 'C:/xampp/htdocs/phpsols/images/';\n\
    \n$getfile = NULL;\n\n// block any attempt to explore the filesystem\nif (isset($_GET['file'])\
    \ && basename($_GET['file']) == $_GET['file']) {\n    $getfile = $_GET['file'];\n\
    } else {\n    header(\"Location: $error\");\n    exit;\n}\n\nif ($getfile) {\n\
    \    $path = $filepath . $getfile;\n\n    // check that it exists and is readable\n\
    \    if (file_exists($path) && is_readable($path)) {\n        // send the appropriate\
    \ headers\n        header('Content-Type: application/octet-stream');\n       \
    \ header('Content-Length: '. filesize($path));\n        header('Content-Disposition:\
    \ attachment; filename=' . $getfile);\n        header('Content-Transfer-Encoding:\
    \ binary');\n\n        // output the file content\n        readfile($path);\n\
    \    } else {\n        header(\"Location: $error\");\n    }\n}\n```\n\nThe only\
    \ two lines that you need to change in this script are highlighted in bold type.\
    \ The first defines `$error`, a variable that contains the URL of your error page.\
    \ The second line that needs to be changed defines the path to the folder where\
    \ the download file is stored.\n\nThe script works by taking the name of the file\
    \ to be downloaded from a query string appended to the URL and saving it as `$getfile`.\
    \ Because query strings can be easily tampered with, `$getfile` is initially set\
    \ to `NULL`. If you fail to do this, you could give a malicious user access to\
    \ any file on your server.\n\nThe opening conditional statement uses `basename()`\
    \ to make sure that an attacker cannot request a file, such as one that stores\
    \ passwords, from another part of your file structure. As explained in [Chapter\
    \ 4](#A978-1-4842-0635-5_4_Chapter.html), `basename()` extracts the filename component\
    \ of a path, so if `basename($_GET['file'])` is different from `$_GET['file']`,\
    \ you know there’s an attempt to probe your server. You can then stop the script\
    \ from going any further by using the `header()` function to redirect the user\
    \ to the error page.\n\nAfter checking that the requested file exists and is readable,\
    \ the script sends the appropriate HTTP headers and uses `readfile()` to send\
    \ the file to the output buffer. If the file can’t be found, the user is redirected\
    \ to the error page.\n\nTest the script by creating another page; add a couple\
    \ of links to `download.php`. Add a query string at the end of each link with\
    \ `file=` followed by the name a file to be downloaded. You’ll find a page called\
    \ `getdownloads.php` in the `ch07` folder that contains the following two links:\n\
    \n```html\n<p><a href=\"download.php?file=maiko.jpg\">Download image 1</a></p>\n\
    <p><a href=\"download.php?file=basin.jpg\">Download image 2</a></p>\n```\n\nClick\
    \ one of the links. Depending on your browser settings, the file will either be\
    \ downloaded to your default downloads folder or you will be presented with a\
    \ dialog box asking you what to do with the file.\n\nI’ve demonstrated `download.php`\
    \ with image files, but it can be used for any type of file, as the headers send\
    \ the file as a binary stream.\n\n## Caution\n\nThis script relies on `header()`\
    \ to send the appropriate HTTP headers to the browser. It is vital to ensure that\
    \ there are no new lines or whitespace ahead of the opening PHP tag. If you have\
    \ removed all whitespace and still get an error message saying “headers already\
    \ sent,” your editor may have inserted invisible control characters at the beginning\
    \ of the file. Some editing programs insert the byte order mark (BOM), which is\
    \ known to cause problems with the `header()` function. Check your program preferences\
    \ to make sure the option to insert the BOM is deselected.\n\n## Chapter Review\n\
    \nThe file system functions aren’t particularly difficult to use, but there are\
    \ many subtleties that can turn a seemingly simple task into a complicated one.\
    \ It’s important to check that you have the right permissions. Even when handling\
    \ files in your own website, PHP needs permission to access any folder where you\
    \ want to read files or write to them.\n\nThe SPL `FilesystemIterator` and `RecursiveDirectoryIterator`\
    \ classes make it easy to examine the contents of folders. Used in combination\
    \ with the `SplFileInfo` methods and the `RegexIterator`, you can quickly find\
    \ files of a specific type within a folder or folder hierarchy.\n\nWhen dealing\
    \ with remote data sources, you need to check that `allow_url_fopen` hasn’t been\
    \ disabled. One of the most common uses of remote data sources is to extract information\
    \ from RSS news feeds or XML documents, a task that takes only a few lines of\
    \ code thanks to SimpleXML.\n\nIn the next two chapters, we’ll put some of the\
    \ PHP solutions from this chapter to further practical use when working with images\
    \ and building a simple user-authentication system."
  raw: '## Creating a Download Link


    A question that crops up regularly in online forums is, “How do I create a link
    to an image (or PDF file) that prompts the user to download it?” The quick solution
    is to convert the file into a compressed format, such as ZIP. This frequently
    results in a smaller download, but the downside is that inexperienced users may
    not know how to unzip the file, or they may be using an older operating system
    that doesn’t include an extraction facility. With PHP file system functions, it’s
    easy to create a link that automatically prompts the user to download a file in
    its original format.


    ### PHP Solution 7-6: Prompting a User to Download an Image


    This PHP solution sends the necessary HTTP headers and uses `readfile()` to output
    the contents of a file as a binary stream, forcing the browser to download it.


    Create a PHP file called `download.php` in the `filesystem` folder. The full listing
    is given in the next step. You can also find it in `download.php` in the `ch07`
    folder.   Remove any default code created by your script editor and insert the
    following code:


    `<?php`


    `// define error page`


    `$error =` `''` `http://localhost/phpsols/error.php` `''` `;`


    `// define the path to the download folder`


    `$filepath =` `''C:/xampp/htdocs/phpsols/images/''` `;`


    `$getfile = NULL;`


    `// block any attempt to explore the filesystem`


    `if (isset($_GET[''file'']) && basename($_GET[''file'']) == $_GET[''file'']) {`


    `$getfile = $_GET[''file''];`


    `} else {`


    `header("Location: $error");`


    `exit;`


    `}`


    `if ($getfile) {`


    `$path = $filepath . $getfile;`


    `// check that it exists and is readable`


    `if (file_exists($path) && is_readable($path)) {`


    `// send the appropriate headers`


    `header(''Content-Type: application/octet-stream'');`


    `header(''Content-Length: ''. filesize($path));`


    `header(''Content-Disposition: attachment; filename='' . $getfile);`


    `header(''Content-Transfer-Encoding: binary'');`


    `// output the file content`


    `readfile($path);`


    `} else {`


    `header("Location: $error");`


    `}`


    `}`


    The only two lines that you need to change in this script are highlighted in bold
    type. The first defines `$error`, a variable that contains the URL of your error
    page. The second line that needs to be changed defines the path to the folder
    where the download file is stored.


    The script works by taking the name of the file to be downloaded from a query
    string appended to the URL and saving it as `$getfile`. Because query strings
    can be easily tampered with, `$getfile` is initially set to `NULL`. If you fail
    to do this, you could give a malicious user access to any file on your server.


    The opening conditional statement uses `basename()` to make sure that an attacker
    cannot request a file, such as one that stores passwords, from another part of
    your file structure. As explained in [Chapter 4](#A978-1-4842-0635-5_4_Chapter.html),
    `basename()` extracts the filename component of a path, so if `basename($_GET[''file''])`
    is different from `$_GET[''file'']`, you know there’s an attempt to probe your
    server. You can then stop the script from going any further by using the `header()`
    function to redirect the user to the error page.


    After checking that the requested file exists and is readable, the script sends
    the appropriate HTTP headers and uses `readfile()` to send the file to the output
    buffer. If the file can’t be found, the user is redirected to the error page.


    Test the script by creating another page; add a couple of links to `download.php`.
    Add a query string at the end of each link with `file=` followed by the name a
    file to be downloaded. You’ll find a page called `getdownloads.php` in the `ch07`
    folder that contains the following two links:


    `<p><a href="download.php?file=maiko.jpg">Download image 1</a></p>`


    `<p><a href="download.php?file=basin.jpg">Download image 2</a></p>`


    Click one of the links. Depending on your browser settings, the file will either
    be downloaded to your default downloads folder or you will be presented with a
    dialog box asking you what to do with the file.


    I’ve demonstrated `download.php` with image files, but it can be used for any
    type of file, as the headers send the file as a binary stream.


    Caution


    This script relies on `header()` to send the appropriate HTTP headers to the browser.
    It is vital to ensure that there are no new lines or whitespace ahead of the opening
    PHP tag. If you have removed all whitespace and still get an error message saying
    “headers already sent,” your editor may have inserted invisible control characters
    at the beginning of the file. Some editing programs insert the byte order mark
    (BOM), which is known to cause problems with the `header()` function. Check your
    program preferences to make sure the option to insert the BOM is deselected.


    ## Chapter Review


    The file system functions aren’t particularly difficult to use, but there are
    many subtleties that can turn a seemingly simple task into a complicated one.
    It’s important to check that you have the right permissions. Even when handling
    files in your own website, PHP needs permission to access any folder where you
    want to read files or write to them.


    The SPL `FilesystemIterator` and `RecursiveDirectoryIterator` classes make it
    easy to examine the contents of folders. Used in combination with the `SplFileInfo`
    methods and the `RegexIterator`, you can quickly find files of a specific type
    within a folder or folder hierarchy.


    When dealing with remote data sources, you need to check that `allow_url_fopen`
    hasn’t been disabled. One of the most common uses of remote data sources is to
    extract information from RSS news feeds or XML documents, a task that takes only
    a few lines of code thanks to SimpleXML.


    In the next two chapters, we’ll put some of the PHP solutions from this chapter
    to further practical use when working with images and building a simple user-authentication
    system.'
  trans: "\n# 创建下载链接\n\n在线论坛中经常出现的一个问题是：“如何创建一个指向图片（或 PDF 文件）的链接，让用户点击后能直接下载？”快速解决方案是将其文件压缩成\
    \ ZIP 格式。这通常能减小下载体积，但缺点是不熟悉电脑的用户可能不知道如何解压文件，或者他们使用的旧版操作系统不包含解压功能。借助 PHP 文件系统函数，可以轻松创建一个自动提示用户以原始格式下载文件的链接。\n\
    \n## PHP 解决方案 7-6：提示用户下载图片\n\n该 PHP 解决方案会发送必要的 HTTP 头信息，并使用`readfile()`将文件内容以二进制流形式输出，强制浏览器进行下载。\n\
    \n在`filesystem`文件夹中创建一个名为`download.php`的 PHP 文件。完整代码将在下一步给出。你也可以在`ch07`文件夹的`download.php`文件中找到它。删除编辑器自动生成的任何默认代码，并插入以下代码：\n\
    \n```php\n<?php\n\n// 定义错误页面\n$error = 'http://localhost/phpsols/error.php';\n\
    \n// 定义下载文件夹的路径\n$filepath = 'C:/xampp/htdocs/phpsols/images/';\n\n$getfile =\
    \ NULL;\n\n// 阻止任何试探文件系统的尝试\nif (isset($_GET['file']) && basename($_GET['file'])\
    \ == $_GET['file']) {\n    $getfile = $_GET['file'];\n} else {\n    header(\"\
    Location: $error\");\n    exit;\n}\n\nif ($getfile) {\n    $path = $filepath .\
    \ $getfile;\n\n    // 检查文件是否存在且可读\n    if (file_exists($path) && is_readable($path))\
    \ {\n        // 发送适当的头信息\n        header('Content-Type: application/octet-stream');\n\
    \        header('Content-Length: '. filesize($path));\n        header('Content-Disposition:\
    \ attachment; filename=' . $getfile);\n        header('Content-Transfer-Encoding:\
    \ binary');\n\n        // 输出文件内容\n        readfile($path);\n    } else {\n   \
    \     header(\"Location: $error\");\n    }\n}\n```\n\n此脚本中需要修改的两行代码已用粗体标注。第一行定义了`$error`变量，这个变量包含你的错误页面\
    \ URL。第二行需要修改的是定义存储下载文件文件夹路径的代码。\n\n脚本的工作原理是：从 URL 后附加的查询字符串中获取要下载的文件名，并将其保存为`$getfile`。由于查询字符串很容易被篡改，`$getfile`首先被设置为`NULL`。如果不这样做，可能会让恶意用户访问你服务器上的任何文件。\n\
    \n开头的条件语句使用`basename()`来确保攻击者无法从文件结构的其他部分请求文件（例如存储密码的文件）。正如第 4 章所解释的，`basename()`会提取路径中的文件名部分，因此如果`basename($_GET['file'])`与`$_GET['file']`不同，就说明有人试图探测你的服务器。这时可以用`header()`函数将用户重定向到错误页面，从而阻止脚本继续执行。\n\
    \n在检查请求的文件存在且可读后，脚本会发送适当的 HTTP 头信息，并使用`readfile()`将文件发送到输出缓冲区。如果找不到该文件，用户将被重定向到错误页面。\n\
    \n通过创建另一个页面来测试该脚本；向`download.php`添加两个链接。在每个链接的末尾添加带有`file=`的查询字符串，后跟要下载的文件名。你可以在`ch07`文件夹中找到名为`getdownloads.php`的页面，其中包含以下两个链接：\n\
    \n```html\n<p><a href=\"download.php?file=maiko.jpg\">下载图片 1</a></p>\n<p><a href=\"\
    download.php?file=basin.jpg\">下载图片 2</a></p>\n```\n\n点击其中一个链接。根据你的浏览器设置，文件将下载到默认的下载文件夹，或者会弹出一个对话框询问你要如何处理该文件。\n\
    \n我使用图片文件演示了`download.php`，但它可以用于任何类型的文件，因为头信息会将文件作为二进制流发送。\n\n## 注意\n\n此脚本依赖于`header()`向浏览器发送适当的\
    \ HTTP 头信息。务必确保在 PHP 开始标签之前没有任何换行符或空白字符。如果你已经移除了所有空白字符但仍收到“headers already sent”报错信息，可能是你的编辑器在文件开头插入了不可见的控制字符。某些编辑程序会插入字节顺序标记（BOM），已知这会导致`header()`函数出现问题。请检查你的程序偏好设置，确保取消选中插入\
    \ BOM 的选项。\n\n## 章节回顾\n\n文件系统函数并不特别难用，但存在许多细微之处，这些细节可能会将一个看似简单的任务变成复杂的难题。检查你是否拥有正确的权限非常重要。即使在处理自己网站内的文件时，PHP\
    \ 也需要有权限访问你想读取或写入文件的任何文件夹。\n\nSPL 的`FilesystemIterator`和`RecursiveDirectoryIterator`类可以轻松检查文件夹的内容。结合`SplFileInfo`方法和`RegexIterator`，你可以快速在文件夹或文件夹层级中找到特定类型的文件。\n\
    \n处理远程数据源时，需要检查`allow_url_fopen`是否未被禁用。远程数据源最常见的用途之一是从 RSS 新闻源或 XML 文档中提取信息，由于\
    \ SimpleXML 的存在，这项任务只需几行代码即可完成。\n\n在接下来的两章中，我们将进一步实际应用本章的一些 PHP 解决方案，包括处理图片和构建一个简单的用户身份验证系统。\n"
- fmt: "# 8. Generating Thumbnail Images\n\nPHP has an extensive range of functions\
    \ designed to work with images. You’ve already met one of them, `getimagesize()`,\
    \ in [Chapter 4](#A978-1-4842-0635-5_4_Chapter.html). As well as providing useful\
    \ information about an image’s dimensions, PHP can manipulate images by resizing\
    \ or rotating them. It can also add text dynamically without affecting the original\
    \ and can even create images on the fly.\n\nTo give you just a taste of PHP image\
    \ manipulation, I’m going to show you how to generate a smaller copy of an uploaded\
    \ image. Most of the time you’ll want to use a dedicated graphics program, such\
    \ as Adobe Photoshop, to generate thumbnail images because it will give you much\
    \ better quality control. However, automatic thumbnail generation with PHP can\
    \ be very useful if you want to allow registered users to upload images while\
    \ ensuring they conform to a maximum size. You can save just the resized copy\
    \ or the copy along with the original.\n\nIn [Chapter 6](#A978-1-4842-0635-5_6_Chapter.html)\
    \ you built a PHP class to handle file uploads. In this chapter you’ll create\
    \ two classes: one to generate thumbnail images, the other to upload and resize\
    \ images in a single operation. Rather than build the second class from scratch,\
    \ you’ll base it on the `Upload` class from [Chapter 6](#A978-1-4842-0635-5_6_Chapter.html).\
    \ A great advantage of using classes is that they’re extensible—a class based\
    \ on another can inherit the functionality of its parent class. Building the classes\
    \ to upload images and generate thumbnails from them involves a lot of code. But\
    \ once you have defined the classes, using them involves only a few lines of script.\
    \ If you’re in a rush or if writing a lot of code makes you break out in a cold\
    \ sweat, you can just use the finished classes. Come back later to learn how the\
    \ code works. It uses many basic PHP functions that you’ll find useful in other\
    \ situations.\n\nIn this chapter, you’ll learn about the following:\n\n*   Scaling\
    \ an image\n*   Saving a rescaled image\n*   Automatically resizing and renaming\
    \ uploaded images\n*   Creating a subclass by extending an existing one\n\n##\
    \ Checking Your Server’s Capabilities\n\nWorking with images in PHP relies on\
    \ the GD extension. Originally, GD stood for GIF Draw, but problems with the GIF\
    \ patent led to support for GIF files being dropped in 1999, but the name GD stuck.\
    \ The problematic patent expired in 2004, and GIF is once again supported. The\
    \ all-in-one PHP packages recommended in [Chapter 2](#A978-1-4842-0635-5_2_Chapter.html)\
    \ support GD by default, but you need to make sure the GD extension has also been\
    \ enabled on your remote web server.\n\nAs in previous chapters, run `phpinfo()`\
    \ on your website to check the server’s configuration. Scroll down until you reach\
    \ the section shown in the following screenshot (it should be about halfway down\
    \ the page):\n\n![A978-1-4842-0635-5_8_Figa_HTML.jpg](A978-1-4842-0635-5_8_Figa_HTML.jpg)\n\
    \nIf you can’t find this section, the GD extension isn’t enabled, so you won’t\
    \ be able to use any of the scripts in this chapter on your website. Ask for it\
    \ to be enabled or move to a different host.\n\n> **Note**  \n> Strictly for abbreviation/acronym\
    \ freaks: GIF stands for Graphics Interchange Format. JPEG is the standard created\
    \ by the Joint Photographic Experts Group, and PNG is short for Portable Network\
    \ Graphics. Although JPEG is the correct name for the standard, the “E” is frequently\
    \ dropped, particularly when used as a filename extension.\n\n## Manipulating\
    \ Images Dynamically\n\nThe GD extension allows you to generate images entirely\
    \ from scratch or work with existing images. Either way, the underlying process\
    \ always follows four basic steps:\n\n1. Create a resource for the image in the\
    \ server’s memory while it’s being processed.\n2. Process the image.\n3. Display\
    \ and/or save the image.\n4. Remove the image resource from the server’s memory.\n\
    \nThis process means that you are always working on an image in memory only and\
    \ not on the original. Unless you save the image to disk before the script terminates,\
    \ any changes are discarded. Working with images requires a lot of memory, so\
    \ it’s vital to destroy the image resource as soon as it’s no longer needed. If\
    \ a script runs very slowly or crashes, it probably indicates that the original\
    \ image is too large.\n\n### Making a Smaller Copy of an Image\n\nThe aim of this\
    \ chapter is to show you how to resize images automatically on upload. This involves\
    \ extending the `Upload` class from [Chapter 6](#A978-1-4842-0635-5_6_Chapter.html).\
    \ However, to make it easier to understand how to work with PHP’s image manipulation\
    \ functions, I propose to start by using images already on the server and then\
    \ create a separate class to generate the thumbnail images.\n\n#### Getting Ready\n\
    \nThe starting point is the following simple form, which uses PHP Solution 7-3\
    \ to create a drop-down menu of the photos in the `images` folder. You can find\
    \ the code in `create_thumb_01.php` in the `ch08` folder. Copy it to a new folder\
    \ called `gd` in the `phpsols` site root and rename it `create_thumb.php`.\n\n\
    At the top of the page is a PHP block that assigns to a variable called `$folder`\
    \ the fully qualified path to the `images` folder in the `phpsols` site in XAMPP\
    \ on Windows. The default location for MAMP on Mac OS X is commented out on the\
    \ next line. Make any adjustments to match your own setup.\n\nThe form in the\
    \ body of the page looks like this:\n\n```html\n<form method=\"post\" action=\"\
    \">\n<p>\n<select name=\"pix\" id=\"pix\">\n<option value=\"\">Select an image</option>\n\
    <?php\n$files = new FilesystemIterator('../images');\n$images = new RegexIterator($files,\
    \ '/\\.(?:jpg|png|gif)$/i');\nforeach ($images as $image) {\n$filename = $image->getFilename();\n\
    ?>\n<option value=\"<?= $folder . $filename; ?>\"><?= $filename; ?></option>\n\
    <?php } ?>\n</select>\n</p>\n<p>\n<input type=\"submit\" name=\"create\" value=\"\
    Create Thumbnail\">\n</p>\n</form>\n```\n\nWhen loaded into a browser, the drop-down\
    \ menu should display the names of the photos in the `images` folder. This makes\
    \ it easier to pick images quickly for testing.\n\nInside the `upload_test` folder\
    \ that you created in [Chapter 6](#A978-1-4842-0635-5_6_Chapter.html), create\
    \ a new folder called `thumbs`, making sure it has the necessary permissions for\
    \ PHP to write to it. Refer to “Establishing an upload directory” in [Chapter\
    \ 6](#A978-1-4842-0635-5_6_Chapter.html) if you need to refresh your memory.\n\
    \n#### Building the Thumbnail Class\n\nTo generate a thumbnail image, the class\
    \ needs to execute the following steps:\n\n- Get the dimensions of the original\
    \ image.\n- Get the image’s MIME type.\n- Calculate the scaling ratio.\n- Create\
    \ an image resource of the correct MIME type for the original image.\n- Create\
    \ an image resource for the thumbnail.\n- Create the resized copy.\n- Save the\
    \ resized copy to the destination folder using the correct MIME type.\n- Destroy\
    \ the image resources to free memory.\n\nIn addition to generating a thumbnail\
    \ image, the class automatically inserts `_thb` before the filename extension,\
    \ but a public method allows you to alter this value. The class also needs public\
    \ methods to set the destination folder and the maximum size of the thumbnail,\
    \ as well as to retrieve messages generated by the class. To keep the calculations\
    \ simple, the maximum size controls only the larger of the thumbnail’s dimensions.\n\
    \nTo avoid naming conflicts, the `Thumbnail` class will use a namespace. Because\
    \ it’s exclusively for images, we’ll create a new folder called `Image` in the\
    \ `PhpSolutions` folder and use `PhpSolutions\\Image` as the namespace.\n\nThere’s\
    \ a lot to do, so I’ll break up the code into sections. They’re all part of the\
    \ same class definition, but presenting the script this way should make it easier\
    \ to understand, particularly if you want to use some of the code in a different\
    \ context."
  raw: '# 8. Generating Thumbnail Images


    PHP has an extensive range of functions designed to work with images. You’ve already
    met one of them, `getimagesize()`, in [Chapter 4](#A978-1-4842-0635-5_4_Chapter.html).
    As well as providing useful information about an image’s dimensions, PHP can manipulate
    images by resizing or rotating them. It can also add text dynamically without
    affecting the original and can even create images on the fly.


    To give you just a taste of PHP image manipulation, I’m going to show you how
    to generate a smaller copy of an uploaded image. Most of the time you’ll want
    to use a dedicated graphics program, such as Adobe Photoshop, to generate thumbnail
    images because it will give you much better quality control. However, automatic
    thumbnail generation with PHP can be very useful if you want to allow registered
    users to upload images while ensuring they conform to a maximum size. You can
    save just the resized copy or the copy along with the original.


    In [Chapter 6](#A978-1-4842-0635-5_6_Chapter.html) you built a PHP class to handle
    file uploads. In this chapter you’ll create two classes: one to generate thumbnail
    images, the other to upload and resize images in a single operation. Rather than
    build the second class from scratch, you’ll base it on the `Upload` class from
    [Chapter 6](#A978-1-4842-0635-5_6_Chapter.html). A great advantage of using classes
    is that they’re extensible—a class based on another can inherit the functionality
    of its parent class. Building the classes to upload images and generate thumbnails
    from them involves a lot of code. But once you have defined the classes, using
    them involves only a few lines of script. If you’re in a rush or if writing a
    lot of code makes you break out in a cold sweat, you can just use the finished
    classes. Come back later to learn how the code works. It uses many basic PHP functions
    that you’ll find useful in other situations.


    In this chapter, you’ll learn about the following:


    *   Scaling an image

    *   Saving a rescaled image

    *   Automatically resizing and renaming uploaded images

    *   Creating a subclass by extending an existing one


    ## Checking Your Server’s Capabilities


    Working with images in PHP relies on the GD extension. Originally, GD stood for
    GIF Draw, but problems with the GIF patent led to support for GIF files being
    dropped in 1999, but the name GD stuck. The problematic patent expired in 2004,
    and GIF is once again supported. The all-in-one PHP packages recommended in [Chapter
    2](#A978-1-4842-0635-5_2_Chapter.html) support GD by default, but you need to
    make sure the GD extension has also been enabled on your remote web server.


    As in previous chapters, run `phpinfo()` on your website to check the server’s
    configuration. Scroll down until you reach the section shown in the following
    screenshot (it should be about halfway down the page):


    ![A978-1-4842-0635-5_8_Figa_HTML.jpg](A978-1-4842-0635-5_8_Figa_HTML.jpg)


    If you can’t find this section, the GD extension isn’t enabled, so you won’t be
    able to use any of the scripts in this chapter on your website. Ask for it to
    be enabled or move to a different host.


    Note


    Strictly for abbreviation/acronym freaks: GIF stands for Graphics Interchange
    Format. JPEG is the standard created by the Joint Photographic Experts Group,
    and PNG is short for Portable Network Graphics. Although JPEG is the correct name
    for the standard, the “E” is frequently dropped, particularly when used as a filename
    extension.


    ## Manipulating Images Dynamically


    The GD extension allows you to generate images entirely from scratch or work with
    existing images. Either way, the underlying process always follows four basic
    steps:


    Create a resource for the image in the server’s memory while it’s being processed.
      Process the image.   Display and/or save the image.   Remove the image resource
    from the server’s memory.  


    This process means that you are always working on an image in memory only and
    not on the original. Unless you save the image to disk before the script terminates,
    any changes are discarded. Working with images requires a lot of memory, so it’s
    vital to destroy the image resource as soon as it’s no longer needed. If a script
    runs very slowly or crashes, it probably indicates that the original image is
    too large.


    ### Making a Smaller Copy of an Image


    The aim of this chapter is to show you how to resize images automatically on upload.
    This involves extending the `Upload` class from [Chapter 6](#A978-1-4842-0635-5_6_Chapter.html).
    However, to make it easier to understand how to work with PHP’s image manipulation
    functions, I propose to start by using images already on the server and then create
    a separate class to generate the thumbnail images.


    #### Getting Ready


    The starting point is the following simple form, which uses PHP Solution 7-3 to
    create a drop-down menu of the photos in the `images` folder. You can find the
    code in `create_thumb_01.php` in the `ch08` folder. Copy it to a new folder called
    `gd` in the `phpsols` site root and rename it `create_thumb.php`.


    At the top of the page is a PHP block that assigns to a variable called `$folder`
    the fully qualified path to the `images` folder in the `phpsols` site in XAMPP
    on Windows. The default location for MAMP on Mac OS X is commented out on the
    next line. Make any adjustments to match your own setup.


    The form in the body of the page looks like this:


    `<form method="post" action="">`


    `<p>`


    `<select name="pix" id="pix">`


    `<option value="">Select an image</option>`


    `<?php`


    `$files = new FilesystemIterator(''../images'');`


    `$images = new RegexIterator($files, ''/\.(?:jpg|png|gif)$/i'');`


    `foreach ($images as $image) {`


    `$filename = $image->getFilename();`


    `?>`


    `<option value="<?= $folder . $filename; ?>"><?= $filename; ?></option>`


    `<?php } ?>`


    `</select>`


    `</p>`


    `<p>`


    `<input type="submit" name="create" value="Create Thumbnail">`


    `</p>`


    `</form>`


    When loaded into a browser, the drop-down menu should display the names of the
    photos in the `images` folder. This makes it easier to pick images quickly for
    testing.


    Inside the `upload_test` folder that you created in [Chapter 6](#A978-1-4842-0635-5_6_Chapter.html),
    create a new folder called `thumbs`, making sure it has the necessary permissions
    for PHP to write to it. Refer to “Establishing an upload directory” in [Chapter
    6](#A978-1-4842-0635-5_6_Chapter.html) if you need to refresh your memory.


    #### Building the Thumbnail Class


    To generate a thumbnail image, the class needs to execute the following steps:


    Get the dimensions of the original image.   Get the image’s MIME type.   Calculate
    the scaling ratio.   Create an image resource of the correct MIME type for the
    original image.   Create an image resource for the thumbnail.   Create the resized
    copy.   Save the resized copy to the destination folder using the correct MIME
    type.   Destroy the image resources to free memory.  


    In addition to generating a thumbnail image, the class automatically inserts `_thb`
    before the filename extension, but a public method allows you to alter this value.
    The class also needs public methods to set the destination folder and the maximum
    size of the thumbnail, as well as to retrieve messages generated by the class.
    To keep the calculations simple, the maximum size controls only the larger of
    the thumbnail’s dimensions.


    To avoid naming conflicts, the `Thumbnail` class will use a namespace. Because
    it’s exclusively for images, we’ll create a new folder called `Image` in the `PhpSolutions`
    folder and use `PhpSolutions\Image` as the namespace.


    There’s a lot to do, so I’ll break up the code into sections. They’re all part
    of the same class definition, but presenting the script this way should make it
    easier to understand, particularly if you want to use some of the code in a different
    context.'
  trans: "\n# 8. 生成缩略图\n\nPHP 拥有大量用于处理图像的函数。你已在第 4 章中认识了其中一个函数——`getimagesize()`。除了提供图像尺寸的有用信息外，PHP\
    \ 还能通过调整大小或旋转来操作图像。它还能在不影响原图的情况下动态添加文本，甚至可以即时创建图像。\n\n为了让你初步体验 PHP 的图像处理功能，我将向你展示如何生成已上传图像的较小副本。大多数情况下，你会想使用像\
    \ Adobe Photoshop 这样的专用图形程序来生成缩略图，因为它能提供更好的质量控制。但如果你想允许注册用户上传图像，同时确保它们符合最大尺寸限制，使用\
    \ PHP 自动生成缩略图就会非常有用。你可以只保存调整大小后的副本，也可以同时保存副本和原图。\n\n在第 6 章中，你构建了一个处理文件上传的 PHP\
    \ 类。本章中，你将创建两个类：一个用于生成缩略图，另一个用于在单次操作中上传和调整图像大小。第二个类并非从头构建，而是基于第 6 章的 `Upload`\
    \ 类。使用类的一大优势是它们具有可扩展性——基于另一个类的类可以继承其父类的功能。构建用于上传图像并从中生成缩略图的类涉及大量代码。但一旦定义了这些类，使用它们只需几行脚本。如果你很赶时间，或者写大量代码会让你冷汗直流，可以直接使用完成后的类。稍后再回来了解代码的工作原理。它使用了许多在其他情况下也很有用的基本\
    \ PHP 函数。\n\n在本章中，你将了解以下内容：\n\n*   缩放图像\n*   保存缩放后的图像\n*   自动调整大小并重命名上传的图像\n*\
    \   通过扩展现有类来创建子类\n\n## 检查服务器的能力\n\n在 PHP 中处理图像依赖于 GD 扩展。最初，GD 代表 GIF Draw，但由于\
    \ GIF 专利的问题，对 GIF 文件的支持在 1999 年被取消，但 GD 这个名称保留了下来。有问题的专利于 2004 年到期，GIF 再次得到支持。第\
    \ 2 章中推荐的一体化 PHP 包默认支持 GD，但你需要确保你的远程 Web 服务器上也已启用 GD 扩展。\n\n与前几章一样，在你的网站上运行 `phpinfo()`\
    \ 来检查服务器配置。向下滚动，直到到达以下屏幕截图所示的区域（它应该在页面中间位置）：\n\n![A978-1-4842-0635-5_8_Figa_HTML.jpg](img/A978-1-4842-0635-5_8_Figa_HTML.jpg)\n\
    \n如果你找不到这个区域，说明 GD 扩展未启用，因此你将无法在你的网站上使用本章的任何脚本。请请求启用它，或更换到不同的主机。\n\n> **注意** \
    \ \n> 严格针对缩写/首字母缩略词爱好者：GIF 代表图形交换格式。JPEG 是联合图像专家小组创建的标准，而 PNG 是便携式网络图形的缩写。尽管 JPEG\
    \ 是该标准的正确名称，但 “E” 经常被省略，尤其是在用作文件扩展名时。\n\n## 动态操作图像\n\nGD 扩展允许你完全从头生成图像或处理现有图像。无论哪种方式，底层过程总是遵循四个基本步骤：\n\
    \n1.  在处理图像时，在服务器内存中为图像创建一个资源。\n2.  处理图像。\n3.  显示和/或保存图像。\n4.  从服务器内存中移除图像资源。\n\
    \n这个过程意味着你始终只在内存中操作图像，而不是在原图上操作。除非你在脚本终止前将图像保存到磁盘，否则任何更改都会丢失。处理图像需要大量内存，因此在不再需要时立即销毁图像资源至关重要。如果脚本运行非常缓慢或崩溃，很可能表明原始图像过大。\n\
    \n### 制作较小的图像副本\n\n本章的目的是向你展示如何在上传时自动调整图像大小。这涉及到扩展第 6 章中的 `Upload` 类。然而，为了更容易理解如何使用\
    \ PHP 的图像处理函数，我建议先从使用服务器上已有的图像开始，然后创建一个单独的类来生成缩略图。\n\n#### 准备工作\n\n起点是以下简单的表单，它使用\
    \ PHP 解决方案 7-3 创建 `images` 文件夹中照片的下拉菜单。你可以在 `ch08` 文件夹的 `create_thumb_01.php`\
    \ 中找到代码。将其复制到 `phpsols` 站点根目录的新文件夹 `gd` 中，并将其重命名为 `create_thumb.php`。\n\n页面顶部是一个\
    \ PHP 代码块，它将 `phpsols` 站点中指向 `images` 文件夹的完整路径分配给名为 `$folder` 的变量（基于 Windows 系统上的\
    \ XAMPP）。下一行注释掉了 Mac OS X 上 MAMP 的默认位置。请根据你自己的设置进行相应调整。\n\n页面主体中的表单如下所示：\n\n```html\n\
    <form method=\"post\" action=\"\">\n<p>\n<select name=\"pix\" id=\"pix\">\n<option\
    \ value=\"\">选择一张图像</option>\n<?php\n$files = new FilesystemIterator('../images');\n\
    $images = new RegexIterator($files, '/\\.(?:jpg|png|gif)$/i');\nforeach ($images\
    \ as $image) {\n$filename = $image->getFilename();\n?>\n<option value=\"<?= $folder\
    \ . $filename; ?>\"><?= $filename; ?></option>\n<?php } ?>\n</select>\n</p>\n\
    <p>\n<input type=\"submit\" name=\"create\" value=\"创建缩略图\">\n</p>\n</form>\n\
    ```\n\n加载到浏览器后，下拉菜单应显示 `images` 文件夹中照片的名称。这可以让你更方便地快速选择图像进行测试。\n\n在你于第 6 章创建的\
    \ `upload_test` 文件夹中，创建一个名为 `thumbs` 的新文件夹，并确保它具有 PHP 写入所需的权限。如果需要复习，请参考第 6 章中的“建立上传目录”。\n\
    \n#### 构建缩略图类\n\n为了生成缩略图，该类需要执行以下步骤：\n\n-   获取原始图像的尺寸。\n-   获取图像的 MIME 类型。\n-\
    \   计算缩放比例。\n-   为原始图像创建正确 MIME 类型的图像资源。\n-   为缩略图创建一个图像资源。\n-   创建调整大小后的副本。\n\
    -   使用正确的 MIME 类型将调整大小后的副本保存到目标文件夹。\n-   销毁图像资源以释放内存。\n\n除了生成缩略图，该类会自动在文件扩展名之前插入\
    \ `_thb`，但一个公共方法允许你更改此值。该类还需要公共方法来设置目标文件夹和缩略图的最大尺寸，以及检索由该类生成的消息。为了简化计算，最大尺寸仅控制缩略图两个维度中较大的那个。\n\
    \n为了避免命名冲突，`Thumbnail` 类将使用命名空间。由于它专门用于图像，我们将在 `PhpSolutions` 文件夹中创建一个名为 `Image`\
    \ 的新文件夹，并使用 `PhpSolutions\\Image` 作为命名空间。\n\n要做的事情很多，所以我将代码分成几个部分。它们都是同一个类定义的一部分，但以这种方式呈现脚本应该更易于理解，特别是如果你想在其他上下文中使用其中的某些代码。\n"
- fmt: "# PHP Solution 8-1: Getting the Image Details\n\nThis PHP solution describes\
    \ how to get the dimensions and MIME type of the original image.\n\nCreate a new\
    \ folder called `Image` in the `PhpSolutions` folder. Then create a page called\
    \ `Thumbnail.php` inside the folder. The file will contain only PHP, so strip\
    \ out any HTML code inserted by your editing program. Declare the namespace at\
    \ the top of the new file:\n\n`namespace PhpSolutions\\Image;`\n\nThe class needs\
    \ to keep track of quite a few properties. Begin the class definition by listing\
    \ them, like this:\n\n```\nclass Thumbnail {\n\n    protected $original;\n   \
    \ protected $originalwidth;\n    protected $originalheight;\n    protected $basename;\n\
    \    protected $thumbwidth;\n    protected $thumbheight;\n    protected $maxSize\
    \ = 120;\n    protected $canProcess = false;\n    protected $imageType;\n    protected\
    \ $destination;\n    protected $suffix = '_thb';\n    protected $messages = [];\n\
    \n}\n```\n\nAs in the `Upload` class, all the properties have been declared as\
    \ protected, which means they can’t be changed accidentally outside the class\
    \ definition. The names are descriptive, so they need little explanation. The\
    \ `$maxSize` property has been given a default value of 120 (pixels). This determines\
    \ the maximum size of the thumbnail’s longer dimension.\n\nThe `$canProcess` Boolean\
    \ is initially set to `false`. This is to prevent the script from attempting to\
    \ process a file that isn’t an image. The value will be reset to `true` if the\
    \ MIME type matches that of an image. You can also use it to prevent the generation\
    \ of a thumbnail if another error occurs.\n\nThe constructor takes one argument,\
    \ the path to an image. Add the constructor definition after the list of protected\
    \ properties, but inside the closing curly brace:\n\n```\npublic function __construct($image)\
    \ {\n    if (is_file($image) && is_readable($image)) {\n        $details = getimagesize($image);\n\
    \    } else {\n        $details = null;\n        $this->messages[] = \"Cannot\
    \ open $image.\";\n    }\n\n    // if getimagesize() returns an array, it looks\
    \ like an image\n    if (is_array($details)) {\n        $this->original = $image;\n\
    \        $this->originalwidth = $details[0];\n        $this->originalheight =\
    \ $details[1];\n        $this->basename = pathinfo($image, PATHINFO_FILENAME);\n\
    \        // check the MIME type\n        $this->checkType($details['mime']);\n\
    \    } else {\n        $this->messages[] = \"$image doesn't appear to be an image.\"\
    ;\n    }\n}\n```\n\nThe constructor begins with a conditional statement that checks\
    \ that `$image` is a file and is readable. If it is, it’s passed to `getimagesize()`,\
    \ and the result is stored in `$details`. Otherwise, `$details` is set to `null`,\
    \ and an error message is added to the `$messages` property.\n\nWhen you pass\
    \ an image to `getimagesize()`, it returns an array containing the following elements:\n\
    \n- `0`: Width (in pixels)\n- `1`: Height\n- `2`: An integer indicating the type\
    \ of image\n- `3`: A string containing the correct width and height attributes\
    \ ready for insertion in an `<img>` tag\n- `mime`: The image’s MIME type\n- `channels`:\
    \ `3` for RGB and `4` for CMYK images\n- `bits`: The number of bits for each color\n\
    \nIf the value passed as an argument to `getimagesize()` isn’t an image, it returns\
    \ `false`. Consequently, if `$details` is an array, you know you’re dealing with\
    \ an image. The image’s path is stored in the `$original` property, and its width\
    \ and height are stored in `$originalWidth` and `$originalHeight`, respectively.\n\
    \nThe file’s name without the filename extension is extracted using `pathinfo()`\
    \ with the `PATHINFO_FILENAME` constant in the same way as in PHP Solution 6-6.\
    \ This is stored in the `$basename` property and will be used to build the thumbnail’s\
    \ name with the suffix.\n\nHowever, the image might not be a suitable type, so\
    \ the final check is to pass its MIME type to an internal method called `checkType()`,\
    \ which you’ll define next.\n\nThe `checkType()` method compares the MIME type\
    \ with an array of acceptable image types. If it finds a match, it resets the\
    \ `$canProcess` property to `true` and stores the type in the `$imageType` property.\
    \ The method is used internally, so it needs to be declared as protected. Add\
    \ the following code to the class definition:\n\n```\nprotected function checkType($mime)\
    \ {\n    $mimetypes = ['image/jpeg', 'image/png', 'image/gif'];\n    if (in_array($mime,\
    \ $mimetypes)) {\n        $this->canProcess = true;\n        // extract the characters\
    \ after 'image/'\n        $this->imageType = substr($mime, 6);\n    }\n}\n```\n\
    \nThere are many types of images, but JPEG, PNG, and GIF are the only ones universally\
    \ supported by browsers; the `$canProcess` property is set to `true` only if the\
    \ image’s MIME type matches one of those listed in the `$mimetypes` array. If\
    \ the MIME type isn’t in the list, `$canProcess` remains `false`, which later\
    \ prevents the class from attempting to create a thumbnail.\n\nAll image MIME\
    \ types begin with `image/`. To make the value easier to use later, the `substr()`\
    \ function extracts the characters after the slash and stores them in the `$imageType`\
    \ property. When used with two arguments, `substr()` starts at the position (counting\
    \ from 0) specified in the second argument and returns the rest of the string.\n\
    \n> **Note:** Although PHP 5.5 and later can process WebP images, I decided against\
    \ including them in the `Thumbnail` class because of limited browser support.\
    \ At the time of this writing, the WebP image format is supported by only Google\
    \ Chrome, Opera, and Android 4.\n\nIt’s a good idea to test your code as you build\
    \ the class. Catching errors early is much easier than hunting for a problem in\
    \ a long script. To test the code, create a new public method called `test()`\
    \ inside the class definition.\n\nIt doesn’t matter in which order your methods\
    \ appear inside the class definition, but it’s common practice to keep all public\
    \ methods together after the constructor and to put protected methods at the bottom\
    \ of the file. This makes the code easier to maintain.\n\nInsert the following\
    \ definition between the constructor and the `checkType()` definition:\n\n```\n\
    public function test() {\n    echo 'File: ' . $this->original . '<br>';\n    echo\
    \ 'Original width: ' . $this->originalwidth . '<br>';\n    echo 'Original height:\
    \ ' . $this->originalheight . '<br>';\n    echo 'Base name: ' . $this->basename\
    \ . '<br>';\n    echo 'Image type: ' . $this->imageType . '<br>';\n    if ($this->messages)\
    \ {\n        print_r($this->messages);\n    }\n}\n```\n\nThis uses `echo` and\
    \ `print_r()` to display the value of the properties.\n\nTo test the class definition\
    \ so far, save `Thumbnail.php` and add the following code to the PHP block above\
    \ the `DOCTYPE` declaration in `create_thumb.php` (the code can be found in `create_thumb_02.php`\
    \ in the `ch08` folder):\n\n```\nuse PhpSolutions\\Image\\Thumbnail;\n\nif (isset($_POST['create']))\
    \ {\n    require_once('../PhpSolutions/Image/Thumbnail.php');\n    try {\n   \
    \     $thumb = new Thumbnail($_POST['pix']);\n        $thumb->test();\n    } catch\
    \ (Exception $e) {\n        echo $e->getMessage();\n    }\n}\n```\n\nThis imports\
    \ the `Thumbnail` class from the `PhpSolutions\\Image` namespace, then adds the\
    \ code that is to be executed when the form is submitted.\n\nThe `name` attribute\
    \ of the submit button in `create_thumb.php` is `create`, so this code runs only\
    \ when the form has been submitted. It includes the `Thumbnail` class definition,\
    \ creates an instance of the class, passing the selected value from the form as\
    \ an argument, and calls the `test()` method.\n\n![A978-1-4842-0635-5_8_Fig1_HTML.jpg](A978-1-4842-0635-5_8_Fig1_HTML.jpg)\n\
    \n**Figure 8-1.** Displaying the details of the selected image confirms the code\
    \ is working.\n\nSave `create_thumb.php` and load it into a browser. Select an\
    \ image and click Create Thumbnail. This produces output similar to Figure [8-1](#A978-1-4842-0635-5_8_Chapter.html#Fig1).\n\
    \nIf necessary, check your code against `Thumbnail_01.php` in the `ch08/PhpSolutions/Images`\
    \ folder."
  raw: '#### PHP Solution 8-1: Getting the Image Details


    This PHP solution describes how to get the dimensions and MIME type of the original
    image.


    Create a new folder called `Image` in the `PhpSolutions` folder. Then create a
    page called `Thumbnail.php` inside the folder. The file will contain only PHP,
    so strip out any HTML code inserted by your editing program.   Declare the namespace
    at the top of the new file:


    `namespace PhpSolutions\Image;`


    The class needs to keep track of quite a few properties. Begin the class definition
    by listing them, like this:


    `class Thumbnail {`


    `protected $original;`


    `protected $originalwidth;`


    `protected $originalheight;`


    `protected $basename;`


    `protected $thumbwidth;`


    `protected $thumbheight;`


    `protected $maxSize = 120;`


    `protected $canProcess = false;`


    `protected $imageType;`


    `protected $destination;`


    `protected $suffix = ''_thb'';`


    `protected $messages = [];`


    `}`


    As in the `Upload` class, all the properties have been declared as protected,
    which means they can’t be changed accidentally outside the class definition. The
    names are descriptive, so they need little explanation. The `$maxSize` property
    has been given a default value of 120 (pixels). This determines the maximum size
    of the thumbnail’s longer dimension.


    The `$canProcess` Boolean is initially set to `false`. This is to prevent the
    script from attempting to process a file that isn’t an image. The value will be
    reset to `true` if the MIME type matches that of an image. You can also use it
    to prevent the generation of a thumbnail if another error occurs.


    The constructor takes one argument, the path to an image. Add the constructor
    definition after the list of protected properties, but inside the closing curly
    brace:


    `public function __construct($image) {`


    `if (is_file($image) && is_readable($image)) {`


    `$details = getimagesize($image);`


    `} else {`


    `$details = null;`


    `$this->messages[] = "Cannot open $image.";`


    `}`


    `// if getimagesize() returns an array, it looks like an image`


    `if (is_array($details)) {`


    `$this->original = $image;`


    `$this->originalwidth = $details[0];`


    `$this->originalheight = $details[1];`


    `$this->basename = pathinfo($image, PATHINFO_FILENAME);`


    `// check the MIME type`


    `$this->checkType($details[''mime'']);`


    `} else {`


    `$this->messages[] = "$image doesn''t appear to be an image.";`


    `}`


    `}`


    The constructor begins with a conditional statement that checks that `$image`
    is a file and is readable. If it is, it’s passed to `getimagesize()`, and the
    result is stored in `$details`. Otherwise, `$details` is set to `null`, and an
    error message is added to the `$messages` property.


    When you pass an image to `getimagesize()`, it returns an array containing the
    following elements:


    *   `0`: Width (in pixels)

    *   `1`: Height

    *   `2`: An integer indicating the type of image

    *   `3`: A string containing the correct width and height attributes ready for
    insertion in an `<img>` tag

    *   `mime`: The image’s MIME type

    *   `channels`: `3` for RGB and `4` for CMYK images

    *   `bits`: The number of bits for each color


    If the value passed as an argument to `getimagesize()`isn’t an image, it returns
    `false`. Consequently, if `$details` is an array, you know you’re dealing with
    an image. The image’s path is stored in the `$original` property, and its width
    and height are stored in `$originalWidth` and `$originalHeight`, respectively.


    The file’s name without the filename extension is extracted using `pathinfo()`
    with the `PATHINFO_FILENAME` constant in the same way as in PHP Solution 6-6\.
    This is stored in the `$basename` property and will be used to build the thumbnail’s
    name with the suffix.


    However, the image might not be a suitable type, so the final check is to pass
    its MIME type to an internal method called `checkType()`, which you’ll define
    next.


    The `checkType()` method compares the MIME type with an array of acceptable image
    types. If it finds a match, it resets the `$canProcess` property to `true` and
    stores the type in the `$imageType` property. The method is used internally, so
    it needs to be declared as protected. Add the following code to the class definition:


    `protected function checkType($mime) {`


    `$mimetypes = [''image/jpeg'', ''image/png'', ''image/gif''];`


    `if (in_array($mime, $mimetypes)) {`


    `$this->canProcess = true;`


    `// extract the characters after ''image/''`


    `$this->imageType = substr($mime, 6);`


    `}`


    `}`


    There are many types of images, but JPEG, PNG, and GIF are the only ones universally
    supported by browsers; the `$canProcess` property is set to `true` only if the
    image’s MIME type matches one of those listed in the `$mimetypes` array. If the
    MIME type isn’t in the list, `$canProcess` remains `false`, which later prevents
    the class from attempting to create a thumbnail.


    All image MIME types begin with `image/`. To make the value easier to use later,
    the `substr()` function extracts the characters after the slash and stores them
    in the `$imageType` property. When used with two arguments, `substr()` starts
    at the position (counting from 0) specified in the second argument and returns
    the rest of the string.


    Note


    Although PHP 5.5 and later can process WebP images, I decided against including
    them in the Thumbnail class because of limited browser support. At the time of
    this writing, the WebP image format is supported by only Google Chrome, Opera,
    and Android 4.


    It’s a good idea to test your code as you build the class. Catching errors early
    is much easier than hunting for a problem in a long script. To test the code,
    create a new public method called `test()` inside the class definition.


    It doesn’t matter in which order your methods appear inside the class definition,
    but it’s common practice to keep all public methods together after the constructor
    and to put protected methods at the bottom of the file. This makes the code easier
    to maintain.


    Insert the following definition between the constructor and the `checkType()`
    definition:


    `public function test() {`


    `echo ''File: '' . $this->original . ''<br>'';`


    `echo ''Original width: '' . $this->originalwidth . ''<br>'';`


    `echo ''Original height: '' . $this->originalheight . ''<br>'';`


    `echo ''Base name: '' . $this->basename . ''<br>'';`


    `echo ''Image type: '' . $this->imageType . ''<br>'';`


    `if ($this->messages) {`


    `print_r($this->messages);`


    `}`


    `}`


    This uses `echo` and `print_r()` to display the value of the properties.


    To test the class definition so far, save `Thumbnail.php` and add the following
    code to the PHP block above the `DOCTYPE` declaration in `create_thumb.php` (the
    code can be found in `create_thumb_02.php` in the `ch08` folder):


    `use PhpSolutions\Image\Thumbnail;`


    `if (isset($_POST[''create''])) {`


    `require_once(''../PhpSolutions/Image/Thumbnail.php'');`


    `try {`


    `$thumb = new Thumbnail($_POST[''pix'']);`


    `$thumb->test();`


    `} catch (Exception $e) {`


    `echo $e->getMessage();`


    `}`


    `}`


    This imports the `Thumbnail` class from the `PhpSolutions\Image` namespace, then
    adds the code that is to be executed when the form is submitted.


    The `name` attribute of the submit button in `create_thumb.php` is `create`, so
    this code runs only when the form has been submitted. It includes the `Thumbnail`
    class definition, creates an instance of the class, passing the selected value
    from the form as an argument, and calls the `test()` method.


    ![A978-1-4842-0635-5_8_Fig1_HTML.jpg](A978-1-4842-0635-5_8_Fig1_HTML.jpg)


    Figure 8-1.


    Displaying the details of the selected image confirms the code is working Save
    `create_thumb.php` and load it into a browser. Select an image and click Create
    Thumbnail. This produces output similar to Figure [8-1](#A978-1-4842-0635-5_8_Chapter.html#Fig1).


    If necessary, check your code against `Thumbnail_01.php` in the `ch08/PhpSolutions/Images`
    folder.'
  trans: "\n# PHP 解决方案 8-1：获取图像详情\n\n本 PHP 解决方案介绍了如何获取原始图像的尺寸和 MIME 类型。\n\n在 `PhpSolutions`\
    \ 文件夹中创建一个名为 `Image` 的新文件夹。然后在该文件夹中创建一个名为 `Thumbnail.php` 的页面。该文件仅包含 PHP 代码，因此请删除编辑程序插入的任何\
    \ HTML 代码。在新文件顶部声明命名空间：\n\n`namespace PhpSolutions\\Image;`\n\n该类需要跟踪相当多的属性。通过列出这些属性来开始类的定义，如下所示：\n\
    \n```\nclass Thumbnail {\n\n    protected $original;\n    protected $originalwidth;\n\
    \    protected $originalheight;\n    protected $basename;\n    protected $thumbwidth;\n\
    \    protected $thumbheight;\n    protected $maxSize = 120;\n    protected $canProcess\
    \ = false;\n    protected $imageType;\n    protected $destination;\n    protected\
    \ $suffix = '_thb';\n    protected $messages = [];\n\n}\n```\n\n如同 `Upload` 类一样，所有属性都被声明为\
    \ `protected`，这意味着它们不能在类定义之外被意外更改。这些名称具有描述性，因此几乎不需要解释。`$maxSize` 属性被赋予了一个默认值 120（像素）。这决定了缩略图较长边的最大尺寸。\n\
    \n`$canProcess` 布尔值初始设置为 `false`。这是为了防止脚本尝试处理非图像文件。如果 MIME 类型与图像匹配，则该值将重置为 `true`。如果发生其他错误，您也可以使用它来阻止生成缩略图。\n\
    \n构造函数接受一个参数，即图像的路径。在受保护属性列表之后，但在闭合花括号内部，添加构造函数定义：\n\n```\npublic function __construct($image)\
    \ {\n    if (is_file($image) && is_readable($image)) {\n        $details = getimagesize($image);\n\
    \    } else {\n        $details = null;\n        $this->messages[] = \"Cannot\
    \ open $image.\";\n    }\n\n    // 如果 getimagesize() 返回一个数组，则看起来像一张图像\n    if\
    \ (is_array($details)) {\n        $this->original = $image;\n        $this->originalwidth\
    \ = $details[0];\n        $this->originalheight = $details[1];\n        $this->basename\
    \ = pathinfo($image, PATHINFO_FILENAME);\n        // 检查 MIME 类型\n        $this->checkType($details['mime']);\n\
    \    } else {\n        $this->messages[] = \"$image doesn't appear to be an image.\"\
    ;\n    }\n}\n```\n\n构造函数以一个条件语句开始，该语句检查 `$image` 是否是一个文件并且是可读的。如果是，则将其传递给 `getimagesize()`，结果存储在\
    \ `$details` 中。否则，`$details` 被设置为 `null`，并向 `$messages` 属性添加一条错误消息。\n\n当您将图像传递给\
    \ `getimagesize()` 时，它会返回一个包含以下元素的数组：\n\n- `0`：宽度（以像素为单位）\n- `1`：高度\n- `2`：一个指示图像类型的整数\n\
    - `3`：一个字符串，包含正确的宽度和高度属性，用于插入 `<img>` 标签\n- `mime`：图像的 MIME 类型\n- `channels`：对于\
    \ RGB 图像为 `3`，对于 CMYK 图像为 `4`\n- `bits`：每种颜色的位数\n\n如果传递给 `getimagesize()` 的参数值不是图像，则返回\
    \ `false`。因此，如果 `$details` 是一个数组，您就知道正在处理一张图像。图像的路径存储在 `$original` 属性中，其宽度和高度分别存储在\
    \ `$originalWidth` 和 `$originalHeight` 中。\n\n文件的名称（不含扩展名）使用带有 `PATHINFO_FILENAME`\
    \ 常量的 `pathinfo()` 提取，方式与 PHP 解决方案 6-6 相同。这存储在 `$basename` 属性中，并将在之后用于构建带有后缀的缩略图名称。\n\
    \n但是，图像可能不是合适的类型，因此最后的检查是将其 MIME 类型传递给一个名为 `checkType()` 的内部方法，您将在下一步中定义该方法。\n\
    \n`checkType()` 方法将 MIME 类型与可接受的图像类型数组进行比较。如果找到匹配项，则将 `$canProcess` 属性重置为 `true`，并将类型存储在\
    \ `$imageType` 属性中。该方法在内部使用，因此需要声明为 `protected`。将以下代码添加到类定义中：\n\n```\nprotected\
    \ function checkType($mime) {\n    $mimetypes = ['image/jpeg', 'image/png', 'image/gif'];\n\
    \    if (in_array($mime, $mimetypes)) {\n        $this->canProcess = true;\n \
    \       // 提取 'image/' 之后的字符\n        $this->imageType = substr($mime, 6);\n \
    \   }\n}\n```\n\n图像类型有很多种，但只有 JPEG、PNG 和 GIF 是浏览器普遍支持的；只有当图像的 MIME 类型与 `$mimetypes`\
    \ 数组中列出的其中之一匹配时，`$canProcess` 属性才会被设置为 `true`。如果 MIME 类型不在列表中，`$canProcess` 保持为\
    \ `false`，这稍后会阻止该类尝试创建缩略图。\n\n所有图像的 MIME 类型都以 `image/` 开头。为了使该值在以后更容易使用，`substr()`\
    \ 函数提取斜杠后的字符并将其存储在 `$imageType` 属性中。当使用两个参数时，`substr()` 从第二个参数指定的位置（从 0 开始计数）开始，并返回字符串的其余部分。\n\
    \n> **注意：** 尽管 PHP 5.5 及更高版本可以处理 WebP 图像，但鉴于浏览器支持有限，我决定不将其包含在 `Thumbnail` 类中。在撰写本文时，WebP\
    \ 图像格式仅受 Google Chrome、Opera 和 Android 4 支持。\n\n在构建类时测试代码是个好主意。尽早发现错误比在长脚本中寻找问题要容易得多。为了测试代码，在类定义内部创建一个名为\
    \ `test()` 的新公共方法。\n\n方法在类定义中出现的顺序无关紧要，但常见的做法是将所有公共方法放在构造函数之后，并将受保护方法放在文件底部。这使代码更易于维护。\n\
    \n在构造函数和 `checkType()` 定义之间插入以下定义：\n\n```\npublic function test() {\n    echo\
    \ 'File: ' . $this->original . '<br>';\n    echo 'Original width: ' . $this->originalwidth\
    \ . '<br>';\n    echo 'Original height: ' . $this->originalheight . '<br>';\n\
    \    echo 'Base name: ' . $this->basename . '<br>';\n    echo 'Image type: ' .\
    \ $this->imageType . '<br>';\n    if ($this->messages) {\n        print_r($this->messages);\n\
    \    }\n}\n```\n\n这使用 `echo` 和 `print_r()` 来显示属性的值。\n\n为了测试目前为止的类定义，保存 `Thumbnail.php`，并在\
    \ `create_thumb.php` 中 `DOCTYPE` 声明上方的 PHP 代码块中添加以下代码（该代码可在 `ch08` 文件夹的 `create_thumb_02.php`\
    \ 中找到）：\n\n```\nuse PhpSolutions\\Image\\Thumbnail;\n\nif (isset($_POST['create']))\
    \ {\n    require_once('../PhpSolutions/Image/Thumbnail.php');\n    try {\n   \
    \     $thumb = new Thumbnail($_POST['pix']);\n        $thumb->test();\n    } catch\
    \ (Exception $e) {\n        echo $e->getMessage();\n    }\n}\n```\n\n这从 `PhpSolutions\\\
    Image` 命名空间导入 `Thumbnail` 类，然后添加在表单提交时要执行的代码。\n\n`create_thumb.php` 中提交按钮的 `name`\
    \ 属性是 `create`，因此此代码仅在表单被提交时运行。它包含 `Thumbnail` 类定义，创建一个类的实例（将表单中选定的值作为参数传递），并调用\
    \ `test()` 方法。\n\n![A978-1-4842-0635-5_8_Fig1_HTML.jpg](img/A978-1-4842-0635-5_8_Fig1_HTML.jpg)\n\
    \n**图 8-1.** 显示所选图像的详细信息，确认代码正在工作。\n\n保存 `create_thumb.php` 并将其加载到浏览器中。选择一张图像，然后单击“创建缩略图”。这将产生类似于图\
    \ 8-1 的输出。\n\n如有必要，请对照 `ch08/PhpSolutions/Images` 文件夹中的 `Thumbnail_01.php` 检查您的代码。\n"
- fmt: "虽然某些属性具有默认值，但您需要提供通过创建公共方法来更改它们的选项，以设置缩略图的最大尺寸以及应用于文件名基础的（文件名茎部）后缀。您还需要告诉类在哪里创建缩略图。这类方法的正式术语是“赋值方法”（mutator\
    \ method），但由于它设置一个值，通常被称为“设置器方法”（setter method）。下一步就是创建这些设置器方法。\n\n### PHP 解决方案\
    \ 8-2：创建设置器方法\n\n除了设置受保护属性的值之外，设置器方法在确保所赋值有效性方面也扮演着重要角色。继续使用同一个类定义。或者，使用`ch08/PhpSolutions/Image`文件夹中的`Thumbnail_01.php`。\n\
    \n首先，为将要创建缩略图的文件夹创建设置器方法。在构造函数定义之后，将以下代码添加到`Thumbnail.php`中：\n\n```\npublic function\
    \ setDestination($destination) {\n    if (is_dir($destination) && is_writable($destination))\
    \ {\n        // 获取最后一个字符\n        $last = substr($destination, -1);\n        //\
    \ 如果缺少尾部斜杠，则添加一个\n        if ($last == '/' || $last == '\\\\') {\n           \
    \ $this->destination = $destination;\n        } else {\n            $this->destination\
    \ = $destination . DIRECTORY_SEPARATOR;\n        }\n    } else {\n        $this->messages[]\
    \ = \"Cannot write to $destination.\";\n    }\n}\n```\n\n这段代码首先检查`$destination`是否是一个文件夹（目录）并且是否可写。如果不是，则方法定义末尾的`else`子句中的错误消息会被添加到`$messages`属性中。否则，执行其余代码。\n\
    \n在将`$destination`的值赋给`$destination`属性之前，代码检查提交的值是否以正斜杠或反斜杠结尾。它通过使用`substr()`函数提取`$destination`中的最后一个字符来实现这一点。`substr()`的第二个参数决定开始提取的位置。负数表示从字符串末尾开始计数。如果省略第三个参数，函数将返回字符串的剩余部分。所以，`$last\
    \ = substr($destination, -1)` 的效果是提取最后一个字符并将其存储在`$last`中。\n\n条件语句检查`$last`是否是正斜杠或反斜杠。需要两个反斜杠，因为PHP使用反斜杠来转义引号（参见[第3章](#A978-1-4842-0635-5_3_Chapter.html)中的“理解何时使用引号”和“使用转义序列”）。\n\
    \n有必要检查`$destination`中是正斜杠还是反斜杠，因为Windows用户可能会习惯性地使用反斜杠。如果条件语句确认最后一个字符是正斜杠或反斜杠，则将`$destination`赋给`$destination`属性。否则，`else`块在将PHP常量`DIRECTORY_SEPARATOR`赋给`$destination`属性之前，将其连接到`$destination`的末尾。`DIRECTORY_SEPARATOR`常量会根据操作系统自动选择正确的斜杠类型。\n\
    \n> 提示：PHP 在路径中同样对待正斜杠或反斜杠。即使这导致添加了相反类型的斜杠，就PHP而言，路径仍然是有效的。\n\n用于缩略图最大尺寸的设置器方法只需要检查该值是否为数字。将以下代码添加到类定义中：\n\
    \n```\npublic function setMaxSize($size) {\n    if (is_numeric($size)) {\n   \
    \     $this->maxSize = abs($size);\n    }\n}\n```\n\n`is_numeric()`函数检查提交的值是否为数字。如果是，则将其赋给`$maxSize`属性。作为预防措施，该值被传递给`abs()`函数，该函数将数字转换为其绝对值。换句话说，负数被转换为正数。\n\
    \n如果提交的值不是数字，则什么也不会发生。该属性的默认值保持不变。\n\n用于插入到文件名中的后缀的设置器函数需要确保该值不包含任何特殊字符。代码如下所示：\n\
    \n```\npublic function setSuffix($suffix) {\n    if (preg_match('/^\\w+$/', $suffix))\
    \ {\n        if (strpos($suffix, '_') !== 0) {\n            $this->suffix = '_'\
    \ . $suffix;\n        } else {\n            $this->suffix = $suffix;\n       \
    \ }\n    } else {\n        $this->suffix = '';\n    }\n}\n```\n\n这使用了`preg_match()`，它以正则表达式作为第一个参数，并在作为第二个参数传递的值中搜索匹配项。正则表达式需要包裹在一对匹配的分隔符字符中——通常如这里所使用的正斜杠。去掉分隔符后，正则表达式看起来像这样：\n\
    \n`^\\w+$`\n\n在此上下文中，脱字符（`^`）告诉正则表达式从字符串的开头开始匹配。`\\w`是一个正则表达式标记，它匹配任何字母数字字符或下划线。`+`表示匹配前面的标记或字符一次或多次，而`$`表示匹配字符串的结尾。换句话说，正则表达式匹配一个仅包含字母数字字符和下划线的字符串。如果字符串包含空格或特殊字符，则不会匹配。\n\
    \n如果匹配失败，方法定义末尾的`else`子句将`$suffix`属性设置为空字符串。否则，执行此条件语句：\n\n`if (strpos($suffix,\
    \ '_') !== 0) {`\n\n如果`$suffix`的第一个字符不是下划线，则条件为真。它使用`strpos()`函数来查找第一个下划线的位置。如果第一个字符是下划线，则`strpos()`返回的值是`0`。但是，如果`$suffix`不包含下划线，`strpos()`返回`false`。如[第3章](#A978-1-4842-0635-5_3_Chapter.html)所述，`0`在PHP中被视为`false`，因此条件需要使用“不完全相同”运算符（使用两个等号）。所以，如果后缀不是以下划线开头，则会添加一个下划线。否则，保留原始值。\n\
    \n> 注意：不要混淆`strpos()`和`strrpos()`。前者找到第一个匹配字符的位置。后者则反向搜索字符串。\n\n更新`test()`方法以显示您刚刚为其创建设置器方法的那些属性的值。修订后的代码如下所示：\n\
    \n```\npublic function test() {\n    echo 'File: ' . $this->original . '<br>';\n\
    \    echo 'Original width: ' . $this->originalwidth . '<br>';\n    echo 'Original\
    \ height: ' . $this->originalheight . '<br>';\n    echo 'Base name: ' . $this->basename\
    \ . '<br>';\n    echo 'Image type: ' . $this->imageType . '<br>';\n    echo 'Destination:\
    \ ' . $this->destination . '<br>';\n    echo 'Max size: ' . $this->maxSize . \
    \ '<br>';\n    echo 'Suffix: ' . $this->suffix .  '<br>';\n    if ($this->messages)\
    \ {\n        print_r($this->messages);\n    }\n}\n```\n\n通过在`create_thumb.php`中使用新的设置器方法来测试更新后的类，如下所示：\n\
    \n```\n$thumb = new Thumbnail($_POST['pix']);\n$thumb->setDestination('C:/upload_test/thumbs/');\n\
    $thumb->setMaxSize(100);\n$thumb->setSuffix('small');\n$thumb->test();\n```\n\n\
    将`upload_test/thumbs`的路径调整为与您的设置匹配。\n\n尝试进行多项测试，例如省略传递给`setDestination()`的值的尾部斜杠，或选择一个不存在的文件夹。同时，将无效值传递给最大尺寸和后缀的设置器。无效的目标文件夹会产生错误消息，但其他错误会静默失败，使用默认值作为最大尺寸，或使用空字符串作为后缀。\n\
    \n![A978-1-4842-0635-5_8_Fig2_HTML.jpg](A978-1-4842-0635-5_8_Fig2_HTML.jpg)\n\n\
    图 8-2. 验证设置器方法是否有效\n\n保存两个页面，并从`create_thumb.php`的列表中选择一张图片。您应该会看到类似于图[8-2](#A978-1-4842-0635-5_8_Chapter.html#Fig2)中的结果。\n\
    \n如有必要，请将您的代码与`ch08/PhpSolutions/Image`中的`Thumbnail_02.php`以及`ch08`文件夹中的`create_thumb_03.php`进行比较。"
  raw: 'Although some properties have default values, you need to provide the option
    to change them by creating public methods to set the maximum size of the thumbnail
    image, and the suffix applied to the base of the filename. You also need to tell
    the class where to create the thumbnail. The formal term for this type of method
    is a mutator method. However, because it sets a value, it’s commonly referred
    to as a setter method. The next step is to create the setter methods.


    #### PHP Solution 8-2: Creating the Setter Methods


    In addition to setting the value of protected properties, setter methods play
    an important role in ensuring the validity of the value being assigned. Continue
    working with the same class definition. Alternatively, use `Thumbnail_01.php`
    in the `ch08/PhpSolutions/Image` folder.


    Begin by creating the setter method for the folder where the thumbnail is to be
    created. Add the following code to `Thumbnail.php` after the constructor definition:


    `public function setDestination($destination) {`


    `if (is_dir($destination) && is_writable($destination)) {`


    `// get last character`


    `$last = substr($destination, -1);`


    `// add a trailing slash if missing`


    `if ($last == ''/'' || $last == ''\\'') {`


    `$this->destination = $destination;`


    `} else {`


    `$this->destination = $destination . DIRECTORY_SEPARATOR;`


    `}`


    `} else {`


    `$this->messages[] = "Cannot write to $destination.";`


    `}`


    `}`


    This begins by checking that `$destination` is a folder (directory) and that it’s
    writable. If it isn’t, the error message in the `else` clause at the end of the
    method definition is added to the `$messages` property. Otherwise, the rest of
    the code is executed.


    Before assigning the value of `$destination` to the `$destination` property, the
    code checks whether the value submitted ends in a forward slash or backslash.
    It does this by extracting the final character in `$destination` using the `substr()`
    function. The second argument to `substr()` determines the position from which
    to start the extract. A negative number counts from the end of the string. If
    the third argument is omitted, the function returns the rest of the string. So,
    `$last = substr($destination, -1)` has the effect of extracting the last character
    and storing it in `$last`.


    The conditional statement checks whether `$last` is a forward slash or a backslash.
    Two backslashes are needed because PHP uses a backslash to escape quotes (see
    “Understanding when to use quotes” and “Using escape sequences” in [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html)).


    It’s necessary to check for both forward slashes and backslashes in `$destination`
    because a Windows user might use backslashes out of habit. If the conditional
    statement confirms that the final character is a forward slash or a backslash,
    `$destination` is assigned to the `$destination` property. Otherwise, the `else`
    block concatenates the PHP constant `DIRECTORY_SEPARATOR` to the end of `$destination`
    before assigning it to the `$destination` property. The `DIRECTORY_SEPARATOR`
    constant automatically chooses the right type of slash depending on the operating
    system.


    Tip


    PHP treats forward slashes or backslashes equally in a path. Even if this results
    in adding the opposite type of slash, the path remains valid as far as PHP is
    concerned.


    The setter method for the maximum size of the thumbnail simply needs to check
    that the value is a number. Add the following code to the class definition:


    `public function setMaxSize($size) {`


    `if (is_numeric($size)) {`


    `$this->maxSize = abs($size);`


    `}`


    `}`


    The `is_numeric()` function checks that the submitted value is a number. If it
    is, it’s assigned to the `$maxSize` property. As a precaution, the value is passed
    to the `abs()` function, which converts a number to its absolute value. In other
    words, a negative number is converted into a positive one.


    If the submitted value isn’t a number, nothing happens. The property’s default
    value remains unchanged.


    The setter function for the suffix inserted in the filename needs to make sure
    the value doesn’t contain any special characters. The code looks like this:


    `public function setSuffix($suffix) {`


    `if (preg_match(''/^\w+$/'', $suffix)) {`


    `if (strpos($suffix, ''_'') !== 0) {`


    `$this->suffix = ''_'' . $suffix;`


    `} else {`


    `$this->suffix = $suffix;`


    `}`


    `} else {`


    `$this->suffix = '''';`


    `}`


    `}`


    This uses `preg_match()`, which takes a regular expression as its first argument
    and searches for a match in the value passed as the second argument. Regular expressions
    need to be wrapped in a pair of matching delimiter characters—normally forward
    slashes, as used here. Stripped of the delimiters, the regex looks like this:


    `^\w+$`


    In this context, the caret (`^`) tells the regex to start at the beginning of
    the string. The `\w` is a regex token that matches any alphanumeric character
    or an underscore. The `+` means match the preceding token or character one or
    more times, and the `$` means match the end of the string. In other words, the
    regex matches a string that contains only alphanumeric characters and underscores.
    If the string contains spaces or special characters, it won’t match.


    If the match fails, the `else` clause at the end of the method definition sets
    the `$suffix` property to an empty string. Otherwise, this conditional statement
    is executed:


    `if (strpos($suffix, ''_'') !== 0) {`


    The condition equates to `true` if the first character of `$suffix` is not an
    underscore. It uses the `strpos()` function to find the position of the first
    underscore. If the first character is an underscore, the value returned by `strpos()`
    is 0. However, if `$suffix` doesn’t contain an underscore, `strpos()` returns
    `false`. As explained in [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html), `0`
    is treated by PHP as `false`, so the condition needs to use the “not identical”
    operator (with two equal signs). So, if the suffix doesn’t begin with an underscore,
    one is added. Otherwise, the original value is preserved.


    Caution


    Don’t confuse `strpos()` and `strrpos()`. The former finds the position of the
    first matching character. The latter searches the string in reverse.


    Update the `test()` method to display the values of the properties for which you
    have just created setter methods. The revised code looks like this:


    `public function test() {`


    `echo ''File: '' . $this->original . ''<br>'';`


    `echo ''Original width: '' . $this->originalwidth . ''<br>'';`


    `echo ''Original height: '' . $this->originalheight . ''<br>'';`


    `echo ''Base name: '' . $this->basename . ''<br>'';`


    `echo ''Image type: '' . $this->imageType . ''<br>'';`


    `echo ''Destination: '' . $this->destination . ''<br>'';`


    `echo ''Max size: '' . $this->maxSize .  ''<br>'';`


    `echo ''Suffix: '' . $this->suffix .  ''<br>'';`


    `if ($this->messages) {`


    `print_r($this->messages);`


    `}`


    `}`


    Test the updated class by using the new setter methods in `create_thumb.php`,
    like this:


    `$thumb = new Thumbnail($_POST[''pix'']);`


    `$thumb->setDestination(''C:/upload_test/thumbs/'');`


    `$thumb->setMaxSize(100);`


    `$thumb->setSuffix(''small'');`


    `$thumb->test();`


    Adjust the path to `upload_test/thumbs` to match your setup.


    Try a number of tests, omitting the trailing slash from the value passed to `setDestination()`
    or selecting a nonexistent folder. Also pass invalid values to the setters for
    the maximum size and suffix. An invalid destination folder produces an error message,
    but the others fail silently, using the default value for the maximum size or
    an empty string for the suffix.


    ![A978-1-4842-0635-5_8_Fig2_HTML.jpg](A978-1-4842-0635-5_8_Fig2_HTML.jpg)


    Figure 8-2.


    Verifying that the setter methods work Save both pages and select an image from
    the list in `create_thumb.php`. You should see results similar to those in Figure
    [8-2](#A978-1-4842-0635-5_8_Chapter.html#Fig2).


    If necessary, compare your code with `Thumbnail_02.php` in `ch08/PhpSolutions/Image`
    and `create_thumb_03.php` in the `ch08` folder.'
