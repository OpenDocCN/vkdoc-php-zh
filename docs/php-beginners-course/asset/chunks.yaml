- fmt: "# PHP 文件操作与安全指南\n\n## 文件打开模式\n\n以下列出了 PHP 中常用的文件打开模式及其行为：\n\n- `'r+'`：读写模式，将文件指针置于文件开头\n\
    - `'w'`：只写模式，将文件指针置于文件开头；若文件存在，则清空内容\n- `'w+'`：读写模式，将文件指针置于文件开头；若文件存在，则清空内容\n\
    - `'a'`：只写模式，将文件指针置于文件末尾\n- `'a+'`：读写模式，将文件指针置于文件末尾\n- `'x'`：只写模式，若文件已存在，则返回错误\n\
    - `'x+'`：读写模式，若文件已存在，则返回错误\n- `'c'`：只写模式，将文件指针置于文件开头；若文件存在，则不清空\n- `'c+'`：读写模式，将文件指针置于文件开头；若文件存在，则不清空\n\
    \n## 保存到文本文件\n\n在以下脚本中，使用了 PHP 函数 `fwrite()`，该函数首先获取文件句柄，第二个参数需指定要添加到文件中的内容。\n\
    \n要创建新文件或扩展现有文件，可以使用以下脚本：\n\n```php\n<?php\n$myFile = \"myfile.txt\";\n$filehandler\
    \ = fopen($myFile, \"a\");\nfwrite($filehandler, \"I am a new line.\\nI am a second\
    \ new line.\\n\");\nfclose($filehandler);\n?>\n```\n\n在保存 `.php` 脚本文件的目录中，会创建一个新文件。查看该文本文件时，你会注意到它已被两行内容填充。每次调用该\
    \ PHP 脚本，都会新增两行。换行符必须通过 `\\n` 传递给 `fwrite()`。\n\n## 从文本文件读取\n\n现在，我们希望将此文件读入 PHP\
    \ 脚本：\n\n```php\n<?php\n$myFile = \"myfile.txt\";\n$filehandler = fopen($myFile,\
    \ \"r\");\n$contents = fread($filehandler, filesize($myFile));\nfclose($filehandler);\n\
    echo nl2br($contents);\n?>\n```\n\n在上述脚本中，使用了 PHP 函数 `fread()`，该函数首先获取文件句柄，第二个参数需指定要读取的文件大小。我们使用实用的\
    \ `filesize()` 函数来传递要读取的文件大小。通过 `nl2br()` 函数，可以将文本文件中的换行符转换为 HTML `<br/>` 标签。\n\
    \n## 管理会话\n\n如果要识别回访用户，有必要使用所谓的会话（session）。\n\n在会话中，可以存储变量，并且这些变量可以在不同文件之间使用。如果为某个访问者启动会话，会生成一个唯一的标识号——会话\
    \ ID（session ID）。\n\n如果希望为访问者打开会话，只需调用函数 `session_start()`。然后可以在 `$_SESSION` 全局数组中设置值。如果要在下次调用时重用同一会话，只需在脚本开头调用\
    \ `session_start()` 即可。访问者的浏览器中会存储一个包含会话 ID 的 cookie；`$_SESSION` 数组的值存储在服务器的临时缓存中。如果希望安全地结束会话，必须使用\
    \ `session_destroy()` 函数。\n\n以下是使用会话的示例：\n\n**session1.php**\n\n```php\n<?php\n\
    session_start();\n$_SESSION[\"username\"] = \"Walter\";\necho \"Hello \" . $_SESSION[\"\
    username\"];\n?>\n```\n\n**session2.php**\n\n```php\n<?php\nsession_start();\n\
    if (isset($_SESSION[\"username\"])) {\n    echo \"Hello \" . $_SESSION[\"username\"\
    ];\n} else {\n    echo \"First please open the page session1.php!\";\n}\n?>\n\
    ```\n\n在第二个文件中调用 `session_start()` 后，`$_SESSION` 数组的内容与第一个文件中的相同。\n\n## 第五天：编写整洁的代码（一年后仍能理解）\n\
    \n在养成不规范的编程风格之前，我想提供一些关于如何以程序员身份编写“整洁”代码的建议。\n\n一方面，正如变量章节所述，使用恰当且自描述的变量和函数名极为重要。没有什么比在陌生代码中看到类似\
    \ `$a`、`$b` 或 `$x` 这样的变量更令人失望了，因为它们无法表明将要存储什么内容。\n\n在编写代码时使用制表符缩进。不同的编程环境有时会有不同的格式，但许多开源项目采用以下语法风格：\n\
    \n```php\nfunction name(parameter) {\n    // 代码块\n}\n```\n\n即：函数名后有一个空格，参数括号后有一个空格，随后是花括号。函数内的代码块通过一个制表符缩进，闭合的花括号与函数名对齐。这样可以非常容易地看出函数的起始和结束位置。\n\
    \n不要吝啬注释。虽然不必为单行的 `if` 查询添加注释，但对于较长的脚本，一定的结构注释是必不可少的。\n\n不要重复编写代码，即避免冗余。一旦某段代码被多次使用，就应将其编写为函数。这可以提升代码的清晰度并节省宝贵的内存空间。此外，你只需在一个代码点进行修改或扩展。\n\
    \n## PHP 脚本安全性\n\n以下是一些最重要的建议，帮助你了解如何让 PHP 脚本更加安全：\n\n### 原则：永远不要信任来自外部的数据\n\n\
    如果遵循这一原则，你就已经赢了一半对抗破解者和黑客的战斗。关于不信任外部数据，我的意思是，你应该验证输入数据是否与预期格式相符。这意味着，如果要输入数字，最好检查\
    \ `is_numeric($input)` 是否返回真值；对于电子邮件地址，则应验证其格式是否正确（必须恰好包含一个 `@` 字符，且末尾指定域名）。这就引出了下一个主题。\n\
    \n### 防范 SQL 注入\n\nSQL 注入是一种操纵 SQL 查询，使其执行非预期操作的方法。如果你不对输入数据进行过滤，就会发生这种情况。\n\n\
    假设我们有以下脚本为网页提供登录功能：\n\n```php\n<?php\n$username = $_GET[\"username\"];\n$password\
    \ = $_GET[\"password\"];\n$sql = \"SELECT * FROM users WHERE username = '\".$username.\"\
    ' AND password = '\".$password.\"'\";\n$mysqli = new mysqli('localhost','root','',\
    \ 'test');\n$result = $mysqli->query($sql);\necho \"Found the following user(s):\
    \ \";\nwhile ($row = $result->fetch_array()) {\n    echo $row[\"username\"]. \"\
    <br />\";\n}\n?>\n```\n\n如果用户仅输入用户名和密码，此功能没有问题。但不幸的是，有些技术精湛的破解者会寻找这种简单的登录方式，有些甚至使用自动化机器人来发现这些登录漏洞，并尝试输入以下内容：\n\
    \n- 用户名：`admin`\n- 密码：`\" OR 1=1`\n\n如果我们未经过滤地将这段文本传入 SQL 查询，就会得到以下 SQL 语句：\n\n\
    ```sql\nSELECT * FROM users WHERE username = \"admin\" AND password = \"\" OR\
    \ 1=1\n```\n\n由于 1 始终等于 1，因此总会返回结果。这样一来，破解者就以管理员身份登录了，甚至可能添加自己的用户：\n\n- 用户名：`x`\n\
    - 密码：`x\"; INSERT INTO users (username, password) VALUES (\"mynewuser\", \"mypassword\"\
    );`\n\n生成的 SQL 语句为：\n\n```sql\nSELECT * FROM users WHERE username = \"x\" AND\
    \ password = \"x\";\nINSERT INTO users (username, password) VALUES (\"mynewuser\"\
    , \"mypassword\");\n```\n\n两条 SQL 语句都会被执行，破解者就创建了一个新的用户账户。理论上，他还可以发送 `DELETE`\
    \ 命令来破坏数据库，或者更改管理员密码。\n\n### 如何保护自己？\n\n你可以选择只允许特定字符集（`a-z`、`A-Z`、`0-9`）过滤输入数据，或者对输入数据进行“转义”。这意味着，所有特殊字符以及整个字符串都会被引号包裹，从而变得“无害”。PHP\
    \ 提供了现成的函数 `$mysqli->real_escape_string()`，它接收一个字符串作为参数，并返回安全的转义版本。\n\n示例：\n\n\
    ```php\n$password = $mysqli->real_escape_string($password);\n```\n\n### 保持密码加密"
  raw: '''r+'' Read and write, place the file pointer at the beginning


    ''w'' Write only, place the file pointer at the beginning; if the file exists,
    then empty it


    ''w+'' Read and write, place the file pointer at the beginning; if the file exists,
    then empty it


    ''a'' Write only, place the file pointer at the end


    ''a+'' Read and write, place the file pointer at the end


    ''x'' Write only, if the file already exists, then return an error


    ''x+'' Read and write, if the file already exists, then return an error


    ''c'' Write only, place the file pointer at the beginning; if the file exists,
    then do not empty


    ''c+'' Read and write, place the file pointer at the beginning; if the file exists,
    then do not empty.


    **Save to a text file**


    In the following script, the PHP function, frwite(), is used, which first gets
    our filehandler, and as a second parameter, we have to specify the content which
    should be added to the file.


    To create a new file or extend an existing one, we could use the following script:


    <?php


    $myFile = "myfile.txt";


    $filehandler = fopen($myFile, "a");


    fwrite($filehandler, "I am a new line.\nI am a second new line.\n"); fclose($filehandler);


    ?>


    In the directory where your .php script file is saved, a new file is created.
    If you look at the text file now, you will notice that it has been filled by two
    lines. Everytime you call the php script, two new lines are added. Line breaks
    must be passed to fwrite using \n.


    **Reading from a text file**


    We would like to read this file now into our php script:


    <?php


    $myFile = "myfile.txt";


    $filehandler = fopen($myFile, "r");


    $contents = fread($filehandler, filesize($myFile)); fclose($filehandler);


    echo nl2br($contents);


    ?>


    In the above script, the PHP function, fread(), is used, which first gets our
    filehandler, and as a second parameter, we have to specify how much of the file
    should be read.


    We simply pass the size of the file, to be read, using the practical filesize()
    function. With the function, nl2br(), the line endings from a text file can be
    converted to HTML-<br/>.


    **Manage sessions**


    If we want to recognize a returning visitor, it is necessary to use the so-called
    sessions.


    Within sessions, variables can be stored, and they can be used across files. If
    we start a session for a visitor, a unique identification number, the session
    ID, is generated.


    If we want to open a session for a visitor, it is enough to simply call the function
    session_start(). You can then set values in the $_SESSION global array. If the
    same session is to be reused on the next call, it is sufficient to call it session_start()
    at the beginning of the script. In the visitor ’s browser is stored a cookie with
    the session ID; the values of the $_SESSION array are stored on the server in
    a temporary cache. If you want to end the session securely, you must use the session_destroy()
    function.


    Here is an example of how to use sessions:


    session1.php


    <?php


    session_start();


    $_SESSION["username"] = "Walter"; echo "Hello " . $_SESSION["username"];


    ?>


    session2.php


    <?php


    session_start();


    if (isset ($_SESSION["username"])) {


    echo "Hello " . $_SESSION["username"];


    }


    else {


    "First please open the page session1.php!";


    }


    ?>


    After the call of session_start() in the second file, the same content of the
    $_SESSION


    array is usable as in the first file.


    **Day 5**


    **Write clean code (which is still understandable in a year)** Before you acquire
    an unclean programming style, I would like to give you some tips on how to write
    a ‘clean’ code on your way as a programmer.


    On the one hand, it is extremely important, as has already been described in the
    chapter on variables, to use appropriate and self-describing variables and function
    names. Nothing is more disappointing than to read variables like $a, $b, or $x
    in an unknown code because they do not show what will be stored in them.


    Use tab stops in your code writing. Individual programming studios sometimes have
    a somewhat different form, but many OpenSource projects have the following syntax
    style: function name (parameter) {


    code block


    }


    That is, a space between function name, a space after the parenthesis with the
    parameters followed by a curved parenthesis. The code block of the function is
    inserted by a tab step, and the closing curved bracket is again at the height
    of the function name. This makes it very easy to see where a function starts and
    stops.


    Do not save with comments. You do not have to comment on any one-line If query,
    but a certain structure for longer scripts is essential.


    Do not write a code twice, that is, avoid redundancy. Once a code is used several
    times, write a function. This increases the clarity of the code and saves valuable
    memory space. In addition, you need to make corrections or extensions only at
    one code point.


    **Security within PHP scripts**


    Here are some of the most important tips to give you some idea on how to make
    your PHP


    scripts safer:


    **Principle: Never trust data coming from outside** If you follow this principle,
    you have already won half the battle against crackers and hackers. Regarding the
    mistrust of external data, I mean you should validate the input data to see if
    it corresponds to the expected format. This means that, if a number is to be entered,
    it is best to check if the function is numeric ($input), whether it is really
    a number, or whether an e-mail address is set up as it should be (exactly one
    @ character and a domain must be specified at the end). This brings us to the
    next topic.


    **Protection against SQL Injections**


    An SQL injection is a way manipulate an SQL Query so that it does something other
    than what it was meant for. This happens if you do not filter the entered data.


    Suppose we have the following script to offer a login functionality for a web
    page:


    <?php


    $username = $_GET["username"];


    $password = $_GET["password"];


    $sql = "SELECT * FROM users WHERE username = "".$username."" AND password = ""


    . $password ."" ";


    $mysqli=new mysqli(''localhost'',''root'','''', ''test''); $result = $mysqli->query("$sql);


    echo "Found the following user(s): "; while ($row = $result->fetch_array())) {


    echo $row["username"]. "<br />";


    }


    ?>


    This functionality has no problem if the users are just entering their username
    or password. But, unfortunately, there are technically savvy crackers who look
    for such simple logins, some use automated bots to find these logins, and try
    to enter the following: Username: admin


    Password: " OR 1=1


    If we pass this text unfiltered into our SQL query, we get the following SQL statement:
    SELECT * FROM users WHERE username = "admin" AND password = "" OR 1=1


    Since 1 is always equal to 1, a result is always returned. So the cracker is logged
    in as admin or even adds his users:


    Username: x


    Password: x"; INSERT INTO users (username, password) VALUES ("mynewuser",


    "mypassword");


    The SQL would be:


    SELECT * FROM users WHERE username = "x" AND password = "x"; INSERT INTO users
    (username, password) VALUES ("mynewuser", "mypassword"); Both SQL statements would
    be executed and the cracker would have already created a new user account. Theoretically,
    he could also send a DELETE command and thus destroy our database or, for example,
    change the password of the administrator.


    But how can you protect yourself against this?


    Either you filter the specified data for only allowed characters (a-z, A-Z, 0-9)
    or you


    ‘escape’ the input data. This means, all special characters as well as the entire
    string are encapsulated by apostrophes and are thus made ‘harmless’. There is
    the ready-made function $mysqli->real_escape_string(), which gets a string as
    parameter and returns a safe escaped version of it.


    Example:


    $password =$mysqli->real_escape_string($password); **Keep your passwords encrypted**'
  trans: "\n# PHP 文件操作与安全指南\n\n## 文件打开模式\n\n以下列出了 PHP 中常用的文件打开模式及其行为：\n\n-   `'r+'`：读写模式，将文件指针置于文件开头\n\
