  \n***图 3–20.** 带有公开筛选器的视图*\n\n### 高级视图实现\n\n我们已经讨论了如何创建视图，在其中设置条件，甚至让用户设置条件，但我们还可以创建一个视图，其中传递一个变量来决定结果。此外，我们还可以提取与结果相关的信息，并将其与结果一同显示。\n\
  \n在本节中，我们将讨论剩下的两个配置框：上下文过滤器和关系。\n\n#### 上下文过滤器\n\n上下文过滤器是通常来自 URL 的输入，常被称为参数。一个典型的参数用法可能是将视图缩小到单个节点、单个用户或具有给定分类术语的节点。它类似于筛选器，但不同之处在于，其值并非通过表单设置，而是来自\
  \ URL。\n\n与本章前面创建的视图类似，让我们创建一个视图，使每个至少拥有一个博客节点的用户都拥有自己的页面，并且这些页面是动态创建的，这样您就无需显式地按用户名进行筛选（请参见表\
  \ 3–6）。您还将创建一个菜单和一个区块。\n\n***表 3–6.** 使用上下文过滤器创建视图*\n\n| **创建一个新的节点视图** |  |\n|\
  \ --- | --- |\n| **新增页面显示** |  |\n| 标题 | 标题 = Blogs |\n| 格式 | 显示 = Content &#124;\
  \ Teaser |\n| 筛选器 | Content: Published = Yes Content: Type = Blog |\n| 排序条件 | Content:\
  \ Post Date = 降序排序 |\n| 页面设置 | 路径 = blog 菜单 = 普通菜单项\n –标题 = Blog\n –菜单 = 主菜单 |\n\
  | 上下文过滤器 | User: Name  –当筛选值不在 URL 中时 = 显示“指定字段的所有结果”\n –覆盖标题 = 按 %1 分类的博客\n –指定验证设置\
  \ = 基本验证，显示“未找到结果”内容\n  –更多部分：\n –大小写 = 每个单词首字母大写\n –路径中的大小写 = 小写\n –在 URL 中将空格转换为破折号\
  \ = 是 |\n| **新增区块显示** |  |\n| 覆盖上下文过滤器 | User: Name -如果参数不存在则执行的操作 = 显示摘要\n -排序顺序\
  \ = 升序 |\n\n![images](img/square.jpg) **提示** 贡献模块 Pathauto (`drupal.org/project/pathauto`)\
  \ 允许您指定 URL 别名的模式，以便自动创建这些别名。这些别名对用户和搜索引擎优化都友好。在此示例中，您应为博客节点设置 Pathauto，使用模式 `blog/[user]/[title]`，以便此页面\
  \ URL 与您正在创建的视图保持一致。\n\n将您的区块放置在路径为 `blog/*` 的页面上，这样它就能出现在所有博客页面（包括视图和节点）上。转到您的主页面，点击主菜单中的\
  \ Blog 链接。\n\n\n\n#### 关系\n\n关系配置允许您引入与当前显示内容相关但存储在同一数据库不同区域的内容。创建关系后，您需要将其与字段或上下文过滤器关联。\n\
  \n在此示例中，您希望为每个节点结果显示创建该节点的人以及编辑/修订该节点的人。使用您在上下文过滤器示例中创建的视图并进行一些修改。我们假设您创建的不是博客节点视图，而是百科节点视图（表\
  \ 3–7）。\n\n在构建时，在添加新字段后查看实时预览区域。然后在将关系与用户名字段关联后再次查看。\n\n***表 3–7.** 创建百科节点视图*\n\n\
  | **更新页面显示** |  |\n| --- | --- |\n| 格式 | 显示 = 字段 |\n| 字段 | 内容：标题 –将此字段链接到其内容<br>–将字段和标签包装在\
  \ HTML 中 = H2<br>用户：名称<br>–标签 = 创建者<br>–更多：管理标题 = 创建者<br>用户：名称<br>–标签 = 修订者<br>–更多：管理标题\
  \ = 修订者<br>内容：正文<br>–移除标签<br>–格式化程序 = 修剪，300 |\n| 关系 | 内容修订：用户 |\n| 编辑字段 | 用户：名称（您添加的第二个，管理标题为“修订者”）<br>–关系\
  \ = 修订用户 |\n| 格式 | 样式 = 网格<br>–列数 = 3 |\n| 分页设置 | 用户分页 = 分页输出，完整分页器<br>–每页项目数 =\
  \ 9 |\n\n您刚刚为字段分配了一个关系。在分配关系之前，它显示的是节点的作者。在分配关系之后，它显示的是最后保存该节点的作者（修订者），如图 3–21 所示。您需要使用关系来实现此目的，原因在于节点数据、节点修订历史记录和用户数据在数据库中的存储位置不同。您需要将这些信息关联起来。\n\
  \n![图片](img/0321.jpg)\n\n***图 3–21.** 使用关系显示最近编辑节点的用户名的视图*\n\n![图片](img/square.jpg)\
  \ **提示** 某些您选择安装的贡献模块可能需要使用关系才能显示所需内容。如果您在可用组中找不到某个过滤器或字段，但确认它应该存在，那么它很可能需要依赖关系。\n\
  \n#### 其他模块\n\n有许多模块可以扩展视图的功能。它们通常会创建可供您自定义的视图，因此大部分工作已经完成。以下列表并非详尽无遗，但您应该了解以下模块：\n\
  \n*   管理\n    *   视图批量操作（VBO） – `drupal.org/project/views_bulk_operations`\n*  \
  \ 地图\n    *   OpenLayers – `drupal.org/project/openlayers`\n    *   Gmap – `drupal.org/project/gmap`\n\
  *   日历\n    *   日历 – `drupal.org/project/calendar`\n*   样式与显示\n    *   jCarousel\
  \ – `drupal.org/project/jcarousel`\n    *   视图手风琴 – `drupal.org/project/views_accordion`\n\
  \    *   视图无限滚动 – `drupal.org/project/views_infinite_scroll`\n\n请记住，所有模块都是持续开发中的作品，社区成员需要通过报告问题和测试补丁来帮助增强它们。\n\
  \n#### 导出为代码\n\n你必须导出，必须导出！！我来告诉你为什么……\n\n我在练习中提到，定期保存视图很重要，但问题是，即使你还没准备好，它也会在你的网站上显示出来。我认为对于一个新视图来说，这其实算不上什么大问题，因为在基本设置框中可以更改显示状态配置。但如果你正在修改一个现有视图呢？\n\
  \n此外，如果你最初是在开发环境中创建视图，又如何让视图在生产服务器上显示呢？难道你需要点击 100 次来复制它吗？\n\n当然不用；你可以将视图导出为代码！\n\
  \n使用开发环境来创建、编辑和微调你的视图；导出最终版本；然后将文件复制到生产服务器。这非常简单，并减少了因误点击而造成的人为错误。\n\n然而，在导出视图之前，你需要创建一个模块来保存代码。根据你在第\
  \ 22 章学到的内容，创建你的模块文件夹、`.info` 文件和 `.module` 文件。同时，在你的模块中创建一个名为 `views` 的文件夹。这是你存放每个导出文件的地方。在该文件夹中，创建一个名为\
  \ `articles_by_author.inc` 或与视图同名的空文本文件。\n\n打开你刚刚创建的 `.inc` 文件，并在顶部输入以下代码：\n\n```\n\
  <?php\n//将导出代码放在这里\n$views[$view->name] = $view;\n```\n\n转到 `/admin/structure/views`\
  \ 的视图管理页面，找到你想要导出的视图。在视图列表右侧，点击该视图操作菜单中的“导出”。这将带你进入一个包含大量代码的页面。复制文本区域中的所有代码，并将其粘贴到\
  \ `articles_by_author.inc` 文件中，覆盖掉中间的那一行（`//将导出代码放在这里`）。\n\n对于每个你想要导出的视图，你都需要在模块的\
  \ `views` 文件夹中创建一个文件，并像刚才那样粘贴导出代码。\n\n下一步是向你的模块添加一些代码，告诉视图模块去你的模块的 `views` 文件夹中查找。在你的模块的\
  \ `.module` 文件中，添加以下代码，并将 “dgd7glue” 替换为你模块的名称：\n\n```\n/**\n * 实现 hook_views_api().\n\
  \ */\nfunction dgd7glue_views_api() {\n  return array(\n    'api' => '3.0',\n  );\n\
  }\n\n/**\n * 实现 hook_views_default_views().\n */\nfunction dgd7glue_views_default_views()\
  \ {\n  $path = './' . drupal_get_path('module', 'dgd7glue') .'/views/*.inc';\n \
  \ $views = array();\n  foreach (glob($path) as $views_filename) {\n     require_once($views_filename);\n\
  \  }\n  return $views;\n}\n```\n\n像启用其他模块一样，在 `admin/modules` 页面启用你的模块。\n\n为了确保视图模块知道你已将视图添加到代码中，你需要清除视图缓存。转到\
  \ `/admin/structure/views/settings/advanced` 的视图工具选项卡，然后点击“清除视图缓存”。\n\n返回视图列表页面。找到你刚刚导出的视图。你会注意到左侧显示“数据库覆盖代码”的字样。这意味着\
  \ Drupal 知道你已将这个视图保存在代码中，但当前使用的是数据库中的版本。你应该使用你刚刚添加的代码版本，并删除数据库版本。点击你刚刚导出的视图操作菜单中的“还原”。它会确认你是否真的想要这样做。在你点击“是的，我想还原我的视图！”后，它会将你重定向回列表页面。注意，现在你的视图旁边显示的是“在代码中”。\n\
  \n恭喜你！\n\n将视图导出为代码的最大好处在于，你可以非常轻松地进行更改，并将创建好的视图从一个环境迁移到另一个环境。只是别忘了清除视图缓存。\n\n\n\
  #### 其他资源\n\n由于 Views 模块非常流行，网上有大量相关资源，Drupal 活动中也有许多相关演示。如果你正在寻找更多帮助，可以查看这些地方：\n\
  \n- *Drupal 文档页面*：由社区持续更新；尽管 Views 模块多年来已趋于成熟，但其核心概念和策略仍保持相对一致。`drupal.org/documentation/modules/views`\n\
  - *Views 问题队列*：搜索这些问题，看看是否有人在讨论类似的内容。如果找不到，你可以创建支持工单。`drupal.org/project/issues/views`\n\
  - *谷歌*：网上有大量关于 Views 的博客文章、教程和视频。`google.com/search?q=drupal+views`\n- *你所在地区的 Drupal\
  \ 小组*：每个地区都有月度聚会，这是提问的好地方。找到你当地的小组并加入！`groups.drupal.org/groups`\n- *专业培训*：有许多付费的专业培训课程可以帮助你提升技能。关于如何进一步参与\
  \ Drupal 项目并获得帮助，请参阅第 9 章，但永远不要害怕自己动手尝试和实验（请在本地环境而非正式网站上进行操作）。\n\n## 总有对应的模块\n\n\
  作者：Dani Nordin, Dan Hakimzadeh, 和 Benjamin Melançon\n\n在构建 Drupal 网站时，“总有对应的模块”可能是你听到的最动听的话。模块是精心打包的代码片段，用于扩展\
  \ Drupal 的功能。由于有成千上万个贡献模块，很有可能有人已经编写了一个能基本满足你需求的模块。那么，主要挑战有两方面：\n\n1.  明确你究竟需要什么。\n\
  2.  找到实现该目标的最佳模块。\n\n本章将为你介绍一些核心模块，这些模块对多种类型的 Drupal 网站都大有裨益。接着，我们将迎接创造性挑战，为特定的使用场景找到合适的模块。一旦找到符合你使用场景的模块，学习如何评估其有效性，并有时将其与功能相似的其他模块进行比较，就至关重要。礼貌且有效地报告错误和请求功能，也是一门需要学习的艺术。\n\
  \n**提示：** 找到一个能在一个包中完全满足你需求的模块，通常*不是*使用 Drupal 的初衷。Drupal 的发展方向是，让许多小部件各司其职，并良好协作。字段和视图就是一个很好的例子。你不需要为食谱页面、赞助商列表以及新闻与活动版块分别使用三个专门的模块。你只需要\
  \ `Field` 和 `Views` 模块及其相关模块，通过配置它们，你就可以完成所有这些任务，甚至更多。（`Features` 模块以及其他定义自身视图并为你创建内容类型的模块，试图通过打包这些配置工作，提供开箱即用的功能，从而实现两全其美。但如果需要，你可以使用灵活、广泛使用的工具对其进行修改或扩展。）\n\
  \n### 适用于 Drupal 的模块在不断演变\n\n评估可用于 Drupal 的模块有很多不同的方法。NodeOne 的工作人员制作了一个名为“你应该了解的\
  \ 49 个模块”的系列节目（`nodeone.se/blogg/49-modules-you-should-know`），它提供了一个很好的思考角度。`NodeOne.se`\
  \ 推荐的是你应该了解的模块，但不一定必须使用，当然也不是每个网站都要用。Palantir 有一个更深入的系列节目，名为“更好地了解一个模块”（`palantir.net/blog/series/14`），思路相同。Drupalistas\
  \ 经常发布前十名或前一百名模块的列表，这些都是了解可用模块最新动态的好方法。\n\n#### 模块越少越好\n\nDrupal 社区喜欢炫耀其成千上万个贡献模块，但这里有一个非常重要的事实：你安装的模块越多，网站的性能就越差。\n\
  \n来自 `2bits.com` 的性能和可扩展性专家 Khalid Baheyeldin 经常进行演示，讲解如何帮助 Drupal 网站在一台服务器上每天处理两到三百万次页面浏览、每月数千万访客，而无需使用通常与规模化相关的反向代理、缓存、内容分发网络、NoSQL\
  \ 数据库或 Drupal 修改。\n\n在确保服务器本身已针对服务 Drupal 进行调优且没有额外运行多余程序后，他的第一步就是移除所有不必要的模块。这意味着：\n\
  \n-  更少的待加载/执行代码。\n-  更少的内存消耗。\n-  更少的数据库查询。\n\n比性能考虑更重要的是，添加太多额外模块会增加网站的复杂性，使其更难以开发和维护。为了防止因不必要的模块臃肿而导致的代码和概念开销，我们不一定推荐创建一个“核心”模块列表。每个模块都应该有出现在特定网站上的理由。尽管如此，当你持续使用\
  \ Drupal 创建网站时，某些模块会证明自己始终有用。这就是为什么使用 Drupal 的个人或团队一旦开始创建网站，就应该为其工作流程和过程编写文档的原因之一；随着时间的推移，这些文档对于团队效率至关重要。关于创建项目维基的更多信息，请查看第\
  \ 11 章。\n\n\n\n#### 如何查找和选择模块\n\n需要理解的关键点是：**每个模块都需要从你所构建的站点角度进行评估。**这也是为什么合理的站点规划是\
  \ Drupal 开发流程中至关重要部分的关键原因之一；提前了解站点的业务需求和所需功能，会让找到适合站点需求的正确模块变得容易得多。即使是功能强大且超级实用的模块——例如\
  \ `Views`（第 3 章会专门介绍，它是大多数站点的核心组件）——在某些特定项目中也可能不会被采用。\n\n少数情况下，某些模块需要被视为二选一的关系：两个或多个模块可能功能相似，或者极少数情况下完全不兼容，你必须在它们之间做出选择。\n\
  \n虽然没有找到特定项目正确模块的神奇公式，但以下提示可以帮助你从真正出色的模块中筛选出不太有用的模块：\n\n- **按兼容性筛选。** 作为最近重新设计的一部分，`Drupal.org`\
  \ 允许你通过 `drupal.org/project/modules`（见图 4-1）按模块与 Drupal 核心版本的兼容性进行筛选。在为特定项目搜索模块时，这应当成为默认行为。通过按你正在使用的\
  \ Drupal 版本筛选模块，你可以避免过滤掉数百个尚未支持你所用 Drupal 核心版本的模块。\n\n![图片](img/0401.jpg)\n\n***图\
  \ 4-1.** Drupal.org 模块页面（`drupal.org/project/modules`）允许按类别、热度或与你所用 Drupal 版本的兼容性进行筛选。*\n\
  \n![图片](img/square.jpg) **注意** 在撰写本文时，Drupal 的“安装最多”排序在确定排名时会包含 *所有* 版本的 Drupal，即使你正在按兼容性筛选。因此，你看到的未必是\
  \ *针对 Drupal 7* 最流行的模块，而可能是一个在 Drupal 6 中非常流行、恰好有 Drupal 7 版本但在 Drupal 7 中用处不大的模块。要查看特定版本的模块热度，请点击模块项目页面“项目信息”区域（位于“下载”区域上方）中的\
  \ *查看使用统计信息* 链接。此链接的格式为 `drupal.org/project/usage/`*`模块名称`*。\n\n- **寻找积极维护的模块。**\
  \ `Drupal.org` 上的大多数模块都会提供推荐版本及其发布日期。你还可以看到该模块最近一次提交代码的日期。通常来说，选择标有“积极维护”且在过去六个月内更新过的模块是一个好主意。虽然确实有可能找到一个运行良好但已超过一年未更新的模块，但这足以作为一个警示信号，让你在使用该模块之前对其进行更深入的审查。请参见图\
  \ 4-2，了解流行的 Views 模块的版本信息示例。如果你现在访问 `drupal.org/project/views`，你会看到自截图以来该模块已经有了许多新版本。\n\
  \n![图片](img/square.jpg) **提示** 你也可以按“最近发布”排序，以更好地查看那些维护较好或更新更频繁的模块。\n\n![图片](img/0402.jpg)\n\
  \n***图 4-2.** Views 模块的版本信息*\n\n- **在走投无路之前，将搜索范围限制在“完整项目”内。** 默认情况下，开发者沙盒模块（没有正式发布版）在\
  \ `drupal.org/project/modules` 的搜索中被隐藏。通常你不应该尝试这些未经支持的代码，但如果你找不到其他替代方案，并且愿意为其开发做出贡献，那么你或许能在沙盒项目中找到一些隐藏的宝藏。\n\
  \n- **与所有搜索一样，尝试使用多种关键词组合。** 如果首次搜索没有找到合适的模块，请用更少或不同的关键词再试一次。你也可以将搜索范围从 `Drupal.org`\
  \ 扩展到整个互联网，利用人们讨论你期望模块时可能使用的更广泛语言来获取信息。（如果你想惠及他人——很可能也包括一两个月后的自己——请记下你用来搜索模块的关键词，并将它们连同成功结果的链接一起发布。）\n\
  \n- **寻求帮助。主动请求你需要制作的模块！** 当所有其他方法都失败时，包括在 Drupal 支持论坛或 IRC（见第 9 章）中提问，请将你的梦想模块发布到\
  \ `groups.drupal.org/contributed-module-ideas` 的“贡献模块创意”小组。（仅凭你的请求就有人制作该模块的可能性极低，但这可以成为一个起点！）\n\
  \n#### 模块出现问题时该如何处理\n\n尽管所有这些贡献模块在改善 Drupal 站点功能方面非常有用，但偶尔你可能会发现某个模块无法完全按预期工作，甚至更糟——它可能完全损坏你的站点。发生这种情况时，最简单的做法是卸载该模块并寻找另一个。但\
  \ Drupal 社区为你提供了一些额外的选项，让模块能更好地工作。\n\n一个关键的帮助来源是 Drupal.org 的问题队列。通常，在 `Drupal.org`\
  \ 搜索框中输入错误文本或问题描述，会揭示社区关于你所面临问题的丰富信息。这可能包括社区其他成员解决问题的快速方法列表，也可能包含一个可用于修复该问题的补丁。如果你有自己编写补丁的积极性，为特定模块贡献补丁是回馈\
  \ Drupal 社区的好方法。有关补丁的更多信息，请查看关于为社区贡献的第 38 章以及 `drupal.org/patch`。\n\n### 核心中的模块\n\
  \n如果你使用**标准**安装配置文件安装 Drupal，那么以下模块很可能已经在你的 Drupal 安装中安装并启用了：\n\n\n\n*   `Block`（区块）——允许您在主题中创建和管理区块。区块类似于小部件或功能片段，您可以将其拖放到页面的指定区域中。可以基于区块应出现或不应出现的\
  \ URL 路径、用户正在查看的内容类型、查看内容的用户角色以及当前应用于网站的主题，来控制区块在区域中的显示。\n*   `Color`（颜色）——允许您更改支持此选项的主题的颜色。最终用户可以通过定义十六进制颜色代码或从色轮中选择颜色，来指定在网站特定区域使用的颜色。如果您的主题不支持重新着色（或您已完成重新着色），则可以禁用`Color`模块。\n\
  *   `Comment`（评论）——允许访问者对网站上的任何内容发表评论。所有内容类型都可以启用评论功能，并且可以为评论添加自定义字段。\n*   `Contextual\
  \ Links`（上下文链接）——控制可帮助您更轻松访问与页面元素相关操作的链接。默认情况下，Drupal 7 会在每个节点和每个区块上放置编辑和删除链接。这为贡献模块（以及您自己创建的模块）提供了出色的可用性，并且可以定义额外的上下文链接。\n\
  *   `Dashboard`（仪表盘）——在您的网站上启用管理仪表盘。管理仪表盘在管理界面中提供了一个页面，采用两栏布局，可在其中分配区块以显示网站的“快速概览”信息（例如，最近的评论和登录用户）。\n\
  *   `Database Logging`（数据库日志记录）——将记录和条目记录到数据库中。此模块在管理界面中提供了一个报告屏幕，列出站点上的所有近期活动和错误。管理员可以筛选这些记录的条目，并点击查看更详细的信息。\n\
  *   `Field SQL Storage`（字段 SQL 存储）、`Field UI`（字段用户界面）——允许您创建字段并将其附加到站点上的内容类型、评论和其他实体。字段可以使用以下可选核心模块以及必需的`Text`模块，以不同格式存储并以不同方式格式化：\n\
  \    *   `File`（文件）\n    *   `Options`（选项）\n    *   `List`（列表）\n    *   `Number`（数字）\n\
  \    *   `Image`（图片）\n*   `Help`（帮助）——显示帮助文本。通过此模块，其他模块可以向用户（尤其是站点管理员）显示信息，解释 Drupal\
  \ 用户界面中可用的各种设置或操作。\n*   `Menu`（菜单）——允许站点管理员管理站点的导航菜单。\n*   `Overlay`（覆盖层）——启用了管理覆盖层。覆盖层旨在通过以页面上的覆盖层形式呈现管理屏幕（以及可选的内容创建/编辑表单），为任务提供上下文。可以禁用此模块而不会丢失任何功能。\n\
  *   `Path`（路径）——允许用户创建对搜索引擎友好的 URL。默认情况下，Drupal 对内容使用`node/[节点 ID]`的 URL 模式，例如`node/123`。Path\
  \ 允许您将其更改为`您想要的任意路径`。（请参阅本章后面讨论的`Pathauto`模块，以便从节点数据（如标题）自动创建路径别名。）\n*   `RDF`——将元数据附加到您的内容中，定义您所写的项目在现实世界中是什么。例如，该模块添加了\
  \ RDFa 语义标记，指示内容的发布者是其创建者。这让其他站点或工具能够以智能方式查询或组合您的内容，从而理解您的内容。有关 Drupal 7 新 RDFa\
  \ 功能的更多信息，请参阅第 28 章关于 Drupal 与语义网的内容。\n*   `Search`（搜索）——允许用户搜索站点内容。搜索模块提供一个基本的搜索表单（作为区块）和一个带有高级搜索过滤器的搜索页面，使用户能找到更相关的结果。\n\
  *   `Shortcut`（快捷方式）——允许管理员创建可通过管理工具栏访问的便捷快捷链接列表。这些链接显示在工具栏的可扩展部分，可通过点击工具栏最右侧的灰色标签来展开。\n\
  *   `Taxonomy`（分类）——提供使用词汇表或标签组对内容进行分类的能力。您可以创建无限数量的词汇表，并以添加字段的方式将它们添加到内容和用户中。您可以对词汇表的呈现方式进行一些选择——单选、多选或自由标签。\n\
  *   `Toolbar`（工具栏）——在管理界面顶部创建管理菜单。工具栏提供对 Drupal 管理功能的快速链接。\n*   `Update manager`（更新管理器）——处理\
  \ Drupal 核心和贡献模块的更新，并检查可用的更新。您可以直接从更新管理器下载和更新更多模块。\n\n此外，以下模块是 Drupal 必需的：\n\n*\
  \   `Filter`（过滤器）——在显示内容之前对其格式进行过滤。\n*   `Node`（节点）——控制站点内容。\n*   `System`（系统）——处理管理员的一般站点配置。\n\
  *   `Text`（文本）——定义简单的文本字段类型。\n*   `User`（用户）——管理用户注册和登录系统。Drupal 核心还提供了更多在标准安装配置文件下默认未启用的模块。您可以根据站点的功能需求考虑启用以下模块：\n\
  \    *   `Aggregator`（聚合器）——允许您将 RSS 源导入到 Drupal 站点。聚合的项目不作为节点存储。\n    *   `Blog`（博客）——启用多用户博客，并设置博客所需的一些标准选项，例如近期文章列表等，而无需使用\
  \ Views 模块。\n    *   `Book`（图书）——允许您以大纲格式创建和组织内容。\n    *   `Contact`（联系）——在 Drupal\
  \ 站点上创建一个联系表单，并根据最终用户选择的理由将电子邮件分配给不同的收件人。\n    *   `Content translation`（内容翻译）——允许您将内容翻译成不同语言。\n\
  \    *   `Forum`（论坛）——创建类似讨论论坛的功能，以方便站点上组织有序的对话。\n    *   `Locale`（区域设置）——允许您将用户界面元素翻译成不同语言（甚至不同的术语）。虽然看起来`Content\
  \ translation`和`Locale`可以满足您站点的所有翻译需求，但实际上它们只是一个开始。内容和界面的翻译是一个非常复杂的领域——在撰写本文时，Drupal\
  \ 7 在这方面仍在变化中，但我们将尽量通过贡献模块资源`dgd7.org/translate`让您保持最新信息。\n    *   `Open ID`（开放身份）——允许用户使用\
  \ Open ID 在线身份管理服务登录您的 Drupal 网站。\n    *   `PHP filter`（PHP 过滤器）——允许用户在 Drupal 管理界面中创建内容或自定义区块时使用\
  \ PHP。出于安全性和可维护性的原因，不建议使用此模块。\n    *   `Poll`（投票）——适用于简单的流行度投票，尽管该模块位于核心中，但历史上并未受到太多关注或开发。\n\
  \    *   `Profile`（个人资料）——除非您是从 Drupal 6 升级并且启用了`Profile`模块，否则您在 Drupal 7 中甚至不会看到它。它已被弃用，取而代之的是字段和诸如\
  \ Profile2 之类的贡献解决方案。\n    *   `Syslog`（系统日志）——此模块可替代`Database logging`模块使用，将 Drupal\
  \ 的 Watchdog 日志存储到资源消耗较少的系统日志中（在 Debian 和 Ubuntu 系统中位于`/var/log/syslog`）。\n    *\
  \   `Testing`（测试）——一个面向开发者的模块，允许模块开发者对他们为 Drupal 编写的自定义代码运行自动化测试。\n    *   `Tracker`（追踪器）——存储关于站点访问和内容变更的信息，这些信息会显示给站点管理员。\n\
  \    *   `Trigger`（触发器）——一个简单的工作流系统，允许用户对站点上完成的任务添加操作或系统响应，例如当有人在帖子下评论时发送电子邮件。\n\
  \n快速浏览任何 Drupal 安装的模块屏幕（从管理菜单中的**模块**，路径为`admin/modules`），您将看到所有随 Drupal 预装的模块。现在，让我们开始讨论如何通过贡献模块来完善\
  \ Drupal 的功能。\n\n\n\n### 存放贡献模块的位置\n\n在深入探索 Drupal 的贡献模块（也常称为 contrib）世界之前，我们需要知道将它们放在哪里。你下载的贡献模块应放置在\
  \ `sites/all/modules/contrib` 目录下。放在 `all` 目录下意味着它们将在多站点安装中（如果你采用这种方式）的每个站点上可用。放在\
  \ `contrib` 目录下（需要你手动创建）则能与你可能创建的任何自定义模块（可放在 `sites/all/modules/custom` 目录下，同样需手动创建）进行适当分离。\n\
  \n贡献模块**切勿**放置在 `sites` 目录之外的任何位置。你为核心或安装配置文件之外添加的所有 Drupal 内容都应放在 `sites` 文件夹中。当你最终更新\
  \ Drupal 安装时（这对于应用安全更新和错误修复是必要的，参见第 7 章），将所有非核心数据放在 `sites` 文件夹中，使你只需备份该文件夹，并替换其他所有内容，而无需担心丢失任何数据。\n\
  \n### 站点构建基础\n\n本节中的所有模块均在 Drupal.org 上提供，可通过访问完整的模块列表页面 `drupal.org/project/modules`\
  \ 找到。正如我们之前提到的，这里列出的模块并非每个 Drupal 站点都必须安装；然而，经验表明，这些模块维护良好且值得了解。此外，这绝非一个完整的列表，适用于任何目的。在寻找特定功能时，建议按照前面描述的方法进行彻底搜索。\n\
  \n从技术上讲，我们这里列出的每一项都是一个“项目”，而非严格意义上的模块，每个模块项目可能包含一个或多个模块。要访问特定项目页面，请使用每个项目名称标题下列出的项目短名称，格式为\
  \ `drupal.org/project/project_shortname`。\n\n![images](img/square.jpg) **提示** 如果你在使用\
  \ Drush，命令 `drush dl project_shortname` 会自动下载并将短名称为 `project_shortname` 的模块解压到 `sites/all/modules/contrib`\
  \ 文件夹（前提是你先创建了它）；如果你没有创建 `contrib` 目录，则会解压到 `sites/all/modules`。如果你还需要开始使用 Drush，请参见第\
  \ 2 章。如需高级技巧，请查阅第 26 章。\n\n#### Views\n\n项目：`views`\n\nViews 模块是一个强大的工具，用于构建自定义的内容展示。你可以把它看作一个查询构建器——它允许你通过点击式界面，从\
  \ Drupal 的数据库中请求你想要在网站上展示的内容、用户和其他数据。然后，你可以利用 Views 的“样式插件”，以一些非常有趣的方式（如列表、幻灯片或地图）来展示这些内容。\n\
  \n在 Drupal 站点上使用 Views 的原因和动机如此之多，以至于第 3 章专门对此进行了阐述。虽然某些站点（例如，极其简单的站点或高度定制的应用程序）可以在没有\
  \ Views 的情况下蓬勃发展，但如今大多数基于 Drupal 构建的网站都在使用 Views。\n\nViews 附带了一些“辅助”模块。其中，Views\
  \ UI 是最重要的一个——因为它控制着 Views 的用户界面。如果你正在处理一个 Drupal 站点，但无法访问你的任何视图，请检查 Views UI 是否已启用。\n\
  \n#### Chaos Tools（依赖项）\n\n项目：`ctools`\n\nChaos Tools，也称为 CTools，是一个面向开发者的模块，提供了一组辅助工具，使\
  \ Drupal 中一些困难的开发任务变得更容易。其中一些选项包括将 Drupal 配置导出为代码、构建多步骤表单、简化 AJAX 请求的实现和管理。Views\
  \ 依赖 CTools 提供的某些辅助功能。\n\n如第 3 章所述，Views UI 需要 CTools 才能运行。CTools 包中包含的模块为各种有趣的站点构建工具奠定了基础。\n\
  \n![images](img/square.jpg) **注意** 所有模块都可以在 `drupal.org/project/project_shortname`\
  \ 找到，此项目短名称列在每个模块项目的人类可读名称下方。例如，CTools 模块套件可在 `drupal.org/project/ctools` 获取。如果你想用\
  \ Drush 下载模块，请在命令中使用项目短名称；例如，`drush dl ctools`。\n\n#### Pathauto\n\n项目：`pathauto`\n\
  \n你的 Drupal 站点上的每个页面都有其独特的内部路径。默认情况下，Drupal 会在浏览器地址栏中显示这个内部路径。例如，你 Drupal 站点上的第一个节点会在路径\
  \ `node/1` 下。Pathauto 允许你为每个节点自动创建人类可读、对搜索引擎友好的 URL。你还可以使用 Pathauto 根据内容类型或 Token\
  \ 模块能够理解的任何其他内容方面，来设置自动前缀。\n\n例如，使用内容类型的机器名称令牌和标题令牌，可以使所有博客条目自动获得路径别名，如 `example.com/blog/blog-post-title`。Pathauto\
  \ 由令牌驱动，并依赖于接下来会介绍的 Token 模块。更多关于 Pathauto 的使用示例，请参见第 8 章。\n\n#### Token（依赖项）\n\n\
  项目：`token`\n\nToken 允许你在管理界面的不同区域为 用户、节点 或其他引用创建简单的占位符。这些占位符会在适当的时候被相应令牌的值替换。以使用\
  \ Pathauto 创建对搜索引擎友好的 URL 为例，为所有文章定义一个默认模式 `[node:content-type:name]/[node:title]`，然后发布一篇标题为“Education\
  \ is the path from cocky ignorance to miserable uncertainty”的文章，将会创建 URL `example.com/article/education-path-cocky-ignorance-miserable-uncertainty`。\n\
  \n![images](img/square.jpg) **注意** （默认情况下，像“a”和“the”这类意义不大的单词会从 Pathauto 创建的别名中排除，但你可以在*管理*\
  \ ![Image](img/U001.jpg) *配置* ![Image](img/U001.jpg) *搜索和元数据* ![Image](img/U001.jpg)\
  \ *URL 别名* ![Image](img/U001.jpg) *设置*（`admin/config/search/path/settings`）下的“要移除的字符串”中进行配置。你可以创建视图来匹配\
  \ Pathauto 生成的内容类型前缀（例如，在 `story` 路径下提供所有故事内容的视图）。有关创建可定制 URL 的示例，请参见第 33 章。\n\n\
  \n\n#### 附加字段类型\n\n在 Drupal 7 之前，字段是通过一个名为内容构建工具包（CCK）的模块以及各种附加模块来处理的，这些模块可以格式化字段，以便为内容添加图片、链接、视频和其他类型的数据。该功能已整合到\
  \ Drupal 7 中，成为“字段”和“字段界面”模块。\n\n以下是一些有用的模块列表，它们为“字段”模块添加了自定义字段类型：\n\n*   References（`drupal.org/project/references`）允许您创建对用户或节点的引用，这些引用随后可以在进行引用的内容中显示。随着时间的推移，它可能会被\
  \ Relation 模块（`drupal.org/project/relation`）所取代，后者是一种更强大也更复杂的方式，用于将任何 Drupal 实体与任何其他实体关联起来。Block\
  \ reference（`drupal.org/project/blockreference`）和 View reference（`drupal.org/project/viewreference`）则分别创建了允许管理员选择显示特定区块和视图的字段。\n\
  *   Field Group（`drupal.org/project/field_group`）允许您将字段聚类成组，以创建更直观、更精简的内容创建界面和面向最终用户的内容展示。例如，这对于将地址信息或项目相关信息整合在一起非常有用。您可以将字段组显示为可折叠字段集、垂直选项卡或水平选项卡。\n\
  *   Link（`drupal.org/project/link`）为带有相关标题的 URL 提供了存储和格式化功能。\n*   Media（`drupal.org/project/media`）远不止是一个字段模块，但它确实为不同类型的内容（如视频、图片和文档）提供了格式化功能。它还实现了一个集中的存储空间和系统，用于管理\
  \ Drupal 站点上的各种类型的内容。\n\n在 Drupal.org 上还有数十种其他字段可供下载。如果现有字段类型不能满足需求，您也可以创建自己的自定义模块来实现新的字段类型。\n\
  \n#### 所见即所得（WYSIWYG）\n\n项目：`wysiwyg`\n\nDrupal 在内容创建和编辑表单上默认使用纯文本和手动 HTML 输入。虽然这对开发者或熟悉\
  \ HTML 的用户来说通常不是问题，但站点编辑者和用户通常更喜欢某种形式的所见即所得编辑器（可以理解为文字处理器），以便更轻松地格式化文本。WYSIWYG 模块正好实现了这一点，您可以从包括\
  \ TinyMCE、CKEditor 和 FCKeditor 在内的众多 WYSIWYG 编辑器中进行选择。\n\n![images](img/square.jpg)\
  \ **提示** 任何 WYSIWYG 编辑器都会增加大量复杂性，并且没有一种能完全实现“所见即所得”的承诺——这可能导致在处理内容时遇到很多麻烦，因为其 HTML\
  \ 标记不如手动输入的那么干净。因此，如果您的站点用户能够借助 Drupal 的自动段落标签和诸如 BUEditor 之类的 HTML 标记辅助工具来处理纯文本内容输入，那会好得多。\n\
  \n为了使用 WYSIWYG，您需要下载一个编辑器库并将其安装在您的 `sites/all/libraries` 文件夹中。有关更多信息，请参阅 WYSIWYG\
  \ 模块的 `README.txt` 文件及其配置页面。\n\n我们强烈建议除了 WYSIWYG 模块之外，还下载 WYSIWYG line breaks（`drupal.org/project/wysiwyg_linebreaks`）。这个附加模块有助于修复\
  \ WYSIWYG 编辑器可能导致的一些 HTML 异常。\n\n##### 替代方案\n\n如果可能避免使用 WYSIWYG，请这样做。这种保持简单的方法将惠及移动设备用户，并保持您内容中的代码更干净。作为完整\
  \ WYSIWYG 控件的替代方案，您可以使用出色的 BUEditor 模块（`bueditor`），它添加了用于插入 HTML 标记的按钮。或者，您也可以使用\
  \ Markdown 过滤器（`markdown`），它允许您在编辑字段中使用 Markdown 语法。Markdown 语法是一种非常简单的格式化方法，模仿了老式的文字处理应用程序。例如，您可以通过在文本两端加星号来添加粗体文本（例如\
  \ `*粗体文本*`），用下划线表示斜体（例如 `_ 斜体 _`），等等。\n\n#### Webform\n\n项目：`webform`\n\nDrupal\
  \ 自带“联系”模块，它允许您站点上的任何用户向可配置的地址（通过 `contact` 路径的主联系表单）发送快速电子邮件，或者，如果进行了相应配置，也可以发送给站点上的注册用户（路径为\
  \ `user/[uid]/contact`）。其局限性在于表单非常基础，只收集用户的姓名、电子邮件地址和简短评论。此外，提交的消息不会存储在站点数据库中，因此除了您的电子邮件帐户之外，没有可回溯的参考点。\n\
  \n对于许多站点来说，这远远不够——某些站点需要更大的灵活性来构建具有任意数量自定义字段、灵活布局选项和报告功能的表单。Webform 模块允许您构建可用于收集数据的自定义表单。您可以使用\
  \ Webform 构建联系表单、调查、在线申请等。该模块自带报告功能，并允许您配置电子邮件通知，以便在每次提交表单时发送。\n\n#### AntiSpam\
  \ 或 Mollom\n\n项目：`antispam`、`mollom`\n\n在任何站点（至少是包含任何类型社交互动的站点）中，最重要的事情之一就是保护站点免受垃圾信息的侵扰。Drupal\
  \ 的贡献模块提供了几种实现方式。其中在防止垃圾信息和避免激怒用户之间取得良好平衡的两个模块是 AntiSpam 和 Mollom。这两个模块都需要注册一个垃圾信息检测网络服务，根据发送的请求数量，该服务可以是免费的，也可以是付费的。\n\
  \nMollom 是由 Drupal 创始人 Dries Buytaert 创办的一项服务。每天拦截的垃圾信息数量在一定限额内是免费的。要使用 Mollom 模块，请在\
  \ `Mollom.com` 创建一个帐户并注册您的站点。然后将公钥和私钥 API 复制到您站点上的 Mollom 设置页面（`admin/config/content/mollom/settings`）。\n\
  \n![images](img/square.jpg) **注意** 默认情况下，如果 Mollom 服务无法正常工作，它会阻止所有表单提交。如果您宁愿偶尔应对垃圾信息的涌入，也不希望在\
  \ Mollom 宕机时拒绝所有表单提交，请将“当 Mollom 宕机或不可达时”的设置更改为“接受所有表单提交”。\n\n要使用 AntiSpam 模块，请在\
  \ `akismet.com` 注册 Akismet，对于大多数非商业站点，Akismet 是免费的。Akismet 是使用最广泛的防垃圾信息服务，最初是为 WordPress\
  \ 内容管理系统创建并主要使用的。其配置与 Mollom 非常相似——只需将 API 密钥复制到您站点上的 AntiSpam 设置页面（`admin/config/content/antispam/settings`）即可。\n\
  \n默认情况下，当提交被阻止时，该模块会通过电子邮件通知用户。若要更改此设置，请在 AntiSpam 设置屏幕的常规选项下选择“禁用电子邮件通知”。\n\n![images](img/square.jpg)\
  \ **注意** 除了使用外部垃圾信息检测服务外，CAPTCHA 模块套件（`drupal.org/project/captcha`）允许您插入各种 CAPTCHA（请参阅\
  \ `drupal.org/project/captcha_pack`），包括简单的数学问题和可根据您的社区定制的可配置问题。您还可以将其扩展为使用 reCAPTCHA\
  \ 服务（`drupal.org/project/recaptcha`），该服务提供了必要的无障碍音频 CAPTCHA 作为后备方案。一种完全避免使用 CAPTCHA\
  \ 的解决方案（即使作为垃圾信息检测的后备方案）是 Hashcash 模块（`drupal.org/project/hashcash`），它依靠 JavaScript\
  \ 和 hashcash 算法来阻止垃圾信息提交。\n\n\n\n### 其他可能实用的模块\n\n在了解了 Drupal 一些最实用的模块后，这里列出了其他一些可能对您特定网站方案有帮助的模块。这份列表绝非详尽无遗；如果您在此处没有找到符合需求的模块，在`Drupal.org`上快速搜索模块，很可能至少会找到与您所需接近的模块。\n\
  \n#### 管理界面与内容录入\n\nDrupal 社区提供了许多有用的模块，可改善您管理网站和内容管理的体验。\n\n##### 工作台\n\n项目：`workbench`\n\
  \n作为 Drupal 7 全新推出的项目，工作台模块套件为内容创作者和编辑者提供了可用性改进，包括可定制的工作流。\n\n##### 环境指示器\n\n项目：`environment_indicator`\n\
  \n环境指示器会在您的网站侧面添加一个彩色条，用以非常清晰地标明您当前所处的环境（开发、测试、生产等）。虽然这更像是一个开发者模块，但如果您不希望因误操作在错误版本的网站上输入内容，它会非常有用。\n\
  \n##### 智能裁剪\n\n项目：`smartcrop`\n\n智能裁剪有助于更好地自动化照片裁剪过程。它提供了一种基于信息熵进行裁剪的图像样式，在裁剪为固定形状时能产生更有效的效果。例如，在将个人资料图片裁剪为正方形时，它可以减少剪掉人物头部的可能性。\n\
  \n##### 内容类型概览\n\n项目：`content_type_overview`\n\n这个极其有用的模块能让您从一个地方编辑多种内容类型的设置。\n\n\
  **配置和使用模块：内容类型概览**\n\n从`drupal.org/project/content_type_overview`页面或通过`drush dl\
  \ content_type_overview`获取模块后，在模块管理页面（`admin/modules`）启用它。\n\n很难预知一个模块会把自己放在管理页面的哪个分类下，因此，最简便的方法始终是使用浏览器的页面内搜索（尝试组合键`ctrl\
  \ f`或`command f`）并输入模块名称（其官方名称，而非系统名称）。在本例中，内容类型概览独自位于管理（Administration）分类下。\n\n\
  ![Image](img/p100-01.jpg)\n\n我们勾选它，然后点击页面底部的“保存配置”按钮提交模块页面。Drupal 会提示“配置选项已保存”。我们返回管理页面的条目，希望内容类型概览模块会有\
  \ Drupal 7 提供的那些漂亮的配置链接之一，但失望地发现“操作”列中没有任何内容。我们记下要提交一个补丁，将链接添加到`.info`文件中，这样它就会出现在模块页面上，下次操作会更容易。（该问题已发布在`drupal.org/node/1032930`。）\n\
  \n当一个模块未提供指向其配置页面的链接时，您可以自行查找。我们首先在配置（Configuration）(`admin/config`)中查找，因为这是模块配置最常放置的地方。\n\
  \n通过`ctrl f`进行搜索是再次尝试查找该模块的好方法，这次是在众多其他配置项中寻找。\n\n![Image](img/p100-02.jpg)\n\n\
  它位于“开发”（Development）之下，这对于一个配置辅助工具来说似乎有点奇怪，但我们在使用 Drupal 的过程中本应早就预料到，并非所有东西都安排得合情合理。我们点击那里的链接，进入`admin/config/development/content_type_overview`。我们勾选了网站上所有内容类型。\n\
  \n![Image](img/p101-01.jpg)\n\n然后我们点击“保存配置”按钮提交表单。耶！\n\n但现在该做什么？这是 Drupal 一个太常见的烦人之处。难道就不能给点提示，告诉我们接下来要去哪里吗？难道我们是通灵师不成？\n\
  \n好吧。我们知道内容类型位于 *管理* ![Image](img/U001.jpg) *结构* (`admin/structure`)下，我们去那里找找内容类型概览。嗯，没有。那么，我们点击内容类型（`admin/structure/types`）。嗯...啊哈！在最右边，有一个新的标签页，“概览”。\n\
  \n![Image](img/p101-02.jpg)\n\n我们进入那个标签页（`admin/structure/types/overview`）。哇。我们选中的所有内容类型都有几十个选项，全部在一个地方！\n\
  \n![Image](img/p102-01.jpg)\n\n这太棒了。我们可以一次性为所有内容类型设置“创建新修订版本”的发布选项，以及所有其他发布选项，如“推送到首页”和“已发布”。此外，在这个页面上，我们可以更改任何内容类型的名称、描述、标题字段的标签、“提交前预览”按钮是禁用、可选还是必选、提交指南文本、是否显示作者和日期信息、评论设置、菜单设置，甚至是贡献模块的设置，例如“允许重复提交”选项（有关该模块如何升级到\
  \ Drupal 7，请参见第 21 章）。\n\n从提交后看到的消息中，我们可以发现它会逐个保存每个内容类型，就像我们逐一访问了所有八个内容类型一样。\n\n\
  ##### 模拟登录\n\n项目：`masquerade`\n\n通常，在构建网站时测试用户权限需要您退出网站并以其他用户身份登录。模拟登录模块允许（拥有相应权限的）用户在不登出的情况下切换用户。\n\
  \n#### 内容显示\n\n这组模块将帮助您自定义网站的外观和内容显示方式。\n\n##### 面板\n\n项目：`panels`\n\n作为 Earl Miles（merlinofchaos）的又一力作，面板模块允许网站管理员创建可在网站多个区域使用的自定义页面布局。它还创建了一个拖放界面用于管理内容和区块放置。虽然对于创建动态\
  \ Drupal 网站来说并非必不可少，但许多网站构建者会将整个网站建立在面板项目及其所需的工具集（`ctools`）项目提供的模块之上。\n\n##### 代码过滤器\n\
  \n项目名称：`codefilter`\n\n这个模块对于成功开发 Drupal 网站绝非必不可少，但如果您想撰写关于开发的文章并包含代码片段，它就至关重要了！该模块提供了一种简单的方式来添加代码片段并使其格式美观。\n\
  \n它通过提供一个输入过滤器来实现这一点，您必须为一个或多个文本格式启用该过滤器，新启用的模块才会为您工作。\n\n1.  进入 *管理* ![Image](img/U001.jpg)\
  \ *配置* ![Image](img/U001.jpg) *内容撰写* ![Image](img/U001.jpg) *文本格式*（`admin/config/content/formats`）并编辑（开始时）已过滤的\
  \ HTML 格式。\n2.  在“已启用的过滤器”列表中，启用代码过滤器。\n3.  在“过滤器处理顺序”下，将代码过滤器放在 *“限制允许的 HTML 标签”之后*。\n\
  4.  不要忘记点击表单底部的“保存配置”。\n\n![images](img/square.jpg) 提示 如果您将*限制允许的 HTML 标签*过滤器放在*代码过滤器*之后，它会剥离代码过滤器添加的\
  \ HTML。通常的规则是，将*限制允许的 HTML 标签*放在首位，将*修正错误和截断的 HTML*放在最后。\n\n对“完整 HTML”格式执行相同操作，但您无需担心过滤器处理顺序，因为完整\
  \ HTML 默认不限制允许的 HTML 标签。\n\n##### Colorbox\n\n项目：`colorbox`\n\n作为流行的 Drupal 6 模块（如\
  \ Lightbox2、JQuery Lightbox、Thickbox 等）的 Drupal 7 就绪继承者，Colorbox 帮助您使用 JQuery 在网页前部的覆盖层中显示图像、视频、表单和其他内容。\n\
  \n#### 菜单与导航\n\n下一组模块将有助于放置自定义导航菜单。\n\n\n\n##### 菜单区块\n\n项目：`menu_block`\n\n该模块允许你从菜单创建区块——从你想要的任何层级开始。例如：假设你的网站有一个“关于”板块，下设“团队”、“历史”和“真实故事”子项。该模块让你能够创建一个自定义的子菜单区块，该区块仅显示在“关于”板块的页面上。这只是该模块强大功能的冰山一角。\n\
  \n##### 菜单定位\n\n项目：`menu_position`\n\n`菜单定位` 可以告知菜单系统某个页面在菜单层次结构中应属于某个特定位置，而无需为其创建菜单项。这对于确保菜单系统知道所有\
  \ 12,000 篇博客文章都“属于”博客菜单项下方（因此当查看其中任何一篇时，博客菜单项保持高亮）特别有用，而无需实际将它们添加为菜单链接。过多的菜单链接会严重拖慢网站速度。\n\
  \n#### 社区建设与社交网络\n\n虽然 Drupal 是许多不同类型网站的强大选择，但它特别擅长创建具有社交功能的网站。以下模块旨在帮助用户在网络上构建社区。\n\
  \n##### 评论通知\n\n项目：`comment_notify`\n\n`评论通知` 让您的网站访客（包括登录用户和匿名用户）可以在发表评论时，请求接收后续评论的电子邮件通知。（该模块曾被推荐给\
  \ Drupal 创始人 Dries Buytaert，现已用于他的博客，并正被考虑纳入 Drupal 核心。这总是一个好兆头。）\n\n`评论通知` 需要核心\
  \ Token 模块（`drupal.org/project/token`）。如果所需模块存在但未启用，Drupal 会提示您启用它，如图 Figure 4-3\
  \ 所示。\n\n![images](img/0403.jpg)\n\n**图 4-3.** *Drupal 提示启用 Token 模块，该模块是评论通知模块的依赖项*\n\
  \n当 `评论通知` 启用后，它会立即开始工作。在 *管理* ![Image](img/U001.jpg) *配置* ![Image](img/U001.jpg)\
  \ *人员* ![Image](img/U001.jpg) *评论通知* (`admin/config/people/comment_notify`) 下，有一个设置页面，可以配置哪些内容类型可以有通知，是发送所有评论的通知还是仅回复自己评论的通知，默认设置是什么，甚至包括消息的格式。\n\
  \n##### 有机群组\n\n项目：`og`\n\n`有机群组` 提供了一种向 Drupal 添加社交活动的方式，允许用户或管理员在 Drupal 网站内创建自己的“群组”。每个群组可以设定自己的成员标准，并且可以使用您为网站定义的标准内容类型或您创建的自定义内容类型来为群组贡献内容。请参阅\
  \ 第 5 章 开始使用这套模块。\n\n##### 评分\n\n项目：`rate`\n\n`评分` 为节点和评论提供了一系列投票小部件，这些部件通过 Drupal\
  \ 7 的字段系统添加和排列。\n\n###### 依赖项：Voting API\n\n项目：`votingapi`\n\n`Voting API` 为模块提供了一套标准化的函数和数据库模式，用于存储、检索和统计投票。它是一项经过充分验证的投票和评级模块最佳实践。Fivestar\
  \ 模块（`fivestar`）是 Drupal 6 中使用 `Voting API` 的非常流行的模块，它也有 Drupal 7 版本。\n\n##### 用户积分\n\
  \n项目：`userpoints`\n\n`用户积分` 为您提供了一种方法，可以为在您的网站上执行特定操作（例如，发表评论或内容）的注册用户授予“积分”。\n\n\
  ##### 个人资料 2\n\n项目：`profile2`\n\n该模块旨在允许用户在您的网站上创建个性化资料，这些资料可以使用 Drupal 的字段 API\
  \ 进行定制。推荐使用此模块代替核心的 Profile 模块，Drupal 开发者曾试图将后者转换为使用字段，但最终不得不将其隐藏。\n\n##### 角色限制\n\
  \n项目：`role_limits`\n\n`角色限制` 允许您设定可拥有特定角色的用户数量上限。例如，如果您想限制特定群组可拥有的成员数量，或网站上可以被授予管理员或编辑角色的用户数量，这将非常有用。\n\
  \n#### 路径、搜索与 404 错误\n\n下一组模块有助于控制和扩展 Drupal 对搜索和 404 错误的处理。\n\n##### Apache Solr\n\
  \n项目：`apachesolr`\n\n`Apache Solr` 提供了远超 Drupal 核心搜索模块的内容搜索能力，但它并非单打独斗。`Apache Solr`\
  \ 是一个集成模块，意味着它使 Drupal 能够与外部应用程序协同工作。您无需编写任何代码即可使用它，但其设置过程比大多数模块复杂一些，这在 第 31 章 中有所介绍。\n\
  \n##### 搜索 404\n\n项目：`search404`\n\n该模块用针对未找到路径中的关键词进行的网站搜索，替换了毫无帮助的“文件未找到”页面。\n\
  \n![images](img/square.jpg) **警告** 当路径未找到时，执行搜索而非提供轻量级页面，可能会给服务器资源带来巨大压力。您应经常在 Drupal\
  \ 的 watchdog 日志中检查 404 错误（如果使用数据库日志模块，则在 `admin/reports/dblog` 查看；如果使用 Syslog 模块，则在服务器系统日志中查看）。如果存在应指向特定页面的常见错误\
  \ 404 路径，您应在服务器配置中设置这些页面的重定向，或者至少使用 Redirect 模块（该模块在 404 页面上提供了一个方便操作链接）。如果您经常注意到与网站无关的路径，您需要将其屏蔽，以免每次搜索路径时进行的大量工作消耗您的主机资源。目前尚未找到最佳方法，请参阅\
  \ `dgd7.org/fast404` 获取最新建议。\n\n##### 404 导航\n\n项目：`navigation404`\n\n这个较小的模块解决了一个\
  \ Drupal 网站中常见的简单但烦人的问题。`404 导航` 确保 Drupal 在“文件未找到”页面上保留您的网站导航菜单。如果您为文件未找到设置了备用页面，包括使用了\
  \ `搜索 404` 模块，则无需使用 `404 导航`。\n\n##### 全局重定向\n\n项目：`globalredirect`\n\n`全局重定向` 确保当人们访问您网站上的某个页面时，他们看到的是您最新、最漂亮的别名，而不是\
  \ Drupal 风格的内部路径或您的倒数第二个别名。启用 `全局重定向`，它就会开始工作：有一个配置页面，但在几乎所有情况下，默认设置都能很好地为您服务。\n\
  \n请注意，`全局重定向` 对于防止搜索引擎将多个路径解释为重复内容并非必需（Drupal 7 添加了规范链接标识符），并且它不适用于多语言网站和某些服务器配置。\n\
  \n#### 杂项\n\n如果没有一些难以归类的东西，那它就不是 Drupal：只要能想到，就能把它做成模块。\n\n##### 机器人\n\n项目：`bot`\n\
  \n`机器人` 模块运行一个 IRC 机器人。有关 IRC（Drupalistas 实时聊天的核心聚集地）以及由该模块驱动的 Druplicon 机器人的更多信息，请参阅\
  \ 第 9 章。\n\n##### OpenLayers\n\n项目：`openlayers`\n\n`OpenLayers` 使您能够将来自不同来源的地图与来自您的\
  \ Drupal 网站的数据相结合，创建令人惊叹的在线地图。\n\n\n\n### 这一切之美\n\n我们可以用有用的模块及其描述填满本书的剩余篇幅，但随着模块世界的不断演变，我们建议使用\
  \ `Drupal.org` 和网络上众多的博客。我们甚至还在本书的配套网站上建立了一个专门的论坛板块，列出了许多推荐模块及其描述，并附有通往其他网络资源的链接。\n\
  \n至此，希望你已经意识到用 `Drupal` 构建强大的网站是多么容易。大部分繁重的工作已经为你完成，而且有一个完整的社区理解分享的价值，这意味着即使你不是一名\
  \ `php` 开发者，也能实现更多目标。所以下次当有人问你 `Drupal` 能否做到某事时，开始搜索吧，也许你可以说：“有一个模块专门干这个！”\n\n![images](img/square.jpg)\n\
  **提示** 本章并不声称列出了最好的模块，也不是针对每种用途的模块，但鉴于本书的标题和人性，对于遗漏的内容必定会有*大量*激烈的观点！欢迎加入 `dgd7.org/modules`\
  \ 的讨论。\n\n## 使用 Organic Groups 创建社区网站\n\n**作者：Ed Carlevale**\n\n`Drupal` 的许多方面在未来几年将被视为革命性的，但这场革命（在很大程度上仍未被充分开发）与角色和权限设置中蕴含的力量有关。大多数网络平台提供两到三个角色，通常是用户、会员、管理员的一些变体，然后就完事了。当然，`Facebook`\
  \ 是个例外，它拥有出色的界面和好友类别的变体。`Facebook` 将其用户转变为管理员，将其访客转变为贡献者，这是一种连马克思和华尔街都会为之鼓掌的职责重新划分。\n\
  \n`Drupal` 可以做到同样的事情，甚至更多……而正是“更多”带来了问题。成百上千的选项与零个选项有很多共同点。然而，正是在这里，`Drupal` 中的群组构建提供了最强大的力量，而且是革命性的力量，因此我们将在部署\
  \ `Organic Groups 模块` 的基本步骤之后，再回到这个想法。\n\n启动并运行 `Organic Groups` 的步骤其实很基础。创建一个名为\
  \ `Group` 的内容类型，并用它在你的网站上创建任意数量的群组。然后创建其他内容类型，如 `Blog`、`Events` 和 `Aggregator`，以创建你发布到群组中的内容。接着添加成员，并为他们分配适当的角色，例如\
  \ `Group Manager`、`Administrator`。`Organic Groups` 的一个特点在于，其魔法主要在数据库内部运作。要在你的网站上显示成员、内容和群组之间的关系，需要借助其他模块的帮助，主要是第\
  \ 3 章中介绍的 `Views`，以及这里将要介绍的 `Panels`。`Views` 从数据库中选取并排序信息，而 `Panels` 允许你将其放置在页面上。`Blocks`\
  \ 和 `Regions` 也能做到同样的事情，但它们依赖于你的主题。`Panels` 让你摆脱主题的限制，从而能够以更强大、更灵活的方式选择和排列内容。\n\n\
  本章的练习涉及为老年人建立一个网站。任何曾尝试教父母电脑基础知识的人都知道，指令必须清晰，提问的机会要充足，耐心依然是一种美德。构建一个基于社区的网站也是如此。这项工作本质上是试图让其他人参与到你的群组中来。`Drupal`\
  \ 集强大、简单和古怪于一身的特点，可能会给新手带来障碍。因此，设计一个以简洁为目标的界面至关重要，网站资源如操作指南和视频也是如此。\n\n好消息是，`Drupal\
  \ 7` 最好的方面之一在于其对 `Drupal` 界面的改进。过去需要十次点击的操作，现在只需要一两次，开发网站也不再感觉像骑着弹簧单高跷去上班一样颠簸。\n\
  \n### 安装和配置 Organic Groups\n\n你将从一个全新的 `Drupal 7` 安装开始，然后随着本章的推进，下载并启用新的贡献模块。一开始你需要的是\
  \ `Organic Groups` 和 `Views` 模块。这两个模块各自又需要一个辅助模块——`Organic Groups` 需要 `Entity` 模块，`Views`\
  \ 需要 `CTools` 模块——所以我们也需要下载它们。为了安装这些模块，我们将使用 `Drupal 7` 新的自动化安装功能（`admin/modules/install`），并添加每个模块当前推荐的版本：\n\
  \n*   `Organic Groups` （`drupal.org/project/og`）\n*   `Entity` （`drupal.org/project/entity`）\n\
  *   `Views` （`drupal.org/project/views`）\n*   `CTools` （`drupal.org/project/ctools`）\n\
  \n![images](img/square.jpg)\n**注意** 本书编写时，`Drupal 7` 的 `Organic Groups` 仍处于主要开发阶段。本章将重点介绍基本功能，这些功能很可能保持不变。结尾部分将涉及未来版本中可能演变的功能。\n\
  \n`Organic Groups` 项目包含七个模块（见图 5-1）——在本章中，我们将使用除 `Migrate` 模块之外的所有模块，因此在一开始就将它们全部启用可能是最简单的做法。\n\
  \n![images](img/0501.jpg)\n***图 5-1**. Organic Groups 模块套件*\n\n![images](img/square.jpg)\n\
  **注意** 当你启用 `OG` 访问控制模块时，系统会提示你重建权限。点击“是”，以便 `Drupal` 系统可以执行此更新。\n\n你还需要启用 `OG Example`\
  \ 模块（见图 5-2）。该模块位于模块页面的“特性”部分。事实上，你也可以通过 `Features UI`（`structure/features`）来启用该模块。但如果你在模块页面进行操作，系统会提示你启用该示例所需的各种辅助模块（见图\
  \ 5-3）。\n\n![images](img/0502.jpg)\n***图 5–2**. OG Example 模块*\n\n![images](img/0503.jpg)\n\
  ***图 5–3**. OG Example 模块所需的辅助模块*\n\n\n\n### 组内容类型\n\n默认情况下，标准 Drupal 安装包含两种内容类型：文章和基本页面。当启用\
  \ OG 示例模块后，会增加两种内容类型：组和帖子（参见 图 5–4）。\n\n![images](img/0504.jpg)\n\n***图 5–4.** 启用\
  \ OG 示例模块后，新增了两种内容类型：组和帖子。*\n\n我们将使用“组”内容类型为网站创建群组，并使用“帖子”内容类型创建要发布到群组中的内容。现在打开“组”内容类型，以便调整其部分设置。进入“结构”![Image](img/U001.jpg)\
  \ →“内容类型”，然后选择“组”内容类型（`admin/structure/types/manage/group`）。进行以下更改：\n\n- 将标题字段标签改为“组名称”。\n\
  - 描述：“创建一个新群组。”\n- 发布选项：取消勾选“推送到首页”。\n- 显示设置：取消勾选此选项。\n- 评论设置：关闭。\n\n结果应类似于 图 5–5。\n\
  \n![images](img/0505.jpg)\n\n***图 5–5.** 组内容类型*\n\n请注意，当启用 OG 模块后，表单中添加了新的垂直选项卡“组”。此设置允许您将一种内容类型指定为群组、群组内容，或两者都不是。使用“组”内容类型创建的节点应为群组，因此单选按钮设置为“组类型”。保存修改后的表单。\n\
  \n接下来，再次打开“组”内容类型，这次在“管理字段”选项卡下，将“正文”标签改为“使命宣言”（参见 图 5–6）。正如任何励志演说家都会告诉你的那样，为任何事业定义明确的使命宣言是迈向成功的第一步。即使您不在网站上显示该字段的标签，了解这是我们要做的事情也有助于明确我们为添加到网站的每个群组所设定的目标。点击“编辑”，将标签从“正文”改为“使命宣言”。\n\
  \n![images](img/0506.jpg)\n\n***图 5–6.** 修改“组”内容类型的字段标签*\n\n接下来，点击“管理显示”选项卡进行最后一项调整。为了允许网站访客自行订阅群组，您需要启用“订阅”选项。通过将“组类型”的格式设置为“群组订阅”来实现此目的（参见\
  \ 图 5–7）。\n\n然后保存表单。\n\n![images](img/0507.jpg)\n\n***图 5–7.** “管理显示”选项卡。通过将“组类型”字段的显示方式修改为“群组订阅”，可以控制对群组的订阅。这会在每个群组页面放置一个“加入”链接。*\n\
  \n### 创建群组\n\n现在，我们将使用“组”内容类型为网站创建一些群组。点击快捷工具栏上的“添加内容”，会弹出网站上可用的内容类型。选择“组”（`node/add/group`）。我们将添加一个“iPad\
  \ 用户群组”，填写使命宣言，然后保存表单（参见 图 5–8）。\n\n![images](img/0508.jpg)\n\n***图 5–8.** iPad\
  \ 用户群组首页*\n\n群组首页已添加一个新的“组”选项卡，拥有相应权限的用户可以看到该选项卡，同时会显示消息“你是群组管理员”。非群组成员和管理员则会看到“申请加入群组”链接。“组”选项卡允许群组管理员添加成员并修改角色和权限。我们稍后会处理这些选项。\n\
  \n但基本上，这里的页面设计并不多，这也是需要借助 Views 和 Panels 模块的原因。\n\n### 在 Organic Groups 中使用 Views\n\
  \nOG 模块包含四个内置视图（参见 图 5–9），它们可以帮助您入门。\n\n![images](img/0509.jpg)\n\n***图 5–9**. OG\
  \ 模块包含的四个默认视图*\n\nOG 列表将用作群组着陆页，因此请打开该视图并进行一些调整。开箱即用时，该页面视图有一个路径（`group-list`）但没有菜单（参见\
  \ 图 5–10），而您希望从主菜单访问此页面。因此，请向主菜单添加一个菜单项。\n\n![images](img/0510.jpg)\n\n***图 5–10**.\
  \ 群组列表视图*\n\n点击“页面设置”下的菜单链接，向主菜单添加一个名为“群组”的菜单项。点击保存视图。现在，您就有了一个“群组”选项卡和一个基础版的群组着陆页（参见\
  \ 图 5–11）。\n\n![images](img/0511.jpg)\n\n***图 5–11**. 群组着陆页*\n\n其他视图会创建显示群组成员和群组内容的区块，因此您需要先向群组添加一些内容和成员，这些视图才能发挥作用。\n\
  \n### 创建群组内容\n\n为了向群组添加一些内容，您需要创建可用于创建要发布到群组中的节点的内容类型。您可以简单地使用 OG 示例模块附带的“帖子”内容类型。但这里我们选择启用\
  \ Drupal 自带的博客模块（参见 图 5–12），方法是进入模块页面（`admin/modules`）。\n\n![images](img/0512.jpg)\n\
  \n***图 5–12**. 启用博客模块*\n\n启用后，打开“博客”内容类型（`admin/structure/types/manage/blog`），并将此内容类型指定为群组内容类型（参见\
  \ 图 5–13）。这意味着当您使用此内容类型创建内容时，您可以选择将该内容发布到网站上的任何群组中。\n\n![images](img/0513.jpg)\n\
  \n***图 5–13**. 将博客条目指定为群组内容*\n\n不知为何，我觉得高尔夫爱好者比 iPad 初学者更有可能写博客，因此我创建了一个新群组（`node/add/group`）——“小鸟球”高尔夫球友会，并创建了一条博客条目（`node/add/blog`）发布到该群组中（参见\
  \ 图 5–14）。\n\n![images](img/0514.jpg)\n\n***图 5–14**. 当一种内容类型被指定为“群组内容”后，节点创建表单上会添加一个“群组受众”下拉菜单，允许用户将内容发布到一个或多个群组中。*\n\
  \n![images](img/0515.jpg)\n\n***图 5–15**. 发布到“小鸟球”高尔夫球友会的博客文章*\n\n群组内容上会添加一个群组链接（参见\
  \ 图 5–15）。但群组内容和群组着陆页（参见 图 5–16）看起来仍然有些简陋，因此您现在需要启用 Panels 模块来辅助布局。\n\n![images](img/0516.jpg)\n\
  \n***图 5–16.** “小鸟球”高尔夫球友会首页*\n\n\n\n### Panels 入门\n\n当您启用 OG 示例模块时，就已经启用了 Panels\
  \ 及其辅助模块。现在您需要启用面板本身。请前往 结构 ![Image](img/U001.jpg) 页面 (`admin/structure/pages`)，并启用控制节点模板的面板（图\
  \ 5–17）。\n\n![images](img/0517.jpg)\n\n***图 5–17**. 启用 OG 模块中包含的 Panels 示例*\n\n\
  启用的面板会立即接管您群组首页的布局（参见图 5–18）。除了群组使命陈述外，群组首页现在还会显示三个与群组相关的元素：\n\n*   群组内容，以摘要格式显示\n\
  *   用于添加新内容并将其发布到当前群组的上下文链接\n*   群组成员列表\n\n![images](img/0518.jpg)\n\n***图 5–18**.\
  \ 使用 Panels 提供的布局显示的群组首页*\n\n如果您点击“编辑面板”链接，将进入面板的管理界面（参见图 5–19）。左侧的垂直菜单提供了指向面板管理界面不同部分的链接。\n\
  \n![images](img/0519.jpg)\n\n***图 5–19.** OG 示例面板的设置摘要*\n\n关键的设置有“选择”（决定面板激活的条件）和“布局”（决定使用单列、双列还是三列布局，以及显示哪些内容）。OG\
  \ 示例面板的默认设置包括：\n\n*   **选择**: 面板将对所有群组节点激活（参见图 5–20）。\n*   **布局**: 选择了三列布局（参见图 5–21）。\n\
  *   **内容**: （参见图 5–22）。\n\n![images](img/0520.jpg)\n\n***图 5–20**. 显示选择设置。面板将用于所有群组节点。*\n\
  \n![images](img/0521.jpg)\n\n***图 5–21**. 显示模板布局。选择了双列堆叠布局。*\n\n![images](img/0522.jpg)\n\
  \n***图 5–22**. 面板内容*\n\n对 Panels 的全面讨论超出了本章的范围，但 OG 示例面板提供的快速入门是这个强大模块的一个实用介绍。更多信息，包括视频和教程，请参见\
  \ Panels 3 文档页面 (`drupal.org/node/496278`)。\n\n### 成员、角色和权限\n\n在很大程度上，与群组成员管理相关的功能反映了\
  \ Drupal 本身，区别在于这些设置是在逐个群组的基础上进行的。一旦创建了新角色（`admin/config/group/roles`，参见图 5–23），就可以为该角色设置特定于群组的权限（`admin/config/group/permissions`，参见图\
  \ 5–24）。\n\n![images](img/0523.jpg)\n\n***图 5–23**. 与群组相关的角色*\n\n![images](img/0524.jpg)\n\
  \n***图 5–24**. 与群组相关的权限*\n\n适用于 Drupal 7 的 Organic Groups 仍在积极开发中，将继续演进，因此强烈建议关注该模块的问题队列（`drupal.org/project/og`）。\n\
  \n### 总结\n\n在本章中，我介绍了在 Drupal 7 中构建基于群组的网站的基础知识，包括在后端部署 Organic Groups 模块来创建群组和群组内容，以及建立群组、内容和用户之间的关系。然后，我展示了如何启用\
  \ Views 和 Panels 模块来组织页面上的内容和调整其位置。用户体验是构建成功的用户驱动型网站的关键，我涉及了一些关键问题，包括角色和权限。\n\n\
  ## 第 6 章\n\n![images](img/squ.jpg)\n\n## Drupal 中的安全性\n\n**作者：Stéphane Corlosquet**\n\
  \n> *“安全是一个过程，而非一个产品。产品提供一些保护，但在这个不安全的世界上有效开展业务的唯一方法是建立能够认识到产品固有安全风险的流程。”*\n> \n\
  > —布鲁斯·施奈尔\n\n互联网上充斥着试图破坏或摧毁你的网站、损害你的品牌、瘫痪你的社区或窃取机密数据的垃圾邮件发送者和黑客。无论你是网站管理员、模块开发者、主题制作者、系统管理员还是用户，在管理网站或编写代码时，你都应该牢记安全性。如果你不遵循一些简单的规则和最佳实践，你可能会将自己或他人的网站置于危险之中。幸运的是，在这种情况下你并非孤立无援，Drupal\
  \ 社区已经开发了一套可靠的流程，帮助你在处理安全问题时避免严重的麻烦。\n\n### 搭建安全的 Drupal 站点\n\n让我们从好消息开始：Drupal\
  \ 在开箱时就已配置为安全的！这是因为其默认采用了相当保守的设置。你很可能需要更改这些设置，以根据自己的需求扩展和调整网站，而这时就存在为不速之客破坏网站打开方便之门的风向。不过，你并非独自面对：凭借其改进的用户界面，Drupal\
  \ 7 会在某项设置可能对安全产生影响时向你发出警告。但是，不要仅仅依赖于此；运用常识，继续阅读以了解 Drupal 站点配置不当的常见陷阱。\n\n####\
  \ 使用强密码\n\n这条建议同样适用于任何使用密码进行身份验证的系统：你必须使用强密码（参见图 6–1）。任何知道你密码的人都可以登录并在网站上执行潜在的破坏性操作。对于用户\
  \ id 为 1 的账户或任何具有高权限的账户尤其如此。\n\n![images](img/0601.jpg)\n\n***图 6–1.** 使用强密码保护你的用户账户安全。*\n\
  \n但什么构成强密码呢？\n\n[`www.baekdal.com/tips/password-security-usability`](http://www.baekdal.com/tips/password-security-usability)\
  \ 上的文章表明，包含三个常见单词的密码比常规的单单词密码安全十倍。（顺便一提，Drupal 的密码可以包含空格。）\n\n同样重要的是，不要与任何人分享你的密码。同样，不要为网站管理和审核目的创建在用户间共享的账户。如果一组用户需要在网站上执行类似操作，请为每个用户创建一个账户，并授予他们相同的角色；这将使追踪谁做了什么变得更加容易。\n\
  \n你的账户还会关联到一个电子邮件地址。趁此机会，请确保你信任你的电子邮件提供商，并且在那里也使用了强密码；如果你的电子邮件账户被攻破，你的 Drupal 账户密码可能在几秒钟内被重置，从而破坏你为创建强密码所做的努力。\n\
  \n#### 保留用户 1 仅供管理目的使用\n\n在安装过程中创建的第一个用户始终被授权在网站上执行所有操作。因此，最佳实践是将此用户不作为个人的账户，而是作为一个超级用户或超级管理员账户。（Drupal\
  \ 要求账户电子邮件地址是唯一的，所以如果你只有一个电子邮件地址，最好将第一个账户设为你的个人账户，而不是使用一个错误的电子邮件地址。但请注意，一些电子邮件服务允许你使用变体地址：例如，[example@gmail.com](http://example@gmail.com)\
  \ 会收到发送至 [example+site1@gmail.com](http://example+site1@gmail.com) 的电子邮件，并且 Drupal\
  \ 会将后者视为一个独立的地址。）\n\n![images](img/square.jpg) **注意** 在 Drupal 6 中，有时需要共享 uid 1\
  \ 密码才能在不编辑 `settings.php` 的情况下运行 `update.php`，但在 Drupal 7 中已不再需要，因为运行 `update.php`\
  \ 的能力现在是基于角色的。\n\n\n\n#### 分配权限时务必谨慎\n\n每个用户可被赋予一组角色，而每个角色包含一组权限。有些权限相当无害，例如`View\
  \ published content`，但其他权限可能带来严重后果。通常，以\"Administer\"开头的权限应仅授予高度信任的用户。其他权限，如`Bypass\
  \ content access control`，可赋予查看、编辑和删除任意内容的能力：若将其授予粗心的用户，可能导致信息丢失。Drupal 7 会高亮显示这些权限，并附上警告，提示仅应授予受信任用户，如图\
  \ 6–2 所示。\n\n![images](img/0602.jpg)\n\n**图 6–2.** 某些权限存在安全隐患，应谨慎授予。\n\n请注意，`Authenticated\
  \ User`角色会被赋予任何能够登录你网站的用户——除非其账户已被封禁。默认情况下，Drupal 配置为要求新账户需管理员批准，但如果你已在`admin/config/people/accounts`更改此设置，允许访客无需批准即可注册账户，则应审查`Authenticated\
  \ User`角色所拥有的权限，并确保它们都是安全的。若不这样做，可能导致意外后果，例如由于`Post comments`和`Skip comment approval`权限默认都授予了`Authenticated\
  \ User`，现有节点上可能会涌入大量垃圾评论。\n\n#### 保持文本格式安全严格\n\n用户输入是危险的，绝不应被信任。除了少数地方（如电子邮件地址）会在输入时验证用户数据外，Drupal\
  \ 在输出时会对用户提交的数据进行清理。这样做的好处是保留用户输入数据，以便根据渲染上下文进行适当的转义。关于此设计选择的深入解释，请参阅 Steven Wittens\
  \ 在`acko.net/blog/safe-string-theory-for-the-web`发表的优秀文章《Web 安全字符串理论》。因此，未能转义任何用户提交的数据都可能导致最常见的\
  \ Web 应用程序漏洞之一：跨站脚本攻击（XSS）¹。例如，当用户在文本字段（如节点的正文）中提交内容并显示时，Drupal 会使用文本格式。每种文本格式都包含一组过滤器，这些过滤器会对内容进行转义，使其能在特定上下文中安全显示。默认情况下，文本格式`Filtered\
  \ HTML`和`Plain Text`是安全的，因此它们可供匿名用户和认证用户使用。如果你更改了这些文本格式的设置，请务必谨慎；配置不当可能导致它们变得不安全。`Security\
  \ Review`模块²能轻松检查文本格式配置。\n\n_________\n\n¹ Wikipedia，“跨站脚本攻击”，[`http://en.wikipedia.org/wiki/Cross-site_scripting`](http://en.wikipedia.org/wiki/Cross-site_scripting)，2011。\n\
  \n² [`http://drupal.org/project/security_review`](http://drupal.org/project/security_review)\n\
  \n#### 避免使用 PHP Filter 模块\n\n虽然能够直接在 Drupal 网页界面中编写 PHP 代码而无需创建模块很方便，但这也非常危险！所有\
  \ PHP 代码都应以模块或主题的形式存在。在 Drupal 的网页界面中编写 PHP 代码是个坏主意，原因如下：\n\n- 编辑和调试不友好（没有语法高亮和适当的错误报告）。\n\
  - 使代码审查变得困难，且无法进行版本控制。\n- 受信任的用户可能会因格式错误的 PHP 代码而无意中损坏你的站点。\n- 如果你的网站遭到入侵，黑客可以使用精心构造的\
  \ PHP 代码渗透并破坏你的服务器。关闭`PHP Filter`模块（甚至最好从文件系统中彻底删除它）有助于将此类入侵限制在仅影响 Drupal 层面。\n\
  - 就性能而言，将 PHP 代码存储在数据库中将阻止任何操作码缓存机制对这段代码生效。\n\n请注意，某些贡献模块可能提供与`PHP Filter`模块类似的功能；它们也会遭受上述相同的缺陷。同时，使用来自`drupal.org`或其他地方的\
  \ PHP 代码片段时要格外小心：确保你理解它们的作用以及它们会如何影响你的站点。许多此类代码片段并未从安全角度进行审查，可能会使你的网站暴露于漏洞之中。代码片段通常也比模块中的代码可靠性更低。\n\
  \n### 安全流程\n\n作为网站管理员，安全不仅仅是在搭建网站时才需要考虑的事情。Drupal 核心项目维护者能做的只是发布软件时确保其没有已知安全漏洞。然而，这并不能保证未来永远不会出现安全问题。网络上的事物变化迅速，新的安全漏洞和技术不断被发现。它们可能并非\
  \ Drupal 特有，而是可能影响任何基于 Web 的系统。\n\nDrupal 安全团队由一群志愿者组成，他们致力于通过帮助网站管理员和开发者了解如何避免站点及代码中的安全问题来维护\
  \ Drupal 的安全。Drupal 安全团队的首要目标是帮助解决 Drupal 核心和贡献模块中的安全问题。所有报告给安全团队的问题首先会与报告者和项目维护者进行私下讨论，直到找到解决方案并在代码仓库中完成修复。安全团队通常会在周三发布周期性的安全公告（SA）。每个\
  \ SA 都有一个唯一的 ID，包含其类型和年份。共有三种类型的公告：\n\n- **Drupal 核心安全公告**（例如`SA-CORE-2010-002`）是最重要的公告类型，因为它们关系到每一个\
  \ Drupal 站点。强烈建议进行更新。\n- **贡献项目安全公告**（例如`SA-CONTRIB-2010-015`）是安全团队发布数量最多的公告类型。每份公告涉及特定的贡献项目（或有时涉及多个项目），站点维护者应仔细评估他们所维护的站点是否受到影响，并进行适当更新。\n\
  - **公共服务公告**（例如`PSA-2011-001`）旨在教育社区，包含一般性的安全相关信息，例如安全策略变更、近期威胁或社交工程攻击——这些攻击不影响特定模块，但都与站点管理员和开发者相关。\n\
  \n安全公告和通知通过以下渠道公开发布：\n\n- `Drupal.org` 安全公告列表，位于`drupal.org/security`\n- 各列表的 RSS\
  \ 源：\n  - 核心：`drupal.org/security/rss.xml`\n  - 贡献：`drupal.org/security/contrib/rss.xml`\n\
  \  - 公共服务公告：`drupal.org/security/psa/rss.xml`\n- 通过“安全公告”邮件列表发送电子邮件；包含所有三种类型的公告。你可以在`drupal.org`编辑个人资料时，在“我的新闻通讯”选项卡中订阅。\n\
  - Twitter：`twitter.com/drupalsecurity`\n\n所有安全公告都包含解决当前安全漏洞的步骤。大多数情况下，会提供一个指向安全版本的链接，供网站管理员更新其站点。在极少数情况下，当项目维护者不响应或无法修复问题时，安全团队可能会建议关闭特定模块。PSA\
  \ 则包含关于安全最佳实践的更一般性建议。\n\n\n\n#### 选择模块和主题：贡献项目的安全性如何？\n\nDrupal 核心中的每一行代码在提交到代码库之前都要经过严格的同行评审流程；即使在提交之后，由于开源软件的特性，这些代码也会持续受到数百名贡献者的审计。`drupal.org`\
  \ 上免费提供了数千个贡献项目。Drupal 社区试图在保持新贡献者的低准入门槛与接受干净、安全的代码之间找到平衡，但不断增长的社区以及仅有少数志愿者在代码质量方面进行监控，使得这项任务变得非常困难。结果是贡献项目领域中的代码质量参差不齐。然而，`Drupal.org`\
  \ 上的代码比 `Drupal.org` 之外其他地方找到的代码更有可能具有更高的质量，因为社区往往对 `Drupal.org` 上的代码审查得比任何其他地方都更严格。\n\
  \n作为一位正在考虑在您的网站上安装模块或主题的站点管理员，您有责任从安全角度评估项目的质量。无论是安装过程中还是后来因安全漏洞造成的任何损害，Drupal 社区和项目维护者均不承担责任。\n\
  \n评估项目的价值是一项有些主观的任务。下一节中的每个标准单独来看都不能给你完整的画面；希望结合使用它们，您将能够为您的站点在选择贡献项目时做出明智的决定。\n\
  \n#### 项目主页\n\n项目主页包含大量有用的信息来评估项目的健康状况。这些元素将有助于您的评估。贡献项目页面的一个例子是 `drupal.org/project/views`。图\
  \ 6–3 和 6–4 对比了一个被放弃的项目和一个维护良好的项目。\n\n- **维护者的声誉如何？** 您可以在项目页面的右侧找到维护者列表及其活动情况。如果您不认识某个维护者，可以在\
  \ `drupal.org` 上查看他的个人资料，了解他在社区的参与情况；他可能维护着您知道或使用的其他模块。如果该项目有一位近期活动频繁的知名维护者，这是个好迹象。\n\
  - **模块开发的活跃度如何？** 该模块是否已被放弃或正在寻找新的维护者？此信息可在项目描述页面上找到（参见图 6–3 中一个被放弃且过时的模块示例）。属于这些类别的模块未来不太可能得到任何关注，并且可能包含安全漏洞。尽管\
  \ Drupal 安全团队通常会在已知包含安全漏洞的被放弃项目的描述中添加警告信息，但缺少此类信息并不意味着使用被放弃的项目是安全的。\n- **流行度：**\
  \ 查看图 6–4 中“项目信息”部分显示有多少网站报告使用了某个项目。使用某个项目的网站越多，它越有可能已经经过审查并且值得信赖。\n\n  ![images](img/0603.jpg)\n\
  \n  **图 6–3.** 一个被放弃项目的项目信息部分\n\n  ![images](img/0604.jpg)\n\n  **图 6–4.** 一个维护良好的项目的项目信息部分\n\
  \n- **发布版本：** 避免在生产网站上使用开发版。如果您的 Drupal 版本有稳定版，请选择稳定版。不稳定版、Alpha 版、Beta 版或候选发布版可能包含安全漏洞，这些漏洞通常会被公开讨论。如果您决定在您的网站上使用此类模块，请务必了解这些漏洞是什么，并采取正确的措施来保护您的站点。\n\
  - **该项目是否有已知的安全漏洞？** 位于每个项目主页右侧的“问题”板块显示了关于该问题及错误报告的统计数据（参见图 6–5）。点击未解决问题的数量，可以查看详尽的问题列表，如图\
  \ 6–6 所示。\n- **检查问题队列，查看截至目前报告了哪些未解决的突出问题，以及其中是否有安全问题。** 查看问题队列中的“最后更新”列，可以让您了解项目开发的活跃程度（参见图\
  \ 6–6）。看到状态为“已修复”的问题，是项目维护良好的有力证明。您可能需要使用问题列表顶部的筛选器，将搜索范围缩小到模块的特定版本或特定类型的问题，例如错误报告。\n\
  \n![images](img/0605.jpg)\n\n**图 6–5.** 点击未解决问题的数量以浏览问题队列\n\n![images](img/0606.jpg)\n\
  \n**图 6–6.** 活跃的问题队列是健康模块的标志。\n\n#### 安全代码审查\n\n如果您找到了一个符合您需求但对其安全级别有疑虑的贡献项目，该怎么办？它可能尚未达到稳定发布版本，或者您所在部门可能要求任何代码在使用前都必须经过安全审查。\n\
  \n如果您是开发者，`Coder`^(3) 和 `Secure Code Review`^(4) 模块将极大地帮助您识别不符合 Drupal 安全标准的代码片段。虽然这些模块对于进行安全审查的第一遍检查相当不错，但它们不能保证模块是安全的，也不能替代安全专家的眼睛。\n\
  \n如果您更愿意聘请熟练的顾问来进行代码审查，有几家 Drupal 公司专门从事这一专业领域，其中最著名的是由 Greg Knaddison 和 Ben Jeavons（两人均为\
  \ Drupal 安全团队成员）运营的 Drupal Scout (`drupalscout.com`)。\n\n\n\n#### 保持你的代码库最新\n\n\
  正确配置 Drupal 只是迈向一个安全 Drupal 站点的第一步。像 Drupal 这样的动态 Web 应用，在互联网上不能不加维护，因为每天都有新的威胁和漏洞被发现。认为一旦构建好一个站点并将其推送到生产环境后，就可以置之不理而不必担心，这是一个错误的想法。就像你监控服务器性能或维护软件堆栈一样，你也需要运行最新版本的\
  \ Drupal 核心及其贡献模块。幸运的是，Drupal 社区拥有非常好的基础设施，可以帮助站点管理员了解何时需要更新某个模块。\n\nDrupal 核心自带了更新管理器模块，当你的已安装模块有新的安全版本可用时，它会向你发出警告。你会在管理区域看到一条红色的警告消息，提示你更新模块。默认情况下，也会配置电子邮件通知。你可以在“管理”![图像](img/U001.jpg)“报告”![图像](img/U001.jpg)“可用更新”（`admin/reports/updates`）页面查看可用更新列表。任何安全更新都会以红色背景显示，如图\
  \ 6–7 所示。\n\n______\n\n³ [`http://drupal.org/project/coder`](http://drupal.org/project/coder)\n\
  \n⁴ [`http://drupal.org/project/secure_code_review`](http://drupal.org/project/secure_code_review)\n\
  \n![images](img/0607.jpg)\n\n**图 6–7.** 更新管理器模块会显示已安装模块和主题的可用更新。我们强烈建议你更新任何有安全更新的模块。\n\
  \n使用 Drupal 提供的工具更新模块或主题非常容易。核心的更新管理器模块允许你通过 Web 界面更新任何模块。你也可以使用 `Drush`⁵ 或通过从项目下载链接下载压缩包或使用\
  \ git 来手动更新代码。有关如何更新 Drupal 的更详细信息，请参阅第 7 章。\n\n#### 编写安全代码\n\nDrupal 为模块和主题开发者提供了出色的\
  \ API。只要正确使用这些 API，即使对安全性知之甚少，编写安全的 Drupal 代码也很容易。然而，还是有一些基本规则需要牢记。第一条规则是尽可能多地使用\
  \ Drupal 的 API，并正确使用它们，即使它们看起来不合理；通常使用它们是有原因的。以下是一些例子：\n\n______\n\n⁵ Drupal, “Drush,”\
  \ [`http://drupal.org/project/drush`](http://drupal.org/project/drush)`, 2011.`\n\
  \n*   *当显示链接时*，通过拼接 `<a>` 和 `href` 元素来构建 HTML 字符串可能更直观，但如果输入不可信，这可能会引入跨站脚本漏洞。通过使用链接函数\
  \ `l()`⁶，你可以省去一些麻烦，因为 Drupal 会为你处理适当的转义，并过滤恶意协议。\n*   *表单 API*：你绝不应直接使用 `$_POST`\
  \ 变量中的数据，而应依赖表单 API 的验证和提交函数，这些函数可以防止跨站请求伪造⁷。\n*   *数据库 API*：在编写 SQL 查询时，很容易将 PHP\
  \ 变量直接用于 SQL 查询中。这可能会造成 SQL 注入⁸，而通过正确使用数据库 API⁹ 可以避免这种情况。\n\n还有许多其他例子表明 Drupal 框架可以防止安全漏洞。以下是一些对愿意了解更多关于\
  \ Drupal 安全性的开发者有用的资源列表：\n\n*   出版物：\n    *   Drupal 安全团队成员 Greg Knaddison 撰写了唯一一本深入探讨\
  \ Drupal 安全性的书：*Cracking Drupal: A Drop in the Bucket*（Wiley, 2009），`crackingdrupal.com`\n\
  \    *   *The Drupal Security Report* 由 Ben Jeavons 和 Greg Knaddison 编写。对于决策者以及有兴趣了解\
  \ Drupal 过去如何处理安全问题的用户来说，这是一份有用的文档。`drupalsecurityreport.org`\n*   在线资源：\n    *\
  \   在 `api.drupal.org` 上熟悉 Drupal 的 API，所有 Drupal 函数和 API 都有文档记录。安全说明也包括在相关位置。\n\
  \    *   *Develop for Drupal* 手册在 `drupal.org/documentation/develop` 提供了有关如何利用 Drupal\
  \ API 的更宏观视角。\n    *   *Develop for Drupal* 手册的“编写安全代码”部分在 `drupal.org/writing-secure-code`\
  \ 提供了一系列带有代码片段的示例，说明如何以安全的方式使用 Drupal API。\n*   安全博客：\n    *   Drupal 安全团队负责人 Heine\
  \ Deelstra 在 `heine.familiedeelstra.com` 上撰写关于 Drupal 安全性的博客。\n    *   Greg Knaddison\
  \ 和 Ben Jeavons 在 `crackingdrupal.com/blog` 上撰写关于安全性的文章。\n    *   DrupalScout 正在\
  \ `drupalscout.com/knowledge-base` 构建一个安全知识库。\n\n______\n\n⁶ Drupal, “common.inc,”\
  \ [`http://api.drupal.org/api/function/l/7`](http://api.drupal.org/api/function/l/7)`,\
  \ 2011.`\n\n⁷ Wikipedia, “Cross-site request forgery,” [`http://en.wikipedia.org/wiki/Cross-site_request_forgery`](http://en.wikipedia.org/wiki/Cross-site_request_forgery)`,\
  \ 2011`.\n\n⁸ Wikipedia, “SQL injection,” [`http://en.wikipedia.org/wiki/SQL_injection`](http://en.wikipedia.org/wiki/SQL_injection)`,\
  \ 2011`\n\n⁹ Drupal, “Database API,” [`http://drupal.org/developing/api/database`](http://drupal.org/developing/api/database)`,\
  \ 2011.`\n\n#### 处理安全问题\n\nDrupal 安全团队有一套处理在 `drupal.org` 上托管的贡献项目中发现的安全问题的流程。作为一名开发者，如果你遇到一段看起来包含安全漏洞的代码，你应该知道如何处理这种情况。\n\
  \n\n\n#### 你在 Drupal 核心或贡献项目中发现了问题\n\n本节详细介绍了处理流程，但请注意，该流程将来可能会发生变化。请查看 `drupal.org/security-advisory-policy`\
  \ 以获取关于 Drupal 安全策略的最新信息。\n\n首先，确保代码托管在 `drupal.org` 上；Drupal 安全团队不处理托管在其他地方的代码。其次，如果有问题的代码尚未作为稳定版本的一部分发布（即它位于开发快照、Alpha、Beta\
  \ 或候选发布版本中），我们鼓励你在问题队列中公开讨论此问题。如果该代码已作为稳定版本（例如 `7.x-1.2`）的一部分发布，则不应公开讨论此漏洞，除非利用该漏洞需要以下权限之一：\n\
  \n- `Administer filters`\n- `Administer users`\n- `Administer permissions`\n- `Administer\
  \ content types`\n- `Administer site configuration`\n- `Administer views`\n\n拥有以上任何权限的用户已经可以对网站造成很大损害，因此预期只有受信任的用户才会被授予这些权限，所以公开讨论这类问题是允许的。请查看\
  \ `drupal.org/security-advisory-policy` 以获取当前策略，该策略可能会随时间变化。\n\n在任何其他情况下，不要公开讨论你的发现，而是通过电子邮件联系安全团队：`security@drupal.org`，并详细说明如何重现该问题以及你正在使用的\
  \ Drupal 核心、模块和主题的版本。安全团队将调查该问题，并与项目维护者合作创建修复程序、修补代码、发布版本并宣布发布。你将在关于此问题的任何公告中获得署名。在撰写本文时，问题应通过电子邮件报告给安全团队；但这种情况将来可能会改变，因此请查看\
  \ `drupal.org/node/101494` 以获取关于如何向安全团队报告问题的最新信息。确保订阅安全邮件列表，以便收到任何变更的通知（请参阅“安全流程”部分的开头）。\n\
  \n#### 修复项目中的安全问题\n\n如果你在自己的项目中发现了漏洞，请在采取任何行动之前联系安全团队。如果安全团队收到关于你项目中某个漏洞的报告，你会通过电子邮件私下收到通知。作为项目维护者，你有责任与安全团队合作，在修复程序公开可用之前对漏洞保密。你将被邀请发送修复该问题的补丁，以便安全团队进行审查并可能提出更好的解决方案。当补丁准备就绪并得到安全团队批准后，将选定一个日期来提交补丁并发布安全版本。你将被要求帮助为你的项目起草一份安全公告，该公告将在安全版本发布当天发送。安全版本通常发生在星期三。你将被邀请在约定发布日期前\
  \ 24 小时内提交补丁并将修复推送到 `drupal.org` 仓库。然后，你将能够为所有受漏洞影响的分支创建新版本，并将其标记为 “`Security update`”，如图\
  \ 6–8 所示。将发布的链接发送给安全团队，以便他们将其添加到安全公告中。这些版本将保持未发布状态，直到安全团队发布它们并同时发送安全公告。\n\n![images](img/0608.jpg)\n\
  \n**图 6–8.** `drupal.org` 上的创建项目发布表单。如果发布包含安全修复，请确保将其标记为 “`Security update`”。此时，你应该已经联系了安全团队！\n\
  \n任何在你的模块问题队列中公开报告的问题，只要不是出现在稳定版本中，都可以在你方便的时候修复。新的发布可以标记为 “`Security update`”，如图\
  \ 6–8 所示，但你需要联系安全团队才能使其发布。\n\n### 总结\n\n在本章中，你学习了保持 Drupal 站点安全的安全流程，以及如何利用 Drupal\
  \ 社区建立的、帮助站点维护者保持其代码库安全的基础设施。你还了解到 Drupal 提供的 API 使模块开发者和主题制作者能够轻松编写安全的代码。试试看吧！\n\
  \n## 第七章\n\n![images](img/squ.jpg)\n\n"
- "# 更新 Drupal\n\n**作者：Benjamin Melançon**\n\n> *“人性的另一个缺点是，每个人都想建造，却没有人愿意维护。”*\n\
  > \n> ——小库尔特·冯内古特\n\n更新 Drupal 7 意味着停留在 Drupal 7 *内部*。这被称为次要版本更新。在 Drupal 核心中，像\
  \ Drupal 7 版本的第二次和第三次更新这样的次要更新的版本号看起来像 `7.2` 到 `7.3`。在贡献模块中，对于次要更新，例如 Drupal 7 模块第二个版本的第十一次和第十二次更新，版本号看起来像\
  \ `7.x-2.11` 到 `7.x-2.12`。（Drupal 版本号没有前导零，这可能会令人困惑。请记住顺序是 `7.1`、`7.2`、... `7.8`、`7.9`、`7.10`、`7.11`。）\n\
  \n次要版本更新和主要版本升级之间存在巨大差异。主要版本升级（例如从 Drupal 6 到 Drupal 7）将需要将所有模块替换为与 Drupal 7 核心兼容的版本；你的自定义主题和自定义代码将需要更改；并且需要大量工作才能使一个复杂的网站再次正常运行。在本章中，你无需担心这些。当将\
  \ Drupal 核心从 `7.x` 更新到更高的 `7.x` 时，API 中不应有任何破坏。所有模块和主题应继续工作，无需重新配置任何内容。如果你需要将 Drupal\
  \ 6 站点升级到 Drupal 7，附录 A 将帮助你入门。\n\n\n\n### 为何更新\n\n保持 Drupal 核心版本更新不仅简单，而且至关重要。首先，这对你网站的安全性至关重要。其次，错误修复和其他改进也会整合到当前版本中。\n\
  \n顺便提一句，Drupal 的安全记录非常出色。通常，Drupal 的安全漏洞首先由安全团队（`drupal.org/security-team`）或其他友好的\
  \ Drupalistas 发现——而非在被恶意利用后才修复。然而，一旦安全漏洞被确认并发布 Drupal 更新版本，任何怀有恶意的人都能轻易阅读安全公告并利用该漏洞。这就是为什么你必须保持网站更新的原因。\n\
  \n值得注意的是，在 Drupal 版本更新过程中修复的大多数安全漏洞，对于配置得当的网站来说可能并不重要；要利用这些漏洞，你必须给予不受信任的用户过多权限。第\
  \ 6 章 涵盖了 Drupal 出色的安全特性以及其他确保网站安全的方法。\n\n![images](img/square.jpg) **提示** 除了易于操作和重要性之外，更新\
  \ Drupal 核心这件事却很少被完成。向世界展示你精通此道，并让你所有网站都运行在 Drupal 7 的最新安全版本上。\n\n只要社区继续支持 Drupal\
  \ 7（官方支持将持续到 Drupal 9 发布），Drupal 7 核心的新版本和次要版本更新就会持续发布。\n\n![images](img/square.jpg)\
  \ **注意** 在`drupal.org`上，只有当前版本和上一个版本会获得错误修复和安全更新支持，但这并不妨碍社区中的其他人提供更多支持。Openflows\
  \ 社区技术实验室就做了这样的事：[`http://openflows.com/drupal/security`](http://openflows.com/drupal/security)\
  \ 提供了向后移植到 Drupal 旧主要版本的适用安全更新。\n\n本章介绍了在次要版本更新之间更新核心的三种方法。首先，你将了解 Drupal 核心本身描述的*手动*更新流程。其次，你将了解用于更新\
  \ Drupal 核心的 Drush 命令。最后（也许是最不重要的），你将了解我偏好的方法——通过 shell 脚本创建`diff`并将其作为补丁应用。如果你希望对\
  \ Drupal 核心进行已知修改并希望保留（这并不一定意味着你修改了核心；例如，`.htaccess` 文件是允许被合理修改的），那么后一种方法效果最佳。如果核心存在已知或未知的修改，并且你需要确保移除这些修改，第一种方法是必要的，而且通常也是最为可靠的方法。\n\
  \n无论你采用哪种方法更新 Drupal 核心，以下准备步骤都适用。\n\n### 准备\n\n每当你接触 Drupal 代码时，都有可能出现问题。因此，即使是这里所述的次要版本更新，也应当：\n\
  \n*   先在离线环境或开发服务器上测试。\n*   安排在网站流量较低的时候上线。\n\n![images](img/square.jpg) **提示**\
  \ 查看你的分析数据，确定你网站一周中何时流量最低。可以通过基于服务器的统计收集和报告工具（如 AWStats（`awstats.sourceforge.net`））或使用类似\
  \ Google Analytics（它有 Drupal 模块便于集成；参见 `drupal.org/project/google_analytics`）的服务来获取这些洞察。\n\
  \n查看发布公告。如果更新过程中有任何特殊需求，都会在这里注明。你是否正在一次性跨越多个次要版本进行更新（例如从 7.0 到 7.3）？请检查*所有*相关的发布公告。前往`drupal.org`的“下载与扩展”![Image](img/U001.jpg)Drupal\
  \ 核心页面（`drupal.org/project/drupal`），点击底部的“查看所有版本”链接（或直接访问 `drupal.org/node/3060/release`）。\n\
  \n![images](img/square.jpg) **提示** 如果某次更新不是安全更新，你可以放心选择不更新。发布说明和管理 ![Image](img/U001.jpg)\
  \ 报告 ![Image](img/U001.jpg) 可用更新页面（`admin/reports/updates`）会告诉你哪些不是安全更新。这有助于你避免让那些对网站安全并非至关重要的更改影响到网站的运行方式。Drupal\
  \ 核心正朝着一种模式发展，即你可以选择仅应用安全更新。对于贡献模块，跳过非安全更新会推迟更新需求，但每当有安全更新时，你仍需完成所有更新。\n\n确保版本控制系统中的所有内容都已提交。如果使用\
  \ Git，请在 Drupal 项目的目录中运行 `git status` 命令。（如果你与他人协作，请确保先执行 `git pull`。）\n\n除了例行的夜间（或更高频率）备份之外，请在更新前立即备份你的数据库。你可以使用\
  \ Web 图形界面（例如 phpMyAdmin 提供的界面），也可以使用 Drush 或以下命令行：\n\n`mysqldump -u exampleuser\
  \ -p examplepass example > example_backup.sql`\n\n![images](img/square.jpg) **注意**\
  \ 另一个选择是位于 `drupal.org/project/backup_migrate` 的备份和迁移模块。\n\n### 手动更新\n\n此方法遵循 Drupal\
  \ 核心每个副本中都包含的 `UPGRADE.txt` 建议。因此，这是官方推荐的将 Drupal 从一个次要版本更新到另一个版本的方法。它并非最简单的方法，因此对于需要尽可能定期和自动化的操作来说，也不是最佳方法。但作为备用的保险方法，了解它非常重要。\n\
  \n![images](img/square.jpg) **提示** 手动更新过程不是最便捷的，但却是最健壮的。如果你有一个 Drupal 站点但对其历史或代码状态不甚了解，这是最佳选择。\n\
  \n所有 Drupalistas 很快就学会了一条规则：**不要修改核心**。通常，你不应该触碰 Drupal 安装中 `sites` 目录之外的任何内容。然而，Drupal\
  \ 核心中有两个文件修改后不会受到谴责：`.htaccess` 和 `robots.txt`。你可能不需要修改它们，但修改它们并不被视为修改核心。由于这些文件位于\
  \ `sites` 文件夹之外（该文件夹你将会完整保留，稍后说明），因此需要特别注意以保留你所做的任何更改。\n\n手动更新的最后一步准备是通过以下代码下载你所用\
  \ Drupal 版本的最新版本（注意，此代码针对版本 7.1；你应获取最新版本）：\n\n```\ncd ~/code\nwget http://ftp.drupal.org/files/projects/drupal-7.1.tar.gz\n\
  tar -xzf drupal-7.1.tar.gz\n```\n\n![images](img/square.jpg) **提示** Drupal 的最新版本会在\
  \ Drupal.org 首页的 `drupal.org/home` 上展示。\n\n\n\n#### 按照 `UPGRADE.txt` 中的步骤操作\n\n\
  以下说明遵循 `UPGRADE.txt` 中的步骤，但在某些情况下我对其做了一些细微调整，主要是因为部分工作已在“准备”部分中涵盖。\n\n1.  以具有“管理软件更新”权限的用户身份登录（第一个创建的用户，也称为用户\
  \ 1，始终有效）。\n2.  进入管理 ![Image](img/U001.jpg) 配置 ![Image](img/U001.jpg) 开发 ![Image](img/U001.jpg)\
  \ 维护模式（`admin/config/development/maintenance`）。勾选“将网站置于维护模式”复选框，然后点击页面底部的“保存配置”。（你可以在“维护模式消息”中填写一些对访客来说个性化且令人安心的话语，因为他们将看到该消息而不是你的网站。）\n\
  3.  将所有已更改的文件从你的代码库中复制出来。这应该包括整个 **sites** 目录，可能还有 **.htaccess** 和 **robots.txt**。如果你不确定这些文件中是否有任何更改，请将它们复制出来；稍后你可以使用\
  \ `diff` 命令来比较文件。此外，将你在 **sites** 之外添加或更改的任何其他文件也移出来。我建议复制所有内容。然后删除整个代码库，仅将 `sites`\
  \ 目录复制回去，并可选择性地复制其他已更改的文件，例如 `.htaccess` 和 `robots.txt`。\n\n   这可以通过下面的命令行步骤来完成，即移动文件，然后将所需的文件复制回来。在此示例中，Drupal\
  \ 目录是 **example/web**。\n\n   ```\n   mv example/web examplewebtmp/\n   mkdir -p\
  \ example/web\n   cp -pr examplewebtmp/sites/ example/web/\n   cp examplewebtmp/.htaccess\
  \ example/web/\n   cp examplewebtmp/robots.txt example/web/\n   ```\n\n4.  将最新的\
  \ Drupal 版本复制到代码库目录中，该目录除了 **sites** 和其他已修改的文件外应为空。不要覆盖 **sites** 目录中的任何内容。\n\n\
  \   此命令行步骤将一个新的 Drupal 安装程序复制到其 `install` 目录中，该目录包含 **sites** 和你放入的其他文件（文件不会被覆盖）：\n\
  \n   ```\n   cp -R drupal-7.1/* drupal-7.1/.htaccess example/web/\n   rm example/web/sites/default/default.settings.php\n\
  \   ```\n\n5.  重新应用对诸如 `.htaccess` 和 `robots.txt` 等文件的任何修改。\n\n   如果发布说明指示了对 `settings.php`\
  \ 的更改，请进行这些更改。如果你对 `.htaccess` 和 `robots.txt` 进行了更改，请重新应用它们。如果你不确定这些文件中哪些具体内容发生了变化，请使用诸如\
  \ `diff` 之类的比较工具。将新版本的 `.htaccess` 与你移回的原旧版本进行比较；对 `robots.txt` 执行同样的操作。对于 `settings.php`，将其与替换了旧\
  \ `default.settings.php` 的新 `default.settings.php` 进行比较。\n\n   你可以使用图形化的 `diff`\
  \ 工具或以下命令行来查看文件之间的差异：\n\n   ```\n   diff -up example/websites/default/settings.php/\
  \ example/web/sites/default/default.settings.php\n   ```\n\n   ```\n   diff -up\
  \ example/web/robots.txt drupal-7.1/robots.txt\n   ```\n\n   ```\n   diff -up example/web/.htaccess\
  \ example/web/.htaccess\n   ```\n\n   第一个 `diff` 显示了新的 `settings.php` 文件建议中的更改内容。第二和第三个\
  \ `diff` 将新的核心 `robots.txt` 和 `.htaccess` 文件与你旧的、可能已修改的版本进行比较。评估你看到的带有 + 号的内容，这些可能是你想要添加或恢复的内容，而带有\
  \ - 号的内容可能是你想要删除的内容——但其中大部分将是你自己所做的更改。\n\n   ![images](img/square.jpg) **提示** 如果你不确定所处理的\
  \ Drupal 版本核心是否被修改过，并且你确切知道所使用的 Drupal 版本，你可以下载一份纯净的副本，并使用 `diff` 命令将其与你的副本进行比较，以查看是否进行了修改以及具体修改了哪些内容。有关命令，请参阅“差异更新”部分。\n\
  \n6.  访问 `update.php`，例如在本地测试站点上访问 [`http://example.localhost/update.php`](http://example.localhost/update.php)，在线上站点上访问\
  \ [`http://example.com/update.php`](http://example.com/update.php)。虽然如果你正在更新的点版本（或多个版本）没有数据库更改，这一步并非必须，但此信息目前尚未在发布说明中特别标注。请访问\
  \ `update.php` 进行检查。点击继续；如果无需运行，它会告诉你“没有待处理的更新”，如图 7-1 所示。如果有更新，请运行它们。\n\n   ![images](img/0701.jpg)\n\
  \n   ***图 7-1.** 没有待处理的更新*\n\n7.  进入管理 ![Image](img/U001.jpg) 报告 ![Image](img/U001.jpg)\
  \ 状态报告（`admin/reports/status`），查看 Drupal 是否有任何问题。访问所有关键页面以测试关键功能，并检查 Drupal 的 watchdog\
  \ 日志（如果使用数据库日志记录模块，则在 `admin/reports/dblog` 处；如果使用 Syslog 模块，则在操作系统的 syslog 中）。\n\
  8.  此步骤（来自 `UPGRADE.txt` 的步骤 8）仅在你无法登录并必须在 `settings.php` 中将 `$update_free_access`\
  \ 设置为 `TRUE` 时适用；你可能不需要这样做。\n9.  返回管理 ![Image](img/U001.jpg) 配置 ![Image](img/U001.jpg)\
  \ 开发 ![Image](img/U001.jpg) 维护模式（`admin/config/development/maintenance`）。取消勾选“将网站置于维护模式”，然后保存配置。\n\
  \n##### 现在在线上执行\n\n如果一切顺利，请提交你的代码更改，在生产站点上执行步骤 1 和 2（或者更好的是，先在暂存站点上执行），将更新后的代码部署到你的线上站点，然后在线上站点上重复步骤\
  \ 6 到 10。有关部署建议，请参阅第 13 章。\n\n### Drush 更新\n\n使用 Drush，这个过程要容易得多。它首先会处理所有需要更新的贡献模块。此命令是\
  \ `drush pm-update`，或简写为 `drush up`。\n\n请记住，在将其应用到生产站点之前，始终先在你站点的副本和数据库上尝试此操作。你也可以使用\
  \ `drush upc` 仅更新代码（你可以将其提交到你的仓库），而不是使用上述同时更新代码和数据库的命令。在测试站点上成功测试 `drush updatedb`（用于更新数据库）后，你可以将代码部署到线上站点并立即在那里运行\
  \ `drush updated`（或访问 `update.php`）。\n\n贡献模块的更新将在后面的一节中讨论。要仅使用 Drush 更新 Drupal 核心，请使用命令\
  \ `drush up drupal`。\n\n至于大多数 Drush 相关内容，请参阅第 26 章以获取更完整的说明。\n\n\n\n### 差异更新\n\n\
  接下来介绍我个人使用的方法。我相信它可以写成一个 Drush 脚本，但惭愧的是，我目前还没能实现。所以留作读者的练习吧！\n\n清单 7-1 是一个脚本，用于下载一份最新的\
  \ Drupal 版本副本*以及*你当前的 Drupal 版本副本，并应用其差异。这意味着，在很多情况下，你对 Drupal 所做的任何修改都不会与简单地重新应用到现有代码上的变更产生冲突。\n\
  \n![images](img/square.jpg) **提示** 你应该对你当前的站点执行`diff`操作，或者使用 Hacked 模块（`drupal.org/project/hacked`）来查看站点发生了哪些变化。不建议在不完全了解\
  \ hack 内容及其必要性的情况下保留它们。\n\n还应该能直接从`git.drupal.org`生成这个`diff`，这将是比该脚本更高效、更精细的改进，但效果相同。这个改进可能会被应用到该脚本中，这也是从`dgd7.org/update`下载它的另一个原因；不要尝试手动输入！使用该脚本的命令如清单\
  \ 7-1 所示。\n\n***清单 7-1.** 利用新旧版本差异自动更新 Drupal 核心的 Shell 脚本*\n\n```sh\n#!/bin/sh\
  \ -e\n\nif [ $# -lt 2 ]; then\n    echo \"用法: $0 旧版本 新版本 (可选) 目录 (例如 5.5 5.6 dir)\"\
  \n    exit 1\nfi\n\n#### 如果更改了 TMP，则必须同时更改 patch 命令中的 -p3 选项！ TMP=/tmp\n#### 将下面的版本号改为你当前的版本\n\
  VER_OLD=$1\nVER_NEW=$2\n\nif [ $# -gt 2 ]; then\n  DRUPAL_DIR=$3\nelse\n   DRUPAL_DIR=`pwd`\
  \ \nfi\n\n#### 将其改为 Drupal 的安装目录 PATCH_FILE=$TMP/drupal-$VER_OLD-to-$VER_NEW.patch\n\
  cd $TMP\n\n#### 下载你当前的版本\nwget http://ftp.drupal.org/files/projects/drupal-$VER_OLD.tar.gz\n\
  \n#### 解压该文件\ntar -xzf drupal-$VER_OLD.tar.gz\n\n#### 现在，下载新版本\nwget http://ftp.drupal.org/files/projects/drupal-$VER_NEW.tar.gz\n\
  #### 同样解压它\ntar -xzf drupal-$VER_NEW.tar.gz\n\n#### 现在创建差异文件\n#### echo \"这个命令，或下一个命令，会中断脚本，所以你只能自己完成剩下的步骤。\"\
  \n echo `diff -Naur $TMP/drupal-$VER_OLD $TMP/drupal-$VER_NEW > $PATCH_FILE` \n\n\
  #### 现在切换到你的 Drupal 安装目录\ncd $DRUPAL_DIR\n\n#### 我们希望看到此步骤的输出\nset -vx\n\n#### 检查补丁是否能无错误地应用\n\
  patch -p3 --dry-run < $PATCH_FILE\n\n#### 关闭详细输出\nset +vx\n#### 重新关闭（自然，减号表示开启，加号表示关闭）\n\
  \necho \"如果以上的预演补丁应用没有错误，你可以按 Y 来实际应用该补丁。\"\necho \"如果有错误，或者你还没准备好应用补丁，请按 N 中止。\"\
  \nread YN\nif ( test -z \"$YN\" )\nthen\n  echo -e \"请输入 \\\"Y\\\" 或 \\\"N\\\" \"\
  \ ;\n  eval \"$0\" \"$@\" ;\n  exit ;\nfi\n#### 此时 'YN' 包含 Y, y, N, 或 n\nif ( test\
  \ \"$YN\" = \"N\" -o \"$YN\" = \"n\" )\nthen\n  exit ;\nfi\n\nset -vx\n#### 假设上一步没有错误，你现在可以实际应用补丁\n\
  patch -p3 < $PATCH_FILE\n```\n\n要使用该脚本，你需要提供 Drupal 站点的路径。我为将这个脚本命名为“升级”表示歉意，尽管它也可能用于开始主要版本的升级。\n\
  \n`/path/to/version-upgrade-diff.sh 7.0 7.1`\n\n如果该脚本位于你的主目录`scripts`中，并且当前站点‘dgd7'位于主目录内的`code`目录下，其中\
  \ Drupal 安装在`web`目录中，那么以下命令可以从任何位置运行：\n\n`~/scripts/version-upgrade-diff.sh 7.0\
  \ 7.1 ~/code/dgd7/web`\n\n### 贡献模块\n\n保持你的贡献模块处于最新状态也至关重要。由`update.module`提供的报告页面，管理\
  \ → 报告 ![Image](img/U001.jpg) 可用更新（`admin/reports/updates`），会列出需要更新的模块。模块实际上不是由模块本身更新，而是由项目更新；有些项目包含多个模块，更新页面会通过“包含项”行显示每个项目包含的模块，如图\
  \ 7-2 所示。\n\n![images](img/0702.jpg)\n\n***图 7-2.** 可用更新报告中显示的贡献模块，包含下载链接和可更新模块的发布说明*\n\
  \n手动更新贡献模块的方法是删除每个过时的模块，并在其位置解压一份新下载的最新稳定版。然后访问你站点的`update.php`，例如测试站点访问[`http://example.localhost/update.php`](http://example.localhost/update.php)，线上站点访问[`http://example.com/update.php`](http://example.com/update.php)。确实没有理由推荐手动下载方式而非下面描述的自动化选项。\n\
  \n无论你如何更新，首先都要在*生产站点的副本*上彻底测试结果。与核心一样，始终先在本地或测试副本上执行贡献模块的更新。与核心相比，更需要仔细检查贡献模块在更新后是否改变了其行为。关于自动将线上数据库副本导入本地或测试环境的方法，请参见第\
  \ 13 章的部署或第 26 章的 Drush。\n\n![images](img/square.jpg) **警告** 模块的主版本升级意味着模块维护者告诉你存在重大变化。甚至可能没有干净的升级路径。例如，如果你需要将贡献模块从\
  \ 2.x 升级到 3.x，请仔细阅读发布说明并彻底测试。预计你需要调整模块的配置。发布说明可以直接从`drupal.org`上模块页面的链接找到，就在模块不同版本的下载链接旁边。\n\
  \n有两种简单、自动化的更新方式。（不过，这两种方式都不能免去在应用到线上站点之前测试更新的步骤。）\n\n#### Drupal 的自动化模块安装器\n\n\
  要自动更新需要更新的模块，请访问你的 Drupal 站点的管理 → ![Image](img/U001.jpg) 报告 → ![Image](img/U001.jpg)\
  \ 可用更新 → ![Image](img/U001.jpg) 更新（`admin/reports/updates/update`）。勾选要更新的模块，然后点击表单底部的“下载这些更新”按钮，如图\
  \ 7-3 所示。\n\n![images](img/0703.jpg)\n\n***图 7-3.** 自动化更新页面，显示了一个不再受支持的模块分支示例，以及两个需要简单次要版本更新的模块*\n\
  \n最好一次只应用一个或有限数量的相关更新，特别是带有主版本升级警告的更新，这样在测试中更容易识别任何变化的来源。在 Drupal 自动放置好代码后，不要忘记运行数据库更新（在你尝试后，如果不需要更新，Drupal\
  \ 会告诉你，如图 7-1 所示）。\n\n你可以在本地运行 Drupal 的自动化贡献模块更新器，然后提交代码以将更改应用到线上环境。这使你可以继续遵循不在线上服务器上修改代码的最佳实践。\n\
  \n如果 Drupal 的更新管理器模块无法通过用户界面为你运行升级（如果它要求你提供不确定是否拥有的 FTP 信息），不要费心去让它工作。这段时间用来让 Drush\
  \ 正常工作会更有价值。\n\n\n\n#### 使用 Drush 更新模块\n\n如前所述，用于更新贡献模块的 Drush 命令与更新 Drupal 核心的命令完全相同。默认情况下，Drush\
  \ 会尝试一次性完成所有更新：首先更新所有贡献模块，然后更新 Drupal 核心。\n\n关于安装 Drush，请参见第 2 章。关于 Drush 及其强大功能的更多信息，请参见第\
  \ 26 章。\n\n在撰写本文时，有一个（漫长的）问题（`drupal.org/node/1002658`）正在讨论如何确保 Drush 检查 *所有* 可用的更新，并且不会花费一两分钟来查找它们（当前补丁中的行为）。Drush\
  \ 有时也会声称它在更新中失败了（由于某个版本不可用或其他一些小故障）并且无法从其备份中恢复。实际上，Drush 几乎肯定成功更新了代码；你无需手动回滚任何内容，而是可以运行数据库更新、提交代码、部署并在预发布和生产站点上运行数据库更新。为了避免其中一些问题，并作为测试和识别问题原因（或解决方法）的最佳实践，你可以让\
  \ Drush 一次只更新一个或几个项目，例如仅使用 `drush upc ctools views` 更新 CTools 和 Views 项目代码。\n\n\
  使用 Drush 选择要更新的模块时，请查看管理 ![Image](img/U001.jpg) 报告 ![Image](img/U001.jpg) 可用更新（`admin/reports/updates`）来决定要更新的内容，然后悬停在下载链接上以查看应向\
  \ Drush 提供的项目名称。（你也可以运行 `drush up` 来查看可用的更新，并在更新任何内容之前取消（`n`），以便逐个挑选执行。）从前面的例子来看，LoginToboggan\
  \ 模块的下载链接是 `ftp.drupal.org/files/projects/logintoboggan-7.x-1.2.tar.gz`，这意味着你想用来下载它的命令是：\n\
  \n```\ndrush up logintoboggan\n```\n\n并非所有项目的面向用户名称和系统名称都几乎相同。Image resize filter\
  \ 是 `image_resize_filter`，而 Meta tags 是 `nodewords`。如果有多个可能的版本可以更新（例如，当有新的主版本升级可用时），你可以包含你想要的版本，格式也采用下载链接中所示的形式，如下所示：\n\
  \n```\ndrush up logintoboggan-7.x-1.2\n```\n\n### 总结\n\n本章至少有两个目的。它向你展示了多种保持 Drupal\
  \ 站点更新的方法，所以只需选择一种并执行即可！它还表明，在 Drupal 内部和周边，总有多种方法可以完成某些事情。\n\n![images](img/square.jpg)\
  \ **提示** 除了有多种执行更新的方法之外，还存在（或将会存在）比此处讨论的方法更好的方法。请查看 `dgd7.org/update` 以获取与本章相关的新信息，并通过参与社区（参见第\
  \ 9 章）来了解有关 Drupal 所有内容的最新想法和实践。\n\n## 第 8 章\n\n![images](img/squ.jpg)\n\n## 扩展你的站点\n\
  \n**作者：Dan Hakimzadeh 和 Benjamin Melançon**\n\n> *“为他人建造好工具有着极大的满足感。”*\n\n——弗里曼·戴森\n\
  \n第 1 章 让你开始使用 Drupal 站点，第 3 章 向你展示了 Views 模块的强大功能，第 4 章 让你了解了可供使用的各种模块。本章将展示你可以通过字段和视图、可选核心模块以及精选的贡献模块来构建站点到何种程度——简而言之，就是对你站点进行极致配置。\n\
  \n### 使用个人资料页展示作者\n\n一个多作者书籍网站不能忽视其作者，因此最好将他们展示在网站上。同时也是站点用户的作者应该能够编辑自己的个人资料，但*不应*假设作者会创建和管理自己的个人资料页面。你可以赋予“作者”角色创建“个人资料”类型内容的权限，并且相信作者不会为自己创建多于一个的个人资料条目。\n\
  \n![images](img/square.jpg) **提示** 尽管在用户账户之上构建个人资料似乎是显而易见的选择，但这并不总是最佳方案。考虑一个以董事会成员为特色的“关于我们”页面；虽然他们所有人都应该能够登录并编辑自己的个人资料，但实际上有多少人会这么做呢？即使是像本书作者这样精通\
  \ Drupal 的团队，也不能期望所有人都按需加入一个网站。此外，当最迫切的需求是全名、头像照片和简短的第三人称传记时，创建包含用户名、电子邮件和密码的用户账户真的有意义吗？Profile2\
  \ 模块（`drupal.org/project/profile2`）所实现的那类个人资料，对于确定会是活跃用户的用户来说最有意义。当个人资料或传记主要是作为内容，而非用户账户的副产品时，请考虑使用更轻量级的方案，即简单的内容类型。\n\
  \n让我们开始吧：\n\n1.  如第 1 章所示，通过访问 *管理* ![Image](img/U001.jpg) *结构* ![Image](img/U001.jpg)\
  \ *内容类型, + 添加内容类型*（`admin/structure/types/add`）来创建一个新的内容类型。\n2.  将其命名为 `Author profile`，然后点击自动生成的机器名旁边的“编辑”按钮，使其弹入自己的表单字段中，这样你就可以将\
  \ `author_profile` 更改为 `profile`。\n3.  在此表单底部的垂直标签中，在“提交表单设置”下，将“标题字段标签”从 `Title`\
  \ 更改为 `Name`（参见图 8–1）。\n\n    ![images](img/0801.jpg)\n\n    ***图 8–1.** 作者内容类型的提交表单设置：标题字段标签已更改为\
  \ Name*\n\n4.  接下来在垂直标签中，在“发布选项”中勾选 *创建新修订* 以将其添加到默认选项。\n5.  在“显示设置”中，取消勾选 *显示作者和日期信息*（参见图\
  \ 8–2）。\n\n    ![images](img/0802.jpg)\n\n    ***图 8–2.** 配置内容类型以不显示发布（作者和日期）信息*\n\
  \n6.  最后，将“评论设置”更改为 *隐藏*（不显示任何评论）或 *已关闭*（不允许留下任何额外评论）。如果在留下任何评论之前进行设置，两者效果相同。\n\n\
  作者个人资料内容类型当然应该有字段，因此点击“保存并添加字段”提交表单。现在你位于内容类型的“管理字段”标签页。\n\n#### 为作者提供头像图片\n\nDrupal\
  \ 7 核心包含了良好的图片处理能力。在“添加新字段”下指定：\n\n*   标签为 **Headshot**\n*   机器名为 **headshot**\n\
  *   字段类型为 **Image**\n\n![images](img/square.jpg) **提示** 避免为了此类用途而重用现有图片字段的诱惑。Drupal\
  \ 7 在允许大多数字段设置特定于其附加的内容类型或其他捆绑包方面做了出色的工作，但默认图片选项和可上传图片数量都是按字段全局设置的，而不是按字段在内容类型或其他捆绑包上的实例设置的。即使现有字段现在满足了我们新字段所需的全局设置，如果以后需要更改全局设置，也没有好方法可以将共享字段分离出来。除非你确定它们的字段级设置不会发生分歧，*并且*\
  \ 你知道需要在列表中使用来自不同来源的相同字段，否则你应该创建一个新字段，而不是重用现有字段。\n\n实例（作者个人资料设置）上的默认设置可以保持不变，不过将子目录设为“headshot”可以使文件目录更井井有条。此外，在“字段设置”中，将“值数量”保持为\
  \ 1。提供一个默认图片（可选）将有助于在所有作者提供其个人资料头像之前保持视觉一致性。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n#### 从个人资料链接到网站\n\n没有哪个网站是一座孤岛，`definitivedrupal.org` 自然应当链接其作者的个人和专业网站（尽管有时“鞋匠的孩子没鞋穿”的寓言也适用于\
  \ Drupal 开发者的网站）。如果我们打破常规，仅凭名称来评判一个模块，那么 Link 模块（`drupal.org/project/link`）将是首选。事实上，自\
  \ Drupal 4.7 和 CCK 时代起，Link 就是提供 URL 专用字段的首选模块，并且在 Drupal 7 和 Fields 时代依然如此。除了 URL\
  \ 之外，Link 模块还提供了标题（要超链接的文本）、添加 CSS 类和链接目标等选项。（您可以使用文本字段来存储链接，但它不提供这些功能。）\n\n当然，在\
  \ Drupal 中为任何内容添加 Link 字段之前，您需要先安装该模块。第 4 章 介绍了安装模块的方法；这里我们给出 Drush 指令（参见第 2 章和第\
  \ 26 章）。同时还展示了使用 Git 将模块添加到版本控制的命令（参见第 2 章）。\n\n```\ndrush dl link\nProject link\
  \ (7.x-1.0-alpha2) downloaded to                        [success]\n/home/ben/code/dgd7/drupal/sites/all/modules/link.\n\
  git add sites/all/modules/link/\ngit commit -m \"Link module for link fields.\"\n\
  drush en -y link\nThe following extensions will be enabled: link\nDo you really\
  \ want to continue? (y/n): y\nlink was enabled successfully. [ok]\n```\n\n![images](img/square.jpg)\
  \ **注意：** 如果通过用户界面启用 Link 模块，在模块管理页面（可按下 `control + f`）搜索 `link`，会发现它被分在“字段”包下。\n\
  \nLink 模块在模块管理页面上没有配置链接，因为它的所有设置都是针对每个字段的。要开始操作，需要将其附加到内容类型。对于本网站，需要 Link 字段的内容类型是\
  \ Profiles，即作者简介的内容类型。要添加一个链接字段：\n\n1.  转到 *管理* ![images](img/U001.jpg) *结构* ![images](img/U001.jpg)\
  \ *内容类型*。\n2.  点击 Profile 内容类型的“管理字段”链接 (`admin/structure/types/manage/profile/fields`)。\n\
  3.  转到表单中标记为“添加新字段”的部分。\n4.  为它指定一个标签，例如 **网站**，机器名为 `website`（它会自动添加 `field_` 前缀），字段类型选择\
  \ Link（参见图 8–3）。\n\n![images](img/0803.jpg)\n\n***图 8–3.** 添加一个类型为 Link 的新字段*\n\n\
  5.  Link 模块只提供一个 *组件*（组件用于在添加或编辑内容的表单上显示该字段），但您接下来会看到的字段设置也提供了各种影响该组件的选项。点击“保存”即可。\n\
  \n![images](img/square.jpg) **提示：** 添加字段时，您可以在提交保存之前将其拖到您希望的位置。这很安全，而且有效！（这会影响其在节点添加/编辑表单上的显示位置；其显示位置的排列可以在\
  \ **管理显示** 标签页中进行。）\n\n6.  在字段设置页面上，取消勾选“允许可选 URL”——在 Link 字段中允许这样做是不常见的——并将“链接标题”设置为可选。\n\
  7.  您可能希望将 URL 显示截断值提高到 120 个字符，因为我们不希望截断地址的显示，除非它会影响页面布局。\n8.  将链接目标保留为默认值“无”，因为强迫用户的链接在新窗口中打开可能会让他们感到困惑，而不是帮助他们返回您的网站。\n\
  9.  最后，不要设置 Rel 属性。对于非导航链接，rel 没有太多有趣的用途（参见 `w3.org/TR/html401/types.html#type-links`），除非您定义自己的\
  \ rel。（不要像示例中那样设置“nofollow”；这样做是对您网站用户的不尊重，也违背了万维网的本质。）“额外的 CSS 类”不太可能造成任何损害，但另一方面，如果您以后想专门为网站链接设置主题，随时可以回来添加它。\n\
  10.  现在点击 **保存字段设置**。\n\n这将带您进入第二个设置页面，分为 Profile 设置（意味着仅当该字段位于 Profile 内容类型时适用的设置）和网站字段设置（意味着将影响您可能附加到的任何内容上的网站字段的设置）。这些设置几乎都与您之前填写的内容重复，但有一个重要的设置您之前没见过。向下滚动一点，网站字段设置的第一个选项是“值的数量”（参见图\
  \ 8–4）。通过设置此项，您可以使该字段能够重复并填写多个值。\n\n这意味着，与其为公司网站创建一个 Link 字段，再为个人网站创建另一个 Link 字段，再为秘密项目网站创建一个，再为宠物网站创建一个——也就是说，试图猜测作者可能链接多少个、哪些种类的网站——不如创建一个可以重复有限次数或无限制次数的网站字段。\n\
  \n![images](img/0804.jpg)\n\n***图 8–4.** 配置为允许无限数量值的网站 Link 字段*\n\n其他所有设置您都已设置完毕。在表单底部保存设置，此字段即可使用。Drupal\
  \ 会将您带回 Profile 内容类型的“管理字段”标签页，您可以在其中编辑或排列现有字段——或添加更多字段。\n\n\n\n#### 作者的其他网络据点\n\
  \n由于大多数作者本身已是公众人物（现任作者除外），本网站应提供一种标准化方式，链接到他们其他最相关的页面（如 `drupal.org` 用户页面、`groups.drupal.org`\
  \ 用户页面和 Twitter）。这些本可以作为链接字段实现，但通过在开发端投入更多工作，你可以仅获取用户 ID 并自行包裹链接，从而确保呈现风格的一致性。\n\
  \n![images](img/square.jpg) **注意** 使用链接字段连接到 `drupal.org` 和其他特定网站账户会简单得多，也完全可以接受。但要真正发挥这种方法的优势，你需要等到第\
  \ 33 章通过自定义代码来实现。\n\n添加两个整数类型的字段（注意：你必须通过 Drupal 的用户界面逐一添加字段，除非其中一个要添加的字段已经存在）：\n\
  \n- *Drupal.org 用户 ID*，其机器名可为 `do_uid`\n- *Groups.Drupal.org 用户 ID*，其字段名可为 `gdo_uid`。（如同所有通过用户界面创建的字段，这两个机器名都会自动加上\
  \ `field_` 前缀。）\n\n你可以立即点击进入接下来的“字段设置”页面，因为整数字段在此页面上并无需要配置的选项。\n\n![images](img/square.jpg)\
  \ **注意** 如果此问题得到解决，也许空白配置页面将被移除：`drupal.org/node/552604`。\n\n尽管最好将用户 ID 数据存储为整数，但每个\
  \ ID 在显示时都应成为指向各自网站上用户账户的链接。整数字段允许你定义前缀和后缀，这些内容将在输入和编辑表单中使用，并与值一同显示。这是一个按内容类型进行的设置，位于添加字段后的第二个配置屏幕上。（你可以随时返回该页面，路径为：*管理*\
  \ ![images](img/U001.jpg) *结构* ![images](img/U001.jpg) *内容类型* ![images](img/U001.jpg)\
  \ *作者简介* ![images](img/U001.jpg) *管理字段* ![images](img/U001.jpg) *Groups.Drupal.org\
  \ 用户 ID*，`admin/structure/types/manage/profile/fields/field_gdo_uid`）。然而，这些前缀和后缀原本是为货币符号或度量单位设计的。试图将\
  \ HTML 链接代码的开头部分作为前缀，其余部分作为后缀的做法是行不通的。\n\n不过，确实有一个模块能解决这个问题。为字段提供特殊包装可以通过“自定义格式化器”（Custom\
  \ Formatters，`drupal.org/project/custom_formatters`）来实现——定义一个自定义格式化器，将其适当地应用于整数或文本字段，然后定义用于包裹数据的\
  \ HTML 代码。或者，你也可以编写自己的模块来定义一个格式化器，这样可能更整洁（例如，通过带选项的一两个格式化器，而不是为每个字段都定义一个格式化器），也更具扩展性（例如，实现某种疯狂功能，比如查找\
  \ `drupal.org` 账户的用户名）。更多信息请参见第 33 章。\n\n![images](img/square.jpg) **提示** 字段系统的一大优点就是我们可以立即收集数据，稍后再完善显示方式。\n\
  \n保存后，你将回到“作者简介”内容类型的管理字段页面，准备添加下一个字段。\n\n#### 一个不显示的数据字段：大致页数\n\n创建另一个整数字段，用于记录每位作者在本书中贡献的大致页数。这个字段将在后面用于排序显示作者姓名和简介（详见“列出作者”一节）。随后，在“微调内容显示”一节中会介绍如何将其隐藏。你已经创建过整数字段，所以这里无需赘述！\n\
  \n#### 连接作者简介与作者的用户账户\n\n我们决定不将作者简介与用户账户直接绑定，但我们可以通过允许简介引用用户账户，从而兼顾两者的优势。\n\n1.\
  \  节点引用和用户引用是 Drupal 内容类型和字段系统的一项强大扩展，目前存在于“引用”项目（References project，`drupal.org/project/references`）中。我们需要添加它：\n\
  \n    ```\n    drush dl references\n    Project references (7.x-2.x-dev) downloaded\
  \ to                      [success]\n    /home/ben/code/dgd7/drupal/sites/all/modules/references.\n\
  \    \n    Project references contains 2 modules: node_reference, user_reference.\n\
  \    \n    git add sites/all/modules/references\n    git commit -m \"Added project\
  \ references (node_reference, user_reference).\"\n    ```\n\n2.  启用“用户引用”模块（稍后你还会用到“节点引用”，所以可以同时启用它）。\n\
  \n3.  添加一个新字段，标签为 **DefinitiveGuide.org 账户**，字段（机器）名为 `field_user`，当然，将存储的数据类型改为“用户引用”。一旦选择此类型，“用户引用”字段类型会提供三种不同的输入小部件供你选择：选择列表、复选框/单选按钮和自动完成文本字段（参见图\
  \ 8–5）。\n\n    ![images](img/0805.jpg)\n\n    ***图 8–5.** 添加用户引用字段，并显示三种小部件选项*\n\
  \n    ![images](img/square.jpg) **注意** “复选框/单选按钮”小部件在字段配置为允许单个值时显示为单选按钮，在允许多个值时显示为复选框。同样，如果允许多个值，“选择列表”会显示为选择框而非下拉菜单。\n\
  \n4.  由于网站可能有成千上万的用户可供选择，看似唯一可用的就是自动完成文本字段——因为其他两种小部件会显示所有用户，从上千人中选一个并不是好用的用户界面。然而，在下一个屏幕中，你会发现可以按角色限制可被引用的用户。因此，选择“选择列表”小部件，以便以一种紧凑的方式显示可供选择的网站用户。\n\
  \n5.  你随时可以返回此页面（“作者简介”内容类型的“管理显示”选项卡）更改小部件，所以直接保存即可。\n\n6.  接下来，你会进入一个配置页面，其中包含按角色和状态限制可引用用户的选项。只有具有“作者”角色的用户才应可用，而且限制为活跃用户通常没有坏处，所以勾选该框（参见图\
  \ 8–6）。\n\n    ![images](img/0806.jpg)\n\n    ***图 8–6.** 按角色和状态限制可供引用的用户*\n\n7.\
  \  点击**保存字段设置**，然后进入下一个配置屏幕。\n\n8.  这里需要操作的不多：不要设为必填字段，不要设置默认值，并将“值的数量”保持为 1。这个字段的目的是将作者简介与该作者的用户账户关联起来（如果存在的话）。因此，点击“保存设置”离开此页面即可完成！\n\
  \n\n\n#### 授权作者创建个人资料\n\n权限在第 1 章中介绍过，您将经常回到那个复选框墙来构建 Drupal 站点。您创建的新内容类型“作者个人资料”可以在`管理`![images](img/U001.jpg)`人员`![images](img/U001.jpg)`权限`（`admin/people/permissions`）下的“节点”部分设置其权限。\n\
  \n为“作者”角色勾选两个权限：`Author profile: Create new content`和`Author profile: Edit own content`。\n\
  \n![images](img/square.jpg)**注意**：“管理员”角色没有被授予对此新内容类型的创建、编辑和删除权限，但这没关系，因为“管理员”角色已经拥有节点模块的`Bypass\
  \ content access control`权限。\n\n![images](img/square.jpg)**提示**：大多数站点应创建一个“内容编辑”或“内容管理员”角色，该角色同时拥有`Administer\
  \ content`和`Access the content overview page`权限，可能还包括`Administer comments`和`comment\
  \ settings`权限，以及可能的`Bypass content access control`权限。关于管理内容和评论、创建视图及其他使操作更便捷的工具的讨论，请参阅`dgd7.org/content`上的额外章节“Content\
  \ Administrator Convenience”。\n\n您可以在`添加新内容`![images](img/U001.jpg)`创建作者个人资料`（`node/add/profile`）下创建一个或两个作者个人资料。您应该测试使用*仅具有作者角色的用户账户*创建个人资料——权限问题最常导致您告诉用户在站点上执行某项操作却不起作用，从而显得愚蠢。请创建一个测试账户或使用`Masquerade`模块（`drupal.org/project/masquerade`）。\n\
  \n![images](img/square.jpg)**提示**：作为管理员，您可以在创建内容时或之后将内容分配给其他用户。在节点添加/编辑表单底部的垂直选项卡中，找到“作者信息”部分，将“作者”字段中的用户名替换为您希望成为该内容所有者（作者）的用户名。请耐心输入——它会自动补全。\n\
  \n您还可以在`管理`![images](img/U001)`人员，+ 添加用户`（`admin/people/create`）下为有意愿的作者创建用户，并直接为他们分配作者角色。最后，您可以邀请用户在站点上自行创建账户，并在他们注册后为其用户账户添加作者角色（有关设置用户注册通知的方法，请参阅本章的在线资料`dgd7.org/moresite`）。\n\
  \n### 列出作者\n\n现在作者有能力拥有个人资料了，但访客无法找到它们。图书站点应该适当展示作者。个人资料将以三种方式展示：\n\n*   一个页面，从主菜单链接，展示作者图片和姓名的网格，每个姓名和图片链接到完整的作者个人资料，随机排序。\n\
  *   一个页面，可从图片网格页面访问，包含小尺寸个人资料图片以及简短传记的第一两段，每个链接到完整的作者个人资料，按写作页数排序。\n*   一个区块，位于每个页面的页脚，每个作者姓名链接到其完整的作者个人资料，按写作页数排序。\n\
  \n对于以上三个目的，`Views`模块是自然的选择。\n\n![images](img/square.jpg)**注意**：在 Drupal 7 的`Views`官方发布之前的一小段时间，该站点使用\
  \ Drupal 核心提供的一个优秀类`EntityFieldQuery`来显示作者个人资料。关于如何仅用自定义模块中的几行代码而不使用`Views`制作作者个人资料页面，请参阅`dgd7.org/180`。\n\
  \n#### 构建作者头像视图\n\n`Views`模块可以访问管理员或作者添加作者个人资料时存储的数据，并仅显示部分数据，以制作包含链接到作者个人资料页面的姓名和图片的页面。\n\
  \n1.  首先，转到工具栏中的`结构`![images](img/U001.jpg)`视图`，点击“添加新视图”链接（`admin/structure/views/add`）。\n\
  2.  在此页面上，为您的视图命名。在“视图名称”字段中添加`Author profiles`，但将自动生成的机器名称更改为简单的`profiles`。\n\n\
  \    ![images](img/square.jpg)**注意**：视图机器名称一旦选定，就无法更改。\n\n3.  勾选“描述”以显示“视图描述”字段，并输入简短描述，例如`A\
  \ view to show all the author profiles`。\n4.  本页其余部分帮助您更快地构建视图。将“显示”设置为`Content`（意味着节点），并将“类型”更改为`Author\
  \ profile`。\n5.  在“创建一个页面”下，将自动填充的“页面标题”更改为`Authors`。这将显示给访问此页面的访客。将路径 URL 的最后部分设置为`authors`。并将“显示格式”更改为`Grid`（字段格式）。\n\
  6.  现在点击`继续并编辑`按钮。这将带您进入视图编辑页面。说这里可以完成很多事情是轻描淡写的。不过，您需要做的大部分工作已根据您在上一个页面上的设置为您配置好了。所有这些都可以更改或调整。例如，在“网格”设置中，将“列数”更改为`4`。\n\
  \n    ![images](img/square.jpg)**提示**：为站点开发的主题（参见第 15 和 16 章以及`dgd7.org/theme`了解主题开发）是弹性宽度的，并在其样式表中包含一个`inline`类。将格式更改为`HTML\
  \ List`并使用`inline`类将获得更完美的结果。Drupal 的数据与表现分离让您可以稍后进行此更改。\n\n7.  转到“字段”部分，再次点击“添加”按钮为您的视图添加一些字段。这里有很多魔法发生。“作者”页面的要求是：作者头像图片和姓名应以网格形式显示，并且图片和姓名都应链接到相应的作者个人资料。因此，选择`Content:\
  \ Image`（还记得将其添加到作者个人资料内容类型吗？）和`Content: Title`。\n8.  在`Content: Image`的配置中，移除标签文本（取消勾选“创建标签”），并在“图像样式”下选择`thumbnail`。确保“链接图像到”设置为`Content`。在`Content:\
  \ Title`设置中，同样移除标签文本，并确保勾选了“将此字段链接到原始内容”。\n9.  不要忘记保存视图！\n\n您刚刚在站点上创建了一个动态页面，该页面查询数据库并以\
  \ 4 列网格格式显示来自个人资料节点（且仅限个人资料节点）的图片和标题。您可以通过访问您输入的路径来访问该页面，本例中为`authors`。\n\n\n\n\
  #### 创建图像样式\n\n你可以保持刚才创建的视图不变。但这样做的缺点是，有些作者可能会上传横向的个人资料图片，而另一些作者可能会上传纵向的。这意味着作者列表页面可能会显得杂乱无章，长宽不一的图片混杂在一起。你为图像字段显示选择的默认缩略图样式，只会将图像按比例缩放到特定的像素宽度或高度。\n\
  \n自动调整图像大小的功能虽然很酷，但还不够好，而 Drupal 则要酷得多。我们想要的是完全正方形的个人资料图片，这样我们的网格就不会有那么多空白区域或形状怪异的图片了。借助\
  \ Drupal 的图像样式，我们可以轻松创建一种图像样式，利用“缩放并裁剪”效果来实现这一目标。\n\nDrupal 还能做得更好吗？当然可以。智能裁剪模块（`drupal.org/project/smartcrop`）为图像模块的裁剪功能提供了替代方案。智能裁剪会尝试识别图片的焦点区域，并将其作为裁剪的中心。如果你想使用它，请下载并启用\
  \ Smart Crop。\n\n![images](img/square.jpg) **提示** 智能裁剪比 Drupal 核心的图像裁剪功能更强大，但它并非万无一失。如果你需要将图像裁剪到精确尺寸，同时又不丢失任何重要内容，请尝试\
  \ Imagefield crop 模块（`drupal.org/project/imagefield_crop`），该模块允许用户在上传图片时自行进行裁剪。\n\
  \n1. 首先，我们必须编辑现有的图像样式（通过点击其名称或编辑链接），或者创建一个新的图像样式（通过点击表格上方的 *+ 添加样式* 链接）（参见 图 8–7）。由于缩略图、中等和大尺寸图像始终由图像模块提供，每个使用图像的模块都可以依赖它们的存在。你对这些图像样式所做的任何更改，都将影响你网站上所有使用它们的地方，包括作为你甚至尚未考虑安装的模块所使用的默认图像样式。\n\
  \n![images](img/0807.jpg)\n\n***图 8–7.** 图像样式列表页面。点击样式名称或“操作”下的编辑链接即可进行编辑。*\n\n\
  ![images](img/square.jpg) **注意** 如果你想影响所有可能使用某个图像样式的模块，可以编辑模块提供的图像样式。当你第一次编辑（该样式仍为默认设置时），你需要先点击“覆盖默认值”。\n\
  \n2. 作者视图的需求非常特定，所以我们不要覆盖默认样式。相反，通过 *+ 添加样式* 链接创建一个新样式。给它一个样式名称，例如 **small_square**，然后点击“创建新样式”。\n\
  \n![images](img/square.jpg) **提示** 由于图像样式关乎呈现效果，我们建议你根据其外观（而非用途）来命名。\n\n3. 你会被带到图像样式编辑页面，你可以在其中通过添加各种不同的效果来构建你的样式。在我们的案例中，我们需要正方形图像，因此选择并添加“缩放并智能裁剪”效果（参见\
  \ 图 8–8）。这会带你进入另一个配置页面；将宽度和高度都设置为 150px，并允许放大。\n\n![images](img/0808.jpg)\n\n***图\
  \ 8–8.** 为新的图像样式添加“缩放并智能裁剪”效果*\n\n4. 点击“添加效果”按钮提交此表单。现在你会被带回图像样式编辑页面，该页面包含应用了该样式的示例图像预览。如果你看到一幅美丽的热气球场景，那你得到了一份特殊获奖版的\
  \ Drupal！开个玩笑，这个示例图像是由图像模块的主要作者 Nate Haug（quicksketch）专门为该模块绘制的。在图像预览下方，你刚刚添加的效果会出现在此图像样式使用的效果列表中，并且你还可以选择添加更多效果。\n\
  \n![images](img/square.jpg) **警告** 虽然图像样式允许你更改其名称（实际上是一个机器名），但使用该图像样式的视图和其他网站元素并不会收到通知。因此，强烈建议你不要更改图像样式的名称。如果确实需要更改，请记得在网站中逐一更新所有使用到它的地方。\n\
  \n5. 最后一步是回到你的作者视图，将图像字段设置为使用你新创建的图像样式，而不是默认的缩略图样式。\n\n在返回视图并再次编辑时，这也是为传记页面创建一个菜单项的好机会，这样你网站的访问者就可以通过菜单项访问该页面，而不仅仅是输入路径。\n\
  \n#### 为页面视图创建菜单链接\n\n首先编辑你创建的视图页面显示。\n\n1. 找到“页面设置”，在其内部找到“菜单：无菜单”。点击“无菜单”为其添加一个菜单链接。（很抱歉，视图更新后的更直观用户界面在这里并没有变得更直观！）确保在“菜单”选项下选择了“主导航”，如图\
  \ 8–9 所示。\n\n   ![images](img/0809.jpg)\n\n   ***图 8–9.** 为页面视图添加菜单链接*\n\n2. 点击“应用”，然后点击“保存”。如果链接不在你期望的菜单位置，最简单的方法是前往\
  \ *管理* ![images](img/U001.jpg) *结构* ![images](img/U001.jpg) *菜单*（`admin/structure/menu`）并在那里重新排序菜单。\n\
  \n![images](img/square.jpg) **注意** 与所有页面一样，你也可以通过菜单管理为视图页面创建菜单链接。点击“添加链接”并给出路径——就像创建目录菜单链接那样。\n\
  \n\n\n#### 构建作者传记视图页面，作为作者视图中的标签页可访问\n\n展示作者的主要方式是图片网格，但访问者也应该能够在一个包含简短传记的列表中一次性浏览所有作者。此显示的关键元素请参见表\
  \ 8-1。\n\n![images](img/square.jpg) **注意** 我们不会涵盖此视图的每个方面。关于所需的任何其他视图参考资料，请参阅第 3\
  \ 章。\n\n***表 8-1**. 视图页面的关键元素*\n\n| 标题 | *(覆盖)* 标题：**作者传记** |\n| 高级设置 | 机器名称：**biographies**\
  \ 显示名称：页面：**传记** |\n| 格式 | *(覆盖)* 样式：HTML 列表 *(覆盖)* 行样式：节点（摘要） |\n| 页面设置 | 路径：**authors/biographies**\
  \ 菜单：**标签页：传记** （权重：5） |\n| 排序标准 | **字段：field_pagecount** （降序） |\n| 过滤器 *(未更改)*\
  \ | *节点：类型 = 个人资料* *节点：已发布 = 是* |\n\n我们还需要做一件事，才能让这个菜单标签页显示在现有的作者图片视图上——我们需要将该页面设为默认标签页（参见图\
  \ 8-10）。\n\n1. 返回个人资料视图的图片显示。在页面设置中，将路径更改为 `authors/pictures`，并在菜单中选择默认菜单标签页。\n\
  2. 保持标题为“作者”，并保留相同的描述。\n3. 将权重更改为 `-5`，因为这是默认标签页的权重（而不是主菜单中的链接），并且它应始终显示在第一位。\n\
  4. 点击更新。对于父菜单项，您必须选择普通菜单项（*非*“已存在”）。\n5. 将其标题设为 **作者**，并保留相同的描述。将其放入主菜单（并预期稍后需要从菜单管理中调整其权重）。\n\
  \n![images](img/square.jpg) **注意** 您无法通过菜单管理用户界面创建这些菜单和标签页，只能通过视图（或您自己的代码或其他创建菜单项的方式，而不仅仅是菜单链接）来实现。要说得非常清楚：即使您已经有一个指向路径\
  \ `authors` 的菜单链接，您也需要告知视图为默认标签页的父级创建菜单条目。当视图为您创建菜单条目时，它创建的不仅仅是一个菜单链接，而是一个菜单项，这足以支撑标签页的固定。此外，默认标签页必须具有与其父菜单项不同的路径。这就是为什么路径\
  \ “authors” 被替换为 “authors/pictures”，以便父菜单项可以使用 “authors” 路径。请参阅第 29 章了解菜单系统。\n\n\
  ![images](img/0810.jpg)\n\n***图 8-10.** 由您的视图提供的两个菜单标签页：传记标签页和默认的菜单标签页“作者”*\n\n\
  ![images](img/square.jpg) **提示** 即使两个视图显示在逻辑上相关，但如果它们在结构上差异过大——如不同的过滤器、字段、排序等——出于性能考虑，最好将它们作为独立的视图。如果一个显示将覆盖几乎所有默认设置，它应该成为一个独立的显示（除非它是附件显示，需要与它所附着的显示位于同一视图中）。图\
  \ 8-10 中的两个显示原本也完全可以拆分为独立的视图。\n\n#### 微调内容显示\n\n能够添加字段来容纳各种不同信息固然很棒，而能够灵活更改这些信息的显示方式则更胜一筹。这一神奇功能体现在每种内容类型的**管理显示**标签页中。借助它，您可以对内容的显示进行大量控制，而无需进行主题开发或任何其他编码。\n\
  \n首先，转到位于 *管理* ![images](img/U001.jpg) *结构* ![images](img/U001.jpg) *内容类型* ![images](img/U001.jpg)\
  \ *作者个人资料* ![images](img/U001.jpg) *管理显示* (`admin/structure/types/manage/profile/display`)\
  \ 页面中的作者个人资料内容类型的管理显示页面（参见图 8-11）。\n\n![images](img/0811.jpg)\n\n***图 8-11.** 作者个人资料内容类型的管理显示页面，默认视图模式*\n\
  \n![images](img/square.jpg) **注意** 这是一个功能强大的页面，对于每个可添加字段的实体（如内容类型的节点、右侧标签页中所示的内容类型的评论、词汇表的分类术语、用户等），您都拥有其对应的版本。\n\
  \n图 8-11 展示了作者个人资料内容类型（您在本章前面已构建）默认显示配置的进行中的状态。头像图像字段的标签已隐藏，更明显的是，其格式被设置为以大型图片样式显示。这些选项是通过点击头像表行右侧的齿轮图标打开的。主要内容传记字段的标签也已隐藏，各种\
  \ ID 和账户字段的标签则设置为内联显示。\n\n可以通过选择 `<隐藏>` 作为其格式，或将其拖拽到底部的隐藏部分，来将字段从显示中隐藏。“大致页数”字段就是这种情况，它仅用于对个人资料视图进行排序，而非用于显示。字段的顺序也可以通过拖拽来更改（或者，作为可选方案或在没有\
  \ JavaScript 的情况下，通过权重文本字段更改）。在图 8-11 中，DefinitiveGuide.org 账户字段可能应该放在多值网站字段之上，以便与其他单值、内联标签字段放在一起。\n\
  \n![images](img/square.jpg) **警告** 当您上下拖拽字段时，Drupal 会清晰友好地提醒您需要点击页面底部的“保存”按钮来提交更改。但当您更改标签或格式时，它**根本**不会提醒您。即使您使用齿轮图标配置高级显示设置，系统也不会警告您这些更改尚未保存。（请参阅\
  \ `drupal.org/node/857312` 上的问题）。在任何情况下，除非您点击页面底部的“保存”提交更改，否则您所做的任何更改都不会被保存。\n\n\
  您记得点击页面底部的“保存”了吗？即使您点击了“更新”，Drupal 也不会保存任何东西，直到您使用“保存”按钮整体提交表单。现在您知道了，尽管可能需要被“烫”过几次才能适应：在完整的“管理显示”表单提交之前，字段显示设置不会被保存。所以，请保存此表单。\n\
  \n\n\n### 使用视图模式以不同方式显示相同内容\n\n之前的更改是对作者简介内容类型的默认视图设置进行的，这可以从管理显示选项卡下选中的子选项卡看出。另一个选项卡是摘要，这是为节点内容自动配置的另一种视图模式。\n\
  \n在查看默认视图设置时，隐藏于标有\"自定义显示设置\"（位于页面底部附近）的折叠字段集中的是一组用于视图模式的复选框。对于标准 Drupal 核心安装中的内容（节点），这些模式包括：完整内容、摘要、RSS、搜索索引、搜索结果和打印。值得一提的是，其中两种模式由\
  \ Drupal 核心中包含的搜索模块提供。\n\n默认情况下，摘要只是唯一经过特殊配置的视图模式；其他所有内容（包括完整节点视图）都回退到默认配置。选择额外的视图模式会将其添加到管理显示选项卡下的子选项卡中。\n\
  \n![images](img/square.jpg) **提示** 您可以在自己编写的小型自定义模块中定义额外的视图模式（正如第 33 章中所做的那样），或使用\
  \ Display Suite 模块（`drupal.org/project/ds`）。在使用节点引用显示格式器时，视图模式（在 Drupal 6 的 CCK\
  \ 中称为构建模式）可用于显示引用的内容。当使用 Views 模块（行样式：节点）创建列表时，视图模式也可用，这使其成为构建需要大量字段的基于字段的视图的有用替代方案。这在\
  \ Anjali Forber-Pratt（残奥会运动员兼教育家）案例研究（见`dgd7.org/anjali`）中得到了很好的应用。\n\n#### 修改摘要显示并设置截断长度\n\
  \n摘要视图模式用于作者简介的视图，因此您绝对需要关注其显示效果。摘要的要点是仅显示部分内容，因此这正是利用隐藏字段显示功能的好时机。\n\n1.  在*管理*\
  \ ![images](img/U001.jpg) *结构* ![images](img/U001.jpg) *内容类型* ![images](img/U001.jpg)\
  \ *简介* ![images](img/U001.jpg) 管理显示 ![images](img/U001.jpg) 摘要（`admin/structure/types/manage/profile/display/teaser`）处编辑摘要显示（参见图\
  \ 8–12）。\n\n    ![images](img/0812.jpg)\n\n    ***图 8–12.** 为作者简介摘要视图模式设置截断长度，除头像外所有其他字段均已隐藏。已点击\"\
  显示行权重\"链接以展示无需拖放即可移动字段的方法。*\n\n2.  将头像图片样式更改为*中*，并将图片链接指向*内容*（以便点击头像可跳转至完整的作者简介页面）。\n\
  3.  您在摘要中标记为\"传记\"（机器名`body`）的字段，默认格式为*摘要或截断*，其截断长度设置为 600 个字符。（没错，是字符，不是单词；Drupal\
  \ 因未显示度量单位而失分。）要更改默认截断长度，您需要点击左侧的齿轮图标。要将长度强制限制为不超过 300 个字符，请将格式器更改为*截断*并设置截断长度。\n\
  \n    ![images](img/square.jpg) **提示** \"摘要或截断\"格式器将使用显式定义的摘要，即使该摘要长于其截断长度设置。\"\
  截断\"格式器则始终使用截断长度并忽略任何摘要。这意味着它从主要内容中截取文本，而非从摘要中截取。在 Drupal 7 中，摘要从不被视为指示完整内容断点的方式；如果提供了摘要，它始终是独立的，不被视为完整内容的一部分。因此，如果您使用的文本字段允许包含摘要——正如\
  \ Drupal 默认对每种内容类型所做的那样，提供一个\"长文本和摘要\"类型的正文字段——您可能需要告知用户：在查看完整内容类型时，摘要*不会*显示。\n\n\
  4.  隐藏所有其他字段，您就为作者简介页面构建了精炼紧凑的摘要。\n\n### 使用图书模块制作目录\n\n在 Drupal 的世界里，通常已经存在能实现您需求的模块。接下来\
  \ DefinitiveGuide.org 网站需求就是这种情况：*网站应具有一个目录，并可选择包含章节摘要，所有作者均可编辑和重新排列。*\n\n由章节标题和摘要组成的目录实际上是一个可编辑的页面层次结构，这正是图书模块所提供的功能：\"\
  一组以层级顺序关联在一起的页面\"，如其手册页面所述（`drupal.org/handbook/modules/book`）。您无需走远就能找到这个模块：它就在\
  \ Drupal 核心中。前往*管理* ![images](img/U001.jpg) *模块*（`admin/modules`），您会看到图书模块的描述是\"\
  允许用户以大纲形式创建和整理相关内容\"。听起来不错！\n\n尽管包含在 Drupal 核心中，但图书模块在标准安装配置文件中默认是禁用的。通过勾选图书模块名称左侧的复选框，并单击页面底部的\"\
  保存配置\"按钮来提交此更改，从而启用它。\n\n![images](img/square.jpg) **注意** 图书模块的站内文档（`admin/help/book`）未能说明该模块的配置位置，也未提及它会创建一个内容类型。四处查找启用模块后的变化，是您需要时不时做的事情，但您可以通过改进文档和直接改善用户体验来帮助\
  \ Drupal 及其贡献模块变得更好。先从搜索相应的问题队列开始，添加您的观察结果，或者如果无人报告过问题，则提交一个新问题。改进图书模块帮助页面的事项在`drupal.org/node/1041498`。（除非是针对\
  \ Drupal 8，否则对文本的更改可能不会被接受；即便如此，只有我们主动去做，改进才会发生。关于如何为 Drupal 社区做贡献的更多信息，请参见第 38\
  \ 章。）\n\n首次启用时，图书模块会运行一个安装过程，为您创建一个新的内容类型：*图书页面*。DefinitiveGuide.org 网站计划并未要求将图书模块用于其他目的，因此请接管并编辑其内容类型。\n\
  \n![images](img/square.jpg) **提示** 如果您想为其他内容类型添加大纲功能，您可以随时在*管理* ![images](img/U001.jpg)\
  \ *内容* ![images](img/U001.jpg) *图书* ![images](img/U001.jpg) *设置*（`admin/content/book/settings`）中进行设置。\n\
  \n图书内容类型的编辑方式与其他内容类型相同（并且，作为 Drupal 7 的新功能，可以删除；它就像您自己创建的内容类型一样）。前往*管理* ![images](img/U001.jpg)\
  \ *结构* ![images](img/U001.jpg) *内容类型*，然后点击图书页面的配置链接（`admin/structure/types/manage/book`），如图\
  \ 8–13 所示。\n\n![images](img/0813.jpg)\n\n***图 8–13.** 图书内容类型的编辑表单，已修改为服务于章节内容*\n\
  \n将名称从\"图书页面\"改为**章节**（您可以将机器名保留为`book`），并修改描述以使其适用于章节摘要。您还应对内容类型编辑表单底部整齐堆叠在垂直选项卡中的选项进行一些更改。\n\
  \n1.  在\"提交表单设置\"中，您可以将标题字段标签更改为**章节标题**。\n2.  接下来，在\"发布选项\"中，确保\"默认选项\"同时勾选了\"\
  已发布\"和\"创建新修订版本\"。\n\n![images](img/square.jpg) **提示** 为每种内容类型开启\"创建新修订版本\"。严格限制哪些角色可以删除内容，同时可以宽松地允许哪些角色编辑内容，从而减少永久丢失任何人工作的担忧。我们将在下一节中设置这些权限以及其他权限。\n\
  \n\n\n3.  然后，在**显示设置**中，取消勾选*显示作者和日期信息*选项。默认情况下，Drupal 中的新节点或帖子会包含发布者的用户名和首次提交的时间。在章节摘要中应移除这些信息，因为将章节与发布者关联，而非该章节的实际作者（一位或多位），会产生误导（参见图\
  \ 8–14）。\n\n![images](img/0814.jpg)\n\n***图 8–14.** 选择不在特定类型的内容上显示作者和日期信息（“由……提交”文本）*\n\
  \n4.  现在保存该内容类型。由 Book（书籍）模块最初提供的内容类型现在已配置好，可用于处理 DefinitiveDrupal.org 网站的章节摘要。\n\
  \n#### 设置组织和编写章节的权限\n\n如第 1 章所述，最好在启用新模块或定义新内容类型后尽快设置权限。您刚刚启用了 Book 模块并编辑了其内容类型，因此现在绝对需要检查权限。这包括由\
  \ Book 模块专门提供的权限以及新内容类型的内容类型权限（参见图 8–15）。\n\n对于 Book 模块专门提供的四个权限，管理员可以继续拥有所有权限，而“作者”角色的用户应能够*管理书籍大纲*（以便安排目录）以及*向书籍添加内容和子页面*（以便添加他们的章节）。由于只有一个目录，因此作者无需“创建新书籍”权限。最后，“查看适合打印的书籍”权限应授予匿名用户和已认证用户，不过您也可以稍微优待一下登录用户，仅将权限授予已认证用户角色。\n\
  \n![images](img/0815.jpg)\n\n***图 8–15.** Book 模块的权限设置（`admin/people/permissions#module-book`）*\n\
  \n您还应在权限页面上为刚刚修改的“章节”内容类型设置权限（参见图 8–16）。再次强调，让“管理员”角色保留所有权限。授予“作者”角色所有创建和编辑权限，但不授予删除权限。由于“章节”内容类型已设置为保留修订版本，作者们可以协作修改彼此的章节，但不会永久丢失工作成果。\n\
  \n![images](img/0816.jpg)\n\n***图 8–16.** “章节（书籍）”内容类型的权限，位于“节点”标题下*\n\n![images](img/square.jpg)\
  \ **提示** 您创建的内容类型以及模块提供的大多数内容类型都将受 Node 模块控制，因此在权限表中会列在“节点”项下，并按机器名称（而非显示名称）排序。\n\
  \n与大多数模块一样，一旦启用 Book 模块，它就会向网站的管理页面添加新页面。在这种情况下，Book 模块会向“内容”部分添加一个页面。您现在应该会在*管理*\
  \ ![images](img/U001.jpg) *内容*（`admin/content`）下看到一个“书籍”选项卡，如图 8–17 所示。\n\n![images](img/square.jpg)\
  \ **提示** 在模块管理页面上，模块列表旁边添加的“配置”链接或“帮助”链接可以帮助您找到其设置页面。\n\n![images](img/0817.jpg)\n\
  \n***图 8–17.** “书籍”内容选项卡（`admin/content/book`），显示其“列表”和“设置”子选项卡*\n\n在书籍的管理列表页面上，没有创建新书籍的链接。相反，书籍是通过创建一个启用了大纲的节点来生成的。在“列表”子选项卡旁边的“设置”子选项卡（`admin/content/book/settings`）中，您可以分配哪些类型的内容可以添加到书籍大纲中，但由于“章节”内容类型最初是\
  \ Book 模块提供的“书籍”内容类型，因此它已经被选中。\n\n#### 通过字段向章节内容类型添加元数据\n\n为了在书籍最终顺序未确定时无需编号即可引用章节，章节应具有简短的内部分名称。（在章节草稿中，使用这些“章节机器名称”而非编号来相互引用。）此信息需要与章节摘要一起存储——这显然是向“章节”内容类型添加字段的用例。\n\
  \n1.  从内容类型列表页面——*管理* ![images](img/U001.jpg) *结构* ![images](img/U001.jpg) *内容类型*——您可以点击“管理字段”链接（`admin/structure/types/manage/book/fields`）。（如果您已经在某个内容类型的编辑页面上，可以通过“管理字段”选项卡到达同一位置，该选项卡位于左上角，有七个主题。）\n\
  2.  在这里，我们改进一下主文本区域（正文）字段的标签。通过点击“编辑”链接（`admin/structure/types/manage/book/fields/body`）来编辑正文字段。\n\
  3.  将“正文”标签更改为**章节摘要**，并确保未勾选“必填字段”（使其成为可选项，以便章节除了标题外还可以提供更多内容），然后点击“保存设置”。\n4.\
  \  现在添加一个“章节编号”字段（参见图 8–18）。将此字段设为“整数”类型似乎是合理的做法，但不幸的是，章节包含附录，这些附录使用字母而非数字。因此退一步，使用“文本”字段类型。\n\
  \n    ![images](img/0818.jpg)\n\n    ***图 8–18.** 在内容编辑表单的期望位置上，向“章节”内容类型添加最终字段——“章节编号”文本字段*\n\
  \n5.  您可以通过将最大字符数限制为仅 2 个，来假装自己仍能对数据类型有一定控制，如图 8–19 所示。\n\n    ![images](img/0819.jpg)\n\
  \n    ***图 8–19.** 在添加新文本字段后的第一个字段设置配置页面上，设置其最大长度。*\n\n6.  在下一个配置屏幕上，字段的大小不应大于最大长度，因此也将其缩减为\
  \ 2，如图 8–20 所示。\n\n    ![images](img/0820.jpg)\n\n    ***图 8–20.** 在“章节编号”文本字段的章节设置中，设置文本字段的大小*\n\
  \n7.  其他所有选项可以保持默认值，不过为将要输入字段值的人员添加帮助文本通常是个好主意：*章节编号（整数）或附录字母*。\n\n\n\n#### 设置章节内容类型的字段显示方式\n\
  \n在内容类型的字段设置完成（`管理字段` 选项卡）后，立即着手初步配置这些字段在显示时的外观（`显示字段` 选项卡），这是一个很好的时机。\n\n1.  在此例中，隐藏所有字段的标签，将章节摘要移动到章节编号下方的顶部图片位置，并将图片样式设置为大图，如图\
  \ 图 8-21 所示。\n\n   ![images](img/0821.jpg)\n\n   ***图 8-21.** 为默认视图模式（包括完整内容视图）配置章节摘要内容类型的字段显示——以及设置引用的作者内容的视图模式*\n\
  \n   ![images](img/square.jpg) **注意** 这一节的标题是\"制作目录\"，但你会注意到，实际上我们做的是让目录 *成为可能*。如果这让你感到一点认知失调，那很好——你与大多数你将为其建站的人处在同一个频道上。从\
  \ Drupal 站点构建者的角度来看，一个完成的站点是指能够接收特定内容、将其放置在正确位置并通常执行所有必要操作的站点。从站点发起者的角度来看，一个完成的站点是指所有内容都已编写或添加的站点。在理想情况下，负责更新内容的人会首先添加内容，这能同时实现真实内容、测试和培训。此时你需要确保不会丢失他们的数据；这是通过代码捕获站点功能开发的另一个好处（参见第\
  \ 13 章、第 34 章和附录 A）。\n\n2.  务必至少放入几个示例。第 4 章 提到了 Devel 模块，用于生成预填充了 Lorem ipsum（虚拟填充文本）、随机图片和无意义的分类术语的内容。为了快速粘贴填充文本，还有一个\
  \ Firefox 插件（`sogame.cat/dummylipsum`）。但无论如何，只要可能，最好使用真实示例来测试功能和设计。\n\n3.  对于目录，你需要从创建\"\
  章节\"开始，它将是顶级页面并包含所有其他页面。前往 *添加内容* ![images](img/U001.jpg) *章节*（`node/add/book`）。在这种情况下，章节标题就是书名，内部名称可以是\
  \ `dgd7`。摘要是可选的。\n\n   ![images](img/square.jpg) **注意** 图书模块允许你将书籍的顶级页面创建为一种内容类型，而将子页面保持为另一种内容类型，但这并没有足够的理由让目录的顶级页面拥有真正不同的功能。\n\
  \n4.  操作从内容添加表单上的一个新垂直标签页\"图书大纲\"开始。将\"图书\"从`<无>`更改为`<创建新书>`，Drupal 会就地更新页面，让你知道\"\
  这将是此书中的顶级页面\"。不用担心这令人困惑的措辞，你确实是在创建一个新的图书大纲（参见图 8-22）。\n\n   ![images](img/0822.jpg)\n\
  \n   ***图 8-22.** 创建将成为新书顶级页面的内容*\n\n   ![images](img/square.jpg) **注意** 在顶级页面（因此也就是图书大纲）已经存在后，创建或编辑启用了大纲功能的内容时，你将能够在此处选择那本书。然后，你将获得进一步的选项，为正在创建的新内容选择此书中的父项。\n\
  \n5.  创建你的第一个（或任何）属于图书大纲的内容后，你会注意到它会显示一个用于添加子页面的链接。使用\"添加子页面\"链接向大纲中添加一个章节占位符和几个章节摘要（参见图\
  \ 8-23）。\n\n![images](img/0823.jpg)\n\n***图 8-23.** 图书模块提供的\"添加子页面\"链接（和\"打印友好版本\"\
  链接）*\n\n### 使用菜单区块显示更好的目录\n\n图书模块的大纲功能允许大纲深度达到九层，但图书导航只显示第一层。这意味着如果我们将章节分为书籍的各部分，访问网站的人将只会看到在顶级页面下方以及图书模块提供的区块中列出的各部分。当然\
  \ Drupal 可以做得更好。借助一个你可能没想到能在此处提供帮助的贡献模块——菜单区块，它确实可以做到。\n\n尽管图书大纲不会显示在菜单管理页面上，但图书模块在底层悄悄使用了\
  \ Drupal 的菜单链接。出色的菜单区块模块利用这一点，让你可以精确创建所需的图书导航菜单。下载并安装菜单区块模块（项目页面 `drupal.org/project/menu_block`）。\n\
  \n在安装时，菜单区块模块通过额外提供一条带有管理和设置位置链接的消息来证明其质量（参见图 8-24）。\n\n![images](img/square.jpg)\
  \ **提示** 如果你使用 Drush 安装模块（`drush dl menu_block; drush en -y menu_block`），你仍然会收到模块提供的消息（尽管没有链接）。更多关于\
  \ Drush 的内容，请参见第 2 章和第 26 章！\n\n![images](img/0824.jpg)\n\n***图 8-24.** 安装菜单区块模块时提供的有帮助信息及链接*\n\
  \n1.  再简单不过了——跟随链接进入常规的区块管理页面（`admin/structure/block`）。在 *+* 添加区块链接旁边有一个 *+* 添加菜单区块链接（`admin/structure/block/add-menu-block`）。进入菜单区块表单后，立即点击\"\
  高级选项\"标签页——别担心，它只是（通过 JavaScript）显示表单中几个原本隐藏的部分（参见图 8-25）。\n\n2.  \"区块标题作为链接\"将使区块标题链接到顶级书籍页面，这恰好模仿了当选中\"\
  仅在书籍页面显示区块\"时 Drupal 核心书籍区块标题的行为。不妨保持此行为。\n\n3.  有趣的是，在\"菜单\"中你可以选择 `Definitive\
  \ Guide to Drupal 7`——这是一个图书大纲。奇怪的是，\"父项\"允许你选择它所谓的`<Definitive Guide to Drupal\
  \ 7 的根>`，但真正的根，从图书模块的角度来看，是顶级页面，即下拉选择中的下一个选项：`Definitive Guide to Drupal 7`。\n\n\
  ![images](img/0825.jpg)\n\n***图 8-25.** 目录的关键菜单区块设置（需要高级选项视图才能全部设置）*\n\n4.  在此之下，作为核心区块模块提供的一项功能，你可以立即配置新区块应显示的区域及其可见性设置。通过将主题的区域设置设为\"\
  左侧边栏\"，并在\"可见性设置\"中设置页面为\"在特定页面上显示区块：除列出的页面之外的所有页面\"，然后在框中列出`<front>`，将其放置在除首页之外所有页面的左侧边栏。\n\
  \n![images](img/square.jpg) **提示** 通过主区块列表管理页面为区块选择区域时，由 JavaScript 驱动的 UI 会迅速将其移走并放置到该区域。它可能会出现在该区域的顶部，但保存时实际上会将其放在底部（直到此错误修复：`drupal.org/node/1039666`）。将其移动到您想要的位置，或者将其向下拖一个位置再拖回来（不必松开鼠标），即可使其真正位于顶部。\n\
  \n![images](img/square.jpg) **提示** 如果使用的主题在首页省略了侧边栏，或者以其他方式控制哪些区块在哪些页面上显示，那么在区块配置中匹配这些可见性选项非常重要。否则，Drupal\
  \ 会加载那些区块，然后又把它们丢掉，永远不会显示。Omega 主题（`drupal.org/project/omega`）允许通过 UI 对呈现进行根本性更改，它推荐使用\
  \ Context 模块（`drupal.org/project/context`）来确定区块可见性，以避免加载未显示的区块。\n\n\n\n#### 将目录添加到主菜单\n\
  \n网站访问者需要一种方式查看目录，因此从主菜单链接到它。\n\n1.  在 *管理* ![images](img/U001.jpg) *结构* ![images](img/U001.jpg)\
  \ *菜单* 下，点击主菜单行中的“添加链接”（`admin/structure/menu/manage/main-menu/add`）。\n\n    ![images](img/square.jpg)\
  \ **提示** 在开发网站时，你可能希望将此“添加菜单链接”页面添加到带有黑色加号图标的工具栏中。\n\n2.  输入菜单链接的标题，以及要链接内容的路径（本例中根书籍页面的节点编号是\
  \ 50）。\n    -   菜单链接标题：章节大纲\n    -   路径：`node/50`\n    -   赋予其一个较小的权重（例如 3），仅用于观察其排列位置。\n\
  \n3.  在此页面上对权重的最佳操作是猜测，因此不必过于担心。在保存新的菜单链接后，Drupal 会将我们带到一个列出菜单中所有链接的页面，你可以通过拖放重新排序。\n\
  \n### 将章节与其作者关联\n\n由于网站中既有章节摘要，也有作者简介，我们应该在两者之间建立联系。这可以通过编辑章节摘要文本并插入指向作者简介主页面的 HTML\
  \ 链接来实现。和往常一样，Drupal 的方式更复杂但也更强大。\n\n从技术角度来说，你所做的是从“章节摘要”内容类型引用“作者简介”内容类型。你将在本章稍后看到从另一方向追踪关联的方法——查看作者简介并看到该作者撰写的章节。这与添加到“作者简介”内容类型的“用户引用”字段直接类似。这一次，你将在“章节摘要”内容类型（`admin/structure/types/manage/book/fields`）上配置字段，并添加一个限制为“作者简介”内容类型内容的“节点引用”字段。相同的过程在下一节第三部分“使用节点引用关联内容类型”中有更详细的描述。\n\
  \n![images](img/square.jpg) **提示** 当 Relation 项目（`drupal.org/project/relation`）成熟时（它是\
  \ Awesome Relationships 模块的命名更为谦逊的继承者），你将能够使用一个字段来引用任何实体——例如，如果你使用 Profile2 模块创建了作者简介。在此之前，References\
  \ 项目提供了 Node reference 和 User reference 模块，用于连接任何接受字段的内容与节点和用户。\n\n#### 复用章节的图像字段\n\
  \n与章节摘要类似，资源可以包含图像、图表以及文本内容。\n\n![images](img/square.jpg) **注意** 何时复用字段，何时创建新字段？最重要的考虑因素是，你是否会需要同时从两个内容类型访问该字段类型的数据。如果数据不同，即使使用了相同的字段类型——例如，赛道内容类型中的“英里数”和汽车内容类型中油箱的“加仑数”，两者都以小数形式存储——也要创建一个新字段。然而，与分类词汇表具有相同关系的内容类型应共享同一个字段，就像\
  \ `definitivedrupal.org` 网站上的“建议”、“资源”和原始“文章”都使用“标签术语引用”字段一样。\n\n你可能会希望创建一个视图来查看所有附加到章节或资源上的图像，并且希望这两个内容类型的图像字段行为完全一致。因此，复用章节的图像字段。\n\
  \n#### 允许人们将通用文件附加到内容上\n\n资源内容类型的一个基本目的是包含与章节相关但不适合放入书籍页面中的任何内容——这意味着它绝对需要允许作者上传文件。这只需添加另一个字段——类型为文件。将其标签设为“附件”，机器名设为\
  \ `file`（或者实际上，任何你喜欢的名称）。\n\n1.  文件字段（包括扩展了基本文件类型的图像字段）特有的两个选项是“允许的文件扩展名”和“文件目录”。我们将\
  \ `sql` 添加到允许的扩展名中，以便可以附加以 `.sql` 结尾的数据库文件，并在文件目录中创建一个名为 `resource` 的子目录（请参见图 8–26）。\n\
  \n    ![images](img/0826.jpg)\n\n    ***图 8–26.** 特定于内容类型的文件字段设置：允许的文件扩展名和文件目录*\n\
  \n2.  对于“附件”字段的全局设置，将“值的数量”设为“无限制”。（保留“启用显示字段”的勾选，以便作者可以选择隐藏附件文件并在内容中链接它；对于预设行为，也保留“默认显示文件”的勾选。）\n\
  \n3.  最后一步，资源内容需要一种方式来引用它所附加到的节点，即书籍章节内容类型。\n\n#### 使用节点引用关联内容类型\n\n在本章中你已经使用过 References\
  \ 模块、Node reference 和 User reference，因此你已了解操作流程。\n\n1.  在资源内容类型的“管理字段”页面（`admin/structure/types/manage/resource/fields`）上，添加一个类型为“节点引用”的新字段，在下一页你将可以将其限制为章节内容类型（请参见图\
  \ 8–27）。\n\n    ![images](img/0827.jpg)\n\n    ***图 8–27.** 向资源内容类型添加将引用章节摘要内容的新字段*\n\
  \n2.  将小部件从默认的“自动完成文本字段”更改为“选择列表”，然后保存表单。\n\n3.  对于“可引用的内容类型”，仅勾选“章节摘要”并保存字段设置。\n\
  \n4.  将其设为“必填字段”，将“值的数量”保留为 1，其余设置保持原样，然后保存设置。\n\n#### 管理资源内容类型的显示\n\n现在你已经添加了所有字段，切换到“管理显示”选项卡（`admin/structure/types/manage/resource/display`），并对这些字段的显示进行快速调整。对“默认”显示模式执行此操作；资源预计不会显示为摘要，因此可以忽略该模式和其他显示模式，至少目前可以。隐藏正文标签，将文件附件显示格式更改为“文件表格”，并将章节标题设为内联（请参见图\
  \ 8–28）。\n\n![images](img/0828.jpg)\n\n***图 8–28.** 资源内容类型的“管理显示”表单，默认显示模式*\n\n\n\
  \n### 为网站发帖者赋予面孔\n\n我们喜欢那些留下建议和评论的人，并希望能看到他们的面孔。Drupal 内置了用户头像功能（标准安装配置文件已默认启用）。由\
  \ Arnaud Ligny（`Narno`）创建、Dave Reid（`davereid`）维护的一个模块，利用同名的 Gravatar 服务来使用用户已有的关联头像。（该模块允许使用其他服务，并且很可能开箱即用地支持\
  \ `libravatar.org`。）请下载并安装此模块，你可以在 `drupal.org/project/gravatar` 了解更多信息。\n\n1. \
  \ 在 *管理* ![images](img/U001.jpg) *配置* ![images](img/U001.jpg) *人员* ![images](img/U001.jpg)\
  \ *Gravatar*（`admin/config/people/gravatar`）处进行配置。该模块提供了大量默认图片选项，包括使用你通过用户模块自行上传的默认图片，并且在你选择时能实时预览效果（参见图\
  \ 8–29）。\n\n    ![images](img/0829.jpg)\n\n    ***图 8–29.** Gravatar 模块提供的默认图片（这是对\
  \ Gravatar 服务所提供图片的补充）*\n\n2.  将 Gravatar 尺寸设置为 100 像素——与缩略图图片样式相同（参见 `admin/config/media/image-styles/edit/thumbnail`），该样式是为用户上传的图片设置的（参见\
  \ `admin/config/people/accounts`）。\n3.  对于书籍网站，将图片成熟度过滤器保留为 G（你并不希望将 PG 分级中所有允许的内容都塞进一张图片里）。\n\
  \n现在，当人们发表评论时，无论是否注册为网站用户，只要他们使用的邮箱地址关联了 Gravatar 账户，他们的图片就会显示在评论旁。\n\n#### 显示技巧：图片倾斜\n\
  \nDrupal 7 核心媒体样式的主要用途在于可以分配不同的尺寸，但你也可以对给定的图片样式应用一系列其他效果。第一步是找到 Drupal 隐藏这些图片样式的位置，即\
  \ *管理* ![images](img/U001.jpg) *配置* ![images](img/U001.jpg) *媒体* ![images](img/U001.jpg)\
  \ *图片样式*（`admin/config/media/image-styles`）。\n\n![images](img/square.jpg) **提示**\
  \ 如果站点的状态报告页面（`admin/reports/status`）报告 GD 库存在问题，那么你对图片样式应用旋转或去色效果时，不会看到任何变化。你需要正确安装它；请参阅\
  \ `drupal.org/node/256876`。（Drupal 核心可能会改为允许使用替代的 ImageMagick 库来实现这些图片效果，正如该问题中\
  \ 27 条评论所讨论的：`drupal.org/node/758628`。）\n\n将缩略图（以及用户头像）向左上方倾斜一度，仅仅因为你能够这样做（并看看是否有人注意到）。\n\
  \n如果你不希望每个缩略图都被倾斜并显示在网站的任何位置——默认情况下，上传图片后显示的示例也会被倾斜——那么你应该添加一种新样式，并专门配置用户头像使用它。\n\
  \n![images](img/square.jpg) **注意** 当你读到这里时，Gravatar 模块很可能已经支持对 gravatar 图片进行图片样式转换（参见\
  \ `drupal.org/node/334630`）。目前，你所看到的倾斜效果是通过 CSS3 实现的（参见第 15 章及其在线资源 `dgd7.org/86`）。处理图片的方法不止一种！\n\
  \n### 添加允许使用图片的文本格式\n\n现有的“过滤后的 HTML”文本格式允许用户发布包含基本 HTML 的内容——但不允许包含任何可能危及网站安全的脚本或代码。不幸的是，恶意代码可以嵌入到通过\
  \ `img` 标签包含的文件中，因此用户无法在内容中包含图片。而“完整的 HTML”文本格式虽然允许图片，但安全性**远**低得多，应仅限于管理员和其他高度受信任的用户使用。（用户只需从包含脚本标签的内容中复制粘贴，就可能不经意地向网站添加恶意或仅仅是破坏页面的代码。）结论：如果你想允许未知用户包含一些\
  \ HTML，并允许受信任用户包含图片，就需要创建一个新的文本格式。\n\n文本格式是输入过滤器的集合。输入过滤器在内容输出时处理用户的文本输入。“过滤后的 HTML”文本格式与“完整的\
  \ HTML”文本格式（由标准安装配置文件提供）不同，因为它包含了一个“限制允许的 HTML 标签”过滤器。在 Drupal 7 中，每种文本格式可限制的内容标签都是可配置的。\n\
  \n在“过滤后的 HTML”文本格式所使用的“限制允许的 HTML 标签”输入过滤器中，默认提供给内容作者的允许 HTML 标签略显局限。除了图片之外，如果你想让用户添加标题或上标文本，就需要添加实现这些功能的标签：`img`、`h1`\
  \ 或 `h2` 至 `h6`、以及 `sup`。\n\n1.  要创建新的文本格式，请前往 *管理* ![images](img/U001.jpg) *配置*\
  \ ![images](img/U001.jpg) *内容撰写* ![images](img/U001.jpg) *文本格式*，*+ 添加文本格式*（`admin/config/content/formats/add`），并为其命名，例如“过滤后的\
  \ HTML Plus”（机器名将自动生成为 `filtered_html_plus`）。\n2.  为其指定角色：*管理员*、*作者*和*受信任用户*（前提是你已经创建了后两者）。\n\
  3.  勾选与“过滤后的 HTML”相同的已启用过滤器：限制允许的 HTML 标签、将换行符转换为 HTML、将 URL 转换为链接、以及修正错误和截断的 HTML。（如果你在第\
  \ 4 章讨论该模块时安装了它，请包含“代码过滤器”；确保在过滤器处理顺序中将其设置为位于“限制允许的 HTML 标签”之后。）\n\n    ![images](img/square.jpg)\
  \ **注意** 得益于 JavaScript 的神奇功能，任何在“已启用的过滤器”下新勾选启用的过滤器，都会出现在“过滤器处理顺序”中，支持拖放排序。（在无\
  \ JavaScript 或使用屏幕阅读器的情况下，所有选项都会通过权重选择字段提供。）\n\n4.  相对于“过滤后的 HTML”文本格式，你需要做的唯一更改是在“过滤器设置”中。这里你会有一个“限制允许的\
  \ HTML 标签”选项卡，并能够编辑“允许的 HTML 标签”。以下是扩展后允许标签列表的示例（参见图 8–30）：\n\n    ```\n    <a><em><strong><cite><blockquote><code><ul><ol><li><dl><dt><dd><img><h2><h3>\n\
  \    <h4><h5><h6><tt><output><q><sub><sup>\n    ```\n    ![images](img/0830.jpg)\n\
  \n    ***图 8–30.** 文本格式表单底部垂直选项卡中的允许 HTML 标签配置*\n\n5.  点击底部的“保存配置”保存所有设置，你就拥有了一个允许使用图片的新文本格式，该格式仅对被你授予信任角色的用户可用。\n\
  \n\n\n### 附加内容：简化插入图片\n\n作者们希望为托管在网站上的草稿章节或附加内容添加图片、截图和图表，而读者无疑也希望能留下带有他们与这本书在加勒比海滩或乞力马扎罗山顶的合影的评论。通过两个用于插入并自动调整用户上传图片的贡献模块，你可以轻松实现这一点，它们分别名为\
  \ `Insert`（`drupal.org/project/insert`）和 `Image resize filter`（`drupal.org/project/image_resize_filter`）。\n\
  \n通过 Drush，你对该流程已不陌生：\n\n```\ndrush dl insert image_resize_filter; drush en -y insert\
  \ image_resize_filter\n```\n\n**提示** 许多模块在配置之前不会执行任何操作，有些模块没有自己的设置页面，而是将其配置隐藏在某些已有的管理页面中。我们总是在安装模块后检查页面顶部的消息，因为一些有用的模块会提供说明，甚至是跳转到其管理页面的链接。（Drush\
  \ 会在安装模块时向你返回包含注释的消息，但不包含链接。）\n\n`Image resize filter` 在自我说明方面做得非常出色，它会在注释“图像调整滤镜已安装。在此之前，需要将图像调整滤镜添加到一个或多个文本格式中”之后，提供指向文本格式管理页面（`admin/config/content/formats`）的链接。（请记住，你需要将\
  \ `<img>` 添加到允许的 HTML 标签列表中，就像你之前所做的那样，这样 `Insert` 和 `Image resize filter` 才能按预期工作。）\n\
  \n编辑“完整的 HTML”和你新建的“HTML 过滤增强版”文本格式，在“启用的过滤器”下，为每个格式启用 `Image resize filter`（不要忘记每次都要单击“保存配置”）。\n\
  \n现在你需要配置 `Insert` 模块，在撰写本文时，该模块并未提供任何有用的安装说明。其设置隐藏在每种内容类型或其他实体（包括每种内容类型的评论，你可能需要为此添加一个图像字段并使用此设置）的每个图像字段中。\n\
  \n进入一种内容类型，添加一个新的图像字段，或编辑一个已有的图像字段。你可以为“章节摘要（书）”内容类型改进图像字段，路径为：*管理* → *结构* → *内容类型*\
  \ → *章节摘要* → *管理字段*，点击“图像”一行的 *编辑* 链接（`admin/structure/types/manage/book/fields/field_image/edit`）。你无需更改此字段的任何属性，只需向下找到“插入”设置，该设置处于折叠状态且容易被忽视。\n\
  \n**提示** 请仔细确认已勾选“启用 Alt 字段”。这是站点满足基本无障碍标准的必要条件：每个承载信息的图片都应包含替代文本，以尽可能传达与图片相同的信息。有关更多无障碍信息，请阅读附录\
  \ E。\n\n展开折叠的“插入”字段集，并勾选“启用插入按钮”。将“图片最大插入宽度”设置为 600 像素；这对于使用户更容易设置上传图片的大小非常有用（并能降低大图破坏站点设计的可能性）。\n\
  \n现在，如果用户为“章节摘要”内容浏览图片并立即上传，他们将在图片缩略图旁边看到一个“插入”按钮。当他们点击“插入”按钮时，用于显示该图片的 HTML 将会被插入到文本区域中。`Image\
  \ resize filter` 模块的神奇之处在于，它利用 Drupal 核心的图片处理功能，生成一个大小与 HTML `img` 标签的 `height`\
  \ 和 `width` 属性声明相同的图片版本。这个尺寸正确的图片会被缓存，其性能远优于保持全尺寸且仅由浏览器调整大小的大尺寸上传图片。如果你已经配置了所见即所得编辑器（参见第\
  \ 4 章和`dgd7.org/modules`），这对用户来说通常会变得非常简单：只需拖动图片边框即可调整大小。\n\n**提示** `Insert` 模块会使用完整的\
  \ URL 插入图片，因此，如果你正在从事任何类型的内容暂存工作，或者只是在临时域名下构建站点，然后才正式上线，那么你需要安装 `Pathologic` 模块（`drupal.org/project/pathologic`），启用其输入过滤器“使用\
  \ Pathologic 更正 URL”（是的，这是另一个通过文本格式化系统发挥魔力的模块），并将其配置为将你的本地、暂存或临时域名转换为正式域名（例如，告诉它将\
  \ [`http://dgd7.localhost/`](http://dgd7.localhost/) 视为“本地”域名，以便在正式站点上将其转换为 [`http://definitivedrupal.org/`](http://definitivedrupal.org/)）。`Pathologic`\
  \ 还可以确保你的站内链接和图片能正常显示，即使人们通过 RSS 阅读器或在类似 Drupal Planet（`drupal.org/planet`）的聚合器上查看你的内容。\n\
  \n\n\n### 限制对“建议状态”字段的访问\n\n你已经对网站访客隐藏了某个字段，但如何对拥有编辑权限的人隐藏字段呢？这正是你需要对“建议”内容类型的“状态”字段所做的操作——普通用户应能提交建议，但只有管理员才能设置其状态。幸运的是，有一个模块可以实现这个功能：字段权限模块（`drupal.org/project/field_permissions`）。\n\
  \n1.  字段权限模块启用后，（在撰写本文时）并不会在模块管理页面的条目旁提供“配置”链接。它确实提供了一个“权限”链接，但这仅针对其自身的“管理字段权限”权限，而\
  \ Drupal 已经友好地将该权限授予了管理员角色。权限页面上尚未出现任何新的字段权限。魔力必须在别处开始……啊，就在这里，在“结构”中：*管理* ![images](img/U001.jpg)\
  \ *结构* ![images](img/U001.jpg) *字段权限* (`admin/structure/field_permissions`)。\n2.\
  \  该页面上的表格显示了网站上的所有字段，并针对每个字段指示是否启用了任何权限处理。向下滚动字段列表到`field_status`行（它们按机器名称的字母顺序排序），然后点击**使用于**列中的“建议”。\n\
  3.  这将带你进入“建议”内容类型中“状态”字段的字段设置页面。这与添加或编辑字段时进入的页面相同；字段权限模块只是提供了一种比 *管理* ![images](img/U001.jpg)\
  \ *结构* ![images](img/U001.jpg) *内容类型* ![images](img/U001.jpg) *建议* ![images](img/U001.jpg)\
  \ *管理字段* ![images](img/U001.jpg) *状态* (`admin/structure/types/manage/suggestion/fields/field_status/field-settings`)\
  \ 更便捷的访问方式。\n4.  忽略那个吓人的警告：“数据库中已存在此字段的数据。无法再更改字段设置。” Drupal 核心（在撰写本文时）并不理解字段权限设置（例如，与锁定的“词汇表”设置不同）可以随时更改，这是完全可以接受的（参见图\
  \ 8-31）。\n\n![images](img/0831.jpg)\n\n***图 8-31.** 包含新字段权限选项的字段设置页面*\n\n![images](img/square.jpg)\
  \ **注意** 字段权限的用户界面可能会更改，以避免此类无益的警告和其他奇怪之处，但基本概念可能会保持不变：选择要设置权限的字段，然后通过常规的“权限”页面设置其权限。（不过，有一个不太可能改变的奇怪之处是：字段权限设置是每个字段独立于内容类型的，却只能通过内容类型页面进行编辑。这种方式在\
  \ Drupal 7 的字段用户界面中已根深蒂固。）\n\n5.  勾选以下三个权限：`创建 field_status`（创建内容时编辑）、`编辑 field_status`（无论内容作者是谁）以及`查看\
  \ field_status`（无论内容作者是谁）。这看起来可能有些反直觉——勾选了那些我们本想取消的权限——但这正是字段权限模块的工作方式：一旦选中，每个权限都会成为你可以在主权限页面上编辑的权限（参见图\
  \ 8-32）。\n\n![images](img/square.jpg) **注意** `创建字段` 可能看起来是 `编辑字段` 的一种特殊情况，但字段权限模块并不这么认为——如果你没有在字段设置页面上勾选它以使其在权限页面上可用，那么所有角色在创建“建议”内容时仍将能够设置状态。\n\
  \n6.  请务必留意字段权限模块的以下警告：“启用权限后，默认情况下禁止访问此字段，应从权限管理页面为适当的用户角色显式授予权限。”因此，在你保存字段设置后，前往\
  \ *管理* ![images](img/U001.jpg) *人员* ![images](img/U001.jpg) *权限* (`admin/people/permissions`)，事情会变得更有趣一些。\n\
  \n![images](img/0832.jpg)\n\n***图 8-32.** 字段权限。第一个权限是关于访问模块本身，但所有附加权限控制对字段的访问，并在你在字段设置中选中它们时生效。*\n\
  \n7.  对于你启用的三个权限，将它们授予管理员和作者角色。通过这些设置，非管理员、非作者用户将无法访问“状态”字段。不要忘记在表单底部点击“保存权限”，这样你就完成了对“建议”内容类型状态词汇表访问的限制。\n\
  \n![images](img/square.jpg) **注意** 如果你只想在节点编辑表单上对非特权用户隐藏字段，你可以编写几行实现 `hook_form_alter()`\
  \ 的自定义代码，而不是使用字段权限模块。当然，你也可以编写自定义代码来根据用户角色有条件地显示字段，但这得不偿失。（在这种情况下，网站发起者无法决定访客是否应该看到“建议”状态，因此通过用户界面进行控制是十分合理的。）\n\
  \n### 使用 Pathauto 自动生成人类可读的 URL\n\n这样做比那个笨拙的标题要巧妙得多。第一步，一如既往，是获取所需的模块。Pathauto 的项目页面（`drupal.org/project/pathauto`）需要\
  \ Token 模块（`drupal.org/project/token`），如果你已经安装了一个也需要 Token 的模块（如 Comment Notify），那么它应该已经就位了。\n\
  \n```\ndrush dl pathauto; drush en -y pathauto\n项目 pathauto (7.x-1.0-beta1) 已下载至\
  \                      [success]\n/home/ben/code/dgd7/drupal/sites/all/modules/pathauto。\n\
  将启用以下扩展：pathauto\n你真的要继续吗？(y/n): y\npathauto 已成功启用。 [ok]\n```\n\n![images](img/square.jpg)\
  \ **注意** 如果 Pathauto 所需的 Token 模块尚未为其他模块安装，那么第一行必须改为 `drush dl pathauto token; drush\
  \ en -y pathauto`。\n\nPathauto 不会在管理的“配置”概览部分（也不在“结构”或“内容”中）添加任何链接。如果你足够聪明，查看 *管理*\
  \ ![images](img/U001.jpg) *配置* ![images](img/U001.jpg) *搜索和元数据* ![images](img/U001.jpg)\
  \ *URL 别名*，你会找到 Pathauto 模块提供的四个新选项卡。要开始使用，请转到第一个选项卡：“模式”（`admin/config/search/path/patterns`）。\n\
  \n首先，更改默认路径模式，使其不包含静态文本“content”。默认情况下，Pathauto 会将这个后备模式预填充为 `content/[node:title]`，但“content”这个词是一个无信息量的空间浪费。相反，使用内容类型机器名称令牌\
  \ `[node:content-type:machine-name]`，如下所示：\n\n`[node:content-type:machine-name]/[node:title]`\n\
  \n![images](img/square.jpg) **提示** 你可以通过点击令牌名称将令牌插入到光标所在的文本字段中。\n\n“基本页面”内容类型可以没有前缀——只需使用标题令牌\
  \ `[node:title]`。这意味着，例如，你的“关于”页面路径可能是 *about* 而不是 *page/about*。对于其他所有内容，推荐使用内容类型机器名称和节点标题，效果应该不错。\n\
  \n![images](img/square.jpg) **注意** “建议”内容类型可以做得比通用的“suggestion”替代更好。一旦 Dave Reid\
  \ 在 `drupal.org/node/691078` 中的补丁被提交到 Token 模块，它就可以利用其必填的“建议类型”词汇表的值——该词汇表作为单值分类术语引用字段附加到内容上。\n\
  \n\n\n### 小结\n\n恭喜！你已经构建了一个相当复杂的网站。通过配置 `Views` 和其他精选的贡献模块，你得以展示书籍的作者、呈现目录、将作者和资源链接到章节，并允许访客参与其中。这让你初步体验了不编写任何代码就能在\
  \ `Drupal` 中走多远。（通过编写代码，你可以走得更远，在接下来的章节中介绍主题和模块开发之后，我们将在第 33 章中重新审视这个网站。）\n\n本书出版后，`DefinitiveDrupal.org`\
  \ 网站将通过添加贡献模块以及配置核心模块和贡献模块，持续构建增强功能和新特性。要跟踪这些后续开发进展，可访问 `dgd7.org/moresite`。\n\n\
  ## 第三部分\n\n![images](img/squ.jpg)\n\n## 让生活更轻松\n\n**第 9 章** 可能是本书中最重要的章节：如何融入 `Drupal`\
  \ 社区。\n\n**第 10 章** 针对项目规划与管理这一关键且不可避免的实践，提供了一些额外建议。\n\n**第 11 章** 讲述了如何为客户端和同事记录你的工作，因为只有当别人能理解时，工作才有价值。\n\
  \n**第 12 章** 全部关于如何设置你的计算机，以帮助你配置或编码项目。\n\n**第 13 章** 探讨了让网站上线的问题，并简要提及了后续如何继续。\n\
  \n**第 14 章** 传达了一个信息：通过扫清障碍、实现不受限制的努力，从而从编码或贡献中获得快乐。\n\n## 第 9 章\n\n![images](img/squ.jpg)\n\
  \n## Drupal 社区：获取帮助与参与其中\n\n**作者：Ben Melançon 和 Susan Stewart**\n\n*“Drupal：为软件而来，为社区而留。”*\n\
  \n——Dries Buytaert，Drupal 创始人\n\n你可能想知道 `Drupal` 是如何诞生的，以及它那数以千计的贡献模块、主题、功能、发行版和其他资源来自何方。从局外人的角度来看，`Drupal`\
  \ 社区是一个有些模糊的概念。这些人是谁？是什么让他们成为社区的一部分？对我有什么好处？\n\n`Drupal` 社区，就是所有通过代码、主题制作、翻译、支持、组织或其他途径让\
  \ `Drupal` 变得更好的人。成为社区成员很简单：常驻 `Drupal` 的 IRC、论坛或邮件列表，帮助人们解决他们的 `Drupal` 问题；常驻 `drupal.org`\
  \ 的问题队列，进行缺陷分类、测试补丁或贡献修复方案；创建你自己的 `Drupal` 模块或主题，并在 `drupal.org` 上分享；学习如何用 `Drupal`\
  \ 做某事，然后编写或改进相关文档。\n\n`Drupal` 的内涵远不止其核心下载包中的那些文件。`Drupal` 7 很棒。`Drupal` 5 在 2007\
  \ 年时也很棒。优秀的软件总是在不断进化，以满足新的需求。而驱动 `Drupal` 进化的，是一个充满活力、有血有肉的社区——一个你可以加入的社区。\n\n在\
  \ `Drupal` 生态系统中，并没有一个中央权威来分配任务；成千上万的 `Drupalistas` 各自找到了自己的定位，所有这些定位都在某种程度上促进了\
  \ `Drupal` 的发展。文档编写、提供支持、问题队列分类、补丁测试、修复错误、报告错误、编写测试、以及维护贡献模块/主题，仅仅是 `Drupallers`\
  \ 使 `Drupal` 变得更好的众多方式中的一小部分。\n\n对于新 `Drupalista`，或是首次尝试做出贡献的 `Drupal` 用户来说，这看起来可能像一团乱麻。一群观点、背景和动机各异的陌生人，怎么可能走到一起，构建出像\
  \ CMS 这样复杂的东西，并且还能成功？混沌之中自有秩序，本章旨在帮助你理解这种秩序，并在 `Drupal` 生态系统中找到你自己的位置。\n\n你会发现，在提供支持、编写文档、修复错误、编写代码、制作主题、测试补丁的过程中，你从一个纯粹的消费者，逐渐成长为一名成熟的社区成员。你会比一个纯粹的旁观者更深入地理解\
  \ `Drupal` 的开发周期。当 `Drupal` 的下一个版本逐步成型时，你知道该期待什么，因为你正亲身参与其发布过程。你会成为一名更熟练、更具洞察力、也更有市场价值的\
  \ `Drupaller`。同时，你也会成为更具影响力和效率的 `Drupaller`；当你负责报告错误并帮助修复它们时，你可以让那些最困扰你的问题得到关注。当你向社区贡献代码时，其他\
  \ `Drupallers` 的视线也会聚焦于此；那些想要使用它的人会帮助改进它，而你投入的时间也会获得更多的回报。\n\n简而言之，社区成员的 `Drupal`-foo\
  \ 总是高于消费者——并不是因为你必须很出色才能成为社区一员，而是因为成为社区一员会让你变得更加出色。\n\n### 如何最大化你的参与效果\n\n虽然有很多途径可以让你在\
  \ `Drupal` 世界中初试锋芒，但最快融入核心的方式是通过我们的 `IRC`（互联网中继聊天）频道。`#drupal` 频道有点像自由讨论区，而 `#drupal-contribute`\
  \ 则专注于社区活动——核心开发、贡献模块开发、`drupal.org` 基础设施等等。\n\n或许感受 `Drupal` 社区氛围的最佳方式是挂在我们 `IRC`\
  \ 频道里，观察事态发展。我们大多数人在聊天时都会同时处理多项任务，或者离开时让客户端保持登录，所以没有人会介意那些在频道里但一言不发，或者只是偶尔插句话的人。这里是一个提问的好地方，也是初次涉足问题队列时不可或缺的资源。\n\
  \n### 在哪里可以找到社区\n\n至少有数百个地方可以找到 `Drupal` 社区。虽然有些场所（例如 `drupal.org` 的网络论坛）明显是针对新手，但大多数场所都面向各种经验水平的\
  \ `Drupal` 用户。由于本书是用英文撰写的，我们将重点介绍英文资源。其他语言的使用者可以访问 `drupal.org/language-specific-communities`，查找他们偏好的语言的资源。很可能已经有使用你母语的人在从事\
  \ `Drupal` 相关工作了。\n\n#### 阅读、收听与观看\n\n在任何时刻，`Drupal` 社区中都有大量的事情在发生。跟上所有这些动态的一个绝佳方式，就是通过你身边的\
  \ `Drupallers` 的博客文章、播客和视频。严格来说，阅读和收听并不算与 `Drupal` 社区互动（除非你撰写回复、致电或发布自己的内容），但这是了解情况、学习新技能和感受社区氛围的简便方法。\n\
  \n##### Drupal Planet\n\n`Drupal Planet` 聚合器（`drupal.org/planet`）收集社区成员提交的订阅源中与\
  \ `Drupal` 相关的博客文章，为更广泛的 `Drupal` 社区的新闻和想法提供一个中心来源。在这里，你可以阅读操作指南、公告、聚会和会议的总结报告、别重蹈覆辙的警告、深思熟虑的问题、对\
  \ `Drupal` 未来的思考，以及对 `Drupal` 发行版的评论。换句话说，你可以阅读或观看任何人那天想发布的任何内容。\n\n\n##### 播客\n\
  \n播客（指经轻微编辑后可在线轻松获取的讨论音频记录）多年来一直是 Drupal 爱好者们了解社区动态的一种流行且非正式的方式。目前，Drupal 播客均采用录制形式，而非直播，因此您无法拨入电话提问。尽管如此，部分原因正是由于无需实时回应，它们成为了低门槛入门、感受人们对\
  \ Drupal 所怀有的那份激动——乃至纯粹的兴奋——的绝佳方式。每期节目通常还附带一个评论线程，包含相关链接和后续讨论。\n\n-   `Lullabot`（`lullabot.com/podcast`）是一家知名的\
  \ Drupal 咨询与培训公司，自 2006 年初起便持续制作播客（尽管未严格按时更新）。这些节目通常时长超过一小时，内容广泛，常有五名或更多 Drupal\
  \ 专家参与讨论。在浏览 `lullabot.com/podcast` 时，请务必查看 Kent Bye 精彩的和 Drupal Voices 系列节目，他每次都会采访一位不同的\
  \ Drupal 社区成员；这些播客通常时长约五分钟。\n-   `DrupalEasy`（`drupaleasy.com/podcast`）带来篇幅较长但主题更聚焦的采访式讨论，内容涉及\
  \ Drupal 社区关心的议题。\n-   `Acquia`（`acquia.com/podcasts`）由 Drupal 创始人联合创办，专注于将 Drupal\
  \ 引入企业级项目。它制作短小精悍的播客，通常邀请一位正为 Drupal 代码做出重要贡献的人物。\n-   `Geeks&God` 是一个帮助基督教事工运用科技的播客，其长篇讨论节目中包含对\
  \ Drupal 的特别关注。这类播客可能因其关注将 Drupal 解决方案应用于特定社群而令你感兴趣：`geeksandgod.com/podcast`\n\n\
  之所以列出以上这些网站，是因为截至本书写作时，它们都有持续发布节目的记录。作者将会在 `dgd7.org/podcasts` 上维护一份最新的 Drupal 相关播客列表。\n\
  \n##### Drupal.org 论坛\n\n尽管大多数资深开发者不常光顾，但 `drupal.org/forum` 上的论坛依然非常活跃，主要关注新用户遇到的问题。论坛包含发布付费工作招聘广告的版块、解答\
  \ Drupal 相关问题的版块等等。\n\n##### Groups.Drupal.org\n\n`Groups.Drupal.org`（常简写为 `g.d.o`）让\
  \ Drupal 爱好者们能够围绕某个兴趣主题或地理区域创建群组，从而方便与希望了解相关信息的人分享新闻和资讯。因此，无论你对无障碍性充满热情、居住在印第安纳波利斯大都会区，还是想为报社网站使用\
  \ Drupal，都能找到适合你的 Drupal 群组。如果其他话题更合你的口味，你也可以创建自己的群组。\n\n##### 邮件列表\n\n如果你更希望将 Drupal\
  \ 社区的动态直接送达你的收件箱，可以加入 Drupal 的某个邮件列表。你可以在 `drupal.org/mailing-lists` 找到 Drupal 邮件列表的清单。邮件列表的使用很简单：向列表地址发送一封邮件（请务必紧扣主题！），邮件将会发送给该列表的所有订阅者。你可以像阅读和回复普通邮件一样阅读和回复列表中的消息。大多数人发现，告诉他们的邮件客户端将列表邮件归类到特定文件夹，有助于减少收件箱的混乱。\n\
  \n##### 面对面交流\n\nDrupal 每年举办两次大型会议、众多参与度高但形式更随意且通常免费的 Drupal Camp，以及遍布全球数不胜数的 Meetup。DrupalCon\
  \ 通常在 `drupal.org` 首页及其他地方发布公告。寻找你当地的 Drupal Camp 和 Meetup 的最佳途径是 `groups.drupal.org`\
  \ 上你所在地区的群组。\n\n##### Drupal Camp\n\nDrupal Camp 可能是线下 Drupal 活动中对新手最友好的。Camp 在全球许多地方举办，通常免费或费用极低。Camp\
  \ 一般由本地 Drupal 群组的志愿者组织，你无需成为 Drupal 专家就能在 Camp 中帮忙。在布置和撤场、分发午餐、记录会议或为参会者登记等方面，总是需要帮助的。\n\
  \n参加 Drupal Camp 是以较少花费学习 Drupal 新知识的绝佳方式；而在 Drupal Camp 工作，你不仅能学到这些，还能有机会与本地 Drupal\
  \ 社区建立联系，并让自己成为一名积极的贡献者。\n\n##### DrupalCon\n\nDrupalCon 是 Drupal 社区每年举办两次的会议，春季在北美，秋季在欧洲。来自数十个国家的数千名\
  \ Drupal 用户汇聚一堂，其结果总是令人惊叹。DrupalCon 的参会人数已从 2007 年（加州桑尼维尔）的大约 300 人增长到 2010 年（加州旧金山）的大约\
  \ 3000 人，并在 2011 年（伊利诺伊州芝加哥）达到更多。DrupalCon 提供数十场讲座，内容涵盖从社区参与到数据库抽象层等方方面面，均由创建和维护\
  \ Drupal 的人主讲。\n\n然而，如果只参加 DrupalCon 的正式讲座，你将错失良机。规模较小的“BoF”（同好交流会）为在学习过程中进行更深入的互动提供了机会，而即兴的“走廊交流”同样宝贵。此外，每晚的正式活动结束后，一群来自五湖四海的\
  \ Drupal 黑客会聚集在 Chx 编程者休息室进行通宵开发。编程者休息室是一个绝佳的机会，你可以与我们一些最多产的贡献者进行面对面交流，或在将自己的贡献变为现实的过程中获得帮助。\n\
  \n##### Drupal Meetup\n\n如果 DrupalCon 或 DrupalCamp 对于你初次涉足线下 Drupal 世界来说规模太大，或者你需要在这些活动之外更频繁地获得\
  \ Drupal 相关的交流，那么答案就是你当地的 Drupal Meetup。\n\n最全面的 Drupal 活动列表可以在 `g.d.o` 的 `groups.drupal.org/events`\
  \ 上找到。这是了解特定日期活动举办地点的好方法，但除非你准备好可能飞越数千英里去孟买参加一场 Drupal Meetup，否则按日期查找活动可能不是最实际的方式。相反，花点时间加入你本地的\
  \ Drupal 群组会更好。\n\n![图片](img/square.jpg) **提示** 没有任何权威机构授予组织 Drupal Meetup 的特权，任何人都可以组织。如果你所在的地方没有\
  \ Meetup 群组，哪怕是在城市的一个街区、郊区，或者仅仅是在定期安排的 Meetup 活动之间，你也可以自行组织一次。这是关于 Meetup 的另一个窍门：你不需要了解任何\
  \ Drupal 知识就能组织或帮忙，更不用说参加了！有规划地组织 Meetup（至少邀请一位 Drupal 专家）并进行一些推广会更好，但资深 Drupal\
  \ 用户 Cristefano 创下了一个响应速度记录：在本文作者仅提前半小时通知的情况下，他就出现在了马萨诸塞州剑桥市的一场 Drupal Meetup 上。关于组织和举办\
  \ Meetup 的更多内容，请参见第 38 章。\n\n考虑到这可能会吸引一些甚至从未见过 `g.d.o` 的人，一些 Drupal 用户自掏腰包在 `Meetup.com`\
  \ 上维护 Drupal 群组。除了真正的本地 `Meetup.com` 群组外，还有一个 Drupal Meetup 群组试图追踪全球范围内的 Drupal\
  \ 活动（`meetup.com/drupal-worldwide`）。不过，任何在 `Meetup.com`、Facebook 或其他服务上发布 Drupal\
  \ 活动的人，都被鼓励也发布到相应的 `groups.drupal.org` 群组中。\n\n\n\n#### IRC\n\n要最直接地参与 Drupal 社区，请前往\
  \ IRC（互联网中继聊天）。你可以在 `drupal.org/irc` 找到设置说明和 Drupal 所有 IRC 频道的完整列表。所有主要频道都位于 `irc.freenode.net`：`#drupal-support`\
  \ 频道解答支持问题，`#drupal` 频道进行一般讨论，任何涉及社区贡献的内容都可以在 `#drupal-contribute` 频道中讨论。此外还有数十个特定频道以及基于语言和地区的频道。\n\
  \n与其他任何聚会场所一样，IRC 也有其自身的习惯和礼节。为了帮助你顺利融入，而不至于感到或表现得像个局外人，以下是一些需要记住的要点：\n\n- 在正确的频道提问。`#drupal-contribute`\
  \ 不是寻求网站帮助的地方；`#drupal-support` 才是。请参见 `drupal.org/irc` 上的列表，了解所有 Drupal 频道的信息。\n\
  - 无需请求许可再提问；这就是我们的目的。不要问谁在使用某个模块，或者是否有人可以帮你解决问题。要问具体的问题，比如“我在面板中有一个视图，如何向它传递参数？”\
  \ 向每个人保证可以提问，或者向每位访客介绍我们的履历，会被视为浪费时间——并且是对志愿者工作的不尊重。\n- 向整个频道提问。只在有人开始帮助你之后，再高亮提及他们（通过完整说出他们的昵称）；这有助于他们轻松地跟上对话。\n\
  - 未经频道内许可，不得向任何用户发送私信（pm）。支持性讨论保留在频道内，以便每个人都能参与，并且让志愿者有一个地方来跟踪他们正在帮助的所有人。\n- 切勿将大量代码（超过一两行）、日志条目或其他文本粘贴到\
  \ IRC 频道中。相反，应将其粘贴到 pastebin（例如 `drupalbin.com`）中，并向频道提供该粘贴内容的链接。\n- 在提问前先快速进行互联网搜索。很可能已经有人针对你的问题撰写了文档，而且这些文档可能比你在\
  \ IRC 上得到的回答更详细，或者至少能为你提供信息，让你能问出更有针对性问题。\n- 不要重复提问，尤其不要向多个频道重复提问。如果任何能帮助你的人在关注，他们会帮助你。如果没有，你应该考虑在论坛或邮件列表中提问。重复提问会干扰其他对话，从而影响志愿者的工作流程；在一个空频道中，它会向所有人发出新对话的提示，而实际上并没有新对话。（半天后，或在一天中的不同时间再试一次是合理的，特别是如果你已经完善了你的问题，并且希望引起某位知情者的注意，附上问题或论坛帖子的链接。）\n\
  - 务必保持礼貌。每个在 Drupal IRC 上的人都是因为他们享受 Drupal 社区的支持氛围。当人们粗鲁无礼时，志愿者们会感到沮丧、倦怠甚至离开。保持愉快的氛围能让更多人愿意贡献他们的时间。\n\
  - 使用正确的英语（或非英语频道使用恰当的语言）。火星文（txtspk）和**黑客语（13375p34k，英语的网络和移动通信现代变体）**对有些人来说是令人厌烦的，对另一些人则完全无法理解。使用正确的英语只需多敲几次键盘，却能让你的问题更有可能得到回答。\n\
  \n“如何聪明地提问”（`catb.org/~esr/faqs/smart-questions.html`）和“常见支持吸血鬼的习性与特征”（`binaryredneck.net/support-leech`）是学习该做什么和不该做什么的必读文章。\n\
  \n新手们常常会发现 IRC 比网络论坛需要更多时间来适应。这确实如此，但付出努力绝对值得。花时间学习 IRC 习俗的回报是，你有机会让这些频道中成百上千的经验丰富的\
  \ Drupal 高手回答你的问题，其中包括一些最活跃的贡献者。\n\n当你不提问时，也请在 Drupal 频道里挂机（闲逛）。你或许能帮助他人解答问题，甚至参与关于\
  \ Drupal 未来的深入讨论。而且你肯定会经常学到新东西。\n\n**提示** 要厚脸皮。才华横溢的 Amitai Burstein 将受欢迎的 Organic\
  \ Groups 项目改造得充分利用了 Drupal 7 的新功能（见第 5 章），同时他还改了名并征求社区意见。一位受尊敬的核心贡献者（据多方描述，人也非常好）毫不客气地反对改名。Amitai\
  \ 指出了言辞的尖锐，并收到了这样的回复：“是的——我严厉一点是想清楚地表明，我认为这真是一个坏主意。”如果每个能为社区做出贡献（或从社区获益）的人，在第一次被别人不合理（或合理）地严厉批评时就离开并退出，那么这里就不会剩下任何人了。\n\
  \n\n#### 议题队列\n\n有众多绝佳场所可以接触 Drupal 社区，但社区的核心当属 Drupal 议题队列。议题队列本质上是一个协作式待办事项列表，贡献者们在此汇聚一心完成工作。Drupal\
  \ 核心、每个贡献模块和主题都在`drupal.org`上拥有各自专属的议题队列。\n\nDrupal 核心的议题队列位于`drupal.org/project/issues/drupal`，你可以通过`drupal.org/project/issues/projectname`（其中`projectname`为模块或主题项目名称）或其在`drupal.org`项目页面上的链接找到对应项目的队列。\n\
  \nDrupal 的大部分核心代码与社区基础设施决策都是在议题队列中产生的；模块和主题亦是如此。正是通过成千上万的渐进式改进，Drupal 才得以持续优化。有人发布任务、漏洞报告或功能请求，其他人则进行确认、评论等操作。有人提交补丁，其他人则进行测试。\n\
  \n从你在 Drupal.org 的个人资料编辑页面，可以在“区块配置”下勾选“贡献者链接”，从而获得参与 Drupal 开发所需的一系列实用链接，其中包括查看各类正在处理中议题的多种方式。第\
  \ 38 章简单介绍了如何使用议题队列来审查或提交补丁，而第 37 章则关于如何使用 Git 维护项目，其中涵盖了如何将自己的项目提交到`drupal.org`以便他人发现（并参与其议题队列）。在投入其中之前，以下是一些值得了解的提示：\n\
  \n-   你无需成为专家也能在议题队列中做出贡献。议题分类（例如将重复议题标记为重复、在措辞模糊的漏洞报告中请求更多信息等）本身就是巨大的帮助，测试他人编写的补丁同样如此。这些活动也是结识其他\
  \ Drupal 开发者并熟悉代码库的绝佳途径。你可以通过 Angela Byron 在`webchick.net/6-pass-patch-reviews`上的精彩博文了解更多关于补丁测试的知识。\n\
  -   在提交漏洞报告之前，请先搜索漏洞追踪器，确认是否有人已经提交过。重复的议题会阻碍进展，因为最好的情况是有人需要花时间标记重复；最坏的情况则是无人注意到重复，直到能量已经被耗费在处理同一个问题的多个副本上。\n\
  -   撰写漏洞报告时，请尽可能具体，包含关于你的 Drupal 安装及其运行环境的相关信息。\n    -   仔细清晰地描述问题、漏洞（或缺失功能）的症状。\n\
  \    -   描述问题发生的环境（Drupal 版本、浏览器、服务器、操作系统）。\n    -   描述你在提问前为尝试自行定位问题所采取的步骤。\n \
  \   -   描述服务器设置或网站配置中任何可能相关的近期变更（即使看起来似乎无关）。\n    -   最重要的是，提供他人重现该问题所需的一切信息。\n\
  -   提交漏洞后，请跟进。通常，修复问题的人需要更多信息才能重现问题（并开始着手修复）。\n\n### 总结\n\nDrupal 社区包括网站管理员、程序员、设计师、主题制作者（或前端开发者）、网站所有者、项目经理、系统管理员、社区组织者、多面手、文档志愿者、讲师，甚至还有遍布六大洲的营销人员。（曾有人——\"\
  无脖\"诺埃尔·伊达尔戈——勇敢地尝试将 Drupal 的代表带往南极洲，但他未能从智利南端搭上便车。）\n\n大多数人身兼多职，并常常定义出新的类别（例如诺埃尔·伊达尔戈，一位“开放社区、自由文化和透明政府的倡导者”）。社区成员在\
  \ Drupal 之外的兴趣多种多样且并不集中，尤其是当许多人是为了给自己的兴趣社区寻找在线平台而发现 Drupal 时。（事实上，Dries Buytaert\
  \ 最初创建 Drupal 就是为了让那些想讨论新互联网技术的人们能够相互交流。）尽管有一种强烈的观点认为 Drupal 频道中的一切内容都应与 Drupal\
  \ 相关，但 Drupal 社区成员的其他兴趣和特质正日益被接受为其 Drupal 身份的一部分。Drupal 社区的共同主线是用 Drupal 做事——特别是，用\
  \ Drupal 创始人的话来说：“创新、协作、分享、力求简约，并享受其中。”\n\n是什么使人成为 Drupal 社区的一员？这不仅仅是使用 Drupal。即使是某些网站管理员和\
  \ Drupal 程序员也可能在 Drupal 社区中并未扮演重要角色，而网站访问者和参与者当然可能从未意识到他们正在使用 Drupal 网站。\n\nDrupal\
  \ 社区就是那些参与 Drupal 社区的人。这听起来像同义反复，然而正是参与的行为，是将某些东西回馈给社区的行为，构建了社区。我们回馈的东西不一定是物质意义上的贡献；它可以仅仅是我们自身的存在。成为\
  \ Drupal 社区的一部分可能表现为：\n\n-   在 Drupal.org 上与世界分享一个模块或主题。\n-   为别人的模块或主题建议一行代码。\n\
  -   对解释某行 Drupal 代码的评论提供一个词的修正。\n-   在当地的咖啡馆或图书馆召集一次 Drupal 线下聚会——或者仅仅出席一次。\n- \
  \  在互联网的任何地方撰写一篇博文，讲述解决的一个 Drupal 问题，或用 Drupal 完成的一件酷事。\n-   在众多沟通渠道中的任何一个上，对某人的问题给出有用的回应。\n\
  -   在参加 Drupal 会议期间的跳伞辅助行程中，坐在皮卡车后座讨论商业实践和 Drupal 8 设置 API（应用程序编程接口）的改进。\n-   在世界任何地方的\
  \ Drupal 活动中，亲自演示一个网站、提出一个问题（或回应他人的演示或问题）。\n\n在 Drupal 社区中的成员身份和地位并不基于学术意义上的“功绩”或专业认证之类的东西。其他\
  \ Drupalistas（Drupal 社区成员）看重的不是我们知道什么或拥有什么资质。真正重要的是我们做了什么。第 34 章涵盖了我们回馈 Drupal 的众多方式（其范围远不止代码本身）。\n\
  \n阅读这本书本身并不会让我们成为 Drupal 社区的一员。去和 Drupal 社区一起做点什么，或者为 Drupal 社区做点什么，才能让我们成为 Drupal\
  \ 社区的一员。向他人求教并与他人分享知识，构建一些东西并回馈一些东西，这既能构建社区，也能让我们成为其中的一部分。欢迎！\n\n![images](img/square.jpg)\
  \ **提示：** 虽然大多数 Drupal 参与应围绕 `*.drupal.org` 系列网站展开，但你也随时可以访问本章的在线主页 `dgd7.org/participate`，寻求更多关于参与\
  \ Drupal 社区帮助的信息。\n\n## 第 10 章\n\n![images](img/squ.jpg)\n\n\n\n"
- "# 规划与管理 Drupal 项目\n\n**作者：艾米·斯卡瓦达**\n\n欢迎！本章主要讲解如何规划与管理 Drupal 网站项目。你已经了解了 Drupal\
  \ 的强大功能，现在准备动手搭建一个属于自己的网站。\n\n请带着适度热情来阅读本章：搭建网站比看上去要难得多，我有很多蹩脚的比喻来形容这种难度。就像试图用金属构件拼装一套秋千，或者坐过山车却没有轨道。请对未来充满期待，但也要明白并非一切都会一帆风顺。用\
  \ Drupal 搭建网站也是一个创造性过程，因为它需要思考、才能和技术学习才能实现既定目标。给初学者的最佳建议是：摒弃对“什么容易、什么困难”的任何先入之见。只管让自己去学习，享受当新手的感觉。\n\
  \n本章将涉及：制定目标、清晰定义需求、学会将大型项目分解为小模块来应对、了解需要研究什么才能最终完成项目。同时也会谈到时间管理、帮助项目顺利推进的若干项目管理方法论，以及一个合理的项目计划应该是什么样子。我会逐一讲解\
  \ Drupal 中影响规划的各个部分、需要注意的事项，以及最大的挑战是什么。\n\n读完本章后，你应该能够清晰定义自己想要构建的内容，并对各部分需要完成的工作有个粗略的轮廓。你还会了解项目经理的职责。更棒的是，你将能够把这些职责分解为可管理的任务，并掌握完成这些任务所需的工具。\n\
  \n### 局限性的作用\n\n*“人生重要的不是开始什么，而是完成什么。”*\n\n——凯瑟琳·赫本\n\n在规划项目时，必须意识到局限性的存在。设定“你很棒，明天这个时候就能建成一个完整的社区网站”这样的期望固然很好，但这并不合理。更好的做法是了解自己的局限性，因为这样你才知道在合理时间内能承诺完成什么——这才是真正厉害的地方。\n\
  \n了解自己能为一个项目投入多少时间是第一步。这样一来，当遇到非常庞大的任务时，你就能清楚地知道自己能付出多少努力，同时保持头脑清醒。这通常被称为“工作与生活的平衡”，但本质上是指能够维持那些保持你自身生产力的系统。如果你没有留出足够的时间来处理自己的邮件、人际关系和洗衣等琐事，那么在完成这个项目的过程中，你将没有生活可言，对任何人来说都不会有趣。\n\
  \n虽然理论上可以在 60 分钟内让一个网站上线运行，但我通常为初始建站安排 4 小时。我希望确保能正确配置开发托管环境、设置好邮件（Google Apps）和\
  \ SMTP 服务器、让 DNS 服务器指向正确位置、完成 Drupal 安装、安装模块、应用主题并添加一些内容 ^(1)。虽然这些任务可以分散在几天内完成，每次花一小时左右，但我发现这样会忘记下一步该做什么。一个功能完整、邮件正常运转并包含一些占位页面的网站，至少给了我一个起点。\n\
  \n### 将概念落于纸面\n\n一旦清楚自己能为建站投入多少时间，就要思考你想构建什么样的网站。\n\n以下是我设想的 1 到 10 难度等级：\n\n1.\
  \ “我对网站有一些想法，但概念还没完全确定。”（也就是“我打算在自己电脑上安装 Drupal 并玩玩看。”）^(2)\n2. “我已经有了这个网站的概要，可能也知道标题是什么。我注册了一个域名。”（这是我预算花\
  \ 4 小时完成的裸站搭建。）\n3. “我有一个很久以前用 Dreamweaver/Publisher 搭建的网站，但可以以纯文本文件形式导出内容。这周我不想改进它，但想迁移到一个新网站。”\n\
  4. “我很久以前搭建的网站有很多内容需要迁移，比如一个相册或是我自 2001 年以来的所有博客文章。”\n5. “我有一个需要迁移的网站，它有个定制设计。我想在新的系统中重现这个设计。”\n\
  6. “我有一个新社区网站的想法，会有一些用户，并且我会先放一些内容上去。”\n7. “我想要一个新的社区网站。我有大量需要动态提供的内容，会有很多用户，并且我希望他们能通过六种不同的方式互相交流。”\n\
  8. “我已经有一个社区网站了。我想把所有现有内容迁移过去。我想把现有的所有用户也迁移过去。另外，我还想添加地图、地理位置、来自不同网站的 feed 以及私信功能。”\n\
  9. “我有三个不同的网站想迁移到 Drupal。它们都需要与现有用户协同工作，但我不想更改任何密码。用户之间可以通过 10 种不同方式互动。我现在有很多内容，但不想全部迁移，所以需要决定哪些内容需要迁移，哪些需要在新网站上重新创建。而且我也厌倦了现在的设计，想尝试些新的。”\n\
  10. 与第 9 点相同，额外加上“我需要它在三周内完成。或者最好是昨天。我今天能建好这个网站吗？”\n\n_________\n\n¹ 更有经验的开发者可能会预算更少的时间（比如\
  \ 2 小时）。我做得不够频繁，不敢保证在关键时刻不会漏掉某个步骤，所以预算 4 小时来给自己留出慢慢推进的空间。\n\n² 注：你不需要在自己电脑上安装 Drupal\
  \ 就能玩转它（可以试试 [`http://buzzr.com`](http://buzzr.com) 上的 Buzzr 或 [`http://drupal.gardens.com`](http://drupal.gardens.com)\
  \ 上的 Drupal Gardens），但安装练习一下也不错。\n\n这些只是粗略的草图；每个类别都有成千上万的例子。我的期望是你不要试图独自处理难度超过 6\
  \ 的项目。我特意没有提及“我希望能在网站上销售东西”，因为添加商店通常会使任何项目的复杂度提升一个等级。所以这个等级有可能达到 11，但任何超过 5 的级别通常需要不止一个人的帮助，而超过\
  \ 6 的级别则需要 3 到 10 个人的时间和投入。\n\n如果你对自己的目标有了想法，开始做笔记，思考你的想法可能属于哪个类别。你的网站目的是什么？谁会使用它？如果很难缩小范围，试着思考它*不是*什么。这是你的头脑风暴空间。\n\
  \n在深入头脑风暴之前，请先看看图 10–1，它展示了网站开发的完整生命周期。\n\n![images](img/1001.jpg)\n\n***图 10–1.**\
  \ 项目生命周期*\n\n\n\n### 难度等级与项目生命周期\n\n难度等级会考虑到这一生命周期。一个处于最初阶段的项目，其复杂程度远低于正在进行第四次迭代的项目。较为成熟的项目不再是从一个空泛的想法起步；它们已经拥有了既定的内容或用户，或者正在从一个已无法满足其全部增长需求的系统中迁移。请记住，你的项目也可能需要随着时间推移而发展。`Drupal`\
  \ 在接收来自各种来源的输入并以多种格式输出信息方面表现得相当出色。它很灵活，但它只是将你的需求落实到纸面上的工具。接下来，我们将使用图 10–1 中的阶段来逐步了解项目生命周期。\n\
  \n#### 1. 发现阶段\n\n如果你刚刚起步，那么你就处于发现阶段：我想要什么？它需要做什么？它看起来是什么样子？谁参与这个项目？谁是决策者？\n\n项目计划产生于发现阶段；这些计划将为生命周期的其余部分提供信息。它们是指导性文档，有助于确定项目的范围和进度。\n\
  \n#### 2. 信息架构\n\n信息架构是指将这些头脑风暴具体地落实下来。线框图可以让你构建一个原型，展示页面将包含哪些信息。可以将其视为网站的蓝图，就像建筑师为房屋绘制设计图一样。图\
  \ 10–2 是使用 `GoMockingbird` 创建的视频网站线框图示例。([`http://gomockingbird.com`](http://gomockingbird.com))\n\
  \n![images](img/1002.jpg)\n\n***图 10–2.** 线框图示例*\n\n这描绘了页面上的信息布局。有一个整个网站的标题，也可以是一张图片。有登录和注册链接，这意味着该网站有用户。有一个搜索栏以及指向\
  \ Facebook 和 Twitter 的链接。有一个主要内容区域，用于放置视频和文本。还有一个用于放置相关内容的侧边栏。这个线框图提供了视觉参考，设计师可以在此基础上进行工作，而无需从头开始重建一个网站。\n\
  \n信息架构阶段的另一个部分是功能需求。功能需求旨在捕获网站需要具备的所有特性以及它需要做什么。功能需求不是关于“怎么做”，而是关于“做什么”。如果你能用简单的语言回答出需要发生什么，这就是功能需求的开端。\n\
  \n#### 3. 设计阶段\n\n一旦你拥有了所有内容放置位置的线框图，设计阶段就会为其“穿上衣服”，增添外观和感觉。颜色、字体、网站的外观——这一切都在这个阶段完成。设计完成后，它看起来会像一个网站，但这仅仅是一个\
  \ `Photoshop` 文件。警告：人们会期望 `Photoshop` 文件中能实现的任何效果，网站都能完全匹配。有时 `Photoshop` 文件会超出技术可行性的范围。期望一个箭头恰好位于链接\
  \ 3 像素处，最终只会导致失望。将期望调整为链接旁边会有一个箭头，则更容易实现。\n\n#### 4. 开发与实施阶段\n\n如果说功能需求是“做什么”，那么开发和实施（连同时间表和项目计划）就是“怎么做”。所有你提到过需要的东西——正是在这个阶段，你需要决定需要多长时间以及由谁来负责实现。正是在这个阶段，线框图被转化为实际运行的网站，设计被添加进去，网站开始看起来像你在浏览器中会看到的样子。但还有一些东西缺失了。\n\
  \n#### 5. 内容阶段\n\n网站的灵魂是内容：故事、照片和视频。这是项目中你添加内容的阶段。它也将引领你进入质量保证阶段，在此阶段你要确保网站按照你的预期运行并呈现。如果没有，你要么修复它，要么改变你对需求的想法。\n\
  \n#### 6. 部署/发布阶段\n\n你的网站已完全完成。它已准备好上线，但如果你操作正确，你应该有两个独立的环境：一个用于开发的测试环境，一个用于生产、供全世界在浏览器中看到的环境。你需要将所有内容从开发站点迁移到生产站点。这需要一些时间和工作量。\n\
  \n你还需要检查所有的工作。链接是否正常工作？添加内容时，你是否记得开启了自动路径生成器，以便 URL 不是 `/node/X`？你所有的图片是否都正确迁移了？在迁移过程中是否丢失了文件目录？主题在\
  \ IE6/IE 7/IE8、Firefox 和 Safari 中是否正常工作？检查你的视图，确保它们格式正确并显示你想要的内容。浏览器 URL 栏顶部的收藏夹图标是否丢失了？这也是你测试多个用户角色的机会。匿名用户是否能看到你不希望他们看到的内容？检查并确认。准备一个电子表格，记录下来在更改域名指向新站点之前需要更改的所有内容。\n\
  \n#### 7. 维护阶段\n\n你的项目在运行过程中很可能需要更新：模块会更新，`Drupal` 核心会发布安全更新，`Drupal` 的新版本也会出现。最终，你会想利用新功能或新设计，或者你会想彻底改变网站，于是生命周期将重新开始。\n\
  \n\n\n### 项目管理方法论与 Drupal\n\n生命周期各阶段会被记录到整体项目计划中，而项目计划本身也受方法指引，帮助你取得成功。这里有几种思考方式，以及一些值得提及的项目管理方法论。Drupal\
  \ 采用了两种基本方法论：更传统的“瀑布”模式和更迭代的“敏捷”模式。\n\n瀑布模型源于传统项目管理。规划者假设存在有限数量的任务（无论任务列表多么庞大），并且每个任务都可以按顺序排列以完成项目。所有任务都在项目开始前进行预估并已知晓。这种模式通常用于大型建筑项目或最终有非常具体交付物的项目。瀑布模型通常也基于精确的预算或精确的时间表。例如，当我策划一个活动（如会议）时，我倾向于使用瀑布模型作为指导原则来确保一切按部就班。我知道无法调整时间表，所以我会在时间范围内尽力而为并确保成功。\n\
  \n敏捷是用于规划项目的迭代过程。它假设你对最终交付物的了解不那么充分。这是一个与项目中所有利益相关者协作的过程。它强调规划中的团队合作、短周期的开发，以及通过反馈来调整项目目标。当我在没有计费时间的内部项目或没有严格截止日期的项目上工作时，我倾向于使用敏捷。敏捷对于启动那些信息不足、无法有效应用瀑布模型的项目效果很好；然而，当尝试完成一个有固定发布日期、具体预算和许多必需功能的项目时，敏捷就没有那么有用了。\n\
  \n了解这两种方法都很有用，因为 Drupal 项目可以从两者的结合中受益。在表 10-1 中，我将任务分解为受益于瀑布方法的任务和受益于敏捷方法的任务。\n\n\
  **表 10-1.** 按 Drupal 项目阶段划分的瀑布与敏捷方法\n\n| | **使用瀑布方法的 Drupal 任务** | **使用敏捷方法的 Drupal\
  \ 任务** |\n| --- | --- | --- |\n| 发现阶段 | 记录项目计划、时间线规划 | 头脑风暴 |\n| 信息架构 | 功能需求 | 线框图\
  \ |\n| 设计 | （设计工作很少适合瀑布模型） | 创建设计布局 |\n| 开发 | 仅在功能需求的高层次匹配上 | 构建站点的所有功能，创建站点。 |\n\
  | 内容暂存 | 决定添加哪些内容 | 在冲刺周期中积极工作效果最佳 |\n| 质量保证 | 与功能需求匹配 | 效果不佳 |\n| 部署/上线 | 上线清单检查\
  \ | 效果不佳 |\n| 维护 | 无方法论偏好 | 无方法论偏好 |\n\n总的来说，如果项目存在很多不确定性，敏捷会带来更好的最终产品。随着你对项目及其需求越来越熟悉，你就能更好地在后期过程中添加更多功能。\n\
  \n瀑布模型能让你事先描绘出所有内容，几乎不留不确定性。你会知道什么时候上线，你的最小可行产品是什么，以及成本是多少。随着你对项目越来越熟悉，如果不改变项目范围，你可能无法利用一些绝妙的创想。\n\
  \n站点构建和实现正是“敏捷-瀑布”混合模式发挥作用的地方。你的团队可能会在专注的敏捷环境中工作得更好以完成任务，但你的客户可能不习惯看到敏捷过程。项目经理可以用瀑布风格来规划生命周期（我会在\
  \ X 时间点完成某项工作），但通过敏捷用户故事来管理团队的工作。如果你不必在试图了解客户项目需求的同时解释敏捷如何运作，那么开发和项目管理都会轻松得多。\n\n\
  ### 将生命周期落实到纸面上\n\n现在你对自己要构建什么有了清晰的概念，并且对如何构建有了初步思路。现在你需要回答这些问题：\n\n-   为什么要构建这个？\n\
  -   它将要做什么？\n-   生命周期的每个阶段将在何时完成？\n-   它们需要什么时候完成？\n-   每个阶段需要完成什么？\n-   谁来负责做这些事？\n\
  \n了解所涉及的复杂性是很有帮助的。所有这些都将汇聚到项目计划中。\n\n#### 什么是项目计划？\n\n项目计划是一份阐述项目目的和方法的文档。它定义了项目中的风险所在、主要利益相关者是谁、时间线的范围（以及该时间线由什么驱动），以及项目的成果。它还分解了什么事情按什么顺序发生，以及每个阶段由谁负责、谁参与。这是一份面向客户的文档，因为它旨在让所有参与者达成一致。当项目计划完整且清晰时，每个人都知道为什么要做这个项目，紧迫感来自何处，以及项目可能何时上线。如果做得得当，项目计划不会回避困难的部分：项目有多难，需要多快完成，以及谁真正承诺让它成为现实。\n\
  \n目的是项目计划中一个独特的组成部分，尽管可能只有几句话。对于一个初创公司，可以是：“这是我们新初创公司的对外形象。我们想要展示我们的工作成果并达成第一笔销售。”对于一个从现有平台迁移过来的、更大型复杂的项目，目的可以是：“我们想更新我们的网络资产，以利用新的客户互动水平。我们希望能拥有更多满意的客户和更多的销售。”对于一个社区网站，“我希望我们的用户能找到与他们需求相关的内容。”\n\
  \n目的陈述应该用平实的语言写成：它阐述了项目的目标。把它打印出来。（是的，用纸打印。）在棘手的会议上——那些所有与会者都带着自己希望网站实现的投资设想，且范围早已确定之后的会议——把它放在手边。这个目的陈述也可以用来回答诸如“X\
  \ 想法有助于实现我们的目的吗？是否值得为了纳入它而改变范围？”这样的问题。这个目的陈述将有助于让你的项目保持在正轨上。\n\n\n\n### 滨屋非营利组织示范项目计划\n\
  \n**使命**：滨屋是一家非营利组织，希望更新其网站，以便利用在线活动管理和捐款功能。\n\n**功能**：\n\n-   可由非技术人员轻松更新的静态页面\n\
  \    -   页面中的图片\n-   可供下载的文档\n-   捐款功能\n-   活动管理\n-   电子邮件简报注册\n-   过往活动照片库\n\n\
