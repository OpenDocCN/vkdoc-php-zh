- fmt: '首先你需要考虑管理区域的权限。显然，你只希望有权限的用户能够访问这个区域。幸运的是，我们在第3章中已经通过为管理员用户类型定义权限来处理了这个问题。那一章定义的权限表明，管理员角色可以访问名为`admin`的资源。


    创建管理员只需在网站上注册一个新账户，然后使用`SQL`手动更新已创建记录的数据库记录即可。


    > **注意**：通常只有初始管理员才需要手动执行`SQL`查询。


    如果你确实实现了之前讨论的管理区域用户管理工具，那么你将能够创建后续的管理员，但仍然需要使用`SQL`创建初始管理员。


    例如，如果我想将用户名为`qz`的用户更新为管理员，我可以在应用程序数据库上使用以下`SQL`查询：


    ```sql

    mysql> update users set user_type = ''administrator'' where username = ''qz'';

    ```


    ## 创建`AdminController`类


