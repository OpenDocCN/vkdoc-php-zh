  ²² Drupal，"为何 drupal.org 如此卡顿？"评论，`drupal.org/node/25982#comment-45105`


  在同一篇帖子的后续部分，Boris 提到 Dries 确定了一个额外目标——设立一个带薪职位，以减轻维护`drupal.org`网站的重担，这些工作原本由每周花费约八小时处理此类维护任务的志愿者（Dries、Steven
  Wittens 等）承担。巧合的是，同一篇帖子还详细记录了一位社区成员的反馈，他认为成立基金会并非必要步骤：


  > *"Kieran……持更务实的观点。Drupal 社区已经知道如何获取资金，我们拥有一个能随时提出解决方案的优秀生态系统。有了 OSL 的免费托管和完善的服务器基础设施，我们目前的状态就很好。^(24)*

  >

