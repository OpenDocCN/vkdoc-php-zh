    Thus, when a button is pressed in the original window, a new document is displayed
    in the same window with the message containing the name of the pressed button
    (displayed in capital letters and in bold).


    First, analyze the HTML code for the `index.html` file that opens when the browser
    starts.


    ```html

    Two Buttons


    Two Buttons

    Please, select a button and click it.


    First

    Second

    ```


    Compared to the previous case, there are not too many changes, but they are significant.
    First, there is no input field, but there are two buttons (the elements created
    by `<button>` and `</button>` tags). Each of the buttons is described with the
    `style="width:100px"` attribute. It defines the width of the button to be `100`
    pixels. That is about “decoration.” The first button has the value `"first"` for
    the `name` attribute. The `name` attribute’s value for the second button is `"second"`.
    You need that attribute to identify the buttons in the PHP code. In addition,
    each button has a value for the `value` attribute. For the first button, it is
    `"FIRST"`, and for the second button, it is `"SECOND"`. You also use those values
    in the PHP code.


    ---


    **Details**


    | --- | --- | --- |


    When you click a button, since in this case the POST method is used to send data,
    the element associated with the clicked button is added to the `$_POST` array.
    The key is determined by the button’s `name` attribute, and the element’s value
    is determined by the button’s `value` attribute.


    The form data is processed by the program from the `listing12_04.php` file (the
    value `"listing12_04.php"` for the form’s `action` attribute). The code of the
    program is shown in Listing [12-4](#613529_1_En_12_Chapter.xhtml#PC19).


    ```html

    I know the button


    You have made a choice


    You have clicked the


    button.

    ```


    **Listing 12-4** Handling a Button Click


    That is a simple HTML code containing a small PHP block.


    As a result of executing the code, the text (the word associated with the button’s
    name) is determined and entered in the document. Then, the document is passed
    to the browser.


    You use the conditional statement in which the `isset($_POST["first"])` condition
    is tested. It is true if there is an element with the `"first"` key in the `$_POST`
    array. The true condition means that the user clicked the **First** button since
    that button’s `name` attribute has the value `"first"`. The element `$_POST["first"]`
    gives the value of the button’s `value` attribute (so it is `"FIRST"`). That is
    why after executing the `$button=$_POST["first"]` statement, the `$button` variable
    gets the value `"FIRST"`.


    If the `isset($_POST["first"])` condition is false, it means that there is no
    element with the key `"first"` in the `$_POST` array. That, in turn, implies that
    the **First** button was not clicked. If so, then you must conclude that the **Second**
    button was clicked. Therefore, using the `$button=$_POST["second"]` command, you
    assign the value of the element from the `$_POST` array with the `"second"` key
    to the `$button` variable. That is the value `"SECOND"` of the `value` attribute
    of the second button.


    As a result of executing the conditional statement, the `$button` variable gets
    the value of the `value` attribute of the button clicked by the user. That value
    is written to the document the server sends to the browser.


