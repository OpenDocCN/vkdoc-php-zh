- fmt: "```php\nprint \"Dog weight is $this->dog_weight. Dog breed is $this->dog_breed.\n\
    Dog color is $this->dog_color.\";\n```\n\nPHP allows us to place properties within\
    \ strings (quotes). This allows us to use fewer periods and quotes (and maybe\
