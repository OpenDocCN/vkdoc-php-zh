    Using named placeholders makes the code a lot easier to understand, particularly
    if you choose names that are based on the variables that contain the values to
    be embedded in the SQL.


    #### Preparing the statement


    Preparing and initializing a statement is done in a single step (unlike with MySQLi,
    which requires two). You pass the SQL with placeholders directly to the connection
    object’s `prepare()` method, which returns the prepared statement, like this:


    `$stmt = $conn->prepare($sql);`'
  trans: "\n#### PHP 解决方案 11-8：在搜索中使用 MySQLi 预处理语句\n\n本 PHP 解决方案演示了如何在 `SELECT` 查询中使用\
    \ MySQLi 预处理语句，并展示了如何将结果绑定到命名变量。\n\n从 `ch11` 文件夹中复制 `mysqli_prepared_01.php`，并将其保存到\
    \ `mysqli` 文件夹中，重命名为 `mysqli_prepared.php`。该文件包含的搜索表单和结果表格与 PHP 解决方案 11-7 中使用的相同。在\
    \ `DOCTYPE` 声明上方的 PHP 代码块中，创建一个条件语句，以便在提交搜索表单时引入 `connection.php` 并创建只读连接。代码如下所示：\n\
    \n```\nif (isset($_GET['go'])) {\n    require_once '../includes/connection.php';\n\
    \    $conn = dbConnect('read');\n}\n```\n\n接下来，在条件语句内部添加 SQL 查询。查询需要指定要从 `images`\
    \ 表中检索的三个列的名称。使用问号作为搜索词的占位符，如下所示：\n\n```\n$sql = 'SELECT image_id, filename, caption\
    \ FROM images\n        WHERE caption LIKE ?';\n```\n\n在将用户提交的搜索词传递给 `bind_param()`\
    \ 方法之前，需要为其添加通配符，并赋值给一个新变量，如下所示：\n\n```\n$searchterm = '%'. $_GET['search'] .'%';\n\
    ```\n\n现在可以创建预处理语句了。`DOCTYPE` 声明上方 PHP 代码块中的完成代码如下所示：\n\n```\nif (isset($_GET['go']))\
    \ {\n    require_once '../includes/connection.inc.php';\n    $conn = dbConnect('read');\n\
    \    $sql = 'SELECT image_id, filename, caption FROM images\n            WHERE\
    \ caption LIKE ?';\n    $searchterm = '%'. $_GET['search'] .'%';\n    $stmt =\
    \ $conn->stmt_init();\n    if ($stmt->prepare($sql)) {\n        $stmt->bind_param('s',\
    \ $searchterm);\n        $stmt->execute();\n        $stmt->bind_result($image_id,\
    \ $filename, $caption);\n        $stmt->store_result();\n        $numRows = $stmt->num_rows;\n\
    \    } else {\n        $error = $stmt->error;\n    }\n}\n```\n\n在 `<body>` 开始标签后添加一个条件语句，以便在出现问题时显示错误消息：\n\
    \n- 这将初始化预处理语句并将其赋值给 `$stmt`。然后将 SQL 查询传递给 `prepare()` 方法，该方法检查查询语法的有效性。如果语法有问题，`else`\
    \ 块会将错误消息赋值给 `$error`。如果语法无误，则执行条件语句中的其余脚本。\n- 条件语句中的第一行将 `$searchterm` 绑定到 `SELECT`\
    \ 查询，替换问号占位符。第一个参数告诉预处理语句将其视为字符串。\n- 执行预处理语句后，下一行将 `SELECT` 查询的结果绑定到 `$image_id`、`$filename`\
    \ 和 `$caption`。这些变量必须与查询中的顺序一致。我这里用它们代表的列名来命名变量，但你可以使用任何你想要的变量名。\n- 然后存储结果。请注意，只需调用语句对象的\
    \ `store_result()` 方法即可存储结果。与使用 `query()` 不同，你无需将 `store_result()` 的返回值赋值给变量。如果赋值，其值仅根据结果是否成功存储而为\
    \ `true` 或 `false`。\n- 最后，通过语句对象的 `num_rows` 属性获取查询检索到的行数，并存储在 `$numRows` 中。\n\
    \n```\n<?php\nif (isset($error)) {\n    echo \"<p>$error</p>\";\n}\n?>\n```\n\n\
    在搜索表单后添加以下代码以显示结果：\n\n```\n<?php if (isset($numRows)) { ?>\n<p>针对 <b><?= htmlentities($_GET['search']);\
    \ ?></b> 的结果数量：<?= $numRows; ?></p>\n<?php if ($numRows) { ?>\n<table>\n<tr>\n\
    <th>image_id</th>\n<th>filename</th>\n<th>caption</th>\n</tr>\n<?php while ($stmt->fetch())\
    \ { ?>\n<tr>\n<td><?= $image_id; ?></td>\n<td><?= $filename; ?></td>\n<td><?=\
    \ $caption; ?></td>\n</tr>\n<?php } ?>\n</table>\n<?php }\n} ?>\n```\n\n- 这段代码大部分与\
    \ PHP 解决方案 11-7 中使用的代码相同。区别在于显示结果的 `while` 循环。它不再对结果对象使用 `fetch_assoc()` 方法并将结果存储在\
    \ `$row` 中，而是直接调用预处理语句的 `fetch()` 方法。无需将当前记录存储为 `$row`，因为各列的值已绑定到 `$image_id`、`$filename`\
    \ 和 `$caption`。\n\n你可以将自己的代码与 `ch11` 文件夹中的 `mysqli_prepared_02.php` 进行比较。\n\n\
    ### 在 PDO 预处理语句中嵌入变量\n\nPDO 预处理语句提供了匿名和命名占位符两种选择。\n\n#### 使用匿名占位符\n\n匿名占位符使用问号，方式与\
    \ MySQLi 完全相同：\n\n```\n$sql = 'SELECT image_id, filename, caption FROM images\
    \ WHERE caption LIKE ?';\n```\n\n#### 使用命名占位符\n\n命名占位符以冒号开头，如下所示：\n\n```\n$sql\
    \ = 'SELECT image_id, filename, caption FROM images WHERE caption LIKE :search';\n\
    ```\n\n使用命名占位符可以使代码更易于理解，尤其是如果你选择了基于包含要嵌入 SQL 的值的变量名来命名时。\n\n#### 准备语句\n\n准备和初始化语句只需一步完成（与需要两步的\
    \ MySQLi 不同）。你直接将带有占位符的 SQL 传递给连接对象的 `prepare()` 方法，该方法会返回预处理语句，如下所示：\n\n```\n\
    $stmt = $conn->prepare($sql);\n```\n"
- fmt: "### Binding values to the placeholders\n\nThere are several different ways\
    \ to bind values to placeholders. When using anonymous placeholders, the simplest\
    \ way is to create an array of values in the same order as the placeholders, then\
    \ to pass the array to the statement’s `execute()` method. Even if there’s only\
    \ one placeholder, you must use an array. For example, to bind `$searchterm` to\
    \ a single anonymous placeholder, you must enclose it in a pair of square brackets,\
    \ like this:\n\n`$stmt->execute([$searchterm]);`\n\nYou can also bind values to\
    \ named placeholders in a similar way, but the argument passed to the `execute()`\
    \ method must be an associative array, using the named placeholder as the key\
    \ of each value. So, the following binds `$searchterm` to the `:search` named\
    \ placeholder:\n\n`$stmt->execute([':search' => $searchterm]);`\n\nAlternatively,\
    \ you can use the statement’s `bindParam()` and `bindValue()` methods to bind\
    \ the values before calling the `execute()` method. When used with anonymous placeholders,\
    \ the first argument to both methods is a number, counting from 1, representing\
    \ the placeholder’s position in the SQL. With named placeholders, the first argument\
    \ is the named placeholder as a string. The second argument is the value you want\
    \ to insert in the query.\n\nHowever, there’s a subtle difference between the\
    \ two methods.\n\n- With `bindParam()`, the second argument must be a variable.\
    \ It cannot be a string, number, or any other type of expression.\n- With `bindValue()`,\
    \ the second argument should be a string, number, or expression. But it can also\
    \ be a variable.\n\nBecause `bindValue()` accepts any type of value, `bindParam()`\
    \ might seem redundant. The difference is that the value of the argument passed\
    \ to `bindValue()` must already be known because it binds the actual value, whereas\
    \ `bindParam()` binds only the variable. Consequently, the value can be assigned\
    \ to the variable later.\n\nTo illustrate the difference, let’s use the `SELECT`\
    \ query in “Using named placeholders.” The `:search` placeholder follows the `LIKE`\
    \ keyword, so the value needs to be combined with wildcard characters. Trying\
    \ to do the following generates an error:\n\n```\n// This will NOT work\n$stmt->bindParam(':search',\
    \ '%'. $_GET['search'] .'%');\n```\n\nYou cannot concatenate the wildcard characters\
    \ to the variable with `bindParam()`. The wildcard characters need to be added\
    \ before the variable is passed as an argument, like this:\n\n```\n$searchterm\
    \ = '%'. $_GET['search'] .'%';\n$stmt->bindParam(':search', $searchterm);\n```\n\
    \nAlternatively, you can build the expression as an argument to `bindValue()`.\n\
    \n```\n// This WILL work\n$stmt->bindValue(':search', '%'. $_GET['search'] .'%');\n\
    ```\n\nThe `bindParam()` and `bindValue()` methods accept an optional third argument:\
    \ a constant specifying the data type. The main constants are as follows:\n\n\
    - `PDO::PARAM_INT`: Integer (whole number)\n- `PDO::PARAM_LOB`: Binary (such as\
    \ an image, Word document, or PDF file)\n- `PDO::PARAM_STR`: String (text)\n-\
    \ `PDO::PARAM_BOOL`: Boolean (true or false)\n- `PDO::PARAM_NULL`: Null\n\n`PDO::PARAM_NULL`\
    \ is useful if you want to set the value of a database column to `null`. For example,\
    \ if a primary key is auto-incremented, you need to pass `null` as the value when\
    \ inserting new records. This is how you set a named parameter called `:id` to\
    \ `null` with `bindValue()`:\n\n```\n$stmt->bindValue(':id', NULL, PDO::PARAM_NULL);\n\
    ```\n\n> **Note:** There isn’t a PDO constant for floating point numbers.\n\n\
    ### Executing the statement\n\nIf you bind the values to placeholders using `bindParam()`\
    \ or `bindValue()`, you simply call the `execute()` method without arguments:\n\
    \n```\n$stmt->execute();\n```\n\nOtherwise, pass an array of values as described\
    \ in the previous section. In both cases, the result of the query is stored in\
    \ `$stmt`.\n\nError messages can be accessed in the same way as with a PDO connection.\
    \ However, instead of calling the `errorInfo()` method on the connection object,\
    \ use it on the PDO statement, like this:\n\n```\n$errorInfo = $stmt->errorInfo();\n\
    if (isset($errorInfo[2])) {\n    $error = $errorInfo[2];\n}\n```\n\n### Binding\
    \ the results (optional)\n\nTo bind the results of a `SELECT` query to variables,\
    \ each column needs to be bound separately using the `bindColumn()` method, which\
    \ takes two arguments. The first argument can be either the name of the column\
    \ or its number counting from 1. The number comes from its position in the `SELECT`\
    \ query, not the order in which it appears in the database table. So, to bind\
    \ the result from the `filename` column to `$filename` in the SQL example we’ve\
    \ been using, either of the following is acceptable:\n\n```\n$stmt->bindColumn('filename',\
    \ $filename);\n$stmt->bindColumn(2, $filename);\n```\n\nBecause each column is\
    \ bound separately, you don’t need to bind all of them. However, it’s more convenient\
    \ to do so because it avoids the need to assign the result of the `fetch()` method\
    \ to an array.\n\n### Fetching the result\n\nTo fetch the results of a `SELECT`\
    \ query, call the statement’s `fetch()` method. If you have used `bindColumn()`\
    \ to bind the output to variables, you can use the variables directly. Otherwise,\
    \ it returns an array of the current row indexed both by column name and a zero-indexed\
    \ column number.\n\n> **Note:** You can control the PDO `fetch()` method’s type\
    \ of output by passing it a constant as an argument. See [`http://php.net/manual/en/pdostatement.fetch.php`](http://php.net/manual/en/pdostatement.fetch.php).\n\
    \n### PHP Solution 11-9: Using a PDO prepared statement in a search\n\nThis PHP\
    \ solution shows how to embed the user-submitted value from a search form into\
    \ a `SELECT` query with a PDO prepared statement. It uses the same search form\
    \ as that in the MySQLi versions in PHP Solutions 11-7 and 11-8.\n\nCopy `pdo_prepared_01.php`\
    \ from the `ch11` folder and save it in the `pdo` folder as `pdo_prepared.php`.\
    \ Add the following code in a PHP block above the `DOCTYPE` declaration:\n\n```\n\
    if (isset($_GET['go'])) {\n    require_once '../includes/connection.php';\n  \
    \  $conn = dbConnect('read', 'pdo');\n    $sql = 'SELECT image_id, filename, caption\
    \ FROM images\n            WHERE caption LIKE :search';\n    $stmt = $conn->prepare($sql);\n\
    \    $stmt->bindValue(':search', '%' . $_GET['search'] . '%');\n    $stmt->execute();\n\
    \    $errorInfo = $stmt->errorInfo();\n    if (isset($errorInfo[2])) {\n     \
    \   $error = $errorInfo[2];\n    } else {\n        $stmt->bindColumn('image_id',\
    \ $image_id);\n        $stmt->bindColumn('filename', $filename);\n        $stmt->bindColumn(3,\
    \ $caption);\n        $numRows = $stmt->rowCount();\n    }\n}\n```\n\nThe code\
    \ that displays the results is identical to that in steps 6 and 7 in PHP Solution\
    \ 11-8. You can check the finished code in `pdo_prepared_02.php` in the `ch11`\
    \ folder.\n\n- When the form is submitted, this includes the connection file and\
    \ creates a PDO read-only connection. The prepared statement uses `:search` as\
    \ a named parameter in place of the user-submitted value.\n- The `%` wildcard\
    \ characters are concatenated with the search term at the same time as binding\
    \ it to the prepared statement. So, `bindValue()` is used instead of `bindParam()`.\n\
    - After the statement is executed, the statement’s `errorInfo()` method is called\
    \ to see if an error message has been generated and stored in `$errorInfo[2]`.\n\
    - If there are no problems, the `else` block binds the results to `$image_id`,\
    \ `$filename`, and `$caption` using the `bindColumn()` method. The first two use\
    \ the column names, but the `caption` column is referred to by its position (counting\
    \ from 1) in the `SELECT` query."
  raw: '#### Binding values to the placeholders


    There are several different ways to bind values to placeholders. When using anonymous
    placeholders, the simplest way is to create an array of values in the same order
    as the placeholders, then to pass the array to the statement’s `execute()` method.
    Even if there’s only one placeholder, you must use an array. For example, to bind
    `$searchterm` to a single anonymous placeholder, you must enclose it in a pair
    of square brackets, like this:


    `$stmt->execute([$searchterm]);`


    You can also bind values to named placeholders in a similar way, but the argument
    passed to the `execute()` method must be an associative array, using the named
    placeholder as the key of each value. So, the following binds `$searchterm` to
    the `:search` named placeholder:


    `$stmt->execute(['':search'' => $searchterm]);`


    Alternatively, you can use the statement’s `bindParam()` and `bindValue()` methods
    to bind the values before calling the `execute()` method. When used with anonymous
    placeholders, the first argument to both methods is a number, counting from 1,
    representing the placeholder’s position in the SQL. With named placeholders, the
    first argument is the named placeholder as a string. The second argument is the
    value you want to insert in the query.


    However, there’s a subtle difference between the two methods.


    *   With `bindParam()`, the second argument must be a variable. It cannot be a
    string, number, or any other type of expression.

    *   With `bindValue()`, the second argument should be a string, number, or expression.
    But it can also be a variable.


    Because `bindValue()` accepts any type of value, `bindParam()` might seem redundant.
    The difference is that the value of the argument passed to `bindValue()` must
    already be known because it binds the actual value, whereas `bindParam()` binds
    only the variable. Consequently, the value can be assigned to the variable later.


    To illustrate the difference, let’s use the `SELECT` query in “Using named placeholders.”
    The `:search` placeholder follows the `LIKE` keyword, so the value needs to be
    combined with wildcard characters. Trying to do the following generates an error:


    `// This will NOT work`


    `$stmt->bindParam('':search'', ''%''. $_GET[''search''] .''%'');`


    You cannot concatenate the wildcard characters to the variable with `bindParam()`.
    The wildcard characters need to be added before the variable is passed as an argument,
    like this:


    `$searchterm = ''%''. $_GET[''search''] .''%'';`


    `$stmt->bindParam('':search'', $searchterm);`


    Alternatively, you can build the expression as an argument to `bindValue()`.


    `// This WILL work`


    `$stmt->bindValue('':search'', ''%''. $_GET[''search''] .''%'');`


    The `bindParam()` and `bindValue()` methods accept an optional third argument:
    a constant specifying the data type. The main constants are as follows:


    *   `PDO::PARAM_INT`: Integer (whole number)

    *   `PDO::PARAM_LOB`: Binary (such as an image, Word document, or PDF file)

    *   `PDO::PARAM_STR`: String (text)

    *   `PDO::PARAM_BOOL`: Boolean (true or false)

    *   `PDO::PARAM_NULL`: Null


    `PDO::PARAM_NULL` is useful if you want to set the value of a database column
    to `null`. For example, if a primary key is auto-incremented, you need to pass
    `null` as the value when inserting new records. This is how you set a named parameter
    called `:id` to `null` with `bindValue()`:


    `$stmt->bindValue('':id'', NULL, PDO::PARAM_NULL);`


    Note


    There isn’t a PDO constant for floating point numbers.


    #### Executing the statement


    If you bind the values to placeholders using `bindParam()` or `bindValue()`, you
    simply call the `execute()` method without arguments:


    `$stmt->execute();`


    Otherwise, pass an array of values as described in the previous section. In both
    cases, the result of the query is stored in `$stmt`.


    Error messages can be accessed in the same way as with a PDO connection. However,
    instead of calling the `errorInfo()` method on the connection object, use it on
    the PDO statement, like this:


    `$errorInfo = $stmt->errorInfo();`


    `if (isset($errorInfo[2])) {`


    `$error = $errorInfo[2];`


    `}`


    #### Binding the results (optional)


    To bind the results of a `SELECT` query to variables, each column needs to be
    bound separately using the `bindColumn()` method, which takes two arguments. The
    first argument can be either the name of the column or its number counting from
    1\. The number comes from its position in the `SELECT` query, not the order in
    which it appears in the database table. So, to bind the result from the `filename`
    column to `$filename` in the SQL example we’ve been using, either of the following
    is acceptable:


    `$stmt->bindColumn(''filename'', $filename);`


    `$stmt->bindColumn(2, $filename);`


    Because each column is bound separately, you don’t need to bind all of them. However,
    it’s more convenient to do so because it avoids the need to assign the result
    of the `fetch()` method to an array.


    #### Fetching the result


    To fetch the results of a `SELECT` query, call the statement’s `fetch()` method.
    If you have used `bindColumn()` to bind the output to variables, you can use the
    variables directly. Otherwise, it returns an array of the current row indexed
    both by column name and a zero-indexed column number.


    Note


    You can control the PDO `fetch()` method’s type of output by passing it a constant
    as an argument. See [`http://php.net/manual/en/pdostatement.fetch.php`](http://php.net/manual/en/pdostatement.fetch.php)
    .


    #### PHP Solution 11-9: Using a PDO prepared statement in a search


    This PHP solution shows how to embed the user-submitted value from a search form
    into a `SELECT` query with a PDO prepared statement. It uses the same search form
    as that in the MySQLi versions in PHP Solutions 11-7 and 11-8.


    Copy `pdo_prepared_01.php` from the `ch11` folder and save it in the `pdo` folder
    as `pdo_prepared.php`.   Add the following code in a PHP block above the `DOCTYPE`
    declaration:  


    `if (isset($_GET[''go''])) {`


    `require_once ''../includes/connection.php'';`


    `$conn = dbConnect(''read'', ''pdo'');`


    `$sql = ''SELECT image_id, filename, caption FROM images`


    `WHERE caption LIKE :search'';`


    `$stmt = $conn->prepare($sql);`


    `$stmt->bindValue('':search'', ''%'' . $_GET[''search''] . ''%'');`


    `$stmt->execute();`


    `$errorInfo = $stmt->errorInfo();`


    `if (isset($errorInfo[2])) {`


    `$error = $errorInfo[2];`


    `} else {`


    `$stmt->bindColumn(''image_id'', $image_id);`


    `$stmt->bindColumn(''filename'', $filename);`


    `$stmt->bindColumn(3, $caption);`


    `$numRows = $stmt->rowCount();`


    `}`


    `}`


    The code that displays the results is identical to that in steps 6 and 7 in PHP
    Solution 11-8\. You can check the finished code in `pdo_prepared_02.php` in the
    `ch11` folder.  


    *   When the form is submitted, this includes the connection file and creates
    a PDO read-only connection. The prepared statement uses `:search` as a named parameter
    in place of the user-submitted value.

    *   The `%` wildcard characters are concatenated with the search term at the same
    time as binding it to the prepared statement. So, `bindValue()` is used instead
    of `bindParam()`.

    *   After the statement is executed, the statement’s `errorInfo()` method is called
    to see if an error message has been generated and stored in `$errorInfo[2]`.

    *   If there are no problems, the `else` block binds the results to `$image_id`,
    `$filename`, and `$caption` using the `bindColumn()` method. The first two use
    the column names, but the `caption` column is referred to by its position (counting
    from 1) in the `SELECT` query.'
  trans: "\n### 将值绑定到占位符\n\n有多种方法可以将值绑定到占位符。使用匿名占位符时，最简单的方法是创建一个与占位符顺序相同的值数组，然后将该数组传递给语句的\
    \ `execute()` 方法。即使只有一个占位符，也必须使用数组。例如，要将 `$searchterm` 绑定到单个匿名占位符，必须将其用一对方括号括起来，如下所示：\n\
    \n`$stmt->execute([$searchterm]);`\n\n你也可以用类似方式将值绑定到命名占位符，但传递给 `execute()` 方法的参数必须是一个关联数组，将命名占位符作为每个值的键。因此，以下代码将\
    \ `$searchterm` 绑定到 `:search` 命名占位符：\n\n`$stmt->execute([':search' => $searchterm]);`\n\
    \n或者，你可以在调用 `execute()` 方法之前，使用语句的 `bindParam()` 和 `bindValue()` 方法来绑定值。与匿名占位符一起使用时，这两个方法的第一个参数都是一个从\
    \ 1 开始的数字，表示占位符在 SQL 中的位置。对于命名占位符，第一个参数是作为字符串的命名占位符。第二个参数是你想要插入查询中的值。\n\n不过，这两种方法之间有一个细微的差别。\n\
    \n- 使用 `bindParam()` 时，第二个参数必须是变量。它不能是字符串、数字或任何其他类型的表达式。\n- 使用 `bindValue()` 时，第二个参数应为字符串、数字或表达式。但它也可以是变量。\n\
    \n由于 `bindValue()` 接受任何类型的值，`bindParam()` 可能显得多余。区别在于，传递给 `bindValue()` 的参数值必须是已知的，因为它绑定的是实际值，而\
    \ `bindParam()` 只绑定变量。因此，值可以在之后赋给该变量。\n\n为了说明这种差异，我们使用“使用命名占位符”中的 `SELECT` 查询。`:search`\
    \ 占位符跟在 `LIKE` 关键字之后，因此该值需要与通配符组合。尝试执行以下操作会生成错误：\n\n```\n// 这不会生效\n$stmt->bindParam(':search',\
    \ '%'. $_GET['search'] .'%');\n```\n\n你不能使用 `bindParam()` 将通配符与变量连接起来。通配符需要在将变量作为参数传递之前添加，如下所示：\n\
    \n```\n$searchterm = '%'. $_GET['search'] .'%';\n$stmt->bindParam(':search', $searchterm);\n\
    ```\n\n或者，你也可以将该表达式构建为 `bindValue()` 的参数。\n\n```\n// 这会生效\n$stmt->bindValue(':search',\
    \ '%'. $_GET['search'] .'%');\n```\n\n`bindParam()` 和 `bindValue()` 方法接受一个可选的第三个参数：一个指定数据类型的常量。主要的常量如下：\n\
    \n- `PDO::PARAM_INT`：整数（整型数）\n- `PDO::PARAM_LOB`：二进制（如图像、Word 文档或 PDF 文件）\n- `PDO::PARAM_STR`：字符串（文本）\n\
    - `PDO::PARAM_BOOL`：布尔值（真或假）\n- `PDO::PARAM_NULL`：空值\n\n如果你想将数据库列的值设置为 `null`，`PDO::PARAM_NULL`\
    \ 非常有用。例如，如果主键是自动递增的，则在插入新记录时需要传递 `null` 作为值。以下是使用 `bindValue()` 将名为 `:id` 的参数设置为\
    \ `null` 的方法：\n\n```\n$stmt->bindValue(':id', NULL, PDO::PARAM_NULL);\n```\n\n\
    > **注意：** PDO 中没有用于浮点数的常量。\n\n### 执行语句\n\n如果你使用 `bindParam()` 或 `bindValue()`\
    \ 将值绑定到占位符，则只需不带参数地调用 `execute()` 方法：\n\n```\n$stmt->execute();\n```\n\n否则，按照上一节所述传递一个值数组。在这两种情况下，查询的结果都存储在\
    \ `$stmt` 中。\n\n错误消息的访问方式与 PDO 连接相同。但是，不是在连接对象上调用 `errorInfo()` 方法，而是在 PDO 语句对象上调用它，如下所示：\n\
    \n```\n$errorInfo = $stmt->errorInfo();\nif (isset($errorInfo[2])) {\n    $error\
    \ = $errorInfo[2];\n}\n```\n\n### 绑定结果（可选）\n\n要将 `SELECT` 查询的结果绑定到变量，需要使用 `bindColumn()`\
    \ 方法分别绑定每一列，该方法接受两个参数。第一个参数可以是列的名称，也可以是从 1 开始计数的列编号。该编号来自其在 `SELECT` 查询中的位置，而不是在数据库表中的出现顺序。因此，为了在我们一直使用的\
    \ SQL 示例中将 `filename` 列的结果绑定到 `$filename`，以下任一方式均可接受：\n\n```\n$stmt->bindColumn('filename',\
    \ $filename);\n$stmt->bindColumn(2, $filename);\n```\n\n由于每一列是分别绑定的，因此你不需要绑定所有列。但是，这样做会更方便，因为它避免了将\
    \ `fetch()` 方法的结果赋值给数组的需要。\n\n### 获取结果\n\n要获取 `SELECT` 查询的结果，请调用语句的 `fetch()`\
    \ 方法。如果你使用了 `bindColumn()` 将输出绑定到变量，则可以直接使用这些变量。否则，它会返回当前行的数组，该数组同时以列名和零索引的列编号作为索引。\n\
    \n> **注意：** 你可以通过向 PDO 的 `fetch()` 方法传递一个常量作为参数来控制其输出类型。参见 [`http://php.net/manual/en/pdostatement.fetch.php`](http://php.net/manual/en/pdostatement.fetch.php)。\n\
    \n### PHP 方案 11-9：在搜索中使用 PDO 预处理语句\n\n本 PHP 方案展示了如何将搜索表单中用户提交的值嵌入到带有 PDO 预处理语句的\
    \ `SELECT` 查询中。它使用的搜索表单与 PHP 方案 11-7 和 11-8 中 MySQLi 版本的搜索表单相同。\n\n将 `ch11` 文件夹中的\
    \ `pdo_prepared_01.php` 复制到 `pdo` 文件夹中，并将其保存为 `pdo_prepared.php`。在 `DOCTYPE` 声明上方的\
    \ PHP 代码块中添加以下代码：\n\n```\nif (isset($_GET['go'])) {\n    require_once '../includes/connection.php';\n\
    \    $conn = dbConnect('read', 'pdo');\n    $sql = 'SELECT image_id, filename,\
    \ caption FROM images\n            WHERE caption LIKE :search';\n    $stmt = $conn->prepare($sql);\n\
    \    $stmt->bindValue(':search', '%' . $_GET['search'] . '%');\n    $stmt->execute();\n\
    \    $errorInfo = $stmt->errorInfo();\n    if (isset($errorInfo[2])) {\n     \
    \   $error = $errorInfo[2];\n    } else {\n        $stmt->bindColumn('image_id',\
    \ $image_id);\n        $stmt->bindColumn('filename', $filename);\n        $stmt->bindColumn(3,\
    \ $caption);\n        $numRows = $stmt->rowCount();\n    }\n}\n```\n\n用于显示结果的代码与\
    \ PHP 方案 11-8 中步骤 6 和 7 的代码相同。你可以在 `ch11` 文件夹中的 `pdo_prepared_02.php` 文件中查看完整的代码。\n\
    \n- 当表单提交时，此代码会包含连接文件并创建一个 PDO 只读连接。预处理语句使用 `:search` 作为命名参数，替代用户提交的值。\n- `%`\
    \ 通配符在绑定到预处理语句的同时与搜索词连接。因此，这里使用 `bindValue()` 而不是 `bindParam()`。\n- 语句执行后，会调用语句的\
    \ `errorInfo()` 方法来查看是否生成了错误消息并存储在 `$errorInfo[2]` 中。\n- 如果没有问题，`else` 块会使用 `bindColumn()`\
    \ 方法将结果绑定到 `$image_id`、`$filename` 和 `$caption`。前两个使用了列名，但 `caption` 列是通过其在 `SELECT`\
    \ 查询中的位置（从 1 开始计数）来引用的。\n"
- fmt: "### PHP Solution 11-10: Changing column options through user input\n\nThis\
    \ PHP solution shows how to change the name of SQL keywords in a `SELECT` query\
    \ through user input. SQL keywords cannot be wrapped in quotes, so using prepared\
    \ statements or the MySQLi `real_escape_string()` method won’t work. Instead,\
    \ you need to ensure that the user input matches an array of expected values.\
    \ If no match is found, use a default value instead. The technique is identical\
    \ for MySQLi and PDO.\n\nCopy either `mysqli_order_01.php` or `pdo_order_01.php`\
    \ from the `ch11` folder and save it in the `mysqli` or `pdo` folder. Both versions\
    \ select all records from the `images` table and display the results in table.\
    \ The pages also contain a form that allows the user to select the name of a column\
    \ by which to sort the results in either ascending or descending order. In its\
    \ initial state, the form is inactive. The pages display the details sorted by\
    \ `image_id` in ascending order, like this:\n\n![A978-1-4842-0635-5_11_Figp_HTML.jpg](A978-1-4842-0635-5_11_Figp_HTML.jpg)\n\
    \nAmend the code in the PHP block above the `DOCTYPE` declaration like this (the\
    \ following listing shows the PDO version, but the changes highlighted in bold\
    \ type are the same for MySQLi):\n\n```\nrequire_once '../includes/connection.php';\n\
    \n// connect to database\n$conn = dbConnect('read', 'pdo');\n\n// set default\
    \ values\n$col = 'image_id';\n$dir = 'ASC';\n\n// create arrays of permitted values\n\
    $columns = ['image_id', 'filename', 'caption'];\n$direction = ['ASC', 'DESC'];\n\
    \n// if the form has been submitted, use only expected values\nif (isset($_GET['column'])\
    \ && in_array($_GET['column'], $columns)) {\n    $col = $_GET['column'];\n}\n\n\
    if (isset($_GET['direction']) && in_array($_GET['direction'], $direction)) {\n\
    \    $dir = $_GET['direction'];\n}\n\n// prepare the SQL query using sanitized\
    \ variables\n$sql = \"SELECT * FROM images\n        ORDER BY $col $dir\";\n\n\
    // submit the query and capture the result\n$result = $conn->query($sql);\n$errorInfo\
    \ = $conn->errorInfo();\nif (isset($errorInfo[2])) {\n    $error = $errorInfo[2];\n\
    }\n```\n\nEdit the `<option>` tags in the drop-down menus so they display the\
    \ selected values for `$col` and `$dir`, like this:\n\n* The new code defines\
    \ two variables, `$col` and `$dir`, that are embedded directly in the `SELECT`\
    \ query. Because they have been assigned default values, the query displays the\
    \ results sorted by the `image_id` column in ascending order when the page first\
    \ loads.\n* Two arrays, `$columns` and `$direction`, then define permitted values:\
    \ the column names and the `ASC` and `DESC` keywords. These arrays are used by\
    \ the conditional statements that check the `$_GET` array for `column` and `direction`.\
    \ The submitted values are reassigned to `$col` and `$dir` only if they match\
    \ a value in the `$columns` and `$direction` arrays, respectively. This prevents\
    \ any attempt to inject illegal values into the SQL query.\n\n```\n<select name=\"\
    column\" id=\"column\">\n    <option <?php if ($col == 'image_id') echo 'selected';\
    \ ?>\n    >image_id</option>\n    <option <?php if ($col == 'filename') echo 'selected';\
    \ ?>\n    >filename</option>\n    <option <?php if ($col == 'caption') echo 'selected';\
    \ ?>\n    >caption</option>\n</select>\n\n<select name=\"direction\" id=\"direction\"\
    >\n    <option value=\"ASC\" <?php if ($dir == 'ASC') echo 'selected'; ?>\n  \
    \  >Ascending</option>\n    <option value=\"DESC\" <?php if ($dir == 'DESC') echo\
    \ 'selected'; ?>\n    >Descending</option>\n</select>\n```\n\nSave the page and\
    \ test it in a browser. You can change the sort order of the display by selecting\
    \ the values in the drop-down menus and clicking Change. However, if you try to\
    \ inject an illegal value through the query string, the page uses the default\
    \ values of `$col` and `$dir` to display the results sorted by `image_id` in ascending\
    \ order.\n\nYou can check your code against `mysqli_order_02.php` and `pdo_order_02.php`\
    \ in the `ch11` folder.\n\n### Chapter Review\n\nPHP provides three methods of\
    \ communicating with MySQL:\n\n* The original MySQL extension, which is deprecated:\
    \ It should not be used for new projects. If you maintain an existing site, you\
    \ can easily recognize whether it uses the original MySQL extension, because all\
    \ functions begin with `mysql_`. You need to plan immediately to convert the site\
    \ to using one of the other methods. The original MySQL functions will stop working\
    \ in a future version of PHP.\n* The MySQL Improved (MySQLi) extension: This is\
    \ recommended for all new MySQL projects. It requires PHP 5.0 and MySQL 4.1 or\
    \ higher. It’s more efficient and has the added safety of prepared statements.\
    \ It’s also fully compatible with MariaDB.\n* The PHP Data Objects (PDO) abstraction\
    \ layer, which is database-neutral: You should choose this option if your projects\
    \ are likely to need to be adapted for use with other databases. Although the\
    \ code is database-neutral, PDO requires the correct driver to be installed for\
    \ your chosen database. The driver for MySQL is fully compatible with MariaDB,\
    \ and is commonly installed. Other drivers are less common. However, if the correct\
    \ driver is installed, only the data source name (DSN) in the connection string\
    \ needs to be changed to switch from one database to another.\n\nAlthough PHP\
    \ communicates with the database and stores the results, queries need to be written\
    \ in SQL, the standard language used to query a relational database. This chapter\
    \ showed how to retrieve information stored in a database table using a `SELECT`\
    \ statement, refining the search with a `WHERE` clause, and changing the sort\
    \ order with `ORDER BY`. You also learned several techniques to protect queries\
    \ from SQL injection, including prepared statements, which use placeholders instead\
    \ of embedding variables directly in a query.\n\nIn the next chapter, you’ll put\
    \ this knowledge to practical use by creating an online photo gallery.\n\n## 12.\
    \ Creating a Dynamic Photo Gallery\n\nThe previous chapter concentrated mainly\
    \ on extracting the contents of the `images` table as text. This chapter builds\
    \ on those techniques to develop the mini photo gallery shown in Figure 12-1.\n\
    \n![A978-1-4842-0635-5_12_Fig1_HTML.jpg](A978-1-4842-0635-5_12_Fig1_HTML.jpg)\n\
    \nFigure 12-1. This mini photo gallery is driven by pulling information from a\
    \ database\n\nThe gallery also demonstrates some cool features that you’ll want\
    \ to incorporate into text-driven pages, too. For instance, the grid of thumbnail\
    \ images on the left displays two images per row. Just by changing two numbers,\
    \ you can make the grid as many columns wide and as many rows deep as you like.\
    \ Clicking one of the thumbnails replaces the main image and caption. It’s the\
    \ same page that reloads, but exactly the same technique is used to create online\
    \ catalogs that take you to another page with more details about a product. The\
    \ Next link at the foot of the thumbnails grid shows you the next set of photographs,\
    \ using exactly the same technique as you use to page through a long set of search\
    \ results. This gallery isn’t just a pretty face or two...\n\nWhat this chapter\
    \ covers:\n\n* Why storing images in a database is a bad idea, and what you should\
    \ do instead\n* Planning the layout of a dynamic gallery\n* Displaying a fixed\
    \ number of results in a table row\n* Limiting the number of records retrieved\
    \ at a time\n* Paging through a long set of results"
  raw: '#### PHP Solution 11-10: Changing column options through user input


    This PHP solution shows how to change the name of SQL keywords in a `SELECT` query
    through user input. SQL keywords cannot be wrapped in quotes, so using prepared
    statements or the MySQLi `real_escape_string()` method won’t work. Instead, you
    need to ensure that the user input matches an array of expected values. If no
    match is found, use a default value instead. The technique is identical for MySQLi
    and PDO.


    Copy either `mysqli_order_01.php` or `pdo_order_01.php` from the `ch11` folder
    and save it in the `mysqli` or `pdo` folder. Both versions select all records
    from the `images` table and display the results in table. The pages also contain
    a form that allows the user to select the name of a column by which to sort the
    results in either ascending or descending order. In its initial state, the form
    is inactive. The pages display the details sorted by `image_id` in ascending order,
    like this:  


    ![A978-1-4842-0635-5_11_Figp_HTML.jpg](A978-1-4842-0635-5_11_Figp_HTML.jpg)


    Amend the code in the PHP block above the `DOCTYPE` declaration like this (the
    following listing shows the PDO version, but the changes highlighted in bold type
    are the same for MySQLi):  


    `require_once ''../includes/connection.php'';`


    `// connect to database`


    `$conn = dbConnect(''read'', ''pdo'');`


    `// set default values`


    `$col = ''image_id'';`


    `$dir = ''ASC'';`


    `// create arrays of permitted values`


    `$columns = [''image_id'', ''filename'', ''caption''];`


    `$direction = [''ASC'', ''DESC''];`


    `// if the form has been submitted, use only expected values`


    `if (isset($_GET[''column''])` `&&` `in_array($_GET[''column''], $columns)) {`


    `$col = $_GET[''column''];`


    `}`


    `if (isset($_GET[''direction''])` `&&` `in_array($_GET[''direction''], $direction))
    {`


    `$dir = $_GET[''direction''];`


    `}`


    `// prepare the SQL query` `using sanitized variables`


    `$sql = "SELECT * FROM images`


    `ORDER BY` `$col $dir` `";`


    `// submit the query and capture the result`


    `$result = $conn->query($sql);`


    `$errorInfo = $conn->errorInfo();`


    `if (isset($errorInfo[2])) {`


    `$error = $errorInfo[2];`


    `}`


    Edit the `<option>` tags in the drop-down menus so they display the selected values
    for `$col` and `$dir`, like this:  


    *   The new code defines two variables, `$col` and `$dir`, that are embedded directly
    in the `SELECT` query. Because they have been assigned default values, the query
    displays the results sorted by the `image_id` column in ascending order when the
    page first loads.

    *   Two arrays, `$columns` and `$direction`, then define permitted values: the
    column names and the `ASC` and `DESC` keywords. These arrays are used by the conditional
    statements that check the `$_GET` array for `column` and `direction`. The submitted
    values are reassigned to `$col` and `$dir` only if they match a value in the `$columns`
    and `$direction` arrays, respectively. This prevents any attempt to inject illegal
    values into the SQL query.


    `<select name="column" id="column">`


    `<option` `<?php if ($col == ''image_id'') echo ''selected''; ?>`


    `>image_id</option>`


    `<option` `<?php if ($col == ''filename'') echo ''selected''; ?>`


    `>filename</option>`


    `<option` `<?php if ($col == ''caption'') echo ''selected''; ?>`


    `>caption</option>`


    `</select>`


    `<select name="direction" id="direction">`


    `<option value="ASC"` `<?php if ($dir == ''ASC'') echo ''selected''; ?>`


    `>Ascending</option>`


    `<option value="DESC"` `<?php if ($dir == ''DESC'') echo ''selected''; ?>`


    `>Descending</option>`


    `</select>`


    Save the page and test it in a browser. You can change the sort order of the display
    by selecting the values in the drop-down menus and clicking Change. However, if
    you try to inject an illegal value through the query string, the page uses the
    default values of `$col` and `$dir` to display the results sorted by `image_id`
    in ascending order.  


    You can check your code against `mysqli_order_02.php` and `pdo_order_02.php` in
    the `ch11` folder.


    ## Chapter Review


    PHP provides three methods of communicating with MySQL:


    *   The original MySQL extension, which is deprecated: It should not be used for
    new projects. If you maintain an existing site, you can easily recognize whether
    it uses the original MySQL extension, because all functions begin with `mysql_`.
    You need to plan immediately to convert the site to using one of the other methods.
    The original MySQL functions will stop working in a future version of PHP.

    *   The MySQL Improved (MySQLi) extension: This is recommended for all new MySQL
    projects. It requires PHP 5.0 and MySQL 4.1 or higher. It’s more efficient and
    has the added safety of prepared statements. It’s also fully compatible with MariaDB.

    *   The PHP Data Objects (PDO) abstraction layer, which is database-neutral: You
    should choose this option if your projects are likely to need to be adapted for
    use with other databases. Although the code is database-neutral, PDO requires
    the correct driver to be installed for your chosen database. The driver for MySQL
    is fully compatible with MariaDB, and is commonly installed. Other drivers are
    less common. However, if the correct driver is installed, only the data source
    name (DSN) in the connection string needs to be changed to switch from one database
    to another.


    Although PHP communicates with the database and stores the results, queries need
    to be written in SQL, the standard language used to query a relational database.
    This chapter showed how to retrieve information stored in a database table using
    a `SELECT` statement, refining the search with a `WHERE` clause, and changing
    the sort order with `ORDER BY`. You also learned several techniques to protect
    queries from SQL injection, including prepared statements, which use placeholders
    instead of embedding variables directly in a query.


    In the next chapter, you’ll put this knowledge to practical use by creating an
    online photo gallery.


    # 12. Creating a Dynamic Photo Gallery


    The previous chapter concentrated mainly on extracting the contents of the `images`
    table as text. This chapter builds on those techniques to develop the mini photo
    gallery shown in Figure [12-1](#A978-1-4842-0635-5_12_Chapter.html#Fig1).


    ![A978-1-4842-0635-5_12_Fig1_HTML.jpg](A978-1-4842-0635-5_12_Fig1_HTML.jpg)


    Figure 12-1.


    This mini photo gallery is driven by pulling information from a database


    The gallery also demonstrates some cool features that you’ll want to incorporate
    into text-driven pages, too. For instance, the grid of thumbnail images on the
    left displays two images per row. Just by changing two numbers, you can make the
    grid as many columns wide and as many rows deep as you like. Clicking one of the
    thumbnails replaces the main image and caption. It’s the same page that reloads,
    but exactly the same technique is used to create online catalogs that take you
    to another page with more details about a product. The Next link at the foot of
    the thumbnails grid shows you the next set of photographs, using exactly the same
    technique as you use to page through a long set of search results. This gallery
    isn’t just a pretty face or two . . .


    What this chapter covers:


    *   Why storing images in a database is a bad idea, and what you should do instead

    *   Planning the layout of a dynamic gallery

    *   Displaying a fixed number of results in a table row

    *   Limiting the number of records retrieved at a time

    *   Paging through a long set of results'
