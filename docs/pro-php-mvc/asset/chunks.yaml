  trans: "\n# 不使用公有属性\n我们应将属性设为受保护/私有，而非公有属性。目的是仅允许通过 getter/setter 进行访问。`getColor()`\
    \ 和 `getModel()` 方法仅返回这些受保护属性的值。`setColor()` 和 `setModel()` 方法则为这些受保护属性设置值，并返回\
    \ `$this`。由于我们返回了 `$this`，因此可以链式调用 setter 方法。\n\n这些 getter/setter 确实非常简单，但我们完全可以为其添加额外逻辑，例如在\
    \ setter 中进行验证，或在 getter 中执行转换。\n\n## 魔术方法\nPHP 在原生 getter/setter 支持方面的不足，通过魔术方法得到了弥补。顾名思义，魔术方法能执行普通函数/方法之外的功能。我们已经见过两个魔术方法：`__construct()`\
    \ 和 `__destruct()`。\n\n我们将重点关注的魔术方法是 `__call()`。`__call()` 是一个实例方法，当在类实例上调用未定义的方法时，它会被触发。换句话说，如果你调用了一个尚未定义的方法，类的\
    \ `__call()` 方法将会被调用。让我们看一下清单 3-5 中的示例。\n\n### 清单 3-5. `__call()` 方法\n\n```php\n\
    class Car\n{\n    public function __call($name, $arguments)\n    {\n        echo\
    \ \"hello world!\";\n    }\n}\n\n$car = new Car();\n$car->hello();\n```\n\n我们并没有在\
    \ `Car` 类上定义 `hello()` 方法，但当执行这段代码时，可以看到 `__call()` 方法会被运行，并输出字符串 `\"hello world!\"\
    `。这是因为当在 `Car` 实例上调用未定义方法时，`__call()` 会自动被调用。\n\n我们可以利用这一点。如果我们期望 getter/setter\
    \ 遵循 `getProperty()`/`setProperty()` 的格式，就可以创建一个 `__call()` 方法，该方法能解释我们试图访问的具体属性，并执行相应的更改或返回正确的数据。具体该如何操作呢？请查看清单\
    \ 3-6 中的示例。\n\n### 清单 3-6. 使用 `__call()` 实现 Getter/Setter\n\n```php\nclass Car\n\
    {\n    protected $_color;\n    protected $_model;\n    public function __call($name,\
    \ $arguments)\n    {\n        $first = isset($arguments[0]) ? $arguments[0] :\
    \ null;\n        switch ($name)\n        {\n            case \"getColor\":\n \
    \               return $this->_color;\n            case \"setColor\":\n      \
    \          $this->_color = $first;\n                return $this;\n          \
    \  case \"getModel\":\n                return $this->_model;\n            case\
    \ \"setModel\":\n                $this->_model = $first;\n                return\
    \ $this;\n        }\n    }\n}\n\n$car = new Car();\n$car->setColor(\"blue\")->setModel(\"\
    b-class\");\necho $car->getModel();\n```\n\n在这个例子中，我们可以注意到几个重要事项。首先，`__call()`\
    \ 方法总是接收两个参数：被调用方法的 `$name`，以及调用该方法时传入的 `$arguments` 数组。\n\n如果没有传入参数，这个数组将为空。\n\
    \n然后，我们需要处理所有可能被调用的访问器方法，这里我们使用了 `switch` 语句。我们也可以使用大量的 `if`/`else` 语句，但对于一组预设的方法列表，`switch`\
    \ 是最佳选择。你可能注意到我们不需要使用 `break` 语句，因为 `return` 语句会阻止后续 case 的执行。\n\n在这个例子中，不同属性的\
    \ getter/setter 逻辑差异很小。复用整个外围代码结构，只为处理每个单独属性而实现少量必要代码行，远比针对每个属性重复编写相同的主体代码更为合理。\n\
    \n## 添加内省功能\n这种方法对于数量有限的非公有属性来说效果不错，但如果我们能处理大量非公有属性，甚至无需重复任何代码，那岂不更好？我们可以通过结合运用所学的\
    \ `__call()` 方法知识，以及之前构建的 `Inspector` 类来实现这一点。\n\n想象一下，我们只需在受保护属性周围添加注释，就能让 `Base`\
    \ 类自动创建这些 getter/setter，如清单 3-7 所示。\n"
- fmt: "**Listing 3-7.** Creating Getters/Setters with Comments\n\n```php\nclass Car\
    \ extends Framework\\Base\n{\n    /**\n     * @readwrite\n     */\n    protected\
    \ $_color;\n\n    /**\n     * @write\n     */\n    protected $_model;\n}\n```\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nCHAPTER 3 ■ BASE CLASS\n\
    \n```php\n$car = new Car();\n$car->setColor(\"blue\")->setModel(\"b-class\");\n\
    echo $car->getColor();\n```\n\nIn order for us to achieve this sort of thing,\
    \ we would need to determine the name of the property that must be read/modified,\
    \ and also determine whether we are allowed to read/modify it, based on the `@read`/`@write`/`@readwrite`\
    \ flags in the comments. Let us begin by taking a look at what our `Base` class\
    \ will look like, as shown in Listing 3-8.\n\n**Listing 3-8.** Base `__construct()`\
    \ Method\n\n```php\nnamespace Framework\n{\n    use Framework\\Inspector as Inspector;\n\
    \    use Framework\\ArrayMethods as ArrayMethods;\n    use Framework\\StringMethods\
