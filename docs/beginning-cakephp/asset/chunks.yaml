    C H A P T E R 8 ■ I M P L E M E N T I N G A J A X F E AT U R E S


    **Passing JavaScript with the Options Array**


    Look for the options array in various helper functions, even in non-Ajax helpers
    when bringing in more complex or customized JavaScript functions. By using this
    array, you can pass on JavaScript functions to the HTML element being rendered
    by the helper that work with more complex Ajax methods. For instance, if I wanted
    to craft my own JavaScript function, I could call that function with the options
    array like this:


    $form->input(''OK'',array(''type''=>''button'',''onSubmit''=>''alert(\''Hello
    World\'');'')); Not only did I pass along the parameter saying what type of form
    input field the helper should render (in this case an HTML button), but I also
    assigned the JavaScript alert() function to the element by keying the HTML attribute
    onSubmit and giving it a value.'
