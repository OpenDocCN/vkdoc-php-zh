    Recipe 16-4\. Inserting Data


    Problem


    The class in the previous example can be used to extract data from a specific
    table in a database, but how can new rows be added?


    Solution


    Before data could be extracted from the database they had to be added. This was
    done with the command-line tool with the use of the insert statement. The insert
    statement can work on a single table and it can be used to create new records
    with any number of columns. In the command-line example we only provided the title
    column. In this example that is a required column because it’s defined with the
    constraint NOT NULL.


    A simple function that can add rows to the database can be written like this:
    function addAlbum($title, $description = null) {


    $t = this->real_escape_string($title);


    if ($description) {


    $d = $this->real_escape_string($description);


    $sql = "insert into album (title, description) values (''$t'', ''$d'')";


    }


    else {


    $sql = "insert into album (title) values (''$t'')";


    }


    $this->Query($sql);


    return $this->insert_id;


    }


    This method uses the real_escape_string() function to make sure single quotes
    and other characters before they can be included in the query. The return value
    will be the id of the newly created row. This can be used later to link other
    data to the specific record.


    How it Works


