    ; Default Value: Off


    ; Development Value: On


    ; Production Value: On


    ; max_input_time


    ; Default Value: -1 (Unlimited)


    ; Development Value: 60 (60 seconds)


    ; Production Value: 60 (60 seconds)


    ; output_buffering


    ; Default Value: Off


    ; Development Value: 4096


    ; Production Value: 4096


    ; register_argc_argv


    ; Default Value: On


    ; Development Value: Off


    ; Production Value: Off


    ; request_order


    ; Default Value: None


    ; Development Value: "GP"


    ; Production Value: "GP"


    ; session.gc_divisor


    ; Default Value: 100


    ; Development Value: 1000


    ; Production Value: 1000


    ; session.hash_bits_per_character


    ; Default Value: 4


    ; Development Value: 5


    ; Production Value: 5


    CHAPTER 1 ■ INSTALLATION AND CONFIGURATION


    ; short_open_tag


    ; Default Value: On


    ; Development Value: Off


    ; Production Value: Off


    ; track_errors


    ; Default Value: Off


    ; Development Value: On


    ; Production Value: Off


    ; url_rewriter.tags


    ; Default Value: "a=href,area=href,frame=src,form=,fieldset="


    ; Development Value: "a=href,area=href,frame=src,input=src,form=fakeentry"


    ; Production Value: "a=href,area=href,frame=src,input=src,form=fakeentry"


    ; variables_order


    ; Default Value: "EGPCS"


    ; Development Value: "GPCS"


    ; Production Value: "GPCS"


    If you are installing from a precompiled distribution you might see default standards,
    and the php.ini file might be split into multiple files for easier management.


    In addition to the display_errors and error_reporting there is an option called
    log_errors. When it''s turned on all the errors that are encountered based on
    the error_reporting flag will be written to a log file.


    This is very useful when trying to track down errors on a development or production
    server after they happened. As a developer you might not have access to the browser
    where the error occurred so being able to read through the errors after the fact
    can be a helpful debugging tool. Along with the log_errors option there is also
    an option (error_log) to specify the name of the error log file. If it''s not
    specified the errors will go into Apaches error log.


    The error_log option can be set to a file name or a full path. When it''s configured
    as just a file name the file will be placed in the same directory as where the
    main PHP script of the request was found. If you use a full path the error file
    is written at a specific location and it can even be shared among multiple hosts
    on the same server.


    If the E_NOTICE option is turned on the error log file can grow very fast. It
    is recommended to clear these files from time to time.


    The option register_argc_argv is used to define whether the variables $argc and
    $argv are defined.


    These values are commonly used with the CLI version of PHP to access the number
    of arguments passed ( $argc ) and the values of these arguments ( $argv ). The
    CLI version will actually overwrite this value in the php.ini and always turn
    these values on.


    The value makes little sense in a web environment where the parameters to the
    script are stored in $_POST , $_GET, and other super global variables.


    The default php.ini files are about 68kb in size. They include quite a bit of
    descriptive text that is simply ignored when the file is parsed. Big or small
    versions of the php.ini file do not make any noticeable difference as the file
    is only read once when the server starts up.


    In addition to the values described here it''s also important to look at configuration
    values for memory usage, execution time, size of POST, and upload data. If the
    max memory limit is set too high it could be possible to run out of resources
    in a high traffic situation. On the other hand the memory limitation must be high
    enough to handle the data. It is important to code the site in way that makes
    it possible to stay within reasonable limits. If you are running into a memory
    problem you could just go ahead and increase the configured value, but that might
    be an indication that you need to refactor the script to be more efficient with
    the resources.


    CHAPTER 1 ■ INSTALLATION AND CONFIGURATION


    Memory allocation can only be configured in php.ini (or in the apache configuration).
    That is not the case for the max_execution_time . It is set to 30 seconds by default
    and that should be enough for most of the requests on any site. In fact any request
    that takes more than 4 seconds should be optimized if possible to give the user
    the best possible experience. It can however be necessary to increase the execution
    time on certain request. If you have a query that analyzes a large data set and
    needs additional time you can specify the time needed with the use of the ini_set()
    function. The syntax to extend the max execution time to 90


    seconds look like this:


    ini_set(''max_execution_time'', 90);


    The web server might have its own timeout values that will interrupt the execution
    of a PHP script if this value is exceeded. The max_execution_time only affects
    the actual PHP runtime. If the PHP script contains system calls the ''clock''
    is stopped while these calls are running.


    One important configure option is the default time zone. Without this configuration
    the system will generate a warning each time one of the date functions are used.
    The setting is called date.timezone and can be set to any of the supported time
    zone values. Setting it to UTC will cause all the date/time functions to work
    the same way as the once prefixed with gm. The function date() and gmdate() will
    return the same value. Setting it to any other value like ''Americal/Los_Angels''
    will cause the two functions to return values with an eight hour offset.


    The script when needed can change the default time zone. If a user’s time zone
    is stored in a database the script can use that value to set the time zone. That
    way all representation of data/time values can be done according to each user’s
    time zone. The function to set the time zone dynamically is called date_


    default_timezone_set() and it takes a string as the only parameter.


    Most of the configuration options apply to both Windows and Linux, but a few of
    them are specific to Windows. The big difference is things like naming of extensions.
    On linux the names end in .so and on Windows they are prefixed with php_ and end
    in .dll (mysqli.so vs. php_mysqli.dll).


    Extensions can be loaded by the following configurations:


    extension=mysqli.so


    or on Windows


    extension=php_mysqli.dll


    Extensions can also be compiled in so there is no need to load them in php.ini.
    This is the case with the standard extension (Core, ctype, date, etc.).


    Recipe 1-3\. Compiling PHP


    Problem


    Using a precompiled version of PHP is most likely going to be good enough for
    most PHP developers, but if the operating system doesn’t provide the latest version
    or you want to create your own extensions or perhaps even contribute to the PHP
    project, you will have to compile PHP from source code. How is this done?


    Solution


    There are two basic ways to get the source code for PHP. The first is to download
    a preconfigured and officially released version of PHP, and the other is to get
    the source code from the git repository. The first option provides all the files
    matching a specific version and when a new version is released the developer must
    download that package and compile everything again.


    CHAPTER 1 ■ INSTALLATION AND CONFIGURATION


    Using the git repository makes it very easy to switch between versions and also
    very easy to always have the latest version. It is not recommended to run a production
    server on the current development branch.


    It might contain untested features. Production servers should be run on the officially
    released versions, as these have been through religious QA testing.


    In order to compile PHP from sources it''s necessary to have a few tools installed.
    On a Linux environment these include automake, autoconf, libtool, and the compiler
    (gcc). On windows you will need a version of Microsoft Visual Studio. In addition
    to these there are a number of open source libraries that PHP depends on. Most
    of these can be detected during installation and quickly installed from the package
    manager (on Linux). On Windows there is no package manager that makes this easy,
    but it''s still doable to download the source packages for these libraries and
    compile them as needed.


    How it Works


    The main difference between using an official release of PHP and compiling from
    the git repository is the use of the ''buildconf'' utility. On the official releases
    this was done when the source files were packaged, and if you try to run the command
    it will generate a warning. The basic functionality of the buildconf script is
    to scan through all the directories in the source tree and generate the configure
    file. The configure file is then used to generate the Makefile, the input to the
    compiler that describes all the files and dependencies needed to compile the configured
    options. This section will demonstrate building PHP 7 from a cloned git repository.


    On a clean install of CentOS 7 the first step will be to a version of git. Use
    the package manager to do this: $ yum install git


    Make sure you are running this command as root or remember to prefix it with sudo.
    Depending on the packages installed on the system already, this might install
    a number of other packages that git depends on.


    In the home directory create a folder called Source and change to that folder
    and then use the git command to clone the git repository:


    $ mkdir Source


    $ cd Source


    $ git clone http://git.php.net/repository/php-src


    This will create a directory called php-src with a copy of all the source files.
    If you need a specific version of PHP use the git checkout command to switch to
    the specific branch. The command git branch -a will give a list of all available
    branches. The list is quite long as the repository contains versions going back
    to PHP 4.0.


    By default the master branch is checked out. This branch contains the latest and
    greatest code. As of today that corresponds to the unreleased PHP 7.1 version.
    To get the latest released version (PHP 7.0) uses this command:


    $ git checkout PHP-7.0


    Branch PHP-7.0 set up to track remote branch PHP-7.0 from origin.


    Switched to a new branch ''


    PHP-7.0''


    Before the buildconf command is executed it''s necessary to make sure the toolchain
    is complete.


    $ yum install gcc autoconf automake libtool


    CHAPTER 1 ■ INSTALLATION AND CONFIGURATION


    This will install enough tools to run the buildconf command:


    $ ./buildconf


    buildconf: checking installation...


    buildconf: autoconf version 2.69 (ok)


    rebuilding aclocal.m4


    rebuilding configure


    rebuilding main/php_config.h.in


    This will generate the configure script that is used to specify the operation
    to use when compiling PHP.


    Running this command at this time will result in a long output that ends with
    an error: $ ./configure


