  \ |\n\n## 6. 系统软件\n\n在前一章中，我们探讨了面向用户的软件，即人类用户直接交互的软件。在本章中，我们将探讨我称之为“系统软件”的内容，即（通常）无需人为驱动即可执行任务的软件。\n\
  \n要编写系统软件，我们通常需要创建一个“守护进程”，即一个持续运行的进程。创建守护进程后，我们需要确定其主要功能。部分守护进程持续工作（如测量、监控、通信等），另一些则等待并响应事件（如网络连接、系统变化、用户操作）而工作。我们将探讨如何在\
  \ PHP 中创建守护进程并使其持续运行，然后研究如何让这个基础守护进程不持续工作，而是仅在系统发生特定事件时被激活。\n\n在前一章提到的面向用户软件中，软件通常一次仅供一个人或进程使用。而系统软件则通常同时服务于多个不同的“客户端”。此处的“客户端”可能指网络客户端（例如\
  \ Web 服务器的浏览器）、用户进程（访问 API 服务器的 GUI 客户端）、文件（日志服务器的日志文件）等。在此过程中，系统必须保持“响应性”，即一个客户端无需等待另一个客户端的请求完成。试想，如果\
  \ Apache 一次只能服务一个网页，Web 会变得多么拥堵！为了在 PHP 中管理并发任务并维护响应式守护进程，我们可以使用任务分发与管理系统，这将在本章最后部分讲解。\n\
  \n### 6.1 PHP 中的守护进程\n\n守护进程是一种作为后台进程运行（通常为持续运行）的程序。它通常不直接与用户交互，而是执行后台任务，或响应系统事件、其他软件的调用、网络请求及其他机器间事件。以守护进程方式运行的程序示例包括\
  \ Cron（在后台等待并根据当前时间执行任务）和 Apache（等待远程机器对 Web 资源的调用）。守护进程通常：\n\n*   永久运行（或长时间运行，或运行至预设事件发生）\n\
  *   在系统启动时自动启动\n*   执行有用的任务\n*   由 root 或（非人类）系统用户所有\n\n不过，这些标准并非适用于所有守护进程。事实上，守护进程唯一共同的特点是它们没有控制终端（`tty`），因此被视为“在后台”运行。没有\
  \ `tty`，软件无法通过键盘获取用户输入，也无法通过终端向用户显示输出（尽管存在其他直接或间接与用户交互的方式）。虽然传统上消耗最少资源是后台进程的关键特征，但如今情况已大不相同。数据库管理系统和\
  \ Web 服务器等软件“服务端”虽然作为后台守护进程运行，但往往消耗大量（甚至全部）系统资源，并常配有专用机器来运行它们。因此，将守护进程视为通常不直接与用户交互的任何永久运行软件，或许更为恰当。\n\
  \n\n### 6.2 创建守护进程\n\n要在 PHP 中创建守护进程，我们使用 PHP 进程控制扩展，即 `PCNTL`，该扩展仅在 Unix/Linux\
  \ 类型系统上可用。在 Windows 上，你可以使用 `win32service` PECL 扩展来控制 Windows “服务”（即守护进程），包括将你自己的\
  \ PHP 脚本转变为服务。该扩展目前仅处于测试阶段且文档稀少，因此我们在此不做赘述。\n\n| | |\n|---|---|\n| ![](img/image00249.gif)\
  \ | **`win32service` 扩展** |\n| | 允许你创建和控制 Windows 服务的测试版扩展。 |\n| | **主要网站**: [`pecl.php.net/package/win32service`](http://pecl.php.net/package/win32service)\
  \ |\n| | **主要文档和安装信息**: [`php.net/manual/en/book.win32service.php`](http://php.net/manual/en/book.win32service.php)\
  \ |\n| | **作为服务的 PHP 脚本示例**: [`php.net/manual/en/win32service.examples.php`](http://php.net/manual/en/win32service.examples.php)\
  \ |\n\n大多数预编译的 PHP 版本都包含了 `PCNTL` 扩展，但如果没有，你需要使用 `--enable-pcntl` 选项重新编译 PHP，或者通过包管理器安装该扩展。详见附录\
  \ A。\n\n创建守护进程的概要流程如下：\n\n*   我们运行一个进程（PHP 脚本）。我们称其为父进程。\n*   从父进程中，我们 fork（复制）出一个子进程。\n\
  *   然后父进程退出。子进程现在变成了无父进程的孤儿。\n*   `init` 进程收养了这个无父进程的子进程。`init` 是内核启动时启动的原始进程，是所有进程的祖先。\n\
  *   接着，我们与启动父进程的终端分离。这样做是为了：\n    *   我们的任何输出都不会出现在终端中\n    *   关闭终端不会终止我们的子进程\n\
  \    *   我们真正在后台运行\n*   要进行分离，我们需要：\n    *   将子进程移入其自己的 POSIX 进程会话中\n    *   再次\
  \ fork（创建孙进程）并终止子进程\n    *   关闭任何可能将进程与终端关联的文件描述符，例如 `STDIN`\n\n完成所有这些步骤后，你将回到终端的命令提示符下（假设你最初是从那里启动父进程的），而你的（孙进程）守护进程将自行运行。从现在起，你只能间接地与你的守护进程交互。最后，假设守护进程要持续运行（或运行一段固定时间），而不仅仅是完成一个任务后退出，那么该进程需要进入一个循环，在其中不断循环，例如，等待事件或执行持续任务。赋予其按需退出的能力可能也是明智之举。\n\
  \n这听起来可能是一个冗长且复杂的过程，但在 PHP 中相当直接。下面的脚本遵循了这一流程，并概述了基本要点。\n\n```\n 1 <?\n\n3 # 我们首先\
  \ fork 这个脚本，从而创建子进程。\n\n5 $pid = pcntl_fork();\n\n7 # 子进程将从这里开始运行，并且是父进程的一份副本，\n\
  \  8 # 包含了所有已打开的资源、变量值等，唯一的例外是上述的 $pid 变量，\n  9 # 该变量在子进程中未被设置。父进程也将从这里继续运行，\n 10\
  \ # 并且 $pid 被赋值为子进程的进程 ID。\n\n13 # 如果由于某些原因（例如系统内存不足）无法 fork 出子进程，\n 14 # 则 $pid\
  \ 将被设置为 -1。\n\n16 if ($pid == -1) { exit(\"无法 fork 子进程\"); };\n\n18 # 如果 $pid 被设置为了一个进程\
  \ ID，那么我们一定是父进程，\n 19 # 应该退出。\n\n21 if ($pid) { exit(0); };\n\n23 # 由于父进程已经在上方退出，以下代码现在仅由子进程执行。\n\
  \n26 # 我们通过成为“会话领导者”来与 TTY（终端）分离\n 27 # （而不是由 TTY 充当领导者。这启动了一个新的 POSIX 会话）...\n\n\
  29 if ( posix_setsid()  === -1 ) {\n 30 \texit(\"无法成为会话领导者\");\n 31 };\n\n33 # ...\
  \ 然后通过再次 fork，创建一个孙进程\n\n35 $pid = pcntl_fork();\n\n37 if ($pid == -1) { exit(\"\
  无法将子进程 fork 为孙进程\"); };\n\n39 # 退出子进程，此点之后仅保留孙进程。\n\n41 if ($pid) { exit(0); };\n\
  \n43 # 现在为了最终与 TTY 分离并在后台运行，我们需要关闭指向它的输入和输出流。\n 44 # 在 CLI SAPI 中，这些流是自动定义并打开的，因此总是需要被关闭。\n\
  \n48 if (!fclose(STDIN)) { exit('无法关闭 STDIN'); };\n 49 if (!fclose(STDERR)) { exit('无法关闭\
  \ STDERR'); };\n 50 if (!fclose(STDOUT)) { exit('无法关闭 STDOUT'); };\n\n52 # STDOUT\
  \ 现已关闭，如果在此之后你使用 echo 或 print 输出任何内容或插入 HTML，\n 53 # 脚本将会崩溃。同样，任何错误消息也将无处可去，\n 54\
  \ # 任何无意中读取输入的尝试都将以糟糕的结果结束。\n 55 # 因此，我们将重新创建这三个流，但指向合理的输出目标。\n 56 # 当我们 fclose\
  \ 标准流时，由于常量无法重新定义，\n 57 # PHP 会将标准流简单地分配给接下来打开的三个新文件描述符\n 58 # （无论它们叫什么名字、指向何处）。\n\
  \ 59 # 因此，以下操作也起到了保护你可能打开的其他流免受意外写入标准流造成的“污染”作用。\n\n63 $STDIN = fopen('/dev/null',\
  \ 'r');\n 64 $STDOUT = fopen('/dev/null', 'w');\n 65 $STDERR = fopen('/var/log/our_error.log',\
  \ 'wb');\n\n67 # 我们现在是一个自由漂浮的守护进程，完全与 TTY 脱离！\n\n69 # 现在我们进入主循环，做一些有用的事情。\n\n71\
  \ # 我们设置一个变量，以便在想要关闭守护进程时能够跳出循环。\n\n74 $stayInLoop = true;\n\n76 while ($stayInLoop)\
  \ {\n\n78     # 在这里做有用的事情，比如监听连接、\n 79     # 监控事物，或者守护进程所做的任何其他事情。\n\n81     # 当需要退出时，在循环的某个时刻将\
  \ $stayInLoop 设为 false，\n 82     # 这个循环将是最后一个。如果需要在循环结束前退出，\n 83     # 则需要调用 break\
  \ 并进行任何必要的清理操作。\n 84     # 这里，如果今天是星期二，我们将结束循环，仅循环一次。\n\n86     if (date('l') ==\
  \ 'Tuesday') { $stayInLoop = false; };\n\n88     # 在这个示例中，我们将执行一个名为 notify-send\
  \ 的 CLI 程序，\n 89     # 用于定期弹出通知，打个招呼。\n\n91     `notify-send '你好，守护进程正在运行！'`;\n\n\
  93     # 以下代码为每个循环周期添加了一个“休眠”。如果我们不这样做，\n 94     # 守护进程会（尝试）占用 100% 的 CPU 时间，\n\
  \ 95     # 因为它会不断地循环并评估循环条件。\n 96     # 你可以根据守护进程所需的“响应性”来调整休眠时间。\n 97     # 即使只让它休息几百或几千毫秒（使用\
  \ usleep），\n 98     # 也有助于维持整个系统的响应性。\n\n101     sleep(15); # 每 15 秒循环一次\n102 };\n\
  \n104 # 我们退出了循环，因此在这里进行任何必要的清理工作\n\n106 `notify-send '守护进程现已完成。再见！'`;\n\n108 # 然后退出\n\
  \n110 exit(0);\n```\n\n上面的代码虽然没做什么特别有用的事情，但概述了创建 PHP 守护进程的基本步骤，并且展示了它可以有多简单。你可以将它与本书中概述的其他技术结合起来，创建一些有用的、永久在后台运行的系统及网络工具。\n\
  \n在编写 PHP 守护进程时，有几件重要的事情需要牢记，以确保它们能按预期持续运行。\n\n以下是排版后的 Markdown 文档：\n\n## 6.2 避免常见陷阱\n\
  \n首先，当你像我们一样通过 fork 进程来创建子进程时，子进程几乎是父进程的精确副本，包含变量和资源的状态。这意味着，如果在 fork 之前在父脚本中执行了任何操作，这些操作都会在子进程的状态中复制。一个常见的陷阱（特别是在从同一脚本\
  \ fork 多个守护进程时）是在 fork 之前在父进程中设置数据库连接。子进程随后会与父进程及其他子进程共享相同的资源标识符（即完全相同的连接），一旦其中一个子进程关闭连接（例如通过退出），数据库将对所有其他进程不可用。另一方面，这不适用于变量。例如，如果你在父进程中设置了变量\
  \ `$foo = 6;`，当每个子进程启动时，`$foo == 6` 为真，但如果你在一个子进程中修改了它，它不会影响其他子进程，因为它们是独立的变量（只是在启动时设置为相同的值）。从技术上讲，数据库示例中的资源标识符在每个子进程中也是独立的标识符，它们只是恰好指向完全相同的外部数据库连接。\n\
  \n其次，对于运行时间非常长的脚本（例如守护进程），正确管理资源使用和垃圾回收非常重要。PHP 传统上采用“为退出而设计”的模型，例如，直到最近才默认启用垃圾回收。在\
  \ Web 脚本中，通常无需过多担心资源使用，短时间运行的脚本通常不会使用太多资源，PHP 会在脚本退出时为你清理。在长时间运行的脚本中，PHP 的垃圾回收只能做这么多（并且可能在不合时宜的时间执行），因此你需要仔细管理资源。如果你反复创建新的变量、对象、资源处理器等，或者依赖脚本的高响应性，这一点尤为重要。请参阅第\
  \ 9 章，详细了解性能、垃圾回收、衡量/最小化资源使用以及保持脚本持续运行。\n\n最后，某些平台对守护进程有标准实践，这有助于一切顺利运行。你可能需要考虑适用于你平台的实践。这些实践包括设置工作目录为\
  \ `/`（例如 `chdir /`），以及使用 `init` 脚本来启动和停止守护进程。这些实践因平台而异，并非 PHP 特有，因此超出了本书的范围。\n\n\
  | ![信息](img/image00248.jpeg) | **延伸阅读**“进入多进程”——关于 fork 的讨论 [`www.tuxradar.com/practicalphp/16/1/3`](http://www.tuxradar.com/practicalphp/16/1/3)\
  \ |\n\n### 6.3 使用 libevent 的网络守护进程\n\n在上一节中，我们使用一个相当基础的 `while(1) { }` 事件循环来保持守护进程运行，并响应事件或执行有用的工作。这种方法的优点是对于基本需求非常简单，并且是在\
  \ PHP 中本地实现的，无需外部依赖。然而，缺点是它让你自己实现所有细节，并且随着项目规模的增长，复杂性会增加。\n\n一个值得考虑的流行替代方案是 libevent，这是一个为处理基于事件的编程提供框架的库。可以通过两个不同的\
  \ PECL 模块在 PHP 中访问该库：\n\n*   `pecl-libevent`：这是一个较旧的模块，使用起来相当简单直接。但它不支持 libevent2（仅支持\
  \ 1.x 版本，1.4.0 或更高版本），因此功能较少。\n*   `pecl-event`：这是对 2004 年废弃的同名旧 PECL 模块的完全重写。它目前正在积极开发中，并支持\
  \ libevent2。它有更多选项，包括为 HTTP、DNS、SSL 和其他类型的事件连接量身定制的特定类。出于这些原因，我们将在下面的示例中使用此模块。\n\
  \nLibevent 将自己描述为“……一个提供机制的库，当文件描述符上发生特定事件或超时时间到达时，执行回调函数”。通俗地说，这意味着 libevent 将在预定的时间间隔或当特定的“文件描述符”事件发生时，执行你选择的函数。PHP\
  \ 中的“文件描述符”不仅涵盖实际文件上发生的事件，还包括任何可以视为文件或流的内容。这包括网络套接字和系统流（如 `STDIN`）。实际上，由于 epoll（一个\
  \ Linux 内核事件通知系统，由 libevent 使用）兼容性问题，libevent 通常不能用于许多平台上的文件事件（检测文件访问和修改等）。因此，在下一节中，我们还将研究用于文件事件的\
  \ inotify。实际上，你应该只考虑将 libevent 用于网络/流类型的事件，这正是它的优势所在。\n\nLibevent 还提供事件缓冲，因此在要求较高的环境中，它会为你排队事件，让你从容处理，这样就不会因为脚本在忙其他事情而错过某些事件。这在像\
  \ PHP 这样的非多任务环境中尤为重要。请注意，libevent 只处理事件响应，而不创建守护进程本身，因此你仍然需要使用上一节的代码将脚本转换为守护进程，然后再使用\
  \ Libevent 来执行工作。\n\n以下示例展示了如何使用 `pecl-event` 模块调用 libevent 来充当一个非常简单的 HTTP 服务器。为了简洁，以下示例作为标准\
  \ CLI 进程运行，如果需要，你可以使用上一节中讨论的技术将其守护进程化。\n\n```php\n<?php\n\n# 在开始实际工作之前，我们首先定义一系列函数，用于为我们的“事件”（此处为\
  \ HTTP 请求）提供响应。\n# libevent 的真正魔力出现在本脚本的结尾。\n\nfunction techInfo($req) {\n\n   \
  \ # 这是我们的第一个响应函数。传入的 $req 对象是当前的 HTTP 请求/连接。\n\n    # 首先，我们设置一个“Content-Type”输出头，告诉\
  \ Web 浏览器期望纯文本而非 HTML。\n    # 如果我们输出 HTML，仍然需要发送一个头部，但如果我们不自己添加，事件库会为我们完成。\n\n \
  \   $req->addHeader ( 'Content-Type' , \"text/plain; charset=ISO-8859-1\" ,\n  \
  \                       EventHttpRequest::OUTPUT_HEADER );\n\n    # 接着，我们将收集一些关于请求的信息，并将其格式化为字符串，发送回\
  \ Web 浏览器。\n}\n```\n\n\n24     `$replyText .= 'Command : ' . $req->getCommand()\
  \ . \"\\n\";`\n 25     `$replyText .= 'Host : ' . $req->getHost() . \"\\n\";`\n\
  \ 26     `$replyText .= 'Input Headers : ' .` \n 27     \t\t\t`var_export($req->getInputHeaders(),true)\
  \ . \"\\n\";`\n 28     `$replyText .= 'Output Headers : ' .` \n 29     \t\t\t`var_export($req->getOutputHeaders(),true)\
  \ . \"\\n\";`\n 30     `$replyText .= 'URI : ' . $req->getUri() . \"\\n\";`\n\n\
  32     `# 为了发送回复，我们创建一个包含回复内容的\"EventBuffer\"，` \n 33     `# 在本例中，该内容就是上面的 $replyText`\n\
  \n35     `$reply = new EventBuffer;`\n\n37     `$reply->add($replyText);`\n\n39\
  \     `# 最后，我们发送 EventBuffer 到浏览器，并附带 HTTP 状态码 200-OK，`\n 40     `# 以确认一切操作正确无误。`\n\
  \n42     `$req->sendReply(200, \"OK\", $reply);`\n\n44 `};`\n\n46 `function closeServer($req)\
  \ {`\n\n48 \t`# 我们的下一个函数允许访问者通过访问一个简单的 URL 来关闭服务器。`\n 49 \t`# 在关闭之前，我们会向他们发送一条消息以告知此事。`\n\
  \n52     `$reply = new EventBuffer;`\n\n54     `$reply->add(\"Ok 1337 haxor, you've\
  \ killed the server...\");`\n\n56     `$req->sendReply(200, 'OK', $reply);`\n\n\
  58 \t`# 然后我们调用事件基础的 exit 方法，来退出事件循环，`\n 59 \t`# 我们将在程序末尾看到这个操作。`\n\n61     `global\
  \ $base;`\n 62     `$base->exit();`\n 63 `};`\n\n65 `function notFound($req) {`\n\
  \n67 \t`# 该函数处理找不到资源的情况`\n\n69     `$req->sendError(404, '该页面似乎不存在，抱歉。');`\n\n71\
  \ `};`\n\n73 `function cat($req) {`\n\n75 \t`# 这个函数是互联网上最重要的函数之一。它返回一张猫的图片。`\n 76\
  \ \t`# 你需要一张名为 cat.jpg 的猫图片放在同一目录下才能生效，`\n 77 \t`# 但这应该不难安排……`\n\n80 \t`# 由于我们返回的是二进制图像文件，我们需要设置适当的\
  \ MIME 类型输出头。`\n\n83     `$req->addHeader ( 'Content-Type' , \"image/jpeg\" ,` \n\
  \ 84     \t\t\t\t\t`EventHttpRequest::OUTPUT_HEADER );`\n\n86     `# 获取图像文件的内容……`\n\
  \n88     `$cat = file_get_contents('cat.jpg');`\n\n90     `# 并将它们添加到一个新的 EventBuffer\
  \ 中……`\n\n92     `$reply = new EventBuffer;`\n\n94     `$reply->add($cat);`\n\n\
  96     `# 最后，将猫图传递给欣赏它的观众……`\n\n98     `$req->sendReply(200, \"OK\", $reply);`\n\
  \n100 `};`\n\n102 `function genericHandler($req) {`\n\n104 \t`# 这个函数将处理之前其他函数未处理的任何请求。我们将借此机会`\n\
  105 \t`# 提供一个包含标题和猫图的 HTML 页面。<img>标签会使浏览器`\n106 \t`# 发出第二个请求，该请求将被路由到上面的 cat()函数`\n\
  107 \t`# 来提供图像文件。`\n\n110     `$replyText = '<html><head><title>'.$req->getUri().'</title></head>';`\n\
  111     `$replyText .= '<body><h1>猫的图片</h1><br>';`\n112     `$replyText .= '<img\
  \ src=\"/images/cat.jpg\">';`\n113     `$replyText .= '</body></html>'`\n\n115 \
  \    `$reply = new EventBuffer;`\n\n117     `$reply->add($replyText);`\n\n119  \
  \   `$req->sendReply(200, \"OK\", $reply);`\n120 `};`\n\n122 `# 现在我们已经定义了所有用于提供内容的函数，我们需要`\n\
  123 `# 实际地设置我们的服务器。`\n\n125 `# 首先，我们创建一个\"EventBase\"，它是 libevent 用于持有和轮询`\n126\
  \ `# 一组事件的对象。`\n\n128 `$base = new EventBase();`\n\n130 `# 然后，我们向基础对象添加一个 EventHttp\
  \ 对象，它是 Event 扩展`\n131 `# 用于处理 HTTP 连接/事件的辅助工具。`\n\n133 `$http = new EventHttp($base);`\n\
  \n135 `# 我们将选择仅响应 GET 和 POST HTTP 请求`\n\n137 `$http->setAllowedMethods(`\n138 \t\
  \t`EventHttpRequest::CMD_GET | EventHttpRequest::CMD_POST);`\n\n140 `# 接下来，我们使用函数回调将上面创建的函数绑定到特定的\
  \ URI。`\n\n143 `$http->setCallback(\"/info\", \"techInfo\");`\n144 `$http->setCallback(\"\
  /close\", \"closeServer\");`\n145 `$http->setCallback(\"/notfound\", \"notFound\"\
  );`\n146 `$http->setCallback(\"/images/cat.jpg\", \"cat\");`\n\n148 `# 最后，我们添加一个默认的函数回调来处理所有其他\
  \ URI。`\n149 `# 实际上，你可以只指定这个默认处理器，而不指定上面的那些，`\n150 `# 然后在这个函数内部根据你的意愿处理 URI，将其用作路由器函数。`\n\
  \n153 `$http->setDefaultCallback(\"genericHandler\");`\n\n155 `# 我们将脚本绑定到一个地址和端口，使其能够监听连接。`\n\
  \n158 `$http->bind(\"0.0.0.0\", 12345);`\n\n160 `# 然后，我们使用基础的 loop()函数启动事件循环。我们的脚本`\n\
  161 `# 将无限期地停留在该循环中，使用上述函数处理 HTTP 请求，`\n162 `# 直到我们通过终止脚本或更理想地，通过调用$base->exit()`\n\
  163 `# （就像我们在上面的 closeServer()函数中所做的那样）来退出循环。`\n\n166 `$base->loop();`\n\n要试用这个脚本，请将你众多猫图片中的一张放在同一目录下，命名为`cat.jpg`，然后运行该脚本。打开一个网页浏览器，并导航到`http://localhost:12345`，你应该会看到一只猫的问候。要获取一些关于你连接的信息，请访问`http://localhost:12345/info`，要关闭服务器，请访问`http://localhost:12345/close`。\n\
  \n这是一个相当简单的例子，但它演示了事件驱动程序的基本结构。Event 库（通过 libevent）可以响应各种事件类型，并且包含了多种网络类型响应器的辅助工具。\n\
